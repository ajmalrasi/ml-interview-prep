<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3b82f6">
<title>AI / ML Engineer: Interview Prep</title>
<style>
  :root{
    --bg:#faf9f5; --bg-soft:#f1efe7; --bg-side:#f6f4ee; --text:#23211c;
    --muted:#6b6557; --border:#e4e0d5; --accent:#c45f3c; --accent-2:#d97757;
    --accent-soft:#f6e7df; --code-bg:#f1efe7; --code-text:#5a4636; --quote:#5c5547;
    --tok-comment:#9b9482; --tok-string:#5f8a3f; --tok-keyword:#c45f3c; --tok-builtin:#15807f;
    --tok-number:#a9762a; --tok-decorator:#8b6dff; --tok-command:#15807f; --tok-flag:#a9762a; --tok-variable:#8b6dff;
    --link:#b9532f; --header-bg:rgba(250,249,245,.85);
    --shadow:0 1px 2px rgba(60,50,30,.05),0 6px 20px rgba(60,50,30,.06);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#1f1e1b; --bg-soft:#2a2824; --bg-side:#1a1916; --text:#ece8df;
    --muted:#a39c8c; --border:#34322c; --accent:#e08763; --accent-2:#d97757;
    --accent-soft:#3a2b22; --code-bg:#2a2824; --code-text:#d8cfbf; --quote:#b3aa98;
    --tok-comment:#8f8a78; --tok-string:#a7c46e; --tok-keyword:#e7926b; --tok-builtin:#5cc4c4;
    --tok-number:#d6a45a; --tok-decorator:#a78bff; --tok-command:#5cc4c4; --tok-flag:#d6a45a; --tok-variable:#a78bff;
    --link:#ec9170; --header-bg:rgba(31,30,27,.85);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;scroll-behavior:smooth}
  :root{
    --font-sans:"Inter","SF Pro Text",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.65 var(--font-sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    letter-spacing:-0.011em;
  }
  .brand,.tools,nav,.topbar,.pager .lbl,.sec-h,.banner,.pagetools,.toc,.searchpanel{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:300px minmax(0,1fr); min-height:100vh; min-height:100dvh}

  /* sidebar */
  .sidebar{background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; height:100dvh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom)}
  .brand{padding:20px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2}
  .nav-hide{position:static;display:inline-flex;align-items:center;gap:6px;margin-top:10px;border:0;background:transparent;color:var(--muted);
    border-radius:7px;padding:5px 0;font-size:11.5px;font-weight:600;cursor:pointer}
  .nav-hide:hover{color:var(--accent)}
  .nav-collapsed-bar{display:none}
  .nav-show{display:none;position:static;width:auto;height:36px;padding:0 12px;gap:7px;font-size:12.5px;box-shadow:var(--shadow)}
  .app.nav-hidden{grid-template-columns:minmax(0,1fr)}
  .app.nav-hidden .sidebar{display:none}
  .app.nav-hidden .nav-collapsed-bar{display:flex;position:sticky;z-index:45;top:0;height:53px;align-items:center;
    padding:8px max(16px,env(safe-area-inset-left));border-bottom:1px solid var(--border);background:var(--header-bg);
    backdrop-filter:saturate(140%) blur(10px);-webkit-backdrop-filter:saturate(140%) blur(10px)}
  .app.nav-hidden .nav-show{display:flex}
  .app.nav-hidden .content-wrap{padding-top:32px}
  .brand h1{font-size:15px; margin:0 0 3px; letter-spacing:.2px; font-weight:700}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:14px}
  .tools input{flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:14px; outline:none}
  .tools input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .iconbtn{background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; min-width:40px; height:40px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:none}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent)}
  a.jbtn{display:block; margin-top:10px; text-align:center; text-decoration:none;
    background:var(--accent); color:#fff; border-radius:10px; padding:9px 12px;
    font-size:13px; font-weight:700; letter-spacing:.2px}
  a.jbtn:hover{filter:brightness(1.08); text-decoration:none}
  nav{padding:10px 10px calc(60px + env(safe-area-inset-bottom))}
  .sec{margin:2px 0}
  .sec>.sec-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    padding:14px 12px 5px; font-weight:700}
  nav a.item{display:block; padding:8px 12px; border-radius:9px; color:var(--text);
    font-size:13.5px; margin:1px 0; line-height:1.35}
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:16px}
  .hidden{display:none !important}

  /* main */
  .main{min-width:0; overflow-x:hidden}
  .topbar{display:none; align-items:center; gap:10px;
    padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
    background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px); -webkit-backdrop-filter:saturate(140%) blur(10px)}
  .topbar .tb-title{flex:1; min-width:0; font-weight:700; font-size:15px; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .content-wrap{max-width:760px; margin:0 auto;
    padding:40px max(32px,env(safe-area-inset-left)) 90px max(32px,env(safe-area-inset-right))}

  /* page tools (outline + quiz) */
  .pagetools{margin:0 0 8px}
  .toc{border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-soft); margin:0 0 22px}
  .toc>summary{cursor:pointer; padding:11px 15px; font-size:13px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; list-style:none}
  .toc>summary::-webkit-details-marker{display:none}
  .toc>summary::after{content:"▾"; float:right; color:var(--accent)}
  .toc[open]>summary::after{content:"▴"}
  .toc ul{list-style:none; margin:0 0 8px; padding:0 8px 4px}
  .toc li{margin:0}
  .toc a{display:block; padding:5px 10px; border-radius:7px; font-size:13.5px; color:var(--text)}
  .toc a:hover{background:var(--bg); text-decoration:none}
  .toc a.lvl3{padding-left:24px; font-size:13px; color:var(--muted)}
  .quizbar{display:flex; gap:8px; align-items:center; margin:0 0 18px; flex-wrap:wrap}
  .quizbar .qbtn{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);
    border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer}
  .quizbar .qbtn:hover{background:var(--accent); color:#fff}
  .quizbar .hint{font-size:12.5px; color:var(--muted)}

  article{font-size:clamp(15.5px,1.4vw,17px)}
  article h1{font-size:clamp(27px,5vw,34px); line-height:1.18; margin:.1em 0 .5em; letter-spacing:-.6px; font-weight:800; color:var(--text)}
  @supports ((-webkit-background-clip:text) or (background-clip:text)){
    article h1{background:linear-gradient(90deg,var(--sec-accent,var(--accent)),var(--text) 75%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent}
  }
  article h2{font-size:clamp(20px,3.4vw,23px); margin:1.7em 0 .5em; padding-bottom:.28em;
    border-bottom:2px solid var(--sec-accent,var(--accent)); font-weight:700; display:inline-block}
  article h3{font-size:clamp(16.5px,2.4vw,18px); margin:1.5em 0 .4em; font-weight:700}
  article p{margin:.75em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.45em}
  article li{margin:.3em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article strong{font-weight:700}
  article code{background:var(--code-bg); color:var(--code-text); padding:.13em .42em;
    border-radius:6px; font:.85em/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; word-break:break-word}
  article pre{background:var(--code-bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.1em 0}
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre; word-break:normal}
  article pre .tok-comment{color:var(--tok-comment); font-style:italic}
  article pre .tok-string{color:var(--tok-string)}
  article pre .tok-keyword{color:var(--tok-keyword); font-weight:600}
  article pre .tok-builtin{color:var(--tok-builtin)}
  article pre .tok-number{color:var(--tok-number)}
  article pre .tok-decorator{color:var(--tok-decorator)}
  article pre .tok-command{color:var(--tok-command); font-weight:600}
  article pre .tok-flag{color:var(--tok-flag)}
  article pre .tok-variable{color:var(--tok-variable)}
  article blockquote{margin:1.1em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 10px 10px 0}
  article blockquote p{margin:.3em 0}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.2em 0; border-radius:var(--radius)}
  article table{border-collapse:collapse; width:100%; font-size:14px}
  article th,article td{border:1px solid var(--border); padding:9px 12px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:700; white-space:nowrap}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:2em 0}
  article h1,article h2,article h3{scroll-margin-top:76px}

  /* Q&A collapsibles */
  details.qa{border:1px solid var(--border); border-radius:var(--radius); margin:.7em 0; background:var(--bg); box-shadow:var(--shadow)}
  details.qa>summary{cursor:pointer; padding:13px 16px; font-weight:700; list-style:none; color:var(--text)}
  details.qa>summary::-webkit-details-marker{display:none}
  details.qa>summary::before{content:"▸"; color:var(--accent); margin-right:9px; display:inline-block}
  details.qa[open]>summary::before{content:"▾"}
  details.qa .qa-body{padding:0 16px 4px; border-top:1px solid var(--border); margin-top:2px}
  details.qa .qa-body>*:first-child{margin-top:12px}

  .pager{display:flex; gap:14px; margin:52px 0 0; padding-top:24px; border-top:1px solid var(--border)}
  .pager a{flex:1; min-width:0; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg)}
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:4px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  /* section-tinted links */
  article a:not(.mdlink):not(.seccard){color:var(--sec-accent,var(--link))}
  article a.mdlink{color:var(--sec-accent,var(--link)); font-weight:600}
  nav .sec-h{display:flex; align-items:center; gap:7px}
  nav .sec-ic{font-size:14px; filter:saturate(1.1)}
  nav a.item.active{background:color-mix(in srgb,var(--card,var(--accent)) 16%,transparent); color:var(--card,var(--accent))}

  /* TL;DR / insight callout */
  .callout{display:flex; gap:13px; align-items:flex-start; background:var(--sec-accent-soft,var(--accent-soft));
    border:1px solid var(--sec-accent,var(--accent)); border-radius:14px; padding:14px 16px; margin:1.2em 0}
  .callout .cic{font-size:22px; line-height:1.2; flex:none}
  /* tint background is translucent (theme-proof), so use theme-aware softer text */
  .callout .cbody{font-size:.98em; color:var(--quote)}
  .callout .cbody code{background:var(--code-bg); color:var(--code-text)}
  .callout .clead{display:inline-block; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-weight:800; font-size:11px; letter-spacing:.8px; text-transform:uppercase;
    color:var(--sec-accent,var(--accent)); margin-right:6px}

  /* diagrams */
  figure.diagram{margin:1.5em 0; background:var(--bg-soft); border:1px solid var(--border);
    border-radius:18px; padding:18px 18px 12px; box-shadow:var(--shadow)}
  figure.diagram svg{width:100%; height:auto; display:block}
  figure.diagram figcaption{font-size:12.5px; color:var(--muted); text-align:center; margin-top:10px}
  .dg-box{fill:var(--bg); stroke:var(--border); stroke-width:1.5}
  .dg-hot{fill:var(--sec-accent-soft,var(--accent-soft)); stroke:var(--sec-accent,var(--accent)); stroke-width:2}
  .dg-soft{fill:var(--bg-soft); stroke:var(--border); stroke-width:1.5; stroke-dasharray:4 3}
  .dg-line{stroke:var(--muted); stroke-width:2; fill:none}
  .dg-arrow{fill:var(--muted)}
  .dg-label{fill:var(--text); font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-sub{fill:var(--muted); font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-accent{fill:var(--sec-accent,var(--accent))}
  .dg-accent-tx{fill:var(--sec-accent,var(--accent)); font:700 13px -apple-system,sans-serif}
  .dg-white-tx{fill:#fff; font:600 12px -apple-system,sans-serif}
  .dg-accent-soft{fill:var(--sec-accent-soft,var(--accent-soft))}
  .dg-strokeA{stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
  .dg-strokeB{stroke:var(--muted); stroke-width:2.5; stroke-dasharray:5 4}
  .dg-fill1{fill:#0e8f8f}.dg-fill2{fill:#7c5cff}.dg-fill3{fill:#c98a00}.dg-fill4{fill:var(--sec-accent,var(--accent))}

  /* home hero + section cards */
  .hero{background:linear-gradient(135deg,var(--accent-soft),var(--bg-soft)); border:1px solid var(--border);
    border-radius:20px; padding:30px 26px; margin:0 0 10px; box-shadow:var(--shadow)}
  .hero-badge{display:inline-block; font-family:-apple-system,sans-serif; font-size:11.5px; font-weight:700;
    letter-spacing:.6px; text-transform:uppercase; color:var(--accent); background:var(--bg);
    border:1px solid var(--accent); border-radius:999px; padding:5px 12px}
  .hero-title{font-size:clamp(30px,6vw,44px); font-weight:800; letter-spacing:-1px; margin:14px 0 6px; line-height:1.05}
  .hero-sub{margin:0; color:var(--quote); font-size:clamp(15px,1.6vw,17px); max-width:48ch}
  .section-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:14px; margin:.6em 0 1.6em}
  a.seccard{display:flex; flex-direction:column; gap:5px; padding:16px; border-radius:16px;
    border:1px solid var(--border); background:var(--bg); box-shadow:var(--shadow); text-decoration:none;
    border-top:3px solid var(--card); transition:transform .12s ease, box-shadow .12s ease}
  a.seccard:hover{transform:translateY(-3px); box-shadow:0 10px 26px rgba(60,50,30,.13); text-decoration:none}
  a.seccard .sc-ic{font-size:24px}
  a.seccard .sc-lbl{font-family:-apple-system,sans-serif; font-weight:700; font-size:14.5px; color:var(--card)}
  a.seccard .sc-tag{font-size:12.5px; color:var(--muted); line-height:1.45}

  /* search overlay */
  .searchpanel{display:none; position:fixed; z-index:70; left:50%; top:70px; transform:translateX(-50%);
    width:min(640px,92vw); max-height:70vh; overflow-y:auto; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.25); padding:8px}
  .searchpanel.show{display:block}
  .searchpanel .sr{display:block; padding:11px 14px; border-radius:10px; color:var(--text)}
  .searchpanel .sr:hover,.searchpanel .sr.sel{background:var(--accent-soft); text-decoration:none}
  .searchpanel .sr .t{font-weight:600; font-size:14px}
  .searchpanel .sr .c{font-size:12.5px; color:var(--muted); margin-top:2px; font-family:inherit}
  .searchpanel .sr .c mark{background:var(--accent-soft); color:var(--accent); padding:0 2px; border-radius:3px}
  .searchpanel .empty{padding:18px 14px; color:var(--muted); font-size:14px}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:min(86vw,330px); top:0; bottom:0; height:auto;
      transform:translateX(-100%); transition:transform .24s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow)}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(20,16,10,.45); z-index:50}
    .content-wrap{padding:20px 18px calc(80px + env(safe-area-inset-bottom))}
    .pager{flex-direction:column}
    .pager .next{text-align:left}
    .pager .spacer{display:none}
    nav a.item{padding:11px 14px; font-size:15px}
    nav a.item.sub{padding-left:18px}
    .searchpanel{top:60px}
    .nav-collapsed-bar,.nav-show{display:none!important}
  }
  @media (max-width:380px){ .topbar .tb-title{font-size:14px} }

/* ---------------- Precision vs Recall interactive widget ---------------- */
.prw{margin:20px 0}
.prw-wrap{display:flex; gap:18px; flex-wrap:wrap; align-items:stretch;
  background:var(--bg-soft); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; box-shadow:var(--shadow)}
.prw-main{flex:1 1 380px; min-width:300px; display:flex; flex-direction:column}
.prw-side{flex:0 1 240px; min-width:220px; display:flex; flex-direction:column; gap:14px}
.prw-svg{width:100%; height:auto; overflow:visible}
.prw-dot{opacity:.85}
.prw-pos{fill:#2f9e6f}
.prw-neg{fill:var(--muted); opacity:.5}
.prw-axis{stroke:var(--border); stroke-width:1.5}
.prw-ticks text,.prw-axlbl{fill:var(--muted); font-size:12px; font-family:inherit}
.prw-shade{fill:rgba(47,158,111,.12)}
.prw-thline{stroke:var(--accent); stroke-width:2; stroke-dasharray:5 4}
.prw-thlbl{fill:var(--accent); font-size:12px; font-weight:700; font-family:inherit}
.prw-controls{margin-top:10px}
.prw-slabel{display:block; font-size:13px; color:var(--muted); margin-bottom:4px}
.prw-slabel b{color:var(--accent)}
#prw-slider{width:100%; accent-color:var(--accent); cursor:pointer}
.prw-legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:var(--muted)}
.prw-legend i{display:inline-block; width:12px; height:12px; border-radius:3px; vertical-align:-1px; margin-right:5px}
.prw-lg-pos{background:#2f9e6f}
.prw-lg-neg{background:var(--muted); opacity:.5}
.prw-lg-shade{background:rgba(47,158,111,.25); border:1px dashed var(--accent)}
.prw-metrics{display:flex; gap:10px}
.prw-metric{flex:1; text-align:center; padding:10px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.prw-mlab{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted)}
.prw-mval{display:block; font-size:24px; font-weight:800; margin-top:2px; line-height:1}
.prw-mp .prw-mval{color:#3b82f6}
.prw-mr .prw-mval{color:#e0663f}
.prw-mf .prw-mval{color:#9a5cd0}
.prw-cm{border-collapse:collapse; width:100%; font-size:13px}
.prw-cm td{border:1px solid var(--border); padding:8px; text-align:center; font-weight:700}
.prw-cm .prw-cm-h{background:var(--bg-soft); color:var(--muted); font-weight:600; font-size:12px}
.prw-tp{background:rgba(47,158,111,.16); color:#2f9e6f}
.prw-tn{background:rgba(47,158,111,.16); color:#2f9e6f}
.prw-fp{background:rgba(224,102,63,.16); color:#e0663f}
.prw-fn{background:rgba(224,102,63,.16); color:#e0663f}
.prw-pr{width:100%; height:auto}
.prw-curve{fill:none; stroke:var(--accent); stroke-width:2}
.prw-prdot{fill:#fff; stroke:var(--accent); stroke-width:3}
@media (max-width:640px){ .prw-side{flex-basis:100%} }

/* ======================= interactive-study additions ====================== */

/* --- sidebar progress bar + study shortcuts --- */
.progwrap{margin-top:12px}
.progtrack{height:6px; border-radius:4px; background:var(--border); overflow:hidden}
.progbar{height:100%; width:0; border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .35s ease}
.proglbl{font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:.02em}
#resumeSlot{margin-top:8px}
.resume-link{display:block; font-size:12.5px; color:var(--accent); font-weight:600; padding:6px 10px;
  border:1px solid var(--border); border-radius:9px; background:var(--bg)}
.resume-link:hover{border-color:var(--accent); text-decoration:none}
.pinned-block{margin-top:9px; padding:8px 9px; border:1px solid var(--border); border-radius:9px; background:var(--bg)}
.pinned-title{font-size:10px; font-weight:800; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px}
.pinned-link{display:flex; align-items:flex-start; gap:6px; padding:4px 0; color:var(--text); font-size:12px; line-height:1.3}
.pinned-link span{color:#d39a1f}
.pinned-link:hover{color:var(--accent); text-decoration:none}

/* --- nav done markers + section counts --- */
.sec-h{position:relative}
.item.pinned::before{content:"★"; position:absolute; right:27px; top:50%; transform:translateY(-50%); color:#d39a1f; font-size:11px}
.sec-count{float:right; font-size:10.5px; font-weight:700; color:var(--muted);
  background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:1px 7px; letter-spacing:.02em}
.sec-count.all-done{color:#2f9e6f; border-color:#2f9e6f}
nav a.item{position:relative; padding-right:44px}
nav a.item.done::after{content:"✓"; position:absolute; right:9px; top:50%; transform:translateY(-50%);
  color:#2f9e6f; font-weight:800; font-size:12px}

/* --- page complete strip --- */
.page-status{display:flex; gap:9px; margin:26px 0 4px}
.complete-btn{flex:1; padding:12px 16px; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent)}
.complete-btn:hover{background:var(--accent); color:#fff}
.complete-btn.is-done{background:rgba(47,158,111,.14); color:#2f9e6f; border-color:#2f9e6f}
.pin-btn{flex:0 0 auto; padding:12px 16px; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--muted); border:1px solid var(--border)}
.pin-btn:hover,.pin-btn.is-pinned{color:#b07800; border-color:#d39a1f; background:rgba(211,154,31,.12)}
@media(max-width:520px){.page-status{flex-direction:column}.pin-btn{width:100%}}

/* --- flashcard grading --- */
.quiz-stats{font-size:12.5px; color:var(--muted); margin-left:auto}
.quiz-stats .qs-known{color:#2f9e6f} .quiz-stats .qs-missed{color:#e0663f} .quiz-stats .qs-total{opacity:.7}
.qfilter{display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--muted)}
.qfilter .fbtn{border:1px solid var(--border); background:var(--bg); color:var(--muted); border-radius:999px;
  padding:3px 10px; font-size:12px; cursor:pointer; font-family:inherit}
.qfilter .fbtn.sel{background:var(--accent); color:#fff; border-color:var(--accent)}
details.qa.known{border-color:#2f9e6f; box-shadow:inset 3px 0 0 #2f9e6f, var(--shadow)}
details.qa.missed{border-color:#e0663f; box-shadow:inset 3px 0 0 #e0663f, var(--shadow)}
details.qa.qa-hide{display:none}
.card-grade{display:flex; gap:8px; align-items:center; margin:10px 0 4px; flex-wrap:wrap}
.card-grade .cg{border:1px solid var(--border); background:var(--bg); border-radius:999px; padding:5px 13px;
  font-size:12.5px; font-weight:600; cursor:pointer; font-family:-apple-system,BlinkMacSystemFont,sans-serif; color:var(--text)}
.card-grade .cg-known:hover{background:#2f9e6f; color:#fff; border-color:#2f9e6f}
.card-grade .cg-missed:hover{background:#e0663f; color:#fff; border-color:#e0663f}
.card-grade .cg-clear{color:var(--muted); font-size:11.5px}
details.qa.known .cg-known{background:#2f9e6f; color:#fff; border-color:#2f9e6f}
details.qa.missed .cg-missed{background:#e0663f; color:#fff; border-color:#e0663f}

/* --- study timer --- */
.timer-panel{position:fixed; right:20px; bottom:20px; width:220px; z-index:60;
  background:var(--bg); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
  padding:14px; display:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.timer-panel.show{display:block}
.timer-panel.ring{animation:timerRing 1s ease-in-out 3}
@keyframes timerRing{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 4px var(--accent)}}
.timer-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
.timer-title{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted)}
.timer-x{min-width:28px; height:28px; font-size:13px}
.timer-face{display:flex; justify-content:center; margin:6px 0 12px}
.timer-ring{width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:conic-gradient(var(--accent) 360deg,var(--border) 0)}
.timer-ring .timer-time{width:96px; height:96px; border-radius:50%; background:var(--bg); display:flex;
  align-items:center; justify-content:center; font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--text)}
.timer-panel.done .timer-time{color:#e0663f}
.timer-presets{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
.timer-preset{flex:1; min-width:44px; border:1px solid var(--border); background:var(--bg); color:var(--muted);
  border-radius:8px; padding:6px 4px; font-size:11.5px; font-weight:600; cursor:pointer}
.timer-preset.sel{background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
.timer-play{width:100%; border:none; border-radius:10px; background:var(--accent); color:#fff;
  padding:10px; font-size:15px; font-weight:800; cursor:pointer}
.timer-play:hover{filter:brightness(1.08)}

/* --- generic widget slider look (shared) --- */
.bv-controls input[type=range],.qz-wrap input[type=range],.bt-controls input[type=range],.lm-wrap input[type=range]{
  width:100%; accent-color:var(--accent); cursor:pointer}
.bv-metrics{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap}
.bv-m{flex:1; min-width:90px; text-align:center; padding:9px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.bv-m .bv-mlab{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted)}
.bv-m b{display:block; font-size:19px; font-weight:800; margin-top:2px; font-variant-numeric:tabular-nums}
.bv-diag.bv-good{color:#2f9e6f}.bv-diag.bv-bad{color:#e0663f}

/* --- bias/variance widget --- */
.bv-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.bv-svg{width:100%; height:auto; overflow:visible}
.bv-true{fill:none; stroke:var(--muted); stroke-width:2; stroke-dasharray:5 4; opacity:.7}
.bv-fit{fill:none; stroke:var(--accent); stroke-width:2.6}
.bv-pt{fill:#3b82f6; opacity:.85}
.bv-legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:var(--muted)}
.bv-legend i{display:inline-block; width:14px; height:3px; border-radius:2px; vertical-align:3px; margin-right:5px}
.bv-lg-true{background:var(--muted)}.bv-lg-fit{background:var(--accent); height:4px!important}
.bv-lg-pt{width:10px!important; height:10px!important; border-radius:50%; background:#3b82f6}
.bv-controls{margin-top:12px}

/* --- quantization widget --- */
.qz-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.qz-controls{display:flex; flex-direction:column; gap:12px}
.qz-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
.qz-row>label{font-size:13px; color:var(--muted); font-family:-apple-system,sans-serif}
.qz-row>label b{color:var(--accent)}
.qz-row input[type=range]{flex:1; min-width:160px}
.qz-num{width:64px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:5px 7px; font-size:13px}
.qz-seg{border:1px solid var(--border); background:var(--bg); color:var(--muted); border-radius:8px; padding:5px 11px;
  font-size:12.5px; font-weight:600; cursor:pointer; font-family:-apple-system,sans-serif}
.qz-seg.sel{background:var(--accent); color:#fff; border-color:var(--accent)}
.qz-out,.lm-out{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0}
.qz-cell{flex:1; min-width:80px; text-align:center; padding:9px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.qz-cell span{display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted)}
.qz-cell b{display:block; font-size:17px; font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums}
.qz-cell.qz-err b{color:var(--accent)}
.qz-bar{width:100%; height:auto; overflow:visible; margin-top:4px}
.qz-tick{stroke:var(--border); stroke-width:1}
.qz-true{fill:#3b82f6}
.qz-quantdot{fill:none; stroke:var(--accent); stroke-width:2.5}

/* --- batch + llm-mem widgets --- */
.bt-wrap,.lm-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.bt-wrap{display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start}
.bt-controls{flex:1 1 300px; min-width:260px}
.bt-sliders,.lm-wrap .bt-sliders{display:flex; flex-direction:column; gap:9px; margin:10px 0}
.bt-sliders label{font-size:12.5px; color:var(--muted); font-family:-apple-system,sans-serif}
.bt-sliders label b{color:var(--accent)}
.bt-svg{flex:1 1 260px; min-width:240px; width:100%; height:auto; overflow:visible}
.bt-thrline{fill:none; stroke:var(--accent); stroke-width:2.6}
.bt-latline{fill:none; stroke:var(--muted); stroke-width:2; stroke-dasharray:5 4; opacity:.7}
.bt-dot{fill:#fff; stroke:var(--accent); stroke-width:3}
.lm-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:6px}
.lm-row>label{font-size:13px; color:var(--muted); font-family:-apple-system,sans-serif}
.lm-stack{display:flex; height:26px; border-radius:8px; overflow:hidden; border:1px solid var(--border); margin:4px 0 10px}
.lm-seg{display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; transition:width .3s ease; overflow:hidden; white-space:nowrap}
.lm-seg-w{background:var(--accent)} .lm-seg-kv{background:#3b82f6}
.lm-note{font-size:12.5px; color:var(--quote); font-family:-apple-system,sans-serif; line-height:1.5}
@media (max-width:640px){ .bt-wrap{flex-direction:column} }

/* number-format explorer */
.fmt-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.fmt-segs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px}
.fmt-bar{display:flex; height:46px; border-radius:10px; overflow:hidden; border:1px solid var(--border); gap:2px; background:var(--border)}
.fmt-seg{display:flex; align-items:center; justify-content:center; text-align:center; color:#fff; font-size:11px;
  font-weight:700; font-family:-apple-system,sans-serif; padding:0 4px; overflow:hidden; line-height:1.15; transition:flex .3s ease}
.fmt-seg span{overflow:hidden; text-overflow:ellipsis}
.fmt-sign{background:var(--muted)} .fmt-exp{background:#3b82f6} .fmt-mant{background:var(--accent)} .fmt-int{background:#8b5cf6}
.fmt-scale{display:flex; align-items:center; padding:0 12px; font-size:12px; font-weight:700; color:var(--muted);
  border:1px dashed var(--border); border-radius:10px; margin-left:2px; font-family:-apple-system,sans-serif}
.fmt-grid{margin:14px 0 10px}
.fmt-flags{display:flex; flex-wrap:wrap; gap:7px; margin:2px 0 10px}
.fmt-flag{font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:999px; font-family:-apple-system,sans-serif;
  background:var(--bg); border:1px solid var(--border); color:var(--muted)}
.fmt-flag.warn{background:rgba(234,88,12,.13); border-color:rgba(234,88,12,.4); color:#ea580c}
.fmt-flag.ok{background:rgba(20,163,115,.13); border-color:rgba(20,163,115,.4); color:var(--accent)}

/* =========================== visual diagram kit ========================== */
/* Replaces ASCII-art code blocks with clean, theme-aware flow diagrams.     */
.diagram{margin:1.5em 0; padding:18px 16px; border:1px solid var(--border); border-radius:16px;
  background:var(--bg-soft); overflow-x:auto}
.diagram-cap{font-size:12px; color:var(--muted); text-align:center; margin-top:12px; letter-spacing:.02em}

/* a node/box in a flow */
.node{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  padding:9px 15px; border-radius:11px; border:1px solid var(--sec-accent,var(--accent));
  background:var(--bg); color:var(--text); font-weight:650; font-size:13.5px; line-height:1.25;
  text-align:center; white-space:nowrap; box-shadow:var(--shadow)}
.node .nsub{font-size:11px; font-weight:500; color:var(--muted); white-space:nowrap}
.node.soft{border-style:dashed; background:var(--sec-accent-soft,var(--accent-soft)); box-shadow:none}
.node.ghost{border-color:var(--border); font-weight:600}
.node.data{border-color:#3b82f6} .node.data .nlead{color:#3b82f6}
.node.out{border-color:#2f9e6f} .node.out .nlead{color:#2f9e6f}

/* horizontal flow row with arrow connectors */
.flow{display:flex; align-items:center; flex-wrap:wrap; gap:10px 8px; justify-content:center}
.flow .arw{color:var(--sec-accent,var(--accent)); font-weight:800; font-size:18px; flex:none; line-height:1}
.flow .arw::before{content:"→"}
.flow .arw.tiny{font-size:14px}
.flow-lbl{font-size:11px; color:var(--muted); align-self:center; padding:0 2px; font-style:normal}
.arw.labeled{display:inline-flex; flex-direction:column; align-items:center; gap:1px; font-size:14px}
.arw.labeled .al{font-size:10px; color:var(--muted); font-weight:600}
.arw.labeled::before{content:"→"}

/* vertical flow (top→down) */
.vflow{display:flex; flex-direction:column; align-items:center; gap:8px}
.vflow .varw{color:var(--sec-accent,var(--accent)); font-weight:800; font-size:18px; line-height:.8}
.vflow .varw::before{content:"↓"}
.vflow .node{white-space:normal; max-width:min(560px,92%)}
.vflow .node .nsub{white-space:normal}

/* branch: one source splitting to many (or many merging to one) */
.branch{display:flex; flex-direction:column; align-items:center; gap:6px}
.branch .fork{display:flex; gap:26px; flex-wrap:wrap; justify-content:center; position:relative}
.branch .split-arw{color:var(--sec-accent,var(--accent)); font-size:20px; font-weight:800; line-height:1}
.branch .split-arw::before{content:"⌄"}

/* parallel lanes (e.g. data-parallel GPUs) merging */
.lanes{display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center}
.lane-stack{display:flex; flex-direction:column; gap:7px}
.merge-arw{display:flex; align-items:center; color:var(--sec-accent,var(--accent)); font-size:20px; font-weight:800}
.merge-arw::before{content:"⟩"}

/* two-column mapping / transfer table (CNN → LLM style) */
.maptable{width:100%; border-collapse:separate; border-spacing:0; margin:.4em 0; font-size:13.5px}
.maptable th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted);
  padding:6px 12px; border-bottom:1px solid var(--border)}
.maptable td{padding:9px 12px; vertical-align:top; border-bottom:1px solid var(--border); line-height:1.4}
.maptable tr:last-child td{border-bottom:none}
.maptable .mfrom{color:var(--quote)}
.maptable .mto{color:var(--text); font-weight:550}
.maptable .marw{width:26px; text-align:center; color:var(--sec-accent,var(--accent)); font-weight:800}
.maptable .marw::before{content:"→"}
.maptable thead .marw::before{content:""}
.maptable tbody tr:hover td{background:var(--bg)}

/* loop badge over a flow */
.loopwrap{display:flex; flex-direction:column; align-items:center; gap:7px}
.loop-top{font-size:11px; color:var(--sec-accent,var(--accent)); font-weight:700; letter-spacing:.03em;
  border:1px dashed var(--sec-accent,var(--accent)); border-radius:999px; padding:3px 14px}
.loop-back{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted)}
.loop-back .lb-arw{color:var(--sec-accent,var(--accent)); font-weight:800}
.loop-back .lb-arw::before{content:"↺"}
.flow-foot{font-size:11.5px; color:var(--muted); text-align:center; margin-top:10px; line-height:1.5}

/* mini roofline / plot SVG */
.plotfig{width:100%; max-width:560px; height:auto; display:block; margin:0 auto; overflow:visible}
.plot-axis{stroke:var(--border); stroke-width:1.5}
.plot-line{fill:none; stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
.plot-mem{fill:none; stroke:#3b82f6; stroke-width:2.5}
.plot-txt{fill:var(--muted); font-size:11px; font-family:var(--font-sans)}
.plot-txt.lead{fill:var(--text); font-weight:650}
.plot-dash{stroke:var(--muted); stroke-width:1; stroke-dasharray:4 3; opacity:.6}
@media (max-width:640px){ .branch .fork{gap:14px} .lanes{gap:8px} }

/* --- formula display (replaces monospace math blocks) --- */
.formula{margin:1.4em 0; padding:16px 20px; border:1px solid var(--border); border-radius:14px;
  background:var(--bg-soft); display:flex; flex-direction:column; gap:12px}
.frow{display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; justify-content:center; text-align:center}
.fexpr{font-family:"SF Mono",ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  font-size:16.5px; font-weight:600; color:var(--text); letter-spacing:.005em; line-height:1.5}
.fexpr .fv{color:var(--sec-accent,var(--accent))}
.fnote{font-size:12px; color:var(--muted); font-style:italic; font-family:var(--font-sans)}
.fnote::before{content:"— "}

/* --- side-by-side compare cards (replaces two-column ASCII contrasts) --- */
.compare{display:flex; gap:14px; margin:1.4em 0; flex-wrap:wrap; align-items:stretch}
.cmp-col{flex:1 1 210px; border:1px solid var(--border); border-radius:14px; background:var(--bg-soft);
  padding:14px 16px; display:flex; flex-direction:column; gap:8px}
.cmp-col.accent{border-color:var(--sec-accent,var(--accent))}
.cmp-h{font-size:13px; font-weight:750; letter-spacing:.01em; color:var(--text);
  padding-bottom:8px; border-bottom:1px solid var(--border)}
.cmp-col.accent .cmp-h{color:var(--sec-accent,var(--accent))}
.cmp-col.blue{border-color:#3b82f6} .cmp-col.blue .cmp-h{color:#3b82f6}
.cmp-col.green{border-color:#2f9e6f} .cmp-col.green .cmp-h{color:#2f9e6f}
.cmp-col ul{margin:0; padding-left:18px; font-size:13.5px; line-height:1.5; color:var(--quote)}
.cmp-col ul li{margin:3px 0}
.cmp-col p{margin:0; font-size:13.5px; line-height:1.5; color:var(--quote)}
.cmp-tag{align-self:flex-start; font-size:11px; font-weight:700; color:var(--muted);
  background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:2px 9px; margin-top:auto}

/* --- illustrative example callout --- */
.example{margin:1.3em 0; padding:14px 16px; border-left:3px solid var(--sec-accent,var(--accent));
  background:var(--bg-soft); border-radius:0 12px 12px 0; font-size:14.5px; line-height:1.6}
.example .ex-q{font-style:italic; color:var(--text)}
.example .ex-a{display:block; margin-top:8px; font-size:13.5px; color:var(--quote)}
.example .hl{background:var(--sec-accent-soft,var(--accent-soft)); color:var(--sec-accent,var(--accent));
  font-weight:650; padding:0 4px; border-radius:4px}

/* --- k-fold split bars --- */
.folds{display:flex; flex-direction:column; gap:6px; margin:.4em 0}
.fold{display:flex; align-items:center; gap:10px}
.fold-bars{display:flex; flex:1; height:22px; border-radius:6px; overflow:hidden; border:1px solid var(--border)}
.fold-seg{flex:1; display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; color:var(--muted)}
.fold-seg.test{background:var(--sec-accent-soft,var(--accent-soft)); color:var(--sec-accent,var(--accent))}
.fold-seg.train{background:var(--bg)}
.fold-lbl{font-size:11.5px; color:var(--muted); min-width:48px}

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>AI / ML Engineer Prep</h1>
      <div class="sub">ML on the cloud · MLOps · Data pipelines · GenAI</div>

le job: taking a machine-learning idea from raw data all the way to a model running, and being <em>watched<\/em>, in production on the cloud. The through-line is the <strong>ML lifecycle<\/strong> — data → model → deploy → monitor → improve — and every section is one stage of it.<\/div><\/div>\n<p>Preparing for the IDFC ML Engineer role in two days? Start with the focused <strong><a class=\"mdlink\" data-href=\"idfc-ml-engineer-path.md\" href=\"#\">IDFC ML Engineer path<\/a><\/strong>. It reuses the relevant pages from this ML track and the RAG/LLM track without copying their content.<\/p>\n<h2 id=\"what-this-role-actually-is\">What this role actually is<\/h2>\n<p>An ML Engineer sits between a data scientist and a backend engineer. You're expected to <em>build models<\/em> <strong>and<\/strong> <em>ship them<\/em> — the data pipeline that feeds them, the training that produces them, the service that serves them, and the monitoring that keeps them honest once real traffic hits. The job description's seven bullets map cleanly onto the sections here:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>JD responsibility<\/th><th>Where it's covered<\/th><\/tr><\/thead><tbody><tr><td>Model development (ML &amp; deep learning)<\/td><td>§1 Foundations, §3 Model Development<\/td><\/tr><tr><td>Data pipeline engineering<\/td><td>§2 Data Pipelines<\/td><\/tr><tr><td>Experimentation &amp; statistical analysis<\/td><td>§4 Experimentation<\/td><\/tr><tr><td>Deployment / MLOps<\/td><td>§5 MLOps &amp; Serving<\/td><\/tr><tr><td>Monitoring in production<\/td><td>§6 Monitoring &amp; Reliability<\/td><\/tr><tr><td>Optimization for speed/scale<\/td><td>§7 Cloud &amp; Infra, §8 Optimization<\/td><\/tr><tr><td>Innovation / Generative AI<\/td><td>§9 Generative AI &amp; LLMs<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Two more sections round it out: <strong>§10 ML System Design<\/strong> (the open-ended \"design a recommender\" whiteboard round) and <strong>§11 Drill Bank<\/strong> (rapid Q&amp;A for the last mile).<\/p>\n<h2 id=\"how-each-page-is-written\">How each page is written<\/h2>\n<p>Short and clear, not keyword-terse and not an essay. Every page opens with a one-line <strong>TL;DR<\/strong>, explains each idea in a few plain sentences (what it is, <em>why<\/em> it matters, how it connects), uses a small table or diagram when that's clearer than prose, and ends with a couple of quick self-check questions. You should be able to read a page in a few minutes and actually <em>understand<\/em> it, not just recognize the words.<\/p>\n<h2 id=\"the-lifecycle-in-one-picture\">The lifecycle, in one picture<\/h2>\n<div class=\"diagram\">\n  <div class=\"loopwrap\">\n    <span class=\"loop-top\">the loop you own end-to-end<\/span>\n    <div class=\"flow\">\n      <span class=\"node data\">raw data<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">PIPELINE<span class=\"nsub\">§2<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">TRAIN<span class=\"nsub\">§3<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">EVALUATE<span class=\"nsub\">§4<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">DEPLOY<span class=\"nsub\">§5<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">MONITOR<span class=\"nsub\">§6<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node out\">retrain<span class=\"nsub\">§6<\/span><\/span>\n    <\/div>\n    <span class=\"loop-back\"><span class=\"lb-arw\"><\/span> drift / new data feeds back into <b>TRAIN<\/b><\/span>\n  <\/div>\n  <div class=\"flow-foot\">Cross-cutting: §7 cloud &amp; infra · §8 optimization · §9 GenAI · §10 design<\/div>\n<\/div>\n<h2 id=\"suggested-order\">Suggested order<\/h2>\n<p>Go top to bottom the first time — the sections are sequenced along the lifecycle, so each builds on the last. If you want the highest-leverage interview topics first, prioritize <strong>§5 MLOps<\/strong>, <strong>§6 Monitoring<\/strong>, and <strong>§10 System Design<\/strong>, because those are where \"ML Engineer\" is tested more than \"data scientist.\" Skim <strong>§9 Generative AI<\/strong> even if the role isn't LLM-heavy — every team asks about it now.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"01-ml-foundations/README.md\" href=\"#\">01-ml-foundations/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-this-role-actually-is","text":"What this role actually is"},{"level":2,"id":"how-each-page-is-written","text":"How each page is written"},{"level":2,"id":"the-lifecycle-in-one-picture","text":"The lifecycle, in one picture"},{"level":2,"id":"suggested-order","text":"Suggested order"}],"text":"ai / ml engineer ml on the cloud: interview prep the whole ml lifecycle: data pipelines, model development, experimentation, and deploying & monitoring models in production with mlops — plus cloud infra, optimization, and generative ai. eleven chapters and a drill bank. ai / ml engineer: interview prep 💡 tl;dr this pack covers the whole job: taking a machine-learning idea from raw data all the way to a model running, and being watched , in production on the cloud. the through-line is the ml lifecycle — data → model → deploy → monitor → improve — and every section is one stage of it. preparing for the idfc ml engineer role in two days? start with the focused idfc ml engineer path . it reuses the relevant pages from this ml track and the rag/llm track without copying their content. what this role actually is an ml engineer sits between a data scientist and a backend engineer. you're expected to build models and ship them — the data pipeline that feeds them, the training that produces them, the service that serves them, and the monitoring that keeps them honest once real traffic hits. the job description's seven bullets map cleanly onto the sections here: jd responsibility where it's covered model development (ml & deep learning) §1 foundations, §3 model development data pipeline engineering §2 data pipelines experimentation & statistical analysis §4 experimentation deployment / mlops §5 mlops & serving monitoring in production §6 monitoring & reliability optimization for speed/scale §7 cloud & infra, §8 optimization innovation / generative ai §9 generative ai & llms two more sections round it out: §10 ml system design (the open-ended \"design a recommender\" whiteboard round) and §11 drill bank (rapid q&a for the last mile). how each page is written short and clear, not keyword-terse and not an essay. every page opens with a one-line tl;dr , explains each idea in a few plain sentences (what it is, why it matters, how it connects), uses a small table or diagram when that's clearer than prose, and ends with a couple of quick self-check questions. you should be able to read a page in a few minutes and actually understand it, not just recognize the words. the lifecycle, in one picture the loop you own end-to-end raw data pipeline §2 train §3 evaluate §4 deploy §5 monitor §6 retrain §6 drift / new data feeds back into train cross-cutting: §7 cloud & infra · §8 optimization · §9 genai · §10 design suggested order go top to bottom the first time — the sections are sequenced along the lifecycle, so each builds on the last. if you want the highest-leverage interview topics first, prioritize §5 mlops , §6 monitoring , and §10 system design , because those are where \"ml engineer\" is tested more than \"data scientist.\" skim §9 generative ai even if the role isn't llm-heavy — every team asks about it now. → start: 01-ml-foundations/readme.md","words":492},{"path":"idfc-ml-engineer-path.md","title":"IDFC ML Engineer: 2-Day Path","section":"Start here","quiz":false,"accent":"#3b82f6","html":"<h1 id=\"idfc-ml-engineer-2-day-path\">IDFC ML Engineer: 2-Day Path<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This interview spans ML fundamentals, LLM training, GPU/distributed computing, data systems, and production MLOps. The fastest preparation strategy is breadth first, then one end-to-end system-design story that connects the layers.<\/div><\/div>\n<h2 id=\"how-to-use-this-path\">How to use this path<\/h2>\n<ul><li>Spend more time explaining trade-offs aloud than rereading definitions.<\/li><li>At the end of each block, write a five-line design or debugging answer from memory.<\/li><li>Links marked <strong>RAG site<\/strong> reuse the deeper LLM-serving lessons instead of duplicating them.<\/li><\/ul>\n<h2 id=\"day-1-models-frameworks-and-distributed-training\">Day 1: Models, frameworks, and distributed training<\/h2>\n<h3 id=\"block-1-ml-judgment-90-minutes\">Block 1: ML judgment: 90 minutes<\/h3>\n<ol><li><a class=\"mdlink\" data-href=\"01-ml-foundations/README.md\" href=\"#\">ML Foundations<\/a><\/li><li><a class=\"mdlink\" data-href=\"01-ml-foundations/metrics.md\" href=\"#\">Evaluation Metrics<\/a><\/li><li><a class=\"mdlink\" data-href=\"03-model-development/classical-ml.md\" href=\"#\">Classical ML<\/a><\/li><li><a class=\"mdlink\" data-href=\"04-experimentation/validation-splits.md\" href=\"#\">Validation &amp; Data Splits<\/a><\/li><\/ol>\n<p><strong>Exit test:<\/strong> select a model, split strategy, and metric for imbalanced fraud detection with time-dependent labels. Name the leakage risks.<\/p>\n<h3 id=\"block-2-deep-learning-and-framework-fluency-90-minutes\">Block 2: Deep learning and framework fluency: 90 minutes<\/h3>\n<ol><li><a class=\"mdlink\" data-href=\"03-model-development/deep-learning.md\" href=\"#\">Deep Learning Essentials<\/a><\/li><li><a class=\"mdlink\" data-href=\"03-model-development/frameworks-in-practice.md\" href=\"#\">PyTorch, TensorFlow &amp; Keras in Practice<\/a><\/li><li><a class=\"mdlink\" data-href=\"09-generative-ai-llms/transformers-and-llms.md\" href=\"#\">Transformers &amp; How LLMs Work<\/a><\/li><li><a class=\"mdlink\" data-href=\"09-generative-ai-llms/fine-tuning.md\" href=\"#\">Fine-Tuning &amp; PEFT<\/a><\/li><\/ol>\n<p><strong>Exit test:<\/strong> sketch a safe fine-tuning loop with mixed precision, gradient accumulation, checkpointing, validation, experiment tracking, and recovery from OOM.<\/p>\n<h3 id=\"block-3-scale-training-across-gpus-2-hours\">Block 3: Scale training across GPUs: 2 hours<\/h3>\n<ol><li><a class=\"mdlink\" data-href=\"03-model-development/training-at-scale.md\" href=\"#\">Training at Scale<\/a><\/li><li><a class=\"mdlink\" data-href=\"08-optimization-scaling/distributed-training.md\" href=\"#\">Distributed Training<\/a><\/li><li><a class=\"mdlink\" data-href=\"08-optimization-scaling/nccl-collectives.md\" href=\"#\">NCCL &amp; Distributed Collectives<\/a><\/li><li><a class=\"mdlink\" data-href=\"12-nvidia-model-optimization/gpu-performance.md\" href=\"#\">GPU Performance &amp; Profiling<\/a><\/li><\/ol>\n<p><strong>Exit test:<\/strong> compare DDP, FSDP/ZeRO, tensor parallelism, and pipeline parallelism. Diagnose a job whose step time doubles when scaling from four to eight GPUs.<\/p>\n<h3 id=\"block-4-llm-inference-bridge-75-minutes\">Block 4: LLM inference bridge: 75 minutes<\/h3>\n<ol><li><a href=\"http://192.168.3.20:9001/#15-llm-serving-internals/prefill-decode-scheduling.md\" target=\"_blank\" rel=\"noopener\">Prefill, Decode &amp; Chunked Scheduling — RAG site<\/a><\/li><li><a href=\"http://192.168.3.20:9001/#15-llm-serving-internals/kv-cache.md\" target=\"_blank\" rel=\"noopener\">KV Cache — RAG site<\/a><\/li><li><a href=\"http://192.168.3.20:9001/#15-llm-serving-internals/vllm-production.md\" target=\"_blank\" rel=\"noopener\">vLLM in Production — RAG site<\/a><\/li><\/ol>\n<h2 id=\"day-2-data-mlops-cloud-and-system-design\">Day 2: Data, MLOps, cloud, and system design<\/h2>\n<h3 id=\"block-5-large-scale-data-pipelines-90-minutes\">Block 5: Large-scale data pipelines: 90 minutes<\/h3>\n<ol><li><a class=\"mdlink\" data-href=\"02-data-pipelines/README.md\" href=\"#\">Data Pipelines overview<\/a><\/li><li><a class=\"mdlink\" data-href=\"02-data-pipelines/spark-hadoop-at-scale.md\" href=\"#\">Spark &amp; Hadoop at Scale<\/a><\/li><li><a class=\"mdlink\" data-href=\"02-data-pipelines/preprocessing-and-quality.md\" href=\"#\">Preprocessing &amp; Data Quality<\/a><\/li><li><a class=\"mdlink\" data-href=\"02-data-pipelines/feature-stores.md\" href=\"#\">Feature Stores<\/a><\/li><\/ol>\n<p><strong>Exit test:<\/strong> debug a Spark feature job with skewed joins, executor OOMs, too many small files, and train/serve skew.<\/p>\n<h3 id=\"block-6-production-mlops-2-hours\">Block 6: Production MLOps: 2 hours<\/h3>\n<ol><li><a class=\"mdlink\" data-href=\"04-experimentation/experiment-tracking.md\" href=\"#\">Experiment Tracking<\/a><\/li><li><a class=\"mdlink\" data-href=\"05-mlops-serving/packaging-and-registry.md\" href=\"#\">Packaging, Registry &amp; Versioning<\/a><\/li><li><a class=\"mdlink\" data-href=\"05-mlops-serving/cicd-for-ml.md\" href=\"#\">CI/CD for ML<\/a><\/li><li><a class=\"mdlink\" data-href=\"06-monitoring-reliability/drift-and-quality.md\" href=\"#\">Drift &amp; Data-Quality Monitoring<\/a><\/li><li><a class=\"mdlink\" data-href=\"06-monitoring-reliability/retraining-loops.md\" href=\"#\">Retraining Loops<\/a><\/li><\/ol>\n<p><strong>Exit test:<\/strong> describe the path from a Git commit and data snapshot to a canary model, automatic rollback, lineage in MLflow, and a controlled retraining trigger.<\/p>\n<h3 id=\"block-7-cloud-and-kubernetes-90-minutes\">Block 7: Cloud and Kubernetes: 90 minutes<\/h3>\n<ol><li><a class=\"mdlink\" data-href=\"07-cloud-infra/cloud-ml-stacks.md\" href=\"#\">AWS / GCP / Azure ML Stacks<\/a><\/li><li><a class=\"mdlink\" data-href=\"07-cloud-infra/containers-k8s.md\" href=\"#\">Containers, Kubernetes &amp; Kubeflow<\/a><\/li><li><a class=\"mdlink\" data-href=\"07-cloud-infra/gpu-kubernetes-operations.md\" href=\"#\">GPU Kubernetes Operations<\/a><\/li><li><a class=\"mdlink\" data-href=\"07-cloud-infra/iac-and-cost.md\" href=\"#\">IaC, GPUs &amp; Cost Control<\/a><\/li><\/ol>\n<h3 id=\"block-8-system-design-and-rapid-fire-2-hours\">Block 8: System design and rapid fire: 2 hours<\/h3>\n<ol><li><a class=\"mdlink\" data-href=\"10-system-design/framework.md\" href=\"#\">ML System Design Framework<\/a><\/li><li><a class=\"mdlink\" data-href=\"10-system-design/worked-ml-platform.md\" href=\"#\">Worked ML Platform<\/a><\/li><li><a class=\"mdlink\" data-href=\"10-system-design/worked-data-loader-library.md\" href=\"#\">Worked Data-Loading Library<\/a><\/li><li><a class=\"mdlink\" data-href=\"11-drill-bank/decision-tradeoffs.md\" href=\"#\">Decision Tradeoffs<\/a><\/li><li><a class=\"mdlink\" data-href=\"11-drill-bank/drill-bank.md\" href=\"#\">Rapid Q&amp;A<\/a><\/li><\/ol>\n<h2 id=\"final-rehearsal-prompt\">Final rehearsal prompt<\/h2>\n<blockquote><p>Design a platform that trains and serves a BERT-class model over a large banking dataset. Cover ingestion, Spark processing, data/version lineage, distributed GPU training, evaluation, registry, Kubernetes deployment, monitoring, rollback, and cost controls.<\/p><\/blockquote>\n<p>Answer in this order: <strong>requirements → data → training → serving → reliability → security → cost → measurement<\/strong>. Make assumptions explicit before naming tools.<\/p>","toc":[{"level":2,"id":"how-to-use-this-path","text":"How to use this path"},{"level":2,"id":"day-1-models-frameworks-and-distributed-training","text":"Day 1: Models, frameworks, and distributed training"},{"level":3,"id":"block-1-ml-judgment-90-minutes","text":"Block 1: ML judgment: 90 minutes"},{"level":3,"id":"block-2-deep-learning-and-framework-fluency-90-minutes","text":"Block 2: Deep learning and framework fluency: 90 minutes"},{"level":3,"id":"block-3-scale-training-across-gpus-2-hours","text":"Block 3: Scale training across GPUs: 2 hours"},{"level":3,"id":"block-4-llm-inference-bridge-75-minutes","text":"Block 4: LLM inference bridge: 75 minutes"},{"level":2,"id":"day-2-data-mlops-cloud-and-system-design","text":"Day 2: Data, MLOps, cloud, and system design"},{"level":3,"id":"block-5-large-scale-data-pipelines-90-minutes","text":"Block 5: Large-scale data pipelines: 90 minutes"},{"level":3,"id":"block-6-production-mlops-2-hours","text":"Block 6: Production MLOps: 2 hours"},{"level":3,"id":"block-7-cloud-and-kubernetes-90-minutes","text":"Block 7: Cloud and Kubernetes: 90 minutes"},{"level":3,"id":"block-8-system-design-and-rapid-fire-2-hours","text":"Block 8: System design and rapid fire: 2 hours"},{"level":2,"id":"final-rehearsal-prompt","text":"Final rehearsal prompt"}],"text":"idfc ml engineer: 2-day path 💡 tl;dr this interview spans ml fundamentals, llm training, gpu/distributed computing, data systems, and production mlops. the fastest preparation strategy is breadth first, then one end-to-end system-design story that connects the layers. how to use this path spend more time explaining trade-offs aloud than rereading definitions. at the end of each block, write a five-line design or debugging answer from memory. links marked rag site reuse the deeper llm-serving lessons instead of duplicating them. day 1: models, frameworks, and distributed training block 1: ml judgment: 90 minutes ml foundations evaluation metrics classical ml validation & data splits exit test: select a model, split strategy, and metric for imbalanced fraud detection with time-dependent labels. name the leakage risks. block 2: deep learning and framework fluency: 90 minutes deep learning essentials pytorch, tensorflow & keras in practice transformers & how llms work fine-tuning & peft exit test: sketch a safe fine-tuning loop with mixed precision, gradient accumulation, checkpointing, validation, experiment tracking, and recovery from oom. block 3: scale training across gpus: 2 hours training at scale distributed training nccl & distributed collectives gpu performance & profiling exit test: compare ddp, fsdp/zero, tensor parallelism, and pipeline parallelism. diagnose a job whose step time doubles when scaling from four to eight gpus. block 4: llm inference bridge: 75 minutes prefill, decode & chunked scheduling — rag site kv cache — rag site vllm in production — rag site day 2: data, mlops, cloud, and system design block 5: large-scale data pipelines: 90 minutes data pipelines overview spark & hadoop at scale preprocessing & data quality feature stores exit test: debug a spark feature job with skewed joins, executor ooms, too many small files, and train/serve skew. block 6: production mlops: 2 hours experiment tracking packaging, registry & versioning ci/cd for ml drift & data-quality monitoring retraining loops exit test: describe the path from a git commit and data snapshot to a canary model, automatic rollback, lineage in mlflow, and a controlled retraining trigger. block 7: cloud and kubernetes: 90 minutes aws / gcp / azure ml stacks containers, kubernetes & kubeflow gpu kubernetes operations iac, gpus & cost control block 8: system design and rapid fire: 2 hours ml system design framework worked ml platform worked data-loading library decision tradeoffs rapid q&a final rehearsal prompt design a platform that trains and serves a bert-class model over a large banking dataset. cover ingestion, spark processing, data/version lineage, distributed gpu training, evaluation, registry, kubernetes deployment, monitoring, rollback, and cost controls. answer in this order: requirements → data → training → serving → reliability → security → cost → measurement . make assumptions explicit before naming tools.","words":445},{"path":"01-ml-foundations/README.md","title":"Overview","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"1-ml-foundations\">1: ML Foundations<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Before the cloud and the MLOps, you need the core ideas an interviewer assumes you already have: how an ML project actually flows, the main <em>kinds<\/em> of learning, why models fail to generalize (bias vs variance), and how you measure \"good.\" Four short pages.<\/div><\/div>\n<h2 id=\"why-start-here\">Why start here<\/h2>\n<p>Everything later — pipelines, serving, monitoring — exists to support a <em>model<\/em>, and you can't reason about serving latency or drift if the modeling basics are shaky. This section is the shared vocabulary. It's also where the \"warm-up\" interview questions come from: <em>\"explain overfitting,\"<\/em> <em>\"when would you use precision over recall,\"<\/em> <em>\"what's the difference between supervised and unsupervised learning.\"<\/em> Getting these crisp buys you credibility for the harder rounds.<\/p>\n<h2 id=\"the-four-pages\">The four pages<\/h2>\n<ul><li><strong>The ML lifecycle<\/strong> — the loop you own end to end, and why \"training the model\" is<\/li><\/ul>\n<p>the small part.<\/p>\n<ul><li><strong>Learning types &amp; algorithms<\/strong> — supervised / unsupervised / reinforcement, and<\/li><\/ul>\n<p>the handful of algorithms worth knowing cold.<\/p>\n<ul><li><strong>Bias, variance &amp; overfitting<\/strong> — the single most important idea in modeling: why<\/li><\/ul>\n<p>models fail on new data, and the knobs that fix it.<\/p>\n<ul><li><strong>Evaluation metrics<\/strong> — accuracy lies; here's what to use instead, per task.<\/li><\/ul>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"ml-lifecycle.md\" href=\"#\">ml-lifecycle.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-start-here","text":"Why start here"},{"level":2,"id":"the-four-pages","text":"The four pages"}],"text":"1: ml foundations 💡 tl;dr before the cloud and the mlops, you need the core ideas an interviewer assumes you already have: how an ml project actually flows, the main kinds of learning, why models fail to generalize (bias vs variance), and how you measure \"good.\" four short pages. why start here everything later — pipelines, serving, monitoring — exists to support a model , and you can't reason about serving latency or drift if the modeling basics are shaky. this section is the shared vocabulary. it's also where the \"warm-up\" interview questions come from: \"explain overfitting,\" \"when would you use precision over recall,\" \"what's the difference between supervised and unsupervised learning.\" getting these crisp buys you credibility for the harder rounds. the four pages the ml lifecycle — the loop you own end to end, and why \"training the model\" is the small part. learning types & algorithms — supervised / unsupervised / reinforcement, and the handful of algorithms worth knowing cold. bias, variance & overfitting — the single most important idea in modeling: why models fail on new data, and the knobs that fix it. evaluation metrics — accuracy lies; here's what to use instead, per task. → start: ml-lifecycle.md","words":202},{"path":"01-ml-foundations/ml-lifecycle.md","title":"The ML Lifecycle","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"the-ml-lifecycle\">The ML Lifecycle<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> An ML project is a loop, not a line: you frame the problem, get and clean data, engineer features, train and evaluate, deploy, then monitor and retrain as the world changes. Most of the real work — and most of the failures — happen <em>around<\/em> the model, not in it.<\/div><\/div>\n<h2 id=\"the-stages\">The stages<\/h2>\n<p>Think of it as a pipeline you'll be asked to reason about end to end:<\/p>\n<div class=\"diagram\">\n  <div class=\"loopwrap\">\n    <div class=\"flow\">\n      <span class=\"node\"><span class=\"nsub\">1<\/span>Problem framing<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\"><span class=\"nsub\">2<\/span>Data collection<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\"><span class=\"nsub\">3<\/span>Preprocessing &amp; features<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\"><span class=\"nsub\">4<\/span>Model training<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\"><span class=\"nsub\">5<\/span>Evaluation<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\"><span class=\"nsub\">6<\/span>Deployment<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node out\"><span class=\"nsub\">7<\/span>Monitoring<\/span>\n    <\/div>\n    <span class=\"loop-back\"><span class=\"lb-arw\"><\/span> monitoring loops back to <b>preprocessing / training<\/b> as the world drifts<\/span>\n  <\/div>\n<\/div>\n<p><strong>Problem framing<\/strong> is deciding what you're actually predicting and how success is measured <em>in business terms<\/em>. \"Reduce churn\" becomes \"predict which users will cancel next month, ranked, so we can target the top 5%.\" Getting this wrong makes everything downstream pointless, which is why interviewers love to start here.<\/p>\n<p><strong>Data and preprocessing<\/strong> (sections 2) is where most time goes — collecting, cleaning, and shaping raw data into features. The saying \"garbage in, garbage out\" is the whole reason data engineering is half of this job.<\/p>\n<p><strong>Training and evaluation<\/strong> (sections 3–4) is the part people picture when they hear \"ML,\" but it's often the <em>fastest<\/em> stage. You fit a model and measure whether it generalizes.<\/p>\n<p><strong>Deployment and monitoring<\/strong> (sections 5–6) is where ML <em>Engineering<\/em> earns its name. A model that isn't served, watched, and retrained is a science project, not a product.<\/p>\n<h2 id=\"why-its-a-loop-matters\">Why \"it's a loop\" matters<\/h2>\n<p>The world drifts — user behavior changes, new products launch, a data source changes format — so a model that was accurate at launch slowly decays. That's why the last arrow loops back: monitoring detects the decay, and you retrain on fresh data. Saying \"the lifecycle is a loop because of drift\" signals you think past the demo.<\/p>\n<h2 id=\"the-interview-angle\">The interview angle<\/h2>\n<p>A common opener is <em>\"walk me through how you'd build and ship an ML system.\"<\/em> The lifecycle <em>is<\/em> your answer skeleton: frame → data → features → train → evaluate → deploy → monitor → retrain. Hang specifics off each stage and you've structured a strong 10-minute answer without rambling.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Naming a tool for each stage is what turns \"I know the lifecycle\" into \"I've run one.\" A common cloud stack:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Typical tools<\/th><\/tr><\/thead><tbody><tr><td>Data &amp; features<\/td><td>Spark / dbt, Airflow, a feature store (Feast)<\/td><\/tr><tr><td>Train<\/td><td>scikit-learn, XGBoost, PyTorch — on SageMaker / Vertex / Databricks<\/td><\/tr><tr><td>Track experiments<\/td><td>MLflow, Weights &amp; Biases<\/td><\/tr><tr><td>Deploy<\/td><td>Docker + KServe / Triton, or a managed endpoint<\/td><\/tr><tr><td>Monitor<\/td><td>Evidently / Arize + Prometheus / Grafana<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How you'd say it:<\/strong> <em>\"The loop is the same everywhere — in a CV system it was DeepStream to ingest, PyTorch/TensorRT for the model, MLflow to track runs, and Prometheus/Grafana to watch it in production; the tools change, the lifecycle doesn't.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Which stage usually takes the most time, and why? *(data collection and<\/li><\/ul>\n<p>preprocessing — quality of data caps model quality.)*<\/p>\n<ul><li>What makes it a loop rather than a line? *(drift — the world changes, so models<\/li><\/ul>\n<p>decay and need retraining.)*<\/p>\n<ul><li>Where does \"ML Engineer\" differ from \"data scientist\" in this loop? *(the deploy →<\/li><\/ul>\n<p>monitor → retrain half — shipping and keeping models alive.)*<\/p>","toc":[{"level":2,"id":"the-stages","text":"The stages"},{"level":2,"id":"why-its-a-loop-matters","text":"Why \"it's a loop\" matters"},{"level":2,"id":"the-interview-angle","text":"The interview angle"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"the ml lifecycle 💡 tl;dr an ml project is a loop, not a line: you frame the problem, get and clean data, engineer features, train and evaluate, deploy, then monitor and retrain as the world changes. most of the real work — and most of the failures — happen around the model, not in it. the stages think of it as a pipeline you'll be asked to reason about end to end: 1 problem framing 2 data collection 3 preprocessing & features 4 model training 5 evaluation 6 deployment 7 monitoring monitoring loops back to preprocessing / training as the world drifts problem framing is deciding what you're actually predicting and how success is measured in business terms . \"reduce churn\" becomes \"predict which users will cancel next month, ranked, so we can target the top 5%.\" getting this wrong makes everything downstream pointless, which is why interviewers love to start here. data and preprocessing (sections 2) is where most time goes — collecting, cleaning, and shaping raw data into features. the saying \"garbage in, garbage out\" is the whole reason data engineering is half of this job. training and evaluation (sections 3–4) is the part people picture when they hear \"ml,\" but it's often the fastest stage. you fit a model and measure whether it generalizes. deployment and monitoring (sections 5–6) is where ml engineering earns its name. a model that isn't served, watched, and retrained is a science project, not a product. why \"it's a loop\" matters the world drifts — user behavior changes, new products launch, a data source changes format — so a model that was accurate at launch slowly decays. that's why the last arrow loops back: monitoring detects the decay, and you retrain on fresh data. saying \"the lifecycle is a loop because of drift\" signals you think past the demo. the interview angle a common opener is \"walk me through how you'd build and ship an ml system.\" the lifecycle is your answer skeleton: frame → data → features → train → evaluate → deploy → monitor → retrain. hang specifics off each stage and you've structured a strong 10-minute answer without rambling. 🔗 connecting the dots: the real stack naming a tool for each stage is what turns \"i know the lifecycle\" into \"i've run one.\" a common cloud stack: stage typical tools data & features spark / dbt, airflow, a feature store (feast) train scikit-learn, xgboost, pytorch — on sagemaker / vertex / databricks track experiments mlflow, weights & biases deploy docker + kserve / triton, or a managed endpoint monitor evidently / arize + prometheus / grafana how you'd say it: \"the loop is the same everywhere — in a cv system it was deepstream to ingest, pytorch/tensorrt for the model, mlflow to track runs, and prometheus/grafana to watch it in production; the tools change, the lifecycle doesn't.\" self-check which stage usually takes the most time, and why? *(data collection and preprocessing — quality of data caps model quality.)* what makes it a loop rather than a line? *(drift — the world changes, so models decay and need retraining.)* where does \"ml engineer\" differ from \"data scientist\" in this loop? *(the deploy → monitor → retrain half — shipping and keeping models alive.)*","words":543},{"path":"01-ml-foundations/learning-types.md","title":"Learning Types & Algorithms","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"learning-types-algorithms\">Learning Types &amp; Algorithms<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Three families — <strong>supervised<\/strong> (learn from labeled examples), <strong>unsupervised<\/strong> (find structure in unlabeled data), and <strong>reinforcement<\/strong> (learn from reward). Know which real problems fall into each, plus a short list of go-to algorithms and when to reach for them.<\/div><\/div>\n<h2 id=\"supervised-learning\">Supervised learning<\/h2>\n<p>You have inputs <em>and<\/em> the correct answers (labels), and the model learns to map one to the other. It splits into two tasks: <strong>classification<\/strong> predicts a category (spam or not, which of 10 classes), and <strong>regression<\/strong> predicts a number (price, demand, temperature). This is the bulk of applied ML because most business problems come with historical labeled outcomes — past purchases, past churn, past fraud.<\/p>\n<h2 id=\"unsupervised-learning\">Unsupervised learning<\/h2>\n<p>No labels — you're looking for structure the data already has. <strong>Clustering<\/strong> groups similar items (customer segments, anomaly-free vs anomalous behavior); <strong>dimensionality reduction<\/strong> (PCA, embeddings) compresses many features into a few while keeping the signal, useful for visualization and as input to other models. You reach for this when you don't have labels, or to <em>explore<\/em> data before modeling.<\/p>\n<h2 id=\"reinforcement-learning\">Reinforcement learning<\/h2>\n<p>An agent takes actions in an environment and learns from a <strong>reward<\/strong> signal — think game-playing, robotics, or ad/recommendation policies that optimize long-term engagement. It's powerful but data-hungry and finicky, so in most product ML jobs it's a \"know the concept\" topic rather than a daily tool. Note that <strong>RLHF<\/strong> (reinforcement learning from human feedback) is how LLMs are aligned (section 9), so it's worth recognizing.<\/p>\n<h2 id=\"the-algorithms-worth-knowing-cold\">The algorithms worth knowing cold<\/h2>\n<p>You don't need dozens — you need to defend a few and know their trade-offs:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Algorithm<\/th><th>Use it for<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td><strong>Linear / Logistic regression<\/strong><\/td><td>baselines, interpretable problems<\/td><td>fast, explainable — always start here<\/td><\/tr><tr><td><strong>Decision trees<\/strong><\/td><td>simple non-linear splits<\/td><td>interpretable but overfit alone<\/td><\/tr><tr><td><strong>Random Forest<\/strong><\/td><td>tabular, robust default<\/td><td>bagging → low variance, little tuning<\/td><\/tr><tr><td><strong>Gradient boosting (XGBoost/LightGBM)<\/strong><\/td><td>tabular winner<\/td><td>usually best on structured data<\/td><\/tr><tr><td><strong>k-Means<\/strong><\/td><td>clustering<\/td><td>simple, fast segmentation<\/td><\/tr><tr><td><strong>Neural networks<\/strong><\/td><td>images, text, audio, huge data<\/td><td>learn features; overkill for small tabular<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-one-line-interviewers-want\">The one line interviewers want<\/h2>\n<p><em>\"For structured/tabular data I start with a boosted-tree model like XGBoost — it's the strongest default. I only reach for deep learning when I have unstructured data (images, text) or very large datasets where learned features beat hand-crafted ones.\"<\/em> That single sentence signals real-world judgment over hype.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Each family has a go-to library: <strong>scikit-learn<\/strong> for classical models, <strong>XGBoost / LightGBM<\/strong> for boosting, <strong>PyTorch<\/strong> and <strong>TensorFlow/Keras<\/strong> for deep learning, and <strong>HuggingFace<\/strong> for pretrained text/vision models. Reinforcement learning uses <strong>RLlib<\/strong> or <strong>Stable-Baselines3<\/strong>; RLHF for LLMs uses <strong>TRL<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For tabular I reach for XGBoost via scikit-learn; for anything unstructured I start from a pretrained PyTorch model on HuggingFace and fine-tune.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Classification vs regression? <em>(predict a category vs a number.)<\/em><\/li><li>No labels — which family, and give one technique? <em>(unsupervised; clustering or PCA.)<\/em><\/li><li>Best default for tabular data, and when do you switch to neural nets? *(gradient<\/li><\/ul>\n<p>boosting; switch for unstructured data or very large scale.)*<\/p>","toc":[{"level":2,"id":"supervised-learning","text":"Supervised learning"},{"level":2,"id":"unsupervised-learning","text":"Unsupervised learning"},{"level":2,"id":"reinforcement-learning","text":"Reinforcement learning"},{"level":2,"id":"the-algorithms-worth-knowing-cold","text":"The algorithms worth knowing cold"},{"level":2,"id":"the-one-line-interviewers-want","text":"The one line interviewers want"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"learning types & algorithms 💡 tl;dr three families — supervised (learn from labeled examples), unsupervised (find structure in unlabeled data), and reinforcement (learn from reward). know which real problems fall into each, plus a short list of go-to algorithms and when to reach for them. supervised learning you have inputs and the correct answers (labels), and the model learns to map one to the other. it splits into two tasks: classification predicts a category (spam or not, which of 10 classes), and regression predicts a number (price, demand, temperature). this is the bulk of applied ml because most business problems come with historical labeled outcomes — past purchases, past churn, past fraud. unsupervised learning no labels — you're looking for structure the data already has. clustering groups similar items (customer segments, anomaly-free vs anomalous behavior); dimensionality reduction (pca, embeddin

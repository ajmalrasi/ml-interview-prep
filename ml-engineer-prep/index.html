<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3b82f6">
<title>AI / ML Engineer — Interview Prep</title>
<style>
  :root{
    --bg:#faf9f5; --bg-soft:#f1efe7; --bg-side:#f6f4ee; --text:#23211c;
    --muted:#6b6557; --border:#e4e0d5; --accent:#c45f3c; --accent-2:#d97757;
    --accent-soft:#f6e7df; --code-bg:#f1efe7; --code-text:#5a4636; --quote:#5c5547;
    --tok-comment:#9b9482; --tok-string:#5f8a3f; --tok-keyword:#c45f3c; --tok-builtin:#15807f;
    --tok-number:#a9762a; --tok-decorator:#8b6dff; --tok-command:#15807f; --tok-flag:#a9762a; --tok-variable:#8b6dff;
    --link:#b9532f; --header-bg:rgba(250,249,245,.85);
    --shadow:0 1px 2px rgba(60,50,30,.05),0 6px 20px rgba(60,50,30,.06);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#1f1e1b; --bg-soft:#2a2824; --bg-side:#1a1916; --text:#ece8df;
    --muted:#a39c8c; --border:#34322c; --accent:#e08763; --accent-2:#d97757;
    --accent-soft:#3a2b22; --code-bg:#2a2824; --code-text:#d8cfbf; --quote:#b3aa98;
    --tok-comment:#8f8a78; --tok-string:#a7c46e; --tok-keyword:#e7926b; --tok-builtin:#5cc4c4;
    --tok-number:#d6a45a; --tok-decorator:#a78bff; --tok-command:#5cc4c4; --tok-flag:#d6a45a; --tok-variable:#a78bff;
    --link:#ec9170; --header-bg:rgba(31,30,27,.85);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.7 ui-serif,Georgia,"Iowan Old Style","Palatino Linotype",serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .brand,.tools,nav,.topbar,.pager .lbl,.sec-h,.banner,.pagetools,.toc,.searchpanel{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:300px minmax(0,1fr); min-height:100vh; min-height:100dvh}

  /* sidebar */
  .sidebar{background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; height:100dvh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom)}
  .brand{padding:20px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2}
  .brand h1{font-size:15px; margin:0 0 3px; letter-spacing:.2px; font-weight:700}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:14px}
  .tools input{flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:14px; outline:none}
  .tools input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .iconbtn{background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; min-width:40px; height:40px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:none}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent)}
  a.jbtn{display:block; margin-top:10px; text-align:center; text-decoration:none;
    background:var(--accent); color:#fff; border-radius:10px; padding:9px 12px;
    font-size:13px; font-weight:700; letter-spacing:.2px}
  a.jbtn:hover{filter:brightness(1.08); text-decoration:none}
  nav{padding:10px 10px calc(60px + env(safe-area-inset-bottom))}
  .sec{margin:2px 0}
  .sec>.sec-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    padding:14px 12px 5px; font-weight:700}
  nav a.item{display:block; padding:8px 12px; border-radius:9px; color:var(--text);
    font-size:13.5px; margin:1px 0; line-height:1.35}
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:16px}
  .hidden{display:none !important}

  /* main */
  .main{min-width:0; overflow-x:hidden}
  .topbar{display:none; align-items:center; gap:10px;
    padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
    background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px); -webkit-backdrop-filter:saturate(140%) blur(10px)}
  .topbar .tb-title{flex:1; min-width:0; font-weight:700; font-size:15px; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .content-wrap{max-width:760px; margin:0 auto;
    padding:40px max(32px,env(safe-area-inset-left)) 90px max(32px,env(safe-area-inset-right))}

  /* page tools (outline + quiz) */
  .pagetools{margin:0 0 8px}
  .toc{border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-soft); margin:0 0 22px}
  .toc>summary{cursor:pointer; padding:11px 15px; font-size:13px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; list-style:none}
  .toc>summary::-webkit-details-marker{display:none}
  .toc>summary::after{content:"▾"; float:right; color:var(--accent)}
  .toc[open]>summary::after{content:"▴"}
  .toc ul{list-style:none; margin:0 0 8px; padding:0 8px 4px}
  .toc li{margin:0}
  .toc a{display:block; padding:5px 10px; border-radius:7px; font-size:13.5px; color:var(--text)}
  .toc a:hover{background:var(--bg); text-decoration:none}
  .toc a.lvl3{padding-left:24px; font-size:13px; color:var(--muted)}
  .quizbar{display:flex; gap:8px; align-items:center; margin:0 0 18px; flex-wrap:wrap}
  .quizbar .qbtn{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);
    border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer}
  .quizbar .qbtn:hover{background:var(--accent); color:#fff}
  .quizbar .hint{font-size:12.5px; color:var(--muted)}

  article{font-size:clamp(15.5px,1.4vw,17px)}
  article h1{font-size:clamp(27px,5vw,34px); line-height:1.18; margin:.1em 0 .5em; letter-spacing:-.6px; font-weight:800; color:var(--text)}
  @supports ((-webkit-background-clip:text) or (background-clip:text)){
    article h1{background:linear-gradient(90deg,var(--sec-accent,var(--accent)),var(--text) 75%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent}
  }
  article h2{font-size:clamp(20px,3.4vw,23px); margin:1.7em 0 .5em; padding-bottom:.28em;
    border-bottom:2px solid var(--sec-accent,var(--accent)); font-weight:700; display:inline-block}
  article h3{font-size:clamp(16.5px,2.4vw,18px); margin:1.5em 0 .4em; font-weight:700}
  article p{margin:.75em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.45em}
  article li{margin:.3em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article strong{font-weight:700}
  article code{background:var(--code-bg); color:var(--code-text); padding:.13em .42em;
    border-radius:6px; font:.85em/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; word-break:break-word}
  article pre{background:var(--code-bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.1em 0}
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre; word-break:normal}
  article pre .tok-comment{color:var(--tok-comment); font-style:italic}
  article pre .tok-string{color:var(--tok-string)}
  article pre .tok-keyword{color:var(--tok-keyword); font-weight:600}
  article pre .tok-builtin{color:var(--tok-builtin)}
  article pre .tok-number{color:var(--tok-number)}
  article pre .tok-decorator{color:var(--tok-decorator)}
  article pre .tok-command{color:var(--tok-command); font-weight:600}
  article pre .tok-flag{color:var(--tok-flag)}
  article pre .tok-variable{color:var(--tok-variable)}
  article blockquote{margin:1.1em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 10px 10px 0}
  article blockquote p{margin:.3em 0}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.2em 0; border-radius:var(--radius)}
  article table{border-collapse:collapse; width:100%; font-size:14px}
  article th,article td{border:1px solid var(--border); padding:9px 12px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:700; white-space:nowrap}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:2em 0}
  article h1,article h2,article h3{scroll-margin-top:76px}

  /* Q&A collapsibles */
  details.qa{border:1px solid var(--border); border-radius:var(--radius); margin:.7em 0; background:var(--bg); box-shadow:var(--shadow)}
  details.qa>summary{cursor:pointer; padding:13px 16px; font-weight:700; list-style:none; color:var(--text)}
  details.qa>summary::-webkit-details-marker{display:none}
  details.qa>summary::before{content:"▸"; color:var(--accent); margin-right:9px; display:inline-block}
  details.qa[open]>summary::before{content:"▾"}
  details.qa .qa-body{padding:0 16px 4px; border-top:1px solid var(--border); margin-top:2px}
  details.qa .qa-body>*:first-child{margin-top:12px}

  .pager{display:flex; gap:14px; margin:52px 0 0; padding-top:24px; border-top:1px solid var(--border)}
  .pager a{flex:1; min-width:0; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg)}
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:4px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  /* section-tinted links */
  article a:not(.mdlink):not(.seccard){color:var(--sec-accent,var(--link))}
  article a.mdlink{color:var(--sec-accent,var(--link)); font-weight:600}
  nav .sec-h{display:flex; align-items:center; gap:7px}
  nav .sec-ic{font-size:14px; filter:saturate(1.1)}
  nav a.item.active{background:color-mix(in srgb,var(--card,var(--accent)) 16%,transparent); color:var(--card,var(--accent))}

  /* TL;DR / insight callout */
  .callout{display:flex; gap:13px; align-items:flex-start; background:var(--sec-accent-soft,var(--accent-soft));
    border:1px solid var(--sec-accent,var(--accent)); border-radius:14px; padding:14px 16px; margin:1.2em 0}
  .callout .cic{font-size:22px; line-height:1.2; flex:none}
  /* tint background is translucent (theme-proof), so use theme-aware softer text */
  .callout .cbody{font-size:.98em; color:var(--quote)}
  .callout .cbody code{background:var(--code-bg); color:var(--code-text)}
  .callout .clead{display:inline-block; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-weight:800; font-size:11px; letter-spacing:.8px; text-transform:uppercase;
    color:var(--sec-accent,var(--accent)); margin-right:6px}

  /* diagrams */
  figure.diagram{margin:1.5em 0; background:var(--bg-soft); border:1px solid var(--border);
    border-radius:18px; padding:18px 18px 12px; box-shadow:var(--shadow)}
  figure.diagram svg{width:100%; height:auto; display:block}
  figure.diagram figcaption{font-size:12.5px; color:var(--muted); text-align:center; margin-top:10px}
  .dg-box{fill:var(--bg); stroke:var(--border); stroke-width:1.5}
  .dg-hot{fill:var(--sec-accent-soft,var(--accent-soft)); stroke:var(--sec-accent,var(--accent)); stroke-width:2}
  .dg-soft{fill:var(--bg-soft); stroke:var(--border); stroke-width:1.5; stroke-dasharray:4 3}
  .dg-line{stroke:var(--muted); stroke-width:2; fill:none}
  .dg-arrow{fill:var(--muted)}
  .dg-label{fill:var(--text); font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-sub{fill:var(--muted); font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-accent{fill:var(--sec-accent,var(--accent))}
  .dg-accent-tx{fill:var(--sec-accent,var(--accent)); font:700 13px -apple-system,sans-serif}
  .dg-white-tx{fill:#fff; font:600 12px -apple-system,sans-serif}
  .dg-accent-soft{fill:var(--sec-accent-soft,var(--accent-soft))}
  .dg-strokeA{stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
  .dg-strokeB{stroke:var(--muted); stroke-width:2.5; stroke-dasharray:5 4}
  .dg-fill1{fill:#0e8f8f}.dg-fill2{fill:#7c5cff}.dg-fill3{fill:#c98a00}.dg-fill4{fill:var(--sec-accent,var(--accent))}

  /* home hero + section cards */
  .hero{background:linear-gradient(135deg,var(--accent-soft),var(--bg-soft)); border:1px solid var(--border);
    border-radius:20px; padding:30px 26px; margin:0 0 10px; box-shadow:var(--shadow)}
  .hero-badge{display:inline-block; font-family:-apple-system,sans-serif; font-size:11.5px; font-weight:700;
    letter-spacing:.6px; text-transform:uppercase; color:var(--accent); background:var(--bg);
    border:1px solid var(--accent); border-radius:999px; padding:5px 12px}
  .hero-title{font-size:clamp(30px,6vw,44px); font-weight:800; letter-spacing:-1px; margin:14px 0 6px; line-height:1.05}
  .hero-sub{margin:0; color:var(--quote); font-size:clamp(15px,1.6vw,17px); max-width:48ch}
  .section-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:14px; margin:.6em 0 1.6em}
  a.seccard{display:flex; flex-direction:column; gap:5px; padding:16px; border-radius:16px;
    border:1px solid var(--border); background:var(--bg); box-shadow:var(--shadow); text-decoration:none;
    border-top:3px solid var(--card); transition:transform .12s ease, box-shadow .12s ease}
  a.seccard:hover{transform:translateY(-3px); box-shadow:0 10px 26px rgba(60,50,30,.13); text-decoration:none}
  a.seccard .sc-ic{font-size:24px}
  a.seccard .sc-lbl{font-family:-apple-system,sans-serif; font-weight:700; font-size:14.5px; color:var(--card)}
  a.seccard .sc-tag{font-size:12.5px; color:var(--muted); line-height:1.45}

  /* search overlay */
  .searchpanel{display:none; position:fixed; z-index:70; left:50%; top:70px; transform:translateX(-50%);
    width:min(640px,92vw); max-height:70vh; overflow-y:auto; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.25); padding:8px}
  .searchpanel.show{display:block}
  .searchpanel .sr{display:block; padding:11px 14px; border-radius:10px; color:var(--text)}
  .searchpanel .sr:hover,.searchpanel .sr.sel{background:var(--accent-soft); text-decoration:none}
  .searchpanel .sr .t{font-weight:600; font-size:14px}
  .searchpanel .sr .c{font-size:12.5px; color:var(--muted); margin-top:2px; font-family:inherit}
  .searchpanel .sr .c mark{background:var(--accent-soft); color:var(--accent); padding:0 2px; border-radius:3px}
  .searchpanel .empty{padding:18px 14px; color:var(--muted); font-size:14px}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:min(86vw,330px); top:0; bottom:0; height:auto;
      transform:translateX(-100%); transition:transform .24s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow)}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(20,16,10,.45); z-index:50}
    .content-wrap{padding:20px 18px calc(80px + env(safe-area-inset-bottom))}
    .pager{flex-direction:column}
    .pager .next{text-align:left}
    .pager .spacer{display:none}
    nav a.item{padding:11px 14px; font-size:15px}
    nav a.item.sub{padding-left:18px}
    .searchpanel{top:60px}
  }
  @media (max-width:380px){ .topbar .tb-title{font-size:14px} }

/* ---------------- Precision vs Recall interactive widget ---------------- */
.prw{margin:20px 0}
.prw-wrap{display:flex; gap:18px; flex-wrap:wrap; align-items:stretch;
  background:var(--bg-soft); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; box-shadow:var(--shadow)}
.prw-main{flex:1 1 380px; min-width:300px; display:flex; flex-direction:column}
.prw-side{flex:0 1 240px; min-width:220px; display:flex; flex-direction:column; gap:14px}
.prw-svg{width:100%; height:auto; overflow:visible}
.prw-dot{opacity:.85}
.prw-pos{fill:#2f9e6f}
.prw-neg{fill:var(--muted); opacity:.5}
.prw-axis{stroke:var(--border); stroke-width:1.5}
.prw-ticks text,.prw-axlbl{fill:var(--muted); font-size:12px; font-family:inherit}
.prw-shade{fill:rgba(47,158,111,.12)}
.prw-thline{stroke:var(--accent); stroke-width:2; stroke-dasharray:5 4}
.prw-thlbl{fill:var(--accent); font-size:12px; font-weight:700; font-family:inherit}
.prw-controls{margin-top:10px}
.prw-slabel{display:block; font-size:13px; color:var(--muted); margin-bottom:4px}
.prw-slabel b{color:var(--accent)}
#prw-slider{width:100%; accent-color:var(--accent); cursor:pointer}
.prw-legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:var(--muted)}
.prw-legend i{display:inline-block; width:12px; height:12px; border-radius:3px; vertical-align:-1px; margin-right:5px}
.prw-lg-pos{background:#2f9e6f}
.prw-lg-neg{background:var(--muted); opacity:.5}
.prw-lg-shade{background:rgba(47,158,111,.25); border:1px dashed var(--accent)}
.prw-metrics{display:flex; gap:10px}
.prw-metric{flex:1; text-align:center; padding:10px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.prw-mlab{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted)}
.prw-mval{display:block; font-size:24px; font-weight:800; margin-top:2px; line-height:1}
.prw-mp .prw-mval{color:#3b82f6}
.prw-mr .prw-mval{color:#e0663f}
.prw-mf .prw-mval{color:#9a5cd0}
.prw-cm{border-collapse:collapse; width:100%; font-size:13px}
.prw-cm td{border:1px solid var(--border); padding:8px; text-align:center; font-weight:700}
.prw-cm .prw-cm-h{background:var(--bg-soft); color:var(--muted); font-weight:600; font-size:12px}
.prw-tp{background:rgba(47,158,111,.16); color:#2f9e6f}
.prw-tn{background:rgba(47,158,111,.16); color:#2f9e6f}
.prw-fp{background:rgba(224,102,63,.16); color:#e0663f}
.prw-fn{background:rgba(224,102,63,.16); color:#e0663f}
.prw-pr{width:100%; height:auto}
.prw-curve{fill:none; stroke:var(--accent); stroke-width:2}
.prw-prdot{fill:#fff; stroke:var(--accent); stroke-width:3}
@media (max-width:640px){ .prw-side{flex-basis:100%} }

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>AI / ML Engineer Prep</h1>
      <div class="sub">ML on the cloud · MLOps · Data pipelines · GenAI</div>
      <div class="tools">
        <input id="search" type="search" placeholder="Search all pages…" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="iconbtn theme-toggle" title="Toggle light / dark">◐</button>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="iconbtn" id="menu" aria-label="Open menu">☰</button>
      <span class="tb-title" id="tbTitle">ML Eng Prep</span>
      <button class="iconbtn" id="searchBtn" aria-label="Search">🔍</button>
      <button class="iconbtn theme-toggle" aria-label="Toggle theme">◐</button>
    </div>
    <div class="content-wrap">
      <div id="pagetools"></div>
      <article id="content"></article>
      <div class="pager" id="pager"></div>
    </div>
  </main>
</div>
<div class="scrim" id="scrim"></div>

<script>

:"LLMOps & Evaluation"}]},{"label":"10 · ML System Design","icon":"🏗️","accent":"#34ad7c","items":[{"path":"10-system-design/README.md","title":"Overview"},{"path":"10-system-design/framework.md","title":"A Design Framework"},{"path":"10-system-design/worked-recommender.md","title":"Worked Example: Recommender"},{"path":"10-system-design/worked-ml-platform.md","title":"Worked Example: ML Platform"},{"path":"10-system-design/worked-perception-platform.md","title":"Worked Example: Hybrid Perception Platform"},{"path":"10-system-design/worked-data-loader-library.md","title":"Worked Example: Data-Loading Library"}]},{"label":"11 · Drill Bank","icon":"🎯","accent":"#cc5fab","items":[{"path":"11-drill-bank/README.md","title":"Overview"},{"path":"11-drill-bank/drill-bank.md","title":"Rapid Q&A"},{"path":"11-drill-bank/decision-tradeoffs.md","title":"Decision Tradeoffs — Why X over Y"},{"path":"11-drill-bank/cheat-sheet.md","title":"One-Page Cheat Sheet"}]},{"label":"12 · NVIDIA Model Optimization","icon":"🟩","accent":"#76b900","items":[{"path":"12-nvidia-model-optimization/README.md","title":"Overview"},{"path":"12-nvidia-model-optimization/quantization-deep.md","title":"Quantization, Deeply"},{"path":"12-nvidia-model-optimization/numerical-precision.md","title":"Numerical Precision (FP32→FP8→INT8)"},{"path":"12-nvidia-model-optimization/tensorrt-internals.md","title":"TensorRT Internals"},{"path":"12-nvidia-model-optimization/gpu-performance.md","title":"GPU Performance & Profiling"},{"path":"12-nvidia-model-optimization/sparsity-pruning-distillation.md","title":"Sparsity, Pruning & Distillation"},{"path":"12-nvidia-model-optimization/llm-inference.md","title":"LLM Inference Optimization"},{"path":"12-nvidia-model-optimization/experiment-walkthrough.md","title":"Experiment Walkthrough (Your Project)"},{"path":"12-nvidia-model-optimization/interview-qa.md","title":"Interview Q&A — Rapid Fire"}]},{"label":"13 · LLM & VLM Optimization","icon":"🖼️","accent":"#2aa7cf","items":[{"path":"13-llm-vlm-optimization/README.md","title":"Overview"},{"path":"13-llm-vlm-optimization/cnn-to-llm.md","title":"CNN → LLM/VLM: What Transfers"},{"path":"13-llm-vlm-optimization/llm-quantization.md","title":"LLM Quantization"},{"path":"13-llm-vlm-optimization/llm-opt-in-practice.md","title":"The Loop in Practice"},{"path":"13-llm-vlm-optimization/vlm-optimization.md","title":"VLM Optimization"},{"path":"13-llm-vlm-optimization/experiment-redo.md","title":"Experiment Redo (Your Project as LLM/VLM)"},{"path":"13-llm-vlm-optimization/interview-qa.md","title":"Interview Q&A — LLM & VLM"}]}],"pages":[{"path":"README.md","title":"Overview & How to Use","section":"Start here","quiz":false,"accent":"#3b82f6","html":"<div class=\"hero\"><span class=\"hero-badge\">AI / ML Engineer<\/span><div class=\"hero-title\">ML on the Cloud — Interview Prep<\/div><p class=\"hero-sub\">The whole ML lifecycle: data pipelines, model development, experimentation, and deploying &amp; monitoring models in production with MLOps — plus cloud infra, optimization, and generative AI. Eleven chapters and a drill bank.<\/p><\/div><h1 id=\"ai-ml-engineer-interview-prep\">AI / ML Engineer — Interview Prep<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This pack covers the whole job: taking a machine-learning idea from raw data all the way to a model running, and being <em>watched<\/em>, in production on the cloud. The through-line is the <strong>ML lifecycle<\/strong> — data → model → deploy → monitor → improve — and every section is one stage of it.<\/div><\/div>\n<h2 id=\"what-this-role-actually-is\">What this role actually is<\/h2>\n<p>An ML Engineer sits between a data scientist and a backend engineer. You're expected to <em>build models<\/em> <strong>and<\/strong> <em>ship them<\/em> — the data pipeline that feeds them, the training that produces them, the service that serves them, and the monitoring that keeps them honest once real traffic hits. The job description's seven bullets map cleanly onto the sections here:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>JD responsibility<\/th><th>Where it's covered<\/th><\/tr><\/thead><tbody><tr><td>Model development (ML &amp; deep learning)<\/td><td>§1 Foundations, §3 Model Development<\/td><\/tr><tr><td>Data pipeline engineering<\/td><td>§2 Data Pipelines<\/td><\/tr><tr><td>Experimentation &amp; statistical analysis<\/td><td>§4 Experimentation<\/td><\/tr><tr><td>Deployment / MLOps<\/td><td>§5 MLOps &amp; Serving<\/td><\/tr><tr><td>Monitoring in production<\/td><td>§6 Monitoring &amp; Reliability<\/td><\/tr><tr><td>Optimization for speed/scale<\/td><td>§7 Cloud &amp; Infra, §8 Optimization<\/td><\/tr><tr><td>Innovation / Generative AI<\/td><td>§9 Generative AI &amp; LLMs<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Two more sections round it out: <strong>§10 ML System Design<\/strong> (the open-ended \"design a recommender\" whiteboard round) and <strong>§11 Drill Bank<\/strong> (rapid Q&amp;A for the last mile).<\/p>\n<h2 id=\"how-each-page-is-written\">How each page is written<\/h2>\n<p>Short and clear, not keyword-terse and not an essay. Every page opens with a one-line <strong>TL;DR<\/strong>, explains each idea in a few plain sentences (what it is, <em>why<\/em> it matters, how it connects), uses a small table or diagram when that's clearer than prose, and ends with a couple of quick self-check questions. You should be able to read a page in a few minutes and actually <em>understand<\/em> it, not just recognize the words.<\/p>\n<h2 id=\"the-lifecycle-in-one-picture\">The lifecycle, in one picture<\/h2>\n<pre><code>        ┌─────────── the loop you own end-to-end ───────────┐\n raw data → PIPELINE → TRAIN → EVALUATE → DEPLOY → MONITOR → (retrain)\n   §2        §2        §3        §4        §5        §6         §6\n                       ▲                                        │\n                       └──────────── drift / new data ──────────┘\n   cross-cutting: §7 cloud &amp; infra · §8 optimization · §9 GenAI · §10 design<\/code><\/pre>\n<h2 id=\"suggested-order\">Suggested order<\/h2>\n<p>Go top to bottom the first time — the sections are sequenced along the lifecycle, so each builds on the last. If you want the highest-leverage interview topics first, prioritize <strong>§5 MLOps<\/strong>, <strong>§6 Monitoring<\/strong>, and <strong>§10 System Design<\/strong>, because those are where \"ML Engineer\" is tested more than \"data scientist.\" Skim <strong>§9 Generative AI<\/strong> even if the role isn't LLM-heavy — every team asks about it now.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"01-ml-foundations/README.md\" href=\"#\">01-ml-foundations/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-this-role-actually-is","text":"What this role actually is"},{"level":2,"id":"how-each-page-is-written","text":"How each page is written"},{"level":2,"id":"the-lifecycle-in-one-picture","text":"The lifecycle, in one picture"},{"level":2,"id":"suggested-order","text":"Suggested order"}],"text":"ai / ml engineer ml on the cloud — interview prep the whole ml lifecycle: data pipelines, model development, experimentation, and deploying & monitoring models in production with mlops — plus cloud infra, optimization, and generative ai. eleven chapters and a drill bank. ai / ml engineer — interview prep 💡 tl;dr this pack covers the whole job: taking a machine-learning idea from raw data all the way to a model running, and being watched , in production on the cloud. the through-line is the ml lifecycle — data → model → deploy → monitor → improve — and every section is one stage of it. what this role actually is an ml engineer sits between a data scientist and a backend engineer. you're expected to build models and ship them — the data pipeline that feeds them, the training that produces them, the service that serves them, and the monitoring that keeps them honest once real traffic hits. the job description's seven bullets map cleanly onto the sections here: jd responsibility where it's covered model development (ml & deep learning) §1 foundations, §3 model development data pipeline engineering §2 data pipelines experimentation & statistical analysis §4 experimentation deployment / mlops §5 mlops & serving monitoring in production §6 monitoring & reliability optimization for speed/scale §7 cloud & infra, §8 optimization innovation / generative ai §9 generative ai & llms two more sections round it out: §10 ml system design (the open-ended \"design a recommender\" whiteboard round) and §11 drill bank (rapid q&a for the last mile). how each page is written short and clear, not keyword-terse and not an essay. every page opens with a one-line tl;dr , explains each idea in a few plain sentences (what it is, why it matters, how it connects), uses a small table or diagram when that's clearer than prose, and ends with a couple of quick self-check questions. you should be able to read a page in a few minutes and actually understand it, not just recognize the words. the lifecycle, in one picture ┌─────────── the loop you own end-to-end ───────────┐ raw data → pipeline → train → evaluate → deploy → monitor → (retrain) §2 §2 §3 §4 §5 §6 §6 ▲ │ └──────────── drift / new data ──────────┘ cross-cutting: §7 cloud & infra · §8 optimization · §9 genai · §10 design suggested order go top to bottom the first time — the sections are sequenced along the lifecycle, so each builds on the last. if you want the highest-leverage interview topics first, prioritize §5 mlops , §6 monitoring , and §10 system design , because those are where \"ml engineer\" is tested more than \"data scientist.\" skim §9 generative ai even if the role isn't llm-heavy — every team asks about it now. → start: 01-ml-foundations/readme.md","words":467},{"path":"01-ml-foundations/README.md","title":"Overview","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"1-ml-foundations\">1 — ML Foundations<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Before the cloud and the MLOps, you need the core ideas an interviewer assumes you already have: how an ML project actually flows, the main <em>kinds<\/em> of learning, why models fail to generalize (bias vs variance), and how you measure \"good.\" Four short pages.<\/div><\/div>\n<h2 id=\"why-start-here\">Why start here<\/h2>\n<p>Everything later — pipelines, serving, monitoring — exists to support a <em>model<\/em>, and you can't reason about serving latency or drift if the modeling basics are shaky. This section is the shared vocabulary. It's also where the \"warm-up\" interview questions come from: <em>\"explain overfitting,\"<\/em> <em>\"when would you use precision over recall,\"<\/em> <em>\"what's the difference between supervised and unsupervised learning.\"<\/em> Getting these crisp buys you credibility for the harder rounds.<\/p>\n<h2 id=\"the-four-pages\">The four pages<\/h2>\n<ul><li><strong>The ML lifecycle<\/strong> — the loop you own end to end, and why \"training the model\" is<\/li><\/ul>\n<p>the small part.<\/p>\n<ul><li><strong>Learning types &amp; algorithms<\/strong> — supervised / unsupervised / reinforcement, and<\/li><\/ul>\n<p>the handful of algorithms worth knowing cold.<\/p>\n<ul><li><strong>Bias, variance &amp; overfitting<\/strong> — the single most important idea in modeling: why<\/li><\/ul>\n<p>models fail on new data, and the knobs that fix it.<\/p>\n<ul><li><strong>Evaluation metrics<\/strong> — accuracy lies; here's what to use instead, per task.<\/li><\/ul>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"ml-lifecycle.md\" href=\"#\">ml-lifecycle.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-start-here","text":"Why start here"},{"level":2,"id":"the-four-pages","text":"The four pages"}],"text":"1 — ml foundations 💡 tl;dr before the cloud and the mlops, you need the core ideas an interviewer assumes you already have: how an ml project actually flows, the main kinds of learning, why models fail to generalize (bias vs variance), and how you measure \"good.\" four short pages. why start here everything later — pipelines, serving, monitoring — exists to support a model , and you can't reason about serving latency or drift if the modeling basics are shaky. this section is the shared vocabulary. it's also where the \"warm-up\" interview questions come from: \"explain overfitting,\" \"when would you use precision over recall,\" \"what's the difference between supervised and unsupervised learning.\" getting these crisp buys you credibility for the harder rounds. the four pages the ml lifecycle — the loop you own end to end, and why \"training the model\" is the small part. learning types & algorithms — supervised / unsupervised / reinforcement, and the handful of algorithms worth knowing cold. bias, variance & overfitting — the single most important idea in modeling: why models fail on new data, and the knobs that fix it. evaluation metrics — accuracy lies; here's what to use instead, per task. → start: ml-lifecycle.md","words":203},{"path":"01-ml-foundations/ml-lifecycle.md","title":"The ML Lifecycle","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"the-ml-lifecycle\">The ML Lifecycle<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> An ML project is a loop, not a line: you frame the problem, get and clean data, engineer features, train and evaluate, deploy, then monitor and retrain as the world changes. Most of the real work — and most of the failures — happen <em>around<\/em> the model, not in it.<\/div><\/div>\n<h2 id=\"the-stages\">The stages<\/h2>\n<p>Think of it as a pipeline you'll be asked to reason about end to end:<\/p>\n<pre><code>1 Problem framing → 2 Data collection → 3 Preprocessing &amp; features\n→ 4 Model training → 5 Evaluation → 6 Deployment → 7 Monitoring → back to 3/4<\/code><\/pre>\n<p><strong>Problem framing<\/strong> is deciding what you're actually predicting and how success is measured <em>in business terms<\/em>. \"Reduce churn\" becomes \"predict which users will cancel next month, ranked, so we can target the top 5%.\" Getting this wrong makes everything downstream pointless, which is why interviewers love to start here.<\/p>\n<p><strong>Data and preprocessing<\/strong> (sections 2) is where most time goes — collecting, cleaning, and shaping raw data into features. The saying \"garbage in, garbage out\" is the whole reason data engineering is half of this job.<\/p>\n<p><strong>Training and evaluation<\/strong> (sections 3–4) is the part people picture when they hear \"ML,\" but it's often the <em>fastest<\/em> stage. You fit a model and measure whether it generalizes.<\/p>\n<p><strong>Deployment and monitoring<\/strong> (sections 5–6) is where ML <em>Engineering<\/em> earns its name. A model that isn't served, watched, and retrained is a science project, not a product.<\/p>\n<h2 id=\"why-its-a-loop-matters\">Why \"it's a loop\" matters<\/h2>\n<p>The world drifts — user behavior changes, new products launch, a data source changes format — so a model that was accurate at launch slowly decays. That's why the last arrow loops back: monitoring detects the decay, and you retrain on fresh data. Saying \"the lifecycle is a loop because of drift\" signals you think past the demo.<\/p>\n<h2 id=\"the-interview-angle\">The interview angle<\/h2>\n<p>A common opener is <em>\"walk me through how you'd build and ship an ML system.\"<\/em> The lifecycle <em>is<\/em> your answer skeleton: frame → data → features → train → evaluate → deploy → monitor → retrain. Hang specifics off each stage and you've structured a strong 10-minute answer without rambling.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Naming a tool for each stage is what turns \"I know the lifecycle\" into \"I've run one.\" A common cloud stack:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Typical tools<\/th><\/tr><\/thead><tbody><tr><td>Data &amp; features<\/td><td>Spark / dbt, Airflow, a feature store (Feast)<\/td><\/tr><tr><td>Train<\/td><td>scikit-learn, XGBoost, PyTorch — on SageMaker / Vertex / Databricks<\/td><\/tr><tr><td>Track experiments<\/td><td>MLflow, Weights &amp; Biases<\/td><\/tr><tr><td>Deploy<\/td><td>Docker + KServe / Triton, or a managed endpoint<\/td><\/tr><tr><td>Monitor<\/td><td>Evidently / Arize + Prometheus / Grafana<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How you'd say it:<\/strong> <em>\"The loop is the same everywhere — in a CV system it was DeepStream to ingest, PyTorch/TensorRT for the model, MLflow to track runs, and Prometheus/Grafana to watch it in production; the tools change, the lifecycle doesn't.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Which stage usually takes the most time, and why? *(data collection and<\/li><\/ul>\n<p>preprocessing — quality of data caps model quality.)*<\/p>\n<ul><li>What makes it a loop rather than a line? *(drift — the world changes, so models<\/li><\/ul>\n<p>decay and need retraining.)*<\/p>\n<ul><li>Where does \"ML Engineer\" differ from \"data scientist\" in this loop? *(the deploy →<\/li><\/ul>\n<p>monitor → retrain half — shipping and keeping models alive.)*<\/p>","toc":[{"level":2,"id":"the-stages","text":"The stages"},{"level":2,"id":"why-its-a-loop-matters","text":"Why \"it's a loop\" matters"},{"level":2,"id":"the-interview-angle","text":"The interview angle"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"the ml lifecycle 💡 tl;dr an ml project is a loop, not a line: you frame the problem, get and clean data, engineer features, train and evaluate, deploy, then monitor and retrain as the world changes. most of the real work — and most of the failures — happen around the model, not in it. the stages think of it as a pipeline you'll be asked to reason about end to end: 1 problem framing → 2 data collection → 3 preprocessing & features → 4 model training → 5 evaluation → 6 deployment → 7 monitoring → back to 3/4 problem framing is deciding what you're actually predicting and how success is measured in business terms . \"reduce churn\" becomes \"predict which users will cancel next month, ranked, so we can target the top 5%.\" getting this wrong makes everything downstream pointless, which is why interviewers love to start here. data and preprocessing (sections 2) is where most time goes — collecting, cleaning, and shaping raw data into features. the saying \"garbage in, garbage out\" is the whole reason data engineering is half of this job. training and evaluation (sections 3–4) is the part people picture when they hear \"ml,\" but it's often the fastest stage. you fit a model and measure whether it generalizes. deployment and monitoring (sections 5–6) is where ml engineering earns its name. a model that isn't served, watched, and retrained is a science project, not a product. why \"it's a loop\" matters the world drifts — user behavior changes, new products launch, a data source changes format — so a model that was accurate at launch slowly decays. that's why the last arrow loops back: monitoring detects the decay, and you retrain on fresh data. saying \"the lifecycle is a loop because of drift\" signals you think past the demo. the interview angle a common opener is \"walk me through how you'd build and ship an ml system.\" the lifecycle is your answer skeleton: frame → data → features → train → evaluate → deploy → monitor → retrain. hang specifics off each stage and you've structured a strong 10-minute answer without rambling. 🔗 connecting the dots — the real stack naming a tool for each stage is what turns \"i know the lifecycle\" into \"i've run one.\" a common cloud stack: stage typical tools data & features spark / dbt, airflow, a feature store (feast) train scikit-learn, xgboost, pytorch — on sagemaker / vertex / databricks track experiments mlflow, weights & biases deploy docker + kserve / triton, or a managed endpoint monitor evidently / arize + prometheus / grafana how you'd say it: \"the loop is the same everywhere — in a cv system it was deepstream to ingest, pytorch/tensorrt for the model, mlflow to track runs, and prometheus/grafana to watch it in production; the tools change, the lifecycle doesn't.\" self-check which stage usually takes the most time, and why? *(data collection and preprocessing — quality of data caps model quality.)* what makes it a loop rather than a line? *(drift — the world changes, so models decay and need retraining.)* where does \"ml engineer\" differ from \"data scientist\" in this loop? *(the deploy → monitor → retrain half — shipping and keeping models alive.)*","words":543},{"path":"01-ml-foundations/learning-types.md","title":"Learning Types & Algorithms","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"learning-types-algorithms\">Learning Types &amp; Algorithms<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Three families — <strong>supervised<\/strong> (learn from labeled examples), <strong>unsupervised<\/strong> (find structure in unlabeled data), and <strong>reinforcement<\/strong> (learn from reward). Know which real problems fall into each, plus a short list of go-to algorithms and when to reach for them.<\/div><\/div>\n<h2 id=\"supervised-learning\">Supervised learning<\/h2>\n<p>You have inputs <em>and<\/em> the correct answers (labels), and the model learns to map one to the other. It splits into two tasks: <strong>classification<\/strong> predicts a category (spam or not, which of 10 classes), and <strong>regression<\/strong> predicts a number (price, demand, temperature). This is the bulk of applied ML because most business problems come with historical labeled outcomes — past purchases, past churn, past fraud.<\/p>\n<h2 id=\"unsupervised-learning\">Unsupervised learning<\/h2>\n<p>No labels — you're looking for structure the data already has. <strong>Clustering<\/strong> groups similar items (customer segments, anomaly-free vs anomalous behavior); <strong>dimensionality reduction<\/strong> (PCA, embeddings) compresses many features into a few while keeping the signal, useful for visualization and as input to other models. You reach for this when you don't have labels, or to <em>explore<\/em> data before modeling.<\/p>\n<h2 id=\"reinforcement-learning\">Reinforcement learning<\/h2>\n<p>An agent takes actions in an environment and learns from a <strong>reward<\/strong> signal — think game-playing, robotics, or ad/recommendation policies that optimize long-term engagement. It's powerful but data-hungry and finicky, so in most product ML jobs it's a \"know the concept\" topic rather than a daily tool. Note that <strong>RLHF<\/strong> (reinforcement learning from human feedback) is how LLMs are aligned (section 9), so it's worth recognizing.<\/p>\n<h2 id=\"the-algorithms-worth-knowing-cold\">The algorithms worth knowing cold<\/h2>\n<p>You don't need dozens — you need to defend a few and know their trade-offs:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Algorithm<\/th><th>Use it for<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td><strong>Linear / Logistic regression<\/strong><\/td><td>baselines, interpretable problems<\/td><td>fast, explainable — always start here<\/td><\/tr><tr><td><strong>Decision trees<\/strong><\/td><td>simple non-linear splits<\/td><td>interpretable but overfit alone<\/td><\/tr><tr><td><strong>Random Forest<\/strong><\/td><td>tabular, robust default<\/td><td>bagging → low variance, little tuning<\/td><\/tr><tr><td><strong>Gradient boosting (XGBoost/LightGBM)<\/strong><\/td><td>tabular winner<\/td><td>usually best on structured data<\/td><\/tr><tr><td><strong>k-Means<\/strong><\/td><td>clustering<\/td><td>simple, fast segmentation<\/td><\/tr><tr><td><strong>Neural networks<\/strong><\/td><td>images, text, audio, huge data<\/td><td>learn features; overkill for small tabular<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-one-line-interviewers-want\">The one line interviewers want<\/h2>\n<p><em>\"For structured/tabular data I start with a boosted-tree model like XGBoost — it's the strongest default. I only reach for deep learning when I have unstructured data (images, text) or very large datasets where learned features beat hand-crafted ones.\"<\/em> That single sentence signals real-world judgment over hype.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Each family has a go-to library: <strong>scikit-learn<\/strong> for classical models, <strong>XGBoost / LightGBM<\/strong> for boosting, <strong>PyTorch<\/strong> and <strong>TensorFlow/Keras<\/strong> for deep learning, and <strong>HuggingFace<\/strong> for pretrained text/vision models. Reinforcement learning uses <strong>RLlib<\/strong> or <strong>Stable-Baselines3<\/strong>; RLHF for LLMs uses <strong>TRL<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For tabular I reach for XGBoost via scikit-learn; for anything unstructured I start from a pretrained PyTorch model on HuggingFace and fine-tune.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Classification vs regression? <em>(predict a category vs a number.)<\/em><\/li><li>No labels — which family, and give one technique? <em>(unsupervised; clustering or PCA.)<\/em><\/li><li>Best default for tabular data, and when do you switch to neural nets? *(gradient<\/li><\/ul>\n<p>boosting; switch for unstructured data or very large scale.)*<\/p>","toc":[{"level":2,"id":"supervised-learning","text":"Supervised learning"},{"level":2,"id":"unsupervised-learning","text":"Unsupervised learning"},{"level":2,"id":"reinforcement-learning","text":"Reinforcement learning"},{"level":2,"id":"the-algorithms-worth-knowing-cold","text":"The algorithms worth knowing cold"},{"level":2,"id":"the-one-line-interviewers-want","text":"The one line interviewers want"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"learning types & algorithms 💡 tl;dr three families — supervised (learn from labeled examples), unsupervised (find structure in unlabeled data), and reinforcement (learn from reward). know which real problems fall into each, plus a short list of go-to algorithms and when to reach for them. supervised learning you have inputs and the correct answers (labels), and the model learns to map one to the other. it splits into two tasks: classification predicts a category (spam or not, which of 10 classes), and regression predicts a number (price, demand, temperature). this is the bulk of applied ml because most business problems come with historical labeled outcomes — past purchases, past churn, past fraud. unsupervised learning no labels — you're looking for structure the data already has. clustering groups similar items (customer segments, anomaly-free vs anomalous behavior); dimensionality reduction (pca, embeddings) compresses many features into a few while keeping the signal, useful for visualization and as input to other models. you reach for this when you don't have labels, or to explore data before modeling. reinforcement learning an agent takes actions in an environment and learns from a reward signal — think game-playing, robotics, or ad/recommendation policies that optimize long-term engagement. it's powerful but data-hungry and finicky, so in most product ml jobs it's a \"know the concept\" topic rather than a daily tool. note that rlhf (reinforcement learning from human feedback) is how llms are aligned (section 9), so it's worth recognizing. the algorithms worth knowing cold you don't need dozens — you need to defend a few and know their trade-offs: algorithm use it for why linear / logistic regression baselines, interpretable problems fast, explainable — always start here decision trees simple non-linear splits interpretable but overfit alone random forest tabular, robust default bagging → low variance, little tuning gradient boosting (xgboost/lightgbm) tabular winner usually best on structured data k-means clustering simple, fast segmentation neural networks images, text, audio, huge data learn features; overkill for small tabular the one line interviewers want \"for structured/tabular data i start with a boosted-tree model like xgboost — it's the strongest default. i only reach for deep learning when i have unstructured data (images, text) or very large datasets where learned features beat hand-crafted ones.\" that single sentence signals real-world judgment over hype. 🔗 connecting the dots — the real stack each family has a go-to library: scikit-learn for classical models, xgboost / lightgbm for boosting, pytorch and tensorflow/keras for deep learning, and huggingface for pretrained text/vision models. reinforcement learning uses rllib or stable-baselines3 ; rlhf for llms uses trl . how you'd say it: \"for tabular i reach for xgboost via scikit-learn; for anything unstructured i start from a pretrained pytorch model on huggingface and fine-tune.\" self-check classification vs regression? (predict a category vs a number.) no labels — which family, and give one technique? (unsupervised; clustering or pca.) best default for tabular data, and when do you switch to neural nets? *(gradient boosting; switch for unstructured data or very large scale.)*","words":499},{"path":"01-ml-foundations/bias-variance.md","title":"Bias, Variance & Overfitting","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"bias-variance-overfitting\">Bias, Variance &amp; Overfitting<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A model can fail two ways: too simple to capture the pattern (<strong>underfitting / high bias<\/strong>) or so complex it memorizes the training data and flops on new data (<strong>overfitting / high variance<\/strong>). The whole craft of modeling is balancing these two.<\/div><\/div>\n<h2 id=\"the-two-failure-modes\">The two failure modes<\/h2>\n<p><strong>High bias (underfitting)<\/strong> means the model is too simple — it misses the real relationship, so it does poorly on <em>both<\/em> training and test data. A straight line trying to fit a curve. The fix is a more expressive model or better features.<\/p>\n<p><strong>High variance (overfitting)<\/strong> means the model is too complex — it fits the training data's noise, so it looks great in training and terrible on new data. The fix is to <em>simplify or constrain<\/em> it, or to give it more data.<\/p>\n<p>The tell is the gap between training and validation scores: tiny gap but both bad = underfitting; big gap (great train, poor validation) = overfitting.<\/p>\n<pre><code>underfit         good fit          overfit\ntrain: bad       train: good       train: great\ntest:  bad       test:  good       test:  bad<\/code><\/pre>\n<h2 id=\"the-knobs-that-fight-overfitting\">The knobs that fight overfitting<\/h2>\n<p>This is a classic \"how would you fix overfitting?\" question — have the list ready:<\/p>\n<ul><li><strong>More training data<\/strong> — the most reliable cure; harder to memorize a bigger set.<\/li><li><strong>Regularization<\/strong> — L1/L2 penalties that discourage extreme weights; dropout in<\/li><\/ul>\n<p>neural nets; shallower trees / fewer boosting rounds.<\/p>\n<ul><li><strong>Simpler model<\/strong> — fewer parameters/features.<\/li><li><strong>Cross-validation<\/strong> — to <em>detect<\/em> it honestly (section 4).<\/li><li><strong>Early stopping<\/strong> — stop training when validation loss stops improving.<\/li><li><strong>Feature selection<\/strong> — drop noisy or redundant features.<\/li><\/ul>\n<h2 id=\"why-this-is-the-foundational-idea\">Why this is <em>the<\/em> foundational idea<\/h2>\n<p>Every later topic connects back here. Regularization, train/val/test splits, augmentation, monitoring for drift — all of it is really about making a model generalize to data it hasn't seen. If you understand bias–variance, most modeling decisions become obvious.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The anti-overfitting knobs live inside the libraries: L1/L2 and <code>max_depth<\/code> / <code>min_child_weight<\/code> in <strong>XGBoost<\/strong>, <code>dropout<\/code> and <code>weight_decay<\/code> in <strong>PyTorch<\/strong>, early-stopping callbacks in <strong>XGBoost<\/strong> and <strong>Keras<\/strong>, and cross-validation in <strong>scikit-learn<\/strong>. You <em>detect<\/em> the gap with an experiment tracker (<strong>MLflow / W&amp;B<\/strong>) plotting train vs validation curves.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I spot overfitting from the train/validation gap in W&amp;B, then dial in regularization and early stopping.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Great on training, poor on test — which problem and one fix? *(overfitting /<\/li><\/ul>\n<p>high variance; more data or regularization.)*<\/p>\n<ul><li>Poor on both — which problem and one fix? *(underfitting / high bias; more<\/li><\/ul>\n<p>expressive model or better features.)*<\/p>\n<ul><li>Name three overfitting cures. *(more data, regularization/dropout, simpler model,<\/li><\/ul>\n<p>early stopping — any three.)*<\/p>","toc":[{"level":2,"id":"the-two-failure-modes","text":"The two failure modes"},{"level":2,"id":"the-knobs-that-fight-overfitting","text":"The knobs that fight overfitting"},{"level":2,"id":"why-this-is-the-foundational-idea","text":"Why this is the foundational idea"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"bias, variance & overfitting 💡 tl;dr a model can fail two ways: too simple to capture the pattern ( underfitting / high bias ) or so complex it memorizes the training data and flops on new data ( overfitting / high variance ). the whole craft of modeling is balancing these two. the two failure modes high bias (underfitting) means the model is too simple — it misses the real relationship, so it does poorly on both training and test data. a straight line trying to fit a curve. the fix is a more expressive model or better features. high variance (overfitting) means the model is too complex — it fits the training data's noise, so it looks great in training and terrible on new data. the fix is to simplify or constrain it, or to give it more data. the tell is the gap between training and validation scores: tiny gap but both bad = underfitting; big gap (great train, poor validation) = overfitting. underfit good fit overfit train: bad train: good train: great test: bad test: good test: bad the knobs that fight overfitting this is a classic \"how would you fix overfitting?\" question — have the list ready: more training data — the most reliable cure; harder to memorize a bigger set. regularization — l1/l2 penalties that discourage extreme weights; dropout in neural nets; shallower trees / fewer boosting rounds. simpler model — fewer parameters/features. cross-validation — to detect it honestly (section 4). early stopping — stop training when validation loss stops improving. feature selection — drop noisy or redundant features. why this is the foundational idea every later topic connects back here. regularization, train/val/test splits, augmentation, monitoring for drift — all of it is really about making a model generalize to data it hasn't seen. if you understand bias–variance, most modeling decisions become obvious. 🔗 connecting the dots — the real stack the anti-overfitting knobs live inside the libraries: l1/l2 and max_depth / min_child_weight in xgboost , dropout and weight_decay in pytorch , early-stopping callbacks in xgboost and keras , and cross-validation in scikit-learn . you detect the gap with an experiment tracker ( mlflow / w&b ) plotting train vs validation curves. how you'd say it: \"i spot overfitting from the train/validation gap in w&b, then dial in regularization and early stopping.\" self-check great on training, poor on test — which problem and one fix? *(overfitting / high variance; more data or regularization.)* poor on both — which problem and one fix? *(underfitting / high bias; more expressive model or better features.)* name three overfitting cures. *(more data, regularization/dropout, simpler model, early stopping — any three.)*","words":441},{"path":"01-ml-foundations/metrics.md","title":"Evaluation Metrics","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"evaluation-metrics\">Evaluation Metrics<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> \"Accuracy\" is often misleading — especially when classes are imbalanced. Pick the metric that matches what the business actually cares about: catching all the positives, or being right when you flag one, or ranking well. Know the handful below and <em>when<\/em> each applies.<\/div><\/div>\n<h2 id=\"classification-metrics\">Classification metrics<\/h2>\n<p>Start from the <strong>confusion matrix<\/strong> — true/false positives and negatives — because every metric is built from it.<\/p>\n<ul><li><strong>Accuracy<\/strong> = fraction correct. Fine when classes are balanced; **dangerous when<\/li><\/ul>\n<p>they're not**. A fraud model that predicts \"never fraud\" can be 99.9% accurate and   useless.<\/p>\n<ul><li><strong>Precision<\/strong> = of the items you flagged positive, how many really were. Use when a<\/li><\/ul>\n<p>false positive is costly (flagging a good transaction as fraud annoys customers).<\/p>\n<ul><li><strong>Recall (sensitivity)<\/strong> = of the actual positives, how many you caught. Use when a<\/li><\/ul>\n<p>miss is costly (missing a cancer, missing real fraud).<\/p>\n<ul><li><strong>F1<\/strong> = harmonic mean of precision and recall — one number when you need to balance<\/li><\/ul>\n<p>both, and the go-to for imbalanced classes.<\/p>\n<ul><li><strong>ROC-AUC<\/strong> = how well the model ranks positives above negatives across all<\/li><\/ul>\n<p>thresholds; threshold-independent. <strong>PR-AUC<\/strong> is better than ROC-AUC when positives   are rare.<\/p>\n<p>The key insight: <strong>precision and recall trade off<\/strong>, and the trade is set by your decision threshold. Moving the threshold to catch more positives (higher recall) usually flags more false ones (lower precision).<\/p>\n<h3 id=\"try-it-move-the-threshold\">Try it: move the threshold<\/h3>\n<p>Each dot is one example scored by the model — <strong>green = actually positive<\/strong>, gray = actually negative. Drag the threshold: everything to its right is <em>predicted positive<\/em>. Watch precision and recall move in opposite directions.<\/p>\n<div id=\"pr-widget\" class=\"prw\"><\/div>\n<h2 id=\"regression-metrics\">Regression metrics<\/h2>\n<ul><li><strong>MAE<\/strong> (mean absolute error) — average miss in the original units; robust to<\/li><\/ul>\n<p>outliers.<\/p>\n<ul><li><strong>RMSE<\/strong> (root mean squared error) — like MAE but punishes big misses harder; use<\/li><\/ul>\n<p>when large errors are especially bad.<\/p>\n<ul><li><strong>R²<\/strong> — fraction of variance explained (1 = perfect, 0 = no better than the mean).<\/li><\/ul>\n<h2 id=\"say-this-in-the-interview\">Say this in the interview<\/h2>\n<p><em>\"I pick the metric from the cost of errors. For imbalanced classification I ignore accuracy and look at precision, recall, and F1 or PR-AUC — and I choose between precision and recall based on whether a false alarm or a miss is more expensive.\"<\/em> That reasoning matters more than reciting formulas.<\/p>\n<h2 id=\"offline-vs-online\">Offline vs online<\/h2>\n<p>These are <strong>offline<\/strong> metrics on held-out data. In production the metric that really counts is a <strong>business<\/strong> one — click-through, revenue, retention — measured by an A/B test (section 4). A model can improve F1 and still lose money; always tie the offline metric back to a business outcome.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Compute these with <strong>scikit-learn<\/strong> (<code>sklearn.metrics<\/code>), <strong>torchmetrics<\/strong>, or HuggingFace <strong>evaluate<\/strong>, and log them per run in <strong>MLflow / W&amp;B<\/strong>. The <em>business<\/em> metric that ultimately decides shipping is measured by an experimentation platform (<strong>Optimizely / Statsig<\/strong>) via an A/B test, not offline.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Offline I track F1/PR-AUC in MLflow; the decision to ship is made on the online metric from an A/B test.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why is accuracy misleading for fraud detection? *(class imbalance — predicting the<\/li><\/ul>\n<p>majority class scores high while catching nothing.)*<\/p>\n<ul><li>False positives are expensive — precision or recall? <em>(precision.)<\/em> A miss is<\/li><\/ul>\n<p>expensive? <em>(recall.)<\/em><\/p>\n<ul><li>Rare positives — ROC-AUC or PR-AUC? <em>(PR-AUC.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"classification-metrics","text":"Classification metrics"},{"level":3,"id":"try-it-move-the-threshold","text":"Try it: move the threshold"},{"level":2,"id":"regression-metrics","text":"Regression metrics"},{"level":2,"id":"say-this-in-the-interview","text":"Say this in the interview"},{"level":2,"id":"offline-vs-online","text":"Offline vs online"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"evaluation metrics 💡 tl;dr \"accuracy\" is often misleading — especially when classes are imbalanced. pick the metric that matches what the business actually cares about: catching all the positives, or being right when you flag one, or ranking well. know the handful below and when each applies. classification metrics start from the confusion matrix — true/false positives and negatives — because every metric is built from it. accuracy = fraction correct. fine when classes are balanced; **dangerous when they're not**. a fraud model that predicts \"never fraud\" can be 99.9% accurate and useless. precision = of the items you flagged positive, how many really were. use when a false positive is costly (flagging a good transaction as fraud annoys customers). recall (sensitivity) = of the actual positives, how many you caught. use when a miss is costly (missing a cancer, missing real fraud). f1 = harmonic mean of precision and recall — one number when you need to balance both, and the go-to for imbalanced classes. roc-auc = how well the model ranks positives above negatives across all thresholds; threshold-independent. pr-auc is better than roc-auc when positives are rare. the key insight: precision and recall trade off , and the trade is set by your decision threshold. moving the threshold to catch more positives (higher recall) usually flags more false ones (lower precision). try it: move the threshold each dot is one example scored by the model — green = actually positive , gray = actually negative. drag the threshold: everything to its right is predicted positive . watch precision and recall move in opposite directions. regression metrics mae (mean absolute error) — average miss in the original units; robust to outliers. rmse (root mean squared error) — like mae but punishes big misses harder; use when large errors are especially bad. r² — fraction of variance explained (1 = perfect, 0 = no better than the mean). say this in the interview \"i pick the metric from the cost of errors. for imbalanced classification i ignore accuracy and look at precision, recall, and f1 or pr-auc — and i choose between precision and recall based on whether a false alarm or a miss is more expensive.\" that reasoning matters more than reciting formulas. offline vs online these are offline metrics on held-out data. in production the metric that really counts is a business one — click-through, revenue, retention — measured by an a/b test (section 4). a model can improve f1 and still lose money; always tie the offline metric back to a business outcome. 🔗 connecting the dots — the real stack compute these with scikit-learn ( sklearn.metrics ), torchmetrics , or huggingface evaluate , and log them per run in mlflow / w&b . the business metric that ultimately decides shipping is measured by an experimentation platform ( optimizely / statsig ) via an a/b test, not offline. how you'd say it: \"offline i track f1/pr-auc in mlflow; the decision to ship is made on the online metric from an a/b test.\" self-check why is accuracy misleading for fraud detection? *(class imbalance — predicting the majority class scores high while catching nothing.)* false positives are expensive — precision or recall? (precision.) a miss is expensive? (recall.) rare positives — roc-auc or pr-auc? (pr-auc.)","words":546},{"path":"02-data-pipelines/README.md","title":"Overview","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"2-data-pipelines\">2 — Data Pipelines<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Models are only as good as the data feeding them, so a huge part of ML Engineering is building reliable pipelines that ingest, clean, and shape data — in batches or in real time — and serve consistent features to both training and production. This is the \"Data Pipeline Engineering\" bullet in the JD, and it's where a lot of the actual work lives.<\/div><\/div>\n<h2 id=\"why-this-matters-more-than-beginners-expect\">Why this matters more than beginners expect<\/h2>\n<p>You can have a brilliant model and still fail because the data arrives late, dirty, or in a different shape than training expected. Most production ML bugs are <em>data<\/em> bugs, not model bugs. Interviewers probe this because it separates people who've only done Kaggle (clean CSV handed to them) from people who've shipped (data that's messy, streaming, and always changing).<\/p>\n<h2 id=\"the-four-pages\">The four pages<\/h2>\n<ul><li><strong>Ingestion &amp; storage<\/strong> — where data comes from and where it lands (lakes,<\/li><\/ul>\n<p>warehouses, lakehouses).<\/p>\n<ul><li><strong>Batch vs streaming<\/strong> — the two processing modes and how to choose.<\/li><li><strong>Preprocessing &amp; data quality<\/strong> — cleaning, validation, and stopping bad data<\/li><\/ul>\n<p>early.<\/p>\n<ul><li><strong>Feature engineering &amp; feature stores<\/strong> — turning raw data into model inputs, and<\/li><\/ul>\n<p>the train/serve consistency problem a feature store solves.<\/p>\n<h2 id=\"the-mental-model\">The mental model<\/h2>\n<pre><code>sources → ingest → store (lake/warehouse) → transform/clean → features → model\n  APIs      batch    S3 / BigQuery /          Spark / SQL /    feature    train\n  DBs       stream   Snowflake                dbt              store      + serve\n  logs<\/code><\/pre>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"ingestion-and-storage.md\" href=\"#\">ingestion-and-storage.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-this-matters-more-than-beginners-expect","text":"Why this matters more than beginners expect"},{"level":2,"id":"the-four-pages","text":"The four pages"},{"level":2,"id":"the-mental-model","text":"The mental model"}],"text":"2 — data pipelines 💡 tl;dr models are only as good as the data feeding them, so a huge part of ml engineering is building reliable pipelines that ingest, clean, and shape data — in batches or in real time — and serve consistent features to both training and production. this is the \"data pipeline engineering\" bullet in the jd, and it's where a lot of the actual work lives. why this matters more than beginners expect you can have a brilliant model and still fail because the data arrives late, dirty, or in a different shape than training expected. most production ml bugs are data bugs, not model bugs. interviewers probe this because it separates people who've only done kaggle (clean csv handed to them) from people who've shipped (data that's messy, streaming, and always changing). the four pages ingestion & storage — where data comes from and where it lands (lakes, warehouses, lakehouses). batch vs streaming — the two processing modes and how to choose. preprocessing & data quality — cleaning, validation, and stopping bad data early. feature engineering & feature stores — turning raw data into model inputs, and the train/serve consistency problem a feature store solves. the mental model sources → ingest → store (lake/warehouse) → transform/clean → features → model apis batch s3 / bigquery / spark / sql / feature train dbs stream snowflake dbt store + serve logs → start: ingestion-and-storage.md","words":238},{"path":"02-data-pipelines/ingestion-and-storage.md","title":"Ingestion & Storage","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"ingestion-storage\">Ingestion &amp; Storage<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Ingestion is getting data <em>in<\/em> from its sources; storage is where it lands so you can process it. The main choices are data <strong>lake<\/strong> (raw, cheap, flexible), data <strong>warehouse<\/strong> (structured, query-ready), and <strong>lakehouse<\/strong> (a blend). Knowing when to use each is the core of this page.<\/div><\/div>\n<h2 id=\"where-data-comes-from\">Where data comes from<\/h2>\n<p>Data arrives from databases (via change-data-capture or periodic dumps), application events and logs, third-party APIs, and files. Ingestion can be <strong>pull<\/strong> (you poll a source on a schedule) or <strong>push<\/strong> (the source streams events to you). The practical concern is reliability: what happens when a source is down, sends duplicates, or changes its schema — good pipelines handle all three rather than assuming happy paths.<\/p>\n<h2 id=\"lake-vs-warehouse-vs-lakehouse\">Lake vs warehouse vs lakehouse<\/h2>\n<p>This is a very common interview distinction:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Store<\/th><th>Holds<\/th><th>Best for<\/th><th>Trade-off<\/th><\/tr><\/thead><tbody><tr><td><strong>Data lake<\/strong> (S3, GCS)<\/td><td>raw files, any format<\/td><td>cheap bulk storage, ML training data<\/td><td>you must impose structure later (\"schema on read\")<\/td><\/tr><tr><td><strong>Data warehouse<\/strong> (BigQuery, Snowflake, Redshift)<\/td><td>clean, structured tables<\/td><td>fast SQL analytics, BI<\/td><td>costlier, structured data only (\"schema on write\")<\/td><\/tr><tr><td><strong>Lakehouse<\/strong> (Databricks/Delta, Iceberg)<\/td><td>raw + table layer on top<\/td><td>one system for both<\/td><td>newer, more moving parts<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The intuition: a <strong>lake<\/strong> is a cheap dumping ground you sort out later — great for the large, messy, unstructured data ML loves. A <strong>warehouse<\/strong> is a tidy library — great for clean tables and analytics. A <strong>lakehouse<\/strong> tries to give you warehouse-like tables <em>on top of<\/em> cheap lake storage.<\/p>\n<h2 id=\"schema-on-read-vs-schema-on-write\">Schema-on-read vs schema-on-write<\/h2>\n<p>A lake is \"schema on read\" — you dump raw data now and interpret its structure when you query it, which is flexible but pushes cleanup downstream. A warehouse is \"schema on write\" — data must fit a defined structure to get in, which guarantees clean tables but rejects anything malformed at the door. This trade-off — flexibility now vs cleanliness now — explains most storage decisions.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Each storage layer has a concrete implementation: a <strong>data lake<\/strong> is object storage (<strong>S3 / GCS / ADLS<\/strong>), usually with an open <strong>table format<\/strong> on top (<strong>Delta Lake, Apache Iceberg, Hudi<\/strong>); a <strong>warehouse<\/strong> is <strong>Snowflake / BigQuery / Redshift<\/strong>; a <strong>lakehouse<\/strong> is typically <strong>Databricks<\/strong> (Delta + <strong>Unity Catalog<\/strong> for governance). For ML teams the lakehouse has become the default, because it plugs straight into experiment tracking, governance, and serving — most cleanly via <strong>MLflow<\/strong> (which was created by Databricks):<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Phase<\/th><th>How MLflow + Databricks / Lakehouse work together<\/th><\/tr><\/thead><tbody><tr><td>Data ingestion<\/td><td>MLflow logs the exact <strong>Delta Lake snapshot version<\/strong> a model trained on → strict reproducibility<\/td><\/tr><tr><td>Governance<\/td><td>Models are registered inside <strong>Unity Catalog<\/strong>, alongside your database tables<\/td><\/tr><tr><td>Lineage<\/td><td>You can trace a model's lineage all the way back to the raw unstructured files in the data lake<\/td><\/tr><tr><td>Serving<\/td><td>MLflow-registered models deploy in one click to <strong>Databricks Serverless Serving<\/strong> endpoints<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How you'd say it:<\/strong> <em>\"We kept raw frames/text in S3 as the lake, curated Delta tables in Unity Catalog as the lakehouse, and MLflow pinned the exact Delta snapshot version behind every model — so any model's lineage traced straight back to the raw files, and promotion to a serving endpoint was one click.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Cheap storage for huge raw training data — lake or warehouse? <em>(lake.)<\/em><\/li><li>Fast SQL over clean tables for a dashboard — which? <em>(warehouse.)<\/em><\/li><li>Schema-on-read vs schema-on-write — one-line difference? *(interpret structure at<\/li><\/ul>\n<p>query time vs enforce it at write time.)*<\/p>","toc":[{"level":2,"id":"where-data-comes-from","text":"Where data comes from"},{"level":2,"id":"lake-vs-warehouse-vs-lakehouse","text":"Lake vs warehouse vs lakehouse"},{"level":2,"id":"schema-on-read-vs-schema-on-write","text":"Schema-on-read vs schema-on-write"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"ingestion & storage 💡 tl;dr ingestion is getting data in from its sources; storage is where it lands so you can process it. the main choices are data lake (raw, cheap, flexible), data warehouse (structured, query-ready), and lakehouse (a blend). knowing when to use each is the core of this page. where data comes from data arrives from databases (via change-data-capture or periodic dumps), application events and logs, third-party apis, and files. ingestion can be pull (you poll a source on a schedule) or push (the source streams events to you). the practical concern is reliability: what happens when a source is down, sends duplicates, or changes its schema — good pipelines handle all three rather than assuming happy paths. lake vs warehouse vs lakehouse this is a very common interview distinction: store holds best for trade-off data lake (s3, gcs) raw files, any format cheap bulk storage, ml training data you must impose structure later (\"schema on read\") data warehouse (bigquery, snowflake, redshift) clean, structured tables fast sql analytics, bi costlier, structured data only (\"schema on write\") lakehouse (databricks/delta, iceberg) raw + table layer on top one system for both newer, more moving parts the intuition: a lake is a cheap dumping ground you sort out later — great for the large, messy, unstructured data ml loves. a warehouse is a tidy library — great for clean tables and analytics. a lakehouse tries to give you warehouse-like tables on top of cheap lake storage. schema-on-read vs schema-on-write a lake is \"schema on read\" — you dump raw data now and interpret its structure when you query it, which is flexible but pushes cleanup downstream. a warehouse is \"schema on write\" — data must fit a defined structure to get in, which guarantees clean tables but rejects anything malformed at the door. this trade-off — flexibility now vs cleanliness now — explains most storage decisions. 🔗 connecting the dots — the real stack each storage layer has a concrete implementation: a data lake is object storage ( s3 / gcs / adls ), usually with an open table format on top ( delta lake, apache iceberg, hudi ); a warehouse is snowflake / bigquery / redshift ; a lakehouse is typically databricks (delta + unity catalog for governance). for ml teams the lakehouse has become the default, because it plugs straight into experiment tracking, governance, and serving — most cleanly via mlflow (which was created by databricks): phase how mlflow + databricks / lakehouse work together data ingestion mlflow logs the exact delta lake snapshot version a model trained on → strict reproducibility governance models are registered inside unity catalog , alongside your database tables lineage you can trace a model's lineage all the way back to the raw unstructured files in the data lake serving mlflow-registered models deploy in one click to databricks serverless serving endpoints how you'd say it: \"we kept raw frames/text in s3 as the lake, curated delta tables in unity catalog as the lakehouse, and mlflow pinned the exact delta snapshot version behind every model — so any model's lineage traced straight back to the raw files, and promotion to a serving endpoint was one click.\" self-check cheap storage for huge raw training data — lake or warehouse? (lake.) fast sql over clean tables for a dashboard — which? (warehouse.) schema-on-read vs schema-on-write — one-line difference? *(interpret structure at query time vs enforce it at write time.)*","words":572},{"path":"02-data-pipelines/batch-vs-streaming.md","title":"Batch vs Streaming","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"batch-vs-streaming\">Batch vs Streaming<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two ways to process data. <strong>Batch<\/strong> runs on a schedule over a big chunk of data (nightly, hourly) — simple and cheap. <strong>Streaming<\/strong> processes each event as it arrives — fresh but more complex. Choose by how <em>fresh<\/em> the data must be.<\/div><\/div>\n<h2 id=\"batch-processing\">Batch processing<\/h2>\n<p>You collect data over a window and process it all at once — a nightly job that retrains a model or recomputes yesterday's features. It's the default because it's <strong>simpler, cheaper, and easier to debug<\/strong>: if a run fails, you just rerun it. Tools: Spark, SQL/dbt, orchestrated by Airflow. The downside is <strong>latency<\/strong> — features are as stale as your last run, so a nightly batch can't power a real-time fraud check.<\/p>\n<h2 id=\"streaming-processing\">Streaming processing<\/h2>\n<p>You process events <strong>as they happen<\/strong>, continuously — updating a feature or scoring a transaction milliseconds after it occurs. Tools: Kafka (the event backbone), Flink or Spark Structured Streaming (processing). It gives you <strong>freshness<\/strong> but costs you complexity: you must handle out-of-order events, late data, exactly-once processing, and always-on in

ds mig hardware-partitioned slices on supported gpus smaller predictable services, stronger isolation time sharing multiple processes multiplex one gpu dev/light workloads; weaker predictability mig improves packing but fixes each slice's compute and memory shape. a model that barely fits may leave no kv headroom. benchmark the real slice and expose the correct mig resource type; do not assume it behaves like a fraction of a full gpu in every workload. workload lifecycle for model servers use a startup probe for long model initialization. mark readiness only after the model can serve; remove it before draining. keep liveness independent of queue saturation. allow enough termination grace for streams/checkpoints. use a poddisruptionbudget and staged node maintenance. cache images/weights and verify model revision/integrity. separate secrets and credentials from the image; use workload identity where available. for multi-rank training, all ranks should fail/restart coherently rather than leaving a job half alive. for inference, replica failure should affect a bounded traffic share. gpu observability with dcgm dcgm exporter exposes gpu telemetry to prometheus and can attach kubernetes pod identity. monitor: framebuffer memory used/free and oom events; sm activity and tensor activity where available; memory-copy activity and pcie/nvlink traffic; power, clocks, temperature, throttling; ecc/xid/health events; per-pod request latency, queue, throughput, and errors from the application. gpu utilization alone cannot tell compute-bound from memory-bound or stalled input. correlate dcgm with engine metrics and an nsight/profile trace during investigation. autoscaling and cost inference pods can scale on queue depth, request/token rate, slo burn, or engine metrics. node autoscaling must also provide gpu nodes, which may take minutes to provision and load. plan headroom, warm pools, image pre-pull, weight caches, and scale-down drain. scaling a pod to zero does not save money if its gpu node remains running. conversely, interactive slos may require a warm minimum. batch jobs can tolerate node/model cold start and are better candidates for scale-to-zero or spot/preemptible capacity with checkpoints. failure drill pod pending: check extended-resource availability, labels/affinity, taints/tolerations, quota, and node autoscaler constraints. gpu invisible in container: check node driver, container toolkit/runtime class, device plugin registration, and pod resource request. low utilization: correlate data/input, cpu throttling, storage/network, batch size, kernel gaps, and communication; do not immediately add gpus. xid/ecc errors: drain/cordon the affected node according to policy, preserve evidence, reschedule workload, and escalate hardware health. interview answer i would use a dedicated tainted gpu node pool managed by gpu operator, request gpus as extended resources, and constrain model/topology with labels and affinity. helm would package the serving release; startup/readiness/drain would protect model load and streams. prometheus would combine application slos with dcgm metrics, and scaling would use queue and latency pressure while accounting for slow gpu-node cold starts. for tp, i would keep ranks inside the fast-link domain and verify nccl topology. primary references kubernetes: schedule gpus nvidia gpu operator nvidia dcgm exporter → next: iac, gpus & cost control","words":819},{"path":"07-cloud-infra/iac-and-cost.md","title":"IaC, GPUs & Cost Control","section":"7 · Cloud & Infra","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"iac-gpus-cost-control\">IaC, GPUs &amp; Cost Control<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Infrastructure-as-code (Terraform) makes your cloud setup reproducible and reviewable instead of hand-clicked and forgotten. And because GPUs and always-on endpoints are expensive, cost control — right-sizing, spot instances, autoscaling, batching — is a real part of the job.<\/div><\/div>\n<h2 id=\"infrastructure-as-code-iac\">Infrastructure as code (IaC)<\/h2>\n<p>Instead of clicking around a cloud console to create servers and services, you <strong>declare your infrastructure in code<\/strong> (Terraform, CloudFormation, Pulumi) and apply it. Benefits: it's <strong>version-controlled<\/strong> (git history of your infra), <strong>reproducible<\/strong> (spin up an identical environment in another region or account), <strong>reviewable<\/strong> (changes go through PRs), and <strong>less error-prone<\/strong> than manual clicking. For ML, this means your training cluster, endpoints, and storage are defined and repeatable, not snowflakes someone set up once and can't recreate.<\/p>\n<h2 id=\"gpus-the-expensive-part\">GPUs: the expensive part<\/h2>\n<p>Training and heavy inference need GPUs, which are pricey and scarce, so how you use them matters:<\/p>\n<ul><li><strong>Right-size<\/strong> — don't put a huge GPU on a small model; match the instance to the need.<\/li><li><strong>Spot / preemptible instances<\/strong> — big discounts (often 60–90%) for interruptible<\/li><\/ul>\n<p>workloads like training and batch scoring; pair with checkpointing so an interruption   just resumes.<\/p>\n<ul><li><strong>Don't leave GPUs idle<\/strong> — a forgotten running training instance is pure burned money;<\/li><\/ul>\n<p>automate teardown.<\/p>\n<h2 id=\"cost-control-for-serving\">Cost control for serving<\/h2>\n<p>An always-on real-time endpoint costs money every hour whether or not it's used:<\/p>\n<ul><li><strong>Autoscaling<\/strong> — scale replicas with traffic; <strong>scale-to-zero<\/strong> for rarely-used models<\/li><\/ul>\n<p>(KServe) so idle costs nothing.<\/p>\n<ul><li><strong>Batch over real-time<\/strong> — if the use case tolerates it, a scheduled batch job is far<\/li><\/ul>\n<p>cheaper than a 24/7 endpoint (section 5).<\/p>\n<ul><li><strong>Batching requests<\/strong> — group incoming requests so the GPU processes many at once,<\/li><\/ul>\n<p>raising throughput per dollar (section 8).<\/p>\n<ul><li><strong>Right-size + cheaper hardware<\/strong> — CPU or smaller instances for light models; quantized<\/li><\/ul>\n<p>models (section 8) that run on less.<\/p>\n<h2 id=\"the-framing\">The framing<\/h2>\n<p>Cost is an engineering constraint, not an afterthought: <em>\"I treat compute cost like latency — a number to design against. I default to batch and autoscaling, use spot for training with checkpointing, and only run always-on GPU endpoints when the product truly needs real-time.\"<\/em> Cost-awareness signals someone who's run real systems, not just demos.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Infra-as-code is <strong>Terraform<\/strong> (or Pulumi / CloudFormation); node autoscaling uses <strong>Karpenter<\/strong> or the cluster-autoscaler; cost visibility is <strong>Kubecost<\/strong> or native cloud cost tools. Training runs on <strong>spot / preemptible<\/strong> instances with checkpointing to object storage.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"The whole cluster and endpoints were defined in Terraform; training ran on spot nodes via Karpenter with checkpoints to S3, and Kubecost kept the GPU bill honest.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Two benefits of infrastructure-as-code? *(reproducible, version-controlled/reviewable,<\/li><\/ul>\n<p>less error-prone — any two.)*<\/p>\n<ul><li>How do you train cheaply on GPUs? *(spot/preemptible instances with checkpointing;<\/li><\/ul>\n<p>right-size; tear down when idle.)*<\/p>\n<ul><li>Two ways to cut serving cost? *(autoscaling/scale-to-zero, prefer batch, batch<\/li><\/ul>\n<p>requests, quantize/right-size — any two.)*<\/p>","toc":[{"level":2,"id":"infrastructure-as-code-iac","text":"Infrastructure as code (IaC)"},{"level":2,"id":"gpus-the-expensive-part","text":"GPUs: the expensive part"},{"level": s — group incoming requests so the gpu processes many at once, raising throughput per dollar (section 8). right-size + cheaper hardware — cpu or smaller instances for light models; quantized models (section 8) that run on less. the framing cost is an engineering constraint, not an afterthought: \"i treat compute cost like latency — a number to design against. i default to batch and autoscaling, use spot for training with checkpointing, and only run always-on gpu endpoints when the product truly needs real-time.\" cost-awareness signals someone who's run real systems, not just demos. 🔗 connecting the dots: the real stack infra-as-code is terraform (or pulumi / cloudformation); node autoscaling uses karpenter or the cluster-autoscaler; cost visibility is kubecost or native cloud cost tools. training runs on spot / preemptible instances with checkpointing to object storage. how you'd say it: \"the whole cluster and endpoints were defined in terraform; training ran on spot nodes via karpenter with checkpoints to s3, and kubecost kept the gpu bill honest.\" self-check two benefits of infrastructure-as-code? *(reproducible, version-controlled/reviewable, less error-prone — any two.)* how do you train cheaply on gpus? *(spot/preemptible instances with checkpointing; right-size; tear down when idle.)* two ways to cut serving cost? *(autoscaling/scale-to-zero, prefer batch, batch requests, quantize/right-size — any two.)*","words":471},{"path":"08-optimization-scaling/README.md","title":"Overview","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"8-optimization-scaling\">8: Optimization &amp; Scaling<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD's \"optimize models for speed, efficiency, and scale.\" Two directions: make the <strong>model<\/strong> smaller/faster (quantization, pruning, distillation), and make the <strong>training and serving<\/strong> scale (distributed training, batching, caching). The goal is the same accuracy at lower latency and cost.<\/div><\/div>\n<h2 id=\"why-optimize-at-all\">Why optimize at all<\/h2>\n<p>A model that's accurate but too slow or too expensive to serve is a failed product. Optimization is how you fit a good model into a real latency budget and a real cloud bill. It's also increasingly essential for large models (LLMs, section 9), where naive serving is prohibitively costly.<\/p>\n<h2 id=\"the-four-pages\">The four pages<\/h2>\n<ul><li><strong>Quantization, pruning, distillation<\/strong> — shrinking the model itself.<\/li><li><strong>Distributed training<\/strong> — scaling the training side (a companion to section 3).<\/li><li><strong>NCCL &amp; distributed collectives<\/strong> — all-reduce, all-gather, reduce-scatter,<\/li><\/ul>\n<p>topology, overlap, and diagnosing communication bottlenecks.<\/p>\n<ul><li><strong>Inference &amp; serving optimization<\/strong> — batching, caching, and serving tricks that cut<\/li><\/ul>\n<p>latency and cost.<\/p>\n<h2 id=\"the-mental-split\">The mental split<\/h2>\n<div class=\"compare\">\n  <div class=\"cmp-col accent\">\n    <div class=\"cmp-h\">Make the MODEL cheaper<\/div>\n    <ul>\n      <li>quantization (lower precision)<\/li>\n      <li>pruning (remove weights)<\/li>\n      <li>distillation (small student)<\/li>\n    <\/ul>\n  <\/div>\n  <div class=\"cmp-col blue\">\n    <div class=\"cmp-h\">Make the SYSTEM scale<\/div>\n    <ul>\n      <li>distributed training (more GPUs)<\/li>\n      <li>batching (more per GPU pass)<\/li>\n      <li>caching (skip recompute)<\/li>\n      <li>autoscaling (match load, §7)<\/li>\n    <\/ul>\n  <\/div>\n<\/div>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"model-compression.md\" href=\"#\">model-compression.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-optimize-at-all","text":"Why optimize at all"},{"level":2,"id":"the-four-pages","text":"The four pages"},{"level":2,"id":"the-mental-split","text":"The mental split"}],"text":"8: optimization & scaling 💡 tl;dr the jd's \"optimize models for speed, efficiency, and scale.\" two directions: make the model smaller/faster (quantization, pruning, distillation), and make the training and serving scale (distributed training, batching, caching). the goal is the same accuracy at lower latency and cost. why optimize at all a model that's accurate but too slow or too expensive to serve is a failed product. optimization is how you fit a good model into a real latency budget and a real cloud bill. it's also increasingly essential for large models (llms, section 9), where naive serving is prohibitively costly. the four pages quantization, pruning, distillation — shrinking the model itself. distributed training — scaling the training side (a companion to section 3). nccl & distributed collectives — all-reduce, all-gather, reduce-scatter, topology, overlap, and diagnosing communication bottlenecks. inference & serving optimization — batching, caching, and serving tricks that cut latency and cost. the mental split make the model cheaper quantization (lower precision) pruning (remove weights) distillation (small student) make the system scale distributed training (more gpus) batching (more per gpu pass) caching (skip recompute) autoscaling (match load, §7) → start: model-compression.md","words":191},{"path":"08-optimization-scaling/model-compression.md","title":"Quantization, Pruning, Distillation","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"quantization-pruning-distillation\">Quantization, Pruning, Distillation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Three ways to make a model smaller and faster with minimal accuracy loss. <strong>Quantization<\/strong> uses lower-precision numbers; <strong>pruning<\/strong> removes unimportant weights; <strong>distillation<\/strong> trains a small model to mimic a big one. All trade a little accuracy for a lot of speed and cost savings.<\/div><\/div>\n<h2 id=\"quantization\">Quantization<\/h2>\n<p>Models train in 32-bit floats (FP32), but you often don't need that precision to run them. <strong>Quantization<\/strong> converts weights (and activations) to lower precision — FP16, or INT8 — which <strong>shrinks the model ~2–4×, speeds up inference, and cuts memory<\/strong>.<\/p>\n<ul><li><strong>FP16 / BF16<\/strong> — half precision; ~2× faster, negligible accuracy loss; the easy win.<\/li><li><strong>INT8<\/strong> — 8-bit integers; bigger speedup but needs <strong>calibration<\/strong> and can cost some<\/li><\/ul>\n<p>accuracy, so you measure it.<\/p>\n<ul><li><strong>PTQ (post-training quantization)<\/strong> — quantize an already-trained model; fast, no<\/li><\/ul>\n<p>retraining, small accuracy hit.<\/p>\n<ul><li><strong>QAT (quantization-aware training)<\/strong> — simulate low precision <em>during<\/em> training so the<\/li><\/ul>\n<p>model adapts; recovers accuracy when PTQ drops too much.<\/p>\n<p>This is the most common inference optimization — cheap, broadly applicable, big payoff.<\/p>\n<h2 id=\"pruning\">Pruning<\/h2>\n<p>Neural nets are over-parameterized — many weights barely matter. <strong>Pruning<\/strong> removes the low-importance weights or whole channels, making the model smaller and (with structured pruning) faster, then you fine-tune to recover any lost accuracy. Think of it as trimming dead weight the network doesn't really use.<\/p>\n<h2 id=\"knowledge-distillation\">Knowledge distillation<\/h2>\n<p>Train a <strong>large, accurate \"teacher\"<\/strong> model, then train a <strong>small \"student\"<\/strong> model to mimic the teacher's outputs (its soft probabilities carry more information than hard labels). The student ends up much smaller and faster while keeping most of the teacher's accuracy. This is how many production and on-device models are made — and how smaller, cheaper LLMs are derived from big ones (e.g. DistilBERT).<\/p>\n<h2 id=\"choosing-combining\">Choosing / combining<\/h2>\n<p>They're complementary and often stacked: distill to a smaller architecture, prune it, then quantize for deployment. The one-line instinct: <em>\"Quantization first — it's the cheapest big win. Distillation when I need a fundamentally smaller model. Then compile with something like TensorRT/ONNX Runtime for the target hardware, always re-measuring accuracy after.\"<\/em><\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Compilers/runtimes: <strong>TensorRT<\/strong> and <strong>ONNX Runtime<\/strong> (fuse ops + quantize for the target hardware), <strong>HuggingFace Optimum<\/strong> as the bridge, native <strong>PyTorch quantization<\/strong>. For LLMs specifically: <strong>bitsandbytes<\/strong> (8/4-bit), <strong>GPTQ / AWQ<\/strong>, and <strong>llama.cpp / GGUF<\/strong> for CPU/edge. Distillation uses <strong>HuggingFace<\/strong> (e.g. DistilBERT).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"A CV model I'd quantize to INT8 and compile with TensorRT; an LLM I'd 4-bit quantize with bitsandbytes or serve a GGUF build — always re-measuring accuracy after.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Quantization in one line, and its cheapest form? *(use lower-precision numbers; FP16 is<\/li><\/ul>\n<p>the easy ~2× win.)*<\/p>\n<ul><li>PTQ vs QAT? *(quantize after training vs simulate low precision during training to<\/li><\/ul>\n<p>recover accuracy.)*<\/p>\n<ul><li>What is knowledge distillation? *(train a small student to mimic a big teacher —<\/li><\/ul>\n<p>smaller/faster, keeps most accuracy.)*<\/p>","toc":[{"level":2,"id":"quantization","text":"Quantization"},{"level":2,"id":"pruning","text":"Pruning"},{"level":2,"id":"knowledge-distillation","text":"Knowledge distillation"},{"level":2,"id":"choosing-combining","text":"Choosing / combining"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"quantization, pruning, distillation 💡 tl;dr three ways to make a model smaller and faster with minimal accuracy loss. quantization uses lower-precision numbers; pruning removes unimportant weights; distillation trains a small model to mimic a big one. all trade a little accuracy for a lot of speed and cost savings. quantization models train in 32-bit floats (fp32), but you often don't need that precision to run them. quantization converts weights (and activations) to lower precision — fp16, or int8 — which shrinks the model ~2–4×, speeds up inference, and cuts memory . fp16 / bf16 — half precision; ~2× faster, negligible accuracy loss; the easy win. int8 — 8-bit integers; bigger speedup but needs calibration and can cost some accuracy, so you measure it. ptq (post-training quantization) — quantize an already-trained model; fast, no retraining, small accuracy hit. qat (quantization-aware training) — simulate low precision during training so the model adapts; recovers accuracy when ptq drops too much. this is the most common inference optimization — cheap, broadly applicable, big payoff. pruning neural nets are over-parameterized — many weights barely matter. pruning removes the low-importance weights or whole channels, making the model smaller and (with structured pruning) faster, then you fine-tune to recover any lost accuracy. think of it as trimming dead weight the network doesn't really use. knowledge distillation train a large, accurate \"teacher\" model, then train a small \"student\" model to mimic the teacher's outputs (its soft probabilities carry more information than hard labels). the student ends up much smaller and faster while keeping most of the teacher's accuracy. this is how many production and on-device models are made — and how smaller, cheaper llms are derived from big ones (e.g. distilbert). choosing / combining they're complementary and often stacked: distill to a smaller architecture, prune it, then quantize for deployment. the one-line instinct: \"quantization first — it's the cheapest big win. distillation when i need a fundamentally smaller model. then compile with something like tensorrt/onnx runtime for the target hardware, always re-measuring accuracy after.\" 🔗 connecting the dots: the real stack compilers/runtimes: tensorrt and onnx runtime (fuse ops + quantize for the target hardware), huggingface optimum as the bridge, native pytorch quantization . for llms specifically: bitsandbytes (8/4-bit), gptq / awq , and llama.cpp / gguf for cpu/edge. distillation uses huggingface (e.g. distilbert). how you'd say it: \"a cv model i'd quantize to int8 and compile with tensorrt; an llm i'd 4-bit quantize with bitsandbytes or serve a gguf build — always re-measuring accuracy after.\" self-check quantization in one line, and its cheapest form? *(use lower-precision numbers; fp16 is the easy ~2× win.)* ptq vs qat? *(quantize after training vs simulate low precision during training to recover accuracy.)* what is knowledge distillation? *(train a small student to mimic a big teacher — smaller/faster, keeps most accuracy.)*","words":468},{"path":"08-optimization-scaling/distributed-training.md","title":"Distributed Training","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"distributed-training\">Distributed Training<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> When training is too slow or too big for one GPU, spread it out. <strong>Data parallelism<\/strong> (replicate the model, split the data, average gradients) handles most cases; <strong>model/pipeline parallelism<\/strong> handles models too big for one device. This page is the scaling companion to section 3.<\/div><\/div>\n<h2 id=\"the-two-axes-recap-and-go-deeper\">The two axes (recap and go deeper)<\/h2>\n<ul><li><strong>Data parallelism<\/strong> — every GPU holds a full copy of the model and processes a<\/li><\/ul>\n<p>different slice of each batch, then gradients are averaged (all-reduce) and all copies   update identically. Multiplies throughput; the bottleneck is the <strong>gradient sync<\/strong>   communication. Frameworks: PyTorch <strong>DDP<\/strong>, Horovod.<\/p>\n<ul><li><strong>Model parallelism<\/strong> — the model is too big for one GPU's memory, so you split the<\/li><\/ul>\n<p><em>model<\/em> across GPUs (different layers or tensor shards on different devices). More   communication-heavy; needed for very large models.<\/p>\n<ul><li><strong>Pipeline parallelism<\/strong> — split the model into stages across GPUs and stream<\/li><\/ul>\n<p>micro-batches through like an assembly line, keeping all stages busy.<\/p>\n<p>Large-model training (think LLMs) combines all three (\"3D parallelism\") — e.g. via DeepSpeed or Megatron.<\/p>\n<h2 id=\"memory-saving-tricks-worth-naming\">Memory-saving tricks worth naming<\/h2>\n<p>Even on the GPUs you have, a few techniques let you train bigger:<\/p>\n<ul><li><strong>Mixed precision (FP16/BF16)<\/strong> — half the memory, ~2× faster, standard.<\/li><li><strong>Gradient accumulation<\/strong> — simulate a big batch by accumulating gradients over several<\/li><\/ul>\n<p>small batches before updating — fits a large effective batch in small memory.<\/p>\n<ul><li><strong>Gradient checkpointing<\/strong> — trade compute for memory by recomputing activations in the<\/li><\/ul>\n<p>backward pass instead of storing them all.<\/p>\n<ul><li><strong>ZeRO / sharding<\/strong> — shard optimizer states and gradients across GPUs so no single one<\/li><\/ul>\n<p>holds everything (DeepSpeed ZeRO).<\/p>\n<h2 id=\"the-practical-instinct\">The practical instinct<\/h2>\n<p>Don't distribute prematurely — it adds real complexity and communication overhead. First squeeze one GPU (mixed precision, bigger batch, a smaller model), then scale to data parallelism across GPUs, and only reach for model/pipeline parallelism when the model genuinely doesn't fit. \"Scale when you must, not because you can.\"<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>The libraries: <strong>PyTorch DDP / FSDP<\/strong>, <strong>DeepSpeed<\/strong> (ZeRO), <strong>Megatron-LM<\/strong> (tensor/pipeline parallel), <strong>Horovod<\/strong>, <strong>Ray Train<\/strong>, and <strong>HuggingFace Accelerate<\/strong> to wrap it. Mixed precision is native <strong>AMP<\/strong>. It runs on multi-GPU clusters via <strong>SageMaker / Vertex / Databricks<\/strong> or K8s.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a model that didn't fit one GPU I used DeepSpeed ZeRO (or FSDP) with mixed precision across a multi-node GPU cluster.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Data vs model parallelism — when each? *(data: model fits, need more throughput; model:<\/li><\/ul>\n<p>model too big for one GPU.)*<\/p>\n<ul><li>What's the bottleneck in data parallelism? <em>(gradient synchronization / communication.)<\/em><\/li><li>Two ways to train a bigger model without more GPUs? *(mixed precision, gradient<\/li><\/ul>\n<p>accumulation, gradient checkpointing, ZeRO sharding — any two.)*<\/p>","toc":[{"level":2,"id":"the-two-axes-recap-and-go-deeper","text":"The two axes (recap and go deeper)"},{"level":2,"id":"memory-saving-tricks-worth-naming","text":"Memory-saving tricks worth naming"},{"level":2,"id":"the-practical-instinct","text":"The practical instinct"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"distributed training 💡 tl;dr when training is too slow or too big for one gpu, spread it out. data parallelism (replicate the model, split the data, average gradients) handles most cases; model/pipeline parallelism handles models too big for one device. this page is the scaling companion to section 3. the two axes (recap and go deeper) data parallelism — every gpu holds a full copy of the model and processes a different slice of each batch, then gradients are averaged (all-reduce) and all copies update identically. multiplies throughput; the bottleneck is the gradient sync communication. frameworks: pytorch ddp , horovod. model parallelism — the model is too big for one gpu's memory, so you split the model across gpus (different layers or tensor shards on different devices). more communication-heavy; needed for very large models. pipeline parallelism — split the model into stages across gpus and stream micro-batches through like an assembly line, keeping all stages busy. large-model training (think llms) combines all three (\"3d parallelism\") — e.g. via deepspeed or megatron. memory-saving tricks worth naming even on the gpus you have, a few techniques let you train bigger: mixed precision (fp16/bf16) — half the memory, ~2× faster, standard. gradient accumulation — simulate a big batch by accumulating gradients over several small batches before updating — fits a large effective batch in small memory. gradient checkpointing — trade compute for memory by recomputing activations in the backward pass instead of storing them all. zero / sharding — shard optimizer states and gradients across gpus so no single one holds everything (deepspeed zero). the practical instinct don't distribute prematurely — it adds real complexity and communication overhead. first squeeze one gpu (mixed precision, bigger batch, a smaller model), then scale to data parallelism across gpus, and only reach for model/pipeline parallelism when the model genuinely doesn't fit. \"scale when you must, not because you can.\" 🔗 connecting the dots: the real stack the libraries: pytorch ddp / fsdp , deepspeed (zero), megatron-lm (tensor/pipeline parallel), horovod , ray train , and huggingface accelerate to wrap it. mixed precision is native amp . it runs on multi-gpu clusters via sagemaker / vertex / databricks or k8s. how you'd say it: \"for a model that didn't fit one gpu i used deepspeed zero (or fsdp) with mixed precision across a multi-node gpu cluster.\" self-check data vs model parallelism — when each? *(data: model fits, need more throughput; model: model too big for one gpu.)* what's the bottleneck in data parallelism? (gradient synchronization / communication.) two ways to train a bigger model without more gpus? *(mixed precision, gradient accumulation, gradient checkpointing, zero sharding — any two.)*","words":440},{"path":"08-optimization-scaling/nccl-collectives.md","title":"NCCL & Distributed Collectives","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"nccl-distributed-collectives\">NCCL &amp; Distributed Collectives<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> NCCL implements GPU collectives over NVLink/NVSwitch, PCIe, shared memory, and network fabrics. Distributed performance depends on <em>which tensor moves in which collective, how many bytes move, across what topology, and whether communication overlaps useful compute<\/em>.<\/div><\/div>\n<h2 id=\"the-collective-vocabulary\">The collective vocabulary<\/h2>\n<p>For <code>P<\/code> ranks:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Collective<\/th><th>Result<\/th><th>Typical ML use<\/th><\/tr><\/thead><tbody><tr><td>broadcast<\/td><td>one rank's tensor copied to all<\/td><td>initialize/model state distribution<\/td><\/tr><tr><td>all-reduce<\/td><td>reduce values, result on every rank<\/td><td>DDP gradient synchronization<\/td><\/tr><tr><td>reduce-scatter<\/td><td>reduce then give each rank one shard<\/td><td>sharded gradient/optimizer flow<\/td><\/tr><tr><td>all-gather<\/td><td>gather shards so every rank has the full tensor<\/td><td>FSDP parameter materialization<\/td><\/tr><tr><td>all-to-all<\/td><td>each rank sends a distinct shard to each other rank<\/td><td>MoE expert-token routing<\/td><\/tr><tr><td>send/recv<\/td><td>point-to-point transfer<\/td><td>pipeline-parallel activations<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The operation name is less important than the byte path. Ask: tensor shape/dtype, frequency, world size, link bandwidth/latency, and whether it blocks the critical path.<\/p>\n<h2 id=\"how-parallelism-creates-communication\">How parallelism creates communication<\/h2>\n<ul><li><strong>DDP:<\/strong> each rank computes gradients on a different batch shard; gradient buckets are<\/li><\/ul>\n<p>all-reduced so replicas apply the same update.<\/p>\n<ul><li><strong>FSDP/ZeRO:<\/strong> parameters are all-gathered when needed and gradients reduce-scattered back<\/li><\/ul>\n<p>to owners, reducing memory but increasing communication sensitivity.<\/p>\n<ul><li><strong>Tensor parallelism:<\/strong> layer matmuls are split; collectives can occur every transformer<\/li><\/ul>\n<p>block, so low-latency high-bandwidth links are critical.<\/p>\n<ul><li><strong>Pipeline parallelism:<\/strong> adjacent stages send activations/gradients; microbatches reduce<\/li><\/ul>\n<p>idle bubbles but add scheduling complexity.<\/p>\n<ul><li><strong>MoE expert parallelism:<\/strong> token routing often creates all-to-all traffic and load skew.<\/li><\/ul>\n<p>This is why \"eight GPUs\" is not a complete resource description. Eight GPUs under one NVSwitch are a different machine from eight GPUs spread across slow nodes.<\/p>\n<h2 id=\"ring-intuition\">Ring intuition<\/h2>\n<p>A ring all-reduce can be viewed as reduce-scatter followed by all-gather. Each rank exchanges chunks with neighbors, using bandwidth efficiently for large tensors. Tree-style algorithms can reduce latency for smaller messages. Libraries select algorithms/protocols from topology and message size; your job is to provide a correct topology and measure, not force folklore.<\/p>\n<h2 id=\"communication-to-compute-ratio\">Communication-to-compute ratio<\/h2>\n<p>Scaling helps while reduced compute time exceeds added communication and coordination. Small per-rank batches, frequent tiny collectives, slow inter-node links, or imbalance can make more GPUs slower.<\/p>\n<p>Approximate the step:<\/p>\n<div class=\"formula\"><div class=\"frow\"><span class=\"fexpr\">step_time ≈ exposed_compute + exposed_communication + input + imbalance<\/span><\/div><\/div>\n<p>\"Exposed\" matters because DDP can overlap bucket all-reduce with backprop. A 100 ms collective is less harmful if 80 ms overlaps compute than if all 100 ms sits after backprop.<\/p>\n<h2 id=\"overlap-techniques\">Overlap techniques<\/h2>\n<ul><li>bucket gradients so early layers communicate while later backprop continues;<\/li><li>use asynchronous collectives only with correct stream/event dependencies;<\/li><li>prefetch FSDP parameter shards before their layer executes;<\/li><li>overlap pipeline stages with microbatches;<\/li><li>avoid CPU synchronizations that drain CUDA streams;<\/li><li>size batches/sequence packing so ranks have balanced useful work.<\/li><\/ul>\n<p>Overlap can increase peak memory because tensors live longer. Measure both step time and memory headroom.<\/p>\n<h2 id=\"topology-checklist\">Topology checklist<\/h2>\n<ol><li>Inspect GPU-to-GPU topology and link type (<code>nvidia-smi topo -m<\/code>).<\/li><li>Keep chatty tensor-parallel groups inside NVLink/NVSwitch domains.<\/li><li>For cross-node jobs, verify NIC bandwidth, RDMA/GPU-direct path, interface choice, MTU,<\/li><\/ol>\n<p>and that traffic does not fall back silently to a slow route.<\/p>\n<ol><li>Place ranks consistently and ensure each process binds the correct device.<\/li><li>Compare collective bandwidth with expected fabric capability before blaming the model.<\/li><\/ol>\n<h2 id=\"debugging-a-scaling-regression\">Debugging a scaling regression<\/h2>\n<p>When 4→8 GPUs gives little or negative speedup:<\/p>\n<ul><li>compare per-rank compute, collective, input, and idle time in a distributed trace;<\/li><li>check one slow rank (data skew, thermal issue, CPU/storage contention) because collectives<\/li><\/ul>\n<p>wait for stragglers;<\/p>\n<ul><li>inspect message sizes and bucket timing;<\/li><li>verify topology and whether traffic crossed nodes/PCIe unexpectedly;<\/li><li>confirm per-rank batch did not become too small;<\/li><li>look for data-loader duplication or shared-storage saturation;<\/li><li>enable targeted NCCL diagnostics such as <code>NCCL_DEBUG=INFO<\/code> for the failing run, then turn<\/li><\/ul>\n<p>verbosity back down.<\/p>\n<p>Collective hangs are often rank divergence: one rank errored, took a different branch, or called collectives in a different order. Capture logs from every rank and preserve the first failure, not just the eventual timeout.<\/p>\n<h2 id=\"inference-relevance\">Inference relevance<\/h2>\n<p>Tensor-parallel LLM decode invokes frequent collectives for small per-token work, making link latency especially visible. Pipeline parallelism can cross nodes more naturally but adds bubbles and activation transfer. Data-parallel replicas avoid cross-replica communication at inference and are ideal for throughput once the model fits per replica.<\/p>\n<h2 id=\"interview-answers\">Interview answers<\/h2>\n<p><strong>Q: All-reduce vs reduce-scatter + all-gather?<\/strong> All-reduce leaves the full reduced result on every rank. Reduce-scatter leaves one reduced shard per rank; all-gather reconstructs the full tensor later. Sharded training uses the split to save memory and schedule communication around layer use.<\/p>\n<p><strong>Q: Why can TP across nodes hurt LLM latency?<\/strong> Each layer may wait on collectives, and decode has little compute per token to hide them. Inter-node latency/bandwidth can dominate; keep TP in a fast-link domain or reconsider PP/model shape.<\/p>\n<p><strong>Q: What proves NCCL is the bottleneck?<\/strong> A distributed trace showing exposed collective time on the critical path, low compute overlap, and measured collective bandwidth below or near the topology limit—not merely low GPU usage.<\/p>\n<h2 id=\"primary-references\">Primary references<\/h2>\n<ul><li><a href=\"https://docs.pytorch.org/docs/stable/distributed.html\" target=\"_blank\" rel=\"noopener\">PyTorch distributed communication package<\/a><\/li><li><a href=\"https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/\" target=\"_blank\" rel=\"noopener\">NVIDIA NCCL user guide<\/a><\/li><\/ul>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"inference-optimization.md\" href=\"#\">Inference &amp; Serving Optimization<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-collective-vocabulary","text":"The collective vocabulary"},{"level":2,"id":"how-parallelism-creates-communication","text":"How parallelism creates communication"},{"level":2,"id":"ring-intuition","text":"Ring intuition"},{"level":2,"id":"communication-to-compute-ratio","text":"Communication-to-compute ratio"},{"level":2,"id":"overlap-techniques","text":"Overlap techniques"},{"level":2,"id":"topology-checklist","text":"Topology checklist"},{"level":2,"id":"debugging-a-scaling-regression","text":"Debugging a scaling regression"},{"level":2,"id":"inference-relevance","text":"Inference relevance"},{"level":2,"id":"interview-answers","text":"Interview answers"},{"level":2,"id":"primary-references","text":"Primary references"}],"text":"nccl & distributed collectives 💡 tl;dr nccl implements gpu collectives over nvlink/nvswitch, pcie, shared memory, and network fabrics. distributed performance depends on which tensor moves in which collective, how many bytes move, across what topology, and whether communication overlaps useful compute . the collective vocabulary for p ranks: collective result typical ml use broadcast one rank's tensor copied to all initialize/model state distribution all-reduce reduce values, result on every rank ddp gradient synchronization reduce-scatter reduce then give each rank one shard sharded gradient/optimizer flow all-gather gather shards so every rank has the full tensor fsdp parameter materialization all-to-all each rank sends a distinct shard to each other rank moe expert-token routing send/recv point-to-point transfer pipeline-parallel activations the operation name is less important than the byte path. ask: tensor shape/dtype, frequency, world size, link bandwidth/latency, and whether it blocks the critical path. how parallelism creates communication ddp: each rank computes gradients on a different batch shard; gradient buckets are all-reduced so replicas apply the same update. fsdp/zero: parameters are all-gathered when needed and gradients reduce-scattered back to owners, reducing memory but increasing communication sensitivity. tensor parallelism: layer matmuls are split; collectives can occur every transformer block, so low-latency high-bandwidth links are critical. pipeline parallelism: adjacent stages send activations/gradients; microbatches reduce idle bubbles but add scheduling complexity. moe expert parallelism: token routing often creates all-to-all traffic and load skew. this is why \"eight gpus\" is not a complete resource description. eight gpus under one nvswitch are a different machine from eight gpus spread across slow nodes. ring intuition a ring all-reduce can be viewed as reduce-scatter followed by all-gather. each rank exchanges chunks with neighbors, using bandwidth efficiently for large tensors. tree-style algorithms can reduce latency for smaller messages. libraries select algorithms/protocols from topology and message size; your job is to provide a correct topology and measure, not force folklore. communication-to-compute ratio scaling helps while reduced compute time exceeds added communication and coordination. small per-rank batches, frequent tiny collectives, slow inter-node links, or imbalance can make more gpus slower. approximate the step: step_time ≈ exposed_compute + exposed_communication + input + imbalance \"exposed\" matters because ddp can overlap bucket all-reduce with backprop. a 100 ms collective is less harmful if 80 ms overlaps compute than if all 100 ms sits after backprop. overlap techniques bucket gradients so early layers communicate while later backprop continues; use asynchronous collectives only with correct stream/event dependencies; prefetch fsdp parameter shards before their layer executes; overlap pipeline stages with microbatches; avoid cpu synchronizations that drain cuda streams; size batches/sequence packing so ranks have balanced useful work. overlap can increase peak memory because tensors live longer. measure both step time and memory headroom. topology checklist inspect gpu-to-gpu topology and link type ( nvidia-smi topo -m ). keep chatty tensor-parallel groups inside nvlink/nvswitch domains. for cross-node jobs, verify nic bandwidth, rdma/gpu-direct path, interface choice, mtu, and that traffic does not fall back silently to a slow route. place ranks consistently and ensure each process binds the correct device. compare collective bandwidth with expected fabric capability before blaming the model. debugging a scaling regression when 4→8 gpus gives little or negative speedup: compare per-rank compute, collective, input, and idle time in a distributed trace; check one slow rank (data skew, thermal issue, cpu/storage contention) because collectives wait for stragglers; inspect message sizes and bucket timing; verify topology and whether traffic crossed nodes/pcie unexpectedly; confirm per-rank batch did not become too small; look for data-loader duplication or shared-storage saturation; enable targeted nccl diagnostics such as nccl_debug=info for the failing run, then turn verbosity back down. collective hangs are often rank divergence: one rank errored, took a different branch, or called collectives in a different order. capture logs from every rank and preserve the first failure, not just the eventual timeout. inference relevance tensor-parallel llm decode invokes frequent collectives for small per-token work, making link latency especially visible. pipeline parallelism can cross nodes more naturally but adds bubbles and activation transfer. data-parallel replicas avoid cross-replica communication at inference and are ideal for throughput once the model fits per replica. interview answers q: all-reduce vs reduce-scatter + all-gather? all-reduce leaves the full reduced result on every rank. reduce-scatter leaves one reduced shard per rank; all-gather reconstructs the full tensor later. sharded training uses the split to save memory and schedule communication around layer use. q: why can tp across nodes hurt llm latency? each layer may wait on collectives, and decode has little compute per token to hide them. inter-node latency/bandwidth can dominate; keep tp in a fast-link domain or reconsider pp/model shape. q: what proves nccl is the bottleneck? a distributed trace showing exposed collective time on the critical path, low compute overlap, and measured collective bandwidth below or near the topology limit—not merely low gpu usage. primary references pytorch distributed communication package nvidia nccl user guide → next: inference & serving optimization","words":810},{"path":"08-optimization-scaling/inference-optimization.md","title":"Inference & Serving Optimization","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"inference-serving-optimization\">Inference &amp; Serving Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Serving optimization is about lower <strong>latency<\/strong> and higher <strong>throughput per dollar<\/strong> at prediction time. The big levers: <strong>batching<\/strong> requests, <strong>caching<\/strong> repeated results, compiling the model for the hardware, and scaling smartly. Distinct from training optimization — here you're tuning the live service.<\/div><\/div>\n<h2 id=\"latency-vs-throughput-frame-it-first\">Latency vs throughput (frame it first)<\/h2>\n<p>Two different goals that sometimes conflict. <strong>Latency<\/strong> = how fast a single prediction returns (what one user feels). <strong>Throughput<\/strong> = how many predictions per second the system handles (what your bill reflects). Some tricks (batching) boost throughput but can <em>add<\/em> latency, so you optimize for the one the product needs — usually a p99 latency target at the lowest cost.<\/p>\n<p><strong>See the tension.<\/strong> Increase batch size below: throughput (solid line) climbs as the GPU is better utilized, but latency-per-batch (dashed) rises too. Small batches are latency-optimal; large batches are throughput-optimal. Dynamic batching just picks a point on this curve that fits your p99 budget.<\/p>\n<div id=\"batch-widget\" class=\"widget-host\"><\/div>\n<h2 id=\"the-main-levers\">The main levers<\/h2>\n<ul><li><strong>Batching<\/strong> — instead of running the model once per request, group several requests and<\/li><\/ul>\n<p>run them together in one GPU pass. GPUs love parallelism, so this dramatically raises   throughput. <strong>Dynamic batching<\/strong> (Triton, KServe) waits a few milliseconds to collect a   batch — a small, bounded latency cost for a big throughput gain.<\/p>\n<ul><li><strong>Caching<\/strong> — if the same input (or a common one) recurs, cache the prediction and skip<\/li><\/ul>\n<p>the model entirely. Huge for repeated queries; also used for embeddings and, in LLMs,   for prompt/KV caching.<\/p>\n<ul><li><strong>Model compilation / optimized runtimes<\/strong> — compile the model for the target hardware<\/li><\/ul>\n<p>with <strong>TensorRT<\/strong>, <strong>ONNX Runtime<\/strong>, or <strong>TorchScript<\/strong>: they fuse operations, pick fast   kernels, and apply the precision from section 8's compression. Often a big speedup for   free.<\/p>\n<ul><li><strong>Right hardware<\/strong> — GPU for heavy/parallel models, CPU for light ones; specialized<\/li><\/ul>\n<p>accelerators (Inferentia, TPU) where they fit.<\/p>\n<ul><li><strong>Autoscaling<\/strong> (section 7) — match replica count to load; scale to zero when idle.<\/li><\/ul>\n<h2 id=\"putting-it-together\">Putting it together<\/h2>\n<p>A typical optimized online service: a <strong>quantized, TensorRT-compiled model<\/strong>, behind a server that does <strong>dynamic batching<\/strong>, with a <strong>cache<\/strong> for hot inputs, running on <strong>autoscaling<\/strong> GPU replicas. Each layer attacks cost or latency without touching accuracy.<\/p>\n<h2 id=\"measure-dont-guess\">Measure, don't guess<\/h2>\n<p>The engineering discipline is the same as everywhere: <strong>profile to find the actual bottleneck<\/strong> (is it the model, the preprocessing, the network, the batching wait?) and attack the biggest number — rather than optimizing what you assume is slow. \"I profile first\" is always the right thing to say.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Serving optimizers: <strong>Triton<\/strong> (dynamic batching, multi-framework) and <strong>TensorRT / ONNX Runtime<\/strong> for classic models; <strong>vLLM<\/strong> and <strong>TGI<\/strong> for LLMs (paged KV-cache, continuous batching); <strong>Redis<\/strong> for caching hot inputs/embeddings; autoscaling via <strong>KServe<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"CV inference went through Triton with dynamic batching on TensorRT engines; LLM inference through vLLM for KV-cache batching, with a Redis semantic cache in front.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Latency vs throughput — how can they conflict? *(batching raises throughput but adds<\/li><\/ul>\n<p>latency while requests are grouped.)*<\/p>\n<ul><li>How does batching help on a GPU? *(runs many requests in one parallel pass → much higher<\/li><\/ul>\n<p>throughput per dollar.)*<\/p>\n<ul><li>Name two serving-optimization levers besides batching. *(caching, model compilation<\/li><\/ul>\n<p>(TensorRT/ONNX), right hardware, autoscaling — any two.)*<\/p>","toc":[{"level":2,"id":"latency-vs-throughput-frame-it-first","text":"Latency vs throughput (frame it first)"},{"level":2,"id":"the-main-levers","text":"The main levers"},{"level":2,"id":"putting-it-together","text":"Putting it together"},{"level":2,"id":"measure-dont-guess","text":"Measure, don't guess"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"inference & serving optimization 💡 tl;dr serving optimization is about lower latency and higher throughput per dollar at prediction time. the big levers: batching requests, caching repeated results, compiling the model for the hardware, and scaling smartly. distinct from training optimization — here you're tuning the live service. latency vs throughput (frame it first) two different goals that sometimes conflict. latency = how fast a single prediction returns (what one user feels). throughput = how many predictions per second the system handles (what your bill reflects). some tricks (batching) boost throughput but can add latency, so you optimize for the one the product needs — usually a p99 latency target at the lowest cost. see the tension. increase batch size below: throughput (solid line) climbs as the gpu is better utilized, but latency-per-batch (dashed) rises too. small batches are latency-optimal; large batches are throughput-optimal. dynamic batching just picks a point on this curve that fits your p99 budget. the main levers batching — instead of running the model once per request, group several requests and run them together in one gpu pass. gpus love parallelism, so this dramatically raises throughput. dynamic batching (triton, kserve) waits a few milliseconds to collect a batch — a small, bounded latency cost for a big throughput gain. caching — if the same input (or a common one) recurs, cache the prediction and skip the model entirely. huge for repeated queries; also used for embeddings and, in llms, for prompt/kv caching. model compilation / optimized runtimes — compile the model for the target hardware with tensorrt , onnx runtime , or torchscript : they fuse operations, pick fast kernels, and apply the precision from section 8's compression. often a big speedup for free. right hardware — gpu for heavy/parallel models, cpu for light ones; specialized accelerators (inferentia, tpu) where they fit. autoscaling (section 7) — match replica count to load; scale to zero when idle. putting it together a typical optimized online service: a quantized, tensorrt-compiled model , behind a server that does dynamic batching , with a cache for hot inputs, running on autoscaling gpu replicas. each layer attacks cost or latency without touching accuracy. measure, don't guess the engineering discipline is the same as everywhere: profile to find the actual bottleneck (is it the model, the preprocessing, the network, the batching wait?) and attack the biggest number — rather than optimizing what you assume is slow. \"i profile first\" is always the right thing to say. 🔗 connecting the dots: the real stack serving optimizers: triton (dynamic batching, multi-framework) and tensorrt / onnx runtime for classic models; vllm and tgi for llms (paged kv-cache, continuous batching); redis for caching hot inputs/embeddings; autoscaling via kserve . how you'd say it: \"cv inference went through triton with dynamic batching on tensorrt engines; llm inference through vllm for kv-cache batching, with a redis semantic cache in front.\" self-check latency vs throughput — how can they conflict? *(batching raises throughput but adds latency while requests are grouped.)* how does batching help on a gpu? *(runs many requests in one parallel pass → much higher throughput per dollar.)* name two serving-optimization levers besides batching. *(caching, model compilation (tensorrt/onnx), right hardware, autoscaling — any two.)*","words":536},{"path":"09-generative-ai-llms/README.md","title":"Overview","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"9-generative-ai-llms\">9: Generative AI &amp; LLMs<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD's \"staying up to date, including Generative AI.\" Every team asks about this now, even non-LLM roles. You need: how transformers/LLMs work at a high level, the practical ways to <em>use<\/em> them (prompting, <strong>RAG<\/strong>, fine-tuning), and how you run them in production (LLMOps and evaluation). This is the newest, most-asked section.<\/div><\/div>\n<h2 id=\"why-it-matters-even-if-the-role-isnt-llm\">Why it matters even if the role isn't \"LLM\"<\/h2>\n<p>Generative AI has become table stakes — interviewers want to see you understand it well enough to make sound build decisions, not just that you've heard the buzzwords. The most valuable thing you can show is <strong>judgment<\/strong>: when to prompt, when to add retrieval, when to fine-tune, and how to keep an LLM app reliable and affordable.<\/p>\n<h2 id=\"the-four-pages\">The four pages<\/h2>\n<ul><li><strong>Transformers &amp; how LLMs work<\/strong> — attention, tokens, and what \"predict the next token\"<\/li><\/ul>\n<p>really means.<\/p>\n<ul><li><strong>Prompting &amp; RAG<\/strong> — the two most common ways to get an LLM to do your task without<\/li><\/ul>\n<p>training it.<\/p>\n<ul><li><strong>Fine-tuning &amp; PEFT (LoRA)<\/strong> — when and how to actually adapt a model's weights.<\/li><li><strong>LLMOps &amp; evaluation<\/strong> — serving, cost, guardrails, and the hard problem of evaluating<\/li><\/ul>\n<p>generated text.<\/p>\n<h2 id=\"the-decision-spine-hold-this-in-your-head\">The decision spine (hold this in your head)<\/h2>\n<div class=\"diagram\">\n  <table class=\"maptable\">\n    <thead><tr><th>Need the LLM to do X?<\/th><th class=\"marw\"><\/th><th>Reach for…<\/th><\/tr><\/thead>\n    <tbody>\n      <tr><td class=\"mfrom\">start here<\/td><td class=\"marw\"><\/td><td class=\"mto\"><b>PROMPTING<\/b> — cheapest, fastest<\/td><\/tr>\n      <tr><td class=\"mfrom\">needs your private / fresh knowledge<\/td><td class=\"marw\"><\/td><td class=\"mto\">add <b>RAG<\/b> (retrieval)<\/td><\/tr>\n      <tr><td class=\"mfrom\">needs a style / behavior prompting can't get<\/td><td class=\"marw\"><\/td><td class=\"mto\"><b>FINE-TUNE<\/b><\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"transformers-and-llms.md\" href=\"#\">transformers-and-llms.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-it-matters-even-if-the-role-isnt-llm","text":"Why it matters even if the role isn't \"LLM\""},{"level":2,"id":"the-four-pages","text":"The four pages"},{"level":2,"id":"the-decision-spine-hold-this-in-your-head","text":"The decision spine (hold this in your head)"}],"text":"9: generative ai & llms 💡 tl;dr the jd's \"staying up to date, including generative ai.\" every team asks about this now, even non-llm roles. you need: how transformers/llms work at a high level, the practical ways to use them (prompting, rag , fine-tuning), and how you run them in production (llmops and evaluation). this is the newest, most-asked section. why it matters even if the role isn't \"llm\" generative ai has become table stakes — interviewers want to see you understand it well enough to make sound build decisions, not just that you've heard the buzzwords. the most valuable thing you can show is judgment : when to prompt, when to add retrieval, when to fine-tune, and how to keep an llm app reliable and affordable. the four pages transformers & how llms work — attention, tokens, and what \"predict the next token\" really means. prompting & rag — the two most common ways to get an llm to do your task without training it. fine-tuning & peft (lora) — when and how to actually adapt a model's weights. llmops & evaluation — serving, cost, guardrails, and the hard problem of evaluating generated text. the decision spine (hold this in your head) need the llm to do x? reach for… start here prompting — cheapest, fastest needs your private / fresh knowledge add rag (retrieval) needs a style / behavior prompting can't get fine-tune → start: transformers-and-llms.md","words":238},{"path":"09-generative-ai-llms/transformers-and-llms.md","title":"Transformers & How LLMs Work","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"transformers-how-llms-work\">Transformers &amp; How LLMs Work<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> An LLM is a very large transformer trained to <strong>predict the next token<\/strong> over huge amounts of text. Its superpower is <strong>attention<\/strong>, which lets it weigh how every word relates to every other. That simple objective, at scale, produces the fluent, general behavior we see.<\/div><\/div>\n<h2 id=\"tokens-and-next-token-prediction\">Tokens and next-token prediction<\/h2>\n<p>LLMs don't see words or letters — they see <strong>tokens<\/strong> (word pieces). The model is trained on one deceptively simple task: given the tokens so far, <strong>predict the next token<\/strong>. Do that over trillions of tokens of text and, to get good at it, the model has to implicitly learn grammar, facts, reasoning patterns, and style. At generation time it predicts a token, appends it, and repeats — that's \"autoregressive\" generation.<\/p>\n<p>A knob to know: <strong>temperature<\/strong> controls randomness of that next-token choice — low = more deterministic/factual, high = more creative/varied.<\/p>\n<h2 id=\"attention-the-core-idea\">Attention (the core idea)<\/h2>\n<p>The transformer's key mechanism is <strong>self-attention<\/strong>: for each token, the model computes how much every <em>other<\/em> token should influence it, and blends them accordingly. This lets it capture long-range relationships (\"it\" refers to which noun?) and, unlike older RNNs, process the whole sequence <strong>in parallel<\/strong> — which is exactly why transformers scale to huge models and datasets.<\/p>\n<div class=\"example\">\n  <span class=\"ex-q\">\"The cat sat on the mat because <span class=\"hl\">it<\/span> was tired\"<\/span>\n  <span class=\"ex-a\">Attention lets <b>\"it\"<\/b> look back and weight <span class=\"hl\">\"cat\"<\/span> strongly → resolving the reference.<\/span>\n<\/div>\n<p>You don't need the matrix math for most interviews — you need \"attention weighs the relationship between all pairs of tokens, in parallel, which is why transformers scale.\"<\/p>\n<h2 id=\"context-window\">Context window<\/h2>\n<p>The <strong>context window<\/strong> is how many tokens the model can consider at once (its working memory). Everything — your prompt, retrieved documents, the conversation — must fit. It's a real constraint that shapes design (it's <em>why<\/em> RAG chunks documents, next page) and a cost driver (more tokens = more compute).<\/p>\n<h2 id=\"why-theyre-called-foundation-models\">Why they're called \"foundation models\"<\/h2>\n<p>A single pretrained LLM can be adapted to many tasks (summarize, classify, code, chat) without training a new model each time — via prompting or light fine-tuning. That generality is why they're \"foundation\" models and why the practical skill is <em>adapting<\/em> them (next pages), not training them from scratch (almost no one does that).<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>You either call a <strong>hosted API<\/strong> (<strong>OpenAI<\/strong>, <strong>Anthropic<\/strong>, <strong>Cohere<\/strong>) or run an <strong>open model<\/strong> (<strong>Llama<\/strong>, <strong>Mistral<\/strong>, <strong>Qwen<\/strong>) via <strong>HuggingFace Transformers<\/strong>; tokenization is <strong>tiktoken<\/strong> or HF tokenizers. Self-hosting for throughput uses <strong>vLLM<\/strong> or <strong>TGI<\/strong> (see §8).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a prototype I'd call the Anthropic API; for cost or data-privacy at scale I'd self-host a Llama/Mistral model on vLLM.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What task are LLMs trained on? <em>(next-token prediction over massive text.)<\/em><\/li><li>What does attention do, in one line? *(weighs how every token relates to every other,<\/li><\/ul>\n<p>in parallel — enabling long-range context and scale.)*<\/p>\n<ul><li>What is the context window and why does it matter? *(the max tokens the model can<\/li><\/ul>\n<p>consider at once; constrains prompts/RAG and drives cost.)*<\/p>","toc":[{"level":2,"id":"tokens-and-next-token-prediction","text":"Tokens and next-token prediction"},{"level":2,"id":"attention-the-core-idea","text":"Attention (the core idea)"},{"level":2,"id":"context-window","text":"Context window"},{"level":2,"id":"why-theyre-called-foundation-models","text":"Why they're called \"foundation models\""},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"transformers & how llms work 💡 tl;dr an llm is a very large transformer trained to predict the next token over huge amounts of text. its superpower is attention , which lets it weigh how every word relates to every other. that simple objective, at scale, produces the fluent, general behavior we see. tokens and next-token prediction llms don't see words or letters — they see tokens (word pieces). the model is trained on one deceptively simple task: given the tokens so far, predict the next token . do that over trillions of tokens of text and, to get good at it, the model has to implicitly learn grammar, facts, reasoning patterns, and style. at generation time it predicts a token, appends it, and repeats — that's \"autoregressive\" generation. a knob to know: temperature controls randomness of that next-token choice — low = more deterministic/factual, high = more creative/varied. attention (the core idea) the transformer's key mechanism is self-attention : for each token, the model computes how much every other token should influence it, and blends them accordingly. this lets it capture long-range relationships (\"it\" refers to which noun?) and, unlike older rnns, process the whole sequence in parallel — which is exactly why transformers scale to huge models and datasets. \"the cat sat on the mat because it was tired\" attention lets \"it\" look back and weight \"cat\" strongly → resolving the reference. you don't need the matrix math for most interviews — you need \"attention weighs the relationship between all pairs of tokens, in parallel, which is why transformers scale.\" context window the context window is how many tokens the model can consider at once (its working memory). everything — your prompt, retrieved documents, the conversation — must fit. it's a real constraint that shapes design (it's why rag chunks documents, next page) and a cost driver (more tokens = more compute). why they're called \"foundation models\" a single pretrained llm can be adapted to many tasks (summarize, classify, code, chat) without training a new model each time — via prompting or light fine-tuning. that generality is why they're \"foundation\" models and why the practical skill is adapting them (next pages), not training them from scratch (almost no one does that). 🔗 connecting the dots: the real stack you either call a hosted api ( openai , anthropic , cohere ) or run an open model ( llama , mistral , qwen ) via huggingface transformers ; tokenization is tiktoken or hf tokenizers. self-hosting for throughput uses vllm or tgi (see §8). how you'd say it: \"for a prototype i'd call the anthropic api; for cost or data-privacy at scale i'd self-host a llama/mistral model on vllm.\" self-check what task are llms trained on? (next-token prediction over massive text.) what does attention do, in one line? *(weighs how every token relates to every other, in parallel — enabling long-range context and scale.)* what is the context window and why does it matter? *(the max tokens the model can consider at once; constrains prompts/rag and drives cost.)*","words":508},{"path":"09-generative-ai-llms/prompting-and-rag.md","title":"Prompting & RAG","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"prompting-rag\">Prompting &amp; RAG<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The two cheapest ways to make an LLM do your task without training it. <strong>Prompting<\/strong> = carefully instructing the model. <strong>RAG (retrieval-augmented generation)<\/strong> = fetching relevant documents and putting them in the prompt so the model answers from <em>your<\/em> data instead of only its training. RAG is the default fix for \"the model doesn't know our stuff\" and for hallucinations.<\/div><\/div>\n<h2 id=\"prompting\">Prompting<\/h2>\n<p>The fastest lever: get better output by writing better instructions. Useful patterns:<\/p>\n<ul><li><strong>Clear instructions + examples<\/strong> — showing a few input→output examples (<strong>few-shot<\/strong>)<\/li><\/ul>\n<p>steers the model strongly.<\/p>\n<ul><li><strong>Chain-of-thought<\/strong> — asking it to \"think step by step\" improves reasoning on complex<\/li><\/ul>\n<p>tasks.<\/p>\n<ul><li><strong>Role/format constraints<\/strong> — specify the persona, the output format (JSON), the length.<\/li><\/ul>\n<p>Prompting changes nothing about the model — it's just input — so it's instant and free to iterate. Always the first thing to try.<\/p>\n<h2 id=\"why-rag-exists\">Why RAG exists<\/h2>\n<p>An LLM only knows what was in its training data, which is <strong>frozen<\/strong> at training time and <strong>doesn't include your private/internal data<\/strong>. So it can't answer \"what's our refund policy?\" and it may <strong>hallucinate<\/strong> (confidently make something up). RAG fixes both by giving the model the relevant facts at query time.<\/p>\n<h2 id=\"how-rag-works\">How RAG works<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">question<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">embed<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">search vector DB<span class=\"nsub\">similar chunks<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">retrieve top-k docs<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">stuff into prompt<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">grounded answer<span class=\"nsub\">+ citations<\/span><\/span>\n  <\/div>\n<\/div>\n<ol><li><strong>Index (offline):<\/strong> split your documents into chunks, convert each to an <strong>embedding<\/strong><\/li><\/ol>\n<p>(a vector capturing meaning), and store them in a <strong>vector database<\/strong> (Pinecone, Weaviate,    pgvector, FAISS).<\/p>\n<ol><li><strong>Retrieve (per query):<\/strong> embed the user's question, find the most similar chunks by<\/li><\/ol>\n<p>vector similarity.<\/p>\n<ol><li><strong>Generate:<\/strong> put those chunks in the prompt so the model answers <strong>from them<\/strong>, and can<\/li><\/ol>\n<p>cite sources.<\/p>\n<p>The payoff: answers grounded in <em>your current<\/em> data, fewer hallucinations, easy updates (re-index, no retraining), and citations for trust.<\/p>\n<h2 id=\"promptingrag-vs-fine-tuning\">Prompting/RAG vs fine-tuning<\/h2>\n<p>The crucial judgment: <strong>RAG adds knowledge; fine-tuning changes behavior/style.<\/strong> If the problem is \"the model lacks our facts,\" reach for RAG. If it's \"the model won't follow our exact format/tone no matter how I prompt,\" consider fine-tuning (next page). A common mistake is fine-tuning to add facts — RAG is usually the right, cheaper tool for that.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>This is the core LLM-app stack. <strong>Orchestration:<\/strong> <strong>LangChain<\/strong> or <strong>LlamaIndex<\/strong> glue the steps. <strong>Embeddings:<\/strong> OpenAI / Cohere / <strong>sentence-transformers<\/strong> / <strong>BGE<\/strong>. <strong>Vector database:<\/strong> <strong>Pinecone<\/strong>, <strong>Weaviate<\/strong>, <strong>Qdrant<\/strong>, <strong>Chroma<\/strong>, <strong>pgvector<\/strong>, or <strong>FAISS<\/strong> — this is where the retrieval happens. <strong>Chunking + re-ranking<\/strong> (Cohere Rerank) improve retrieval quality.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>RAG step<\/th><th>Typical tool<\/th><\/tr><\/thead><tbody><tr><td>Chunk + embed docs<\/td><td>LlamaIndex / LangChain + an embedding model<\/td><\/tr><tr><td>Store &amp; search vectors<\/td><td>Pinecone / Weaviate / pgvector / FAISS<\/td><\/tr><tr><td>Retrieve + re-rank<\/td><td>vector search + Cohere Rerank<\/td><\/tr><tr><td>Generate grounded answer<\/td><td>the LLM (API or self-hosted)<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How you'd say it:<\/strong> <em>\"We chunked the docs with LlamaIndex, embedded with BGE into pgvector, retrieved top-k plus a Cohere re-rank, and fed that into the LLM so answers were grounded and cited.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What problem does RAG solve that prompting alone can't? *(the model lacking your private/<\/li><\/ul>\n<p>fresh knowledge, and hallucination — RAG grounds answers in retrieved data.)*<\/p>\n<ul><li>What are the three RAG steps? *(index docs as embeddings in a vector DB → retrieve<\/li><\/ul>\n<p>similar chunks for the query → generate grounded in them.)*<\/p>\n<ul><li>RAG vs fine-tuning — which for adding company facts, which for changing style? *(RAG for<\/li><\/ul>\n<p>facts/knowledge; fine-tuning for behavior/style.)*<\/p>","toc":[{"level":2,"id":"prompting","text":"Prompting"},{"level":2,"id":"why-rag-exists","text":"Why RAG exists"},{"level":2,"id":"how-rag-works","text":"How RAG works"},{"level":2,"id":"promptingrag-vs-fine-tuning","text":"Prompting/RAG vs fine-tuning"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"prompting & rag 💡 tl;dr the two cheapest ways to make an llm do your task without training it. prompting = carefully instructing the model. rag (retrieval-augmented generation) = fetching relevant documents and putting them in the prompt so the model answers from your data instead of only its training. rag is the default fix for \"the model doesn't know our stuff\" and for hallucinations. prompting the fastest lever: get better output by writing better instructions. useful patterns: clear instructions + examples — showing a few input→output examples ( few-shot ) steers the model strongly. chain-of-thought — asking it to \"think step by step\" improves reasoning on complex tasks. role/format constraints — specify the persona, the output format (json), the length. prompting changes nothing about the model — it's just input — so it's instant and free to iterate. always the first thing to try. why rag exists an llm only knows what was in its training data, which is frozen at training time and doesn't include your private/internal data . so it can't answer \"what's our refund policy?\" and it may hallucinate (confidently make something up). rag fixes both by giving the model the relevant facts at query time. how rag works question embed search vector db similar chunks retrieve top-k docs stuff into prompt grounded answer + citations index (offline): split your documents into chunks, convert each to an embedding (a vector capturing meaning), and store them in a vector database (pinecone, weaviate, pgvector, faiss). retrieve (per query): embed the user's question, find the most similar chunks by vector similarity. generate: put those chunks in the prompt so the model answers from them , and can cite sources. the payoff: answers grounded in your current data, fewer hallucinations, easy updates (re-index, no retraining), and citations for trust. prompting/rag vs fine-tuning the crucial judgment: rag adds knowledge; fine-tuning changes behavior/style. if the problem is \"the model lacks our facts,\" reach for rag. if it's \"the model won't follow our exact format/tone no matter how i prompt,\" consider fine-tuning (next page). a common mistake is fine-tuning to add facts — rag is usually the right, cheaper tool for that. 🔗 connecting the dots: the real stack this is the core llm-app stack. orchestration: langchain or llamaindex glue the steps. embeddings: openai / cohere / sentence-transformers / bge . vector database: pinecone , weaviate , qdrant , chroma , pgvector , or faiss — this is where the retrieval happens. chunking + re-ranking (cohere rerank) improve retrieval quality. rag step typical tool chunk + embed docs llamaindex / langchain + an embedding model store & search vectors pinecone / weaviate / pgvector / faiss retrieve + re-rank vector search + cohere rerank generate grounded answer the llm (api or self-hosted) how you'd say it: \"we chunked the docs with llamaindex, embedded with bge into pgvector, retrieved top-k plus a cohere re-rank, and fed that into the llm so answers were grounded and cited.\" self-check what problem does rag solve that prompting alone can't? *(the model lacking your private/ fresh knowledge, and hallucination — rag grounds answers in retrieved data.)* what are the three rag steps? *(index docs as embeddings in a vector db → retrieve similar chunks for the query → generate grounded in them.)* rag vs fine-tuning — which for adding company facts, which for changing style? *(rag for facts/knowledge; fine-tuning for behavior/style.)*","words":563},{"path":"09-generative-ai-llms/fine-tuning.md","title":"Fine-Tuning & PEFT (LoRA)","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"fine-tuning-peft-lora\">Fine-Tuning &amp; PEFT (LoRA)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Fine-tuning adapts a pretrained model's <em>weights<\/em> to your task — use it when prompting and RAG can't get the behavior or style you need. Full fine-tuning is expensive, so in practice you use <strong>PEFT<\/strong> methods like <strong>LoRA<\/strong> that train a tiny fraction of the parameters for most of the benefit.<\/div><\/div>\n<h2 id=\"when-to-fine-tune-and-when-not-to\">When to fine-tune (and when not to)<\/h2>\n<p>Fine-tuning is the heaviest lever, so reach for it last:<\/p>\n<ul><li><strong>Prompt first<\/strong> — free, instant.<\/li><li><strong>RAG next<\/strong> — when the gap is <em>knowledge<\/em> (your facts, fresh data).<\/li><li><strong>Fine-tune<\/strong> — when the gap is <em>behavior<\/em>: a consistent style/format/persona, a<\/li><\/ul>\n<p>specialized task, or domain language that prompting can't reliably produce; or to make a   smaller model match a bigger one's quality on your narrow task (cheaper serving).<\/p>\n<p>A classic mistake is fine-tuning to inject facts — that's RAG's job, and fine-tuning bakes facts in statically (they go stale and can't be cited). Fine-tune for <em>how<\/em> it responds, retrieve for <em>what<\/em> it knows.<\/p>\n<h2 id=\"full-fine-tuning-vs-peft\">Full fine-tuning vs PEFT<\/h2>\n<p><strong>Full fine-tuning<\/strong> updates <em>all<\/em> the model's billions of weights — powerful but expensive (lots of GPU memory) and it produces a full copy of the model per task.<\/p>\n<p><strong>PEFT (parameter-efficient fine-tuning)<\/strong> freezes the original weights and trains only a small number of new ones. <strong>LoRA<\/strong> is the popular method: it injects tiny low-rank \"adapter\" matrices into the model and trains only those — often &lt;1% of the parameters — getting most of full fine-tuning's benefit at a fraction of the cost and memory. <strong>QLoRA<\/strong> goes further, fine-tuning on top of a quantized model so it fits on a single GPU.<\/p>\n<div class=\"compare\">\n  <div class=\"cmp-col\">\n    <div class=\"cmp-h\">Full fine-tuning<\/div>\n    <p>Update <b>all N billion<\/b> weights.<\/p>\n    <span class=\"cmp-tag\">expensive · full model copy per task<\/span>\n  <\/div>\n  <div class=\"cmp-col green\">\n    <div class=\"cmp-h\">LoRA (PEFT)<\/div>\n    <p>Freeze the model, train <b>small adapters (&lt;1%)<\/b>.<\/p>\n    <span class=\"cmp-tag\">cheap · swap adapters per task<\/span>\n  <\/div>\n<\/div>\n<p>The bonus: LoRA adapters are small and <strong>swappable<\/strong> — one base model can serve many tasks by loading different adapters, which is great for serving economics.<\/p>\n<h2 id=\"what-you-need-to-fine-tune\">What you need to fine-tune<\/h2>\n<p>Fine-tuning is supervised learning, so you need a <strong>quality dataset<\/strong> of example input→output pairs in the format/behavior you want. Data quality matters more than quantity — a few hundred clean, on-target examples often beat thousands of noisy ones. This is the real work of fine-tuning; the training itself is largely a solved recipe.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>The stack is <strong>HuggingFace PEFT<\/strong> (LoRA/QLoRA), <strong>bitsandbytes<\/strong> (4-bit for QLoRA), <strong>TRL<\/strong> (SFT/RLHF trainers), and wrappers like <strong>Axolotl<\/strong> or <strong>Unsloth<\/strong> that make it a config file. Adapters register in <strong>MLflow / HuggingFace Hub<\/strong> and serve on <strong>vLLM<\/strong> (which can hot-swap LoRA adapters).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"To adapt a model's behavior I'd QLoRA-fine-tune with PEFT + bitsandbytes on a single GPU using Axolotl, then serve the base model with the LoRA adapter on vLLM.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>When fine-tune instead of RAG? *(when you need specific behavior/style/format, not just<\/li><\/ul>\n<p>facts — RAG handles knowledge.)*<\/p>\n<ul><li>What does LoRA do? *(freezes the base model, trains tiny low-rank adapters (&lt;1% of<\/li><\/ul>\n<p>params) — cheap, swappable per task.)*<\/p>\n<ul><li>What matters most for a fine-tuning dataset? *(quality and on-target formatting of the<\/li><\/ul>\n<p>input→output examples, over sheer quantity.)*<\/p>","toc":[{"level":2,"id":"when-to-fine-tune-and-when-not-to","text":"When to fine-tune (and when not to)"},{"level":2,"id":"full-fine-tuning-vs-peft","text":"Full fine-tuning vs PEFT"},{"level":2,"id":"what-you-need-to-fine-tune","text":"What you need to fine-tune"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"fine-tuning & peft (lora) 💡 tl;dr fine-tuning adapts a pretrained model's weights to your task — use it when prompting and rag can't get the behavior or style you need. full fine-tuning is expensive, so in practice you use peft methods like lora that train a tiny fraction of the parameters for most of the benefit. when to fine-tune (and when not to) fine-tuning is the heaviest lever, so reach for it last: prompt first — free, instant. rag next — when the gap is knowledge (your facts, fresh data). fine-tune — when the gap is behavior : a consistent style/format/persona, a specialized task, or domain language that prompting can't reliably produce; or to make a smaller model match a bigger one's quality on your narrow task (cheaper serving). a classic mistake is fine-tuning to inject facts — that's rag's job, and fine-tuning bakes facts in statica

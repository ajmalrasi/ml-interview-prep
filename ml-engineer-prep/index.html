evel":2,"id":"bagging-vs-boosting-the-key-distinction","text":"Bagging vs boosting (the key distinction)"},{"level":2,"id":"why-boosting-wins-on-tabular-data","text":"Why boosting wins on tabular data"},{"level":2,"id":"interpretability","text":"Interpretability"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"classical ml (trees & boosting) 💡 tl;dr for structured/tabular data, tree-based models — especially gradient boosting (xgboost, lightgbm) — are usually the best choice: accurate, fast, and needing little preprocessing. understand how a tree splits, and the two ways to combine many trees (bagging vs boosting). a decision tree a tree asks a series of yes/no questions on features (\"age > 30?\", \"country = uk?\"), splitting the data to separate the classes. it's wonderfully interpretable but a single deep tree overfits — it memorizes the training data. so in practice you combine many trees, and there are two ways to do that. bagging vs boosting (the key distinction) bagging (random forest) — train many trees in parallel , each on a random subset of data and features, then average their votes. averaging independent trees reduces variance , so a forest is robust and hard to overfit, with little tuning. great, sturdy default. boosting (xgboost, lightgbm) — train trees in sequence , where each new tree focuses on the errors the previous ones made. this reduces bias and typically reaches higher accuracy, at the cost of more careful tuning (it can overfit if you push it). bagging many trees in parallel , then average their votes. cuts variance · robust · random forest boosting trees in sequence , each fixing the last one's mistakes. cuts bias · top accuracy · xgboost why boosting wins on tabular data gradient boosting consistently tops leaderboards and production systems for structured data because it captures complex feature interactions, handles mixed feature types, needs no scaling, and is fast. when someone hands you a table of rows and columns, the correct first instinct is \"gradient-boosted trees\" — and being able to say why (sequential error-correction, low bias, minimal preprocessing) is the mark of experience. interpretability trees are more explainable than neural nets — you can see which features matter ( feature importance ), and shap values explain individual predictions. in regulated settings (finance, healthcare) this interpretability is often a requirement, not a nicety, and it's a point worth raising. 🔗 connecting the dots: the real stack the workhorses are xgboost , lightgbm , and catboost , usually driven through scikit-learn pipelines; explainability comes from shap (per-prediction) and built-in feature importances. training and tuning run on a single big vm or a managed job ( sagemaker / vertex / databricks ). how you'd say it: \"for a tabular churn model i'd train lightgbm in a scikit-learn pipeline, explain it with shap for the compliance team, and log everything to mlflow.\" self-check bagging vs boosting in one line each? *(parallel trees averaged to cut variance vs sequential trees correcting errors to cut bias.)* best default for tabular data and why? *(gradient boosting — accuracy, handles interactions, minimal preprocessing.)* how do you explain a tree model's predictions? *(feature importance; shap for per-prediction explanations.)*","words":474},{"path":"03-model-development/deep-learning.md","title":"Deep Learning Essentials","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"deep-learning-essentials\">Deep Learning Essentials<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Neural networks stack layers of simple units that learn features automatically — which is why they dominate on unstructured data (images, text, audio). Know the training loop (forward pass, loss, backprop, gradient descent) and the main architecture families at a level you can talk about.<\/div><\/div>\n<h2 id=\"how-a-neural-net-learns\">How a neural net learns<\/h2>\n<p>A network is layers of \"neurons,\" each computing a weighted sum of its inputs passed through a non-linear <strong>activation<\/strong> (ReLU). Training is a loop:<\/p>\n<div class=\"diagram\">\n  <div class=\"loopwrap\">\n    <div class=\"vflow\">\n      <span class=\"node\">forward pass<span class=\"nsub\">inputs → layers → prediction<\/span><\/span>\n      <span class=\"varw\"><\/span>\n      <span class=\"node\">loss<span class=\"nsub\">how wrong is the prediction?<\/span><\/span>\n      <span class=\"varw\"><\/span>\n      <span class=\"node\">backprop<span class=\"nsub\">how each weight contributed to the error (gradients)<\/span><\/span>\n      <span class=\"varw\"><\/span>\n      <span class=\"node out\">update<span class=\"nsub\">nudge weights down the gradient<\/span><\/span>\n    <\/div>\n    <span class=\"loop-back\"><span class=\"lb-arw\"><\/span> repeat over many batches (epochs)<\/span>\n  <\/div>\n<\/div>\n<p>The magic is that with enough layers and data, the network <strong>learns its own features<\/strong> — early layers pick up edges or word patterns, deep layers combine them into concepts — instead of you hand-engineering them. That's exactly why deep learning wins where features are hard to design by hand (pixels, raw text) and is overkill where good features are easy (small tabular data).<\/p>\n<h2 id=\"key-training-knobs\">Key training knobs<\/h2>\n<ul><li><strong>Learning rate<\/strong> — step size; the single most important hyperparameter (too high<\/li><\/ul>\n<p>diverges, too low crawls).<\/p>\n<ul><li><strong>Batch size<\/strong> — how many examples per update.<\/li><li><strong>Epochs + early stopping<\/strong> — passes over the data; stop when validation stops<\/li><\/ul>\n<p>improving.<\/p>\n<ul><li><strong>Regularization<\/strong> — <strong>dropout<\/strong> (randomly drop neurons) and weight decay to fight<\/li><\/ul>\n<p>overfitting.<\/p>\n<h2 id=\"the-architecture-families\">The architecture families<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Family<\/th><th>For<\/th><th>One-liner<\/th><\/tr><\/thead><tbody><tr><td><strong>MLP / feed-forward<\/strong><\/td><td>tabular, simple<\/td><td>fully connected layers<\/td><\/tr><tr><td><strong>CNN<\/strong><\/td><td>images<\/td><td>convolutions detect local patterns at every position<\/td><\/tr><tr><td><strong>RNN / LSTM<\/strong><\/td><td>sequences (older)<\/td><td>process step by step, carry state<\/td><\/tr><tr><td><strong>Transformer<\/strong><\/td><td>text, and now everything<\/td><td><strong>attention<\/strong> weighs all positions at once — scales, parallelizes; basis of LLMs<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The headline: <strong>Transformers<\/strong> replaced RNNs for most sequence work and underpin modern LLMs (section 9), because <strong>attention<\/strong> lets the model relate any two positions directly and trains in parallel rather than step by step.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>PyTorch<\/strong> is the research/industry default (often via <strong>PyTorch Lightning<\/strong> to remove boilerplate); <strong>TensorFlow / Keras<\/strong> is still common in production; <strong>HuggingFace Transformers<\/strong> is where you get pretrained models to fine-tune. Data loading uses framework <code>DataLoader<\/code>s, and training runs on GPU instances in the cloud.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I build in PyTorch (Lightning for the training loop), start from a pretrained backbone on HuggingFace, and track runs in W&amp;B.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What are the four steps of the training loop? *(forward pass, loss, backprop,<\/li><\/ul>\n<p>weight update.)*<\/p>\n<ul><li>Why deep learning for images/text but not small tabular data? *(it learns features<\/li><\/ul>\n<p>from unstructured data; on small tabular, boosted trees win.)*<\/p>\n<ul><li>Why did Transformers replace RNNs? *(attention relates all positions directly and<\/li><\/ul>\n<p>trains in parallel; better at long-range and scale.)*<\/p>","toc":[{"level":2,"id":"how-a-neural-net-learns","text":"How a neural net learns"},{"level":2,"id":"key-training-knobs","text":"Key training knobs"},{"level":2,"id":"the-architecture-families","text":"The architecture families"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"deep learning essentials 💡 tl;dr neural networks stack layers of simple units that learn features automatically — which is why they dominate on unstructured data (images, text, audio). know the training loop (forward pass, loss, backprop, gradient descent) and the main architecture families at a level you can talk about. how a neural net learns a network is layers of \"neurons,\" each computing a weighted sum of its inputs passed through a non-linear activation (relu). training is a loop: forward pass inputs → layers → prediction loss how wrong is the prediction? backprop how each weight contributed to the error (gradients) update nudge weights down the gradient repeat over many batches (epochs) the magic is that with enough layers and data, the network learns its own features — early layers pick up edges or word patterns, deep layers combine them into concepts — instead of you hand-engineering them. that's exactly why deep learning wins where features are hard to design by hand (pixels, raw text) and is overkill where good features are easy (small tabular data). key training knobs learning rate — step size; the single most important hyperparameter (too high diverges, too low crawls). batch size — how many examples per update. epochs + early stopping — passes over the data; stop when validation stops improving. regularization — dropout (randomly drop neurons) and weight decay to fight overfitting. the architecture families family for one-liner mlp / feed-forward tabular, simple fully connected layers cnn images convolutions detect local patterns at every position rnn / lstm sequences (older) process step by step, carry state transformer text, and now everything attention weighs all positions at once — scales, parallelizes; basis of llms the headline: transformers replaced rnns for most sequence work and underpin modern llms (section 9), because attention lets the model relate any two positions directly and trains in parallel rather than step by step. 🔗 connecting the dots: the real stack pytorch is the research/industry default (often via pytorch lightning to remove boilerplate); tensorflow / keras is still common in production; huggingface transformers is where you get pretrained models to fine-tune. data loading uses framework dataloader s, and training runs on gpu instances in the cloud. how you'd say it: \"i build in pytorch (lightning for the training loop), start from a pretrained backbone on huggingface, and track runs in w&b.\" self-check what are the four steps of the training loop? *(forward pass, loss, backprop, weight update.)* why deep learning for images/text but not small tabular data? *(it learns features from unstructured data; on small tabular, boosted trees win.)* why did transformers replace rnns? *(attention relates all positions directly and trains in parallel; better at long-range and scale.)*","words":448},{"path":"03-model-development/frameworks-in-practice.md","title":"PyTorch, TensorFlow & Keras in Practice","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"pytorch-tensorflow-keras-in-practice\">PyTorch, TensorFlow &amp; Keras in Practice<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Framework APIs differ, but a production training loop has the same invariants: deterministic data/versioning, explicit train/eval behavior, correct gradient lifecycle, mixed-precision safety, checkpoint/resume, distributed synchronization, validation, and tracked artifacts. Interviewers care more about those invariants than syntax trivia.<\/div><\/div>\n<h2 id=\"where-each-tool-fits\">Where each tool fits<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Tool<\/th><th>Strength<\/th><th>Watch for<\/th><\/tr><\/thead><tbody><tr><td>PyTorch<\/td><td>imperative/debuggable research-to-production workflow; broad LLM ecosystem<\/td><td>easy to write flexible but slow Python or forget mode/device details<\/td><\/tr><tr><td>TensorFlow<\/td><td>mature graph/distribution/serving ecosystem<\/td><td>tracing/retracing and graph/eager boundary surprises<\/td><\/tr><tr><td>Keras<\/td><td>high-level training/model API, now multi-backend<\/td><td>convenience can hide exact step behavior until customization is needed<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Choose from team expertise, model/tool ecosystem, deployment target, and profiling evidence. Do not answer as if one framework makes the mathematics different.<\/p>\n<h2 id=\"the-invariant-training-step\">The invariant training step<\/h2>\n<p>Every framework implements this sequence:<\/p>\n<ol><li>fetch and move a batch;<\/li><li>forward pass in training mode;<\/li><li>compute loss, including masks/regularization;<\/li><li>backpropagate gradients;<\/li><li>optionally unscale and clip gradients;<\/li><li>optimizer update and learning-rate schedule;<\/li><li>clear/replace accumulated gradients;<\/li><li>record metrics and periodically validate/checkpoint.<\/li><\/ol>\n<p>In PyTorch, the explicit form is easy to reason about:<\/p>\n<pre><code class=\"language-python\">model.train()\noptimizer.zero_grad(set_to_none=<span class=\"tok-keyword\">True<\/span>)\n<span class=\"tok-keyword\">with<\/span> torch.autocast(device_type=<span class=\"tok-string\">\"cuda\"<\/span>, dtype=torch.bfloat16):\n    loss = loss_fn(model(inputs), targets) / accumulation_steps\nloss.backward()\n<span class=\"tok-keyword\">if<\/span> update_now:\n    torch.nn.utils.clip_grad_norm_(model.parameters(), max_norm)\n    optimizer.step()\n    scheduler.step()<\/code><\/pre>\n<p>Real FP16 training often uses a gradient scaler; BF16 usually does not need loss scaling because it has FP32-like exponent range. Gradient accumulation must divide/normalize loss consistently and only step/clear at the intended boundary.<\/p>\n<h2 id=\"train-mode-and-evaluation-mode\">Train mode and evaluation mode<\/h2>\n<p>PyTorch's <code>model.train()<\/code> / <code>model.eval()<\/code> changes Dropout and BatchNorm behavior; it does not enable or disable gradient recording. Use <code>torch.no_grad()<\/code> or inference mode separately. The equivalent concern exists across frameworks: validation must not update weights or training-state statistics accidentally.<\/p>\n<p>For sequence models, validate masks, padding, label shift, tokenizer revision, and ignored loss positions. A syntactically correct loop can train the wrong objective.<\/p>\n<h2 id=\"input-pipeline-and-gpu-utilization\">Input pipeline and GPU utilization<\/h2>\n<p>When the GPU is idle, the model may not be the bottleneck. Inspect:<\/p>\n<ul><li>data decode/augmentation CPU time;<\/li><li>worker count and queue depth;<\/li><li>pinned memory and asynchronous host-to-device transfer;<\/li><li>storage throughput and small-file overhead;<\/li><li>batch collation/tokenization;<\/li><li>synchronization accidentally inserted by logging or <code>.item()<\/code> calls.<\/li><\/ul>\n<p>Prefetch, parallel workers, efficient sharding, vectorized transforms, and overlapping copy with compute often beat changing the network.<\/p>\n<h2 id=\"distributed-choices\">Distributed choices<\/h2>\n<ul><li><strong>PyTorch DDP / TensorFlow multi-worker data parallelism:<\/strong> each rank has the model, sees a<\/li><\/ul>\n<p>different batch shard, and synchronizes gradients.<\/p>\n<ul><li><strong>FSDP / ZeRO-style sharding:<\/strong> shards parameters, gradients, and/or optimizer state to fit<\/li><\/ul>\n<p>larger models; trades memory for communication and orchestration.<\/p>\n<ul><li><strong>Tensor/pipeline parallelism:<\/strong> splits model computation when one model replica will not fit.<\/li><\/ul>\n<p>The sampler/input pipeline must avoid giving every rank the same examples. Save enough state to resume consistently: model, optimizer, scheduler, scaler, global step, RNG state, and data position where exact continuation matters.<\/p>\n<h2 id=\"checkpointing-and-failure-recovery\">Checkpointing and failure recovery<\/h2>\n<p>A good checkpoint is atomic, versioned, and validated after writing. Store it outside the ephemeral worker. For large distributed models, coordinated sharded checkpoints avoid gathering everything onto rank 0 and reduce recovery time.<\/p>\n<p>Define recovery objectives: can the job lose five minutes or five hours? Checkpoint cadence balances storage/network cost against recomputation. Test restore before trusting it.<\/p>\n<h2 id=\"reproducibility-without-pretending-hardware-is-perfectly-deterministic\">Reproducibility without pretending hardware is perfectly deterministic<\/h2>\n<p>Record:<\/p>\n<ul><li>code and environment/container version;<\/li><li>immutable data and tokenizer versions;<\/li><li>model initialization/pretrained revision;<\/li><li>hyperparameters and random seeds;<\/li><li>hardware/world size and framework/compiler settings;<\/li><li>exact validation outputs and final artifact lineage.<\/li><\/ul>\n<p>Some GPU kernels and distributed reductions can be nondeterministic, and changing world size changes numerical order. State the acceptable tolerance and validate metrics rather than promising bitwise identity in every environment.<\/p>\n<h2 id=\"common-interview-bugs\">Common interview bugs<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Symptom<\/th><th>Likely mistake<\/th><\/tr><\/thead><tbody><tr><td>Validation changes between runs<\/td><td>model still in train mode, random preprocessing, data drift<\/td><\/tr><tr><td>Loss never improves<\/td><td>labels/masks wrong, LR wrong, gradients cleared/disabled incorrectly<\/td><\/tr><tr><td>OOM after several steps<\/td><td>retained graph/tensors, accumulating metrics on GPU, variable sequence spikes<\/td><\/tr><tr><td>Scaling adds no speed<\/td><td>input bottleneck, small per-rank batch, collective/network overhead<\/td><\/tr><tr><td>Resume diverges<\/td><td>scheduler/scaler/RNG/data position not restored<\/td><\/tr><tr><td>GPU utilization sawtooth<\/td><td>loader stalls, sync logging, uneven batches, checkpoint pauses<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"framework-comparison-answer\">Framework comparison answer<\/h2>\n<blockquote><p>I am strongest in the framework I have operated, but I separate API familiarity from training-system fundamentals. In any framework I verify the data shard, train/eval state, precision and gradient lifecycle, distributed synchronization, checkpoint/resume, and profiling. I would choose PyTorch for the broad LLM stack, TensorFlow where its established serving/distribution ecosystem fits the team, and Keras when high-level portability and iteration speed matter—then profile the actual deployment path.<\/p><\/blockquote>\n<h2 id=\"primary-references\">Primary references<\/h2>\n<ul><li><a href=\"https://docs.pytorch.org/docs/stable/amp.html\" target=\"_blank\" rel=\"noopener\">PyTorch automatic mixed precision<\/a><\/li><li><a href=\"https://docs.pytorch.org/tutorials/beginner/dist_overview.html\" target=\"_blank\" rel=\"noopener\">PyTorch distributed overview<\/a><\/li><li><a href=\"https://www.tensorflow.org/guide/distributed_training\" target=\"_blank\" rel=\"noopener\">TensorFlow distributed training<\/a><\/li><li><a href=\"https://keras.io/guides/distributed_training_with_tensorflow/\" target=\"_blank\" rel=\"noopener\">Keras distributed training<\/a><\/li><\/ul>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"training-at-scale.md\" href=\"#\">Training at Scale<\/a><\/strong><\/p>","toc":[{"level":2,"id":"where-each-tool-fits","text":"Where each tool fits"},{"level":2,"id":"the-invariant-training-step","text":"The invariant training step"},{"level":2,"id":"train-mode-and-evaluation-mode","text":"Train mode and evaluation mode"},{"level":2,"id":"input-pipeline-and-gpu-utilization","text":"Input pipeline and GPU utilization"},{"level":2,"id":"distributed-choices","text":"Distributed choices"},{"level":2,"id":"checkpointing-and-failure-recovery","text":"Checkpointing and failure recovery"},{"level":2,"id":"reproducibility-without-pretending-hardware-is-perfectly-deterministic","text":"Reproducibility without pretending hardware is perfectly deterministic"},{"level":2,"id":"common-interview-bugs","text":"Common interview bugs"},{"level":2,"id":"framework-comparison-answer","text":"Framework comparison answer"},{"level":2,"id":"primary-references","text":"Primary references"}],"text":"pytorch, tensorflow & keras in practice 💡 tl;dr framework apis differ, but a production training loop has the same invariants: deterministic data/versioning, explicit train/eval behavior, correct gradient lifecycle, mixed-precision safety, checkpoint/resume, distributed synchronization, validation, and tracked artifacts. interviewers care more about those invariants than syntax trivia. where each tool fits tool strength watch for pytorch imperative/debuggable research-to-production workflow; broad llm ecosystem easy to write flexible but slow python or forget mode/device details tensorflow mature graph/distribution/serving ecosystem tracing/retracing and graph/eager boundary surprises keras high-level training/model api, now multi-backend convenience can hide exact step behavior until customization is needed choose from team expertise, model/tool ecosystem, deployment target, and profiling evidence. do not answer as if one framework makes the mathematics different. the invariant training step every framework implements this sequence: fetch and move a batch; forward pass in training mode; compute loss, including masks/regularization; backpropagate gradients; optionally unscale and clip gradients; optimizer update and learning-rate schedule; clear/replace accumulated gradients; record metrics and periodically validate/checkpoint. in pytorch, the explicit form is easy to reason about: model.train() optimizer.zero_grad(set_to_none= true ) with torch.autocast(device_type= \"cuda\" , dtype=torch.bfloat16): loss = loss_fn(model(inputs), targets) / accumulation_steps loss.backward() if update_now: torch.nn.utils.clip_grad_norm_(model.parameters(), max_norm) optimizer.step() scheduler.step() real fp16 training often uses a gradient scaler; bf16 usually does not need loss scaling because it has fp32-like exponent range. gradient accumulation must divide/normalize loss consistently and only step/clear at the intended boundary. train mode and evaluation mode pytorch's model.train() / model.eval() changes dropout and batchnorm behavior; it does not enable or disable gradient recording. use torch.no_grad() or inference mode separately. the equivalent concern exists across frameworks: validation must not update weights or training-state statistics accidentally. for sequence models, validate masks, padding, label shift, tokenizer revision, and ignored loss positions. a syntactically correct loop can train the wrong objective. input pipeline and gpu utilization when the gpu is idle, the model may not be the bottleneck. inspect: data decode/augmentation cpu time; worker count and queue depth; pinned memory and asynchronous host-to-device transfer; storage throughput and small-file overhead; batch collation/tokenization; synchronization accidentally inserted by logging or .item() calls. prefetch, parallel workers, efficient sharding, vectorized transforms, and overlapping copy with compute often beat changing the network. distributed choices pytorch ddp / tensorflow multi-worker data parallelism: each rank has the model, sees a different batch shard, and synchronizes gradients. fsdp / zero-style sharding: shards parameters, gradients, and/or optimizer state to fit larger models; trades memory for communication and orchestration. tensor/pipeline parallelism: splits model computation when one model replica will not fit. the sampler/input pipeline must avoid giving every rank the same examples. save enough state to resume consistently: model, optimizer, scheduler, scaler, global step, rng state, and data position where exact continuation matters. checkpointing and failure recovery a good checkpoint is atomic, versioned, and validated after writing. store it outside the ephemeral worker. for large distributed models, coordinated sharded checkpoints avoid gathering everything onto rank 0 and reduce recovery time. define recovery objectives: can the job lose five minutes or five hours? checkpoint cadence balances storage/network cost against recomputation. test restore before trusting it. reproducibility without pretending hardware is perfectly deterministic record: code and environment/container version; immutable data and tokenizer versions; model initialization/pretrained revision; hyperparameters and random seeds; hardware/world size and framework/compiler settings; exact validation outputs and final artifact lineage. some gpu kernels and distributed reductions can be nondeterministic, and changing world size changes numerical order. state the acceptable tolerance and validate metrics rather than promising bitwise identity in every environment. common interview bugs symptom likely mistake validation changes between runs model still in train mode, random preprocessing, data drift loss never improves labels/masks wrong, lr wrong, gradients cleared/disabled incorrectly oom after several steps retained graph/tensors, accumulating metrics on gpu, variable sequence spikes scaling adds no speed input bottleneck, small per-rank batch, collective/network overhead resume diverges scheduler/scaler/rng/data position not restored gpu utilization sawtooth loader stalls, sync logging, uneven batches, checkpoint pauses framework comparison answer i am strongest in the framework i have operated, but i separate api familiarity from training-system fundamentals. in any framework i verify the data shard, train/eval state, precision and gradient lifecycle, distributed synchronization, checkpoint/resume, and profiling. i would choose pytorch for the broad llm stack, tensorflow where its established serving/distribution ecosystem fits the team, and keras when high-level portability and iteration speed matter—then profile the actual deployment path. primary references pytorch automatic mixed precision pytorch distributed overview tensorflow distributed training keras distributed training → next: training at scale","words":734},{"path":"03-model-development/training-at-scale.md","title":"Training at Scale","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"training-at-scale\">Training at Scale<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> When data or the model no longer fits on one machine, you distribute the work. The common case is <strong>data parallelism<\/strong> (same model copied across many GPUs, each sees different data); the harder case is <strong>model parallelism<\/strong> (one model too big for one GPU, split across several). Know the difference and why big-data training uses frameworks like Spark.<\/div><\/div>\n<h2 id=\"two-kinds-of-too-big\">Two kinds of \"too big\"<\/h2>\n<p><strong>Too much data<\/strong> for one machine to churn through in reasonable time, or <strong>too big a model<\/strong> to fit in one GPU's memory. They call for different strategies.<\/p>\n<h2 id=\"data-parallelism-the-common-one\">Data parallelism (the common one)<\/h2>\n<p>Copy the <em>same<\/em> model onto each of N GPUs, give each a different slice of the batch, let each compute gradients, then <strong>average the gradients<\/strong> across GPUs and update all copies identically. You've effectively multiplied your batch throughput by N. This is how most large models are trained, and it's what tools like PyTorch DDP or Horovod do.<\/p>\n<div class=\"diagram\">\n  <div class=\"lanes\">\n    <div class=\"lane-stack\">\n      <span class=\"node ghost\">GPU 0<span class=\"nsub\">model copy + data slice 0<\/span><\/span>\n      <span class=\"node ghost\">GPU 1<span class=\"nsub\">model copy + data slice 1<\/span><\/span>\n      <span class=\"node ghost\">GPU 2<span class=\"nsub\">model copy + data slice 2<\/span><\/span>\n    <\/div>\n    <span class=\"merge-arw\"><\/span>\n    <span class=\"node soft\">average gradients<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">sync update<\/span>\n  <\/div>\n  <div class=\"diagram-cap\">Each GPU trains on its own slice; gradients are averaged and applied identically to every copy.<\/div>\n<\/div>\n<p>The catch is <strong>communication cost<\/strong>: syncing gradients every step across many GPUs becomes the bottleneck, so scaling isn't perfectly linear.<\/p>\n<h2 id=\"model-parallelism-when-the-model-wont-fit\">Model parallelism (when the model won't fit)<\/h2>\n<p>If a single model is too large for one GPU's memory (think large LLMs), you split the <em>model itself<\/em> across GPUs — different layers or tensor slices on different devices. It's more complex and communication-heavy, used mainly for very large models. A related idea, <strong>pipeline parallelism<\/strong>, splits layers into stages so different GPUs work on different micro-batches like an assembly line.<\/p>\n<h2 id=\"big-data-preprocessing-and-training\">Big-data preprocessing and training<\/h2>\n<p>Separately from GPUs, when the <em>dataset<\/em> is huge you distribute the data processing itself across a cluster with <strong>Spark<\/strong> (or Dask/Ray) — mapping the work over many nodes. This is the \"scalable data pipeline\" muscle: the same job that's a pandas one-liner on a laptop becomes a distributed job on terabytes.<\/p>\n<h2 id=\"mixed-precision-cheap-speedup\">Mixed precision: cheap speedup<\/h2>\n<p>Training in <strong>FP16/BF16<\/strong> instead of FP32 roughly doubles throughput and halves memory with negligible accuracy loss, so it's standard for large-model training. Worth naming as the first optimization you'd reach for before adding more hardware.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Multi-GPU data parallelism is <strong>PyTorch DDP<\/strong> or <strong>Horovod<\/strong>; very large models use <strong>DeepSpeed<\/strong>, <strong>PyTorch FSDP<\/strong>, or <strong>Megatron-LM<\/strong>. <strong>Ray Train<\/strong> and <strong>Spark<\/strong> distribute across a cluster; <strong>HuggingFace Accelerate<\/strong> wraps the boilerplate. Mixed precision is native <strong>AMP<\/strong> (<code>torch.cuda.amp<\/code>). It all runs on managed GPU clusters (<strong>SageMaker / Vertex / Databricks<\/strong>), often on <strong>spot<\/strong> instances with checkpointing.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a big model I'd use FSDP or DeepSpeed with mixed precision on a multi-GPU spot cluster, checkpointing to S3 so a preemption just resumes.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Data vs model parallelism — one line each? *(replicate the model, split the data and<\/li><\/ul>\n<p>average gradients vs split the model itself across GPUs.)*<\/p>\n<ul><li>What's the main bottleneck in data parallelism? *(communication cost of syncing<\/li><\/ul>\n<p>gradients across GPUs.)*<\/p>\n<ul><li>Cheapest way to speed up large-model training before adding GPUs? *(mixed-precision<\/li><\/ul>\n<p>FP16/BF16.)*<\/p>","toc":[{"level":2,"id":"two-kinds-of-too-big","text":"Two kinds of \"too big\""},{"level":2,"id":"data-parallelism-the-common-one","text":"Data parallelism (the common one)"},{"level":2,"id":"model-parallelism-when-the-model-wont-fit","text":"Model parallelism (when the model won't fit)"},{"level":2,"id":"big-data-preprocessing-and-training","text":"Big-data preprocessing and training"},{"level":2,"id":"mixed-precision-cheap-speedup","text":"Mixed precision: cheap speedup"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"training at scale 💡 tl;dr when data or the model no longer fits on one machine, you distribute the work. the common case is data parallelism (same model copied across many gpus, each sees different data); the harder case is model parallelism (one model too big for one gpu, split across several). know the difference and why big-data training uses frameworks like spark. two kinds of \"too big\" too much data for one machine to churn through in reasonable time, or too big a model to fit in one gpu's memory. they call for different strategies. data parallelism (the common one) copy the same model onto each of n gpus, give each a different slice of the batch, let each compute gradients, then average the gradients across gpus and update all copies identically. you've effectively multiplied your batch throughput by n. this is how most large models are trained, and it's what tools like pytorch ddp or horovod do. gpu 0 model copy + data slice 0 gpu 1 model copy + data slice 1 gpu 2 model copy + data slice 2 average gradients sync update each gpu trains on its own slice; gradients are averaged and applied identically to every copy. the catch is communication cost : syncing gradients every step across many gpus becomes the bottleneck, so scaling isn't perfectly linear. model parallelism (when the model won't fit) if a single model is too large for one gpu's memory (think large llms), you split the model itself across gpus — different layers or tensor slices on different devices. it's more complex and communication-heavy, used mainly for very large models. a related idea, pipeline parallelism , splits layers into stages so different gpus work on different micro-batches like an assembly line. big-data preprocessing and training separately from gpus, when the dataset is huge you distribute the data processing itself across a cluster with spark (or dask/ray) — mapping the work over many nodes. this is the \"scalable data pipeline\" muscle: the same job that's a pandas one-liner on a laptop becomes a distributed job on terabytes. mixed precision: cheap speedup training in fp16/bf16 instead of fp32 roughly doubles throughput and halves memory with negligible accuracy loss, so it's standard for large-model training. worth naming as the first optimization you'd reach for before adding more hardware. 🔗 connecting the dots: the real stack multi-gpu data parallelism is pytorch ddp or horovod ; very large models use deepspeed , pytorch fsdp , or megatron-lm . ray train and spark distribute across a cluster; huggingface accelerate wraps the boilerplate. mixed precision is native amp ( torch.cuda.amp ). it all runs on managed gpu clusters ( sagemaker / vertex / databricks ), often on spot instances with checkpointing. how you'd say it: \"for a big model i'd use fsdp or deepspeed with mixed precision on a multi-gpu spot cluster, checkpointing to s3 so a preemption just resumes.\" self-check data vs model parallelism — one line each? *(replicate the model, split the data and average gradients vs split the model itself across gpus.)* what's the main bottleneck in data parallelism? *(communication cost of syncing gradients across gpus.)* cheapest way to speed up large-model training before adding gpus? *(mixed-precision fp16/bf16.)*","words":536},{"path":"03-model-development/hyperparameter-tuning.md","title":"Hyperparameter Tuning","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"hyperparameter-tuning\">Hyperparameter Tuning<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Hyperparameters are the settings you choose <em>before<\/em> training (learning rate, tree depth, regularization strength) — as opposed to parameters the model learns. Tuning searches for the best combination. Know the search strategies and, crucially, how to tune <em>without<\/em> fooling yourself.<\/div><\/div>\n<h2 id=\"parameters-vs-hyperparameters\">Parameters vs hyperparameters<\/h2>\n<p><strong>Parameters<\/strong> are learned from data (the weights). <strong>Hyperparameters<\/strong> are knobs <em>you<\/em> set: learning rate, number of trees, max depth, dropout rate, batch size. The model can't learn these itself, so you search for good values.<\/p>\n<h2 id=\"search-strategies\">Search strategies<\/h2>\n<ul><li><strong>Grid search<\/strong> — try every combination in a predefined grid. Thorough but explodes<\/li><\/ul>\n<p>combinatorially; wasteful because most combinations are bad.<\/p>\n<ul><li><strong>Random search<\/strong> — sample combinations at random. Surprisingly, it usually beats<\/li><\/ul>\n<p>grid search for the same budget, because only a few hyperparameters actually matter   and random sampling explores those more efficiently.<\/p>\n<ul><li><strong>Bayesian optimization<\/strong> — build a model of \"which settings look promising\" from<\/li><\/ul>\n<p>past trials and focus the search there. More sample-efficient; used by tools like   <strong>Optuna<\/strong>, Hyperopt, and cloud tuners.<\/p>\n<ul><li><strong>Early-stopping search (Hyperband/ASHA)<\/strong> — start many configs, kill the bad ones<\/li><\/ul>\n<p>early, give survivors more budget. Great when each training run is expensive.<\/p>\n<p>Order of preference in practice: random or Bayesian over grid; add early-stopping when runs are costly.<\/p>\n<h2 id=\"the-pitfall-tuning-on-the-test-set\">The pitfall: tuning on the test set<\/h2>\n<p>If you tune hyperparameters against your <strong>test<\/strong> set, you've secretly leaked it — the test score is now optimistic and won't hold in production. The fix is a <strong>validation<\/strong> set (or cross-validation, section 4): tune on validation, and touch the test set only <em>once<\/em> at the very end for an honest estimate. This is a favorite \"what's wrong with this workflow?\" interview trap.<\/p>\n<h2 id=\"track-everything\">Track everything<\/h2>\n<p>Tuning produces dozens or hundreds of runs, so you log each config and its score with an experiment tracker (section 4) — otherwise you can't reproduce the winner or know why it won.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>Optuna<\/strong> is the popular Bayesian/pruning library; <strong>Ray Tune<\/strong> parallelizes big searches; <strong>W&amp;B Sweeps<\/strong> and the <strong>SageMaker / Vertex<\/strong> built-in tuners do it as a managed service. Every trial's config and score is logged to the experiment tracker so the winner is reproducible.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I run Optuna with early-stopping pruning, parallelized on Ray Tune, and log every trial to MLflow so I can reproduce the best config.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Parameter vs hyperparameter? <em>(learned from data vs set by you before training.)<\/em><\/li><li>Why does random search often beat grid search? *(few hyperparameters matter; random<\/li><\/ul>\n<p>sampling explores them better per unit budget.)*<\/p>\n<ul><li>Why never tune on the test set? *(it leaks the test set, giving an optimistic score;<\/li><\/ul>\n<p>tune on validation, use test once at the end.)*<\/p>","toc":[{"level":2,"id":"parameters-vs-hyperparameters","text":"Parameters vs hyperparameters"},{"level":2,"id":"search-strategies","text":"Search strategies"},{"level":2,"id":"the-pitfall-tuning-on-the-test-set","text":"The pitfall: tuning on the test set"},{"level":2,"id":"track-everything","text":"Track everything"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"hyperparameter tuning 💡 tl;dr hyperparameters are the settings you choose before training (learning rate, tree depth, regularization strength) — as opposed to parameters the model learns. tuning searches for the best combination. know the search strategies and, crucially, how to tune without fooling yourself. parameters vs hyperparameters parameters are learned from data (the weights). hyperparameters are knobs you set: learning rate, number of trees, max depth, dropout rate, batch size. the model can't learn these itself, so you search for good values. search strategies grid search — try every combination in a predefined grid. thorough but explodes combinatorially; wasteful because most combinations are bad. random search — sample combinations at random. surprisingly, it usually beats grid search for the same budget, because only a few hyperparameters actually matter and random sampling explores those more efficiently. bayesian optimization — build a model of \"which settings look promising\" from past trials and focus the search there. more sample-efficient; used by tools like optuna , hyperopt, and cloud tuners. early-stopping search (hyperband/asha) — start many configs, kill the bad ones early, give survivors more budget. great when each training run is expensive. order of preference in practice: random or bayesian over grid; add early-stopping when runs are costly. the pitfall: tuning on the test set if you tune hyperparameters against your test set, you've secretly leaked it — the test score is now optimistic and won't hold in production. the fix is a validation set (or cross-validation, section 4): tune on validation, and touch the test set only once at the very end for an honest estimate. this is a favorite \"what's wrong with this workflow?\" interview trap. track everything tuning produces dozens or hundreds of runs, so you log each config and its score with an experiment tracker (section 4) — otherwise you can't reproduce the winner or know why it won. 🔗 connecting the dots: the real stack optuna is the popular bayesian/pruning library; ray tune parallelizes big searches; w&b sweeps and the sagemaker / vertex built-in tuners do it as a managed service. every trial's config and score is logged to the experiment tracker so the winner is reproducible. how you'd say it: \"i run optuna with early-stopping pruning, parallelized on ray tune, and log every trial to mlflow so i can reproduce the best config.\" self-check parameter vs hyperparameter? (learned from data vs set by you before training.) why does random search often beat grid search? *(few hyperparameters matter; random sampling explores them better per unit budget.)* why never tune on the test set? *(it leaks the test set, giving an optimistic score; tune on validation, use test once at the end.)*","words":443},{"path":"04-experimentation/README.md","title":"Overview","section":"4 · Experimentation","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"4-experimentation\">4: Experimentation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> ML is empirical — you don't know what works until you test it. This section is how you test <em>honestly<\/em>: splitting data so your metrics mean something, tracking experiments so you can reproduce winners, and running online A/B tests to prove the model actually helps the business.<\/div><\/div>\n<h2 id=\"why-a-whole-section-on-this\">Why a whole section on this<\/h2>\n<p>The JD asks for \"running ML tests and experiments and statistical analysis.\" The skill isn't running one model — it's setting up a process where results are <strong>trustworthy and reproducible<\/strong>. Most bad ML decisions come from fooling yourself with a leaky split or an untracked lucky run. Getting experimentation right is what separates rigor from guesswork.<\/p>\n<h2 id=\"the-three-pages\">The three pages<\/h2>\n<ul><li><strong>Validation &amp; data splits<\/strong> — train/validation/test, cross-validation, and the<\/li><\/ul>\n<p>time-series gotcha.<\/p>\n<ul><li><strong>Experiment tracking<\/strong> — logging runs so results are reproducible and comparable.<\/li><li><strong>Online A/B testing &amp; stats<\/strong> — proving the model helps real users, and reading the<\/li><\/ul>\n<p>statistics without being fooled.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"validation-splits.md\" href=\"#\">validation-splits.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-a-whole-section-on-this","text":"Why a whole section on this"},{"level":2,"id":"the-three-pages","text":"The three pages"}],"text":"4: experimentation 💡 tl;dr ml is empirical — you don't know what works until you test it. this section is how you test honestly : splitting data so your metrics mean something, tracking experiments so you can reproduce winners, and running online a/b tests to prove the model actually helps the business. why a whole section on this the jd asks for \"running ml tests and experiments and statistical analysis.\" the skill isn't running one model — it's setting up a process where results are trustworthy and reproducible . most bad ml decisions come from fooling yourself with a leaky split or an untracked lucky run. getting experimentation right is what separates rigor from guesswork. the three pages validation & data splits — train/validation/test, cross-validation, and the time-series gotcha. experiment tracking — logging runs so results are reproducible and comparable. online a/b testing & stats — proving the model helps real users, and reading the statistics without being fooled. → start: validation-splits.md","words":162},{"path":"04-experimentation/validation-splits.md","title":"Validation & Data Splits","section":"4 · Experimentation","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"validation-data-splits\">Validation &amp; Data Splits<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> You split data into <strong>train<\/strong> (fit the model), <strong>validation<\/strong> (tune and choose), and <strong>test<\/strong> (a final honest estimate touched once). Cross-validation makes this more robust on limited data. And time-series data needs a special split or you cheat by predicting the past from the future.<\/div><\/div>\n<h2 id=\"the-three-way-split\">The three-way split<\/h2>\n<ul><li><strong>Training set<\/strong> — the model learns its parameters here.<\/li><li><strong>Validation set<\/strong> — you tune hyperparameters and compare models here.<\/li><li><strong>Test set<\/strong> — a locked box you open <em>once<\/em> at the end to estimate real-world<\/li><\/ul>\n<p>performance.<\/p>\n<p>The reason for three (not two) is subtle but important: if you both tune <em>and<\/em> report on the same held-out set, you've indirectly fit to it, so its score is optimistic. The test set stays untouched during development precisely so its number is trustworthy.<\/p>\n<h2 id=\"cross-validation\">Cross-validation<\/h2>\n<p>With limited data, a single validation split is noisy — you might get lucky or unlucky. <strong>k-fold cross-validation<\/strong> splits the data into k parts, trains k times (each time holding out a different part as validation), and averages the scores. You get a more stable estimate and use all your data for both roles. Standard k is 5 or 10. Use it when data is scarce; skip it when data is huge and one split is plenty.<\/p>\n<div class=\"diagram\">\n  <div class=\"folds\">\n    <div class=\"fold\"><span class=\"fold-lbl\">fold 1<\/span><div class=\"fold-bars\">\n      <span class=\"fold-seg test\">test<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><\/div><\/div>\n    <div class=\"fold\"><span class=\"fold-lbl\">fold 2<\/span><div class=\"fold-bars\">\n      <span class=\"fold-seg train\">train<\/span><span class=\"fold-seg test\">test<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><\/div><\/div>\n    <div class=\"fold\"><span class=\"fold-lbl\">fold 3<\/span><div class=\"fold-bars\">\n      <span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg test\">test<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><\/div><\/div>\n    <div class=\"fold\"><span class=\"fold-lbl\">fold 4<\/span><div class=\"fold-bars\">\n      <span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg test\">test<\/span><span class=\"fold-seg train\">train<\/span><\/div><\/div>\n    <div class=\"fold\"><span class=\"fold-lbl\">fold 5<\/span><div class=\"fold-bars\">\n      <span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg train\">train<\/span><span class=\"fold-seg test\">test<\/span><\/div><\/div>\n  <\/div>\n  <div class=\"diagram-cap\">Each row holds out a different fifth for testing — average the 5 scores.<\/div>\n<\/div>\n<h2 id=\"the-time-series-trap\">The time-series trap<\/h2>\n<p>If your data has time order (sales, sensor readings, user events), a <em>random<\/em> split lets the model train on future data and predict the past — leakage that inflates your score and collapses in production. Instead, split <strong>by time<\/strong>: train on earlier data, validate/test on later data (a \"rolling\" or \"expanding window\" split). Whenever the problem has a time dimension, say this unprompted — it's a common gotcha.<\/p>\n<h2 id=\"class-imbalance-in-splits\">Class imbalance in splits<\/h2>\n<p>When one class is rare, use <strong>stratified<\/strong> splitting so each split keeps the same class ratio — otherwise a fold might contain almost no positives and give meaningless scores.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>In practice this is <strong>scikit-learn<\/strong> <code>model_selection<\/code>: <code>KFold<\/code>, <code>StratifiedKFold<\/code> for imbalance, <code>TimeSeriesSplit<\/code> for time-ordered data, and <code>cross_val_score<\/code> / <code>cross_validate<\/code> to run it. Pair it with <strong>DVC<\/strong> or a Delta snapshot so the <em>exact<\/em> split and data version are reproducible.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For time-series I use <code>TimeSeriesSplit<\/code> so I never train on the future, and I version the dataset with DVC so a split is reproducible.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why three splits instead of two? *(tuning and reporting on the same set makes the<\/li><\/ul>\n<p>score optimistic; test stays untouched for an honest estimate.)*<\/p>\n<ul><li>When is cross-validation worth it? *(limited data — it gives a stable estimate and<\/li><\/ul>\n<p>uses all data; less needed when data is huge.)*<\/p>\n<ul><li>How do you split time-series data and why? *(by time, train on past / test on future;<\/li><\/ul>\n<p>a random split leaks the future.)*<\/p>","toc":[{"level":2,"id":"the-three-way-split","text":"The three-way split"},{"level":2,"id":"cross-validation","text":"Cross-validation"},{"level":2,"id":"the-time-series-trap","text":"The time-series trap"},{"level":2,"id":"class-imbalance-in-splits","text":"Class imbalance in splits"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"validation & data splits 💡 tl;dr you split data into train (fit the model), validation (tune and choose), and test (a final honest estimate touched once). cross-validation makes this more robust on limited data. and time-series data needs a special split or you cheat by predicting the past from the future. the three-way split training set — the model learns its parameters here. validation set — you tune hyperparameters and compare models here. test set — a locked box you open once at the end to estimate real-world performance. the reason for three (not two) is subtle but important: if you both tune and report on the same held-out set, you've indirectly fit to it, so its score is optimistic. the test set stays untouched during development precisely so its number is trustworthy. cross-validation with limited data, a single validation split is noisy — you might get lucky or unlucky. k-fold cross-validation splits the data into k parts, trains k times (each time holding out a different part as validation), and averages the scores. you get a more stable estimate and use all your data for both roles. standard k is 5 or 10. use it when data is scarce; skip it when data is huge and one split is plenty. fold 1 test train train train train fold 2 train test train train train fold 3 train train test train train fold 4 train train train test train fold 5 train train train train test each row holds out a different fifth for testing — average the 5 scores. the time-series trap if your data has time order (sales, sensor readings, user events), a random split lets the model train on future data and predict the past — leakage that inflates your score and collapses in production. instead, split by time : train on earlier data, validate/test on later data (a \"rolling\" or \"expanding window\" split). whenever the problem has a time dimension, say this unprompted — it's a common gotcha. class imbalance in splits when one class is rare, use stratified splitting so each split keeps the same class ratio — otherwise a fold might contain almost no positives and give meaningless scores. 🔗 connecting the dots: the real stack in practice this is scikit-learn model_selection : kfold , stratifiedkfold for imbalance, timeseriessplit for time-ordered data, and cross_val_score / cross_validate to run it. pair it with dvc or a delta snapshot so the exact split and data version are reproducible. how you'd say it: \"for time-series i use timeseriessplit so i never train on the future, and i version the dataset with dvc so a split is reproducible.\" self-check why three splits instead of two? *(tuning and reporting on the same set makes the score optimistic; test stays untouched for an honest estimate.)* when is cross-validation worth it? *(limited data — it gives a stable estimate and uses all data; less needed when data is huge.)* how do you split time-series data and why? *(by time, train on past / test on future; a random split leaks the future.)*","words":511},{"path":"04-experimentation/experiment-tracking.md","title":"Experiment Tracking","section":"4 · Experimentation","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"experiment-tracking\">Experiment Tracking<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> ML involves running <em>many<\/em> experiments — different data, features, models, hyperparameters. Without tracking, you can't reproduce the good one or explain why it won. An experiment tracker (MLflow, Weights &amp; Biases) logs each run's inputs and results so the process is reproducible and comparable.<\/div><\/div>\n<h2 id=\"the-problem-it-solves\">The problem it solves<\/h2>\n<p>Picture running 50 variations over two weeks. Later, \"the good model\" is a file called <code>model_final_v3_really.pkl<\/code> and nobody remembers which data, features, or learning rate produced it. That's not a hypothetical — it's the default state without discipline. ML is empirical and iterative, so <strong>reproducibility<\/strong> is a first-class concern.<\/p>\n<h2 id=\"what-to-log-per-run\">What to log per run<\/h2>\n<ul><li><strong>Parameters<\/strong> — hyperparameters, model type, feature set.<\/li><li><strong>Metrics<\/strong> — accuracy, F1, loss, and so on, over training.<\/li><li><strong>Artifacts<\/strong> — the trained model file, plots, the confusion matrix.<\/li><li><strong>Code + data version<\/strong> — the git commit and which dataset/version was used.<\/li><li><strong>Environment<\/strong> — library versions, so it can be rebuilt.<\/li><\/ul>\n<p>The goal is that any past run can be <strong>reproduced<\/strong> and any two runs <strong>compared<\/strong> side by side.<\/p>\n<h2 id=\"tools\">Tools<\/h2>\n<p><strong>MLflow<\/strong> (open source: tracking + a model registry, section 5), <strong>Weights &amp; Biases<\/strong> and <strong>Neptune<\/strong> (rich dashboards and collaboration), plus the built-in tracking in SageMaker and Vertex AI. Any of them beats spreadsheets and filenames.<\/p>\n<h2 id=\"reproducibility-is-more-than-the-tracker\">Reproducibility is more than the tracker<\/h2>\n<p>True reproducibility also means <strong>versioning your data<\/strong> (tools like DVC or a data snapshot), <strong>pinning random seeds<\/strong>, and <strong>containerizing<\/strong> the environment (section 5). A model is the product of code + data + config + environment — pin all four or \"it worked last week\" becomes a mystery.<\/p>\n<h2 id=\"why-interviewers-care\">Why interviewers care<\/h2>\n<p>Tracking is a marker of maturity: it's the difference between a hobbyist who trains models and an engineer who runs a <em>process<\/em>. Being able to say \"I log every run's params, metrics, artifacts, and data version so any result is reproducible and comparable\" signals you've worked on real teams.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>The tools are <strong>MLflow<\/strong> (tracking + model registry, the open-source default), <strong>Weights &amp; Biases<\/strong> and <strong>Neptune<\/strong> (richer dashboards), with <strong>DVC<\/strong> versioning the data. On a lakehouse, MLflow ties runs to the exact <strong>Delta / Unity Catalog<\/strong> data version, and the registered model promotes straight to serving.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I log params, metrics, artifacts, the git commit, and the data version to MLflow, so any past run — and the model it produced — can be reproduced exactly.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What breaks without experiment tracking? *(reproducibility — you can't recreate or<\/li><\/ul>\n<p>explain the winning run.)*<\/p>\n<ul><li>Name three things to log per run. *(params, metrics, artifacts, code/data version,<\/li><\/ul>\n<p>environment — any three.)*<\/p>\n<ul><li>What four things must you pin for true reproducibility? *(code, data, config,<\/li><\/ul>\n<p>environment.)*<\/p>","toc":[{"level":2,"id":"the-problem-it-solves","text":"The problem it solves"},{"level":2,"id":"what-to-log-per-run","text":"What to log per run"},{"level":2,"id":"tools","text":"Tools"},{"level":2,"id":"reproducibility-is-more-than-the-tracker","text":"Reproducibility is more than the tracker"},{"level":2,"id":"why-interviewers-care","text":"Why interviewers care"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"experiment tracking 💡 tl;dr ml involves running many experiments — different data, features, models, hyperparameters. without tracking, you can't reproduce the good one or explain why it won. an experiment tracker (mlflow, weights & biases) logs each run's inputs and results so the process is reproducible and comparable. the problem it solves picture running 50 variations over two weeks. later, \"the good model\" is a file called model_final_v3_really.pkl and nobody remembers which data, features, or learning rate produced it. that's not a hypothetical — it's the default state without discipline. ml is empirical and iterative, so reproducibility is a first-class concern. what to log per run parameters — hyperparameters, model type, feature set. metrics — accuracy, f1, loss, and so on, over training. artifacts — the trained model file, plots, the confusion matrix. code + data version — the git commit and which dataset/version was used. environment — library versions, so it can be rebuilt. the goal is that any past run can be reproduced and any two runs compared side by side. tools mlflow (open source: tracking + a model registry, section 5), weights & biases and neptune (rich dashboards and collaboration), plus the built-in tracking in sagemaker and vertex ai. any of them beats spreadsheets and filenames. reproducibility is more than the tracker true reproducibility also means versioning your data (tools like dvc or a data snapshot), pinning random seeds , and containerizing the environment (section 5). a model is the product of code + data + config + environment — pin all four or \"it worked last week\" becomes a mystery. why interviewers care tracking is a marker of maturity: it's the difference between a hobbyist who trains models and an engineer who runs a process . being able to say \"i log every run's params, metrics, artifacts, and data version so any result is reproducible and comparable\" signals you've worked on real teams. 🔗 connecting the dots: the real stack the tools are mlflow (tracking + model registry, the open-source default), weights & biases and neptune (richer dashboards), with dvc versioning the data. on a lakehouse, mlflow ties runs to the exact delta / unity catalog data version, and the registered model promotes straight to serving. how you'd say it: \"i log params, metrics, artifacts, the git commit, and the data version to mlflow, so any past run — and the model it produced — can be reproduced exactly.\" self-check what breaks without experiment tracking? *(reproducibility — you can't recreate or explain the winning run.)* name three things to log per run. *(params, metrics, artifacts, code/data version, environment — any three.)* what four things must you pin for true reproducibility? *(code, data, config, environment.)*","words":448},{"path":"04-experimentation/ab-testing.md","title":"Online A/B Testing & Stats","section":"4 · Experimentation","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"online-ab-testing-stats\">Online A/B Testing &amp; Stats<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Offline metrics (F1, AUC) tell you a model is <em>technically<\/em> better; only an online <strong>A/B test<\/strong> tells you it's <em>actually<\/em> better for users and the business. You split live traffic between the old and new model and measure a business metric, then use statistics to check the difference is real, not noise.<\/div><\/div>\n<h2 id=\"why-offline-isnt-enough\">Why offline isn't enough<\/h2>\n<p>A model can improve offline accuracy and still hurt the product — maybe it's slower, maybe the metric didn't capture what users care about, maybe the training data doesn't match live traffic. The only proof is exposing it to real users. This is the gap between \"data scientist\" (offline metric) and \"ML engineer\" (does it move the real number).<\/p>\n<h2 id=\"how-an-ab-test-works\">How an A/B test works<\/h2>\n<p>Randomly split users into a <strong>control<\/strong> group (current model, \"A\") and a <strong>treatment<\/strong> group (new model, \"B\"), run both live, and compare a <strong>business metric<\/strong> — click-through rate, conversion, revenue per user, retention. Randomization is what makes the two groups comparable, so any difference is attributable to the model.<\/p>\n<div class=\"diagram\">\n  <div class=\"branch\">\n    <span class=\"node data\">users<\/span>\n    <span class=\"split-arw\" title=\"randomly split\"><\/span>\n    <div class=\"fork\">\n      <span class=\"node\">A: current model<span class=\"nsub\">measure metric<\/span><\/span>\n      <span class=\"node soft\">B: new model<span class=\"nsub\">measure metric<\/span><\/span>\n    <\/div>\n    <span class=\"varw\"><\/span>\n    <span class=\"node out\">compare<\/span>\n  <\/div>\n<\/div>\n<h2 id=\"reading-the-statistics-without-fooling-yourself\">Reading the statistics (without fooling yourself)<\/h2>\n<p>The difference you observe could be luck, so you test for <strong>statistical significance<\/strong>:<\/p>\n<ul><li><strong>p-value<\/strong> — roughly, the chance of seeing this difference if the models were<\/li><\/ul>\n<p>actually equal. A small p-value (&lt; 0.05 by convention) means the result is unlikely to   be noise. It does <strong>not<\/strong> mean the effect is large.<\/p>\n<ul><li><strong>Statistical power / sample size<\/strong> — you need enough users, run for enough time, to<\/li><\/ul>\n<p>detect a real effect. Peeking early and stopping when it looks good inflates false   positives.<\/p>\n<ul><li><strong>Practical significance<\/strong> — a tiny but \"significant\" lift may not be worth the risk<\/li><\/ul>\n<p>and cost of shipping. Significance ≠ importance.<\/p>\n<p>The mature answer: <em>\"I confirm the lift on the business metric is statistically significant with an adequate sample and run duration, and I also check it's large enough to matter in practice — and I watch guardrail metrics like latency and error rate so a 'winning' model isn't quietly breaking something else.\"<\/em><\/p>\n<h2 id=\"common-pitfalls\">Common pitfalls<\/h2>\n<p>Stopping the test the moment it looks good (<strong>peeking<\/strong>), running too short to see weekly cycles, ignoring <strong>novelty effects<\/strong> (users react to <em>any<\/em> change at first), and forgetting <strong>guardrail metrics<\/strong> (a model that lifts clicks but tanks latency or revenue is not a win).<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Live experiments run through a feature-flag / experimentation platform — <strong>Optimizely<\/strong>, <strong>Statsig<\/strong>, <strong>LaunchDarkly<\/strong>, or <strong>GrowthBook<\/strong> — which handles the traffic split and significance math; ad-hoc stats use <strong>scipy<\/strong> / <strong>statsmodels<\/strong>. The model itself is served behind a flag so you can ramp or roll back instantly (ties to canary in §5).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"We shipped the new model behind a Statsig flag to 5% of traffic, watched the business metric and guardrails (latency, errors), and ramped only after it was significant.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why A/B test if offline metrics already improved? *(offline ≠ business impact; live<\/li><\/ul>\n<p>users are the only real proof.)*<\/p>\n<ul><li>What does a p-value below 0.05 tell you — and not tell you? *(the difference is<\/li><\/ul>\n<p>unlikely to be noise; it does NOT say the effect is large.)*<\/p>\n<ul><li>Name two A/B pitfalls. *(peeking/early stopping, too-short duration, novelty effect,<\/li><\/ul>\n<p>ignoring guardrails — any two.)*<\/p>","toc":[{"level":2,"id":"why-offline-isnt-enough","text":"Why offline isn't enough"},{"level":2,"id":"how-an-ab-test-works","text":"How an A/B test works"},{"level":2,"id":"reading-the-statistics-without-fooling-yourself","text":"Reading the statistics (without fooling yourself)"},{"level":2,"id":"common-pitfalls","text":"Common pitfalls"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"online a/b testing & stats 💡 tl;dr offline metrics (f1, auc) tell you a model is technically better; only an online a/b test tells you it's actually better for users and the business. you split live traffic between the old and new model and measure a business metric, then use statistics to check the difference is real, not noise. why offline isn't enough a model can improve offline accuracy and still hurt the product — maybe it's slower, maybe the metric didn't capture what users care about, maybe the training data doesn't match live traffic. the only proof is exposing it to real users. this is the gap between \"data scientist\" (offline metric) and \"ml engineer\" (does it move the real number). how an a/b test works randomly split users into a control group (current model, \"a\") and a treatment group (new model, \"b\"), run both live, and compare a business metric — click-through rate, conversion, revenue per user, retention. randomization is what makes the two groups comparable, so any difference is attributable to the model. users a: current model measure metric b: new model measure metric compare reading the statistics (without fooling yourself) the difference you observe could be luck, so you test for statistical significance : p-value — roughly, the chance of seeing this difference if the models were actually equal. a small p-value (< 0.05 by convention) means the result is unlikely to be noise. it does not mean the effect is large. statistical power / sample size — you need enough users, run for enough time, to detect a real effect. peeking early and stopping when it looks good inflates false positives. practical significance — a tiny but \"significant\" lift may not be worth the risk and cost of shipping. significance ≠ importance. the mature answer: \"i confirm the lift on the business metric is statistically significant with an adequate sample and run duration, and i also check it's large enough to matter in practice — and i watch guardrail metrics like latency and error rate so a 'winning' model isn't quietly breaking something else.\" common pitfalls stopping the test the moment it looks good ( peeking ), running too short to see weekly cycles, ignoring novelty effects (users react to any change at first), and forgetting guardrail metrics (a model that lifts clicks but tanks latency or revenue is not a win). 🔗 connecting the dots: the real stack live experiments run through a feature-flag / experimentation platform — optimizely , statsig , launchdarkly , or growthbook — which handles the traffic split and significance math; ad-hoc stats use scipy / statsmodels . the model itself is served behind a flag so you can ramp or roll back instantly (ties to canary in §5). how you'd say it: \"we shipped the new model behind a statsig flag to 5% of traffic, watched the business metric and guardrails (latency, errors), and ramped only after it was significant.\" self-check why a/b test if offline metrics already improved? *(offline ≠ business impact; live users are the only real proof.)* what does a p-value below 0.05 tell you — and not tell you? *(the difference is unlikely to be noise; it does not say the effect is large.)* name two a/b pitfalls. *(peeking/early stopping, too-short duration, novelty effect, ignoring guardrails — any two.)*","words":554},{"path":"05-mlops-serving/README.md","title":"Overview","section":"5 · MLOps & Serving","quiz":false,"accent":"#e0663f","html":"<h1 id=\"5-mlops-serving\">5: MLOps &amp; Serving<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> MLOps is \"DevOps for machine learning\" — the practices and tooling to get models into production reliably and keep them there. This section covers how you <em>serve<\/em> a model (the patterns), how you <em>package and version<\/em> it (registry), and how you <em>automate<\/em> the path from code to production (CI/CD pipelines). This is the heart of the ML <em>Engineer<\/em> role.<\/div><\/div>\n<h2 id=\"why-this-is-the-core-of-the-job\">Why this is the core of the job<\/h2>\n<p>Anyone can train a model in a notebook. The value an ML engineer adds is turning that into a <strong>reliable, repeatable, monitored service<\/strong> — one that can be updated safely, rolled back when wrong, and reproduced months later. If a company is hiring an \"ML Engineer\" over a \"data scientist,\" this section is usually <em>why<\/em>.<\/p>\n<h2 id=\"mlops-in-one-idea\">MLOps in one idea<\/h2>\n<p>Regular software has code. ML systems have <strong>code + model + data<\/strong>, and all three change and can break you. MLOps extends DevOps to version, test, deploy, and monitor all three together. That extra surface — models that silently decay, data that drifts — is what makes MLOps its own discipline.<\/p>\n<h2 id=\"the-three-pages\">The three pages<\/h2>\n<ul><li><strong>Serving patterns<\/strong> — batch, online/real-time, and streaming; how a model is<\/li><\/ul>\n<p>actually called.<\/p>\n<ul><li><strong>Packaging, registry &amp; versioning<\/strong> — containers, the model registry, and staged<\/li><\/ul>\n<p>promotion.<\/p>\n<ul><li><strong>CI/CD &amp; pipelines for ML<\/strong> — automating retrain → test → deploy, with safe rollout.<\/li><\/ul>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"serving-patterns.md\" href=\"#\">serving-patterns.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-this-is-the-core-of-the-job","text":"Why this is the core of the job"},{"level":2,"id":"mlops-in-one-idea","text":"MLOps in one idea"},{"level":2,"id":"the-three-pages","text":"The three pages"}],"text":"5: mlops & serving 💡 tl;dr mlops is \"devops for machine learning\" — the practices and tooling to get models into production reliably and keep them there. this section covers how you serve a model (the patterns), how you package and version it (registry), and how you automate the path from code to production (ci/cd pipelines). this is the heart of the ml engineer role. why this is the core of the job anyone can train a model in a notebook. the value an ml engineer adds is turning that into a reliable, repeatable, monitored service — one that can be updated safely, rolled back when wrong, and reproduced months later. if a company is hiring an \"ml engineer\" over a \"data scientist,\" this section is usually why . mlops in one idea regular software has code. ml systems have code + model + data , and all three change and can break you. mlops extends devops to version, test, deploy, and monitor all three together. that extra surface — models that silently decay, data that drifts — is what makes mlops its own discipline. the three pages serving patterns — batch, online/real-time, and streaming; how a model is actually called. packaging, registry & versioning — containers, the model registry, and staged promotion. ci/cd & pipelines for ml — automating retrain → test → deploy, with safe rollout. → start: serving-patterns.md","words":231},{"path":"05-mlops-serving/serving-patterns.md","title":"Serving Patterns","section":"5 · MLOps & Serving","quiz":false,"accent":"#e0663f","html":"<h1 id=\"serving-patterns\">Serving Patterns<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> There are three ways to run a model in production, chosen by <em>when<\/em> you need the prediction. <strong>Batch<\/strong> scores a big set on a schedule; <strong>online (real-time)<\/strong> scores one request on demand behind an API; <strong>streaming<\/strong> scores events continuously. Match the pattern to the latency the use case demands.<\/div><\/div>\n<h2 id=\"batch-offline-serving\">Batch (offline) serving<\/h2>\n<p>Run predictions on a schedule over a large dataset and store the results for later use — e.g. nightly, score every user's churn risk and write it to a table the app reads. It's <strong>simple and cheap<\/strong> (no always-on service, no latency pressure) and perfect when predictions don't need to be instant. The limit is freshness: predictions are as old as the last run.<\/p>\n<h2 id=\"online-real-time-serving\">Online (real-time) serving<\/h2>\n<p>The model sits behind an <strong>API endpoint<\/strong>; a request comes in, the model scores it, and the answer returns in milliseconds — a fraud check at checkout, a recommendation as a page loads. This is what most people mean by \"deploying a model.\" It needs an always-running, <strong>low-latency, scalable<\/strong> service, which brings concerns like autoscaling, p99 latency, and load balancing (sections 7–8).<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">request<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">API<span class=\"nsub\">load balancer<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">model service<span class=\"nsub\">N replicas<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">prediction<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">response<\/span>\n  <\/div>\n<\/div>\n<h2 id=\"streaming-serving\">Streaming serving<\/h2>\n<p>The model scores events as they flow through a stream (Kafka → processor → model), continuously and without an explicit request — e.g. tagging every transaction in a live feed. It sits between batch and online: continuous like streaming data, but you're reacting to events rather than answering user requests.<\/p>\n<h2 id=\"choosing\">Choosing<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Need the prediction…<\/th><th>Pattern<\/th><\/tr><\/thead><tbody><tr><td>later, in bulk, on a schedule<\/td><td><strong>Batch<\/strong><\/td><\/tr><tr><td>right now, per user request<\/td><td><strong>Online / real-time<\/strong><\/td><\/tr><tr><td>continuously, as events arrive<\/td><td><strong>Streaming<\/strong><\/td><\/tr><\/tbody><\/table><\/div>\n<p>Say it simply: <em>\"I pick the serving pattern from the latency requirement. If a nightly batch table satisfies the product, I don't stand up a real-time service — it's cheaper and simpler. I only build online serving when predictions must be fresh per request.\"<\/em><\/p>\n<h2 id=\"how-the-model-is-wrapped\">How the model is wrapped<\/h2>\n<p>In all cases the model is loaded inside a small service — often a REST/gRPC server (e.g. FastAPI, or a dedicated server like TensorFlow Serving / TorchServe / Triton / KServe) — packaged in a container so it runs identically everywhere (next page).<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>Online:<\/strong> wrap the model in <strong>FastAPI<\/strong> or <strong>BentoML<\/strong>, or use a dedicated server — <strong>Triton<\/strong>, <strong>TorchServe<\/strong>, <strong>TF Serving<\/strong>, or <strong>KServe / Seldon<\/strong> on Kubernetes, or a managed <strong>SageMaker / Vertex<\/strong> endpoint. <strong>Batch:<\/strong> a <strong>Spark<\/strong> / <strong>Airflow<\/strong> job writing predictions to a table. <strong>Streaming:<\/strong> a <strong>Kafka<\/strong> consumer that scores each event.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"A real-time CV model I'd serve on Triton for GPU batching; an LLM on vLLM; a nightly churn score is just a Spark job on Airflow writing to a table the app reads.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Three serving patterns and the question that picks them? *(batch / online / streaming;<\/li><\/ul>\n<p>chosen by required freshness/latency.)*<\/p>\n<ul><li>Why prefer batch when it's enough? *(cheaper and simpler — no always-on low-latency<\/li><\/ul>\n<p>service.)*<\/p>\n<ul><li>What does online serving add operationally? *(an always-on, autoscaling, low-latency<\/li><\/ul>\n<p>API with p99 and load-balancing concerns.)*<\/p>","toc":[{"level":2,"id":"batch-offline-serving","text":"Batch (offline) serving"},{"level":2,"id":"online-real-time-serving","text":"Online (real-time) serving"},{"level":2,"id":"streaming-serving","text":"Streaming serving"},{"level":2,"id":"choosing","text":

t. peeking early and stopping when it looks good inflates false positives. practical significance — a tiny but \"significant\" lift may not be worth the risk and cost of shipping. significance ≠ importance. the mature answer: \"i confirm the lift on the business metric is statistically significant with an adequate sample and run duration, and i also check it's large enough to matter in practice — and i watch guardrail metrics like latency and error rate so a 'winning' model isn't quietly breaking something else.\" common pitfalls stopping the test the moment it looks good ( peeking ), running too short to see weekly cycles, ignoring novelty effects (users react to any change at first), and forgetting guardrail metrics (a model that lifts clicks but tanks latency or revenue is not a win). 🔗 connecting the dots — the real stack live experiments run through a feature-flag / experimentation platform — optimizely , statsig , launchdarkly , or growthbook — which handles the traffic split and significance math; ad-hoc stats use scipy / statsmodels . the model itself is served behind a flag so you can ramp or roll back instantly (ties to canary in §5). how you'd say it: \"we shipped the new model behind a statsig flag to 5% of traffic, watched the business metric and guardrails (latency, errors), and ramped only after it was significant.\" self-check why a/b test if offline metrics already improved? *(offline ≠ business impact; live users are the only real proof.)* what does a p-value below 0.05 tell you — and not tell you? *(the difference is unlikely to be noise; it does not say the effect is large.)* name two a/b pitfalls. *(peeking/early stopping, too-short duration, novelty effect, ignoring guardrails — any two.)*","words":563},{"path":"05-mlops-serving/README.md","title":"Overview","section":"5 · MLOps & Serving","quiz":false,"accent":"#e0663f","html":"<h1 id=\"5-mlops-serving\">5 — MLOps &amp; Serving<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> MLOps is \"DevOps for machine learning\" — the practices and tooling to get models into production reliably and keep them there. This section covers how you <em>serve<\/em> a model (the patterns), how you <em>package and version<\/em> it (registry), and how you <em>automate<\/em> the path from code to production (CI/CD pipelines). This is the heart of the ML <em>Engineer<\/em> role.<\/div><\/div>\n<h2 id=\"why-this-is-the-core-of-the-job\">Why this is the core of the job<\/h2>\n<p>Anyone can train a model in a notebook. The value an ML engineer adds is turning that into a <strong>reliable, repeatable, monitored service<\/strong> — one that can be updated safely, rolled back when wrong, and reproduced months later. If a company is hiring an \"ML Engineer\" over a \"data scientist,\" this section is usually <em>why<\/em>.<\/p>\n<h2 id=\"mlops-in-one-idea\">MLOps in one idea<\/h2>\n<p>Regular software has code. ML systems have <strong>code + model + data<\/strong>, and all three change and can break you. MLOps extends DevOps to version, test, deploy, and monitor all three together. That extra surface — models that silently decay, data that drifts — is what makes MLOps its own discipline.<\/p>\n<h2 id=\"the-three-pages\">The three pages<\/h2>\n<ul><li><strong>Serving patterns<\/strong> — batch, online/real-time, and streaming; how a model is<\/li><\/ul>\n<p>actually called.<\/p>\n<ul><li><strong>Packaging, registry &amp; versioning<\/strong> — containers, the model registry, and staged<\/li><\/ul>\n<p>promotion.<\/p>\n<ul><li><strong>CI/CD &amp; pipelines for ML<\/strong> — automating retrain → test → deploy, with safe rollout.<\/li><\/ul>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"serving-patterns.md\" href=\"#\">serving-patterns.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-this-is-the-core-of-the-job","text":"Why this is the core of the job"},{"level":2,"id":"mlops-in-one-idea","text":"MLOps in one idea"},{"level":2,"id":"the-three-pages","text":"The three pages"}],"text":"5 — mlops & serving 💡 tl;dr mlops is \"devops for machine learning\" — the practices and tooling to get models into production reliably and keep them there. this section covers how you serve a model (the patterns), how you package and version it (registry), and how you automate the path from code to production (ci/cd pipelines). this is the heart of the ml engineer role. why this is the core of the job anyone can train a model in a notebook. the value an ml engineer adds is turning that into a reliable, repeatable, monitored service — one that can be updated safely, rolled back when wrong, and reproduced months later. if a company is hiring an \"ml engineer\" over a \"data scientist,\" this section is usually why . mlops in one idea regular software has code. ml systems have code + model + data , and all three change and can break you. mlops extends devops to version, test, deploy, and monitor all three together. that extra surface — models that silently decay, data that drifts — is what makes mlops its own discipline. the three pages serving patterns — batch, online/real-time, and streaming; how a model is actually called. packaging, registry & versioning — containers, the model registry, and staged promotion. ci/cd & pipelines for ml — automating retrain → test → deploy, with safe rollout. → start: serving-patterns.md","words":232},{"path":"05-mlops-serving/serving-patterns.md","title":"Serving Patterns","section":"5 · MLOps & Serving","quiz":false,"accent":"#e0663f","html":"<h1 id=\"serving-patterns\">Serving Patterns<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> There are three ways to run a model in production, chosen by <em>when<\/em> you need the prediction. <strong>Batch<\/strong> scores a big set on a schedule; <strong>online (real-time)<\/strong> scores one request on demand behind an API; <strong>streaming<\/strong> scores events continuously. Match the pattern to the latency the use case demands.<\/div><\/div>\n<h2 id=\"batch-offline-serving\">Batch (offline) serving<\/h2>\n<p>Run predictions on a schedule over a large dataset and store the results for later use — e.g. nightly, score every user's churn risk and write it to a table the app reads. It's <strong>simple and cheap<\/strong> (no always-on service, no latency pressure) and perfect when predictions don't need to be instant. The limit is freshness: predictions are as old as the last run.<\/p>\n<h2 id=\"online-real-time-serving\">Online (real-time) serving<\/h2>\n<p>The model sits behind an <strong>API endpoint<\/strong>; a request comes in, the model scores it, and the answer returns in milliseconds — a fraud check at checkout, a recommendation as a page loads. This is what most people mean by \"deploying a model.\" It needs an always-running, <strong>low-latency, scalable<\/strong> service, which brings concerns like autoscaling, p99 latency, and load balancing (sections 7–8).<\/p>\n<pre><code>request → API (load balancer) → model service (N replicas) → prediction → response<\/code><\/pre>\n<h2 id=\"streaming-serving\">Streaming serving<\/h2>\n<p>The model scores events as they flow through a stream (Kafka → processor → model), continuously and without an explicit request — e.g. tagging every transaction in a live feed. It sits between batch and online: continuous like streaming data, but you're reacting to events rather than answering user requests.<\/p>\n<h2 id=\"choosing\">Choosing<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Need the prediction…<\/th><th>Pattern<\/th><\/tr><\/thead><tbody><tr><td>later, in bulk, on a schedule<\/td><td><strong>Batch<\/strong><\/td><\/tr><tr><td>right now, per user request<\/td><td><strong>Online / real-time<\/strong><\/td><\/tr><tr><td>continuously, as events arrive<\/td><td><strong>Streaming<\/strong><\/td><\/tr><\/tbody><\/table><\/div>\n<p>Say it simply: <em>\"I pick the serving pattern from the latency requirement. If a nightly batch table satisfies the product, I don't stand up a real-time service — it's cheaper and simpler. I only build online serving when predictions must be fresh per request.\"<\/em><\/p>\n<h2 id=\"how-the-model-is-wrapped\">How the model is wrapped<\/h2>\n<p>In all cases the model is loaded inside a small service — often a REST/gRPC server (e.g. FastAPI, or a dedicated server like TensorFlow Serving / TorchServe / Triton / KServe) — packaged in a container so it runs identically everywhere (next page).<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>Online:<\/strong> wrap the model in <strong>FastAPI<\/strong> or <strong>BentoML<\/strong>, or use a dedicated server — <strong>Triton<\/strong>, <strong>TorchServe<\/strong>, <strong>TF Serving<\/strong>, or <strong>KServe / Seldon<\/strong> on Kubernetes, or a managed <strong>SageMaker / Vertex<\/strong> endpoint. <strong>Batch:<\/strong> a <strong>Spark<\/strong> / <strong>Airflow<\/strong> job writing predictions to a table. <strong>Streaming:<\/strong> a <strong>Kafka<\/strong> consumer that scores each event.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"A real-time CV model I'd serve on Triton for GPU batching; an LLM on vLLM; a nightly churn score is just a Spark job on Airflow writing to a table the app reads.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Three serving patterns and the question that picks them? *(batch / online / streaming;<\/li><\/ul>\n<p>chosen by required freshness/latency.)*<\/p>\n<ul><li>Why prefer batch when it's enough? *(cheaper and simpler — no always-on low-latency<\/li><\/ul>\n<p>service.)*<\/p>\n<ul><li>What does online serving add operationally? *(an always-on, autoscaling, low-latency<\/li><\/ul>\n<p>API with p99 and load-balancing concerns.)*<\/p>","toc":[{"level":2,"id":"batch-offline-serving","text":"Batch (offline) serving"},{"level":2,"id":"online-real-time-serving","text":"Online (real-time) serving"},{"level":2,"id":"streaming-serving","text":"Streaming serving"},{"level":2,"id":"choosing","text":"Choosing"},{"level":2,"id":"how-the-model-is-wrapped","text":"How the model is wrapped"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"serving patterns 💡 tl;dr there are three ways to run a model in production, chosen by when you need the prediction. batch scores a big set on a schedule; online (real-time) scores one request on demand behind an api; streaming scores events continuously. match the pattern to the latency the use case demands. batch (offline) serving run predictions on a schedule over a large dataset and store the results for later use — e.g. nightly, score every user's churn risk and write it to a table the app reads. it's simple and cheap (no always-on service, no latency pressure) and perfect when predictions don't need to be instant. the limit is freshness: predictions are as old as the last run. online (real-time) serving the model sits behind an api endpoint ; a request comes in, the model scores it, and the answer returns in milliseconds — a fraud check at checkout, a recommendation as a page loads. this is what most people mean by \"deploying a model.\" it needs an always-running, low-latency, scalable service, which brings concerns like autoscaling, p99 latency, and load balancing (sections 7–8). request → api (load balancer) → model service (n replicas) → prediction → response streaming serving the model scores events as they flow through a stream (kafka → processor → model), continuously and without an explicit request — e.g. tagging every transaction in a live feed. it sits between batch and online: continuous like streaming data, but you're reacting to events rather than answering user requests. choosing need the prediction… pattern later, in bulk, on a schedule batch right now, per user request online / real-time continuously, as events arrive streaming say it simply: \"i pick the serving pattern from the latency requirement. if a nightly batch table satisfies the product, i don't stand up a real-time service — it's cheaper and simpler. i only build online serving when predictions must be fresh per request.\" how the model is wrapped in all cases the model is loaded inside a small service — often a rest/grpc server (e.g. fastapi, or a dedicated server like tensorflow serving / torchserve / triton / kserve) — packaged in a container so it runs identically everywhere (next page). 🔗 connecting the dots — the real stack online: wrap the model in fastapi or bentoml , or use a dedicated server — triton , torchserve , tf serving , or kserve / seldon on kubernetes, or a managed sagemaker / vertex endpoint. batch: a spark / airflow job writing predictions to a table. streaming: a kafka consumer that scores each event. how you'd say it: \"a real-time cv model i'd serve on triton for gpu batching; an llm on vllm; a nightly churn score is just a spark job on airflow writing to a table the app reads.\" self-check three serving patterns and the question that picks them? *(batch / online / streaming; chosen by required freshness/latency.)* why prefer batch when it's enough? *(cheaper and simpler — no always-on low-latency service.)* what does online serving add operationally? *(an always-on, autoscaling, low-latency api with p99 and load-balancing concerns.)*","words":517},{"path":"05-mlops-serving/packaging-and-registry.md","title":"Packaging, Registry & Versioning","section":"5 · MLOps & Serving","quiz":false,"accent":"#e0663f","html":"<h1 id=\"packaging-registry-versioning\">Packaging, Registry &amp; Versioning<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> To ship a model reliably you <strong>package<\/strong> it (usually a container) so it runs identically everywhere, register it in a <strong>model registry<\/strong> with a version and stage (staging → production), and keep older versions so you can <strong>roll back<\/strong>. This is what makes deployment repeatable instead of a scary one-off.<\/div><\/div>\n<h2 id=\"package-it-in-a-container\">Package it in a container<\/h2>\n<p>A model needs its exact environment — Python version, library versions, the model file — or it behaves differently in production than in your notebook (\"works on my machine\"). A <strong>Docker container<\/strong> bundles the model plus its full environment into one immutable image that runs the same on any machine. Containerizing is the baseline step that makes everything downstream (Kubernetes, scaling, reproducibility) possible.<\/p>\n<h2 id=\"the-model-registry\">The model registry<\/h2>\n<p>A <strong>model registry<\/strong> is a versioned catalog of trained models — the \"source of truth\" for what's deployable. Each model gets a <strong>version number<\/strong>, metadata (metrics, training data, who/when), and a <strong>stage<\/strong>: <em>staging<\/em> (under test) → <em>production<\/em> (live) → <em>archived<\/em>. Tools: MLflow Model Registry, SageMaker, Vertex AI.<\/p>\n<pre><code>train → register (v5, metrics attached) → promote to staging → test → promote to production\n                                          (v4 stays archived → instant rollback)<\/code><\/pre>\n<p>The registry gives you three things that matter in production: a clear record of what's live, a controlled <strong>promotion<\/strong> process (nothing hits production unreviewed), and instant <strong>rollback<\/strong> to the previous version when a deploy goes wrong.<\/p>\n<h2 id=\"versioning-code-data-and-model\">Versioning code, data, <em>and<\/em> model<\/h2>\n<p>Regular software versions code. ML must version <strong>three<\/strong> things, because a model is the product of all of them:<\/p>\n<ul><li><strong>Code<\/strong> — git, as usual.<\/li><li><strong>Data<\/strong> — the training dataset/snapshot (DVC, or a versioned table), so you know what<\/li><\/ul>\n<p>the model learned from.<\/p>\n<ul><li><strong>Model<\/strong> — the artifact itself, in the registry.<\/li><\/ul>\n<p>If you can't answer \"which code + which data produced the model that's live right now,\" you can't debug or reproduce it. Versioning all three is the fix.<\/p>\n<h2 id=\"rollback-the-safety-net\">Rollback: the safety net<\/h2>\n<p>Because models can degrade in ways tests miss, <strong>keeping the previous version pinned and ready<\/strong> is essential — when a new model misbehaves in production, you flip back in seconds rather than scramble to retrain. Never overwrite the live model in place.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Package with <strong>Docker<\/strong>; register in the <strong>MLflow Model Registry<\/strong>, <strong>SageMaker / Vertex<\/strong> registries, or <strong>Unity Catalog<\/strong> (models beside tables). Version data with <strong>DVC<\/strong> or a Delta snapshot, and code with git — so \"which code + which data made the live model\" is always answerable.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"The model ships as a Docker image, registered in MLflow with its metrics and data version, promoted staging → production, and the previous version stays pinned for instant rollback.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why containerize a model? *(bundle the exact environment so it runs identically<\/li><\/ul>\n<p>everywhere — no \"works on my machine.\")*<\/p>\n<ul><li>What does a model registry give you? *(versioning, staged promotion to production,<\/li><\/ul>\n<p>and instant rollback.)*<\/p>\n<ul><li>What three things must ML version, and why? *(code, data, model — a model is the<\/li><\/ul>\n<p>product of all three, needed to reproduce/debug.)*<\/p>","toc":[{"level":2,"id":"package-it-in-a-container","text":"Package it in a container"},{"level":2,"id":"the-model-registry","text":"The model registry"},{"level":2,"id":"versioning-code-data-and-model","text":"Versioning code, data, and model"},{"level":2,"id":"rollback-the-safety-net","text":"Rollback: the safety net"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"packaging, registry & versioning 💡 tl;dr to ship a model reliably you package it (usually a container) so it runs identically everywhere, register it in a model registry with a version and stage (staging → production), and keep older versions so you can roll back . this is what makes deployment repeatable instead of a scary one-off. package it in a container a model needs its exact environment — python version, library versions, the model file — or it behaves differently in production than in your notebook (\"works on my machine\"). a docker container bundles the model plus its full environment into one immutable image that runs the same on any machine. containerizing is the baseline step that makes everything downstream (kubernetes, scaling, reproducibility) possible. the model registry a model registry is a versioned catalog of trained models — the \"source of truth\" for what's deployable. each model gets a version number , metadata (metrics, training data, who/when), and a stage : staging (under test) → production (live) → archived . tools: mlflow model registry, sagemaker, vertex ai. train → register (v5, metrics attached) → promote to staging → test → promote to production (v4 stays archived → instant rollback) the registry gives you three things that matter in production: a clear record of what's live, a controlled promotion process (nothing hits production unreviewed), and instant rollback to the previous version when a deploy goes wrong. versioning code, data, and model regular software versions code. ml must version three things, because a model is the product of all of them: code — git, as usual. data — the training dataset/snapshot (dvc, or a versioned table), so you know what the model learned from. model — the artifact itself, in the registry. if you can't answer \"which code + which data produced the model that's live right now,\" you can't debug or reproduce it. versioning all three is the fix. rollback: the safety net because models can degrade in ways tests miss, keeping the previous version pinned and ready is essential — when a new model misbehaves in production, you flip back in seconds rather than scramble to retrain. never overwrite the live model in place. 🔗 connecting the dots — the real stack package with docker ; register in the mlflow model registry , sagemaker / vertex registries, or unity catalog (models beside tables). version data with dvc or a delta snapshot, and code with git — so \"which code + which data made the live model\" is always answerable. how you'd say it: \"the model ships as a docker image, registered in mlflow with its metrics and data version, promoted staging → production, and the previous version stays pinned for instant rollback.\" self-check why containerize a model? *(bundle the exact environment so it runs identically everywhere — no \"works on my machine.\")* what does a model registry give you? *(versioning, staged promotion to production, and instant rollback.)* what three things must ml version, and why? *(code, data, model — a model is the product of all three, needed to reproduce/debug.)*","words":511},{"path":"05-mlops-serving/cicd-for-ml.md","title":"CI/CD & Pipelines for ML","section":"5 · MLOps & Serving","quiz":false,"accent":"#e0663f","html":"<h1 id=\"cicd-pipelines-for-ml\">CI/CD &amp; Pipelines for ML<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> CI/CD automates the path from a code change to a deployed model — building, testing, and releasing without manual steps. ML adds a twist: you also automate <strong>retraining<\/strong> and you test <strong>data and models<\/strong>, not just code. And you roll out new models gradually so a bad one can't take down everything.<\/div><\/div>\n<h2 id=\"cicd-quickly\">CI/CD, quickly<\/h2>\n<p><strong>Continuous Integration (CI)<\/strong> = every code change is automatically built and tested. <strong>Continuous Delivery/Deployment (CD)<\/strong> = passing changes are automatically released to production (or staged for one click). The point is to make releases <strong>frequent, small, and safe<\/strong> instead of rare and scary.<\/p>\n<h2 id=\"whats-different-for-ml\">What's different for ML<\/h2>\n<p>Regular CI/CD tests code. ML pipelines also need to test the things that make ML break:<\/p>\n<ul><li><strong>Data validation<\/strong> — is the incoming data schema/distribution sane? (section 2)<\/li><li><strong>Model validation<\/strong> — does the retrained model beat a threshold and the current<\/li><\/ul>\n<p>production model on a holdout, before it's allowed out?<\/p>\n<ul><li><strong>The training pipeline itself<\/strong> is automated — data → features → train → evaluate →<\/li><\/ul>\n<p>register — so retraining is a repeatable pipeline, not a person in a notebook. This is   sometimes called <strong>Continuous Training (CT)<\/strong>, the extra \"CT\" in MLOps.<\/p>\n<pre><code>code/data change → CI (tests + data checks) → train pipeline → evaluate vs prod\n→ if better &amp; valid → register → CD (staged rollout) → monitor (§6)<\/code><\/pre>\n<h2 id=\"safe-rollout-strategies\">Safe rollout strategies<\/h2>\n<p>You never flip 100% of traffic to a new model blindly. Standard patterns:<\/p>\n<ul><li><strong>Canary<\/strong> — send a small slice of traffic (say 5%) to the new model, watch metrics,<\/li><\/ul>\n<p>then ramp up if healthy.<\/p>\n<ul><li><strong>Blue-green<\/strong> — run new (green) alongside old (blue); switch traffic over once green<\/li><\/ul>\n<p>is verified, and switch back instantly if not.<\/p>\n<ul><li><strong>Shadow<\/strong> — run the new model on real traffic <em>without using its output<\/em>, just<\/li><\/ul>\n<p>logging it, to compare against production safely before it makes any real decision.<\/p>\n<p>These give you the two things production needs: <strong>catch a bad model on a fraction of traffic<\/strong>, and <strong>roll back fast<\/strong>.<\/p>\n<h2 id=\"maturity-levels-a-nice-framing-to-name\">Maturity levels (a nice framing to name)<\/h2>\n<p>Teams progress from <strong>manual<\/strong> (notebook → hand-deploy), to <strong>automated pipelines<\/strong> (one click retrains and deploys), to <strong>full CI/CD/CT<\/strong> (data or drift triggers an automated retrain, validate, and staged rollout). Knowing this ladder lets you place a team — and answer \"how would you improve their MLOps?\"<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>CI is <strong>GitHub Actions<\/strong> / <strong>GitLab CI<\/strong> / <strong>Jenkins<\/strong>; ML <em>pipelines<\/em> (data → train → eval → register) are <strong>Kubeflow Pipelines<\/strong>, <strong>Vertex Pipelines<\/strong>, <strong>Airflow<\/strong>, or <strong>Argo Workflows<\/strong>; gradual rollout uses <strong>Argo Rollouts<\/strong> or <strong>KServe<\/strong> canary. Data/model validation gates use <strong>Great Expectations<\/strong> and a metric threshold check.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"A push triggers GitHub Actions to run tests and data checks, then a Kubeflow pipeline retrains and evaluates against production; if it wins, it registers and canaries out via KServe.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What's the extra \"CT\" in MLOps beyond CI/CD? *(Continuous Training — automated<\/li><\/ul>\n<p>retraining pipelines.)*<\/p>\n<ul><li>Two things ML CI/CD tests that regular CI/CD doesn't? *(data validation and model<\/li><\/ul>\n<p>validation against a threshold/production model.)*<\/p>\n<ul><li>Name two safe-rollout strategies. <em>(canary, blue-green, shadow — any two.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"cicd-quickly","text":"CI/CD, quickly"},{"level":2,"id":"whats-different-for-ml","text":"What's different for ML"},{"level":2,"id":"safe-rollout-strategies","text":"Safe rollout strategies"},{"level":2,"id":"maturity-levels-a-nice-framing-to-name","text":"Maturity levels (a nice framing to name)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"ci/cd & pipelines for ml 💡 tl;dr ci/cd automates the path from a code change to a deployed model — building, testing, and releasing without manual steps. ml adds a twist: you also automate retraining and you test data and models , not just code. and you roll out new models gradually so a bad one can't take down everything. ci/cd, quickly continuous integration (ci) = every code change is automatically built and tested. continuous delivery/deployment (cd) = passing changes are automatically released to production (or staged for one click). the point is to make releases frequent, small, and safe instead of rare and scary. what's different for ml regular ci/cd tests code. ml pipelines also need to test the things that make ml break: data validation — is the incoming data schema/distribution sane? (section 2) model validation — does the retrained model beat a threshold and the current production model on a holdout, before it's allowed out? the training pipeline itself is automated — data → features → train → evaluate → register — so retraining is a repeatable pipeline, not a person in a notebook. this is sometimes called continuous training (ct) , the extra \"ct\" in mlops. code/data change → ci (tests + data checks) → train pipeline → evaluate vs prod → if better & valid → register → cd (staged rollout) → monitor (§6) safe rollout strategies you never flip 100% of traffic to a new model blindly. standard patterns: canary — send a small slice of traffic (say 5%) to the new model, watch metrics, then ramp up if healthy. blue-green — run new (green) alongside old (blue); switch traffic over once green is verified, and switch back instantly if not. shadow — run the new model on real traffic without using its output , just logging it, to compare against production safely before it makes any real decision. these give you the two things production needs: catch a bad model on a fraction of traffic , and roll back fast . maturity levels (a nice framing to name) teams progress from manual (notebook → hand-deploy), to automated pipelines (one click retrains and deploys), to full ci/cd/ct (data or drift triggers an automated retrain, validate, and staged rollout). knowing this ladder lets you place a team — and answer \"how would you improve their mlops?\" 🔗 connecting the dots — the real stack ci is github actions / gitlab ci / jenkins ; ml pipelines (data → train → eval → register) are kubeflow pipelines , vertex pipelines , airflow , or argo workflows ; gradual rollout uses argo rollouts or kserve canary. data/model validation gates use great expectations and a metric threshold check. how you'd say it: \"a push triggers github actions to run tests and data checks, then a kubeflow pipeline retrains and evaluates against production; if it wins, it registers and canaries out via kserve.\" self-check what's the extra \"ct\" in mlops beyond ci/cd? *(continuous training — automated retraining pipelines.)* two things ml ci/cd tests that regular ci/cd doesn't? *(data validation and model validation against a threshold/production model.)* name two safe-rollout strategies. (canary, blue-green, shadow — any two.)","words":527},{"path":"06-monitoring-reliability/README.md","title":"Overview","section":"6 · Monitoring & Reliability","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"6-monitoring-reliability\">6 — Monitoring &amp; Reliability<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A deployed model isn't done — it's a liability you have to watch. Unlike regular software, a model can <strong>silently get worse<\/strong> while every server stays green, because the world it learned drifts away from the data it sees now. This section is how you detect that decay (drift and data-quality monitoring), watch the service health, and close the loop by retraining.<\/div><\/div>\n<h2 id=\"the-core-idea-models-decay-silently\">The core idea: models decay silently<\/h2>\n<p>Normal software fails loudly — an error, a crash, a 500. A model fails <strong>quietly<\/strong>: it keeps returning confident predictions that are increasingly wrong, and nothing throws an error. So you can't wait for it to \"break\"; you have to actively monitor whether it's still <em>accurate<\/em>. This is the single most important reliability concept for ML.<\/p>\n<h2 id=\"two-layers-to-watch\">Two layers to watch<\/h2>\n<p>Just like a system has both \"is it up?\" and \"is it correct?\", ML monitoring splits into:<\/p>\n<ul><li><strong>Operational<\/strong> — latency, throughput, errors, resource use (standard service<\/li><\/ul>\n<p>monitoring).<\/p>\n<ul><li><strong>Model/data<\/strong> — drift, data quality, and prediction/accuracy metrics (the ML-specific<\/li><\/ul>\n<p>part, and the hard part because you often have no immediate labels).<\/p>\n<h2 id=\"the-three-pages\">The three pages<\/h2>\n<ul><li><strong>Drift &amp; data-quality monitoring<\/strong> — the different kinds of drift and how you detect<\/li><\/ul>\n<p>them without labels.<\/p>\n<ul><li><strong>Performance &amp; ops monitoring<\/strong> — service health plus proxy signals for model quality.<\/li><li><strong>Retraining loops<\/strong> — closing the loop: when and how to retrain.<\/li><\/ul>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"drift-and-quality.md\" href=\"#\">drift-and-quality.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-core-idea-models-decay-silently","text":"The core idea: models decay silently"},{"level":2,"id":"two-layers-to-watch","text":"Two layers to watch"},{"level":2,"id":"the-three-pages","text":"The three pages"}],"text":"6 — monitoring & reliability 💡 tl;dr a deployed model isn't done — it's a liability you have to watch. unlike regular software, a model can silently get worse while every server stays green, because the world it learned drifts away from the data it sees now. this section is how you detect that decay (drift and data-quality monitoring), watch the service health, and close the loop by retraining. the core idea: models decay silently normal software fails loudly — an error, a crash, a 500. a model fails quietly : it keeps returning confident predictions that are increasingly wrong, and nothing throws an error. so you can't wait for it to \"break\"; you have to actively monitor whether it's still accurate . this is the single most important reliability concept for ml. two layers to watch just like a system has both \"is it up?\" and \"is it correct?\", ml monitoring splits into: operational — latency, throughput, errors, resource use (standard service monitoring). model/data — drift, data quality, and prediction/accuracy metrics (the ml-specific part, and the hard part because you often have no immediate labels). the three pages drift & data-quality monitoring — the different kinds of drift and how you detect them without labels. performance & ops monitoring — service health plus proxy signals for model quality. retraining loops — closing the loop: when and how to retrain. → start: drift-and-quality.md","words":233},{"path":"06-monitoring-reliability/drift-and-quality.md","title":"Drift & Data-Quality Monitoring","section":"6 · Monitoring & Reliability","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"drift-data-quality-monitoring\">Drift &amp; Data-Quality Monitoring<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> \"Drift\" is when production data or the relationships in it move away from what the model trained on, quietly degrading accuracy. The two main kinds are <strong>data (covariate) drift<\/strong> — inputs change — and <strong>concept drift<\/strong> — the input→output relationship changes. You detect them by comparing live data to a training baseline, usually <em>without<\/em> labels.<\/div><\/div>\n<h2 id=\"the-kinds-of-drift-know-these-names\">The kinds of drift (know these names)<\/h2>\n<ul><li><strong>Data drift (covariate shift)<\/strong> — the distribution of the <em>inputs<\/em> changes. A new<\/li><\/ul>\n<p>user demographic signs up, a sensor is recalibrated, prices inflate. The model's logic   is still valid, but it's now seeing inputs unlike its training data.<\/p>\n<ul><li><strong>Concept drift<\/strong> — the <em>relationship<\/em> between inputs and the target changes. What<\/li><\/ul>\n<p>predicted fraud last year no longer does because fraudsters adapted. Here even the same   inputs should map to different outputs now.<\/p>\n<ul><li><strong>Label/prior drift<\/strong> — the base rate of the target shifts (fraud goes from 1% to 5%).<\/li><\/ul>\n<p>The distinction matters because the fix differs: covariate drift often means \"retrain on newer data\"; concept drift means \"the problem itself changed — relabel and rethink.\"<\/p>\n<h2 id=\"detecting-drift-without-labels\">Detecting drift without labels<\/h2>\n<p>In production you usually don't get the true answer immediately (did this user <em>actually<\/em> churn? you find out next month), so you can't measure accuracy live. Instead you watch <em>proxies<\/em>:<\/p>\n<ul><li><strong>Input distribution monitoring<\/strong> — compare the live distribution of each feature to<\/li><\/ul>\n<p>the training baseline, using tests/metrics like <strong>PSI (population stability index)<\/strong>,   <strong>KL divergence<\/strong>, or a KS test. A big shift = data drift alarm.<\/p>\n<ul><li><strong>Prediction distribution<\/strong> — if the model suddenly predicts \"fraud\" 10× more often,<\/li><\/ul>\n<p>something changed even before you have labels.<\/p>\n<ul><li><strong>Delayed accuracy<\/strong> — once true labels do arrive, compute real accuracy and trend it;<\/li><\/ul>\n<p>this is your ground truth, just late.<\/p>\n<h2 id=\"data-quality-monitoring-the-boring-vital-half\">Data-quality monitoring (the boring, vital half)<\/h2>\n<p>Separate from drift, plain <strong>broken data<\/strong> silently poisons predictions: a feature that starts arriving as null, a units change (dollars → cents), a schema change upstream. You run validation checks on live inputs (ranges, nulls, types, cardinality) and <strong>alert on violations<\/strong> — because a model can't tell you its input is garbage; it just returns garbage. Tools: Great Expectations, Evidently, or built-in cloud monitors.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Drift/quality tools: <strong>Evidently<\/strong> (open source), <strong>Arize<\/strong>, <strong>WhyLabs<\/strong>, <strong>Fiddler<\/strong>, <strong>NannyML<\/strong>, or the built-in <strong>SageMaker Model Monitor<\/strong> / <strong>Vertex Model Monitoring<\/strong>. Raw data checks stay in <strong>Great Expectations<\/strong>. These emit metrics that feed the same Prometheus/Grafana dashboards as the service.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Evidently computed PSI on each feature against the training baseline nightly; a sustained shift raised an alert and, past a threshold, triggered the retraining pipeline.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Data drift vs concept drift — one line each? *(inputs change vs the input→output<\/li><\/ul>\n<p>relationship changes.)*<\/p>\n<ul><li>Why can't you just monitor accuracy in production? *(true labels are usually delayed<\/li><\/ul>\n<p>or absent; you watch input/prediction distributions as proxies.)*<\/p>\n<ul><li>Name one drift-detection metric. <em>(PSI, KL divergence, KS test.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"the-kinds-of-drift-know-these-names","text":"The kinds of drift (know these names)"},{"level":2,"id":"detecting-drift-without-labels","text":"Detecting drift without labels"},{"level":2,"id":"data-quality-monitoring-the-boring-vital-half","text":"Data-quality monitoring (the boring, vital half)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"drift & data-quality monitoring 💡 tl;dr \"drift\" is when production data or the relationships in it move away from what the model trained on, quietly degrading accuracy. the two main kinds are data (covariate) drift — inputs change — and concept drift — the input→output relationship changes. you detect them by comparing live data to a training baseline, usually without labels. the kinds of drift (know these names) data drift (covariate shift) — the distribution of the inputs changes. a new user demographic signs up, a sensor is recalibrated, prices inflate. the model's logic is still valid, but it's now seeing inputs unlike its training data. concept drift — the relationship between inputs and the target changes. what predicted fraud last year no longer does because fraudsters adapted. here even the same inputs should map to different outputs now. label/prior drift — the base rate of the target shifts (fraud goes from 1% to 5%). the distinction matters because the fix differs: covariate drift often means \"retrain on newer data\"; concept drift means \"the problem itself changed — relabel and rethink.\" detecting drift without labels in production you usually don't get the true answer immediately (did this user actually churn? you find out next month), so you can't measure accuracy live. instead you watch proxies : input distribution monitoring — compare the live distribution of each feature to the training baseline, using tests/metrics like psi (population stability index) , kl divergence , or a ks test. a big shift = data drift alarm. prediction distribution — if the model suddenly predicts \"fraud\" 10× more often, something changed even before you have labels. delayed accuracy — once true labels do arrive, compute real accuracy and trend it; this is your ground truth, just late. data-quality monitoring (the boring, vital half) separate from drift, plain broken data silently poisons predictions: a feature that starts arriving as null, a units change (dollars → cents), a schema change upstream. you run validation checks on live inputs (ranges, nulls, types, cardinality) and alert on violations — because a model can't tell you its input is garbage; it just returns garbage. tools: great expectations, evidently, or built-in cloud monitors. 🔗 connecting the dots — the real stack drift/quality tools: evidently (open source), arize , whylabs , fiddler , nannyml , or the built-in sagemaker model monitor / vertex model monitoring . raw data checks stay in great expectations . these emit metrics that feed the same prometheus/grafana dashboards as the service. how you'd say it: \"evidently computed psi on each feature against the training baseline nightly; a sustained shift raised an alert and, past a threshold, triggered the retraining pipeline.\" self-check data drift vs concept drift — one line each? *(inputs change vs the input→output relationship changes.)* why can't you just monitor accuracy in production? *(true labels are usually delayed or absent; you watch input/prediction distributions as proxies.)* name one drift-detection metric. (psi, kl divergence, ks test.)","words":491},{"path":"06-monitoring-reliability/performance-monitoring.md","title":"Performance & Ops Monitoring","section":"6 · Monitoring & Reliability","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"performance-ops-monitoring\">Performance &amp; Ops Monitoring<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Alongside drift, you watch the model <em>service<\/em> like any production system — latency, throughput, errors, resource use — plus ML-specific signals like prediction confidence and (when labels arrive) live accuracy. The stack is usually Prometheus + Grafana, with alerts on the numbers that matter.<\/div><\/div>\n<h2 id=\"operational-metrics-same-as-any-service\">Operational metrics (same as any service)<\/h2>\n<p>A model behind an API is a service, so the usual SRE metrics apply:<\/p>\n<ul><li><strong>Latency<\/strong> — especially <strong>p95/p99<\/strong>, not just the average; a model that's fast on<\/li><\/ul>\n<p>average but slow at the tail hurts real users.<\/p>\n<ul><li><strong>Throughput<\/strong> — requests per second the service handles.<\/li><li><strong>Error rate<\/strong> — failed requests, timeouts, exceptions.<\/li><li><strong>Resource use<\/strong> — CPU/GPU/memory, which drives cost and autoscaling (sections 7–8).<\/li><\/ul>\n<p>If a model is too slow or falls over under load, it doesn't matter how accurate it is — so these are first-class.<\/p>\n<h2 id=\"model-quality-signals\">Model-quality signals<\/h2>\n<p>Because true accuracy is often delayed, you watch proxies continuously:<\/p>\n<ul><li><strong>Prediction confidence / score distribution<\/strong> — a shift or collapse hints the model<\/li><\/ul>\n<p>is out of its depth.<\/p>\n<ul><li><strong>Prediction distribution<\/strong> — the mix of outputs vs the training baseline.<\/li><li><strong>Feature drift<\/strong> (previous page) — feeding into the same dashboard.<\/li><li><strong>Live accuracy<\/strong> — computed as labels trickle in, trended over time; the real signal,<\/li><\/ul>\n<p>just lagged.<\/p>\n<h2 id=\"alerting-well\">Alerting well<\/h2>\n<p>The goal is to be told <em>before<\/em> users notice. Set thresholds on the metrics above and alert on sustained breaches — but tune them so you're not flooded with noise (a page you ignore is worthless). A good rule: alert on things that are <strong>actionable<\/strong> (latency spiking, drift crossing a threshold, error rate rising), and dashboard the rest.<\/p>\n<h2 id=\"the-tooling\">The tooling<\/h2>\n<p><strong>Prometheus<\/strong> collects metrics, <strong>Grafana<\/strong> visualizes them, <strong>Alertmanager<\/strong> pages you; ML-specific tools like <strong>Evidently<\/strong> or the monitoring built into SageMaker/Vertex add drift and quality dashboards on top. You don't need to memorize configs — know the roles.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Ops metrics are the standard SRE stack: <strong>Prometheus<\/strong> collects, <strong>Grafana<\/strong> dashboards, <strong>Alertmanager<\/strong> pages (or <strong>DataDog<\/strong> for all three). Model-quality signals come from <strong>Evidently / Arize<\/strong> or <strong>SageMaker Model Monitor<\/strong>, plotted on the same boards so ops and model health sit side by side.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Latency p99, error rate, and GPU use went to Prometheus/Grafana; prediction-confidence drift went to Evidently — one Grafana board, alerts on the actionable ones.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why watch p99 latency, not just the average? *(the tail is what real users feel; a<\/li><\/ul>\n<p>good average can hide bad worst-case latency.)*<\/p>\n<ul><li>Two proxy signals for model quality when labels are delayed? *(prediction confidence/<\/li><\/ul>\n<p>score distribution, prediction distribution, feature drift — any two.)*<\/p>\n<ul><li>What makes a good alert? *(actionable and tuned to avoid noise — alert on things you'd<\/li><\/ul>\n<p>actually respond to.)*<\/p>","toc":[{"level":2,"id":"operational-metrics-same-as-any-service","text":"Operational metrics (same as any service)"},{"level":2,"id":"model-quality-signals","text":"Model-quality signals"},{"level":2,"id":"alerting-well","text":"Alerting well"},{"level":2,"id":"the-tooling","text":"The tooling"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"performance & ops monitoring 💡 tl;dr alongside drift, you watch the model service like any production system — latency, throughput, errors, resource use — plus ml-specific signals like prediction confidence and (when labels arrive) live accuracy. the stack is usually prometheus + grafana, with alerts on the numbers that matter. operational metrics (same as any service) a model behind an api is a service, so the usual sre metrics apply: latency — especially p95/p99 , not just the average; a model that's fast on average but slow at the tail hurts real users. throughput — requests per second the service handles. error rate — failed requests, timeouts, exceptions. resource use — cpu/gpu/memory, which drives cost and autoscaling (sections 7–8). if a model is too slow or falls over under load, it doesn't matter how accurate it is — so these are first-class. model-quality signals because true accuracy is often delayed, you watch proxies continuously: prediction confidence / score distribution — a shift or collapse hints the model is out of its depth. prediction distribution — the mix of outputs vs the training baseline. feature drift (previous page) — feeding into the same dashboard. live accuracy — computed as labels trickle in, trended over time; the real signal, just lagged. alerting well the goal is to be told before users notice. set thresholds on the metrics above and alert on sustained breaches — but tune them so you're not flooded with noise (a page you ignore is worthless). a good rule: alert on things that are actionable (latency spiking, drift crossing a threshold, error rate rising), and dashboard the rest. the tooling prometheus collects metrics, grafana visualizes them, alertmanager pages you; ml-specific tools like evidently or the monitoring built into sagemaker/vertex add drift and quality dashboards on top. you don't need to memorize configs — know the roles. 🔗 connecting the dots — the real stack ops metrics are the standard sre stack: prometheus collects, grafana dashboards, alertmanager pages (or datadog for all three). model-quality signals come from evidently / arize or sagemaker model monitor , plotted on the same boards so ops and model health sit side by side. how you'd say it: \"latency p99, error rate, and gpu use went to prometheus/grafana; prediction-confidence drift went to evidently — one grafana board, alerts on the actionable ones.\" self-check why watch p99 latency, not just the average? *(the tail is what real users feel; a good average can hide bad worst-case latency.)* two proxy signals for model quality when labels are delayed? *(prediction confidence/ score distribution, prediction distribution, feature drift — any two.)* what makes a good alert? *(actionable and tuned to avoid noise — alert on things you'd actually respond to.)*","words":451},{"path":"06-monitoring-reliability/retraining-loops.md","title":"Retraining Loops","section":"6 · Monitoring & Reliability","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"retraining-loops\">Retraining Loops<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Drift is inevitable, so models need refreshing. Retraining can be triggered on a <strong>schedule<\/strong>, by a <strong>drift/performance signal<\/strong>, or when <strong>new data<\/strong> arrives — and the retrained model must be validated and rolled out safely, never trusted blindly. This closes the lifecycle loop.<\/div><\/div>\n<h2 id=\"when-to-retrain\">When to retrain<\/h2>\n<p>Three trigger styles, often combined:<\/p>\n<ul><li><strong>Scheduled<\/strong> — retrain every day/week/month regardless. Simple and predictable; may<\/li><\/ul>\n<p>retrain when unnecessary or too late for a sudden shift.<\/p>\n<ul><li><strong>Triggered by monitoring<\/strong> — retrain when drift or a performance drop crosses a<\/li><\/ul>\n<p>threshold (section 6). More efficient — you retrain because you <em>need<\/em> to — but   requires solid monitoring to trigger on.<\/p>\n<ul><li><strong>Data-driven<\/strong> — retrain when enough new labeled data has accumulated.<\/li><\/ul>\n<p>The thoughtful answer combines them: <em>\"a regular cadence as a floor, plus drift/ performance triggers so a sudden shift doesn't wait for the schedule.\"<\/em><\/p>\n<h2 id=\"automate-it-but-keep-a-gate\">Automate it, but keep a gate<\/h2>\n<p>Ideally retraining is an automated pipeline (the \"CT\" from section 5): fresh data → features → train → <strong>evaluate<\/strong> → register → staged rollout. The non-negotiable step is the <strong>evaluation gate<\/strong>: a newly retrained model only gets promoted if it beats a bar <em>and<\/em> the current production model on a fresh holdout. Automation without a quality gate just ships bad models faster.<\/p>\n<pre><code>new data → retrain → evaluate vs production on holdout\n   → better? → register → canary rollout (§5) → monitor (§6)\n   → worse?  → keep current model, alert<\/code><\/pre>\n<h2 id=\"dont-trust-a-retrain-blindly\">Don't trust a retrain blindly<\/h2>\n<p>A retrained model can be <em>worse<\/em> — the new data might be corrupted, mislabeled, or itself drifted. So you (1) validate the training data first, (2) gate on evaluation, and (3) roll out gradually with canary/shadow so a bad retrain is caught on a slice of traffic and rolled back. Retraining is not automatically an improvement; treat every new model as guilty until proven better.<\/p>\n<h2 id=\"the-feedback-loop-trap\">The feedback-loop trap<\/h2>\n<p>One subtle danger: if your model <em>influences<\/em> the data it later trains on, it can spiral. A recommender that only shows popular items gets clicks only on popular items, then learns \"only popular items matter,\" narrowing forever. Be wary of training on data your own model shaped, and consider logging some randomized/exploration traffic to keep the feedback honest.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The loop is wired with an orchestrator — <strong>Airflow<\/strong>, <strong>Kubeflow Pipelines<\/strong>, or <strong>Vertex Pipelines<\/strong> — triggered on a schedule <em>or<\/em> by a drift alert from <strong>Evidently / Arize<\/strong>. It pulls fresh data (feature store), retrains, gates on <strong>MLflow<\/strong>-logged metrics vs production, and canaries out via <strong>KServe<\/strong> if it wins.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"A drift alert or a weekly schedule kicked off a Kubeflow pipeline: retrain, evaluate against the live model on a fresh holdout, and only promote — canaried — if it beat it.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Three retraining triggers? <em>(scheduled, drift/performance-triggered, new-data-driven.)<\/em><\/li><li>What's the non-negotiable gate before promoting a retrained model? *(it must beat a bar<\/li><\/ul>\n<p>and the current production model on a fresh holdout.)*<\/p>\n<ul><li>What is the feedback-loop trap? *(the model influences its future training data, so it<\/li><\/ul>\n<p>reinforces its own biases; mitigate with exploration/randomized logging.)*<\/p>","toc":[{"level":2,"id":"when-to-retrain","text":"When to retrain"},{"level":2,"id":"automate-it-but-keep-a-gate","text":"Automate it, but keep a gate"},{"level":2,"id":"dont-trust-a-retrain-blindly","text":"Don't trust a retrain blindly"},{"level":2,"id":"the-feedback-loop-trap","text":"The feedback-loop trap"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"retraining loops 💡 tl;dr drift is inevitable, so models need refreshing. retraining can be triggered on a schedule , by a drift/performance signal , or when new data arrives — and the retrained model must be validated and rolled out safely, never trusted blindly. this closes the lifecycle loop. when to retrain three trigger styles, often combined: scheduled — retrain every day/week/month regardless. simple and predictable; may retrain when unnecessary or too late for a sudden shift. triggered by monitoring — retrain when drift or a performance drop crosses a threshold (section 6). more efficient — you retrain because you need to — but requires solid monitoring to trigger on. data-driven — retrain when enough new labeled data has accumulated. the thoughtful answer combines them: \"a regular cadence as a floor, plus drift/ performance triggers so a sudden shift doesn't wait for the schedule.\" automate it, but keep a gate ideally retraining is an automated pipeline (the \"ct\" from section 5): fresh data → features → train → evaluate → register → staged rollout. the non-negotiable step is the evaluation gate : a newly retrained model only gets promoted if it beats a bar and the current production model on a fresh holdout. automation without a quality gate just ships bad models faster. new data → retrain → evaluate vs production on holdout → better? → register → canary rollout (§5) → monitor (§6) → worse? → keep current model, alert don't trust a retrain blindly a retrained model can be worse — the new data might be corrupted, mislabeled, or itself drifted. so you (1) validate the training data first, (2) gate on evaluation, and (3) roll out gradually with canary/shadow so a bad retrain is caught on a slice of traffic and rolled back. retraining is not automatically an improvement; treat every new model as guilty until proven better. the feedback-loop trap one subtle danger: if your model influences the data it later trains on, it can spiral. a recommender that only shows popular items gets clicks only on popular items, then learns \"only popular items matter,\" narrowing forever. be wary of training on data your own model shaped, and consider logging some randomized/exploration traffic to keep the feedback honest. 🔗 connecting the dots — the real stack the loop is wired with an orchestrator — airflow , kubeflow pipelines , or vertex pipelines — triggered on a schedule or by a drift alert from evidently / arize . it pulls fresh data (feature store), retrains, gates on mlflow -logged metrics vs production, and canaries out via kserve if it wins. how you'd say it: \"a drift alert or a weekly schedule kicked off a kubeflow pipeline: retrain, evaluate against the live model on a fresh holdout, and only promote — canaried — if it beat it.\" self-check three retraining triggers? (scheduled, drift/performance-triggered, new-data-driven.) what's the non-negotiable gate before promoting a retrained model? *(it must beat a bar and the current production model on a fresh holdout.)* what is the feedback-loop trap? *(the model influences its future training data, so it reinforces its own biases; mitigate with exploration/randomized logging.)*","words":521},{"path":"07-cloud-infra/README.md","title":"Overview","section":"7 · Cloud & Infra","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"7-cloud-infra\">7 — Cloud &amp; Infra<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Modern ML runs on the cloud, so you should know what the big three (AWS, GCP, Azure) offer for ML, how <strong>containers and Kubernetes<\/strong> run your models at scale, and how <strong>infrastructure-as-code<\/strong> and <strong>cost control<\/strong> keep it all manageable. You don't need deep expertise in all three clouds — you need the concepts and the vocabulary.<\/div><\/div>\n<h2 id=\"why-this-section\">Why this section<\/h2>\n<p>The JD is \"ML on the cloud.\" Interviewers want to know you can operate in a cloud environment: pick the right managed service, containerize and orchestrate, provision GPUs without setting money on fire, and reason about cost and scale. This is the infrastructure layer under everything in sections 5–6.<\/p>\n<h2 id=\"the-three-pages\">The three pages<\/h2>\n<ul><li><strong>AWS / GCP / Azure ML stacks<\/strong> — the managed ML platforms and the building blocks<\/li><\/ul>\n<p>(compute, storage) they share.<\/p>\n<ul><li><strong>Containers, Kubernetes &amp; Kubeflow<\/strong> — how models are packaged and orchestrated at<\/li><\/ul>\n<p>scale.<\/p>\n<ul><li><strong>IaC, GPUs &amp; cost control<\/strong> — reproducible infra and not overspending on compute.<\/li><\/ul>\n<h2 id=\"the-shared-mental-model\">The shared mental model<\/h2>\n<p>Every cloud gives you the same primitives under different names: <strong>compute<\/strong> (VMs, GPUs), <strong>storage<\/strong> (object stores), <strong>a managed ML platform<\/strong> (train + deploy + monitor), and <strong>orchestration<\/strong> (Kubernetes). Learn the pattern once and the vendor names are just translation.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"cloud-ml-stacks.md\" href=\"#\">cloud-ml-stacks.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-this-section","text":"Why this section"},{"level":2,"id":"the-three-pages","text":"The three pages"},{"level":2,"id":"the-shared-mental-model","text":"The shared mental model"}],"text":"7 — cloud & infra 💡 tl;dr modern ml runs on the cloud, so you should know what the big three (aws, gcp, azure) offer for ml, how containers and kubernetes run your models at scale, and how infrastructure-as-code and cost control keep it all manageable. you don't need deep expertise in all three clouds — you need the concepts and the vocabulary. why this section the jd is \"ml on the cloud.\" interviewers want to know you can operate in a cloud environment: pick the right managed service, containerize and orchestrate, provision gpus without setting money on fire, and reason about cost and scale. this is the infrastructure layer under everything in sections 5–6. the three pages aws / gcp / azure ml stacks — the managed ml platforms and the building blocks (compute, storage) they share. containers, kubernetes & kubeflow — how models are packaged and orchestrated at scale. iac, gpus & cost control — reproducible infra and not overspending on compute. the shared mental model every cloud gives you the same primitives under different names: compute (vms, gpus), storage (object stores), a managed ml platform (train + deploy + monitor), and orchestration (kubernetes). learn the pattern once and the vendor names are just translation. → start: cloud-ml-stacks.md","words":210},{"path":"07-cloud-infra/cloud-ml-stacks.md","title":"AWS / GCP / Azure ML Stacks","section":"7 · Cloud & Infra","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"aws-gcp-azure-ml-stacks\">AWS / GCP / Azure ML Stacks<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> All three clouds give you the same building blocks — object storage, GPU compute, and a managed ML platform that handles training, deployment, and monitoring. Know the flagship platform names and the shared primitives; don't memorize every service.<\/div><\/div>\n<h2 id=\"the-managed-ml-platforms\">The managed ML platforms<\/h2>\n<p>Each cloud has one umbrella platform that covers the ML lifecycle end to end:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Cloud<\/th><th>ML platform<\/th><th>Object storage<\/th><th>Data warehouse<\/th><\/tr><\/thead><tbody><tr><td><strong>AWS<\/strong><\/td><td><strong>SageMaker<\/strong><\/td><td>S3<\/td><td>Redshift<\/td><\/tr><tr><td><strong>GCP<\/strong><\/td><td><strong>Vertex AI<\/strong><\/td><td>GCS<\/td><td>BigQuery<\/td><\/tr><tr><td><strong>Azure<\/strong><\/td><td><strong>Azure ML<\/strong><\/td><td>Blob Storage<\/td><td>Synapse<\/td><\/tr><\/tbody><\/table><\/div>\n<p>These platforms give you managed <strong>training jobs<\/strong> (spin up GPUs, run, tear down), <strong>hosted endpoints<\/strong> (deploy a model behind an autoscaling API), a <strong>model registry<\/strong>, <strong>pipelines<\/strong>, and <strong>monitoring<\/strong> — i.e. much of sections 4–6 as a service. The pitch is that you get MLOps plumbing without building it yourself; the trade-off is cost and some lock-in.<\/p>\n<h2 id=\"the-primitives-underneath\">The primitives underneath<\/h2>\n<p>Strip away the branding and every cloud offers the same core resources:<\/p>\n<ul><li><strong>Object storage<\/strong> (S3/GCS/Blob) — cheap, near-infinite storage for datasets, models,<\/li><\/ul>\n<p>artifacts. The default home for ML data.<\/p>\n<ul><li><strong>Compute<\/strong> — VMs, and crucially <strong>GPU/accelerator instances<\/strong> for training and heavy<\/li><\/ul>\n<p>inference; also <strong>spot/preemptible<\/strong> instances at a steep discount for   interruptible jobs.<\/p>\n<ul><li><strong>Managed databases / warehouses<\/strong> — for structured data and features.<\/li><li><strong>Serverless<\/strong> (Lambda/Cloud Functions) — for lightweight glue and event-driven steps.<\/li><\/ul>\n<h2 id=\"build-vs-buy\">Build vs buy<\/h2>\n<p>A recurring judgment call: use the managed platform (fast, less ops, more cost/lock-in) or assemble open-source tools yourself on raw compute (more control, more work). The sensible default for most teams is <em>\"use the managed platform to move fast, drop to custom infra only where you have a specific need it can't meet.\"<\/em> Being able to reason about this trade-off is more valuable than knowing every service name.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Beyond the three clouds, <strong>Databricks<\/strong> is the cross-cloud <strong>lakehouse<\/strong> ML platform (Delta + Unity Catalog + <strong>MLflow<\/strong>, which it created). The recurring build-vs-buy choice is managed platform (SageMaker / Vertex / Databricks) versus assembling open source (<strong>MLflow + Feast + Kubeflow + KServe + Evidently<\/strong>) on raw compute.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"On a lakehouse I lean on Databricks + MLflow end to end; on raw cloud I assemble MLflow, Feast, KServe, and Evidently myself — same lifecycle, more control.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Name the flagship ML platform on each cloud. <em>(SageMaker, Vertex AI, Azure ML.)<\/em><\/li><li>What are the shared primitives every cloud provides for ML? *(object storage, GPU<\/li><\/ul>\n<p>compute, managed ML platform, warehouses.)*<\/p>\n<ul><li>What are spot/preemptible instances good for? *(cheap compute for interruptible jobs<\/li><\/ul>\n<p>like training or batch — big discount, can be reclaimed.)*<\/p>","toc":[{"level":2,"id":"the-managed-ml-platforms","text":"The managed ML platforms"},{"level":2,"id":"the-primitives-underneath","text":"The primitives underneath"},{"level":2,"id":"build-vs-buy","text":"Build vs buy"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"aws / gcp / azure ml stacks 💡 tl;dr all three clouds give you the same building blocks — object storage, gpu compute, and a managed ml platform that handles training, deployment, and monitoring. know the flagship platform names and the shared primitives; don't memorize every service. the managed ml platforms each cloud has one umbrella platform that covers the ml lifecycle end to end: cloud ml platform object storage data warehouse aws sagemaker s3 redshift gcp vertex ai gcs bigquery azure azure ml blob storage synapse these platforms give you managed training jobs (spin up gpus, run, tear down), hosted endpoints (deploy a model behind an autoscaling api), a model registry , pipelines , and monitoring — i.e. much of sections 4–6 as a service. the pitch is that you get mlops plumbing without building it yourself; the trade-off is cost and some lock-in. the primitives underneath strip away the branding and every cloud offers the same core resources: object storage (s3/gcs/blob) — cheap, near-infinite storage for datasets, models, artifacts. the default home for ml data. compute — vms, and crucially gpu/accelerator instances for training and heavy inference; also spot/preemptible instances at a steep discount for interruptible jobs. managed databases / warehouses — for structured data and features. serverless (lambda/cloud functions) — for lightweight glue and event-driven steps. build vs buy a recurring judgment call: use the managed platform (fast, less ops, more cost/lock-in) or assemble open-source tools yourself on raw compute (more control, more work). the sensible default for most teams is \"use the managed platform to move fast, drop to custom infra only where you have a specific need it can't meet.\" being able to reason about this trade-off is more valuable than knowing every service name. 🔗 connecting the dots — the real stack beyond the three clouds, databricks is the cross-cloud lakehouse ml platform (delta + unity catalog + mlflow , which it created). the recurring build-vs-buy choice is managed platform (sagemaker / vertex / databricks) versus assembling open source ( mlflow + feast + kubeflow + kserve + evidently ) on raw compute. how you'd say it: \"on a lakehouse i lean on databricks + mlflow end to end; on raw cloud i assemble mlflow, feast, kserve, and evidently myself — same lifecycle, more control.\" self-check name the flagship ml platform on each cloud. (sagemaker, vertex ai, azure ml.) what are the shared primitives every cloud provides for ml? *(object storage, gpu compute, managed ml platform, warehouses.)* what are spot/preemptible instances good for? *(cheap compute for interruptible jobs like training or batch — big discount, can be reclaimed.)*","words":434},{"path":"07-cloud-infra/containers-k8s.md","title":"Containers, Kubernetes & Kubeflow","section":"7 · Cloud & Infra","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"containers-kubernetes-kubeflow\">Containers, Kubernetes &amp; Kubeflow<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Containers package a model with its environment; <strong>Kubernetes<\/strong> runs and scales many containers across a cluster; <strong>Kubeflow/KServe<\/strong> add ML-specific serving and pipelines on top. This is how model services scale, self-heal, and stay portable across clouds.<\/div><\/div>\n<h2 id=\"containers-recap\">Containers recap<\/h2>\n<p>A <strong>container<\/strong> (Docker) bundles your model + code + dependencies into one portable, immutable image (section 5). That solves \"runs on my machine\" but a single container doesn't handle <em>scale<\/em> — many replicas, failover, rolling updates. That's Kubernetes' job.<\/p>\n<h2 id=\"what-kubernetes-does\">What Kubernetes does<\/h2>\n<p><strong>Kubernetes (K8s)<\/strong> is an orchestrator that runs containers across a cluster of machines and automates the operational hard parts:<\/p>\n<ul><li><strong>Scaling<\/strong> — run N replicas of your model service and add/remove them with load<\/li><\/ul>\n<p>(autoscaling).<\/p>\n<ul><li><strong>Self-healing<\/strong> — restart crashed containers, reschedule them off dead nodes.<\/li><li><strong>Rolling updates &amp; rollback<\/strong> — deploy a new version gradually, revert if it's bad.<\/li><li><strong>Load balancing &amp; service discovery<\/strong> — spread traffic across replicas.<\/li><\/ul>\n<pre><code>K8s cluster: [node] [node] [node]\n   your model service → 5 replicas spread across nodes\n   traffic → load-balanced; a dead replica is auto-replaced<\/code><\/pre>\n<p>For an ML engineer, K8s is <em>why<\/em> an online model service can handle real traffic reliably — it turns \"a container\" into \"a resilient, scalable service.\" You don't need to be a K8s expert, but you should know what it gives you and why it's everywhere.<\/p>\n<h2 id=\"kubeflow-and-kserve-ml-on-top-of-k8s\">Kubeflow and KServe (ML on top of K8s)<\/h2>\n<ul><li><strong>Kubeflow<\/strong> — a toolkit for running ML <strong>pipelines<\/strong> and workloads on Kubernetes<\/li><\/ul>\n<p>(training jobs, workflows).<\/p>\n<ul><li><strong>KServe<\/strong> (and Seldon) — model <strong>serving<\/strong> on K8s with niceties like autoscaling<\/li><\/ul>\n<p>(including scale-to-zero), canary rollout, and multi-framework support out of the box.<\/p>\n<p>These exist so you don't hand-build ML serving/pipeline features on raw K8s.<\/p>\n<h2 id=\"when-you-dont-need-k8s\">When you <em>don't<\/em> need K8s<\/h2>\n<p>Judgment point: K8s is powerful but heavy. For a small deployment, a managed endpoint (SageMaker/Vertex) or a serverless container is simpler. Reach for Kubernetes when you need fine control, multi-service orchestration, portability across clouds, or you're already running it. \"Right-size the infrastructure\" is a mature thing to say.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The stack is <strong>Docker<\/strong> images on <strong>Kubernetes<\/strong>, with <strong>Kubeflow<\/strong> for ML pipelines and <strong>KServe<\/strong> or <strong>Seldon<\/strong> for model serving (autoscaling, canary, scale-to-zero); <strong>Ray<\/strong> also runs on K8s for distributed train/serve. Managed K8s is <strong>EKS / GKE / AKS<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Models ran as Docker images on GKE, served by KServe for autoscaling and canaries, with Kubeflow Pipelines handling retraining.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What does Kubernetes add over a lone container? *(scaling, self-healing, rolling<\/li><\/ul>\n<p>updates/rollback, load balancing across a cluster.)*<\/p>\n<ul><li>What do Kubeflow and KServe add on top of K8s? *(ML pipelines and ML-aware model<\/li><\/ul>\n<p>serving — autoscaling, canary, multi-framework.)*<\/p>\n<ul><li>When might you skip K8s? *(small deployments — a managed endpoint or serverless is<\/li><\/ul>\n<p>simpler.)*<\/p>","toc":[{"level":2,"id":"containers-recap","text":"Containers recap"},{"level":2,"id":"what-kubernetes-does","text":"What Kubernetes does"},{"level":2,"id":"kubeflow-and-kserve-ml-on-top-of-k8s","text":"Kubeflow and KServe (ML on top of K8s)"},{"level":2,"id":"when-you-dont-need-k8s","text":"When you don't need K8s"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"containers, kubernetes & kubeflow 💡 tl;dr containers package a model with its environment; kubernetes runs and scales many containers across a cluster; kubeflow/kserve add ml-specific serving and pipelines on top. this is how model services scale, self-heal, and stay portable across clouds. containers recap a container (docker) bundles your model + code + dependencies into one portable, immutable image (section 5). that solves \"runs on my machine\" but a single container doesn't handle scale — many replicas, failover, rolling updates. that's kubernetes' job. what kubernetes does kubernetes (k8s) is an orchestrator that runs containers across a cluster of machines and automates the operational hard parts: scaling — run n replicas of your model service and add/remove them with load (autoscaling). self-healing — restart crashed containers, reschedule them off dead nodes. rolling updates & rollback — deploy a new version gradually, revert if it's bad. load balancing & service discovery — spread traffic across replicas. k8s cluster: [node] [node] [node] your model service → 5 replicas spread across nodes traffic → load-balanced; a dead replica is auto-replaced for an ml engineer, k8s is why an online model service can handle real traffic reliably — it turns \"a container\" into \"a resilient, scalable service.\" you don't need to be a k8s expert, but you should know what it gives you and why it's everywhere. kubeflow and kserve (ml on top of k8s) kubeflow — a toolkit for running ml pipelines and workloads on kubernetes (training jobs, workflows). kserve (and seldon) — model serving on k8s with niceties like autoscaling (including scale-to-zero), canary rollout, and multi-framework support out of the box. these exist so you don't hand-build ml serving/pipeline features on raw k8s. when you don't need k8s judgment point: k8s is powerful but heavy. for a small deployment, a managed endpoint (sagemaker/vertex) or a serverless container is simpler. reach for kubernetes when you need fine control, multi-service orchestration, portability across clouds, or you're already running it. \"right-size the infrastructure\" is a mature thing to say. 🔗 connecting the dots — the real stack the stack is docker images on kubernetes , with kubeflow for ml pipelines and kserve or seldon for model serving (autoscaling, canary, scale-to-zero); ray also runs on k8s for distributed train/serve. managed k8s is eks / gke / aks . how you'd say it: \"models ran as docker images on gke, served by kserve for autoscaling and canaries, with kubeflow pipelines handling retraining.\" self-check what does kubernetes add over a lone container? *(scaling, self-healing, rolling updates/rollback, load balancing across a cluster.)* what do kubeflow and kserve add on top of k8s? *(ml pipelines and ml-aware model serving — autoscaling, canary, multi-framework.)* when might you skip k8s? *(small deployments — a managed endpoint or serverless is simpler.)*","words":457},{"path":"07-cloud-infra/iac-and-cost.md","title":"IaC, GPUs & Cost Control","section":"7 · Cloud & Infra","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"iac-gpus-cost-control\">IaC, GPUs &amp; Cost Control<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Infrastructure-as-code (Terraform) makes your cloud setup reproducible and reviewable instead of hand-clicked and forgotten. And because GPUs and always-on endpoints are expensive, cost control — right-sizing, spot instances, autoscaling, batching — is a real part of the job.<\/div><\/div>\n<h2 id=\"infrastructure-as-code-iac\">Infrastructure as code (IaC)<\/h2>\n<p>Instead of clicking around a cloud console to create servers and services, you <strong>declare your infrastructure in code<\/strong> (Terraform, CloudFormation, Pulumi) and apply it. Benefits: it's <strong>version-controlled<\/strong> (git history of your infra), <strong>reproducible<\/strong> (spin up an identical environment in another region or account), <strong>reviewable<\/strong> (changes go through PRs), and <strong>less error-prone<\/strong> than manual clicking. For ML, this means your training cluster, endpoints, and storage are defined and repeatable, not snowflakes someone set up once and can't recreate.<\/p>\n<h2 id=\"gpus-the-expensive-part\">GPUs: the expensive part<\/h2>\n<p>Training and heavy inference need GPUs, which are pricey and scarce, so how you use them matters:<\/p>\n<ul><li><strong>Right-size<\/strong> — don't put a huge GPU on a small model; match the instance to the need.<\/li><li><strong>Spot / preemptible instances<\/strong> — big discounts (often 60–90%) for interruptible<\/li><\/ul>\n<p>workloads like training and batch scoring; pair with checkpointing so an interruption   just resumes.<\/p>\n<ul><li><strong>Don't leave GPUs idle<\/strong> — a forgotten running training instance is pure burned money;<\/li><\/ul>\n<p>automate teardown.<\/p>\n<h2 id=\"cost-control-for-serving\">Cost control for serving<\/h2>\n<p>An always-on real-time endpoint costs money every hour whether or not it's used:<\/p>\n<ul><li><strong>Autoscaling<\/strong> — scale replicas with traffic; <strong>scale-to-zero<\/strong> for rarely-used models<\/li><\/ul>\n<p>(KServe) so idle costs nothing.<\/p>\n<ul><li><strong>Batch over real-time<\/strong> — if the use case tolerates it, a scheduled batch job is far<\/li><\/ul>\n<p>cheaper than a 24/7 endpoint (section 5).<\/p>\n<ul><li><strong>Batching requests<\/strong> — group incoming requests so the GPU processes many at once,<\/li><\/ul>\n<p>raising throughput per dollar (section 8).<\/p>\n<ul><li><strong>Right-size + cheaper hardware<\/strong> — CPU or smaller instances for light models; quantized<\/li><\/ul>\n<p>models (section 8) that run on less.<\/p>\n<h2 id=\"the-framing\">The framing<\/h2>\n<p>Cost is an engineering constraint, not an afterthought: <em>\"I treat compute cost like latency — a number to design against. I default to batch and autoscaling, use spot for training with checkpointing, and only run always-on GPU endpoints when the product truly needs real-time.\"<\/em> Cost-awareness signals someone who's run real systems, not just demos.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Infra-as-code is <strong>Terraform<\/strong> (or Pulumi / CloudFormation); node autoscaling uses <strong>Karpenter<\/strong> or the cluster-autoscaler; cost visibility is <strong>Kubecost<\/strong> or native cloud cost tools. Training runs on <strong>spot / preemptible<\/strong> instances with checkpointing to object storage.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"The whole cluster and endpoints were defined in Terraform; training ran on spot nodes via Karpenter with checkpoints to S3, and Kubecost kept the GPU bill honest.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Two benefits of infrastructure-as-code? *(reproducible, version-controlled/reviewable,<\/li><\/ul>\n<p>less error-prone — any two.)*<\/p>\n<ul><li>How do you train cheaply on GPUs? *(spot/preemptible instances with checkpointing;<\/li><\/ul>\n<p>right-size; tear down when idle.)*<\/p>\n<ul><li>Two ways to cut serving cost? *(autoscaling/scale-to-zero

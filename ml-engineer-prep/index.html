frastructure.<\/p>\n<h2 id=\"choosing\">Choosing<\/h2>\n<p>The single question is: <strong>how fresh does the data need to be?<\/strong><\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Need<\/th><th>Use<\/th><\/tr><\/thead><tbody><tr><td>Daily report, nightly model retrain, recompute features<\/td><td><strong>Batch<\/strong><\/td><\/tr><tr><td>Real-time fraud block, live recommendations, instant alerts<\/td><td><strong>Streaming<\/strong><\/td><\/tr><tr><td>Both fresh <em>and<\/em> historical<\/td><td><strong>Both<\/strong> (the \"Lambda\" idea: a fast stream + a correct batch)<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Say it plainly: <em>\"I default to batch because it's simpler and cheaper, and only move to streaming when the use case genuinely needs sub-minute freshness — because streaming buys freshness at a real cost in complexity.\"<\/em> That's the senior instinct: don't reach for streaming to look sophisticated.<\/p>\n<h2 id=\"orchestration-ties-it-together\">Orchestration ties it together<\/h2>\n<p>Either way, pipelines are chains of steps with dependencies (ingest → clean → feature → train), and an <strong>orchestrator<\/strong> like Airflow (or Dagster/Prefect) schedules them, runs them in order, retries failures, and alerts you. A pipeline without orchestration is a pile of scripts someone runs by hand — fine for a demo, not for production.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>Batch<\/strong> is usually <strong>Spark<\/strong> or <strong>dbt<\/strong> transforms orchestrated by <strong>Airflow<\/strong> (or Dagster / Prefect). <strong>Streaming<\/strong> is <strong>Kafka<\/strong> as the event backbone with <strong>Flink<\/strong> or <strong>Spark Structured Streaming<\/strong> doing the processing, often writing fresh values into a feature store's online store.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Real-time fraud ran on Kafka + Flink updating features in Redis; the nightly churn model was a Spark job on Airflow — same data, different freshness, different stack.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>One-line difference between batch and streaming? *(process a chunk on a schedule vs<\/li><\/ul>\n<p>each event as it arrives.)*<\/p>\n<ul><li>Why default to batch? *(simpler, cheaper, easier to debug; only stream when<\/li><\/ul>\n<p>freshness demands it.)*<\/p>\n<ul><li>What does an orchestrator like Airflow do? *(schedules pipeline steps in dependency<\/li><\/ul>\n<p>order, retries failures, alerts.)*<\/p>","toc":[{"level":2,"id":"batch-processing","text":"Batch processing"},{"level":2,"id":"streaming-processing","text":"Streaming processing"},{"level":2,"id":"choosing","text":"Choosing"},{"level":2,"id":"orchestration-ties-it-together","text":"Orchestration ties it together"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"batch vs streaming 💡 tl;dr two ways to process data. batch runs on a schedule over a big chunk of data (nightly, hourly) — simple and cheap. streaming processes each event as it arrives — fresh but more complex. choose by how fresh the data must be. batch processing you collect data over a window and process it all at once — a nightly job that retrains a model or recomputes yesterday's features. it's the default because it's simpler, cheaper, and easier to debug : if a run fails, you just rerun it. tools: spark, sql/dbt, orchestrated by airflow. the downside is latency — features are as stale as your last run, so a nightly batch can't power a real-time fraud check. streaming processing you process events as they happen , continuously — updating a feature or scoring a transaction milliseconds after it occurs. tools: kafka (the event backbone), flink or spark structured streaming (processing). it gives you freshness but costs you complexity: you must handle out-of-order events, late data, exactly-once processing, and always-on infrastructure. choosing the single question is: how fresh does the data need to be? need use daily report, nightly model retrain, recompute features batch real-time fraud block, live recommendations, instant alerts streaming both fresh and historical both (the \"lambda\" idea: a fast stream + a correct batch) say it plainly: \"i default to batch because it's simpler and cheaper, and only move to streaming when the use case genuinely needs sub-minute freshness — because streaming buys freshness at a real cost in complexity.\" that's the senior instinct: don't reach for streaming to look sophisticated. orchestration ties it together either way, pipelines are chains of steps with dependencies (ingest → clean → feature → train), and an orchestrator like airflow (or dagster/prefect) schedules them, runs them in order, retries failures, and alerts you. a pipeline without orchestration is a pile of scripts someone runs by hand — fine for a demo, not for production. 🔗 connecting the dots — the real stack batch is usually spark or dbt transforms orchestrated by airflow (or dagster / prefect). streaming is kafka as the event backbone with flink or spark structured streaming doing the processing, often writing fresh values into a feature store's online store. how you'd say it: \"real-time fraud ran on kafka + flink updating features in redis; the nightly churn model was a spark job on airflow — same data, different freshness, different stack.\" self-check one-line difference between batch and streaming? *(process a chunk on a schedule vs each event as it arrives.)* why default to batch? *(simpler, cheaper, easier to debug; only stream when freshness demands it.)* what does an orchestrator like airflow do? *(schedules pipeline steps in dependency order, retries failures, alerts.)*","words":457},{"path":"02-data-pipelines/preprocessing-and-quality.md","title":"Preprocessing & Data Quality","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"preprocessing-data-quality\">Preprocessing &amp; Data Quality<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Raw data is never model-ready. Preprocessing turns it into clean numeric inputs — handling missing values, scaling, encoding categories — and data-quality checks stop bad data from silently poisoning your model. This is unglamorous and it's half the job.<\/div><\/div>\n<h2 id=\"common-preprocessing-steps\">Common preprocessing steps<\/h2>\n<ul><li><strong>Missing values<\/strong> — drop rows, or <em>impute<\/em> (fill with mean/median/mode, or a<\/li><\/ul>\n<p>model-based guess). Which you choose depends on how much is missing and why.<\/p>\n<ul><li><strong>Scaling / normalization<\/strong> — put numeric features on a comparable range<\/li><\/ul>\n<p>(standardization to mean 0 / std 1, or min-max to 0–1). Essential for distance- and   gradient-based models (linear models, neural nets, k-NN); tree models don't care.<\/p>\n<ul><li><strong>Encoding categoricals<\/strong> — turn categories into numbers: <strong>one-hot<\/strong> for low-<\/li><\/ul>\n<p>cardinality (color = red/green/blue), <strong>target/embedding<\/strong> encoding for high-   cardinality (zip code, user ID).<\/p>\n<ul><li><strong>Outlier handling<\/strong> — cap, remove, or transform extreme values that would distort<\/li><\/ul>\n<p>training.<\/p>\n<ul><li><strong>Text/date parsing<\/strong> — extract usable features (day-of-week, tokens, embeddings).<\/li><\/ul>\n<h2 id=\"the-leakage-trap-interviewers-love-this\">The leakage trap (interviewers love this)<\/h2>\n<p><strong>Data leakage<\/strong> is when information that won't be available at prediction time sneaks into training — and it makes your offline metrics look amazing and your production model fail. Two classic forms: (1) computing scaling or imputation statistics on the <em>whole<\/em> dataset before splitting, so test information leaks into training — always fit preprocessing on the training split only; (2) including a feature that's a proxy for the answer (e.g. \"account_closed_date\" when predicting churn). If a model seems too good to be true, suspect leakage first.<\/p>\n<h2 id=\"data-quality-stop-bad-data-early\">Data quality: stop bad data early<\/h2>\n<p>A model can't tell good data from bad — it'll happily train on corrupted inputs. So you validate data <em>before<\/em> it reaches the model, checking things like: are values in expected ranges, are required fields present, did the schema change, is the distribution similar to before? Tools like <strong>Great Expectations<\/strong> or built-in validation in feature/pipeline platforms automate this. The principle: <strong>fail fast and loudly<\/strong> on bad data rather than let it silently degrade the model — a bad-data alert is cheap, a mysteriously worse model in production is expensive.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Transforms run in <strong>pandas / Polars<\/strong> (small) or <strong>Spark<\/strong> (big); wrap them in a <strong>scikit-learn Pipeline<\/strong> so preprocessing is fit on the train split only (no leakage). Data-quality gates use <strong>Great Expectations<\/strong>, <strong>Pandera<\/strong>, or <strong>Evidently<\/strong>, run as an Airflow step that fails the pipeline loudly on bad data.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Every pipeline had a Great Expectations check as its first step — schema, nulls, ranges — so bad upstream data failed the run instead of silently degrading the model.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Which models need feature scaling and which don't? *(gradient/distance-based need<\/li><\/ul>\n<p>it; tree-based don't.)*<\/p>\n<ul><li>What is data leakage and one way it happens? *(train-time use of info unavailable at<\/li><\/ul>\n<p>prediction; e.g. fitting the scaler on all data before the split.)*<\/p>\n<ul><li>Why validate data before training? *(models can't detect bad data; catch it early<\/li><\/ul>\n<p>and loudly instead of shipping a silently worse model.)*<\/p>","toc":[{"level":2,"id":"common-preprocessing-steps","text":"Common preprocessing steps"},{"level":2,"id":"the-leakage-trap-interviewers-love-this","text":"The leakage trap (interviewers love this)"},{"level":2,"id":"data-quality-stop-bad-data-early","text":"Data quality: stop bad data early"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"preprocessing & data quality 💡 tl;dr raw data is never model-ready. preprocessing turns it into clean numeric inputs — handling missing values, scaling, encoding categories — and data-quality checks stop bad data from silently poisoning your model. this is unglamorous and it's half the job. common preprocessing steps missing values — drop rows, or impute (fill with mean/median/mode, or a model-based guess). which you choose depends on how much is missing and why. scaling / normalization — put numeric features on a comparable range (standardization to mean 0 / std 1, or min-max to 0–1). essential for distance- and gradient-based models (linear models, neural nets, k-nn); tree models don't care. encoding categoricals — turn categories into numbers: one-hot for low- cardinality (color = red/green/blue), target/embedding encoding for high- cardinality (zip code, user id). outlier handling — cap, remove, or transform extreme values that would distort training. text/date parsing — extract usable features (day-of-week, tokens, embeddings). the leakage trap (interviewers love this) data leakage is when information that won't be available at prediction time sneaks into training — and it makes your offline metrics look amazing and your production model fail. two classic forms: (1) computing scaling or imputation statistics on the whole dataset before splitting, so test information leaks into training — always fit preprocessing on the training split only; (2) including a feature that's a proxy for the answer (e.g. \"account_closed_date\" when predicting churn). if a model seems too good to be true, suspect leakage first. data quality: stop bad data early a model can't tell good data from bad — it'll happily train on corrupted inputs. so you validate data before it reaches the model, checking things like: are values in expected ranges, are required fields present, did the schema change, is the distribution similar to before? tools like great expectations or built-in validation in feature/pipeline platforms automate this. the principle: fail fast and loudly on bad data rather than let it silently degrade the model — a bad-data alert is cheap, a mysteriously worse model in production is expensive. 🔗 connecting the dots — the real stack transforms run in pandas / polars (small) or spark (big); wrap them in a scikit-learn pipeline so preprocessing is fit on the train split only (no leakage). data-quality gates use great expectations , pandera , or evidently , run as an airflow step that fails the pipeline loudly on bad data. how you'd say it: \"every pipeline had a great expectations check as its first step — schema, nulls, ranges — so bad upstream data failed the run instead of silently degrading the model.\" self-check which models need feature scaling and which don't? *(gradient/distance-based need it; tree-based don't.)* what is data leakage and one way it happens? *(train-time use of info unavailable at prediction; e.g. fitting the scaler on all data before the split.)* why validate data before training? *(models can't detect bad data; catch it early and loudly instead of shipping a silently worse model.)*","words":496},{"path":"02-data-pipelines/feature-stores.md","title":"Feature Engineering & Feature Stores","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"feature-engineering-feature-stores\">Feature Engineering &amp; Feature Stores<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Features are the model's inputs, and <strong>feature engineering<\/strong> — crafting good ones — often beats fancier models. A <strong>feature store<\/strong> is the system that computes, stores, and serves those features consistently to both training and production, solving the sneaky \"train/serve skew\" bug.<\/div><\/div>\n<h2 id=\"feature-engineering\">Feature engineering<\/h2>\n<p>A feature is any signal you feed the model. Engineering them means turning raw columns into more predictive inputs: aggregations (\"purchases in last 30 days\"), ratios, time-based features (day of week, time since last login), interactions, and domain-specific transforms. On tabular problems, good features usually move the needle more than a better algorithm — which is why this is a core skill, not an afterthought.<\/p>\n<h2 id=\"the-trainserve-skew-problem\">The train/serve skew problem<\/h2>\n<p>Here's the bug a feature store exists to prevent. You compute a feature one way in your training notebook (in Python, over historical data) and someone re-implements it <em>slightly differently<\/em> in the production service (in another language, over live data). Now the model sees different values in production than it trained on, and it quietly underperforms. This mismatch is <strong>train/serve skew<\/strong>, and it's one of the most common, hardest-to-spot MLOps bugs.<\/p>\n<h2 id=\"what-a-feature-store-does\">What a feature store does<\/h2>\n<p>A feature store is a central place to <strong>define a feature once<\/strong> and serve it two ways:<\/p>\n<pre><code>feature definition (written once)\n        │\n   ┌────┴─────┐\n   ▼          ▼\n OFFLINE     ONLINE\n store       store\n (history,   (fresh values,\n  training)   low-latency serving)<\/code><\/pre>\n<ul><li><strong>Offline store<\/strong> — historical feature values for training, with correct<\/li><\/ul>\n<p><em>point-in-time<\/em> joins so you don't leak the future into the past.<\/p>\n<ul><li><strong>Online store<\/strong> — the latest feature values in a fast key-value store (Redis-like)<\/li><\/ul>\n<p>for real-time serving at low latency.<\/p>\n<ul><li><strong>One definition<\/strong> feeds both → training and serving compute features identically →<\/li><\/ul>\n<p><strong>no skew<\/strong>. It also lets teams <strong>reuse<\/strong> features instead of rebuilding them.<\/p>\n<p>Tools: Feast (open source), or managed ones in SageMaker / Vertex AI / Databricks.<\/p>\n<h2 id=\"point-in-time-correctness-the-subtle-part\">Point-in-time correctness (the subtle part)<\/h2>\n<p>When you build a training set, each label must be paired with the feature values <em>as they were at that moment<\/em> — not today's values. Using a feature computed after the event leaks the future and inflates offline metrics. Feature stores handle these point-in-time joins for you, which is a big reason they exist.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The open-source standard is <strong>Feast<\/strong>; managed options are <strong>Tecton<\/strong> and the <strong>Databricks / SageMaker / Vertex<\/strong> feature stores. Under the hood the <strong>offline store<\/strong> is Delta / BigQuery / Parquet (for training) and the <strong>online store<\/strong> is a low-latency key-value store like <strong>Redis<\/strong> or <strong>DynamoDB<\/strong> (for serving).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"We defined features once in Feast; training read the offline store from Delta and the real-time service read the same definitions from Redis — so there was no train/serve skew.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What is train/serve skew? *(features computed differently in training vs production,<\/li><\/ul>\n<p>so the model sees mismatched inputs.)*<\/p>\n<ul><li>How does a feature store prevent it? *(define the feature once, serve the same<\/li><\/ul>\n<p>definition to both offline training and online serving.)*<\/p>\n<ul><li>Why does point-in-time correctness matter? *(pairing a label with future feature<\/li><\/ul>\n<p>values leaks the future and inflates offline metrics.)*<\/p>","toc":[{"level":2,"id":"feature-engineering","text":"Feature engineering"},{"level":2,"id":"the-trainserve-skew-problem","text":"The train/serve skew problem"},{"level":2,"id":"what-a-feature-store-does","text":"What a feature store does"},{"level":2,"id":"point-in-time-correctness-the-subtle-part","text":"Point-in-time correctness (the subtle part)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"feature engineering & feature stores 💡 tl;dr features are the model's inputs, and feature engineering — crafting good ones — often beats fancier models. a feature store is the system that computes, stores, and serves those features consistently to both training and production, solving the sneaky \"train/serve skew\" bug. feature engineering a feature is any signal you feed the model. engineering them means turning raw columns into more predictive inputs: aggregations (\"purchases in last 30 days\"), ratios, time-based features (day of week, time since last login), interactions, and domain-specific transforms. on tabular problems, good features usually move the needle more than a better algorithm — which is why this is a core skill, not an afterthought. the train/serve skew problem here's the bug a feature store exists to prevent. you compute a feature one way in your training notebook (in python, over historical data) and someone re-implements it slightly differently in the production service (in another language, over live data). now the model sees different values in production than it trained on, and it quietly underperforms. this mismatch is train/serve skew , and it's one of the most common, hardest-to-spot mlops bugs. what a feature store does a feature store is a central place to define a feature once and serve it two ways: feature definition (written once) │ ┌────┴─────┐ ▼ ▼ offline online store store (history, (fresh values, training) low-latency serving) offline store — historical feature values for training, with correct point-in-time joins so you don't leak the future into the past. online store — the latest feature values in a fast key-value store (redis-like) for real-time serving at low latency. one definition feeds both → training and serving compute features identically → no skew . it also lets teams reuse features instead of rebuilding them. tools: feast (open source), or managed ones in sagemaker / vertex ai / databricks. point-in-time correctness (the subtle part) when you build a training set, each label must be paired with the feature values as they were at that moment — not today's values. using a feature computed after the event leaks the future and inflates offline metrics. feature stores handle these point-in-time joins for you, which is a big reason they exist. 🔗 connecting the dots — the real stack the open-source standard is feast ; managed options are tecton and the databricks / sagemaker / vertex feature stores. under the hood the offline store is delta / bigquery / parquet (for training) and the online store is a low-latency key-value store like redis or dynamodb (for serving). how you'd say it: \"we defined features once in feast; training read the offline store from delta and the real-time service read the same definitions from redis — so there was no train/serve skew.\" self-check what is train/serve skew? *(features computed differently in training vs production, so the model sees mismatched inputs.)* how does a feature store prevent it? *(define the feature once, serve the same definition to both offline training and online serving.)* why does point-in-time correctness matter? *(pairing a label with future feature values leaks the future and inflates offline metrics.)*","words":519},{"path":"03-model-development/README.md","title":"Overview","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"3-model-development\">3 — Model Development<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is the \"designing and developing ML/DL systems\" bullet. Two worlds: <strong>classical ML<\/strong> (still the winner on tabular data, mostly boosted trees) and <strong>deep learning<\/strong> (for images, text, audio, and huge datasets). Plus how you train when data or models outgrow one machine, and how you tune the knobs.<\/div><\/div>\n<h2 id=\"the-honest-framing\">The honest framing<\/h2>\n<p>Deep learning gets the headlines, but a huge share of real business ML is still gradient-boosted trees on tabular data. A strong ML engineer knows <em>both<\/em> and picks by the problem, not the hype. This section gives you enough of each to reason well and to answer \"how would you model this?\" credibly.<\/p>\n<h2 id=\"the-four-pages\">The four pages<\/h2>\n<ul><li><strong>Classical ML<\/strong> — trees, random forests, and gradient boosting (XGBoost/LightGBM):<\/li><\/ul>\n<p>the tabular workhorses.<\/p>\n<ul><li><strong>Deep learning essentials<\/strong> — neurons, backprop, and the main architectures (CNN,<\/li><\/ul>\n<p>RNN/Transformer) at a level you can discuss.<\/p>\n<ul><li><strong>Training at scale<\/strong> — what to do when data or the model won't fit on one machine.<\/li><li><strong>Hyperparameter tuning<\/strong> — how to search the knobs efficiently.<\/li><\/ul>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"classical-ml.md\" href=\"#\">classical-ml.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-honest-framing","text":"The honest framing"},{"level":2,"id":"the-four-pages","text":"The four pages"}],"text":"3 — model development 💡 tl;dr this is the \"designing and developing ml/dl systems\" bullet. two worlds: classical ml (still the winner on tabular data, mostly boosted trees) and deep learning (for images, text, audio, and huge datasets). plus how you train when data or models outgrow one machine, and how you tune the knobs. the honest framing deep learning gets the headlines, but a huge share of real business ml is still gradient-boosted trees on tabular data. a strong ml engineer knows both and picks by the problem, not the hype. this section gives you enough of each to reason well and to answer \"how would you model this?\" credibly. the four pages classical ml — trees, random forests, and gradient boosting (xgboost/lightgbm): the tabular workhorses. deep learning essentials — neurons, backprop, and the main architectures (cnn, rnn/transformer) at a level you can discuss. training at scale — what to do when data or the model won't fit on one machine. hyperparameter tuning — how to search the knobs efficiently. → start: classical-ml.md","words":174},{"path":"03-model-development/classical-ml.md","title":"Classical ML (Trees & Boosting)","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"classical-ml-trees-boosting\">Classical ML (Trees &amp; Boosting)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> For structured/tabular data, tree-based models — especially <strong>gradient boosting<\/strong> (XGBoost, LightGBM) — are usually the best choice: accurate, fast, and needing little preprocessing. Understand how a tree splits, and the two ways to combine many trees (bagging vs boosting).<\/div><\/div>\n<h2 id=\"a-decision-tree\">A decision tree<\/h2>\n<p>A tree asks a series of yes/no questions on features (\"age &gt; 30?\", \"country = UK?\"), splitting the data to separate the classes. It's wonderfully <strong>interpretable<\/strong> but a single deep tree <strong>overfits<\/strong> — it memorizes the training data. So in practice you combine many trees, and there are two ways to do that.<\/p>\n<h2 id=\"bagging-vs-boosting-the-key-distinction\">Bagging vs boosting (the key distinction)<\/h2>\n<ul><li><strong>Bagging (Random Forest)<\/strong> — train many trees <strong>in parallel<\/strong>, each on a random<\/li><\/ul>\n<p>subset of data and features, then average their votes. Averaging independent trees   <em>reduces variance<\/em>, so a forest is robust and hard to overfit, with little tuning.   Great, sturdy default.<\/p>\n<ul><li><strong>Boosting (XGBoost, LightGBM)<\/strong> — train trees <strong>in sequence<\/strong>, where each new tree<\/li><\/ul>\n<p>focuses on the errors the previous ones made. This <em>reduces bias<\/em> and typically   reaches higher accuracy, at the cost of more careful tuning (it can overfit if you   push it).<\/p>\n<pre><code>Bagging:  many trees in parallel → average   (cuts variance, robust)\nBoosting: trees in sequence, each fixes the last's mistakes (cuts bias, top accuracy)<\/code><\/pre>\n<h2 id=\"why-boosting-wins-on-tabular-data\">Why boosting wins on tabular data<\/h2>\n<p>Gradient boosting consistently tops leaderboards and production systems for structured data because it captures complex feature interactions, handles mixed feature types, needs no scaling, and is fast. When someone hands you a table of rows and columns, the correct first instinct is <em>\"gradient-boosted trees\"<\/em> — and being able to say <em>why<\/em> (sequential error-correction, low bias, minimal preprocessing) is the mark of experience.<\/p>\n<h2 id=\"interpretability\">Interpretability<\/h2>\n<p>Trees are more explainable than neural nets — you can see which features matter (<strong>feature importance<\/strong>), and <strong>SHAP values<\/strong> explain individual predictions. In regulated settings (finance, healthcare) this interpretability is often a requirement, not a nicety, and it's a point worth raising.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The workhorses are <strong>XGBoost<\/strong>, <strong>LightGBM<\/strong>, and <strong>CatBoost<\/strong>, usually driven through <strong>scikit-learn<\/strong> Pipelines; explainability comes from <strong>SHAP<\/strong> (per-prediction) and built-in feature importances. Training and tuning run on a single big VM or a managed job (<strong>SageMaker / Vertex / Databricks<\/strong>).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a tabular churn model I'd train LightGBM in a scikit-learn Pipeline, explain it with SHAP for the compliance team, and log everything to MLflow.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Bagging vs boosting in one line each? *(parallel trees averaged to cut variance vs<\/li><\/ul>\n<p>sequential trees correcting errors to cut bias.)*<\/p>\n<ul><li>Best default for tabular data and why? *(gradient boosting — accuracy, handles<\/li><\/ul>\n<p>interactions, minimal preprocessing.)*<\/p>\n<ul><li>How do you explain a tree model's predictions? *(feature importance; SHAP for<\/li><\/ul>\n<p>per-prediction explanations.)*<\/p>","toc":[{"level":2,"id":"a-decision-tree","text":"A decision tree"},{"level":2,"id":"bagging-vs-boosting-the-key-distinction","text":"Bagging vs boosting (the key distinction)"},{"level":2,"id":"why-boosting-wins-on-tabular-data","text":"Why boosting wins on tabular data"},{"level":2,"id":"interpretability","text":"Interpretability"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"classical ml (trees & boosting) 💡 tl;dr for structured/tabular data, tree-based models — especially gradient boosting (xgboost, lightgbm) — are usually the best choice: accurate, fast, and needing little preprocessing. understand how a tree splits, and the two ways to combine many trees (bagging vs boosting). a decision tree a tree asks a series of yes/no questions on features (\"age > 30?\", \"country = uk?\"), splitting the data to separate the classes. it's wonderfully interpretable but a single deep tree overfits — it memorizes the training data. so in practice you combine many trees, and there are two ways to do that. bagging vs boosting (the key distinction) bagging (random forest) — train many trees in parallel , each on a random subset of data and features, then average their votes. averaging independent trees reduces variance , so a forest is robust and hard to overfit, with little tuning. great, sturdy default. boosting (xgboost, lightgbm) — train trees in sequence , where each new tree focuses on the errors the previous ones made. this reduces bias and typically reaches higher accuracy, at the cost of more careful tuning (it can overfit if you push it). bagging: many trees in parallel → average (cuts variance, robust) boosting: trees in sequence, each fixes the last's mistakes (cuts bias, top accuracy) why boosting wins on tabular data gradient boosting consistently tops leaderboards and production systems for structured data because it captures complex feature interactions, handles mixed feature types, needs no scaling, and is fast. when someone hands you a table of rows and columns, the correct first instinct is \"gradient-boosted trees\" — and being able to say why (sequential error-correction, low bias, minimal preprocessing) is the mark of experience. interpretability trees are more explainable than neural nets — you can see which features matter ( feature importance ), and shap values explain individual predictions. in regulated settings (finance, healthcare) this interpretability is often a requirement, not a nicety, and it's a point worth raising. 🔗 connecting the dots — the real stack the workhorses are xgboost , lightgbm , and catboost , usually driven through scikit-learn pipelines; explainability comes from shap (per-prediction) and built-in feature importances. training and tuning run on a single big vm or a managed job ( sagemaker / vertex / databricks ). how you'd say it: \"for a tabular churn model i'd train lightgbm in a scikit-learn pipeline, explain it with shap for the compliance team, and log everything to mlflow.\" self-check bagging vs boosting in one line each? *(parallel trees averaged to cut variance vs sequential trees correcting errors to cut bias.)* best default for tabular data and why? *(gradient boosting — accuracy, handles interactions, minimal preprocessing.)* how do you explain a tree model's predictions? *(feature importance; shap for per-prediction explanations.)*","words":463},{"path":"03-model-development/deep-learning.md","title":"Deep Learning Essentials","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"deep-learning-essentials\">Deep Learning Essentials<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Neural networks stack layers of simple units that learn features automatically — which is why they dominate on unstructured data (images, text, audio). Know the training loop (forward pass, loss, backprop, gradient descent) and the main architecture families at a level you can talk about.<\/div><\/div>\n<h2 id=\"how-a-neural-net-learns\">How a neural net learns<\/h2>\n<p>A network is layers of \"neurons,\" each computing a weighted sum of its inputs passed through a non-linear <strong>activation<\/strong> (ReLU). Training is a loop:<\/p>\n<pre><code>forward pass: inputs → layers → prediction\nloss: how wrong is the prediction?\nbackprop: compute how each weight contributed to the error (gradients)\nupdate: nudge weights to reduce the error (gradient descent)\nrepeat over many batches (epochs)<\/code><\/pre>\n<p>The magic is that with enough layers and data, the network <strong>learns its own features<\/strong> — early layers pick up edges or word patterns, deep layers combine them into concepts — instead of you hand-engineering them. That's exactly why deep learning wins where features are hard to design by hand (pixels, raw text) and is overkill where good features are easy (small tabular data).<\/p>\n<h2 id=\"key-training-knobs\">Key training knobs<\/h2>\n<ul><li><strong>Learning rate<\/strong> — step size; the single most important hyperparameter (too high<\/li><\/ul>\n<p>diverges, too low crawls).<\/p>\n<ul><li><strong>Batch size<\/strong> — how many examples per update.<\/li><li><strong>Epochs + early stopping<\/strong> — passes over the data; stop when validation stops<\/li><\/ul>\n<p>improving.<\/p>\n<ul><li><strong>Regularization<\/strong> — <strong>dropout<\/strong> (randomly drop neurons) and weight decay to fight<\/li><\/ul>\n<p>overfitting.<\/p>\n<h2 id=\"the-architecture-families\">The architecture families<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Family<\/th><th>For<\/th><th>One-liner<\/th><\/tr><\/thead><tbody><tr><td><strong>MLP / feed-forward<\/strong><\/td><td>tabular, simple<\/td><td>fully connected layers<\/td><\/tr><tr><td><strong>CNN<\/strong><\/td><td>images<\/td><td>convolutions detect local patterns at every position<\/td><\/tr><tr><td><strong>RNN / LSTM<\/strong><\/td><td>sequences (older)<\/td><td>process step by step, carry state<\/td><\/tr><tr><td><strong>Transformer<\/strong><\/td><td>text, and now everything<\/td><td><strong>attention<\/strong> weighs all positions at once — scales, parallelizes; basis of LLMs<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The headline: <strong>Transformers<\/strong> replaced RNNs for most sequence work and underpin modern LLMs (section 9), because <strong>attention<\/strong> lets the model relate any two positions directly and trains in parallel rather than step by step.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>PyTorch<\/strong> is the research/industry default (often via <strong>PyTorch Lightning<\/strong> to remove boilerplate); <strong>TensorFlow / Keras<\/strong> is still common in production; <strong>HuggingFace Transformers<\/strong> is where you get pretrained models to fine-tune. Data loading uses framework <code>DataLoader<\/code>s, and training runs on GPU instances in the cloud.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I build in PyTorch (Lightning for the training loop), start from a pretrained backbone on HuggingFace, and track runs in W&amp;B.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What are the four steps of the training loop? *(forward pass, loss, backprop,<\/li><\/ul>\n<p>weight update.)*<\/p>\n<ul><li>Why deep learning for images/text but not small tabular data? *(it learns features<\/li><\/ul>\n<p>from unstructured data; on small tabular, boosted trees win.)*<\/p>\n<ul><li>Why did Transformers replace RNNs? *(attention relates all positions directly and<\/li><\/ul>\n<p>trains in parallel; better at long-range and scale.)*<\/p>","toc":[{"level":2,"id":"how-a-neural-net-learns","text":"How a neural net learns"},{"level":2,"id":"key-training-knobs","text":"Key training knobs"},{"level":2,"id":"the-architecture-families","text":"The architecture families"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"deep learning essentials 💡 tl;dr neural networks stack layers of simple units that learn features automatically — which is why they dominate on unstructured data (images, text, audio). know the training loop (forward pass, loss, backprop, gradient descent) and the main architecture families at a level you can talk about. how a neural net learns a network is layers of \"neurons,\" each computing a weighted sum of its inputs passed through a non-linear activation (relu). training is a loop: forward pass: inputs → layers → prediction loss: how wrong is the prediction? backprop: compute how each weight contributed to the error (gradients) update: nudge weights to reduce the error (gradient descent) repeat over many batches (epochs) the magic is that with enough layers and data, the network learns its own features — early layers pick up edges or word patterns, deep layers combine them into concepts — instead of you hand-engineering them. that's exactly why deep learning wins where features are hard to design by hand (pixels, raw text) and is overkill where good features are easy (small tabular data). key training knobs learning rate — step size; the single most important hyperparameter (too high diverges, too low crawls). batch size — how many examples per update. epochs + early stopping — passes over the data; stop when validation stops improving. regularization — dropout (randomly drop neurons) and weight decay to fight overfitting. the architecture families family for one-liner mlp / feed-forward tabular, simple fully connected layers cnn images convolutions detect local patterns at every position rnn / lstm sequences (older) process step by step, carry state transformer text, and now everything attention weighs all positions at once — scales, parallelizes; basis of llms the headline: transformers replaced rnns for most sequence work and underpin modern llms (section 9), because attention lets the model relate any two positions directly and trains in parallel rather than step by step. 🔗 connecting the dots — the real stack pytorch is the research/industry default (often via pytorch lightning to remove boilerplate); tensorflow / keras is still common in production; huggingface transformers is where you get pretrained models to fine-tune. data loading uses framework dataloader s, and training runs on gpu instances in the cloud. how you'd say it: \"i build in pytorch (lightning for the training loop), start from a pretrained backbone on huggingface, and track runs in w&b.\" self-check what are the four steps of the training loop? *(forward pass, loss, backprop, weight update.)* why deep learning for images/text but not small tabular data? *(it learns features from unstructured data; on small tabular, boosted trees win.)* why did transformers replace rnns? *(attention relates all positions directly and trains in parallel; better at long-range and scale.)*","words":453},{"path":"03-model-development/training-at-scale.md","title":"Training at Scale","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"training-at-scale\">Training at Scale<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> When data or the model no longer fits on one machine, you distribute the work. The common case is <strong>data parallelism<\/strong> (same model copied across many GPUs, each sees different data); the harder case is <strong>model parallelism<\/strong> (one model too big for one GPU, split across several). Know the difference and why big-data training uses frameworks like Spark.<\/div><\/div>\n<h2 id=\"two-kinds-of-too-big\">Two kinds of \"too big\"<\/h2>\n<p><strong>Too much data<\/strong> for one machine to churn through in reasonable time, or <strong>too big a model<\/strong> to fit in one GPU's memory. They call for different strategies.<\/p>\n<h2 id=\"data-parallelism-the-common-one\">Data parallelism (the common one)<\/h2>\n<p>Copy the <em>same<\/em> model onto each of N GPUs, give each a different slice of the batch, let each compute gradients, then <strong>average the gradients<\/strong> across GPUs and update all copies identically. You've effectively multiplied your batch throughput by N. This is how most large models are trained, and it's what tools like PyTorch DDP or Horovod do.<\/p>\n<pre><code>GPU0: model copy + data slice 0 ─┐\nGPU1: model copy + data slice 1 ─┼→ average gradients → sync update\nGPU2: model copy + data slice 2 ─┘<\/code><\/pre>\n<p>The catch is <strong>communication cost<\/strong>: syncing gradients every step across many GPUs becomes the bottleneck, so scaling isn't perfectly linear.<\/p>\n<h2 id=\"model-parallelism-when-the-model-wont-fit\">Model parallelism (when the model won't fit)<\/h2>\n<p>If a single model is too large for one GPU's memory (think large LLMs), you split the <em>model itself<\/em> across GPUs — different layers or tensor slices on different devices. It's more complex and communication-heavy, used mainly for very large models. A related idea, <strong>pipeline parallelism<\/strong>, splits layers into stages so different GPUs work on different micro-batches like an assembly line.<\/p>\n<h2 id=\"big-data-preprocessing-and-training\">Big-data preprocessing and training<\/h2>\n<p>Separately from GPUs, when the <em>dataset<\/em> is huge you distribute the data processing itself across a cluster with <strong>Spark<\/strong> (or Dask/Ray) — mapping the work over many nodes. This is the \"scalable data pipeline\" muscle: the same job that's a pandas one-liner on a laptop becomes a distributed job on terabytes.<\/p>\n<h2 id=\"mixed-precision-cheap-speedup\">Mixed precision — cheap speedup<\/h2>\n<p>Training in <strong>FP16/BF16<\/strong> instead of FP32 roughly doubles throughput and halves memory with negligible accuracy loss, so it's standard for large-model training. Worth naming as the first optimization you'd reach for before adding more hardware.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Multi-GPU data parallelism is <strong>PyTorch DDP<\/strong> or <strong>Horovod<\/strong>; very large models use <strong>DeepSpeed<\/strong>, <strong>PyTorch FSDP<\/strong>, or <strong>Megatron-LM<\/strong>. <strong>Ray Train<\/strong> and <strong>Spark<\/strong> distribute across a cluster; <strong>HuggingFace Accelerate<\/strong> wraps the boilerplate. Mixed precision is native <strong>AMP<\/strong> (<code>torch.cuda.amp<\/code>). It all runs on managed GPU clusters (<strong>SageMaker / Vertex / Databricks<\/strong>), often on <strong>spot<\/strong> instances with checkpointing.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a big model I'd use FSDP or DeepSpeed with mixed precision on a multi-GPU spot cluster, checkpointing to S3 so a preemption just resumes.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Data vs model parallelism — one line each? *(replicate the model, split the data and<\/li><\/ul>\n<p>average gradients vs split the model itself across GPUs.)*<\/p>\n<ul><li>What's the main bottleneck in data parallelism? *(communication cost of syncing<\/li><\/ul>\n<p>gradients across GPUs.)*<\/p>\n<ul><li>Cheapest way to speed up large-model training before adding GPUs? *(mixed-precision<\/li><\/ul>\n<p>FP16/BF16.)*<\/p>","toc":[{"level":2,"id":"two-kinds-of-too-big","text":"Two kinds of \"too big\""},{"level":2,"id":"data-parallelism-the-common-one","text":"Data parallelism (the common one)"},{"level":2,"id":"model-parallelism-when-the-model-wont-fit","text":"Model parallelism (when the model won't fit)"},{"level":2,"id":"big-data-preprocessing-and-training","text":"Big-data preprocessing and training"},{"level":2,"id":"mixed-precision-cheap-speedup","text":"Mixed precision — cheap speedup"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"training at scale 💡 tl;dr when data or the model no longer fits on one machine, you distribute the work. the common case is data parallelism (same model copied across many gpus, each sees different data); the harder case is model parallelism (one model too big for one gpu, split across several). know the difference and why big-data training uses frameworks like spark. two kinds of \"too big\" too much data for one machine to churn through in reasonable time, or too big a model to fit in one gpu's memory. they call for different strategies. data parallelism (the common one) copy the same model onto each of n gpus, give each a different slice of the batch, let each compute gradients, then average the gradients across gpus and update all copies identically. you've effectively multiplied your batch throughput by n. this is how most large models are trained, and it's what tools like pytorch ddp or horovod do. gpu0: model copy + data slice 0 ─┐ gpu1: model copy + data slice 1 ─┼→ average gradients → sync update gpu2: model copy + data slice 2 ─┘ the catch is communication cost : syncing gradients every step across many gpus becomes the bottleneck, so scaling isn't perfectly linear. model parallelism (when the model won't fit) if a single model is too large for one gpu's memory (think large llms), you split the model itself across gpus — different layers or tensor slices on different devices. it's more complex and communication-heavy, used mainly for very large models. a related idea, pipeline parallelism , splits layers into stages so different gpus work on different micro-batches like an assembly line. big-data preprocessing and training separately from gpus, when the dataset is huge you distribute the data processing itself across a cluster with spark (or dask/ray) — mapping the work over many nodes. this is the \"scalable data pipeline\" muscle: the same job that's a pandas one-liner on a laptop becomes a distributed job on terabytes. mixed precision — cheap speedup training in fp16/bf16 instead of fp32 roughly doubles throughput and halves memory with negligible accuracy loss, so it's standard for large-model training. worth naming as the first optimization you'd reach for before adding more hardware. 🔗 connecting the dots — the real stack multi-gpu data parallelism is pytorch ddp or horovod ; very large models use deepspeed , pytorch fsdp , or megatron-lm . ray train and spark distribute across a cluster; huggingface accelerate wraps the boilerplate. mixed precision is native amp ( torch.cuda.amp ). it all runs on managed gpu clusters ( sagemaker / vertex / databricks ), often on spot instances with checkpointing. how you'd say it: \"for a big model i'd use fsdp or deepspeed with mixed precision on a multi-gpu spot cluster, checkpointing to s3 so a preemption just resumes.\" self-check data vs model parallelism — one line each? *(replicate the model, split the data and average gradients vs split the model itself across gpus.)* what's the main bottleneck in data parallelism? *(communication cost of syncing gradients across gpus.)* cheapest way to speed up large-model training before adding gpus? *(mixed-precision fp16/bf16.)*","words":523},{"path":"03-model-development/hyperparameter-tuning.md","title":"Hyperparameter Tuning","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"hyperparameter-tuning\">Hyperparameter Tuning<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Hyperparameters are the settings you choose <em>before<\/em> training (learning rate, tree depth, regularization strength) — as opposed to parameters the model learns. Tuning searches for the best combination. Know the search strategies and, crucially, how to tune <em>without<\/em> fooling yourself.<\/div><\/div>\n<h2 id=\"parameters-vs-hyperparameters\">Parameters vs hyperparameters<\/h2>\n<p><strong>Parameters<\/strong> are learned from data (the weights). <strong>Hyperparameters<\/strong> are knobs <em>you<\/em> set: learning rate, number of trees, max depth, dropout rate, batch size. The model can't learn these itself, so you search for good values.<\/p>\n<h2 id=\"search-strategies\">Search strategies<\/h2>\n<ul><li><strong>Grid search<\/strong> — try every combination in a predefined grid. Thorough but explodes<\/li><\/ul>\n<p>combinatorially; wasteful because most combinations are bad.<\/p>\n<ul><li><strong>Random search<\/strong> — sample combinations at random. Surprisingly, it usually beats<\/li><\/ul>\n<p>grid search for the same budget, because only a few hyperparameters actually matter   and random sampling explores those more efficiently.<\/p>\n<ul><li><strong>Bayesian optimization<\/strong> — build a model of \"which settings look promising\" from<\/li><\/ul>\n<p>past trials and focus the search there. More sample-efficient; used by tools like   <strong>Optuna<\/strong>, Hyperopt, and cloud tuners.<\/p>\n<ul><li><strong>Early-stopping search (Hyperband/ASHA)<\/strong> — start many configs, kill the bad ones<\/li><\/ul>\n<p>early, give survivors more budget. Great when each training run is expensive.<\/p>\n<p>Order of preference in practice: random or Bayesian over grid; add early-stopping when runs are costly.<\/p>\n<h2 id=\"the-pitfall-tuning-on-the-test-set\">The pitfall: tuning on the test set<\/h2>\n<p>If you tune hyperparameters against your <strong>test<\/strong> set, you've secretly leaked it — the test score is now optimistic and won't hold in production. The fix is a <strong>validation<\/strong> set (or cross-validation, section 4): tune on validation, and touch the test set only <em>once<\/em> at the very end for an honest estimate. This is a favorite \"what's wrong with this workflow?\" interview trap.<\/p>\n<h2 id=\"track-everything\">Track everything<\/h2>\n<p>Tuning produces dozens or hundreds of runs, so you log each config and its score with an experiment tracker (section 4) — otherwise you can't reproduce the winner or know why it won.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>Optuna<\/strong> is the popular Bayesian/pruning library; <strong>Ray Tune<\/strong> parallelizes big searches; <strong>W&amp;B Sweeps<\/strong> and the <strong>SageMaker / Vertex<\/strong> built-in tuners do it as a managed service. Every trial's config and score is logged to the experiment tracker so the winner is reproducible.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I run Optuna with early-stopping pruning, parallelized on Ray Tune, and log every trial to MLflow so I can reproduce the best config.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Parameter vs hyperparameter? <em>(learned from data vs set by you before training.)<\/em><\/li><li>Why does random search often beat grid search? *(few hyperparameters matter; random<\/li><\/ul>\n<p>sampling explores them better per unit budget.)*<\/p>\n<ul><li>Why never tune on the test set? *(it leaks the test set, giving an optimistic score;<\/li><\/ul>\n<p>tune on validation, use test once at the end.)*<\/p>","toc":[{"level":2,"id":"parameters-vs-hyperparameters","text":"Parameters vs hyperparameters"},{"level":2,"id":"search-strategies","text":"Search strategies"},{"level":2,"id":"the-pitfall-tuning-on-the-test-set","text":"The pitfall: tuning on the test set"},{"level":2,"id":"track-everything","text":"Track everything"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"hyperparameter tuning 💡 tl;dr hyperparameters are the settings you choose before training (learning rate, tree depth, regularization strength) — as opposed to parameters the model learns. tuning searches for the best combination. know the search strategies and, crucially, how to tune without fooling yourself. parameters vs hyperparameters parameters are learned from data (the weights). hyperparameters are knobs you set: learning rate, number of trees, max depth, dropout rate, batch size. the model can't learn these itself, so you search for good values. search strategies grid search — try every combination in a predefined grid. thorough but explodes combinatorially; wasteful because most combinations are bad. random search — sample combinations at random. surprisingly, it usually beats grid search for the same budget, because only a few hyperparameters actually matter and random sampling explores those more efficiently. bayesian optimization — build a model of \"which settings look promising\" from past trials and focus the search there. more sample-efficient; used by tools like optuna , hyperopt, and cloud tuners. early-stopping search (hyperband/asha) — start many configs, kill the bad ones early, give survivors more budget. great when each training run is expensive. order of preference in practice: random or bayesian over grid; add early-stopping when runs are costly. the pitfall: tuning on the test set if you tune hyperparameters against your test set, you've secretly leaked it — the test score is now optimistic and won't hold in production. the fix is a validation set (or cross-validation, section 4): tune on validation, and touch the test set only once at the very end for an honest estimate. this is a favorite \"what's wrong with this workflow?\" interview trap. track everything tuning produces dozens or hundreds of runs, so you log each config and its score with an experiment tracker (section 4) — otherwise you can't reproduce the winner or know why it won. 🔗 connecting the dots — the real stack optuna is the popular bayesian/pruning library; ray tune parallelizes big searches; w&b sweeps and the sagemaker / vertex built-in tuners do it as a managed service. every trial's config and score is logged to the experiment tracker so the winner is reproducible. how you'd say it: \"i run optuna with early-stopping pruning, parallelized on ray tune, and log every trial to mlflow so i can reproduce the best config.\" self-check parameter vs hyperparameter? (learned from data vs set by you before training.) why does random search often beat grid search? *(few hyperparameters matter; random sampling explores them better per unit budget.)* why never tune on the test set? *(it leaks the test set, giving an optimistic score; tune on validation, use test once at the end.)*","words":444},{"path":"04-experimentation/README.md","title":"Overview","section":"4 · Experimentation","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"4-experimentation\">4 — Experimentation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> ML is empirical — you don't know what works until you test it. This section is how you test <em>honestly<\/em>: splitting data so your metrics mean something, tracking experiments so you can reproduce winners, and running online A/B tests to prove the model actually helps the business.<\/div><\/div>\n<h2 id=\"why-a-whole-section-on-this\">Why a whole section on this<\/h2>\n<p>The JD asks for \"running ML tests and experiments and statistical analysis.\" The skill isn't running one model — it's setting up a process where results are <strong>trustworthy and reproducible<\/strong>. Most bad ML decisions come from fooling yourself with a leaky split or an untracked lucky run. Getting experimentation right is what separates rigor from guesswork.<\/p>\n<h2 id=\"the-three-pages\">The three pages<\/h2>\n<ul><li><strong>Validation &amp; data splits<\/strong> — train/validation/test, cross-validation, and the<\/li><\/ul>\n<p>time-series gotcha.<\/p>\n<ul><li><strong>Experiment tracking<\/strong> — logging runs so results are reproducible and comparable.<\/li><li><strong>Online A/B testing &amp; stats<\/strong> — proving the model helps real users, and reading the<\/li><\/ul>\n<p>statistics without being fooled.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"validation-splits.md\" href=\"#\">validation-splits.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-a-whole-section-on-this","text":"Why a whole section on this"},{"level":2,"id":"the-three-pages","text":"The three pages"}],"text":"4 — experimentation 💡 tl;dr ml is empirical — you don't know what works until you test it. this section is how you test honestly : splitting data so your metrics mean something, tracking experiments so you can reproduce winners, and running online a/b tests to prove the model actually helps the business. why a whole section on this the jd asks for \"running ml tests and experiments and statistical analysis.\" the skill isn't running one model — it's setting up a process where results are trustworthy and reproducible . most bad ml decisions come from fooling yourself with a leaky split or an untracked lucky run. getting experimentation right is what separates rigor from guesswork. the three pages validation & data splits — train/validation/test, cross-validation, and the time-series gotcha. experiment tracking — logging runs so results are reproducible and comparable. online a/b testing & stats — proving the model helps real users, and reading the statistics without being fooled. → start: validation-splits.md","words":163},{"path":"04-experimentation/validation-splits.md","title":"Validation & Data Splits","section":"4 · Experimentation","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"validation-data-splits\">Validation &amp; Data Splits<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> You split data into <strong>train<\/strong> (fit the model), <strong>validation<\/strong> (tune and choose), and <strong>test<\/strong> (a final honest estimate touched once). Cross-validation makes this more robust on limited data. And time-series data needs a special split or you cheat by predicting the past from the future.<\/div><\/div>\n<h2 id=\"the-three-way-split\">The three-way split<\/h2>\n<ul><li><strong>Training set<\/strong> — the model learns its parameters here.<\/li><li><strong>Validation set<\/strong> — you tune hyperparameters and compare models here.<\/li><li><strong>Test set<\/strong> — a locked box you open <em>once<\/em> at the end to estimate real-world<\/li><\/ul>\n<p>performance.<\/p>\n<p>The reason for three (not two) is subtle but important: if you both tune <em>and<\/em> report on the same held-out set, you've indirectly fit to it, so its score is optimistic. The test set stays untouched during development precisely so its number is trustworthy.<\/p>\n<h2 id=\"cross-validation\">Cross-validation<\/h2>\n<p>With limited data, a single validation split is noisy — you might get lucky or unlucky. <strong>k-fold cross-validation<\/strong> splits the data into k parts, trains k times (each time holding out a different part as validation), and averages the scores. You get a more stable estimate and use all your data for both roles. Standard k is 5 or 10. Use it when data is scarce; skip it when data is huge and one split is plenty.<\/p>\n<pre><code>5-fold: [test][    train    ]   fold 1\n        [train][test][train ]   fold 2  ... average the 5 scores<\/code><\/pre>\n<h2 id=\"the-time-series-trap\">The time-series trap<\/h2>\n<p>If your data has time order (sales, sensor readings, user events), a <em>random<\/em> split lets the model train on future data and predict the past — leakage that inflates your score and collapses in production. Instead, split <strong>by time<\/strong>: train on earlier data, validate/test on later data (a \"rolling\" or \"expanding window\" split). Whenever the problem has a time dimension, say this unprompted — it's a common gotcha.<\/p>\n<h2 id=\"class-imbalance-in-splits\">Class imbalance in splits<\/h2>\n<p>When one class is rare, use <strong>stratified<\/strong> splitting so each split keeps the same class ratio — otherwise a fold might contain almost no positives and give meaningless scores.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>In practice this is <strong>scikit-learn<\/strong> <code>model_selection<\/code>: <code>KFold<\/code>, <code>StratifiedKFold<\/code> for imbalance, <code>TimeSeriesSplit<\/code> for time-ordered data, and <code>cross_val_score<\/code> / <code>cross_validate<\/code> to run it. Pair it with <strong>DVC<\/strong> or a Delta snapshot so the <em>exact<\/em> split and data version are reproducible.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For time-series I use <code>TimeSeriesSplit<\/code> so I never train on the future, and I version the dataset with DVC so a split is reproducible.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why three splits instead of two? *(tuning and reporting on the same set makes the<\/li><\/ul>\n<p>score optimistic; test stays untouched for an honest estimate.)*<\/p>\n<ul><li>When is cross-validation worth it? *(limited data — it gives a stable estimate and<\/li><\/ul>\n<p>uses all data; less needed when data is huge.)*<\/p>\n<ul><li>How do you split time-series data and why? *(by time, train on past / test on future;<\/li><\/ul>\n<p>a random split leaks the future.)*<\/p>","toc":[{"level":2,"id":"the-three-way-split","text":"The three-way split"},{"level":2,"id":"cross-validation","text":"Cross-validation"},{"level":2,"id":"the-time-series-trap","text":"The time-series trap"},{"level":2,"id":"class-imbalance-in-splits","text":"Class imbalance in splits"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"validation & data splits 💡 tl;dr you split data into train (fit the model), validation (tune and choose), and test (a final honest estimate touched once). cross-validation makes this more robust on limited data. and time-series data needs a special split or you cheat by predicting the past from the future. the three-way split training set — the model learns its parameters here. validation set — you tune hyperparameters and compare models here. test set — a locked box you open once at the end to estimate real-world performance. the reason for three (not two) is subtle but important: if you both tune and report on the same held-out set, you've indirectly fit to it, so its score is optimistic. the test set stays untouched during development precisely so its number is trustworthy. cross-validation with limited data, a single validation split is noisy — you might get lucky or unlucky. k-fold cross-validation splits the data into k parts, trains k times (each time holding out a different part as validation), and averages the scores. you get a more stable estimate and use all your data for both roles. standard k is 5 or 10. use it when data is scarce; skip it when data is huge and one split is plenty. 5-fold: [test][ train ] fold 1 [train][test][train ] fold 2 ... average the 5 scores the time-series trap if your data has time order (sales, sensor readings, user events), a random split lets the model train on future data and predict the past — leakage that inflates your score and collapses in production. instead, split by time : train on earlier data, validate/test on later data (a \"rolling\" or \"expanding window\" split). whenever the problem has a time dimension, say this unprompted — it's a common gotcha. class imbalance in splits when one class is rare, use stratified splitting so each split keeps the same class ratio — otherwise a fold might contain almost no positives and give meaningless scores. 🔗 connecting the dots — the real stack in practice this is scikit-learn model_selection : kfold , stratifiedkfold for imbalance, timeseriessplit for time-ordered data, and cross_val_score / cross_validate to run it. pair it with dvc or a delta snapshot so the exact split and data version are reproducible. how you'd say it: \"for time-series i use timeseriessplit so i never train on the future, and i version the dataset with dvc so a split is reproducible.\" self-check why three splits instead of two? *(tuning and reporting on the same set makes the score optimistic; test stays untouched for an honest estimate.)* when is cross-validation worth it? *(limited data — it gives a stable estimate and uses all data; less needed when data is huge.)* how do you split time-series data and why? *(by time, train on past / test on future; a random split leaks the future.)*","words":478},{"path":"04-experimentation/experiment-tracking.md","title":"Experiment Tracking","section":"4 · Experimentation","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"experiment-tracking\">Experiment Tracking<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> ML involves running <em>many<\/em> experiments — different data, features, models, hyperparameters. Without tracking, you can't reproduce the good one or explain why it won. An experiment tracker (MLflow, Weights &amp; Biases) logs each run's inputs and results so the process is reproducible and comparable.<\/div><\/div>\n<h2 id=\"the-problem-it-solves\">The problem it solves<\/h2>\n<p>Picture running 50 variations over two weeks. Later, \"the good model\" is a file called <code>model_final_v3_really.pkl<\/code> and nobody remembers which data, features, or learning rate produced it. That's not a hypothetical — it's the default state without discipline. ML is empirical and iterative, so <strong>reproducibility<\/strong> is a first-class concern.<\/p>\n<h2 id=\"what-to-log-per-run\">What to log per run<\/h2>\n<ul><li><strong>Parameters<\/strong> — hyperparameters, model type, feature set.<\/li><li><strong>Metrics<\/strong> — accuracy, F1, loss, and so on, over training.<\/li><li><strong>Artifacts<\/strong> — the trained model file, plots, the confusion matrix.<\/li><li><strong>Code + data version<\/strong> — the git commit and which dataset/version was used.<\/li><li><strong>Environment<\/strong> — library versions, so it can be rebuilt.<\/li><\/ul>\n<p>The goal is that any past run can be <strong>reproduced<\/strong> and any two runs <strong>compared<\/strong> side by side.<\/p>\n<h2 id=\"tools\">Tools<\/h2>\n<p><strong>MLflow<\/strong> (open source: tracking + a model registry, section 5), <strong>Weights &amp; Biases<\/strong> and <strong>Neptune<\/strong> (rich dashboards and collaboration), plus the built-in tracking in SageMaker and Vertex AI. Any of them beats spreadsheets and filenames.<\/p>\n<h2 id=\"reproducibility-is-more-than-the-tracker\">Reproducibility is more than the tracker<\/h2>\n<p>True reproducibility also means <strong>versioning your data<\/strong> (tools like DVC or a data snapshot), <strong>pinning random seeds<\/strong>, and <strong>containerizing<\/strong> the environment (section 5). A model is the product of code + data + config + environment — pin all four or \"it worked last week\" becomes a mystery.<\/p>\n<h2 id=\"why-interviewers-care\">Why interviewers care<\/h2>\n<p>Tracking is a marker of maturity: it's the difference between a hobbyist who trains models and an engineer who runs a <em>process<\/em>. Being able to say \"I log every run's params, metrics, artifacts, and data version so any result is reproducible and comparable\" signals you've worked on real teams.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The tools are <strong>MLflow<\/strong> (tracking + model registry, the open-source default), <strong>Weights &amp; Biases<\/strong> and <strong>Neptune<\/strong> (richer dashboards), with <strong>DVC<\/strong> versioning the data. On a lakehouse, MLflow ties runs to the exact <strong>Delta / Unity Catalog<\/strong> data version, and the registered model promotes straight to serving.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I log params, metrics, artifacts, the git commit, and the data version to MLflow, so any past run — and the model it produced — can be reproduced exactly.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What breaks without experiment tracking? *(reproducibility — you can't recreate or<\/li><\/ul>\n<p>explain the winning run.)*<\/p>\n<ul><li>Name three things to log per run. *(params, metrics, artifacts, code/data version,<\/li><\/ul>\n<p>environment — any three.)*<\/p>\n<ul><li>What four things must you pin for true reproducibility? *(code, data, config,<\/li><\/ul>\n<p>environment.)*<\/p>","toc":[{"level":2,"id":"the-problem-it-solves","text":"The problem it solves"},{"level":2,"id":"what-to-log-per-run","text":"What to log per run"},{"level":2,"id":"tools","text":"Tools"},{"level":2,"id":"reproducibility-is-more-than-the-tracker","text":"Reproducibility is more than the tracker"},{"level":2,"id":"why-interviewers-care","text":"Why interviewers care"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"experiment tracking 💡 tl;dr ml involves running many experiments — different data, features, models, hyperparameters. without tracking, you can't reproduce the good one or explain why it won. an experiment tracker (mlflow, weights & biases) logs each run's inputs and results so the process is reproducible and comparable. the problem it solves picture running 50 variations over two weeks. later, \"the good model\" is a file called model_final_v3_really.pkl and nobody remembers which data, features, or learning rate produced it. that's not a hypothetical — it's the default state without discipline. ml is empirical and iterative, so reproducibility is a first-class concern. what to log per run parameters — hyperparameters, model type, feature set. metrics — accuracy, f1, loss, and so on, over training. artifacts — the trained model file, plots, the confusion matrix. code + data version — the git commit and which dataset/version was used. environment — library versions, so it can be rebuilt. the goal is that any past run can be reproduced and any two runs compared side by side. tools mlflow (open source: tracking + a model registry, section 5), weights & biases and neptune (rich dashboards and collaboration), plus the built-in tracking in sagemaker and vertex ai. any of them beats spreadsheets and filenames. reproducibility is more than the tracker true reproducibility also means versioning your data (tools like dvc or a data snapshot), pinning random seeds , and containerizing the environment (section 5). a model is the product of code + data + config + environment — pin all four or \"it worked last week\" becomes a mystery. why interviewers care tracking is a marker of maturity: it's the difference between a hobbyist who trains models and an engineer who runs a process . being able to say \"i log every run's params, metrics, artifacts, and data version so any result is reproducible and comparable\" signals you've worked on real teams. 🔗 connecting the dots — the real stack the tools are mlflow (tracking + model registry, the open-source default), weights & biases and neptune (richer dashboards), with dvc versioning the data. on a lakehouse, mlflow ties runs to the exact delta / unity catalog data version, and the registered model promotes straight to serving. how you'd say it: \"i log params, metrics, artifacts, the git commit, and the data version to mlflow, so any past run — and the model it produced — can be reproduced exactly.\" self-check what breaks without experiment tracking? *(reproducibility — you can't recreate or explain the winning run.)* name three things to log per run. *(params, metrics, artifacts, code/data version, environment — any three.)* what four things must you pin for true reproducibility? *(code, data, config, environment.)*","words":449},{"path":"04-experimentation/ab-testing.md","title":"Online A/B Testing & Stats","section":"4 · Experimentation","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"online-ab-testing-stats\">Online A/B Testing &amp; Stats<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Offline metrics (F1, AUC) tell you a model is <em>technically<\/em> better; only an online <strong>A/B test<\/strong> tells you it's <em>actually<\/em> better for users and the business. You split live traffic between the old and new model and measure a business metric, then use statistics to check the difference is real, not noise.<\/div><\/div>\n<h2 id=\"why-offline-isnt-enough\">Why offline isn't enough<\/h2>\n<p>A model can improve offline accuracy and still hurt the product — maybe it's slower, maybe the metric didn't capture what users care about, maybe the training data doesn't match live traffic. The only proof is exposing it to real users. This is the gap between \"data scientist\" (offline metric) and \"ML engineer\" (does it move the real number).<\/p>\n<h2 id=\"how-an-ab-test-works\">How an A/B test works<\/h2>\n<p>Randomly split users into a <strong>control<\/strong> group (current model, \"A\") and a <strong>treatment<\/strong> group (new model, \"B\"), run both live, and compare a <strong>business metric<\/strong> — click-through rate, conversion, revenue per user, retention. Randomization is what makes the two groups comparable, so any difference is attributable to the model.<\/p>\n<pre><code>users → randomly split → A: current model  → measure metric\n                       → B: new model      → measure metric → compare<\/code><\/pre>\n<h2 id=\"reading-the-statistics-without-fooling-yourself\">Reading the statistics (without fooling yourself)<\/h2>\n<p>The difference you observe could be luck, so you test for <strong>statistical significance<\/strong>:<\/p>\n<ul><li><strong>p-value<\/strong> — roughly, the chance of seeing this difference if the models were<\/li><\/ul>\n<p>actually equal. A small p-value (&lt; 0.05 by convention) means the result is unlikely to   be noise. It does <strong>not<\/strong> mean the effect is large.<\/p>\n<ul><li><strong>Statistical power / sample size<\/strong> — you need enough users, run for enough time, to<\/li><\/ul>\n<p>detect a real effect. Peeking early and stopping when it looks good inflates false   positives.<\/p>\n<ul><li><strong>Practical significance<\/strong> — a tiny but \"significant\" lift may not be worth the risk<\/li><\/ul>\n<p>and cost of shipping. Significance ≠ importance.<\/p>\n<p>The mature answer: <em>\"I confirm the lift on the business metric is statistically significant with an adequate sample and run duration, and I also check it's large enough to matter in practice — and I watch guardrail metrics like latency and error rate so a 'winning' model isn't quietly breaking something else.\"<\/em><\/p>\n<h2 id=\"common-pitfalls\">Common pitfalls<\/h2>\n<p>Stopping the test the moment it looks good (<strong>peeking<\/strong>), running too short to see weekly cycles, ignoring <strong>novelty effects<\/strong> (users react to <em>any<\/em> change at first), and forgetting <strong>guardrail metrics<\/strong> (a model that lifts clicks but tanks latency or revenue is not a win).<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Live experiments run through a feature-flag / experimentation platform — <strong>Optimizely<\/strong>, <strong>Statsig<\/strong>, <strong>LaunchDarkly<\/strong>, or <strong>GrowthBook<\/strong> — which handles the traffic split and significance math; ad-hoc stats use <strong>scipy<\/strong> / <strong>statsmodels<\/strong>. The model itself is served behind a flag so you can ramp or roll back instantly (ties to canary in §5).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"We shipped the new model behind a Statsig flag to 5% of traffic, watched the business metric and guardrails (latency, errors), and ramped only after it was significant.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why A/B test if offline metrics already improved? *(offline ≠ business impact; live<\/li><\/ul>\n<p>users are the only real proof.)*<\/p>\n<ul><li>What does a p-value below 0.05 tell you — and not tell you? *(the difference is<\/li><\/ul>\n<p>unlikely to be noise; it does NOT say the effect is large.)*<\/p>\n<ul><li>Name two A/B pitfalls. *(peeking/early stopping, too-short duration, novelty effect,<\/li><\/ul>\n<p>ignoring guardrails — any two.)*<\/p>","toc":[{"level":2,"id":"why-offline-isnt-enough","text":"Why offline isn't enough"},{"level":2,"id":"how-an-ab-test-works","text":"How an A/B test works"},{"level":2,"id":"reading-the-statistics-without-fooling-yourself","text":"Reading the statistics (without fooling yourself)"},{"level":2,"id":"common-pitfalls","text":"Common pitfalls"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"online a/b testing & stats 💡 tl;dr offline metrics (f1, auc) tell you a model is technically better; only an online a/b test tells you it's actually better for users and the business. you split live traffic between the old and new model and measure a business metric, then use statistics to check the difference is real, not noise. why offline isn't enough a model can improve offline accuracy and still hurt the product — maybe it's slower, maybe the metric didn't capture what users care about, maybe the training data doesn't match live traffic. the only proof is exposing it to real users. this is the gap between \"data scientist\" (offline metric) and \"ml engineer\" (does it move the real number). how an a/b test works randomly split users into a control group (current model, \"a\") and a treatment group (new model, \"b\"), run both live, and compare a business metric — click-through rate, conversion, revenue per user, retention. randomization is what makes the two groups comparable, so any difference is attributable to the model. users → randomly split → a: current model → measure metric → b: new model → measure metric → compare reading the statistics (without fooling yourself) the difference you observe could be luck, so you test for statistical significance : p-value — roughly, the chance of seeing this difference if the models were actually equal. a small p-value (< 0.05 by convention) means the result is unlikely to be noise. it does not mean the effect is large. statistical power / sample size — you need enough users, run for enough time, to detect a real effec

heus/grafana ; a/b → statsig . how you'd say it: \"i sketch the pipeline first, then name a tool per box — feature store, mlflow, an ann index for retrieval, kserve for serving, evidently for drift — so it's clearly a real system, not a whiteboard fantasy.\" self-check what's the first thing to do in an ml design question? *(clarify requirements — scope, scale, latency, success metric — before designing.)* what is the two-stage pattern and why use it? *(cheap candidate generation then expensive ranking — you can't score millions of items in real time with a heavy model.)* why start with a simple baseline? *(it's a maturity signal, gives something to beat, and often is enough.)*","words":549},{"path":"10-system-design/worked-recommender.md","title":"Worked Example: Recommender","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-recommender\">Worked Example: Recommender<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> \"Design a recommendation system\" walked through the framework. The headline answer is the <strong>two-stage<\/strong> design (candidate generation → ranking) plus honest handling of the classic gotchas: cold start, feedback loops, and freshness.<\/div><\/div>\n<h2 id=\"1-clarify\">1. Clarify<\/h2>\n<p>Ask: recommend <em>what<\/em> (products, videos, posts) and <em>where<\/em> (homepage, \"related items\")? Scale (how many users/items)? Latency (must render in ~100ms)? Success metric (clicks, watch time, purchases, retention)? Assume: recommend products on the homepage, millions of items, real-time, optimize for purchases with click-through as a proxy.<\/p>\n<h2 id=\"2-frame-as-ml\">2. Frame as ML<\/h2>\n<p>Predict, for a (user, item) pair, the probability the user engages (clicks/buys), then rank items by that score. Offline metric: AUC or a ranking metric (NDCG); online metric: click-through and purchase rate via A/B test.<\/p>\n<h2 id=\"3-data-features\">3. Data &amp; features<\/h2>\n<ul><li><strong>User features<\/strong> — history, demographics, recent activity/session context.<\/li><li><strong>Item features<\/strong> — category, price, popularity, embeddings.<\/li><li><strong>Interaction data<\/strong> — the clicks/purchases that are your labels (implicit feedback).<\/li><li>Serve these via a <strong>feature store<\/strong> so training and real-time serving agree (section 2).<\/li><\/ul>\n<h2 id=\"4-model-the-two-stage-design\">4. Model — the two-stage design<\/h2>\n<p>You can't score millions of items per request in 100ms, so split it:<\/p>\n<pre><code>all items (millions)\n  → CANDIDATE GENERATION: cheap retrieval → ~hundreds of plausible items\n      (embedding similarity / collaborative filtering / \"users like you bought\")\n  → RANKING: a stronger model (gradient boosting or a neural ranker) scores those\n      few hundred with rich features → top-N ordered list → user<\/code><\/pre>\n<p>Candidate generation optimizes <strong>recall<\/strong> (don't miss good items) and speed; ranking optimizes <strong>precision/order<\/strong> with an expensive model on a small set. This split is the core insight of the whole answer.<\/p>\n<h2 id=\"5-serving\">5. Serving<\/h2>\n<p>Precompute item embeddings offline; do candidate retrieval with a <strong>vector/ANN index<\/strong> (approximate nearest neighbor) for speed; run ranking online behind a low-latency service; <strong>cache<\/strong> where possible. Fresh signals (this session's clicks) feed in real time.<\/p>\n<h2 id=\"6-the-classic-gotchas-raise-these-unprompted\">6. The classic gotchas (raise these unprompted)<\/h2>\n<ul><li><strong>Cold start<\/strong> — new users/items have no history. Fall back to popularity, content-based<\/li><\/ul>\n<p>features, or ask for a few preferences. Naming cold start scores big.<\/p>\n<ul><li><strong>Feedback loop<\/strong> — recommending only popular items makes them more popular forever;<\/li><\/ul>\n<p>inject <strong>exploration<\/strong> (some diverse/random items) to keep learning (section 6).<\/p>\n<ul><li><strong>Freshness<\/strong> — trends and new items matter; blend real-time signals and re-index often.<\/li><li><strong>Bias &amp; diversity<\/strong> — avoid filter bubbles; sometimes optimize for diversity, not just<\/li><\/ul>\n<p>predicted clicks.<\/p>\n<h2 id=\"7-monitor\">7. Monitor<\/h2>\n<p>A/B test the online metric, watch drift and engagement over time, and retrain regularly as tastes shift.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Concrete pieces: candidate generation is a <strong>two-tower<\/strong> embedding model with an <strong>ANN index<\/strong> (<strong>FAISS<\/strong>, <strong>ScaNN<\/strong>, or <strong>Vespa<\/strong> / a vector DB); features come from a <strong>feature store<\/strong> (Feast); ranking is <strong>XGBoost<\/strong> or a neural ranker (<strong>DLRM<\/strong>); serving is <strong>Triton / KServe<\/strong>; freshness flows through <strong>Kafka<\/strong>. Everything is tracked in <strong>MLflow<\/strong> and A/B tested via <strong>Statsig<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Candidate gen was a two-tower model served from a FAISS index, ranking was XGBoost on feature-store features via KServe, and new models shipped behind a Statsig A/B with exploration traffic to avoid feedback loops.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why two stages instead of one model over all items? *(can't score millions in real time;<\/li><\/ul>\n<p>cheap recall then expensive ranking on a small set.)*<\/p>\n<ul><li>What is cold start and one fix? *(no history for new users/items; use popularity/content<\/li><\/ul>\n<p>features or ask preferences.)*<\/p>\n<ul><li>Why add exploration? <em>(to break the feedback loop where popular items self-reinforce.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"1-clarify","text":"1. Clarify"},{"level":2,"id":"2-frame-as-ml","text":"2. Frame as ML"},{"level":2,"id":"3-data-features","text":"3. Data &amp; features"},{"level":2,"id":"4-model-the-two-stage-design","text":"4. Model — the two-stage design"},{"level":2,"id":"5-serving","text":"5. Serving"},{"level":2,"id":"6-the-classic-gotchas-raise-these-unprompted","text":"6. The classic gotchas (raise these unprompted)"},{"level":2,"id":"7-monitor","text":"7. Monitor"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"worked example: recommender 💡 tl;dr \"design a recommendation system\" walked through the framework. the headline answer is the two-stage design (candidate generation → ranking) plus honest handling of the classic gotchas: cold start, feedback loops, and freshness. 1. clarify ask: recommend what (products, videos, posts) and where (homepage, \"related items\")? scale (how many users/items)? latency (must render in ~100ms)? success metric (clicks, watch time, purchases, retention)? assume: recommend products on the homepage, millions of items, real-time, optimize for purchases with click-through as a proxy. 2. frame as ml predict, for a (user, item) pair, the probability the user engages (clicks/buys), then rank items by that score. offline metric: auc or a ranking metric (ndcg); online metric: click-through and purchase rate via a/b test. 3. data & features user features — history, demographics, recent activity/session context. item features — category, price, popularity, embeddings. interaction data — the clicks/purchases that are your labels (implicit feedback). serve these via a feature store so training and real-time serving agree (section 2). 4. model — the two-stage design you can't score millions of items per request in 100ms, so split it: all items (millions) → candidate generation: cheap retrieval → ~hundreds of plausible items (embedding similarity / collaborative filtering / \"users like you bought\") → ranking: a stronger model (gradient boosting or a neural ranker) scores those few hundred with rich features → top-n ordered list → user candidate generation optimizes recall (don't miss good items) and speed; ranking optimizes precision/order with an expensive model on a small set. this split is the core insight of the whole answer. 5. serving precompute item embeddings offline; do candidate retrieval with a vector/ann index (approximate nearest neighbor) for speed; run ranking online behind a low-latency service; cache where possible. fresh signals (this session's clicks) feed in real time. 6. the classic gotchas (raise these unprompted) cold start — new users/items have no history. fall back to popularity, content-based features, or ask for a few preferences. naming cold start scores big. feedback loop — recommending only popular items makes them more popular forever; inject exploration (some diverse/random items) to keep learning (section 6). freshness — trends and new items matter; blend real-time signals and re-index often. bias & diversity — avoid filter bubbles; sometimes optimize for diversity, not just predicted clicks. 7. monitor a/b test the online metric, watch drift and engagement over time, and retrain regularly as tastes shift. 🔗 connecting the dots — the real stack concrete pieces: candidate generation is a two-tower embedding model with an ann index ( faiss , scann , or vespa / a vector db); features come from a feature store (feast); ranking is xgboost or a neural ranker ( dlrm ); serving is triton / kserve ; freshness flows through kafka . everything is tracked in mlflow and a/b tested via statsig . how you'd say it: \"candidate gen was a two-tower model served from a faiss index, ranking was xgboost on feature-store features via kserve, and new models shipped behind a statsig a/b with exploration traffic to avoid feedback loops.\" self-check why two stages instead of one model over all items? *(can't score millions in real time; cheap recall then expensive ranking on a small set.)* what is cold start and one fix? *(no history for new users/items; use popularity/content features or ask preferences.)* why add exploration? (to break the feedback loop where popular items self-reinforce.)","words":567},{"path":"10-system-design/worked-ml-platform.md","title":"Worked Example: ML Platform","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-ml-platform\">Worked Example: ML Platform<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Sometimes the design question is <em>infrastructure<\/em>, not a single model: \"design a platform so our data scientists can train, deploy, and monitor many models.\" The answer is essentially the whole MLOps stack from sections 2–7, assembled into a self-serve system.<\/div><\/div>\n<h2 id=\"whats-being-asked\">What's being asked<\/h2>\n<p>Not \"build one model\" but \"build the paved road many models run on.\" The goal is to let teams go from idea to production <strong>fast, safely, and repeatably<\/strong>, without each team reinventing pipelines, serving, and monitoring. This tests whether you see the big picture.<\/p>\n<h2 id=\"the-components-walk-the-lifecycle\">The components (walk the lifecycle)<\/h2>\n<pre><code>Data layer      → ingestion, storage (lake/warehouse), FEATURE STORE (shared features)\nExperiment layer→ notebooks/compute, EXPERIMENT TRACKING, data versioning\nTraining layer  → scalable training (K8s/managed), pipelines, HPO\nRegistry        → MODEL REGISTRY (versioned, staged promotion)\nServing layer   → batch + online serving, autoscaling, canary rollout\nMonitoring layer→ drift, data quality, ops metrics, alerting, retraining triggers\nCross-cutting   → CI/CD/CT automation, IaC, access control, cost tracking<\/code><\/pre>\n<p>Each box maps to a section here: feature store (§2), tracking (§4), registry &amp; CI/CD (§5), monitoring (§6), infra (§7). The platform is those pieces integrated into a <strong>self-serve<\/strong> workflow.<\/p>\n<h2 id=\"the-design-principles-to-voice\">The design principles to voice<\/h2>\n<ul><li><strong>Self-serve &amp; standardized<\/strong> — a data scientist should deploy via a paved path, not a<\/li><\/ul>\n<p>ticket to the infra team. Standard templates beat bespoke setups.<\/p>\n<ul><li><strong>Reproducible<\/strong> — versioned data, code, and models; anything in production can be<\/li><\/ul>\n<p>recreated.<\/p>\n<ul><li><strong>Observable<\/strong> — every model is monitored by default, not as an afterthought.<\/li><li><strong>Modular<\/strong> — teams can swap a component (a different model server) without rebuilding<\/li><\/ul>\n<p>everything.<\/p>\n<ul><li><strong>Build vs buy<\/strong> — lean on managed platforms (SageMaker/Vertex) or open source (MLflow,<\/li><\/ul>\n<p>Kubeflow, Feast) rather than hand-building all of it; justify where you'd customize.<\/p>\n<h2 id=\"the-trade-offs-to-name\">The trade-offs to name<\/h2>\n<p>Flexibility vs standardization (too rigid and teams route around it; too flexible and it's chaos), build vs buy (control vs speed), and cost vs capability. A good answer explicitly picks a point on each and says why.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The platform <em>is<\/em> a named toolchain. Open-source assembly: <strong>Feast<\/strong> (features) + <strong>MLflow<\/strong> (tracking/registry) + <strong>Kubeflow<\/strong> (pipelines) + <strong>KServe<\/strong> (serving) + <strong>Evidently<\/strong> (monitoring) + <strong>Airflow<\/strong> (orchestration) + <strong>Terraform<\/strong> (infra), on <strong>Kubernetes<\/strong>. Managed equivalent: <strong>Databricks<\/strong> or <strong>SageMaker / Vertex<\/strong> covering the same boxes end to end.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Platform layer<\/th><th>Open source<\/th><th>Managed<\/th><\/tr><\/thead><tbody><tr><td>Feature store<\/td><td>Feast<\/td><td>SageMaker / Vertex / Databricks FS<\/td><\/tr><tr><td>Tracking + registry<\/td><td>MLflow<\/td><td>SageMaker / Vertex / Unity Catalog<\/td><\/tr><tr><td>Pipelines / CT<\/td><td>Kubeflow, Airflow<\/td><td>Vertex / SageMaker Pipelines<\/td><\/tr><tr><td>Serving<\/td><td>KServe / Seldon<\/td><td>SageMaker / Vertex endpoints<\/td><\/tr><tr><td>Monitoring<\/td><td>Evidently + Prometheus<\/td><td>Model Monitor<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How you'd say it:<\/strong> <em>\"The paved road was Feast, MLflow, Kubeflow, KServe, and Evidently on GKE, wired by Terraform — so a data scientist went from notebook to a monitored, canaried endpoint without touching infra.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What is an ML platform <em>for<\/em>? *(a self-serve paved road so many teams train, deploy, and<\/li><\/ul>\n<p>monitor models fast, safely, and reproducibly.)*<\/p>\n<ul><li>Name four layers it needs. *(data/feature store, experiment tracking, training, registry,<\/li><\/ul>\n<p>serving, monitoring — any four.)*<\/p>\n<ul><li>One key design principle? *(self-serve/standardized, reproducible, observable-by-default,<\/li><\/ul>\n<p>modular — any one.)*<\/p>","toc":[{"level":2,"id":"whats-being-asked","text":"What's being asked"},{"level":2,"id":"the-components-walk-the-lifecycle","text":"The components (walk the lifecycle)"},{"level":2,"id":"the-design-principles-to-voice","text":"The design principles to voice"},{"level":2,"id":"the-trade-offs-to-name","text":"The trade-offs to name"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"worked example: ml platform 💡 tl;dr sometimes the design question is infrastructure , not a single model: \"design a platform so our data scientists can train, deploy, and monitor many models.\" the answer is essentially the whole mlops stack from sections 2–7, assembled into a self-serve system. what's being asked not \"build one model\" but \"build the paved road many models run on.\" the goal is to let teams go from idea to production fast, safely, and repeatably , without each team reinventing pipelines, serving, and monitoring. this tests whether you see the big picture. the components (walk the lifecycle) data layer → ingestion, storage (lake/warehouse), feature store (shared features) experiment layer→ notebooks/compute, experiment tracking, data versioning training layer → scalable training (k8s/managed), pipelines, hpo registry → model registry (versioned, staged promotion) serving layer → batch + online serving, autoscaling, canary rollout monitoring layer→ drift, data quality, ops metrics, alerting, retraining triggers cross-cutting → ci/cd/ct automation, iac, access control, cost tracking each box maps to a section here: feature store (§2), tracking (§4), registry & ci/cd (§5), monitoring (§6), infra (§7). the platform is those pieces integrated into a self-serve workflow. the design principles to voice self-serve & standardized — a data scientist should deploy via a paved path, not a ticket to the infra team. standard templates beat bespoke setups. reproducible — versioned data, code, and models; anything in production can be recreated. observable — every model is monitored by default, not as an afterthought. modular — teams can swap a component (a different model server) without rebuilding everything. build vs buy — lean on managed platforms (sagemaker/vertex) or open source (mlflow, kubeflow, feast) rather than hand-building all of it; justify where you'd customize. the trade-offs to name flexibility vs standardization (too rigid and teams route around it; too flexible and it's chaos), build vs buy (control vs speed), and cost vs capability. a good answer explicitly picks a point on each and says why. 🔗 connecting the dots — the real stack the platform is a named toolchain. open-source assembly: feast (features) + mlflow (tracking/registry) + kubeflow (pipelines) + kserve (serving) + evidently (monitoring) + airflow (orchestration) + terraform (infra), on kubernetes . managed equivalent: databricks or sagemaker / vertex covering the same boxes end to end. platform layer open source managed feature store feast sagemaker / vertex / databricks fs tracking + registry mlflow sagemaker / vertex / unity catalog pipelines / ct kubeflow, airflow vertex / sagemaker pipelines serving kserve / seldon sagemaker / vertex endpoints monitoring evidently + prometheus model monitor how you'd say it: \"the paved road was feast, mlflow, kubeflow, kserve, and evidently on gke, wired by terraform — so a data scientist went from notebook to a monitored, canaried endpoint without touching infra.\" self-check what is an ml platform for ? *(a self-serve paved road so many teams train, deploy, and monitor models fast, safely, and reproducibly.)* name four layers it needs. *(data/feature store, experiment tracking, training, registry, serving, monitoring — any four.)* one key design principle? *(self-serve/standardized, reproducible, observable-by-default, modular — any one.)*","words":512},{"path":"10-system-design/worked-perception-platform.md","title":"Worked Example: Hybrid Perception Platform","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-hybrid-perception-platform\">Worked Example: Hybrid Perception Platform<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <em>\"Petabytes of perception data land daily. Design a hybrid platform that trains on <strong>both<\/strong> on-prem and cloud GPUs, picks the location by availability, and keeps code, data, and artifacts reproducible with centralized metrics and easy rollbacks.\"<\/em> This is the ML-platform question (§ ML Platform) at autonomy scale — the winning insight is <strong>data gravity<\/strong>: at petabyte scale you move <em>compute to data<\/em>, never data to compute.<\/div><\/div>\n<h2 id=\"frame-it-first-say-this-out-loud\">Frame it first (say this out loud)<\/h2>\n<ul><li><strong>Data gravity dominates.<\/strong> PBs don't get streamed to the cloud on a whim — egress cost<\/li><\/ul>\n<p>and time kill you. That single fact <em>justifies<\/em> the hybrid design.<\/p>\n<ul><li><strong>It's a batch + experiment platform, not a latency service.<\/strong> Real-time inference happens<\/li><\/ul>\n<p>at the edge (the car/robot); the platform does ingest, curation, training, and re-sim, so   SLAs are relaxed and the scheduler can place work opportunistically.<\/p>\n<ul><li><strong>\"Availability-based placement\" = one fungible GPU pool<\/strong> with different cost/latency/<\/li><\/ul>\n<p>capacity profiles that a single scheduler chooses between.<\/p>\n<h2 id=\"walk-the-planes\">Walk the planes<\/h2>\n<pre><code> EDGE  sensors → local buffer → bulk offload at depot (or ship disks — sneakernet is valid)\n   │\n   ▼  DATA LAYER (source of truth)  ── object store: on-prem Ceph/MinIO + cloud S3/GCS\n   │     content-addressed · immutable · tiered hot/warm/cold · Iceberg/lakeFS versioning\n   │     + catalog DB (index every clip) + feature/label store\n   ▲\n CONTROL PLANE (cloud-hosted, HA)  ── API + orchestrator (Argo/Temporal/Flyte)\n   │     + FEDERATED SCHEDULER (the \"cloud or on-prem?\" brain) + metadata/lineage DB\n   ▼\n COMPUTE  on-prem K8s/Slurm  ⇄  cloud K8s, joined by ONE scheduler over a private backbone\n   │\n   ▼  Centralized metrics · lineage · model registry · dashboards<\/code><\/pre>\n<h2 id=\"the-five-subsystems-they-asked-for\">The five subsystems they asked for<\/h2>\n<ul><li><strong>Control plane<\/strong> — stateless services + a durable metadata store, <strong>cloud-hosted for HA<\/strong>,<\/li><\/ul>\n<p>dispatches to either site. Its core piece is a <strong>placement engine<\/strong> that scores jobs on:   on-prem queue depth, cloud spot price/quota, <strong>data locality (biggest weight)<\/strong>, priority,   and cost budget. Policy: <em>prefer on-prem (sunk cost, no egress); burst to cloud when the   queue exceeds a threshold or the data already lives there.<\/em> Multi-cluster via Karmada /   Admiralty / Volcano / Slurm-bridge.<\/p>\n<ul><li><strong>Data layer<\/strong> — immutable, content-addressed object store; <strong>range reads<\/strong> over ~1 GB<\/li><\/ul>\n<p>shards (not billions of tiny files); dataset versioning (lakeFS/DVC + Iceberg); a catalog   so engineers query <em>\"left-turns in rain at night\"<\/em> without scanning PBs.<\/p>\n<ul><li><strong>Experiment handling / reproducibility<\/strong> — pin the triple **code SHA + data snapshot hash<ul><li>container image digest**; track with MLflow/W&amp;B; promote immutable models through a<\/li><\/ul><\/li><\/ul>\n<p>registry (dev → shadow → canary → prod). Given a run ID, reconstruct the run bit-for-bit.<\/p>\n<ul><li><strong>Networking<\/strong> — private interconnect (Direct Connect / Cloud Interconnect), not<\/li><\/ul>\n<p>VPN-over-internet; RDMA/InfiniBand for distributed training; <strong>egress-aware scheduling<\/strong> so   moving data to cloud is priced in; service mesh (mTLS) between sites.<\/p>\n<ul><li><strong>Security<\/strong> — SSO/OIDC + RBAC, short-lived workload identity (SPIFFE/SPIRE); encryption at<\/li><\/ul>\n<p>rest (KMS) and in transit; <strong>PII redaction<\/strong> (faces/plates) at ingest + data-residency   policies that <em>also<\/em> constrain the scheduler (EU data may not leave region); signed images   and signed model bundles; immutable audit log.<\/p>\n<h2 id=\"rollbacks-fall-out-of-immutability-for-free\">Rollbacks fall out of immutability (for free)<\/h2>\n<ul><li><strong>Model<\/strong> — repoint the registry/deployment to the previous digest; the fleet pulls the<\/li><\/ul>\n<p>prior signed bundle and converges.<\/p>\n<ul><li><strong>Data / pipeline<\/strong> — pin the previous dataset snapshot.<\/li><li><strong>Infra<\/strong> — GitOps (Argo CD / Flux): the platform is declarative in git, so <code>git revert<\/code> +<\/li><\/ul>\n<p>reconcile rolls back the control plane too, with a clean audit trail.<\/p>\n<h2 id=\"the-trade-offs-to-name\">The trade-offs to name<\/h2>\n<p>Sneakernet vs. live upload; spot-instance preemption (checkpoint often); shard size (big = cheap sequential reads but coarse shuffle); on-prem sunk cost vs. cloud elasticity; and GPU nondeterminism capping bit-exact reproducibility.<\/p>\n<h2 id=\"how-youd-say-it\">🔗 How you'd say it<\/h2>\n<p><em>\"At petabyte scale, <strong>data gravity forces a data-local, compute-follows-data design<\/strong>, and <strong>immutability + content addressing<\/strong> is the one primitive that gives me reproducibility, rollbacks, and auditability at once. The control plane stays small and cloud-hosted for HA, making cost/availability/locality-weighted placement across one federated GPU pool. Metrics, networking, and security are all built to preserve that immutable lineage end to end.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why hybrid, in one phrase? *(data gravity — PBs are too expensive to move, so compute<\/li><\/ul>\n<p>follows data.)*<\/p>\n<ul><li>What decides cloud vs on-prem? *(a scoring scheduler: locality &gt; queue depth &gt; spot price &gt;<\/li><\/ul>\n<p>budget; prefer on-prem, burst to cloud.)*<\/p>\n<ul><li>What makes it reproducible <strong>and<\/strong> rollback-able? *(immutable, content-addressed artifacts +<\/li><\/ul>\n<p>the pinned code/data/image triple + GitOps.)*<\/p>","toc":[{"level":2,"id":"frame-it-first-say-this-out-loud","text":"Frame it first (say this out loud)"},{"level":2,"id":"walk-the-planes","text":"Walk the planes"},{"level":2,"id":"the-five-subsystems-they-asked-for","text":"The five subsystems they asked for"},{"level":2,"id":"rollbacks-fall-out-of-immutability-for-free","text":"Rollbacks fall out of immutability (for free)"},{"level":2,"id":"the-trade-offs-to-name","text":"The trade-offs to name"},{"level":2,"id":"how-youd-say-it","text":"🔗 How you'd say it"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"worked example: hybrid perception platform 💡 tl;dr \"petabytes of perception data land daily. design a hybrid platform that trains on both on-prem and cloud gpus, picks the location by availability, and keeps code, data, and artifacts reproducible with centralized metrics and easy rollbacks.\" this is the ml-platform question (§ ml platform) at autonomy scale — the winning insight is data gravity : at petabyte scale you move compute to data , never data to compute. frame it first (say this out loud) data gravity dominates. pbs don't get streamed to the cloud on a whim — egress cost and time kill you. that single fact justifies the hybrid design. it's a batch + experiment platform, not a latency service. real-time inference happens at the edge (the car/robot); the platform does ingest, curation, training, and re-sim, so slas are relaxed and the scheduler can place work opportunistically. \"availability-based placement\" = one fungible gpu pool with different cost/latency/ capacity profiles that a single scheduler chooses between. walk the planes edge sensors → local buffer → bulk offload at depot (or ship disks — sneakernet is valid) │ ▼ data layer (source of truth) ── object store: on-prem ceph/minio + cloud s3/gcs │ content-addressed · immutable · tiered hot/warm/cold · iceberg/lakefs versioning │ + catalog db (index every clip) + feature/label store ▲ control plane (cloud-hosted, ha) ── api + orchestrator (argo/temporal/flyte) │ + federated scheduler (the \"cloud or on-prem?\" brain) + metadata/lineage db ▼ compute on-prem k8s/slurm ⇄ cloud k8s, joined by one scheduler over a private backbone │ ▼ centralized metrics · lineage · model registry · dashboards the five subsystems they asked for control plane — stateless services + a durable metadata store, cloud-hosted for ha , dispatches to either site. its core piece is a placement engine that scores jobs on: on-prem queue depth, cloud spot price/quota, data locality (biggest weight) , priority, and cost budget. policy: prefer on-prem (sunk cost, no egress); burst to cloud when the queue exceeds a threshold or the data already lives there. multi-cluster via karmada / admiralty / volcano / slurm-bridge. data layer — immutable, content-addressed object store; range reads over ~1 gb shards (not billions of tiny files); dataset versioning (lakefs/dvc + iceberg); a catalog so engineers query \"left-turns in rain at night\" without scanning pbs. experiment handling / reproducibility — pin the triple **code sha + data snapshot hash container image digest**; track with mlflow/w&b; promote immutable models through a registry (dev → shadow → canary → prod). given a run id, reconstruct the run bit-for-bit. networking — private interconnect (direct connect / cloud interconnect), not vpn-over-internet; rdma/infiniband for distributed training; egress-aware scheduling so moving data to cloud is priced in; service mesh (mtls) between sites. security — sso/oidc + rbac, short-lived workload identity (spiffe/spire); encryption at rest (kms) and in transit; pii redaction (faces/plates) at ingest + data-residency policies that also constrain the scheduler (eu data may not leave region); signed images and signed model bundles; immutable audit log. rollbacks fall out of immutability (for free) model — repoint the registry/deployment to the previous digest; the fleet pulls the prior signed bundle and converges. data / pipeline — pin the previous dataset snapshot. infra — gitops (argo cd / flux): the platform is declarative in git, so git revert + reconcile rolls back the control plane too, with a clean audit trail. the trade-offs to name sneakernet vs. live upload; spot-instance preemption (checkpoint often); shard size (big = cheap sequential reads but coarse shuffle); on-prem sunk cost vs. cloud elasticity; and gpu nondeterminism capping bit-exact reproducibility. 🔗 how you'd say it \"at petabyte scale, data gravity forces a data-local, compute-follows-data design , and immutability + content addressing is the one primitive that gives me reproducibility, rollbacks, and auditability at once. the control plane stays small and cloud-hosted for ha, making cost/availability/locality-weighted placement across one federated gpu pool. metrics, networking, and security are all built to preserve that immutable lineage end to end.\" self-check why hybrid, in one phrase? *(data gravity — pbs are too expensive to move, so compute follows data.)* what decides cloud vs on-prem? *(a scoring scheduler: locality > queue depth > spot price > budget; prefer on-prem, burst to cloud.)* what makes it reproducible and rollback-able? *(immutable, content-addressed artifacts + the pinned code/data/image triple + gitops.)*","words":719},{"path":"10-system-design/worked-data-loader-library.md","title":"Worked Example: Data-Loading Library","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-a-data-loading-library\">Worked Example: A Data-Loading Library<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <em>\"Design a Python library that reads local <strong>and<\/strong> cloud data, with caching, lazy loading, and prefetching so the <strong>GPU never idles<\/strong>, and is resilient to failures. Sketch the classes, methods, and interfaces.\"<\/em> This is the library-design cousin of the data-pipeline round (§2) — the archetype is <strong>WebDataset / MosaicML StreamingDataset / NVIDIA DALI<\/strong>. The one idea it all serves: <strong>a bounded, multi-stage, concurrent pipeline<\/strong> — fetch → cache → decode → transform → batch → pin → GPU — where each stage runs <em>ahead<\/em> of the next.<\/div><\/div>\n<h2 id=\"frame-the-requirements\">Frame the requirements<\/h2>\n<ul><li><strong>Unified access<\/strong> — same code for a local path or <code>s3://<\/code> / <code>gs://<\/code>; the user shouldn't care.<\/li><li><strong>The GPU must never wait<\/strong> — the whole library exists to hide I/O + decode latency behind<\/li><\/ul>\n<p>compute. The one metric to surface above all: <strong>GPU data-stall %<\/strong>.<\/p>\n<ul><li><strong>Datasets don't fit in RAM/disk<\/strong> — stream lazily with bounded memory.<\/li><li><strong>Resilient &amp; resumable<\/strong> — cloud reads fail, nodes preempt, files corrupt; a single bad<\/li><\/ul>\n<p>object must not kill a multi-day run.<\/p>\n<h2 id=\"design-principles-for-the-class-layout\">Design principles for the class layout<\/h2>\n<ul><li><strong>Program to interfaces (<code>Protocol<\/code>/<code>ABC<\/code>)<\/strong> at every seam — storage, cache, decoder all<\/li><\/ul>\n<p>swappable.<\/p>\n<ul><li>**Separate the <em>plan<\/em> from <em>execution<\/em>** — <code>Dataset<\/code> builds a lazy DAG of operators; a<\/li><\/ul>\n<p><code>Pipeline<\/code> runs it. This is what enables lazy loading + op fusion.<\/p>\n<ul><li><strong>Composition over inheritance<\/strong> — <code>Dataset<\/code> <em>has a<\/em> <code>Storage<\/code>, <em>has a<\/em> <code>Cache<\/code>, <em>has a<\/em><\/li><\/ul>\n<p><code>Prefetcher<\/code>; it doesn't inherit them.<\/p>\n<h2 id=\"the-interface-seams-what-youd-whiteboard\">The interface seams (what you'd whiteboard)<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Storage(Protocol):                 <span class=\"tok-comment\"># local + cloud, unified — RETRIES LIVE HERE<\/span>\n    <span class=\"tok-keyword\">def<\/span> read_range(<span class=\"tok-keyword\">self<\/span>, uri, offset, length) -&gt; <span class=\"tok-builtin\">bytes<\/span>: ...   <span class=\"tok-comment\"># the key primitive<\/span>\n    <span class=\"tok-keyword\">def<\/span> <span class=\"tok-builtin\">list<\/span>(<span class=\"tok-keyword\">self<\/span>, prefix) -&gt; Iterator[<span class=\"tok-builtin\">str<\/span>]: ...\n    <span class=\"tok-keyword\">def<\/span> stat(<span class=\"tok-keyword\">self<\/span>, uri) -&gt; ObjMeta: ...\n<span class=\"tok-comment\"># LocalFS · S3Storage · GCS — picked by URI scheme via a StorageRegistry.<\/span>\n<span class=\"tok-comment\"># ResilientStorage(inner) decorates any backend with retry/backoff/hedged reads.<\/span>\n\n<span class=\"tok-keyword\">class<\/span> Cache(Protocol):                   <span class=\"tok-comment\"># multi-tier, content-addressed key = hash(uri+etag)<\/span>\n    <span class=\"tok-keyword\">def<\/span> get(<span class=\"tok-keyword\">self<\/span>, key) -&gt; <span class=\"tok-builtin\">bytes<\/span> | <span class=\"tok-keyword\">None<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> put(<span class=\"tok-keyword\">self<\/span>, key, value) -&gt; <span class=\"tok-keyword\">None<\/span>: ...\n<span class=\"tok-comment\"># MemoryCache (LRU) → DiskCache (NVMe) → origin, composed by TieredCache (read-through).<\/span>\n\n<span class=\"tok-keyword\">class<\/span> Dataset:                           <span class=\"tok-comment\"># lazy plan builder — every op returns a NEW Dataset<\/span>\n    <span class=\"tok-decorator\">@classmethod<\/span>\n    <span class=\"tok-keyword\">def<\/span> <span class=\"tok-builtin\">open<\/span>(cls, pattern, *, storage=<span class=\"tok-keyword\">None<\/span>, cache=<span class=\"tok-keyword\">None<\/span>) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> decode(<span class=\"tok-keyword\">self<\/span>, kind) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...     <span class=\"tok-comment\"># all lazy: build the DAG, run nothing<\/span>\n    <span class=\"tok-keyword\">def<\/span> <span class=\"tok-builtin\">map<\/span>(<span class=\"tok-keyword\">self<\/span>, fn) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> shuffle(<span class=\"tok-keyword\">self<\/span>, buffer, seed=<span class=\"tok-number\">0<\/span>) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> batch(<span class=\"tok-keyword\">self<\/span>, n) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> prefetch(<span class=\"tok-keyword\">self<\/span>, depth) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> __iter__(<span class=\"tok-keyword\">self<\/span>): <span class=\"tok-keyword\">return<\/span> Pipeline(<span class=\"tok-keyword\">self<\/span>._source, <span class=\"tok-keyword\">self<\/span>._fuse(<span class=\"tok-keyword\">self<\/span>._ops)).run()\n    <span class=\"tok-keyword\">def<\/span> to_torch(<span class=\"tok-keyword\">self<\/span>, **kw): ...                <span class=\"tok-comment\"># framework adapter (IterableDataset)<\/span><\/code><\/pre>\n<h2 id=\"keeping-the-gpu-busy-the-heart-of-it\">Keeping the GPU busy (the heart of it)<\/h2>\n<pre><code>[N fetch workers] → [decode/transform pool] → [batch+collate] → [pin] → [GPU]\n   threads (I/O)        processes (dodge GIL)                 CUDA stream H2D overlap\n        └── bounded queue ──┴──── bounded queue ────┘   ← backpressure = self-regulating<\/code><\/pre>\n<ul><li><strong>Right concurrency per stage<\/strong> — threads for I/O (releases GIL on network waits),<\/li><\/ul>\n<p>processes (or a native DALI backend) for CPU-heavy decode/augment.<\/p>\n<ul><li><strong>Bounded queues = backpressure<\/strong> — a <code>Prefetcher(produce_fn, depth, workers)<\/code> runs the<\/li><\/ul>\n<p>producer <code>depth<\/code> batches ahead; full queue blocks, drained queue refills. Self-tuning.<\/p>\n<ul><li><strong>Overlap H2D copy with compute<\/strong> — separate CUDA stream + <code>pin_memory<\/code> + <code>non_blocking=True<\/code><\/li><\/ul>\n<p>so the next batch DMAs to GPU while the current one trains. This kills the last idle bubble.<\/p>\n<ul><li><strong>Autotune workers<\/strong> to drive <strong>data-stall % → 0<\/strong>; expose that metric so users know if<\/li><\/ul>\n<p>they're I/O-bound.<\/p>\n<h2 id=\"resilience-resumability\">Resilience &amp; resumability<\/h2>\n<ul><li><strong>Retries with backoff + jitter<\/strong> and <strong>hedged requests<\/strong> (fire a duplicate past p99) — all<\/li><\/ul>\n<p>inside the <code>Storage<\/code> layer, so every backend inherits it.<\/p>\n<ul><li><strong>Skip-and-log poison samples<\/strong> — a corrupt object increments a metric and is dropped, not<\/li><\/ul>\n<p>fatal.<\/p>\n<ul><li><strong>Checkpointable iterator<\/strong> — persist `IterState(epoch, shard_cursor, sample_offset,<\/li><\/ul>\n<p>samples_seen, rng_seed)`; on spot preemption, resume <strong>mid-epoch<\/strong> deterministically.<\/p>\n<ul><li><strong>Multi-tier cache<\/strong> turns epoch-2 cloud reads into local-disk reads — the single biggest<\/li><\/ul>\n<p>win for cloud training.<\/p>\n<h2 id=\"the-trade-offs-to-name\">The trade-offs to name<\/h2>\n<p>Streaming-shuffle quality vs. buffer size/memory; disk-cache warmup cost on epoch 1; determinism vs. hedged-request nondeterminism; shard size (big = cheap sequential reads but coarse shuffle; small = better shuffle but request overhead).<\/p>\n<h2 id=\"how-youd-say-it\">🔗 How you'd say it<\/h2>\n<p><em>\"It's a <strong>lazy, staged, back-pressured pipeline over a pluggable <code>Storage<\/code> abstraction<\/strong> whose key primitive is ranged reads over sharded blobs. A content-addressed tiered cache makes epoch-2 reads local; prefetching with bounded queues plus CUDA-stream H2D overlap keeps the GPU saturated; retries, poison-skipping, and a checkpointable iterator make it survive spot preemption. Every layer is a narrow interface with a default impl, <strong>composed<\/strong> into the <code>Dataset<\/code> — so it's testable, swappable, and never stalls the GPU.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What's the storage layer's key primitive? *(ranged reads over sharded blobs — fetch only<\/li><\/ul>\n<p>the bytes you need.)*<\/p>\n<ul><li>How do you keep the GPU fed? *(staged concurrent pipeline + bounded-queue prefetch + CUDA-<\/li><\/ul>\n<p>stream H2D overlap; drive data-stall % to zero.)*<\/p>\n<ul><li>How does it survive a spot preemption? *(a checkpointable iterator that resumes mid-epoch<\/li><\/ul>\n<p>from <code>IterState<\/code>, plus retries and poison-sample skipping.)*<\/p>","toc":[{"level":2,"id":"frame-the-requirements","text":"Frame the requirements"},{"level":2,"id":"design-principles-for-the-class-layout","text":"Design principles for the class layout"},{"level":2,"id":"the-interface-seams-what-youd-whiteboard","text":"The interface seams (what you'd whiteboard)"},{"level":2,"id":"keeping-the-gpu-busy-the-heart-of-it","text":"Keeping the GPU busy (the heart of it)"},{"level":2,"id":"resilience-resumability","text":"Resilience &amp; resumability"},{"level":2,"id":"the-trade-offs-to-name","text":"The trade-offs to name"},{"level":2,"id":"how-youd-say-it","text":"🔗 How you'd say it"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"worked example: a data-loading library 💡 tl;dr \"design a python library that reads local and cloud data, with caching, lazy loading, and prefetching so the gpu never idles , and is resilient to failures. sketch the classes, methods, and interfaces.\" this is the library-design cousin of the data-pipeline round (§2) — the archetype is webdataset / mosaicml streamingdataset / nvidia dali . the one idea it all serves: a bounded, multi-stage, concurrent pipeline — fetch → cache → decode → transform → batch → pin → gpu — where each stage runs ahead of the next. frame the requirements unified access — same code for a local path or s3:// / gs:// ; the user shouldn't care. the gpu must never wait — the whole library exists to hide i/o + decode latency behind compute. the one metric to surface above all: gpu data-stall % . datasets don't fit in ram/disk — stream lazily with bounded memory. resilient & resumable — cloud reads fail, nodes preempt, files corrupt; a single bad object must not kill a multi-day run. design principles for the class layout program to interfaces ( protocol / abc ) at every seam — storage, cache, decoder all swappable. **separate the plan from execution ** — dataset builds a lazy dag of operators; a pipeline runs it. this is what enables lazy loading + op fusion. composition over inheritance — dataset has a storage , has a cache , has a prefetcher ; it doesn't inherit them. the interface seams (what you'd whiteboard) class storage(protocol): # local + cloud, unified — retries live here def read_range( self , uri, offset, length) -> bytes : ... # the key primitive def list ( self , prefix) -> iterator[ str ]: ... def stat( self , uri) -> objmeta: ... # localfs · s3storage · gcs — picked by uri scheme via a storageregistry. # resilientstorage(inner) decorates any backend with retry/backoff/hedged reads. class cache(protocol): # multi-tier, content-addressed key = hash(uri+etag) def get( self , key) -> bytes | none : ... def put( self , key, value) -> none : ... # memorycache (lru) → diskcache (nvme) → origin, composed by tieredcache (read-through). class dataset: # lazy plan builder — every op returns a new dataset @classmethod def open (cls, pattern, *, storage= none , cache= none ) -> \"dataset\" : ... def decode( self , kind) -> \"dataset\" : ... # all lazy: build the dag, run nothing def map ( self , fn) -> \"dataset\" : ... def shuffle( self , buffer, seed= 0 ) -> \"dataset\" : ... def batch( self , n) -> \"dataset\" : ... def prefetch( self , depth) -> \"dataset\" : ... def __iter__( self ): return pipeline( self ._source, self ._fuse( self ._ops)).run() def to_torch( self , **kw): ... # framework adapter (iterabledataset) keeping the gpu busy (the heart of it) [n fetch workers] → [decode/transform pool] → [batch+collate] → [pin] → [gpu] threads (i/o) processes (dodge gil) cuda stream h2d overlap └── bounded queue ──┴──── bounded queue ────┘ ← backpressure = self-regulating right concurrency per stage — threads for i/o (releases gil on network waits), processes (or a native dali backend) for cpu-heavy decode/augment. bounded queues = backpressure — a prefetcher(produce_fn, depth, workers) runs the producer depth batches ahead; full queue blocks, drained queue refills. self-tuning. overlap h2d copy with compute — separate cuda stream + pin_memory + non_blocking=true so the next batch dmas to gpu while the current one trains. this kills the last idle bubble. autotune workers to drive data-stall % → 0 ; expose that metric so users know if they're i/o-bound. resilience & resumability retries with backoff + jitter and hedged requests (fire a duplicate past p99) — all inside the storage layer, so every backend inherits it. skip-and-log poison samples — a corrupt object increments a metric and is dropped, not fatal. checkpointable iterator — persist `iterstate(epoch, shard_cursor, sample_offset, samples_seen, rng_seed)`; on spot preemption, resume mid-epoch deterministically. multi-tier cache turns epoch-2 cloud reads into local-disk reads — the single biggest win for cloud training. the trade-offs to name streaming-shuffle quality vs. buffer size/memory; disk-cache warmup cost on epoch 1; determinism vs. hedged-request nondeterminism; shard size (big = cheap sequential reads but coarse shuffle; small = better shuffle but request overhead). 🔗 how you'd say it \"it's a lazy, staged, back-pressured pipeline over a pluggable storage abstraction whose key primitive is ranged reads over sharded blobs. a content-addressed tiered cache makes epoch-2 reads local; prefetching with bounded queues plus cuda-stream h2d overlap keeps the gpu saturated; retries, poison-skipping, and a checkpointable iterator make it survive spot preemption. every layer is a narrow interface with a default impl, composed into the dataset — so it's testable, swappable, and never stalls the gpu.\" self-check what's the storage layer's key primitive? *(ranged reads over sharded blobs — fetch only the bytes you need.)* how do you keep the gpu fed? *(staged concurrent pipeline + bounded-queue prefetch + cuda- stream h2d overlap; drive data-stall % to zero.)* how does it survive a spot preemption? *(a checkpointable iterator that resumes mid-epoch from iterstate , plus retries and poison-sample skipping.)*","words":857},{"path":"11-drill-bank/README.md","title":"Overview","section":"11 · Drill Bank","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"11-drill-bank\">11 — Drill Bank<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Rapid-fire questions across every section, plus a one-page cheat sheet for the final skim. Use the drill bank to test recall (tap a question to reveal the answer); use the cheat sheet the morning of.<\/div><\/div>\n<h2 id=\"how-to-use-it\">How to use it<\/h2>\n<ul><li><strong><a class=\"mdlink\" data-href=\"drill-bank.md\" href=\"#\">Rapid Q&amp;A<\/a><\/strong> — quiz-style. Hide the answers, go top to bottom, and<\/li><\/ul>\n<p>anything you fumble, reread that section. These are the \"warm-up and mid-interview\"   questions you should answer in one or two crisp sentences.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"decision-tradeoffs.md\" href=\"#\">Decision Tradeoffs — Why X over Y<\/a><\/strong> — every canonical head-to-head<\/li><\/ul>\n<p>(\"boosting or deep learning?\", \"RAG or fine-tune?\", \"spot or on-demand?\") with the <em>deciding   axis<\/em>, the default, and the cost of the wrong pick. This is the format senior interviewers   push hardest on: not \"what is X\" but \"X or Y, and why?\"<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">One-page cheat sheet<\/a><\/strong> — the whole pack compressed: the key<\/li><\/ul>\n<p>distinctions, the \"say this\" lines, and the decision rules. Skim it last.<\/p>\n<p>The goal isn't to memorize wording — it's to be able to <em>explain<\/em> each idea simply and pick the right tool with a reason. If you can do the drill bank comfortably, you're ready.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"drill-bank.md\" href=\"#\">drill-bank.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"how-to-use-it","text":"How to use it"}],"text":"11 — drill bank 💡 tl;dr rapid-fire questions across every section, plus a one-page cheat sheet for the final skim. use the drill bank to test recall (tap a question to reveal the answer); use the cheat sheet the morning of. how to use it rapid q&a — quiz-style. hide the answers, go top to bottom, and anything you fumble, reread that section. these are the \"warm-up and mid-interview\" questions you should answer in one or two crisp sentences. decision tradeoffs — why x over y — every canonical head-to-head (\"boosting or deep learning?\", \"rag or fine-tune?\", \"spot or on-demand?\") with the deciding axis , the default, and the cost of the wrong pick. this is the format senior interviewers push hardest on: not \"what is x\" but \"x or y, and why?\" one-page cheat sheet — the whole pack compressed: the key distinctions, the \"say this\" lines, and the decision rules. skim it last. the goal isn't to memorize wording — it's to be able to explain each idea simply and pick the right tool with a reason. if you can do the drill bank comfortably, you're ready. → start: drill-bank.md","words":192},{"path":"11-drill-bank/drill-bank.md","title":"Rapid Q&A","section":"11 · Drill Bank","quiz":true,"accent":"#cc5fab","html":"<h1 id=\"rapid-qa\">Rapid Q&amp;A<\/h1>\n<p>Tap a question to reveal the answer. Hide all and quiz yourself top to bottom.<\/p>\n<h2 id=\"foundations\">Foundations<\/h2>\n<details class=\"qa\" open><summary>Q: Walk through the ML lifecycle.<\/summary><div class=\"qa-body\"><p>Frame the problem → collect data → preprocess &amp; engineer features → train → evaluate → deploy → monitor → retrain. It's a loop because the world drifts.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Overfitting vs underfitting?<\/summary><div class=\"qa-body\"><p>Overfitting = great on training, poor on new data (high variance); underfitting = poor on both (high bias). Fix overfitting with more data / regularization / simpler model; fix underfitting with a more expressive model or better features.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Best default model for tabular data, and when do you switch to deep learning?<\/summary><div class=\"qa-body\"><p>Gradient boosting (XGBoost/LightGBM). Switch to deep learning for unstructured data (images, text) or very large datasets.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Precision vs recall — when each?<\/summary><div class=\"qa-body\"><p>Precision when false positives are costly; recall when misses are costly. F1 or PR-AUC when classes are imbalanced. Accuracy is misleading under imbalance.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Bagging vs boosting?<\/summary><div class=\"qa-body\"><p>Bagging = parallel trees averaged to cut variance (Random Forest); boosting = sequential trees each fixing the last's errors to cut bias (XGBoost).<\/p><\/div><\/details><h2 id=\"data-experimentation\">Data &amp; experimentation<\/h2>\n<details class=\"qa\" open><summary>Q: What is data leakage?<\/summary><div class=\"qa-body\"><p>Training on information unavailable at prediction time (e.g. fitting the scaler on all data before splitting, or a feature that's a proxy for the label). It inflates offline metrics and fails in production.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why three data splits, not two?<\/summary><div class=\"qa-body\"><p>Train to fit, validation to tune/choose, test opened once for an honest estimate — because tuning and reporting on the same set makes the score optimistic.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you split time-series data?<\/summary><div class=\"qa-body\"><p>By time — train on the past, test on the future. A random split leaks the future into training.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is train/serve skew and how does a feature store fix it?<\/summary><div class=\"qa-body\"><p>Features computed differently in training vs serving, so the model sees mismatched inputs. A feature store defines each feature once and serves it to both, keeping them identical.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Batch vs streaming — how do you choose?<\/summary><div class=\"qa-body\"><p>By required freshness. Default to batch (simpler, cheaper); use streaming only when you need sub-minute freshness.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why A/B test if offline metrics improved?<\/summary><div class=\"qa-body\"><p>Offline gains don't guarantee business impact; only live users prove it. Check statistical significance, adequate sample/duration, and guardrail metrics.<\/p><\/div><\/details><h2 id=\"mlops-serving\">MLOps &amp; serving<\/h2>\n<details class=\"qa\" open><summary>Q: What does MLOps add over DevOps?<\/summary><div class=\"qa-body\"><p>It versions, tests, deploys, and monitors code + data<\/p><ul><li>model (not just code), and adds continuous training — because models decay silently.<\/li><\/ul><\/div><\/details><details class=\"qa\" open><summary>Q: Three serving patterns?<\/summary><div class=\"qa-body\"><p>Batch (scheduled, bulk), online/real-time (per request, low latency), streaming (per event, continuous). Choose by latency need.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why containerize a model?<\/summary><div class=\"qa-body\"><p>To bundle the exact environment so it runs identically everywhere — no \"works on my machine.\"<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does a model registry give you?<\/summary><div class=\"qa-body\"><p>Versioning, staged promotion (staging → production), metadata, and instant rollback to a previous version.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Name safe rollout strategies.<\/summary><div class=\"qa-body\"><p>Canary (small traffic slice first), blue-green (switch between two, revert instantly), shadow (run on real traffic without using the output).<\/p><\/div><\/details><h2 id=\"monitoring-reliability\">Monitoring &amp; reliability<\/h2>\n<details class=\"qa\" open><summary>Q: Why is monitoring different for ML?<\/summary><div class=\"qa-body\"><p>Models fail silently — they keep returning confident but increasingly wrong predictions with no error thrown.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Data drift vs concept drift?<\/summary><div class=\"qa-body\"><p>Data drift = input distribution changes; concept drift = the input→output relationship changes. Covariate drift often means retrain; concept drift means the problem itself changed.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you detect drift without labels?<\/summary><div class=\"qa-body\"><p>Compare live input/prediction distributions to a training baseline (PSI, KL divergence, KS test); compute real accuracy later as labels arrive.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: When do you retrain?<\/summary><div class=\"qa-body\"><p>On a schedule as a floor, plus drift/performance triggers — and always gate on the new model beating production on a fresh holdout before promoting.<\/p><\/div><\/details><h2 id=\"cloud-optimization-scaling\">Cloud, optimization, scaling<\/h2>\n<details class=\"qa\" open><summary>Q: Name the flagship ML platform on each cloud.<\/summary><div class=\"qa-body\"><p>AWS SageMaker, GCP Vertex AI, Azure ML.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does Kubernetes give a model service?<\/summary><div class=\"qa-body\"><p>Scaling, self-healing, rolling updates/ rollback, and load balancing across a cluster.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you train cheaply on GPUs?<\/summary><div class=\"qa-body\"><p>Spot/preemptible instances with checkpointing, right- sizing, mixed precision, and tearing down idle instances.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Quantization vs pruning vs distillation?<\/summary><div class=\"qa-body\"><p>Quantization = lower-precision numbers; pruning = remove unimportant weights; distillation = train a small student to mimic a big teacher.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Data vs model parallelism?<\/summary><div class=\"qa-body\"><p>Data parallelism replicates the model and splits the data (average gradients); model parallelism splits the model itself across GPUs when it doesn't fit.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Latency vs throughput, and how does batching relate?<\/summary><div class=\"qa-body\"><p>Latency = one prediction's speed; throughput = predictions/sec. Batching raises throughput but can add latency.<\/p><\/div><\/details><h2 id=\"generative-ai\">Generative AI<\/h2>\n<details class=\"qa\" open><summary>Q: What are LLMs trained to do?<\/summary><div class=\"qa-body\"><p>Predict the next token over massive text; attention lets them weigh all token relationships in parallel, which is why they scale.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: RAG vs fine-tuning — which for what?<\/summary><div class=\"qa-body\"><p>RAG adds knowledge (your private/fresh facts, reduces hallucination); fine-tuning changes behavior/style. Don't fine-tune to inject facts.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How does RAG work?<\/summary><div class=\"qa-body\"><p>Index documents as embeddings in a vector DB → retrieve chunks similar to the query → put them in the prompt so the model answers grounded in them.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is LoRA?<\/summary><div class=\"qa-body\"><p>A parameter-efficient fine-tuning method: freeze the base model, train tiny low-rank adapters (&lt;1% of params) — cheap and swappable per task.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is evaluating LLM output hard, and one approach?<\/summary><div class=\"qa-body\"><p>Usually no single correct answer; use human eval, LLM-as-judge, or task-specific checks like groundedness for RAG.<\/p><\/div><\/details><h2 id=\"system-design\">System design<\/h2>\n<details class=\"qa\" open><summary>Q: First move in an ML system design question?<\/summary><div class=\"qa-body\"><p>Clarify requirements — scope, scale, latency, success metric — before designing anything.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is the two-stage pattern?<\/summary><div class=\"qa-body\"><p>Cheap candidate generation narrows millions of items to hundreds (high recall), then an expensive ranking model orders those — because you can't score millions in real time.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Two recommender gotchas?<\/summary><div class=\"qa-body\"><p>Cold start (no history for new users/items → popularity/ content fallback) and feedback loops (popular items self-reinforce → add exploration).<\/p><\/div><\/details><p>→ Done — if these felt easy, you're ready. Skim the cheat sheet last.<\/p>","toc":[{"level":2,"id":"foundations","text":"Foundations"},{"level":2,"id":"data-experimentation","text":"Data &amp; experimentation"},{"level":2,"id":"mlops-serving","text":"MLOps &amp; serving"},{"level":2,"id":"monitoring-reliability","text":"Monitoring &amp; reliability"},{"level":2,"id":"cloud-optimization-scaling","text":"Cloud, optimization, scaling"},{"level":2,"id":"generative-ai","text":"Generative AI"},{"level":2,"id":"system-design","text":"System design"}],"text":"rapid q&a tap a question to reveal the answer. hide all and quiz yourself top to bottom. foundations q: walk through the ml lifecycle. frame the problem → collect data → preprocess & engineer features → train → evaluate → deploy → monitor → retrain. it's a loop because the world drifts. q: overfitting vs underfitting? overfitting = great on training, poor on new data (high variance); underfitting = poor on both (high bias). fix overfitting with more data / regularization / simpler model; fix underfitting with a more expressive model or better features. q: best default model for tabular data, and when do you switch to deep learning? gradient boosting (xgboost/lightgbm). switch to deep learning for unstructured data (images, text) or very large datasets. q: precision vs recall — when each? precision when false positives are costly; recall when misses are costly. f1 or pr-auc when classes are imbalanced. accuracy is misleading under imbalance. q: bagging vs boosting? bagging = parallel trees averaged to cut variance (random forest); boosting = sequential trees each fixing the last's errors to cut bias (xgboost). data & experimentation q: what is data leakage? training on information unavailable at prediction time (e.g. fitting the scaler on all data before splitting, or a feature that's a proxy for the label). it inflates offline metrics and fails in production. q: why three data splits, not two? train to fit, validation to tune/choose, test opened once for an honest estimate — because tuning and reporting on the same set makes the score optimistic. q: how do you split time-series data? by time — train on the past, test on the future. a random split leaks the future into training. q: what is train/serve skew and how does a feature store fix it? features computed differently in training vs serving, so the model sees mismatched inputs. a feature store defines each feature once and serves it to both, keeping them identical. q: batch vs streaming — how do you choose? by required freshness. default to batch (simpler, cheaper); use streaming only when you need sub-minute freshness. q: why a/b test if offline metrics improved? offline gains don't guarantee business impact; only live users prove it. check statistical significance, adequate sample/duration, and guardrail metrics. mlops & serving q: what does mlops add over devops? it versions, tests, deploys, and monitors code + data model (not just code), and adds continuous training — because models decay silently. q: three serving patterns? batch (scheduled, bulk), online/real-time (per request, low latency), streaming (per event, continuous). choose by latency need. q: why containerize a model? to bundle the exact environment so it runs identically everywhere — no \"works on my machine.\" q: what does a model registry give you? versioning, staged promotion (staging → production), metadata, and instant rollback to a previous version. q: name safe rollout strategies. canary (small traffic slice first), blue-green (switch between two, revert instantly), shadow (run on real traffic without using the output). monitoring & reliability q: why is monitoring different for ml? models fail silently — they keep returning confident but increasingly wrong predictions with no error thrown. q: data drift vs concept drift? data drift = input distribution changes; concept drift = the input→output relationship changes. covariate drift often means retrain; concept drift means the problem itself changed. q: how do you detect drift without labels? compare live input/prediction distributions to a training baseline (psi, kl divergence, ks test); compute real accuracy later as labels arrive. q: when do you retrain? on a schedule as a floor, plus drift/performance triggers — and always gate on the new model beating production on a fresh holdout before promoting. cloud, optimization, scaling q: name the flagship ml platform on each cloud. aws sagemaker, gcp vertex ai, azure ml. q: what does kubernetes give a model service? scaling, self-healing, rolling updates/ rollback, and load balancing across a cluster. q: how do you train cheaply on gpus? spot/preemptible instances with checkpointing, right- sizing, mixed precision, and tearing down idle instances. q: quantization vs pruning vs distillation? quantization = lower-precision numbers; pruning = remove unimportant weights; distillation = train a small student to mimic a big teacher. q: data vs model parallelism? data parallelism replicates the model and splits the data (average gradients); model parallelism splits the model itself across gpus when it doesn't fit. q: latency vs throughput, and how does batching relate? latency = one prediction's speed; throughput = predictions/sec. batching raises throughput but can add latency. generative ai q: what are llms trained to do? predict the next token over massive text; attention lets them weigh all token relationships in parallel, which is why they scale. q: rag vs fine-tuning — which for what? rag adds knowledge (your private/fresh facts, reduces hallucination); fine-tuning changes behavior/style. don't fine-tune to inject facts. q: how does rag work? index documents as embeddings in a vector db → retrieve chunks similar to the query → put them in the prompt so the model answers grounded in them. q: what is lora? a parameter-efficient fine-tuning method: freeze the base model, train tiny low-rank adapters (<1% of params) — cheap and swappable per task. q: why is evaluating llm output hard, and one approach? usually no single correct answer; use human eval, llm-as-judge, or task-specific checks like groundedness for rag. system design q: first move in an ml system design question? clarify requirements — scope, scale, latency, success metric — before designing anything. q: what is the two-stage pattern? cheap candidate generation narrows millions of items to hundreds (high recall), then an expensive ranking model orders those — because you can't score millions in real time. q: two recommender gotchas? cold start (no history for new users/items → popularity/ content fallback) and feedback loops (popular items self-reinforce → add exploration). → done — if these felt easy, you're ready. skim the cheat sheet last.","words":979},{"path":"11-drill-bank/decision-tradeoffs.md","title":"Decision Tradeoffs — Why X over Y","section":"11 · Drill Bank","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"decision-tradeoffs-why-x-over-y\">Decision Tradeoffs — \"Why X over Y\"<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Interviewers rarely ask \"what is X\" — they ask <em>\"X or Y, and why?\"<\/em> The strong answer always names the <strong>one axis the decision turns on<\/strong>, picks the <strong>simpler/cheaper option by default<\/strong>, and states the <strong>failure mode of the wrong pick<\/strong>. This page is every canonical head-to-head in the pack, compressed to that shape. Master the <em>axis<\/em>, not the memorized verdict.<\/div><\/div>\n<h2 id=\"the-universal-template\">The universal template<\/h2>\n<p>Any \"X vs Y\" question answers in three beats:<\/p>\n<ol><li><strong>The deciding axis<\/strong> — <em>\"This comes down to «latency / data size / freshness / cost / how much labeled data I have».\"<\/em><\/li><li><strong>The rule + default<\/strong> — <em>\"I default to «the simpler one» and only reach for «the complex one» when «the axis» demands it.\"<\/em><\/li><li><strong>The wrong-pick cost<\/strong> — <em>\"Pick the other one and you pay «the specific failure».\"<\/em><\/li><\/ol>\n<p>Say the axis out loud <em>before<\/em> the verdict. That's what separates \"I memorized the answer\" from \"I understand the tradeoff.\"<\/p>\n<h2 id=\"modeling\">Modeling<\/h2>\n<ul><li><strong>Gradient boosting vs deep learning<\/strong> — <em>Axis: data type.<\/em> Tabular/structured → boosting<\/li><\/ul>\n<p>(XGBoost/LightGBM): more accurate, less tuning, no scaling, trains on a CPU. Unstructured   (images, text, audio) or huge data → deep learning. <em>Wrong pick:<\/em> a neural net on a 50k-row   table — slower, worse, and harder to explain than one XGBoost line.<\/p>\n<ul><li><strong>Bagging vs boosting<\/strong> — <em>Axis: is your error variance or bias?<\/em> Bagging (Random Forest) =<\/li><\/ul>\n<p>parallel trees averaged → cuts <strong>variance<\/strong>, robust, little tuning. Boosting = sequential   trees fixing prior errors → cuts <strong>bias<\/strong>, top accuracy, careful tuning. <em>Wrong pick:<\/em>   over-pushed boosting overfits; a forest plateaus below what boosting could reach.<\/p>\n<ul><li><strong>L1 vs L2 regularization<\/strong> — <em>Axis: do you want feature selection?<\/em> L1 (Lasso) drives<\/li><\/ul>\n<p>weights to exactly zero → sparse, built-in selection. L2 (Ridge) shrinks smoothly → keeps   all features, handles correlated ones better. <em>Tie-breaker:<\/em> ElasticNet blends both.<\/p>\n<ul><li><strong>More layers/params vs more data<\/strong> — <em>Axis: are you underfitting or overfitting?<\/em> Underfit<\/li><\/ul>\n<p>(poor on both train and test) → more capacity/features. Overfit (great train, poor test) →   more data, regularization, simpler model. <em>Wrong pick:<\/em> adding capacity to an overfit model   makes it worse.<\/p>\n<h2 id=\"metrics\">Metrics<\/h2>\n<ul><li><strong>Precision vs recall<\/strong> — <em>Axis: which error is costlier?<\/em> Precision when false positives<\/li><\/ul>\n<p>hurt (spam filter eating real mail). Recall when misses hurt (cancer screening, fraud).   <em>Wrong pick:<\/em> optimizing precision on a cancer detector quietly ships false negatives.<\/p>\n<ul><li><strong>Accuracy vs F1/PR-AUC<\/strong> — <em>Axis: class balance.<\/em> Balanced → accuracy is fine. Imbalanced<\/li><\/ul>\n<p>→ accuracy lies (99% by always predicting \"no\"); use F1 or PR-AUC. <em>Say this:<\/em> \"Accuracy is   the first metric to distrust under imbalance.\"<\/p>\n<ul><li><strong>ROC-AUC vs PR-AUC<\/strong> — <em>Axis: how rare is the positive class?<\/em> Heavy imbalance (fraud at<\/li><\/ul>\n<p>0.1%) → PR-AUC, because ROC-AUC looks flatteringly high when true negatives dominate.<\/p>\n<ul><li><strong>Offline metric vs business metric<\/strong> — <em>Axis: none — you need both.<\/em> Offline (AUC, RMSE)<\/li><\/ul>\n<p>gates what ships; the business metric (revenue, retention) is the real target. <em>Wrong pick:<\/em>   shipping on offline gains alone → the A/B test shows no lift (see Experimentation).<\/p>\n<h2 id=\"data\">Data<\/h2>\n<ul><li><strong>Data lake vs warehouse vs lakehouse<\/strong> — <em>Axis: schema-on-read vs schema-on-write.<\/em> Lake =<\/li><\/ul>\n<p>raw, cheap, any format, schema-on-read (great for ML/exploration). Warehouse = clean,   structured, schema-on-write, fast SQL (great for BI). Lakehouse (Databricks/Delta) = one   system for both. <em>Wrong pick:<\/em> forcing raw sensor data into a warehouse schema up front   throws away signal you didn't know you needed.<\/p>\n<ul><li><strong>Batch vs streaming (data)<\/strong> — <em>Axis: required freshness.<\/em> Default batch — simpler,<\/li><\/ul>\n<p>cheaper, easy to backfill. Streaming only when you need sub-minute freshness (fraud, live   personalization). <em>Wrong pick:<\/em> standing up Kafka+Flink for a nightly report burns   complexity for zero business value.<\/p>\n<ul><li><strong>Normalization vs standardization<\/strong> — <em>Axis: distribution + model.<\/em> Standardize (zero mean,<\/li><\/ul>\n<p>unit variance) for roughly-Gaussian features and distance/gradient models. Min-max normalize   for bounded ranges (images to 0–1). <em>Note:<\/em> trees need neither.<\/p>\n<ul><li><strong>Oversample vs undersample vs class weights<\/strong> — <em>Axis: how much data you can spare.<\/em> Lots of<\/li><\/ul>\n<p>data → undersample the majority. Scarce data → oversample/SMOTE the minority. Simplest first   → class weights in the loss. <em>Wrong pick:<\/em> oversampling <em>before<\/em> the train/test split leaks   duplicates across the split and inflates your score.<\/p>\n<ul><li><strong>Build vs buy a feature store<\/strong> — <em>Axis: train/serve skew risk × team size.<\/em> The value is<\/li><\/ul>\n<p>defining a feature <em>once<\/em> and serving it to both training and inference, killing skew. Buy   (Feast/Tecton) when many models share features; skip it for one model with simple features.<\/p>\n<h2 id=\"experimentation\">Experimentation<\/h2>\n<ul><li><strong>Grid vs random vs Bayesian search<\/strong> — <em>Axis: how expensive is one training run?<\/em> Cheap runs<\/li><\/ul>\n<p>/ few params → grid. Many params → random (finds good regions faster). Expensive runs (deep   nets) → Bayesian (Optuna) to spend trials wisely. <em>Wrong pick:<\/em> grid search over 6   hyperparameters is exponential and wasteful.<\/p>\n<ul><li><strong>Holdout vs k-fold CV<\/strong> — <em>Axis: dataset size.<\/em> Big data → a single holdout is enough and<\/li><\/ul>\n<p>cheap. Small data → k-fold for a stable estimate. <em>Wrong pick:<\/em> one small holdout gives a   noisy, lucky-or-unlucky number.<\/p>\n<ul><li><strong>A/B test vs offline eval<\/strong> — <em>Axis: do you need proof of real-world impact?<\/em> Offline gates<\/li><\/ul>\n<p>candidates cheaply; the A/B test is the only thing that proves business lift on live users.   <em>Wrong pick:<\/em> trusting offline lift → you ship a model users quietly hate. Watch   significance, sample size/duration, and guardrail metrics.<\/p>\n<h2 id=\"mlops-serving\">MLOps &amp; serving<\/h2>\n<ul><li><strong>Batch vs online vs streaming serving<\/strong> — <em>Axis: when is the prediction needed?<\/em> Later/in<\/li><\/ul>\n<p>bulk → batch (cheapest, no always-on service). Per user request, now → online API. Per event,   continuously → streaming. <em>Default:<\/em> if a nightly table satisfies the product, don't build a   real-time service.<\/p>\n<ul><li><strong>REST vs gRPC<\/strong> — <em>Axis: latency + who calls it.<\/em> REST/JSON for public, browser-facing,<\/li><\/ul>\n<p>easy-to-debug endpoints. gRPC (binary, HTTP/2) for internal, high-throughput,   service-to-service and streaming — lower latency and payload.<\/p>\n<ul><li><strong>FastAPI vs a dedicated model server<\/strong> — <em>Axis: GPU + throughput needs.<\/em> FastAPI/BentoML for<\/li><\/ul>\n<p>a simple CPU model or glue logic. Triton/TorchServe/TF-Serving when you need GPU <strong>dynamic   batching<\/strong>, multi-model, and high throughput. LLMs → vLLM/TGI specifically (paged-attention   batching). <em>Wrong pick:<\/em> a raw FastAPI loop wastes the GPU by serving one request at a time.<\/p>\n<ul><li><strong>Canary vs blue-green vs shadow<\/strong> — <em>Axis: what risk are you buying down?<\/em> Canary = small<\/li><\/ul>\n<p>traffic slice first (catch bad models on few users). Blue-green = two full envs, instant   switch/rollback (minimize downtime). Shadow = run on real traffic but <em>don't<\/em> use the output   (validate safely, zero user risk). Often shadow → canary → full.<\/p>\n<ul><li><strong>Registry vs versioned files in a bucket<\/strong> — <em>Axis: do you need staged promotion + audit?<\/em> A<\/li><\/ul>\n<p>registry (MLflow/Unity) adds staging→prod promotion, lineage, and one-click rollback. Files   in S3 work for a solo experiment but give you no promotion story or audit trail.<\/p>\n<h2 id=\"monitoring\">Monitoring<\/h2>\n<ul><li><strong>Data drift vs concept drift<\/strong> — <em>Axis: what changed?<\/em> Data/covariate drift = the <strong>inputs<\/strong><\/li><\/ul>\n<p>shift (new user mix) → often a retrain fixes it. Concept drift = the <strong>input→output   relationship<\/strong> shifts (fraud tactics change) → the problem itself moved; retraining on old   labels won't save you. <em>Wrong pick:<\/em> treating concept drift as data drift → you retrain and   still degrade.<\/p>\n<ul><li><strong>PSI vs KL vs KS for drift<\/strong> — <em>Axis: feature type + what you have.<\/em> All compare live vs a<\/li><\/ul>\n<p>training baseline <strong>without labels<\/strong>. PSI = a simple, thresholded bucketed score (industry   default). KL = information-theoretic divergence. KS = distance for continuous distributions.   Real accuracy comes later, once labels land.<\/p>\n<ul><li><strong>Schedule vs trigger retraining<\/strong> — <em>Axis: predictable decay vs event-driven.<\/em> Schedule =<\/li><\/ul>\n<p>a floor (nightly/weekly). Drift/perf <strong>trigger<\/strong> = react when it actually degrades. Do both,   and always <strong>gate<\/strong>: promote only if the new model beats production on a fresh holdout.<\/p>\n<h2 id=\"cloud-optimization\">Cloud &amp; optimization<\/h2>\n<ul><li><strong>Managed platform vs DIY on Kubernetes<\/strong> — <em>Axis: control vs ops burden.<\/em> SageMaker/Vertex =<\/li><\/ul>\n<p>fast, less to run, some lock-in. Self-managed K8s (KServe/Kubeflow) = full control and   portability, more to operate. <em>Default:<\/em> start managed; go DIY when cost or flexibility   forces it.<\/p>\n<ul><li><strong>Spot/preemptible vs on-demand<\/strong> — <em>Axis: is the work interruptible?<\/em> Spot (50–90% cheaper)<\/li><\/ul>\n<p>for fault-tolerant training <strong>with checkpointing<\/strong>. On-demand for latency-critical serving   that can't vanish mid-request. <em>Wrong pick:<\/em> spot for a live endpoint → it disappears under   load.<\/p>\n<ul><li><strong>Data vs model vs pipeline parallelism<\/strong> — <em>Axis: does the model fit on one GPU?<\/em> Fits →<\/li><\/ul>\n<p><strong>data parallelism<\/strong> (replicate, split the batch, average gradients) — the default. Too big   → model/tensor parallelism (split the model) or pipeline parallelism (split by layer stage).   <em>Say this:<\/em> \"Data parallelism first; model parallelism only when a single GPU can't hold the   weights.\"<\/p>\n<ul><li><strong>Quantization vs pruning vs distillation<\/strong> — <em>Axis: how you're shrinking.<\/em> Quantization =<\/li><\/ul>\n<p>lower-precision numbers (FP16/INT8), biggest win for least effort → try first. Pruning =   drop unimportant weights. Distillation = train a small student to mimic a big teacher.   Order: quantize → prune → distill.<\/p>\n<ul><li><strong>CPU vs GPU inference<\/strong> — <em>Axis: model size × QPS.<\/em> Small models / low traffic → CPU is<\/li><\/ul>\n<p>cheaper and simpler. Large models or high throughput with batching → GPU. <em>Wrong pick:<\/em>   a GPU serving 3 requests/sec is money on fire.<\/p>\n<ul><li><strong>Latency vs throughput<\/strong> — <em>Axis: you're usually trading them.<\/em> Latency = one prediction's<\/li><\/ul>\n<p>speed (user-facing SLA). Throughput = predictions/sec (cost efficiency). Batching <em>raises   throughput but adds latency<\/em> — tune the batch window to your p99 budget. <strong>Profile before   optimizing; attack the biggest number.<\/strong><\/p>\n<h2 id=\"generative-ai\">Generative AI<\/h2>\n<ul><li><strong>Prompt vs RAG vs fine-tune<\/strong> — <em>Axis: what's actually missing?<\/em> Prompt first (free,<\/li><\/ul>\n<p>instant). Missing <strong>knowledge/your data<\/strong> → RAG (grounds answers, cuts hallucination,   updates by re-indexing). Wrong <strong>behavior/format/tone<\/strong> that no prompt fixes → fine-tune.   <em>Wrong pick — the classic:<\/em> fine-tuning to inject facts. RAG is cheaper and right for facts.<\/p>\n<ul><li><strong>Full fine-tune vs LoRA/PEFT<\/strong> — <em>Axis: budget × how many tasks.<\/em> LoRA trains &lt;1% of params<\/li><\/ul>\n<p>→ cheap, fast, swappable adapters per task, tiny artifacts. Full fine-tune only when you have   the data/compute and need to move the whole model. <em>Default:<\/em> LoRA.<\/p>\n<ul><li><strong>Closed API vs open self-hosted LLM<\/strong> — *Axis: control/privacy/cost-at-scale vs<\/li><\/ul>\n<p>time-to-market.* API (GPT/Claude) = best quality, zero ops, per-token cost, data leaves your   walls. Self-hosted (Llama/Mistral on vLLM) = data stays in, cheaper at high vol

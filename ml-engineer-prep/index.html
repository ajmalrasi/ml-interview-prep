onfirm on an nsight systems timeline: if the gpu is idle waiting on the dataloader, add workers/pinned memory/prefetch and bigger batches; if it's launch-bound on tiny kernels, use cuda graphs. q: nsight systems vs nsight compute? systems is the system-wide timeline — \"is the gpu busy and what's it waiting on.\" compute is the per-kernel deep dive — roofline placement, occupancy, memory vs compute for one kernel. q: how do you correctly measure gpu inference latency? cuda events with torch.cuda.synchronize , a warmup to absorb one-time costs, many iterations, and report p50/p99 — not a single wall-clock call, because kernels are async. lock clocks to cut boost/thermal noise. q: what is a cuda stream good for? overlapping independent work — e.g. copy the next batch (pinned + non_blocking) while computing the current one, or running independent kernels concurrently. higher utilization. compression breadth q: why doesn't unstructured pruning speed up a gpu? scattered zeros still pass through dense kernels — the hardware multiplies by zero. you need structured pruning (whole channels) or a hardware-supported sparse pattern. q: what is 2:4 sparsity? at most 2 non-zeros per group of 4 weights. ampere+ sparse tensor cores skip the zeros for up to 2× matmul throughput. train dense → apply the 2:4 mask → fine-tune → run sparse; stacks with int8/fp8. q: why are soft targets better than hard labels in distillation? the teacher's softened probability distribution carries \"dark knowledge\" about class similarity — far richer supervision than a one-hot label — so the student learns more from fewer signals. q: in what order would you stack optimizations? distill (smaller architecture) → prune (structured/2:4) → quantize (int8/fp8) → compile (tensorrt), re-measuring accuracy after each step and profiling to confirm the speedup. llm inference q: why is llm decode memory-bound, and what helps? each token reads all weights + the whole kv cache but does little math per byte → bandwidth limited. weight-only int4, kv-cache quantization (fp8/int8), and gqa/mqa all cut the bytes moved. q: what does flashattention do? fuses attention and tiles it through on-chip sram with an online softmax, so it never writes the n×n score matrix to global memory — o(n) memory, far fewer hbm trips, and it's exact. q: paged attention? stores the kv cache in fixed-size blocks mapped by an index table, like os virtual memory — eliminates fragmentation, raises batch size, and enables copy-free prefix sharing (vllm). q: continuous / in-flight batching? schedule at the token level so a finished sequence is immediately replaced and new requests join mid-flight — keeps the gpu saturated instead of waiting for the slowest sequence in a static batch. biggest throughput lever for real traffic. q: tensor vs pipeline parallelism? tensor parallelism splits each layer's matmul across gpus (heavy per-layer all-reduce, wants nvlink); pipeline parallelism puts different layers on different gpus (has a pipeline bubble, hidden with micro-batching). tp for latency on a big single model, pp to span many layers. the three questions to never fumble q: what's the single mental model you bring to any optimization problem? separate the three axes: method (how you pick int8-friendly weights/scales — ptq/qat/ calibration), format (which numbers you compute in — fp32/fp16/bf16/fp8/int8), and engine (where it runs fast — tensorrt/triton/cuda kernels/fusion). most questions are asking me to hold two of these apart. q: you optimized a model — walk me through it. the fashionmnist story: fp32 baseline → ptq/qat on the method axis, fbgemm-cpu vs tensorrt-gpu on the engine axis, fp16/int8 on the format axis, all tracked in mlflow — with the punchline that qat-fed tensorrt recovered accuracy at identical speed because trt latency comes from kernels, not weight values. q: how do you know your optimization actually worked? profile before and after — nsight to attribute the speedup and confirm the new bottleneck, proper cuda-event timing with warmup and p99, and an accuracy re-check after every step. never claim a speedup i didn't measure, never ship an accuracy drop i didn't quantify.","words":1393},{"path":"13-llm-vlm-optimization/README.md","title":"Overview","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"13-llm-vlm-optimization\">13 — LLM &amp; VLM Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Your FashionMNIST project was a <strong>CNN<\/strong>. The same optimization <em>loop<\/em> — baseline → quantize → serve → compare — absolutely applies to <strong>LLMs<\/strong> and <strong>VLMs<\/strong>, but the details flip: LLM inference is <strong>memory-bound<\/strong> not compute-bound, activations have <strong>outliers<\/strong> that break naive INT8, models are too big to retrain (so <strong>PTQ and weight-only INT4 dominate<\/strong>), and you measure <strong>perplexity and tokens/sec<\/strong>, not top-1 accuracy. This section maps your CNN skills onto that world.<\/div><\/div>\n<h2 id=\"does-the-cnn-loop-transfer-yes-with-three-twists\">Does the CNN loop transfer? Yes — with three twists<\/h2>\n<p>The <strong>method / format / engine<\/strong> mental model from <a class=\"mdlink\" data-href=\"../12-nvidia-model-optimization/README.md\" href=\"#\">§12<\/a> carries over unchanged. What changes is <em>which choices win<\/em>:<\/p>\n<pre><code>  CNN (your project)                 LLM / VLM\n  ─────────────────────              ─────────────────────\n  INT8, compute-bound          →     memory-bound decode → weight-only INT4 shines\n  PTQ + QAT both practical     →     PTQ/weight-only; QAT too costly (QLoRA instead)\n  clean INT8 activations       →     activation outliers → need SmoothQuant/AWQ\n  top-1 accuracy               →     perplexity + task benchmarks (MMLU…)\n  fixed input size             →     variable seq length + a KV cache to manage\n  TensorRT engine              →     TensorRT-LLM / vLLM / llama.cpp<\/code><\/pre>\n<h2 id=\"what-each-page-covers\">What each page covers<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Page<\/th><th>The question it answers<\/th><\/tr><\/thead><tbody><tr><td>CNN → LLM/VLM<\/td><td>\"My experiment was a CNN — what transfers and what breaks?\"<\/td><\/tr><tr><td>LLM Quantization<\/td><td>\"Weight-only INT4 vs W8A8/FP8, GPTQ/AWQ/SmoothQuant, KV-cache quant.\"<\/td><\/tr><tr><td>The Loop in Practice<\/td><td>\"How would you actually run baseline→quantize→serve→compare for an LLM?\"<\/td><\/tr><tr><td>VLM Optimization<\/td><td>\"A vision-language model has a vision tower <em>and<\/em> an LLM — optimize which, how?\"<\/td><\/tr><tr><td>Experiment Redo<\/td><td>\"Redo my FashionMNIST table as an LLM/VLM project.\"<\/td><\/tr><tr><td>Interview Q&amp;A<\/td><td>Rapid-fire drill.<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"why-vlms-are-the-natural-bridge-for-you\">Why VLMs are the natural bridge for you<\/h2>\n<p>A VLM is literally <strong>your CNN skills + an LLM stapled together<\/strong>: a vision encoder (a ViT/CNN — exactly the model you already optimized) feeds a language decoder. So you can say <em>\"the vision tower I'd quantize the way I did my FashionMNIST CNN; the decoder I'd treat as an LLM\"<\/em> — one sentence that shows both halves of your experience. That's the page to land.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"cnn-to-llm.md\" href=\"#\">cnn-to-llm.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"does-the-cnn-loop-transfer-yes-with-three-twists","text":"Does the CNN loop transfer? Yes — with three twists"},{"level":2,"id":"what-each-page-covers","text":"What each page covers"},{"level":2,"id":"why-vlms-are-the-natural-bridge-for-you","text":"Why VLMs are the natural bridge for you"}],"text":"13 — llm & vlm optimization 💡 tl;dr your fashionmnist project was a cnn . the same optimization loop — baseline → quantize → serve → compare — absolutely applies to llms and vlms , but the details flip: llm inference is memory-bound not compute-bound, activations have outliers that break naive int8, models are too big to retrain (so ptq and weight-only int4 dominate ), and you measure perplexity and tokens/sec , not top-1 accuracy. this section maps your cnn skills onto that world. does the cnn loop transfer? yes — with three twists the method / format / engine mental model from §12 carries over unchanged. what changes is which choices win : cnn (your project) llm / vlm ───────────────────── ───────────────────── int8, compute-bound → memory-bound decode → weight-only int4 shines ptq + qat both practical → ptq/weight-only; qat too costly (qlora instead) clean int8 activations → activation outliers → need smoothquant/awq top-1 accuracy → perplexity + task benchmarks (mmlu…) fixed input size → variable seq length + a kv cache to manage tensorrt engine → tensorrt-llm / vllm / llama.cpp what each page covers page the question it answers cnn → llm/vlm \"my experiment was a cnn — what transfers and what breaks?\" llm quantization \"weight-only int4 vs w8a8/fp8, gptq/awq/smoothquant, kv-cache quant.\" the loop in practice \"how would you actually run baseline→quantize→serve→compare for an llm?\" vlm optimization \"a vision-language model has a vision tower and an llm — optimize which, how?\" experiment redo \"redo my fashionmnist table as an llm/vlm project.\" interview q&a rapid-fire drill. why vlms are the natural bridge for you a vlm is literally your cnn skills + an llm stapled together : a vision encoder (a vit/cnn — exactly the model you already optimized) feeds a language decoder. so you can say \"the vision tower i'd quantize the way i did my fashionmnist cnn; the decoder i'd treat as an llm\" — one sentence that shows both halves of your experience. that's the page to land. → start: cnn-to-llm.md","words":334},{"path":"13-llm-vlm-optimization/cnn-to-llm.md","title":"CNN → LLM/VLM: What Transfers","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"cnn-llmvlm-what-transfers-what-breaks\">CNN → LLM/VLM — What Transfers, What Breaks<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Everything conceptual from your CNN project transfers — quantization math, the three axes, TensorRT-style compilation, profiling. What <em>breaks<\/em> is the assumptions: LLMs are <strong>memory-bound<\/strong>, have <strong>outlier activations<\/strong>, are <strong>too big to retrain<\/strong>, and are judged by <strong>perplexity<\/strong>. Knowing exactly which assumption flips is the whole interview.<\/div><\/div>\n<h2 id=\"what-transfers-unchanged\">What transfers unchanged<\/h2>\n<ul><li><strong>The three axes<\/strong> — method (how you pick int8-friendly numbers), format (FP16/INT8/FP8/<\/li><\/ul>\n<p>INT4), engine (where it runs fast). Same framing.<\/p>\n<ul><li><strong>Quantization math<\/strong> — scale, zero-point, symmetric/asymmetric, per-channel. Identical; LLMs<\/li><\/ul>\n<p>just add <strong>group-wise<\/strong> granularity (below).<\/p>\n<ul><li><strong>The loop<\/strong> — baseline → quantize → measure quality + speed → compare in a tracker. Same<\/li><\/ul>\n<p>discipline, different metrics.<\/p>\n<ul><li><strong>Compilation &amp; profiling<\/strong> — a runtime that fuses ops and picks kernels (TensorRT →<\/li><\/ul>\n<p>TensorRT-LLM); roofline, Nsight, proper timing. All carry over.<\/p>\n<ul><li><strong>Distillation<\/strong> — still a core lever, arguably <em>more<\/em> central for LLMs.<\/li><\/ul>\n<h2 id=\"what-breaks-the-four-flips\">What breaks — the four flips<\/h2>\n<h3 id=\"1-compute-bound-memory-bound-the-big-one\">1. Compute-bound → memory-bound (the big one)<\/h3>\n<p>Your CNN was doing lots of math per byte, so INT8 sped up the <strong>compute<\/strong>. LLM <strong>decode generates one token at a time<\/strong>, re-reading <em>every weight<\/em> from memory per token with little math — it's <strong>bandwidth-bound<\/strong>. Consequence: <strong>weight-only INT4<\/strong> (shrink the bytes you load) gives a big decode speedup even though it doesn't touch the math units — the opposite of the CNN intuition. (Roofline logic from <a class=\"mdlink\" data-href=\"../12-nvidia-model-optimization/gpu-performance.md\" href=\"#\">§12<\/a>.)<\/p>\n<h3 id=\"2-clean-activations-outlier-activations\">2. Clean activations → outlier activations<\/h3>\n<p>Transformer activations develop a few <strong>massive outlier channels<\/strong>. A naive per-tensor INT8 scale then has to cover those outliers, crushing every normal value into a few codes → accuracy collapse. This is why plain PTQ that worked on your CNN <em>fails<\/em> on an LLM, and why <strong>SmoothQuant / AWQ<\/strong> exist (next page). Weights are still well-behaved; <strong>activations<\/strong> are the problem.<\/p>\n<h3 id=\"3-retrainable-too-big-to-retrain\">3. Retrainable → too big to retrain<\/h3>\n<p>You could run QAT on FashionMNIST in minutes. A 7B–70B model costs far too much to QAT end-to-end, and you rarely have the data. So the field leans on <strong>PTQ and weight-only<\/strong> methods that need only a little calibration data. The QAT-shaped option is <strong>QLoRA<\/strong> — fine-tune small <strong>LoRA adapters<\/strong> on top of a frozen 4-bit base — which recovers task accuracy cheaply without touching the base weights.<\/p>\n<h3 id=\"4-top-1-accuracy-perplexity-benchmarks\">4. Top-1 accuracy → perplexity + benchmarks<\/h3>\n<p>Your CNN had one clean number. LLM quality is <strong>perplexity<\/strong> (how well it predicts held-out text) plus <strong>downstream benchmarks<\/strong> (MMLU, GSM8K…). Degradation is subtler and uneven — a 4-bit model can look fine on perplexity but slip on multi-step reasoning or long context. You <strong>measure more, and more carefully<\/strong>.<\/p>\n<h2 id=\"two-new-things-with-no-cnn-analog\">Two new things with no CNN analog<\/h2>\n<ul><li><strong>The KV cache<\/strong> — autoregressive attention caches past keys/values; it grows with sequence<\/li><\/ul>\n<p>length and often dominates memory. Managing/quantizing it is a whole optimization axis your   CNN never had. (Mechanics in <a class=\"mdlink\" data-href=\"../12-nvidia-model-optimization/llm-inference.md\" href=\"#\">§12<\/a>.)<\/p>\n<ul><li><strong>Two-phase inference<\/strong> — a compute-bound <strong>prefill<\/strong> (process the prompt) then memory-bound<\/li><\/ul>\n<p><strong>decode<\/strong> (generate tokens). You optimize them differently and report <strong>two latencies<\/strong>   (TTFT and per-token), not one.<\/p>\n<h2 id=\"the-mapping-in-one-table\">The mapping in one table<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Aspect<\/th><th>Your CNN<\/th><th>LLM<\/th><th>VLM<\/th><\/tr><\/thead><tbody><tr><td>Bottleneck<\/td><td>compute<\/td><td>decode = memory<\/td><td>prefill (image tokens) + decode<\/td><\/tr><tr><td>Best-bang quant<\/td><td>INT8 (W+A)<\/td><td>weight-only INT4; FP8<\/td><td>INT8 vision tower + INT4/FP8 decoder<\/td><\/tr><tr><td>Outliers?<\/td><td>no<\/td><td>yes → SmoothQuant/AWQ<\/td><td>yes (in the LLM half)<\/td><\/tr><tr><td>Retrain?<\/td><td>QAT easy<\/td><td>PTQ / QLoRA<\/td><td>PTQ / QLoRA<\/td><\/tr><tr><td>Quality metric<\/td><td>top-1 acc<\/td><td>perplexity + MMLU…<\/td><td>VQA/caption benchmarks<\/td><\/tr><tr><td>New cost<\/td><td>—<\/td><td>KV cache<\/td><td>KV cache + many image tokens<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Same spirit as your project, different tools: <strong>HuggingFace<\/strong> baseline → <strong>AutoAWQ / AutoGPTQ / bitsandbytes<\/strong> (weight-only) or <strong>TensorRT-Model-Optimizer<\/strong> (FP8/SmoothQuant) → served by <strong>TensorRT-LLM / vLLM / llama.cpp<\/strong> → evaluated with <strong>lm-evaluation-harness<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"The loop is the same as my CNN project — baseline, quantize, serve, compare — but LLM decode is memory-bound, so weight-only INT4 is the big win instead of INT8 compute; activations have outliers so I'd use SmoothQuant or AWQ; I can't afford QAT so I'd reach for QLoRA; and I'd track perplexity and tokens/sec, not top-1.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why does weight-only INT4 help an LLM but wouldn't have been the obvious choice for your<\/li><\/ul>\n<p>CNN? <em>(LLM decode is memory-bound — fewer weight bytes to load speeds it up; the CNN was   compute-bound.)<\/em><\/p>\n<ul><li>Why does plain per-tensor INT8 PTQ fail on an LLM? *(outlier activation channels inflate the<\/li><\/ul>\n<p>scale and crush normal values → need SmoothQuant/AWQ.)*<\/p>\n<ul><li>What replaces QAT when the model's too big to retrain? *(PTQ/weight-only quantization, and<\/li><\/ul>\n<p>QLoRA for cheap task-specific recovery.)*<\/p>\n<ul><li>Name two things you optimize on an LLM that have no CNN analog. *(the KV cache; the separate<\/li><\/ul>\n<p>prefill vs decode phases.)*<\/p>","toc":[{"level":2,"id":"what-transfers-unchanged","text":"What transfers unchanged"},{"level":2,"id":"what-breaks-the-four-flips","text":"What breaks — the four flips"},{"level":3,"id":"1-compute-bound-memory-bound-the-big-one","text":"1. Compute-bound → memory-bound (the big one)"},{"level":3,"id":"2-clean-activations-outlier-activations","text":"2. Clean activations → outlier activations"},{"level":3,"id":"3-retrainable-too-big-to-retrain","text":"3. Retrainable → too big to retrain"},{"level":3,"id":"4-top-1-accuracy-perplexity-benchmarks","text":"4. Top-1 accuracy → perplexity + benchmarks"},{"level":2,"id":"two-new-things-with-no-cnn-analog","text":"Two new things with no CNN analog"},{"level":2,"id":"the-mapping-in-one-table","text":"The mapping in one table"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"cnn → llm/vlm — what transfers, what breaks 💡 tl;dr everything conceptual from your cnn project transfers — quantization math, the three axes, tensorrt-style compilation, profiling. what breaks is the assumptions: llms are memory-bound , have outlier activations , are too big to retrain , and are judged by perplexity . knowing exactly which assumption flips is the whole interview. what transfers unchanged the three axes — method (how you pick int8-friendly numbers), format (fp16/int8/fp8/ int4), engine (where it runs fast). same framing. quantization math — scale, zero-point, symmetric/asymmetric, per-channel. identical; llms just add group-wise granularity (below). the loop — baseline → quantize → measure quality + speed → compare in a tracker. same discipline, different metrics. compilation & profiling — a runtime that fuses ops and picks kernels (tensorrt → tensorrt-llm); roofline, nsight, proper timing. all carry over. distillation — still a core lever, arguably more central for llms. what breaks — the four flips 1. compute-bound → memory-bound (the big one) your cnn was doing lots of math per byte, so int8 sped up the compute . llm decode generates one token at a time , re-reading every weight from memory per token with little math — it's bandwidth-bound . consequence: weight-only int4 (shrink the bytes you load) gives a big decode speedup even though it doesn't touch the math units — the opposite of the cnn intuition. (roofline logic from §12 .) 2. clean activations → outlier activations transformer activations develop a few massive outlier channels . a naive per-tensor int8 scale then has to cover those outliers, crushing every normal value into a few codes → accuracy collapse. this is why plain ptq that worked on your cnn fails on an llm, and why smoothquant / awq exist (next page). weights are still well-behaved; activations are the problem. 3. retrainable → too big to retrain you could run qat on fashionmnist in minutes. a 7b–70b model costs far too much to qat end-to-end, and you rarely have the data. so the field leans on ptq and weight-only methods that need only a little calibration data. the qat-shaped option is qlora — fine-tune small lora adapters on top of a frozen 4-bit base — which recovers task accuracy cheaply without touching the base weights. 4. top-1 accuracy → perplexity + benchmarks your cnn had one clean number. llm quality is perplexity (how well it predicts held-out text) plus downstream benchmarks (mmlu, gsm8k…). degradation is subtler and uneven — a 4-bit model can look fine on perplexity but slip on multi-step reasoning or long context. you measure more, and more carefully . two new things with no cnn analog the kv cache — autoregressive attention caches past keys/values; it grows with sequence length and often dominates memory. managing/quantizing it is a whole optimization axis your cnn never had. (mechanics in §12 .) two-phase inference — a compute-bound prefill (process the prompt) then memory-bound decode (generate tokens). you optimize them differently and report two latencies (ttft and per-token), not one. the mapping in one table aspect your cnn llm vlm bottleneck compute decode = memory prefill (image tokens) + decode best-bang quant int8 (w+a) weight-only int4; fp8 int8 vision tower + int4/fp8 decoder outliers? no yes → smoothquant/awq yes (in the llm half) retrain? qat easy ptq / qlora ptq / qlora quality metric top-1 acc perplexity + mmlu… vqa/caption benchmarks new cost — kv cache kv cache + many image tokens 🔗 connecting the dots — the real stack same spirit as your project, different tools: huggingface baseline → autoawq / autogptq / bitsandbytes (weight-only) or tensorrt-model-optimizer (fp8/smoothquant) → served by tensorrt-llm / vllm / llama.cpp → evaluated with lm-evaluation-harness . how you'd say it: \"the loop is the same as my cnn project — baseline, quantize, serve, compare — but llm decode is memory-bound, so weight-only int4 is the big win instead of int8 compute; activations have outliers so i'd use smoothquant or awq; i can't afford qat so i'd reach for qlora; and i'd track perplexity and tokens/sec, not top-1.\" self-check why does weight-only int4 help an llm but wouldn't have been the obvious choice for your cnn? (llm decode is memory-bound — fewer weight bytes to load speeds it up; the cnn was compute-bound.) why does plain per-tensor int8 ptq fail on an llm? *(outlier activation channels inflate the scale and crush normal values → need smoothquant/awq.)* what replaces qat when the model's too big to retrain? *(ptq/weight-only quantization, and qlora for cheap task-specific recovery.)* name two things you optimize on an llm that have no cnn analog. *(the kv cache; the separate prefill vs decode phases.)*","words":772},{"path":"13-llm-vlm-optimization/llm-quantization.md","title":"LLM Quantization","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"llm-quantization\">LLM Quantization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two families. <strong>Weight-only<\/strong> (INT4, keep activations FP16) shrinks memory and speeds up the memory-bound decode — GPTQ/AWQ. <strong>Weight + activation<\/strong> (INT8 or FP8) also speeds the compute-bound prefill but must tame activation outliers — SmoothQuant/FP8. Plus a third target unique to LLMs: <strong>quantize the KV cache<\/strong>. Pick by which bottleneck you're attacking.<\/div><\/div>\n<h2 id=\"the-decision-that-frames-everything\">The decision that frames everything<\/h2>\n<p>Quantize <strong>weights only<\/strong>, or **weights <em>and<\/em> activations**? It maps straight to which phase hurts:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Weight-only (e.g. W4A16)<\/th><th>Weight + activation (W8A8 / FP8)<\/th><\/tr><\/thead><tbody><tr><td>What's quantized<\/td><td>weights → INT4, activations stay FP16<\/td><td>both → INT8 or FP8<\/td><\/tr><tr><td>Speeds up<\/td><td><strong>decode<\/strong> (less to load) + big memory cut<\/td><td><strong>prefill<\/strong> too (faster matmuls)<\/td><\/tr><tr><td>Main risk<\/td><td>small quality loss<\/td><td><strong>activation outliers<\/strong> wreck accuracy<\/td><\/tr><tr><td>Methods<\/td><td><strong>GPTQ, AWQ<\/strong>, GGUF k-quants, bnb NF4<\/td><td><strong>SmoothQuant<\/strong>, FP8 calibration<\/td><\/tr><tr><td>Use when<\/td><td>memory-bound / VRAM-limited / long decode<\/td><td>throughput-bound / long prompts / batch<\/td><\/tr><\/tbody><\/table><\/div>\n<p>One-liner: <em>\"Weight-only INT4 if I'm memory- or VRAM-bound, which decode usually is; weight+activation INT8/FP8 if prefill/throughput dominates and I can handle the outliers.\"<\/em><\/p>\n<h2 id=\"weight-only-methods-int4\">Weight-only methods (INT4)<\/h2>\n<ul><li><strong>GPTQ<\/strong> — layer-wise, <strong>second-order (Hessian-based)<\/strong> rounding: quantize weights column by<\/li><\/ul>\n<p>column, compensating remaining weights for the error. INT4/INT3 with small quality loss.<\/p>\n<ul><li><strong>AWQ (Activation-aware Weight Quantization)<\/strong> — protect the ~1% of weight channels that<\/li><\/ul>\n<p>matter most (identified by <em>activation<\/em> magnitude), scale them up before quantizing so INT4   doesn't crush them. Fast, no backprop, great quality/latency.<\/p>\n<ul><li><strong>Group-wise quantization<\/strong> — the LLM twist on per-channel: give every <strong>group of N weights<\/strong><\/li><\/ul>\n<p>(e.g. group size 128) its own scale. Finer than per-channel, the accuracy knob behind INT4.   GGUF \"k-quants\" (Q4_K_M etc.) are group-wise mixes.<\/p>\n<ul><li><strong>NF4 (bitsandbytes)<\/strong> — a 4-bit \"normal float\" data type matched to the bell-curve<\/li><\/ul>\n<p>distribution of weights; the base for <strong>QLoRA<\/strong>.<\/p>\n<h2 id=\"weight-activation-methods\">Weight + activation methods<\/h2>\n<ul><li><strong>SmoothQuant<\/strong> — the outlier fix. Migrate the \"difficulty\" from activations into weights by<\/li><\/ul>\n<p>a per-channel scaling <code>X·diag(s)⁻¹<\/code> and <code>diag(s)·W<\/code>, so <em>both<\/em> become smooth enough for INT8.   This is what makes W8A8 viable on LLMs.<\/p>\n<ul><li><strong>FP8 (E4M3)<\/strong> — on Hopper/Ada, often the sweet spot: near-FP16 quality, tensor-core speed,<\/li><\/ul>\n<p>and it handles outliers better than INT8 because floating point keeps dynamic range.   Calibrated per-tensor via Transformer Engine / TensorRT-LLM.<\/p>\n<h2 id=\"the-third-target-kv-cache-quantization\">The third target: KV-cache quantization<\/h2>\n<p>Unique to LLMs — the KV cache can dwarf the weights at long context/large batch. Store it in <strong>INT8 or FP8<\/strong> to roughly <strong>halve<\/strong> it, which directly buys <strong>longer context or bigger batches<\/strong>. Usually low-risk (keys can be more sensitive than values; some setups keep keys higher-precision). Always worth mentioning as a lever your CNN never had.<\/p>\n<h2 id=\"ptq-vs-qat-for-llms\">PTQ vs QAT for LLMs<\/h2>\n<ul><li><strong>PTQ dominates<\/strong> — all the methods above are post-training; they need only a small<\/li><\/ul>\n<p><strong>calibration set<\/strong> (a few hundred sequences). Cheap, no gradients.<\/p>\n<ul><li><strong>Full QAT is rare<\/strong> — too expensive at LLM scale. The practical stand-in is <strong>QLoRA<\/strong>:<\/li><\/ul>\n<p>freeze a 4-bit (NF4) base, train small <strong>LoRA adapters<\/strong> in higher precision on top.   You get QAT-like task recovery for a tiny fraction of the cost — and you can serve the base   once and hot-swap adapters.<\/p>\n<ul><li><strong>Distillation<\/strong> is bigger than in CV — small strong models are often <em>distilled<\/em> from large<\/li><\/ul>\n<p>ones, then quantized.<\/p>\n<h2 id=\"measuring-quality-dont-say-accuracy\">Measuring quality (don't say \"accuracy\")<\/h2>\n<ul><li><strong>Perplexity<\/strong> on held-out text (e.g. WikiText) — cheap, sensitive first check.<\/li><li><strong>Downstream benchmarks<\/strong> — MMLU (knowledge), GSM8K (reasoning), HumanEval (code), etc., via<\/li><\/ul>\n<p><strong>lm-evaluation-harness<\/strong>. A 4-bit model can hold perplexity but drop on reasoning, so test   the tasks you care about.<\/p>\n<ul><li><strong>Watch long-context and reasoning<\/strong> — these degrade first under aggressive quantization.<\/li><\/ul>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>AutoGPTQ<\/strong>, <strong>AutoAWQ<\/strong>, <strong>llama.cpp/GGUF<\/strong> (k-quants, CPU/edge), <strong>bitsandbytes<\/strong> (NF4/8-bit, QLoRA) for weight-only; <strong>NVIDIA TensorRT-Model-Optimizer<\/strong> and <strong>TensorRT-LLM<\/strong> for SmoothQuant/FP8/INT8 and KV-cache quant; <strong>lm-evaluation-harness<\/strong> for quality.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a VRAM-bound deployment I'd AWQ or GPTQ the weights to group-wise INT4 and quantize the KV cache to FP8; for a throughput-bound one on Hopper I'd go FP8 weight+activation via TensorRT-LLM. Either way I validate on perplexity plus the task benchmarks I actually care about, because 4-bit can pass perplexity and still lose reasoning.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Weight-only vs weight+activation — which bottleneck does each attack? *(weight-only →<\/li><\/ul>\n<p>memory/decode; weight+activation → compute/prefill, but needs outlier handling.)*<\/p>\n<ul><li>What problem do SmoothQuant and AWQ solve, and how differently? *(activation outliers;<\/li><\/ul>\n<p>SmoothQuant shifts difficulty into weights for W8A8, AWQ protects salient weight channels for   INT4.)*<\/p>\n<ul><li>What's group-wise quantization? *(a scale per group of N weights, e.g. 128 — finer than<\/li><\/ul>\n<p>per-channel, the accuracy knob for INT4.)*<\/p>\n<ul><li>Why quantize the KV cache, and what does it buy? *(it can exceed the weights at long context;<\/li><\/ul>\n<p>INT8/FP8 halves it → longer context / bigger batch.)*<\/p>\n<ul><li>QAT's practical replacement at LLM scale? <em>(QLoRA — LoRA adapters on a frozen 4-bit base.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"the-decision-that-frames-everything","text":"The decision that frames everything"},{"level":2,"id":"weight-only-methods-int4","text":"Weight-only methods (INT4)"},{"level":2,"id":"weight-activation-methods","text":"Weight + activation methods"},{"level":2,"id":"the-third-target-kv-cache-quantization","text":"The third target: KV-cache quantization"},{"level":2,"id":"ptq-vs-qat-for-llms","text":"PTQ vs QAT for LLMs"},{"level":2,"id":"measuring-quality-dont-say-accuracy","text":"Measuring quality (don't say \"accuracy\")"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"llm quantization 💡 tl;dr two families. weight-only (int4, keep activations fp16) shrinks memory and speeds up the memory-bound decode — gptq/awq. weight + activation (int8 or fp8) also speeds the compute-bound prefill but must tame activation outliers — smoothquant/fp8. plus a third target unique to llms: quantize the kv cache . pick by which bottleneck you're attacking. the decision that frames everything quantize weights only , or **weights and activations**? it maps straight to which phase hurts: weight-only (e.g. w4a16) weight + activation (w8a8 / fp8) what's quantized weights → int4, activations stay fp16 both → int8 or fp8 speeds up decode (less to load) + big memory cut prefill too (faster matmuls) main risk small quality loss activation outliers wreck accuracy methods gptq, awq , gguf k-quants, bnb nf4 smoothquant , fp8 calibration use when memory-bound / vram-limited / long decode throughput-bound / long prompts / batch one-liner: \"weight-only int4 if i'm memory- or vram-bound, which decode usually is; weight+activation int8/fp8 if prefill/throughput dominates and i can handle the outliers.\" weight-only methods (int4) gptq — layer-wise, second-order (hessian-based) rounding: quantize weights column by column, compensating remaining weights for the error. int4/int3 with small quality loss. awq (activation-aware weight quantization) — protect the ~1% of weight channels that matter most (identified by activation magnitude), scale them up before quantizing so int4 doesn't crush them. fast, no backprop, great quality/latency. group-wise quantization — the llm twist on per-channel: give every group of n weights (e.g. group size 128) its own scale. finer than per-channel, the accuracy knob behind int4. gguf \"k-quants\" (q4_k_m etc.) are group-wise mixes. nf4 (bitsandbytes) — a 4-bit \"normal float\" data type matched to the bell-curve distribution of weights; the base for qlora . weight + activation methods smoothquant — the outlier fix. migrate the \"difficulty\" from activations into weights by a per-channel scaling x·diag(s)⁻¹ and diag(s)·w , so both become smooth enough for int8. this is what makes w8a8 viable on llms. fp8 (e4m3) — on hopper/ada, often the sweet spot: near-fp16 quality, tensor-core speed, and it handles outliers better than int8 because floating point keeps dynamic range. calibrated per-tensor via transformer engine / tensorrt-llm. the third target: kv-cache quantization unique to llms — the kv cache can dwarf the weights at long context/large batch. store it in int8 or fp8 to roughly halve it, which directly buys longer context or bigger batches . usually low-risk (keys can be more sensitive than values; some setups keep keys higher-precision). always worth mentioning as a lever your cnn never had. ptq vs qat for llms ptq dominates — all the methods above are post-training; they need only a small calibration set (a few hundred sequences). cheap, no gradients. full qat is rare — too expensive at llm scale. the practical stand-in is qlora : freeze a 4-bit (nf4) base, train small lora adapters in higher precision on top. you get qat-like task recovery for a tiny fraction of the cost — and you can serve the base once and hot-swap adapters. distillation is bigger than in cv — small strong models are often distilled from large ones, then quantized. measuring quality (don't say \"accuracy\") perplexity on held-out text (e.g. wikitext) — cheap, sensitive first check. downstream benchmarks — mmlu (knowledge), gsm8k (reasoning), humaneval (code), etc., via lm-evaluation-harness . a 4-bit model can hold perplexity but drop on reasoning, so test the tasks you care about. watch long-context and reasoning — these degrade first under aggressive quantization. 🔗 connecting the dots — the real stack autogptq , autoawq , llama.cpp/gguf (k-quants, cpu/edge), bitsandbytes (nf4/8-bit, qlora) for weight-only; nvidia tensorrt-model-optimizer and tensorrt-llm for smoothquant/fp8/int8 and kv-cache quant; lm-evaluation-harness for quality. how you'd say it: \"for a vram-bound deployment i'd awq or gptq the weights to group-wise int4 and quantize the kv cache to fp8; for a throughput-bound one on hopper i'd go fp8 weight+activation via tensorrt-llm. either way i validate on perplexity plus the task benchmarks i actually care about, because 4-bit can pass perplexity and still lose reasoning.\" self-check weight-only vs weight+activation — which bottleneck does each attack? *(weight-only → memory/decode; weight+activation → compute/prefill, but needs outlier handling.)* what problem do smoothquant and awq solve, and how differently? *(activation outliers; smoothquant shifts difficulty into weights for w8a8, awq protects salient weight channels for int4.)* what's group-wise quantization? *(a scale per group of n weights, e.g. 128 — finer than per-channel, the accuracy knob for int4.)* why quantize the kv cache, and what does it buy? *(it can exceed the weights at long context; int8/fp8 halves it → longer context / bigger batch.)* qat's practical replacement at llm scale? (qlora — lora adapters on a frozen 4-bit base.)","words":777},{"path":"13-llm-vlm-optimization/llm-opt-in-practice.md","title":"The Loop in Practice","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"the-loop-in-practice\">The Loop in Practice<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The same pipeline shape as your notebook — baseline → quantize → serve → compare — but with LLM tools and LLM metrics. Baseline FP16, then produce INT4 (AWQ/GPTQ), FP8, and KV-quant variants, serve each on TensorRT-LLM / vLLM / llama.cpp, and compare on <strong>quality (perplexity + benchmarks)<\/strong>, <strong>TTFT<\/strong>, <strong>tokens/sec<\/strong>, and <strong>VRAM<\/strong>. This page is the concrete recipe.<\/div><\/div>\n<h2 id=\"the-pipeline-side-by-side-with-your-cnn-project\">The pipeline, side by side with your CNN project<\/h2>\n<pre><code>  Your CNN notebook              LLM version\n  ─────────────────              ─────────────────\n  train FP32                     start from a pretrained FP16 checkpoint (no training)\n  PTQ / QAT (fbgemm)             AWQ / GPTQ (weight-only) · SmoothQuant / FP8 (w+a)\n  TensorRT INT8 / FP16           TensorRT-LLM engine · vLLM · llama.cpp (GGUF)\n  evaluate: top-1, latency       evaluate: perplexity + MMLU, TTFT, tokens/sec, VRAM\n  MLflow compare table           same — track every variant<\/code><\/pre>\n<p>You don't train — you take a released checkpoint and <strong>optimize<\/strong> it. That's the norm for LLMs and a fine thing to say.<\/p>\n<h2 id=\"step-1-baseline\">Step 1 — baseline<\/h2>\n<p>Load the FP16 model, run your eval harness, record <strong>perplexity<\/strong>, a task benchmark or two, <strong>TTFT<\/strong> (time to first token = prefill latency), <strong>TPOT<\/strong> (time per output token = decode latency), <strong>throughput<\/strong> (tokens/sec at your batch size), and <strong>peak VRAM<\/strong>. This is your reference row — the equivalent of your FP32 baseline.<\/p>\n<h2 id=\"step-2-quantize-produce-the-variants\">Step 2 — quantize (produce the variants)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Variant<\/th><th>Tool<\/th><th>One line<\/th><\/tr><\/thead><tbody><tr><td><strong>W4 INT4 (weight-only)<\/strong><\/td><td>AutoAWQ / AutoGPTQ<\/td><td>calibrate on a few hundred sequences → 4-bit weights<\/td><\/tr><tr><td><strong>GGUF Q4_K_M<\/strong><\/td><td>llama.cpp<\/td><td>group-wise k-quant; great for CPU/edge/local<\/td><\/tr><tr><td><strong>NF4 + QLoRA<\/strong><\/td><td>bitsandbytes + peft<\/td><td>4-bit base, train LoRA adapters if you need task recovery<\/td><\/tr><tr><td><strong>FP8 / W8A8<\/strong><\/td><td>TensorRT-Model-Optimizer<\/td><td>SmoothQuant/FP8 calibration for Hopper/Ada<\/td><\/tr><tr><td><strong>KV-cache INT8/FP8<\/strong><\/td><td>TensorRT-LLM / vLLM flag<\/td><td>halve the cache → longer ctx / bigger batch<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Each needs a small <strong>calibration set<\/strong> (representative prompts) — the LLM analog of your PTQ calibration batches.<\/p>\n<h2 id=\"step-3-serve-the-engine-axis\">Step 3 — serve (the engine axis)<\/h2>\n<ul><li><strong>TensorRT-LLM<\/strong> — NVIDIA's LLM runtime: build an engine (fused kernels, FP8, in-flight<\/li><\/ul>\n<p>batching), serve via Triton. Best latency/throughput on NVIDIA GPUs. The direct heir to your   TensorRT step.<\/p>\n<ul><li><strong>vLLM<\/strong> — PagedAttention + continuous batching; easiest high-throughput serving, great<\/li><\/ul>\n<p>default for experiments.<\/p>\n<ul><li><strong>llama.cpp<\/strong> — GGUF models on CPU/edge/Apple Silicon; how you'd run locally.<\/li><li>Mechanics (KV cache, paged attention, in-flight batching, TP/PP) are in<\/li><\/ul>\n<p><a class=\"mdlink\" data-href=\"../12-nvidia-model-optimization/llm-inference.md\" href=\"#\">§12 LLM Inference<\/a> — cross-reference, don't   re-derive.<\/p>\n<h2 id=\"step-4-the-compare-table-what-to-actually-measure\">Step 4 — the compare table (what to actually measure)<\/h2>\n<p>LLM latency is <strong>two numbers<\/strong>, so your table grows columns:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Variant<\/th><th>Perplexity ↓<\/th><th>MMLU ↑<\/th><th>TTFT (ms)<\/th><th>Tokens/s ↑<\/th><th>VRAM (GB) ↓<\/th><th>Engine<\/th><\/tr><\/thead><tbody><tr><td>FP16 baseline<\/td><td>ref<\/td><td>ref<\/td><td>ref<\/td><td>ref<\/td><td>ref<\/td><td>HF / vLLM<\/td><\/tr><tr><td>AWQ INT4<\/td><td>~=<\/td><td>~=<\/td><td>↓<\/td><td>↑ (decode)<\/td><td><strong>↓↓<\/strong><\/td><td>vLLM / TRT-LLM<\/td><\/tr><tr><td>FP8 (w+a)<\/td><td>~=<\/td><td>~=<\/td><td><strong>↓↓<\/strong><\/td><td>↑↑<\/td><td>↓<\/td><td>TRT-LLM<\/td><\/tr><tr><td>+ KV INT8<\/td><td>~=<\/td><td>~=<\/td><td>=<\/td><td>=<\/td><td>↓ (longer ctx)<\/td><td>TRT-LLM<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The instinct to voice: <strong>INT4 wins on memory and decode; FP8 wins on prefill/throughput; KV quant buys context length<\/strong> — and you <em>measure the quality cost of each<\/em>, exactly like your CNN compare table.<\/p>\n<h2 id=\"measuring-latency-correctly-llm-version\">Measuring latency correctly (LLM version)<\/h2>\n<p>Same async-GPU discipline as your CNN, plus LLM specifics: <strong>warm up<\/strong>, separate <strong>prefill (TTFT)<\/strong> from <strong>decode (TPOT)<\/strong>, sweep <strong>batch size and sequence length<\/strong> (throughput is meaningless without them), and report <strong>p50/p99<\/strong>. <code>trtllm-bench<\/code> / <code>genai-perf<\/code> (NVIDIA) or vLLM's benchmark scripts do this properly — the analog of your <code>benchmark_latency<\/code>.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Quantize: <strong>AutoAWQ / AutoGPTQ / bitsandbytes / llama.cpp / TensorRT-Model-Optimizer<\/strong>. Serve: <strong>TensorRT-LLM (+Triton) / vLLM / TGI / llama.cpp<\/strong>. Evaluate: <strong>lm-evaluation-harness<\/strong>, <strong>genai-perf / trtllm-bench<\/strong>. Track: <strong>MLflow / Weights &amp; Biases<\/strong>, same as your project.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I'd keep the exact structure of my CNN experiment — baseline, a few quantized variants, one compare table, everything tracked. The variants become AWQ-INT4, FP8, and KV-quant; the engine becomes TensorRT-LLM or vLLM; and the columns become perplexity, a task benchmark, TTFT, tokens/sec, and VRAM.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why is there no training step in the LLM loop? *(you optimize a released pretrained<\/li><\/ul>\n<p>checkpoint; PTQ/weight-only needs no retraining.)*<\/p>\n<ul><li>Why does an LLM report two latencies? *(prefill/TTFT is compute-bound; decode/TPOT is<\/li><\/ul>\n<p>memory-bound — different optimizations, measured separately.)*<\/p>\n<ul><li>Which variant would you pick to fit a big model in limited VRAM? *(weight-only INT4 (AWQ/GPTQ)<ul><li>KV-cache quant.)*<\/li><\/ul><\/li><li>What replaces <code>top-1<\/code> and <code>benchmark_latency<\/code> from your notebook? *(perplexity + task<\/li><\/ul>\n<p>benchmarks via lm-eval-harness; genai-perf/trtllm-bench for TTFT &amp; tokens/sec.)*<\/p>","toc":[{"level":2,"id":"the-pipeline-side-by-side-with-your-cnn-project","text":"The pipeline, side by side with your CNN project"},{"level":2,"id":"step-1-baseline","text":"Step 1 — baseline"},{"level":2,"id":"step-2-quantize-produce-the-variants","text":"Step 2 — quantize (produce the variants)"},{"level":2,"id":"step-3-serve-the-engine-axis","text":"Step 3 — serve (the engine axis)"},{"level":2,"id":"step-4-the-compare-table-what-to-actually-measure","text":"Step 4 — the compare table (what to actually measure)"},{"level":2,"id":"measuring-latency-correctly-llm-version","text":"Measuring latency correctly (LLM version)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"the loop in practice 💡 tl;dr the same pipeline shape as your notebook — baseline → quantize → serve → compare — but with llm tools and llm metrics. baseline fp16, then produce int4 (awq/gptq), fp8, and kv-quant variants, serve each on tensorrt-llm / vllm / llama.cpp, and compare on quality (perplexity + benchmarks) , ttft , tokens/sec , and vram . this page is the concrete recipe. the pipeline, side by side with your cnn project your cnn notebook llm version ───────────────── ───────────────── train fp32 start from a pretrained fp16 checkpoint (no training) ptq / qat (fbgemm) awq / gptq (weight-only) · smoothquant / fp8 (w+a) tensorrt int8 / fp16 tensorrt-llm engine · vllm · llama.cpp (gguf) evaluate: top-1, latency evaluate: perplexity + mmlu, ttft, tokens/sec, vram mlflow compare table same — track every variant you don't train — you take a released checkpoint and optimize it. that's the norm for llms and a fine thing to say. step 1 — baseline load the fp16 model, run your eval harness, record perplexity , a task benchmark or two, ttft (time to first token = prefill latency), tpot (time per output token = decode latency), throughput (tokens/sec at your batch size), and peak vram . this is your reference row — the equivalent of your fp32 baseline. step 2 — quantize (produce the variants) variant tool one line w4 int4 (weight-only) autoawq / autogptq calibrate on a few hundred sequences → 4-bit weights gguf q4_k_m llama.cpp group-wise k-quant; great for cpu/edge/local nf4 + qlora bitsandbytes + peft 4-bit base, train lora adapters if you need task recovery fp8 / w8a8 tensorrt-model-optimizer smoothquant/fp8 calibration for hopper/ada kv-cache int8/fp8 tensorrt-llm / vllm flag halve the cache → longer ctx / bigger batch each needs a small calibration set (representative prompts) — the llm analog of your ptq calibration batches. step 3 — serve (the engine axis) tensorrt-llm — nvidia's llm runtime: build an engine (fused kernels, fp8, in-flight batching), serve via triton. best latency/throughput on nvidia gpus. the direct heir to your tensorrt step. vllm — pagedattention + continuous batching; easiest high-throughput serving, great default for experiments. llama.cpp — gguf models on cpu/edge/apple silicon; how you'd run locally. mechanics (kv cache, paged attention, in-flight batching, tp/pp) are in §12 llm inference — cross-reference, don't re-derive. step 4 — the compare table (what to actually measure) llm latency is two numbers , so your table grows columns: variant perplexity ↓ mmlu ↑ ttft (ms) tokens/s ↑ vram (gb) ↓ engine fp16 baseline ref ref ref ref ref hf / vllm awq int4 ~= ~= ↓ ↑ (decode) ↓↓ vllm / trt-llm fp8 (w+a) ~= ~= ↓↓ ↑↑ ↓ trt-llm + kv int8 ~= ~= = = ↓ (longer ctx) trt-llm the instinct to voice: int4 wins on memory and decode; fp8 wins on prefill/throughput; kv quant buys context length — and you measure the quality cost of each , exactly like your cnn compare table. measuring latency correctly (llm version) same async-gpu discipline as your cnn, plus llm specifics: warm up , separate prefill (ttft) from decode (tpot) , sweep batch size and sequence length (throughput is meaningless without them), and report p50/p99 . trtllm-bench / genai-perf (nvidia) or vllm's benchmark scripts do this properly — the analog of your benchmark_latency . 🔗 connecting the dots — the real stack quantize: autoawq / autogptq / bitsandbytes / llama.cpp / tensorrt-model-optimizer . serve: tensorrt-llm (+triton) / vllm / tgi / llama.cpp . evaluate: lm-evaluation-harness , genai-perf / trtllm-bench . track: mlflow / weights & biases , same as your project. how you'd say it: \"i'd keep the exact structure of my cnn experiment — baseline, a few quantized variants, one compare table, everything tracked. the variants become awq-int4, fp8, and kv-quant; the engine becomes tensorrt-llm or vllm; and the columns become perplexity, a task benchmark, ttft, tokens/sec, and vram.\" self-check why is there no training step in the llm loop? *(you optimize a released pretrained checkpoint; ptq/weight-only needs no retraining.)* why does an llm report two latencies? *(prefill/ttft is compute-bound; decode/tpot is memory-bound — different optimizations, measured separately.)* which variant would you pick to fit a big model in limited vram? *(weight-only int4 (awq/gptq) kv-cache quant.)* what replaces top-1 and benchmark_latency from your notebook? *(perplexity + task benchmarks via lm-eval-harness; genai-perf/trtllm-bench for ttft & tokens/sec.)*","words":721},{"path":"13-llm-vlm-optimization/vlm-optimization.md","title":"VLM Optimization","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"vlm-optimization\">VLM Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A vision-language model is <strong>a vision encoder + a projector + an LLM decoder<\/strong> — so optimizing it is <em>your CNN skills for the vision tower<\/em> plus <em>LLM tricks for the decoder<\/em>. The VLM-specific catch: images turn into <strong>hundreds to thousands of tokens<\/strong>, so <strong>prefill and the KV cache blow up<\/strong>, and the single biggest lever is <strong>reducing visual tokens<\/strong>. This is your strongest bridge page — it uses both halves of your experience.<\/div><\/div>\n<h2 id=\"the-architecture-know-the-three-stages\">The architecture (know the three stages)<\/h2>\n<pre><code>  image ─▶ [Vision Encoder]  ─▶ [Projector] ─▶ image tokens ┐\n                (ViT / CLIP)      (MLP/resampler)            ├─▶ [LLM Decoder] ─▶ text\n  text  ───────────────────────────────────────▶ text tokens ┘<\/code><\/pre>\n<ul><li><strong>Vision encoder<\/strong> — a <strong>ViT (or CNN)<\/strong> that turns the image into patch embeddings. Runs<\/li><\/ul>\n<p><strong>once per image<\/strong>. <em>This is exactly the kind of model you already optimized.<\/em><\/p>\n<ul><li><strong>Projector<\/strong> — a small MLP or resampler mapping vision features into the LLM's token space.<\/li><\/ul>\n<p>Tiny; negligible cost.<\/p>\n<ul><li><strong>LLM decoder<\/strong> — a standard LLM that attends over image + text tokens and generates. **All<\/li><\/ul>\n<p>of <a class=\"mdlink\" data-href=\"llm-quantization.md\" href=\"#\">§13's LLM pages<\/a> apply here.**<\/p>\n<p>Examples: LLaVA, Qwen-VL, InternVL, Llama-Vision. Same shape, different sizes.<\/p>\n<h2 id=\"where-the-cost-actually-is-the-key-insight\">Where the cost actually is (the key insight)<\/h2>\n<p><strong>Images become a lot of tokens.<\/strong> One image can be ~256–576 tokens, and <strong>high-resolution tiling<\/strong> (splitting a big image into tiles) pushes it into the <strong>thousands<\/strong>. Because those tokens all go into the decoder's prefill and KV cache:<\/p>\n<ul><li><strong>Prefill dominates<\/strong> — TTFT is driven by processing a huge image-token sequence, not by the<\/li><\/ul>\n<p>short text prompt. VLMs are often <strong>prefill-heavy<\/strong>, unlike text LLMs.<\/p>\n<ul><li><strong>KV cache is large<\/strong> — proportional to those image tokens, so long conversations with images<\/li><\/ul>\n<p>get memory-hungry fast.<\/p>\n<ul><li><strong>Vision encoder is a one-time cost<\/strong> per image — meaningful but not the tail if you generate<\/li><\/ul>\n<p>many tokens.<\/p>\n<p>So the cost profile is different from a text LLM: <strong>attack the image tokens first.<\/strong><\/p>\n<h2 id=\"optimize-each-stage\">Optimize each stage<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Lever<\/th><th>Notes<\/th><\/tr><\/thead><tbody><tr><td><strong>Vision encoder<\/strong><\/td><td>INT8/FP8 quantize it<\/td><td>It's a ViT/CNN — <em>your FashionMNIST playbook<\/em>: PTQ, per-channel, calibrate, TensorRT. Runs once/image.<\/td><\/tr><tr><td><strong>Visual tokens<\/strong><\/td><td><strong>token reduction<\/strong> (pooling, pruning, merging)<\/td><td><strong>The VLM-specific big win<\/strong> — fewer image tokens = shorter prefill + smaller KV.<\/td><\/tr><tr><td><strong>Projector<\/strong><\/td><td>ignore<\/td><td>Too small to matter.<\/td><\/tr><tr><td><strong>LLM decoder<\/strong><\/td><td>weight-only INT4 / FP8 / KV-quant<\/td><td>Same as any LLM (<a class=\"mdlink\" data-href=\"llm-quantization.md\" href=\"#\">quant page<\/a>).<\/td><\/tr><tr><td><strong>Whole pipeline<\/strong><\/td><td>cache image features<\/td><td>Same image reused across turns → encode once, reuse tokens.<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"visual-token-reduction-say-this-one\">Visual token reduction (say this one)<\/h2>\n<p>The highest-leverage VLM-only optimization: <strong>cut the number of image tokens<\/strong> before/at the decoder. Methods — adaptive <strong>pooling<\/strong> of patch embeddings, <strong>pruning<\/strong> low-attention visual tokens, <strong>merging<\/strong> similar tokens (à la ToMe), or a <strong>resampler<\/strong> (Q-Former/Perceiver) that compresses to a fixed small count. Halving image tokens roughly halves prefill cost and KV memory with modest quality loss. <em>\"On a VLM, before I quantize anything I'd check whether I can halve the visual tokens — it hits the actual bottleneck, prefill and KV, harder than quantizing the decoder.\"<\/em><\/p>\n<h2 id=\"whats-different-from-a-plain-llm\">What's different from a plain LLM<\/h2>\n<ul><li><strong>Prefill-heavy, not decode-heavy<\/strong> for short answers → optimize prefill (token reduction,<\/li><\/ul>\n<p>FP8 weight+activation), not just decode.<\/p>\n<ul><li><strong>Vision tower is quantizable with CV methods<\/strong> — the part where *your CNN experience is<\/li><\/ul>\n<p>directly the answer*.<\/p>\n<ul><li><strong>Dynamic resolution / tiling<\/strong> → variable, often large, token counts → dynamic-shape engines<\/li><\/ul>\n<p>matter even more.<\/p>\n<ul><li><strong>Two calibration domains<\/strong> — the vision encoder wants image calibration data; the decoder<\/li><\/ul>\n<p>wants text/multimodal calibration.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Vision tower: <strong>TensorRT<\/strong> INT8/FP8 (your CV toolchain). Decoder: <strong>TensorRT-LLM / vLLM<\/strong> with AWQ/FP8 + KV-quant. Multimodal serving increasingly handled by <strong>vLLM<\/strong> and <strong>TensorRT-LLM<\/strong>'s multimodal paths; token reduction lives in the model/adapter code.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"A VLM is a vision encoder feeding an LLM decoder. The encoder I'd quantize like the CNN in my FashionMNIST project — INT8, per-channel, TensorRT. The decoder I'd treat as an LLM — AWQ INT4 or FP8 with KV-cache quant. But the first thing I'd check is visual token reduction, because image tokens drive prefill and KV, which is where VLM latency actually lives.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What are a VLM's three stages and which dominates latency? *(vision encoder → projector → LLM<\/li><\/ul>\n<p>decoder; image tokens make <strong>prefill<\/strong> (and KV) dominate.)*<\/p>\n<ul><li>Which part maps directly to your CNN experience? *(the vision encoder — a ViT/CNN you quantize<\/li><\/ul>\n<p>with the same PTQ/TensorRT playbook.)*<\/p>\n<ul><li>What's the VLM-specific optimization with no LLM/CNN analog? *(visual token reduction —<\/li><\/ul>\n<p>pool/prune/merge image tokens to shrink prefill + KV.)*<\/p>\n<ul><li>Why are VLMs often prefill-heavy? *(one image = hundreds–thousands of tokens processed up<\/li><\/ul>\n<p>front, dwarfing a short text prompt and a short answer.)*<\/p>","toc":[{"level":2,"id":"the-architecture-know-the-three-stages","text":"The architecture (know the three stages)"},{"level":2,"id":"where-the-cost-actually-is-the-key-insight","text":"Where the cost actually is (the key insight)"},{"level":2,"id":"optimize-each-stage","text":"Optimize each stage"},{"level":2,"id":"visual-token-reduction-say-this-one","text":"Visual token reduction (say this one)"},{"level":2,"id":"whats-different-from-a-plain-llm","text":"What's different from a plain LLM"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"vlm optimization 💡 tl;dr a vision-language model is a vision encoder + a projector + an llm decoder — so optimizing it is your cnn skills for the vision tower plus llm tricks for the decoder . the vlm-specific catch: images turn into hundreds to thousands of tokens , so prefill and the kv cache blow up , and the single biggest lever is reducing visual tokens . this is your strongest bridge page — it uses both halves of your experience. the architecture (know the three stages) image ─▶ [vision encoder] ─▶ [projector] ─▶ image tokens ┐ (vit / clip) (mlp/resampler) ├─▶ [llm decoder] ─▶ text text ───────────────────────────────────────▶ text tokens ┘ vision encoder — a vit (or cnn) that turns the image into patch embeddings. runs once per image . this is exactly the kind of model you already optimized. projector — a small mlp or resampler mapping vision features into the llm's token space. tiny; negligible cost. llm decoder — a standard llm that attends over image + text tokens and generates. **all of §13's llm pages apply here.** examples: llava, qwen-vl, internvl, llama-vision. same shape, different sizes. where the cost actually is (the key insight) images become a lot of tokens. one image can be ~256–576 tokens, and high-resolution tiling (splitting a big image into tiles) pushes it into the thousands . because those tokens all go into the decoder's prefill and kv cache: prefill dominates — ttft is driven by processing a huge image-token sequence, not by the short text prompt. vlms are often prefill-heavy , unlike text llms. kv cache is large — proportional to those image tokens, so long conversations with images get memory-hungry fast. vision encoder is a one-time cost per image — meaningful but not the tail if you generate many tokens. so the cost profile is different from a text llm: attack the image tokens first. optimize each stage stage lever notes vision encoder int8/fp8 quantize it it's a vit/cnn — your fashionmnist playbook : ptq, per-channel, calibrate, tensorrt. runs once/image. visual tokens token reduction (pooling, pruning, merging) the vlm-specific big win — fewer image tokens = shorter prefill + smaller kv. projector ignore too small to matter. llm decoder weight-only int4 / fp8 / kv-quant same as any llm ( quant page ). whole pipeline cache image features same image reused across turns → encode once, reuse tokens. visual token reduction (say this one) the highest-leverage vlm-only optimization: cut the number of image tokens before/at the decoder. methods — adaptive pooling of patch embeddings, pruning low-attention visual tokens, merging similar tokens (à la tome), or a resampler (q-former/perceiver) that compresses to a fixed small count. halving image tokens roughly halves prefill cost and kv memory with modest quality loss. \"on a vlm, before i quantize anything i'd check whether i can halve the visual tokens — it hits the actual bottleneck, prefill and kv, harder than quantizing the decoder.\" what's different from a plain llm prefill-heavy, not decode-heavy for short answers → optimize prefill (token reduction, fp8 weight+activation), not just decode. vision tower is quantizable with cv methods — the part where *your cnn experience is directly the answer*. dynamic resolution / tiling → variable, often large, token counts → dynamic-shape engines matter even more. two calibration domains — the vision encoder wants image calibration data; the decoder wants text/multimodal calibration. 🔗 connecting the dots — the real stack vision tower: tensorrt int8/fp8 (your cv toolchain). decoder: tensorrt-llm / vllm with awq/fp8 + kv-quant. multimodal serving increasingly handled by vllm and tensorrt-llm 's multimodal paths; token reduction lives in the model/adapter code. how you'd say it: \"a vlm is a vision encoder feeding an llm decoder. the encoder i'd quantize like the cnn in my fashionmnist project — int8, per-channel, tensorrt. the decoder i'd treat as an llm — awq int4 or fp8 with kv-cache quant. but the first thing i'd check is visual token reduction, because image tokens drive prefill and kv, which is where vlm latency actually lives.\" self-check what are a vlm's three stages and which dominates latency? *(vision encoder → projector → llm decoder; image tokens make prefill (and kv) dominate.)* which part maps directly to your cnn experience? *(the vision encoder — a vit/cnn you quantize with the same ptq/tensorrt playbook.)* what's the vlm-specific optimization with no llm/cnn analog? *(visual token reduction — pool/prune/merge image tokens to shrink prefill + kv.)* why are vlms often prefill-heavy? *(one image = hundreds–thousands of tokens processed up front, dwarfing a short text prompt and a short answer.)*","words":759},{"path":"13-llm-vlm-optimization/experiment-redo.md","title":"Experiment Redo (Your Project as LLM/VLM)","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"experiment-redo-your-project-as-an-llmvlm\">Experiment Redo — Your Project as an LLM/VLM<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Take the exact structure of your FashionMNIST notebook and re-cast it for an LLM, then a VLM. Same skeleton — baseline, quantized variants, one compare table, everything tracked — with LLM metrics and tools swapped in. This is the \"walk me through how you'd apply your project to <em>our<\/em> models\" answer.<\/div><\/div>\n<h2 id=\"the-one-sentence-pitch\">The one-sentence pitch<\/h2>\n<blockquote><p>\"My project proved I can run the full optimization loop and reason about method vs engine on a CNN. The same loop applies to an LLM — I'd swap PTQ/QAT for AWQ-INT4 and FP8, TensorRT for TensorRT-LLM, and top-1 for perplexity and tokens/sec — and a VLM is just my CNN skills on the vision tower plus that LLM loop on the decoder.\"<\/p><\/blockquote>\n<h2 id=\"llm-redo-the-compare-table\">LLM redo — the compare table<\/h2>\n<p>Keep your six-row idea; change the axes. Baseline FP16, then walk method × engine:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Variant<\/th><th>Method<\/th><th>Engine<\/th><th>Quality (PPL / MMLU)<\/th><th>TTFT<\/th><th>Tokens/s<\/th><th>VRAM<\/th><\/tr><\/thead><tbody><tr><td>FP16<\/td><td>—<\/td><td>vLLM<\/td><td>reference<\/td><td>ref<\/td><td>ref<\/td><td>ref<\/td><\/tr><tr><td><strong>AWQ INT4<\/strong><\/td><td>weight-only PTQ<\/td><td>vLLM / TRT-LLM<\/td><td>≈ baseline<\/td><td>↓<\/td><td>↑ decode<\/td><td><strong>↓↓<\/strong><\/td><\/tr><tr><td><strong>GPTQ INT4<\/strong><\/td><td>weight-only PTQ<\/td><td>TRT-LLM<\/td><td>≈ baseline<\/td><td>↓<\/td><td>↑<\/td><td>↓↓<\/td><\/tr><tr><td><strong>FP8 (W+A)<\/strong><\/td><td>calibrated PTQ<\/td><td>TRT-LLM<\/td><td>≈ baseline<\/td><td><strong>↓↓<\/strong><\/td><td>↑↑<\/td><td>↓<\/td><\/tr><tr><td><strong>+ KV INT8<\/strong><\/td><td>cache quant<\/td><td>TRT-LLM<\/td><td>≈ baseline<\/td><td>=<\/td><td>=<\/td><td>↓ (longer ctx)<\/td><\/tr><tr><td><strong>QLoRA-tuned INT4<\/strong><\/td><td>adapter \"QAT\"<\/td><td>vLLM<\/td><td>↑ on your task<\/td><td>↓<\/td><td>↑<\/td><td>↓↓<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Direct analogies to your notebook:<\/strong><\/p>\n<ul><li>FP16 baseline ↔ your FP32 baseline.<\/li><li>AWQ/GPTQ INT4 ↔ your PTQ (calibrate, don't retrain) — but weight-only, because decode is<\/li><\/ul>\n<p>memory-bound.<\/p>\n<ul><li>FP8/W8A8 via SmoothQuant ↔ your TensorRT INT8, with outlier handling added.<\/li><li>QLoRA ↔ your QAT — the \"actually adjust weights\" row, but cheap (adapters on a frozen base).<\/li><li>The <code>device<\/code> column that stopped CPU-INT8 being misread ↔ here, label the <strong>engine<\/strong> and<\/li><\/ul>\n<p><strong>batch/seq length<\/strong>, since tokens/sec is meaningless without them.<\/p>\n<h2 id=\"what-carries-over-verbatim-from-your-project\">What carries over verbatim from your project<\/h2>\n<ul><li><strong>Method vs engine separation<\/strong> — AWQ (method) vs TensorRT-LLM (engine) is your PTQ-vs-<\/li><\/ul>\n<p>TensorRT insight, unchanged.<\/p>\n<ul><li><strong>\"Speed comes from kernels, not weight values\"<\/strong> — TRT-LLM engines for two INT4 methods run<\/li><\/ul>\n<p>the same kernels; quality differs, latency doesn't. Exactly your TRT-PTQ vs TRT-QAT finding.<\/p>\n<ul><li><strong>Calibration is a clipping decision<\/strong> — AWQ's salient-channel scaling and FP8's per-tensor<\/li><\/ul>\n<p>scaling are the same \"pick the range well\" problem as your entropy calibrator.<\/p>\n<ul><li><strong>Measure everything, trust nothing<\/strong> — same MLflow discipline; more columns.<\/li><\/ul>\n<h2 id=\"what-youd-deliberately-change\">What you'd deliberately change<\/h2>\n<ul><li><strong>Metric:<\/strong> perplexity + a task benchmark (lm-eval-harness), not top-1.<\/li><li><strong>Two latencies:<\/strong> TTFT and per-token, swept over batch/seq — not one number.<\/li><li><strong>No training:<\/strong> start from a checkpoint; QLoRA is the only \"training,\" and it's tiny.<\/li><li><strong>New axis:<\/strong> KV-cache precision — a lever your CNN never had.<\/li><\/ul>\n<h2 id=\"vlm-redo-add-two-rows\">VLM redo — add two rows<\/h2>\n<p>A VLM table = the LLM table <strong>plus<\/strong> the vision side (your home turf):<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Extra variant<\/th><th>What it targets<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td><strong>INT8 vision encoder<\/strong><\/td><td>the ViT/CNN tower<\/td><td><em>Your FashionMNIST playbook<\/em> — PTQ, per-channel, TensorRT; runs once/image<\/td><\/tr><tr><td><strong>Visual token reduction<\/strong><\/td><td>image-token count<\/td><td>Shrinks prefill + KV — the VLM-specific biggest win<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Then the decoder rows are identical to the LLM table above. The story writes itself: <em>\"I optimize the vision tower the way I optimized my CNN, the decoder the way I'd optimize an LLM, and I add token reduction because image tokens are where VLM latency actually lives.\"<\/em><\/p>\n<h2 id=\"the-90-second-spoken-version\">The 90-second spoken version<\/h2>\n<blockquote><p>\"Same experiment, three model types. FashionMNIST CNN: FP32 → PTQ/QAT/INT8/FP16 on TensorRT, compared on top-1 and latency — that's done. For an LLM I keep the skeleton but the winning variants change: AWQ or GPTQ weight-only INT4 because decode is memory-bound, FP8 for prefill throughput, KV-cache quant for context length, QLoRA where I need task recovery — served on TensorRT-LLM or vLLM, judged on perplexity, MMLU, TTFT, and tokens/sec. A VLM is both: I quantize the vision encoder with my CNN toolchain, treat the decoder as an LLM, and reduce visual tokens first because that's where prefill and KV cost live. One loop, three model families, and I can name why each variant wins.\"<\/p><\/blockquote>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Map each row of your FashionMNIST table to its LLM equivalent. *(FP32→FP16; PTQ→AWQ/GPTQ<\/li><\/ul>\n<p>INT4; TRT-INT8→FP8/SmoothQuant; QAT→QLoRA; device col→engine+batch/seq.)*<\/p>\n<ul><li>Which of your project's findings transfers <em>word for word<\/em>? *(\"speed comes from the kernels,<\/li><\/ul>\n<p>not the weight values\" — same-kernel engines differ in quality, not latency.)*<\/p>\n<ul><li>What two rows does a VLM add, and which uses your CNN skills? *(INT8 vision encoder — CNN<\/li><\/ul>\n<p>skills — and visual token reduction.)*<\/p>","toc":[{"level":2,"id":"the-one-sentence-pitch","text":"The one-sentence pitch"},{"level":2,"id":"llm-redo-the-compare-table","text":"LLM redo — the compare table"},{"level":2,"id":"what-carries-over-verbatim-from-your-project","text":"What carries over verbatim from your project"},{"level":2,"id":"what-youd-deliberately-change","text":"What you'd deliberately change"},{"level":2,"id":"vlm-redo-add-two-rows","text":"VLM redo — add two rows"},{"level":2,"id":"the-90-second-spoken-version","text":"The 90-second spoken version"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"experiment redo — your project as an llm/vlm 💡 tl;dr take the exact structure of your fashionmnist notebook and re-cast it for an llm, then a vlm. same skeleton — baseline, quantized variants, one compare table, everything tracked — with llm metrics and tools swapped in. this is the \"walk me through how you'd apply your project to our models\" answer. the one-sentence pitch \"my project proved i can run the full optimization loop and reason about method vs engine on a cnn. the same loop applies to an llm — i'd swap ptq/qat for awq-int4 and fp8, tensorrt for tensorrt-llm, and top-1 for perplexity and tokens/sec — and a vlm is just my cnn skills on the vision tower plus that llm loop on the decoder.\" llm redo — the compare table keep your six-row idea; change the axes. baseline fp16, then walk method × engine: variant method engine quality (ppl / mmlu) ttft tokens/s vram fp16 — vllm reference ref ref ref awq int4 weight-only ptq vllm / trt-llm ≈ baseline ↓ ↑ decode ↓↓ gptq int4 weight-only ptq trt-llm ≈ baseline ↓ ↑ ↓↓ fp8 (w+a) calibrated ptq trt-llm ≈ baseline ↓↓ ↑↑ ↓ + kv int8 cache quant trt-llm ≈ baseline = = ↓ (longer ctx) qlora-tuned int4 adapter \"qat\" vllm ↑ on your task ↓ ↑ ↓↓ direct analogies to your notebook: fp16 baseline ↔ your fp32 baseline. awq/gptq int4 ↔ your ptq (calibrate, don't retrain) — but weight-only, because decode is memory-bound. fp8/w8a8 via smoothquant ↔ your tensorrt int8, with outlier handling added. qlora ↔ your qat — the \"actually adjust weights\" row, but cheap (adapters on a frozen base). the device column that stopped cpu-int8 being misread ↔ here, label the engine and batch/seq length , since tokens/sec is meaningless without them. what carries over verbatim from your project method vs engine separation — awq (method) vs tensorrt-llm (engine) is your ptq-vs- tensorrt insight, unchanged. \"speed comes from kernels, not weight values\" — trt-llm engines for two int4 methods run the same kernels; quality differs, latency doesn't. exactly your trt-ptq vs trt-qat finding. calibration is a clipping decision — awq's salient-channel scaling and fp8's per-tensor scaling are the same \"pick the range well\" problem as your entropy calibrator. measure everything, trust nothing — same mlflow discipline; more columns. what you'd deliberately change metric: perplexity + a task benchmark (lm-eval-harness), not top-1. two latencies: ttft and per-token, swept over batch/seq — not one number. no training: start from a checkpoint; qlora is the only \"training,\" and it's tiny. new axis: kv-cache precision — a lever your cnn never had. vlm redo — add two rows a vlm table = the llm table plus the vision side (your home turf): extra variant what it targets why int8 vision encoder the vit/cnn tower your fashionmnist playbook — ptq, per-channel, tensorrt; runs once/image visual token reduction image-token count shrinks prefill + kv — the vlm-specific biggest win then the decoder rows are identical to the llm table above. the story writes itself: \"i optimize the vision tower the way i optimized my cnn, the decoder the way i'd optimize an llm, and i add token reduction because image tokens are where vlm latency actually lives.\" the 90-second spoken version \"same experiment, three model types. fashionmnist cnn: fp32 → ptq/qat/int8/fp16 on tensorrt, compared on top-1 and latency — that's done. for an llm i keep the skeleton but the winning variants change: awq or gptq weight-only int4 because decode is memory-bound, fp8 for prefill throughput, kv-cache quant for context length, qlora where i need task recovery — served on tensorrt-llm or vllm, judged on perplexity, mmlu, ttft, and tokens/sec. a vlm is both: i quantize the vision encoder with my cnn toolchain, treat the decoder as an llm, and reduce visual tokens first because that's where prefill and kv cost live. one loop, three model families, and i can name why each variant wins.\" self-check map each row of your fashionmnist table to its llm equivalent. *(fp32→fp16; ptq→awq/gptq int4; trt-int8→fp8/smoothquant; qat→qlora; device col→engine+batch/seq.)* which of your project's findings transfers word for word ? *(\"speed comes from the kernels, not the weight values\" — same-kernel engines differ in quality, not latency.)* what two rows does a vlm add, and which uses your cnn skills? *(int8 vision encoder — cnn skills — and visual token reduction.)*","words":726},{"path":"13-llm-vlm-optimization/interview-qa.md","title":"Interview Q&A — LLM & VLM","section":"13 · LLM & VLM Optimization","quiz":true,"accent":"#2aa7cf","html":"<h1 id=\"interview-qa-llm-vlm-rapid-fire\">Interview Q&amp;A — LLM &amp; VLM Rapid Fire<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Last-mile drill for applying the optimization loop to LLMs and VLMs. Cover the answer, say the 30-second version out loud, then check. Grouped: bridge → LLM quant → serving → VLM → the story.<\/div><\/div>\n<h2 id=\"the-cnn-bridge\">The CNN bridge<\/h2>\n<details class=\"qa\" open><summary>Q: Your experiment was a CNN — does the same optimization loop apply to LLMs?<\/summary><div class=\"qa-body\"><p>Yes — baseline → quantize → serve → compare is identical, and so is the method/format/engine framing. What flips: LLM decode is memory-bound (so weight-only INT4 wins, not INT8 compute), activations have outliers (need SmoothQuant/AWQ), models are too big to QAT (use PTQ/QLoRA), and quality is perplexity + benchmarks, not top-1.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is weight-only INT4 the big lever for LLMs but wasn't obvious for your CNN?<\/summary><div class=\"qa-body\"><p>LLM decode re-reads every weight from memory per token with little math — it's bandwidth-bound, so cutting weight bytes speeds it up directly. Your CNN was compute-bound, so INT8 helped the math, not memory.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does plain per-tensor INT8 PTQ that worked on your CNN fail on an LLM?<\/summary><div class=\"qa-body\"><p>Transformer activations have a few huge outlier channels; a per-tensor scale must cover them, crushing normal values into a few codes. SmoothQuant (shift difficulty into weights) or AWQ (protect salient channels) fix it.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: You can't afford QAT on a 7B model — what do you do instead?<\/summary><div class=\"qa-body\"><p>PTQ/weight-only methods that need only a small calibration set, and QLoRA — train small LoRA adapters on a frozen 4-bit (NF4) base — for cheap task-specific recovery.<\/p><\/div><\/details><h2 id=\"llm-quantization\">LLM quantization<\/h2>\n<details class=\"qa\" open><summary>Q: Weight-only vs weight+activation — pick one, when?<\/summary><div class=\"qa-body\"><p>Weight-only (INT4, AWQ/GPTQ) when memory- or VRAM-bound, which decode usually is. Weight+activation (INT8/FP8) when prefill/throughput dominates and you can handle outliers — FP8 on Hopper is the sweet spot.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: GPTQ vs AWQ in a sentence each.<\/summary><div class=\"qa-body\"><p>GPTQ: second-order, Hessian-based layer-wise rounding that compensates remaining weights for quantization error. AWQ: scale up the ~1% of weight channels that matter most (by activation magnitude) before INT4 so they aren't crushed — no backprop, fast.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is group-wise quantization and why do LLMs use it?<\/summary><div class=\"qa-body\"><p>A separate scale per group of N weights (e.g. 128) instead of per whole channel — finer granularity that keeps INT4 accurate. GGUF k-quants are group-wise.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why and how would you quantize the KV cache?<\/summary><div class=\"qa-body\"><p>At long context/large batch it can exceed the weights. INT8/FP8 KV roughly halves it → longer context or bigger batches. Keys are sometimes kept higher-precision than values.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you measure LLM quality after quantizing — and the trap?<\/summary><div class=\"qa-body\"><p>Perplexity on held-out text (fast) plus task benchmarks (MMLU, GSM8K, HumanEval) via lm-eval-harness. Trap: a 4-bit model can hold perplexity but drop on reasoning/long-context, so test the tasks you care about.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's QLoRA, concretely?<\/summary><div class=\"qa-body\"><p>Freeze the base model in 4-bit NF4, add trainable LoRA adapters in higher precision, fine-tune only those. QAT-like recovery at a fraction of the cost; serve the base once and swap adapters.<\/p><\/div><\/details><h2 id=\"serving-performance\">Serving &amp; performance<\/h2>\n<details class=\"qa\" open><summary>Q: Why does an LLM report two latencies?<\/summary><div class=\"qa-body\"><p>Prefill (TTFT) processes the whole prompt in parallel — compute-bound. Decode (TPOT) generates one token at a time — memory-bound. Different optimizations, so you measure and report both.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Name the LLM serving runtimes and when each.<\/summary><div class=\"qa-body\"><p>TensorRT-LLM (best on NVIDIA — fused kernels, FP8, in-flight batching, served via Triton); vLLM (PagedAttention + continuous batching, easy high throughput); llama.cpp (GGUF on CPU/edge/Apple Silicon).<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is continuous / in-flight batching and why does it matter?<\/summary><div class=\"qa-body\"><p>Schedule at the token level so finished sequences are replaced immediately and new requests join mid-flight — keeps the GPU saturated instead of waiting for a batch's slowest sequence. Biggest throughput lever for real traffic.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How would you correctly benchmark an LLM's speed?<\/summary><div class=\"qa-body\"><p>Warm up, separate TTFT from per-token, sweep batch size and sequence length (throughput is meaningless without them), report p50/p99. Tools: genai-perf / trtllm-bench / vLLM benchmarks.<\/p><\/div><\/details><h2 id=\"vlm\">VLM<\/h2>\n<details class=\"qa\" open><summary>Q: What are a VLM's parts and where's the cost?<\/summary><div class=\"qa-body\"><p>Vision encoder (ViT/CNN) → projector (small MLP) → LLM decoder. Cost: images become hundreds–thousands of tokens, so prefill and the KV cache dominate; the encoder is a one-time per-image cost.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How would you optimize a VLM?<\/summary><div class=\"qa-body\"><p>Quantize the vision encoder like a CNN (INT8, per-channel, TensorRT), treat the decoder as an LLM (INT4/FP8 + KV-quant), and — first — reduce visual tokens (pool/prune/merge), because image tokens drive prefill and KV.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Which part of a VLM maps to your CNN experience?<\/summary><div class=\"qa-body\"><p>The vision encoder — a ViT/CNN I'd quantize with the exact PTQ/TensorRT playbook from my FashionMNIST project.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's the VLM-specific optimization with no LLM or CNN analog?<\/summary><div class=\"qa-body\"><p>Visual token reduction — compress the image-token count with pooling, pruning, merging, or a resampler, shrinking prefill and KV together.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Wh

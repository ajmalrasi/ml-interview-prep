LM weight-only (AWQ/GPTQ).<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The single sentence that ties it together: <strong>exponent bits buy range, mantissa bits buy precision, and INT formats trade both for a single uniform step you place with a scale.<\/strong><\/p>\n<p><strong>See the bit budget.<\/strong> Pick a format and watch how its bits split into sign / exponent / mantissa — and how that fixes its <strong>range<\/strong> (exponent) and <strong>precision<\/strong> (mantissa). Notice FP16 vs BF16: same total bits, but BF16 spends them on range, which is exactly why it skips loss scaling.<\/p>\n<div id=\"format-widget\" class=\"widget-host\"><\/div>\n<h2 id=\"why-fp16-needs-loss-scaling-but-bf16-doesnt\">Why FP16 needs loss scaling but BF16 doesn't<\/h2>\n<p>A favorite question. The whole answer is about <strong>exponent range<\/strong>, not precision.<\/p>\n<p><strong>FP16 — narrow range, needs the fix:<\/strong><\/p>\n<ul><li>Keeps FP32-ish mantissa precision, but a <strong>much narrower exponent range<\/strong>.<\/li><li>Small gradients <strong>underflow to zero<\/strong> and vanish.<\/li><li>Fix = <strong>loss scaling<\/strong>: multiply the loss by a big constant before <code>backward<\/code> so gradients<\/li><\/ul>\n<p>land in FP16's range → unscale before the optimizer step → skip the step if any Inf/NaN shows up.<\/p>\n<ul><li>Frameworks automate it: <code>torch.cuda.amp.GradScaler<\/code>.<\/li><\/ul>\n<p><strong>BF16 — FP32's range, no fix needed:<\/strong><\/p>\n<ul><li><strong>Same 8-bit exponent as FP32<\/strong> → identical range → gradients don't underflow → <strong>no loss scaling.<\/strong><\/li><li>Cost is only 7 mantissa bits (less precision), which training tolerates well.<\/li><li>That's why BF16 is the default for large-model training today — even though FP16 has more mantissa.<\/li><\/ul>\n<div class=\"compare\">\n  <div class=\"cmp-col\">\n    <div class=\"cmp-h\">FP16<\/div>\n    <p><b>Narrow range<\/b>, more precision → underflow risk.<\/p>\n    <span class=\"cmp-tag\">needs loss scaling<\/span>\n  <\/div>\n  <div class=\"cmp-col green\">\n    <div class=\"cmp-h\">BF16<\/div>\n    <p><b>FP32 range<\/b>, less precision → no underflow.<\/p>\n    <span class=\"cmp-tag\">no loss scaling needed<\/span>\n  <\/div>\n<\/div>\n<h2 id=\"tf32-the-free-one-people-forget\">TF32: the \"free\" one people forget<\/h2>\n<p>On Ampere and newer, a <strong>plain FP32 matmul<\/strong> on tensor cores actually runs in <strong>TF32<\/strong>:<\/p>\n<ul><li>Inputs are rounded to a 19-bit form (<strong>8 exp, 10 mantissa<\/strong>) before the multiply; accumulation stays in FP32.<\/li><li>You get most of FP16's speed at <strong>near-FP32 accuracy<\/strong>.<\/li><li>It's <strong>on by default<\/strong> in cuDNN/cuBLAS — in PyTorch, <code>torch.backends.cuda.matmul.allow_tf32<\/code>.<\/li><\/ul>\n<p>Good to mention: <em>\"a chunk of the FP32→FP16 speedup people report is really FP32→TF32, already happening under the hood.\"<\/em><\/p>\n<h2 id=\"mixed-precision-training-the-mechanism\">Mixed-precision training (the mechanism)<\/h2>\n<p>\"Mixed precision\" = compute in FP16/BF16 for speed, but keep a <strong>master copy of weights in FP32<\/strong> so tiny updates don't get lost to rounding.<\/p>\n<p>The loop:<\/p>\n<ol><li>Forward/backward in FP16 (with loss scaling) or BF16.<\/li><li>Accumulate into the <strong>FP32 master weights<\/strong>.<\/li><li>Apply the optimizer in FP32.<\/li><\/ol>\n<p><strong>Payoff:<\/strong> ~<strong>2× faster<\/strong> and ~<strong>half the memory<\/strong>, negligible accuracy loss. Tensor cores are why it's fast — they're built for reduced-precision matmul-accumulate.<\/p>\n<h2 id=\"fp8-the-current-frontier-hopper-ada\">FP8: the current frontier (Hopper / Ada)<\/h2>\n<p>FP8 comes in <strong>two flavors<\/strong> because forward and backward want different things:<\/p>\n<ul><li><strong>E4M3<\/strong> (4 exponent, 3 mantissa) — more precision, less range → forward pass, weights &amp;<\/li><\/ul>\n<p>activations.<\/p>\n<ul><li><strong>E5M2<\/strong> (5 exponent, 2 mantissa) — more range, less precision → gradients.<\/li><\/ul>\n<p>FP8 needs <strong>per-tensor scaling factors<\/strong> (delayed/dynamic scaling) to keep values in range, much like INT8 calibration — NVIDIA's <strong>Transformer Engine<\/strong> does this automatically for training and inference.<\/p>\n<p>Why it matters: FP8 <strong>doubles tensor-core throughput vs FP16<\/strong> and is the headline feature of Hopper (H100). Expect at least one FP8 question if the role touches LLMs.<\/p>\n<h2 id=\"int8-vs-fp16-when-to-pick-which\">INT8 vs FP16: when to pick which<\/h2>\n<ul><li><strong>FP16/BF16:<\/strong> ~2× faster, ~half memory, <strong>almost no accuracy risk, no calibration<\/strong>. The<\/li><\/ul>\n<p>safe default and often the whole answer.<\/p>\n<ul><li><strong>INT8:<\/strong> up to ~4× and lowest memory, but needs <strong>calibration<\/strong> and can lose accuracy —<\/li><\/ul>\n<p>so you <em>measure<\/em> it (exactly your project's compare table). Best when latency/cost is tight   and you can afford the calibration + QAT effort.<\/p>\n<ul><li>Instinct to voice: *\"FP16 first because it's free accuracy-wise; INT8 when the latency or<\/li><\/ul>\n<p>cost budget demands it and I can validate the accuracy hit — and I keep sensitive layers   (first/last, softmax) in higher precision if INT8 hurts.\"*<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>AMP<\/strong> (<code>torch.cuda.amp<\/code>, <code>torch.autocast<\/code>) for mixed precision; <strong>Transformer Engine<\/strong> for FP8; tensor-core formats are picked by <strong>cuBLAS/cuDNN/TensorRT<\/strong> automatically. TensorRT's <code>enabled_precisions={torch.half}<\/code> (your FP16 path) vs the INT8 builder flag chooses the format the engine targets.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"My TRT-FP16 row was basically free accuracy-wise; the INT8 rows needed calibration and I tracked the drop. On newer hardware I'd reach for FP8 via Transformer Engine before INT8 for LLMs — similar speed with an easier accuracy story.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why does FP16 need loss scaling and BF16 not? *(FP16 has a narrow exponent range →<\/li><\/ul>\n<p>gradients underflow; BF16 shares FP32's 8-bit exponent → no underflow.)*<\/p>\n<ul><li>What is TF32 and when does it kick in? *(19-bit tensor-core format for FP32 matmuls on<\/li><\/ul>\n<p>Ampere+, on by default — near-FP32 accuracy at FP16-ish speed.)*<\/p>\n<ul><li>Why two FP8 formats? <em>(E4M3 precision-heavy for forward; E5M2 range-heavy for gradients.)<\/em><\/li><li>In mixed precision, why keep FP32 master weights? *(so small updates aren't lost to FP16<\/li><\/ul>\n<p>rounding.)*<\/p>","toc":[{"level":2,"id":"the-formats-in-one-table","text":"The formats, in one table"},{"level":2,"id":"why-fp16-needs-loss-scaling-but-bf16-doesnt","text":"Why FP16 needs loss scaling but BF16 doesn't"},{"level":2,"id":"tf32-the-free-one-people-forget","text":"TF32: the \"free\" one people forget"},{"level":2,"id":"mixed-precision-training-the-mechanism","text":"Mixed-precision training (the mechanism)"},{"level":2,"id":"fp8-the-current-frontier-hopper-ada","text":"FP8: the current frontier (Hopper / Ada)"},{"level":2,"id":"int8-vs-fp16-when-to-pick-which","text":"INT8 vs FP16: when to pick which"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"numerical precision: fp32 → fp8 → int8 💡 tl;dr every number format is a bet on range vs precision in a fixed bit budget. floating point spends bits on an exponent (range) and a mantissa (precision); integer/int8 has neither — just a fixed step. knowing which format to reach for, and why fp16 needs loss scaling but bf16 doesn't , is table-stakes at nvidia. the formats, in one table format bits (e/m) dynamic range precision where it's used fp32 8 / 23 huge high baseline; master weights in mixed precision. tf32 8 / 10 = fp32 ~fp16 ampere+ tensor-core math for \"fp32\" matmuls (on by default). fp16 5 / 10 narrow (~6e−5…65504) good mixed-precision train/infer; needs loss scaling . bf16 8 / 7 = fp32 lower training; no loss scaling needed. fp8 e4m3 4 / 3 small more mantissa hopper/ada forward pass (weights/activations). fp8 e5m2 5 / 2 larger less mantissa gradients (needs range). int8 fixed step set by scale uniform tensorrt inference; needs calibration. int4 fixed step set by scale coarse llm weight-only (awq/gptq). the single sentence that ties it together: exponent bits buy range, mantissa bits buy precision, and int formats trade both for a single uniform step you place with a scale. see the bit budget. pick a format and watch how its bits split into sign / exponent / mantissa — and how that fixes its range (exponent) and precision (mantissa). notice fp16 vs bf16: same total bits, but bf16 spends them on range, which is exactly why it skips loss scaling. why fp16 needs loss scaling but bf16 doesn't a favorite question. the whole answer is about exponent range , not precision. fp16 — narrow range, needs the fix: keeps fp32-ish mantissa precision, but a much narrower exponent range . small gradients underflow to zero and vanish. fix = loss scaling : multiply the loss by a big constant before backward so gradients land in fp16's range → unscale before the optimizer step → skip the step if any inf/nan shows up. frameworks automate it: torch.cuda.amp.gradscaler . bf16 — fp32's range, no fix needed: same 8-bit exponent as fp32 → identical range → gradients don't underflow → no loss scaling. cost is only 7 mantissa bits (less precision), which training tolerates well. that's why bf16 is the default for large-model training today — even though fp16 has more mantissa. fp16 narrow range , more precision → underflow risk. needs loss scaling bf16 fp32 range , less precision → no underflow. no loss scaling needed tf32: the \"free\" one people forget on ampere and newer, a plain fp32 matmul on tensor cores actually runs in tf32 : inputs are rounded to a 19-bit form ( 8 exp, 10 mantissa ) before the multiply; accumulation stays in fp32. you get most of fp16's speed at near-fp32 accuracy . it's on by default in cudnn/cublas — in pytorch, torch.backends.cuda.matmul.allow_tf32 . good to mention: \"a chunk of the fp32→fp16 speedup people report is really fp32→tf32, already happening under the hood.\" mixed-precision training (the mechanism) \"mixed precision\" = compute in fp16/bf16 for speed, but keep a master copy of weights in fp32 so tiny updates don't get lost to rounding. the loop: forward/backward in fp16 (with loss scaling) or bf16. accumulate into the fp32 master weights . apply the optimizer in fp32. payoff: ~ 2× faster and ~ half the memory , negligible accuracy loss. tensor cores are why it's fast — they're built for reduced-precision matmul-accumulate. fp8: the current frontier (hopper / ada) fp8 comes in two flavors because forward and backward want different things: e4m3 (4 exponent, 3 mantissa) — more precision, less range → forward pass, weights & activations. e5m2 (5 exponent, 2 mantissa) — more range, less precision → gradients. fp8 needs per-tensor scaling factors (delayed/dynamic scaling) to keep values in range, much like int8 calibration — nvidia's transformer engine does this automatically for training and inference. why it matters: fp8 doubles tensor-core throughput vs fp16 and is the headline feature of hopper (h100). expect at least one fp8 question if the role touches llms. int8 vs fp16: when to pick which fp16/bf16: ~2× faster, ~half memory, almost no accuracy risk, no calibration . the safe default and often the whole answer. int8: up to ~4× and lowest memory, but needs calibration and can lose accuracy — so you measure it (exactly your project's compare table). best when latency/cost is tight and you can afford the calibration + qat effort. instinct to voice: *\"fp16 first because it's free accuracy-wise; int8 when the latency or cost budget demands it and i can validate the accuracy hit — and i keep sensitive layers (first/last, softmax) in higher precision if int8 hurts.\"* 🔗 connecting the dots: the real stack amp ( torch.cuda.amp , torch.autocast ) for mixed precision; transformer engine for fp8; tensor-core formats are picked by cublas/cudnn/tensorrt automatically. tensorrt's enabled_precisions={torch.half} (your fp16 path) vs the int8 builder flag chooses the format the engine targets. how you'd say it: \"my trt-fp16 row was basically free accuracy-wise; the int8 rows needed calibration and i tracked the drop. on newer hardware i'd reach for fp8 via transformer engine before int8 for llms — similar speed with an easier accuracy story.\" self-check why does fp16 need loss scaling and bf16 not? *(fp16 has a narrow exponent range → gradients underflow; bf16 shares fp32's 8-bit exponent → no underflow.)* what is tf32 and when does it kick in? *(19-bit tensor-core format for fp32 matmuls on ampere+, on by default — near-fp32 accuracy at fp16-ish speed.)* why two fp8 formats? (e4m3 precision-heavy for forward; e5m2 range-heavy for gradients.) in mixed precision, why keep fp32 master weights? *(so small updates aren't lost to fp16 rounding.)*","words":950},{"path":"12-nvidia-model-optimization/tensorrt-internals.md","title":"TensorRT Internals","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"tensorrt-internals\">TensorRT Internals<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> TensorRT is an <strong>optimizing compiler + runtime<\/strong> for inference. You hand it a network (usually via ONNX); it <strong>fuses layers, picks the fastest kernel for your exact GPU, chooses precisions, and serializes an engine<\/strong>. The two concepts NVIDIA will press: what the builder actually does, and <strong>implicit vs explicit quantization<\/strong> — which is exactly your project's \"Option A vs Option B,\" in the official vocabulary.<\/div><\/div>\n<h2 id=\"the-pipeline\">The pipeline<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">PyTorch<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">torch.onnx.export<\/span><\/span>\n    <span class=\"node\">ONNX<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">TRT Builder<\/span><\/span>\n    <span class=\"node\">Engine<span class=\"nsub\">plan file<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">Runtime<\/span><\/span>\n    <span class=\"node out\">inference<\/span>\n  <\/div>\n  <div class=\"flow-foot\"><b>Builder does the heavy lifting:<\/b> layer/tensor fusion · kernel (tactic) auto-tuning · precision selection · memory planning · calibration (if implicit INT8).<\/div>\n<\/div>\n<ul><li><strong>Builder<\/strong> — the expensive, offline step. It runs the optimizations below and **times<\/li><\/ul>\n<p>candidate kernels on your actual GPU** to pick the fastest.<\/p>\n<ul><li><strong>Engine (plan file)<\/strong> — the serialized result. <strong>Hardware-specific<\/strong>: an engine built for<\/li><\/ul>\n<p>an RTX 3070 Ti is not guaranteed to run optimally (or at all) on a different arch/TRT   version. Build on the deployment GPU.<\/p>\n<ul><li><strong>Runtime<\/strong> — loads the engine, allocates a <strong>context<\/strong>, binds input/output device<\/li><\/ul>\n<p>buffers, runs <code>enqueueV3<\/code> on a CUDA stream.<\/p>\n<h2 id=\"what-the-builder-actually-does-name-these\">What the builder actually does (name these)<\/h2>\n<ol><li><strong>Layer &amp; tensor fusion<\/strong> — the biggest structural win. Fuses <code>Conv+BN+ReLU<\/code> into one<\/li><\/ol>\n<p>kernel, fuses elementwise chains, collapses concat, etc. Fewer kernel launches, fewer    round-trips to global memory. <em>(This is why BN folding matters — see below.)<\/em><\/p>\n<ol><li><strong>Kernel auto-tuning / tactic selection<\/strong> — for each layer it has many candidate CUDA<\/li><\/ol>\n<p>kernels (different tile sizes, tensor-core paths) and <strong>benchmarks them<\/strong> to pick the    fastest for your shapes and GPU. This is why builds are slow and engines are portable    only within a GPU family.<\/p>\n<ol><li><strong>Precision selection<\/strong> — runs layers in FP16/INT8 where allowed, keeping others in higher<\/li><\/ol>\n<p>precision if needed for accuracy (you can pin per-layer precision).<\/p>\n<ol><li><strong>Memory optimization<\/strong> — reuses activation buffers across layers that don't overlap in<\/li><\/ol>\n<p>time (memory planning), sized by the <strong>workspace<\/strong> you grant it.<\/p>\n<ol><li><strong>Multi-stream / dynamic shapes<\/strong> — supports variable input sizes via optimization<\/li><\/ol>\n<p>profiles (below).<\/p>\n<h2 id=\"implicit-vs-explicit-quantization-the-key-tensorrt-concept\">Implicit vs explicit quantization (the key TensorRT concept)<\/h2>\n<p>Your notes described \"Option A: TRT calibrates itself\" and \"Option B: QDQ nodes baked in.\" Those are the two official INT8 modes:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th><strong>Implicit quantization<\/strong> (Option A)<\/th><th><strong>Explicit quantization / QDQ<\/strong> (Option B)<\/th><\/tr><\/thead><tbody><tr><td>Input<\/td><td>FP32 ONNX + a <strong>calibrator<\/strong><\/td><td>ONNX with <strong>Q/DQ nodes<\/strong> carrying scales<\/td><\/tr><tr><td>Who picks scales<\/td><td>TensorRT's calibrator<\/td><td>Baked in from <strong>QAT<\/strong> (Model-Optimizer)<\/td><\/tr><tr><td>Determinism<\/td><td>Builder chooses which layers go INT8 to maximize speed<\/td><td>You control exactly where INT8 runs<\/td><\/tr><tr><td>Accuracy story<\/td><td>\"PTQ, done by TensorRT\"<\/td><td>Matches the QAT-trained numerics<\/td><\/tr><tr><td>Status<\/td><td>Legacy path; being deprecated<\/td><td><strong>Recommended<\/strong> going forward<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>The subtlety to nail<\/strong> (your notes get this right): Q/DQ nodes are a <strong>build-time instruction, not a runtime op.<\/strong><\/p>\n<ul><li>The builder fuses <code>Q → Conv → DQ<\/code> into a single INT8 kernel; the Q/DQ markers vanish from the engine.<\/li><li>So <strong>explicit vs implicit changes achievable accuracy, never runtime speed<\/strong> — the executed engine is the same shape.<\/li><li>Explicit only costs latency if Q/DQ nodes are placed so densely the builder can't fuse them.<\/li><\/ul>\n<p><strong>Why your project used implicit<\/strong> (a good war story — you knew the \"right\" path and why the environment forced a fallback):<\/p>\n<ul><li><code>nvidia-modelopt<\/code> (which produces explicit QDQ) was broken on your torch 2.5 stack.<\/li><li>fbgemm's fake-quant ops <strong>can't export to ONNX at all<\/strong>.<\/li><li>So you folded QAT weights into a plain model and re-calibrated — a hybrid: weights got QAT's<\/li><\/ul>\n<p>benefit, scales came from TRT's calibrator.<\/p>\n<h2 id=\"bn-folding-why-your-issue-7b-existed\">BN folding: why your issue #7b existed<\/h2>\n<p>TensorRT (and QAT) <strong>fold BatchNorm into the preceding conv<\/strong>. Since BN is an affine <code>γ·(x−μ)/σ + β<\/code> and conv is linear, the two compose into one conv with adjusted weights and bias.<\/p>\n<p>Two consequences:<\/p>\n<ul><li><strong>An optimization<\/strong> — one fewer kernel.<\/li><li><strong>The reason for your QAT→plain-model remap<\/strong> — <code>bn.*<\/code> params had to move out of the fused module.<\/li><\/ul>\n<p>Interview-ready phrasing: <em>\"BN folding is exact math, not an approximation — it's why fused Conv+BN+ReLU is one kernel and why my QAT state-dict keys had to be remapped.\"<\/em><\/p>\n<h2 id=\"dynamic-shapes-optimization-profiles\">Dynamic shapes &amp; optimization profiles<\/h2>\n<p>Your engines were fixed-batch (256), which forced the \"pad the last partial batch\" hack. The general fix is an <strong>optimization profile<\/strong>:<\/p>\n<ul><li>Declare <code>min / opt / max<\/code> shapes for each dynamic dimension.<\/li><li>TensorRT tunes kernels for <code>opt<\/code> while supporting the whole range.<\/li><li>One engine then serves batch sizes 1…N.<\/li><\/ul>\n<p>Standard production setup, and a clean \"what would you do next\" answer.<\/p>\n<h2 id=\"plugins-custom-ops\">Plugins (custom ops)<\/h2>\n<p>If your model has an op TensorRT doesn't support natively, you write a <strong>plugin<\/strong> (<code>IPluginV3<\/code>) — a custom CUDA kernel TRT calls as a black-box layer.<\/p>\n<ul><li>Common for novel attention variants, NMS, custom preprocessing.<\/li><li>Plugins <strong>break fusion across their boundary<\/strong> — the builder can't see inside them.<\/li><\/ul>\n<h2 id=\"serving-it-triton-inference-server\">Serving it: Triton Inference Server<\/h2>\n<p>An engine alone isn't a service. <strong>Triton<\/strong> wraps it with:<\/p>\n<ul><li><strong>Dynamic batching<\/strong> — group requests within a latency window.<\/li><li><strong>Concurrent model instances<\/strong> — multiple engines per GPU to raise utilization.<\/li><li><strong>Model ensembles / pipelines<\/strong> and multi-framework backends (TensorRT, ONNX, PyTorch, Python).<\/li><li><strong>Metrics.<\/strong><\/li><\/ul>\n<p>The production shape: <em>\"TensorRT engine served by Triton with dynamic batching and a couple of concurrent instances.\"<\/em> A natural \"how would you deploy it\" follow-up to your project.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>torch-tensorrt<\/strong> / <code>torch.compile<\/code> backend and <strong><code>trtexec<\/code><\/strong> (CLI to build+profile engines) for classic models; <strong>ONNX Runtime<\/strong> as the portable alternative; <strong>TensorRT-LLM<\/strong> for LLMs; <strong>Triton<\/strong> for serving; <strong>NVIDIA TensorRT-Model-Optimizer<\/strong> for explicit-QDQ quantization. <code>trtexec --int8 --fp16 --best<\/code> is the fastest way to see achievable latency.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I exported to ONNX and built an INT8 engine with an entropy calibrator — implicit quantization. The cleaner path is explicit QDQ from QAT via Model-Optimizer, which my torch/modelopt versions didn't support, so I folded QAT weights in and re-calibrated. In production I'd serve the engine through Triton with dynamic batching.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What are the two biggest things the TRT builder does? *(layer fusion + kernel auto-tuning /<\/li><\/ul>\n<p>tactic selection for your specific GPU.)*<\/p>\n<ul><li>Implicit vs explicit quantization? *(calibrator picks scales &amp; builder chooses INT8 layers<\/li><\/ul>\n<p>vs Q/DQ nodes with baked-in QAT scales you control; explicit is recommended.)*<\/p>\n<ul><li>Do QDQ nodes slow inference? *(no — build-time markers, fused away; they affect accuracy,<\/li><\/ul>\n<p>not speed, unless placed un-fusably.)*<\/p>\n<ul><li>Why is a TRT engine not portable across GPUs? *(kernels are auto-tuned/timed for a specific<\/li><\/ul>\n<p>arch + TRT version.)*<\/p>","toc":[{"level":2,"id":"the-pipeline","text":"The pipeline"},{"level":2,"id":"what-the-builder-actually-does-name-these","text":"What the builder actually does (name these)"},{"level":2,"id":"implicit-vs-explicit-quantization-the-key-tensorrt-concept","text":"Implicit vs explicit quantization (the key TensorRT concept)"},{"level":2,"id":"bn-folding-why-your-issue-7b-existed","text":"BN folding: why your issue #7b existed"},{"level":2,"id":"dynamic-shapes-optimization-profiles","text":"Dynamic shapes &amp; optimization profiles"},{"level":2,"id":"plugins-custom-ops","text":"Plugins (custom ops)"},{"level":2,"id":"serving-it-triton-inference-server","text":"Serving it: Triton Inference Server"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"tensorrt internals 💡 tl;dr tensorrt is an optimizing compiler + runtime for inference. you hand it a network (usually via onnx); it fuses layers, picks the fastest kernel for your exact gpu, chooses precisions, and serializes an engine . the two concepts nvidia will press: what the builder actually does, and implicit vs explicit quantization — which is exactly your project's \"option a vs option b,\" in the official vocabulary. the pipeline pytorch torch.onnx.export onnx trt builder engine plan file runtime inference builder does the heavy lifting: layer/tensor fusion · kernel (tactic) auto-tuning · precision selection · memory planning · calibration (if implicit int8). builder — the expensive, offline step. it runs the optimizations below and **times candidate kernels on your actual gpu** to pick the fastest. engine (plan file) — the serialized result. hardware-specific : an engine built for an rtx 3070 ti is not guaranteed to run optimally (or at all) on a different arch/trt version. build on the deployment gpu. runtime — loads the engine, allocates a context , binds input/output device buffers, runs enqueuev3 on a cuda stream. what the builder actually does (name these) layer & tensor fusion — the biggest structural win. fuses conv+bn+relu into one kernel, fuses elementwise chains, collapses concat, etc. fewer kernel launches, fewer round-trips to global memory. (this is why bn folding matters — see below.) kernel auto-tuning / tactic selection — for each layer it has many candidate cuda kernels (different tile sizes, tensor-core paths) and benchmarks them to pick the fastest for your shapes and gpu. this is why builds are slow and engines are portable only within a gpu family. precision selection — runs layers in fp16/int8 where allowed, keeping others in higher precision if needed for accuracy (you can pin per-layer precision). memory optimization — reuses activation buffers across layers that don't overlap in time (memory planning), sized by the workspace you grant it. multi-stream / dynamic shapes — supports variable input sizes via optimization profiles (below). implicit vs explicit quantization (the key tensorrt concept) your notes described \"option a: trt calibrates itself\" and \"option b: qdq nodes baked in.\" those are the two official int8 modes: implicit quantization (option a) explicit quantization / qdq (option b) input fp32 onnx + a calibrator onnx with q/dq nodes carrying scales who picks scales tensorrt's calibrator baked in from qat (model-optimizer) determinism builder chooses which layers go int8 to maximize speed you control exactly where int8 runs accuracy story \"ptq, done by tensorrt\" matches the qat-trained numerics status legacy path; being deprecated recommended going forward the subtlety to nail (your notes get this right): q/dq nodes are a build-time instruction, not a runtime op. the builder fuses q → conv → dq into a single int8 kernel; the q/dq markers vanish from the engine. so explicit vs implicit changes achievable accuracy, never runtime speed — the executed engine is the same shape. explicit only costs latency if q/dq nodes are placed so densely the builder can't fuse them. why your project used implicit (a good war story — you knew the \"right\" path and why the environment forced a fallback): nvidia-modelopt (which produces explicit qdq) was broken on your torch 2.5 stack. fbgemm's fake-quant ops can't export to onnx at all . so you folded qat weights into a plain model and re-calibrated — a hybrid: weights got qat's benefit, scales came from trt's calibrator. bn folding: why your issue #7b existed tensorrt (and qat) fold batchnorm into the preceding conv . since bn is an affine γ·(x−μ)/σ + β and conv is linear, the two compose into one conv with adjusted weights and bias. two consequences: an optimization — one fewer kernel. the reason for your qat→plain-model remap — bn.* params had to move out of the fused module. interview-ready phrasing: \"bn folding is exact math, not an approximation — it's why fused conv+bn+relu is one kernel and why my qat state-dict keys had to be remapped.\" dynamic shapes & optimization profiles your engines were fixed-batch (256), which forced the \"pad the last partial batch\" hack. the general fix is an optimization profile : declare min / opt / max shapes for each dynamic dimension. tensorrt tunes kernels for opt while supporting the whole range. one engine then serves batch sizes 1…n. standard production setup, and a clean \"what would you do next\" answer. plugins (custom ops) if your model has an op tensorrt doesn't support natively, you write a plugin ( ipluginv3 ) — a custom cuda kernel trt calls as a black-box layer. common for novel attention variants, nms, custom preprocessing. plugins break fusion across their boundary — the builder can't see inside them. serving it: triton inference server an engine alone isn't a service. triton wraps it with: dynamic batching — group requests within a latency window. concurrent model instances — multiple engines per gpu to raise utilization. model ensembles / pipelines and multi-framework backends (tensorrt, onnx, pytorch, python). metrics. the production shape: \"tensorrt engine served by triton with dynamic batching and a couple of concurrent instances.\" a natural \"how would you deploy it\" follow-up to your project. 🔗 connecting the dots: the real stack torch-tensorrt / torch.compile backend and trtexec (cli to build+profile engines) for classic models; onnx runtime as the portable alternative; tensorrt-llm for llms; triton for serving; nvidia tensorrt-model-optimizer for explicit-qdq quantization. trtexec --int8 --fp16 --best is the fastest way to see achievable latency. how you'd say it: \"i exported to onnx and built an int8 engine with an entropy calibrator — implicit quantization. the cleaner path is explicit qdq from qat via model-optimizer, which my torch/modelopt versions didn't support, so i folded qat weights in and re-calibrated. in production i'd serve the engine through triton with dynamic batching.\" self-check what are the two biggest things the trt builder does? *(layer fusion + kernel auto-tuning / tactic selection for your specific gpu.)* implicit vs explicit quantization? *(calibrator picks scales & builder chooses int8 layers vs q/dq nodes with baked-in qat scales you control; explicit is recommended.)* do qdq nodes slow inference? *(no — build-time markers, fused away; they affect accuracy, not speed, unless placed un-fusably.)* why is a trt engine not portable across gpus? *(kernels are auto-tuned/timed for a specific arch + trt version.)*","words":1043},{"path":"12-nvidia-model-optimization/inference-stack.md","title":"The Modern Inference Stack","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"the-modern-inference-stack\">The Modern Inference Stack<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> vLLM, SGLang, Triton, TensorRT-LLM, TorchDynamo, NVIDIA Dynamo, XLA, MLIR, LLVM, CUTLASS, and CUDA Graphs are not interchangeable competitors. They occupy different layers: frontend graph capture, compiler IR, kernels, inference engine, server, distributed runtime, and fleet orchestration. Place each tool before comparing it.<\/div><\/div>\n<h2 id=\"the-layer-map\">The layer map<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Layer<\/th><th>Job<\/th><th>Examples<\/th><\/tr><\/thead><tbody><tr><td>Model/framework<\/td><td>express model and eager execution<\/td><td>PyTorch, TensorFlow/JAX<\/td><\/tr><tr><td>Graph capture/compiler frontend<\/td><td>turn dynamic program into optimizable graph<\/td><td>TorchDynamo / <code>torch.compile<\/code>, TorchScript/export<\/td><\/tr><tr><td>Compiler IR/backend<\/td><td>transform, fuse, lower, generate code<\/td><td>TorchInductor, XLA, MLIR, LLVM<\/td><\/tr><tr><td>Kernel library/codegen<\/td><td>fast device operations<\/td><td>cuBLAS, cuDNN, CUTLASS, Triton language, FlashAttention<\/td><\/tr><tr><td>Optimized inference engine<\/td><td>plan memory, kernels, precision, scheduling<\/td><td>TensorRT, TensorRT-LLM, vLLM, SGLang<\/td><\/tr><tr><td>Model server/API<\/td><td>networking, model instances, metrics, batching surface<\/td><td>Triton Inference Server, vLLM/SGLang servers<\/td><\/tr><tr><td>Distributed LLM runtime<\/td><td>routing, discovery, KV-aware/disaggregated serving<\/td><td>NVIDIA Dynamo, llm-d<\/td><\/tr><tr><td>Cluster platform<\/td><td>placement, rollout, scaling, health<\/td><td>Kubernetes, Helm, GPU Operator<\/td><\/tr><\/tbody><\/table><\/div>\n<p>A product may combine layers. vLLM is both engine and OpenAI-compatible server. Triton Inference Server can host a TensorRT/TensorRT-LLM backend. \"Triton\" can also mean the Python- embedded GPU programming language/compiler used by TorchInductor—clarify which one.<\/p>\n<h2 id=\"two-dynamos-that-are-not-the-same\">Two Dynamos that are not the same<\/h2>\n<ul><li><strong>TorchDynamo<\/strong> is the graph-capture frontend behind <code>torch.compile<\/code>. It observes Python<\/li><\/ul>\n<p>bytecode, creates FX graphs guarded by runtime assumptions, and hands them to a backend such   as TorchInductor. Graph breaks or recompilations can erase the gain.<\/p>\n<ul><li><strong>NVIDIA Dynamo<\/strong> is a distributed inference runtime for routing and orchestrating LLM<\/li><\/ul>\n<p>engines, including disaggregated prefill/decode and KV-aware routing.<\/p>\n<p>Saying \"Dynamo compiles the model across a cluster\" mixes two unrelated products.<\/p>\n<h2 id=\"engines-choose-for-the-workload\">Engines: choose for the workload<\/h2>\n<h3 id=\"vllm\">vLLM<\/h3>\n<p>Strong general-purpose LLM serving with paged KV-cache management, continuous batching, prefix caching, parallelism, and an OpenAI-compatible surface. Good default when model support, rapid iteration, and throughput matter.<\/p>\n<h3 id=\"sglang\">SGLang<\/h3>\n<p>LLM/VLM serving runtime with scheduling and prefix/KV reuse designed for structured and agentic workloads as well as general serving. Evaluate when request programs or repeated prefixes are important; benchmark against the same workload rather than comparing headline numbers.<\/p>\n<h3 id=\"tensorrt-llm-behind-triton\">TensorRT-LLM behind Triton<\/h3>\n<p>NVIDIA-focused path for aggressive kernel fusion, precision tuning, in-flight batching, parallel execution, and a managed serving surface. It can deliver excellent results on supported NVIDIA models/hardware, with more build/tuning/version-coupling work.<\/p>\n<h3 id=\"nvidia-dynamo-llm-d\">NVIDIA Dynamo / llm-d<\/h3>\n<p>Fleet-level systems for routing and distributed inference. They become relevant when one engine process is no longer the architecture: many replicas, KV-aware routing, separate prefill/decode pools, multi-node fabrics, and independent scaling. They add control-plane and KV-transfer complexity; they are not automatically better for a modest single-cluster service.<\/p>\n<h2 id=\"compilers-and-kernels\">Compilers and kernels<\/h2>\n<p><strong>TorchDynamo + TorchInductor:<\/strong> capture PyTorch graphs, fuse/lower operations, and generate CPU/GPU code (often using Triton language on GPU). Inspect graph breaks, guards, recompilation, compile time, memory, and numerical parity.<\/p>\n<p><strong>XLA:<\/strong> graph compiler used in ecosystems such as JAX and TensorFlow/XLA; performs whole-graph transformations and lowers to device code.<\/p>\n<p><strong>MLIR and LLVM:<\/strong> compiler infrastructure/IR layers used to build transformation and codegen pipelines. They are foundations, not turnkey serving engines.<\/p>\n<p><strong>CUTLASS:<\/strong> NVIDIA CUDA C++ templates/components for high-performance matrix operations. It is a building block for kernels and engines, useful when standard library paths do not match a specialized layout/epilogue.<\/p>\n<p><strong>CUDA Graphs:<\/strong> capture a stable sequence of GPU operations and replay it with far less CPU launch overhead. Best when shapes/control flow and memory addresses are sufficiently stable; dynamic request shapes can reduce capture coverage or require multiple graph variants.<\/p>\n<h2 id=\"what-building-a-custom-inference-engine-entails\">What building a custom inference engine entails<\/h2>\n<p>\"Custom engine\" is not just writing one CUDA kernel. It requires:<\/p>\n<ol><li>model import and operator coverage;<\/li><li>graph transformations, fusion, layout, precision and kernel selection;<\/li><li>memory planning and allocator behavior;<\/li><li>dynamic-shape/profile strategy;<\/li><li>KV-cache layout and scheduler for LLMs;<\/li><li>multi-GPU collectives and topology;<\/li><li>correctness across models/dtypes/shapes;<\/li><li>benchmarking, observability, failure handling and upgrades.<\/li><\/ol>\n<p>Start by profiling the existing engine, then replace the smallest dominant path with a custom kernel/plugin. Full engines are justified only when the performance or hardware requirement cannot be met by extending a maintained runtime.<\/p>\n<h2 id=\"decision-table\">Decision table<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Need<\/th><th>First candidate<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td>Fast OpenAI-compatible LLM service<\/td><td>vLLM or SGLang<\/td><td>serving features with quick iteration<\/td><\/tr><tr><td>Maximum NVIDIA-specific optimization<\/td><td>TensorRT-LLM + Triton<\/td><td>tuned kernels/precision/runtime<\/td><\/tr><tr><td>General PyTorch model speedup<\/td><td><code>torch.compile<\/code><\/td><td>low-friction graph capture and fusion<\/td><\/tr><tr><td>Stable tiny workload is launch-bound<\/td><td>CUDA Graphs<\/td><td>amortize CPU launch overhead<\/td><\/tr><tr><td>Multi-node disaggregated LLM fleet<\/td><td>Dynamo/llm-d class<\/td><td>routing, discovery, KV movement<\/td><\/tr><tr><td>Missing specialized GEMM/epilogue<\/td><td>CUTLASS/Triton/custom CUDA<\/td><td>targeted kernel extension<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Always qualify the choice with model support, hardware, latency/throughput SLO, engineering budget, debuggability, correctness, and upgrade burden.<\/p>\n<h2 id=\"interview-trap-questions\">Interview trap questions<\/h2>\n<p><strong>Q: Triton vs TensorRT?<\/strong> Clarify: Triton Inference Server is a serving platform; NVIDIA TensorRT is an optimization/ execution engine; the Triton programming language is a GPU kernel language/compiler. They can coexist in one stack.<\/p>\n<p><strong>Q: vLLM vs Kubernetes?<\/strong> They solve different layers. vLLM runs/schedules model inference; Kubernetes places, restarts, scales, and rolls the vLLM pods and their GPU nodes.<\/p>\n<p><strong>Q: Why not compile everything?<\/strong> Dynamic shapes/control flow, unsupported ops, graph breaks, compile latency, memory growth, and numerical risk can outweigh runtime gains. Profile and validate end-to-end.<\/p>\n<p><strong>Q: When does disaggregated prefill/decode lose?<\/strong> When the service is too small, phases do not need different scaling, or KV transfer/routing overhead exceeds the scheduling benefit—especially without a fast fabric.<\/p>\n<h2 id=\"primary-references\">Primary references<\/h2>\n<ul><li><a href=\"https://docs.pytorch.org/docs/stable/generated/torch.compile.html\" target=\"_blank\" rel=\"noopener\">PyTorch <code>torch.compile<\/code><\/a><\/li><li><a href=\"https://docs.vllm.ai/en/latest/serving/online_serving/\" target=\"_blank\" rel=\"noopener\">vLLM online serving<\/a><\/li><li><a href=\"https://docs.nvidia.com/dynamo/components/router/disaggregated-serving\" target=\"_blank\" rel=\"noopener\">NVIDIA Dynamo disaggregated serving<\/a><\/li><li><a href=\"https://docs.nvidia.com/deeplearning/triton-inference-server/user-guide/docs/\" target=\"_blank\" rel=\"noopener\">NVIDIA Triton Inference Server<\/a><\/li><li><a href=\"https://docs.nvidia.com/cutlass/\" target=\"_blank\" rel=\"noopener\">NVIDIA CUTLASS<\/a><\/li><\/ul>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"gpu-performance.md\" href=\"#\">GPU Performance &amp; Profiling<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-layer-map","text":"The layer map"},{"level":2,"id":"two-dynamos-that-are-not-the-same","text":"Two Dynamos that are not the same"},{"level":2,"id":"engines-choose-for-the-workload","text":"Engines: choose for the workload"},{"level":3,"id":"vllm","text":"vLLM"},{"level":3,"id":"sglang","text":"SGLang"},{"level":3,"id":"tensorrt-llm-behind-triton","text":"TensorRT-LLM behind Triton"},{"level":3,"id":"nvidia-dynamo-llm-d","text":"NVIDIA Dynamo / llm-d"},{"level":2,"id":"compilers-and-kernels","text":"Compilers and kernels"},{"level":2,"id":"what-building-a-custom-inference-engine-entails","text":"What building a custom inference engine entails"},{"level":2,"id":"decision-table","text":"Decision table"},{"level":2,"id":"interview-trap-questions","text":"Interview trap questions"},{"level":2,"id":"primary-references","text":"Primary references"}],"text":"the modern inference stack 💡 tl;dr vllm, sglang, triton, tensorrt-llm, torchdynamo, nvidia dynamo, xla, mlir, llvm, cutlass, and cuda graphs are not interchangeable competitors. they occupy different layers: frontend graph capture, compiler ir, kernels, inference engine, server, distributed runtime, and fleet orchestration. place each tool before comparing it. the layer map layer job examples model/framework express model and eager execution pytorch, tensorflow/jax graph capture/compiler frontend turn dynamic program into optimizable graph torchdynamo / torch.compile , torchscript/export compiler ir/backend transform, fuse, lower, generate code torchinductor, xla, mlir, llvm kernel library/codegen fast device operations cublas, cudnn, cutlass, triton language, flashattention optimized inference engine plan memory, kernels, precision, scheduling tensorrt, tensorrt-llm, vllm, sglang model server/api networking, model instances, metrics, batching surface triton inference server, vllm/sglang servers distributed llm runtime routing, discovery, kv-aware/disaggregated serving nvidia dynamo, llm-d cluster platform placement, rollout, scaling, health kubernetes, helm, gpu operator a product may combine layers. vllm is both engine and openai-compatible server. triton inference server can host a tensorrt/tensorrt-llm backend. \"triton\" can also mean the python- embedded gpu programming language/compiler used by torchinductor—clarify which one. two dynamos that are not the same torchdynamo is the graph-capture frontend behind torch.compile . it observes python bytecode, creates fx graphs guarded by runtime assumptions, and hands them to a backend such as torchinductor. graph breaks or recompilations can erase the gain. nvidia dynamo is a distributed inference runtime for routing and orchestrating llm engines, including disaggregated prefill/decode and kv-aware routing. saying \"dynamo compiles the model across a cluster\" mixes two unrelated products. engines: choose for the workload vllm strong general-purpose llm serving with paged kv-cache management, continuous batching, prefix caching, parallelism, and an openai-compatible surface. good default when model support, rapid iteration, and throughput matter. sglang llm/vlm serving runtime with scheduling and prefix/kv reuse designed for structured and agentic workloads as well as general serving. evaluate when request programs or repeated prefixes are important; benchmark against the same workload rather than comparing headline numbers. tensorrt-llm behind triton nvidia-focused path for aggressive kernel fusion, precision tuning, in-flight batching, parallel execution, and a managed serving surface. it can deliver excellent results on supported nvidia models/hardware, with more build/tuning/version-coupling work. nvidia dynamo / llm-d fleet-level systems for routing and distributed inference. they become relevant when one engine process is no longer the architecture: many replicas, kv-aware routing, separate prefill/decode pools, multi-node fabrics, and independent scaling. they add control-plane and kv-transfer complexity; they are not automatically better for a modest single-cluster service. compilers and kernels torchdynamo + torchinductor: capture pytorch graphs, fuse/lower operations, and generate cpu/gpu code (often using triton language on gpu). inspect graph breaks, guards, recompilation, compile time, memory, and numerical parity. xla: graph compiler used in ecosystems such as jax and tensorflow/xla; performs whole-graph transformations and lowers to device code. mlir and llvm: compiler infrastructure/ir layers used to build transformation and codegen pipelines. they are foundations, not turnkey serving engines. cutlass: nvidia cuda c++ templates/components for high-performance matrix operations. it is a building block for kernels and engines, useful when standard library paths do not match a specialized layout/epilogue. cuda graphs: capture a stable sequence of gpu operations and replay it with far less cpu launch overhead. best when shapes/control flow and memory addresses are sufficiently stable; dynamic request shapes can reduce capture coverage or require multiple graph variants. what building a custom inference engine entails \"custom engine\" is not just writing one cuda kernel. it requires: model import and operator coverage; graph transformations, fusion, layout, precision and kernel selection; memory planning and allocator behavior; dynamic-shape/profile strategy; kv-cache layout and scheduler for llms; multi-gpu collectives and topology; correctness across models/dtypes/shapes; benchmarking, observability, failure handling and upgrades. start by profiling the existing engine, then replace the smallest dominant path with a custom kernel/plugin. full engines are justified only when the performance or hardware requirement cannot be met by extending a maintained runtime. decision table need first candidate why fast openai-compatible llm service vllm or sglang serving features with quick iteration maximum nvidia-specific optimization tensorrt-llm + triton tuned kernels/precision/runtime general pytorch model speedup torch.compile low-friction graph capture and fusion stable tiny workload is launch-bound cuda graphs amortize cpu launch overhead multi-node disaggregated llm fleet dynamo/llm-d class routing, discovery, kv movement missing specialized gemm/epilogue cutlass/triton/custom cuda targeted kernel extension always qualify the choice with model support, hardware, latency/throughput slo, engineering budget, debuggability, correctness, and upgrade burden. interview trap questions q: triton vs tensorrt? clarify: triton inference server is a serving platform; nvidia tensorrt is an optimization/ execution engine; the triton programming language is a gpu kernel language/compiler. they can coexist in one stack. q: vllm vs kubernetes? they solve different layers. vllm runs/schedules model inference; kubernetes places, restarts, scales, and rolls the vllm pods and their gpu nodes. q: why not compile everything? dynamic shapes/control flow, unsupported ops, graph breaks, compile latency, memory growth, and numerical risk can outweigh runtime gains. profile and validate end-to-end. q: when does disaggregated prefill/decode lose? when the service is too small, phases do not need different scaling, or kv transfer/routing overhead exceeds the scheduling benefit—especially without a fast fabric. primary references pytorch torch.compile vllm online serving nvidia dynamo disaggregated serving nvidia triton inference server nvidia cutlass → next: gpu performance & profiling","words":864},{"path":"12-nvidia-model-optimization/gpu-performance.md","title":"GPU Performance & Profiling","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"gpu-performance-profiling\">GPU Performance &amp; Profiling<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Speed on a GPU comes down to one question: <strong>is this kernel limited by compute, by memory bandwidth, or by overhead?<\/strong> The <strong>roofline model<\/strong> answers it, <strong>Nsight<\/strong> proves it, and the answer tells you which optimization will actually help. Your project already hit this — the \"GPU is idle\" mystery was an overhead/data-feeding bound, not a compute bound.<\/div><\/div>\n<h2 id=\"gpu-architecture-in-one-screen\">GPU architecture in one screen<\/h2>\n<ul><li><strong>SMs (Streaming Multiprocessors)<\/strong> — the GPU's cores; each runs many threads. A 3070 Ti<\/li><\/ul>\n<p>has ~48 SMs.<\/p>\n<ul><li><strong>Warps<\/strong> — threads execute in lockstep groups of <strong>32<\/strong> (SIMT). Divergent branches within<\/li><\/ul>\n<p>a warp serialize — that's <strong>warp divergence<\/strong>.<\/p>\n<ul><li><strong>Tensor Cores<\/strong> — dedicated matrix-multiply-accumulate units (FP16/BF16/TF32/FP8/INT8).<\/li><\/ul>\n<p>They are <em>why<\/em> reduced precision is fast; they do a small matmul per instruction.<\/p>\n<ul><li><strong>Memory hierarchy<\/strong> (fast→slow, small→large): registers → <strong>shared memory / L1<\/strong> (per-SM,<\/li><\/ul>\n<p>programmer-managed) → <strong>L2<\/strong> (shared) → <strong>global memory / HBM/GDDR<\/strong> (GBs, but hundreds of   cycles latency).<\/p>\n<ul><li><strong>Occupancy<\/strong> — how many warps are resident per SM vs the max. Higher occupancy hides<\/li><\/ul>\n<p>memory latency by having other warps to run while some wait.<\/p>\n<p>The performance mantra: <strong>keep the tensor cores fed and minimize trips to global memory.<\/strong><\/p>\n<h2 id=\"the-roofline-model-the-framing-to-lead-with\">The roofline model (the framing to lead with)<\/h2>\n<p>Every kernel has an <strong>arithmetic intensity<\/strong> = FLOPs performed per byte moved from memory. Achievable performance is:<\/p>\n<div class=\"formula\">\n  <div class=\"frow\"><span class=\"fexpr\">perf = min( <span class=\"fv\">peak_compute<\/span>,  <span class=\"fv\">memory_bandwidth<\/span> × <span class=\"fv\">arithmetic_intensity<\/span> )<\/span><\/div>\n<\/div>\n<div class=\"diagram\">\n  <svg class=\"plotfig\" viewBox=\"0 0 560 300\" preserveAspectRatio=\"xMidYMid meet\" role=\"img\" aria-label=\"Roofline model\">\n    <line class=\"plot-axis\" x1=\"58\" y1=\"30\" x2=\"58\" y2=\"250\"/>\n    <line class=\"plot-axis\" x1=\"58\" y1=\"250\" x2=\"540\" y2=\"250\"/>\n    <!-- memory-bound diagonal (slope = bandwidth) -->\n    <path class=\"plot-mem\" d=\"M58 250 L255 95\"/>\n    <!-- compute-bound ceiling -->\n    <path class=\"plot-line\" d=\"M255 95 L532 95\"/>\n    <!-- ridge point marker -->\n    <line class=\"plot-dash\" x1=\"255\" y1=\"95\" x2=\"255\" y2=\"250\"/>\n    <circle cx=\"255\" cy=\"95\" r=\"4.5\" fill=\"var(--sec-accent,var(--accent))\"/>\n    <text class=\"plot-txt lead\" x=\"300\" y=\"86\">compute-bound ceiling<\/text>\n    <text class=\"plot-txt\" x=\"300\" y=\"102\">peak tensor-core FLOP/s<\/text>\n    <text class=\"plot-txt lead\" x=\"70\" y=\"175\" transform=\"rotate(-32 70 175)\">memory-bound<\/text>\n    <text class=\"plot-txt\" x=\"72\" y=\"190\" transform=\"rotate(-32 72 190)\">slope = bandwidth<\/text>\n    <text class=\"plot-txt\" x=\"255\" y=\"268\" text-anchor=\"middle\">ridge point<\/text>\n    <text class=\"plot-txt lead\" x=\"34\" y=\"40\" transform=\"rotate(-90 34 40)\" text-anchor=\"end\">FLOP/s<\/text>\n    <text class=\"plot-txt\" x=\"300\" y=\"288\" text-anchor=\"middle\">arithmetic intensity (FLOP / byte) →<\/text>\n  <\/svg>\n  <div class=\"flow-foot\">Left of the ridge you're starved for <b>bytes<\/b> (memory-bound); right of it you're saturating the <b>math units<\/b> (compute-bound). The knee is where they balance.<\/div>\n<\/div>\n<ul><li><strong>Low intensity → memory-bound.<\/strong> You're waiting on bytes. Fixes: fuse ops (avoid<\/li><\/ul>\n<p>re-reading), better data layout/coalescing, lower precision (fewer bytes), bigger reuse.<\/p>\n<ul><li><strong>High intensity → compute-bound.<\/strong> You're saturating the math units. Fixes: tensor cores,<\/li><\/ul>\n<p>lower precision, better tiling.<\/p>\n<ul><li><strong>Elementwise ops (ReLU, add, norm) are almost always memory-bound<\/strong> — barely any math per<\/li><\/ul>\n<p>byte. This is why <strong>fusion<\/strong> (do them without a round-trip to HBM) is such a big lever, and   why TensorRT fuses aggressively.<\/p>\n<h2 id=\"why-your-gpu-is-idle-was-neither-compute-nor-memory-bound\">Why your \"GPU is idle\" was neither compute nor memory bound<\/h2>\n<p>Your issue #3: tiny 28×28 images + a small model → the GPU finishes a batch in ~1 ms and sits waiting. That's a <strong>third regime the roofline doesn't show: overhead-bound.<\/strong> Two flavors:<\/p>\n<ul><li><strong>Input/data-feeding bound<\/strong> — the dataloader can't produce batches fast enough (your<\/li><\/ul>\n<p>actual bug; fixed with <code>num_workers<\/code>, <code>pin_memory<\/code>, <code>prefetch<\/code>, <code>non_blocking<\/code>, bigger   batch). The GPU starves.<\/p>\n<ul><li><strong>Kernel-launch-bound<\/strong> — each CUDA kernel launch costs a few microseconds of CPU→GPU<\/li><\/ul>\n<p>overhead; for a tiny model the launches cost more than the math. <strong>CUDA Graphs<\/strong> fix this   by capturing the whole launch sequence once and replaying it as a single unit.<\/p>\n<p>Interview-ready: <em>\"On that model, low <code>nvidia-smi<\/code> utilization wasn't a compute problem — the kernels were too small to saturate anything, so it was launch/feed overhead. I'd confirm with Nsight Systems and, if it were latency-critical, use CUDA Graphs to kill launch overhead and larger batches to amortize it.\"<\/em><\/p>\n<p>That reframes a debugging story as a <strong>performance-analysis story<\/strong> — exactly the NVIDIA register.<\/p>\n<h2 id=\"profiling-name-the-right-tool\">Profiling: name the right tool<\/h2>\n<ul><li><strong>Nsight Systems (<code>nsys<\/code>)<\/strong> — <strong>timeline / system-level.<\/strong> Shows CPU vs GPU activity,<\/li><\/ul>\n<p>kernel gaps, memcpy, stream overlap. Use it to answer <em>\"is the GPU even busy, and what's it   waiting on?\"<\/em> This is what actually diagnoses your data-feeding stall.<\/p>\n<ul><li><strong>Nsight Compute (<code>ncu<\/code>)<\/strong> — <strong>per-kernel deep dive.<\/strong> Gives you the roofline placement,<\/li><\/ul>\n<p>occupancy, memory-vs-compute breakdown for a single kernel. Use it once you know <em>which<\/em>   kernel is the bottleneck.<\/p>\n<ul><li><strong><code>trtexec<\/code><\/strong> — quick engine-level latency/throughput for TensorRT.<\/li><li><strong>PyTorch profiler<\/strong> / <code>torch.cuda.Event<\/code> — framework-level timing.<\/li><li><strong><code>nvidia-smi<\/code> / <code>dcgm<\/code><\/strong> — coarse utilization &amp; memory; good for \"is it on the GPU,\" bad<\/li><\/ul>\n<p>for \"why is it slow\" (utilization % is misleading, as your project showed).<\/p>\n<p>The discipline (same as everywhere): <strong>profile first, attack the biggest bar, re-measure.<\/strong><\/p>\n<h2 id=\"measuring-gpu-latency-correctly-a-common-trap\">Measuring GPU latency correctly (a common trap)<\/h2>\n<p>Naive Python timing around a CUDA call measures nothing — kernels are <strong>asynchronous<\/strong>. Do it right:<\/p>\n<pre><code class=\"language-python\">torch.cuda.synchronize()               <span class=\"tok-comment\"># or use CUDA events<\/span>\nstart = torch.cuda.Event(enable_timing=<span class=\"tok-keyword\">True<\/span>); end = torch.cuda.Event(enable_timing=<span class=\"tok-keyword\">True<\/span>)\n<span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(warmup): model(x)       <span class=\"tok-comment\"># warm up: first calls JIT/autotune/allocate<\/span>\ntorch.cuda.synchronize()\nstart.record()\n<span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(iters): model(x)\nend.record(); torch.cuda.synchronize()\nms = start.elapsed_time(end) / iters<\/code><\/pre>\n<p>Key points to say out loud:<\/p>\n<ul><li><strong>Synchronize<\/strong> before and after (kernels are async).<\/li><li><strong>Warm up<\/strong> — first iterations pay one-time costs (your <code>benchmark_latency<\/code> warmup(10) is exactly this).<\/li><li>Report <strong>p50/p99, not just mean.<\/strong><\/li><li>Ideally <strong>lock clocks<\/strong> (<code>nvidia-smi -lgc<\/code>) so boost/thermal drift doesn't add noise.<\/li><\/ul>\n<p>Your <code>itertools.cycle<\/code> fix (issue #6) is the same discipline — never let the harness run short.<\/p>\n<h2 id=\"cuda-streams-overlap\">CUDA streams &amp; overlap<\/h2>\n<p>A <strong>stream<\/strong> is an ordered queue of GPU work; independent streams run concurrently. The wins:<\/p>\n<ul><li><strong>Overlap H2D/D2H copies with compute<\/strong> — copy the next batch while computing this one (what<\/li><\/ul>\n<p><code>pin_memory<\/code> + <code>non_blocking=True<\/code> enable, which you already used).<\/p>\n<ul><li><strong>Run independent kernels in parallel.<\/strong><\/li><\/ul>\n<p>Triton uses multiple streams/instances to raise utilization the same way.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>Nsight Systems / Nsight Compute<\/strong> for profiling, <strong><code>trtexec<\/code><\/strong> for engine latency, <strong>CUDA Graphs<\/strong> for launch-bound models, <strong>DCGM<\/strong> for fleet monitoring. The concepts (roofline, occupancy, coalescing, fusion) are framework-agnostic and show up whether you're writing CUDA, tuning TensorRT, or debugging a dataloader.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"My small model was overhead-bound, not compute-bound — I'd verify on an Nsight Systems timeline, then fix the feed with more dataloader workers and, if latency mattered, CUDA Graphs. For a big model I'd use Nsight Compute's roofline to see if it's memory- or compute-bound before choosing between fusion and lower precision.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Roofline: what decides compute- vs memory-bound? *(arithmetic intensity = FLOPs/byte vs the<\/li><\/ul>\n<p>ridge point; low intensity → memory-bound.)*<\/p>\n<ul><li>Why are elementwise ops memory-bound, and what's the fix? *(tiny math per byte → bandwidth<\/li><\/ul>\n<p>limited; fuse them to avoid re-reading from global memory.)*<\/p>\n<ul><li>Nsight Systems vs Nsight Compute? *(Systems = timeline/\"is the GPU busy &amp; waiting on what\";<\/li><\/ul>\n<p>Compute = single-kernel roofline/occupancy deep dive.)*<\/p>\n<ul><li>Why is naive timing of a CUDA call wrong? *(kernels are async — you must synchronize and<\/li><\/ul>\n<p>warm up, and report p99 not just mean.)*<\/p>","toc":[{"level":2,"id":"gpu-architecture-in-one-screen","text":"GPU architecture in one screen"},{"level":2,"id":"the-roofline-model-the-framing-to-lead-with","text":"The roofline model (the framing to lead with)"},{"level":2,"id":"why-your-gpu-is-idle-was-neither-compute-nor-memory-bound","text":"Why your \"GPU is idle\" was neither compute nor memory bound"},{"level":2,"id":"profiling-name-the-right-tool","text":"Profiling: name the right tool"},{"level":2,"id":"measuring-gpu-latency-correctly-a-common-trap","text":"Measuring GPU latency correctly (a common trap)"},{"level":2,"id":"cuda-streams-overlap","text":"CUDA streams &amp; overlap"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"gpu performance & profiling 💡 tl;dr speed on a gpu comes down to one question: is this kernel limited by compute, by memory bandwidth, or by overhead? the roofline model answers it, nsight proves it, and the answer tells you which optimization will actually help. your project already hit this — the \"gpu is idle\" mystery was an overhead/data-feeding bound, not a compute bound. gpu architecture in one screen sms (streaming multiprocessors) — the gpu's cores; each runs many threads. a 3070 ti has ~48 sms. warps — threads execute in lockstep groups of 32 (simt). divergent branches within a warp serialize — that's warp divergence . tensor cores — dedicated matrix-multiply-accumulate units (fp16/bf16/tf32/fp8/int8). they are why reduced precision is fast; they do a small matmul per instruction. memory hierarchy (fast→slow, small→large): registers → shared memory / l1 (per-sm, programmer-managed) → l2 (shared) → global memory / hbm/gddr (gbs, but hundreds of cycles latency). occupancy — how many warps are resident per sm vs the max. higher occupancy hides memory latency by having other warps to run while some wait. the performance mantra: keep the tensor cores fed and minimize trips to global memory. the roofline model (the framing to lead with) every kernel has an arithmetic intensity = flops performed per byte moved from memory. achievable performance is: perf = min( peak_compute , memory_bandwidth × arithmetic_intensity ) compute-bound ceiling peak tensor-core flop/s memory-bound slope = bandwidth ridge point flop/s arithmetic intensity (flop / byte) → left of the ridge you're starved for bytes (memory-bound); right of it you're saturating the math units (compute-bound). the knee is where they balance. low intensity → memory-bound. you're waiting on bytes. fixes: fuse ops (avoid re-reading), better data layout/coalescing, lower precision (fewer bytes), bigger reuse. high intensity → compute-bound. you're saturating the math units. fixes: tensor cores, lower precision, better tiling. elementwise ops (relu, add, norm) are almost always memory-bound — barely any math per byte. this is why fusion (do them without a round-trip to hbm) is such a big lever, and why tensorrt fuses aggressively. why your \"gpu is idle\" was neither compute nor memory bound your issue #3: tiny 28×28 images + a small model → the gpu finishes a batch in ~1 ms and sits waiting. that's a third regime the roofline doesn't show: overhead-bound. two flavors: input/data-feeding bound — the dataloader can't produce batches fast enough (your actual bug; fixed with num_workers , pin_memory , prefetch , non_blocking , bigger batch). the gpu starves. kernel-launch-bound — each cuda kernel launch costs a few microseconds of cpu→gpu overhead; for a tiny model the launches cost more than the math. cuda graphs fix this by capturing the whole launch sequence once and replaying it as a single unit. interview-ready: \"on that model, low nvidia-smi utilization wasn't a compute problem — the kernels were too small to saturate anything, so it was launch/feed overhead. i'd confirm with nsight systems and, if it were latency-critical, use cuda graphs to kill launch overhead and larger batches to amortize it.\" that reframes a debugging story as a performance-analysis story — exactly the nvidia register. profiling: name the right tool nsight systems ( nsys ) — timeline / system-level. shows cpu vs gpu activity, kernel gaps, memcpy, stream overlap. use it to answer \"is the gpu even busy, and what's it waiting on?\" this is what actually diagnoses your data-feeding stall. nsight compute ( ncu ) — per-kernel deep dive. gives you the roofline placement, occupancy, memory-vs-compute breakdown for a single kernel. use it once you know which kernel is the bottleneck. trtexec — quick engine-level latency/throughput for tensorrt. pytorch profiler / torch.cuda.event — framework-level timing. nvidia-smi / dcgm — coarse utilization & memory; good for \"is it on the gpu,\" bad for \"why is it slow\" (utilization % is misleading, as your project showed). the discipline (same as everywhere): profile first, attack the biggest bar, re-measure. measuring gpu latency correctly (a common trap) naive python timing around a cuda call measures nothing — kernels are asynchronous . do it right: torch.cuda.synchronize() # or use cuda events start = torch.cuda.event(enable_timing= true ); end = torch.cuda.event(enable_timing= true ) for _ in range (warmup): model(x) # warm up: first calls jit/autotune/allocate torch.cuda.synchronize() start.record() for _ in range (iters): model(x) end.record(); torch.cuda.synchronize() ms = start.elapsed_time(end) / iters key points to say out loud: synchronize before and after (kernels are async). warm up — first iterations pay one-time costs (your benchmark_latency warmup(10) is exactly this). report p50/p99, not just mean. ideally lock clocks ( nvidia-smi -lgc ) so boost/thermal drift doesn't add noise. your itertools.cycle fix (issue #6) is the same discipline — never let the harness run short. cuda streams & overlap a stream is an ordered queue of gpu work; independent streams run concurrently. the wins: overlap h2d/d2h copies with compute — copy the next batch while computing this one (what pin_memory + non_blocking=true enable, which you already used). run independent kernels in parallel. triton uses multiple streams/instances to raise utilization the same way. 🔗 connecting the dots: the real stack nsight systems / nsight compute for profiling, trtexec for engine latency, cuda graphs for launch-bound models, dcgm for fleet monitoring. the concepts (roofline, occupancy, coalescing, fusion) are framework-agnostic and show up whether you're writing cuda, tuning tensorrt, or debugging a dataloader. how you'd say it: \"my small model was overhead-bound, not compute-bound — i'd verify on an nsight systems timeline, then fix the feed with more dataloader workers and, if latency mattered, cuda graphs. for a big model i'd use nsight compute's roofline to see if it's memory- or compute-bound before choosing between fusion and lower precision.\" self-check roofline: what decides compute- vs memory-bound? *(arithmetic intensity = flops/byte vs the ridge point; low intensity → memory-bound.)* why are elementwise ops memory-bound, and what's the fix? *(tiny math per byte → bandwidth limited; fuse them to avoid re-reading from global memory.)* nsight systems vs nsight compute? *(systems = timeline/\"is the gpu busy & waiting on what\"; compute = single-kernel roofline/occupancy deep dive.)* why is naive timing of a cuda call wrong? *(kernels are async — you must synchronize and warm up, and report p99 not just mean.)*","words":1030},{"path":"12-nvidia-model-optimization/sparsity-pruning-distillation.md","title":"Sparsity, Pruning & Distillation","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"sparsity-pruning-distillation\">Sparsity, Pruning &amp; Distillation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Three ways to shrink the model itself rather than the number format. <strong>Pruning<\/strong> removes weights; <strong>structured 2:4 sparsity<\/strong> is the pruning pattern NVIDIA hardware can actually accelerate; <strong>distillation<\/strong> trains a small student to copy a big teacher. Quantization (previous pages) is usually the first reach; these are how you get a <em>fundamentally<\/em> smaller or sparser model.<\/div><\/div>\n<h2 id=\"pruning-unstructured-vs-structured\">Pruning: unstructured vs structured<\/h2>\n<ul><li><strong>Unstructured pruning<\/strong> — zero out individual low-magnitude weights anywhere. You can<\/li><\/ul>\n<p>reach very high sparsity with little accuracy loss, <strong>but a random scatter of zeros doesn't   speed up dense GPU kernels<\/strong> — the hardware still multiplies by zero. It only helps if you   have sparse kernels or you're compressing for storage/transfer.<\/p>\n<ul><li><strong>Structured pruning<\/strong> — remove whole <strong>channels, filters, or heads<\/strong>. This shrinks the<\/li><\/ul>\n<p>actual tensor dimensions, so <em>any<\/em> dense kernel gets faster — no special hardware needed.   The cost is it's coarser, so it usually needs fine-tuning to recover accuracy.<\/p>\n<p>The one-liner: <em>\"Unstructured prunes more but doesn't speed up dense GPUs; structured prunes less but actually shrinks the compute. I'd pick structured for latency, then fine-tune.\"<\/em><\/p>\n<h2 id=\"24-structured-sparsity-the-nvidia-specific-one\">2:4 structured sparsity (the NVIDIA-specific one)<\/h2>\n<p>Ampere (A100) and newer have <strong>sparse tensor cores<\/strong> that accelerate a specific pattern: <strong>in every contiguous group of 4 weights, at most 2 are non-zero<\/strong> (aka \"2:4\" or fine-grained structured sparsity). The hardware stores only the 2 non-zeros + a 2-bit index and skips the zeros, giving <strong>up to 2× matmul throughput<\/strong>.<\/p>\n<div class=\"compare\">\n  <div class=\"cmp-col\">\n    <div class=\"cmp-h\">Dense<\/div>\n    <p><span class=\"fexpr\">[ w0 w1 w2 w3 ]<\/span><\/p>\n    <span class=\"cmp-tag\">4 multiplies<\/span>\n  <\/div>\n  <div class=\"cmp-col accent\">\n    <div class=\"cmp-h\">2:4 structured sparse<\/div>\n    <p><span class=\"fexpr\">[ w0 <span class=\"fv\">0<\/span> w2 <span class=\"fv\">0<\/span> ]<\/span><\/p>\n    <span class=\"cmp-tag\">2 multiplies on sparse tensor cores · ≈2×<\/span>\n  <\/div>\n<\/div>\n<p><strong>Workflow:<\/strong> train dense → prune to the 2:4 mask → <strong>fine-tune<\/strong> to recover accuracy → run on sparse tensor cores (TensorRT + <code>apex<\/code>/<code>ASP<\/code> support it).<\/p>\n<p><strong>Why it matters:<\/strong> it's the rare pruning scheme with a <strong>guaranteed hardware speedup<\/strong>, so it's a likely question. Know that it's <strong>50% structured<\/strong>, needs a fine-tune step, and stacks with INT8/FP8.<\/p>\n<h2 id=\"knowledge-distillation\">Knowledge distillation<\/h2>\n<p>Train a large accurate <strong>teacher<\/strong>, then train a small <strong>student<\/strong> to match the teacher's <strong>soft outputs<\/strong> — the full probability distribution, \"softened\" by a temperature <code>T<\/code> — not just the hard labels.<\/p>\n<p>Why soft targets help: they carry <strong>dark knowledge<\/strong> — how the teacher spreads probability across classes (\"this 4 looks a bit like a 9\") — which is far richer supervision than a one-hot label.<\/p>\n<div class=\"formula\">\n  <div class=\"frow\"><span class=\"fexpr\">loss = <span class=\"fv\">α<\/span> · CE(student, hard_labels) + (1−<span class=\"fv\">α<\/span>) · <span class=\"fv\">T²<\/span> · KL(student_T ‖ teacher_T)<\/span><\/div>\n  <div class=\"frow\"><span class=\"fnote\">hard-label term + temperature-softened distillation term<\/span><\/div>\n<\/div>\n<ul><li><strong>Temperature <code>T<\/code>&gt;1<\/strong> softens both distributions so small logit differences matter; the<\/li><\/ul>\n<p><code>T²<\/code> term keeps gradient magnitudes comparable.<\/p>\n<ul><li>Variants: <strong>response-based<\/strong> (match logits, above), <strong>feature-based<\/strong> (match intermediate<\/li><\/ul>\n<p>activations), <strong>relation-based<\/strong> (match relationships between layers/samples).<\/p>\n<ul><li>This is how DistilBERT, TinyBERT, and most on-device models are made — and how big LLMs are<\/li><\/ul>\n<p>distilled into small deployable ones.<\/p>\n<h2 id=\"choosing-and-stacking\">Choosing and stacking<\/h2>\n<p>They're complementary, and the standard production recipe stacks them:<\/p>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <span class=\"node\">distill<span class=\"nsub\">smaller architecture — a fundamental size cut<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">prune <span class=\"nsub\">2:4 structured — fewer effective weights, hardware-accelerated<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">quantize <span class=\"nsub\">INT8 / FP8 — cheaper per-op<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node out\">compile <span class=\"nsub\">TensorRT — fuse + pick kernels for the target GPU<\/span><\/span>\n  <\/div>\n  <div class=\"diagram-cap\">Stack them: each stage compounds the last for a smaller, faster model.<\/div>\n<\/div>\n<p>The instinct to voice: <em>\"Quantization first — cheapest big win. Distillation when I need a genuinely smaller model, not just cheaper ops. Structured/2:4 pruning when I want hardware speedup and can fine-tune. Always re-measure accuracy after each step, and compile last.\"<\/em><\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>PyTorch<\/strong> <code>torch.nn.utils.prune<\/code>, NVIDIA <strong>ASP / apex<\/strong> for 2:4, <strong>TensorRT<\/strong> to run sparse+INT8 engines; <strong>HuggingFace<\/strong> for distillation (DistilBERT). NVIDIA <strong>TensorRT-Model-Optimizer<\/strong> bundles quantization + sparsity + distillation in one toolkit — worth naming as \"the NVIDIA way to combine all of these.\"<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Beyond the quantization in my project, the next levers are structured 2:4 sparsity for a real hardware 2× on Ampere+, and distillation if I need a smaller architecture rather than a cheaper one — all stackable, all followed by an accuracy re-check and a TensorRT compile.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why doesn't unstructured pruning speed up a normal GPU? *(scattered zeros still go through<\/li><\/ul>\n<p>dense kernels; you need sparse kernels/hardware or structured pruning.)*<\/p>\n<ul><li>What is 2:4 sparsity and what does it buy? *(≤2 non-zeros per group of 4 → sparse tensor<\/li><\/ul>\n<p>cores skip the zeros for up to 2× matmul, after a fine-tune.)*<\/p>\n<ul><li>Why do soft targets beat hard labels in distillation? *(\"dark knowledge\" — the teacher's<\/li><\/ul>\n<p>probability spread across classes is richer supervision than one-hot.)*<\/p>\n<ul><li>What order would you stack these techniques? *(distill → prune → quantize → compile,<\/li><\/ul>\n<p>re-measuring accuracy each step.)*<\/p>","toc":[{"level":2,"id":"pruning-unstructured-vs-structured","text":"Pruning: unstructured vs structured"},{"level":2,"id":"24-structured-sparsity-the-nvidia-specific-one","text":"2:4 structured sparsity (the NVIDIA-specific one)"},{"level":2,"id":"knowledge-distillation","text":"Knowledge distillation"},{"level":2,"id":"choosing-and-stacking","text":"Choosing and stacking"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"sparsity, pruning & distillation 💡 tl;dr three ways to shrink the model itself rather than the number format. pruning removes weights; structured 2:4 sparsity is the pruning pattern nvidia hardware can actually accelerate; distillation trains a small student to copy a big teacher. quantization (previous pages) is usually the first reach; these are how you get a fundamentally smaller or sparser model. pruning: unstructured vs structured unstructured pruning — zero out individual low-magnitude weights anywhere. you can reach very high sparsity with little accuracy loss, but a random scatter of zeros doesn't speed up dense gpu kernels — the hardware still multiplies by zero. it only helps if you have sparse kernels or you're compressing for storage/transfer. structured pruning — remove whole channels, filters, or heads . this shrinks the actual tensor dimensions, so any dense kernel gets faster — no special hardware needed. the cost is it's coarser, so it usually needs fine-tuning to recover accuracy. the one-liner: \"unstructured prunes more but doesn't speed up dense gpus; structured prunes less but actually shrinks the compute. i'd pick structured for latency, then fine-tune.\" 2:4 structured sparsity (the nvidia-specific one) ampere (a100) and newer have sparse tensor cores that accelerate a specific pattern: in every contiguous group of 4 weights, at most 2 are non-zero (aka \"2:4\" or fine-grained structured sparsity). the hardware stores only the 2 non-zeros + a 2-bit index and skips the zeros, giving up to 2× matmul throughput . dense [ w0 w1 w2 w3 ] 4 multiplies 2:4 structured sparse [ w0 0 w2 0 ] 2 multiplies on sparse tensor cores · ≈2× workflow: train dense → prune to the 2:4 mask → fine-tune to recover accuracy → run on sparse tensor cores (tensorrt + apex / asp support it). why it matters: it's the rare pruning scheme with a guaranteed hardware speedup , so it's a likely question. know that it's 50% structured , needs a fine-tune step, and stacks with int8/fp8. knowledge distillation train a large accurate teacher , then train a small student to match the teacher's soft outputs — the full probability distribution, \"softened\" by a temperature t — not just the hard labels. why soft targets help: they carry dark knowledge — how the teacher spreads probability across classes (\"this 4 looks a bit like a 9\") — which is far richer supervision than a one-hot label. loss = α · ce(student, hard_labels) + (1− α ) · t² · kl(student_t ‖ teacher_t) hard-label term + temperature-softened distillation term temperature t >1 softens both distributions so small logit differences matter; the t² term keeps gradient magnitudes comparable. variants: response-based (match logits, above), feature-based (match intermediate activations), relation-based (match relationships between layers/samples). this is how distilbert, tinybert, and most on-device models are made — and how big llms are distilled into small deployable ones. choosing and stacking they're complementary, and the standard production recipe stacks them: distill smaller architecture — a fundamental size cut prune 2:4 structured — fewer effective weights, hardware-accelerated quantize int8 / fp8 — cheaper per-op compile tensorrt — fuse + pick kernels for the target gpu stack them: each stage compounds the last for a smaller, faster model. the instinct to voice: \"quantization first — cheapest big win. distillation when i need a genuinely smaller model, not just cheaper ops. structured/2:4 pruning when i want hardware speedup and can fine-tune. always re-measure accuracy after each step, and compile last.\" 🔗 connecting the dots: the real stack pytorch torch.nn.utils.prune , nvidia asp / apex for 2:4, tensorrt to run sparse+int8 engines; huggingface for distillation (distilbert). nvidia tensorrt-model-optimizer bundles quantization + sparsity + distillation in one toolkit — worth naming as \"the nvidia way to combine all of these.\" how you'd say it: \"beyond the quantization in my project, the next levers are structured 2:4 sparsity for a real hardware 2× on ampere+, and distillation if i need a smaller architecture rather than a cheaper one — all stackable, all followed by an accuracy re-check and a tensorrt compile.\" self-check why doesn't unstructured pruning speed up a normal gpu? *(scattered zeros still go through dense kernels; you need sparse kernels/hardware or structured pruning.)* what is 2:4 sparsity and what does it buy? *(≤2 non-zeros per group of 4 → sparse tensor cores skip the zeros for up to 2× matmul, after a fine-tune.)* why do soft targets beat hard labels in distillation? *(\"dark knowledge\" — the teacher's probability spread across classes is richer supervision than one-hot.)* what order would you stack these techniques? *(distill → prune → quantize → compile, re-measuring accuracy each step.)*","words":765},{"path":"12-nvidia-model-optimization/llm-inference.md","title":"LLM Inference Optimization","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"llm-inference-optimization\">LLM Inference Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/spa

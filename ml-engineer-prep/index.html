ume,   customizable, but you run the GPUs. <em>Axis for regulated/on-prem work:<\/em> privacy usually   forces self-hosting.<\/p>\n<ul><li><strong>Bigger context vs RAG<\/strong> — <em>Axis: cost + relevance.<\/em> Stuffing everything into a huge context<\/li><\/ul>\n<p>is simple but expensive and dilutes attention. RAG retrieves only what's relevant → cheaper,   sharper, and cites sources. <em>Wrong pick:<\/em> paying for 100k tokens when top-5 chunks would do.<\/p>\n<h2 id=\"how-youd-say-it\">How you'd say it<\/h2>\n<p><em>\"For almost every one of these I start from the axis the decision turns on, default to the simpler and cheaper option — batch over streaming, boosting over deep nets on tables, prompt before RAG before fine-tuning — and only add complexity when the requirement forces it. Then I name what the wrong pick actually costs. That framing matters more than any single verdict, because the numbers change but the axis doesn't.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What three beats does every \"X vs Y\" answer need? *(the deciding axis; the rule + simpler<\/li><\/ul>\n<p>default; the wrong-pick failure mode.)*<\/p>\n<ul><li>RAG vs fine-tuning — the axis and the classic mistake? *(axis = knowledge vs behavior;<\/li><\/ul>\n<p>mistake = fine-tuning to add facts.)*<\/p>\n<ul><li>Data vs model parallelism — the deciding axis? <em>(does the model fit on one GPU.)<\/em><\/li><li>Why default to batch serving and undersampling-with-care? *(cheaper/simpler; and oversampling<\/li><\/ul>\n<p>before the split leaks duplicates.)*<\/p>\n<ul><li>Spot vs on-demand — the one word that decides it? <em>(interruptibility.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"the-universal-template","text":"The universal template"},{"level":2,"id":"modeling","text":"Modeling"},{"level":2,"id":"metrics","text":"Metrics"},{"level":2,"id":"data","text":"Data"},{"level":2,"id":"experimentation","text":"Experimentation"},{"level":2,"id":"mlops-serving","text":"MLOps &amp; serving"},{"level":2,"id":"monitoring","text":"Monitoring"},{"level":2,"id":"cloud-optimization","text":"Cloud &amp; optimization"},{"level":2,"id":"generative-ai","text":"Generative AI"},{"level":2,"id":"how-youd-say-it","text":"How you'd say it"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"decision tradeoffs — \"why x over y\" 💡 tl;dr interviewers rarely ask \"what is x\" — they ask \"x or y, and why?\" the strong answer always names the one axis the decision turns on , picks the simpler/cheaper option by default , and states the failure mode of the wrong pick . this page is every canonical head-to-head in the pack, compressed to that shape. master the axis , not the memorized verdict. the universal template any \"x vs y\" question answers in three beats: the deciding axis — \"this comes down to «latency / data size / freshness / cost / how much labeled data i have».\" the rule + default — \"i default to «the simpler one» and only reach for «the complex one» when «the axis» demands it.\" the wrong-pick cost — \"pick the other one and you pay «the specific failure».\" say the axis out loud before the verdict. that's what separates \"i memorized the answer\" from \"i understand the tradeoff.\" modeling gradient boosting vs deep learning — axis: data type. tabular/structured → boosting (xgboost/lightgbm): more accurate, less tuning, no scaling, trains on a cpu. unstructured (images, text, audio) or huge data → deep learning. wrong pick: a neural net on a 50k-row table — slower, worse, and harder to explain than one xgboost line. bagging vs boosting — axis: is your error variance or bias? bagging (random forest) = parallel trees averaged → cuts variance , robust, little tuning. boosting = sequential trees fixing prior errors → cuts bias , top accuracy, careful tuning. wrong pick: over-pushed boosting overfits; a forest plateaus below what boosting could reach. l1 vs l2 regularization — axis: do you want feature selection? l1 (lasso) drives weights to exactly zero → sparse, built-in selection. l2 (ridge) shrinks smoothly → keeps all features, handles correlated ones better. tie-breaker: elasticnet blends both. more layers/params vs more data — axis: are you underfitting or overfitting? underfit (poor on both train and test) → more capacity/features. overfit (great train, poor test) → more data, regularization, simpler model. wrong pick: adding capacity to an overfit model makes it worse. metrics precision vs recall — axis: which error is costlier? precision when false positives hurt (spam filter eating real mail). recall when misses hurt (cancer screening, fraud). wrong pick: optimizing precision on a cancer detector quietly ships false negatives. accuracy vs f1/pr-auc — axis: class balance. balanced → accuracy is fine. imbalanced → accuracy lies (99% by always predicting \"no\"); use f1 or pr-auc. say this: \"accuracy is the first metric to distrust under imbalance.\" roc-auc vs pr-auc — axis: how rare is the positive class? heavy imbalance (fraud at 0.1%) → pr-auc, because roc-auc looks flatteringly high when true negatives dominate. offline metric vs business metric — axis: none — you need both. offline (auc, rmse) gates what ships; the business metric (revenue, retention) is the real target. wrong pick: shipping on offline gains alone → the a/b test shows no lift (see experimentation). data data lake vs warehouse vs lakehouse — axis: schema-on-read vs schema-on-write. lake = raw, cheap, any format, schema-on-read (great for ml/exploration). warehouse = clean, structured, schema-on-write, fast sql (great for bi). lakehouse (databricks/delta) = one system for both. wrong pick: forcing raw sensor data into a warehouse schema up front throws away signal you didn't know you needed. batch vs streaming (data) — axis: required freshness. default batch — simpler, cheaper, easy to backfill. streaming only when you need sub-minute freshness (fraud, live personalization). wrong pick: standing up kafka+flink for a nightly report burns complexity for zero business value. normalization vs standardization — axis: distribution + model. standardize (zero mean, unit variance) for roughly-gaussian features and distance/gradient models. min-max normalize for bounded ranges (images to 0–1). note: trees need neither. oversample vs undersample vs class weights — axis: how much data you can spare. lots of data → undersample the majority. scarce data → oversample/smote the minority. simplest first → class weights in the loss. wrong pick: oversampling before the train/test split leaks duplicates across the split and inflates your score. build vs buy a feature store — axis: train/serve skew risk × team size. the value is defining a feature once and serving it to both training and inference, killing skew. buy (feast/tecton) when many models share features; skip it for one model with simple features. experimentation grid vs random vs bayesian search — axis: how expensive is one training run? cheap runs / few params → grid. many params → random (finds good regions faster). expensive runs (deep nets) → bayesian (optuna) to spend trials wisely. wrong pick: grid search over 6 hyperparameters is exponential and wasteful. holdout vs k-fold cv — axis: dataset size. big data → a single holdout is enough and cheap. small data → k-fold for a stable estimate. wrong pick: one small holdout gives a noisy, lucky-or-unlucky number. a/b test vs offline eval — axis: do you need proof of real-world impact? offline gates candidates cheaply; the a/b test is the only thing that proves business lift on live users. wrong pick: trusting offline lift → you ship a model users quietly hate. watch significance, sample size/duration, and guardrail metrics. mlops & serving batch vs online vs streaming serving — axis: when is the prediction needed? later/in bulk → batch (cheapest, no always-on service). per user request, now → online api. per event, continuously → streaming. default: if a nightly table satisfies the product, don't build a real-time service. rest vs grpc — axis: latency + who calls it. rest/json for public, browser-facing, easy-to-debug endpoints. grpc (binary, http/2) for internal, high-throughput, service-to-service and streaming — lower latency and payload. fastapi vs a dedicated model server — axis: gpu + throughput needs. fastapi/bentoml for a simple cpu model or glue logic. triton/torchserve/tf-serving when you need gpu dynamic batching , multi-model, and high throughput. llms → vllm/tgi specifically (paged-attention batching). wrong pick: a raw fastapi loop wastes the gpu by serving one request at a time. canary vs blue-green vs shadow — axis: what risk are you buying down? canary = small traffic slice first (catch bad models on few users). blue-green = two full envs, instant switch/rollback (minimize downtime). shadow = run on real traffic but don't use the output (validate safely, zero user risk). often shadow → canary → full. registry vs versioned files in a bucket — axis: do you need staged promotion + audit? a registry (mlflow/unity) adds staging→prod promotion, lineage, and one-click rollback. files in s3 work for a solo experiment but give you no promotion story or audit trail. monitoring data drift vs concept drift — axis: what changed? data/covariate drift = the inputs shift (new user mix) → often a retrain fixes it. concept drift = the input→output relationship shifts (fraud tactics change) → the problem itself moved; retraining on old labels won't save you. wrong pick: treating concept drift as data drift → you retrain and still degrade. psi vs kl vs ks for drift — axis: feature type + what you have. all compare live vs a training baseline without labels . psi = a simple, thresholded bucketed score (industry default). kl = information-theoretic divergence. ks = distance for continuous distributions. real accuracy comes later, once labels land. schedule vs trigger retraining — axis: predictable decay vs event-driven. schedule = a floor (nightly/weekly). drift/perf trigger = react when it actually degrades. do both, and always gate : promote only if the new model beats production on a fresh holdout. cloud & optimization managed platform vs diy on kubernetes — axis: control vs ops burden. sagemaker/vertex = fast, less to run, some lock-in. self-managed k8s (kserve/kubeflow) = full control and portability, more to operate. default: start managed; go diy when cost or flexibility forces it. spot/preemptible vs on-demand — axis: is the work interruptible? spot (50–90% cheaper) for fault-tolerant training with checkpointing . on-demand for latency-critical serving that can't vanish mid-request. wrong pick: spot for a live endpoint → it disappears under load. data vs model vs pipeline parallelism — axis: does the model fit on one gpu? fits → data parallelism (replicate, split the batch, average gradients) — the default. too big → model/tensor parallelism (split the model) or pipeline parallelism (split by layer stage). say this: \"data parallelism first; model parallelism only when a single gpu can't hold the weights.\" quantization vs pruning vs distillation — axis: how you're shrinking. quantization = lower-precision numbers (fp16/int8), biggest win for least effort → try first. pruning = drop unimportant weights. distillation = train a small student to mimic a big teacher. order: quantize → prune → distill. cpu vs gpu inference — axis: model size × qps. small models / low traffic → cpu is cheaper and simpler. large models or high throughput with batching → gpu. wrong pick: a gpu serving 3 requests/sec is money on fire. latency vs throughput — axis: you're usually trading them. latency = one prediction's speed (user-facing sla). throughput = predictions/sec (cost efficiency). batching raises throughput but adds latency — tune the batch window to your p99 budget. profile before optimizing; attack the biggest number. generative ai prompt vs rag vs fine-tune — axis: what's actually missing? prompt first (free, instant). missing knowledge/your data → rag (grounds answers, cuts hallucination, updates by re-indexing). wrong behavior/format/tone that no prompt fixes → fine-tune. wrong pick — the classic: fine-tuning to inject facts. rag is cheaper and right for facts. full fine-tune vs lora/peft — axis: budget × how many tasks. lora trains <1% of params → cheap, fast, swappable adapters per task, tiny artifacts. full fine-tune only when you have the data/compute and need to move the whole model. default: lora. closed api vs open self-hosted llm — *axis: control/privacy/cost-at-scale vs time-to-market.* api (gpt/claude) = best quality, zero ops, per-token cost, data leaves your walls. self-hosted (llama/mistral on vllm) = data stays in, cheaper at high volume, customizable, but you run the gpus. axis for regulated/on-prem work: privacy usually forces self-hosting. bigger context vs rag — axis: cost + relevance. stuffing everything into a huge context is simple but expensive and dilutes attention. rag retrieves only what's relevant → cheaper, sharper, and cites sources. wrong pick: paying for 100k tokens when top-5 chunks would do. how you'd say it \"for almost every one of these i start from the axis the decision turns on, default to the simpler and cheaper option — batch over streaming, boosting over deep nets on tables, prompt before rag before fine-tuning — and only add complexity when the requirement forces it. then i name what the wrong pick actually costs. that framing matters more than any single verdict, because the numbers change but the axis doesn't.\" self-check what three beats does every \"x vs y\" answer need? *(the deciding axis; the rule + simpler default; the wrong-pick failure mode.)* rag vs fine-tuning — the axis and the classic mistake? *(axis = knowledge vs behavior; mistake = fine-tuning to add facts.)* data vs model parallelism — the deciding axis? (does the model fit on one gpu.) why default to batch serving and undersampling-with-care? *(cheaper/simpler; and oversampling before the split leaks duplicates.)* spot vs on-demand — the one word that decides it? (interruptibility.)","words":1874},{"path":"11-drill-bank/cheat-sheet.md","title":"One-Page Cheat Sheet","section":"11 · Drill Bank","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"one-page-cheat-sheet\">One-Page Cheat Sheet<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The whole pack compressed — key distinctions, decision rules, and \"say this\" lines. Skim this last.<\/div><\/div>\n<h2 id=\"the-lifecycle-your-answer-skeleton\">The lifecycle (your answer skeleton)<\/h2>\n<p>frame → data → features → train → evaluate → deploy → monitor → retrain. <strong>A loop<\/strong>, because of drift. \"ML Engineer\" = the deploy → monitor → retrain half.<\/p>\n<h2 id=\"modeling\">Modeling<\/h2>\n<ul><li>Tabular → <strong>gradient boosting<\/strong> (XGBoost). Unstructured/huge → <strong>deep learning<\/strong>.<\/li><li><strong>Bagging<\/strong> = parallel, cuts variance. <strong>Boosting<\/strong> = sequential, cuts bias.<\/li><li>Overfit = great train / poor test → more data, regularization, simpler. Underfit = poor<\/li><\/ul>\n<p>both → more expressive, better features.<\/p>\n<ul><li>Metrics: precision (false positives costly), recall (misses costly), F1/PR-AUC (imbalance).<\/li><\/ul>\n<p>Accuracy lies under imbalance. Offline metric ≠ business metric.<\/p>\n<h2 id=\"data\">Data<\/h2>\n<ul><li><strong>Lake<\/strong> = raw/cheap (schema-on-read); <strong>warehouse<\/strong> = clean/structured (schema-on-write).<\/li><li><strong>Batch<\/strong> (default: simple, cheap) vs <strong>streaming<\/strong> (only when freshness demands).<\/li><li><strong>Leakage<\/strong> = train-time use of prediction-time-unavailable info → fit preprocessing on<\/li><\/ul>\n<p>train split only.<\/p>\n<ul><li><strong>Feature store<\/strong> kills <strong>train/serve skew<\/strong>: define a feature once, serve offline+online.<\/li><\/ul>\n<h2 id=\"experimentation\">Experimentation<\/h2>\n<ul><li>3 splits: train (fit) / validation (tune) / test (once). Time-series → split by time.<\/li><li><strong>Track every run<\/strong> (params, metrics, artifacts, data version) → reproducibility.<\/li><li><strong>A/B test<\/strong> for real impact: significance + sample/duration + guardrails.<\/li><\/ul>\n<h2 id=\"mlops\">MLOps<\/h2>\n<ul><li>Version <strong>code + data + model<\/strong>. <strong>Container<\/strong> for reproducible environment.<\/li><li><strong>Registry<\/strong> = versioning + staged promotion + rollback.<\/li><li>Rollout: <strong>canary / blue-green / shadow<\/strong>. CI/CD/<strong>CT<\/strong> (continuous training).<\/li><\/ul>\n<h2 id=\"monitoring\">Monitoring<\/h2>\n<ul><li>Models fail <strong>silently<\/strong>. Watch ops (latency p99, errors) + model (drift, quality).<\/li><li><strong>Data drift<\/strong> (inputs shift) vs <strong>concept drift<\/strong> (relationship shifts). Detect via PSI/KL<\/li><\/ul>\n<p>on distributions (no labels needed); real accuracy comes later.<\/p>\n<ul><li>Retrain: schedule + drift trigger; <strong>gate<\/strong> on beating production on a holdout.<\/li><\/ul>\n<h2 id=\"cloud-optimization\">Cloud &amp; optimization<\/h2>\n<ul><li>Platforms: <strong>SageMaker / Vertex AI / Azure ML<\/strong>. Primitives: object storage, GPU compute,<\/li><\/ul>\n<p>managed platform, K8s.<\/p>\n<ul><li><strong>K8s<\/strong> = scale + self-heal + rollout. <strong>IaC<\/strong> (Terraform) = reproducible infra.<\/li><li>Cheap GPUs: <strong>spot + checkpointing<\/strong>. Cheap serving: batch, autoscale/scale-to-zero.<\/li><li>Shrink model: <strong>quantization<\/strong> (FP16/INT8) → <strong>pruning<\/strong> → <strong>distillation<\/strong>.<\/li><li>Scale training: <strong>data parallelism<\/strong> (default), model/pipeline parallelism (too big),<\/li><\/ul>\n<p>mixed precision.<\/p>\n<ul><li>Serve fast: <strong>batching<\/strong>, caching, <strong>TensorRT/ONNX<\/strong> compile. Profile first.<\/li><\/ul>\n<h2 id=\"generative-ai\">Generative AI<\/h2>\n<ul><li>LLM = big transformer, <strong>next-token prediction<\/strong>; <strong>attention<\/strong> = weigh all tokens in<\/li><\/ul>\n<p>parallel. <strong>Context window<\/strong> = working memory, drives cost.<\/p>\n<ul><li>Decision spine: <strong>prompt → RAG (add knowledge) → fine-tune (change behavior)<\/strong>.<\/li><li><strong>RAG<\/strong> = embed docs → vector DB → retrieve → ground the prompt. Fixes stale facts +<\/li><\/ul>\n<p>hallucination.<\/p>\n<ul><li><strong>LoRA<\/strong> = train &lt;1% adapters, cheap + swappable. Fine-tune for <em>behavior<\/em>, not facts.<\/li><li>LLMOps: cost per token, token-by-token latency, guardrails, hard eval (human /<\/li><\/ul>\n<p>LLM-as-judge / groundedness).<\/p>\n<h2 id=\"system-design\">System design<\/h2>\n<ul><li><strong>Clarify first<\/strong> (scope, scale, latency, metric). Then: frame → data/features → model →<\/li><\/ul>\n<p>serving → monitoring, trading off out loud.<\/p>\n<ul><li><strong>Two-stage<\/strong>: cheap candidate generation → expensive ranking. Baseline first.<\/li><li>Recommender gotchas: <strong>cold start<\/strong>, <strong>feedback loops<\/strong> (add exploration), freshness.<\/li><\/ul>\n<h2 id=\"the-three-say-this-instincts\">The three \"say this\" instincts<\/h2>\n<ol><li>*\"I default to the simpler/cheaper option (batch, small model, prompt) and add complexity<\/li><\/ol>\n<p>only when the requirement demands it.\"*<\/p>\n<ol><li><em>\"I profile to find the real bottleneck and attack the biggest number — I don't guess.\"<\/em><\/li><li>*\"A model isn't done at deploy — I monitor for silent decay and retrain, with a quality<\/li><\/ol>\n<p>gate and safe rollout.\"*<\/p>\n<h2 id=\"tool-map-the-production-stack-at-a-glance\">🔗 Tool map — the production stack at a glance<\/h2>\n<ul><li><strong>Storage:<\/strong> lake = S3/GCS + Delta/Iceberg · warehouse = Snowflake/BigQuery · lakehouse = Databricks + Unity Catalog.<\/li><li><strong>Pipelines:<\/strong> batch = Spark/dbt + Airflow · streaming = Kafka + Flink · quality = Great Expectations.<\/li><li><strong>Features:<\/strong> Feast (offline = Delta/BigQuery, online = Redis/DynamoDB).<\/li><li><strong>Train:<\/strong> scikit-learn/XGBoost, PyTorch/HuggingFace · scale = DDP/FSDP/DeepSpeed, Ray · tune = Optuna/Ray Tune.<\/li><li><strong>Track/registry:<\/strong> MLflow, W&amp;B; DVC for data; Unity Catalog for governance.<\/li><li><strong>Serve:<\/strong> FastAPI/BentoML, Triton, KServe/Seldon, SageMaker/Vertex endpoints · LLM = vLLM/TGI.<\/li><li><strong>CI/CD/CT:<\/strong> GitHub Actions + Kubeflow/Vertex Pipelines/Airflow · rollout = KServe/Argo canary.<\/li><li><strong>Monitor:<\/strong> Evidently/Arize + Prometheus/Grafana + Alertmanager; SageMaker Model Monitor.<\/li><li><strong>Cloud/infra:<\/strong> SageMaker/Vertex/Azure ML/Databricks · K8s (EKS/GKE/AKS) · Terraform · spot + Karpenter.<\/li><li><strong>Optimize:<\/strong> TensorRT/ONNX Runtime, bitsandbytes/GGUF (LLM); Triton batching; Redis cache.<\/li><li><strong>GenAI/RAG:<\/strong> LangChain/LlamaIndex · vector DB = Pinecone/Weaviate/Qdrant/pgvector/FAISS · embeddings = BGE/OpenAI · fine-tune = PEFT/LoRA + bitsandbytes/Axolotl · eval = Ragas/LangSmith/Langfuse · guardrails = Guardrails AI/NeMo.<\/li><\/ul>","toc":[{"level":2,"id":"the-lifecycle-your-answer-skeleton","text":"The lifecycle (your answer skeleton)"},{"level":2,"id":"modeling","text":"Modeling"},{"level":2,"id":"data","text":"Data"},{"level":2,"id":"experimentation","text":"Experimentation"},{"level":2,"id":"mlops","text":"MLOps"},{"level":2,"id":"monitoring","text":"Monitoring"},{"level":2,"id":"cloud-optimization","text":"Cloud &amp; optimization"},{"level":2,"id":"generative-ai","text":"Generative AI"},{"level":2,"id":"system-design","text":"System design"},{"level":2,"id":"the-three-say-this-instincts","text":"The three \"say this\" instincts"},{"level":2,"id":"tool-map-the-production-stack-at-a-glance","text":"🔗 Tool map — the production stack at a glance"}],"text":"one-page cheat sheet 💡 tl;dr the whole pack compressed — key distinctions, decision rules, and \"say this\" lines. skim this last. the lifecycle (your answer skeleton) frame → data → features → train → evaluate → deploy → monitor → retrain. a loop , because of drift. \"ml engineer\" = the deploy → monitor → retrain half. modeling tabular → gradient boosting (xgboost). unstructured/huge → deep learning . bagging = parallel, cuts variance. boosting = sequential, cuts bias. overfit = great train / poor test → more data, regularization, simpler. underfit = poor both → more expressive, better features. metrics: precision (false positives costly), recall (misses costly), f1/pr-auc (imbalance). accuracy lies under imbalance. offline metric ≠ business metric. data lake = raw/cheap (schema-on-read); warehouse = clean/structured (schema-on-write). batch (default: simple, cheap) vs streaming (only when freshness demands). leakage = train-time use of prediction-time-unavailable info → fit preprocessing on train split only. feature store kills train/serve skew : define a feature once, serve offline+online. experimentation 3 splits: train (fit) / validation (tune) / test (once). time-series → split by time. track every run (params, metrics, artifacts, data version) → reproducibility. a/b test for real impact: significance + sample/duration + guardrails. mlops version code + data + model . container for reproducible environment. registry = versioning + staged promotion + rollback. rollout: canary / blue-green / shadow . ci/cd/ ct (continuous training). monitoring models fail silently . watch ops (latency p99, errors) + model (drift, quality). data drift (inputs shift) vs concept drift (relationship shifts). detect via psi/kl on distributions (no labels needed); real accuracy comes later. retrain: schedule + drift trigger; gate on beating production on a holdout. cloud & optimization platforms: sagemaker / vertex ai / azure ml . primitives: object storage, gpu compute, managed platform, k8s. k8s = scale + self-heal + rollout. iac (terraform) = reproducible infra. cheap gpus: spot + checkpointing . cheap serving: batch, autoscale/scale-to-zero. shrink model: quantization (fp16/int8) → pruning → distillation . scale training: data parallelism (default), model/pipeline parallelism (too big), mixed precision. serve fast: batching , caching, tensorrt/onnx compile. profile first. generative ai llm = big transformer, next-token prediction ; attention = weigh all tokens in parallel. context window = working memory, drives cost. decision spine: prompt → rag (add knowledge) → fine-tune (change behavior) . rag = embed docs → vector db → retrieve → ground the prompt. fixes stale facts + hallucination. lora = train <1% adapters, cheap + swappable. fine-tune for behavior , not facts. llmops: cost per token, token-by-token latency, guardrails, hard eval (human / llm-as-judge / groundedness). system design clarify first (scope, scale, latency, metric). then: frame → data/features → model → serving → monitoring, trading off out loud. two-stage : cheap candidate generation → expensive ranking. baseline first. recommender gotchas: cold start , feedback loops (add exploration), freshness. the three \"say this\" instincts *\"i default to the simpler/cheaper option (batch, small model, prompt) and add complexity only when the requirement demands it.\"* \"i profile to find the real bottleneck and attack the biggest number — i don't guess.\" *\"a model isn't done at deploy — i monitor for silent decay and retrain, with a quality gate and safe rollout.\"* 🔗 tool map — the production stack at a glance storage: lake = s3/gcs + delta/iceberg · warehouse = snowflake/bigquery · lakehouse = databricks + unity catalog. pipelines: batch = spark/dbt + airflow · streaming = kafka + flink · quality = great expectations. features: feast (offline = delta/bigquery, online = redis/dynamodb). train: scikit-learn/xgboost, pytorch/huggingface · scale = ddp/fsdp/deepspeed, ray · tune = optuna/ray tune. track/registry: mlflow, w&b; dvc for data; unity catalog for governance. serve: fastapi/bentoml, triton, kserve/seldon, sagemaker/vertex endpoints · llm = vllm/tgi. ci/cd/ct: github actions + kubeflow/vertex pipelines/airflow · rollout = kserve/argo canary. monitor: evidently/arize + prometheus/grafana + alertmanager; sagemaker model monitor. cloud/infra: sagemaker/vertex/azure ml/databricks · k8s (eks/gke/aks) · terraform · spot + karpenter. optimize: tensorrt/onnx runtime, bitsandbytes/gguf (llm); triton batching; redis cache. genai/rag: langchain/llamaindex · vector db = pinecone/weaviate/qdrant/pgvector/faiss · embeddings = bge/openai · fine-tune = peft/lora + bitsandbytes/axolotl · eval = ragas/langsmith/langfuse · guardrails = guardrails ai/nemo.","words":684},{"path":"12-nvidia-model-optimization/README.md","title":"Overview","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"12-nvidia-model-optimization\">12 — NVIDIA Model Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A focused deep-dive for an <strong>NVIDIA model-optimization interview<\/strong>. Section 8 covers optimization at ML-engineer altitude; this section goes to the level NVIDIA actually probes: the <strong>numerics of quantization<\/strong>, <strong>TensorRT internals<\/strong>, <strong>GPU architecture and profiling<\/strong>, <strong>sparsity<\/strong>, and <strong>LLM inference<\/strong>. It also turns your FashionMNIST quantization experiment into a story you can tell out loud.<\/div><\/div>\n<h2 id=\"why-a-separate-section\">Why a separate section<\/h2>\n<p>An NVIDIA model-optimization role (Deep Learning Software Engineer, TensorRT / Model Optimization, Deep Learning Performance) is not tested like a generic ML-Engineer role. They assume you can train a model and instead push on: <em>do you understand what INT8 actually does to the numbers, how TensorRT turns a graph into fast kernels, why a kernel is memory-bound vs compute-bound, and how you'd prove any of it with a profiler.<\/em> This section is written to survive that follow-up chain of \"…and why?\"<\/p>\n<h2 id=\"what-they-actually-test\">What they actually test<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Theme<\/th><th>Page<\/th><th>The question behind it<\/th><\/tr><\/thead><tbody><tr><td>Quantization numerics<\/td><td>Quantization, Deeply<\/td><td>\"Derive the INT8 scale. Symmetric or asymmetric — why?\"<\/td><\/tr><tr><td>GPU number formats<\/td><td>Numerical Precision<\/td><td>\"FP16 vs BF16 vs FP8 vs TF32 — when each, and why loss scaling?\"<\/td><\/tr><tr><td>TensorRT<\/td><td>TensorRT Internals<\/td><td>\"How does TensorRT make it fast? Implicit vs explicit quantization?\"<\/td><\/tr><tr><td>Performance analysis<\/td><td>GPU Performance &amp; Profiling<\/td><td>\"Is this kernel compute- or memory-bound? Prove it.\"<\/td><\/tr><tr><td>Model compression<\/td><td>Sparsity, Pruning, Distillation<\/td><td>\"What's 2:4 sparsity and why does hardware care?\"<\/td><\/tr><tr><td>LLM serving<\/td><td>LLM Inference Optimization<\/td><td>\"KV cache, FlashAttention, in-flight batching, TP vs PP.\"<\/td><\/tr><tr><td>Your project<\/td><td>Experiment Walkthrough<\/td><td>\"Walk me through something you optimized.\"<\/td><\/tr><tr><td>Rapid fire<\/td><td>Interview Q&amp;A<\/td><td>The last-mile drill set.<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-one-mental-model-to-carry-in\">The one mental model to carry in<\/h2>\n<p>Optimization lives on <strong>three axes<\/strong> that interviewers love to see you separate cleanly:<\/p>\n<pre><code>  METHOD          →  how you pick int8-friendly weights/scales   (PTQ, QAT, calibration)\n  FORMAT          →  which numbers you compute in                (FP32/TF32/FP16/BF16/FP8/INT8/INT4)\n  ENGINE          →  where/how the math runs fast                (TensorRT, Triton, CUDA kernels, fusion)<\/code><\/pre>\n<p>Almost every question is really asking you to hold two of these apart. Your own project's core insight — <em>\"PTQ/QAT is the method axis, TensorRT is the engine axis\"<\/em> — is exactly this framing, and it's the thing that makes you sound like you've done it, not read it.<\/p>\n<h2 id=\"suggested-order\">Suggested order<\/h2>\n<p>Read <strong>Quantization, Deeply<\/strong> and <strong>Numerical Precision<\/strong> first — everything else builds on the numerics. Then <strong>TensorRT Internals<\/strong> and <strong>GPU Performance<\/strong> (the two hardest follow-up areas). <strong>Sparsity/Distillation<\/strong> and <strong>LLM Inference<\/strong> round out breadth. Finish on the <strong>Experiment Walkthrough<\/strong> and <strong>Interview Q&amp;A<\/strong> to rehearse delivery.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"quantization-deep.md\" href=\"#\">quantization-deep.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-a-separate-section","text":"Why a separate section"},{"level":2,"id":"what-they-actually-test","text":"What they actually test"},{"level":2,"id":"the-one-mental-model-to-carry-in","text":"The one mental model to carry in"},{"level":2,"id":"suggested-order","text":"Suggested order"}],"text":"12 — nvidia model optimization 💡 tl;dr a focused deep-dive for an nvidia model-optimization interview . section 8 covers optimization at ml-engineer altitude; this section goes to the level nvidia actually probes: the numerics of quantization , tensorrt internals , gpu architecture and profiling , sparsity , and llm inference . it also turns your fashionmnist quantization experiment into a story you can tell out loud. why a separate section an nvidia model-optimization role (deep learning software engineer, tensorrt / model optimization, deep learning performance) is not tested like a generic ml-engineer role. they assume you can train a model and instead push on: do you understand what int8 actually does to the numbers, how tensorrt turns a graph into fast kernels, why a kernel is memory-bound vs compute-bound, and how you'd prove any of it with a profiler. this section is written to survive that follow-up chain of \"…and why?\" what they actually test theme page the question behind it quantization numerics quantization, deeply \"derive the int8 scale. symmetric or asymmetric — why?\" gpu number formats numerical precision \"fp16 vs bf16 vs fp8 vs tf32 — when each, and why loss scaling?\" tensorrt tensorrt internals \"how does tensorrt make it fast? implicit vs explicit quantization?\" performance analysis gpu performance & profiling \"is this kernel compute- or memory-bound? prove it.\" model compression sparsity, pruning, distillation \"what's 2:4 sparsity and why does hardware care?\" llm serving llm inference optimization \"kv cache, flashattention, in-flight batching, tp vs pp.\" your project experiment walkthrough \"walk me through something you optimized.\" rapid fire interview q&a the last-mile drill set. the one mental model to carry in optimization lives on three axes that interviewers love to see you separate cleanly: method → how you pick int8-friendly weights/scales (ptq, qat, calibration) format → which numbers you compute in (fp32/tf32/fp16/bf16/fp8/int8/int4) engine → where/how the math runs fast (tensorrt, triton, cuda kernels, fusion) almost every question is really asking you to hold two of these apart. your own project's core insight — \"ptq/qat is the method axis, tensorrt is the engine axis\" — is exactly this framing, and it's the thing that makes you sound like you've done it, not read it. suggested order read quantization, deeply and numerical precision first — everything else builds on the numerics. then tensorrt internals and gpu performance (the two hardest follow-up areas). sparsity/distillation and llm inference round out breadth. finish on the experiment walkthrough and interview q&a to rehearse delivery. → start: quantization-deep.md","words":411},{"path":"12-nvidia-model-optimization/quantization-deep.md","title":"Quantization, Deeply","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"quantization-deeply\">Quantization, Deeply<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Quantization maps a range of floats onto a small set of integers with a <strong>scale<\/strong> (and maybe a <strong>zero-point<\/strong>). Everything interesting — accuracy loss, calibration, symmetric vs asymmetric, per-channel — falls out of <em>how you pick that scale<\/em>. Your project did PTQ and QAT; this page is the numeric layer underneath them that NVIDIA will drill.<\/div><\/div>\n<h2 id=\"the-core-mapping-know-the-formula-cold\">The core mapping (know the formula cold)<\/h2>\n<p>Quantization is an <strong>affine map<\/strong> between a real value <code>r<\/code> and an integer <code>q<\/code>:<\/p>\n<pre><code>  r ≈ scale · (q − zero_point)          # dequantize\n  q  = round(r / scale) + zero_point    # quantize, then clamp to [qmin, qmax]<\/code><\/pre>\n<ul><li><strong>scale<\/strong> (a float) — the size of one integer step in real units.<\/li><li><strong>zero_point<\/strong> (an integer) — which integer maps to real 0.0.<\/li><li>For signed INT8, <code>qmin=−128, qmax=127<\/code>; for unsigned, <code>0…255<\/code>.<\/li><\/ul>\n<p>That's the whole idea. Two choices define a quantizer: <strong>how wide a range<\/strong> you cover (calibration) and <strong>whether zero-point is forced to 0<\/strong> (symmetric vs asymmetric).<\/p>\n<h2 id=\"symmetric-vs-asymmetric\">Symmetric vs asymmetric<\/h2>\n<ul><li><strong>Symmetric:<\/strong> <code>zero_point = 0<\/code>, range is <code>[−α, α]<\/code>, <code>scale = α / 127<\/code>. Real 0 maps to<\/li><\/ul>\n<p>integer 0. Cheaper math (no zero-point term in the matmul), and it's what <strong>weights<\/strong> use.<\/p>\n<ul><li><strong>Asymmetric (affine):<\/strong> range is <code>[β, α]<\/code> with a non-zero zero-point, so it can hug a<\/li><\/ul>\n<p>one-sided distribution tightly. Used for <strong>activations<\/strong> after ReLU (all ≥ 0) where a   symmetric range would waste half the codes.<\/p>\n<p>The interview one-liner: <em>\"Weights symmetric per-channel, activations asymmetric (or symmetric) per-tensor — weights are roughly zero-centered so symmetric wastes nothing and skips the zero-point term; post-ReLU activations are one-sided so asymmetric buys back a bit.\"<\/em><\/p>\n<h2 id=\"per-tensor-vs-per-channel-this-explains-your-accuracy-cliff\">Per-tensor vs per-channel (this explains your accuracy cliff)<\/h2>\n<ul><li><strong>Per-tensor:<\/strong> one scale for the entire weight tensor. Simplest, but if one output<\/li><\/ul>\n<p>channel has a much larger range than the others, the small-range channels get crushed   into a handful of integer codes.<\/p>\n<ul><li><strong>Per-channel (per-axis):<\/strong> one scale <strong>per output channel<\/strong> of a conv/linear weight.<\/li><\/ul>\n<p>Each channel uses the full INT8 range. This is the standard fix and it's nearly free   (scales are applied along the output axis after the matmul).<\/p>\n<blockquote><p><strong>Your project's ~0.83 INT8 cliff is almost certainly this.<\/strong> A small 5-conv model has few channels and uneven weight ranges, so <strong>per-tensor<\/strong> weight quantization loses a lot. Say in the interview: <em>\"On such a small net I'd expect per-channel weight quantization and more calibration data to recover most of that drop before I even reach for QAT.\"<\/em> That is exactly the kind of diagnosis they want.<\/p><\/blockquote>\n<h2 id=\"calibration-how-you-choose-the-range\">Calibration: how you choose the range α<\/h2>\n<p>PTQ never touches weights — it just runs batches to observe activation ranges and picks <code>α<\/code>. <strong>How<\/strong> you pick it is the calibration algorithm, and it matters a lot:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Calibrator<\/th><th>Rule<\/th><th>Trade-off<\/th><\/tr><\/thead><tbody><tr><td><strong>Min–max<\/strong><\/td><td>α = observed max<\/td><td>Simple; one outlier blows the scale up and wastes codes.<\/td><\/tr><tr><td><strong>Entropy / KL<\/strong> (TensorRT default, <code>IInt8EntropyCalibrator2<\/code>)<\/td><td>clip α to minimize KL divergence between the FP32 and INT8 activation histograms<\/td><td>Robust to outliers; usually best accuracy.<\/td><\/tr><tr><td><strong>Percentile<\/strong><\/td><td>α = e.g. 99.99th percentile<\/td><td>Cheap outlier rejection; needs the percentile tuned.<\/td><\/tr><tr><td><strong>MSE<\/strong><\/td><td>α minimizing quantization MSE<\/td><td>Good, a bit slower.<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The insight worth stating: <strong>calibration is a clipping decision.<\/strong> A wider α covers outliers but makes every step coarser; a tighter α is finer but clips the tails. Entropy calibration picks the α that best preserves the <em>distribution's information<\/em> — which is why TensorRT defaults to it and why swapping to <code>IInt8MinMaxCalibrator<\/code> (a \"next step\" in your notes) is a real experiment, not a cosmetic one.<\/p>\n<h2 id=\"ptq-vs-qat-the-numeric-picture\">PTQ vs QAT — the numeric picture<\/h2>\n<p>Your notes nail the intuition; here's the mechanism under it:<\/p>\n<ul><li><strong>PTQ<\/strong> solves <em>\"given fixed weights, pick scales that lose the least accuracy.\"<\/em> No<\/li><\/ul>\n<p>gradients. Minutes. Fails when the weight distribution is inherently hard to represent in   INT8 (outliers, wide per-tensor range).<\/p>\n<ul><li><strong>QAT<\/strong> inserts <strong>fake-quant<\/strong> nodes: forward pass does <code>dequant(quant(x))<\/code> so the model<\/li><\/ul>\n<p><em>feels<\/em> rounding, but gradients flow through via the <strong>Straight-Through Estimator (STE)<\/strong> —   the quantizer's derivative is treated as 1 in the pass-through region. Training then nudges   weights to be robust to rounding and can even learn the ranges. Recovers accuracy PTQ can't.<\/p>\n<p><strong>STE is a classic follow-up.<\/strong> \"How do you backprop through a round()? Its gradient is 0 almost everywhere.\" Answer: <em>STE — pass the gradient straight through inside the clipping range and zero it outside, so the network can still learn despite the non-differentiable rounding.<\/em><\/p>\n<h2 id=\"advanced-ptq-name-drop-these-theyre-nvidia-adjacent\">Advanced PTQ (name-drop these — they're NVIDIA-adjacent)<\/h2>\n<p>For LLMs, plain PTQ breaks because of <strong>activation outliers<\/strong>. Modern methods fix that without full retraining, and NVIDIA's <code>TensorRT-Model-Optimizer<\/code> implements them:<\/p>\n<ul><li><strong>SmoothQuant<\/strong> — migrate the \"difficulty\" from activations into weights by a per-channel<\/li><\/ul>\n<p>scaling, so both become easy to quantize. Enables INT8/FP8 on LLMs.<\/p>\n<ul><li><strong>AWQ (Activation-aware Weight Quantization)<\/strong> — protect the ~1% of weight channels that<\/li><\/ul>\n<p>matter most (by activation magnitude), quantize the rest to INT4. Weight-only.<\/p>\n<ul><li><strong>GPTQ<\/strong> — second-order (Hessian-based) layer-wise weight quantization to INT4/INT3.<\/li><li><strong>Weight-only (INT4) vs weight+activation (INT8/FP8):<\/strong> weight-only shrinks memory and<\/li><\/ul>\n<p>helps the memory-bound decode phase of LLMs; W8A8/FP8 also speeds compute-bound matmuls.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Native <strong>PyTorch<\/strong> quantization (<code>torch.ao.quantization<\/code>, fbgemm/qnnpack — <strong>CPU<\/strong> kernels, as your project found). On GPU: <strong>TensorRT<\/strong> calibrators for implicit PTQ, and <strong>NVIDIA TensorRT-Model-Optimizer<\/strong> (formerly parts of <code>pytorch-quantization<\/code>) for QAT/QDQ, SmoothQuant, AWQ, and FP8. For LLM weight-only: <strong>GPTQ<\/strong>, <strong>AWQ<\/strong>, <strong>bitsandbytes<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"On my FashionMNIST project the INT8 drop came from per-tensor weight quantization on a tiny net; per-channel scales plus entropy calibration recover most of it, and QAT with straight-through estimation buys back the rest by making the weights rounding-robust.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Write the dequant formula and say what scale and zero-point mean. *(r = scale·(q −<\/li><\/ul>\n<p>zero_point); scale = real size of one step, zero_point = integer that maps to 0.0.)*<\/p>\n<ul><li>Why symmetric for weights, asymmetric for post-ReLU activations? *(weights ~zero-centered<\/li><\/ul>\n<p>so symmetric wastes nothing and drops the zero-point term; ReLU output is one-sided so   asymmetric hugs it.)*<\/p>\n<ul><li>Why does entropy calibration usually beat min–max? *(min–max lets a single outlier inflate<\/li><\/ul>\n<p>the scale; entropy clips to preserve the distribution → finer steps where it matters.)*<\/p>\n<ul><li>How does QAT backprop through rounding? *(straight-through estimator: gradient ≈ 1 inside<\/li><\/ul>\n<p>the clip range, 0 outside.)*<\/p>","toc":[{"level":2,"id":"the-core-mapping-know-the-formula-cold","text":"The core mapping (know the formula cold)"},{"level":2,"id":"symmetric-vs-asymmetric","text":"Symmetric vs asymmetric"},{"level":2,"id":"per-tensor-vs-per-channel-this-explains-your-accuracy-cliff","text":"Per-tensor vs per-channel (this explains your accuracy cliff)"},{"level":2,"id":"calibration-how-you-choose-the-range","text":"Calibration: how you choose the range α"},{"level":2,"id":"ptq-vs-qat-the-numeric-picture","text":"PTQ vs QAT — the numeric picture"},{"level":2,"id":"advanced-ptq-name-drop-these-theyre-nvidia-adjacent","text":"Advanced PTQ (name-drop these — they're NVIDIA-adjacent)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"quantization, deeply 💡 tl;dr quantization maps a range of floats onto a small set of integers with a scale (and maybe a zero-point ). everything interesting — accuracy loss, calibration, symmetric vs asymmetric, per-channel — falls out of how you pick that scale . your project did ptq and qat; this page is the numeric layer underneath them that nvidia will drill. the core mapping (know the formula cold) quantization is an affine map between a real value r and an integer q : r ≈ scale · (q − zero_point) # dequantize q = round(r / scale) + zero_point # quantize, then clamp to [qmin, qmax] scale (a float) — the size of one integer step in real units. zero_point (an integer) — which integer maps to real 0.0. for signed int8, qmin=−128, qmax=127 ; for unsigned, 0…255 . that's the whole idea. two choices define a quantizer: how wide a range you cover (calibration) and whether zero-point is forced to 0 (symmetric vs asymmetric). symmetric vs asymmetric symmetric: zero_point = 0 , range is [−α, α] , scale = α / 127 . real 0 maps to integer 0. cheaper math (no zero-point term in the matmul), and it's what weights use. asymmetric (affine): range is [β, α] with a non-zero zero-point, so it can hug a one-sided distribution tightly. used for activations after relu (all ≥ 0) where a symmetric range would waste half the codes. the interview one-liner: \"weights symmetric per-channel, activations asymmetric (or symmetric) per-tensor — weights are roughly zero-centered so symmetric wastes nothing and skips the zero-point term; post-relu activations are one-sided so asymmetric buys back a bit.\" per-tensor vs per-channel (this explains your accuracy cliff) per-tensor: one scale for the entire weight tensor. simplest, but if one output channel has a much larger range than the others, the small-range channels get crushed into a handful of integer codes. per-channel (per-axis): one scale per output channel of a conv/linear weight. each channel uses the full int8 range. this is the standard fix and it's nearly free (scales are applied along the output axis after the matmul). your project's ~0.83 int8 cliff is almost certainly this. a small 5-conv model has few channels and uneven weight ranges, so per-tensor weight quantization loses a lot. say in the interview: \"on such a small net i'd expect per-channel weight quantization and more calibration data to recover most of that drop before i even reach for qat.\" that is exactly the kind of diagnosis they want. calibration: how you choose the range α ptq never touches weights — it just runs batches to observe activation ranges and picks α . how you pick it is the calibration algorithm, and it matters a lot: calibrator rule trade-off min–max α = observed max simple; one outlier blows the scale up and wastes codes. entropy / kl (tensorrt default, iint8entropycalibrator2 ) clip α to minimize kl divergence between the fp32 and int8 activation histograms robust to outliers; usually best accuracy. percentile α = e.g. 99.99th percentile cheap outlier rejection; needs the percentile tuned. mse α minimizing quantization mse good, a bit slower. the insight worth stating: calibration is a clipping decision. a wider α covers outliers but makes every step coarser; a tighter α is finer but clips the tails. entropy calibration picks the α that best preserves the distribution's information — which is why tensorrt defaults to it and why swapping to iint8minmaxcalibrator (a \"next step\" in your notes) is a real experiment, not a cosmetic one. ptq vs qat — the numeric picture your notes nail the intuition; here's the mechanism under it: ptq solves \"given fixed weights, pick scales that lose the least accuracy.\" no gradients. minutes. fails when the weight distribution is inherently hard to represent in int8 (outliers, wide per-tensor range). qat inserts fake-quant nodes: forward pass does dequant(quant(x)) so the model feels rounding, but gradients flow through via the straight-through estimator (ste) — the quantizer's derivative is treated as 1 in the pass-through region. training then nudges weights to be robust to rounding and can even learn the ranges. recovers accuracy ptq can't. ste is a classic follow-up. \"how do you backprop through a round()? its gradient is 0 almost everywhere.\" answer: ste — pass the gradient straight through inside the clipping range and zero it outside, so the network can still learn despite the non-differentiable rounding. advanced ptq (name-drop these — they're nvidia-adjacent) for llms, plain ptq breaks because of activation outliers . modern methods fix that without full retraining, and nvidia's tensorrt-model-optimizer implements them: smoothquant — migrate the \"difficulty\" from activations into weights by a per-channel scaling, so both become easy to quantize. enables int8/fp8 on llms. awq (activation-aware weight quantization) — protect the ~1% of weight channels that matter most (by activation magnitude), quantize the rest to int4. weight-only. gptq — second-order (hessian-based) layer-wise weight quantization to int4/int3. weight-only (int4) vs weight+activation (int8/fp8): weight-only shrinks memory and helps the memory-bound decode phase of llms; w8a8/fp8 also speeds compute-bound matmuls. 🔗 connecting the dots — the real stack native pytorch quantization ( torch.ao.quantization , fbgemm/qnnpack — cpu kernels, as your project found). on gpu: tensorrt calibrators for implicit ptq, and nvidia tensorrt-model-optimizer (formerly parts of pytorch-quantization ) for qat/qdq, smoothquant, awq, and fp8. for llm weight-only: gptq , awq , bitsandbytes . how you'd say it: \"on my fashionmnist project the int8 drop came from per-tensor weight quantization on a tiny net; per-channel scales plus entropy calibration recover most of it, and qat with straight-through estimation buys back the rest by making the weights rounding-robust.\" self-check write the dequant formula and say what scale and zero-point mean. *(r = scale·(q − zero_point); scale = real size of one step, zero_point = integer that maps to 0.0.)* why symmetric for weights, asymmetric for post-relu activations? *(weights ~zero-centered so symmetric wastes nothing and drops the zero-point term; relu output is one-sided so asymmetric hugs it.)* why does entropy calibration usually beat min–max? *(min–max lets a single outlier inflate the scale; entropy clips to preserve the distribution → finer steps where it matters.)* how does qat backprop through rounding? *(straight-through estimator: gradient ≈ 1 inside the clip range, 0 outside.)*","words":1034},{"path":"12-nvidia-model-optimization/numerical-precision.md","title":"Numerical Precision (FP32→FP8→INT8)","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"numerical-precision-fp32-fp8-int8\">Numerical Precision — FP32 → FP8 → INT8<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Every number format is a bet on <strong>range vs precision<\/strong> in a fixed bit budget. Floating point spends bits on an <strong>exponent<\/strong> (range) and a <strong>mantissa<\/strong> (precision); integer/INT8 has neither — just a fixed step. Knowing which format to reach for, and <em>why FP16 needs loss scaling but BF16 doesn't<\/em>, is table-stakes at NVIDIA.<\/div><\/div>\n<h2 id=\"the-formats-in-one-table\">The formats, in one table<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Format<\/th><th>Bits (E/M)<\/th><th>Dynamic range<\/th><th>Precision<\/th><th>Where it's used<\/th><\/tr><\/thead><tbody><tr><td><strong>FP32<\/strong><\/td><td>8 / 23<\/td><td>huge<\/td><td>high<\/td><td>Baseline; master weights in mixed precision.<\/td><\/tr><tr><td><strong>TF32<\/strong><\/td><td>8 / 10<\/td><td>= FP32<\/td><td>~FP16<\/td><td>Ampere+ tensor-core math for \"FP32\" matmuls (on by default).<\/td><\/tr><tr><td><strong>FP16<\/strong><\/td><td>5 / 10<\/td><td>narrow (~6e−5…65504)<\/td><td>good<\/td><td>Mixed-precision train/infer; <strong>needs loss scaling<\/strong>.<\/td><\/tr><tr><td><strong>BF16<\/strong><\/td><td>8 / 7<\/td><td>= FP32<\/td><td>lower<\/td><td>Training; no loss scaling needed.<\/td><\/tr><tr><td><strong>FP8 E4M3<\/strong><\/td><td>4 / 3<\/td><td>small<\/td><td>more mantissa<\/td><td>Hopper/Ada forward pass (weights/activations).<\/td><\/tr><tr><td><strong>FP8 E5M2<\/strong><\/td><td>5 / 2<\/td><td>larger<\/td><td>less mantissa<\/td><td>Gradients (needs range).<\/td><\/tr><tr><td><strong>INT8<\/strong><\/td><td>fixed step<\/td><td>set by scale<\/td><td>uniform<\/td><td>TensorRT inference; needs calibration.<\/td><\/tr><tr><td><strong>INT4<\/strong><\/td><td>fixed step<\/td><td>set by scale<\/td><td>coarse<\/td><td>LLM weight-only (AWQ/GPTQ).<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The single sentence that ties it together: <strong>exponent bits buy range, mantissa bits buy precision, and INT formats trade both for a single uniform step you place with a scale.<\/strong><\/p>\n<h2 id=\"why-fp16-needs-loss-scaling-but-bf16-doesnt\">Why FP16 needs loss scaling but BF16 doesn't<\/h2>\n<p>This is a favorite question. <strong>FP16 keeps FP32's mantissa-ish precision but has a much narrower exponent range<\/strong> — small gradients underflow to zero and vanish. The fix is <strong>loss scaling<\/strong>: multiply the loss by a large constant before backward so gradients land in FP16's representable range, then unscale before the optimizer step (and skip the step if any Inf/NaN appears). Modern frameworks do this automatically (<code>torch.cuda.amp.GradScaler<\/code>).<\/p>\n<p>**BF16 has the <em>same 8-bit exponent as FP32<\/em><strong>, so its range is identical — gradients don't underflow, and <\/strong>no loss scaling is needed.** The cost is only 7 mantissa bits (less precision), which training tolerates well. That's why BF16 is now the default for large-model training even though FP16 has more mantissa.<\/p>\n<pre><code>FP16:  narrow range, more precision → underflow risk → loss scaling\nBF16:  FP32 range, less precision   → no underflow    → no loss scaling<\/code><\/pre>\n<h2 id=\"tf32-the-free-one-people-forget\">TF32 — the \"free\" one people forget<\/h2>\n<p>On Ampere and newer, a <strong>plain FP32 matmul<\/strong> on tensor cores actually runs in <strong>TF32<\/strong>: inputs are rounded to a 19-bit form (8 exp, 10 mantissa) before the multiply, accumulate in FP32. You get most of FP16's speed at near-FP32 accuracy, and it's <strong>on by default<\/strong> in cuDNN/cuBLAS. In PyTorch it's <code>torch.backends.cuda.matmul.allow_tf32<\/code>. Good to mention: <em>\"a chunk of the FP32→FP16 speedup people report is really FP32→TF32, already happening under the hood.\"<\/em><\/p>\n<h2 id=\"mixed-precision-training-the-mechanism\">Mixed-precision training (the mechanism)<\/h2>\n<p>\"Mixed precision\" = compute in FP16/BF16 for speed, but keep a <strong>master copy of weights in FP32<\/strong> so tiny updates don't get lost to rounding. Loop: forward/backward in FP16 (with loss scaling) or BF16, accumulate into FP32 master weights, apply the optimizer in FP32. Roughly <strong>2× faster and ~half the memory<\/strong> with negligible accuracy loss. Tensor cores are the reason it's fast — they're built for reduced-precision matmul-accumulate.<\/p>\n<h2 id=\"fp8-the-current-frontier-hopper-ada\">FP8 — the current frontier (Hopper / Ada)<\/h2>\n<p>FP8 comes in <strong>two flavors<\/strong> because forward and backward want different things:<\/p>\n<ul><li><strong>E4M3<\/strong> (4 exponent, 3 mantissa) — more precision, less range → forward pass, weights &amp;<\/li><\/ul>\n<p>activations.<\/p>\n<ul><li><strong>E5M2<\/strong> (5 exponent, 2 mantissa) — more range, less precision → gradients.<\/li><\/ul>\n<p>FP8 needs <strong>per-tensor scaling factors<\/strong> (delayed/dynamic scaling) to keep values in range, much like INT8 calibration. NVIDIA's <strong>Transformer Engine<\/strong> library does this automatically for training and inference. Why it matters: FP8 doubles tensor-core throughput vs FP16 and is the headline feature of Hopper (H100) — expect at least one FP8 question if the role touches LLMs.<\/p>\n<h2 id=\"int8-vs-fp16-when-to-pick-which\">INT8 vs FP16 — when to pick which<\/h2>\n<ul><li><strong>FP16/BF16:<\/strong> ~2× faster, ~half memory, <strong>almost no accuracy risk, no calibration<\/strong>. The<\/li><\/ul>\n<p>safe default and often the whole answer.<\/p>\n<ul><li><strong>INT8:<\/strong> up to ~4× and lowest memory, but needs <strong>calibration<\/strong> and can lose accuracy —<\/li><\/ul>\n<p>so you <em>measure<\/em> it (exactly your project's compare table). Best when latency/cost is tight   and you can afford the calibration + QAT effort.<\/p>\n<ul><li>Instinct to voice: *\"FP16 first because it's free accuracy-wise; INT8 when the latency or<\/li><\/ul>\n<p>cost budget demands it and I can validate the accuracy hit — and I keep sensitive layers   (first/last, softmax) in higher precision if INT8 hurts.\"*<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>AMP<\/strong> (<code>torch.cuda.amp<\/code>, <code>torch.autocast<\/code>) for mixed precision; <strong>Transformer Engine<\/strong> for FP8; tensor-core formats are picked by <strong>cuBLAS/cuDNN/TensorRT<\/strong> automatically. TensorRT's <code>enabled_precisions={torch.half}<\/code> (your FP16 path) vs the INT8 builder flag chooses the format the engine targets.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"My TRT-FP16 row was basically free accuracy-wise; the INT8 rows needed calibration and I tracked the drop. On newer hardware I'd reach for FP8 via Transformer Engine before INT8 for LLMs — similar speed with an easier accuracy story.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why does FP16 need loss scaling and BF16 not? *(FP16 has a narrow exponent range →<\/li><\/ul>\n<p>gradients underflow; BF16 shares FP32's 8-bit exponent → no underflow.)*<\/p>\n<ul><li>What is TF32 and when does it kick in? *(19-bit tensor-core format for FP32 matmuls on<\/li><\/ul>\n<p>Ampere+, on by default — near-FP32 accuracy at FP16-ish speed.)*<\/p>\n<ul><li>Why two FP8 formats? <em>(E4M3 precision-heavy for forward; E5M2 range-heavy for gradients.)<\/em><\/li><li>In mixed precision, why keep FP32 master weights? *(so small updates aren't lost to FP16<\/li><\/ul>\n<p>rounding.)*<\/p>","toc":[{"level":2,"id":"the-formats-in-one-table","text":"The formats, in one table"},{"level":2,"id":"why-fp16-needs-loss-scaling-but-bf16-doesnt","text":"Why FP16 needs loss scaling but BF16 doesn't"},{"level":2,"id":"tf32-the-free-one-people-forget","text":"TF32 — the \"free\" one people forget"},{"level":2,"id":"mixed-precision-training-the-mechanism","text":"Mixed-precision training (the mechanism)"},{"level":2,"id":"fp8-the-current-frontier-hopper-ada","text":"FP8 — the current frontier (Hopper / Ada)"},{"level":2,"id":"int8-vs-fp16-when-to-pick-which","text":"INT8 vs FP16 — when to pick which"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"numerical precision — fp32 → fp8 → int8 💡 tl;dr every number format is a bet on range vs precision in a fixed bit budget. floating point spends bits on an exponent (range) and a mantissa (precision); integer/int8 has neither — just a fixed step. knowing which format to reach for, and why fp16 needs loss scaling but bf16 doesn't , is table-stakes at nvidia. the formats, in one table format bits (e/m) dynamic range precision where it's used fp32 8 / 23 huge high baseline; master weights in mixed precision. tf32 8 / 10 = fp32 ~fp16 ampere+ tensor-core math for \"fp32\" matmuls (on by default). fp16 5 / 10 narrow (~6e−5…65504) good mixed-precision train/infer; needs loss scaling . bf16 8 / 7 = fp32 lower training; no loss scaling needed. fp8 e4m3 4 / 3 small more mantissa hopper/ada forward pass (weights/activations). fp8 e5m2 5 / 2 larger less mantissa gradients (needs range). int8 fixed step set by scale uniform tensorrt inference; needs calibration. int4 fixed step set by scale coarse llm weight-only (awq/gptq). the single sentence that ties it together: exponent bits buy range, mantissa bits buy precision, and int formats trade both for a single uniform step you place with a scale. why fp16 needs loss scaling but bf16 doesn't this is a favorite question. fp16 keeps fp32's mantissa-ish precision but has a much narrower exponent range — small gradients underflow to zero and vanish. the fix is loss scaling : multiply the loss by a large constant before backward so gradients land in fp16's representable range, then unscale before the optimizer step (and skip the step if any inf/nan appears). modern frameworks do this automatically ( torch.cuda.amp.gradscaler ). **bf16 has the same 8-bit exponent as fp32 , so its range is identical — gradients don't underflow, and no loss scaling is needed.** the cost is only 7 mantissa bits (less precision), which training tolerates well. that's why bf16 is now the default for large-model training even though fp16 has more mantissa. fp16: narrow range, more precision → underflow risk → loss scaling bf16: fp32 range, less precision → no underflow → no loss scaling tf32 — the \"free\" one people forget on ampere and newer, a plain fp32 matmul on tensor cores actually runs in tf32 : inputs are rounded to a 19-bit form (8 exp, 10 mantissa) before the multiply, accumulate in fp32. you get most of fp16's speed at near-fp32 accuracy, and it's on by default in cudnn/cublas. in pytorch it's torch.backends.cuda.matmul.allow_tf32 . good to mention: \"a chunk of the fp32→fp16 speedup people report is really fp32→tf32, already happening under the hood.\" mixed-precision training (the mechanism) \"mixed precision\" = compute in fp16/bf16 for speed, but keep a master copy of weights in fp32 so tiny updates don't get lost to rounding. loop: forward/backward in fp16 (with loss scaling) or bf16, accumulate into fp32 master weights, apply the optimizer in fp32. roughly 2× faster and ~half the memory with negligible accuracy loss. tensor cores are the reason it's fast — they're built for reduced-precision matmul-accumulate. fp8 — the current frontier (hopper / ada) fp8 comes in two flavors because forward and backward want different things: e4m3 (4 exponent, 3 mantissa) — more precision, less range → forward pass, weights & activations. e5m2 (5 exponent, 2 mantissa) — more range, less precision → gradients. fp8 needs per-tensor scaling factors (delayed/dynamic scaling) to keep values in range, much like int8 calibration. nvidia's transformer engine library does this automatically for training and inference. why it matters: fp8 doubles tensor-core throughput vs fp16 and is the headline feature of hopper (h100) — expect at least one fp8 question if the role touches llms. int8 vs fp16 — when to pick which fp16/bf16: ~2× faster, ~half memory, almost no accuracy risk, no calibration . the safe default and often the whole answer. int8: up to ~4× and lowest memory, but needs calibration and can lose accuracy — so you measure it (exactly your project's compare table). best when latency/cost is tight and you can afford the calibration + qat effort. instinct to voice: *\"fp16 first because it's free accuracy-wise; int8 when the latency or cost budget demands it and i can validate the accuracy hit — and i keep sensitive layers (first/last, softmax) in higher precision if int8 hurts.\"* 🔗 connecting the dots — the real stack amp ( torch.cuda.amp , torch.autocast ) for mixed precision; transformer engine for fp8; tensor-core formats are picked by cublas/cudnn/tensorrt automatically. tensorrt's enabled_precisions={torch.half} (your fp16 path) vs the int8 builder flag chooses the format the engine targets. how you'd say it: \"my trt-fp16 row was basically free accuracy-wise; the int8 rows needed calibration and i tracked the drop. on newer hardware i'd reach for fp8 via transformer engine before int8 for llms — similar speed with an easier accuracy story.\" self-check why does fp16 need loss scaling and bf16 not? *(fp16 has a narrow exponent range → gradients underflow; bf16 shares fp32's 8-bit exponent → no underflow.)* what is tf32 and when does it kick in? *(19-bit tensor-core format for fp32 matmuls on ampere+, on by default — near-fp32 accuracy at fp16-ish speed.)* why two fp8 formats? (e4m3 precision-heavy for forward; e5m2 range-heavy for gradients.) in mixed precision, why keep fp32 master weights? *(so small updates aren't lost to fp16 rounding.)*","words":888},{"path":"12-nvidia-model-optimization/tensorrt-internals.md","title":"TensorRT Internals","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"tensorrt-internals\">TensorRT Internals<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> TensorRT is an <strong>optimizing compiler + runtime<\/strong> for inference. You hand it a network (usually via ONNX); it <strong>fuses layers, picks the fastest kernel for your exact GPU, chooses precisions, and serializes an engine<\/strong>. The two concepts NVIDIA will press: what the builder actually does, and <strong>implicit vs explicit quantization<\/strong> — which is exactly your project's \"Option A vs Option B,\" in the official vocabulary.<\/div><\/div>\n<h2 id=\"the-pipeline\">The pipeline<\/h2>\n<pre><code>  PyTorch ──torch.onnx.export──▶ ONNX ──TRT Builder──▶ Engine (plan) ──Runtime──▶ inference\n                                          │\n              layer/tensor fusion · kernel (tactic) auto-tuning · precision selection ·\n              memory planning · (calibration if implicit INT8)<\/code><\/pre>\n<ul><li><strong>Builder<\/strong> — the expensive, offline step. It runs the optimizations below and **times<\/li><\/ul>\n<p>candidate kernels on your actual GPU** to pick the fastest.<\/p>\n<ul><li><strong>Engine (plan file)<\/strong> — the serialized result. <strong>Hardware-specific<\/strong>: an engine built for<\/li><\/ul>\n<p>an RTX 3070 Ti is not guaranteed to run optimally (or at all) on a different arch/TRT   version. Build on the deployment GPU.<\/p>\n<ul><li><strong>Runtime<\/strong> — loads the engine, allocates a <strong>context<\/strong>, binds input/output device<\/li><\/ul>\n<p>buffers, runs <code>enqueueV3<\/code> on a CUDA stream.<\/p>\n<h2 id=\"what-the-builder-actually-does-name-these\">What the builder actually does (name these)<\/h2>\n<ol><li><strong>Layer &amp; tensor fusion<\/strong> — the biggest structural win. Fuses <code>Conv+BN+ReLU<\/code> into one<\/li><\/ol>\n<p>kernel, fuses elementwise chains, collapses concat, etc. Fewer kernel launches, fewer    round-trips to global memory. <em>(This is why BN folding matters — see below.)<\/em><\/p>\n<ol><li><strong>Kernel auto-tuning / tactic selection<\/strong> — for each layer it has many candidate CUDA<\/li><\/ol>\n<p>kernels (different tile sizes, tensor-core paths) and <strong>benchmarks them<\/strong> to pick the    fastest for your shapes and GPU. This is why builds are slow and engines are portable    only within a GPU family.<\/p>\n<ol><li><strong>Precision selection<\/strong> — runs layers in FP16/INT8 where allowed, keeping others in higher<\/li><\/ol>\n<p>precision if needed for accuracy (you can pin per-layer precision).<\/p>\n<ol><li><strong>Memory optimization<\/strong> — reuses activation buffers across layers that don't overlap in<\/li><\/ol>\n<p>time (memory planning), sized by the <strong>workspace<\/strong> you grant it.<\/p>\n<ol><li><strong>Multi-stream / dynamic shapes<\/strong> — supports variable input sizes via optimization<\/li><\/ol>\n<p>profiles (below).<\/p>\n<h2 id=\"implicit-vs-explicit-quantization-the-key-tensorrt-concept\">Implicit vs explicit quantization (the key TensorRT concept)<\/h2>\n<p>Your notes described \"Option A: TRT calibrates itself\" and \"Option B: QDQ nodes baked in.\" Those are the two official INT8 modes:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th><strong>Implicit quantization<\/strong> (Option A)<\/th><th><strong>Explicit quantization / QDQ<\/strong> (Option B)<\/th><\/tr><\/thead><tbody><tr><td>Input<\/td><td>FP32 ONNX + a <strong>calibrator<\/strong><\/td><td>ONNX with <strong>Q/DQ nodes<\/strong> carrying scales<\/td><\/tr><tr><td>Who picks scales<\/td><td>TensorRT's calibrator<\/td><td>Baked in from <strong>QAT<\/strong> (Model-Optimizer)<\/td><\/tr><tr><td>Determinism<\/td><td>Builder chooses which layers go INT8 to maximize speed<\/td><td>You control exactly where INT8 runs<\/td><\/tr><tr><td>Accuracy story<\/td><td>\"PTQ, done by TensorRT\"<\/td><td>Matches the QAT-trained numerics<\/td><\/tr><tr><td>Status<\/td><td>Legacy path; being deprecated<\/td><td><strong>Recommended<\/strong> going forward<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>The subtlety to nail (your notes get this right):<\/strong> Q/DQ nodes are a <strong>build-time instruction, not a runtime op.<\/strong> The builder fuses <code>Q → Conv → DQ<\/code> into a single INT8 kernel and the Q/DQ markers vanish from the engine. So <strong>explicit vs implicit changes achievable accuracy, never the runtime speed<\/strong> — the executed engine is the same shape. Explicit only costs latency if Q/DQ nodes are placed so densely the builder can't fuse them.<\/p>\n<p><em>Why your project used implicit:<\/em> <code>nvidia-modelopt<\/code> (which produces explicit QDQ) was broken on your torch 2.5 stack, and fbgemm's fake-quant ops <strong>can't export to ONNX at all<\/strong>, so you folded QAT weights into a plain model and re-calibrated — a hybrid where the weights got QAT's benefit but the scales came from TRT's calibrator. That's a genuinely good war story: you knew the \"right\" path (explicit QDQ) and why the environment forced the fallback.<\/p>\n<h2 id=\"bn-folding-why-your-issue-7b-existed\">BN folding — why your issue #7b existed<\/h2>\n<p>TensorRT (and QAT) <strong>fold BatchNorm into the preceding conv<\/strong>: since BN is an affine <code>γ·(x−μ)/σ + β<\/code> and conv is linear, the two compose into one conv with adjusted weights and bias. This is both an optimization (one fewer kernel) and the reason your QAT→plain-model weight remap had to move <code>bn.*<\/code> params out of the fused module. Interview-ready phrasing: <em>\"BN folding is exact math, not an approximation — it's why fused Conv+BN+ReLU is one kernel and why my QAT state-dict keys had to be remapped.\"<\/em><\/p>\n<h2 id=\"dynamic-shapes-optimization-profiles\">Dynamic shapes &amp; optimization profiles<\/h2>\n<p>Your engines were fixed-batch (256), which forced the \"pad the last partial batch\" hack. The general fix is an <strong>optimization profile<\/strong>: you declare <code>min / opt / max<\/code> shapes for each dynamic dimension, and TensorRT tunes kernels for <code>opt<\/code> while supporting the whole range. One engine then serves batch sizes 1…N. This is the standard production setup and a clean \"what would you do next\" answer.<\/p>\n<h2 id=\"plugins-custom-ops\">Plugins (custom ops)<\/h2>\n<p>If your model has an op TensorRT doesn't support natively, you write a <strong>plugin<\/strong> (<code>IPluginV3<\/code>) — a custom CUDA kernel TRT calls as a black-box layer. Common for novel attention variants, NMS, custom preprocessing. Know that plugins exist and break fusion across their boundary (the builder can't see inside them).<\/p>\n<h2 id=\"serving-it-triton-inference-server\">Serving it: Triton Inference Server<\/h2>\n<p>An engine alone isn't a service. <strong>Triton<\/strong> wraps it with <strong>dynamic batching<\/strong> (group requests within a latency window), <strong>concurrent model instances<\/strong> (multiple engines per GPU to raise utilization), <strong>model ensembles/pipelines<\/strong>, multi-framework backends (TensorRT, ONNX, PyTorch, Python), and metrics. The production shape: <em>\"TensorRT engine served by Triton with dynamic batching and a couple of concurrent instances.\"<\/em> This is a natural \"how would you deploy it\" follow-up to your project.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>torch-tensorrt<\/strong> / <code>torch.compile<\/code> backend and <strong><code>trtexec<\/code><\/strong> (CLI to build+profile engines) for classic models; <strong>ONNX Runtime<\/strong> as the portable alternative; <strong>TensorRT-LLM<\/strong> for LLMs; <strong>Triton<\/strong> for serving; <strong>NVIDIA TensorRT-Model-Optimizer<\/strong> for explicit-QDQ quantization. <code>trtexec --int8 --fp16 --best<\/code> is the fastest way to see achievable latency.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I exported to ONNX and built an INT8 engine with an entropy calibrator — implicit quantization. The cleaner path is explicit QDQ from QAT via Model-Optimizer, which my torch/modelopt versions didn't support, so I folded QAT weights in and re-calibrated. In production I'd serve the engine through Triton with dynamic batching.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What are the two biggest things the TRT builder does? *(layer fusion + kernel auto-tuning /<\/li><\/ul>\n<p>tactic selection for your specific GPU.)*<\/p>\n<ul><li>Implicit vs explicit quantization? *(calibrator picks scales &amp; builder chooses INT8 layers<\/li><\/ul>\n<p>vs Q/DQ nodes with baked-in QAT scales you control; explicit is recommended.)*<\/p>\n<ul><li>Do QDQ nodes slow inference? *(no — build-time markers, fused away; they affect accuracy,<\/li><\/ul>\n<p>not speed, unless placed un-fusably.)*<\/p>\n<ul><li>Why is a TRT engine not portable across GPUs? *(kernels are auto-tuned/timed for a specific<\/li><\/ul>\n<p>arch + TRT version.)*<\/p>","toc":[{"level":2,"id":"the-pipeline","text":"The pipeline"},{"level":2,"id":"what-the-builder-actually-does-name-these","text":"What the builder actually does (name these)"},{"level":2,"id":"implicit-vs-explicit-quantization-the-key-tensorrt-concept","text":"Implicit vs explicit quantization (the key TensorRT concept)"},{"level":2,"id":"bn-folding-why-your-issue-7b-existed","text":"BN folding — why your issue #7b existed"},{"level":2,"id":"dynamic-shapes-optimization-profiles","text":"Dynamic shapes &amp; optimization profiles"},{"level":2,"id":"plugins-custom-ops","text":"Plugins (custom ops)"},{"level":2,"id":"serving-it-triton-inference-server","text":"Serving it: Triton Inference Server"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"tensorrt internals 💡 tl;dr tensorrt is an optimizing compiler + runtime for inference. you hand it a network (usually via onnx); it fuses layers, picks the fastest kernel for your exact gpu, chooses precisions, and serializes an engine . the two concepts nvidia will press: what the builder actually does, and implicit vs explicit quantization — which is exactly your project's \"option a vs option b,\" in the official vocabulary. the pipeline pytorch ──torch.onnx.export──▶ onnx ──trt builder──▶ engine (plan) ──runtime──▶ inference │ layer/tensor fusion · kernel (tactic) auto-tuning · precision selection · memory planning · (calibration if implicit int8) builder — the expensive, offline step. it runs the optimizations below and **times candidate kernels on your actual gpu** to pick the fastest. engine (plan file) — the serialized result. hardware-specific : an engine built for an rtx 3070 ti is not guaranteed to run optimally (or at all) on a different arch/trt version. build on the deployment gpu. runtime — loads the engine, allocates a context , binds input/output device buffers, runs enqueuev3 on a cuda stream. what the builder actually does (name these) layer & tensor fusion — the biggest structural win. fuses conv+bn+relu into one kernel, fuses elementwise chains, collapses concat, etc. fewer kernel launches, fewer round-trips to global memory. (this is why bn folding matters — see below.) kernel auto-tuning / tactic selection — for each layer it has many candidate cuda kernels (different tile sizes, tensor-core paths) and benchmarks them to pick the fastest for your shapes and gpu. this is why builds are slow and engines are portable only within a gpu family. precision selection — runs layers in fp16/int8 where allowed, keeping others in higher precision if needed for accuracy (you can pin per-layer precision). memory optimization — reuses activation buffers across layers that don't overlap in time (memory planning), sized by the workspace you grant it. multi-stream / dynamic shapes — supports variable input sizes via optimization profiles (below). implicit vs explicit quantization (the key tensorrt concept) your notes described \"option a: trt calibrates itself\" and \"option b: qdq nodes baked in.\" those are the two official int8 modes: implicit quantization (option a) explicit quantization / qdq (option b) input fp32 onnx + a calibrator onnx with q/dq nodes carrying scales who picks scales tensorrt's calibrator baked in from qat (model-optimizer) determinism builder chooses which layers go int8 to maximize speed you control exactly where int8 runs accuracy story \"ptq, done by tensorrt\" matches the qat-trained numerics status legacy path; being deprecated recommended going forward the subtlety to nail (your notes get this right): q/dq nodes are a build-time instruction, not a runtime op. the builder fuses q → conv → dq into a single int8 kernel and the q/dq markers vanish from the engine. so explicit vs implicit changes achievable accuracy, never the runtime speed — the executed engine is the same shape. explicit only costs latency if q/dq nodes are placed so densely the builder can't fuse them. why your project used implicit: nvidia-modelopt (which produces explicit qdq) was broken on your torch 2.5 stack, and fbgemm's fake-quant ops can't export to onnx at all , so you folded qat weights into a plain model and re-calibrated — a hybrid where the weights got qat's benefit but the scales came from trt's calibrator. that's a genuinely good war story: you knew the \"right\" path (explicit qdq) and why the environment forced the fallback. bn folding — why your issue #7b existed tensorrt (and qat) fold batchnorm into the preceding conv : since bn is an affine γ·(x−μ)/σ + β and conv is linear, the two compose into one conv with adjusted weights and bias. this is both an optimization (one fewer kernel) and the reason your qat→plain-model weight remap had to move bn.* params out of the fused module. interview-ready phrasing: \"bn folding is exact math, not an approximation — it's why fused conv+bn+relu is one kernel and why my qat state-dict keys had to be remapped.\" dynamic shapes & optimization profiles your engines were fixed-batch (256), which forced the \"pad the last partial batch\" hack. the general fix is an optimization profile : you declare min / opt / max shapes for each dynamic dimension, and tensorrt tunes kernels for opt while supporting the whole range. one engine then serves batch sizes 1…n. this is the standard production setup and a clean \"what would you do next\" answer. plugins (custom ops) if your model has an op tensorrt doesn't support natively, you write a plugin ( ipluginv3 ) — a custom cuda kernel trt calls as a black-box layer. common for novel attention variants, nms, custom preprocessing. know that plugins exist and break fusion across their boundary (the builder can't see inside them). serving it: triton inference server an engine alone isn't a service. triton wraps it with dynamic batching (group requests within a latency window),

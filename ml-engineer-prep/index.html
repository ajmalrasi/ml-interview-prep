lly (they go stale and can't be cited). fine-tune for how it responds, retrieve for what it knows. full fine-tuning vs peft full fine-tuning updates all the model's billions of weights — powerful but expensive (lots of gpu memory) and it produces a full copy of the model per task. peft (parameter-efficient fine-tuning) freezes the original weights and trains only a small number of new ones. lora is the popular method: it injects tiny low-rank \"adapter\" matrices into the model and trains only those — often <1% of the parameters — getting most of full fine-tuning's benefit at a fraction of the cost and memory. qlora goes further, fine-tuning on top of a quantized model so it fits on a single gpu. full fine-tuning update all n billion weights. expensive · full model copy per task lora (peft) freeze the model, train small adapters (<1%) . cheap · swap adapters per task the bonus: lora adapters are small and swappable — one base model can serve many tasks by loading different adapters, which is great for serving economics. what you need to fine-tune fine-tuning is supervised learning, so you need a quality dataset of example input→output pairs in the format/behavior you want. data quality matters more than quantity — a few hundred clean, on-target examples often beat thousands of noisy ones. this is the real work of fine-tuning; the training itself is largely a solved recipe. 🔗 connecting the dots: the real stack the stack is huggingface peft (lora/qlora), bitsandbytes (4-bit for qlora), trl (sft/rlhf trainers), and wrappers like axolotl or unsloth that make it a config file. adapters register in mlflow / huggingface hub and serve on vllm (which can hot-swap lora adapters). how you'd say it: \"to adapt a model's behavior i'd qlora-fine-tune with peft + bitsandbytes on a single gpu using axolotl, then serve the base model with the lora adapter on vllm.\" self-check when fine-tune instead of rag? *(when you need specific behavior/style/format, not just facts — rag handles knowledge.)* what does lora do? *(freezes the base model, trains tiny low-rank adapters (<1% of params) — cheap, swappable per task.)* what matters most for a fine-tuning dataset? *(quality and on-target formatting of the input→output examples, over sheer quantity.)*","words":518},{"path":"09-generative-ai-llms/llmops-and-eval.md","title":"LLMOps & Evaluation","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"llmops-evaluation\">LLMOps &amp; Evaluation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Running LLMs in production adds new problems on top of normal MLOps: they're <strong>expensive<\/strong> (pay per token), <strong>slow<\/strong> (generate token by token), <strong>non-deterministic<\/strong>, and can <strong>hallucinate<\/strong> or be misused. LLMOps is how you serve them affordably and safely, and <strong>evaluation<\/strong> is uniquely hard because there's rarely one \"correct\" output.<\/div><\/div>\n<h2 id=\"whats-different-about-serving-llms\">What's different about serving LLMs<\/h2>\n<ul><li><strong>Cost per token<\/strong> — you pay for input + output tokens (API) or big GPUs (self-hosted),<\/li><\/ul>\n<p>so cost scales with prompt and response length. Long RAG contexts get expensive fast.<\/p>\n<ul><li><strong>Latency<\/strong> — generation is sequential (token by token), so responses stream; you<\/li><\/ul>\n<p>optimize with techniques like <strong>KV caching<\/strong>, batching, and smaller/quantized models   (section 8).<\/p>\n<ul><li><strong>Non-determinism<\/strong> — the same prompt can give different answers, which complicates<\/li><\/ul>\n<p>testing and caching.<\/p>\n<h2 id=\"cost-latency-levers-name-a-few\">Cost &amp; latency levers (name a few)<\/h2>\n<p>Prompt-caching and <strong>semantic caching<\/strong> (reuse answers for similar questions), routing easy queries to a <strong>smaller/cheaper model<\/strong> and hard ones to a big one, trimming prompt/context length, quantization and optimized runtimes (vLLM, TGI, TensorRT-LLM) for self-hosting, and capping max output tokens. The instinct is the same as any serving optimization: cut tokens and compute without hurting quality.<\/p>\n<h2 id=\"guardrails-safety\">Guardrails &amp; safety<\/h2>\n<p>Because LLMs generate open-ended text, production apps wrap them in guardrails: <strong>input filtering<\/strong> (block prompt-injection and abuse), <strong>output filtering<\/strong> (toxicity, PII, format validation), grounding via RAG to reduce hallucination, and <strong>human-in-the-loop<\/strong> for high-stakes actions. \"The model is one component inside a system with guardrails\" is the mature framing.<\/p>\n<h2 id=\"the-evaluation-problem\">The evaluation problem<\/h2>\n<p>For a classifier you have accuracy; for generated text there's usually <strong>no single correct answer<\/strong>, which makes evaluation the hardest part. Approaches, combined in practice:<\/p>\n<ul><li><strong>Human evaluation<\/strong> — people rate outputs; the gold standard but slow and costly.<\/li><li><strong>LLM-as-a-judge<\/strong> — use a strong model to score outputs against a rubric; scalable,<\/li><\/ul>\n<p>increasingly common, but must itself be validated.<\/p>\n<ul><li><strong>Reference-based metrics<\/strong> — BLEU/ROUGE (overlap with a reference) for summarization/<\/li><\/ul>\n<p>translation; limited but cheap.<\/p>\n<ul><li><strong>Task-specific checks<\/strong> — for structured output, just validate it (does the JSON parse?<\/li><\/ul>\n<p>is the answer in the retrieved docs?); for RAG, measure <strong>groundedness<\/strong> (is the answer   supported by sources?) and retrieval quality.<\/p>\n<p>The honest answer to \"how do you evaluate an LLM app?\": <em>\"a mix — automated checks and LLM-as-judge for scale on every change, plus periodic human review, and for RAG I specifically measure groundedness and retrieval relevance, not just fluency.\"<\/em><\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>Serving:<\/strong> <strong>vLLM<\/strong> / <strong>TGI<\/strong>. <strong>Evaluation:<\/strong> <strong>Ragas<\/strong> (RAG groundedness/retrieval), <strong>DeepEval<\/strong>, <strong>TruLens<\/strong>, <strong>LangSmith<\/strong> / <strong>Langfuse<\/strong> / <strong>Arize Phoenix<\/strong> (tracing + eval). <strong>Guardrails:<\/strong> <strong>Guardrails AI<\/strong>, <strong>NeMo Guardrails<\/strong>. <strong>Observability:<\/strong> LangSmith / Langfuse trace every prompt, token, and cost.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Every LLM call was traced in Langfuse for cost and latency; RAG quality was scored with Ragas on each change; Guardrails validated output format and blocked injection.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Three things that make LLM serving harder than normal model serving? *(cost per token,<\/li><\/ul>\n<p>token-by-token latency, non-determinism, hallucination — any three.)*<\/p>\n<ul><li>Two ways to cut LLM cost? *(caching, route to smaller models, trim context, cap output,<\/li><\/ul>\n<p>quantize/optimized runtime — any two.)*<\/p>\n<ul><li>Why is evaluating generated text hard, and one approach? *(no single correct answer;<\/li><\/ul>\n<p>human eval, LLM-as-judge, or task-specific checks like groundedness.)*<\/p>","toc":[{"level":2,"id":"whats-different-about-serving-llms","text":"What's different about serving LLMs"},{"level":2,"id":"cost-latency-levers-name-a-few","text":"Cost &amp; latency levers (name a few)"},{"level":2,"id":"guardrails-safety","text":"Guardrails &amp; safety"},{"level":2,"id":"the-evaluation-problem","text":"The evaluation problem"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"llmops & evaluation 💡 tl;dr running llms in production adds new problems on top of normal mlops: they're expensive (pay per token), slow (generate token by token), non-deterministic , and can hallucinate or be misused. llmops is how you serve them affordably and safely, and evaluation is uniquely hard because there's rarely one \"correct\" output. what's different about serving llms cost per token — you pay for input + output tokens (api) or big gpus (self-hosted), so cost scales with prompt and response length. long rag contexts get expensive fast. latency — generation is sequential (token by token), so responses stream; you optimize with techniques like kv caching , batching, and smaller/quantized models (section 8). non-determinism — the same prompt can give different answers, which complicates testing and caching. cost & latency levers (name a few) prompt-caching and semantic caching (reuse answers for similar questions), routing easy queries to a smaller/cheaper model and hard ones to a big one, trimming prompt/context length, quantization and optimized runtimes (vllm, tgi, tensorrt-llm) for self-hosting, and capping max output tokens. the instinct is the same as any serving optimization: cut tokens and compute without hurting quality. guardrails & safety because llms generate open-ended text, production apps wrap them in guardrails: input filtering (block prompt-injection and abuse), output filtering (toxicity, pii, format validation), grounding via rag to reduce hallucination, and human-in-the-loop for high-stakes actions. \"the model is one component inside a system with guardrails\" is the mature framing. the evaluation problem for a classifier you have accuracy; for generated text there's usually no single correct answer , which makes evaluation the hardest part. approaches, combined in practice: human evaluation — people rate outputs; the gold standard but slow and costly. llm-as-a-judge — use a strong model to score outputs against a rubric; scalable, increasingly common, but must itself be validated. reference-based metrics — bleu/rouge (overlap with a reference) for summarization/ translation; limited but cheap. task-specific checks — for structured output, just validate it (does the json parse? is the answer in the retrieved docs?); for rag, measure groundedness (is the answer supported by sources?) and retrieval quality. the honest answer to \"how do you evaluate an llm app?\": \"a mix — automated checks and llm-as-judge for scale on every change, plus periodic human review, and for rag i specifically measure groundedness and retrieval relevance, not just fluency.\" 🔗 connecting the dots: the real stack serving: vllm / tgi . evaluation: ragas (rag groundedness/retrieval), deepeval , trulens , langsmith / langfuse / arize phoenix (tracing + eval). guardrails: guardrails ai , nemo guardrails . observability: langsmith / langfuse trace every prompt, token, and cost. how you'd say it: \"every llm call was traced in langfuse for cost and latency; rag quality was scored with ragas on each change; guardrails validated output format and blocked injection.\" self-check three things that make llm serving harder than normal model serving? *(cost per token, token-by-token latency, non-determinism, hallucination — any three.)* two ways to cut llm cost? *(caching, route to smaller models, trim context, cap output, quantize/optimized runtime — any two.)* why is evaluating generated text hard, and one approach? *(no single correct answer; human eval, llm-as-judge, or task-specific checks like groundedness.)*","words":532},{"path":"10-system-design/README.md","title":"Overview","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"10-ml-system-design\">10: ML System Design<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The open-ended interview round: <em>\"design an ML system for X\"<\/em> (recommendations, fraud, search, a feed). It's not about one model — it's about the whole pipeline: framing the problem, data, features, model, serving, and monitoring, with sensible trade-offs. This section gives you a repeatable <strong>framework<\/strong> plus four worked examples.<\/div><\/div>\n<h2 id=\"what-theyre-testing\">What they're testing<\/h2>\n<p>Not whether you know the fanciest model, but whether you can <strong>structure a full solution<\/strong> and reason about trade-offs like a senior engineer: latency vs accuracy, batch vs online, build vs buy, cost vs freshness. A candidate who jumps straight to \"I'd use a neural network\" fails; one who clarifies the problem and walks the pipeline succeeds.<\/p>\n<h2 id=\"the-pages\">The pages<\/h2>\n<ul><li><strong>A design framework<\/strong> — the repeatable structure to answer <em>any<\/em> ML design question.<\/li><li><strong>Worked example: recommender<\/strong> — the classic, walked end to end.<\/li><li><strong>Worked example: ML platform<\/strong> — designing the <em>infrastructure<\/em> many models run on.<\/li><li><strong>Worked example: hybrid perception platform<\/strong> — petabyte-scale, on-prem + cloud GPUs,<\/li><\/ul>\n<p>reproducibility, and rollbacks.<\/p>\n<ul><li><strong>Worked example: data-loading library<\/strong> — the classes and interfaces for a streaming<\/li><\/ul>\n<p>loader that keeps the GPU fed.<\/p>\n<h2 id=\"the-golden-rule\">The golden rule<\/h2>\n<p>Start by <strong>asking questions<\/strong>, not answering. Scope, scale, latency, and success metric change the whole design — clarify them first, then structure your answer with the framework.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"framework.md\" href=\"#\">framework.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-theyre-testing","text":"What they're testing"},{"level":2,"id":"the-pages","text":"The pages"},{"level":2,"id":"the-golden-rule","text":"The golden rule"}],"text":"10: ml system design 💡 tl;dr the open-ended interview round: \"design an ml system for x\" (recommendations, fraud, search, a feed). it's not about one model — it's about the whole pipeline: framing the problem, data, features, model, serving, and monitoring, with sensible trade-offs. this section gives you a repeatable framework plus four worked examples. what they're testing not whether you know the fanciest model, but whether you can structure a full solution and reason about trade-offs like a senior engineer: latency vs accuracy, batch vs online, build vs buy, cost vs freshness. a candidate who jumps straight to \"i'd use a neural network\" fails; one who clarifies the problem and walks the pipeline succeeds. the pages a design framework — the repeatable structure to answer any ml design question. worked example: recommender — the classic, walked end to end. worked example: ml platform — designing the infrastructure many models run on. worked example: hybrid perception platform — petabyte-scale, on-prem + cloud gpus, reproducibility, and rollbacks. worked example: data-loading library — the classes and interfaces for a streaming loader that keeps the gpu fed. the golden rule start by asking questions , not answering. scope, scale, latency, and success metric change the whole design — clarify them first, then structure your answer with the framework. → start: framework.md","words":218},{"path":"10-system-design/framework.md","title":"A Design Framework","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"a-design-framework\">A Design Framework<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Answer any \"design an ML system\" question with the same skeleton: clarify the problem, define the metric, sketch the data and features, pick a model, design serving, then monitoring — talking trade-offs throughout. Structure beats cleverness.<\/div><\/div>\n<h2 id=\"the-steps\">The steps<\/h2>\n<p><strong>1. Clarify the problem &amp; requirements.<\/strong> Don't design yet — ask. What exactly are we predicting? What's the scale (users, requests/sec)? Latency budget (real-time or batch)? What does success mean in business terms? These answers reshape everything, and asking them is itself a signal of seniority.<\/p>\n<p><strong>2. Frame it as an ML problem.<\/strong> Translate the business goal into a concrete ML task: inputs, output, and the <strong>metric<\/strong>. \"Recommend products\" → \"rank items by predicted click/purchase probability for this user,\" optimized offline for something like AUC and online for click-through or revenue.<\/p>\n<p><strong>3. Data &amp; features.<\/strong> What data exists (user history, item metadata, context)? How is it collected and how fresh? What features would be predictive, and do you need a feature store for consistency and low-latency serving (section 2)?<\/p>\n<p><strong>4. Model.<\/strong> Start simple (a baseline — popularity, logistic regression), then justify complexity. Name a reasonable choice and <em>why<\/em>, and mention the baseline you'd beat. Simple- first is a maturity signal.<\/p>\n<p><strong>5. Serving.<\/strong> Batch or real-time (section 5)? For low-latency at scale, a common pattern is <strong>two-stage<\/strong>: a cheap <strong>candidate generation<\/strong> step narrows millions of items to hundreds, then an expensive <strong>ranking<\/strong> model orders those. Discuss latency, scaling, caching.<\/p>\n<p><strong>6. Monitoring &amp; iteration.<\/strong> How do you know it works in production — online metric via A/B test (section 4), drift and quality monitoring (section 6), and a retraining plan.<\/p>\n<h2 id=\"the-two-stage-pattern-worth-memorizing\">The two-stage pattern (worth memorizing)<\/h2>\n<p>Most large-scale ranking/recommendation/search systems use it, because scoring millions of items per request with a heavy model is impossible in real time:<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">millions of items<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">CANDIDATE GENERATION<span class=\"nsub\">cheap · fast · high recall<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">~hundreds<\/span><\/span>\n    <span class=\"node\">RANKING<span class=\"nsub\">expensive · accurate<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">top-N<\/span><\/span>\n    <span class=\"node out\">user<\/span>\n  <\/div>\n<\/div>\n<h2 id=\"talk-trade-offs-out-loud\">Talk trade-offs out loud<\/h2>\n<p>The whole point is judgment: batch (cheap, stale) vs online (fresh, costly); a bigger model (accurate, slow, expensive) vs a smaller one; more features (better, more pipeline risk). Naming the trade-off and <em>making a choice with a reason<\/em> is what they're scoring.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Each layer of your answer maps to named tools, and dropping them in shows you've built, not just diagrammed: features → <strong>Feast<\/strong>; training → <strong>PyTorch / XGBoost<\/strong> on <strong>SageMaker/Vertex/Databricks<\/strong>; tracking → <strong>MLflow<\/strong>; candidate retrieval → a <strong>vector DB / ANN<\/strong> (FAISS, ScaNN); serving → <strong>Triton / KServe<\/strong>; monitoring → <strong>Evidently + Prometheus/Grafana<\/strong>; A/B → <strong>Statsig<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I sketch the pipeline first, then name a tool per box — feature store, MLflow, an ANN index for retrieval, KServe for serving, Evidently for drift — so it's clearly a real system, not a whiteboard fantasy.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What's the first thing to do in an ML design question? *(clarify requirements — scope,<\/li><\/ul>\n<p>scale, latency, success metric — before designing.)*<\/p>\n<ul><li>What is the two-stage pattern and why use it? *(cheap candidate generation then expensive<\/li><\/ul>\n<p>ranking — you can't score millions of items in real time with a heavy model.)*<\/p>\n<ul><li>Why start with a simple baseline? *(it's a maturity signal, gives something to beat, and<\/li><\/ul>\n<p>often is enough.)*<\/p>","toc":[{"level":2,"id":"the-steps","text":"The steps"},{"level":2,"id":"the-two-stage-pattern-worth-memorizing","text":"The two-stage pattern (worth memorizing)"},{"level":2,"id":"talk-trade-offs-out-loud","text":"Talk trade-offs out loud"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"a design framework 💡 tl;dr answer any \"design an ml system\" question with the same skeleton: clarify the problem, define the metric, sketch the data and features, pick a model, design serving, then monitoring — talking trade-offs throughout. structure beats cleverness. the steps 1. clarify the problem & requirements. don't design yet — ask. what exactly are we predicting? what's the scale (users, requests/sec)? latency budget (real-time or batch)? what does success mean in business terms? these answers reshape everything, and asking them is itself a signal of seniority. 2. frame it as an ml problem. translate the business goal into a concrete ml task: inputs, output, and the metric . \"recommend products\" → \"rank items by predicted click/purchase probability for this user,\" optimized offline for something like auc and online for click-through or revenue. 3. data & features. what data exists (user history, item metadata, context)? how is it collected and how fresh? what features would be predictive, and do you need a feature store for consistency and low-latency serving (section 2)? 4. model. start simple (a baseline — popularity, logistic regression), then justify complexity. name a reasonable choice and why , and mention the baseline you'd beat. simple- first is a maturity signal. 5. serving. batch or real-time (section 5)? for low-latency at scale, a common pattern is two-stage : a cheap candidate generation step narrows millions of items to hundreds, then an expensive ranking model orders those. discuss latency, scaling, caching. 6. monitoring & iteration. how do you know it works in production — online metric via a/b test (section 4), drift and quality monitoring (section 6), and a retraining plan. the two-stage pattern (worth memorizing) most large-scale ranking/recommendation/search systems use it, because scoring millions of items per request with a heavy model is impossible in real time: millions of items candidate generation cheap · fast · high recall ~hundreds ranking expensive · accurate top-n user talk trade-offs out loud the whole point is judgment: batch (cheap, stale) vs online (fresh, costly); a bigger model (accurate, slow, expensive) vs a smaller one; more features (better, more pipeline risk). naming the trade-off and making a choice with a reason is what they're scoring. 🔗 connecting the dots: the real stack each layer of your answer maps to named tools, and dropping them in shows you've built, not just diagrammed: features → feast ; training → pytorch / xgboost on sagemaker/vertex/databricks ; tracking → mlflow ; candidate retrieval → a vector db / ann (faiss, scann); serving → triton / kserve ; monitoring → evidently + prometheus/grafana ; a/b → statsig . how you'd say it: \"i sketch the pipeline first, then name a tool per box — feature store, mlflow, an ann index for retrieval, kserve for serving, evidently for drift — so it's clearly a real system, not a whiteboard fantasy.\" self-check what's the first thing to do in an ml design question? *(clarify requirements — scope, scale, latency, success metric — before designing.)* what is the two-stage pattern and why use it? *(cheap candidate generation then expensive ranking — you can't score millions of items in real time with a heavy model.)* why start with a simple baseline? *(it's a maturity signal, gives something to beat, and often is enough.)*","words":544},{"path":"10-system-design/worked-recommender.md","title":"Worked Example: Recommender","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-recommender\">Worked Example: Recommender<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> \"Design a recommendation system\" walked through the framework. The headline answer is the <strong>two-stage<\/strong> design (candidate generation → ranking) plus honest handling of the classic gotchas: cold start, feedback loops, and freshness.<\/div><\/div>\n<h2 id=\"1-clarify\">1. Clarify<\/h2>\n<p>Ask: recommend <em>what<\/em> (products, videos, posts) and <em>where<\/em> (homepage, \"related items\")? Scale (how many users/items)? Latency (must render in ~100ms)? Success metric (clicks, watch time, purchases, retention)? Assume: recommend products on the homepage, millions of items, real-time, optimize for purchases with click-through as a proxy.<\/p>\n<h2 id=\"2-frame-as-ml\">2. Frame as ML<\/h2>\n<p>Predict, for a (user, item) pair, the probability the user engages (clicks/buys), then rank items by that score. Offline metric: AUC or a ranking metric (NDCG); online metric: click-through and purchase rate via A/B test.<\/p>\n<h2 id=\"3-data-features\">3. Data &amp; features<\/h2>\n<ul><li><strong>User features<\/strong> — history, demographics, recent activity/session context.<\/li><li><strong>Item features<\/strong> — category, price, popularity, embeddings.<\/li><li><strong>Interaction data<\/strong> — the clicks/purchases that are your labels (implicit feedback).<\/li><li>Serve these via a <strong>feature store<\/strong> so training and real-time serving agree (section 2).<\/li><\/ul>\n<h2 id=\"4-model-the-two-stage-design\">4. Model: the two-stage design<\/h2>\n<p>You can't score millions of items per request in 100ms, so split it:<\/p>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <span class=\"node data\">all items <span class=\"nsub\">millions<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">CANDIDATE GENERATION<span class=\"nsub\">cheap retrieval — embedding similarity / collaborative filtering / “users like you bought” → ~hundreds<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">RANKING<span class=\"nsub\">a stronger model (gradient boosting or neural ranker) scores those few hundred with rich features<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node out\">top-N ordered list → user<\/span>\n  <\/div>\n<\/div>\n<p>Candidate generation optimizes <strong>recall<\/strong> (don't miss good items) and speed; ranking optimizes <strong>precision/order<\/strong> with an expensive model on a small set. This split is the core insight of the whole answer.<\/p>\n<h2 id=\"5-serving\">5. Serving<\/h2>\n<p>Precompute item embeddings offline; do candidate retrieval with a <strong>vector/ANN index<\/strong> (approximate nearest neighbor) for speed; run ranking online behind a low-latency service; <strong>cache<\/strong> where possible. Fresh signals (this session's clicks) feed in real time.<\/p>\n<h2 id=\"6-the-classic-gotchas-raise-these-unprompted\">6. The classic gotchas (raise these unprompted)<\/h2>\n<ul><li><strong>Cold start<\/strong> — new users/items have no history. Fall back to popularity, content-based<\/li><\/ul>\n<p>features, or ask for a few preferences. Naming cold start scores big.<\/p>\n<ul><li><strong>Feedback loop<\/strong> — recommending only popular items makes them more popular forever;<\/li><\/ul>\n<p>inject <strong>exploration<\/strong> (some diverse/random items) to keep learning (section 6).<\/p>\n<ul><li><strong>Freshness<\/strong> — trends and new items matter; blend real-time signals and re-index often.<\/li><li><strong>Bias &amp; diversity<\/strong> — avoid filter bubbles; sometimes optimize for diversity, not just<\/li><\/ul>\n<p>predicted clicks.<\/p>\n<h2 id=\"7-monitor\">7. Monitor<\/h2>\n<p>A/B test the online metric, watch drift and engagement over time, and retrain regularly as tastes shift.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Concrete pieces: candidate generation is a <strong>two-tower<\/strong> embedding model with an <strong>ANN index<\/strong> (<strong>FAISS<\/strong>, <strong>ScaNN<\/strong>, or <strong>Vespa<\/strong> / a vector DB); features come from a <strong>feature store<\/strong> (Feast); ranking is <strong>XGBoost<\/strong> or a neural ranker (<strong>DLRM<\/strong>); serving is <strong>Triton / KServe<\/strong>; freshness flows through <strong>Kafka<\/strong>. Everything is tracked in <strong>MLflow<\/strong> and A/B tested via <strong>Statsig<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Candidate gen was a two-tower model served from a FAISS index, ranking was XGBoost on feature-store features via KServe, and new models shipped behind a Statsig A/B with exploration traffic to avoid feedback loops.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why two stages instead of one model over all items? *(can't score millions in real time;<\/li><\/ul>\n<p>cheap recall then expensive ranking on a small set.)*<\/p>\n<ul><li>What is cold start and one fix? *(no history for new users/items; use popularity/content<\/li><\/ul>\n<p>features or ask preferences.)*<\/p>\n<ul><li>Why add exploration? <em>(to break the feedback loop where popular items self-reinforce.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"1-clarify","text":"1. Clarify"},{"level":2,"id":"2-frame-as-ml","text":"2. Frame as ML"},{"level":2,"id":"3-data-features","text":"3. Data &amp; features"},{"level":2,"id":"4-model-the-two-stage-design","text":"4. Model: the two-stage design"},{"level":2,"id":"5-serving","text":"5. Serving"},{"level":2,"id":"6-the-classic-gotchas-raise-these-unprompted","text":"6. The classic gotchas (raise these unprompted)"},{"level":2,"id":"7-monitor","text":"7. Monitor"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"worked example: recommender 💡 tl;dr \"design a recommendation system\" walked through the framework. the headline answer is the two-stage design (candidate generation → ranking) plus honest handling of the classic gotchas: cold start, feedback loops, and freshness. 1. clarify ask: recommend what (products, videos, posts) and where (homepage, \"related items\")? scale (how many users/items)? latency (must render in ~100ms)? success metric (clicks, watch time, purchases, retention)? assume: recommend products on the homepage, millions of items, real-time, optimize for purchases with click-through as a proxy. 2. frame as ml predict, for a (user, item) pair, the probability the user engages (clicks/buys), then rank items by that score. offline metric: auc or a ranking metric (ndcg); online metric: click-through and purchase rate via a/b test. 3. data & features user features — history, demographics, recent activity/session context. item features — category, price, popularity, embeddings. interaction data — the clicks/purchases that are your labels (implicit feedback). serve these via a feature store so training and real-time serving agree (section 2). 4. model: the two-stage design you can't score millions of items per request in 100ms, so split it: all items millions candidate generation cheap retrieval — embedding similarity / collaborative filtering / “users like you bought” → ~hundreds ranking a stronger model (gradient boosting or neural ranker) scores those few hundred with rich features top-n ordered list → user candidate generation optimizes recall (don't miss good items) and speed; ranking optimizes precision/order with an expensive model on a small set. this split is the core insight of the whole answer. 5. serving precompute item embeddings offline; do candidate retrieval with a vector/ann index (approximate nearest neighbor) for speed; run ranking online behind a low-latency service; cache where possible. fresh signals (this session's clicks) feed in real time. 6. the classic gotchas (raise these unprompted) cold start — new users/items have no history. fall back to popularity, content-based features, or ask for a few preferences. naming cold start scores big. feedback loop — recommending only popular items makes them more popular forever; inject exploration (some diverse/random items) to keep learning (section 6). freshness — trends and new items matter; blend real-time signals and re-index often. bias & diversity — avoid filter bubbles; sometimes optimize for diversity, not just predicted clicks. 7. monitor a/b test the online metric, watch drift and engagement over time, and retrain regularly as tastes shift. 🔗 connecting the dots: the real stack concrete pieces: candidate generation is a two-tower embedding model with an ann index ( faiss , scann , or vespa / a vector db); features come from a feature store (feast); ranking is xgboost or a neural ranker ( dlrm ); serving is triton / kserve ; freshness flows through kafka . everything is tracked in mlflow and a/b tested via statsig . how you'd say it: \"candidate gen was a two-tower model served from a faiss index, ranking was xgboost on feature-store features via kserve, and new models shipped behind a statsig a/b with exploration traffic to avoid feedback loops.\" self-check why two stages instead of one model over all items? *(can't score millions in real time; cheap recall then expensive ranking on a small set.)* what is cold start and one fix? *(no history for new users/items; use popularity/content features or ask preferences.)* why add exploration? (to break the feedback loop where popular items self-reinforce.)","words":559},{"path":"10-system-design/worked-ml-platform.md","title":"Worked Example: ML Platform","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-ml-platform\">Worked Example: ML Platform<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Sometimes the design question is <em>infrastructure<\/em>, not a single model: \"design a platform so our data scientists can train, deploy, and monitor many models.\" The answer is essentially the whole MLOps stack from sections 2–7, assembled into a self-serve system.<\/div><\/div>\n<h2 id=\"whats-being-asked\">What's being asked<\/h2>\n<p>Not \"build one model\" but \"build the paved road many models run on.\" The goal is to let teams go from idea to production <strong>fast, safely, and repeatably<\/strong>, without each team reinventing pipelines, serving, and monitoring. This tests whether you see the big picture.<\/p>\n<h2 id=\"the-components-walk-the-lifecycle\">The components (walk the lifecycle)<\/h2>\n<div class=\"diagram\">\n  <table class=\"maptable\">\n    <tbody>\n      <tr><td class=\"mfrom\"><b>Data layer<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">ingestion, storage (lake / warehouse), <b>feature store<\/b> (shared features)<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>Experiment layer<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">notebooks / compute, <b>experiment tracking<\/b>, data versioning<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>Training layer<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">scalable training (K8s / managed), pipelines, HPO<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>Registry<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\"><b>model registry<\/b> — versioned, staged promotion<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>Serving layer<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">batch + online serving, autoscaling, canary rollout<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>Monitoring layer<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">drift, data quality, ops metrics, alerting, retraining triggers<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>Cross-cutting<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">CI/CD/CT automation, IaC, access control, cost tracking<\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<p>Each box maps to a section here: feature store (§2), tracking (§4), registry &amp; CI/CD (§5), monitoring (§6), infra (§7). The platform is those pieces integrated into a <strong>self-serve<\/strong> workflow.<\/p>\n<h2 id=\"the-design-principles-to-voice\">The design principles to voice<\/h2>\n<ul><li><strong>Self-serve &amp; standardized<\/strong> — a data scientist should deploy via a paved path, not a<\/li><\/ul>\n<p>ticket to the infra team. Standard templates beat bespoke setups.<\/p>\n<ul><li><strong>Reproducible<\/strong> — versioned data, code, and models; anything in production can be<\/li><\/ul>\n<p>recreated.<\/p>\n<ul><li><strong>Observable<\/strong> — every model is monitored by default, not as an afterthought.<\/li><li><strong>Modular<\/strong> — teams can swap a component (a different model server) without rebuilding<\/li><\/ul>\n<p>everything.<\/p>\n<ul><li><strong>Build vs buy<\/strong> — lean on managed platforms (SageMaker/Vertex) or open source (MLflow,<\/li><\/ul>\n<p>Kubeflow, Feast) rather than hand-building all of it; justify where you'd customize.<\/p>\n<h2 id=\"the-trade-offs-to-name\">The trade-offs to name<\/h2>\n<p>Flexibility vs standardization (too rigid and teams route around it; too flexible and it's chaos), build vs buy (control vs speed), and cost vs capability. A good answer explicitly picks a point on each and says why.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>The platform <em>is<\/em> a named toolchain. Open-source assembly: <strong>Feast<\/strong> (features) + <strong>MLflow<\/strong> (tracking/registry) + <strong>Kubeflow<\/strong> (pipelines) + <strong>KServe<\/strong> (serving) + <strong>Evidently<\/strong> (monitoring) + <strong>Airflow<\/strong> (orchestration) + <strong>Terraform<\/strong> (infra), on <strong>Kubernetes<\/strong>. Managed equivalent: <strong>Databricks<\/strong> or <strong>SageMaker / Vertex<\/strong> covering the same boxes end to end.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Platform layer<\/th><th>Open source<\/th><th>Managed<\/th><\/tr><\/thead><tbody><tr><td>Feature store<\/td><td>Feast<\/td><td>SageMaker / Vertex / Databricks FS<\/td><\/tr><tr><td>Tracking + registry<\/td><td>MLflow<\/td><td>SageMaker / Vertex / Unity Catalog<\/td><\/tr><tr><td>Pipelines / CT<\/td><td>Kubeflow, Airflow<\/td><td>Vertex / SageMaker Pipelines<\/td><\/tr><tr><td>Serving<\/td><td>KServe / Seldon<\/td><td>SageMaker / Vertex endpoints<\/td><\/tr><tr><td>Monitoring<\/td><td>Evidently + Prometheus<\/td><td>Model Monitor<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How you'd say it:<\/strong> <em>\"The paved road was Feast, MLflow, Kubeflow, KServe, and Evidently on GKE, wired by Terraform — so a data scientist went from notebook to a monitored, canaried endpoint without touching infra.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What is an ML platform <em>for<\/em>? *(a self-serve paved road so many teams train, deploy, and<\/li><\/ul>\n<p>monitor models fast, safely, and reproducibly.)*<\/p>\n<ul><li>Name four layers it needs. *(data/feature store, experiment tracking, training, registry,<\/li><\/ul>\n<p>serving, monitoring — any four.)*<\/p>\n<ul><li>One key design principle? *(self-serve/standardized, reproducible, observable-by-default,<\/li><\/ul>\n<p>modular — any one.)*<\/p>","toc":[{"level":2,"id":"whats-being-asked","text":"What's being asked"},{"level":2,"id":"the-components-walk-the-lifecycle","text":"The components (walk the lifecycle)"},{"level":2,"id":"the-design-principles-to-voice","text":"The design principles to voice"},{"level":2,"id":"the-trade-offs-to-name","text":"The trade-offs to name"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"worked example: ml platform 💡 tl;dr sometimes the design question is infrastructure , not a single model: \"design a platform so our data scientists can train, deploy, and monitor many models.\" the answer is essentially the whole mlops stack from sections 2–7, assembled into a self-serve system. what's being asked not \"build one model\" but \"build the paved road many models run on.\" the goal is to let teams go from idea to production fast, safely, and repeatably , without each team reinventing pipelines, serving, and monitoring. this tests whether you see the big picture. the components (walk the lifecycle) data layer ingestion, storage (lake / warehouse), feature store (shared features) experiment layer notebooks / compute, experiment tracking , data versioning training layer scalable training (k8s / managed), pipelines, hpo registry model registry — versioned, staged promotion serving layer batch + online serving, autoscaling, canary rollout monitoring layer drift, data quality, ops metrics, alerting, retraining triggers cross-cutting ci/cd/ct automation, iac, access control, cost tracking each box maps to a section here: feature store (§2), tracking (§4), registry & ci/cd (§5), monitoring (§6), infra (§7). the platform is those pieces integrated into a self-serve workflow. the design principles to voice self-serve & standardized — a data scientist should deploy via a paved path, not a ticket to the infra team. standard templates beat bespoke setups. reproducible — versioned data, code, and models; anything in production can be recreated. observable — every model is monitored by default, not as an afterthought. modular — teams can swap a component (a different model server) without rebuilding everything. build vs buy — lean on managed platforms (sagemaker/vertex) or open source (mlflow, kubeflow, feast) rather than hand-building all of it; justify where you'd customize. the trade-offs to name flexibility vs standardization (too rigid and teams route around it; too flexible and it's chaos), build vs buy (control vs speed), and cost vs capability. a good answer explicitly picks a point on each and says why. 🔗 connecting the dots: the real stack the platform is a named toolchain. open-source assembly: feast (features) + mlflow (tracking/registry) + kubeflow (pipelines) + kserve (serving) + evidently (monitoring) + airflow (orchestration) + terraform (infra), on kubernetes . managed equivalent: databricks or sagemaker / vertex covering the same boxes end to end. platform layer open source managed feature store feast sagemaker / vertex / databricks fs tracking + registry mlflow sagemaker / vertex / unity catalog pipelines / ct kubeflow, airflow vertex / sagemaker pipelines serving kserve / seldon sagemaker / vertex endpoints monitoring evidently + prometheus model monitor how you'd say it: \"the paved road was feast, mlflow, kubeflow, kserve, and evidently on gke, wired by terraform — so a data scientist went from notebook to a monitored, canaried endpoint without touching infra.\" self-check what is an ml platform for ? *(a self-serve paved road so many teams train, deploy, and monitor models fast, safely, and reproducibly.)* name four layers it needs. *(data/feature store, experiment tracking, training, registry, serving, monitoring — any four.)* one key design principle? *(self-serve/standardized, reproducible, observable-by-default, modular — any one.)*","words":514},{"path":"10-system-design/worked-perception-platform.md","title":"Worked Example: Hybrid Perception Platform","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-hybrid-perception-platform\">Worked Example: Hybrid Perception Platform<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <em>\"Petabytes of perception data land daily. Design a hybrid platform that trains on <strong>both<\/strong> on-prem and cloud GPUs, picks the location by availability, and keeps code, data, and artifacts reproducible with centralized metrics and easy rollbacks.\"<\/em> This is the ML-platform question (§ ML Platform) at autonomy scale — the winning insight is <strong>data gravity<\/strong>: at petabyte scale you move <em>compute to data<\/em>, never data to compute.<\/div><\/div>\n<h2 id=\"frame-it-first-say-this-out-loud\">Frame it first (say this out loud)<\/h2>\n<ul><li><strong>Data gravity dominates.<\/strong> PBs don't get streamed to the cloud on a whim — egress cost<\/li><\/ul>\n<p>and time kill you. That single fact <em>justifies<\/em> the hybrid design.<\/p>\n<ul><li><strong>It's a batch + experiment platform, not a latency service.<\/strong> Real-time inference happens<\/li><\/ul>\n<p>at the edge (the car/robot); the platform does ingest, curation, training, and re-sim, so   SLAs are relaxed and the scheduler can place work opportunistically.<\/p>\n<ul><li><strong>\"Availability-based placement\" = one fungible GPU pool<\/strong> with different cost/latency/<\/li><\/ul>\n<p>capacity profiles that a single scheduler chooses between.<\/p>\n<h2 id=\"walk-the-planes\">Walk the planes<\/h2>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <span class=\"node\">EDGE<span class=\"nsub\">sensors → local buffer → bulk offload at depot (ship disks — sneakernet is valid)<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node soft\">DATA LAYER — source of truth<span class=\"nsub\">object store (on-prem Ceph/MinIO + cloud S3/GCS) · content-addressed · immutable · tiered hot/warm/cold · Iceberg/lakeFS versioning · catalog DB + feature/label store<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">CONTROL PLANE — cloud-hosted, HA<span class=\"nsub\">API + orchestrator (Argo/Temporal/Flyte) · FEDERATED SCHEDULER (the “cloud or on-prem?” brain) · metadata/lineage DB<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">COMPUTE<span class=\"nsub\">on-prem K8s/Slurm ⇄ cloud K8s — joined by ONE scheduler over a private backbone<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node out\">Observability<span class=\"nsub\">centralized metrics · lineage · model registry · dashboards<\/span><\/span>\n  <\/div>\n<\/div>\n<h2 id=\"the-five-subsystems-they-asked-for\">The five subsystems they asked for<\/h2>\n<ul><li><strong>Control plane<\/strong> — stateless services + a durable metadata store, <strong>cloud-hosted for HA<\/strong>,<\/li><\/ul>\n<p>dispatches to either site. Its core piece is a <strong>placement engine<\/strong> that scores jobs on:   on-prem queue depth, cloud spot price/quota, <strong>data locality (biggest weight)<\/strong>, priority,   and cost budget. Policy: <em>prefer on-prem (sunk cost, no egress); burst to cloud when the   queue exceeds a threshold or the data already lives there.<\/em> Multi-cluster via Karmada /   Admiralty / Volcano / Slurm-bridge.<\/p>\n<ul><li><strong>Data layer<\/strong> — immutable, content-addressed object store; <strong>range reads<\/strong> over ~1 GB<\/li><\/ul>\n<p>shards (not billions of tiny files); dataset versioning (lakeFS/DVC + Iceberg); a catalog   so engineers query <em>\"left-turns in rain at night\"<\/em> without scanning PBs.<\/p>\n<ul><li><strong>Experiment handling / reproducibility<\/strong> — pin the triple **code SHA + data snapshot hash<ul><li>container image digest**; track with MLflow/W&amp;B; promote immutable models through a<\/li><\/ul><\/li><\/ul>\n<p>registry (dev → shadow → canary → prod). Given a run ID, reconstruct the run bit-for-bit.<\/p>\n<ul><li><strong>Networking<\/strong> — private interconnect (Direct Connect / Cloud Interconnect), not<\/li><\/ul>\n<p>VPN-over-internet; RDMA/InfiniBand for distributed training; <strong>egress-aware scheduling<\/strong> so   moving data to cloud is priced in; service mesh (mTLS) between sites.<\/p>\n<ul><li><strong>Security<\/strong> — SSO/OIDC + RBAC, short-lived workload identity (SPIFFE/SPIRE); encryption at<\/li><\/ul>\n<p>rest (KMS) and in transit; <strong>PII redaction<\/strong> (faces/plates) at ingest + data-residency   policies that <em>also<\/em> constrain the scheduler (EU data may not leave region); signed images   and signed model bundles; immutable audit log.<\/p>\n<h2 id=\"rollbacks-fall-out-of-immutability-for-free\">Rollbacks fall out of immutability (for free)<\/h2>\n<ul><li><strong>Model<\/strong> — repoint the registry/deployment to the previous digest; the fleet pulls the<\/li><\/ul>\n<p>prior signed bundle and converges.<\/p>\n<ul><li><strong>Data / pipeline<\/strong> — pin the previous dataset snapshot.<\/li><li><strong>Infra<\/strong> — GitOps (Argo CD / Flux): the platform is declarative in git, so <code>git revert<\/code> +<\/li><\/ul>\n<p>reconcile rolls back the control plane too, with a clean audit trail.<\/p>\n<h2 id=\"the-trade-offs-to-name\">The trade-offs to name<\/h2>\n<p>Sneakernet vs. live upload; spot-instance preemption (checkpoint often); shard size (big = cheap sequential reads but coarse shuffle); on-prem sunk cost vs. cloud elasticity; and GPU nondeterminism capping bit-exact reproducibility.<\/p>\n<h2 id=\"how-youd-say-it\">🔗 How you'd say it<\/h2>\n<p><em>\"At petabyte scale, <strong>data gravity forces a data-local, compute-follows-data design<\/strong>, and <strong>immutability + content addressing<\/strong> is the one primitive that gives me reproducibility, rollbacks, and auditability at once. The control plane stays small and cloud-hosted for HA, making cost/availability/locality-weighted placement across one federated GPU pool. Metrics, networking, and security are all built to preserve that immutable lineage end to end.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why hybrid, in one phrase? *(data gravity — PBs are too expensive to move, so compute<\/li><\/ul>\n<p>follows data.)*<\/p>\n<ul><li>What decides cloud vs on-prem? *(a scoring scheduler: locality &gt; queue depth &gt; spot price &gt;<\/li><\/ul>\n<p>budget; prefer on-prem, burst to cloud.)*<\/p>\n<ul><li>What makes it reproducible <strong>and<\/strong> rollback-able? *(immutable, content-addressed artifacts +<\/li><\/ul>\n<p>the pinned code/data/image triple + GitOps.)*<\/p>","toc":[{"level":2,"id":"frame-it-first-say-this-out-loud","text":"Frame it first (say this out loud)"},{"level":2,"id":"walk-the-planes","text":"Walk the planes"},{"level":2,"id":"the-five-subsystems-they-asked-for","text":"The five subsystems they asked for"},{"level":2,"id":"rollbacks-fall-out-of-immutability-for-free","text":"Rollbacks fall out of immutability (for free)"},{"level":2,"id":"the-trade-offs-to-name","text":"The trade-offs to name"},{"level":2,"id":"how-youd-say-it","text":"🔗 How you'd say it"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"worked example: hybrid perception platform 💡 tl;dr \"petabytes of perception data land daily. design a hybrid platform that trains on both on-prem and cloud gpus, picks the location by availability, and keeps code, data, and artifacts reproducible with centralized metrics and easy rollbacks.\" this is the ml-platform question (§ ml platform) at autonomy scale — the winning insight is data gravity : at petabyte scale you move compute to data , never data to compute. frame it first (say this out loud) data gravity dominates. pbs don't get streamed to the cloud on a whim — egress cost and time kill you. that single fact justifies the hybrid design. it's a batch + experiment platform, not a latency service. real-time inference happens at the edge (the car/robot); the platform does ingest, curation, training, and re-sim, so slas are relaxed and the scheduler can place work opportunistically. \"availability-based placement\" = one fungible gpu pool with different cost/latency/ capacity profiles that a single scheduler chooses between. walk the planes edge sensors → local buffer → bulk offload at depot (ship disks — sneakernet is valid) data layer — source of truth object store (on-prem ceph/minio + cloud s3/gcs) · content-addressed · immutable · tiered hot/warm/cold · iceberg/lakefs versioning · catalog db + feature/label store control plane — cloud-hosted, ha api + orchestrator (argo/temporal/flyte) · federated scheduler (the “cloud or on-prem?” brain) · metadata/lineage db compute on-prem k8s/slurm ⇄ cloud k8s — joined by one scheduler over a private backbone observability centralized metrics · lineage · model registry · dashboards the five subsystems they asked for control plane — stateless services + a durable metadata store, cloud-hosted for ha , dispatches to either site. its core piece is a placement engine that scores jobs on: on-prem queue depth, cloud spot price/quota, data locality (biggest weight) , priority, and cost budget. policy: prefer on-prem (sunk cost, no egress); burst to cloud when the queue exceeds a threshold or the data already lives there. multi-cluster via karmada / admiralty / volcano / slurm-bridge. data layer — immutable, content-addressed object store; range reads over ~1 gb shards (not billions of tiny files); dataset versioning (lakefs/dvc + iceberg); a catalog so engineers query \"left-turns in rain at night\" without scanning pbs. experiment handling / reproducibility — pin the triple **code sha + data snapshot hash container image digest**; track with mlflow/w&b; promote immutable models through a registry (dev → shadow → canary → prod). given a run id, reconstruct the run bit-for-bit. networking — private interconnect (direct connect / cloud interconnect), not vpn-over-internet; rdma/infiniband for distributed training; egress-aware scheduling so moving data to cloud is priced in; service mesh (mtls) between sites. security — sso/oidc + rbac, short-lived workload identity (spiffe/spire); encryption at rest (kms) and in transit; pii redaction (faces/plates) at ingest + data-residency policies that also constrain the scheduler (eu data may not leave region); signed images and signed model bundles; immutable audit log. rollbacks fall out of immutability (for free) model — repoint the registry/deployment to the previous digest; the fleet pulls the prior signed bundle and converges. data / pipeline — pin the previous dataset snapshot. infra — gitops (argo cd / flux): the platform is declarative in git, so git revert + reconcile rolls back the control plane too, with a clean audit trail. the trade-offs to name sneakernet vs. live upload; spot-instance preemption (checkpoint often); shard size (big = cheap sequential reads but coarse shuffle); on-prem sunk cost vs. cloud elasticity; and gpu nondeterminism capping bit-exact reproducibility. 🔗 how you'd say it \"at petabyte scale, data gravity forces a data-local, compute-follows-data design , and immutability + content addressing is the one primitive that gives me reproducibility, rollbacks, and auditability at once. the control plane stays small and cloud-hosted for ha, making cost/availability/locality-weighted placement across one federated gpu pool. metrics, networking, and security are all built to preserve that immutable lineage end to end.\" self-check why hybrid, in one phrase? *(data gravity — pbs are too expensive to move, so compute follows data.)* what decides cloud vs on-prem? *(a scoring scheduler: locality > queue depth > spot price > budget; prefer on-prem, burst to cloud.)* what makes it reproducible and rollback-able? *(immutable, content-addressed artifacts + the pinned code/data/image triple + gitops.)*","words":709},{"path":"10-system-design/worked-data-loader-library.md","title":"Worked Example: Data-Loading Library","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-a-data-loading-library\">Worked Example: A Data-Loading Library<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <em>\"Design a Python library that reads local <strong>and<\/strong> cloud data, with caching, lazy loading, and prefetching so the <strong>GPU never idles<\/strong>, and is resilient to failures. Sketch the classes, methods, and interfaces.\"<\/em> This is the library-design cousin of the data-pipeline round (§2) — the archetype is <strong>WebDataset / MosaicML StreamingDataset / NVIDIA DALI<\/strong>. The one idea it all serves: <strong>a bounded, multi-stage, concurrent pipeline<\/strong> — fetch → cache → decode → transform → batch → pin → GPU — where each stage runs <em>ahead<\/em> of the next.<\/div><\/div>\n<h2 id=\"frame-the-requirements\">Frame the requirements<\/h2>\n<ul><li><strong>Unified access<\/strong> — same code for a local path or <code>s3://<\/code> / <code>gs://<\/code>; the user shouldn't care.<\/li><li><strong>The GPU must never wait<\/strong> — the whole library exists to hide I/O + decode latency behind<\/li><\/ul>\n<p>compute. The one metric to surface above all: <strong>GPU data-stall %<\/strong>.<\/p>\n<ul><li><strong>Datasets don't fit in RAM/disk<\/strong> — stream lazily with bounded memory.<\/li><li><strong>Resilient &amp; resumable<\/strong> — cloud reads fail, nodes preempt, files corrupt; a single bad<\/li><\/ul>\n<p>object must not kill a multi-day run.<\/p>\n<h2 id=\"design-principles-for-the-class-layout\">Design principles for the class layout<\/h2>\n<ul><li><strong>Program to interfaces (<code>Protocol<\/code>/<code>ABC<\/code>)<\/strong> at every seam — storage, cache, decoder all<\/li><\/ul>\n<p>swappable.<\/p>\n<ul><li>**Separate the <em>plan<\/em> from <em>execution<\/em>** — <code>Dataset<\/code> builds a lazy DAG of operators; a<\/li><\/ul>\n<p><code>Pipeline<\/code> runs it. This is what enables lazy loading + op fusion.<\/p>\n<ul><li><strong>Composition over inheritance<\/strong> — <code>Dataset<\/code> <em>has a<\/em> <code>Storage<\/code>, <em>has a<\/em> <code>Cache<\/code>, <em>has a<\/em><\/li><\/ul>\n<p><code>Prefetcher<\/code>; it doesn't inherit them.<\/p>\n<h2 id=\"the-interface-seams-what-youd-whiteboard\">The interface seams (what you'd whiteboard)<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Storage(Protocol):                 <span class=\"tok-comment\"># local + cloud, unified — RETRIES LIVE HERE<\/span>\n    <span class=\"tok-keyword\">def<\/span> read_range(<span class=\"tok-keyword\">self<\/span>, uri, offset, length) -&gt; <span class=\"tok-builtin\">bytes<\/span>: ...   <span class=\"tok-comment\"># the key primitive<\/span>\n    <span class=\"tok-keyword\">def<\/span> <span class=\"tok-builtin\">list<\/span>(<span class=\"tok-keyword\">self<\/span>, prefix) -&gt; Iterator[<span class=\"tok-builtin\">str<\/span>]: ...\n    <span class=\"tok-keyword\">def<\/span> stat(<span class=\"tok-keyword\">self<\/span>, uri) -&gt; ObjMeta: ...\n<span class=\"tok-comment\"># LocalFS · S3Storage · GCS — picked by URI scheme via a StorageRegistry.<\/span>\n<span class=\"tok-comment\"># ResilientStorage(inner) decorates any backend with retry/backoff/hedged reads.<\/span>\n\n<span class=\"tok-keyword\">class<\/span> Cache(Protocol):                   <span class=\"tok-comment\"># multi-tier, content-addressed key = hash(uri+etag)<\/span>\n    <span class=\"tok-keyword\">def<\/span> get(<span class=\"tok-keyword\">self<\/span>, key) -&gt; <span class=\"tok-builtin\">bytes<\/span> | <span class=\"tok-keyword\">None<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> put(<span class=\"tok-keyword\">self<\/span>, key, value) -&gt; <span class=\"tok-keyword\">None<\/span>: ...\n<span class=\"tok-comment\"># MemoryCache (LRU) → DiskCache (NVMe) → origin, composed by TieredCache (read-through).<\/span>\n\n<span class=\"tok-keyword\">class<\/span> Dataset:                           <span class=\"tok-comment\"># lazy plan builder — every op returns a NEW Dataset<\/span>\n    <span class=\"tok-decorator\">@classmethod<\/span>\n    <span class=\"tok-keyword\">def<\/span> <span class=\"tok-builtin\">open<\/span>(cls, pattern, *, storage=<span class=\"tok-keyword\">None<\/span>, cache=<span class=\"tok-keyword\">None<\/span>) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> decode(<span class=\"tok-keyword\">self<\/span>, kind) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...     <span class=\"tok-comment\"># all lazy: build the DAG, run nothing<\/span>\n    <span class=\"tok-keyword\">def<\/span> <span class=\"tok-builtin\">map<\/span>(<span class=\"tok-keyword\">self<\/span>, fn) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> shuffle(<span class=\"tok-keyword\">self<\/span>, buffer, seed=<span class=\"tok-number\">0<\/span>) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> batch(<span class=\"tok-keyword\">self<\/span>, n) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> prefetch(<span class=\"tok-keyword\">self<\/span>, depth) -&gt; <span class=\"tok-string\">\"Dataset\"<\/span>: ...\n    <span class=\"tok-keyword\">def<\/span> __iter__(<span class=\"tok-keyword\">self<\/span>): <span class=\"tok-keyword\">return<\/span> Pipeline(<span class=\"tok-keyword\">self<\/span>._source, <span class=\"tok-keyword\">self<\/span>._fuse(<span class=\"tok-keyword\">self<\/span>._ops)).run()\n    <span class=\"tok-keyword\">def<\/span> to_torch(<span class=\"tok-keyword\">self<\/span>, **kw): ...                <span class=\"tok-comment\"># framework adapter (IterableDataset)<\/span><\/code><\/pre>\n<h2 id=\"keeping-the-gpu-busy-the-heart-of-it\">Keeping the GPU busy (the heart of it)<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">N fetch workers<span class=\"nsub\">threads · I/O<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">decode / transform<span class=\"nsub\">processes · dodge GIL<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">batch + collate<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">pin<span class=\"nsub\">CUDA stream H2D overlap<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">GPU<\/span>\n  <\/div>\n  <div class=\"flow-foot\">Stages linked by <b>bounded queues<\/b> → backpressure makes the pipeline self-regulating: if the GPU stalls, upstream workers block instead of exploding memory.<\/div>\n<\/div>\n<ul><li><strong>Right concurrency per stage<\/strong> — threads for I/O (releases GIL on network waits),<\/li><\/ul>\n<p>processes (or a native DALI backend) for CPU-heavy decode/augment.<\/p>\n<ul><li><strong>Bounded queues = backpressure<\/strong> — a <code>Prefetcher(produce_fn, depth, workers)<\/code> runs the<\/li><\/ul>\n<p>producer <code>depth<\/code> batches ahead; full queue blocks, drained queue refills. Self-tuning.<\/p>\n<ul><li><strong>Overlap H2D copy with compute<\/strong> — separate CUDA stream + <code>pin_memory<\/code> + <code>non_blocking=True<\/code><\/li><\/ul>\n<p>so the next batch DMAs to GPU while the current one trains. This kills the last idle bubble.<\/p>\n<ul><li><strong>Autotune workers<\/strong> to drive <strong>data-stall % → 0<\/strong>; expose that metric so users know if<\/li><\/ul>\n<p>they're I/O-bound.<\/p>\n<h2 id=\"resilience-resumability\">Resilience &amp; resumability<\/h2>\n<ul><li><strong>Retries with backoff + jitter<\/strong> and <strong>hedged requests<\/strong> (fire a duplicate past p99) — all<\/li><\/ul>\n<p>inside the <code>Storage<\/code> layer, so every backend inherits it.<\/p>\n<ul><li><strong>Skip-and-log poison samples<\/strong> — a corrupt object increments a metric and is dropped, not<\/li><\/ul>\n<p>fatal.<\/p>\n<ul><li><strong>Checkpointable iterator<\/strong> — persist `IterState(epoch, shard_cursor, sample_offset,<\/li><\/ul>\n<p>samples_seen, rng_seed)`; on spot preemption, resume <strong>mid-epoch<\/strong> deterministically.<\/p>\n<ul><li><strong>Multi-tier cache<\/strong> turns epoch-2 cloud reads into local-disk reads — the single biggest<\/li><\/ul>\n<p>win for cloud training.<\/p>\n<h2 id=\"the-trade-offs-to-name\">The trade-offs to name<\/h2>\n<p>Streaming-shuffle quality vs. buffer size/memory; disk-cache warmup cost on epoch 1; determinism vs. hedged-request nondeterminism; shard size (big = cheap sequential reads but coarse shuffle; small = better shuffle but request overhead).<\/p>\n<h2 id=\"how-youd-say-it\">🔗 How you'd say it<\/h2>\n<p><em>\"It's a <strong>lazy, staged, back-pressured pipeline over a pluggable <code>Storage<\/code> abstraction<\/strong> whose key primitive is ranged reads over sharded blobs. A content-addressed tiered cache makes epoch-2 reads local; prefetching with bounded queues plus CUDA-stream H2D overlap keeps the GPU saturated; retries, poison-skipping, and a checkpointable iterator make it survive spot preemption. Every layer is a narrow interface with a default impl, <strong>composed<\/strong> into the <code>Dataset<\/code> — so it's testable, swappable, and never stalls the GPU.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What's the storage layer's key primitive? *(ranged reads over sharded blobs — fetch only<\/li><\/ul>\n<p>the bytes you need.)*<\/p>\n<ul><li>How do you keep the GPU fed? *(staged concurrent pipeline + bounded-queue prefetch + CUDA-<\/li><\/ul>\n<p>stream H2D overlap; drive data-stall % to zero.)*<\/p>\n<ul><li>How does it survive a spot preemption? *(a checkpointable iterator that resumes mid-epoch<\/li><\/ul>\n<p>from <code>IterState<\/code>, plus retries and poison-sample skipping.)*<\/p>","toc":[{"level":2,"id":"frame-the-requirements","text":"Frame the requirements"},{"level":2,"id":"design-principles-for-the-class-layout","text":"Design principles for the class layout"},{"level":2,"id":"the-interface-seams-what-youd-whiteboard","text":"The interface seams (what you'd whiteboard)"},{"level":2,"id":"keeping-the-gpu-busy-the-heart-of-it","text":"Keeping the GPU busy (the heart of it)"},{"level":2,"id":"resilience-resumability","text":"Resilience &amp; resumability"},{"level":2,"id":"the-trade-offs-to-name","text":"The trade-offs to name"},{"level":2,"id":"how-youd-say-it","text":"🔗 How you'd say it"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"worked example: a data-loading library 💡 tl;dr \"design a python library that reads local and cloud data, with caching, lazy loading, and prefetching so the gpu never idles , and is resilient to failures. sketch the classes, methods, and interfaces.\" this is the library-design cousin of the data-pipeline round (§2) — the archetype is webdataset / mosaicml streamingdataset / nvidia dali . the one idea it all serves: a bounded, multi-stage, concurrent pipeline — fetch → cache → decode → transform → batch → pin → gpu — where each stage runs ahead of the next. frame the requirements unified access — same code for a local path or s3:// / gs:// ; the user shouldn't care. the gpu must never wait — the whole library exists to hide i/o + decode latency behind compute. the one metric to surface above all: gpu data-stall % . datasets don't fit in ram/disk — stream lazily with bounded memory. resilient & resumable — cloud reads fail, nodes preempt, files corrupt; a single bad object must not kill a multi-day run. design principles for the class layout program to interfaces ( protocol / abc ) at every seam — storage, cache, decoder all swappable. **separate the plan from execution ** — dataset builds a lazy dag of operators; a pipeline runs it. this is what enables lazy loading + op fusion. composition over inheritance — dataset has a storage , has a cache , has a prefetcher ; it doesn't inherit them. the interface seams (what you'd whiteboard) class storage(protocol): # local + cloud, unified — retries live here def read_range( self , uri, offset, length) -> bytes : ... # the key primitive def list ( self , prefix) -> iterator[ str ]: ... def stat( self , uri) -> objmeta: ... # localfs · s3storage · gcs — picked by uri scheme via a storageregistry. # resilientstorage(inner) decorates any backend with retry/backoff/hedged reads. class cache(protocol): # multi-tier, content-addressed key = hash(uri+etag) def get( self , key) -> bytes | none : ... def put( self , key, value) -> none : ... # memorycache (lru) → diskcache (nvme) → origin, composed by tieredcache (read-through). class dataset: # lazy plan builder — every op returns a new dataset @classmethod def open (cls, pattern, *, storage= none , cache= none ) -> \"dataset\" : ... def decode( self , kind) -> \"dataset\" : ... # all lazy: build the dag, run nothing def map ( self , fn) -> \"dataset\" : ... def shuffle( self , buffer, seed= 0 ) -> \"dataset\" : ... def batch( self , n) -> \"dataset\" : ... def prefetch( self , depth) -> \"dataset\" : ... def __iter__( self ): return pipeline( self ._source, self ._fuse( self ._ops)).run() def to_torch( self , **kw): ... # framework adapter (iterabledataset) keeping the gpu busy (the heart of it) n fetch workers threads · i/o decode / transform processes · dodge gil batch + collate pin cuda stream h2d overlap gpu stages linked by bounded queues → backpressure makes the pipeline self-regulating: if the gpu stalls, upstream workers block instead of exploding memory. right concurrency per stage — threads for i/o (releases gil on network waits), processes (or a native dali backend) for cpu-heavy decode/augment. bounded queues = backpressure — a prefetcher(produce_fn, depth, workers) runs the producer depth batches ahead; full queue blocks, drained queue refills. self-tuning. overlap h2d copy with compute — separate cuda stream + pin_memory + non_blocking=true so the next batch dmas to gpu while the current one trains. this kills the last idle bubble. autotune workers to drive data-stall % → 0 ; expose that metric so users know if they're i/o-bound. resilience & resumability retries with backoff + jitter and hedged requests (fire a duplicate past p99) — all inside the storage layer, so every backend inherits it. skip-and-log poison samples — a corrupt object increments a metric and is dropped, not fatal. checkpointable iterator — persist `iterstate(epoch, shard_cursor, sample_offset, samples_seen, rng_seed)`; on spot preemption, resume mid-epoch deterministically. multi-tier cache turns epoch-2 cloud reads into local-disk reads — the single biggest win for cloud training. the trade-offs to name streaming-shuffle quality vs. buffer size/memory; disk-cache warmup cost on epoch 1; determinism vs. hedged-request nondeterminism; shard size (big = cheap sequential reads but coarse shuffle; small = better shuffle but request overhead). 🔗 how you'd say it \"it's a lazy, staged, back-pressured pipeline over a pluggable storage abstraction whose key primitive is ranged reads over sharded blobs. a content-addressed tiered cache makes epoch-2 reads local; prefetching with bounded queues plus cuda-stream h2d overlap keeps the gpu saturated; retries, poison-skipping, and a checkpointable iterator make it survive spot preemption. every layer is a narrow interface with a default impl, composed into the dataset — so it's testable, swappable, and never stalls the gpu.\" self-check what's the storage layer's key primitive? *(ranged reads over sharded blobs — fetch only the bytes you need.)* how do you keep the gpu fed? *(staged concurrent pipeline + bounded-queue prefetch + cuda- stream h2d overlap; drive data-stall % to zero.)* how does it survive a spot preemption? *(a checkpointable iterator that resumes mid-epoch from iterstate , plus retries and poison-sample skipping.)*","words":869},{"path":"11-drill-bank/README.md","title":"Overview","section":"11 · Drill Bank","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"11-drill-bank\">11: Drill Bank<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Rapid-fire questions across every section, plus a one-page cheat sheet for the final skim. Use the drill bank to test recall (tap a question to reveal the answer); use the cheat sheet the morning of.<\/div><\/div>\n<h2 id=\"how-to-use-it\">How to use it<\/h2>\n<ul><li><strong><a class=\"mdlink\" data-href=\"drill-bank.md\" href=\"#\">Rapid Q&amp;A<\/a><\/strong> — quiz-style. Hide the answers, go top to bottom, and<\/li><\/ul>\n<p>anything you fumble, reread that section. These are the \"warm-up and mid-interview\"   questions you should answer in one or two crisp sentences.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"decision-tradeoffs.md\" href=\"#\">Decision Tradeoffs — Why X over Y<\/a><\/strong> — every canonical head-to-head<\/li><\/ul>\n<p>(\"boosting or deep learning?\", \"RAG or fine-tune?\", \"spot or on-demand?\") with the <em>deciding   axis<\/em>, the default, and the cost of the wrong pick. This is the format senior interviewers   push hardest on: not \"what is X\" but \"X or Y, and why?\"<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">One-page cheat sheet<\/a><\/strong> — the whole pack compressed: the key<\/li><\/ul>\n<p>distinctions, the \"say this\" lines, and the decision rules. Skim it last.<\/p>\n<p>The goal isn't to memorize wording — it's to be able to <em>explain<\/em> each idea simply and pick the right tool with a reason. If you can do the drill bank comfortably, you're ready.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"drill-bank.md\" href=\"#\">drill-bank.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"how-to-use-it","text":"How to use it"}],"text":"11: drill bank 💡 tl;dr rapid-fire questions across every section, plus a one-page cheat sheet for the final skim. use the drill bank to test recall (tap a question to reveal the answer); use the cheat sheet the morning of. how to use it rapid q&a — quiz-style. hide the answers, go top to bottom, and anything you fumble, reread that section. these are the \"warm-up and mid-interview\" questions you should answer in one or two crisp sentences. decision tradeoffs — why x over y — every canonical head-to-head (\"boosting or deep learning?\", \"rag or fine-tune?\", \"spot or on-demand?\") with the deciding axis , the default, and the cost of the wrong pick. this is the format senior interviewers push hardest on: not \"what is x\" but \"x or y, and why?\" one-page cheat sheet — the whole pack compressed: the key distinctions, the \"say this\" lines, and the decision rules. skim it last. the goal isn't to memorize wording — it's to be able to explain each idea simply and pick the right tool with a reason. if you can do the drill bank comfortably, you're ready. → start: drill-bank.md","words":191},{"path":"11-drill-bank/drill-bank.md","title":"Rapid Q&A","section":"11 · Drill Bank","quiz":true,"accent":"#cc5fab","html":"<h1 id=\"rapid-qa\">Rapid Q&amp;A<\/h1>\n<p>Tap a question to reveal the answer. Hide all and quiz yourself top to bottom.<\/p>\n<h2 id=\"foundations\">Foundations<\/h2>\n<details class=\"qa\" open><summary>Q: Walk through the ML lifecycle.<\/summary><div class=\"qa-body\"><p>Frame the problem → collect data → preprocess &amp; engineer features → train → evaluate → deploy → monitor → retrain. It's a loop because the world drifts.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Overfitting vs underfitting?<\/summary><div class=\"qa-body\"><p>Overfitting = great on training, poor on new data (high variance); underfitting = poor on both (high bias). Fix overfitting with more data / regularization / simpler model; fix underfitting with a more expressive model or better features.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Best default model for tabular data, and when do you switch to deep learning?<\/summary><div class=\"qa-body\"><p>Gradient boosting (XGBoost/LightGBM). Switch to deep learning for unstructured data (images, text) or very large datasets.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Precision vs recall — when each?<\/summary><div class=\"qa-body\"><p>Precision when false positives are costly; recall when misses are costly. F1 or PR-AUC when classes are imbalanced. Accuracy is misleading under imbalance.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Bagging vs boosting?<\/summary><div class=\"qa-body\"><p>Bagging = parallel trees averaged to cut variance (Random Forest); boosting = sequential trees each fixing the last's errors to cut bias (XGBoost).<\/p><\/div><\/details><h2 id=\"data-experimentation\">Data &amp; experimentation<\/h2>\n<details class=\"qa\" open><summary>Q: What is data leakage?<\/summary><div class=\"qa-body\"><p>Training on information unavailable at prediction time (e.g. fitting the scaler on all data before splitting, or a feature that's a proxy for the label). It inflates offline metrics and fails in production.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why three data splits, not two?<\/summary><div class=\"qa-body\"><p>Train to fit, validation to tune/choose, test opened once for an honest estimate — because tuning and reporting on the same set makes the score optimistic.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you split time-series data?<\/summary><div class=\"qa-body\"><p>By time — train on the past, test on the future. A random split leaks the future into training.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is train/serve skew and how does a feature store fix it?<\/summary><div class=\"qa-body\"><p>Features computed differently in training vs serving, so the model sees mismatched inputs. A feature store defines each feature once and serves it to both, keeping them identical.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Batch vs streaming — how do you choose?<\/summary><div class=\"qa-body\"><p>By required freshness. Default to batch (simpler, cheaper); use streaming only when you need sub-minute freshness.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why A/B test if offline metrics improved?<\/summary><div class=\"qa-body\"><p>Offline gains don't guarantee business impact; only live users prove it. Check statistical significance, adequate sample/duration, and guardrail metrics.<\/p><\/div><\/details><h2 id=\"mlops-serving\">MLOps &amp; serving<\/h2>\n<details class=\"qa\" open><summary>Q: What does MLOps add over DevOps?<\/summary><div class=\"qa-body\"><p>It versions, tests, deploys, and monitors code + data<\/p><ul><li>model (not just code), and adds continuous training — because models decay silently.<\/li><\/ul><\/div><\/details><details class=\"qa\" open><summary>Q: Three serving patterns?<\/summary><div class=\"qa-body\"><p>Batch (scheduled, bulk), online/real-time (per request, low latency), streaming (per event, continuous). Choose by latency need.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why containerize a model?<\/summary><div class=\"qa-body\"><p>To bundle the exact environment so it runs identically everywhere — no \"works on my machine.\"<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does a model registry give you?<\/summary><div class=\"qa-body\"><p>Versioning, staged promotion (staging → production), metadata, and instant rollback to a previous version.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Name safe rollout strategies.<\/summary><div class=\"qa-body\"><p>Canary (small traffic slice first), blue-green (switch between two, revert instantly), shadow (run on real traffic without using the output).<\/p><\/div><\/details><h2 id=\"monitoring-reliability\">Monitoring &amp; reliability<\/h2>\n<details class=\"qa\" open><summary>Q: Why is monitoring different for ML?<\/summary><div class=\"qa-body\"><p>Models fail silently — they keep returning confident but increasingly wrong p

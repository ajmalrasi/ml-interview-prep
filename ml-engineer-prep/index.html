, prefer batch, batch<\/li><\/ul>\n<p>requests, quantize/right-size — any two.)*<\/p>","toc":[{"level":2,"id":"infrastructure-as-code-iac","text":"Infrastructure as code (IaC)"},{"level":2,"id":"gpus-the-expensive-part","text":"GPUs: the expensive part"},{"level":2,"id":"cost-control-for-serving","text":"Cost control for serving"},{"level":2,"id":"the-framing","text":"The framing"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"iac, gpus & cost control 💡 tl;dr infrastructure-as-code (terraform) makes your cloud setup reproducible and reviewable instead of hand-clicked and forgotten. and because gpus and always-on endpoints are expensive, cost control — right-sizing, spot instances, autoscaling, batching — is a real part of the job. infrastructure as code (iac) instead of clicking around a cloud console to create servers and services, you declare your infrastructure in code (terraform, cloudformation, pulumi) and apply it. benefits: it's version-controlled (git history of your infra), reproducible (spin up an identical environment in another region or account), reviewable (changes go through prs), and less error-prone than manual clicking. for ml, this means your training cluster, endpoints, and storage are defined and repeatable, not snowflakes someone set up once and can't recreate. gpus: the expensive part training and heavy inference need gpus, which are pricey and scarce, so how you use them matters: right-size — don't put a huge gpu on a small model; match the instance to the need. spot / preemptible instances — big discounts (often 60–90%) for interruptible workloads like training and batch scoring; pair with checkpointing so an interruption just resumes. don't leave gpus idle — a forgotten running training instance is pure burned money; automate teardown. cost control for serving an always-on real-time endpoint costs money every hour whether or not it's used: autoscaling — scale replicas with traffic; scale-to-zero for rarely-used models (kserve) so idle costs nothing. batch over real-time — if the use case tolerates it, a scheduled batch job is far cheaper than a 24/7 endpoint (section 5). batching requests — group incoming requests so the gpu processes many at once, raising throughput per dollar (section 8). right-size + cheaper hardware — cpu or smaller instances for light models; quantized models (section 8) that run on less. the framing cost is an engineering constraint, not an afterthought: \"i treat compute cost like latency — a number to design against. i default to batch and autoscaling, use spot for training with checkpointing, and only run always-on gpu endpoints when the product truly needs real-time.\" cost-awareness signals someone who's run real systems, not just demos. 🔗 connecting the dots — the real stack infra-as-code is terraform (or pulumi / cloudformation); node autoscaling uses karpenter or the cluster-autoscaler; cost visibility is kubecost or native cloud cost tools. training runs on spot / preemptible instances with checkpointing to object storage. how you'd say it: \"the whole cluster and endpoints were defined in terraform; training ran on spot nodes via karpenter with checkpoints to s3, and kubecost kept the gpu bill honest.\" self-check two benefits of infrastructure-as-code? *(reproducible, version-controlled/reviewable, less error-prone — any two.)* how do you train cheaply on gpus? *(spot/preemptible instances with checkpointing; right-size; tear down when idle.)* two ways to cut serving cost? *(autoscaling/scale-to-zero, prefer batch, batch requests, quantize/right-size — any two.)*","words":472},{"path":"08-optimization-scaling/README.md","title":"Overview","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"8-optimization-scaling\">8 — Optimization &amp; Scaling<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD's \"optimize models for speed, efficiency, and scale.\" Two directions: make the <strong>model<\/strong> smaller/faster (quantization, pruning, distillation), and make the <strong>training and serving<\/strong> scale (distributed training, batching, caching). The goal is the same accuracy at lower latency and cost.<\/div><\/div>\n<h2 id=\"why-optimize-at-all\">Why optimize at all<\/h2>\n<p>A model that's accurate but too slow or too expensive to serve is a failed product. Optimization is how you fit a good model into a real latency budget and a real cloud bill. It's also increasingly essential for large models (LLMs, section 9), where naive serving is prohibitively costly.<\/p>\n<h2 id=\"the-three-pages\">The three pages<\/h2>\n<ul><li><strong>Quantization, pruning, distillation<\/strong> — shrinking the model itself.<\/li><li><strong>Distributed training<\/strong> — scaling the training side (a companion to section 3).<\/li><li><strong>Inference &amp; serving optimization<\/strong> — batching, caching, and serving tricks that cut<\/li><\/ul>\n<p>latency and cost.<\/p>\n<h2 id=\"the-mental-split\">The mental split<\/h2>\n<pre><code>make the MODEL cheaper        make the SYSTEM scale\n quantization (lower precision) distributed training (more GPUs)\n pruning (remove weights)       batching (more per GPU pass)\n distillation (small student)   caching (skip recompute)\n                                autoscaling (match load, §7)<\/code><\/pre>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"model-compression.md\" href=\"#\">model-compression.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-optimize-at-all","text":"Why optimize at all"},{"level":2,"id":"the-three-pages","text":"The three pages"},{"level":2,"id":"the-mental-split","text":"The mental split"}],"text":"8 — optimization & scaling 💡 tl;dr the jd's \"optimize models for speed, efficiency, and scale.\" two directions: make the model smaller/faster (quantization, pruning, distillation), and make the training and serving scale (distributed training, batching, caching). the goal is the same accuracy at lower latency and cost. why optimize at all a model that's accurate but too slow or too expensive to serve is a failed product. optimization is how you fit a good model into a real latency budget and a real cloud bill. it's also increasingly essential for large models (llms, section 9), where naive serving is prohibitively costly. the three pages quantization, pruning, distillation — shrinking the model itself. distributed training — scaling the training side (a companion to section 3). inference & serving optimization — batching, caching, and serving tricks that cut latency and cost. the mental split make the model cheaper make the system scale quantization (lower precision) distributed training (more gpus) pruning (remove weights) batching (more per gpu pass) distillation (small student) caching (skip recompute) autoscaling (match load, §7) → start: model-compression.md","words":178},{"path":"08-optimization-scaling/model-compression.md","title":"Quantization, Pruning, Distillation","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"quantization-pruning-distillation\">Quantization, Pruning, Distillation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Three ways to make a model smaller and faster with minimal accuracy loss. <strong>Quantization<\/strong> uses lower-precision numbers; <strong>pruning<\/strong> removes unimportant weights; <strong>distillation<\/strong> trains a small model to mimic a big one. All trade a little accuracy for a lot of speed and cost savings.<\/div><\/div>\n<h2 id=\"quantization\">Quantization<\/h2>\n<p>Models train in 32-bit floats (FP32), but you often don't need that precision to run them. <strong>Quantization<\/strong> converts weights (and activations) to lower precision — FP16, or INT8 — which <strong>shrinks the model ~2–4×, speeds up inference, and cuts memory<\/strong>.<\/p>\n<ul><li><strong>FP16 / BF16<\/strong> — half precision; ~2× faster, negligible accuracy loss; the easy win.<\/li><li><strong>INT8<\/strong> — 8-bit integers; bigger speedup but needs <strong>calibration<\/strong> and can cost some<\/li><\/ul>\n<p>accuracy, so you measure it.<\/p>\n<ul><li><strong>PTQ (post-training quantization)<\/strong> — quantize an already-trained model; fast, no<\/li><\/ul>\n<p>retraining, small accuracy hit.<\/p>\n<ul><li><strong>QAT (quantization-aware training)<\/strong> — simulate low precision <em>during<\/em> training so the<\/li><\/ul>\n<p>model adapts; recovers accuracy when PTQ drops too much.<\/p>\n<p>This is the most common inference optimization — cheap, broadly applicable, big payoff.<\/p>\n<h2 id=\"pruning\">Pruning<\/h2>\n<p>Neural nets are over-parameterized — many weights barely matter. <strong>Pruning<\/strong> removes the low-importance weights or whole channels, making the model smaller and (with structured pruning) faster, then you fine-tune to recover any lost accuracy. Think of it as trimming dead weight the network doesn't really use.<\/p>\n<h2 id=\"knowledge-distillation\">Knowledge distillation<\/h2>\n<p>Train a <strong>large, accurate \"teacher\"<\/strong> model, then train a <strong>small \"student\"<\/strong> model to mimic the teacher's outputs (its soft probabilities carry more information than hard labels). The student ends up much smaller and faster while keeping most of the teacher's accuracy. This is how many production and on-device models are made — and how smaller, cheaper LLMs are derived from big ones (e.g. DistilBERT).<\/p>\n<h2 id=\"choosing-combining\">Choosing / combining<\/h2>\n<p>They're complementary and often stacked: distill to a smaller architecture, prune it, then quantize for deployment. The one-line instinct: <em>\"Quantization first — it's the cheapest big win. Distillation when I need a fundamentally smaller model. Then compile with something like TensorRT/ONNX Runtime for the target hardware, always re-measuring accuracy after.\"<\/em><\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Compilers/runtimes: <strong>TensorRT<\/strong> and <strong>ONNX Runtime<\/strong> (fuse ops + quantize for the target hardware), <strong>HuggingFace Optimum<\/strong> as the bridge, native <strong>PyTorch quantization<\/strong>. For LLMs specifically: <strong>bitsandbytes<\/strong> (8/4-bit), <strong>GPTQ / AWQ<\/strong>, and <strong>llama.cpp / GGUF<\/strong> for CPU/edge. Distillation uses <strong>HuggingFace<\/strong> (e.g. DistilBERT).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"A CV model I'd quantize to INT8 and compile with TensorRT; an LLM I'd 4-bit quantize with bitsandbytes or serve a GGUF build — always re-measuring accuracy after.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Quantization in one line, and its cheapest form? *(use lower-precision numbers; FP16 is<\/li><\/ul>\n<p>the easy ~2× win.)*<\/p>\n<ul><li>PTQ vs QAT? *(quantize after training vs simulate low precision during training to<\/li><\/ul>\n<p>recover accuracy.)*<\/p>\n<ul><li>What is knowledge distillation? *(train a small student to mimic a big teacher —<\/li><\/ul>\n<p>smaller/faster, keeps most accuracy.)*<\/p>","toc":[{"level":2,"id":"quantization","text":"Quantization"},{"level":2,"id":"pruning","text":"Pruning"},{"level":2,"id":"knowledge-distillation","text":"Knowledge distillation"},{"level":2,"id":"choosing-combining","text":"Choosing / combining"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"quantization, pruning, distillation 💡 tl;dr three ways to make a model smaller and faster with minimal accuracy loss. quantization uses lower-precision numbers; pruning removes unimportant weights; distillation trains a small model to mimic a big one. all trade a little accuracy for a lot of speed and cost savings. quantization models train in 32-bit floats (fp32), but you often don't need that precision to run them. quantization converts weights (and activations) to lower precision — fp16, or int8 — which shrinks the model ~2–4×, speeds up inference, and cuts memory . fp16 / bf16 — half precision; ~2× faster, negligible accuracy loss; the easy win. int8 — 8-bit integers; bigger speedup but needs calibration and can cost some accuracy, so you measure it. ptq (post-training quantization) — quantize an already-trained model; fast, no retraining, small accuracy hit. qat (quantization-aware training) — simulate low precision during training so the model adapts; recovers accuracy when ptq drops too much. this is the most common inference optimization — cheap, broadly applicable, big payoff. pruning neural nets are over-parameterized — many weights barely matter. pruning removes the low-importance weights or whole channels, making the model smaller and (with structured pruning) faster, then you fine-tune to recover any lost accuracy. think of it as trimming dead weight the network doesn't really use. knowledge distillation train a large, accurate \"teacher\" model, then train a small \"student\" model to mimic the teacher's outputs (its soft probabilities carry more information than hard labels). the student ends up much smaller and faster while keeping most of the teacher's accuracy. this is how many production and on-device models are made — and how smaller, cheaper llms are derived from big ones (e.g. distilbert). choosing / combining they're complementary and often stacked: distill to a smaller architecture, prune it, then quantize for deployment. the one-line instinct: \"quantization first — it's the cheapest big win. distillation when i need a fundamentally smaller model. then compile with something like tensorrt/onnx runtime for the target hardware, always re-measuring accuracy after.\" 🔗 connecting the dots — the real stack compilers/runtimes: tensorrt and onnx runtime (fuse ops + quantize for the target hardware), huggingface optimum as the bridge, native pytorch quantization . for llms specifically: bitsandbytes (8/4-bit), gptq / awq , and llama.cpp / gguf for cpu/edge. distillation uses huggingface (e.g. distilbert). how you'd say it: \"a cv model i'd quantize to int8 and compile with tensorrt; an llm i'd 4-bit quantize with bitsandbytes or serve a gguf build — always re-measuring accuracy after.\" self-check quantization in one line, and its cheapest form? *(use lower-precision numbers; fp16 is the easy ~2× win.)* ptq vs qat? *(quantize after training vs simulate low precision during training to recover accuracy.)* what is knowledge distillation? *(train a small student to mimic a big teacher — smaller/faster, keeps most accuracy.)*","words":469},{"path":"08-optimization-scaling/distributed-training.md","title":"Distributed Training","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"distributed-training\">Distributed Training<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> When training is too slow or too big for one GPU, spread it out. <strong>Data parallelism<\/strong> (replicate the model, split the data, average gradients) handles most cases; <strong>model/pipeline parallelism<\/strong> handles models too big for one device. This page is the scaling companion to section 3.<\/div><\/div>\n<h2 id=\"the-two-axes-recap-and-go-deeper\">The two axes (recap and go deeper)<\/h2>\n<ul><li><strong>Data parallelism<\/strong> — every GPU holds a full copy of the model and processes a<\/li><\/ul>\n<p>different slice of each batch, then gradients are averaged (all-reduce) and all copies   update identically. Multiplies throughput; the bottleneck is the <strong>gradient sync<\/strong>   communication. Frameworks: PyTorch <strong>DDP<\/strong>, Horovod.<\/p>\n<ul><li><strong>Model parallelism<\/strong> — the model is too big for one GPU's memory, so you split the<\/li><\/ul>\n<p><em>model<\/em> across GPUs (different layers or tensor shards on different devices). More   communication-heavy; needed for very large models.<\/p>\n<ul><li><strong>Pipeline parallelism<\/strong> — split the model into stages across GPUs and stream<\/li><\/ul>\n<p>micro-batches through like an assembly line, keeping all stages busy.<\/p>\n<p>Large-model training (think LLMs) combines all three (\"3D parallelism\") — e.g. via DeepSpeed or Megatron.<\/p>\n<h2 id=\"memory-saving-tricks-worth-naming\">Memory-saving tricks worth naming<\/h2>\n<p>Even on the GPUs you have, a few techniques let you train bigger:<\/p>\n<ul><li><strong>Mixed precision (FP16/BF16)<\/strong> — half the memory, ~2× faster, standard.<\/li><li><strong>Gradient accumulation<\/strong> — simulate a big batch by accumulating gradients over several<\/li><\/ul>\n<p>small batches before updating — fits a large effective batch in small memory.<\/p>\n<ul><li><strong>Gradient checkpointing<\/strong> — trade compute for memory by recomputing activations in the<\/li><\/ul>\n<p>backward pass instead of storing them all.<\/p>\n<ul><li><strong>ZeRO / sharding<\/strong> — shard optimizer states and gradients across GPUs so no single one<\/li><\/ul>\n<p>holds everything (DeepSpeed ZeRO).<\/p>\n<h2 id=\"the-practical-instinct\">The practical instinct<\/h2>\n<p>Don't distribute prematurely — it adds real complexity and communication overhead. First squeeze one GPU (mixed precision, bigger batch, a smaller model), then scale to data parallelism across GPUs, and only reach for model/pipeline parallelism when the model genuinely doesn't fit. \"Scale when you must, not because you can.\"<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The libraries: <strong>PyTorch DDP / FSDP<\/strong>, <strong>DeepSpeed<\/strong> (ZeRO), <strong>Megatron-LM<\/strong> (tensor/pipeline parallel), <strong>Horovod<\/strong>, <strong>Ray Train<\/strong>, and <strong>HuggingFace Accelerate<\/strong> to wrap it. Mixed precision is native <strong>AMP<\/strong>. It runs on multi-GPU clusters via <strong>SageMaker / Vertex / Databricks<\/strong> or K8s.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a model that didn't fit one GPU I used DeepSpeed ZeRO (or FSDP) with mixed precision across a multi-node GPU cluster.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Data vs model parallelism — when each? *(data: model fits, need more throughput; model:<\/li><\/ul>\n<p>model too big for one GPU.)*<\/p>\n<ul><li>What's the bottleneck in data parallelism? <em>(gradient synchronization / communication.)<\/em><\/li><li>Two ways to train a bigger model without more GPUs? *(mixed precision, gradient<\/li><\/ul>\n<p>accumulation, gradient checkpointing, ZeRO sharding — any two.)*<\/p>","toc":[{"level":2,"id":"the-two-axes-recap-and-go-deeper","text":"The two axes (recap and go deeper)"},{"level":2,"id":"memory-saving-tricks-worth-naming","text":"Memory-saving tricks worth naming"},{"level":2,"id":"the-practical-instinct","text":"The practical instinct"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"distributed training 💡 tl;dr when training is too slow or too big for one gpu, spread it out. data parallelism (replicate the model, split the data, average gradients) handles most cases; model/pipeline parallelism handles models too big for one device. this page is the scaling companion to section 3. the two axes (recap and go deeper) data parallelism — every gpu holds a full copy of the model and processes a different slice of each batch, then gradients are averaged (all-reduce) and all copies update identically. multiplies throughput; the bottleneck is the gradient sync communication. frameworks: pytorch ddp , horovod. model parallelism — the model is too big for one gpu's memory, so you split the model across gpus (different layers or tensor shards on different devices). more communication-heavy; needed for very large models. pipeline parallelism — split the model into stages across gpus and stream micro-batches through like an assembly line, keeping all stages busy. large-model training (think llms) combines all three (\"3d parallelism\") — e.g. via deepspeed or megatron. memory-saving tricks worth naming even on the gpus you have, a few techniques let you train bigger: mixed precision (fp16/bf16) — half the memory, ~2× faster, standard. gradient accumulation — simulate a big batch by accumulating gradients over several small batches before updating — fits a large effective batch in small memory. gradient checkpointing — trade compute for memory by recomputing activations in the backward pass instead of storing them all. zero / sharding — shard optimizer states and gradients across gpus so no single one holds everything (deepspeed zero). the practical instinct don't distribute prematurely — it adds real complexity and communication overhead. first squeeze one gpu (mixed precision, bigger batch, a smaller model), then scale to data parallelism across gpus, and only reach for model/pipeline parallelism when the model genuinely doesn't fit. \"scale when you must, not because you can.\" 🔗 connecting the dots — the real stack the libraries: pytorch ddp / fsdp , deepspeed (zero), megatron-lm (tensor/pipeline parallel), horovod , ray train , and huggingface accelerate to wrap it. mixed precision is native amp . it runs on multi-gpu clusters via sagemaker / vertex / databricks or k8s. how you'd say it: \"for a model that didn't fit one gpu i used deepspeed zero (or fsdp) with mixed precision across a multi-node gpu cluster.\" self-check data vs model parallelism — when each? *(data: model fits, need more throughput; model: model too big for one gpu.)* what's the bottleneck in data parallelism? (gradient synchronization / communication.) two ways to train a bigger model without more gpus? *(mixed precision, gradient accumulation, gradient checkpointing, zero sharding — any two.)*","words":441},{"path":"08-optimization-scaling/inference-optimization.md","title":"Inference & Serving Optimization","section":"8 · Optimization & Scaling","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"inference-serving-optimization\">Inference &amp; Serving Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Serving optimization is about lower <strong>latency<\/strong> and higher <strong>throughput per dollar<\/strong> at prediction time. The big levers: <strong>batching<\/strong> requests, <strong>caching<\/strong> repeated results, compiling the model for the hardware, and scaling smartly. Distinct from training optimization — here you're tuning the live service.<\/div><\/div>\n<h2 id=\"latency-vs-throughput-frame-it-first\">Latency vs throughput (frame it first)<\/h2>\n<p>Two different goals that sometimes conflict. <strong>Latency<\/strong> = how fast a single prediction returns (what one user feels). <strong>Throughput<\/strong> = how many predictions per second the system handles (what your bill reflects). Some tricks (batching) boost throughput but can <em>add<\/em> latency, so you optimize for the one the product needs — usually a p99 latency target at the lowest cost.<\/p>\n<h2 id=\"the-main-levers\">The main levers<\/h2>\n<ul><li><strong>Batching<\/strong> — instead of running the model once per request, group several requests and<\/li><\/ul>\n<p>run them together in one GPU pass. GPUs love parallelism, so this dramatically raises   throughput. <strong>Dynamic batching<\/strong> (Triton, KServe) waits a few milliseconds to collect a   batch — a small, bounded latency cost for a big throughput gain.<\/p>\n<ul><li><strong>Caching<\/strong> — if the same input (or a common one) recurs, cache the prediction and skip<\/li><\/ul>\n<p>the model entirely. Huge for repeated queries; also used for embeddings and, in LLMs,   for prompt/KV caching.<\/p>\n<ul><li><strong>Model compilation / optimized runtimes<\/strong> — compile the model for the target hardware<\/li><\/ul>\n<p>with <strong>TensorRT<\/strong>, <strong>ONNX Runtime<\/strong>, or <strong>TorchScript<\/strong>: they fuse operations, pick fast   kernels, and apply the precision from section 8's compression. Often a big speedup for   free.<\/p>\n<ul><li><strong>Right hardware<\/strong> — GPU for heavy/parallel models, CPU for light ones; specialized<\/li><\/ul>\n<p>accelerators (Inferentia, TPU) where they fit.<\/p>\n<ul><li><strong>Autoscaling<\/strong> (section 7) — match replica count to load; scale to zero when idle.<\/li><\/ul>\n<h2 id=\"putting-it-together\">Putting it together<\/h2>\n<p>A typical optimized online service: a <strong>quantized, TensorRT-compiled model<\/strong>, behind a server that does <strong>dynamic batching<\/strong>, with a <strong>cache<\/strong> for hot inputs, running on <strong>autoscaling<\/strong> GPU replicas. Each layer attacks cost or latency without touching accuracy.<\/p>\n<h2 id=\"measure-dont-guess\">Measure, don't guess<\/h2>\n<p>The engineering discipline is the same as everywhere: <strong>profile to find the actual bottleneck<\/strong> (is it the model, the preprocessing, the network, the batching wait?) and attack the biggest number — rather than optimizing what you assume is slow. \"I profile first\" is always the right thing to say.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Serving optimizers: <strong>Triton<\/strong> (dynamic batching, multi-framework) and <strong>TensorRT / ONNX Runtime<\/strong> for classic models; <strong>vLLM<\/strong> and <strong>TGI<\/strong> for LLMs (paged KV-cache, continuous batching); <strong>Redis<\/strong> for caching hot inputs/embeddings; autoscaling via <strong>KServe<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"CV inference went through Triton with dynamic batching on TensorRT engines; LLM inference through vLLM for KV-cache batching, with a Redis semantic cache in front.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Latency vs throughput — how can they conflict? *(batching raises throughput but adds<\/li><\/ul>\n<p>latency while requests are grouped.)*<\/p>\n<ul><li>How does batching help on a GPU? *(runs many requests in one parallel pass → much higher<\/li><\/ul>\n<p>throughput per dollar.)*<\/p>\n<ul><li>Name two serving-optimization levers besides batching. *(caching, model compilation<\/li><\/ul>\n<p>(TensorRT/ONNX), right hardware, autoscaling — any two.)*<\/p>","toc":[{"level":2,"id":"latency-vs-throughput-frame-it-first","text":"Latency vs throughput (frame it first)"},{"level":2,"id":"the-main-levers","text":"The main levers"},{"level":2,"id":"putting-it-together","text":"Putting it together"},{"level":2,"id":"measure-dont-guess","text":"Measure, don't guess"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"inference & serving optimization 💡 tl;dr serving optimization is about lower latency and higher throughput per dollar at prediction time. the big levers: batching requests, caching repeated results, compiling the model for the hardware, and scaling smartly. distinct from training optimization — here you're tuning the live service. latency vs throughput (frame it first) two different goals that sometimes conflict. latency = how fast a single prediction returns (what one user feels). throughput = how many predictions per second the system handles (what your bill reflects). some tricks (batching) boost throughput but can add latency, so you optimize for the one the product needs — usually a p99 latency target at the lowest cost. the main levers batching — instead of running the model once per request, group several requests and run them together in one gpu pass. gpus love parallelism, so this dramatically raises throughput. dynamic batching (triton, kserve) waits a few milliseconds to collect a batch — a small, bounded latency cost for a big throughput gain. caching — if the same input (or a common one) recurs, cache the prediction and skip the model entirely. huge for repeated queries; also used for embeddings and, in llms, for prompt/kv caching. model compilation / optimized runtimes — compile the model for the target hardware with tensorrt , onnx runtime , or torchscript : they fuse operations, pick fast kernels, and apply the precision from section 8's compression. often a big speedup for free. right hardware — gpu for heavy/parallel models, cpu for light ones; specialized accelerators (inferentia, tpu) where they fit. autoscaling (section 7) — match replica count to load; scale to zero when idle. putting it together a typical optimized online service: a quantized, tensorrt-compiled model , behind a server that does dynamic batching , with a cache for hot inputs, running on autoscaling gpu replicas. each layer attacks cost or latency without touching accuracy. measure, don't guess the engineering discipline is the same as everywhere: profile to find the actual bottleneck (is it the model, the preprocessing, the network, the batching wait?) and attack the biggest number — rather than optimizing what you assume is slow. \"i profile first\" is always the right thing to say. 🔗 connecting the dots — the real stack serving optimizers: triton (dynamic batching, multi-framework) and tensorrt / onnx runtime for classic models; vllm and tgi for llms (paged kv-cache, continuous batching); redis for caching hot inputs/embeddings; autoscaling via kserve . how you'd say it: \"cv inference went through triton with dynamic batching on tensorrt engines; llm inference through vllm for kv-cache batching, with a redis semantic cache in front.\" self-check latency vs throughput — how can they conflict? *(batching raises throughput but adds latency while requests are grouped.)* how does batching help on a gpu? *(runs many requests in one parallel pass → much higher throughput per dollar.)* name two serving-optimization levers besides batching. *(caching, model compilation (tensorrt/onnx), right hardware, autoscaling — any two.)*","words":493},{"path":"09-generative-ai-llms/README.md","title":"Overview","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"9-generative-ai-llms\">9 — Generative AI &amp; LLMs<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD's \"staying up to date, including Generative AI.\" Every team asks about this now, even non-LLM roles. You need: how transformers/LLMs work at a high level, the practical ways to <em>use<\/em> them (prompting, <strong>RAG<\/strong>, fine-tuning), and how you run them in production (LLMOps and evaluation). This is the newest, most-asked section.<\/div><\/div>\n<h2 id=\"why-it-matters-even-if-the-role-isnt-llm\">Why it matters even if the role isn't \"LLM\"<\/h2>\n<p>Generative AI has become table stakes — interviewers want to see you understand it well enough to make sound build decisions, not just that you've heard the buzzwords. The most valuable thing you can show is <strong>judgment<\/strong>: when to prompt, when to add retrieval, when to fine-tune, and how to keep an LLM app reliable and affordable.<\/p>\n<h2 id=\"the-four-pages\">The four pages<\/h2>\n<ul><li><strong>Transformers &amp; how LLMs work<\/strong> — attention, tokens, and what \"predict the next token\"<\/li><\/ul>\n<p>really means.<\/p>\n<ul><li><strong>Prompting &amp; RAG<\/strong> — the two most common ways to get an LLM to do your task without<\/li><\/ul>\n<p>training it.<\/p>\n<ul><li><strong>Fine-tuning &amp; PEFT (LoRA)<\/strong> — when and how to actually adapt a model's weights.<\/li><li><strong>LLMOps &amp; evaluation<\/strong> — serving, cost, guardrails, and the hard problem of evaluating<\/li><\/ul>\n<p>generated text.<\/p>\n<h2 id=\"the-decision-spine-hold-this-in-your-head\">The decision spine (hold this in your head)<\/h2>\n<pre><code>Need the LLM to do X?\n  → try PROMPTING first (cheapest, fastest)\n  → needs your private/fresh knowledge? add RAG (retrieval)\n  → needs a specific style/behavior prompting can't get? FINE-TUNE<\/code><\/pre>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"transformers-and-llms.md\" href=\"#\">transformers-and-llms.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-it-matters-even-if-the-role-isnt-llm","text":"Why it matters even if the role isn't \"LLM\""},{"level":2,"id":"the-four-pages","text":"The four pages"},{"level":2,"id":"the-decision-spine-hold-this-in-your-head","text":"The decision spine (hold this in your head)"}],"text":"9 — generative ai & llms 💡 tl;dr the jd's \"staying up to date, including generative ai.\" every team asks about this now, even non-llm roles. you need: how transformers/llms work at a high level, the practical ways to use them (prompting, rag , fine-tuning), and how you run them in production (llmops and evaluation). this is the newest, most-asked section. why it matters even if the role isn't \"llm\" generative ai has become table stakes — interviewers want to see you understand it well enough to make sound build decisions, not just that you've heard the buzzwords. the most valuable thing you can show is judgment : when to prompt, when to add retrieval, when to fine-tune, and how to keep an llm app reliable and affordable. the four pages transformers & how llms work — attention, tokens, and what \"predict the next token\" really means. prompting & rag — the two most common ways to get an llm to do your task without training it. fine-tuning & peft (lora) — when and how to actually adapt a model's weights. llmops & evaluation — serving, cost, guardrails, and the hard problem of evaluating generated text. the decision spine (hold this in your head) need the llm to do x? → try prompting first (cheapest, fastest) → needs your private/fresh knowledge? add rag (retrieval) → needs a specific style/behavior prompting can't get? fine-tune → start: transformers-and-llms.md","words":236},{"path":"09-generative-ai-llms/transformers-and-llms.md","title":"Transformers & How LLMs Work","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"transformers-how-llms-work\">Transformers &amp; How LLMs Work<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> An LLM is a very large transformer trained to <strong>predict the next token<\/strong> over huge amounts of text. Its superpower is <strong>attention<\/strong>, which lets it weigh how every word relates to every other. That simple objective, at scale, produces the fluent, general behavior we see.<\/div><\/div>\n<h2 id=\"tokens-and-next-token-prediction\">Tokens and next-token prediction<\/h2>\n<p>LLMs don't see words or letters — they see <strong>tokens<\/strong> (word pieces). The model is trained on one deceptively simple task: given the tokens so far, <strong>predict the next token<\/strong>. Do that over trillions of tokens of text and, to get good at it, the model has to implicitly learn grammar, facts, reasoning patterns, and style. At generation time it predicts a token, appends it, and repeats — that's \"autoregressive\" generation.<\/p>\n<p>A knob to know: <strong>temperature<\/strong> controls randomness of that next-token choice — low = more deterministic/factual, high = more creative/varied.<\/p>\n<h2 id=\"attention-the-core-idea\">Attention (the core idea)<\/h2>\n<p>The transformer's key mechanism is <strong>self-attention<\/strong>: for each token, the model computes how much every <em>other<\/em> token should influence it, and blends them accordingly. This lets it capture long-range relationships (\"it\" refers to which noun?) and, unlike older RNNs, process the whole sequence <strong>in parallel<\/strong> — which is exactly why transformers scale to huge models and datasets.<\/p>\n<pre><code>\"The cat sat on the mat because it was tired\"\nattention lets \"it\" look back and weight \"cat\" strongly → resolves the reference<\/code><\/pre>\n<p>You don't need the matrix math for most interviews — you need \"attention weighs the relationship between all pairs of tokens, in parallel, which is why transformers scale.\"<\/p>\n<h2 id=\"context-window\">Context window<\/h2>\n<p>The <strong>context window<\/strong> is how many tokens the model can consider at once (its working memory). Everything — your prompt, retrieved documents, the conversation — must fit. It's a real constraint that shapes design (it's <em>why<\/em> RAG chunks documents, next page) and a cost driver (more tokens = more compute).<\/p>\n<h2 id=\"why-theyre-called-foundation-models\">Why they're called \"foundation models\"<\/h2>\n<p>A single pretrained LLM can be adapted to many tasks (summarize, classify, code, chat) without training a new model each time — via prompting or light fine-tuning. That generality is why they're \"foundation\" models and why the practical skill is <em>adapting<\/em> them (next pages), not training them from scratch (almost no one does that).<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>You either call a <strong>hosted API<\/strong> (<strong>OpenAI<\/strong>, <strong>Anthropic<\/strong>, <strong>Cohere<\/strong>) or run an <strong>open model<\/strong> (<strong>Llama<\/strong>, <strong>Mistral<\/strong>, <strong>Qwen<\/strong>) via <strong>HuggingFace Transformers<\/strong>; tokenization is <strong>tiktoken<\/strong> or HF tokenizers. Self-hosting for throughput uses <strong>vLLM<\/strong> or <strong>TGI<\/strong> (see §8).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a prototype I'd call the Anthropic API; for cost or data-privacy at scale I'd self-host a Llama/Mistral model on vLLM.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What task are LLMs trained on? <em>(next-token prediction over massive text.)<\/em><\/li><li>What does attention do, in one line? *(weighs how every token relates to every other,<\/li><\/ul>\n<p>in parallel — enabling long-range context and scale.)*<\/p>\n<ul><li>What is the context window and why does it matter? *(the max tokens the model can<\/li><\/ul>\n<p>consider at once; constrains prompts/RAG and drives cost.)*<\/p>","toc":[{"level":2,"id":"tokens-and-next-token-prediction","text":"Tokens and next-token prediction"},{"level":2,"id":"attention-the-core-idea","text":"Attention (the core idea)"},{"level":2,"id":"context-window","text":"Context window"},{"level":2,"id":"why-theyre-called-foundation-models","text":"Why they're called \"foundation models\""},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"transformers & how llms work 💡 tl;dr an llm is a very large transformer trained to predict the next token over huge amounts of text. its superpower is attention , which lets it weigh how every word relates to every other. that simple objective, at scale, produces the fluent, general behavior we see. tokens and next-token prediction llms don't see words or letters — they see tokens (word pieces). the model is trained on one deceptively simple task: given the tokens so far, predict the next token . do that over trillions of tokens of text and, to get good at it, the model has to implicitly learn grammar, facts, reasoning patterns, and style. at generation time it predicts a token, appends it, and repeats — that's \"autoregressive\" generation. a knob to know: temperature controls randomness of that next-token choice — low = more deterministic/factual, high = more creative/varied. attention (the core idea) the transformer's key mechanism is self-attention : for each token, the model computes how much every other token should influence it, and blends them accordingly. this lets it capture long-range relationships (\"it\" refers to which noun?) and, unlike older rnns, process the whole sequence in parallel — which is exactly why transformers scale to huge models and datasets. \"the cat sat on the mat because it was tired\" attention lets \"it\" look back and weight \"cat\" strongly → resolves the reference you don't need the matrix math for most interviews — you need \"attention weighs the relationship between all pairs of tokens, in parallel, which is why transformers scale.\" context window the context window is how many tokens the model can consider at once (its working memory). everything — your prompt, retrieved documents, the conversation — must fit. it's a real constraint that shapes design (it's why rag chunks documents, next page) and a cost driver (more tokens = more compute). why they're called \"foundation models\" a single pretrained llm can be adapted to many tasks (summarize, classify, code, chat) without training a new model each time — via prompting or light fine-tuning. that generality is why they're \"foundation\" models and why the practical skill is adapting them (next pages), not training them from scratch (almost no one does that). 🔗 connecting the dots — the real stack you either call a hosted api ( openai , anthropic , cohere ) or run an open model ( llama , mistral , qwen ) via huggingface transformers ; tokenization is tiktoken or hf tokenizers. self-hosting for throughput uses vllm or tgi (see §8). how you'd say it: \"for a prototype i'd call the anthropic api; for cost or data-privacy at scale i'd self-host a llama/mistral model on vllm.\" self-check what task are llms trained on? (next-token prediction over massive text.) what does attention do, in one line? *(weighs how every token relates to every other, in parallel — enabling long-range context and scale.)* what is the context window and why does it matter? *(the max tokens the model can consider at once; constrains prompts/rag and drives cost.)*","words":509},{"path":"09-generative-ai-llms/prompting-and-rag.md","title":"Prompting & RAG","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"prompting-rag\">Prompting &amp; RAG<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The two cheapest ways to make an LLM do your task without training it. <strong>Prompting<\/strong> = carefully instructing the model. <strong>RAG (retrieval-augmented generation)<\/strong> = fetching relevant documents and putting them in the prompt so the model answers from <em>your<\/em> data instead of only its training. RAG is the default fix for \"the model doesn't know our stuff\" and for hallucinations.<\/div><\/div>\n<h2 id=\"prompting\">Prompting<\/h2>\n<p>The fastest lever: get better output by writing better instructions. Useful patterns:<\/p>\n<ul><li><strong>Clear instructions + examples<\/strong> — showing a few input→output examples (<strong>few-shot<\/strong>)<\/li><\/ul>\n<p>steers the model strongly.<\/p>\n<ul><li><strong>Chain-of-thought<\/strong> — asking it to \"think step by step\" improves reasoning on complex<\/li><\/ul>\n<p>tasks.<\/p>\n<ul><li><strong>Role/format constraints<\/strong> — specify the persona, the output format (JSON), the length.<\/li><\/ul>\n<p>Prompting changes nothing about the model — it's just input — so it's instant and free to iterate. Always the first thing to try.<\/p>\n<h2 id=\"why-rag-exists\">Why RAG exists<\/h2>\n<p>An LLM only knows what was in its training data, which is <strong>frozen<\/strong> at training time and <strong>doesn't include your private/internal data<\/strong>. So it can't answer \"what's our refund policy?\" and it may <strong>hallucinate<\/strong> (confidently make something up). RAG fixes both by giving the model the relevant facts at query time.<\/p>\n<h2 id=\"how-rag-works\">How RAG works<\/h2>\n<pre><code>question → embed → search a vector DB for similar chunks → retrieve top-k docs\n→ stuff them into the prompt → LLM answers grounded in those docs (+ cites them)<\/code><\/pre>\n<ol><li><strong>Index (offline):<\/strong> split your documents into chunks, convert each to an <strong>embedding<\/strong><\/li><\/ol>\n<p>(a vector capturing meaning), and store them in a <strong>vector database<\/strong> (Pinecone, Weaviate,    pgvector, FAISS).<\/p>\n<ol><li><strong>Retrieve (per query):<\/strong> embed the user's question, find the most similar chunks by<\/li><\/ol>\n<p>vector similarity.<\/p>\n<ol><li><strong>Generate:<\/strong> put those chunks in the prompt so the model answers <strong>from them<\/strong>, and can<\/li><\/ol>\n<p>cite sources.<\/p>\n<p>The payoff: answers grounded in <em>your current<\/em> data, fewer hallucinations, easy updates (re-index, no retraining), and citations for trust.<\/p>\n<h2 id=\"promptingrag-vs-fine-tuning\">Prompting/RAG vs fine-tuning<\/h2>\n<p>The crucial judgment: <strong>RAG adds knowledge; fine-tuning changes behavior/style.<\/strong> If the problem is \"the model lacks our facts,\" reach for RAG. If it's \"the model won't follow our exact format/tone no matter how I prompt,\" consider fine-tuning (next page). A common mistake is fine-tuning to add facts — RAG is usually the right, cheaper tool for that.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>This is the core LLM-app stack. <strong>Orchestration:<\/strong> <strong>LangChain<\/strong> or <strong>LlamaIndex<\/strong> glue the steps. <strong>Embeddings:<\/strong> OpenAI / Cohere / <strong>sentence-transformers<\/strong> / <strong>BGE<\/strong>. <strong>Vector database:<\/strong> <strong>Pinecone<\/strong>, <strong>Weaviate<\/strong>, <strong>Qdrant<\/strong>, <strong>Chroma<\/strong>, <strong>pgvector<\/strong>, or <strong>FAISS<\/strong> — this is where the retrieval happens. <strong>Chunking + re-ranking<\/strong> (Cohere Rerank) improve retrieval quality.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>RAG step<\/th><th>Typical tool<\/th><\/tr><\/thead><tbody><tr><td>Chunk + embed docs<\/td><td>LlamaIndex / LangChain + an embedding model<\/td><\/tr><tr><td>Store &amp; search vectors<\/td><td>Pinecone / Weaviate / pgvector / FAISS<\/td><\/tr><tr><td>Retrieve + re-rank<\/td><td>vector search + Cohere Rerank<\/td><\/tr><tr><td>Generate grounded answer<\/td><td>the LLM (API or self-hosted)<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How you'd say it:<\/strong> <em>\"We chunked the docs with LlamaIndex, embedded with BGE into pgvector, retrieved top-k plus a Cohere re-rank, and fed that into the LLM so answers were grounded and cited.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What problem does RAG solve that prompting alone can't? *(the model lacking your private/<\/li><\/ul>\n<p>fresh knowledge, and hallucination — RAG grounds answers in retrieved data.)*<\/p>\n<ul><li>What are the three RAG steps? *(index docs as embeddings in a vector DB → retrieve<\/li><\/ul>\n<p>similar chunks for the query → generate grounded in them.)*<\/p>\n<ul><li>RAG vs fine-tuning — which for adding company facts, which for changing style? *(RAG for<\/li><\/ul>\n<p>facts/knowledge; fine-tuning for behavior/style.)*<\/p>","toc":[{"level":2,"id":"prompting","text":"Prompting"},{"level":2,"id":"why-rag-exists","text":"Why RAG exists"},{"level":2,"id":"how-rag-works","text":"How RAG works"},{"level":2,"id":"promptingrag-vs-fine-tuning","text":"Prompting/RAG vs fine-tuning"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"prompting & rag 💡 tl;dr the two cheapest ways to make an llm do your task without training it. prompting = carefully instructing the model. rag (retrieval-augmented generation) = fetching relevant documents and putting them in the prompt so the model answers from your data instead of only its training. rag is the default fix for \"the model doesn't know our stuff\" and for hallucinations. prompting the fastest lever: get better output by writing better instructions. useful patterns: clear instructions + examples — showing a few input→output examples ( few-shot ) steers the model strongly. chain-of-thought — asking it to \"think step by step\" improves reasoning on complex tasks. role/format constraints — specify the persona, the output format (json), the length. prompting changes nothing about the model — it's just input — so it's instant and free to iterate. always the first thing to try. why rag exists an llm only knows what was in its training data, which is frozen at training time and doesn't include your private/internal data . so it can't answer \"what's our refund policy?\" and it may hallucinate (confidently make something up). rag fixes both by giving the model the relevant facts at query time. how rag works question → embed → search a vector db for similar chunks → retrieve top-k docs → stuff them into the prompt → llm answers grounded in those docs (+ cites them) index (offline): split your documents into chunks, convert each to an embedding (a vector capturing meaning), and store them in a vector database (pinecone, weaviate, pgvector, faiss). retrieve (per query): embed the user's question, find the most similar chunks by vector similarity. generate: put those chunks in the prompt so the model answers from them , and can cite sources. the payoff: answers grounded in your current data, fewer hallucinations, easy updates (re-index, no retraining), and citations for trust. prompting/rag vs fine-tuning the crucial judgment: rag adds knowledge; fine-tuning changes behavior/style. if the problem is \"the model lacks our facts,\" reach for rag. if it's \"the model won't follow our exact format/tone no matter how i prompt,\" consider fine-tuning (next page). a common mistake is fine-tuning to add facts — rag is usually the right, cheaper tool for that. 🔗 connecting the dots — the real stack this is the core llm-app stack. orchestration: langchain or llamaindex glue the steps. embeddings: openai / cohere / sentence-transformers / bge . vector database: pinecone , weaviate , qdrant , chroma , pgvector , or faiss — this is where the retrieval happens. chunking + re-ranking (cohere rerank) improve retrieval quality. rag step typical tool chunk + embed docs llamaindex / langchain + an embedding model store & search vectors pinecone / weaviate / pgvector / faiss retrieve + re-rank vector search + cohere rerank generate grounded answer the llm (api or self-hosted) how you'd say it: \"we chunked the docs with llamaindex, embedded with bge into pgvector, retrieved top-k plus a cohere re-rank, and fed that into the llm so answers were grounded and cited.\" self-check what problem does rag solve that prompting alone can't? *(the model lacking your private/ fresh knowledge, and hallucination — rag grounds answers in retrieved data.)* what are the three rag steps? *(index docs as embeddings in a vector db → retrieve similar chunks for the query → generate grounded in them.)* rag vs fine-tuning — which for adding company facts, which for changing style? *(rag for facts/knowledge; fine-tuning for behavior/style.)*","words":578},{"path":"09-generative-ai-llms/fine-tuning.md","title":"Fine-Tuning & PEFT (LoRA)","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"fine-tuning-peft-lora\">Fine-Tuning &amp; PEFT (LoRA)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Fine-tuning adapts a pretrained model's <em>weights<\/em> to your task — use it when prompting and RAG can't get the behavior or style you need. Full fine-tuning is expensive, so in practice you use <strong>PEFT<\/strong> methods like <strong>LoRA<\/strong> that train a tiny fraction of the parameters for most of the benefit.<\/div><\/div>\n<h2 id=\"when-to-fine-tune-and-when-not-to\">When to fine-tune (and when not to)<\/h2>\n<p>Fine-tuning is the heaviest lever, so reach for it last:<\/p>\n<ul><li><strong>Prompt first<\/strong> — free, instant.<\/li><li><strong>RAG next<\/strong> — when the gap is <em>knowledge<\/em> (your facts, fresh data).<\/li><li><strong>Fine-tune<\/strong> — when the gap is <em>behavior<\/em>: a consistent style/format/persona, a<\/li><\/ul>\n<p>specialized task, or domain language that prompting can't reliably produce; or to make a   smaller model match a bigger one's quality on your narrow task (cheaper serving).<\/p>\n<p>A classic mistake is fine-tuning to inject facts — that's RAG's job, and fine-tuning bakes facts in statically (they go stale and can't be cited). Fine-tune for <em>how<\/em> it responds, retrieve for <em>what<\/em> it knows.<\/p>\n<h2 id=\"full-fine-tuning-vs-peft\">Full fine-tuning vs PEFT<\/h2>\n<p><strong>Full fine-tuning<\/strong> updates <em>all<\/em> the model's billions of weights — powerful but expensive (lots of GPU memory) and it produces a full copy of the model per task.<\/p>\n<p><strong>PEFT (parameter-efficient fine-tuning)<\/strong> freezes the original weights and trains only a small number of new ones. <strong>LoRA<\/strong> is the popular method: it injects tiny low-rank \"adapter\" matrices into the model and trains only those — often &lt;1% of the parameters — getting most of full fine-tuning's benefit at a fraction of the cost and memory. <strong>QLoRA<\/strong> goes further, fine-tuning on top of a quantized model so it fits on a single GPU.<\/p>\n<pre><code>Full FT:  update all N billion weights           → expensive, full copy per task\nLoRA:     freeze them, train small adapters (&lt;1%) → cheap, swap adapters per task<\/code><\/pre>\n<p>The bonus: LoRA adapters are small and <strong>swappable<\/strong> — one base model can serve many tasks by loading different adapters, which is great for serving economics.<\/p>\n<h2 id=\"what-you-need-to-fine-tune\">What you need to fine-tune<\/h2>\n<p>Fine-tuning is supervised learning, so you need a <strong>quality dataset<\/strong> of example input→output pairs in the format/behavior you want. Data quality matters more than quantity — a few hundred clean, on-target examples often beat thousands of noisy ones. This is the real work of fine-tuning; the training itself is largely a solved recipe.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>The stack is <strong>HuggingFace PEFT<\/strong> (LoRA/QLoRA), <strong>bitsandbytes<\/strong> (4-bit for QLoRA), <strong>TRL<\/strong> (SFT/RLHF trainers), and wrappers like <strong>Axolotl<\/strong> or <strong>Unsloth<\/strong> that make it a config file. Adapters register in <strong>MLflow / HuggingFace Hub<\/strong> and serve on <strong>vLLM<\/strong> (which can hot-swap LoRA adapters).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"To adapt a model's behavior I'd QLoRA-fine-tune with PEFT + bitsandbytes on a single GPU using Axolotl, then serve the base model with the LoRA adapter on vLLM.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>When fine-tune instead of RAG? *(when you need specific behavior/style/format, not just<\/li><\/ul>\n<p>facts — RAG handles knowledge.)*<\/p>\n<ul><li>What does LoRA do? *(freezes the base model, trains tiny low-rank adapters (&lt;1% of<\/li><\/ul>\n<p>params) — cheap, swappable per task.)*<\/p>\n<ul><li>What matters most for a fine-tuning dataset? *(quality and on-target formatting of the<\/li><\/ul>\n<p>input→output examples, over sheer quantity.)*<\/p>","toc":[{"level":2,"id":"when-to-fine-tune-and-when-not-to","text":"When to fine-tune (and when not to)"},{"level":2,"id":"full-fine-tuning-vs-peft","text":"Full fine-tuning vs PEFT"},{"level":2,"id":"what-you-need-to-fine-tune","text":"What you need to fine-tune"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"fine-tuning & peft (lora) 💡 tl;dr fine-tuning adapts a pretrained model's weights to your task — use it when prompting and rag can't get the behavior or style you need. full fine-tuning is expensive, so in practice you use peft methods like lora that train a tiny fraction of the parameters for most of the benefit. when to fine-tune (and when not to) fine-tuning is the heaviest lever, so reach for it last: prompt first — free, instant. rag next — when the gap is knowledge (your facts, fresh data). fine-tune — when the gap is behavior : a consistent style/format/persona, a specialized task, or domain language that prompting can't reliably produce; or to make a smaller model match a bigger one's quality on your narrow task (cheaper serving). a classic mistake is fine-tuning to inject facts — that's rag's job, and fine-tuning bakes facts in statically (they go stale and can't be cited). fine-tune for how it responds, retrieve for what it knows. full fine-tuning vs peft full fine-tuning updates all the model's billions of weights — powerful but expensive (lots of gpu memory) and it produces a full copy of the model per task. peft (parameter-efficient fine-tuning) freezes the original weights and trains only a small number of new ones. lora is the popular method: it injects tiny low-rank \"adapter\" matrices into the model and trains only those — often <1% of the parameters — getting most of full fine-tuning's benefit at a fraction of the cost and memory. qlora goes further, fine-tuning on top of a quantized model so it fits on a single gpu. full ft: update all n billion weights → expensive, full copy per task lora: freeze them, train small adapters (<1%) → cheap, swap adapters per task the bonus: lora adapters are small and swappable — one base model can serve many tasks by loading different adapters, which is great for serving economics. what you need to fine-tune fine-tuning is supervised learning, so you need a quality dataset of example input→output pairs in the format/behavior you want. data quality matters more than quantity — a few hundred clean, on-target examples often beat thousands of noisy ones. this is the real work of fine-tuning; the training itself is largely a solved recipe. 🔗 connecting the dots — the real stack the stack is huggingface peft (lora/qlora), bitsandbytes (4-bit for qlora), trl (sft/rlhf trainers), and wrappers like axolotl or unsloth that make it a config file. adapters register in mlflow / huggingface hub and serve on vllm (which can hot-swap lora adapters). how you'd say it: \"to adapt a model's behavior i'd qlora-fine-tune with peft + bitsandbytes on a single gpu using axolotl, then serve the base model with the lora adapter on vllm.\" self-check when fine-tune instead of rag? *(when you need specific behavior/style/format, not just facts — rag handles knowledge.)* what does lora do? *(freezes the base model, trains tiny low-rank adapters (<1% of params) — cheap, swappable per task.)* what matters most for a fine-tuning dataset? *(quality and on-target formatting of the input→output examples, over sheer quantity.)*","words":515},{"path":"09-generative-ai-llms/llmops-and-eval.md","title":"LLMOps & Evaluation","section":"9 · Generative AI & LLMs","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"llmops-evaluation\">LLMOps &amp; Evaluation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Running LLMs in production adds new problems on top of normal MLOps: they're <strong>expensive<\/strong> (pay per token), <strong>slow<\/strong> (generate token by token), <strong>non-deterministic<\/strong>, and can <strong>hallucinate<\/strong> or be misused. LLMOps is how you serve them affordably and safely, and <strong>evaluation<\/strong> is uniquely hard because there's rarely one \"correct\" output.<\/div><\/div>\n<h2 id=\"whats-different-about-serving-llms\">What's different about serving LLMs<\/h2>\n<ul><li><strong>Cost per token<\/strong> — you pay for input + output tokens (API) or big GPUs (self-hosted),<\/li><\/ul>\n<p>so cost scales with prompt and response length. Long RAG contexts get expensive fast.<\/p>\n<ul><li><strong>Latency<\/strong> — generation is sequential (token by token), so responses stream; you<\/li><\/ul>\n<p>optimize with techniques like <strong>KV caching<\/strong>, batching, and smaller/quantized models   (section 8).<\/p>\n<ul><li><strong>Non-determinism<\/strong> — the same prompt can give different answers, which complicates<\/li><\/ul>\n<p>testing and caching.<\/p>\n<h2 id=\"cost-latency-levers-name-a-few\">Cost &amp; latency levers (name a few)<\/h2>\n<p>Prompt-caching and <strong>semantic caching<\/strong> (reuse answers for similar questions), routing easy queries to a <strong>smaller/cheaper model<\/strong> and hard ones to a big one, trimming prompt/context length, quantization and optimized runtimes (vLLM, TGI, TensorRT-LLM) for self-hosting, and capping max output tokens. The instinct is the same as any serving optimization: cut tokens and compute without hurting quality.<\/p>\n<h2 id=\"guardrails-safety\">Guardrails &amp; safety<\/h2>\n<p>Because LLMs generate open-ended text, production apps wrap them in guardrails: <strong>input filtering<\/strong> (block prompt-injection and abuse), <strong>output filtering<\/strong> (toxicity, PII, format validation), grounding via RAG to reduce hallucination, and <strong>human-in-the-loop<\/strong> for high-stakes actions. \"The model is one component inside a system with guardrails\" is the mature framing.<\/p>\n<h2 id=\"the-evaluation-problem\">The evaluation problem<\/h2>\n<p>For a classifier you have accuracy; for generated text there's usually <strong>no single correct answer<\/strong>, which makes evaluation the hardest part. Approaches, combined in practice:<\/p>\n<ul><li><strong>Human evaluation<\/strong> — people rate outputs; the gold standard but slow and costly.<\/li><li><strong>LLM-as-a-judge<\/strong> — use a strong model to score outputs against a rubric; scalable,<\/li><\/ul>\n<p>increasingly common, but must itself be validated.<\/p>\n<ul><li><strong>Reference-based metrics<\/strong> — BLEU/ROUGE (overlap with a reference) for summarization/<\/li><\/ul>\n<p>translation; limited but cheap.<\/p>\n<ul><li><strong>Task-specific checks<\/strong> — for structured output, just validate it (does the JSON parse?<\/li><\/ul>\n<p>is the answer in the retrieved docs?); for RAG, measure <strong>groundedness<\/strong> (is the answer   supported by sources?) and retrieval quality.<\/p>\n<p>The honest answer to \"how do you evaluate an LLM app?\": <em>\"a mix — automated checks and LLM-as-judge for scale on every change, plus periodic human review, and for RAG I specifically measure groundedness and retrieval relevance, not just fluency.\"<\/em><\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>Serving:<\/strong> <strong>vLLM<\/strong> / <strong>TGI<\/strong>. <strong>Evaluation:<\/strong> <strong>Ragas<\/strong> (RAG groundedness/retrieval), <strong>DeepEval<\/strong>, <strong>TruLens<\/strong>, <strong>LangSmith<\/strong> / <strong>Langfuse<\/strong> / <strong>Arize Phoenix<\/strong> (tracing + eval). <strong>Guardrails:<\/strong> <strong>Guardrails AI<\/strong>, <strong>NeMo Guardrails<\/strong>. <strong>Observability:<\/strong> LangSmith / Langfuse trace every prompt, token, and cost.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Every LLM call was traced in Langfuse for cost and latency; RAG quality was scored with Ragas on each change; Guardrails validated output format and blocked injection.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Three things that make LLM serving harder than normal model serving? *(cost per token,<\/li><\/ul>\n<p>token-by-token latency, non-determinism, hallucination — any three.)*<\/p>\n<ul><li>Two ways to cut LLM cost? *(caching, route to smaller models, trim context, cap output,<\/li><\/ul>\n<p>quantize/optimized runtime — any two.)*<\/p>\n<ul><li>Why is evaluating generated text hard, and one approach? *(no single correct answer;<\/li><\/ul>\n<p>human eval, LLM-as-judge, or task-specific checks like groundedness.)*<\/p>","toc":[{"level":2,"id":"whats-different-about-serving-llms","text":"What's different about serving LLMs"},{"level":2,"id":"cost-latency-levers-name-a-few","text":"Cost &amp; latency levers (name a few)"},{"level":2,"id":"guardrails-safety","text":"Guardrails &amp; safety"},{"level":2,"id":"the-evaluation-problem","text":"The evaluation problem"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"llmops & evaluation 💡 tl;dr running llms in production adds new problems on top of normal mlops: they're expensive (pay per token), slow (generate token by token), non-deterministic , and can hallucinate or be misused. llmops is how you serve them affordably and safely, and evaluation is uniquely hard because there's rarely one \"correct\" output. what's different about serving llms cost per token — you pay for input + output tokens (api) or big gpus (self-hosted), so cost scales with prompt and response length. long rag contexts get expensive fast. latency — generation is sequential (token by token), so responses stream; you optimize with techniques like kv caching , batching, and smaller/quantized models (section 8). non-determinism — the same prompt can give different answers, which complicates testing and caching. cost & latency levers (name a few) prompt-caching and semantic caching (reuse answers for similar questions), routing easy queries to a smaller/cheaper model and hard ones to a big one, trimming prompt/context length, quantization and optimized runtimes (vllm, tgi, tensorrt-llm) for self-hosting, and capping max output tokens. the instinct is the same as any serving optimization: cut tokens and compute without hurting quality. guardrails & safety because llms generate open-ended text, production apps wrap them in guardrails: input filtering (block prompt-injection and abuse), output filtering (toxicity, pii, format validation), grounding via rag to reduce hallucination, and human-in-the-loop for high-stakes actions. \"the model is one component inside a system with guardrails\" is the mature framing. the evaluation problem for a classifier you have accuracy; for generated text there's usually no single correct answer , which makes evaluation the hardest part. approaches, combined in practice: human evaluation — people rate outputs; the gold standard but slow and costly. llm-as-a-judge — use a strong model to score outputs against a rubric; scalable, increasingly common, but must itself be validated. reference-based metrics — bleu/rouge (overlap with a reference) for summarization/ translation; limited but cheap. task-specific checks — for structured output, just validate it (does the json parse? is the answer in the retrieved docs?); for rag, measure groundedness (is the answer supported by sources?) and retrieval quality. the honest answer to \"how do you evaluate an llm app?\": \"a mix — automated checks and llm-as-judge for scale on every change, plus periodic human review, and for rag i specifically measure groundedness and retrieval relevance, not just fluency.\" 🔗 connecting the dots — the real stack serving: vllm / tgi . evaluation: ragas (rag groundedness/retrieval), deepeval , trulens , langsmith / langfuse / arize phoenix (tracing + eval). guardrails: guardrails ai , nemo guardrails . observability: langsmith / langfuse trace every prompt, token, and cost. how you'd say it: \"every llm call was traced in langfuse for cost and latency; rag quality was scored with ragas on each change; guardrails validated output format and blocked injection.\" self-check three things that make llm serving harder than normal model serving? *(cost per token, token-by-token latency, non-determinism, hallucination — any three.)* two ways to cut llm cost? *(caching, route to smaller models, trim context, cap output, quantize/optimized runtime — any two.)* why is evaluating generated text hard, and one approach? *(no single correct answer; human eval, llm-as-judge, or task-specific checks like groundedness.)*","words":533},{"path":"10-system-design/README.md","title":"Overview","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"10-ml-system-design\">10 — ML System Design<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The open-ended interview round: <em>\"design an ML system for X\"<\/em> (recommendations, fraud, search, a feed). It's not about one model — it's about the whole pipeline: framing the problem, data, features, model, serving, and monitoring, with sensible trade-offs. This section gives you a repeatable <strong>framework<\/strong> plus four worked examples.<\/div><\/div>\n<h2 id=\"what-theyre-testing\">What they're testing<\/h2>\n<p>Not whether you know the fanciest model, but whether you can <strong>structure a full solution<\/strong> and reason about trade-offs like a senior engineer: latency vs accuracy, batch vs online, build vs buy, cost vs freshness. A candidate who jumps straight to \"I'd use a neural network\" fails; one who clarifies the problem and walks the pipeline succeeds.<\/p>\n<h2 id=\"the-pages\">The pages<\/h2>\n<ul><li><strong>A design framework<\/strong> — the repeatable structure to answer <em>any<\/em> ML design question.<\/li><li><strong>Worked example: recommender<\/strong> — the classic, walked end to end.<\/li><li><strong>Worked example: ML platform<\/strong> — designing the <em>infrastructure<\/em> many models run on.<\/li><li><strong>Worked example: hybrid perception platform<\/strong> — petabyte-scale, on-prem + cloud GPUs,<\/li><\/ul>\n<p>reproducibility, and rollbacks.<\/p>\n<ul><li><strong>Worked example: data-loading library<\/strong> — the classes and interfaces for a streaming<\/li><\/ul>\n<p>loader that keeps the GPU fed.<\/p>\n<h2 id=\"the-golden-rule\">The golden rule<\/h2>\n<p>Start by <strong>asking questions<\/strong>, not answering. Scope, scale, latency, and success metric change the whole design — clarify them first, then structure your answer with the framework.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"framework.md\" href=\"#\">framework.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-theyre-testing","text":"What they're testing"},{"level":2,"id":"the-pages","text":"The pages"},{"level":2,"id":"the-golden-rule","text":"The golden rule"}],"text":"10 — ml system design 💡 tl;dr the open-ended interview round: \"design an ml system for x\" (recommendations, fraud, search, a feed). it's not about one model — it's about the whole pipeline: framing the problem, data, features, model, serving, and monitoring, with sensible trade-offs. this section gives you a repeatable framework plus four worked examples. what they're testing not whether you know the fanciest model, but whether you can structure a full solution and reason about trade-offs like a senior engineer: latency vs accuracy, batch vs online, build vs buy, cost vs freshness. a candidate who jumps straight to \"i'd use a neural network\" fails; one who clarifies the problem and walks the pipeline succeeds. the pages a design framework — the repeatable structure to answer any ml design question. worked example: recommender — the classic, walked end to end. worked example: ml platform — designing the infrastructure many models run on. worked example: hybrid perception platform — petabyte-scale, on-prem + cloud gpus, reproducibility, and rollbacks. worked example: data-loading library — the classes and interfaces for a streaming loader that keeps the gpu fed. the golden rule start by asking questions , not answering. scope, scale, latency, and success metric change the whole design — clarify them first, then structure your answer with the framework. → start: framework.md","words":219},{"path":"10-system-design/framework.md","title":"A Design Framework","section":"10 · ML System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"a-design-framework\">A Design Framework<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Answer any \"design an ML system\" question with the same skeleton: clarify the problem, define the metric, sketch the data and features, pick a model, design serving, then monitoring — talking trade-offs throughout. Structure beats cleverness.<\/div><\/div>\n<h2 id=\"the-steps\">The steps<\/h2>\n<p><strong>1. Clarify the problem &amp; requirements.<\/strong> Don't design yet — ask. What exactly are we predicting? What's the scale (users, requests/sec)? Latency budget (real-time or batch)? What does success mean in business terms? These answers reshape everything, and asking them is itself a signal of seniority.<\/p>\n<p><strong>2. Frame it as an ML problem.<\/strong> Translate the business goal into a concrete ML task: inputs, output, and the <strong>metric<\/strong>. \"Recommend products\" → \"rank items by predicted click/purchase probability for this user,\" optimized offline for something like AUC and online for click-through or revenue.<\/p>\n<p><strong>3. Data &amp; features.<\/strong> What data exists (user history, item metadata, context)? How is it collected and how fresh? What features would be predictive, and do you need a feature store for consistency and low-latency serving (section 2)?<\/p>\n<p><strong>4. Model.<\/strong> Start simple (a baseline — popularity, logistic regression), then justify complexity. Name a reasonable choice and <em>why<\/em>, and mention the baseline you'd beat. Simple- first is a maturity signal.<\/p>\n<p><strong>5. Serving.<\/strong> Batch or real-time (section 5)? For low-latency at scale, a common pattern is <strong>two-stage<\/strong>: a cheap <strong>candidate generation<\/strong> step narrows millions of items to hundreds, then an expensive <strong>ranking<\/strong> model orders those. Discuss latency, scaling, caching.<\/p>\n<p><strong>6. Monitoring &amp; iteration.<\/strong> How do you know it works in production — online metric via A/B test (section 4), drift and quality monitoring (section 6), and a retraining plan.<\/p>\n<h2 id=\"the-two-stage-pattern-worth-memorizing\">The two-stage pattern (worth memorizing)<\/h2>\n<p>Most large-scale ranking/recommendation/search systems use it, because scoring millions of items per request with a heavy model is impossible in real time:<\/p>\n<pre><code>millions of items\n   → CANDIDATE GENERATION (cheap, fast, high recall) → ~hundreds\n   → RANKING (expensive, accurate model) → ordered top-N → user<\/code><\/pre>\n<h2 id=\"talk-trade-offs-out-loud\">Talk trade-offs out loud<\/h2>\n<p>The whole point is judgment: batch (cheap, stale) vs online (fresh, costly); a bigger model (accurate, slow, expensive) vs a smaller one; more features (better, more pipeline risk). Naming the trade-off and <em>making a choice with a reason<\/em> is what they're scoring.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p>Each layer of your answer maps to named tools, and dropping them in shows you've built, not just diagrammed: features → <strong>Feast<\/strong>; training → <strong>PyTorch / XGBoost<\/strong> on <strong>SageMaker/Vertex/Databricks<\/strong>; tracking → <strong>MLflow<\/strong>; candidate retrieval → a <strong>vector DB / ANN<\/strong> (FAISS, ScaNN); serving → <strong>Triton / KServe<\/strong>; monitoring → <strong>Evidently + Prometheus/Grafana<\/strong>; A/B → <strong>Statsig<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I sketch the pipeline first, then name a tool per box — feature store, MLflow, an ANN index for retrieval, KServe for serving, Evidently for drift — so it's clearly a real system, not a whiteboard fantasy.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What's the first thing to do in an ML design question? *(clarify requirements — scope,<\/li><\/ul>\n<p>scale, latency, success metric — before designing.)*<\/p>\n<ul><li>What is the two-stage pattern and why use it? *(cheap candidate generation then expensive<\/li><\/ul>\n<p>ranking — you can't score millions of items in real time with a heavy model.)*<\/p>\n<ul><li>Why start with a simple baseline? *(it's a maturity signal, gives something to beat, and<\/li><\/ul>\n<p>often is enough.)*<\/p>","toc":[{"level":2,"id":"the-steps","text":"The steps"},{"level":2,"id":"the-two-stage-pattern-worth-memorizing","text":"The two-stage pattern (worth memorizing)"},{"level":2,"id":"talk-trade-offs-out-loud","text":"Talk trade-offs out loud"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"a design framework 💡 tl;dr answer any \"design an ml system\" question with the same skeleton: clarify the problem, define the metric, sketch the data and features, pick a model, design serving, then monitoring — talking trade-offs throughout. structure beats cleverness. the steps 1. clarify the problem & requirements. don't design yet — ask. what exactly are we predicting? what's the scale (users, requests/sec)? latency budget (real-time or batch)? what does success mean in business terms? these answers reshape everything, and asking them is itself a signal of seniority. 2. frame it as an ml problem. translate the business goal into a concrete ml task: inputs, output, and the metric . \"recommend products\" → \"rank items by predicted click/purchase probability for this user,\" optimized offline for something like auc and online for click-through or revenue. 3. data & features. what data exists (user history, item metadata, context)? how is it collected and how fresh? what features would be predictive, and do you need a feature store for consistency and low-latency serving (section 2)? 4. model. start simple (a baseline — popularity, logistic regression), then justify complexity. name a reasonable choice and why , and mention the baseline you'd beat. simple- first is a maturity signal. 5. serving. batch or real-time (section 5)? for low-latency at scale, a common pattern is two-stage : a cheap candidate generation step narrows millions of items to hundreds, then an expensive ranking model orders those. discuss latency, scaling, caching. 6. monitoring & iteration. how do you know it works in production — online metric via a/b test (section 4), drift and quality monitoring (section 6), and a retraining plan. the two-stage pattern (worth memorizing) most large-scale ranking/recommendation/search systems use it, because scoring millions of items per request with a heavy model is impossible in real time: millions of items → candidate generation (cheap, fast, high recall) → ~hundreds → ranking (expensive, accurate model) → ordered top-n → user talk trade-offs out loud the whole point is judgment: batch (cheap, stale) vs online (fresh, costly); a bigger model (accurate, slow, expensive) vs a smaller one; more features (better, more pipeline risk). naming the trade-off and making a choice with a reason is what they're scoring. 🔗 connecting the dots — the real stack each layer of your answer maps to named tools, and dropping them in shows you've built, not just diagrammed: features → feast ; training → pytorch / xgboost on sagemaker/vertex/databricks ; tracking → mlflow ; candidate retrieval → a vector db / ann (faiss, scann); serving → triton / kserve ; monitoring → evidently + promet

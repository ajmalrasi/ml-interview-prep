nsorRT-Model-Optimizer<\/strong> and <strong>TensorRT-LLM<\/strong> for SmoothQuant/FP8/INT8 and KV-cache quant; <strong>lm-evaluation-harness<\/strong> for quality.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a VRAM-bound deployment I'd AWQ or GPTQ the weights to group-wise INT4 and quantize the KV cache to FP8; for a throughput-bound one on Hopper I'd go FP8 weight+activation via TensorRT-LLM. Either way I validate on perplexity plus the task benchmarks I actually care about, because 4-bit can pass perplexity and still lose reasoning.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Weight-only vs weight+activation — which bottleneck does each attack? *(weight-only →<\/li><\/ul>\n<p>memory/decode; weight+activation → compute/prefill, but needs outlier handling.)*<\/p>\n<ul><li>What problem do SmoothQuant and AWQ solve, and how differently? *(activation outliers;<\/li><\/ul>\n<p>SmoothQuant shifts difficulty into weights for W8A8, AWQ protects salient weight channels for   INT4.)*<\/p>\n<ul><li>What's group-wise quantization? *(a scale per group of N weights, e.g. 128 — finer than<\/li><\/ul>\n<p>per-channel, the accuracy knob for INT4.)*<\/p>\n<ul><li>Why quantize the KV cache, and what does it buy? *(it can exceed the weights at long context;<\/li><\/ul>\n<p>INT8/FP8 halves it → longer context / bigger batch.)*<\/p>\n<ul><li>QAT's practical replacement at LLM scale? <em>(QLoRA — LoRA adapters on a frozen 4-bit base.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"the-decision-that-frames-everything","text":"The decision that frames everything"},{"level":2,"id":"weight-only-methods-int4","text":"Weight-only methods (INT4)"},{"level":2,"id":"weight-activation-methods","text":"Weight + activation methods"},{"level":2,"id":"the-third-target-kv-cache-quantization","text":"The third target: KV-cache quantization"},{"level":2,"id":"ptq-vs-qat-for-llms","text":"PTQ vs QAT for LLMs"},{"level":2,"id":"measuring-quality-dont-say-accuracy","text":"Measuring quality (don't say \"accuracy\")"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"llm quantization 💡 tl;dr two families. weight-only (int4, keep activations fp16) shrinks memory and speeds up the memory-bound decode — gptq/awq. weight + activation (int8 or fp8) also speeds the compute-bound prefill but must tame activation outliers — smoothquant/fp8. plus a third target unique to llms: quantize the kv cache . pick by which bottleneck you're attacking. the decision that frames everything quantize weights only , or **weights and activations**? it maps straight to which phase hurts: weight-only (e.g. w4a16) weight + activation (w8a8 / fp8) what's quantized weights → int4, activations stay fp16 both → int8 or fp8 speeds up decode (less to load) + big memory cut prefill too (faster matmuls) main risk small quality loss activation outliers wreck accuracy methods gptq, awq , gguf k-quants, bnb nf4 smoothquant , fp8 calibration use when memory-bound / vram-limited / long decode throughput-bound / long prompts / batch one-liner: \"weight-only int4 if i'm memory- or vram-bound, which decode usually is; weight+activation int8/fp8 if prefill/throughput dominates and i can handle the outliers.\" weight-only methods (int4) gptq — layer-wise, second-order (hessian-based) rounding: quantize weights column by column, compensating remaining weights for the error. int4/int3 with small quality loss. awq (activation-aware weight quantization) — protect the ~1% of weight channels that matter most (identified by activation magnitude), scale them up before quantizing so int4 doesn't crush them. fast, no backprop, great quality/latency. group-wise quantization — the llm twist on per-channel: give every group of n weights (e.g. group size 128) its own scale. finer than per-channel, the accuracy knob behind int4. gguf \"k-quants\" (q4_k_m etc.) are group-wise mixes. nf4 (bitsandbytes) — a 4-bit \"normal float\" data type matched to the bell-curve distribution of weights; the base for qlora . weight + activation methods smoothquant — the outlier fix. migrate the \"difficulty\" from activations into weights by a per-channel scaling x·diag(s)⁻¹ and diag(s)·w , so both become smooth enough for int8. this is what makes w8a8 viable on llms. fp8 (e4m3) — on hopper/ada, often the sweet spot: near-fp16 quality, tensor-core speed, and it handles outliers better than int8 because floating point keeps dynamic range. calibrated per-tensor via transformer engine / tensorrt-llm. the third target: kv-cache quantization unique to llms — the kv cache can dwarf the weights at long context/large batch. store it in int8 or fp8 to roughly halve it, which directly buys longer context or bigger batches . usually low-risk (keys can be more sensitive than values; some setups keep keys higher-precision). always worth mentioning as a lever your cnn never had. ptq vs qat for llms ptq dominates — all the methods above are post-training; they need only a small calibration set (a few hundred sequences). cheap, no gradients. full qat is rare — too expensive at llm scale. the practical stand-in is qlora : freeze a 4-bit (nf4) base, train small lora adapters in higher precision on top. you get qat-like task recovery for a tiny fraction of the cost — and you can serve the base once and hot-swap adapters. distillation is bigger than in cv — small strong models are often distilled from large ones, then quantized. measuring quality (don't say \"accuracy\") perplexity on held-out text (e.g. wikitext) — cheap, sensitive first check. downstream benchmarks — mmlu (knowledge), gsm8k (reasoning), humaneval (code), etc., via lm-evaluation-harness . a 4-bit model can hold perplexity but drop on reasoning, so test the tasks you care about. watch long-context and reasoning — these degrade first under aggressive quantization. 🔗 connecting the dots: the real stack autogptq , autoawq , llama.cpp/gguf (k-quants, cpu/edge), bitsandbytes (nf4/8-bit, qlora) for weight-only; nvidia tensorrt-model-optimizer and tensorrt-llm for smoothquant/fp8/int8 and kv-cache quant; lm-evaluation-harness for quality. how you'd say it: \"for a vram-bound deployment i'd awq or gptq the weights to group-wise int4 and quantize the kv cache to fp8; for a throughput-bound one on hopper i'd go fp8 weight+activation via tensorrt-llm. either way i validate on perplexity plus the task benchmarks i actually care about, because 4-bit can pass perplexity and still lose reasoning.\" self-check weight-only vs weight+activation — which bottleneck does each attack? *(weight-only → memory/decode; weight+activation → compute/prefill, but needs outlier handling.)* what problem do smoothquant and awq solve, and how differently? *(activation outliers; smoothquant shifts difficulty into weights for w8a8, awq protects salient weight channels for int4.)* what's group-wise quantization? *(a scale per group of n weights, e.g. 128 — finer than per-channel, the accuracy knob for int4.)* why quantize the kv cache, and what does it buy? *(it can exceed the weights at long context; int8/fp8 halves it → longer context / bigger batch.)* qat's practical replacement at llm scale? (qlora — lora adapters on a frozen 4-bit base.)","words":776},{"path":"13-llm-vlm-optimization/llm-opt-in-practice.md","title":"The Loop in Practice","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"the-loop-in-practice\">The Loop in Practice<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The same pipeline shape as your notebook — baseline → quantize → serve → compare — but with LLM tools and LLM metrics. Baseline FP16, then produce INT4 (AWQ/GPTQ), FP8, and KV-quant variants, serve each on TensorRT-LLM / vLLM / llama.cpp, and compare on <strong>quality (perplexity + benchmarks)<\/strong>, <strong>TTFT<\/strong>, <strong>tokens/sec<\/strong>, and <strong>VRAM<\/strong>. This page is the concrete recipe.<\/div><\/div>\n<h2 id=\"the-pipeline-side-by-side-with-your-cnn-project\">The pipeline, side by side with your CNN project<\/h2>\n<div class=\"diagram\">\n  <table class=\"maptable\">\n    <thead><tr><th>Your CNN notebook<\/th><th class=\"marw\"><\/th><th>LLM version<\/th><\/tr><\/thead>\n    <tbody>\n      <tr><td class=\"mfrom\">train FP32<\/td><td class=\"marw\"><\/td><td class=\"mto\">start from a pretrained FP16 checkpoint (no training)<\/td><\/tr>\n      <tr><td class=\"mfrom\">PTQ / QAT (fbgemm)<\/td><td class=\"marw\"><\/td><td class=\"mto\">AWQ / GPTQ (weight-only) · SmoothQuant / FP8 (w+a)<\/td><\/tr>\n      <tr><td class=\"mfrom\">TensorRT INT8 / FP16<\/td><td class=\"marw\"><\/td><td class=\"mto\">TensorRT-LLM engine · vLLM · llama.cpp (GGUF)<\/td><\/tr>\n      <tr><td class=\"mfrom\">evaluate: top-1, latency<\/td><td class=\"marw\"><\/td><td class=\"mto\">evaluate: perplexity + MMLU, TTFT, tokens/sec, VRAM<\/td><\/tr>\n      <tr><td class=\"mfrom\">MLflow compare table<\/td><td class=\"marw\"><\/td><td class=\"mto\">same — track every variant<\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<p>You don't train — you take a released checkpoint and <strong>optimize<\/strong> it. That's the norm for LLMs and a fine thing to say.<\/p>\n<h2 id=\"step-1-baseline\">Step 1: baseline<\/h2>\n<p>Load the FP16 model, run your eval harness, record <strong>perplexity<\/strong>, a task benchmark or two, <strong>TTFT<\/strong> (time to first token = prefill latency), <strong>TPOT<\/strong> (time per output token = decode latency), <strong>throughput<\/strong> (tokens/sec at your batch size), and <strong>peak VRAM<\/strong>. This is your reference row — the equivalent of your FP32 baseline.<\/p>\n<h2 id=\"step-2-quantize-produce-the-variants\">Step 2: quantize (produce the variants)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Variant<\/th><th>Tool<\/th><th>One line<\/th><\/tr><\/thead><tbody><tr><td><strong>W4 INT4 (weight-only)<\/strong><\/td><td>AutoAWQ / AutoGPTQ<\/td><td>calibrate on a few hundred sequences → 4-bit weights<\/td><\/tr><tr><td><strong>GGUF Q4_K_M<\/strong><\/td><td>llama.cpp<\/td><td>group-wise k-quant; great for CPU/edge/local<\/td><\/tr><tr><td><strong>NF4 + QLoRA<\/strong><\/td><td>bitsandbytes + peft<\/td><td>4-bit base, train LoRA adapters if you need task recovery<\/td><\/tr><tr><td><strong>FP8 / W8A8<\/strong><\/td><td>TensorRT-Model-Optimizer<\/td><td>SmoothQuant/FP8 calibration for Hopper/Ada<\/td><\/tr><tr><td><strong>KV-cache INT8/FP8<\/strong><\/td><td>TensorRT-LLM / vLLM flag<\/td><td>halve the cache → longer ctx / bigger batch<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Each needs a small <strong>calibration set<\/strong> (representative prompts) — the LLM analog of your PTQ calibration batches.<\/p>\n<h2 id=\"step-3-serve-the-engine-axis\">Step 3: serve (the engine axis)<\/h2>\n<ul><li><strong>TensorRT-LLM<\/strong> — NVIDIA's LLM runtime: build an engine (fused kernels, FP8, in-flight<\/li><\/ul>\n<p>batching), serve via Triton. Best latency/throughput on NVIDIA GPUs. The direct heir to your   TensorRT step.<\/p>\n<ul><li><strong>vLLM<\/strong> — PagedAttention + continuous batching; easiest high-throughput serving, great<\/li><\/ul>\n<p>default for experiments.<\/p>\n<ul><li><strong>llama.cpp<\/strong> — GGUF models on CPU/edge/Apple Silicon; how you'd run locally.<\/li><li>Mechanics (KV cache, paged attention, in-flight batching, TP/PP) are in<\/li><\/ul>\n<p><a class=\"mdlink\" data-href=\"../12-nvidia-model-optimization/llm-inference.md\" href=\"#\">§12 LLM Inference<\/a> — cross-reference, don't   re-derive.<\/p>\n<h2 id=\"step-4-the-compare-table-what-to-actually-measure\">Step 4: the compare table (what to actually measure)<\/h2>\n<p>LLM latency is <strong>two numbers<\/strong>, so your table grows columns:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Variant<\/th><th>Perplexity ↓<\/th><th>MMLU ↑<\/th><th>TTFT (ms)<\/th><th>Tokens/s ↑<\/th><th>VRAM (GB) ↓<\/th><th>Engine<\/th><\/tr><\/thead><tbody><tr><td>FP16 baseline<\/td><td>ref<\/td><td>ref<\/td><td>ref<\/td><td>ref<\/td><td>ref<\/td><td>HF / vLLM<\/td><\/tr><tr><td>AWQ INT4<\/td><td>~=<\/td><td>~=<\/td><td>↓<\/td><td>↑ (decode)<\/td><td><strong>↓↓<\/strong><\/td><td>vLLM / TRT-LLM<\/td><\/tr><tr><td>FP8 (w+a)<\/td><td>~=<\/td><td>~=<\/td><td><strong>↓↓<\/strong><\/td><td>↑↑<\/td><td>↓<\/td><td>TRT-LLM<\/td><\/tr><tr><td>+ KV INT8<\/td><td>~=<\/td><td>~=<\/td><td>=<\/td><td>=<\/td><td>↓ (longer ctx)<\/td><td>TRT-LLM<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The instinct to voice: <strong>INT4 wins on memory and decode; FP8 wins on prefill/throughput; KV quant buys context length<\/strong> — and you <em>measure the quality cost of each<\/em>, exactly like your CNN compare table.<\/p>\n<h2 id=\"measuring-latency-correctly-llm-version\">Measuring latency correctly (LLM version)<\/h2>\n<p>Same async-GPU discipline as your CNN, plus LLM specifics: <strong>warm up<\/strong>, separate <strong>prefill (TTFT)<\/strong> from <strong>decode (TPOT)<\/strong>, sweep <strong>batch size and sequence length<\/strong> (throughput is meaningless without them), and report <strong>p50/p99<\/strong>. <code>trtllm-bench<\/code> / <code>genai-perf<\/code> (NVIDIA) or vLLM's benchmark scripts do this properly — the analog of your <code>benchmark_latency<\/code>.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Quantize: <strong>AutoAWQ / AutoGPTQ / bitsandbytes / llama.cpp / TensorRT-Model-Optimizer<\/strong>. Serve: <strong>TensorRT-LLM (+Triton) / vLLM / TGI / llama.cpp<\/strong>. Evaluate: <strong>lm-evaluation-harness<\/strong>, <strong>genai-perf / trtllm-bench<\/strong>. Track: <strong>MLflow / Weights &amp; Biases<\/strong>, same as your project.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I'd keep the exact structure of my CNN experiment — baseline, a few quantized variants, one compare table, everything tracked. The variants become AWQ-INT4, FP8, and KV-quant; the engine becomes TensorRT-LLM or vLLM; and the columns become perplexity, a task benchmark, TTFT, tokens/sec, and VRAM.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why is there no training step in the LLM loop? *(you optimize a released pretrained<\/li><\/ul>\n<p>checkpoint; PTQ/weight-only needs no retraining.)*<\/p>\n<ul><li>Why does an LLM report two latencies? *(prefill/TTFT is compute-bound; decode/TPOT is<\/li><\/ul>\n<p>memory-bound — different optimizations, measured separately.)*<\/p>\n<ul><li>Which variant would you pick to fit a big model in limited VRAM? *(weight-only INT4 (AWQ/GPTQ)<ul><li>KV-cache quant.)*<\/li><\/ul><\/li><li>What replaces <code>top-1<\/code> and <code>benchmark_latency<\/code> from your notebook? *(perplexity + task<\/li><\/ul>\n<p>benchmarks via lm-eval-harness; genai-perf/trtllm-bench for TTFT &amp; tokens/sec.)*<\/p>","toc":[{"level":2,"id":"the-pipeline-side-by-side-with-your-cnn-project","text":"The pipeline, side by side with your CNN project"},{"level":2,"id":"step-1-baseline","text":"Step 1: baseline"},{"level":2,"id":"step-2-quantize-produce-the-variants","text":"Step 2: quantize (produce the variants)"},{"level":2,"id":"step-3-serve-the-engine-axis","text":"Step 3: serve (the engine axis)"},{"level":2,"id":"step-4-the-compare-table-what-to-actually-measure","text":"Step 4: the compare table (what to actually measure)"},{"level":2,"id":"measuring-latency-correctly-llm-version","text":"Measuring latency correctly (LLM version)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"the loop in practice 💡 tl;dr the same pipeline shape as your notebook — baseline → quantize → serve → compare — but with llm tools and llm metrics. baseline fp16, then produce int4 (awq/gptq), fp8, and kv-quant variants, serve each on tensorrt-llm / vllm / llama.cpp, and compare on quality (perplexity + benchmarks) , ttft , tokens/sec , and vram . this page is the concrete recipe. the pipeline, side by side with your cnn project your cnn notebook llm version train fp32 start from a pretrained fp16 checkpoint (no training) ptq / qat (fbgemm) awq / gptq (weight-only) · smoothquant / fp8 (w+a) tensorrt int8 / fp16 tensorrt-llm engine · vllm · llama.cpp (gguf) evaluate: top-1, latency evaluate: perplexity + mmlu, ttft, tokens/sec, vram mlflow compare table same — track every variant you don't train — you take a released checkpoint and optimize it. that's the norm for llms and a fine thing to say. step 1: baseline load the fp16 model, run your eval harness, record perplexity , a task benchmark or two, ttft (time to first token = prefill latency), tpot (time per output token = decode latency), throughput (tokens/sec at your batch size), and peak vram . this is your reference row — the equivalent of your fp32 baseline. step 2: quantize (produce the variants) variant tool one line w4 int4 (weight-only) autoawq / autogptq calibrate on a few hundred sequences → 4-bit weights gguf q4_k_m llama.cpp group-wise k-quant; great for cpu/edge/local nf4 + qlora bitsandbytes + peft 4-bit base, train lora adapters if you need task recovery fp8 / w8a8 tensorrt-model-optimizer smoothquant/fp8 calibration for hopper/ada kv-cache int8/fp8 tensorrt-llm / vllm flag halve the cache → longer ctx / bigger batch each needs a small calibration set (representative prompts) — the llm analog of your ptq calibration batches. step 3: serve (the engine axis) tensorrt-llm — nvidia's llm runtime: build an engine (fused kernels, fp8, in-flight batching), serve via triton. best latency/throughput on nvidia gpus. the direct heir to your tensorrt step. vllm — pagedattention + continuous batching; easiest high-throughput serving, great default for experiments. llama.cpp — gguf models on cpu/edge/apple silicon; how you'd run locally. mechanics (kv cache, paged attention, in-flight batching, tp/pp) are in §12 llm inference — cross-reference, don't re-derive. step 4: the compare table (what to actually measure) llm latency is two numbers , so your table grows columns: variant perplexity ↓ mmlu ↑ ttft (ms) tokens/s ↑ vram (gb) ↓ engine fp16 baseline ref ref ref ref ref hf / vllm awq int4 ~= ~= ↓ ↑ (decode) ↓↓ vllm / trt-llm fp8 (w+a) ~= ~= ↓↓ ↑↑ ↓ trt-llm + kv int8 ~= ~= = = ↓ (longer ctx) trt-llm the instinct to voice: int4 wins on memory and decode; fp8 wins on prefill/throughput; kv quant buys context length — and you measure the quality cost of each , exactly like your cnn compare table. measuring latency correctly (llm version) same async-gpu discipline as your cnn, plus llm specifics: warm up , separate prefill (ttft) from decode (tpot) , sweep batch size and sequence length (throughput is meaningless without them), and report p50/p99 . trtllm-bench / genai-perf (nvidia) or vllm's benchmark scripts do this properly — the analog of your benchmark_latency . 🔗 connecting the dots: the real stack quantize: autoawq / autogptq / bitsandbytes / llama.cpp / tensorrt-model-optimizer . serve: tensorrt-llm (+triton) / vllm / tgi / llama.cpp . evaluate: lm-evaluation-harness , genai-perf / trtllm-bench . track: mlflow / weights & biases , same as your project. how you'd say it: \"i'd keep the exact structure of my cnn experiment — baseline, a few quantized variants, one compare table, everything tracked. the variants become awq-int4, fp8, and kv-quant; the engine becomes tensorrt-llm or vllm; and the columns become perplexity, a task benchmark, ttft, tokens/sec, and vram.\" self-check why is there no training step in the llm loop? *(you optimize a released pretrained checkpoint; ptq/weight-only needs no retraining.)* why does an llm report two latencies? *(prefill/ttft is compute-bound; decode/tpot is memory-bound — different optimizations, measured separately.)* which variant would you pick to fit a big model in limited vram? *(weight-only int4 (awq/gptq) kv-cache quant.)* what replaces top-1 and benchmark_latency from your notebook? *(perplexity + task benchmarks via lm-eval-harness; genai-perf/trtllm-bench for ttft & tokens/sec.)*","words":714},{"path":"13-llm-vlm-optimization/serving-architecture.md","title":"Serving Architecture (Internal Deployment)","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"serving-the-optimized-model-internal-deployment\">Serving the Optimized Model (Internal Deployment)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Optimizing the model is only half the job — <em>where the inference engine sits<\/em> is the other half. For an <strong>internal, intermittent<\/strong> workload (e.g. SEG-Y metadata extraction), never expose TensorRT-LLM directly: it's a <strong>GPU-backed microservice behind your application layer<\/strong>. The app does the domain work (parse, decode, auth, validate, build prompt); the engine only sees text. Then decide the runtime shape — <strong>always-on Deployment vs scale-to-zero vs batch Job vs serverless GPU<\/strong> — by one question: <em>can the request wait through a cold start?<\/em> If yes, scale to zero; if no, keep one warm replica. This page is the deployment counterpart to <a class=\"mdlink\" data-href=\"llm-opt-in-practice.md\" href=\"#\">The Loop in Practice<\/a>.<\/div><\/div>\n<h2 id=\"the-layering-the-engine-is-not-your-application\">The layering: the engine is not your application<\/h2>\n<p>TensorRT-LLM (or Triton / vLLM) <strong>only performs inference<\/strong>. It knows nothing about SEG-Y, EBCDIC, auth, business rules, logging, validation, or database writes. Those live in the app layer. Keep them separate so each side scales, secures, and evolves independently.<\/p>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <div class=\"flow\">\n      <span class=\"node data\">SEG-Y file<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">App / Parser Service<span class=\"nsub\">FastAPI · EBCDIC · headers · prompt · auth<\/span><\/span>\n      <span class=\"arw labeled\"><span class=\"al\">internal HTTP/gRPC<\/span><\/span>\n      <span class=\"node out\">TRT-LLM Service<span class=\"nsub\">text in → JSON out<\/span><\/span>\n    <\/div>\n  <\/div>\n  <div class=\"flow-foot\"><b>The engine sees only text.<\/b> It never opens a SEG-Y file. Everything domain-specific stays in the application layer.<\/div>\n<\/div>\n<p><strong>Why the split matters:<\/strong> one GPU inference server can be shared by many internal services (Service A/B/C all POST to it). TensorRT-LLM handles batching, scheduling, KV cache, and GPU utilization — your app never manages any of that.<\/p>\n<h2 id=\"keep-it-internal-no-public-endpoint\">Keep it internal: no public endpoint<\/h2>\n<p>Since usage is internal-only, nothing is exposed to the internet. In Kubernetes the parser simply calls a <strong>ClusterIP<\/strong> service, e.g. <code>http://trtllm-service:8000/v1/chat/completions<\/code>. Lock it down with:<\/p>\n<ul><li><strong>NetworkPolicies<\/strong> — only the parser namespace can reach the engine<\/li><li><strong>Internal load balancer<\/strong> (never an external LB / public IP)<\/li><li><strong>Service mesh<\/strong> (Istio / Linkerd) with <strong>mTLS<\/strong> between services<\/li><li><strong>IAM / service accounts<\/strong> for identity<\/li><\/ul>\n<h2 id=\"the-runtime-shape-decision\">The runtime-shape decision<\/h2>\n<p>The trap: an idle inference pod still costs you the <strong>GPU node<\/strong>. So the real question isn't \"Kubernetes vs serverless\" — it's <em>how long can the caller wait?<\/em><\/p>\n<div class=\"diagram\">\n  <table class=\"maptable\">\n    <thead><tr><th>Option<\/th><th class=\"marw\"><\/th><th>Use when · trade-off<\/th><\/tr><\/thead>\n    <tbody>\n      <tr><td class=\"mfrom\">Always-on <b>Deployment<\/b><br>minReplicas 1<\/td><td class=\"marw\"><\/td><td class=\"mto\">continuous/unpredictable requests, low latency, shared by teams — <b>no cold start<\/b>, but GPU burns money while idle<\/td><\/tr>\n      <tr><td class=\"mfrom\">Scale-to-zero <b>Deployment<\/b><br>KEDA, minReplicas 0<\/td><td class=\"marw\"><\/td><td class=\"mto\">work can wait; KEDA scales 0→1 on queue depth — <b>cheap<\/b>, but pays a <b>cold start<\/b><\/td><\/tr>\n      <tr><td class=\"mfrom\">Batch <b>Job<\/b> / CronJob<\/td><td class=\"marw\"><\/td><td class=\"mto\">event-driven, asynchronous ingestion — load engine once, drain the queue, exit. <b>Best fit for SEG-Y.<\/b><\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>Serverless GPU<\/b><br>Cloud Run GPU<\/td><td class=\"marw\"><\/td><td class=\"mto\">very low/unpredictable usage, minimal infra to manage — scales to zero, but cold starts + GPU/region/duration limits<\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<p>Do <strong>not<\/strong> use a naked Pod (no lifecycle management). Deployment = persistent service; Job = one batch; CronJob = scheduled batch.<\/p>\n<h2 id=\"the-scale-to-zero-gotcha-pod-node\">The scale-to-zero gotcha: pod ≠ node<\/h2>\n<p>Scaling the <strong>pod<\/strong> to zero is not enough. If the GPU <strong>VM<\/strong> stays up, you keep paying.<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node soft\">GPU pod = 0<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">but<\/span><\/span>\n    <span class=\"node data\">GPU node still running<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">= <\/span><\/span>\n    <span class=\"node out\">still billed<\/span>\n  <\/div>\n  <div class=\"flow-foot\">For real savings <b>both<\/b> must scale to zero: inference pods <b>and<\/b> the GPU node pool (cluster autoscaler must be allowed to remove the empty GPU node, min size 0).<\/div>\n<\/div>\n<h2 id=\"recommended-architecture-for-the-seg-y-case\">Recommended architecture for the SEG-Y case<\/h2>\n<p>SEG-Y ingestion is naturally <strong>event-driven, asynchronous, and internal<\/strong> — a batch worker beats a permanently running REST server.<\/p>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <div class=\"flow\">\n      <span class=\"node data\">SEG-Y upload<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">Ingestion DAG<span class=\"nsub\">extract EBCDIC + headers + stats<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node soft\">Pub/Sub · SQS · Kafka<span class=\"nsub\">compact request<\/span><\/span>\n    <\/div>\n    <div class=\"flow\">\n      <span class=\"node\">KEDA<span class=\"nsub\">watches queue depth<\/span><\/span>\n      <span class=\"arw labeled\"><span class=\"al\">0 → 1<\/span><\/span>\n      <span class=\"node\">GPU worker / Job<span class=\"nsub\">loads AWQ engine once<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">TRT-LLM<span class=\"nsub\">batched extraction<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node out\">JSON → Postgres/GCS<\/span>\n    <\/div>\n    <div class=\"flow\">\n      <span class=\"node data\">queue drains<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node soft\">worker exits · GPU node → 0<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"flow-foot\">No public endpoint · no idle GPU · good batch utilization · internal security · predictable retries.<\/div>\n<\/div>\n<p><strong>The one efficiency rule:<\/strong> load the model <strong>once<\/strong> per run, then process 100–1,000 headers. <em>Never<\/em> start one GPU Job per file — you'd re-pay the model-load cost every time.<\/p>\n<div class=\"diagram\">\n  <table class=\"maptable\">\n    <thead><tr><th>❌ one Job per file<\/th><th class=\"marw\"><\/th><th>✅ one Job per batch<\/th><\/tr><\/thead>\n    <tbody>\n      <tr><td class=\"mfrom\">load → infer 1 → exit &nbsp;(×N)<\/td><td class=\"marw\"><\/td><td class=\"mto\">load once → infer 100–1,000 → exit<\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<h2 id=\"cold-start-what-you-actually-pay-for\">Cold start: what you actually pay for<\/h2>\n<p>When scaling from zero, the first request eats: GPU <strong>node provisioning<\/strong> → container <strong>image pull<\/strong> → <strong>TensorRT engine<\/strong> download → <strong>CUDA init<\/strong> → engine <strong>deserialization<\/strong> → <strong>KV-cache<\/strong> allocation. That can be substantial (especially a fresh GPU VM), which is exactly why scale-to-zero suits <em>batchable<\/em> work and why a <strong>hybrid<\/strong> (warm during business hours / active ingestion, scale down after 15–30 min idle) is often the pragmatic middle ground.<\/p>\n<h2 id=\"qat-recap-when-ptq-isnt-enough\">QAT recap (when PTQ isn't enough)<\/h2>\n<p>The conversation also revisited <strong>QAT for LLMs<\/strong> — supported, but far more expensive than PTQ, so reserved for when PTQ's accuracy loss is unacceptable. Full treatment lives in <a class=\"mdlink\" data-href=\"llm-quantization.md\" href=\"#\">LLM Quantization<\/a>; the one-liner:<\/p>\n<blockquote><p>Weights stay FP16/BF16 during training, but <strong>fake quantization<\/strong> is inserted into the forward pass so the model <em>learns to compensate<\/em> for INT4/INT8 noise. Most teams try <strong>AWQ (PTQ)<\/strong> first — excellent accuracy/speed for far less effort — and only reach for QAT if, say, a 97%→93% drop is unacceptable.<\/p><\/blockquote>\n<h2 id=\"how-youd-say-it\">🔗 How you'd say it<\/h2>\n<p><em>\"Since the LLM is only used internally, I wouldn't expose TensorRT-LLM publicly. I'd run it as a GPU-backed inference microservice behind our application layer — the app handles SEG-Y parsing, EBCDIC decoding, auth, validation, and prompt construction, then makes an internal gRPC/HTTP call. Because ingestion is event-driven and intermittent, I'd drive a KEDA-scaled GPU worker off a queue, batch many headers per model load, and scale both the pod and the GPU node pool to zero when the queue drains. If callers needed instant answers I'd instead keep one warm replica — the decision comes down to whether the request can tolerate a cold start.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why not let the parser call TensorRT-LLM's file logic directly? *(the engine only does<\/li><\/ul>\n<p>inference — it sees text, never a SEG-Y file; domain logic stays in the app layer.)*<\/p>\n<ul><li>Pod scaled to zero but still billed — why? *(the GPU <strong>node<\/strong> is still running; the node pool<\/li><\/ul>\n<p>must also scale to zero.)*<\/p>\n<ul><li>Why one Job per batch, not per file? *(model-load cost is paid once per run; per-file Jobs<\/li><\/ul>\n<p>re-pay it every time.)*<\/p>\n<ul><li>When would you keep an always-warm replica instead of scaling to zero? *(when requests are<\/li><\/ul>\n<p>interactive/frequent and can't tolerate cold-start latency.)*<\/p>\n<ul><li>Deployment vs Job vs serverless — the deciding question? *(can the request wait through a cold<\/li><\/ul>\n<p>start?)*<\/p>","toc":[{"level":2,"id":"the-layering-the-engine-is-not-your-application","text":"The layering: the engine is not your application"},{"level":2,"id":"keep-it-internal-no-public-endpoint","text":"Keep it internal: no public endpoint"},{"level":2,"id":"the-runtime-shape-decision","text":"The runtime-shape decision"},{"level":2,"id":"the-scale-to-zero-gotcha-pod-node","text":"The scale-to-zero gotcha: pod ≠ node"},{"level":2,"id":"recommended-architecture-for-the-seg-y-case","text":"Recommended architecture for the SEG-Y case"},{"level":2,"id":"cold-start-what-you-actually-pay-for","text":"Cold start: what you actually pay for"},{"level":2,"id":"qat-recap-when-ptq-isnt-enough","text":"QAT recap (when PTQ isn't enough)"},{"level":2,"id":"how-youd-say-it","text":"🔗 How you'd say it"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"serving the optimized model (internal deployment) 💡 tl;dr optimizing the model is only half the job — where the inference engine sits is the other half. for an internal, intermittent workload (e.g. seg-y metadata extraction), never expose tensorrt-llm directly: it's a gpu-backed microservice behind your application layer . the app does the domain work (parse, decode, auth, validate, build prompt); the engine only sees text. then decide the runtime shape — always-on deployment vs scale-to-zero vs batch job vs serverless gpu — by one question: can the request wait through a cold start? if yes, scale to zero; if no, keep one warm replica. this page is the deployment counterpart to the loop in practice . the layering: the engine is not your application tensorrt-llm (or triton / vllm) only performs inference . it knows nothing about seg-y, ebcdic, auth, business rules, logging, validation, or database writes. those live in the app layer. keep them separate so each side scales, secures, and evolves independently. seg-y file app / parser service fastapi · ebcdic · headers · prompt · auth internal http/grpc trt-llm service text in → json out the engine sees only text. it never opens a seg-y file. everything domain-specific stays in the application layer. why the split matters: one gpu inference server can be shared by many internal services (service a/b/c all post to it). tensorrt-llm handles batching, scheduling, kv cache, and gpu utilization — your app never manages any of that. keep it internal: no public endpoint since usage is internal-only, nothing is exposed to the internet. in kubernetes the parser simply calls a clusterip service, e.g. http://trtllm-service:8000/v1/chat/completions . lock it down with: networkpolicies — only the parser namespace can reach the engine internal load balancer (never an external lb / public ip) service mesh (istio / linkerd) with mtls between services iam / service accounts for identity the runtime-shape decision the trap: an idle inference pod still costs you the gpu node . so the real question isn't \"kubernetes vs serverless\" — it's how long can the caller wait? option use when · trade-off always-on deployment minreplicas 1 continuous/unpredictable requests, low latency, shared by teams — no cold start , but gpu burns money while idle scale-to-zero deployment keda, minreplicas 0 work can wait; keda scales 0→1 on queue depth — cheap , but pays a cold start batch job / cronjob event-driven, asynchronous ingestion — load engine once, drain the queue, exit. best fit for seg-y. serverless gpu cloud run gpu very low/unpredictable usage, minimal infra to manage — scales to zero, but cold starts + gpu/region/duration limits do not use a naked pod (no lifecycle management). deployment = persistent service; job = one batch; cronjob = scheduled batch. the scale-to-zero gotcha: pod ≠ node scaling the pod to zero is not enough. if the gpu vm stays up, you keep paying. gpu pod = 0 but gpu node still running = still billed for real savings both must scale to zero: inference pods and the gpu node pool (cluster autoscaler must be allowed to remove the empty gpu node, min size 0). recommended architecture for the seg-y case seg-y ingestion is naturally event-driven, asynchronous, and internal — a batch worker beats a permanently running rest server. seg-y upload ingestion dag extract ebcdic + headers + stats pub/sub · sqs · kafka compact request keda watches queue depth 0 → 1 gpu worker / job loads awq engine once trt-llm batched extraction json → postgres/gcs queue drains worker exits · gpu node → 0 no public endpoint · no idle gpu · good batch utilization · internal security · predictable retries. the one efficiency rule: load the model once per run, then process 100–1,000 headers. never start one gpu job per file — you'd re-pay the model-load cost every time. ❌ one job per file ✅ one job per batch load → infer 1 → exit &nbsp;(×n) load once → infer 100–1,000 → exit cold start: what you actually pay for when scaling from zero, the first request eats: gpu node provisioning → container image pull → tensorrt engine download → cuda init → engine deserialization → kv-cache allocation. that can be substantial (especially a fresh gpu vm), which is exactly why scale-to-zero suits batchable work and why a hybrid (warm during business hours / active ingestion, scale down after 15–30 min idle) is often the pragmatic middle ground. qat recap (when ptq isn't enough) the conversation also revisited qat for llms — supported, but far more expensive than ptq, so reserved for when ptq's accuracy loss is unacceptable. full treatment lives in llm quantization ; the one-liner: weights stay fp16/bf16 during training, but fake quantization is inserted into the forward pass so the model learns to compensate for int4/int8 noise. most teams try awq (ptq) first — excellent accuracy/speed for far less effort — and only reach for qat if, say, a 97%→93% drop is unacceptable. 🔗 how you'd say it \"since the llm is only used internally, i wouldn't expose tensorrt-llm publicly. i'd run it as a gpu-backed inference microservice behind our application layer — the app handles seg-y parsing, ebcdic decoding, auth, validation, and prompt construction, then makes an internal grpc/http call. because ingestion is event-driven and intermittent, i'd drive a keda-scaled gpu worker off a queue, batch many headers per model load, and scale both the pod and the gpu node pool to zero when the queue drains. if callers needed instant answers i'd instead keep one warm replica — the decision comes down to whether the request can tolerate a cold start.\" self-check why not let the parser call tensorrt-llm's file logic directly? *(the engine only does inference — it sees text, never a seg-y file; domain logic stays in the app layer.)* pod scaled to zero but still billed — why? *(the gpu node is still running; the node pool must also scale to zero.)* why one job per batch, not per file? *(model-load cost is paid once per run; per-file jobs re-pay it every time.)* when would you keep an always-warm replica instead of scaling to zero? *(when requests are interactive/frequent and can't tolerate cold-start latency.)* deployment vs job vs serverless — the deciding question? *(can the request wait through a cold start?)*","words":1045},{"path":"13-llm-vlm-optimization/vlm-optimization.md","title":"VLM Optimization","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"vlm-optimization\">VLM Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A vision-language model is <strong>a vision encoder + a projector + an LLM decoder<\/strong> — so optimizing it is <em>your CNN skills for the vision tower<\/em> plus <em>LLM tricks for the decoder<\/em>. The VLM-specific catch: images turn into <strong>hundreds to thousands of tokens<\/strong>, so <strong>prefill and the KV cache blow up<\/strong>, and the single biggest lever is <strong>reducing visual tokens<\/strong>. This is your strongest bridge page — it uses both halves of your experience.<\/div><\/div>\n<h2 id=\"the-architecture-know-the-three-stages\">The architecture (know the three stages)<\/h2>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <div class=\"flow\">\n      <span class=\"node data\">image<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">Vision Encoder<span class=\"nsub\">ViT / CLIP<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">Projector<span class=\"nsub\">MLP / resampler<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node soft\">image tokens<span class=\"nsub\">100s–1000s<\/span><\/span>\n    <\/div>\n    <div class=\"flow\">\n      <span class=\"node data\">text<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node soft\">text tokens<\/span>\n    <\/div>\n    <span class=\"varw\" title=\"both token streams feed the decoder\"><\/span>\n    <div class=\"flow\">\n      <span class=\"node\">LLM Decoder<span class=\"nsub\">attends over image + text tokens<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node out\">text<\/span>\n    <\/div>\n  <\/div>\n  <div class=\"diagram-cap\">Image and text both become tokens the decoder attends over — image tokens dominate the count.<\/div>\n<\/div>\n<ul><li><strong>Vision encoder<\/strong> — a <strong>ViT (or CNN)<\/strong> that turns the image into patch embeddings. Runs<\/li><\/ul>\n<p><strong>once per image<\/strong>. <em>This is exactly the kind of model you already optimized.<\/em><\/p>\n<ul><li><strong>Projector<\/strong> — a small MLP or resampler mapping vision features into the LLM's token space.<\/li><\/ul>\n<p>Tiny; negligible cost.<\/p>\n<ul><li><strong>LLM decoder<\/strong> — a standard LLM that attends over image + text tokens and generates. **All<\/li><\/ul>\n<p>of <a class=\"mdlink\" data-href=\"llm-quantization.md\" href=\"#\">§13's LLM pages<\/a> apply here.**<\/p>\n<p>Examples: LLaVA, Qwen-VL, InternVL, Llama-Vision. Same shape, different sizes.<\/p>\n<h2 id=\"where-the-cost-actually-is-the-key-insight\">Where the cost actually is (the key insight)<\/h2>\n<p><strong>Images become a lot of tokens.<\/strong> One image can be ~256–576 tokens, and <strong>high-resolution tiling<\/strong> (splitting a big image into tiles) pushes it into the <strong>thousands<\/strong>. Because those tokens all go into the decoder's prefill and KV cache:<\/p>\n<ul><li><strong>Prefill dominates<\/strong> — TTFT is driven by processing a huge image-token sequence, not by the<\/li><\/ul>\n<p>short text prompt. VLMs are often <strong>prefill-heavy<\/strong>, unlike text LLMs.<\/p>\n<ul><li><strong>KV cache is large<\/strong> — proportional to those image tokens, so long conversations with images<\/li><\/ul>\n<p>get memory-hungry fast.<\/p>\n<ul><li><strong>Vision encoder is a one-time cost<\/strong> per image — meaningful but not the tail if you generate<\/li><\/ul>\n<p>many tokens.<\/p>\n<p>So the cost profile is different from a text LLM: <strong>attack the image tokens first.<\/strong><\/p>\n<h2 id=\"optimize-each-stage\">Optimize each stage<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Lever<\/th><th>Notes<\/th><\/tr><\/thead><tbody><tr><td><strong>Vision encoder<\/strong><\/td><td>INT8/FP8 quantize it<\/td><td>It's a ViT/CNN — <em>your FashionMNIST playbook<\/em>: PTQ, per-channel, calibrate, TensorRT. Runs once/image.<\/td><\/tr><tr><td><strong>Visual tokens<\/strong><\/td><td><strong>token reduction<\/strong> (pooling, pruning, merging)<\/td><td><strong>The VLM-specific big win<\/strong> — fewer image tokens = shorter prefill + smaller KV.<\/td><\/tr><tr><td><strong>Projector<\/strong><\/td><td>ignore<\/td><td>Too small to matter.<\/td><\/tr><tr><td><strong>LLM decoder<\/strong><\/td><td>weight-only INT4 / FP8 / KV-quant<\/td><td>Same as any LLM (<a class=\"mdlink\" data-href=\"llm-quantization.md\" href=\"#\">quant page<\/a>).<\/td><\/tr><tr><td><strong>Whole pipeline<\/strong><\/td><td>cache image features<\/td><td>Same image reused across turns → encode once, reuse tokens.<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"visual-token-reduction-say-this-one\">Visual token reduction (say this one)<\/h2>\n<p>The highest-leverage VLM-only optimization: <strong>cut the number of image tokens<\/strong> before/at the decoder.<\/p>\n<p>Methods:<\/p>\n<ul><li><strong>Pooling<\/strong> — adaptive pooling of patch embeddings.<\/li><li><strong>Pruning<\/strong> — drop low-attention visual tokens.<\/li><li><strong>Merging<\/strong> — combine similar tokens (à la ToMe).<\/li><li><strong>Resampler<\/strong> — a Q-Former / Perceiver that compresses to a fixed small count.<\/li><\/ul>\n<p>Halving image tokens roughly halves <strong>prefill cost and KV memory<\/strong> with modest quality loss. <em>\"On a VLM, before I quantize anything I'd check whether I can halve the visual tokens — it hits the actual bottleneck, prefill and KV, harder than quantizing the decoder.\"<\/em><\/p>\n<h2 id=\"whats-different-from-a-plain-llm\">What's different from a plain LLM<\/h2>\n<ul><li><strong>Prefill-heavy, not decode-heavy<\/strong> for short answers → optimize prefill (token reduction,<\/li><\/ul>\n<p>FP8 weight+activation), not just decode.<\/p>\n<ul><li><strong>Vision tower is quantizable with CV methods<\/strong> — the part where *your CNN experience is<\/li><\/ul>\n<p>directly the answer*.<\/p>\n<ul><li><strong>Dynamic resolution / tiling<\/strong> → variable, often large, token counts → dynamic-shape engines<\/li><\/ul>\n<p>matter even more.<\/p>\n<ul><li><strong>Two calibration domains<\/strong> — the vision encoder wants image calibration data; the decoder<\/li><\/ul>\n<p>wants text/multimodal calibration.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Vision tower: <strong>TensorRT<\/strong> INT8/FP8 (your CV toolchain). Decoder: <strong>TensorRT-LLM / vLLM<\/strong> with AWQ/FP8 + KV-quant. Multimodal serving increasingly handled by <strong>vLLM<\/strong> and <strong>TensorRT-LLM<\/strong>'s multimodal paths; token reduction lives in the model/adapter code.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"A VLM is a vision encoder feeding an LLM decoder. The encoder I'd quantize like the CNN in my FashionMNIST project — INT8, per-channel, TensorRT. The decoder I'd treat as an LLM — AWQ INT4 or FP8 with KV-cache quant. But the first thing I'd check is visual token reduction, because image tokens drive prefill and KV, which is where VLM latency actually lives.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What are a VLM's three stages and which dominates latency? *(vision encoder → projector → LLM<\/li><\/ul>\n<p>decoder; image tokens make <strong>prefill<\/strong> (and KV) dominate.)*<\/p>\n<ul><li>Which part maps directly to your CNN experience? *(the vision encoder — a ViT/CNN you quantize<\/li><\/ul>\n<p>with the same PTQ/TensorRT playbook.)*<\/p>\n<ul><li>What's the VLM-specific optimization with no LLM/CNN analog? *(visual token reduction —<\/li><\/ul>\n<p>pool/prune/merge image tokens to shrink prefill + KV.)*<\/p>\n<ul><li>Why are VLMs often prefill-heavy? *(one image = hundreds–thousands of tokens processed up<\/li><\/ul>\n<p>front, dwarfing a short text prompt and a short answer.)*<\/p>","toc":[{"level":2,"id":"the-architecture-know-the-three-stages","text":"The architecture (know the three stages)"},{"level":2,"id":"where-the-cost-actually-is-the-key-insight","text":"Where the cost actually is (the key insight)"},{"level":2,"id":"optimize-each-stage","text":"Optimize each stage"},{"level":2,"id":"visual-token-reduction-say-this-one","text":"Visual token reduction (say this one)"},{"level":2,"id":"whats-different-from-a-plain-llm","text":"What's different from a plain LLM"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"vlm optimization 💡 tl;dr a vision-language model is a vision encoder + a projector + an llm decoder — so optimizing it is your cnn skills for the vision tower plus llm tricks for the decoder . the vlm-specific catch: images turn into hundreds to thousands of tokens , so prefill and the kv cache blow up , and the single biggest lever is reducing visual tokens . this is your strongest bridge page — it uses both halves of your experience. the architecture (know the three stages) image vision encoder vit / clip projector mlp / resampler image tokens 100s–1000s text text tokens llm decoder attends over image + text tokens text image and text both become tokens the decoder attends over — image tokens dominate the count. vision encoder — a vit (or cnn) that turns the image into patch embeddings. runs once per image . this is exactly the kind of model you already optimized. projector — a small mlp or resampler mapping vision features into the llm's token space. tiny; negligible cost. llm decoder — a standard llm that attends over image + text tokens and generates. **all of §13's llm pages apply here.** examples: llava, qwen-vl, internvl, llama-vision. same shape, different sizes. where the cost actually is (the key insight) images become a lot of tokens. one image can be ~256–576 tokens, and high-resolution tiling (splitting a big image into tiles) pushes it into the thousands . because those tokens all go into the decoder's prefill and kv cache: prefill dominates — ttft is driven by processing a huge image-token sequence, not by the short text prompt. vlms are often prefill-heavy , unlike text llms. kv cache is large — proportional to those image tokens, so long conversations with images get memory-hungry fast. vision encoder is a one-time cost per image — meaningful but not the tail if you generate many tokens. so the cost profile is different from a text llm: attack the image tokens first. optimize each stage stage lever notes vision encoder int8/fp8 quantize it it's a vit/cnn — your fashionmnist playbook : ptq, per-channel, calibrate, tensorrt. runs once/image. visual tokens token reduction (pooling, pruning, merging) the vlm-specific big win — fewer image tokens = shorter prefill + smaller kv. projector ignore too small to matter. llm decoder weight-only int4 / fp8 / kv-quant same as any llm ( quant page ). whole pipeline cache image features same image reused across turns → encode once, reuse tokens. visual token reduction (say this one) the highest-leverage vlm-only optimization: cut the number of image tokens before/at the decoder. methods: pooling — adaptive pooling of patch embeddings. pruning — drop low-attention visual tokens. merging — combine similar tokens (à la tome). resampler — a q-former / perceiver that compresses to a fixed small count. halving image tokens roughly halves prefill cost and kv memory with modest quality loss. \"on a vlm, before i quantize anything i'd check whether i can halve the visual tokens — it hits the actual bottleneck, prefill and kv, harder than quantizing the decoder.\" what's different from a plain llm prefill-heavy, not decode-heavy for short answers → optimize prefill (token reduction, fp8 weight+activation), not just decode. vision tower is quantizable with cv methods — the part where *your cnn experience is directly the answer*. dynamic resolution / tiling → variable, often large, token counts → dynamic-shape engines matter even more. two calibration domains — the vision encoder wants image calibration data; the decoder wants text/multimodal calibration. 🔗 connecting the dots: the real stack vision tower: tensorrt int8/fp8 (your cv toolchain). decoder: tensorrt-llm / vllm with awq/fp8 + kv-quant. multimodal serving increasingly handled by vllm and tensorrt-llm 's multimodal paths; token reduction lives in the model/adapter code. how you'd say it: \"a vlm is a vision encoder feeding an llm decoder. the encoder i'd quantize like the cnn in my fashionmnist project — int8, per-channel, tensorrt. the decoder i'd treat as an llm — awq int4 or fp8 with kv-cache quant. but the first thing i'd check is visual token reduction, because image tokens drive prefill and kv, which is where vlm latency actually lives.\" self-check what are a vlm's three stages and which dominates latency? *(vision encoder → projector → llm decoder; image tokens make prefill (and kv) dominate.)* which part maps directly to your cnn experience? *(the vision encoder — a vit/cnn you quantize with the same ptq/tensorrt playbook.)* what's the vlm-specific optimization with no llm/cnn analog? *(visual token reduction — pool/prune/merge image tokens to shrink prefill + kv.)* why are vlms often prefill-heavy? *(one image = hundreds–thousands of tokens processed up front, dwarfing a short text prompt and a short answer.)*","words":782},{"path":"13-llm-vlm-optimization/experiment-redo.md","title":"Experiment Redo (Your Project as LLM/VLM)","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"experiment-redo-your-project-as-an-llmvlm\">Experiment Redo: Your Project as an LLM/VLM<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Take the exact structure of your FashionMNIST notebook and re-cast it for an LLM, then a VLM. Same skeleton — baseline, quantized variants, one compare table, everything tracked — with LLM metrics and tools swapped in. This is the \"walk me through how you'd apply your project to <em>our<\/em> models\" answer.<\/div><\/div>\n<h2 id=\"the-one-sentence-pitch\">The one-sentence pitch<\/h2>\n<blockquote><p>\"My project proved I can run the full optimization loop and reason about method vs engine on a CNN. The same loop applies to an LLM — I'd swap PTQ/QAT for AWQ-INT4 and FP8, TensorRT for TensorRT-LLM, and top-1 for perplexity and tokens/sec — and a VLM is just my CNN skills on the vision tower plus that LLM loop on the decoder.\"<\/p><\/blockquote>\n<h2 id=\"llm-redo-the-compare-table\">LLM redo: the compare table<\/h2>\n<p>Keep your six-row idea; change the axes. Baseline FP16, then walk method × engine:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Variant<\/th><th>Method<\/th><th>Engine<\/th><th>Quality (PPL / MMLU)<\/th><th>TTFT<\/th><th>Tokens/s<\/th><th>VRAM<\/th><\/tr><\/thead><tbody><tr><td>FP16<\/td><td>—<\/td><td>vLLM<\/td><td>reference<\/td><td>ref<\/td><td>ref<\/td><td>ref<\/td><\/tr><tr><td><strong>AWQ INT4<\/strong><\/td><td>weight-only PTQ<\/td><td>vLLM / TRT-LLM<\/td><td>≈ baseline<\/td><td>↓<\/td><td>↑ decode<\/td><td><strong>↓↓<\/strong><\/td><\/tr><tr><td><strong>GPTQ INT4<\/strong><\/td><td>weight-only PTQ<\/td><td>TRT-LLM<\/td><td>≈ baseline<\/td><td>↓<\/td><td>↑<\/td><td>↓↓<\/td><\/tr><tr><td><strong>FP8 (W+A)<\/strong><\/td><td>calibrated PTQ<\/td><td>TRT-LLM<\/td><td>≈ baseline<\/td><td><strong>↓↓<\/strong><\/td><td>↑↑<\/td><td>↓<\/td><\/tr><tr><td><strong>+ KV INT8<\/strong><\/td><td>cache quant<\/td><td>TRT-LLM<\/td><td>≈ baseline<\/td><td>=<\/td><td>=<\/td><td>↓ (longer ctx)<\/td><\/tr><tr><td><strong>QLoRA-tuned INT4<\/strong><\/td><td>adapter \"QAT\"<\/td><td>vLLM<\/td><td>↑ on your task<\/td><td>↓<\/td><td>↑<\/td><td>↓↓<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Direct analogies to your notebook:<\/strong><\/p>\n<ul><li>FP16 baseline ↔ your FP32 baseline.<\/li><li>AWQ/GPTQ INT4 ↔ your PTQ (calibrate, don't retrain) — but weight-only, because decode is<\/li><\/ul>\n<p>memory-bound.<\/p>\n<ul><li>FP8/W8A8 via SmoothQuant ↔ your TensorRT INT8, with outlier handling added.<\/li><li>QLoRA ↔ your QAT — the \"actually adjust weights\" row, but cheap (adapters on a frozen base).<\/li><li>The <code>device<\/code> column that stopped CPU-INT8 being misread ↔ here, label the <strong>engine<\/strong> and<\/li><\/ul>\n<p><strong>batch/seq length<\/strong>, since tokens/sec is meaningless without them.<\/p>\n<h2 id=\"what-carries-over-verbatim-from-your-project\">What carries over verbatim from your project<\/h2>\n<ul><li><strong>Method vs engine separation<\/strong> — AWQ (method) vs TensorRT-LLM (engine) is your PTQ-vs-<\/li><\/ul>\n<p>TensorRT insight, unchanged.<\/p>\n<ul><li><strong>\"Speed comes from kernels, not weight values\"<\/strong> — TRT-LLM engines for two INT4 methods run<\/li><\/ul>\n<p>the same kernels; quality differs, latency doesn't. Exactly your TRT-PTQ vs TRT-QAT finding.<\/p>\n<ul><li><strong>Calibration is a clipping decision<\/strong> — AWQ's salient-channel scaling and FP8's per-tensor<\/li><\/ul>\n<p>scaling are the same \"pick the range well\" problem as your entropy calibrator.<\/p>\n<ul><li><strong>Measure everything, trust nothing<\/strong> — same MLflow discipline; more columns.<\/li><\/ul>\n<h2 id=\"what-youd-deliberately-change\">What you'd deliberately change<\/h2>\n<ul><li><strong>Metric:<\/strong> perplexity + a task benchmark (lm-eval-harness), not top-1.<\/li><li><strong>Two latencies:<\/strong> TTFT and per-token, swept over batch/seq — not one number.<\/li><li><strong>No training:<\/strong> start from a checkpoint; QLoRA is the only \"training,\" and it's tiny.<\/li><li><strong>New axis:<\/strong> KV-cache precision — a lever your CNN never had.<\/li><\/ul>\n<h2 id=\"vlm-redo-add-two-rows\">VLM redo: add two rows<\/h2>\n<p>A VLM table = the LLM table <strong>plus<\/strong> the vision side (your home turf):<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Extra variant<\/th><th>What it targets<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td><strong>INT8 vision encoder<\/strong><\/td><td>the ViT/CNN tower<\/td><td><em>Your FashionMNIST playbook<\/em> — PTQ, per-channel, TensorRT; runs once/image<\/td><\/tr><tr><td><strong>Visual token reduction<\/strong><\/td><td>image-token count<\/td><td>Shrinks prefill + KV — the VLM-specific biggest win<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Then the decoder rows are identical to the LLM table above. The story writes itself: <em>\"I optimize the vision tower the way I optimized my CNN, the decoder the way I'd optimize an LLM, and I add token reduction because image tokens are where VLM latency actually lives.\"<\/em><\/p>\n<h2 id=\"the-90-second-spoken-version\">The 90-second spoken version<\/h2>\n<blockquote><p>\"Same experiment, three model types. FashionMNIST CNN: FP32 → PTQ/QAT/INT8/FP16 on TensorRT, compared on top-1 and latency — that's done. For an LLM I keep the skeleton but the winning variants change: AWQ or GPTQ weight-only INT4 because decode is memory-bound, FP8 for prefill throughput, KV-cache quant for context length, QLoRA where I need task recovery — served on TensorRT-LLM or vLLM, judged on perplexity, MMLU, TTFT, and tokens/sec. A VLM is both: I quantize the vision encoder with my CNN toolchain, treat the decoder as an LLM, and reduce visual tokens first because that's where prefill and KV cost live. One loop, three model families, and I can name why each variant wins.\"<\/p><\/blockquote>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Map each row of your FashionMNIST table to its LLM equivalent. *(FP32→FP16; PTQ→AWQ/GPTQ<\/li><\/ul>\n<p>INT4; TRT-INT8→FP8/SmoothQuant; QAT→QLoRA; device col→engine+batch/seq.)*<\/p>\n<ul><li>Which of your project's findings transfers <em>word for word<\/em>? *(\"speed comes from the kernels,<\/li><\/ul>\n<p>not the weight values\" — same-kernel engines differ in quality, not latency.)*<\/p>\n<ul><li>What two rows does a VLM add, and which uses your CNN skills? *(INT8 vision encoder — CNN<\/li><\/ul>\n<p>skills — and visual token reduction.)*<\/p>","toc":[{"level":2,"id":"the-one-sentence-pitch","text":"The one-sentence pitch"},{"level":2,"id":"llm-redo-the-compare-table","text":"LLM redo: the compare table"},{"level":2,"id":"what-carries-over-verbatim-from-your-project","text":"What carries over verbatim from your project"},{"level":2,"id":"what-youd-deliberately-change","text":"What you'd deliberately change"},{"level":2,"id":"vlm-redo-add-two-rows","text":"VLM redo: add two rows"},{"level":2,"id":"the-90-second-spoken-version","text":"The 90-second spoken version"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"experiment redo: your project as an llm/vlm 💡 tl;dr take the exact structure of your fashionmnist notebook and re-cast it for an llm, then a vlm. same skeleton — baseline, quantized variants, one compare table, everything tracked — with llm metrics and tools swapped in. this is the \"walk me through how you'd apply your project to our models\" answer. the one-sentence pitch \"my project proved i can run the full optimization loop and reason about method vs engine on a cnn. the same loop applies to an llm — i'd swap ptq/qat for awq-int4 and fp8, tensorrt for tensorrt-llm, and top-1 for perplexity and tokens/sec — and a vlm is just my cnn skills on the vision tower plus that llm loop on the decoder.\" llm redo: the compare table keep your six-row idea; change the axes. baseline fp16, then walk method × engine: variant method engine quality (ppl / mmlu) ttft tokens/s vram fp16 — vllm reference ref ref ref awq int4 weight-only ptq vllm / trt-llm ≈ baseline ↓ ↑ decode ↓↓ gptq int4 weight-only ptq trt-llm ≈ baseline ↓ ↑ ↓↓ fp8 (w+a) calibrated ptq trt-llm ≈ baseline ↓↓ ↑↑ ↓ + kv int8 cache quant trt-llm ≈ baseline = = ↓ (longer ctx) qlora-tuned int4 adapter \"qat\" vllm ↑ on your task ↓ ↑ ↓↓ direct analogies to your notebook: fp16 baseline ↔ your fp32 baseline. awq/gptq int4 ↔ your ptq (calibrate, don't retrain) — but weight-only, because decode is memory-bound. fp8/w8a8 via smoothquant ↔ your tensorrt int8, with outlier handling added. qlora ↔ your qat — the \"actually adjust weights\" row, but cheap (adapters on a frozen base). the device column that stopped cpu-int8 being misread ↔ here, label the engine and batch/seq length , since tokens/sec is meaningless without them. what carries over verbatim from your project method vs engine separation — awq (method) vs tensorrt-llm (engine) is your ptq-vs- tensorrt insight, unchanged. \"speed comes from kernels, not weight values\" — trt-llm engines for two int4 methods run the same kernels; quality differs, latency doesn't. exactly your trt-ptq vs trt-qat finding. calibration is a clipping decision — awq's salient-channel scaling and fp8's per-tensor scaling are the same \"pick the range well\" problem as your entropy calibrator. measure everything, trust nothing — same mlflow discipline; more columns. what you'd deliberately change metric: perplexity + a task benchmark (lm-eval-harness), not top-1. two latencies: ttft and per-token, swept over batch/seq — not one number. no training: start from a checkpoint; qlora is the only \"training,\" and it's tiny. new axis: kv-cache precision — a lever your cnn never had. vlm redo: add two rows a vlm table = the llm table plus the vision side (your home turf): extra variant what it targets why int8 vision encoder the vit/cnn tower your fashionmnist playbook — ptq, per-channel, tensorrt; runs once/image visual token reduction image-token count shrinks prefill + kv — the vlm-specific biggest win then the decoder rows are identical to the llm table above. the story writes itself: \"i optimize the vision tower the way i optimized my cnn, the decoder the way i'd optimize an llm, and i add token reduction because image tokens are where vlm latency actually lives.\" the 90-second spoken version \"same experiment, three model types. fashionmnist cnn: fp32 → ptq/qat/int8/fp16 on tensorrt, compared on top-1 and latency — that's done. for an llm i keep the skeleton but the winning variants change: awq or gptq weight-only int4 because decode is memory-bound, fp8 for prefill throughput, kv-cache quant for context length, qlora where i need task recovery — served on tensorrt-llm or vllm, judged on perplexity, mmlu, ttft, and tokens/sec. a vlm is both: i quantize the vision encoder with my cnn toolchain, treat the decoder as an llm, and reduce visual tokens first because that's where prefill and kv cost live. one loop, three model families, and i can name why each variant wins.\" self-check map each row of your fashionmnist table to its llm equivalent. *(fp32→fp16; ptq→awq/gptq int4; trt-int8→fp8/smoothquant; qat→qlora; device col→engine+batch/seq.)* which of your project's findings transfers word for word ? *(\"speed comes from the kernels, not the weight values\" — same-kernel engines differ in quality, not latency.)* what two rows does a vlm add, and which uses your cnn skills? *(int8 vision encoder — cnn skills — and visual token reduction.)*","words":723},{"path":"13-llm-vlm-optimization/interview-qa.md","title":"Interview Q&A: LLM & VLM","section":"13 · LLM & VLM Optimization","quiz":true,"accent":"#2aa7cf","html":"<h1 id=\"interview-qa-llm-vlm-rapid-fire\">Interview Q&amp;A: LLM &amp; VLM Rapid Fire<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Last-mile drill for applying the optimization loop to LLMs and VLMs. Cover the answer, say the 30-second version out loud, then check. Grouped: bridge → LLM quant → serving → VLM → the story.<\/div><\/div>\n<h2 id=\"the-cnn-bridge\">The CNN bridge<\/h2>\n<details class=\"qa\" open><summary>Q: Your experiment was a CNN — does the same optimization loop apply to LLMs?<\/summary><div class=\"qa-body\"><p>Yes — baseline → quantize → serve → compare is identical, and so is the method/format/engine framing. What flips: LLM decode is memory-bound (so weight-only INT4 wins, not INT8 compute), activations have outliers (need SmoothQuant/AWQ), models are too big to QAT (use PTQ/QLoRA), and quality is perplexity + benchmarks, not top-1.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is weight-only INT4 the big lever for LLMs but wasn't obvious for your CNN?<\/summary><div class=\"qa-body\"><p>LLM decode re-reads every weight from memory per token with little math — it's bandwidth-bound, so cutting weight bytes speeds it up directly. Your CNN was compute-bound, so INT8 helped the math, not memory.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does plain per-tensor INT8 PTQ that worked on your CNN fail on an LLM?<\/summary><div class=\"qa-body\"><p>Transformer activations have a few huge outlier channels; a per-tensor scale must cover them, crushing normal values into a few codes. SmoothQuant (shift difficulty into weights) or AWQ (protect salient channels) fix it.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: You can't afford QAT on a 7B model — what do you do instead?<\/summary><div class=\"qa-body\"><p>PTQ/weight-only methods that need only a small calibration set, and QLoRA — train small LoRA adapters on a frozen 4-bit (NF4) base — for cheap task-specific recovery.<\/p><\/div><\/details><h2 id=\"llm-quantization\">LLM quantization<\/h2>\n<details class=\"qa\" open><summary>Q: Weight-only vs weight+activation — pick one, when?<\/summary><div class=\"qa-body\"><p>Weight-only (INT4, AWQ/GPTQ) when memory- or VRAM-bound, which decode usually is. Weight+activation (INT8/FP8) when prefill/throughput dominates and you can handle outliers — FP8 on Hopper is the sweet spot.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: GPTQ vs AWQ in a sentence each.<\/summary><div class=\"qa-body\"><p>GPTQ: second-order, Hessian-based layer-wise rounding that compensates remaining weights for quantization error. AWQ: scale up the ~1% of weight channels that matter most (by activation magnitude) before INT4 so they aren't crushed — no backprop, fast.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is group-wise quantization and why do LLMs use it?<\/summary><div class=\"qa-body\"><p>A separate scale per group of N weights (e.g. 128) instead of per whole channel — finer granularity that keeps INT4 accurate. GGUF k-quants are group-wise.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why and how would you quantize the KV cache?<\/summary><div class=\"qa-body\"><p>At long context/large batch it can exceed the weights. INT8/FP8 KV roughly halves it → longer context or bigger batches. Keys are sometimes kept higher-precision than values.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you measure LLM quality after quantizing — and the trap?<\/summary><div class=\"qa-body\"><p>Perplexity on held-out text (fast) plus task benchmarks (MMLU, GSM8K, HumanEval) via lm-eval-harness. Trap: a 4-bit model can hold perplexity but drop on reasoning/long-context, so test the tasks you care about.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's QLoRA, concretely?<\/summary><div class=\"qa-body\"><p>Freeze the base model in 4-bit NF4, add trainable LoRA adapters in higher precision, fine-tune only those. QAT-like recovery at a fraction of the cost; serve the base once and swap adapters.<\/p><\/div><\/details><h2 id=\"serving-performance\">Serving &amp; performance<\/h2>\n<details class=\"qa\" open><summary>Q: Why does an LLM report two latencies?<\/summary><div class=\"qa-body\"><p>Prefill (TTFT) processes the whole prompt in parallel — compute-bound. Decode (TPOT) generates one token at a time — memory-bound. Different optimizations, so you measure and report both.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Name the LLM serving runtimes and when each.<\/summary><div class=\"qa-body\"><p>TensorRT-LLM (best on NVIDIA — fused kernels, FP8, in-flight batching, served via Triton); vLLM (PagedAttention + continuous batching, easy high throughput); llama.cpp (GGUF on CPU/edge/Apple Silicon).<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is continuous / in-flight batching and why does it matter?<\/summary><div class=\"qa-body\"><p>Schedule at the token level so finished sequences are replaced immediately and new requests join mid-flight — keeps the GPU saturated instead of waiting for a batch's slowest sequence. Biggest throughput lever for real traffic.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How would you correctly benchmark an LLM's speed?<\/summary><div class=\"qa-body\"><p>Warm up, separate TTFT from per-token, sweep batch size and sequence length (throughput is meaningless without them), report p50/p99. Tools: genai-perf / trtllm-bench / vLLM benchmarks.<\/p><\/div><\/details><h2 id=\"vlm\">VLM<\/h2>\n<details class=\"qa\" open><summary>Q: What are a VLM's parts and where's the cost?<\/summary><div class=\"qa-body\"><p>Vision encoder (ViT/CNN) → projector (small MLP) → LLM decoder. Cost: images become hundreds–thousands of tokens, so prefill and the KV cache dominate; the encoder is a one-time per-image cost.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How would you optimize a VLM?<\/summary><div class=\"qa-body\"><p>Quantize the vision encoder like a CNN (INT8, per-channel, TensorRT), treat the decoder as an LLM (INT4/FP8 + KV-quant), and — first — reduce visual tokens (pool/prune/merge), because image tokens drive prefill and KV.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Which part of a VLM maps to your CNN experience?<\/summary><div class=\"qa-body\"><p>The vision encoder — a ViT/CNN I'd quantize with the exact PTQ/TensorRT playbook from my FashionMNIST project.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's the VLM-specific optimization with no LLM or CNN analog?<\/summary><div class=\"qa-body\"><p>Visual token reduction — compress the image-token count with pooling, pruning, merging, or a resampler, shrinking prefill and KV together.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why are VLMs often prefill-heavy while text LLMs are decode-heavy?<\/summary><div class=\"qa-body\"><p>A single image expands to many tokens processed up front, so time-to-first-token is dominated by prefilling that long visual sequence, not by generating a short answer.<\/p><\/div><\/details><h2 id=\"the-story\">The story<\/h2>\n<details class=\"qa\" open><summary>Q: Walk me through applying your CNN project to our LLMs/VLMs.<\/summary><div class=\"qa-body\"><p>Same loop and same method-vs-engine framing. For an LLM: FP16 baseline → AWQ/GPTQ INT4 (memory-bound decode) and FP8 (prefill throughput) and KV-quant → served on TensorRT-LLM or vLLM → judged on perplexity, MMLU, TTFT, tokens/sec. For a VLM: quantize the vision tower with my CNN toolchain, the decoder as an LLM, and reduce visual tokens first. One loop, three model families, and I can name why each variant wins.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Which finding from your CNN project transfers word-for-word?<\/summary><div class=\"qa-body\"><p>\"Speed comes from the kernels and architecture, not the weight values.\" Two INT4 methods compiled to the same TensorRT-LLM engine run identical kernels — quality differs, latency doesn't. Exactly my TRT-PTQ vs TRT-QAT result.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you know an LLM optimization actually worked?<\/summary><div class=\"qa-body\"><p>Measure before and after — perplexity + the task benchmarks I care about for quality; TTFT, tokens/sec, and VRAM swept over batch/seq for speed; profile to confirm the new bottleneck. Never claim a speedup I didn't measure or ship a quality drop I didn't quantify.<\/p><\/div><\/details>","toc":[{"level":2,"id":"the-cnn-bridge","text":"The CNN bridge"},{"level":2,"id":"llm-quantization","text":"LLM quantization"},{"level":2,"id":"serving-performance","text":"Serving &amp; performance"},{"level":2,"id":"vlm","text":"VLM"},{"level":2,"id":"the-story","text":"The story"}],"text":"interview q&a: llm & vlm rapid fire 💡 tl;dr last-mile drill for applying the optimization loop to llms and vlms. cover the answer, say the 30-second version out loud, then check. grouped: bridge → llm quant → serving → vlm → the story. the cnn bridge q: your experiment was a cnn — does the same optimization loop apply to llms? yes — baseline → quantize → serve → compare is identical, and so is the method/format/engine framing. what flips: llm decode is memory-bound (so weight-only int4 wins, not int8 compute), activations have outliers (need smoothquant/awq), models are too big to qat (use ptq/qlora), and quality is perplexity + benchmarks, not top-1. q: why is weight-only int4 the big lever for llms but wasn't obvious for your cnn? llm decode re-reads every weight from memory per token with little math — it's bandwidth-bound, so cutting weight bytes speeds it up directly. your cnn was compute-bound, so int8 helped the math, not memory. q: why does plain per-tensor int8 ptq that worked on your cnn fail on an llm? transformer activations have a few huge outlier channels; a per-tensor scale must cover them, crushing normal values into a few codes. smoothquant (shift difficulty into weights) or awq (protect salient channels) fix it. q: you can't afford qat on a 7b model — wha

redictions with no error thrown.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Data drift vs concept drift?<\/summary><div class=\"qa-body\"><p>Data drift = input distribution changes; concept drift = the input→output relationship changes. Covariate drift often means retrain; concept drift means the problem itself changed.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you detect drift without labels?<\/summary><div class=\"qa-body\"><p>Compare live input/prediction distributions to a training baseline (PSI, KL divergence, KS test); compute real accuracy later as labels arrive.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: When do you retrain?<\/summary><div class=\"qa-body\"><p>On a schedule as a floor, plus drift/performance triggers — and always gate on the new model beating production on a fresh holdout before promoting.<\/p><\/div><\/details><h2 id=\"cloud-optimization-scaling\">Cloud, optimization, scaling<\/h2>\n<details class=\"qa\" open><summary>Q: Name the flagship ML platform on each cloud.<\/summary><div class=\"qa-body\"><p>AWS SageMaker, GCP Vertex AI, Azure ML.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does Kubernetes give a model service?<\/summary><div class=\"qa-body\"><p>Scaling, self-healing, rolling updates/ rollback, and load balancing across a cluster.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you train cheaply on GPUs?<\/summary><div class=\"qa-body\"><p>Spot/preemptible instances with checkpointing, right- sizing, mixed precision, and tearing down idle instances.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Quantization vs pruning vs distillation?<\/summary><div class=\"qa-body\"><p>Quantization = lower-precision numbers; pruning = remove unimportant weights; distillation = train a small student to mimic a big teacher.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Data vs model parallelism?<\/summary><div class=\"qa-body\"><p>Data parallelism replicates the model and splits the data (average gradients); model parallelism splits the model itself across GPUs when it doesn't fit.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Latency vs throughput, and how does batching relate?<\/summary><div class=\"qa-body\"><p>Latency = one prediction's speed; throughput = predictions/sec. Batching raises throughput but can add latency.<\/p><\/div><\/details><h2 id=\"generative-ai\">Generative AI<\/h2>\n<details class=\"qa\" open><summary>Q: What are LLMs trained to do?<\/summary><div class=\"qa-body\"><p>Predict the next token over massive text; attention lets them weigh all token relationships in parallel, which is why they scale.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: RAG vs fine-tuning — which for what?<\/summary><div class=\"qa-body\"><p>RAG adds knowledge (your private/fresh facts, reduces hallucination); fine-tuning changes behavior/style. Don't fine-tune to inject facts.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How does RAG work?<\/summary><div class=\"qa-body\"><p>Index documents as embeddings in a vector DB → retrieve chunks similar to the query → put them in the prompt so the model answers grounded in them.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is LoRA?<\/summary><div class=\"qa-body\"><p>A parameter-efficient fine-tuning method: freeze the base model, train tiny low-rank adapters (&lt;1% of params) — cheap and swappable per task.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is evaluating LLM output hard, and one approach?<\/summary><div class=\"qa-body\"><p>Usually no single correct answer; use human eval, LLM-as-judge, or task-specific checks like groundedness for RAG.<\/p><\/div><\/details><h2 id=\"system-design\">System design<\/h2>\n<details class=\"qa\" open><summary>Q: First move in an ML system design question?<\/summary><div class=\"qa-body\"><p>Clarify requirements — scope, scale, latency, success metric — before designing anything.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is the two-stage pattern?<\/summary><div class=\"qa-body\"><p>Cheap candidate generation narrows millions of items to hundreds (high recall), then an expensive ranking model orders those — because you can't score millions in real time.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Two recommender gotchas?<\/summary><div class=\"qa-body\"><p>Cold start (no history for new users/items → popularity/ content fallback) and feedback loops (popular items self-reinforce → add exploration).<\/p><\/div><\/details><p>→ Done — if these felt easy, you're ready. Skim the cheat sheet last.<\/p>","toc":[{"level":2,"id":"foundations","text":"Foundations"},{"level":2,"id":"data-experimentation","text":"Data &amp; experimentation"},{"level":2,"id":"mlops-serving","text":"MLOps &amp; serving"},{"level":2,"id":"monitoring-reliability","text":"Monitoring &amp; reliability"},{"level":2,"id":"cloud-optimization-scaling","text":"Cloud, optimization, scaling"},{"level":2,"id":"generative-ai","text":"Generative AI"},{"level":2,"id":"system-design","text":"System design"}],"text":"rapid q&a tap a question to reveal the answer. hide all and quiz yourself top to bottom. foundations q: walk through the ml lifecycle. frame the problem → collect data → preprocess & engineer features → train → evaluate → deploy → monitor → retrain. it's a loop because the world drifts. q: overfitting vs underfitting? overfitting = great on training, poor on new data (high variance); underfitting = poor on both (high bias). fix overfitting with more data / regularization / simpler model; fix underfitting with a more expressive model or better features. q: best default model for tabular data, and when do you switch to deep learning? gradient boosting (xgboost/lightgbm). switch to deep learning for unstructured data (images, text) or very large datasets. q: precision vs recall — when each? precision when false positives are costly; recall when misses are costly. f1 or pr-auc when classes are imbalanced. accuracy is misleading under imbalance. q: bagging vs boosting? bagging = parallel trees averaged to cut variance (random forest); boosting = sequential trees each fixing the last's errors to cut bias (xgboost). data & experimentation q: what is data leakage? training on information unavailable at prediction time (e.g. fitting the scaler on all data before splitting, or a feature that's a proxy for the label). it inflates offline metrics and fails in production. q: why three data splits, not two? train to fit, validation to tune/choose, test opened once for an honest estimate — because tuning and reporting on the same set makes the score optimistic. q: how do you split time-series data? by time — train on the past, test on the future. a random split leaks the future into training. q: what is train/serve skew and how does a feature store fix it? features computed differently in training vs serving, so the model sees mismatched inputs. a feature store defines each feature once and serves it to both, keeping them identical. q: batch vs streaming — how do you choose? by required freshness. default to batch (simpler, cheaper); use streaming only when you need sub-minute freshness. q: why a/b test if offline metrics improved? offline gains don't guarantee business impact; only live users prove it. check statistical significance, adequate sample/duration, and guardrail metrics. mlops & serving q: what does mlops add over devops? it versions, tests, deploys, and monitors code + data model (not just code), and adds continuous training — because models decay silently. q: three serving patterns? batch (scheduled, bulk), online/real-time (per request, low latency), streaming (per event, continuous). choose by latency need. q: why containerize a model? to bundle the exact environment so it runs identically everywhere — no \"works on my machine.\" q: what does a model registry give you? versioning, staged promotion (staging → production), metadata, and instant rollback to a previous version. q: name safe rollout strategies. canary (small traffic slice first), blue-green (switch between two, revert instantly), shadow (run on real traffic without using the output). monitoring & reliability q: why is monitoring different for ml? models fail silently — they keep returning confident but increasingly wrong predictions with no error thrown. q: data drift vs concept drift? data drift = input distribution changes; concept drift = the input→output relationship changes. covariate drift often means retrain; concept drift means the problem itself changed. q: how do you detect drift without labels? compare live input/prediction distributions to a training baseline (psi, kl divergence, ks test); compute real accuracy later as labels arrive. q: when do you retrain? on a schedule as a floor, plus drift/performance triggers — and always gate on the new model beating production on a fresh holdout before promoting. cloud, optimization, scaling q: name the flagship ml platform on each cloud. aws sagemaker, gcp vertex ai, azure ml. q: what does kubernetes give a model service? scaling, self-healing, rolling updates/ rollback, and load balancing across a cluster. q: how do you train cheaply on gpus? spot/preemptible instances with checkpointing, right- sizing, mixed precision, and tearing down idle instances. q: quantization vs pruning vs distillation? quantization = lower-precision numbers; pruning = remove unimportant weights; distillation = train a small student to mimic a big teacher. q: data vs model parallelism? data parallelism replicates the model and splits the data (average gradients); model parallelism splits the model itself across gpus when it doesn't fit. q: latency vs throughput, and how does batching relate? latency = one prediction's speed; throughput = predictions/sec. batching raises throughput but can add latency. generative ai q: what are llms trained to do? predict the next token over massive text; attention lets them weigh all token relationships in parallel, which is why they scale. q: rag vs fine-tuning — which for what? rag adds knowledge (your private/fresh facts, reduces hallucination); fine-tuning changes behavior/style. don't fine-tune to inject facts. q: how does rag work? index documents as embeddings in a vector db → retrieve chunks similar to the query → put them in the prompt so the model answers grounded in them. q: what is lora? a parameter-efficient fine-tuning method: freeze the base model, train tiny low-rank adapters (<1% of params) — cheap and swappable per task. q: why is evaluating llm output hard, and one approach? usually no single correct answer; use human eval, llm-as-judge, or task-specific checks like groundedness for rag. system design q: first move in an ml system design question? clarify requirements — scope, scale, latency, success metric — before designing anything. q: what is the two-stage pattern? cheap candidate generation narrows millions of items to hundreds (high recall), then an expensive ranking model orders those — because you can't score millions in real time. q: two recommender gotchas? cold start (no history for new users/items → popularity/ content fallback) and feedback loops (popular items self-reinforce → add exploration). → done — if these felt easy, you're ready. skim the cheat sheet last.","words":979},{"path":"11-drill-bank/decision-tradeoffs.md","title":"Decision Tradeoffs: Why X over Y","section":"11 · Drill Bank","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"decision-tradeoffs-why-x-over-y\">Decision Tradeoffs: \"Why X over Y\"<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Interviewers rarely ask \"what is X\" — they ask <em>\"X or Y, and why?\"<\/em> The strong answer always names the <strong>one axis the decision turns on<\/strong>, picks the <strong>simpler/cheaper option by default<\/strong>, and states the <strong>failure mode of the wrong pick<\/strong>. This page is every canonical head-to-head in the pack, compressed to that shape. Master the <em>axis<\/em>, not the memorized verdict.<\/div><\/div>\n<h2 id=\"the-universal-template\">The universal template<\/h2>\n<p>Any \"X vs Y\" question answers in three beats:<\/p>\n<ol><li><strong>The deciding axis<\/strong> — <em>\"This comes down to «latency / data size / freshness / cost / how much labeled data I have».\"<\/em><\/li><li><strong>The rule + default<\/strong> — <em>\"I default to «the simpler one» and only reach for «the complex one» when «the axis» demands it.\"<\/em><\/li><li><strong>The wrong-pick cost<\/strong> — <em>\"Pick the other one and you pay «the specific failure».\"<\/em><\/li><\/ol>\n<p>Say the axis out loud <em>before<\/em> the verdict. That's what separates \"I memorized the answer\" from \"I understand the tradeoff.\"<\/p>\n<h2 id=\"modeling\">Modeling<\/h2>\n<ul><li><strong>Gradient boosting vs deep learning<\/strong> — <em>Axis: data type.<\/em> Tabular/structured → boosting<\/li><\/ul>\n<p>(XGBoost/LightGBM): more accurate, less tuning, no scaling, trains on a CPU. Unstructured   (images, text, audio) or huge data → deep learning. <em>Wrong pick:<\/em> a neural net on a 50k-row   table — slower, worse, and harder to explain than one XGBoost line.<\/p>\n<ul><li><strong>Bagging vs boosting<\/strong> — <em>Axis: is your error variance or bias?<\/em> Bagging (Random Forest) =<\/li><\/ul>\n<p>parallel trees averaged → cuts <strong>variance<\/strong>, robust, little tuning. Boosting = sequential   trees fixing prior errors → cuts <strong>bias<\/strong>, top accuracy, careful tuning. <em>Wrong pick:<\/em>   over-pushed boosting overfits; a forest plateaus below what boosting could reach.<\/p>\n<ul><li><strong>L1 vs L2 regularization<\/strong> — <em>Axis: do you want feature selection?<\/em> L1 (Lasso) drives<\/li><\/ul>\n<p>weights to exactly zero → sparse, built-in selection. L2 (Ridge) shrinks smoothly → keeps   all features, handles correlated ones better. <em>Tie-breaker:<\/em> ElasticNet blends both.<\/p>\n<ul><li><strong>More layers/params vs more data<\/strong> — <em>Axis: are you underfitting or overfitting?<\/em> Underfit<\/li><\/ul>\n<p>(poor on both train and test) → more capacity/features. Overfit (great train, poor test) →   more data, regularization, simpler model. <em>Wrong pick:<\/em> adding capacity to an overfit model   makes it worse.<\/p>\n<h2 id=\"metrics\">Metrics<\/h2>\n<ul><li><strong>Precision vs recall<\/strong> — <em>Axis: which error is costlier?<\/em> Precision when false positives<\/li><\/ul>\n<p>hurt (spam filter eating real mail). Recall when misses hurt (cancer screening, fraud).   <em>Wrong pick:<\/em> optimizing precision on a cancer detector quietly ships false negatives.<\/p>\n<ul><li><strong>Accuracy vs F1/PR-AUC<\/strong> — <em>Axis: class balance.<\/em> Balanced → accuracy is fine. Imbalanced<\/li><\/ul>\n<p>→ accuracy lies (99% by always predicting \"no\"); use F1 or PR-AUC. <em>Say this:<\/em> \"Accuracy is   the first metric to distrust under imbalance.\"<\/p>\n<ul><li><strong>ROC-AUC vs PR-AUC<\/strong> — <em>Axis: how rare is the positive class?<\/em> Heavy imbalance (fraud at<\/li><\/ul>\n<p>0.1%) → PR-AUC, because ROC-AUC looks flatteringly high when true negatives dominate.<\/p>\n<ul><li><strong>Offline metric vs business metric<\/strong> — <em>Axis: none — you need both.<\/em> Offline (AUC, RMSE)<\/li><\/ul>\n<p>gates what ships; the business metric (revenue, retention) is the real target. <em>Wrong pick:<\/em>   shipping on offline gains alone → the A/B test shows no lift (see Experimentation).<\/p>\n<h2 id=\"data\">Data<\/h2>\n<ul><li><strong>Data lake vs warehouse vs lakehouse<\/strong> — <em>Axis: schema-on-read vs schema-on-write.<\/em> Lake =<\/li><\/ul>\n<p>raw, cheap, any format, schema-on-read (great for ML/exploration). Warehouse = clean,   structured, schema-on-write, fast SQL (great for BI). Lakehouse (Databricks/Delta) = one   system for both. <em>Wrong pick:<\/em> forcing raw sensor data into a warehouse schema up front   throws away signal you didn't know you needed.<\/p>\n<ul><li><strong>Batch vs streaming (data)<\/strong> — <em>Axis: required freshness.<\/em> Default batch — simpler,<\/li><\/ul>\n<p>cheaper, easy to backfill. Streaming only when you need sub-minute freshness (fraud, live   personalization). <em>Wrong pick:<\/em> standing up Kafka+Flink for a nightly report burns   complexity for zero business value.<\/p>\n<ul><li><strong>Normalization vs standardization<\/strong> — <em>Axis: distribution + model.<\/em> Standardize (zero mean,<\/li><\/ul>\n<p>unit variance) for roughly-Gaussian features and distance/gradient models. Min-max normalize   for bounded ranges (images to 0–1). <em>Note:<\/em> trees need neither.<\/p>\n<ul><li><strong>Oversample vs undersample vs class weights<\/strong> — <em>Axis: how much data you can spare.<\/em> Lots of<\/li><\/ul>\n<p>data → undersample the majority. Scarce data → oversample/SMOTE the minority. Simplest first   → class weights in the loss. <em>Wrong pick:<\/em> oversampling <em>before<\/em> the train/test split leaks   duplicates across the split and inflates your score.<\/p>\n<ul><li><strong>Build vs buy a feature store<\/strong> — <em>Axis: train/serve skew risk × team size.<\/em> The value is<\/li><\/ul>\n<p>defining a feature <em>once<\/em> and serving it to both training and inference, killing skew. Buy   (Feast/Tecton) when many models share features; skip it for one model with simple features.<\/p>\n<h2 id=\"experimentation\">Experimentation<\/h2>\n<ul><li><strong>Grid vs random vs Bayesian search<\/strong> — <em>Axis: how expensive is one training run?<\/em> Cheap runs<\/li><\/ul>\n<p>/ few params → grid. Many params → random (finds good regions faster). Expensive runs (deep   nets) → Bayesian (Optuna) to spend trials wisely. <em>Wrong pick:<\/em> grid search over 6   hyperparameters is exponential and wasteful.<\/p>\n<ul><li><strong>Holdout vs k-fold CV<\/strong> — <em>Axis: dataset size.<\/em> Big data → a single holdout is enough and<\/li><\/ul>\n<p>cheap. Small data → k-fold for a stable estimate. <em>Wrong pick:<\/em> one small holdout gives a   noisy, lucky-or-unlucky number.<\/p>\n<ul><li><strong>A/B test vs offline eval<\/strong> — <em>Axis: do you need proof of real-world impact?<\/em> Offline gates<\/li><\/ul>\n<p>candidates cheaply; the A/B test is the only thing that proves business lift on live users.   <em>Wrong pick:<\/em> trusting offline lift → you ship a model users quietly hate. Watch   significance, sample size/duration, and guardrail metrics.<\/p>\n<h2 id=\"mlops-serving\">MLOps &amp; serving<\/h2>\n<ul><li><strong>Batch vs online vs streaming serving<\/strong> — <em>Axis: when is the prediction needed?<\/em> Later/in<\/li><\/ul>\n<p>bulk → batch (cheapest, no always-on service). Per user request, now → online API. Per event,   continuously → streaming. <em>Default:<\/em> if a nightly table satisfies the product, don't build a   real-time service.<\/p>\n<ul><li><strong>REST vs gRPC<\/strong> — <em>Axis: latency + who calls it.<\/em> REST/JSON for public, browser-facing,<\/li><\/ul>\n<p>easy-to-debug endpoints. gRPC (binary, HTTP/2) for internal, high-throughput,   service-to-service and streaming — lower latency and payload.<\/p>\n<ul><li><strong>FastAPI vs a dedicated model server<\/strong> — <em>Axis: GPU + throughput needs.<\/em> FastAPI/BentoML for<\/li><\/ul>\n<p>a simple CPU model or glue logic. Triton/TorchServe/TF-Serving when you need GPU <strong>dynamic   batching<\/strong>, multi-model, and high throughput. LLMs → vLLM/TGI specifically (paged-attention   batching). <em>Wrong pick:<\/em> a raw FastAPI loop wastes the GPU by serving one request at a time.<\/p>\n<ul><li><strong>Canary vs blue-green vs shadow<\/strong> — <em>Axis: what risk are you buying down?<\/em> Canary = small<\/li><\/ul>\n<p>traffic slice first (catch bad models on few users). Blue-green = two full envs, instant   switch/rollback (minimize downtime). Shadow = run on real traffic but <em>don't<\/em> use the output   (validate safely, zero user risk). Often shadow → canary → full.<\/p>\n<ul><li><strong>Registry vs versioned files in a bucket<\/strong> — <em>Axis: do you need staged promotion + audit?<\/em> A<\/li><\/ul>\n<p>registry (MLflow/Unity) adds staging→prod promotion, lineage, and one-click rollback. Files   in S3 work for a solo experiment but give you no promotion story or audit trail.<\/p>\n<h2 id=\"monitoring\">Monitoring<\/h2>\n<ul><li><strong>Data drift vs concept drift<\/strong> — <em>Axis: what changed?<\/em> Data/covariate drift = the <strong>inputs<\/strong><\/li><\/ul>\n<p>shift (new user mix) → often a retrain fixes it. Concept drift = the <strong>input→output   relationship<\/strong> shifts (fraud tactics change) → the problem itself moved; retraining on old   labels won't save you. <em>Wrong pick:<\/em> treating concept drift as data drift → you retrain and   still degrade.<\/p>\n<ul><li><strong>PSI vs KL vs KS for drift<\/strong> — <em>Axis: feature type + what you have.<\/em> All compare live vs a<\/li><\/ul>\n<p>training baseline <strong>without labels<\/strong>. PSI = a simple, thresholded bucketed score (industry   default). KL = information-theoretic divergence. KS = distance for continuous distributions.   Real accuracy comes later, once labels land.<\/p>\n<ul><li><strong>Schedule vs trigger retraining<\/strong> — <em>Axis: predictable decay vs event-driven.<\/em> Schedule =<\/li><\/ul>\n<p>a floor (nightly/weekly). Drift/perf <strong>trigger<\/strong> = react when it actually degrades. Do both,   and always <strong>gate<\/strong>: promote only if the new model beats production on a fresh holdout.<\/p>\n<h2 id=\"cloud-optimization\">Cloud &amp; optimization<\/h2>\n<ul><li><strong>Managed platform vs DIY on Kubernetes<\/strong> — <em>Axis: control vs ops burden.<\/em> SageMaker/Vertex =<\/li><\/ul>\n<p>fast, less to run, some lock-in. Self-managed K8s (KServe/Kubeflow) = full control and   portability, more to operate. <em>Default:<\/em> start managed; go DIY when cost or flexibility   forces it.<\/p>\n<ul><li><strong>Spot/preemptible vs on-demand<\/strong> — <em>Axis: is the work interruptible?<\/em> Spot (50–90% cheaper)<\/li><\/ul>\n<p>for fault-tolerant training <strong>with checkpointing<\/strong>. On-demand for latency-critical serving   that can't vanish mid-request. <em>Wrong pick:<\/em> spot for a live endpoint → it disappears under   load.<\/p>\n<ul><li><strong>Data vs model vs pipeline parallelism<\/strong> — <em>Axis: does the model fit on one GPU?<\/em> Fits →<\/li><\/ul>\n<p><strong>data parallelism<\/strong> (replicate, split the batch, average gradients) — the default. Too big   → model/tensor parallelism (split the model) or pipeline parallelism (split by layer stage).   <em>Say this:<\/em> \"Data parallelism first; model parallelism only when a single GPU can't hold the   weights.\"<\/p>\n<ul><li><strong>Quantization vs pruning vs distillation<\/strong> — <em>Axis: how you're shrinking.<\/em> Quantization =<\/li><\/ul>\n<p>lower-precision numbers (FP16/INT8), biggest win for least effort → try first. Pruning =   drop unimportant weights. Distillation = train a small student to mimic a big teacher.   Order: quantize → prune → distill.<\/p>\n<ul><li><strong>CPU vs GPU inference<\/strong> — <em>Axis: model size × QPS.<\/em> Small models / low traffic → CPU is<\/li><\/ul>\n<p>cheaper and simpler. Large models or high throughput with batching → GPU. <em>Wrong pick:<\/em>   a GPU serving 3 requests/sec is money on fire.<\/p>\n<ul><li><strong>Latency vs throughput<\/strong> — <em>Axis: you're usually trading them.<\/em> Latency = one prediction's<\/li><\/ul>\n<p>speed (user-facing SLA). Throughput = predictions/sec (cost efficiency). Batching <em>raises   throughput but adds latency<\/em> — tune the batch window to your p99 budget. <strong>Profile before   optimizing; attack the biggest number.<\/strong><\/p>\n<h2 id=\"generative-ai\">Generative AI<\/h2>\n<ul><li><strong>Prompt vs RAG vs fine-tune<\/strong> — <em>Axis: what's actually missing?<\/em> Prompt first (free,<\/li><\/ul>\n<p>instant). Missing <strong>knowledge/your data<\/strong> → RAG (grounds answers, cuts hallucination,   updates by re-indexing). Wrong <strong>behavior/format/tone<\/strong> that no prompt fixes → fine-tune.   <em>Wrong pick — the classic:<\/em> fine-tuning to inject facts. RAG is cheaper and right for facts.<\/p>\n<ul><li><strong>Full fine-tune vs LoRA/PEFT<\/strong> — <em>Axis: budget × how many tasks.<\/em> LoRA trains &lt;1% of params<\/li><\/ul>\n<p>→ cheap, fast, swappable adapters per task, tiny artifacts. Full fine-tune only when you have   the data/compute and need to move the whole model. <em>Default:<\/em> LoRA.<\/p>\n<ul><li><strong>Closed API vs open self-hosted LLM<\/strong> — *Axis: control/privacy/cost-at-scale vs<\/li><\/ul>\n<p>time-to-market.* API (GPT/Claude) = best quality, zero ops, per-token cost, data leaves your   walls. Self-hosted (Llama/Mistral on vLLM) = data stays in, cheaper at high volume,   customizable, but you run the GPUs. <em>Axis for regulated/on-prem work:<\/em> privacy usually   forces self-hosting.<\/p>\n<ul><li><strong>Bigger context vs RAG<\/strong> — <em>Axis: cost + relevance.<\/em> Stuffing everything into a huge context<\/li><\/ul>\n<p>is simple but expensive and dilutes attention. RAG retrieves only what's relevant → cheaper,   sharper, and cites sources. <em>Wrong pick:<\/em> paying for 100k tokens when top-5 chunks would do.<\/p>\n<h2 id=\"how-youd-say-it\">How you'd say it<\/h2>\n<p><em>\"For almost every one of these I start from the axis the decision turns on, default to the simpler and cheaper option — batch over streaming, boosting over deep nets on tables, prompt before RAG before fine-tuning — and only add complexity when the requirement forces it. Then I name what the wrong pick actually costs. That framing matters more than any single verdict, because the numbers change but the axis doesn't.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What three beats does every \"X vs Y\" answer need? *(the deciding axis; the rule + simpler<\/li><\/ul>\n<p>default; the wrong-pick failure mode.)*<\/p>\n<ul><li>RAG vs fine-tuning — the axis and the classic mistake? *(axis = knowledge vs behavior;<\/li><\/ul>\n<p>mistake = fine-tuning to add facts.)*<\/p>\n<ul><li>Data vs model parallelism — the deciding axis? <em>(does the model fit on one GPU.)<\/em><\/li><li>Why default to batch serving and undersampling-with-care? *(cheaper/simpler; and oversampling<\/li><\/ul>\n<p>before the split leaks duplicates.)*<\/p>\n<ul><li>Spot vs on-demand — the one word that decides it? <em>(interruptibility.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"the-universal-template","text":"The universal template"},{"level":2,"id":"modeling","text":"Modeling"},{"level":2,"id":"metrics","text":"Metrics"},{"level":2,"id":"data","text":"Data"},{"level":2,"id":"experimentation","text":"Experimentation"},{"level":2,"id":"mlops-serving","text":"MLOps &amp; serving"},{"level":2,"id":"monitoring","text":"Monitoring"},{"level":2,"id":"cloud-optimization","text":"Cloud &amp; optimization"},{"level":2,"id":"generative-ai","text":"Generative AI"},{"level":2,"id":"how-youd-say-it","text":"How you'd say it"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"decision tradeoffs: \"why x over y\" 💡 tl;dr interviewers rarely ask \"what is x\" — they ask \"x or y, and why?\" the strong answer always names the one axis the decision turns on , picks the simpler/cheaper option by default , and states the failure mode of the wrong pick . this page is every canonical head-to-head in the pack, compressed to that shape. master the axis , not the memorized verdict. the universal template any \"x vs y\" question answers in three beats: the deciding axis — \"this comes down to «latency / data size / freshness / cost / how much labeled data i have».\" the rule + default — \"i default to «the simpler one» and only reach for «the complex one» when «the axis» demands it.\" the wrong-pick cost — \"pick the other one and you pay «the specific failure».\" say the axis out loud before the verdict. that's what separates \"i memorized the answer\" from \"i understand the tradeoff.\" modeling gradient boosting vs deep learning — axis: data type. tabular/structured → boosting (xgboost/lightgbm): more accurate, less tuning, no scaling, trains on a cpu. unstructured (images, text, audio) or huge data → deep learning. wrong pick: a neural net on a 50k-row table — slower, worse, and harder to explain than one xgboost line. bagging vs boosting — axis: is your error variance or bias? bagging (random forest) = parallel trees averaged → cuts variance , robust, little tuning. boosting = sequential trees fixing prior errors → cuts bias , top accuracy, careful tuning. wrong pick: over-pushed boosting overfits; a forest plateaus below what boosting could reach. l1 vs l2 regularization — axis: do you want feature selection? l1 (lasso) drives weights to exactly zero → sparse, built-in selection. l2 (ridge) shrinks smoothly → keeps all features, handles correlated ones better. tie-breaker: elasticnet blends both. more layers/params vs more data — axis: are you underfitting or overfitting? underfit (poor on both train and test) → more capacity/features. overfit (great train, poor test) → more data, regularization, simpler model. wrong pick: adding capacity to an overfit model makes it worse. metrics precision vs recall — axis: which error is costlier? precision when false positives hurt (spam filter eating real mail). recall when misses hurt (cancer screening, fraud). wrong pick: optimizing precision on a cancer detector quietly ships false negatives. accuracy vs f1/pr-auc — axis: class balance. balanced → accuracy is fine. imbalanced → accuracy lies (99% by always predicting \"no\"); use f1 or pr-auc. say this: \"accuracy is the first metric to distrust under imbalance.\" roc-auc vs pr-auc — axis: how rare is the positive class? heavy imbalance (fraud at 0.1%) → pr-auc, because roc-auc looks flatteringly high when true negatives dominate. offline metric vs business metric — axis: none — you need both. offline (auc, rmse) gates what ships; the business metric (revenue, retention) is the real target. wrong pick: shipping on offline gains alone → the a/b test shows no lift (see experimentation). data data lake vs warehouse vs lakehouse — axis: schema-on-read vs schema-on-write. lake = raw, cheap, any format, schema-on-read (great for ml/exploration). warehouse = clean, structured, schema-on-write, fast sql (great for bi). lakehouse (databricks/delta) = one system for both. wrong pick: forcing raw sensor data into a warehouse schema up front throws away signal you didn't know you needed. batch vs streaming (data) — axis: required freshness. default batch — simpler, cheaper, easy to backfill. streaming only when you need sub-minute freshness (fraud, live personalization). wrong pick: standing up kafka+flink for a nightly report burns complexity for zero business value. normalization vs standardization — axis: distribution + model. standardize (zero mean, unit variance) for roughly-gaussian features and distance/gradient models. min-max normalize for bounded ranges (images to 0–1). note: trees need neither. oversample vs undersample vs class weights — axis: how much data you can spare. lots of data → undersample the majority. scarce data → oversample/smote the minority. simplest first → class weights in the loss. wrong pick: oversampling before the train/test split leaks duplicates across the split and inflates your score. build vs buy a feature store — axis: train/serve skew risk × team size. the value is defining a feature once and serving it to both training and inference, killing skew. buy (feast/tecton) when many models share features; skip it for one model with simple features. experimentation grid vs random vs bayesian search — axis: how expensive is one training run? cheap runs / few params → grid. many params → random (finds good regions faster). expensive runs (deep nets) → bayesian (optuna) to spend trials wisely. wrong pick: grid search over 6 hyperparameters is exponential and wasteful. holdout vs k-fold cv — axis: dataset size. big data → a single holdout is enough and cheap. small data → k-fold for a stable estimate. wrong pick: one small holdout gives a noisy, lucky-or-unlucky number. a/b test vs offline eval — axis: do you need proof of real-world impact? offline gates candidates cheaply; the a/b test is the only thing that proves business lift on live users. wrong pick: trusting offline lift → you ship a model users quietly hate. watch significance, sample size/duration, and guardrail metrics. mlops & serving batch vs online vs streaming serving — axis: when is the prediction needed? later/in bulk → batch (cheapest, no always-on service). per user request, now → online api. per event, continuously → streaming. default: if a nightly table satisfies the product, don't build a real-time service. rest vs grpc — axis: latency + who calls it. rest/json for public, browser-facing, easy-to-debug endpoints. grpc (binary, http/2) for internal, high-throughput, service-to-service and streaming — lower latency and payload. fastapi vs a dedicated model server — axis: gpu + throughput needs. fastapi/bentoml for a simple cpu model or glue logic. triton/torchserve/tf-serving when you need gpu dynamic batching , multi-model, and high throughput. llms → vllm/tgi specifically (paged-attention batching). wrong pick: a raw fastapi loop wastes the gpu by serving one request at a time. canary vs blue-green vs shadow — axis: what risk are you buying down? canary = small traffic slice first (catch bad models on few users). blue-green = two full envs, instant switch/rollback (minimize downtime). shadow = run on real traffic but don't use the output (validate safely, zero user risk). often shadow → canary → full. registry vs versioned files in a bucket — axis: do you need staged promotion + audit? a registry (mlflow/unity) adds staging→prod promotion, lineage, and one-click rollback. files in s3 work for a solo experiment but give you no promotion story or audit trail. monitoring data drift vs concept drift — axis: what changed? data/covariate drift = the inputs shift (new user mix) → often a retrain fixes it. concept drift = the input→output relationship shifts (fraud tactics change) → the problem itself moved; retraining on old labels won't save you. wrong pick: treating concept drift as data drift → you retrain and still degrade. psi vs kl vs ks for drift — axis: feature type + what you have. all compare live vs a training baseline without labels . psi = a simple, thresholded bucketed score (industry default). kl = information-theoretic divergence. ks = distance for continuous distributions. real accuracy comes later, once labels land. schedule vs trigger retraining — axis: predictable decay vs event-driven. schedule = a floor (nightly/weekly). drift/perf trigger = react when it actually degrades. do both, and always gate : promote only if the new model beats production on a fresh holdout. cloud & optimization managed platform vs diy on kubernetes — axis: control vs ops burden. sagemaker/vertex = fast, less to run, some lock-in. self-managed k8s (kserve/kubeflow) = full control and portability, more to operate. default: start managed; go diy when cost or flexibility forces it. spot/preemptible vs on-demand — axis: is the work interruptible? spot (50–90% cheaper) for fault-tolerant training with checkpointing . on-demand for latency-critical serving that can't vanish mid-request. wrong pick: spot for a live endpoint → it disappears under load. data vs model vs pipeline parallelism — axis: does the model fit on one gpu? fits → data parallelism (replicate, split the batch, average gradients) — the default. too big → model/tensor parallelism (split the model) or pipeline parallelism (split by layer stage). say this: \"data parallelism first; model parallelism only when a single gpu can't hold the weights.\" quantization vs pruning vs distillation — axis: how you're shrinking. quantization = lower-precision numbers (fp16/int8), biggest win for least effort → try first. pruning = drop unimportant weights. distillation = train a small student to mimic a big teacher. order: quantize → prune → distill. cpu vs gpu inference — axis: model size × qps. small models / low traffic → cpu is cheaper and simpler. large models or high throughput with batching → gpu. wrong pick: a gpu serving 3 requests/sec is money on fire. latency vs throughput — axis: you're usually trading them. latency = one prediction's speed (user-facing sla). throughput = predictions/sec (cost efficiency). batching raises throughput but adds latency — tune the batch window to your p99 budget. profile before optimizing; attack the biggest number. generative ai prompt vs rag vs fine-tune — axis: what's actually missing? prompt first (free, instant). missing knowledge/your data → rag (grounds answers, cuts hallucination, updates by re-indexing). wrong behavior/format/tone that no prompt fixes → fine-tune. wrong pick — the classic: fine-tuning to inject facts. rag is cheaper and right for facts. full fine-tune vs lora/peft — axis: budget × how many tasks. lora trains <1% of params → cheap, fast, swappable adapters per task, tiny artifacts. full fine-tune only when you have the data/compute and need to move the whole model. default: lora. closed api vs open self-hosted llm — *axis: control/privacy/cost-at-scale vs time-to-market.* api (gpt/claude) = best quality, zero ops, per-token cost, data leaves your walls. self-hosted (llama/mistral on vllm) = data stays in, cheaper at high volume, customizable, but you run the gpus. axis for regulated/on-prem work: privacy usually forces self-hosting. bigger context vs rag — axis: cost + relevance. stuffing everything into a huge context is simple but expensive and dilutes attention. rag retrieves only what's relevant → cheaper, sharper, and cites sources. wrong pick: paying for 100k tokens when top-5 chunks would do. how you'd say it \"for almost every one of these i start from the axis the decision turns on, default to the simpler and cheaper option — batch over streaming, boosting over deep nets on tables, prompt before rag before fine-tuning — and only add complexity when the requirement forces it. then i name what the wrong pick actually costs. that framing matters more than any single verdict, because the numbers change but the axis doesn't.\" self-check what three beats does every \"x vs y\" answer need? *(the deciding axis; the rule + simpler default; the wrong-pick failure mode.)* rag vs fine-tuning — the axis and the classic mistake? *(axis = knowledge vs behavior; mistake = fine-tuning to add facts.)* data vs model parallelism — the deciding axis? (does the model fit on one gpu.) why default to batch serving and undersampling-with-care? *(cheaper/simpler; and oversampling before the split leaks duplicates.)* spot vs on-demand — the one word that decides it? (interruptibility.)","words":1873},{"path":"11-drill-bank/cheat-sheet.md","title":"One-Page Cheat Sheet","section":"11 · Drill Bank","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"one-page-cheat-sheet\">One-Page Cheat Sheet<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The whole pack compressed — key distinctions, decision rules, and \"say this\" lines. Skim this last.<\/div><\/div>\n<h2 id=\"the-lifecycle-your-answer-skeleton\">The lifecycle (your answer skeleton)<\/h2>\n<p>frame → data → features → train → evaluate → deploy → monitor → retrain. <strong>A loop<\/strong>, because of drift. \"ML Engineer\" = the deploy → monitor → retrain half.<\/p>\n<h2 id=\"modeling\">Modeling<\/h2>\n<ul><li>Tabular → <strong>gradient boosting<\/strong> (XGBoost). Unstructured/huge → <strong>deep learning<\/strong>.<\/li><li><strong>Bagging<\/strong> = parallel, cuts variance. <strong>Boosting<\/strong> = sequential, cuts bias.<\/li><li>Overfit = great train / poor test → more data, regularization, simpler. Underfit = poor<\/li><\/ul>\n<p>both → more expressive, better features.<\/p>\n<ul><li>Metrics: precision (false positives costly), recall (misses costly), F1/PR-AUC (imbalance).<\/li><\/ul>\n<p>Accuracy lies under imbalance. Offline metric ≠ business metric.<\/p>\n<h2 id=\"data\">Data<\/h2>\n<ul><li><strong>Lake<\/strong> = raw/cheap (schema-on-read); <strong>warehouse<\/strong> = clean/structured (schema-on-write).<\/li><li><strong>Batch<\/strong> (default: simple, cheap) vs <strong>streaming<\/strong> (only when freshness demands).<\/li><li><strong>Leakage<\/strong> = train-time use of prediction-time-unavailable info → fit preprocessing on<\/li><\/ul>\n<p>train split only.<\/p>\n<ul><li><strong>Feature store<\/strong> kills <strong>train/serve skew<\/strong>: define a feature once, serve offline+online.<\/li><\/ul>\n<h2 id=\"experimentation\">Experimentation<\/h2>\n<ul><li>3 splits: train (fit) / validation (tune) / test (once). Time-series → split by time.<\/li><li><strong>Track every run<\/strong> (params, metrics, artifacts, data version) → reproducibility.<\/li><li><strong>A/B test<\/strong> for real impact: significance + sample/duration + guardrails.<\/li><\/ul>\n<h2 id=\"mlops\">MLOps<\/h2>\n<ul><li>Version <strong>code + data + model<\/strong>. <strong>Container<\/strong> for reproducible environment.<\/li><li><strong>Registry<\/strong> = versioning + staged promotion + rollback.<\/li><li>Rollout: <strong>canary / blue-green / shadow<\/strong>. CI/CD/<strong>CT<\/strong> (continuous training).<\/li><\/ul>\n<h2 id=\"monitoring\">Monitoring<\/h2>\n<ul><li>Models fail <strong>silently<\/strong>. Watch ops (latency p99, errors) + model (drift, quality).<\/li><li><strong>Data drift<\/strong> (inputs shift) vs <strong>concept drift<\/strong> (relationship shifts). Detect via PSI/KL<\/li><\/ul>\n<p>on distributions (no labels needed); real accuracy comes later.<\/p>\n<ul><li>Retrain: schedule + drift trigger; <strong>gate<\/strong> on beating production on a holdout.<\/li><\/ul>\n<h2 id=\"cloud-optimization\">Cloud &amp; optimization<\/h2>\n<ul><li>Platforms: <strong>SageMaker / Vertex AI / Azure ML<\/strong>. Primitives: object storage, GPU compute,<\/li><\/ul>\n<p>managed platform, K8s.<\/p>\n<ul><li><strong>K8s<\/strong> = scale + self-heal + rollout. <strong>IaC<\/strong> (Terraform) = reproducible infra.<\/li><li>Cheap GPUs: <strong>spot + checkpointing<\/strong>. Cheap serving: batch, autoscale/scale-to-zero.<\/li><li>Shrink model: <strong>quantization<\/strong> (FP16/INT8) → <strong>pruning<\/strong> → <strong>distillation<\/strong>.<\/li><li>Scale training: <strong>data parallelism<\/strong> (default), model/pipeline parallelism (too big),<\/li><\/ul>\n<p>mixed precision.<\/p>\n<ul><li>Serve fast: <strong>batching<\/strong>, caching, <strong>TensorRT/ONNX<\/strong> compile. Profile first.<\/li><\/ul>\n<h2 id=\"generative-ai\">Generative AI<\/h2>\n<ul><li>LLM = big transformer, <strong>next-token prediction<\/strong>; <strong>attention<\/strong> = weigh all tokens in<\/li><\/ul>\n<p>parallel. <strong>Context window<\/strong> = working memory, drives cost.<\/p>\n<ul><li>Decision spine: <strong>prompt → RAG (add knowledge) → fine-tune (change behavior)<\/strong>.<\/li><li><strong>RAG<\/strong> = embed docs → vector DB → retrieve → ground the prompt. Fixes stale facts +<\/li><\/ul>\n<p>hallucination.<\/p>\n<ul><li><strong>LoRA<\/strong> = train &lt;1% adapters, cheap + swappable. Fine-tune for <em>behavior<\/em>, not facts.<\/li><li>LLMOps: cost per token, token-by-token latency, guardrails, hard eval (human /<\/li><\/ul>\n<p>LLM-as-judge / groundedness).<\/p>\n<h2 id=\"system-design\">System design<\/h2>\n<ul><li><strong>Clarify first<\/strong> (scope, scale, latency, metric). Then: frame → data/features → model →<\/li><\/ul>\n<p>serving → monitoring, trading off out loud.<\/p>\n<ul><li><strong>Two-stage<\/strong>: cheap candidate generation → expensive ranking. Baseline first.<\/li><li>Recommender gotchas: <strong>cold start<\/strong>, <strong>feedback loops<\/strong> (add exploration), freshness.<\/li><\/ul>\n<h2 id=\"the-three-say-this-instincts\">The three \"say this\" instincts<\/h2>\n<ol><li>*\"I default to the simpler/cheaper option (batch, small model, prompt) and add complexity<\/li><\/ol>\n<p>only when the requirement demands it.\"*<\/p>\n<ol><li><em>\"I profile to find the real bottleneck and attack the biggest number — I don't guess.\"<\/em><\/li><li>*\"A model isn't done at deploy — I monitor for silent decay and retrain, with a quality<\/li><\/ol>\n<p>gate and safe rollout.\"*<\/p>\n<h2 id=\"tool-map-the-production-stack-at-a-glance\">🔗 Tool map: the production stack at a glance<\/h2>\n<ul><li><strong>Storage:<\/strong> lake = S3/GCS + Delta/Iceberg · warehouse = Snowflake/BigQuery · lakehouse = Databricks + Unity Catalog.<\/li><li><strong>Pipelines:<\/strong> batch = Spark/dbt + Airflow · streaming = Kafka + Flink · quality = Great Expectations.<\/li><li><strong>Features:<\/strong> Feast (offline = Delta/BigQuery, online = Redis/DynamoDB).<\/li><li><strong>Train:<\/strong> scikit-learn/XGBoost, PyTorch/HuggingFace · scale = DDP/FSDP/DeepSpeed, Ray · tune = Optuna/Ray Tune.<\/li><li><strong>Track/registry:<\/strong> MLflow, W&amp;B; DVC for data; Unity Catalog for governance.<\/li><li><strong>Serve:<\/strong> FastAPI/BentoML, Triton, KServe/Seldon, SageMaker/Vertex endpoints · LLM = vLLM/TGI.<\/li><li><strong>CI/CD/CT:<\/strong> GitHub Actions + Kubeflow/Vertex Pipelines/Airflow · rollout = KServe/Argo canary.<\/li><li><strong>Monitor:<\/strong> Evidently/Arize + Prometheus/Grafana + Alertmanager; SageMaker Model Monitor.<\/li><li><strong>Cloud/infra:<\/strong> SageMaker/Vertex/Azure ML/Databricks · K8s (EKS/GKE/AKS) · Terraform · spot + Karpenter.<\/li><li><strong>Optimize:<\/strong> TensorRT/ONNX Runtime, bitsandbytes/GGUF (LLM); Triton batching; Redis cache.<\/li><li><strong>GenAI/RAG:<\/strong> LangChain/LlamaIndex · vector DB = Pinecone/Weaviate/Qdrant/pgvector/FAISS · embeddings = BGE/OpenAI · fine-tune = PEFT/LoRA + bitsandbytes/Axolotl · eval = Ragas/LangSmith/Langfuse · guardrails = Guardrails AI/NeMo.<\/li><\/ul>","toc":[{"level":2,"id":"the-lifecycle-your-answer-skeleton","text":"The lifecycle (your answer skeleton)"},{"level":2,"id":"modeling","text":"Modeling"},{"level":2,"id":"data","text":"Data"},{"level":2,"id":"experimentation","text":"Experimentation"},{"level":2,"id":"mlops","text":"MLOps"},{"level":2,"id":"monitoring","text":"Monitoring"},{"level":2,"id":"cloud-optimization","text":"Cloud &amp; optimization"},{"level":2,"id":"generative-ai","text":"Generative AI"},{"level":2,"id":"system-design","text":"System design"},{"level":2,"id":"the-three-say-this-instincts","text":"The three \"say this\" instincts"},{"level":2,"id":"tool-map-the-production-stack-at-a-glance","text":"🔗 Tool map: the production stack at a glance"}],"text":"one-page cheat sheet 💡 tl;dr the whole pack compressed — key distinctions, decision rules, and \"say this\" lines. skim this last. the lifecycle (your answer skeleton) frame → data → features → train → evaluate → deploy → monitor → retrain. a loop , because of drift. \"ml engineer\" = the deploy → monitor → retrain half. modeling tabular → gradient boosting (xgboost). unstructured/huge → deep learning . bagging = parallel, cuts variance. boosting = sequential, cuts bias. overfit = great train / poor test → more data, regularization, simpler. underfit = poor both → more expressive, better features. metrics: precision (false positives costly), recall (misses costly), f1/pr-auc (imbalance). accuracy lies under imbalance. offline metric ≠ business metric. data lake = raw/cheap (schema-on-read); warehouse = clean/structured (schema-on-write). batch (default: simple, cheap) vs streaming (only when freshness demands). leakage = train-time use of prediction-time-unavailable info → fit preprocessing on train split only. feature store kills train/serve skew : define a feature once, serve offline+online. experimentation 3 splits: train (fit) / validation (tune) / test (once). time-series → split by time. track every run (params, metrics, artifacts, data version) → reproducibility. a/b test for real impact: significance + sample/duration + guardrails. mlops version code + data + model . container for reproducible environment. registry = versioning + staged promotion + rollback. rollout: canary / blue-green / shadow . ci/cd/ ct (continuous training). monitoring models fail silently . watch ops (latency p99, errors) + model (drift, quality). data drift (inputs shift) vs concept drift (relationship shifts). detect via psi/kl on distributions (no labels needed); real accuracy comes later. retrain: schedule + drift trigger; gate on beating production on a holdout. cloud & optimization platforms: sagemaker / vertex ai / azure ml . primitives: object storage, gpu compute, managed platform, k8s. k8s = scale + self-heal + rollout. iac (terraform) = reproducible infra. cheap gpus: spot + checkpointing . cheap serving: batch, autoscale/scale-to-zero. shrink model: quantization (fp16/int8) → pruning → distillation . scale training: data parallelism (default), model/pipeline parallelism (too big), mixed precision. serve fast: batching , caching, tensorrt/onnx compile. profile first. generative ai llm = big transformer, next-token prediction ; attention = weigh all tokens in parallel. context window = working memory, drives cost. decision spine: prompt → rag (add knowledge) → fine-tune (change behavior) . rag = embed docs → vector db → retrieve → ground the prompt. fixes stale facts + hallucination. lora = train <1% adapters, cheap + swappable. fine-tune for behavior , not facts. llmops: cost per token, token-by-token latency, guardrails, hard eval (human / llm-as-judge / groundedness). system design clarify first (scope, scale, latency, metric). then: frame → data/features → model → serving → monitoring, trading off out loud. two-stage : cheap candidate generation → expensive ranking. baseline first. recommender gotchas: cold start , feedback loops (add exploration), freshness. the three \"say this\" instincts *\"i default to the simpler/cheaper option (batch, small model, prompt) and add complexity only when the requirement demands it.\"* \"i profile to find the real bottleneck and attack the biggest number — i don't guess.\" *\"a model isn't done at deploy — i monitor for silent decay and retrain, with a quality gate and safe rollout.\"* 🔗 tool map: the production stack at a glance storage: lake = s3/gcs + delta/iceberg · warehouse = snowflake/bigquery · lakehouse = databricks + unity catalog. pipelines: batch = spark/dbt + airflow · streaming = kafka + flink · quality = great expectations. features: feast (offline = delta/bigquery, online = redis/dynamodb). train: scikit-learn/xgboost, pytorch/huggingface · scale = ddp/fsdp/deepspeed, ray · tune = optuna/ray tune. track/registry: mlflow, w&b; dvc for data; unity catalog for governance. serve: fastapi/bentoml, triton, kserve/seldon, sagemaker/vertex endpoints · llm = vllm/tgi. ci/cd/ct: github actions + kubeflow/vertex pipelines/airflow · rollout = kserve/argo canary. monitor: evidently/arize + prometheus/grafana + alertmanager; sagemaker model monitor. cloud/infra: sagemaker/vertex/azure ml/databricks · k8s (eks/gke/aks) · terraform · spot + karpenter. optimize: tensorrt/onnx runtime, bitsandbytes/gguf (llm); triton batching; redis cache. genai/rag: langchain/llamaindex · vector db = pinecone/weaviate/qdrant/pgvector/faiss · embeddings = bge/openai · fine-tune = peft/lora + bitsandbytes/axolotl · eval = ragas/langsmith/langfuse · guardrails = guardrails ai/nemo.","words":683},{"path":"12-nvidia-model-optimization/README.md","title":"Overview","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"12-nvidia-model-optimization\">12: NVIDIA Model Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A focused deep-dive for an <strong>NVIDIA model-optimization interview<\/strong>. Section 8 covers optimization at ML-engineer altitude; this section goes to the level NVIDIA actually probes: the <strong>numerics of quantization<\/strong>, <strong>TensorRT internals<\/strong>, <strong>GPU architecture and profiling<\/strong>, <strong>sparsity<\/strong>, and <strong>LLM inference<\/strong>. It also turns your FashionMNIST quantization experiment into a story you can tell out loud.<\/div><\/div>\n<h2 id=\"why-a-separate-section\">Why a separate section<\/h2>\n<p>An NVIDIA model-optimization role (Deep Learning Software Engineer, TensorRT / Model Optimization, Deep Learning Performance) is not tested like a generic ML-Engineer role. They assume you can train a model and instead push on: <em>do you understand what INT8 actually does to the numbers, how TensorRT turns a graph into fast kernels, why a kernel is memory-bound vs compute-bound, and how you'd prove any of it with a profiler.<\/em> This section is written to survive that follow-up chain of \"…and why?\"<\/p>\n<h2 id=\"what-they-actually-test\">What they actually test<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Theme<\/th><th>Page<\/th><th>The question behind it<\/th><\/tr><\/thead><tbody><tr><td>Quantization numerics<\/td><td>Quantization, Deeply<\/td><td>\"Derive the INT8 scale. Symmetric or asymmetric — why?\"<\/td><\/tr><tr><td>GPU number formats<\/td><td>Numerical Precision<\/td><td>\"FP16 vs BF16 vs FP8 vs TF32 — when each, and why loss scaling?\"<\/td><\/tr><tr><td>TensorRT<\/td><td>TensorRT Internals<\/td><td>\"How does TensorRT make it fast? Implicit vs explicit quantization?\"<\/td><\/tr><tr><td>Inference ecosystem<\/td><td>The Modern Inference Stack<\/td><td>\"Where do vLLM, SGLang, Triton, Dynamo, compilers, and kernels fit?\"<\/td><\/tr><tr><td>Performance analysis<\/td><td>GPU Performance &amp; Profiling<\/td><td>\"Is this kernel compute- or memory-bound? Prove it.\"<\/td><\/tr><tr><td>Model compression<\/td><td>Sparsity, Pruning, Distillation<\/td><td>\"What's 2:4 sparsity and why does hardware care?\"<\/td><\/tr><tr><td>LLM serving<\/td><td>LLM Inference Optimization<\/td><td>\"KV cache, FlashAttention, in-flight batching, TP vs PP.\"<\/td><\/tr><tr><td>Your project<\/td><td>Experiment Walkthrough<\/td><td>\"Walk me through something you optimized.\"<\/td><\/tr><tr><td>Rapid fire<\/td><td>Interview Q&amp;A<\/td><td>The last-mile drill set.<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-one-mental-model-to-carry-in\">The one mental model to carry in<\/h2>\n<p>Optimization lives on <strong>three axes<\/strong> that interviewers love to see you separate cleanly:<\/p>\n<div class=\"diagram\">\n  <table class=\"maptable\">\n    <tbody>\n      <tr><td class=\"mfrom\"><b>METHOD<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">how you pick int8-friendly weights / scales <span style=\"color:var(--muted)\">— PTQ, QAT, calibration<\/span><\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>FORMAT<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">which numbers you compute in <span style=\"color:var(--muted)\">— FP32 / TF32 / FP16 / BF16 / FP8 / INT8 / INT4<\/span><\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>ENGINE<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">where / how the math runs fast <span style=\"color:var(--muted)\">— TensorRT, Triton, CUDA kernels, fusion<\/span><\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<p>Almost every question is really asking you to hold two of these apart. Your own project's core insight — <em>\"PTQ/QAT is the method axis, TensorRT is the engine axis\"<\/em> — is exactly this framing, and it's the thing that makes you sound like you've done it, not read it.<\/p>\n<h2 id=\"suggested-order\">Suggested order<\/h2>\n<p>Read <strong>Quantization, Deeply<\/strong> and <strong>Numerical Precision<\/strong> first — everything else builds on the numerics. Then <strong>TensorRT Internals<\/strong> and <strong>GPU Performance<\/strong> (the two hardest follow-up areas). <strong>Sparsity/Distillation<\/strong> and <strong>LLM Inference<\/strong> round out breadth. Finish on the <strong>Experiment Walkthrough<\/strong> and <strong>Interview Q&amp;A<\/strong> to rehearse delivery.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"quantization-deep.md\" href=\"#\">quantization-deep.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-a-separate-section","text":"Why a separate section"},{"level":2,"id":"what-they-actually-test","text":"What they actually test"},{"level":2,"id":"the-one-mental-model-to-carry-in","text":"The one mental model to carry in"},{"level":2,"id":"suggested-order","text":"Suggested order"}],"text":"12: nvidia model optimization 💡 tl;dr a focused deep-dive for an nvidia model-optimization interview . section 8 covers optimization at ml-engineer altitude; this section goes to the level nvidia actually probes: the numerics of quantization , tensorrt internals , gpu architecture and profiling , sparsity , and llm inference . it also turns your fashionmnist quantization experiment into a story you can tell out loud. why a separate section an nvidia model-optimization role (deep learning software engineer, tensorrt / model optimization, deep learning performance) is not tested like a generic ml-engineer role. they assume you can train a model and instead push on: do you understand what int8 actually does to the numbers, how tensorrt turns a graph into fast kernels, why a kernel is memory-bound vs compute-bound, and how you'd prove any of it with a profiler. this section is written to survive that follow-up chain of \"…and why?\" what they actually test theme page the question behind it quantization numerics quantization, deeply \"derive the int8 scale. symmetric or asymmetric — why?\" gpu number formats numerical precision \"fp16 vs bf16 vs fp8 vs tf32 — when each, and why loss scaling?\" tensorrt tensorrt internals \"how does tensorrt make it fast? implicit vs explicit quantization?\" inference ecosystem the modern inference stack \"where do vllm, sglang, triton, dynamo, compilers, and kernels fit?\" performance analysis gpu performance & profiling \"is this kernel compute- or memory-bound? prove it.\" model compression sparsity, pruning, distillation \"what's 2:4 sparsity and why does hardware care?\" llm serving llm inference optimization \"kv cache, flashattention, in-flight batching, tp vs pp.\" your project experiment walkthrough \"walk me through something you optimized.\" rapid fire interview q&a the last-mile drill set. the one mental model to carry in optimization lives on three axes that interviewers love to see you separate cleanly: method how you pick int8-friendly weights / scales — ptq, qat, calibration format which numbers you compute in — fp32 / tf32 / fp16 / bf16 / fp8 / int8 / int4 engine where / how the math runs fast — tensorrt, triton, cuda kernels, fusion almost every question is really asking you to hold two of these apart. your own project's core insight — \"ptq/qat is the method axis, tensorrt is the engine axis\" — is exactly this framing, and it's the thing that makes you sound like you've done it, not read it. suggested order read quantization, deeply and numerical precision first — everything else builds on the numerics. then tensorrt internals and gpu performance (the two hardest follow-up areas). sparsity/distillation and llm inference round out breadth. finish on the experiment walkthrough and interview q&a to rehearse delivery. → start: quantization-deep.md","words":442},{"path":"12-nvidia-model-optimization/quantization-deep.md","title":"Quantization, Deeply","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"quantization-deeply\">Quantization, Deeply<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Quantization maps a range of floats onto a small set of integers with a <strong>scale<\/strong> (and maybe a <strong>zero-point<\/strong>). Everything interesting — accuracy loss, calibration, symmetric vs asymmetric, per-channel — falls out of <em>how you pick that scale<\/em>. Your project did PTQ and QAT; this page is the numeric layer underneath them that NVIDIA will drill.<\/div><\/div>\n<h2 id=\"the-core-mapping-know-the-formula-cold\">The core mapping (know the formula cold)<\/h2>\n<p>Quantization is an <strong>affine map<\/strong> between a real value <code>r<\/code> and an integer <code>q<\/code>:<\/p>\n<div class=\"formula\">\n  <div class=\"frow\"><span class=\"fexpr\">r ≈ <span class=\"fv\">scale<\/span> · (q − <span class=\"fv\">zero_point<\/span>)<\/span><span class=\"fnote\">dequantize<\/span><\/div>\n  <div class=\"frow\"><span class=\"fexpr\">q = round(r / <span class=\"fv\">scale<\/span>) + <span class=\"fv\">zero_point<\/span><\/span><span class=\"fnote\">quantize, then clamp to [qmin, qmax]<\/span><\/div>\n<\/div>\n<ul><li><strong>scale<\/strong> (a float) — the size of one integer step in real units.<\/li><li><strong>zero_point<\/strong> (an integer) — which integer maps to real 0.0.<\/li><li>For signed INT8, <code>qmin=−128, qmax=127<\/code>; for unsigned, <code>0…255<\/code>.<\/li><\/ul>\n<p>That's the whole idea. Two choices define a quantizer: <strong>how wide a range<\/strong> you cover (calibration) and <strong>whether zero-point is forced to 0<\/strong> (symmetric vs asymmetric).<\/p>\n<p><strong>Play with the mapping.<\/strong> Set a tensor range, pick a value, and watch the scale, zero-point, the int8 code it snaps to, and the rounding error. Notice how a <em>wider<\/em> range makes the step (scale) bigger, so every value gets a coarser approximation — and how symmetric wastes half a code on the unused sign when the data is all-positive.<\/p>\n<div id=\"quant-widget\" class=\"widget-host\"><\/div>\n<h2 id=\"symmetric-vs-asymmetric\">Symmetric vs asymmetric<\/h2>\n<ul><li><strong>Symmetric:<\/strong> <code>zero_point = 0<\/code>, range is <code>[−α, α]<\/code>, <code>scale = α / 127<\/code>. Real 0 maps to<\/li><\/ul>\n<p>integer 0. Cheaper math (no zero-point term in the matmul), and it's what <strong>weights<\/strong> use.<\/p>\n<ul><li><strong>Asymmetric (affine):<\/strong> range is <code>[β, α]<\/code> with a non-zero zero-point, so it can hug a<\/li><\/ul>\n<p>one-sided distribution tightly. Used for <strong>activations<\/strong> after ReLU (all ≥ 0) where a   symmetric range would waste half the codes.<\/p>\n<p>The interview one-liner: <em>\"Weights symmetric per-channel, activations asymmetric (or symmetric) per-tensor — weights are roughly zero-centered so symmetric wastes nothing and skips the zero-point term; post-ReLU activations are one-sided so asymmetric buys back a bit.\"<\/em><\/p>\n<h2 id=\"per-tensor-vs-per-channel-this-explains-your-accuracy-cliff\">Per-tensor vs per-channel (this explains your accuracy cliff)<\/h2>\n<ul><li><strong>Per-tensor:<\/strong> one scale for the entire weight tensor. Simplest, but if one output<\/li><\/ul>\n<p>channel has a much larger range than the others, the small-range channels get crushed   into a handful of integer codes.<\/p>\n<ul><li><strong>Per-channel (per-axis):<\/strong> one scale <strong>per output channel<\/strong> of a conv/linear weight.<\/li><\/ul>\n<p>Each channel uses the full INT8 range. This is the standard fix and it's nearly free   (scales are applied along the output axis after the matmul).<\/p>\n<blockquote><p><strong>Your project's ~0.83 INT8 cliff is almost certainly this.<\/strong> A small 5-conv model has few channels and uneven weight ranges, so <strong>per-tensor<\/strong> weight quantization loses a lot. Say in the interview: <em>\"On such a small net I'd expect per-channel weight quantization and more calibration data to recover most of that drop before I even reach for QAT.\"<\/em> That is exactly the kind of diagnosis they want.<\/p><\/blockquote>\n<h2 id=\"calibration-how-you-choose-the-range\">Calibration: how you choose the range α<\/h2>\n<p>PTQ never touches weights — it just runs batches to observe activation ranges and picks <code>α<\/code>. <strong>How<\/strong> you pick it is the calibration algorithm, and it matters a lot:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Calibrator<\/th><th>Rule<\/th><th>Trade-off<\/th><\/tr><\/thead><tbody><tr><td><strong>Min–max<\/strong><\/td><td>α = observed max<\/td><td>Simple; one outlier blows the scale up and wastes codes.<\/td><\/tr><tr><td><strong>Entropy / KL<\/strong> (TensorRT default, <code>IInt8EntropyCalibrator2<\/code>)<\/td><td>clip α to minimize KL divergence between the FP32 and INT8 activation histograms<\/td><td>Robust to outliers; usually best accuracy.<\/td><\/tr><tr><td><strong>Percentile<\/strong><\/td><td>α = e.g. 99.99th percentile<\/td><td>Cheap outlier rejection; needs the percentile tuned.<\/td><\/tr><tr><td><strong>MSE<\/strong><\/td><td>α minimizing quantization MSE<\/td><td>Good, a bit slower.<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The insight worth stating: <strong>calibration is a clipping decision.<\/strong><\/p>\n<ul><li><strong>Wider α<\/strong> — covers outliers, but every step gets coarser.<\/li><li><strong>Tighter α<\/strong> — finer steps, but clips the tails.<\/li><li><strong>Entropy<\/strong> picks the α that best preserves the <em>distribution's information<\/em> — which is why<\/li><\/ul>\n<p>TensorRT defaults to it.<\/p>\n<p>So swapping to <code>IInt8MinMaxCalibrator<\/code> (a \"next step\" in your notes) is a real experiment, not a cosmetic one.<\/p>\n<h2 id=\"ptq-vs-qat-the-numeric-picture\">PTQ vs QAT: the numeric picture<\/h2>\n<p>Your notes nail the intuition; here's the mechanism under it:<\/p>\n<ul><li><strong>PTQ<\/strong> solves <em>\"given fixed weights, pick scales that lose the least accuracy.\"<\/em> No<\/li><\/ul>\n<p>gradients. Minutes. Fails when the weight distribution is inherently hard to represent in   INT8 (outliers, wide per-tensor range).<\/p>\n<ul><li><strong>QAT<\/strong> inserts <strong>fake-quant<\/strong> nodes: forward pass does <code>dequant(quant(x))<\/code> so the model<\/li><\/ul>\n<p><em>feels<\/em> rounding, but gradients flow through via the <strong>Straight-Through Estimator (STE)<\/strong> —   the quantizer's derivative is treated as 1 in the pass-through region. Training then nudges   weights to be robust to rounding and can even learn the ranges. Recovers accuracy PTQ can't.<\/p>\n<p><strong>STE is a classic follow-up.<\/strong> <em>\"How do you backprop through a <code>round()<\/code>? Its gradient is 0 almost everywhere.\"<\/em> Answer: the <strong>straight-through estimator<\/strong> — pass the gradient straight through inside the clipping range, zero it outside, so the network still learns despite the non-differentiable rounding.<\/p>\n<h2 id=\"advanced-ptq-name-drop-these-theyre-nvidia-adjacent\">Advanced PTQ (name-drop these: they're NVIDIA-adjacent)<\/h2>\n<p>For LLMs, plain PTQ breaks because of <strong>activation outliers<\/strong>. Modern methods fix that without full retraining, and NVIDIA's <code>TensorRT-Model-Optimizer<\/code> implements them:<\/p>\n<ul><li><strong>SmoothQuant<\/strong> — migrate the \"difficulty\" from activations into weights by a per-channel<\/li><\/ul>\n<p>scaling, so both become easy to quantize. Enables INT8/FP8 on LLMs.<\/p>\n<ul><li><strong>AWQ (Activation-aware Weight Quantization)<\/strong> — protect the ~1% of weight channels that<\/li><\/ul>\n<p>matter most (by activation magnitude), quantize the rest to INT4. Weight-only.<\/p>\n<ul><li><strong>GPTQ<\/strong> — second-order (Hessian-based) layer-wise weight quantization to INT4/INT3.<\/li><li><strong>Weight-only (INT4) vs weight+activation (INT8/FP8):<\/strong> weight-only shrinks memory and<\/li><\/ul>\n<p>helps the memory-bound decode phase of LLMs; W8A8/FP8 also speeds compute-bound matmuls.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Native <strong>PyTorch<\/strong> quantization (<code>torch.ao.quantization<\/code>, fbgemm/qnnpack — <strong>CPU<\/strong> kernels, as your project found). On GPU: <strong>TensorRT<\/strong> calibrators for implicit PTQ, and <strong>NVIDIA TensorRT-Model-Optimizer<\/strong> (formerly parts of <code>pytorch-quantization<\/code>) for QAT/QDQ, SmoothQuant, AWQ, and FP8. For LLM weight-only: <strong>GPTQ<\/strong>, <strong>AWQ<\/strong>, <strong>bitsandbytes<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"On my FashionMNIST project the INT8 drop came from per-tensor weight quantization on a tiny net; per-channel scales plus entropy calibration recover most of it, and QAT with straight-through estimation buys back the rest by making the weights rounding-robust.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Write the dequant formula and say what scale and zero-point mean. *(r = scale·(q −<\/li><\/ul>\n<p>zero_point); scale = real size of one step, zero_point = integer that maps to 0.0.)*<\/p>\n<ul><li>Why symmetric for weights, asymmetric for post-ReLU activations? *(weights ~zero-centered<\/li><\/ul>\n<p>so symmetric wastes nothing and drops the zero-point term; ReLU output is one-sided so   asymmetric hugs it.)*<\/p>\n<ul><li>Why does entropy calibration usually beat min–max? *(min–max lets a single outlier inflate<\/li><\/ul>\n<p>the scale; entropy clips to preserve the distribution → finer steps where it matters.)*<\/p>\n<ul><li>How does QAT backprop through rounding? *(straight-through estimator: gradient ≈ 1 inside<\/li><\/ul>\n<p>the clip range, 0 outside.)*<\/p>","toc":[{"level":2,"id":"the-core-mapping-know-the-formula-cold","text":"The core mapping (know the formula cold)"},{"level":2,"id":"symmetric-vs-asymmetric","text":"Symmetric vs asymmetric"},{"level":2,"id":"per-tensor-vs-per-channel-this-explains-your-accuracy-cliff","text":"Per-tensor vs per-channel (this explains your accuracy cliff)"},{"level":2,"id":"calibration-how-you-choose-the-range","text":"Calibration: how you choose the range α"},{"level":2,"id":"ptq-vs-qat-the-numeric-picture","text":"PTQ vs QAT: the numeric picture"},{"level":2,"id":"advanced-ptq-name-drop-these-theyre-nvidia-adjacent","text":"Advanced PTQ (name-drop these: they're NVIDIA-adjacent)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"quantization, deeply 💡 tl;dr quantization maps a range of floats onto a small set of integers with a scale (and maybe a zero-point ). everything interesting — accuracy loss, calibration, symmetric vs asymmetric, per-channel — falls out of how you pick that scale . your project did ptq and qat; this page is the numeric layer underneath them that nvidia will drill. the core mapping (know the formula cold) quantization is an affine map between a real value r and an integer q : r ≈ scale · (q − zero_point ) dequantize q = round(r / scale ) + zero_point quantize, then clamp to [qmin, qmax] scale (a float) — the size of one integer step in real units. zero_point (an integer) — which integer maps to real 0.0. for signed int8, qmin=−128, qmax=127 ; for unsigned, 0…255 . that's the whole idea. two choices define a quantizer: how wide a range you cover (calibration) and whether zero-point is forced to 0 (symmetric vs asymmetric). play with the mapping. set a tensor range, pick a value, and watch the scale, zero-point, the int8 code it snaps to, and the rounding error. notice how a wider range makes the step (scale) bigger, so every value gets a coarser approximation — and how symmetric wastes half a code on the unused sign when the data is all-positive. symmetric vs asymmetric symmetric: zero_point = 0 , range is [−α, α] , scale = α / 127 . real 0 maps to integer 0. cheaper math (no zero-point term in the matmul), and it's what weights use. asymmetric (affine): range is [β, α] with a non-zero zero-point, so it can hug a one-sided distribution tightly. used for activations after relu (all ≥ 0) where a symmetric range would waste half the codes. the interview one-liner: \"weights symmetric per-channel, activations asymmetric (or symmetric) per-tensor — weights are roughly zero-centered so symmetric wastes nothing and skips the zero-point term; post-relu activations are one-sided so asymmetric buys back a bit.\" per-tensor vs per-channel (this explains your accuracy cliff) per-tensor: one scale for the entire weight tensor. simplest, but if one output channel has a much larger range than the others, the small-range channels get crushed into a handful of integer codes. per-channel (per-axis): one scale per output channel of a conv/linear weight. each channel uses the full int8 range. this is the standard fix and it's nearly free (scales are applied along the output axis after the matmul). your project's ~0.83 int8 cliff is almost certainly this. a small 5-conv model has few channels and uneven weight ranges, so per-tensor weight quantization loses a lot. say in the interview: \"on such a small net i'd expect per-channel weight quantization and more calibration data to recover most of that drop before i even reach for qat.\" that is exactly the kind of diagnosis they want. calibration: how you choose the range α ptq never touches weights — it just runs batches to observe activation ranges and picks α . how you pick it is the calibration algorithm, and it matters a lot: calibrator rule trade-off min–max α = observed max simple; one outlier blows the scale up and wastes codes. entropy / kl (tensorrt default, iint8entropycalibrator2 ) clip α to minimize kl divergence between the fp32 and int8 activation histograms robust to outliers; usually best accuracy. percentile α = e.g. 99.99th percentile cheap outlier rejection; needs the percentile tuned. mse α minimizing quantization mse good, a bit slower. the insight worth stating: calibration is a clipping decision. wider α — covers outliers, but every step gets coarser. tighter α — finer steps, but clips the tails. entropy picks the α that best preserves the distribution's information — which is why tensorrt defaults to it. so swapping to iint8minmaxcalibrator (a \"next step\" in your notes) is a real experiment, not a cosmetic one. ptq vs qat: the numeric picture your notes nail the intuition; here's the mechanism under it: ptq solves \"given fixed weights, pick scales that lose the least accuracy.\" no gradients. minutes. fails when the weight distribution is inherently hard to represent in int8 (outliers, wide per-tensor range). qat inserts fake-quant nodes: forward pass does dequant(quant(x)) so the model feels rounding, but gradients flow through via the straight-through estimator (ste) — the quantizer's derivative is treated as 1 in the pass-through region. training then nudges weights to be robust to rounding and can even learn the ranges. recovers accuracy ptq can't. ste is a classic follow-up. \"how do you backprop through a round() ? its gradient is 0 almost everywhere.\" answer: the straight-through estimator — pass the gradient straight through inside the clipping range, zero it outside, so the network still learns despite the non-differentiable rounding. advanced ptq (name-drop these: they're nvidia-adjacent) for llms, plain ptq breaks because of activation outliers . modern methods fix that without full retraining, and nvidia's tensorrt-model-optimizer implements them: smoothquant — migrate the \"difficulty\" from activations into weights by a per-channel scaling, so both become easy to quantize. enables int8/fp8 on llms. awq (activation-aware weight quantization) — protect the ~1% of weight channels that matter most (by activation magnitude), quantize the rest to int4. weight-only. gptq — second-order (hessian-based) layer-wise weight quantization to int4/int3. weight-only (int4) vs weight+activation (int8/fp8): weight-only shrinks memory and helps the memory-bound decode phase of llms; w8a8/fp8 also speeds compute-bound matmuls. 🔗 connecting the dots: the real stack native pytorch quantization ( torch.ao.quantization , fbgemm/qnnpack — cpu kernels, as your project found). on gpu: tensorrt calibrators for implicit ptq, and nvidia tensorrt-model-optimizer (formerly parts of pytorch-quantization ) for qat/qdq, smoothquant, awq, and fp8. for llm weight-only: gptq , awq , bitsandbytes . how you'd say it: \"on my fashionmnist project the int8 drop came from per-tensor weight quantization on a tiny net; per-channel scales plus entropy calibration recover most of it, and qat with straight-through estimation buys back the rest by making the weights rounding-robust.\" self-check write the dequant formula and say what scale and zero-point mean. *(r = scale·(q − zero_point); scale = real size of one step, zero_point = integer that maps to 0.0.)* why symmetric for weights, asymmetric for post-relu activations? *(weights ~zero-centered so symmetric wastes nothing and drops the zero-point term; relu output is one-sided so asymmetric hugs it.)* why does entropy calibration usually beat min–max? *(min–max lets a single outlier inflate the scale; entropy clips to preserve the distribution → finer steps where it matters.)* how does qat backprop through rounding? *(straight-through estimator: gradient ≈ 1 inside the clip range, 0 outside.)*","words":1090},{"path":"12-nvidia-model-optimization/numerical-precision.md","title":"Numerical Precision (FP32→FP8→INT8)","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"numerical-precision-fp32-fp8-int8\">Numerical Precision: FP32 → FP8 → INT8<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Every number format is a bet on <strong>range vs precision<\/strong> in a fixed bit budget. Floating point spends bits on an <strong>exponent<\/strong> (range) and a <strong>mantissa<\/strong> (precision); integer/INT8 has neither — just a fixed step. Knowing which format to reach for, and <em>why FP16 needs loss scaling but BF16 doesn't<\/em>, is table-stakes at NVIDIA.<\/div><\/div>\n<h2 id=\"the-formats-in-one-table\">The formats, in one table<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Format<\/th><th>Bits (E/M)<\/th><th>Dynamic range<\/th><th>Precision<\/th><th>Where it's used<\/th><\/tr><\/thead><tbody><tr><td><strong>FP32<\/strong><\/td><td>8 / 23<\/td><td>huge<\/td><td>high<\/td><td>Baseline; master weights in mixed precision.<\/td><\/tr><tr><td><strong>TF32<\/strong><\/td><td>8 / 10<\/td><td>= FP32<\/td><td>~FP16<\/td><td>Ampere+ tensor-core math for \"FP32\" matmuls (on by default).<\/td><\/tr><tr><td><strong>FP16<\/strong><\/td><td>5 / 10<\/td><td>narrow (~6e−5…65504)<\/td><td>good<\/td><td>Mixed-precision train/infer; <strong>needs loss scaling<\/strong>.<\/td><\/tr><tr><td><strong>BF16<\/strong><\/td><td>8 / 7<\/td><td>= FP32<\/td><td>lower<\/td><td>Training; no loss scaling needed.<\/td><\/tr><tr><td><strong>FP8 E4M3<\/strong><\/td><td>4 / 3<\/td><td>small<\/td><td>more mantissa<\/td><td>Hopper/Ada forward pass (weights/activations).<\/td><\/tr><tr><td><strong>FP8 E5M2<\/strong><\/td><td>5 / 2<\/td><td>larger<\/td><td>less mantissa<\/td><td>Gradients (needs range).<\/td><\/tr><tr><td><strong>INT8<\/strong><\/td><td>fixed step<\/td><td>set by scale<\/td><td>uniform<\/td><td>TensorRT inference; needs calibration.<\/td><\/tr><tr><td><strong>INT4<\/strong><\/td><td>fixed step<\/td><td>set by scale<\/td><td>coarse<\/td><td>L

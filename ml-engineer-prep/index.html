gs) compresses many features into a few while keeping the signal, useful for visualization and as input to other models. you reach for this when you don't have labels, or to explore data before modeling. reinforcement learning an agent takes actions in an environment and learns from a reward signal — think game-playing, robotics, or ad/recommendation policies that optimize long-term engagement. it's powerful but data-hungry and finicky, so in most product ml jobs it's a \"know the concept\" topic rather than a daily tool. note that rlhf (reinforcement learning from human feedback) is how llms are aligned (section 9), so it's worth recognizing. the algorithms worth knowing cold you don't need dozens — you need to defend a few and know their trade-offs: algorithm use it for why linear / logistic regression baselines, interpretable problems fast, explainable — always start here decision trees simple non-linear splits interpretable but overfit alone random forest tabular, robust default bagging → low variance, little tuning gradient boosting (xgboost/lightgbm) tabular winner usually best on structured data k-means clustering simple, fast segmentation neural networks images, text, audio, huge data learn features; overkill for small tabular the one line interviewers want \"for structured/tabular data i start with a boosted-tree model like xgboost — it's the strongest default. i only reach for deep learning when i have unstructured data (images, text) or very large datasets where learned features beat hand-crafted ones.\" that single sentence signals real-world judgment over hype. 🔗 connecting the dots: the real stack each family has a go-to library: scikit-learn for classical models, xgboost / lightgbm for boosting, pytorch and tensorflow/keras for deep learning, and huggingface for pretrained text/vision models. reinforcement learning uses rllib or stable-baselines3 ; rlhf for llms uses trl . how you'd say it: \"for tabular i reach for xgboost via scikit-learn; for anything unstructured i start from a pretrained pytorch model on huggingface and fine-tune.\" self-check classification vs regression? (predict a category vs a number.) no labels — which family, and give one technique? (unsupervised; clustering or pca.) best default for tabular data, and when do you switch to neural nets? *(gradient boosting; switch for unstructured data or very large scale.)*","words":498},{"path":"01-ml-foundations/bias-variance.md","title":"Bias, Variance & Overfitting","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"bias-variance-overfitting\">Bias, Variance &amp; Overfitting<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A model can fail two ways: too simple to capture the pattern (<strong>underfitting / high bias<\/strong>) or so complex it memorizes the training data and flops on new data (<strong>overfitting / high variance<\/strong>). The whole craft of modeling is balancing these two.<\/div><\/div>\n<h2 id=\"the-two-failure-modes\">The two failure modes<\/h2>\n<p><strong>High bias (underfitting)<\/strong> means the model is too simple — it misses the real relationship, so it does poorly on <em>both<\/em> training and test data. A straight line trying to fit a curve. The fix is a more expressive model or better features.<\/p>\n<p><strong>High variance (overfitting)<\/strong> means the model is too complex — it fits the training data's noise, so it looks great in training and terrible on new data. The fix is to <em>simplify or constrain<\/em> it, or to give it more data.<\/p>\n<p>The tell is the gap between training and validation scores: tiny gap but both bad = underfitting; big gap (great train, poor validation) = overfitting.<\/p>\n<div class=\"compare\">\n  <div class=\"cmp-col\">\n    <div class=\"cmp-h\">Underfit<\/div>\n    <ul><li>train: <b>bad<\/b><\/li><li>test: <b>bad<\/b><\/li><\/ul>\n    <span class=\"cmp-tag\">high bias — too simple<\/span>\n  <\/div>\n  <div class=\"cmp-col green\">\n    <div class=\"cmp-h\">Good fit<\/div>\n    <ul><li>train: <b>good<\/b><\/li><li>test: <b>good<\/b><\/li><\/ul>\n    <span class=\"cmp-tag\">the sweet spot<\/span>\n  <\/div>\n  <div class=\"cmp-col\">\n    <div class=\"cmp-h\">Overfit<\/div>\n    <ul><li>train: <b>great<\/b><\/li><li>test: <b>bad<\/b><\/li><\/ul>\n    <span class=\"cmp-tag\">high variance — memorized noise<\/span>\n  <\/div>\n<\/div>\n<p><strong>Try it.<\/strong> Drag the model complexity below. Degree 1–2 underfits (both errors high); push it toward 10–12 and the curve wriggles through every training point while test error blows up — that's variance. The sweet spot is where test error bottoms out.<\/p>\n<div id=\"bv-widget\" class=\"widget-host\"><\/div>\n<h2 id=\"the-knobs-that-fight-overfitting\">The knobs that fight overfitting<\/h2>\n<p>This is a classic \"how would you fix overfitting?\" question — have the list ready:<\/p>\n<ul><li><strong>More training data<\/strong> — the most reliable cure; harder to memorize a bigger set.<\/li><li><strong>Regularization<\/strong> — L1/L2 penalties that discourage extreme weights; dropout in<\/li><\/ul>\n<p>neural nets; shallower trees / fewer boosting rounds.<\/p>\n<ul><li><strong>Simpler model<\/strong> — fewer parameters/features.<\/li><li><strong>Cross-validation<\/strong> — to <em>detect<\/em> it honestly (section 4).<\/li><li><strong>Early stopping<\/strong> — stop training when validation loss stops improving.<\/li><li><strong>Feature selection<\/strong> — drop noisy or redundant features.<\/li><\/ul>\n<h2 id=\"why-this-is-the-foundational-idea\">Why this is <em>the<\/em> foundational idea<\/h2>\n<p>Every later topic connects back here. Regularization, train/val/test splits, augmentation, monitoring for drift — all of it is really about making a model generalize to data it hasn't seen. If you understand bias–variance, most modeling decisions become obvious.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>The anti-overfitting knobs live inside the libraries: L1/L2 and <code>max_depth<\/code> / <code>min_child_weight<\/code> in <strong>XGBoost<\/strong>, <code>dropout<\/code> and <code>weight_decay<\/code> in <strong>PyTorch<\/strong>, early-stopping callbacks in <strong>XGBoost<\/strong> and <strong>Keras<\/strong>, and cross-validation in <strong>scikit-learn<\/strong>. You <em>detect<\/em> the gap with an experiment tracker (<strong>MLflow / W&amp;B<\/strong>) plotting train vs validation curves.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"I spot overfitting from the train/validation gap in W&amp;B, then dial in regularization and early stopping.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Great on training, poor on test — which problem and one fix? *(overfitting /<\/li><\/ul>\n<p>high variance; more data or regularization.)*<\/p>\n<ul><li>Poor on both — which problem and one fix? *(underfitting / high bias; more<\/li><\/ul>\n<p>expressive model or better features.)*<\/p>\n<ul><li>Name three overfitting cures. *(more data, regularization/dropout, simpler model,<\/li><\/ul>\n<p>early stopping — any three.)*<\/p>","toc":[{"level":2,"id":"the-two-failure-modes","text":"The two failure modes"},{"level":2,"id":"the-knobs-that-fight-overfitting","text":"The knobs that fight overfitting"},{"level":2,"id":"why-this-is-the-foundational-idea","text":"Why this is the foundational idea"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"bias, variance & overfitting 💡 tl;dr a model can fail two ways: too simple to capture the pattern ( underfitting / high bias ) or so complex it memorizes the training data and flops on new data ( overfitting / high variance ). the whole craft of modeling is balancing these two. the two failure modes high bias (underfitting) means the model is too simple — it misses the real relationship, so it does poorly on both training and test data. a straight line trying to fit a curve. the fix is a more expressive model or better features. high variance (overfitting) means the model is too complex — it fits the training data's noise, so it looks great in training and terrible on new data. the fix is to simplify or constrain it, or to give it more data. the tell is the gap between training and validation scores: tiny gap but both bad = underfitting; big gap (great train, poor validation) = overfitting. underfit train: bad test: bad high bias — too simple good fit train: good test: good the sweet spot overfit train: great test: bad high variance — memorized noise try it. drag the model complexity below. degree 1–2 underfits (both errors high); push it toward 10–12 and the curve wriggles through every training point while test error blows up — that's variance. the sweet spot is where test error bottoms out. the knobs that fight overfitting this is a classic \"how would you fix overfitting?\" question — have the list ready: more training data — the most reliable cure; harder to memorize a bigger set. regularization — l1/l2 penalties that discourage extreme weights; dropout in neural nets; shallower trees / fewer boosting rounds. simpler model — fewer parameters/features. cross-validation — to detect it honestly (section 4). early stopping — stop training when validation loss stops improving. feature selection — drop noisy or redundant features. why this is the foundational idea every later topic connects back here. regularization, train/val/test splits, augmentation, monitoring for drift — all of it is really about making a model generalize to data it hasn't seen. if you understand bias–variance, most modeling decisions become obvious. 🔗 connecting the dots: the real stack the anti-overfitting knobs live inside the libraries: l1/l2 and max_depth / min_child_weight in xgboost , dropout and weight_decay in pytorch , early-stopping callbacks in xgboost and keras , and cross-validation in scikit-learn . you detect the gap with an experiment tracker ( mlflow / w&b ) plotting train vs validation curves. how you'd say it: \"i spot overfitting from the train/validation gap in w&b, then dial in regularization and early stopping.\" self-check great on training, poor on test — which problem and one fix? *(overfitting / high variance; more data or regularization.)* poor on both — which problem and one fix? *(underfitting / high bias; more expressive model or better features.)* name three overfitting cures. *(more data, regularization/dropout, simpler model, early stopping — any three.)*","words":495},{"path":"01-ml-foundations/metrics.md","title":"Evaluation Metrics","section":"1 · ML Foundations","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"evaluation-metrics\">Evaluation Metrics<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> \"Accuracy\" is often misleading — especially when classes are imbalanced. Pick the metric that matches what the business actually cares about: catching all the positives, or being right when you flag one, or ranking well. Know the handful below and <em>when<\/em> each applies.<\/div><\/div>\n<h2 id=\"classification-metrics\">Classification metrics<\/h2>\n<p>Start from the <strong>confusion matrix<\/strong> — true/false positives and negatives — because every metric is built from it.<\/p>\n<ul><li><strong>Accuracy<\/strong> = fraction correct. Fine when classes are balanced; **dangerous when<\/li><\/ul>\n<p>they're not**. A fraud model that predicts \"never fraud\" can be 99.9% accurate and   useless.<\/p>\n<ul><li><strong>Precision<\/strong> = of the items you flagged positive, how many really were. Use when a<\/li><\/ul>\n<p>false positive is costly (flagging a good transaction as fraud annoys customers).<\/p>\n<ul><li><strong>Recall (sensitivity)<\/strong> = of the actual positives, how many you caught. Use when a<\/li><\/ul>\n<p>miss is costly (missing a cancer, missing real fraud).<\/p>\n<ul><li><strong>F1<\/strong> = harmonic mean of precision and recall — one number when you need to balance<\/li><\/ul>\n<p>both, and the go-to for imbalanced classes.<\/p>\n<ul><li><strong>ROC-AUC<\/strong> = how well the model ranks positives above negatives across all<\/li><\/ul>\n<p>thresholds; threshold-independent. <strong>PR-AUC<\/strong> is better than ROC-AUC when positives   are rare.<\/p>\n<p>The key insight: <strong>precision and recall trade off<\/strong>, and the trade is set by your decision threshold. Moving the threshold to catch more positives (higher recall) usually flags more false ones (lower precision).<\/p>\n<h3 id=\"try-it-move-the-threshold\">Try it: move the threshold<\/h3>\n<p>Each dot is one example scored by the model — <strong>green = actually positive<\/strong>, gray = actually negative. Drag the threshold: everything to its right is <em>predicted positive<\/em>. Watch precision and recall move in opposite directions.<\/p>\n<div id=\"pr-widget\" class=\"prw\"><\/div>\n<h2 id=\"regression-metrics\">Regression metrics<\/h2>\n<ul><li><strong>MAE<\/strong> (mean absolute error) — average miss in the original units; robust to<\/li><\/ul>\n<p>outliers.<\/p>\n<ul><li><strong>RMSE<\/strong> (root mean squared error) — like MAE but punishes big misses harder; use<\/li><\/ul>\n<p>when large errors are especially bad.<\/p>\n<ul><li><strong>R²<\/strong> — fraction of variance explained (1 = perfect, 0 = no better than the mean).<\/li><\/ul>\n<h2 id=\"say-this-in-the-interview\">Say this in the interview<\/h2>\n<p><em>\"I pick the metric from the cost of errors. For imbalanced classification I ignore accuracy and look at precision, recall, and F1 or PR-AUC — and I choose between precision and recall based on whether a false alarm or a miss is more expensive.\"<\/em> That reasoning matters more than reciting formulas.<\/p>\n<h2 id=\"offline-vs-online\">Offline vs online<\/h2>\n<p>These are <strong>offline<\/strong> metrics on held-out data. In production the metric that really counts is a <strong>business<\/strong> one — click-through, revenue, retention — measured by an A/B test (section 4). A model can improve F1 and still lose money; always tie the offline metric back to a business outcome.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Compute these with <strong>scikit-learn<\/strong> (<code>sklearn.metrics<\/code>), <strong>torchmetrics<\/strong>, or HuggingFace <strong>evaluate<\/strong>, and log them per run in <strong>MLflow / W&amp;B<\/strong>. The <em>business<\/em> metric that ultimately decides shipping is measured by an experimentation platform (<strong>Optimizely / Statsig<\/strong>) via an A/B test, not offline.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Offline I track F1/PR-AUC in MLflow; the decision to ship is made on the online metric from an A/B test.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why is accuracy misleading for fraud detection? *(class imbalance — predicting the<\/li><\/ul>\n<p>majority class scores high while catching nothing.)*<\/p>\n<ul><li>False positives are expensive — precision or recall? <em>(precision.)<\/em> A miss is<\/li><\/ul>\n<p>expensive? <em>(recall.)<\/em><\/p>\n<ul><li>Rare positives — ROC-AUC or PR-AUC? <em>(PR-AUC.)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"classification-metrics","text":"Classification metrics"},{"level":3,"id":"try-it-move-the-threshold","text":"Try it: move the threshold"},{"level":2,"id":"regression-metrics","text":"Regression metrics"},{"level":2,"id":"say-this-in-the-interview","text":"Say this in the interview"},{"level":2,"id":"offline-vs-online","text":"Offline vs online"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"evaluation metrics 💡 tl;dr \"accuracy\" is often misleading — especially when classes are imbalanced. pick the metric that matches what the business actually cares about: catching all the positives, or being right when you flag one, or ranking well. know the handful below and when each applies. classification metrics start from the confusion matrix — true/false positives and negatives — because every metric is built from it. accuracy = fraction correct. fine when classes are balanced; **dangerous when they're not**. a fraud model that predicts \"never fraud\" can be 99.9% accurate and useless. precision = of the items you flagged positive, how many really were. use when a false positive is costly (flagging a good transaction as fraud annoys customers). recall (sensitivity) = of the actual positives, how many you caught. use when a miss is costly (missing a cancer, missing real fraud). f1 = harmonic mean of precision and recall — one number when you need to balance both, and the go-to for imbalanced classes. roc-auc = how well the model ranks positives above negatives across all thresholds; threshold-independent. pr-auc is better than roc-auc when positives are rare. the key insight: precision and recall trade off , and the trade is set by your decision threshold. moving the threshold to catch more positives (higher recall) usually flags more false ones (lower precision). try it: move the threshold each dot is one example scored by the model — green = actually positive , gray = actually negative. drag the threshold: everything to its right is predicted positive . watch precision and recall move in opposite directions. regression metrics mae (mean absolute error) — average miss in the original units; robust to outliers. rmse (root mean squared error) — like mae but punishes big misses harder; use when large errors are especially bad. r² — fraction of variance explained (1 = perfect, 0 = no better than the mean). say this in the interview \"i pick the metric from the cost of errors. for imbalanced classification i ignore accuracy and look at precision, recall, and f1 or pr-auc — and i choose between precision and recall based on whether a false alarm or a miss is more expensive.\" that reasoning matters more than reciting formulas. offline vs online these are offline metrics on held-out data. in production the metric that really counts is a business one — click-through, revenue, retention — measured by an a/b test (section 4). a model can improve f1 and still lose money; always tie the offline metric back to a business outcome. 🔗 connecting the dots: the real stack compute these with scikit-learn ( sklearn.metrics ), torchmetrics , or huggingface evaluate , and log them per run in mlflow / w&b . the business metric that ultimately decides shipping is measured by an experimentation platform ( optimizely / statsig ) via an a/b test, not offline. how you'd say it: \"offline i track f1/pr-auc in mlflow; the decision to ship is made on the online metric from an a/b test.\" self-check why is accuracy misleading for fraud detection? *(class imbalance — predicting the majority class scores high while catching nothing.)* false positives are expensive — precision or recall? (precision.) a miss is expensive? (recall.) rare positives — roc-auc or pr-auc? (pr-auc.)","words":545},{"path":"02-data-pipelines/README.md","title":"Overview","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"2-data-pipelines\">2: Data Pipelines<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Models are only as good as the data feeding them, so a huge part of ML Engineering is building reliable pipelines that ingest, clean, and shape data — in batches or in real time — and serve consistent features to both training and production. This is the \"Data Pipeline Engineering\" bullet in the JD, and it's where a lot of the actual work lives.<\/div><\/div>\n<h2 id=\"why-this-matters-more-than-beginners-expect\">Why this matters more than beginners expect<\/h2>\n<p>You can have a brilliant model and still fail because the data arrives late, dirty, or in a different shape than training expected. Most production ML bugs are <em>data<\/em> bugs, not model bugs. Interviewers probe this because it separates people who've only done Kaggle (clean CSV handed to them) from people who've shipped (data that's messy, streaming, and always changing).<\/p>\n<h2 id=\"the-five-pages\">The five pages<\/h2>\n<ul><li><strong>Ingestion &amp; storage<\/strong> — where data comes from and where it lands (lakes,<\/li><\/ul>\n<p>warehouses, lakehouses).<\/p>\n<ul><li><strong>Batch vs streaming<\/strong> — the two processing modes and how to choose.<\/li><li><strong>Spark &amp; Hadoop at scale<\/strong> — partitioning, shuffles, skew, memory pressure, and<\/li><\/ul>\n<p>how distributed data processing feeds ML training.<\/p>\n<ul><li><strong>Preprocessing &amp; data quality<\/strong> — cleaning, validation, and stopping bad data<\/li><\/ul>\n<p>early.<\/p>\n<ul><li><strong>Feature engineering &amp; feature stores<\/strong> — turning raw data into model inputs, and<\/li><\/ul>\n<p>the train/serve consistency problem a feature store solves.<\/p>\n<h2 id=\"the-mental-model\">The mental model<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">sources<span class=\"nsub\">APIs · DBs · logs<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">ingest<span class=\"nsub\">batch · stream<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">store<span class=\"nsub\">S3 / BigQuery / Snowflake<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">transform / clean<span class=\"nsub\">Spark / SQL / dbt<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">features<span class=\"nsub\">feature store<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">model<span class=\"nsub\">train + serve<\/span><\/span>\n  <\/div>\n<\/div>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"ingestion-and-storage.md\" href=\"#\">ingestion-and-storage.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-this-matters-more-than-beginners-expect","text":"Why this matters more than beginners expect"},{"level":2,"id":"the-five-pages","text":"The five pages"},{"level":2,"id":"the-mental-model","text":"The mental model"}],"text":"2: data pipelines 💡 tl;dr models are only as good as the data feeding them, so a huge part of ml engineering is building reliable pipelines that ingest, clean, and shape data — in batches or in real time — and serve consistent features to both training and production. this is the \"data pipeline engineering\" bullet in the jd, and it's where a lot of the actual work lives. why this matters more than beginners expect you can have a brilliant model and still fail because the data arrives late, dirty, or in a different shape than training expected. most production ml bugs are data bugs, not model bugs. interviewers probe this because it separates people who've only done kaggle (clean csv handed to them) from people who've shipped (data that's messy, streaming, and always changing). the five pages ingestion & storage — where data comes from and where it lands (lakes, warehouses, lakehouses). batch vs streaming — the two processing modes and how to choose. spark & hadoop at scale — partitioning, shuffles, skew, memory pressure, and how distributed data processing feeds ml training. preprocessing & data quality — cleaning, validation, and stopping bad data early. feature engineering & feature stores — turning raw data into model inputs, and the train/serve consistency problem a feature store solves. the mental model sources apis · dbs · logs ingest batch · stream store s3 / bigquery / snowflake transform / clean spark / sql / dbt features feature store model train + serve → start: ingestion-and-storage.md","words":255},{"path":"02-data-pipelines/ingestion-and-storage.md","title":"Ingestion & Storage","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"ingestion-storage\">Ingestion &amp; Storage<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Ingestion is getting data <em>in<\/em> from its sources; storage is where it lands so you can process it. The main choices are data <strong>lake<\/strong> (raw, cheap, flexible), data <strong>warehouse<\/strong> (structured, query-ready), and <strong>lakehouse<\/strong> (a blend). Knowing when to use each is the core of this page.<\/div><\/div>\n<h2 id=\"where-data-comes-from\">Where data comes from<\/h2>\n<p>Data arrives from databases (via change-data-capture or periodic dumps), application events and logs, third-party APIs, and files. Ingestion can be <strong>pull<\/strong> (you poll a source on a schedule) or <strong>push<\/strong> (the source streams events to you). The practical concern is reliability: what happens when a source is down, sends duplicates, or changes its schema — good pipelines handle all three rather than assuming happy paths.<\/p>\n<h2 id=\"lake-vs-warehouse-vs-lakehouse\">Lake vs warehouse vs lakehouse<\/h2>\n<p>This is a very common interview distinction:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Store<\/th><th>Holds<\/th><th>Best for<\/th><th>Trade-off<\/th><\/tr><\/thead><tbody><tr><td><strong>Data lake<\/strong> (S3, GCS)<\/td><td>raw files, any format<\/td><td>cheap bulk storage, ML training data<\/td><td>you must impose structure later (\"schema on read\")<\/td><\/tr><tr><td><strong>Data warehouse<\/strong> (BigQuery, Snowflake, Redshift)<\/td><td>clean, structured tables<\/td><td>fast SQL analytics, BI<\/td><td>costlier, structured data only (\"schema on write\")<\/td><\/tr><tr><td><strong>Lakehouse<\/strong> (Databricks/Delta, Iceberg)<\/td><td>raw + table layer on top<\/td><td>one system for both<\/td><td>newer, more moving parts<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The intuition: a <strong>lake<\/strong> is a cheap dumping ground you sort out later — great for the large, messy, unstructured data ML loves. A <strong>warehouse<\/strong> is a tidy library — great for clean tables and analytics. A <strong>lakehouse<\/strong> tries to give you warehouse-like tables <em>on top of<\/em> cheap lake storage.<\/p>\n<h2 id=\"schema-on-read-vs-schema-on-write\">Schema-on-read vs schema-on-write<\/h2>\n<p>A lake is \"schema on read\" — you dump raw data now and interpret its structure when you query it, which is flexible but pushes cleanup downstream. A warehouse is \"schema on write\" — data must fit a defined structure to get in, which guarantees clean tables but rejects anything malformed at the door. This trade-off — flexibility now vs cleanliness now — explains most storage decisions.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Each storage layer has a concrete implementation: a <strong>data lake<\/strong> is object storage (<strong>S3 / GCS / ADLS<\/strong>), usually with an open <strong>table format<\/strong> on top (<strong>Delta Lake, Apache Iceberg, Hudi<\/strong>); a <strong>warehouse<\/strong> is <strong>Snowflake / BigQuery / Redshift<\/strong>; a <strong>lakehouse<\/strong> is typically <strong>Databricks<\/strong> (Delta + <strong>Unity Catalog<\/strong> for governance). For ML teams the lakehouse has become the default, because it plugs straight into experiment tracking, governance, and serving — most cleanly via <strong>MLflow<\/strong> (which was created by Databricks):<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Phase<\/th><th>How MLflow + Databricks / Lakehouse work together<\/th><\/tr><\/thead><tbody><tr><td>Data ingestion<\/td><td>MLflow logs the exact <strong>Delta Lake snapshot version<\/strong> a model trained on → strict reproducibility<\/td><\/tr><tr><td>Governance<\/td><td>Models are registered inside <strong>Unity Catalog<\/strong>, alongside your database tables<\/td><\/tr><tr><td>Lineage<\/td><td>You can trace a model's lineage all the way back to the raw unstructured files in the data lake<\/td><\/tr><tr><td>Serving<\/td><td>MLflow-registered models deploy in one click to <strong>Databricks Serverless Serving<\/strong> endpoints<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How you'd say it:<\/strong> <em>\"We kept raw frames/text in S3 as the lake, curated Delta tables in Unity Catalog as the lakehouse, and MLflow pinned the exact Delta snapshot version behind every model — so any model's lineage traced straight back to the raw files, and promotion to a serving endpoint was one click.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Cheap storage for huge raw training data — lake or warehouse? <em>(lake.)<\/em><\/li><li>Fast SQL over clean tables for a dashboard — which? <em>(warehouse.)<\/em><\/li><li>Schema-on-read vs schema-on-write — one-line difference? *(interpret structure at<\/li><\/ul>\n<p>query time vs enforce it at write time.)*<\/p>","toc":[{"level":2,"id":"where-data-comes-from","text":"Where data comes from"},{"level":2,"id":"lake-vs-warehouse-vs-lakehouse","text":"Lake vs warehouse vs lakehouse"},{"level":2,"id":"schema-on-read-vs-schema-on-write","text":"Schema-on-read vs schema-on-write"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"ingestion & storage 💡 tl;dr ingestion is getting data in from its sources; storage is where it lands so you can process it. the main choices are data lake (raw, cheap, flexible), data warehouse (structured, query-ready), and lakehouse (a blend). knowing when to use each is the core of this page. where data comes from data arrives from databases (via change-data-capture or periodic dumps), application events and logs, third-party apis, and files. ingestion can be pull (you poll a source on a schedule) or push (the source streams events to you). the practical concern is reliability: what happens when a source is down, sends duplicates, or changes its schema — good pipelines handle all three rather than assuming happy paths. lake vs warehouse vs lakehouse this is a very common interview distinction: store holds best for trade-off data lake (s3, gcs) raw files, any format cheap bulk storage, ml training data you must impose structure later (\"schema on read\") data warehouse (bigquery, snowflake, redshift) clean, structured tables fast sql analytics, bi costlier, structured data only (\"schema on write\") lakehouse (databricks/delta, iceberg) raw + table layer on top one system for both newer, more moving parts the intuition: a lake is a cheap dumping ground you sort out later — great for the large, messy, unstructured data ml loves. a warehouse is a tidy library — great for clean tables and analytics. a lakehouse tries to give you warehouse-like tables on top of cheap lake storage. schema-on-read vs schema-on-write a lake is \"schema on read\" — you dump raw data now and interpret its structure when you query it, which is flexible but pushes cleanup downstream. a warehouse is \"schema on write\" — data must fit a defined structure to get in, which guarantees clean tables but rejects anything malformed at the door. this trade-off — flexibility now vs cleanliness now — explains most storage decisions. 🔗 connecting the dots: the real stack each storage layer has a concrete implementation: a data lake is object storage ( s3 / gcs / adls ), usually with an open table format on top ( delta lake, apache iceberg, hudi ); a warehouse is snowflake / bigquery / redshift ; a lakehouse is typically databricks (delta + unity catalog for governance). for ml teams the lakehouse has become the default, because it plugs straight into experiment tracking, governance, and serving — most cleanly via mlflow (which was created by databricks): phase how mlflow + databricks / lakehouse work together data ingestion mlflow logs the exact delta lake snapshot version a model trained on → strict reproducibility governance models are registered inside unity catalog , alongside your database tables lineage you can trace a model's lineage all the way back to the raw unstructured files in the data lake serving mlflow-registered models deploy in one click to databricks serverless serving endpoints how you'd say it: \"we kept raw frames/text in s3 as the lake, curated delta tables in unity catalog as the lakehouse, and mlflow pinned the exact delta snapshot version behind every model — so any model's lineage traced straight back to the raw files, and promotion to a serving endpoint was one click.\" self-check cheap storage for huge raw training data — lake or warehouse? (lake.) fast sql over clean tables for a dashboard — which? (warehouse.) schema-on-read vs schema-on-write — one-line difference? *(interpret structure at query time vs enforce it at write time.)*","words":571},{"path":"02-data-pipelines/batch-vs-streaming.md","title":"Batch vs Streaming","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"batch-vs-streaming\">Batch vs Streaming<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two ways to process data. <strong>Batch<\/strong> runs on a schedule over a big chunk of data (nightly, hourly) — simple and cheap. <strong>Streaming<\/strong> processes each event as it arrives — fresh but more complex. Choose by how <em>fresh<\/em> the data must be.<\/div><\/div>\n<h2 id=\"batch-processing\">Batch processing<\/h2>\n<p>You collect data over a window and process it all at once — a nightly job that retrains a model or recomputes yesterday's features. It's the default because it's <strong>simpler, cheaper, and easier to debug<\/strong>: if a run fails, you just rerun it. Tools: Spark, SQL/dbt, orchestrated by Airflow. The downside is <strong>latency<\/strong> — features are as stale as your last run, so a nightly batch can't power a real-time fraud check.<\/p>\n<h2 id=\"streaming-processing\">Streaming processing<\/h2>\n<p>You process events <strong>as they happen<\/strong>, continuously — updating a feature or scoring a transaction milliseconds after it occurs. Tools: Kafka (the event backbone), Flink or Spark Structured Streaming (processing). It gives you <strong>freshness<\/strong> but costs you complexity: you must handle out-of-order events, late data, exactly-once processing, and always-on infrastructure.<\/p>\n<h2 id=\"choosing\">Choosing<\/h2>\n<p>The single question is: <strong>how fresh does the data need to be?<\/strong><\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Need<\/th><th>Use<\/th><\/tr><\/thead><tbody><tr><td>Daily report, nightly model retrain, recompute features<\/td><td><strong>Batch<\/strong><\/td><\/tr><tr><td>Real-time fraud block, live recommendations, instant alerts<\/td><td><strong>Streaming<\/strong><\/td><\/tr><tr><td>Both fresh <em>and<\/em> historical<\/td><td><strong>Both<\/strong> (the \"Lambda\" idea: a fast stream + a correct batch)<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Say it plainly: <em>\"I default to batch because it's simpler and cheaper, and only move to streaming when the use case genuinely needs sub-minute freshness — because streaming buys freshness at a real cost in complexity.\"<\/em> That's the senior instinct: don't reach for streaming to look sophisticated.<\/p>\n<h2 id=\"orchestration-ties-it-together\">Orchestration ties it together<\/h2>\n<p>Either way, pipelines are chains of steps with dependencies (ingest → clean → feature → train), and an <strong>orchestrator<\/strong> like Airflow (or Dagster/Prefect) schedules them, runs them in order, retries failures, and alerts you. A pipeline without orchestration is a pile of scripts someone runs by hand — fine for a demo, not for production.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>Batch<\/strong> is usually <strong>Spark<\/strong> or <strong>dbt<\/strong> transforms orchestrated by <strong>Airflow<\/strong> (or Dagster / Prefect). <strong>Streaming<\/strong> is <strong>Kafka<\/strong> as the event backbone with <strong>Flink<\/strong> or <strong>Spark Structured Streaming<\/strong> doing the processing, often writing fresh values into a feature store's online store.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Real-time fraud ran on Kafka + Flink updating features in Redis; the nightly churn model was a Spark job on Airflow — same data, different freshness, different stack.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>One-line difference between batch and streaming? *(process a chunk on a schedule vs<\/li><\/ul>\n<p>each event as it arrives.)*<\/p>\n<ul><li>Why default to batch? *(simpler, cheaper, easier to debug; only stream when<\/li><\/ul>\n<p>freshness demands it.)*<\/p>\n<ul><li>What does an orchestrator like Airflow do? *(schedules pipeline steps in dependency<\/li><\/ul>\n<p>order, retries failures, alerts.)*<\/p>","toc":[{"level":2,"id":"batch-processing","text":"Batch processing"},{"level":2,"id":"streaming-processing","text":"Streaming processing"},{"level":2,"id":"choosing","text":"Choosing"},{"level":2,"id":"orchestration-ties-it-together","text":"Orchestration ties it together"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"batch vs streaming 💡 tl;dr two ways to process data. batch runs on a schedule over a big chunk of data (nightly, hourly) — simple and cheap. streaming processes each event as it arrives — fresh but more complex. choose by how fresh the data must be. batch processing you collect data over a window and process it all at once — a nightly job that retrains a model or recomputes yesterday's features. it's the default because it's simpler, cheaper, and easier to debug : if a run fails, you just rerun it. tools: spark, sql/dbt, orchestrated by airflow. the downside is latency — features are as stale as your last run, so a nightly batch can't power a real-time fraud check. streaming processing you process events as they happen , continuously — updating a feature or scoring a transaction milliseconds after it occurs. tools: kafka (the event backbone), flink or spark structured streaming (processing). it gives you freshness but costs you complexity: you must handle out-of-order events, late data, exactly-once processing, and always-on infrastructure. choosing the single question is: how fresh does the data need to be? need use daily report, nightly model retrain, recompute features batch real-time fraud block, live recommendations, instant alerts streaming both fresh and historical both (the \"lambda\" idea: a fast stream + a correct batch) say it plainly: \"i default to batch because it's simpler and cheaper, and only move to streaming when the use case genuinely needs sub-minute freshness — because streaming buys freshness at a real cost in complexity.\" that's the senior instinct: don't reach for streaming to look sophisticated. orchestration ties it together either way, pipelines are chains of steps with dependencies (ingest → clean → feature → train), and an orchestrator like airflow (or dagster/prefect) schedules them, runs them in order, retries failures, and alerts you. a pipeline without orchestration is a pile of scripts someone runs by hand — fine for a demo, not for production. 🔗 connecting the dots: the real stack batch is usually spark or dbt transforms orchestrated by airflow (or dagster / prefect). streaming is kafka as the event backbone with flink or spark structured streaming doing the processing, often writing fresh values into a feature store's online store. how you'd say it: \"real-time fraud ran on kafka + flink updating features in redis; the nightly churn model was a spark job on airflow — same data, different freshness, different stack.\" self-check one-line difference between batch and streaming? *(process a chunk on a schedule vs each event as it arrives.)* why default to batch? *(simpler, cheaper, easier to debug; only stream when freshness demands it.)* what does an orchestrator like airflow do? *(schedules pipeline steps in dependency order, retries failures, alerts.)*","words":456},{"path":"02-data-pipelines/spark-hadoop-at-scale.md","title":"Spark & Hadoop at Scale","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"spark-hadoop-at-scale\">Spark &amp; Hadoop at Scale<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Hadoop provides distributed storage and cluster resource management; Spark builds a DAG of transformations and runs partition-level tasks across executors. Most performance failures come from the shape of the data movement: bad partitioning, wide shuffles, skew, small files, serialization, or an accidental <code>collect()<\/code>—not from the ML algorithm itself.<\/div><\/div>\n<h2 id=\"place-the-components-correctly\">Place the components correctly<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Component<\/th><th>Responsibility<\/th><th>Interview shorthand<\/th><\/tr><\/thead><tbody><tr><td>HDFS<\/td><td>replicated distributed file storage<\/td><td>move compute to partitioned data<\/td><\/tr><tr><td>YARN<\/td><td>cluster resource manager and scheduler<\/td><td>allocates containers to applications<\/td><\/tr><tr><td>MapReduce<\/td><td>disk-heavy batch execution model<\/td><td>durable but high intermediate-I/O cost<\/td><\/tr><tr><td>Spark<\/td><td>DAG execution engine with reusable executors<\/td><td>fast general batch/stream processing<\/td><\/tr><tr><td>Object storage<\/td><td>durable cloud data lake<\/td><td>cheap decoupled storage; not a local filesystem<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Spark can read HDFS, S3, GCS, ADLS, warehouse tables, and many other sources. \"Spark vs Hadoop\" is therefore a misleading binary: Spark often runs on data and infrastructure from the broader Hadoop/cloud ecosystem.<\/p>\n<h2 id=\"the-execution-model\">The execution model<\/h2>\n<p>The <strong>driver<\/strong> creates the logical plan/DAG, requests resources, and schedules stages. Each <strong>executor<\/strong> runs tasks over partitions and keeps shuffle/cache state for that application. A task normally processes one partition.<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">driver<span class=\"nsub\">plan · stages · schedule<\/span><\/span><span class=\"arw\"><\/span>\n    <span class=\"node\">executor A<span class=\"nsub\">partition tasks<\/span><\/span>\n    <span class=\"node\">executor B<span class=\"nsub\">partition tasks<\/span><\/span>\n    <span class=\"node out\">executor C<span class=\"nsub\">partition tasks<\/span><\/span>\n  <\/div>\n<\/div>\n<p>Spark transformations are lazy. An action triggers planning and execution. Catalyst can optimize DataFrame/SQL plans; prefer built-in expressions over Python UDFs because the optimizer can see them and execution stays in the optimized JVM path.<\/p>\n<h2 id=\"narrow-versus-wide-transformations\">Narrow versus wide transformations<\/h2>\n<ul><li><strong>Narrow:<\/strong> each output partition depends on a small number of input partitions (<code>map<\/code>,<\/li><\/ul>\n<p><code>filter<\/code>). They pipeline within a stage.<\/p>\n<ul><li><strong>Wide:<\/strong> data must move across the cluster (<code>groupBy<\/code>, many joins, repartition, distinct).<\/li><\/ul>\n<p>A shuffle creates a stage boundary and consumes network, disk, serialization, and memory.<\/p>\n<p>The right answer is not \"never shuffle\"—grouping and joins inherently need redistribution. The goal is to shuffle less data, fewer times, into balanced partitions.<\/p>\n<h2 id=\"partitioning-the-unit-of-parallelism\">Partitioning: the unit of parallelism<\/h2>\n<p>Too few partitions leave cores idle and make each task's working set huge. Too many create scheduler overhead and tiny files. Choose partitions from data size and task time, then measure. Keep partition keys aligned with common joins and filters where practical.<\/p>\n<p><code>repartition()<\/code> performs a shuffle and can increase or decrease partitions while balancing data. <code>coalesce()<\/code> can reduce partitions without a full shuffle but may preserve imbalance. Use the distinction, do not memorize one as universally faster.<\/p>\n<h2 id=\"data-skew\">Data skew<\/h2>\n<p>If one key owns 40% of records, one reducer becomes the long tail while others finish. More executors do not fix that single hot partition.<\/p>\n<p>Diagnose skew from stage/task duration and input/shuffle-size distributions. Remedies:<\/p>\n<ul><li>broadcast a genuinely small table to avoid a large join shuffle;<\/li><li>pre-aggregate before the join;<\/li><li>filter/project early so fewer bytes move;<\/li><li>salt a hot key into subkeys, then combine;<\/li><li>use adaptive query execution/skew handling when supported;<\/li><li>isolate exceptional keys on a separate path.<\/li><\/ul>\n<p>Broadcasting a table that is not actually small can OOM every executor, so size it first.<\/p>\n<h2 id=\"memory-and-serialization-failures\">Memory and serialization failures<\/h2>\n<p>Executor OOM may mean:<\/p>\n<ul><li>one partition or reduce-side hash table is too large;<\/li><li>cached data plus execution memory exceeds the executor budget;<\/li><li>Python/JVM serialization or object overhead dominates;<\/li><li>a UDF retains objects unexpectedly;<\/li><li>too many concurrent tasks share the same executor memory.<\/li><\/ul>\n<p>First inspect the Spark UI: failed stage, task input/shuffle sizes, spills, GC time, executor loss, and skew. Increase memory only after fixing the data shape; otherwise you buy a larger crash.<\/p>\n<p>Never call <code>collect()<\/code> or <code>toPandas()<\/code> on unbounded data—the entire result lands on the driver. Sample, aggregate, or write partitioned output instead.<\/p>\n<h2 id=\"the-small-files-problem\">The small-files problem<\/h2>\n<p>Millions of tiny files create metadata/listing overhead and tiny tasks. Compact upstream or before publishing curated features; target sensible file sizes; partition storage by useful, not ultra-high-cardinality, columns. Do not <code>repartition(1)<\/code> just to get one pretty CSV—it serializes output through one task.<\/p>\n<h2 id=\"feeding-ml-training\">Feeding ML training<\/h2>\n<p>A robust offline feature pipeline should:<\/p>\n<ol><li>read an immutable source snapshot or versioned table;<\/li><li>validate schema, nulls, ranges, uniqueness, and freshness;<\/li><li>join using event-time-correct data to prevent leakage;<\/li><li>produce partitioned training examples in an efficient columnar format;<\/li><li>record code, parameters, input/output versions, and row/feature statistics;<\/li><li>publish the same feature definition used by online serving where required.<\/li><\/ol>\n<p>Spark prepares and validates large datasets; GPU training should read efficient shards in parallel instead of making Spark executors pretend to be a high-performance GPU data loader.<\/p>\n<h2 id=\"debugging-answer-template\">Debugging answer template<\/h2>\n<blockquote><p>I would find the slow stage in the Spark UI, compare task duration and shuffle/input bytes, and determine whether the bottleneck is skew, shuffle volume, spill/GC, serialization, or source/sink I/O. Then I would change one lever—join strategy, early filtering, partitioning, salting, compaction, or executor shape—and remeasure the stage, not just total job time.<\/p><\/blockquote>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why can one skewed key defeat a 100-node cluster?<\/li><li><code>repartition<\/code> versus <code>coalesce<\/code>—which forces redistribution and when is that desirable?<\/li><li>Why is a built-in DataFrame expression usually preferable to a Python UDF?<\/li><li>Which Spark UI evidence distinguishes skew from general resource starvation?<\/li><\/ul>\n<h2 id=\"primary-references\">Primary references<\/h2>\n<ul><li><a href=\"https://spark.apache.org/docs/latest/tuning.html\" target=\"_blank\" rel=\"noopener\">Apache Spark tuning guide<\/a><\/li><li><a href=\"https://spark.apache.org/docs/latest/sql-performance-tuning.html\" target=\"_blank\" rel=\"noopener\">Spark SQL performance tuning<\/a><\/li><li><a href=\"https://hadoop.apache.org/docs/stable/\" target=\"_blank\" rel=\"noopener\">Apache Hadoop documentation<\/a><\/li><\/ul>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"preprocessing-and-quality.md\" href=\"#\">Preprocessing &amp; Data Quality<\/a><\/strong><\/p>","toc":[{"level":2,"id":"place-the-components-correctly","text":"Place the components correctly"},{"level":2,"id":"the-execution-model","text":"The execution model"},{"level":2,"id":"narrow-versus-wide-transformations","text":"Narrow versus wide transformations"},{"level":2,"id":"partitioning-the-unit-of-parallelism","text":"Partitioning: the unit of parallelism"},{"level":2,"id":"data-skew","text":"Data skew"},{"level":2,"id":"memory-and-serialization-failures","text":"Memory and serialization failures"},{"level":2,"id":"the-small-files-problem","text":"The small-files problem"},{"level":2,"id":"feeding-ml-training","text":"Feeding ML training"},{"level":2,"id":"debugging-answer-template","text":"Debugging answer template"},{"level":2,"id":"self-check","text":"Self-check"},{"level":2,"id":"primary-references","text":"Primary references"}],"text":"spark & hadoop at scale 💡 tl;dr hadoop provides distributed storage and cluster resource management; spark builds a dag of transformations and runs partition-level tasks across executors. most performance failures come from the shape of the data movement: bad partitioning, wide shuffles, skew, small files, serialization, or an accidental collect() —not from the ml algorithm itself. place the components correctly component responsibility interview shorthand hdfs replicated distributed file storage move compute to partitioned data yarn cluster resource manager and scheduler allocates containers to applications mapreduce disk-heavy batch execution model durable but high intermediate-i/o cost spark dag execution engine with reusable executors fast general batch/stream processing object storage durable cloud data lake cheap decoupled storage; not a local filesystem spark can read hdfs, s3, gcs, adls, warehouse tables, and many other sources. \"spark vs hadoop\" is therefore a misleading binary: spark often runs on data and infrastructure from the broader hadoop/cloud ecosystem. the execution model the driver creates the logical plan/dag, requests resources, and schedules stages. each executor runs tasks over partitions and keeps shuffle/cache state for that application. a task normally processes one partition. driver plan · stages · schedule executor a partition tasks executor b partition tasks executor c partition tasks spark transformations are lazy. an action triggers planning and execution. catalyst can optimize dataframe/sql plans; prefer built-in expressions over python udfs because the optimizer can see them and execution stays in the optimized jvm path. narrow versus wide transformations narrow: each output partition depends on a small number of input partitions ( map , filter ). they pipeline within a stage. wide: data must move across the cluster ( groupby , many joins, repartition, distinct). a shuffle creates a stage boundary and consumes network, disk, serialization, and memory. the right answer is not \"never shuffle\"—grouping and joins inherently need redistribution. the goal is to shuffle less data, fewer times, into balanced partitions. partitioning: the unit of parallelism too few partitions leave cores idle and make each task's working set huge. too many create scheduler overhead and tiny files. choose partitions from data size and task time, then measure. keep partition keys aligned with common joins and filters where practical. repartition() performs a shuffle and can increase or decrease partitions while balancing data. coalesce() can reduce partitions without a full shuffle but may preserve imbalance. use the distinction, do not memorize one as universally faster. data skew if one key owns 40% of records, one reducer becomes the long tail while others finish. more executors do not fix that single hot partition. diagnose skew from stage/task duration and input/shuffle-size distributions. remedies: broadcast a genuinely small table to avoid a large join shuffle; pre-aggregate before the join; filter/project early so fewer bytes move; salt a hot key into subkeys, then combine; use adaptive query execution/skew handling when supported; isolate exceptional keys on a separate path. broadcasting a table that is not actually small can oom every executor, so size it first. memory and serialization failures executor oom may mean: one partition or reduce-side hash table is too large; cached data plus execution memory exceeds the executor budget; python/jvm serialization or object overhead dominates; a udf retains objects unexpectedly; too many concurrent tasks share the same executor memory. first inspect the spark ui: failed stage, task input/shuffle sizes, spills, gc time, executor loss, and skew. increase memory only after fixing the data shape; otherwise you buy a larger crash. never call collect() or topandas() on unbounded data—the entire result lands on the driver. sample, aggregate, or write partitioned output instead. the small-files problem millions of tiny files create metadata/listing overhead and tiny tasks. compact upstream or before publishing curated features; target sensible file sizes; partition storage by useful, not ultra-high-cardinality, columns. do not repartition(1) just to get one pretty csv—it serializes output through one task. feeding ml training a robust offline feature pipeline should: read an immutable source snapshot or versioned table; validate schema, nulls, ranges, uniqueness, and freshness; join using event-time-correct data to prevent leakage; produce partitioned training examples in an efficient columnar format; record code, parameters, input/output versions, and row/feature statistics; publish the same feature definition used by online serving where required. spark prepares and validates large datasets; gpu training should read efficient shards in parallel instead of making spark executors pretend to be a high-performance gpu data loader. debugging answer template i would find the slow stage in the spark ui, compare task duration and shuffle/input bytes, and determine whether the bottleneck is skew, shuffle volume, spill/gc, serialization, or source/sink i/o. then i would change one lever—join strategy, early filtering, partitioning, salting, compaction, or executor shape—and remeasure the stage, not just total job time. self-check why can one skewed key defeat a 100-node cluster? repartition versus coalesce —which forces redistribution and when is that desirable? why is a built-in dataframe expression usually preferable to a python udf? which spark ui evidence distinguishes skew from general resource starvation? primary references apache spark tuning guide spark sql performance tuning apache hadoop documentation → next: preprocessing & data quality","words":838},{"path":"02-data-pipelines/preprocessing-and-quality.md","title":"Preprocessing & Data Quality","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"preprocessing-data-quality\">Preprocessing &amp; Data Quality<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Raw data is never model-ready. Preprocessing turns it into clean numeric inputs — handling missing values, scaling, encoding categories — and data-quality checks stop bad data from silently poisoning your model. This is unglamorous and it's half the job.<\/div><\/div>\n<h2 id=\"common-preprocessing-steps\">Common preprocessing steps<\/h2>\n<ul><li><strong>Missing values<\/strong> — drop rows, or <em>impute<\/em> (fill with mean/median/mode, or a<\/li><\/ul>\n<p>model-based guess). Which you choose depends on how much is missing and why.<\/p>\n<ul><li><strong>Scaling / normalization<\/strong> — put numeric features on a comparable range<\/li><\/ul>\n<p>(standardization to mean 0 / std 1, or min-max to 0–1). Essential for distance- and   gradient-based models (linear models, neural nets, k-NN); tree models don't care.<\/p>\n<ul><li><strong>Encoding categoricals<\/strong> — turn categories into numbers: <strong>one-hot<\/strong> for low-<\/li><\/ul>\n<p>cardinality (color = red/green/blue), <strong>target/embedding<\/strong> encoding for high-   cardinality (zip code, user ID).<\/p>\n<ul><li><strong>Outlier handling<\/strong> — cap, remove, or transform extreme values that would distort<\/li><\/ul>\n<p>training.<\/p>\n<ul><li><strong>Text/date parsing<\/strong> — extract usable features (day-of-week, tokens, embeddings).<\/li><\/ul>\n<h2 id=\"the-leakage-trap-interviewers-love-this\">The leakage trap (interviewers love this)<\/h2>\n<p><strong>Data leakage<\/strong> is when information that won't be available at prediction time sneaks into training — and it makes your offline metrics look amazing and your production model fail. Two classic forms: (1) computing scaling or imputation statistics on the <em>whole<\/em> dataset before splitting, so test information leaks into training — always fit preprocessing on the training split only; (2) including a feature that's a proxy for the answer (e.g. \"account_closed_date\" when predicting churn). If a model seems too good to be true, suspect leakage first.<\/p>\n<h2 id=\"data-quality-stop-bad-data-early\">Data quality: stop bad data early<\/h2>\n<p>A model can't tell good data from bad — it'll happily train on corrupted inputs. So you validate data <em>before<\/em> it reaches the model, checking things like: are values in expected ranges, are required fields present, did the schema change, is the distribution similar to before? Tools like <strong>Great Expectations<\/strong> or built-in validation in feature/pipeline platforms automate this. The principle: <strong>fail fast and loudly<\/strong> on bad data rather than let it silently degrade the model — a bad-data alert is cheap, a mysteriously worse model in production is expensive.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Transforms run in <strong>pandas / Polars<\/strong> (small) or <strong>Spark<\/strong> (big); wrap them in a <strong>scikit-learn Pipeline<\/strong> so preprocessing is fit on the train split only (no leakage). Data-quality gates use <strong>Great Expectations<\/strong>, <strong>Pandera<\/strong>, or <strong>Evidently<\/strong>, run as an Airflow step that fails the pipeline loudly on bad data.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Every pipeline had a Great Expectations check as its first step — schema, nulls, ranges — so bad upstream data failed the run instead of silently degrading the model.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Which models need feature scaling and which don't? *(gradient/distance-based need<\/li><\/ul>\n<p>it; tree-based don't.)*<\/p>\n<ul><li>What is data leakage and one way it happens? *(train-time use of info unavailable at<\/li><\/ul>\n<p>prediction; e.g. fitting the scaler on all data before the split.)*<\/p>\n<ul><li>Why validate data before training? *(models can't detect bad data; catch it early<\/li><\/ul>\n<p>and loudly instead of shipping a silently worse model.)*<\/p>","toc":[{"level":2,"id":"common-preprocessing-steps","text":"Common preprocessing steps"},{"level":2,"id":"the-leakage-trap-interviewers-love-this","text":"The leakage trap (interviewers love this)"},{"level":2,"id":"data-quality-stop-bad-data-early","text":"Data quality: stop bad data early"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"preprocessing & data quality 💡 tl;dr raw data is never model-ready. preprocessing turns it into clean numeric inputs — handling missing values, scaling, encoding categories — and data-quality checks stop bad data from silently poisoning your model. this is unglamorous and it's half the job. common preprocessing steps missing values — drop rows, or impute (fill with mean/median/mode, or a model-based guess). which you choose depends on how much is missing and why. scaling / normalization — put numeric features on a comparable range (standardization to mean 0 / std 1, or min-max to 0–1). essential for distance- and gradient-based models (linear models, neural nets, k-nn); tree models don't care. encoding categoricals — turn categories into numbers: one-hot for low- cardinality (color = red/green/blue), target/embedding encoding for high- cardinality (zip code, user id). outlier handling — cap, remove, or transform extreme values that would distort training. text/date parsing — extract usable features (day-of-week, tokens, embeddings). the leakage trap (interviewers love this) data leakage is when information that won't be available at prediction time sneaks into training — and it makes your offline metrics look amazing and your production model fail. two classic forms: (1) computing scaling or imputation statistics on the whole dataset before splitting, so test information leaks into training — always fit preprocessing on the training split only; (2) including a feature that's a proxy for the answer (e.g. \"account_closed_date\" when predicting churn). if a model seems too good to be true, suspect leakage first. data quality: stop bad data early a model can't tell good data from bad — it'll happily train on corrupted inputs. so you validate data before it reaches the model, checking things like: are values in expected ranges, are required fields present, did the schema change, is the distribution similar to before? tools like great expectations or built-in validation in feature/pipeline platforms automate this. the principle: fail fast and loudly on bad data rather than let it silently degrade the model — a bad-data alert is cheap, a mysteriously worse model in production is expensive. 🔗 connecting the dots: the real stack transforms run in pandas / polars (small) or spark (big); wrap them in a scikit-learn pipeline so preprocessing is fit on the train split only (no leakage). data-quality gates use great expectations , pandera , or evidently , run as an airflow step that fails the pipeline loudly on bad data. how you'd say it: \"every pipeline had a great expectations check as its first step — schema, nulls, ranges — so bad upstream data failed the run instead of silently degrading the model.\" self-check which models need feature scaling and which don't? *(gradient/distance-based need it; tree-based don't.)* what is data leakage and one way it happens? *(train-time use of info unavailable at prediction; e.g. fitting the scaler on all data before the split.)* why validate data before training? *(models can't detect bad data; catch it early and loudly instead of shipping a silently worse model.)*","words":495},{"path":"02-data-pipelines/feature-stores.md","title":"Feature Engineering & Feature Stores","section":"2 · Data Pipelines","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"feature-engineering-feature-stores\">Feature Engineering &amp; Feature Stores<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Features are the model's inputs, and <strong>feature engineering<\/strong> — crafting good ones — often beats fancier models. A <strong>feature store<\/strong> is the system that computes, stores, and serves those features consistently to both training and production, solving the sneaky \"train/serve skew\" bug.<\/div><\/div>\n<h2 id=\"feature-engineering\">Feature engineering<\/h2>\n<p>A feature is any signal you feed the model. Engineering them means turning raw columns into more predictive inputs: aggregations (\"purchases in last 30 days\"), ratios, time-based features (day of week, time since last login), interactions, and domain-specific transforms. On tabular problems, good features usually move the needle more than a better algorithm — which is why this is a core skill, not an afterthought.<\/p>\n<h2 id=\"the-trainserve-skew-problem\">The train/serve skew problem<\/h2>\n<p>Here's the bug a feature store exists to prevent. You compute a feature one way in your training notebook (in Python, over historical data) and someone re-implements it <em>slightly differently<\/em> in the production service (in another language, over live data). Now the model sees different values in production than it trained on, and it quietly underperforms. This mismatch is <strong>train/serve skew<\/strong>, and it's one of the most common, hardest-to-spot MLOps bugs.<\/p>\n<h2 id=\"what-a-feature-store-does\">What a feature store does<\/h2>\n<p>A feature store is a central place to <strong>define a feature once<\/strong> and serve it two ways:<\/p>\n<div class=\"diagram\">\n  <div class=\"branch\">\n    <span class=\"node\">feature definition<span class=\"nsub\">written once<\/span><\/span>\n    <span class=\"split-arw\"><\/span>\n    <div class=\"fork\">\n      <span class=\"node soft\">OFFLINE store<span class=\"nsub\">history · training<\/span><\/span>\n      <span class=\"node soft\">ONLINE store<span class=\"nsub\">fresh values · low-latency serving<\/span><\/span>\n    <\/div>\n  <\/div>\n  <div class=\"diagram-cap\">Define once, serve two ways — the same feature, consistent offline and online.<\/div>\n<\/div>\n<ul><li><strong>Offline store<\/strong> — historical feature values for training, with correct<\/li><\/ul>\n<p><em>point-in-time<\/em> joins so you don't leak the future into the past.<\/p>\n<ul><li><strong>Online store<\/strong> — the latest feature values in a fast key-value store (Redis-like)<\/li><\/ul>\n<p>for real-time serving at low latency.<\/p>\n<ul><li><strong>One definition<\/strong> feeds both → training and serving compute features identically →<\/li><\/ul>\n<p><strong>no skew<\/strong>. It also lets teams <strong>reuse<\/strong> features instead of rebuilding them.<\/p>\n<p>Tools: Feast (open source), or managed ones in SageMaker / Vertex AI / Databricks.<\/p>\n<h2 id=\"point-in-time-correctness-the-subtle-part\">Point-in-time correctness (the subtle part)<\/h2>\n<p>When you build a training set, each label must be paired with the feature values <em>as they were at that moment<\/em> — not today's values. Using a feature computed after the event leaks the future and inflates offline metrics. Feature stores handle these point-in-time joins for you, which is a big reason they exist.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>The open-source standard is <strong>Feast<\/strong>; managed options are <strong>Tecton<\/strong> and the <strong>Databricks / SageMaker / Vertex<\/strong> feature stores. Under the hood the <strong>offline store<\/strong> is Delta / BigQuery / Parquet (for training) and the <strong>online store<\/strong> is a low-latency key-value store like <strong>Redis<\/strong> or <strong>DynamoDB<\/strong> (for serving).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"We defined features once in Feast; training read the offline store from Delta and the real-time service read the same definitions from Redis — so there was no train/serve skew.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>What is train/serve skew? *(features computed differently in training vs production,<\/li><\/ul>\n<p>so the model sees mismatched inputs.)*<\/p>\n<ul><li>How does a feature store prevent it? *(define the feature once, serve the same<\/li><\/ul>\n<p>definition to both offline training and online serving.)*<\/p>\n<ul><li>Why does point-in-time correctness matter? *(pairing a label with future feature<\/li><\/ul>\n<p>values leaks the future and inflates offline metrics.)*<\/p>","toc":[{"level":2,"id":"feature-engineering","text":"Feature engineering"},{"level":2,"id":"the-trainserve-skew-problem","text":"The train/serve skew problem"},{"level":2,"id":"what-a-feature-store-does","text":"What a feature store does"},{"level":2,"id":"point-in-time-correctness-the-subtle-part","text":"Point-in-time correctness (the subtle part)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"feature engineering & feature stores 💡 tl;dr features are the model's inputs, and feature engineering — crafting good ones — often beats fancier models. a feature store is the system that computes, stores, and serves those features consistently to both training and production, solving the sneaky \"train/serve skew\" bug. feature engineering a feature is any signal you feed the model. engineering them means turning raw columns into more predictive inputs: aggregations (\"purchases in last 30 days\"), ratios, time-based features (day of week, time since last login), interactions, and domain-specific transforms. on tabular problems, good features usually move the needle more than a better algorithm — which is why this is a core skill, not an afterthought. the train/serve skew problem here's the bug a feature store exists to prevent. you compute a feature one way in your training notebook (in python, over historical data) and someone re-implements it slightly differently in the production service (in another language, over live data). now the model sees different values in production than it trained on, and it quietly underperforms. this mismatch is train/serve skew , and it's one of the most common, hardest-to-spot mlops bugs. what a feature store does a feature store is a central place to define a feature once and serve it two ways: feature definition written once offline store history · training online store fresh values · low-latency serving define once, serve two ways — the same feature, consistent offline and online. offline store — historical feature values for training, with correct point-in-time joins so you don't leak the future into the past. online store — the latest feature values in a fast key-value store (redis-like) for real-time serving at low latency. one definition feeds both → training and serving compute features identically → no skew . it also lets teams reuse features instead of rebuilding them. tools: feast (open source), or managed ones in sagemaker / vertex ai / databricks. point-in-time correctness (the subtle part) when you build a training set, each label must be paired with the feature values as they were at that moment — not today's values. using a feature computed after the event leaks the future and inflates offline metrics. feature stores handle these point-in-time joins for you, which is a big reason they exist. 🔗 connecting the dots: the real stack the open-source standard is feast ; managed options are tecton and the databricks / sagemaker / vertex feature stores. under the hood the offline store is delta / bigquery / parquet (for training) and the online store is a low-latency key-value store like redis or dynamodb (for serving). how you'd say it: \"we defined features once in feast; training read the offline store from delta and the real-time service read the same definitions from redis — so there was no train/serve skew.\" self-check what is train/serve skew? *(features computed differently in training vs production, so the model sees mismatched inputs.)* how does a feature store prevent it? *(define the feature once, serve the same definition to both offline training and online serving.)* why does point-in-time correctness matter? *(pairing a label with future feature values leaks the future and inflates offline metrics.)*","words":529},{"path":"03-model-development/README.md","title":"Overview","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"3-model-development\">3: Model Development<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is the \"designing and developing ML/DL systems\" bullet. Two worlds: <strong>classical ML<\/strong> (still the winner on tabular data, mostly boosted trees) and <strong>deep learning<\/strong> (for images, text, audio, and huge datasets). Plus how you train when data or models outgrow one machine, and how you tune the knobs.<\/div><\/div>\n<h2 id=\"the-honest-framing\">The honest framing<\/h2>\n<p>Deep learning gets the headlines, but a huge share of real business ML is still gradient-boosted trees on tabular data. A strong ML engineer knows <em>both<\/em> and picks by the problem, not the hype. This section gives you enough of each to reason well and to answer \"how would you model this?\" credibly.<\/p>\n<h2 id=\"the-five-pages\">The five pages<\/h2>\n<ul><li><strong>Classical ML<\/strong> — trees, random forests, and gradient boosting (XGBoost/LightGBM):<\/li><\/ul>\n<p>the tabular workhorses.<\/p>\n<ul><li><strong>Deep learning essentials<\/strong> — neurons, backprop, and the main architectures (CNN,<\/li><\/ul>\n<p>RNN/Transformer) at a level you can discuss.<\/p>\n<ul><li><strong>PyTorch, TensorFlow &amp; Keras in practice<\/strong> — what changes between frameworks and<\/li><\/ul>\n<p>the production training loop invariants that do not.<\/p>\n<ul><li><strong>Training at scale<\/strong> — what to do when data or the model won't fit on one machine.<\/li><li><strong>Hyperparameter tuning<\/strong> — how to search the knobs efficiently.<\/li><\/ul>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"classical-ml.md\" href=\"#\">classical-ml.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-honest-framing","text":"The honest framing"},{"level":2,"id":"the-five-pages","text":"The five pages"}],"text":"3: model development 💡 tl;dr this is the \"designing and developing ml/dl systems\" bullet. two worlds: classical ml (still the winner on tabular data, mostly boosted trees) and deep learning (for images, text, audio, and huge datasets). plus how you train when data or models outgrow one machine, and how you tune the knobs. the honest framing deep learning gets the headlines, but a huge share of real business ml is still gradient-boosted trees on tabular data. a strong ml engineer knows both and picks by the problem, not the hype. this section gives you enough of each to reason well and to answer \"how would you model this?\" credibly. the five pages classical ml — trees, random forests, and gradient boosting (xgboost/lightgbm): the tabular workhorses. deep learning essentials — neurons, backprop, and the main architectures (cnn, rnn/transformer) at a level you can discuss. pytorch, tensorflow & keras in practice — what changes between frameworks and the production training loop invariants that do not. training at scale — what to do when data or the model won't fit on one machine. hyperparameter tuning — how to search the knobs efficiently. → start: classical-ml.md","words":193},{"path":"03-model-development/classical-ml.md","title":"Classical ML (Trees & Boosting)","section":"3 · Model Development","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"classical-ml-trees-boosting\">Classical ML (Trees &amp; Boosting)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> For structured/tabular data, tree-based models — especially <strong>gradient boosting<\/strong> (XGBoost, LightGBM) — are usually the best choice: accurate, fast, and needing little preprocessing. Understand how a tree splits, and the two ways to combine many trees (bagging vs boosting).<\/div><\/div>\n<h2 id=\"a-decision-tree\">A decision tree<\/h2>\n<p>A tree asks a series of yes/no questions on features (\"age &gt; 30?\", \"country = UK?\"), splitting the data to separate the classes. It's wonderfully <strong>interpretable<\/strong> but a single deep tree <strong>overfits<\/strong> — it memorizes the training data. So in practice you combine many trees, and there are two ways to do that.<\/p>\n<h2 id=\"bagging-vs-boosting-the-key-distinction\">Bagging vs boosting (the key distinction)<\/h2>\n<ul><li><strong>Bagging (Random Forest)<\/strong> — train many trees <strong>in parallel<\/strong>, each on a random<\/li><\/ul>\n<p>subset of data and features, then average their votes. Averaging independent trees   <em>reduces variance<\/em>, so a forest is robust and hard to overfit, with little tuning.   Great, sturdy default.<\/p>\n<ul><li><strong>Boosting (XGBoost, LightGBM)<\/strong> — train trees <strong>in sequence<\/strong>, where each new tree<\/li><\/ul>\n<p>focuses on the errors the previous ones made. This <em>reduces bias<\/em> and typically   reaches higher accuracy, at the cost of more careful tuning (it can overfit if you   push it).<\/p>\n<div class=\"compare\">\n  <div class=\"cmp-col accent\">\n    <div class=\"cmp-h\">Bagging<\/div>\n    <p>Many trees in <b>parallel<\/b>, then average their votes.<\/p>\n    <span class=\"cmp-tag\">cuts variance · robust · Random Forest<\/span>\n  <\/div>\n  <div class=\"cmp-col accent\">\n    <div class=\"cmp-h\">Boosting<\/div>\n    <p>Trees in <b>sequence<\/b>, each fixing the last one's mistakes.<\/p>\n    <span class=\"cmp-tag\">cuts bias · top accuracy · XGBoost<\/span>\n  <\/div>\n<\/div>\n<h2 id=\"why-boosting-wins-on-tabular-data\">Why boosting wins on tabular data<\/h2>\n<p>Gradient boosting consistently tops leaderboards and production systems for structured data because it captures complex feature interactions, handles mixed feature types, needs no scaling, and is fast. When someone hands you a table of rows and columns, the correct first instinct is <em>\"gradient-boosted trees\"<\/em> — and being able to say <em>why<\/em> (sequential error-correction, low bias, minimal preprocessing) is the mark of experience.<\/p>\n<h2 id=\"interpretability\">Interpretability<\/h2>\n<p>Trees are more explainable than neural nets — you can see which features matter (<strong>feature importance<\/strong>), and <strong>SHAP values<\/strong> explain individual predictions. In regulated settings (finance, healthcare) this interpretability is often a requirement, not a nicety, and it's a point worth raising.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>The workhorses are <strong>XGBoost<\/strong>, <strong>LightGBM<\/strong>, and <strong>CatBoost<\/strong>, usually driven through <strong>scikit-learn<\/strong> Pipelines; explainability comes from <strong>SHAP<\/strong> (per-prediction) and built-in feature importances. Training and tuning run on a single big VM or a managed job (<strong>SageMaker / Vertex / Databricks<\/strong>).<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"For a tabular churn model I'd train LightGBM in a scikit-learn Pipeline, explain it with SHAP for the compliance team, and log everything to MLflow.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Bagging vs boosting in one line each? *(parallel trees averaged to cut variance vs<\/li><\/ul>\n<p>sequential trees correcting errors to cut bias.)*<\/p>\n<ul><li>Best default for tabular data and why? *(gradient boosting — accuracy, handles<\/li><\/ul>\n<p>interactions, minimal preprocessing.)*<\/p>\n<ul><li>How do you explain a tree model's predictions? *(feature importance; SHAP for<\/li><\/ul>\n<p>per-prediction explanations.)*<\/p>","toc":[{"level":2,"id":"a-decision-tree","text":"A decision tree"},{"l

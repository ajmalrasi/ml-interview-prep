 concurrent model instances (multiple engines per gpu to raise utilization), model ensembles/pipelines , multi-framework backends (tensorrt, onnx, pytorch, python), and metrics. the production shape: \"tensorrt engine served by triton with dynamic batching and a couple of concurrent instances.\" this is a natural \"how would you deploy it\" follow-up to your project. 🔗 connecting the dots — the real stack torch-tensorrt / torch.compile backend and trtexec (cli to build+profile engines) for classic models; onnx runtime as the portable alternative; tensorrt-llm for llms; triton for serving; nvidia tensorrt-model-optimizer for explicit-qdq quantization. trtexec --int8 --fp16 --best is the fastest way to see achievable latency. how you'd say it: \"i exported to onnx and built an int8 engine with an entropy calibrator — implicit quantization. the cleaner path is explicit qdq from qat via model-optimizer, which my torch/modelopt versions didn't support, so i folded qat weights in and re-calibrated. in production i'd serve the engine through triton with dynamic batching.\" self-check what are the two biggest things the trt builder does? *(layer fusion + kernel auto-tuning / tactic selection for your specific gpu.)* implicit vs explicit quantization? *(calibrator picks scales & builder chooses int8 layers vs q/dq nodes with baked-in qat scales you control; explicit is recommended.)* do qdq nodes slow inference? *(no — build-time markers, fused away; they affect accuracy, not speed, unless placed un-fusably.)* why is a trt engine not portable across gpus? *(kernels are auto-tuned/timed for a specific arch + trt version.)*","words":1057},{"path":"12-nvidia-model-optimization/gpu-performance.md","title":"GPU Performance & Profiling","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"gpu-performance-profiling\">GPU Performance &amp; Profiling<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Speed on a GPU comes down to one question: <strong>is this kernel limited by compute, by memory bandwidth, or by overhead?<\/strong> The <strong>roofline model<\/strong> answers it, <strong>Nsight<\/strong> proves it, and the answer tells you which optimization will actually help. Your project already hit this — the \"GPU is idle\" mystery was an overhead/data-feeding bound, not a compute bound.<\/div><\/div>\n<h2 id=\"gpu-architecture-in-one-screen\">GPU architecture in one screen<\/h2>\n<ul><li><strong>SMs (Streaming Multiprocessors)<\/strong> — the GPU's cores; each runs many threads. A 3070 Ti<\/li><\/ul>\n<p>has ~48 SMs.<\/p>\n<ul><li><strong>Warps<\/strong> — threads execute in lockstep groups of <strong>32<\/strong> (SIMT). Divergent branches within<\/li><\/ul>\n<p>a warp serialize — that's <strong>warp divergence<\/strong>.<\/p>\n<ul><li><strong>Tensor Cores<\/strong> — dedicated matrix-multiply-accumulate units (FP16/BF16/TF32/FP8/INT8).<\/li><\/ul>\n<p>They are <em>why<\/em> reduced precision is fast; they do a small matmul per instruction.<\/p>\n<ul><li><strong>Memory hierarchy<\/strong> (fast→slow, small→large): registers → <strong>shared memory / L1<\/strong> (per-SM,<\/li><\/ul>\n<p>programmer-managed) → <strong>L2<\/strong> (shared) → <strong>global memory / HBM/GDDR<\/strong> (GBs, but hundreds of   cycles latency).<\/p>\n<ul><li><strong>Occupancy<\/strong> — how many warps are resident per SM vs the max. Higher occupancy hides<\/li><\/ul>\n<p>memory latency by having other warps to run while some wait.<\/p>\n<p>The performance mantra: <strong>keep the tensor cores fed and minimize trips to global memory.<\/strong><\/p>\n<h2 id=\"the-roofline-model-the-framing-to-lead-with\">The roofline model (the framing to lead with)<\/h2>\n<p>Every kernel has an <strong>arithmetic intensity<\/strong> = FLOPs performed per byte moved from memory. Achievable performance is:<\/p>\n<pre><code>  perf = min( peak_compute,  memory_bandwidth × arithmetic_intensity )<\/code><\/pre>\n<pre><code> FLOP/s │            ______________  ← compute-bound ceiling (peak tensor-core FLOP/s)\n        │           /\n        │          /  ← memory-bound region (slope = bandwidth)\n        │         /\n        └────────/──────────────────▶  arithmetic intensity (FLOP/byte)\n                 ridge point<\/code><\/pre>\n<ul><li><strong>Low intensity → memory-bound.<\/strong> You're waiting on bytes. Fixes: fuse ops (avoid<\/li><\/ul>\n<p>re-reading), better data layout/coalescing, lower precision (fewer bytes), bigger reuse.<\/p>\n<ul><li><strong>High intensity → compute-bound.<\/strong> You're saturating the math units. Fixes: tensor cores,<\/li><\/ul>\n<p>lower precision, better tiling.<\/p>\n<ul><li><strong>Elementwise ops (ReLU, add, norm) are almost always memory-bound<\/strong> — barely any math per<\/li><\/ul>\n<p>byte. This is why <strong>fusion<\/strong> (do them without a round-trip to HBM) is such a big lever, and   why TensorRT fuses aggressively.<\/p>\n<h2 id=\"why-your-gpu-is-idle-was-neither-compute-nor-memory-bound\">Why your \"GPU is idle\" was neither compute nor memory bound<\/h2>\n<p>Your issue #3: tiny 28×28 images + a small model → the GPU finishes a batch in ~1 ms and sits waiting. That's a <strong>third regime the roofline doesn't show: overhead-bound.<\/strong> Two flavors:<\/p>\n<ul><li><strong>Input/data-feeding bound<\/strong> — the dataloader can't produce batches fast enough (your<\/li><\/ul>\n<p>actual bug; fixed with <code>num_workers<\/code>, <code>pin_memory<\/code>, <code>prefetch<\/code>, <code>non_blocking<\/code>, bigger   batch). The GPU starves.<\/p>\n<ul><li><strong>Kernel-launch-bound<\/strong> — each CUDA kernel launch costs a few microseconds of CPU→GPU<\/li><\/ul>\n<p>overhead; for a tiny model the launches cost more than the math. <strong>CUDA Graphs<\/strong> fix this   by capturing the whole launch sequence once and replaying it as a single unit.<\/p>\n<p>Interview-ready: <em>\"On that model, low <code>nvidia-smi<\/code> utilization wasn't a compute problem — the kernels were too small to saturate anything, so it was launch/feed overhead. I'd confirm with Nsight Systems and, if it were latency-critical, use CUDA Graphs to kill launch overhead and larger batches to amortize it.\"<\/em> That reframes a debugging story as a performance-analysis story — exactly the NVIDIA register.<\/p>\n<h2 id=\"profiling-name-the-right-tool\">Profiling: name the right tool<\/h2>\n<ul><li><strong>Nsight Systems (<code>nsys<\/code>)<\/strong> — <strong>timeline / system-level.<\/strong> Shows CPU vs GPU activity,<\/li><\/ul>\n<p>kernel gaps, memcpy, stream overlap. Use it to answer <em>\"is the GPU even busy, and what's it   waiting on?\"<\/em> This is what actually diagnoses your data-feeding stall.<\/p>\n<ul><li><strong>Nsight Compute (<code>ncu<\/code>)<\/strong> — <strong>per-kernel deep dive.<\/strong> Gives you the roofline placement,<\/li><\/ul>\n<p>occupancy, memory-vs-compute breakdown for a single kernel. Use it once you know <em>which<\/em>   kernel is the bottleneck.<\/p>\n<ul><li><strong><code>trtexec<\/code><\/strong> — quick engine-level latency/throughput for TensorRT.<\/li><li><strong>PyTorch profiler<\/strong> / <code>torch.cuda.Event<\/code> — framework-level timing.<\/li><li><strong><code>nvidia-smi<\/code> / <code>dcgm<\/code><\/strong> — coarse utilization &amp; memory; good for \"is it on the GPU,\" bad<\/li><\/ul>\n<p>for \"why is it slow\" (utilization % is misleading, as your project showed).<\/p>\n<p>The discipline (same as everywhere): <strong>profile first, attack the biggest bar, re-measure.<\/strong><\/p>\n<h2 id=\"measuring-gpu-latency-correctly-a-common-trap\">Measuring GPU latency correctly (a common trap)<\/h2>\n<p>Naive Python timing around a CUDA call measures nothing — kernels are <strong>asynchronous<\/strong>. Do it right:<\/p>\n<pre><code class=\"language-python\">torch.cuda.synchronize()               <span class=\"tok-comment\"># or use CUDA events<\/span>\nstart = torch.cuda.Event(enable_timing=<span class=\"tok-keyword\">True<\/span>); end = torch.cuda.Event(enable_timing=<span class=\"tok-keyword\">True<\/span>)\n<span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(warmup): model(x)       <span class=\"tok-comment\"># warm up: first calls JIT/autotune/allocate<\/span>\ntorch.cuda.synchronize()\nstart.record()\n<span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(iters): model(x)\nend.record(); torch.cuda.synchronize()\nms = start.elapsed_time(end) / iters<\/code><\/pre>\n<p>Key points to say out loud: <strong>synchronize before/after<\/strong>, <strong>warm up<\/strong> (first iterations pay one-time costs — your <code>benchmark_latency<\/code> warmup(10) is exactly this), report <strong>p50/p99 not just mean<\/strong>, and ideally <strong>lock clocks<\/strong> (<code>nvidia-smi -lgc<\/code>) so boost/thermal drift doesn't add noise. Your <code>itertools.cycle<\/code> fix (issue #6) is the same discipline — never let the harness run short.<\/p>\n<h2 id=\"cuda-streams-overlap\">CUDA streams &amp; overlap<\/h2>\n<p>A <strong>stream<\/strong> is an ordered queue of GPU work; independent streams run concurrently. The wins: <strong>overlap H2D/D2H copies with compute<\/strong> (copy next batch while computing this one — this is what <code>pin_memory<\/code> + <code>non_blocking=True<\/code> enable, which you already used), and run independent kernels in parallel. Triton uses multiple streams/instances to raise utilization the same way.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>Nsight Systems / Nsight Compute<\/strong> for profiling, <strong><code>trtexec<\/code><\/strong> for engine latency, <strong>CUDA Graphs<\/strong> for launch-bound models, <strong>DCGM<\/strong> for fleet monitoring. The concepts (roofline, occupancy, coalescing, fusion) are framework-agnostic and show up whether you're writing CUDA, tuning TensorRT, or debugging a dataloader.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"My small model was overhead-bound, not compute-bound — I'd verify on an Nsight Systems timeline, then fix the feed with more dataloader workers and, if latency mattered, CUDA Graphs. For a big model I'd use Nsight Compute's roofline to see if it's memory- or compute-bound before choosing between fusion and lower precision.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Roofline: what decides compute- vs memory-bound? *(arithmetic intensity = FLOPs/byte vs the<\/li><\/ul>\n<p>ridge point; low intensity → memory-bound.)*<\/p>\n<ul><li>Why are elementwise ops memory-bound, and what's the fix? *(tiny math per byte → bandwidth<\/li><\/ul>\n<p>limited; fuse them to avoid re-reading from global memory.)*<\/p>\n<ul><li>Nsight Systems vs Nsight Compute? *(Systems = timeline/\"is the GPU busy &amp; waiting on what\";<\/li><\/ul>\n<p>Compute = single-kernel roofline/occupancy deep dive.)*<\/p>\n<ul><li>Why is naive timing of a CUDA call wrong? *(kernels are async — you must synchronize and<\/li><\/ul>\n<p>warm up, and report p99 not just mean.)*<\/p>","toc":[{"level":2,"id":"gpu-architecture-in-one-screen","text":"GPU architecture in one screen"},{"level":2,"id":"the-roofline-model-the-framing-to-lead-with","text":"The roofline model (the framing to lead with)"},{"level":2,"id":"why-your-gpu-is-idle-was-neither-compute-nor-memory-bound","text":"Why your \"GPU is idle\" was neither compute nor memory bound"},{"level":2,"id":"profiling-name-the-right-tool","text":"Profiling: name the right tool"},{"level":2,"id":"measuring-gpu-latency-correctly-a-common-trap","text":"Measuring GPU latency correctly (a common trap)"},{"level":2,"id":"cuda-streams-overlap","text":"CUDA streams &amp; overlap"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"gpu performance & profiling 💡 tl;dr speed on a gpu comes down to one question: is this kernel limited by compute, by memory bandwidth, or by overhead? the roofline model answers it, nsight proves it, and the answer tells you which optimization will actually help. your project already hit this — the \"gpu is idle\" mystery was an overhead/data-feeding bound, not a compute bound. gpu architecture in one screen sms (streaming multiprocessors) — the gpu's cores; each runs many threads. a 3070 ti has ~48 sms. warps — threads execute in lockstep groups of 32 (simt). divergent branches within a warp serialize — that's warp divergence . tensor cores — dedicated matrix-multiply-accumulate units (fp16/bf16/tf32/fp8/int8). they are why reduced precision is fast; they do a small matmul per instruction. memory hierarchy (fast→slow, small→large): registers → shared memory / l1 (per-sm, programmer-managed) → l2 (shared) → global memory / hbm/gddr (gbs, but hundreds of cycles latency). occupancy — how many warps are resident per sm vs the max. higher occupancy hides memory latency by having other warps to run while some wait. the performance mantra: keep the tensor cores fed and minimize trips to global memory. the roofline model (the framing to lead with) every kernel has an arithmetic intensity = flops performed per byte moved from memory. achievable performance is: perf = min( peak_compute, memory_bandwidth × arithmetic_intensity ) flop/s │ ______________ ← compute-bound ceiling (peak tensor-core flop/s) │ / │ / ← memory-bound region (slope = bandwidth) │ / └────────/──────────────────▶ arithmetic intensity (flop/byte) ridge point low intensity → memory-bound. you're waiting on bytes. fixes: fuse ops (avoid re-reading), better data layout/coalescing, lower precision (fewer bytes), bigger reuse. high intensity → compute-bound. you're saturating the math units. fixes: tensor cores, lower precision, better tiling. elementwise ops (relu, add, norm) are almost always memory-bound — barely any math per byte. this is why fusion (do them without a round-trip to hbm) is such a big lever, and why tensorrt fuses aggressively. why your \"gpu is idle\" was neither compute nor memory bound your issue #3: tiny 28×28 images + a small model → the gpu finishes a batch in ~1 ms and sits waiting. that's a third regime the roofline doesn't show: overhead-bound. two flavors: input/data-feeding bound — the dataloader can't produce batches fast enough (your actual bug; fixed with num_workers , pin_memory , prefetch , non_blocking , bigger batch). the gpu starves. kernel-launch-bound — each cuda kernel launch costs a few microseconds of cpu→gpu overhead; for a tiny model the launches cost more than the math. cuda graphs fix this by capturing the whole launch sequence once and replaying it as a single unit. interview-ready: \"on that model, low nvidia-smi utilization wasn't a compute problem — the kernels were too small to saturate anything, so it was launch/feed overhead. i'd confirm with nsight systems and, if it were latency-critical, use cuda graphs to kill launch overhead and larger batches to amortize it.\" that reframes a debugging story as a performance-analysis story — exactly the nvidia register. profiling: name the right tool nsight systems ( nsys ) — timeline / system-level. shows cpu vs gpu activity, kernel gaps, memcpy, stream overlap. use it to answer \"is the gpu even busy, and what's it waiting on?\" this is what actually diagnoses your data-feeding stall. nsight compute ( ncu ) — per-kernel deep dive. gives you the roofline placement, occupancy, memory-vs-compute breakdown for a single kernel. use it once you know which kernel is the bottleneck. trtexec — quick engine-level latency/throughput for tensorrt. pytorch profiler / torch.cuda.event — framework-level timing. nvidia-smi / dcgm — coarse utilization & memory; good for \"is it on the gpu,\" bad for \"why is it slow\" (utilization % is misleading, as your project showed). the discipline (same as everywhere): profile first, attack the biggest bar, re-measure. measuring gpu latency correctly (a common trap) naive python timing around a cuda call measures nothing — kernels are asynchronous . do it right: torch.cuda.synchronize() # or use cuda events start = torch.cuda.event(enable_timing= true ); end = torch.cuda.event(enable_timing= true ) for _ in range (warmup): model(x) # warm up: first calls jit/autotune/allocate torch.cuda.synchronize() start.record() for _ in range (iters): model(x) end.record(); torch.cuda.synchronize() ms = start.elapsed_time(end) / iters key points to say out loud: synchronize before/after , warm up (first iterations pay one-time costs — your benchmark_latency warmup(10) is exactly this), report p50/p99 not just mean , and ideally lock clocks ( nvidia-smi -lgc ) so boost/thermal drift doesn't add noise. your itertools.cycle fix (issue #6) is the same discipline — never let the harness run short. cuda streams & overlap a stream is an ordered queue of gpu work; independent streams run concurrently. the wins: overlap h2d/d2h copies with compute (copy next batch while computing this one — this is what pin_memory + non_blocking=true enable, which you already used), and run independent kernels in parallel. triton uses multiple streams/instances to raise utilization the same way. 🔗 connecting the dots — the real stack nsight systems / nsight compute for profiling, trtexec for engine latency, cuda graphs for launch-bound models, dcgm for fleet monitoring. the concepts (roofline, occupancy, coalescing, fusion) are framework-agnostic and show up whether you're writing cuda, tuning tensorrt, or debugging a dataloader. how you'd say it: \"my small model was overhead-bound, not compute-bound — i'd verify on an nsight systems timeline, then fix the feed with more dataloader workers and, if latency mattered, cuda graphs. for a big model i'd use nsight compute's roofline to see if it's memory- or compute-bound before choosing between fusion and lower precision.\" self-check roofline: what decides compute- vs memory-bound? *(arithmetic intensity = flops/byte vs the ridge point; low intensity → memory-bound.)* why are elementwise ops memory-bound, and what's the fix? *(tiny math per byte → bandwidth limited; fuse them to avoid re-reading from global memory.)* nsight systems vs nsight compute? *(systems = timeline/\"is the gpu busy & waiting on what\"; compute = single-kernel roofline/occupancy deep dive.)* why is naive timing of a cuda call wrong? *(kernels are async — you must synchronize and warm up, and report p99 not just mean.)*","words":1015},{"path":"12-nvidia-model-optimization/sparsity-pruning-distillation.md","title":"Sparsity, Pruning & Distillation","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"sparsity-pruning-distillation\">Sparsity, Pruning &amp; Distillation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Three ways to shrink the model itself rather than the number format. <strong>Pruning<\/strong> removes weights; <strong>structured 2:4 sparsity<\/strong> is the pruning pattern NVIDIA hardware can actually accelerate; <strong>distillation<\/strong> trains a small student to copy a big teacher. Quantization (previous pages) is usually the first reach; these are how you get a <em>fundamentally<\/em> smaller or sparser model.<\/div><\/div>\n<h2 id=\"pruning-unstructured-vs-structured\">Pruning — unstructured vs structured<\/h2>\n<ul><li><strong>Unstructured pruning<\/strong> — zero out individual low-magnitude weights anywhere. You can<\/li><\/ul>\n<p>reach very high sparsity with little accuracy loss, <strong>but a random scatter of zeros doesn't   speed up dense GPU kernels<\/strong> — the hardware still multiplies by zero. It only helps if you   have sparse kernels or you're compressing for storage/transfer.<\/p>\n<ul><li><strong>Structured pruning<\/strong> — remove whole <strong>channels, filters, or heads<\/strong>. This shrinks the<\/li><\/ul>\n<p>actual tensor dimensions, so <em>any<\/em> dense kernel gets faster — no special hardware needed.   The cost is it's coarser, so it usually needs fine-tuning to recover accuracy.<\/p>\n<p>The one-liner: <em>\"Unstructured prunes more but doesn't speed up dense GPUs; structured prunes less but actually shrinks the compute. I'd pick structured for latency, then fine-tune.\"<\/em><\/p>\n<h2 id=\"24-structured-sparsity-the-nvidia-specific-one\">2:4 structured sparsity (the NVIDIA-specific one)<\/h2>\n<p>Ampere (A100) and newer have <strong>sparse tensor cores<\/strong> that accelerate a specific pattern: <strong>in every contiguous group of 4 weights, at most 2 are non-zero<\/strong> (aka \"2:4\" or fine-grained structured sparsity). The hardware stores only the 2 non-zeros + a 2-bit index and skips the zeros, giving <strong>up to 2× matmul throughput<\/strong>.<\/p>\n<pre><code>  dense:   [ w0 w1 w2 w3 ]  →  4 multiplies\n  2:4:     [ w0  0 w2  0 ]  →  2 multiplies on sparse tensor cores  (≈2×)<\/code><\/pre>\n<p>Workflow: train dense → prune to the 2:4 mask → <strong>fine-tune<\/strong> to recover accuracy → run on sparse tensor cores (TensorRT + <code>apex<\/code>/<code>ASP<\/code> support it). Why it matters: it's the rare pruning scheme that gives a <strong>guaranteed hardware speedup<\/strong>, so it's a likely question. Know that it's <strong>50% structured<\/strong>, needs a fine-tune step, and stacks with INT8/FP8.<\/p>\n<h2 id=\"knowledge-distillation\">Knowledge distillation<\/h2>\n<p>Train a large accurate <strong>teacher<\/strong>, then train a small <strong>student<\/strong> to match the teacher's <strong>soft outputs<\/strong> (the full probability distribution, \"softened\" by a temperature <code>T<\/code>), not just the hard labels. The soft targets carry <strong>dark knowledge<\/strong> — how the teacher spreads probability across classes (\"this 4 looks a bit like a 9\") — which is far richer supervision than a one-hot label.<\/p>\n<pre><code>  loss = α · CE(student, hard_labels) + (1−α) · T² · KL(student_T ‖ teacher_T)<\/code><\/pre>\n<ul><li><strong>Temperature <code>T<\/code>&gt;1<\/strong> softens both distributions so small logit differences matter; the<\/li><\/ul>\n<p><code>T²<\/code> term keeps gradient magnitudes comparable.<\/p>\n<ul><li>Variants: <strong>response-based<\/strong> (match logits, above), <strong>feature-based<\/strong> (match intermediate<\/li><\/ul>\n<p>activations), <strong>relation-based<\/strong> (match relationships between layers/samples).<\/p>\n<ul><li>This is how DistilBERT, TinyBERT, and most on-device models are made — and how big LLMs are<\/li><\/ul>\n<p>distilled into small deployable ones.<\/p>\n<h2 id=\"choosing-and-stacking\">Choosing and stacking<\/h2>\n<p>They're complementary, and the standard production recipe stacks them:<\/p>\n<pre><code>  distill  →  smaller architecture (fundamental size cut)\n    ↓\n  prune (2:4 structured) → fewer effective weights, hardware-accelerated\n    ↓\n  quantize (INT8 / FP8) → cheaper per-op\n    ↓\n  compile (TensorRT) → fuse + pick kernels for the target GPU<\/code><\/pre>\n<p>The instinct to voice: <em>\"Quantization first — cheapest big win. Distillation when I need a genuinely smaller model, not just cheaper ops. Structured/2:4 pruning when I want hardware speedup and can fine-tune. Always re-measure accuracy after each step, and compile last.\"<\/em><\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>PyTorch<\/strong> <code>torch.nn.utils.prune<\/code>, NVIDIA <strong>ASP / apex<\/strong> for 2:4, <strong>TensorRT<\/strong> to run sparse+INT8 engines; <strong>HuggingFace<\/strong> for distillation (DistilBERT). NVIDIA <strong>TensorRT-Model-Optimizer<\/strong> bundles quantization + sparsity + distillation in one toolkit — worth naming as \"the NVIDIA way to combine all of these.\"<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"Beyond the quantization in my project, the next levers are structured 2:4 sparsity for a real hardware 2× on Ampere+, and distillation if I need a smaller architecture rather than a cheaper one — all stackable, all followed by an accuracy re-check and a TensorRT compile.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why doesn't unstructured pruning speed up a normal GPU? *(scattered zeros still go through<\/li><\/ul>\n<p>dense kernels; you need sparse kernels/hardware or structured pruning.)*<\/p>\n<ul><li>What is 2:4 sparsity and what does it buy? *(≤2 non-zeros per group of 4 → sparse tensor<\/li><\/ul>\n<p>cores skip the zeros for up to 2× matmul, after a fine-tune.)*<\/p>\n<ul><li>Why do soft targets beat hard labels in distillation? *(\"dark knowledge\" — the teacher's<\/li><\/ul>\n<p>probability spread across classes is richer supervision than one-hot.)*<\/p>\n<ul><li>What order would you stack these techniques? *(distill → prune → quantize → compile,<\/li><\/ul>\n<p>re-measuring accuracy each step.)*<\/p>","toc":[{"level":2,"id":"pruning-unstructured-vs-structured","text":"Pruning — unstructured vs structured"},{"level":2,"id":"24-structured-sparsity-the-nvidia-specific-one","text":"2:4 structured sparsity (the NVIDIA-specific one)"},{"level":2,"id":"knowledge-distillation","text":"Knowledge distillation"},{"level":2,"id":"choosing-and-stacking","text":"Choosing and stacking"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"sparsity, pruning & distillation 💡 tl;dr three ways to shrink the model itself rather than the number format. pruning removes weights; structured 2:4 sparsity is the pruning pattern nvidia hardware can actually accelerate; distillation trains a small student to copy a big teacher. quantization (previous pages) is usually the first reach; these are how you get a fundamentally smaller or sparser model. pruning — unstructured vs structured unstructured pruning — zero out individual low-magnitude weights anywhere. you can reach very high sparsity with little accuracy loss, but a random scatter of zeros doesn't speed up dense gpu kernels — the hardware still multiplies by zero. it only helps if you have sparse kernels or you're compressing for storage/transfer. structured pruning — remove whole channels, filters, or heads . this shrinks the actual tensor dimensions, so any dense kernel gets faster — no special hardware needed. the cost is it's coarser, so it usually needs fine-tuning to recover accuracy. the one-liner: \"unstructured prunes more but doesn't speed up dense gpus; structured prunes less but actually shrinks the compute. i'd pick structured for latency, then fine-tune.\" 2:4 structured sparsity (the nvidia-specific one) ampere (a100) and newer have sparse tensor cores that accelerate a specific pattern: in every contiguous group of 4 weights, at most 2 are non-zero (aka \"2:4\" or fine-grained structured sparsity). the hardware stores only the 2 non-zeros + a 2-bit index and skips the zeros, giving up to 2× matmul throughput . dense: [ w0 w1 w2 w3 ] → 4 multiplies 2:4: [ w0 0 w2 0 ] → 2 multiplies on sparse tensor cores (≈2×) workflow: train dense → prune to the 2:4 mask → fine-tune to recover accuracy → run on sparse tensor cores (tensorrt + apex / asp support it). why it matters: it's the rare pruning scheme that gives a guaranteed hardware speedup , so it's a likely question. know that it's 50% structured , needs a fine-tune step, and stacks with int8/fp8. knowledge distillation train a large accurate teacher , then train a small student to match the teacher's soft outputs (the full probability distribution, \"softened\" by a temperature t ), not just the hard labels. the soft targets carry dark knowledge — how the teacher spreads probability across classes (\"this 4 looks a bit like a 9\") — which is far richer supervision than a one-hot label. loss = α · ce(student, hard_labels) + (1−α) · t² · kl(student_t ‖ teacher_t) temperature t >1 softens both distributions so small logit differences matter; the t² term keeps gradient magnitudes comparable. variants: response-based (match logits, above), feature-based (match intermediate activations), relation-based (match relationships between layers/samples). this is how distilbert, tinybert, and most on-device models are made — and how big llms are distilled into small deployable ones. choosing and stacking they're complementary, and the standard production recipe stacks them: distill → smaller architecture (fundamental size cut) ↓ prune (2:4 structured) → fewer effective weights, hardware-accelerated ↓ quantize (int8 / fp8) → cheaper per-op ↓ compile (tensorrt) → fuse + pick kernels for the target gpu the instinct to voice: \"quantization first — cheapest big win. distillation when i need a genuinely smaller model, not just cheaper ops. structured/2:4 pruning when i want hardware speedup and can fine-tune. always re-measure accuracy after each step, and compile last.\" 🔗 connecting the dots — the real stack pytorch torch.nn.utils.prune , nvidia asp / apex for 2:4, tensorrt to run sparse+int8 engines; huggingface for distillation (distilbert). nvidia tensorrt-model-optimizer bundles quantization + sparsity + distillation in one toolkit — worth naming as \"the nvidia way to combine all of these.\" how you'd say it: \"beyond the quantization in my project, the next levers are structured 2:4 sparsity for a real hardware 2× on ampere+, and distillation if i need a smaller architecture rather than a cheaper one — all stackable, all followed by an accuracy re-check and a tensorrt compile.\" self-check why doesn't unstructured pruning speed up a normal gpu? *(scattered zeros still go through dense kernels; you need sparse kernels/hardware or structured pruning.)* what is 2:4 sparsity and what does it buy? *(≤2 non-zeros per group of 4 → sparse tensor cores skip the zeros for up to 2× matmul, after a fine-tune.)* why do soft targets beat hard labels in distillation? *(\"dark knowledge\" — the teacher's probability spread across classes is richer supervision than one-hot.)* what order would you stack these techniques? *(distill → prune → quantize → compile, re-measuring accuracy each step.)*","words":746},{"path":"12-nvidia-model-optimization/llm-inference.md","title":"LLM Inference Optimization","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"llm-inference-optimization\">LLM Inference Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> LLM inference has a structure classic CNNs don't: a compute-heavy <strong>prefill<\/strong> then a memory-bound, token-by-token <strong>decode<\/strong> whose cost is dominated by the <strong>KV cache<\/strong>. The optimization greatest-hits — KV cache, FlashAttention, paged attention, continuous batching, tensor/pipeline parallelism — all attack that structure. Even if the role isn't LLM-first, NVIDIA asks, because TensorRT-LLM is a flagship.<\/div><\/div>\n<h2 id=\"the-two-phases-frame-everything-around-this\">The two phases (frame everything around this)<\/h2>\n<pre><code>  PREFILL:  process the whole prompt in parallel   → compute-bound  (big matmuls, tensor cores)\n  DECODE:   generate 1 token, append, repeat       → memory-bound   (read all weights + KV per token)<\/code><\/pre>\n<p>Decode is the expensive part for long generations, and it's <strong>memory-bandwidth bound<\/strong>: each new token must read every weight and the whole KV cache from memory but does very little math per byte. <strong>This is why weight-only INT4 quantization helps LLM decode so much<\/strong> — it cuts the bytes you move, which is the actual bottleneck (tie this back to the roofline page).<\/p>\n<h2 id=\"kv-cache-the-central-data-structure\">KV cache (the central data structure)<\/h2>\n<p>Attention needs the keys/values of all previous tokens. Recomputing them every step is O(n²); instead you <strong>cache<\/strong> past keys and values and only compute the new token's Q·K. The cache <strong>grows linearly with sequence length × batch × layers × heads<\/strong> and quickly dominates memory. Managing it <em>is<\/em> LLM-serving optimization:<\/p>\n<ul><li><strong>Size<\/strong> is the problem — long contexts and big batches blow up HBM.<\/li><li><strong>KV-cache quantization<\/strong> (INT8/FP8 KV) roughly halves it.<\/li><li><strong>GQA / MQA<\/strong> (grouped/multi-query attention) — multiple query heads share one K/V head,<\/li><\/ul>\n<p>shrinking the cache several-fold. A standard modern-architecture answer.<\/p>\n<h2 id=\"flashattention-the-kernel-level-win\">FlashAttention (the kernel-level win)<\/h2>\n<p>Naive attention materializes the full <strong>N×N<\/strong> score matrix in HBM — O(N²) memory and lots of slow reads. <strong>FlashAttention<\/strong> fuses the whole attention op and <strong>tiles<\/strong> it through fast on-chip <strong>SRAM/shared memory<\/strong>, computing softmax <strong>online<\/strong> (running max/sum) so it never writes the N×N matrix to global memory. Result: <strong>O(N) memory, far fewer HBM trips, big speedup<\/strong> — a textbook \"memory-bound op fixed by fusion + tiling,\" which is exactly the roofline lesson applied to attention. Know it's <strong>exact, not approximate<\/strong>.<\/p>\n<h2 id=\"paged-attention-vllm-the-memory-management-win\">Paged attention / vLLM (the memory-management win)<\/h2>\n<p>The KV cache is normally one contiguous block per sequence, which <strong>fragments<\/strong> memory and forces over-allocation for the max length. <strong>PagedAttention<\/strong> (vLLM) stores the KV cache in fixed-size <strong>blocks<\/strong> mapped by an index table — like <strong>OS virtual-memory paging<\/strong>. Benefits: near-zero fragmentation, higher batch sizes, and <strong>copy-free sharing<\/strong> of common prefixes (system prompts, beam search). This is what lets vLLM pack far more concurrent requests per GPU.<\/p>\n<h2 id=\"continuous-in-flight-batching-the-scheduling-win\">Continuous (in-flight) batching (the scheduling win)<\/h2>\n<p>Static batching wastes the GPU: a batch waits for its <strong>slowest<\/strong> sequence to finish before starting the next batch, and finished sequences sit idle. <strong>Continuous batching<\/strong> schedules at the <strong>token/iteration level<\/strong> — as soon as one sequence finishes, a new one takes its slot, and new requests join mid-flight. This keeps the GPU saturated and is the single biggest throughput lever for real LLM traffic. TensorRT-LLM calls it <strong>in-flight batching<\/strong>; vLLM does it too.<\/p>\n<h2 id=\"parallelism-across-gpus-when-the-model-doesnt-fit\">Parallelism across GPUs (when the model doesn't fit)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Kind<\/th><th>What's split<\/th><th>Cost<\/th><th>When<\/th><\/tr><\/thead><tbody><tr><td><strong>Tensor parallelism (TP)<\/strong><\/td><td>each layer's matmul split across GPUs<\/td><td>heavy all-reduce every layer → needs <strong>NVLink<\/strong><\/td><td>model too big for one GPU; low latency<\/td><\/tr><tr><td><strong>Pipeline parallelism (PP)<\/strong><\/td><td>different <strong>layers<\/strong> on different GPUs<\/td><td>pipeline \"bubble\"; micro-batching hides it<\/td><td>very deep models across nodes<\/td><\/tr><tr><td><strong>Data parallelism<\/strong><\/td><td>different <strong>requests/batches<\/strong> per GPU replica<\/td><td>none between GPUs<\/td><td>throughput scaling of a model that fits<\/td><\/tr><tr><td><strong>Expert parallelism<\/strong><\/td><td>MoE experts across GPUs<\/td><td>routing/all-to-all<\/td><td>Mixture-of-Experts models<\/td><\/tr><\/tbody><\/table><\/div>\n<p>One-liner: <em>\"TP for a single big model where latency matters and you have NVLink bandwidth; PP to span many layers across nodes; DP to scale throughput once it fits.\"<\/em> (Training adds <strong>ZeRO/FSDP<\/strong> sharding of optimizer states — related but a training concern.)<\/p>\n<h2 id=\"speculative-decoding-bonus-lever\">Speculative decoding (bonus lever)<\/h2>\n<p>A small <strong>draft<\/strong> model proposes several tokens; the big model <strong>verifies<\/strong> them in one parallel pass, accepting the longest correct prefix. Since decode is memory-bound, verifying K tokens costs about the same as generating one — so you get <strong>multiple tokens per big-model pass<\/strong> with identical output distribution. Good \"how else would you speed up decode\" answer.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots — the real stack<\/h2>\n<p><strong>TensorRT-LLM<\/strong> (NVIDIA — in-flight batching, fused kernels, FP8, TP/PP) served via <strong>Triton<\/strong>; <strong>vLLM<\/strong> (PagedAttention, continuous batching); <strong>TGI<\/strong>; <strong>FlashAttention<\/strong> / FlashInfer kernels; <strong>SGLang<\/strong>. Weight quant via <strong>AWQ/GPTQ<\/strong>, KV-cache quant via FP8.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"LLM decode is memory-bound, so I optimize the KV cache first — paged attention for memory efficiency, GQA and FP8 KV to shrink it, FlashAttention for the kernel, and continuous/in-flight batching for throughput. For a model that doesn't fit, tensor parallelism over NVLink. On NVIDIA I'd reach for TensorRT-LLM behind Triton.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why is LLM decode memory-bound and what quantization helps most? *(reads all weights + KV<\/li><\/ul>\n<p>per token with little math → weight-only INT4 cuts the bytes moved.)*<\/p>\n<ul><li>What does FlashAttention change and is it approximate? *(tiles attention through SRAM,<\/li><\/ul>\n<p>online softmax, never materializes N×N → O(N) memory; exact.)*<\/p>\n<ul><li>Paged attention solves what? *(KV-cache fragmentation/over-allocation → higher batch,<\/li><\/ul>\n<p>prefix sharing, à la OS paging.)*<\/p>\n<ul><li>TP vs PP? *(TP splits each layer's matmul, needs fast interconnect; PP splits layers across<\/li><\/ul>\n<p>GPUs with a pipeline bubble.)*<\/p>\n<ul><li>Continuous vs static batching? *(schedule per-token so finished sequences are replaced<\/li><\/ul>\n<p>immediately and new requests join mid-flight → far higher GPU utilization.)*<\/p>","toc":[{"level":2,"id":"the-two-phases-frame-everything-around-this","text":"The two phases (frame everything around this)"},{"level":2,"id":"kv-cache-the-central-data-structure","text":"KV cache (the central data structure)"},{"level":2,"id":"flashattention-the-kernel-level-win","text":"FlashAttention (the kernel-level win)"},{"level":2,"id":"paged-attention-vllm-the-memory-management-win","text":"Paged attention / vLLM (the memory-management win)"},{"level":2,"id":"continuous-in-flight-batching-the-scheduling-win","text":"Continuous (in-flight) batching (the scheduling win)"},{"level":2,"id":"parallelism-across-gpus-when-the-model-doesnt-fit","text":"Parallelism across GPUs (when the model doesn't fit)"},{"level":2,"id":"speculative-decoding-bonus-lever","text":"Speculative decoding (bonus lever)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots — the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"llm inference optimization 💡 tl;dr llm inference has a structure classic cnns don't: a compute-heavy prefill then a memory-bound, token-by-token decode whose cost is dominated by the kv cache . the optimization greatest-hits — kv cache, flashattention, paged attention, continuous batching, tensor/pipeline parallelism — all attack that structure. even if the role isn't llm-first, nvidia asks, because tensorrt-llm is a flagship. the two phases (frame everything around this) prefill: process the whole prompt in parallel → compute-bound (big matmuls, tensor cores) decode: generate 1 token, append, repeat → memory-bound (read all weights + kv per token) decode is the expensive part for long generations, and it's memory-bandwidth bound : each new token must read every weight and the whole kv cache from memory but does very little math per byte. this is why weight-only int4 quantization helps llm decode so much — it cuts the bytes you move, which is the actual bottleneck (tie this back to the roofline page). kv cache (the central data structure) attention needs the keys/values of all previous tokens. recomputing them every step is o(n²); instead you cache past keys and values and only compute the new token's q·k. the cache grows linearly with sequence length × batch × layers × heads and quickly dominates memory. managing it is llm-serving optimization: size is the problem — long contexts and big batches blow up hbm. kv-cache quantization (int8/fp8 kv) roughly halves it. gqa / mqa (grouped/multi-query attention) — multiple query heads share one k/v head, shrinking the cache several-fold. a standard modern-architecture answer. flashattention (the kernel-level win) naive attention materializes the full n×n score matrix in hbm — o(n²) memory and lots of slow reads. flashattention fuses the whole attention op and tiles it through fast on-chip sram/shared memory , computing softmax online (running max/sum) so it never writes the n×n matrix to global memory. result: o(n) memory, far fewer hbm trips, big speedup — a textbook \"memory-bound op fixed by fusion + tiling,\" which is exactly the roofline lesson applied to attention. know it's exact, not approximate . paged attention / vllm (the memory-management win) the kv cache is normally one contiguous block per sequence, which fragments memory and forces over-allocation for the max length. pagedattention (vllm) stores the kv cache in fixed-size blocks mapped by an index table — like os virtual-memory paging . benefits: near-zero fragmentation, higher batch sizes, and copy-free sharing of common prefixes (system prompts, beam search). this is what lets vllm pack far more concurrent requests per gpu. continuous (in-flight) batching (the scheduling win) static batching wastes the gpu: a batch waits for its slowest sequence to finish before starting the next batch, and finished sequences sit idle. continuous batching schedules at the token/iteration level — as soon as one sequence finishes, a new one takes its slot, and new requests join mid-flight. this keeps the gpu saturated and is the single biggest throughput lever for real llm traffic. tensorrt-llm calls it in-flight batching ; vllm does it too. parallelism across gpus (when the model doesn't fit) kind what's split cost when tensor parallelism (tp) each layer's matmul split across gpus heavy all-reduce every layer → needs nvlink model too big for one gpu; low latency pipeline parallelism (pp) different layers on different gpus pipeline \"bubble\"; micro-batching hides it very deep models across nodes data parallelism different requests/batches per gpu replica none between gpus throughput scaling of a model that fits expert parallelism moe experts across gpus routing/all-to-all mixture-of-experts models one-liner: \"tp for a single big model where latency matters and you have nvlink bandwidth; pp to span many layers across nodes; dp to scale throughput once it fits.\" (training adds zero/fsdp sharding of optimizer states — related but a training concern.) speculative decoding (bonus lever) a small draft model proposes several tokens; the big model verifies them in one parallel pass, accepting the longest correct prefix. since decode is memory-bound, verifying k tokens costs about the same as generating one — so you get multiple tokens per big-model pass with identical output distribution. good \"how else would you speed up decode\" answer. 🔗 connecting the dots — the real stack tensorrt-llm (nvidia — in-flight batching, fused kernels, fp8, tp/pp) served via triton ; vllm (pagedattention, continuous batching); tgi ; flashattention / flashinfer kernels; sglang . weight quant via awq/gptq , kv-cache quant via fp8. how you'd say it: \"llm decode is memory-bound, so i optimize the kv cache first — paged attention for memory efficiency, gqa and fp8 kv to shrink it, flashattention for the kernel, and continuous/in-flight batching for throughput. for a model that doesn't fit, tensor parallelism over nvlink. on nvidia i'd reach for tensorrt-llm behind triton.\" self-check why is llm decode memory-bound and what quantization helps most? *(reads all weights + kv per token with little math → weight-only int4 cuts the bytes moved.)* what does flashattention change and is it approximate? *(tiles attention through sram, online softmax, never materializes n×n → o(n) memory; exact.)* paged attention solves what? *(kv-cache fragmentation/over-allocation → higher batch, prefix sharing, à la os paging.)* tp vs pp? *(tp splits each layer's matmul, needs fast interconnect; pp splits layers across gpus with a pipeline bubble.)* continuous vs static batching? *(schedule per-token so finished sequences are replaced immediately and new requests join mid-flight → far higher gpu utilization.)*","words":886},{"path":"12-nvidia-model-optimization/experiment-walkthrough.md","title":"Experiment Walkthrough (Your Project)","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"experiment-walkthrough-your-fashionmnist-quantization-project\">Experiment Walkthrough — Your FashionMNIST Quantization Project<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> You built the full optimization loop end-to-end: train an FP32 CNN → PTQ and QAT (fbgemm, CPU) → TensorRT INT8 (PTQ + QAT-fed) and FP16 (GPU) → compare six variants in MLflow. This page turns that into a <strong>2-minute spoken story<\/strong>, then fills the gaps an NVIDIA interviewer will poke at so no follow-up catches you flat.<\/div><\/div>\n<h2 id=\"the-2-minute-version-rehearse-this-out-loud\">The 2-minute version (rehearse this out loud)<\/h2>\n<blockquote><p>\"I took a small CNN on FashionMNIST through the whole optimization loop and tracked every variant in MLflow. Baseline FP32 on GPU was my reference. Then I split the problem on two axes: <strong>method<\/strong> — PTQ vs QAT — and <strong>engine<\/strong> — PyTorch's native fbgemm (CPU-only INT8) vs TensorRT (GPU INT8). PTQ just calibrates a trained model; QAT fine-tunes with fake-quant so weights tolerate rounding. For real GPU INT8 I exported to ONNX and built a TensorRT engine with an entropy calibrator, plus an FP16 engine as the easy win.<\/p>\n<p>The headline result: TensorRT FP16 was basically free accuracy-wise; TensorRT INT8-PTQ hit an accuracy cliff on this tiny model, and feeding QAT-hardened weights through the same calibrated engine recovered accuracy <strong>at identical speed<\/strong> — because on TensorRT, speed comes from the kernels and architecture, not the weight values. The whole thing taught me to separate <em>how you pick int8-friendly numbers<\/em> from <em>where you execute int8 fast<\/em>.\"<\/p><\/blockquote>\n<p>That framing — <strong>method axis vs engine axis<\/strong> — is your strongest asset. Lead with it.<\/p>\n<h2 id=\"the-comparison-table-know-every-cell-and-its-why\">The comparison table (know every cell and its \"why\")<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Variant<\/th><th>Method<\/th><th>Engine<\/th><th>Device<\/th><th>Precision<\/th><th>Expected result<\/th><\/tr><\/thead><tbody><tr><td><code>fp32<\/code><\/td><td>—<\/td><td>PyTorch<\/td><td>GPU<\/td><td>FP32<\/td><td>accuracy + latency reference<\/td><\/tr><tr><td><code>ptq<\/code><\/td><td>PTQ<\/td><td>fbgemm<\/td><td><strong>CPU<\/strong><\/td><td>INT8<\/td><td>small acc drop; CPU latency (not GPU-comparable)<\/td><\/tr><tr><td><code>qat<\/code><\/td><td>QAT<\/td><td>fbgemm<\/td><td><strong>CPU<\/strong><\/td><td>INT8<\/td><td>recovers acc; ~100× slower/sample (CPU vs GPU)<\/td><\/tr><tr><td><code>trt-fp16<\/code><\/td><td>—<\/td><td>TensorRT<\/td><td>GPU<\/td><td>FP16<\/td><td>~free accuracy, ~2× faster<\/td><\/tr><tr><td><code>trt-int8-ptq<\/code><\/td><td>PTQ (calib)<\/td><td>TensorRT<\/td><td>GPU<\/td><td>INT8<\/td><td>fastest; <strong>accuracy cliff (~0.83)<\/strong><\/td><\/tr><tr><td><code>trt-int8-qat<\/code><\/td><td>QAT weights + calib<\/td><td>TensorRT<\/td><td>GPU<\/td><td>INT8<\/td><td>acc recovered, <strong>same speed<\/strong> as int8-ptq<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The three <strong>GPU<\/strong> rows (<code>fp32<\/code>, <code>trt-fp16<\/code>, <code>trt-int8-*<\/code>) are the only apples-to-apples latency comparison — the <code>device<\/code> column exists precisely so nobody reads CPU-INT8 latency as comparable. Be ready to say why the CPU rows are there at all: <em>\"PyTorch's native quant only has CPU kernels, so fbgemm INT8 measures the method, not GPU speed — TensorRT is where GPU INT8 actually runs.\"<\/em><\/p>\n<h2 id=\"gaps-to-fill-before-the-interview\">Gaps to fill before the interview<\/h2>\n<p>Your notes are strong on the conceptual story. These are the follow-ups they don't yet answer — close them:<\/p>\n<h3 id=\"1-the-083-int8-cliff-have-a-root-cause-not-just-small-model\">1. The ~0.83 INT8 cliff — have a root cause, not just \"small model\"<\/h3>\n<p>Don't leave it at \"small models are sensitive.\" The concrete cause is almost certainly <strong>per-tensor weight quantization<\/strong> on a net with few, uneven channels, plus too little calibration data. Say: <em>\"I'd switch to <strong>per-channel<\/strong> weight scales and more calibration batches, and try <strong>percentile/entropy<\/strong> clipping before concluding the model needs QAT — that ordering usually recovers most of the drop cheaply.\"<\/em> (See <em>Quantization, Deeply<\/em>.)<\/p>\n<h3 id=\"2-implicit-vs-explicit-quantization-is-the-vocabulary-for-your-option-ab\">2. \"Implicit vs explicit quantization\" is the vocabulary for your Option A/B<\/h3>\n<p>You built the <strong>implicit<\/strong> path (calibrator picks scales). The <strong>explicit<\/strong> path (QDQ nodes from QAT via Model-Optimizer) was blocked by your torch/modelopt versions and by fbgemm fake-quant being un-exportable to ONNX. Use the official terms — it signals you know the TensorRT model, not just your workaround. (See <em>TensorRT Internals<\/em>.)<\/p>\n<h3 id=\"3-why-qat-recovered-accuracy-at-identical-speed\">3. Why QAT recovered accuracy at <em>identical<\/em> speed<\/h3>\n<p>Nail the reasoning: <strong>TensorRT latency is set by architecture + selected kernels, not weight values.<\/strong> TRT-PTQ and TRT-QAT compile to the same engine shape running the same INT8 kernels → same latency; QAT only moves the numbers to accuracy-friendlier values. Byte-identical speed, better accuracy.<\/p>\n<h3 id=\"4-your-latency-numbers-need-proper-gpu-timing-hygiene\">4. Your latency numbers need proper GPU timing hygiene<\/h3>\n<p>\"0.0009 ms/sample\" invites <em>\"how did you measure that?\"<\/em> Answer with: <strong>CUDA events + synchronize + warmup<\/strong>, report <strong>p99 not just mean<\/strong>, and note that locking clocks removes boost/thermal noise. Your <code>warmup(10)<\/code> and <code>itertools.cycle<\/code> fixes are exactly this discipline — frame them that way. (See <em>GPU Performance &amp; Profiling<\/em>.)<\/p>\n<h3 id=\"5-the-gpu-is-idle-story-is-a-performance-analysis-story\">5. The \"GPU is idle\" story is a performance-analysis story<\/h3>\n<p>Reframe issue #3 from \"bug I fixed\" to \"bound I diagnosed\": the model was <strong>overhead/feed- bound<\/strong>, not compute-bound — kernels too small to saturate anything. You'd confirm on an <strong>Nsight Systems<\/strong> timeline; the dataloader tuning fixed the feed, and <strong>CUDA Graphs<\/strong> + bigger batches would kill launch overhead if latency mattered.<\/p>\n<h3 id=\"6-bn-folding-is-why-the-qatplain-model-remap-was-needed\">6. BN folding is why the QAT→plain-model remap was needed<\/h3>\n<p>Frame issue #7b crisply: <strong>fused Conv+BN+ReLU<\/strong> means BN params live under the fused module, so folding them into the plain conv is <em>exact math<\/em>, and that's why the state-dict keys had to be remapped. It's not a hack — it's the same fold TensorRT does internally.<\/p>\n<h3 id=\"7-sanity-numbers-to-have-ready\">7. Sanity numbers to have ready<\/h3>\n<p>FP32→INT8 is <strong>~4× smaller / faster math<\/strong>; FP16 is <strong>~2×, near-free accuracy<\/strong>. Model size should drop ~4× for INT8, ~2× for FP16 — be ready to confirm your <code>model_size_mb<\/code> column matches, and if INT8 <em>isn't<\/em> ~4× smaller, know why (e.g. some layers kept in higher precision).<\/p>\n<h2 id=\"strong-what-would-you-do-next-answers\">Strong \"what would you do next\" answers<\/h2>\n<p>These double as your project's roadmap and show optimization maturity:<\/p>\n<ul><li><strong>Explicit QDQ export<\/strong> so TensorRT skips calibration and honors QAT's <em>learned<\/em> scales<\/li><\/ul>\n<p>(the one refinement your notes still list as open) — via TensorRT-Model-Optimizer on a   compatible torch build.<\/p>\n<ul><li><strong>Per-channel weight quantization + more calibration<\/strong> to close the INT8 cliff cheaply.<\/li><li><strong>Dynamic-shape engine<\/strong> with a min/opt/max optimization profile → kills the fixed-batch<\/li><\/ul>\n<p>padding hack and serves variable batch sizes.<\/p>\n<ul><li><strong>Serve it through Triton<\/strong> with dynamic batching + concurrent instances; register the best<\/li><\/ul>\n<p>engine in the MLflow Model Registry.<\/p>\n<ul><li><strong>Profile with Nsight<\/strong> to show <em>where<\/em> the INT8 speedup comes from, not just that it exists.<\/li><\/ul>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Give the 2-minute story in your own words, leading with the method-vs-engine split.<\/li><li>Why is TRT-QAT the same speed as TRT-PTQ? *(same engine shape/kernels; weights only affect<\/li><\/ul>\n<p>accuracy.)*<\/p>\n<ul><li>Root-cause the INT8 accuracy cliff without saying \"small model.\" *(per-tensor weight quant +<\/li><\/ul>\n<p>scarce calibration; fix with per-channel + more/better calibration before QAT.)*<\/p>\n<ul><li>How did you measure latency, and what would an interviewer want added? *(CUDA<\/li><\/ul>\n<p>events/sync/warmup; add p99, locked clocks, Nsight to attribute it.)*<\/p>","toc":[{"level":2,"id":"the-2-minute-version-rehearse-this-out-loud","text":"The 2-minute version (rehearse this out loud)"},{"level":2,"id":"the-comparison-table-know-every-cell-and-its-why","text":"The comparison table (know every cell and its \"why\")"},{"level":2,"id":"gaps-to-fill-before-the-interview","text":"Gaps to fill before the interview"},{"level":3,"id":"1-the-083-int8-cliff-have-a-root-cause-not-just-small-model","text":"1. The ~0.83 INT8 cliff — have a root cause, not just \"small model\""},{"level":3,"id":"2-implicit-vs-explicit-quantization-is-the-vocabulary-for-your-option-ab","text":"2. \"Implicit vs explicit quantization\" is the vocabulary for your Option A/B"},{"level":3,"id":"3-why-qat-recovered-accuracy-at-identical-speed","text":"3. Why QAT recovered accuracy at identical speed"},{"level":3,"id":"4-your-latency-numbers-need-proper-gpu-timing-hygiene","text":"4. Your latency numbers need proper GPU timing hygiene"},{"level":3,"id":"5-the-gpu-is-idle-story-is-a-performance-analysis-story","text":"5. The \"GPU is idle\" story is a performance-analysis story"},{"level":3,"id":"6-bn-folding-is-why-the-qatplain-model-remap-was-needed","text":"6. BN folding is why the QAT→plain-model remap was needed"},{"level":3,"id":"7-sanity-numbers-to-have-ready","text":"7. Sanity numbers to have ready"},{"level":2,"id":"strong-what-would-you-do-next-answers","text":"Strong \"what would you do next\" answers"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"experiment walkthrough — your fashionmnist quantization project 💡 tl;dr you built the full optimization loop end-to-end: train an fp32 cnn → ptq and qat (fbgemm, cpu) → tensorrt int8 (ptq + qat-fed) and fp16 (gpu) → compare six variants in mlflow. this page turns that into a 2-minute spoken story , then fills the gaps an nvidia interviewer will poke at so no follow-up catches you flat. the 2-minute version (rehearse this out loud) \"i took a small cnn on fashionmnist through the whole optimization loop and tracked every variant in mlflow. baseline fp32 on gpu was my reference. then i split the problem on two axes: method — ptq vs qat — and engine — pytorch's native fbgemm (cpu-only int8) vs tensorrt (gpu int8). ptq just calibrates a trained model; qat fine-tunes with fake-quant so weights tolerate rounding. for real gpu int8 i exported to onnx and built a tensorrt engine with an entropy calibrator, plus an fp16 engine as the easy win. the headline result: tensorrt fp16 was basically free accuracy-wise; tensorrt int8-ptq hit an accuracy cliff on this tiny model, and feeding qat-hardened weights through the same calibrated engine recovered accuracy at identical speed — because on tensorrt, speed comes from the kernels and architecture, not the weight values. the whole thing taught me to separate how you pick int8-friendly numbers from where you execute int8 fast .\" that framing — method axis vs engine axis — is your strongest asset. lead with it. the comparison table (know every cell and its \"why\") variant method engine device precision expected result fp32 — pytorch gpu fp32 accuracy + latency reference ptq ptq fbgemm cpu int8 small acc drop; cpu latency (not gpu-comparable) qat qat fbgemm cpu int8 recovers acc; ~100× slower/sample (cpu vs gpu) trt-fp16 — tensorrt gpu fp16 ~free accuracy, ~2× faster trt-int8-ptq ptq (calib) tensorrt gpu int8 fastest; accuracy cliff (~0.83) trt-int8-qat qat weights + calib tensorrt gpu int8 acc recovered, same speed as int8-ptq the three gpu rows ( fp32 , trt-fp16 , trt-int8-* ) are the only apples-to-apples latency comparison — the device column exists precisely so nobody reads cpu-int8 latency as comparable. be ready to say why the cpu rows are there at all: \"pytorch's native quant only has cpu kernels, so fbgemm int8 measures the method, not gpu speed — tensorrt is where gpu int8 actually runs.\" gaps to fill before the interview your notes are strong on the conceptual story. these are the follow-ups they don't yet answer — close them: 1. the ~0.83 int8 cliff — have a root cause, not just \"small model\" don't leave it at \"small models are sensitive.\" the concrete cause is almost certainly per-tensor weight quantization on a net with few, uneven channels, plus too little calibration data. say: \"i'd switch to per-channel weight scales and more calibration batches, and try percentile/entropy clipping before concluding the model needs qat — that ordering usually recovers most of the drop cheaply.\" (see quantization, deeply .) 2. \"implicit vs explicit quantization\" is the vocabulary for your option a/b you built the implicit path (calibrator picks scales). the explicit path (qdq nodes from qat via model-optimizer) was blocked by your torch/modelopt versions and by fbgemm fake-quant being un-exportable to onnx. use the official terms — it signals you know the tensorrt model, not just your workaround. (see tensorrt internals .) 3. why qat recovered accuracy at identical speed nail the reasoning: tensorrt latency is set by architecture + selected kernels, not weight values. trt-ptq and trt-qat compile to the same engine shape running the same int8 kernels → same latency; qat only moves the numbers to accuracy-friendlier values. byte-identical speed, better accuracy. 4. your latency numbers need proper gpu timing hygiene \"0.0009 ms/sample\" invites \"how did you measure that?\" answer with: cuda events + synchronize + warmup , report p99 not just mean , and note that locking clocks removes boost/thermal noise. your warmup(10) and itertools.cycle fixes are exactly this discipline — frame them that way. (see gpu performance & profiling .) 5. the \"gpu is idle\" story is a performance-analysis story reframe issue #3 from \"bug i fixed\" to \"bound i diagnosed\": the model was overhead/feed- bound , not compute-bound — kernels too small to saturate anything. you'd confirm on an nsight systems timeline; the dataloader tuning fixed the feed, and cuda graphs + bigger batches would kill launch overhead if latency mattered. 6. bn folding is why the qat→plain-model remap was needed frame issue #7b crisply: fused conv+bn+relu means bn params live under the fused module, so folding them into the plain conv is exact math , and that's why the state-dict keys had to be remapped. it's not a hack — it's the same fold tensorrt does internally. 7. sanity numbers to have ready fp32→int8 is ~4× smaller / faster math ; fp16 is ~2×, near-free accuracy . model size should drop ~4× for int8, ~2× for fp16 — be ready to confirm your model_size_mb column matches, and if int8 isn't ~4× smaller, know why (e.g. some layers kept in higher precision). strong \"what would you do next\" answers these double as your project's roadmap and show optimization maturity: explicit qdq export so tensorrt skips calibration and honors qat's learned scales (the one refinement your notes still list as open) — via tensorrt-model-optimizer on a compatible torch build. per-channel weight quantization + more calibration to close the int8 cliff cheaply. dynamic-shape engine with a min/opt/max optimization profile → kills the fixed-batch padding hack and serves variable batch sizes. serve it through triton with dynamic batching + concurrent instances; register the best engine in the mlflow model registry. profile with nsight to show where the int8 speedup comes from, not just that it exists. self-check give the 2-minute story in your own words, leading with the method-vs-engine split. why is trt-qat the same speed as trt-ptq? *(same engine shape/kernels; weights only affect accuracy.)* root-cause the int8 accuracy cliff without saying \"small model.\" *(per-tensor weight quant + scarce calibration; fix with per-channel + more/better calibration before qat.)* how did you measure latency, and what would an interviewer want added? *(cuda events/sync/warmup; add p99, locked clocks, nsight to attribute it.)*","words":1031},{"path":"12-nvidia-model-optimization/interview-qa.md","title":"Interview Q&A — Rapid Fire","section":"12 · NVIDIA Model Optimization","quiz":true,"accent":"#76b900","html":"<h1 id=\"interview-qa-rapid-fire\">Interview Q&amp;A — Rapid Fire<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Last-mile drill for the NVIDIA model-optimization loop. Each answer is the 30-second spoken version. Questions are grouped the way an interviewer escalates: numerics → TensorRT → performance → breadth. Cover the answer, say it out loud, then check.<\/div><\/div>\n<h2 id=\"quantization-numerics\">Quantization &amp; numerics<\/h2>\n<details class=\"qa\" open><summary>Q: Derive the INT8 scale for a symmetric quantizer with range ±α.<\/summary><div class=\"qa-body\"><p>scale = α / 127 (signed INT8 uses −128…127, and symmetric maps to ±127). Dequant is <code>r = scale · q<\/code>, zero-point is 0. Asymmetric adds a zero-point and uses the full [β, α] range.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Symmetric vs asymmetric — when each?<\/summary><div class=\"qa-body\"><p>Symmetric for weights (roughly zero-centered, and it drops the zero-point term from the matmul). Asymmetric for one-sided activations like post-ReLU, where a symmetric range would waste half the codes.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Per-tensor vs per-channel, and why does it matter?<\/summary><div class=\"qa-body\"><p>Per-tensor uses one scale for the whole weight tensor; per-channel uses one scale per output channel. Per-channel lets each channel use the full INT8 range, so it's the standard fix when channels have very different magnitudes — it's nearly free and often recovers most of an INT8 accuracy drop.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is calibration, and why is entropy better than min–max?<\/summary><div class=\"qa-body\"><p>Calibration picks the clipping range α for activations by observing real batches. Min–max takes the observed max, so one outlier inflates the scale and coarsens every step. Entropy/KL calibration (TensorRT's default) clips α to minimize divergence between the FP32 and INT8 distributions — robust to outliers, better accuracy.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: PTQ vs QAT in one breath.<\/summary><div class=\"qa-body\"><p>PTQ calibrates a trained model without touching weights — fast, minutes, bigger accuracy hit. QAT inserts fake-quant during fine-tuning so the model learns to tolerate rounding — slower, recovers accuracy. PTQ first; QAT when PTQ drops too much.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you backprop through the non-differentiable round() in QAT?<\/summary><div class=\"qa-body\"><p>Straight-Through Estimator: treat the rounding's gradient as 1 inside the clipping range and 0 outside, so gradients flow despite the hard rounding.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: FP16 vs BF16 — why does FP16 need loss scaling?<\/summary><div class=\"qa-body\"><p>FP16 has a narrow exponent range, so small gradients underflow to zero; loss scaling multiplies the loss up so gradients stay representable, then unscales before the step. BF16 shares FP32's 8-bit exponent, so no underflow and no loss scaling — at the cost of fewer mantissa bits.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's TF32 and when does it apply?<\/summary><div class=\"qa-body\"><p>A 19-bit tensor-core format (8 exp, 10 mantissa) used automatically for FP32 matmuls on Ampere+. Near-FP32 accuracy at FP16-ish speed — on by default, so part of \"FP32→FP16\" speedups are really TF32.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why two FP8 formats?<\/summary><div class=\"qa-body\"><p>E4M3 (precision-heavy) for the forward pass — weights/activations; E5M2 (range-heavy) for gradients. FP8 needs per-tensor scaling, handled by Transformer Engine, and doubles tensor-core throughput vs FP16 on Hopper/Ada.<\/p><\/div><\/details><h2 id=\"tensorrt\">TensorRT<\/h2>\n<details class=\"qa\" open><summary>Q: What does the TensorRT builder actually do?<\/summary><div class=\"qa-body\"><p>Layer/tensor fusion (e.g. Conv+BN+ReLU → one kernel), kernel auto-tuning (times candidate kernels on your GPU to pick the fastest), precision selection, and memory planning. Output is a serialized engine specific to that GPU and TRT version.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Implicit vs explicit quantization?<\/summary><div class=\"qa-body\"><p>Implicit: give TRT an FP32 network + a calibrator; it picks scales and decides which layers go INT8. Explicit (QDQ): the ONNX carries QuantizeLinear/DequantizeLinear nodes with baked-in QAT scales that TRT honors exactly. Explicit is deterministic and the recommended path.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Do QDQ nodes slow down inference?<\/summary><div class=\"qa-body\"><p>No — they're build-time instructions. The builder fuses Q→Conv→DQ into one INT8 kernel and discards the markers. They change achievable accuracy, not runtime speed, unless placed so densely they can't be fused.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why isn't a TensorRT engine portable across GPUs?<\/summary><div class=\"qa-body\"><p>Because tactic selection times kernels for a specific architecture and TRT version; an engine built for one GPU family may be suboptimal or invalid on another. Build on the deployment GPU.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How would you serve a TensorRT engine in production?<\/summary><div class=\"qa-body\"><p>Behind Triton Inference Server with dynamic batching and a couple of concurrent model instances to raise utilization, plus an optimization profile for dynamic batch sizes.<\/p><\/div><\/details><h2 id=\"performance-profiling\">Performance &amp; profiling<\/h2>\n<details class=\"qa\" open><summary>Q: Is this kernel compute-bound or memory-bound — how do you decide?<\/summary><div class=\"qa-body\"><p>Compute its arithmetic intensity (FLOPs per byte) and place it on the roofline. Low intensity → memory-bound (fix with fusion, better layout, lower precision); high → compute-bound (tensor cores, tiling). Elementwise ops are almost always memory-bound.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Your GPU shows low utilization during training — what's wrong?<\/summary><div class=\"qa-body\"><p>Usually not compute — it's a feed or launch overhead problem. Confirm on an Nsight Systems timeline: if the GPU is idle waiting on the dataloader, add workers/pinned memory/prefetch and bigger batches; if it's launch-bound on tiny kernels, use CUDA Graphs.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Nsight Systems vs Nsight Compute?<\/summary><div class=\"qa-body\"><p>Systems is the system-wide timeline — \"is the GPU busy and what's it waiting on.\" Compute is the per-kernel deep dive — roofline placement, occupancy, memory vs compute for one kernel.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you correctly measure GPU inference latency?<\/summary><div class=\"qa-body\"><p>CUDA events with <code>torch.cuda.synchronize<\/code>, a warmup to absorb one-time costs, many iterations, and report p50/p99 — not a single wall-clock call, because kernels are async. Lock clocks to cut boost/thermal noise.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is a CUDA stream good for?<\/summary><div class=\"qa-body\"><p>Overlapping independent work — e.g. copy the next batch (pinned + non_blocking) while computing the current one, or running independent kernels concurrently. Higher utilization.<\/p><\/div><\/details><h2 id=\"compression-breadth\">Compression breadth<\/h2>\n<details class=\"qa\" open><summary>Q: Why doesn't unstructured pruning speed up a GPU?<\/summary><div class=\"qa-body\"><p>Scattered zeros still pass through dense kernels — the hardware multiplies by zero. You need structured pruning (whole channels) or a hardware-supported sparse pattern.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is 2:4 sparsity?<\/summary><div class=\"qa-body\"><p>At most 2 non-zeros per group of 4 weights. Ampere+ sparse tensor cores skip the zeros for up to 2× matmul throughput. Train dense → apply the 2:4 mask → fine-tune → run sparse; stacks with INT8/FP8.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why are soft targets better than hard labels in distillation?<\/summary><div class=\"qa-body\"><p>The teacher's softened probability distribution carries \"dark knowledge\" about class similarity — far richer supervision than a one-hot label — so the student learns more from fewer signals.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: In what order would you stack optimizations?<\/summary><div class=\"qa-body\"><p>Distill (smaller architecture) → prune (structured/2:4) → quantize (INT8/FP8) → compile (TensorRT), re-measuring accuracy after each step and profiling to confirm the speedup.<\/p><\/div><\/details><h2 id=\"llm-inference\">LLM inference<\/h2>\n<details class=\"qa\" open><summary>Q: Why is LLM decode memory-bound, and what helps?<\/summary><div class=\"qa-body\"><p>Each token reads all weights + the whole KV cache but does little math per byte → bandwidth limited. Weight-only INT4, KV-cache quantization (FP8/INT8), and GQA/MQA all cut the bytes moved.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does FlashAttention do?<\/summary><div class=\"qa-body\"><p>Fuses attention and tiles it through on-chip SRAM with an online softmax, so it never writes the N×N score matrix to global memory — O(N) memory, far fewer HBM trips, and it's exact.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Paged attention?<\/summary><div class=\"qa-body\"><p>Stores the KV cache in fixed-size blocks mapped by an index table, like OS virtual memory — eliminates fragmentation, raises batch size, and enables copy-free prefix sharing (vLLM).<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Continuous / in-flight batching?<\/summary><div class=\"qa-body\"><p>Schedule at the token level so a finished sequence is immediately replaced and new requests join mid-flight — keeps the GPU saturated instead of waiting for the slowest sequence in a static batch. Biggest throughput lever for real traffic.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Tensor vs pipeline parallelism?<\/summary><div class=\"qa-body\"><p>Tensor parallelism splits each layer's matmul across GPUs (heavy per-layer all-reduce, wants NVLink); pipeline parallelism puts different layers on different GPUs (has a pipeline bubble, hidden with micro-batching). TP for latency on a big single model, PP to span many layers.<\/p><\/div><\/details><h2 id=\"the-three-questions-to-never-fumble\">The three questions to never fumble<\/h2>\n<details class=\"qa\" open><summary>Q: What's the single mental model you bring to any optimization problem?<\/summary><div class=\"qa-body\"><p>Separate the three axes: <strong>method<\/strong> (how you pick int8-friendly weights/scales — PTQ/QAT/ calibration), <strong>format<\/strong> (which numbers you compute in — FP32/FP16/BF16/FP8/INT8), and <strong>engine<\/strong> (where it runs fast — TensorRT/Triton/CUDA kernels/fusion). Most questions are asking me to hold two of these apart.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: You optimized a model — walk me through it.<\/summary><div class=\"qa-body\"><p>The FashionMNIST story: FP32 baseline → PTQ/QAT on the method axis, fbgemm-CPU vs TensorRT-GPU on the engine axis, FP16/INT8 on the format axis, all tracked in MLflow — with the punchline that QAT-fed TensorRT recovered accuracy at identical speed because TRT latency comes from kernels, not weight values.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you know your optimization actually worked?<\/summary><div class=\"qa-body\"><p>Profile before and after — Nsight to attribute the speedup and confirm the new bottleneck, proper CUDA-event timing with warmup and p99, and an accuracy re-check after every step. Never claim a speedup I didn't measure, never ship an accuracy drop I didn't quantify.<\/p><\/div><\/details>","toc":[{"level":2,"id":"quantization-numerics","text":"Quantization &amp; numerics"},{"level":2,"id":"tensorrt","text":"TensorRT"},{"level":2,"id":"performance-profiling","text":"Performance &amp; profiling"},{"level":2,"id":"compression-breadth","text":"Compression breadth"},{"level":2,"id":"llm-inference","text":"LLM inference"},{"level":2,"id":"the-three-questions-to-never-fumble","text":"The three questions to never fumble"}],"text":"interview q&a — rapid fire 💡 tl;dr last-mile drill for the nvidia model-optimization loop. each answer is the 30-second spoken version. questions are grouped the way an interviewer escalates: numerics → tensorrt → performance → breadth. cover the answer, say it out loud, then check. quantization & numerics q: derive the int8 scale for a symmetric quantizer with range ±α. scale = α / 127 (signed int8 uses −128…127, and symmetric maps to ±127). dequant is r = scale · q , zero-point is 0. asymmetric adds a zero-point and uses the full [β, α] range. q: symmetric vs asymmetric — when each? symmetric for weights (roughly zero-centered, and it drops the zero-point term from the matmul). asymmetric for one-sided activations like post-relu, where a symmetric range would waste half the codes. q: per-tensor vs per-channel, and why does it matter? per-tensor uses one scale for the whole weight tensor; per-channel uses one scale per output channel. per-channel lets each channel use the full int8 range, so it's the standard fix when channels have very different magnitudes — it's nearly free and often recovers most of an int8 accuracy drop. q: what is calibration, and why is entropy better than min–max? calibration picks the clipping range α for activations by observing real batches. min–max takes the observed max, so one outlier inflates the scale and coarsens every step. entropy/kl calibration (tensorrt's default) clips α to minimize divergence between the fp32 and int8 distributions — robust to outliers, better accuracy. q: ptq vs qat in one breath. ptq calibrates a trained model without touching weights — fast, minutes, bigger accuracy hit. qat inserts fake-quant during fine-tuning so the model learns to tolerate rounding — slower, recovers accuracy. ptq first; qat when ptq drops too much. q: how do you backprop through the non-differentiable round() in qat? straight-through estimator: treat the rounding's gradient as 1 inside the clipping range and 0 outside, so gradients flow despite the hard rounding. q: fp16 vs bf16 — why does fp16 need loss scaling? fp16 has a narrow exponent range, so small gradients underflow to zero; loss scaling multiplies the loss up so gradients stay representable, then unscales before the step. bf16 shares fp32's 8-bit exponent, so no underflow and no loss scaling — at the cost of fewer mantissa bits. q: what's tf32 and when does it apply? a 19-bit tensor-core format (8 exp, 10 mantissa) used automatically for fp32 matmuls on ampere+. near-fp32 accuracy at fp16-ish speed — on by default, so part of \"fp32→fp16\" speedups are really tf32. q: why two fp8 formats? e4m3 (precision-heavy) for the forward pass — weights/activations; e5m2 (range-heavy) for gradients. fp8 needs per-tensor scaling, handled by transformer engine, and doubles tensor-core throughput vs fp16 on hopper/ada. tensorrt q: what does the tensorrt builder actually do? layer/tensor fusion (e.g. conv+bn+relu → one kernel), kernel auto-tuning (times candidate kernels on your gpu to pick the fastest), precision selection, and memory planning. output is a serialized engine specific to that gpu and trt version. q: implicit vs explicit quantization? implicit: give trt an fp32 network + a calibrator; it picks scales and decides which layers go int8. explicit (qdq): the onnx carries quantizelinear/dequantizelinear nodes with baked-in qat scales that trt honors exactly. explicit is deterministic and the recommended path. q: do qdq nodes slow down inference? no — they're build-time instructions. the builder fuses q→conv→dq into one int8 kernel and discards the markers. they change achievable accuracy, not runtime speed, unless placed so densely they can't be fused. q: why isn't a tensorrt engine portable across gpus? because tactic selection times kernels for a specific architecture and trt version; an engine built for one gpu family may be suboptimal or invalid on another. build on the deployment gpu. q: how would you serve a tensorrt engine in production? behind triton inference server with dynamic batching and a couple of concurrent model instances to raise utilization, plus an optimization profile for dynamic batch sizes. performance & profiling q: is this kernel compute-bound or memory-bound — how do you decide? compute its arithmetic intensity (flops per byte) and place it on the roofline. low intensity → memory-bound (fix with fusion, better layout, lower precision); high → compute-bound (tensor cores, tiling). elementwise ops are almost always memory-bound. q: your gpu shows low utilization during training — what's wrong? usually not compute — it's a feed or launch overhead problem. c

n> LLM inference has a structure classic CNNs don't: a compute-heavy <strong>prefill<\/strong> then a memory-bound, token-by-token <strong>decode<\/strong> whose cost is dominated by the <strong>KV cache<\/strong>. The optimization greatest-hits — KV cache, FlashAttention, paged attention, continuous batching, tensor/pipeline parallelism — all attack that structure. Even if the role isn't LLM-first, NVIDIA asks, because TensorRT-LLM is a flagship.<\/div><\/div>\n<h2 id=\"the-two-phases-frame-everything-around-this\">The two phases (frame everything around this)<\/h2>\n<div class=\"compare\">\n  <div class=\"cmp-col blue\">\n    <div class=\"cmp-h\">PREFILL<\/div>\n    <p>Process the <b>whole prompt in parallel<\/b> — big matmuls on tensor cores.<\/p>\n    <span class=\"cmp-tag\">compute-bound<\/span>\n  <\/div>\n  <div class=\"cmp-col accent\">\n    <div class=\"cmp-h\">DECODE<\/div>\n    <p>Generate <b>1 token, append, repeat<\/b> — read all weights + KV every step.<\/p>\n    <span class=\"cmp-tag\">memory-bound<\/span>\n  <\/div>\n<\/div>\n<p>Decode is the expensive part for long generations, and it's <strong>memory-bandwidth bound<\/strong>: each new token must read every weight and the whole KV cache from memory but does very little math per byte. <strong>This is why weight-only INT4 quantization helps LLM decode so much<\/strong> — it cuts the bytes you move, which is the actual bottleneck (tie this back to the roofline page).<\/p>\n<h2 id=\"kv-cache-the-central-data-structure\">KV cache (the central data structure)<\/h2>\n<p>Attention needs the keys/values of all previous tokens. Recomputing them every step is O(n²); instead you <strong>cache<\/strong> past keys and values and only compute the new token's Q·K. The cache <strong>grows linearly with sequence length × batch × layers × heads<\/strong> and quickly dominates memory. Managing it <em>is<\/em> LLM-serving optimization:<\/p>\n<ul><li><strong>Size<\/strong> is the problem — long contexts and big batches blow up HBM.<\/li><li><strong>KV-cache quantization<\/strong> (INT8/FP8 KV) roughly halves it.<\/li><li><strong>GQA / MQA<\/strong> (grouped/multi-query attention) — multiple query heads share one K/V head,<\/li><\/ul>\n<p>shrinking the cache several-fold. A standard modern-architecture answer.<\/p>\n<p><strong>Feel the memory wall.<\/strong> Estimate serving VRAM below. Start at 7B / FP16 and weights dominate — so quantizing them is the win. Now crank context length and batch: the KV cache overtakes the weights and the total explodes past a single 80 GB GPU. That crossover is exactly why paged attention, KV quantization, and GQA exist.<\/p>\n<div id=\"llmmem-widget\" class=\"widget-host\"><\/div>\n<h2 id=\"flashattention-the-kernel-level-win\">FlashAttention (the kernel-level win)<\/h2>\n<p>Naive attention materializes the full <strong>N×N<\/strong> score matrix in HBM — O(N²) memory and lots of slow reads. <strong>FlashAttention<\/strong> fuses the whole attention op and <strong>tiles<\/strong> it through fast on-chip <strong>SRAM/shared memory<\/strong>, computing softmax <strong>online<\/strong> (running max/sum) so it never writes the N×N matrix to global memory. Result: <strong>O(N) memory, far fewer HBM trips, big speedup<\/strong> — a textbook \"memory-bound op fixed by fusion + tiling,\" which is exactly the roofline lesson applied to attention. Know it's <strong>exact, not approximate<\/strong>.<\/p>\n<h2 id=\"paged-attention-vllm-the-memory-management-win\">Paged attention / vLLM (the memory-management win)<\/h2>\n<p>The KV cache is normally one contiguous block per sequence, which <strong>fragments<\/strong> memory and forces over-allocation for the max length. <strong>PagedAttention<\/strong> (vLLM) stores the KV cache in fixed-size <strong>blocks<\/strong> mapped by an index table — like <strong>OS virtual-memory paging<\/strong>. Benefits: near-zero fragmentation, higher batch sizes, and <strong>copy-free sharing<\/strong> of common prefixes (system prompts, beam search). This is what lets vLLM pack far more concurrent requests per GPU.<\/p>\n<h2 id=\"continuous-in-flight-batching-the-scheduling-win\">Continuous (in-flight) batching (the scheduling win)<\/h2>\n<p>Static batching wastes the GPU: a batch waits for its <strong>slowest<\/strong> sequence to finish before starting the next batch, and finished sequences sit idle. <strong>Continuous batching<\/strong> schedules at the <strong>token/iteration level<\/strong> — as soon as one sequence finishes, a new one takes its slot, and new requests join mid-flight. This keeps the GPU saturated and is the single biggest throughput lever for real LLM traffic. TensorRT-LLM calls it <strong>in-flight batching<\/strong>; vLLM does it too.<\/p>\n<h2 id=\"parallelism-across-gpus-when-the-model-doesnt-fit\">Parallelism across GPUs (when the model doesn't fit)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Kind<\/th><th>What's split<\/th><th>Cost<\/th><th>When<\/th><\/tr><\/thead><tbody><tr><td><strong>Tensor parallelism (TP)<\/strong><\/td><td>each layer's matmul split across GPUs<\/td><td>heavy all-reduce every layer → needs <strong>NVLink<\/strong><\/td><td>model too big for one GPU; low latency<\/td><\/tr><tr><td><strong>Pipeline parallelism (PP)<\/strong><\/td><td>different <strong>layers<\/strong> on different GPUs<\/td><td>pipeline \"bubble\"; micro-batching hides it<\/td><td>very deep models across nodes<\/td><\/tr><tr><td><strong>Data parallelism<\/strong><\/td><td>different <strong>requests/batches<\/strong> per GPU replica<\/td><td>none between GPUs<\/td><td>throughput scaling of a model that fits<\/td><\/tr><tr><td><strong>Expert parallelism<\/strong><\/td><td>MoE experts across GPUs<\/td><td>routing/all-to-all<\/td><td>Mixture-of-Experts models<\/td><\/tr><\/tbody><\/table><\/div>\n<p>One-liner: <em>\"TP for a single big model where latency matters and you have NVLink bandwidth; PP to span many layers across nodes; DP to scale throughput once it fits.\"<\/em> (Training adds <strong>ZeRO/FSDP<\/strong> sharding of optimizer states — related but a training concern.)<\/p>\n<h2 id=\"speculative-decoding-bonus-lever\">Speculative decoding (bonus lever)<\/h2>\n<p>A small <strong>draft<\/strong> model proposes several tokens; the big model <strong>verifies<\/strong> them in one parallel pass, accepting the longest correct prefix. Since decode is memory-bound, verifying K tokens costs about the same as generating one — so you get <strong>multiple tokens per big-model pass<\/strong> with identical output distribution. Good \"how else would you speed up decode\" answer.<\/p>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>TensorRT-LLM<\/strong> (NVIDIA — in-flight batching, fused kernels, FP8, TP/PP) served via <strong>Triton<\/strong>; <strong>vLLM<\/strong> (PagedAttention, continuous batching); <strong>TGI<\/strong>; <strong>FlashAttention<\/strong> / FlashInfer kernels; <strong>SGLang<\/strong>. Weight quant via <strong>AWQ/GPTQ<\/strong>, KV-cache quant via FP8.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"LLM decode is memory-bound, so I optimize the KV cache first — paged attention for memory efficiency, GQA and FP8 KV to shrink it, FlashAttention for the kernel, and continuous/in-flight batching for throughput. For a model that doesn't fit, tensor parallelism over NVLink. On NVIDIA I'd reach for TensorRT-LLM behind Triton.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why is LLM decode memory-bound and what quantization helps most? *(reads all weights + KV<\/li><\/ul>\n<p>per token with little math → weight-only INT4 cuts the bytes moved.)*<\/p>\n<ul><li>What does FlashAttention change and is it approximate? *(tiles attention through SRAM,<\/li><\/ul>\n<p>online softmax, never materializes N×N → O(N) memory; exact.)*<\/p>\n<ul><li>Paged attention solves what? *(KV-cache fragmentation/over-allocation → higher batch,<\/li><\/ul>\n<p>prefix sharing, à la OS paging.)*<\/p>\n<ul><li>TP vs PP? *(TP splits each layer's matmul, needs fast interconnect; PP splits layers across<\/li><\/ul>\n<p>GPUs with a pipeline bubble.)*<\/p>\n<ul><li>Continuous vs static batching? *(schedule per-token so finished sequences are replaced<\/li><\/ul>\n<p>immediately and new requests join mid-flight → far higher GPU utilization.)*<\/p>","toc":[{"level":2,"id":"the-two-phases-frame-everything-around-this","text":"The two phases (frame everything around this)"},{"level":2,"id":"kv-cache-the-central-data-structure","text":"KV cache (the central data structure)"},{"level":2,"id":"flashattention-the-kernel-level-win","text":"FlashAttention (the kernel-level win)"},{"level":2,"id":"paged-attention-vllm-the-memory-management-win","text":"Paged attention / vLLM (the memory-management win)"},{"level":2,"id":"continuous-in-flight-batching-the-scheduling-win","text":"Continuous (in-flight) batching (the scheduling win)"},{"level":2,"id":"parallelism-across-gpus-when-the-model-doesnt-fit","text":"Parallelism across GPUs (when the model doesn't fit)"},{"level":2,"id":"speculative-decoding-bonus-lever","text":"Speculative decoding (bonus lever)"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"llm inference optimization 💡 tl;dr llm inference has a structure classic cnns don't: a compute-heavy prefill then a memory-bound, token-by-token decode whose cost is dominated by the kv cache . the optimization greatest-hits — kv cache, flashattention, paged attention, continuous batching, tensor/pipeline parallelism — all attack that structure. even if the role isn't llm-first, nvidia asks, because tensorrt-llm is a flagship. the two phases (frame everything around this) prefill process the whole prompt in parallel — big matmuls on tensor cores. compute-bound decode generate 1 token, append, repeat — read all weights + kv every step. memory-bound decode is the expensive part for long generations, and it's memory-bandwidth bound : each new token must read every weight and the whole kv cache from memory but does very little math per byte. this is why weight-only int4 quantization helps llm decode so much — it cuts the bytes you move, which is the actual bottleneck (tie this back to the roofline page). kv cache (the central data structure) attention needs the keys/values of all previous tokens. recomputing them every step is o(n²); instead you cache past keys and values and only compute the new token's q·k. the cache grows linearly with sequence length × batch × layers × heads and quickly dominates memory. managing it is llm-serving optimization: size is the problem — long contexts and big batches blow up hbm. kv-cache quantization (int8/fp8 kv) roughly halves it. gqa / mqa (grouped/multi-query attention) — multiple query heads share one k/v head, shrinking the cache several-fold. a standard modern-architecture answer. feel the memory wall. estimate serving vram below. start at 7b / fp16 and weights dominate — so quantizing them is the win. now crank context length and batch: the kv cache overtakes the weights and the total explodes past a single 80 gb gpu. that crossover is exactly why paged attention, kv quantization, and gqa exist. flashattention (the kernel-level win) naive attention materializes the full n×n score matrix in hbm — o(n²) memory and lots of slow reads. flashattention fuses the whole attention op and tiles it through fast on-chip sram/shared memory , computing softmax online (running max/sum) so it never writes the n×n matrix to global memory. result: o(n) memory, far fewer hbm trips, big speedup — a textbook \"memory-bound op fixed by fusion + tiling,\" which is exactly the roofline lesson applied to attention. know it's exact, not approximate . paged attention / vllm (the memory-management win) the kv cache is normally one contiguous block per sequence, which fragments memory and forces over-allocation for the max length. pagedattention (vllm) stores the kv cache in fixed-size blocks mapped by an index table — like os virtual-memory paging . benefits: near-zero fragmentation, higher batch sizes, and copy-free sharing of common prefixes (system prompts, beam search). this is what lets vllm pack far more concurrent requests per gpu. continuous (in-flight) batching (the scheduling win) static batching wastes the gpu: a batch waits for its slowest sequence to finish before starting the next batch, and finished sequences sit idle. continuous batching schedules at the token/iteration level — as soon as one sequence finishes, a new one takes its slot, and new requests join mid-flight. this keeps the gpu saturated and is the single biggest throughput lever for real llm traffic. tensorrt-llm calls it in-flight batching ; vllm does it too. parallelism across gpus (when the model doesn't fit) kind what's split cost when tensor parallelism (tp) each layer's matmul split across gpus heavy all-reduce every layer → needs nvlink model too big for one gpu; low latency pipeline parallelism (pp) different layers on different gpus pipeline \"bubble\"; micro-batching hides it very deep models across nodes data parallelism different requests/batches per gpu replica none between gpus throughput scaling of a model that fits expert parallelism moe experts across gpus routing/all-to-all mixture-of-experts models one-liner: \"tp for a single big model where latency matters and you have nvlink bandwidth; pp to span many layers across nodes; dp to scale throughput once it fits.\" (training adds zero/fsdp sharding of optimizer states — related but a training concern.) speculative decoding (bonus lever) a small draft model proposes several tokens; the big model verifies them in one parallel pass, accepting the longest correct prefix. since decode is memory-bound, verifying k tokens costs about the same as generating one — so you get multiple tokens per big-model pass with identical output distribution. good \"how else would you speed up decode\" answer. 🔗 connecting the dots: the real stack tensorrt-llm (nvidia — in-flight batching, fused kernels, fp8, tp/pp) served via triton ; vllm (pagedattention, continuous batching); tgi ; flashattention / flashinfer kernels; sglang . weight quant via awq/gptq , kv-cache quant via fp8. how you'd say it: \"llm decode is memory-bound, so i optimize the kv cache first — paged attention for memory efficiency, gqa and fp8 kv to shrink it, flashattention for the kernel, and continuous/in-flight batching for throughput. for a model that doesn't fit, tensor parallelism over nvlink. on nvidia i'd reach for tensorrt-llm behind triton.\" self-check why is llm decode memory-bound and what quantization helps most? *(reads all weights + kv per token with little math → weight-only int4 cuts the bytes moved.)* what does flashattention change and is it approximate? *(tiles attention through sram, online softmax, never materializes n×n → o(n) memory; exact.)* paged attention solves what? *(kv-cache fragmentation/over-allocation → higher batch, prefix sharing, à la os paging.)* tp vs pp? *(tp splits each layer's matmul, needs fast interconnect; pp splits layers across gpus with a pipeline bubble.)* continuous vs static batching? *(schedule per-token so finished sequences are replaced immediately and new requests join mid-flight → far higher gpu utilization.)*","words":943},{"path":"12-nvidia-model-optimization/experiment-walkthrough.md","title":"Experiment Walkthrough (Your Project)","section":"12 · NVIDIA Model Optimization","quiz":false,"accent":"#76b900","html":"<h1 id=\"experiment-walkthrough-your-fashionmnist-quantization-project\">Experiment Walkthrough: Your FashionMNIST Quantization Project<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> You built the full optimization loop end-to-end: train an FP32 CNN → PTQ and QAT (fbgemm, CPU) → TensorRT INT8 (PTQ + QAT-fed) and FP16 (GPU) → compare six variants in MLflow. This page turns that into a <strong>2-minute spoken story<\/strong>, then fills the gaps an NVIDIA interviewer will poke at so no follow-up catches you flat.<\/div><\/div>\n<h2 id=\"the-2-minute-version-rehearse-this-out-loud\">The 2-minute version (rehearse this out loud)<\/h2>\n<blockquote><p>\"I took a small CNN on FashionMNIST through the whole optimization loop and tracked every variant in MLflow. Baseline FP32 on GPU was my reference. Then I split the problem on two axes: <strong>method<\/strong> — PTQ vs QAT — and <strong>engine<\/strong> — PyTorch's native fbgemm (CPU-only INT8) vs TensorRT (GPU INT8). PTQ just calibrates a trained model; QAT fine-tunes with fake-quant so weights tolerate rounding. For real GPU INT8 I exported to ONNX and built a TensorRT engine with an entropy calibrator, plus an FP16 engine as the easy win.<\/p>\n<p>The headline result: TensorRT FP16 was basically free accuracy-wise; TensorRT INT8-PTQ hit an accuracy cliff on this tiny model, and feeding QAT-hardened weights through the same calibrated engine recovered accuracy <strong>at identical speed<\/strong> — because on TensorRT, speed comes from the kernels and architecture, not the weight values. The whole thing taught me to separate <em>how you pick int8-friendly numbers<\/em> from <em>where you execute int8 fast<\/em>.\"<\/p><\/blockquote>\n<p>That framing — <strong>method axis vs engine axis<\/strong> — is your strongest asset. Lead with it.<\/p>\n<h2 id=\"the-comparison-table-know-every-cell-and-its-why\">The comparison table (know every cell and its \"why\")<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Variant<\/th><th>Method<\/th><th>Engine<\/th><th>Device<\/th><th>Precision<\/th><th>Expected result<\/th><\/tr><\/thead><tbody><tr><td><code>fp32<\/code><\/td><td>—<\/td><td>PyTorch<\/td><td>GPU<\/td><td>FP32<\/td><td>accuracy + latency reference<\/td><\/tr><tr><td><code>ptq<\/code><\/td><td>PTQ<\/td><td>fbgemm<\/td><td><strong>CPU<\/strong><\/td><td>INT8<\/td><td>small acc drop; CPU latency (not GPU-comparable)<\/td><\/tr><tr><td><code>qat<\/code><\/td><td>QAT<\/td><td>fbgemm<\/td><td><strong>CPU<\/strong><\/td><td>INT8<\/td><td>recovers acc; ~100× slower/sample (CPU vs GPU)<\/td><\/tr><tr><td><code>trt-fp16<\/code><\/td><td>—<\/td><td>TensorRT<\/td><td>GPU<\/td><td>FP16<\/td><td>~free accuracy, ~2× faster<\/td><\/tr><tr><td><code>trt-int8-ptq<\/code><\/td><td>PTQ (calib)<\/td><td>TensorRT<\/td><td>GPU<\/td><td>INT8<\/td><td>fastest; <strong>accuracy cliff (~0.83)<\/strong><\/td><\/tr><tr><td><code>trt-int8-qat<\/code><\/td><td>QAT weights + calib<\/td><td>TensorRT<\/td><td>GPU<\/td><td>INT8<\/td><td>acc recovered, <strong>same speed<\/strong> as int8-ptq<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The three <strong>GPU<\/strong> rows (<code>fp32<\/code>, <code>trt-fp16<\/code>, <code>trt-int8-*<\/code>) are the only apples-to-apples latency comparison — the <code>device<\/code> column exists precisely so nobody reads CPU-INT8 latency as comparable. Be ready to say why the CPU rows are there at all: <em>\"PyTorch's native quant only has CPU kernels, so fbgemm INT8 measures the method, not GPU speed — TensorRT is where GPU INT8 actually runs.\"<\/em><\/p>\n<h2 id=\"gaps-to-fill-before-the-interview\">Gaps to fill before the interview<\/h2>\n<p>Your notes are strong on the conceptual story. These are the follow-ups they don't yet answer — close them:<\/p>\n<h3 id=\"1-the-083-int8-cliff-have-a-root-cause-not-just-small-model\">1. The ~0.83 INT8 cliff: have a root cause, not just \"small model\"<\/h3>\n<p>Don't leave it at \"small models are sensitive.\" The concrete cause is almost certainly <strong>per-tensor weight quantization<\/strong> on a net with few, uneven channels, plus too little calibration data. Say: <em>\"I'd switch to <strong>per-channel<\/strong> weight scales and more calibration batches, and try <strong>percentile/entropy<\/strong> clipping before concluding the model needs QAT — that ordering usually recovers most of the drop cheaply.\"<\/em> (See <em>Quantization, Deeply<\/em>.)<\/p>\n<h3 id=\"2-implicit-vs-explicit-quantization-is-the-vocabulary-for-your-option-ab\">2. \"Implicit vs explicit quantization\" is the vocabulary for your Option A/B<\/h3>\n<p>You built the <strong>implicit<\/strong> path (calibrator picks scales). The <strong>explicit<\/strong> path (QDQ nodes from QAT via Model-Optimizer) was blocked by your torch/modelopt versions and by fbgemm fake-quant being un-exportable to ONNX. Use the official terms — it signals you know the TensorRT model, not just your workaround. (See <em>TensorRT Internals<\/em>.)<\/p>\n<h3 id=\"3-why-qat-recovered-accuracy-at-identical-speed\">3. Why QAT recovered accuracy at <em>identical<\/em> speed<\/h3>\n<p>Nail the reasoning: <strong>TensorRT latency is set by architecture + selected kernels, not weight values.<\/strong> TRT-PTQ and TRT-QAT compile to the same engine shape running the same INT8 kernels → same latency; QAT only moves the numbers to accuracy-friendlier values. Byte-identical speed, better accuracy.<\/p>\n<h3 id=\"4-your-latency-numbers-need-proper-gpu-timing-hygiene\">4. Your latency numbers need proper GPU timing hygiene<\/h3>\n<p>\"0.0009 ms/sample\" invites <em>\"how did you measure that?\"<\/em> Answer with: <strong>CUDA events + synchronize + warmup<\/strong>, report <strong>p99 not just mean<\/strong>, and note that locking clocks removes boost/thermal noise. Your <code>warmup(10)<\/code> and <code>itertools.cycle<\/code> fixes are exactly this discipline — frame them that way. (See <em>GPU Performance &amp; Profiling<\/em>.)<\/p>\n<h3 id=\"5-the-gpu-is-idle-story-is-a-performance-analysis-story\">5. The \"GPU is idle\" story is a performance-analysis story<\/h3>\n<p>Reframe issue #3 from \"bug I fixed\" to \"bound I diagnosed\": the model was <strong>overhead/feed- bound<\/strong>, not compute-bound — kernels too small to saturate anything. You'd confirm on an <strong>Nsight Systems<\/strong> timeline; the dataloader tuning fixed the feed, and <strong>CUDA Graphs<\/strong> + bigger batches would kill launch overhead if latency mattered.<\/p>\n<h3 id=\"6-bn-folding-is-why-the-qatplain-model-remap-was-needed\">6. BN folding is why the QAT→plain-model remap was needed<\/h3>\n<p>Frame issue #7b crisply: <strong>fused Conv+BN+ReLU<\/strong> means BN params live under the fused module, so folding them into the plain conv is <em>exact math<\/em>, and that's why the state-dict keys had to be remapped. It's not a hack — it's the same fold TensorRT does internally.<\/p>\n<h3 id=\"7-sanity-numbers-to-have-ready\">7. Sanity numbers to have ready<\/h3>\n<p>FP32→INT8 is <strong>~4× smaller / faster math<\/strong>; FP16 is <strong>~2×, near-free accuracy<\/strong>. Model size should drop ~4× for INT8, ~2× for FP16 — be ready to confirm your <code>model_size_mb<\/code> column matches, and if INT8 <em>isn't<\/em> ~4× smaller, know why (e.g. some layers kept in higher precision).<\/p>\n<h2 id=\"strong-what-would-you-do-next-answers\">Strong \"what would you do next\" answers<\/h2>\n<p>These double as your project's roadmap and show optimization maturity:<\/p>\n<ul><li><strong>Explicit QDQ export<\/strong> so TensorRT skips calibration and honors QAT's <em>learned<\/em> scales<\/li><\/ul>\n<p>(the one refinement your notes still list as open) — via TensorRT-Model-Optimizer on a   compatible torch build.<\/p>\n<ul><li><strong>Per-channel weight quantization + more calibration<\/strong> to close the INT8 cliff cheaply.<\/li><li><strong>Dynamic-shape engine<\/strong> with a min/opt/max optimization profile → kills the fixed-batch<\/li><\/ul>\n<p>padding hack and serves variable batch sizes.<\/p>\n<ul><li><strong>Serve it through Triton<\/strong> with dynamic batching + concurrent instances; register the best<\/li><\/ul>\n<p>engine in the MLflow Model Registry.<\/p>\n<ul><li><strong>Profile with Nsight<\/strong> to show <em>where<\/em> the INT8 speedup comes from, not just that it exists.<\/li><\/ul>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Give the 2-minute story in your own words, leading with the method-vs-engine split.<\/li><li>Why is TRT-QAT the same speed as TRT-PTQ? *(same engine shape/kernels; weights only affect<\/li><\/ul>\n<p>accuracy.)*<\/p>\n<ul><li>Root-cause the INT8 accuracy cliff without saying \"small model.\" *(per-tensor weight quant +<\/li><\/ul>\n<p>scarce calibration; fix with per-channel + more/better calibration before QAT.)*<\/p>\n<ul><li>How did you measure latency, and what would an interviewer want added? *(CUDA<\/li><\/ul>\n<p>events/sync/warmup; add p99, locked clocks, Nsight to attribute it.)*<\/p>","toc":[{"level":2,"id":"the-2-minute-version-rehearse-this-out-loud","text":"The 2-minute version (rehearse this out loud)"},{"level":2,"id":"the-comparison-table-know-every-cell-and-its-why","text":"The comparison table (know every cell and its \"why\")"},{"level":2,"id":"gaps-to-fill-before-the-interview","text":"Gaps to fill before the interview"},{"level":3,"id":"1-the-083-int8-cliff-have-a-root-cause-not-just-small-model","text":"1. The ~0.83 INT8 cliff: have a root cause, not just \"small model\""},{"level":3,"id":"2-implicit-vs-explicit-quantization-is-the-vocabulary-for-your-option-ab","text":"2. \"Implicit vs explicit quantization\" is the vocabulary for your Option A/B"},{"level":3,"id":"3-why-qat-recovered-accuracy-at-identical-speed","text":"3. Why QAT recovered accuracy at identical speed"},{"level":3,"id":"4-your-latency-numbers-need-proper-gpu-timing-hygiene","text":"4. Your latency numbers need proper GPU timing hygiene"},{"level":3,"id":"5-the-gpu-is-idle-story-is-a-performance-analysis-story","text":"5. The \"GPU is idle\" story is a performance-analysis story"},{"level":3,"id":"6-bn-folding-is-why-the-qatplain-model-remap-was-needed","text":"6. BN folding is why the QAT→plain-model remap was needed"},{"level":3,"id":"7-sanity-numbers-to-have-ready","text":"7. Sanity numbers to have ready"},{"level":2,"id":"strong-what-would-you-do-next-answers","text":"Strong \"what would you do next\" answers"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"experiment walkthrough: your fashionmnist quantization project 💡 tl;dr you built the full optimization loop end-to-end: train an fp32 cnn → ptq and qat (fbgemm, cpu) → tensorrt int8 (ptq + qat-fed) and fp16 (gpu) → compare six variants in mlflow. this page turns that into a 2-minute spoken story , then fills the gaps an nvidia interviewer will poke at so no follow-up catches you flat. the 2-minute version (rehearse this out loud) \"i took a small cnn on fashionmnist through the whole optimization loop and tracked every variant in mlflow. baseline fp32 on gpu was my reference. then i split the problem on two axes: method — ptq vs qat — and engine — pytorch's native fbgemm (cpu-only int8) vs tensorrt (gpu int8). ptq just calibrates a trained model; qat fine-tunes with fake-quant so weights tolerate rounding. for real gpu int8 i exported to onnx and built a tensorrt engine with an entropy calibrator, plus an fp16 engine as the easy win. the headline result: tensorrt fp16 was basically free accuracy-wise; tensorrt int8-ptq hit an accuracy cliff on this tiny model, and feeding qat-hardened weights through the same calibrated engine recovered accuracy at identical speed — because on tensorrt, speed comes from the kernels and architecture, not the weight values. the whole thing taught me to separate how you pick int8-friendly numbers from where you execute int8 fast .\" that framing — method axis vs engine axis — is your strongest asset. lead with it. the comparison table (know every cell and its \"why\") variant method engine device precision expected result fp32 — pytorch gpu fp32 accuracy + latency reference ptq ptq fbgemm cpu int8 small acc drop; cpu latency (not gpu-comparable) qat qat fbgemm cpu int8 recovers acc; ~100× slower/sample (cpu vs gpu) trt-fp16 — tensorrt gpu fp16 ~free accuracy, ~2× faster trt-int8-ptq ptq (calib) tensorrt gpu int8 fastest; accuracy cliff (~0.83) trt-int8-qat qat weights + calib tensorrt gpu int8 acc recovered, same speed as int8-ptq the three gpu rows ( fp32 , trt-fp16 , trt-int8-* ) are the only apples-to-apples latency comparison — the device column exists precisely so nobody reads cpu-int8 latency as comparable. be ready to say why the cpu rows are there at all: \"pytorch's native quant only has cpu kernels, so fbgemm int8 measures the method, not gpu speed — tensorrt is where gpu int8 actually runs.\" gaps to fill before the interview your notes are strong on the conceptual story. these are the follow-ups they don't yet answer — close them: 1. the ~0.83 int8 cliff: have a root cause, not just \"small model\" don't leave it at \"small models are sensitive.\" the concrete cause is almost certainly per-tensor weight quantization on a net with few, uneven channels, plus too little calibration data. say: \"i'd switch to per-channel weight scales and more calibration batches, and try percentile/entropy clipping before concluding the model needs qat — that ordering usually recovers most of the drop cheaply.\" (see quantization, deeply .) 2. \"implicit vs explicit quantization\" is the vocabulary for your option a/b you built the implicit path (calibrator picks scales). the explicit path (qdq nodes from qat via model-optimizer) was blocked by your torch/modelopt versions and by fbgemm fake-quant being un-exportable to onnx. use the official terms — it signals you know the tensorrt model, not just your workaround. (see tensorrt internals .) 3. why qat recovered accuracy at identical speed nail the reasoning: tensorrt latency is set by architecture + selected kernels, not weight values. trt-ptq and trt-qat compile to the same engine shape running the same int8 kernels → same latency; qat only moves the numbers to accuracy-friendlier values. byte-identical speed, better accuracy. 4. your latency numbers need proper gpu timing hygiene \"0.0009 ms/sample\" invites \"how did you measure that?\" answer with: cuda events + synchronize + warmup , report p99 not just mean , and note that locking clocks removes boost/thermal noise. your warmup(10) and itertools.cycle fixes are exactly this discipline — frame them that way. (see gpu performance & profiling .) 5. the \"gpu is idle\" story is a performance-analysis story reframe issue #3 from \"bug i fixed\" to \"bound i diagnosed\": the model was overhead/feed- bound , not compute-bound — kernels too small to saturate anything. you'd confirm on an nsight systems timeline; the dataloader tuning fixed the feed, and cuda graphs + bigger batches would kill launch overhead if latency mattered. 6. bn folding is why the qat→plain-model remap was needed frame issue #7b crisply: fused conv+bn+relu means bn params live under the fused module, so folding them into the plain conv is exact math , and that's why the state-dict keys had to be remapped. it's not a hack — it's the same fold tensorrt does internally. 7. sanity numbers to have ready fp32→int8 is ~4× smaller / faster math ; fp16 is ~2×, near-free accuracy . model size should drop ~4× for int8, ~2× for fp16 — be ready to confirm your model_size_mb column matches, and if int8 isn't ~4× smaller, know why (e.g. some layers kept in higher precision). strong \"what would you do next\" answers these double as your project's roadmap and show optimization maturity: explicit qdq export so tensorrt skips calibration and honors qat's learned scales (the one refinement your notes still list as open) — via tensorrt-model-optimizer on a compatible torch build. per-channel weight quantization + more calibration to close the int8 cliff cheaply. dynamic-shape engine with a min/opt/max optimization profile → kills the fixed-batch padding hack and serves variable batch sizes. serve it through triton with dynamic batching + concurrent instances; register the best engine in the mlflow model registry. profile with nsight to show where the int8 speedup comes from, not just that it exists. self-check give the 2-minute story in your own words, leading with the method-vs-engine split. why is trt-qat the same speed as trt-ptq? *(same engine shape/kernels; weights only affect accuracy.)* root-cause the int8 accuracy cliff without saying \"small model.\" *(per-tensor weight quant + scarce calibration; fix with per-channel + more/better calibration before qat.)* how did you measure latency, and what would an interviewer want added? *(cuda events/sync/warmup; add p99, locked clocks, nsight to attribute it.)*","words":1029},{"path":"12-nvidia-model-optimization/interview-qa.md","title":"Interview Q&A: Rapid Fire","section":"12 · NVIDIA Model Optimization","quiz":true,"accent":"#76b900","html":"<h1 id=\"interview-qa-rapid-fire\">Interview Q&amp;A: Rapid Fire<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Last-mile drill for the NVIDIA model-optimization loop. Each answer is the 30-second spoken version. Questions are grouped the way an interviewer escalates: numerics → TensorRT → performance → breadth. Cover the answer, say it out loud, then check.<\/div><\/div>\n<h2 id=\"quantization-numerics\">Quantization &amp; numerics<\/h2>\n<details class=\"qa\" open><summary>Q: Derive the INT8 scale for a symmetric quantizer with range ±α.<\/summary><div class=\"qa-body\"><p>scale = α / 127 (signed INT8 uses −128…127, and symmetric maps to ±127). Dequant is <code>r = scale · q<\/code>, zero-point is 0. Asymmetric adds a zero-point and uses the full [β, α] range.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Symmetric vs asymmetric — when each?<\/summary><div class=\"qa-body\"><p>Symmetric for weights (roughly zero-centered, and it drops the zero-point term from the matmul). Asymmetric for one-sided activations like post-ReLU, where a symmetric range would waste half the codes.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Per-tensor vs per-channel, and why does it matter?<\/summary><div class=\"qa-body\"><p>Per-tensor uses one scale for the whole weight tensor; per-channel uses one scale per output channel. Per-channel lets each channel use the full INT8 range, so it's the standard fix when channels have very different magnitudes — it's nearly free and often recovers most of an INT8 accuracy drop.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is calibration, and why is entropy better than min–max?<\/summary><div class=\"qa-body\"><p>Calibration picks the clipping range α for activations by observing real batches. Min–max takes the observed max, so one outlier inflates the scale and coarsens every step. Entropy/KL calibration (TensorRT's default) clips α to minimize divergence between the FP32 and INT8 distributions — robust to outliers, better accuracy.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: PTQ vs QAT in one breath.<\/summary><div class=\"qa-body\"><p>PTQ calibrates a trained model without touching weights — fast, minutes, bigger accuracy hit. QAT inserts fake-quant during fine-tuning so the model learns to tolerate rounding — slower, recovers accuracy. PTQ first; QAT when PTQ drops too much.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you backprop through the non-differentiable round() in QAT?<\/summary><div class=\"qa-body\"><p>Straight-Through Estimator: treat the rounding's gradient as 1 inside the clipping range and 0 outside, so gradients flow despite the hard rounding.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: FP16 vs BF16 — why does FP16 need loss scaling?<\/summary><div class=\"qa-body\"><p>FP16 has a narrow exponent range, so small gradients underflow to zero; loss scaling multiplies the loss up so gradients stay representable, then unscales before the step. BF16 shares FP32's 8-bit exponent, so no underflow and no loss scaling — at the cost of fewer mantissa bits.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's TF32 and when does it apply?<\/summary><div class=\"qa-body\"><p>A 19-bit tensor-core format (8 exp, 10 mantissa) used automatically for FP32 matmuls on Ampere+. Near-FP32 accuracy at FP16-ish speed — on by default, so part of \"FP32→FP16\" speedups are really TF32.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why two FP8 formats?<\/summary><div class=\"qa-body\"><p>E4M3 (precision-heavy) for the forward pass — weights/activations; E5M2 (range-heavy) for gradients. FP8 needs per-tensor scaling, handled by Transformer Engine, and doubles tensor-core throughput vs FP16 on Hopper/Ada.<\/p><\/div><\/details><h2 id=\"tensorrt\">TensorRT<\/h2>\n<details class=\"qa\" open><summary>Q: What does the TensorRT builder actually do?<\/summary><div class=\"qa-body\"><p>Layer/tensor fusion (e.g. Conv+BN+ReLU → one kernel), kernel auto-tuning (times candidate kernels on your GPU to pick the fastest), precision selection, and memory planning. Output is a serialized engine specific to that GPU and TRT version.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Implicit vs explicit quantization?<\/summary><div class=\"qa-body\"><p>Implicit: give TRT an FP32 network + a calibrator; it picks scales and decides which layers go INT8. Explicit (QDQ): the ONNX carries QuantizeLinear/DequantizeLinear nodes with baked-in QAT scales that TRT honors exactly. Explicit is deterministic and the recommended path.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Do QDQ nodes slow down inference?<\/summary><div class=\"qa-body\"><p>No — they're build-time instructions. The builder fuses Q→Conv→DQ into one INT8 kernel and discards the markers. They change achievable accuracy, not runtime speed, unless placed so densely they can't be fused.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why isn't a TensorRT engine portable across GPUs?<\/summary><div class=\"qa-body\"><p>Because tactic selection times kernels for a specific architecture and TRT version; an engine built for one GPU family may be suboptimal or invalid on another. Build on the deployment GPU.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How would you serve a TensorRT engine in production?<\/summary><div class=\"qa-body\"><p>Behind Triton Inference Server with dynamic batching and a couple of concurrent model instances to raise utilization, plus an optimization profile for dynamic batch sizes.<\/p><\/div><\/details><h2 id=\"performance-profiling\">Performance &amp; profiling<\/h2>\n<details class=\"qa\" open><summary>Q: Is this kernel compute-bound or memory-bound — how do you decide?<\/summary><div class=\"qa-body\"><p>Compute its arithmetic intensity (FLOPs per byte) and place it on the roofline. Low intensity → memory-bound (fix with fusion, better layout, lower precision); high → compute-bound (tensor cores, tiling). Elementwise ops are almost always memory-bound.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Your GPU shows low utilization during training — what's wrong?<\/summary><div class=\"qa-body\"><p>Usually not compute — it's a feed or launch overhead problem. Confirm on an Nsight Systems timeline: if the GPU is idle waiting on the dataloader, add workers/pinned memory/prefetch and bigger batches; if it's launch-bound on tiny kernels, use CUDA Graphs.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Nsight Systems vs Nsight Compute?<\/summary><div class=\"qa-body\"><p>Systems is the system-wide timeline — \"is the GPU busy and what's it waiting on.\" Compute is the per-kernel deep dive — roofline placement, occupancy, memory vs compute for one kernel.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you correctly measure GPU inference latency?<\/summary><div class=\"qa-body\"><p>CUDA events with <code>torch.cuda.synchronize<\/code>, a warmup to absorb one-time costs, many iterations, and report p50/p99 — not a single wall-clock call, because kernels are async. Lock clocks to cut boost/thermal noise.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is a CUDA stream good for?<\/summary><div class=\"qa-body\"><p>Overlapping independent work — e.g. copy the next batch (pinned + non_blocking) while computing the current one, or running independent kernels concurrently. Higher utilization.<\/p><\/div><\/details><h2 id=\"compression-breadth\">Compression breadth<\/h2>\n<details class=\"qa\" open><summary>Q: Why doesn't unstructured pruning speed up a GPU?<\/summary><div class=\"qa-body\"><p>Scattered zeros still pass through dense kernels — the hardware multiplies by zero. You need structured pruning (whole channels) or a hardware-supported sparse pattern.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is 2:4 sparsity?<\/summary><div class=\"qa-body\"><p>At most 2 non-zeros per group of 4 weights. Ampere+ sparse tensor cores skip the zeros for up to 2× matmul throughput. Train dense → apply the 2:4 mask → fine-tune → run sparse; stacks with INT8/FP8.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why are soft targets better than hard labels in distillation?<\/summary><div class=\"qa-body\"><p>The teacher's softened probability distribution carries \"dark knowledge\" about class similarity — far richer supervision than a one-hot label — so the student learns more from fewer signals.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: In what order would you stack optimizations?<\/summary><div class=\"qa-body\"><p>Distill (smaller architecture) → prune (structured/2:4) → quantize (INT8/FP8) → compile (TensorRT), re-measuring accuracy after each step and profiling to confirm the speedup.<\/p><\/div><\/details><h2 id=\"llm-inference\">LLM inference<\/h2>\n<details class=\"qa\" open><summary>Q: Why is LLM decode memory-bound, and what helps?<\/summary><div class=\"qa-body\"><p>Each token reads all weights + the whole KV cache but does little math per byte → bandwidth limited. Weight-only INT4, KV-cache quantization (FP8/INT8), and GQA/MQA all cut the bytes moved.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does FlashAttention do?<\/summary><div class=\"qa-body\"><p>Fuses attention and tiles it through on-chip SRAM with an online softmax, so it never writes the N×N score matrix to global memory — O(N) memory, far fewer HBM trips, and it's exact.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Paged attention?<\/summary><div class=\"qa-body\"><p>Stores the KV cache in fixed-size blocks mapped by an index table, like OS virtual memory — eliminates fragmentation, raises batch size, and enables copy-free prefix sharing (vLLM).<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Continuous / in-flight batching?<\/summary><div class=\"qa-body\"><p>Schedule at the token level so a finished sequence is immediately replaced and new requests join mid-flight — keeps the GPU saturated instead of waiting for the slowest sequence in a static batch. Biggest throughput lever for real traffic.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Tensor vs pipeline parallelism?<\/summary><div class=\"qa-body\"><p>Tensor parallelism splits each layer's matmul across GPUs (heavy per-layer all-reduce, wants NVLink); pipeline parallelism puts different layers on different GPUs (has a pipeline bubble, hidden with micro-batching). TP for latency on a big single model, PP to span many layers.<\/p><\/div><\/details><h2 id=\"the-three-questions-to-never-fumble\">The three questions to never fumble<\/h2>\n<details class=\"qa\" open><summary>Q: What's the single mental model you bring to any optimization problem?<\/summary><div class=\"qa-body\"><p>Separate the three axes: <strong>method<\/strong> (how you pick int8-friendly weights/scales — PTQ/QAT/ calibration), <strong>format<\/strong> (which numbers you compute in — FP32/FP16/BF16/FP8/INT8), and <strong>engine<\/strong> (where it runs fast — TensorRT/Triton/CUDA kernels/fusion). Most questions are asking me to hold two of these apart.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: You optimized a model — walk me through it.<\/summary><div class=\"qa-body\"><p>The FashionMNIST story: FP32 baseline → PTQ/QAT on the method axis, fbgemm-CPU vs TensorRT-GPU on the engine axis, FP16/INT8 on the format axis, all tracked in MLflow — with the punchline that QAT-fed TensorRT recovered accuracy at identical speed because TRT latency comes from kernels, not weight values.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you know your optimization actually worked?<\/summary><div class=\"qa-body\"><p>Profile before and after — Nsight to attribute the speedup and confirm the new bottleneck, proper CUDA-event timing with warmup and p99, and an accuracy re-check after every step. Never claim a speedup I didn't measure, never ship an accuracy drop I didn't quantify.<\/p><\/div><\/details>","toc":[{"level":2,"id":"quantization-numerics","text":"Quantization &amp; numerics"},{"level":2,"id":"tensorrt","text":"TensorRT"},{"level":2,"id":"performance-profiling","text":"Performance &amp; profiling"},{"level":2,"id":"compression-breadth","text":"Compression breadth"},{"level":2,"id":"llm-inference","text":"LLM inference"},{"level":2,"id":"the-three-questions-to-never-fumble","text":"The three questions to never fumble"}],"text":"interview q&a: rapid fire 💡 tl;dr last-mile drill for the nvidia model-optimization loop. each answer is the 30-second spoken version. questions are grouped the way an interviewer escalates: numerics → tensorrt → performance → breadth. cover the answer, say it out loud, then check. quantization & numerics q: derive the int8 scale for a symmetric quantizer with range ±α. scale = α / 127 (signed int8 uses −128…127, and symmetric maps to ±127). dequant is r = scale · q , zero-point is 0. asymmetric adds a zero-point and uses the full [β, α] range. q: symmetric vs asymmetric — when each? symmetric for weights (roughly zero-centered, and it drops the zero-point term from the matmul). asymmetric for one-sided activations like post-relu, where a symmetric range would waste half the codes. q: per-tensor vs per-channel, and why does it matter? per-tensor uses one scale for the whole weight tensor; per-channel uses one scale per output channel. per-channel lets each channel use the full int8 range, so it's the standard fix when channels have very different magnitudes — it's nearly free and often recovers most of an int8 accuracy drop. q: what is calibration, and why is entropy better than min–max? calibration picks the clipping range α for activations by observing real batches. min–max takes the observed max, so one outlier inflates the scale and coarsens every step. entropy/kl calibration (tensorrt's default) clips α to minimize divergence between the fp32 and int8 distributions — robust to outliers, better accuracy. q: ptq vs qat in one breath. ptq calibrates a trained model without touching weights — fast, minutes, bigger accuracy hit. qat inserts fake-quant during fine-tuning so the model learns to tolerate rounding — slower, recovers accuracy. ptq first; qat when ptq drops too much. q: how do you backprop through the non-differentiable round() in qat? straight-through estimator: treat the rounding's gradient as 1 inside the clipping range and 0 outside, so gradients flow despite the hard rounding. q: fp16 vs bf16 — why does fp16 need loss scaling? fp16 has a narrow exponent range, so small gradients underflow to zero; loss scaling multiplies the loss up so gradients stay representable, then unscales before the step. bf16 shares fp32's 8-bit exponent, so no underflow and no loss scaling — at the cost of fewer mantissa bits. q: what's tf32 and when does it apply? a 19-bit tensor-core format (8 exp, 10 mantissa) used automatically for fp32 matmuls on ampere+. near-fp32 accuracy at fp16-ish speed — on by default, so part of \"fp32→fp16\" speedups are really tf32. q: why two fp8 formats? e4m3 (precision-heavy) for the forward pass — weights/activations; e5m2 (range-heavy) for gradients. fp8 needs per-tensor scaling, handled by transformer engine, and doubles tensor-core throughput vs fp16 on hopper/ada. tensorrt q: what does the tensorrt builder actually do? layer/tensor fusion (e.g. conv+bn+relu → one kernel), kernel auto-tuning (times candidate kernels on your gpu to pick the fastest), precision selection, and memory planning. output is a serialized engine specific to that gpu and trt version. q: implicit vs explicit quantization? implicit: give trt an fp32 network + a calibrator; it picks scales and decides which layers go int8. explicit (qdq): the onnx carries quantizelinear/dequantizelinear nodes with baked-in qat scales that trt honors exactly. explicit is deterministic and the recommended path. q: do qdq nodes slow down inference? no — they're build-time instructions. the builder fuses q→conv→dq into one int8 kernel and discards the markers. they change achievable accuracy, not runtime speed, unless placed so densely they can't be fused. q: why isn't a tensorrt engine portable across gpus? because tactic selection times kernels for a specific architecture and trt version; an engine built for one gpu family may be suboptimal or invalid on another. build on the deployment gpu. q: how would you serve a tensorrt engine in production? behind triton inference server with dynamic batching and a couple of concurrent model instances to raise utilization, plus an optimization profile for dynamic batch sizes. performance & profiling q: is this kernel compute-bound or memory-bound — how do you decide? compute its arithmetic intensity (flops per byte) and place it on the roofline. low intensity → memory-bound (fix with fusion, better layout, lower precision); high → compute-bound (tensor cores, tiling). elementwise ops are almost always memory-bound. q: your gpu shows low utilization during training — what's wrong? usually not compute — it's a feed or launch overhead problem. confirm on an nsight systems timeline: if the gpu is idle waiting on the dataloader, add workers/pinned memory/prefetch and bigger batches; if it's launch-bound on tiny kernels, use cuda graphs. q: nsight systems vs nsight compute? systems is the system-wide timeline — \"is the gpu busy and what's it waiting on.\" compute is the per-kernel deep dive — roofline placement, occupancy, memory vs compute for one kernel. q: how do you correctly measure gpu inference latency? cuda events with torch.cuda.synchronize , a warmup to absorb one-time costs, many iterations, and report p50/p99 — not a single wall-clock call, because kernels are async. lock clocks to cut boost/thermal noise. q: what is a cuda stream good for? overlapping independent work — e.g. copy the next batch (pinned + non_blocking) while computing the current one, or running independent kernels concurrently. higher utilization. compression breadth q: why doesn't unstructured pruning speed up a gpu? scattered zeros still pass through dense kernels — the hardware multiplies by zero. you need structured pruning (whole channels) or a hardware-supported sparse pattern. q: what is 2:4 sparsity? at most 2 non-zeros per group of 4 weights. ampere+ sparse tensor cores skip the zeros for up to 2× matmul throughput. train dense → apply the 2:4 mask → fine-tune → run sparse; stacks with int8/fp8. q: why are soft targets better than hard labels in distillation? the teacher's softened probability distribution carries \"dark knowledge\" about class similarity — far richer supervision than a one-hot label — so the student learns more from fewer signals. q: in what order would you stack optimizations? distill (smaller architecture) → prune (structured/2:4) → quantize (int8/fp8) → compile (tensorrt), re-measuring accuracy after each step and profiling to confirm the speedup. llm inference q: why is llm decode memory-bound, and what helps? each token reads all weights + the whole kv cache but does little math per byte → bandwidth limited. weight-only int4, kv-cache quantization (fp8/int8), and gqa/mqa all cut the bytes moved. q: what does flashattention do? fuses attention and tiles it through on-chip sram with an online softmax, so it never writes the n×n score matrix to global memory — o(n) memory, far fewer hbm trips, and it's exact. q: paged attention? stores the kv cache in fixed-size blocks mapped by an index table, like os virtual memory — eliminates fragmentation, raises batch size, and enables copy-free prefix sharing (vllm). q: continuous / in-flight batching? schedule at the token level so a finished sequence is immediately replaced and new requests join mid-flight — keeps the gpu saturated instead of waiting for the slowest sequence in a static batch. biggest throughput lever for real traffic. q: tensor vs pipeline parallelism? tensor parallelism splits each layer's matmul across gpus (heavy per-layer all-reduce, wants nvlink); pipeline parallelism puts different layers on different gpus (has a pipeline bubble, hidden with micro-batching). tp for latency on a big single model, pp to span many layers. the three questions to never fumble q: what's the single mental model you bring to any optimization problem? separate the three axes: method (how you pick int8-friendly weights/scales — ptq/qat/ calibration), format (which numbers you compute in — fp32/fp16/bf16/fp8/int8), and engine (where it runs fast — tensorrt/triton/cuda kernels/fusion). most questions are asking me to hold two of these apart. q: you optimized a model — walk me through it. the fashionmnist story: fp32 baseline → ptq/qat on the method axis, fbgemm-cpu vs tensorrt-gpu on the engine axis, fp16/int8 on the format axis, all tracked in mlflow — with the punchline that qat-fed tensorrt recovered accuracy at identical speed because trt latency comes from kernels, not weight values. q: how do you know your optimization actually worked? profile before and after — nsight to attribute the speedup and confirm the new bottleneck, proper cuda-event timing with warmup and p99, and an accuracy re-check after every step. never claim a speedup i didn't measure, never ship an accuracy drop i didn't quantify.","words":1392},{"path":"13-llm-vlm-optimization/README.md","title":"Overview","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"13-llm-vlm-optimization\">13: LLM &amp; VLM Optimization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Your FashionMNIST project was a <strong>CNN<\/strong>. The same optimization <em>loop<\/em> — baseline → quantize → serve → compare — absolutely applies to <strong>LLMs<\/strong> and <strong>VLMs<\/strong>, but the details flip: LLM inference is <strong>memory-bound<\/strong> not compute-bound, activations have <strong>outliers<\/strong> that break naive INT8, models are too big to retrain (so <strong>PTQ and weight-only INT4 dominate<\/strong>), and you measure <strong>perplexity and tokens/sec<\/strong>, not top-1 accuracy. This section maps your CNN skills onto that world.<\/div><\/div>\n<h2 id=\"does-the-cnn-loop-transfer-yes-with-three-twists\">Does the CNN loop transfer? Yes: with three twists<\/h2>\n<p>The <strong>method / format / engine<\/strong> mental model from <a class=\"mdlink\" data-href=\"../12-nvidia-model-optimization/README.md\" href=\"#\">§12<\/a> carries over unchanged. What changes is <em>which choices win<\/em>:<\/p>\n<div class=\"diagram\">\n  <table class=\"maptable\">\n    <thead><tr><th>CNN (your project)<\/th><th class=\"marw\"><\/th><th>LLM / VLM — which choice wins<\/th><\/tr><\/thead>\n    <tbody>\n      <tr><td class=\"mfrom\">INT8, compute-bound<\/td><td class=\"marw\"><\/td><td class=\"mto\">memory-bound decode → weight-only INT4 shines<\/td><\/tr>\n      <tr><td class=\"mfrom\">PTQ + QAT both practical<\/td><td class=\"marw\"><\/td><td class=\"mto\">PTQ / weight-only; QAT too costly (QLoRA instead)<\/td><\/tr>\n      <tr><td class=\"mfrom\">clean INT8 activations<\/td><td class=\"marw\"><\/td><td class=\"mto\">activation outliers → need SmoothQuant / AWQ<\/td><\/tr>\n      <tr><td class=\"mfrom\">top-1 accuracy<\/td><td class=\"marw\"><\/td><td class=\"mto\">perplexity + task benchmarks (MMLU…)<\/td><\/tr>\n      <tr><td class=\"mfrom\">fixed input size<\/td><td class=\"marw\"><\/td><td class=\"mto\">variable seq length + a KV cache to manage<\/td><\/tr>\n      <tr><td class=\"mfrom\">TensorRT engine<\/td><td class=\"marw\"><\/td><td class=\"mto\">TensorRT-LLM / vLLM / llama.cpp<\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<h2 id=\"what-each-page-covers\">What each page covers<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Page<\/th><th>The question it answers<\/th><\/tr><\/thead><tbody><tr><td>CNN → LLM/VLM<\/td><td>\"My experiment was a CNN — what transfers and what breaks?\"<\/td><\/tr><tr><td>LLM Quantization<\/td><td>\"Weight-only INT4 vs W8A8/FP8, GPTQ/AWQ/SmoothQuant, KV-cache quant.\"<\/td><\/tr><tr><td>The Loop in Practice<\/td><td>\"How would you actually run baseline→quantize→serve→compare for an LLM?\"<\/td><\/tr><tr><td>Serving Architecture<\/td><td>\"Where does the inference engine sit — Deployment vs Job vs serverless, and how do I not pay for an idle GPU?\"<\/td><\/tr><tr><td>VLM Optimization<\/td><td>\"A vision-language model has a vision tower <em>and<\/em> an LLM — optimize which, how?\"<\/td><\/tr><tr><td>Experiment Redo<\/td><td>\"Redo my FashionMNIST table as an LLM/VLM project.\"<\/td><\/tr><tr><td>Interview Q&amp;A<\/td><td>Rapid-fire drill.<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"why-vlms-are-the-natural-bridge-for-you\">Why VLMs are the natural bridge for you<\/h2>\n<p>A VLM is literally <strong>your CNN skills + an LLM stapled together<\/strong>: a vision encoder (a ViT/CNN — exactly the model you already optimized) feeds a language decoder. So you can say <em>\"the vision tower I'd quantize the way I did my FashionMNIST CNN; the decoder I'd treat as an LLM\"<\/em> — one sentence that shows both halves of your experience. That's the page to land.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"cnn-to-llm.md\" href=\"#\">cnn-to-llm.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"does-the-cnn-loop-transfer-yes-with-three-twists","text":"Does the CNN loop transfer? Yes: with three twists"},{"level":2,"id":"what-each-page-covers","text":"What each page covers"},{"level":2,"id":"why-vlms-are-the-natural-bridge-for-you","text":"Why VLMs are the natural bridge for you"}],"text":"13: llm & vlm optimization 💡 tl;dr your fashionmnist project was a cnn . the same optimization loop — baseline → quantize → serve → compare — absolutely applies to llms and vlms , but the details flip: llm inference is memory-bound not compute-bound, activations have outliers that break naive int8, models are too big to retrain (so ptq and weight-only int4 dominate ), and you measure perplexity and tokens/sec , not top-1 accuracy. this section maps your cnn skills onto that world. does the cnn loop transfer? yes: with three twists the method / format / engine mental model from §12 carries over unchanged. what changes is which choices win : cnn (your project) llm / vlm — which choice wins int8, compute-bound memory-bound decode → weight-only int4 shines ptq + qat both practical ptq / weight-only; qat too costly (qlora instead) clean int8 activations activation outliers → need smoothquant / awq top-1 accuracy perplexity + task benchmarks (mmlu…) fixed input size variable seq length + a kv cache to manage tensorrt engine tensorrt-llm / vllm / llama.cpp what each page covers page the question it answers cnn → llm/vlm \"my experiment was a cnn — what transfers and what breaks?\" llm quantization \"weight-only int4 vs w8a8/fp8, gptq/awq/smoothquant, kv-cache quant.\" the loop in practice \"how would you actually run baseline→quantize→serve→compare for an llm?\" serving architecture \"where does the inference engine sit — deployment vs job vs serverless, and how do i not pay for an idle gpu?\" vlm optimization \"a vision-language model has a vision tower and an llm — optimize which, how?\" experiment redo \"redo my fashionmnist table as an llm/vlm project.\" interview q&a rapid-fire drill. why vlms are the natural bridge for you a vlm is literally your cnn skills + an llm stapled together : a vision encoder (a vit/cnn — exactly the model you already optimized) feeds a language decoder. so you can say \"the vision tower i'd quantize the way i did my fashionmnist cnn; the decoder i'd treat as an llm\" — one sentence that shows both halves of your experience. that's the page to land. → start: cnn-to-llm.md","words":356},{"path":"13-llm-vlm-optimization/cnn-to-llm.md","title":"CNN → LLM/VLM: What Transfers","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"cnn-llmvlm-what-transfers-what-breaks\">CNN → LLM/VLM: What Transfers, What Breaks<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Everything conceptual from your CNN project transfers — quantization math, the three axes, TensorRT-style compilation, profiling. What <em>breaks<\/em> is the assumptions: LLMs are <strong>memory-bound<\/strong>, have <strong>outlier activations<\/strong>, are <strong>too big to retrain<\/strong>, and are judged by <strong>perplexity<\/strong>. Knowing exactly which assumption flips is the whole interview.<\/div><\/div>\n<h2 id=\"what-transfers-unchanged\">What transfers unchanged<\/h2>\n<ul><li><strong>The three axes<\/strong> — method (how you pick int8-friendly numbers), format (FP16/INT8/FP8/<\/li><\/ul>\n<p>INT4), engine (where it runs fast). Same framing.<\/p>\n<ul><li><strong>Quantization math<\/strong> — scale, zero-point, symmetric/asymmetric, per-channel. Identical; LLMs<\/li><\/ul>\n<p>just add <strong>group-wise<\/strong> granularity (below).<\/p>\n<ul><li><strong>The loop<\/strong> — baseline → quantize → measure quality + speed → compare in a tracker. Same<\/li><\/ul>\n<p>discipline, different metrics.<\/p>\n<ul><li><strong>Compilation &amp; profiling<\/strong> — a runtime that fuses ops and picks kernels (TensorRT →<\/li><\/ul>\n<p>TensorRT-LLM); roofline, Nsight, proper timing. All carry over.<\/p>\n<ul><li><strong>Distillation<\/strong> — still a core lever, arguably <em>more<\/em> central for LLMs.<\/li><\/ul>\n<h2 id=\"what-breaks-the-four-flips\">What breaks: the four flips<\/h2>\n<h3 id=\"1-compute-bound-memory-bound-the-big-one\">1. Compute-bound → memory-bound (the big one)<\/h3>\n<ul><li>Your CNN did lots of math per byte, so INT8 sped up the <strong>compute<\/strong>.<\/li><li>LLM <strong>decode generates one token at a time<\/strong>, re-reading <em>every weight<\/em> from memory per token<\/li><\/ul>\n<p>with little math → <strong>bandwidth-bound<\/strong>.<\/p>\n<ul><li>Consequence: <strong>weight-only INT4<\/strong> (shrink the bytes you load) gives a big decode speedup even<\/li><\/ul>\n<p>though it never touches the math units — the <em>opposite<\/em> of the CNN intuition.<\/p>\n<ul><li>(Roofline logic from <a class=\"mdlink\" data-href=\"../12-nvidia-model-optimization/gpu-performance.md\" href=\"#\">§12<\/a>.)<\/li><\/ul>\n<h3 id=\"2-clean-activations-outlier-activations\">2. Clean activations → outlier activations<\/h3>\n<ul><li>Transformer activations develop a few <strong>massive outlier channels<\/strong>.<\/li><li>A naive per-tensor INT8 scale must cover those outliers → normal values crushed into a few<\/li><\/ul>\n<p>codes → <strong>accuracy collapse<\/strong>.<\/p>\n<ul><li>This is why plain PTQ that worked on your CNN <em>fails<\/em> on an LLM — and why <strong>SmoothQuant / AWQ<\/strong><\/li><\/ul>\n<p>exist (next page).<\/p>\n<ul><li>Note: weights are still well-behaved; <strong>activations<\/strong> are the problem.<\/li><\/ul>\n<h3 id=\"3-retrainable-too-big-to-retrain\">3. Retrainable → too big to retrain<\/h3>\n<ul><li>You could QAT FashionMNIST in minutes. A 7B–70B model costs far too much to QAT end-to-end,<\/li><\/ul>\n<p>and you rarely have the data.<\/p>\n<ul><li>So the field leans on <strong>PTQ and weight-only<\/strong> methods that need only a little calibration data.<\/li><li>The QAT-shaped option is <strong>QLoRA<\/strong> — fine-tune small <strong>LoRA adapters<\/strong> on a frozen 4-bit base<\/li><\/ul>\n<p>→ recovers task accuracy cheaply, without touching the base weights.<\/p>\n<h3 id=\"4-top-1-accuracy-perplexity-benchmarks\">4. Top-1 accuracy → perplexity + benchmarks<\/h3>\n<ul><li>Your CNN had one clean number. LLM quality is <strong>perplexity<\/strong> (how well it predicts held-out<\/li><\/ul>\n<p>text) <strong>+ downstream benchmarks<\/strong> (MMLU, GSM8K…).<\/p>\n<ul><li>Degradation is subtler and uneven — a 4-bit model can look fine on perplexity but slip on<\/li><\/ul>\n<p>multi-step reasoning or long context.<\/p>\n<ul><li>So you <strong>measure more, and more carefully<\/strong>.<\/li><\/ul>\n<h2 id=\"two-new-things-with-no-cnn-analog\">Two new things with no CNN analog<\/h2>\n<ul><li><strong>The KV cache<\/strong> — autoregressive attention caches past keys/values; it grows with sequence<\/li><\/ul>\n<p>length and often dominates memory. Managing/quantizing it is a whole optimization axis your   CNN never had. (Mechanics in <a class=\"mdlink\" data-href=\"../12-nvidia-model-optimization/llm-inference.md\" href=\"#\">§12<\/a>.)<\/p>\n<ul><li><strong>Two-phase inference<\/strong> — a compute-bound <strong>prefill<\/strong> (process the prompt) then memory-bound<\/li><\/ul>\n<p><strong>decode<\/strong> (generate tokens). You optimize them differently and report <strong>two latencies<\/strong>   (TTFT and per-token), not one.<\/p>\n<h2 id=\"the-mapping-in-one-table\">The mapping in one table<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Aspect<\/th><th>Your CNN<\/th><th>LLM<\/th><th>VLM<\/th><\/tr><\/thead><tbody><tr><td>Bottleneck<\/td><td>compute<\/td><td>decode = memory<\/td><td>prefill (image tokens) + decode<\/td><\/tr><tr><td>Best-bang quant<\/td><td>INT8 (W+A)<\/td><td>weight-only INT4; FP8<\/td><td>INT8 vision tower + INT4/FP8 decoder<\/td><\/tr><tr><td>Outliers?<\/td><td>no<\/td><td>yes → SmoothQuant/AWQ<\/td><td>yes (in the LLM half)<\/td><\/tr><tr><td>Retrain?<\/td><td>QAT easy<\/td><td>PTQ / QLoRA<\/td><td>PTQ / QLoRA<\/td><\/tr><tr><td>Quality metric<\/td><td>top-1 acc<\/td><td>perplexity + MMLU…<\/td><td>VQA/caption benchmarks<\/td><\/tr><tr><td>New cost<\/td><td>—<\/td><td>KV cache<\/td><td>KV cache + many image tokens<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p>Same spirit as your project, different tools: <strong>HuggingFace<\/strong> baseline → <strong>AutoAWQ / AutoGPTQ / bitsandbytes<\/strong> (weight-only) or <strong>TensorRT-Model-Optimizer<\/strong> (FP8/SmoothQuant) → served by <strong>TensorRT-LLM / vLLM / llama.cpp<\/strong> → evaluated with <strong>lm-evaluation-harness<\/strong>.<\/p>\n<p><strong>How you'd say it:<\/strong> <em>\"The loop is the same as my CNN project — baseline, quantize, serve, compare — but LLM decode is memory-bound, so weight-only INT4 is the big win instead of INT8 compute; activations have outliers so I'd use SmoothQuant or AWQ; I can't afford QAT so I'd reach for QLoRA; and I'd track perplexity and tokens/sec, not top-1.\"<\/em><\/p>\n<h2 id=\"self-check\">Self-check<\/h2>\n<ul><li>Why does weight-only INT4 help an LLM but wouldn't have been the obvious choice for your<\/li><\/ul>\n<p>CNN? <em>(LLM decode is memory-bound — fewer weight bytes to load speeds it up; the CNN was   compute-bound.)<\/em><\/p>\n<ul><li>Why does plain per-tensor INT8 PTQ fail on an LLM? *(outlier activation channels inflate the<\/li><\/ul>\n<p>scale and crush normal values → need SmoothQuant/AWQ.)*<\/p>\n<ul><li>What replaces QAT when the model's too big to retrain? *(PTQ/weight-only quantization, and<\/li><\/ul>\n<p>QLoRA for cheap task-specific recovery.)*<\/p>\n<ul><li>Name two things you optimize on an LLM that have no CNN analog. *(the KV cache; the separate<\/li><\/ul>\n<p>prefill vs decode phases.)*<\/p>","toc":[{"level":2,"id":"what-transfers-unchanged","text":"What transfers unchanged"},{"level":2,"id":"what-breaks-the-four-flips","text":"What breaks: the four flips"},{"level":3,"id":"1-compute-bound-memory-bound-the-big-one","text":"1. Compute-bound → memory-bound (the big one)"},{"level":3,"id":"2-clean-activations-outlier-activations","text":"2. Clean activations → outlier activations"},{"level":3,"id":"3-retrainable-too-big-to-retrain","text":"3. Retrainable → too big to retrain"},{"level":3,"id":"4-top-1-accuracy-perplexity-benchmarks","text":"4. Top-1 accuracy → perplexity + benchmarks"},{"level":2,"id":"two-new-things-with-no-cnn-analog","text":"Two new things with no CNN analog"},{"level":2,"id":"the-mapping-in-one-table","text":"The mapping in one table"},{"level":2,"id":"connecting-the-dots-the-real-stack","text":"🔗 Connecting the dots: the real stack"},{"level":2,"id":"self-check","text":"Self-check"}],"text":"cnn → llm/vlm: what transfers, what breaks 💡 tl;dr everything conceptual from your cnn project transfers — quantization math, the three axes, tensorrt-style compilation, profiling. what breaks is the assumptions: llms are memory-bound , have outlier activations , are too big to retrain , and are judged by perplexity . knowing exactly which assumption flips is the whole interview. what transfers unchanged the three axes — method (how you pick int8-friendly numbers), format (fp16/int8/fp8/ int4), engine (where it runs fast). same framing. quantization math — scale, zero-point, symmetric/asymmetric, per-channel. identical; llms just add group-wise granularity (below). the loop — baseline → quantize → measure quality + speed → compare in a tracker. same discipline, different metrics. compilation & profiling — a runtime that fuses ops and picks kernels (tensorrt → tensorrt-llm); roofline, nsight, proper timing. all carry over. distillation — still a core lever, arguably more central for llms. what breaks: the four flips 1. compute-bound → memory-bound (the big one) your cnn did lots of math per byte, so int8 sped up the compute . llm decode generates one token at a time , re-reading every weight from memory per token with little math → bandwidth-bound . consequence: weight-only int4 (shrink the bytes you load) gives a big decode speedup even though it never touches the math units — the opposite of the cnn intuition. (roofline logic from §12 .) 2. clean activations → outlier activations transformer activations develop a few massive outlier channels . a naive per-tensor int8 scale must cover those outliers → normal values crushed into a few codes → accuracy collapse . this is why plain ptq that worked on your cnn fails on an llm — and why smoothquant / awq exist (next page). note: weights are still well-behaved; activations are the problem. 3. retrainable → too big to retrain you could qat fashionmnist in minutes. a 7b–70b model costs far too much to qat end-to-end, and you rarely have the data. so the field leans on ptq and weight-only methods that need only a little calibration data. the qat-shaped option is qlora — fine-tune small lora adapters on a frozen 4-bit base → recovers task accuracy cheaply, without touching the base weights. 4. top-1 accuracy → perplexity + benchmarks your cnn had one clean number. llm quality is perplexity (how well it predicts held-out text) + downstream benchmarks (mmlu, gsm8k…). degradation is subtler and uneven — a 4-bit model can look fine on perplexity but slip on multi-step reasoning or long context. so you measure more, and more carefully . two new things with no cnn analog the kv cache — autoregressive attention caches past keys/values; it grows with sequence length and often dominates memory. managing/quantizing it is a whole optimization axis your cnn never had. (mechanics in §12 .) two-phase inference — a compute-bound prefill (process the prompt) then memory-bound decode (generate tokens). you optimize them differently and report two latencies (ttft and per-token), not one. the mapping in one table aspect your cnn llm vlm bottleneck compute decode = memory prefill (image tokens) + decode best-bang quant int8 (w+a) weight-only int4; fp8 int8 vision tower + int4/fp8 decoder outliers? no yes → smoothquant/awq yes (in the llm half) retrain? qat easy ptq / qlora ptq / qlora quality metric top-1 acc perplexity + mmlu… vqa/caption benchmarks new cost — kv cache kv cache + many image tokens 🔗 connecting the dots: the real stack same spirit as your project, different tools: huggingface baseline → autoawq / autogptq / bitsandbytes (weight-only) or tensorrt-model-optimizer (fp8/smoothquant) → served by tensorrt-llm / vllm / llama.cpp → evaluated with lm-evaluation-harness . how you'd say it: \"the loop is the same as my cnn project — baseline, quantize, serve, compare — but llm decode is memory-bound, so weight-only int4 is the big win instead of int8 compute; activations have outliers so i'd use smoothquant or awq; i can't afford qat so i'd reach for qlora; and i'd track perplexity and tokens/sec, not top-1.\" self-check why does weight-only int4 help an llm but wouldn't have been the obvious choice for your cnn? (llm decode is memory-bound — fewer weight bytes to load speeds it up; the cnn was compute-bound.) why does plain per-tensor int8 ptq fail on an llm? *(outlier activation channels inflate the scale and crush normal values → need smoothquant/awq.)* what replaces qat when the model's too big to retrain? *(ptq/weight-only quantization, and qlora for cheap task-specific recovery.)* name two things you optimize on an llm that have no cnn analog. *(the kv cache; the separate prefill vs decode phases.)*","words":764},{"path":"13-llm-vlm-optimization/llm-quantization.md","title":"LLM Quantization","section":"13 · LLM & VLM Optimization","quiz":false,"accent":"#2aa7cf","html":"<h1 id=\"llm-quantization\">LLM Quantization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two families. <strong>Weight-only<\/strong> (INT4, keep activations FP16) shrinks memory and speeds up the memory-bound decode — GPTQ/AWQ. <strong>Weight + activation<\/strong> (INT8 or FP8) also speeds the compute-bound prefill but must tame activation outliers — SmoothQuant/FP8. Plus a third target unique to LLMs: <strong>quantize the KV cache<\/strong>. Pick by which bottleneck you're attacking.<\/div><\/div>\n<h2 id=\"the-decision-that-frames-everything\">The decision that frames everything<\/h2>\n<p>Quantize <strong>weights only<\/strong>, or **weights <em>and<\/em> activations**? It maps straight to which phase hurts:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Weight-only (e.g. W4A16)<\/th><th>Weight + activation (W8A8 / FP8)<\/th><\/tr><\/thead><tbody><tr><td>What's quantized<\/td><td>weights → INT4, activations stay FP16<\/td><td>both → INT8 or FP8<\/td><\/tr><tr><td>Speeds up<\/td><td><strong>decode<\/strong> (less to load) + big memory cut<\/td><td><strong>prefill<\/strong> too (faster matmuls)<\/td><\/tr><tr><td>Main risk<\/td><td>small quality loss<\/td><td><strong>activation outliers<\/strong> wreck accuracy<\/td><\/tr><tr><td>Methods<\/td><td><strong>GPTQ, AWQ<\/strong>, GGUF k-quants, bnb NF4<\/td><td><strong>SmoothQuant<\/strong>, FP8 calibration<\/td><\/tr><tr><td>Use when<\/td><td>memory-bound / VRAM-limited / long decode<\/td><td>throughput-bound / long prompts / batch<\/td><\/tr><\/tbody><\/table><\/div>\n<p>One-liner: <em>\"Weight-only INT4 if I'm memory- or VRAM-bound, which decode usually is; weight+activation INT8/FP8 if prefill/throughput dominates and I can handle the outliers.\"<\/em><\/p>\n<h2 id=\"weight-only-methods-int4\">Weight-only methods (INT4)<\/h2>\n<ul><li><strong>GPTQ<\/strong> — layer-wise, <strong>second-order (Hessian-based)<\/strong> rounding: quantize weights column by<\/li><\/ul>\n<p>column, compensating remaining weights for the error. INT4/INT3 with small quality loss.<\/p>\n<ul><li><strong>AWQ (Activation-aware Weight Quantization)<\/strong> — protect the ~1% of weight channels that<\/li><\/ul>\n<p>matter most (identified by <em>activation<\/em> magnitude), scale them up before quantizing so INT4   doesn't crush them. Fast, no backprop, great quality/latency.<\/p>\n<ul><li><strong>Group-wise quantization<\/strong> — the LLM twist on per-channel: give every <strong>group of N weights<\/strong><\/li><\/ul>\n<p>(e.g. group size 128) its own scale. Finer than per-channel, the accuracy knob behind INT4.   GGUF \"k-quants\" (Q4_K_M etc.) are group-wise mixes.<\/p>\n<ul><li><strong>NF4 (bitsandbytes)<\/strong> — a 4-bit \"normal float\" data type matched to the bell-curve<\/li><\/ul>\n<p>distribution of weights; the base for <strong>QLoRA<\/strong>.<\/p>\n<h2 id=\"weight-activation-methods\">Weight + activation methods<\/h2>\n<ul><li><strong>SmoothQuant<\/strong> — the outlier fix. Migrate the \"difficulty\" from activations into weights by<\/li><\/ul>\n<p>a per-channel scaling <code>X·diag(s)⁻¹<\/code> and <code>diag(s)·W<\/code>, so <em>both<\/em> become smooth enough for INT8.   This is what makes W8A8 viable on LLMs.<\/p>\n<ul><li><strong>FP8 (E4M3)<\/strong> — on Hopper/Ada, often the sweet spot: near-FP16 quality, tensor-core speed,<\/li><\/ul>\n<p>and it handles outliers better than INT8 because floating point keeps dynamic range.   Calibrated per-tensor via Transformer Engine / TensorRT-LLM.<\/p>\n<h2 id=\"the-third-target-kv-cache-quantization\">The third target: KV-cache quantization<\/h2>\n<p>Unique to LLMs — the KV cache can dwarf the weights at long context/large batch. Store it in <strong>INT8 or FP8<\/strong> to roughly <strong>halve<\/strong> it, which directly buys <strong>longer context or bigger batches<\/strong>. Usually low-risk (keys can be more sensitive than values; some setups keep keys higher-precision). Always worth mentioning as a lever your CNN never had.<\/p>\n<h2 id=\"ptq-vs-qat-for-llms\">PTQ vs QAT for LLMs<\/h2>\n<ul><li><strong>PTQ dominates<\/strong> — all the methods above are post-training; they need only a small<\/li><\/ul>\n<p><strong>calibration set<\/strong> (a few hundred sequences). Cheap, no gradients.<\/p>\n<ul><li><strong>Full QAT is rare<\/strong> — too expensive at LLM scale. The practical stand-in is <strong>QLoRA<\/strong>:<\/li><\/ul>\n<p>freeze a 4-bit (NF4) base, train small <strong>LoRA adapters<\/strong> in higher precision on top.   You get QAT-like task recovery for a tiny fraction of the cost — and you can serve the base   once and hot-swap adapters.<\/p>\n<ul><li><strong>Distillation<\/strong> is bigger than in CV — small strong models are often <em>distilled<\/em> from large<\/li><\/ul>\n<p>ones, then quantized.<\/p>\n<h2 id=\"measuring-quality-dont-say-accuracy\">Measuring quality (don't say \"accuracy\")<\/h2>\n<ul><li><strong>Perplexity<\/strong> on held-out text (e.g. WikiText) — cheap, sensitive first check.<\/li><li><strong>Downstream benchmarks<\/strong> — MMLU (knowledge), GSM8K (reasoning), HumanEval (code), etc., via<\/li><\/ul>\n<p><strong>lm-evaluation-harness<\/strong>. A 4-bit model can hold perplexity but drop on reasoning, so test   the tasks you care about.<\/p>\n<ul><li><strong>Watch long-context and reasoning<\/strong> — these degrade first under aggressive quantization.<\/li><\/ul>\n<h2 id=\"connecting-the-dots-the-real-stack\">🔗 Connecting the dots: the real stack<\/h2>\n<p><strong>AutoGPTQ<\/strong>, <strong>AutoAWQ<\/strong>, <strong>llama.cpp/GGUF<\/strong> (k-quants, CPU/edge), <strong>bitsandbytes<\/strong> (NF4/8-bit, QLoRA) for weight-only; <strong>NVIDIA Te

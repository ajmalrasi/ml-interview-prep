se multi-agent's real cost is coordination, not compute . every hop between agents is a full llm call reinterpreting another llm's natural-language output — a lossy channel, and each extra agent is a place meaning can drift. you also multiply the hiding places: a single agent is one trace, one loop; multi-agent is traces × agents when the answer comes out wrong. reaching for multi-agent before you have more than one distinct role is adding graph complexity with no matching problem. the tell that you've actually outgrown a single agent: its system prompt turning into a pile of \"if this kind of question act like x, if that kind act like y\" — a disguised router. that's when you promote it to a real supervisor. q: llamaindex vs langchain vs langgraph vs crewai: compare them. it's a trick prompt: they solve different layers , so a head-to-head is a category error, and interviewers use it to check whether you know the stack or just the brand names. llamaindex — ingestion/indexing: loaders, chunkers, index abstractions. \"how do i get documents into an index.\" langchain — general llm app toolkit: prompt templates, chains, integrations. \"how do i compose llm calls quickly.\" langgraph — a graph execution engine for stateful, cyclic control flow. \"how do i model a loop or branch as an explicit graph with state.\" crewai — a multi-agent framework: pre-built roles, a crew delegating tasks. \"how do i get role-playing agents cooperating out of the box.\" the strong answer names which you'd use together and which you'd skip for stated reasons . docsmind uses llamaindex (ingestion) + langgraph (the loop), skips langchain (its llm usage is one well-understood call, better as a direct sdk call) and crewai (no multi-agent problem exists yet). q: how would you validate that a single agent is enough, rather than assuming? run an end-to-end eval against both shapes on the same task set — the same discipline as a retrieval eval or an answer-faithfulness eval: metric single agent multi-agent task success rate baseline must beat it, not tie tokens per task fewer (no coordination hops) more — every hop is an llm call latency per task lower higher and more variable debuggability one trace traces × agents if multi-agent doesn't measurably beat a well-scoped single agent, the extra complexity isn't earning its cost. in an interview, having run that comparison — even on a toy task set — beats any amount of architecture vocabulary.","words":757},{"path":"22-langgraph/README.md","title":"Overview","section":"4 · LangGraph","quiz":false,"accent":"#7a5fd0","html":"<h1 id=\"4-langgraph-hands-on-state-nodes-edges\">4: LangGraph Hands-On: State, Nodes, Edges<\/h1>\n<p><strong>The big idea:<\/strong> LangGraph is a way to write your agent as a <strong>graph of small functions<\/strong> instead of one long function. Each function is a <strong>node<\/strong>. A shared dictionary — the <strong>state<\/strong> — flows from node to node along <strong>edges<\/strong>. That's the whole model. A plain retrieve → generate flow is a graph with two nodes and one edge; the moment you want a branch (\"if no context, refuse\") or a loop (\"call a tool, look at the result, maybe call another\"), the graph shape pays off.<\/p>\n<p><strong>Where in the pipeline:<\/strong> at the <strong>Generate / agent<\/strong> stage — the same seam as <a class=\"mdlink\" data-href=\"../12-tool-calling/README.md\" href=\"#\">tool calling<\/a>. Section 14 answered <em>which shape<\/em> (one loop vs many). This section answers <em>how you actually write it.<\/em><\/p>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <div class=\"loopwrap\" style=\"width:100%\"><span class=\"loop-top\">today · RAGPipeline.query — one straight function call<\/span>\n      <div class=\"flow\"><span class=\"node data\">question<\/span><span class=\"arw\"><\/span><span class=\"node\">retrieve<\/span><span class=\"arw\"><\/span><span class=\"node\">generate<\/span><span class=\"arw\"><\/span><span class=\"node out\">answer<\/span><\/div>\n    <\/div>\n    <div class=\"loopwrap\" style=\"width:100%\"><span class=\"loop-top\">as a LangGraph — state flows along edges<\/span>\n      <div class=\"flow\"><span class=\"node ghost\">START<\/span><span class=\"arw\"><\/span><span class=\"node\">retrieve<span class=\"nsub\">node<\/span><\/span><span class=\"arw\"><\/span><span class=\"node\">generate<span class=\"nsub\">node<\/span><\/span><span class=\"arw\"><\/span><span class=\"node ghost\">END<\/span><\/div>\n    <\/div>\n  <\/div>\n<\/div>\n<h2 id=\"why-this-section-exists\">Why this section exists<\/h2>\n<p>\"Are you on LangChain or LangGraph?\" is easy to answer. <strong>\"Write me a node\"<\/strong> is where people freeze — because they've talked about graphs but never built one. This section fixes that: by the end you can write the state, a node, wire the edges, add a branch, and explain <em>why a graph beats a plain function chain.<\/em><\/p>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"state-nodes-edges.md\" href=\"#\">state-nodes-edges.md<\/a><\/td><td>The three primitives — the entire mental model, with the smallest possible code<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"build-a-graph.md\" href=\"#\">build-a-graph.md<\/a><\/td><td>Build DocsMind's retrieve → generate flow as a runnable graph, step by step<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"conditional-edges.md\" href=\"#\">conditional-edges.md<\/a><\/td><td>The branch and the loop — why it's a <em>graph<\/em>, not a sequence, and the guardrail as an edge<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: What is a LangGraph node, in one line?<\/strong> A plain function: it takes the current state and returns a dict, and that dict gets <strong>merged back into the state<\/strong> for the next node.<\/p>\n<p><strong>Q: What is the \"state\"?<\/strong> One shared object — a <code>TypedDict<\/code> — that every node reads from and writes to. It <em>is<\/em> the memory passed along the edges. Nothing else is global.<\/p>\n<p><strong>Q: Your graph is just retrieve → generate. Why use LangGraph at all, if it's sequential?<\/strong> Because the cost of <em>adding a branch or a loop later<\/em> is one line, not a rewrite. A linear graph is just a graph with no branches <strong>yet<\/strong>. The payoff is conditional edges: \"if retrieval came back empty, route to a refuse node instead of letting the model hallucinate\" — that's my <code>INSUFFICIENT_CONTEXT<\/code> guardrail expressed as an edge, not an <code>if<\/code> buried in a function.<\/p>\n<p><strong>Q: LangChain vs LangGraph — what's the actual difference?<\/strong> LangChain chains steps in a fixed line (and hides control flow inside abstractions). LangGraph makes the control flow <strong>the graph<\/strong> — you can see and control every branch, loop, and retry. For anything with a decision in it, LangGraph is the honest tool.<\/p>\n<p><strong>Q: How does LangGraph give an agent memory across turns?<\/strong> A checkpointer. You <code>compile(checkpointer=...)<\/code> and pass a <code>thread_id<\/code>; the state is saved after each node, so the next turn resumes with history. Same graph, persistence bolted on at compile time.<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/agent/__init__.py<\/code> — today just a docstring; this is the exact file where the graph below lands. <code class=\"srcref\" title=\"source file in the repo\">docsmind/retrieval/retriever.py<\/code> — the <code>HybridRetriever<\/code> the <code>retrieve<\/code> node calls. <code class=\"srcref\" title=\"source file in the repo\">docsmind/llm/cloud_client.py<\/code> — the <code>generate()<\/code> the <code>generate<\/code> node calls.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"state-nodes-edges.md\" href=\"#\">state-nodes-edges.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-this-section-exists","text":"Why this section exists"},{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"4: langgraph hands-on: state, nodes, edges the big idea: langgraph is a way to write your agent as a graph of small functions instead of one long function. each function is a node . a shared dictionary — the state — flows from node to node along edges . that's the whole model. a plain retrieve → generate flow is a graph with two nodes and one edge; the moment you want a branch (\"if no context, refuse\") or a loop (\"call a tool, look at the result, maybe call another\"), the graph shape pays off. where in the pipeline: at the generate / agent stage — the same seam as tool calling . section 14 answered which shape (one loop vs many). this section answers how you actually write it. today · ragpipeline.query — one straight function call question retrieve generate answer as a langgraph — state flows along edges start retrieve node generate node end why this section exists \"are you on langchain or langgraph?\" is easy to answer. \"write me a node\" is where people freeze — because they've talked about graphs but never built one. this section fixes that: by the end you can write the state, a node, wire the edges, add a branch, and explain why a graph beats a plain function chain. files in this folder file what it covers state-nodes-edges.md the three primitives — the entire mental model, with the smallest possible code build-a-graph.md build docsmind's retrieve → generate flow as a runnable graph, step by step conditional-edges.md the branch and the loop — why it's a graph , not a sequence, and the guardrail as an edge 🎯 interview q&a q: what is a langgraph node, in one line? a plain function: it takes the current state and returns a dict, and that dict gets merged back into the state for the next node. q: what is the \"state\"? one shared object — a typeddict — that every node reads from and writes to. it is the memory passed along the edges. nothing else is global. q: your graph is just retrieve → generate. why use langgraph at all, if it's sequential? because the cost of adding a branch or a loop later is one line, not a rewrite. a linear graph is just a graph with no branches yet . the payoff is conditional edges: \"if retrieval came back empty, route to a refuse node instead of letting the model hallucinate\" — that's my insufficient_context guardrail expressed as an edge, not an if buried in a function. q: langchain vs langgraph — what's the actual difference? langchain chains steps in a fixed line (and hides control flow inside abstractions). langgraph makes the control flow the graph — you can see and control every branch, loop, and retry. for anything with a decision in it, langgraph is the honest tool. q: how does langgraph give an agent memory across turns? a checkpointer. you compile(checkpointer=...) and pass a thread_id ; the state is saved after each node, so the next turn resumes with history. same graph, persistence bolted on at compile time. code docsmind/agent/__init__.py — today just a docstring; this is the exact file where the graph below lands. docsmind/retrieval/retriever.py — the hybridretriever the retrieve node calls. docsmind/llm/cloud_client.py — the generate() the generate node calls. → next: state-nodes-edges.md","words":556},{"path":"22-langgraph/state-nodes-edges.md","title":"State, Nodes & Edges","section":"4 · LangGraph","quiz":false,"accent":"#7a5fd0","html":"<h1 id=\"state-nodes-edges-the-whole-mental-model\">State, Nodes, Edges: The Whole Mental Model<\/h1>\n<p>LangGraph has exactly three moving parts. Learn these and everything else is detail.<\/p>\n<h2 id=\"1-state-the-shared-notebook\">1. State: the shared notebook<\/h2>\n<p>The state is one dictionary that travels through the graph. Every node reads it and writes back into it. You declare its shape with a <code>TypedDict<\/code> so you (and the editor) know what keys exist.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> typing <span class=\"tok-keyword\">import<\/span> TypedDict, List\n\n<span class=\"tok-keyword\">class<\/span> RAGState(TypedDict):\n    question: <span class=\"tok-builtin\">str<\/span>        <span class=\"tok-comment\"># set once, at the start<\/span>\n    chunks: List[<span class=\"tok-builtin\">str<\/span>]    <span class=\"tok-comment\"># filled by the retrieve node<\/span>\n    answer: <span class=\"tok-builtin\">str<\/span>          <span class=\"tok-comment\"># filled by the generate node<\/span><\/code><\/pre>\n<p>Think of it as a form that starts mostly blank. Each node fills in its section and passes the form along. There is no other global memory — if a node needs a value, it must be in the state.<\/p>\n<h2 id=\"2-node-a-function-that-fills-in-part-of-the-form\">2. Node: a function that fills in part of the form<\/h2>\n<p>A node is <strong>just a function<\/strong>. It takes the whole state and returns a <strong>dict of only the keys it wants to change<\/strong>. LangGraph merges that dict back into the state for you.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> retrieve(state: RAGState) -&gt; <span class=\"tok-builtin\">dict<\/span>:\n    results = retriever.retrieve(state[<span class=\"tok-string\">\"question\"<\/span>], top_k=<span class=\"tok-number\">5<\/span>)  <span class=\"tok-comment\"># HybridRetriever<\/span>\n    <span class=\"tok-keyword\">return<\/span> {<span class=\"tok-string\">\"chunks\"<\/span>: [r.text <span class=\"tok-keyword\">for<\/span> r <span class=\"tok-keyword\">in<\/span> results]}              <span class=\"tok-comment\"># merged into state<\/span><\/code><\/pre>\n<p>Two things to notice, because both are interview tells:<\/p>\n<ul><li>The node <strong>reads<\/strong> <code>state[\"question\"]<\/code> and <strong>writes<\/strong> <code>chunks<\/code>. It doesn't<\/li><\/ul>\n<p>mutate the state object — it <em>returns<\/em> the change. LangGraph does the merge.<\/p>\n<ul><li>It returns <strong>only<\/strong> <code>chunks<\/code>, not the whole state. You patch the form; you<\/li><\/ul>\n<p>don't recopy it.<\/p>\n<p>A second node, same rule:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> generate(state: RAGState) -&gt; <span class=\"tok-builtin\">dict<\/span>:\n    context = <span class=\"tok-string\">\"\\n\\n\"<\/span>.join(state[<span class=\"tok-string\">\"chunks\"<\/span>])\n    answer = llm.generate(                      <span class=\"tok-comment\"># CloudLLMClient.generate<\/span>\n        system=<span class=\"tok-string\">\"Answer only from the context. Cite sources.\"<\/span>,\n        prompt=<span class=\"tok-string\">f\"Context:\\n{context}\\n\\nQuestion: {state['question']}\"<\/span>,\n        max_tokens=<span class=\"tok-number\">512<\/span>,\n    )\n    <span class=\"tok-keyword\">return<\/span> {<span class=\"tok-string\">\"answer\"<\/span>: answer}<\/code><\/pre>\n<h2 id=\"3-edge-the-arrow-that-says-go-here-next\">3. Edge: the arrow that says \"go here next\"<\/h2>\n<p>Edges define the order nodes run in. Two special markers, <code>START<\/code> and <code>END<\/code>, are the entry and exit.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> langgraph.graph <span class=\"tok-keyword\">import<\/span> START, END\n\n<span class=\"tok-comment\"># START → retrieve → generate → END<\/span>\nadd_edge(START, <span class=\"tok-string\">\"retrieve\"<\/span>)\nadd_edge(<span class=\"tok-string\">\"retrieve\"<\/span>, <span class=\"tok-string\">\"generate\"<\/span>)\nadd_edge(<span class=\"tok-string\">\"generate\"<\/span>, END)<\/code><\/pre>\n<p>That's a straight line — three edges, no decisions. It's a valid graph. When someone says \"our graph is still sequential,\" this is what they mean: real nodes, real state, but every edge is unconditional. Nothing wrong with that — it's the honest starting point, and the branch is <a class=\"mdlink\" data-href=\"conditional-edges.md\" href=\"#\">one step away<\/a>.<\/p>\n<h2 id=\"the-one-paragraph-version-to-say-out-loud\">The one-paragraph version to say out loud<\/h2>\n<blockquote><p>\"State is a <code>TypedDict<\/code> — the shared memory. A node is a function that takes state and returns a dict that gets merged into it. Edges wire the nodes in order, from <code>START<\/code> to <code>END<\/code>. That's the entire model; conditional edges are the only thing that makes it more than a function chain.\"<\/p><\/blockquote>\n<h2 id=\"interview-depth-signal\">Interview depth signal<\/h2>\n<ul><li><strong>Why return a partial dict instead of mutating state?<\/strong> So LangGraph controls<\/li><\/ul>\n<p>the merge — which is what lets it snapshot state for checkpointing (memory) and   run nodes in parallel safely. Mutation would break both.<\/p>\n<ul><li><strong>What breaks if two nodes write the same key?<\/strong> Last write wins by default. If<\/li><\/ul>\n<p>you actually want to <em>accumulate<\/em> (e.g. append messages, not overwrite), you   attach a <strong>reducer<\/strong> to that key with <code>Annotated[list, add_messages]<\/code>. Knowing   that reducers exist is the senior signal.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"build-a-graph.md\" href=\"#\">build-a-graph.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"1-state-the-shared-notebook","text":"1. State: the shared notebook"},{"level":2,"id":"2-node-a-function-that-fills-in-part-of-the-form","text":"2. Node: a function that fills in part of the form"},{"level":2,"id":"3-edge-the-arrow-that-says-go-here-next","text":"3. Edge: the arrow that says \"go here next\""},{"level":2,"id":"the-one-paragraph-version-to-say-out-loud","text":"The one-paragraph version to say out loud"},{"level":2,"id":"interview-depth-signal","text":"Interview depth signal"}],"text":"state, nodes, edges: the whole mental model langgraph has exactly three moving parts. learn these and everything else is detail. 1. state: the shared notebook the state is one dictionary that travels through the graph. every node reads it and writes back into it. you declare its shape with a typeddict so you (and the editor) know what keys exist. from typing import typeddict, list class ragstate(typeddict): question: str # set once, at the start chunks: list[ str ] # filled by the retrieve node answer: str # filled by the generate node think of it as a form that starts mostly blank. each node fills in its section and passes the form along. there is no other global memory — if a node needs a value, it must be in the state. 2. node: a function that fills in part of the form a node is just a function . it takes the whole state and returns a dict of only the keys it wants to change . langgraph merges that dict back into the state for you. def retrieve(state: ragstate) -> dict : results = retriever.retrieve(state[ \"question\" ], top_k= 5 ) # hybridretriever return { \"chunks\" : [r.text for r in results]} # merged into state two things to notice, because both are interview tells: the node reads state[\"question\"] and writes chunks . it doesn't mutate the state object — it returns the change. langgraph does the merge. it returns only chunks , not the whole state. you patch the form; you don't recopy it. a second node, same rule: def generate(state: ragstate) -> dict : context = \"\\n\\n\" .join(state[ \"chunks\" ]) answer = llm.generate( # cloudllmclient.generate system= \"answer only from the context. cite sources.\" , prompt= f\"context:\\n{context}\\n\\nquestion: {state['question']}\" , max_tokens= 512 , ) return { \"answer\" : answer} 3. edge: the arrow that says \"go here next\" edges define the order nodes run in. two special markers, start and end , are the entry and exit. from langgraph.graph import start, end # start → retrieve → generate → end add_edge(start, \"retrieve\" ) add_edge( \"retrieve\" , \"generate\" ) add_edge( \"generate\" , end) that's a straight line — three edges, no decisions. it's a valid graph. when someone says \"our graph is still sequential,\" this is what they mean: real nodes, real state, but every edge is unconditional. nothing wrong with that — it's the honest starting point, and the branch is one step away . the one-paragraph version to say out loud \"state is a typeddict — the shared memory. a node is a function that takes state and returns a dict that gets merged into it. edges wire the nodes in order, from start to end . that's the entire model; conditional edges are the only thing that makes it more than a function chain.\" interview depth signal why return a partial dict instead of mutating state? so langgraph controls the merge — which is what lets it snapshot state for checkpointing (memory) and run nodes in parallel safely. mutation would break both. what breaks if two nodes write the same key? last write wins by default. if you actually want to accumulate (e.g. append messages, not overwrite), you attach a reducer to that key with annotated[list, add_messages] . knowing that reducers exist is the senior signal. → next: build-a-graph.md","words":553},{"path":"22-langgraph/build-a-graph.md","title":"Build a Graph","section":"4 · LangGraph","quiz":false,"accent":"#7a5fd0","html":"<h1 id=\"build-a-graph-docsminds-retrieve-generate-runnable\">Build a Graph: DocsMind's Retrieve → Generate, Runnable<\/h1>\n<p>This is the whole thing in one file. It's the code to write on a whiteboard when someone says <strong>\"show me a LangGraph node.\"<\/strong> Everything you saw in <a class=\"mdlink\" data-href=\"state-nodes-edges.md\" href=\"#\">state-nodes-edges.md<\/a>, assembled and run.<\/p>\n<h2 id=\"the-complete-graph\">The complete graph<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> typing <span class=\"tok-keyword\">import<\/span> TypedDict, List\n<span class=\"tok-keyword\">from<\/span> langgraph.graph <span class=\"tok-keyword\">import<\/span> StateGraph, START, END\n\n<span class=\"tok-comment\"># ── 1. State: the shared notebook every node reads and writes ──────────────<\/span>\n<span class=\"tok-keyword\">class<\/span> RAGState(TypedDict):\n    question: <span class=\"tok-builtin\">str<\/span>\n    chunks: List[<span class=\"tok-builtin\">str<\/span>]\n    answer: <span class=\"tok-builtin\">str<\/span>\n\n<span class=\"tok-comment\"># ── 2. Nodes: functions that take state, return the keys they change ───────<\/span>\n<span class=\"tok-keyword\">def<\/span> retrieve(state: RAGState) -&gt; <span class=\"tok-builtin\">dict<\/span>:\n    results = retriever.retrieve(state[<span class=\"tok-string\">\"question\"<\/span>], top_k=<span class=\"tok-number\">5<\/span>)   <span class=\"tok-comment\"># HybridRetriever<\/span>\n    <span class=\"tok-keyword\">return<\/span> {<span class=\"tok-string\">\"chunks\"<\/span>: [r.text <span class=\"tok-keyword\">for<\/span> r <span class=\"tok-keyword\">in<\/span> results]}\n\n<span class=\"tok-keyword\">def<\/span> generate(state: RAGState) -&gt; <span class=\"tok-builtin\">dict<\/span>:\n    context = <span class=\"tok-string\">\"\\n\\n\"<\/span>.join(state[<span class=\"tok-string\">\"chunks\"<\/span>])\n    answer = llm.generate(                                      <span class=\"tok-comment\"># CloudLLMClient<\/span>\n        system=<span class=\"tok-string\">\"Answer only from the context. Cite sources.\"<\/span>,\n        prompt=<span class=\"tok-string\">f\"Context:\\n{context}\\n\\nQuestion: {state['question']}\"<\/span>,\n        max_tokens=<span class=\"tok-number\">512<\/span>,\n    )\n    <span class=\"tok-keyword\">return<\/span> {<span class=\"tok-string\">\"answer\"<\/span>: answer}\n\n<span class=\"tok-comment\"># ── 3. Build: register nodes, wire edges, compile ──────────────────────────<\/span>\nbuilder = StateGraph(RAGState)\nbuilder.add_node(<span class=\"tok-string\">\"retrieve\"<\/span>, retrieve)\nbuilder.add_node(<span class=\"tok-string\">\"generate\"<\/span>, generate)\n\nbuilder.add_edge(START, <span class=\"tok-string\">\"retrieve\"<\/span>)\nbuilder.add_edge(<span class=\"tok-string\">\"retrieve\"<\/span>, <span class=\"tok-string\">\"generate\"<\/span>)\nbuilder.add_edge(<span class=\"tok-string\">\"generate\"<\/span>, END)\n\ngraph = builder.compile()\n\n<span class=\"tok-comment\"># ── 4. Run: invoke with the starting state, read the final state back ──────<\/span>\nresult = graph.invoke({<span class=\"tok-string\">\"question\"<\/span>: <span class=\"tok-string\">\"What is a supernova?\"<\/span>})\n<span class=\"tok-builtin\">print<\/span>(result[<span class=\"tok-string\">\"answer\"<\/span>])<\/code><\/pre>\n<p>That runs. <code>invoke<\/code> returns the final state dict — the same form, now with every section filled in.<\/p>\n<h2 id=\"read-it-as-four-steps\">Read it as four steps<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Step<\/th><th>What you're doing<\/th><th>The one line that matters<\/th><\/tr><\/thead><tbody><tr><td>1 · State<\/td><td>Declare the shape of the shared memory<\/td><td><code>class RAGState(TypedDict): ...<\/code><\/td><\/tr><tr><td>2 · Nodes<\/td><td>Write each function: state in, partial dict out<\/td><td><code>return {\"chunks\": ...}<\/code><\/td><\/tr><tr><td>3 · Wire<\/td><td><code>add_node<\/code> each, then <code>add_edge<\/code> in order<\/td><td><code>add_edge(\"retrieve\", \"generate\")<\/code><\/td><\/tr><tr><td>4 · Run<\/td><td><code>compile()<\/code> once, then <code>invoke(initial_state)<\/code><\/td><td><code>graph.invoke({\"question\": ...})<\/code><\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"where-this-lands-in-docsmind\">Where this lands in DocsMind<\/h2>\n<p>Right now <code class=\"srcref\" title=\"source file in the repo\">docsmind/agent/__init__.py<\/code> is a docstring placeholder. This graph is what fills it. Notice the nodes don't reimplement anything — <code>retrieve<\/code> calls the existing <code class=\"srcref\" title=\"source file in the repo\"><code>HybridRetriever<\/code><\/code> and <code>generate<\/code> calls the existing <code class=\"srcref\" title=\"source file in the repo\"><code>CloudLLMClient<\/code><\/code>. <strong>LangGraph is the wiring, not the work.<\/strong> The retrieval and generation you already built become two nodes; the graph just decides the order and, next, the branches.<\/p>\n<h2 id=\"invoke-vs-stream-know-both\">invoke vs stream: know both<\/h2>\n<ul><li><code>graph.invoke(state)<\/code> — run to the end, get the final state. Simplest.<\/li><li><code>graph.stream(state)<\/code> — yields the state update after <strong>each node<\/strong>, so you can<\/li><\/ul>\n<p>show progress (\"retrieving…\", \"generating…\") or stream tokens. This is what a   real UI uses.<\/p>\n<h2 id=\"interview-depth-signal\">Interview depth signal<\/h2>\n<ul><li><strong>\"Walk me through the execution.\"<\/strong> START hands the initial state to<\/li><\/ul>\n<p><code>retrieve<\/code>; <code>retrieve<\/code> returns <code>{\"chunks\": [...]}<\/code> which merges in; the edge   routes to <code>generate<\/code>; <code>generate<\/code> reads <code>chunks<\/code> + <code>question<\/code>, returns   <code>{\"answer\": ...}<\/code>; the edge routes to END; <code>invoke<\/code> returns the final state.   Being able to narrate the <em>state at each hop<\/em> is the signal.<\/p>\n<ul><li><strong>\"What did you gain over a plain function?\"<\/strong> Nothing yet — and saying that<\/li><\/ul>\n<p>honestly is good. The gain is structural: the graph is now a place to hang a   branch, a loop, a retry, or a checkpointer without touching the node code. That   is <a class=\"mdlink\" data-href=\"conditional-edges.md\" href=\"#\">the next page<\/a>.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"conditional-edges.md\" href=\"#\">conditional-edges.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-complete-graph","text":"The complete graph"},{"level":2,"id":"read-it-as-four-steps","text":"Read it as four steps"},{"level":2,"id":"where-this-lands-in-docsmind","text":"Where this lands in DocsMind"},{"level":2,"id":"invoke-vs-stream-know-both","text":"invoke vs stream: know both"},{"level":2,"id":"interview-depth-signal","text":"Interview depth signal"}],"text":"build a graph: docsmind's retrieve → generate, runnable this is the whole thing in one file. it's the code to write on a whiteboard when someone says \"show me a langgraph node.\" everything you saw in state-nodes-edges.md , assembled and run. the complete graph from typing import typeddict, list from langgraph.graph import stategraph, start, end # ── 1. state: the shared notebook every node reads and writes ────────────── class ragstate(typeddict): question: str chunks: list[ str ] answer: str # ── 2. nodes: functions that take state, return the keys they change ─────── def retrieve(state: ragstate) -> dict : results = retriever.retrieve(state[ \"question\" ], top_k= 5 ) # hybridretriever return { \"chunks\" : [r.text for r in results]} def generate(state: ragstate) -> dict : context = \"\\n\\n\" .join(state[ \"chunks\" ]) answer = llm.generate( # cloudllmclient system= \"answer only from the context. cite sources.\" , prompt= f\"context:\\n{context}\\n\\nquestion: {state['question']}\" , max_tokens= 512 , ) return { \"answer\" : answer} # ── 3. build: register nodes, wire edges, compile ────────────────────────── builder = stategraph(ragstate) builder.add_node( \"retrieve\" , retrieve) builder.add_node( \"generate\" , generate) builder.add_edge(start, \"retrieve\" ) builder.add_edge( \"retrieve\" , \"generate\" ) builder.add_edge( \"generate\" , end) graph = builder.compile() # ── 4. run: invoke with the starting state, read the final state back ────── result = graph.invoke({ \"question\" : \"what is a supernova?\" }) print (result[ \"answer\" ]) that runs. invoke returns the final state dict — the same form, now with every section filled in. read it as four steps step what you're doing the one line that matters 1 · state declare the shape of the shared memory class ragstate(typeddict): ... 2 · nodes write each function: state in, partial dict out return {\"chunks\": ...} 3 · wire add_node each, then add_edge in order add_edge(\"retrieve\", \"generate\") 4 · run compile() once, then invoke(initial_state) graph.invoke({\"question\": ...}) where this lands in docsmind right now docsmind/agent/__init__.py is a docstring placeholder. this graph is what fills it. notice the nodes don't reimplement anything — retrieve calls the existing hybridretriever and generate calls the existing cloudllmclient . langgraph is the wiring, not the work. the retrieval and generation you already built become two nodes; the graph just decides the order and, next, the branches. invoke vs stream: know both graph.invoke(state) — run to the end, get the final state. simplest. graph.stream(state) — yields the state update after each node , so you can show progress (\"retrieving…\", \"generating…\") or stream tokens. this is what a real ui uses. interview depth signal \"walk me through the execution.\" start hands the initial state to retrieve ; retrieve returns {\"chunks\": [...]} which merges in; the edge routes to generate ; generate reads chunks + question , returns {\"answer\": ...} ; the edge routes to end; invoke returns the final state. being able to narrate the state at each hop is the signal. \"what did you gain over a plain function?\" nothing yet — and saying that honestly is good. the gain is structural: the graph is now a place to hang a branch, a loop, a retry, or a checkpointer without touching the node code. that is the next page . → next: conditional-edges.md","words":520},{"path":"22-langgraph/conditional-edges.md","title":"Branches & Loops","section":"4 · LangGraph","quiz":false,"accent":"#7a5fd0","html":"<h1 id=\"conditional-edges-why-its-a-graph-not-a-sequence\">Conditional Edges: Why It's a Graph, Not a Sequence<\/h1>\n<p>This is the page that turns \"our graph is still sequential\" from an apology into a <em>design choice you're about to upgrade.<\/em> A conditional edge is the one feature that makes LangGraph worth more than a chain of function calls.<\/p>\n<h2 id=\"the-straight-line-and-the-branch\">The straight line, and the branch<\/h2>\n<p>A normal edge always goes to the same next node. A <strong>conditional edge<\/strong> runs a small router function that <em>looks at the state<\/em> and returns the name of where to go next.<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\" style=\"margin-bottom:10px\"><span class=\"flow-lbl\">unconditional:<\/span><span class=\"node\">retrieve<\/span><span class=\"arw\"><\/span><span class=\"node out\">generate<\/span><\/div>\n  <div class=\"branch\">\n    <span class=\"node\">retrieve<\/span>\n    <span class=\"split-arw\"><\/span>\n    <div class=\"fork\">\n      <span class=\"node out\">chunks found? → generate<\/span>\n      <span class=\"node ghost\">empty? → refuse<\/span>\n    <\/div>\n  <\/div>\n<\/div>\n<h2 id=\"the-guardrail-as-an-edge\">The guardrail as an edge<\/h2>\n<p>DocsMind already has an <code>INSUFFICIENT_CONTEXT<\/code> guardrail — when retrieval is weak, refuse instead of hallucinating. In a plain function that's an <code>if<\/code> buried in the middle. In a graph it becomes a <strong>visible branch<\/strong>:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> route_after_retrieve(state: RAGState) -&gt; <span class=\"tok-builtin\">str<\/span>:\n    <span class=\"tok-comment\"># return value is just a label — which edge to take<\/span>\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-string\">\"generate\"<\/span> <span class=\"tok-keyword\">if<\/span> state[<span class=\"tok-string\">\"chunks\"<\/span>] <span class=\"tok-keyword\">else<\/span> <span class=\"tok-string\">\"refuse\"<\/span>\n\n<span class=\"tok-keyword\">def<\/span> refuse(state: RAGState) -&gt; <span class=\"tok-builtin\">dict<\/span>:\n    <span class=\"tok-keyword\">return<\/span> {<span class=\"tok-string\">\"answer\"<\/span>: <span class=\"tok-string\">\"INSUFFICIENT_CONTEXT\"<\/span>}\n\nbuilder.add_node(<span class=\"tok-string\">\"refuse\"<\/span>, refuse)\n\n<span class=\"tok-comment\"># replace the plain retrieve→generate edge with a conditional one<\/span>\nbuilder.add_conditional_edges(\n    <span class=\"tok-string\">\"retrieve\"<\/span>,\n    route_after_retrieve,\n    {\n        <span class=\"tok-string\">\"generate\"<\/span>: <span class=\"tok-string\">\"generate\"<\/span>,   <span class=\"tok-comment\"># found context → answer it<\/span>\n        <span class=\"tok-string\">\"refuse\"<\/span>:   <span class=\"tok-string\">\"refuse\"<\/span>,     <span class=\"tok-comment\"># no context   → guardrail<\/span>\n    },\n)\nbuilder.add_edge(<span class=\"tok-string\">\"refuse\"<\/span>, END)<\/code><\/pre>\n<p>Now the graph <em>branches<\/em>. This is the concrete answer to \"why LangGraph if it's sequential?\" — <strong>because turning a sequence into a decision is one <code>add_conditional_edges<\/code> call, and the decision is now a thing you can see, test, and trace<\/strong>, not logic hidden inside a function.<\/p>\n<h2 id=\"the-loop-an-agent-in-graph-form\">The loop: an agent, in graph form<\/h2>\n<p>The same conditional-edge tool makes a loop. Point an edge <em>back<\/em> to an earlier node, and gate it with a router. This is the tool-calling loop from <a class=\"mdlink\" data-href=\"../12-tool-calling/README.md\" href=\"#\">section 12<\/a>, drawn as a graph:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> should_continue(state: AgentState) -&gt; <span class=\"tok-builtin\">str<\/span>:\n    <span class=\"tok-keyword\">if<\/span> state[<span class=\"tok-string\">\"iterations\"<\/span>] &gt;= <span class=\"tok-number\">5<\/span>:          <span class=\"tok-comment\"># the max-iterations guard, as an edge<\/span>\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-string\">\"stop\"<\/span>\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-string\">\"use_tool\"<\/span> <span class=\"tok-keyword\">if<\/span> state[<span class=\"tok-string\">\"tool_calls\"<\/span>] <span class=\"tok-keyword\">else<\/span> <span class=\"tok-string\">\"stop\"<\/span>\n\nbuilder.add_conditional_edges(\n    <span class=\"tok-string\">\"model\"<\/span>,\n    should_continue,\n    {<span class=\"tok-string\">\"use_tool\"<\/span>: <span class=\"tok-string\">\"run_tool\"<\/span>, <span class=\"tok-string\">\"stop\"<\/span>: END},\n)\nbuilder.add_edge(<span class=\"tok-string\">\"run_tool\"<\/span>, <span class=\"tok-string\">\"model\"<\/span>)     <span class=\"tok-comment\"># ← the loop: tool result goes back in<\/span><\/code><\/pre>\n<p><code>model → run_tool → model → run_tool → …<\/code> until the router says <code>stop<\/code>. That back-edge is the entire difference between a one-shot call and an agent. The iteration guard from tool calling isn't a <code>while<\/code> counter anymore — it's an edge condition, so it's impossible to forget and easy to see.<\/p>\n<h2 id=\"the-mental-upgrade\">The mental upgrade<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Plain function chain<\/th><th>LangGraph<\/th><\/tr><\/thead><tbody><tr><td>Order of steps<\/td><td>Hardcoded in call order<\/td><td>Edges — visible, reorderable<\/td><\/tr><tr><td>A decision<\/td><td><code>if/else<\/code> buried in a function<\/td><td>A conditional edge — its own testable function<\/td><\/tr><tr><td>A loop<\/td><td><code>while<\/code> with a manual guard<\/td><td>A back-edge + a router<\/td><\/tr><tr><td>Memory across turns<\/td><td>You build it<\/td><td><code>compile(checkpointer=...)<\/code> + <code>thread_id<\/code><\/td><\/tr><tr><td>Seeing what happened<\/td><td><code>print<\/code> debugging<\/td><td>A trace of nodes + state at each hop<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-depth-signal\">Interview depth signal<\/h2>\n<ul><li><strong>\"Why not just use <code>if<\/code> statements?\"<\/strong> You can — for two nodes. The graph<\/li><\/ul>\n<p>pays off when branches, loops, and retries multiply: the control flow becomes a   thing you can <em>look at and reason about<\/em> instead of tracing through nested   functions. And it's the seam checkpointing and streaming hook into.<\/p>\n<ul><li><strong>\"How would you keep the loop from running forever?\"<\/strong> The router is the<\/li><\/ul>\n<p>guard: an iteration count in the state, checked on every back-edge, routing to   <code>END<\/code> past the cap. Show it as an edge, not a <code>break<\/code>.<\/p>\n<ul><li><strong>\"How did you validate the branch works?\"<\/strong> Feed a question with no matching<\/li><\/ul>\n<p>context and assert the graph reaches <code>refuse<\/code> and returns   <code>INSUFFICIENT_CONTEXT<\/code> — the same guardrail test, now asserting on the <em>path   through the graph<\/em>, not just the output string.<\/p>\n<p>→ Back to: <strong><a class=\"mdlink\" data-href=\"../README.md\" href=\"#\">the site overview<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-straight-line-and-the-branch","text":"The straight line, and the branch"},{"level":2,"id":"the-guardrail-as-an-edge","text":"The guardrail as an edge"},{"level":2,"id":"the-loop-an-agent-in-graph-form","text":"The loop: an agent, in graph form"},{"level":2,"id":"the-mental-upgrade","text":"The mental upgrade"},{"level":2,"id":"interview-depth-signal","text":"Interview depth signal"}],"text":"conditional edges: why it's a graph, not a sequence this is the page that turns \"our graph is still sequential\" from an apology into a design choice you're about to upgrade. a conditional edge is the one feature that makes langgraph worth more than a chain of function calls. the straight line, and the branch a normal edge always goes to the same next node. a conditional edge runs a small router function that looks at the state and returns the name of where to go next. unconditional: retrieve generate retrieve chunks found? → generate empty? → refuse the guardrail as an edge docsmind already has an insufficient_context guardrail — when retrieval is weak, refuse instead of hallucinating. in a plain function that's an if buried in the middle. in a graph it becomes a visible branch : def route_after_retrieve(state: ragstate) -> str : # return value is just a label — which edge to take return \"generate\" if state[ \"chunks\" ] else \"refuse\" def refuse(state: ragstate) -> dict : return { \"answer\" : \"insufficient_context\" } builder.add_node( \"refuse\" , refuse) # replace the plain retrieve→generate edge with a conditional one builder.add_conditional_edges( \"retrieve\" , route_after_retrieve, { \"generate\" : \"generate\" , # found context → answer it \"refuse\" : \"refuse\" , # no context → guardrail }, ) builder.add_edge( \"refuse\" , end) now the graph branches . this is the concrete answer to \"why langgraph if it's sequential?\" — because turning a sequence into a decision is one add_conditional_edges call, and the decision is now a thing you can see, test, and trace , not logic hidden inside a function. the loop: an agent, in graph form the same conditional-edge tool makes a loop. point an edge back to an earlier node, and gate it with a router. this is the tool-calling loop from section 12 , drawn as a graph: def should_continue(state: agentstate) -> str : if state[ \"iterations\" ] >= 5 : # the max-iterations guard, as an edge return \"stop\" return \"use_tool\" if state[ \"tool_calls\" ] else \"stop\" builder.add_conditional_edges( \"model\" , should_continue, { \"use_tool\" : \"run_tool\" , \"stop\" : end}, ) builder.add_edge( \"run_tool\" , \"model\" ) # ← the loop: tool result goes back in model → run_tool → model → run_tool → … until the router says stop . that back-edge is the entire difference between a one-shot call and an agent. the iteration guard from tool calling isn't a while counter anymore — it's an edge condition, so it's impossible to forget and easy to see. the mental upgrade plain function chain langgraph order of steps hardcoded in call order edges — visible, reorderable a decision if/else buried in a function a conditional edge — its own testable function a loop while with a manual guard a back-edge + a router memory across turns you build it compile(checkpointer=...) + thread_id seeing what happened print debugging a trace of nodes + state at each hop interview depth signal \"why not just use if statements?\" you can — for two nodes. the graph pays off when branches, loops, and retries multiply: the control flow becomes a thing you can look at and reason about instead of tracing through nested functions. and it's the seam checkpointing and streaming hook into. \"how would you keep the loop from running forever?\" the router is the guard: an iteration count in the state, checked on every back-edge, routing to end past the cap. show it as an edge, not a break . \"how did you validate the branch works?\" feed a question with no matching context and assert the graph reaches refuse and returns insufficient_context — the same guardrail test, now asserting on the path through the graph , not just the output string. → back to: the site overview","words":627},{"path":"22-langgraph/interview-questions.md","title":"Interview Questions","section":"4 · LangGraph","quiz":true,"accent":"#7a5fd0","html":"<h1 id=\"langgraph-interview-questions\">LangGraph: Interview Questions<\/h1>\n<details class=\"qa\" open><summary>Q: What is the role of LangGraph in a multi-agent system?<\/summary><div class=\"qa-body\"><p>LangGraph is the <strong>control-flow engine<\/strong> — it models the loop or branching between steps as an explicit graph with shared state, instead of hiding that logic inside code. In a multi-agent system that means the supervisor's routing, each sub-agent's loop, and the edges between them are all <em>visible, inspectable nodes and edges<\/em> rather than nested function calls.<\/p>\n<p>That visibility is the point. When (not if) a multi-agent system misbehaves, the difference between reading a trace and guessing is whether the control flow is an explicit graph. LangGraph gives you which node ran, what the model decided, and where it went next — plus the seams that checkpointing (memory) and streaming hook into.<\/p>\n<p>Note the scope: LangGraph is the loop-builder, not the multi-agent framework itself (that's more CrewAI's territory). You can build a supervisor <em>in<\/em> LangGraph, but its core job is one thing — turning stateful, cyclic control flow into a graph you can see.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: What are the three parts of LangGraph's model?<\/summary><div class=\"qa-body\"><p>State, nodes, edges. Learn these and everything else is detail.<\/p>\n<ul><li><strong>State<\/strong> — one <code>TypedDict<\/code> that travels through the graph; the shared<\/li><\/ul>\n<p>notebook. Every node reads it and writes back. There's no other global   memory — if a node needs a value, it must be in the state.<\/p>\n<ul><li><strong>Node<\/strong> — just a function. It takes the whole state and returns a dict of<\/li><\/ul>\n<p><em>only the keys it wants to change<\/em>; LangGraph merges that back in.<\/p>\n<ul><li><strong>Edge<\/strong> — the arrow saying \"go here next.\" <code>START<\/code> and <code>END<\/code> are the entry<\/li><\/ul>\n<p>and exit. Unconditional edges give you a straight line.<\/p>\n<p>The one-paragraph version to say out loud: \"State is a <code>TypedDict<\/code> — the shared memory. A node takes state and returns a dict merged into it. Edges wire nodes from <code>START<\/code> to <code>END<\/code>. Conditional edges are the only thing that makes it more than a function chain.\"<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Why does a node return a partial dict instead of mutating the state?<\/summary><div class=\"qa-body\"><p>So LangGraph controls the merge. That control is what lets it snapshot state for checkpointing (memory across turns) and run nodes in parallel safely. Direct mutation would break both. A node reads <code>state[\"question\"]<\/code> and <em>returns<\/em> <code>{\"chunks\": ...}<\/code> — it patches the form, it doesn't recopy or mutate it.<\/p>\n<p>Follow-up they like: <strong>what if two nodes write the same key?<\/strong> Last write wins by default. If you actually want to accumulate (append messages rather than overwrite), you attach a <strong>reducer<\/strong> to that key with <code>Annotated[list, add_messages]<\/code>. Knowing reducers exist is the senior signal.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: If the graph is just retrieve → generate, why not use plain function calls?<\/summary><div class=\"qa-body\"><p>For two nodes, you could. The graph earns its keep the moment you need a <strong>branch or a loop<\/strong> — because turning a sequence into a decision is one <code>add_conditional_edges<\/code> call, and the decision becomes a thing you can see, test, and trace instead of an <code>if<\/code> buried inside a function.<\/p>\n<p>DocsMind's <code>INSUFFICIENT_CONTEXT<\/code> guardrail is the concrete example: in a plain function it's an <code>if<\/code> in the middle of the code; as a graph it's a visible branch — <code>retrieve → (chunks found?) → generate | refuse<\/code>. Same logic, now a testable router function and a traceable path.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How do you keep an agent loop from running forever in LangGraph?<\/summary><div class=\"qa-body\"><p>The router is the guard. You keep an iteration count in the state and check it on every back-edge, routing to <code>END<\/code> past the cap:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> should_continue(state) -&gt; <span class=\"tok-builtin\">str<\/span>:\n    <span class=\"tok-keyword\">if<\/span> state[<span class=\"tok-string\">\"iterations\"<\/span>] &gt;= <span class=\"tok-number\">5<\/span>:      <span class=\"tok-comment\"># the max-iterations guard, as an edge<\/span>\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-string\">\"stop\"<\/span>\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-string\">\"use_tool\"<\/span> <span class=\"tok-keyword\">if<\/span> state[<span class=\"tok-string\">\"tool_calls\"<\/span>] <span class=\"tok-keyword\">else<\/span> <span class=\"tok-string\">\"stop\"<\/span><\/code><\/pre>\n<p>The loop itself is a <strong>back-edge<\/strong> — <code>model → run_tool → model → …<\/code> — and that back-edge is the entire difference between a one-shot call and an agent. The key framing for an interview: the iteration guard isn't a <code>while<\/code> counter you might forget, it's an edge condition — impossible to forget and easy to see in the trace. And you validate the branch the same way you validate the guardrail: feed a question with no matching context, assert the graph reaches <code>refuse<\/code> and returns <code>INSUFFICIENT_CONTEXT<\/code>.<\/p><\/div><\/details>","toc":[],"text":"langgraph: interview questions q: what is the role of langgraph in a multi-agent system? langgraph is the control-flow engine — it models the loop or branching between steps as an explicit graph with shared state, instead of hiding that logic inside code. in a multi-agent system that means the supervisor's routing, each sub-agent's loop, and the edges between them are all visible, inspectable nodes and edges rather than nested function calls. that visibility is the point. when (not if) a multi-agent system misbehaves, the difference between reading a trace and guessing is whether the control flow is an explicit graph. langgraph gives you which node ran, what the model decided, and where it went next — plus the seams that checkpointing (memory) and streaming hook into. note the scope: langgraph is the loop-builder, not the multi-agent framework itself (that's more crewai's territory). you can build a supervisor in langgraph, but its core job is one thing — turning stateful, cyclic control flow into a graph you can see. q: what are the three parts of langgraph's model? state, nodes, edges. learn these and everything else is detail. state — one typeddict that travels through the graph; the shared notebook. every node reads it and writes back. there's no other global memory — if a node needs a value, it must be in the state. node — just a function. it takes the whole state and returns a dict of only the keys it wants to change ; langgraph merges that back in. edge — the arrow saying \"go here next.\" start and end are the entry and exit. unconditional edges give you a straight line. the one-paragraph version to say out loud: \"state is a typeddict — the shared memory. a node takes state and returns a dict merged into it. edges wire nodes from start to end . conditional edges are the only thing that makes it more than a function chain.\" q: why does a node return a partial dict instead of mutating the state? so langgraph controls the merge. that control is what lets it snapshot state for checkpointing (memory across turns) and run nodes in parallel safely. direct mutation would break both. a node reads state[\"question\"] and returns {\"chunks\": ...} — it patches the form, it doesn't recopy or mutate it. follow-up they like: what if two nodes write the same key? last write wins by default. if you actually want to accumulate (append messages rather than overwrite), you attach a reducer to that key with annotated[list, add_messages] . knowing reducers exist is the senior signal. q: if the graph is just retrieve → generate, why not use plain function calls? for two nodes, you could. the graph earns its keep the moment you need a branch or a loop — because turning a sequence into a decision is one add_conditional_edges call, and the decision becomes a thing you can see, test, and trace instead of an if buried inside a function. docsmind's insufficient_context guardrail is the concrete example: in a plain function it's an if in the middle of the code; as a graph it's a visible branch — retrieve → (chunks found?) → generate | refuse . same logic, now a testable router function and a traceable path. q: how do you keep an agent loop from running forever in langgraph? the router is the guard. you keep an iteration count in the state and check it on every back-edge, routing to end past the cap: def should_continue(state) -> str : if state[ \"iterations\" ] >= 5 : # the max-iterations guard, as an edge return \"stop\" return \"use_tool\" if state[ \"tool_calls\" ] else \"stop\" the loop itself is a back-edge — model → run_tool → model → … — and that back-edge is the entire difference between a one-shot call and an agent. the key framing for an interview: the iteration guard isn't a while counter you might forget, it's an edge condition — impossible to forget and easy to see in the trace. and you validate the branch the same way you validate the guardrail: feed a question with no matching context, assert the graph reaches refuse and returns insufficient_context .","words":699}]};
/* Runtime app — no markdown engine, all content is pre-rendered in DATA. */
const PAGES = DATA.pages;
const byPath = {};
PAGES.forEach(p => byPath[p.path] = p);
let currentPath = null;

// --- live Jupyter playground link (served on the same host, port 8888) ---
const JUPYTER_PORT = 8888;
const JUPYTER_TOKEN = "koireader";   // matches run.sh / koi-jupyter service
function jupyterURL(){
  const proto = location.protocol === "file:" ? "http:" : location.protocol;
  const host = location.hostname || "localhost";
  return proto + "//" + host + ":" + JUPYTER_PORT + "/lab?token=" + JUPYTER_TOKEN;
}

// translucent tint from an accent hex — works on light AND dark backgrounds
function hexToRgba(hex, a){
  hex = (hex||"").replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex||"000000", 16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
}

/* ---------------------- persistent study-state store ---------------------- */
// localStorage is the instant/offline copy; /api/progress is shared by devices.
const STORE_KEY = "mlprep-v1";
function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(_){ return {}; } }
function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(_){} }
let STATE = loadStore();
let remoteReady = location.protocol === "file:";
let serverHasState = false;
let saveQueue = Promise.resolve();
let syncLabel = location.protocol === "file:" ? "local" : "connecting";
function normalizeState(s){
  s = s && typeof s === "object" ? s : {};
  s.done = s.done && typeof s.done === "object" ? s.done : {};
  s.cards = s.cards && typeof s.cards === "object" ? s.cards : {};
  s.pins = s.pins && typeof s.pins === "object" ? s.pins : {};
  s.analytics = s.analytics && typeof s.analytics === "object" ? s.analytics : {};
  s.last = typeof s.last === "string" ? s.last : null;
  return s;
}
STATE = normalizeState(STATE);
function hasStudyState(){
  return Object.keys(STATE.done).length || Object.keys(STATE.cards).length ||
    Object.keys(STATE.pins).length || Object.keys(STATE.analytics).length;
}
function mergeLegacyLocal(remote, local){
  let changed=false;
  const deleted=remote._deleted && typeof remote._deleted==="object" ? remote._deleted : {};
  ["done","cards","pins"].forEach(field=>{
    const tombstones=deleted[field] && typeof deleted[field]==="object" ? deleted[field] : {};
    Object.keys(local[field]||{}).forEach(key=>{
      if(!(key in remote[field]) && !(key in tombstones)){ remote[field][key]=local[field][key]; changed=true; }
    });
  });
  Object.keys(local.analytics||{}).forEach(key=>{
    if(!(key in remote.analytics)){ remote.analytics[key]=local.analytics[key]; changed=true; }
  });
  return changed;
}

/* ------------------------- per-page study analytics ------------------------ */
let trackedPagePath=null;
let trackedPageStartedAt=null;
let analyticsSaveTimer=null;
let analyticsPaintTimer=null;
function analyticsEntry(path){
  let a=STATE.analytics[path];
  if(!a || typeof a!=="object") a=STATE.analytics[path]={};
  a.seconds=Math.max(0, Number(a.seconds)||0);
  a.visits=Math.max(0, Math.floor(Number(a.visits)||0));
  a.lastVisited=Math.max(0, Number(a.lastVisited)||0);
  return a;
}
function pageSeconds(path){
  const a=analyticsEntry(path);
  let seconds=a.seconds;
  if(path===trackedPagePath && trackedPageStartedAt!==null && document.visibilityState==="visible"){
    seconds+=Math.max(0,Date.now()-trackedPageStartedAt)/1000;
  }
  return seconds;
}
function fmtMinutes(seconds){
  const mins=Math.max(0,seconds)/60;
  return (mins<10?mins.toFixed(1):Math.round(mins))+" min";
}
function persistPageAnalytics(path, beacon){
  if(!path) return;
  const change={op:"set",field:"analytics",key:path,value:analyticsEntry(path)};
  saveStore(STATE);
  if(!remoteReady || location.protocol==="file:" || (!serverHasState && !hasStudyState())) return;
  if(beacon && navigator.sendBeacon){
    try{
      navigator.sendBeacon("/api/progress",new Blob([JSON.stringify(change)],{type:"application/json"}));
      return;
    }catch(_){}
  }
  persist(change);
}
function flushTrackedPage(saveRemote){
  if(!trackedPagePath || trackedPageStartedAt===null) return;
  const now=Date.now();
  analyticsEntry(trackedPagePath).seconds+=Math.max(0,now-trackedPageStartedAt)/1000;
  trackedPageStartedAt=now;
  if(saveRemote) persistPageAnalytics(trackedPagePath,false); else saveStore(STATE);
}
function beginTrackedPage(){
  if(!trackedPagePath || trackedPageStartedAt!==null || document.visibilityState!=="visible") return;
  const a=analyticsEntry(trackedPagePath);
  a.visits++;
  a.lastVisited=Date.now();
  trackedPageStartedAt=Date.now();
  persistPageAnalytics(trackedPagePath,false);
}
function switchTrackedPage(path){
  if(path===trackedPagePath && trackedPageStartedAt!==null) return;
  flushTrackedPage(true);
  trackedPageStartedAt=null;
  trackedPagePath=path;
  beginTrackedPage();
}
function analyticsStatus(path){
  if(path==="README.md") return "Overview";
  if(isDone(path)) return "Completed";
  return analyticsEntry(path).visits?"In progress":"Not started";
}
function escAnalytics(s){
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function renderAnalyticsPanel(path){
  const old=document.getElementById("analyticsPanel"); if(old) old.remove();
  if(path!=="README.md") return;
  const content=document.getElementById("content"); if(!content) return;
  const pages=progressPages();
  const done=pages.filter(p=>isDone(p.path)).length;
  const panel=document.createElement("section");
  panel.id="analyticsPanel"; panel.className="analytics-panel";
  panel.innerHTML='<div class="analytics-overview-head"><div><span class="analytics-kicker">Study analytics</span>'+
    '<h2>Time on every page</h2><p>Counts only while this site is visible. Time and completion sync across devices.</p></div>'+
    '<div class="analytics-total"><strong id="analyticsTotalTime">0.0 min</strong><span>'+done+" / "+pages.length+' completed</span></div></div>'+
    '<div class="analytics-page-list">'+PAGES.map(p=>{
      const a=analyticsEntry(p.path), status=analyticsStatus(p.path);
      return '<a class="analytics-row" href="#'+encodeURI(p.path)+'"><span class="analytics-row-main"><strong>'+
        escAnalytics(p.title)+'</strong><small>'+a.visits+(a.visits===1?" visit":" visits")+'</small></span>'+
        '<span class="analytics-minutes" data-page-minutes="'+escAnalytics(p.path)+'">'+fmtMinutes(pageSeconds(p.path))+'</span>'+
        '<span class="analytics-state state-'+status.toLowerCase().replace(" ","-")+'">'+status+'</span></a>';
    }).join("")+'</div>';
  const first=content.firstElementChild;
  if(first) first.insertAdjacentElement("afterend",panel); else content.appendChild(panel);
  updateAnalyticsUI();
}
function updateAnalyticsUI(){
  document.querySelectorAll("[data-page-minutes]").forEach(el=>{
    el.textContent=fmtMinutes(pageSeconds(el.dataset.pageMinutes));
  });
  const current=document.getElementById("pageTimeValue");
  if(current && currentPath) current.textContent=fmtMinutes(pageSeconds(currentPath));
  const total=document.getElementById("analyticsTotalTime");
  if(total) total.textContent=fmtMinutes(PAGES.reduce((sum,p)=>sum+pageSeconds(p.path),0));
}
function initPageAnalytics(){
  document.addEventListener("visibilitychange",()=>{
    if(document.visibilityState==="hidden"){
      flushTrackedPage(true); trackedPageStartedAt=null;
    }else{ beginTrackedPage(); updateAnalyticsUI(); }
  });
  window.addEventListener("pagehide",()=>{
    flushTrackedPage(false);
    trackedPageStartedAt=null;
    persistPageAnalytics(trackedPagePath,true);
  });
  analyticsSaveTimer=setInterval(()=>flushTrackedPage(true),15000);
  analyticsPaintTimer=setInterval(updateAnalyticsUI,1000);
}
function persist(change){
  saveStore(STATE);
  if(!remoteReady || location.protocol === "file:" || (!serverHasState && !hasStudyState())) return;
  syncLabel = "saving"; refreshProgressUI();
  const body=JSON.stringify(change || {op:"replace", state:STATE});
  saveQueue=saveQueue.catch(()=>{}).then(async()=>{
    try{
      const r=await fetch("/api/progress", {method:"POST", headers:{"Content-Type":"application/json"}, body});
      if(!r.ok) throw new Error("HTTP "+r.status);
      serverHasState=true; syncLabel="synced";
    }catch(_){ syncLabel="local — sync unavailable"; }
    refreshProgressUI();
  });
}
async function syncProgress(){
  if(location.protocol === "file:") return;
  try{
    const r=await fetch("/api/progress", {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const payload=await r.json();
    let migrated=false;
    if(payload.exists){
      const remote=normalizeState(payload.state);
      migrated=mergeLegacyLocal(remote, STATE);
      STATE=remote; saveStore(STATE); serverHasState=true;
    }
    remoteReady=true; syncLabel="synced";
    if((!payload.exists && hasStudyState()) || migrated) persist({op:"replace", state:STATE});
  }catch(_){ remoteReady=true; syncLabel="local — sync unavailable"; }
}
// stable short hash for card ids
function hashStr(s){ let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))|0; return (h>>>0).toString(36); }

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;
  if(/\/$/.test(href)) href += "README.md";
  const base = curPath.split("/").slice(0,-1);
  href.split("/").forEach(p=>{
    if(p==="."||p==="") return;
    if(p==="..") base.pop(); else base.push(p);
  });
  return base.join("/");
}

function buildNav(){
  const nav=document.getElementById("nav");
  DATA.nav.forEach(sec=>{
    const wrap=document.createElement("div"); wrap.className="sec";
    wrap.style.setProperty("--card", sec.accent);
    const h=document.createElement("div"); h.className="sec-h";
    h.innerHTML='<span class="sec-ic">'+(sec.icon||"")+'</span> '+sec.label+
      '<span class="sec-count"></span>';
    wrap.appendChild(h);
    sec.items.forEach(it=>{
      const a=document.createElement("a");
      a.className="item"+(/README\.md$/.test(it.path)&&it.path.indexOf("/")>=0?" sub":"");
      a.textContent=it.title; a.href="#"+encodeURI(it.path);
      a.dataset.path=it.path;
      wrap.appendChild(a);
    });
    nav.appendChild(wrap);
  });
}

function setActive(path){
  let active=null;
  document.querySelectorAll("nav a.item").forEach(a=>{
    const on=a.dataset.path===path;
    a.classList.toggle("active",on);
    if(on) active=a;
  });
  revealActiveNav(active);
  const pg=byPath[path];
  document.getElementById("tbTitle").textContent = pg ? pg.title : "Agentic AI Prep";
}

function revealActiveNav(active){
  const side=document.getElementById("sidebar");
  if(!side||!active) return;
  requestAnimationFrame(()=>{
    const target=active.offsetTop-(side.clientHeight-active.offsetHeight)/2;
    side.scrollTop=Math.max(0,target);
  });
}

function renderPageTools(pg){
  const host=document.getElementById("pagetools");
  let html="";
  if(pg.quiz){
    html += '<div class="quizbar">'+
      '<button class="qbtn" id="hideAll">Quiz me · hide answers</button>'+
      '<button class="qbtn" id="showAll">Show all</button>'+
      '<button class="qbtn" id="shuffleCards">🔀 Shuffle</button>'+
      '<span class="qfilter">Show: '+
        '<button class="fbtn sel" data-f="all">all</button>'+
        '<button class="fbtn" data-f="unseen">unseen</button>'+
        '<button class="fbtn" data-f="misses">misses</button></span>'+
      '<span class="quiz-stats" id="quizStats"></span></div>';
  }
  if(pg.toc && pg.toc.length>=3){
    html += '<details class="toc"><summary>On this page</summary><ul>'+
      pg.toc.map(t=>'<li><a class="lvl'+t.level+'" data-anchor="'+t.id+'" href="#">'+t.text+'</a></li>').join("")+
      '</ul></details>';
  }
  host.innerHTML=html;
  if(pg.quiz){
    const set=open=>document.querySelectorAll("#content details.qa").forEach(d=>d.open=open);
    const hb=document.getElementById("hideAll"), sb=document.getElementById("showAll");
    if(hb) hb.onclick=()=>set(false);
    if(sb) sb.onclick=()=>set(true);
    const shuf=document.getElementById("shuffleCards");
    if(shuf) shuf.onclick=()=>shuffleCards();
    host.querySelectorAll(".fbtn").forEach(b=>b.onclick=()=>{
      host.querySelectorAll(".fbtn").forEach(x=>x.classList.toggle("sel",x===b));
      applyQuizFilter(b.dataset.f);
    });
  }
}

function renderPager(path){
  const idx=PAGES.findIndex(p=>p.path===path);
  const pager=document.getElementById("pager");
  if(idx<0){ pager.innerHTML=""; return; }
  const prev=PAGES[idx-1], next=PAGES[idx+1];
  let html="";
  if(prev) html+='<a href="#'+encodeURI(prev.path)+'"><div class="lbl">← Previous</div><div class="ttl">'+prev.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  if(next) html+='<a class="next" href="#'+encodeURI(next.path)+'"><div class="lbl">Next →</div><div class="ttl">'+next.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  pager.innerHTML=html;
}

function loadPage(path){
  const pg=byPath[path];
  const content=document.getElementById("content");
  if(!pg){ content.innerHTML='<div class="loading">Page not found: '+path+'</div>'; document.getElementById("pagetools").innerHTML=""; document.getElementById("pager").innerHTML=""; return; }
  switchTrackedPage(path);
  currentPath=path;
  setActive(path);
  // tint the page to its section accent (soft tint is translucent → theme-proof)
  const root=document.documentElement.style;
  if(pg.accent){ root.setProperty("--sec-accent", pg.accent); root.setProperty("--sec-accent-soft", hexToRgba(pg.accent, 0.16)); }
  else { root.removeProperty("--sec-accent"); root.removeProperty("--sec-accent-soft"); }
  content.innerHTML=pg.html;
  renderAnalyticsPanel(path);
  renderPageTools(pg);
  if(pg.quiz) initFlashcards(pg);
  renderPager(path);
  mountWidgets();
  markVisited(path);
  window.scrollTo(0,0);
  closeSidebar();
}

// Each widget is a <div id="…"> placed in a markdown page via a ```rawhtml fence.

const WIDGETS = {
  "chunk-widget":   initChunkWidget,
  "cosine-widget":  initCosineWidget,
  "context-widget": initContextWidget,
  "index-widget":   initIndexWidget,
  "kv-cache-widget": initKVCacheWidget,
  "paged-attention-widget": initPagedAttentionWidget,
  "prefill-scheduler-widget": initPrefillSchedulerWidget,
  "continuous-batching-widget": initContinuousBatchingWidget,

};
function mountWidgets(){

    if(document.getElementById(id)){ try{ WIDGETS[id](); }catch(e){ console.error("widget "+id, e); } }
  }
}

/* --------- Chunking visualizer: size + overlap over a document --------- */
function initChunkWidget(){
  const host=document.getElementById("chunk-widget"); if(!host) return;
  const L=1000;
  host.innerHTML=
   '<div class="bv-wrap"><div class="bv-controls"><div class="bt-sliders">'+
     '<label>Chunk size <b id="ck-sv">200</b> tokens<input id="ck-s" type="range" min="50" max="500" step="10" value="200"></label>'+
     '<label>Overlap <b id="ck-ov">40</b> tokens<input id="ck-o" type="range" min="0" max="240" step="10" value="40"></label>'+
   '</div>'+
   '<svg class="chunk-svg" viewBox="0 0 460 160" preserveAspectRatio="xMidYMid meet"><g id="ck-g"></g></svg>'+
   '<div class="bv-metrics">'+
     '<div class="bv-m"><span class="bv-mlab">Chunks</span><b id="ck-n">—</b></div>'+
     '<div class="bv-m"><span class="bv-mlab">Overlap</span><b id="ck-pct">—</b></div>'+
     '<div class="bv-m"><span class="bv-mlab">Redundancy</span><b id="ck-red">—</b></div>'+
   '</div>'+
   '<div class="lm-note" id="ck-note"></div></div></div>';
  const el=id=>host.querySelector("#"+id);
  const W=460, padX=10, plotW=W-2*padX;
  function compute(){
    let S=+el("ck-s").value, O=+el("ck-o").value;
    if(O>=S){ O=S-10; el("ck-o").value=O; }
    el("ck-sv").textContent=S; el("ck-ov").textContent=O;
    const stride=S-O, sc=x=>padX+(x/L)*plotW;
    const starts=[]; for(let p=0;p<L;p+=stride){ starts.push(p); if(p+S>=L) break; }
    const n=starts.length, rowH=15, gap=4;
    let g='<rect x="'+padX+'" y="10" width="'+plotW+'" height="10" class="ck-doc" rx="2"/>'+
          '<text x="'+padX+'" y="7" class="ck-lbl">document · '+L+' tokens</text>';
    starts.forEach((p,i)=>{
      const x=sc(p), w=sc(Math.min(p+S,L))-x, y=30+(i%7)*(rowH+gap);
      g+='<rect x="'+x.toFixed(1)+'" y="'+y+'" width="'+w.toFixed(1)+'" height="'+rowH+'" class="ck-chunk c'+(i%4)+'" rx="3"/>';
    });
    el("ck-g").innerHTML=g;
    el("ck-n").textContent=n;
    el("ck-pct").textContent=(O/S*100).toFixed(0)+"%";
    const red=(n*S)/L;
    el("ck-red").textContent=red.toFixed(2)+"×";
    el("ck-note").textContent="Stride = "+stride+" tokens → "+n+" chunks totaling "+(n*S)+" tokens for a "+L+"-token doc ("+red.toFixed(2)+"× redundancy). More overlap keeps ideas that straddle a boundary retrievable, but stores and searches more vectors.";
  }
  ["ck-s","ck-o"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

     '</div></div></div>';
  const el=id=>host.querySelector("#"+id);
  const rad=d=>d*Math.PI/180;
  function compute(){
    const a=+el("cos-aa").value, b=+el("cos-ba").value;
    el("cos-av").textContent=a; el("cos-bv").textContent=b;
    el("cos-a").setAttribute("x2",cx+R*Math.cos(rad(a))); el("cos-a").setAttribute("y2",cy-R*Math.sin(rad(a)));

    el("cos-a-l").setAttribute("x",cx+(R+12)*Math.cos(rad(a))); el("cos-a-l").setAttribute("y",cy-(R+12)*Math.sin(rad(a)));
    el("cos-b-l").setAttribute("x",cx+(R+12)*Math.cos(rad(b))); el("cos-b-l").setAttribute("y",cy-(R+12)*Math.sin(rad(b)));
    let diff=Math.abs(a-b)%360; if(diff>180) diff=360-diff;

    el("cos-ang").textContent=diff.toFixed(0)+"°";
    const rd=el("cos-read"); let msg,cls;
    if(cos>0.8){msg="near-duplicate";cls="bv-good";} else if(cos>0.3){msg="related";cls="bv-good";}
    else if(cos>-0.3){msg="unrelated";cls="";} else {msg="opposite";cls="bv-bad";}
    rd.textContent=msg; rd.className="bv-diag "+cls;
  }
  ["cos-aa","cos-ba"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

function initKVCacheWidget(){
  const host=document.getElementById("kv-cache-widget"); if(!host) return;
  const tokens=["The","bank","approved","the","loan","because","risk","was","low","."];
  host.innerHTML=
   '<div class="bv-wrap kvw-wrap"><div class="bv-controls">'+

     '</span></div>'+
     '<div class="bt-sliders"><label for="kvw-step">Generation step <b id="kvw-stepv">5 / 10</b>'+
       '<input id="kvw-step" type="range" min="1" max="10" step="1" value="5"></label></div>'+
   '</div>'+
   '<svg id="kvw-svg" class="kvw-svg" viewBox="0 0 680 240" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="kvw-title kvw-desc"></svg>'+
   '<div class="kvw-legend"><span><i class="kvw-lg-attn"></i>attention read</span><span><i class="kvw-lg-old"></i><b id="kvw-old-label">cached K,V</b></span><span><i class="kvw-lg-new"></i>new K,V</span></div>'+

     '<div class="bv-m"><span class="bv-mlab">Cumulative projections</span><b id="kvw-total">—</b></div>'+
     '<div class="bv-m"><span class="bv-mlab">Keys attention reads</span><b id="kvw-attn">—</b></div>'+
   '</div>'+
   '<div class="lm-note kvw-note" id="kvw-note" aria-live="polite"></div></div>';
  let mode="cache";
  const el=id=>host.querySelector("#"+id);
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  function compute(){
    const n=+el("kvw-step").value;
    el("kvw-stepv").textContent=n+" / "+tokens.length;
    host.querySelectorAll("[data-kvmode]").forEach(b=>{
      const selected=b.dataset.kvmode===mode;

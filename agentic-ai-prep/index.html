arch() / … plain functions, registered by schema the agent loop knows about tools. the pipeline doesn't. the tools don't know they're being called by a model. in an interview, this is the difference between \"i wired up the api\" and \"i designed the seam\" — the second one is what gets probed. what each tool costs every tool call is a full extra round-trip to the llm. more tokens, more latency, and the conversation history grows with every result you append — so late round-trips are more expensive than early ones. this is why the max-iterations guard from the-loop.md is also a cost control, not just a correctness control. → next: reliability-and-security.md","words":417},{"path":"12-tool-calling/reliability-and-security.md","title":"Reliability & Security","section":"1 · Tool Calling","quiz":false,"accent":"#2e9e6b","html":"<h1 id=\"reliability-and-security-where-the-real-work-is\">Reliability and Security: Where the Real Work Is<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> the API plumbing is easy. The hard part is the model emitting well-formed arguments that match your schema, every single time — and not trusting those arguments just because they parsed.<\/div><\/div>\n<h2 id=\"reliability-is-the-hard-part-not-wiring\">Reliability is the hard part, not wiring<\/h2>\n<p>The hard part is the model emitting well-formed arguments that match your JSON schema, every single time, even for oddly-phrased questions.<\/p>\n<p>Closed models are strong here. Open models often regress:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Failure<\/th><th>What it looks like<\/th><\/tr><\/thead><tbody><tr><td>Schema drift<\/td><td>Arguments that <em>almost<\/em> match — <code>\"query_text\"<\/code> instead of <code>\"query\"<\/code><\/td><\/tr><tr><td>Malformed JSON<\/td><td>Truncated braces, single quotes, trailing commentary<\/td><\/tr><tr><td>Wrong tool<\/td><td>Calling <code>web_search<\/code> when the answer needed <code>retrieve<\/code><\/td><\/tr><tr><td>Format collapse<\/td><td>The model narrates \"I would call retrieve...\" instead of emitting the structured call<\/td><\/tr><\/tbody><\/table><\/div>\n<p>How you close that gap is the single highest-signal topic for an inference/serving role. The fix path, in cost order:<\/p>\n<ol><li><strong>Prompting<\/strong> — few-shot examples of correct calls, tighter tool<\/li><\/ol>\n<p>descriptions. Cheapest; try first.<\/p>\n<ol><li><strong>Constrained decoding<\/strong> — Outlines/XGrammar force the output to be valid<\/li><\/ol>\n<p>JSON matching the schema, <em>structurally<\/em>, at the token level. The model    literally cannot emit an invalid character. No retraining.<\/p>\n<ol><li><strong>Fine-tuning<\/strong> on tool-call examples — last resort<\/li><\/ol>\n<p>(fine-tuning is covered in the separate RAG/LLM Prep site).<\/p>\n<p>This exact regression — swap closed model for open model, watch tool calls break, fix it, write up before/after success rate — is the roadmap's planned Auric-target project on the beast GPU.<\/p>\n<h2 id=\"the-metric-tool-call-success-rate\">The metric: tool-call success rate<\/h2>\n<p>Track it as its own metric, separate from answer quality. Did the model call the <em>right<\/em> tool? With <em>valid<\/em> arguments? In <em>one<\/em> try, not three? That metric is the one that breaks first when you swap models — answer quality can look fine on easy questions while tool-call validity has quietly dropped from 99% to 80%.<\/p>\n<p>Same eval-first discipline as retrieval: build the labeled task set <em>before<\/em> swapping models, or you'll have no baseline to measure the regression against.<\/p>\n<h2 id=\"security-surface\">Security surface<\/h2>\n<p>The model now chooses what code runs, and with what arguments. Any tool that touches the filesystem, a shell, or an external API needs its own validation. <strong>Never trust <code>response.tool_input<\/code> just because it matched a schema<\/strong> — a schema checks shape, not intent:<\/p>\n<ul><li><code>retrieve(query=\"...\")<\/code> is harmless at any argument value.<\/li><li><code>code_exec(source=\"...\")<\/code> is a remote-code-execution feature by design;<\/li><\/ul>\n<p>it needs sandboxing, not just schema validation.<\/p>\n<ul><li>Anything writing data needs an allowlist of what the model may touch.<\/li><\/ul>\n<p>And the arguments themselves can be attacker-influenced: a prompt-injected chunk can steer the model into calling a tool with hostile arguments. The full treatment of that attack surface is in the LLM security module in the separate RAG/LLM Prep site.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../13-mcp/README.md\" href=\"#\">13-mcp/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"reliability-is-the-hard-part-not-wiring","text":"Reliability is the hard part, not wiring"},{"level":2,"id":"the-metric-tool-call-success-rate","text":"The metric: tool-call success rate"},{"level":2,"id":"security-surface","text":"Security surface"}],"text":"reliability and security: where the real work is 💡 tl;dr the api plumbing is easy. the hard part is the model emitting well-formed arguments that match your schema, every single time — and not trusting those arguments just because they parsed. reliability is the hard part, not wiring the hard part is the model emitting well-formed arguments that match your json schema, every single time, even for oddly-phrased questions. closed models are strong here. open models often regress: failure what it looks like schema drift arguments that almost match — \"query_text\" instead of \"query\" malformed json truncated braces, single quotes, trailing commentary wrong tool calling web_search when the answer needed retrieve format collapse the model narrates \"i would call retrieve...\" instead of emitting the structured call how you close that gap is the single highest-signal topic for an inference/serving role. the fix path, in cost order: prompting — few-shot examples of correct calls, tighter tool descriptions. cheapest; try first. constrained decoding — outlines/xgrammar force the output to be valid json matching the schema, structurally , at the token level. the model literally cannot emit an invalid character. no retraining. fine-tuning on tool-call examples — last resort (fine-tuning is covered in the separate rag/llm prep site). this exact regression — swap closed model for open model, watch tool calls break, fix it, write up before/after success rate — is the roadmap's planned auric-target project on the beast gpu. the metric: tool-call success rate track it as its own metric, separate from answer quality. did the model call the right tool? with valid arguments? in one try, not three? that metric is the one that breaks first when you swap models — answer quality can look fine on easy questions while tool-call validity has quietly dropped from 99% to 80%. same eval-first discipline as retrieval: build the labeled task set before swapping models, or you'll have no baseline to measure the regression against. security surface the model now chooses what code runs, and with what arguments. any tool that touches the filesystem, a shell, or an external api needs its own validation. never trust response.tool_input just because it matched a schema — a schema checks shape, not intent: retrieve(query=\"...\") is harmless at any argument value. code_exec(source=\"...\") is a remote-code-execution feature by design; it needs sandboxing, not just schema validation. anything writing data needs an allowlist of what the model may touch. and the arguments themselves can be attacker-influenced: a prompt-injected chunk can steer the model into calling a tool with hostile arguments. the full treatment of that attack surface is in the llm security module in the separate rag/llm prep site. → next: 13-mcp/readme.md","words":442},{"path":"13-mcp/README.md","title":"Overview","section":"2 · MCP","quiz":false,"accent":"#5a7fd6","html":"<h1 id=\"2-mcp-a-usb-port-for-tools\">2: MCP: A USB Port for Tools<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 210\" role=\"img\" aria-label=\"MCP — standardize the plug, not the electricity\"><rect class=\"dg-box\" x=\"16\" y=\"20\" width=\"140\" height=\"44\" rx=\"12\"/><text class=\"dg-label\" x=\"86\" y=\"47\" text-anchor=\"middle\">LangGraph agent<\/text><line class=\"dg-line\" x1=\"156\" y1=\"42\" x2=\"290\" y2=\"100\"/><rect class=\"dg-box\" x=\"16\" y=\"78\" width=\"140\" height=\"44\" rx=\"12\"/><text class=\"dg-label\" x=\"86\" y=\"105\" text-anchor=\"middle\">CrewAI crew<\/text><line class=\"dg-line\" x1=\"156\" y1=\"100\" x2=\"290\" y2=\"100\"/><rect class=\"dg-box\" x=\"16\" y=\"136\" width=\"140\" height=\"44\" rx=\"12\"/><text class=\"dg-label\" x=\"86\" y=\"163\" text-anchor=\"middle\">Claude Desktop<\/text><line class=\"dg-line\" x1=\"156\" y1=\"158\" x2=\"290\" y2=\"100\"/><rect class=\"dg-box dg-hot\" x=\"290\" y=\"78\" width=\"140\" height=\"44\" rx=\"12\"/><text class=\"dg-label\" x=\"360\" y=\"98\" text-anchor=\"middle\">MCP<\/text><text class=\"dg-sub\" x=\"360\" y=\"115\" text-anchor=\"middle\">one protocol<\/text><rect class=\"dg-box\" x=\"564\" y=\"20\" width=\"150\" height=\"44\" rx=\"12\"/><text class=\"dg-label\" x=\"639\" y=\"47\" text-anchor=\"middle\">retrieve (DocsMind)<\/text><line class=\"dg-line\" x1=\"430\" y1=\"100\" x2=\"564\" y2=\"42\"/><rect class=\"dg-box\" x=\"564\" y=\"78\" width=\"150\" height=\"44\" rx=\"12\"/><text class=\"dg-label\" x=\"639\" y=\"105\" text-anchor=\"middle\">GitHub server<\/text><line class=\"dg-line\" x1=\"430\" y1=\"100\" x2=\"564\" y2=\"100\"/><rect class=\"dg-box\" x=\"564\" y=\"136\" width=\"150\" height=\"44\" rx=\"12\"/><text class=\"dg-label\" x=\"639\" y=\"163\" text-anchor=\"middle\">Slack server<\/text><line class=\"dg-line\" x1=\"430\" y1=\"100\" x2=\"564\" y2=\"158\"/><text class=\"dg-sub\" x=\"360\" y=\"196\" text-anchor=\"middle\">any client ↔ any server — no custom glue per pair<\/text><\/svg><figcaption>MCP — standardize the plug, not the electricity<\/figcaption><\/figure>\n<p><strong>The big idea:<\/strong> MCP doesn't give models a new capability — tool calling already lets them request functions. MCP standardizes the <em>packaging<\/em>: a server exposes tools over a common protocol, and any agent framework that speaks the protocol can use them. Same idea as USB — standardize the plug, not the electricity.<\/p>\n<p><strong>Where in the pipeline:<\/strong> the same seam as <a class=\"mdlink\" data-href=\"../12-tool-calling/README.md\" href=\"#\">12-tool-calling<\/a> — the model-asks-your-code-answers loop inside Generate. MCP doesn't change <em>what<\/em> happens at that seam. It changes <em>how the tool list gets there<\/em>, and <em>who maintains it<\/em>. Read the tool-calling section first; this one is a delta on top of it.<\/p>\n<pre><code>without MCP:  your app hardcodes a Python function + a hand-written JSON\n              schema for every tool, one at a time, per project.\n\nwith MCP:     your app ← (MCP client, one protocol) ← MCP server (retrieve,\n              web_search, github, slack, ...) — any MCP server plugs into any\n              MCP client, no custom glue per pair.<\/code><\/pre>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"why-a-protocol.md\" href=\"#\">why-a-protocol.md<\/a><\/td><td>The duplication problem MCP solves, the USB analogy, and why it caught on<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"docsmind-as-a-server.md\" href=\"#\">docsmind-as-a-server.md<\/a><\/td><td>Wrapping <code>HybridRetriever<\/code> as an MCP server — and why <em>not<\/em> to, yet<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: What is MCP, in one line?<\/strong> A standard protocol so any agent framework can use any tool server without custom integration glue. Same idea as USB: standardize the plug, not the electricity.<\/p>\n<p><strong>Q: How is it different from function/tool calling?<\/strong> Tool calling is the <em>mechanic<\/em> — model requests, code executes. MCP is the <em>packaging<\/em> around that mechanic: a shared schema and transport, so the tool-provider and the agent-builder don't have to be the same team.<\/p>\n<p>**Q: When would you <em>not<\/em> reach for it?** A single in-house tool with one consumer. Hand-write the schema, ship it. Don't add a protocol layer you don't need yet.<\/p>\n<p><strong>Q: What's the trust concern with third-party MCP servers?<\/strong> It's code you didn't write, executing with whatever permissions your client grants it. You're trusting the server's implementation, not just the model's request — the tool-argument caution from The LLM security guidance in the separate RAG/LLM Prep site applies doubly.<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/retrieval/retriever.py<\/code> — <code>HybridRetriever.retrieve()<\/code>, the capability that would be wrapped as a server.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../14-agent-architectures/README.md\" href=\"#\">14-agent-architectures/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"2: mcp: a usb port for tools langgraph agent crewai crew claude desktop mcp one protocol retrieve (docsmind) github server slack server any client ↔ any server — no custom glue per pair mcp — standardize the plug, not the electricity the big idea: mcp doesn't give models a new capability — tool calling already lets them request functions. mcp standardizes the packaging : a server exposes tools over a common protocol, and any agent framework that speaks the protocol can use them. same idea as usb — standardize the plug, not the electricity. where in the pipeline: the same seam as 12-tool-calling — the model-asks-your-code-answers loop inside generate. mcp doesn't change what happens at that seam. it changes how the tool list gets there , and who maintains it . read the tool-calling section first; this one is a delta on top of it. without mcp: your app hardcodes a python function + a hand-written json schema for every tool, one at a time, per project. with mcp: your app ← (mcp client, one protocol) ← mcp server (retrieve, web_search, github, slack, ...) — any mcp server plugs into any mcp client, no custom glue per pair. files in this folder file what it covers why-a-protocol.md the duplication problem mcp solves, the usb analogy, and why it caught on docsmind-as-a-server.md wrapping hybridretriever as an mcp server — and why not to, yet 🎯 interview q&a q: what is mcp, in one line? a standard protocol so any agent framework can use any tool server without custom integration glue. same idea as usb: standardize the plug, not the electricity. q: how is it different from function/tool calling? tool calling is the mechanic — model requests, code executes. mcp is the packaging around that mechanic: a shared schema and transport, so the tool-provider and the agent-builder don't have to be the same team. **q: when would you not reach for it?** a single in-house tool with one consumer. hand-write the schema, ship it. don't add a protocol layer you don't need yet. q: what's the trust concern with third-party mcp servers? it's code you didn't write, executing with whatever permissions your client grants it. you're trusting the server's implementation, not just the model's request — the tool-argument caution from the llm security guidance in the separate rag/llm prep site applies doubly. code docsmind/retrieval/retriever.py — hybridretriever.retrieve() , the capability that would be wrapped as a server. → next: 14-agent-architectures/readme.md","words":407},{"path":"13-mcp/why-a-protocol.md","title":"Why a Tool Protocol?","section":"2 · MCP","quiz":false,"accent":"#5a7fd6","html":"<h1 id=\"why-a-protocol-the-duplication-problem-mcp-solves\">Why a Protocol: The Duplication Problem MCP Solves<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> without a standard, every tool integration is bespoke glue, rewritten per project and unusable by anyone else's agent. MCP separates \"a tool exists and has a schema\" from \"an app wired it up.\"<\/div><\/div>\n<h2 id=\"the-problem-it-solves\">The problem it solves<\/h2>\n<p>Tool calling needs a schema for every function: name, description, JSON parameters. Without a standard, every tool integration is bespoke.<\/p>\n<p>You hand-write your <code>retrieve<\/code> schema. Someone else hand-writes their <code>send_email<\/code> schema. Each one lives inside whichever app wired it up. Build ten agent projects, and you write the same \"GitHub tool\" glue ten times. And nobody else's agent can reuse yours.<\/p>\n<div class=\"compare\">\n  <div class=\"cmp-col\">\n    <div class=\"cmp-h\">The N × M problem<\/div>\n    <p>Every agent hand-wires bespoke glue to every tool — <b>github glue<\/b>, <b>slack glue<\/b>, … for A, B, C.<\/p>\n    <span class=\"cmp-tag\">every pair hand-wired<\/span>\n  <\/div>\n  <div class=\"cmp-col green\">\n    <div class=\"cmp-h\">With a standard (MCP)<\/div>\n    <p>Every agent speaks <b>one protocol<\/b>; each tool is a server. Any client ↔ any server.<\/p>\n    <span class=\"cmp-tag\">N + M, not N × M<\/span>\n  <\/div>\n<\/div>\n<p><strong>MCP (Model Context Protocol)<\/strong> is Anthropic's open standard that fixes this. It separates \"a tool exists and has a schema\" from \"an app wired it up.\" A <strong>server<\/strong> exposes tools (and resources, and prompts) over a common protocol. A <strong>client<\/strong> — any agent framework, any app — speaks that protocol. Any client can use <em>any<\/em> server. No custom code per pair.<\/p>\n<p>Plain version: it's the shift USB made. Before USB, every peripheral needed its own custom cable. After USB: one port, one plug shape, and every device that follows the standard just works. MCP is that port, for tools.<\/p>\n<h2 id=\"why-its-gaining-popularity\">Why it's gaining popularity<\/h2>\n<p>Not because it adds a new capability. Underneath, it's still the same \"model requests, code executes\" loop from <a class=\"mdlink\" data-href=\"../12-tool-calling/the-loop.md\" href=\"#\">12-tool-calling<\/a>.<\/p>\n<p>It's popular because it <strong>decouples tool authors from agent authors<\/strong>. A company writes one MCP server for \"our internal ticketing system.\" Then every team's agent — LangGraph, CrewAI, a bespoke loop, whatever — can use it by speaking the protocol. Nobody writes a per-team integration against the ticketing API ever again.<\/p>\n<p>The interview trap hiding here: \"what is MCP\" answered with \"it lets LLMs call tools\" is wrong — tool calling already does that. MCP's contribution is standardizing the <em>distribution<\/em>, so tools are shareable across agent frameworks. Get the layer right and the rest of the answer writes itself.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"docsmind-as-a-server.md\" href=\"#\">docsmind-as-a-server.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-problem-it-solves","text":"The problem it solves"},{"level":2,"id":"why-its-gaining-popularity","text":"Why it's gaining popularity"}],"text":"why a protocol: the duplication problem mcp solves 💡 tl;dr without a standard, every tool integration is bespoke glue, rewritten per project and unusable by anyone else's agent. mcp separates \"a tool exists and has a schema\" from \"an app wired it up.\" the problem it solves tool calling needs a schema for every function: name, description, json parameters. without a standard, every tool integration is bespoke. you hand-write your retrieve schema. someone else hand-writes their send_email schema. each one lives inside whichever app wired it up. build ten agent projects, and you write the same \"github tool\" glue ten times. and nobody else's agent can reuse yours. the n × m problem every agent hand-wires bespoke glue to every tool — github glue , slack glue , … for a, b, c. every pair hand-wired with a standard (mcp) every agent speaks one protocol ; each tool is a server. any client ↔ any server. n + m, not n × m mcp (model context protocol) is anthropic's open standard that fixes this. it separates \"a tool exists and has a schema\" from \"an app wired it up.\" a server exposes tools (and resources, and prompts) over a common protocol. a client — any agent framework, any app — speaks that protocol. any client can use any server. no custom code per pair. plain version: it's the shift usb made. before usb, every peripheral needed its own custom cable. after usb: one port, one plug shape, and every device that follows the standard just works. mcp is that port, for tools. why it's gaining popularity not because it adds a new capability. underneath, it's still the same \"model requests, code executes\" loop from 12-tool-calling . it's popular because it decouples tool authors from agent authors . a company writes one mcp server for \"our internal ticketing system.\" then every team's agent — langgraph, crewai, a bespoke loop, whatever — can use it by speaking the protocol. nobody writes a per-team integration against the ticketing api ever again. the interview trap hiding here: \"what is mcp\" answered with \"it lets llms call tools\" is wrong — tool calling already does that. mcp's contribution is standardizing the distribution , so tools are shareable across agent frameworks. get the layer right and the rest of the answer writes itself. → next: docsmind-as-a-server.md","words":390},{"path":"13-mcp/docsmind-as-a-server.md","title":"Build an MCP Server","section":"2 · MCP","quiz":false,"accent":"#5a7fd6","html":"<h1 id=\"docsmind-as-an-mcp-server-and-why-not-yet\">DocsMind as an MCP Server: and Why Not Yet<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> DocsMind's <code>retrieve<\/code> could be exposed as an MCP server, hiding FAISS/BM25/RRF behind one schema. But with a single consumer, that's indirection with no payoff — MCP earns its keep at the <em>second<\/em> consumer.<\/div><\/div>\n<h2 id=\"where-it-would-slot-into-docsmind\">Where it would slot into DocsMind<\/h2>\n<p>DocsMind's own <code>retrieve<\/code> capability could become an MCP <strong>server<\/strong>. Concretely: wrap <code>HybridRetriever.retrieve()<\/code> in <code class=\"srcref\" title=\"source file in the repo\"><code>retriever.py<\/code><\/code> behind the protocol.<\/p>\n<p>Then <em>any<\/em> MCP-speaking agent — not just DocsMind's own LangGraph agent in <code>docsmind/agent/<\/code> — could call DocsMind's retrieval. It wouldn't need to know anything about FAISS, BM25, or RRF fusion underneath. That's the pitch: the retrieval internals stay hidden behind one schema, reusable outside this repo.<\/p>\n<div class=\"diagram\"><div class=\"vflow\">\n  <span class=\"node data\">any MCP client<span class=\"nsub\">Claude Desktop · another team's agent · an IDE…<\/span><\/span>\n  <span class=\"varw\" title=\"one protocol\"><\/span>\n  <span class=\"node\">MCP server: \"docsmind-retrieve\"<\/span>\n  <span class=\"varw\" title=\"ordinary function call\"><\/span>\n  <span class=\"node out\">HybridRetriever.retrieve()<span class=\"nsub\">FAISS + BM25 + RRF + rerank — invisible above<\/span><\/span>\n<\/div><\/div>\n<p>This is the same pattern the repo already uses twice: <code>VectorStore<\/code> hides FAISS-vs-Qdrant, <code>LLMClient<\/code> hides cloud-vs-local. MCP applies it one layer higher — hiding the whole retrieval stack behind a schema.<\/p>\n<h2 id=\"why-not-yet\">Why not yet<\/h2>\n<p>If Phase 5's agent needs <code>retrieve<\/code> as a tool, the fastest path is still the hand-written schema from <a class=\"mdlink\" data-href=\"../12-tool-calling/code-seam.md\" href=\"#\">12-tool-calling<\/a>.<\/p>\n<p>MCP earns its keep once there's a <em>second<\/em> consumer of the tool. Or a <em>third-party<\/em> tool (GitHub, Slack, a filesystem) whose schema you don't want to hand-write.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Situation<\/th><th>Right call<\/th><\/tr><\/thead><tbody><tr><td>One in-house tool, one consumer (DocsMind today)<\/td><td>Hand-written schema — a protocol layer is pure overhead<\/td><\/tr><tr><td>Same tool needed by 3 agents across 2 frameworks<\/td><td>MCP server — write the glue once<\/td><\/tr><tr><td>Consuming third-party tools (GitHub, Slack...)<\/td><td>MCP client — someone already wrote the server<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The validation question is countable: how many places would the same tool schema otherwise be duplicated? One consumer: marginal. Three: MCP wins.<\/p>\n<h2 id=\"the-trust-boundary\">The trust boundary<\/h2>\n<p>An MCP server run by someone else is code you didn't write, executing with whatever permissions your client grants it.<\/p>\n<p>The caution in the RAG/LLM Prep security module about not trusting tool arguments applies doubly here. With a hand-written tool, you trust the model's <em>request<\/em> but you wrote the <em>implementation<\/em>. With a third-party MCP server, you're trusting both — the request <em>and<\/em> an implementation you've never read. Treat server selection like dependency selection: pin versions, read what you can, grant minimal permissions.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../14-agent-architectures/README.md\" href=\"#\">14-agent-architectures/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"where-it-would-slot-into-docsmind","text":"Where it would slot into DocsMind"},{"level":2,"id":"why-not-yet","text":"Why not yet"},{"level":2,"id":"the-trust-boundary","text":"The trust boundary"}],"text":"docsmind as an mcp server: and why not yet 💡 tl;dr docsmind's retrieve could be exposed as an mcp server, hiding faiss/bm25/rrf behind one schema. but with a single consumer, that's indirection with no payoff — mcp earns its keep at the second consumer. where it would slot into docsmind docsmind's own retrieve capability could become an mcp server . concretely: wrap hybridretriever.retrieve() in retriever.py behind the protocol. then any mcp-speaking agent — not just docsmind's own langgraph agent in docsmind/agent/ — could call docsmind's retrieval. it wouldn't need to know anything about faiss, bm25, or rrf fusion underneath. that's the pitch: the retrieval internals stay hidden behind one schema, reusable outside this repo. any mcp client claude desktop · another team's agent · an ide… mcp server: \"docsmind-retrieve\" hybridretriever.retrieve() faiss + bm25 + rrf + rerank — invisible above this is the same pattern the repo already uses twice: vectorstore hides faiss-vs-qdrant, llmclient hides cloud-vs-local. mcp applies it one layer higher — hiding the whole retrieval stack behind a schema. why not yet if phase 5's agent needs retrieve as a tool, the fastest path is still the hand-written schema from 12-tool-calling . mcp earns its keep once there's a second consumer of the tool. or a third-party tool (github, slack, a filesystem) whose schema you don't want to hand-write. situation right call one in-house tool, one consumer (docsmind today) hand-written schema — a protocol layer is pure overhead same tool needed by 3 agents across 2 frameworks mcp server — write the glue once consuming third-party tools (github, slack...) mcp client — someone already wrote the server the validation question is countable: how many places would the same tool schema otherwise be duplicated? one consumer: marginal. three: mcp wins. the trust boundary an mcp server run by someone else is code you didn't write, executing with whatever permissions your client grants it. the caution in the rag/llm prep security module about not trusting tool arguments applies doubly here. with a hand-written tool, you trust the model's request but you wrote the implementation . with a third-party mcp server, you're trusting both — the request and an implementation you've never read. treat server selection like dependency selection: pin versions, read what you can, grant minimal permissions. → next: 14-agent-architectures/readme.md","words":380},{"path":"14-agent-architectures/README.md","title":"Overview","section":"3 · Agent Architectures","quiz":false,"accent":"#c25a8a","html":"<h1 id=\"3-agent-architectures-one-loop-vs-many\">3: Agent Architectures: One Loop vs Many<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 214\" role=\"img\" aria-label=\"Supervisor pattern — one router, specialist sub-agents, one audit trail\"><rect class=\"dg-box dg-hot\" x=\"285\" y=\"18\" width=\"150\" height=\"48\" rx=\"12\"/><text class=\"dg-label\" x=\"360\" y=\"40\" text-anchor=\"middle\">Supervisor<\/text><text class=\"dg-sub\" x=\"360\" y=\"57\" text-anchor=\"middle\">routes only<\/text><rect class=\"dg-box\" x=\"60\" y=\"120\" width=\"150\" height=\"48\" rx=\"12\"/><text class=\"dg-label\" x=\"135\" y=\"142\" text-anchor=\"middle\">Agent A<\/text><text class=\"dg-sub\" x=\"135\" y=\"159\" text-anchor=\"middle\">own tools + prompt<\/text><line class=\"dg-line\" x1=\"135\" y1=\"66\" x2=\"135\" y2=\"113\"/><polygon class=\"dg-arrow\" points=\"130,113 135,120 140,113\"/><rect class=\"dg-box\" x=\"285\" y=\"120\" width=\"150\" height=\"48\" rx=\"12\"/><text class=\"dg-label\" x=\"360\" y=\"142\" text-anchor=\"middle\">Agent B<\/text><text class=\"dg-sub\" x=\"360\" y=\"159\" text-anchor=\"middle\">own tools + prompt<\/text><line class=\"dg-line\" x1=\"360\" y1=\"66\" x2=\"360\" y2=\"113\"/><polygon class=\"dg-arrow\" points=\"355,113 360,120 365,113\"/><rect class=\"dg-box\" x=\"510\" y=\"120\" width=\"150\" height=\"48\" rx=\"12\"/><text class=\"dg-label\" x=\"585\" y=\"142\" text-anchor=\"middle\">Agent C<\/text><text class=\"dg-sub\" x=\"585\" y=\"159\" text-anchor=\"middle\">own tools + prompt<\/text><line class=\"dg-line\" x1=\"585\" y1=\"66\" x2=\"585\" y2=\"113\"/><polygon class=\"dg-arrow\" points=\"580,113 585,120 590,113\"/><line class=\"dg-line\" x1=\"360\" y1=\"66\" x2=\"135\" y2=\"86\" opacity=\"0\"/><text class=\"dg-sub\" x=\"360\" y=\"200\" text-anchor=\"middle\">sub-agents report back up — one place decisions get made and logged<\/text><\/svg><figcaption>Supervisor pattern — one router, specialist sub-agents, one audit trail<\/figcaption><\/figure>\n<p><strong>The big idea:<\/strong> two separate questions hide inside \"agent architecture\": which <strong>framework<\/strong> builds the loop, and whether the loop is <strong>one agent or several<\/strong>. Keep them separate — interviewers mix them on purpose to see if you will too. DocsMind's answer: LangGraph, single agent, explicit tools.<\/p>\n<p><strong>Where in the pipeline:<\/strong> wraps <em>around<\/em> the whole Retrieve → Generate → Cite path, not inside it. Today, <code>RAGPipeline.query()<\/code> is the entire \"agent\": one retrieve, one generate, no decisions. This section is about what replaces that single function once Phase 5 adds a planning loop.<\/p>\n<div class=\"diagram\"><div class=\"vflow\" style=\"align-items:stretch;gap:12px\">\n  <div class=\"flow\"><span class=\"flow-lbl\">today · Phase 1–3<\/span><span class=\"node data\">question<\/span><span class=\"arw\"><\/span><span class=\"node\">retrieve<\/span><span class=\"arw\"><\/span><span class=\"node\">generate<\/span><span class=\"arw\"><\/span><span class=\"node out\">answer<\/span><span class=\"flow-lbl\">no loop<\/span><\/div>\n  <div class=\"flow\"><span class=\"flow-lbl\">single agent · Phase 5<\/span><span class=\"node data\">question<\/span><span class=\"arw\"><\/span><span class=\"node soft\">plan → tool? → observe → plan → …<\/span><span class=\"arw\"><\/span><span class=\"node out\">answer<\/span><span class=\"flow-lbl\">one LLM, one loop — DocsMind's target<\/span><\/div>\n  <div class=\"flow\"><span class=\"flow-lbl\">multi-agent<\/span><span class=\"node data\">question<\/span><span class=\"arw\"><\/span><span class=\"node\">supervisor<\/span><span class=\"arw\"><\/span><span class=\"node soft\">routes to sub-agent(s)<\/span><span class=\"arw\"><\/span><span class=\"node\">merge<\/span><span class=\"arw\"><\/span><span class=\"node out\">answer<\/span><\/div>\n<\/div><\/div>\n<h2 id=\"files-in-this-folder\">Files in this folder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>File<\/th><th>What it covers<\/th><\/tr><\/thead><tbody><tr><td><a class=\"mdlink\" data-href=\"framework-comparison.md\" href=\"#\">framework-comparison.md<\/a><\/td><td>LlamaIndex vs LangChain vs LangGraph vs CrewAI — different layers, not competitors<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"patterns.md\" href=\"#\">patterns.md<\/a><\/td><td>Single agent vs peer multi-agent vs supervisor — who's in charge, and what that costs<\/td><\/tr><tr><td><a class=\"mdlink\" data-href=\"docsmind-choice.md\" href=\"#\">docsmind-choice.md<\/a><\/td><td>Why <code>docsmind/agent/<\/code> is a single LangGraph loop, and what would change that call<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-qa\">🎯 Interview Q&amp;A<\/h2>\n<p><strong>Q: When do you reach for multi-agent instead of one agent with tools?<\/strong> When you have genuinely distinct roles that would otherwise collapse into one overloaded prompt. Not by default. Not because it sounds more sophisticated.<\/p>\n<p><strong>Q: What does a supervisor buy you over peer agents talking directly?<\/strong> One place where decisions get made and logged. It buys debuggability, not raw capability.<\/p>\n<p><strong>Q: Why LangGraph over CrewAI for DocsMind specifically?<\/strong> DocsMind is one agent, one loop, explicit tools. LangGraph's job — model a loop as a graph with state — fits exactly. CrewAI's pre-built multi-role scaffolding solves a problem DocsMind doesn't have yet.<\/p>\n<p><strong>Q: How would you validate single- vs multi-agent for a task?<\/strong> An end-to-end eval, run against both shapes on the same task set. If multi-agent doesn't measurably beat a single well-scoped agent, the extra complexity isn't earning its cost.<\/p>\n<h2 id=\"code\">Code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\">docsmind/agent/\\_\\_init\\_\\_.py<\/code> — the placeholder docstring describing the planned single-agent LangGraph loop.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../22-langgraph/README.md\" href=\"#\">LangGraph Hands-On<\/a><\/strong><\/p>","toc":[{"level":2,"id":"files-in-this-folder","text":"Files in this folder"},{"level":2,"id":"interview-qa","text":"🎯 Interview Q&amp;A"},{"level":2,"id":"code","text":"Code"}],"text":"3: agent architectures: one loop vs many supervisor routes only agent a own tools + prompt agent b own tools + prompt agent c own tools + prompt sub-agents report back up — one place decisions get made and logged supervisor pattern — one router, specialist sub-agents, one audit trail the big idea: two separate questions hide inside \"agent architecture\": which framework builds the loop, and whether the loop is one agent or several . keep them separate — interviewers mix them on purpose to see if you will too. docsmind's answer: langgraph, single agent, explicit tools. where in the pipeline: wraps around the whole retrieve → generate → cite path, not inside it. today, ragpipeline.query() is the entire \"agent\": one retrieve, one generate, no decisions. this section is about what replaces that single function once phase 5 adds a planning loop. today · phase 1–3 question retrieve generate answer no loop single agent · phase 5 question plan → tool? → observe → plan → … answer one llm, one loop — docsmind's target multi-agent question supervisor routes to sub-agent(s) merge answer files in this folder file what it covers framework-comparison.md llamaindex vs langchain vs langgraph vs crewai — different layers, not competitors patterns.md single agent vs peer multi-agent vs supervisor — who's in charge, and what that costs docsmind-choice.md why docsmind/agent/ is a single langgraph loop, and what would change that call 🎯 interview q&a q: when do you reach for multi-agent instead of one agent with tools? when you have genuinely distinct roles that would otherwise collapse into one overloaded prompt. not by default. not because it sounds more sophisticated. q: what does a supervisor buy you over peer agents talking directly? one place where decisions get made and logged. it buys debuggability, not raw capability. q: why langgraph over crewai for docsmind specifically? docsmind is one agent, one loop, explicit tools. langgraph's job — model a loop as a graph with state — fits exactly. crewai's pre-built multi-role scaffolding solves a problem docsmind doesn't have yet. q: how would you validate single- vs multi-agent for a task? an end-to-end eval, run against both shapes on the same task set. if multi-agent doesn't measurably beat a single well-scoped agent, the extra complexity isn't earning its cost. code docsmind/agent/\\_\\_init\\_\\_.py — the placeholder docstring describing the planned single-agent langgraph loop. → next: langgraph hands-on","words":395},{"path":"14-agent-architectures/framework-comparison.md","title":"Framework Comparison","section":"3 · Agent Architectures","quiz":false,"accent":"#c25a8a","html":"<h1 id=\"framework-comparison-four-tools-four-different-layers\">Framework Comparison: Four Tools, Four Different Layers<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> LlamaIndex, LangChain, LangGraph, and CrewAI solve different layers of the stack. Comparing them head-to-head is a category error — and interviewers use it to check whether you understand the stack or just the brand names.<\/div><\/div>\n<h2 id=\"what-each-one-actually-is\">What each one actually is<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Framework<\/th><th>What it actually is<\/th><th>Where DocsMind uses it<\/th><\/tr><\/thead><tbody><tr><td><strong>LlamaIndex<\/strong><\/td><td>Ingestion/indexing toolkit — loaders, chunkers, index abstractions<\/td><td><code>docsmind/ingestion/<\/code> (<code>SimpleDirectoryReader<\/code>, <code>SentenceSplitter<\/code>)<\/td><\/tr><tr><td><strong>LangChain<\/strong><\/td><td>General-purpose LLM app toolkit — prompt templates, chains, many integrations<\/td><td>Not used; DocsMind calls the Anthropic SDK directly; the RAG/LLM Prep site explains why<\/td><\/tr><tr><td><strong>LangGraph<\/strong><\/td><td>A <em>graph<\/em> execution engine for stateful, cyclic control flow — the loop itself<\/td><td><code>docsmind/agent/<\/code> — this is the loop-builder for Phase 5<\/td><\/tr><tr><td><strong>CrewAI<\/strong><\/td><td>A multi-agent framework — pre-built \"roles,\" a \"crew\" of agents delegating tasks<\/td><td>Not used; relevant only if the multi-agent pattern is chosen<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The one-line version for an interview:<\/p>\n<ul><li>LlamaIndex answers \"how do I get documents into an index.\"<\/li><li>LangChain answers \"how do I compose LLM calls and integrations quickly.\"<\/li><li>LangGraph answers \"how do I model a loop or branching decision as an<\/li><\/ul>\n<p>explicit graph with state.\"<\/p>\n<ul><li>CrewAI answers \"how do I get several role-playing agents cooperating out<\/li><\/ul>\n<p>of the box.\"<\/p>\n<h2 id=\"where-each-sits-in-the-pipeline\">Where each sits in the pipeline<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">Ingest<\/span><span class=\"arw tiny\"><\/span><span class=\"node\">Chunk<\/span><span class=\"arw tiny\"><\/span><span class=\"node\">Embed<\/span><span class=\"arw tiny\"><\/span><span class=\"node\">Index<\/span>\n    <span class=\"arw tiny\"><\/span><span class=\"node soft\">Search<\/span><span class=\"arw tiny\"><\/span><span class=\"node soft\">Generate<\/span><span class=\"arw tiny\"><\/span><span class=\"node out\">Cite<\/span>\n  <\/div>\n  <div class=\"flow-foot\"><b>LlamaIndex<\/b> owns ingest→index · <b>LangChain<\/b> helps search→cite · <b>LangGraph<\/b> (one loop) / <b>CrewAI<\/b> (many agents) wrap the whole thing in a loop.<\/div>\n<\/div>\n<p>They're not four answers to one question — they're answers to four questions. A project can sensibly use two of them at once (DocsMind: LlamaIndex + LangGraph) and skip the other two <em>for stated reasons<\/em>, which is exactly the depth an interviewer is fishing for.<\/p>\n<h2 id=\"why-docsmind-picked-its-two\">Why DocsMind picked its two<\/h2>\n<p><strong>LlamaIndex for ingestion:<\/strong> loaders and chunkers are solved problems; reimplementing <code>SentenceSplitter<\/code> teaches nothing and risks subtle bugs.<\/p>\n<p><strong>LangGraph for the coming agent:<\/strong> the Phase 5 loop needs explicit, inspectable state — which node ran, what the model decided, where it went next. LangGraph makes the control flow a <em>visible graph<\/em> instead of code hidden inside a framework's agent class. When (not if) the loop misbehaves, that visibility is the difference between reading a trace and guessing.<\/p>\n<p><strong>Not LangChain:<\/strong> DocsMind's LLM usage is one well-understood call pattern. A direct SDK call is fewer layers to debug, and the repo <em>is<\/em> the abstraction lesson — hiding it behind a chain would defeat the point.<\/p>\n<p><strong>Not CrewAI:<\/strong> no multi-agent problem exists here yet — see <a class=\"mdlink\" data-href=\"patterns.md\" href=\"#\">patterns.md<\/a> for when that changes.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"patterns.md\" href=\"#\">patterns.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-each-one-actually-is","text":"What each one actually is"},{"level":2,"id":"where-each-sits-in-the-pipeline","text":"Where each sits in the pipeline"},{"level":2,"id":"why-docsmind-picked-its-two","text":"Why DocsMind picked its two"}],"text":"framework comparison: four tools, four different layers 💡 tl;dr llamaindex, langchain, langgraph, and crewai solve different layers of the stack. comparing them head-to-head is a category error — and interviewers use it to check whether you understand the stack or just the brand names. what each one actually is framework what it actually is where docsmind uses it llamaindex ingestion/indexing toolkit — loaders, chunkers, index abstractions docsmind/ingestion/ ( simpledirectoryreader , sentencesplitter ) langchain general-purpose llm app toolkit — prompt templates, chains, many integrations not used; docsmind calls the anthropic sdk directly; the rag/llm prep site explains why langgraph a graph execution engine for stateful, cyclic control flow — the loop itself docsmind/agent/ — this is the loop-builder for phase 5 crewai a multi-agent framework — pre-built \"roles,\" a \"crew\" of agents delegating tasks not used; relevant only if the multi-agent pattern is chosen the one-line version for an interview: llamaindex answers \"how do i get documents into an index.\" langchain answers \"how do i compose llm calls and integrations quickly.\" langgraph answers \"how do i model a loop or branching decision as an explicit graph with state.\" crewai answers \"how do i get several role-playing agents cooperating out of the box.\" where each sits in the pipeline ingest chunk embed index search generate cite llamaindex owns ingest→index · langchain helps search→cite · langgraph (one loop) / crewai (many agents) wrap the whole thing in a loop. they're not four answers to one question — they're answers to four questions. a project can sensibly use two of them at once (docsmind: llamaindex + langgraph) and skip the other two for stated reasons , which is exactly the depth an interviewer is fishing for. why docsmind picked its two llamaindex for ingestion: loaders and chunkers are solved problems; reimplementing sentencesplitter teaches nothing and risks subtle bugs. langgraph for the coming agent: the phase 5 loop needs explicit, inspectable state — which node ran, what the model decided, where it went next. langgraph makes the control flow a visible graph instead of code hidden inside a framework's agent class. when (not if) the loop misbehaves, that visibility is the difference between reading a trace and guessing. not langchain: docsmind's llm usage is one well-understood call pattern. a direct sdk call is fewer layers to debug, and the repo is the abstraction lesson — hiding it behind a chain would defeat the point. not crewai: no multi-agent problem exists here yet — see patterns.md for when that changes. → next: patterns.md","words":417},{"path":"14-agent-architectures/patterns.md","title":"Single, Multi-Agent & Supervisor","section":"3 · Agent Architectures","quiz":false,"accent":"#c25a8a","html":"<h1 id=\"patterns-single-agent-vs-multi-agent-vs-supervisor\">Patterns: Single Agent vs Multi-Agent vs Supervisor<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> all three live at the same place: the loop that wraps the pipeline. The difference is how many LLM loops exist, and who decides what happens next.<\/div><\/div>\n<h2 id=\"the-three-shapes\">The three shapes<\/h2>\n<p><strong>Single agent.<\/strong> One LLM, one loop, a set of tools (see <a class=\"mdlink\" data-href=\"../12-tool-calling/README.md\" href=\"#\">12-tool-calling<\/a>). It plans, calls a tool, sees the result, and decides again — until it answers. This is what <code>docsmind/agent/<\/code> is a stub for.<\/p>\n<p><strong>Multi-agent (peer).<\/strong> Several agents, each with a narrower toolset and prompt, passing messages to each other directly. Nothing is globally in charge. That makes failure loops easy to create — two agents endlessly deferring to each other — and hard to debug.<\/p>\n<p><strong>Supervisor-agent.<\/strong> One \"supervisor\" LLM whose only job is <em>routing<\/em>: decide which specialist sub-agent (or tool) handles this step. Every sub-agent reports back to the supervisor, never to each other directly. Most production multi-agent systems converge on this pattern. Why: one point of control, one place to look when something goes wrong.<\/p>\n<div class=\"diagram\"><div class=\"vflow\" style=\"align-items:stretch;gap:14px\">\n  <div class=\"flow\"><span class=\"flow-lbl\">single<\/span><span class=\"node\">agent<\/span><span class=\"arw labeled\"><span class=\"al\">uses<\/span><\/span><span class=\"node soft\">tools<\/span><\/div>\n  <div class=\"flow\"><span class=\"flow-lbl\">peer<\/span><span class=\"node\">agent A<\/span><span class=\"arw tiny\"><\/span><span class=\"node\">agent B<\/span><span class=\"arw tiny\"><\/span><span class=\"node\">agent C<\/span><span class=\"flow-lbl\">no one in charge<\/span><\/div>\n  <div class=\"branch\"><span class=\"flow-lbl\">supervisor<\/span><span class=\"node\">supervisor<\/span><span class=\"split-arw\"><\/span><div class=\"fork\"><span class=\"node soft\">agent A<\/span><span class=\"node soft\">agent B<\/span><span class=\"node soft\">agent C<\/span><\/div><span class=\"flow-lbl\">all report back up<\/span><\/div>\n<\/div><\/div>\n<p>Plain version: a single agent is one person doing the research, writing, and fact-checking themself, switching hats. A peer multi-agent system is three people passing a document around with no editor. A supervisor system is the same three people, plus an editor who decides who works next and reviews what comes back.<\/p>\n<h2 id=\"what-each-shape-costs\">What each shape costs<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Single<\/th><th>Peer multi-agent<\/th><th>Supervisor<\/th><\/tr><\/thead><tbody><tr><td>LLM loops running<\/td><td>1<\/td><td>N<\/td><td>N + 1<\/td><\/tr><tr><td>Where to look when it breaks<\/td><td>one trace<\/td><td>anywhere — A's call? B's reading of A?<\/td><td>the supervisor's routing log first<\/td><\/tr><tr><td>Coordination overhead<\/td><td>none<\/td><td>every hop is an LLM reinterpreting an LLM<\/td><td>every hop, plus routing calls<\/td><\/tr><tr><td>Failure loop risk<\/td><td>low (one max-iterations guard)<\/td><td>high — two agents deferring forever<\/td><td>contained — supervisor caps the routing<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Multi-agent's real cost is coordination, not compute.<\/strong> Every hop between agents is a full LLM call reinterpreting another LLM's output in natural language. That's a lossy channel. Each extra agent is a place meaning can drift.<\/p>\n<p><strong>Single agent is easier to debug.<\/strong> One trace, one loop, one place to look when the answer is wrong. Multi-agent multiplies the hiding places.<\/p>\n<h2 id=\"when-multi-agent-actually-wins\">When multi-agent actually wins<\/h2>\n<p>Genuinely distinct specialties, with different tools, prompts, or context windows. The tell: a single agent's system prompt turning into an unmanageable pile of \"if this kind of question, act like X; if that kind, act like Y.\" When the prompt is a disguised router, promote it to a real supervisor.<\/p>\n<p>Reaching for multi-agent before you have more than one distinct role is adding graph complexity with no matching problem.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"docsmind-choice.md\" href=\"#\">docsmind-choice.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-three-shapes","text":"The three shapes"},{"level":2,"id":"what-each-shape-costs","text":"What each shape costs"},{"level":2,"id":"when-multi-agent-actually-wins","text":"When multi-agent actually wins"}],"text":"patterns: single agent vs multi-agent vs supervisor 💡 tl;dr all three live at the same place: the loop that wraps the pipeline. the difference is how many llm loops exist, and who decides what happens next. the three shapes single agent. one llm, one loop, a set of tools (see 12-tool-calling ). it plans, calls a tool, sees the result, and decides again — until it answers. this is what docsmind/agent/ is a stub for. multi-agent (peer). several agents, each with a narrower toolset and prompt, passing messages to each other directly. nothing is globally in charge. that makes failure loops easy to create — two agents endlessly deferring to each other — and hard to debug. supervisor-agent. one \"supervisor\" llm whose only job is routing : decide which specialist sub-agent (or tool) handles this step. every sub-agent reports back to the supervisor, never to each other directly. most production multi-agent systems converge on this pattern. why: one point of control, one place to look when something goes wrong. single agent uses tools peer agent a agent b agent c no one in charge supervisor supervisor agent a agent b agent c all report back up plain version: a single agent is one person doing the research, writing, and fact-checking themself, switching hats. a peer multi-agent system is three people passing a document around with no editor. a supervisor system is the same three people, plus an editor who decides who works next and reviews what comes back. what each shape costs single peer multi-agent supervisor llm loops running 1 n n + 1 where to look when it breaks one trace anywhere — a's call? b's reading of a? the supervisor's routing log first coordination overhead none every hop is an llm reinterpreting an llm every hop, plus routing calls failure loop risk low (one max-iterations guard) high — two agents deferring forever contained — supervisor caps the routing multi-agent's real cost is coordination, not compute. every hop between agents is a full llm call reinterpreting another llm's output in natural language. that's a lossy channel. each extra agent is a place meaning can drift. single agent is easier to debug. one trace, one loop, one place to look when the answer is wrong. multi-agent multiplies the hiding places. when multi-agent actually wins genuinely distinct specialties, with different tools, prompts, or context windows. the tell: a single agent's system prompt turning into an unmanageable pile of \"if this kind of question, act like x; if that kind, act like y.\" when the prompt is a disguised router, promote it to a real supervisor. reaching for multi-agent before you have more than one distinct role is adding graph complexity with no matching problem. → next: docsmind-choice.md","words":456},{"path":"14-agent-architectures/docsmind-choice.md","title":"Choosing an Architecture","section":"3 · Agent Architectures","quiz":false,"accent":"#c25a8a","html":"<h1 id=\"docsminds-choice-one-langgraph-loop-and-what-would-change-that\">DocsMind's Choice: One LangGraph Loop, and What Would Change That<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <code>docsmind/agent/<\/code> is planned as a single-agent LangGraph loop with explicit tools. For \"answer questions from one corpus, with citations,\" there's one job — not several specialist roles needing a supervisor.<\/div><\/div>\n<h2 id=\"where-it-slots-into-the-real-code\">Where it slots into the real code<\/h2>\n<p><code class=\"srcref\" title=\"source file in the repo\"><code>docsmind/agent/__init__.py<\/code><\/code> is today just a docstring:<\/p>\n<blockquote><p><em>\"Placeholder for the LangGraph agent: planning loop with retrieve / web_search / code_exec / cite tools and anti-hallucination guardrails.\"<\/em><\/p><\/blockquote>\n<p>That's a <strong>single-agent<\/strong> design. One LangGraph loop, several tools, no sub-agents:<\/p>\n<div class=\"diagram\">\n  <div class=\"loopwrap\"><span class=\"loop-top\">LangGraph state<\/span>\n    <div class=\"flow\"><span class=\"node data\">question<\/span><span class=\"arw\"><\/span><span class=\"node\">plan<\/span><span class=\"arw labeled\"><span class=\"al\">tool? yes<\/span><\/span><span class=\"node soft\">run tool<span class=\"nsub\">retrieve / web_search / code_exec<\/span><\/span><span class=\"arw labeled\"><span class=\"al\">observe<\/span><\/span><\/div>\n    <span class=\"loop-back\"><span class=\"lb-arw\"><\/span> observation loops back into <b>plan<\/b><\/span>\n  <\/div>\n  <div class=\"flow\" style=\"margin-top:10px\"><span class=\"flow-lbl\">when no more tools:<\/span><span class=\"node\">cite<\/span><span class=\"arw\"><\/span><span class=\"node\">guardrail check<\/span><span class=\"arw\"><\/span><span class=\"node out\">answer<\/span><\/div>\n<\/div>\n<p>Each box is a graph node; the state (messages so far, retrieved chunks, iteration count) flows along the edges. The loop's max-iterations guard from <a class=\"mdlink\" data-href=\"../12-tool-calling/the-loop.md\" href=\"#\">12-tool-calling/the-loop.md<\/a> becomes a simple edge condition.<\/p>\n<h2 id=\"why-single-agent-is-the-right-call-here\">Why single-agent is the right call here<\/h2>\n<p>For DocsMind's actual problem — answer questions from one document corpus, with citations — there's one job. Not several specialist roles that need a supervisor splitting work. The tools differ (<code>retrieve<\/code> vs <code>web_search<\/code>), but the <em>role<\/em> using them is the same researcher.<\/p>\n<p>The choice also compounds with the learning goal: a single explicit graph is a thing you can trace node by node and explain in an interview. A crew of role-playing agents is a demo that resists explanation.<\/p>\n<h2 id=\"when-would-that-change\">When would that change?<\/h2>\n<p>If DocsMind later added a separate \"web search agent\" and a \"code-execution agent,\" with genuinely different tool access and prompting needs — <em>then<\/em> a supervisor would earn its complexity. The tell from <a class=\"mdlink\" data-href=\"patterns.md\" href=\"#\">patterns.md<\/a>: the single agent's system prompt turning into a disguised router.<\/p>\n<h2 id=\"how-youd-validate-the-choice\">How you'd validate the choice<\/h2>\n<p>An end-to-end eval, run against both shapes on the same task set — the same discipline as Phase 3's retrieval eval and Phase 6's answer eval:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Metric<\/th><th>Single agent<\/th><th>Multi-agent<\/th><\/tr><\/thead><tbody><tr><td>Task success rate<\/td><td>baseline<\/td><td>must beat it, not tie it<\/td><\/tr><tr><td>Tokens per task<\/td><td>fewer (no coordination hops)<\/td><td>more — every hop is an LLM call<\/td><\/tr><tr><td>Latency per task<\/td><td>lower<\/td><td>higher, and more variable<\/td><\/tr><tr><td>Debuggability<\/td><td>one trace<\/td><td>traces × agents<\/td><\/tr><\/tbody><\/table><\/div>\n<p>If multi-agent doesn't measurably beat a single well-scoped agent, the extra complexity isn't earning its cost. In an interview, having <em>run<\/em> that comparison — even on a toy task set — beats any amount of architecture vocabulary.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"../22-langgraph/README.md\" href=\"#\">LangGraph Hands-On<\/a><\/strong><\/p>","toc":[{"level":2,"id":"where-it-slots-into-the-real-code","text":"Where it slots into the real code"},{"level":2,"id":"why-single-agent-is-the-right-call-here","text":"Why single-agent is the right call here"},{"level":2,"id":"when-would-that-change","text":"When would that change?"},{"level":2,"id":"how-youd-validate-the-choice","text":"How you'd validate the choice"}],"text":"docsmind's choice: one langgraph loop, and what would change that 💡 tl;dr docsmind/agent/ is planned as a single-agent langgraph loop with explicit tools. for \"answer questions from one corpus, with citations,\" there's one job — not several specialist roles needing a supervisor. where it slots into the real code docsmind/agent/__init__.py is today just a docstring: \"placeholder for the langgraph agent: planning loop with retrieve / web_search / code_exec / cite tools and anti-hallucination guardrails.\" that's a single-agent design. one langgraph loop, several tools, no sub-agents: langgraph state question plan tool? yes run tool retrieve / web_search / code_exec observe observation loops back into plan when no more tools: cite guardrail check answer each box is a graph node; the state (messages so far, retrieved chunks, iteration count) flows along the edges. the loop's max-iterations guard from 12-tool-calling/the-loop.md becomes a simple edge condition. why single-agent is the right call here for docsmind's actual problem — answer questions from one document corpus, with citations — there's one job. not several specialist roles that need a supervisor splitting work. the tools differ ( retrieve vs web_search ), but the role using them is the same researcher. the choice also compounds with the learning goal: a single explicit graph is a thing you can trace node by node and explain in an interview. a crew of role-playing agents is a demo that resists explanation. when would that change? if docsmind later added a separate \"web search agent\" and a \"code-execution agent,\" with genuinely different tool access and prompting needs — then a supervisor would earn its complexity. the tell from patterns.md : the single agent's system prompt turning into a disguised router. how you'd validate the choice an end-to-end eval, run against both shapes on the same task set — the same discipline as phase 3's retrieval eval and phase 6's answer eval: metric single agent multi-agent task success rate baseline must beat it, not tie it tokens per task fewer (no coordination hops) more — every hop is an llm call latency per task lower higher, and more variable debuggability one trace traces × agents if multi-agent doesn't measurably beat a single well-scoped agent, the extra complexity isn't earning its cost. in an interview, having run that comparison — even on a toy task set — beats any amount of architecture vocabulary. → next: langgraph hands-on","words":393},{"path":"14-agent-architectures/interview-questions.md","title":"Interview Questions","section":"3 · Agent Architectures","quiz":true,"accent":"#c25a8a","html":"<h1 id=\"agent-architectures-interview-questions\">Agent Architectures: Interview Questions<\/h1>\n<details class=\"qa\" open><summary>Q: How does Agentic AI differ from a traditional workflow?<\/summary><div class=\"qa-body\"><p>A traditional workflow has the control flow fixed in code: step 1 → step 2 → step 3, with the branches written by you ahead of time. An agent moves that decision <em>into the model<\/em>. The LLM sits in a loop — it plans, calls a tool, sees the result, and decides what to do next — until it decides it's done.<\/p>\n<p>The dividing line is <strong>who chooses the next step<\/strong>. In a workflow, the developer chose it at write time. In an agent, the model chooses it at run time. That's the whole difference, and it's also the whole trade: an agent handles cases you didn't enumerate, but the control flow is now non-deterministic and has to be bounded (a max-iterations guard) so it can't loop forever.<\/p>\n<p>A useful tell: if you can draw the full flowchart before any request arrives, it's a workflow. If the path depends on what the model decides mid-run, it's an agent.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Single agent vs multi-agent vs supervisor: what's the difference and when do you use each?<\/summary><div class=\"qa-body\"><p>All three live at the same place: the loop wrapping the pipeline. The difference is how many LLM loops exist and who decides what runs next.<\/p>\n<ul><li><strong>Single agent<\/strong> — one LLM, one loop, a set of tools. It switches \"hats\"<\/li><\/ul>\n<p>itself. One trace to read when it breaks.<\/p>\n<ul><li><strong>Peer multi-agent<\/strong> — several agents with narrower toolsets passing<\/li><\/ul>\n<p>messages directly to each other, nobody globally in charge. Easy to create   failure loops (two agents endlessly deferring), hard to debug.<\/p>\n<ul><li><strong>Supervisor<\/strong> — one routing LLM whose only job is deciding which specialist<\/li><\/ul>\n<p>sub-agent handles each step; sub-agents report back up, never sideways to   each other. Most production multi-agent systems converge here because it   gives one point of control and one place to look when something goes wrong.<\/p>\n<p>Default to a single agent. Reach for a supervisor only when you have genuinely distinct specialties with different tools, prompts, or context windows.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: Multi-agent sounds more powerful: why not always use it?<\/summary><div class=\"qa-body\"><p>Because multi-agent's real cost is <strong>coordination, not compute<\/strong>. Every hop between agents is a full LLM call reinterpreting another LLM's natural-language output — a lossy channel, and each extra agent is a place meaning can drift. You also multiply the hiding places: a single agent is one trace, one loop; multi-agent is traces × agents when the answer comes out wrong.<\/p>\n<p>Reaching for multi-agent before you have more than one distinct role is adding graph complexity with no matching problem. The tell that you've actually outgrown a single agent: its system prompt turning into a pile of \"if this kind of question act like X, if that kind act like Y\" — a disguised router. That's when you promote it to a real supervisor.<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: LlamaIndex vs LangChain vs LangGraph vs CrewAI: compare them.<\/summary><div class=\"qa-body\"><p>It's a trick prompt: they solve <strong>different layers<\/strong>, so a head-to-head is a category error, and interviewers use it to check whether you know the stack or just the brand names.<\/p>\n<ul><li><strong>LlamaIndex<\/strong> — ingestion/indexing: loaders, chunkers, index abstractions.<\/li><\/ul>\n<p>\"How do I get documents into an index.\"<\/p>\n<ul><li><strong>LangChain<\/strong> — general LLM app toolkit: prompt templates, chains,<\/li><\/ul>\n<p>integrations. \"How do I compose LLM calls quickly.\"<\/p>\n<ul><li><strong>LangGraph<\/strong> — a graph execution engine for stateful, cyclic control flow.<\/li><\/ul>\n<p>\"How do I model a loop or branch as an explicit graph with state.\"<\/p>\n<ul><li><strong>CrewAI<\/strong> — a multi-agent framework: pre-built roles, a crew delegating<\/li><\/ul>\n<p>tasks. \"How do I get role-playing agents cooperating out of the box.\"<\/p>\n<p>The strong answer names which you'd use together and which you'd skip <em>for stated reasons<\/em>. DocsMind uses LlamaIndex (ingestion) + LangGraph (the loop), skips LangChain (its LLM usage is one well-understood call, better as a direct SDK call) and CrewAI (no multi-agent problem exists yet).<\/p><\/div><\/details>\n<details class=\"qa\" open><summary>Q: How would you validate that a single agent is enough, rather than assuming?<\/summary><div class=\"qa-body\"><p>Run an end-to-end eval against both shapes on the same task set — the same discipline as a retrieval eval or an answer-faithfulness eval:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Metric<\/th><th>Single agent<\/th><th>Multi-agent<\/th><\/tr><\/thead><tbody><tr><td>Task success rate<\/td><td>baseline<\/td><td>must <em>beat<\/em> it, not tie<\/td><\/tr><tr><td>Tokens per task<\/td><td>fewer (no coordination hops)<\/td><td>more — every hop is an LLM call<\/td><\/tr><tr><td>Latency per task<\/td><td>lower<\/td><td>higher and more variable<\/td><\/tr><tr><td>Debuggability<\/td><td>one trace<\/td><td>traces × agents<\/td><\/tr><\/tbody><\/table><\/div>\n<p>If multi-agent doesn't measurably beat a well-scoped single agent, the extra complexity isn't earning its cost. In an interview, having <em>run<\/em> that comparison — even on a toy task set — beats any amount of architecture vocabulary.<\/p><\/div><\/details>","toc":[],"text":"agen

slice . pipeline ownership a lazy pipeline may keep its source open. if the source is a file, consume the pipeline inside the with block: with open (path) as handle: clean = (line.strip() for line in handle if line.strip()) for line in clean: process(line) interview answer itertools composes lazy, memory-efficient stages. the main caveats are shared-source behaviour in groupby and tee , single-pass consumption, and making the resource lifetime cover the pipeline's consumption.","words":248},{"path":"05-object-model/README.md","title":"Overview","section":"5 · The Object Model","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"the-python-object-model\">The Python Object Model<\/h1>\n<p>Python syntax such as <code>obj.method()<\/code>, <code>@property<\/code>, and <code>super()<\/code> is powered by protocols. Understanding those protocols turns advanced questions into predictable lookup rules.<\/p>\n<p>This chapter teaches:<\/p>\n<ul><li>how classes create instances;<\/li><li>how the method resolution order handles multiple inheritance;<\/li><li>why functions become bound methods;<\/li><li>how descriptors power properties and managed fields;<\/li><li>what dataclasses and <code>__slots__<\/code> actually generate or change.<\/li><\/ul>\n<h2 id=\"creation-versus-initialisation\">Creation versus initialisation<\/h2>\n<pre><code class=\"language-python\">obj = MyClass(arg)<\/code><\/pre>\n<p>Conceptually, the metaclass calls <code>MyClass.__new__<\/code> to create an instance and then <code>__init__<\/code> to initialise it. <code>__init__<\/code> does not return the instance; it must return <code>None<\/code>.<\/p>\n<p>Immutable subclasses sometimes customise <code>__new__<\/code> because their value must be fixed during creation.<\/p>\n<p>→ Continue with <strong><a class=\"mdlink\" data-href=\"classes-mro-super.md\" href=\"#\">Classes, MRO and super<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"creation-versus-initialisation","text":"Creation versus initialisation"}],"text":"the python object model python syntax such as obj.method() , @property , and super() is powered by protocols. understanding those protocols turns advanced questions into predictable lookup rules. this chapter teaches: how classes create instances; how the method resolution order handles multiple inheritance; why functions become bound methods; how descriptors power properties and managed fields; what dataclasses and __slots__ actually generate or change. creation versus initialisation obj = myclass(arg) conceptually, the metaclass calls myclass.__new__ to create an instance and then __init__ to initialise it. __init__ does not return the instance; it must return none . immutable subclasses sometimes customise __new__ because their value must be fixed during creation. → continue with classes, mro and super .","words":116},{"path":"05-object-model/classes-mro-super.md","title":"Classes, MRO and super","section":"5 · The Object Model","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"classes-mro-and-super\">Classes, MRO and <code>super<\/code><\/h1>\n<h2 id=\"attribute-lookup-follows-the-mro\">Attribute lookup follows the MRO<\/h2>\n<p>Every class has a method resolution order:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> A: ...\n<span class=\"tok-keyword\">class<\/span> B(A): ...\n<span class=\"tok-keyword\">class<\/span> C(A): ...\n<span class=\"tok-keyword\">class<\/span> D(B, C): ...\n\n<span class=\"tok-builtin\">print<\/span>(D.mro())\n<span class=\"tok-comment\"># [D, B, C, A, object]<\/span><\/code><\/pre>\n<p>Python uses C3 linearisation to preserve local base ordering and consistent ancestry.<\/p>\n<h2 id=\"super-does-not-mean-my-parent\"><code>super()<\/code> does not mean “my parent”<\/h2>\n<p>It means: continue lookup <strong>after the class where this method was defined<\/strong>, using the runtime instance's MRO.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> A:\n    <span class=\"tok-keyword\">def<\/span> save(<span class=\"tok-keyword\">self<\/span>):\n        <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"A\"<\/span>)\n\n<span class=\"tok-keyword\">class<\/span> B(A):\n    <span class=\"tok-keyword\">def<\/span> save(<span class=\"tok-keyword\">self<\/span>):\n        <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"B\"<\/span>)\n        <span class=\"tok-builtin\">super<\/span>().save()\n\n<span class=\"tok-keyword\">class<\/span> C(A):\n    <span class=\"tok-keyword\">def<\/span> save(<span class=\"tok-keyword\">self<\/span>):\n        <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"C\"<\/span>)\n        <span class=\"tok-builtin\">super<\/span>().save()\n\n<span class=\"tok-keyword\">class<\/span> D(B, C):\n    <span class=\"tok-keyword\">pass<\/span>\n\nD().save()  <span class=\"tok-comment\"># B, C, A<\/span><\/code><\/pre>\n<p>Inside <code>B<\/code>, <code>super()<\/code> reaches <code>C<\/code> for a <code>D<\/code> instance—not directly <code>A<\/code>.<\/p>\n<h2 id=\"cooperative-inheritance\">Cooperative inheritance<\/h2>\n<p>For the chain to work, participating classes use compatible signatures and each calls <code>super()<\/code> exactly once. Hard-coding <code>A.save(self)<\/code> can skip a sibling or call a shared ancestor twice.<\/p>\n<p>Mixins should usually be small, stateless, and cooperative.<\/p>\n<h2 id=\"bound-methods\">Bound methods<\/h2>\n<p>A function stored on a class is a descriptor. Reading it through an instance produces a bound method:<\/p>\n<pre><code class=\"language-python\">obj.save.__self__ <span class=\"tok-keyword\">is<\/span> obj\nobj.save.__func__ <span class=\"tok-keyword\">is<\/span> type(obj).save<\/code><\/pre>\n<p>That is how <code>self<\/code> is supplied automatically.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>The MRO is the C3-linearised class lookup order. <code>super()<\/code> returns a proxy that continues lookup after the current defining class in that MRO, enabling cooperative multiple inheritance rather than simply calling a direct parent.<\/p><\/blockquote>","toc":[{"level":2,"id":"attribute-lookup-follows-the-mro","text":"Attribute lookup follows the MRO"},{"level":2,"id":"super-does-not-mean-my-parent","text":"super() does not mean “my parent”"},{"level":2,"id":"cooperative-inheritance","text":"Cooperative inheritance"},{"level":2,"id":"bound-methods","text":"Bound methods"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"classes, mro and super attribute lookup follows the mro every class has a method resolution order: class a: ... class b(a): ... class c(a): ... class d(b, c): ... print (d.mro()) # [d, b, c, a, object] python uses c3 linearisation to preserve local base ordering and consistent ancestry. super() does not mean “my parent” it means: continue lookup after the class where this method was defined , using the runtime instance's mro. class a: def save( self ): print ( \"a\" ) class b(a): def save( self ): print ( \"b\" ) super ().save() class c(a): def save( self ): print ( \"c\" ) super ().save() class d(b, c): pass d().save() # b, c, a inside b , super() reaches c for a d instance—not directly a . cooperative inheritance for the chain to work, participating classes use compatible signatures and each calls super() exactly once. hard-coding a.save(self) can skip a sibling or call a shared ancestor twice. mixins should usually be small, stateless, and cooperative. bound methods a function stored on a class is a descriptor. reading it through an instance produces a bound method: obj.save.__self__ is obj obj.save.__func__ is type(obj).save that is how self is supplied automatically. interview answer the mro is the c3-linearised class lookup order. super() returns a proxy that continues lookup after the current defining class in that mro, enabling cooperative multiple inheritance rather than simply calling a direct parent.","words":236},{"path":"05-object-model/descriptors-properties.md","title":"Descriptors and Properties","section":"5 · The Object Model","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"descriptors-and-properties\">Descriptors and Properties<\/h1>\n<p>A descriptor is an object on a class that defines attribute-access hooks such as <code>__get__<\/code>, <code>__set__<\/code>, or <code>__delete__<\/code>.<\/p>\n<p>Functions, <code>property<\/code>, <code>classmethod<\/code>, <code>staticmethod<\/code>, and many ORM fields use this protocol.<\/p>\n<h2 id=\"a-validating-descriptor\">A validating descriptor<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Positive:\n    <span class=\"tok-keyword\">def<\/span> __set_name__(<span class=\"tok-keyword\">self<\/span>, owner, name):\n        <span class=\"tok-keyword\">self<\/span>.name = name\n\n    <span class=\"tok-keyword\">def<\/span> __get__(<span class=\"tok-keyword\">self<\/span>, obj, owner=<span class=\"tok-keyword\">None<\/span>):\n        <span class=\"tok-keyword\">if<\/span> obj <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n            <span class=\"tok-keyword\">return<\/span> <span class=\"tok-keyword\">self<\/span>\n        <span class=\"tok-keyword\">return<\/span> obj.__dict__[<span class=\"tok-keyword\">self<\/span>.name]\n\n    <span class=\"tok-keyword\">def<\/span> __set__(<span class=\"tok-keyword\">self<\/span>, obj, value):\n        <span class=\"tok-keyword\">if<\/span> value &lt;= <span class=\"tok-number\">0<\/span>:\n            <span class=\"tok-keyword\">raise<\/span> ValueError(<span class=\"tok-string\">\"must be positive\"<\/span>)\n        obj.__dict__[<span class=\"tok-keyword\">self<\/span>.name] = value\n\n<span class=\"tok-keyword\">class<\/span> Product:\n    price = Positive()<\/code><\/pre>\n<p>The reusable descriptor controls <code>product.price<\/code> for every <code>Product<\/code> instance.<\/p>\n<h2 id=\"data-versus-non-data-descriptors\">Data versus non-data descriptors<\/h2>\n<ul><li>A <strong>data descriptor<\/strong> defines <code>__set__<\/code> or <code>__delete__<\/code>; it wins over the instance dictionary.<\/li><li>A <strong>non-data descriptor<\/strong> defines only <code>__get__<\/code>; an instance attribute can shadow it.<\/li><\/ul>\n<p>Normal functions are non-data descriptors, which is why assigning <code>obj.method = something<\/code> can shadow the class method for that instance.<\/p>\n<h2 id=\"property-is-the-common-case\">Property is the common case<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Circle:\n    <span class=\"tok-keyword\">def<\/span> __init__(<span class=\"tok-keyword\">self<\/span>, radius):\n        <span class=\"tok-keyword\">self<\/span>.radius = radius\n\n    <span class=\"tok-decorator\">@property<\/span>\n    <span class=\"tok-keyword\">def<\/span> area(<span class=\"tok-keyword\">self<\/span>):\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-number\">3.14159<\/span> * <span class=\"tok-keyword\">self<\/span>.radius ** <span class=\"tok-number\">2<\/span><\/code><\/pre>\n<p><code>circle.area<\/code> looks like data while remaining computed. Add a setter only when assignment has a clear meaning.<\/p>\n<h2 id=\"simplified-lookup-order\">Simplified lookup order<\/h2>\n<ol><li>custom <code>__getattribute__<\/code> machinery;<\/li><li>data descriptor on the class/MRO;<\/li><li>instance <code>__dict__<\/code>;<\/li><li>non-data descriptor or class attribute;<\/li><li><code>__getattr__<\/code> if the name is still missing.<\/li><\/ol>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>A descriptor is a class attribute that controls attribute access through <code>__get__<\/code>, <code>__set__<\/code>, or <code>__delete__<\/code>. Data descriptors beat instance attributes; non-data descriptors can be shadowed. Methods and properties are built on this protocol.<\/p><\/blockquote>","toc":[{"level":2,"id":"a-validating-descriptor","text":"A validating descriptor"},{"level":2,"id":"data-versus-non-data-descriptors","text":"Data versus non-data descriptors"},{"level":2,"id":"property-is-the-common-case","text":"Property is the common case"},{"level":2,"id":"simplified-lookup-order","text":"Simplified lookup order"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"descriptors and properties a descriptor is an object on a class that defines attribute-access hooks such as __get__ , __set__ , or __delete__ . functions, property , classmethod , staticmethod , and many orm fields use this protocol. a validating descriptor class positive: def __set_name__( self , owner, name): self .name = name def __get__( self , obj, owner= none ): if obj is none : return self return obj.__dict__[ self .name] def __set__( self , obj, value): if value <= 0 : raise valueerror( \"must be positive\" ) obj.__dict__[ self .name] = value class product: price = positive() the reusable descriptor controls product.price for every product instance. data versus non-data descriptors a data descriptor defines __set__ or __delete__ ; it wins over the instance dictionary. a non-data descriptor defines only __get__ ; an instance attribute can shadow it. normal functions are non-data descriptors, which is why assigning obj.method = something can shadow the class method for that instance. property is the common case class circle: def __init__( self , radius): self .radius = radius @property def area( self ): return 3.14159 * self .radius ** 2 circle.area looks like data while remaining computed. add a setter only when assignment has a clear meaning. simplified lookup order custom __getattribute__ machinery; data descriptor on the class/mro; instance __dict__ ; non-data descriptor or class attribute; __getattr__ if the name is still missing. interview answer a descriptor is a class attribute that controls attribute access through __get__ , __set__ , or __delete__ . data descriptors beat instance attributes; non-data descriptors can be shadowed. methods and properties are built on this protocol.","words":268},{"path":"05-object-model/dataclasses-slots.md","title":"Dataclasses and slots","section":"5 · The Object Model","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"dataclasses-and-__slots__\">Dataclasses and <code>__slots__<\/code><\/h1>\n<h2 id=\"what-dataclass-generates\">What <code>@dataclass<\/code> generates<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> dataclasses <span class=\"tok-keyword\">import<\/span> dataclass, field\n\n<span class=\"tok-decorator\">@dataclass<\/span>\n<span class=\"tok-keyword\">class<\/span> Job:\n    name: <span class=\"tok-builtin\">str<\/span>\n    tags: <span class=\"tok-builtin\">list<\/span>[<span class=\"tok-builtin\">str<\/span>] = field(default_factory=<span class=\"tok-builtin\">list<\/span>)<\/code><\/pre>\n<p>Based on options, a dataclass can generate <code>__init__<\/code>, <code>__repr__<\/code>, equality, ordering, and hashing behaviour. It does not make the class a plain record only; methods and validation are still allowed.<\/p>\n<p>Use <code>default_factory<\/code> for mutable defaults so every instance gets its own list.<\/p>\n<h2 id=\"frozentrue-is-not-deep-immutability\"><code>frozen=True<\/code> is not deep immutability<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-decorator\">@dataclass<\/span>(frozen=<span class=\"tok-keyword\">True<\/span>)\n<span class=\"tok-keyword\">class<\/span> Report:\n    values: <span class=\"tok-builtin\">list<\/span>[<span class=\"tok-builtin\">int<\/span>]<\/code><\/pre>\n<p><code>report.values = ...<\/code> is blocked, but <code>report.values.append(1)<\/code> still mutates the referenced list. Frozen controls normal field assignment, not transitive mutation.<\/p>\n<h2 id=\"hash-generation\">Hash generation<\/h2>\n<p>Hash behaviour depends on <code>eq<\/code>, <code>frozen<\/code>, and <code>unsafe_hash<\/code>. A frozen dataclass is only usefully hashable when its fields are hashable and equality remains stable.<\/p>\n<h2 id=\"what-slots-change\">What slots change<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-decorator\">@dataclass<\/span>(slots=<span class=\"tok-keyword\">True<\/span>)\n<span class=\"tok-keyword\">class<\/span> Point:\n    x: <span class=\"tok-builtin\">float<\/span>\n    y: <span class=\"tok-builtin\">float<\/span><\/code><\/pre>\n<p>Slots declare fixed attribute storage and commonly remove each instance's <code>__dict__<\/code>. Benefits can include lower memory and catching misspelled attributes.<\/p>\n<p>Costs:<\/p>\n<ul><li>arbitrary new attributes are unavailable;<\/li><li>inheritance needs care;<\/li><li>weak references require support such as <code>weakref_slot=True<\/code>;<\/li><li>some tools expect <code>__dict__<\/code>.<\/li><\/ul>\n<p>Slots are a representation choice, not access control or a security boundary.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>Dataclasses generate common data-model methods from annotated fields. <code>default_factory<\/code> prevents shared mutable defaults. Frozen blocks normal rebinding but is not deep immutability. Slots change instance storage and can reduce memory, with inheritance and tooling trade-offs.<\/p><\/blockquote>","toc":[{"level":2,"id":"what-dataclass-generates","text":"What @dataclass generates"},{"level":2,"id":"frozentrue-is-not-deep-immutability","text":"frozen=True is not deep immutability"},{"level":2,"id":"hash-generation","text":"Hash generation"},{"level":2,"id":"what-slots-change","text":"What slots change"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"dataclasses and __slots__ what @dataclass generates from dataclasses import dataclass, field @dataclass class job: name: str tags: list [ str ] = field(default_factory= list ) based on options, a dataclass can generate __init__ , __repr__ , equality, ordering, and hashing behaviour. it does not make the class a plain record only; methods and validation are still allowed. use default_factory for mutable defaults so every instance gets its own list. frozen=true is not deep immutability @dataclass (frozen= true ) class report: values: list [ int ] report.values = ... is blocked, but report.values.append(1) still mutates the referenced list. frozen controls normal field assignment, not transitive mutation. hash generation hash behaviour depends on eq , frozen , and unsafe_hash . a frozen dataclass is only usefully hashable when its fields are hashable and equality remains stable. what slots change @dataclass (slots= true ) class point: x: float y: float slots declare fixed attribute storage and commonly remove each instance's __dict__ . benefits can include lower memory and catching misspelled attributes. costs: arbitrary new attributes are unavailable; inheritance needs care; weak references require support such as weakref_slot=true ; some tools expect __dict__ . slots are a representation choice, not access control or a security boundary. interview answer dataclasses generate common data-model methods from annotated fields. default_factory prevents shared mutable defaults. frozen blocks normal rebinding but is not deep immutability. slots change instance storage and can reduce memory, with inheritance and tooling trade-offs.","words":239},{"path":"06-concurrency/README.md","title":"Overview","section":"6 · Concurrency","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"concurrency-choose-by-what-is-waiting\">Concurrency: Choose by What Is Waiting<\/h1>\n<p>Do not choose threads, processes, or async by fashion. Classify the work.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Workload<\/th><th>Normal starting point<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td>many network waits<\/td><td><code>asyncio<\/code><\/td><td>one thread can coordinate many suspended tasks<\/td><\/tr><tr><td>blocking I/O libraries<\/td><td>threads<\/td><td>overlap waits without rewriting library calls<\/td><\/tr><tr><td>CPU-bound pure Python<\/td><td>processes<\/td><td>separate interpreters can use multiple cores<\/td><\/tr><tr><td>native code releasing the GIL<\/td><td>threads may scale<\/td><td>computation occurs outside protected Python bytecode<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Concurrency means tasks make progress during overlapping time. Parallelism means work executes simultaneously. You can have concurrency without parallelism.<\/p>\n<h2 id=\"the-production-rule\">The production rule<\/h2>\n<p>Every concurrency design also needs:<\/p>\n<ul><li>a limit on work in flight;<\/li><li>timeouts and cancellation;<\/li><li>clear ownership and shutdown;<\/li><li>backpressure when consumers fall behind;<\/li><li>measurement under realistic load.<\/li><\/ul>\n<h2 id=\"applied-case-study-serving-a-rag-api\">Applied case study: serving a RAG API<\/h2>\n<p>After the Python fundamentals, apply them to a real FastAPI service:<\/p>\n<ul><li><a class=\"mdlink\" data-href=\"rag-serving-concurrency.md\" href=\"#\">RAG serving concurrency<\/a> compares sync, async,<\/li><\/ul>\n<p>threads and processes around blocking model calls.<\/p>\n<ul><li><a class=\"mdlink\" data-href=\"docsmind-fastapi-server.md\" href=\"#\">DocsMind's FastAPI server<\/a> explains why a plain<\/li><\/ul>\n<p><code>def<\/code> handler can be safer than an <code>async def<\/code> handler that calls blocking   code.<\/p>\n<p>→ Continue with <strong><a class=\"mdlink\" data-href=\"gil-threads-processes.md\" href=\"#\">GIL, Threads and Processes<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"the-production-rule","text":"The production rule"},{"level":2,"id":"applied-case-study-serving-a-rag-api","text":"Applied case study: serving a RAG API"}],"text":"concurrency: choose by what is waiting do not choose threads, processes, or async by fashion. classify the work. workload normal starting point why many network waits asyncio one thread can coordinate many suspended tasks blocking i/o libraries threads overlap waits without rewriting library calls cpu-bound pure python processes separate interpreters can use multiple cores native code releasing the gil threads may scale computation occurs outside protected python bytecode concurrency means tasks make progress during overlapping time. parallelism means work executes simultaneously. you can have concurrency without parallelism. the production rule every concurrency design also needs: a limit on work in flight; timeouts and cancellation; clear ownership and shutdown; backpressure when consumers fall behind; measurement under realistic load. applied case study: serving a rag api after the python fundamentals, apply them to a real fastapi service: rag serving concurrency compares sync, async, threads and processes around blocking model calls. docsmind's fastapi server explains why a plain def handler can be safer than an async def handler that calls blocking code. → continue with gil, threads and processes .","words":177},{"path":"06-concurrency/gil-threads-processes.md","title":"GIL, Threads and Processes","section":"6 · Concurrency","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"the-gil-threads-and-processes\">The GIL, Threads and Processes<\/h1>\n<h2 id=\"what-the-gil-means\">What the GIL means<\/h2>\n<p>In the standard GIL-enabled CPython build, one thread normally executes Python bytecode at a time within one interpreter. This simplifies parts of interpreter memory management; it does not make your program race-free.<\/p>\n<p>Threads can still help when:<\/p>\n<ul><li>the thread waits on network or disk I/O;<\/li><li>a C extension releases the GIL during heavy work;<\/li><li>responsiveness matters more than CPU throughput.<\/li><\/ul>\n<h2 id=\"why-cpu-bound-threads-disappoint\">Why CPU-bound threads disappoint<\/h2>\n<p>Two threads doing pure-Python number crunching compete for the GIL and add scheduling overhead. A process pool gives each worker a separate interpreter and GIL.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> concurrent.futures <span class=\"tok-keyword\">import<\/span> ProcessPoolExecutor\n\n<span class=\"tok-keyword\">with<\/span> ProcessPoolExecutor() <span class=\"tok-keyword\">as<\/span> pool:\n    results = <span class=\"tok-builtin\">list<\/span>(pool.<span class=\"tok-builtin\">map<\/span>(cpu_heavy, inputs))<\/code><\/pre>\n<h2 id=\"process-costs\">Process costs<\/h2>\n<ul><li>startup and memory overhead;<\/li><li>arguments/results must be serialised;<\/li><li>global state is not shared normally;<\/li><li>platform start methods differ;<\/li><li>tiny tasks may cost more to distribute than to compute.<\/li><\/ul>\n<p>Send coarse tasks and measure.<\/p>\n<h2 id=\"races-still-exist-with-threads\">Races still exist with threads<\/h2>\n<p>A multi-step operation can interleave even if individual bytecode operations appear atomic. Never use “the GIL makes it safe” as a design argument. Protect invariants with a lock or, better, avoid shared mutable state.<\/p>\n<h2 id=\"forking-after-threads\">Forking after threads<\/h2>\n<p>After <code>fork<\/code>, only the calling thread survives in the child, but locks may be copied as owned by vanished threads. This can deadlock. <code>spawn<\/code> is safer for complex threaded applications.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>The GIL normally serialises Python bytecode in one CPython interpreter. Threads remain useful for I/O and native work that releases it; processes are the usual choice for CPU-bound pure Python. The GIL does not remove logical races around shared state.<\/p><\/blockquote>","toc":[{"level":2,"id":"what-the-gil-means","text":"What the GIL means"},{"level":2,"id":"why-cpu-bound-threads-disappoint","text":"Why CPU-bound threads disappoint"},{"level":2,"id":"process-costs","text":"Process costs"},{"level":2,"id":"races-still-exist-with-threads","text":"Races still exist with threads"},{"level":2,"id":"forking-after-threads","text":"Forking after threads"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"the gil, threads and processes what the gil means in the standard gil-enabled cpython build, one thread normally executes python bytecode at a time within one interpreter. this simplifies parts of interpreter memory management; it does not make your program race-free. threads can still help when: the thread waits on network or disk i/o; a c extension releases the gil during heavy work; responsiveness matters more than cpu throughput. why cpu-bound threads disappoint two threads doing pure-python number crunching compete for the gil and add scheduling overhead. a process pool gives each worker a separate interpreter and gil. from concurrent.futures import processpoolexecutor with processpoolexecutor() as pool: results = list (pool. map (cpu_heavy, inputs)) process costs startup and memory overhead; arguments/results must be serialised; global state is not shared normally; platform start methods differ; tiny tasks may cost more to distribute than to compute. send coarse tasks and measure. races still exist with threads a multi-step operation can interleave even if individual bytecode operations appear atomic. never use “the gil makes it safe” as a design argument. protect invariants with a lock or, better, avoid shared mutable state. forking after threads after fork , only the calling thread survives in the child, but locks may be copied as owned by vanished threads. this can deadlock. spawn is safer for complex threaded applications. interview answer the gil normally serialises python bytecode in one cpython interpreter. threads remain useful for i/o and native work that releases it; processes are the usual choice for cpu-bound pure python. the gil does not remove logical races around shared state.","words":263},{"path":"06-concurrency/asyncio-explained.md","title":"asyncio Explained","section":"6 · Concurrency","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"asyncio-explained\"><code>asyncio<\/code> Explained<\/h1>\n<p>An <code>async def<\/code> call creates a coroutine object. It does not run automatically.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">def<\/span> fetch(client, url):\n    response = <span class=\"tok-keyword\">await<\/span> client.get(url)\n    <span class=\"tok-keyword\">return<\/span> response.text<\/code><\/pre>\n<p><code>await<\/code> suspends this coroutine when the awaited operation is not ready, letting the event loop run another task.<\/p>\n<h2 id=\"coroutines-and-tasks\">Coroutines and tasks<\/h2>\n<pre><code class=\"language-python\">coro = fetch(client, url)        <span class=\"tok-comment\"># not scheduled<\/span>\ntask = asyncio.create_task(coro) <span class=\"tok-comment\"># scheduled concurrently<\/span>\ntext = <span class=\"tok-keyword\">await<\/span> task<\/code><\/pre>\n<p>Structured tools such as <code>asyncio.TaskGroup<\/code> make ownership clearer:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">with<\/span> asyncio.TaskGroup() <span class=\"tok-keyword\">as<\/span> group:\n    tasks = [group.create_task(fetch(client, u)) <span class=\"tok-keyword\">for<\/span> u <span class=\"tok-keyword\">in<\/span> urls]<\/code><\/pre>\n<p>If a child fails, the group cancels siblings and waits for cleanup before leaving.<\/p>\n<h2 id=\"blocking-inside-async-blocks-everyone\">Blocking inside async blocks everyone<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">def<\/span> bad():\n    time.sleep(<span class=\"tok-number\">2<\/span>)  <span class=\"tok-comment\"># blocks event-loop thread<\/span><\/code><\/pre>\n<p>Use <code>await asyncio.sleep(2)<\/code> for a timer. For a blocking I/O call you cannot replace, consider <code>await asyncio.to_thread(call)<\/code>.<\/p>\n<h2 id=\"cancellation-is-cooperative\">Cancellation is cooperative<\/h2>\n<p><code>task.cancel()<\/code> requests cancellation. <code>CancelledError<\/code> appears at an await point. Always clean up in <code>finally<\/code> and normally re-raise cancellation.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">try<\/span>:\n    <span class=\"tok-keyword\">await<\/span> work()\n<span class=\"tok-keyword\">finally<\/span>:\n    <span class=\"tok-keyword\">await<\/span> close_resource()<\/code><\/pre>\n<h2 id=\"timeouts\">Timeouts<\/h2>\n<p>A network client needs connect, read, and overall deadlines. A timeout should cancel the operation and release its resources; it should not merely stop waiting while work leaks in the background.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p><code>asyncio<\/code> uses cooperative scheduling: coroutines yield control at <code>await<\/code> points while one event-loop thread coordinates many I/O waits. Creating a coroutine does not schedule it, blocking calls freeze the loop, and production code must bound concurrency and handle cancellation.<\/p><\/blockquote>","toc":[{"level":2,"id":"coroutines-and-tasks","text":"Coroutines and tasks"},{"level":2,"id":"blocking-inside-async-blocks-everyone","text":"Blocking inside async blocks everyone"},{"level":2,"id":"cancellation-is-cooperative","text":"Cancellation is cooperative"},{"level":2,"id":"timeouts","text":"Timeouts"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"asyncio explained an async def call creates a coroutine object. it does not run automatically. async def fetch(client, url): response = await client.get(url) return response.text await suspends this coroutine when the awaited operation is not ready, letting the event loop run another task. coroutines and tasks coro = fetch(client, url) # not scheduled task = asyncio.create_task(coro) # scheduled concurrently text = await task structured tools such as asyncio.taskgroup make ownership clearer: async with asyncio.taskgroup() as group: tasks = [group.create_task(fetch(client, u)) for u in urls] if a child fails, the group cancels siblings and waits for cleanup before leaving. blocking inside async blocks everyone async def bad(): time.sleep( 2 ) # blocks event-loop thread use await asyncio.sleep(2) for a timer. for a blocking i/o call you cannot replace, consider await asyncio.to_thread(call) . cancellation is cooperative task.cancel() requests cancellation. cancellederror appears at an await point. always clean up in finally and normally re-raise cancellation. try : await work() finally : await close_resource() timeouts a network client needs connect, read, and overall deadlines. a timeout should cancel the operation and release its resources; it should not merely stop waiting while work leaks in the background. interview answer asyncio uses cooperative scheduling: coroutines yield control at await points while one event-loop thread coordinates many i/o waits. creating a coroutine does not schedule it, blocking calls freeze the loop, and production code must bound concurrency and handle cancellation.","words":233},{"path":"06-concurrency/queues-backpressure.md","title":"Queues, Races and Backpressure","section":"6 · Concurrency","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"queues-races-and-backpressure\">Queues, Races and Backpressure<\/h1>\n<h2 id=\"a-queue-separates-rates\">A queue separates rates<\/h2>\n<p>Producers create work; consumers process it. A queue absorbs short bursts.<\/p>\n<pre><code class=\"language-python\">queue = asyncio.Queue(maxsize=<span class=\"tok-number\">100<\/span>)\n\n<span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">def<\/span> producer(item):\n    <span class=\"tok-keyword\">await<\/span> queue.put(item)  <span class=\"tok-comment\"># waits when full<\/span>\n\n<span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">def<\/span> consumer():\n    <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n        item = <span class=\"tok-keyword\">await<\/span> queue.get()\n        <span class=\"tok-keyword\">try<\/span>:\n            <span class=\"tok-keyword\">await<\/span> process(item)\n        <span class=\"tok-keyword\">finally<\/span>:\n            queue.task_done()<\/code><\/pre>\n<p>The size limit is <strong>backpressure<\/strong>. When consumers fall behind, producers slow down instead of allowing memory and latency to grow without bound.<\/p>\n<h2 id=\"unbounded-queues-hide-overload\">Unbounded queues hide overload<\/h2>\n<p>An unbounded queue makes the system look healthy while requests become stale and memory climbs. Decide what overload means:<\/p>\n<ul><li>wait;<\/li><li>reject new work;<\/li><li>drop oldest or lowest-priority work;<\/li><li>spill to durable storage;<\/li><li>scale consumers.<\/li><\/ul>\n<p>The correct policy is a product decision, not only a code choice.<\/p>\n<h2 id=\"logical-races-in-async-code\">Logical races in async code<\/h2>\n<p>One event-loop thread does not eliminate races. Tasks interleave at awaits:<\/p>\n<pre><code class=\"language-python\">value = cache[key]\n<span class=\"tok-keyword\">await<\/span> refresh()\ncache[key] = value + <span class=\"tok-number\">1<\/span><\/code><\/pre>\n<p>Another task can modify the key during <code>await<\/code>. Use an <code>asyncio.Lock<\/code> around the invariant or restructure so one task owns the state.<\/p>\n<h2 id=\"shutdown-sequence\">Shutdown sequence<\/h2>\n<ol><li>stop accepting new work;<\/li><li>signal producers;<\/li><li>drain or deliberately discard the queue;<\/li><li>cancel remaining workers;<\/li><li>await cleanup and close resources.<\/li><\/ol>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>A bounded queue creates backpressure by making producers wait or fail when consumers cannot keep up. It limits memory and stale work. Even single-threaded async code can race when a read-modify-write sequence crosses an await.<\/p><\/blockquote>","toc":[{"level":2,"id":"a-queue-separates-rates","text":"A queue separates rates"},{"level":2,"id":"unbounded-queues-hide-overload","text":"Unbounded queues hide overload"},{"level":2,"id":"logical-races-in-async-code","text":"Logical races in async code"},{"level":2,"id":"shutdown-sequence","text":"Shutdown sequence"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"queues, races and backpressure a queue separates rates producers create work; consumers process it. a queue absorbs short bursts. queue = asyncio.queue(maxsize= 100 ) async def producer(item): await queue.put(item) # waits when full async def consumer(): while true : item = await queue.get() try : await process(item) finally : queue.task_done() the size limit is backpressure . when consumers fall behind, producers slow down instead of allowing memory and latency to grow without bound. unbounded queues hide overload an unbounded queue makes the system look healthy while requests become stale and memory climbs. decide what overload means: wait; reject new work; drop oldest or lowest-priority work; spill to durable storage; scale consumers. the correct policy is a product decision, not only a code choice. logical races in async code one event-loop thread does not eliminate races. tasks interleave at awaits: value = cache[key] await refresh() cache[key] = value + 1 another task can modify the key during await . use an asyncio.lock around the invariant or restructure so one task owns the state. shutdown sequence stop accepting new work; signal producers; drain or deliberately discard the queue; cancel remaining workers; await cleanup and close resources. interview answer a bounded queue creates backpressure by making producers wait or fail when consumers cannot keep up. it limits memory and stale work. even single-threaded async code can race when a read-modify-write sequence crosses an await.","words":231},{"path":"06-concurrency/rag-serving-concurrency.md","title":"RAG Serving: Sync, Async, Threads & Processes","section":"6 · Concurrency","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"rag-serving-concurrency-handling-more-than-one-request\">RAG Serving Concurrency: Handling More Than One Request<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> sync does one thing at a time. Async interleaves I/O waits on one thread. Threads interleave too (the GIL forbids true parallel bytecode). Processes are the only way Python runs CPU work truly in parallel.<\/div><\/div>\n<h2 id=\"the-four-models\">The four models<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Concept<\/th><th>What actually happens<\/th><th>Good for<\/th><\/tr><\/thead><tbody><tr><td><strong>Synchronous<\/strong><\/td><td>One thing at a time, in order; each step blocks until done<\/td><td>Simple, predictable code; DocsMind's <code>RAGPipeline.query()<\/code> today<\/td><\/tr><tr><td><strong>Asynchronous (<code>async<\/code>/<code>await<\/code>)<\/strong><\/td><td>One thread, but it can pause a task that's <em>waiting on I/O<\/em> and work on another in the meantime<\/td><td>Many concurrent I/O waits (network, disk) on a single core<\/td><\/tr><tr><td><strong>Multithreading<\/strong><\/td><td>Multiple OS threads in one process — but Python's GIL means only one runs Python bytecode at a time<\/td><td>I/O-bound work with simpler code than async; C-extension code that releases the GIL<\/td><\/tr><tr><td><strong>Multiprocessing<\/strong><\/td><td>Separate processes, each with its own interpreter and memory — no shared GIL<\/td><td>CPU-bound work: real parallelism, not just overlapped waiting<\/td><\/tr><\/tbody><\/table><\/div>\n<p>One more term to place: \"parallel processing\" isn't a fifth thing. It's the <em>outcome<\/em> multiprocessing gives you — work happening at the same instant on different cores.<\/p>\n<p>The distinction that decides almost every question in this space:<\/p>\n<ul><li><strong>Concurrency<\/strong> = making progress on several things by interleaving them.<\/li><li><strong>Parallelism<\/strong> = several things literally running at the same instant.<\/li><\/ul>\n<p>Async and threading in Python give you concurrency. Only multiprocessing gives you parallelism.<\/p>\n<div class=\"compare\">\n  <div class=\"cmp-col\">\n    <div class=\"cmp-h\">Concurrency · 1 core<\/div>\n    <p>Tasks A and B <b>interleave<\/b> — progress on both, but never at the same instant.<\/p>\n    <span class=\"cmp-tag\">A─A · B─B · A─A · B─B<\/span>\n  <\/div>\n  <div class=\"cmp-col green\">\n    <div class=\"cmp-h\">Parallelism · 2 cores<\/div>\n    <p>A and B run <b>literally simultaneously<\/b>, one per core.<\/p>\n    <span class=\"cmp-tag\">A─A─A─A ‖ B─B─B─B<\/span>\n  <\/div>\n<\/div>\n<h2 id=\"the-gil-in-plain-words\">The GIL, in plain words<\/h2>\n<p>CPython has a Global Interpreter Lock — the <strong>GIL<\/strong>. It means only one thread executes Python bytecode at any instant, even on a 16-core machine.<\/p>\n<p>So multithreading does NOT speed up CPU-bound Python (crunching numbers in a loop). The threads just take turns on one core.<\/p>\n<p>But it DOES still help I/O-bound work. A thread waiting on a network response releases the GIL while it waits. Another thread runs in the meantime.<\/p>\n<p>Multiprocessing sidesteps the GIL entirely: separate processes, separate interpreters, separate memory. That's the real way to get CPU-bound parallelism in Python.<\/p>\n<h2 id=\"picking-the-right-lever\">Picking the right lever<\/h2>\n<p>The decision procedure is one question: <strong>what is the work waiting on?<\/strong><\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>The bottleneck is...<\/th><th>Right lever<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td>The network / disk (I/O-bound)<\/td><td>async, or threads<\/td><td>The wait releases the GIL; interleaving wins<\/td><\/tr><tr><td>The CPU (crunching, parsing, embedding on CPU)<\/td><td>multiprocessing<\/td><td>Only separate processes escape the GIL<\/td><\/tr><tr><td>The GPU (model inference)<\/td><td>batching, not threads<\/td><td>The GPU is its own queue; feed it bigger batches<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Where this bites in DocsMind: ingestion (<code>load_documents<\/code> + embedding a corpus) is CPU/GPU-bound batch work → multiprocessing or batched GPU calls are the right lever. Serving <code>/query<\/code> is I/O-bound (waiting on the LLM API) → async or thread-pool concurrency is the right lever. Grab the wrong lever — say, threads to speed up embedding — and the GIL blocks you anyway.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"docsmind-fastapi-server.md\" href=\"#\">DocsMind's FastAPI server<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-four-models","text":"The four models"},{"level":2,"id":"the-gil-in-plain-words","text":"The GIL, in plain words"},{"level":2,"id":"picking-the-right-lever","text":"Picking the right lever"}],"text":"rag serving concurrency: handling more than one request 💡 tl;dr sync does one thing at a time. async interleaves i/o waits on one thread. threads interleave too (the gil forbids true parallel bytecode). processes are the only way python runs cpu work truly in parallel. the four models concept what actually happens good for synchronous one thing at a time, in order; each step blocks until done simple, predictable code; docsmind's ragpipeline.query() today asynchronous ( async / await ) one thread, but it can pause a task that's waiting on i/o and work on another in the meantime many concurrent i/o waits (network, disk) on a single core multithreading multiple os threads in one process — but python's gil means only one runs python bytecode at a time i/o-bound work with simpler code than async; c-extension code that releases the gil multiprocessing separate processes, each with its own interpreter and memory — no shared gil cpu-bound work: real parallelism, not just overlapped waiting one more term to place: \"parallel processing\" isn't a fifth thing. it's the outcome multiprocessing gives you — work happening at the same instant on different cores. the distinction that decides almost every question in this space: concurrency = making progress on several things by interleaving them. parallelism = several things literally running at the same instant. async and threading in python give you concurrency. only multiprocessing gives you parallelism. concurrency · 1 core tasks a and b interleave — progress on both, but never at the same instant. a─a · b─b · a─a · b─b parallelism · 2 cores a and b run literally simultaneously , one per core. a─a─a─a ‖ b─b─b─b the gil, in plain words cpython has a global interpreter lock — the gil . it means only one thread executes python bytecode at any instant, even on a 16-core machine. so multithreading does not speed up cpu-bound python (crunching numbers in a loop). the threads just take turns on one core. but it does still help i/o-bound work. a thread waiting on a network response releases the gil while it waits. another thread runs in the meantime. multiprocessing sidesteps the gil entirely: separate processes, separate interpreters, separate memory. that's the real way to get cpu-bound parallelism in python. picking the right lever the decision procedure is one question: what is the work waiting on? the bottleneck is... right lever why the network / disk (i/o-bound) async, or threads the wait releases the gil; interleaving wins the cpu (crunching, parsing, embedding on cpu) multiprocessing only separate processes escape the gil the gpu (model inference) batching, not threads the gpu is its own queue; feed it bigger batches where this bites in docsmind: ingestion ( load_documents + embedding a corpus) is cpu/gpu-bound batch work → multiprocessing or batched gpu calls are the right lever. serving /query is i/o-bound (waiting on the llm api) → async or thread-pool concurrency is the right lever. grab the wrong lever — say, threads to speed up embedding — and the gil blocks you anyway. → next: docsmind's fastapi server","words":510},{"path":"06-concurrency/docsmind-fastapi-server.md","title":"FastAPI and the Async Footgun","section":"6 · Concurrency","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"what-docsminds-server-actually-does-and-the-async-footgun\">What DocsMind's Server Actually Does: and the Async Footgun<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> FastAPI runs plain <code>def<\/code> endpoints in a thread pool automatically. That's why DocsMind's blocking Anthropic call is handled correctly today — and why naively adding <code>async def<\/code> would make things <em>worse<\/em>, not better.<\/div><\/div>\n<h2 id=\"what-the-code-does-today\">What the code does today<\/h2>\n<p>Look at <a class=\"mdlink\" data-href=\"../../docsmind/serving/app.py\" href=\"#\"><code>serving/app.py<\/code><\/a>. Both endpoints are plain <code>def<\/code>, not <code>async def<\/code>:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-decorator\">@app<\/span>.get(<span class=\"tok-string\">\"/health\"<\/span>, response_model=HealthResponse)\n<span class=\"tok-keyword\">def<\/span> health() -&gt; HealthResponse: ...\n\n<span class=\"tok-decorator\">@app<\/span>.post(<span class=\"tok-string\">\"/query\"<\/span>, response_model=QueryResponse)\n<span class=\"tok-keyword\">def<\/span> query(request: QueryRequest) -&gt; QueryResponse: ...<\/code><\/pre>\n<p>That's a deliberate, correct choice — not an oversight.<\/p>\n<p>Here's the mechanism. FastAPI runs plain <code>def<\/code> endpoints in a <strong>thread pool<\/strong>, automatically. So a slow sync handler — like <code>pipeline.query()<\/code>, which makes a blocking network call to the Anthropic API inside <code>CloudLLMClient.generate()<\/code> — occupies one pool thread, and nothing else. Other requests keep flowing on other threads.<\/p>\n<h2 id=\"the-footgun\">The footgun<\/h2>\n<p>Suppose <code>query<\/code> were <code>async def<\/code>, but still called the <em>blocking<\/em> Anthropic SDK inside. A blocking call inside <code>async def<\/code> freezes the <strong>entire event loop<\/strong> — the single thread every async request shares. Every concurrent request stalls behind it.<\/p>\n<pre><code>sync def + thread pool:      async def + blocking call inside:\n\nreq 1 ──[thread 1: waits]     req 1 ──[event loop: BLOCKED]\nreq 2 ──[thread 2: fine]      req 2 ──   ...stalled...\nreq 3 ──[thread 3: fine]      req 3 ──   ...stalled...<\/code><\/pre>\n<p>That's strictly worse than what DocsMind has today. <code>async def<\/code> is not a speed keyword — it's a contract: \"everything I await hands control back.\" Break the contract and you serialize your whole server.<\/p>\n<h2 id=\"when-async-def-would-actually-help-here\">When <code>async def<\/code> would actually help here<\/h2>\n<p><code>async def<\/code> earns its keep when the I/O call itself is <strong>awaitable<\/strong>. That means an async client — <code>httpx.AsyncClient<\/code>, or the Anthropic SDK's <code>AsyncAnthropic<\/code> — that hands control back to the event loop while waiting on the network, instead of occupying a whole thread.<\/p>\n<p>At DocsMind's current traffic (a demo server, <code>make serve<\/code>), the sync-plus-thread-pool setup is simpler and equally fine.<\/p>\n<p>It starts to matter at real concurrent load. Picture hundreds of simultaneous <code>/query<\/code> requests, each waiting seconds on Claude's API. Threads cost real OS memory each; hundreds is a practical ceiling. One async event loop can juggle thousands of waiting requests far more cheaply.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Threads (today)<\/th><th>Async (migration path)<\/th><\/tr><\/thead><tbody><tr><td>Cost per concurrent wait<\/td><td>one OS thread (~MBs of stack)<\/td><td>one task object (~KBs)<\/td><\/tr><tr><td>Practical ceiling<\/td><td>hundreds<\/td><td>tens of thousands<\/td><\/tr><tr><td>Code requirement<\/td><td>none — works with any library<\/td><td><em>every<\/em> library in the chain must be async-aware<\/td><\/tr><tr><td>Failure mode<\/td><td>pool exhaustion → queuing (graceful)<\/td><td>one blocking call → whole loop stalls (silent, severe)<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The migration itself — <code>aquery()<\/code>, <code>AsyncAnthropic<\/code> — is sketched in the FastAPI endpoint lesson in the separate RAG Interview Prep website.<\/p>\n<h2 id=\"how-youd-validate-a-concurrency-choice\">How you'd validate a concurrency choice<\/h2>\n<p>Load-test <code>/query<\/code> with increasing concurrent requests. Watch p50/p99 latency and error rate. Same measure-don't-assume discipline as every other choice in this repo: \"async is faster\" is only true under concurrent I/O-bound load, and only if you proved it on your own endpoint.<\/p>\n<p>→ Return to the <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">Concurrency overview<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"what-the-code-does-today","text":"What the code does today"},{"level":2,"id":"the-footgun","text":"The footgun"},{"level":2,"id":"when-async-def-would-actually-help-here","text":"When async def would actually help here"},{"level":2,"id":"how-youd-validate-a-concurrency-choice","text":"How you'd validate a concurrency choice"}],"text":"what docsmind's server actually does: and the async footgun 💡 tl;dr fastapi runs plain def endpoints in a thread pool automatically. that's why docsmind's blocking anthropic call is handled correctly today — and why naively adding async def would make things worse , not better. what the code does today look at serving/app.py . both endpoints are plain def , not async def : @app .get( \"/health\" , response_model=healthresponse) def health() -> healthresponse: ... @app .post( \"/query\" , response_model=queryresponse) def query(request: queryrequest) -> queryresponse: ... that's a deliberate, correct choice — not an oversight. here's the mechanism. fastapi runs plain def endpoints in a thread pool , automatically. so a slow sync handler — like pipeline.query() , which makes a blocking network call to the anthropic api inside cloudllmclient.generate() — occupies one pool thread, and nothing else. other requests keep flowing on other threads. the footgun suppose query were async def , but still called the blocking anthropic sdk inside. a blocking call inside async def freezes the entire event loop — the single thread every async request shares. every concurrent request stalls behind it. sync def + thread pool: async def + blocking call inside: req 1 ──[thread 1: waits] req 1 ──[event loop: blocked] req 2 ──[thread 2: fine] req 2 ── ...stalled... req 3 ──[thread 3: fine] req 3 ── ...stalled... that's strictly worse than what docsmind has today. async def is not a speed keyword — it's a contract: \"everything i await hands control back.\" break the contract and you serialize your whole server. when async def would actually help here async def earns its keep when the i/o call itself is awaitable . that means an async client — httpx.asyncclient , or the anthropic sdk's asyncanthropic — that hands control back to the event loop while waiting on the network, instead of occupying a whole thread. at docsmind's current traffic (a demo server, make serve ), the sync-plus-thread-pool setup is simpler and equally fine. it starts to matter at real concurrent load. picture hundreds of simultaneous /query requests, each waiting seconds on claude's api. threads cost real os memory each; hundreds is a practical ceiling. one async event loop can juggle thousands of waiting requests far more cheaply. threads (today) async (migration path) cost per concurrent wait one os thread (~mbs of stack) one task object (~kbs) practical ceiling hundreds tens of thousands code requirement none — works with any library every library in the chain must be async-aware failure mode pool exhaustion → queuing (graceful) one blocking call → whole loop stalls (silent, severe) the migration itself — aquery() , asyncanthropic — is sketched in the fastapi endpoint lesson in the separate rag interview prep website. how you'd validate a concurrency choice load-test /query with increasing concurrent requests. watch p50/p99 latency and error rate. same measure-don't-assume discipline as every other choice in this repo: \"async is faster\" is only true under concurrent i/o-bound load, and only if you proved it on your own endpoint. → return to the concurrency overview .","words":507},{"path":"07-production-python/README.md","title":"Overview","section":"7 · Production Python","quiz":false,"accent":"#5b7fd8","html":"<h1 id=\"production-python\">Production Python<\/h1>\n<p>Production quality is mostly explicit ownership and observable behaviour:<\/p>\n<ul><li>Who closes the file, session, task, or process?<\/li><li>What happens on timeout, cancellation, and partial failure?<\/li><li>Can tests replace external dependencies?<\/li><li>Can logs explain one request without leaking secrets?<\/li><li>Was performance measured before optimisation?<\/li><\/ul>\n<p>This chapter connects language mechanisms to those operational questions.<\/p>\n<h2 id=\"the-reliability-hierarchy\">The reliability hierarchy<\/h2>\n<ol><li>Correctness and clear invariants.<\/li><li>Deterministic cleanup.<\/li><li>Bounded resource use.<\/li><li>Useful tests and observability.<\/li><li>Measured optimisation.<\/li><\/ol>\n<p>Fast code that leaks resources or hides failures is not production-ready.<\/p>\n<p>→ Continue with <strong><a class=\"mdlink\" data-href=\"resources-context-managers.md\" href=\"#\">Resources and Context Managers<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"the-reliability-hierarchy","text":"The reliability hierarchy"}],"text":"production python production quality is mostly explicit ownership and observable behaviour: who closes the file, session, task, or process? what happens on timeout, cancellation, and partial failure? can tests replace external dependencies? can logs explain one request without leaking secrets? was performance measured before optimisation? this chapter connects language mechanisms to those operational questions. the reliability hierarchy correctness and clear invariants. deterministic cleanup. bounded resource use. useful tests and observability. measured optimisation. fast code that leaks resources or hides failures is not production-ready. → continue with resources and context managers .","words":91},{"path":"07-production-python/resources-context-managers.md","title":"Resources and Context Managers","section":"7 · Production Python","quiz":false,"accent":"#5b7fd8","html":"<h1 id=\"resources-and-context-managers\">Resources and Context Managers<\/h1>\n<p>Resources have lifecycles: acquire, use, release. A context manager makes the lifetime visible.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">with<\/span> <span class=\"tok-builtin\">open<\/span>(path) <span class=\"tok-keyword\">as<\/span> handle:\n    data = handle.read()<\/code><\/pre>\n<p><code>__enter__<\/code> acquires or returns the resource. <code>__exit__<\/code> receives exception information and performs cleanup even when the block fails.<\/p>\n<h2 id=\"protocol\">Protocol<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Transaction:\n    <span class=\"tok-keyword\">def<\/span> __enter__(<span class=\"tok-keyword\">self<\/span>):\n        <span class=\"tok-keyword\">self<\/span>.begin()\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-keyword\">self<\/span>\n\n    <span class=\"tok-keyword\">def<\/span> __exit__(<span class=\"tok-keyword\">self<\/span>, exc_type, exc, tb):\n        <span class=\"tok-keyword\">if<\/span> exc_type <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n            <span class=\"tok-keyword\">self<\/span>.commit()\n        <span class=\"tok-keyword\">else<\/span>:\n            <span class=\"tok-keyword\">self<\/span>.rollback()\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-keyword\">False<\/span>  <span class=\"tok-comment\"># do not suppress exceptions<\/span><\/code><\/pre>\n<p>Returning a truthy value from <code>__exit__<\/code> suppresses the active exception. Do that only deliberately.<\/p>\n<h2 id=\"generator-based-managers\">Generator-based managers<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> contextlib <span class=\"tok-keyword\">import<\/span> contextmanager\n\n<span class=\"tok-decorator\">@contextmanager<\/span>\n<span class=\"tok-keyword\">def<\/span> temporary_setting(config, value):\n    old = config.value\n    config.value = value\n    <span class=\"tok-keyword\">try<\/span>:\n        <span class=\"tok-keyword\">yield<\/span>\n    <span class=\"tok-keyword\">finally<\/span>:\n        config.value = old<\/code><\/pre>\n<p>Code before <code>yield<\/code> is entry; <code>finally<\/code> is exit.<\/p>\n<h2 id=\"multiple-dynamic-resources\">Multiple dynamic resources<\/h2>\n<p><code>contextlib.ExitStack<\/code> manages a runtime-determined number of context managers and releases them in reverse order.<\/p>\n<h2 id=\"why-not-rely-on-__del__\">Why not rely on <code>__del__<\/code><\/h2>\n<p>Finalisation timing differs across implementations and becomes complex with cycles and interpreter shutdown. Use context managers or explicit <code>close<\/code> methods for important resources.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>A context manager gives a resource a deterministic lexical lifetime. <code>__enter__<\/code> acquires it and <code>__exit__<\/code> always handles cleanup; a truthy <code>__exit__<\/code> return suppresses an exception. I avoid relying on finalisers for critical cleanup.<\/p><\/blockquote>","toc":[{"level":2,"id":"protocol","text":"Protocol"},{"level":2,"id":"generator-based-managers","text":"Generator-based managers"},{"level":2,"id":"multiple-dynamic-resources","text":"Multiple dynamic resources"},{"level":2,"id":"why-not-rely-on-__del__","text":"Why not rely on __del__"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"resources and context managers resources have lifecycles: acquire, use, release. a context manager makes the lifetime visible. with open (path) as handle: data = handle.read() __enter__ acquires or returns the resource. __exit__ receives exception information and performs cleanup even when the block fails. protocol class transaction: def __enter__( self ): self .begin() return self def __exit__( self , exc_type, exc, tb): if exc_type is none : self .commit() else : self .rollback() return false # do not suppress exceptions returning a truthy value from __exit__ suppresses the active exception. do that only deliberately. generator-based managers from contextlib import contextmanager @contextmanager def temporary_setting(config, value): old = config.value config.value = value try : yield finally : config.value = old code before yield is entry; finally is exit. multiple dynamic resources contextlib.exitstack manages a runtime-determined number of context managers and releases them in reverse order. why not rely on __del__ finalisation timing differs across implementations and becomes complex with cycles and interpreter shutdown. use context managers or explicit close methods for important resources. interview answer a context manager gives a resource a deterministic lexical lifetime. __enter__ acquires it and __exit__ always handles cleanup; a truthy __exit__ return suppresses an exception. i avoid relying on finalisers for critical cleanup.","words":205},{"path":"07-production-python/typing-testing-logging.md","title":"Typing, Testing and Logging","section":"7 · Production Python","quiz":false,"accent":"#5b7fd8","html":"<h1 id=\"typing-testing-and-logging\">Typing, Testing and Logging<\/h1>\n<h2 id=\"type-hints-are-a-design-tool\">Type hints are a design tool<\/h2>\n<p>Python normally does not enforce annotations at each call. Static checkers, IDEs, documentation, and frameworks consume them.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> collections.abc <span class=\"tok-keyword\">import<\/span> Iterable\n\n<span class=\"tok-keyword\">def<\/span> average(values: Iterable[<span class=\"tok-builtin\">float<\/span>]) -&gt; <span class=\"tok-builtin\">float<\/span>:\n    ...<\/code><\/pre>\n<p>Accept the smallest useful interface. If you only iterate, require <code>Iterable<\/code>, not <code>list<\/code>.<\/p>\n<p>Use <code>Protocol<\/code> for structural contracts and generics when the relationship between input and output types matters. Do not create complicated types that make code harder to understand than the bug they prevent.<\/p>\n<h2 id=\"tests-should-observe-behaviour\">Tests should observe behaviour<\/h2>\n<p>Separate pure decisions from I/O:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> should_retry(status: <span class=\"tok-builtin\">int<\/span>) -&gt; <span class=\"tok-builtin\">bool<\/span>:\n    <span class=\"tok-keyword\">return<\/span> status <span class=\"tok-keyword\">in<\/span> {<span class=\"tok-number\">429<\/span>, <span class=\"tok-number\">502<\/span>, <span class=\"tok-number\">503<\/span>, <span class=\"tok-number\">504<\/span>}<\/code><\/pre>\n<p>This function needs simple table-driven tests. The HTTP layer can then use a fake client and injected clock rather than real sleeps or network calls.<\/p>\n<p>Test:<\/p>\n<ul><li>normal behaviour;<\/li><li>boundaries and empty input;<\/li><li>failure and cleanup;<\/li><li>cancellation/timeouts for concurrent code;<\/li><li>properties or invariants where examples are insufficient.<\/li><\/ul>\n<h2 id=\"structured-logging\">Structured logging<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> logging\nlog = logging.getLogger(__name__)\n\nlog.info(<span class=\"tok-string\">\"job completed\"<\/span>, extra={<span class=\"tok-string\">\"job_id\"<\/span>: job.id, <span class=\"tok-string\">\"items\"<\/span>: count})<\/code><\/pre>\n<p>Named loggers provide origin and hierarchical configuration. Libraries should not configure global handlers. Applications own output formatting and destinations.<\/p>\n<p>Never log secrets, tokens, full personal data, or enormous payloads. Include stable request/job identifiers so related events can be correlated.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>Type hints document and statically check contracts but are not normally runtime enforcement. I separate pure logic from side effects for deterministic tests, inject external dependencies, and use module-level structured loggers with correlation fields and safe data.<\/p><\/blockquote>","toc":[{"level":2,"id":"type-hints-are-a-design-tool","text":"Type hints are a design tool"},{"level":2,"id":"tests-should-observe-behaviour","text":"Tests should observe behaviour"},{"level":2,"id":"structured-logging","text":"Structured logging"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"typing, testing and logging type hints are a design tool python normally does not enforce annotations at each call. static checkers, ides, documentation, and frameworks consume them. from collections.abc import iterable def average(values: iterable[ float ]) -> float : ... accept the smallest useful interface. if you only iterate, require iterable , not list . use protocol for structural contracts and generics when the relationship between input and output types matters. do not create complicated types that make code harder to understand than the bug they prevent. tests should observe behaviour separate pure decisions from i/o: def should_retry(status: int ) -> bool : return status in { 429 , 502 , 503 , 504 } this function needs simple table-driven tests. the http layer can then use a fake client and injected clock rather than real sleeps or network calls. test: normal behaviour; boundaries and empty input; failure and cleanup; cancellation/timeouts for concurrent code; properties or invariants where examples are insufficient. structured logging import logging log = logging.getlogger(__name__) log.info( \"job completed\" , extra={ \"job_id\" : job.id, \"items\" : count}) named loggers provide origin and hierarchical configuration. libraries should not configure global handlers. applications own output formatting and destinations. never log secrets, tokens, full personal data, or enormous payloads. include stable request/job identifiers so related events can be correlated. interview answer type hints document and statically check contracts but are not normally runtime enforcement. i separate pure logic from side effects for deterministic tests, inject external dependencies, and use module-level structured loggers with correlation fields and safe data.","words":257},{"path":"07-production-python/performance-memory.md","title":"Performance and Memory","section":"7 · Production Python","quiz":false,"accent":"#5b7fd8","html":"<h1 id=\"performance-and-memory\">Performance and Memory<\/h1>\n<h2 id=\"measure-before-changing-code\">Measure before changing code<\/h2>\n<p>Choose a tool based on the question:<\/p>\n<ul><li>elapsed duration: <code>time.perf_counter<\/code>;<\/li><li>repeated microbenchmark: <code>timeit<\/code>;<\/li><li>function-level CPU: <code>cProfile<\/code>;<\/li><li>line-level detail: a line profiler;<\/li><li>Python allocation growth: <code>tracemalloc<\/code>;<\/li><li>process memory: OS metrics plus native-allocation tools when needed.<\/li><\/ul>\n<p>Use a monotonic clock for durations because wall time can jump.<\/p>\n<h2 id=\"complexity-first\">Complexity first<\/h2>\n<p>Replacing an <code>O(n²)<\/code> scan with a set-based <code>O(n)<\/code> pass matters more than a tiny syntax optimisation.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># quadratic membership in a list<\/span>\nduplicates = [x <span class=\"tok-keyword\">for<\/span> x <span class=\"tok-keyword\">in<\/span> values <span class=\"tok-keyword\">if<\/span> x <span class=\"tok-keyword\">in<\/span> seen_list]\n\n<span class=\"tok-comment\"># average O(1) membership<\/span>\nseen = <span class=\"tok-builtin\">set<\/span>()<\/code><\/pre>\n<p>Account for memory as well as time. A set buys fast lookup by storing additional hash-table structure.<\/p>\n<h2 id=\"common-memory-growth-sources\">Common memory growth sources<\/h2>\n<ul><li>unbounded caches and queues;<\/li><li>references retained by callbacks or global registries;<\/li><li>finished async tasks kept in collections;<\/li><li>large slices/copies;<\/li><li>native libraries allocating outside Python's tracked heap;<\/li><li>loading a whole dataset instead of streaming.<\/li><\/ul>\n<h2 id=\"lru_cache-trade-offs\"><code>lru_cache<\/code> trade-offs<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> functools <span class=\"tok-keyword\">import<\/span> lru_cache\n\n<span class=\"tok-decorator\">@lru_cache<\/span>(maxsize=<span class=\"tok-number\">1024<\/span>)\n<span class=\"tok-keyword\">def<\/span> lookup(key):\n    ...<\/code><\/pre>\n<p>Arguments must be hashable. The cache is process-local and retains keys and values until eviction. It does not provide shared invalidation across workers, and concurrent callers may still duplicate a computation.<\/p>\n<h2 id=\"a-diagnostic-sequence\">A diagnostic sequence<\/h2>\n<ol><li>Confirm the metric really grows under a repeatable workload.<\/li><li>Separate Python heap, native heap, file buffers, and cache behaviour.<\/li><li>Compare <code>tracemalloc<\/code> snapshots.<\/li><li>Inspect queues, caches, task collections, and ownership.<\/li><li>Fix the reference/lifecycle and repeat the same load test.<\/li><\/ol>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>I start with a representative benchmark and the right profiler, fix algorithmic complexity first, and measure again. For memory growth I inspect ownership, queues, caches, task lifetimes, and distinguish Python allocations from native process memory.<\/p><\/blockquote>","toc":[{"level":2,"id":"measure-before-changing-code","text":"Measure before changing code"},{"level":2,"id":"complexity-first","text":"Complexity first"},{"level":2,"id":"common-memory-growth-sources","text":"Common memory growth sources"},{"level":2,"id":"lru_cache-trade-offs","text":"lru_cache trade-offs"},{"level":2,"id":"a-diagnostic-sequence","text":"A diagnostic sequence"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"performance and memory measure before changing code choose a tool based on the question: elapsed duration: time.perf_counter ; repeated microbenchmark: timeit ; function-level cpu: cprofile ; line-level detail: a line profiler; python allocation growth: tracemalloc ; process memory: os metrics plus native-allocation tools when needed. use a monotonic clock for durations because wall time can jump. complexity first replacing an o(n²) scan with a set-based o(n) pass matters more than a tiny syntax optimisation. # quadratic membership in a list duplicates = [x for x in values if x in seen_list] # average o(1) membership seen = set () account for memory as well as time. a set buys fast lookup by storing additional hash-table structure. common memory growth sources unbounded caches and queues; references retained by callbacks or global registries; finished async tasks kept in collections; large slices/copies; native libraries allocating outside python's tracked heap; loading a whole dataset instead of streaming. lru_cache trade-offs from functools import lru_cache @lru_cache (maxsize= 1024 ) def lookup(key): ... arguments must be hashable. the cache is process-local and retains keys and values until eviction. it does not provide shared invalidation across workers, and concurrent callers may still duplicate a computation. a diagnostic sequence confirm the metric really grows under a repeatable workload. separate python heap, native heap, file buffers, and cache behaviour. compare tracemalloc snapshots. inspect queues, caches, task collections, and ownership. fix the reference/lifecycle and repeat the same load test. interview answer i start with a representative benchmark and the right profiler, fix algorithmic complexity first, and measure again. for memory growth i inspect ownership, queues, caches, task lifetimes, and distinguish python allocations from native process memory.","words":275},{"path":"08-coding-practice/README.md","title":"How to Approach Coding Rounds","section":"8 · Coding Practice","quiz":false,"accent":"#8a67d5","html":"<h1 id=\"how-to-approach-python-coding-rounds\">How to Approach Python Coding Rounds<\/h1>\n<p>A good coding-round solution is not the shortest code. It is a correct solution whose reasoning an interviewer can follow.<\/p>\n<h2 id=\"the-six-step-loop\">The six-step loop<\/h2>\n<ol><li>Restate the input, output, and constraints.<\/li><li>Work one small example by hand.<\/li><li>Name a simple solution and its complexity.<\/li><li>Identify the data structure or invariant that improves it.<\/li><li>Implement in small, readable steps.<\/li><li>Test normal, boundary, and failure cases aloud.<\/li><\/ol>\n<h2 id=\"speak-in-invariants\">Speak in invariants<\/h2>\n<p>For a sliding window:<\/p>\n<blockquote><p>“The window contains no duplicate characters. When the right side creates a duplicate, I move the left side past the previous occurrence. Each pointer moves only forward, so the total work is linear.”<\/p><\/blockquote>\n<p>That explanation is stronger than silently typing a familiar template.<\/p>\n<h2 id=\"python-choices-interviewers-notice\">Python choices interviewers notice<\/h2>\n<ul><li><code>enumerate<\/code> instead of manual index bookkeeping.<\/li><li><code>zip(..., strict=True)<\/code> when unequal lengths are an error.<\/li><li>a <code>set<\/code> for membership, <code>dict<\/code>/<code>Counter<\/code> for counts, <code>deque<\/code> for both-ended operations.<\/li><li>comprehensions only when they remain readable.<\/li><li>generators when streaming is a real requirement.<\/li><li>explicit error behaviour rather than broad exception swallowing.<\/li><\/ul>\n<h2 id=\"complexity-checklist\">Complexity checklist<\/h2>\n<p>State time and auxiliary space. Mention important hidden costs:<\/p>\n<ul><li><code>x in list<\/code> is <code>O(n)<\/code>; in a set/dict it is average <code>O(1)<\/code>.<\/li><li>slicing a list or string copies <code>O(k)<\/code> data.<\/li><li>sorting is <code>O(n log n)<\/code> and usually materialises/changes order.<\/li><li>repeated string concatenation in a loop can copy repeatedly; collect parts and <code>\"\".join<\/code>.<\/li><\/ul>\n<p>→ Try <strong><a class=\"mdlink\" data-href=\"problems.md\" href=\"#\">Practice Problems<\/a><\/strong> before opening the solutions.<\/p>","toc":[{"level":2,"id":"the-six-step-loop","text":"The six-step loop"},{"level":2,"id":"speak-in-invariants","text":"Speak in invariants"},{"level":2,"id":"python-choices-interviewers-notice","text":"Python choices interviewers notice"},{"level":2,"id":"complexity-checklist","text":"Complexity checklist"}],"text":"how to approach python coding rounds a good coding-round solution is not the shortest code. it is a correct solution whose reasoning an interviewer can follow. the six-step loop restate the input, output, and constraints. work one small example by hand. name a simple solution and its complexity. identify the data structure or invariant that improves it. implement in small, readable steps. test normal, boundary, and failure cases aloud. speak in invariants for a sliding window: “the window contains no duplicate characters. when the right side creates a duplicate, i move the left side past the previous occurrence. each pointer moves only forward, so the total work is linear.” that explanation is stronger than silently typing a familiar template. python choices interviewers notice enumerate instead of manual index bookkeeping. zip(..., strict=true) when unequal lengths are an error. a set for membership, dict / counter for counts, deque for both-ended operations. comprehensions only when they remain readable. generators when streaming is a real requirement. explicit error behaviour rather than broad exception swallowing. complexity checklist state time and auxiliary space. mention important hidden costs: x in list is o(n) ; in a set/dict it is average o(1) . slicing a list or string copies o(k) data. sorting is o(n log n) and usually materialises/changes order. repeated string concatenation in a loop can copy repeatedly; collect parts and \"\".join . → try practice problems before opening the solutions.","words":235},{"path":"08-coding-practice/problems.md","title":"Practice Problems","section":"8 · Coding Practice","quiz":false,"accent":"#8a67d5","html":"<h1 id=\"practice-problems\">Practice Problems<\/h1>\n<p>Do not open the solutions until you have written code, tests, and complexity for each attempt.<\/p>\n<h2 id=\"1-first-non-repeating-character\">1. First non-repeating character<\/h2>\n<p>Write <code>first_unique(text)<\/code> returning the first character that occurs once, or <code>None<\/code>.<\/p>\n<p>Examples:<\/p>\n<pre><code class=\"language-python\">first_unique(<span class=\"tok-string\">\"swiss\"<\/span>)   <span class=\"tok-comment\"># \"w\"<\/span>\nfirst_unique(<span class=\"tok-string\">\"aabb\"<\/span>)    <span class=\"tok-comment\"># None<\/span><\/code><\/pre>\n<p>Target: <code>O(n)<\/code> time. Explain why a dictionary preserves enough information.<\/p>\n<h2 id=\"2-lazy-chunk-reader\">2. Lazy chunk reader<\/h2>\n<p>Write <code>chunks(iterable, size)<\/code> that lazily yields tuples of at most <code>size<\/code> items. Reject non-positive sizes.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">list<\/span>(chunks(<span class=\"tok-builtin\">range<\/span>(<span class=\"tok-number\">7<\/span>), <span class=\"tok-number\">3<\/span>))\n<span class=\"tok-comment\"># [(0, 1, 2), (3, 4, 5), (6,)]<\/span><\/code><\/pre>\n<p>Do not materialise the full iterable. Test it with a generator.<\/p>\n<h2 id=\"3-merge-overlapping-intervals\">3. Merge overlapping intervals<\/h2>\n<p>Given <code>(start, end)<\/code> pairs, merge overlaps.<\/p>\n<pre><code class=\"language-python\">merge([(<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">3<\/span>), (<span class=\"tok-number\">2<\/span>, <span class=\"tok-number\">6<\/span>), (<span class=\"tok-number\">8<\/span>, <span class=\"tok-number\">10<\/span>), (<span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">12<\/span>)])\n<span class=\"tok-comment\"># [(1, 6), (8, 12)]<\/span><\/code><\/pre>\n<p>State whether touching intervals merge and validate <code>start &lt;= end<\/code>.<\/p>\n<h2 id=\"4-retry-decorator\">4. Retry decorator<\/h2>\n<p>Implement <code>@retry(attempts, exceptions)<\/code> that retries only the supplied exception types, preserves metadata, and re-raises the last error. Do not add sleep yet.<\/p>\n<p>Discuss what production features are missing: idempotency, deadline, backoff, jitter, observability, and cancellation.<\/p>\n<h2 id=\"5-bounded-async-map\">5. Bounded async map<\/h2>\n<p>Implement <code>async_map(func, items, limit)<\/code> that runs at most <code>limit<\/code> awaitable calls concurrently and returns results in input order.<\/p>\n<p>Test that:<\/p>\n<ul><li>active work never exceeds the limit;<\/li><li>output order matches input order;<\/li><li>one failure cancels/cleans up the remaining work.<\/li><\/ul>\n<h2 id=

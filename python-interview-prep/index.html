\"6-lru-cache-without-functools\">6. LRU cache without <code>functools<\/code><\/h2>\n<p>Design a fixed-capacity cache with <code>get<\/code> and <code>put<\/code> in average <code>O(1)<\/code>. First name the two data structures needed and the invariant connecting them.<\/p>\n<h2 id=\"7-flatten-nested-values-safely\">7. Flatten nested values safely<\/h2>\n<p>Flatten arbitrarily nested lists/tuples, but treat strings and bytes as scalar values. Provide both recursive and iterative versions, and discuss cycles.<\/p>\n<h2 id=\"8-log-file-pipeline\">8. Log file pipeline<\/h2>\n<p>Read a large text stream, parse valid JSON lines, filter for error events, transform to <code>(service, message)<\/code>, and count by service. Decide which stages should be lazy and where errors should be recorded.<\/p>","toc":[{"level":2,"id":"1-first-non-repeating-character","text":"1. First non-repeating character"},{"level":2,"id":"2-lazy-chunk-reader","text":"2. Lazy chunk reader"},{"level":2,"id":"3-merge-overlapping-intervals","text":"3. Merge overlapping intervals"},{"level":2,"id":"4-retry-decorator","text":"4. Retry decorator"},{"level":2,"id":"5-bounded-async-map","text":"5. Bounded async map"},{"level":2,"id":"6-lru-cache-without-functools","text":"6. LRU cache without functools"},{"level":2,"id":"7-flatten-nested-values-safely","text":"7. Flatten nested values safely"},{"level":2,"id":"8-log-file-pipeline","text":"8. Log file pipeline"}],"text":"practice problems do not open the solutions until you have written code, tests, and complexity for each attempt. 1. first non-repeating character write first_unique(text) returning the first character that occurs once, or none . examples: first_unique( \"swiss\" ) # \"w\" first_unique( \"aabb\" ) # none target: o(n) time. explain why a dictionary preserves enough information. 2. lazy chunk reader write chunks(iterable, size) that lazily yields tuples of at most size items. reject non-positive sizes. list (chunks( range ( 7 ), 3 )) # [(0, 1, 2), (3, 4, 5), (6,)] do not materialise the full iterable. test it with a generator. 3. merge overlapping intervals given (start, end) pairs, merge overlaps. merge([( 1 , 3 ), ( 2 , 6 ), ( 8 , 10 ), ( 10 , 12 )]) # [(1, 6), (8, 12)] state whether touching intervals merge and validate start <= end . 4. retry decorator implement @retry(attempts, exceptions) that retries only the supplied exception types, preserves metadata, and re-raises the last error. do not add sleep yet. discuss what production features are missing: idempotency, deadline, backoff, jitter, observability, and cancellation. 5. bounded async map implement async_map(func, items, limit) that runs at most limit awaitable calls concurrently and returns results in input order. test that: active work never exceeds the limit; output order matches input order; one failure cancels/cleans up the remaining work. 6. lru cache without functools design a fixed-capacity cache with get and put in average o(1) . first name the two data structures needed and the invariant connecting them. 7. flatten nested values safely flatten arbitrarily nested lists/tuples, but treat strings and bytes as scalar values. provide both recursive and iterative versions, and discuss cycles. 8. log file pipeline read a large text stream, parse valid json lines, filter for error events, transform to (service, message) , and count by service. decide which stages should be lazy and where errors should be recorded.","words":320},{"path":"08-coding-practice/solutions.md","title":"Worked Solutions","section":"8 · Coding Practice","quiz":false,"accent":"#8a67d5","html":"<h1 id=\"worked-solutions\">Worked Solutions<\/h1>\n<p>These are readable reference solutions, not the only valid answers.<\/p>\n<h2 id=\"1-first-unique-character\">1. First unique character<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> collections <span class=\"tok-keyword\">import<\/span> Counter\n\n<span class=\"tok-keyword\">def<\/span> first_unique(text: <span class=\"tok-builtin\">str<\/span>) -&gt; <span class=\"tok-builtin\">str<\/span> | <span class=\"tok-keyword\">None<\/span>:\n    counts = Counter(text)\n    <span class=\"tok-keyword\">return<\/span> next((char <span class=\"tok-keyword\">for<\/span> char <span class=\"tok-keyword\">in<\/span> text <span class=\"tok-keyword\">if<\/span> counts[char] == <span class=\"tok-number\">1<\/span>), <span class=\"tok-keyword\">None<\/span>)<\/code><\/pre>\n<p>Counting and scanning are each <code>O(n)<\/code>; the counter uses <code>O(k)<\/code> space for distinct characters. The second pass preserves original order.<\/p>\n<h2 id=\"2-lazy-chunks\">2. Lazy chunks<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> itertools <span class=\"tok-keyword\">import<\/span> islice\n\n<span class=\"tok-keyword\">def<\/span> chunks(iterable, size):\n    <span class=\"tok-keyword\">if<\/span> size &lt;= <span class=\"tok-number\">0<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> ValueError(<span class=\"tok-string\">\"size must be positive\"<\/span>)\n    iterator = iter(iterable)\n    <span class=\"tok-keyword\">while<\/span> batch := <span class=\"tok-builtin\">tuple<\/span>(islice(iterator, size)):\n        <span class=\"tok-keyword\">yield<\/span> batch<\/code><\/pre>\n<p>This holds at most one batch and works with one-pass sources. On modern Python, <code>itertools.batched<\/code> already provides this operation.<\/p>\n<h2 id=\"3-merge-intervals\">3. Merge intervals<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> merge(intervals):\n    ordered = sorted(intervals)\n    merged = []\n    <span class=\"tok-keyword\">for<\/span> start, end <span class=\"tok-keyword\">in<\/span> ordered:\n        <span class=\"tok-keyword\">if<\/span> start &gt; end:\n            <span class=\"tok-keyword\">raise<\/span> ValueError(<span class=\"tok-string\">\"invalid interval\"<\/span>)\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> merged <span class=\"tok-keyword\">or<\/span> start &gt; merged[-<span class=\"tok-number\">1<\/span>][<span class=\"tok-number\">1<\/span>]:\n            merged.append([start, end])\n        <span class=\"tok-keyword\">else<\/span>:\n            merged[-<span class=\"tok-number\">1<\/span>][<span class=\"tok-number\">1<\/span>] = <span class=\"tok-builtin\">max<\/span>(merged[-<span class=\"tok-number\">1<\/span>][<span class=\"tok-number\">1<\/span>], end)\n    <span class=\"tok-keyword\">return<\/span> [<span class=\"tok-builtin\">tuple<\/span>(item) <span class=\"tok-keyword\">for<\/span> item <span class=\"tok-keyword\">in<\/span> merged]<\/code><\/pre>\n<p>Sorting dominates at <code>O(n log n)<\/code>; the scan is linear. <code>start &gt; previous_end<\/code> means touching intervals merge.<\/p>\n<h2 id=\"4-retry-decorator\">4. Retry decorator<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> functools <span class=\"tok-keyword\">import<\/span> wraps\n\n<span class=\"tok-keyword\">def<\/span> retry(attempts, exceptions):\n    <span class=\"tok-keyword\">if<\/span> attempts &lt; <span class=\"tok-number\">1<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> ValueError(<span class=\"tok-string\">\"attempts must be positive\"<\/span>)\n\n    <span class=\"tok-keyword\">def<\/span> decorate(fn):\n        <span class=\"tok-decorator\">@wraps<\/span>(fn)\n        <span class=\"tok-keyword\">def<\/span> wrapper(*args, **kwargs):\n            <span class=\"tok-keyword\">for<\/span> attempt <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(attempts):\n                <span class=\"tok-keyword\">try<\/span>:\n                    <span class=\"tok-keyword\">return<\/span> fn(*args, **kwargs)\n                <span class=\"tok-keyword\">except<\/span> exceptions:\n                    <span class=\"tok-keyword\">if<\/span> attempt == attempts - <span class=\"tok-number\">1<\/span>:\n                        <span class=\"tok-keyword\">raise<\/span>\n        <span class=\"tok-keyword\">return<\/span> wrapper\n    <span class=\"tok-keyword\">return<\/span> decorate<\/code><\/pre>\n<p>Production retry logic also needs a total deadline, exponential backoff with jitter, careful idempotency, selective status/error rules, and cancellation awareness.<\/p>\n<h2 id=\"5-bounded-async-map\">5. Bounded async map<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> asyncio\n\n<span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">def<\/span> async_map(func, items, limit):\n    semaphore = asyncio.Semaphore(limit)\n\n    <span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">def<\/span> run(item):\n        <span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">with<\/span> semaphore:\n            <span class=\"tok-keyword\">return<\/span> <span class=\"tok-keyword\">await<\/span> func(item)\n\n    <span class=\"tok-keyword\">async<\/span> <span class=\"tok-keyword\">with<\/span> asyncio.TaskGroup() <span class=\"tok-keyword\">as<\/span> group:\n        tasks = [group.create_task(run(item)) <span class=\"tok-keyword\">for<\/span> item <span class=\"tok-keyword\">in<\/span> items]\n    <span class=\"tok-keyword\">return<\/span> [task.result() <span class=\"tok-keyword\">for<\/span> task <span class=\"tok-keyword\">in<\/span> tasks]<\/code><\/pre>\n<p>Task creation is eager here, though execution inside <code>func<\/code> is bounded. For millions of items, use a bounded worker queue so task objects are also bounded.<\/p>\n<h2 id=\"6-lru-design\">6. LRU design<\/h2>\n<p>Use a dictionary from key to node plus a doubly linked list ordered by recency. The dictionary gives lookup; the list gives <code>O(1)<\/code> removal, promotion, and eviction. In real code, <code>collections.OrderedDict<\/code> or <code>functools.lru_cache<\/code> may be the clearer tool.<\/p>\n<h2 id=\"7-iterative-flatten\">7. Iterative flatten<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> flatten(value):\n    stack = [value]\n    <span class=\"tok-keyword\">while<\/span> stack:\n        current = stack.pop()\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">isinstance<\/span>(current, (<span class=\"tok-builtin\">list<\/span>, <span class=\"tok-builtin\">tuple<\/span>)):\n            stack.extend(reversed(current))\n        <span class=\"tok-keyword\">else<\/span>:\n            <span class=\"tok-keyword\">yield<\/span> current<\/code><\/pre>\n<p>This avoids recursion depth limits. To support cyclic containers, track active object identities and define whether a repeated container is skipped or rejected.<\/p>\n<h2 id=\"8-streaming-logs\">8. Streaming logs<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> json\n<span class=\"tok-keyword\">from<\/span> collections <span class=\"tok-keyword\">import<\/span> Counter\n\n<span class=\"tok-keyword\">def<\/span> error_services(lines, on_bad_line):\n    counts = Counter()\n    <span class=\"tok-keyword\">for<\/span> number, line <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">enumerate<\/span>(lines, <span class=\"tok-number\">1<\/span>):\n        <span class=\"tok-keyword\">try<\/span>:\n            event = json.loads(line)\n        <span class=\"tok-keyword\">except<\/span> json.JSONDecodeError <span class=\"tok-keyword\">as<\/span> exc:\n            on_bad_line(number, exc)\n            <span class=\"tok-keyword\">continue<\/span>\n        <span class=\"tok-keyword\">if<\/span> event.get(<span class=\"tok-string\">\"level\"<\/span>) == <span class=\"tok-string\">\"error\"<\/span>:\n            counts[event.get(<span class=\"tok-string\">\"service\"<\/span>, <span class=\"tok-string\">\"unknown\"<\/span>)] += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-keyword\">return<\/span> counts<\/code><\/pre>\n<p>The source is streamed and errors are handled narrowly. Since the final result is aggregate state, a direct loop is clearer than forcing every step through <code>map<\/code> and <code>filter<\/code>.<\/p>","toc":[{"level":2,"id":"1-first-unique-character","text":"1. First unique character"},{"level":2,"id":"2-lazy-chunks","text":"2. Lazy chunks"},{"level":2,"id":"3-merge-intervals","text":"3. Merge intervals"},{"level":2,"id":"4-retry-decorator","text":"4. Retry decorator"},{"level":2,"id":"5-bounded-async-map","text":"5. Bounded async map"},{"level":2,"id":"6-lru-design","text":"6. LRU design"},{"level":2,"id":"7-iterative-flatten","text":"7. Iterative flatten"},{"level":2,"id":"8-streaming-logs","text":"8. Streaming logs"}],"text":"worked solutions these are readable reference solutions, not the only valid answers. 1. first unique character from collections import counter def first_unique(text: str ) -> str | none : counts = counter(text) return next((char for char in text if counts[char] == 1 ), none ) counting and scanning are each o(n) ; the counter uses o(k) space for distinct characters. the second pass preserves original order. 2. lazy chunks from itertools import islice def chunks(iterable, size): if size <= 0 : raise valueerror( \"size must be positive\" ) iterator = iter(iterable) while batch := tuple (islice(iterator, size)): yield batch this holds at most one batch and works with one-pass sources. on modern python, itertools.batched already provides this operation. 3. merge intervals def merge(intervals): ordered = sorted(intervals) merged = [] for start, end in ordered: if start > end: raise valueerror( \"invalid interval\" ) if not merged or start > merged[- 1 ][ 1 ]: merged.append([start, end]) else : merged[- 1 ][ 1 ] = max (merged[- 1 ][ 1 ], end) return [ tuple (item) for item in merged] sorting dominates at o(n log n) ; the scan is linear. start > previous_end means touching intervals merge. 4. retry decorator from functools import wraps def retry(attempts, exceptions): if attempts < 1 : raise valueerror( \"attempts must be positive\" ) def decorate(fn): @wraps (fn) def wrapper(*args, **kwargs): for attempt in range (attempts): try : return fn(*args, **kwargs) except exceptions: if attempt == attempts - 1 : raise return wrapper return decorate production retry logic also needs a total deadline, exponential backoff with jitter, careful idempotency, selective status/error rules, and cancellation awareness. 5. bounded async map import asyncio async def async_map(func, items, limit): semaphore = asyncio.semaphore(limit) async def run(item): async with semaphore: return await func(item) async with asyncio.taskgroup() as group: tasks = [group.create_task(run(item)) for item in items] return [task.result() for task in tasks] task creation is eager here, though execution inside func is bounded. for millions of items, use a bounded worker queue so task objects are also bounded. 6. lru design use a dictionary from key to node plus a doubly linked list ordered by recency. the dictionary gives lookup; the list gives o(1) removal, promotion, and eviction. in real code, collections.ordereddict or functools.lru_cache may be the clearer tool. 7. iterative flatten def flatten(value): stack = [value] while stack: current = stack.pop() if isinstance (current, ( list , tuple )): stack.extend(reversed(current)) else : yield current this avoids recursion depth limits. to support cyclic containers, track active object identities and define whether a repeated container is skipped or rejected. 8. streaming logs import json from collections import counter def error_services(lines, on_bad_line): counts = counter() for number, line in enumerate (lines, 1 ): try : event = json.loads(line) except json.jsondecodeerror as exc: on_bad_line(number, exc) continue if event.get( \"level\" ) == \"error\" : counts[event.get( \"service\" , \"unknown\" )] += 1 return counts the source is streamed and errors are handled narrowly. since the final result is aggregate state, a direct loop is clearer than forcing every step through map and filter .","words":508},{"path":"09-interview-practice/README.md","title":"How to Answer Out Loud","section":"9 · Interview Practice","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"how-to-answer-python-questions-out-loud\">How to Answer Python Questions Out Loud<\/h1>\n<p>A correct answer can still sound weak if it is unstructured. Use four moves:<\/p>\n<ol><li><strong>Definition:<\/strong> answer the exact question immediately.<\/li><li><strong>Mechanism:<\/strong> explain what Python does.<\/li><li><strong>Trade-off:<\/strong> show judgement, not only recall.<\/li><li><strong>Example:<\/strong> prove the idea with tiny code.<\/li><\/ol>\n<h2 id=\"example-generators\">Example: generators<\/h2>\n<p>Weak:<\/p>\n<blockquote><p>“Generators use yield and save memory.”<\/p><\/blockquote>\n<p>Strong:<\/p>\n<blockquote><p>“A generator is an iterator whose function suspends at <code>yield<\/code>, preserving its local execution state. It computes values on demand, so it is useful for large or streaming inputs. The trade-off is that it is one-pass and failures happen during consumption. For example, <code>(parse(line) for line in file)<\/code> processes lines lazily.”<\/p><\/blockquote>\n<h2 id=\"handling-follow-ups\">Handling follow-ups<\/h2>\n<p>Pause and identify the dimension being tested:<\/p>\n<ul><li>semantics: what does Python guarantee?<\/li><li>implementation: what does CPython usually do?<\/li><li>trade-off: when would you choose the alternative?<\/li><li>failure: what happens for empty, invalid, cancelled, or overloaded input?<\/li><li>production: how is it bounded, observed, and cleaned up?<\/li><\/ul>\n<p>Do not guess implementation details as language guarantees. Say “In standard CPython…” when discussing the GIL, reference counting, or object interning.<\/p>\n<h2 id=\"practise-in-the-right-order\">Practise in the right order<\/h2>\n<ol><li>Use the hard question bank with answers visible.<\/li><li>Hide answers and speak for 30–60 seconds.<\/li><li>Filter to misses.<\/li><li>Run the 45-minute mock without notes.<\/li><li>Use the cheat sheet only the morning of the interview.<\/li><\/ol>","toc":[{"level":2,"id":"example-generators","text":"Example: generators"},{"level":2,"id":"handling-follow-ups","text":"Handling follow-ups"},{"level":2,"id":"practise-in-the-right-order","text":"Practise in the right order"}],"text":"how to answer python questions out loud a correct answer can still sound weak if it is unstructured. use four moves: definition: answer the exact question immediately. mechanism: explain what python does. trade-off: show judgement, not only recall. example: prove the idea with tiny code. example: generators weak: “generators use yield and save memory.” strong: “a generator is an iterator whose function suspends at yield , preserving its local execution state. it computes values on demand, so it is useful for large or streaming inputs. the trade-off is that it is one-pass and failures happen during consumption. for example, (parse(line) for line in file) processes lines lazily.” handling follow-ups pause and identify the dimension being tested: semantics: what does python guarantee? implementation: what does cpython usually do? trade-off: when would you choose the alternative? failure: what happens for empty, invalid, cancelled, or overloaded input? production: how is it bounded, observed, and cleaned up? do not guess implementation details as language guarantees. say “in standard cpython…” when discussing the gil, reference counting, or object interning. practise in the right order use the hard question bank with answers visible. hide answers and speak for 30–60 seconds. filter to misses. run the 45-minute mock without notes. use the cheat sheet only the morning of the interview.","words":213},{"path":"09-interview-practice/question-bank.md","title":"Hard Question Bank","section":"9 · Interview Practice","quiz":true,"accent":"#cc5fab","html":"<h1 id=\"hard-python-question-bank\">Hard Python Question Bank<\/h1>\n<p>Hide the answers, speak first, then grade yourself: <strong>Again<\/strong> if the mechanism was missing, <strong>Hard<\/strong> if you needed hints, <strong>Good<\/strong> if the answer was clear, and <strong>Easy<\/strong> only if you handled the follow-up too.<\/p>\n<h2 id=\"map-filter-and-reduce\">Map, filter and reduce<\/h2>\n<details class=\"qa\" open><summary>Q: What are <code>map<\/code>, <code>filter<\/code>, and <code>reduce<\/code>?<\/summary><div class=\"qa-body\"><p><code>map<\/code> transforms every item through a callable, <code>filter<\/code> yields original items whose predicate is truthy, and <code>reduce<\/code> repeatedly combines an accumulator with the next item into one result. In Python 3, <code>map<\/code> and <code>filter<\/code> are lazy iterators. Comprehensions and specialised reductions are often clearer.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does <code>list(map(pow, [2, 3, 4], [3, 2]))<\/code> return, and why?<\/summary><div class=\"qa-body\"><p><code>[8, 9]<\/code>. <code>map<\/code> calls <code>pow(2, 3)<\/code> and <code>pow(3, 2)<\/code>, then stops at the shortest iterable. The <code>4<\/code> is not consumed.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does <code>filter(None, values)<\/code> do?<\/summary><div class=\"qa-body\"><p>It lazily yields items whose own truth value is true. It removes all falsy values—not only <code>None<\/code>.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why can <code>reduce(fn, [])<\/code> fail?<\/summary><div class=\"qa-body\"><p>Without an initializer, <code>reduce<\/code> needs the first item as its accumulator. Empty input has none, so it raises <code>TypeError<\/code>. An initializer also defines the empty-input result.<\/p><\/div><\/details><h2 id=\"names-objects-and-scope\">Names, objects and scope<\/h2>\n<details class=\"qa\" open><summary>Q: Explain Python's parameter-passing model.<\/summary><div class=\"qa-body\"><p>Call by sharing: parameters are local names bound to the same passed objects. Mutating a passed mutable object is visible to the caller; rebinding the local parameter is not.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does <code>[[0]] * 3<\/code> cause surprising mutation?<\/summary><div class=\"qa-body\"><p>Repetition copies the same inner-list reference into three positions. There is one nested list, not three. Use a comprehension to create each inner list separately.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is the difference between <code>is<\/code> and <code>==<\/code>?<\/summary><div class=\"qa-body\"><p><code>is<\/code> compares object identity; <code>==<\/code> invokes value equality. Use <code>is<\/code> for <code>None<\/code> and deliberate sentinels, not for ordinary numbers or strings.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What makes an object hashable?<\/summary><div class=\"qa-body\"><p>It has a stable hash and equality semantics obeying: equal objects have equal hashes. Mutable value objects generally should not be hashable because a changing hash would break dictionary/set lookup.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why can a tuple be unhashable?<\/summary><div class=\"qa-body\"><p>A tuple's hash depends on its elements. If it contains an unhashable item such as a list, the tuple is also unhashable.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Explain late binding in closures.<\/summary><div class=\"qa-body\"><p>Free variables are looked up when the inner function is called. Functions created in a loop can therefore all see the loop's final value. Freeze the current value with a default argument or <code>functools.partial<\/code>.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why are mutable defaults dangerous?<\/summary><div class=\"qa-body\"><p>Default expressions are evaluated once when the <code>def<\/code> executes. The same object is reused across calls. Use <code>None<\/code> or a private sentinel and allocate inside.<\/p><\/div><\/details><h2 id=\"functions-and-errors\">Functions and errors<\/h2>\n<details class=\"qa\" open><summary>Q: What do <code>/<\/code> and <code>*<\/code> mean in a function signature?<\/summary><div class=\"qa-body\"><p>Parameters before <code>/<\/code> are positional-only. Parameters after bare <code>*<\/code> are keyword-only. Between them, parameters accept either form.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why use <code>functools.wraps<\/code>?<\/summary><div class=\"qa-body\"><p>It preserves metadata such as name and documentation and sets <code>__wrapped__<\/code>, helping introspection, signature tools, frameworks, and debugging.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is EAFP, and what is its main risk?<\/summary><div class=\"qa-body\"><p>Try the operation and handle the expected exception. It avoids duplicated checks and races, but a broad <code>try<\/code> or broad exception type can hide unrelated programming errors.<\/p><\/div><\/details><h2 id=\"iteration\">Iteration<\/h2>\n<details class=\"qa\" open><summary>Q: Iterable versus iterator?<\/summary><div class=\"qa-body\"><p>An iterable can create an iterator with <code>iter<\/code>. An iterator is single-pass, returns itself from <code>__iter__<\/code>, and its <code>__next__<\/code> yields values or raises <code>StopIteration<\/code>.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Generator expression versus list comprehension?<\/summary><div class=\"qa-body\"><p>A generator expression is lazy, single-pass, and memory-efficient. A list comprehension eagerly creates a reusable list and is often simpler/faster for small results needing repeated access.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does <code>yield from<\/code> add beyond a nested loop?<\/summary><div class=\"qa-body\"><p>It delegates iteration plus <code>send<\/code>, <code>throw<\/code>, and <code>close<\/code>, and captures the subgenerator's return value from <code>StopIteration.value<\/code>.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is subtle about <code>itertools.groupby<\/code>?<\/summary><div class=\"qa-body\"><p>It groups consecutive runs, not equal values globally, and group iterators share the source. Sort by the same key first for global grouping and consume each group before advancing.<\/p><\/div><\/details><h2 id=\"object-model\">Object model<\/h2>\n<details class=\"qa\" open><summary>Q: What does <code>super()<\/code> really do?<\/summary><div class=\"qa-body\"><p>It continues attribute lookup after the defining class in the runtime instance's MRO. It supports cooperative multiple inheritance; it does not simply mean “call my parent.”<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is a descriptor?<\/summary><div class=\"qa-body\"><p>A class attribute defining <code>__get__<\/code>, <code>__set__<\/code>, or <code>__delete__<\/code> to control attribute access. Functions, properties, class methods, and ORM fields use descriptors.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Data versus non-data descriptor?<\/summary><div class=\"qa-body\"><p>A data descriptor defines <code>__set__<\/code> or <code>__delete__<\/code> and wins over the instance dictionary. A non-data descriptor defines only <code>__get__<\/code> and can be shadowed by an instance attribute.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Does <code>frozen=True<\/code> make a dataclass deeply immutable?<\/summary><div class=\"qa-body\"><p>No. It blocks normal field rebinding, but referenced mutable objects can still mutate. Hash safety also depends on stable, hashable fields.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does <code>__slots__<\/code> do?<\/summary><div class=\"qa-body\"><p>It declares fixed attribute storage and commonly removes per-instance <code>__dict__<\/code>, reducing memory. It affects inheritance, weak references, and tooling; it is not security.<\/p><\/div><\/details><h2 id=\"concurrency-and-production\">Concurrency and production<\/h2>\n<details class=\"qa\" open><summary>Q: Give a practical GIL decision rule.<\/summary><div class=\"qa-body\"><p>Threads or async for I/O waits, processes for CPU-bound pure Python, and measure threads for native extensions that release the GIL. The GIL does not remove logical races.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Coroutine versus task?<\/summary><div class=\"qa-body\"><p>Calling <code>async def<\/code> creates a coroutine object. A task schedules a coroutine on the event loop and tracks its result, failure, and cancellation.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is <code>time.sleep<\/code> wrong inside async code?<\/summary><div class=\"qa-body\"><p>It blocks the event-loop thread and prevents every other task from running. Use <code>await asyncio.sleep<\/code> or move unavoidable blocking I/O to a thread.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does a bounded queue provide?<\/summary><div class=\"qa-body\"><p>Backpressure. Producers slow or fail when consumers lag, limiting memory and stale work. The overload policy still must be chosen deliberately.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does returning <code>True<\/code> from <code>__exit__<\/code> do?<\/summary><div class=\"qa-body\"><p>It suppresses the exception from the <code>with<\/code> block. Cleanup should normally return false unless suppression is intentional.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What are limitations of <code>lru_cache<\/code> in a service?<\/summary><div class=\"qa-body\"><p>It is process-local, retains keys/values until eviction, needs hashable arguments, does not coordinate invalidation across workers, and concurrent calls can duplicate computation.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why use a monotonic clock for durations?<\/summary><div class=\"qa-body\"><p>It cannot move backward because of wall-clock adjustments. <code>perf_counter<\/code> or <code>monotonic<\/code> measures elapsed time; <code>time.time<\/code> is for timestamps.<\/p><\/div><\/details>","toc":[{"level":2,"id":"map-filter-and-reduce","text":"Map, filter and reduce"},{"level":2,"id":"names-objects-and-scope","text":"Names, objects and scope"},{"level":2,"id":"functions-and-errors","text":"Functions and errors"},{"level":2,"id":"iteration","text":"Iteration"},{"level":2,"id":"object-model","text":"Object model"},{"level":2,"id":"concurrency-and-production","text":"Concurrency and production"}],"text":"hard python question bank hide the answers, speak first, then grade yourself: again if the mechanism was missing, hard if you needed hints, good if the answer was clear, and easy only if you handled the follow-up too. map, filter and reduce q: what are map , filter , and reduce ? map transforms every item through a callable, filter yields original items whose predicate is truthy, and reduce repeatedly combines an accumulator with the next item into one result. in python 3, map and filter are lazy iterators. comprehensions and specialised reductions are often clearer. q: what does list(map(pow, [2, 3, 4], [3, 2])) return, and why? [8, 9] . map calls pow(2, 3) and pow(3, 2) , then stops at the shortest iterable. the 4 is not consumed. q: what does filter(none, values) do? it lazily yields items whose own truth value is true. it removes all falsy values—not only none . q: why can reduce(fn, []) fail? without an initializer, reduce needs the first item as its accumulator. empty input has none, so it raises typeerror . an initializer also defines the empty-input result. names, objects and scope q: explain python's parameter-passing model. call by sharing: parameters are local names bound to the same passed objects. mutating a passed mutable object is visible to the caller; rebinding the local parameter is not. q: why does [[0]] * 3 cause surprising mutation? repetition copies the same inner-list reference into three positions. there is one nested list, not three. use a comprehension to create each inner list separately. q: what is the difference between is and == ? is compares object identity; == invokes value equality. use is for none and deliberate sentinels, not for ordinary numbers or strings. q: what makes an object hashable? it has a stable hash and equality semantics obeying: equal objects have equal hashes. mutable value objects generally should not be hashable because a changing hash would break dictionary/set lookup. q: why can a tuple be unhashable? a tuple's hash depends on its elements. if it contains an unhashable item such as a list, the tuple is also unhashable. q: explain late binding in closures. free variables are looked up when the inner function is called. functions created in a loop can therefore all see the loop's final value. freeze the current value with a default argument or functools.partial . q: why are mutable defaults dangerous? default expressions are evaluated once when the def executes. the same object is reused across calls. use none or a private sentinel and allocate inside. functions and errors q: what do / and * mean in a function signature? parameters before / are positional-only. parameters after bare * are keyword-only. between them, parameters accept either form. q: why use functools.wraps ? it preserves metadata such as name and documentation and sets __wrapped__ , helping introspection, signature tools, frameworks, and debugging. q: what is eafp, and what is its main risk? try the operation and handle the expected exception. it avoids duplicated checks and races, but a broad try or broad exception type can hide unrelated programming errors. iteration q: iterable versus iterator? an iterable can create an iterator with iter . an iterator is single-pass, returns itself from __iter__ , and its __next__ yields values or raises stopiteration . q: generator expression versus list comprehension? a generator expression is lazy, single-pass, and memory-efficient. a list comprehension eagerly creates a reusable list and is often simpler/faster for small results needing repeated access. q: what does yield from add beyond a nested loop? it delegates iteration plus send , throw , and close , and captures the subgenerator's return value from stopiteration.value . q: what is subtle about itertools.groupby ? it groups consecutive runs, not equal values globally, and group iterators share the source. sort by the same key first for global grouping and consume each group before advancing. object model q: what does super() really do? it continues attribute lookup after the defining class in the runtime instance's mro. it supports cooperative multiple inheritance; it does not simply mean “call my parent.” q: what is a descriptor? a class attribute defining __get__ , __set__ , or __delete__ to control attribute access. functions, properties, class methods, and orm fields use descriptors. q: data versus non-data descriptor? a data descriptor defines __set__ or __delete__ and wins over the instance dictionary. a non-data descriptor defines only __get__ and can be shadowed by an instance attribute. q: does frozen=true make a dataclass deeply immutable? no. it blocks normal field rebinding, but referenced mutable objects can still mutate. hash safety also depends on stable, hashable fields. q: what does __slots__ do? it declares fixed attribute storage and commonly removes per-instance __dict__ , reducing memory. it affects inheritance, weak references, and tooling; it is not security. concurrency and production q: give a practical gil decision rule. threads or async for i/o waits, processes for cpu-bound pure python, and measure threads for native extensions that release the gil. the gil does not remove logical races. q: coroutine versus task? calling async def creates a coroutine object. a task schedules a coroutine on the event loop and tracks its result, failure, and cancellation. q: why is time.sleep wrong inside async code? it blocks the event-loop thread and prevents every other task from running. use await asyncio.sleep or move unavoidable blocking i/o to a thread. q: what does a bounded queue provide? backpressure. producers slow or fail when consumers lag, limiting memory and stale work. the overload policy still must be chosen deliberately. q: what does returning true from __exit__ do? it suppresses the exception from the with block. cleanup should normally return false unless suppression is intentional. q: what are limitations of lru_cache in a service? it is process-local, retains keys/values until eviction, needs hashable arguments, does not coordinate invalidation across workers, and concurrent calls can duplicate computation. q: why use a monotonic clock for durations? it cannot move backward because of wall-clock adjustments. perf_counter or monotonic measures elapsed time; time.time is for timestamps.","words":1007},{"path":"09-interview-practice/mock-interview.md","title":"45-Minute Mock Interview","section":"9 · Interview Practice","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"45-minute-python-mock-interview\">45-Minute Python Mock Interview<\/h1>\n<p>Use the sidebar timer. Speak every explanation aloud and write runnable code for the coding section.<\/p>\n<h2 id=\"part-1-foundations-10-minutes\">Part 1: Foundations (10 minutes)<\/h2>\n<ol><li>Explain <code>map<\/code>, <code>filter<\/code>, and <code>reduce<\/code>. Include laziness and alternatives.<\/li><li>Predict and explain:<\/li><\/ol>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> f(x=[]):\n    x.append(<span class=\"tok-builtin\">len<\/span>(x))\n    <span class=\"tok-keyword\">return<\/span> x\n\n<span class=\"tok-builtin\">print<\/span>(f(), f())<\/code><\/pre>\n<ol><li>Explain <code>is<\/code>, <code>==<\/code>, and the hash/equality contract.<\/li><li>Explain why <code>[[0]] * 3<\/code> shares state.<\/li><\/ol>\n<h2 id=\"part-2-protocols-10-minutes\">Part 2: Protocols (10 minutes)<\/h2>\n<ol><li>Iterable versus iterator.<\/li><li>Write a reusable iterable <code>Countdown<\/code>.<\/li><li>Explain generator suspension and <code>yield from<\/code> return values.<\/li><li>Explain how a function becomes a bound method.<\/li><\/ol>\n<h2 id=\"part-3-production-reasoning-10-minutes\">Part 3: Production reasoning (10 minutes)<\/h2>\n<ol><li>Choose threads, processes, or async for:<ul><li>5,000 HTTP requests;<\/li><li>image transforms in pure Python;<\/li><li>NumPy work that releases the GIL;<\/li><li>a blocking database client.<\/li><\/ul><\/li><li>Design a bounded producer-consumer system.<\/li><li>Explain cancellation and cleanup in <code>asyncio<\/code>.<\/li><li>Describe how you would investigate memory growth.<\/li><\/ol>\n<h2 id=\"part-4-coding-12-minutes\">Part 4: Coding (12 minutes)<\/h2>\n<p>Implement a lazy function that reads records, discards invalid ones, normalises a key, and yields unique records while preserving first-seen order.<\/p>\n<p>State:<\/p>\n<ul><li>input and output contract;<\/li><li>what “invalid” means;<\/li><li>time and space complexity;<\/li><li>whether an infinite stream can have bounded memory while enforcing global uniqueness.<\/li><\/ul>\n<h2 id=\"part-5-your-questions-3-minutes\">Part 5: Your questions (3 minutes)<\/h2>\n<p>Ask about Python version, concurrency model, testing strategy, type-checking, deployment, observability, and the hardest current reliability problem.<\/p>\n<h2 id=\"self-scoring\">Self-scoring<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Area<\/th><th>0<\/th><th>1<\/th><th>2<\/th><\/tr><\/thead><tbody><tr><td>Correctness<\/td><td>wrong/guess<\/td><td>mostly right<\/td><td>precise<\/td><\/tr><tr><td>Mechanism<\/td><td>missing<\/td><td>partial<\/td><td>explains what Python does<\/td><\/tr><tr><td>Trade-off<\/td><td>none<\/td><td>one-sided<\/td><td>compares alternatives<\/td><\/tr><tr><td>Communication<\/td><td>rambling<\/td><td>understandable<\/td><td>structured and concise<\/td><\/tr><tr><td>Code<\/td><td>incomplete<\/td><td>works<\/td><td>readable, tested, complexity stated<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Target at least 8/10 per spoken answer and 8/10 for coding.<\/p>","toc":[{"level":2,"id":"part-1-foundations-10-minutes","text":"Part 1: Foundations (10 minutes)"},{"level":2,"id":"part-2-protocols-10-minutes","text":"Part 2: Protocols (10 minutes)"},{"level":2,"id":"part-3-production-reasoning-10-minutes","text":"Part 3: Production reasoning (10 minutes)"},{"level":2,"id":"part-4-coding-12-minutes","text":"Part 4: Coding (12 minutes)"},{"level":2,"id":"part-5-your-questions-3-minutes","text":"Part 5: Your questions (3 minutes)"},{"level":2,"id":"self-scoring","text":"Self-scoring"}],"text":"45-minute python mock interview use the sidebar timer. speak every explanation aloud and write runnable code for the coding section. part 1: foundations (10 minutes) explain map , filter , and reduce . include laziness and alternatives. predict and explain: def f(x=[]): x.append( len (x)) return x print (f(), f()) explain is , == , and the hash/equality contract. explain why [[0]] * 3 shares state. part 2: protocols (10 minutes) iterable versus iterator. write a reusable iterable countdown . explain generator suspension and yield from return values. explain how a function becomes a bound method. part 3: production reasoning (10 minutes) choose threads, processes, or async for: 5,000 http requests; image transforms in pure python; numpy work that releases the gil; a blocking database client. design a bounded producer-consumer system. explain cancellation and cleanup in asyncio . describe how you would investigate memory growth. part 4: coding (12 minutes) implement a lazy function that reads records, discards invalid ones, normalises a key, and yields unique records while preserving first-seen order. state: input and output contract; what “invalid” means; time and space complexity; whether an infinite stream can have bounded memory while enforcing global uniqueness. part 5: your questions (3 minutes) ask about python version, concurrency model, testing strategy, type-checking, deployment, observability, and the hardest current reliability problem. self-scoring area 0 1 2 correctness wrong/guess mostly right precise mechanism missing partial explains what python does trade-off none one-sided compares alternatives communication rambling understandable structured and concise code incomplete works readable, tested, complexity stated target at least 8/10 per spoken answer and 8/10 for coding.","words":264},{"path":"09-interview-practice/cheat-sheet.md","title":"Morning-Of Cheat Sheet","section":"9 · Interview Practice","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"python-interview-cheat-sheet-morning-of\">Python Interview Cheat Sheet: Morning Of<\/h1>\n<h2 id=\"the-answer-you-need-immediately\">The answer you need immediately<\/h2>\n<p><code>map<\/code> transforms each item. <code>filter<\/code> keeps original items whose predicate is truthy. <code>reduce<\/code> folds items into one accumulator. <code>map<\/code> and <code>filter<\/code> are lazy iterators in Python 3. Prefer comprehensions for visible inline logic and specialised functions such as <code>sum<\/code>, <code>any<\/code>, <code>all<\/code>, <code>min<\/code>, <code>max<\/code>, or <code>math.prod<\/code> when they name the reduction.<\/p>\n<h2 id=\"semantics\">Semantics<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Concept<\/th><th>One line<\/th><\/tr><\/thead><tbody><tr><td>assignment<\/td><td>binds a name to an object; does not normally copy<\/td><\/tr><tr><td>mutation<\/td><td>changes an object; visible through every alias<\/td><\/tr><tr><td>rebinding<\/td><td>makes one name refer to another object<\/td><\/tr><tr><td><code>is<\/code><\/td><td>identity; use for <code>None<\/code> and sentinels<\/td><\/tr><tr><td><code>==<\/code><\/td><td>value equality through object protocol<\/td><\/tr><tr><td>hash rule<\/td><td>equal objects must have equal, stable hashes<\/td><\/tr><tr><td>shallow copy<\/td><td>new outer container, shared nested references<\/td><\/tr><tr><td>closure<\/td><td>inner function retains access to enclosing bindings<\/td><\/tr><tr><td>default<\/td><td>evaluated once when the <code>def<\/code> runs<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"iteration\">Iteration<\/h2>\n<ul><li>iterable → <code>iter(obj)<\/code> → iterator;<\/li><li>iterator → <code>next(obj)<\/code> → value or <code>StopIteration<\/code>;<\/li><li>generator: iterator that suspends at <code>yield<\/code>;<\/li><li><code>yield from<\/code>: full delegation plus subgenerator return value;<\/li><li>lazy means memory-efficient and one-pass;<\/li><li><code>groupby<\/code> groups consecutive runs;<\/li><li><code>tee<\/code> may buffer heavily.<\/li><\/ul>\n<h2 id=\"object-model\">Object model<\/h2>\n<ul><li><code>super()<\/code> follows MRO, not simply direct parent.<\/li><li>data descriptor → instance dictionary → non-data descriptor/class attribute → <code>__getattr__<\/code>.<\/li><li>functions are descriptors; instance access creates a bound method.<\/li><li>dataclass generates methods; <code>default_factory<\/code> for mutable fields.<\/li><li>frozen is not deep immutability.<\/li><li>slots change storage, not security.<\/li><\/ul>\n<h2 id=\"concurrency\">Concurrency<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Work<\/th><th>Start with<\/th><\/tr><\/thead><tbody><tr><td>async-native high-concurrency I/O<\/td><td><code>asyncio<\/code><\/td><\/tr><tr><td>blocking I/O<\/td><td>threads<\/td><\/tr><tr><td>CPU-bound Python<\/td><td>processes<\/td><\/tr><tr><td>native code releasing GIL<\/td><td>benchmark threads<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Bound concurrency. Use timeouts. Propagate cancellation. Clean up in <code>finally<\/code>. Use bounded queues for backpressure. The GIL does not remove races.<\/p>\n<h2 id=\"production\">Production<\/h2>\n<ul><li>catch narrow expected exceptions around narrow operations;<\/li><li>use context managers for deterministic cleanup;<\/li><li>type hints are normally static metadata, not runtime enforcement;<\/li><li>named module loggers; structured fields; no secrets;<\/li><li>monotonic clock for duration;<\/li><li>profile before optimising; complexity before micro-tuning;<\/li><li>caches and queues need bounds;<\/li><li>test normal, boundary, failure, cancellation, and cleanup.<\/li><\/ul>\n<h2 id=\"if-you-do-not-know\">If you do not know<\/h2>\n<blockquote><p>“I have not used that directly, but I would reason from the protocol like this…”<\/p><\/blockquote>\n<p>State what you know, make a tiny example, and name what you would verify.<\/p>","toc":[{"level":2,"id":"the-answer-you-need-immediately","text":"The answer you need immediately"},{"level":2,"id":"semantics","text":"Semantics"},{"level":2,"id":"iteration","text":"Iteration"},{"level":2,"id":"object-model","text":"Object model"},{"level":2,"id":"concurrency","text":"Concurrency"},{"level":2,"id":"production","text":"Production"},{"level":2,"id":"if-you-do-not-know","text":"If you do not know"}],"text":"python interview cheat sheet: morning of the answer you need immediately map transforms each item. filter keeps original items whose predicate is truthy. reduce folds items into one accumulator. map and filter are lazy iterators in python 3. prefer comprehensions for visible inline logic and specialised functions such as sum , any , all , min , max , or math.prod when they name the reduction. semantics concept one line assignment binds a name to an object; does not normally copy mutation changes an object; visible through every alias rebinding makes one name refer to another object is identity; use for none and sentinels == value equality through object protocol hash rule equal objects must have equal, stable hashes shallow copy new outer container, shared nested references closure inner function retains access to enclosing bindings default evaluated once when the def runs iteration iterable → iter(obj) → iterator; iterator → next(obj) → value or stopiteration ; generator: iterator that suspends at yield ; yield from : full delegation plus subgenerator return value; lazy means memory-efficient and one-pass; groupby groups consecutive runs; tee may buffer heavily. object model super() follows mro, not simply direct parent. data descriptor → instance dictionary → non-data descriptor/class attribute → __getattr__ . functions are descriptors; instance access creates a bound method. dataclass generates methods; default_factory for mutable fields. frozen is not deep immutability. slots change storage, not security. concurrency work start with async-native high-concurrency i/o asyncio blocking i/o threads cpu-bound python processes native code releasing gil benchmark threads bound concurrency. use timeouts. propagate cancellation. clean up in finally . use bounded queues for backpressure. the gil does not remove races. production catch narrow expected exceptions around narrow operations; use context managers for deterministic cleanup; type hints are normally static metadata, not runtime enforcement; named module loggers; structured fields; no secrets; monotonic clock for duration; profile before optimising; complexity before micro-tuning; caches and queues need bounds; test normal, boundary, failure, cancellation, and cleanup. if you do not know “i have not used that directly, but i would reason from the protocol like this…” state what you know, make a tiny example, and name what you would verify.","words":360}]};

// translucent tint from an accent hex — works on light AND dark backgrounds
function hexToRgba(hex, a){
  hex = (hex||"").replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex||"000000", 16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
}

function normalizeState(s){
  s = s && typeof s === "object" ? s : {};
  s.done = s.done && typeof s.done === "object" ? s.done : {};
  s.cards = s.cards && typeof s.cards === "object" ? s.cards : {};
  s.pins = s.pins && typeof s.pins === "object" ? s.pins : {};
  s.analytics = s.analytics && typeof s.analytics === "object" ? s.analytics : {};
  s.last = typeof s.last === "string" ? s.last : null;
  return s;
}
STATE = normalizeState(STATE);
function hasStudyState(){
  return Object.keys(STATE.done).length || Object.keys(STATE.cards).length ||
    Object.keys(STATE.pins).length || Object.keys(STATE.analytics).length;
}
function mergeLegacyLocal(remote, local){
  let changed=false;
  const deleted=remote._deleted && typeof remote._deleted==="object" ? remote._deleted : {};
  ["done","cards","pins"].forEach(field=>{
    const tombstones=deleted[field] && typeof deleted[field]==="object" ? deleted[field] : {};
    Object.keys(local[field]||{}).forEach(key=>{
      if(!(key in remote[field]) && !(key in tombstones)){ remote[field][key]=local[field][key]; changed=true; }
    });
  });
  Object.keys(local.analytics||{}).forEach(key=>{
    if(!(key in remote.analytics)){ remote.analytics[key]=local.analytics[key]; changed=true; }
  });
  return changed;
}

/* ------------------------- per-page study analytics ------------------------ */
let trackedPagePath=null;
let trackedPageStartedAt=null;
let analyticsSaveTimer=null;
let analyticsPaintTimer=null;
function analyticsEntry(path){
  let a=STATE.analytics[path];
  if(!a || typeof a!=="object") a=STATE.analytics[path]={};
  a.seconds=Math.max(0, Number(a.seconds)||0);
  a.visits=Math.max(0, Math.floor(Number(a.visits)||0));
  a.lastVisited=Math.max(0, Number(a.lastVisited)||0);
  return a;
}
function pageSeconds(path){
  const a=analyticsEntry(path);
  let seconds=a.seconds;
  if(path===trackedPagePath && trackedPageStartedAt!==null && document.visibilityState==="visible"){
    seconds+=Math.max(0,Date.now()-trackedPageStartedAt)/1000;
  }
  return seconds;
}
function fmtMinutes(seconds){
  const mins=Math.max(0,seconds)/60;
  return (mins<10?mins.toFixed(1):Math.round(mins))+" min";
}
function persistPageAnalytics(path, beacon){
  if(!path) return;
  const change={op:"set",field:"analytics",key:path,value:analyticsEntry(path)};
  saveStore(STATE);
  if(!remoteReady || location.protocol==="file:" || (!serverHasState && !hasStudyState())) return;
  if(beacon && navigator.sendBeacon){
    try{
      navigator.sendBeacon("/api/progress",new Blob([JSON.stringify(change)],{type:"application/json"}));
      return;
    }catch(_){}
  }
  persist(change);
}
function flushTrackedPage(saveRemote){
  if(!trackedPagePath || trackedPageStartedAt===null) return;
  const now=Date.now();
  analyticsEntry(trackedPagePath).seconds+=Math.max(0,now-trackedPageStartedAt)/1000;
  trackedPageStartedAt=now;
  if(saveRemote) persistPageAnalytics(trackedPagePath,false); else saveStore(STATE);
}
function beginTrackedPage(){
  if(!trackedPagePath || trackedPageStartedAt!==null || document.visibilityState!=="visible") return;
  const a=analyticsEntry(trackedPagePath);
  a.visits++;
  a.lastVisited=Date.now();
  trackedPageStartedAt=Date.now();
  persistPageAnalytics(trackedPagePath,false);
}
function switchTrackedPage(path){
  if(path===trackedPagePath && trackedPageStartedAt!==null) return;
  flushTrackedPage(true);
  trackedPageStartedAt=null;
  trackedPagePath=path;
  beginTrackedPage();
}
function analyticsStatus(path){
  if(path==="README.md") return "Overview";
  if(isDone(path)) return "Completed";
  return analyticsEntry(path).visits?"In progress":"Not started";
}
function escAnalytics(s){
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function renderAnalyticsPanel(path){

    '<div class="analytics-total"><strong id="analyticsTotalTime">0.0 min</strong><span>'+done+" / "+pages.length+' completed</span></div></div>'+
    '<div class="analytics-page-list">'+PAGES.map(p=>{

        '<span class="analytics-state state-'+status.toLowerCase().replace(" ","-")+'">'+status+'</span></a>';
    }).join("")+'</div>';
  const first=content.firstElementChild;

function updateAnalyticsUI(){

  });

function initPageAnalytics(){
  document.addEventListener("visibilitychange",()=>{
    if(document.visibilityState==="hidden"){
      flushTrackedPage(true); trackedPageStartedAt=null;
    }else{ beginTrackedPage(); updateAnalyticsUI(); }
  });
  window.addEventListener("pagehide",()=>{
    flushTrackedPage(false);
    trackedPageStartedAt=null;
    persistPageAnalytics(trackedPagePath,true);
  });
  analyticsSaveTimer=setInterval(()=>flushTrackedPage(true),15000);
  analyticsPaintTimer=setInterval(updateAnalyticsUI,1000);
}
function persist(change){
  saveStore(STATE);
  if(!remoteReady || location.protocol === "file:" || (!serverHasState && !hasStudyState())) return;
  syncLabel = "saving"; refreshProgressUI();
  const body=JSON.stringify(change || {op:"replace", state:STATE});
  saveQueue=saveQueue.catch(()=>{}).then(async()=>{
    try{
      const r=await fetch("/api/progress", {method:"POST", headers:{"Content-Type":"application/json"}, body});
      if(!r.ok) throw new Error("HTTP "+r.status);
      serverHasState=true; syncLabel="synced";
    }catch(_){ syncLabel="local — sync unavailable"; }
    refreshProgressUI();
  });
}
async function syncProgress(){
  if(location.protocol === "file:") return;
  try{
    const r=await fetch("/api/progress", {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const payload=await r.json();
    let migrated=false;
    if(payload.exists){
      const remote=normalizeState(payload.state);
      migrated=mergeLegacyLocal(remote, STATE);
      STATE=remote; saveStore(STATE); serverHasState=true;
    }
    remoteReady=true; syncLabel="synced";
    if((!payload.exists && hasStudyState()) || migrated) persist({op:"replace", state:STATE});
  }catch(_){ remoteReady=true; syncLabel="local — sync unavailable"; }
}

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;

  href.split("/").forEach(p=>{

    if(p==="..") base.pop(); else base.push(p);

/* ---------- Precision vs Recall interactive widget (metrics page) ---------- */
function initPRWidget(){
  const host=document.getElementById("pr-widget");
  if(!host) return;

  // Deterministic pseudo-random data so the picture is stable across reloads.
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  const rnd=mulberry32(1234567);
  function gauss(m,s){ let u=0,v=0; while(!u)u=rnd(); while(!v)v=rnd(); return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));

  const N=260, posRate=0.38;
  const pts=[];
  for(let k=0;k<N;k++){
    const pos=rnd()<posRate;
    const score=clamp(pos?gauss(0.66,0.17):gauss(0.34,0.17),0.01,0.99);
    pts.push({pos, score, jitter:rnd()});
  }

  // Geometry
  const W=660,H=300,padL=48,padR=18,padT=18,padB=46;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xOf=s=>padL+s*plotW;
  const yOf=j=>padT+8+j*(plotH-16);

  const dots=pts.map(p=>{
    const cx=xOf(p.score).toFixed(1), cy=yOf(p.jitter).toFixed(1);
    const cls=p.pos?"prw-pos":"prw-neg";
    return '<circle class="prw-dot '+cls+'" cx="'+cx+'" cy="'+cy+'" r="4.2"/>';
  }).join("");

  // Precision/recall curve across all thresholds (for the mini chart)
  const P=pts.filter(p=>p.pos).length, Ntot=pts.length;
  const curve=[];
  for(let t=0;t<=1.0001;t+=0.02){
    let tp=0,fp=0;
    for(const p of pts){ if(p.score>=t){ p.pos?tp++:fp++; } }
    const prec=(tp+fp)?tp/(tp+fp):1;
    const rec=P?tp/P:0;
    curve.push({t, prec, rec});
  }
  const cW=210,cH=190,cPad=34;
  const rx=r=>cPad+r*(cW-cPad-10);
  const ry=p=>10+(1-p)*(cH-cPad-10);
  const curvePath=curve.map((c,k)=>(k?'L':'M')+rx(c.rec).toFixed(1)+' '+ry(c.prec).toFixed(1)).join(' ');

  host.innerHTML=
  '<div class="prw-wrap">'+
    '<div class="prw-main">'+
      '<svg class="prw-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
        '<rect id="prw-shade" x="0" y="'+padT+'" width="0" height="'+plotH+'" class="prw-shade"/>'+
        '<line x1="'+padL+'" y1="'+(padT+plotH)+'" x2="'+(W-padR)+'" y2="'+(padT+plotH)+'" class="prw-axis"/>'+
        '<g class="prw-ticks">'+
          [0,0.25,0.5,0.75,1].map(v=>'<text x="'+xOf(v).toFixed(0)+'" y="'+(padT+plotH+20)+'" text-anchor="middle">'+v+'</text>').join('')+
        '</g>'+
        '<text x="'+(padL+plotW/2)+'" y="'+(H-6)+'" text-anchor="middle" class="prw-axlbl">model score →</text>'+
        dots+
        '<line id="prw-line" x1="0" y1="'+padT+'" x2="0" y2="'+(padT+plotH)+'" class="prw-thline"/>'+
        '<text id="prw-lbl" x="0" y="'+(padT-4)+'" text-anchor="middle" class="prw-thlbl">0.50</text>'+
      '</svg>'+
      '<div class="prw-controls">'+
        '<label class="prw-slabel">Threshold <b id="prw-tval">0.50</b></label>'+
        '<input id="prw-slider" type="range" min="0" max="1" step="0.01" value="0.5">'+
        '<div class="prw-legend"><span><i class="prw-lg-pos"></i> actual positive</span>'+
          '<span><i class="prw-lg-neg"></i> actual negative</span>'+
          '<span><i class="prw-lg-shade"></i> predicted positive</span></div>'+
      '</div>'+
    '</div>'+
    '<div class="prw-side">'+
      '<div class="prw-metrics">'+
        '<div class="prw-metric prw-mp"><span class="prw-mlab">Precision</span><span class="prw-mval" id="prw-prec">—</span></div>'+
        '<div class="prw-metric prw-mr"><span class="prw-mlab">Recall</span><span class="prw-mval" id="prw-rec">—</span></div>'+
        '<div class="prw-metric prw-mf"><span class="prw-mlab">F1</span><span class="prw-mval" id="prw-f1">—</span></div>'+
      '</div>'+
      '<table class="prw-cm"><tr><td class="prw-cm-h"></td><td class="prw-cm-h">pred +</td><td class="prw-cm-h">pred −</td></tr>'+
        '<tr><td class="prw-cm-h">actual +</td><td class="prw-tp" id="prw-tp">0</td><td class="prw-fn" id="prw-fn">0</td></tr>'+
        '<tr><td class="prw-cm-h">actual −</td><td class="prw-fp" id="prw-fp">0</td><td class="prw-tn" id="prw-tn">0</td></tr>'+
      '</table>'+
      '<svg class="prw-pr" viewBox="0 0 '+cW+' '+cH+'" preserveAspectRatio="xMidYMid meet">'+
        '<line x1="'+cPad+'" y1="'+(cH-cPad)+'" x2="'+(cW-8)+'" y2="'+(cH-cPad)+'" class="prw-axis"/>'+
        '<line x1="'+cPad+'" y1="10" x2="'+cPad+'" y2="'+(cH-cPad)+'" class="prw-axis"/>'+
        '<path d="'+curvePath+'" class="prw-curve"/>'+
        '<circle id="prw-prdot" r="5" class="prw-prdot"/>'+
        '<text x="'+((cW+cPad)/2)+'" y="'+(cH-6)+'" text-anchor="middle" class="prw-axlbl">recall</text>'+
        '<text x="12" y="'+(cH/2)+'" transform="rotate(-90 12 '+(cH/2)+')" text-anchor="middle" class="prw-axlbl">precision</text>'+
      '</svg>'+
    '</div>'+
  '</div>';

  const slider=host.querySelector("#prw-slider");
  const line=host.querySelector("#prw-line");
  const shade=host.querySelector("#prw-shade");
  const lbl=host.querySelector("#prw-lbl");
  const prdot=host.querySelector("#prw-prdot");
  const el=id=>host.querySelector("#"+id);

  function update(t){
    let tp=0,fp=0,fn=0,tn=0;
    for(const p of pts){
      if(p.score>=t){ p.pos?tp++:fp++; } else { p.pos?fn++:tn++; }
    }
    const prec=(tp+fp)?tp/(tp+fp):1;
    const rec=(tp+fn)?tp/(tp+fn):0;
    const f1=(prec+rec)?2*prec*rec/(prec+rec):0;
    const x=xOf(t);
    line.setAttribute("x1",x); line.setAttribute("x2",x);
    lbl.setAttribute("x",clamp(x,padL+14,W-padR-14)); lbl.textContent=t.toFixed(2);
    shade.setAttribute("x",x); shade.setAttribute("width",Math.max(0,(W-padR)-x));
    el("prw-tval").textContent=t.toFixed(2);
    el("prw-prec").textContent=(prec*100).toFixed(0)+"%";
    el("prw-rec").textContent=(rec*100).toFixed(0)+"%";
    el("prw-f1").textContent=f1.toFixed(2);
    el("prw-tp").textContent=tp; el("prw-fp").textContent=fp;
    el("prw-fn").textContent=fn; el("prw-tn").textContent=tn;
    prdot.setAttribute("cx",rx(rec)); prdot.setAttribute("cy",ry(prec));
  }
  slider.addEventListener("input", ()=>update(parseFloat(slider.value)));
  update(0.5);
}

/* ============ Bias–Variance / model-complexity explorer =============== */
// Fit polynomials of increasing degree to fixed noisy data; show the curve
// plus train vs test error → the classic U-shaped bias/variance tradeoff.
function initBiasVarianceWidget(){
  const host=document.getElementById("bv-widget"); if(!host) return;
  const rnd=(function(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};})(42);
  const gauss=(m,s)=>{let u=0,v=0;while(!u)u=rnd();while(!v)v=rnd();return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  const truef=x=>Math.sin(x*Math.PI*1.15)*0.72;         // ground-truth signal
  // fixed dataset: train + held-out test
  const mk=n=>{const a=[];for(let k=0;k<n;k++){const x=rnd()*2-1;a.push({x,y:truef(x)+gauss(0,0.16)});}return a;};
  const train=mk(16), test=mk(40);
  // least-squares polynomial fit (normal equations, small degree)
  function fit(pts,deg){
    const X=pts.map(p=>{const r=[];for(let j=0;j<=deg;j++)r.push(Math.pow(p.x,j));return r;});
    const y=pts.map(p=>p.y), n=deg+1;
    const A=Array.from({length:n},()=>new Array(n).fill(0)), b=new Array(n).fill(0);
    for(let i=0;i<X.length;i++)for(let a=0;a<n;a++){b[a]+=X[i][a]*y[i];for(let c=0;c<n;c++)A[a][c]+=X[i][a]*X[i][c];}
    for(let a=0;a<n;a++)A[a][a]+=1e-6;                    // ridge for stability
    // Gaussian elimination
    for(let c=0;c<n;c++){let piv=c;for(let r=c+1;r<n;r++)if(Math.abs(A[r][c])>Math.abs(A[piv][c]))piv=r;
      [A[c],A[piv]]=[A[piv],A[c]];[b[c],b[piv]]=[b[piv],b[c]];
      for(let r=0;r<n;r++){if(r===c)continue;const f=A[r][c]/A[c][c];for(let k=c;k<n;k++)A[r][k]-=f*A[c][k];b[r]-=f*b[c];}}
    return b.map((v,i)=>v/A[i][i]);
  }
  const evalp=(w,x)=>w.reduce((s,c,j)=>s+c*Math.pow(x,j),0);
  const mse=(w,pts)=>pts.reduce((s,p)=>s+Math.pow(evalp(w,p.x)-p.y,2),0)/pts.length;
  const W=440,H=250,pad=26;
  const xs=x=>pad+((x+1)/2)*(W-2*pad), ys=y=>H/2 - y*(H/2-pad);
  host.innerHTML=
    '<div class="bv-wrap"><svg class="bv-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
      '<line x1="'+pad+'" y1="'+(H/2)+'" x2="'+(W-pad)+'" y2="'+(H/2)+'" class="prw-axis"/>'+
      '<path id="bv-true" class="bv-true"/><path id="bv-fit" class="bv-fit"/>'+
      '<g id="bv-train"></g>'+
    '</svg>'+
    '<div class="bv-controls">'+
      '<label class="prw-slabel">Model complexity — polynomial degree <b id="bv-dval">3</b></label>'+
      '<input id="bv-slider" type="range" min="1" max="12" step="1" value="3">'+
      '<div class="bv-legend"><span><i class="bv-lg-true"></i> true signal</span>'+
        '<span><i class="bv-lg-fit"></i> fitted model</span><span><i class="bv-lg-pt"></i> training data</span></div>'+
      '<div class="bv-metrics">'+
        '<div class="bv-m"><span class="bv-mlab">Train error</span><b id="bv-tr">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Test error</span><b id="bv-te">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Diagnosis</span><b id="bv-diag" class="bv-diag">—</b></div>'+
      '</div></div></div>';
  const trainDots=train.map(p=>'<circle cx="'+xs(p.x).toFixed(1)+'" cy="'+ys(p.y).toFixed(1)+'" r="3.6" class="bv-pt"/>').join("");
  host.querySelector("#bv-train").innerHTML=trainDots;
  let td=""; for(let x=-1;x<=1.0001;x+=0.02) td+=(td?"L":"M")+xs(x).toFixed(1)+" "+ys(truef(x)).toFixed(1)+" ";
  host.querySelector("#bv-true").setAttribute("d",td);
  function draw(deg){
    const w=fit(train,deg);
    let d=""; for(let x=-1;x<=1.0001;x+=0.01){const yv=Math.max(-1.3,Math.min(1.3,evalp(w,x)));d+=(d?"L":"M")+xs(x).toFixed(1)+" "+ys(yv).toFixed(1)+" ";}
    host.querySelector("#bv-fit").setAttribute("d",d);
    const tr=mse(w,train), te=mse(w,test);
    host.querySelector("#bv-dval").textContent=deg;
    host.querySelector("#bv-tr").textContent=tr.toFixed(3);
    host.querySelector("#bv-te").textContent=te.toFixed(3);
    const diag=host.querySelector("#bv-diag");
    let msg,cls; if(deg<=2 && tr>0.05){msg="Underfit (high bias)";cls="bv-bad";}
      else if(te>tr*2.2 && te>0.045){msg="Overfit (high variance)";cls="bv-bad";}
      else {msg="Good fit ✓";cls="bv-good";}
    diag.textContent=msg; diag.className="bv-diag "+cls;
  }
  host.querySelector("#bv-slider").addEventListener("input",e=>draw(+e.target.value));
  draw(3);
}

// Pick a float range + a value; see the affine int8 mapping, scale/zero-point,
// the quantized integer, the dequantized value, and the rounding error.
function initQuantWidget(){
  const host=document.getElementById("quant-widget"); if(!host) return;
  host.innerHTML=
    '<div class="qz-wrap"><div class="qz-controls">'+
      '<div class="qz-row"><label>Tensor range [min, max]</label>'+
        '<span><input id="qz-min" type="number" value="-6" step="0.5" class="qz-num"> to '+
        '<input id="qz-max" type="number" value="6" step="0.5" class="qz-num"></span></div>'+
      '<div class="qz-row"><label>Scheme</label><span>'+
        '<button class="qz-seg sel" data-s="sym">symmetric</button>'+
        '<button class="qz-seg" data-s="asym">asymmetric</button></span></div>'+
      '<div class="qz-row"><label>Value to quantize <b id="qz-xval">2.00</b></label>'+
        '<input id="qz-x" type="range" min="-6" max="6" step="0.01" value="2"></div>'+
    '</div>'+
    '<div class="qz-out">'+
      '<div class="qz-cell"><span>scale (Δ)</span><b id="qz-scale">—</b></div>'+
      '<div class="qz-cell"><span>zero-point</span><b id="qz-zp">—</b></div>'+
      '<div class="qz-cell"><span>int8 code</span><b id="qz-q">—</b></div>'+
      '<div class="qz-cell"><span>dequantized</span><b id="qz-dq">—</b></div>'+
      '<div class="qz-cell qz-err"><span>quant error</span><b id="qz-e">—</b></div>'+
    '</div>'+
    '<svg class="qz-bar" viewBox="0 0 440 64" preserveAspectRatio="xMidYMid meet">'+
      '<line x1="20" y1="40" x2="420" y2="40" class="prw-axis"/>'+
      '<g id="qz-ticks"></g>'+
      '<circle id="qz-true" cy="40" r="5" class="qz-true"/>'+
      '<circle id="qz-quant" cy="40" r="5" class="qz-quantdot"/>'+
      '<text x="20" y="60" id="qz-lmin" class="prw-axlbl">-6</text>'+
      '<text x="420" y="60" id="qz-lmax" text-anchor="end" class="prw-axlbl">6</text>'+
    '</svg></div>';
  let scheme="sym";
  const el=id=>host.querySelector("#"+id);
  const QMIN=-128, QMAX=127;
  function compute(){
    let lo=parseFloat(el("qz-min").value), hi=parseFloat(el("qz-max").value);
    if(!(hi>lo)){ hi=lo+1; }
    const x=parseFloat(el("qz-x").value);
    let scale, zp;
    if(scheme==="sym"){ const a=Math.max(Math.abs(lo),Math.abs(hi)); scale=a/127; zp=0; }
    else { scale=(hi-lo)/(QMAX-QMIN); zp=Math.round(QMIN - lo/scale); }
    const q=Math.max(QMIN,Math.min(QMAX, Math.round(x/scale)+zp));
    const dq=(q-zp)*scale;
    el("qz-scale").textContent=scale.toFixed(4);
    el("qz-zp").textContent=zp;
    el("qz-q").textContent=q;
    el("qz-dq").textContent=dq.toFixed(3);
    el("qz-e").textContent=(dq-x>=0?"+":"")+(dq-x).toFixed(3);
    el("qz-xval").textContent=x.toFixed(2);
    // slider bounds follow the range
    const sl=el("qz-x"); sl.min=lo; sl.max=hi;
    el("qz-lmin").textContent=lo; el("qz-lmax").textContent=hi;
    const px=v=>20+((v-lo)/(hi-lo))*400;
    el("qz-true").setAttribute("cx",px(x).toFixed(1));
    el("qz-quant").setAttribute("cx",px(dq).toFixed(1));
    // draw a few quantization grid ticks (every ~16 codes)
    let ticks=""; for(let c=QMIN;c<=QMAX;c+=16){ const v=(c-zp)*scale; if(v<lo||v>hi)continue;
      ticks+='<line x1="'+px(v).toFixed(1)+'" y1="34" x2="'+px(v).toFixed(1)+'" y2="46" class="qz-tick"/>'; }
    el("qz-ticks").innerHTML=ticks;
  }
  host.querySelectorAll(".qz-seg").forEach(b=>b.onclick=()=>{
    scheme=b.dataset.s; host.querySelectorAll(".qz-seg").forEach(x=>x.classList.toggle("sel",x===b)); compute();
  });
  ["qz-min","qz-max","qz-x"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

/* ============ Batch size → latency / throughput explorer ============== */
// Simple queuing-style model: latency = fixed overhead + per-item compute that
// improves with batching (better GPU utilization), throughput = batch/latency.
function initBatchWidget(){
  const host=document.getElementById("batch-widget"); if(!host) return;
  host.innerHTML=
    '<div class="bt-wrap"><div class="bt-controls">'+
      '<label class="prw-slabel">Batch size <b id="bt-bval">8</b></label>'+
      '<input id="bt-b" type="range" min="1" max="128" step="1" value="8">'+
      '<div class="bt-sliders">'+
        '<label>Fixed overhead <b id="bt-oval">4</b> ms<input id="bt-o" type="range" min="0" max="20" step="0.5" value="4"></label>'+
        '<label>Compute / item at batch=1 <b id="bt-cval">6</b> ms<input id="bt-c" type="range" min="0.5" max="20" step="0.5" value="6"></label>'+
        '<label>Batch efficiency <b id="bt-eval">0.6</b><input id="bt-e" type="range" min="0" max="0.95" step="0.05" value="0.6"></label>'+
      '</div>'+
      '<div class="bv-metrics">'+
        '<div class="bv-m"><span class="bv-mlab">Latency / batch</span><b id="bt-lat">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Throughput</span><b id="bt-thr">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Per-item latency</span><b id="bt-pil">—</b></div>'+
      '</div></div>'+
      '<svg class="bt-svg" viewBox="0 0 300 220" preserveAspectRatio="xMidYMid meet">'+
        '<line x1="34" y1="190" x2="290" y2="190" class="prw-axis"/>'+
        '<line x1="34" y1="14" x2="34" y2="190" class="prw-axis"/>'+
        '<path id="bt-thrline" class="bt-thrline"/><path id="bt-latline" class="bt-latline"/>'+
        '<circle id="bt-dot" r="4.5" class="bt-dot"/>'+
        '<text x="162" y="212" text-anchor="middle" class="prw-axlbl">batch size →</text>'+
        '<text x="12" y="100" transform="rotate(-90 12 100)" text-anchor="middle" class="prw-axlbl">throughput</text>'+
      '</svg></div>';
  const el=id=>host.querySelector("#"+id);
  const W=300,H=220,pL=34,pR=10,pT=14,pB=30;
  // latency(b) = overhead + compute*b*(1 - eff*(1 - 1/b))  ; throughput = b/latency
  function lat(b,o,c,e){ return o + c*b*(1 - e*(1 - 1/b)); }
  function compute(){
    const b=+el("bt-b").value, o=+el("bt-o").value, c=+el("bt-c").value, e=+el("bt-e").value;
    el("bt-bval").textContent=b; el("bt-oval").textContent=o; el("bt-cval").textContent=c; el("bt-eval").textContent=e.toFixed(2);
    const L=lat(b,o,c,e), thr=b/L*1000, pil=L/b;
    el("bt-lat").textContent=L.toFixed(1)+" ms";
    el("bt-thr").textContent=thr.toFixed(0)+" it/s";
    el("bt-pil").textContent=pil.toFixed(2)+" ms";
    // plot throughput vs batch across full range, normalized
    const bs=[]; for(let x=1;x<=128;x++) bs.push({b:x, thr:x/lat(x,o,c,e)*1000, lat:lat(x,o,c,e)});
    const maxThr=Math.max(...bs.map(p=>p.thr)), maxLat=Math.max(...bs.map(p=>p.lat));
    const xOf=x=>pL+((x-1)/127)*(W-pL-pR);
    const yThr=v=>H-pB-(v/maxThr)*(H-pT-pB);
    const yLat=v=>H-pB-(v/maxLat)*(H-pT-pB);
    el("bt-thrline").setAttribute("d",bs.map((p,i)=>(i?"L":"M")+xOf(p.b).toFixed(1)+" "+yThr(p.thr).toFixed(1)).join(" "));
    el("bt-latline").setAttribute("d",bs.map((p,i)=>(i?"L":"M")+xOf(p.b).toFixed(1)+" "+yLat(p.lat).toFixed(1)).join(" "));
    el("bt-dot").setAttribute("cx",xOf(b)); el("bt-dot").setAttribute("cy",yThr(thr));
  }
  ["bt-b","bt-o","bt-c","bt-e"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

// Estimate serving memory: weight bytes at a chosen precision, plus the KV

function initLLMMemWidget(){
  const host=document.getElementById("llmmem-widget"); if(!host) return;
  host.innerHTML=
    '<div class="lm-wrap"><div class="bt-controls">'+
      '<div class="bt-sliders">'+

        '<label>Layers <b id="lm-lval">32</b><input id="lm-l" type="range" min="8" max="120" step="1" value="32"></label>'+
        '<label>Context length <b id="lm-sval">4096</b> tok<input id="lm-s" type="range" min="512" max="131072" step="512" value="4096"></label>'+
        '<label>Batch (concurrent seqs) <b id="lm-bval">1</b><input id="lm-b" type="range" min="1" max="64" step="1" value="1"></label>'+
      '</div>'+
      '<div class="lm-row"><label>Weight precision</label><span>'+
        '<button class="qz-seg" data-b="4">INT4</button>'+
        '<button class="qz-seg sel" data-b="16">FP16</button>'+
        '<button class="qz-seg" data-b="32">FP32</button></span></div>'+
    '</div>'+
    '<div class="lm-out">'+
      '<div class="qz-cell"><span>weights</span><b id="lm-w">—</b></div>'+
      '<div class="qz-cell"><span>KV cache</span><b id="lm-kv">—</b></div>'+
      '<div class="qz-cell qz-err"><span>total VRAM</span><b id="lm-tot">—</b></div>'+
    '</div>'+
    '<div class="lm-stack"><div class="lm-seg lm-seg-w" id="lm-bw"><span>weights</span></div>'+
      '<div class="lm-seg lm-seg-kv" id="lm-bkv"><span>KV</span></div></div>'+
    '<div class="lm-note" id="lm-note"></div></div>';
  let wbits=16;
  const el=id=>host.querySelector("#"+id);
  const GB=v=>v>=1?v.toFixed(1)+" GB":(v*1024).toFixed(0)+" MB";
  function compute(){
    const P=+el("lm-p").value*1e9, hid=+el("lm-h").value, L=+el("lm-l").value,
          S=+el("lm-s").value, B=+el("lm-b").value;
    el("lm-pval").textContent=el("lm-p").value; el("lm-hval").textContent=hid;
    el("lm-lval").textContent=L; el("lm-sval").textContent=S.toLocaleString(); el("lm-bval").textContent=B;
    const wBytes=P*(wbits/8);
    // KV cache: 2 (K&V) × layers × seq × batch × hidden × 2 bytes (fp16 cache)
    const kvBytes=2*L*S*B*hid*2;
    const wg=wBytes/1e9, kv=kvBytes/1e9, tot=wg+kv;
    el("lm-w").textContent=GB(wg); el("lm-kv").textContent=GB(kv); el("lm-tot").textContent=GB(tot);
    const wp=tot?Math.round(wg/tot*100):0;
    el("lm-bw").style.width=wp+"%"; el("lm-bkv").style.width=(100-wp)+"%";
    let note; const cards=Math.ceil(tot/80);
    note = "≈ "+cards+" × 80 GB GPU"+(cards>1?"s":"")+" just to hold this in memory. "+
      (kv>wg? "KV cache now dominates — long context / big batch is the bottleneck." :
              "Weights dominate — quantizing them is the biggest win.");
    el("lm-note").textContent=note;
  }
  host.querySelectorAll(".qz-seg").forEach(b=>b.onclick=()=>{
    wbits=+b.dataset.b; host.querySelectorAll(".qz-seg").forEach(x=>x.classList.toggle("sel",x===b)); compute();
  });
  ["lm-p","lm-h","lm-l","lm-s","lm-b"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

          note:"The baseline. Also the master-weight copy in mixed precision."},
    tf32:{name:"TF32", s:1,e:8,m:10, range:"= FP32", minpos:"= FP32", prec:"~FP16 (3 digits)",
          note:"Stored in 32 bits but only 19 are used in the multiply. Auto-on for FP32 matmuls on Ampere+."},
    fp16:{name:"FP16", s:1,e:5,m:10, range:"±65,504", minpos:"6.1 × 10⁻⁵", prec:"~3 decimal digits",
          loss:true, note:"Narrow exponent → small gradients underflow → needs loss scaling."},
    bf16:{name:"BF16", s:1,e:8,m:7,  range:"= FP32", minpos:"1.2 × 10⁻³⁸", prec:"~2 decimal digits",
          note:"Same 8-bit exponent as FP32 → no underflow → no loss scaling. Default for large-model training."},
    e4m3:{name:"FP8 E4M3", s:1,e:4,m:3, range:"±448", minpos:"~0.016", prec:"very coarse (more mantissa)",

    int4:{name:"INT4", int:4, range:"set by scale", minpos:"one step = scale", prec:"16 uniform levels",
          scale:true, note:"Just 16 levels — group-wise scales keep it usable. LLM weight-only (AWQ/GPTQ)."},

      '</div>'+
      '<div class="fmt-flags" id="fmt-flags"></div>'+
      '<div class="lm-note" id="fmt-note"></div>'+
    '</div>';
  const el=id=>host.querySelector("#"+id);
  function draw(k){

          '<div class="fmt-seg fmt-mant" style="flex:'+f.m+'"><span>'+f.m+' mantissa · precision</span></div>';

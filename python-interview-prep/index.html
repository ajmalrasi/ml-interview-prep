eyword\">and<\/span> <span class=\"tok-keyword\">not<\/span> user.deleted, users)\nactive = [user <span class=\"tok-keyword\">for<\/span> user <span class=\"tok-keyword\">in<\/span> users <span class=\"tok-keyword\">if<\/span> user.enabled <span class=\"tok-keyword\">and<\/span> <span class=\"tok-keyword\">not<\/span> user.deleted]<\/code><\/pre>\n<p>The comprehension reads naturally when the condition belongs near the loop. A named predicate can make <code>filter<\/code> clean and reusable:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> is_valid_event(event):\n    <span class=\"tok-keyword\">return<\/span> event.timestamp <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span> <span class=\"tok-keyword\">and<\/span> event.payload\n\nvalid_events = <span class=\"tok-builtin\">filter<\/span>(is_valid_event, events)<\/code><\/pre>\n<h2 id=\"select-do-not-transform\">Select, do not transform<\/h2>\n<p>If you need to both select and transform, a comprehension is usually best:<\/p>\n<pre><code class=\"language-python\">names = [user.name.strip() <span class=\"tok-keyword\">for<\/span> user <span class=\"tok-keyword\">in<\/span> users <span class=\"tok-keyword\">if<\/span> user.enabled]<\/code><\/pre>\n<p>A <code>filter<\/code> followed by <code>map<\/code> works, but separates one readable idea across two layers.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p><code>filter<\/code> lazily yields the original items whose predicate result is truthy. With a <code>None<\/code> predicate it keeps truthy items. I often use a comprehension for an inline condition and <code>filter<\/code> when I have a reusable named predicate.<\/p><\/blockquote>\n<h2 id=\"check-yourself\">Check yourself<\/h2>\n<p>What is returned by <code>filter(lambda x: x * 2, [0, 1, 2])<\/code>? The predicate results are <code>0<\/code>, <code>2<\/code>, and <code>4<\/code>; therefore the original items <code>1<\/code> and <code>2<\/code> are yielded.<\/p>","toc":[{"level":2,"id":"truthiness-matters","text":"Truthiness matters"},{"level":2,"id":"comprehension-equivalent","text":"Comprehension equivalent"},{"level":2,"id":"select-do-not-transform","text":"Select, do not transform"},{"level":2,"id":"interview-answer","text":"Interview answer"},{"level":2,"id":"check-yourself","text":"Check yourself"}],"text":"filter and predicates a predicate is a function used as a yes/no test. it may return any value; python interprets that value by truthiness. def is_even(x): return x % 2 == 0 result = filter (is_even, range ( 8 )) print ( list (result)) # [0, 2, 4, 6] unlike map , filter does not return the predicate's result. it returns the original item when the result is truthy. truthiness matters the following values are normally false: false , none , numeric zero, empty strings, and empty containers. most other objects are true. with none as the predicate, filter tests every item directly: values = [ 0 , 1 , \"\" , \"python\" , none , [], [ 3 ]] print ( list ( filter ( none , values))) # [1, 'python', [3]] it does not mean “remove only none .” that is a frequent interview trap. comprehension equivalent active = filter ( lambda user: user.enabled and not user.deleted, users) active = [user for user in users if user.enabled and not user.deleted] the comprehension reads naturally when the condition belongs near the loop. a named predicate can make filter clean and reusable: def is_valid_event(event): return event.timestamp is not none and event.payload valid_events = filter (is_valid_event, events) select, do not transform if you need to both select and transform, a comprehension is usually best: names = [user.name.strip() for user in users if user.enabled] a filter followed by map works, but separates one readable idea across two layers. interview answer filter lazily yields the original items whose predicate result is truthy. with a none predicate it keeps truthy items. i often use a comprehension for an inline condition and filter when i have a reusable named predicate. check yourself what is returned by filter(lambda x: x * 2, [0, 1, 2]) ? the predicate results are 0 , 2 , and 4 ; therefore the original items 1 and 2 are yielded.","words":320},{"path":"01-map-filter-reduce/reduce-and-folds.md","title":"reduce and Folds","section":"1 · Map, Filter & Reduce","quiz":false,"accent":"#e0663f","html":"<h1 id=\"reduce-and-folds\"><code>reduce<\/code> and Folds<\/h1>\n<p><code>functools.reduce<\/code> repeatedly combines an accumulator with the next item.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> functools <span class=\"tok-keyword\">import<\/span> reduce\n\nnumbers = [<span class=\"tok-number\">2<\/span>, <span class=\"tok-number\">3<\/span>, <span class=\"tok-number\">4<\/span>]\nproduct = reduce(<span class=\"tok-keyword\">lambda<\/span> acc, x: acc * x, numbers, <span class=\"tok-number\">1<\/span>)<\/code><\/pre>\n<p>Trace it rather than memorising it:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Step<\/th><th>accumulator<\/th><th>item<\/th><th>new accumulator<\/th><\/tr><\/thead><tbody><tr><td>start<\/td><td>1<\/td><td>—<\/td><td>1<\/td><\/tr><tr><td>1<\/td><td>1<\/td><td>2<\/td><td>2<\/td><\/tr><tr><td>2<\/td><td>2<\/td><td>3<\/td><td>6<\/td><\/tr><tr><td>3<\/td><td>6<\/td><td>4<\/td><td>24<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The result is <code>24<\/code>.<\/p>\n<h2 id=\"the-initializer-has-two-jobs\">The initializer has two jobs<\/h2>\n<p>The third argument is the initial accumulator and the answer for an empty iterable:<\/p>\n<pre><code class=\"language-python\">reduce(<span class=\"tok-keyword\">lambda<\/span> a, b: a + b, [], <span class=\"tok-number\">0<\/span>)  <span class=\"tok-comment\"># 0<\/span><\/code><\/pre>\n<p>Without it, the first item becomes the accumulator. An empty iterable then raises <code>TypeError<\/code> because there is no first item.<\/p>\n<pre><code class=\"language-python\">reduce(<span class=\"tok-keyword\">lambda<\/span> a, b: a + b, [<span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">20<\/span>])  <span class=\"tok-comment\"># 30<\/span>\nreduce(<span class=\"tok-keyword\">lambda<\/span> a, b: a + b, [])        <span class=\"tok-comment\"># TypeError<\/span><\/code><\/pre>\n<h2 id=\"why-reduce-is-often-not-the-best-answer\">Why <code>reduce<\/code> is often not the best answer<\/h2>\n<p>Specialised operations communicate intent:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Generic reduction<\/th><th>Clearer Python<\/th><\/tr><\/thead><tbody><tr><td>sum numbers<\/td><td><code>sum(values)<\/code><\/td><\/tr><tr><td>multiply numbers<\/td><td><code>math.prod(values)<\/code><\/td><\/tr><tr><td>find smallest<\/td><td><code>min(values)<\/code><\/td><\/tr><tr><td>any truthy item<\/td><td><code>any(values)<\/code><\/td><\/tr><tr><td>all truthy items<\/td><td><code>all(values)<\/code><\/td><\/tr><\/tbody><\/table><\/div>\n<p>For a complex accumulator, an explicit loop is often easier to debug and type-check:<\/p>\n<pre><code class=\"language-python\">counts = {}\n<span class=\"tok-keyword\">for<\/span> word <span class=\"tok-keyword\">in<\/span> words:\n    counts[word] = counts.get(word, <span class=\"tok-number\">0<\/span>) + <span class=\"tok-number\">1<\/span><\/code><\/pre>\n<h2 id=\"associativity-and-order\">Associativity and order<\/h2>\n<p><code>reduce<\/code> is left-to-right. Operations such as subtraction expose the order:<\/p>\n<pre><code class=\"language-python\">reduce(<span class=\"tok-keyword\">lambda<\/span> a, b: a - b, [<span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">3<\/span>, <span class=\"tok-number\">2<\/span>])\n<span class=\"tok-comment\"># (10 - 3) - 2 = 5<\/span><\/code><\/pre>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p><code>reduce<\/code> folds an iterable into one value by repeatedly applying a two-argument function to an accumulator and the next item. An initializer defines the first accumulator and the empty-input result. I prefer specialised built-ins or a clear loop when they express the operation better.<\/p><\/blockquote>","toc":[{"level":2,"id":"the-initializer-has-two-jobs","text":"The initializer has two jobs"},{"level":2,"id":"why-reduce-is-often-not-the-best-answer","text":"Why reduce is often not the best answer"},{"level":2,"id":"associativity-and-order","text":"Associativity and order"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"reduce and folds functools.reduce repeatedly combines an accumulator with the next item. from functools import reduce numbers = [ 2 , 3 , 4 ] product = reduce( lambda acc, x: acc * x, numbers, 1 ) trace it rather than memorising it: step accumulator item new accumulator start 1 — 1 1 1 2 2 2 2 3 6 3 6 4 24 the result is 24 . the initializer has two jobs the third argument is the initial accumulator and the answer for an empty iterable: reduce( lambda a, b: a + b, [], 0 ) # 0 without it, the first item becomes the accumulator. an empty iterable then raises typeerror because there is no first item. reduce( lambda a, b: a + b, [ 10 , 20 ]) # 30 reduce( lambda a, b: a + b, []) # typeerror why reduce is often not the best answer specialised operations communicate intent: generic reduction clearer python sum numbers sum(values) multiply numbers math.prod(values) find smallest min(values) any truthy item any(values) all truthy items all(values) for a complex accumulator, an explicit loop is often easier to debug and type-check: counts = {} for word in words: counts[word] = counts.get(word, 0 ) + 1 associativity and order reduce is left-to-right. operations such as subtraction expose the order: reduce( lambda a, b: a - b, [ 10 , 3 , 2 ]) # (10 - 3) - 2 = 5 interview answer reduce folds an iterable into one value by repeatedly applying a two-argument function to an accumulator and the next item. an initializer defines the first accumulator and the empty-input result. i prefer specialised built-ins or a clear loop when they express the operation better.","words":286},{"path":"01-map-filter-reduce/laziness-and-iterators.md","title":"Laziness and One-Pass Iterators","section":"1 · Map, Filter & Reduce","quiz":false,"accent":"#e0663f","html":"<h1 id=\"laziness-and-one-pass-iterators\">Laziness and One-Pass Iterators<\/h1>\n<p>“Lazy” means work happens <strong>when a value is requested<\/strong>, not when the pipeline is constructed.<\/p>\n<pre><code class=\"language-python\">numbers = <span class=\"tok-builtin\">range<\/span>(1_000_000)\nsquares = <span class=\"tok-builtin\">map<\/span>(<span class=\"tok-keyword\">lambda<\/span> x: x * x, numbers)\nlarge = <span class=\"tok-builtin\">filter<\/span>(<span class=\"tok-keyword\">lambda<\/span> x: x &gt; 10_000, squares)\n\nfirst = next(large)<\/code><\/pre>\n<p>Python processes only enough source values to find <code>first<\/code>. It does not allocate one million squares.<\/p>\n<h2 id=\"the-pipeline-pulls-values\">The pipeline pulls values<\/h2>\n<p>Think from the consumer backwards:<\/p>\n<div class=\"diagram\"><div class=\"flow\">\n  <span class=\"node data\">range<span class=\"nsub\">source<\/span><\/span><span class=\"arw\"><\/span>\n  <span class=\"node\">map<span class=\"nsub\">one square<\/span><\/span><span class=\"arw\"><\/span>\n  <span class=\"node\">filter<span class=\"nsub\">accept / reject<\/span><\/span><span class=\"arw\"><\/span>\n  <span class=\"node out\">next<span class=\"nsub\">requests one result<\/span><\/span>\n<\/div><\/div>\n<p><code>next<\/code> asks <code>filter<\/code>, which asks <code>map<\/code>, which asks <code>range<\/code>. If the predicate rejects a value, the chain pulls again.<\/p>\n<h2 id=\"the-exhaustion-rule\">The exhaustion rule<\/h2>\n<p>An iterator is normally single-pass:<\/p>\n<pre><code class=\"language-python\">it = <span class=\"tok-builtin\">map<\/span>(<span class=\"tok-builtin\">str<\/span>.upper, [<span class=\"tok-string\">\"a\"<\/span>, <span class=\"tok-string\">\"b\"<\/span>])\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-builtin\">list<\/span>(it))  <span class=\"tok-comment\"># ['A', 'B']<\/span>\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-builtin\">list<\/span>(it))  <span class=\"tok-comment\"># []<\/span><\/code><\/pre>\n<p>The second list is empty because the same iterator has already reached <code>StopIteration<\/code>.<\/p>\n<h2 id=\"iterator-versus-iterable\">Iterator versus iterable<\/h2>\n<ul><li>An <strong>iterable<\/strong> can produce a new iterator with <code>iter(obj)<\/code>. A list is iterable and reusable.<\/li><li>An <strong>iterator<\/strong> produces the next value with <code>next(obj)<\/code> and remembers its current position.<\/li><\/ul>\n<pre><code class=\"language-python\">values = [<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>, <span class=\"tok-number\">3<\/span>]\na = iter(values)\nb = iter(values)\n<span class=\"tok-builtin\">print<\/span>(next(a), next(a), next(b))  <span class=\"tok-comment\"># 1 2 1<\/span><\/code><\/pre>\n<p><code>a<\/code> and <code>b<\/code> are independent iterators over one iterable.<\/p>\n<h2 id=\"when-laziness-hurts\">When laziness hurts<\/h2>\n<ul><li>Failure happens later, sometimes far from pipeline construction.<\/li><li>Debugging can be less direct.<\/li><li>Reusing the result produces nothing.<\/li><li>Holding a source resource open may extend its lifetime.<\/li><\/ul>\n<p>Materialise with <code>list(...)<\/code> when you need repeated traversal, random access, a stable snapshot, or eager validation.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>A lazy iterator defers computation until consumption and holds only enough state to produce the next item. That helps streaming and memory use, but it is one-pass and errors occur during consumption.<\/p><\/blockquote>","toc":[{"level":2,"id":"the-pipeline-pulls-values","text":"The pipeline pulls values"},{"level":2,"id":"the-exhaustion-rule","text":"The exhaustion rule"},{"level":2,"id":"iterator-versus-iterable","text":"Iterator versus iterable"},{"level":2,"id":"when-laziness-hurts","text":"When laziness hurts"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"laziness and one-pass iterators “lazy” means work happens when a value is requested , not when the pipeline is constructed. numbers = range (1_000_000) squares = map ( lambda x: x * x, numbers) large = filter ( lambda x: x > 10_000, squares) first = next(large) python processes only enough source values to find first . it does not allocate one million squares. the pipeline pulls values think from the consumer backwards: range source map one square filter accept / reject next requests one result next asks filter , which asks map , which asks range . if the predicate rejects a value, the chain pulls again. the exhaustion rule an iterator is normally single-pass: it = map ( str .upper, [ \"a\" , \"b\" ]) print ( list (it)) # ['a', 'b'] print ( list (it)) # [] the second list is empty because the same iterator has already reached stopiteration . iterator versus iterable an iterable can produce a new iterator with iter(obj) . a list is iterable and reusable. an iterator produces the next value with next(obj) and remembers its current position. values = [ 1 , 2 , 3 ] a = iter(values) b = iter(values) print (next(a), next(a), next(b)) # 1 2 1 a and b are independent iterators over one iterable. when laziness hurts failure happens later, sometimes far from pipeline construction. debugging can be less direct. reusing the result produces nothing. holding a source resource open may extend its lifetime. materialise with list(...) when you need repeated traversal, random access, a stable snapshot, or eager validation. interview answer a lazy iterator defers computation until consumption and holds only enough state to produce the next item. that helps streaming and memory use, but it is one-pass and errors occur during consumption.","words":298},{"path":"02-core-semantics/README.md","title":"Overview","section":"2 · Core Python Semantics","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"core-python-semantics\">Core Python Semantics<\/h1>\n<p>Most surprising Python questions reduce to one fact:<\/p>\n<blockquote><p>A variable is a <strong>name bound to an object<\/strong>. It is not a box that contains a value.<\/p><\/blockquote>\n<p>From this model come mutation, aliasing, <code>is<\/code> versus <code>==<\/code>, hashability, shallow copies, closure behaviour, and mutable-default bugs.<\/p>\n<h2 id=\"what-this-chapter-teaches\">What this chapter teaches<\/h2>\n<ul><li>Why assignment usually does not copy.<\/li><li>Why mutation can be visible through several names.<\/li><li>Why equal objects may be distinct objects.<\/li><li>What dictionaries require from keys.<\/li><li>When defaults and closure variables are evaluated.<\/li><\/ul>\n<h2 id=\"a-prediction-to-begin\">A prediction to begin<\/h2>\n<pre><code class=\"language-python\">a = [<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>]\nb = a\na.append(<span class=\"tok-number\">3<\/span>)\n<span class=\"tok-builtin\">print<\/span>(b)<\/code><\/pre>\n<p>The output is <code>[1, 2, 3]<\/code>. Assignment bound <code>b<\/code> to the same list object; it did not create a second list.<\/p>\n<p>Now compare:<\/p>\n<pre><code class=\"language-python\">a = [<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>]\nb = a\na = a + [<span class=\"tok-number\">3<\/span>]\n<span class=\"tok-builtin\">print<\/span>(b)<\/code><\/pre>\n<p>The output is <code>[1, 2]<\/code>. <code>a + [3]<\/code> created a new list and rebound <code>a<\/code>; the original object bound to <code>b<\/code> did not change.<\/p>\n<p>That distinction—<strong>mutate versus rebind<\/strong>—is the centre of this chapter.<\/p>\n<p>→ Continue with <strong><a class=\"mdlink\" data-href=\"names-objects-mutability.md\" href=\"#\">Names, Objects and Mutability<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"what-this-chapter-teaches","text":"What this chapter teaches"},{"level":2,"id":"a-prediction-to-begin","text":"A prediction to begin"}],"text":"core python semantics most surprising python questions reduce to one fact: a variable is a name bound to an object . it is not a box that contains a value. from this model come mutation, aliasing, is versus == , hashability, shallow copies, closure behaviour, and mutable-default bugs. what this chapter teaches why assignment usually does not copy. why mutation can be visible through several names. why equal objects may be distinct objects. what dictionaries require from keys. when defaults and closure variables are evaluated. a prediction to begin a = [ 1 , 2 ] b = a a.append( 3 ) print (b) the output is [1, 2, 3] . assignment bound b to the same list object; it did not create a second list. now compare: a = [ 1 , 2 ] b = a a = a + [ 3 ] print (b) the output is [1, 2] . a + [3] created a new list and rebound a ; the original object bound to b did not change. that distinction— mutate versus rebind —is the centre of this chapter. → continue with names, objects and mutability .","words":192},{"path":"02-core-semantics/names-objects-mutability.md","title":"Names, Objects and Mutability","section":"2 · Core Python Semantics","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"names-objects-and-mutability\">Names, Objects and Mutability<\/h1>\n<h2 id=\"assignment-binds-a-name\">Assignment binds a name<\/h2>\n<pre><code class=\"language-python\">x = [<span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">20<\/span>]\ny = x<\/code><\/pre>\n<p>There is one list and two names. You can verify the identity:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">print<\/span>(x <span class=\"tok-keyword\">is<\/span> y)  <span class=\"tok-comment\"># True<\/span><\/code><\/pre>\n<p>Mutating the list through either name is visible through both:<\/p>\n<pre><code class=\"language-python\">y.append(<span class=\"tok-number\">30<\/span>)\n<span class=\"tok-builtin\">print<\/span>(x)  <span class=\"tok-comment\"># [10, 20, 30]<\/span><\/code><\/pre>\n<h2 id=\"rebinding-is-different\">Rebinding is different<\/h2>\n<pre><code class=\"language-python\">y = [<span class=\"tok-number\">99<\/span>]<\/code><\/pre>\n<p>This changes what <code>y<\/code> refers to. It does not modify the old list and does not affect <code>x<\/code>.<\/p>\n<h2 id=\"mutable-and-immutable-objects\">Mutable and immutable objects<\/h2>\n<p>Common immutable types include integers, floats, booleans, strings, bytes, tuples, and frozensets. Lists, dictionaries, sets, and most user objects are mutable.<\/p>\n<p>“Immutable” means the object cannot change after creation. An operation produces another object:<\/p>\n<pre><code class=\"language-python\">name = <span class=\"tok-string\">\"ada\"<\/span>\nold_id = id(name)\nname = name.title()\n<span class=\"tok-builtin\">print<\/span>(name)              <span class=\"tok-comment\"># Ada<\/span>\n<span class=\"tok-builtin\">print<\/span>(id(name) == old_id)  <span class=\"tok-comment\"># False<\/span><\/code><\/pre>\n<h2 id=\"augmented-assignment-depends-on-the-type\">Augmented assignment depends on the type<\/h2>\n<pre><code class=\"language-python\">a = [<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>]\nb = a\na += [<span class=\"tok-number\">3<\/span>]\n<span class=\"tok-builtin\">print<\/span>(a <span class=\"tok-keyword\">is<\/span> b, b)  <span class=\"tok-comment\"># True [1, 2, 3]<\/span><\/code><\/pre>\n<p>Lists implement in-place addition, so <code>+=<\/code> mutates when possible.<\/p>\n<pre><code class=\"language-python\">a = (<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>)\nb = a\na += (<span class=\"tok-number\">3<\/span>,)\n<span class=\"tok-builtin\">print<\/span>(a <span class=\"tok-keyword\">is<\/span> b, b)  <span class=\"tok-comment\"># False (1, 2)<\/span><\/code><\/pre>\n<p>Tuples cannot mutate, so a new tuple is created and <code>a<\/code> is rebound.<\/p>\n<h2 id=\"pythons-argument-model-call-by-sharing\">Python's argument model: call by sharing<\/h2>\n<p>Function parameters become new local names bound to the passed objects:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> change(items):\n    items.append(<span class=\"tok-string\">\"visible\"<\/span>)   <span class=\"tok-comment\"># mutates caller's object<\/span>\n    items = [<span class=\"tok-string\">\"local\"<\/span>]         <span class=\"tok-comment\"># rebinds only local name<\/span>\n\ndata = []\nchange(data)\n<span class=\"tok-builtin\">print<\/span>(data)  <span class=\"tok-comment\"># ['visible']<\/span><\/code><\/pre>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>Python passes object references by assignment, sometimes called call by sharing. A function can mutate a passed mutable object, but rebinding its local parameter does not rebind the caller's name.<\/p><\/blockquote>","toc":[{"level":2,"id":"assignment-binds-a-name","text":"Assignment binds a name"},{"level":2,"id":"rebinding-is-different","text":"Rebinding is different"},{"level":2,"id":"mutable-and-immutable-objects","text":"Mutable and immutable objects"},{"level":2,"id":"augmented-assignment-depends-on-the-type","text":"Augmented assignment depends on the type"},{"level":2,"id":"pythons-argument-model-call-by-sharing","text":"Python's argument model: call by sharing"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"names, objects and mutability assignment binds a name x = [ 10 , 20 ] y = x there is one list and two names. you can verify the identity: print (x is y) # true mutating the list through either name is visible through both: y.append( 30 ) print (x) # [10, 20, 30] rebinding is different y = [ 99 ] this changes what y refers to. it does not modify the old list and does not affect x . mutable and immutable objects common immutable types include integers, floats, booleans, strings, bytes, tuples, and frozensets. lists, dictionaries, sets, and most user objects are mutable. “immutable” means the object cannot change after creation. an operation produces another object: name = \"ada\" old_id = id(name) name = name.title() print (name) # ada print (id(name) == old_id) # false augmented assignment depends on the type a = [ 1 , 2 ] b = a a += [ 3 ] print (a is b, b) # true [1, 2, 3] lists implement in-place addition, so += mutates when possible. a = ( 1 , 2 ) b = a a += ( 3 ,) print (a is b, b) # false (1, 2) tuples cannot mutate, so a new tuple is created and a is rebound. python's argument model: call by sharing function parameters become new local names bound to the passed objects: def change(items): items.append( \"visible\" ) # mutates caller's object items = [ \"local\" ] # rebinds only local name data = [] change(data) print (data) # ['visible'] interview answer python passes object references by assignment, sometimes called call by sharing. a function can mutate a passed mutable object, but rebinding its local parameter does not rebind the caller's name.","words":292},{"path":"02-core-semantics/identity-equality-hashing.md","title":"Identity, Equality and Hashing","section":"2 · Core Python Semantics","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"identity-equality-and-hashing\">Identity, Equality and Hashing<\/h1>\n<h2 id=\"is-asks-the-same-object\"><code>is<\/code> asks “the same object?”<\/h2>\n<p><code>is<\/code> compares identity. <code>==<\/code> asks objects whether their values are equal, normally through <code>__eq__<\/code>.<\/p>\n<pre><code class=\"language-python\">a = [<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>]\nb = [<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>]\nc = a\n\n<span class=\"tok-builtin\">print<\/span>(a == b)  <span class=\"tok-comment\"># True: equal values<\/span>\n<span class=\"tok-builtin\">print<\/span>(a <span class=\"tok-keyword\">is<\/span> b)  <span class=\"tok-comment\"># False: different lists<\/span>\n<span class=\"tok-builtin\">print<\/span>(a <span class=\"tok-keyword\">is<\/span> c)  <span class=\"tok-comment\"># True: same list<\/span><\/code><\/pre>\n<p>Use <code>is<\/code> for singletons and deliberate sentinels:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">if<\/span> value <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n    ...<\/code><\/pre>\n<p>Do not use <code>is<\/code> for strings or numbers. CPython may reuse some objects, but interning is not a language promise you should depend on.<\/p>\n<h2 id=\"hashing-supports-fast-lookup\">Hashing supports fast lookup<\/h2>\n<p>Dictionaries and sets use a hash to choose where to search for a key. The central rule is:<\/p>\n<blockquote><p>If <code>a == b<\/code>, then <code>hash(a) == hash(b)<\/code> must be true.<\/p><\/blockquote>\n<p>The reverse is not required. Different objects may collide.<\/p>\n<h2 id=\"why-mutable-values-are-usually-unhashable\">Why mutable values are usually unhashable<\/h2>\n<p>If a key's hash changed after insertion, the dictionary would search the wrong location. Lists and dictionaries therefore reject hashing.<\/p>\n<p>A tuple is hashable only if all its elements are hashable:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">hash<\/span>((<span class=\"tok-number\">1<\/span>, <span class=\"tok-string\">\"a\"<\/span>))   <span class=\"tok-comment\"># works<\/span>\n<span class=\"tok-builtin\">hash<\/span>((<span class=\"tok-number\">1<\/span>, []))    <span class=\"tok-comment\"># TypeError: list is unhashable<\/span><\/code><\/pre>\n<h2 id=\"equal-keys-of-different-types\">Equal keys of different types<\/h2>\n<pre><code class=\"language-python\">d = {<span class=\"tok-keyword\">True<\/span>: <span class=\"tok-string\">\"yes\"<\/span>, <span class=\"tok-number\">1<\/span>: <span class=\"tok-string\">\"one\"<\/span>, <span class=\"tok-number\">1.0<\/span>: <span class=\"tok-string\">\"float\"<\/span>}\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-builtin\">len<\/span>(d), d[<span class=\"tok-keyword\">True<\/span>])  <span class=\"tok-comment\"># 1 float<\/span><\/code><\/pre>\n<p><code>True == 1 == 1.0<\/code>, and their hashes agree, so they occupy one logical key slot. Each later assignment replaces the value.<\/p>\n<h2 id=\"custom-value-objects\">Custom value objects<\/h2>\n<p>If you define equality based on mutable fields, do not give the object a value-based hash. A frozen dataclass can safely generate one when its fields are themselves hashable.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>Identity means two references point to the same object; equality is a value relation defined by the objects. Hash-based collections require equal keys to have equal, stable hashes, which is why mutable value containers are normally unhashable.<\/p><\/blockquote>","toc":[{"level":2,"id":"is-asks-the-same-object","text":"is asks “the same object?”"},{"level":2,"id":"hashing-supports-fast-lookup","text":"Hashing supports fast lookup"},{"level":2,"id":"why-mutable-values-are-usually-unhashable","text":"Why mutable values are usually unhashable"},{"level":2,"id":"equal-keys-of-different-types","text":"Equal keys of different types"},{"level":2,"id":"custom-value-objects","text":"Custom value objects"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"identity, equality and hashing is asks “the same object?” is compares identity. == asks objects whether their values are equal, normally through __eq__ . a = [ 1 , 2 ] b = [ 1 , 2 ] c = a print (a == b) # true: equal values print (a is b) # false: different lists print (a is c) # true: same list use is for singletons and deliberate sentinels: if value is none : ... do not use is for strings or numbers. cpython may reuse some objects, but interning is not a language promise you should depend on. hashing supports fast lookup dictionaries and sets use a hash to choose where to search for a key. the central rule is: if a == b , then hash(a) == hash(b) must be true. the reverse is not required. different objects may collide. why mutable values are usually unhashable if a key's hash changed after insertion, the dictionary would search the wrong location. lists and dictionaries therefore reject hashing. a tuple is hashable only if all its elements are hashable: hash (( 1 , \"a\" )) # works hash (( 1 , [])) # typeerror: list is unhashable equal keys of different types d = { true : \"yes\" , 1 : \"one\" , 1.0 : \"float\" } print ( len (d), d[ true ]) # 1 float true == 1 == 1.0 , and their hashes agree, so they occupy one logical key slot. each later assignment replaces the value. custom value objects if you define equality based on mutable fields, do not give the object a value-based hash. a frozen dataclass can safely generate one when its fields are themselves hashable. interview answer identity means two references point to the same object; equality is a value relation defined by the objects. hash-based collections require equal keys to have equal, stable hashes, which is why mutable value containers are normally unhashable.","words":324},{"path":"02-core-semantics/containers-copying.md","title":"Containers, Aliasing and Copying","section":"2 · Core Python Semantics","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"containers-aliasing-and-copying\">Containers, Aliasing and Copying<\/h1>\n<p>Containers hold <strong>references to objects<\/strong>. This explains two classic surprises.<\/p>\n<h2 id=\"sequence-repetition-repeats-references\">Sequence repetition repeats references<\/h2>\n<pre><code class=\"language-python\">rows = [[<span class=\"tok-number\">0<\/span>]] * <span class=\"tok-number\">3<\/span>\nrows[<span class=\"tok-number\">0<\/span>].append(<span class=\"tok-number\">1<\/span>)\n<span class=\"tok-builtin\">print<\/span>(rows)\n<span class=\"tok-comment\"># [[0, 1], [0, 1], [0, 1]]<\/span><\/code><\/pre>\n<p>The outer list has three positions, but every position points to the same inner list.<\/p>\n<p>Create independent rows with a comprehension:<\/p>\n<pre><code class=\"language-python\">rows = [[<span class=\"tok-number\">0<\/span>] <span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(<span class=\"tok-number\">3<\/span>)]<\/code><\/pre>\n<h2 id=\"shallow-copy\">Shallow copy<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> copy\n\noriginal = [[<span class=\"tok-number\">1<\/span>], [<span class=\"tok-number\">2<\/span>]]\nclone = copy.copy(original)  <span class=\"tok-comment\"># same as original.copy() for a list<\/span><\/code><\/pre>\n<p>The outer lists differ, but nested objects are shared:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">print<\/span>(original <span class=\"tok-keyword\">is<\/span> clone)       <span class=\"tok-comment\"># False<\/span>\n<span class=\"tok-builtin\">print<\/span>(original[<span class=\"tok-number\">0<\/span>] <span class=\"tok-keyword\">is<\/span> clone[<span class=\"tok-number\">0<\/span>]) <span class=\"tok-comment\"># True<\/span><\/code><\/pre>\n<p>Mutating <code>clone[0]<\/code> affects <code>original[0]<\/code>.<\/p>\n<h2 id=\"deep-copy\">Deep copy<\/h2>\n<p><code>copy.deepcopy<\/code> recursively copies reachable objects and uses a memo table to preserve shared structure and handle cycles.<\/p>\n<pre><code class=\"language-python\">clone = copy.deepcopy(original)\n<span class=\"tok-builtin\">print<\/span>(original[<span class=\"tok-number\">0<\/span>] <span class=\"tok-keyword\">is<\/span> clone[<span class=\"tok-number\">0<\/span>])  <span class=\"tok-comment\"># False<\/span><\/code><\/pre>\n<p>Deep copy is not automatically correct. Resources, sockets, locks, database sessions, and intentionally shared objects should not be blindly duplicated. Prefer explicit construction when ownership matters.<\/p>\n<h2 id=\"dictionary-copying\">Dictionary copying<\/h2>\n<p>These all make shallow copies:<\/p>\n<pre><code class=\"language-python\">b = a.copy()\nb = <span class=\"tok-builtin\">dict<\/span>(a)\nb = {**a}<\/code><\/pre>\n<p>Nested lists or dictionaries remain shared.<\/p>\n<h2 id=\"safe-defaults-for-nested-data\">Safe defaults for nested data<\/h2>\n<p>Use factories rather than repeated mutable values:<\/p>\n<pre><code class=\"language-python\">matrix = [[<span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(cols)] <span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(rows)]\ngroups = {key: [] <span class=\"tok-keyword\">for<\/span> key <span class=\"tok-keyword\">in<\/span> keys}<\/code><\/pre>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>A shallow copy creates a new outer container but reuses references to its elements. A deep copy recursively duplicates reachable objects with memoisation. I choose based on ownership rather than assuming deep copy is always safer.<\/p><\/blockquote>","toc":[{"level":2,"id":"sequence-repetition-repeats-references","text":"Sequence repetition repeats references"},{"level":2,"id":"shallow-copy","text":"Shallow copy"},{"level":2,"id":"deep-copy","text":"Deep copy"},{"level":2,"id":"dictionary-copying","text":"Dictionary copying"},{"level":2,"id":"safe-defaults-for-nested-data","text":"Safe defaults for nested data"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"containers, aliasing and copying containers hold references to objects . this explains two classic surprises. sequence repetition repeats references rows = [[ 0 ]] * 3 rows[ 0 ].append( 1 ) print (rows) # [[0, 1], [0, 1], [0, 1]] the outer list has three positions, but every position points to the same inner list. create independent rows with a comprehension: rows = [[ 0 ] for _ in range ( 3 )] shallow copy import copy original = [[ 1 ], [ 2 ]] clone = copy.copy(original) # same as original.copy() for a list the outer lists differ, but nested objects are shared: print (original is clone) # false print (original[ 0 ] is clone[ 0 ]) # true mutating clone[0] affects original[0] . deep copy copy.deepcopy recursively copies reachable objects and uses a memo table to preserve shared structure and handle cycles. clone = copy.deepcopy(original) print (original[ 0 ] is clone[ 0 ]) # false deep copy is not automatically correct. resources, sockets, locks, database sessions, and intentionally shared objects should not be blindly duplicated. prefer explicit construction when ownership matters. dictionary copying these all make shallow copies: b = a.copy() b = dict (a) b = {**a} nested lists or dictionaries remain shared. safe defaults for nested data use factories rather than repeated mutable values: matrix = [[ 0 for _ in range (cols)] for _ in range (rows)] groups = {key: [] for key in keys} interview answer a shallow copy creates a new outer container but reuses references to its elements. a deep copy recursively duplicates reachable objects with memoisation. i choose based on ownership rather than assuming deep copy is always safer.","words":278},{"path":"02-core-semantics/scope-closures-defaults.md","title":"Scope, Closures and Defaults","section":"2 · Core Python Semantics","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"scope-closures-and-default-arguments\">Scope, Closures and Default Arguments<\/h1>\n<h2 id=\"legb-lookup\">LEGB lookup<\/h2>\n<p>Python resolves an unqualified name through <strong>Local, Enclosing, Global, Builtins<\/strong> scopes.<\/p>\n<pre><code class=\"language-python\">rate = <span class=\"tok-number\">2<\/span>  <span class=\"tok-comment\"># global<\/span>\n\n<span class=\"tok-keyword\">def<\/span> outer():\n    rate = <span class=\"tok-number\">3<\/span>  <span class=\"tok-comment\"># enclosing<\/span>\n    <span class=\"tok-keyword\">def<\/span> inner(value):\n        <span class=\"tok-keyword\">return<\/span> value * rate\n    <span class=\"tok-keyword\">return<\/span> inner<\/code><\/pre>\n<p><code>inner<\/code> is a closure: it carries access to the enclosing <code>rate<\/code> binding after <code>outer<\/code> returns.<\/p>\n<h2 id=\"late-binding\">Late binding<\/h2>\n<p>Closures look up a captured variable when called, not when the function is created:<\/p>\n<pre><code class=\"language-python\">funcs = [<span class=\"tok-keyword\">lambda<\/span>: i <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(<span class=\"tok-number\">3<\/span>)]\n<span class=\"tok-builtin\">print<\/span>([f() <span class=\"tok-keyword\">for<\/span> f <span class=\"tok-keyword\">in<\/span> funcs])  <span class=\"tok-comment\"># [2, 2, 2]<\/span><\/code><\/pre>\n<p>All functions share the same <code>i<\/code> cell. Freeze the current value with a default:<\/p>\n<pre><code class=\"language-python\">funcs = [<span class=\"tok-keyword\">lambda<\/span> i=i: i <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(<span class=\"tok-number\">3<\/span>)]<\/code><\/pre>\n<h2 id=\"defaults-are-evaluated-once\">Defaults are evaluated once<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> add(item, bucket=[]):\n    bucket.append(item)\n    <span class=\"tok-keyword\">return<\/span> bucket\n\n<span class=\"tok-builtin\">print<\/span>(add(<span class=\"tok-string\">\"a\"<\/span>))  <span class=\"tok-comment\"># ['a']<\/span>\n<span class=\"tok-builtin\">print<\/span>(add(<span class=\"tok-string\">\"b\"<\/span>))  <span class=\"tok-comment\"># ['a', 'b']<\/span><\/code><\/pre>\n<p>The list is created when the <code>def<\/code> statement runs, not for every call.<\/p>\n<p>Use a sentinel:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> add(item, bucket=<span class=\"tok-keyword\">None<\/span>):\n    <span class=\"tok-keyword\">if<\/span> bucket <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        bucket = []\n    bucket.append(item)\n    <span class=\"tok-keyword\">return<\/span> bucket<\/code><\/pre>\n<p>Sometimes persistent state is intentional, but make it explicit rather than hiding it in a default.<\/p>\n<h2 id=\"nonlocal-and-global\"><code>nonlocal<\/code> and <code>global<\/code><\/h2>\n<ul><li><code>nonlocal name<\/code> rebinds a name in the nearest enclosing function scope.<\/li><li><code>global name<\/code> rebinds the module-level name.<\/li><\/ul>\n<p>Mutation does not require either keyword because it does not rebind the name:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> outer():\n    items = []\n    <span class=\"tok-keyword\">def<\/span> add(x):\n        items.append(x)  <span class=\"tok-comment\"># mutation, no nonlocal needed<\/span><\/code><\/pre>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>Closures capture bindings, and free variables are normally resolved when the inner function runs. Defaults are different: they are evaluated once when the function is defined. That explains both late-binding loops and mutable-default bugs.<\/p><\/blockquote>","toc":[{"level":2,"id":"legb-lookup","text":"LEGB lookup"},{"level":2,"id":"late-binding","text":"Late binding"},{"level":2,"id":"defaults-are-evaluated-once","text":"Defaults are evaluated once"},{"level":2,"id":"nonlocal-and-global","text":"nonlocal and global"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"scope, closures and default arguments legb lookup python resolves an unqualified name through local, enclosing, global, builtins scopes. rate = 2 # global def outer(): rate = 3 # enclosing def inner(value): return value * rate return inner inner is a closure: it carries access to the enclosing rate binding after outer returns. late binding closures look up a captured variable when called, not when the function is created: funcs = [ lambda : i for i in range ( 3 )] print ([f() for f in funcs]) # [2, 2, 2] all functions share the same i cell. freeze the current value with a default: funcs = [ lambda i=i: i for i in range ( 3 )] defaults are evaluated once def add(item, bucket=[]): bucket.append(item) return bucket print (add( \"a\" )) # ['a'] print (add( \"b\" )) # ['a', 'b'] the list is created when the def statement runs, not for every call. use a sentinel: def add(item, bucket= none ): if bucket is none : bucket = [] bucket.append(item) return bucket sometimes persistent state is intentional, but make it explicit rather than hiding it in a default. nonlocal and global nonlocal name rebinds a name in the nearest enclosing function scope. global name rebinds the module-level name. mutation does not require either keyword because it does not rebind the name: def outer(): items = [] def add(x): items.append(x) # mutation, no nonlocal needed interview answer closures capture bindings, and free variables are normally resolved when the inner function runs. defaults are different: they are evaluated once when the function is defined. that explains both late-binding loops and mutable-default bugs.","words":272},{"path":"03-functions-control-flow/README.md","title":"Overview","section":"3 · Functions & Control Flow","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"functions-and-control-flow\">Functions and Control Flow<\/h1>\n<p>Functions are objects with signatures. They can be passed, stored, wrapped, and called. Strong Python code also makes its calling contract and failure behaviour clear.<\/p>\n<p>This chapter covers:<\/p>\n<ul><li>positional-only and keyword-only arguments;<\/li><li><code>*args<\/code> and <code>**kwargs<\/code> without mystery;<\/li><li>decorators and metadata preservation;<\/li><li>EAFP, narrow exception handling, and cleanup.<\/li><\/ul>\n<h2 id=\"a-useful-distinction\">A useful distinction<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> greet(name):\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-string\">f\"Hello {name}\"<\/span>\n\nfn = greet       <span class=\"tok-comment\"># pass the function object<\/span>\ntext = greet(<span class=\"tok-string\">\"Ada\"<\/span>)  <span class=\"tok-comment\"># call it and store the result<\/span><\/code><\/pre>\n<p>Higher-order tools such as <code>map<\/code>, decorators, callbacks, and sort keys need the callable itself, not an already computed result.<\/p>\n<p>→ Continue with <strong><a class=\"mdlink\" data-href=\"signatures-and-arguments.md\" href=\"#\">Signatures and Arguments<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"a-useful-distinction","text":"A useful distinction"}],"text":"functions and control flow functions are objects with signatures. they can be passed, stored, wrapped, and called. strong python code also makes its calling contract and failure behaviour clear. this chapter covers: positional-only and keyword-only arguments; *args and **kwargs without mystery; decorators and metadata preservation; eafp, narrow exception handling, and cleanup. a useful distinction def greet(name): return f\"hello {name}\" fn = greet # pass the function object text = greet( \"ada\" ) # call it and store the result higher-order tools such as map , decorators, callbacks, and sort keys need the callable itself, not an already computed result. → continue with signatures and arguments .","words":106},{"path":"03-functions-control-flow/signatures-and-arguments.md","title":"Signatures and Arguments","section":"3 · Functions & Control Flow","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"signatures-and-arguments\">Signatures and Arguments<\/h1>\n<h2 id=\"the-three-zones\">The three zones<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> connect(host, /, port=<span class=\"tok-number\">443<\/span>, *, timeout=<span class=\"tok-number\">5<\/span>, verify=<span class=\"tok-keyword\">True<\/span>):\n    ...<\/code><\/pre>\n<ul><li>Before <code>/<\/code>: positional-only (<code>host<\/code>).<\/li><li>Between <code>/<\/code> and <code>*<\/code>: positional or keyword (<code>port<\/code>).<\/li><li>After <code>*<\/code>: keyword-only (<code>timeout<\/code>, <code>verify<\/code>).<\/li><\/ul>\n<p>Valid call:<\/p>\n<pre><code class=\"language-python\">connect(<span class=\"tok-string\">\"api.example.com\"<\/span>, port=<span class=\"tok-number\">8443<\/span>, timeout=<span class=\"tok-number\">10<\/span>)<\/code><\/pre>\n<p>Positional-only parameters let an implementation change an internal parameter name without breaking callers. Keyword-only parameters make important options visible at the call site.<\/p>\n<h2 id=\"packing-arguments\">Packing arguments<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> report(title, *values, scale=<span class=\"tok-number\">1<\/span>, **metadata):\n    ...<\/code><\/pre>\n<ul><li><code>values<\/code> is a tuple of extra positional arguments.<\/li><li><code>metadata<\/code> is a dictionary of extra keyword arguments.<\/li><li><code>scale<\/code> remains keyword-only.<\/li><\/ul>\n<h2 id=\"unpacking-at-the-call-site\">Unpacking at the call site<\/h2>\n<pre><code class=\"language-python\">args = (<span class=\"tok-string\">\"example.com\"<\/span>, <span class=\"tok-number\">443<\/span>)\noptions = {<span class=\"tok-string\">\"timeout\"<\/span>: <span class=\"tok-number\">2<\/span>, <span class=\"tok-string\">\"verify\"<\/span>: <span class=\"tok-keyword\">True<\/span>}\nconnect(*args, **options)<\/code><\/pre>\n<p>Duplicate values are errors. <code>connect(\"x\", timeout=2, **{\"timeout\": 5})<\/code> raises <code>TypeError<\/code>.<\/p>\n<h2 id=\"defaults-are-part-of-the-api\">Defaults are part of the API<\/h2>\n<p>Prefer immutable defaults. Use <code>None<\/code> or a private sentinel when “not supplied” must differ from a legitimate <code>None<\/code>:<\/p>\n<pre><code class=\"language-python\">_MISSING = object()\n\n<span class=\"tok-keyword\">def<\/span> lookup(key, default=_MISSING):\n    <span class=\"tok-keyword\">if<\/span> default <span class=\"tok-keyword\">is<\/span> _MISSING:\n        ...<\/code><\/pre>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p><code>/<\/code> marks positional-only parameters and <code>*<\/code> marks the start of keyword-only parameters. They let an API control how callers express intent and preserve compatibility. <code>*args<\/code> and <code>**kwargs<\/code> collect extra positional and keyword arguments.<\/p><\/blockquote>","toc":[{"level":2,"id":"the-three-zones","text":"The three zones"},{"level":2,"id":"packing-arguments","text":"Packing arguments"},{"level":2,"id":"unpacking-at-the-call-site","text":"Unpacking at the call site"},{"level":2,"id":"defaults-are-part-of-the-api","text":"Defaults are part of the API"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"signatures and arguments the three zones def connect(host, /, port= 443 , *, timeout= 5 , verify= true ): ... before / : positional-only ( host ). between / and * : positional or keyword ( port ). after * : keyword-only ( timeout , verify ). valid call: connect( \"api.example.com\" , port= 8443 , timeout= 10 ) positional-only parameters let an implementation change an internal parameter name without breaking callers. keyword-only parameters make important options visible at the call site. packing arguments def report(title, *values, scale= 1 , **metadata): ... values is a tuple of extra positional arguments. metadata is a dictionary of extra keyword arguments. scale remains keyword-only. unpacking at the call site args = ( \"example.com\" , 443 ) options = { \"timeout\" : 2 , \"verify\" : true } connect(*args, **options) duplicate values are errors. connect(\"x\", timeout=2, **{\"timeout\": 5}) raises typeerror . defaults are part of the api prefer immutable defaults. use none or a private sentinel when “not supplied” must differ from a legitimate none : _missing = object() def lookup(key, default=_missing): if default is _missing: ... interview answer / marks positional-only parameters and * marks the start of keyword-only parameters. they let an api control how callers express intent and preserve compatibility. *args and **kwargs collect extra positional and keyword arguments.","words":217},{"path":"03-functions-control-flow/decorators-and-callables.md","title":"Decorators and Callables","section":"3 · Functions & Control Flow","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"decorators-and-callables\">Decorators and Callables<\/h1>\n<p>A decorator receives a function or class and returns a replacement.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> functools <span class=\"tok-keyword\">import<\/span> wraps\n<span class=\"tok-keyword\">from<\/span> time <span class=\"tok-keyword\">import<\/span> perf_counter\n\n<span class=\"tok-keyword\">def<\/span> timed(fn):\n    <span class=\"tok-decorator\">@wraps<\/span>(fn)\n    <span class=\"tok-keyword\">def<\/span> wrapper(*args, **kwargs):\n        start = perf_counter()\n        <span class=\"tok-keyword\">try<\/span>:\n            <span class=\"tok-keyword\">return<\/span> fn(*args, **kwargs)\n        <span class=\"tok-keyword\">finally<\/span>:\n            <span class=\"tok-builtin\">print<\/span>(fn.__name__, perf_counter() - start)\n    <span class=\"tok-keyword\">return<\/span> wrapper<\/code><\/pre>\n<p>Decoration syntax is assignment:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-decorator\">@timed<\/span>\n<span class=\"tok-keyword\">def<\/span> load_data(path):\n    ...\n\n<span class=\"tok-comment\"># equivalent to:<\/span>\nload_data = timed(load_data)<\/code><\/pre>\n<h2 id=\"why-wraps-matters\">Why <code>wraps<\/code> matters<\/h2>\n<p>Without it, the decorated function appears to be named <code>wrapper<\/code>, loses its documentation, and becomes harder for introspection and frameworks to understand. <code>wraps<\/code> preserves important metadata and sets <code>__wrapped__<\/code>.<\/p>\n<h2 id=\"decorators-with-configuration\">Decorators with configuration<\/h2>\n<p>An extra outer function captures configuration:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> retry(attempts):\n    <span class=\"tok-keyword\">def<\/span> decorate(fn):\n        <span class=\"tok-decorator\">@wraps<\/span>(fn)\n        <span class=\"tok-keyword\">def<\/span> wrapper(*args, **kwargs):\n            ...\n        <span class=\"tok-keyword\">return<\/span> wrapper\n    <span class=\"tok-keyword\">return<\/span> decorate\n\n<span class=\"tok-decorator\">@retry<\/span>(attempts=<span class=\"tok-number\">3<\/span>)\n<span class=\"tok-keyword\">def<\/span> fetch():\n    ...<\/code><\/pre>\n<p>This has three levels: create decorator, decorate function, call wrapped function.<\/p>\n<h2 id=\"callable-objects\">Callable objects<\/h2>\n<p>Any object implementing <code>__call__<\/code> can be used like a function:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Threshold:\n    <span class=\"tok-keyword\">def<\/span> __init__(<span class=\"tok-keyword\">self<\/span>, minimum):\n        <span class=\"tok-keyword\">self<\/span>.minimum = minimum\n\n    <span class=\"tok-keyword\">def<\/span> __call__(<span class=\"tok-keyword\">self<\/span>, value):\n        <span class=\"tok-keyword\">return<\/span> value &gt;= <span class=\"tok-keyword\">self<\/span>.minimum<\/code><\/pre>\n<p><code>filter(Threshold(10), values)<\/code> now uses a stateful predicate.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>A decorator transforms a function or class at definition time. A wrapper should normally accept and forward arbitrary arguments and use <code>functools.wraps<\/code> so metadata and introspection remain useful.<\/p><\/blockquote>","toc":[{"level":2,"id":"why-wraps-matters","text":"Why wraps matters"},{"level":2,"id":"decorators-with-configuration","text":"Decorators with configuration"},{"level":2,"id":"callable-objects","text":"Callable objects"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"decorators and callables a decorator receives a function or class and returns a replacement. from functools import wraps from time import perf_counter def timed(fn): @wraps (fn) def wrapper(*args, **kwargs): start = perf_counter() try : return fn(*args, **kwargs) finally : print (fn.__name__, perf_counter() - start) return wrapper decoration syntax is assignment: @timed def load_data(path): ... # equivalent to: load_data = timed(load_data) why wraps matters without it, the decorated function appears to be named wrapper , loses its documentation, and becomes harder for introspection and frameworks to understand. wraps preserves important metadata and sets __wrapped__ . decorators with configuration an extra outer function captures configuration: def retry(attempts): def decorate(fn): @wraps (fn) def wrapper(*args, **kwargs): ... return wrapper return decorate @retry (attempts= 3 ) def fetch(): ... this has three levels: create decorator, decorate function, call wrapped function. callable objects any object implementing __call__ can be used like a function: class threshold: def __init__( self , minimum): self .minimum = minimum def __call__( self , value): return value >= self .minimum filter(threshold(10), values) now uses a stateful predicate. interview answer a decorator transforms a function or class at definition time. a wrapper should normally accept and forward arbitrary arguments and use functools.wraps so metadata and introspection remain useful.","words":205},{"path":"03-functions-control-flow/exceptions-and-eafp.md","title":"Exceptions and EAFP","section":"3 · Functions & Control Flow","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"exceptions-and-eafp\">Exceptions and EAFP<\/h1>\n<p>Python often prefers <strong>EAFP<\/strong>: easier to ask forgiveness than permission. Try the operation and catch the specific expected failure.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">try<\/span>:\n    value = config[<span class=\"tok-string\">\"timeout\"<\/span>]\n<span class=\"tok-keyword\">except<\/span> KeyError:\n    value = <span class=\"tok-number\">5<\/span><\/code><\/pre>\n<p>This avoids a separate membership lookup and a check-then-use race.<\/p>\n<h2 id=\"keep-the-try-block-narrow\">Keep the <code>try<\/code> block narrow<\/h2>\n<p>Bad:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">try<\/span>:\n    config = load_config()\n    timeout = config[<span class=\"tok-string\">\"timeout\"<\/span>]\n    client = Client(timeout)\n<span class=\"tok-keyword\">except<\/span> Exception:\n    timeout = <span class=\"tok-number\">5<\/span><\/code><\/pre>\n<p>Any programming error is hidden. Better:<\/p>\n<pre><code class=\"language-python\">config = load_config()\n<span class=\"tok-keyword\">try<\/span>:\n    timeout = config[<span class=\"tok-string\">\"timeout\"<\/span>]\n<span class=\"tok-keyword\">except<\/span> KeyError:\n    timeout = <span class=\"tok-number\">5<\/span>\nclient = Client(timeout)<\/code><\/pre>\n<h2 id=\"exception-structure\">Exception structure<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">try<\/span>:\n    result = risky_operation()\n<span class=\"tok-keyword\">except<\/span> ExpectedError <span class=\"tok-keyword\">as<\/span> exc:\n    recover(exc)\n<span class=\"tok-keyword\">else<\/span>:\n    use(result)       <span class=\"tok-comment\"># runs only when no exception occurred<\/span>\n<span class=\"tok-keyword\">finally<\/span>:\n    cleanup()         <span class=\"tok-comment\"># runs either way<\/span><\/code><\/pre>\n<p>The <code>else<\/code> block keeps unrelated code outside the protected region. <code>finally<\/code> is for unconditional cleanup.<\/p>\n<h2 id=\"add-context-without-losing-the-cause\">Add context without losing the cause<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">try<\/span>:\n    <span class=\"tok-keyword\">return<\/span> parse(payload)\n<span class=\"tok-keyword\">except<\/span> ValueError <span class=\"tok-keyword\">as<\/span> exc:\n    <span class=\"tok-keyword\">raise<\/span> InvalidMessage(<span class=\"tok-string\">\"bad customer event\"<\/span>) <span class=\"tok-keyword\">from<\/span> exc<\/code><\/pre>\n<p>Exception chaining preserves the original failure.<\/p>\n<h2 id=\"what-not-to-catch-casually\">What not to catch casually<\/h2>\n<p><code>BaseException<\/code> includes <code>KeyboardInterrupt<\/code>, <code>SystemExit<\/code>, and cancellation-related control flow. Application code normally catches <code>Exception<\/code> or, better, a narrower type.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>EAFP means attempting the operation and handling a narrow expected exception. It avoids duplicated checks and check-then-act races, but the <code>try<\/code> block and exception type must be narrow so unrelated bugs still surface.<\/p><\/blockquote>","toc":[{"level":2,"id":"keep-the-try-block-narrow","text":"Keep the try block narrow"},{"level":2,"id":"exception-structure","text":"Exception structure"},{"level":2,"id":"add-context-without-losing-the-cause","text":"Add context without losing the cause"},{"level":2,"id":"what-not-to-catch-casually","text":"What not to catch casually"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"exceptions and eafp python often prefers eafp : easier to ask forgiveness than permission. try the operation and catch the specific expected failure. try : value = config[ \"timeout\" ] except keyerror: value = 5 this avoids a separate membership lookup and a check-then-use race. keep the try block narrow bad: try : config = load_config() timeout = config[ \"timeout\" ] client = client(timeout) except exception: timeout = 5 any programming error is hidden. better: config = load_config() try : timeout = config[ \"timeout\" ] except keyerror: timeout = 5 client = client(timeout) exception structure try : result = risky_operation() except expectederror as exc: recover(exc) else : use(result) # runs only when no exception occurred finally : cleanup() # runs either way the else block keeps unrelated code outside the protected region. finally is for unconditional cleanup. add context without losing the cause try : return parse(payload) except valueerror as exc: raise invalidmessage( \"bad customer event\" ) from exc exception chaining preserves the original failure. what not to catch casually baseexception includes keyboardinterrupt , systemexit , and cancellation-related control flow. application code normally catches exception or, better, a narrower type. interview answer eafp means attempting the operation and handling a narrow expected exception. it avoids duplicated checks and check-then-act races, but the try block and exception type must be narrow so unrelated bugs still surface.","words":225},{"path":"04-iterators-generators/README.md","title":"Overview","section":"4 · Iterators & Generators","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"iterators-and-generators\">Iterators and Generators<\/h1>\n<p>Iteration is a protocol, not only a <code>for<\/code> loop. Once you understand the protocol, <code>map<\/code>, <code>filter<\/code>, generator expressions, <code>yield<\/code>, <code>itertools<\/code>, file iteration, and streaming pipelines become one connected idea.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">for<\/span> item <span class=\"tok-keyword\">in<\/span> source:\n    process(item)<\/code><\/pre>\n<p>Conceptually, Python does this:<\/p>\n<pre><code class=\"language-python\">iterator = iter(source)\n<span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n    <span class=\"tok-keyword\">try<\/span>:\n        item = next(iterator)\n    <span class=\"tok-keyword\">except<\/span> StopIteration:\n        <span class=\"tok-keyword\">break<\/span>\n    process(item)<\/code><\/pre>\n<p>The real bytecode is optimised, but this is the correct mental model.<\/p>\n<p>→ Continue with <strong><a class=\"mdlink\" data-href=\"iterator-protocol.md\" href=\"#\">The Iterator Protocol<\/a><\/strong>.<\/p>","toc":[],"text":"iterators and generators iteration is a protocol, not only a for loop. once you understand the protocol, map , filter , generator expressions, yield , itertools , file iteration, and streaming pipelines become one connected idea. for item in source: process(item) conceptually, python does this: iterator = iter(source) while true : try : item = next(iterator) except stopiteration: break process(item) the real bytecode is optimised, but this is the correct mental model. → continue with the iterator protocol .","words":79},{"path":"04-iterators-generators/iterator-protocol.md","title":"The Iterator Protocol","section":"4 · Iterators & Generators","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"the-iterator-protocol\">The Iterator Protocol<\/h1>\n<h2 id=\"iterable-versus-iterator\">Iterable versus iterator<\/h2>\n<p>An <strong>iterable<\/strong> implements <code>__iter__<\/code> and can produce an iterator. An <strong>iterator<\/strong> implements <code>__next__<\/code> and returns itself from <code>__iter__<\/code>.<\/p>\n<pre><code class=\"language-python\">values = [<span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">20<\/span>, <span class=\"tok-number\">30<\/span>]  <span class=\"tok-comment\"># iterable<\/span>\nit = iter(values)       <span class=\"tok-comment\"># iterator<\/span>\n<span class=\"tok-builtin\">print<\/span>(next(it))         <span class=\"tok-comment\"># 10<\/span><\/code><\/pre>\n<p>At exhaustion, <code>__next__<\/code> must raise <code>StopIteration<\/code>. Returning <code>None<\/code> would mean that <code>None<\/code> is another legitimate item.<\/p>\n<h2 id=\"a-custom-iterator\">A custom iterator<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Countdown:\n    <span class=\"tok-keyword\">def<\/span> __init__(<span class=\"tok-keyword\">self<\/span>, start):\n        <span class=\"tok-keyword\">self<\/span>.current = start\n\n    <span class=\"tok-keyword\">def<\/span> __iter__(<span class=\"tok-keyword\">self<\/span>):\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-keyword\">self<\/span>\n\n    <span class=\"tok-keyword\">def<\/span> __next__(<span class=\"tok-keyword\">self<\/span>):\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">self<\/span>.current &lt;= <span class=\"tok-number\">0<\/span>:\n            <span class=\"tok-keyword\">raise<\/span> StopIteration\n        value = <span class=\"tok-keyword\">self<\/span>.current\n        <span class=\"tok-keyword\">self<\/span>.current -= <span class=\"tok-number\">1<\/span>\n        <span class=\"tok-keyword\">return<\/span> value<\/code><\/pre>\n<p>The object stores traversal state, so it is one-pass.<\/p>\n<h2 id=\"prefer-an-iterable-when-reuse-is-expected\">Prefer an iterable when reuse is expected<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">class<\/span> Countdown:\n    <span class=\"tok-keyword\">def<\/span> __init__(<span class=\"tok-keyword\">self<\/span>, start):\n        <span class=\"tok-keyword\">self<\/span>.start = start\n\n    <span class=\"tok-keyword\">def<\/span> __iter__(<span class=\"tok-keyword\">self<\/span>):\n        <span class=\"tok-keyword\">return<\/span> iter(<span class=\"tok-builtin\">range<\/span>(<span class=\"tok-keyword\">self<\/span>.start, <span class=\"tok-number\">0<\/span>, -<span class=\"tok-number\">1<\/span>))<\/code><\/pre>\n<p>Each call to <code>iter(countdown)<\/code> creates a fresh range iterator.<\/p>\n<h2 id=\"the-two-argument-iter\">The two-argument <code>iter<\/code><\/h2>\n<p><code>iter(callable, sentinel)<\/code> repeatedly calls a zero-argument callable until the returned value equals the sentinel:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> functools <span class=\"tok-keyword\">import<\/span> partial\n\n<span class=\"tok-keyword\">for<\/span> chunk <span class=\"tok-keyword\">in<\/span> iter(partial(file.read, <span class=\"tok-number\">8192<\/span>), <span class=\"tok-string\">b\"\"<\/span>):\n    process(chunk)<\/code><\/pre>\n<p>This cleanly expresses “read until EOF.”<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>An iterable can create iterators. An iterator is a stateful, single-pass object whose <code>__next__<\/code> returns a value or raises <code>StopIteration<\/code>. A <code>for<\/code> loop obtains an iterator and repeatedly calls <code>next<\/code> until exhaustion.<\/p><\/blockquote>","toc":[{"level":2,"id":"iterable-versus-iterator","text":"Iterable versus iterator"},{"level":2,"id":"a-custom-iterator","text":"A custom iterator"},{"level":2,"id":"prefer-an-iterable-when-reuse-is-expected","text":"Prefer an iterable when reuse is expected"},{"level":2,"id":"the-two-argument-iter","text":"The two-argument iter"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"the iterator protocol iterable versus iterator an iterable implements __iter__ and can produce an iterator. an iterator implements __next__ and returns itself from __iter__ . values = [ 10 , 20 , 30 ] # iterable it = iter(values) # iterator print (next(it)) # 10 at exhaustion, __next__ must raise stopiteration . returning none would mean that none is another legitimate item. a custom iterator class countdown: def __init__( self , start): self .current = start def __iter__( self ): return self def __next__( self ): if self .current <= 0 : raise stopiteration value = self .current self .current -= 1 return value the object stores traversal state, so it is one-pass. prefer an iterable when reuse is expected class countdown: def __init__( self , start): self .start = start def __iter__( self ): return iter( range ( self .start, 0 , - 1 )) each call to iter(countdown) creates a fresh range iterator. the two-argument iter iter(callable, sentinel) repeatedly calls a zero-argument callable until the returned value equals the sentinel: from functools import partial for chunk in iter(partial(file.read, 8192 ), b\"\" ): process(chunk) this cleanly expresses “read until eof.” interview answer an iterable can create iterators. an iterator is a stateful, single-pass object whose __next__ returns a value or raises stopiteration . a for loop obtains an iterator and repeatedly calls next until exhaustion.","words":226},{"path":"04-iterators-generators/generators-yield-from.md","title":"Generators and yield from","section":"4 · Iterators & Generators","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"generators-and-yield-from\">Generators and <code>yield from<\/code><\/h1>\n<p>A function containing <code>yield<\/code> returns a generator object when called. Its body does not run until iteration begins.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> squares(limit):\n    <span class=\"tok-keyword\">for<\/span> x <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(limit):\n        <span class=\"tok-keyword\">yield<\/span> x * x\n\ng = squares(<span class=\"tok-number\">3<\/span>)  <span class=\"tok-comment\"># body has not run<\/span>\n<span class=\"tok-builtin\">print<\/span>(next(g))  <span class=\"tok-comment\"># 0<\/span>\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-builtin\">list<\/span>(g))  <span class=\"tok-comment\"># [1, 4]<\/span><\/code><\/pre>\n<p>The generator suspends at <code>yield<\/code>, preserving local variables and the instruction position. The next request resumes after that yield.<\/p>\n<h2 id=\"generator-expression-versus-list-comprehension\">Generator expression versus list comprehension<\/h2>\n<pre><code class=\"language-python\">eager = [parse(line) <span class=\"tok-keyword\">for<\/span> line <span class=\"tok-keyword\">in<\/span> file]\nlazy = (parse(line) <span class=\"tok-keyword\">for<\/span> line <span class=\"tok-keyword\">in<\/span> file)<\/code><\/pre>\n<p>The list is materialised, reusable, and gives eager failures. The generator is memory-efficient and single-pass.<\/p>\n<h2 id=\"delegation-with-yield-from\">Delegation with <code>yield from<\/code><\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> walk(groups):\n    <span class=\"tok-keyword\">for<\/span> group <span class=\"tok-keyword\">in<\/span> groups:\n        <span class=\"tok-keyword\">yield<\/span> <span class=\"tok-keyword\">from<\/span> group<\/code><\/pre>\n<p>This delegates iteration instead of writing a nested loop.<\/p>\n<p>It also forwards <code>send<\/code>, <code>throw<\/code>, and <code>close<\/code>, and captures a subgenerator's return value:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> child():\n    <span class=\"tok-keyword\">yield<\/span> <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-number\">42<\/span>\n\n<span class=\"tok-keyword\">def<\/span> parent():\n    result = <span class=\"tok-keyword\">yield<\/span> <span class=\"tok-keyword\">from<\/span> child()\n    <span class=\"tok-keyword\">yield<\/span> result\n\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-builtin\">list<\/span>(parent()))  <span class=\"tok-comment\"># [1, 42]<\/span><\/code><\/pre>\n<p>The child's <code>return 42<\/code> becomes <code>StopIteration.value<\/code>; <code>yield from<\/code> assigns it to <code>result<\/code>.<\/p>\n<h2 id=\"cleanup\">Cleanup<\/h2>\n<p>Use <code>try/finally<\/code> inside a generator when it owns a resource, and explicitly close or fully consume it. Better still, keep resource ownership in a context manager so lifecycle is obvious.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>A generator is an iterator created by a function that suspends at <code>yield<\/code>, preserving execution state. <code>yield from<\/code> delegates the full generator protocol to a subiterator and captures the subgenerator's return value.<\/p><\/blockquote>","toc":[{"level":2,"id":"generator-expression-versus-list-comprehension","text":"Generator expression versus list comprehension"},{"level":2,"id":"delegation-with-yield-from","text":"Delegation with yield from"},{"level":2,"id":"cleanup","text":"Cleanup"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"generators and yield from a function containing yield returns a generator object when called. its body does not run until iteration begins. def squares(limit): for x in range (limit): yield x * x g = squares( 3 ) # body has not run print (next(g)) # 0 print ( list (g)) # [1, 4] the generator suspends at yield , preserving local variables and the instruction position. the next request resumes after that yield. generator expression versus list comprehension eager = [parse(line) for line in file] lazy = (parse(line) for line in file) the list is materialised, reusable, and gives eager failures. the generator is memory-efficient and single-pass. delegation with yield from def walk(groups): for group in groups: yield from group this delegates iteration instead of writing a nested loop. it also forwards send , throw , and close , and captures a subgenerator's return value: def child(): yield 1 return 42 def parent(): result = yield from child() yield result print ( list (parent())) # [1, 42] the child's return 42 becomes stopiteration.value ; yield from assigns it to result . cleanup use try/finally inside a generator when it owns a resource, and explicitly close or fully consume it. better still, keep resource ownership in a context manager so lifecycle is obvious. interview answer a generator is an iterator created by a function that suspends at yield , preserving execution state. yield from delegates the full generator protocol to a subiterator and captures the subgenerator's return value.","words":248},{"path":"04-iterators-generators/itertools-streaming.md","title":"itertools and Streaming Pipelines","section":"4 · Iterators & Generators","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"itertools-and-streaming-pipelines\"><code>itertools<\/code> and Streaming Pipelines<\/h1>\n<p><code>itertools<\/code> provides small, composable iterator building blocks.<\/p>\n<h2 id=\"common-tools\">Common tools<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> itertools <span class=\"tok-keyword\">import<\/span> chain, islice, takewhile\n\nall_events = chain(events_a, events_b)\nfirst_hundred = islice(all_events, <span class=\"tok-number\">100<\/span>)\nuntil_error = takewhile(<span class=\"tok-keyword\">lambda<\/span> e: e.ok, first_hundred)<\/code><\/pre>\n<p>No intermediate lists are required.<\/p>\n<h2 id=\"groupby-groups-runs-not-global-values\"><code>groupby<\/code> groups runs, not global values<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> itertools <span class=\"tok-keyword\">import<\/span> groupby\n\nvalues = [<span class=\"tok-string\">\"a\"<\/span>, <span class=\"tok-string\">\"a\"<\/span>, <span class=\"tok-string\">\"b\"<\/span>, <span class=\"tok-string\">\"a\"<\/span>]\n[(key, <span class=\"tok-builtin\">list<\/span>(group)) <span class=\"tok-keyword\">for<\/span> key, group <span class=\"tok-keyword\">in<\/span> groupby(values)]\n<span class=\"tok-comment\"># [('a', ['a', 'a']), ('b', ['b']), ('a', ['a'])]<\/span><\/code><\/pre>\n<p>To group globally, sort by the same key first. Each group iterator shares the source, so consume it before advancing the outer iterator.<\/p>\n<h2 id=\"tee-uses-buffers\"><code>tee<\/code> uses buffers<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> itertools <span class=\"tok-keyword\">import<\/span> tee\na, b = tee(source, <span class=\"tok-number\">2<\/span>)<\/code><\/pre>\n<p>This creates independent-looking iterators, but items consumed by <code>a<\/code> must be buffered until <code>b<\/code> catches up. A large gap can use large memory. <code>tee<\/code> is not a free copy.<\/p>\n<h2 id=\"batching-without-loading-everything\">Batching without loading everything<\/h2>\n<p>Modern Python provides <code>itertools.batched<\/code>:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> itertools <span class=\"tok-keyword\">import<\/span> batched\n\n<span class=\"tok-keyword\">for<\/span> batch <span class=\"tok-keyword\">in<\/span> batched(records, <span class=\"tok-number\">100<\/span>):\n    write_batch(batch)<\/code><\/pre>\n<p>Each batch is a tuple. On older versions, build the same idea with <code>islice<\/code>.<\/p>\n<h2 id=\"pipeline-ownership\">Pipeline ownership<\/h2>\n<p>A lazy pipeline may keep its source open. If the source is a file, consume the pipeline inside the <code>with<\/code> block:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">with<\/span> <span class=\"tok-builtin\">open<\/span>(path) <span class=\"tok-keyword\">as<\/span> handle:\n    clean = (line.strip() <span class=\"tok-keyword\">for<\/span> line <span class=\"tok-keyword\">in<\/span> handle <span class=\"tok-keyword\">if<\/span> line.strip())\n    <span class=\"tok-keyword\">for<\/span> line <span class=\"tok-keyword\">in<\/span> clean:\n        process(line)<\/code><\/pre>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p><code>itertools<\/code> composes lazy, memory-efficient stages. The main caveats are shared-source behaviour in <code>groupby<\/code> and <code>tee<\/code>, single-pass consumption, and making the resource lifetime cover the pipeline's consumption.<\/p><\/blockquote>","toc":[{"level":2,"id":"common-tools","text":"Common tools"},{"level":2,"id":"groupby-groups-runs-not-global-values","text":"groupby groups runs, not global values"},{"level":2,"id":"tee-uses-buffers","text":"tee uses buffers"},{"level":2,"id":"batching-without-loading-everything","text":"Batching without loading everything"},{"level":2,"id":"pipeline-ownership","text":"Pipeline ownership"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"itertools and streaming pipelines itertools provides small, composable iterator building blocks. common tools from itertools import chain, islice, takewhile all_events = chain(events_a, events_b) first_hundred = islice(all_events, 100 ) until_error = takewhile( lambda e: e.ok, first_hundred) no intermediate lists are required. groupby groups runs, not global values from itertools import groupby values = [ \"a\" , \"a\" , \"b\" , \"a\" ] [(key, list (group)) for key, group in groupby(values)] # [('a', ['a', 'a']), ('b', ['b']), ('a', ['a'])] to group globally, sort by the same key first. each group iterator shares the source, so consume it before advancing the outer iterator. tee uses buffers from itertools import tee a, b = tee(source, 2 ) this creates independent-looking iterators, but items consumed by a must be buffered until b catches up. a large gap can use large memory. tee is not a free copy. batching without loading everything modern python provides itertools.batched : from itertools import batched for batch in batched(records, 100 ): write_batch(batch) each batch is a tuple. on older versions, build the same idea with i

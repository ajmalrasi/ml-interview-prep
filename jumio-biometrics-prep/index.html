<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#155e75">
<title>Jumio Biometrics: Staff ML Engineer Interview Prep</title>
<style>
  :root{
    --bg:#f7fafb; --bg-soft:#eaf3f5; --bg-side:#f0f7f8; --text:#172a32;
    --muted:#58707a; --border:#d5e5e9; --accent:#0e7490; --accent-2:#0891b2;
    --accent-soft:#d9f0f4; --code-bg:#eaf3f5; --code-text:#294b57; --quote:#47616b;
    --tok-comment:#7d9299; --tok-string:#15803d; --tok-keyword:#0e7490; --tok-builtin:#7c3aed;
    --tok-number:#b45309; --tok-decorator:#9333ea; --tok-command:#0f766e; --tok-flag:#b45309; --tok-variable:#7c3aed;
    --link:#08728a; --header-bg:rgba(247,250,251,.88);
    --shadow:0 1px 2px rgba(12,74,90,.05),0 8px 24px rgba(12,74,90,.07);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#102127; --bg-soft:#18323a; --bg-side:#0c1b20; --text:#e6f2f4;
    --muted:#9bb7bf; --border:#27434b; --accent:#38b6d2; --accent-2:#22d3ee;
    --accent-soft:#173f49; --code-bg:#18323a; --code-text:#cce4e8; --quote:#a9c3c9;
    --tok-comment:#829da4; --tok-string:#86d69d; --tok-keyword:#56c4dc; --tok-builtin:#c4a7ff;
    --tok-number:#f0b565; --tok-decorator:#c4a7ff; --tok-command:#62d0c7; --tok-flag:#f0b565; --tok-variable:#c4a7ff;
    --link:#67d3e8; --header-bg:rgba(16,33,39,.88);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;scroll-behavior:smooth}
  :root{
    --font-sans:"Inter","SF Pro Text",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.65 var(--font-sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    letter-spacing:-0.011em;
  }
  .brand,.tools,nav,.topbar,.pager .lbl,.sec-h,.banner,.pagetools,.toc,.searchpanel{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:300px minmax(0,1fr); min-height:100vh; min-height:100dvh}

  /* sidebar */
  .sidebar{background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; height:100dvh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom)}
  .brand{padding:20px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2}
  .nav-hide{position:static;display:inline-flex;align-items:center;gap:6px;margin-top:10px;border:0;background:transparent;color:var(--muted);
    border-radius:7px;padding:5px 0;font-size:11.5px;font-weight:600;cursor:pointer}
  .nav-hide:hover{color:var(--accent)}
  .nav-collapsed-bar{display:none}
  .nav-show{display:none;position:static;width:auto;height:36px;padding:0 12px;gap:7px;font-size:12.5px;box-shadow:var(--shadow)}
  .app.nav-hidden{grid-template-columns:minmax(0,1fr)}
  .app.nav-hidden .sidebar{display:none}
  .app.nav-hidden .nav-collapsed-bar{display:flex;position:sticky;z-index:45;top:0;height:53px;align-items:center;
    padding:8px max(16px,env(safe-area-inset-left));border-bottom:1px solid var(--border);background:var(--header-bg);
    backdrop-filter:saturate(140%) blur(10px);-webkit-backdrop-filter:saturate(140%) blur(10px)}
  .app.nav-hidden .nav-show{display:flex}
  .app.nav-hidden .content-wrap{padding-top:32px}
  .brand h1{font-size:15px; margin:0 0 3px; letter-spacing:.2px; font-weight:700}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:14px}
  .tools input{flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:14px; outline:none}
  .tools input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .iconbtn{background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; min-width:40px; height:40px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:none}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent)}
  a.jbtn{display:block; margin-top:10px; text-align:center; text-decoration:none;
    background:var(--accent); color:#fff; border-radius:10px; padding:9px 12px;
    font-size:13px; font-weight:700; letter-spacing:.2px}
  a.jbtn:hover{filter:brightness(1.08); text-decoration:none}
  nav{padding:10px 10px calc(60px + env(safe-area-inset-bottom))}
  .sec{margin:2px 0}
  .sec>.sec-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    padding:14px 12px 5px; font-weight:700}
  nav a.item{display:block; padding:8px 12px; border-radius:9px; color:var(--text);
    font-size:13.5px; margin:1px 0; line-height:1.35}
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:16px}
  .hidden{display:none !important}

  /* main */
  .main{min-width:0; overflow-x:hidden}
  .topbar{display:none; align-items:center; gap:10px;
    padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
    background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px); -webkit-backdrop-filter:saturate(140%) blur(10px)}
  .topbar .tb-title{flex:1; min-width:0; font-weight:700; font-size:15px; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .content-wrap{max-width:760px; margin:0 auto;
    padding:40px max(32px,env(safe-area-inset-left)) 90px max(32px,env(safe-area-inset-right))}

  /* page tools (outline + quiz) */
  .pagetools{margin:0 0 8px}
  .toc{border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-soft); margin:0 0 22px}
  .toc>summary{cursor:pointer; padding:11px 15px; font-size:13px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; list-style:none}
  .toc>summary::-webkit-details-marker{display:none}
  .toc>summary::after{content:"▾"; float:right; color:var(--accent)}
  .toc[open]>summary::after{content:"▴"}
  .toc ul{list-style:none; margin:0 0 8px; padding:0 8px 4px}
  .toc li{margin:0}
  .toc a{display:block; padding:5px 10px; border-radius:7px; font-size:13.5px; color:var(--text)}
  .toc a:hover{background:var(--bg); text-decoration:none}
  .toc a.lvl3{padding-left:24px; font-size:13px; color:var(--muted)}
  .quizbar{display:flex; gap:8px; align-items:center; margin:0 0 18px; flex-wrap:wrap}
  .quizbar .qbtn{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);
    border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer}
  .quizbar .qbtn:hover{background:var(--accent); color:#fff}
  .quizbar .hint{font-size:12.5px; color:var(--muted)}

  article{font-size:clamp(15.5px,1.4vw,17px)}
  article h1{font-size:clamp(27px,5vw,34px); line-height:1.18; margin:.1em 0 .5em; letter-spacing:-.6px; font-weight:800; color:var(--text)}
  @supports ((-webkit-background-clip:text) or (background-clip:text)){
    article h1{background:linear-gradient(90deg,var(--sec-accent,var(--accent)),var(--text) 75%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent}
  }
  article h2{font-size:clamp(20px,3.4vw,23px); margin:1.7em 0 .5em; padding-bottom:.28em;
    border-bottom:2px solid var(--sec-accent,var(--accent)); font-weight:700; display:inline-block}
  article h3{font-size:clamp(16.5px,2.4vw,18px); margin:1.5em 0 .4em; font-weight:700}
  article p{margin:.75em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.45em}
  article li{margin:.3em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article strong{font-weight:700}
  article code{background:var(--code-bg); color:var(--code-text); padding:.13em .42em;
    border-radius:6px; font:.85em/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; word-break:break-word}
  article pre{background:var(--code-bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.1em 0}
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre; word-break:normal}
  article pre .tok-comment{color:var(--tok-comment); font-style:italic}
  article pre .tok-string{color:var(--tok-string)}
  article pre .tok-keyword{color:var(--tok-keyword); font-weight:600}
  article pre .tok-builtin{color:var(--tok-builtin)}
  article pre .tok-number{color:var(--tok-number)}
  article pre .tok-decorator{color:var(--tok-decorator)}
  article pre .tok-command{color:var(--tok-command); font-weight:600}
  article pre .tok-flag{color:var(--tok-flag)}
  article pre .tok-variable{color:var(--tok-variable)}
  article blockquote{margin:1.1em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 10px 10px 0}
  article blockquote p{margin:.3em 0}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.2em 0; border-radius:var(--radius)}
  article table{border-collapse:collapse; width:100%; font-size:14px}
  article th,article td{border:1px solid var(--border); padding:9px 12px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:700; white-space:nowrap}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:2em 0}
  article h1,article h2,article h3{scroll-margin-top:76px}

  /* Q&A collapsibles */
  details.qa{border:1px solid var(--border); border-radius:var(--radius); margin:.7em 0; background:var(--bg); box-shadow:var(--shadow)}
  details.qa>summary{cursor:pointer; padding:13px 16px; font-weight:700; list-style:none; color:var(--text)}
  details.qa>summary::-webkit-details-marker{display:none}
  details.qa>summary::before{content:"▸"; color:var(--accent); margin-right:9px; display:inline-block}
  details.qa[open]>summary::before{content:"▾"}
  details.qa .qa-body{padding:0 16px 4px; border-top:1px solid var(--border); margin-top:2px}
  details.qa .qa-body>*:first-child{margin-top:12px}

  .pager{display:flex; gap:14px; margin:52px 0 0; padding-top:24px; border-top:1px solid var(--border)}
  .pager a{flex:1; min-width:0; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg)}
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:4px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  /* section-tinted links */
  article a:not(.mdlink):not(.seccard){color:var(--sec-accent,var(--link))}
  article a.mdlink{color:var(--sec-accent,var(--link)); font-weight:600}
  nav .sec-h{display:flex; align-items:center; gap:7px}
  nav .sec-ic{font-size:14px; filter:saturate(1.1)}
  nav a.item.active{background:color-mix(in srgb,var(--card,var(--accent)) 16%,transparent); color:var(--card,var(--accent))}

  /* TL;DR / insight callout */
  .callout{display:flex; gap:13px; align-items:flex-start; background:var(--sec-accent-soft,var(--accent-soft));
    border:1px solid var(--sec-accent,var(--accent)); border-radius:14px; padding:14px 16px; margin:1.2em 0}
  .callout .cic{font-size:22px; line-height:1.2; flex:none}
  /* tint background is translucent (theme-proof), so use theme-aware softer text */
  .callout .cbody{font-size:.98em; color:var(--quote)}
  .callout .cbody code{background:var(--code-bg); color:var(--code-text)}
  .callout .clead{display:inline-block; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-weight:800; font-size:11px; letter-spacing:.8px; text-transform:uppercase;
    color:var(--sec-accent,var(--accent)); margin-right:6px}

  /* diagrams */
  figure.diagram{margin:1.5em 0; background:var(--bg-soft); border:1px solid var(--border);
    border-radius:18px; padding:18px 18px 12px; box-shadow:var(--shadow)}
  figure.diagram svg{width:100%; height:auto; display:block}
  figure.diagram figcaption{font-size:12.5px; color:var(--muted); text-align:center; margin-top:10px}
  .dg-box{fill:var(--bg); stroke:var(--border); stroke-width:1.5}
  .dg-hot{fill:var(--sec-accent-soft,var(--accent-soft)); stroke:var(--sec-accent,var(--accent)); stroke-width:2}
  .dg-soft{fill:var(--bg-soft); stroke:var(--border); stroke-width:1.5; stroke-dasharray:4 3}
  .dg-line{stroke:var(--muted); stroke-width:2; fill:none}
  .dg-arrow{fill:var(--muted)}
  .dg-label{fill:var(--text); font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-sub{fill:var(--muted); font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-accent{fill:var(--sec-accent,var(--accent))}
  .dg-accent-tx{fill:var(--sec-accent,var(--accent)); font:700 13px -apple-system,sans-serif}
  .dg-white-tx{fill:#fff; font:600 12px -apple-system,sans-serif}
  .dg-accent-soft{fill:var(--sec-accent-soft,var(--accent-soft))}
  .dg-strokeA{stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
  .dg-strokeB{stroke:var(--muted); stroke-width:2.5; stroke-dasharray:5 4}
  .dg-fill1{fill:#0e8f8f}.dg-fill2{fill:#7c5cff}.dg-fill3{fill:#c98a00}.dg-fill4{fill:var(--sec-accent,var(--accent))}

  /* home hero + section cards */
  .hero{background:linear-gradient(135deg,var(--accent-soft),var(--bg-soft)); border:1px solid var(--border);
    border-radius:20px; padding:30px 26px; margin:0 0 10px; box-shadow:var(--shadow)}
  .hero-badge{display:inline-block; font-family:-apple-system,sans-serif; font-size:11.5px; font-weight:700;
    letter-spacing:.6px; text-transform:uppercase; color:var(--accent); background:var(--bg);
    border:1px solid var(--accent); border-radius:999px; padding:5px 12px}
  .hero-title{font-size:clamp(30px,6vw,44px); font-weight:800; letter-spacing:-1px; margin:14px 0 6px; line-height:1.05}
  .hero-sub{margin:0; color:var(--quote); font-size:clamp(15px,1.6vw,17px); max-width:48ch}
  .section-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:14px; margin:.6em 0 1.6em}
  a.seccard{display:flex; flex-direction:column; gap:5px; padding:16px; border-radius:16px;
    border:1px solid var(--border); background:var(--bg); box-shadow:var(--shadow); text-decoration:none;
    border-top:3px solid var(--card); transition:transform .12s ease, box-shadow .12s ease}
  a.seccard:hover{transform:translateY(-3px); box-shadow:0 10px 26px rgba(60,50,30,.13); text-decoration:none}
  a.seccard .sc-ic{font-size:24px}
  a.seccard .sc-lbl{font-family:-apple-system,sans-serif; font-weight:700; font-size:14.5px; color:var(--card)}
  a.seccard .sc-tag{font-size:12.5px; color:var(--muted); line-height:1.45}

  /* search overlay */
  .searchpanel{display:none; position:fixed; z-index:70; left:50%; top:70px; transform:translateX(-50%);
    width:min(640px,92vw); max-height:70vh; overflow-y:auto; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.25); padding:8px}
  .searchpanel.show{display:block}
  .searchpanel .sr{display:block; padding:11px 14px; border-radius:10px; color:var(--text)}
  .searchpanel .sr:hover,.searchpanel .sr.sel{background:var(--accent-soft); text-decoration:none}
  .searchpanel .sr .t{font-weight:600; font-size:14px}
  .searchpanel .sr .c{font-size:12.5px; color:var(--muted); margin-top:2px; font-family:inherit}
  .searchpanel .sr .c mark{background:var(--accent-soft); color:var(--accent); padding:0 2px; border-radius:3px}
  .searchpanel .empty{padding:18px 14px; color:var(--muted); font-size:14px}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:min(86vw,330px); top:0; bottom:0; height:auto;
      transform:translateX(-100%); transition:transform .24s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow)}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(20,16,10,.45); z-index:50}
    .content-wrap{padding:20px 18px calc(80px + env(safe-area-inset-bottom))}
    .pager{flex-direction:column}
    .pager .next{text-align:left}
    .pager .spacer{display:none}
    nav a.item{padding:11px 14px; font-size:15px}
    nav a.item.sub{padding-left:18px}
    .searchpanel{top:60px}
    .nav-collapsed-bar,.nav-show{display:none!important}
  }
  @media (max-width:380px){ .topbar .tb-title{font-size:14px} }

/* ---------------- Precision vs Recall interactive widget ---------------- */
.prw{margin:20px 0}
.prw-wrap{display:flex; gap:18px; flex-wrap:wrap; align-items:stretch;
  background:var(--bg-soft); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; box-shadow:var(--shadow)}
.prw-main{flex:1 1 380px; min-width:300px; display:flex; flex-direction:column}
.prw-side{flex:0 1 240px; min-width:220px; display:flex; flex-direction:column; gap:14px}
.prw-svg{width:100%; height:auto; overflow:visible}
.prw-dot{opacity:.85}
.prw-pos{fill:#2f9e6f}
.prw-neg{fill:var(--muted); opacity:.5}
.prw-axis{stroke:var(--border); stroke-width:1.5}
.prw-ticks text,.prw-axlbl{fill:var(--muted); font-size:12px; font-family:inherit}
.prw-shade{fill:rgba(47,158,111,.12)}
.prw-thline{stroke:var(--accent); stroke-width:2; stroke-dasharray:5 4}
.prw-thlbl{fill:var(--accent); font-size:12px; font-weight:700; font-family:inherit}
.prw-controls{margin-top:10px}
.prw-slabel{display:block; font-size:13px; color:var(--muted); margin-bottom:4px}
.prw-slabel b{color:var(--accent)}
#prw-slider{width:100%; accent-color:var(--accent); cursor:pointer}
.prw-legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:var(--muted)}
.prw-legend i{display:inline-block; width:12px; height:12px; border-radius:3px; vertical-align:-1px; margin-right:5px}
.prw-lg-pos{background:#2f9e6f}
.prw-lg-neg{background:var(--muted); opacity:.5}
.prw-lg-shade{background:rgba(47,158,111,.25); border:1px dashed var(--accent)}
.prw-metrics{display:flex; gap:10px}
.prw-metric{flex:1; text-align:center; padding:10px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.prw-mlab{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted)}
.prw-mval{display:block; font-size:24px; font-weight:800; margin-top:2px; line-height:1}
.prw-mp .prw-mval{color:#3b82f6}
.prw-mr .prw-mval{color:#e0663f}
.prw-mf .prw-mval{color:#9a5cd0}
.prw-cm{border-collapse:collapse; width:100%; font-size:13px}
.prw-cm td{border:1px solid var(--border); padding:8px; text-align:center; font-weight:700}
.prw-cm .prw-cm-h{background:var(--bg-soft); color:var(--muted); font-weight:600; font-size:12px}
.prw-tp{background:rgba(47,158,111,.16); color:#2f9e6f}
.prw-tn{background:rgba(47,158,111,.16); color:#2f9e6f}
.prw-fp{background:rgba(224,102,63,.16); color:#e0663f}
.prw-fn{background:rgba(224,102,63,.16); color:#e0663f}
.prw-pr{width:100%; height:auto}
.prw-curve{fill:none; stroke:var(--accent); stroke-width:2}
.prw-prdot{fill:#fff; stroke:var(--accent); stroke-width:3}
@media (max-width:640px){ .prw-side{flex-basis:100%} }

/* ======================= interactive-study additions ====================== */

/* --- sidebar progress bar + study shortcuts --- */
.progwrap{margin-top:12px}
.progtrack{height:6px; border-radius:4px; background:var(--border); overflow:hidden}
.progbar{height:100%; width:0; border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .35s ease}
.proglbl{font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:.02em}
#resumeSlot{margin-top:8px}
.resume-link{display:block; font-size:12.5px; color:var(--accent); font-weight:600; padding:6px 10px;
  border:1px solid var(--border); border-radius:9px; background:var(--bg)}
.resume-link:hover{border-color:var(--accent); text-decoration:none}
.pinned-block{margin-top:9px; padding:8px 9px; border:1px solid var(--border); border-radius:9px; background:var(--bg)}
.pinned-title{font-size:10px; font-weight:800; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px}
.pinned-link{display:flex; align-items:flex-start; gap:6px; padding:4px 0; color:var(--text); font-size:12px; line-height:1.3}
.pinned-link span{color:#d39a1f}
.pinned-link:hover{color:var(--accent); text-decoration:none}

/* --- nav done markers + section counts --- */
.sec-h{position:relative}
.item.pinned::before{content:"★"; position:absolute; right:27px; top:50%; transform:translateY(-50%); color:#d39a1f; font-size:11px}
.sec-count{float:right; font-size:10.5px; font-weight:700; color:var(--muted);
  background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:1px 7px; letter-spacing:.02em}
.sec-count.all-done{color:#2f9e6f; border-color:#2f9e6f}
nav a.item{position:relative; padding-right:44px}
nav a.item.done::after{content:"✓"; position:absolute; right:9px; top:50%; transform:translateY(-50%);
  color:#2f9e6f; font-weight:800; font-size:12px}

/* --- page complete strip --- */
.page-status{display:flex; gap:9px; margin:26px 0 4px}
.complete-btn{flex:1; padding:12px 16px; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent)}
.complete-btn:hover{background:var(--accent); color:#fff}
.complete-btn.is-done{background:rgba(47,158,111,.14); color:#2f9e6f; border-color:#2f9e6f}
.pin-btn{flex:0 0 auto; padding:12px 16px; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--muted); border:1px solid var(--border)}
.pin-btn:hover,.pin-btn.is-pinned{color:#b07800; border-color:#d39a1f; background:rgba(211,154,31,.12)}
@media(max-width:520px){.page-status{flex-direction:column}.pin-btn{width:100%}}

/* --- flashcard grading --- */
.quiz-stats{font-size:12.5px; color:var(--muted); margin-left:auto}
.quiz-stats .qs-known{color:#2f9e6f} .quiz-stats .qs-missed{color:#e0663f} .quiz-stats .qs-total{opacity:.7}
.qfilter{display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--muted)}
.qfilter .fbtn{border:1px solid var(--border); background:var(--bg); color:var(--muted); border-radius:999px;
  padding:3px 10px; font-size:12px; cursor:pointer; font-family:inherit}
.qfilter .fbtn.sel{background:var(--accent); color:#fff; border-color:var(--accent)}
details.qa.known{border-color:#2f9e6f; box-shadow:inset 3px 0 0 #2f9e6f, var(--shadow)}
details.qa.missed{border-color:#e0663f; box-shadow:inset 3px 0 0 #e0663f, var(--shadow)}
details.qa.qa-hide{display:none}
.card-grade{display:flex; gap:8px; align-items:center; margin:10px 0 4px; flex-wrap:wrap}
.card-grade .cg{border:1px solid var(--border); background:var(--bg); border-radius:999px; padding:5px 13px;
  font-size:12.5px; font-weight:600; cursor:pointer; font-family:-apple-system,BlinkMacSystemFont,sans-serif; color:var(--text)}
.card-grade .cg-known:hover{background:#2f9e6f; color:#fff; border-color:#2f9e6f}
.card-grade .cg-missed:hover{background:#e0663f; color:#fff; border-color:#e0663f}
.card-grade .cg-clear{color:var(--muted); font-size:11.5px}
details.qa.known .cg-known{background:#2f9e6f; color:#fff; border-color:#2f9e6f}
details.qa.missed .cg-missed{background:#e0663f; color:#fff; border-color:#e0663f}

/* --- study timer --- */
.timer-panel{position:fixed; right:20px; bottom:20px; width:220px; z-index:60;
  background:var(--bg); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
  padding:14px; display:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.timer-panel.show{display:block}
.timer-panel.ring{animation:timerRing 1s ease-in-out 3}
@keyframes timerRing{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 4px var(--accent)}}
.timer-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
.timer-title{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted)}
.timer-x{min-width:28px; height:28px; font-size:13px}
.timer-face{display:flex; justify-content:center; margin:6px 0 12px}
.timer-ring{width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:conic-gradient(var(--accent) 360deg,var(--border) 0)}
.timer-ring .timer-time{width:96px; height:96px; border-radius:50%; background:var(--bg); display:flex;
  align-items:center; justify-content:center; font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--text)}
.timer-panel.done .timer-time{color:#e0663f}
.timer-presets{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
.timer-preset{flex:1; min-width:44px; border:1px solid var(--border); background:var(--bg); color:var(--muted);
  border-radius:8px; padding:6px 4px; font-size:11.5px; font-weight:600; cursor:pointer}
.timer-preset.sel{background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
.timer-play{width:100%; border:none; border-radius:10px; background:var(--accent); color:#fff;
  padding:10px; font-size:15px; font-weight:800; cursor:pointer}
.timer-play:hover{filter:brightness(1.08)}

/* --- generic widget slider look (shared) --- */
.bv-controls input[type=range],.qz-wrap input[type=range],.bt-controls input[type=range],.lm-wrap input[type=range]{
  width:100%; accent-color:var(--accent); cursor:pointer}
.bv-metrics{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap}
.bv-m{flex:1; min-width:90px; text-align:center; padding:9px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.bv-m .bv-mlab{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted)}
.bv-m b{display:block; font-size:19px; font-weight:800; margin-top:2px; font-variant-numeric:tabular-nums}
.bv-diag.bv-good{color:#2f9e6f}.bv-diag.bv-bad{color:#e0663f}

/* --- bias/variance widget --- */
.bv-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.bv-svg{width:100%; height:auto; overflow:visible}
.bv-true{fill:none; stroke:var(--muted); stroke-width:2; stroke-dasharray:5 4; opacity:.7}
.bv-fit{fill:none; stroke:var(--accent); stroke-width:2.6}
.bv-pt{fill:#3b82f6; opacity:.85}
.bv-legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:var(--muted)}
.bv-legend i{display:inline-block; width:14px; height:3px; border-radius:2px; vertical-align:3px; margin-right:5px}
.bv-lg-true{background:var(--muted)}.bv-lg-fit{background:var(--accent); height:4px!important}
.bv-lg-pt{width:10px!important; height:10px!important; border-radius:50%; background:#3b82f6}
.bv-controls{margin-top:12px}

/* --- quantization widget --- */
.qz-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.qz-controls{display:flex; flex-direction:column; gap:12px}
.qz-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
.qz-row>label{font-size:13px; color:var(--muted); font-family:-apple-system,sans-serif}
.qz-row>label b{color:var(--accent)}
.qz-row input[type=range]{flex:1; min-width:160px}
.qz-num{width:64px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:5px 7px; font-size:13px}
.qz-seg{border:1px solid var(--border); background:var(--bg); color:var(--muted); border-radius:8px; padding:5px 11px;
  font-size:12.5px; font-weight:600; cursor:pointer; font-family:-apple-system,sans-serif}
.qz-seg.sel{background:var(--accent); color:#fff; border-color:var(--accent)}
.qz-out,.lm-out{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0}
.qz-cell{flex:1; min-width:80px; text-align:center; padding:9px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.qz-cell span{display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted)}
.qz-cell b{display:block; font-size:17px; font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums}
.qz-cell.qz-err b{color:var(--accent)}
.qz-bar{width:100%; height:auto; overflow:visible; margin-top:4px}
.qz-tick{stroke:var(--border); stroke-width:1}
.qz-true{fill:#3b82f6}
.qz-quantdot{fill:none; stroke:var(--accent); stroke-width:2.5}

/* --- batch + llm-mem widgets --- */
.bt-wrap,.lm-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.bt-wrap{display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start}
.bt-controls{flex:1 1 300px; min-width:260px}
.bt-sliders,.lm-wrap .bt-sliders{display:flex; flex-direction:column; gap:9px; margin:10px 0}
.bt-sliders label{font-size:12.5px; color:var(--muted); font-family:-apple-system,sans-serif}
.bt-sliders label b{color:var(--accent)}
.bt-svg{flex:1 1 260px; min-width:240px; width:100%; height:auto; overflow:visible}
.bt-thrline{fill:none; stroke:var(--accent); stroke-width:2.6}
.bt-latline{fill:none; stroke:var(--muted); stroke-width:2; stroke-dasharray:5 4; opacity:.7}
.bt-dot{fill:#fff; stroke:var(--accent); stroke-width:3}
.lm-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:6px}
.lm-row>label{font-size:13px; color:var(--muted); font-family:-apple-system,sans-serif}
.lm-stack{display:flex; height:26px; border-radius:8px; overflow:hidden; border:1px solid var(--border); margin:4px 0 10px}
.lm-seg{display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; transition:width .3s ease; overflow:hidden; white-space:nowrap}
.lm-seg-w{background:var(--accent)} .lm-seg-kv{background:#3b82f6}
.lm-note{font-size:12.5px; color:var(--quote); font-family:-apple-system,sans-serif; line-height:1.5}
@media (max-width:640px){ .bt-wrap{flex-direction:column} }

/* number-format explorer */
.fmt-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.fmt-segs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px}
.fmt-bar{display:flex; height:46px; border-radius:10px; overflow:hidden; border:1px solid var(--border); gap:2px; background:var(--border)}
.fmt-seg{display:flex; align-items:center; justify-content:center; text-align:center; color:#fff; font-size:11px;
  font-weight:700; font-family:-apple-system,sans-serif; padding:0 4px; overflow:hidden; line-height:1.15; transition:flex .3s ease}
.fmt-seg span{overflow:hidden; text-overflow:ellipsis}
.fmt-sign{background:var(--muted)} .fmt-exp{background:#3b82f6} .fmt-mant{background:var(--accent)} .fmt-int{background:#8b5cf6}
.fmt-scale{display:flex; align-items:center; padding:0 12px; font-size:12px; font-weight:700; color:var(--muted);
  border:1px dashed var(--border); border-radius:10px; margin-left:2px; font-family:-apple-system,sans-serif}
.fmt-grid{margin:14px 0 10px}
.fmt-flags{display:flex; flex-wrap:wrap; gap:7px; margin:2px 0 10px}
.fmt-flag{font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:999px; font-family:-apple-system,sans-serif;
  background:var(--bg); border:1px solid var(--border); color:var(--muted)}
.fmt-flag.warn{background:rgba(234,88,12,.13); border-color:rgba(234,88,12,.4); color:#ea580c}
.fmt-flag.ok{background:rgba(20,163,115,.13); border-color:rgba(20,163,115,.4); color:var(--accent)}

/* =========================== visual diagram kit ========================== */
/* Replaces ASCII-art code blocks with clean, theme-aware flow diagrams.     */
.diagram{margin:1.5em 0; padding:18px 16px; border:1px solid var(--border); border-radius:16px;
  background:var(--bg-soft); overflow-x:auto}
.diagram-cap{font-size:12px; color:var(--muted); text-align:center; margin-top:12px; letter-spacing:.02em}

/* a node/box in a flow */
.node{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  padding:9px 15px; border-radius:11px; border:1px solid var(--sec-accent,var(--accent));
  background:var(--bg); color:var(--text); font-weight:650; font-size:13.5px; line-height:1.25;
  text-align:center; white-space:nowrap; box-shadow:var(--shadow)}
.node .nsub{font-size:11px; font-weight:500; color:var(--muted); white-space:nowrap}
.node.soft{border-style:dashed; background:var(--sec-accent-soft,var(--accent-soft)); box-shadow:none}
.node.ghost{border-color:var(--border); font-weight:600}
.node.data{border-color:#3b82f6} .node.data .nlead{color:#3b82f6}
.node.out{border-color:#2f9e6f} .node.out .nlead{color:#2f9e6f}

/* horizontal flow row with arrow connectors */
.flow{display:flex; align-items:center; flex-wrap:wrap; gap:10px 8px; justify-content:center}
.flow .arw{color:var(--sec-accent,var(--accent)); font-weight:800; font-size:18px; flex:none; line-height:1}
.flow .arw::before{content:"→"}
.flow .arw.tiny{font-size:14px}
.flow-lbl{font-size:11px; color:var(--muted); align-self:center; padding:0 2px; font-style:normal}
.arw.labeled{display:inline-flex; flex-direction:column; align-items:center; gap:1px; font-size:14px}
.arw.labeled .al{font-size:10px; color:var(--muted); font-weight:600}
.arw.labeled::before{content:"→"}

/* vertical flow (top→down) */
.vflow{display:flex; flex-direction:column; align-items:center; gap:8px}
.vflow .varw{color:var(--sec-accent,var(--accent)); font-weight:800; font-size:18px; line-height:.8}
.vflow .varw::before{content:"↓"}
.vflow .node{white-space:normal; max-width:min(560px,92%)}
.vflow .node .nsub{white-space:normal}

/* branch: one source splitting to many (or many merging to one) */
.branch{display:flex; flex-direction:column; align-items:center; gap:6px}
.branch .fork{display:flex; gap:26px; flex-wrap:wrap; justify-content:center; position:relative}
.branch .split-arw{color:var(--sec-accent,var(--accent)); font-size:20px; font-weight:800; line-height:1}
.branch .split-arw::before{content:"⌄"}

/* parallel lanes (e.g. data-parallel GPUs) merging */
.lanes{display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center}
.lane-stack{display:flex; flex-direction:column; gap:7px}
.merge-arw{display:flex; align-items:center; color:var(--sec-accent,var(--accent)); font-size:20px; font-weight:800}
.merge-arw::before{content:"⟩"}

/* two-column mapping / transfer table (CNN → LLM style) */
.maptable{width:100%; border-collapse:separate; border-spacing:0; margin:.4em 0; font-size:13.5px}
.maptable th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted);
  padding:6px 12px; border-bottom:1px solid var(--border)}
.maptable td{padding:9px 12px; vertical-align:top; border-bottom:1px solid var(--border); line-height:1.4}
.maptable tr:last-child td{border-bottom:none}
.maptable .mfrom{color:var(--quote)}
.maptable .mto{color:var(--text); font-weight:550}
.maptable .marw{width:26px; text-align:center; color:var(--sec-accent,var(--accent)); font-weight:800}
.maptable .marw::before{content:"→"}
.maptable thead .marw::before{content:""}
.maptable tbody tr:hover td{background:var(--bg)}

/* loop badge over a flow */
.loopwrap{display:flex; flex-direction:column; align-items:center; gap:7px}
.loop-top{font-size:11px; color:var(--sec-accent,var(--accent)); font-weight:700; letter-spacing:.03em;
  border:1px dashed var(--sec-accent,var(--accent)); border-radius:999px; padding:3px 14px}
.loop-back{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted)}
.loop-back .lb-arw{color:var(--sec-accent,var(--accent)); font-weight:800}
.loop-back .lb-arw::before{content:"↺"}
.flow-foot{font-size:11.5px; color:var(--muted); text-align:center; margin-top:10px; line-height:1.5}

/* mini roofline / plot SVG */
.plotfig{width:100%; max-width:560px; height:auto; display:block; margin:0 auto; overflow:visible}
.plot-axis{stroke:var(--border); stroke-width:1.5}
.plot-line{fill:none; stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
.plot-mem{fill:none; stroke:#3b82f6; stroke-width:2.5}
.plot-txt{fill:var(--muted); font-size:11px; font-family:var(--font-sans)}
.plot-txt.lead{fill:var(--text); font-weight:650}
.plot-dash{stroke:var(--muted); stroke-width:1; stroke-dasharray:4 3; opacity:.6}
@media (max-width:640px){ .branch .fork{gap:14px} .lanes{gap:8px} }

/* --- formula display (replaces monospace math blocks) --- */
.formula{margin:1.4em 0; padding:16px 20px; border:1px solid var(--border); border-radius:14px;
  background:var(--bg-soft); display:flex; flex-direction:column; gap:12px}
.frow{display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; justify-content:center; text-align:center}
.fexpr{font-family:"SF Mono",ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  font-size:16.5px; font-weight:600; color:var(--text); letter-spacing:.005em; line-height:1.5}
.fexpr .fv{color:var(--sec-accent,var(--accent))}
.fnote{font-size:12px; color:var(--muted); font-style:italic; font-family:var(--font-sans)}
.fnote::before{content:"— "}

/* --- side-by-side compare cards (replaces two-column ASCII contrasts) --- */
.compare{display:flex; gap:14px; margin:1.4em 0; flex-wrap:wrap; align-items:stretch}
.cmp-col{flex:1 1 210px; border:1px solid var(--border); border-radius:14px; background:var(--bg-soft);
  padding:14px 16px; display:flex; flex-direction:column; gap:8px}
.cmp-col.accent{border-color:var(--sec-accent,var(--accent))}
.cmp-h{font-size:13px; font-weight:750; letter-spacing:.01em; color:var(--text);
  padding-bottom:8px; border-bottom:1px solid var(--border)}
.cmp-col.accent .cmp-h{color:var(--sec-accent,var(--accent))}
.cmp-col.blue{border-color:#3b82f6} .cmp-col.blue .cmp-h{color:#3b82f6}
.cmp-col.green{border-color:#2f9e6f} .cmp-col.green .cmp-h{color:#2f9e6f}
.cmp-col ul{margin:0; padding-left:18px; font-size:13.5px; line-height:1.5; color:var(--quote)}
.cmp-col ul li{margin:3px 0}
.cmp-col p{margin:0; font-size:13.5px; line-height:1.5; color:var(--quote)}
.cmp-tag{align-self:flex-start; font-size:11px; font-weight:700; color:var(--muted);
  background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:2px 9px; margin-top:auto}

/* --- illustrative example callout --- */
.example{margin:1.3em 0; padding:14px 16px; border-left:3px solid var(--sec-accent,var(--accent));
  background:var(--bg-soft); border-radius:0 12px 12px 0; font-size:14.5px; line-height:1.6}
.example .ex-q{font-style:italic; color:var(--text)}
.example .ex-a{display:block; margin-top:8px; font-size:13.5px; color:var(--quote)}
.example .hl{background:var(--sec-accent-soft,var(--accent-soft)); color:var(--sec-accent,var(--accent));
  font-weight:650; padding:0 4px; border-radius:4px}

/* --- k-fold split bars --- */
.folds{display:flex; flex-direction:column; gap:6px; margin:.4em 0}
.fold{display:flex; align-items:center; gap:10px}
.fold-bars{display:flex; flex:1; height:22px; border-radius:6px; overflow:hidden; border:1px solid var(--border)}
.fold-seg{flex:1; display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; color:var(--muted)}
.fold-seg.test{background:var(--sec-accent-soft,var(--accent-soft)); color:var(--sec-accent,var(--accent))}
.fold-seg.train{background:var(--bg)}
.fold-lbl{font-size:11.5px; color:var(--muted); min-width:48px}

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>Jumio Biometrics Prep</h1>
      <div class="sub">Face recognition · Fairness · Liveness · AWS</div>

const DATA={"nav":[{"label":"Start here","icon":"🧭","accent":"#0e7490","items":[{"path":"README.md","title":"Jumio Role Map & Study Plan"}]},{"label":"1 · Face Pipeline","icon":"📷","accent":"#0284c7","items":[{"path":"01-face-pipeline/README.md","title":"Overview"},{"path":"01-face-pipeline/detection-alignment-quality.md","title":"Detection, Alignment & Quality"},{"path":"01-face-pipeline/attributes-operating-conditions.md","title":"Attributes & Operating Conditions"}]},{"label":"2 · Face Recognition","icon":"🧬","accent":"#7c3aed","items":[{"path":"02-face-recognition/README.md","title":"Overview"},{"path":"02-face-recognition/embeddings-and-losses.md","title":"Embeddings, Losses & Hard Negatives"},{"path":"02-face-recognition/verification-identification.md","title":"Verification vs Identification"}]},{"label":"3 · Biometric Evaluation","icon":"📈","accent":"#d97706","items":[{"path":"03-biometric-evaluation/README.md","title":"Overview"},{"path":"03-biometric-evaluation/metrics-thresholds.md","title":"FMR, FNMR, TAR@FAR & Thresholds"},{"path":"03-biometric-evaluation/protocols-open-set.md","title":"Protocols, Open-Set Search & Confidence"}]},{"label":"4 · Fairness","icon":"⚖️","accent":"#059669","items":[{"path":"04-fairness/README.md","title":"Overview"},{"path":"04-fairness/measurement.md","title":"Subgroup Measurement & Uncertainty"},{"path":"04-fairness/mitigation-reporting.md","title":"Mitigation, Thresholds & Reporting"}]},{"label":"5 · Liveness & Security","icon":"🛡️","accent":"#dc2626","items":[{"path":"05-liveness-security/README.md","title":"Overview"},{"path":"05-liveness-security/presentation-attack-detection.md","title":"Presentation Attack Detection"},{"path":"05-liveness-security/deepfakes-injection-threats.md","title":"Deepfakes, Replay & Injection"}]},{"label":"6 · Data & Training","icon":"🧪","accent":"#9333ea","items":[{"path":"06-data-training/README.md","title":"Overview"},{"path":"06-data-training/dataset-pipelines.md","title":"Balanced Datasets & Airflow Pipelines"},{"path":"06-data-training/training-synthetic-data.md","title":"Multi-GPU Training & Synthetic Faces"}]},{"label":"7 · Production & Scale","icon":"☁️","accent":"#2563eb","items":[{"path":"07-production-scale/README.md","title":"Overview"},{"path":"07-production-scale/aws-architecture.md","title":"AWS Training-to-Serving Architecture"},{"path":"07-production-scale/optimization-and-ann.md","title":"TensorRT, ONNX & ANN Search"},{"path":"07-production-scale/privacy-mobile-monitoring.md","title":"Privacy, Mobile & Monitoring"}]},{"label":"8 · Interview Practice","icon":"🎯","accent":"#db2777","items":[{"path":"08-interview-practice/README.md","title":"Overview"},{"path":"08-interview-practice/system-design.md","title":"Worked Biometric System Design"},{"path":"08-interview-practice/interview-qa.md","title":"Rapid-Fire Interview Q&A"},{"path":"08-interview-practice/cheat-sheet.md","title":"One-Page Cheat Sheet (Morning Of)"}]}],"pages":[{"path":"README.md","title":"Jumio Role Map & Study Plan","section":"Start here","quiz":false,"accent":"#0e7490","html":"<div class=\"hero\"><span class=\"hero-badge\">Staff / Senior ML Engineer · Jumio Biometrics<\/span><div class=\"hero-title\">Face Recognition &amp; Biometrics: Interview Prep<\/div><p class=\"hero-sub\">Design, train, evaluate and ship trustworthy face systems — capture quality, embeddings and metric learning, verification and 1:N search, biometric thresholds, fairness, liveness and deepfake defense, balanced data, multi-GPU training, AWS deployment and low-latency TensorRT / ONNX inference. Eight chapters plus a staff-level design and Q&amp;A bank.<\/p><\/div><h1 id=\"jumio-staff-senior-ml-engineer-learning-path\">Jumio Staff / Senior ML Engineer: Learning Path<\/h1>\n<p>This pack is for the <strong>face recognition and biometrics<\/strong> role described in the Jumio job description. It focuses on what is special about this interview rather than repeating generic ML material you already have.<\/p>\n<p>The role in one line: <strong>build a trustworthy face system from capture to decision<\/strong> — detect and align the face, reject poor captures, produce a discriminative embedding, verify or search it at the required operating point, measure fairness, resist spoofing, and deploy the complete pipeline with production latency and reliability on AWS.<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">selfie + ID portrait<span class=\"nsub\">device · document · consent<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">capture gate<span class=\"nsub\">detect · align · quality · liveness<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">face encoder<span class=\"nsub\">normalized embedding<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">match / search<span class=\"nsub\">1:1 threshold · 1:N ANN<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">risk decision<span class=\"nsub\">fairness · policy · monitoring<\/span><\/span>\n  <\/div>\n<\/div>\n<h2 id=\"why-this-is-not-another-generic-ml-page\">Why this is not another generic ML page<\/h2>\n<p>The existing ML and CV tracks cover PyTorch, distributed training, MLOps, AWS, TensorRT, ONNX and general image models. The high-risk gaps for this role are the <strong>biometric decision layer<\/strong>:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>JD theme<\/th><th>Interview-ready meaning<\/th><\/tr><\/thead><tbody><tr><td>Face recognition<\/td><td>Detection and alignment, embeddings, angular-margin losses, verification and open-set identification<\/td><\/tr><tr><td>Rigorous benchmarking<\/td><td>Subject-disjoint protocols, genuine/impostor trials, FMR/FNMR, TAR@FAR, EER, confidence intervals<\/td><\/tr><tr><td>Fairness<\/td><td>Per-group error rates at the same operating point, intersections, uncertainty, root-cause analysis and mitigation<\/td><\/tr><tr><td>Data curation<\/td><td>Identity-safe deduplication, balanced coverage of demographics and operating conditions, lineage and consent<\/td><\/tr><tr><td>Synthetic data<\/td><td>Fill measured coverage gaps without identity leakage, memorization or unrealistic shortcuts<\/td><\/tr><tr><td>Production ownership<\/td><td>Reproducible Airflow pipelines, multi-GPU training, registry, optimized serving, monitoring and rollback<\/td><\/tr><tr><td>Security and privacy<\/td><td>Liveness/PAD, deepfake and injection defense, template protection, retention and auditability<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-product-context-to-understand\">The product context to understand<\/h2>\n<p>Jumio’s public product flow combines an ID document, a selfie, <strong>1:1 face matching<\/strong> and <strong>liveness<\/strong> to make a risk-based decision. Its current innovation material calls out presentation attacks, synthetic/morphed faces, replay and digital injection. That makes liveness and adversarial thinking central product context, even though the JD describes them only indirectly.<\/p>\n<ul><li><a href=\"https://www.jumio.com/products/selfie-verification/\" target=\"_blank\" rel=\"noopener\">Jumio Selfie Verification<\/a><\/li><li><a href=\"https://www.jumio.com/biometrics/\" target=\"_blank\" rel=\"noopener\">Jumio Biometrics<\/a><\/li><li><a href=\"https://www.jumio.com/innovation/\" target=\"_blank\" rel=\"noopener\">Jumio Innovation and attack categories<\/a><\/li><li><a href=\"https://www.jumio.com/products/authentication/\" target=\"_blank\" rel=\"noopener\">Jumio Authentication<\/a><\/li><\/ul>\n<h2 id=\"study-order\">Study order<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Priority<\/th><th>Sections<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td><strong>Must be fluent<\/strong><\/td><td><code>01<\/code>–<code>05<\/code><\/td><td>These distinguish a biometric engineer from a general CV/ML engineer<\/td><\/tr><tr><td><strong>Must design<\/strong><\/td><td><code>06<\/code>, <code>07<\/code><\/td><td>Staff-level ownership means data-to-production architecture and trade-offs<\/td><\/tr><tr><td><strong>Must rehearse aloud<\/strong><\/td><td><code>08<\/code><\/td><td>Convert knowledge into concise decisions, failure analysis and leadership signals<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"if-you-have-two-days\">If you have two days<\/h3>\n<p><strong>Day 1:<\/strong> Face pipeline → recognition → biometric metrics → fairness. End by explaining why “99.8% accuracy” is an unusable biometric claim without a protocol and operating point.<\/p>\n<p><strong>Day 2:<\/strong> Liveness/security → data/training → AWS production design. Finish with the worked system-design answer and rapid-fire Q&amp;A.<\/p>\n<h3 id=\"if-you-have-four-hours\">If you have four hours<\/h3>\n<ol><li><code>02-face-recognition/verification-identification.md<\/code><\/li><li><code>03-biometric-evaluation/metrics-thresholds.md<\/code><\/li><li><code>04-fairness/measurement.md<\/code><\/li><li><code>05-liveness-security/README.md<\/code><\/li><li><code>07-production-scale/aws-architecture.md<\/code><\/li><li><code>08-interview-practice/cheat-sheet.md<\/code><\/li><\/ol>\n<h2 id=\"the-five-answers-you-should-be-able-to-give\">The five answers you should be able to give<\/h2>\n<ol><li><strong>Design:<\/strong> “Design a global selfie-to-ID face-verification service with a p99<\/li><\/ol>\n<p>latency SLO, fraud-loss target and fairness guardrails.”<\/p>\n<ol><li><strong>Metrics:<\/strong> “Why report TAR at a fixed low FMR instead of accuracy or EER alone?”<\/li><li><strong>Fairness:<\/strong> “One subgroup has 3× the FNMR. How do you verify, diagnose and mitigate<\/li><\/ol>\n<p>it without hiding the trade-off?”<\/p>\n<ol><li><strong>Security:<\/strong> “How do you defend against printed photos, replay, deepfakes and<\/li><\/ol>\n<p>injected camera streams?”<\/p>\n<ol><li><strong>Production:<\/strong> “How does a data snapshot become a reproducible multi-GPU training<\/li><\/ol>\n<p>run, a signed TensorRT artifact and a safely rolled-out AWS service?”<\/p>\n<h2 id=\"staff-level-answer-shape\">Staff-level answer shape<\/h2>\n<p>Use this order for any open question:<\/p>\n<blockquote><p><strong>requirements → threat model → data/protocol → model → operating point → fairness → serving → monitoring/rollback → privacy → trade-offs<\/strong><\/p><\/blockquote>\n<p>Name tools only after the requirement. “SageMaker + EKS” is not an architecture until you explain the data contract, evaluation gates, latency target, failure behavior and decision ownership.<\/p>\n<p>→ Start with <strong><a class=\"mdlink\" data-href=\"01-face-pipeline/README.md\" href=\"#\">Face Pipeline<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"why-this-is-not-another-generic-ml-page","text":"Why this is not another generic ML page"},{"level":2,"id":"the-product-context-to-understand","text":"The product context to understand"},{"level":2,"id":"study-order","text":"Study order"},{"level":3,"id":"if-you-have-two-days","text":"If you have two days"},{"level":3,"id":"if-you-have-four-hours","text":"If you have four hours"},{"level":2,"id":"the-five-answers-you-should-be-able-to-give","text":"The five answers you should be able to give"},{"level":2,"id":"staff-level-answer-shape","text":"Staff-level answer shape"}],"text":"staff / senior ml engineer · jumio biometrics face recognition & biometrics: interview prep design, train, evaluate and ship trustworthy face systems — capture quality, embeddings and metric learning, verification and 1:n search, biometric thresholds, fairness, liveness and deepfake defense, balanced data, multi-gpu training, aws deployment and low-latency tensorrt / onnx inference. eight chapters plus a staff-level design and q&a bank. jumio staff / senior ml engineer: learning path this pack is for the face recognition and biometrics role described in the jumio job description. it focuses on what is special about this interview rather than repeating generic ml material you already have. the role in one line: build a trustworthy face system from capture to decision — detect and align the face, reject poor captures, produce a discriminative embedding, verify or search it at the required operating point, measure fairness, resist spoofing, and deploy the complete pipeline with production latency and reliability on aws. selfie + id portrait device · document · consent capture gate detect · align · quality · liveness face encoder normalized embedding match / search 1:1 threshold · 1:n ann risk decision fairness · policy · monitoring why this is not another generic ml page the existing ml and cv tracks cover pytorch, distributed training, mlops, aws, tensorrt, onnx and general image models. the high-risk gaps for this role are the biometric decision layer : jd theme interview-ready meaning face recognition detection and alignment, embeddings, angular-margin losses, verification and open-set identification rigorous benchmarking subject-disjoint protocols, genuine/impostor trials, fmr/fnmr, tar@far, eer, confidence intervals fairness per-group error rates at the same operating point, intersections, uncertainty, root-cause analysis and mitigation data curation identity-safe deduplication, balanced coverage of demographics and operating conditions, lineage and consent synthetic data fill measured coverage gaps without identity leakage, memorization or unrealistic shortcuts production ownership reproducible airflow pipelines, multi-gpu training, registry, optimized serving, monitoring and rollback security and privacy liveness/pad, deepfake and injection defense, template protection, retention and auditability the product context to understand jumio’s public product flow combines an id document, a selfie, 1:1 face matching and liveness to make a risk-based decision. its current innovation material calls out presentation attacks, synthetic/morphed faces, replay and digital injection. that makes liveness and adversarial thinking central product context, even though the jd describes them only indirectly. jumio selfie verification jumio biometrics jumio innovation and attack categories jumio authentication study order priority sections why must be fluent 01 – 05 these distinguish a biometric engineer from a general cv/ml engineer must design 06 , 07 staff-level ownership means data-to-production architecture and trade-offs must rehearse aloud 08 convert knowledge into concise decisions, failure analysis and leadership signals if you have two days day 1: face pipeline → recognition → biometric metrics → fairness. end by explaining why “99.8% accuracy” is an unusable biometric claim without a protocol and operating point. day 2: liveness/security → data/training → aws production design. finish with the worked system-design answer and rapid-fire q&a. if you have four hours 02-face-recognition/verification-identification.md 03-biometric-evaluation/metrics-thresholds.md 04-fairness/measurement.md 05-liveness-security/readme.md 07-production-scale/aws-architecture.md 08-interview-practice/cheat-sheet.md the five answers you should be able to give design: “design a global selfie-to-id face-verification service with a p99 latency slo, fraud-loss target and fairness guardrails.” metrics: “why report tar at a fixed low fmr instead of accuracy or eer alone?” fairness: “one subgroup has 3× the fnmr. how do you verify, diagnose and mitigate it without hiding the trade-off?” security: “how do you defend against printed photos, replay, deepfakes and injected camera streams?” production: “how does a data snapshot become a reproducible multi-gpu training run, a signed tensorrt artifact and a safely rolled-out aws service?” staff-level answer shape use this order for any open question: requirements → threat model → data/protocol → model → operating point → fairness → serving → monitoring/rollback → privacy → trade-offs name tools only after the requirement. “sagemaker + eks” is not an architecture until you explain the data contract, evaluation gates, latency target, failure behavior and decision ownership. → start with face pipeline .","words":663},{"path":"01-face-pipeline/README.md","title":"Overview","section":"1 · Face Pipeline","quiz":false,"accent":"#0284c7","html":"<h1 id=\"1-face-pipeline\">1 · Face Pipeline<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Recognition quality is bounded by capture quality. A strong encoder cannot recover an absent, badly blurred or severely misaligned face, so production systems use an explicit capture gate before embedding.<\/div><\/div>\n<h2 id=\"the-pipeline\">The pipeline<\/h2>\n<ol><li><strong>Detect<\/strong> every face and decide whether the expected number is present.<\/li><li><strong>Landmark<\/strong> stable points such as eyes, nose and mouth corners.<\/li><li><strong>Align<\/strong> the crop to a canonical coordinate frame with a similarity transform.<\/li><li><strong>Assess quality<\/strong> for pose, blur, resolution, illumination, occlusion and artifacts.<\/li><li><strong>Check liveness/security<\/strong> before accepting biometric evidence.<\/li><li><strong>Normalize<\/strong> color, size and pixel range exactly as the encoder expects.<\/li><li><strong>Embed<\/strong> only accepted captures, while logging non-sensitive reason codes.<\/li><\/ol>\n<p>Quality is not one universal aesthetic score. It is <strong>utility for a target matcher<\/strong>: would this sample produce a reliable comparison under the deployed encoder and operating point?<\/p>\n<h2 id=\"failure-taxonomy\">Failure taxonomy<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Layer<\/th><th>Example failure<\/th><th>Correct response<\/th><\/tr><\/thead><tbody><tr><td>Capture<\/td><td>motion blur, glare, tiny face<\/td><td>recapture with actionable guidance<\/td><\/tr><tr><td>Detection<\/td><td>missed profile, multiple faces<\/td><td>reject or route; never silently choose<\/td><\/tr><tr><td>Alignment<\/td><td>unstable landmark under occlusion<\/td><td>lower quality or use robust alignment<\/td><\/tr><tr><td>Encoding<\/td><td>wrong normalization or model version<\/td><td>contract test and fail closed<\/td><\/tr><tr><td>Policy<\/td><td>low score near threshold<\/td><td>risk-based fallback or manual review<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-instinct\">Interview instinct<\/h2>\n<p>Do not answer “use a better backbone” first. Start with a slice analysis:<\/p>\n<ul><li>Which devices, document types, regions and capture conditions regressed?<\/li><li>Is the failure in capture, detection, quality, liveness or matching?<\/li><li>Did preprocessing change between training, offline evaluation and serving?<\/li><li>Are both faces equally usable, or is one side of the pair driving the error?<\/li><\/ul>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"detection-alignment-quality.md\" href=\"#\">Detection, Alignment &amp; Quality<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"the-pipeline","text":"The pipeline"},{"level":2,"id":"failure-taxonomy","text":"Failure taxonomy"},{"level":2,"id":"interview-instinct","text":"Interview instinct"}],"text":"1 · face pipeline 💡 tl;dr recognition quality is bounded by capture quality. a strong encoder cannot recover an absent, badly blurred or severely misaligned face, so production systems use an explicit capture gate before embedding. the pipeline detect every face and decide whether the expected number is present. landmark stable points such as eyes, nose and mouth corners. align the crop to a canonical coordinate frame with a similarity transform. assess quality for pose, blur, resolution, illumination, occlusion and artifacts. check liveness/security before accepting biometric evidence. normalize color, size and pixel range exactly as the encoder expects. embed only accepted captures, while logging non-sensitive reason codes. quality is not one universal aesthetic score. it is utility for a target matcher : would this sample produce a reliable comparison under the deployed encoder and operating point? failure taxonomy layer example failure correct response capture motion blur, glare, tiny face recapture with actionable guidance detection missed profile, multiple faces reject or route; never silently choose alignment unstable landmark under occlusion lower quality or use robust alignment encoding wrong normalization or model version contract test and fail closed policy low score near threshold risk-based fallback or manual review interview instinct do not answer “use a better backbone” first. start with a slice analysis: which devices, document types, regions and capture conditions regressed? is the failure in capture, detection, quality, liveness or matching? did preprocessing change between training, offline evaluation and serving? are both faces equally usable, or is one side of the pair driving the error? → next: detection, alignment & quality .","words":261},{"path":"01-face-pipeline/detection-alignment-quality.md","title":"Detection, Alignment & Quality","section":"1 · Face Pipeline","quiz":false,"accent":"#0284c7","html":"<h1 id=\"detection-alignment-face-quality\">Detection, Alignment &amp; Face Quality<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Detection finds the face, alignment removes nuisance geometry, and quality predicts whether the resulting sample is usable. Treat them as independently measurable stages with separate error budgets.<\/div><\/div>\n<h2 id=\"detection-and-landmarks\">Detection and landmarks<\/h2>\n<p>A face detector returns a bounding box, confidence and often five landmarks. Production choices include lightweight mobile detectors and heavier server-side models such as RetinaFace-style detectors. Evaluate <strong>recall at the capture distribution<\/strong>, not only generic mAP: profiles, masks, glasses, low light, dark/light skin tones, older devices, ID-card portraits and screen recaptures all matter.<\/p>\n<p>Landmarks define the canonical crop. Given source eye/nose points and target template points, estimate a similarity transform (rotation, uniform scale and translation), then warp to the encoder input size. Keep the interpolation, color order, crop margin and normalization versioned; a one-pixel or RGB/BGR mismatch can create train/serve skew.<\/p>\n<h2 id=\"quality-as-a-gate\">Quality as a gate<\/h2>\n<p>Useful signals include:<\/p>\n<ul><li>face size and detector confidence;<\/li><li>yaw, pitch and roll;<\/li><li>blur or motion estimates;<\/li><li>under/overexposure and non-uniform illumination;<\/li><li>occlusion of eyes, nose or mouth;<\/li><li>compression, moiré, screen glare and resampling artifacts;<\/li><li>embedding-based utility or uncertainty.<\/li><\/ul>\n<p>Do not combine everything into an unexplained scalar too early. Keep reason codes so you can improve capture UX and diagnose subgroup differences.<\/p>\n<h2 id=\"thresholding-the-quality-gate\">Thresholding the quality gate<\/h2>\n<p>A strict gate improves accepted-sample accuracy but raises <strong>failure to acquire<\/strong> and customer abandonment. A loose gate increases match errors and fraud exposure. Select the gate on an end-to-end curve:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Gate becomes stricter<\/th><th>Usually improves<\/th><th>Usually worsens<\/th><\/tr><\/thead><tbody><tr><td>higher minimum quality<\/td><td>FNMR/FMR among accepted samples<\/td><td>capture completion and conversion<\/td><\/tr><tr><td>tighter pose limits<\/td><td>alignment consistency<\/td><td>accessibility and device coverage<\/td><\/tr><tr><td>larger minimum face<\/td><td>embedding stability<\/td><td>low-end camera acceptance<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Report both <strong>conditional matcher performance<\/strong> and <strong>overall journey performance<\/strong>. Excluding hard captures can make the matcher look fair while the product rejects one group more often at the quality gate.<\/p>\n<h2 id=\"debug-checklist\">Debug checklist<\/h2>\n<ol><li>Freeze the sample and preprocessing versions.<\/li><li>Visualize boxes/landmarks on failure slices.<\/li><li>Measure detector miss, acquisition failure and matcher error separately.<\/li><li>Compare offline and production tensors for the same image.<\/li><li>Tune guidance and recapture policy before retraining the encoder.<\/li><\/ol>\n<blockquote><p>“I measure the cascade, not only the final matcher. A fairness report must include failure-to-acquire and quality rejection, because those gates decide who reaches the face model.”<\/p><\/blockquote>","toc":[{"level":2,"id":"detection-and-landmarks","text":"Detection and landmarks"},{"level":2,"id":"quality-as-a-gate","text":"Quality as a gate"},{"level":2,"id":"thresholding-the-quality-gate","text":"Thresholding the quality gate"},{"level":2,"id":"debug-checklist","text":"Debug checklist"}],"text":"detection, alignment & face quality 💡 tl;dr detection finds the face, alignment removes nuisance geometry, and quality predicts whether the resulting sample is usable. treat them as independently measurable stages with separate error budgets. detection and landmarks a face detector returns a bounding box, confidence and often five landmarks. production choices include lightweight mobile detectors and heavier server-side models such as retinaface-style detectors. evaluate recall at the capture distribution , not only generic map: profiles, masks, glasses, low light, dark/light skin tones, older devices, id-card portraits and screen recaptures all matter. landmarks define the canonical crop. given source eye/nose points and target template points, estimate a similarity transform (rotation, uniform scale and translation), then warp to the encoder input size. keep the interpolation, color order, crop margin and normalization versioned; a one-pixel or rgb/bgr mismatch can create train/serve skew. quality as a gate useful signals include: face size and detector confidence; yaw, pitch and roll; blur or motion estimates; under/overexposure and non-uniform illumination; occlusion of eyes, nose or mouth; compression, moiré, screen glare and resampling artifacts; embedding-based utility or uncertainty. do not combine everything into an unexplained scalar too early. keep reason codes so you can improve capture ux and diagnose subgroup differences. thresholding the quality gate a strict gate improves accepted-sample accuracy but raises failure to acquire and customer abandonment. a loose gate increases match errors and fraud exposure. select the gate on an end-to-end curve: gate becomes stricter usually improves usually worsens higher minimum quality fnmr/fmr among accepted samples capture completion and conversion tighter pose limits alignment consistency accessibility and device coverage larger minimum face embedding stability low-end camera acceptance report both conditional matcher performance and overall journey performance . excluding hard captures can make the matcher look fair while the product rejects one group more often at the quality gate. debug checklist freeze the sample and preprocessing versions. visualize boxes/landmarks on failure slices. measure detector miss, acquisition failure and matcher error separately. compare offline and production tensors for the same image. tune guidance and recapture policy before retraining the encoder. “i measure the cascade, not only the final matcher. a fairness report must include failure-to-acquire and quality rejection, because those gates decide who reaches the face model.”","words":370},{"path":"01-face-pipeline/attributes-operating-conditions.md","title":"Attributes & Operating Conditions","section":"1 · Face Pipeline","quiz":false,"accent":"#0284c7","html":"<h1 id=\"face-attributes-operating-conditions\">Face Attributes &amp; Operating Conditions<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Attribute models and operating-condition labels are useful for routing, quality analysis and product decisions, but sensitive attributes require careful purpose, consent and error analysis.<\/div><\/div>\n<h2 id=\"face-analysis-tasks\">Face-analysis tasks<\/h2>\n<p>The JD mentions <strong>face attributes, detection and quality<\/strong> in addition to recognition. Common tasks include age estimation, face presence/count, pose, occlusion, expression, glasses/mask detection and capture-condition classification.<\/p>\n<p>Choose the formulation from the product need:<\/p>\n<ul><li><strong>Regression<\/strong> for continuous apparent age, with MAE plus age-bucket error.<\/li><li><strong>Ordinal classification<\/strong> when ordering matters and labels are noisy.<\/li><li><strong>Multi-label classification<\/strong> for glasses, mask, occlusion and capture artifacts.<\/li><li><strong>Quality/utility prediction<\/strong> when the target is downstream matcher performance.<\/li><\/ul>\n<h2 id=\"operating-condition-matrix\">Operating-condition matrix<\/h2>\n<p>Build evaluation slices across both human and capture variables:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Human variation<\/th><th>Capture variation<\/th><\/tr><\/thead><tbody><tr><td>age range and age gap<\/td><td>phone/webcam model and resolution<\/td><\/tr><tr><td>skin tone / geography proxy where lawful<\/td><td>illumination and exposure<\/td><\/tr><tr><td>facial hair, cosmetics, glasses, coverings<\/td><td>yaw/pitch/roll and motion<\/td><\/tr><tr><td>appearance change over time<\/td><td>compression, crop and ID-document print quality<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Avoid treating a noisy predicted demographic attribute as ground truth. For fairness audits, prefer consented and governed labels, document label provenance, and report an “unknown/not provided” category rather than guessing.<\/p>\n<h2 id=\"multi-task-modeling-trade-off\">Multi-task modeling trade-off<\/h2>\n<p>A shared backbone with task-specific heads can reduce latency and share useful features, but gradients can conflict and sensitive labels can leak into representations. Compare it against separate models on:<\/p>\n<ul><li>task quality and calibration;<\/li><li>subgroup errors;<\/li><li>inference latency and memory;<\/li><li>update cadence and blast radius;<\/li><li>privacy purpose limitation.<\/li><\/ul>\n<h2 id=\"production-answer\">Production answer<\/h2>\n<blockquote><p>“I use attributes to improve capture quality and analysis, not to invent identity facts. Every attribute needs a stated product purpose, a governed label source, subgroup evaluation and a fallback for uncertain predictions.”<\/p><\/blockquote>","toc":[{"level":2,"id":"face-analysis-tasks","text":"Face-analysis tasks"},{"level":2,"id":"operating-condition-matrix","text":"Operating-condition matrix"},{"level":2,"id":"multi-task-modeling-trade-off","text":"Multi-task modeling trade-off"},{"level":2,"id":"production-answer","text":"Production answer"}],"text":"face attributes & operating conditions 💡 tl;dr attribute models and operating-condition labels are useful for routing, quality analysis and product decisions, but sensitive attributes require careful purpose, consent and error analysis. face-analysis tasks the jd mentions face attributes, detection and quality in addition to recognition. common tasks include age estimation, face presence/count, pose, occlusion, expression, glasses/mask detection and capture-condition classification. choose the formulation from the product need: regression for continuous apparent age, with mae plus age-bucket error. ordinal classification when ordering matters and labels are noisy. multi-label classification for glasses, mask, occlusion and capture artifacts. quality/utility prediction when the target is downstream matcher performance. operating-condition matrix build evaluation slices across both human and capture variables: human variation capture variation age range and age gap phone/webcam model and resolution skin tone / geography proxy where lawful illumination and exposure facial hair, cosmetics, glasses, coverings yaw/pitch/roll and motion appearance change over time compression, crop and id-document print quality avoid treating a noisy predicted demographic attribute as ground truth. for fairness audits, prefer consented and governed labels, document label provenance, and report an “unknown/not provided” category rather than guessing. multi-task modeling trade-off a shared backbone with task-specific heads can reduce latency and share useful features, but gradients can conflict and sensitive labels can leak into representations. compare it against separate models on: task quality and calibration; subgroup errors; inference latency and memory; update cadence and blast radius; privacy purpose limitation. production answer “i use attributes to improve capture quality and analysis, not to invent identity facts. every attribute needs a stated product purpose, a governed label source, subgroup evaluation and a fallback for uncertain predictions.”","words":272},{"path":"02-face-recognition/README.md","title":"Overview","section":"2 · Face Recognition","quiz":false,"accent":"#7c3aed","html":"<h1 id=\"2-face-recognition\">2 · Face Recognition<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Modern face recognition learns a compact embedding where samples of the same identity are close and different identities are separated by an angular margin. The embedding is not the decision; the protocol, similarity score and threshold are.<\/div><\/div>\n<h2 id=\"encoder-to-decision\">Encoder to decision<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">aligned face<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">CNN / ViT encoder<span class=\"nsub\">d-dimensional vector<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">L2 normalize<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">cosine score<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">threshold / rank<\/span>\n  <\/div>\n<\/div>\n<p>Training usually looks like classification over many identities, while inference removes the classification head and uses the normalized penultimate feature as the template. Angular-margin losses make the learned class geometry useful for unseen identities.<\/p>\n<h2 id=\"core-distinctions\">Core distinctions<\/h2>\n<ul><li><strong>Verification (1:1):<\/strong> “Does this selfie match the claimed ID portrait?”<\/li><li><strong>Closed-set identification (1:N):<\/strong> “Which enrolled identity is this, assuming it is<\/li><\/ul>\n<p>in the gallery?”<\/p>\n<ul><li><strong>Open-set identification:<\/strong> “Is this person in the gallery, and if so who?” This adds<\/li><\/ul>\n<p>an explicit reject decision.<\/p>\n<p>Jumio’s selfie-to-ID flow is primarily 1:1 verification, while reusable identity or known fraud search can introduce 1:N retrieval and gallery-scale effects.<\/p>\n<h2 id=\"what-makes-face-recognition-difficult\">What makes face recognition difficult<\/h2>\n<p>The model must suppress nuisance variation—pose, illumination, device, compression, expression and age—without collapsing identity signal. Training data therefore needs many identities <strong>and<\/strong> useful within-identity variation. More images of the same easy frontal capture add less value than cross-device, cross-age and hard-condition coverage.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"embeddings-and-losses.md\" href=\"#\">Embeddings, Losses &amp; Hard Negatives<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"encoder-to-decision","text":"Encoder to decision"},{"level":2,"id":"core-distinctions","text":"Core distinctions"},{"level":2,"id":"what-makes-face-recognition-difficult","text":"What makes face recognition difficult"}],"text":"2 · face recognition 💡 tl;dr modern face recognition learns a compact embedding where samples of the same identity are close and different identities are separated by an angular margin. the embedding is not the decision; the protocol, similarity score and threshold are. encoder to decision aligned face cnn / vit encoder d-dimensional vector l2 normalize cosine score threshold / rank training usually looks like classification over many identities, while inference removes the classification head and uses the normalized penultimate feature as the template. angular-margin losses make the learned class geometry useful for unseen identities. core distinctions verification (1:1): “does this selfie match the claimed id portrait?” closed-set identification (1:n): “which enrolled identity is this, assuming it is in the gallery?” open-set identification: “is this person in the gallery, and if so who?” this adds an explicit reject decision. jumio’s selfie-to-id flow is primarily 1:1 verification, while reusable identity or known fraud search can introduce 1:n retrieval and gallery-scale effects. what makes face recognition difficult the model must suppress nuisance variation—pose, illumination, device, compression, expression and age—without collapsing identity signal. training data therefore needs many identities and useful within-identity variation. more images of the same easy frontal capture add less value than cross-device, cross-age and hard-condition coverage. → next: embeddings, losses & hard negatives .","words":215},{"path":"02-face-recognition/embeddings-and-losses.md","title":"Embeddings, Losses & Hard Negatives","section":"2 · Face Recognition","quiz":false,"accent":"#7c3aed","html":"<h1 id=\"embeddings-angular-margins-hard-negatives\">Embeddings, Angular Margins &amp; Hard Negatives<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> FaceNet popularized

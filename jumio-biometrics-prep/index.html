quest path"},{"level":2,"id":"slos-and-capacity","text":"SLOs and capacity"},{"level":2,"id":"release-unit","text":"Release unit"}],"text":"7 · production, aws & scale 💡 tl;dr the production unit is the complete decision service, not a model file. version preprocessing, quality, liveness, embedding, threshold and policy together. online request path authenticate request and create an idempotency/session key; validate/decode media with strict resource limits; run detection, alignment, quality and liveness; produce the versioned normalized embedding; compare against claimed template or retrieve gallery candidates; apply calibrated threshold/risk policy; return decision and non-sensitive reason codes; emit traces, metrics and audit events without leaking biometric content. slos and capacity define: p50/p95/p99 end-to-end latency; throughput and burst behavior; gpu/cpu memory and queue limits; availability and regional recovery target; timeout, retry and overload policy; per-stage error and acquisition rate; security/fairness model gates. avoid unbounded server retries: clients may already retry and create duplicate biometric transactions. use idempotency and a clear deadline budget. release unit a release manifest should pin detector, landmark/alignment config, quality model, pad model, encoder, ann index format, calibration and policy thresholds. canary the bundle; do not let independently updated components create untested combinations. → next: aws training-to-serving architecture .","words":178},{"path":"07-production-scale/aws-architecture.md","title":"AWS Training-to-Serving Architecture","section":"7 · Production & Scale","quiz":false,"accent":"#2563eb","html":"<h1 id=\"aws-training-to-serving-architecture\">AWS Training-to-Serving Architecture<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Separate governed offline training from low-latency online serving, connect them with immutable artifacts and evaluation gates, and design for regional failure and privacy from the beginning.<\/div><\/div>\n<h2 id=\"offline-path\">Offline path<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">S3 governed lake<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">Airflow / MWAA<span class=\"nsub\">manifest · quality · split<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">SageMaker / EC2 GPU<span class=\"nsub\">DDP · checkpoints<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">evaluation gates<span class=\"nsub\">biometric · fairness · PAD · latency<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">signed registry artifact<\/span>\n  <\/div>\n<\/div>\n<ul><li>S3 buckets are encrypted with KMS, versioned and separated by trust boundary.<\/li><li>IAM roles grant each job only required prefixes/actions.<\/li><li>Private subnets and VPC endpoints keep training traffic off the public internet.<\/li><li>Spot instances reduce training cost with regular durable checkpoints.<\/li><li>CloudTrail and artifact lineage make data/model access auditable.<\/li><\/ul>\n<h2 id=\"online-path\">Online path<\/h2>\n<p>A common design uses an API layer and regional EKS GPU/CPU pools:<\/p>\n<ul><li>lightweight request validation/routing on CPU;<\/li><li>GPU inference pods for PAD/encoder with bounded dynamic batching;<\/li><li>template store encrypted separately from general application data;<\/li><li>FAISS/Milvus-style retrieval service for 1:N use cases;<\/li><li>risk/policy service combining evidence;<\/li><li>metrics/traces to CloudWatch/Prometheus with privacy-safe identifiers.<\/li><\/ul>\n<p>SageMaker endpoints are a valid managed alternative. Choose EKS when the team needs multi-model pipelines, custom runtimes and fine-grained orchestration; choose SageMaker when managed deployment/monitoring outweigh platform flexibility.<\/p>\n<h2 id=\"availability-and-rollout\">Availability and rollout<\/h2>\n<ul><li>multi-AZ replicas and readiness probes;<\/li><li>minimum warm GPU capacity for latency SLO;<\/li><li>queue-age and concurrency-based autoscaling;<\/li><li>canary/shadow evaluation against production slices;<\/li><li>automatic rollback on latency, error, security or fairness proxy regression;<\/li><li>regional failover policy that respects data residency and key boundaries.<\/li><\/ul>\n<h2 id=\"capacity-sketch\">Capacity sketch<\/h2>\n<p>If one replica sustains 80 requests/s at target p99 and peak demand is 2,000 requests/s, the theoretical minimum is 25 replicas. Add headroom for burst, failures, rollout, quality/PAD branching and tail latency. Benchmark the <strong>full pipeline<\/strong>; model-only FPS does not size the service.<\/p>\n<h2 id=\"staff-level-trade-off\">Staff-level trade-off<\/h2>\n<blockquote><p>“I would begin with managed training on SageMaker and a reproducible artifact contract. For serving I choose SageMaker or EKS from pipeline complexity and team operating model, then prove p99 and cost with a load test. The invariant is immutable lineage and the same gated model bundle across regions.”<\/p><\/blockquote>","toc":[{"level":2,"id":"offline-path","text":"Offline path"},{"level":2,"id":"online-path","text":"Online path"},{"level":2,"id":"availability-and-rollout","text":"Availability and rollout"},{"level":2,"id":"capacity-sketch","text":"Capacity sketch"},{"level":2,"id":"staff-level-trade-off","text":"Staff-level trade-off"}],"text":"aws training-to-serving architecture 💡 tl;dr separate governed offline training from low-latency online serving, connect them with immutable artifacts and evaluation gates, and design for regional failure and privacy from the beginning. offline path s3 governed lake airflow / mwaa manifest · quality · split sagemaker / ec2 gpu ddp · checkpoints evaluation gates biometric · fairness · pad · latency signed registry artifact s3 buckets are encrypted with kms, versioned and separated by trust boundary. iam roles grant each job only required prefixes/actions. private subnets and vpc endpoints keep training traffic off the public internet. spot instances reduce training cost with regular durable checkpoints. cloudtrail and artifact lineage make data/model access auditable. online path a common design uses an api layer and regional eks gpu/cpu pools: lightweight request validation/routing on cpu; gpu inference pods for pad/encoder with bounded dynamic batching; template store encrypted separately from general application data; faiss/milvus-style retrieval service for 1:n use cases; risk/policy service combining evidence; metrics/traces to cloudwatch/prometheus with privacy-safe identifiers. sagemaker endpoints are a valid managed alternative. choose eks when the team needs multi-model pipelines, custom runtimes and fine-grained orchestration; choose sagemaker when managed deployment/monitoring outweigh platform flexibility. availability and rollout multi-az replicas and readiness probes; minimum warm gpu capacity for latency slo; queue-age and concurrency-based autoscaling; canary/shadow evaluation against production slices; automatic rollback on latency, error, security or fairness proxy regression; regional failover policy that respects data residency and key boundaries. capacity sketch if one replica sustains 80 requests/s at target p99 and peak demand is 2,000 requests/s, the theoretical minimum is 25 replicas. add headroom for burst, failures, rollout, quality/pad branching and tail latency. benchmark the full pipeline ; model-only fps does not size the service. staff-level trade-off “i would begin with managed training on sagemaker and a reproducible artifact contract. for serving i choose sagemaker or eks from pipeline complexity and team operating model, then prove p99 and cost with a load test. the invariant is immutable lineage and the same gated model bundle across regions.”","words":334},{"path":"07-production-scale/optimization-and-ann.md","title":"TensorRT, ONNX & ANN Search","section":"7 · Production & Scale","quiz":false,"accent":"#2563eb","html":"<h1 id=\"tensorrt-onnx-quantization-ann-search\">TensorRT, ONNX, Quantization &amp; ANN Search<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Optimize against the real latency/security operating point. A faster encoder that changes the low-FMR tail or subgroup errors is not equivalent.<\/div><\/div>\n<h2 id=\"optimization-ladder\">Optimization ladder<\/h2>\n<ol><li>Profile decode, preprocessing, transfer, inference and postprocessing separately.<\/li><li>Export a numerically checked ONNX graph with fixed preprocessing contract.<\/li><li>Apply FP16/BF16 and TensorRT/ONNX Runtime graph/kernel optimization.<\/li><li>Tune batching within p99 deadline.<\/li><li>Try INT8 PTQ with representative calibration.<\/li><li>Use QAT or mixed precision if sensitive layers damage biometric metrics.<\/li><li>Distill to a smaller encoder when architecture reduction is required.<\/li><\/ol>\n<p>Validate:<\/p>\n<ul><li>embedding cosine agreement versus reference;<\/li><li>genuine/impostor score distributions;<\/li><li>TAR at target FMR, not only average cosine error;<\/li><li>subgroup and quality slices;<\/li><li>detector/PAD metrics;<\/li><li>target-hardware p99 and memory.<\/li><\/ul>\n<h2 id=\"ann-for-1n\">ANN for 1:N<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Index<\/th><th>Strength<\/th><th>Trade-off<\/th><\/tr><\/thead><tbody><tr><td>Flat exact<\/td><td>exact and simple<\/td><td>O(N) compute and memory bandwidth<\/td><\/tr><tr><td>IVF<\/td><td>probes selected clusters<\/td><td>train/tune centroids; recall depends on probes<\/td><\/tr><tr><td>HNSW<\/td><td>strong latency/recall<\/td><td>memory-heavy graph and update complexity<\/td><\/tr><tr><td>PQ / IVF-PQ<\/td><td>compresses large galleries<\/td><td>quantization lowers retrieval accuracy<\/td><\/tr><\/tbody><\/table><\/div>\n<p>FAISS is an in-process library; Milvus is a distributed vector database/service. For a small gallery, exact search may be safer and fast enough. At scale, benchmark recall@k, p99, memory, build/update time and failure recovery.<\/p>\n<h2 id=\"two-stage-identification\">Two-stage identification<\/h2>\n<ol><li>ANN retrieves top-k candidates.<\/li><li>Exact cosine rerank uses original vectors.<\/li><li>Biometric threshold/policy decides match or reject.<\/li><\/ol>\n<p>Measure retrieval miss separately from matcher rejection. Encrypt templates and indexes, control deletion, and version the index with the encoder. An encoder migration requires a new index or compatible dual-read plan.<\/p>\n<h2 id=\"gallery-scale-risk\">Gallery-scale risk<\/h2>\n<p>Approximate retrieval recall is not the only concern. More enrolled identities create more impostor opportunities. Re-evaluate FPIR and threshold at realistic gallery size and traffic, including repeated queries.<\/p>\n<p>Reuse the deeper <a href=\"http://192.168.3.20:9002/#12-nvidia-model-optimization/tensorrt-internals.md\" target=\"_blank\" rel=\"noopener\">TensorRT material<\/a> and <a href=\"http://192.168.3.20:9001/#05-faiss/benchmark-results.md\" target=\"_blank\" rel=\"noopener\">FAISS benchmarks<\/a>.<\/p>","toc":[{"level":2,"id":"optimization-ladder","text":"Optimization ladder"},{"level":2,"id":"ann-for-1n","text":"ANN for 1:N"},{"level":2,"id":"two-stage-identification","text":"Two-stage identification"},{"level":2,"id":"gallery-scale-risk","text":"Gallery-scale risk"}],"text":"tensorrt, onnx, quantization & ann search 💡 tl;dr optimize against the real latency/security operating point. a faster encoder that changes the low-fmr tail or subgroup errors is not equivalent. optimization ladder profile decode, preprocessing, transfer, inference and postprocessing separately. export a numerically checked onnx graph with fixed preprocessing contract. apply fp16/bf16 and tensorrt/onnx runtime graph/kernel optimization. tune batching within p99 deadline. try int8 ptq with representative calibration. use qat or mixed precision if sensitive layers damage biometric metrics. distill to a smaller encoder when architecture reduction is required. validate: embedding cosine agreement versus reference; genuine/impostor score distributions; tar at target fmr, not only average cosine error; subgroup and quality slices; detector/pad metrics; target-hardware p99 and memory. ann for 1:n index strength trade-off flat exact exact and simple o(n) compute and memory bandwidth ivf probes selected clusters train/tune centroids; recall depends on probes hnsw strong latency/recall memory-heavy graph and update complexity pq / ivf-pq compresses large galleries quantization lowers retrieval accuracy faiss is an in-process library; milvus is a distributed vector database/service. for a small gallery, exact search may be safer and fast enough. at scale, benchmark recall@k, p99, memory, build/update time and failure recovery. two-stage identification ann retrieves top-k candidates. exact cosine rerank uses original vectors. biometric threshold/policy decides match or reject. measure retrieval miss separately from matcher rejection. encrypt templates and indexes, control deletion, and version the index with the encoder. an encoder migration requires a new index or compatible dual-read plan. gallery-scale risk approximate retrieval recall is not the only concern. more enrolled identities create more impostor opportunities. re-evaluate fpir and threshold at realistic gallery size and traffic, including repeated queries. reuse the deeper tensorrt material and faiss benchmarks .","words":282},{"path":"07-production-scale/privacy-mobile-monitoring.md","title":"Privacy, Mobile & Monitoring","section":"7 · Production & Scale","quiz":false,"accent":"#2563eb","html":"<h1 id=\"privacy-mobileedge-production-monitoring\">Privacy, Mobile/Edge &amp; Production Monitoring<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Biometric templates remain sensitive even though they are not photographs. Minimize, encrypt, version, audit and delete them; monitor the decision pipeline without putting faces or raw embeddings into logs.<\/div><\/div>\n<h2 id=\"privacy-and-security-controls\">Privacy and security controls<\/h2>\n<ul><li>explicit purpose, consent/legal basis and retention;<\/li><li>data minimization: store only what the product needs;<\/li><li>encryption in transit and at rest with separated keys/roles;<\/li><li>strict access and tamper-evident audit trail;<\/li><li>tenant/region isolation and residency policy;<\/li><li>subject deletion propagated through datasets, indexes and backups;<\/li><li>signed models/SDKs and controlled supply chain;<\/li><li>incident response for template or key compromise.<\/li><\/ul>\n<p>Templates are not easily “reset” like passwords. Consider revocable/cancelable template transforms where they fit, but validate their effect on accuracy and interoperability.<\/p>\n<h2 id=\"mobileedge-path\">Mobile/edge path<\/h2>\n<p>Use CoreML or LiteRT/TFLite when on-device capture guidance, detection, quality or PAD improves latency/privacy. Challenges include:<\/p>\n<ul><li>diverse CPU/GPU/NPU operator support;<\/li><li>preprocessing parity and camera orientation;<\/li><li>FP16/INT8 accuracy in low-FMR tails;<\/li><li>app/SDK version fragmentation;<\/li><li>model extraction and tampering;<\/li><li>thermal, memory and battery limits.<\/li><\/ul>\n<p>Keep the authoritative decision boundary explicit. On-device evidence may reduce data transfer and improve UX, but a compromised client cannot be the only source of truth for a high-risk transaction.<\/p>\n<h2 id=\"monitoring-without-labels\">Monitoring without labels<\/h2>\n<p>Immediate production labels are scarce. Monitor:<\/p>\n<ul><li>capture success, quality reason codes and retry/abandonment;<\/li><li>face/PAD/match score distributions by governed slices and device/version;<\/li><li>threshold distance and manual-review rate;<\/li><li>latency, queue age, GPU utilization and errors per stage;<\/li><li>ANN recall canaries and index freshness;<\/li><li>confirmed fraud/appeal outcomes when delayed labels arrive.<\/li><\/ul>\n<p>Use shadow/champion comparisons and a stable canary set. A score drift alert is a trigger for investigation, not proof that identities or demographics changed.<\/p>\n<h2 id=\"incident-example\">Incident example<\/h2>\n<p>If FNMR rises after a mobile release:<\/p>\n<ol><li>stop/rollback the rollout;<\/li><li>slice by SDK, device, OS and capture condition;<\/li><li>reproduce the input tensor and orientation;<\/li><li>compare detector/quality/PAD/encoder stages;<\/li><li>verify model and preprocessing hashes;<\/li><li>assess subgroup impact;<\/li><li>repair, replay the gated benchmark, and document the failure.<\/li><\/ol>","toc":[{"level":2,"id":"privacy-and-security-controls","text":"Privacy and security controls"},{"level":2,"id":"mobileedge-path","text":"Mobile/edge path"},{"level":2,"id":"monitoring-without-labels","text":"Monitoring without labels"},{"level":2,"id":"incident-example","text":"Incident example"}],"text":"privacy, mobile/edge & production monitoring 💡 tl;dr biometric templates remain sensitive even though they are not photographs. minimize, encrypt, version, audit and delete them; monitor the decision pipeline without putting faces or raw embeddings into logs. privacy and security controls explicit purpose, consent/legal basis and retention; data minimization: store only what the product needs; encryption in transit and at rest with separated keys/roles; strict access and tamper-evident audit trail; tenant/region isolation and residency policy; subject deletion propagated through datasets, indexes and backups; signed models/sdks and controlled supply chain; incident response for template or key compromise. templates are not easily “reset” like passwords. consider revocable/cancelable template transforms where they fit, but validate their effect on accuracy and interoperability. mobile/edge path use coreml or litert/tflite when on-device capture guidance, detection, quality or pad improves latency/privacy. challenges include: diverse cpu/gpu/npu operator support; preprocessing parity and camera orientation; fp16/int8 accuracy in low-fmr tails; app/sdk version fragmentation; model extraction and tampering; thermal, memory and battery limits. keep the authoritative decision boundary explicit. on-device evidence may reduce data transfer and improve ux, but a compromised client cannot be the only source of truth for a high-risk transaction. monitoring without labels immediate production labels are scarce. monitor: capture success, quality reason codes and retry/abandonment; face/pad/match score distributions by governed slices and device/version; threshold distance and manual-review rate; latency, queue age, gpu utilization and errors per stage; ann recall canaries and index freshness; confirmed fraud/appeal outcomes when delayed labels arrive. use shadow/champion comparisons and a stable canary set. a score drift alert is a trigger for investigation, not proof that identities or demographics changed. incident example if fnmr rises after a mobile release: stop/rollback the rollout; slice by sdk, device, os and capture condition; reproduce the input tensor and orientation; compare detector/quality/pad/encoder stages; verify model and preprocessing hashes; assess subgroup impact; repair, replay the gated benchmark, and document the failure.","words":312},{"path":"08-interview-practice/README.md","title":"Overview","section":"8 · Interview Practice","quiz":false,"accent":"#db2777","html":"<h1 id=\"8-interview-practice\">8 · Interview Practice<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Staff interviews test whether you can frame ambiguity, make a decision, defend trade-offs and lead the system after launch. Rehearse answers aloud, not silently.<\/div><\/div>\n<h2 id=\"likely-interview-surfaces\">Likely interview surfaces<\/h2>\n<ol><li><strong>Biometric depth:<\/strong> embeddings, losses, thresholds, protocols and failure analysis.<\/li><li><strong>Fairness:<\/strong> measurement, uncertainty, mitigation and responsible communication.<\/li><li><strong>Security:<\/strong> PAD, deepfakes, injection and adaptive attack evaluation.<\/li><li><strong>System design:<\/strong> global training-to-serving architecture on AWS.<\/li><li><strong>Coding:<\/strong> clean Python/NumPy/OpenCV/PyTorch with tests and edge cases.<\/li><li><strong>Leadership:<\/strong> mentoring, review quality, cross-team decisions and incident ownership.<\/li><\/ol>\n<h2 id=\"answer-timing\">Answer timing<\/h2>\n<ul><li><strong>30 seconds:<\/strong> definition plus most important trade-off.<\/li><li><strong>2 minutes:<\/strong> structured approach and concrete decision.<\/li><li><strong>10–15 minutes:<\/strong> requirements, diagram, APIs/data, scale, failure, security,<\/li><\/ul>\n<p>fairness, monitoring and alternatives.<\/p>\n<h2 id=\"behavioral-preparation\">Behavioral preparation<\/h2>\n<p>Prepare five STAR stories:<\/p>\n<ul><li>improved a model/system using evidence rather than opinion;<\/li><li>production incident you owned through prevention;<\/li><li>design disagreement resolved with measurable criteria;<\/li><li>engineer you mentored into greater ownership;<\/li><li>project where you reduced scope or said no to protect quality/security.<\/li><\/ul>\n<p>At Staff level, emphasize how you changed the <strong>system and team<\/strong>, not only your personal implementation.<\/p>\n<p>→ Practice the <strong><a class=\"mdlink\" data-href=\"system-design.md\" href=\"#\">Worked Biometric System Design<\/a><\/strong>, then use the <strong><a class=\"mdlink\" data-href=\"interview-qa.md\" href=\"#\">Rapid-Fire Q&amp;A<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"likely-interview-surfaces","text":"Likely interview surfaces"},{"level":2,"id":"answer-timing","text":"Answer timing"},{"level":2,"id":"behavioral-preparation","text":"Behavioral preparation"}],"text":"8 · interview practice 💡 tl;dr staff interviews test whether you can frame ambiguity, make a decision, defend trade-offs and lead the system after launch. rehearse answers aloud, not silently. likely interview surfaces biometric depth: embeddings, losses, thresholds, protocols and failure analysis. fairness: measurement, uncertainty, mitigation and responsible communication. security: pad, deepfakes, injection and adaptive attack evaluation. system design: global training-to-serving architecture on aws. coding: clean python/numpy/opencv/pytorch with tests and edge cases. leadership: mentoring, review quality, cross-team decisions and incident ownership. answer timing 30 seconds: definition plus most important trade-off. 2 minutes: structured approach and concrete decision. 10–15 minutes: requirements, diagram, apis/data, scale, failure, security, fairness, monitoring and alternatives. behavioral preparation prepare five star stories: improved a model/system using evidence rather than opinion; production incident you owned through prevention; design disagreement resolved with measurable criteria; engineer you mentored into greater ownership; project where you reduced scope or said no to protect quality/security. at staff level, emphasize how you changed the system and team , not only your personal implementation. → practice the worked biometric system design , then use the rapid-fire q&a .","words":183},{"path":"08-interview-practice/system-design.md","title":"Worked Biometric System Design","section":"8 · Interview Practice","quiz":false,"accent":"#db2777","html":"<h1 id=\"worked-design-global-selfie-to-id-verification\">Worked Design: Global Selfie-to-ID Verification<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Start with the decision and threat model, then design the model pipeline and AWS platform around measurable security, fairness, latency and privacy requirements.<\/div><\/div>\n<h2 id=\"1-clarify-requirements\">1. Clarify requirements<\/h2>\n<p>Assume:<\/p>\n<ul><li>user submits ID portrait plus live selfie/video;<\/li><li>return approve, reject or review;<\/li><li>peak 2,000 requests/s across regions;<\/li><li>p99 under 1.5 seconds excluding user capture;<\/li><li>target FMR set by fraud policy; maximize TAR and completion within it;<\/li><li>PAD protects presentation attacks and capture channel resists replay/injection;<\/li><li>data residency, deletion and audit are mandatory.<\/li><\/ul>\n<p>Ask about regions, document/device mix, acceptable manual-review rate, enrollment versus authentication, 1:N search requirement and retention.<\/p>\n<h2 id=\"2-request-path\">2. Request path<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">mobile/web SDK<span class=\"nsub\">nonce · encrypted media<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">regional API<span class=\"nsub\">auth · idempotency · limits<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">biometric pipeline<span class=\"nsub\">quality · PAD · embed · score<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">risk policy<span class=\"nsub\">device · document · graph signals<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">approve / review / reject<\/span>\n  <\/div>\n<\/div>\n<p>Use a transaction/session ID throughout. Validate file type/size and decode in a resource-limited service. Keep each stage’s reason code and latency, but do not log raw faces or embeddings.<\/p>\n<h2 id=\"3-model-pipeline\">3. Model pipeline<\/h2>\n<ol><li>document portrait extraction and quality;<\/li><li>selfie face count, detection, landmarks and alignment;<\/li><li>capture quality and bounded recapture decision;<\/li><li>PAD plus session/device anti-replay evidence;<\/li><li>versioned face embeddings and cosine comparison;<\/li><li>calibrated score plus document/device/risk signals;<\/li><li>threshold policy with abstain/manual-review band.<\/li><\/ol>\n<p>Deploy a tested bundle of all component versions and thresholds.<\/p>\n<h2 id=\"4-aws-platform\">4. AWS platform<\/h2>\n<ul><li>Route to the permitted region; terminate TLS and authenticate at the edge/API layer.<\/li><li>EKS or SageMaker hosts autoscaled CPU/GPU inference.<\/li><li>S3 stores encrypted, governed training artifacts; online media retention is minimal.<\/li><li>Template/risk stores have isolated IAM/KMS boundaries.<\/li><li>Airflow/MWAA creates immutable datasets and launches SageMaker/EC2 multi-GPU jobs.<\/li><li>Registry promotion requires biometric, fairness, PAD, latency and security gates.<\/li><li>Multi-AZ service; cross-region recovery follows residency constraints.<\/li><\/ul>\n<h2 id=\"5-evaluation-and-fairness\">5. Evaluation and fairness<\/h2>\n<p>Freeze a subject-disjoint protocol reflecting selfie-to-document conditions. Report TAR@target-FMR, acquisition, BPCER/APCER, completion and latency by device, region and approved demographic intersections with identity-level confidence intervals.<\/p>\n<p>The production threshold is global unless policy/legal review explicitly approves otherwise. Use targeted data/capture/model mitigation for gaps and show residual risk.<\/p>\n<h2 id=\"6-reliability-and-rollout\">6. Reliability and rollout<\/h2>\n<ul><li>canary 1% with champion shadow scores;<\/li><li>rollback on p99, error, acquisition or safety/fairness proxy gate;<\/li><li>idempotency prevents duplicate retry transactions;<\/li><li>bounded queues shed load before tail latency explodes;<\/li><li>version/model/index mismatch fails closed;<\/li><li>delayed fraud and appeal outcomes feed controlled evaluation, not automatic retraining.<\/li><\/ul>\n<h2 id=\"7-trade-offs-to-state\">7. Trade-offs to state<\/h2>\n<ul><li>passive liveness friction versus attack generalization;<\/li><li>EKS flexibility versus SageMaker operational simplicity;<\/li><li>dynamic batching throughput versus p99;<\/li><li>stricter quality/PAD versus customer completion;<\/li><li>source-image retention for re-embedding versus privacy minimization;<\/li><li>ANN scale versus exact-search assurance.<\/li><\/ul>\n<h2 id=\"two-minute-close\">Two-minute close<\/h2>\n<blockquote><p>“I would own this as a decision system. The capture is session-bound, quality and PAD gate the face encoder, and the match score is evaluated at a fraud-defined operating point with an abstain path. Offline, immutable subject-disjoint data and multi-GPU training feed a registry only after biometric, fairness, PAD and latency gates. Online, a regional AWS service deploys the whole versioned bundle, canaries against the champion, and monitors acquisition, score distributions, journey outcomes and p99 without logging biometric content.”<\/p><\/blockquote>","toc":[{"level":2,"id":"1-clarify-requirements","text":"1. Clarify requirements"},{"level":2,"id":"2-request-path","text":"2. Request path"},{"level":2,"id":"3-model-pipeline","text":"3. Model pipeline"},{"level":2,"id":"4-aws-platform","text":"4. AWS platform"},{"level":2,"id":"5-evaluation-and-fairness","text":"5. Evaluation and fairness"},{"level":2,"id":"6-reliability-and-rollout","text":"6. Reliability and rollout"},{"level":2,"id":"7-trade-offs-to-state","text":"7. Trade-offs to state"},{"level":2,"id":"two-minute-close","text":"Two-minute close"}],"text":"worked design: global selfie-to-id verification 💡 tl;dr start with the decision and threat model, then design the model pipeline and aws platform around measurable security, fairness, latency and privacy requirements. 1. clarify requirements assume: user submits id portrait plus live selfie/video; return approve, reject or review; peak 2,000 requests/s across regions; p99 under 1.5 seconds excluding user capture; target fmr set by fraud policy; maximize tar and completion within it; pad protects presentation attacks and capture channel resists replay/injection; data residency, deletion and audit are mandatory. ask about regions, document/device mix, acceptable manual-review rate, enrollment versus authentication, 1:n search requirement and retention. 2. request path mobile/web sdk nonce · encrypted media regional api auth · idempotency · limits biometric pipeline quality · pad · embed · score risk policy device · document · graph signals approve / review / reject use a transaction/session id throughout. validate file type/size and decode in a resource-limited service. keep each stage’s reason code and latency, but do not log raw faces or embeddings. 3. model pipeline document portrait extraction and quality; selfie face count, detection, landmarks and alignment; capture quality and bounded recapture decision; pad plus session/device anti-replay evidence; versioned face embeddings and cosine comparison; calibrated score plus document/device/risk signals; threshold policy with abstain/manual-review band. deploy a tested bundle of all component versions and thresholds. 4. aws platform route to the permitted region; terminate tls and authenticate at the edge/api layer. eks or sagemaker hosts autoscaled cpu/gpu inference. s3 stores encrypted, governed training artifacts; online media retention is minimal. template/risk stores have isolated iam/kms boundaries. airflow/mwaa creates immutable datasets and launches sagemaker/ec2 multi-gpu jobs. registry promotion requires biometric, fairness, pad, latency and security gates. multi-az service; cross-region recovery follows residency constraints. 5. evaluation and fairness freeze a subject-disjoint protocol reflecting selfie-to-document conditions. report tar@target-fmr, acquisition, bpcer/apcer, completion and latency by device, region and approved demographic intersections with identity-level confidence intervals. the production threshold is global unless policy/legal review explicitly approves otherwise. use targeted data/capture/model mitigation for gaps and show residual risk. 6. reliability and rollout canary 1% with champion shadow scores; rollback on p99, error, acquisition or safety/fairness proxy gate; idempotency prevents duplicate retry transactions; bounded queues shed load before tail latency explodes; version/model/index mismatch fails closed; delayed fraud and appeal outcomes feed controlled evaluation, not automatic retraining. 7. trade-offs to state passive liveness friction versus attack generalization; eks flexibility versus sagemaker operational simplicity; dynamic batching throughput versus p99; stricter quality/pad versus customer completion; source-image retention for re-embedding versus privacy minimization; ann scale versus exact-search assurance. two-minute close “i would own this as a decision system. the capture is session-bound, quality and pad gate the face encoder, and the match score is evaluated at a fraud-defined operating point with an abstain path. offline, immutable subject-disjoint data and multi-gpu training feed a registry only after biometric, fairness, pad and latency gates. online, a regional aws service deploys the whole versioned bundle, canaries against the champion, and monitors acquisition, score distributions, journey outcomes and p99 without logging biometric content.”","words":503},{"path":"08-interview-practice/interview-qa.md","title":"Rapid-Fire Interview Q&A","section":"8 · Interview Practice","quiz":true,"accent":"#db2777","html":"<h1 id=\"rapid-fire-interview-qa\">Rapid-Fire Interview Q&amp;A<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Say each answer aloud before opening it. Strong answers define the concept, name the decision it changes, and acknowledge the main failure mode.<\/div><\/div>\n<details class=\"qa\" open><summary>Q: Face verification versus identification?<\/summary><div class=\"qa-body\"><p>Verification compares a probe with one claimed identity (1:1). Identification searches a gallery (1:N); open-set identification must also reject people not enrolled. Gallery size adds impostor opportunities, so 1:1 FMR cannot be copied directly into 1:N risk.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why embeddings instead of a binary same/different classifier?<\/summary><div class=\"qa-body\"><p>An encoder creates reusable templates for unseen identities, supports fast comparison and ANN search, and separates representation learning from operating policy. The threshold still needs task-specific calibration and evaluation.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: ArcFace in one sentence?<\/summary><div class=\"qa-body\"><p>It trains normalized face features with an additive angular margin on the target class, creating compact identity clusters and explicit angular separation that matches cosine scoring at inference.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is the most dangerous split error?<\/summary><div class=\"qa-body\"><p>The same identity—or near-duplicate captures of that identity—in train and test. Split by resolved subject before pair generation and audit cross-source duplicates.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: FMR and FNMR?<\/summary><div class=\"qa-body\"><p>FMR is the fraction of impostor comparisons accepted; FNMR is the fraction of genuine comparisons rejected at a stated threshold. Lowering the threshold usually lowers FNMR and raises FMR.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why TAR at fixed FMR?<\/summary><div class=\"qa-body\"><p>Identity products operate at a security-defined false-match budget, often in the extreme tail. TAR@FMR tells how many genuine users succeed while honoring that budget; EER may rank models differently and is rarely the deployed point.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How many impostor pairs are enough for FMR 10⁻⁶?<\/summary><div class=\"qa-body\"><p>Far more than a million are needed for a precise tail estimate, and trials must not be treated as independent when they reuse a small subject pool. Report confidence bounds and identity/session sampling structure; zero observations is not zero risk.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you measure fairness?<\/summary><div class=\"qa-body\"><p>At the same frozen product threshold, report acquisition, PAD, FMR/FNMR, completion and uncertainty for governed groups and intersections. Bootstrap by identity and diagnose which pipeline stage creates the disparity.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Would you use a threshold per demographic group?<\/summary><div class=\"qa-body\"><p>Not as a hidden default. It requires sensitive-group knowledge, moves harm between error types and raises policy/legal issues. First fix data, capture, quality and model causes; any group-aware policy needs explicit review and transparent evaluation.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Passive versus active liveness?<\/summary><div class=\"qa-body\"><p>Passive PAD reduces friction but must generalize to unseen attacks/devices. Active challenge or illumination provides stronger freshness/replay evidence but adds UX and accessibility cost. Use risk-based step-up.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: APCER and BPCER?<\/summary><div class=\"qa-body\"><p>APCER measures attack presentations misclassified as bona fide; BPCER measures bona fide presentations rejected as attacks. Report per attack instrument/device and worst-case, not only a pooled average.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is injection different from presentation attack?<\/summary><div class=\"qa-body\"><p>A presentation attack shows an artifact to a real sensor. Injection bypasses or tampers with the capture path and feeds digital media directly. PAD alone is insufficient; session binding, device integrity and anti-replay controls are needed.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you validate synthetic faces?<\/summary><div class=\"qa-body\"><p>Tie them to a measured gap, audit identity leakage and generator bias, run real-only versus real+synthetic ablations, and require improvement on untouched real identities at the production operating point and subgroup slices.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: DDP versus FSDP?<\/summary><div class=\"qa-body\"><p>DDP replicates the model and averages gradients; use it when the model/classifier fits per GPU. FSDP shards parameters, gradients and optimizer state when memory is the limit. Measure dataloader and all-reduce bottlenecks before adding nodes.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What do you validate after INT8 quantization?<\/summary><div class=\"qa-body\"><p>Not only top-line accuracy: embedding agreement, genuine/impostor tails, TAR at target FMR, subgroup and quality slices, PAD/detector metrics, plus target p99 and memory.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: FAISS versus Milvus?<\/summary><div class=\"qa-body\"><p>FAISS is a high-performance vector-index library suitable in-process or as a building block. Milvus is a distributed vector database/service with persistence, sharding and operations. Choose from gallery size, updates, availability, filtering and team ownership.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you migrate encoder versions?<\/summary><div class=\"qa-body\"><p>Embeddings from different spaces are incompatible. Re-enroll, re-embed lawfully retained captures, or dual-read old/new indexes during migration. Version templates and index with the encoder and make deletion work across both.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What do you monitor without immediate labels?<\/summary><div class=\"qa-body\"><p>Acquisition/quality reasons, retry and completion, score distributions, threshold margin, manual review, device/SDK slices, p99, errors and ANN canaries. Join delayed fraud/appeal labels later through a governed evaluation pipeline.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: First response to subgroup FNMR tripling?<\/summary><div class=\"qa-body\"><p>Freeze rollout, confirm sample size/labels/threshold, slice acquisition through matching, compare quality and device conditions, reproduce the failure, then target the responsible stage. Report security and completion effects of the mitigation.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What makes this a Staff-level answer?<\/summary><div class=\"qa-body\"><p>It connects product risk, protocol, data, model, platform and team process; assigns owners and gates; makes uncertainty visible; and leaves a rollback and learning loop rather than only proposing a new network.<\/p><\/div><\/details>","toc":[],"text":"rapid-fire interview q&a 💡 tl;dr say each answer aloud before opening it. strong answers define the concept, name the decision it changes, and acknowledge the main failure mode. q: face verification versus identification? verification compares a probe with one claimed identity (1:1). identification searches a gallery (1:n); open-set identification must also reject people not enrolled. gallery size adds impostor opportunities, so 1:1 fmr cannot be copied directly into 1:n risk. q: why embeddings instead of a binary same/different classifier? an encoder creates reusable templates for unseen identities, supports fast comparison and ann search, and separates representation learning from operating policy. the threshold still needs task-specific calibration and evaluation. q: arcface in one sentence? it trains normalized face features with an additive angular margin on the target class, creating compact identity clusters and explicit angular separation that matches cosine scoring at inference. q: what is the most dangerous split error? the same identity—or near-duplicate captures of that identity—in train and test. split by resolved subject before pair generation and audit cross-source duplicates. q: fmr and fnmr? fmr is the fraction of impostor comparisons accepted; fnmr is the fraction of genuine comparisons rejected at a stated threshold. lowering the threshold usually lowers fnmr and raises fmr. q: why tar at fixed fmr? identity products operate at a security-defined false-match budget, often in the extreme tail. tar@fmr tells how many genuine users succeed while honoring that budget; eer may rank models differently and is rarely the deployed point. q: how many impostor pairs are enough for fmr 10⁻⁶? far more than a million are needed for a precise tail estimate, and trials must not be treated as independent when they reuse a small subject pool. report confidence bounds and identity/session sampling structure; zero observations is not zero risk. q: how do you measure fairness? at the same frozen product threshold, report acquisition, pad, fmr/fnmr, completion and uncertainty for governed groups and intersections. bootstrap by identity and diagnose which pipeline stage creates the disparity. q: would you use a threshold per demographic group? not as a hidden default. it requires sensitive-group knowledge, moves harm between error types and raises policy/legal issues. first fix data, capture, quality and model causes; any group-aware policy needs explicit review and transparent evaluation. q: passive versus active liveness? passive pad reduces friction but must generalize to unseen attacks/devices. active challenge or illumination provides stronger freshness/replay evidence but adds ux and accessibility cost. use risk-based step-up. q: apcer and bpcer? apcer measures attack presentations misclassified as bona fide; bpcer measures bona fide presentations rejected as attacks. report per attack instrument/device and worst-case, not only a pooled average. q: why is injection different from presentation attack? a presentation attack shows an artifact to a real sensor. injection bypasses or tampers with the capture path and feeds digital media directly. pad alone is insufficient; session binding, device integrity and anti-replay controls are needed. q: how do you validate synthetic faces? tie them to a measured gap, audit identity leakage and generator bias, run real-only versus real+synthetic ablations, and require improvement on untouched real identities at the production operating point and subgroup slices. q: ddp versus fsdp? ddp replicates the model and averages gradients; use it when the model/classifier fits per gpu. fsdp shards parameters, gradients and optimizer state when memory is the limit. measure dataloader and all-reduce bottlenecks before adding nodes. q: what do you validate after int8 quantization? not only top-line accuracy: embedding agreement, genuine/impostor tails, tar at target fmr, subgroup and quality slices, pad/detector metrics, plus target p99 and memory. q: faiss versus milvus? faiss is a high-performance vector-index library suitable in-process or as a building block. milvus is a distributed vector database/service with persistence, sharding and operations. choose from gallery size, updates, availability, filtering and team ownership. q: how do you migrate encoder versions? embeddings from different spaces are incompatible. re-enroll, re-embed lawfully retained captures, or dual-read old/new indexes during migration. version templates and index with the encoder and make deletion work across both. q: what do you monitor without immediate labels? acquisition/quality reasons, retry and completion, score distributions, threshold margin, manual review, device/sdk slices, p99, errors and ann canaries. join delayed fraud/appeal labels later through a governed evaluation pipeline. q: first response to subgroup fnmr tripling? freeze rollout, confirm sample size/labels/threshold, slice acquisition through matching, compare quality and device conditions, reproduce the failure, then target the responsible stage. report security and completion effects of the mitigation. q: what makes this a staff-level answer? it connects product risk, protocol, data, model, platform and team process; assigns owners and gates; makes uncertainty visible; and leaves a rollback and learning loop rather than only proposing a new network.","words":777},{"path":"08-interview-practice/cheat-sheet.md","title":"One-Page Cheat Sheet (Morning Of)","section":"8 · Interview Practice","quiz":false,"accent":"#db2777","html":"<h1 id=\"jumio-biometrics-morning-of-cheat-sheet\">Jumio Biometrics: Morning-Of Cheat Sheet<\/h1>\n<h2 id=\"pipeline\">Pipeline<\/h2>\n<p><strong>capture/session → detect → landmarks/align → quality → PAD → L2 embedding → cosine match/ANN → calibrated policy → approve/review/reject<\/strong><\/p>\n<p>Measure acquisition, each model stage and end-to-end journey. Preprocessing is a versioned contract.<\/p>\n<h2 id=\"recognition\">Recognition<\/h2>\n<ul><li>Verification = 1:1 claim. Identification = 1:N gallery; open-set includes reject.<\/li><li>Normalized embedding + cosine score.<\/li><li>FaceNet: triplet metric learning.<\/li><li>CosFace: cosine margin. ArcFace: angular margin.<\/li><li>MagFace/AdaFace: quality-aware representation/margin ideas.<\/li><li>Split by resolved identity; audit duplicates and hard-negative label errors.<\/li><\/ul>\n<h2 id=\"metrics\">Metrics<\/h2>\n<ul><li>FMR: impostors accepted. FNMR: genuine users rejected.<\/li><li>TAR = 1 − FNMR. Report <strong>TAR at target FMR<\/strong>.<\/li><li>EER is summary, not policy.<\/li><li>Freeze threshold on development data; final test once.<\/li><li>Tail metrics need huge representative trials + identity-level confidence intervals.<\/li><li>1:N: rank-k/CMC, FPIR/FNIR/TPIR, ANN recall and realistic gallery size.<\/li><\/ul>\n<h2 id=\"fairness\">Fairness<\/h2>\n<ul><li>Same global threshold visible across groups.<\/li><li>Report acquisition, PAD, FMR/FNMR, completion + counts/CIs.<\/li><li>Bootstrap by identity/session; inspect intersections.<\/li><li>Diagnose: data → capture/quality → detector/alignment → PAD → encoder → policy.<\/li><li>Mitigate mechanism; show global security and conversion trade-off.<\/li><li>Group thresholds require explicit product/legal review.<\/li><\/ul>\n<h2 id=\"security\">Security<\/h2>\n<ul><li>Match ≠ liveness. Live ≠ rightful identity.<\/li><li>Presentation: print/screen/mask. Digital: deepfake/morph/replay/injection.<\/li><li>APCER = attacks accepted; BPCER = bona fide rejected.<\/li><li>Hold out attack instruments/devices.<\/li><li>Session nonce + trusted capture binding + anti-replay + PAD + risk signals.<\/li><li>Layered defense and risk-based step-up.<\/li><\/ul>\n<h2 id=\"datatraining\">Data/training<\/h2>\n<ul><li>Governed manifest: subject, consent/purpose, session/device, quality, lineage, split.<\/li><li>Airflow orchestrates idempotent S3 manifest tasks; no image blobs in XCom.<\/li><li>DDP first; FSDP/ZeRO when state does not fit. AMP + durable checkpoint.<\/li><li>Synthetic data: measured gap → provenance/leak audit → ablation → real held-out lift.<\/li><\/ul>\n<h2 id=\"production\">Production<\/h2>\n<ul><li>S3 + Airflow/MWAA → SageMaker/EC2 GPU → evaluation gates → signed registry.<\/li><li>EKS/SageMaker online; bounded queues, idempotency, multi-AZ, canary and rollback.<\/li><li>Bundle detector + quality + PAD + encoder + threshold + index version.<\/li><li>TensorRT/ONNX: validate low-FMR tails and subgroup metrics after optimization.<\/li><li>FAISS library; Milvus distributed service. ANN top-k → exact rerank → threshold.<\/li><li>Templates: encrypt, purpose-limit, audit, version, delete; model upgrades need migration.<\/li><\/ul>\n<h2 id=\"system-design-order\">System-design order<\/h2>\n<p><strong>requirements → threat model → data/protocol → model → operating point → fairness → serving → monitoring/rollback → privacy → trade-offs<\/strong><\/p>\n<h2 id=\"leadership-phrases\">Leadership phrases<\/h2>\n<ul><li>“I would make that a release gate, not a dashboard.”<\/li><li>“I’d separate the symptom by pipeline stage before retraining.”<\/li><li>“Here is the security/conversion trade-off and who must approve it.”<\/li><li>“The rollback unit is the complete model-and-policy bundle.”<\/li><li>“I’d document uncertainty and residual risk rather than claim the bias is solved.”<\/li><\/ul>","toc":[{"level":2,"id":"pipeline","text":"Pipeline"},{"level":2,"id":"recognition","text":"Recognition"},{"level":2,"id":"metrics","text":"Metrics"},{"level":2,"id":"fairness","text":"Fairness"},{"level":2,"id":"security","text":"Security"},{"level":2,"id":"datatraining","text":"Data/training"},{"level":2,"id":"production","text":"Production"},{"level":2,"id":"system-design-order","text":"System-design order"},{"level":2,"id":"leadership-phrases","text":"Leadership phrases"}],"text":"jumio biometrics: morning-of cheat sheet pipeline capture/session → detect → landmarks/align → quality → pad → l2 embedding → cosine match/ann → calibrated policy → approve/review/reject measure acquisition, each model stage and end-to-end journey. preprocessing is a versioned contract. recognition verification = 1:1 claim. identification = 1:n gallery; open-set includes reject. normalized embedding + cosine score. facenet: triplet metric learning. cosface: cosine margin. arcface: angular margin. magface/adaface: quality-aware representation/margin ideas. split by resolved identity; audit duplicates and hard-negative label errors. metrics fmr: impostors accepted. fnmr: genuine users rejected. tar = 1 − fnmr. report tar at target fmr . eer is summary, not policy. freeze threshold on development data; final test once. tail metrics need huge representative trials + identity-level confidence intervals. function jupyterURL(){
  const proto = location.protocol === "file:" ? "http:" : location.protocol;
  const host = location.hostname || "localhost";
  return proto + "//" + host + ":" + JUPYTER_PORT + "/lab?token=" + JUPYTER_TOKEN;

// translucent tint from an accent hex — works on light AND dark backgrounds
function hexToRgba(hex, a){
  hex = (hex||"").replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex||"000000", 16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
}

/* ---------------------- persistent study-state store ---------------------- */
// localStorage is the instant/offline copy; /api/progress is shared by devices.
const STORE_KEY = "jumio-biometrics-prep-v1";
function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(_){ return {}; } }
function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(_){} }
let STATE = loadStore();
let remoteReady = location.protocol === "file:";
let serverHasState = false;
let saveQueue = Promise.resolve();
let syncLabel = location.protocol === "file:" ? "local" : "connecting";
function normalizeState(s){
  s = s && typeof s === "object" ? s : {};
  s.done = s.done && typeof s.done === "object" ? s.done : {};
  s.cards = s.cards && typeof s.cards === "object" ? s.cards : {};
  s.pins = s.pins && typeof s.pins === "object" ? s.pins : {};
  s.last = typeof s.last === "string" ? s.last : null;
  return s;
}
STATE = normalizeState(STATE);
function hasStudyState(){
  return Object.keys(STATE.done).length || Object.keys(STATE.cards).length || Object.keys(STATE.pins).length;
}
function mergeLegacyLocal(remote, local){
  let changed=false;
  const deleted=remote._deleted && typeof remote._deleted==="object" ? remote._deleted : {};
  ["done","cards","pins"].forEach(field=>{
    const tombstones=deleted[field] && typeof deleted[field]==="object" ? deleted[field] : {};
    Object.keys(local[field]||{}).forEach(key=>{
      if(!(key in remote[field]) && !(key in tombstones)){ remote[field][key]=local[field][key]; changed=true; }
    });
  });
  return changed;
}
function persist(change){
  saveStore(STATE);
  if(!remoteReady || location.protocol === "file:" || (!serverHasState && !hasStudyState())) return;
  syncLabel = "saving"; refreshProgressUI();
  const body=JSON.stringify(change || {op:"replace", state:STATE});
  saveQueue=saveQueue.catch(()=>{}).then(async()=>{
    try{
      const r=await fetch("/api/progress", {method:"POST", headers:{"Content-Type":"application/json"}, body});
      if(!r.ok) throw new Error("HTTP "+r.status);
      serverHasState=true; syncLabel="synced";
    }catch(_){ syncLabel="local — sync unavailable"; }
    refreshProgressUI();
  });
}
async function syncProgress(){
  if(location.protocol === "file:") return;
  try{
    const r=await fetch("/api/progress", {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const payload=await r.json();
    let migrated=false;
    if(payload.exists){
      const remote=normalizeState(payload.state);
      migrated=mergeLegacyLocal(remote, STATE);
      STATE=remote; saveStore(STATE); serverHasState=true;
    }
    remoteReady=true; syncLabel="synced";
    if((!payload.exists && hasStudyState()) || migrated) persist({op:"replace", state:STATE});
  }catch(_){ remoteReady=true; syncLabel="local — sync unavailable"; }
}
// stable short hash for card ids
function hashStr(s){ let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))|0; return (h>>>0).toString(36); }

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;
  if(/\/$/.test(href)) href += "README.md";
  const base = curPath.split("/").slice(0,-1);
  href.split("/").forEach(p=>{
    if(p==="."||p==="") return;
    if(p==="..") base.pop(); else base.push(p);
  });
  return base.join("/");
}

function buildNav(){
  const nav=document.getElementById("nav");
  DATA.nav.forEach(sec=>{
    const wrap=document.createElement("div"); wrap.className="sec";
    wrap.style.setProperty("--card", sec.accent);
    const h=document.createElement("div"); h.className="sec-h";
    h.innerHTML='<span class="sec-ic">'+(sec.icon||"")+'</span> '+sec.label+
      '<span class="sec-count"></span>';
    wrap.appendChild(h);
    sec.items.forEach(it=>{
      const a=document.createElement("a");
      a.className="item"+(/README\.md$/.test(it.path)&&it.path.indexOf("/")>=0?" sub":"");
      a.textContent=it.title; a.href="#"+encodeURI(it.path);
      a.dataset.path=it.path;
      wrap.appendChild(a);
    });
    nav.appendChild(wrap);
  });
}

function setActive(path){
  let active=null;
  document.querySelectorAll("nav a.item").forEach(a=>{
    const on=a.dataset.path===path;
    a.classList.toggle("active",on);
    if(on) active=a;
  });
  revealActiveNav(active);
  const pg=byPath[path];
  document.getElementById("tbTitle").textContent = pg ? pg.title : "ML Eng Prep";
}

function revealActiveNav(active){
  const side=document.getElementById("sidebar");
  if(!side||!active) return;
  requestAnimationFrame(()=>{
    const target=active.offsetTop-(side.clientHeight-active.offsetHeight)/2;
    side.scrollTop=Math.max(0,target);
  });
}

function renderPageTools(pg){
  const host=document.getElementById("pagetools");
  let html="";
  if(pg.quiz){
    html += '<div class="quizbar">'+
      '<button class="qbtn" id="hideAll">Quiz me · hide answers</button>'+
      '<button class="qbtn" id="showAll">Show all</button>'+
      '<button class="qbtn" id="shuffleCards">🔀 Shuffle</button>'+
      '<span class="qfilter">Show: '+
        '<button class="fbtn sel" data-f="all">all</button>'+
        '<button class="fbtn" data-f="unseen">unseen</button>'+
        '<button class="fbtn" data-f="misses">misses</button></span>'+
      '<span class="quiz-stats" id="quizStats"></span></div>';
  }
  if(pg.toc && pg.toc.length>=3){
    html += '<details class="toc"><summary>On this page</summary><ul>'+
      pg.toc.map(t=>'<li><a class="lvl'+t.level+'" data-anchor="'+t.id+'" href="#">'+t.text+'</a></li>').join("")+
      '</ul></details>';
  }
  host.innerHTML=html;
  if(pg.quiz){
    const set=open=>document.querySelectorAll("#content details.qa").forEach(d=>d.open=open);
    const hb=document.getElementById("hideAll"), sb=document.getElementById("showAll");
    if(hb) hb.onclick=()=>set(false);
    if(sb) sb.onclick=()=>set(true);
    const shuf=document.getElementById("shuffleCards");
    if(shuf) shuf.onclick=()=>shuffleCards();
    host.querySelectorAll(".fbtn").forEach(b=>b.onclick=()=>{
      host.querySelectorAll(".fbtn").forEach(x=>x.classList.toggle("sel",x===b));
      applyQuizFilter(b.dataset.f);
    });
  }
}

function renderPager(path){
  const idx=PAGES.findIndex(p=>p.path===path);
  const pager=document.getElementById("pager");
  if(idx<0){ pager.innerHTML=""; return; }
  const prev=PAGES[idx-1], next=PAGES[idx+1];
  let html="";
  if(prev) html+='<a href="#'+encodeURI(prev.path)+'"><div class="lbl">← Previous</div><div class="ttl">'+prev.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  if(next) html+='<a class="next" href="#'+encodeURI(next.path)+'"><div class="lbl">Next →</div><div class="ttl">'+next.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  pager.innerHTML=html;
}

function loadPage(path){
  const pg=byPath[path];
  const content=document.getElementById("content");
  if(!pg){ content.innerHTML='<div class="loading">Page not found: '+path+'</div>'; document.getElementById("pagetools").innerHTML=""; document.getElementById("pager").innerHTML=""; return; }
  currentPath=path;
  setActive(path);
  // tint the page to its section accent (soft tint is translucent → theme-proof)
  const root=document.documentElement.style;
  if(pg.accent){ root.setProperty("--sec-accent", pg.accent); root.setProperty("--sec-accent-soft", hexToRgba(pg.accent, 0.16)); }
  else { root.removeProperty("--sec-accent"); root.removeProperty("--sec-accent-soft"); }
  content.innerHTML=pg.html;
  renderPageTools(pg);
  if(pg.quiz) initFlashcards(pg);
  renderPager(path);
  mountWidgets();
  markVisited(path);
  window.scrollTo(0,0);
  closeSidebar();
}

/* ---------- Precision vs Recall interactive widget (metrics page) ---------- */
function initPRWidget(){
  const host=document.getElementById("pr-widget");
  if(!host) return;

  // Deterministic pseudo-random data so the picture is stable across reloads.
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  const rnd=mulberry32(1234567);
  function gauss(m,s){ let u=0,v=0; while(!u)u=rnd(); while(!v)v=rnd(); return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));

  const N=260, posRate=0.38;
  const pts=[];
  for(let k=0;k<N;k++){
    const pos=rnd()<posRate;
    const score=clamp(pos?gauss(0.66,0.17):gauss(0.34,0.17),0.01,0.99);
    pts.push({pos, score, jitter:rnd()});
  }

  // Geometry
  const W=660,H=300,padL=48,padR=18,padT=18,padB=46;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xOf=s=>padL+s*plotW;
  const yOf=j=>padT+8+j*(plotH-16);

  const dots=pts.map(p=>{
    const cx=xOf(p.score).toFixed(1), cy=yOf(p.jitter).toFixed(1);
    const cls=p.pos?"prw-pos":"prw-neg";
    return '<circle class="prw-dot '+cls+'" cx="'+cx+'" cy="'+cy+'" r="4.2"/>';
  }).join("");

  // Precision/recall curve across all thresholds (for the mini chart)
  const P=pts.filter(p=>p.pos).length, Ntot=pts.length;
  const curve=[];
  for(let t=0;t<=1.0001;t+=0.02){
    let tp=0,fp=0;
    for(const p of pts){ if(p.score>=t){ p.pos?tp++:fp++; } }
    const prec=(tp+fp)?tp/(tp+fp):1;
    const rec=P?tp/P:0;
    curve.push({t, prec, rec});
  }
  const cW=210,cH=190,cPad=34;
  const rx=r=>cPad+r*(cW-cPad-10);
  const ry=p=>10+(1-p)*(cH-cPad-10);
  const curvePath=curve.map((c,k)=>(k?'L':'M')+rx(c.rec).toFixed(1)+' '+ry(c.prec).toFixed(1)).join(' ');

  host.innerHTML=
  '<div class="prw-wrap">'+
    '<div class="prw-main">'+
      '<svg class="prw-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
        '<rect id="prw-shade" x="0" y="'+padT+'" width="0" height="'+plotH+'" class="prw-shade"/>'+
        '<line x1="'+padL+'" y1="'+(padT+plotH)+'" x2="'+(W-padR)+'" y2="'+(padT+plotH)+'" class="prw-axis"/>'+
        '<g class="prw-ticks">'+
          [0,0.25,0.5,0.75,1].map(v=>'<text x="'+xOf(v).toFixed(0)+'" y="'+(padT+plotH+20)+'" text-anchor="middle">'+v+'</text>').join('')+
        '</g>'+
        '<text x="'+(padL+plotW/2)+'" y="'+(H-6)+'" text-anchor="middle" class="prw-axlbl">model score →</text>'+
        dots+
        '<line id="prw-line" x1="0" y1="'+padT+'" x2="0" y2="'+(padT+plotH)+'" class="prw-thline"/>'+
        '<text id="prw-lbl" x="0" y="'+(padT-4)+'" text-anchor="middle" class="prw-thlbl">0.50</text>'+
      '</svg>'+
      '<div class="prw-controls">'+
        '<label class="prw-slabel">Threshold <b id="prw-tval">0.50</b></label>'+

    prdot.setAttribute("cx",rx(rec)); prdot.setAttribute("cy",ry(prec));
  }
  slider.addEventListener("input", ()=>update(parseFloat(slider.value)));
  update(0.5);
}

/* ============ Bias–Variance / model-complexity explorer =============== */
// Fit polynomials of increasing degree to fixed noisy data; show the curve
// plus train vs test error → the classic U-shaped bias/variance tradeoff.
function initBiasVarianceWidget(){
  const host=document.getElementById("bv-widget"); if(!host) return;
  const rnd=(function(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};})(42);
  const gauss=(m,s)=>{let u=0,v=0;while(!u)u=rnd();while(!v)v=rnd();return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  const truef=x=>Math.sin(x*Math.PI*1.15)*0.72;         // ground-truth signal
  // fixed dataset: train + held-out test
  const mk=n=>{const a=[];for(let k=0;k<n;k++){const x=rnd()*2-1;a.push({x,y:truef(x)+gauss(0,0.16)});}return a;};
  const train=mk(16), test=mk(40);
  // least-squares polynomial fit (normal equations, small degree)
  function fit(pts,deg){
    const X=pts.map(p=>{const r=[];for(let j=0;j<=deg;j++)r.push(Math.pow(p.x,j));return r;});
    const y=pts.map(p=>p.y), n=deg+1;
    const A=Array.from({length:n},()=>new Array(n).fill(0)), b=new Array(n).fill(0);
    for(let i=0;i<X.length;i++)for(let a=0;a<n;a++){b[a]+=X[i][a]*y[i];for(let c=0;c<n;c++)A[a][c]+=X[i][a]*X[i][c];}
    for(let a=0;a<n;a++)A[a][a]+=1e-6;                    // ridge for stability
    // Gaussian elimination
    for(let c=0;c<n;c++){let piv=c;for(let r=c+1;r<n;r++)if(Math.abs(A[r][c])>Math.abs(A[piv][c]))piv=r;
      [A[c],A[piv]]=[A[piv],A[c]];[b[c],b[piv]]=[b[piv],b[c]];
      for(let r=0;r<n;r++){if(r===c)continue;const f=A[r][c]/A[c][c];for(let k=c;k<n;k++)A[r][k]-=f*A[c][k];b[r]-=f*b[c];}}
    return b.map((v,i)=>v/A[i][i]);
  }
  const evalp=(w,x)=>w.reduce((s,c,j)=>s+c*Math.pow(x,j),0);
  const mse=(w,pts)=>pts.reduce((s,p)=>s+Math.pow(evalp(w,p.x)-p.y,2),0)/pts.length;
  const W=440,H=250,pad=26;
  const xs=x=>pad+((x+1)/2)*(W-2*pad), ys=y=>H/2 - y*(H/2-pad);
  host.innerHTML=
    '<div class="bv-wrap"><svg class="bv-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
      '<line x1="'+pad+'" y1="'+(H/2)+'" x2="'+(W-pad)+'" y2="'+(H/2)+'" class="prw-axis"/>'+
      '<path id="bv-true" class="bv-true"/><path id="bv-fit" class="bv-fit"/>'+
      '<g id="bv-train"></g>'+
    '</svg>'+
    '<div class="bv-controls">'+
      '<label class="prw-slabel">Model complexity — polynomial degree <b id="bv-dval">3</b></label>'+
      '<input id="bv-slider" type="range" min="1" max="12" step="1" value="3">'+
      '<div class="bv-legend"><span><i class="bv-lg-true"></i> true signal</span>'+
        '<span><i class="bv-lg-fit"></i> fitted model</span><span><i class="bv-lg-pt"></i> training data</span></div>'+
      '<div class="bv-metrics">'+
        '<div class="bv-m"><span class="bv-mlab">Train error</span><b id="bv-tr">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Test error</span><b id="bv-te">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Diagnosis</span><b id="bv-diag" class="bv-diag">—</b></div>'+
      '</div></div></div>';
  const trainDots=train.map(p=>'<circle cx="'+xs(p.x).toFixed(1)+'" cy="'+ys(p.y).toFixed(1)+'" r="3.6" class="bv-pt"/>').join("");
  host.querySelector("#bv-train").innerHTML=trainDots;
  let td=""; for(let x=-1;x<=1.0001;x+=0.02) td+=(td?"L":"M")+xs(x).toFixed(1)+" "+ys(truef(x)).toFixed(1)+" ";
  host.querySelector("#bv-true").setAttribute("d",td);
  function draw(deg){
    const w=fit(train,deg);
    let d=""; for(let x=-1;x<=1.0001;x+=0.01){const yv=Math.max(-1.3,Math.min(1.3,evalp(w,x)));d+=(d?"L":"M")+xs(x).toFixed(1)+" "+ys(yv).toFixed(1)+" ";}
    host.querySelector("#bv-fit").setAttribute("d",d);
    const tr=mse(w,train), te=mse(w,test);
    host.querySelector("#bv-dval").textContent=deg;
    host.querySelector("#bv-tr").textContent=tr.toFixed(3);
    host.querySelector("#bv-te").textContent=te.toFixed(3);
    const diag=host.querySelector("#bv-diag");
    let msg,cls; if(deg<=2 && tr>0.05){msg="Underfit (high bias)";cls="bv-bad";}
      else if(te>tr*2.2 && te>0.045){msg="Overfit (high variance)";cls="bv-bad";}
      else {msg="Good fit ✓";cls="bv-good";}
    diag.textContent=msg; diag.className="bv-diag "+cls;
  }
  host.querySelector("#bv-slider").addEventListener("input",e=>draw(+e.target.value));
  draw(3);
}

      '<div class="qz-cell"><span>dequantized</span><b id="qz-dq">—</b></div>'+
      '<div class="qz-cell qz-err"><span>quant error</span><b id="qz-e">—</b></div>'+
    '</div>'+
    '<svg class="qz-bar" viewBox="0 0 440 64" preserveAspectRatio="xMidYMid meet">'+
      '<line x1="20" y1="40" x2="420" y2="40" class="prw-axis"/>'+
      '<g id="qz-ticks"></g>'+
      '<circle id="qz-true" cy="40" r="5" class="qz-true"/>'+
      '<circle id="qz-quant" cy="40" r="5" class="qz-quantdot"/>'+
      '<text x="20" y="60" id="qz-lmin" class="prw-axlbl">-6</text>'+
      '<text x="420" y="60" id="qz-lmax" text-anchor="end" class="prw-axlbl">6</text>'+
    '</svg></div>';

    let lo=parseFloat(el("qz-min").value), hi=parseFloat(el("qz-max").value);
    if(!(hi>lo)){ hi=lo+1; }
    const x=parseFloat(el("qz-x").value);
    let scale, zp;
    if(scheme==="sym"){ const a=Math.max(Math.abs(lo),Math.abs(hi)); scale=a/127; zp=0; }
    else { scale=(hi-lo)/(QMAX-QMIN); zp=Math.round(QMIN - lo/scale); }
    const q=Math.max(QMIN,Math.min(QMAX, Math.round(x/scale)+zp));
    const dq=(q-zp)*scale;
    el("qz-scale").textContent=scale.toFixed(4);
    el("qz-zp").textContent=zp;
    el("qz-q").textContent=q;
    el("qz-dq").textContent=dq.toFixed(3);
    el("qz-e").textContent=(dq-x>=0?"+":"")+(dq-x).toFixed(3);
    el("qz-xval").textContent=x.toFixed(2);
    // slider bounds follow the range
    const sl=el("qz-x"); sl.min=lo; sl.max=hi;
    el("qz-lmin").textContent=lo; el("qz-lmax").textContent=hi;
    const px=v=>20+((v-lo)/(hi-lo))*400;
    el("qz-true").setAttribute("cx",px(x).toFixed(1));
    el("qz-quant").setAttribute("cx",px(dq).toFixed(1));
    // draw a few quantization grid ticks (every ~16 codes)
    let ticks=""; for(let c=QMIN;c<=QMAX;c+=16){ const v=(c-zp)*scale; if(v<lo||v>hi)continue;
      ticks+='<line x1="'+px(v).toFixed(1)+'" y1="34" x2="'+px(v).toFixed(1)+'" y2="46" class="qz-tick"/>'; }
    el("qz-ticks").innerHTML=ticks;
  }
  host.querySelectorAll(".qz-seg").forEach(b=>b.onclick=()=>{
    scheme=b.dataset.s; host.querySelectorAll(".qz-seg").forEach(x=>x.classList.toggle("sel",x===b)); compute();
  });
  ["qz-min","qz-max","qz-x"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

// Simple queuing-style model: latency = fixed overhead + per-item compute that
// improves with batching (better GPU utilization), throughput = batch/latency.
function initBatchWidget(){
  const host=document.getElementById("batch-widget"); if(!host) return;
  host.innerHTML=
    '<div class="bt-wrap"><div class="bt-controls">'+
      '<label class="prw-slabel">Batch size <b id="bt-bval">8</b></label>'+
      '<input id="bt-b" type="range" min="1" max="128" step="1" value="8">'+
      '<div class="bt-sliders">'+
        '<label>Fixed overhead <b id="bt-oval">4</b> ms<input id="bt-o" type="range" min="0" max="20" step="0.5" value="4"></label>'+
        '<label>Compute / item at batch=1 <b id="bt-cval">6</b> ms<input id="bt-c" type="range" min="0.5" max="20" step="0.5" value="6"></label>'+
        '<label>Batch efficiency <b id="bt-eval">0.6</b><input id="bt-e" type="range" min="0" max="0.95" step="0.05" value="0.6"></label>'+
      '</div>'+
      '<div class="bv-metrics">'+
        '<div class="bv-m"><span class="bv-mlab">Latency / batch</span><b id="bt-lat">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Throughput</span><b id="bt-thr">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Per-item latency</span><b id="bt-pil">—</b></div>'+
      '</div></div>'+
      '<svg class="bt-svg" viewBox="0 0 300 220" preserveAspectRatio="xMidYMid meet">'+
        '<line x1="34" y1="190" x2="290" y2="190" class="prw-axis"/>'+
        '<line x1="34" y1="14" x2="34" y2="190" class="prw-axis"/>'+
        '<path id="bt-thrline" class="bt-thrline"/><path id="bt-latline" class="bt-latline"/>'+
        '<circle id="bt-dot" r="4.5" class="bt-dot"/>'+
        '<text x="162" y="212" text-anchor="middle" class="prw-axlbl">batch size →</text>'+
        '<text x="12" y="100" transform="rotate(-90 12 100)" text-anchor="middle" class="prw-axlbl">throughput</text>'+
      '</svg></div>';
  const el=id=>host.querySelector("#"+id);
  const W=300,H=220,pL=34,pR=10,pT=14,pB=30;
  // latency(b) = overhead + compute*b*(1 - eff*(1 - 1/b))  ; throughput = b/latency
  function lat(b,o,c,e){ return o + c*b*(1 - e*(1 - 1/b)); }
  function compute(){
    const b=+el("bt-b").value, o=+el("bt-o").value, c=+el("bt-c").value, e=+el("bt-e").value;
    el("bt-bval").textContent=b; el("bt-oval").textContent=o; el("bt-cval").textContent=c; el("bt-eval").textContent=e.toFixed(2);
    const L=lat(b,o,c,e), thr=b/L*1000, pil=L/b;
    el("bt-lat").textContent=L.toFixed(1)+" ms";
    el("bt-thr").textContent=thr.toFixed(0)+" it/s";
    el("bt-pil").textContent=pil.toFixed(2)+" ms";
    // plot throughput vs batch across full range, normalized
    const bs=[]; for(let x=1;x<=128;x++) bs.push({b:x, thr:x/lat(x,o,c,e)*1000, lat:lat(x,o,c,e)});
    const maxThr=Math.max(...bs.map(p=>p.thr)), maxLat=Math.max(...bs.map(p=>p.lat));
    const xOf=x=>pL+((x-1)/127)*(W-pL-pR);
    const yThr=v=>H-pB-(v/maxThr)*(H-pT-pB);
    const yLat=v=>H-pB-(v/maxLat)*(H-pT-pB);
    el("bt-thrline").setAttribute("d",bs.map((p,i)=>(i?"L":"M")+xOf(p.b).toFixed(1)+" "+yThr(p.thr).toFixed(1)).join(" "));
    el("bt-latline").setAttribute("d",bs.map((p,i)=>(i?"L":"M")+xOf(p.b).toFixed(1)+" "+yLat(p.lat).toFixed(1)).join(" "));
    el("bt-dot").setAttribute("cx",xOf(b)); el("bt-dot").setAttribute("cy",yThr(thr));
  }
  ["bt-b","bt-o","bt-c","bt-e"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

// Estimate serving memory: weight bytes at a chosen precision, plus the KV

function initLLMMemWidget(){

  host.innerHTML=
    '<div class="lm-wrap"><div class="bt-controls">'+
      '<div class="bt-sliders">'+

        '<label>Context length <b id="lm-sval">4096</b> tok<input id="lm-s" type="range" min="512" max="131072" step="512" value="4096"></label>'+
        '<label>Batch (concurrent seqs) <b id="lm-bval">1</b><input id="lm-b" type="range" min="1" max="64" step="1" value="1"></label>'+
      '</div>'+
      '<div class="lm-row"><label>Weight precision</label><span>'+
        '<button class="qz-seg" data-b="4">INT4</button>'+

        '<button class="qz-seg" data-b="32">FP32</button></span></div>'+
    '</div>'+
    '<div class="lm-out">'+
      '<div class="qz-cell"><span>weights</span><b id="lm-w">—</b></div>'+
      '<div class="qz-cell"><span>KV cache</span><b id="lm-kv">—</b></div>'+
      '<div class="qz-cell qz-err"><span>total VRAM</span><b id="lm-tot">—</b></div>'+
    '</div>'+
    '<div class="lm-stack"><div class="lm-seg lm-seg-w" id="lm-bw"><span>weights</span></div>'+
      '<div class="lm-seg lm-seg-kv" id="lm-bkv"><span>KV</span></div></div>'+
    '<div class="lm-note" id="lm-note"></div></div>';
  let wbits=16;
  const el=id=>host.querySelector("#"+id);
  const GB=v=>v>=1?v.toFixed(1)+" GB":(v*1024).toFixed(0)+" MB";
  function compute(){
    const P=+el("lm-p").value*1e9, hid=+el("lm-h").value, L=+el("lm-l").value,
          S=+el("lm-s").value, B=+el("lm-b").value;

    el("lm-lval").textContent=L; el("lm-sval").textContent=S.toLocaleString(); el("lm-bval").textContent=B;
    const wBytes=P*(wbits/8);
    // KV cache: 2 (K&V) × layers × seq × batch × hidden × 2 bytes (fp16 cache)
    const kvBytes=2*L*S*B*hid*2;
    const wg=wBytes/1e9, kv=kvBytes/1e9, tot=wg+kv;
    el("lm-w").textContent=GB(wg); el("lm-kv").textContent=GB(kv); el("lm-tot").textContent=GB(tot);
    const wp=tot?Math.round(wg/tot*100):0;
    el("lm-bw").style.width=wp+"%"; el("lm-bkv").style.width=(100-wp)+"%";
    let note; const cards=Math.ceil(tot/80);
    note = "≈ "+cards+" × 80 GB GPU"+(cards>1?"s":"")+" just to hold this in memory. "+
      (kv>wg? "KV cache now dominates — long context / big batch is the bottleneck." :
              "Weights dominate — quantizing them is the biggest win.");
    el("lm-note").textContent=note;
  }
  host.querySelectorAll(".qz-seg").forEach(b=>b.onclick=()=>{
    wbits=+b.dataset.b; host.querySelectorAll(".qz-seg").forEach(x=>x.classList.toggle("sel",x===b)); compute();
  });
  ["lm-p","lm-h","lm-l","lm-s","lm-b"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

 metric learning with triplets; ArcFace-family methods train with a classification head and an explicit angular margin. In either case, sampling and label quality often matter as much as the loss formula.<\/div><\/div>\n<h2 id=\"three-loss-families\">Three loss families<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Method<\/th><th>Mechanism<\/th><th>Practical concern<\/th><\/tr><\/thead><tbody><tr><td>Contrastive<\/td><td>pull genuine pairs together, push impostor pairs apart<\/td><td>pair count explodes; many pairs are trivial<\/td><\/tr><tr><td>Triplet / FaceNet<\/td><td>anchor-positive closer than anchor-negative by margin<\/td><td>mining controls convergence and stability<\/td><\/tr><tr><td>Angular-margin softmax<\/td><td>classify identities on a normalized hypersphere with margin<\/td><td>large class count and noisy identity labels<\/td><\/tr><\/tbody><\/table><\/div>\n<p>For normalized embedding <code>x<\/code> and class weight <code>W<\/code>, cosine similarity is their dot product. ArcFace adds a margin to the target angle before softmax. This directly encourages compact intra-class clusters and separated inter-class centers in the same geometry used at inference.<\/p>\n<h2 id=\"arcface-cosface-and-quality-aware-variants\">ArcFace, CosFace and quality-aware variants<\/h2>\n<ul><li><strong>CosFace:<\/strong> subtracts an additive cosine margin.<\/li><li><strong>ArcFace:<\/strong> adds an angular margin with a clear geometric interpretation.<\/li><li><strong>MagFace:<\/strong> relates feature magnitude to sample quality while maintaining identity<\/li><\/ul>\n<p>discrimination.<\/p>\n<ul><li><strong>AdaFace:<\/strong> adapts the margin using a quality proxy, helping with low-quality faces.<\/li><\/ul>\n<p>Do not select from paper accuracy alone. Reproduce on your capture distribution and measure low-FMR performance, fairness, latency and calibration.<\/p>\n<h2 id=\"hard-negatives\">Hard negatives<\/h2>\n<p>Random impostor pairs quickly become too easy. Useful mining finds lookalikes or close embeddings, but the hardest examples can be mislabeled identities, duplicates or synthetic artifacts.<\/p>\n<p>A safe loop:<\/p>\n<ol><li>train a baseline;<\/li><li>embed a governed candidate pool;<\/li><li>retrieve near neighbors;<\/li><li>audit duplicates and label conflicts;<\/li><li>upweight confirmed hard cases;<\/li><li>monitor subgroup composition and instability.<\/li><\/ol>\n<h2 id=\"identity-leakage\">Identity leakage<\/h2>\n<p>Split by <strong>person<\/strong>, never by image. If images of the same person appear in train and test, the benchmark measures memorization rather than generalization to unseen identities. Near-duplicate and cross-source identity resolution must happen before the final split.<\/p>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>“I would start with a normalized encoder and ArcFace-style objective, but the decisive work is identity-clean data, subject-disjoint evaluation and audited hard-negative mining. A clever loss cannot repair duplicate identities or leaked subjects.”<\/p><\/blockquote>\n<p>Primary references: <a href=\"https://arxiv.org/abs/1503.03832\" target=\"_blank\" rel=\"noopener\">FaceNet<\/a>, <a href=\"https://arxiv.org/abs/1801.07698\" target=\"_blank\" rel=\"noopener\">ArcFace<\/a>, <a href=\"https://arxiv.org/abs/2103.06627\" target=\"_blank\" rel=\"noopener\">MagFace<\/a>, <a href=\"https://arxiv.org/abs/2204.00964\" target=\"_blank\" rel=\"noopener\">AdaFace<\/a>.<\/p>","toc":[{"level":2,"id":"three-loss-families","text":"Three loss families"},{"level":2,"id":"arcface-cosface-and-quality-aware-variants","text":"ArcFace, CosFace and quality-aware variants"},{"level":2,"id":"hard-negatives","text":"Hard negatives"},{"level":2,"id":"identity-leakage","text":"Identity leakage"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"embeddings, angular margins & hard negatives 💡 tl;dr facenet popularized metric learning with triplets; arcface-family methods train with a classification head and an explicit angular margin. in either case, sampling and label quality often matter as much as the loss formula. three loss families method mechanism practical concern contrastive pull genuine pairs together, push impostor pairs apart pair count explodes; many pairs are trivial triplet / facenet anchor-positive closer than anchor-negative by margin mining controls convergence and stability angular-margin softmax classify identities on a normalized hypersphere with margin large class count and noisy identity labels for normalized embedding x and class weight w , cosine similarity is their dot product. arcface adds a margin to the target angle before softmax. this directly encourages compact intra-class clusters and separated inter-class centers in the same geometry used at inference. arcface, cosface and quality-aware variants cosface: subtracts an additive cosine margin. arcface: adds an angular margin with a clear geometric interpretation. magface: relates feature magnitude to sample quality while maintaining identity discrimination. adaface: adapts the margin using a quality proxy, helping with low-quality faces. do not select from paper accuracy alone. reproduce on your capture distribution and measure low-fmr performance, fairness, latency and calibration. hard negatives random impostor pairs quickly become too easy. useful mining finds lookalikes or close embeddings, but the hardest examples can be mislabeled identities, duplicates or synthetic artifacts. a safe loop: train a baseline; embed a governed candidate pool; retrieve near neighbors; audit duplicates and label conflicts; upweight confirmed hard cases; monitor subgroup composition and instability. identity leakage split by person , never by image. if images of the same person appear in train and test, the benchmark measures memorization rather than generalization to unseen identities. near-duplicate and cross-source identity resolution must happen before the final split. interview soundbite “i would start with a normalized encoder and arcface-style objective, but the decisive work is identity-clean data, subject-disjoint evaluation and audited hard-negative mining. a clever loss cannot repair duplicate identities or leaked subjects.” primary references: facenet , arcface , magface , adaface .","words":343},{"path":"02-face-recognition/verification-identification.md","title":"Verification vs Identification","section":"2 · Face Recognition","quiz":false,"accent":"#7c3aed","html":"<h1 id=\"verification-identification-template-management\">Verification, Identification &amp; Template Management<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Verification compares one claimed pair; identification searches a gallery. The same encoder can support both, but their metrics, failure probabilities and serving architectures are different.<\/div><\/div>\n<h2 id=\"11-verification\">1:1 verification<\/h2>\n<p>Given normalized templates <code>x<\/code> and <code>y<\/code>, compute cosine similarity <code>s = x·y<\/code>. Accept when <code>s ≥ threshold<\/code>. The threshold is chosen on representative development data to meet a business/security operating point, then frozen before final evaluation.<\/p>\n<p>Possible pair types in selfie-to-ID:<\/p>\n<ul><li>selfie versus portrait extracted from an ID;<\/li><li>new selfie versus enrolled selfie/template;<\/li><li>multiple recent templates combined by score fusion or quality-weighted aggregation.<\/li><\/ul>\n<p>Document portraits introduce print, scan, crop, age and document-design variation. A benchmark made only of two high-quality selfies will overstate production performance.<\/p>\n<h2 id=\"1n-identification\">1:N identification<\/h2>\n<p>Search a query embedding against a gallery, retrieve top-k candidates, then apply a decision threshold. Open-set search has two questions:<\/p>\n<ol><li>Did retrieval return the true identity when present?<\/li><li>Did the decision reject people who were not enrolled?<\/li><\/ol>\n<p>As the gallery grows, each query gets more impostor comparisons, increasing the chance that at least one impostor obtains a high score. Revalidate thresholds at realistic gallery sizes; do not transfer a 1:1 FMR directly to 1:N risk.<\/p>\n<h2 id=\"template-lifecycle\">Template lifecycle<\/h2>\n<p>Templates are sensitive derived biometric data. Treat them as versioned records:<\/p>\n<ul><li>subject/consent and purpose reference;<\/li><li>encoder and preprocessing version;<\/li><li>quality and capture metadata;<\/li><li>encryption/key version;<\/li><li>enrollment/update timestamp;<\/li><li>retention/deletion status.<\/li><\/ul>\n<p>An encoder upgrade changes the vector space. Options are re-enrollment, background re-embedding from lawfully retained source captures, or dual-read migration while both versions run. Never silently compare embeddings from incompatible models.<\/p>\n<h2 id=\"adaptive-enrollment\">Adaptive enrollment<\/h2>\n<p>Adding every successful authentication template can improve cross-time coverage but also risks <strong>template poisoning<\/strong>. Require high-confidence match plus liveness, cap template count, preserve lineage, detect sudden drift and make updates reversible.<\/p>\n<h2 id=\"interview-comparison\">Interview comparison<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Question<\/th><th>Verification<\/th><th>Identification<\/th><\/tr><\/thead><tbody><tr><td>Candidate count<\/td><td>one claim<\/td><td>gallery of N<\/td><\/tr><tr><td>Main errors<\/td><td>FMR / FNMR<\/td><td>FPIR / FNIR, rank-k<\/td><\/tr><tr><td>Serving primitive<\/td><td>pair score<\/td><td>ANN retrieval + rerank<\/td><\/tr><tr><td>Scale risk<\/td><td>transaction volume<\/td><td>transaction volume × gallery size<\/td><\/tr><tr><td>Threshold<\/td><td>one comparison distribution<\/td><td>depends on gallery and search protocol<\/td><\/tr><\/tbody><\/table><\/div>","toc":[{"level":2,"id":"11-verification","text":"1:1 verification"},{"level":2,"id":"1n-identification","text":"1:N identification"},{"level":2,"id":"template-lifecycle","text":"Template lifecycle"},{"level":2,"id":"adaptive-enrollment","text":"Adaptive enrollment"},{"level":2,"id":"interview-comparison","text":"Interview comparison"}],"text":"verification, identification & template management 💡 tl;dr verification compares one claimed pair; identification searches a gallery. the same encoder can support both, but their metrics, failure probabilities and serving architectures are different. 1:1 verification given normalized templates x and y , compute cosine similarity s = x·y . accept when s ≥ threshold . the threshold is chosen on representative development data to meet a business/security operating point, then frozen before final evaluation. possible pair types in selfie-to-id: selfie versus portrait extracted from an id; new selfie versus enrolled selfie/template; multiple recent templates combined by score fusion or quality-weighted aggregation. document portraits introduce print, scan, crop, age and document-design variation. a benchmark made only of two high-quality selfies will overstate production performance. 1:n identification search a query embedding against a gallery, retrieve top-k candidates, then apply a decision threshold. open-set search has two questions: did retrieval return the true identity when present? did the decision reject people who were not enrolled? as the gallery grows, each query gets more impostor comparisons, increasing the chance that at least one impostor obtains a high score. revalidate thresholds at realistic gallery sizes; do not transfer a 1:1 fmr directly to 1:n risk. template lifecycle templates are sensitive derived biometric data. treat them as versioned records: subject/consent and purpose reference; encoder and preprocessing version; quality and capture metadata; encryption/key version; enrollment/update timestamp; retention/deletion status. an encoder upgrade changes the vector space. options are re-enrollment, background re-embedding from lawfully retained source captures, or dual-read migration while both versions run. never silently compare embeddings from incompatible models. adaptive enrollment adding every successful authentication template can improve cross-time coverage but also risks template poisoning . require high-confidence match plus liveness, cap template count, preserve lineage, detect sudden drift and make updates reversible. interview comparison question verification identification candidate count one claim gallery of n main errors fmr / fnmr fpir / fnir, rank-k serving primitive pair score ann retrieval + rerank scale risk transaction volume transaction volume × gallery size threshold one comparison distribution depends on gallery and search protocol","words":343},{"path":"03-biometric-evaluation/README.md","title":"Overview","section":"3 · Biometric Evaluation","quiz":false,"accent":"#d97706","html":"<h1 id=\"3-biometric-evaluation\">3 · Biometric Evaluation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A biometric model is not “98% accurate.” It has score distributions and threshold-dependent error rates under a declared protocol. Always name the task, population, operating conditions and operating point.<\/div><\/div>\n<h2 id=\"genuine-and-impostor-trials\">Genuine and impostor trials<\/h2>\n<ul><li>A <strong>genuine<\/strong> trial compares two samples of the same identity.<\/li><li>An <strong>impostor<\/strong> trial compares samples from different identities.<\/li><li>The matcher produces a similarity score; a threshold turns the score into accept/reject.<\/li><\/ul>\n<p>The benchmark protocol determines which pairs exist. Use subject-disjoint partitions and make pairs resemble the product: selfie-to-ID, cross-device authentication, cross-age comparison, or open-set gallery search.<\/p>\n<h2 id=\"evaluation-layers\">Evaluation layers<\/h2>\n<ol><li><strong>Acquisition:<\/strong> could the system capture a usable face?<\/li><li><strong>PAD/liveness:<\/strong> did it distinguish bona fide presentation from attack?<\/li><li><strong>Matching:<\/strong> did the face comparison make the correct decision?<\/li><li><strong>Journey:<\/strong> did the combined policy approve good users, stop attacks and preserve<\/li><\/ol>\n<p>conversion under latency and fairness constraints?<\/p>\n<p>Report each layer plus end-to-end performance. Conditional matcher metrics alone hide people rejected upstream.<\/p>\n<h2 id=\"required-claims\">Required claims<\/h2>\n<p>A defensible result states:<\/p>\n<ul><li>dataset/source and collection purpose;<\/li><li>number of identities and trials;<\/li><li>subject-disjoint split and duplicate controls;<\/li><li>capture conditions and demographic coverage;<\/li><li>threshold-selection dataset;<\/li><li>metric with confidence interval;<\/li><li>model, preprocessing and index version.<\/li><\/ul>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"metrics-thresholds.md\" href=\"#\">FMR, FNMR, TAR@FAR &amp; Thresholds<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"genuine-and-impostor-trials","text":"Genuine and impostor trials"},{"level":2,"id":"evaluation-layers","text":"Evaluation layers"},{"level":2,"id":"required-claims","text":"Required claims"}],"text":"3 · biometric evaluation 💡 tl;dr a biometric model is not “98% accurate.” it has score distributions and threshold-dependent error rates under a declared protocol. always name the task, population, operating conditions and operating point. genuine and impostor trials a genuine trial compares two samples of the same identity. an impostor trial compares samples from different identities. the matcher produces a similarity score; a threshold turns the score into accept/reject. the benchmark protocol determines which pairs exist. use subject-disjoint partitions and make pairs resemble the product: selfie-to-id, cross-device authentication, cross-age comparison, or open-set gallery search. evaluation layers acquisition: could the system capture a usable face? pad/liveness: did it distinguish bona fide presentation from attack? matching: did the face comparison make the correct decision? journey: did the combined policy approve good users, stop attacks and preserve conversion under latency and fairness constraints? report each layer plus end-to-end performance. conditional matcher metrics alone hide people rejected upstream. required claims a defensible result states: dataset/source and collection purpose; number of identities and trials; subject-disjoint split and duplicate controls; capture conditions and demographic coverage; threshold-selection dataset; metric with confidence interval; model, preprocessing and index version. → next: fmr, fnmr, tar@far & thresholds .","words":199},{"path":"03-biometric-evaluation/metrics-thresholds.md","title":"FMR, FNMR, TAR@FAR & Thresholds","section":"3 · Biometric Evaluation","quiz":false,"accent":"#d97706","html":"<h1 id=\"fmr-fnmr-tarfar-eer-thresholds\">FMR, FNMR, TAR@FAR, EER &amp; Thresholds<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Lowering the threshold accepts more genuine users but also more impostors. Security products therefore report genuine acceptance at a fixed, suitably low false match rate rather than choosing the most flattering aggregate metric.<\/div><\/div>\n<h2 id=\"core-definitions\">Core definitions<\/h2>\n<p>At threshold <code>t<\/code> for a similarity matcher:<\/p>\n<ul><li><strong>FMR<\/strong> (false match rate): fraction of impostor trials with score ≥ <code>t<\/code>.<\/li><li><strong>FNMR<\/strong> (false non-match rate): fraction of genuine trials with score &lt; <code>t<\/code>.<\/li><li><strong>TAR/GAR<\/strong>: true/genuine accept rate = <code>1 − FNMR<\/code>.<\/li><li><strong>FRR/FAR:<\/strong> often used informally, but standards distinguish transaction/system<\/li><\/ul>\n<p>failures from matcher-only FNMR/FMR. Define terminology explicitly.<\/p>\n<ul><li><strong>EER:<\/strong> point where FMR equals FNMR. Useful as a compact comparison, rarely the<\/li><\/ul>\n<p>production operating point.<\/p>\n<p>If the security requirement is FMR ≤ <code>10⁻⁵<\/code>, report <strong>TAR at FMR = 10⁻⁵<\/strong>. A model with better EER can still be worse in that extreme tail.<\/p>\n<h2 id=\"roc-and-det-curves\">ROC and DET curves<\/h2>\n<p>ROC plots TAR against FMR. Because relevant FMR values span orders of magnitude, use a log x-axis. A DET curve plots the two error rates on transformed axes and makes certain tail differences easier to compare.<\/p>\n<p>Do not choose a threshold on the final test set:<\/p>\n<ol><li>train on training identities;<\/li><li>tune model/hyperparameters on validation identities;<\/li><li>select threshold on a development/calibration set;<\/li><li>freeze everything;<\/li><li>report once on held-out identities and conditions.<\/li><\/ol>\n<h2 id=\"statistical-precision-in-the-tail\">Statistical precision in the tail<\/h2>\n<p>To estimate very low FMR, you need many <strong>independent and representative<\/strong> impostor trials. A million correlated pairs made by repeatedly using the same few people does not provide a million independent observations.<\/p>\n<p>For zero observed false matches in <code>n<\/code> trials, the rate is not proven to be zero. A rough 95% upper bound is approximately <code>3/n<\/code>. Report confidence bounds and effective sampling structure, especially per subgroup.<\/p>\n<h2 id=\"business-operating-point\">Business operating point<\/h2>\n<p>Threshold selection balances:<\/p>\n<ul><li>fraud loss and account takeover risk;<\/li><li>manual-review capacity;<\/li><li>user abandonment and accessibility;<\/li><li>regulatory/security assurance;<\/li><li>retry and fallback behavior.<\/li><\/ul>\n<blockquote><p>“I choose the threshold from a target risk point on a representative development set, freeze it, and report TAR/FNMR with confidence intervals on held-out data. EER is a model summary, not the production policy.”<\/p><\/blockquote>","toc":[{"level":2,"id":"core-definitions","text":"Core definitions"},{"level":2,"id":"roc-and-det-curves","text":"ROC and DET curves"},{"level":2,"id":"statistical-precision-in-the-tail","text":"Statistical precision in the tail"},{"level":2,"id":"business-operating-point","text":"Business operating point"}],"text":"fmr, fnmr, tar@far, eer & thresholds 💡 tl;dr lowering the threshold accepts more genuine users but also more impostors. security products therefore report genuine acceptance at a fixed, suitably low false match rate rather than choosing the most flattering aggregate metric. core definitions at threshold t for a similarity matcher: fmr (false match rate): fraction of impostor trials with score ≥ t . fnmr (false non-match rate): fraction of genuine trials with score < t . tar/gar : true/genuine accept rate = 1 − fnmr . frr/far: often used informally, but standards distinguish transaction/system failures from matcher-only fnmr/fmr. define terminology explicitly. eer: point where fmr equals fnmr. useful as a compact comparison, rarely the production operating point. if the security requirement is fmr ≤ 10⁻⁵ , report tar at fmr = 10⁻⁵ . a model with better eer can still be worse in that extreme tail. roc and det curves roc plots tar against fmr. because relevant fmr values span orders of magnitude, use a log x-axis. a det curve plots the two error rates on transformed axes and makes certain tail differences easier to compare. do not choose a threshold on the final test set: train on training identities; tune model/hyperparameters on validation identities; select threshold on a development/calibration set; freeze everything; report once on held-out identities and conditions. statistical precision in the tail to estimate very low fmr, you need many independent and representative impostor trials. a million correlated pairs made by repeatedly using the same few people does not provide a million independent observations. for zero observed false matches in n trials, the rate is not proven to be zero. a rough 95% upper bound is approximately 3/n . report confidence bounds and effective sampling structure, especially per subgroup. business operating point threshold selection balances: fraud loss and account takeover risk; manual-review capacity; user abandonment and accessibility; regulatory/security assurance; retry and fallback behavior. “i choose the threshold from a target risk point on a representative development set, freeze it, and report tar/fnmr with confidence intervals on held-out data. eer is a model summary, not the production policy.”","words":350},{"path":"03-biometric-evaluation/protocols-open-set.md","title":"Protocols, Open-Set Search & Confidence","section":"3 · Biometric Evaluation","quiz":false,"accent":"#d97706","html":"<h1 id=\"evaluation-protocols-open-set-search-calibration\">Evaluation Protocols, Open-Set Search &amp; Calibration<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Pair construction can dominate the metric. Define identities, galleries, probes, retries and score aggregation before looking at results.<\/div><\/div>\n<h2 id=\"verification-protocol\">Verification protocol<\/h2>\n<p>A useful selfie-to-ID protocol controls:<\/p>\n<ul><li>no identity overlap across train/development/test;<\/li><li>one or more ID-document portraits per identity;<\/li><li>realistic selfie device and session variation;<\/li><li>genuine pairs across time and condition;<\/li><li>impostor pairs that include random and hard/lookalike comparisons;<\/li><li>documented treatment of low-quality failures and retries.<\/li><\/ul>\n<p>Deduplicate before splitting. Near-identical images, document re-crops and the same person under multiple IDs can create optimistic leakage or contradictory labels.<\/p>\n<h2 id=\"identification-metrics\">Identification metrics<\/h2>\n<p>For open-set 1:N:<\/p>\n<ul><li><strong>Rank-k / CMC:<\/strong> whether the true enrolled identity appears in top k.<\/li><li><strong>FPIR:<\/strong> fraction of non-enrolled probes incorrectly associated with someone.<\/li><li><strong>FNIR:<\/strong> fraction of enrolled probes not correctly identified at the operating point.<\/li><li><strong>TPIR:<\/strong> true positive identification rate, often reported at a fixed FPIR.<\/li><\/ul>\n<p>Evaluate at realistic gallery sizes and update patterns. Approximate search also needs <strong>retrieval recall<\/strong>: was the true nearest candidate returned before thresholding?<\/p>\n<h2 id=\"calibration-and-fusion\">Calibration and fusion<\/h2>\n<p>Raw cosine scores are not probabilities. If downstream risk engines require comparable confidence, fit a calibration mapping on representative data and monitor calibration drift. Score calibration does not improve ranking; it improves interpretation.<\/p>\n<p>When combining face match, liveness, device and document signals:<\/p>\n<ul><li>keep each model’s evidence and reason codes observable;<\/li><li>train or configure fusion on transaction-level outcomes;<\/li><li>prevent one correlated weak signal from being counted repeatedly;<\/li><li>measure the complete policy, including abstain/manual-review decisions.<\/li><\/ul>\n<h2 id=\"retry-policy\">Retry policy<\/h2>\n<p>Retrying changes observed error rates. A “best of three” genuine policy may improve completion but can increase attack opportunity if the system also takes the maximum impostor score. Benchmark the exact production aggregation: first-pass, bounded retry, quality-selected sample or multi-frame fusion.<\/p>\n<h2 id=\"regression-gate\">Regression gate<\/h2>\n<p>Ship only if the candidate meets all declared gates:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Gate<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td>security<\/td><td>TAR at target FMR does not regress beyond tolerance<\/td><\/tr><tr><td>fairness<\/td><td>worst-group FNMR ratio/difference within approved bound<\/td><\/tr><tr><td>acquisition<\/td><td>failure-to-acquire and recapture rate acceptable<\/td><\/tr><tr><td>latency<\/td><td>p95/p99 end-to-end SLO on target hardware<\/td><\/tr><tr><td>retrieval<\/td><td>ANN recall at k and FPIR at production gallery size<\/td><\/tr><tr><td>operations<\/td><td>no new critical slice, calibration or observability regression<\/td><\/tr><\/tbody><\/table><\/div>","toc":[{"level":2,"id":"verification-protocol","text":"Verification protocol"},{"level":2,"id":"identification-metrics","text":"Identification metrics"},{"level":2,"id":"calibration-and-fusion","text":"Calibration and fusion"},{"level":2,"id":"retry-policy","text":"Retry policy"},{"level":2,"id":"regression-gate","text":"Regression gate"}],"text":"evaluation protocols, open-set search & calibration 💡 tl;dr pair construction can dominate the metric. define identities, galleries, probes, retries and score aggregation before looking at results. verification protocol a useful selfie-to-id protocol controls: no identity overlap across train/development/test; one or more id-document portraits per identity; realistic selfie device and session variation; genuine pairs across time and condition; impostor pairs that include random and hard/lookalike comparisons; documented treatment of low-quality failures and retries. deduplicate before splitting. near-identical images, document re-crops and the same person under multiple ids can create optimistic leakage or contradictory labels. identification metrics for open-set 1:n: rank-k / cmc: whether the true enrolled identity appears in top k. fpir: fraction of non-enrolled probes incorrectly associated with someone. fnir: fraction of enrolled probes not correctly identified at the operating point. tpir: true positive identification rate, often reported at a fixed fpir. evaluate at realistic gallery sizes and update patterns. approximate search also needs retrieval recall : was the true nearest candidate returned before thresholding? calibration and fusion raw cosine scores are not probabilities. if downstream risk engines require comparable confidence, fit a calibration mapping on representative data and monitor calibration drift. score calibration does not improve ranking; it improves interpretation. when combining face match, liveness, device and document signals: keep each model’s evidence and reason codes observable; train or configure fusion on transaction-level outcomes; prevent one correlated weak signal from being counted repeatedly; measure the complete policy, including abstain/manual-review decisions. retry policy retrying changes observed error rates. a “best of three” genuine policy may improve completion but can increase attack opportunity if the system also takes the maximum impostor score. benchmark the exact production aggregation: first-pass, bounded retry, quality-selected sample or multi-frame fusion. regression gate ship only if the candidate meets all declared gates: gate example security tar at target fmr does not regress beyond tolerance fairness worst-group fnmr ratio/difference within approved bound acquisition failure-to-acquire and recapture rate acceptable latency p95/p99 end-to-end slo on target hardware retrieval ann recall at k and fpir at production gallery size operations no new critical slice, calibration or observability regression","words":347},{"path":"04-fairness/README.md","title":"Overview","section":"4 · Fairness","quiz":false,"accent":"#059669","html":"<h1 id=\"4-fairness-in-biometric-systems\">4 · Fairness in Biometric Systems<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Fairness is not one score. Measure every consequential stage by governed subgroups and intersections at the same product operating point, quantify uncertainty, then fix the mechanism causing disparity.<\/div><\/div>\n<h2 id=\"where-disparity-enters\">Where disparity enters<\/h2>\n<ul><li>historical collection imbalance and consent constraints;<\/li><li>lower image quality for some devices, geographies or skin-tone/lighting interactions;<\/li><li>inaccurate or socially ambiguous demographic labels;<\/li><li>detector/landmark failures before matching;<\/li><li>identity-label noise and duplicate leakage;<\/li><li>global thresholds interacting with different score distributions;<\/li><li>liveness or quality gates creating unequal failure-to-acquire;<\/li><li>production traffic differing from the benchmark.<\/li><\/ul>\n<h2 id=\"what-to-report\">What to report<\/h2>\n<p>For each approved subgroup and relevant intersection:<\/p>\n<ul><li>sample/identity/trial counts and missing-label rate;<\/li><li>acquisition and quality rejection;<\/li><li>PAD attack and bona fide errors;<\/li><li>FMR and FNMR at the <strong>same frozen threshold<\/strong>;<\/li><li>TAR at the target global FMR, plus group-specific confidence intervals;<\/li><li>retry/manual-review and journey completion;<\/li><li>latency or device failures when they affect access.<\/li><\/ul>\n<p>Aggregate results remain necessary, but they cannot replace worst-group and intersectional analysis.<\/p>\n<h2 id=\"important-nuance\">Important nuance<\/h2>\n<p>Using a different threshold per demographic group may equalize one metric but requires knowing or inferring a sensitive attribute, creates policy/legal concerns, and can move harm to another error type. Treat it as a product-policy decision, not a hidden modeling trick. First investigate data, quality, capture guidance and representation.<\/p>\n<p>The <a href=\"https://pages.nist.gov/frvt/\" target=\"_blank\" rel=\"noopener\">NIST Face Recognition Technology Evaluation<\/a> is a useful primary reference for demographic and operational evaluation.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"measurement.md\" href=\"#\">Subgroup Measurement &amp; Uncertainty<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"where-disparity-enters","text":"Where disparity enters"},{"level":2,"id":"what-to-report","text":"What to report"},{"level":2,"id":"important-nuance","text":"Important nuance"}],"text":"4 · fairness in biometric systems 💡 tl;dr fairness is not one score. measure every consequential stage by governed subgroups and intersections at the same product operating point, quantify uncertainty, then fix the mechanism causing disparity. where disparity enters historical collection imbalance and consent constraints; lower image quality for some devices, geographies or skin-tone/lighting interactions; inaccurate or socially ambiguous demographic labels; detector/landmark failures before matching; identity-label noise and duplicate leakage; global thresholds interacting with different score distributions; liveness or quality gates creating unequal failure-to-acquire; production traffic differing from the benchmark. what to report for each approved subgroup and relevant intersection: sample/identity/trial counts and missing-label rate; acquisition and quality rejection; pad attack and bona fide errors; fmr and fnmr at the same frozen threshold ; tar at the target global fmr, plus group-specific confidence intervals; retry/manual-review and journey completion; latency or device failures when they affect access. aggregate results remain necessary, but they cannot replace worst-group and intersectional analysis. important nuance using a different threshold per demographic group may equalize one metric but requires knowing or inferring a sensitive attribute, creates policy/legal concerns, and can move harm to another error type. treat it as a product-policy decision, not a hidden modeling trick. first investigate data, quality, capture guidance and representation. the nist face recognition technology evaluation is a useful primary reference for demographic and operational evaluation. → next: subgroup measurement & uncertainty .","words":232},{"path":"04-fairness/measurement.md","title":"Subgroup Measurement & Uncertainty","section":"4 · Fairness","quiz":false,"accent":"#059669","html":"<h1 id=\"subgroup-measurement-uncertainty\">Subgroup Measurement &amp; Uncertainty<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Compare error rates at a shared operating threshold, show absolute rates and uncertainty, and inspect intersections. Ratios alone become unstable when the denominator is tiny.<\/div><\/div>\n<h2 id=\"a-rigorous-analysis\">A rigorous analysis<\/h2>\n<ol><li><strong>Pre-register slices and metrics.<\/strong> Do not search dozens of groups and publish only<\/li><\/ol>\n<p>the largest disparity.<\/p>\n<ol><li><strong>Audit labels.<\/strong> Record source, consent, missingness, uncertainty and who is excluded.<\/li><li><strong>Freeze the threshold.<\/strong> Select it without using the final subgroup test results.<\/li><li><strong>Compute stage-level metrics.<\/strong> Detection, quality, PAD, matching and end-to-end.<\/li><li><strong>Estimate uncertainty.<\/strong> Bootstrap by identity/session rather than pretending every<\/li><\/ol>\n<p>correlated pair is independent.<\/p>\n<ol><li><strong>Inspect intersections.<\/strong> Age × gender presentation × skin tone × device/region can<\/li><\/ol>\n<p>reveal mechanisms hidden by single-axis averages.<\/p>\n<ol><li><strong>Test practical significance.<\/strong> A statistically detectable change may be operationally<\/li><\/ol>\n<p>irrelevant; a rare but severe group failure may still require action.<\/p>\n<h2 id=\"difference-and-ratio\">Difference and ratio<\/h2>\n<p>Suppose global FNMR is 2% and a subgroup FNMR is 6%:<\/p>\n<ul><li>absolute difference = 4 percentage points;<\/li><li>ratio = 3×.<\/li><\/ul>\n<p>Report both. If a reference FMR is 0.001%, a ratio can look enormous after one event; the confidence interval and number of impostor trials are essential.<\/p>\n<h2 id=\"same-threshold-multiple-views\">Same threshold, multiple views<\/h2>\n<p>At minimum show:<\/p>\n<ul><li>per-group FMR/FNMR at the global threshold;<\/li><li>per-group TAR at a fixed global FMR;<\/li><li>thresholds each group would require to meet the same FMR (diagnostic only);<\/li><li>overall and worst-group acquisition/completion;<\/li><li>error-versus-quality curves.<\/li><\/ul>\n<p>The diagnostic threshold spread helps reveal score-distribution shifts without silently deploying group-specific policies.<\/p>\n<h2 id=\"avoid-common-mistakes\">Avoid common mistakes<\/h2>\n<ul><li>Treating nationality or geography as a biological race label.<\/li><li>Predicting demographic labels with another model and presenting them as truth.<\/li><li>Balancing image counts while leaving identity counts and condition coverage skewed.<\/li><li>Reporting only equalized averages after excluding failed captures.<\/li><li>Declaring “no bias” when the sample is too small to detect disparity.<\/li><\/ul>\n<blockquote><p>“My fairness unit is the decision journey, not just the encoder. I bootstrap by identity, report counts and confidence intervals, keep a common production threshold visible, and trace a disparity back through acquisition, quality, PAD and matching.”<\/p><\/blockquote>","toc":[{"level":2,"id":"a-rigorous-analysis","text":"A rigorous analysis"},{"level":2,"id":"difference-and-ratio","text":"Difference and ratio"},{"level":2,"id":"same-threshold-multiple-views","text":"Same threshold, multiple views"},{"level":2,"id":"avoid-common-mistakes","text":"Avoid common mistakes"}],"text":"subgroup measurement & uncertainty 💡 tl;dr compare error rates at a shared operating threshold, show absolute rates and uncertainty, and inspect intersections. ratios alone become unstable when the denominator is tiny. a rigorous analysis pre-register slices and metrics. do not search dozens of groups and publish only the largest disparity. audit labels. record source, consent, missingness, uncertainty and who is excluded. freeze the threshold. select it without using the final subgroup test results. compute stage-level metrics. detection, quality, pad, matching and end-to-end. estimate uncertainty. bootstrap by identity/session rather than pretending every correlated pair is independent. inspect intersections. age × gender presentation × skin tone × device/region can reveal mechanisms hidden by single-axis averages. test practical significance. a statistically detectable change may be operationally irrelevant; a rare but severe group failure may still require action. difference and ratio suppose global fnmr is 2% and a subgroup fnmr is 6%: absolute difference = 4 percentage points; ratio = 3×. report both. if a reference fmr is 0.001%, a ratio can look enormous after one event; the confidence interval and number of impostor trials are essential. same threshold, multiple views at minimum show: per-group fmr/fnmr at the global threshold; per-group tar at a fixed global fmr; thresholds each group would require to meet the same fmr (diagnostic only); overall and worst-group acquisition/completion; error-versus-quality curves. the diagnostic threshold spread helps reveal score-distribution shifts without silently deploying group-specific policies. avoid common mistakes treating nationality or geography as a biological race label. predicting demographic labels with another model and presenting them as truth. balancing image counts while leaving identity counts and condition coverage skewed. reporting only equalized averages after excluding failed captures. declaring “no bias” when the sample is too small to detect disparity. “my fairness unit is the decision journey, not just the encoder. i bootstrap by identity, report counts and confidence intervals, keep a common production threshold visible, and trace a disparity back through acquisition, quality, pad and matching.”","words":325},{"path":"04-fairness/mitigation-reporting.md","title":"Mitigation, Thresholds & Reporting","section":"4 · Fairness","quiz":false,"accent":"#059669","html":"<h1 id=\"fairness-mitigation-thresholds-reporting\">Fairness Mitigation, Thresholds &amp; Reporting<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Mitigate the measured failure mechanism, then re-evaluate security and customer-friction trade-offs. Do not optimize a fairness ratio in isolation.<\/div><\/div>\n<h2 id=\"diagnosis-to-action-map\">Diagnosis-to-action map<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Evidence<\/th><th>Likely intervention<\/th><\/tr><\/thead><tbody><tr><td>subgroup has smaller/blurrier faces<\/td><td>capture UX, camera handling, quality-aware recapture<\/td><\/tr><tr><td>detector miss disparity<\/td><td>targeted detector data and threshold analysis<\/td><\/tr><tr><td>within-group genuine scores shift low<\/td><td>harder positive variation, quality-aware loss, alignment review<\/td><\/tr><tr><td>impostor tail shifts high<\/td><td>identity-label audit, hard negatives, representation/model changes<\/td><\/tr><tr><td>PAD bona fide rejection disparity<\/td><td>representative bona fide data and sensor/illumination analysis<\/td><\/tr><tr><td>gap appears only on one device/region<\/td><td>domain coverage, device calibration, routing or fallback<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"mitigation-ladder\">Mitigation ladder<\/h2>\n<ol><li>Fix label errors, duplicates and preprocessing inconsistencies.<\/li><li>Improve capture guidance and quality-aware retry.<\/li><li>Add governed data for the exact missing condition.<\/li><li>Rebalance by identity and condition; use careful sample weighting.<\/li><li>Apply augmentation that represents a real capture process.<\/li><li>Try quality-aware or margin/model changes.<\/li><li>Add abstention/manual review for uncertain high-risk cases.<\/li><li>Consider policy/threshold changes only with explicit legal and product review.<\/li><\/ol>\n<p>Synthetic data can increase coverage, but a generator may reproduce its own demographic stereotypes or add artifacts the classifier exploits. Validate identity uniqueness, realism, downstream lift and subgroup impact on real held-out data.<\/p>\n<h2 id=\"fairness-release-card\">Fairness release card<\/h2>\n<p>Every model release should record:<\/p>\n<ul><li>intended use and excluded uses;<\/li><li>dataset/protocol and label provenance;<\/li><li>global and subgroup operating metrics with intervals;<\/li><li>worst slices and known limitations;<\/li><li>changes versus champion model;<\/li><li>mitigation attempted and residual risk;<\/li><li>owner, approval and rollback rule.<\/li><\/ul>\n<h2 id=\"staff-level-communication\">Staff-level communication<\/h2>\n<p>Present a trade-off curve, not a promise:<\/p>\n<blockquote><p>“At the current global threshold the candidate reduces the worst-group FNMR from 6.0% to 3.8% while global FMR remains within its confidence bound at the required security point. Failure-to-acquire also drops 0.7 points. The remaining gap is concentrated in low-light front-camera captures, so I recommend a bounded rollout plus targeted capture work rather than a group-specific threshold.”<\/p><\/blockquote>","toc":[{"level":2,"id":"diagnosis-to-action-map","text":"Diagnosis-to-action map"},{"level":2,"id":"mitigation-ladder","text":"Mitigation ladder"},{"level":2,"id":"fairness-release-card","text":"Fairness release card"},{"level":2,"id":"staff-level-communication","text":"Staff-level communication"}],"text":"fairness mitigation, thresholds & reporting 💡 tl;dr mitigate the measured failure mechanism, then re-evaluate security and customer-friction trade-offs. do not optimize a fairness ratio in isolation. diagnosis-to-action map evidence likely intervention subgroup has smaller/blurrier faces capture ux, camera handling, quality-aware recapture detector miss disparity targeted detector data and threshold analysis within-group genuine scores shift low harder positive variation, quality-aware loss, alignment review impostor tail shifts high identity-label audit, hard negatives, representation/model changes pad bona fide rejection disparity representative bona fide data and sensor/illumination analysis gap appears only on one device/region domain coverage, device calibration, routing or fallback mitigation ladder fix label errors, duplicates and preprocessing inconsistencies. improve capture guidance and quality-aware retry. add governed data for the exact missing condition. rebalance by identity and condition; use careful sample weighting. apply augmentation that represents a real capture process. try quality-aware or margin/model changes. add abstention/manual review for uncertain high-risk cases. consider policy/threshold changes only with explicit legal and product review. synthetic data can increase coverage, but a generator may reproduce its own demographic stereotypes or add artifacts the classifier exploits. validate identity uniqueness, realism, downstream lift and subgroup impact on real held-out data. fairness release card every model release should record: intended use and excluded uses; dataset/protocol and label provenance; global and subgroup operating metrics with intervals; worst slices and known limitations; changes versus champion model; mitigation attempted and residual risk; owner, approval and rollback rule. staff-level communication present a trade-off curve, not a promise: “at the current global threshold the candidate reduces the worst-group fnmr from 6.0% to 3.8% while global fmr remains within its confidence bound at the required security point. failure-to-acquire also drops 0.7 points. the remaining gap is concentrated in low-light front-camera captures, so i recommend a bounded rollout plus targeted capture work rather than a group-specific threshold.”","words":301},{"path":"05-liveness-security/README.md","title":"Overview","section":"5 · Liveness & Security","quiz":false,"accent":"#dc2626","html":"<h1 id=\"5-liveness-pad-biometric-security\">5 · Liveness, PAD &amp; Biometric Security<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Face matching answers “same identity?” Liveness/PAD answers “is this a bona fide live presentation through the trusted capture path?” A secure product needs both, plus protection against digital injection.<\/div><\/div>\n<h2 id=\"threat-layers\">Threat layers<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Layer<\/th><th>Threat examples<\/th><th>Defense family<\/th><\/tr><\/thead><tbody><tr><td>Presentation<\/td><td>print, screen replay, mask<\/td><td>passive/active presentation attack detection<\/td><\/tr><tr><td>Media<\/td><td>deepfake, face swap, morph, synthetic identity<\/td><td>artifact/consistency models, provenance and risk signals<\/td><\/tr><tr><td>Capture channel<\/td><td>virtual camera, API replay, frame injection<\/td><td>device integrity, signed session/challenge, anti-replay<\/td><\/tr><tr><td>Account/workflow<\/td><td>stolen ID, mule, repeated attempts<\/td><td>graph/device/velocity signals and manual review<\/td><\/tr><tr><td>Model/service<\/td><td>extraction, poisoning, adversarial inputs<\/td><td>access control, validation, monitoring and signed artifacts<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The strongest design is layered. A high face-match score does not prove liveness, and a live person can still present a stolen identity.<\/p>\n<h2 id=\"passive-versus-active\">Passive versus active<\/h2>\n<ul><li><strong>Passive PAD:<\/strong> analyzes ordinary captured images/video. Lower friction, but must<\/li><\/ul>\n<p>generalize to new attacks and devices.<\/p>\n<ul><li><strong>Active challenge:<\/strong> asks for motion, pose, speech or uses randomized illumination.<\/li><\/ul>\n<p>Adds evidence and replay resistance but may increase friction and accessibility issues.<\/p>\n<p>Jumio publicly describes active illumination and defenses against presentation, synthetic/morphing, replay and injection attacks. Understand these categories without claiming knowledge of proprietary implementation.<\/p>\n<h2 id=\"pad-metrics\">PAD metrics<\/h2>\n<p>ISO/IEC 30107 terminology commonly includes:<\/p>\n<ul><li><strong>APCER:<\/strong> proportion of attack presentations incorrectly accepted as bona fide.<\/li><li><strong>BPCER:<\/strong> proportion of bona fide presentations incorrectly classified as attacks.<\/li><\/ul>\n<p>Report by attack instrument, device and subgroup. Averages can hide complete failure on a new mask, display or injection method.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"presentation-attack-detection.md\" href=\"#\">Presentation Attack Detection<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"threat-layers","text":"Threat layers"},{"level":2,"id":"passive-versus-active","text":"Passive versus active"},{"level":2,"id":"pad-metrics","text":"PAD metrics"}],"text":"5 · liveness, pad & biometric security 💡 tl;dr face matching answers “same identity?” liveness/pad answers “is this a bona fide live presentation through the trusted capture path?” a secure product needs both, plus protection against digital injection. threat layers layer threat examples defense family presentation print, screen replay, mask passive/active presentation attack detection media deepfake, face swap, morph, synthetic identity artifact/consistency models, provenance and risk signals capture channel virtual camera, api replay, frame injection device integrity, signed session/challenge, anti-replay account/workflow stolen id, mule, repeated attempts graph/device/velocity signals and manual review model/service extraction, poisoning, adversarial inputs access control, validation, monitoring and signed artifacts the strongest design is layered. a high face-match score does not prove liveness, and a live person can still present a stolen identity. passive versus active passive pad: analyzes ordinary captured images/video. lower friction, but must generalize to new attacks and devices. active challenge: asks for motion, pose, speech or uses randomized illumination. adds evidence and replay resistance but may increase friction and accessibility issues. jumio publicly describes active illumination and defenses against presentation, synthetic/morphing, replay and injection attacks. understand these categories without claiming knowledge of proprietary implementation. pad metrics iso/iec 30107 terminology commonly includes: apcer: proportion of attack presentations incorrectly accepted as bona fide. bpcer: proportion of bona fide presentations incorrectly classified as attacks. report by attack instrument, device and subgroup. averages can hide complete failure on a new mask, display or injection method. → next: presentation attack detection .","words":244},{"path":"05-liveness-security/presentation-attack-detection.md","title":"Presentation Attack Detection","section":"5 · Liveness & Security","quiz":false,"accent":"#dc2626","html":"<h1 id=\"presentation-attack-detection\">Presentation Attack Detection<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> PAD must generalize beyond the attack instruments seen in training. Design the evaluation around unseen materials, displays, devices and environmental conditions.<\/div><\/div>\n<h2 id=\"attack-taxonomy\">Attack taxonomy<\/h2>\n<ul><li>printed photos: matte/glossy, cut-out eyes, bent or wrapped;<\/li><li>display replay: phone/tablet/monitor, brightness and refresh-rate variation;<\/li><li>masks: paper, silicone, partial masks and 3D structures;<\/li><li>video replay and pre-recorded challenge responses;<\/li><li>occlusion/absence: sleeping person, partial face or multiple people.<\/li><\/ul>\n<h2 id=\"signal-families\">Signal families<\/h2>\n<p>Passive systems may use texture, frequency artifacts, moiré, reflections, depth cues, remote photoplethysmography, temporal motion and multi-frame consistency. Active systems add unpredictable challenge or illumination evidence.<\/p>\n<p>Each cue has shortcuts. Texture models can learn a specific printer; temporal models can learn one display refresh rate; rPPG degrades with compression, motion and illumination. Use diverse capture pipelines and hold out entire <strong>attack species/instruments<\/strong>, not only individual videos.<\/p>\n<h2 id=\"evaluation-protocol\">Evaluation protocol<\/h2>\n<ol><li>Separate bona fide subjects and attack source identities where possible.<\/li><li>Hold out devices and attack instruments for generalization tests.<\/li><li>Report APCER per attack type and worst-case, not just pooled.<\/li><li>Report BPCER by device, environment and demographic slice.<\/li><li>Include failure-to-acquire and latency.<\/li><li>Test adaptive attackers and repeated attempts.<\/li><li>Red-team the trusted capture boundary, not only the PAD network.<\/li><\/ol>\n<h2 id=\"product-policy\">Product policy<\/h2>\n<p>Use risk tiers:<\/p>\n<ul><li>low-risk flow: passive check with bounded retry;<\/li><li>uncertain/high-risk flow: active challenge or stronger device signal;<\/li><li>repeated or coordinated risk: block, step up or human review.<\/li><\/ul>\n<p>Keep attack samples and detailed failure traces access-controlled. Security evaluation should improve defenses without exposing operational bypass recipes.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>“I would not claim PAD generalization from a random frame split. I hold out complete attack instruments and capture devices, report per-attack APCER and bona fide BPCER, test the injection boundary, and use a risk-based step-up path when passive evidence is uncertain.”<\/p><\/blockquote>\n<p>Reference: <a href=\"https://www.iso.org/standard/79520.html\" target=\"_blank\" rel=\"noopener\">ISO/IEC 30107-3 presentation attack detection testing<\/a>.<\/p>","toc":[{"level":2,"id":"attack-taxonomy","text":"Attack taxonomy"},{"level":2,"id":"signal-families","text":"Signal families"},{"level":2,"id":"evaluation-protocol","text":"Evaluation protocol"},{"level":2,"id":"product-policy","text":"Product policy"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"presentation attack detection 💡 tl;dr pad must generalize beyond the attack instruments seen in training. design the evaluation around unseen materials, displays, devices and environmental conditions. attack taxonomy printed photos: matte/glossy, cut-out eyes, bent or wrapped; display replay: phone/tablet/monitor, brightness and refresh-rate variation; masks: paper, silicone, partial masks and 3d structures; video replay and pre-recorded challenge responses; occlusion/absence: sleeping person, partial face or multiple people. signal families passive systems may use texture, frequency artifacts, moiré, reflections, depth cues, remote photoplethysmography, temporal motion and multi-frame consistency. active systems add unpredictable challenge or illumination evidence. each cue has shortcuts. texture models can learn a specific printer; temporal models can learn one display refresh rate; rppg degrades with compression, motion and illumination. use diverse capture pipelines and hold out entire attack species/instruments , not only individual videos. evaluation protocol separate bona fide subjects and attack source identities where possible. hold out devices and attack instruments for generalization tests. report apcer per attack type and worst-case, not just pooled. report bpcer by device, environment and demographic slice. include failure-to-acquire and latency. test adaptive attackers and repeated attempts. red-team the trusted capture boundary, not only the pad network. product policy use risk tiers: low-risk flow: passive check with bounded retry; uncertain/high-risk flow: active challenge or stronger device signal; repeated or coordinated risk: block, step up or human review. keep attack samples and detailed failure traces access-controlled. security evaluation should improve defenses without exposing operational bypass recipes. interview answer “i would not claim pad generalization from a random frame split. i hold out complete attack instruments and capture devices, report per-attack apcer and bona fide bpcer, test the injection boundary, and use a risk-based step-up path when passive evidence is uncertain.” reference: iso/iec 30107-3 presentation attack detection testing .","words":293},{"path":"05-liveness-security/deepfakes-injection-threats.md","title":"Deepfakes, Replay & Injection","section":"5 · Liveness & Security","quiz":false,"accent":"#dc2626","html":"<h1 id=\"deepfakes-morphs-replay-injection\">Deepfakes, Morphs, Replay &amp; Injection<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Image classifiers alone cannot secure an untrusted capture channel. Bind fresh media to a server-issued session and combine media forensics with device, transaction and graph signals.<\/div><\/div>\n<h2 id=\"distinguish-the-threats\">Distinguish the threats<\/h2>\n<ul><li><strong>Deepfake/face swap:<\/strong> generated or manipulated media impersonates a target.<\/li><li><strong>Morph:<\/strong> one portrait blends multiple identities and may match more than one person.<\/li><li><strong>Replay:<\/strong> a previously valid image/video is reused.<\/li><li><strong>Injection:<\/strong> attacker bypasses the physical camera and feeds crafted frames or<\/li><\/ul>\n<p>metadata directly into the pipeline.<\/p>\n<ul><li><strong>Synthetic identity:<\/strong> generated face is paired with fabricated or mixed identity data.<\/li><\/ul>\n<h2 id=\"layered-design\">Layered design<\/h2>\n<ol><li>Server issues a short-lived nonce/session and optional randomized challenge.<\/li><li>Trusted SDK binds frames, timing and device evidence to the session.<\/li><li>Transport uses authenticated encryption; server rejects duplicate/expired sessions.<\/li><li>Capture service validates sequence, timestamps, frame continuity and expected camera<\/li><\/ol>\n<p>path.<\/p>\n<ol><li>PAD/media models evaluate spatial and temporal evidence.<\/li><li>Face/document/device/velocity signals feed a risk decision.<\/li><li>High-risk or uncertain cases step up rather than force a binary model answer.<\/li><\/ol>\n<p>No individual signal is infallible. The goal is to increase attacker cost, reduce reusable attacks and make anomalies observable.<\/p>\n<h2 id=\"monitoring\">Monitoring<\/h2>\n<p>Watch for:<\/p>\n<ul><li>repeated frames or hashes across accounts;<\/li><li>sudden device/SDK-version attack clusters;<\/li><li>score-distribution shifts by channel;<\/li><li>unusually high retry or challenge-failure rates;<\/li><li>new media artifacts with high face-match scores;<\/li><li>coordinated identities/devices in the broader risk graph.<\/li><\/ul>\n<h2 id=\"model-update-discipline\">Model update discipline<\/h2>\n<p>Security models face an adaptive distribution. Maintain a controlled attack corpus, time-based holdouts, red-team evaluation and rapid rollback. Do not train directly on unreviewed production attacks; they can contain privacy-sensitive data, incorrect labels or deliberate poisoning.<\/p>\n<blockquote><p>“I separate presentation attacks from digital injection. PAD protects the sensor-facing problem; session binding, device integrity and anti-replay protect the capture channel. Both feed a risk engine with step-up and monitoring.”<\/p><\/blockquote>","toc":[{"level":2,"id":"distinguish-the-threats","text":"Distinguish the threats"},{"level":2,"id":"layered-design","text":"Layered design"},{"level":2,"id":"monitoring","text":"Monitoring"},{"level":2,"id":"model-update-discipline","text":"Model update discipline"}],"text":"deepfakes, morphs, replay & injection 💡 tl;dr image classifiers alone cannot secure an untrusted capture channel. bind fresh media to a server-issued session and combine media forensics with device, transaction and graph signals. distinguish the threats deepfake/face swap: generated or manipulated media impersonates a target. morph: one portrait blends multiple identities and may match more than one person. replay: a previously valid image/video is reused. injection: attacker bypasses the physical camera and feeds crafted frames or metadata directly into the pipeline. synthetic identity: generated face is paired with fabricated or mixed identity data. layered design server issues a short-lived nonce/session and optional randomized challenge. trusted sdk binds frames, timing and device evidence to the session. transport uses authenticated encryption; server rejects duplicate/expired sessions. capture service validates sequence, timestamps, frame continuity and expected camera path. pad/media models evaluate spatial and temporal evidence. face/document/device/velocity signals feed a risk decision. high-risk or uncertain cases step up rather than force a binary model answer. no individual signal is infallible. the goal is to increase attacker cost, reduce reusable attacks and make anomalies observable. monitoring watch for: repeated frames or hashes across accounts; sudden device/sdk-version attack clusters; score-distribution shifts by channel; unusually high retry or challenge-failure rates; new media artifacts with high face-match scores; coordinated identities/devices in the broader risk graph. model update discipline security models face an adaptive distribution. maintain a controlled attack corpus, time-based holdouts, red-team evaluation and rapid rollback. do not train directly on unreviewed production attacks; they can contain privacy-sensitive data, incorrect labels or deliberate poisoning. “i separate presentation attacks from digital injection. pad protects the sensor-facing problem; session binding, device integrity and anti-replay protect the capture channel. both feed a risk engine with step-up and monitoring.”","words":286},{"path":"06-data-training/README.md","title":"Overview","section":"6 · Data & Training","quiz":false,"accent":"#9333ea","html":"<h1 id=\"6-data-training-synthetic-faces\">6 · Data, Training &amp; Synthetic Faces<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A face model needs many clean identities, meaningful within-identity variation and governed demographic/operating coverage. The pipeline must make identity leakage and dataset lineage impossible to ignore.<\/div><\/div>\n<h2 id=\"dataset-unit\">Dataset unit<\/h2>\n<p>Think in identities and sessions, not only images:<\/p>\n<ul><li>stable internal subject identifier;<\/li><li>capture session/device/source;<\/li><li>consent, purpose and retention metadata;<\/li><li>image/quality/condition labels;<\/li><li>duplicate and identity-resolution status;<\/li><li>split assignment fixed at subject level.<\/li><\/ul>\n<p>Balance counts at several levels: identities, images per identity, genuine trials, impostor trials and operating conditions. Equal image counts can still leave one group with fewer identities or less cross-session variation.<\/p>\n<h2 id=\"reproducibility-contract\">Reproducibility contract<\/h2>\n<p>Every experiment should identify:<\/p>\n<ul><li>immutable dataset manifest and query;<\/li><li>label/consent policy version;<\/li><li>preprocessing and augmentation version;<\/li><li>code/container commit;<\/li><li>model initialization and config;<\/li><li>distributed-training topology;<\/li><li>evaluation protocol and threshold;<\/li><li>output artifact and lineage.<\/li><\/ul>\n<h2 id=\"training-stack\">Training stack<\/h2>\n<p>The JD expects PyTorch/TensorFlow/JAX fluency, multi-GPU scaling and AWS ownership. The interview answer should connect them:<\/p>\n<blockquote><p>“Airflow materializes a validated, identity-disjoint manifest in S3; a versioned container launches DDP/FSDP training on SageMaker or EC2; checkpoints and metrics go to S3/MLflow; an evaluation job runs biometric, fairness, PAD and latency gates before a signed ONNX/TensorRT artifact enters the registry.”<\/p><\/blockquote>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"dataset-pipelines.md\" href=\"#\">Balanced Datasets &amp; Airflow Pipelines<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"dataset-unit","text":"Dataset unit"},{"level":2,"id":"reproducibility-contract","text":"Reproducibility contract"},{"level":2,"id":"training-stack","text":"Training stack"}],"text":"6 · data, training & synthetic faces 💡 tl;dr a face model needs many clean identities, meaningful within-identity variation and governed demographic/operating coverage. the pipeline must make identity leakage and dataset lineage impossible to ignore. dataset unit think in identities and sessions, not only images: stable internal subject identifier; capture session/device/source; consent, purpose and retention metadata; image/quality/condition labels; duplicate and identity-resolution status; split assignment fixed at subject level. balance counts at several levels: identities, images per identity, genuine trials, impostor trials and operating conditions. equal image counts can still leave one group with fewer identities or less cross-session variation. reproducibility contract every experiment should identify: immutable dataset manifest and query; label/consent policy version; preprocessing and augmentation version; code/container commit; model initialization and config; distributed-training topology; evaluation protocol and threshold; output artifact and lineage. training stack the jd expects pytorch/tensorflow/jax fluency, multi-gpu scaling and aws ownership. the interview answer should connect them: “airflow materializes a validated, identity-disjoint manifest in s3; a versioned container launches ddp/fsdp training on sagemaker or ec2; checkpoints and metrics go to s3/mlflow; an evaluation job runs biometric, fairness, pad and latency gates before a signed onnx/tensorrt artifact enters the registry.” → next: balanced datasets & airflow pipelines .","words":201},{"path":"06-data-training/dataset-pipelines.md","title":"Balanced Datasets & Airflow Pipelines","section":"6 · Data & Training","quiz":false,"accent":"#9333ea","html":"<h1 id=\"balanced-datasets-airflow-pipelines\">Balanced Datasets &amp; Airflow Pipelines<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Use Airflow for orchestration, not transformation logic. Each task should consume and produce versioned manifests, be idempotent, and stop when consent, identity or quality contracts fail.<\/div><\/div>\n<h2 id=\"pipeline-dag\">Pipeline DAG<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">governed sources<span class=\"nsub\">consent · purpose · retention<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">validate + quarantine<span class=\"nsub\">schema · decode · metadata<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">identity resolution<span class=\"nsub\">dedupe · conflicts · lineage<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">slice + split<span class=\"nsub\">subject-disjoint · balanced<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">immutable manifest<span class=\"nsub\">train · dev · test<\/span><\/span>\n  <\/div>\n<\/div>\n<h2 id=\"airflow-task-design\">Airflow task design<\/h2>\n<ul><li>Pass S3 manifest URIs through the DAG, not large image arrays through XCom.<\/li><li>Make tasks idempotent with deterministic output paths keyed by dataset version.<\/li><li>Separate quarantine from deletion so investigators can review bad records safely.<\/li><li>Use bounded retries for transient I/O, not for deterministic validation failures.<\/li><li>Record row/image/identity counts and subgroup/condition distributions at every stage.<\/li><li>Backfill into a new dataset version; never mutate the manifest behind a completed run.<\/li><\/ul>\n<h2 id=\"quality-gates\">Quality gates<\/h2>\n<p>Fail the pipeline when:<\/p>\n<ul><li>source authorization or required consent metadata is missing;<\/li><li>decoder failures exceed a bound;<\/li><li>identity overlap appears across partitions;<\/li><li>near-duplicate rate or label conflicts spike;<\/li><li>a required subgroup/condition falls below minimum power;<\/li><li>feature/preprocessing output drifts unexpectedly;<\/li><li>deleted/expired subjects remain in the materialized dataset.<\/li><\/ul>\n<h2 id=\"split-strategy\">Split strategy<\/h2>\n<ol><li>Resolve identities and duplicates globally.<\/li><li>Hold out identities for final test.<\/li><li>Add time/device/geography challenge sets as separate axes.<\/li><li>Fit augmentation, calibration and quality thresholds without final test data.<\/li><li>Freeze the test protocol before candidate comparison.<\/li><\/ol>\n<h2 id=\"staff-level-reliability\">Staff-level reliability<\/h2>\n<p>Plan for late deletion requests, partial upstream reprocessing and schema evolution. Dataset lineage must answer: “Which model artifacts contain this subject’s data?” This requires manifest-level provenance, not a folder named <code>final_v3<\/code>.<\/p>\n<p>Reuse the general pipeline material in the <a href=\"http://192.168.3.20:9002/#02-data-pipelines/README.md\" target=\"_blank\" rel=\"noopener\">ML Engineer track<\/a>.<\/p>","toc":[{"level":2,"id":"pipeline-dag","text":"Pipeline DAG"},{"level":2,"id":"airflow-task-design","text":"Airflow task design"},{"level":2,"id":"quality-gates","text":"Quality gates"},{"level":2,"id":"split-strategy","text":"Split strategy"},{"level":2,"id":"staff-level-reliability","text":"Staff-level reliability"}],"text":"balanced datasets & airflow pipelines 💡 tl;dr use airflow for orchestration, not transformation logic. each task should consume and produce versioned manifests, be idempotent, and stop when consent, identity or quality contracts fail. pipeline dag governed sources consent · purpose · retention validate + quarantine schema · decode · metadata identity resolution dedupe · conflicts · lineage slice + split subject-disjoint · balanced immutable manifest train · dev · test airflow task design pass s3 manifest uris through the dag, not large image arrays through xcom. make tasks idempotent with deterministic output paths keyed by dataset version. separate quarantine from deletion so investigators can review bad records safely. use bounded retries for transient i/o, not for deterministic validation failures. record row/image/identity counts and subgroup/condition distributions at every stage. backfill into a new dataset version; never mutate the manifest behind a completed run. quality gates fail the pipeline when: source authorization or required consent metadata is missing; decoder failures exceed a bound; identity overlap appears across partitions; near-duplicate rate or label conflicts spike; a required subgroup/condition falls below minimum power; feature/preprocessing output drifts unexpectedly; deleted/expired subjects remain in the materialized dataset. split strategy resolve identities and duplicates globally. hold out identities for final test. add time/device/geography challenge sets as separate axes. fit augmentation, calibration and quality thresholds without final test data. freeze the test protocol before candidate comparison. staff-level reliability plan for late deletion requests, partial upstream reprocessing and schema evolution. dataset lineage must answer: “which model artifacts contain this subject’s data?” this requires manifest-level provenance, not a folder named final_v3 . reuse the general pipeline material in the ml engineer track .","words":272},{"path":"06-data-training/training-synthetic-data.md","title":"Multi-GPU Training & Synthetic Faces","section":"6 · Data & Training","quiz":false,"accent":"#9333ea","html":"<h1 id=\"multi-gpu-training-synthetic-face-data\">Multi-GPU Training &amp; Synthetic Face Data<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Scale the clean baseline first, then use synthetic data only for a measured coverage gap. Demonstrate lift on real, held-out identities and conditions.<\/div><\/div>\n<h2 id=\"multi-gpu-face-training\">Multi-GPU face training<\/h2>\n<p>Face classification can involve millions of identities/classes, making the classifier weights and sampling strategy significant. A practical progression:<\/p>\n<ol><li>establish a deterministic single-GPU baseline;<\/li><li>use AMP/BF16 and maximize stable batch size;<\/li><li>move to DDP for data parallelism;<\/li><li>shard optimizer/model/classifier state with FSDP/ZeRO or partial-FC techniques when<\/li><\/ol>\n<p>memory demands it;<\/p>\n<ol><li>checkpoint model, optimizer, scaler, sampler and RNG state;<\/li><li>validate effective batch, learning-rate schedule and negative sampling after scaling.<\/li><\/ol>\n<p>Measure images/sec, GPU utilization, dataloader wait, all-reduce time and validation metrics. More GPUs are not a win if communication or S3 input starves them.<\/p>\n<h2 id=\"synthetic-data-use-cases\">Synthetic data use cases<\/h2>\n<ul><li>rare pose/illumination/device combinations;<\/li><li>age progression or appearance variation;<\/li><li>controlled occlusions and accessories;<\/li><li>presentation attacks for defensive research;<\/li><li>privacy-constrained prototyping.<\/li><\/ul>\n<h2 id=\"risks\">Risks<\/h2>\n<ul><li>memorization or near-copying of training identities;<\/li><li>demographic stereotypes and unmeasured representation gaps;<\/li><li>identity collisions across synthetic samples;<\/li><li>generator artifacts becoming shortcuts;<\/li><li>unrealistic within-identity consistency;<\/li><li>license, consent and provenance ambiguity.<\/li><\/ul>\n<h2 id=\"acceptance-protocol\">Acceptance protocol<\/h2>\n<ol><li>State the missing real-data slice.<\/li><li>Generate with versioned prompts/models/seeds and provenance.<\/li><li>Filter for quality, duplicates and identity similarity to protected datasets.<\/li><li>Train real-only baseline and controlled real+synthetic variants.<\/li><li>Evaluate on untouched <strong>real<\/strong> benchmark identities.<\/li><li>Report overall, low-FMR, fairness and condition-specific deltas.<\/li><li>Keep synthetic proportion and ablations visible.<\/li><\/ol>\n<p>Synthetic test data can probe known dimensions but cannot replace real-world evaluation.<\/p>\n<h2 id=\"interview-answer\">Interview answer<\/h2>\n<blockquote><p>“I use synthetic faces as a targeted intervention, not a diversity checkbox. I define the gap, audit identity leakage and generator bias, run an ablation, and require improvement on real subject-disjoint data at the production operating point.”<\/p><\/blockquote>\n<p>Reuse distributed training and NCCL deep dives in the <a href=\"http://192.168.3.20:9002/#08-optimization-scaling/distributed-training.md\" target=\"_blank\" rel=\"noopener\">ML Engineer track<\/a>.<\/p>","toc":[{"level":2,"id":"multi-gpu-face-training","text":"Multi-GPU face training"},{"level":2,"id":"synthetic-data-use-cases","text":"Synthetic data use cases"},{"level":2,"id":"risks","text":"Risks"},{"level":2,"id":"acceptance-protocol","text":"Acceptance protocol"},{"level":2,"id":"interview-answer","text":"Interview answer"}],"text":"multi-gpu training & synthetic face data 💡 tl;dr scale the clean baseline first, then use synthetic data only for a measured coverage gap. demonstrate lift on real, held-out identities and conditions. multi-gpu face training face classification can involve millions of identities/classes, making the classifier weights and sampling strategy significant. a practical progression: establish a deterministic single-gpu baseline; use amp/bf16 and maximize stable batch size; move to ddp for data parallelism; shard optimizer/model/classifier state with fsdp/zero or partial-fc techniques when memory demands it; checkpoint model, optimizer, scaler, sampler and rng state; validate effective batch, learning-rate schedule and negative sampling after scaling. measure images/sec, gpu utilization, dataloader wait, all-reduce time and validation metrics. more gpus are not a win if communication or s3 input starves them. synthetic data use cases rare pose/illumination/device combinations; age progression or appearance variation; controlled occlusions and accessories; presentation attacks for defensive research; privacy-constrained prototyping. risks memorization or near-copying of training identities; demographic stereotypes and unmeasured representation gaps; identity collisions across synthetic samples; generator artifacts becoming shortcuts; unrealistic within-identity consistency; license, consent and provenance ambiguity. acceptance protocol state the missing real-data slice. generate with versioned prompts/models/seeds and provenance. filter for quality, duplicates and identity similarity to protected datasets. train real-only baseline and controlled real+synthetic variants. evaluate on untouched real benchmark identities. report overall, low-fmr, fairness and condition-specific deltas. keep synthetic proportion and ablations visible. synthetic test data can probe known dimensions but cannot replace real-world evaluation. interview answer “i use synthetic faces as a targeted intervention, not a diversity checkbox. i define the gap, audit identity leakage and generator bias, run an ablation, and require improvement on real subject-disjoint data at the production operating point.” reuse distributed training and nccl deep dives in the ml engineer track .","words":290},{"path":"07-production-scale/README.md","title":"Overview","section":"7 · Production & Scale","quiz":false,"accent":"#2563eb","html":"<h1 id=\"7-production-aws-scale\">7 · Production, AWS &amp; Scale<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The production unit is the complete decision service, not a model file. Version preprocessing, quality, liveness, embedding, threshold and policy together.<\/div><\/div>\n<h2 id=\"online-request-path\">Online request path<\/h2>\n<ol><li>authenticate request and create an idempotency/session key;<\/li><li>validate/decode media with strict resource limits;<\/li><li>run detection, alignment, quality and liveness;<\/li><li>produce the versioned normalized embedding;<\/li><li>compare against claimed template or retrieve gallery candidates;<\/li><li>apply calibrated threshold/risk policy;<\/li><li>return decision and non-sensitive reason codes;<\/li><li>emit traces, metrics and audit events without leaking biometric content.<\/li><\/ol>\n<h2 id=\"slos-and-capacity\">SLOs and capacity<\/h2>\n<p>Define:<\/p>\n<ul><li>p50/p95/p99 end-to-end latency;<\/li><li>throughput and burst behavior;<\/li><li>GPU/CPU memory and queue limits;<\/li><li>availability and regional recovery target;<\/li><li>timeout, retry and overload policy;<\/li><li>per-stage error and acquisition rate;<\/li><li>security/fairness model gates.<\/li><\/ul>\n<p>Avoid unbounded server retries: clients may already retry and create duplicate biometric transactions. Use idempotency and a clear deadline budget.<\/p>\n<h2 id=\"release-unit\">Release unit<\/h2>\n<p>A release manifest should pin detector, landmark/alignment config, quality model, PAD model, encoder, ANN index format, calibration and policy thresholds. Canary the bundle; do not let independently updated components create untested combinations.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"aws-architecture.md\" href=\"#\">AWS Training-to-Serving Architecture<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"online-request-path","text":"Online re

urns K, distortion, and per-view R,t. <strong>Reprojection error<\/strong> (in pixels) tells you how good the calibration is — under ~0.5px is good.<\/p>\n<h2 id=\"fisheye-your-surround-view-domain\">Fisheye (your surround-view domain)<\/h2>\n<p>Fisheye lenses have extreme radial distortion — the standard pinhole model breaks, so OpenCV has a dedicated <strong><code>cv2.fisheye<\/code><\/strong> model. Pipeline for surround-view: fisheye undistort → perspective project each camera to the ground plane (homography) → stitch into a bird's-eye view → blend seams (photometric alignment so brightness matches across cameras — literally on your resume). Great concrete story to tell.<\/p>\n<h2 id=\"why-it-matters-for-koireader\">Why it matters for KoiReader<\/h2>\n<p>Warehouse/supply-chain cameras are often wide-angle and mounted at awkward angles. To turn a detection into <em>real-world meaning<\/em> (which loading bay? how far apart? did it cross this line on the floor?), you need calibration + a ground-plane homography. That's the bridge from \"the model found a box\" to \"the box is in zone 3\" — the logic layer the JD prizes.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Pinhole vs fisheye model?<\/strong> Pinhole handles normal/mild lenses with radial+tangential coeffs. Fisheye lenses distort too severely for that model, so use OpenCV's dedicated fisheye model — using pinhole on a fisheye leaves big residual distortion at the edges.<\/p>\n<p><strong>Undistort every frame vs precompute maps?<\/strong> <code>cv2.undistort<\/code> recomputes the mapping each call (wasteful per-frame). For video, build the remap once with <code>initUndistortRectifyMap<\/code> and apply <code>cv2.remap<\/code> each frame — same result, far cheaper, ideally on GPU.<\/p>\n<p><strong>Why undistort before measuring geometry?<\/strong> Distortion bends straight lines, so any distance/angle/zone math on a distorted image is wrong, worst at the edges. Undistort first, then the homography-to-ground math is valid.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"features-and-matching.md\" href=\"#\">features-and-matching.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"intrinsics-vs-extrinsics","text":"Intrinsics vs extrinsics"},{"level":2,"id":"distortion-why-straight-lines-curve","text":"Distortion (why straight lines curve)"},{"level":2,"id":"how-calibration-works-the-procedure","text":"How calibration works (the procedure)"},{"level":2,"id":"fisheye-your-surround-view-domain","text":"Fisheye (your surround-view domain)"},{"level":2,"id":"why-it-matters-for-koireader","text":"Why it matters for KoiReader"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"camera calibration & distortion 💡 tl;dr a real camera bends straight lines (lens distortion) and has its own geometry (focal length, optical center). calibration recovers those numbers so you can undistort images and connect pixels to real-world geometry. intrinsics = the camera's internal parameters; extrinsics = where the camera sits in the world. you did exactly this in surround-view (fisheye correction + calibration). intrinsics vs extrinsics intrinsics (k, 3×3): focal lengths (fx, fy) , principal point (cx, cy) , skew. fixed per camera+lens. maps 3d camera-space rays to image pixels. distortion coefficients: radial ( k1, k2, k3 ) — barrel/pincushion bending — and tangential ( p1, p2 ) — lens not perfectly parallel to sensor. extrinsics (r, t): rotation + translation — the camera's pose in world coordinates. changes if you move the camera. the full pinhole model: pixel = k · [r | t] · world_point (in homogeneous coords). see the projection. a known-height object shrinks as f·h/d — the 1/distance law that lets you turn pixels into metres for crowd density and queue length. change focal length to see the field-of-view / resolution tradeoff. distortion (why straight lines curve) radial: straight lines bow outward ( barrel , common on wide/fisheye) or inward ( pincushion ). worse toward image edges. tangential: from lens/sensor misalignment; mild skew. undistortion ( cv2.undistort / initundistortrectifymap + remap ): uses k + distortion coeffs to straighten the image. do geometry-dependent logic after undistorting. for per-frame video, precompute the remap once and reuse — don't recompute the maps every frame. how calibration works (the procedure) show a known pattern (chessboard / charuco) at many angles, detect its corners, and solve for k + distortion that best explain where those known 3d points land in 2d. cv2.calibratecamera returns k, distortion, and per-view r,t. reprojection error (in pixels) tells you how good the calibration is — under ~0.5px is good. fisheye (your surround-view domain) fisheye lenses have extreme radial distortion — the standard pinhole model breaks, so opencv has a dedicated cv2.fisheye model. pipeline for surround-view: fisheye undistort → perspective project each camera to the ground plane (homography) → stitch into a bird's-eye view → blend seams (photometric alignment so brightness matches across cameras — literally on your resume). great concrete story to tell. why it matters for koireader warehouse/supply-chain cameras are often wide-angle and mounted at awkward angles. to turn a detection into real-world meaning (which loading bay? how far apart? did it cross this line on the floor?), you need calibration + a ground-plane homography. that's the bridge from \"the model found a box\" to \"the box is in zone 3\" — the logic layer the jd prizes. why x over y pinhole vs fisheye model? pinhole handles normal/mild lenses with radial+tangential coeffs. fisheye lenses distort too severely for that model, so use opencv's dedicated fisheye model — using pinhole on a fisheye leaves big residual distortion at the edges. undistort every frame vs precompute maps? cv2.undistort recomputes the mapping each call (wasteful per-frame). for video, build the remap once with initundistortrectifymap and apply cv2.remap each frame — same result, far cheaper, ideally on gpu. why undistort before measuring geometry? distortion bends straight lines, so any distance/angle/zone math on a distorted image is wrong, worst at the edges. undistort first, then the homography-to-ground math is valid. → next: features-and-matching.md","words":554},{"path":"09-computer-vision-fundamentals/features-and-matching.md","title":"Features & Matching","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"features-matching-epipolar-geometry\">Features, Matching &amp; Epipolar Geometry<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A <strong>feature<\/strong> is a distinctive, repeatable point (a corner, not a flat wall). You <strong>detect<\/strong> keypoints, <strong>describe<\/strong> them as vectors, then <strong>match<\/strong> descriptors across images to find correspondences. Because matches are noisy, <strong>RANSAC<\/strong> robustly fits the transform (homography / fundamental matrix) while ignoring outliers. This underpins stitching, tracking init, and multi-view geometry — all on your resume (SIFT/SURF/ORB, RANSAC, fundamental/essential matrix).<\/div><\/div>\n<h2 id=\"why-corners-not-edges-or-flat-areas\">Why corners, not edges or flat areas<\/h2>\n<p>A flat patch looks like every other flat patch — you can't localize it. An edge is ambiguous <em>along<\/em> the edge. A <strong>corner<\/strong> is unique in both directions → repeatable and matchable. That's the Harris corner intuition: large intensity change in <em>all<\/em> directions.<\/p>\n<h2 id=\"detect-describe-match\">Detect → Describe → Match<\/h2>\n<ol><li><strong>Detect keypoints<\/strong> — find corners/blobs (Harris, FAST, DoG).<\/li><li><strong>Describe<\/strong> — encode each keypoint's neighborhood as a vector invariant to<\/li><\/ol>\n<p>scale/rotation/lighting.<\/p>\n<ol><li><strong>Match<\/strong> — compare descriptors across images (nearest neighbor + Lowe's ratio<\/li><\/ol>\n<p>test to drop ambiguous matches).<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Detector/Descriptor<\/th><th>Type<\/th><th>Notes<\/th><\/tr><\/thead><tbody><tr><td><strong>SIFT<\/strong><\/td><td>float (128-d)<\/td><td>scale+rotation invariant, accurate, slower; now patent-free<\/td><\/tr><tr><td><strong>SURF<\/strong><\/td><td>float<\/td><td>faster SIFT approximation; was patented<\/td><\/tr><tr><td><strong>ORB<\/strong><\/td><td>binary (256-bit)<\/td><td>FAST + BRIEF, <strong>free, real-time<\/strong>, great on edge/ARM<\/td><\/tr><\/tbody><\/table><\/div>\n<ul><li><strong>Float descriptors (SIFT)<\/strong> → match with L2 distance.<\/li><li><strong>Binary descriptors (ORB)<\/strong> → match with <strong>Hamming distance<\/strong> (super fast). ORB<\/li><\/ul>\n<p>is the go-to when you need real-time on constrained hardware (your ARM/Jetson   world).<\/p>\n<h2 id=\"ransac-the-robust-fitting-workhorse\">RANSAC (the robust-fitting workhorse)<\/h2>\n<p>Matches contain wrong pairs (outliers). RANSAC: randomly pick the minimal sample (4 points for a homography), fit the model, count inliers (matches that agree), repeat, keep the best. Result: a transform fit on the <em>good<\/em> matches, ignoring outliers. You cite this for homography/fundamental-matrix estimation.<\/p>\n<h2 id=\"epipolar-geometry-two-views\">Epipolar geometry (two views)<\/h2>\n<p>When two cameras see the same scene:<\/p>\n<ul><li><strong>Fundamental matrix (F):<\/strong> relates corresponding points across two <strong>uncalibrated<\/strong><\/li><\/ul>\n<p>views: <code>x'ᵀ F x = 0<\/code>. A point in one image constrains its match to a <strong>line<\/strong>   (the epipolar line) in the other — turns 2D search into 1D.<\/p>\n<ul><li><strong>Essential matrix (E):<\/strong> same idea for <strong>calibrated<\/strong> cameras (<code>E = Kᵀ F K<\/code>); you<\/li><\/ul>\n<p>can decompose E into relative <strong>R, t<\/strong> between cameras → recover camera motion.<\/p>\n<ul><li><strong>Triangulation:<\/strong> with two known camera poses + a matched point, intersect the<\/li><\/ul>\n<p>rays to get the <strong>3D<\/strong> position. Basis of stereo depth / structure-from-motion.<\/p>\n<h2 id=\"where-this-shows-up-in-the-role\">Where this shows up in the role<\/h2>\n<p>Less day-to-day than tracking math, but it's the classical foundation interviewers test for \"do they really know CV.\" Realistic uses: registering/stitching camera views, initializing or validating tracks, stereo/depth, and the geometric reasoning behind multi-camera setups.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>SIFT vs ORB?<\/strong> SIFT = more accurate, scale/rotation invariant, float descriptor, heavier. ORB = binary, free, real-time, Hamming-matchable — the practical choice on edge/ARM (your hardware). Use SIFT when accuracy dominates and compute is available; ORB for real-time/embedded.<\/p>\n<p><strong>L2 vs Hamming distance for matching?<\/strong> Float descriptors (SIFT/SURF) compare with L2 (Euclidean). Binary descriptors (ORB/ BRIEF) compare with Hamming (count differing bits) — a couple of XOR+popcount ops, extremely fast. Match the metric to the descriptor type.<\/p>\n<p><strong>Fundamental vs essential matrix?<\/strong> Fundamental works with <em>uncalibrated<\/em> cameras (pixels). Essential needs <em>calibrated<\/em> cameras (it folds in K) and, unlike F, can be decomposed into relative rotation + translation. Calibrated → essential (you get motion); uncalibrated → fundamental.<\/p>\n<p><strong>Why RANSAC instead of least-squares on all matches?<\/strong> Least squares is wrecked by outliers (one bad match skews the whole fit). RANSAC fits on random minimal samples and keeps the model with the most inliers, so it's robust to the wrong matches that always exist. Essential whenever data has outliers.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"detection-tracking-math.md\" href=\"#\">detection-tracking-math.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-corners-not-edges-or-flat-areas","text":"Why corners, not edges or flat areas"},{"level":2,"id":"detect-describe-match","text":"Detect → Describe → Match"},{"level":2,"id":"ransac-the-robust-fitting-workhorse","text":"RANSAC (the robust-fitting workhorse)"},{"level":2,"id":"epipolar-geometry-two-views","text":"Epipolar geometry (two views)"},{"level":2,"id":"where-this-shows-up-in-the-role","text":"Where this shows up in the role"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"features, matching & epipolar geometry 💡 tl;dr a feature is a distinctive, repeatable point (a corner, not a flat wall). you detect keypoints, describe them as vectors, then match descriptors across images to find correspondences. because matches are noisy, ransac robustly fits the transform (homography / fundamental matrix) while ignoring outliers. this underpins stitching, tracking init, and multi-view geometry — all on your resume (sift/surf/orb, ransac, fundamental/essential matrix). why corners, not edges or flat areas a flat patch looks like every other flat patch — you can't localize it. an edge is ambiguous along the edge. a corner is unique in both directions → repeatable and matchable. that's the harris corner intuition: large intensity change in all directions. detect → describe → match detect keypoints — find corners/blobs (harris, fast, dog). describe — encode each keypoint's neighborhood as a vector invariant to scale/rotation/lighting. match — compare descriptors across images (nearest neighbor + lowe's ratio test to drop ambiguous matches). detector/descriptor type notes sift float (128-d) scale+rotation invariant, accurate, slower; now patent-free surf float faster sift approximation; was patented orb binary (256-bit) fast + brief, free, real-time , great on edge/arm float descriptors (sift) → match with l2 distance. binary descriptors (orb) → match with hamming distance (super fast). orb is the go-to when you need real-time on constrained hardware (your arm/jetson world). ransac (the robust-fitting workhorse) matches contain wrong pairs (outliers). ransac: randomly pick the minimal sample (4 points for a homography), fit the model, count inliers (matches that agree), repeat, keep the best. result: a transform fit on the good matches, ignoring outliers. you cite this for homography/fundamental-matrix estimation. epipolar geometry (two views) when two cameras see the same scene: fundamental matrix (f): relates corresponding points across two uncalibrated views: x'ᵀ f x = 0 . a point in one image constrains its match to a line (the epipolar line) in the other — turns 2d search into 1d. essential matrix (e): same idea for calibrated cameras ( e = kᵀ f k ); you can decompose e into relative r, t between cameras → recover camera motion. triangulation: with two known camera poses + a matched point, intersect the rays to get the 3d position. basis of stereo depth / structure-from-motion. where this shows up in the role less day-to-day than tracking math, but it's the classical foundation interviewers test for \"do they really know cv.\" realistic uses: registering/stitching camera views, initializing or validating tracks, stereo/depth, and the geometric reasoning behind multi-camera setups. why x over y sift vs orb? sift = more accurate, scale/rotation invariant, float descriptor, heavier. orb = binary, free, real-time, hamming-matchable — the practical choice on edge/arm (your hardware). use sift when accuracy dominates and compute is available; orb for real-time/embedded. l2 vs hamming distance for matching? float descriptors (sift/surf) compare with l2 (euclidean). binary descriptors (orb/ brief) compare with hamming (count differing bits) — a couple of xor+popcount ops, extremely fast. match the metric to the descriptor type. fundamental vs essential matrix? fundamental works with uncalibrated cameras (pixels). essential needs calibrated cameras (it folds in k) and, unlike f, can be decomposed into relative rotation + translation. calibrated → essential (you get motion); uncalibrated → fundamental. why ransac instead of least-squares on all matches? least squares is wrecked by outliers (one bad match skews the whole fit). ransac fits on random minimal samples and keeps the model with the most inliers, so it's robust to the wrong matches that always exist. essential whenever data has outliers. → next: detection-tracking-math.md","words":586},{"path":"09-computer-vision-fundamentals/detection-tracking-math.md","title":"Detection & Tracking Math","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"detection-tracking-math\">Detection &amp; Tracking Math<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 210\" role=\"img\" aria-label=\"Intersection over Union\"><rect class=\"dg-box\" x=\"150\" y=\"40\" width=\"200\" height=\"130\" rx=\"8\"/><rect class=\"dg-accent-soft\" x=\"250\" y=\"90\" width=\"200\" height=\"130\" rx=\"8\" stroke=\"none\"/><rect class=\"dg-box dg-hot\" x=\"250\" y=\"90\" width=\"100\" height=\"80\" rx=\"0\" fill=\"none\"/><rect x=\"150\" y=\"40\" width=\"200\" height=\"130\" rx=\"8\" fill=\"none\" class=\"dg-strokeA\"/><rect x=\"250\" y=\"90\" width=\"200\" height=\"130\" rx=\"8\" fill=\"none\" class=\"dg-strokeB\"/><text class=\"dg-sub\" x=\"200\" y=\"35\" text-anchor=\"middle\">box A<\/text><text class=\"dg-sub\" x=\"500\" y=\"235\" text-anchor=\"middle\">box B<\/text><text class=\"dg-label\" x=\"300\" y=\"135\" text-anchor=\"middle\">∩<\/text><text class=\"dg-sub\" x=\"560\" y=\"120\">IoU =<\/text><text class=\"dg-sub\" x=\"560\" y=\"140\">overlap<\/text><line class=\"dg-line\" x1=\"558\" y1=\"148\" x2=\"640\" y2=\"148\"/><text class=\"dg-sub\" x=\"560\" y=\"166\">union<\/text><text class=\"dg-sub\" x=\"360\" y=\"200\" text-anchor=\"middle\">drives NMS &amp; detection↔track matching<\/text><\/svg><figcaption>Intersection over Union<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The role <em>integrates<\/em> models, so you must know the math <em>around<\/em> them: <strong>IoU<\/strong> (box overlap), <strong>NMS<\/strong> (dedupe overlapping detections), <strong>anchors<\/strong> (how detectors propose boxes), <strong>mAP<\/strong> (how accuracy is scored), and <strong>trackers<\/strong> (Kalman for motion, IoU/Hungarian for association, DeepSORT for appearance). This is the math you put <em>on top of<\/em> the ML team's models.<\/div><\/div>\n<h2 id=\"iou-intersection-over-union\">IoU: Intersection over Union<\/h2>\n<p>The fundamental box-overlap metric:<\/p>\n<div class=\"formula\">\n  <div class=\"frow\"><span class=\"fexpr\">IoU = area(<span class=\"fv\">A ∩ B<\/span>) / area(<span class=\"fv\">A ∪ B<\/span>)<\/span><span class=\"fnote\">0 = no overlap, 1 = identical<\/span><\/div>\n<\/div>\n<p><strong>Try it.<\/strong> Drag the prediction box around the ground truth and watch IoU. Notice the cliff around 0.5 — that single threshold decides whether a detection counts as a match (TP) in mAP, and whether NMS suppresses it.<\/p>\n<div id=\"iou-widget\" class=\"widget-host\"><\/div>\n<p>Used everywhere: NMS, matching detections to ground truth (mAP), and associating detections to tracks frame-to-frame.<\/p>\n<h2 id=\"nms-non-maximum-suppression\">NMS: Non-Maximum Suppression<\/h2>\n<p>Detectors output many overlapping boxes for one object. NMS keeps the best:<\/p>\n<ol><li>Sort boxes by confidence.<\/li><li>Take the highest; remove all others with IoU &gt; threshold (e.g., 0.5) against it.<\/li><li>Repeat with the next remaining box.<\/li><\/ol>\n<p>Result: one box per object. <strong>Soft-NMS<\/strong> decays scores instead of hard-removing (better for crowded scenes). NMS runs every frame — do it on GPU at scale (sec 03).<\/p>\n<h2 id=\"anchors-detection-heads-quick-model-literacy\">Anchors &amp; detection heads (quick model literacy)<\/h2>\n<ul><li><strong>Anchor boxes:<\/strong> predefined box shapes/scales at each location; the model<\/li><\/ul>\n<p>predicts offsets from anchors + class + objectness. (Faster R-CNN, SSD, older   YOLO.)<\/p>\n<ul><li><strong>Anchor-free:<\/strong> predict box centers/extents directly (FCOS, newer YOLO/CenterNet)<\/li><\/ul>\n<p>— fewer hyperparameters.<\/p>\n<ul><li><strong>YOLO:<\/strong> single-shot, grid-based, real-time — the standard for live video. Know<\/li><\/ul>\n<p>it's one forward pass → fast, which is why it dominates streaming inference.<\/p>\n<h2 id=\"map-mean-average-precision-how-detection-is-scored\">mAP: mean Average Precision (how detection is scored)<\/h2>\n<ul><li><strong>Precision<\/strong> = TP / (TP+FP) — of what I flagged, how much was right.<\/li><li><strong>Recall<\/strong> = TP / (TP+FN) — of what existed, how much I caught.<\/li><li>A detection is a TP if IoU with ground truth ≥ threshold (e.g., 0.5).<\/li><li><strong>AP<\/strong> = area under the precision–recall curve for one class; <strong>mAP<\/strong> = mean over<\/li><\/ul>\n<p>classes. <code>mAP@0.5<\/code> (one threshold) vs <code>mAP@[.5:.95]<\/code> (averaged over thresholds,   the COCO metric). This is your model-eval vocabulary — own it.<\/p>\n<h2 id=\"tracking-detection-identity-over-time\">Tracking: detection → identity over time<\/h2>\n<p>Detection finds objects per frame; <strong>tracking<\/strong> keeps the <em>same ID<\/em> across frames (needed for counting, dwell time, line-crossing). Tracking-by-detection loop:<\/p>\n<ol><li><strong>Predict<\/strong> where each existing track will be (motion model).<\/li><li><strong>Associate<\/strong> new detections to predicted tracks (similarity → assignment).<\/li><li><strong>Update<\/strong> matched tracks; spawn new ones; kill stale ones.<\/li><\/ol>\n<h3 id=\"the-building-blocks\">The building blocks<\/h3>\n<ul><li><strong>Kalman filter<\/strong> — predicts an object's next position/velocity and smooths noisy<\/li><\/ul>\n<p>detections. The motion model in SORT/DeepSORT. Intuition: \"where will it be next   frame, and how confident am I.\"<\/p>\n<ul><li><strong>Hungarian algorithm<\/strong> — optimal assignment of detections↔tracks given a cost<\/li><\/ul>\n<p>matrix (e.g., 1−IoU, or appearance distance). Solves \"which detection is which   track\" in one shot.<\/p>\n<ul><li><strong>SORT<\/strong> — Kalman + Hungarian on <strong>IoU<\/strong>. Fast, but loses IDs through occlusions<\/li><\/ul>\n<p>(ID switches).<\/p>\n<ul><li><strong>DeepSORT<\/strong> — SORT + an <strong>appearance embedding<\/strong> (a re-ID feature per object), so<\/li><\/ul>\n<p>it re-identifies objects after occlusion → far fewer ID switches. (You built a   custom tracker beating SORT — strong story.)<\/p>\n<ul><li><strong>ByteTrack<\/strong> — also associates <em>low<\/em>-confidence detections, recovering occluded<\/li><\/ul>\n<p>objects without a heavy appearance model; strong modern baseline.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>SORT vs DeepSORT?<\/strong> SORT = Kalman + IoU + Hungarian: fast, light, but drops IDs through occlusion. DeepSORT adds an appearance embedding so it re-IDs after occlusion → fewer ID switches at extra compute. Crowded/occluded scenes → DeepSORT (or ByteTrack); simple fast scenes → SORT.<\/p>\n<p><strong>IoU-based vs appearance-based association?<\/strong> IoU association is cheap and works when objects move little between frames. Appearance (re-ID embeddings) survives occlusion and large motion but costs an extra model. Combine them: IoU first, appearance to recover the hard cases.<\/p>\n<p><strong>Hard-NMS vs Soft-NMS?<\/strong> Hard-NMS removes overlapping boxes outright — can delete a real object in a crowd. Soft-NMS decays their scores instead, preserving nearby true objects → better in dense scenes, slightly more tuning.<\/p>\n<p><strong>Why is YOLO the default for live video?<\/strong> One forward pass per frame (single-shot) → real-time throughput, unlike two-stage detectors (region proposal + classify) that are more accurate but slower. For streaming, latency wins → YOLO-class models.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"logic-on-detections.md\" href=\"#\">logic-on-detections.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"iou-intersection-over-union","text":"IoU: Intersection over Union"},{"level":2,"id":"nms-non-maximum-suppression","text":"NMS: Non-Maximum Suppression"},{"level":2,"id":"anchors-detection-heads-quick-model-literacy","text":"Anchors &amp; detection heads (quick model literacy)"},{"level":2,"id":"map-mean-average-precision-how-detection-is-scored","text":"mAP: mean Average Precision (how detection is scored)"},{"level":2,"id":"tracking-detection-identity-over-time","text":"Tracking: detection → identity over time"},{"level":3,"id":"the-building-blocks","text":"The building blocks"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"detection & tracking math box a box b ∩ iou = overlap union drives nms & detection↔track matching intersection over union 💡 tl;dr the role integrates models, so you must know the math around them: iou (box overlap), nms (dedupe overlapping detections), anchors (how detectors propose boxes), map (how accuracy is scored), and trackers (kalman for motion, iou/hungarian for association, deepsort for appearance). this is the math you put on top of the ml team's models. iou: intersection over union the fundamental box-overlap metric: iou = area( a ∩ b ) / area( a ∪ b ) 0 = no overlap, 1 = identical try it. drag the prediction box around the ground truth and watch iou. notice the cliff around 0.5 — that single threshold decides whether a detection counts as a match (tp) in map, and whether nms suppresses it. used everywhere: nms, matching detections to ground truth (map), and associating detections to tracks frame-to-frame. nms: non-maximum suppression detectors output many overlapping boxes for one object. nms keeps the best: sort boxes by confidence. take the highest; remove all others with iou > threshold (e.g., 0.5) against it. repeat with the next remaining box. result: one box per object. soft-nms decays scores instead of hard-removing (better for crowded scenes). nms runs every frame — do it on gpu at scale (sec 03). anchors & detection heads (quick model literacy) anchor boxes: predefined box shapes/scales at each location; the model predicts offsets from anchors + class + objectness. (faster r-cnn, ssd, older yolo.) anchor-free: predict box centers/extents directly (fcos, newer yolo/centernet) — fewer hyperparameters. yolo: single-shot, grid-based, real-time — the standard for live video. know it's one forward pass → fast, which is why it dominates streaming inference. map: mean average precision (how detection is scored) precision = tp / (tp+fp) — of what i flagged, how much was right. recall = tp / (tp+fn) — of what existed, how much i caught. a detection is a tp if iou with ground truth ≥ threshold (e.g., 0.5). ap = area under the precision–recall curve for one class; map = mean over classes. map@0.5 (one threshold) vs map@[.5:.95] (averaged over thresholds, the coco metric). this is your model-eval vocabulary — own it. tracking: detection → identity over time detection finds objects per frame; tracking keeps the same id across frames (needed for counting, dwell time, line-crossing). tracking-by-detection loop: predict where each existing track will be (motion model). associate new detections to predicted tracks (similarity → assignment). update matched tracks; spawn new ones; kill stale ones. the building blocks kalman filter — predicts an object's next position/velocity and smooths noisy detections. the motion model in sort/deepsort. intuition: \"where will it be next frame, and how confident am i.\" hungarian algorithm — optimal assignment of detections↔tracks given a cost matrix (e.g., 1−iou, or appearance distance). solves \"which detection is which track\" in one shot. sort — kalman + hungarian on iou . fast, but loses ids through occlusions (id switches). deepsort — sort + an appearance embedding (a re-id feature per object), so it re-identifies objects after occlusion → far fewer id switches. (you built a custom tracker beating sort — strong story.) bytetrack — also associates low -confidence detections, recovering occluded objects without a heavy appearance model; strong modern baseline. why x over y sort vs deepsort? sort = kalman + iou + hungarian: fast, light, but drops ids through occlusion. deepsort adds an appearance embedding so it re-ids after occlusion → fewer id switches at extra compute. crowded/occluded scenes → deepsort (or bytetrack); simple fast scenes → sort. iou-based vs appearance-based association? iou association is cheap and works when objects move little between frames. appearance (re-id embeddings) survives occlusion and large motion but costs an extra model. combine them: iou first, appearance to recover the hard cases. hard-nms vs soft-nms? hard-nms removes overlapping boxes outright — can delete a real object in a crowd. soft-nms decays their scores instead, preserving nearby true objects → better in dense scenes, slightly more tuning. why is yolo the default for live video? one forward pass per frame (single-shot) → real-time throughput, unlike two-stage detectors (region proposal + classify) that are more accurate but slower. for streaming, latency wins → yolo-class models. → next: logic-on-detections.md","words":711},{"path":"09-computer-vision-fundamentals/logic-on-detections.md","title":"Logic on Detections","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"logic-layers-on-top-of-detections\">Logic Layers on Top of Detections<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 210\" role=\"img\" aria-label=\"Turning boxes into business meaning\"><polygon class=\"dg-accent-soft\" points=\"80,60 340,40 360,170 60,180\" stroke=\"none\"/><polygon points=\"80,60 340,40 360,170 60,180\" fill=\"none\" class=\"dg-strokeA\"/><text class=\"dg-sub\" x=\"200\" y=\"110\" text-anchor=\"middle\">zone polygon<\/text><circle class=\"dg-accent\" cx=\"210\" cy=\"150\" r=\"6\"/><text class=\"dg-sub\" x=\"210\" y=\"180\" text-anchor=\"middle\">foot point<\/text><line class=\"dg-strokeB\" x1=\"470\" y1=\"30\" x2=\"470\" y2=\"180\"/><text class=\"dg-sub\" x=\"470\" y=\"22\" text-anchor=\"middle\">count line<\/text><line class=\"dg-line\" x1=\"420\" y1=\"105\" x2=\"533\" y2=\"105\"/><polygon class=\"dg-arrow\" points=\"533,100 540,105 533,110\"/><text class=\"dg-sub\" x=\"600\" y=\"100\" text-anchor=\"middle\">cross →<\/text><text class=\"dg-sub\" x=\"600\" y=\"118\" text-anchor=\"middle\">count once per ID<\/text><text class=\"dg-sub\" x=\"360\" y=\"202\" text-anchor=\"middle\">geometry + stats on top of boxes = the JD's logic layer<\/text><\/svg><figcaption>Turning boxes into business meaning<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is the JD's standout CV phrase: <em>\"command over geometry and statistics for designing complex logic layers on top of model detections.\"<\/em> The model gives you boxes; <em>you<\/em> turn boxes into business meaning — zones, counting, dwell time, line-crossing, real-world coordinates. It's geometry + a little statistics, and it's the CV topic most likely to go deep because it's where CV meets systems. <strong>Prepare to whiteboard one of these.<\/strong><\/div><\/div>\n<h2 id=\"the-pattern\">The pattern<\/h2>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <span class=\"node data\">model detections<span class=\"nsub\">boxes + classes + track IDs<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">geometry<span class=\"nsub\">which zone? crossed which line? where on the floor?<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">statistics / temporal<span class=\"nsub\">count, dwell time, rate, smoothing, dedupe<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node out\">events<span class=\"nsub\">\"3 forklifts in bay 2 for &gt;5 min\" · \"pallet crossed dock line\"<\/span><\/span>\n  <\/div>\n<\/div>\n<h2 id=\"core-geometric-primitives\">Core geometric primitives<\/h2>\n<ul><li><strong>Point-in-polygon<\/strong> — is an object inside a defined zone? Use the object's<\/li><\/ul>\n<p><em>anchor point<\/em> (usually bottom-center of the box = where it touches the floor),   not the box center. Ray-casting / <code>cv2.pointPolygonTest<\/code>.<\/p>\n<ul><li><strong>Line-crossing<\/strong> — did the object's track cross a virtual line (and in which<\/li><\/ul>\n<p>direction)? Check the sign of the cross product of the line vs the track segment   between consecutive frames; a sign flip = a crossing. Direction → in vs out.<\/p>\n<ul><li><strong>Distance / proximity<\/strong> — but <strong>in what space?<\/strong> Pixel distance is meaningless<\/li><\/ul>\n<p>(objects far from the camera look smaller). Convert foot points to the <strong>ground   plane via a homography<\/strong> (sec geometry/calibration), then measure in meters.<\/p>\n<ul><li><strong>ROI gating<\/strong> — only run logic for detections inside a region (the loading bay),<\/li><\/ul>\n<p>ignore the rest → cheaper and fewer false events.<\/p>\n<h2 id=\"counting-dwell-where-statistics-enters\">Counting &amp; dwell (where statistics enters)<\/h2>\n<ul><li><strong>Counting<\/strong> needs <strong>tracking<\/strong>, not just detection — otherwise you recount the<\/li><\/ul>\n<p>same object every frame. Count unique track IDs that cross the line.<\/p>\n<ul><li><strong>Dwell time<\/strong> = (last_seen − first_seen) for a track inside a zone.<\/li><li><strong>Temporal smoothing / debouncing<\/strong> — a detection flickers (present frame N, gone<\/li><\/ul>\n<p>N+1). Require K-of-N frames before firing an event so noise doesn't create false   counts. This is the statistics the JD means: rates, thresholds, smoothing, outlier   rejection over time.<\/p>\n<ul><li><strong>Hysteresis<\/strong> — different thresholds to <em>enter<\/em> vs <em>exit<\/em> a state, so an object<\/li><\/ul>\n<p>hovering on a boundary doesn't spam events.<\/p>\n<h2 id=\"worked-example-great-whiteboard-answer\">Worked example (great whiteboard answer)<\/h2>\n<p><em>\"Count forklifts entering a loading bay and flag any staying &gt;10 min.\"<\/em><\/p>\n<ol><li>Detect + track forklifts (YOLO + DeepSORT) → boxes with stable IDs.<\/li><li>Define the bay as a polygon (in image space, or on the ground plane).<\/li><li>For each track, take the bottom-center point; point-in-polygon test → inside?<\/li><li>Debounce: require the track inside for K consecutive frames before \"entered\"<\/li><\/ol>\n<p>(reject flicker).<\/p>\n<ol><li>Record <code>first_seen<\/code> per track in the zone; dwell = now − first_seen.<\/li><li>Fire \"entered\" on a line-cross/zone-enter (dedup by track ID so each forklift<\/li><\/ol>\n<p>counts once); fire \"overstay\" when dwell &gt; 10 min.<\/p>\n<ol><li>Emit events as metadata to the message bus (sec 06) — no full-frame egress.<\/li><\/ol>\n<p>That answer shows geometry (polygon, ground plane), statistics (debounce, dwell), tracking literacy, <em>and<\/em> the systems instinct (metadata out). It's the bullseye for this role.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Box center vs bottom-center for zone tests?<\/strong> Use bottom-center — it approximates where the object touches the floor, which is what zones are defined on. Box center sits in mid-air and misreads zone membership, especially for tall objects or oblique cameras.<\/p>\n<p><strong>Pixel distance vs ground-plane distance?<\/strong> Pixel distance is distorted by perspective (far objects look closer together). Map foot points to the ground plane via a homography and measure in real-world units — the only way distance/zone logic is correct across the frame.<\/p>\n<p><strong>Why debounce/smooth instead of acting on every frame?<\/strong> Per-frame detections flicker and jitter; acting raw produces false counts and event spam. Requiring K-of-N frames (and hysteresis on enter/exit) trades a few ms of latency for robust, trustworthy events — exactly the \"statistics layer\" the JD wants.<\/p>\n<p><strong>Why count track IDs, not detections?<\/strong> Detection fires every frame, so counting detections counts the same object hundreds of times. Counting unique track IDs (that cross a line / enter a zone) counts objects once — tracking is what makes counting correct.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Quick refresh: <strong><a class=\"mdlink\" data-href=\"cv-cheat-sheet.md\" href=\"#\">cv-cheat-sheet.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-pattern","text":"The pattern"},{"level":2,"id":"core-geometric-primitives","text":"Core geometric primitives"},{"level":2,"id":"counting-dwell-where-statistics-enters","text":"Counting &amp; dwell (where statistics enters)"},{"level":2,"id":"worked-example-great-whiteboard-answer","text":"Worked example (great whiteboard answer)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"logic layers on top of detections zone polygon foot point count line cross → count once per id geometry + stats on top of boxes = the jd's logic layer turning boxes into business meaning 💡 tl;dr this is the jd's standout cv phrase: \"command over geometry and statistics for designing complex logic layers on top of model detections.\" the model gives you boxes; you turn boxes into business meaning — zones, counting, dwell time, line-crossing, real-world coordinates. it's geometry + a little statistics, and it's the cv topic most likely to go deep because it's where cv meets systems. prepare to whiteboard one of these. the pattern model detections boxes + classes + track ids geometry which zone? crossed which line? where on the floor? statistics / temporal count, dwell time, rate, smoothing, dedupe events \"3 forklifts in bay 2 for >5 min\" · \"pallet crossed dock line\" core geometric primitives point-in-polygon — is an object inside a defined zone? use the object's anchor point (usually bottom-center of the box = where it touches the floor), not the box center. ray-casting / cv2.pointpolygontest . line-crossing — did the object's track cross a virtual line (and in which direction)? check the sign of the cross product of the line vs the track segment between consecutive frames; a sign flip = a crossing. direction → in vs out. distance / proximity — but in what space? pixel distance is meaningless (objects far from the camera look smaller). convert foot points to the ground plane via a homography (sec geometry/calibration), then measure in meters. roi gating — only run logic for detections inside a region (the loading bay), ignore the rest → cheaper and fewer false events. counting & dwell (where statistics enters) counting needs tracking , not just detection — otherwise you recount the same object every frame. count unique track ids that cross the line. dwell time = (last_seen − first_seen) for a track inside a zone. temporal smoothing / debouncing — a detection flickers (present frame n, gone n+1). require k-of-n frames before firing an event so noise doesn't create false counts. this is the statistics the jd means: rates, thresholds, smoothing, outlier rejection over time. hysteresis — different thresholds to enter vs exit a state, so an object hovering on a boundary doesn't spam events. worked example (great whiteboard answer) \"count forklifts entering a loading bay and flag any staying >10 min.\" detect + track forklifts (yolo + deepsort) → boxes with stable ids. define the bay as a polygon (in image space, or on the ground plane). for each track, take the bottom-center point; point-in-polygon test → inside? debounce: require the track inside for k consecutive frames before \"entered\" (reject flicker). record first_seen per track in the zone; dwell = now − first_seen. fire \"entered\" on a line-cross/zone-enter (dedup by track id so each forklift counts once); fire \"overstay\" when dwell > 10 min. emit events as metadata to the message bus (sec 06) — no full-frame egress. that answer shows geometry (polygon, ground plane), statistics (debounce, dwell), tracking literacy, and the systems instinct (metadata out). it's the bullseye for this role. why x over y box center vs bottom-center for zone tests? use bottom-center — it approximates where the object touches the floor, which is what zones are defined on. box center sits in mid-air and misreads zone membership, especially for tall objects or oblique cameras. pixel distance vs ground-plane distance? pixel distance is distorted by perspective (far objects look closer together). map foot points to the ground plane via a homography and measure in real-world units — the only way distance/zone logic is correct across the frame. why debounce/smooth instead of acting on every frame? per-frame detections flicker and jitter; acting raw produces false counts and event spam. requiring k-of-n frames (and hysteresis on enter/exit) trades a few ms of latency for robust, trustworthy events — exactly the \"statistics layer\" the jd wants. why count track ids, not detections? detection fires every frame, so counting detections counts the same object hundreds of times. counting unique track ids (that cross a line / enter a zone) counts objects once — tracking is what makes counting correct. → back to section readme · quick refresh: cv-cheat-sheet.md","words":709},{"path":"09-computer-vision-fundamentals/cv-cheat-sheet.md","title":"CV Cheat Sheet","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"cv-fundamentals-quick-refresh\">CV Fundamentals: Quick Refresh<\/h1>\n<p>One page for the classical-CV questions. Depth in the section files.<\/p>\n<hr>\n<h2 id=\"images-color\">Images &amp; color<\/h2>\n<ul><li>Image = numpy array <code>(H, W, C)<\/code>, usually <code>uint8<\/code> 0–255. Pixel ops = array slicing.<\/li><li><strong>OpenCV is BGR<\/strong>, most models want <strong>RGB<\/strong> → <code>cv2.cvtColor(..., COLOR_BGR2RGB)<\/code>.<\/li><\/ul>\n<p>Swapped channels = silent accuracy loss.<\/p>\n<ul><li>Decoders output <strong>YUV/NV12<\/strong> → convert to BGR, ideally on GPU (<code>nvvidconv<\/code>).<\/li><li><strong>HSV<\/strong> for color-based segmentation (hue is lighting-robust; RGB isn't).<\/li><\/ul>\n<h2 id=\"filtering-morphology\">Filtering &amp; morphology<\/h2>\n<ul><li>Everything classical = <strong>convolution<\/strong> (slide a kernel, weighted sum). CNN conv =<\/li><\/ul>\n<p>learned kernels.<\/p>\n<ul><li>Blur: <strong>Gaussian<\/strong> (general), <strong>median<\/strong> (salt-and-pepper), <strong>bilateral<\/strong> (smooth<\/li><\/ul>\n<p>but keep edges).<\/p>\n<ul><li>Threshold: <strong>adaptive<\/strong> beats global under uneven lighting; <strong>Otsu<\/strong> for bimodal.<\/li><li>Morphology: <strong>erode<\/strong> shrinks, <strong>dilate<\/strong> grows; <strong>opening<\/strong> removes specks,<\/li><\/ul>\n<p><strong>closing<\/strong> fills holes.<\/p>\n<ul><li>Edges: <strong>Canny<\/strong> = blur → Sobel gradient → non-max suppression → hysteresis<\/li><\/ul>\n<p>threshold (clean thin edges).<\/p>\n<h2 id=\"geometry-transforms\">Geometry &amp; transforms<\/h2>\n<ul><li>Homogeneous coords <code>(x,y,1)<\/code> make translation + projection a matrix multiply.<\/li><li><strong>Affine<\/strong> (2×3, 3 pts) keeps parallel lines: rotate/scale/shear/translate.<\/li><li><strong>Homography<\/strong> (3×3, 4 pts) models <strong>perspective<\/strong> (parallel lines converge) — the<\/li><\/ul>\n<p>transform for surround-view and <strong>mapping detections to the floor plane<\/strong>.<\/p>\n<ul><li>Interpolation: <strong>nearest<\/strong> for label/mask maps, <strong>bilinear<\/strong> for images.<\/li><\/ul>\n<h2 id=\"calibration\">Calibration<\/h2>\n<ul><li><strong>Intrinsics<\/strong> (K: fx,fy,cx,cy) + <strong>distortion<\/strong> (radial k1,k2,k3 / tangential<\/li><\/ul>\n<p>p1,p2); <strong>extrinsics<\/strong> (R,t) = pose in world.<\/p>\n<ul><li>Calibrate with a chessboard at many angles; judge by <strong>reprojection error<\/strong><\/li><\/ul>\n<p>(&lt;0.5px good).<\/p>\n<ul><li><strong>Fisheye<\/strong> needs OpenCV's dedicated model (pinhole leaves edge distortion).<\/li><li>Undistort once via precomputed remap (not <code>undistort<\/code> per frame).<\/li><\/ul>\n<h2 id=\"features-multi-view\">Features &amp; multi-view<\/h2>\n<ul><li>Detect <strong>corners<\/strong> (unique in all directions), describe, match.<\/li><li><strong>SIFT<\/strong> (float, L2, accurate) vs <strong>ORB<\/strong> (binary, Hamming, free, real-time/edge).<\/li><li><strong>RANSAC<\/strong> fits transforms robustly by ignoring outlier matches (4 pts for H).<\/li><li><strong>Fundamental matrix<\/strong> (uncalibrated) / <strong>Essential matrix<\/strong> (calibrated → gives<\/li><\/ul>\n<p>R,t). Epipolar line turns 2D match search into 1D. Triangulate → 3D.<\/p>\n<h2 id=\"detection-tracking-math\">Detection &amp; tracking math<\/h2>\n<ul><li><strong>IoU<\/strong> = overlap / union. <strong>NMS<\/strong> = sort by confidence, drop high-IoU duplicates.<\/li><li><strong>mAP<\/strong> = mean Average Precision; TP if IoU≥thresh. <code>mAP@0.5<\/code> vs COCO <code>@[.5:.95]<\/code>.<\/li><li><strong>YOLO<\/strong> = single forward pass → real-time (default for live video).<\/li><li><strong>Kalman<\/strong> predicts motion; <strong>Hungarian<\/strong> optimally assigns detections↔tracks.<\/li><li><strong>SORT<\/strong> = Kalman+IoU (fast, ID switches); <strong>DeepSORT<\/strong> adds appearance re-ID<\/li><\/ul>\n<p>(survives occlusion); <strong>ByteTrack<\/strong> uses low-conf boxes too.<\/p>\n<h2 id=\"logic-on-detections-the-jds-standout-be-ready-to-whiteboard\">Logic on detections (the JD's standout: be ready to whiteboard)<\/h2>\n<ul><li>Model gives boxes; <strong>you<\/strong> add geometry+stats: zones, counting, dwell, line-cross.<\/li><li><strong>Point-in-polygon<\/strong> with the box's <strong>bottom-center<\/strong> (where it meets the floor).<\/li><li><strong>Line-crossing<\/strong> via sign flip of cross product between frames → direction.<\/li><li>Real distance = map foot point to <strong>ground plane via homography<\/strong>, measure in<\/li><\/ul>\n<p>meters (pixels lie under perspective).<\/p>\n<ul><li><strong>Count unique track IDs<\/strong>, not detections. <strong>Debounce<\/strong> (K-of-N frames) +<\/li><\/ul>\n<p>hysteresis to kill flicker → trustworthy events.<\/p>\n<h2 id=\"your-cv-credibility-lines\">Your CV credibility lines<\/h2>\n<ul><li>Surround-view: fisheye undistort → perspective project to bird's-eye → stitch →<\/li><\/ul>\n<p>photometric blend.<\/p>\n<ul><li>Custom pedestrian tracker beating SORT on ARM. INT8/FP16 on Jetson. RANSAC,<\/li><\/ul>\n<p>SIFT/ORB, essential/fundamental matrix — all hands-on.<\/p>\n<p>→ Full detail: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"images-color","text":"Images &amp; color"},{"level":2,"id":"filtering-morphology","text":"Filtering &amp; morphology"},{"level":2,"id":"geometry-transforms","text":"Geometry &amp; transforms"},{"level":2,"id":"calibration","text":"Calibration"},{"level":2,"id":"features-multi-view","text":"Features &amp; multi-view"},{"level":2,"id":"detection-tracking-math","text":"Detection &amp; tracking math"},{"level":2,"id":"logic-on-detections-the-jds-standout-be-ready-to-whiteboard","text":"Logic on detections (the JD's standout: be ready to whiteboard)"},{"level":2,"id":"your-cv-credibility-lines","text":"Your CV credibility lines"}],"text":"cv fundamentals: quick refresh one page for the classical-cv questions. depth in the section files. images & color image = numpy array (h, w, c) , usually uint8 0–255. pixel ops = array slicing. opencv is bgr , most models want rgb → cv2.cvtcolor(..., color_bgr2rgb) . swapped channels = silent accuracy loss. decoders output yuv/nv12 → convert to bgr, ideally on gpu ( nvvidconv ). hsv for color-based segmentation (hue is lighting-robust; rgb isn't). filtering & morphology everything classical = convolution (slide a kernel, weighted sum). cnn conv = learned kernels. blur: gaussian (general), median (salt-and-pepper), bilateral (smooth but keep edges). threshold: adaptive beats global under uneven lighting; otsu for bimodal. morphology: erode shrinks, dilate grows; opening removes specks, closing fills holes. edges: canny = blur → sobel gradient → non-max suppression → hysteresis threshold (clean thin edges). geometry & transforms homogeneous coords (x,y,1) make translation + projection a matrix multiply. affine (2×3, 3 pts) keeps parallel lines: rotate/scale/shear/translate. homography (3×3, 4 pts) models perspective (parallel lines converge) — the transform for surround-view and mapping detections to the floor plane . interpolation: nearest for label/mask maps, bilinear for images. calibration intrinsics (k: fx,fy,cx,cy) + distortion (radial k1,k2,k3 / tangential p1,p2); extrinsics (r,t) = pose in world. calibrate with a chessboard at many angles; judge by reprojection error (<0.5px good). fisheye needs opencv's dedicated model (pinhole leaves edge distortion). undistort once via precomputed remap (not undistort per frame). features & multi-view detect corners (unique in all directions), describe, match. sift (float, l2, accurate) vs orb (binary, hamming, free, real-time/edge). ransac fits transforms robustly by ignoring outlier matches (4 pts for h). fundamental matrix (uncalibrated) / essential matrix (calibrated → gives r,t). epipolar line turns 2d match search into 1d. triangulate → 3d. detection & tracking math iou = overlap / union. nms = sort by confidence, drop high-iou duplicates. map = mean average precision; tp if iou≥thresh. map@0.5 vs coco @[.5:.95] . yolo = single forward pass → real-time (default for live video). kalman predicts motion; hungarian optimally assigns detections↔tracks. sort = kalman+iou (fast, id switches); deepsort adds appearance re-id (survives occlusion); bytetrack uses low-conf boxes too. logic on detections (the jd's standout: be ready to whiteboard) model gives boxes; you add geometry+stats: zones, counting, dwell, line-cross. point-in-polygon with the box's bottom-center (where it meets the floor). line-crossing via sign flip of cross product between frames → direction. real distance = map foot point to ground plane via homography , measure in meters (pixels lie under perspective). count unique track ids , not detections. debounce (k-of-n frames) + hysteresis to kill flicker → trustworthy events. your cv credibility lines surround-view: fisheye undistort → perspective project to bird's-eye → stitch → photometric blend. custom pedestrian tracker beating sort on arm. int8/fp16 on jetson. ransac, sift/orb, essential/fundamental matrix — all hands-on. → full detail: readme.md","words":472},{"path":"10-coding-practice/README.md","title":"Overview & What to Anticipate","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"10-coding-practice-proctored-round\">10: Coding Practice (Proctored Round)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Your KoiReader round on <strong>4 July<\/strong> is a <em>proctored, hands-on coding test<\/em> — camera on, screen shared, <strong>no AI, no copying full solutions<\/strong> (syntax Googling only). So the goal isn't to read these — it's to be able to <strong>type them from memory<\/strong>. KoiReader's product reads labels/barcodes/packages in supply-chain video, so expect <strong>practical OpenCV + image-processing + geometry + detection-logic<\/strong> tasks that <strong>produce output images<\/strong>, not LeetCode puzzles.<\/div><\/div>\n<blockquote><p><strong>Play with the code live.<\/strong> Every problem below is also a runnable Jupyter notebook. <strong><a class=\"mdlink\" data-href=\"JUPYTER\" href=\"#\">▶ Open the live notebooks ↗<\/a><\/strong> (or use the <em>Open live notebooks<\/em> button, top-left). That opens JupyterLab running on this same device — start it first with <code>bash run.sh<\/code>, or as the <code>koi-jupyter<\/code> service (see <a class=\"mdlink\" data-href=\"../RUN-PLAYGROUND.md\" href=\"#\">Live Playground<\/a>). Reading builds memory; running builds intuition. Use both.<\/p><\/blockquote>\n<h2 id=\"what-to-anticipate-ranked-by-likelihood\">What to anticipate (ranked by likelihood)<\/h2>\n<ol><li><strong>Image preprocessing for OCR/label reading<\/strong> — grayscale, blur, Otsu/adaptive<\/li><\/ol>\n<p>threshold, morphology, denoise, CLAHE. → <a class=\"mdlink\" data-href=\"image-processing-and-geometry.md\" href=\"#\">image-processing-and-geometry.md<\/a><\/p>\n<ol><li><strong>Geometry / perspective<\/strong> — the classic \"scan a receipt/label\": detect the<\/li><\/ol>\n<p>document quadrilateral and warp it flat (4-point perspective transform),    deskew, resize-with-padding. → same file. <strong>Very likely — practice this most.<\/strong><\/p>\n<ol><li><strong>Contours &amp; shape detection<\/strong> — Canny → findContours → bounding boxes, largest<\/li><\/ol>\n<p>rectangle, crop. → same file.<\/p>\n<ol><li><strong>Logic on detections<\/strong> — IoU, NMS, point-in-polygon (zones), line-crossing<\/li><\/ol>\n<p>counting, sorting OCR boxes into reading order. → <a class=\"mdlink\" data-href=\"detection-logic.md\" href=\"#\">detection-logic.md<\/a><\/p>\n<ol><li><strong>Video / stream processing<\/strong> — open a video (or RTSP), read frames robustly,<\/li><\/ol>\n<p>motion/frame-differencing, sample every Nth frame, annotate, save output.    → <a class=\"mdlink\" data-href=\"video-and-streaming.md\" href=\"#\">video-and-streaming.md<\/a><\/p>\n<ol><li><strong>Python + NumPy engineering<\/strong> — vectorization (no Python pixel loops), a<\/li><\/ol>\n<p>fault-tolerant batch processor, basic algorithm. → <a class=\"mdlink\" data-href=\"python-and-numpy.md\" href=\"#\">python-and-numpy.md<\/a><\/p>\n<ol><li><strong>Quick reference to memorize<\/strong> — <a class=\"mdlink\" data-href=\"opencv-cheat-sheet.md\" href=\"#\">opencv-cheat-sheet.md<\/a>.<\/li><\/ol>\n<h2 id=\"how-to-practice-this-week-4-days\">How to practice this week (4 days)<\/h2>\n<ul><li><strong>Type, don't read.<\/strong> Turn off Copilot/autocomplete and rewrite each solution<\/li><\/ul>\n<p>from a blank file until it flows. That's exactly the test condition.<\/p>\n<ul><li><strong>Run everything.<\/strong> <code>pip install opencv-python numpy<\/code>. Test each script on a<\/li><\/ul>\n<p>sample image (any photo / <code>cv2<\/code> works on jpg/png). Confirm it saves the output.<\/p>\n<ul><li><strong>Day 1:<\/strong> image-processing-and-geometry (preprocessing + perspective).<\/li><li><strong>Day 2:<\/strong> detection-logic + reading order.<\/li><li><strong>Day 3:<\/strong> video-and-streaming + python-and-numpy.<\/li><li><strong>Day 4 (test morning):<\/strong> re-type the 4-point transform, IoU, NMS, and a robust<\/li><\/ul>\n<p><code>cv2.VideoCapture<\/code> loop from memory; skim the cheat sheet.<\/p>\n<h2 id=\"submission-rules-baked-into-muscle-memory\">Submission rules baked into muscle memory<\/h2>\n<p>One file <strong>per problem<\/strong> · <code>.py<\/code> as-is, <strong><code>.ipynb<\/code> → export <code>.html<\/code><\/strong> · <strong>no zip<\/strong> · <strong>upload required output images<\/strong> to the OneDrive folder · email a confirmation when done · single attempt. Losing marks for submission format is the easiest way to fail — practice <em>saving named output files<\/em> as part of every solution.<\/p>\n<h2 id=\"minimal-boilerplate-to-start-any-problem\">Minimal boilerplate to start any problem<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\nimg = <span class=\"tok-builtin\">cv2<\/span>.imread(<span class=\"tok-string\">\"input.jpg\"<\/span>)          <span class=\"tok-comment\"># BGR, shape (H, W, 3), dtype uint8<\/span>\n<span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n    <span class=\"tok-keyword\">raise<\/span> FileNotFoundError(<span class=\"tok-string\">\"input.jpg\"<\/span>)  <span class=\"tok-comment\"># always guard reads (fault tolerance)<\/span>\n\n<span class=\"tok-comment\"># ... process ...<\/span>\n\n<span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"output.jpg\"<\/span>, result)      <span class=\"tok-comment\"># save the deliverable image<\/span>\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"saved output.jpg\"<\/span>, result.shape)<\/code><\/pre>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"image-processing-and-geometry.md\" href=\"#\">image-processing-and-geometry.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-to-anticipate-ranked-by-likelihood","text":"What to anticipate (ranked by likelihood)"},{"level":2,"id":"how-to-practice-this-week-4-days","text":"How to practice this week (4 days)"},{"level":2,"id":"submission-rules-baked-into-muscle-memory","text":"Submission rules baked into muscle memory"},{"level":2,"id":"minimal-boilerplate-to-start-any-problem","text":"Minimal boilerplate to start any problem"}],"text":"10: coding practice (proctored round) 💡 tl;dr your koireader round on 4 july is a proctored, hands-on coding test — camera on, screen shared, no ai, no copying full solutions (syntax googling only). so the goal isn't to read these — it's to be able to type them from memory . koireader's product reads labels/barcodes/packages in supply-chain video, so expect practical opencv + image-processing + geometry + detection-logic tasks that produce output images , not leetcode puzzles. play with the code live. every problem below is also a runnable jupyter notebook. ▶ open the live notebooks ↗ (or use the open live notebooks button, top-left). that opens jupyterlab running on this same device — start it first with bash run.sh , or as the koi-jupyter service (see live playground ). reading builds memory; running builds intuition. use both. what to anticipate (ranked by likelihood) image preprocessing for ocr/label reading — grayscale, blur, otsu/adaptive threshold, morphology, denoise, clahe. → image-processing-and-geometry.md geometry / perspective — the classic \"scan a receipt/label\": detect the document quadrilateral and warp it flat (4-point perspective transform), deskew, resize-with-padding. → same file. very likely — practice this most. contours & shape detection — canny → findcontours → bounding boxes, largest rectangle, crop. → same file. logic on detections — iou, nms, point-in-polygon (zones), line-crossing counting, sorting ocr boxes into reading order. → detection-logic.md video / stream processing — open a video (or rtsp), read frames robustly, motion/frame-differencing, sample every nth frame, annotate, save output. → video-and-streaming.md python + numpy engineering — vectorization (no python pixel loops), a fault-tolerant batch processor, basic algorithm. → python-and-numpy.md quick reference to memorize — opencv-cheat-sheet.md . how to practice this week (4 days) type, don't read. turn off copilot/autocomplete and rewrite each solution from a blank file until it flows. that's exactly the test condition. run everything. pip install opencv-python numpy . test each script on a sample image (any photo / cv2 works on jpg/png). confirm it saves the output. day 1: image-processing-and-geometry (preprocessing + perspective). day 2: detection-logic + reading order. day 3: video-and-streaming + python-and-numpy. day 4 (test morning): re-type the 4-point transform, iou, nms, and a robust cv2.videocapture loop from memory; skim the cheat sheet. submission rules baked into muscle memory one file per problem · .py as-is, .ipynb → export .html · no zip · upload required output images to the onedrive folder · email a confirmation when done · single attempt. losing marks for submission format is the easiest way to fail — practice saving named output files as part of every solution. minimal boilerplate to start any problem import cv2 import numpy as np img = cv2 .imread( \"input.jpg\" ) # bgr, shape (h, w, 3), dtype uint8 if img is none : raise filenotfounderror( \"input.jpg\" ) # always guard reads (fault tolerance) # ... process ... cv2 .imwrite( \"output.jpg\" , result) # save the deliverable image print ( \"saved output.jpg\" , result.shape) → start: image-processing-and-geometry.md","words":490},{"path":"10-coding-practice/image-processing-and-geometry.md","title":"Image Processing & Geometry","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"image-processing-geometry\">Image Processing &amp; Geometry<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is the heart of the test. Master the <strong>preprocessing chain<\/strong> (gray → blur → threshold → morphology) and the <strong>4-point perspective transform<\/strong> (detect a document/label quad and warp it flat). Everything here runs on a single image and saves an output image — exactly what the test asks for.<\/div><\/div>\n<p>Every solution is complete and runnable. Practice typing each from a blank file.<\/p>\n<hr>\n<h2 id=\"problem-1-preprocess-for-ocr-gray-blur-otsu-save\">Problem 1: Preprocess for OCR (gray → blur → Otsu → save)<\/h2>\n<p><strong>Tests:<\/strong> the fundamental chain, color conversion, thresholding, saving output.<\/p>\n<p><strong>The problem:<\/strong> an OCR engine can't read a color photo — it wants crisp black-and-white where ink is cleanly separated from paper. Turn a messy photo into exactly that.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">photo (3 channels)\n   |  cvtColor        drop color, keep brightness (1 channel)\n   v\ngray\n   |  GaussianBlur    smooth away sensor noise BEFORE deciding\n   v\nsmooth gray\n   |  Otsu threshold  every pixel becomes pure 0 or 255\n   v\nblack/white  --imwrite--&gt;  saved<\/code><\/pre>\n<p><strong>Why this way:<\/strong> a fixed cutoff like <code>127<\/code> breaks the moment lighting changes. Otsu instead looks at the image's brightness histogram and picks the split point that best separates \"dark pixels\" from \"bright pixels\" — zero tuning. And blur comes <em>first<\/em> because thresholding is a hard yes/no decision: one speck of noise near the cutoff flips into a black dot. Smooth before deciding, never after.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> preprocess(path, out=<span class=\"tok-string\">\"p1_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> FileNotFoundError(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    blurred = <span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(gray, (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>)     <span class=\"tok-comment\"># denoise before threshold<\/span>\n    <span class=\"tok-comment\"># Otsu auto-picks the threshold; THRESH_BINARY_INV makes text white on black<\/span>\n    _, binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(blurred, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, binary)\n    <span class=\"tok-keyword\">return<\/span> binary\n\n<span class=\"tok-keyword\">if<\/span> __name__ == <span class=\"tok-string\">\"__main__\"<\/span>:\n    preprocess(<span class=\"tok-string\">\"input.jpg\"<\/span>)<\/code><\/pre>\n<p><strong>Watch out:<\/strong> Otsu needs a <em>single-channel<\/em> image and <code>thresh=0<\/code>. Blur first or threshold gets speckly.<\/p>\n<hr>\n<h2 id=\"problem-2-clean-a-noisy-scanned-document-adaptive-threshold-morphology\">Problem 2: Clean a noisy scanned document (adaptive threshold + morphology)<\/h2>\n<p><strong>Tests:<\/strong> adaptive thresholding (uneven lighting) and morphology to remove specks.<\/p>\n<p><strong>The problem:<\/strong> real scans are unevenly lit — one corner sits in shadow. Any single global cutoff (even Otsu's) is then wrong <em>somewhere<\/em>: right for the bright side, hopeless for the dark side.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">uneven scan            ONE global cutoff           cutoff PER 31x31 window\n+------------+         +------------+              +------------+\n| text  #####| shadow  | text  #####|  shadow      | text  text |\n| text  #####| side    | text  #####|  swallowed   | text  text |\n+------------+         +------------+              +------------+\n                        global threshold            adaptiveThreshold<\/code><\/pre>\n<p><strong>Why this way:<\/strong> <code>adaptiveThreshold<\/code> recomputes the cutoff inside every small window, so each region is judged against its <em>own<\/em> lighting. The leftover salt noise is erased with morphological <strong>opening<\/strong> (erode → dilate): erosion deletes anything smaller than the kernel, dilation regrows the surviving text to full size. Flip to <strong>closing<\/strong> when the defect is holes inside strokes, not specks.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> clean_scan(path, out=<span class=\"tok-string\">\"p2_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path, <span class=\"tok-builtin\">cv2<\/span>.IMREAD_GRAYSCALE)\n    <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> FileNotFoundError(path)\n    <span class=\"tok-comment\"># adaptive: threshold computed per-region → robust to shadows/gradients<\/span>\n    binary = <span class=\"tok-builtin\">cv2<\/span>.adaptiveThreshold(img, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.ADAPTIVE_THRESH_GAUSSIAN_C,\n                                   <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY, blockSize=<span class=\"tok-number\">31<\/span>, C=<span class=\"tok-number\">10<\/span>)\n    kernel = <span class=\"tok-builtin\">cv2<\/span>.getStructuringElement(<span class=\"tok-builtin\">cv2<\/span>.MORPH_RECT, (<span class=\"tok-number\">2<\/span>, <span class=\"tok-number\">2<\/span>))\n    opened = <span class=\"tok-builtin\">cv2<\/span>.morphologyEx(binary, <span class=\"tok-builtin\">cv2<\/span>.MORPH_OPEN, kernel)   <span class=\"tok-comment\"># remove small noise<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, opened)\n    <span class=\"tok-keyword\">return<\/span> opened<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>blockSize<\/code> must be <strong>odd<\/strong>. Opening removes specks; closing fills holes — pick by whether your noise is dots (open) or gaps (close).<\/p>\n<hr>\n<h2 id=\"problem-3-deskew-a-rotated-document\">Problem 3: Deskew a rotated document<\/h2>\n<p><strong>Tests:<\/strong> geometry from foreground pixels, rotation matrix, warpAffine.<\/p>\n<p><strong>The problem:<\/strong> the page was scanned slightly rotated, so text lines are tilted and OCR row-grouping falls apart. Find the tilt angle, rotate it back.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> tilted ink pixels        fit ONE rotated box          rotate by -angle\n   \\  \\  \\  \\            .----------.                 __________\n    \\  \\  \\  \\    ==&gt;     | all text | angle=-12   ==&gt; |__________|\n     \\  \\  \\  \\           '----------'                  (upright)\n                          cv2.minAreaRect<\/code><\/pre>\n<p><strong>Why this way:<\/strong> you <em>could<\/em> detect individual lines (Hough) and average their angles, but <code>minAreaRect<\/code> answers in one call: collect every ink pixel, fit the tightest rotated rectangle around all of them, read its angle. The <code>&lt; -45<\/code> fix exists because OpenCV only reports angles within a 90° window — without the correction you'd sometimes \"deskew\" the page sideways. <code>BORDER_REPLICATE<\/code> fills the corners uncovered by rotation with edge colors instead of black wedges.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> deskew(path, out=<span class=\"tok-string\">\"p3_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(gray, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY_INV + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)[<span class=\"tok-number\">1<\/span>]\n    foreground_pixels = <span class=\"tok-builtin\">np<\/span>.column_stack(<span class=\"tok-builtin\">np<\/span>.where(binary &gt; <span class=\"tok-number\">0<\/span>))  <span class=\"tok-comment\"># (row, col) of text<\/span>\n    angle = <span class=\"tok-builtin\">cv2<\/span>.minAreaRect(foreground_pixels)[-<span class=\"tok-number\">1<\/span>]  <span class=\"tok-comment\"># angle of tightest box<\/span>\n    <span class=\"tok-keyword\">if<\/span> angle &lt; -<span class=\"tok-number\">45<\/span>:            <span class=\"tok-comment\"># OpenCV reports angle in a 90-deg range;<\/span>\n        angle = <span class=\"tok-number\">90<\/span> + angle     <span class=\"tok-comment\"># flip so we rotate the SHORT way, not 90-deg off<\/span>\n    (height, width) = img.shape[:<span class=\"tok-number\">2<\/span>]\n    rotation_matrix = <span class=\"tok-builtin\">cv2<\/span>.getRotationMatrix2D((width / <span class=\"tok-number\">2<\/span>, height / <span class=\"tok-number\">2<\/span>), angle, <span class=\"tok-number\">1.0<\/span>)\n    rotated = <span class=\"tok-builtin\">cv2<\/span>.warpAffine(img, rotation_matrix, (width, height),\n                             flags=<span class=\"tok-builtin\">cv2<\/span>.INTER_CUBIC,          <span class=\"tok-comment\"># smooth resample<\/span>\n                             borderMode=<span class=\"tok-builtin\">cv2<\/span>.BORDER_REPLICATE)  <span class=\"tok-comment\"># no black corners<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, rotated)\n    <span class=\"tok-keyword\">return<\/span> rotated<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>minAreaRect<\/code> angle conventions changed across OpenCV versions — know the <code>&lt; -45<\/code> correction and be ready to explain it.<\/p>\n<hr>\n<h2 id=\"problem-4-4-point-perspective-transform-scan-this-label\">Problem 4: 4-point perspective transform (\"scan this label\") ⭐<\/h2>\n<p><strong>Tests:<\/strong> the single most likely task. Detect the document's 4 corners and warp it to a flat top-down view. Memorize the <code>order_points<\/code> + <code>four_point_transform<\/code> pair cold.<\/p>\n<p><strong>The problem:<\/strong> a label photographed at an angle appears as a <em>trapezoid<\/em>. To read or measure it you need the flat, top-down rectangle — like a scanner sees.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">   detected corners                          warped output\n   TL._________.TR                          TL __________ TR\n     /         \\          3x3 perspective    |           |\n    /  LABEL    \\         matrix (getPersp   |  LABEL    |\n   /             \\        + warpPerspective) |           |\n  BL._____________.BR         ==&gt;            BL __________ BR\n  find quad: Canny -&gt; contours -&gt; approxPolyDP == 4 points<\/code><\/pre>\n<p><strong>Why this way:<\/strong> an affine warp (2×3 matrix: rotate/scale/shear) can <em>never<\/em> fix this — affine preserves parallelism, and perspective distortion is exactly parallel lines converging. You need the 3×3 homography, which is fully determined by 4 point pairs — hence \"4-point transform\". <code>order_points<\/code> exists because <code>getPerspectiveTransform<\/code> pairs source and destination corners <em>by array position<\/em>: hand it corners in a random order and the output comes out mirrored or rotated. The sum/diff trick identifies each corner without if-else chains.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> order_points(points):\n    <span class=\"tok-string\">\"\"\"Return corners as [top-left, top-right, bottom-right, bottom-left].\"\"\"<\/span>\n    ordered = <span class=\"tok-builtin\">np<\/span>.zeros((<span class=\"tok-number\">4<\/span>, <span class=\"tok-number\">2<\/span>), dtype=<span class=\"tok-string\">\"float32\"<\/span>)\n    coord_sum = points.<span class=\"tok-builtin\">sum<\/span>(axis=<span class=\"tok-number\">1<\/span>)\n    ordered[<span class=\"tok-number\">0<\/span>] = points[<span class=\"tok-builtin\">np<\/span>.argmin(coord_sum)]    <span class=\"tok-comment\"># top-left has smallest x+y<\/span>\n    ordered[<span class=\"tok-number\">2<\/span>] = points[<span class=\"tok-builtin\">np<\/span>.argmax(coord_sum)]    <span class=\"tok-comment\"># bottom-right has largest x+y<\/span>\n    coord_diff = <span class=\"tok-builtin\">np<\/span>.diff(points, axis=<span class=\"tok-number\">1<\/span>)\n    ordered[<span class=\"tok-number\">1<\/span>] = points[<span class=\"tok-builtin\">np<\/span>.argmin(coord_diff)]   <span class=\"tok-comment\"># top-right has smallest y-x<\/span>\n    ordered[<span class=\"tok-number\">3<\/span>] = points[<span class=\"tok-builtin\">np<\/span>.argmax(coord_diff)]   <span class=\"tok-comment\"># bottom-left has largest y-x<\/span>\n    <span class=\"tok-keyword\">return<\/span> ordered\n\n<span class=\"tok-keyword\">def<\/span> four_point_transform(image, points):\n    ordered = order_points(points)\n    (top_left, top_right, bottom_right, bottom_left) = ordered\n    width_bottom = <span class=\"tok-builtin\">np<\/span>.linalg.norm(bottom_right - bottom_left)\n    width_top = <span class=\"tok-builtin\">np<\/span>.linalg.norm(top_right - top_left)\n    out_width = <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-builtin\">max<\/span>(width_bottom, width_top))    <span class=\"tok-comment\"># output = longest measured side<\/span>\n    height_right = <span class=\"tok-builtin\">np<\/span>.linalg.norm(top_right - bottom_right)\n    height_left = <span class=\"tok-builtin\">np<\/span>.linalg.norm(top_left - bottom_left)\n    out_height = <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-builtin\">max<\/span>(height_right, height_left))\n    <span class=\"tok-comment\"># destination corners of a flat, axis-aligned rectangle (same order!)<\/span>\n    destination = <span class=\"tok-builtin\">np<\/span>.array([[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>], [out_width - <span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>],\n                            [out_width - <span class=\"tok-number\">1<\/span>, out_height - <span class=\"tok-number\">1<\/span>], [<span class=\"tok-number\">0<\/span>, out_height - <span class=\"tok-number\">1<\/span>]],\n                           dtype=<span class=\"tok-string\">\"float32\"<\/span>)\n    perspective_matrix = <span class=\"tok-builtin\">cv2<\/span>.getPerspectiveTransform(ordered, destination)\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">cv2<\/span>.warpPerspective(image, perspective_matrix, (out_width, out_height))\n\n<span class=\"tok-keyword\">def<\/span> scan(path, out=<span class=\"tok-string\">\"p4_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    ratio = img.shape[<span class=\"tok-number\">0<\/span>] / <span class=\"tok-number\">500.0<\/span>\n    resized = <span class=\"tok-builtin\">cv2<\/span>.resize(img, (<span class=\"tok-builtin\">int<\/span>(img.shape[<span class=\"tok-number\">1<\/span>] / ratio), <span class=\"tok-number\">500<\/span>))\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(resized, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(<span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(gray, (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">75<\/span>, <span class=\"tok-number\">200<\/span>)\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(edges, <span class=\"tok-builtin\">cv2<\/span>.RETR_LIST, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    contours = sorted(contours, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea, reverse=<span class=\"tok-keyword\">True<\/span>)[:<span class=\"tok-number\">5<\/span>]\n    document_corners = <span class=\"tok-keyword\">None<\/span>\n    <span class=\"tok-keyword\">for<\/span> contour <span class=\"tok-keyword\">in<\/span> contours:\n        perimeter = <span class=\"tok-builtin\">cv2<\/span>.arcLength(contour, <span class=\"tok-keyword\">True<\/span>)\n        corners = <span class=\"tok-builtin\">cv2<\/span>.approxPolyDP(contour, <span class=\"tok-number\">0.02<\/span> * perimeter, <span class=\"tok-keyword\">True<\/span>)  <span class=\"tok-comment\"># simplify<\/span>\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">len<\/span>(corners) == <span class=\"tok-number\">4<\/span>:                              <span class=\"tok-comment\"># found a quadrilateral<\/span>\n            document_corners = corners.reshape(<span class=\"tok-number\">4<\/span>, <span class=\"tok-number\">2<\/span>) * ratio  <span class=\"tok-comment\"># scale to full res<\/span>\n            <span class=\"tok-keyword\">break<\/span>\n    <span class=\"tok-keyword\">if<\/span> document_corners <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">\"no 4-corner document found\"<\/span>)\n    warped = four_point_transform(img, document_corners.astype(<span class=\"tok-string\">\"float32\"<\/span>))\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, warped)\n    <span class=\"tok-keyword\">return<\/span> warped<\/code><\/pre>\n<p><strong>

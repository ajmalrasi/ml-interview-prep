<span class=\"tok-builtin\">np<\/span>.maximum(<span class=\"tok-number\">0<\/span>, inter_x2 - inter_x1)\n        inter_h = <span class=\"tok-builtin\">np<\/span>.maximum(<span class=\"tok-number\">0<\/span>, inter_y2 - inter_y1)\n        intersection = inter_w * inter_h\n        overlaps = intersection / (areas[best] + areas[others] - intersection)\n        order = others[overlaps &lt; iou_thresh]   <span class=\"tok-comment\"># keep only low-overlap survivors<\/span>\n    <span class=\"tok-keyword\">return<\/span> keep<\/code><\/pre>\n<p><strong>Watch out:<\/strong> reuse <code>iou<\/code> from Problem 8 — interviewers love when you compose. Soft-NMS (decay scores instead of dropping) is the follow-up for crowded scenes.<\/p>\n<hr>\n<h2 id=\"problem-10-count-detections-inside-a-zone-point-in-polygon\">Problem 10: Count detections inside a zone (point-in-polygon)<\/h2>\n<p><strong>Tests:<\/strong> geometry on detections; using the <strong>bottom-center<\/strong> (foot) point, not the box center.<\/p>\n<p><strong>The problem:<\/strong> given detection boxes and a zone polygon, count who is IN the zone.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">      zone (on the floor)          a tall object, oblique camera:\n   +---------------+                 +----+\n   |               |                 |    | &lt;- box CENTER lands here\n   |      x &lt;------|---- foot        |    |    (inside the zone?!)\n   +---------------+                 |    |\n                                     | x  | &lt;- foot = ((x1+x2)/2, y2)\n                                     +----+    where it actually STANDS<\/code><\/pre>\n<p><strong>Why this way:<\/strong> zones are painted on the <em>floor<\/em>, and objects touch the world at their <em>feet<\/em> — with an angled camera, a box's geometric center can sit inside a zone the object isn't standing in. Using the bottom-center point is the standard fix (and a favorite interview gotcha). <code>cv2.pointPolygonTest<\/code> handles arbitrary polygons; pass <code>False<\/code> to get just the inside/on/outside sign — we don't need the distance, and skipping it is faster.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> count_in_zone(boxes, polygon):\n    <span class=\"tok-string\">\"\"\"polygon: list of (x,y). Counts boxes whose foot point is inside.\"\"\"<\/span>\n    polygon_pts = <span class=\"tok-builtin\">np<\/span>.array(polygon, dtype=<span class=\"tok-builtin\">np<\/span>.int32)\n    count = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> (x1, y1, x2, y2) <span class=\"tok-keyword\">in<\/span> boxes:\n        foot = (<span class=\"tok-builtin\">int<\/span>((x1 + x2) / <span class=\"tok-number\">2<\/span>), <span class=\"tok-builtin\">int<\/span>(y2))            <span class=\"tok-comment\"># bottom-center point<\/span>\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">cv2<\/span>.pointPolygonTest(polygon_pts, foot, <span class=\"tok-keyword\">False<\/span>) &gt;= <span class=\"tok-number\">0<\/span>:  <span class=\"tok-comment\"># &gt;=0 = inside/on<\/span>\n            count += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-keyword\">return<\/span> count<\/code><\/pre>\n<p><strong>Watch out:<\/strong> use the <strong>foot point<\/strong> (where the object meets the floor), not the geometric center — the standard gotcha for tall objects / oblique cameras.<\/p>\n<hr>\n<h2 id=\"problem-11-line-crossing-counter-direction-aware\">Problem 11: Line-crossing counter (direction-aware)<\/h2>\n<p><strong>Tests:<\/strong> tracking-style logic; cross-product sign to detect a crossing and its direction between consecutive frames.<\/p>\n<p><strong>The problem:<\/strong> count objects crossing a virtual line — separately for each direction (entering vs leaving).<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">             p_prev   (side +)\n  A ------------ line ------------ B\n             p_cur    (side -)\n\n side(p) = z of cross product (B-A) x (p-A)\n sign flips between consecutive frames  ==&gt;  the track crossed\n which sign it ENDS on                  ==&gt;  which direction<\/code><\/pre>\n<p><strong>Why this way:<\/strong> comparing raw x or y coordinates only works for perfectly vertical/horizontal lines; the cross-product sign works for a line at <em>any<\/em> angle and gives direction for free. Counting per <strong>track id<\/strong> (not per frame) is essential — one person crossing would otherwise be counted at every frame near the line. In production you'd also debounce (require K of N frames on the new side) to survive detector flicker.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> side(line_a, line_b, p):\n    <span class=\"tok-string\">\"\"\"Sign of which side of line (a-&gt;b) point p is on (cross product z).\"\"\"<\/span>\n    <span class=\"tok-keyword\">return<\/span> ((line_b[<span class=\"tok-number\">0<\/span>] - line_a[<span class=\"tok-number\">0<\/span>]) * (p[<span class=\"tok-number\">1<\/span>] - line_a[<span class=\"tok-number\">1<\/span>]) -\n            (line_b[<span class=\"tok-number\">1<\/span>] - line_a[<span class=\"tok-number\">1<\/span>]) * (p[<span class=\"tok-number\">0<\/span>] - line_a[<span class=\"tok-number\">0<\/span>]))   <span class=\"tok-comment\"># &gt;0 / &lt;0 / 0=on line<\/span>\n\n<span class=\"tok-keyword\">def<\/span> count_crossings(tracks, line_a, line_b):\n    <span class=\"tok-string\">\"\"\"tracks: {id: [(x,y) per frame]}. Returns (in_count, out_count).\"\"\"<\/span>\n    entering = leaving = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> path <span class=\"tok-keyword\">in<\/span> tracks.values():\n        <span class=\"tok-keyword\">for<\/span> prev_point, cur_point <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">zip<\/span>(path, path[<span class=\"tok-number\">1<\/span>:]):   <span class=\"tok-comment\"># consecutive frames<\/span>\n            side_prev = side(line_a, line_b, prev_point)\n            side_cur = side(line_a, line_b, cur_point)\n            <span class=\"tok-keyword\">if<\/span> side_prev == <span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">or<\/span> side_cur == <span class=\"tok-number\">0<\/span>:   <span class=\"tok-comment\"># exactly ON the line: skip<\/span>\n                <span class=\"tok-keyword\">continue<\/span>\n            <span class=\"tok-keyword\">if<\/span> (side_prev &gt; <span class=\"tok-number\">0<\/span>) != (side_cur &gt; <span class=\"tok-number\">0<\/span>):   <span class=\"tok-comment\"># sign flipped → crossed<\/span>\n                <span class=\"tok-keyword\">if<\/span> side_cur &gt; <span class=\"tok-number\">0<\/span>: entering += <span class=\"tok-number\">1<\/span>\n                <span class=\"tok-keyword\">else<\/span>: leaving += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-keyword\">return<\/span> entering, leaving<\/code><\/pre>\n<p><strong>Watch out:<\/strong> count <strong>per track id<\/strong> so one object is counted once per crossing, not once per frame. Debounce flicker in real systems (K-of-N frames).<\/p>\n<hr>\n<h2 id=\"problem-12-sort-ocr-boxes-into-reading-order\">Problem 12: Sort OCR boxes into reading order<\/h2>\n<p><strong>Tests:<\/strong> turning detections into text order — group into rows, then left-to-right.<\/p>\n<p><strong>The problem:<\/strong> OCR returns word boxes in arbitrary order; reconstruct the order a human would read them in.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> naive sort by (y, x) fails:  same-line words differ by a few px in y,\n                              so the sort interleaves lines:\n                              word(y=10) word(y=12) word(y=11) ...\n\n fix: 1. sort by y      2. group into ROWS with a tolerance\n      3. sort each row by x     4. concatenate rows<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the tolerance (about half the text height) is what makes row grouping robust to slightly wavy or tilted scans; the running-average row anchor keeps a long row from drifting. A single lexicographic sort has no such slack — it's the bug interviewers expect you to know about. This exact \"logic on top of an OCR model\" is KoiReader's bread and butter.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> reading_order(boxes, row_tol=<span class=\"tok-number\">15<\/span>):\n    <span class=\"tok-string\">\"\"\"boxes: list of (x1,y1,x2,y2). Returns indices in reading order.\"\"\"<\/span>\n    order = <span class=\"tok-builtin\">list<\/span>(<span class=\"tok-builtin\">range<\/span>(<span class=\"tok-builtin\">len<\/span>(boxes)))\n    order.sort(key=<span class=\"tok-keyword\">lambda<\/span> i: boxes[i][<span class=\"tok-number\">1<\/span>])         <span class=\"tok-comment\"># by top y first<\/span>\n    rows, current_row, current_row_y = [], [], <span class=\"tok-keyword\">None<\/span>\n    <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> order:\n        box_center_y = (boxes[i][<span class=\"tok-number\">1<\/span>] + boxes[i][<span class=\"tok-number\">3<\/span>]) / <span class=\"tok-number\">2<\/span>\n        <span class=\"tok-keyword\">if<\/span> current_row_y <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span> <span class=\"tok-keyword\">or<\/span> <span class=\"tok-builtin\">abs<\/span>(box_center_y - current_row_y) &lt;= row_tol:\n            current_row.append(i)                 <span class=\"tok-comment\"># same line of text<\/span>\n            current_row_y = (box_center_y <span class=\"tok-keyword\">if<\/span> current_row_y <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>\n                             <span class=\"tok-keyword\">else<\/span> (current_row_y + box_center_y) / <span class=\"tok-number\">2<\/span>)  <span class=\"tok-comment\"># running avg<\/span>\n        <span class=\"tok-keyword\">else<\/span>:\n            rows.append(current_row)              <span class=\"tok-comment\"># row finished, start a new one<\/span>\n            current_row, current_row_y = [i], box_center_y\n    <span class=\"tok-keyword\">if<\/span> current_row:\n        rows.append(current_row)\n    result = []\n    <span class=\"tok-keyword\">for<\/span> row <span class=\"tok-keyword\">in<\/span> rows:\n        row.sort(key=<span class=\"tok-keyword\">lambda<\/span> i: boxes[i][<span class=\"tok-number\">0<\/span>])       <span class=\"tok-comment\"># within a row, left to right<\/span>\n        result.extend(row)\n    <span class=\"tok-keyword\">return<\/span> result<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>row_tol<\/code> groups boxes into the same line; tune to text height. This is exactly the kind of \"logic on top of an OCR model\" KoiReader builds.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"video-and-streaming.md\" href=\"#\">video-and-streaming.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"problem-8-iou-of-two-boxes","text":"Problem 8: IoU of two boxes"},{"level":2,"id":"problem-9-non-maximum-suppression-from-scratch","text":"Problem 9: Non-Maximum Suppression (from scratch)"},{"level":2,"id":"problem-10-count-detections-inside-a-zone-point-in-polygon","text":"Problem 10: Count detections inside a zone (point-in-polygon)"},{"level":2,"id":"problem-11-line-crossing-counter-direction-aware","text":"Problem 11: Line-crossing counter (direction-aware)"},{"level":2,"id":"problem-12-sort-ocr-boxes-into-reading-order","text":"Problem 12: Sort OCR boxes into reading order"}],"text":"detection logic 💡 tl;dr the jd's \"complex logic layers on top of model detections.\" you'll get boxes (or points) and be asked to compute something: iou , nms , who's inside a zone , who crossed a line , or the reading order of ocr boxes. pure python + numpy — no model needed. these are classic, so know them cold. problem 8: iou of two boxes tests: the fundamental box metric; coordinate math; the empty-overlap edge case. the problem: score how much two boxes agree, as a number in [0, 1] — the currency of all detection logic (nms, evaluation, tracker matching). the plan: +-------+ | a | iou = overlap / (areaa + areab - overlap) | +---+----+ | |###| | ### intersection rectangle: +---+---+ | its left = max(a.left, b.left) | b | its right = min(a.right, b.right) +--------+ (same idea for top/bottom) why this way: the intersection of two ranges on one axis is simply [max(starts), min(ends)] — do that for x and for y, multiply the two lengths. the max(0, ...) clamp is the whole edge case: for disjoint boxes min-max goes negative and would fabricate overlap. and union must subtract the intersection, or the shared area is counted twice. def iou(a, b): \"\"\"boxes as (x1, y1, x2, y2). returns intersection-over-union in [0,1].\"\"\" ix1, iy1 = max (a[ 0 ], b[ 0 ]), max (a[ 1 ], b[ 1 ]) # intersection top-left ix2, iy2 = min (a[ 2 ], b[ 2 ]), min (a[ 3 ], b[ 3 ]) # intersection bottom-right iw, ih = max ( 0 , ix2 - ix1), max ( 0 , iy2 - iy1) # clamp at 0 → no overlap inter = iw * ih area_a = (a[ 2 ] - a[ 0 ]) * (a[ 3 ] - a[ 1 ]) area_b = (b[ 2 ] - b[ 0 ]) * (b[ 3 ] - b[ 1 ]) union = area_a + area_b - inter # don't double-count the overlap return inter / union if union > 0 else 0.0 if __name__ == \"__main__\" : print (iou(( 0 , 0 , 10 , 10 ), ( 5 , 5 , 15 , 15 ))) # 25 / 175 = 0.142... watch out: the max(0, ...) clamp — without it, non-overlapping boxes give a bogus positive area. problem 9: non-maximum suppression (from scratch) tests: the dedup algorithm every detector needs. sort by score, greedily keep the best, drop high-iou neighbours. the problem: a detector fires several overlapping boxes on the same object. keep exactly one box per object. the plan: scores: a=0.9 b=0.8 c=0.7 1. take best remaining: a -> keep 2. iou(a,b)=0.8 (same object) -> drop b iou(a,c)=0.0 (elsewhere) -> c survives 3. take best remaining: c -> keep result: [a, c] why this way: greedy-by-confidence works because the highest-score box is usually the best-localized one — lock it in, delete everything that mostly overlaps it. the plain-python version shows the algorithm; the numpy version exists because the inner iou loop is o(n²) — vectorizing \"winner vs all survivors\" into one array pass is what makes thousands of boxes per frame feasible. name the follow-up: soft-nms decays scores instead of deleting, for crowded scenes where two real objects genuinely overlap. def nms(boxes, scores, iou_thresh= 0.5 ): \"\"\"boxes: list of (x1,y1,x2,y2); scores: list of floats. returns kept indices.\"\"\" candidates = sorted( range ( len (boxes)), key= lambda i: scores[i], reverse= true ) # best first keep = [] while candidates: best = candidates.pop( 0 ) # highest score still in play keep.append(best) candidates = [i for i in candidates # drop everything that if iou(boxes[best], boxes[i]) < iou_thresh] # overlaps the winner return keep numpy/vectorized version (worth knowing for \"make it fast\"): import numpy as np def nms_np(boxes, scores, iou_thresh= 0.5 ): boxes = np .asarray(boxes, dtype= float ) x1, y1, x2, y2 = boxes.t # columns → four 1-d arrays areas = (x2 - x1) * (y2 - y1) order = scores.argsort()[::- 1 ] # indices, highest score first keep = [] while order.size > 0 : best = order[ 0 ]; keep.append(best) others = order[ 1 :] # iou of `best` vs all remaining boxes at once (no inner loop) inter_x1 = np .maximum(x1[best], x1[others]) inter_y1 = np .maximum(y1[best], y1[others]) inter_x2 = np .minimum(x2[best], x2[others]) inter_y2 = np .minimum(y2[best], y2[others]) inter_w = np .maximum( 0 , inter_x2 - inter_x1) inter_h = np .maximum( 0 , inter_y2 - inter_y1) intersection = inter_w * inter_h overlaps = intersection / (areas[best] + areas[others] - intersection) order = others[overlaps < iou_thresh] # keep only low-overlap survivors return keep watch out: reuse iou from problem 8 — interviewers love when you compose. soft-nms (decay scores instead of dropping) is the follow-up for crowded scenes. problem 10: count detections inside a zone (point-in-polygon) tests: geometry on detections; using the bottom-center (foot) point, not the box center. the problem: given detection boxes and a zone polygon, count who is in the zone. the plan: zone (on the floor) a tall object, oblique camera: +---------------+ +----+ | | | | <- box center lands here | x <------|---- foot | | (inside the zone?!) +---------------+ | | | x | <- foot = ((x1+x2)/2, y2) +----+ where it actually stands why this way: zones are painted on the floor , and objects touch the world at their feet — with an angled camera, a box's geometric center can sit inside a zone the object isn't standing in. using the bottom-center point is the standard fix (and a favorite interview gotcha). cv2.pointpolygontest handles arbitrary polygons; pass false to get just the inside/on/outside sign — we don't need the distance, and skipping it is faster. import cv2 import numpy as np def count_in_zone(boxes, polygon): \"\"\"polygon: list of (x,y). counts boxes whose foot point is inside.\"\"\" polygon_pts = np .array(polygon, dtype= np .int32) count = 0 for (x1, y1, x2, y2) in boxes: foot = ( int ((x1 + x2) / 2 ), int (y2)) # bottom-center point if cv2 .pointpolygontest(polygon_pts, foot, false ) >= 0 : # >=0 = inside/on count += 1 return count watch out: use the foot point (where the object meets the floor), not the geometric center — the standard gotcha for tall objects / oblique cameras. problem 11: line-crossing counter (direction-aware) tests: tracking-style logic; cross-product sign to detect a crossing and its direction between consecutive frames. the problem: count objects crossing a virtual line — separately for each direction (entering vs leaving). the plan: p_prev (side +) a ------------ line ------------ b p_cur (side -) side(p) = z of cross product (b-a) x (p-a) sign flips between consecutive frames ==> the track crossed which sign it ends on ==> which direction why this way: comparing raw x or y coordinates only works for perfectly vertical/horizontal lines; the cross-product sign works for a line at any angle and gives direction for free. counting per track id (not per frame) is essential — one person crossing would otherwise be counted at every frame near the line. in production you'd also debounce (require k of n frames on the new side) to survive detector flicker. def side(line_a, line_b, p): \"\"\"sign of which side of line (a->b) point p is on (cross product z).\"\"\" return ((line_b[ 0 ] - line_a[ 0 ]) * (p[ 1 ] - line_a[ 1 ]) - (line_b[ 1 ] - line_a[ 1 ]) * (p[ 0 ] - line_a[ 0 ])) # >0 / <0 / 0=on line def count_crossings(tracks, line_a, line_b): \"\"\"tracks: {id: [(x,y) per frame]}. returns (in_count, out_count).\"\"\" entering = leaving = 0 for path in tracks.values(): for prev_point, cur_point in zip (path, path[ 1 :]): # consecutive frames side_prev = side(line_a, line_b, prev_point) side_cur = side(line_a, line_b, cur_point) if side_prev == 0 or side_cur == 0 : # exactly on the line: skip continue if (side_prev > 0 ) != (side_cur > 0 ): # sign flipped → crossed if side_cur > 0 : entering += 1 else : leaving += 1 return entering, leaving watch out: count per track id so one object is counted once per crossing, not once per frame. debounce flicker in real systems (k-of-n frames). problem 12: sort ocr boxes into reading order tests: turning detections into text order — group into rows, then left-to-right. the problem: ocr returns word boxes in arbitrary order; reconstruct the order a human would read them in. the plan: naive sort by (y, x) fails: same-line words differ by a few px in y, so the sort interleaves lines: word(y=10) word(y=12) word(y=11) ... fix: 1. sort by y 2. group into rows with a tolerance 3. sort each row by x 4. concatenate rows why this way: the tolerance (about half the text height) is what makes row grouping robust to slightly wavy or tilted scans; the running-average row anchor keeps a long row from drifting. a single lexicographic sort has no such slack — it's the bug interviewers expect you to know about. this exact \"logic on top of an ocr model\" is koireader's bread and butter. def reading_order(boxes, row_tol= 15 ): \"\"\"boxes: list of (x1,y1,x2,y2). returns indices in reading order.\"\"\" order = list ( range ( len (boxes))) order.sort(key= lambda i: boxes[i][ 1 ]) # by top y first rows, current_row, current_row_y = [], [], none for i in order: box_center_y = (boxes[i][ 1 ] + boxes[i][ 3 ]) / 2 if current_row_y is none or abs (box_center_y - current_row_y) <= row_tol: current_row.append(i) # same line of text current_row_y = (box_center_y if current_row_y is none else (current_row_y + box_center_y) / 2 ) # running avg else : rows.append(current_row) # row finished, start a new one current_row, current_row_y = [i], box_center_y if current_row: rows.append(current_row) result = [] for row in rows: row.sort(key= lambda i: boxes[i][ 0 ]) # within a row, left to right result.extend(row) return result watch out: row_tol groups boxes into the same line; tune to text height. this is exactly the kind of \"logic on top of an ocr model\" koireader builds. → next: video-and-streaming.md","words":1673},{"path":"10-coding-practice/video-and-streaming.md","title":"Video & Streaming","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"video-streaming\">Video &amp; Streaming<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Expect \"process this video\": open it, read frames in a loop <strong>with a guard for failed reads<\/strong>, do something per frame (motion, sample, annotate), and <strong>write an output video or frames<\/strong>. The robust <code>cv2.VideoCapture<\/code> loop is the one to have in muscle memory — it doubles as your fault-tolerance answer.<\/div><\/div>\n<hr>\n<h2 id=\"problem-13-robust-capture-read-sample-every-nth-frame-save\">Problem 13: Robust capture: read, sample every Nth frame, save<\/h2>\n<p><strong>Tests:<\/strong> the capture loop, failure handling, frame sampling, releasing resources.<\/p>\n<p><strong>The problem:<\/strong> open a video (file or RTSP stream), keep every Nth frame as an image, and don't crash or leak when the source misbehaves.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> frames:   0   1  ...  14  [15]  16 ...  29  [30]     every=15\n          save                save            save\n\n the loop that matters:\n    while True:  ok, frame = cap.read()\n                 if not ok: break         &lt;- EOF *or* dropped stream\n    finally:     cap.release()            &lt;- runs no matter what<\/code><\/pre>\n<p><strong>Why this way:<\/strong> count-and-modulo beats seeking — jumping around with <code>CAP_PROP_POS_FRAMES<\/code> is unreliable on many codecs (seeks snap to keyframes), while sequential reading is always exact. The <code>ok<\/code> guard and <code>finally: release<\/code> ARE the fault-tolerance answer: streams end without warning, and leaked capture handles are how long-running services die slowly. For live RTSP, wrap the whole thing in reconnect-with-backoff.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> os\n\n<span class=\"tok-keyword\">def<\/span> sample_frames(source, out_dir=<span class=\"tok-string\">\"frames\"<\/span>, every=<span class=\"tok-number\">15<\/span>):\n    <span class=\"tok-string\">\"\"\"source: a video path or RTSP url. Saves every Nth frame as an image.\"\"\"<\/span>\n    os.makedirs(out_dir, exist_ok=<span class=\"tok-keyword\">True<\/span>)\n    cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(source)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> cap.isOpened():\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">f\"cannot open {source}\"<\/span>)\n    frame_index = saved_count = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">try<\/span>:\n        <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n            ok, frame = cap.read()\n            <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:                       <span class=\"tok-comment\"># end of file OR dropped stream<\/span>\n                <span class=\"tok-keyword\">break<\/span>\n            <span class=\"tok-keyword\">if<\/span> frame_index % every == <span class=\"tok-number\">0<\/span>:\n                filename = os.path.join(out_dir, <span class=\"tok-string\">f\"frame_{frame_index:05d}.jpg\"<\/span>)\n                <span class=\"tok-builtin\">cv2<\/span>.imwrite(filename, frame)\n                saved_count += <span class=\"tok-number\">1<\/span>\n            frame_index += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-keyword\">finally<\/span>:\n        cap.release()                        <span class=\"tok-comment\"># ALWAYS release (no leaks)<\/span>\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"read {frame_index} frames, saved {saved_count}\"<\/span>)\n    <span class=\"tok-keyword\">return<\/span> saved_count<\/code><\/pre>\n<p><strong>Watch out:<\/strong> check <code>isOpened()<\/code>, handle <code>ok == False<\/code> (don't assume frames keep coming), and <code>release()<\/code> in a <code>finally<\/code>. For live RTSP you'd wrap this in a reconnect-with-backoff loop (see the fault-tolerance chapter).<\/p>\n<hr>\n<h2 id=\"problem-14-motion-detection-via-frame-differencing-write-annotated-video\">Problem 14: Motion detection via frame differencing, write annotated video<\/h2>\n<p><strong>Tests:<\/strong> per-frame processing, background diff, contours on a mask, <code>VideoWriter<\/code>.<\/p>\n<p><strong>The problem:<\/strong> find and box the <em>moving<\/em> things in a video, writing an annotated copy.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> prev frame    cur frame     absdiff      threshold     dilate+contours\n [.......]  vs [...o...] ==&gt; [...#...] ==&gt; [...#...] ==&gt; [..[box]..]\n (blur both first - otherwise sensor noise \"moves\" in every pixel)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> frame differencing needs zero training and one frame of state — the right first answer. Know its weakness out loud: it detects <em>change<\/em>, so an object that stops moving disappears. The production upgrade is <code>cv2.createBackgroundSubtractorMOG2()<\/code>, which learns the background over time and tolerates gradual lighting change. Practical trap: <code>VideoWriter<\/code> silently produces an empty file if the frame size doesn't match — always pass the real width/height.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> detect_motion(source, out=<span class=\"tok-string\">\"p14_out.mp4\"<\/span>, min_area=<span class=\"tok-number\">800<\/span>):\n    cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(source)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> cap.isOpened():\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">f\"cannot open {source}\"<\/span>)\n    fps = cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FPS) <span class=\"tok-keyword\">or<\/span> <span class=\"tok-number\">25<\/span>            <span class=\"tok-comment\"># some sources report 0<\/span>\n    width = <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_WIDTH))\n    height = <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_HEIGHT))\n    fourcc = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter_fourcc(*<span class=\"tok-string\">\"mp4v\"<\/span>)         <span class=\"tok-comment\"># codec for .mp4<\/span>\n    writer = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter(out, fourcc, fps, (width, height))\n    prev_gray = <span class=\"tok-keyword\">None<\/span>                                 <span class=\"tok-comment\"># nothing to diff on frame 1<\/span>\n    <span class=\"tok-keyword\">try<\/span>:\n        <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n            ok, frame = cap.read()\n            <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:\n                <span class=\"tok-keyword\">break<\/span>\n            gray = <span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(<span class=\"tok-builtin\">cv2<\/span>.cvtColor(frame, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY),\n                                    (<span class=\"tok-number\">21<\/span>, <span class=\"tok-number\">21<\/span>), <span class=\"tok-number\">0<\/span>)\n            <span class=\"tok-keyword\">if<\/span> prev_gray <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span>:\n                frame_diff = <span class=\"tok-builtin\">cv2<\/span>.absdiff(prev_gray, gray)   <span class=\"tok-comment\"># |previous - current|<\/span>\n                motion_mask = <span class=\"tok-builtin\">cv2<\/span>.threshold(frame_diff, <span class=\"tok-number\">25<\/span>, <span class=\"tok-number\">255<\/span>,\n                                            <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY)[<span class=\"tok-number\">1<\/span>]  <span class=\"tok-comment\"># keep big changes<\/span>\n                motion_mask = <span class=\"tok-builtin\">cv2<\/span>.dilate(motion_mask, <span class=\"tok-keyword\">None<\/span>, iterations=<span class=\"tok-number\">2<\/span>)  <span class=\"tok-comment\"># merge blobs<\/span>\n                contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(motion_mask, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL,\n                                               <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n                <span class=\"tok-keyword\">for<\/span> contour <span class=\"tok-keyword\">in<\/span> contours:\n                    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">cv2<\/span>.contourArea(contour) &lt; min_area:  <span class=\"tok-comment\"># ignore tiny flicker<\/span>\n                        <span class=\"tok-keyword\">continue<\/span>\n                    x, y, box_w, box_h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(contour)\n                    <span class=\"tok-builtin\">cv2<\/span>.rectangle(frame, (x, y), (x + box_w, y + box_h),\n                                  (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n            writer.write(frame)\n            prev_gray = gray                 <span class=\"tok-comment\"># current frame becomes the baseline<\/span>\n    <span class=\"tok-keyword\">finally<\/span>:\n        cap.release(); writer.release()      <span class=\"tok-comment\"># ALWAYS release both (no leaks)<\/span>\n    <span class=\"tok-keyword\">return<\/span> out<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>VideoWriter<\/code> size must match the frames you write, or you get an empty file. Blur before diff to kill sensor noise. <code>fourcc<\/code> \"mp4v\" for <code>.mp4<\/code>.<\/p>\n<hr>\n<h2 id=\"problem-15-overlay-fps-text-and-count-frames\">Problem 15: Overlay FPS / text and count frames<\/h2>\n<p><strong>Tests:<\/strong> drawing text, reading video properties, simple per-frame overlay.<\/p>\n<p><strong>The problem:<\/strong> overlay live diagnostics (frame number, throughput) on each frame — the \"prove your pipeline keeps up\" task.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> read frame -&gt; putText(\"frame N   X fps\") -&gt; writer.write(frame)\n\n measured fps = frames processed / wall-clock time\n (NOT the file's metadata fps - that's just its playback rate)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> measured fps is the number that answers \"is my processing real-time?\" — comparing it against the source fps tells you if you're falling behind. The drawing gotchas to memorize: <code>putText<\/code> coordinates are the <strong>bottom-left<\/strong> of the text (not top-left), coordinates are (x, y), and colors are BGR — yellow is <code>(0, 255, 255)<\/code>.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>, time\n\n<span class=\"tok-keyword\">def<\/span> annotate(source, out=<span class=\"tok-string\">\"p15_out.mp4\"<\/span>):\n    cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(source)\n    fps = cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FPS) <span class=\"tok-keyword\">or<\/span> <span class=\"tok-number\">25<\/span>\n    width, height = (<span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_WIDTH)),\n                     <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_HEIGHT)))\n    writer = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter(out, <span class=\"tok-builtin\">cv2<\/span>.VideoWriter_fourcc(*<span class=\"tok-string\">\"mp4v\"<\/span>), fps,\n                             (width, height))\n    frame_count, start_time = <span class=\"tok-number\">0<\/span>, time.time()\n    <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n        ok, frame = cap.read()\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:\n            <span class=\"tok-keyword\">break<\/span>\n        frame_count += <span class=\"tok-number\">1<\/span>\n        measured_fps = frame_count / (time.time() - start_time + 1e-<span class=\"tok-number\">9<\/span>)  <span class=\"tok-comment\"># avoid /0<\/span>\n        <span class=\"tok-builtin\">cv2<\/span>.putText(frame, <span class=\"tok-string\">f\"frame {frame_count}  {measured_fps:4.1f} fps\"<\/span>,\n                    (<span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">30<\/span>),                        <span class=\"tok-comment\"># (x, y) of text bottom-left<\/span>\n                    <span class=\"tok-builtin\">cv2<\/span>.FONT_HERSHEY_SIMPLEX, <span class=\"tok-number\">0.8<\/span>, (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">255<\/span>), <span class=\"tok-number\">2<\/span>)  <span class=\"tok-comment\"># BGR yellow<\/span>\n        writer.write(frame)\n    cap.release(); writer.release()\n    <span class=\"tok-keyword\">return<\/span> frame_count<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>putText<\/code> origin is the <strong>bottom-left<\/strong> of the text and coords are (x, y). Colors are <strong>BGR<\/strong>.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"python-and-numpy.md\" href=\"#\">python-and-numpy.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"problem-13-robust-capture-read-sample-every-nth-frame-save","text":"Problem 13: Robust capture: read, sample every Nth frame, save"},{"level":2,"id":"problem-14-motion-detection-via-frame-differencing-write-annotated-video","text":"Problem 14: Motion detection via frame differencing, write annotated video"},{"level":2,"id":"problem-15-overlay-fps-text-and-count-frames","text":"Problem 15: Overlay FPS / text and count frames"}],"text":"video & streaming 💡 tl;dr expect \"process this video\": open it, read frames in a loop with a guard for failed reads , do something per frame (motion, sample, annotate), and write an output video or frames . the robust cv2.videocapture loop is the one to have in muscle memory — it doubles as your fault-tolerance answer. problem 13: robust capture: read, sample every nth frame, save tests: the capture loop, failure handling, frame sampling, releasing resources. the problem: open a video (file or rtsp stream), keep every nth frame as an image, and don't crash or leak when the source misbehaves. the plan: frames: 0 1 ... 14 [15] 16 ... 29 [30] every=15 save save save the loop that matters: while true: ok, frame = cap.read() if not ok: break <- eof *or* dropped stream finally: cap.release() <- runs no matter what why this way: count-and-modulo beats seeking — jumping around with cap_prop_pos_frames is unreliable on many codecs (seeks snap to keyframes), while sequential reading is always exact. the ok guard and finally: release are the fault-tolerance answer: streams end without warning, and leaked capture handles are how long-running services die slowly. for live rtsp, wrap the whole thing in reconnect-with-backoff. import cv2 import os def sample_frames(source, out_dir= \"frames\" , every= 15 ): \"\"\"source: a video path or rtsp url. saves every nth frame as an image.\"\"\" os.makedirs(out_dir, exist_ok= true ) cap = cv2 .videocapture(source) if not cap.isopened(): raise runtimeerror( f\"cannot open {source}\" ) frame_index = saved_count = 0 try : while true : ok, frame = cap.read() if not ok: # end of file or dropped stream break if frame_index % every == 0 : filename = os.path.join(out_dir, f\"frame_{frame_index:05d}.jpg\" ) cv2 .imwrite(filename, frame) saved_count += 1 frame_index += 1 finally : cap.release() # always release (no leaks) print ( f\"read {frame_index} frames, saved {saved_count}\" ) return saved_count watch out: check isopened() , handle ok == false (don't assume frames keep coming), and release() in a finally . for live rtsp you'd wrap this in a reconnect-with-backoff loop (see the fault-tolerance chapter). problem 14: motion detection via frame differencing, write annotated video tests: per-frame processing, background diff, contours on a mask, videowriter . the problem: find and box the moving things in a video, writing an annotated copy. the plan: prev frame cur frame absdiff threshold dilate+contours [.......] vs [...o...] ==> [...#...] ==> [...#...] ==> [..[box]..] (blur both first - otherwise sensor noise \"moves\" in every pixel) why this way: frame differencing needs zero training and one frame of state — the right first answer. know its weakness out loud: it detects change , so an object that stops moving disappears. the production upgrade is cv2.createbackgroundsubtractormog2() , which learns the background over time and tolerates gradual lighting change. practical trap: videowriter silently produces an empty file if the frame size doesn't match — always pass the real width/height. import cv2 def detect_motion(source, out= \"p14_out.mp4\" , min_area= 800 ): cap = cv2 .videocapture(source) if not cap.isopened(): raise runtimeerror( f\"cannot open {source}\" ) fps = cap.get( cv2 .cap_prop_fps) or 25 # some sources report 0 width = int (cap.get( cv2 .cap_prop_frame_width)) height = int (cap.get( cv2 .cap_prop_frame_height)) fourcc = cv2 .videowriter_fourcc(* \"mp4v\" ) # codec for .mp4 writer = cv2 .videowriter(out, fourcc, fps, (width, height)) prev_gray = none # nothing to diff on frame 1 try : while true : ok, frame = cap.read() if not ok: break gray = cv2 .gaussianblur( cv2 .cvtcolor(frame, cv2 .color_bgr2gray), ( 21 , 21 ), 0 ) if prev_gray is not none : frame_diff = cv2 .absdiff(prev_gray, gray) # |previous - current| motion_mask = cv2 .threshold(frame_diff, 25 , 255 , cv2 .thresh_binary)[ 1 ] # keep big changes motion_mask = cv2 .dilate(motion_mask, none , iterations= 2 ) # merge blobs contours, _ = cv2 .findcontours(motion_mask, cv2 .retr_external, cv2 .chain_approx_simple) for contour in contours: if cv2 .contourarea(contour) < min_area: # ignore tiny flicker continue x, y, box_w, box_h = cv2 .boundingrect(contour) cv2 .rectangle(frame, (x, y), (x + box_w, y + box_h), ( 0 , 255 , 0 ), 2 ) writer.write(frame) prev_gray = gray # current frame becomes the baseline finally : cap.release(); writer.release() # always release both (no leaks) return out watch out: videowriter size must match the frames you write, or you get an empty file. blur before diff to kill sensor noise. fourcc \"mp4v\" for .mp4 . problem 15: overlay fps / text and count frames tests: drawing text, reading video properties, simple per-frame overlay. the problem: overlay live diagnostics (frame number, throughput) on each frame — the \"prove your pipeline keeps up\" task. the plan: read frame -> puttext(\"frame n x fps\") -> writer.write(frame) measured fps = frames processed / wall-clock time (not the file's metadata fps - that's just its playback rate) why this way: measured fps is the number that answers \"is my processing real-time?\" — comparing it against the source fps tells you if you're falling behind. the drawing gotchas to memorize: puttext coordinates are the bottom-left of the text (not top-left), coordinates are (x, y), and colors are bgr — yellow is (0, 255, 255) . import cv2 , time def annotate(source, out= \"p15_out.mp4\" ): cap = cv2 .videocapture(source) fps = cap.get( cv2 .cap_prop_fps) or 25 width, height = ( int (cap.get( cv2 .cap_prop_frame_width)), int (cap.get( cv2 .cap_prop_frame_height))) writer = cv2 .videowriter(out, cv2 .videowriter_fourcc(* \"mp4v\" ), fps, (width, height)) frame_count, start_time = 0 , time.time() while true : ok, frame = cap.read() if not ok: break frame_count += 1 measured_fps = frame_count / (time.time() - start_time + 1e- 9 ) # avoid /0 cv2 .puttext(frame, f\"frame {frame_count} {measured_fps:4.1f} fps\" , ( 10 , 30 ), # (x, y) of text bottom-left cv2 .font_hershey_simplex, 0.8 , ( 0 , 255 , 255 ), 2 ) # bgr yellow writer.write(frame) cap.release(); writer.release() return frame_count watch out: puttext origin is the bottom-left of the text and coords are (x, y). colors are bgr . → next: python-and-numpy.md","words":987},{"path":"10-coding-practice/python-and-numpy.md","title":"Python & NumPy","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"python-numpy-engineering\">Python &amp; NumPy Engineering<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Beyond CV, they want clean, <strong>fault-tolerant<\/strong> Python: vectorized NumPy (no per-pixel Python loops), a batch processor that survives bad files, and basic algorithmic thinking. The JD literally says \"fault-tolerant… manage resources in long-running processes\" — show that.<\/div><\/div>\n<hr>\n<h2 id=\"problem-16-vectorize-it-no-pixel-loops\">Problem 16: Vectorize it (no pixel loops)<\/h2>\n<p><strong>Tests:<\/strong> that you reach for NumPy, not <code>for y: for x:<\/code>. Example: threshold + tint without loops.<\/p>\n<p><strong>The problem:<\/strong> do a per-pixel operation (select + recolor) without writing a per-pixel Python loop.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> loops:  for y: for x: if gray[y,x] &gt; 180: img[y,x] = red\n         ==&gt; 350,000 interpreted Python iterations        (slow)\n\n numpy:  mask = gray &gt; 180        one C-speed comparison  -&gt; bool array\n         img[mask] = (0, 0, 255)  one C-speed scatter     (fast)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> NumPy's entire value is that the loop happens inside compiled C, not the Python interpreter — typically ~100-1000x faster. Boolean-mask indexing and <code>axis=<\/code> reductions replace 90% of pixel loops you'd be tempted to write. The interview tell: the moment you type <code>for y in range(h)<\/code>, stop and ask \"what's the array expression for this?\"<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n<span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> red_tint_bright_areas(path, out=<span class=\"tok-string\">\"p16_out.png\"<\/span>, bright_threshold=<span class=\"tok-number\">180<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    bright_mask = gray &gt; bright_threshold    <span class=\"tok-comment\"># boolean array, fully vectorized<\/span>\n    img[bright_mask] = [<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>]           <span class=\"tok-comment\"># set all bright pixels red (BGR)<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img\n\n<span class=\"tok-comment\"># Per-channel mean without loops:<\/span>\n<span class=\"tok-keyword\">def<\/span> channel_means(img):\n    <span class=\"tok-keyword\">return<\/span> img.reshape(-<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">3<\/span>).mean(axis=<span class=\"tok-number\">0<\/span>)  <span class=\"tok-comment\"># (B_mean, G_mean, R_mean)<\/span><\/code><\/pre>\n<p><strong>Watch out:<\/strong> boolean-mask indexing (<code>img[mask] = ...<\/code>) and <code>axis=<\/code> reductions are the whole point. If you wrote a double <code>for<\/code> loop over pixels, that's the wrong answer — say \"vectorize with NumPy.\"<\/p>\n<hr>\n<h2 id=\"problem-17-fault-tolerant-batch-image-processor\">Problem 17: Fault-tolerant batch image processor<\/h2>\n<p><strong>Tests:<\/strong> the \"manage a long-running job, don't crash on one bad input\" skill. Process a folder, skip and log corrupt files, keep going.<\/p>\n<p><strong>The problem:<\/strong> process a folder of 10,000 images where file #37 is corrupt — without the whole job dying at #37.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> for each file:\n     try:     read -&gt; check None -&gt; process -&gt; write   ok += 1\n     except:  log the name and reason, fail += 1, CONTINUE\n\n one bad file = one warning line, not a dead 3-hour batch job<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the try/except goes <em>inside<\/em> the loop, per file — wrap the whole loop instead and the first bad file still kills everything after it. The subtle trap this problem is really testing: <code>cv2.imread<\/code> does NOT raise on failure, it silently returns <code>None<\/code> — you must check and raise yourself. Returning (ok, fail) counts and logging skips makes the job observable, which is what \"fault-tolerant\" means in practice.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> os\n<span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> logging\n\nlogging.basicConfig(level=logging.INFO, format=<span class=\"tok-string\">\"%(levelname)s %(message)s\"<\/span>)\n\n<span class=\"tok-keyword\">def<\/span> process_folder(in_dir, out_dir):\n    os.makedirs(out_dir, exist_ok=<span class=\"tok-keyword\">True<\/span>)\n    exts = (<span class=\"tok-string\">\".jpg\"<\/span>, <span class=\"tok-string\">\".jpeg\"<\/span>, <span class=\"tok-string\">\".png\"<\/span>, <span class=\"tok-string\">\".bmp\"<\/span>)\n    ok = fail = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> name <span class=\"tok-keyword\">in<\/span> sorted(os.listdir(in_dir)):\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> name.lower().endswith(exts):     <span class=\"tok-comment\"># skip non-image files<\/span>\n            <span class=\"tok-keyword\">continue<\/span>\n        src = os.path.join(in_dir, name)\n        <span class=\"tok-keyword\">try<\/span>:\n            img = <span class=\"tok-builtin\">cv2<\/span>.imread(src)\n            <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n                <span class=\"tok-keyword\">raise<\/span> ValueError(<span class=\"tok-string\">\"unreadable / corrupt\"<\/span>)\n            gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n            <span class=\"tok-builtin\">cv2<\/span>.imwrite(os.path.join(out_dir, name), gray)\n            ok += <span class=\"tok-number\">1<\/span>\n        <span class=\"tok-keyword\">except<\/span> Exception <span class=\"tok-keyword\">as<\/span> e:                      <span class=\"tok-comment\"># one bad file can't kill the run<\/span>\n            logging.warning(<span class=\"tok-string\">\"skipped %s: %s\"<\/span>, name, e)\n            fail += <span class=\"tok-number\">1<\/span>\n    logging.info(<span class=\"tok-string\">\"done: %d ok, %d failed\"<\/span>, ok, fail)\n    <span class=\"tok-keyword\">return<\/span> ok, fail<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>cv2.imread<\/code> returns <strong>None<\/strong> on failure (it doesn't raise) — guard it. Catch per-file so the batch continues; log what you skipped. That <em>is<\/em> fault tolerance.<\/p>\n<hr>\n<h2 id=\"problem-18-count-connected-components-blobs\">Problem 18: Count connected components (blobs)<\/h2>\n<p><strong>Tests:<\/strong> a small algorithm framed in CV terms; thresholding + labeling.<\/p>\n<p><strong>The problem:<\/strong> count the distinct objects (blobs) in an image — and be ready to do it with <em>and<\/em> without OpenCV.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> grid:   1 1 . .        two components under 4-connectivity\n         . 1 . 1        (up/down/left/right - diagonals do NOT connect)\n         . . . 1\n\n OpenCV:  threshold -&gt; connectedComponentsWithStats -&gt; filter by area\n by hand: scan cells; each unseen 1 starts a BFS flood-fill; count fills<\/code><\/pre>\n<p><strong>Why this way:<\/strong> <code>connectedComponentsWithStats<\/code> beats <code>findContours<\/code> for counting — it labels every pixel and returns areas + centroids directly, with no contour-hierarchy edge cases (nested shapes can't fool it). Remember label 0 is the background: start loops at 1. The pure-Python BFS is the same idea by hand — it's LeetCode's \"Number of Islands\", and the <code>seen<\/code> matrix is what prevents counting one island twice.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> count_blobs(path, min_area=<span class=\"tok-number\">50<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path, <span class=\"tok-builtin\">cv2<\/span>.IMREAD_GRAYSCALE)\n    _, binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(img, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)\n    num_labels, labels, stats, centroids = <span class=\"tok-builtin\">cv2<\/span>.connectedComponentsWithStats(binary)\n    <span class=\"tok-comment\"># label 0 is the background; filter tiny specks by area<\/span>\n    blobs = [i <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(<span class=\"tok-number\">1<\/span>, num_labels)\n             <span class=\"tok-keyword\">if<\/span> stats[i, <span class=\"tok-builtin\">cv2<\/span>.CC_STAT_AREA] &gt;= min_area]\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">len<\/span>(blobs), centroids[blobs]<\/code><\/pre>\n<p>If asked to do it <strong>without<\/strong> OpenCV (pure algorithm), flood-fill / BFS over the binary grid:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> collections <span class=\"tok-keyword\">import<\/span> deque\n\n<span class=\"tok-keyword\">def<\/span> count_islands(grid):\n    <span class=\"tok-string\">\"\"\"grid: 2D list of 0/1. Counts 4-connected components of 1s.\"\"\"<\/span>\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> grid:\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-number\">0<\/span>\n    rows, cols = <span class=\"tok-builtin\">len<\/span>(grid), <span class=\"tok-builtin\">len<\/span>(grid[<span class=\"tok-number\">0<\/span>])\n    seen = [[<span class=\"tok-keyword\">False<\/span>] * cols <span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(rows)]\n    count = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> row <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(rows):\n        <span class=\"tok-keyword\">for<\/span> col <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(cols):\n            <span class=\"tok-keyword\">if<\/span> grid[row][col] == <span class=\"tok-number\">1<\/span> <span class=\"tok-keyword\">and<\/span> <span class=\"tok-keyword\">not<\/span> seen[row][col]:  <span class=\"tok-comment\"># new island found<\/span>\n                count += <span class=\"tok-number\">1<\/span>\n                <span class=\"tok-comment\"># BFS flood-fill: mark every 1 connected to this one as seen<\/span>\n                queue = deque([(row, col)]); seen[row][col] = <span class=\"tok-keyword\">True<\/span>\n                <span class=\"tok-keyword\">while<\/span> queue:\n                    r, c = queue.popleft()\n                    <span class=\"tok-keyword\">for<\/span> d_row, d_col <span class=\"tok-keyword\">in<\/span> ((<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>), (-<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">1<\/span>), (<span class=\"tok-number\">0<\/span>, -<span class=\"tok-number\">1<\/span>)):  <span class=\"tok-comment\"># 4-conn<\/span>\n                        next_r, next_c = r + d_row, c + d_col\n                        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-number\">0<\/span> &lt;= next_r &lt; rows <span class=\"tok-keyword\">and<\/span> <span class=\"tok-number\">0<\/span> &lt;= next_c &lt; cols \\\n                           <span class=\"tok-keyword\">and<\/span> grid[next_r][next_c] == <span class=\"tok-number\">1<\/span> <span class=\"tok-keyword\">and<\/span> <span class=\"tok-keyword\">not<\/span> seen[next_r][next_c]:\n                            seen[next_r][next_c] = <span class=\"tok-keyword\">True<\/span>\n                            queue.append((next_r, next_c))\n    <span class=\"tok-keyword\">return<\/span> count<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>connectedComponentsWithStats<\/code> labels background as 0 — start your loop at 1. The pure-Python flood fill is the classic \"number of islands\" if they want a DSA flavor.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"opencv-cheat-sheet.md\" href=\"#\">opencv-cheat-sheet.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"problem-16-vectorize-it-no-pixel-loops","text":"Problem 16: Vectorize it (no pixel loops)"},{"level":2,"id":"problem-17-fault-tolerant-batch-image-processor","text":"Problem 17: Fault-tolerant batch image processor"},{"level":2,"id":"problem-18-count-connected-components-blobs","text":"Problem 18: Count connected components (blobs)"}],"text":"python & numpy engineering 💡 tl;dr beyond cv, they want clean, fault-tolerant python: vectorized numpy (no per-pixel python loops), a batch processor that survives bad files, and basic algorithmic thinking. the jd literally says \"fault-tolerant… manage resources in long-running processes\" — show that. problem 16: vectorize it (no pixel loops) tests: that you reach for numpy, not for y: for x: . example: threshold + tint without loops. the problem: do a per-pixel operation (select + recolor) without writing a per-pixel python loop. the plan: loops: for y: for x: if gray[y,x] > 180: img[y,x] = red ==> 350,000 interpreted python iterations (slow) numpy: mask = gray > 180 one c-speed comparison -> bool array img[mask] = (0, 0, 255) one c-speed scatter (fast) why this way: numpy's entire value is that the loop happens inside compiled c, not the python interpreter — typically ~100-1000x faster. boolean-mask indexing and axis= reductions replace 90% of pixel loops you'd be tempted to write. the interview tell: the moment you type for y in range(h) , stop and ask \"what's the array expression for this?\" import numpy as np import cv2 def red_tint_bright_areas(path, out= \"p16_out.png\" , bright_threshold= 180 ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) bright_mask = gray > bright_threshold # boolean array, fully vectorized img[bright_mask] = [ 0 , 0 , 255 ] # set all bright pixels red (bgr) cv2 .imwrite(out, img) return img # per-channel mean without loops: def channel_means(img): return img.reshape(- 1 , 3 ).mean(axis= 0 ) # (b_mean, g_mean, r_mean) watch out: boolean-mask indexing ( img[mask] = ... ) and axis= reductions are the whole point. if you wrote a double for loop over pixels, that's the wrong answer — say \"vectorize with numpy.\" problem 17: fault-tolerant batch image processor tests: the \"manage a long-running job, don't crash on one bad input\" skill. process a folder, skip and log corrupt files, keep going. the problem: process a folder of 10,000 images where file #37 is corrupt — without the whole job dying at #37. the plan: for each file: try: read -> check none -> process -> write ok += 1 except: log the name and reason, fail += 1, continue one bad file = one warning line, not a dead 3-hour batch job why this way: the try/except goes inside the loop, per file — wrap the whole loop instead and the first bad file still kills everything after it. the subtle trap this problem is really testing: cv2.imread does not raise on failure, it silently returns none — you must check and raise yourself. returning (ok, fail) counts and logging skips makes the job observable, which is what \"fault-tolerant\" means in practice. import os import cv2 import logging logging.basicconfig(level=logging.info, format= \"%(levelname)s %(message)s\" ) def process_folder(in_dir, out_dir): os.makedirs(out_dir, exist_ok= true ) exts = ( \".jpg\" , \".jpeg\" , \".png\" , \".bmp\" ) ok = fail = 0 for name in sorted(os.listdir(in_dir)): if not name.lower().endswith(exts): # skip non-image files continue src = os.path.join(in_dir, name) try : img = cv2 .imread(src) if img is none : raise valueerror( \"unreadable / corrupt\" ) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) cv2 .imwrite(os.path.join(out_dir, name), gray) ok += 1 except exception as e: # one bad file can't kill the run logging.warning( \"skipped %s: %s\" , name, e) fail += 1 logging.info( \"done: %d ok, %d failed\" , ok, fail) return ok, fail watch out: cv2.imread returns none on failure (it doesn't raise) — guard it. catch per-file so the batch continues; log what you skipped. that is fault tolerance. problem 18: count connected components (blobs) tests: a small algorithm framed in cv terms; thresholding + labeling. the problem: count the distinct objects (blobs) in an image — and be ready to do it with and without opencv. the plan: grid: 1 1 . . two components under 4-connectivity . 1 . 1 (up/down/left/right - diagonals do not connect) . . . 1 opencv: threshold -> connectedcomponentswithstats -> filter by area by hand: scan cells; each unseen 1 starts a bfs flood-fill; count fills why this way: connectedcomponentswithstats beats findcontours for counting — it labels every pixel and returns areas + centroids directly, with no contour-hierarchy edge cases (nested shapes can't fool it). remember label 0 is the background: start loops at 1. the pure-python bfs is the same idea by hand — it's leetcode's \"number of islands\", and the seen matrix is what prevents counting one island twice. import cv2 def count_blobs(path, min_area= 50 ): img = cv2 .imread(path, cv2 .imread_grayscale) _, binary = cv2 .threshold(img, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) num_labels, labels, stats, centroids = cv2 .connectedcomponentswithstats(binary) # label 0 is the background; filter tiny specks by area blobs = [i for i in range ( 1 , num_labels) if stats[i, cv2 .cc_stat_area] >= min_area] return len (blobs), centroids[blobs] if asked to do it without opencv (pure algorithm), flood-fill / bfs over the binary grid: from collections import deque def count_islands(grid): \"\"\"grid: 2d list of 0/1. counts 4-connected components of 1s.\"\"\" if not grid: return 0 rows, cols = len (grid), len (grid[ 0 ]) seen = [[ false ] * cols for _ in range (rows)] count = 0 for row in range (rows): for col in range (cols): if grid[row][col] == 1 and not seen[row][col]: # new island found count += 1 # bfs flood-fill: mark every 1 connected to this one as seen queue = deque([(row, col)]); seen[row][col] = true while queue: r, c = queue.popleft() for d_row, d_col in (( 1 , 0 ), (- 1 , 0 ), ( 0 , 1 ), ( 0 , - 1 )): # 4-conn next_r, next_c = r + d_row, c + d_col if 0 <= next_r < rows and 0 <= next_c < cols \\ and grid[next_r][next_c] == 1 and not seen[next_r][next_c]: seen[next_r][next_c] = true queue.append((next_r, next_c)) return count watch out: connectedcomponentswithstats labels background as 0 — start your loop at 1. the pure-python flood fill is the classic \"number of islands\" if they want a dsa flavor. → next: opencv-cheat-sheet.md","words":1011},{"path":"10-coding-practice/opencv-cheat-sheet.md","title":"OpenCV Cheat Sheet","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"opencv-cheat-sheet-memorize\">OpenCV Cheat Sheet (Memorize)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> No AI during the test, so the API has to be in your head. This is the 80% you'll actually reach for. Re-type a few of these from memory the morning of.<\/div><\/div>\n<hr>\n<h2 id=\"io-basics\">I/O &amp; basics<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>, numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\nimg = <span class=\"tok-builtin\">cv2<\/span>.imread(<span class=\"tok-string\">\"in.jpg\"<\/span>)             <span class=\"tok-comment\"># BGR uint8, (H,W,3); None if missing!<\/span>\nimg = <span class=\"tok-builtin\">cv2<\/span>.imread(<span class=\"tok-string\">\"in.jpg\"<\/span>, <span class=\"tok-builtin\">cv2<\/span>.IMREAD_GRAYSCALE)\n<span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"out.png\"<\/span>, img)\nh, w = img.shape[:<span class=\"tok-number\">2<\/span>]                    <span class=\"tok-comment\"># rows, cols  (y before x)<\/span>\nroi = img[y1:y2, x1:x2]                 <span class=\"tok-comment\"># crop = rows then cols<\/span><\/code><\/pre>\n<p>Remember: <strong>BGR not RGB<\/strong>, dtype <strong>uint8<\/strong> (0–255), shape <strong>(H, W, C)<\/strong>, <code>imread<\/code> returns <strong>None<\/strong> on failure (guard it).<\/p>\n<h2 id=\"color\">Color<\/h2>\n<pre><code class=\"language-python\">gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\nhsv  = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2HSV)     <span class=\"tok-comment\"># hue for color segmentation<\/span>\nrgb  = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2RGB)     <span class=\"tok-comment\"># before feeding most models<\/span>\nmask = <span class=\"tok-builtin\">cv2<\/span>.inRange(hsv, (<span class=\"tok-number\">35<\/span>,<span class=\"tok-number\">80<\/span>,<span class=\"tok-number\">80<\/span>), (<span class=\"tok-number\">85<\/span>,<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">255<\/span>))   <span class=\"tok-comment\"># threshold a colour range<\/span><\/code><\/pre>\n<h2 id=\"blur-denoise\">Blur / denoise<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(img, (<span class=\"tok-number\">5<\/span>,<span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>)         <span class=\"tok-comment\"># ksize must be odd<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.medianBlur(img, <span class=\"tok-number\">5<\/span>)                  <span class=\"tok-comment\"># salt-and-pepper<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.bilateralFilter(img, <span class=\"tok-number\">9<\/span>, <span class=\"tok-number\">75<\/span>, <span class=\"tok-number\">75<\/span>)     <span class=\"tok-comment\"># smooth but keep edges<\/span><\/code><\/pre>\n<h2 id=\"threshold\">Threshold<\/h2>\n<pre><code class=\"language-python\">_, th = <span class=\"tok-builtin\">cv2<\/span>.threshold(gray, <span class=\"tok-number\">127<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY)\n_, th = <span class=\"tok-builtin\">cv2<\/span>.threshold(gray, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)   <span class=\"tok-comment\"># auto<\/span>\nth = <span class=\"tok-builtin\">cv2<\/span>.adaptiveThreshold(gray, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.ADAPTIVE_THRESH_GAUSSIAN_C,\n                           <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY, <span class=\"tok-number\">31<\/span>, <span class=\"tok-number\">10<\/span>)   <span class=\"tok-comment\"># blockSize odd, then C<\/span><\/code><\/pre>\n<h2 id=\"morphology\">Morphology<\/h2>\n<pre><code class=\"language-python\">k = <span class=\"tok-builtin\">cv2<\/span>.getStructuringElement(<span class=\"tok-builtin\">cv2<\/span>.MORPH_RECT, (<span class=\"tok-number\">3<\/span>,<span class=\"tok-number\">3<\/span>))\n<span class=\"tok-builtin\">cv2<\/span>.erode(th, k); <span class=\"tok-builtin\">cv2<\/span>.dilate(th, k)\n<span class=\"tok-builtin\">cv2<\/span>.morphologyEx(th, <span class=\"tok-builtin\">cv2<\/span>.MORPH_OPEN, k)    <span class=\"tok-comment\"># erode→dilate: remove specks<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.morphologyEx(th, <span class=\"tok-builtin\">cv2<\/span>.MORPH_CLOSE, k)   <span class=\"tok-comment\"># dilate→erode: fill holes<\/span><\/code><\/pre>\n<h2 id=\"edges-contours\">Edges &amp; contours<\/h2>\n<pre><code class=\"language-python\">edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(gray, <span class=\"tok-number\">50<\/span>, <span class=\"tok-number\">150<\/span>)\ncnts, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(edges, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\nc = <span class=\"tok-builtin\">max<\/span>(cnts, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea)\narea = <span class=\"tok-builtin\">cv2<\/span>.contourArea(c); peri = <span class=\"tok-builtin\">cv2<\/span>.arcLength(c, <span class=\"tok-keyword\">True<\/span>)\napprox = <span class=\"tok-builtin\">cv2<\/span>.approxPolyDP(c, <span class=\"tok-number\">0.02<\/span>*peri, <span class=\"tok-keyword\">True<\/span>)      <span class=\"tok-comment\"># corner simplification<\/span>\nx, y, w, h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(c)\nrect = <span class=\"tok-builtin\">cv2<\/span>.minAreaRect(c)                          <span class=\"tok-comment\"># rotated box (center,size,angle)<\/span><\/code><\/pre>\n<h2 id=\"geometric-transforms\">Geometric transforms<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">cv2<\/span>.resize(img, (w,h), interpolation=<span class=\"tok-builtin\">cv2<\/span>.INTER_AREA)   <span class=\"tok-comment\"># AREA shrink, CUBIC grow<\/span>\nM = <span class=\"tok-builtin\">cv2<\/span>.getRotationMatrix2D((cx,cy), angle, <span class=\"tok-number\">1.0<\/span>)\n<span class=\"tok-builtin\">cv2<\/span>.warpAffine(img, M, (w,h))\nM = <span class=\"tok-builtin\">cv2<\/span>.getPerspectiveTransform(src4, dst4)            <span class=\"tok-comment\"># both float32!<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.warpPerspective(img, M, (w,h))\nM = <span class=\"tok-builtin\">cv2<\/span>.findHomography(srcPts, dstPts, <span class=\"tok-builtin\">cv2<\/span>.RANSAC)[<span class=\"tok-number\">0<\/span>]  <span class=\"tok-comment\"># robust, many points<\/span><\/code><\/pre>\n<h2 id=\"drawing-bgr-colors-xy-points\">Drawing (BGR colors, (x,y) points)<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">cv2<\/span>.rectangle(img, (x1,y1), (x2,y2), (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n<span class=\"tok-builtin\">cv2<\/span>.circle(img, (x,y), <span class=\"tok-number\">5<\/span>, (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>), -<span class=\"tok-number\">1<\/span>)            <span class=\"tok-comment\"># -1 = filled<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.line(img, p1, p2, (<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n<span class=\"tok-builtin\">cv2<\/span>.putText(img, <span class=\"tok-string\">\"hi\"<\/span>, (x,y), <span class=\"tok-builtin\">cv2<\/span>.FONT_HERSHEY_SIMPLEX, <span class=\"tok-number\">0.8<\/span>, (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">255<\/span>), <span class=\"tok-number\">2<\/span>)\n<span class=\"tok-builtin\">cv2<\/span>.polylines(img, [pts.reshape(-<span class=\"tok-number\">1<\/span>,<span class=\"tok-number\">1<\/span>,<span class=\"tok-number\">2<\/span>)], <span class=\"tok-keyword\">True<\/span>, (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)<\/code><\/pre>\n<h2 id=\"video\">Video<\/h2>\n<pre><code class=\"language-python\">cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(src)             <span class=\"tok-comment\"># path, index (0=webcam), or rtsp url<\/span>\ncap.isOpened()\nok, frame = cap.read()                  <span class=\"tok-comment\"># ok=False at end / on failure<\/span>\nfps = cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FPS)\ncap.release()\nvw = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter(<span class=\"tok-string\">\"out.mp4\"<\/span>, <span class=\"tok-builtin\">cv2<\/span>.VideoWriter_fourcc(*<span class=\"tok-string\">\"mp4v\"<\/span>), fps, (w,h))\nvw.write(frame); vw.release()           <span class=\"tok-comment\"># size MUST match written frames<\/span><\/code><\/pre>\n<h2 id=\"numpy-youll-need\">NumPy you'll need<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">np<\/span>.zeros((h,w,<span class=\"tok-number\">3<\/span>), <span class=\"tok-builtin\">np<\/span>.uint8); <span class=\"tok-builtin\">np<\/span>.full((h,w,<span class=\"tok-number\">3<\/span>), <span class=\"tok-number\">114<\/span>, <span class=\"tok-builtin\">np<\/span>.uint8)\nmask = gray &gt; <span class=\"tok-number\">180<\/span>; img[mask] = (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>)        <span class=\"tok-comment\"># boolean indexing<\/span>\nimg.reshape(-<span class=\"tok-number\">1<\/span>,<span class=\"tok-number\">3<\/span>).mean(axis=<span class=\"tok-number\">0<\/span>)                  <span class=\"tok-comment\"># per-channel mean<\/span>\n<span class=\"tok-builtin\">np<\/span>.clip(x, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>).astype(<span class=\"tok-builtin\">np<\/span>.uint8)             <span class=\"tok-comment\"># keep valid pixel range<\/span>\n<span class=\"tok-builtin\">np<\/span>.linalg.norm(a - b)                           <span class=\"tok-comment\"># Euclidean distance<\/span><\/code><\/pre>\n<h2 id=\"gotchas-that-cost-marks\">Gotchas that cost marks<\/h2>\n<ul><li><code>imread<\/code> → <strong>None<\/strong> on bad path (no exception). Always check.<\/li><li>Points are <strong>(x, y)<\/strong>; array indexing is <strong>[row, col] = [y, x]<\/strong>. Don't mix.<\/li><li>Colors are <strong>BGR<\/strong>. <code>(0,0,255)<\/code> is red.<\/li><li>Kernel / blockSize sizes must be <strong>odd<\/strong>.<\/li><li><code>getPerspectiveTransform<\/code> / <code>getAffineTransform<\/code> need <strong>float32<\/strong> points.<\/li><li><code>VideoWriter<\/code> silently makes an empty file if frame size mismatches.<\/li><li>Save your <strong>output images<\/strong> with clear names — it's part of the grade.<\/li><\/ul>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">chapter overview<\/a>.<\/p>","toc":[{"level":2,"id":"io-basics","text":"I/O &amp; basics"},{"level":2,"id":"color","text":"Color"},{"level":2,"id":"blur-denoise","text":"Blur / denoise"},{"level":2,"id":"threshold","text":"Threshold"},{"level":2,"id":"morphology","text":"Morphology"},{"level":2,"id":"edges-contours","text":"Edges &amp; contours"},{"level":2,"id":"geometric-transforms","text":"Geometric transforms"},{"level":2,"id":"drawing-bgr-colors-xy-points","text":"Drawing (BGR colors, (x,y) points)"},{"level":2,"id":"video","text":"Video"},{"level":2,"id":"numpy-youll-need","text":"NumPy you'll need"},{"level":2,"id":"gotchas-that-cost-marks","text":"Gotchas that cost marks"}],"text":"opencv cheat sheet (memorize) 💡 tl;dr no ai during the test, so the api has to be in your head. this is the 80% you'll actually reach for. re-type a few of these from memory the morning of. i/o & basics import cv2 , numpy as np img = cv2 .imread( \"in.jpg\" ) # bgr uint8, (h,w,3); none if missing! img = cv2 .imread( \"in.jpg\" , cv2 .imread_grayscale) cv2 .imwrite( \"out.png\" , img) h, w = img.shape[: 2 ] # rows, cols (y before x) roi = img[y1:y2, x1:x2] # crop = rows then cols remember: bgr not rgb , dtype uint8 (0–255), shape (h, w, c) , imread returns none on failure (guard it). color gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) hsv = cv2 .cvtcolor(img, cv2 .color_bgr2hsv) # hue for color segmentation rgb = cv2 .cvtcolor(img, cv2 .color_bgr2rgb) # before feeding most models mask = cv2 .inrange(hsv, ( 35 , 80 , 80 ), ( 85 , 255 , 255 )) # threshold a colour range blur / denoise cv2 .gaussianblur(img, ( 5 , 5 ), 0 ) # ksize must be odd cv2 .medianblur(img, 5 ) # salt-and-pepper cv2 .bilateralfilter(img, 9 , 75 , 75 ) # smooth but keep edges threshold _, th = cv2 .threshold(gray, 127 , 255 , cv2 .thresh_binary) _, th = cv2 .threshold(gray, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) # auto th = cv2 .adaptivethreshold(gray, 255 , cv2 .adaptive_thresh_gaussian_c, cv2 .thresh_binary, 31 , 10 ) # blocksize odd, then c morphology k = cv2 .getstructuringelement( cv2 .morph_rect, ( 3 , 3 )) cv2 .erode(th, k); cv2 .dilate(th, k) cv2 .morphologyex(th, cv2 .morph_open, k) # erode→dilate: remove specks cv2 .morphologyex(th, cv2 .morph_close, k) # dilate→erode: fill holes edges & contours edges = cv2 .canny(gray, 50 , 150 ) cnts, _ = cv2 .findcontours(edges, cv2 .retr_external, cv2 .chain_approx_simple) c = max (cnts, key= cv2 .contourarea) area = cv2 .contourarea(c); peri = cv2 .arclength(c, true ) approx = cv2 .approxpolydp(c, 0.02 *peri, true ) # corner simplification x, y, w, h = cv2 .boundingrect(c) rect = cv2 .minarearect(c) # rotated box (center,size,angle) geometric transforms cv2 .resize(img, (w,h), interpolation= cv2 .inter_area) # area shrink, cubic grow m = cv2 .getrotationmatrix2d((cx,cy), angle, 1.0 ) cv2 .warpaffine(img, m, (w,h)) m = cv2 .getperspectivetransform(src4, dst4) # both float32! cv2 .warpperspective(img, m, (w,h)) m = cv2 .findhomography(srcpts, dstpts, cv2 .ransac)[ 0 ] # robust, many points drawing (bgr colors, (x,y) points) cv2 .rectangle(img, (x1,y1), (x2,y2), ( 0 , 255 , 0 ), 2 ) cv2 .circle(img, (x,y), 5 , ( 0 , 0 , 255 ), - 1 ) # -1 = filled cv2 .line(img, p1, p2, ( 255 , 0 , 0 ), 2 ) cv2 .puttext(img, \"hi\" , (x,y), cv2 .font_hershey_simplex, 0.8 , ( 0 , 255 , 255 ), 2 ) cv2 .polylines(img, [pts.reshape(- 1 , 1 , 2 )], true , ( 0 , 255 , 0 ), 2 ) video cap = cv2 .videocapture(src) # path, index (0=webcam), or rtsp url cap.isopened() ok, frame = cap.read() # ok=false at end / on failure fps = cap.get( cv2 .cap_prop_fps) cap.release() vw = cv2 .videowriter( \"out.mp4\" , cv2 .videowriter_fourcc(* \"mp4v\" ), fps, (w,h)) vw.write(frame); vw.release() # size must match written frames numpy you'll need np .zeros((h,w, 3 ), np .uint8); np .full((h,w, 3 ), 114 , np .uint8) mask = gray > 180 ; img[mask] = ( 0 , 0 , 255 ) # boolean indexing img.reshape(- 1 , 3 ).mean(axis= 0 ) # per-channel mean np .clip(x, 0 , 255 ).astype( np .uint8) # keep valid pixel range np .linalg.norm(a - b) # euclidean distance gotchas that cost marks imread → none on bad path (no exception). always check. points are (x, y) ; array indexing is [row, col] = [y, x] . don't mix. colors are bgr . (0,0,255) is red. kernel / blocksize sizes must be odd . getperspectivetransform / getaffinetransform need float32 points. videowriter silently makes an empty file if frame size mismatches. save your output images with clear names — it's part of the grade. → back to chapter overview .","words":681},{"path":"10-coding-practice/mock-test.md","title":"⏱ 90-min Mock Test","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"90-minute-mock-test\">⏱ 90-Minute Mock Test<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A realistic dry run of the KoiReader proctored round. Set a <strong>90-minute timer<\/strong>, work in the blank starter notebook (<code>notebooks/05_mock_test.ipynb<\/code>), <strong>don't look at the solutions<\/strong> until you're done. Solutions: <a class=\"mdlink\" data-href=\"mock-solutions.md\" href=\"#\">mock-solutions.md<\/a>.<\/div><\/div>\n<h2 id=\"simulate-the-real-conditions\">Simulate the real conditions<\/h2>\n<ul><li><strong>No AI, no autocomplete.<\/strong> Disable Copilot/AI suggestions. Google <strong>syntax only<\/strong>.<\/li><li>One <strong>timer, 90 minutes<\/strong>, four problems. Don't get stuck — bank the easy marks<\/li><\/ul>\n<p>first (Problem 4 is quick).<\/p>\n<ul><li><strong>Save every required output file<\/strong> with the exact name asked. Producing the<\/li><\/ul>\n<p>output image/CSV is part of the score, just like the real test.<\/p>\n<ul><li>When done, practice exporting: <code>jupyter nbconvert --to html notebooks/05_mock_test.ipynb<\/code>.<\/li><\/ul>\n<p>The starter notebook's setup cell generates all inputs (<code>label.jpg<\/code>, <code>clip.avi<\/code>, <code>imgs/<\/code>, a detections list) so everything runs offline.<\/p>\n<hr>\n<h2 id=\"problem-1-label-scanner-25-min\">Problem 1: Label scanner

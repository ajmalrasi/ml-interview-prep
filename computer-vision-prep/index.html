(25 min)<\/h2>\n<p><code>label.jpg<\/code> is a photo of a label/document lying at an angle on a darker background. Produce a clean, top-down, OCR-ready scan.<\/p>\n<p><strong>Required:<\/strong><\/p>\n<ol><li>Detect the document's four corners and apply a perspective transform to get a<\/li><\/ol>\n<p>straight, top-down view. Save it as <strong><code>p1_scan.png<\/code><\/strong>.<\/p>\n<ol><li>From that scan, produce a binarized (black-and-white) version suitable for OCR.<\/li><\/ol>\n<p>Save it as <strong><code>p1_binary.png<\/code><\/strong>.<\/p>\n<p><strong>Tests:<\/strong> Canny + contours + <code>approxPolyDP<\/code>, <code>getPerspectiveTransform<\/code> / <code>warpPerspective<\/code>, ordering 4 points, thresholding. <em>Watch the float32 point ordering.<\/em><\/p>\n<hr>\n<h2 id=\"problem-2-detection-post-processing-zone-count-25-min\">Problem 2: Detection post-processing + zone count (25 min)<\/h2>\n<p>You're given a list of detections (each <code>(x1, y1, x2, y2, score)<\/code>) and a polygon <strong>zone<\/strong> (list of points). The model over-fires with overlapping boxes.<\/p>\n<p><strong>Required:<\/strong><\/p>\n<ol><li>Run <strong>NMS<\/strong> (IoU threshold 0.5) to remove duplicates.<\/li><li>Count how many surviving detections have their <strong>bottom-center point<\/strong> inside<\/li><\/ol>\n<p>the zone. <strong>Print<\/strong> \"kept N, in-zone M\".<\/p>\n<ol><li>Draw on a blank 720×720 canvas: the zone outline (blue), surviving boxes<\/li><\/ol>\n<p>(green), and boxes inside the zone (red). Save as <strong><code>p2_annotated.png<\/code><\/strong>.<\/p>\n<p><strong>Tests:<\/strong> IoU + NMS from scratch, <code>cv2.pointPolygonTest<\/code>, drawing. <em>Use the foot point, not the box center.<\/em><\/p>\n<hr>\n<h2 id=\"problem-3-video-motion-summary-25-min\">Problem 3: Video motion summary (25 min)<\/h2>\n<p><code>clip.avi<\/code> is a short video with a moving object.<\/p>\n<p><strong>Required:<\/strong><\/p>\n<ol><li>Detect motion with frame differencing; a frame \"has motion\" if the largest<\/li><\/ol>\n<p>moving region's area exceeds a threshold you choose.<\/p>\n<ol><li>Draw green boxes around moving regions and write the annotated video to<\/li><\/ol>\n<p><strong><code>p3_motion.avi<\/code><\/strong>.<\/p>\n<ol><li><strong>Print<\/strong> the total frame count and how many frames had motion. Save <strong>three<\/strong><\/li><\/ol>\n<p>sample annotated frames as <strong><code>p3_frame_0.png<\/code>, <code>p3_frame_1.png<\/code>, <code>p3_frame_2.png<\/code><\/strong>.<\/p>\n<p><strong>Tests:<\/strong> robust <code>VideoCapture<\/code> loop, <code>absdiff<\/code> + threshold + contours, <code>VideoWriter<\/code> (size must match), saving frames. <em>Release everything in a <code>finally<\/code>.<\/em><\/p>\n<hr>\n<h2 id=\"problem-4-robust-batch-report-15-min\">Problem 4: Robust batch report (15 min)<\/h2>\n<p>Folder <code>imgs/<\/code> holds several images — <strong>some are corrupt<\/strong>.<\/p>\n<p><strong>Required:<\/strong><\/p>\n<ol><li>For each readable image, compute its <strong>mean brightness<\/strong> (mean of the grayscale<\/li><\/ol>\n<p>pixels). <strong>Skip and log<\/strong> corrupt/unreadable files without crashing.<\/p>\n<ol><li>Write <strong><code>p4_report.csv<\/code><\/strong> with header <code>filename,mean_brightness<\/code>, rows sorted by<\/li><\/ol>\n<p>brightness <strong>descending<\/strong>.<\/p>\n<ol><li><strong>Print<\/strong> how many files were processed and how many skipped.<\/li><\/ol>\n<p><strong>Tests:<\/strong> fault-tolerant file loop (<code>cv2.imread<\/code> returns None!), grayscale mean, CSV writing, sorting. <em>One bad file must not kill the batch.<\/em><\/p>\n<hr>\n<h2 id=\"scoring-be-honest-with-yourself\">Scoring (be honest with yourself)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Area<\/th><th>Check<\/th><\/tr><\/thead><tbody><tr><td>Correctness<\/td><td>Does each output file look right? Counts sensible?<\/td><\/tr><tr><td>Submission hygiene<\/td><td>Exact filenames? Outputs actually saved? Would convert to <code>.html<\/code>?<\/td><\/tr><tr><td>Robustness<\/td><td>Guards on <code>imread<\/code>/capture? No crash on bad input?<\/td><\/tr><tr><td>Speed<\/td><td>Finished P4 + at least two others in 90 min?<\/td><\/tr><tr><td>Clean code<\/td><td>Readable, no dead code, sensible names?<\/td><\/tr><\/tbody><\/table><\/div>\n<p>When time's up, open <strong><a class=\"mdlink\" data-href=\"mock-solutions.md\" href=\"#\">mock-solutions.md<\/a><\/strong> and compare. Re-do anything you couldn't finish — the second pass is where it sticks.<\/p>\n<p>→ Solutions: <strong><a class=\"mdlink\" data-href=\"mock-solutions.md\" href=\"#\">mock-solutions.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"simulate-the-real-conditions","text":"Simulate the real conditions"},{"level":2,"id":"problem-1-label-scanner-25-min","text":"Problem 1: Label scanner (25 min)"},{"level":2,"id":"problem-2-detection-post-processing-zone-count-25-min","text":"Problem 2: Detection post-processing + zone count (25 min)"},{"level":2,"id":"problem-3-video-motion-summary-25-min","text":"Problem 3: Video motion summary (25 min)"},{"level":2,"id":"problem-4-robust-batch-report-15-min","text":"Problem 4: Robust batch report (15 min)"},{"level":2,"id":"scoring-be-honest-with-yourself","text":"Scoring (be honest with yourself)"}],"text":"⏱ 90-minute mock test 💡 tl;dr a realistic dry run of the koireader proctored round. set a 90-minute timer , work in the blank starter notebook ( notebooks/05_mock_test.ipynb ), don't look at the solutions until you're done. solutions: mock-solutions.md . simulate the real conditions no ai, no autocomplete. disable copilot/ai suggestions. google syntax only . one timer, 90 minutes , four problems. don't get stuck — bank the easy marks first (problem 4 is quick). save every required output file with the exact name asked. producing the output image/csv is part of the score, just like the real test. when done, practice exporting: jupyter nbconvert --to html notebooks/05_mock_test.ipynb . the starter notebook's setup cell generates all inputs ( label.jpg , clip.avi , imgs/ , a detections list) so everything runs offline. problem 1: label scanner (25 min) label.jpg is a photo of a label/document lying at an angle on a darker background. produce a clean, top-down, ocr-ready scan. required: detect the document's four corners and apply a perspective transform to get a straight, top-down view. save it as p1_scan.png . from that scan, produce a binarized (black-and-white) version suitable for ocr. save it as p1_binary.png . tests: canny + contours + approxpolydp , getperspectivetransform / warpperspective , ordering 4 points, thresholding. watch the float32 point ordering. problem 2: detection post-processing + zone count (25 min) you're given a list of detections (each (x1, y1, x2, y2, score) ) and a polygon zone (list of points). the model over-fires with overlapping boxes. required: run nms (iou threshold 0.5) to remove duplicates. count how many surviving detections have their bottom-center point inside the zone. print \"kept n, in-zone m\". draw on a blank 720×720 canvas: the zone outline (blue), surviving boxes (green), and boxes inside the zone (red). save as p2_annotated.png . tests: iou + nms from scratch, cv2.pointpolygontest , drawing. use the foot point, not the box center. problem 3: video motion summary (25 min) clip.avi is a short video with a moving object. required: detect motion with frame differencing; a frame \"has motion\" if the largest moving region's area exceeds a threshold you choose. draw green boxes around moving regions and write the annotated video to p3_motion.avi . print the total frame count and how many frames had motion. save three sample annotated frames as p3_frame_0.png , p3_frame_1.png , p3_frame_2.png . tests: robust videocapture loop, absdiff + threshold + contours, videowriter (size must match), saving frames. release everything in a finally . problem 4: robust batch report (15 min) folder imgs/ holds several images — some are corrupt . required: for each readable image, compute its mean brightness (mean of the grayscale pixels). skip and log corrupt/unreadable files without crashing. write p4_report.csv with header filename,mean_brightness , rows sorted by brightness descending . print how many files were processed and how many skipped. tests: fault-tolerant file loop ( cv2.imread returns none!), grayscale mean, csv writing, sorting. one bad file must not kill the batch. scoring (be honest with yourself) area check correctness does each output file look right? counts sensible? submission hygiene exact filenames? outputs actually saved? would convert to .html ? robustness guards on imread /capture? no crash on bad input? speed finished p4 + at least two others in 90 min? clean code readable, no dead code, sensible names? when time's up, open mock-solutions.md and compare. re-do anything you couldn't finish — the second pass is where it sticks. → solutions: mock-solutions.md","words":573},{"path":"10-coding-practice/mock-solutions.md","title":"Mock: Solutions","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"mock-solutions-dont-peek-until-youve-tried\">Mock: Solutions (don't peek until you've tried!)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Reference solutions for the <a class=\"mdlink\" data-href=\"mock-test.md\" href=\"#\">90-minute mock<\/a>. Yours doesn't need to match line-for-line — check that outputs are correct, files are saved with the right names, and inputs are guarded. All four are tested and runnable.<\/div><\/div>\n<hr>\n<h2 id=\"problem-1-label-scanner\">Problem 1: Label scanner<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> order_points(pts):\n    rect = <span class=\"tok-builtin\">np<\/span>.zeros((<span class=\"tok-number\">4<\/span>, <span class=\"tok-number\">2<\/span>), dtype=<span class=\"tok-string\">\"float32\"<\/span>)\n    s = pts.<span class=\"tok-builtin\">sum<\/span>(axis=<span class=\"tok-number\">1<\/span>)\n    rect[<span class=\"tok-number\">0<\/span>] = pts[<span class=\"tok-builtin\">np<\/span>.argmin(s)]; rect[<span class=\"tok-number\">2<\/span>] = pts[<span class=\"tok-builtin\">np<\/span>.argmax(s)]\n    d = <span class=\"tok-builtin\">np<\/span>.diff(pts, axis=<span class=\"tok-number\">1<\/span>)\n    rect[<span class=\"tok-number\">1<\/span>] = pts[<span class=\"tok-builtin\">np<\/span>.argmin(d)]; rect[<span class=\"tok-number\">3<\/span>] = pts[<span class=\"tok-builtin\">np<\/span>.argmax(d)]\n    <span class=\"tok-keyword\">return<\/span> rect\n\n<span class=\"tok-keyword\">def<\/span> four_point_transform(image, pts):\n    rect = order_points(pts)\n    (tl, tr, br, bl) = rect\n    maxW = <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-builtin\">max<\/span>(<span class=\"tok-builtin\">np<\/span>.linalg.norm(br - bl), <span class=\"tok-builtin\">np<\/span>.linalg.norm(tr - tl)))\n    maxH = <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-builtin\">max<\/span>(<span class=\"tok-builtin\">np<\/span>.linalg.norm(tr - br), <span class=\"tok-builtin\">np<\/span>.linalg.norm(tl - bl)))\n    dst = <span class=\"tok-builtin\">np<\/span>.array([[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>], [maxW - <span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>], [maxW - <span class=\"tok-number\">1<\/span>, maxH - <span class=\"tok-number\">1<\/span>], [<span class=\"tok-number\">0<\/span>, maxH - <span class=\"tok-number\">1<\/span>]],\n                   dtype=<span class=\"tok-string\">\"float32\"<\/span>)\n    M = <span class=\"tok-builtin\">cv2<\/span>.getPerspectiveTransform(rect, dst)\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">cv2<\/span>.warpPerspective(image, M, (maxW, maxH))\n\n<span class=\"tok-keyword\">def<\/span> solve_p1(path=<span class=\"tok-string\">\"label.jpg\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> FileNotFoundError(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(<span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(gray, (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">50<\/span>, <span class=\"tok-number\">150<\/span>)\n    cnts, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(edges, <span class=\"tok-builtin\">cv2<\/span>.RETR_LIST, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    cnts = sorted(cnts, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea, reverse=<span class=\"tok-keyword\">True<\/span>)[:<span class=\"tok-number\">5<\/span>]\n    doc = <span class=\"tok-keyword\">None<\/span>\n    <span class=\"tok-keyword\">for<\/span> c <span class=\"tok-keyword\">in<\/span> cnts:\n        approx = <span class=\"tok-builtin\">cv2<\/span>.approxPolyDP(c, <span class=\"tok-number\">0.02<\/span> * <span class=\"tok-builtin\">cv2<\/span>.arcLength(c, <span class=\"tok-keyword\">True<\/span>), <span class=\"tok-keyword\">True<\/span>)\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">len<\/span>(approx) == <span class=\"tok-number\">4<\/span>:\n            doc = approx.reshape(<span class=\"tok-number\">4<\/span>, <span class=\"tok-number\">2<\/span>).astype(<span class=\"tok-string\">\"float32\"<\/span>); <span class=\"tok-keyword\">break<\/span>\n    <span class=\"tok-keyword\">if<\/span> doc <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">\"document not found\"<\/span>)\n    scan = four_point_transform(img, doc)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"p1_scan.png\"<\/span>, scan)\n    g = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(scan, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(g, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)[<span class=\"tok-number\">1<\/span>]\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"p1_binary.png\"<\/span>, binary)\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"saved p1_scan.png\"<\/span>, scan.shape, <span class=\"tok-string\">\"and p1_binary.png\"<\/span>)\n\nsolve_p1()<\/code><\/pre>\n<p><strong>Marks:<\/strong> found 4 corners, warped flat, binarized, <strong>both files saved<\/strong>.<\/p>\n<hr>\n<h2 id=\"problem-2-detection-post-processing-zone-count\">Problem 2: Detection post-processing + zone count<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> iou(a, b):\n    ix1, iy1 = <span class=\"tok-builtin\">max<\/span>(a[<span class=\"tok-number\">0<\/span>], b[<span class=\"tok-number\">0<\/span>]), <span class=\"tok-builtin\">max<\/span>(a[<span class=\"tok-number\">1<\/span>], b[<span class=\"tok-number\">1<\/span>])\n    ix2, iy2 = <span class=\"tok-builtin\">min<\/span>(a[<span class=\"tok-number\">2<\/span>], b[<span class=\"tok-number\">2<\/span>]), <span class=\"tok-builtin\">min<\/span>(a[<span class=\"tok-number\">3<\/span>], b[<span class=\"tok-number\">3<\/span>])\n    iw, ih = <span class=\"tok-builtin\">max<\/span>(<span class=\"tok-number\">0<\/span>, ix2 - ix1), <span class=\"tok-builtin\">max<\/span>(<span class=\"tok-number\">0<\/span>, iy2 - iy1)\n    inter = iw * ih\n    ua = (a[<span class=\"tok-number\">2<\/span>]-a[<span class=\"tok-number\">0<\/span>])*(a[<span class=\"tok-number\">3<\/span>]-a[<span class=\"tok-number\">1<\/span>]) + (b[<span class=\"tok-number\">2<\/span>]-b[<span class=\"tok-number\">0<\/span>])*(b[<span class=\"tok-number\">3<\/span>]-b[<span class=\"tok-number\">1<\/span>]) - inter\n    <span class=\"tok-keyword\">return<\/span> inter / ua <span class=\"tok-keyword\">if<\/span> ua &gt; <span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">else<\/span> <span class=\"tok-number\">0.0<\/span>\n\n<span class=\"tok-keyword\">def<\/span> nms(boxes, scores, thr=<span class=\"tok-number\">0.5<\/span>):\n    idxs = sorted(<span class=\"tok-builtin\">range<\/span>(<span class=\"tok-builtin\">len<\/span>(boxes)), key=<span class=\"tok-keyword\">lambda<\/span> i: scores[i], reverse=<span class=\"tok-keyword\">True<\/span>)\n    keep = []\n    <span class=\"tok-keyword\">while<\/span> idxs:\n        cur = idxs.pop(<span class=\"tok-number\">0<\/span>); keep.append(cur)\n        idxs = [i <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> idxs <span class=\"tok-keyword\">if<\/span> iou(boxes[cur], boxes[i]) &lt; thr]\n    <span class=\"tok-keyword\">return<\/span> keep\n\n<span class=\"tok-keyword\">def<\/span> solve_p2(dets, zone):\n    boxes = [d[:<span class=\"tok-number\">4<\/span>] <span class=\"tok-keyword\">for<\/span> d <span class=\"tok-keyword\">in<\/span> dets]\n    scores = [d[<span class=\"tok-number\">4<\/span>] <span class=\"tok-keyword\">for<\/span> d <span class=\"tok-keyword\">in<\/span> dets]\n    keep = nms(boxes, scores, <span class=\"tok-number\">0.5<\/span>)\n    poly = <span class=\"tok-builtin\">np<\/span>.array(zone, <span class=\"tok-builtin\">np<\/span>.int32)\n    canvas = <span class=\"tok-builtin\">np<\/span>.full((<span class=\"tok-number\">720<\/span>, <span class=\"tok-number\">720<\/span>, <span class=\"tok-number\">3<\/span>), <span class=\"tok-number\">40<\/span>, <span class=\"tok-builtin\">np<\/span>.uint8)\n    <span class=\"tok-builtin\">cv2<\/span>.polylines(canvas, [poly], <span class=\"tok-keyword\">True<\/span>, (<span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">120<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)      <span class=\"tok-comment\"># zone blue (BGR)<\/span>\n    in_zone = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> keep:\n        x1, y1, x2, y2 = boxes[i]\n        foot = (<span class=\"tok-builtin\">int<\/span>((x1 + x2) / <span class=\"tok-number\">2<\/span>), <span class=\"tok-builtin\">int<\/span>(y2))\n        inside = <span class=\"tok-builtin\">cv2<\/span>.pointPolygonTest(poly, foot, <span class=\"tok-keyword\">False<\/span>) &gt;= <span class=\"tok-number\">0<\/span>\n        color = (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>) <span class=\"tok-keyword\">if<\/span> inside <span class=\"tok-keyword\">else<\/span> (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>)         <span class=\"tok-comment\"># red if in zone<\/span>\n        <span class=\"tok-builtin\">cv2<\/span>.rectangle(canvas, (x1, y1), (x2, y2), color, <span class=\"tok-number\">2<\/span>)\n        <span class=\"tok-keyword\">if<\/span> inside:\n            in_zone += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"p2_annotated.png\"<\/span>, canvas)\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"kept {len(keep)}, in-zone {in_zone}\"<\/span>)\n\n<span class=\"tok-comment\"># example inputs (the starter notebook provides these)<\/span>\ndets = [(<span class=\"tok-number\">100<\/span>,<span class=\"tok-number\">100<\/span>,<span class=\"tok-number\">200<\/span>,<span class=\"tok-number\">260<\/span>,<span class=\"tok-number\">0.95<\/span>),(<span class=\"tok-number\">110<\/span>,<span class=\"tok-number\">108<\/span>,<span class=\"tok-number\">205<\/span>,<span class=\"tok-number\">265<\/span>,<span class=\"tok-number\">0.90<\/span>),   <span class=\"tok-comment\"># overlapping pair<\/span>\n        (<span class=\"tok-number\">430<\/span>,<span class=\"tok-number\">420<\/span>,<span class=\"tok-number\">520<\/span>,<span class=\"tok-number\">560<\/span>,<span class=\"tok-number\">0.88<\/span>),(<span class=\"tok-number\">300<\/span>,<span class=\"tok-number\">80<\/span>,<span class=\"tok-number\">360<\/span>,<span class=\"tok-number\">140<\/span>,<span class=\"tok-number\">0.70<\/span>)]\nzone = [(<span class=\"tok-number\">80<\/span>,<span class=\"tok-number\">300<\/span>),(<span class=\"tok-number\">520<\/span>,<span class=\"tok-number\">300<\/span>),(<span class=\"tok-number\">520<\/span>,<span class=\"tok-number\">640<\/span>),(<span class=\"tok-number\">80<\/span>,<span class=\"tok-number\">640<\/span>)]\nsolve_p2(dets, zone)<\/code><\/pre>\n<p><strong>Marks:<\/strong> NMS drops the overlap (4 → 3), correct in-zone count, annotated image saved with the right colours.<\/p>\n<hr>\n<h2 id=\"problem-3-video-motion-summary\">Problem 3: Video motion summary<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> solve_p3(path=<span class=\"tok-string\">\"clip.avi\"<\/span>):\n    cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(path)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> cap.isOpened():\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">f\"cannot open {path}\"<\/span>)\n    fps = cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FPS) <span class=\"tok-keyword\">or<\/span> <span class=\"tok-number\">25<\/span>\n    w = <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_WIDTH))\n    h = <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_HEIGHT))\n    writer = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter(<span class=\"tok-string\">\"p3_motion.avi\"<\/span>,\n                             <span class=\"tok-builtin\">cv2<\/span>.VideoWriter_fourcc(*<span class=\"tok-string\">\"MJPG\"<\/span>), fps, (w, h))\n    prev = <span class=\"tok-keyword\">None<\/span>\n    total = motion_frames = saved = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">try<\/span>:\n        <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n            ok, frame = cap.read()\n            <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:\n                <span class=\"tok-keyword\">break<\/span>\n            total += <span class=\"tok-number\">1<\/span>\n            gray = <span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(<span class=\"tok-builtin\">cv2<\/span>.cvtColor(frame, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY),\n                                    (<span class=\"tok-number\">21<\/span>, <span class=\"tok-number\">21<\/span>), <span class=\"tok-number\">0<\/span>)\n            moved = <span class=\"tok-keyword\">False<\/span>\n            <span class=\"tok-keyword\">if<\/span> prev <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span>:\n                th = <span class=\"tok-builtin\">cv2<\/span>.threshold(<span class=\"tok-builtin\">cv2<\/span>.absdiff(prev, gray), <span class=\"tok-number\">25<\/span>, <span class=\"tok-number\">255<\/span>,\n                                   <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY)[<span class=\"tok-number\">1<\/span>]\n                th = <span class=\"tok-builtin\">cv2<\/span>.dilate(th, <span class=\"tok-keyword\">None<\/span>, iterations=<span class=\"tok-number\">2<\/span>)\n                cnts, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(th, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL,\n                                           <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n                <span class=\"tok-keyword\">for<\/span> c <span class=\"tok-keyword\">in<\/span> cnts:\n                    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">cv2<\/span>.contourArea(c) &lt; <span class=\"tok-number\">500<\/span>:\n                        <span class=\"tok-keyword\">continue<\/span>\n                    moved = <span class=\"tok-keyword\">True<\/span>\n                    x, y, bw, bh = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(c)\n                    <span class=\"tok-builtin\">cv2<\/span>.rectangle(frame, (x, y), (x+bw, y+bh), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n            <span class=\"tok-keyword\">if<\/span> moved:\n                motion_frames += <span class=\"tok-number\">1<\/span>\n            <span class=\"tok-keyword\">if<\/span> saved &lt; <span class=\"tok-number\">3<\/span> <span class=\"tok-keyword\">and<\/span> moved:\n                <span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">f\"p3_frame_{saved}.png\"<\/span>, frame); saved += <span class=\"tok-number\">1<\/span>\n            writer.write(frame)\n            prev = gray\n    <span class=\"tok-keyword\">finally<\/span>:\n        cap.release(); writer.release()\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"total {total} frames, {motion_frames} with motion, saved {saved} samples\"<\/span>)\n\nsolve_p3()<\/code><\/pre>\n<p><strong>Marks:<\/strong> robust loop with <code>finally<\/code> release, motion count printed, video + 3 frames saved, <code>VideoWriter<\/code> size matches.<\/p>\n<hr>\n<h2 id=\"problem-4-robust-batch-report\">Problem 4: Robust batch report<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> os\n<span class=\"tok-keyword\">import<\/span> csv\n<span class=\"tok-keyword\">import<\/span> logging\n\nlogging.basicConfig(level=logging.INFO, format=<span class=\"tok-string\">\"%(levelname)s %(message)s\"<\/span>)\n\n<span class=\"tok-keyword\">def<\/span> solve_p4(in_dir=<span class=\"tok-string\">\"imgs\"<\/span>, out_csv=<span class=\"tok-string\">\"p4_report.csv\"<\/span>):\n    rows, ok, fail = [], <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> name <span class=\"tok-keyword\">in<\/span> sorted(os.listdir(in_dir)):\n        path = os.path.join(in_dir, name)\n        <span class=\"tok-keyword\">try<\/span>:\n            img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n            <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n                <span class=\"tok-keyword\">raise<\/span> ValueError(<span class=\"tok-string\">\"unreadable / corrupt\"<\/span>)\n            mean = <span class=\"tok-builtin\">float<\/span>(<span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY).mean())\n            rows.append((name, round(mean, <span class=\"tok-number\">2<\/span>))); ok += <span class=\"tok-number\">1<\/span>\n        <span class=\"tok-keyword\">except<\/span> Exception <span class=\"tok-keyword\">as<\/span> e:\n            logging.warning(<span class=\"tok-string\">\"skipped %s: %s\"<\/span>, name, e); fail += <span class=\"tok-number\">1<\/span>\n    rows.sort(key=<span class=\"tok-keyword\">lambda<\/span> r: r[<span class=\"tok-number\">1<\/span>], reverse=<span class=\"tok-keyword\">True<\/span>)           <span class=\"tok-comment\"># brightest first<\/span>\n    <span class=\"tok-keyword\">with<\/span> <span class=\"tok-builtin\">open<\/span>(out_csv, <span class=\"tok-string\">\"w\"<\/span>, newline=<span class=\"tok-string\">\"\"<\/span>) <span class=\"tok-keyword\">as<\/span> f:\n        w = csv.writer(f)\n        w.writerow([<span class=\"tok-string\">\"filename\"<\/span>, <span class=\"tok-string\">\"mean_brightness\"<\/span>])\n        w.writerows(rows)\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"processed {ok}, skipped {fail} -&gt; {out_csv}\"<\/span>)\n\nsolve_p4()<\/code><\/pre>\n<p><strong>Marks:<\/strong> corrupt file skipped (not a crash), CSV sorted descending with the right header, counts printed.<\/p>\n<hr>\n<h2 id=\"debrief\">Debrief<\/h2>\n<ul><li>Did you <strong>save every required file<\/strong> with the exact name? That's free marks lost<\/li><\/ul>\n<p>if not.<\/p>\n<ul><li>Did you <strong>guard<\/strong> <code>cv2.imread<\/code> / <code>VideoCapture<\/code>? Real test inputs can be messy.<\/li><li>Did you bank Problem 4 (quick) early before sinking time into Problem 1?<\/li><li>Re-do any you couldn't finish, then export to HTML to rehearse submission.<\/li><\/ul>\n<p>→ Back to <a class=\"mdlink\" data-href=\"mock-test.md\" href=\"#\">the mock paper<\/a> · <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">chapter overview<\/a><\/p>","toc":[{"level":2,"id":"problem-1-label-scanner","text":"Problem 1: Label scanner"},{"level":2,"id":"problem-2-detection-post-processing-zone-count","text":"Problem 2: Detection post-processing + zone count"},{"level":2,"id":"problem-3-video-motion-summary","text":"Problem 3: Video motion summary"},{"level":2,"id":"problem-4-robust-batch-report","text":"Problem 4: Robust batch report"},{"level":2,"id":"debrief","text":"Debrief"}],"text":"mock: solutions (don't peek until you've tried!) 💡 tl;dr reference solutions for the 90-minute mock . yours doesn't need to match line-for-line — check that outputs are correct, files are saved with the right names, and inputs are guarded. all four are tested and runnable. problem 1: label scanner import cv2 import numpy as np def order_points(pts): rect = np .zeros(( 4 , 2 ), dtype= \"float32\" ) s = pts. sum (axis= 1 ) rect[ 0 ] = pts[ np .argmin(s)]; rect[ 2 ] = pts[ np .argmax(s)] d = np .diff(pts, axis= 1 ) rect[ 1 ] = pts[ np .argmin(d)]; rect[ 3 ] = pts[ np .argmax(d)] return rect def four_point_transform(image, pts): rect = order_points(pts) (tl, tr, br, bl) = rect maxw = int ( max ( np .linalg.norm(br - bl), np .linalg.norm(tr - tl))) maxh = int ( max ( np .linalg.norm(tr - br), np .linalg.norm(tl - bl))) dst = np .array([[ 0 , 0 ], [maxw - 1 , 0 ], [maxw - 1 , maxh - 1 ], [ 0 , maxh - 1 ]], dtype= \"float32\" ) m = cv2 .getperspectivetransform(rect, dst) return cv2 .warpperspective(image, m, (maxw, maxh)) def solve_p1(path= \"label.jpg\" ): img = cv2 .imread(path) if img is none : raise filenotfounderror(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) edges = cv2 .canny( cv2 .gaussianblur(gray, ( 5 , 5 ), 0 ), 50 , 150 ) cnts, _ = cv2 .findcontours(edges, cv2 .retr_list, cv2 .chain_approx_simple) cnts = sorted(cnts, key= cv2 .contourarea, reverse= true )[: 5 ] doc = none for c in cnts: approx = cv2 .approxpolydp(c, 0.02 * cv2 .arclength(c, true ), true ) if len (approx) == 4 : doc = approx.reshape( 4 , 2 ).astype( \"float32\" ); break if doc is none : raise runtimeerror( \"document not found\" ) scan = four_point_transform(img, doc) cv2 .imwrite( \"p1_scan.png\" , scan) g = cv2 .cvtcolor(scan, cv2 .color_bgr2gray) binary = cv2 .threshold(g, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu)[ 1 ] cv2 .imwrite( \"p1_binary.png\" , binary) print ( \"saved p1_scan.png\" , scan.shape, \"and p1_binary.png\" ) solve_p1() marks: found 4 corners, warped flat, binarized, both files saved . problem 2: detection post-processing + zone count import cv2 import numpy as np def iou(a, b): ix1, iy1 = max (a[ 0 ], b[ 0 ]), max (a[ 1 ], b[ 1 ]) ix2, iy2 = min (a[ 2 ], b[ 2 ]), min (a[ 3 ], b[ 3 ]) iw, ih = max ( 0 , ix2 - ix1), max ( 0 , iy2 - iy1) inter = iw * ih ua = (a[ 2 ]-a[ 0 ])*(a[ 3 ]-a[ 1 ]) + (b[ 2 ]-b[ 0 ])*(b[ 3 ]-b[ 1 ]) - inter return inter / ua if ua > 0 else 0.0 def nms(boxes, scores, thr= 0.5 ): idxs = sorted( range ( len (boxes)), key= lambda i: scores[i], reverse= true ) keep = [] while idxs: cur = idxs.pop( 0 ); keep.append(cur) idxs = [i for i in idxs if iou(boxes[cur], boxes[i]) < thr] return keep def solve_p2(dets, zone): boxes = [d[: 4 ] for d in dets] scores = [d[ 4 ] for d in dets] keep = nms(boxes, scores, 0.5 ) poly = np .array(zone, np .int32) canvas = np .full(( 720 , 720 , 3 ), 40 , np .uint8) cv2 .polylines(canvas, [poly], true , ( 255 , 120 , 0 ), 2 ) # zone blue (bgr) in_zone = 0 for i in keep: x1, y1, x2, y2 = boxes[i] foot = ( int ((x1 + x2) / 2 ), int (y2)) inside = cv2 .pointpolygontest(poly, foot, false ) >= 0 color = ( 0 , 0 , 255 ) if inside else ( 0 , 255 , 0 ) # red if in zone cv2 .rectangle(canvas, (x1, y1), (x2, y2), color, 2 ) if inside: in_zone += 1 cv2 .imwrite( \"p2_annotated.png\" , canvas) print ( f\"kept {len(keep)}, in-zone {in_zone}\" ) # example inputs (the starter notebook provides these) dets = [( 100 , 100 , 200 , 260 , 0.95 ),( 110 , 108 , 205 , 265 , 0.90 ), # overlapping pair ( 430 , 420 , 520 , 560 , 0.88 ),( 300 , 80 , 360 , 140 , 0.70 )] zone = [( 80 , 300 ),( 520 , 300 ),( 520 , 640 ),( 80 , 640 )] solve_p2(dets, zone) marks: nms drops the overlap (4 → 3), correct in-zone count, annotated image saved with the right colours. problem 3: video motion summary import cv2 def solve_p3(path= \"clip.avi\" ): cap = cv2 .videocapture(path) if not cap.isopened(): raise runtimeerror( f\"cannot open {path}\" ) fps = cap.get( cv2 .cap_prop_fps) or 25 w = int (cap.get( cv2 .cap_prop_frame_width)) h = int (cap.get( cv2 .cap_prop_frame_height)) writer = cv2 .videowriter( \"p3_motion.avi\" , cv2 .videowriter_fourcc(* \"mjpg\" ), fps, (w, h)) prev = none total = motion_frames = saved = 0 try : while true : ok, frame = cap.read() if not ok: break total += 1 gray = cv2 .gaussianblur( cv2 .cvtcolor(frame, cv2 .color_bgr2gray), ( 21 , 21 ), 0 ) moved = false if prev is not none : th = cv2 .threshold( cv2 .absdiff(prev, gray), 25 , 255 , cv2 .thresh_binary)[ 1 ] th = cv2 .dilate(th, none , iterations= 2 ) cnts, _ = cv2 .findcontours(th, cv2 .retr_external, cv2 .chain_approx_simple) for c in cnts: if cv2 .contourarea(c) < 500 : continue moved = true x, y, bw, bh = cv2 .boundingrect(c) cv2 .rectangle(frame, (x, y), (x+bw, y+bh), ( 0 , 255 , 0 ), 2 ) if moved: motion_frames += 1 if saved < 3 and moved: cv2 .imwrite( f\"p3_frame_{saved}.png\" , frame); saved += 1 writer.write(frame) prev = gray finally : cap.release(); writer.release() print ( f\"total {total} frames, {motion_frames} with motion, saved {saved} samples\" ) solve_p3() marks: robust loop with finally release, motion count printed, video + 3 frames saved, videowriter size matches. problem 4: robust batch report import cv2 import os import csv import logging logging.basicconfig(level=logging.info, format= \"%(levelname)s %(message)s\" ) def solve_p4(in_dir= \"imgs\" , out_csv= \"p4_report.csv\" ): rows, ok, fail = [], 0 , 0 for name in sorted(os.listdir(in_dir)): path = os.path.join(in_dir, name) try : img = cv2 .imread(path) if img is none : raise valueerror( \"unreadable / corrupt\" ) mean = float ( cv2 .cvtcolor(img, cv2 .color_bgr2gray).mean()) rows.append((name, round(mean, 2 ))); ok += 1 except exception as e: logging.warning( \"skipped %s: %s\" , name, e); fail += 1 rows.sort(key= lambda r: r[ 1 ], reverse= true ) # brightest first with open (out_csv, \"w\" , newline= \"\" ) as f: w = csv.writer(f) w.writerow([ \"filename\" , \"mean_brightness\" ]) w.writerows(rows) print ( f\"processed {ok}, skipped {fail} -> {out_csv}\" ) solve_p4() marks: corrupt file skipped (not a crash), csv sorted descending with the right header, counts printed. debrief did you save every required file with the exact name? that's free marks lost if not. did you guard cv2.imread / videocapture ? real test inputs can be messy. did you bank problem 4 (quick) early before sinking time into problem 1? re-do any you couldn't finish, then export to html to rehearse submission. → back to the mock paper · chapter overview","words":1188},{"path":"11-crowd-queue-analytics/README.md","title":"Overview","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"11-crowd-queue-analytics\">11: Crowd &amp; Queue Analytics<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The two numbers the client pays for: <strong>how many people<\/strong> + <strong>how long they wait<\/strong>. Detector→tracker gives boxes+IDs; you turn them into counts, dwell, flow — on the <strong>floor plane<\/strong>, not pixels.<\/div><\/div>\n<p><strong>The one rule that decides every method — which regime are you in?<\/strong><\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Regime<\/th><th>Method<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td><strong>Sparse/mid<\/strong> (heads separable)<\/td><td>detect + track individuals<\/td><td>count IDs, dwell = exit−enter<\/td><\/tr><tr><td><strong>Dense<\/strong> (occlusion, &gt;~2 ppl/m²)<\/td><td>density estimation + Little's Law<\/td><td>tracking fails; count the mass<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Interview trap:<\/strong> \"Counter works Tuesday morning — now it's a festival, half the heads hidden. What breaks?\" → tracking → ID switches → fall back to <strong>density + Little's Law<\/strong>.<\/p>\n<p><strong>Say this:<\/strong> <em>\"Queue time and count are geometry + statistics on detection+tracking. Put the camera on the floor plane via a homography, then pick by crowd regime: track individuals when I can, estimate from density+flow when I can't. Validate against a clock.\"<\/em><\/p>\n<p>Pages: 1) queue-time · 2) crowd counting/density · 3) zones/flow/heatmaps · 4) calibration/metrics.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"queue-time-estimation.md\" href=\"#\">queue-time-estimation.md<\/a><\/strong><\/p>","toc":[],"text":"11: crowd & queue analytics 💡 tl;dr the two numbers the client pays for: how many people + how long they wait . detector→tracker gives boxes+ids; you turn them into counts, dwell, flow — on the floor plane , not pixels. the one rule that decides every method — which regime are you in? regime method why sparse/mid (heads separable) detect + track individuals count ids, dwell = exit−enter dense (occlusion, >~2 ppl/m²) density estimation + little's law tracking fails; count the mass interview trap: \"counter works tuesday morning — now it's a festival, half the heads hidden. what breaks?\" → tracking → id switches → fall back to density + little's law . say this: \"queue time and count are geometry + statistics on detection+tracking. put the camera on the floor plane via a homography, then pick by crowd regime: track individuals when i can, estimate from density+flow when i can't. validate against a clock.\" pages: 1) queue-time · 2) crowd counting/density · 3) zones/flow/heatmaps · 4) calibration/metrics. → start: queue-time-estimation.md","words":172},{"path":"11-crowd-queue-analytics/queue-time-estimation.md","title":"Queue-Time Estimation","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"queue-time-estimation\">Queue-Time Estimation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> 3 ways to measure wait, most→least fragile: (1) track each person, (2) time two lines, (3) Little's Law (no tracking). Denser crowd → use a later one.<\/div><\/div>\n<h2 id=\"1-per-person-dwell-tracking\">1. Per-person dwell (tracking)<\/h2>\n<ul><li><code>wait[id] = exit_time − enter_time<\/code> for the queue zone.<\/li><li>Use <strong>foot point<\/strong> (feet on floor), not box centre.<\/li><li>Report <strong>median / p85<\/strong>, not mean (one idle cart wrecks the mean).<\/li><li><strong>Breaks on:<\/strong> ID switches in dense crowds → wait split/merged → wrong.<\/li><\/ul>\n<h2 id=\"2-boundary-timing-line-crossing-pairs\">2. Boundary timing (line-crossing pairs)<\/h2>\n<ul><li>Detect <strong>join line<\/strong> + <strong>service line<\/strong> crossings; wait = gap between them.<\/li><li>Identity only has to survive 2 crossings, not the whole dwell → sturdier.<\/li><li><strong>Single-file serpentine<\/strong> (immigration, service counter): FIFO pairing, no ReID needed.<\/li><li><strong>Breaks on:<\/strong> multi-lane / unordered crowds (join-order ≠ service-order).<\/li><\/ul>\n<h2 id=\"3-littles-law-no-tracking-dense-crowds\">3. Little's Law (no tracking: dense crowds)<\/h2>\n<div class=\"diagram\">\n  <div class=\"formula\">\n    <div class=\"frow\"><span class=\"fexpr\"><span class=\"fv\">L<\/span> = <span class=\"fv\">λ<\/span> · <span class=\"fv\">W<\/span><\/span><span class=\"fnote\">Little's Law<\/span><span class=\"fexpr\" style=\"margin-left:8px\">⇒  W = L / λ<\/span><\/div>\n  <\/div>\n  <table class=\"maptable\">\n    <tbody>\n      <tr><td class=\"mfrom\"><b>L<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">people in queue (occupancy)<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>λ<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">arrival rate (people/sec entering)<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>W<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">average wait — what you report<\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<ul><li><strong>L<\/strong> = density-map count (survives occlusion). <strong>λ<\/strong> = line-crossing counter (just counts crossings).<\/li><li>Both inputs are <strong>occlusion-robust counts<\/strong> — no identities needed.<\/li><li><strong>Assumes:<\/strong> steady state over the window (arrivals ≈ departures), FIFO-ish.<\/li><\/ul>\n<p><strong>Say this:<\/strong> <em>\"In dense crowds I stop tracking individuals and use Little's Law — occupancy over arrival rate, both inputs survive occlusion.\"<\/em><\/p>\n<h2 id=\"fast-facts\">Fast facts<\/h2>\n<ul><li><strong>Lagging vs leading:<\/strong> dwell is known only after exit (lagging). Little's Law from live L,λ is leading. Often show both.<\/li><li>Most \"wrong queue time\" bugs = <strong>zone bugs<\/strong>: staff counted, person-being-served counted, re-entries. Not model bugs.<\/li><li>Validate: stopwatch a sample → report <strong>MAE in seconds<\/strong>.<\/li><\/ul>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Median not mean? → outliers (idle cart/staff) destroy the mean.<\/li><li>ID-switches tripled at peak → switch to? → <strong>Little's Law<\/strong> (occlusion-robust counts).<\/li><li><code>W=L/λ<\/code> valid when? → <strong>steady state<\/strong> over the window.<\/li><\/ul>","toc":[{"level":2,"id":"1-per-person-dwell-tracking","text":"1. Per-person dwell (tracking)"},{"level":2,"id":"2-boundary-timing-line-crossing-pairs","text":"2. Boundary timing (line-crossing pairs)"},{"level":2,"id":"3-littles-law-no-tracking-dense-crowds","text":"3. Little's Law (no tracking: dense crowds)"},{"level":2,"id":"fast-facts","text":"Fast facts"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"queue-time estimation 💡 tl;dr 3 ways to measure wait, most→least fragile: (1) track each person, (2) time two lines, (3) little's law (no tracking). denser crowd → use a later one. 1. per-person dwell (tracking) wait[id] = exit_time − enter_time for the queue zone. use foot point (feet on floor), not box centre. report median / p85 , not mean (one idle cart wrecks the mean). breaks on: id switches in dense crowds → wait split/merged → wrong. 2. boundary timing (line-crossing pairs) detect join line + service line crossings; wait = gap between them. identity only has to survive 2 crossings, not the whole dwell → sturdier. single-file serpentine (immigration, service counter): fifo pairing, no reid needed. breaks on: multi-lane / unordered crowds (join-order ≠ service-order). 3. little's law (no tracking: dense crowds) l = λ · w little's law ⇒ w = l / λ l people in queue (occupancy) λ arrival rate (people/sec entering) w average wait — what you report l = density-map count (survives occlusion). λ = line-crossing counter (just counts crossings). both inputs are occlusion-robust counts — no identities needed. assumes: steady state over the window (arrivals ≈ departures), fifo-ish. say this: \"in dense crowds i stop tracking individuals and use little's law — occupancy over arrival rate, both inputs survive occlusion.\" fast facts lagging vs leading: dwell is known only after exit (lagging). little's law from live l,λ is leading. often show both. most \"wrong queue time\" bugs = zone bugs : staff counted, person-being-served counted, re-entries. not model bugs. validate: stopwatch a sample → report mae in seconds . q&a median not mean? → outliers (idle cart/staff) destroy the mean. id-switches tripled at peak → switch to? → little's law (occlusion-robust counts). w=l/λ valid when? → steady state over the window.","words":299},{"path":"11-crowd-queue-analytics/crowd-counting-density.md","title":"Crowd Counting & Density","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"crowd-counting-density\">Crowd Counting &amp; Density<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two families, opposite failures. <strong>Detection<\/strong> counts boxes — accurate + gives IDs, dies under occlusion (under-counts). <strong>Density<\/strong> regresses a per-pixel map you sum — survives crush, but no IDs.<\/div><\/div>\n<h2 id=\"detection-based\">Detection-based<\/h2>\n<ul><li>Detect people/heads, count boxes (+ track to avoid recount).<\/li><li><strong>Pros:<\/strong> boxes + classes + <strong>track IDs<\/strong> free → dwell/zones/flow all work. Explainable.<\/li><li><strong>Cons:<\/strong> occlusion → recall collapses; <strong>NMS deletes real nearby people<\/strong> → <strong>under-count<\/strong>.<\/li><li><strong>Detect heads &gt; bodies<\/strong> in crowds (heads occlude less).<\/li><li>Sweet spot: <strong>&lt; ~1–2 ppl/m²<\/strong>.<\/li><\/ul>\n<h2 id=\"density-estimation\">Density-estimation<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">image<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">CNN<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">density map <span class=\"nsub\">D(x, y)<\/span><\/span>\n  <\/div>\n  <div class=\"formula\"><div class=\"frow\"><span class=\"fexpr\">count = <span class=\"fv\">ΣΣ D<\/span> over region<\/span><span class=\"fnote\">sum the density map, don't detect individuals<\/span><\/div><\/div>\n<\/div>\n<ul><li>Train target: <strong>head points blurred with Gaussians<\/strong> (integral = count).<\/li><li>Models: <strong>MCNN<\/strong> (multi-scale), <strong>CSRNet<\/strong> (dilated conv, strong baseline), <strong>P2PNet<\/strong>.<\/li><li><strong>Pros:<\/strong> works in dense crush; degrades gracefully.<\/li><li><strong>Cons:<\/strong> just a <strong>number<\/strong> — no IDs, no dwell, no tracking. Sensitive to perspective/domain shift.<\/li><\/ul>\n<h2 id=\"choosing\">Choosing<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Scene<\/th><th>Use<\/th><\/tr><\/thead><tbody><tr><td>counter, corridor, sparse<\/td><td>detection + tracking (need IDs)<\/td><\/tr><tr><td>packed hall, surge<\/td><td>density estimation<\/td><\/tr><tr><td>count <strong>and<\/strong> wait, dense<\/td><td>density = L + line-count = λ → Little's Law<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"perspective-silent-killer\">Perspective = silent killer<\/h2>\n<p>Far person = fewer pixels. Fix: multi-scale/FPN, or <strong>project to floor plane (homography)<\/strong> and count in m². ← the \"geometry\" the JD wants.<\/p>\n<h2 id=\"metrics\">Metrics<\/h2>\n<ul><li><strong>MAE<\/strong> = headline count error · <strong>RMSE<\/strong> = punishes big misses (surge) · <strong>GAME<\/strong> = per-grid-cell MAE (can't cheat on total).<\/li><\/ul>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Why detection under-counts, density doesn't? → occlusion+NMS delete boxes; density = continuous field.<\/li><li>Per-person dwell in packed hall from density? → no (no IDs) → Little's Law.<\/li><li>Density train target? → Gaussian-blurred head-point map.<\/li><\/ul>","toc":[{"level":2,"id":"detection-based","text":"Detection-based"},{"level":2,"id":"density-estimation","text":"Density-estimation"},{"level":2,"id":"choosing","text":"Choosing"},{"level":2,"id":"perspective-silent-killer","text":"Perspective = silent killer"},{"level":2,"id":"metrics","text":"Metrics"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"crowd counting & density 💡 tl;dr two families, opposite failures. detection counts boxes — accurate + gives ids, dies under occlusion (under-counts). density regresses a per-pixel map you sum — survives crush, but no ids. detection-based detect people/heads, count boxes (+ track to avoid recount). pros: boxes + classes + track ids free → dwell/zones/flow all work. explainable. cons: occlusion → recall collapses; nms deletes real nearby people → under-count . detect heads > bodies in crowds (heads occlude less). sweet spot: < ~1–2 ppl/m² . density-estimation image cnn density map d(x, y) count = σς d over region sum the density map, don't detect individuals train target: head points blurred with gaussians (integral = count). models: mcnn (multi-scale), csrnet (dilated conv, strong baseline), p2pnet . pros: works in dense crush; degrades gracefully. cons: just a number — no ids, no dwell, no tracking. sensitive to perspective/domain shift. choosing scene use counter, corridor, sparse detection + tracking (need ids) packed hall, surge density estimation count and wait, dense density = l + line-count = λ → little's law perspective = silent killer far person = fewer pixels. fix: multi-scale/fpn, or project to floor plane (homography) and count in m². ← the \"geometry\" the jd wants. metrics mae = headline count error · rmse = punishes big misses (surge) · game = per-grid-cell mae (can't cheat on total). q&a why detection under-counts, density doesn't? → occlusion+nms delete boxes; density = continuous field. per-person dwell in packed hall from density? → no (no ids) → little's law. density train target? → gaussian-blurred head-point map.","words":262},{"path":"11-crowd-queue-analytics/zones-flow-heatmaps.md","title":"Zones, Flow & Heatmaps","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"zones-flow-occupancy-heatmaps\">Zones, Flow, Occupancy &amp; Heatmaps<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> With IDs + floor projection you get occupancy, flow, dwell, heatmaps almost free. It's <strong>geometry + counting<\/strong>, not ML. This is the client dashboard.<\/div><\/div>\n<h2 id=\"zones-roi-polygons-on-the-floor\">Zones (ROI polygons on the floor)<\/h2>\n<ul><li><strong>Point-in-polygon<\/strong> on the <strong>foot point<\/strong> (<code>cv2.pointPolygonTest<\/code>).<\/li><li><strong>Occupancy<\/strong> = # unique IDs with feet inside now; smooth to kill flicker.<\/li><li>Occupancy &gt; threshold for K sec = <strong>overcrowding event<\/strong> (→ §12).<\/li><\/ul>\n<h2 id=\"line-crossing-flow\">Line-crossing / flow<\/h2>\n<div class=\"diagram\">\n  <table class=\"maptable\">\n    <tbody>\n      <tr><td class=\"mfrom\"><b>crossed?<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">sign of the cross-product (line × track-step) flips<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>direction?<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">which sign → IN vs OUT<\/td><\/tr>\n      <tr><td class=\"mfrom\"><b>rate?<\/b><\/td><td class=\"marw\"><\/td><td class=\"mto\">crossings / min per direction<\/td><\/tr>\n    <\/tbody>\n  <\/table>\n<\/div>\n<ul><li>Count <strong>unique ID once<\/strong> per crossing (never per frame); <strong>debounce<\/strong> past the line.<\/li><li><strong>In − Out = room occupancy<\/strong> (never watch the whole room).<\/li><\/ul>\n<h2 id=\"flow-analytics\">Flow analytics<\/h2>\n<ul><li>Origin→destination, common routes, bottlenecks.<\/li><li><strong>Speed on floor (m/s)<\/strong>, not pixels. Speed drop + occupancy rise = <strong>congestion forming<\/strong>.<\/li><\/ul>\n<h2 id=\"heatmaps-2-kinds-dont-mix\">Heatmaps: 2 kinds (don't mix)<\/h2>\n<ul><li><strong>Occupancy/dwell heatmap<\/strong> = accumulate <strong>time-in-cell<\/strong> → \"where people linger.\"<\/li><li><strong>Motion heatmap<\/strong> = accumulate <strong>movement-in-cell<\/strong> → \"where activity is.\"<\/li><li>Build on the <strong>floor<\/strong>, not the image (else near-camera looks fake-hot).<\/li><\/ul>\n<pre><code class=\"language-python\">H = <span class=\"tok-builtin\">np<\/span>.zeros((floor_h, floor_w), <span class=\"tok-builtin\">np<\/span>.float32)\n<span class=\"tok-keyword\">for<\/span> (fx, fy) <span class=\"tok-keyword\">in<\/span> foot_points_this_frame:   <span class=\"tok-comment\"># floor coords<\/span>\n    H[fy, fx] += dt                         <span class=\"tok-comment\"># seconds per cell<\/span><\/code><\/pre>\n<h2 id=\"why-on-the-floor-keeps-recurring\">Why \"on the floor\" keeps recurring<\/h2>\n<p>Occupancy, speed, dwell, heatmaps are all <strong>perspective-distorted in pixels<\/strong>. Homography → metres/m². Demo vs product.<\/p>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Avoid double-count at tripwire? → unique ID, debounced, once past line.<\/li><li>Occupancy vs motion heatmap? → time-in-cell vs movement-in-cell.<\/li><li>Speed on floor why? → pixel speed varies with distance; m/s invariant.<\/li><\/ul>","toc":[{"level":2,"id":"zones-roi-polygons-on-the-floor","text":"Zones (ROI polygons on the floor)"},{"level":2,"id":"line-crossing-flow","text":"Line-crossing / flow"},{"level":2,"id":"flow-analytics","text":"Flow analytics"},{"level":2,"id":"heatmaps-2-kinds-dont-mix","text":"Heatmaps: 2 kinds (don't mix)"},{"level":2,"id":"why-on-the-floor-keeps-recurring","text":"Why \"on the floor\" keeps recurring"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"zones, flow, occupancy & heatmaps 💡 tl;dr with ids + floor projection you get occupancy, flow, dwell, heatmaps almost free. it's geometry + counting , not ml. this is the client dashboard. zones (roi polygons on the floor) point-in-polygon on the foot point ( cv2.pointpolygontest ). occupancy = # unique ids with feet inside now; smooth to kill flicker. occupancy > threshold for k sec = overcrowding event (→ §12). line-crossing / flow crossed? sign of the cross-product (line × track-step) flips direction? which sign → in vs out rate? crossings / min per direction count unique id once per crossing (never per frame); debounce past the line. in − out = room occupancy (never watch the whole room). flow analytics origin→destination, common routes, bottlenecks. speed on floor (m/s) , not pixels. speed drop + occupancy rise = congestion forming . heatmaps: 2 kinds (don't mix) occupancy/dwell heatmap = accumulate time-in-cell → \"where people linger.\" motion heatmap = accumulate movement-in-cell → \"where activity is.\" build on the floor , not the image (else near-camera looks fake-hot). h = np .zeros((floor_h, floor_w), np .float32) for (fx, fy) in foot_points_this_frame: # floor coords h[fy, fx] += dt # seconds per cell why \"on the floor\" keeps recurring occupancy, speed, dwell, heatmaps are all perspective-distorted in pixels . homography → metres/m². demo vs product. q&a avoid double-count at tripwire? → unique id, debounced, once past line. occupancy vs motion heatmap? → time-in-cell vs movement-in-cell. speed on floor why? → pixel speed varies with distance; m/s invariant.","words":253},{"path":"11-crowd-queue-analytics/calibration-and-metrics.md","title":"Calibration & Metrics","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"calibration-metrics\">Calibration &amp; Metrics<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Numbers are only as good as (1) pixel→world mapping (<strong>homography<\/strong>) and (2) the <strong>ground truth<\/strong> you validate against. Be ready for \"how do you <em>know<\/em> it's right?\"<\/div><\/div>\n<h2 id=\"homography-image-floor-plane\">Homography (image → floor plane)<\/h2>\n<ul><li>3×3 <code>H<\/code> maps image→floor because the <strong>floor is a plane<\/strong>.<\/li><li>≥4 known point pairs (tile corners, markings, measured rectangle).<\/li><\/ul>\n<pre><code>H,_ = cv2.findHomography(image_pts, floor_pts)      # floor_pts in m/cm\nfoot_world = cv2.perspectiveTransform(foot_image, H)<\/code><\/pre>\n<ul><li><strong>Project the FOOT point<\/strong> (feet on plane). Head is above plane → wrong. #1 bug.<\/li><li>Gives metres / m² / m/s → density, real dwell, real speed.<\/li><li><strong>Undistort first<\/strong> (lens intrinsics, §09) or wide CCTV lens warps it.<\/li><\/ul>\n<h2 id=\"multi-camera\">Multi-camera<\/h2>\n<ul><li>Calibrate all cameras to <strong>one shared floor frame<\/strong> → same (x,y) across cameras.<\/li><li>Enables de-dup of overlapping counts + cross-camera track handoff (§14 ReID).<\/li><li>No shared plane → two cameras double-count one crowd.<\/li><\/ul>\n<h2 id=\"validation-dont-skip-you-will-be-asked\">Validation (don't skip: you WILL be asked)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Metric<\/th><th>Measures<\/th><\/tr><\/thead><tbody><tr><td>Count <strong>MAE/MAPE<\/strong><\/td><td>±N people vs manual count<\/td><\/tr><tr><td>Queue-time <strong>MAE<\/strong><\/td><td>±T seconds vs stopwatch<\/td><\/tr><tr><td>Event <strong>precision/recall<\/strong><\/td><td>line-crossing correctness<\/td><\/tr><tr><td><strong>ID-switch / MOTA<\/strong> (§14)<\/td><td>tracker stability → dwell error<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Ground-truth by: <strong>manual count<\/strong>, <strong>stopwatch sample<\/strong>, <strong>2nd synced camera<\/strong>. Report error <strong>by regime<\/strong> (sparse vs dense), not one blended average.<\/p>\n<h2 id=\"drift-13\">Drift (→ §13)<\/h2>\n<p>Bumped camera, new lighting, re-mounted lens → homography+model silently wrong. No error thrown. Monitoring catches divergence from periodic audits.<\/p>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Foot not head through H? → feet lie on the plane H models.<\/li><li>Stop 2 cameras double-counting? → shared floor coords, de-dup by world position.<\/li><li>\"Prove queue time is accurate\"? → stopwatch sample, MAE in seconds, split by regime.<\/li><\/ul>","toc":[{"level":2,"id":"homography-image-floor-plane","text":"Homography (image → floor plane)"},{"level":2,"id":"multi-camera","text":"Multi-camera"},{"level":2,"id":"validation-dont-skip-you-will-be-asked","text":"Validation (don't skip: you WILL be asked)"},{"level":2,"id":"drift-13","text":"Drift (→ §13)"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"calibration & metrics 💡 tl;dr numbers are only as good as (1) pixel→world mapping ( homography ) and (2) the ground truth you validate against. be ready for \"how do you know it's right?\" homography (image → floor plane) 3×3 h maps image→floor because the floor is a plane . ≥4 known point pairs (tile corners, markings, measured rectangle). h,_ = cv2.findhomography(image_pts, floor_pts) # floor_pts in m/cm foot_world = cv2.perspectivetransform(foot_image, h) project the foot point (feet on plane). head is above plane → wrong. #1 bug. gives metres / m² / m/s → density, real dwell, real speed. undistort first (lens intrinsics, §09) or wide cctv lens warps it. multi-camera calibrate all cameras to one shared floor frame → same (x,y) across cameras. enables de-dup of overlapping counts + cross-camera track handoff (§14 reid). no shared plane → two cameras double-count one crowd. validation (don't skip: you will be asked) metric measures count mae/mape ±n people vs manual count queue-time mae ±t seconds vs stopwatch event precision/recall line-crossing correctness id-switch / mota (§14) tracker stability → dwell error ground-truth by: manual count , stopwatch sample , 2nd synced camera . report error by regime (sparse vs dense), not one blended average. drift (→ §13) bumped camera, new lighting, re-mounted lens → homography+model silently wrong. no error thrown. monitoring catches divergence from periodic audits. q&a foot not head through h? → feet lie on the plane h models. stop 2 cameras double-counting? → shared floor coords, de-dup by world position. \"prove queue time is accurate\"? → stopwatch sample, mae in seconds, split by regime.","words":263},{"path":"12-event-anomaly-detection/README.md","title":"Overview","section":"12 · Event & Anomaly Detection","quiz":false,"accent":"#d9534f","html":"<h1 id=\"12-event-anomaly-detection\">12: Event &amp; Anomaly Detection<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two different problems. <strong>Event<\/strong> = you can name it (loitering, intrusion, abandoned bag) → write a <strong>rule<\/strong>. <strong>Anomaly<\/strong> = can't list it → <strong>learn \"normal\", flag deviation<\/strong>. Most briefs = 80% events + 20% anomaly.<\/div><\/div>\n<div class=\"table-scroll\"><table><thead><tr><th>EVENT (known)<\/th><th>ANOMALY (unknown)<\/th><\/tr><\/thead><tbody><tr><td>\"person in zone &gt;30s\"<\/td><td>\"motion never seen here\"<\/td><\/tr><tr><td>rule on tracks + geometry<\/td><td>learn normal, score deviation<\/td><\/tr><tr><td>precise, explainable, auditable<\/td><td>catches the unforeseen, harder to tune<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Senior move:<\/strong> ship rule-based events first (day-1 value, auditable), layer anomaly for the long tail.<\/p>\n<p><strong>Say this:<\/strong> <em>\"I split definable events from true anomalies. Events = geometry+timing logic on tracks: precise, auditable, what clients ask for. Anomaly = learned model of normal for the rest. Either way the hard part is the false-alarm rate, so I design confirmation in from the start.\"<\/em><\/p>\n<p>Pages: 1) event catalogue · 2) anomaly methods · 3) alerting &amp; false-alarms.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"operational-events.md\" href=\"#\">operational-events.md<\/a><\/strong><\/p>","toc":[],"text":"12: event & anomaly detection 💡 tl;dr two different problems. event = you can name it (loitering, intrusion, abandoned bag) → write a rule . anomaly = can't list it → learn \"normal\", flag deviation . most briefs = 80% events + 20% anomaly. event (known) anomaly (unknown) \"person in zone >30s\" \"motion never seen here\" rule on tracks + geometry learn normal, score deviation precise, explainable, auditable catches the unforeseen, harder to tune senior move: ship rule-based events first (day-1 value, auditable), layer anomaly for the long tail. say this: \"i split definable events from true anomalies. events = geometry+timing logic on tracks: precise, auditable, what clients ask for. anomaly = learned model of normal for the rest. either way the hard part is the false-alarm rate, so i design confirmation in from the start.\" pages: 1) event catalogue · 2) anomaly methods · 3) alerting & false-alarms. → start: operational-events.md","words":152},{"path":"12-event-anomaly-detection/operational-events.md","title":"Operational Event Catalog","section":"12 · Event & Anomaly Detection","quiz":false,"accent":"#d9534f","html":"<h1 id=\"operational-event-catalogue\">Operational Event Catalogue<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Every event = <strong>same recipe<\/strong>: detections → track → foot-on-floor → geometry test + time test → confirm → fire once. Not special models.<\/div><\/div>\n<h2 id=\"the-recipe\">The recipe<\/h2>\n<pre><code>detect → track (IDs) → project feet to floor\n→ geometry (in zone? crossed line? which dir?)\n→ temporal (for &gt;T? K-of-N frames? persisted?)\n→ confirm (debounce) → emit ONE event + evidence<\/code><\/pre>\n<p>Two workhorses: <strong>dwell threshold<\/strong> (event needs a duration) + <strong>K-of-N<\/strong> (true in K of last N frames before firing).<\/p>\n<h2 id=\"the-catalogue\">The catalogue<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Event<\/th><th>Compute<\/th><th>False-alarm trap<\/th><\/tr><\/thead><tbody><tr><td><strong>Intrusion<\/strong><\/td><td>foot enters restricted ROI<\/td><td>shadows/reflections, allowed staff<\/td><\/tr><tr><td><strong>Loitering<\/strong><\/td><td>dwell in zone &gt; T<\/td><td>ID switch resets timer<\/td><\/tr><tr><td><strong>Abandoned object<\/strong><\/td><td>static appears/persists &gt; T<\/td><td>bag set down briefly; parked cart<\/td><\/tr><tr><td><strong>Crowd surge<\/strong><\/td><td>occupancy/density &gt; thr for K sec<\/td><td>brief clustering<\/td><\/tr><tr><td><strong>Line-cross / wrong-way<\/strong><\/td><td>track crosses tripwire wrong dir<\/td><td>jitter near line<\/td><\/tr><tr><td><strong>Tailgating<\/strong><\/td><td>2 tracks cross access line within Δt of 1 badge<\/td><td>two people close<\/td><\/tr><tr><td><strong>Fall<\/strong><\/td><td>box tall→wide + stays low + low motion<\/td><td>sitting/crouching<\/td><\/tr><tr><td><strong>Speed<\/strong><\/td><td>floor-speed too high/≈0<\/td><td>tracker velocity noise<\/td><\/tr><tr><td><strong>PPE<\/strong><\/td><td>attribute classifier on person crop<\/td><td>small/occluded gear<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"abandoned-object-classic-deep-dive\">Abandoned object (classic deep-dive)<\/h2>\n<ol><li><strong>Static<\/strong> — was moving/empty, now static, stays static.<\/li><li><strong>Ownership<\/strong> — owner walked away? fire only if owner-dist &gt; D for &gt; T. ← the key step (kills \"parked cart\").<\/li><li><strong>Persistence<\/strong> — remains &gt; T.<\/li><li><strong>Evidence<\/strong> — attach keyframe + track.<\/li><\/ol>\n<h2 id=\"why-rules-trained-model-here\">Why rules &gt; trained model here<\/h2>\n<ul><li><strong>Explainable/auditable<\/strong> — \"track 42 in zone B for 47s\" (matters in gov/secure).<\/li><li><strong>No labelled event data<\/strong> exists (can't collect 10k intrusions).<\/li><li><strong>Tunable per site<\/strong> (integrator sets thresholds).<\/li><li>Model supplies primitives (boxes/IDs/attributes); your <strong>logic layer = the event<\/strong>.<\/li><\/ul>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Loitering falsely resets on ID switch → fix? → carry dwell across gaps / ReID; don't reset on 1-frame drop.<\/li><li>Stop abandoned alarming on carts? → owner-separation + persistence.<\/li><li>Rules over classifier why? → explainable, auditable, tunable, no labelled data.<\/li><\/ul>","toc":[{"level":2,"id":"the-recipe","text":"The recipe"},{"level":2,"id":"the-catalogue","text":"The catalogue"},{"level":2,"id":"abandoned-object-classic-deep-dive","text":"Abandoned object (classic deep-dive)"},{"level":2,"id":"why-rules-trained-model-here","text":"Why rules &gt; trained model here"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"operational event catalogue 💡 tl;dr every event = same recipe : detections → track → foot-on-floor → geometry test + time test → confirm → fire once. not special models. the recipe detect → track (ids) → project feet to floor → geometry (in zone? crossed line? which dir?) → temporal (for >t? k-of-n frames? persisted?) → confirm (debounce) → emit one event + evidence two workhorses: dwell threshold (event needs a duration) + k-of-n (true in k of last n frames before firing). the catalogue event compute false-alarm trap intrusion foot enters restricted roi shadows/reflections, allowed staff loitering dwell in zone > t id switch resets timer abandoned object static appears/persists > t bag set down briefly; parked cart crowd surge occupancy/density > thr for k sec brief clustering line-cross / wrong-way track crosses tripwire wrong dir jitter near line tailgating 2 tracks cross access line within δt of 1 badge two people close fall box tall→wide + stays low + low motion sitting/crouching speed floor-speed too high/≈0 tracker velocity noise ppe attribute classifier on person crop small/occluded gear abandoned object (classic deep-dive) static — was moving/empty, now static, stays static. ownership — owner walked away? fire only if owner-dist > d for > t. ← the key step (kills \"parked cart\"). persistence — remains > t. evidence — attach keyframe + track. why rules > trained model here explainable/auditable — \"track 42 in zone b for 47s\" (matters in gov/secure). no labelled event data exists (can't collect 10k intrusions). tunable per site (integrator sets thresholds). model supplies primitives (boxes/ids/attributes); your logic layer = the event . q&a loitering falsely resets on id switch → fix? → carry dwell across gaps / reid; don't reset on 1-frame drop. stop abandoned alarming on carts? → owner-separation + persistence. rules over classifier why? → explainable, auditable, tunable, no labelled data.","words":309},{"path":"12-event-anomaly-detection/anomaly-methods.md","title":"Anomaly Detection Methods","section":"12 · Event & Anomaly Detection","quiz":false,"accent":"#d9534f","html":"<h1 id=\"anomaly-methods\">Anomaly Methods<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Can't list the bad cases → <strong>learn normal, score deviation<\/strong>. Methods differ only in <em>what<\/em> is \"normal\" (a metric, a frame, a motion pattern, a prediction) + how much supervision.<\/div><\/div>\n<h2 id=\"first-is-it-even-an-anomaly\">First: is it even an anomaly?<\/h2>\n<p>Can you name it? → it's an <strong>event<\/strong> → use a rule (higher precision). Reserve anomaly methods for open-ended (\"flag anything unusual\"). <strong>Narrow the problem first.<\/strong><\/p>\n<h2 id=\"methods-least-most-supervision\">Methods (least → most supervision)<\/h2>\n<ul><li><strong>Statistical (no learning)<\/strong> — track a scalar (occupancy, speed, flow); flag with <strong>z-score/MAD, EWMA, control charts<\/strong>. Use <strong>seasonal baseline<\/strong> (6pm ≠ 6am). Cheap, explainable, first line. Catches surges, stampede onset.<\/li><li><strong>Classical unsupervised<\/strong> — features → <strong>One-Class SVM / Isolation Forest / GMM/KDE<\/strong>; score = distance outside normal.<\/li><li><strong>Autoencoder (reconstruction)<\/strong> — train on <strong>normal only<\/strong>; <strong>high reconstruction error = anomaly<\/strong>. Self-supervised (no anomaly labels). ⚠ too-strong AE reconstructs anomalies too → misses (fix: MemAE).<\/li><\/ul>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">frame<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">encoder<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node soft\">latent<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">decoder<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">recon<\/span>\n  <\/div>\n  <div class=\"formula\"><div class=\"frow\"><span class=\"fexpr\">score = <span class=\"fv\">‖ frame − recon ‖<\/span><\/span><span class=\"fnote\">high reconstruction error = anomaly (never seen in training)<\/span><\/div><\/div>\n<\/div>\n<ul><li><strong>Prediction-based<\/strong> — predict next frame/positions; <strong>big prediction error = anomaly<\/strong>. Good for <strong>motion<\/strong> anomalies (wrong-way, fall, scatter) an AE misses.<\/li><li><strong>Optical-flow<\/strong> — model normal motion field; flag running-in-walk-zone, reverse flow, panic dispersal. Light + effective for crowd motion.<\/li><li><strong>Embeddings + weak supervision (MIL)<\/strong> — if you have <em>some<\/em> labelled incidents (UCF-Crime style).<\/li><\/ul>\n<h2 id=\"choosing\">Choosing<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Need<\/th><th>Use<\/th><\/tr><\/thead><tbody><tr><td>explainable scalar metrics<\/td><td>statistical<\/td><\/tr><tr><td>appearance, only normal footage<\/td><td>autoencoder<\/td><\/tr><tr><td>motion/behaviour (run, panic)<\/td><td>optical-flow / prediction<\/td><\/tr><tr><td>some labelled incidents<\/td><td>weakly-supervised MIL<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"gotchas-all-methods\">Gotchas (all methods)<\/h2>\n<ul><li><strong>Normal drifts<\/strong> (lighting/season/layout) → false-alarm generator (→ §13 retrain).<\/li><li><strong>Base rate<\/strong> — anomalies rare → even 99% specificity floods operators → alerting matters more (next).<\/li><li><strong>No ground truth for recall<\/strong> — can't measure misses; validate on injected/known incidents + precision of what fired.<\/li><\/ul>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Rule vs learned? → nameable → rule; open-ended → learned.<\/li><li>Too-good AE misses why? → reconstructs anomalies well too, low error.<\/li><li>\"Crowd suddenly runs\"? → optical-flow / prediction (not single-frame AE).<\/li><li>Seasonality why? → normal = time-of-day/week; compare like-for-like.<\/li><\/ul>","toc":[{"level":2,"id":"first-is-it-even-an-anomaly","text":"First: is it even an anomaly?"},{"level":2,"id":"methods-least-most-supervision","text":"Methods (least → most supervision)"},{"level":2,"id":"choosing","text":"Choosing"},{"level":2,"id":"gotchas-all-methods","text":"Gotchas (all methods)"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"anomaly methods 💡 tl;dr can't list the bad cases → learn normal, score deviation . methods differ only in what is \"normal\" (a metric, a frame, a motion pattern, a prediction) + how much supervision. first: is it even an anomaly? can you name it? → it's an event → use a rule (higher precision). reserve anomaly methods for open-ended (\"flag anything unusual\"). narrow the problem first. methods (least → most supervision) statistical (no learning) — track a scalar (occupancy, speed, flow); flag with z-score/mad, ewma, control charts . use seasonal baseline (6pm ≠ 6am). cheap, explainable, first line. catches surges, stampede onset. classical unsupervised — features → one-class svm / isolation forest / gmm/kde ; score = distance outside normal. autoencoder (reconstruction) — train on normal only ; high reconstruction error = anomaly . self-supervised (no anomaly labels). ⚠ too-strong ae reconstructs anomalies too → misses (fix: memae). frame encoder latent decoder recon score = ‖ frame − recon ‖ high reconstruction error = anomaly (never seen in training) prediction-based — predict next frame/positions; big prediction error = anomaly . good for motion anomalies (wrong-way, fall, scatter) an ae misses. optical-flow — model normal motion field; flag running-in-walk-zone, reverse flow, panic dispersal. light + effective for crowd motion. embeddings + weak supervision (mil) — if you have some labelled incidents (ucf-crime style). choosing need use explainable scalar metrics statistical appearance, only normal footage autoencoder motion/behaviour (run, panic) optical-flow / prediction some labelled incidents weakly-supervised mil gotchas (all methods) normal drifts (lighting/season/layout) → false-alarm generator (→ §13 retrain). base rate — anomalies rare → even 99% specificity floods operators → alerting matters more (next). no ground truth for recall — can't measure misses; validate on injected/known incidents + precision of what fired. q&a rule vs learned? → nameable → rule; open-ended → learned. too-good ae misses why? → reconstructs anomalies well too, low error. \"crowd suddenly runs\"? → optical-flow / prediction (not single-frame ae). seasonality why? → normal = time-of-day/week; compare like-for-like.","words":332},{"path":"12-event-anomaly-detection/alerting-and-thresholds.md","title":"Alerting & Thresholds","section":"12 · Event & Anomaly Detection","quiz":false,"accent":"#d9534f","html":"<h1 id=\"alerting-false-alarm-control\">Alerting &amp; False-Alarm Control<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Detecting once is easy. <strong>Trust<\/strong> = the alerting layer: confirm, debounce, hysteresis, dedupe, clean schema. Cry wolf → muted in a week. The most senior topic in this section.<\/div><\/div>\n<h2 id=\"why-this-layer-decides-success\">Why this layer decides success<\/h2>\n<p>Anomalies are <strong>rare<\/strong> → 99% specific × thousands of frames × dozens of cameras = flood of false positives → operators mute. Engineer the <strong>alert<\/strong>, not just the detector.<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">raw trigger<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">K-of-N confirm<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">hysteresis<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">debounce / cooldown<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">dedupe<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">severity + evidence<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">operator<\/span>\n  <\/div>\n  <div class=\"flow-foot\">Each stage suppresses false alarms — the difference between a trusted alert and one operators mute.<\/div>\n<\/div>\n<h2 id=\"techniques\">Techniques<\/h2>\n<ul><li><strong>K-of-N confirm<\/strong> — fire only if condition in K of last N frames. Highest-leverage FP killer.<\/li><li><strong>Dwell/persistence<\/strong> — require duration (loiter &gt;30s, object &gt;60s).<\/li><li><strong>Hysteresis<\/strong> — arm at HIGH threshold, clear at LOW → stops on/off chatter at boundary.<\/li><li><strong>Debounce/cooldown<\/strong> — one alert per (camera,zone,type) + \"ongoing\" update, not per-frame storm.<\/li><li><strong>Dedupe<\/strong> — same real event on 2 overlapping cameras = <strong>1 incident<\/strong> (dedupe on shared floor position+time, §11).<\/li><li><strong>Spatial filter<\/strong> — mask known-noisy regions (tree, reflection, monitor showing video).<\/li><\/ul>\n<h2 id=\"thresholds\">Thresholds<\/h2>\n<ul><li><strong>From data<\/strong>, not vibes — set at a percentile of the normal distribution, validate.<\/li><li><strong>Precision vs recall = business call:<\/strong> intrusion → <strong>high recall<\/strong> (miss nothing); retail count → <strong>high precision<\/strong>. Ask.<\/li><li>Pick operating point on PR curve to hit a budget: \"&lt; 2 false alerts/camera/day.\"<\/li><li>Expose as <strong>per-site config<\/strong>.<\/li><\/ul>\n<h2 id=\"event-schema-auditable\">Event schema (auditable)<\/h2>\n<pre><code class=\"language-json\">{ \"event_id\",\"type\":\"loitering\",\"severity\",\"camera_id\",\"zone_id\",\n  \"start_ts\",\"end_ts\":null,\"track_ids\":[42],\"confidence\":0.87,\n  \"evidence\":{\"clip\",\"keyframe\",\"trajectory\"},\"status\":\"active\" }<\/code><\/pre>\n<ul><li><strong>Evidence<\/strong> (keyframe/clip) → human adjudi

Watch out:<\/strong> <code>getPerspectiveTransform<\/code> needs <strong>float32<\/strong> points in a consistent order — that's why <code>order_points<\/code> exists. Scale corners back up if you detected on a resized copy.<\/p>\n<hr>\n<h2 id=\"problem-5-find-and-crop-the-largest-rectangle-document-boundary\">Problem 5: Find and crop the largest rectangle (document boundary)<\/h2>\n<p><strong>Tests:<\/strong> Canny + contours + <code>approxPolyDP<\/code> + bounding-box crop.<\/p>\n<p><strong>The problem:<\/strong> isolate just the document/label from the photo background — the \"crop out the interesting part\" task.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">photo --blur+Canny--&gt; edge map --findContours--&gt; [c1, c2, c3, ...]\n                                                  |  max(key=contourArea)\n                                                  v\n                                            page outline\n                                                  |  boundingRect\n                                                  v\n                                       img[y:y+h, x:x+w]  (pure slicing)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> thresholding works only if the page is clearly brighter than the background; <em>edges<\/em> survive even when brightnesses are similar. <code>RETR_EXTERNAL<\/code> keeps only outermost contours, so \"largest\" means the page outline — not a logo or text block inside it. <code>boundingRect<\/code> returns an axis-aligned box, croppable with a slice; if the document is tilted, this crop keeps background wedges — that's when you upgrade to Problem 4's perspective warp.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> crop_largest_rect(path, out=<span class=\"tok-string\">\"p5_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(<span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(gray, (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">50<\/span>, <span class=\"tok-number\">150<\/span>)  <span class=\"tok-comment\"># low:high ~ 1:3<\/span>\n    <span class=\"tok-comment\"># RETR_EXTERNAL = outermost contours only (ignore holes/children)<\/span>\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(edges, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> contours:\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">\"no contours\"<\/span>)\n    largest = <span class=\"tok-builtin\">max<\/span>(contours, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea)\n    x, y, w, h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(largest)\n    crop = img[y:y + h, x:x + w]\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, crop)\n    <span class=\"tok-keyword\">return<\/span> crop<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>img[y:y+h, x:x+w]<\/code> — rows first (y), then cols (x). A frequent slip.<\/p>\n<hr>\n<h2 id=\"problem-6-resize-keeping-aspect-ratio-pad-to-square-letterbox\">Problem 6: Resize keeping aspect ratio, pad to square (letterbox)<\/h2>\n<p><strong>Tests:<\/strong> the standard model-input preprocessing; aspect-ratio math, padding.<\/p>\n<p><strong>The problem:<\/strong> detection models want a fixed square input (e.g. 640×640) but photos come in any shape. Naive <code>resize<\/code> to a square squashes objects.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">   stretch (bad)             letterbox (good)\n  +-----------+             +-----------+\n  | oO -&gt; oOO |             |###########|  &lt;- gray pad (114)\n  | distorted!|             |   image   |\n  +-----------+             | untouched |\n                            |###########|\n                     scale by LONG side, pad the rest<\/code><\/pre>\n<p><strong>Why this way:<\/strong> three options exist. Stretching distorts geometry — a square carton becomes a rectangle and the model's learned shapes break. Center-cropping keeps shapes but throws away edge pixels (where detections might be). Letterboxing keeps <em>every pixel and every shape<\/em>, paying only some wasted pad. Keep the scale and offsets — you need them to map detections back to the original image coordinates.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> letterbox(path, size=<span class=\"tok-number\">640<\/span>, out=<span class=\"tok-string\">\"p6_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    h, w = img.shape[:<span class=\"tok-number\">2<\/span>]\n    scale = size / <span class=\"tok-builtin\">max<\/span>(h, w)                         <span class=\"tok-comment\"># fit the LONG side<\/span>\n    new_w, new_h = <span class=\"tok-builtin\">int<\/span>(w * scale), <span class=\"tok-builtin\">int<\/span>(h * scale)\n    resized = <span class=\"tok-builtin\">cv2<\/span>.resize(img, (new_w, new_h), interpolation=<span class=\"tok-builtin\">cv2<\/span>.INTER_AREA)\n    canvas = <span class=\"tok-builtin\">np<\/span>.full((size, size, <span class=\"tok-number\">3<\/span>), <span class=\"tok-number\">114<\/span>, dtype=<span class=\"tok-builtin\">np<\/span>.uint8)  <span class=\"tok-comment\"># 114 = YOLO pad-gray<\/span>\n    top, left = (size - new_h) // <span class=\"tok-number\">2<\/span>, (size - new_w) // <span class=\"tok-number\">2<\/span>\n    canvas[top:top + new_h, left:left + new_w] = resized\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, canvas)\n    <span class=\"tok-keyword\">return<\/span> canvas<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>INTER_AREA<\/code> for shrinking, <code>INTER_LINEAR/CUBIC<\/code> for enlarging. Keep the scale + padding offsets if you later need to map detections back.<\/p>\n<hr>\n<h2 id=\"problem-7-boost-contrast-on-a-dark-image-clahe\">Problem 7: Boost contrast on a dark image (CLAHE)<\/h2>\n<p><strong>Tests:<\/strong> histogram equalization done right (local, on luminance only).<\/p>\n<p><strong>The problem:<\/strong> a dark, low-contrast image has all its pixel values bunched into a narrow band — details exist but are invisible.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> histogram before              after CLAHE\n |#                            |   #   #\n |##                           |  ##  ## #\n |###._____________            |.##.####.##._____\n 0              255            0              255\n values crammed left           spread out - per tile, clip-limited<\/code><\/pre>\n<p><strong>Why this way:<\/strong> plain <code>equalizeHist<\/code> uses ONE histogram for the whole image — it blows out regions that were already bright and massively amplifies noise in flat areas. CLAHE fixes both failure modes: it equalizes per <strong>tile<\/strong> (adapts to local lighting) and <strong>clips<\/strong> each histogram (caps noise amplification). Doing it on the L channel of LAB is what preserves color — equalizing B, G, R separately changes their <em>ratios<\/em>, which literally changes the colors.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> enhance(path, out=<span class=\"tok-string\">\"p7_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    lab = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2LAB)       <span class=\"tok-comment\"># equalize L, keep color<\/span>\n    lightness, green_red, blue_yellow = <span class=\"tok-builtin\">cv2<\/span>.split(lab)\n    clahe = <span class=\"tok-builtin\">cv2<\/span>.createCLAHE(clipLimit=<span class=\"tok-number\">2.0<\/span>, tileGridSize=(<span class=\"tok-number\">8<\/span>, <span class=\"tok-number\">8<\/span>))\n    equalized_lightness = clahe.apply(lightness)\n    merged = <span class=\"tok-builtin\">cv2<\/span>.merge((equalized_lightness, green_red, blue_yellow))\n    out_img = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(merged, <span class=\"tok-builtin\">cv2<\/span>.COLOR_LAB2BGR)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, out_img)\n    <span class=\"tok-keyword\">return<\/span> out_img<\/code><\/pre>\n<p><strong>Watch out:<\/strong> equalize the <strong>L<\/strong> channel in LAB (or V in HSV), never the raw BGR channels — that wrecks color. CLAHE (local) beats global <code>equalizeHist<\/code> for uneven lighting.<\/p>\n<hr>\n<h1 id=\"more-practice-classic-cv-interview-problems\">More practice: classic CV interview problems<\/h1>\n<p>Eight more exercises in the same style: short functions, one idea each. The setup assets include <code>color.jpg<\/code>, <code>barcode.jpg<\/code>, and <code>lines.jpg<\/code> for these.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>#<\/th><th>Topic<\/th><th>Core API<\/th><\/tr><\/thead><tbody><tr><td>E1<\/td><td>Find object by color<\/td><td><code>cvtColor(HSV)<\/code> + <code>inRange<\/code><\/td><\/tr><tr><td>E2<\/td><td>Template matching<\/td><td><code>matchTemplate<\/code> + <code>minMaxLoc<\/code><\/td><\/tr><tr><td>E3<\/td><td>Rotate without cropping<\/td><td>rotation matrix math<\/td><\/tr><tr><td>E4<\/td><td>Blur/mask a region<\/td><td>ROI slicing + <code>bitwise_and<\/code><\/td><\/tr><tr><td>E5<\/td><td>Locate a barcode<\/td><td>Sobel gradient + morphology<\/td><\/tr><tr><td>E6<\/td><td>Detect table lines<\/td><td><code>Canny<\/code> + <code>HoughLinesP<\/code><\/td><\/tr><tr><td>E7<\/td><td>Convolution from scratch<\/td><td>NumPy only<\/td><\/tr><tr><td>E8<\/td><td>Filter contours by shape<\/td><td>area / aspect / extent<\/td><\/tr><\/tbody><\/table><\/div>\n<hr>\n<h2 id=\"problem-e1-find-an-object-by-color-hsv-inrange\">Problem E1: Find an object by color (HSV + inRange)<\/h2>\n<p><strong>Tests:<\/strong> color spaces. HSV separates <em>what color<\/em> (H) from <em>how bright<\/em> (V), so a single hue range survives lighting changes that would break BGR thresholds.<\/p>\n<p><strong>The problem:<\/strong> find \"the green object\" reliably — even when the lighting makes its RGB values completely different from yesterday's photo.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> In BGR, \"green\" = (30,90,20)? (80,200,90)? (40,140,60)?  moves with lighting!\n In HSV, hue stays ~60 whether the scene is dim or bright.\n\n cvtColor(HSV) -&gt; inRange(lo, hi) -&gt; binary mask -&gt; open (despeckle)\n              -&gt; largest contour -&gt; boundingRect<\/code><\/pre>\n<p><strong>Why this way:<\/strong> in BGR all three numbers change together when light dims, so no fixed BGR box captures \"green\". HSV factors a pixel into hue (<em>which<\/em> color), saturation (how vivid), value (how bright) — lighting mostly moves V, so a stable H range does the job. A learned segmentation model could too, but when the target color is known, two thresholds beat a neural net.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_color_object(path, lower_hsv, upper_hsv, out=<span class=\"tok-string\">\"e1_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    hsv = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2HSV)          <span class=\"tok-comment\"># hue is lighting-robust<\/span>\n    mask = <span class=\"tok-builtin\">cv2<\/span>.inRange(hsv, <span class=\"tok-builtin\">np<\/span>.array(lower_hsv), <span class=\"tok-builtin\">np<\/span>.array(upper_hsv))  <span class=\"tok-comment\"># 255 inside range<\/span>\n    mask = <span class=\"tok-builtin\">cv2<\/span>.morphologyEx(mask, <span class=\"tok-builtin\">cv2<\/span>.MORPH_OPEN, <span class=\"tok-builtin\">np<\/span>.ones((<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-builtin\">np<\/span>.uint8))  <span class=\"tok-comment\"># kill specks<\/span>\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(mask, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> contours:\n        <span class=\"tok-keyword\">return<\/span> img, <span class=\"tok-keyword\">None<\/span>\n    x, y, w, h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(<span class=\"tok-builtin\">max<\/span>(contours, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea))  <span class=\"tok-comment\"># biggest blob<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.rectangle(img, (x, y), (x + w, y + h), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">255<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img, (x, y, w, h)<\/code><\/pre>\n<p><strong>Watch out:<\/strong> OpenCV hue runs <strong>0–179<\/strong> (not 0–359). Red wraps around 0, so red needs <strong>two<\/strong> ranges (<code>0-10<\/code> and <code>170-179<\/code>) OR-ed together with <code>cv2.bitwise_or<\/code>.<\/p>\n<hr>\n<h2 id=\"problem-e2-template-matching-find-a-logo-stamp\">Problem E2: Template matching (find a logo / stamp)<\/h2>\n<p><strong>Tests:<\/strong> <code>matchTemplate<\/code> slides the template over the image and scores every position; <code>minMaxLoc<\/code> finds the best one.<\/p>\n<p><strong>The problem:<\/strong> find where a known patch — a logo, stamp, or icon — appears inside a larger image.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> template slides across the image; every position gets a similarity score\n      +----------------+\n      | .1 .2 .1 .0 .1 |      the brightest cell of the\n      | .2 .9 .3 .1 .0 | &lt;--  score map is the best match:\n      | .1 .3 .2 .1 .1 |      minMaxLoc finds it\n      +----------------+<\/code><\/pre>\n<p><strong>Why this way:<\/strong> when the target's scale and rotation are fixed (same camera, same layout — typical for documents), template matching is exact, tiny, and needs zero training. Know its failure mode out loud: any scale or rotation change kills the score — <em>that's<\/em> when you reach for feature matching (ORB/SIFT + homography) or a trained detector. <code>TM_CCOEFF_NORMED<\/code> is the mode to memorize: scores normalized to [-1, 1] mean one threshold works everywhere.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_template(image_path, template, threshold=<span class=\"tok-number\">0.8<\/span>, out=<span class=\"tok-string\">\"e2_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(image_path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    <span class=\"tok-comment\"># TM_CCOEFF_NORMED gives scores in [-1, 1]; 1.0 = perfect match<\/span>\n    scores = <span class=\"tok-builtin\">cv2<\/span>.matchTemplate(gray, template, <span class=\"tok-builtin\">cv2<\/span>.TM_CCOEFF_NORMED)\n    _, best_score, _, best_loc = <span class=\"tok-builtin\">cv2<\/span>.minMaxLoc(scores)   <span class=\"tok-comment\"># (min, max, minLoc, maxLoc)<\/span>\n    h, w = template.shape\n    <span class=\"tok-keyword\">if<\/span> best_score &gt;= threshold:\n        <span class=\"tok-builtin\">cv2<\/span>.rectangle(img, best_loc, (best_loc[<span class=\"tok-number\">0<\/span>] + w, best_loc[<span class=\"tok-number\">1<\/span>] + h), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img, best_score<\/code><\/pre>\n<p><strong>Watch out:<\/strong> template matching is <strong>not<\/strong> scale- or rotation-invariant — say this in the interview. For <em>all<\/em> matches above the threshold use <code>ys, xs = np.where(scores &gt;= threshold)<\/code> instead of <code>minMaxLoc<\/code>.<\/p>\n<hr>\n<h2 id=\"problem-e3-rotate-by-any-angle-without-cropping-corners\">Problem E3: Rotate by any angle <em>without<\/em> cropping corners<\/h2>\n<p><strong>Tests:<\/strong> the classic gotcha — <code>warpAffine<\/code> to the original size clips the corners. Grow the canvas and shift the rotation center.<\/p>\n<p><strong>The problem:<\/strong> rotate an image by 30° and the corners vanish — because <code>warpAffine<\/code> renders into a canvas of the <em>original<\/em> size.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> same-size canvas (clips)          grown canvas (fits)\n +------------+                +--------------------+\n |  /\\ lost   |                |        /\\          |\n | /  \\       |      ==&gt;       |       /  \\         |\n | \\  /       |                |       \\  /         |\n |  \\/ lost   |                |        \\/          |\n +------------+                +--------------------+\n                               new_w = h|sin| + w|cos|\n                               new_h = h|cos| + w|sin|\n                               then shift M's translation to recenter<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the rotated image's bounding box comes straight from projecting w and h through |cos| and |sin| — and the rotation matrix already <em>contains<\/em> those values, so no extra trig. The naive alternative — pad the image heavily, rotate, crop — works but wastes memory and adds a step. Bonus answer: for exact 90/180/270 use <code>cv2.rotate<\/code>, which is lossless and instant.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> rotate_bound(path, angle, out=<span class=\"tok-string\">\"e3_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    h, w = img.shape[:<span class=\"tok-number\">2<\/span>]\n    center = (w / <span class=\"tok-number\">2<\/span>, h / <span class=\"tok-number\">2<\/span>)\n    M = <span class=\"tok-builtin\">cv2<\/span>.getRotationMatrix2D(center, angle, <span class=\"tok-number\">1.0<\/span>)\n    cos, sin = <span class=\"tok-builtin\">abs<\/span>(M[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>]), <span class=\"tok-builtin\">abs<\/span>(M[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">1<\/span>])     <span class=\"tok-comment\"># matrix already holds cos/sin<\/span>\n    new_w = <span class=\"tok-builtin\">int<\/span>(h * sin + w * cos)            <span class=\"tok-comment\"># bounding box of the rotated image<\/span>\n    new_h = <span class=\"tok-builtin\">int<\/span>(h * cos + w * sin)\n    M[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">2<\/span>] += new_w / <span class=\"tok-number\">2<\/span> - center[<span class=\"tok-number\">0<\/span>]          <span class=\"tok-comment\"># shift translation so the result<\/span>\n    M[<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>] += new_h / <span class=\"tok-number\">2<\/span> - center[<span class=\"tok-number\">1<\/span>]          <span class=\"tok-comment\"># stays centered in the new canvas<\/span>\n    rotated = <span class=\"tok-builtin\">cv2<\/span>.warpAffine(img, M, (new_w, new_h))\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, rotated)\n    <span class=\"tok-keyword\">return<\/span> rotated<\/code><\/pre>\n<p><strong>Watch out:<\/strong> positive angle = <strong>counter-clockwise<\/strong> in OpenCV. If you only ever need 90/180/270, use <code>cv2.rotate(img, cv2.ROTATE_90_CLOCKWISE)<\/code> — it's exact and fast.<\/p>\n<hr>\n<h2 id=\"problem-e4-blur-a-region-apply-a-mask-privacy-blur\">Problem E4: Blur a region + apply a mask (privacy blur)<\/h2>\n<p><strong>Tests:<\/strong> ROI slicing (views write back in place!) and <code>bitwise_and<\/code> masking — the two building blocks of every \"redact this part\" task.<\/p>\n<p><strong>The problem:<\/strong> redact part of an image — blur an address, hide a face, or keep only a region of interest.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> roi = img[y:y+h, x:x+w]     &lt;- this is a VIEW (a window into img), not a copy\n img[y:y+h, x:x+w] = blur(roi)  &lt;- writing back mutates the original in place\n\n non-rectangular?  build a mask  -&gt;  bitwise_and(img, img, mask=mask)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> NumPy slices share memory with the parent array — that's what makes redaction a two-liner with no copying. It's also the classic bug source: mutate a slice you thought was independent. Say both sides of that coin. And for <em>real<\/em> privacy prefer solid fill or heavy pixelation over Gaussian blur — mild blurs have been reversed in practice.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> blur_region(path, rect, out=<span class=\"tok-string\">\"e4_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    x, y, w, h = rect\n    roi = img[y:y + h, x:x + w]               <span class=\"tok-comment\"># a VIEW into img, not a copy<\/span>\n    img[y:y + h, x:x + w] = <span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(roi, (<span class=\"tok-number\">31<\/span>, <span class=\"tok-number\">31<\/span>), <span class=\"tok-number\">0<\/span>)  <span class=\"tok-comment\"># write blur back<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img\n\n<span class=\"tok-keyword\">def<\/span> keep_masked(img, mask):\n    <span class=\"tok-comment\"># keep pixels where mask &gt; 0, zero elsewhere (mask must be uint8, 1-channel)<\/span>\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">cv2<\/span>.bitwise_and(img, img, mask=mask)<\/code><\/pre>\n<p><strong>Watch out:<\/strong> blur kernel sizes must be <strong>odd<\/strong>. Slices are views — mutating <code>roi<\/code> mutates <code>img<\/code>; call <code>.copy()<\/code> when you <em>don't<\/em> want that.<\/p>\n<hr>\n<h2 id=\"problem-e5-locate-a-barcode-gradient-morphology\">Problem E5: Locate a barcode (gradient + morphology) ⭐<\/h2>\n<p><strong>Tests:<\/strong> a logistics classic. Barcodes have strong <strong>horizontal<\/strong> gradient and weak vertical gradient; morphological closing glues the bars into one blob.<\/p>\n<p><strong>The problem:<\/strong> find WHERE the barcode sits on a shipping label — any barcode, any content, no training data.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> barcode = || ||| | || |||    a patch of DENSE VERTICAL EDGES\n d/dx  -&gt; fires on every bar edge (HIGH)\n d/dy  -&gt; bars are vertical, nothing changes vertically (~0)\n\n grad_x - grad_y  -&gt;  bright exactly where \"vertical-edge-ness\" is high\n       |  blur + Otsu       speckled blob over the bars\n       |  close (21x7)      wide flat kernel bridges the GAPS between bars\n       v                    ==&gt; one solid rectangle\n minAreaRect of biggest contour = barcode box<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the <em>content<\/em> of barcodes varies but their texture signature — many parallel vertical edges — never does, so a gradient filter finds them with zero training. The closing kernel's shape is the insight: wide and flat, because the gaps to bridge are horizontal. A neural detector also works, but this runs in milliseconds on a CPU — the classic logistics-pipeline answer.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_barcode(path, out=<span class=\"tok-string\">\"e5_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    grad_x = <span class=\"tok-builtin\">cv2<\/span>.Sobel(gray, <span class=\"tok-builtin\">cv2<\/span>.CV_32F, <span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>)     <span class=\"tok-comment\"># d/dx: bars fire strongly<\/span>\n    grad_y = <span class=\"tok-builtin\">cv2<\/span>.Sobel(gray, <span class=\"tok-builtin\">cv2<\/span>.CV_32F, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">1<\/span>)     <span class=\"tok-comment\"># d/dy: bars barely fire<\/span>\n    gradient = <span class=\"tok-builtin\">cv2<\/span>.convertScaleAbs(grad_x - grad_y)  <span class=\"tok-comment\"># keep x-heavy regions<\/span>\n    blurred = <span class=\"tok-builtin\">cv2<\/span>.blur(gradient, (<span class=\"tok-number\">9<\/span>, <span class=\"tok-number\">9<\/span>))\n    _, thresh = <span class=\"tok-builtin\">cv2<\/span>.threshold(blurred, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)\n    <span class=\"tok-comment\"># wide flat kernel: close the GAPS between bars into one solid rectangle<\/span>\n    kernel = <span class=\"tok-builtin\">cv2<\/span>.getStructuringElement(<span class=\"tok-builtin\">cv2<\/span>.MORPH_RECT, (<span class=\"tok-number\">21<\/span>, <span class=\"tok-number\">7<\/span>))\n    closed = <span class=\"tok-builtin\">cv2<\/span>.morphologyEx(thresh, <span class=\"tok-builtin\">cv2<\/span>.MORPH_CLOSE, kernel)\n    closed = <span class=\"tok-builtin\">cv2<\/span>.erode(closed, <span class=\"tok-keyword\">None<\/span>, iterations=<span class=\"tok-number\">4<\/span>)   <span class=\"tok-comment\"># drop small leftovers<\/span>\n    closed = <span class=\"tok-builtin\">cv2<\/span>.dilate(closed, <span class=\"tok-keyword\">None<\/span>, iterations=<span class=\"tok-number\">4<\/span>)  <span class=\"tok-comment\"># restore the big blob<\/span>\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(closed, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> contours:\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">\"no barcode found\"<\/span>)\n    rect = <span class=\"tok-builtin\">cv2<\/span>.minAreaRect(<span class=\"tok-builtin\">max<\/span>(contours, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea))  <span class=\"tok-comment\"># rotated rect<\/span>\n    box = <span class=\"tok-builtin\">cv2<\/span>.boxPoints(rect).astype(<span class=\"tok-builtin\">int<\/span>)                       <span class=\"tok-comment\"># its 4 corners<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.drawContours(img, [box], -<span class=\"tok-number\">1<\/span>, (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img<\/code><\/pre>\n<p><strong>Watch out:<\/strong> this only <em>localizes<\/em> — decoding needs <code>cv2.barcode_BarcodeDetector<\/code> or <code>pyzbar<\/code>. If the barcode may be rotated, run on both <code>grad_x - grad_y<\/code> and <code>grad_y - grad_x<\/code>, keep the stronger response.<\/p>\n<hr>\n<h2 id=\"problem-e6-detect-table-document-lines-hough-transform\">Problem E6: Detect table / document lines (Hough transform)<\/h2>\n<p><strong>Tests:<\/strong> <code>HoughLinesP<\/code> — the go-to for finding straight structure (table grids, form fields, document edges).<\/p>\n<p><strong>The problem:<\/strong> find the straight lines in a document — table grids, form boxes, underlines.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> Canny edge pixels ==&gt; each edge pixel VOTES for every line that\n                       could pass through it (Hough accumulator)\n                       lines collecting &gt;= threshold votes win\n HoughLinesP returns real SEGMENTS: (x1, y1, x2, y2) with endpoints<\/code><\/pre>\n<p><strong>Why this way:<\/strong> voting makes Hough robust to broken edges — a line missing a third of its pixels still wins the vote. Choose <code>HoughLinesP<\/code> (probabilistic) over <code>HoughLines<\/code>: it hands you finite segments you can draw and measure, not infinite (rho, theta) pairs you'd have to convert. Alternative worth naming: to <em>separate<\/em> horizontal from vertical table lines, morphological opening with a long thin kernel (e.g. <code>(40, 1)<\/code>) is even simpler than Hough.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_lines(path, out=<span class=\"tok-string\">\"e6_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(gray, <span class=\"tok-number\">50<\/span>, <span class=\"tok-number\">150<\/span>)\n    <span class=\"tok-comment\"># probabilistic Hough: returns finite SEGMENTS (x1,y1,x2,y2), not infinite lines<\/span>\n    lines = <span class=\"tok-builtin\">cv2<\/span>.HoughLinesP(edges, rho=<span class=\"tok-number\">1<\/span>, theta=<span class=\"tok-builtin\">np<\/span>.pi / <span class=\"tok-number\">180<\/span>, threshold=<span class=\"tok-number\">80<\/span>,\n                            minLineLength=<span class=\"tok-number\">100<\/span>, maxLineGap=<span class=\"tok-number\">10<\/span>)\n    <span class=\"tok-keyword\">for<\/span> line <span class=\"tok-keyword\">in<\/span> (lines <span class=\"tok-keyword\">if<\/span> lines <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span> <span class=\"tok-keyword\">else<\/span> []):   <span class=\"tok-comment\"># lines is None if none found<\/span>\n        x1, y1, x2, y2 = line[<span class=\"tok-number\">0<\/span>]\n        <span class=\"tok-builtin\">cv2<\/span>.line(img, (x1, y1), (x2, y2), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img, <span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">if<\/span> lines <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span> <span class=\"tok-keyword\">else<\/span> <span class=\"tok-builtin\">len<\/span>(lines)<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>rho=1, theta=np.pi/180<\/code> are resolutions, not limits. To split a table into horizontal/vertical lines, morphology is often cleaner: erode+dilate with a long thin kernel like <code>(40, 1)<\/code> keeps only horizontal strokes.<\/p>\n<hr>\n<h2 id=\"problem-e7-2d-convolution-from-scratch-numpy-only\">Problem E7: 2D convolution from scratch (NumPy only)<\/h2>\n<p><strong>Tests:<\/strong> do you understand what <code>filter2D<\/code> actually does? Loop over the small <strong>kernel<\/strong>, never over pixels — that keeps it vectorized <em>and<\/em> short.<\/p>\n<p><strong>The problem:<\/strong> implement image filtering yourself — the \"do you actually know what <code>filter2D<\/code> does?\" question.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> kernel   0 -1  0      each output pixel = weighted sum of its\n         -1  5 -1      3x3 neighborhood (here: sharpen)\n          0 -1  0\n\n naive:  loop over 350,000 pixels x 9 weights  -&gt;  millions of Python steps\n smart:  loop over the 9 WEIGHTS; each step shifts the whole image and\n         adds it, weighted  -&gt;  9 vectorized array ops, same math<\/code><\/pre>\n<p><strong>Why this way:<\/strong> both loop orders compute the identical sum — but flipping them moves the heavy loop from the Python interpreter into NumPy's C code, a ~1000x speedup for the same line count. This \"make the big loop the vectorized one\" trick generalizes far beyond convolution. Edge-padding by half the kernel keeps output size equal to input ('same' convolution, like filter2D's default).<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> convolve2d(img, kernel):\n    kh, kw = kernel.shape\n    pad_h, pad_w = kh // <span class=\"tok-number\">2<\/span>, kw // <span class=\"tok-number\">2<\/span>\n    <span class=\"tok-comment\"># pad edges so output size == input size ('same' convolution)<\/span>\n    padded = <span class=\"tok-builtin\">np<\/span>.pad(img.astype(<span class=\"tok-builtin\">np<\/span>.float32), ((pad_h, pad_h), (pad_w, pad_w)), mode=<span class=\"tok-string\">\"edge\"<\/span>)\n    out = <span class=\"tok-builtin\">np<\/span>.zeros(img.shape, <span class=\"tok-builtin\">np<\/span>.float32)\n    <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(kh):                     <span class=\"tok-comment\"># 3x3 kernel = 9 iterations total,<\/span>\n        <span class=\"tok-keyword\">for<\/span> j <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(kw):                 <span class=\"tok-comment\"># each one a whole-image NumPy op<\/span>\n            out += kernel[i, j] * padded[i:i + img.shape[<span class=\"tok-number\">0<\/span>], j:j + img.shape[<span class=\"tok-number\">1<\/span>]]\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">np<\/span>.clip(out, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>).astype(<span class=\"tok-builtin\">np<\/span>.uint8)   <span class=\"tok-comment\"># clip BEFORE uint8 or it wraps<\/span><\/code><\/pre>\n<p><strong>Watch out:<\/strong> true convolution flips the kernel; this (and <code>filter2D<\/code>) computes <strong>correlation<\/strong> — identical for symmetric kernels. Casting negatives straight to uint8 silently wraps (-1 → 255): always <code>np.clip<\/code> first.<\/p>\n<hr>\n<h2 id=\"problem-e8-filter-contours-by-shape-find-label-like-rectangles\">Problem E8: Filter contours by shape (find label-like rectangles)<\/h2>\n<p><strong>Tests:<\/strong> turning raw contours into decisions with cheap shape stats: area, aspect ratio, and <em>extent<\/em> (how much of its bounding box the shape fills).<\/p>\n<p><strong>The problem:<\/strong> contour detection found twenty shapes — which ones are actually labels (rectangles), and which are circles, blobs, and junk?<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> candidate     area    aspect(w/h)   extent(area/bbox area)\n rectangle     big       ~1.0          ~1.00   ==&gt; KEEP\n circle        big       ~1.0          ~0.79   ==&gt; reject (doesn't fill box)\n noise speck   tiny        -             -     ==&gt; reject first (cheapest test)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> three one-line statistics do what would otherwise need a trained classifier — and every rejection is explainable (\"dropped: extent 0.62\"), which matters in production debugging. Order the tests cheapest-first so expensive checks run on fewer candidates. If rectangles may be <em>rotated<\/em>, compute extent against <code>minAreaRect<\/code> area instead of the axis-aligned box.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_rectangles(path, min_area=<span class=\"tok-number\">1000<\/span>, out=<span class=\"tok-string\">\"e8_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    _, binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(gray, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(binary, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    kept = []\n    <span class=\"tok-keyword\">for<\/span> contour <span class=\"tok-keyword\">in<\/span> contours:\n        area = <span class=\"tok-builtin\">cv2<\/span>.contourArea(contour)\n        <span class=\"tok-keyword\">if<\/span> area &lt; min_area:                 <span class=\"tok-comment\"># 1. drop noise<\/span>\n            <span class=\"tok-keyword\">continue<\/span>\n        x, y, w, h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(contour)\n        aspect = w / h                      <span class=\"tok-comment\"># 2. drop long thin strips<\/span>\n        extent = area / (w * h)             <span class=\"tok-comment\"># 3. rect fills ~1.0, circle ~0.79<\/span>\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-number\">0.3<\/span> &lt; aspect &lt; <span class=\"tok-number\">3.0<\/span> <span class=\"tok-keyword\">and<\/span> extent &gt; <span class=\"tok-number\">0.85<\/span>:\n            kept.append((x, y, w, h))\n            <span class=\"tok-builtin\">cv2<\/span>.rectangle(img, (x, y), (x + w, y + h), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img, kept<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>contourArea<\/code> ≠ pixel count — it's the polygon area (Green's theorem). Another handy stat: <strong>circularity<\/strong> <code>4*pi*area / perimeter**2<\/code> is 1.0 for a circle, ~0.785 for a square. Combine 2–3 cheap stats instead of one magic number.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"detection-logic.md\" href=\"#\">detection-logic.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"problem-1-preprocess-for-ocr-gray-blur-otsu-save","text":"Problem 1: Preprocess for OCR (gray → blur → Otsu → save)"},{"level":2,"id":"problem-2-clean-a-noisy-scanned-document-adaptive-threshold-morphology","text":"Problem 2: Clean a noisy scanned document (adaptive threshold + morphology)"},{"level":2,"id":"problem-3-deskew-a-rotated-document","text":"Problem 3: Deskew a rotated document"},{"level":2,"id":"problem-4-4-point-perspective-transform-scan-this-label","text":"Problem 4: 4-point perspective transform (\"scan this label\") ⭐"},{"level":2,"id":"problem-5-find-and-crop-the-largest-rectangle-document-boundary","text":"Problem 5: Find and crop the largest rectangle (document boundary)"},{"level":2,"id":"problem-6-resize-keeping-aspect-ratio-pad-to-square-letterbox","text":"Problem 6: Resize keeping aspect ratio, pad to square (letterbox)"},{"level":2,"id":"problem-7-boost-contrast-on-a-dark-image-clahe","text":"Problem 7: Boost contrast on a dark image (CLAHE)"},{"level":2,"id":"problem-e1-find-an-object-by-color-hsv-inrange","text":"Problem E1: Find an object by color (HSV + inRange)"},{"level":2,"id":"problem-e2-template-matching-find-a-logo-stamp","text":"Problem E2: Template matching (find a logo / stamp)"},{"level":2,"id":"problem-e3-rotate-by-any-angle-without-cropping-corners","text":"Problem E3: Rotate by any angle without cropping corners"},{"level":2,"id":"problem-e4-blur-a-region-apply-a-mask-privacy-blur","text":"Problem E4: Blur a region + apply a mask (privacy blur)"},{"level":2,"id":"problem-e5-locate-a-barcode-gradient-morphology","text":"Problem E5: Locate a barcode (gradient + morphology) ⭐"},{"level":2,"id":"problem-e6-detect-table-document-lines-hough-transform","text":"Problem E6: Detect table / document lines (Hough transform)"},{"level":2,"id":"problem-e7-2d-convolution-from-scratch-numpy-only","text":"Problem E7: 2D convolution from scratch (NumPy only)"},{"level":2,"id":"problem-e8-filter-contours-by-shape-find-label-like-rectangles","text":"Problem E8: Filter contours by shape (find label-like rectangles)"}],"text":"image processing & geometry 💡 tl;dr this is the heart of the test. master the preprocessing chain (gray → blur → threshold → morphology) and the 4-point perspective transform (detect a document/label quad and warp it flat). everything here runs on a single image and saves an output image — exactly what the test asks for. every solution is complete and runnable. practice typing each from a blank file. problem 1: preprocess for ocr (gray → blur → otsu → save) tests: the fundamental chain, color conversion, thresholding, saving output. the problem: an ocr engine can't read a color photo — it wants crisp black-and-white where ink is cleanly separated from paper. turn a messy photo into exactly that. the plan: photo (3 channels) | cvtcolor drop color, keep brightness (1 channel) v gray | gaussianblur smooth away sensor noise before deciding v smooth gray | otsu threshold every pixel becomes pure 0 or 255 v black/white --imwrite--> saved why this way: a fixed cutoff like 127 breaks the moment lighting changes. otsu instead looks at the image's brightness histogram and picks the split point that best separates \"dark pixels\" from \"bright pixels\" — zero tuning. and blur comes first because thresholding is a hard yes/no decision: one speck of noise near the cutoff flips into a black dot. smooth before deciding, never after. import cv2 def preprocess(path, out= \"p1_out.png\" ): img = cv2 .imread(path) if img is none : raise filenotfounderror(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) blurred = cv2 .gaussianblur(gray, ( 5 , 5 ), 0 ) # denoise before threshold # otsu auto-picks the threshold; thresh_binary_inv makes text white on black _, binary = cv2 .threshold(blurred, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) cv2 .imwrite(out, binary) return binary if __name__ == \"__main__\" : preprocess( \"input.jpg\" ) watch out: otsu needs a single-channel image and thresh=0 . blur first or threshold gets speckly. problem 2: clean a noisy scanned document (adaptive threshold + morphology) tests: adaptive thresholding (uneven lighting) and morphology to remove specks. the problem: real scans are unevenly lit — one corner sits in shadow. any single global cutoff (even otsu's) is then wrong somewhere : right for the bright side, hopeless for the dark side. the plan: uneven scan one global cutoff cutoff per 31x31 window +------------+ +------------+ +------------+ | text #####| shadow | text #####| shadow | text text | | text #####| side | text #####| swallowed | text text | +------------+ +------------+ +------------+ global threshold adaptivethreshold why this way: adaptivethreshold recomputes the cutoff inside every small window, so each region is judged against its own lighting. the leftover salt noise is erased with morphological opening (erode → dilate): erosion deletes anything smaller than the kernel, dilation regrows the surviving text to full size. flip to closing when the defect is holes inside strokes, not specks. import cv2 import numpy as np def clean_scan(path, out= \"p2_out.png\" ): img = cv2 .imread(path, cv2 .imread_grayscale) if img is none : raise filenotfounderror(path) # adaptive: threshold computed per-region → robust to shadows/gradients binary = cv2 .adaptivethreshold(img, 255 , cv2 .adaptive_thresh_gaussian_c, cv2 .thresh_binary, blocksize= 31 , c= 10 ) kernel = cv2 .getstructuringelement( cv2 .morph_rect, ( 2 , 2 )) opened = cv2 .morphologyex(binary, cv2 .morph_open, kernel) # remove small noise cv2 .imwrite(out, opened) return opened watch out: blocksize must be odd . opening removes specks; closing fills holes — pick by whether your noise is dots (open) or gaps (close). problem 3: deskew a rotated document tests: geometry from foreground pixels, rotation matrix, warpaffine. the problem: the page was scanned slightly rotated, so text lines are tilted and ocr row-grouping falls apart. find the tilt angle, rotate it back. the plan: tilted ink pixels fit one rotated box rotate by -angle \\ \\ \\ \\ .----------. __________ \\ \\ \\ \\ ==> | all text | angle=-12 ==> |__________| \\ \\ \\ \\ '----------' (upright) cv2.minarearect why this way: you could detect individual lines (hough) and average their angles, but minarearect answers in one call: collect every ink pixel, fit the tightest rotated rectangle around all of them, read its angle. the < -45 fix exists because opencv only reports angles within a 90° window — without the correction you'd sometimes \"deskew\" the page sideways. border_replicate fills the corners uncovered by rotation with edge colors instead of black wedges. import cv2 import numpy as np def deskew(path, out= \"p3_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) binary = cv2 .threshold(gray, 0 , 255 , cv2 .thresh_binary_inv + cv2 .thresh_otsu)[ 1 ] foreground_pixels = np .column_stack( np .where(binary > 0 )) # (row, col) of text angle = cv2 .minarearect(foreground_pixels)[- 1 ] # angle of tightest box if angle < - 45 : # opencv reports angle in a 90-deg range; angle = 90 + angle # flip so we rotate the short way, not 90-deg off (height, width) = img.shape[: 2 ] rotation_matrix = cv2 .getrotationmatrix2d((width / 2 , height / 2 ), angle, 1.0 ) rotated = cv2 .warpaffine(img, rotation_matrix, (width, height), flags= cv2 .inter_cubic, # smooth resample bordermode= cv2 .border_replicate) # no black corners cv2 .imwrite(out, rotated) return rotated watch out: minarearect angle conventions changed across opencv versions — know the < -45 correction and be ready to explain it. problem 4: 4-point perspective transform (\"scan this label\") ⭐ tests: the single most likely task. detect the document's 4 corners and warp it to a flat top-down view. memorize the order_points + four_point_transform pair cold. the problem: a label photographed at an angle appears as a trapezoid . to read or measure it you need the flat, top-down rectangle — like a scanner sees. the plan: detected corners warped output tl._________.tr tl __________ tr / \\ 3x3 perspective | | / label \\ matrix (getpersp | label | / \\ + warpperspective) | | bl._____________.br ==> bl __________ br find quad: canny -> contours -> approxpolydp == 4 points why this way: an affine warp (2×3 matrix: rotate/scale/shear) can never fix this — affine preserves parallelism, and perspective distortion is exactly parallel lines converging. you need the 3×3 homography, which is fully determined by 4 point pairs — hence \"4-point transform\". order_points exists because getperspectivetransform pairs source and destination corners by array position : hand it corners in a random order and the output comes out mirrored or rotated. the sum/diff trick identifies each corner without if-else chains. import cv2 import numpy as np def order_points(points): \"\"\"return corners as [top-left, top-right, bottom-right, bottom-left].\"\"\" ordered = np .zeros(( 4 , 2 ), dtype= \"float32\" ) coord_sum = points. sum (axis= 1 ) ordered[ 0 ] = points[ np .argmin(coord_sum)] # top-left has smallest x+y ordered[ 2 ] = points[ np .argmax(coord_sum)] # bottom-right has largest x+y coord_diff = np .diff(points, axis= 1 ) ordered[ 1 ] = points[ np .argmin(coord_diff)] # top-right has smallest y-x ordered[ 3 ] = points[ np .argmax(coord_diff)] # bottom-left has largest y-x return ordered def four_point_transform(image, points): ordered = order_points(points) (top_left, top_right, bottom_right, bottom_left) = ordered width_bottom = np .linalg.norm(bottom_right - bottom_left) width_top = np .linalg.norm(top_right - top_left) out_width = int ( max (width_bottom, width_top)) # output = longest measured side height_right = np .linalg.norm(top_right - bottom_right) height_left = np .linalg.norm(top_left - bottom_left) out_height = int ( max (height_right, height_left)) # destination corners of a flat, axis-aligned rectangle (same order!) destination = np .array([[ 0 , 0 ], [out_width - 1 , 0 ], [out_width - 1 , out_height - 1 ], [ 0 , out_height - 1 ]], dtype= \"float32\" ) perspective_matrix = cv2 .getperspectivetransform(ordered, destination) return cv2 .warpperspective(image, perspective_matrix, (out_width, out_height)) def scan(path, out= \"p4_out.png\" ): img = cv2 .imread(path) ratio = img.shape[ 0 ] / 500.0 resized = cv2 .resize(img, ( int (img.shape[ 1 ] / ratio), 500 )) gray = cv2 .cvtcolor(resized, cv2 .color_bgr2gray) edges = cv2 .canny( cv2 .gaussianblur(gray, ( 5 , 5 ), 0 ), 75 , 200 ) contours, _ = cv2 .findcontours(edges, cv2 .retr_list, cv2 .chain_approx_simple) contours = sorted(contours, key= cv2 .contourarea, reverse= true )[: 5 ] document_corners = none for contour in contours: perimeter = cv2 .arclength(contour, true ) corners = cv2 .approxpolydp(contour, 0.02 * perimeter, true ) # simplify if len (corners) == 4 : # found a quadrilateral document_corners = corners.reshape( 4 , 2 ) * ratio # scale to full res break if document_corners is none : raise runtimeerror( \"no 4-corner document found\" ) warped = four_point_transform(img, document_corners.astype( \"float32\" )) cv2 .imwrite(out, warped) return warped watch out: getperspectivetransform needs float32 points in a consistent order — that's why order_points exists. scale corners back up if you detected on a resized copy. problem 5: find and crop the largest rectangle (document boundary) tests: canny + contours + approxpolydp + bounding-box crop. the problem: isolate just the document/label from the photo background — the \"crop out the interesting part\" task. the plan: photo --blur+canny--> edge map --findcontours--> [c1, c2, c3, ...] | max(key=contourarea) v page outline | boundingrect v img[y:y+h, x:x+w] (pure slicing) why this way: thresholding works only if the page is clearly brighter than the background; edges survive even when brightnesses are similar. retr_external keeps only outermost contours, so \"largest\" means the page outline — not a logo or text block inside it. boundingrect returns an axis-aligned box, croppable with a slice; if the document is tilted, this crop keeps background wedges — that's when you upgrade to problem 4's perspective warp. import cv2 def crop_largest_rect(path, out= \"p5_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) edges = cv2 .canny( cv2 .gaussianblur(gray, ( 5 , 5 ), 0 ), 50 , 150 ) # low:high ~ 1:3 # retr_external = outermost contours only (ignore holes/children) contours, _ = cv2 .findcontours(edges, cv2 .retr_external, cv2 .chain_approx_simple) if not contours: raise runtimeerror( \"no contours\" ) largest = max (contours, key= cv2 .contourarea) x, y, w, h = cv2 .boundingrect(largest) crop = img[y:y + h, x:x + w] cv2 .imwrite(out, crop) return crop watch out: img[y:y+h, x:x+w] — rows first (y), then cols (x). a frequent slip. problem 6: resize keeping aspect ratio, pad to square (letterbox) tests: the standard model-input preprocessing; aspect-ratio math, padding. the problem: detection models want a fixed square input (e.g. 640×640) but photos come in any shape. naive resize to a square squashes objects. the plan: stretch (bad) letterbox (good) +-----------+ +-----------+ | oo -> ooo | |###########| <- gray pad (114) | distorted!| | image | +-----------+ | untouched | |###########| scale by long side, pad the rest why this way: three options exist. stretching distorts geometry — a square carton becomes a rectangle and the model's learned shapes break. center-cropping keeps shapes but throws away edge pixels (where detections might be). letterboxing keeps every pixel and every shape , paying only some wasted pad. keep the scale and offsets — you need them to map detections back to the original image coordinates. import cv2 import numpy as np def letterbox(path, size= 640 , out= \"p6_out.png\" ): img = cv2 .imread(path) h, w = img.shape[: 2 ] scale = size / max (h, w) # fit the long side new_w, new_h = int (w * scale), int (h * scale) resized = cv2 .resize(img, (new_w, new_h), interpolation= cv2 .inter_area) canvas = np .full((size, size, 3 ), 114 , dtype= np .uint8) # 114 = yolo pad-gray top, left = (size - new_h) // 2 , (size - new_w) // 2 canvas[top:top + new_h, left:left + new_w] = resized cv2 .imwrite(out, canvas) return canvas watch out: inter_area for shrinking, inter_linear/cubic for enlarging. keep the scale + padding offsets if you later need to map detections back. problem 7: boost contrast on a dark image (clahe) tests: histogram equalization done right (local, on luminance only). the problem: a dark, low-contrast image has all its pixel values bunched into a narrow band — details exist but are invisible. the plan: histogram before after clahe |# | # # |## | ## ## # |###._____________ |.##.####.##._____ 0 255 0 255 values crammed left spread out - per tile, clip-limited why this way: plain equalizehist uses one histogram for the whole image — it blows out regions that were already bright and massively amplifies noise in flat areas. clahe fixes both failure modes: it equalizes per tile (adapts to local lighting) and clips each histogram (caps noise amplification). doing it on the l channel of lab is what preserves color — equalizing b, g, r separately changes their ratios , which literally changes the colors. import cv2 def enhance(path, out= \"p7_out.png\" ): img = cv2 .imread(path) lab = cv2 .cvtcolor(img, cv2 .color_bgr2lab) # equalize l, keep color lightness, green_red, blue_yellow = cv2 .split(lab) clahe = cv2 .createclahe(cliplimit= 2.0 , tilegridsize=( 8 , 8 )) equalized_lightness = clahe.apply(lightness) merged = cv2 .merge((equalized_lightness, green_red, blue_yellow)) out_img = cv2 .cvtcolor(merged, cv2 .color_lab2bgr) cv2 .imwrite(out, out_img) return out_img watch out: equalize the l channel in lab (or v in hsv), never the raw bgr channels — that wrecks color. clahe (local) beats global equalizehist for uneven lighting. more practice: classic cv interview problems eight more exercises in the same style: short functions, one idea each. the setup assets include color.jpg , barcode.jpg , and lines.jpg for these. # topic core api e1 find object by color cvtcolor(hsv) + inrange e2 template matching matchtemplate + minmaxloc e3 rotate without cropping rotation matrix math e4 blur/mask a region roi slicing + bitwise_and e5 locate a barcode sobel gradient + morphology e6 detect table lines canny + houghlinesp e7 convolution from scratch numpy only e8 filter contours by shape area / aspect / extent problem e1: find an object by color (hsv + inrange) tests: color spaces. hsv separates what color (h) from how bright (v), so a single hue range survives lighting changes that would break bgr thresholds. the problem: find \"the green object\" reliably — even when the lighting makes its rgb values completely different from yesterday's photo. the plan: in bgr, \"green\" = (30,90,20)? (80,200,90)? (40,140,60)? moves with lighting! in hsv, hue stays ~60 whether the scene is dim or bright. cvtcolor(hsv) -> inrange(lo, hi) -> binary mask -> open (despeckle) -> largest contour -> boundingrect why this way: in bgr all three numbers change together when light dims, so no fixed bgr box captures \"green\". hsv factors a pixel into hue ( which color), saturation (how vivid), value (how bright) — lighting mostly moves v, so a stable h range does the job. a learned segmentation model could too, but when the target color is known, two thresholds beat a neural net. import cv2 import numpy as np def find_color_object(path, lower_hsv, upper_hsv, out= \"e1_out.png\" ): img = cv2 .imread(path) hsv = cv2 .cvtcolor(img, cv2 .color_bgr2hsv) # hue is lighting-robust mask = cv2 .inrange(hsv, np .array(lower_hsv), np .array(upper_hsv)) # 255 inside range mask = cv2 .morphologyex(mask, cv2 .morph_open, np .ones(( 5 , 5 ), np .uint8)) # kill specks contours, _ = cv2 .findcontours(mask, cv2 .retr_external, cv2 .chain_approx_simple) if not contours: return img, none x, y, w, h = cv2 .boundingrect( max (contours, key= cv2 .contourarea)) # biggest blob cv2 .rectangle(img, (x, y), (x + w, y + h), ( 0 , 255 , 255 ), 2 ) cv2 .imwrite(out, img) return img, (x, y, w, h) watch out: opencv hue runs 0–179 (not 0–359). red wraps around 0, so red needs two ranges ( 0-10 and 170-179 ) or-ed together with cv2.bitwise_or . problem e2: template matching (find a logo / stamp) tests: matchtemplate slides the template over the image and scores every position; minmaxloc finds the best one. the problem: find where a known patch — a logo, stamp, or icon — appears inside a larger image. the plan: template slides across the image; every position gets a similarity score +----------------+ | .1 .2 .1 .0 .1 | the brightest cell of the | .2 .9 .3 .1 .0 | <-- score map is the best match: | .1 .3 .2 .1 .1 | minmaxloc finds it +----------------+ why this way: when the target's scale and rotation are fixed (same camera, same layout — typical for documents), template matching is exact, tiny, and needs zero training. know its failure mode out loud: any scale or rotation change kills the score — that's when you reach for feature matching (orb/sift + homography) or a trained detector. tm_ccoeff_normed is the mode to memorize: scores normalized to [-1, 1] mean one threshold works everywhere. import cv2 def find_template(image_path, template, threshold= 0.8 , out= \"e2_out.png\" ): img = cv2 .imread(image_path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) # tm_ccoeff_normed gives scores in [-1, 1]; 1.0 = perfect match scores = cv2 .matchtemplate(gray, template, cv2 .tm_ccoeff_normed) _, best_score, _, best_loc = cv2 .minmaxloc(scores) # (min, max, minloc, maxloc) h, w = template.shape if best_score >= threshold: cv2 .rectangle(img, best_loc, (best_loc[ 0 ] + w, best_loc[ 1 ] + h), ( 0 , 255 , 0 ), 2 ) cv2 .imwrite(out, img) return img, best_score watch out: template matching is not scale- or rotation-invariant — say this in the interview. for all matches above the threshold use ys, xs = np.where(scores >= threshold) instead of minmaxloc . problem e3: rotate by any angle without cropping corners tests: the classic gotcha — warpaffine to the original size clips the corners. grow the canvas and shift the rotation center. the problem: rotate an image by 30° and the corners vanish — because warpaffine renders into a canvas of the original size. the plan: same-size canvas (clips) grown canvas (fits) +------------+ +--------------------+ | /\\ lost | | /\\ | | / \\ | ==> | / \\ | | \\ / | | \\ / | | \\/ lost | | \\/ | +------------+ +--------------------+ new_w = h|sin| + w|cos| new_h = h|cos| + w|sin| then shift m's translation to recenter why this way: the rotated image's bounding box comes straight from projecting w and h through |cos| and |sin| — and the rotation matrix already contains those values, so no extra trig. the naive alternative — pad the image heavily, rotate, crop — works but wastes memory and adds a step. bonus answer: for exact 90/180/270 use cv2.rotate , which is lossless and instant. import cv2 import numpy as np def rotate_bound(path, angle, out= \"e3_out.png\" ): img = cv2 .imread(path) h, w = img.shape[: 2 ] center = (w / 2 , h / 2 ) m = cv2 .getrotationmatrix2d(center, angle, 1.0 ) cos, sin = abs (m[ 0 , 0 ]), abs (m[ 0 , 1 ]) # matrix already holds cos/sin new_w = int (h * sin + w * cos) # bounding box of the rotated image new_h = int (h * cos + w * sin) m[ 0 , 2 ] += new_w / 2 - center[ 0 ] # shift translation so the result m[ 1 , 2 ] += new_h / 2 - center[ 1 ] # stays centered in the new canvas rotated = cv2 .warpaffine(img, m, (new_w, new_h)) cv2 .imwrite(out, rotated) return rotated watch out: positive angle = counter-clockwise in opencv. if you only ever need 90/180/270, use cv2.rotate(img, cv2.rotate_90_clockwise) — it's exact and fast. problem e4: blur a region + apply a mask (privacy blur) tests: roi slicing (views write back in place!) and bitwise_and masking — the two building blocks of every \"redact this part\" task. the problem: redact part of an image — blur an address, hide a face, or keep only a region of interest. the plan: roi = img[y:y+h, x:x+w] <- this is a view (a window into img), not a copy img[y:y+h, x:x+w] = blur(roi) <- writing back mutates the original in place non-rectangular? build a mask -> bitwise_and(img, img, mask=mask) why this way: numpy slices share memory with the parent array — that's what makes redaction a two-liner with no copying. it's also the classic bug source: mutate a slice you thought was independent. say both sides of that coin. and for real privacy prefer solid fill or heavy pixelation over gaussian blur — mild blurs have been reversed in practice. import cv2 import numpy as np def blur_region(path, rect, out= \"e4_out.png\" ): img = cv2 .imread(path) x, y, w, h = rect roi = img[y:y + h, x:x + w] # a view into img, not a copy img[y:y + h, x:x + w] = cv2 .gaussianblur(roi, ( 31 , 31 ), 0 ) # write blur back cv2 .imwrite(out, img) return img def keep_masked(img, mask): # keep pixels where mask > 0, zero elsewhere (mask must be uint8, 1-channel) return cv2 .bitwise_and(img, img, mask=mask) watch out: blur kernel sizes must be odd . slices are views — mutating roi mutates img ; call .copy() when you don't want that. problem e5: locate a barcode (gradient + morphology) ⭐ tests: a logistics classic. barcodes have strong horizontal gradient and weak vertical gradient; morphological closing glues the bars into one blob. the problem: find where the barcode sits on a shipping label — any barcode, any content, no training data. the plan: barcode = || ||| | || ||| a patch of dense vertical edges d/dx -> fires on every bar edge (high) d/dy -> bars are vertical, nothing changes vertically (~0) grad_x - grad_y -> bright exactly where \"vertical-edge-ness\" is high | blur + otsu speckled blob over the bars | close (21x7) wide flat kernel bridges the gaps between bars v ==> one solid rectangle minarearect of biggest contour = barcode box why this way: the content of barcodes varies but their texture signature — many parallel vertical edges — never does, so a gradient filter finds them with zero training. the closing kernel's shape is the insight: wide and flat, because the gaps to bridge are horizontal. a neural detector also works, but this runs in milliseconds on a cpu — the classic logistics-pipeline answer. import cv2 import numpy as np def find_barcode(path, out= \"e5_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) grad_x = cv2 .sobel(gray, cv2 .cv_32f, 1 , 0 ) # d/dx: bars fire strongly grad_y = cv2 .sobel(gray, cv2 .cv_32f, 0 , 1 ) # d/dy: bars barely fire gradient = cv2 .convertscaleabs(grad_x - grad_y) # keep x-heavy regions blurred = cv2 .blur(gradient, ( 9 , 9 )) _, thresh = cv2 .threshold(blurred, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) # wide flat kernel: close the gaps between bars into one solid rectangle kernel = cv2 .getstructuringelement( cv2 .morph_rect, ( 21 , 7 )) closed = cv2 .morphologyex(thresh, cv2 .morph_close, kernel) closed = cv2 .erode(closed, none , iterations= 4 ) # drop small leftovers closed = cv2 .dilate(closed, none , iterations= 4 ) # restore the big blob contours, _ = cv2 .findcontours(closed, cv2 .retr_external, cv2 .chain_approx_simple) if not contours: raise runtimeerror( \"no barcode found\" ) rect = cv2 .minarearect( max (contours, key= cv2 .contourarea)) # rotated rect box = cv2 .boxpoints(rect).astype( int ) # its 4 corners cv2 .drawcontours(img, [box], - 1 , ( 0 , 255 , 0 ), 2 ) cv2 .imwrite(out, img) return img watch out: this only localizes — decoding needs cv2.barcode_barcodedetector or pyzbar . if the barcode may be rotated, run on both grad_x - grad_y and grad_y - grad_x , keep the stronger response. problem e6: detect table / document lines (hough transform) tests: houghlinesp — the go-to for finding straight structure (table grids, form fields, document edges). the problem: find the straight lines in a document — table grids, form boxes, underlines. the plan: canny edge pixels ==> each edge pixel votes for every line that could pass through it (hough accumulator) lines collecting >= threshold votes win houghlinesp returns real segments: (x1, y1, x2, y2) with endpoints why this way: voting makes hough robust to broken edges — a line missing a third of its pixels still wins the vote. choose houghlinesp (probabilistic) over houghlines : it hands you finite segments you can draw and measure, not infinite (rho, theta) pairs you'd have to convert. alternative worth naming: to separate horizontal from vertical table lines, morphological opening with a long thin kernel (e.g. (40, 1) ) is even simpler than hough. import cv2 import numpy as np def find_lines(path, out= \"e6_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) edges = cv2 .canny(gray, 50 , 150 ) # probabilistic hough: returns finite segments (x1,y1,x2,y2), not infinite lines lines = cv2 .houghlinesp(edges, rho= 1 , theta= np .pi / 180 , threshold= 80 , minlinelength= 100 , maxlinegap= 10 ) for line in (lines if lines is not none else []): # lines is none if none found x1, y1, x2, y2 = line[ 0 ] cv2 .line(img, (x1, y1), (x2, y2), ( 0 , 0 , 255 ), 2 ) cv2 .imwrite(out, img) return img, 0 if lines is none else len (lines) watch out: rho=1, theta=np.pi/180 are resolutions, not limits. to split a table into horizontal/vertical lines, morphology is often cleaner: erode+dilate with a long thin kernel like (40, 1) keeps only horizontal strokes. problem e7: 2d convolution from scratch (numpy only) tests: do you understand what filter2d actually does? loop over the small kernel , never over pixels — that keeps it vectorized and short. the problem: implement image filtering yourself — the \"do you actually know what filter2d does?\" question. the plan: kernel 0 -1 0 each output pixel = weighted sum of its -1 5 -1 3x3 neighborhood (here: sharpen) 0 -1 0 naive: loop over 350,000 pixels x 9 weights -> millions of python steps smart: loop over the 9 weights; each step shifts the whole image and adds it, weighted -> 9 vectorized array ops, same math why this way: both loop orders compute the identical sum — but flipping them moves the heavy loop from the python interpreter into numpy's c code, a ~1000x speedup for the same line count. this \"make the big loop the vectorized one\" trick generalizes far beyond convolution. edge-padding by half the kernel keeps output size equal to input ('same' convolution, like filter2d's default). import numpy as np def convolve2d(img, kernel): kh, kw = kernel.shape pad_h, pad_w = kh // 2 , kw // 2 # pad edges so output size == input size ('same' convolution) padded = np .pad(img.astype( np .float32), ((pad_h, pad_h), (pad_w, pad_w)), mode= \"edge\" ) out = np .zeros(img.shape, np .float32) for i in range (kh): # 3x3 kernel = 9 iterations total, for j in range (kw): # each one a whole-image numpy op out += kernel[i, j] * padded[i:i + img.shape[ 0 ], j:j + img.shape[ 1 ]] return np .clip(out, 0 , 255 ).astype( np .uint8) # clip before uint8 or it wraps watch out: true convolution flips the kernel; this (and filter2d ) computes correlation — identical for symmetric kernels. casting negatives straight to uint8 silently wraps (-1 → 255): always np.clip first. problem e8: filter contours by shape (find label-like rectangles) tests: turning raw contours into decisions with cheap shape stats: area, aspect ratio, and extent (how much of its bounding box the shape fills). the problem: contour detection found twenty shapes — which ones are actually labels (rectangles), and which are circles, blobs, and junk? the plan: candidate area aspect(w/h) extent(area/bbox area) rectangle big ~1.0 ~1.00 ==> keep circle big ~1.0 ~0.79 ==> reject (doesn't fill box) noise speck tiny - - ==> reject first (cheapest test) why this way: three one-line statistics do what would otherwise need a trained classifier — and every rejection is explainable (\"dropped: extent 0.62\"), which matters in production debugging. order the tests cheapest-first so expensive checks run on fewer candidates. if rectangles may be rotated , compute extent against minarearect area instead of the axis-aligned box. import cv2 def find_rectangles(path, min_area= 1000 , out= \"e8_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) _, binary = cv2 .threshold(gray, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) contours, _ = cv2 .findcontours(binary, cv2 .retr_external, cv2 .chain_approx_simple) kept = [] for contour in contours: area = cv2 .contourarea(contour) if area < min_area: # 1. drop noise continue x, y, w, h = cv2 .boundingrect(contour) aspect = w / h # 2. drop long thin strips extent = area / (w * h) # 3. rect fills ~1.0, circle ~0.79 if 0.3 < aspect < 3.0 and extent > 0.85 : kept.append((x, y, w, h)) cv2 .rectangle(img, (x, y), (x + w, y + h), ( 0 , 255 , 0 ), 2 ) cv2 .imwrite(out, img) return img, kept watch out: contourarea ≠ pixel count — it's the polygon area (green's theorem). another handy stat: circularity 4*pi*area / perimeter**2 is 1.0 for a circle, ~0.785 for a square. combine 2–3 cheap stats instead of one magic number. → next: detection-logic.md","words":4796},{"path":"10-coding-practice/detection-logic.md","title":"Detection Logic","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"detection-logic\">Detection Logic<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD's \"complex logic layers on top of model detections.\" You'll get boxes (or points) and be asked to compute something: <strong>IoU<\/strong>, <strong>NMS<\/strong>, who's <strong>inside a zone<\/strong>, who <strong>crossed a line<\/strong>, or the <strong>reading order<\/strong> of OCR boxes. Pure Python + NumPy — no model needed. These are classic, so know them cold.<\/div><\/div>\n<hr>\n<h2 id=\"problem-8-iou-of-two-boxes\">Problem 8: IoU of two boxes<\/h2>\n<p><strong>Tests:<\/strong> the fundamental box metric; coordinate math; the empty-overlap edge case.<\/p>\n<p><strong>The problem:<\/strong> score how much two boxes agree, as a number in [0, 1] — the currency of all detection logic (NMS, evaluation, tracker matching).<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">   +-------+\n   |   A   |            IoU = overlap / (areaA + areaB - overlap)\n   |   +---+----+\n   |   |###|    |       ### intersection rectangle:\n   +---+---+    |       its left  = max(A.left,  B.left)\n       |    B   |       its right = min(A.right, B.right)\n       +--------+       (same idea for top/bottom)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the intersection of two ranges on ONE axis is simply [max(starts), min(ends)] — do that for x and for y, multiply the two lengths. The <code>max(0, ...)<\/code> clamp is the whole edge case: for disjoint boxes min-max goes negative and would fabricate overlap. And union must subtract the intersection, or the shared area is counted twice.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> iou(a, b):\n    <span class=\"tok-string\">\"\"\"Boxes as (x1, y1, x2, y2). Returns intersection-over-union in [0,1].\"\"\"<\/span>\n    ix1, iy1 = <span class=\"tok-builtin\">max<\/span>(a[<span class=\"tok-number\">0<\/span>], b[<span class=\"tok-number\">0<\/span>]), <span class=\"tok-builtin\">max<\/span>(a[<span class=\"tok-number\">1<\/span>], b[<span class=\"tok-number\">1<\/span>])     <span class=\"tok-comment\"># intersection top-left<\/span>\n    ix2, iy2 = <span class=\"tok-builtin\">min<\/span>(a[<span class=\"tok-number\">2<\/span>], b[<span class=\"tok-number\">2<\/span>]), <span class=\"tok-builtin\">min<\/span>(a[<span class=\"tok-number\">3<\/span>], b[<span class=\"tok-number\">3<\/span>])     <span class=\"tok-comment\"># intersection bottom-right<\/span>\n    iw, ih = <span class=\"tok-builtin\">max<\/span>(<span class=\"tok-number\">0<\/span>, ix2 - ix1), <span class=\"tok-builtin\">max<\/span>(<span class=\"tok-number\">0<\/span>, iy2 - iy1)   <span class=\"tok-comment\"># clamp at 0 → no overlap<\/span>\n    inter = iw * ih\n    area_a = (a[<span class=\"tok-number\">2<\/span>] - a[<span class=\"tok-number\">0<\/span>]) * (a[<span class=\"tok-number\">3<\/span>] - a[<span class=\"tok-number\">1<\/span>])\n    area_b = (b[<span class=\"tok-number\">2<\/span>] - b[<span class=\"tok-number\">0<\/span>]) * (b[<span class=\"tok-number\">3<\/span>] - b[<span class=\"tok-number\">1<\/span>])\n    union = area_a + area_b - inter                 <span class=\"tok-comment\"># don't double-count the overlap<\/span>\n    <span class=\"tok-keyword\">return<\/span> inter / union <span class=\"tok-keyword\">if<\/span> union &gt; <span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">else<\/span> <span class=\"tok-number\">0.0<\/span>\n\n<span class=\"tok-keyword\">if<\/span> __name__ == <span class=\"tok-string\">\"__main__\"<\/span>:\n    <span class=\"tok-builtin\">print<\/span>(iou((<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">10<\/span>), (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">15<\/span>, <span class=\"tok-number\">15<\/span>)))   <span class=\"tok-comment\"># 25 / 175 = 0.142...<\/span><\/code><\/pre>\n<p><strong>Watch out:<\/strong> the <code>max(0, ...)<\/code> clamp — without it, non-overlapping boxes give a bogus positive area.<\/p>\n<hr>\n<h2 id=\"problem-9-non-maximum-suppression-from-scratch\">Problem 9: Non-Maximum Suppression (from scratch)<\/h2>\n<p><strong>Tests:<\/strong> the dedup algorithm every detector needs. Sort by score, greedily keep the best, drop high-IoU neighbours.<\/p>\n<p><strong>The problem:<\/strong> a detector fires several overlapping boxes on the <em>same<\/em> object. Keep exactly one box per object.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> scores:  A=0.9   B=0.8   C=0.7\n 1. take best remaining:  A  -&gt; KEEP\n 2. IoU(A,B)=0.8 (same object)  -&gt; drop B\n    IoU(A,C)=0.0 (elsewhere)    -&gt; C survives\n 3. take best remaining:  C  -&gt; KEEP        result: [A, C]<\/code><\/pre>\n<p><strong>Why this way:<\/strong> greedy-by-confidence works because the highest-score box is usually the best-localized one — lock it in, delete everything that mostly overlaps it. The plain-Python version shows the algorithm; the NumPy version exists because the inner IoU loop is O(n²) — vectorizing \"winner vs all survivors\" into one array pass is what makes thousands of boxes per frame feasible. Name the follow-up: Soft-NMS decays scores instead of deleting, for crowded scenes where two real objects genuinely overlap.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> nms(boxes, scores, iou_thresh=<span class=\"tok-number\">0.5<\/span>):\n    <span class=\"tok-string\">\"\"\"boxes: list of (x1,y1,x2,y2); scores: list of floats. Returns kept indices.\"\"\"<\/span>\n    candidates = sorted(<span class=\"tok-builtin\">range<\/span>(<span class=\"tok-builtin\">len<\/span>(boxes)), key=<span class=\"tok-keyword\">lambda<\/span> i: scores[i], reverse=<span class=\"tok-keyword\">True<\/span>)  <span class=\"tok-comment\"># best first<\/span>\n    keep = []\n    <span class=\"tok-keyword\">while<\/span> candidates:\n        best = candidates.pop(<span class=\"tok-number\">0<\/span>)        <span class=\"tok-comment\"># highest score still in play<\/span>\n        keep.append(best)\n        candidates = [i <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> candidates             <span class=\"tok-comment\"># drop everything that<\/span>\n                      <span class=\"tok-keyword\">if<\/span> iou(boxes[best], boxes[i]) &lt; iou_thresh]  <span class=\"tok-comment\"># overlaps the winner<\/span>\n    <span class=\"tok-keyword\">return<\/span> keep<\/code><\/pre>\n<p>NumPy/vectorized version (worth knowing for \"make it fast\"):<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> nms_np(boxes, scores, iou_thresh=<span class=\"tok-number\">0.5<\/span>):\n    boxes = <span class=\"tok-builtin\">np<\/span>.asarray(boxes, dtype=<span class=\"tok-builtin\">float<\/span>)\n    x1, y1, x2, y2 = boxes.T                <span class=\"tok-comment\"># columns → four 1-D arrays<\/span>\n    areas = (x2 - x1) * (y2 - y1)\n    order = scores.argsort()[::-<span class=\"tok-number\">1<\/span>]          <span class=\"tok-comment\"># indices, highest score first<\/span>\n    keep = []\n    <span class=\"tok-keyword\">while<\/span> order.size &gt; <span class=\"tok-number\">0<\/span>:\n        best = order[<span class=\"tok-number\">0<\/span>]; keep.append(best)\n        others = order[<span class=\"tok-number\">1<\/span>:]\n        <span class=\"tok-comment\"># IoU of `best` vs ALL remaining boxes at once (no inner loop)<\/span>\n        inter_x1 = <span class=\"tok-builtin\">np<\/span>.maximum(x1[best], x1[others])\n        inter_y1 = <span class=\"tok-builtin\">np<\/span>.maximum(y1[best], y1[others])\n        inter_x2 = <span class=\"tok-builtin\">np<\/span>.minimum(x2[best], x2[others])\n        inter_y2 = <span class=\"tok-builtin\">np<\/span>.minimum(y2[best], y2[others])\n        inter_w =

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#d97757">
<title>AI Data Scientist: Video Intelligence Prep</title>
<style>
  :root{
    --bg:#faf9f5; --bg-soft:#f1efe7; --bg-side:#f6f4ee; --text:#23211c;
    --muted:#6b6557; --border:#e4e0d5; --accent:#c45f3c; --accent-2:#d97757;
    --accent-soft:#f6e7df; --code-bg:#f1efe7; --code-text:#5a4636; --quote:#5c5547;
    --tok-comment:#9b9482; --tok-string:#5f8a3f; --tok-keyword:#c45f3c; --tok-builtin:#15807f;
    --tok-number:#a9762a; --tok-decorator:#8b6dff; --tok-command:#15807f; --tok-flag:#a9762a; --tok-variable:#8b6dff;
    --link:#b9532f; --header-bg:rgba(250,249,245,.85);
    --shadow:0 1px 2px rgba(60,50,30,.05),0 6px 20px rgba(60,50,30,.06);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#1f1e1b; --bg-soft:#2a2824; --bg-side:#1a1916; --text:#ece8df;
    --muted:#a39c8c; --border:#34322c; --accent:#e08763; --accent-2:#d97757;
    --accent-soft:#3a2b22; --code-bg:#2a2824; --code-text:#d8cfbf; --quote:#b3aa98;
    --tok-comment:#8f8a78; --tok-string:#a7c46e; --tok-keyword:#e7926b; --tok-builtin:#5cc4c4;
    --tok-number:#d6a45a; --tok-decorator:#a78bff; --tok-command:#5cc4c4; --tok-flag:#d6a45a; --tok-variable:#a78bff;
    --link:#ec9170; --header-bg:rgba(31,30,27,.85);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;scroll-behavior:smooth}
  :root{
    --font-sans:"Inter","SF Pro Text",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.65 var(--font-sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    letter-spacing:-0.011em;
  }
  .brand,.tools,nav,.topbar,.pager .lbl,.sec-h,.banner,.pagetools,.toc,.searchpanel{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:300px minmax(0,1fr); min-height:100vh; min-height:100dvh}

  /* sidebar */
  .sidebar{background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; height:100dvh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom)}
  .site-switcher{padding:14px 20px 0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .site-switcher label{display:block;margin:0 0 5px;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase}
  .site-switcher select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:8px 30px 8px 10px;font-family:inherit;font-size:12.5px;font-weight:600;line-height:1.3;cursor:pointer;outline:none}
  .site-switcher select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .brand{padding:20px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2}
  .nav-hide{position:static;display:inline-flex;align-items:center;gap:6px;margin-top:10px;border:0;background:transparent;color:var(--muted);
    border-radius:7px;padding:5px 0;font-size:11.5px;font-weight:600;cursor:pointer}
  .nav-hide:hover{color:var(--accent)}
  .nav-collapsed-bar{display:none}
  .nav-show{display:none;position:static;width:auto;height:36px;padding:0 12px;gap:7px;font-size:12.5px;box-shadow:var(--shadow)}
  .app.nav-hidden{grid-template-columns:minmax(0,1fr)}
  .app.nav-hidden .sidebar{display:none}
  .app.nav-hidden .nav-collapsed-bar{display:flex;position:sticky;z-index:45;top:0;height:53px;align-items:center;
    padding:8px max(16px,env(safe-area-inset-left));border-bottom:1px solid var(--border);background:var(--header-bg);
    backdrop-filter:saturate(140%) blur(10px);-webkit-backdrop-filter:saturate(140%) blur(10px)}
  .app.nav-hidden .nav-show{display:flex}
  .app.nav-hidden .content-wrap{padding-top:32px}
  .brand h1{font-size:15px; margin:0 0 3px; letter-spacing:.2px; font-weight:700}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:14px}
  .tools input{flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:14px; outline:none}
  .tools input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .iconbtn{background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; min-width:40px; height:40px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:none}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent)}
  a.jbtn{display:block; margin-top:10px; text-align:center; text-decoration:none;
    background:var(--accent); color:#fff; border-radius:10px; padding:9px 12px;
    font-size:13px; font-weight:700; letter-spacing:.2px}
  a.jbtn:hover{filter:brightness(1.08); text-decoration:none}
  nav{padding:10px 10px calc(60px + env(safe-area-inset-bottom))}
  .sec{margin:2px 0}
  .sec>.sec-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    padding:14px 12px 5px; font-weight:700}
  nav a.item{display:block; padding:8px 12px; border-radius:9px; color:var(--text);
    font-size:13.5px; margin:1px 0; line-height:1.35}
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:16px}
  .hidden{display:none !important}

  /* main */
  .main{min-width:0; overflow-x:hidden}
  .topbar{display:none; align-items:center; gap:10px;
    padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
    background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px); -webkit-backdrop-filter:saturate(140%) blur(10px)}
  .topbar .tb-title{flex:1; min-width:0; font-weight:700; font-size:15px; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .content-wrap{max-width:760px; margin:0 auto;
    padding:40px max(32px,env(safe-area-inset-left)) 90px max(32px,env(safe-area-inset-right))}

  /* page tools (outline + quiz) */
  .pagetools{margin:0 0 8px}
  .toc{border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-soft); margin:0 0 22px}
  .toc>summary{cursor:pointer; padding:11px 15px; font-size:13px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; list-style:none}
  .toc>summary::-webkit-details-marker{display:none}
  .toc>summary::after{content:"▾"; float:right; color:var(--accent)}
  .toc[open]>summary::after{content:"▴"}
  .toc ul{list-style:none; margin:0 0 8px; padding:0 8px 4px}
  .toc li{margin:0}
  .toc a{display:block; padding:5px 10px; border-radius:7px; font-size:13.5px; color:var(--text)}
  .toc a:hover{background:var(--bg); text-decoration:none}
  .toc a.lvl3{padding-left:24px; font-size:13px; color:var(--muted)}
  .quizbar{display:flex; gap:8px; align-items:center; margin:0 0 18px; flex-wrap:wrap}
  .quizbar .qbtn{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);
    border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer}
  .quizbar .qbtn:hover{background:var(--accent); color:#fff}
  .quizbar .hint{font-size:12.5px; color:var(--muted)}

  article{font-size:clamp(15.5px,1.4vw,17px)}
  article h1{font-size:clamp(27px,5vw,34px); line-height:1.18; margin:.1em 0 .5em; letter-spacing:-.6px; font-weight:800; color:var(--text)}
  @supports ((-webkit-background-clip:text) or (background-clip:text)){
    article h1{background:linear-gradient(90deg,var(--sec-accent,var(--accent)),var(--text) 75%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent}
  }
  article h2{font-size:clamp(20px,3.4vw,23px); margin:1.7em 0 .5em; padding-bottom:.28em;
    border-bottom:2px solid var(--sec-accent,var(--accent)); font-weight:700; display:inline-block}
  article h3{font-size:clamp(16.5px,2.4vw,18px); margin:1.5em 0 .4em; font-weight:700}
  article p{margin:.75em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.45em}
  article li{margin:.3em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article strong{font-weight:700}
  article code{background:var(--code-bg); color:var(--code-text); padding:.13em .42em;
    border-radius:6px; font:.85em/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; word-break:break-word}
  article pre{background:var(--code-bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.1em 0}
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre; word-break:normal}
  article pre .tok-comment{color:var(--tok-comment); font-style:italic}
  article pre .tok-string{color:var(--tok-string)}
  article pre .tok-keyword{color:var(--tok-keyword); font-weight:600}
  article pre .tok-builtin{color:var(--tok-builtin)}
  article pre .tok-number{color:var(--tok-number)}
  article pre .tok-decorator{color:var(--tok-decorator)}
  article pre .tok-command{color:var(--tok-command); font-weight:600}
  article pre .tok-flag{color:var(--tok-flag)}
  article pre .tok-variable{color:var(--tok-variable)}
  article blockquote{margin:1.1em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 10px 10px 0}
  article blockquote p{margin:.3em 0}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.2em 0; border-radius:var(--radius)}
  article table{border-collapse:collapse; width:100%; font-size:14px}
  article th,article td{border:1px solid var(--border); padding:9px 12px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:700; white-space:nowrap}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:2em 0}
  article h1,article h2,article h3{scroll-margin-top:76px}

  /* Q&A collapsibles */
  details.qa{border:1px solid var(--border); border-radius:var(--radius); margin:.7em 0; background:var(--bg); box-shadow:var(--shadow)}
  details.qa>summary{cursor:pointer; padding:13px 16px; font-weight:700; list-style:none; color:var(--text)}
  details.qa>summary::-webkit-details-marker{display:none}
  details.qa>summary::before{content:"▸"; color:var(--accent); margin-right:9px; display:inline-block}
  details.qa[open]>summary::before{content:"▾"}
  details.qa .qa-body{padding:0 16px 4px; border-top:1px solid var(--border); margin-top:2px}
  details.qa .qa-body>*:first-child{margin-top:12px}

  .pager{display:flex; gap:14px; margin:52px 0 0; padding-top:24px; border-top:1px solid var(--border)}
  .pager a{flex:1; min-width:0; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg)}
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:4px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  /* section-tinted links */
  article a:not(.mdlink):not(.seccard){color:var(--sec-accent,var(--link))}
  article a.mdlink{color:var(--sec-accent,var(--link)); font-weight:600}
  nav .sec-h{display:flex; align-items:center; gap:7px}
  nav .sec-ic{font-size:14px; filter:saturate(1.1)}
  nav a.item.active{background:color-mix(in srgb,var(--card,var(--accent)) 16%,transparent); color:var(--card,var(--accent))}

  /* TL;DR / insight callout */
  .callout{display:flex; gap:13px; align-items:flex-start; background:var(--sec-accent-soft,var(--accent-soft));
    border:1px solid var(--sec-accent,var(--accent)); border-radius:14px; padding:14px 16px; margin:1.2em 0}
  .callout .cic{font-size:22px; line-height:1.2; flex:none}
  /* tint background is translucent (theme-proof), so use theme-aware softer text */
  .callout .cbody{font-size:.98em; color:var(--quote)}
  .callout .cbody code{background:var(--code-bg); color:var(--code-text)}
  .callout .clead{display:inline-block; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-weight:800; font-size:11px; letter-spacing:.8px; text-transform:uppercase;
    color:var(--sec-accent,var(--accent)); margin-right:6px}

  /* diagrams */
  figure.diagram{margin:1.5em 0; background:var(--bg-soft); border:1px solid var(--border);
    border-radius:18px; padding:18px 18px 12px; box-shadow:var(--shadow)}
  figure.diagram svg{width:100%; height:auto; display:block}
  figure.diagram figcaption{font-size:12.5px; color:var(--muted); text-align:center; margin-top:10px}
  .dg-box{fill:var(--bg); stroke:var(--border); stroke-width:1.5}
  .dg-hot{fill:var(--sec-accent-soft,var(--accent-soft)); stroke:var(--sec-accent,var(--accent)); stroke-width:2}
  .dg-soft{fill:var(--bg-soft); stroke:var(--border); stroke-width:1.5; stroke-dasharray:4 3}
  .dg-line{stroke:var(--muted); stroke-width:2; fill:none}
  .dg-arrow{fill:var(--muted)}
  .dg-label{fill:var(--text); font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-sub{fill:var(--muted); font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-accent{fill:var(--sec-accent,var(--accent))}
  .dg-accent-tx{fill:var(--sec-accent,var(--accent)); font:700 13px -apple-system,sans-serif}
  .dg-white-tx{fill:#fff; font:600 12px -apple-system,sans-serif}
  .dg-accent-soft{fill:var(--sec-accent-soft,var(--accent-soft))}
  .dg-strokeA{stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
  .dg-strokeB{stroke:var(--muted); stroke-width:2.5; stroke-dasharray:5 4}
  .dg-fill1{fill:#0e8f8f}.dg-fill2{fill:#7c5cff}.dg-fill3{fill:#c98a00}.dg-fill4{fill:var(--sec-accent,var(--accent))}

  /* home hero + section cards */
  .hero{background:linear-gradient(135deg,var(--accent-soft),var(--bg-soft)); border:1px solid var(--border);
    border-radius:20px; padding:30px 26px; margin:0 0 10px; box-shadow:var(--shadow)}
  .hero-badge{display:inline-block; font-family:-apple-system,sans-serif; font-size:11.5px; font-weight:700;
    letter-spacing:.6px; text-transform:uppercase; color:var(--accent); background:var(--bg);
    border:1px solid var(--accent); border-radius:999px; padding:5px 12px}
  .hero-title{font-size:clamp(30px,6vw,44px); font-weight:800; letter-spacing:-1px; margin:14px 0 6px; line-height:1.05}
  .hero-sub{margin:0; color:var(--quote); font-size:clamp(15px,1.6vw,17px); max-width:48ch}
  .section-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:14px; margin:.6em 0 1.6em}
  a.seccard{display:flex; flex-direction:column; gap:5px; padding:16px; border-radius:16px;
    border:1px solid var(--border); background:var(--bg); box-shadow:var(--shadow); text-decoration:none;
    border-top:3px solid var(--card); transition:transform .12s ease, box-shadow .12s ease}
  a.seccard:hover{transform:translateY(-3px); box-shadow:0 10px 26px rgba(60,50,30,.13); text-decoration:none}
  a.seccard .sc-ic{font-size:24px}
  a.seccard .sc-lbl{font-family:-apple-system,sans-serif; font-weight:700; font-size:14.5px; color:var(--card)}
  a.seccard .sc-tag{font-size:12.5px; color:var(--muted); line-height:1.45}

  /* search overlay */
  .searchpanel{display:none; position:fixed; z-index:70; left:50%; top:70px; transform:translateX(-50%);
    width:min(640px,92vw); max-height:70vh; overflow-y:auto; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.25); padding:8px}
  .searchpanel.show{display:block}
  .searchpanel .sr{display:block; padding:11px 14px; border-radius:10px; color:var(--text)}
  .searchpanel .sr:hover,.searchpanel .sr.sel{background:var(--accent-soft); text-decoration:none}
  .searchpanel .sr .t{font-weight:600; font-size:14px}
  .searchpanel .sr .c{font-size:12.5px; color:var(--muted); margin-top:2px; font-family:inherit}
  .searchpanel .sr .c mark{background:var(--accent-soft); color:var(--accent); padding:0 2px; border-radius:3px}
  .searchpanel .empty{padding:18px 14px; color:var(--muted); font-size:14px}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:min(86vw,330px); top:0; bottom:0; height:auto;
      transform:translateX(-100%); transition:transform .24s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow)}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(20,16,10,.45); z-index:50}
    .content-wrap{padding:20px 18px calc(80px + env(safe-area-inset-bottom))}
    .pager{flex-direction:column}
    .pager .next{text-align:left}
    .pager .spacer{display:none}
    nav a.item{padding:11px 14px; font-size:15px}
    nav a.item.sub{padding-left:18px}
    .searchpanel{top:60px}
    .nav-collapsed-bar,.nav-show{display:none!important}
  }
  @media (max-width:380px){ .topbar .tb-title{font-size:14px} }

/* ---------------- Precision vs Recall interactive widget ---------------- */
.prw{margin:20px 0}
.prw-wrap{display:flex; gap:18px; flex-wrap:wrap; align-items:stretch;
  background:var(--bg-soft); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; box-shadow:var(--shadow)}
.prw-main{flex:1 1 380px; min-width:300px; display:flex; flex-direction:column}
.prw-side{flex:0 1 240px; min-width:220px; display:flex; flex-direction:column; gap:14px}
.prw-svg{width:100%; height:auto; overflow:visible}
.prw-dot{opacity:.85}
.prw-pos{fill:#2f9e6f}
.prw-neg{fill:var(--muted); opacity:.5}
.prw-axis{stroke:var(--border); stroke-width:1.5}
.prw-ticks text,.prw-axlbl{fill:var(--muted); font-size:12px; font-family:inherit}
.prw-shade{fill:rgba(47,158,111,.12)}
.prw-thline{stroke:var(--accent); stroke-width:2; stroke-dasharray:5 4}
.prw-thlbl{fill:var(--accent); font-size:12px; font-weight:700; font-family:inherit}
.prw-controls{margin-top:10px}
.prw-slabel{display:block; font-size:13px; color:var(--muted); margin-bottom:4px}
.prw-slabel b{color:var(--accent)}
#prw-slider{width:100%; accent-color:var(--accent); cursor:pointer}
.prw-legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:var(--muted)}
.prw-legend i{display:inline-block; width:12px; height:12px; border-radius:3px; vertical-align:-1px; margin-right:5px}
.prw-lg-pos{background:#2f9e6f}
.prw-lg-neg{background:var(--muted); opacity:.5}
.prw-lg-shade{background:rgba(47,158,111,.25); border:1px dashed var(--accent)}
.prw-metrics{display:flex; gap:10px}
.prw-metric{flex:1; text-align:center; padding:10px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.prw-mlab{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted)}
.prw-mval{display:block; font-size:24px; font-weight:800; margin-top:2px; line-height:1}
.prw-mp .prw-mval{color:#3b82f6}
.prw-mr .prw-mval{color:#e0663f}
.prw-mf .prw-mval{color:#9a5cd0}
.prw-cm{border-collapse:collapse; width:100%; font-size:13px}
.prw-cm td{border:1px solid var(--border); padding:8px; text-align:center; font-weight:700}
.prw-cm .prw-cm-h{background:var(--bg-soft); color:var(--muted); font-weight:600; font-size:12px}
.prw-tp{background:rgba(47,158,111,.16); color:#2f9e6f}
.prw-tn{background:rgba(47,158,111,.16); color:#2f9e6f}
.prw-fp{background:rgba(224,102,63,.16); color:#e0663f}
.prw-fn{background:rgba(224,102,63,.16); color:#e0663f}
.prw-pr{width:100%; height:auto}
.prw-curve{fill:none; stroke:var(--accent); stroke-width:2}
.prw-prdot{fill:#fff; stroke:var(--accent); stroke-width:3}
@media (max-width:640px){ .prw-side{flex-basis:100%} }

/* ======================= interactive-study additions ====================== */

/* --- sidebar progress bar + study shortcuts --- */
.progwrap{margin-top:12px}
.progtrack{height:6px; border-radius:4px; background:var(--border); overflow:hidden}
.progbar{height:100%; width:0; border-radius:4px; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .35s ease}
.proglbl{font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:.02em}
#resumeSlot{margin-top:8px}
.resume-link{display:block; font-size:12.5px; color:var(--accent); font-weight:600; padding:6px 10px;
  border:1px solid var(--border); border-radius:9px; background:var(--bg)}
.resume-link:hover{border-color:var(--accent); text-decoration:none}
.pinned-block{margin-top:9px; padding:8px 9px; border:1px solid var(--border); border-radius:9px; background:var(--bg)}
.pinned-title{font-size:10px; font-weight:800; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:3px}
.pinned-link{display:flex; align-items:flex-start; gap:6px; padding:4px 0; color:var(--text); font-size:12px; line-height:1.3}
.pinned-link span{color:#d39a1f}
.pinned-link:hover{color:var(--accent); text-decoration:none}

/* --- nav done markers + section counts --- */
.sec-h{position:relative}
.item.pinned::before{content:"★"; position:absolute; right:27px; top:50%; transform:translateY(-50%); color:#d39a1f; font-size:11px}
.sec-count{float:right; font-size:10.5px; font-weight:700; color:var(--muted);
  background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:1px 7px; letter-spacing:.02em}
.sec-count.all-done{color:#2f9e6f; border-color:#2f9e6f}
nav a.item{position:relative; padding-right:44px}
nav a.item.done::after{content:"✓"; position:absolute; right:9px; top:50%; transform:translateY(-50%);
  color:#2f9e6f; font-weight:800; font-size:12px}

/* --- page complete strip --- */
.page-status{display:flex; gap:9px; margin:26px 0 4px}
.complete-btn{flex:1; padding:12px 16px; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent)}
.complete-btn:hover{background:var(--accent); color:#fff}
.complete-btn.is-done{background:rgba(47,158,111,.14); color:#2f9e6f; border-color:#2f9e6f}
.pin-btn{flex:0 0 auto; padding:12px 16px; border-radius:12px; cursor:pointer; font-weight:700; font-size:14px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--muted); border:1px solid var(--border)}
.pin-btn:hover,.pin-btn.is-pinned{color:#b07800; border-color:#d39a1f; background:rgba(211,154,31,.12)}
@media(max-width:520px){.page-status{flex-direction:column}.pin-btn{width:100%}}

/* --- flashcard grading --- */
.quiz-stats{font-size:12.5px; color:var(--muted); margin-left:auto}
.quiz-stats .qs-known{color:#2f9e6f} .quiz-stats .qs-missed{color:#e0663f} .quiz-stats .qs-total{opacity:.7}
.qfilter{display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--muted)}
.qfilter .fbtn{border:1px solid var(--border); background:var(--bg); color:var(--muted); border-radius:999px;
  padding:3px 10px; font-size:12px; cursor:pointer; font-family:inherit}
.qfilter .fbtn.sel{background:var(--accent); color:#fff; border-color:var(--accent)}
details.qa.known{border-color:#2f9e6f; box-shadow:inset 3px 0 0 #2f9e6f, var(--shadow)}
details.qa.missed{border-color:#e0663f; box-shadow:inset 3px 0 0 #e0663f, var(--shadow)}
details.qa.qa-hide{display:none}
.card-grade{display:flex; gap:8px; align-items:center; margin:10px 0 4px; flex-wrap:wrap}
.card-grade .cg{border:1px solid var(--border); background:var(--bg); border-radius:999px; padding:5px 13px;
  font-size:12.5px; font-weight:600; cursor:pointer; font-family:-apple-system,BlinkMacSystemFont,sans-serif; color:var(--text)}
.card-grade .cg-known:hover{background:#2f9e6f; color:#fff; border-color:#2f9e6f}
.card-grade .cg-missed:hover{background:#e0663f; color:#fff; border-color:#e0663f}
.card-grade .cg-clear{color:var(--muted); font-size:11.5px}
details.qa.known .cg-known{background:#2f9e6f; color:#fff; border-color:#2f9e6f}
details.qa.missed .cg-missed{background:#e0663f; color:#fff; border-color:#e0663f}

/* --- study timer --- */
.timer-panel{position:fixed; right:20px; bottom:20px; width:220px; z-index:60;
  background:var(--bg); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow);
  padding:14px; display:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.timer-panel.show{display:block}
.timer-panel.ring{animation:timerRing 1s ease-in-out 3}
@keyframes timerRing{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 4px var(--accent)}}
.timer-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
.timer-title{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted)}
.timer-x{min-width:28px; height:28px; font-size:13px}
.timer-face{display:flex; justify-content:center; margin:6px 0 12px}
.timer-ring{width:120px; height:120px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:conic-gradient(var(--accent) 360deg,var(--border) 0)}
.timer-ring .timer-time{width:96px; height:96px; border-radius:50%; background:var(--bg); display:flex;
  align-items:center; justify-content:center; font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--text)}
.timer-panel.done .timer-time{color:#e0663f}
.timer-presets{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
.timer-preset{flex:1; min-width:44px; border:1px solid var(--border); background:var(--bg); color:var(--muted);
  border-radius:8px; padding:6px 4px; font-size:11.5px; font-weight:600; cursor:pointer}
.timer-preset.sel{background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
.timer-play{width:100%; border:none; border-radius:10px; background:var(--accent); color:#fff;
  padding:10px; font-size:15px; font-weight:800; cursor:pointer}
.timer-play:hover{filter:brightness(1.08)}

/* --- generic widget slider look (shared) --- */
.bv-controls input[type=range],.qz-wrap input[type=range],.bt-controls input[type=range],.lm-wrap input[type=range]{
  width:100%; accent-color:var(--accent); cursor:pointer}
.bv-metrics{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap}
.bv-m{flex:1; min-width:90px; text-align:center; padding:9px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.bv-m .bv-mlab{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted)}
.bv-m b{display:block; font-size:19px; font-weight:800; margin-top:2px; font-variant-numeric:tabular-nums}
.bv-diag.bv-good{color:#2f9e6f}.bv-diag.bv-bad{color:#e0663f}

/* --- bias/variance widget --- */
.bv-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.bv-svg{width:100%; height:auto; overflow:visible}
.bv-true{fill:none; stroke:var(--muted); stroke-width:2; stroke-dasharray:5 4; opacity:.7}
.bv-fit{fill:none; stroke:var(--accent); stroke-width:2.6}
.bv-pt{fill:#3b82f6; opacity:.85}
.bv-legend{display:flex; flex-wrap:wrap; gap:14px; margin-top:10px; font-size:12px; color:var(--muted)}
.bv-legend i{display:inline-block; width:14px; height:3px; border-radius:2px; vertical-align:3px; margin-right:5px}
.bv-lg-true{background:var(--muted)}.bv-lg-fit{background:var(--accent); height:4px!important}
.bv-lg-pt{width:10px!important; height:10px!important; border-radius:50%; background:#3b82f6}
.bv-controls{margin-top:12px}

/* --- quantization widget --- */
.qz-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.qz-controls{display:flex; flex-direction:column; gap:12px}
.qz-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap}
.qz-row>label{font-size:13px; color:var(--muted); font-family:-apple-system,sans-serif}
.qz-row>label b{color:var(--accent)}
.qz-row input[type=range]{flex:1; min-width:160px}
.qz-num{width:64px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:5px 7px; font-size:13px}
.qz-seg{border:1px solid var(--border); background:var(--bg); color:var(--muted); border-radius:8px; padding:5px 11px;
  font-size:12.5px; font-weight:600; cursor:pointer; font-family:-apple-system,sans-serif}
.qz-seg.sel{background:var(--accent); color:#fff; border-color:var(--accent)}
.qz-out,.lm-out{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0}
.qz-cell{flex:1; min-width:80px; text-align:center; padding:9px 6px; border-radius:10px; border:1px solid var(--border); background:var(--bg)}
.qz-cell span{display:block; font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted)}
.qz-cell b{display:block; font-size:17px; font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums}
.qz-cell.qz-err b{color:var(--accent)}
.qz-bar{width:100%; height:auto; overflow:visible; margin-top:4px}
.qz-tick{stroke:var(--border); stroke-width:1}
.qz-true{fill:#3b82f6}
.qz-quantdot{fill:none; stroke:var(--accent); stroke-width:2.5}

/* --- batch + llm-mem widgets --- */
.bt-wrap,.lm-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.bt-wrap{display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start}
.bt-controls{flex:1 1 300px; min-width:260px}
.bt-sliders,.lm-wrap .bt-sliders{display:flex; flex-direction:column; gap:9px; margin:10px 0}
.bt-sliders label{font-size:12.5px; color:var(--muted); font-family:-apple-system,sans-serif}
.bt-sliders label b{color:var(--accent)}
.bt-svg{flex:1 1 260px; min-width:240px; width:100%; height:auto; overflow:visible}
.bt-thrline{fill:none; stroke:var(--accent); stroke-width:2.6}
.bt-latline{fill:none; stroke:var(--muted); stroke-width:2; stroke-dasharray:5 4; opacity:.7}
.bt-dot{fill:#fff; stroke:var(--accent); stroke-width:3}
.lm-row{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:6px}
.lm-row>label{font-size:13px; color:var(--muted); font-family:-apple-system,sans-serif}
.lm-stack{display:flex; height:26px; border-radius:8px; overflow:hidden; border:1px solid var(--border); margin:4px 0 10px}
.lm-seg{display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; transition:width .3s ease; overflow:hidden; white-space:nowrap}
.lm-seg-w{background:var(--accent)} .lm-seg-kv{background:#3b82f6}
.lm-note{font-size:12.5px; color:var(--quote); font-family:-apple-system,sans-serif; line-height:1.5}
@media (max-width:640px){ .bt-wrap{flex-direction:column} }

/* number-format explorer */
.fmt-wrap{background:var(--bg-soft); border:1px solid var(--border); border-radius:16px; padding:16px; margin:1.4em 0}
.fmt-segs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px}
.fmt-bar{display:flex; height:46px; border-radius:10px; overflow:hidden; border:1px solid var(--border); gap:2px; background:var(--border)}
.fmt-seg{display:flex; align-items:center; justify-content:center; text-align:center; color:#fff; font-size:11px;
  font-weight:700; font-family:-apple-system,sans-serif; padding:0 4px; overflow:hidden; line-height:1.15; transition:flex .3s ease}
.fmt-seg span{overflow:hidden; text-overflow:ellipsis}
.fmt-sign{background:var(--muted)} .fmt-exp{background:#3b82f6} .fmt-mant{background:var(--accent)} .fmt-int{background:#8b5cf6}
.fmt-scale{display:flex; align-items:center; padding:0 12px; font-size:12px; font-weight:700; color:var(--muted);
  border:1px dashed var(--border); border-radius:10px; margin-left:2px; font-family:-apple-system,sans-serif}
.fmt-grid{margin:14px 0 10px}
.fmt-flags{display:flex; flex-wrap:wrap; gap:7px; margin:2px 0 10px}
.fmt-flag{font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:999px; font-family:-apple-system,sans-serif;
  background:var(--bg); border:1px solid var(--border); color:var(--muted)}
.fmt-flag.warn{background:rgba(234,88,12,.13); border-color:rgba(234,88,12,.4); color:#ea580c}
.fmt-flag.ok{background:rgba(20,163,115,.13); border-color:rgba(20,163,115,.4); color:var(--accent)}

/* =========================== visual diagram kit ========================== */
/* Replaces ASCII-art code blocks with clean, theme-aware flow diagrams.     */
.diagram{margin:1.5em 0; padding:18px 16px; border:1px solid var(--border); border-radius:16px;
  background:var(--bg-soft); overflow-x:auto}
.diagram-cap{font-size:12px; color:var(--muted); text-align:center; margin-top:12px; letter-spacing:.02em}

/* a node/box in a flow */
.node{display:inline-flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  padding:9px 15px; border-radius:11px; border:1px solid var(--sec-accent,var(--accent));
  background:var(--bg); color:var(--text); font-weight:650; font-size:13.5px; line-height:1.25;
  text-align:center; white-space:nowrap; box-shadow:var(--shadow)}
.node .nsub{font-size:11px; font-weight:500; color:var(--muted); white-space:nowrap}
.node.soft{border-style:dashed; background:var(--sec-accent-soft,var(--accent-soft)); box-shadow:none}
.node.ghost{border-color:var(--border); font-weight:600}
.node.data{border-color:#3b82f6} .node.data .nlead{color:#3b82f6}
.node.out{border-color:#2f9e6f} .node.out .nlead{color:#2f9e6f}

/* horizontal flow row with arrow connectors */
.flow{display:flex; align-items:center; flex-wrap:wrap; gap:10px 8px; justify-content:center}
.flow .arw{color:var(--sec-accent,var(--accent)); font-weight:800; font-size:18px; flex:none; line-height:1}
.flow .arw::before{content:"→"}
.flow .arw.tiny{font-size:14px}
.flow-lbl{font-size:11px; color:var(--muted); align-self:center; padding:0 2px; font-style:normal}
.arw.labeled{display:inline-flex; flex-direction:column; align-items:center; gap:1px; font-size:14px}
.arw.labeled .al{font-size:10px; color:var(--muted); font-weight:600}
.arw.labeled::before{content:"→"}

/* vertical flow (top→down) */
.vflow{display:flex; flex-direction:column; align-items:center; gap:8px}
.vflow .varw{color:var(--sec-accent,var(--accent)); font-weight:800; font-size:18px; line-height:.8}
.vflow .varw::before{content:"↓"}
.vflow .node{white-space:normal; max-width:min(560px,92%)}
.vflow .node .nsub{white-space:normal}

/* branch: one source splitting to many (or many merging to one) */
.branch{display:flex; flex-direction:column; align-items:center; gap:6px}
.branch .fork{display:flex; gap:26px; flex-wrap:wrap; justify-content:center; position:relative}
.branch .split-arw{color:var(--sec-accent,var(--accent)); font-size:20px; font-weight:800; line-height:1}
.branch .split-arw::before{content:"⌄"}

/* parallel lanes (e.g. data-parallel GPUs) merging */
.lanes{display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center}
.lane-stack{display:flex; flex-direction:column; gap:7px}
.merge-arw{display:flex; align-items:center; color:var(--sec-accent,var(--accent)); font-size:20px; font-weight:800}
.merge-arw::before{content:"⟩"}

/* two-column mapping / transfer table (CNN → LLM style) */
.maptable{width:100%; border-collapse:separate; border-spacing:0; margin:.4em 0; font-size:13.5px}
.maptable th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted);
  padding:6px 12px; border-bottom:1px solid var(--border)}
.maptable td{padding:9px 12px; vertical-align:top; border-bottom:1px solid var(--border); line-height:1.4}
.maptable tr:last-child td{border-bottom:none}
.maptable .mfrom{color:var(--quote)}
.maptable .mto{color:var(--text); font-weight:550}
.maptable .marw{width:26px; text-align:center; color:var(--sec-accent,var(--accent)); font-weight:800}
.maptable .marw::before{content:"→"}
.maptable thead .marw::before{content:""}
.maptable tbody tr:hover td{background:var(--bg)}

/* loop badge over a flow */
.loopwrap{display:flex; flex-direction:column; align-items:center; gap:7px}
.loop-top{font-size:11px; color:var(--sec-accent,var(--accent)); font-weight:700; letter-spacing:.03em;
  border:1px dashed var(--sec-accent,var(--accent)); border-radius:999px; padding:3px 14px}
.loop-back{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted)}
.loop-back .lb-arw{color:var(--sec-accent,var(--accent)); font-weight:800}
.loop-back .lb-arw::before{content:"↺"}
.flow-foot{font-size:11.5px; color:var(--muted); text-align:center; margin-top:10px; line-height:1.5}

/* mini roofline / plot SVG */
.plotfig{width:100%; max-width:560px; height:auto; display:block; margin:0 auto; overflow:visible}
.plot-axis{stroke:var(--border); stroke-width:1.5}
.plot-line{fill:none; stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
.plot-mem{fill:none; stroke:#3b82f6; stroke-width:2.5}
.plot-txt{fill:var(--muted); font-size:11px; font-family:var(--font-sans)}
.plot-txt.lead{fill:var(--text); font-weight:650}
.plot-dash{stroke:var(--muted); stroke-width:1; stroke-dasharray:4 3; opacity:.6}
@media (max-width:640px){ .branch .fork{gap:14px} .lanes{gap:8px} }

/* --- formula display (replaces monospace math blocks) --- */
.formula{margin:1.4em 0; padding:16px 20px; border:1px solid var(--border); border-radius:14px;
  background:var(--bg-soft); display:flex; flex-direction:column; gap:12px}
.frow{display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; justify-content:center; text-align:center}
.fexpr{font-family:"SF Mono",ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
  font-size:16.5px; font-weight:600; color:var(--text); letter-spacing:.005em; line-height:1.5}
.fexpr .fv{color:var(--sec-accent,var(--accent))}
.fnote{font-size:12px; color:var(--muted); font-style:italic; font-family:var(--font-sans)}
.fnote::before{content:"— "}

/* --- side-by-side compare cards (replaces two-column ASCII contrasts) --- */
.compare{display:flex; gap:14px; margin:1.4em 0; flex-wrap:wrap; align-items:stretch}
.cmp-col{flex:1 1 210px; border:1px solid var(--border); border-radius:14px; background:var(--bg-soft);
  padding:14px 16px; display:flex; flex-direction:column; gap:8px}
.cmp-col.accent{border-color:var(--sec-accent,var(--accent))}
.cmp-h{font-size:13px; font-weight:750; letter-spacing:.01em; color:var(--text);
  padding-bottom:8px; border-bottom:1px solid var(--border)}
.cmp-col.accent .cmp-h{color:var(--sec-accent,var(--accent))}
.cmp-col.blue{border-color:#3b82f6} .cmp-col.blue .cmp-h{color:#3b82f6}
.cmp-col.green{border-color:#2f9e6f} .cmp-col.green .cmp-h{color:#2f9e6f}
.cmp-col ul{margin:0; padding-left:18px; font-size:13.5px; line-height:1.5; color:var(--quote)}
.cmp-col ul li{margin:3px 0}
.cmp-col p{margin:0; font-size:13.5px; line-height:1.5; color:var(--quote)}
.cmp-tag{align-self:flex-start; font-size:11px; font-weight:700; color:var(--muted);
  background:var(--bg); border:1px solid var(--border); border-radius:999px; padding:2px 9px; margin-top:auto}

/* --- illustrative example callout --- */
.example{margin:1.3em 0; padding:14px 16px; border-left:3px solid var(--sec-accent,var(--accent));
  background:var(--bg-soft); border-radius:0 12px 12px 0; font-size:14.5px; line-height:1.6}
.example .ex-q{font-style:italic; color:var(--text)}
.example .ex-a{display:block; margin-top:8px; font-size:13.5px; color:var(--quote)}
.example .hl{background:var(--sec-accent-soft,var(--accent-soft)); color:var(--sec-accent,var(--accent));
  font-weight:650; padding:0 4px; border-radius:4px}

/* --- k-fold split bars --- */
.folds{display:flex; flex-direction:column; gap:6px; margin:.4em 0}
.fold{display:flex; align-items:center; gap:10px}
.fold-bars{display:flex; flex:1; height:22px; border-radius:6px; overflow:hidden; border:1px solid var(--border)}
.fold-seg{flex:1; display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; color:var(--muted)}
.fold-seg.test{background:var(--sec-accent-soft,var(--accent-soft)); color:var(--sec-accent,var(--accent))}
.fold-seg.train{background:var(--bg)}
.fold-lbl{font-size:11.5px; color:var(--muted); min-width:48px}

/* ===================== CV-specific widget styling ======================= */
/* IoU explorer */
.iou-svg{max-width:360px}
.iou-a{fill:rgba(47,158,111,.12); stroke:#2f9e6f; stroke-width:2.5}
.iou-b{fill:rgba(59,130,246,.10); stroke:#3b82f6; stroke-width:2.5; stroke-dasharray:6 4}
.iou-inter{fill:var(--sec-accent-soft,var(--accent-soft)); stroke:var(--sec-accent,var(--accent)); stroke-width:1}
.iou-tag-a{fill:#2f9e6f; font:600 11px var(--font-sans)}
.iou-tag-b{fill:#3b82f6; font:600 11px var(--font-sans)}
/* latency stacked bar + budget marker */
.lm-stack.lat-stack{position:relative; height:30px}
.lat-stack .lm-seg{font-size:10.5px}
.lat-mark{position:absolute; top:-3px; bottom:-3px; width:0; border-left:2px dashed var(--text)}
.lat-legend{display:flex; flex-wrap:wrap; gap:12px; margin:8px 0 2px; font-size:11.5px; color:var(--muted)}
.lat-legend i{display:inline-block; width:11px; height:11px; border-radius:3px; vertical-align:-1px; margin-right:5px}
.lat-legend i.lat-mk{width:0; height:12px; border:none; border-left:2px dashed var(--text); border-radius:0}
/* conv chain */
.conv-chain{display:flex; flex-wrap:wrap; align-items:center; gap:5px; margin:12px 0 2px; justify-content:center}
.conv-node{padding:5px 9px; font-size:12.5px}

/* --- persistent per-page study analytics --- */
.page-time-summary{flex:0 0 145px; display:flex; flex-direction:column; justify-content:center; gap:2px;
  padding:8px 12px; border:1px solid var(--border); border-radius:12px; background:var(--bg-soft)}
.page-time-summary span{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em}
.page-time-summary strong{font-size:18px; line-height:1.1; color:var(--text); font-variant-numeric:tabular-nums}
.analytics-panel{margin:20px 0 28px; padding:20px; border:1px solid var(--border); border-radius:18px;
  background:linear-gradient(145deg,var(--bg-soft),var(--bg)); box-shadow:var(--shadow)}
.analytics-overview-head{display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:15px}
.analytics-overview-head h2{margin:3px 0 4px; font-size:22px}
.analytics-overview-head p{margin:0; color:var(--muted); font-size:12.5px}
.analytics-kicker{display:block; color:var(--accent); font-size:10.5px; font-weight:800; text-transform:uppercase; letter-spacing:.1em}
.analytics-total{flex:0 0 auto; display:flex; flex-direction:column; align-items:flex-end; padding:9px 11px;
  border:1px solid var(--accent); border-radius:12px; background:var(--accent-soft)}
.analytics-total strong{color:var(--accent); font-size:18px; font-variant-numeric:tabular-nums}
.analytics-total span{color:var(--muted); font-size:10.5px}
.analytics-page-list{max-height:430px; overflow:auto; border:1px solid var(--border); border-radius:12px; background:var(--bg)}
.analytics-row{display:grid; grid-template-columns:minmax(0,1fr) 82px 92px; align-items:center; gap:10px;
  padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text); text-decoration:none}
.analytics-row:last-child{border-bottom:0}.analytics-row:hover{background:var(--accent-soft); text-decoration:none}
.analytics-row-main{min-width:0; display:flex; flex-direction:column; gap:2px}
.analytics-row-main strong{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12.5px}
.analytics-row-main small{color:var(--muted); font-size:10.5px}
.analytics-minutes{text-align:right; font-size:12px; font-weight:800; font-variant-numeric:tabular-nums}
.analytics-state{justify-self:end; padding:3px 7px; border-radius:999px; color:var(--muted); background:var(--bg-soft);
  border:1px solid var(--border); font-size:9.5px; font-weight:800; white-space:nowrap}
.analytics-state.state-completed{color:#2f9e6f; border-color:#2f9e6f; background:rgba(47,158,111,.12)}
.analytics-state.state-in-progress{color:var(--accent); border-color:var(--accent); background:var(--accent-soft)}
@media(max-width:520px){
  .page-time-summary{flex:0 0 auto}.analytics-panel{padding:15px}
  .analytics-overview-head{flex-direction:column}.analytics-total{align-items:flex-start}
  .analytics-row{grid-template-columns:minmax(0,1fr) 70px; gap:7px}
  .analytics-state{grid-column:1/3; justify-self:start}.analytics-page-list{max-height:360px}
}

</style>
</head>

chor=\"middle\">Decode<\/text><text class=\"dg-sub\" x=\"184\" y=\"90\" text-anchor=\"middle\">NVDEC<\/text><line class=\"dg-line\" x1=\"234\" y1=\"75\" x2=\"243\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"243,70 250,75 243,80\"/><rect class=\"dg-box\" x=\"250\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"300\" y=\"73\" text-anchor=\"middle\">Buffer<\/text><text class=\"dg-sub\" x=\"300\" y=\"90\" text-anchor=\"middle\">drop-oldest<\/text><line class=\"dg-line\" x1=\"350\" y1=\"75\" x2=\"359\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"359,70 366,75 359,80\"/><rect class=\"dg-box dg-hot\" x=\"366\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"416\" y=\"73\" text-anchor=\"middle\">Inference<\/text><text class=\"dg-sub\" x=\"416\" y=\"90\" text-anchor=\"middle\">TensorRT<\/text><line class=\"dg-line\" x1=\"466\" y1=\"75\" x2=\"475\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"475,70 482,75 475,80\"/><rect class=\"dg-box\" x=\"482\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"532\" y=\"73\" text-anchor=\"middle\">Logic<\/text><text class=\"dg-sub\" x=\"532\" y=\"90\" text-anchor=\"middle\">geometry<\/text><line class=\"dg-line\" x1=\"582\" y1=\"75\" x2=\"591\" y2=\"75\"/><polygon class=\"dg-arrow\" points=\"591,70 598,75 591,80\"/><rect class=\"dg-box\" x=\"598\" y=\"46\" width=\"100\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"648\" y=\"73\" text-anchor=\"middle\">Output<\/text><text class=\"dg-sub\" x=\"648\" y=\"90\" text-anchor=\"middle\">events / DB<\/text><text class=\"dg-sub\" x=\"360\" y=\"20\" text-anchor=\"middle\">the \"last mile\": a model running on live video, forever<\/text><\/svg><figcaption>The journey of every frame, end to end<\/figcaption><\/figure>\n<h2 id=\"jump-in\">Jump in<\/h2><div class=\"section-cards\"><a class=\"seccard mdlink\" data-href=\"01-video-streaming/README.md\" href=\"#\" style=\"--card:#14a3a3\"><span class=\"sc-ic\">📡<\/span><span class=\"sc-lbl\">1 · Video Streaming<\/span><span class=\"sc-tag\">RTSP, WebRTC, codecs, frame buffers<\/span><\/a><a class=\"seccard mdlink\" data-href=\"02-gstreamer/README.md\" href=\"#\" style=\"--card:#8b6dff\"><span class=\"sc-ic\">🎬<\/span><span class=\"sc-lbl\">2 · GStreamer<\/span><span class=\"sc-tag\">Pipelines, appsink, DeepStream<\/span><\/a><a class=\"seccard mdlink\" data-href=\"03-low-latency-inference/README.md\" href=\"#\" style=\"--card:#d39a1f\"><span class=\"sc-ic\">⚡<\/span><span class=\"sc-lbl\">3 · Low-Latency Inference<\/span><span class=\"sc-tag\">TensorRT, quantization, batching<\/span><\/a><a class=\"seccard mdlink\" data-href=\"04-fault-tolerance/README.md\" href=\"#\" style=\"--card:#dd5b54\"><span class=\"sc-ic\">🛡️<\/span><span class=\"sc-lbl\">4 · Fault Tolerance<\/span><span class=\"sc-tag\">Crash-proof, self-healing systems<\/span><\/a><a class=\"seccard mdlink\" data-href=\"05-production-python/README.md\" href=\"#\" style=\"--card:#4a8bd1\"><span class=\"sc-ic\">🐍<\/span><span class=\"sc-lbl\">5 · Production Python<\/span><span class=\"sc-tag\">GIL, threads, async, memory<\/span><\/a><a class=\"seccard mdlink\" data-href=\"06-system-design/README.md\" href=\"#\" style=\"--card:#34ad7c\"><span class=\"sc-ic\">🏗️<\/span><span class=\"sc-lbl\">6 · System Design<\/span><span class=\"sc-tag\">Design a crash-proof camera fleet<\/span><\/a><a class=\"seccard mdlink\" data-href=\"07-qa-drill-bank/README.md\" href=\"#\" style=\"--card:#cc5fab\"><span class=\"sc-ic\">🎯<\/span><span class=\"sc-lbl\">7 · Q&A Drill Bank<\/span><span class=\"sc-tag\">Every \"why X over Y\", quiz-ready<\/span><\/a><a class=\"seccard mdlink\" data-href=\"08-mock-interview/README.md\" href=\"#\" style=\"--card:#7479e6\"><span class=\"sc-ic\">🎤<\/span><span class=\"sc-lbl\">8 · Mock Interview<\/span><span class=\"sc-tag\">Questions, model answers, rubric<\/span><\/a><a class=\"seccard mdlink\" data-href=\"09-computer-vision-fundamentals/README.md\" href=\"#\" style=\"--card:#19a4d1\"><span class=\"sc-ic\">👁️<\/span><span class=\"sc-lbl\">9 · CV Fundamentals<\/span><span class=\"sc-tag\">OpenCV, geometry, detection math<\/span><\/a><a class=\"seccard mdlink\" data-href=\"10-coding-practice/README.md\" href=\"#\" style=\"--card:#b5651d\"><span class=\"sc-ic\">💻<\/span><span class=\"sc-lbl\">10 · Coding Practice<\/span><span class=\"sc-tag\">Runnable OpenCV problems for the proctored round<\/span><\/a><a class=\"seccard mdlink\" data-href=\"11-crowd-queue-analytics/README.md\" href=\"#\" style=\"--card:#2f9e6f\"><span class=\"sc-ic\">🧮<\/span><span class=\"sc-lbl\">11 · Crowd & Queue Analytics<\/span><span class=\"sc-tag\">Queue time, crowd density, zones, flow, heatmaps<\/span><\/a><a class=\"seccard mdlink\" data-href=\"12-event-anomaly-detection/README.md\" href=\"#\" style=\"--card:#d9534f\"><span class=\"sc-ic\">🚨<\/span><span class=\"sc-lbl\">12 · Event & Anomaly Detection<\/span><span class=\"sc-tag\">Events, anomalies, alerting & false-alarm control<\/span><\/a><a class=\"seccard mdlink\" data-href=\"13-secure-onprem-monitoring/README.md\" href=\"#\" style=\"--card:#5b6ee1\"><span class=\"sc-ic\">🔒<\/span><span class=\"sc-lbl\">13 · Secure On-Prem & Monitoring<\/span><span class=\"sc-tag\">Air-gapped deploy, PII/privacy, drift monitoring<\/span><\/a><a class=\"seccard mdlink\" data-href=\"14-deep-learning-for-video/README.md\" href=\"#\" style=\"--card:#9a5cd0\"><span class=\"sc-ic\">🧠<\/span><span class=\"sc-lbl\">14 · Deep Learning for Video<\/span><span class=\"sc-tag\">CNNs, detection, tracking, training & optimization<\/span><\/a><\/div>\n<p>Everything you need for the <strong>AI Data Scientist<\/strong> interview — CCTV-based video intelligence in Abu Dhabi — in the order to study it. Read <strong>top to bottom the first time<\/strong>. Come back to any file as a reference (or the morning of) anytime.<\/p>\n<p>The role in one line: <strong>turn live CCTV into operational decisions<\/strong> — count and time crowds, flag anomalies, and run computer-vision + deep-learning models on the NVIDIA edge, deployed in a secure on-prem environment that never phones home.<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">CCTV cameras<span class=\"nsub\">reconnect · on-prem<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">ingest / decode<span class=\"nsub\">GStreamer / DeepStream<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">detect + track<span class=\"nsub\">CNN / YOLO + ByteTrack<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">analytics<span class=\"nsub\">queue time / crowd density<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">events / alerts<span class=\"nsub\">anomaly + thresholds<\/span><\/span>\n  <\/div>\n<\/div>\n<h2 id=\"what-this-role-actually-wants-and-how-you-stack-up\">What this role actually wants (and how you stack up)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>JD requirement<\/th><th>Your resume evidence<\/th><th>Gap to close<\/th><\/tr><\/thead><tbody><tr><td>CCTV-based video intelligence (live, 24/7)<\/td><td>DeepStream + GStreamer + Jetson video analytics (Integration Wizards)<\/td><td><strong>Strong<\/strong> — this is exactly the live-video work you've shipped. Frame it as CCTV intelligence, not \"data platform.\" Sections <code>01<\/code>, <code>02<\/code>.<\/td><\/tr><tr><td>Queue-time estimation &amp; crowd analytics<\/td><td>Detection/tracking + zone logic on edge; analytics pipelines<\/td><td><strong>Medium<\/strong> — you have the primitives (tracking, homography, counting) but need the <em>metric<\/em> vocabulary: Little's Law, dwell, density maps. Study <code>11<\/code>.<\/td><\/tr><tr><td>Operational event &amp; anomaly detection<\/td><td>\"Go-to engineer for hard, ambiguous problems\"; logic-on-detections<\/td><td><strong>Medium<\/strong> — know the standard event catalog (loitering, intrusion, abandoned object, surge) and supervised-vs-unsupervised anomaly methods cold. <code>12<\/code>.<\/td><\/tr><tr><td>CV + deep learning: CNNs, object detection, tracking<\/td><td>Surround-view C++/OpenCV, calibration, RANSAC; TensorRT model work<\/td><td><strong>Medium<\/strong> — your recent years read <em>systems<\/em>, not <em>modeling<\/em>. Rebuild the DL-modeling narrative: backbones, YOLO, mAP, ByteTrack, ReID. <code>14<\/code> + <code>09<\/code>.<\/td><\/tr><tr><td>NVIDIA edge AI stack (Jetson, TensorRT, DeepStream)<\/td><td>TensorRT/ONNX, INT8/FP16, layer fusion, pruning, Jetson Nano, DeepStream<\/td><td><strong>Strong<\/strong> — home turf. Just frame it crisply. <code>03<\/code>, <code>02<\/code>.<\/td><\/tr><tr><td>Deployment in secure on-prem environments<\/td><td>Dockerized inference; edge serving (Gunicorn/Celery/Kafka); GKE/Azure DevOps<\/td><td><strong>Medium<\/strong> — you've deployed, but mostly <em>cloud<\/em>. Learn the air-gapped, data-residency, PII/face-privacy angle. <code>13<\/code>.<\/td><\/tr><tr><td>Model optimization &amp; performance monitoring<\/td><td>TensorRT INT8/FP16, pruning; production reliability<\/td><td><strong>Medium<\/strong> — optimization is strong; add the <em>monitoring<\/em> half — drift, per-camera health, GPU dashboards. <code>03<\/code> + <code>13<\/code>.<\/td><\/tr><tr><td>Strong Python + ML frameworks<\/td><td>Petabyte Dask pipelines; PyTorch/ONNX; production Python<\/td><td><strong>Strong<\/strong>.<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Headline:<\/strong> You're a strong fit on the <em>systems + edge<\/em> half and need to rebuild the <em>modeling + applied-analytics<\/em> half of the story. Your risk isn't capability — it's that \"AI <strong>Data Scientist<\/strong>\" wants to hear you reason about models, metrics (queue time, density, mAP, false-alarm rate) and secure on-prem deployment, not only pipelines. This pack closes exactly those gaps.<\/p>\n<h2 id=\"topics-in-order\">Topics (in order)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>#<\/th><th>Folder<\/th><th>What you learn<\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td><a class=\"mdlink\" data-href=\"01-video-streaming/\" href=\"#\">01-video-streaming/<\/a><\/td><td>RTSP, WebRTC, FFmpeg, codecs, frame buffers, decode/encode<\/td><\/tr><tr><td>2<\/td><td><a class=\"mdlink\" data-href=\"02-gstreamer/\" href=\"#\">02-gstreamer/<\/a><\/td><td>Pipelines, elements, appsink, hardware decode, DeepStream<\/td><\/tr><tr><td>3<\/td><td><a class=\"mdlink\" data-href=\"03-low-latency-inference/\" href=\"#\">03-low-latency-inference/<\/a><\/td><td>TensorRT, DeepStream, Triton, batching, zero-copy, the latency budget<\/td><\/tr><tr><td>4<\/td><td><a class=\"mdlink\" data-href=\"04-fault-tolerance/\" href=\"#\">04-fault-tolerance/<\/a><\/td><td>Crash-proof design: reconnect, watchdogs, backpressure, graceful degradation<\/td><\/tr><tr><td>5<\/td><td><a class=\"mdlink\" data-href=\"05-production-python/\" href=\"#\">05-production-python/<\/a><\/td><td>Threads vs async vs processes, the GIL, queues, memory leaks<\/td><\/tr><tr><td>6<\/td><td><a class=\"mdlink\" data-href=\"06-system-design/\" href=\"#\">06-system-design/<\/a><\/td><td>The big whiteboard question: design a crash-proof multi-camera pipeline<\/td><\/tr><tr><td>7<\/td><td><a class=\"mdlink\" data-href=\"07-qa-drill-bank/\" href=\"#\">07-qa-drill-bank/<\/a><\/td><td>Every \"why X over Y\" + the one-page cheat sheet<\/td><\/tr><tr><td>8<\/td><td><a class=\"mdlink\" data-href=\"08-mock-interview/\" href=\"#\">08-mock-interview/<\/a><\/td><td>Staged mock questions, model answers, scoring rubric<\/td><\/tr><tr><td>9<\/td><td><a class=\"mdlink\" data-href=\"09-computer-vision-fundamentals/\" href=\"#\">09-computer-vision-fundamentals/<\/a><\/td><td>Classical CV: color spaces, geometry, calibration, features, detection/tracking math<\/td><\/tr><tr><td>10<\/td><td><a class=\"mdlink\" data-href=\"10-coding-practice/\" href=\"#\">10-coding-practice/<\/a><\/td><td>Runnable OpenCV problems for the proctored round<\/td><\/tr><tr><td>11<\/td><td><a class=\"mdlink\" data-href=\"11-crowd-queue-analytics/\" href=\"#\">11-crowd-queue-analytics/<\/a><\/td><td><strong>Queue-time estimation, crowd counting/density, zones, flow, heatmaps<\/strong><\/td><\/tr><tr><td>12<\/td><td><a class=\"mdlink\" data-href=\"12-event-anomaly-detection/\" href=\"#\">12-event-anomaly-detection/<\/a><\/td><td><strong>Operational events, anomaly methods, alerting &amp; false-alarm control<\/strong><\/td><\/tr><tr><td>13<\/td><td><a class=\"mdlink\" data-href=\"13-secure-onprem-monitoring/\" href=\"#\">13-secure-onprem-monitoring/<\/a><\/td><td><strong>Air-gapped deployment, security &amp; PII, drift &amp; performance monitoring<\/strong><\/td><\/tr><tr><td>14<\/td><td><a class=\"mdlink\" data-href=\"14-deep-learning-for-video/\" href=\"#\">14-deep-learning-for-video/<\/a><\/td><td><strong>CNNs, object detection (YOLO), tracking (ByteTrack/ReID), training &amp; optimization<\/strong><\/td><\/tr><\/tbody><\/table><\/div>\n<blockquote><p><strong>Sections 11–14 are the new focus areas<\/strong> for this JD — the applied analytics, event detection, secure on-prem, and DL-modeling depth the role is built around. Sections 01–10 are the transferable foundation.<\/p><\/blockquote>\n<h2 id=\"how-to-use-this\">How to use this<\/h2>\n<ul><li><strong>First time:<\/strong> follow the numbers 1 → 6, then the applied focus 11 → 14, plus<\/li><\/ul>\n<p>9 if classical CV is rusty.<\/p>\n<ul><li><strong>If the modeling story is your weak spot:<\/strong> start at <code>14<\/code> and <code>11<\/code>.<\/li><li><strong>Day before:<\/strong> read <code>06-system-design<\/code>, <code>07-qa-drill-bank<\/code>, <code>11<\/code>, <code>12<\/code>, and skim <code>13<\/code>.<\/li><li><strong>Morning of:<\/strong> read <code>07-qa-drill-bank/cheat-sheet.md<\/code> + <code>09/cv-cheat-sheet.md<\/code>.<\/li><li><strong>Want to rehearse out loud:<\/strong> open <code>08-mock-interview/<\/code> — or ask me to run it<\/li><\/ul>\n<p>live in chat and I'll grade your answers.<\/p>\n<p>→ Start here: <strong><a class=\"mdlink\" data-href=\"01-video-streaming/README.md\" href=\"#\">01-video-streaming/README.md<\/a><\/strong> — or jump straight to the new focus areas in <strong><a class=\"mdlink\" data-href=\"11-crowd-queue-analytics/\" href=\"#\">11-crowd-queue-analytics/<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"jump-in","text":"Jump in"},{"level":2,"id":"what-this-role-actually-wants-and-how-you-stack-up","text":"What this role actually wants (and how you stack up)"},{"level":2,"id":"topics-in-order","text":"Topics (in order)"},{"level":2,"id":"how-to-use-this","text":"How to use this"}],"text":"abu dhabi · ai data scientist video intelligence prep computer vision & deep learning on live cctv — crowd analytics, queue-time estimation, and anomaly detection, built on the nvidia edge stack and deployed secure on-prem. fourteen chapters, a drill bank, and a full mock. ai data scientist (video intelligence): learning path cameras rtsp / webrtc decode nvdec buffer drop-oldest inference tensorrt logic geometry output events / db the \"last mile\": a model running on live video, forever the journey of every frame, end to end jump in 📡 1 · video streaming rtsp, webrtc, codecs, frame buffers 🎬 2 · gstreamer pipelines, appsink, deepstream ⚡ 3 · low-latency inference tensorrt, quantization, batching 🛡️ 4 · fault tolerance crash-proof, self-healing systems 🐍 5 · production python gil, threads, async, memory 🏗️ 6 · system design design a crash-proof camera fleet 🎯 7 · q&a drill bank every \"why x over y\", quiz-ready 🎤 8 · mock interview questions, model answers, rubric 👁️ 9 · cv fundamentals opencv, geometry, detection math 💻 10 · coding practice runnable opencv problems for the proctored round 🧮 11 · crowd & queue analytics queue time, crowd density, zones, flow, heatmaps 🚨 12 · event & anomaly detection events, anomalies, alerting & false-alarm control 🔒 13 · secure on-prem & monitoring air-gapped deploy, pii/privacy, drift monitoring 🧠 14 · deep learning for video cnns, detection, tracking, training & optimization everything you need for the ai data scientist interview — cctv-based video intelligence in abu dhabi — in the order to study it. read top to bottom the first time . come back to any file as a reference (or the morning of) anytime. the role in one line: turn live cctv into operational decisions — count and time crowds, flag anomalies, and run computer-vision + deep-learning models on the nvidia edge, deployed in a secure on-prem environment that never phones home. cctv cameras reconnect · on-prem ingest / decode gstreamer / deepstream detect + track cnn / yolo + bytetrack analytics queue time / crowd density events / alerts anomaly + thresholds what this role actually wants (and how you stack up) jd requirement your resume evidence gap to close cctv-based video intelligence (live, 24/7) deepstream + gstreamer + jetson video analytics (integration wizards) strong — this is exactly the live-video work you've shipped. frame it as cctv intelligence, not \"data platform.\" sections 01 , 02 . queue-time estimation & crowd analytics detection/tracking + zone logic on edge; analytics pipelines medium — you have the primitives (tracking, homography, counting) but need the metric vocabulary: little's law, dwell, density maps. study 11 . operational event & anomaly detection \"go-to engineer for hard, ambiguous problems\"; logic-on-detections medium — know the standard event catalog (loitering, intrusion, abandoned object, surge) and supervised-vs-unsupervised anomaly methods cold. 12 . cv + deep learning: cnns, object detection, tracking surround-view c++/opencv, calibration, ransac; tensorrt model work medium — your recent years read systems , not modeling . rebuild the dl-modeling narrative: backbones, yolo, map, bytetrack, reid. 14 + 09 . nvidia edge ai stack (jetson, tensorrt, deepstream) tensorrt/onnx, int8/fp16, layer fusion, pruning, jetson nano, deepstream strong — home turf. just frame it crisply. 03 , 02 . deployment in secure on-prem environments dockerized inference; edge serving (gunicorn/celery/kafka); gke/azure devops medium — you've deployed, but mostly cloud . learn the air-gapped, data-residency, pii/face-privacy angle. 13 . model optimization & performance monitoring tensorrt int8/fp16, pruning; production reliability medium — optimization is strong; add the monitoring half — drift, per-camera health, gpu dashboards. 03 + 13 . strong python + ml frameworks petabyte dask pipelines; pytorch/onnx; production python strong . headline: you're a strong fit on the systems + edge half and need to rebuild the modeling + applied-analytics half of the story. your risk isn't capability — it's that \"ai data scientist \" wants to hear you reason about models, metrics (queue time, density, map, false-alarm rate) and secure on-prem deployment, not only pipelines. this pack closes exactly those gaps. topics (in order) # folder what you learn 1 01-video-streaming/ rtsp, webrtc, ffmpeg, codecs, frame buffers, decode/encode 2 02-gstreamer/ pipelines, elements, appsink, hardware decode, deepstream 3 03-low-latency-inference/ tensorrt, deepstream, triton, batching, zero-copy, the latency budget 4 04-fault-tolerance/ crash-proof design: reconnect, watchdogs, backpressure, graceful degradation 5 05-production-python/ threads vs async vs processes, the gil, queues, memory leaks 6 06-system-design/ the big whiteboard question: design a crash-proof multi-camera pipeline 7 07-qa-drill-bank/ every \"why x over y\" + the one-page cheat sheet 8 08-mock-interview/ staged mock questions, model answers, scoring rubric 9 09-computer-vision-fundamentals/ classical cv: color spaces, geometry, calibration, features, detection/tracking math 10 10-coding-practice/ runnable opencv problems for the proctored round 11 11-crowd-queue-analytics/ queue-time estimation, crowd counting/density, zones, flow, heatmaps 12 12-event-anomaly-detection/ operational events, anomaly methods, alerting & false-alarm control 13 13-secure-onprem-monitoring/ air-gapped deployment, security & pii, drift & performance monitoring 14 14-deep-learning-for-video/ cnns, object detection (yolo), tracking (bytetrack/reid), training & optimization sections 11–14 are the new focus areas for this jd — the applied analytics, event detection, secure on-prem, and dl-modeling depth the role is built around. sections 01–10 are the transferable foundation. how to use this first time: follow the numbers 1 → 6, then the applied focus 11 → 14, plus 9 if classical cv is rusty. if the modeling story is your weak spot: start at 14 and 11 . day before: read 06-system-design , 07-qa-drill-bank , 11 , 12 , and skim 13 . morning of: read 07-qa-drill-bank/cheat-sheet.md + 09/cv-cheat-sheet.md . want to rehearse out loud: open 08-mock-interview/ — or ask me to run it live in chat and i'll grade your answers. → start here: 01-video-streaming/readme.md — or jump straight to the new focus areas in 11-crowd-queue-analytics/ .","words":945},{"path":"RUN-PLAYGROUND.md","title":"Live Playground (Jupyter)","section":"Start here","quiz":false,"accent":"#d4663f","html":"<h1 id=\"run-the-live-playground-jupyter-website\">Run the Live Playground (Jupyter + Website)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> One command spins up a Python venv, installs OpenCV/NumPy/Jupyter, and serves <strong>both<\/strong> the study website and <strong>live, editable notebooks<\/strong> of every coding problem. Run cells, tweak the code, see the output images — exactly the muscle you need for the proctored round.<\/div><\/div>\n<h2 id=\"one-command\">One command<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">cd<\/span> koireader-interview-prep\n<span class=\"tok-command\">bash<\/span> run.sh<\/code><\/pre>\n<p>First run takes a minute (it builds the venv and installs deps); later runs are instant. You'll see:<\/p>\n<pre><code>Study website :  http://localhost:9000\n                 http://&lt;your-ip&gt;:9000   (from your phone)\nJupyter        :  starting on port 8888 (URL + token printed below)<\/code><\/pre>\n<p>Jupyter starts with the fixed token <strong><code>koireader<\/code><\/strong>, so the website's <strong>\"Open live notebooks\"<\/strong> button (top-left of the site) opens JupyterLab directly — <code>http://&lt;this-host&gt;:8888/lab?token=koireader<\/code>. Press <strong>Ctrl+C<\/strong> in the terminal to stop both. (Change the token with <code>JUPYTER_TOKEN=... bash run.sh<\/code>, but then update the link's token in <code>_app.js<\/code> and rebuild.)<\/p>\n<p>Custom ports: <code>SITE_PORT=9000 JUPYTER_PORT=8888 bash run.sh<\/code><\/p>\n<h2 id=\"why-a-notebook-and-is-it-better\">Why a notebook (and is it \"better\"?)<\/h2>\n<ul><li><strong>Website<\/strong> = best for <em>reading and memorizing<\/em>. The test bans AI and<\/li><\/ul>\n<p>autocomplete, so you must recall the API — the site + cheat sheet are for that.<\/p>\n<ul><li><strong>Notebooks<\/strong> = best for <em>experimenting<\/em>: run a cell, change a threshold, swap in<\/li><\/ul>\n<p>your own image, watch the output image update instantly.<\/p>\n<p>Use both: read on the site, then drill in the notebook.<\/p>\n<h2 id=\"whats-in-the-notebooks\">What's in the notebooks<\/h2>\n<p>Auto-generated from the Section 10 markdown (single source of truth), so they never drift. Four notebooks in <code>notebooks/<\/code>:<\/p>\n<ol><li><code>01_image_processing_and_geometry.ipynb<\/code> — preprocessing, deskew, 4-point scan…<\/li><li><code>02_detection_logic.ipynb<\/code> — IoU, NMS, zones, line-crossing, reading order<\/li><li><code>03_video_and_streaming.ipynb<\/code> — robust capture, motion, annotate<\/li><li><code>04_python_and_numpy.ipynb<\/code> — vectorization, fault-tolerant batch, blobs<\/li><li><code>06_core_drills.ipynb<\/code> — hand-curated cut of the ~12 highest-yield problems<\/li><\/ol>\n<p>from notebooks 00–04, ordered by likelihood for this role (not auto-generated    from a <code>.md<\/code> — edit it directly)<\/p>\n<p>Each notebook's <strong>first code cell<\/strong> creates synthetic sample images (<code>input.jpg<\/code>, <code>test.avi<\/code>, …) so every cell runs out of the box. <strong>Swap <code>input.jpg<\/code> for a real photo<\/strong> to experiment on your own data.<\/p>\n<h2 id=\"adding-or-editing-notebook-content\">Adding or editing notebook content<\/h2>\n<p><strong>Don't edit files in <code>notebooks/<\/code> directly<\/strong> — they're generated, and any change gets silently overwritten the next time someone runs <code>build_notebooks.py<\/code> (which every deploy does). Edit the source instead:<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># 1. Edit the matching .md in 10-coding-practice/ (e.g. image-processing-and-geometry.md)<\/span>\n<span class=\"tok-comment\"># 2. Regenerate the notebooks from it:<\/span>\n<span class=\"tok-command\">python3<\/span> build_notebooks.py\n<span class=\"tok-comment\"># 3. Commit both the .md and the regenerated .ipynb, then push + redeploy.<\/span><\/code><\/pre>\n<p>The <code>.md<\/code> → <code>.ipynb<\/code> mapping is the <code>FILES<\/code> list at the top of <code>build_notebooks.py<\/code>.<\/p>\n<h2 id=\"practising-for-the-proctored-format\">Practising for the proctored format<\/h2>\n<p>The test wants <code>.py<\/code> files, or <code>.ipynb<\/code> <strong>converted to <code>.html<\/code><\/strong> (no zip). Convert a notebook from the venv:<\/p>\n<pre><code class=\"language-bash\">source .venv/bin/activate\njupyter nbconvert <span class=\"tok-flag\">--to<\/span> html notebooks/01_image_processing_and_geometry.ipynb<\/code><\/pre>\n<p>Rehearse that conversion now so it's automatic on test day. Remember: in the real test, <strong>disable AI code suggestions<\/strong> in whatever editor you use.<\/p>\n<h2 id=\"running-on-the-raspberry-pi\">Running on the Raspberry Pi<\/h2>\n<p><code>run.sh<\/code> works on the Pi too (<code>opencv-python-headless<\/code> needs no display). With <code>--ip=0.0.0.0<\/code> you can open Jupyter from your laptop at <code>http://&lt;pi-ip&gt;:8888<\/code>. Security note: that exposes Jupyter on your LAN — fine at home, and it's still token-protected. Don't expose it to the public internet.<\/p>\n<h2 id=\"files\">Files<\/h2>\n<p><code>run.sh<\/code> · <code>requirements.txt<\/code> · <code>build_notebooks.py<\/code> (regenerates notebooks from the <code>.md<\/code>) · <code>notebooks/<\/code>.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"10-coding-practice/README.md\" href=\"#\">Coding Practice overview<\/a>.<\/p>","toc":[{"level":2,"id":"one-command","text":"One command"},{"level":2,"id":"why-a-notebook-and-is-it-better","text":"Why a notebook (and is it \"better\"?)"},{"level":2,"id":"whats-in-the-notebooks","text":"What's in the notebooks"},{"level":2,"id":"adding-or-editing-notebook-content","text":"Adding or editing notebook content"},{"level":2,"id":"practising-for-the-proctored-format","text":"Practising for the proctored format"},{"level":2,"id":"running-on-the-raspberry-pi","text":"Running on the Raspberry Pi"},{"level":2,"id":"files","text":"Files"}],"text":"run the live playground (jupyter + website) 💡 tl;dr one command spins up a python venv, installs opencv/numpy/jupyter, and serves both the study website and live, editable notebooks of every coding problem. run cells, tweak the code, see the output images — exactly the muscle you need for the proctored round. one command cd koireader-interview-prep bash run.sh first run takes a minute (it builds the venv and installs deps); later runs are instant. you'll see: study website : http://localhost:9000 http://<your-ip>:9000 (from your phone) jupyter : starting on port 8888 (url + token printed below) jupyter starts with the fixed token koireader , so the website's \"open live notebooks\" button (top-left of the site) opens jupyterlab directly — http://<this-host>:8888/lab?token=koireader . press ctrl+c in the terminal to stop both. (change the token with jupyter_token=... bash run.sh , but then update the link's token in _app.js and rebuild.) custom ports: site_port=9000 jupyter_port=8888 bash run.sh why a notebook (and is it \"better\"?) website = best for reading and memorizing . the test bans ai and autocomplete, so you must recall the api — the site + cheat sheet are for that. notebooks = best for experimenting : run a cell, change a threshold, swap in your own image, watch the output image update instantly. use both: read on the site, then drill in the notebook. what's in the notebooks auto-generated from the section 10 markdown (single source of truth), so they never drift. four notebooks in notebooks/ : 01_image_processing_and_geometry.ipynb — preprocessing, deskew, 4-point scan… 02_detection_logic.ipynb — iou, nms, zones, line-crossing, reading order 03_video_and_streaming.ipynb — robust capture, motion, annotate 04_python_and_numpy.ipynb — vectorization, fault-tolerant batch, blobs 06_core_drills.ipynb — hand-curated cut of the ~12 highest-yield problems from notebooks 00–04, ordered by likelihood for this role (not auto-generated from a .md — edit it directly) each notebook's first code cell creates synthetic sample images ( input.jpg , test.avi , …) so every cell runs out of the box. swap input.jpg for a real photo to experiment on your own data. adding or editing notebook content don't edit files in notebooks/ directly — they're generated, and any change gets silently overwritten the next time someone runs build_notebooks.py (which every deploy does). edit the source instead: # 1. edit the matching .md in 10-coding-practice/ (e.g. image-processing-and-geometry.md) # 2. regenerate the notebooks from it: python3 build_notebooks.py # 3. commit both the .md and the regenerated .ipynb, then push + redeploy. the .md → .ipynb mapping is the files list at the top of build_notebooks.py . practising for the proctored format the test wants .py files, or .ipynb converted to .html (no zip). convert a notebook from the venv: source .venv/bin/activate jupyter nbconvert --to html notebooks/01_image_processing_and_geometry.ipynb rehearse that conversion now so it's automatic on test day. remember: in the real test, disable ai code suggestions in whatever editor you use. running on the raspberry pi run.sh works on the pi too ( opencv-python-headless needs no display). with --ip=0.0.0.0 you can open jupyter from your laptop at http://<pi-ip>:8888 . security note: that exposes jupyter on your lan — fine at home, and it's still token-protected. don't expose it to the public internet. files run.sh · requirements.txt · build_notebooks.py (regenerates notebooks from the .md ) · notebooks/ . → back to coding practice overview .","words":541},{"path":"RUN-ON-PI.md","title":"Run on a Raspberry Pi","section":"Start here","quiz":false,"accent":"#d4663f","html":"<h1 id=\"run-on-a-raspberry-pi-or-any-edge-device\">Run on a Raspberry Pi (or any edge device)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This site is just static files — one <code>index.html<\/code> plus the markdown. No build, no database, no internet. Serve the folder with any tiny web server and open it in a browser. Below: the 30-second way, plus an auto-start service so it's always on.<\/div><\/div>\n<h2 id=\"why-it-needs-a-server-not-just-double-click\">Why it needs a server (not just double-click)<\/h2>\n<p>The page <em>reads<\/em> the <code>.md<\/code> files at runtime with <code>fetch()<\/code>. Browsers block reading local files over <code>file://<\/code> for security, so opening <code>index.html<\/code> directly shows a \"needs a web server\" notice. Any HTTP server fixes it — that's all a Pi needs.<\/p>\n<h2 id=\"deployed-instance\">Deployed instance<\/h2>\n<p>Running on <strong>http://192.168.3.20:9000<\/strong> — served by the <code>koi-prep<\/code> systemd service (auto-starts on boot). User: <code>ajmalrasi<\/code>, path: <code>/home/ajmalrasi/ml-interview-prep/computer-vision-prep<\/code>.<\/p>\n<p>This track lives in the <strong>monorepo<\/strong> <code>github.com/ajmalrasi/ml-interview-prep<\/code> (alongside <code>ml-engineer-prep/<\/code>). The Pi holds one clone at <code>/home/ajmalrasi/ml-interview-prep<\/code> and <strong>deploys by <code>git pull<\/code><\/strong> — the committed <code>index.html<\/code> is served directly, so the Pi needs no Node. See <a href=\"#editing--redeploying\">Editing / redeploying<\/a> below.<\/p>\n<p>Source: https://github.com/ajmalrasi/ml-interview-prep<\/p>\n<hr>\n<h2 id=\"option-1-python-already-on-every-pi-30-seconds\">Option 1: Python (already on every Pi), 30 seconds<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">cd<\/span> /home/ajmalrasi/ml-interview-prep/computer-vision-prep\n<span class=\"tok-command\">python3<\/span> <span class=\"tok-flag\">-m<\/span> http.server <span class=\"tok-number\">9000<\/span><\/code><\/pre>\n<p>Then open <strong>http://localhost:9000<\/strong> on the Pi, or <strong>http://&lt;pi-ip&gt;:9000<\/strong> from your laptop/phone on the same network (find the IP with <code>hostname -I<\/code>).<\/p>\n<h2 id=\"option-2-always-on-with-systemd-survives-reboot\">Option 2: Always-on with systemd (survives reboot)<\/h2>\n<p>Create the service:<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">sudo<\/span> tee /etc/systemd/system/koi-prep.service &gt;/dev/null &lt;&lt;<span class=\"tok-string\">'EOF'<\/span>\n[Unit]\nDescription=Video Intelligence Interview Prep site\nAfter=network.target\n\n[Service]\nWorkingDirectory=/home/ajmalrasi/ml-interview-prep/computer-vision-prep\nExecStart=/usr/bin/<span class=\"tok-command\">python3<\/span> <span class=\"tok-flag\">-m<\/span>

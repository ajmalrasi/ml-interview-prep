/offline = buffer/block (correctness over latency).<\/p>\n<p><strong>Why <code>maxsize=1<\/code> instead of a big buffer for live inference?<\/strong> A big buffer just means you're always acting on old frames during any slowdown. Size 1–2 keeps you on the freshest frame; if you fall behind you skip, not lag.<\/p>\n<p><strong>queue.Queue vs collections.deque for the buffer?<\/strong> <code>queue.Queue<\/code> is thread-safe with blocking/timeout semantics (good for producer/consumer with backpressure signaling). <code>deque(maxlen=N)<\/code> is lock-free-ish for simple append/peek and auto-evicts — great for \"latest frame only.\" Pick Queue when you need blocking/coordination, deque for pure latest-wins.<\/p>\n<p><strong>What causes the classic video-pipeline memory leak?<\/strong> An unbounded queue (consumer slower than producer) <strong>or<\/strong> holding references to decoded frames (GPU surfaces) you never release. Fix: bound the queue + explicitly free/unmap GPU buffers each iteration.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../02-gstreamer/README.md\" href=\"#\">02-gstreamer/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-core-problem-producerconsumer-mismatch","text":"The core problem (producer/consumer mismatch)"},{"level":2,"id":"the-three-strategies","text":"The three strategies"},{"level":2,"id":"how-you-actually-express-drop","text":"How you actually express \"drop\""},{"level":2,"id":"latency-vs-jitter-dont-confuse-them","text":"Latency vs jitter (don't confuse them)"},{"level":2,"id":"backpressure-across-stages","text":"Backpressure across stages"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"frame buffers & backpressure camera 30 fps ▣ dropped maxlen = 1 · keep latest model 22 fps slower → would pile up producer bounded buffer: keep the newest frame, drop the rest 💡 tl;dr cameras produce frames at a fixed rate; your model consumes them at a variable rate. when the model is slower than the camera, frames pile up. you have exactly three choices: buffer (latency grows), drop (stay real-time), or block (stall the source). for live inference the right default is almost always drop the oldest, keep latest . the core problem (producer/consumer mismatch) camera @ 30 fps producer queue buffer model @ 22 fps consumer — slower! producer outruns consumer → the queue fills → backpressure (drop frames or block) is the only escape. if producer > consumer forever, the queue grows without bound → memory leak, ever-increasing latency , eventual oom crash. this is the #1 way naive video pipelines die in production. the jd's \"without memory leaks\" and \"manage resources in long-running processes\" point straight here. the three strategies strategy what happens use when bounded queue + drop oldest keep newest frame, discard stale live inference — you want current reality, not a backlog bounded queue + block source waits for consumer offline/batch processing of recorded video where every frame matters unbounded queue grows forever never in production — this is the bug, not a strategy latency vs completeness is the tradeoff. a live anomaly detector wants the latest frame (drop). a forensic counting job on a recording wants every frame (block + bounded). how you actually express \"drop\" gstreamer: appsink drop=true max-buffers=1 # only ever hold the newest frame # or on a leaky queue element: queue max-size-buffers=2 leaky=downstream python (your own thread): from collections import deque frame_buf = deque(maxlen= 1 ) # bounded; appending evicts the old frame # producer thread: frame_buf.append(frame) # never blocks, never grows # consumer thread: frame = frame_buf[- 1 ] if frame_buf else none a deque(maxlen=n) or a queue.queue(maxsize=n) with put_nowait + drop-on-full is the canonical \"crash-proof buffer.\" latency vs jitter (don't confuse them) latency = how old the frame is when you act on it. jitter = variation in frame arrival timing. a small jitter buffer smooths bursty networks; a large one trades latency for smoothness. rtsp latency= and gstreamer rtpjitterbuffer tune this. for \"obsess over milliseconds,\" keep it small (~100–200ms). backpressure across stages in a multi-stage pipeline (decode → infer → analytics → db), the slowest stage sets the pace. each stage needs a bounded buffer in front of it so a slow db write can't back up into dropped decoded frames silently. design rule: bound every queue, and decide the drop policy per stage. why x over y drop frames vs buffer them? live = drop (you want now, not a backlog; buffering inflates latency forever if you can't catch up). recorded/offline = buffer/block (correctness over latency). why maxsize=1 instead of a big buffer for live inference? a big buffer just means you're always acting on old frames during any slowdown. size 1–2 keeps you on the freshest frame; if you fall behind you skip, not lag. queue.queue vs collections.deque for the buffer? queue.queue is thread-safe with blocking/timeout semantics (good for producer/consumer with backpressure signaling). deque(maxlen=n) is lock-free-ish for simple append/peek and auto-evicts — great for \"latest frame only.\" pick queue when you need blocking/coordination, deque for pure latest-wins. what causes the classic video-pipeline memory leak? an unbounded queue (consumer slower than producer) or holding references to decoded frames (gpu surfaces) you never release. fix: bound the queue + explicitly free/unmap gpu buffers each iteration. → back to section readme · next section: 02-gstreamer/","words":610},{"path":"02-gstreamer/README.md","title":"Overview","section":"2 · GStreamer","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"02-gstreamer-and-deepstream\">02: GStreamer (and DeepStream)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> GStreamer is a pipeline framework: you connect small <strong>elements<\/strong> (source → decode → convert → sink) into a graph, and media flows through as <strong>buffers<\/strong>. It's how you get hardware-accelerated, multi-stream video into your model. DeepStream is NVIDIA's GStreamer plugin set that bolts inference + tracking<\/div><\/div>\n<ul><li>analytics directly into that pipeline.<\/li><\/ul>\n<p>This is <em>the<\/em> tool the JD names twice. You've used it (Integration Wizards + DeepStream on Jetson) — this section makes sure you can talk about it fluently.<\/p>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"pipeline-model.md\" href=\"#\">pipeline-model.md<\/a> — elements, pads, caps, bins, bus<\/li><li><a class=\"mdlink\" data-href=\"appsink-and-python.md\" href=\"#\">appsink-and-python.md<\/a> — getting frames into Python/OpenCV<\/li><li><a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a> — inference inside the pipeline, multi-stream batching<\/li><\/ol>\n<h2 id=\"the-one-paragraph-pitch-memorize\">The one-paragraph pitch (memorize)<\/h2>\n<p><em>\"GStreamer models video as a directed graph of elements connected by pads. Source elements produce buffers, transform elements (decoders, converters) process them, sink elements consume them. Capabilities (caps) negotiate format between pads. Each element can run on its own thread via <code>queue<\/code> elements, so a pipeline is naturally concurrent. For NVIDIA, DeepStream adds <code>nvstreammux<\/code> to batch many camera streams into one inference call, <code>nvinfer<\/code> for TensorRT inference, and <code>nvtracker<\/code> for multi-object tracking — all keeping frames in GPU memory.\"<\/em><\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"pipeline-model.md\" href=\"#\">pipeline-model.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-one-paragraph-pitch-memorize","text":"The one-paragraph pitch (memorize)"}],"text":"02: gstreamer (and deepstream) 💡 tl;dr gstreamer is a pipeline framework: you connect small elements (source → decode → convert → sink) into a graph, and media flows through as buffers . it's how you get hardware-accelerated, multi-stream video into your model. deepstream is nvidia's gstreamer plugin set that bolts inference + tracking analytics directly into that pipeline. this is the tool the jd names twice. you've used it (integration wizards + deepstream on jetson) — this section makes sure you can talk about it fluently. files: pipeline-model.md — elements, pads, caps, bins, bus appsink-and-python.md — getting frames into python/opencv deepstream.md — inference inside the pipeline, multi-stream batching the one-paragraph pitch (memorize) \"gstreamer models video as a directed graph of elements connected by pads. source elements produce buffers, transform elements (decoders, converters) process them, sink elements consume them. capabilities (caps) negotiate format between pads. each element can run on its own thread via queue elements, so a pipeline is naturally concurrent. for nvidia, deepstream adds nvstreammux to batch many camera streams into one inference call, nvinfer for tensorrt inference, and nvtracker for multi-object tracking — all keeping frames in gpu memory.\" → start: pipeline-model.md","words":194},{"path":"02-gstreamer/pipeline-model.md","title":"Pipeline Model","section":"2 · GStreamer","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"the-gstreamer-pipeline-model\">The GStreamer Pipeline Model<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 140\" role=\"img\" aria-label=\"A GStreamer pipeline: elements linked by pads\"><rect class=\"dg-box\" x=\"14\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"66\" y=\"76\" text-anchor=\"middle\">rtspsrc<\/text><text class=\"dg-sub\" x=\"66\" y=\"93\" text-anchor=\"middle\">pull<\/text><text class=\"dg-accent-tx\" x=\"130\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"118\" y1=\"78\" x2=\"123\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"123,73 130,78 123,83\"/><rect class=\"dg-box\" x=\"130\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"182\" y=\"76\" text-anchor=\"middle\">depay<\/text><text class=\"dg-sub\" x=\"182\" y=\"93\" text-anchor=\"middle\">strip RTP<\/text><text class=\"dg-accent-tx\" x=\"246\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"234\" y1=\"78\" x2=\"239\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"239,73 246,78 239,83\"/><rect class=\"dg-box\" x=\"246\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"298\" y=\"76\" text-anchor=\"middle\">parse<\/text><text class=\"dg-sub\" x=\"298\" y=\"93\" text-anchor=\"middle\">frames<\/text><text class=\"dg-accent-tx\" x=\"362\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"350\" y1=\"78\" x2=\"355\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"355,73 362,78 355,83\"/><rect class=\"dg-box dg-hot\" x=\"362\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"414\" y=\"76\" text-anchor=\"middle\">decoder<\/text><text class=\"dg-sub\" x=\"414\" y=\"93\" text-anchor=\"middle\">NVDEC<\/text><text class=\"dg-accent-tx\" x=\"478\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"466\" y1=\"78\" x2=\"471\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"471,73 478,78 471,83\"/><rect class=\"dg-box\" x=\"478\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"530\" y=\"76\" text-anchor=\"middle\">convert<\/text><text class=\"dg-sub\" x=\"530\" y=\"93\" text-anchor=\"middle\">NV12→BGR<\/text><text class=\"dg-accent-tx\" x=\"594\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"582\" y1=\"78\" x2=\"587\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"587,73 594,78 587,83\"/><rect class=\"dg-box\" x=\"594\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"646\" y=\"76\" text-anchor=\"middle\">appsink<\/text><text class=\"dg-sub\" x=\"646\" y=\"93\" text-anchor=\"middle\">→ Python<\/text><text class=\"dg-sub\" x=\"360\" y=\"28\" text-anchor=\"middle\">elements linked by pads · each ! is a connection · queue = thread boundary<\/text><\/svg><figcaption>A GStreamer pipeline: elements linked by pads<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Elements are LEGO bricks. Pads are the studs that connect them. Caps are the rule that says \"these two bricks fit.\" Buffers are the data flowing through. The bus is the intercom that tells your app about errors and end-of-stream.<\/div><\/div>\n<h2 id=\"the-pieces\">The pieces<\/h2>\n<ul><li><strong>Element<\/strong> — one processing unit: <code>rtspsrc<\/code>, <code>h264parse<\/code>, <code>nvv4l2decoder<\/code>,<\/li><\/ul>\n<p><code>nvvidconv<\/code>, <code>appsink<\/code>. Has a state (NULL → READY → PAUSED → PLAYING).<\/p>\n<ul><li><strong>Pad<\/strong> — an element's input (<strong>sink pad<\/strong>) or output (<strong>source pad<\/strong>). Data<\/li><\/ul>\n<p>enters sink pads, leaves source pads. (Confusingly, a \"sink <em>element<\/em>\" is the   final consumer, while a \"sink <em>pad<\/em>\" is any input port.)<\/p>\n<ul><li><strong>Caps (capabilities)<\/strong> — the format contract negotiated between pads, e.g.<\/li><\/ul>\n<p><code>video/x-raw,format=NV12,width=1920,height=1080,framerate=30/1<\/code>. Mismatched caps   = pipeline won't link.<\/p>\n<ul><li><strong>Buffer<\/strong> — a chunk of data (usually one frame) flowing downstream, with a<\/li><\/ul>\n<p>timestamp (PTS).<\/p>\n<ul><li><strong>Bin / Pipeline<\/strong> — a container of elements. The top-level <code>Pipeline<\/code> is a bin<\/li><\/ul>\n<p>that also owns the clock and bus.<\/p>\n<ul><li><strong>Bus<\/strong> — the message channel from pipeline → your app: <code>EOS<\/code> (end of stream),<\/li><\/ul>\n<p><code>ERROR<\/code>, <code>WARNING<\/code>, state changes. <strong>You watch the bus to detect a dead camera.<\/strong><\/p>\n<h2 id=\"a-pipeline-in-words\">A pipeline in words<\/h2>\n<p>The <code>!<\/code> is shorthand for \"link the source pad of the left element to the sink pad of the right element\":<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"Each '!' connects an output (source) pad to the next element's input (sink) pad\"><rect class=\"dg-box\" x=\"96\" y=\"54\" width=\"190\" height=\"64\" rx=\"12\"/><text class=\"dg-label\" x=\"191\" y=\"90\" text-anchor=\"middle\">h264parse<\/text><rect class=\"dg-accent-soft\" x=\"278\" y=\"74\" width=\"22\" height=\"24\" rx=\"4\"/><text class=\"dg-sub\" x=\"289\" y=\"48\" text-anchor=\"middle\">src pad<\/text><rect class=\"dg-box\" x=\"434\" y=\"54\" width=\"190\" height=\"64\" rx=\"12\"/><text class=\"dg-label\" x=\"529\" y=\"90\" text-anchor=\"middle\">nvv4l2decoder<\/text><rect class=\"dg-accent-soft\" x=\"420\" y=\"74\" width=\"22\" height=\"24\" rx=\"4\"/><text class=\"dg-sub\" x=\"431\" y=\"48\" text-anchor=\"middle\">sink pad<\/text><text class=\"dg-accent-tx\" x=\"360\" y=\"80\" text-anchor=\"middle\">!<\/text><line class=\"dg-line\" x1=\"300\" y1=\"98\" x2=\"413\" y2=\"98\"/><polygon class=\"dg-arrow\" points=\"413,93 420,98 413,103\"/><text class=\"dg-sub\" x=\"360\" y=\"138\" text-anchor=\"middle\">\"!\" links one element's source pad (out) to the next element's sink pad (in)<\/text><\/svg><figcaption>Each \"!\" connects an output (source) pad to the next element's input (sink) pad<\/figcaption><\/figure>\n<h2 id=\"dynamic-pads-the-gotcha-interviewers-love\">Dynamic pads (the gotcha interviewers love)<\/h2>\n<p><code>rtspsrc<\/code> doesn't know the stream's format until it connects, so its source pad appears <strong>at runtime<\/strong> (\"sometimes pad\"). You can't link it statically — you connect a <code>pad-added<\/code> callback and link then. Knowing this signals real GStreamer experience.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> on_pad_added(src, new_pad, depay):\n    new_pad.link(depay.get_static_pad(<span class=\"tok-string\">\"sink\"<\/span>))\nrtspsrc.connect(<span class=\"tok-string\">\"pad-added\"<\/span>, on_pad_added, depay)<\/code><\/pre>\n<h2 id=\"queue-thread-boundary\">queue = thread boundary<\/h2>\n<p>Inserting a <code>queue<\/code> element decouples upstream and downstream onto <strong>separate threads<\/strong>, with a bounded buffer. This is how you parallelize decode vs inference and apply backpressure (<code>max-size-buffers<\/code>, <code>leaky<\/code>). No <code>queue<\/code> = everything runs in one thread, serially.<\/p>\n<h2 id=\"states-and-why-paused-matters\">States and why PAUSED matters<\/h2>\n<p>NULL (no resources) → READY (resources allocated) → PAUSED (data prerolled, clock stopped) → PLAYING (clock running, data flows). Live sources can't fully preroll, which is why live pipelines behave slightly differently and why you handle <code>async-done<\/code>/<code>no-preroll<\/code>.<\/p>\n<h2 id=\"caps-negotiation-how-two-pads-actually-agree\">Caps negotiation: how two pads actually agree<\/h2>\n<p>Linking isn't \"plug A into B.\" When you set the pipeline to PLAYING, pads <strong>negotiate caps<\/strong>: the downstream pad advertises what it can accept, the upstream what it can produce, and GStreamer intersects the two. If the intersection is empty you get the classic <code>not-negotiated (-4)<\/code> error. A <strong>capsfilter<\/strong> (the <code>video/x-raw,format=BGR<\/code> you see between elements) <em>forces<\/em> a specific format — that's you pinning the contract rather than letting it auto-pick.<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"A capsfilter between two elements pins the exact format they exchange\"><rect class=\"dg-box\" x=\"34\" y=\"58\" width=\"150\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"109\" y=\"92\" text-anchor=\"middle\">nvvidconv<\/text><line class=\"dg-line\" x1=\"184\" y1=\"87\" x2=\"243\" y2=\"87\"/><polygon class=\"dg-arrow\" points=\"243,82 250,87 243,92\"/><rect class=\"dg-box dg-hot\" x=\"250\" y=\"62\" width=\"220\" height=\"50\" rx=\"25\"/><text class=\"dg-label\" x=\"360\" y=\"92\" text-anchor=\"middle\">video/x-raw, format=BGR<\/text><text class=\"dg-sub\" x=\"360\" y=\"48\" text-anchor=\"middle\">capsfilter — you pin the format<\/text><line class=\"dg-line\" x1=\"470\" y1=\"87\" x2=\"529\" y2=\"87\"/><polygon class=\"dg-arrow\" points=\"529,82 536,87 529,92\"/><rect class=\"dg-box\" x=\"536\" y=\"58\" width=\"150\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"611\" y=\"92\" text-anchor=\"middle\">appsink<\/text><text class=\"dg-sub\" x=\"360\" y=\"138\" text-anchor=\"middle\">pads negotiate a common format · empty intersection = \"not-negotiated\"<\/text><\/svg><figcaption>A capsfilter between two elements pins the exact format they exchange<\/figcaption><\/figure>\n<p>Three failure signatures worth recognizing instantly in an interview:<\/p>\n<ul><li><strong><code>not-negotiated<\/code><\/strong> → caps don't intersect (e.g. you forgot a <code>videoconvert<\/code>,<\/li><\/ul>\n<p>or asked for a format the decoder can't emit).<\/p>\n<ul><li><strong><code>internal data stream error<\/code><\/strong> → almost always a <em>dynamic pad never linked<\/em><\/li><\/ul>\n<p>(the <code>rtspsrc<\/code> pad-added gotcha below) or a missing element.<\/p>\n<ul><li><strong>pipeline hangs in PAUSED<\/strong> → a live source not prerolling, or a queue with<\/li><\/ul>\n<p>nothing feeding it.<\/p>\n<h2 id=\"buffers-carry-more-than-pixels-pts-dts-metadata\">Buffers carry more than pixels: PTS, DTS, metadata<\/h2>\n<p>A <code>GstBuffer<\/code> has two timestamps: <strong>PTS<\/strong> (presentation — when to show it) and <strong>DTS<\/strong> (decode — when to decode it). They differ when <strong>B-frames<\/strong> reorder decode vs display order; that reordering is also why B-frames add latency (section 01). Buffers also carry <strong><code>GstMeta<\/code><\/strong> — sidecar info (e.g. DeepStream hangs its <code>NvDsBatchMeta<\/code> here) so detections ride <em>with<\/em> the frame without copying pixels.<\/p>\n<h2 id=\"the-pipeline-clock-and-live-sources\">The pipeline clock and live sources<\/h2>\n<p>The pipeline picks one <strong>clock<\/strong>; every sink times playback against it. A <strong>live<\/strong> source (camera) is itself the clock master — frames arrive when they arrive, you can't \"pause and resume\" the world. This is why a live pipeline returns <code>NO_PREROLL<\/code> from the state change and why <code>sync=false<\/code> on a sink means \"don't wait for the clock, hand me the frame now\" (the latency knob from <a class=\"mdlink\" data-href=\"appsink-and-python.md\" href=\"#\">appsink<\/a>).<\/p>\n<h2 id=\"state-changes-return-a-status-and-it-matters\">State changes return a <em>status<\/em>, and it matters<\/h2>\n<p><code>set_state(PLAYING)<\/code> doesn't return success/failure — it returns one of: <code>SUCCESS<\/code>, <code>ASYNC<\/code> (will finish later, watch the bus for <code>async-done<\/code>), <code>NO_PREROLL<\/code> (live source, normal), or <code>FAILURE<\/code>. Treating <code>ASYNC<\/code> as failure is a common bug; you wait for the bus to confirm before assuming the camera is up.<\/p>\n<h2 id=\"events-vs-messages-two-different-channels\">Events vs messages (two different channels)<\/h2>\n<ul><li><strong>Messages<\/strong> flow pipeline → app on the <strong>bus<\/strong> (<code>ERROR<\/code>, <code>EOS<\/code>, <code>STATE_CHANGED<\/code>,<\/li><\/ul>\n<p><code>QOS<\/code>). This is what <em>your code<\/em> listens to.<\/p>\n<ul><li><strong>Events<\/strong> flow <em>between elements<\/em> in-band with the data: <code>EOS<\/code>, <code>FLUSH<\/code>,<\/li><\/ul>\n<p><code>SEGMENT<\/code>, <code>QOS<\/code> (quality-of-service: a downstream sink telling upstream \"I'm   dropping late frames, slow down\"). You usually don't handle these directly but   knowing they exist explains how backpressure/QoS propagates.<\/p>\n<h2 id=\"pad-probes-inspect-or-modify-the-stream-in-flight\">Pad probes: inspect or modify the stream in flight<\/h2>\n<p>A <strong>pad probe<\/strong> is a callback you attach to a pad to watch buffers/events passing through — without adding an element. This is exactly how you read DeepStream metadata (<a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a>), drop frames conditionally, or measure per-stage latency. Buffer probes for data, event probes for EOS/flush.<\/p>\n<pre><code class=\"language-python\">pad = element.get_static_pad(<span class=\"tok-string\">\"src\"<\/span>)\npad.add_probe(<span class=\"tok-builtin\">Gst<\/span>.PadProbeType.BUFFER, my_probe, user_data)<\/code><\/pre>\n<h2 id=\"tee-queue-branching-record-and-infer-and-stream\">tee + queue = branching (record AND infer AND stream)<\/h2>\n<p>To send one stream to multiple consumers — infer on it <em>and<\/em> record it <em>and<\/em> push it to WebRTC — use <strong><code>tee<\/code><\/strong>, and put a <strong><code>queue<\/code> after every branch<\/strong>. Without the per-branch queue the slowest branch stalls all of them (they'd share one thread).<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 250\" role=\"img\" aria-label=\"tee fans one stream to many branches — give every branch its own queue\"><rect class=\"dg-box\" x=\"14\" y=\"86\" width=\"150\" height=\"52\" rx=\"12\"/><text class=\"dg-label\" x=\"89\" y=\"117\" text-anchor=\"middle\">rtspsrc ! decode<\/text><line class=\"dg-line\" x1=\"164\" y1=\"112\" x2=\"207\" y2=\"112\"/><polygon class=\"dg-arrow\" points=\"207,107 214,112 207,117\"/><rect class=\"dg-box dg-hot\" x=\"214\" y=\"86\" width=\"64\" height=\"52\" rx=\"12\"/><text class=\"dg-label\" x=\"246\" y=\"117\" text-anchor=\"middle\">tee<\/text><path class=\"dg-line\" d=\"M278 112 C 320 112 320 52 360 52\"/><polygon class=\"dg-arrow\" points=\"353,47 360,52 353,57\"/><rect class=\"dg-box\" x=\"364\" y=\"34\" width=\"250\" height=\"40\" rx=\"10\"/><text class=\"dg-label\" x=\"378\" y=\"52\">queue ! nvinfer<\/text><text class=\"dg-sub\" x=\"378\" y=\"67\">analytics<\/text><path class=\"dg-line\" d=\"M278 112 C 320 112 320 130 360 130\"/><polygon class=\"dg-arrow\" points=\"353,125 360,130 353,135\"/><rect class=\"dg-box\" x=\"364\" y=\"112\" width=\"250\" height=\"40\" rx=\"10\"/><text class=\"dg-label\" x=\"378\" y=\"130\">queue ! splitmuxsink<\/text><text class=\"dg-sub\" x=\"378\" y=\"145\">record to disk<\/text><path class=\"dg-line\" d=\"M278 112 C 320 112 320 208 360 208\"/><polygon class=\"dg-arrow\" points=\"353,203 360,208 353,213\"/><rect class=\"dg-box\" x=\"364\" y=\"190\" width=\"250\" height=\"40\" rx=\"10\"/><text class=\"dg-label\" x=\"378\" y=\"208\">queue ! webrtcbin<\/text><text class=\"dg-sub\" x=\"378\" y=\"223\">live to browser<\/text><text class=\"dg-sub\" x=\"300\" y=\"242\" text-anchor=\"middle\">one stream → many consumers · a queue per branch so none stalls the others<\/text><\/svg><figcaption>tee fans one stream to many branches — give every branch its own queue<\/figcaption><\/figure>\n<h2 id=\"queue-tuning-leaky-for-live-blocking-for-recorded\">queue tuning: leaky for live, blocking for recorded<\/h2>\n<p><code>queue max-size-buffers=2 leaky=downstream<\/code> = \"keep at most 2, drop the <em>oldest<\/em> when full\" — the live-video default (latest frame wins). <code>leaky=no<\/code> (block) is for recorded/offline where you must not lose a frame. This is the backpressure policy from section 01 expressed as element properties. <code>max-size-time<\/code> and <code>max-size-bytes<\/code> are alternative bound dimensions (set unused ones to 0).<\/p>\n<h2 id=\"debugging-the-two-commands-youll-name-in-the-interview\">Debugging: the two commands you'll name in the interview<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># 1) Verbose internals — caps negotiated, state changes, the actual error:<\/span>\nGST_DEBUG=<span class=\"tok-number\">3<\/span> <span class=\"tok-command\">gst-launch-1.0<\/span> rtspsrc location=... ! ...        <span class=\"tok-comment\"># bump to 4–5 for more<\/span>\n<span class=\"tok-comment\"># 2) Dump the pipeline graph to a .dot (visualize what linked to what):<\/span>\nGST_DEBUG_DUMP_DOT_DIR=/tmp <span class=\"tok-command\">gst-launch-1.0<\/span> ...   <span class=\"tok-comment\"># then: dot -Tpng pipeline.dot<\/span><\/code><\/pre>\n<p>Mentioning <code>GST_DEBUG<\/code> levels and the <code>.dot<\/code> graph dump is a strong \"I've actually debugged these\" signal. <code>gst-inspect-1.0 &lt;element&gt;<\/code> (list an element's pads, caps, and properties) is the third one to name.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>GStreamer vs FFmpeg (the CLI/lib)?<\/strong> FFmpeg is a swiss-army transcoder — unbeatable for \"convert/clip this file\" and great as a decode library. GStreamer is a <em>pipeline framework<\/em> for <strong>live, branching, multi-stream, plugin-extensible<\/strong> apps with fine threading control. KoiReader wants live multi-stream graphs with inference inside → GStreamer (and DeepStream is built on it). Many shops use FFmpeg for ingest/clip and GStreamer for the live serving graph.<\/p>\n<p><strong>Why use <code>queue<\/code> elements at all?<\/strong> Without them the whole pipeline is one thread: a slow decoder stalls the source. <code>queue<\/code> puts a thread boundary + bounded buffer between stages so they run concurrently and you control drop policy.<\/p>\n<p><strong>How do you detect a camera went down?<\/strong> Watch the <strong>bus<\/strong> for <code>ERROR<\/code>/<code>EOS<\/code>, and/or run a watchdog on frame timestamps. On failure, tear the pipeline to NULL and rebuild (reconnect) — see <a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">fault tolerance<\/a>.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"appsink-and-python.md\" href=\"#\">appsink-and-python.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-pieces","text":"The pieces"},{"level":2,"id":"a-pipeline-in-words","text":"A pipeline in words"},{"level":2,"id":"dynamic-pads-the-gotcha-interviewers-love","text":"Dynamic pads (the gotcha interviewers love)"},{"level":2,"id":"queue-thread-boundary","text":"queue = thread boundary"},{"level":2,"id":"states-and-why-paused-matters","text":"States and why PAUSED matters"},{"level":2,"id":"caps-negotiation-how-two-pads-actually-agree","text":"Caps negotiation: how two pads actually agree"},{"level":2,"id":"buffers-carry-more-than-pixels-pts-dts-metadata","text":"Buffers carry more than pixels: PTS, DTS, metadata"},{"level":2,"id":"the-pipeline-clock-and-live-sources","text":"The pipeline clock and live sources"},{"level":2,"id":"state-changes-return-a-status-and-it-matters","text":"State changes return a status, and it matters"},{"level":2,"id":"events-vs-messages-two-different-channels","text":"Events vs messages (two different channels)"},{"level":2,"id":"pad-probes-inspect-or-modify-the-stream-in-flight","text":"Pad probes: inspect or modify the stream in flight"},{"level":2,"id":"tee-queue-branching-record-and-infer-and-stream","text":"tee + queue = branching (record AND infer AND stream)"},{"level":2,"id":"queue-tuning-leaky-for-live-blocking-for-recorded","text":"queue tuning: leaky for live, blocking for recorded"},{"level":2,"id":"debugging-the-two-commands-youll-name-in-the-interview","text":"Debugging: the two commands you'll name in the interview"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"the gstreamer pipeline model rtspsrc pull depay strip rtp parse frames decoder nvdec convert nv12→bgr appsink → python elements linked by pads · each ! is a connection · queue = thread boundary a gstreamer pipeline: elements linked by pads 💡 tl;dr elements are lego bricks. pads are the studs that connect them. caps are the rule that says \"these two bricks fit.\" buffers are the data flowing through. the bus is the intercom that tells your app about errors and end-of-stream. the pieces element — one processing unit: rtspsrc , h264parse , nvv4l2decoder , nvvidconv , appsink . has a state (null → ready → paused → playing). pad — an element's input ( sink pad ) or output ( source pad ). data enters sink pads, leaves source pads. (confusingly, a \"sink element \" is the final consumer, while a \"sink pad \" is any input port.) caps (capabilities) — the format contract negotiated between pads, e.g. video/x-raw,format=nv12,width=1920,height=1080,framerate=30/1 . mismatched caps = pipeline won't link. buffer — a chunk of data (usually one frame) flowing downstream, with a timestamp (pts). bin / pipeline — a container of elements. the top-level pipeline is a bin that also owns the clock and bus. bus — the message channel from pipeline → your app: eos (end of stream), error , warning , state changes. you watch the bus to detect a dead camera. a pipeline in words the ! is shorthand for \"link the source pad of the left element to the sink pad of the right element\": h264parse src pad nvv4l2decoder sink pad ! \"!\" links one element's source pad (out) to the next element's sink pad (in) each \"!\" connects an output (source) pad to the next element's input (sink) pad dynamic pads (the gotcha interviewers love) rtspsrc doesn't know the stream's format until it connects, so its source pad appears at runtime (\"sometimes pad\"). you can't link it statically — you connect a pad-added callback and link then. knowing this signals real gstreamer experience. def on_pad_added(src, new_pad, depay): new_pad.link(depay.get_static_pad( \"sink\" )) rtspsrc.connect( \"pad-added\" , on_pad_added, depay) queue = thread boundary inserting a queue element decouples upstream and downstream onto separate threads , with a bounded buffer. this is how you parallelize decode vs inference and apply backpressure ( max-size-buffers , leaky ). no queue = everything runs in one thread, serially. states and why paused matters null (no resources) → ready (resources allocated) → paused (data prerolled, clock stopped) → playing (clock running, data flows). live sources can't fully preroll, which is why live pipelines behave slightly differently and why you handle async-done / no-preroll . caps negotiation: how two pads actually agree linking isn't \"plug a into b.\" when you set the pipeline to playing, pads negotiate caps : the downstream pad advertises what it can accept, the upstream what it can produce, and gstreamer intersects the two. if the intersection is empty you get the classic not-negotiated (-4) error. a capsfilter (the video/x-raw,format=bgr you see between elements) forces a specific format — that's you pinning the contract rather than letting it auto-pick. nvvidconv video/x-raw, format=bgr capsfilter — you pin the format appsink pads negotiate a common format · empty intersection = \"not-negotiated\" a capsfilter between two elements pins the exact format they exchange three failure signatures worth recognizing instantly in an interview: not-negotiated → caps don't intersect (e.g. you forgot a videoconvert , or asked for a format the decoder can't emit). internal data stream error → almost always a dynamic pad never linked (the rtspsrc pad-added gotcha below) or a missing element. pipeline hangs in paused → a live source not prerolling, or a queue with nothing feeding it. buffers carry more than pixels: pts, dts, metadata a gstbuffer has two timestamps: pts (presentation — when to show it) and dts (decode — when to decode it). they differ when b-frames reorder decode vs display order; that reordering is also why b-frames add latency (section 01). buffers also carry gstmeta — sidecar info (e.g. deepstream hangs its nvdsbatchmeta here) so detections ride with the frame without copying pixels. the pipeline clock and live sources the pipeline picks one clock ; every sink times playback against it. a live source (camera) is itself the clock master — frames arrive when they arrive, you can't \"pause and resume\" the world. this is why a live pipeline returns no_preroll from the state change and why sync=false on a sink means \"don't wait for the clock, hand me the frame now\" (the latency knob from appsink ). state changes return a status , and it matters set_state(playing) doesn't return success/failure — it returns one of: success , async (will finish later, watch the bus for async-done ), no_preroll (live source, normal), or failure . treating async as failure is a common bug; you wait for the bus to confirm before assuming the camera is up. events vs messages (two different channels) messages flow pipeline → app on the bus ( error , eos , state_changed , qos ). this is what your code listens to. events flow between elements in-band with the data: eos , flush , segment , qos (quality-of-service: a downstream sink telling upstream \"i'm dropping late frames, slow down\"). you usually don't handle these directly but knowing they exist explains how backpressure/qos propagates. pad probes: inspect or modify the stream in flight a pad probe is a callback you attach to a pad to watch buffers/events passing through — without adding an element. this is exactly how you read deepstream metadata ( deepstream.md ), drop frames conditionally, or measure per-stage latency. buffer probes for data, event probes for eos/flush. pad = element.get_static_pad( \"src\" ) pad.add_probe( gst .padprobetype.buffer, my_probe, user_data) tee + queue = branching (record and infer and stream) to send one stream to multiple consumers — infer on it and record it and push it to webrtc — use tee , and put a queue after every branch . without the per-branch queue the slowest branch stalls all of them (they'd share one thread). rtspsrc ! decode tee queue ! nvinfer analytics queue ! splitmuxsink record to disk queue ! webrtcbin live to browser one stream → many consumers · a queue per branch so none stalls the others tee fans one stream to many branches — give every branch its own queue queue tuning: leaky for live, blocking for recorded queue max-size-buffers=2 leaky=downstream = \"keep at most 2, drop the oldest when full\" — the live-video default (latest frame wins). leaky=no (block) is for recorded/offline where you must not lose a frame. this is the backpressure policy from section 01 expressed as element properties. max-size-time and max-size-bytes are alternative bound dimensions (set unused ones to 0). debugging: the two commands you'll name in the interview # 1) verbose internals — caps negotiated, state changes, the actual error: gst_debug= 3 gst-launch-1.0 rtspsrc location=... ! ... # bump to 4–5 for more # 2) dump the pipeline graph to a .dot (visualize what linked to what): gst_debug_dump_dot_dir=/tmp gst-launch-1.0 ... # then: dot -tpng pipeline.dot mentioning gst_debug levels and the .dot graph dump is a strong \"i've actually debugged these\" signal. gst-inspect-1.0 <element> (list an element's pads, caps, and properties) is the third one to name. why x over y gstreamer vs ffmpeg (the cli/lib)? ffmpeg is a swiss-army transcoder — unbeatable for \"convert/clip this file\" and great as a decode library. gstreamer is a pipeline framework for live, branching, multi-stream, plugin-extensible apps with fine threading control. koireader wants live multi-stream graphs with inference inside → gstreamer (and deepstream is built on it). many shops use ffmpeg for ingest/clip and gstreamer for the live serving graph. why use queue elements at all? without them the whole pipeline is one thread: a slow decoder stalls the source. queue puts a thread boundary + bounded buffer between stages so they run concurrently and you control drop policy. how do you detect a camera went down? watch the bus for error / eos , and/or run a watchdog on frame timestamps. on failure, tear the pipeline to null and rebuild (reconnect) — see fault tolerance . → next: appsink-and-python.md","words":1359},{"path":"02-gstreamer/appsink-and-python.md","title":"appsink & Python","section":"2 · GStreamer","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"getting-frames-into-python-appsink\">Getting Frames into Python: appsink<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <code>appsink<\/code> is the element that hands buffers <em>out of<\/em> the pipeline into your Python code; <code>appsrc<\/code> pushes frames <em>in<\/em>. The trick is to pull frames without copying more than necessary and without letting the buffer grow. Configure <code>appsink<\/code> with <code>max-buffers=1 drop=true<\/code> and you have a \"latest frame only\" tap.<\/div><\/div>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 160\" role=\"img\" aria-label=\"appsink is the pipeline's exit into Python — a 'latest frame only' tap\"><rect class=\"dg-box\" x=\"12\" y=\"60\" width=\"150\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"87\" y=\"94\" text-anchor=\"middle\">… decode ! convert<\/text><line class=\"dg-line\" x1=\"162\" y1=\"89\" x2=\"217\" y2=\"89\"/><polygon class=\"dg-arrow\" points=\"217,84 224,89 217,94\"/><rect class=\"dg-box dg-hot\" x=\"224\" y=\"60\" width=\"160\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"304\" y=\"84\" text-anchor=\"middle\">appsink<\/text><text class=\"dg-sub\" x=\"304\" y=\"103\" text-anchor=\"middle\">max-buffers=1 drop=true<\/text><text class=\"dg-accent-tx\" x=\"446\" y=\"82\" text-anchor=\"middle\">numpy<\/text><line class=\"dg-line\" x1=\"384\" y1=\"89\" x2=\"501\" y2=\"89\"/><polygon class=\"dg-arrow\" points=\"501,84 508,89 501,94\"/><rect class=\"dg-box\" x=\"508\" y=\"60\" width=\"150\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"583\" y=\"87\" text-anchor=\"middle\">your model<\/text><text class=\"dg-sub\" x=\"583\" y=\"104\" text-anchor=\"middle\">infer<\/text><text class=\"dg-sub\" x=\"304\" y=\"142\" text-anchor=\"middle\">drops stale frames under load → bounded memory, minimal lag<\/text><\/svg><figcaption>appsink is the pipeline's exit into Python — a \"latest frame only\" tap<\/figcaption><\/figure>\n<h2 id=\"two-ways-to-consume\">Two ways to consume<\/h2>\n<p><strong>A) Via OpenCV (quick):<\/strong><\/p>\n<pre><code class=\"language-python\">pipeline = (\n    <span class=\"tok-string\">\"rtspsrc location=rtsp://cam latency=100 protocols=tcp ! \"<\/span>\n    <span class=\"tok-string\">\"rtph264depay ! h264parse ! nvv4l2decoder ! \"<\/span>\n    <span class=\"tok-string\">\"nvvidconv ! video/x-raw,format=BGRx ! videoconvert ! \"<\/span>\n    <span class=\"tok-string\">\"video/x-raw,format=BGR ! appsink drop=1 max-buffers=1 sync=false\"<\/span>\n)\ncap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(pipeline, <span class=\"tok-builtin\">cv2<\/span>.CAP_GSTREAMER)\n<span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n    ok, frame = cap.read()   <span class=\"tok-comment\"># frame is a BGR numpy array<\/span>\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:\n        <span class=\"tok-keyword\">break<\/span>                <span class=\"tok-comment\"># → trigger reconnect logic<\/span><\/code><\/pre>\n<p><strong>B) Via GObject/Gst directly (full control):<\/strong><\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">gi<\/span>; <span class=\"tok-builtin\">gi<\/span>.require_version(<span class=\"tok-string\">\"Gst\"<\/span>, <span class=\"tok-string\">\"1.0\"<\/span>)\n<span class=\"tok-keyword\">from<\/span> <span class=\"tok-builtin\">gi<\/span>.repository <span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">Gst<\/span>\n<span class=\"tok-builtin\">Gst<\/span>.init(<span class=\"tok-keyword\">None<\/span>)\n\nappsink = pipeline.get_by_name(<span class=\"tok-string\">\"sink\"<\/span>)\nappsink.set_property(<span class=\"tok-string\">\"emit-signals\"<\/span>, <span class=\"tok-keyword\">True<\/span>)\nappsink.set_property(<span class=\"tok-string\">\"max-buffers\"<\/span>, <span class=\"tok-number\">1<\/span>)\nappsink.set_property(<span class=\"tok-string\">\"drop\"<\/span>, <span class=\"tok-keyword\">True<\/span>)\n\n<span class=\"tok-keyword\">def<\/span> on_new_sample(sink):\n    sample = sink.emit(<span class=\"tok-string\">\"pull-sample\"<\/span>)\n    buf = sample.get_buffer()\n    caps = sample.get_caps()\n    ok, mapinfo = buf.<span class=\"tok-builtin\">map<\/span>(<span class=\"tok-builtin\">Gst<\/span>.MapFlags.READ)\n    <span class=\"tok-keyword\">try<\/span>:\n        frame = <span class=\"tok-builtin\">np<\/span>.ndarray(\n            (height, width, <span class=\"tok-number\">3<\/span>), buffer=mapinfo.data, dtype=<span class=\"tok-builtin\">np<\/span>.uint8\n        )\n        handle(frame.copy())   <span class=\"tok-comment\"># copy if you keep it past this callback<\/span>\n    <span class=\"tok-keyword\">finally<\/span>:\n        buf.unmap(mapinfo)     <span class=\"tok-comment\"># ALWAYS unmap — else you leak buffers<\/span>\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">Gst<\/span>.FlowReturn.OK\n\nappsink.connect(<span class=\"tok-string\">\"new-sample\"<\/span>, on_new_sample)<\/code><\/pre>\n<p>The <code>buf.unmap()<\/code> in a <code>finally<\/code> is the kind of detail that separates \"used it once\" from \"ran it in production.\" Forgetting it is a textbook leak.<\/p>\n<h2 id=\"syncfalse-the-latency-knob\">sync=false (the latency knob)<\/h2>\n<p>By default a sink waits for each buffer's presentation time (<code>sync=true<\/code>) to play at real-time speed. For inference you usually want frames <strong>as fast as available<\/strong> → <code>sync=false<\/code>. Combined with <code>drop=true max-buffers=1<\/code>, you always process the newest frame with minimal lag.<\/p>\n<h2 id=\"the-glib-main-loop-the-part-tutorials-skip\">The GLib main loop (the part tutorials skip)<\/h2>\n<p>The signal-based appsink (<code>emit-signals=True<\/code>, <code>new-sample<\/code>) only fires while a <strong>GLib main loop<\/strong> is running — that's the event loop that dispatches GStreamer callbacks and bus messages. A real app structure:<\/p>\n<pre><code class=\"language-python\">loop = <span class=\"tok-builtin\">GLib<\/span>.MainLoop()\nbus = pipeline.get_bus()\nbus.add_signal_watch()\nbus.connect(<span class=\"tok-string\">\"message\"<\/span>, on_bus_message, loop)   <span class=\"tok-comment\"># handle ERROR/EOS → loop.quit()<\/span>\npipeline.set_state(<span class=\"tok-builtin\">Gst<\/span>.State.PLAYING)\n<span class=\"tok-keyword\">try<\/span>:\n    loop.run()                                  <span class=\"tok-comment\"># blocks; callbacks fire here<\/span>\n<span class=\"tok-keyword\">finally<\/span>:\n    pipeline.set_state(<span class=\"tok-builtin\">Gst<\/span>.State.NULL)          <span class=\"tok-comment\"># ALWAYS tear down to free NVDEC/GPU<\/span><\/code><\/pre>\n<p>Two things interviewers probe: (1) the main loop runs on its own thread so your inference can run elsewhere, and (2) you <strong>must<\/strong> set state to NULL on exit or you leak the hardware decoder session — on Jetson that means the next run fails to open NVDEC.<\/p>\n<h2 id=\"zero-copy-and-nvmm-memory-the-senior-level-detail\">Zero-copy and NVMM memory (the senior-level detail)<\/h2>\n<p>On Jetson/dGPU the decoder (<code>nvv4l2decoder<\/code>) outputs <strong>NVMM<\/strong> buffers — memory that lives on the GPU. Pull those straight to <code>appsink<\/code> and the numpy <code>frame<\/code> you get is <strong>already a CPU copy<\/strong> the moment you map it, because numpy/OpenCV are CPU. The expensive mistake is bouncing GPU→CPU→GPU around inference.<\/p>\n<p>Two ways to stay fast:<\/p>\n<ul><li><strong>Keep it on the GPU<\/strong>: do conversion/scaling with <code>nvvideoconvert<\/code> and run<\/li><\/ul>\n<p>inference (TensorRT/DeepStream) on the NVMM buffer — never pull pixels to Python   at all; read <em>metadata<\/em> via a pad probe instead (<a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a>).<\/p>\n<ul><li><strong>If you must touch pixels in Python<\/strong>, map once, <code>.copy()<\/code> once, and push the<\/li><\/ul>\n<p>result back through a single <code>appsrc<\/code> — don't ping-pong.<\/p>\n<blockquote><p>One-liner for the interview: <em>\"appsink is a CPU exit. If the work can stay on the GPU, I keep buffers in NVMM and read DeepStream metadata in a probe rather than pulling frames to numpy — that's the zero-copy path. I only use appsink when I genuinely need pixels in Python.\"<\/em><\/p><\/blockquote>\n<h2 id=\"appsrc-pushing-frames-back-in\">appsrc (pushing frames back in)<\/h2>\n<p>When you've annotated a frame and want to encode/stream it out, push it into an <code>appsrc<\/code> feeding <code>nvv4l2h264enc ! rtspclientsink<\/code>/<code>webrtcbin<\/code>. You must set caps and timestamps (PTS) correctly or downstream stalls or runs at the wrong speed.<\/p>\n<pre><code class=\"language-python\">appsrc.set_property(<span class=\"tok-string\">\"format\"<\/span>, <span class=\"tok-builtin\">Gst<\/span>.Format.TIME)       <span class=\"tok-comment\"># timestamps are in nanoseconds<\/span>\nappsrc.set_property(<span class=\"tok-string\">\"is-live\"<\/span>, <span class=\"tok-keyword\">True<\/span>)                 <span class=\"tok-comment\"># live source semantics<\/span>\nappsrc.set_property(<span class=\"tok-string\">\"do-timestamp\"<\/span>, <span class=\"tok-keyword\">True<\/span>)            <span class=\"tok-comment\"># let it stamp arrival time<\/span>\ncaps = <span class=\"tok-builtin\">Gst<\/span>.Caps.from_string(<span class=\"tok-string\">\"video/x-raw,format=BGR,width=1920,height=1080,framerate=30/1\"<\/span>)\nappsrc.set_property(<span class=\"tok-string\">\"caps\"<\/span>, caps)\n\nbuf = <span class=\"tok-builtin\">Gst<\/span>.Buffer.new_wrapped(frame.tobytes())\nbuf.pts = frame_index * <span class=\"tok-builtin\">Gst<\/span>.SECOND // <span class=\"tok-number\">30<\/span>             <span class=\"tok-comment\"># explicit PTS if not auto<\/span>\nbuf.duration = <span class=\"tok-builtin\">Gst<\/span>.SECOND // <span class=\"tok-number\">30<\/span>\nappsrc.emit(<span class=\"tok-string\">\"push-buffer\"<\/span>, buf)<\/code><\/pre>\n<p>Get PTS wrong and the downstream encoder either stalls (waiting for \"future\" timestamps) or sprints (timestamps in the past). Honoring <strong><code>need-data<\/code>/<code>enough-data<\/code><\/strong> signals from appsrc is how you respect downstream backpressure instead of overrunning the encoder.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>appsink vs cv2.VideoCapture?<\/strong> <code>VideoCapture<\/code> <em>uses<\/em> an appsink internally but hides it. Direct appsink gives you the callback, GPU buffer access, explicit unmap, and zero-copy options. Prototype with VideoCapture; use direct appsink when you need control or zero-copy.<\/p>\n<p><strong>Why <code>.copy()<\/code> the numpy frame in the callback?<\/strong> The numpy array points into GStreamer's mapped buffer memory. Once you <code>unmap<\/code>/ return, that memory is recycled — keeping the array without copying = corruption. Copy if the frame outlives the callback (e.g., goes into a queue).<\/p>\n<p><strong>Why <code>max-buffers=1 drop=true<\/code>?<\/strong> It makes appsink a \"latest frame\" tap: if your consumer lags, GStreamer drops stale frames instead of queuing them → bounded memory, minimal latency. This is the backpressure policy from section 01 expressed in one line.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"two-ways-to-consume","text":"Two ways to consume"},{"level":2,"id":"syncfalse-the-latency-knob","text":"sync=false (the latency knob)"},{"level":2,"id":"the-glib-main-loop-the-part-tutorials-skip","text":"The GLib main loop (the part tutorials skip)"},{"level":2,"id":"zero-copy-and-nvmm-memory-the-senior-level-detail","text":"Zero-copy and NVMM memory (the senior-level detail)"},{"level":2,"id":"appsrc-pushing-frames-back-in","text":"appsrc (pushing frames back in)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"getting frames into python: appsink 💡 tl;dr appsink is the element that hands buffers out of the pipeline into your python code; appsrc pushes frames in . the trick is to pull frames without copying more than necessary and without letting the buffer grow. configure appsink with max-buffers=1 drop=true and you have a \"latest frame only\" tap. … decode ! convert appsink max-buffers=1 drop=true numpy your model infer drops stale frames under load → bounded memory, minimal lag appsink is the pipeline's exit into python — a \"latest frame only\" tap two ways to consume a) via opencv (quick): pipeline = ( \"rtspsrc location=rtsp://cam latency=100 protocols=tcp ! \" \"rtph264depay ! h264parse ! nvv4l2decoder ! \" \"nvvidconv ! video/x-raw,format=bgrx ! videoconvert ! \" \"video/x-raw,format=bgr ! appsink drop=1 max-buffers=1 sync=false\" ) cap = cv2 .videocapture(pipeline, cv2 .cap_gstreamer) while true : ok, frame = cap.read() # frame is a bgr numpy array if not ok: break # → trigger reconnect logic b) via gobject/gst directly (full control): import gi ; gi .require_version( \"gst\" , \"1.0\" ) from gi .repository import gst gst .init( none ) appsink = pipeline.get_by_name( \"sink\" ) appsink.set_property( \"emit-signals\" , true ) appsink.set_property( \"max-buffers\" , 1 ) appsink.set_property( \"drop\" , true ) def on_new_sample(sink): sample = sink.emit( \"pull-sample\" ) buf = sample.get_buffer() caps = sample.get_caps() ok, mapinfo = buf. map ( gst .mapflags.read) try : frame = np .ndarray( (height, width, 3 ), buffer=mapinfo.data, dtype= np .uint8 ) handle(frame.copy()) # copy if you keep it past this callback finally : buf.unmap(mapinfo) # always unmap — else you leak buffers return gst .flowreturn.ok appsink.connect( \"new-sample\" , on_new_sample) the buf.unmap() in a finally is the kind of detail that separates \"used it once\" from \"ran it in production.\" forgetting it is a textbook leak. sync=false (the latency knob) by default a sink waits for each buffer's presentation time ( sync=true ) to play at real-time speed. for inference you usually want frames as fast as available → sync=false . combined with drop=true max-buffers=1 , you always process the newest frame with minimal lag. the glib main loop (the part tutorials skip) the signal-based appsink ( emit-signals=true , new-sample ) only fires while a glib main loop is running — that's the event loop that dispatches gstreamer callbacks and bus messages. a real app structure: loop = glib .mainloop() bus = pipeline.get_bus() bus.add_signal_watch() bus.connect( \"message\" , on_bus_message, loop) # handle error/eos → loop.quit() pipeline.set_state( gst .state.playing) try : loop.run() # blocks; callbacks fire here finally : pipeline.set_state( gst .state.null) # always tear down to free nvdec/gpu two things interviewers probe: (1) the main loop runs on its own thread so your inference can run elsewhere, and (2) you must set state to null on exit or you leak the hardware decoder session — on jetson that means the next run fails to open nvdec. zero-copy and nvmm memory (the senior-level detail) on jetson/dgpu the decoder ( nvv4l2decoder ) outputs nvmm buffers — memory that lives on the gpu. pull those straight to appsink and the numpy frame you get is already a cpu copy the moment you map it, because numpy/opencv are cpu. the expensive mistake is bouncing gpu→cpu→gpu around inference. two ways to stay fast: keep it on the gpu : do conversion/scaling with nvvideoconvert and run inference (tensorrt/deepstream) on the nvmm buffer — never pull pixels to python at all; read metadata via a pad probe instead ( deepstream.md ). if you must touch pixels in python , map once, .copy() once, and push the result back through a single appsrc — don't ping-pong. one-liner for the interview: \"appsink is a cpu exit. if the work can stay on the gpu, i keep buffers in nvmm and read deepstream metadata in a probe rather than pulling frames to numpy — that's the zero-copy path. i only use appsink when i genuinely need pixels in python.\" appsrc (pushing frames back in) when you've annotated a frame and want to encode/stream it out, push it into an appsrc feeding nvv4l2h264enc ! rtspclientsink / webrtcbin . you must set caps and timestamps (pts) correctly or downstream stalls or runs at the wrong speed. appsrc.set_property( \"format\" , gst .format.time) # timestamps are in nanoseconds appsrc.set_property( \"is-live\" , true ) # live source semantics appsrc.set_property( \"do-timestamp\" , true ) # let it stamp arrival time caps = gst .caps.from_string( \"video/x-raw,format=bgr,width=1920,height=1080,framerate=30/1\" ) appsrc.set_property( \"caps\" , caps) buf = gst .buffer.new_wrapped(frame.tobytes()) buf.pts = frame_index * gst .second // 30 # explicit pts if not auto buf.duration = gst .second // 30 appsrc.emit( \"push-buffer\" , buf) get pts wrong and the downstream encoder either stalls (waiting for \"future\" timestamps) or sprints (timestamps in the past). honoring need-data / enough-data signals from appsrc is how you respect downstream backpressure instead of overrunning the encoder. why x over y appsink vs cv2.videocapture? videocapture uses an appsink internally but hides it. direct appsink gives you the callback, gpu buffer access, explicit unmap, and zero-copy options. prototype with videocapture; use direct appsink when you need control or zero-copy. why .copy() the numpy frame in the callback? the numpy array points into gstreamer's mapped buffer memory. once you unmap / return, that memory is recycled — keeping the array without copying = corruption. copy if the frame outlives the callback (e.g., goes into a queue). why max-buffers=1 drop=true ? it makes appsink a \"latest frame\" tap: if your consumer lags, gstreamer drops stale frames instead of queuing them → bounded memory, minimal latency. this is the backpressure policy from section 01 expressed in one line. → next: deepstream.md","words":924},{"path":"02-gstreamer/deepstream.md","title":"DeepStream","section":"2 · GStreamer","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"deepstream-inference-inside-the-pipeline\">DeepStream: Inference Inside the Pipeline<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"DeepStream batches many streams into one inference\"><rect class=\"dg-box\" x=\"20\" y=\"30\" width=\"130\" height=\"34\" rx=\"12\"/><text class=\"dg-label\" x=\"85\" y=\"52\" text-anchor=\"middle\">cam 1<\/text><line class=\"dg-line\" x1=\"150\" y1=\"47\" x2=\"203\" y2=\"47\"/><polygon class=\"dg-arrow\" points=\"203,42 210,47 203,52\"/><rect class=\"dg-box\" x=\"20\" y=\"74\" width=\"130\" height=\"34\" rx=\"12\"/><text class=\"dg-label\" x=\"85\" y=\"96\" text-anchor=\"middle\">cam 2<\/text><line class=\"dg-line\" x1=\"150\" y1=\"91\" x2=\"203\" y2=\"91\"/><polygon class=\"dg-arrow\" points=\"203,86 210,91 203,96\"/><rect class=\"dg-box\" x=\"20\" y=\"118\" width=\"130\" height=\"34\" rx=\"12\"/><text class=\"dg-label\" x=\"85\" y=\"140\" text-anchor=\"middle\">cam 3<\/text><line class=\"dg-line\" x1=\"150\" y1=\"135\" x2=\"203\" y2=\"135\"/><polygon class=\"dg-arrow\" points=\"203,130 210,135 203,140\"/><rect class=\"dg-box dg-hot\" x=\"210\" y=\"40\" width=\"110\" height=\"80\" rx=\"12\"/><text class=\"dg-label\" x=\"265\" y=\"78\" text-anchor=\"middle\">nvstreammux<\/text><text class=\"dg-sub\" x=\"265\" y=\"95\" text-anchor=\"middle\">batch=N<\/text><line class=\"dg-line\" x1=\"320\" y1=\"80\" x2=\"373\" y2=\"80\"/><polygon class=\"dg-arrow\" points=\"373,75 380,80 373,85\"/><rect class=\"dg-box\" x=\"380\" y=\"40\" width=\"120\" height=\"80\" rx=\"12\"/><text class=\"dg-label\" x=\"440\" y=\"78\" text-anchor=\"middle\">nvinfer<\/text><text class=\"dg-sub\" x=\"440\" y=\"95\" text-anchor=\"middle\">1 TRT call<\/text><line class=\"dg-line\" x1=\"500\" y1=\"80\" x2=\"553\" y2=\"80\"/><polygon class=\"dg-arrow\" points=\"553,75 560,80 553,85\"/><rect class=\"dg-box\" x=\"560\" y=\"40\" width=\"140\" height=\"80\" rx=\"12\"/><text class=\"dg-label\" x=\"630\" y=\"78\" text-anchor=\"middle\">tracker<\/text><text class=\"dg-sub\" x=\"630\" y=\"95\" text-anchor=\"middle\">+ IDs<\/text><text class=\"dg-sub\" x=\"360\" y=\"142\" text-anchor=\"middle\">many cameras → ONE inference call = the multi-stream scaling trick<\/text><\/svg><figcaption>DeepStream batches many streams into one inference<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> DeepStream is NVIDIA's set of GStreamer plugins that put inference, tracking, and analytics <em>inside<\/em> the video pipeline, keeping frames on the GPU end to end. Its superpower is <code>nvstreammux<\/code>: it <strong>batches many camera streams into one inference call<\/strong>, which is how you serve dozens of cameras on one GPU. You've shipped this on Jetson Nano — own it.<\/div><\/div>\n<h2 id=\"the-canonical-deepstream-pipeline\">The canonical DeepStream pipeline<\/h2>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 175\" role=\"img\" aria-label=\"The canonical DeepStream pipeline — N cameras batched into one inference call\"><rect class=\"dg-box\" x=\"12\" y=\"34\" width=\"92\" height=\"32\" rx=\"8\"/><text class=\"dg-sub\" x=\"58\" y=\"54\" text-anchor=\"middle\">cam 1<\/text><line class=\"dg-line\" x1=\"104\" y1=\"50\" x2=\"143\" y2=\"50\"/><polygon class=\"dg-arrow\" points=\"143,45 150,50 143,55\"/><rect class=\"dg-box\" x=\"12\" y=\"76\" width=\"92\" height=\"32\" rx=\"8\"/><text class=\"dg-sub\" x=\"58\" y=\"96\" text-anchor=\"middle\">cam 2<\/text><line class=\"dg-line\" x1=\"104\" y1=\"92\" x2=\"143\" y2=\"92\"/><polygon class=\"dg-arrow\" points=\"143,87 150,92 143,97\"/><rect class=\"dg-box\" x=\"12\" y=\"118\" width=\"92\" height=\"32\" rx=\"8\"/><text class=\"dg-sub\" x=\"58\" y=\"138\" text-anchor=\"middle\">cam 3<\/text><line class=\"dg-line\" x1=\"104\" y1=\"134\" x2=\"143\" y2=\"134\"/><polygon class=\"dg-arrow\" points=\"143,129 150,134 143,139\"/><rect class=\"dg-box dg-hot\" x=\"150\" y=\"44\" width=\"96\" height=\"84\" rx=\"12\"/><text class=\"dg-label\" x=\"198\" y=\"80\" text-anchor=\"middle\">stream<\/text><text class=\"dg-label\" x=\"198\" y=\"98\" text-anchor=\"middle\">mux<\/text><text class=\"dg-sub\" x=\"198\" y=\"118\" text-anchor=\"middle\">batch=N<\/text><line class=\"dg-line\" x1=\"246\" y1=\"86\" x2=\"249\" y2=\"86\"/><polygon class=\"dg-arrow\" points=\"249,81 256,86 249,91\"/><rect class=\"dg-box\" x=\"256\" y=\"56\" width=\"92\" height=\"60\" rx=\"11\"/><text class=\"dg-label\" x=\"302\" y=\"82\" text-anchor=\"middle\">nvinfer<\/text><text class=\"dg-sub\" x=\"302\" y=\"100\" text-anchor=\"middle\">TRT<\/text><line class=\"dg-line\" x1=\"350\" y1=\"86\" x2=\"353\" y2=\"86\"/><polygon class=\"dg-arrow\" points=\"353,81 360,86 353,91\"/><rect class=\"dg-box\" x=\"360\" y=\"56\" width=\"92\" height=\"60\" rx=\"11\"/><text class=\"dg-label\" x=\"406\" y=\"82\" text-anchor=\"middle\">nvtracker<\/text><text class=\"dg-sub\" x=\"406\" y=\"100\" text-anchor=\"middle\">+ IDs<\/text><line class=\"dg-line\" x1=\"454\" y1=\"86\" x2=\"457\" y2=\"86\"/><polygon class=\"dg-arrow\" points=\"457,81 464,86 457,91\"/><rect class=\"dg-box\" x=\"464\" y=\"56\" width=\"92\" height=\"60\" rx=\"11\"/><text class=\"dg-label\" x=\"510\" y=\"82\" text-anchor=\"middle\">nvdsosd<\/text><text class=\"dg-sub\" x=\"510\" y=\"100\" text-anchor=\"middle\">overlay<\/text><line class=\"dg-line\" x1=\"556\" y1=\"86\" x2=\"559\" y2=\"86\"/><polygon class=\"dg-arrow\" points=\"559,81 566,86 559,91\"/><rect class=\"dg-box\" x=\"566\" y=\"56\" width=\"140\" height=\"60\" rx=\"11\"/><text class=\"dg-label\" x=\"636\" y=\"82\" text-anchor=\"middle\">encode →<\/text><text class=\"dg-sub\" x=\"636\" y=\"100\" text-anchor=\"middle\">RTSP / WebRTC out<\/text><text class=\"dg-sub\" x=\"360\" y=\"160\" text-anchor=\"middle\">many cameras batched into ONE inference call = the multi-stream scaling trick<\/text><\/svg><figcaption>The canonical DeepStream pipeline — N cameras batched into one inference call<\/figcaption><\/figure>\n<p>Key plugins:<\/p>\n<ul><li><strong><code>nvstreammux<\/code><\/strong> — batches frames from N sources into a single batched buffer.<\/li><\/ul>\n<p><em>This is the scaling trick:<\/em> one <code>nvinfer<\/code> call processes all cameras together,   amortizing GPU launch overhead. Set <code>batch-size = number of streams<\/code>.<\/p>\n<ul><li><strong><code>nvinfer<\/code><\/strong> — runs a <strong>TensorRT<\/strong> engine. Configured via a text file<\/li><\/ul>\n<p>(<code>config_infer.txt<\/code>) pointing at the model, precision (INT8/FP16), and   pre/post-processing. Operates as <strong>primary<\/strong> (detector) or <strong>secondary<\/strong>   (classifier on detected crops).<\/p>\n<ul><li><strong><code>nvtracker<\/code><\/strong> — multi-object tracking (NvDCF, KLT, or DeepSORT-style),<\/li><\/ul>\n<p>assigning persistent IDs across frames. Critical for counting/dwell-time.<\/p>\n<ul><li><strong><code>nvdsosd<\/code><\/strong> — on-screen display: draws boxes/labels on GPU.<\/li><li><strong><code>nvvideoconvert<\/code><\/strong> — GPU color/format conversion + scaling.<\/li><li><strong>Metadata (<code>NvDsBatchMeta<\/code>)<\/strong> — detections travel <em>alongside<\/em> frames as<\/li><\/ul>\n<p>structured metadata you read in a <code>pad probe<\/code> (Python via pyds) to push results   to a DB/analytics — no full-frame copy needed.<\/p>\n<h2 id=\"nvstreammux-the-knobs-that-actually-matter\">nvstreammux: the knobs that actually matter<\/h2>\n<p><code>nvstreammux<\/code> is the heart of multi-stream, and its config is a frequent follow-up question:<\/p>\n<ul><li><strong><code>batch-size<\/code><\/strong> — how many frames per batched buffer. Rule of thumb: **set it to<\/li><\/ul>\n<p>the number of streams** (or a multiple). This must match <code>nvinfer<\/code>'s batch-size or   you under/over-fill the GPU.<\/p>\n<ul><li><strong><code>batched-push-timeout<\/code><\/strong> — the max microseconds the mux waits to fill a batch<\/li><\/ul>\n<p>before pushing what it has. <strong>This is a latency-vs-efficiency dial<\/strong>: too long and   a slow/dead camera holds up everyone; set it to roughly one frame interval   (~33000 µs at 30fps) so a missing stream can't stall the batch.<\/p>\n<ul><li><strong><code>width<\/code>/<code>height<\/code><\/strong> — the mux scales every input to a common resolution before<\/li><\/ul>\n<p>batching (the model's input size). Mismatch here silently wrecks aspect ratio /   accuracy.<\/p>\n<ul><li><strong><code>live-source=1<\/code><\/strong> — tells the mux the inputs are live (camera) so it times<\/li><\/ul>\n<p>correctly.<\/p>\n<blockquote><p>Interview gold: <em>\"The dangerous default is an unbounded batch wait — one dead RTSP camera can stall the whole batched pipeline. I cap <code>batched-push-timeout<\/code> to ~a frame interval so the batch flushes with N-1 streams and the dead one gets reconnected independently.\"<\/em> This ties multi-stream batching to <a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">fault tolerance<\/a>.<\/p><\/blockquote>\n<h2 id=\"nvinfer-config-whats-in-that-text-file\">nvinfer config: what's in that text file<\/h2>\n<p><code>nvinfer<\/code> is configured by a <code>config_infer.txt<\/code> of key groups, not code. The ones to be able to name:<\/p>\n<ul><li><strong><code>[property]<\/code><\/strong> — <code>model-engine-file<\/code> (the built TensorRT engine),<\/li><\/ul>\n<p><code>onnx-file<\/code>/<code>model-file<\/code> (source to build from), <code>network-mode<\/code> (0=FP32, 1=INT8,   2=FP16), <code>batch-size<\/code>, <code>num-detected-classes<\/code>.<\/p>\n<ul><li><strong><code>gie-unique-id<\/code><\/strong> — the inference instance's ID, so metadata is tagged with<\/li><\/ul>\n<p><em>which<\/em> model produced it (matters when chaining primary + secondary).<\/p>\n<ul><li><strong><code>process-mode<\/code><\/strong> — 1=primary (whole frame), 2=secondary (on crops from upstream).<\/li><li><strong><code>interval<\/code><\/strong> — <strong>skip inference on N frames between runs<\/strong> (e.g. infer every 3rd<\/li><\/ul>\n<p>frame, track in between). A cheap, big latency/throughput lever when objects don't   move much frame-to-frame.<\/p>\n<ul><li><strong><code>operate-on-gie-id<\/code> / <code>operate-on-class-ids<\/code><\/strong> — a secondary GIE saying \"only<\/li><\/ul>\n<p>run me on <em>vehicles<\/em> detected by primary GIE 1.\" This is how cascades stay cheap.<\/p>\n<p>First run builds the <code>.engine<\/code> from ONNX (slow, minutes); subsequent runs load the cached engine. <strong>Build on the target hardware<\/strong> (TensorRT tunes per GPU arch) — same point as section 03.<\/p>\n<h2 id=\"the-metadata-hierarchy-read-this-in-a-probe\">The metadata hierarchy (read this in a probe)<\/h2>\n<p>Detections don't come back as pixels — they're a nested C structure you walk via <code>pyds<\/code>:<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 236\" role=\"img\" aria-label=\"The metadata nests batch → frame → object → classifier; you walk it in a probe\"><rect class=\"dg-box\" x=\"40\" y=\"18\" width=\"560\" height=\"200\" rx=\"11\"/><text class=\"dg-label\" x=\"56\" y=\"40\">NvDsBatchMeta<\/text><text class=\"dg-sub\" x=\"56\" y=\"58\">the whole batch<\/text><rect class=\"dg-box\" x=\"72\" y=\"56\" width=\"496\" height=\"150\" rx=\"11\"/><text class=\"dg-label\" x=\"88\" y=\"78\">NvDsFrameMeta<\/text><text class=\"dg-sub\" x=\"88\" y=\"96\">one frame · source_id, frame_num<\/text><rect class=\"dg-box dg-hot\" x=\"104\" y=\"94\" width=\"432\" height=\"100\" rx=\"11\"/><text class=\"dg-label\" x=\"120\" y=\"116\">NvDsObjectMeta<\/text><text class=\"dg-sub\" x=\"120\" y=\"134\">one detection · bbox, class, conf, track id<\/text><rect class=\"dg-box\" x=\"136\" y=\"132\" width=\"368\" height=\"48\" rx=\"11\"/><text class=\"dg-label\" x=\"152\" y=\"154\">NvDsClassifierMeta<\/text><text class=\"dg-sub\" x=\"152\" y=\"172\">secondary-GIE labels on that object<\/text><text class=\"dg-sub\" x=\"360\" y=\"230\" text-anchor=\"middle\">walk this in a pad probe — read metadata, never copy the pixels<\/text><\/svg><figcaption>The metadata nests batch → frame → object → classifier; you walk it in a probe<\/figcaption><\/figure>\n<p>You attach a <strong>pad probe<\/strong> (from <a class=\"mdlink\" data-href=\"pipeline-model.md\" href=\"#\">pipeline-model.md<\/a>) on <code>nvdsosd<\/code>'s sink or <code>nvinfer<\/code>'s src, walk <code>frame_meta_list → obj_meta_list<\/code>, and push results out — <strong>no frame copy<\/strong>. <code>source_id<\/code> is what tells you <em>which camera<\/em> a detection came from inside the batched buffer.<\/p>\n<h2 id=\"getting-results-out-msgbroker-kafka\">Getting results OUT: msgbroker → Kafka<\/h2>\n<p>For analytics you rarely draw boxes — you emit events. DeepStream's <strong><code>nvmsgconv<\/code><\/strong> turns metadata into a schema (JSON) and <strong><code>nvmsgbroker<\/code><\/strong> ships it to <strong>Kafka / MQTT / AMQP / Azure IoT<\/strong>. That's the \"detections → message bus → DB / dashboard\" path, and it connects straight to your Kafka/Celery background — worth volunteering: <em>\"DeepStream metadata out via nvmsgbroker to Kafka, consumed by the analytics service — same decoupled pattern as my data-platform work.\"<\/em><\/p>\n<h2 id=\"getting-video-out-tiler-osd-and-rtspwebrtc\">Getting video OUT: tiler, OSD, and RTSP/WebRTC<\/h2>\n<ul><li><strong><code>nvmultistreamtiler<\/code><\/strong> composites N streams into one MxN grid for a single<\/li><\/ul>\n<p>monitor view (one decode of operator attention, many cameras).<\/p>\n<ul><li><strong><code>nvdsosd<\/code><\/strong> burns boxes/labels onto the frame on the GPU.<\/li><li><strong>Out to the network<\/strong>: encode (<code>nvv4l2h264enc<\/code>) then an RTSP server<\/li><\/ul>\n<p>(<code>nvrtspoutsinkbin<\/code> / a GstRtspServer mount) or <code>webrtcbin<\/code> for the   sub-500ms browser path from <a class=\"mdlink\" data-href=\"../01-video-streaming/protocols-rtsp-webrtc.md\" href=\"#\">section 01<\/a>.   This closes the <strong>RTSP in → infer → WebRTC out<\/strong> loop.<\/p>\n<h2 id=\"jetson-vs-dgpu-youve-shipped-jetson-own-the-nuance\">Jetson vs dGPU (you've shipped Jetson: own the nuance)<\/h2>\n<p>On <strong>Jetson<\/strong> (Nano/Orin) CPU and GPU share physical memory, so NVMM transfers are near-free, but you're compute/power constrained — INT8 + frame <code>interval<\/code> skipping matter more. On <strong>dGPU<\/strong> (datacenter) memory is separate, so avoiding host↔device copies is the bigger win. The plugin names differ slightly by version (<code>nvv4l2decoder<\/code> vs <code>nvdec<\/code>); naming that you've hit version-specific plugin differences across DeepStream 5/6/7 reads as real field experience.<\/p>\n<h2 id=\"why-batching-matters-the-number-that-impresses\">Why batching matters (the number that impresses)<\/h2>\n<p>A GPU launching inference per-frame, per-camera wastes most of its time on overhead. Batching N frames into one call can lift throughput several-fold for the same latency budget — the difference between 4 cameras and 40 on one box. Tie this to your TensorRT/INT8 experience: <em>\"batch at the mux, run an INT8 TRT engine, keep buffers in NVMM (GPU) memory — that's the multi-stream low-latency recipe.\"<\/em><\/p>\n<h2 id=\"pad-probes-reading-results-in-python\">Pad probes (reading results in Python)<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> osd_sink_probe(pad, info, u_data):\n    batch_meta = <span class=\"tok-builtin\">pyds<\/span>.gst_buffer_get_nvds_batch_meta(<span class=\"tok-builtin\">hash<\/span>(info.get_buffer()))\n    l_frame = batch_meta.frame_meta_list\n    <span class=\"tok-keyword\">while<\/span> l_frame <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span>:\n        frame_meta = <span class=\"tok-builtin\">pyds<\/span>.NvDsFrameMeta.cast(l_frame.data)\n        <span class=\"tok-comment\"># iterate frame_meta.obj_meta_list → boxes, classes, track ids<\/span>\n        l_frame = l_frame.next\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">Gst<\/span>.PadProbeReturn.OK<\/code><\/pre>\n<p>You don't pull pixels to Python — you read <em>metadata<\/em>. That's the zero-copy philosophy in action.<\/p>\n<h2 id=\"deepstream-vs-rolling-your-own-gstreamer-appsink-pytorch\">DeepStream vs rolling your own (GStreamer + appsink + PyTorch)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>DeepStream<\/th><th>DIY appsink + framework<\/th><\/tr><\/thead><tbody><tr><td>Multi-stream batching<\/td><td>Built-in (<code>nvstreammux<\/code>)<\/td><td>You build it<\/td><\/tr><tr><td>Memory<\/td><td>Stays on GPU (NVMM)<\/td><td>Easy to accidentally copy to CPU<\/td><\/tr><tr><td>Flexibility<\/td><td>NVIDIA-opinionated, config-driven<\/td><td>Total freedom, more code<\/td><\/tr><tr><td>Best for<\/td><td>Many cameras, NVIDIA HW, standard detect/track<\/td><td>Custom logic, non-NVIDIA, research<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"triton-vs-nvinfer-within-deepstream\">Triton vs nvinfer (within DeepStream)<\/h2>\n<p><code>nvinfer<\/code> runs TensorRT engines in-process. <code>nvinferserver<\/code> offloads to a <strong>Triton Inference Server<\/strong> — useful when you want a model server shared across pipelines, multiple frameworks, or dynamic model management. (More in <a class=\"mdlink\" data-href=\"../03-low-latency-inference/triton.md\" href=\"#\">03-low-latency-inference<\/a>.)<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>DeepStream vs plain GStreamer + your own inference?<\/strong> DeepStream gives multi-stream batching, GPU-resident buffers, and tracking for free on NVIDIA HW — fastest path to many cameras. Roll your own when you need custom pipeline logic, non-NVIDIA hardware, or research flexibility. KoiReader is NVIDIA-heavy (\"latest NVIDIA Hardware\"), so DeepStream is a natural fit and a strong thing to volunteer.<\/p>\n<p><strong>Why batch at nvstreammux instead of per-camera inference?<\/strong> Per-camera inference pays GPU launch/overhead N times and underuses the GPU. Batching fills the GPU, amortizing overhead → higher throughput at the same latency. It's the single biggest multi-stream scaling lever.<\/p>\n<p><strong>Primary vs secondary nvinfer?<\/strong> Primary detects objects on full frames; secondary classifies the <em>crops<\/em> the primary found (e.g., detect vehicle → classify make/color). Chaining them is how DeepStream does cascaded inference efficiently on GPU.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../03-low-latency-inference/README.md\" href=\"#\">03-low-latency-inference/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-canonical-deepstream-pipeline","text":"The canonical DeepStream pipeline"},{"level":2,"id":"nvstreammux-the-knobs-that-actually-matter","text":"nvstreammux: the knobs that actually matter"},{"level":2,"id":"nvinfer-config-whats-in-that-text-file","text":"nvinfer config: what's in that text file"},{"level":2,"id":"the-metadata-hierarchy-read-this-in-a-probe","text":"The metadata hierarchy (read this in a probe)"},{"level":2,"id":"getting-results-out-msgbroker-kafka","text":"Getting results OUT: msgbroker → Kafka"},{"level":2,"id":"getting-video-out-tiler-osd-and-rtspwebrtc","text":"Getting video OUT: tiler, OSD, and RTSP/WebRTC"},{"level":2,"id":"jetson-vs-dgpu-youve-shipped-jetson-own-the-nuance","text":"Jetson vs dGPU (you've shipped Jetson: own the nuance)"},{"level":2,"id":"why-batching-matters-the-number-that-impresses","text":"Why batching matters (the number that impresses)"},{"level":2,"id":"pad-probes-reading-results-in-python","text":"Pad probes (reading results in Python)"},{"level":2,"id":"deepstream-vs-rolling-your-own-gstreamer-appsink-pytorch","text":"DeepStream vs rolling your own (GStreamer + appsink + PyTorch)"},{"level":2,"id":"triton-vs-nvinfer-within-deepstream","text":"Triton vs nvinfer (within DeepStream)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"deepstream: inference inside the pipeline cam 1 cam 2 cam 3 nvstreammux batch=n nvinfer 1 trt call tracker + ids many cameras → one inference call = the multi-stream scaling trick deepstream batches many streams into one inference 💡 tl;dr deepstream is nvidia's set of gstreamer plugins that put inference, tracking, and analytics inside the video pipeline, keeping frames on the gpu end to end. its superpower is nvstreammux : it batches many camera streams into one inference call , which is how you serve dozens of cameras on one gpu. you've shipped this on jetson nano — own it. the canonical deepstream pipeline cam 1 cam 2 cam 3 stream mux batch=n nvinfer trt nvtracker + ids nvdsosd overlay encode → rtsp / webrtc out many cameras batched into one inference call = the multi-stream scaling trick the canonical deepstream pipeline — n cameras batched into one inference call key plugins: nvstreammux — batches frames from n sources into a single batched buffer. this is the scaling trick: one nvinfer call processes all cameras together, amortizing gpu launch overhead. set batch-size = number of streams . nvinfer — runs a tensorrt engine. configured via a text file ( config_infer.txt ) pointing at the model, precision (int8/fp16), and pre/post-processing. operates as primary (detector) or secondary (classifier on detected crops). nvtracker — multi-object tracking (nvdcf, klt, or deepsort-style), assigning persistent ids across frames. critical for counting/dwell-time. nvdsosd — on-screen display: draws boxes/labels on gpu. nvvideoconvert — gpu color/format conversion + scaling. metadata ( nvdsbatchmeta ) — detections travel alongside frames as structured metadata you read in a pad probe (python via pyds) to push results to a db/analytics — no full-frame copy needed. nvstreammux: the knobs that actually matter nvstreammux is the heart of multi-stream, and its config is a frequent follow-up question: batch-size — how many frames per batched buffer. rule of thumb: **set it to the number of streams** (or a multiple). this must match nvinfer 's batch-size or you under/over-fill the gpu. batched-push-timeout — the max microseconds the mux waits to fill a batch before pushing what it has. this is a latency-vs-efficiency dial : too long and a slow/dead camera holds up everyone; set it to roughly one frame interval (~33000 µs at 30fps) so a missing stream can't stall the batch. width / height — the mux scales every input to a common resolution before batching (the model's input size). mismatch here silently wrecks aspect ratio / accuracy. live-source=1 — tells the mux the inputs are live (camera) so it times correctly. interview gold: \"the dangerous default is an unbounded batch wait — one dead rtsp camera can stall the whole batched pipeline. i cap batched-push-timeout to ~a frame interval so the batch flushes with n-1 streams and the dead one gets reconnected independently.\" this ties multi-stream batching to fault tolerance . nvinfer config: what's in that text file nvinfer is configured by a config_infer.txt of key groups, not code. the ones to be able to name: [property] — model-engine-file (the built tensorrt engine), onnx-file / model-file (source to build from), network-mode (0=fp32, 1=int8, 2=fp16), batch-size , num-detected-classes . gie-unique-id — the inference instance's id,

cates fast + audit trail.<\/li><li><strong>State machine<\/strong> active→acknowledged→resolved → SLAs, no duplicate paging.<\/li><li><strong>Idempotent<\/strong> on (type,camera,zone,time-bucket) → retries/overlap can't duplicate.<\/li><\/ul>\n<h2 id=\"close-the-loop\">Close the loop<\/h2>\n<ul><li>Operator <strong>\"false alarm\" button<\/strong> → retune thresholds + hard-mine FPs into next model (active learning, §14).<\/li><li>Monitor <strong>alerts/camera/day<\/strong> — rising trend = drift or bumped camera (→ §13).<\/li><\/ul>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Hysteresis why? → stops chatter when metric hovers at boundary.<\/li><li>2 cameras fire on 1 intrusion → how many? → 1; dedupe on world position+time.<\/li><li>\"Never miss an intruder\" → move toward <strong>recall<\/strong>, cost = more false alarms (budget them).<\/li><li>Auditable event? → self-describing schema + evidence + status state machine.<\/li><\/ul>","toc":[{"level":2,"id":"why-this-layer-decides-success","text":"Why this layer decides success"},{"level":2,"id":"techniques","text":"Techniques"},{"level":2,"id":"thresholds","text":"Thresholds"},{"level":2,"id":"event-schema-auditable","text":"Event schema (auditable)"},{"level":2,"id":"close-the-loop","text":"Close the loop"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"alerting & false-alarm control 💡 tl;dr detecting once is easy. trust = the alerting layer: confirm, debounce, hysteresis, dedupe, clean schema. cry wolf → muted in a week. the most senior topic in this section. why this layer decides success anomalies are rare → 99% specific × thousands of frames × dozens of cameras = flood of false positives → operators mute. engineer the alert , not just the detector. raw trigger k-of-n confirm hysteresis debounce / cooldown dedupe severity + evidence operator each stage suppresses false alarms — the difference between a trusted alert and one operators mute. techniques k-of-n confirm — fire only if condition in k of last n frames. highest-leverage fp killer. dwell/persistence — require duration (loiter >30s, object >60s). hysteresis — arm at high threshold, clear at low → stops on/off chatter at boundary. debounce/cooldown — one alert per (camera,zone,type) + \"ongoing\" update, not per-frame storm. dedupe — same real event on 2 overlapping cameras = 1 incident (dedupe on shared floor position+time, §11). spatial filter — mask known-noisy regions (tree, reflection, monitor showing video). thresholds from data , not vibes — set at a percentile of the normal distribution, validate. precision vs recall = business call: intrusion → high recall (miss nothing); retail count → high precision . ask. pick operating point on pr curve to hit a budget: \"< 2 false alerts/camera/day.\" expose as per-site config . event schema (auditable) { \"event_id\",\"type\":\"loitering\",\"severity\",\"camera_id\",\"zone_id\", \"start_ts\",\"end_ts\":null,\"track_ids\":[42],\"confidence\":0.87, \"evidence\":{\"clip\",\"keyframe\",\"trajectory\"},\"status\":\"active\" } evidence (keyframe/clip) → human adjudicates fast + audit trail. state machine active→acknowledged→resolved → slas, no duplicate paging. idempotent on (type,camera,zone,time-bucket) → retries/overlap can't duplicate. close the loop operator \"false alarm\" button → retune thresholds + hard-mine fps into next model (active learning, §14). monitor alerts/camera/day — rising trend = drift or bumped camera (→ §13). q&a hysteresis why? → stops chatter when metric hovers at boundary. 2 cameras fire on 1 intrusion → how many? → 1; dedupe on world position+time. \"never miss an intruder\" → move toward recall , cost = more false alarms (budget them). auditable event? → self-describing schema + evidence + status state machine.","words":350},{"path":"13-secure-onprem-monitoring/README.md","title":"Overview","section":"13 · Secure On-Prem & Monitoring","quiz":false,"accent":"#5b6ee1","html":"<h1 id=\"13-secure-on-prem-monitoring\">13: Secure On-Prem &amp; Monitoring<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Gov/enterprise CCTV rule: <strong>no cloud, data never leaves site, everything auditable.<\/strong> Same skills as your cloud work — constraint <strong>inverted<\/strong>.<\/div><\/div>\n<div class=\"diagram\">\n  <div class=\"loopwrap\">\n    <span class=\"loop-top\">🔒 ON-PREM / AIR-GAPPED<\/span>\n    <div class=\"flow\">\n      <span class=\"node data\">cameras<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">Jetson edge<span class=\"nsub\">decode + detect + track<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">on-prem GPU server<span class=\"nsub\">analytics + events<\/span><\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node\">local DB<\/span>\n      <span class=\"arw\"><\/span>\n      <span class=\"node out\">operator dashboard<\/span>\n    <\/div>\n    <div class=\"flow-foot\"><b>No internet egress.<\/b> Model updates arrive via a controlled offline channel.<\/div>\n  <\/div>\n<\/div>\n<p><strong>Bridge from your résumé:<\/strong> <em>\"I've shipped Dockerized inference on GKE; on-prem it's the same containers + TensorRT engines, but registry, model updates, and monitoring all live inside the perimeter with no egress.\"<\/em><\/p>\n<p><strong>Say this:<\/strong> <em>\"Secure on-prem = data plane never leaves site: no cloud inference, no telemetry egress, encryption at rest+transit, least-privilege, audit trail. Models optimized for the edge GPUs we have, monitored locally for drift + health.\"<\/em><\/p>\n<p>Pages: 1) architecture · 2) security &amp; PII/privacy · 3) monitoring &amp; drift.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"onprem-architecture.md\" href=\"#\">onprem-architecture.md<\/a><\/strong><\/p>","toc":[],"text":"13: secure on-prem & monitoring 💡 tl;dr gov/enterprise cctv rule: no cloud, data never leaves site, everything auditable. same skills as your cloud work — constraint inverted . 🔒 on-prem / air-gapped cameras jetson edge decode + detect + track on-prem gpu server analytics + events local db operator dashboard no internet egress. model updates arrive via a controlled offline channel. bridge from your résumé: \"i've shipped dockerized inference on gke; on-prem it's the same containers + tensorrt engines, but registry, model updates, and monitoring all live inside the perimeter with no egress.\" say this: \"secure on-prem = data plane never leaves site: no cloud inference, no telemetry egress, encryption at rest+transit, least-privilege, audit trail. models optimized for the edge gpus we have, monitored locally for drift + health.\" pages: 1) architecture · 2) security & pii/privacy · 3) monitoring & drift. → start: onprem-architecture.md","words":145},{"path":"13-secure-onprem-monitoring/onprem-architecture.md","title":"On-Prem / Air-Gapped Architecture","section":"13 · Secure On-Prem & Monitoring","quiz":false,"accent":"#5b6ee1","html":"<h1 id=\"on-prem-air-gapped-architecture\">On-Prem / Air-Gapped Architecture<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> You own every box, no internet. Consequences: internal registry, offline model delivery, <strong>no autoscale<\/strong> (size for peak), signed artifacts.<\/div><\/div>\n<h2 id=\"why-on-prem\">Why on-prem<\/h2>\n<ul><li><strong>Data residency<\/strong> — UAE/gov: footage + biometrics stay in-country/on-site; cloud egress may be illegal.<\/li><li><strong>Latency/reliability<\/strong> — alerts fire even if internet down.<\/li><li><strong>Attack surface<\/strong> — no inbound cloud endpoint.<\/li><li><strong>Bandwidth<\/strong> — don't stream dozens of HD cameras to cloud; process at edge, ship events.<\/li><\/ul>\n<h2 id=\"topology\">Topology<\/h2>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <span class=\"node data\">Cameras<span class=\"nsub\">private VLAN · RTSP<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">Jetson edge<span class=\"nsub\">decode (NVDEC) + detect + track + events<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">on-prem GPU server<span class=\"nsub\">aggregation · cross-camera fusion · heavy models<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node out\">local DB (events) + object store (clips) + LAN dashboard<\/span>\n  <\/div>\n  <div class=\"diagram-cap\">🔒 No outbound internet.<\/div>\n<\/div>\n<p><strong>Edge-first:<\/strong> do detect+track+events on Jetson → raw video stays local (privacy) + only metadata leaves (bandwidth). (§02/§03)<\/p>\n<h2 id=\"deploy-without-cloud\">Deploy without cloud<\/h2>\n<ul><li><strong>Internal registry<\/strong> (Harbor / private Docker) — same images, different registry.<\/li><li><strong>Offline model delivery<\/strong> — signed artifacts via controlled transfer → on-prem model registry. No runtime PyPI; vendor wheels/base images.<\/li><li><strong>Orchestration<\/strong> — docker compose per node, or on-prem k8s (k3s). GKE manifests transfer; only control plane is local.<\/li><li><strong>Secrets<\/strong> — local Vault; never bake camera creds in images.<\/li><\/ul>\n<h2 id=\"fixed-capacity-differs-from-cloud\">Fixed capacity (differs from cloud!)<\/h2>\n<ul><li><strong>No autoscale<\/strong> → size GPUs for <strong>peak<\/strong> (cameras × model cost, from §03 latency budget).<\/li><li><strong>N+1 redundancy<\/strong> — dead box re-homes cameras (§04).<\/li><li><strong>Retention<\/strong> — 30/90 days, legal caps, auto-expire (also privacy).<\/li><li><strong>Thermal/power<\/strong> — Jetson modes 10W/15W/MAXN throttle in hot cabinets (real, §03).<\/li><\/ul>\n<h2 id=\"safe-model-update\">Safe model update<\/h2>\n<p>Offline-validate on site clips → import signed artifact → <strong>canary<\/strong> on few cameras → compare to incumbent → roll forward or <strong>roll back<\/strong> (keep old engine pinned; never overwrite in place).<\/p>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Detect/track on edge why? → raw video stays local (privacy) + save bandwidth.<\/li><li>No <code>docker pull<\/code> on-site → how? → internal registry + controlled import of signed artifacts.<\/li><li>Capacity harder than GKE? → no autoscale; size for peak + N+1.<\/li><\/ul>","toc":[{"level":2,"id":"why-on-prem","text":"Why on-prem"},{"level":2,"id":"topology","text":"Topology"},{"level":2,"id":"deploy-without-cloud","text":"Deploy without cloud"},{"level":2,"id":"fixed-capacity-differs-from-cloud","text":"Fixed capacity (differs from cloud!)"},{"level":2,"id":"safe-model-update","text":"Safe model update"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"on-prem / air-gapped architecture 💡 tl;dr you own every box, no internet. consequences: internal registry, offline model delivery, no autoscale (size for peak), signed artifacts. why on-prem data residency — uae/gov: footage + biometrics stay in-country/on-site; cloud egress may be illegal. latency/reliability — alerts fire even if internet down. attack surface — no inbound cloud endpoint. bandwidth — don't stream dozens of hd cameras to cloud; process at edge, ship events. topology cameras private vlan · rtsp jetson edge decode (nvdec) + detect + track + events on-prem gpu server aggregation · cross-camera fusion · heavy models local db (events) + object store (clips) + lan dashboard 🔒 no outbound internet. edge-first: do detect+track+events on jetson → raw video stays local (privacy) + only metadata leaves (bandwidth). (§02/§03) deploy without cloud internal registry (harbor / private docker) — same images, different registry. offline model delivery — signed artifacts via controlled transfer → on-prem model registry. no runtime pypi; vendor wheels/base images. orchestration — docker compose per node, or on-prem k8s (k3s). gke manifests transfer; only control plane is local. secrets — local vault; never bake camera creds in images. fixed capacity (differs from cloud!) no autoscale → size gpus for peak (cameras × model cost, from §03 latency budget). n+1 redundancy — dead box re-homes cameras (§04). retention — 30/90 days, legal caps, auto-expire (also privacy). thermal/power — jetson modes 10w/15w/maxn throttle in hot cabinets (real, §03). safe model update offline-validate on site clips → import signed artifact → canary on few cameras → compare to incumbent → roll forward or roll back (keep old engine pinned; never overwrite in place). q&a detect/track on edge why? → raw video stays local (privacy) + save bandwidth. no docker pull on-site → how? → internal registry + controlled import of signed artifacts. capacity harder than gke? → no autoscale; size for peak + n+1.","words":312},{"path":"13-secure-onprem-monitoring/security-and-privacy.md","title":"Security, Access & PII/Privacy","section":"13 · Secure On-Prem & Monitoring","quiz":false,"accent":"#5b6ee1","html":"<h1 id=\"security-access-piiface-privacy\">Security, Access &amp; PII/Face Privacy<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Answer 4 questions crisply: encrypted? who sees what? who did what? how little PII can you keep? Last one is CCTV-specific = where judgement shows.<\/div><\/div>\n<h2 id=\"encryption\">Encryption<\/h2>\n<ul><li><strong>In transit<\/strong> — RTSP over TLS (or isolated VLAN if cameras can't), mTLS internally. No plaintext streams.<\/li><li><strong>At rest<\/strong> — full-disk (LUKS) on edge+server, encrypt clips + events DB. Keys in KMS/TPM, not on the disk.<\/li><li><strong>Creds<\/strong> — secrets store, rotated; never in images/config.<\/li><\/ul>\n<h2 id=\"access-audit\">Access &amp; audit<\/h2>\n<ul><li><strong>Least privilege / RBAC<\/strong> — operators: live+alerts; supervisors: export; admins: config. No blanket footage access.<\/li><li><strong>Auth<\/strong> — SSO/LDAP, MFA for admin.<\/li><li><strong>Audit log<\/strong> — every view/export/config/model change, user+time, <strong>tamper-evident<\/strong> (append-only). Often a hard gov requirement.<\/li><li><strong>Segmentation<\/strong> — camera VLAN / inference / UI separate; no lateral path.<\/li><\/ul>\n<h2 id=\"pii-faces-the-cv-specific-part\">PII &amp; faces (the CV-specific part)<\/h2>\n<p><strong>Key insight: crowd/queue analytics rarely needs identity — so don't collect it.<\/strong><\/p>\n<ul><li><strong>Minimise<\/strong> — need counts+tracks+timestamps, NOT faces/names. Store metadata, not crops. Biggest lever.<\/li><li><strong>Anonymise<\/strong> — blur faces/plates in stored/displayed footage; blur <strong>at edge before write<\/strong> so unblurred frame never persists.<\/li><li><strong>Biometrics special<\/strong> — face <strong>recognition<\/strong> (who) ≫ heavier than face <strong>detection<\/strong> (a face) or person detection. Crowd analytics needs only the light two. If recognition not in scope → <strong>don't collect biometric templates.<\/strong><\/li><li><strong>ReID ≠ identity<\/strong> — re-associates an <em>unnamed<\/em> person for counting; still sensitive, scope retention.<\/li><li><strong>Retention<\/strong> — footage/PII expire on policy (30/90d), purpose-limited, auto-delete.<\/li><\/ul>\n<h2 id=\"model-supply-chain\">Model supply chain<\/h2>\n<ul><li><strong>Signed artifacts<\/strong> (verify checksum before load) · vetted base images, scan CVEs, no runtime installs · <strong>validate inputs<\/strong> (malformed RTSP shouldn't crash decoder, §04).<\/li><\/ul>\n<p><strong>Say this:<\/strong> <em>\"For crowd/queue I default to counts + anonymised tracks, blur faces before write, keep raw video at edge, retention clock on everything. If face recognition isn't required + authorised, I don't collect biometric data at all.\"<\/em><\/p>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Store faces for queue analytics? → no; counts+tracks+timestamps.<\/li><li>Detection vs recognition matter? → recognition = identify a person = biometric + heavy legal.<\/li><li>Blur where? → at edge, before persistence.<\/li><li>Audit log captures? → every view/export/config/model change, user+time, tamper-evident.<\/li><\/ul>","toc":[{"level":2,"id":"encryption","text":"Encryption"},{"level":2,"id":"access-audit","text":"Access &amp; audit"},{"level":2,"id":"pii-faces-the-cv-specific-part","text":"PII &amp; faces (the CV-specific part)"},{"level":2,"id":"model-supply-chain","text":"Model supply chain"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"security, access & pii/face privacy 💡 tl;dr answer 4 questions crisply: encrypted? who sees what? who did what? how little pii can you keep? last one is cctv-specific = where judgement shows. encryption in transit — rtsp over tls (or isolated vlan if cameras can't), mtls internally. no plaintext streams. at rest — full-disk (luks) on edge+server, encrypt clips + events db. keys in kms/tpm, not on the disk. creds — secrets store, rotated; never in images/config. access & audit least privilege / rbac — operators: live+alerts; supervisors: export; admins: config. no blanket footage access. auth — sso/ldap, mfa for admin. audit log — every view/export/config/model change, user+time, tamper-evident (append-only). often a hard gov requirement. segmentation — camera vlan / inference / ui separate; no lateral path. pii & faces (the cv-specific part) key insight: crowd/queue analytics rarely needs identity — so don't collect it. minimise — need counts+tracks+timestamps, not faces/names. store metadata, not crops. biggest lever. anonymise — blur faces/plates in stored/displayed footage; blur at edge before write so unblurred frame never persists. biometrics special — face recognition (who) ≫ heavier than face detection (a face) or person detection. crowd analytics needs only the light two. if recognition not in scope → don't collect biometric templates. reid ≠ identity — re-associates an unnamed person for counting; still sensitive, scope retention. retention — footage/pii expire on policy (30/90d), purpose-limited, auto-delete. model supply chain signed artifacts (verify checksum before load) · vetted base images, scan cves, no runtime installs · validate inputs (malformed rtsp shouldn't crash decoder, §04). say this: \"for crowd/queue i default to counts + anonymised tracks, blur faces before write, keep raw video at edge, retention clock on everything. if face recognition isn't required + authorised, i don't collect biometric data at all.\" q&a store faces for queue analytics? → no; counts+tracks+timestamps. detection vs recognition matter? → recognition = identify a person = biometric + heavy legal. blur where? → at edge, before persistence. audit log captures? → every view/export/config/model change, user+time, tamper-evident.","words":335},{"path":"13-secure-onprem-monitoring/performance-monitoring.md","title":"Performance Monitoring & Drift","section":"13 · Secure On-Prem & Monitoring","quiz":false,"accent":"#5b6ee1","html":"<h1 id=\"performance-monitoring-drift\">Performance Monitoring &amp; Drift<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> No cloud dashboard → build observability in. Two layers: <strong>system health<\/strong> (easy, you have numbers) + <strong>model health<\/strong> (hard, no live labels). Drift = the skill.<\/div><\/div>\n<h2 id=\"system-health-instrument-everything\">System health (instrument everything)<\/h2>\n<ul><li><strong>Per camera<\/strong> — FPS, latency, decode errors, RTSP reconnects, dropped frames. (Camera silently at 2 FPS = classic invisible failure.)<\/li><li><strong>Per GPU<\/strong> — util, memory, <strong>temperature/throttle<\/strong> (hot climate!), power mode. <code>tegrastats<\/code> (Jetson), <strong>DCGM<\/strong> (server).<\/li><li><strong>Pipeline<\/strong> — queue depth, throughput vs §03 budget, restarts.<\/li><li><strong>Stack<\/strong> — <strong>Prometheus + Grafana + Alertmanager inside the perimeter<\/strong> (no cloud APM).<\/li><\/ul>\n<h2 id=\"model-health-no-labels-watch-proxies\">Model health (no labels → watch proxies)<\/h2>\n<ul><li><strong>Confidence distribution<\/strong> — histogram of detection scores; shifts on drift (lighting, dirty lens, bumped camera); collapse = alarm.<\/li><li><strong>Output stats<\/strong> — avg count, class mix, track length, ID-switch rate, dwell dist. Trend away from baseline = something changed.<\/li><li><strong>Data/domain drift<\/strong> — compare input stats vs training reference (<strong>PSI / KL<\/strong>). Usual culprit = <strong>covariate shift<\/strong>.<\/li><li><strong>Periodic audits<\/strong> — sample frames/events → human label → real precision/recall + count MAE → trend. (Only true accuracy measure.)<\/li><\/ul>\n<p><strong>Drift types:<\/strong> <strong>covariate<\/strong> = inputs shift (lighting/season → recalibrate/retrain) · <strong>concept<\/strong> = meaning shifts (zone repurposed → relabel).<\/p>\n<h2 id=\"close-the-loop\">Close the loop<\/h2>\n<div class=\"diagram\">\n  <div class=\"branch\">\n    <div class=\"flow\">\n      <span class=\"node\">monitor<\/span>\n      <span class=\"arw tiny\"><\/span>\n      <span class=\"node\">detect drift<\/span>\n      <span class=\"arw tiny\"><\/span>\n      <span class=\"node\">collect + label hard cases<span class=\"nsub\">active learning §14<\/span><\/span>\n      <span class=\"arw tiny\"><\/span>\n      <span class=\"node\">retrain / recalibrate<\/span>\n      <span class=\"arw tiny\"><\/span>\n      <span class=\"node\">offline-validate<span class=\"nsub\">on site clips<\/span><\/span>\n      <span class=\"arw tiny\"><\/span>\n      <span class=\"node\">canary<span class=\"nsub\">few cameras<\/span><\/span>\n    <\/div>\n    <span class=\"split-arw\"><\/span>\n    <div class=\"fork\">\n      <span class=\"node out\">roll forward ✓<\/span>\n      <span class=\"node ghost\">ROLL BACK ✗<\/span>\n    <\/div>\n  <\/div>\n<\/div>\n<ul><li><strong>Canary + rollback<\/strong> — never hot-swap fleet blind; keep old engine pinned.<\/li><li><strong>Shadow mode<\/strong> — run candidate alongside prod, log diffs (no cloud A/B).<\/li><li><strong>Active learning<\/strong> — mine low-confidence + operator-flagged FPs → label those → retrain. How it improves in a closed site.<\/li><\/ul>\n<h2 id=\"optimization-monitoring-one-loop\">Optimization ↔ monitoring = one loop<\/h2>\n<p>Optimize (INT8/FP16/prune/TensorRT, §03) to hit latency budget → <strong>monitor mAP didn't drop<\/strong> (INT8 can cost mAP) → stay in budget as cameras grow.<\/p>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>No labels — detect degradation? → proxies (confidence dist, output stats, FP trend) + periodic human audits.<\/li><li>Covariate vs concept drift (CCTV)? → lighting/season vs zone repurposed.<\/li><li>Roll out on locked 200-camera site? → offline-validate → canary/shadow → compare → forward/rollback.<\/li><li>Dashboards, no cloud? → Prometheus+Grafana+Alertmanager on-prem; tegrastats/DCGM.<\/li><\/ul>","toc":[{"level":2,"id":"system-health-instrument-everything","text":"System health (instrument everything)"},{"level":2,"id":"model-health-no-labels-watch-proxies","text":"Model health (no labels → watch proxies)"},{"level":2,"id":"close-the-loop","text":"Close the loop"},{"level":2,"id":"optimization-monitoring-one-loop","text":"Optimization ↔ monitoring = one loop"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"performance monitoring & drift 💡 tl;dr no cloud dashboard → build observability in. two layers: system health (easy, you have numbers) + model health (hard, no live labels). drift = the skill. system health (instrument everything) per camera — fps, latency, decode errors, rtsp reconnects, dropped frames. (camera silently at 2 fps = classic invisible failure.) per gpu — util, memory, temperature/throttle (hot climate!), power mode. tegrastats (jetson), dcgm (server). pipeline — queue depth, throughput vs §03 budget, restarts. stack — prometheus + grafana + alertmanager inside the perimeter (no cloud apm). model health (no labels → watch proxies) confidence distribution — histogram of detection scores; shifts on drift (lighting, dirty lens, bumped camera); collapse = alarm. output stats — avg count, class mix, track length, id-switch rate, dwell dist. trend away from baseline = something changed. data/domain drift — compare input stats vs training reference ( psi / kl ). usual culprit = covariate shift . periodic audits — sample frames/events → human label → real precision/recall + count mae → trend. (only true accuracy measure.) drift types: covariate = inputs shift (lighting/season → recalibrate/retrain) · concept = meaning shifts (zone repurposed → relabel). close the loop monitor detect drift collect + label hard cases active learning §14 retrain / recalibrate offline-validate on site clips canary few cameras roll forward ✓ roll back ✗ canary + rollback — never hot-swap fleet blind; keep old engine pinned. shadow mode — run candidate alongside prod, log diffs (no cloud a/b). active learning — mine low-confidence + operator-flagged fps → label those → retrain. how it improves in a closed site. optimization ↔ monitoring = one loop optimize (int8/fp16/prune/tensorrt, §03) to hit latency budget → monitor map didn't drop (int8 can cost map) → stay in budget as cameras grow. q&a no labels — detect degradation? → proxies (confidence dist, output stats, fp trend) + periodic human audits. covariate vs concept drift (cctv)? → lighting/season vs zone repurposed. roll out on locked 200-camera site? → offline-validate → canary/shadow → compare → forward/rollback. dashboards, no cloud? → prometheus+grafana+alertmanager on-prem; tegrastats/dcgm.","words":347},{"path":"14-deep-learning-for-video/README.md","title":"Overview","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"14-deep-learning-for-video\">14: Deep Learning for Video<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> \"Data <strong>Scientist<\/strong>\" = reason about <strong>models<\/strong>, not just pipeline. The chain: <strong>backbone CNN<\/strong> → features → <strong>detection head<\/strong> → boxes → <strong>tracker<\/strong> → IDs → (§11/§12).<\/div><\/div>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">frame<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">backbone CNN<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">features<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">detector<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">boxes + classes<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">tracker<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">IDs<span class=\"nsub\">→ §11 analytics · §12 events<\/span><\/span>\n  <\/div>\n<\/div>\n<p><strong>Say this:<\/strong> <em>\"For live CCTV: single-stage YOLO-family detector on a CNN backbone (one forward pass, real-time FPS on the edge). Detections feed a tracking-by-detection tracker (ByteTrack) for stable IDs, + ReID for occlusion/cross-camera. Train with heavy augmentation for the deploy scene, quantize INT8 with TensorRT while watching mAP.\"<\/em><\/p>\n<p>Pages: 1) CNNs/backbones · 2) detection · 3) tracking · 4) training &amp; optimization.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"cnns-and-backbones.md\" href=\"#\">cnns-and-backbones.md<\/a><\/strong><\/p>","toc":[],"text":"14: deep learning for video 💡 tl;dr \"data scientist \" = reason about models , not just pipeline. the chain: backbone cnn → features → detection head → boxes → tracker → ids → (§11/§12). frame backbone cnn features detector boxes + classes tracker ids → §11 analytics · §12 events say this: \"for live cctv: single-stage yolo-family detector on a cnn backbone (one forward pass, real-time fps on the edge). detections feed a tracking-by-detection tracker (bytetrack) for stable ids, + reid for occlusion/cross-camera. train with heavy augmentation for the deploy scene, quantize int8 with tensorrt while watching map.\" pages: 1) cnns/backbones · 2) detection · 3) tracking · 4) training & optimization. → start: cnns-and-backbones.md","words":116},{"path":"14-deep-learning-for-video/cnns-and-backbones.md","title":"CNNs & Backbones","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"cnns-backbones\">CNNs &amp; Backbones<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> CNN = ladder of features (edges→objects). <strong>Backbone<\/strong> = feature extractor under detector/tracker. Know: convolution, receptive field, FPN (scale).<\/div><\/div>\n<h2 id=\"convolution-why-it-fits-images\">Convolution: why it fits images<\/h2>\n<ul><li><strong>Weight sharing<\/strong> — same kernel everywhere → few params, edge-anywhere (translation equivariance).<\/li><li><strong>Locality<\/strong> — each output sees a local patch.<\/li><li><strong>Depth stacks abstraction<\/strong> — edges → textures → parts → objects.<\/li><\/ul>\n<p>Knobs: <strong>stride<\/strong> (2 = downsample), <strong>padding<\/strong> (same/valid), <strong>kernel<\/strong> (3×3; two 3×3 ≈ one 5×5, fewer params + more nonlinearity), <strong>channels<\/strong> (feature types), <strong>dilation<\/strong> (bigger receptive field, no extra params — CSRNet).<\/p>\n<h2 id=\"receptive-field\">Receptive field<\/h2>\n<p>Input region affecting one activation; grows with depth/stride/dilation. Too small → can't see big objects; too coarse → miss tiny ones → <strong>motivation for multi-scale (FPN)<\/strong>.<\/p>\n<p><strong>Watch it grow.<\/strong> Each strided layer shrinks the feature map (<code>out = ⌊(N+2p−k)/s⌋+1<\/code>) while the receptive field expands. Stack a few and see why deep layers \"see\" large objects but lose the spatial detail needed for tiny ones.<\/p>\n<div id=\"conv-widget\" class=\"widget-host\"><\/div>\n<h2 id=\"backbone-building-blocks\">Backbone building blocks<\/h2>\n<ul><li><strong>BatchNorm<\/strong> — faster/stable training.<\/li><li><strong>Residual (ResNet)<\/strong> <code>y=F(x)+x<\/code> — fixes vanishing gradients → deep nets. Core idea.<\/li><li><strong>Pooling / strided conv<\/strong> — downsample.<\/li><li><strong>Depthwise-separable (MobileNet)<\/strong> — cheap conv → <strong>runs on Jetson<\/strong>.<\/li><\/ul>\n<div class=\"table-scroll\"><table><thead><tr><th>Backbone<\/th><th>Pick when<\/th><\/tr><\/thead><tbody><tr><td>ResNet-50<\/td><td>strong standard baseline<\/td><\/tr><tr><td><strong>MobileNet / EfficientNet-Lite<\/strong><\/td><td>edge / Jetson<\/td><\/tr><tr><td>CSPDarknet<\/td><td>YOLO backbone, speed-tuned<\/td><\/tr><tr><td>ViT<\/td><td>strong but heavy, rarely edge<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"scale-problem-the-cctv-problem\">Scale problem = THE CCTV problem<\/h2>\n<p>Near person = 100s px, far person = few px → huge range in one frame. Single map can't do both. <strong>FPN<\/strong> fuses deep-semantic (upsampled) + shallow-detailed → strong features at <strong>every scale<\/strong>.<\/p>\n<div class=\"diagram\">\n  <div class=\"lanes\">\n    <div class=\"lane-stack\">\n      <span class=\"node soft\">deep · semantic<span class=\"nsub\">low-res<\/span><\/span>\n      <span class=\"node soft\">shallow · detail<span class=\"nsub\">hi-res<\/span><\/span>\n    <\/div>\n    <span class=\"merge-arw\" title=\"upsample + add\"><\/span>\n    <span class=\"node out\">detect small AND large<\/span>\n  <\/div>\n  <div class=\"diagram-cap\">FPN fuses coarse-but-meaningful with fine-but-shallow → one head that sees every scale.<\/div>\n<\/div>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Two 3×3 vs one 5×5? → same RF, fewer params, extra nonlinearity.<\/li><li>Residuals solve? → vanishing gradients → deep nets train.<\/li><li>FPN for CCTV why? → huge near/far scale range.<\/li><li>Jetson backbone? → MobileNet (depthwise-separable, cheap FLOPs).<\/li><\/ul>","toc":[{"level":2,"id":"convolution-why-it-fits-images","text":"Convolution: why it fits images"},{"level":2,"id":"receptive-field","text":"Receptive field"},{"level":2,"id":"backbone-building-blocks","text":"Backbone building blocks"},{"level":2,"id":"scale-problem-the-cctv-problem","text":"Scale problem = THE CCTV problem"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"cnns & backbones 💡 tl;dr cnn = ladder of features (edges→objects). backbone = feature extractor under detector/tracker. know: convolution, receptive field, fpn (scale). convolution: why it fits images weight sharing — same kernel everywhere → few params, edge-anywhere (translation equivariance). locality — each output sees a local patch. depth stacks abstraction — edges → textures → parts → objects. knobs: stride (2 = downsample), padding (same/valid), kernel (3×3; two 3×3 ≈ one 5×5, fewer params + more nonlinearity), channels (feature types), dilation (bigger receptive field, no extra params — csrnet). receptive field input region affecting one activation; grows with depth/stride/dilation. too small → can't see big objects; too coarse → miss tiny ones → motivation for multi-scale (fpn) . watch it grow. each strided layer shrinks the feature map ( out = ⌊(n+2p−k)/s⌋+1 ) while the receptive field expands. stack a few and see why deep layers \"see\" large objects but lose the spatial detail needed for tiny ones. backbone building blocks batchnorm — faster/stable training. residual (resnet) y=f(x)+x — fixes vanishing gradients → deep nets. core idea. pooling / strided conv — downsample. depthwise-separable (mobilenet) — cheap conv → runs on jetson . backbone pick when resnet-50 strong standard baseline mobilenet / efficientnet-lite edge / jetson cspdarknet yolo backbone, speed-tuned vit strong but heavy, rarely edge scale problem = the cctv problem near person = 100s px, far person = few px → huge range in one frame. single map can't do both. fpn fuses deep-semantic (upsampled) + shallow-detailed → strong features at every scale . deep · semantic low-res shallow · detail hi-res detect small and large fpn fuses coarse-but-meaningful with fine-but-shallow → one head that sees every scale. q&a two 3×3 vs one 5×5? → same rf, fewer params, extra nonlinearity. residuals solve? → vanishing gradients → deep nets train. fpn for cctv why? → huge near/far scale range. jetson backbone? → mobilenet (depthwise-separable, cheap flops).","words":319},{"path":"14-deep-learning-for-video/object-detection.md","title":"Object Detection","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"object-detection\">Object Detection<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Localize + classify. CCTV → <strong>single-stage (YOLO)<\/strong>: one forward pass, real-time. Know NMS + mAP cold.<\/div><\/div>\n<h2 id=\"one-stage-vs-two-stage\">One-stage vs two-stage<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Two-stage (Faster R-CNN)<\/th><th>One-stage (YOLO/SSD)<\/th><\/tr><\/thead><tbody><tr><td>how<\/td><td>propose regions → classify<\/td><td>boxes+classes in one pass over grid<\/td><\/tr><tr><td>speed<\/td><td>slower<\/td><td><strong>real-time<\/strong><\/td><\/tr><tr><td>CCTV<\/td><td>rarely<\/td><td><strong>default<\/strong> (need FPS/camera)<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Say:<\/strong> <em>\"Need one forward pass at real-time FPS per camera → YOLO-family single-stage.\"<\/em><\/p>\n<h2 id=\"anchors\">Anchors<\/h2>\n<ul><li><strong>Anchor-based<\/strong> (YOLOv3–5, SSD) — predefined box priors; must tune sizes.<\/li><li><strong>Anchor-free<\/strong> (YOLOX, FCOS, YOLOv8) — predict centers directly; simpler, now standard.<\/li><\/ul>\n<p><strong>YOLO idea:<\/strong> grid; each cell predicts boxes + objectness + classes, one pass. + CSPDarknet + FPN/PAN neck + mosaic aug.<\/p>\n<h2 id=\"nms-guaranteed-question\">NMS (guaranteed question)<\/h2>\n<pre><code>1 sort by score  2 keep top  3 drop boxes with IoU&gt;thr vs it (dupes)  4 repeat\nIoU = intersection/union (0..1)<\/code><\/pre>\n<ul><li><strong>Crowd trap:<\/strong> low IoU thr suppresses <strong>real nearby people<\/strong> → under-count. → <strong>Soft-NMS<\/strong> (decay scores, not delete).<\/li><\/ul>\n<h2 id=\"loss\">Loss<\/h2>\n<p>localization (IoU/GIoU/CIoU) + objectness + classification (<strong>focal loss<\/strong> for fg/bg imbalance).<\/p>\n<h2 id=\"map-must-explain\">mAP (must explain)<\/h2>\n<div class=\"formula\">\n  <div class=\"frow\"><span class=\"fexpr\"><span class=\"fv\">IoU ≥ thr<\/span> → True Positive<\/span><\/div>\n  <div class=\"frow\"><span class=\"fexpr\">precision = TP/(TP+FP)<\/span><span class=\"fexpr\" style=\"margin-left:12px\">recall = TP/(TP+FN)<\/span><\/div>\n  <div class=\"frow\"><span class=\"fexpr\"><span class=\"fv\">AP<\/span> = area under PR curve (per class)<\/span><span class=\"fexpr\" style=\"margin-left:12px\"><span class=\"fv\">mAP<\/span> = mean AP over classes<\/span><\/div>\n  <div class=\"frow\"><span class=\"fnote\">mAP@0.5 = loose · mAP@[0.5:0.95] = COCO strict (averaged over IoU thresholds)<\/span><\/div>\n<\/div>\n<ul><li>PR trade-off = the <strong>confidence threshold<\/strong>. Always state the IoU thr.<\/li><li><strong>Counting → recall<\/strong> (miss = under-count). <strong>Security alert → precision<\/strong>.<\/li><\/ul>\n<h2 id=\"cctv-challenges\">CCTV challenges<\/h2>\n<p>small/far (↑res, FPN, tile) · occlusion (head detect, Soft-NMS, density §11) · imbalance (focal) · domain shift (§14 train, §13 drift).<\/p>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Single-stage why? → one pass, real-time FPS/camera.<\/li><li>NMS + low-IoU hurts counting? → suppresses true nearby → under-count; Soft-NMS.<\/li><li>mAP@[0.5:0.95]? → AP avg over IoU 0.5–0.95, mean over classes.<\/li><li>Counting → precision or recall? → recall.<\/li><\/ul>","toc":[{"level":2,"id":"one-stage-vs-two-stage","text":"One-stage vs two-stage"},{"level":2,"id":"anchors","text":"Anchors"},{"level":2,"id":"nms-guaranteed-question","text":"NMS (guaranteed question)"},{"level":2,"id":"loss","text":"Loss"},{"level":2,"id":"map-must-explain","text":"mAP (must explain)"},{"level":2,"id":"cctv-challenges","text":"CCTV challenges"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"object detection 💡 tl;dr localize + classify. cctv → single-stage (yolo) : one forward pass, real-time. know nms + map cold. one-stage vs two-stage two-stage (faster r-cnn) one-stage (yolo/ssd) how propose regions → classify boxes+classes in one pass over grid speed slower real-time cctv rarely default (need fps/camera) say: \"need one forward pass at real-time fps per camera → yolo-family single-stage.\" anchors anchor-based (yolov3–5, ssd) — predefined box priors; must tune sizes. anchor-free (yolox, fcos, yolov8) — predict centers directly; simpler, now standard. yolo idea: grid; each cell predicts boxes + objectness + classes, one pass. + cspdarknet + fpn/pan neck + mosaic aug. nms (guaranteed question) 1 sort by score 2 keep top 3 drop boxes with iou>thr vs it (dupes) 4 repeat iou = intersection/union (0..1) crowd trap: low iou thr suppresses real nearby people → under-count. → soft-nms (decay scores, not delete). loss localization (iou/giou/ciou) + objectness + classification ( focal loss for fg/bg imbalance). map (must explain) iou ≥ thr → true positive precision = tp/(tp+fp) recall = tp/(tp+fn) ap = area under pr curve (per class) map = mean ap over classes map@0.5 = loose · map@[0.5:0.95] = coco strict (averaged over iou thresholds) pr trade-off = the confidence threshold . always state the iou thr. counting → recall (miss = under-count). security alert → precision . cctv challenges small/far (↑res, fpn, tile) · occlusion (head detect, soft-nms, density §11) · imbalance (focal) · domain shift (§14 train, §13 drift). q&a single-stage why? → one pass, real-time fps/camera. nms + low-iou hurts counting? → suppresses true nearby → under-count; soft-nms. map@[0.5:0.95]? → ap avg over iou 0.5–0.95, mean over classes. counting → precision or recall? → recall.","words":282},{"path":"14-deep-learning-for-video/tracking.md","title":"Multi-Object Tracking","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"multi-object-tracking\">Multi-Object Tracking<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Detection = this frame; <strong>tracking = stable IDs over time<\/strong>. IDs make count/dwell/flow/events possible. Tracking quality <strong>bounds<\/strong> all §11/§12 numbers (noisy queue time = usually ID switches).<\/div><\/div>\n<h2 id=\"why\">Why<\/h2>\n<ul><li>Count → needs IDs (else recount every frame).<\/li><li>Dwell/queue = last_seen − first_seen for one ID.<\/li><li>Direction/flow → needs trajectory.<\/li><li>Loitering → \"same person &gt; T sec\".<\/li><\/ul>\n<h2 id=\"core-tracking-by-detection\">Core = tracking-by-detection<\/h2>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <span class=\"node\">predict<span class=\"nsub\">track's next position — motion model<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">match detections ↔ tracks<span class=\"nsub\">cost = IoU and/or appearance · solved by Hungarian (optimal assignment)<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node out\">update<span class=\"nsub\">update matched · birth new · kill stale<\/span><\/span>\n  <\/div>\n<\/div>\n<ul><li><strong>Kalman<\/strong> = motion model (constant-velocity predict + smooth + bridge short gaps).<\/li><li><strong>Hungarian<\/strong> = optimal one-to-one detection↔track assignment.<\/li><li>Kalman + Hungarian = <strong>SORT<\/strong>.<\/li><\/ul>\n<h2 id=\"family-tree-each-fixes-the-last\">Family tree (each fixes the last)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Tracker<\/th><th>Adds<\/th><th>Use<\/th><\/tr><\/thead><tbody><tr><td><strong>SORT<\/strong><\/td><td>Kalman+Hungarian, IoU only<\/td><td>sparse, few crossings<\/td><\/tr><tr><td><strong>DeepSORT<\/strong><\/td><td>+ appearance <strong>ReID<\/strong> in cost<\/td><td>occlusion/crossings<\/td><\/tr><tr><td><strong>ByteTrack<\/strong><\/td><td>also match <strong>low-score<\/strong> detections (2nd pass)<\/td><td>crowded — recovers IDs thru occlusion, cheap, no heavy ReID<\/td><\/tr><tr><td>OC-SORT/BoT-SORT<\/td><td>better motion / camera-motion comp<\/td><td>moving camera<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>ByteTrack trick:<\/strong> occluded person's box = low score; matching those recovers IDs through occlusion. Great edge answer.<\/p>\n<h2 id=\"reid\">ReID<\/h2>\n<ul><li>Appearance embedding → same person across gap/camera (+ foot point = cross-camera handoff, §11).<\/li><li><strong>Need:<\/strong> long occlusion, crossing paths, multi-camera, re-entry.<\/li><li><strong>Skip:<\/strong> sparse + short gaps (SORT/ByteTrack cheaper on edge).<\/li><li><strong>Privacy (§13):<\/strong> derived from a person → sensitive; but re-associates an <strong>unnamed<\/strong> track, not a name.<\/li><\/ul>\n<h2 id=\"metrics\">Metrics<\/h2>\n<ul><li><strong>MOTA<\/strong> — FP+miss+ID-switch in one (headline).<\/li><li><strong>IDF1<\/strong> — identity consistency (often more telling for analytics).<\/li><li><strong>ID switches<\/strong> — direct driver of count/dwell error.<\/li><li><strong>HOTA<\/strong> — modern detect vs association balance.<\/li><\/ul>\n<h2 id=\"cctv-gotchas\">CCTV gotchas<\/h2>\n<ul><li>Occlusion → ID switch → wrong count/dwell → ByteTrack/ReID/Kalman + K-of-N (§12).<\/li><li>Too dense → tracking hopeless → density + Little's Law (§11).<\/li><li>Low FPS breaks constant-velocity → association fails → budget FPS for tracker (§03).<\/li><\/ul>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>SORT's two algos? → Kalman (motion), Hungarian (assignment).<\/li><li>ByteTrack trick? → match low-conf detections → recover IDs thru occlusion, cheap.<\/li><li>ReID when/skip? → occlusion/cross-camera; skip sparse to save edge.<\/li><li>Identity-consistency metric? → IDF1 (watch ID switches).<\/li><\/ul>","toc":[{"level":2,"id":"why","text":"Why"},{"level":2,"id":"core-tracking-by-detection","text":"Core = tracking-by-detection"},{"level":2,"id":"family-tree-each-fixes-the-last","text":"Family tree (each fixes the last)"},{"level":2,"id":"reid","text":"ReID"},{"level":2,"id":"metrics","text":"Metrics"},{"level":2,"id":"cctv-gotchas","text":"CCTV gotchas"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"multi-object tracking 💡 tl;dr detection = this frame; tracking = stable ids over time . ids make count/dwell/flow/events possible. tracking quality bounds all §11/§12 numbers (noisy queue time = usually id switches). why count → needs ids (else recount every frame). dwell/queue = last_seen − first_seen for one id. direction/flow → needs trajectory. loitering → \"same person > t sec\". core = tracking-by-detection predict track's next position — motion model match detections ↔ tracks cost = iou and/or appearance · solved by hungarian (optimal assignment) update update matched · birth new · kill stale kalman = motion model (constant-velocity predict + smooth + bridge short gaps). hungarian = optimal one-to-one detection↔track assignment. kalman + hungarian = sort . family tree (each fixes the last) tracker adds use sort kalman+hungarian, iou only sparse, few crossings deepsort + appearance reid in cost occlusion/crossings bytetrack also match low-score detections (2nd pass) crowded — recovers ids thru occlusion, cheap, no heavy reid oc-sort/bot-sort better motion / camera-motion comp moving camera bytetrack trick: occluded person's box = low score; matching those recovers ids through occlusion. great edge answer. reid appearance embedding → same person across gap/camera (+ foot point = cross-camera handoff, §11). need: long occlusion, crossing paths, multi-camera, re-entry. skip: sparse + short gaps (sort/bytetrack cheaper on edge). privacy (§13): derived from a person → sensitive; but re-associates an unnamed track, not a name. metrics mota — fp+miss+id-switch in one (headline). idf1 — identity consistency (often more telling for analytics). id switches — direct driver of count/dwell error. hota — modern detect vs association balance. cctv gotchas occlusion → id switch → wrong count/dwell → bytetrack/reid/kalman + k-of-n (§12). too dense → tracking hopeless → density + little's law (§11). low fps breaks constant-velocity → association fails → budget fps for tracker (§03). q&a sort's two algos? → kalman (motion), hungarian (assignment). bytetrack trick? → match low-conf detections → recover ids thru occlusion, cheap. reid when/skip? → occlusion/cross-camera; skip sparse to save edge. identity-consistency metric? → idf1 (watch id switches).","words":336},{"path":"14-deep-learning-for-video/training-and-optimization.md","title":"Training & Optimization","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"training-optimization-for-the-edge\">Training &amp; Optimization for the Edge<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two opposing halves + a loop. <strong>Train<\/strong> = accurate on YOUR scene (data ≫ architecture). <strong>Optimize<\/strong> = fast on Jetson without losing that accuracy. <strong>Active learning<\/strong> = improve from own mistakes.<\/div><\/div>\n<h2 id=\"data-biggest-accuracy-lever-not-architecture\">Data = biggest accuracy lever (not architecture)<\/h2>\n<ul><li><strong>Domain match is everything<\/strong> — web images fail on CCTV (high angle, wide lens, IR, weather, blur). Collect/label from <strong>actual cameras + conditions<\/strong>.<\/li><li><strong>Labelling consistency<\/strong> (head vs body, occlusion policy) — noisy labels cap ceiling.<\/li><li><strong>Cover hard cases<\/strong> — night, crowds, occlusion, rare events.<\/li><\/ul>\n<h2 id=\"augmentation-cheap-generalization\">Augmentation (cheap generalization)<\/h2>\n<ul><li><strong>Geometric<\/strong> — flip/scale/crop/rotate (scale invariance).<\/li><li><strong>Photometric<\/strong> — brightness/contrast/hue/noise/blur/JPEG (lighting/weather/IR).<\/li><li><strong>Detection<\/strong> — <strong>mosaic<\/strong> (4 tiled, small objects+context), mixup, copy-paste, random-erase (occlusion).<\/li><li>Aim at your deploy conditions (simulate night/rain).<\/li><\/ul>\n<h2 id=\"transfer-learning-default-start\">Transfer learning (default start)<\/h2>\n<p>Start from ImageNet/COCO pretrained → <strong>fine-tune<\/strong> on your data. Less data/compute, better generalization. Freeze early layers (generic), adapt head. Scratch training on-site rarely justified.<\/p>\n<h2 id=\"usual-problems\">Usual problems<\/h2>\n<ul><li>Imbalance → focal loss / resample.<\/li><li>Overfit → more aug, dropout, weight decay, early stop.<\/li><li>Small objects → ↑res, FPN, tile.<\/li><li><strong>Eval on held-out SCENE/camera<\/strong>, not random frames (same-clip frames leak → inflated mAP).<\/li><\/ul>\n<h2 id=\"optimization-for-edge-03\">Optimization for edge (§03)<\/h2>\n<ul><li><strong>FP16<\/strong> — ~2× speed, tiny accuracy loss.<\/li><li><strong>INT8<\/strong> — bigger speedup, needs calibration, <strong>can drop mAP → measure<\/strong>.<ul><li><strong>PTQ<\/strong> — calibrate after training; fast, no retrain, small hit.<\/li><li><strong>QAT<\/strong> — simulate INT8 in training; recovers accuracy when PTQ too lossy.<\/li><\/ul><\/li><li><strong>Pruning<\/strong> — drop low-importance weights/channels + fine-tune.<\/li><li><strong>Distillation<\/strong> — small student mimics big teacher; keep accuracy at edge cost.<\/li><li><strong>TensorRT<\/strong> — fuse layers, autotune, precision → hardware engine. <strong>Re-measure mAP after<\/strong> (optimization that tanks accuracy = fail → §13 watches).<\/li><\/ul>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">train<span class=\"nsub\">transfer + aug<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">validate<span class=\"nsub\">held-out SCENE<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">optimize<span class=\"nsub\">FP16/INT8 PTQ→QAT · prune · distill<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">TensorRT engine<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">re-measure<span class=\"nsub\">mAP + latency<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">deploy<span class=\"nsub\">§13 canary<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">monitor drift<span class=\"nsub\">§13<\/span><\/span>\n  <\/div>\n<\/div>\n<h2 id=\"active-learning-improve-in-closed-site\">Active learning (improve in closed site)<\/h2>\n<p>Mine <strong>low-confidence<\/strong> + <strong>operator-flagged FPs<\/strong> (§12) → label just those → retrain → canary. How accuracy climbs on a locked-down site without endless labelling.<\/p>\n<h2 id=\"qa\">Q&amp;A<\/h2>\n<ul><li>Biggest accuracy lever? → domain-matched data + augmentation.<\/li><li>PTQ vs QAT? → PTQ first (fast, no retrain); QAT when INT8 drops mAP too far.<\/li><li>Held-out scene why? → same-clip frames leak → inflated metrics.<\/li><li>Improve on closed site? → active learning (low-conf + flagged FPs → label → retrain).<\/li><\/ul>","toc":[{"level":2,"id":"data-biggest-accuracy-lever-not-architecture","text":"Data = biggest accuracy lever (not architecture)"},{"level":2,"id":"augmentation-cheap-generalization","text":"Augmentation (cheap generalization)"},{"level":2,"id":"transfer-learning-default-start","text":"Transfer learning (default start)"},{"level":2,"id":"usual-problems","text":"Usual problems"},{"level":2,"id":"optimization-for-edge-03","text":"Optimization for edge (§03)"},{"level":2,"id":"active-learning-improve-in-closed-site","text":"Active learning (improve in closed site)"},{"level":2,"id":"qa","text":"Q&amp;A"}],"text":"training & optimization for the edge 💡 tl;dr two opposing halves + a loop. train = accurate on your scene (data ≫ architecture). optimize = fast on jetson without losing that accuracy. active learning = improve from own mistakes. data = biggest accuracy lever (not architecture) domain match is everything — web images fail on cctv (high angle, wide lens, ir, weather, blur). collect/label from actual cameras + conditions . labelling consistency (head vs body, occlusion policy) — noisy labels cap ceiling. cover hard cases — night, crowds, occlusion, rare events. augmentation (cheap generalization) geometric — flip/scale/crop/rotate (scale invariance). photometric — brightness/contrast/hue/noise/blur/jpeg (lighting/weather/ir). detection — mosaic (4 tiled, small objects+context), mixup, copy-paste, random-erase (occlusion). aim at your deploy conditions (simulate night/rain). transfer learning (default start) start from imagenet/coco pretrained → fine-tune on your data. less data/compute, better generalization. freeze early layers (generic), adapt head. scratch training on-site rarely justified. usual problems imbalance → focal loss / resample. overfit → more aug, dropout, weight decay, early stop. small objects → ↑res, fpn, tile. eval on held-out scene/camera , not random frames (same-clip frames leak → inflated map). optimization for edge (§03) fp16 — ~2× speed, tiny accuracy loss. int8 — bigger speedup, needs calibration, can drop map → measure . ptq — calibrate after training; fast, no retrain, small hit. qat — simulate int8 in training; recovers accuracy when ptq too lossy. pruning — drop low-importance weights/channels + fine-tune. distillation — small student mimics big teacher; keep accuracy at edge cost. tensorrt — fuse layers, autotune, precision → hardware engine. re-measure map after (optimization that tanks accuracy = fail → §13 watches). train transfer + aug validate held-out scene optimize fp16/int8 ptq→qat · prune · distill tensorrt engine re-measure map + latency deploy §13 canary monitor drift §13 active learning (improve in closed site) mine low-confidence + operator-flagged fps (§12) → label just those → retrain → canary. how accuracy climbs on a locked-down site without endless labelling. q&a biggest accuracy lever? → domain-matched data + augmentation. ptq vs qat? → ptq first (fast, no retrain); qat when int8 drops map too far. held-out scene why? → same-clip frames leak → inflated metrics. improve on closed site? → active learning (low-conf + flagged fps → label → retrain).","words":377}]};
/* Runtime app — no markdown engine, all content is pre-rendered in DATA. */
const PAGES = DATA.pages;
const byPath = {};
PAGES.forEach(p => byPath[p.path] = p);
let currentPath = null;

// --- live Jupyter playground link (served on the same host, port 8888) ---
const JUPYTER_PORT = 8888;
const JUPYTER_TOKEN = "koireader";   // matches run.sh / koi-jupyter service
function jupyterURL(){
  const proto = location.protocol === "file:" ? "http:" : location.protocol;
  const host = location.hostname || "localhost";
  return proto + "//" + host + ":" + JUPYTER_PORT + "/lab?token=" + JUPYTER_TOKEN;
}

// translucent tint from an accent hex — works on light AND dark backgrounds
function hexToRgba(hex, a){
  hex = (hex||"").replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex||"000000", 16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
}

/* ---------------------- persistent study-state store ---------------------- */
// localStorage is the instant/offline copy; /api/progress is shared by devices.
const STORE_KEY = "mlprep-v1";
function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(_){ return {}; } }
function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(_){} }
let STATE = loadStore();
let remoteReady = location.protocol === "file:";
let serverHasState = false;
let saveQueue = Promise.resolve();
let syncLabel = location.protocol === "file:" ? "local" : "connecting";
function normalizeState(s){
  s = s && typeof s === "object" ? s : {};
  s.done = s.done && typeof s.done === "object" ? s.done : {};
  s.cards = s.cards && typeof s.cards === "object" ? s.cards : {};
  s.pins = s.pins && typeof s.pins === "object" ? s.pins : {};
  s.analytics = s.analytics && typeof s.analytics === "object" ? s.analytics : {};
  s.last = typeof s.last === "string" ? s.last : null;
  return s;
}
STATE = normalizeState(STATE);
function hasStudyState(){
  return Object.keys(STATE.done).length || Object.keys(STATE.cards).length ||
    Object.keys(STATE.pins).length || Object.keys(STATE.analytics).length;
}
function mergeLegacyLocal(remote, local){
  let changed=false;
  const deleted=remote._deleted && typeof remote._deleted==="object" ? remote._deleted : {};
  ["done","cards","pins"].forEach(field=>{
    const tombstones=deleted[field] && typeof deleted[field]==="object" ? deleted[field] : {};
    Object.keys(local[field]||{}).forEach(key=>{
      if(!(key in remote[field]) && !(key in tombstones)){ remote[field][key]=local[field][key]; changed=true; }
    });
  });
  Object.keys(local.analytics||{}).forEach(key=>{
    if(!(key in remote.analytics)){ remote.analytics[key]=local.analytics[key]; changed=true; }
  });
  return changed;
}

/* ------------------------- per-page study analytics ------------------------ */
let trackedPagePath=null;
let trackedPageStartedAt=null;
let analyticsSaveTimer=null;
let analyticsPaintTimer=null;
function analyticsEntry(path){
  let a=STATE.analytics[path];
  if(!a || typeof a!=="object") a=STATE.analytics[path]={};
  a.seconds=Math.max(0, Number(a.seconds)||0);
  a.visits=Math.max(0, Math.floor(Number(a.visits)||0));
  a.lastVisited=Math.max(0, Number(a.lastVisited)||0);
  return a;
}
function pageSeconds(path){
  const a=analyticsEntry(path);
  let seconds=a.seconds;
  if(path===trackedPagePath && trackedPageStartedAt!==null && document.visibilityState==="visible"){
    seconds+=Math.max(0,Date.now()-trackedPageStartedAt)/1000;
  }
  return seconds;
}
function fmtMinutes(seconds){
  const mins=Math.max(0,seconds)/60;
  return (mins<10?mins.toFixed(1):Math.round(mins))+" min";
}
function persistPageAnalytics(path, beacon){
  if(!path) return;
  const change={op:"set",field:"analytics",key:path,value:analyticsEntry(path)};
  saveStore(STATE);
  if(!remoteReady || location.protocol==="file:" || (!serverHasState && !hasStudyState())) return;
  if(beacon && navigator.sendBeacon){
    try{
      navigator.sendBeacon("/api/progress",new Blob([JSON.stringify(change)],{type:"application/json"}));
      return;
    }catch(_){}
  }
  persist(change);
}
function flushTrackedPage(saveRemote){
  if(!trackedPagePath || trackedPageStartedAt===null) return;
  const now=Date.now();
  analyticsEntry(trackedPagePath).seconds+=Math.max(0,now-trackedPageStartedAt)/1000;
  trackedPageStartedAt=now;
  if(saveRemote) persistPageAnalytics(trackedPagePath,false); else saveStore(STATE);
}
function beginTrackedPage(){
  if(!trackedPagePath || trackedPageStartedAt!==null || document.visibilityState!=="visible") return;
  const a=analyticsEntry(trackedPagePath);
  a.visits++;
  a.lastVisited=Date.now();
  trackedPageStartedAt=Date.now();
  persistPageAnalytics(trackedPagePath,false);
}
function switchTrackedPage(path){
  if(path===trackedPagePath && trackedPageStartedAt!==null) return;
  flushTrackedPage(true);
  trackedPageStartedAt=null;
  trackedPagePath=path;
  beginTrackedPage();
}
function analyticsStatus(path){
  if(path==="README.md") return "Overview";
  if(isDone(path)) return "Completed";
  return analyticsEntry(path).visits?"In progress":"Not started";
}
function escAnalytics(s){
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function renderAnalyticsPanel(path){
  const old=document.getElementById("analyticsPanel"); if(old) old.remove();
  if(path!=="README.md") return;
  const content=document.getElementById("content"); if(!content) return;
  const pages=progressPages();
  const done=pages.filter(p=>isDone(p.path)).length;
  const panel=document.createElement("section");
  panel.id="analyticsPanel"; panel.className="analytics-panel";
  panel.innerHTML='<div class="analytics-overview-head"><div><span class="analytics-kicker">Study analytics</span>'+
    '<h2>Time on every page</h2><p>Counts only while this site is visible. Time and completion sync across devices.</p></div>'+
    '<div class="analytics-total"><strong id="analyticsTotalTime">0.0 min</strong><span>'+done+" / "+pages.length+' completed</span></div></div>'+
    '<div class="analytics-page-list">'+PAGES.map(p=>{
      const a=analyticsEntry(p.path), status=analyticsStatus(p.path);

  const first=content.firstElementChild;

  });

function persist(change){
  saveStore(STATE);
  if(!remoteReady || location.protocol === "file:" || (!serverHasState && !hasStudyState())) return;
  syncLabel = "saving"; refreshProgressUI();
  const body=JSON.stringify(change || {op:"replace", state:STATE});
  saveQueue=saveQueue.catch(()=>{}).then(async()=>{
    try{
      const r=await fetch("/api/progress", {method:"POST", headers:{"Content-Type":"application/json"}, body});
      if(!r.ok) throw new Error("HTTP "+r.status);
      serverHasState=true; syncLabel="synced";
    }catch(_){ syncLabel="local — sync unavailable"; }
    refreshProgressUI();
  });
}
async function syncProgress(){
  if(location.protocol === "file:") return;
  try{
    const r=await fetch("/api/progress", {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const payload=await r.json();
    let migrated=false;
    if(payload.exists){
      const remote=normalizeState(payload.state);
      migrated=mergeLegacyLocal(remote, STATE);
      STATE=remote; saveStore(STATE); serverHasState=true;
    }
    remoteReady=true; syncLabel="synced";
    if((!payload.exists && hasStudyState()) || migrated) persist({op:"replace", state:STATE});
  }catch(_){ remoteReady=true; syncLabel="local — sync unavailable"; }
}
// stable short hash for card ids
function hashStr(s){ let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))|0; return (h>>>0).toString(36); }

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;
  if(/\/$/.test(href)) href += "README.md";
  const base = curPath.split("/").slice(0,-1);
  href.split("/").forEach(p=>{
    if(p==="."||p==="") return;
    if(p==="..") base.pop(); else base.push(p);
  });
  return base.join("/");
}

function buildNav(){
  const nav=document.getElementById("nav");
  DATA.nav.forEach(sec=>{
    const wrap=document.createElement("div"); wrap.className="sec";
    wrap.style.setProperty("--card", sec.accent);
    const h=document.createElement("div"); h.className="sec-h";
    h.innerHTML='<span class="sec-ic">'+(sec.icon||"")+'</span> '+sec.label+
      '<span class="sec-count"></span>';
    wrap.appendChild(h);
    sec.items.forEach(it=>{
      const a=document.createElement("a");
      a.className="item"+(/README\.md$/.test(it.path)&&it.path.indexOf("/")>=0?" sub":"");
      a.textContent=it.title; a.href="#"+encodeURI(it.path);
      a.dataset.path=it.path;
      wrap.appendChild(a);
    });
    nav.appendChild(wrap);
  });
}

  switchTrackedPage(path);
  currentPath=path;
  setActive(path);
  // tint the page to its section accent (soft tint is translucent → theme-proof)
  const root=document.documentElement.style;
  if(pg.accent){ root.setProperty("--sec-accent", pg.accent); root.setProperty("--sec-accent-soft", hexToRgba(pg.accent, 0.16)); }

  renderAnalyticsPanel(path);

  renderPager(path);

/* -------- IoU explorer: drag a prediction box against ground truth -------- */
function initIoUWidget(){
  const host=document.getElementById("iou-widget"); if(!host) return;
  const W=340,H=240, A={x:95,y:65,w:150,h:110};   // fixed ground-truth box
  host.innerHTML=
   '<div class="bv-wrap"><svg class="bv-svg iou-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
     '<rect id="iou-inter" class="iou-inter"/>'+
     '<rect x="'+A.x+'" y="'+A.y+'" width="'+A.w+'" height="'+A.h+'" class="iou-a"/>'+
     '<rect id="iou-b" class="iou-b"/>'+
     '<text x="'+(A.x+7)+'" y="'+(A.y+17)+'" class="iou-tag-a">ground truth</text>'+
     '<text id="iou-blbl" class="iou-tag-b">prediction</text>'+
   '</svg>'+
   '<div class="bv-controls"><div class="bt-sliders">'+
     '<label>Prediction offset X <b id="iou-dxv">45</b> px<input id="iou-dx" type="range" min="-150" max="150" step="1" value="45"></label>'+
     '<label>Prediction offset Y <b id="iou-dyv">25</b> px<input id="iou-dy" type="range" min="-95" max="95" step="1" value="25"></label>'+
     '<label>Prediction size <b id="iou-sv">1.00</b>×<input id="iou-s" type="range" min="0.4" max="1.8" step="0.05" value="1"></label>'+
   '</div>'+
   '<div class="bv-metrics">'+
     '<div class="bv-m"><span class="bv-mlab">IoU</span><b id="iou-val">—</b></div>'+
     '<div class="bv-m"><span class="bv-mlab">Overlap of GT</span><b id="iou-ov">—</b></div>'+
     '<div class="bv-m"><span class="bv-mlab">@ 0.5 threshold</span><b id="iou-verdict" class="bv-diag">—</b></div>'+
   '</div></div></div>';
  const el=id=>host.querySelector("#"+id);
  function compute(){
    const dx=+el("iou-dx").value, dy=+el("iou-dy").value, s=+el("iou-s").value;
    const B={x:A.x+dx, y:A.y+dy, w:A.w*s, h:A.h*s};
    const b=el("iou-b");
    b.setAttribute("x",B.x); b.setAttribute("y",B.y); b.setAttribute("width",B.w); b.setAttribute("height",B.h);
    el("iou-blbl").setAttribute("x",B.x+7); el("iou-blbl").setAttribute("y",B.y+17);
    const ix=Math.max(A.x,B.x), iy=Math.max(A.y,B.y);
    const iw=Math.max(0,Math.min(A.x+A.w,B.x+B.w)-ix), ih=Math.max(0,Math.min(A.y+A.h,B.y+B.h)-iy);
    const inter=iw*ih, uni=A.w*A.h+B.w*B.h-inter, iou=uni>0?inter/uni:0;
    const ir=el("iou-inter");
    ir.setAttribute("x",ix); ir.setAttribute("y",iy); ir.setAttribute("width",iw); ir.setAttribute("height",ih);
    el("iou-dxv").textContent=dx; el("iou-dyv").textContent=dy; el("iou-sv").textContent=s.toFixed(2);
    el("iou-val").textContent=iou.toFixed(2);
    el("iou-ov").textContent=(inter/(A.w*A.h)*100).toFixed(0)+"%";
    const v=el("iou-verdict"), ok=iou>=0.5;
    v.textContent=ok?"match ✓":"miss ✗"; v.className="bv-diag "+(ok?"bv-good":"bv-bad");
  }
  ["iou-dx","iou-dy","iou-s"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

   '</div></div></div>';
  const el=id=>host.querySelector("#"+id);
  function compute(){
    let n=+el("cv-n").value; const k=+el("cv-k").value,s=+el("cv-s").value,p=+el("cv-p").value,L=+el("cv-l").value;
    el("cv-nv").textContent=n; el("cv-kv").textContent=k; el("cv-sv").textContent=s; el("cv-pv").textContent=p; el("cv-lv").textContent=L;
    const N0=n; let rf=1, jump=1; const sizes=[n];
    for(let i=0;i<L;i++){
      const out=Math.floor((n+2*p-k)/s)+1;
      rf=rf+(k-1)*jump; jump=jump*s; n=Math.max(1,out); sizes.push(n);
    }
    el("cv-chain").innerHTML=sizes.map((v,i)=>'<span class="node ghost conv-node">'+v+'²</span>'+(i<sizes.length-1?'<span class="arw tiny"></span>':'')).join("");

  }

  compute();
}

/* ============================ flashcards / SRS ============================= */
// Turn each quiz <details.qa> into a gradeable card (Got it / Missed),
// persisted in STATE.cards. Adds shuffle + "review misses only" + a counter.
function cardKey(path, q){ return path + "#" + hashStr(q); }
function initFlashcards(pg){
  const content=document.getElementById("content");
  const cards=[...content.querySelectorAll("details.qa")];
  if(!cards.length) return;
  cards.forEach(d=>{
    const q=(d.querySelector("summary")?.textContent||"").trim();
    const key=cardKey(pg.path, q);
    d.dataset.key=key;
    const grade=STATE.cards[key];
    d.classList.toggle("known", grade===1);
    d.classList.toggle("missed", grade===-1);
    const body=d.querySelector(".qa-body");
    if(body && !body.querySelector(".card-grade")){
      const bar=document.createElement("div");
      bar.className="card-grade";
      bar.innerHTML='<button class="cg cg-known" data-g="1">✓ Got it</button>'+
        '<button class="cg cg-missed" data-g="-1">✗ Missed</button>'+
        '<button class="cg cg-clear" data-g="0">clear</button>';
      body.appendChild(bar);
    }
  });
  updateQuizStats(pg);
}
function gradeCard(d, g, pg){
  const key=d.dataset.key; if(!key) return;
  if(g===0) delete STATE.cards[key]; else STATE.cards[key]=g;
  persist({op:"set", field:"cards", key, value:g});
  d.classList.toggle("known", g===1);
  d.classList.toggle("missed", g===-1);
  updateQuizStats(pg);
}
function updateQuizStats(pg){
  const content=document.getElementById("content");
  const cards=[...content.querySelectorAll("details.qa")];
  const total=cards.length;
  let known=0, missed=0;
  cards.forEach(d=>{ if(d.classList.contains("known"))known++; else if(d.classList.contains("missed"))missed++; });
  const el=document.getElementById("quizStats");
  if(el) el.innerHTML='<b class="qs-known">'+known+'</b> mastered · <b class="qs-missed">'+missed+
    '</b> missed · '+(total-known-missed)+' left <span class="qs-total">('+total+' cards)</span>';
}
// filter: "all" | "misses" | "unseen"
function applyQuizFilter(mode){
  const content=document.getElementById("content");
  content.querySelectorAll("details.qa").forEach(d=>{
    let show=true;
    if(mode==="misses") show=d.classList.contains("missed");
    else if(mode==="unseen") show=!d.classList.contains("known") && !d.classList.contains("missed");
    d.classList.toggle("qa-hide", !show);
  });
}
function shuffleCards(){
  const content=document.getElementById("content");
  // shuffle within each H2 group so section headers still make sense
  const kids=[...content.children];
  let group=[];
  const flush=()=>{
    for(let i=group.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [group[i],group[j]]=[group[j],group[i]]; }
    group.forEach(n=>content.appendChild(n));
    group=[];
  };
  kids.forEach(n=>{
    if(n.tagName==="H2"||n.tagName==="H1"||n.tagName==="HR"){ flush(); content.appendChild(n); }
    else if(n.classList.contains("qa")) group.push(n);
    else { flush(); content.appendChild(n); }
  });
  flush();
}

/* ============================ progress tracking =========================== */
function isDone(path){ return !!STATE.done[path]; }
function setDone(path, v){ if(v) STATE.done[path]=true; else delete STATE.done[path]; persist({op:"set", field:"done", key:path, value:v}); refreshProgressUI(); renderResume(); }
function markVisited(path){
  if(path!=="README.md"){
    STATE.last=path;
    persist({op:"set", field:"last", value:path});
  } else saveStore(STATE);
  setActiveDone();
  renderPageStatus(path);
  refreshProgressUI();
  renderResume();
}
// count only real content pages (exclude the home overview) toward totals
function progressPages(){ return PAGES.filter(p=>p.path!=="README.md"); }
function refreshProgressUI(){
  const all=progressPages();
  const done=all.filter(p=>isDone(p.path)).length;
  const pct=all.length?Math.round(done/all.length*100):0;
  const bar=document.getElementById("progBar"), lbl=document.getElementById("progLbl");
  if(bar) bar.style.width=pct+"%";
  if(lbl) lbl.textContent=done+" / "+all.length+" pages · "+pct+"% · "+syncLabel;
  // per-item checks + per-section counts in the nav
  document.querySelectorAll("nav a.item").forEach(a=>{
    a.classList.toggle("done", isDone(a.dataset.path));
    a.classList.toggle("pinned", !!STATE.pins[a.dataset.path]);
  });
  document.querySelectorAll("nav .sec").forEach(secEl=>{
    const links=[...secEl.querySelectorAll("a.item")].filter(a=>a.dataset.path!=="README.md" || secEl.querySelectorAll("a.item").length===1);
    const count=secEl.querySelector(".sec-count");
    if(count){
      const d=links.filter(a=>isDone(a.dataset.path)).length;
      count.textContent=d+"/"+links.length;
      count.classList.toggle("all-done", d===links.length && links.length>0);
    }
  });
}
function setActiveDone(){
  document.querySelectorAll("nav a.item").forEach(a=>a.classList.toggle("done", isDone(a.dataset.path)));
}
// A small status strip appended under the pager: mark complete + next.
function renderPageStatus(path){
  const existing=document.querySelector(".page-status"); if(existing) existing.remove();
  if(path==="README.md") return; // home has no "complete" concept
  const host=document.getElementById("pager");
  if(!host) return;
  const done=isDone(path);
  const pinned=!!STATE.pins[path];
  const strip=document.createElement("div");
  strip.className="page-status";
  strip.innerHTML='<div class="page-time-summary"><span>Time on this page</span><strong id="pageTimeValue">'+
    fmtMinutes(pageSeconds(path))+'</strong></div>'+
    '<button class="complete-btn'+(done?" is-done":"")+'" id="completeBtn">'+
    (done?"✓ Completed — click to unmark":"Mark this page complete")+'</button>'+
    '<button class="pin-btn'+(pinned?" is-pinned":"")+'" id="pinBtn" aria-pressed="'+pinned+'">'+
    (pinned?"★ Pinned":"☆ Pin page")+'</button>';
  host.parentNode.insertBefore(strip, host);
  strip.querySelector("#completeBtn").onclick=()=>{
    setDone(path, !isDone(path));
    renderPager(path);            // re-render pager block…
    const old=document.querySelector(".page-status"); if(old) old.remove();
    renderPageStatus(path);       // …and this strip
  };
  strip.querySelector("#pinBtn").onclick=()=>{
    const value=!STATE.pins[path];
    if(value) STATE.pins[path]=true; else delete STATE.pins[path];
    persist({op:"set", field:"pins", key:path, value}); refreshProgressUI(); renderResume(); renderPageStatus(path);
  };
}

/* =============================== study timer ============================== */
// Global floating timer that survives SPA navigation (lives outside #content).
const Timer=(function(){
  let total=25*60, left=25*60, running=false, tick=null;
  function fmt(s){ const m=Math.floor(s/60), ss=s%60; return m+":"+(ss<10?"0":"")+ss; }
  function paint(){
    const t=document.getElementById("timerTime");
    const ring=document.getElementById("timerRing");
    if(t) t.textContent=fmt(left);
    if(ring){ const frac=total?left/total:0; ring.style.background=
      "conic-gradient(var(--accent) "+(frac*360)+"deg, var(--border) 0)"; }
    const panel=document.getElementById("timerPanel");
    if(panel) panel.classList.toggle("done", left<=0);
    const pb=document.getElementById("timerPlay"); if(pb) pb.textContent=running?"❚❚":"▶";
  }
  function step(){ if(left>0){ left--; if(left<=0){ stop(); flash(); } paint(); } }
  function flash(){ const p=document.getElementById("timerPanel"); if(p){ p.classList.add("ring"); setTimeout(()=>p.classList.remove("ring"),3000);} }
  function start(){ if(running||left<=0) return; running=true; tick=setInterval(step,1000); paint(); }
  function stop(){ running=false; if(tick) clearInterval(tick); tick=null; paint(); }
  function toggle(){ running?stop():start(); }
  function reset(sec){ stop(); total=sec; left=sec; paint(); }
  function open(){ const p=document.getElementById("timerPanel"); if(p){ p.classList.add("show"); paint(); } }
  function close(){ const p=document.getElementById("timerPanel"); if(p) p.classList.remove("show"); }
  return { start, stop, toggle, reset, open, close, paint };
})();
function initTimer(){
  const launch=document.getElementById("timerBtn");
  if(launch) launch.onclick=()=>Timer.open();
  const panel=document.getElementById("timerPanel");
  if(!panel) return;
  panel.querySelector("#timerPlay").onclick=()=>Timer.toggle();
  panel.querySelector("#timerClose").onclick=()=>Timer.close();
  panel.querySelectorAll(".timer-preset").forEach(b=>{
    b.onclick=()=>{ Timer.reset(+b.dataset.min*60); panel.querySelectorAll(".timer-preset").forEach(x=>x.classList.toggle("sel",x===b)); };
  });
  Timer.paint();
}

function go(path){ location.hash="#"+encodeURI(path); }
function onHash(){
  let raw=decodeURI(location.hash.replace(/^#/,""));
  loadPage(raw || "README.md");
}

// internal links + TOC anchors
document.addEventListener("click", e=>{
  const anchor=e.target.closest("a[data-anchor]");
  if(anchor){ e.preventDefault(); const el=document.getElementById(anchor.dataset.anchor); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); return; }
  const a=e.target.closest("a.mdlink");
  if(!a) return;
  const href=a.getAttribute("data-href");
  if(href==="JUPYTER"){ e.preventDefault(); window.open(jupyterURL(), "_blank", "noopener"); return; }
  e.preventDefault();
  const target=resolvePath(currentPath||"README.md", href);
  if(target) go(target);
});

/* ---------------------------------- search --------------------------------- */
const searchBox=document.getElementById("search");
const panel=document.getElementById("searchpanel");
let selIndex=-1, results=[];

function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function snippet(text, q){
  const i=text.indexOf(q); if(i<0) return text.slice(0,120)+"…";
  const s=Math.max(0,i-50), e=Math.min(text.length,i+q.length+70);
  let frag=(s>0?"…":"")+text.slice(s,e)+(e<text.length?"…":"");
  return frag.replace(new RegExp(escRe(q),"ig"), m=>"<mark>"+m+"</mark>");
}
function runSearch(){
  const q=searchBox.value.trim().toLowerCase();
  if(q.length<2){ panel.classList.remove("show"); return; }
  results=PAGES.filter(p=>p.text.indexOf(q)>=0 || p.title.toLowerCase().indexOf(q)>=0).slice(0,40);
  selIndex=-1;
  if(!results.length){ panel.innerHTML='<div class="empty">No matches for “'+q+'”.</div>'; panel.classList.add("show"); return; }
  panel.innerHTML=results.map((p,k)=>
    '<a class="sr" data-k="'+k+'" data-path="'+p.path+'" href="#'+encodeURI(p.path)+'">'+
    '<div class="t">'+p.title+' <span style="color:var(--muted);font-weight:400">· '+p.section+'</span></div>'+
    '<div class="c">'+snippet(p.text,q)+'</div></a>').join("");
  panel.classList.add("show");
}
searchBox.addEventListener("input", runSearch);
searchBox.addEventListener("focus", ()=>{ if(searchBox.value.trim().length>=2) runSearch(); });
panel.addEventListener("click", e=>{ const r=e.target.closest(".sr"); if(r){ e.preventDefault(); go(r.dataset.path); closeSearch(); } });
function closeSearch(){ panel.classList.remove("show"); }
document.addEventListener("click", e=>{ if(!panel.contains(e.target) && e.target!==searchBox && !e.target.closest("#searchBtn")) closeSearch(); });
searchBox.addEventListener("keydown", e=>{
  if(!panel.classList.contains("show")) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); selIndex=Math.min(results.length-1,selIndex+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); selIndex=Math.max(0,selIndex-1); }
  else if(e.key==="Enter"){ e.preventDefault(); if(results[selIndex]){ go(results[selIndex].path); closeSearch(); searchBox.blur(); } return; }
  else if(e.key==="Escape"){ closeSearch(); searchBox.blur(); return; }
  panel.querySelectorAll(".sr").forEach((el,i)=>el.classList.toggle("sel", i===selIndex));
  const sel=panel.querySelector(".sr.sel"); if(sel) sel.scrollIntoView({block:"nearest"});
});

/* ---------------------- navigation visibility + drawer --------------------- */
const sidebar=document.getElementById("sidebar"), scrim=document.getElementById("scrim");
const appShell=document.querySelector(".app"), navMedia=matchMedia("(max-width:880px)");
const NAV_HIDDEN_KEY="koi-nav-hidden-v1";
let navHiddenPreference=false;
try{navHiddenPreference=localStorage.getItem(NAV_HIDDEN_KEY)==="1";}catch(_){}
function saveNavPreference(){try{localStorage.setItem(NAV_HIDDEN_KEY,navHiddenPreference?"1":"0");}catch(_){}}
function applyNavPreference(){
  const collapsed=!navMedia.matches&&navHiddenPreference;
  appShell.classList.toggle("nav-hidden",collapsed);
  const show=document.getElementById("navShow");
  if(show) show.setAttribute("aria-expanded",collapsed?"false":"true");
}
function openSidebar(){sidebar.classList.add("open");scrim.classList.add("show");revealActiveNav(document.querySelector("nav a.item.active"));}
function closeSidebar(){sidebar.classList.remove("open");scrim.classList.remove("show");}
document.getElementById("navHide").addEventListener("click",()=>{
  if(navMedia.matches){closeSidebar();return;}
  navHiddenPreference=true;saveNavPreference();applyNavPreference();
});
document.getElementById("navShow").addEventListener("click",()=>{
  navHiddenPreference=false;saveNavPreference();applyNavPreference();
  revealActiveNav(document.querySelector("nav a.item.active"));
});
if(navMedia.addEventListener) navMedia.addEventListener("change",applyNavPreference);
else navMedia.addListener(applyNavPreference);
applyNavPreference();
document.getElementById("menu").addEventListener("click", openSidebar);
document.getElementById("searchBtn").addEventListener("click", ()=>{ openSidebar(); setTimeout(()=>searchBox.focus(),260); });
scrim.addEventListener("click", closeSidebar);

/* ------------------------- resume + pinned shortcuts ---------------------- */
function resumePage(){
  const last=STATE.last && byPath[STATE.last];
  if(last && last.path!=="README.md" && !isDone(last.path)) return last;
  const pages=progressPages();
  if(!pages.length) return null;
  const lastIndex=last ? PAGES.findIndex(p=>p.path===last.path) : -1;
  return pages.find(p=>PAGES.indexOf(p)>lastIndex && !isDone(p.path)) || pages.find(p=>!isDone(p.path)) || null;
}
function renderResume(){
  const slot=document.getElementById("resumeSlot"); if(!slot) return;
  const resume=resumePage();
  const pinned=PAGES.filter(p=>STATE.pins[p.path]);
  let html="";
  if(resume && resume.path!==currentPath){
    html+='<a class="resume-link" href="#'+encodeURI(resume.path)+'">→ Continue: '+resume.title+'</a>';
  }
  if(pinned.length){
    html+='<div class="pinned-block"><div class="pinned-title">Pinned pages</div>'+pinned.map(p=>
      '<a class="pinned-link" href="#'+encodeURI(p.path)+'"><span>★</span>'+p.title+'</a>').join("")+'</div>';
  }
  slot.innerHTML=html;
}

http.server <span class=\"tok-number\">9000<\/span>\nRestart=always\nUser=ajmalrasi\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\n<span class=\"tok-command\">sudo<\/span> systemctl daemon-reload\n<span class=\"tok-command\">sudo<\/span> systemctl enable <span class=\"tok-flag\">--now<\/span> koi-prep<\/code><\/pre>\n<p>Now it starts on boot and restarts if it crashes. Check it: <code>systemctl status koi-prep<\/code>. Logs: <code>journalctl -u koi-prep -f<\/code>.<\/p>\n<blockquote><p>Adjust <code>WorkingDirectory<\/code> and <code>User<\/code> to where you copied the folder.<\/p><\/blockquote>\n<h2 id=\"option-3-nginx-if-you-already-run-it\">Option 3: nginx (if you already run it)<\/h2>\n<pre><code class=\"language-nginx\">server {\n    listen 80;\n    root /home/ajmalrasi/ml-interview-prep/computer-vision-prep;\n    index index.html;\n    location / { try_files $uri $uri/ =404; }\n}<\/code><\/pre>\n<p>Drop that in <code>/etc/nginx/sites-available/koi-prep<\/code>, symlink to <code>sites-enabled<\/code>, <code>sudo nginx -t &amp;&amp; sudo systemctl reload nginx<\/code>. Then browse to the Pi's IP on port 80.<\/p>\n<h2 id=\"first-time-setup-on-the-pi\">First-time setup on the Pi<\/h2>\n<p>Clone the monorepo once (HTTPS — the repo is public, no key needed):<\/p>\n<pre><code class=\"language-bash\">git clone https://github.com/ajmalrasi/ml-interview-prep.git /home/ajmalrasi/ml-interview-prep<\/code><\/pre>\n<p>The <code>koi-prep<\/code> service already points its <code>WorkingDirectory<\/code> at <code>ml-interview-prep/computer-vision-prep<\/code>, so nothing else is needed.<\/p>\n<h2 id=\"editing-redeploying\">Editing / redeploying<\/h2>\n<p>The Pi has <strong>no Node<\/strong>, and it doesn't need one — <code>index.html<\/code> is committed. Build on your laptop, push, then pull on the Pi:<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># on your laptop, in ml-interview-prep/computer-vision-prep<\/span>\n<span class=\"tok-command\">node<\/span> build.js                                  <span class=\"tok-comment\"># regenerates index.html<\/span>\ngit add <span class=\"tok-flag\">-A<\/span> &amp;&amp; git commit <span class=\"tok-flag\">-m<\/span> <span class=\"tok-string\">\"…\"<\/span> &amp;&amp; git push\nssh rpi <span class=\"tok-string\">'cd ml-interview-prep &amp;&amp; git pull'<\/span>      <span class=\"tok-comment\"># static re-serve, no restart<\/span><\/code><\/pre>\n<p>Only <code>daemon-reload<\/code> + <code>systemctl restart koi-prep<\/code> if you change the <code>.service<\/code> file itself.<\/p>\n<h2 id=\"notes\">Notes<\/h2>\n<ul><li><strong>Single self-contained file:<\/strong> all content is baked into <code>index.html<\/code>. It works<\/li><\/ul>\n<p>even by double-clicking the file (<code>file://<\/code>) — no server strictly required. The   server is only for sharing it on the network (e.g. to your phone).<\/p>\n<ul><li><strong>Fully offline:<\/strong> no CDN, no external fonts or scripts. Works on an air-gapped<\/li><\/ul>\n<p>device.<\/p>\n<ul><li><strong>Resource use:<\/strong> <code>python3 -m http.server<\/code> idles at near-zero CPU/RAM — fine on a<\/li><\/ul>\n<p>Pi Zero.<\/p>\n<ul><li><strong>Editing content:<\/strong> edit the <code>.md<\/code> files, then rebuild with <strong><code>node build.js<\/code><\/strong><\/li><\/ul>\n<p>to regenerate <code>index.html<\/code> (the <code>.md<\/code> files are the source of truth; <code>_site.css<\/code>,   <code>_app.js<\/code>, and <code>build.js<\/code> are the build inputs). If you don't have Node, you can   edit <code>index.html<\/code> directly instead.<\/p>\n<ul><li><strong>Quiz mode:<\/strong> on the <em>Drill Bank<\/em> page, hit \"Quiz me · hide answers\" to collapse<\/li><\/ul>\n<p>every answer, then tap a question to reveal it.<\/p>\n<ul><li><strong>Outline:<\/strong> long pages show an \"On this page\" jump list.<\/li><li><strong>Dark/light:<\/strong> toggle with the ◐ button; preference is remembered.<\/li><li><strong>Search:<\/strong> type in the box for instant full-text search across all pages<\/li><\/ul>\n<p>(↑/↓ to move, Enter to open).<\/p>\n<p>→ Back to the <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">Overview<\/a>.<\/p>","toc":[{"level":2,"id":"why-it-needs-a-server-not-just-double-click","text":"Why it needs a server (not just double-click)"},{"level":2,"id":"deployed-instance","text":"Deployed instance"},{"level":2,"id":"option-1-python-already-on-every-pi-30-seconds","text":"Option 1: Python (already on every Pi), 30 seconds"},{"level":2,"id":"option-2-always-on-with-systemd-survives-reboot","text":"Option 2: Always-on with systemd (survives reboot)"},{"level":2,"id":"option-3-nginx-if-you-already-run-it","text":"Option 3: nginx (if you already run it)"},{"level":2,"id":"first-time-setup-on-the-pi","text":"First-time setup on the Pi"},{"level":2,"id":"editing-redeploying","text":"Editing / redeploying"},{"level":2,"id":"notes","text":"Notes"}],"text":"run on a raspberry pi (or any edge device) 💡 tl;dr this site is just static files — one index.html plus the markdown. no build, no database, no internet. serve the folder with any tiny web server and open it in a browser. below: the 30-second way, plus an auto-start service so it's always on. why it needs a server (not just double-click) the page reads the .md files at runtime with fetch() . browsers block reading local files over file:// for security, so opening index.html directly shows a \"needs a web server\" notice. any http server fixes it — that's all a pi needs. deployed instance running on http://192.168.3.20:9000 — served by the koi-prep systemd service (auto-starts on boot). user: ajmalrasi , path: /home/ajmalrasi/ml-interview-prep/computer-vision-prep . this track lives in the monorepo github.com/ajmalrasi/ml-interview-prep (alongside ml-engineer-prep/ ). the pi holds one clone at /home/ajmalrasi/ml-interview-prep and deploys by git pull — the committed index.html is served directly, so the pi needs no node. see editing / redeploying below. source: https://github.com/ajmalrasi/ml-interview-prep option 1: python (already on every pi), 30 seconds cd /home/ajmalrasi/ml-interview-prep/computer-vision-prep python3 -m http.server 9000 then open http://localhost:9000 on the pi, or http://<pi-ip>:9000 from your laptop/phone on the same network (find the ip with hostname -i ). option 2: always-on with systemd (survives reboot) create the service: sudo tee /etc/systemd/system/koi-prep.service >/dev/null << 'eof' [unit] description=video intelligence interview prep site after=network.target [service] workingdirectory=/home/ajmalrasi/ml-interview-prep/computer-vision-prep execstart=/usr/bin/ python3 -m http.server 9000 restart=always user=ajmalrasi [install] wantedby=multi-user.target eof sudo systemctl daemon-reload sudo systemctl enable --now koi-prep now it starts on boot and restarts if it crashes. check it: systemctl status koi-prep . logs: journalctl -u koi-prep -f . adjust workingdirectory and user to where you copied the folder. option 3: nginx (if you already run it) server { listen 80; root /home/ajmalrasi/ml-interview-prep/computer-vision-prep; index index.html; location / { try_files $uri $uri/ =404; } } drop that in /etc/nginx/sites-available/koi-prep , symlink to sites-enabled , sudo nginx -t && sudo systemctl reload nginx . then browse to the pi's ip on port 80. first-time setup on the pi clone the monorepo once (https — the repo is public, no key needed): git clone https://github.com/ajmalrasi/ml-interview-prep.git /home/ajmalrasi/ml-interview-prep the koi-prep service already points its workingdirectory at ml-interview-prep/computer-vision-prep , so nothing else is needed. editing / redeploying the pi has no node , and it doesn't need one — index.html is committed. build on your laptop, push, then pull on the pi: # on your laptop, in ml-interview-prep/computer-vision-prep node build.js # regenerates index.html git add -a && git commit -m \"…\" && git push ssh rpi 'cd ml-interview-prep && git pull' # static re-serve, no restart only daemon-reload + systemctl restart koi-prep if you change the .service file itself. notes single self-contained file: all content is baked into index.html . it works even by double-clicking the file ( file:// ) — no server strictly required. the server is only for sharing it on the network (e.g. to your phone). fully offline: no cdn, no external fonts or scripts. works on an air-gapped device. resource use: python3 -m http.server idles at near-zero cpu/ram — fine on a pi zero. editing content: edit the .md files, then rebuild with node build.js to regenerate index.html (the .md files are the source of truth; _site.css , _app.js , and build.js are the build inputs). if you don't have node, you can edit index.html directly instead. quiz mode: on the drill bank page, hit \"quiz me · hide answers\" to collapse every answer, then tap a question to reveal it. outline: long pages show an \"on this page\" jump list. dark/light: toggle with the ◐ button; preference is remembered. search: type in the box for instant full-text search across all pages (↑/↓ to move, enter to open). → back to the overview .","words":623},{"path":"01-video-streaming/README.md","title":"Overview","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"01-video-streaming-fundamentals\">01: Video Streaming Fundamentals<\/h1>\n<p>The JD's #1 requirement: <em>\"Deep expertise in video streaming protocols (RTSP, WebRTC, FastRTC) and processing tools (FFmpeg, GStreamer). You know how to handle frame buffers, decoding, and encoding efficiently.\"<\/em><\/p>\n<p>This is the section to nail. Files in order:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"protocols-rtsp-webrtc.md\" href=\"#\">protocols-rtsp-webrtc.md<\/a> — RTSP vs WebRTC vs FastRTC, when each<\/li><li><a class=\"mdlink\" data-href=\"codecs-and-frames.md\" href=\"#\">codecs-and-frames.md<\/a> — H.264/H.265, I/P/B frames, why a dropped keyframe hurts<\/li><li><a class=\"mdlink\" data-href=\"decode-encode-pipeline.md\" href=\"#\">decode-encode-pipeline.md<\/a> — the journey from packet to numpy array, hardware decode<\/li><li><a class=\"mdlink\" data-href=\"frame-buffers-backpressure.md\" href=\"#\">frame-buffers-backpressure.md<\/a> — buffers, latency vs smoothness, drop strategy<\/li><\/ol>\n<p><strong>TL;DR for the whole section:<\/strong> A camera sends <em>compressed packets<\/em> over a <em>transport protocol<\/em>. You must <em>decode<\/em> them into raw frames (ideally on the GPU), hand frames to inference <em>fast enough to keep up<\/em>, and <em>drop frames<\/em> rather than pile up memory when you can't. Everything here is about that loop running forever without leaking or lagging.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"protocols-rtsp-webrtc.md\" href=\"#\">protocols-rtsp-webrtc.md<\/a><\/strong><\/p>","toc":[],"text":"01: video streaming fundamentals the jd's #1 requirement: \"deep expertise in video streaming protocols (rtsp, webrtc, fastrtc) and processing tools (ffmpeg, gstreamer). you know how to handle frame buffers, decoding, and encoding efficiently.\" this is the section to nail. files in order: protocols-rtsp-webrtc.md — rtsp vs webrtc vs fastrtc, when each codecs-and-frames.md — h.264/h.265, i/p/b frames, why a dropped keyframe hurts decode-encode-pipeline.md — the journey from packet to numpy array, hardware decode frame-buffers-backpressure.md — buffers, latency vs smoothness, drop strategy tl;dr for the whole section: a camera sends compressed packets over a transport protocol . you must decode them into raw frames (ideally on the gpu), hand frames to inference fast enough to keep up , and drop frames rather than pile up memory when you can't. everything here is about that loop running forever without leaking or lagging. → start: protocols-rtsp-webrtc.md","words":142},{"path":"01-video-streaming/protocols-rtsp-webrtc.md","title":"RTSP vs WebRTC vs FastRTC","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"rtsp-vs-webrtc-vs-fastrtc\">RTSP vs WebRTC vs FastRTC<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 200\" role=\"img\" aria-label=\"RTSP in from cameras, WebRTC out to browsers\"><rect class=\"dg-box\" x=\"28\" y=\"46\" width=\"168\" height=\"54\" rx=\"12\"/><text class=\"dg-label\" x=\"112\" y=\"71\" text-anchor=\"middle\">IP Cameras<\/text><text class=\"dg-sub\" x=\"112\" y=\"88\" text-anchor=\"middle\">emit RTSP<\/text><text class=\"dg-accent-tx\" x=\"248\" y=\"62\" text-anchor=\"middle\">RTSP<\/text><line class=\"dg-line\" x1=\"196\" y1=\"73\" x2=\"293\" y2=\"73\"/><polygon class=\"dg-arrow\" points=\"293,68 300,73 293,78\"/><rect class=\"dg-box dg-hot\" x=\"300\" y=\"36\" width=\"132\" height=\"92\" rx=\"12\"/><text class=\"dg-label\" x=\"366\" y=\"65\" text-anchor=\"middle\">Your System<\/text><text class=\"dg-sub\" x=\"366\" y=\"89\" text-anchor=\"middle\">decode · infer<\/text><text class=\"dg-sub\" x=\"366\" y=\"107\" text-anchor=\"middle\">· serve live<\/text><text class=\"dg-accent-tx\" x=\"486\" y=\"62\" text-anchor=\"middle\">WebRTC<\/text><line class=\"dg-line\" x1=\"432\" y1=\"73\" x2=\"533\" y2=\"73\"/><polygon class=\"dg-arrow\" points=\"533,68 540,73 533,78\"/><rect class=\"dg-box\" x=\"540\" y=\"46\" width=\"168\" height=\"54\" rx=\"12\"/><text class=\"dg-label\" x=\"624\" y=\"71\" text-anchor=\"middle\">Browsers<\/text><text class=\"dg-sub\" x=\"624\" y=\"88\" text-anchor=\"middle\">in-browser<\/text><text class=\"dg-sub\" x=\"360\" y=\"160\" text-anchor=\"middle\">RTSP in — pull from cameras, ~0.5–3s, rugged &amp; standard<\/text><text class=\"dg-sub\" x=\"360\" y=\"180\" text-anchor=\"middle\">WebRTC / FastRTC out — push to browsers, &lt;500ms, low-latency<\/text><\/svg><figcaption>RTSP in from cameras, WebRTC out to browsers<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> RTSP is how IP cameras stream (pull, RTP over UDP/TCP, ~0.5–3s latency). WebRTC is how browsers stream peer-to-peer (push, sub-500ms, NAT-traversing, encrypted by default). FastRTC is a thin Python wrapper that makes WebRTC easy to wire to ML code. KoiReader ingests cameras (<strong>RTSP in<\/strong>) and serves live results to browsers/operators/agents (<strong>WebRTC/FastRTC out<\/strong>). This page is the one to know cold — the JD is \"obsess over milliseconds,\" and these three protocols <em>are<\/em> the millisecond budget at the edges of the pipeline. The middle (GStreamer + DeepStream) is sections 02–03.<\/div><\/div>\n<h2 id=\"the-mental-model\">The mental model<\/h2>\n<p>Think of it like plumbing. <strong>RTSP<\/strong> is the industrial pipe bolted to a factory camera — rugged, standard, slightly slow. <strong>WebRTC<\/strong> is the flexible hose that snakes through any firewall to reach a browser, designed for real-time calls. <strong>FastRTC<\/strong> is the quick-connect fitting so you don't hand-thread the hose.<\/p>\n<p>One sentence that frames the whole page: <strong>all three carry media over RTP.<\/strong> RTSP <em>sets up<\/em> an RTP session and lets a camera push it to you; WebRTC <em>negotiates and encrypts<\/em> an RTP session between peers across NAT; FastRTC <em>generates<\/em> the WebRTC half in Python so your model sees numpy frames. Underneath, it's the same real-time transport — they differ in <strong>how the session is established, how it traverses the network, and who's allowed to talk to whom.<\/strong><\/p>\n<hr>\n<h2 id=\"rtsp-real-time-streaming-protocol\">RTSP (Real-Time Streaming Protocol)<\/h2>\n<p><strong>What it is.<\/strong> A <em>control<\/em> protocol — the \"VCR remote\": <code>OPTIONS<\/code>, <code>DESCRIBE<\/code>, <code>SETUP<\/code>, <code>PLAY<\/code>, <code>PAUSE<\/code>, <code>TEARDOWN<\/code>. RTSP itself carries <strong>no video<\/strong>. It negotiates <em>how<\/em> the media will flow, then the actual frames ride on <strong>RTP<\/strong>, with quality/timing feedback on <strong>RTCP<\/strong>. Think of RTSP as the phone call that arranges the delivery, and RTP as the truck that shows up.<\/p>\n<p><strong>The handshake (worth knowing line-by-line for interviews):<\/strong><\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 330\" role=\"img\" aria-label=\"RTSP handshake: the client sets up the session, then RTP delivers the video\"><rect class=\"dg-box\" x=\"58\" y=\"16\" width=\"184\" height=\"42\" rx=\"12\"/><text class=\"dg-label\" x=\"150\" y=\"35\" text-anchor=\"middle\">Your pipeline<\/text><text class=\"dg-sub\" x=\"150\" y=\"52\" text-anchor=\"middle\">(client)<\/text><rect class=\"dg-box\" x=\"478\" y=\"16\" width=\"184\" height=\"42\" rx=\"12\"/><text class=\"dg-label\" x=\"570\" y=\"35\" text-anchor=\"middle\">IP camera<\/text><text class=\"dg-sub\" x=\"570\" y=\"52\" text-anchor=\"middle\">(server)<\/text><line class=\"dg-strokeB\" x1=\"150\" y1=\"58\" x2=\"150\" y2=\"316\"/><line class=\"dg-strokeB\" x1=\"570\" y1=\"58\" x2=\"570\" y2=\"316\"/><line class=\"dg-line\" x1=\"150\" y1=\"92\" x2=\"563\" y2=\"92\"/><polygon class=\"dg-arrow\" points=\"563,87 570,92 563,97\"/><text class=\"dg-accent-tx\" x=\"360\" y=\"83\" text-anchor=\"middle\">OPTIONS<\/text><text class=\"dg-sub\" x=\"360\" y=\"107\" text-anchor=\"middle\">what can you do?<\/text><line class=\"dg-line\" x1=\"150\" y1=\"142\" x2=\"563\" y2=\"142\"/><polygon class=\"dg-arrow\" points=\"563,137 570,142 563,147\"/><text class=\"dg-accent-tx\" x=\"360\" y=\"133\" text-anchor=\"middle\">DESCRIBE  → SDP<\/text><text class=\"dg-sub\" x=\"360\" y=\"157\" text-anchor=\"middle\">codec · resolution<\/text><line class=\"dg-line\" x1=\"150\" y1=\"192\" x2=\"563\" y2=\"192\"/><polygon class=\"dg-arrow\" points=\"563,187 570,192 563,197\"/><text class=\"dg-accent-tx\" x=\"360\" y=\"183\" text-anchor=\"middle\">SETUP<\/text><text class=\"dg-sub\" x=\"360\" y=\"207\" text-anchor=\"middle\">pick UDP or TCP transport<\/text><line class=\"dg-line\" x1=\"150\" y1=\"242\" x2=\"563\" y2=\"242\"/><polygon class=\"dg-arrow\" points=\"563,237 570,242 563,247\"/><text class=\"dg-accent-tx\" x=\"360\" y=\"233\" text-anchor=\"middle\">PLAY<\/text><text class=\"dg-sub\" x=\"360\" y=\"257\" text-anchor=\"middle\">start sending<\/text><rect class=\"dg-hot\" x=\"150\" y=\"288\" width=\"420\" height=\"36\" rx=\"9\"/><text class=\"dg-label\" x=\"360\" y=\"311\" text-anchor=\"middle\">◀  RTP media + RTCP stats flow<\/text><text class=\"dg-sub\" x=\"360\" y=\"322\" text-anchor=\"middle\">RTSP sets up the session · RTP carries the actual video<\/text><\/svg><figcaption>RTSP handshake: the client sets up the session, then RTP delivers the video<\/figcaption><\/figure>\n<p>After <code>PLAY<\/code>, media flows as RTP and stats as RTCP; periodic keepalives (<code>GET_PARAMETER<\/code>/<code>OPTIONS<\/code>) hold the session open until <code>TEARDOWN<\/code>.<\/p>\n<p><strong>Pattern:<\/strong> <em>Pull.<\/em> Your pipeline dials out to <code>rtsp://user:pass@cam-ip:554/stream<\/code>. Port <strong>554<\/strong> is the RTSP control channel. Note the camera is the <em>server<\/em>; you are the <em>client<\/em>. That matters for firewalls: <strong>you<\/strong> initiate, so outbound rules are usually enough.<\/p>\n<p><strong>Transport choice (the classic interview fork):<\/strong><\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Mode<\/th><th>How<\/th><th>Latency<\/th><th>Loss behavior<\/th><th>When<\/th><\/tr><\/thead><tbody><tr><td><strong>RTP/UDP<\/strong><\/td><td>media on its own UDP ports<\/td><td>lowest<\/td><td>drops → tearing/artifacts, but never stalls<\/td><td>clean LAN, latency-critical<\/td><\/tr><tr><td><strong>RTP/TCP (interleaved)<\/strong><\/td><td>media multiplexed <em>inside<\/em> the RTSP TCP connection (<code>$<\/code> channel framing)<\/td><td>slightly higher<\/td><td>reliable, retransmits, survives loss<\/td><td>flaky factory WiFi, NAT/firewall, <strong>most production multi-cam<\/strong><\/td><\/tr><tr><td><strong>RTP/UDP multicast<\/strong><\/td><td>one stream, many subscribers<\/td><td>low<\/td><td>shared<\/td><td>many viewers, controlled network<\/td><\/tr><\/tbody><\/table><\/div>\n<p>In GStreamer you pin this with <code>protocols=tcp<\/code> on <code>rtspsrc<\/code>. Default behavior tries UDP first and falls back to TCP — which you usually want to make <em>deterministic<\/em> in production by forcing one.<\/p>\n<p><strong>RTP — what's actually in the packets.<\/strong> Each RTP packet has a header with a <strong>sequence number<\/strong> (detect loss/reordering), a <strong>timestamp<\/strong> (drive playback timing, derived from a 90 kHz clock for video), an <strong>SSRC<\/strong> (which source), and a <strong>payload type<\/strong> (which codec). An H.264 keyframe is too big for one packet, so it's <strong>fragmented (FU-A)<\/strong> across many RTP packets; the depayloader (<code>rtph264depay<\/code>) reassembles them using the sequence numbers and the marker bit.<\/p>\n<p><strong>RTCP — the feedback channel.<\/strong> Sender Reports and Receiver Reports carry packet-loss %, jitter, and round-trip estimates. This is also how a sender knows to back off, and how clock sync (lip-sync between audio/video) is maintained.<\/p>\n<p><strong>The jitter buffer.<\/strong> Packets arrive unevenly. A small buffer (e.g. <code>rtspsrc latency=200<\/code>) holds frames briefly to absorb jitter and reorder before decode. <strong>This knob is a direct latency-vs-smoothness trade<\/strong> — lower = less delay but more visible glitches under loss. Expect to be asked to reason about it.<\/p>\n<p><strong>Latency:<\/strong> ~500ms–3s end to end, dominated by camera-side encoder buffering, GOP size, and your jitter buffer. (GOP/keyframe interval is covered in <a class=\"mdlink\" data-href=\"codecs-and-frames.md\" href=\"#\">codecs-and-frames.md<\/a> — long GOP = more latency + worse recovery from loss.)<\/p>\n<p><strong>Auth &amp; discovery.<\/strong> RTSP auth is usually <strong>Digest<\/strong> (sometimes Basic) over the URL. Cameras are typically discovered/configured via <strong>ONVIF<\/strong> (a SOAP/WS standard) which then hands you the RTSP URL. Good detail to drop: \"I'd pull the RTSP URI via ONVIF rather than hardcode vendor-specific paths.\"<\/p>\n<p><strong>This is what ~95% of CCTV/industrial cameras speak.<\/strong> KoiReader's \"multiple RTSP streams\" requirement lives entirely here.<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># Inspect any camera before you build a pipeline:<\/span>\n<span class=\"tok-command\">ffprobe<\/span> <span class=\"tok-flag\">-rtsp_transport<\/span> tcp rtsp://user:pass@cam-ip:<span class=\"tok-number\">554<\/span>/stream\n<span class=\"tok-comment\"># A GStreamer RTSP source (more in section 02):<\/span>\nrtspsrc location=rtsp://... protocols=tcp latency=<span class=\"tok-number\">200<\/span> ! rtph264depay ! h264parse ! ...<\/code><\/pre>\n<hr>\n<h2 id=\"webrtc\">WebRTC<\/h2>\n<p><strong>What it is.<\/strong> A <em>full<\/em> real-time media stack built for <strong>browsers and peers<\/strong>. Where RTSP just sets up RTP, WebRTC bundles everything you need to get encrypted media across the hostile public internet with no plugins: NAT traversal, key exchange, encryption, congestion control, and recovery. It's the only one of the three a browser can speak natively (<code>RTCPeerConnection<\/code>).<\/p>\n<p><strong>The four phases of a connection<\/strong> (memorize this arc — it's the most common WebRTC interview question):<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 346\" role=\"img\" aria-label=\"The four phases of every WebRTC connection — signaling is the part you build\"><rect class=\"dg-box\" x=\"120\" y=\"20\" width=\"480\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"140\" y=\"45\">1 · SIGNALING<\/text><text class=\"dg-sub\" x=\"140\" y=\"65\">SDP offer / answer — through a server you build<\/text><line class=\"dg-line\" x1=\"360\" y1=\"78\" x2=\"360\" y2=\"93\"/><polygon class=\"dg-arrow\" points=\"354,93 366,93 360,100\"/><rect class=\"dg-box\" x=\"120\" y=\"100\" width=\"480\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"140\" y=\"125\">2 · ICE<\/text><text class=\"dg-sub\" x=\"140\" y=\"145\">gather host / STUN / TURN candidates, find a path through NAT<\/text><line class=\"dg-line\" x1=\"360\" y1=\"158\" x2=\"360\" y2=\"173\"/><polygon class=\"dg-arrow\" points=\"354,173 366,173 360,180\"/><rect class=\"dg-box\" x=\"120\" y=\"180\" width=\"480\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"140\" y=\"205\">3 · DTLS<\/text><text class=\"dg-sub\" x=\"140\" y=\"225\">handshake exchanges the encryption keys<\/text><line class=\"dg-line\" x1=\"360\" y1=\"238\" x2=\"360\" y2=\"253\"/><polygon class=\"dg-arrow\" points=\"354,253 366,253 360,260\"/><rect class=\"dg-box dg-hot\" x=\"120\" y=\"260\" width=\"480\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"140\" y=\"285\">4 · SRTP<\/text><text class=\"dg-sub\" x=\"140\" y=\"305\">encrypted media flows · congestion control · NACK / FEC<\/text><\/svg><figcaption>The four phases of every WebRTC connection — signaling is the part you build<\/figcaption><\/figure>\n<p>Signaling (the SDP offer/answer exchange) is the one piece WebRTC leaves to you — a WebSocket is the usual choice. The rest (ICE, DTLS, SRTP) the stack handles.<\/p>\n<p><strong>SDP offer/answer.<\/strong> The offer is a text blob describing \"here are my codecs (H.264/VP8/VP9/AV1/Opus), resolutions, ICE credentials, DTLS fingerprint.\" The answer says \"here's what I'll accept.\" You shuttle these two blobs through your <strong>signaling server<\/strong> — that's the part you own and the part WebRTC deliberately leaves undefined (use a WebSocket).<\/p>\n<p><strong>ICE / STUN / TURN — the NAT-traversal trio (know what each does):<\/strong><\/p>\n<ul><li><strong>ICE<\/strong> is the <em>framework<\/em> that tries connection candidates in priority order<\/li><\/ul>\n<p>until one works.<\/p>\n<ul><li><strong>STUN<\/strong> is a cheap reflection service: \"what's my public IP:port as seen from<\/li><\/ul>\n<p>outside?\" Lets two peers behind NAT find a <em>direct<\/em> path. Works for most networks.<\/p>\n<ul><li><strong>TURN<\/strong> is a <em>relay<\/em> of last resort: when both peers are behind symmetric NAT and<\/li><\/ul>\n<p>can't connect directly, media bounces through the TURN server. It costs bandwidth   and money, but it's why WebRTC \"always connects.\" <strong>In an enterprise/factory   network, plan for TURN<\/strong> — that's a senior-sounding point to raise.<\/p>\n<p><strong>Congestion control.<\/strong> WebRTC adapts bitrate in real time (Google Congestion Control, driven by TWCC/REMB feedback). Under a bad link it lowers resolution/bitrate to protect latency rather than buffering. This is the philosophical opposite of HLS: WebRTC sacrifices quality to stay live; HLS buffers to stay pretty.<\/p>\n<p><strong>One-to-many: you need a media server.<\/strong> Raw WebRTC is peer-to-peer (1:1). To fan one annotated feed out to many operators you put an <strong>SFU<\/strong> (Selective Forwarding Unit — e.g. mediasoup, Janus, LiveKit, Pion) in the middle: each sender uploads once, the SFU forwards to N viewers. Don't try to mesh N peers. Naming an SFU signals you've actually shipped this.<\/p>\n<p><strong>Data channels.<\/strong> WebRTC also gives you <code>RTCDataChannel<\/code> (SCTP over DTLS) — handy for shipping <strong>detection metadata / bounding boxes alongside the video<\/strong> to the same browser with the same low latency. Nice for an annotated operator UI.<\/p>\n<p><strong>Latency:<\/strong> typically <strong>100–500ms<\/strong> — the lowest of the three, end to end.<\/p>\n<p><strong>Why a vision team cares:<\/strong> serving a live annotated feed to a dashboard, a human-in-the-loop reviewer, a remote operator, or an agent — all in-browser, no install, sub-second.<\/p>\n<p><strong>Cost / honesty:<\/strong> many moving parts (signaling server, STUN, TURN relays, possibly an SFU). More to operate than \"point ffmpeg at a URL.\" That's the trade for browser reach + lowest latency.<\/p>\n<hr>\n<h2 id=\"fastrtc\">FastRTC<\/h2>\n<p><strong>What it is.<\/strong> A Python library (from the Gradio / Hugging Face ecosystem) that wraps WebRTC so you can stream audio/video <strong>to and from Python ML code in a few lines.<\/strong> It stands up the signaling, builds the peer connection, runs the ICE/DTLS dance for you, and hands your code <strong>frames as numpy arrays<\/strong> — then takes your processed frame back and sends it out over WebRTC.<\/p>\n<p><strong>The programming model<\/strong> (this is the bit that makes it click):<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># Conceptually: you write a handler that gets a frame and returns a frame.<\/span>\n<span class=\"tok-keyword\">from<\/span> fastrtc <span class=\"tok-keyword\">import<\/span> Stream\n\n<span class=\"tok-keyword\">def<\/span> detect(frame):            <span class=\"tok-comment\"># frame: HxWx3 numpy array (BGR/RGB)<\/span>\n    boxes = model(frame)      <span class=\"tok-comment\"># your DeepStream/YOLO/whatever inference<\/span>\n    <span class=\"tok-keyword\">return<\/span> draw(frame, boxes) <span class=\"tok-comment\"># annotated frame goes back out over WebRTC<\/span>\n\nStream(handler=detect, modality=<span class=\"tok-string\">\"video\"<\/span>).ui.launch()<\/code><\/pre>\n<p>You never touch SDP, ICE, or SRTP. FastRTC is to WebRTC what <code>requests<\/code> is to raw sockets — it collapses the boilerplate so the interesting code is the model loop.<\/p>\n<p><strong>Under the hood<\/strong> it builds on <code>aiortc<\/code> (the pure-Python WebRTC implementation) and typically uses Hugging Face's infra for the STUN/TURN/signaling so it \"just works\" from a notebook or a Spaces demo.<\/p>\n<p><strong>Why it's in the JD.<\/strong> It signals they want someone who can stand up a real-time <strong>WebRTC ↔ model<\/strong> loop <em>quickly<\/em> — for browser-facing demos, operator UIs, and agent-in-the-loop review — without hand-rolling the WebRTC stack. It's the modern Python-native path to the same place a custom <code>webrtcbin<\/code> pipeline would get you.<\/p>\n<p><strong>Honest, senior framing for the interview:<\/strong><\/p>\n<blockquote><p>\"I've built real-time inference serving with Gunicorn/Celery/Kafka and GStreamer/DeepStream pipelines. FastRTC is the Python-native way to wire a live WebRTC feed straight into a model and get numpy frames — I'd reach for it for browser-facing low-latency demos and operator UIs. For high-density, hardware-accelerated production fan-out I'd still drop to GStreamer <code>webrtcbin<\/code> or an SFU, but FastRTC gets a working loop up in an afternoon.\"<\/p><\/blockquote>\n<p><strong>Limits to be aware of (so you're not oversold):<\/strong> it's pure-Python WebRTC (<code>aiortc<\/code>), so it's great for prototypes, demos, and modest concurrency, but it's <strong>not<\/strong> the path for hundreds of hardware-decoded streams — that's GStreamer + NVDEC + DeepStream territory. Know which side of that line a given problem is on.<\/p>\n<hr>\n<h2 id=\"how-they-fit-together-the-koireader-path\">How they fit together: the KoiReader path<\/h2>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 200\" role=\"img\" aria-label=\"RTSP in from cameras, GStreamer + DeepStream in the middle, WebRTC out to people\"><rect class=\"dg-box\" x=\"12\" y=\"72\" width=\"118\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"71\" y=\"100\" text-anchor=\"middle\">Cameras<\/text><text class=\"dg-sub\" x=\"71\" y=\"117\" text-anchor=\"middle\">RTSP, pull<\/text><text class=\"dg-accent-tx\" x=\"170\" y=\"92\" text-anchor=\"middle\">RTSP<\/text><line class=\"dg-line\" x1=\"130\" y1=\"102\" x2=\"205\" y2=\"102\"/><polygon class=\"dg-arrow\" points=\"205,97 212,102 205,107\"/><rect class=\"dg-box\" x=\"212\" y=\"72\" width=\"128\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"276\" y=\"100\" text-anchor=\"middle\">GStreamer<\/text><text class=\"dg-sub\" x=\"276\" y=\"117\" text-anchor=\"middle\">rtspsrc · NVDEC<\/text><line class=\"dg-line\" x1=\"340\" y1=\"102\" x2=\"385\" y2=\"102\"/><polygon class=\"dg-arrow\" points=\"385,97 392,102 385,107\"/><rect class=\"dg-box dg-hot\" x=\"392\" y=\"72\" width=\"138\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"461\" y=\"98\" text-anchor=\"middle\">DeepStream<\/text><text class=\"dg-sub\" x=\"461\" y=\"117\" text-anchor=\"middle\">infer · track<\/text><text class=\"dg-accent-tx\" x=\"566\" y=\"92\" text-anchor=\"middle\">WebRTC<\/text><line class=\"dg-line\" x1=\"530\" y1=\"102\" x2=\"597\" y2=\"102\"/><polygon class=\"dg-arrow\" points=\"597,97 604,102 597,107\"/><rect class=\"dg-box\" x=\"560\" y=\"36\" width=\"150\" height=\"132\" rx=\"12\"/><text class=\"dg-label\" x=\"635\" y=\"58\" text-anchor=\"middle\">Deliver<\/text><text class=\"dg-sub\" x=\"635\" y=\"84\" text-anchor=\"middle\">WebRTC · SFU<\/text><text class=\"dg-sub\" x=\"635\" y=\"104\" text-anchor=\"middle\">FastRTC UI<\/text><text class=\"dg-sub\" x=\"635\" y=\"124\" text-anchor=\"middle\">HLS (broadcast<\/text><text class=\"dg-sub\" x=\"635\" y=\"142\" text-anchor=\"middle\">only)<\/text><text class=\"dg-sub\" x=\"300\" y=\"186\" text-anchor=\"middle\">RTSP in  ·  GStreamer + DeepStream in the middle  ·  WebRTC out<\/text><\/svg><figcaption>RTSP in from cameras, GStreamer + DeepStream in the middle, WebRTC out to people<\/figcaption><\/figure>\n<p><strong>RTSP in, WebRTC out<\/strong> is the headline. The same RTP machinery runs end to end; GStreamer is the universal adapter in the middle — <code>rtspsrc<\/code> on the ingress, <code>webrtcbin<\/code> on the egress — which is exactly why GStreamer + DeepStream are the <em>core<\/em> job and these protocols are the edges of it.<\/p>\n<hr>\n<h2 id=\"why-x-over-y-interview-gold\">Why X over Y (interview gold)<\/h2>\n<p><strong>RTSP vs WebRTC — when each?<\/strong> RTSP to <em>ingest from cameras<\/em> (that's what they emit; you're the client pulling). WebRTC to <em>deliver to browsers/peers/agents<\/em> with the lowest latency. A real system uses <strong>both<\/strong>: RTSP in, WebRTC out. They are not competitors — they live at opposite ends of the pipe.<\/p>\n<p><strong>Why not just HTTP (HLS/DASH) for delivery?<\/strong> HLS/DASH chunk video into segments (and a playlist) → typically <strong>6–30s<\/strong> latency (low-latency HLS claws it down to ~2–5s but still loses to WebRTC). Brilliant for Netflix-style scale and CDN caching, <strong>wrong for interactive/real-time<\/strong>. Rule of thumb: <strong>HLS = broadcast, WebRTC = conversation.<\/strong> If a human needs to <em>act<\/em> on what they see, WebRTC.<\/p>\n<p><strong>UDP vs TCP for RTSP?<\/strong> UDP = lowest latency, tolerates loss (rather skip a frame than wait). TCP = reliable, survives bad networks, what you pick when stability &gt; a few ms. Many cameras over flaky factory WiFi → <strong>force TCP<\/strong> for determinism.<\/p>\n<p><strong>Why does RTSP need a keepalive?<\/strong> RTSP sessions time out. You send periodic <code>GET_PARAMETER<\/code>/<code>OPTIONS<\/code> (or rely on RTCP) to keep the session alive, else the camera tears it down and you must reconnect — which ties directly into <a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">fault tolerance<\/a> (reconnect with backoff, watchdog on the stream).<\/p>\n<p><strong>What actually drives the latency number?<\/strong> Camera encoder buffer + <strong>GOP/keyframe interval<\/strong> + network + <strong>jitter buffer<\/strong> + decode + your processing. You rarely change the camera; the levers you own are the jitter buffer size, forcing TCP vs UDP, GOP request (if the camera honors it), and not stacking redundant queues in your own pipeline.<\/p>\n<p><strong>WebRTC connection fails — what do you check?<\/strong> Signaling reachable? STUN returning a reflexive candidate? Is a <strong>TURN<\/strong> server configured for symmetric-NAT cases? DTLS handshake completing? This sequence (the four phases above) is the debugging map.<\/p>\n<p><strong>Why is WebRTC encrypted and RTSP often not?<\/strong> WebRTC mandates DTLS-SRTP — encryption is non-optional. RTSP/RTP is frequently plaintext on a trusted camera LAN (RTSPS/SRTP exist but are less common). Security posture differs because their threat models differ: WebRTC crosses the public internet to a browser; camera RTSP usually doesn't leave the VLAN.<\/p>\n<hr>\n<h2 id=\"30-second-whiteboard-summary\">30-second whiteboard summary<\/h2>\n<blockquote><p>Cameras speak <strong>RTSP<\/strong> — a control protocol that sets up an <strong>RTP<\/strong> media session; I pull it over <strong>TCP<\/strong> in production for stability, with a small jitter buffer, ~1s latency. To deliver live annotated results to a browser I use <strong>WebRTC<\/strong>: SDP offer/answer over my own signaling server, <strong>ICE/STUN/TURN<\/strong> to cross NAT, <strong>DTLS-SRTP<\/strong> for encryption, ~200ms. For one-to-many I put an <strong>SFU<\/strong> in front. <strong>FastRTC<\/strong> is the fast Python path to that WebRTC loop when I want numpy frames into a model without writing the stack. The whole thing is <strong>RTSP in, WebRTC out<\/strong>, with GStreamer/DeepStream doing the work in the middle.<\/p><\/blockquote>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"codecs-and-frames.md\" href=\"#\">codecs-and-frames.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-mental-model","text":"The mental model"},{"level":2,"id":"rtsp-real-time-streaming-protocol","text":"RTSP (Real-Time Streaming Protocol)"},{"level":2,"id":"webrtc","text":"WebRTC"},{"level":2,"id":"fastrtc","text":"FastRTC"},{"level":2,"id":"how-they-fit-together-the-koireader-path","text":"How they fit together: the KoiReader path"},{"level":2,"id":"why-x-over-y-interview-gold","text":"Why X over Y (interview gold)"},{"level":2,"id":"30-second-whiteboard-summary","text":"30-second whiteboard summary"}],"text":"rtsp vs webrtc vs fastrtc ip cameras emit rtsp rtsp your system decode · infer · serve live webrtc browsers in-browser rtsp in — pull from cameras, ~0.5–3s, rugged & standard webrtc / fastrtc out — push to browsers, <500ms, low-latency rtsp in from cameras, webrtc out to browsers 💡 tl;dr rtsp is how ip cameras stream (pull, rtp over udp/tcp, ~0.5–3s latency). webrtc is how browsers stream peer-to-peer (push, sub-500ms, nat-traversing, encrypted by default). fastrtc is a thin python wrapper that makes webrtc easy to wire to ml code. koireader ingests cameras ( rtsp in ) and serves live results to browsers/operators/agents ( webrtc/fastrtc out ). this page is the one to know cold — the jd is \"obsess over milliseconds,\" and these three protocols are the millisecond budget at the edges of the pipeline. the middle (gstreamer + deepstream) is sections 02–03. the mental model think of it like plumbing. rtsp is the industrial pipe bolted to a factory camera — rugged, standard, slightly slow. webrtc is the flexible hose that snakes through any firewall to reach a browser, designed for real-time calls. fastrtc is the quick-connect fitting so you don't hand-thread the hose. one sentence that frames the whole page: all three carry media over rtp. rtsp sets up an rtp session and lets a camera push it to you; webrtc negotiates and encrypts an rtp session between peers across nat; fastrtc generates the webrtc half in python so your model sees numpy frames. underneath, it's the same real-time transport — they differ in how the session is established, how it traverses the network, and who's allowed to talk to whom. rtsp (real-time streaming protocol) what it is. a control protocol — the \"vcr remote\": options , describe , setup , play , pause , teardown . rtsp itself carries no video . it negotiates how the media will flow, then the actual frames ride on rtp , with quality/timing feedback on rtcp . think of rtsp as the phone call that arranges the delivery, and rtp as the truck that shows up. the handshake (worth knowing line-by-line for interviews): your pipeline (client) ip camera (server) options what can you do? describe → sdp codec · resolution setup pick udp or tcp transport play start sending ◀ rtp media + rtcp stats flow rtsp sets up the session · rtp carries the actual video rtsp handshake: the client sets up the session, then rtp delivers the video after play , media flows as rtp and stats as rtcp; periodic keepalives ( get_parameter / options ) hold the session open until teardown . pattern: pull. your pipeline dials out to rtsp://user:pass@cam-ip:554/stream . port 554 is the rtsp control channel. note the camera is the server ; you are the client . that matters for firewalls: you initiate, so outbound rules are usually enough. transport choice (the classic interview fork): mode how latency loss behavior when rtp/udp media on its own udp ports lowest drops → tearing/artifacts, but never stalls clean lan, latency-critical rtp/tcp (interleaved) media multiplexed inside the rtsp tcp connection ( $ channel framing) slightly higher reliable, retransmits, survives loss flaky factory wifi, nat/firewall, most production multi-cam rtp/udp multicast one stream, many subscribers low shared many viewers, controlled network in gstreamer you pin this with protocols=tcp on rtspsrc . default behavior tries udp first and falls back to tcp — which you usually want to make deterministic in production by forcing one. rtp — what's actually in the packets. each rtp packet has a header with a sequence number (detect loss/reordering), a timestamp (drive playback timing, derived from a 90 khz clock for video), an ssrc (which source), and a payload type (which codec). an h.264 keyframe is too big for one packet, so it's fragmented (fu-a) across many rtp packets; the depayloader ( rtph264depay ) reassembles them using the sequence numbers and the marker bit. rtcp — the feedback channel. sender reports and receiver reports carry packet-loss %, jitter, and round-trip estimates. this is also how a sender knows to back off, and how clock sync (lip-sync between audio/video) is maintained. the jitter buffer. packets arrive unevenly. a small buffer (e.g. rtspsrc latency=200 ) holds frames briefly to absorb jitter and reorder before decode. this knob is a direct latency-vs-smoothness trade — lower = less delay but more visible glitches under loss. expect to be asked to reason about it. latency: ~500ms–3s end to end, dominated by camera-side encoder buffering, gop size, and your jitter buffer. (gop/keyframe interval is covered in codecs-and-frames.md — long gop = more latency + worse recovery from loss.) auth & discovery. rtsp auth is usually digest (sometimes basic) over the url. cameras are typically discovered/configured via onvif (a soap/ws standard) which then hands you the rtsp url. good detail to drop: \"i'd pull the rtsp uri via onvif rather than hardcode vendor-specific paths.\" this is what ~95% of cctv/industrial cameras speak. koireader's \"multiple rtsp streams\" requirement lives entirely here. # inspect any camera before you build a pipeline: ffprobe -rtsp_transport tcp rtsp://user:pass@cam-ip: 554 /stream # a gstreamer rtsp source (more in section 02): rtspsrc location=rtsp://... protocols=tcp latency= 200 ! rtph264depay ! h264parse ! ... webrtc what it is. a full real-time media stack built for browsers and peers . where rtsp just sets up rtp, webrtc bundles everything you need to get encrypted media across the hostile public internet with no plugins: nat traversal, key exchange, encryption, congestion control, and recovery. it's the only one of the three a browser can speak natively ( rtcpeerconnection ). the four phases of a connection (memorize this arc — it's the most common webrtc interview question): 1 · signaling sdp offer / answer — through a server you build 2 · ice gather host / stun / turn candidates, find a path through nat 3 · dtls handshake exchanges the encryption keys 4 · srtp encrypted media flows · congestion control · nack / fec the four phases of every webrtc connection — signaling is the part you build signaling (the sdp offer/answer exchange) is the one piece webrtc leaves to you — a websocket is the usual choice. the rest (ice, dtls, srtp) the stack handles. sdp offer/answer. the offer is a text blob describing \"here are my codecs (h.264/vp8/vp9/av1/opus), resolutions, ice credentials, dtls fingerprint.\" the answer says \"here's what i'll accept.\" you shuttle these two blobs through your signaling server — that's the part you own and the part webrtc deliberately leaves undefined (use a websocket). ice / stun / turn — the nat-traversal trio (know what each does): ice is the framework that tries connection candidates in priority order until one works. stun is a cheap reflection service: \"what's my public ip:port as seen from outside?\" lets two peers behind nat find a direct path. works for most networks. turn is a relay of last resort: when both peers are behind symmetric nat and can't connect directly, media bounces through the turn server. it costs bandwidth and money, but it's why webrtc \"always connects.\" in an enterprise/factory network, plan for turn — that's a senior-sounding point to raise. congestion control. webrtc adapts bitrate in real time (google congestion control, driven by twcc/remb feedback). under a bad link it lowers resolution/bitrate to protect latency rather than buffering. this is the philosophical opposite of hls: webrtc sacrifices quality to stay live; hls buffers to stay pretty. one-to-many: you need a media server. raw webrtc is peer-to-peer (1:1). to fan one annotated feed out to many operators you put an sfu (selective forwarding unit — e.g. mediasoup, janus, livekit, pion) in the middle: each sender uploads once, the sfu forwards to n viewers. don't try to mesh n peers. naming an sfu signals you've actually shipped this. data channels. webrtc also gives you rtcdatachannel (sctp over dtls) — handy for shipping detection metadata / bounding boxes alongside the video to the same browser with the same low latency. nice for an annotated operator ui. latency: typically 100–500ms — the lowest of the three, end to end. why a vision team cares: serving a live annotated feed to a dashboard, a human-in-the-loop reviewer, a remote operator, or an agent — all in-browser, no install, sub-second. cost / honesty: many moving parts (signaling server, stun, turn relays, possibly an sfu). more to operate than \"point ffmpeg at a url.\" that's the trade for browser reach + lowest latency. fastrtc what it is. a python library (from the gradio / hugging face ecosystem) that wraps webrtc so you can stream audio/video to and from python ml code in a few lines. it stands up the signaling, builds the peer connection, runs the ice/dtls dance for you, and hands your code frames as numpy arrays — then takes your processed frame back and sends it out over webrtc. the programming model (this is the bit that makes it click): # conceptually: you write a handler that gets a frame and returns a frame. from fastrtc import stream def detect(frame): # frame: hxwx3 numpy array (bgr/rgb) boxes = model(frame) # your deepstream/yolo/whatever inference return draw(frame, boxes) # annotated frame goes back out over webrtc stream(handler=detect, modality= \"video\" ).ui.launch() you never touch sdp, ice, or srtp. fastrtc is to webrtc what requests is to raw sockets — it collapses the boilerplate so the interesting code is the model loop. under the hood it builds on aiortc (the pure-python webrtc implementation) and typically uses hugging face's infra for the stun/turn/signaling so it \"just works\" from a notebook or a spaces demo. why it's in the jd. it signals they want someone who can stand up a real-time webrtc ↔ model loop quickly — for browser-facing demos, operator uis, and agent-in-the-loop review — without hand-rolling the webrtc stack. it's the modern python-native path to the same place a custom webrtcbin pipeline would get you. honest, senior framing for the interview: \"i've built real-time inference serving with gunicorn/celery/kafka and gstreamer/deepstream pipelines. fastrtc is the python-native way to wire a live webrtc feed straight into a model and get numpy frames — i'd reach for it for browser-facing low-latency demos and operator uis. for high-density, hardware-accelerated production fan-out i'd still drop to gstreamer webrtcbin or an sfu, but fastrtc gets a working loop up in an afternoon.\" limits to be aware of (so you're not oversold): it's pure-python webrtc ( aiortc ), so it's great for prototypes, demos, and modest concurrency, but it's not the path for hundreds of hardware-decoded streams — that's gstreamer + nvdec + deepstream territory. know which side of that line a given problem is on. how they fit together: the koireader path cameras rtsp, pull rtsp gstreamer rtspsrc · nvdec deepstream infer · track webrtc deliver webrtc · sfu fastrtc ui hls (broadcast only) rtsp in · gstreamer + deepstream in the middle · webrtc out rtsp in from cameras, gstreamer + deepstream in the middle, webrtc out to people rtsp in, webrtc out is the headline. the same rtp machinery runs end to end; gstreamer is the universal adapter in the middle — rtspsrc on the ingress, webrtcbin on the egress — which is exactly why gstreamer + deepstream are the core job and these protocols are the edges of it. why x over y (interview gold) rtsp vs webrtc — when each? rtsp to ingest from cameras (that's what they emit; you're the client pulling). webrtc to deliver to browsers/peers/agents with the lowest latency. a real system uses both : rtsp in, webrtc out. they are not competitors — they live at opposite ends of the pipe. why not just http (hls/dash) for delivery? hls/dash chunk video into segments (and a playlist) → typically 6–30s latency (low-latency hls claws it down to ~2–5s but still loses to webrtc). brilliant for netflix-style scale and cdn caching, wrong for interactive/real-time . rule of thumb: hls = broadcast, webrtc = conversation. if a human needs to act on what they see, webrtc. udp vs tcp for rtsp? udp = lowest latency, tolerates loss (rather skip a frame than wait). tcp = reliable, survives bad networks, what you pick when stability > a few ms. many cameras over flaky factory wifi → force tcp for determinism. why does rtsp need a keepalive? rtsp sessions time out. you send periodic get_parameter / options (or rely on rtcp) to keep the session alive, else the camera tears it down and you must reconnect — which ties directly into fault tolerance (reconnect with backoff, watchdog on the stream). what actually drives the latency number? camera encoder buffer + gop/keyframe interval + network + jitter buffer + decode + your processing. you rarely change the camera; the levers you own are the jitter buffer size, forcing tcp vs udp, gop request (if the camera honors it), and not stacking redundant queues in your own pipeline. webrtc connection fails — what do you check? signaling reachable? stun returning a reflexive candidate? is a turn server configured for symmetric-nat cases? dtls handshake completing? this sequence (the four phases above) is the debugging map. why is webrtc encrypted and rtsp often not? webrtc mandates dtls-srtp — encryption is non-optional. rtsp/rtp is frequently plaintext on a trusted camera lan (rtsps/srtp exist but are less common). security posture differs because their threat models differ: webrtc crosses the public internet to a browser; camera rtsp usually doesn't leave the vlan. 30-second whiteboard summary cameras speak rtsp — a control protocol that sets up an rtp media session; i pull it over tcp in production for stability, with a small jitter buffer, ~1s latency. to deliver live annotated results to a browser i use webrtc : sdp offer/answer over my own signaling server, ice/stun/turn to cross nat, dtls-srtp for encryption, ~200ms. for one-to-many i put an sfu in front. fastrtc is the fast python path to that webrtc loop when i want numpy frames into a model without writing the stack. the whole thing is rtsp in, webrtc out , with gstreamer/deepstream doing the work in the middle. → next: codecs-and-frames.md","words":2339},{"path":"01-video-streaming/codecs-and-frames.md","title":"Codecs, GOP & I/P/B Frames","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"codecs-gop-and-ipb-frames\">Codecs, GOP, and I/P/B Frames<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"A GOP: one keyframe (I) then diffs (P/B)\"><rect class=\"dg-box dg-hot\" x=\"18\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"47\" y=\"76\" text-anchor=\"middle\">I<\/text><rect class=\"dg-box\" x=\"84\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"113\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box\" x=\"150\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"179\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box dg-soft\" x=\"216\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"245\" y=\"76\" text-anchor=\"middle\">B<\/text><rect class=\"dg-box\" x=\"282\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"311\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box\" x=\"348\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"377\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box dg-soft\" x=\"414\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"443\" y=\"76\" text-anchor=\"middle\">B<\/text><rect class=\"dg-box\" x=\"480\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"509\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box\" x=\"546\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"575\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box dg-hot\" x=\"612\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"641\" y=\"76\" text-anchor=\"middle\">I<\/text><text class=\"dg-sub\" x=\"18\" y=\"28\">one GOP →<\/text><text class=\"dg-sub\" x=\"47\" y=\"124\" text-anchor=\"middle\">keyframe<\/text><text class=\"dg-sub\" x=\"360\" y=\"124\" text-anchor=\"middle\">P = diff from previous<\/text><text class=\"dg-sub\" x=\"640\" y=\"124\" text-anchor=\"middle\">B = past+future<\/text><text class=\"dg-sub\" x=\"360\" y=\"142\" text-anchor=\"middle\">you can only START decoding at an I-frame<\/text><\/svg><figcaption>A GOP: one keyframe (I) then diffs (P/B)<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Video isn't a stream of pictures — it's mostly <em>diffs<\/em>. A keyframe (I) is a full image; P/B frames only store what changed. This is why you can't just \"grab any frame,\" why a lost keyframe wrecks seconds of video, and why GOP size trades latency against bandwidth.<\/div><\/div>\n<h2 id=\"the-intuition\">The intuition<\/h2>\n<p>Imagine mailing a friend a flipbook. Instead of redrawing every page, you send one full drawing (the <strong>I-frame<\/strong>), then tiny notes: \"page 2: move the ball 3cm right\" (a <strong>P-frame<\/strong>). Cheap to send, but if the full drawing is lost, every \"move the ball\" note after it is meaningless until the next full drawing arrives.<\/p>\n<h2 id=\"frame-types\">Frame types<\/h2>\n<ul><li><strong>I-frame (Intra / keyframe):<\/strong> complete standalone image. Big. Decodable alone.<\/li><li><strong>P-frame (Predicted):<\/strong> stores changes from the <em>previous<\/em> frame. Small.<\/li><li><strong>B-frame (Bi-directional):<\/strong> references <em>past and future<\/em> frames. Smallest, but<\/li><\/ul>\n<p>adds latency (decoder must wait for the future frame) → <strong>many low-latency   pipelines disable B-frames.<\/strong><\/p>\n<h2 id=\"gop-group-of-pictures\">GOP (Group of Pictures)<\/h2>\n<p>The pattern between keyframes, e.g. <code>IPPPPPP...<\/code> repeating every N frames.<\/p>\n<ul><li><strong>Short GOP<\/strong> (frequent keyframes) → faster recovery after loss, faster stream<\/li><\/ul>\n<p>start/seek, <strong>more bandwidth<\/strong>.<\/p>\n<ul><li><strong>Long GOP<\/strong> → less bandwidth, but a lost keyframe means longer corruption and<\/li><\/ul>\n<p>slower join time.<\/p>\n<ul><li><strong>You can only cleanly start decoding / reconnect at an I-frame.<\/strong> That's why a<\/li><\/ul>\n<p>freshly connected stream may show gray/garbage until the first keyframe.<\/p>\n<h2 id=\"codecs-youll-name\">Codecs you'll name<\/h2>\n<ul><li><strong>H.264 (AVC):<\/strong> the default everywhere. Universal hardware decode. Safe answer.<\/li><li><strong>H.265 (HEVC):<\/strong> ~50% less bandwidth at same quality; heavier to decode,<\/li><\/ul>\n<p>licensing friction. Good for many-camera bandwidth savings if HW supports it.<\/p>\n<ul><li><strong>MJPEG:<\/strong> every frame is a standalone JPEG (all I-frames). No inter-frame<\/li><\/ul>\n<p>compression → huge bandwidth, but zero inter-frame latency and trivial frame   extraction. Some industrial cams use it.<\/p>\n<ul><li><strong>AV1:<\/strong> royalty-free, great compression, decode still maturing on edge HW.<\/li><\/ul>\n<h2 id=\"why-this-matters-for-the-jd\">Why this matters for the JD<\/h2>\n<p><strong>\"Handle frame buffers, decoding efficiently\"<\/strong> → you must understand that:<\/p>\n<ol><li>You decode <em>packets<\/em>, and a decoder needs a keyframe to start.<\/li><li>Dropping a P/B frame is survivable; dropping an I-frame corrupts the GOP.<\/li><li>If you reconnect, you wait for the next keyframe — budget for that gray period.<\/li><\/ol>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>H.264 vs H.265 for 50 cameras?<\/strong> H.265 halves bandwidth/storage — attractive at scale — but costs more decode compute and has licensing complexity. Pick H.265 <em>only if<\/em> your decode hardware (Jetson NVDEC, GPU) supports it and CPU/GPU headroom exists; otherwise H.264 is the reliable default.<\/p>\n<p><strong>Why disable B-frames for live inference?<\/strong> B-frames reference future frames, so the decoder must reorder and wait → added latency and jitter. For \"obsess over milliseconds,\" an <code>IPPP<\/code> (no-B) GOP is lower-latency and simpler to reason about.<\/p>\n<p><strong>Why does latency spike right after reconnect?<\/strong> You can only resume at an I-frame. With a long GOP you may wait up to one GOP interval for the next keyframe. Mitigation: request shorter GOP on the camera, or ask for an on-demand IDR (instantaneous decoder refresh) if supported.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"decode-encode-pipeline.md\" href=\"#\">decode-encode-pipeline.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-intuition","text":"The intuition"},{"level":2,"id":"frame-types","text":"Frame types"},{"level":2,"id":"gop-group-of-pictures","text":"GOP (Group of Pictures)"},{"level":2,"id":"codecs-youll-name","text":"Codecs you'll name"},{"level":2,"id":"why-this-matters-for-the-jd","text":"Why this matters for the JD"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"codecs, gop, and i/p/b frames i p p b p p b p p i one gop → keyframe p = diff from previous b = past+future you can only start decoding at an i-frame a gop: one keyframe (i) then diffs (p/b) 💡 tl;dr video isn't a stream of pictures — it's mostly diffs . a keyframe (i) is a full image; p/b frames only store what changed. this is why you can't just \"grab any frame,\" why a lost keyframe wrecks seconds of video, and why gop size trades latency against bandwidth. the intuition imagine mailing a friend a flipbook. instead of redrawing every page, you send one full drawing (the i-frame ), then tiny notes: \"page 2: move the ball 3cm right\" (a p-frame ). cheap to send, but if the full drawing is lost, every \"move the ball\" note after it is meaningless until the next full drawing arrives. frame types i-frame (intra / keyframe): complete standalone image. big. decodable alone. p-frame (predicted): stores changes from the previous frame. small. b-frame (bi-directional): references past and future frames. smallest, but adds latency (decoder must wait for the future frame) → many low-latency pipelines disable b-frames. gop (group of pictures) the pattern between keyframes, e.g. ipppppp... repeating every n frames. short gop (frequent keyframes) → faster recovery after loss, faster stream start/seek, more bandwidth . long gop → less bandwidth, but a lost keyframe means longer corruption and slower join time. you can only cleanly start decoding / reconnect at an i-frame. that's why a freshly connected stream may show gray/garbage until the first keyframe. codecs you'll name h.264 (avc): the default everywhere. universal hardware decode. safe answer. h.265 (hevc): ~50% less bandwidth at same quality; heavier to decode, licensing friction. good for many-camera bandwidth savings if hw supports it. mjpeg: every frame is a standalone jpeg (all i-frames). no inter-frame compression → huge bandwidth, but zero inter-frame latency and trivial frame extraction. some industrial cams use it. av1: royalty-free, great compression, decode still maturing on edge hw. why this matters for the jd \"handle frame buffers, decoding efficiently\" → you must understand that: you decode packets , and a decoder needs a keyframe to start. dropping a p/b frame is survivable; dropping an i-frame corrupts the gop. if you reconnect, you wait for the next keyframe — budget for that gray period. why x over y h.264 vs h.265 for 50 cameras? h.265 halves bandwidth/storage — attractive at scale — but costs more decode compute and has licensing complexity. pick h.265 only if your decode hardware (jetson nvdec, gpu) supports it and cpu/gpu headroom exists; otherwise h.264 is the reliable default. why disable b-frames for live inference? b-frames reference future frames, so the decoder must reorder and wait → added latency and jitter. for \"obsess over milliseconds,\" an ippp (no-b) gop is lower-latency and simpler to reason about. why does latency spike right after reconnect? you can only resume at an i-frame. with a long gop you may wait up to one gop interval for the next keyframe. mitigation: request shorter gop on the camera, or ask for an on-demand idr (instantaneous decoder refresh) if supported. → next: decode-encode-pipeline.md","words":532},{"path":"01-video-streaming/decode-encode-pipeline.md","title":"Decode / Encode Pipeline","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"from-packet-to-numpy-the-decode-pipeline\">From Packet to NumPy: The Decode Pipeline<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A frame's journey is: network packets → depacketize → decode (turn compressed bitstream into raw pixels) → color convert (NV12/YUV → BGR/RGB) → hand to your model. The single biggest performance lever is <strong>decoding on the GPU (NVDEC)<\/strong> and <strong>keeping pixels on the GPU<\/strong> so you never pay the CPU↔GPU copy tax.<\/div><\/div>\n<h2 id=\"the-full-path\">The full path<\/h2>\n<div class=\"diagram\">\n  <div class=\"vflow\">\n    <span class=\"node data\">RTSP / RTP packets<\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">depayload <span class=\"nsub\">rtph264depay — strip RTP, get raw H.264 bitstream<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">parse <span class=\"nsub\">h264parse — frame boundaries, NAL units<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <div class=\"branch\">\n      <span class=\"node\">DECODE <span class=\"nsub\">bitstream → raw frame (YUV / NV12)<\/span><\/span>\n      <span class=\"split-arw\"><\/span>\n      <div class=\"fork\">\n        <span class=\"node ghost\">CPU: avdec_h264 <span class=\"nsub\">portable, burns CPU<\/span><\/span>\n        <span class=\"node soft\">GPU: nvv4l2decoder / NVDEC <span class=\"nsub\">hardware, stays in GPU mem<\/span><\/span>\n      <\/div>\n    <\/div>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">color convert <span class=\"nsub\">NV12 → BGR/RGB for the model<\/span><\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node\">optional resize / crop<\/span>\n    <span class=\"varw\"><\/span>\n    <span class=\"node out\">frame ready → inference<\/span>\n  <\/div>\n<\/div>\n<h2 id=\"cpu-decode-vs-hardware-decode-the-key-decision\">CPU decode vs hardware decode (the key decision)<\/h2>\n<ul><li><strong>CPU decode<\/strong> (<code>avdec_h264<\/code>, OpenCV's default <code>cv2.VideoCapture<\/code>): simple,<\/li><\/ul>\n<p>portable, but <strong>one or two 1080p H.264 streams can saturate several CPU cores.<\/strong>   Does not scale to \"multiple RTSP streams.\"<\/p>\n<ul><li><strong>Hardware decode<\/strong> (NVIDIA <strong>NVDEC<\/strong> via <code>nvv4l2decoder<\/code>/DeepStream, or VA-API<\/li><\/ul>\n<p>on Intel): a dedicated silicon block decodes video, leaving CPU/GPU compute free.   A single Jetson/GPU can decode dozens of streams. <strong>This is the scalable answer.<\/strong><\/p>\n<blockquote><p>Interview line: <em>\"<code>cv2.VideoCapture<\/code> is fine for a prototype, but it decodes on the CPU and copies every frame to host memory. At multi-camera scale I'd decode on NVDEC through GStreamer/DeepStream and keep frames in GPU memory so inference reads them with zero copy.\"<\/em><\/p><\/blockquote>\n<h2 id=\"the-hidden-killer-cpugpu-memory-copies\">The hidden killer: CPU↔GPU memory copies<\/h2>\n<p>Every <code>numpy<\/code> frame on the CPU that you push to the GPU for inference is a <strong>PCIe copy<\/strong> — and back again for post-processing. At 30fps × N cameras that copy bandwidth becomes your bottleneck.<\/p>\n<ul><li><strong>Zero-copy goal:<\/strong> decode on GPU → infer on GPU → only pull the <em>small<\/em> result<\/li><\/ul>\n<p>(boxes, labels) back to CPU. Never round-trip full frames.<\/p>\n<ul><li>DeepStream's <code>NvBufSurface<\/code> and CUDA unified memory exist precisely for this.<\/li><\/ul>\n<h2 id=\"opencvs-role-and-its-trap\">OpenCV's role (and its trap)<\/h2>\n<ul><li><code>cv2.VideoCapture(\"rtsp://...\")<\/code> uses FFmpeg under the hood — great for quick<\/li><\/ul>\n<p>work, but: CPU decode, an internal buffer that grows latency, and silent   reconnect behavior you don't control.<\/p>\n<ul><li>For production multi-stream you drive <strong>GStreamer<\/strong> and use OpenCV only for the<\/li><\/ul>\n<p>image-processing math (geometry, color spaces, warps) it's genuinely good at.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># Pulling frames from a GStreamer pipeline into OpenCV via appsink<\/span>\ncap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(\n    <span class=\"tok-string\">\"rtspsrc location=rtsp://cam latency=100 ! rtph264depay ! h264parse ! \"<\/span>\n    <span class=\"tok-string\">\"nvv4l2decoder ! nvvidconv ! video/x-raw,format=BGRx ! \"<\/span>\n    <span class=\"tok-string\">\"videoconvert ! video/x-raw,format=BGR ! appsink drop=1 max-buffers=1\"<\/span>,\n    <span class=\"tok-builtin\">cv2<\/span>.CAP_GSTREAMER,\n)<\/code><\/pre>\n<p>Note <code>drop=1 max-buffers=1<\/code> — that's the backpressure knob (next file).<\/p>\n<h2 id=\"encoding-the-way-back-out\">Encoding (the way back out)<\/h2>\n<p>If you serve an annotated stream (WebRTC/RTSP out, or save clips), you <strong>encode<\/strong>: raw frame → NVENC (hardware H.264/H.265) → mux → transport. Use <strong>NVENC<\/strong>, not CPU x264, for the same scaling reasons. NVDEC and NVENC are separate silicon blocks, so you can decode and encode concurrently.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong><code>cv2.VideoCapture<\/code> vs GStreamer pipeline?<\/strong> VideoCapture = fast to write, CPU-bound, opaque buffering. GStreamer = explicit control over decode hardware, buffering, and threading; scales to many streams. Prototype with the first, ship with the second.<\/p>\n<p><strong>Software vs hardware decode?<\/strong> Software = portable, no special HW, but CPU-bound and won't scale past a couple streams. Hardware (NVDEC) = scales to dozens, frees CPU, keeps frames on GPU for zero-copy inference. At KoiReader scale, hardware every time.<\/p>\n<p><strong>Why is color conversion (NV12→BGR) a real cost?<\/strong> Decoders output YUV/NV12; models want BGR/RGB. The convert is per-pixel per-frame. Do it on the GPU (<code>nvvidconv<\/code>) — doing it on CPU re-introduces the copy + compute you just avoided.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"frame-buffers-backpressure.md\" href=\"#\">frame-buffers-backpressure.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-full-path","text":"The full path"},{"level":2,"id":"cpu-decode-vs-hardware-decode-the-key-decision","text":"CPU decode vs hardware decode (the key decision)"},{"level":2,"id":"the-hidden-killer-cpugpu-memory-copies","text":"The hidden killer: CPU↔GPU memory copies"},{"level":2,"id":"opencvs-role-and-its-trap","text":"OpenCV's role (and its trap)"},{"level":2,"id":"encoding-the-way-back-out","text":"Encoding (the way back out)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"from packet to numpy: the decode pipeline 💡 tl;dr a frame's journey is: network packets → depacketize → decode (turn compressed bitstream into raw pixels) → color convert (nv12/yuv → bgr/rgb) → hand to your model. the single biggest performance lever is decoding on the gpu (nvdec) and keeping pixels on the gpu so you never pay the cpu↔gpu copy tax. the full path rtsp / rtp packets depayload rtph264depay — strip rtp, get raw h.264 bitstream parse h264parse — frame boundaries, nal units decode bitstream → raw frame (yuv / nv12) cpu: avdec_h264 portable, burns cpu gpu: nvv4l2decoder / nvdec hardware, stays in gpu mem color convert nv12 → bgr/rgb for the model optional resize / crop frame ready → inference cpu decode vs hardware decode (the key decision) cpu decode ( avdec_h264 , opencv's default cv2.videocapture ): simple, portable, but one or two 1080p h.264 streams can saturate several cpu cores. does not scale to \"multiple rtsp streams.\" hardware decode (nvidia nvdec via nvv4l2decoder /deepstream, or va-api on intel): a dedicated silicon block decodes video, leaving cpu/gpu compute free. a single jetson/gpu can decode dozens of streams. this is the scalable answer. interview line: \" cv2.videocapture is fine for a prototype, but it decodes on the cpu and copies every frame to host memory. at multi-camera scale i'd decode on nvdec through gstreamer/deepstream and keep frames in gpu memory so inference reads them with zero copy.\" the hidden killer: cpu↔gpu memory copies every numpy frame on the cpu that you push to the gpu for inference is a pcie copy — and back again for post-processing. at 30fps × n cameras that copy bandwidth becomes your bottleneck. zero-copy goal: decode on gpu → infer on gpu → only pull the small result (boxes, labels) back to cpu. never round-trip full frames. deepstream's nvbufsurface and cuda unified memory exist precisely for this. opencv's role (and its trap) cv2.videocapture(\"rtsp://...\") uses ffmpeg under the hood — great for quick work, but: cpu decode, an internal buffer that grows latency, and silent reconnect behavior you don't control. for production multi-stream you drive gstreamer and use opencv only for the image-processing math (geometry, color spaces, warps) it's genuinely good at. # pulling frames from a gstreamer pipeline into opencv via appsink cap = cv2 .videocapture( \"rtspsrc location=rtsp://cam latency=100 ! rtph264depay ! h264parse ! \" \"nvv4l2decoder ! nvvidconv ! video/x-raw,format=bgrx ! \" \"videoconvert ! video/x-raw,format=bgr ! appsink drop=1 max-buffers=1\" , cv2 .cap_gstreamer, ) note drop=1 max-buffers=1 — that's the backpressure knob (next file). encoding (the way back out) if you serve an annotated stream (webrtc/rtsp out, or save clips), you encode : raw frame → nvenc (hardware h.264/h.265) → mux → transport. use nvenc , not cpu x264, for the same scaling reasons. nvdec and nvenc are separate silicon blocks, so you can decode and encode concurrently. why x over y cv2.videocapture vs gstreamer pipeline? videocapture = fast to write, cpu-bound, opaque buffering. gstreamer = explicit control over decode hardware, buffering, and threading; scales to many streams. prototype with the first, ship with the second. software vs hardware decode? software = portable, no special hw, but cpu-bound and won't scale past a couple streams. hardware (nvdec) = scales to dozens, frees cpu, keeps frames on gpu for zero-copy inference. at koireader scale, hardware every time. why is color conversion (nv12→bgr) a real cost? decoders output yuv/nv12; models want bgr/rgb. the convert is per-pixel per-frame. do it on the gpu ( nvvidconv ) — doing it on cpu re-introduces the copy + compute you just avoided. → next: frame-buffers-backpressure.md","words":594},{"path":"01-video-streaming/frame-buffers-backpressure.md","title":"Frame Buffers & Backpressure","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"frame-buffers-backpressure\">Frame Buffers &amp; Backpressure<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 160\" role=\"img\" aria-label=\"Bounded buffer: keep the newest frame, drop the rest\"><rect class=\"dg-box\" x=\"20\" y=\"50\" width=\"150\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"95\" y=\"78\" text-anchor=\"middle\">Camera<\/text><text class=\"dg-sub\" x=\"95\" y=\"95\" text-anchor=\"middle\">30 fps<\/text><line class=\"dg-line\" x1=\"170\" y1=\"80\" x2=\"243\" y2=\"80\"/><polygon class=\"dg-arrow\" points=\"243,75 250,80 243,85\"/><rect class=\"dg-box dg-hot\" x=\"250\" y=\"50\" width=\"70\" height=\"60\" rx=\"10\"/><text class=\"dg-label\" x=\"285\" y=\"86\" text-anchor=\"middle\">▣<\/text><rect class=\"dg-box dg-soft\" x=\"324\" y=\"50\" width=\"70\" height=\"60\" rx=\"10\"/><text class=\"dg-sub\" x=\"359\" y=\"86\" text-anchor=\"middle\">dropped<\/text><text class=\"dg-sub\" x=\"322\" y=\"38\" text-anchor=\"middle\">maxlen = 1 · keep latest<\/text><line class=\"dg-line\" x1=\"394\" y1=\"80\" x2=\"467\" y2=\"80\"/><polygon class=\"dg-arrow\" points=\"467,75 474,80 467,85\"/><rect class=\"dg-box\" x=\"474\" y=\"50\" width=\"150\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"549\" y=\"78\" text-anchor=\"middle\">Model<\/text><text class=\"dg-sub\" x=\"549\" y=\"95\" text-anchor=\"middle\">22 fps<\/text><text class=\"dg-sub\" x=\"549\" y=\"135\" text-anchor=\"middle\">slower → would pile up<\/text><text class=\"dg-sub\" x=\"95\" y=\"135\" text-anchor=\"middle\">producer<\/text><\/svg><figcaption>Bounded buffer: keep the newest frame, drop the rest<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Cameras produce frames at a fixed rate; your model consumes them at a variable rate. When the model is slower than the camera, frames pile up. You have exactly three choices: <strong>buffer<\/strong> (latency grows), <strong>drop<\/strong> (stay real-time), or <strong>block<\/strong> (stall the source). For live inference the right default is almost always <strong>drop the oldest, keep latest<\/strong>.<\/div><\/div>\n<h2 id=\"the-core-problem-producerconsumer-mismatch\">The core problem (producer/consumer mismatch)<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">Camera @ 30 fps<span class=\"nsub\">producer<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node soft\">queue<span class=\"nsub\">buffer<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">Model @ 22 fps<span class=\"nsub\">consumer — slower!<\/span><\/span>\n  <\/div>\n  <div class=\"flow-foot\">Producer outruns consumer → the queue fills → <b>backpressure<\/b> (drop frames or block) is the only escape.<\/div>\n<\/div>\n<p>If producer &gt; consumer forever, the queue grows without bound → <strong>memory leak, ever-increasing latency<\/strong>, eventual OOM crash. This is the #1 way naive video pipelines die in production. The JD's \"without memory leaks\" and \"manage resources in long-running processes\" point straight here.<\/p>\n<h2 id=\"the-three-strategies\">The three strategies<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Strategy<\/th><th>What happens<\/th><th>Use when<\/th><\/tr><\/thead><tbody><tr><td><strong>Bounded queue + drop oldest<\/strong><\/td><td>Keep newest frame, discard stale<\/td><td><strong>Live inference<\/strong> — you want <em>current<\/em> reality, not a backlog<\/td><\/tr><tr><td><strong>Bounded queue + block<\/strong><\/td><td>Source waits for consumer<\/td><td>Offline/batch processing of recorded video where every frame matters<\/td><\/tr><tr><td><strong>Unbounded queue<\/strong><\/td><td>Grows forever<\/td><td><strong>Never<\/strong> in production — this is the bug, not a strategy<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Latency vs completeness is the tradeoff.<\/strong> A live anomaly detector wants the <em>latest<\/em> frame (drop). A forensic counting job on a recording wants <em>every<\/em> frame (block + bounded).<\/p>\n<h2 id=\"how-you-actually-express-drop\">How you actually express \"drop\"<\/h2>\n<p>GStreamer:<\/p>\n<pre><code>appsink drop=true max-buffers=1   # only ever hold the newest frame\n# or on a leaky queue element:\nqueue max-size-buffers=2 leaky=downstream<\/code><\/pre>\n<p>Python (your own thread):<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> collections <span class=\"tok-keyword\">import<\/span> deque\nframe_buf = deque(maxlen=<span class=\"tok-number\">1<\/span>)        <span class=\"tok-comment\"># bounded; appending evicts the old frame<\/span>\n<span class=\"tok-comment\"># producer thread:<\/span>\nframe_buf.append(frame)            <span class=\"tok-comment\"># never blocks, never grows<\/span>\n<span class=\"tok-comment\"># consumer thread:<\/span>\nframe = frame_buf[-<span class=\"tok-number\">1<\/span>] <span class=\"tok-keyword\">if<\/span> frame_buf <span class=\"tok-keyword\">else<\/span> <span class=\"tok-keyword\">None<\/span><\/code><\/pre>\n<p>A <code>deque(maxlen=N)<\/code> or a <code>queue.Queue(maxsize=N)<\/code> with <code>put_nowait<\/code> + drop-on-full is the canonical \"crash-proof buffer.\"<\/p>\n<h2 id=\"latency-vs-jitter-dont-confuse-them\">Latency vs jitter (don't confuse them)<\/h2>\n<ul><li><strong>Latency<\/strong> = how old the frame is when you act on it.<\/li><li><strong>Jitter<\/strong> = variation in frame arrival timing.<\/li><li>A <em>small<\/em> jitter buffer smooths bursty networks; a <em>large<\/em> one trades latency<\/li><\/ul>\n<p>for smoothness. RTSP <code>latency=<\/code> and GStreamer <code>rtpjitterbuffer<\/code> tune this.   For \"obsess over milliseconds,\" keep it small (~100–200ms).<\/p>\n<h2 id=\"backpressure-across-stages\">Backpressure across stages<\/h2>\n<p>In a multi-stage pipeline (decode → infer → analytics → DB), the <em>slowest stage<\/em> sets the pace. Each stage needs a bounded buffer in front of it so a slow DB write can't back up into dropped <em>decoded<\/em> frames silently. Design rule: <strong>bound every queue, and decide the drop policy per stage.<\/strong><\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Drop frames vs buffer them?<\/strong> Live = drop (you want now, not a backlog; buffering inflates latency forever if you can't catch up). Recorded

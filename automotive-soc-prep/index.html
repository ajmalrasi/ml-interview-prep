racy regressions before hardware. fast loop, no board contention. on target board: the honest latency, throughput, utilization numbers (sil can't give real timing). where the perf-analysis loop from multicore-scheduling actually runs. hil: the soc runs in real time while a rig plays back or simulates sensor streams and checks the system responds correctly and on time. catches integration, timing, and real-world corner cases a static dataset misses. key concepts to name open-loop vs closed-loop: open-loop replays recorded sensor data and checks outputs; closed-loop puts your perception into a driving simulator whose next frame depends on the vehicle's reaction — needed to test the full perceive→plan→act cycle. golden/reference data & regression: a fixed labeled set you re-run every release to catch accuracy/latency regressions (feeds the jd's \"release validation activities\"). determinism & reproducibility: same input must give same output — essential for debugging and for safety evidence. corner cases / odd: validation must cover the operational design domain (the conditions the system is designed for) — night, rain, glare, occlusion for perception. your validation deliverables (jd-aligned) accuracy report — int8 vs fp32 on the golden set (per-class map/miou deltas). performance report — latency p50/p99, throughput, per-block utilization on target. regression status — pass/fail vs the last release baseline, contributing to **weekly technical reports and release validation**. interview soundbite \"i validate up a fidelity ladder: sil first — my actual compiled int8 model against a golden dataset, compared to the fp32 reference, to catch accuracy regressions cheaply. then on a target board for honest latency and utilization, then hil where the real soc runs in real time against sensor playback or a closed-loop simulator to validate timing and system behavior. golden-set regression on every release is how the numbers stay honest.\"","words":534},{"path":"06-runtime-safety-validation/functional-safety.md","title":"ISO 26262 / ASIL Functional Safety","section":"6 · Runtime, Safety & Validation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"iso-26262-asil-functional-safety\">ISO 26262 / ASIL Functional Safety<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <strong>ISO 26262<\/strong> is the automotive functional-safety standard. It classifies each function's risk as an <strong>ASIL<\/strong> level (A→D, D = most stringent) and dictates the process and rigor required. AI/perception adds a twist: it's not just about <em>malfunction<\/em> (26262) but about <em>the system doing the wrong thing while working as designed<\/em> — that's <strong>SOTIF (ISO 21448)<\/strong>. You won't own the safety case, but you must know why it constrains your model choices.<\/div><\/div>\n<h2 id=\"the-vocabulary-you-must-have\">The vocabulary you must have<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Term<\/th><th>Meaning<\/th><\/tr><\/thead><tbody><tr><td><strong>Functional safety<\/strong><\/td><td>Absence of unreasonable risk due to <strong>malfunction<\/strong> of E/E systems<\/td><\/tr><tr><td><strong>ISO 26262<\/strong><\/td><td>The automotive functional-safety standard (the \"how\")<\/td><\/tr><tr><td><strong>ASIL<\/strong><\/td><td>Automotive Safety Integrity Level — the risk rating that sets required rigor<\/td><\/tr><tr><td><strong>SOTIF / ISO 21448<\/strong><\/td><td>Safety Of The Intended Functionality — risk from <strong>performance limitations<\/strong>, not faults (key for AI/perception)<\/td><\/tr><tr><td><strong>Safety case<\/strong><\/td><td>The documented argument + evidence that the system is acceptably safe<\/td><\/tr><tr><td><strong>Redundancy / diversity<\/strong><\/td><td>Independent channels so one failure doesn't cause a hazard<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"asil-levels\">ASIL levels<\/h2>\n<p>ASIL is derived from three factors of a hazard:<\/p>\n<ul><li><strong>Severity<\/strong> (how bad if it happens), <strong>Exposure<\/strong> (how often the situation occurs),<\/li><\/ul>\n<p><strong>Controllability<\/strong> (can the driver avoid harm).<\/p>\n<ul><li>Combined into <strong>QM<\/strong> (quality-managed, no ASIL needed) → <strong>ASIL A<\/strong> → <strong>B<\/strong> → <strong>C<\/strong> →<\/li><\/ul>\n<p><strong>ASIL D<\/strong> (highest rigor).<\/p>\n<ul><li><strong>Perception for AD is typically high ASIL (C/D)<\/strong> — a missed pedestrian is severe, common<\/li><\/ul>\n<p>enough, and hard to control → maximum rigor.<\/p>\n<p>Higher ASIL ⇒ more required: redundancy, diverse implementations, stricter testing coverage, tool qualification, and a documented safety case.<\/p>\n<h2 id=\"why-aiperception-is-the-hard-case-sotif\">Why AI/perception is the hard case (SOTIF)<\/h2>\n<p>Classic 26262 assumes hazards come from <strong>faults<\/strong> (a bit flips, a sensor dies). But a neural network can be <strong>working perfectly and still be wrong<\/strong> — it just didn't generalize to this scene (unusual lighting, an unseen object). That's a <strong>performance limitation<\/strong>, the domain of <strong>SOTIF<\/strong>. So AD safety needs <strong>both<\/strong>: 26262 for the \"it broke\" failures and SOTIF for the \"it's confidently wrong\" failures.<\/p>\n<p>Implications you can speak to:<\/p>\n<ul><li><strong>You cannot prove a DNN correct<\/strong>, so safety leans on <strong>redundancy and diversity<\/strong> —<\/li><\/ul>\n<p>independent sensors (camera + lidar + radar, hence BEVFusion), independent perception   paths, and plausibility/monitor checks.<\/p>\n<ul><li><strong>ODD (Operational Design Domain)<\/strong> — define the conditions the system is validated for and<\/li><\/ul>\n<p>detect when you're outside it (degrade gracefully).<\/p>\n<ul><li><strong>A safety monitor / fallback<\/strong> — a simpler, verifiable checker can veto or safe-stop when<\/li><\/ul>\n<p>the primary perception is uncertain.<\/p>\n<h2 id=\"how-this-constrains-your-model-work\">How this constrains your model work<\/h2>\n<p>This is the point of the page — connect safety to your day-job decisions:<\/p>\n<ul><li><strong>Determinism is mandatory<\/strong> — bounded WCET, static shapes, no unpredictable fallbacks<\/li><\/ul>\n<p>(ties to <a class=\"mdlink\" data-href=\"linux-qnx-runtime.md\" href=\"#\">linux-qnx-runtime<\/a>). A model that's <em>usually<\/em> fast is not   acceptable if its worst case is unbounded.<\/p>\n<ul><li><strong>Accuracy targets are hard limits, not goals<\/strong> — you can't trade 3 points of pedestrian<\/li><\/ul>\n<p>recall for latency the way you might in a consumer product. This is why the   <a class=\"mdlink\" data-href=\"../03-quantization-embedded/accuracy-mitigation.md\" href=\"#\">accuracy-mitigation<\/a> work is   non-negotiable, not best-effort.<\/p>\n<ul><li><strong>Traceability &amp; reproducibility<\/strong> — quantization configs, calibration data, and<\/li><\/ul>\n<p>validation results are <strong>evidence<\/strong> in the safety case; they must be versioned and   reproducible.<\/p>\n<ul><li><strong>Tool qualification<\/strong> — the compiler/quantizer may need to be a qualified tool; you can't<\/li><\/ul>\n<p>silently swap toolchain versions.<\/p>\n<h2 id=\"what-youre-expected-to-know-vs-own\">What you're expected to know vs own<\/h2>\n<p>You are <strong>not<\/strong> the safety manager. You <strong>are<\/strong> expected to:<\/p>\n<ul><li>Speak the vocabulary (ASIL, SOTIF, safety case, ODD, redundancy).<\/li><li>Understand <em>why<\/em> your deliverables (accuracy reports, deterministic latency, versioned<\/li><\/ul>\n<p>configs) feed the safety case.<\/p>\n<ul><li>Not make changes that quietly break the safety argument (nondeterminism, unqualified tools,<\/li><\/ul>\n<p>untracked model changes).<\/p>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"ISO 26262 rates each function by ASIL A to D, and AD perception is usually C or D — maximum rigor. The AI wrinkle is SOTIF: a network can work as designed and still be wrong on an unseen scene, which you can't prove away, so safety relies on sensor and path redundancy, ODD monitoring, and a simpler safety monitor. For me that means determinism and accuracy are hard constraints, and my quantization and validation artifacts are versioned evidence in the safety case, not disposable dev outputs.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"the-vocabulary-you-must-have","text":"The vocabulary you must have"},{"level":2,"id":"asil-levels","text":"ASIL levels"},{"level":2,"id":"why-aiperception-is-the-hard-case-sotif","text":"Why AI/perception is the hard case (SOTIF)"},{"level":2,"id":"how-this-constrains-your-model-work","text":"How this constrains your model work"},{"level":2,"id":"what-youre-expected-to-know-vs-own","text":"What you're expected to know vs own"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"iso 26262 / asil functional safety 💡 tl;dr iso 26262 is the automotive functional-safety standard. it classifies each function's risk as an asil level (a→d, d = most stringent) and dictates the process and rigor required. ai/perception adds a twist: it's not just about malfunction (26262) but about the system doing the wrong thing while working as designed — that's sotif (iso 21448) . you won't own the safety case, but you must know why it constrains your model choices. the vocabulary you must have term meaning functional safety absence of unreasonable risk due to malfunction of e/e systems iso 26262 the automotive functional-safety standard (the \"how\") asil automotive safety integrity level — the risk rating that sets required rigor sotif / iso 21448 safety of the intended functionality — risk from performance limitations , not faults (key for ai/perception) safety case the documented argument + evidence that the system is acceptably safe redundancy / diversity independent channels so one failure doesn't cause a hazard asil levels asil is derived from three factors of a hazard: severity (how bad if it happens), exposure (how often the situation occurs), controllability (can the driver avoid harm). combined into qm (quality-managed, no asil needed) → asil a → b → c → asil d (highest rigor). perception for ad is typically high asil (c/d) — a missed pedestrian is severe, common enough, and hard to control → maximum rigor. higher asil ⇒ more required: redundancy, diverse implementations, stricter testing coverage, tool qualification, and a documented safety case. why ai/perception is the hard case (sotif) classic 26262 assumes hazards come from faults (a bit flips, a sensor dies). but a neural network can be working perfectly and still be wrong — it just didn't generalize to this scene (unusual lighting, an unseen object). that's a performance limitation , the domain of sotif . so ad safety needs both : 26262 for the \"it broke\" failures and sotif for the \"it's confidently wrong\" failures. implications you can speak to: you cannot prove a dnn correct , so safety leans on redundancy and diversity — independent sensors (camera + lidar + radar, hence bevfusion), independent perception paths, and plausibility/monitor checks. odd (operational design domain) — define the conditions the system is validated for and detect when you're outside it (degrade gracefully). a safety monitor / fallback — a simpler, verifiable checker can veto or safe-stop when the primary perception is uncertain. how this constrains your model work this is the point of the page — connect safety to your day-job decisions: determinism is mandatory — bounded wcet, static shapes, no unpredictable fallbacks (ties to linux-qnx-runtime ). a model that's usually fast is not acceptable if its worst case is unbounded. accuracy targets are hard limits, not goals — you can't trade 3 points of pedestrian recall for latency the way you might in a consumer product. this is why the accuracy-mitigation work is non-negotiable, not best-effort. traceability & reproducibility — quantization configs, calibration data, and validation results are evidence in the safety case; they must be versioned and reproducible. tool qualification — the compiler/quantizer may need to be a qualified tool; you can't silently swap toolchain versions. what you're expected to know vs own you are not the safety manager. you are expected to: speak the vocabulary (asil, sotif, safety case, odd, redundancy). understand why your deliverables (accuracy reports, deterministic latency, versioned configs) feed the safety case. not make changes that quietly break the safety argument (nondeterminism, unqualified tools, untracked model changes). interview soundbite \"iso 26262 rates each function by asil a to d, and ad perception is usually c or d — maximum rigor. the ai wrinkle is sotif: a network can work as designed and still be wrong on an unseen scene, which you can't prove away, so safety relies on sensor and path redundancy, odd monitoring, and a simpler safety monitor. for me that means determinism and accuracy are hard constraints, and my quantization and validation artifacts are versioned evidence in the safety case, not disposable dev outputs.\"","words":675},{"path":"07-interview-qa/README.md","title":"Overview","section":"7 · Interview Q&A","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"7-interview-qa\">7 · Interview Q&amp;A<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The last-mile drill for the Automotive SoC AI Application Engineer loop. The <strong><a class=\"mdlink\" data-href=\"interview-qa.md\" href=\"#\">Rapid-Fire Q&amp;A<\/a><\/strong> is grouped the way an interviewer escalates — accelerators → ONNX/quantization → models → SoC/perf → runtime/safety. The <strong><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">Cheat Sheet<\/a><\/strong> is the one-page recall you skim the morning of.<\/div><\/div>\n<h2 id=\"how-to-use-it\">How to use it<\/h2>\n<ul><li>Cover the answer, say it <strong>out loud<\/strong> in 30 seconds, then check. Interviews reward the<\/li><\/ul>\n<p>spoken version, not the essay.<\/p>\n<ul><li>If an answer feels shaky, jump back to the section it came from (each answer maps to a<\/li><\/ul>\n<p>page) and re-read the soundbite.<\/p>\n<ul><li>The day before: read every soundbite. The morning of: the cheat sheet only.<\/li><\/ul>\n<h2 id=\"what-theyre-really-testing-keep-in-mind\">What they're really testing (keep in mind)<\/h2>\n<ol><li><strong>Do you have the embedded mental model<\/strong> — heterogeneous blocks, partitioning, data<\/li><\/ol>\n<p>movement — or only the GPU/TensorRT one?<\/p>\n<ol><li><strong>Can you own the ONNX + quantization workflow<\/strong> end to end, including <em>diagnosing<\/em><\/li><\/ol>\n<p>accuracy loss, not just running a tool?<\/p>\n<ol><li><strong>Do you speak automotive<\/strong> — QNX, SIL/HIL, ISO 26262 — enough to work inside a safety<\/li><\/ol>\n<p>program?<\/p>\n<ol><li><strong>Are you a customer-facing engineer<\/strong> — can you explain a trade-off clearly and drive an<\/li><\/ol>\n<p>issue to closure?<\/p>","toc":[{"level":2,"id":"how-to-use-it","text":"How to use it"},{"level":2,"id":"what-theyre-really-testing-keep-in-mind","text":"What they're really testing (keep in mind)"}],"text":"7 · interview q&a 💡 tl;dr the last-mile drill for the automotive soc ai application engineer loop. the rapid-fire q&a is grouped the way an interviewer escalates — accelerators → onnx/quantization → models → soc/perf → runtime/safety. the cheat sheet is the one-page recall you skim the morning of. how to use it cover the answer, say it out loud in 30 seconds, then check. interviews reward the spoken version, not the essay. if an answer feels shaky, jump back to the section it came from (each answer maps to a page) and re-read the soundbite. the day before: read every soundbite. the morning of: the cheat sheet only. what they're really testing (keep in mind) do you have the embedded mental model — heterogeneous blocks, partitioning, data movement — or only the gpu/tensorrt one? can you own the onnx + quantization workflow end to end, including diagnosing accuracy loss, not just running a tool? do you speak automotive — qnx, sil/hil, iso 26262 — enough to work inside a safety program? are you a customer-facing engineer — can you explain a trade-off clearly and drive an issue to closure?","words":190},{"path":"07-interview-qa/interview-qa.md","title":"Interview Q&A: Rapid Fire","section":"7 · Interview Q&A","quiz":true,"accent":"#cc5fab","html":"<h1 id=\"interview-qa-rapid-fire\">Interview Q&amp;A: Rapid Fire<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Each answer is the 30-second spoken version. Grouped the way an interviewer escalates: accelerators → ONNX &amp; quantization → models → SoC &amp; performance → runtime &amp; safety → behavioral. Cover the answer, say it out loud, then check.<\/div><\/div>\n<h2 id=\"embedded-accelerators\">Embedded accelerators<\/h2>\n<details class=\"qa\" open><summary>Q: What are the compute blocks on an automotive SoC and what's each good at?<\/summary><div class=\"qa-body\"><p>CNNIP is a fixed-function conv engine — fastest, least flexible. NPU is a programmable tensor accelerator (usually a systolic MAC array), fast on the standard INT8 op set. DSP is a programmable vector core for custom ops and pre/post-processing. CPU is the universal fallback. Efficiency goes CNNIP &gt; NPU &gt; DSP &gt; CPU; flexibility goes the other way.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What happens to an operator the NPU doesn't support?<\/summary><div class=\"qa-body\"><p>It falls back to DSP or CPU, which forces a subgraph boundary — a tensor copy across memory plus a cross-core sync. One unsupported op in the middle is worse than several at the end, because it splits an NPU subgraph and inserts two boundaries instead of one.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you decide if a layer is compute-bound or memory-bound?<\/summary><div class=\"qa-body\"><p>Roofline: arithmetic intensity = FLOPs per byte moved. Low intensity (depthwise, elementwise, small matmul) is memory-bound — capped by bandwidth. High intensity (big dense conv) is compute-bound — capped by MAC throughput. Quantizing to INT8 cuts bytes 4×, shifting memory-bound layers toward the compute roof.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: A model is \"60% on the NPU\" but slow. What do you look at?<\/summary><div class=\"qa-body\"><p>Where the other 40% is. A fallback in the middle that splits the NPU subgraph and forces large-tensor DMA both ways kills you; the same ops clustered at the tail (NMS, decode) cost one boundary. I read the partition report, find the cause (dtype, dynamic shape, unsupported attr), then push fallbacks to the boundary or the DSP, or rewrite them with supported ops.<\/p><\/div><\/details><h2 id=\"onnx-quantization\">ONNX &amp; quantization<\/h2>\n<details class=\"qa\" open><summary>Q: What is a QDQ model?<\/summary><div class=\"qa-body\"><p>An FP32 ONNX graph annotated with QuantizeLinear/DequantizeLinear pairs carrying scale and zero-point. The FP32 ops between Q and DQ are reference semantics; the compiler pattern-matches Q→op→Q and emits a fused INT8 hardware op. It's the portable, framework-neutral way quantization travels into the embedded compiler.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: A layer unexpectedly runs in FP32 on the NPU. Why?<\/summary><div class=\"qa-body\"><p>Usually a missing or unfusible Q/DQ pair around it, a dynamic shape, an unsupported attribute, or a dtype mismatch. I inspect the graph — a stray op between Q and the consumer breaks the fusion and the region silently runs in FP32 or on the DSP. Fix by completing the QDQ, pinning the shape, or removing the intruding op.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's \"graph surgery\" and when do you use it?<\/summary><div class=\"qa-body\"><p>Reading and rewriting the ONNX graph — fold constants, pin dynamic shapes, remove pre/post-processing, replace an unsupported op, or split the model — usually on a customer's model with no training pipeline. It's a minutes-not-weeks fix that turns a 40%-on-NPU model into a 95%-on-NPU one. Tools: onnx, onnx-graphsurgeon, onnxsim, Netron to inspect.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: PTQ vs QAT, and how do you frame each in this role?<\/summary><div class=\"qa-body\"><p>PTQ quantizes a trained model with no gradients — needs only a representative calibration set, runs in minutes, I own it. QAT simulates quantization during fine-tuning so weights adapt — best accuracy, needs the training pipeline, it's a collaboration where I own the quantization scheme and target and the training team owns the loop. PTQ first, QAT when PTQ misses.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How does calibration pick activation ranges, and which method?<\/summary><div class=\"qa-body\"><p>It clips each activation to [−α, α] using stats from the calibration set. Min-max is outlier-sensitive; percentile clips rare spikes; entropy/KL minimizes distribution divergence (TensorRT's default); MSE minimizes quant error. Min-max for weights, entropy or percentile for activations.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: INT8 dropped mAP by 4 points. Walk me through recovering it.<\/summary><div class=\"qa-body\"><p>Localize with per-layer SQNR or cosine similarity — it's almost always a few layers, not the whole net. Explain it: outliers, per-tensor on a wide range, a depthwise block, or an approximate NPU op. Then climb the cheapest-first ladder: recalibrate, per-channel weights, mixed precision on the sensitive layers, bias correction, then QAT. Re-check accuracy and latency after each — pushing a layer to FP16/DSP costs a boundary.<\/p><\/div><\/details><h2 id=\"models-detection-segmentation-bev\">Models: detection, segmentation, BEV<\/h2>\n<details class=\"qa\" open><summary>Q: Where's the deployment trouble in a detection model?<\/summary><div class=\"qa-body\"><p>Not the backbone or FPN — those are conv-heavy and map onto the NPU. It's the head: NMS and decode are control-flow with dynamic output counts, so they stay on CPU/DSP at the graph tail, and I pad detections to a static max so downstream shapes stay fixed.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is BEV perception and why is it used?<\/summary><div class=\"qa-body\"><p>It fuses multiple cameras (and lidar/radar) into one top-down grid in vehicle coordinates — one coherent metric representation planning can consume, instead of six inconsistent image-space outputs. Fusion across cameras and time becomes natural.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's hard about deploying BEVFormer vs LSS?<\/summary><div class=\"qa-body\"><p>LSS does a forward depth-splat — a scatter/voxel-pool that's NPU-unfriendly but otherwise conv. BEVFormer does backward deformable attention — grid-sample, attention, LayerNorm, the classic NPU fallbacks. In both, the projection geometry is fixed by calibration, so I precompute the sampling as static tensors, keep the backbone and BEV head on the NPU, and isolate the attention/scatter to the DSP in higher precision.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why BEVFusion, and what does it cost to deploy?<\/summary><div class=\"qa-body\"><p>Camera + lidar fused in shared BEV — robust if one modality degrades. Cost is the lidar branch: voxelization and sparse/3D convolution that many NPUs don't support, so it runs on DSP/CPU or a specialized engine.<\/p><\/div><\/details><h2 id=\"soc-performance\">SoC &amp; performance<\/h2>\n<details class=\"qa\" open><summary>Q: What's usually the bottleneck on these SoCs?<\/summary><div class=\"qa-body\"><p>Memory bandwidth and scheduling, not FLOPs. DRAM is shared across every block; a fast NPU stalls waiting on it. So I profile per-block utilization and DMA traffic first — a memory-bound layer gets faster from less data movement (quantize, fuse, tile to SRAM, double-buffer DMA), not a better kernel.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does DMA double-buffering buy you?<\/summary><div class=\"qa-body\"><p>Overlap. Two SRAM buffers: DMA prefetches tile N+1 while the NPU computes tile N. Transfer hides behind compute and the NPU never stalls — it turns a memory-bound layer into a compute-bound one. Single-buffer synchronous DMA pays full transfer latency per tile.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's the IPMMU and how does it bite you?<\/summary><div class=\"qa-body\"><p>It's the MMU for the accelerators — translates the virtual addresses the NPU/DSP/DMA issue to physical DRAM, and isolates them so a block only touches memory mapped for it. If a buffer isn't mapped, the offload faults — nothing to do with the model. Its sibling gotcha is cache coherence: an unflushed/uninvalidated shared buffer returns stale data with no crash.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Separate latency and throughput for me.<\/summary><div class=\"qa-body\"><p>Latency is one frame end-to-end, set by the critical path — the safety-relevant number. Throughput is frames per second, set by the slowest stage once the pipeline is full. Pipelining raises throughput to 1/max-stage without lowering latency.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is multi-core scaling sublinear?<\/summary><div class=\"qa-body\"><p>Amdahl's serial fraction, cross-block synchronization cost, shared-DRAM contention, and load imbalance. Two NPU cores often give ~1.6×, not 2×. I attribute the gap rather than assume linear.<\/p><\/div><\/details><h2 id=\"runtime-safety\">Runtime &amp; safety<\/h2>\n<details class=\"qa\" open><summary>Q: Linux vs QNX — why QNX for safety?<\/summary><div class=\"qa-body\"><p>QNX is a microkernel RTOS: drivers and services run isolated in user space, so a fault is contained and restartable instead of panicking the kernel, and the small kernel is certifiable to ASIL-D. Linux (often PREEMPT_RT) runs the rich, non-safety side. For me it means determinism first — bounded WCET, static shapes, no surprise fallbacks.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: SIL vs HIL?<\/summary><div class=\"qa-body\"><p>SIL runs my actual compiled software against simulated/recorded inputs on a host — where I compare INT8 vs FP32 on a golden set to catch accuracy regressions cheaply. HIL puts the real SoC in the loop in real time against sensor playback or a driving simulator, validating timing and system behavior. On-target board runs give the honest latency numbers in between.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What is ASIL and where does perception land?<\/summary><div class=\"qa-body\"><p>Automotive Safety Integrity Level, A to D, derived from severity, exposure, controllability. D is most stringent. AD perception is typically C or D — a missed pedestrian is severe, common, hard to control — so maximum rigor: redundancy, coverage, tool qualification, a safety case.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is AI safety not just ISO 26262?<\/summary><div class=\"qa-body\"><p>26262 covers malfunctions — faults. But a network can work as designed and still be wrong on an unseen scene; that's a performance limitation, covered by SOTIF (ISO 21448). You can't prove a DNN correct, so safety relies on sensor and path redundancy, ODD monitoring, and a simpler safety monitor that can veto or safe-stop.<\/p><\/div><\/details><h2 id=\"behavioral-role\">Behavioral / role<\/h2>\n<details class=\"qa\" open><summary>Q: A customer says \"your toolchain made my model inaccurate.\" How do you respond?<\/summary><div class=\"qa-body\"><p>Reproduce first: run their model through SIL, compare INT8 vs FP32 on their data per layer to localize. Usually it's a few sensitive layers or an operator limitation, not the whole toolchain. I show the SQNR breakdown, propose the mitigation (recalibrate, mixed precision, QAT spec), quantify the accuracy/latency trade, and give them a clear recommendation and a timeline. Turn a complaint into a diagnosed, closed issue.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you keep C/C++ vs Python straight in this role?<\/summary><div class=\"qa-body\"><p>Python for the offline/dev side — quantization, graph surgery, validation tooling, benchmark scripts. C/C++ for the on-target runtime integration where determinism and the vendor runtime API live. I'm strongest in Python and can work the C/C++ integration side.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: You have one week to enable a new customer model on the SoC. Plan?<\/summary><div class=\"qa-body\"><p>Day 1: inspect the ONNX — op histogram, shapes, run it FP32 to get a reference. Day 2: graph surgery — fold constants, pin shapes, clean pre/post-processing. Day 3: PTQ with a representative calibration set, check the partition report. Day 4: measure accuracy (SIL) and latency (target), diagnose fallbacks and sensitive layers. Day 5: mitigate — mixed precision, push fallbacks to DSP/boundaries. Then write it up with the numbers and open a QAT ask if the accuracy target isn't met.<\/p><\/div><\/details>","toc":[{"level":2,"id":"embedded-accelerators","text":"Embedded accelerators"},{"level":2,"id":"onnx-quantization","text":"ONNX &amp; quantization"},{"level":2,"id":"models-detection-segmentation-bev","text":"Models: detection, segmentation, BEV"},{"level":2,"id":"soc-performance","text":"SoC &amp; performance"},{"level":2,"id":"runtime-safety","text":"Runtime &amp; safety"},{"level":2,"id":"behavioral-role","text":"Behavioral / role"}],"text":"interview q&a: rapid fire 💡 tl;dr each answer is the 30-second spoken version. grouped the way an interviewer escalates: accelerators → onnx & quantization → models → soc & performance → runtime & safety → behavioral. cover the answer, say it out loud, then check. embedded accelerators q: what are the compute blocks on an automotive soc and what's each good at? cnnip is a fixed-function conv engine — fastest, least flexible. npu is a programmable tensor accelerator (usually a systolic mac array), fast on the standard int8 op set. dsp is a programmable vector core for custom ops and pre/post-processing. cpu is the universal fallback. efficiency goes cnnip > npu > dsp > cpu; flexibility goes the other way. q: what happens to an operator the npu doesn't support? it falls back to dsp or cpu, which forces a subgraph boundary — a tensor copy across memory plus a cross-core sync. one unsupported op in the middle is worse than several at the end, because it splits an npu subgraph and inserts two boundaries instead of one. q: how do you decide if a layer is compute-bound or memory-bound? roofline: arithmetic intensity = flops per byte moved. low intensity (depthwise, elementwise, small matmul) is memory-bound — capped by bandwidth. high intensity (big dense conv) is compute-bound — capped by mac throughput. quantizing to int8 cuts bytes 4×, shifting memory-bound layers toward the compute roof. q: a model is \"60% on the npu\" but slow. what do you look at? where the other 40% is. a fallback in the middle that splits the npu subgraph and forces large-tensor dma both ways kills you; the same ops clustered at the tail (nms, decode) cost one boundary. i read the partition report, find the cause (dtype, dynamic shape, unsupported attr), then push fallbacks to the boundary or the dsp, or rewrite them with supported ops. onnx & quantization q: what is a qdq model? an fp32 onnx graph annotated with quantizelinear/dequantizelinear pairs carrying scale and zero-point. the fp32 ops between q and dq are reference semantics; the compiler pattern-matches q→op→q and emits a fused int8 hardware op. it's the portable, framework-neutral way quantization travels into the embedded compiler. q: a layer unexpectedly runs in fp32 on the npu. why? usually a missing or unfusible q/dq pair around it, a dynamic shape, an unsupported attribute, or a dtype mismatch. i inspect the graph — a stray op between q and the consumer breaks the fusion and the region silently runs in fp32 or on the dsp. fix by completing the qdq, pinning the shape, or removing the intruding op. q: what's \"graph surgery\" and when do you use it? reading and rewriting the onnx graph — fold constants, pin dynamic shapes, remove pre/post-processing, replace an unsupported op, or split the model — usually on a customer's model with no training pipeline. it's a minutes-not-weeks fix that turns a 40%-on-npu model into a 95%-on-npu one. tools: onnx, onnx-graphsurgeon, onnxsim, netron to inspect. q: ptq vs qat, and how do you frame each in this role? ptq quantizes a trained model with no gradients — needs only a representative calibration set, runs in minutes, i own it. qat simulates quantization during fine-tuning so weights adapt — best accuracy, needs the training pipeline, it's a collaboration where i own the quantization scheme and target and the training team owns the loop. ptq first, qat when ptq misses. q: how does calibration pick activation ranges, and which method? it clips each activation to [−α, α] using stats from the calibration set. min-max is outlier-sensitive; percentile clips rare spikes; entropy/kl minimizes distribution divergence (tensorrt's default); mse minimizes quant error. min-max for weights, entropy or percentile for activations. q: int8 dropped map by 4 points. walk me through recovering it. localize with per-layer sqnr or cosine similarity — it's almost always a few layers, not the whole net. explain it: outliers, per-tensor on a wide range, a depthwise block, or an approximate npu op. then climb the cheapest-first ladder: recalibrate, per-channel weights, mixed precision on the sensitive layers, bias correction, then qat. re-check accuracy and latency after each — pushing a layer to fp16/dsp costs a boundary. models: detection, segmentation, bev q: where's the deployment trouble in a detection model? not the backbone or fpn — those are conv-heavy and map onto the npu. it's the head: nms and decode are control-flow with dynamic output counts, so they stay on cpu/dsp at the graph tail, and i pad detections to a static max so downstream shapes stay fixed. q: what is bev perception and why is it used? it fuses multiple cameras (and lidar/radar) into one top-down grid in vehicle coordinates — one coherent metric representation planning can consume, instead of six inconsistent image-space outputs. fusion across cameras and time becomes natural. q: what's hard about deploying bevformer vs lss? lss does a forward depth-splat — a scatter/voxel-pool that's npu-unfriendly but otherwise conv. bevformer does backward deformable attention — grid-sample, attention, layernorm, the classic npu fallbacks. in both, the projection geometry is fixed by calibration, so i precompute the sampling as static tensors, keep the backbone and bev head on the npu, and isolate the attention/scatter to the dsp in higher precision. q: why bevfusion, and what does it cost to deploy? camera + lidar fused in shared bev — robust if one modality degrades. cost is the lidar branch: voxelization and sparse/3d convolution that many npus don't support, so it runs on dsp/cpu or a specialized engine. soc & performance q: what's usually the bottleneck on these socs? memory bandwidth and scheduling, not flops. dram is shared across every block; a fast npu stalls waiting on it. so i profile per-block utilization and dma traffic first — a memory-bound layer gets faster from less data movement (quantize, fuse, tile to sram, double-buffer dma), not a better kernel. q: what does dma double-buffering buy you? overlap. two sram buffers: dma prefetches tile n+1 while the npu computes tile n. transfer hides behind compute and the npu never stalls — it turns a memory-bound layer into a compute-bound one. single-buffer synchronous dma pays full transfer latency per tile. q: what's the ipmmu and how does it bite you? it's the mmu for the accelerators — translates the virtual addresses the npu/dsp/dma issue to physical dram, and isolates them so a block only touches memory mapped for it. if a buffer isn't mapped, the offload faults — nothing to do with the model. its sibling gotcha is cache coherence: an unflushed/uninvalidated shared buffer returns stale data with no crash. q: separate latency and throughput for me. latency is one frame end-to-end, set by the critical path — the safety-relevant number. throughput is frames per second, set by the slowest stage once the pipeline is full. pipelining raises throughput to 1/max-stage without lowering latency. q: why is multi-core scaling sublinear? amdahl's serial fraction, cross-block synchronization cost, shared-dram contention, and load imbalance. two npu cores often give ~1.6×, not 2×. i attribute the gap rather than assume linear. runtime & safety q: linux vs qnx — why qnx for safety? qnx is a microkernel rtos: drivers and services run isolated in user space, so a fault is contained and restartable instead of panicking the kernel, and the small kernel is certifiable to asil-d. linux (often preempt_rt) runs the rich, non-safety side. for me it means determinism first — bounded wcet, static shapes, no surprise fallbacks. q: sil vs hil? sil runs my actual compiled software against simulated/recorded inputs on a host — where i compare int8 vs fp32 on a golden set to catch accuracy regressions cheaply. hil puts the real soc in the loop in real time against sensor playback or a driving simulator, validating timing and system behavior. on-target board runs give the honest latency numbers in between. q: what is asil and where does perception land? automotive safety integrity level, a to d, derived from severity, exposure, controllability. d is most stringent. ad perception is typically c or d — a missed pedestrian is severe, common, hard to control — so maximum rigor: redundancy, coverage, tool qualification, a safety case. q: why is ai safety not just iso 26262? 26262 covers malfunctions — faults. but a network can work as designed and still be wrong on an unseen scene; that's a performance limitation, covered by sotif (iso 21448). you can't prove a dnn correct, so safety relies on sensor and path redundancy, odd monitoring, and a simpler safety monitor that can veto or safe-stop. behavioral / role q: a customer says \"your toolchain made my model inaccurate.\" how do you respond? reproduce first: run their model through sil, compare int8 vs fp32 on their data per layer to localize. usually it's a few sensitive layers or an operator limitation, not the whole toolchain. i show the sqnr breakdown, propose the mitigation (recalibrate, mixed precision, qat spec), quantify the accuracy/latency trade, and give them a clear recommendation and a timeline. turn a complaint into a diagnosed, closed issue. q: how do you keep c/c++ vs python straight in this role? python for the offline/dev side — quantization, graph surgery, validation tooling, benchmark scripts. c/c++ for the on-target runtime integration where determinism and the vendor runtime api live. i'm strongest in python and can work the c/c++ integration side. q: you have one week to enable a new customer model on the soc. plan? day 1: inspect the onnx — op histogram, shapes, run it fp32 to get a reference. day 2: graph surgery — fold constants, pin shapes, clean pre/post-processing. day 3: ptq with a representative calibration set, check the partition report. day 4: measure accuracy (sil) and latency (target), diagnose fallbacks and sensitive layers. day 5: mitigate — mixed precision, push fallbacks to dsp/boundaries. then write it up with the numbers and open a qat ask if the accuracy target isn't met.","words":1652},{"path":"07-interview-qa/cheat-sheet.md","title":"One-Page Cheat Sheet (Morning Of)","section":"7 · Interview Q&A","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"one-page-cheat-sheet-morning-of\">One-Page Cheat Sheet (Morning Of)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Everything in one skim. If you can recite this, you can hold the whole loop.<\/div><\/div>\n<h2 id=\"the-four-blocks-efficiency-flexibility\">The four blocks (efficiency ↓, flexibility ↑)<\/h2>\n<p><code>CNNIP<\/code> (fixed conv) → <code>NPU<\/code> (INT8 tensor array) → <code>DSP<\/code> (vector, custom ops) → <code>CPU<\/code> (fallback). Keep the model on NPU/CNNIP; spill the rest to DSP before CPU.<\/p>\n<h2 id=\"the-golden-rule\">The golden rule<\/h2>\n<blockquote><p><strong>Data movement and scheduling, not FLOPs, are the bottleneck.<\/strong> Keep the model on the accelerator, minimize partition boundaries, hide DMA behind compute.<\/p><\/blockquote>\n<h2 id=\"roofline-compute-vs-memory-bound\">Roofline (compute vs memory bound)<\/h2>\n<p>intensity = FLOPs / bytes moved. Low → <strong>memory-bound<\/strong> (fix: quantize, fuse, tile to SRAM, double-buffer DMA). High → <strong>compute-bound<\/strong> (fix: smaller/faster model, sparsity). INT8 cuts bytes 4× → shifts memory-bound layers toward the compute roof.<\/p>\n<h2 id=\"operator-mapping\">Operator mapping<\/h2>\n<p>Supported → mapped (+fused: Conv+Bias+Act → 1 pass). Unsupported → fallback → <strong>subgraph boundary = copy + sync<\/strong>. One fallback in the <em>middle<\/em> = 2 boundaries; fallbacks at the <em>tail<\/em> (NMS/decode) = 1. Read the <strong>partition report<\/strong> first.<\/p>\n<h2 id=\"onnx-toolchain\">ONNX toolchain<\/h2>\n<ul><li>Graph = protobuf, nodes connected <strong>by tensor name<\/strong>; opset matters; run <strong>shape inference<\/strong>.<\/li><li><strong>Graph surgery<\/strong>: fold constants, pin dynamic shapes, replace/remove ops, <strong>segment<\/strong> the<\/li><\/ul>\n<p>model. Tools: <code>onnx<\/code>, <code>onnx-graphsurgeon<\/code>, <code>onnxsim<\/code>, Netron.<\/p>\n<ul><li><strong>QDQ model<\/strong> = FP32 graph + QuantizeLinear/DequantizeLinear (scale, zero-point). Compiler<\/li><\/ul>\n<p>fuses Q→op→Q into INT8. Missing/unfusible Q/DQ → layer silently runs FP32.<\/p>\n<ul><li><strong>Compiler<\/strong> (offline): optimize, lower QDQ, fuse, <strong>partition<\/strong>, plan memory, emit<\/li><\/ul>\n<p>hardware-specific engine. <strong>Runtime<\/strong>: load, bind buffers (zero-copy), schedule subgraphs.   ONNX Runtime = <strong>Execution Providers<\/strong>, priority order, CPU EP = universal fallback.<\/p>\n<h2 id=\"quantization\">Quantization<\/h2>\n<ul><li>Weights: <strong>symmetric, per-channel<\/strong>. Activations: per-tensor, entropy/percentile calib.<\/li><li><strong>PTQ<\/strong> (you own, minutes, calibration set) → <strong>QAT<\/strong> (collaboration, best accuracy, STE<\/li><\/ul>\n<p>through round).<\/p>\n<ul><li><strong>Accuracy recovery ladder<\/strong> (cheapest first): recalibrate → per-channel weights → **mixed<\/li><\/ul>\n<p>precision on sensitive layers<strong> → bias correction / cross-layer equalization → QAT → graph   change. Localize with <\/strong>per-layer SQNR/cosine<strong>. Re-check accuracy <\/strong>and** latency.<\/p>\n<h2 id=\"models\">Models<\/h2>\n<ul><li>Skeleton: <strong>backbone → neck (FPN) → head<\/strong>. Backbone/neck = NPU-friendly; head = trouble.<\/li><li>Detection: one-stage (YOLO) default; <strong>NMS/decode off NPU at the tail<\/strong>; pad to static max.<\/li><\/ul>\n<p>Metric <strong>mAP<\/strong> (IoU thresholds).<\/p>\n<ul><li>Segmentation: watch <strong><code>Resize<\/code> modes<\/strong> + big activations (bandwidth). Metric <strong>mIoU<\/strong>.<\/li><li><strong>BEV<\/strong> = multi-cam → top-down grid. <strong>LSS<\/strong> (forward depth-splat, scatter), <strong>BEVFormer<\/strong><\/li><\/ul>\n<p>(backward deformable attention — grid-sample/LayerNorm fallbacks), <strong>BEVFusion<\/strong>   (+lidar sparse/3D conv), <strong>Occupancy<\/strong> (3D voxels — bandwidth heavy). Geometry is fixed by   calibration → <strong>precompute sampling as static tensors<\/strong>.<\/p>\n<h2 id=\"soc-hardware\">SoC hardware<\/h2>\n<ul><li>Hierarchy: registers → <strong>SRAM<\/strong> (tile here) → shared <strong>DRAM<\/strong> (the limiter).<\/li><li><strong>DMA<\/strong> moves data w/o CPU; <strong>double-buffer<\/strong> to overlap with compute.<\/li><li><strong>IPMMU<\/strong> = MMU for accelerators: translates + isolates. Unmapped buffer → <strong>fault<\/strong>;<\/li><\/ul>\n<p>incoherent buffer → <strong>stale data<\/strong>. Checklist: mapped + cache-coherent.<\/p>\n<ul><li><strong>Latency<\/strong> = critical path (safety number). <strong>Throughput<\/strong> = slowest stage (pipelined).<\/li><\/ul>\n<p>Multi-core scaling <strong>sublinear<\/strong>: Amdahl + sync + DRAM contention + imbalance.<\/p>\n<h2 id=\"runtime-safety\">Runtime &amp; safety<\/h2>\n<ul><li><strong>Linux<\/strong> (PREEMPT_RT, rich/non-safety) vs <strong>QNX<\/strong> (microkernel RTOS, hard real-time,<\/li><\/ul>\n<p>user-space driver isolation, ASIL-D certifiable). <strong>Determinism first<\/strong>: bounded WCET,   static shapes, no surprise fallbacks.<\/p>\n<ul><li>Validation ladder: <strong>MIL → SIL → PIL → HIL<\/strong>. SIL = compiled INT8 vs FP32 on golden set<\/li><\/ul>\n<p>(catch accuracy regressions). On-target = honest latency. HIL = real SoC, real time,   sensor playback / closed-loop sim. Golden-set <strong>regression every release<\/strong>.<\/p>\n<ul><li><strong>ISO 26262<\/strong> → <strong>ASIL A–D<\/strong> (severity × exposure × controllability); perception ~C/D.<\/li><\/ul>\n<p><strong>SOTIF (21448)<\/strong> = wrong-but-not-faulty (the AI case) → redundancy, ODD monitoring, safety   monitor. Accuracy targets and determinism are <strong>hard limits<\/strong>; configs are safety evidence.<\/p>\n<h2 id=\"your-framing\">Your framing<\/h2>\n<blockquote><p>\"I take a trained CV/BEV model and make it run fast, accurately, and deterministically on a fixed embedded accelerator: quantize it (PTQ→QAT), get it through the ONNX compiler cleanly with graph surgery, keep the bulk on the NPU and isolate fallbacks, diagnose accuracy loss per layer, and validate on SIL/HIL under ISO 26262. My GPU/TensorRT background is the same concepts; here the compiler is ONNX-based and the target is fixed and safety-rated.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"the-four-blocks-efficiency-flexibility","text":"The four blocks (efficiency ↓, flexibility ↑)"},{"level":2,"id":"the-golden-rule","text":"The golden rule"},{"level":2,"id":"roofline-compute-vs-memory-bound","text":"Roofline (compute vs memory bound)"},{"level":2,"id":"operator-mapping","text":"Operator mapping"},{"level":2,"id":"onnx-toolchain","text":"ONNX toolchain"},{"level":2,"id":"quantization","text":"Quantization"},{"level":2,"id":"models","text":"Models"},{"level":2,"id":"soc-hardware","text":"SoC hardware"},{"level":2,"id":"runtime-safety","text":"Runtime &amp; safety"},{"level":2,"id":"your-framing","text":"Your framing"}],"text":"one-page cheat sheet (morning of) 💡 tl;dr everything in one skim. if you can recite this, you can hold the whole loop. the four blocks (efficiency ↓, flexibility ↑) cnnip (fixed conv) → npu (int8 tensor array) → dsp (vector, custom ops) → cpu (fallback). keep the model on npu/cnnip; spill the rest to dsp before cpu. the golden rule data movement and scheduling, not flops, are the bottleneck. keep the model on the accelerator, minimize partition boundaries, hide dma behind compute. roofline (compute vs memory bound) intensity = flops / bytes moved. low → memory-bound (fix: quantize, fuse, tile to sram, double-buffer dma). high → compute-bound (fix: smaller/faster model, sparsity). int8 cuts bytes 4× → shifts memory-bound layers toward the compute roof. operator mapping supported → mapped (+fused: conv+bias+act → 1 pass). unsupported → fallback → subgraph boundary = copy + sync . one fallback in the middle = 2 boundaries; fallbacks at the tail (nms/decode) = 1. read the partition report first. onnx toolchain graph = protobuf, nodes connected by tensor name ; opset matters; run shape inference . graph surgery : fold constants, pin dynamic shapes, replace/remove ops, segment the model. tools: onnx , onnx-graphsurgeon , onnxsim , netron. qdq model = fp32 graph + quantizelinear/dequantizelinear (scale, zero-point). compiler fuses q→op→q into int8. missing/unfusible q/dq → layer silently runs fp32. compiler (offline): optimize, lower qdq, fuse, partition , plan memory, emit hardware-specific engine. runtime : load, bind buffers (zero-copy), schedule subgraphs. onnx runtime = execution providers , priority order, cpu ep = universal fallback. quantization weights: symmetric, per-channel . activations: per-tensor, entropy/percentile calib. ptq (you own, minutes, calibration set) → qat (collaboration, best accuracy, ste through round). accuracy recovery ladder (cheapest first): recalibrate → per-channel weights → **mixed precision on sensitive layers → bias correction / cross-layer equalization → qat → graph change. localize with per-layer sqnr/cosine . re-check accuracy and** latency. models skeleton: backbone → neck (fpn) → head . backbone/neck = npu-friendly; head = trouble. detection: one-stage (yolo) default; nms/decode off npu at the tail ; pad to static max. metric map (iou thresholds). segmentation: watch resize modes + big activations (bandwidth). metric miou . bev = multi-cam → top-down grid. lss (forward depth-splat, scatter), bevformer (backward deformable attention — grid-sample/layernorm fallbacks), bevfusion (+lidar sparse/3d conv), occupancy (3d voxels — bandwidth heavy). geometry is fixed by calibration → precompute sampling as static tensors . soc hardware hierarchy: registers → sram (tile here) → shared dram (the limiter). dma moves data w/o cpu; double-buffer to overlap with compute. ipmmu = mmu for accelerators: translates + isolates. unmapped buffer → fault ; incoherent buffer → stale data . checklist: mapped + cache-coherent. latency = critical path (safety number). throughput = slowest stage (pipelined). multi-core scaling sublinear : amdahl + sync + dram contention + imbalance. runtime & safety linux (preempt_rt, rich/non-safety) vs qnx (microkernel rtos, hard real-time, user-space driver isolation, asil-d certifiable). determinism first : bounded wcet, static shapes, no surprise fallbacks. validation ladder: mil → sil → pil → hil . sil = compiled int8 vs fp32 on golden set (catch accuracy regressions). on-target = honest latency. hil = real soc, real time, sensor playback / closed-loop sim. golden-set regression every release . iso 26262 → asil a–d (severity × exposure × controllability); perception ~c/d. sotif (21448) = wrong-but-not-faulty (the ai case) → redundancy, odd monitoring, safety monitor. accuracy targets and determinism are hard limits ; configs are safety evidence. your framing \"i take a trained cv/bev model and make it run fast, accurately, and deterministically on a fixed embedded accelerator: quantize it (ptq→qat), get it through the onnx compiler cleanly with graph surgery, keep the bulk on the npu and isolate fallbacks, diagnose accuracy loss per layer, and validate on sil/hil under iso 26262. my gpu/tensorrt background is the same concepts; here the compiler is onnx-based and the target is fixed and safety-rated.\"","words":648}]};
/* Runtime app — no markdown engine, all content is pre-rendered in DATA. */
const PAGES = DATA.pages;
const byPath = {};
PAGES.forEach(p => byPath[p.path] = p);
let currentPath = null;

// --- live Jupyter playground link (served on the same host, port 8888) ---
const JUPYTER_PORT = 8888;
const JUPYTER_TOKEN = "koireader";   // matches run.sh / koi-jupyter service
function jupyterURL(){
  const proto = location.protocol === "file:" ? "http:" : location.protocol;
  const host = location.hostname || "localhost";
  return proto + "//" + host + ":" + JUPYTER_PORT + "/lab?token=" + JUPYTER_TOKEN;
}

// translucent tint from an accent hex — works on light AND dark backgrounds
function hexToRgba(hex, a){
  hex = (hex||"").replace("#","");
  if(hex.length===3) hex = hex.split("").map(c=>c+c).join("");
  const n = parseInt(hex||"000000", 16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
}

/* ---------------------- persistent study-state store ---------------------- */
// localStorage is the instant/offline copy; /api/progress is shared by devices.
const STORE_KEY = "mlprep-v1";
function loadStore(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; }catch(_){ return {}; } }
function saveStore(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(_){} }
let STATE = loadStore();
let remoteReady = location.protocol === "file:";
let serverHasState = false;
let saveQueue = Promise.resolve();
let syncLabel = location.protocol === "file:" ? "local" : "connecting";
function normalizeState(s){
  s = s && typeof s === "object" ? s : {};
  s.done = s.done && typeof s.done === "object" ? s.done : {};
  s.cards = s.cards && typeof s.cards === "object" ? s.cards : {};
  s.pins = s.pins && typeof s.pins === "object" ? s.pins : {};
  s.analytics = s.analytics && typeof s.analytics === "object" ? s.analytics : {};
  s.last = typeof s.last === "string" ? s.last : null;
  return s;
}
STATE = normalizeState(STATE);
function hasStudyState(){
  return Object.keys(STATE.done).length || Object.keys(STATE.cards).length ||
    Object.keys(STATE.pins).length || Object.keys(STATE.analytics).length;
}
function mergeLegacyLocal(remote, local){
  let changed=false;
  const deleted=remote._deleted && typeof remote._deleted==="object" ? remote._deleted : {};
  ["done","cards","pins"].forEach(field=>{
    const tombstones=deleted[field] && typeof deleted[field]==="object" ? deleted[field] : {};
    Object.keys(local[field]||{}).forEach(key=>{
      if(!(key in remote[field]) && !(key in tombstones)){ remote[field][key]=local[field][key]; changed=true; }
    });
  });
  Object.keys(local.analytics||{}).forEach(key=>{
    if(!(key in remote.analytics)){ remote.analytics[key]=local.analytics[key]; changed=true; }
  });
  return changed;
}

/* ------------------------- per-page study analytics ------------------------ */
let trackedPagePath=null;
let trackedPageStartedAt=null;
let analyticsSaveTimer=null;
let analyticsPaintTimer=null;
function analyticsEntry(path){
  let a=STATE.analytics[path];
  if(!a || typeof a!=="object") a=STATE.analytics[path]={};
  a.seconds=Math.max(0, Number(a.seconds)||0);
  a.visits=Math.max(0, Math.floor(Number(a.visits)||0));
  a.lastVisited=Math.max(0, Number(a.lastVisited)||0);
  return a;
}
function pageSeconds(path){
  const a=analyticsEntry(path);
  let seconds=a.seconds;
  if(path===trackedPagePath && trackedPageStartedAt!==null && document.visibilityState==="visible"){
    seconds+=Math.max(0,Date.now()-trackedPageStartedAt)/1000;
  }
  return seconds;
}
function fmtMinutes(seconds){
  const mins=Math.max(0,seconds)/60;
  return (mins<10?mins.toFixed(1):Math.round(mins))+" min";
}
function persistPageAnalytics(path, beacon){
  if(!path) return;
  const change={op:"set",field:"analytics",key:path,value:analyticsEntry(path)};
  saveStore(STATE);
  if(!remoteReady || location.protocol==="file:" || (!serverHasState && !hasStudyState())) return;
  if(beacon && navigator.sendBeacon){
    try{
      navigator.sendBeacon("/api/progress",new Blob([JSON.stringify(change)],{type:"application/json"}));
      return;
    }catch(_){}
  }
  persist(change);
}
function flushTrackedPage(saveRemote){
  if(!trackedPagePath || trackedPageStartedAt===null) return;
  const now=Date.now();
  analyticsEntry(trackedPagePath).seconds+=Math.max(0,now-trackedPageStartedAt)/1000;
  trackedPageStartedAt=now;
  if(saveRemote) persistPageAnalytics(trackedPagePath,false); else saveStore(STATE);
}
function beginTrackedPage(){
  if(!trackedPagePath || trackedPageStartedAt!==null || document.visibilityState!=="visible") return;
  const a=analyticsEntry(trackedPagePath);
  a.visits++;
  a.lastVisited=Date.now();
  trackedPageStartedAt=Date.now();
  persistPageAnalytics(trackedPagePath,false);
}
function switchTrackedPage(path){
  if(path===trackedPagePath && trackedPageStartedAt!==null) return;
  flushTrackedPage(true);
  trackedPageStartedAt=null;
  trackedPagePath=path;
  beginTrackedPage();
}
function analyticsStatus(path){
  if(path==="README.md") return "Overview";
  if(isDone(path)) return "Completed";
  return analyticsEntry(path).visits?"In progress":"Not started";
}
function escAnalytics(s){
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function renderAnalyticsPanel(path){
  const old=document.getElementById("analyticsPanel"); if(old) old.remove();
  if(path!=="README.md") return;
  const content=document.getElementById("content"); if(!content) return;
  const pages=progressPages();
  const done=pages.filter(p=>isDone(p.path)).length;
  const panel=document.createElement("section");
  panel.id="analyticsPanel"; panel.className="analytics-panel";
  panel.innerHTML='<div class="analytics-overview-head"><div><span class="analytics-kicker">Study analytics</span>'+
    '<h2>Time on every page</h2><p>Counts only while this site is visible. Time and completion sync across devices.</p></div>'+
    '<div class="analytics-total"><strong id="analyticsTotalTime">0.0 min</strong><span>'+done+" / "+pages.length+' completed</span></div></div>'+
    '<div class="analytics-page-list">'+PAGES.map(p=>{
      const a=analyticsEntry(p.path), status=analyticsStatus(p.path);

function persist(change){
  saveStore(STATE);
  if(!remoteReady || location.protocol === "file:" || (!serverHasState && !hasStudyState())) return;
  syncLabel = "saving"; refreshProgressUI();
  const body=JSON.stringify(change || {op:"replace", state:STATE});
  saveQueue=saveQueue.catch(()=>{}).then(async()=>{
    try{
      const r=await fetch("/api/progress", {method:"POST", headers:{"Content-Type":"application/json"}, body});
      if(!r.ok) throw new Error("HTTP "+r.status);
      serverHasState=true; syncLabel="synced";
    }catch(_){ syncLabel="local — sync unavailable"; }
    refreshProgressUI();
  });
}
async function syncProgress(){
  if(location.protocol === "file:") return;
  try{
    const r=await fetch("/api/progress", {cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const payload=await r.json();
    let migrated=false;
    if(payload.exists){
      const remote=normalizeState(payload.state);
      migrated=mergeLegacyLocal(remote, STATE);
      STATE=remote; saveStore(STATE); serverHasState=true;
    }
    remoteReady=true; syncLabel="synced";
    if((!payload.exists && hasStudyState()) || migrated) persist({op:"replace", state:STATE});
  }catch(_){ remoteReady=true; syncLabel="local — sync unavailable"; }
}

function hashStr(s){ let h=5381; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))|0; return (h>>>0).toString(36); }

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;
  if(/\/$/.test(href)) href += "README.md";
  const base = curPath.split("/").slice(0,-1);
  href.split("/").forEach(p=>{
    if(p==="."||p==="") return;
    if(p==="..") base.pop(); else base.push(p);
  });
  return base.join("/");
}

/* ---------- Precision vs Recall interactive widget (metrics page) ---------- */
function initPRWidget(){
  const host=document.getElementById("pr-widget");
  if(!host) return;

  // Deterministic pseudo-random data so the picture is stable across reloads.
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  const rnd=mulberry32(1234567);
  function gauss(m,s){ let u=0,v=0; while(!u)u=rnd(); while(!v)v=rnd(); return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
  const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));

  const N=260, posRate=0.38;
  const pts=[];
  for(let k=0;k<N;k++){
    const pos=rnd()<posRate;
    const score=clamp(pos?gauss(0.66,0.17):gauss(0.34,0.17),0.01,0.99);
    pts.push({pos, score, jitter:rnd()});
  }

  // Geometry
  const W=660,H=300,padL=48,padR=18,padT=18,padB=46;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xOf=s=>padL+s*plotW;
  const yOf=j=>padT+8+j*(plotH-16);

  const dots=pts.map(p=>{
    const cx=xOf(p.score).toFixed(1), cy=yOf(p.jitter).toFixed(1);
    const cls=p.pos?"prw-pos":"prw-neg";
    return '<circle class="prw-dot '+cls+'" cx="'+cx+'" cy="'+cy+'" r="4.2"/>';
  }).join("");

  // Precision/recall curve across all thresholds (for the mini chart)
  const P=pts.filter(p=>p.pos).length, Ntot=pts.length;
  const curve=[];
  for(let t=0;t<=1.0001;t+=0.02){
    let tp=0,fp=0;
    for(const p of pts){ if(p.score>=t){ p.pos?tp++:fp++; } }
    const prec=(tp+fp)?tp/(tp+fp):1;
    const rec=P?tp/P:0;
    curve.push({t, prec, rec});
  }
  const cW=210,cH=190,cPad=34;
  const rx=r=>cPad+r*(cW-cPad-10);
  const ry=p=>10+(1-p)*(cH-cPad-10);
  const curvePath=curve.map((c,k)=>(k?'L':'M')+rx(c.rec).toFixed(1)+' '+ry(c.prec).toFixed(1)).join(' ');

  host.innerHTML=
  '<div class="prw-wrap">'+
    '<div class="prw-main">'+
      '<svg class="prw-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
        '<rect id="prw-shade" x="0" y="'+padT+'" width="0" height="'+plotH+'" class="prw-shade"/>'+
        '<line x1="'+padL+'" y1="'+(padT+plotH)+'" x2="'+(W-padR)+'" y2="'+(padT+plotH)+'" class="prw-axis"/>'+
        '<g class="prw-ticks">'+
          [0,0.25,0.5,0.75,1].map(v=>'<text x="'+xOf(v).toFixed(0)+'" y="'+(padT+plotH+20)+'" text-anchor="middle">'+v+'</text>').join('')+
        '</g>'+
        '<text x="'+(padL+plotW/2)+'" y="'+(H-6)+'" text-anchor="middle" class="prw-axlbl">model score →</text>'+
        dots+
        '<line id="prw-line" x1="0" y1="'+padT+'" x2="0" y2="'+(padT+plotH)+'" class="prw-thline"/>'+
        '<text id="prw-lbl" x="0" y="'+(padT-4)+'" text-anchor="middle" class="prw-thlbl">0.50</text>'+
      '</svg>'+
      '<div class="prw-controls">'+
        '<label class="prw-slabel">Threshold <b id="prw-tval">0.50</b></label>'+
        '<input id="prw-slider" type="range" min="0" max="1" step="0.01" value="0.5">'+
        '<div class="prw-legend"><span><i class="prw-lg-pos"></i> actual positive</span>'+
          '<span><i class="prw-lg-neg"></i> actual negative</span>'+
          '<span><i class="prw-lg-shade"></i> predicted positive</span></div>'+
      '</div>'+
    '</div>'+
    '<div class="prw-side">'+
      '<div class="prw-metrics">'+
        '<div class="prw-metric prw-mp"><span class="prw-mlab">Precision</span><span class="prw-mval" id="prw-prec">—</span></div>'+
        '<div class="prw-metric prw-mr"><span class="prw-mlab">Recall</span><span class="prw-mval" id="prw-rec">—</span></div>'+
        '<div class="prw-metric prw-mf"><span class="prw-mlab">F1</span><span class="prw-mval" id="prw-f1">—</span></div>'+
      '</div>'+
      '<table class="prw-cm"><tr><td class="prw-cm-h"></td><td class="prw-cm-h">pred +</td><td class="prw-cm-h">pred −</td></tr>'+
        '<tr><td class="prw-cm-h">actual +</td><td class="prw-tp" id="prw-tp">0</td><td class="prw-fn" id="prw-fn">0</td></tr>'+
        '<tr><td class="prw-cm-h">actual −</td><td class="prw-fp" id="prw-fp">0</td><td class="prw-tn" id="prw-tn">0</td></tr>'+
      '</table>'+
      '<svg class="prw-pr" viewBox="0 0 '+cW+' '+cH+'" preserveAspectRatio="xMidYMid meet">'+
        '<line x1="'+cPad+'" y1="'+(cH-cPad)+'" x2="'+(cW-8)+'" y2="'+(cH-cPad)+'" class="prw-axis"/>'+
        '<line x1="'+cPad+'" y1="10" x2="'+cPad+'" y2="'+(cH-cPad)+'" class="prw-axis"/>'+
        '<path d="'+curvePath+'" class="prw-curve"/>'+
        '<circle id="prw-prdot" r="5" class="prw-prdot"/>'+
        '<text x="'+((cW+cPad)/2)+'" y="'+(cH-6)+'" text-anchor="middle" class="prw-axlbl">recall</text>'+
        '<text x="12" y="'+(cH/2)+'" transform="rotate(-90 12 '+(cH/2)+')" text-anchor="middle" class="prw-axlbl">precision</text>'+
      '</svg>'+
    '</div>'+
  '</div>';

  const slider=host.querySelector("#prw-slider");
  const line=host.querySelector("#prw-line");
  const shade=host.querySelector("#prw-shade");
  const lbl=host.querySelector("#prw-lbl");
  const prdot=host.querySelector("#prw-prdot");
  const el=id=>host.querySelector("#"+id);

  function update(t){
    let tp=0,fp=0,fn=0,tn=0;
    for(const p of pts){
      if(p.score>=t){ p.pos?tp++:fp++; } else { p.pos?fn++:tn++; }
    }
    const prec=(tp+fp)?tp/(tp+fp):1;
    const rec=(tp+fn)?tp/(tp+fn):0;
    const f1=(prec+rec)?2*prec*rec/(prec+rec):0;
    const x=xOf(t);
    line.setAttribute("x1",x); line.setAttribute("x2",x);
    lbl.setAttribute("x",clamp(x,padL+14,W-padR-14)); lbl.textContent=t.toFixed(2);
    shade.setAttribute("x",x); shade.setAttribute("width",Math.max(0,(W-padR)-x));
    el("prw-tval").textContent=t.toFixed(2);
    el("prw-prec").textContent=(prec*100).toFixed(0)+"%";
    el("prw-rec").textContent=(rec*100).toFixed(0)+"%";
    el("prw-f1").textContent=f1.toFixed(2);
    el("prw-tp").textContent=tp; el("prw-fp").textContent=fp;
    el("prw-fn").textContent=fn; el("prw-tn").textContent=tn;
    prdot.setAttribute("cx",rx(rec)); prdot.setAttribute("cy",ry(prec));
  }
  slider.addEventListener("input", ()=>update(parseFloat(slider.value)));
  update(0.5);
}

/* ============ Bias–Variance / model-complexity explorer =============== */
// Fit polynomials of increasing degree to fixed noisy data; show the curve
// plus train vs test error → the classic U-shaped bias/variance tradeoff.
function initBiasVarianceWidget(){
  const host=document.getElementById("bv-widget"); if(!host) return;
  const rnd=(function(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};})(42);
  const gauss=(m,s)=>{let u=0,v=0;while(!u)u=rnd();while(!v)v=rnd();return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);};
  const truef=x=>Math.sin(x*Math.PI*1.15)*0.72;         // ground-truth signal
  // fixed dataset: train + held-out test
  const mk=n=>{const a=[];for(let k=0;k<n;k++){const x=rnd()*2-1;a.push({x,y:truef(x)+gauss(0,0.16)});}return a;};
  const train=mk(16), test=mk(40);
  // least-squares polynomial fit (normal equations, small degree)
  function fit(pts,deg){
    const X=pts.map(p=>{const r=[];for(let j=0;j<=deg;j++)r.push(Math.pow(p.x,j));return r;});
    const y=pts.map(p=>p.y), n=deg+1;
    const A=Array.from({length:n},()=>new Array(n).fill(0)), b=new Array(n).fill(0);
    for(let i=0;i<X.length;i++)for(let a=0;a<n;a++){b[a]+=X[i][a]*y[i];for(let c=0;c<n;c++)A[a][c]+=X[i][a]*X[i][c];}
    for(let a=0;a<n;a++)A[a][a]+=1e-6;                    // ridge for stability
    // Gaussian elimination
    for(let c=0;c<n;c++){let piv=c;for(let r=c+1;r<n;r++)if(Math.abs(A[r][c])>Math.abs(A[piv][c]))piv=r;
      [A[c],A[piv]]=[A[piv],A[c]];[b[c],b[piv]]=[b[piv],b[c]];
      for(let r=0;r<n;r++){if(r===c)continue;const f=A[r][c]/A[c][c];for(let k=c;k<n;k++)A[r][k]-=f*A[c][k];b[r]-=f*b[c];}}
    return b.map((v,i)=>v/A[i][i]);
  }
  const evalp=(w,x)=>w.reduce((s,c,j)=>s+c*Math.pow(x,j),0);
  const mse=(w,pts)=>pts.reduce((s,p)=>s+Math.pow(evalp(w,p.x)-p.y,2),0)/pts.length;
  const W=440,H=250,pad=26;
  const xs=x=>pad+((x+1)/2)*(W-2*pad), ys=y=>H/2 - y*(H/2-pad);
  host.innerHTML=
    '<div class="bv-wrap"><svg class="bv-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+
      '<line x1="'+pad+'" y1="'+(H/2)+'" x2="'+(W-pad)+'" y2="'+(H/2)+'" class="prw-axis"/>'+
      '<path id="bv-true" class="bv-true"/><path id="bv-fit" class="bv-fit"/>'+
      '<g id="bv-train"></g>'+
    '</svg>'+
    '<div class="bv-controls">'+
      '<label class="prw-slabel">Model complexity — polynomial degree <b id="bv-dval">3</b></label>'+
      '<input id="bv-slider" type="range" min="1" max="12" step="1" value="3">'+
      '<div class="bv-legend"><span><i class="bv-lg-true"></i> true signal</span>'+
        '<span><i class="bv-lg-fit"></i> fitted model</span><span><i class="bv-lg-pt"></i> training data</span></div>'+
      '<div class="bv-metrics">'+
        '<div class="bv-m"><span class="bv-mlab">Train error</span><b id="bv-tr">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Test error</span><b id="bv-te">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Diagnosis</span><b id="bv-diag" class="bv-diag">—</b></div>'+
      '</div></div></div>';
  const trainDots=train.map(p=>'<circle cx="'+xs(p.x).toFixed(1)+'" cy="'+ys(p.y).toFixed(1)+'" r="3.6" class="bv-pt"/>').join("");
  host.querySelector("#bv-train").innerHTML=trainDots;
  let td=""; for(let x=-1;x<=1.0001;x+=0.02) td+=(td?"L":"M")+xs(x).toFixed(1)+" "+ys(truef(x)).toFixed(1)+" ";
  host.querySelector("#bv-true").setAttribute("d",td);
  function draw(deg){
    const w=fit(train,deg);
    let d=""; for(let x=-1;x<=1.0001;x+=0.01){const yv=Math.max(-1.3,Math.min(1.3,evalp(w,x)));d+=(d?"L":"M")+xs(x).toFixed(1)+" "+ys(yv).toFixed(1)+" ";}
    host.querySelector("#bv-fit").setAttribute("d",d);
    const tr=mse(w,train), te=mse(w,test);
    host.querySelector("#bv-dval").textContent=deg;
    host.querySelector("#bv-tr").textContent=tr.toFixed(3);
    host.querySelector("#bv-te").textContent=te.toFixed(3);
    const diag=host.querySelector("#bv-diag");
    let msg,cls; if(deg<=2 && tr>0.05){msg="Underfit (high bias)";cls="bv-bad";}
      else if(te>tr*2.2 && te>0.045){msg="Overfit (high variance)";cls="bv-bad";}
      else {msg="Good fit ✓";cls="bv-good";}
    diag.textContent=msg; diag.className="bv-diag "+cls;
  }
  host.querySelector("#bv-slider").addEventListener("input",e=>draw(+e.target.value));
  draw(3);
}

// the quantized integer, the dequantized value, and the rounding error.
function initQuantWidget(){
  const host=document.getElementById("quant-widget"); if(!host) return;
  host.innerHTML=
    '<div class="qz-wrap"><div class="qz-controls">'+
      '<div class="qz-row"><label>Tensor range [min, max]</label>'+

        '<input id="qz-max" type="number" value="6" step="0.5" class="qz-num"></span></div>'+
      '<div class="qz-row"><label>Scheme</label><span>'+
        '<button class="qz-seg sel" data-s="sym">symmetric</button>'+
        '<button class="qz-seg" data-s="asym">asymmetric</button></span></div>'+
      '<div class="qz-row"><label>Value to quantize <b id="qz-xval">2.00</b></label>'+
        '<input id="qz-x" type="range" min="-6" max="6" step="0.01" value="2"></div>'+
    '</div>'+
    '<div class="qz-out">'+
      '<div class="qz-cell"><span>scale (Δ)</span><b id="qz-scale">—</b></div>'+
      '<div class="qz-cell"><span>zero-point</span><b id="qz-zp">—</b></div>'+
      '<div class="qz-cell"><span>int8 code</span><b id="qz-q">—</b></div>'+
      '<div class="qz-cell"><span>dequantized</span><b id="qz-dq">—</b></div>'+
      '<div class="qz-cell qz-err"><span>quant error</span><b id="qz-e">—</b></div>'+
    '</div>'+
    '<svg class="qz-bar" viewBox="0 0 440 64" preserveAspectRatio="xMidYMid meet">'+
      '<line x1="20" y1="40" x2="420" y2="40" class="prw-axis"/>'+
      '<g id="qz-ticks"></g>'+
      '<circle id="qz-true" cy="40" r="5" class="qz-true"/>'+
      '<circle id="qz-quant" cy="40" r="5" class="qz-quantdot"/>'+
      '<text x="20" y="60" id="qz-lmin" class="prw-axlbl">-6</text>'+
      '<text x="420" y="60" id="qz-lmax" text-anchor="end" class="prw-axlbl">6</text>'+
    '</svg></div>';
  let scheme="sym";
  const el=id=>host.querySelector("#"+id);
  const QMIN=-128, QMAX=127;
  function compute(){
    let lo=parseFloat(el("qz-min").value), hi=parseFloat(el("qz-max").value);
    if(!(hi>lo)){ hi=lo+1; }
    const x=parseFloat(el("qz-x").value);
    let scale, zp;
    if(scheme==="sym"){ const a=Math.max(Math.abs(lo),Math.abs(hi)); scale=a/127; zp=0; }
    else { scale=(hi-lo)/(QMAX-QMIN); zp=Math.round(QMIN - lo/scale); }
    const q=Math.max(QMIN,Math.min(QMAX, Math.round(x/scale)+zp));
    const dq=(q-zp)*scale;
    el("qz-scale").textContent=scale.toFixed(4);
    el("qz-zp").textContent=zp;
    el("qz-q").textContent=q;
    el("qz-dq").textContent=dq.toFixed(3);
    el("qz-e").textContent=(dq-x>=0?"+":"")+(dq-x).toFixed(3);
    el("qz-xval").textContent=x.toFixed(2);
    // slider bounds follow the range
    const sl=el("qz-x"); sl.min=lo; sl.max=hi;
    el("qz-lmin").textContent=lo; el("qz-lmax").textContent=hi;
    const px=v=>20+((v-lo)/(hi-lo))*400;
    el("qz-true").setAttribute("cx",px(x).toFixed(1));
    el("qz-quant").setAttribute("cx",px(dq).toFixed(1));
    // draw a few quantization grid ticks (every ~16 codes)
    let ticks=""; for(let c=QMIN;c<=QMAX;c+=16){ const v=(c-zp)*scale; if(v<lo||v>hi)continue;
      ticks+='<line x1="'+px(v).toFixed(1)+'" y1="34" x2="'+px(v).toFixed(1)+'" y2="46" class="qz-tick"/>'; }
    el("qz-ticks").innerHTML=ticks;
  }
  host.querySelectorAll(".qz-seg").forEach(b=>b.onclick=()=>{
    scheme=b.dataset.s; host.querySelectorAll(".qz-seg").forEach(x=>x.classList.toggle("sel",x===b)); compute();
  });
  ["qz-min","qz-max","qz-x"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

/* ============ Batch size → latency / throughput explorer ============== */
// Simple queuing-style model: latency = fixed overhead + per-item compute that
// improves with batching (better GPU utilization), throughput = batch/latency.
function initBatchWidget(){
  const host=document.getElementById("batch-widget"); if(!host) return;
  host.innerHTML=
    '<div class="bt-wrap"><div class="bt-controls">'+
      '<label class="prw-slabel">Batch size <b id="bt-bval">8</b></label>'+
      '<input id="bt-b" type="range" min="1" max="128" step="1" value="8">'+
      '<div class="bt-sliders">'+
        '<label>Fixed overhead <b id="bt-oval">4</b> ms<input id="bt-o" type="range" min="0" max="20" step="0.5" value="4"></label>'+
        '<label>Compute / item at batch=1 <b id="bt-cval">6</b> ms<input id="bt-c" type="range" min="0.5" max="20" step="0.5" value="6"></label>'+
        '<label>Batch efficiency <b id="bt-eval">0.6</b><input id="bt-e" type="range" min="0" max="0.95" step="0.05" value="0.6"></label>'+
      '</div>'+
      '<div class="bv-metrics">'+
        '<div class="bv-m"><span class="bv-mlab">Latency / batch</span><b id="bt-lat">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Throughput</span><b id="bt-thr">—</b></div>'+
        '<div class="bv-m"><span class="bv-mlab">Per-item latency</span><b id="bt-pil">—</b></div>'+
      '</div></div>'+
      '<svg class="bt-svg" viewBox="0 0 300 220" preserveAspectRatio="xMidYMid meet">'+
        '<line x1="34" y1="190" x2="290" y2="190" class="prw-axis"/>'+
        '<line x1="34" y1="14" x2="34" y2="190" class="prw-axis"/>'+
        '<path id="bt-thrline" class="bt-thrline"/><path id="bt-latline" class="bt-latline"/>'+
        '<circle id="bt-dot" r="4.5" class="bt-dot"/>'+
        '<text x="162" y="212" text-anchor="middle" class="prw-axlbl">batch size →</text>'+
        '<text x="12" y="100" transform="rotate(-90 12 100)" text-anchor="middle" class="prw-axlbl">throughput</text>'+
      '</svg></div>';
  const el=id=>host.querySelector("#"+id);
  const W=300,H=220,pL=34,pR=10,pT=14,pB=30;
  // latency(b) = overhead + compute*b*(1 - eff*(1 - 1/b))  ; throughput = b/latency
  function lat(b,o,c,e){ return o + c*b*(1 - e*(1 - 1/b)); }
  function compute(){
    const b=+el("bt-b").value, o=+el("bt-o").value, c=+el("bt-c").value, e=+el("bt-e").value;
    el("bt-bval").textContent=b; el("bt-oval").textContent=o; el("bt-cval").textContent=c; el("bt-eval").textContent=e.toFixed(2);
    const L=lat(b,o,c,e), thr=b/L*1000, pil=L/b;
    el("bt-lat").textContent=L.toFixed(1)+" ms";
    el("bt-thr").textContent=thr.toFixed(0)+" it/s";
    el("bt-pil").textContent=pil.toFixed(2)+" ms";
    // plot throughput vs batch across full range, normalized
    const bs=[]; for(let x=1;x<=128;x++) bs.push({b:x, thr:x/lat(x,o,c,e)*1000, lat:lat(x,o,c,e)});
    const maxThr=Math.max(...bs.map(p=>p.thr)), maxLat=Math.max(...bs.map(p=>p.lat));
    const xOf=x=>pL+((x-1)/127)*(W-pL-pR);
    const yThr=v=>H-pB-(v/maxThr)*(H-pT-pB);
    const yLat=v=>H-pB-(v/maxLat)*(H-pT-pB);
    el("bt-thrline").setAttribute("d",bs.map((p,i)=>(i?"L":"M")+xOf(p.b).toFixed(1)+" "+yThr(p.thr).toFixed(1)).join(" "));
    el("bt-latline").setAttribute("d",bs.map((p,i)=>(i?"L":"M")+xOf(p.b).toFixed(1)+" "+yLat(p.lat).toFixed(1)).join(" "));
    el("bt-dot").setAttribute("cx",xOf(b)); el("bt-dot").setAttribute("cy",yThr(thr));
  }
  ["bt-b","bt-o","bt-c","bt-e"].forEach(id=>el(id).addEventListener("input",compute));
  compute();
}

// Estimate serving memory: weight bytes at a chosen precision, plus the KV
// cache which grows with batch × sequence length. Shows why long context hurts.
function initLLMMemWidget(){
  const host=document.getElementById("llmmem-widget"); if(!host) return;
  host.innerHTML=
    '<div class="lm-wrap"><div class="bt-controls">'+
      '<div class="bt-sliders">'+

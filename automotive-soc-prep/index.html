S, decode)<\/td><td>Control flow, dynamic output count<\/td><td>Keep it on CPU/DSP <strong>at the graph tail<\/strong>, off the NPU path<\/td><\/tr><tr><td><code>Resize<\/code> / grid-sample (BEV view transform)<\/td><td>Odd modes, dynamic scales<\/td><td>Static shapes; DSP kernel; precompute sampling grid<\/td><\/tr><tr><td>Dynamic shapes (variable #detections/objects)<\/td><td>NPU needs static shapes<\/td><td>Fix max sizes, pad, use static graphs<\/td><\/tr><tr><td>Exotic activations (GELU variants, custom)<\/td><td>Not in NPU op set<\/td><td>Approximate with supported ops, or DSP kernel<\/td><\/tr><tr><td>LayerNorm / Softmax in transformer BEV heads<\/td><td>Reduction + division precision<\/td><td>May stay INT16/FP16 on DSP; keep the block small<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-interview-soundbite\">The interview soundbite<\/h2>\n<blockquote><p>\"I read the compiler's partition report first. A model that's '50% on NPU' isn't automatically slow — what kills you is a fallback in the <em>middle<\/em> that splits the NPU subgraph and forces large-tensor DMA copies both ways. I try to push unavoidable fallbacks to the graph boundaries or onto the DSP, and where I can, rewrite the subgraph with supported ops so it stays on the accelerator.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"what-operator-mapping-means","text":"What \"operator mapping\" means"},{"level":2,"id":"partitioning-the-graph-gets-cut-into-subgraphs","text":"Partitioning: the graph gets cut into subgraphs"},{"level":2,"id":"the-cost-of-a-fallback-name-these","text":"The cost of a fallback (name these)"},{"level":2,"id":"the-offload-debug-loop-this-is-the-day-job","text":"The offload debug loop (this is the day-job)"},{"level":2,"id":"common-fallback-culprits-in-cvbev-models","text":"Common fallback culprits in CV/BEV models"},{"level":2,"id":"the-interview-soundbite","text":"The interview soundbite"}],"text":"operator mapping, offload & fallback 💡 tl;dr the compiler walks your onnx graph and, op by op, decides which block runs it . ops the npu supports get mapped to npu instructions (and fused where possible); ops it doesn't support fall back to dsp or cpu, which forces a subgraph boundary — and every boundary costs a data copy and a synchronization. the art is keeping the model on the accelerator and making the unavoidable fallbacks cheap. what \"operator mapping\" means each onnx op (e.g. conv , add , resize , softmax ) must be lowered to something a physical block can execute: supported → mapped to npu/cnnip. the compiler picks a hardware instruction/config and a tiling/layout for it. fusible → fused. adjacent ops collapse into one hardware pass — `conv + biasadd + relu` becomes a single npu op. fewer passes = fewer dram round-trips (see the roofline argument in npu-dsp-cnnip.md ). unsupported → fallback. no npu instruction matches → the op runs on dsp or cpu. whether an op is \"supported\" depends on more than its type: datatype (int8 vs fp32), shape (static vs dynamic), attributes (dilation, groups, unusual strides), and rank can all push an otherwise-supported op onto the fallback path. partitioning: the graph gets cut into subgraphs because blocks differ, the compiler partitions the graph into subgraphs , each assigned to one block: conv/relu ×n npu subgraph copy + sync custom op dsp/cpu fallback copy + sync conv/add ×m npu subgraph each block boundary = a tensor copy across memory + a cross-core synchronization. minimize the number of boundaries, not just the number of fallback ops. the key insight: one unsupported op in the middle of the network is worse than it looks — it splits one npu subgraph into two and inserts two boundaries. ten unsupported ops clustered at the end (e.g. the detection post-processing) cause one boundary. so where the fallbacks are matters as much as how many. the cost of a fallback (name these) data transfer — the tensor is copied between the npu's working memory and the dsp/cpu-visible memory (often via dma). this is why fallback of a large activation tensor hurts far more than a small one. synchronization — the npu must finish and signal; the dsp/cpu waits, runs, signals back. cross-core sync stalls the pipeline. layout conversion — the npu likes a tiled/interleaved layout; the cpu likes nchw. reformatting is extra work that shows up as a hidden op. loss of fusion — the boundary breaks a fusion chain, so neighboring ops that could have fused now don't. the offload debug loop (this is the day-job) when a model is slow or wrong on target, you work a loop like: dump the partition report — the compiler tells you which ops went to npu vs dsp vs cpu. look for surprises: an op you expected on the npu that fell back. find the fallback cause — is it the datatype (needs int8 but got fp32)? a dynamic shape? an unsupported attribute? an op the version of the toolchain doesn't cover yet? remove or move the boundary — options in rough order of preference: rewrite the graph so the op is expressible with supported ops (graph surgery — see onnx format & graph surgery ). fix the shape (make it static) or the datatype (insert qdq so it's int8). push the fallback to the dsp instead of the cpu (cheaper). relocate the op to the start/end of the graph so it doesn't split an npu subgraph. common fallback culprits in cv/bev models culprit why it falls back typical fix detection post-processing (nms, decode) control flow, dynamic output count keep it on cpu/dsp at the graph tail , off the npu path resize / grid-sample (bev view transform) odd modes, dynamic scales static shapes; dsp kernel; precompute sampling grid dynamic shapes (variable #detections/objects) npu needs static shapes fix max sizes, pad, use static graphs exotic activations (gelu variants, custom) not in npu op set approximate with supported ops, or dsp kernel layernorm / softmax in transformer bev heads reduction + division precision may stay int16/fp16 on dsp; keep the block small the interview soundbite \"i read the compiler's partition report first. a model that's '50% on npu' isn't automatically slow — what kills you is a fallback in the middle that splits the npu subgraph and forces large-tensor dma copies both ways. i try to push unavoidable fallbacks to the graph boundaries or onto the dsp, and where i can, rewrite the subgraph with supported ops so it stays on the accelerator.\"","words":760},{"path":"02-onnx-toolchain/README.md","title":"Overview","section":"2 · ONNX Toolchain","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"2-onnx-toolchain\">2 · ONNX Toolchain<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> ONNX is the <strong>interchange format<\/strong> between training frameworks and the embedded compiler. In this role you don't just export ONNX — you <strong>inspect, modify, split, and quantize<\/strong> ONNX graphs to get them through the toolchain cleanly. This section is the ONNX-native workflow the JD calls out: graph inspection/modification, QDQ models, and the compiler/runtime that turns ONNX into an on-target engine.<\/div><\/div>\n<h2 id=\"why-onnx-is-the-center-of-gravity-here\">Why ONNX is the center of gravity here<\/h2>\n<ul><li>It's the <strong>contract<\/strong>: training happens in PyTorch, deployment on a vendor NPU compiler,<\/li><\/ul>\n<p>and ONNX is the neutral thing both sides agree on.<\/p>\n<ul><li>The compiler consumes ONNX and produces the partitioned, quantized engine — so **the<\/li><\/ul>\n<p>shape of your ONNX graph directly determines** what runs on the NPU vs falls back.<\/p>\n<ul><li>Customers hand you ONNX models; you inspect and fix them without the original training<\/li><\/ul>\n<p>code. <strong>Graph surgery is a core skill<\/strong>, not a niche one.<\/p>\n<h2 id=\"pages\">Pages<\/h2>\n<ul><li><strong><a class=\"mdlink\" data-href=\"onnx-graph-surgery.md\" href=\"#\">ONNX Format &amp; Graph Surgery<\/a><\/strong> — the protobuf model, how to<\/li><\/ul>\n<p>inspect it, and how to modify/segment it with <code>onnx<\/code>, <code>onnx-graphsurgeon<\/code>, <code>onnxruntime<\/code>.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"qdq-models.md\" href=\"#\">QDQ Quantized ONNX Models<\/a><\/strong> — how quantization is represented in ONNX<\/li><\/ul>\n<p>(QuantizeLinear/DequantizeLinear), and how the compiler reads it.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"compiler-runtime-partitioning.md\" href=\"#\">Compiler, Runtime &amp; Partitioning<\/a><\/strong> — how ONNX becomes<\/li><\/ul>\n<p>an engine: graph optimization, execution providers, partitioning, execution control.<\/p>\n<h2 id=\"the-one-liner-to-have-ready\">The one-liner to have ready<\/h2>\n<blockquote><p>\"I treat the ONNX graph as the thing I optimize. Before I touch training, I inspect the exported graph, clean it up (fold constants, fix dynamic shapes, simplify), insert or verify the QDQ nodes for INT8, and check the compiler's partition report — most 'the NPU won't take my model' problems are solved at the ONNX-graph level.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"why-onnx-is-the-center-of-gravity-here","text":"Why ONNX is the center of gravity here"},{"level":2,"id":"pages","text":"Pages"},{"level":2,"id":"the-one-liner-to-have-ready","text":"The one-liner to have ready"}],"text":"2 · onnx toolchain 💡 tl;dr onnx is the interchange format between training frameworks and the embedded compiler. in this role you don't just export onnx — you inspect, modify, split, and quantize onnx graphs to get them through the toolchain cleanly. this section is the onnx-native workflow the jd calls out: graph inspection/modification, qdq models, and the compiler/runtime that turns onnx into an on-target engine. why onnx is the center of gravity here it's the contract : training happens in pytorch, deployment on a vendor npu compiler, and onnx is the neutral thing both sides agree on. the compiler consumes onnx and produces the partitioned, quantized engine — so **the shape of your onnx graph directly determines** what runs on the npu vs falls back. customers hand you onnx models; you inspect and fix them without the original training code. graph surgery is a core skill , not a niche one. pages onnx format & graph surgery — the protobuf model, how to inspect it, and how to modify/segment it with onnx , onnx-graphsurgeon , onnxruntime . qdq quantized onnx models — how quantization is represented in onnx (quantizelinear/dequantizelinear), and how the compiler reads it. compiler, runtime & partitioning — how onnx becomes an engine: graph optimization, execution providers, partitioning, execution control. the one-liner to have ready \"i treat the onnx graph as the thing i optimize. before i touch training, i inspect the exported graph, clean it up (fold constants, fix dynamic shapes, simplify), insert or verify the qdq nodes for int8, and check the compiler's partition report — most 'the npu won't take my model' problems are solved at the onnx-graph level.\"","words":275},{"path":"02-onnx-toolchain/onnx-graph-surgery.md","title":"ONNX Format & Graph Surgery","section":"2 · ONNX Toolchain","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"onnx-format-graph-surgery\">ONNX Format &amp; Graph Surgery<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> An ONNX model is a <strong>protobuf<\/strong> describing a dataflow graph: nodes (ops), the tensors flowing between them, initializers (weights), and value-info (shapes/types). \"Graph surgery\" is reading and rewriting that structure — folding constants, fixing shapes, removing/replacing ops, and <strong>splitting<\/strong> a model into pieces — usually without the original training code. This is the everyday tool for getting a model through the NPU compiler.<\/div><\/div>\n<h2 id=\"whats-inside-an-onnx-file\">What's inside an ONNX file<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">ModelProto<span class=\"nsub\">opset, metadata<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">GraphProto<span class=\"nsub\">nodes · inputs · outputs<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">NodeProto[]<span class=\"nsub\">op_type · attrs · in/out names<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">initializers<span class=\"nsub\">weights as TensorProto<\/span><\/span>\n  <\/div>\n<\/div>\n<ul><li><strong>Nodes<\/strong> are connected <strong>by tensor name<\/strong>, not by pointers — a node's output name is<\/li><\/ul>\n<p>another node's input name. This is why surgery is mostly <em>string/graph bookkeeping<\/em>.<\/p>\n<ul><li><strong>Initializers<\/strong> are the constant tensors (weights). <strong>value_info<\/strong> carries shape/dtype<\/li><\/ul>\n<p>for intermediate tensors — often missing until you run <strong>shape inference<\/strong>.<\/p>\n<ul><li><strong>Opset version<\/strong> matters: an op's schema (allowed attributes/behavior) is fixed per<\/li><\/ul>\n<p>opset. Compilers support specific opset ranges; mismatches cause fallbacks or errors.<\/p>\n<h2 id=\"inspecting-a-graph\">Inspecting a graph<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> onnx\nm = onnx.load(<span class=\"tok-string\">\"model.onnx\"<\/span>)\nonnx.checker.check_model(m)                 <span class=\"tok-comment\"># structural validity<\/span>\nm = onnx.shape_inference.infer_shapes(m)    <span class=\"tok-comment\"># fill in intermediate shapes<\/span>\n\ng = m.graph\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"inputs:\"<\/span>,  [(i.name, [d.dim_value <span class=\"tok-keyword\">for<\/span> d <span class=\"tok-keyword\">in<\/span> i.type.tensor_type.shape.dim]) <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> g.input])\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"outputs:\"<\/span>, [o.name <span class=\"tok-keyword\">for<\/span> o <span class=\"tok-keyword\">in<\/span> g.output])\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"opset:\"<\/span>,   [(op.domain <span class=\"tok-keyword\">or<\/span> <span class=\"tok-string\">\"ai.onnx\"<\/span>, op.version) <span class=\"tok-keyword\">for<\/span> op <span class=\"tok-keyword\">in<\/span> m.opset_import])\n\n<span class=\"tok-keyword\">from<\/span> collections <span class=\"tok-keyword\">import<\/span> Counter\n<span class=\"tok-builtin\">print<\/span>(Counter(n.op_type <span class=\"tok-keyword\">for<\/span> n <span class=\"tok-keyword\">in<\/span> g.node))   <span class=\"tok-comment\"># op histogram — spot exotic ops early<\/span><\/code><\/pre>\n<p>For a visual, <strong>Netron<\/strong> is the standard graph viewer — say you use it. The op histogram is your first triage: an unexpected <code>Resize<\/code>, <code>NonMaxSuppression<\/code>, <code>ScatterND<\/code>, or a custom domain op is a likely NPU fallback.<\/p>\n<h2 id=\"the-common-surgeries\">The common surgeries<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Goal<\/th><th>What you do<\/th><th>Tool<\/th><\/tr><\/thead><tbody><tr><td><strong>Constant folding<\/strong><\/td><td>Pre-compute subgraphs that only depend on constants<\/td><td><code>onnxsim<\/code> / <code>onnx-graphsurgeon<\/code> <code>.fold_constants()<\/code><\/td><\/tr><tr><td><strong>Simplify<\/strong><\/td><td>Remove redundant <code>Identity<\/code>, <code>Cast<\/code>, no-op <code>Reshape<\/code><\/td><td><code>onnxsim<\/code><\/td><\/tr><tr><td><strong>Fix dynamic shapes<\/strong><\/td><td>Replace symbolic dims with fixed sizes so the NPU accepts them<\/td><td>set input dims + re-run shape inference<\/td><\/tr><tr><td><strong>Remove pre/post-processing<\/strong><\/td><td>Cut normalization or NMS out of the graph, do it in code<\/td><td>graphsurgeon node removal<\/td><\/tr><tr><td><strong>Replace an unsupported op<\/strong><\/td><td>Swap an exotic op for a supported equivalent subgraph<\/td><td>graphsurgeon node insert/replace<\/td><\/tr><tr><td><strong>Rename/clean I/O<\/strong><\/td><td>Give stable input/output names for the runtime bindings<\/td><td>edit <code>graph.input/output<\/code><\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"graph-surgery-with-onnx-graphsurgeon\">Graph surgery with onnx-graphsurgeon<\/h3>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> onnx_graphsurgeon <span class=\"tok-keyword\">as<\/span> gs\n<span class=\"tok-keyword\">import<\/span> onnx\ngraph = gs.import_onnx(onnx.load(<span class=\"tok-string\">\"model.onnx\"<\/span>))\n\n<span class=\"tok-comment\"># find nodes by op type<\/span>\nresizes = [n <span class=\"tok-keyword\">for<\/span> n <span class=\"tok-keyword\">in<\/span> graph.nodes <span class=\"tok-keyword\">if<\/span> n.op == <span class=\"tok-string\">\"Resize\"<\/span>]\n\n<span class=\"tok-comment\"># example: force static output size on a Resize by replacing its size input<\/span>\n<span class=\"tok-comment\"># (details depend on the model) ...<\/span>\ngraph.cleanup().toposort()                    <span class=\"tok-comment\"># drop dangling nodes, re-sort<\/span>\nonnx.save(gs.export_onnx(graph), <span class=\"tok-string\">\"model_fixed.onnx\"<\/span>)<\/code><\/pre>\n<p><code>cleanup()<\/code> (remove unused nodes/tensors) + <code>toposort()<\/code> (valid execution order) are the \"always run these after editing\" pair.<\/p>\n<h2 id=\"model-segmentation-splitting-the-graph\">Model segmentation (splitting the graph)<\/h2>\n<p>The JD explicitly lists <strong>model segmentation and execution control<\/strong>. You split a model when you want to run parts on different blocks, stage them, or debug a boundary:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> onnx\n<span class=\"tok-comment\"># extract the subgraph between named tensors into a standalone model<\/span>\nonnx.utils.extract_model(\n    <span class=\"tok-string\">\"model.onnx\"<\/span>, <span class=\"tok-string\">\"part1.onnx\"<\/span>,\n    input_names=[<span class=\"tok-string\">\"images\"<\/span>],\n    output_names=[<span class=\"tok-string\">\"backbone_features\"<\/span>],   <span class=\"tok-comment\"># cut here<\/span>\n)<\/code><\/pre>\n<p>Uses for segmentation:<\/p>\n<ul><li><strong>Isolate a fallback<\/strong> — run the NPU-friendly backbone as one model and the fallback-heavy<\/li><\/ul>\n<p>head as another, so you control the boundary explicitly.<\/p>\n<ul><li><strong>Stage a pipeline<\/strong> — backbone on NPU, head on DSP, with your own buffer management in<\/li><\/ul>\n<p>between (see <a class=\"mdlink\" data-href=\"compiler-runtime-partitioning.md\" href=\"#\">Compiler, Runtime &amp; Partitioning<\/a>).<\/p>\n<ul><li><strong>Debug accuracy<\/strong> — dump the activation at the cut and compare FP32 vs INT8 up to that<\/li><\/ul>\n<p>point to localize where quantization error blows up.<\/p>\n<h2 id=\"why-graph-surgery-beats-just-retrain\">Why graph surgery beats \"just retrain\"<\/h2>\n<p>You usually get a <strong>customer's ONNX<\/strong> with no training pipeline, or retraining is expensive. Fixing the graph — fold constants, pin shapes, replace one op, move NMS out — is often a <strong>minutes-not-weeks<\/strong> fix that turns a 40%-on-NPU model into a 95%-on-NPU model. That's the value you add in this role.<\/p>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"Given an ONNX model I can't build from source, I inspect it in Netron, run shape inference and an op histogram to find the exotic ops, then use onnx-graphsurgeon to fold constants, pin the dynamic dims, and replace or excise the ops that force NPU fallbacks. If a boundary is unavoidable I'll segment the model at that tensor and manage the two halves explicitly.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"whats-inside-an-onnx-file","text":"What's inside an ONNX file"},{"level":2,"id":"inspecting-a-graph","text":"Inspecting a graph"},{"level":2,"id":"the-common-surgeries","text":"The common surgeries"},{"level":3,"id":"graph-surgery-with-onnx-graphsurgeon","text":"Graph surgery with onnx-graphsurgeon"},{"level":2,"id":"model-segmentation-splitting-the-graph","text":"Model segmentation (splitting the graph)"},{"level":2,"id":"why-graph-surgery-beats-just-retrain","text":"Why graph surgery beats \"just retrain\""},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"onnx format & graph surgery 💡 tl;dr an onnx model is a protobuf describing a dataflow graph: nodes (ops), the tensors flowing between them, initializers (weights), and value-info (shapes/types). \"graph surgery\" is reading and rewriting that structure — folding constants, fixing shapes, removing/replacing ops, and splitting a model into pieces — usually without the original training code. this is the everyday tool for getting a model through the npu compiler. what's inside an onnx file modelproto opset, metadata graphproto nodes · inputs · outputs nodeproto[] op_type · attrs · in/out names initializers weights as tensorproto nodes are connected by tensor name , not by pointers — a node's output name is another node's input name. this is why surgery is mostly string/graph bookkeeping . initializers are the constant tensors (weights). value_info carries shape/dtype for intermediate tensors — often missing until you run shape inference . opset version matters: an op's schema (allowed attributes/behavior) is fixed per opset. compilers support specific opset ranges; mismatches cause fallbacks or errors. inspecting a graph import onnx m = onnx.load( \"model.onnx\" ) onnx.checker.check_model(m) # structural validity m = onnx.shape_inference.infer_shapes(m) # fill in intermediate shapes g = m.graph print ( \"inputs:\" , [(i.name, [d.dim_value for d in i.type.tensor_type.shape.dim]) for i in g.input]) print ( \"outputs:\" , [o.name for o in g.output]) print ( \"opset:\" , [(op.domain or \"ai.onnx\" , op.version) for op in m.opset_import]) from collections import counter print (counter(n.op_type for n in g.node)) # op histogram — spot exotic ops early for a visual, netron is the standard graph viewer — say you use it. the op histogram is your first triage: an unexpected resize , nonmaxsuppression , scatternd , or a custom domain op is a likely npu fallback. the common surgeries goal what you do tool constant folding pre-compute subgraphs that only depend on constants onnxsim / onnx-graphsurgeon .fold_constants() simplify remove redundant identity , cast , no-op reshape onnxsim fix dynamic shapes replace symbolic dims with fixed sizes so the npu accepts them set input dims + re-run shape inference remove pre/post-processing cut normalization or nms out of the graph, do it in code graphsurgeon node removal replace an unsupported op swap an exotic op for a supported equivalent subgraph graphsurgeon node insert/replace rename/clean i/o give stable input/output names for the runtime bindings edit graph.input/output graph surgery with onnx-graphsurgeon import onnx_graphsurgeon as gs import onnx graph = gs.import_onnx(onnx.load( \"model.onnx\" )) # find nodes by op type resizes = [n for n in graph.nodes if n.op == \"resize\" ] # example: force static output size on a resize by replacing its size input # (details depend on the model) ... graph.cleanup().toposort() # drop dangling nodes, re-sort onnx.save(gs.export_onnx(graph), \"model_fixed.onnx\" ) cleanup() (remove unused nodes/tensors) + toposort() (valid execution order) are the \"always run these after editing\" pair. model segmentation (splitting the graph) the jd explicitly lists model segmentation and execution control . you split a model when you want to run parts on different blocks, stage them, or debug a boundary: import onnx # extract the subgraph between named tensors into a standalone model onnx.utils.extract_model( \"model.onnx\" , \"part1.onnx\" , input_names=[ \"images\" ], output_names=[ \"backbone_features\" ], # cut here ) uses for segmentation: isolate a fallback — run the npu-friendly backbone as one model and the fallback-heavy head as another, so you control the boundary explicitly. stage a pipeline — backbone on npu, head on dsp, with your own buffer management in between (see compiler, runtime & partitioning ). debug accuracy — dump the activation at the cut and compare fp32 vs int8 up to that point to localize where quantization error blows up. why graph surgery beats \"just retrain\" you usually get a customer's onnx with no training pipeline, or retraining is expensive. fixing the graph — fold constants, pin shapes, replace one op, move nms out — is often a minutes-not-weeks fix that turns a 40%-on-npu model into a 95%-on-npu model. that's the value you add in this role. interview soundbite \"given an onnx model i can't build from source, i inspect it in netron, run shape inference and an op histogram to find the exotic ops, then use onnx-graphsurgeon to fold constants, pin the dynamic dims, and replace or excise the ops that force npu fallbacks. if a boundary is unavoidable i'll segment the model at that tensor and manage the two halves explicitly.\"","words":721},{"path":"02-onnx-toolchain/qdq-models.md","title":"QDQ Quantized ONNX Models","section":"2 · ONNX Toolchain","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"qdq-quantized-onnx-models\">QDQ Quantized ONNX Models<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> ONNX represents quantization with <strong>QuantizeLinear (Q)<\/strong> and <strong>DequantizeLinear (DQ)<\/strong> node pairs sprinkled through the graph. A \"<strong>QDQ model<\/strong>\" is an FP32 graph annotated with these Q/DQ pairs that encode <em>where<\/em> and <em>how<\/em> tensors are quantized (scale + zero-point). The compiler reads the QDQ pairs as instructions — \"run this region in INT8\" — and folds them into real integer ops. This is the standard way quantization travels from training/PTQ into the embedded compiler.<\/div><\/div>\n<h2 id=\"the-two-operators\">The two operators<\/h2>\n<div class=\"formula\">\n  <div class=\"frow\"><span class=\"fexpr\">QuantizeLinear:  q = round(r / <span class=\"fv\">scale<\/span>) + <span class=\"fv\">zero_point<\/span><\/span><span class=\"fnote\">float → int8<\/span><\/div>\n  <div class=\"frow\"><span class=\"fexpr\">DequantizeLinear:  r = <span class=\"fv\">scale<\/span> · (q − <span class=\"fv\">zero_point<\/span>)<\/span><span class=\"fnote\">int8 → float<\/span><\/div>\n<\/div>\n<ul><li><strong>scale<\/strong> (float) and <strong>zero_point<\/strong> (int) are stored as the Q/DQ node's inputs — this is<\/li><\/ul>\n<p>literally the affine quantization mapping (see   <a class=\"mdlink\" data-href=\"../03-quantization-embedded/ptq-qat-calibration.md\" href=\"#\">PTQ, QAT &amp; Calibration<\/a> for the   numerics).<\/p>\n<ul><li><strong>Per-tensor<\/strong> = one scale for the whole tensor; <strong>per-channel<\/strong> = a scale vector along<\/li><\/ul>\n<p>the output-channel axis (weights use this — much better accuracy).<\/p>\n<h2 id=\"what-a-qdq-pattern-looks-like\">What a QDQ pattern looks like<\/h2>\n<p>A quantized <code>Conv<\/code> in a QDQ graph is surrounded by Q/DQ pairs:<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">activation (fp32)<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">Q<\/span><\/span>\n    <span class=\"node data\">int8<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">DQ<\/span><\/span>\n    <span class=\"node\">Conv (fp32 math)<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">Q<\/span><\/span>\n    <span class=\"node out\">int8 out<\/span>\n  <\/div>\n  <div class=\"flow-foot\">Weights carry their own DQ. The compiler <b>fuses Q→DQ→Conv→Q<\/b> into a single INT8 convolution — the fp32 in the middle is just the <i>reference semantics<\/i>, never actually run.<\/div>\n<\/div>\n<p>The crucial idea: <strong>QDQ is a portable, framework-neutral description of a quantized model.<\/strong> The FP32 ops between Q and DQ define the <em>mathematical intent<\/em>; the compiler's job is to recognize the pattern and emit the equivalent INT8 hardware op.<\/p>\n<h2 id=\"qdq-vs-the-older-qoperator-format\">QDQ vs the older \"QOperator\" format<\/h2>\n<ul><li><strong>QDQ format<\/strong> — insert Q/DQ around normal ops (<code>Conv<\/code>, <code>MatMul<\/code>). Portable, the ops stay<\/li><\/ul>\n<p>standard, the compiler does the fusion. <strong>This is the modern default<\/strong> and what embedded   toolchains expect.<\/p>\n<ul><li><strong>QOperator format<\/strong> — replace ops with pre-quantized variants (<code>QLinearConv<\/code>,<\/li><\/ul>\n<p><code>QLinearMatMul<\/code>). More explicit but less flexible; less common for NPU flows.<\/p>\n<p>Know that QDQ is preferred because it keeps the graph in standard ops and lets each backend fuse in the way that suits its hardware.<\/p>\n<h2 id=\"how-qdq-models-get-created\">How QDQ models get created<\/h2>\n<ol><li><strong>PTQ (static)<\/strong> — run calibration data through the FP32 model, collect activation<\/li><\/ol>\n<p>ranges, compute scales, and <strong>insert Q/DQ<\/strong> nodes. Tools:    <code>onnxruntime.quantization.quantize_static<\/code>, vendor PTQ tools.<\/p>\n<ol><li><strong>QAT export<\/strong> — train with fake-quant nodes in PyTorch, then export; the fake-quant<\/li><\/ol>\n<p>ops become Q/DQ in the ONNX graph, carrying the <em>learned<\/em> scales.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> onnxruntime.quantization <span class=\"tok-keyword\">import<\/span> quantize_static, CalibrationDataReader, QuantType, QuantFormat\nquantize_static(\n    <span class=\"tok-string\">\"model.onnx\"<\/span>, <span class=\"tok-string\">\"model.qdq.onnx\"<\/span>,\n    calibration_data_reader=my_reader,       <span class=\"tok-comment\"># yields representative inputs<\/span>\n    quant_format=QuantFormat.QDQ,\n    activation_type=QuantType.QInt8,\n    weight_type=QuantType.QInt8,\n    per_channel=<span class=\"tok-keyword\">True<\/span>,                        <span class=\"tok-comment\"># per-channel weights<\/span>\n)<\/code><\/pre>\n<h2 id=\"things-that-go-wrong-and-get-asked\">Things that go wrong (and get asked)<\/h2>\n<ul><li><strong>Missing Q/DQ around an op<\/strong> → that op stays FP32 → it may fall back off the NPU, or<\/li><\/ul>\n<p>break an INT8 fusion chain and force dequant/requant round-trips.<\/p>\n<ul><li><strong>Wrong granularity<\/strong> — per-tensor weights on a layer with wide per-channel range → big<\/li><\/ul>\n<p>accuracy loss. Fix: per-channel weight quantization.<\/p>\n<ul><li><strong>Q/DQ the compiler can't fuse<\/strong> — a stray op between Q and the consumer prevents fusion;<\/li><\/ul>\n<p>the region silently runs in FP32/DSP. Inspect the graph, move or remove the intruding op.<\/p>\n<ul><li><strong>Zero-point/dtype mismatch<\/strong> — signed vs unsigned INT8 mismatch between activation and<\/li><\/ul>\n<p>weight expectations; some NPUs want symmetric (zero-point 0) weights specifically.<\/p>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"A QDQ model is an FP32 ONNX graph annotated with QuantizeLinear/DequantizeLinear pairs that carry the scale and zero-point. The FP32 ops between them are just reference semantics — the compiler pattern-matches Q→op→Q and emits a fused INT8 hardware op. When a layer unexpectedly runs in FP32, I look for a missing or unfusible Q/DQ pair around it.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"the-two-operators","text":"The two operators"},{"level":2,"id":"what-a-qdq-pattern-looks-like","text":"What a QDQ pattern looks like"},{"level":2,"id":"qdq-vs-the-older-qoperator-format","text":"QDQ vs the older \"QOperator\" format"},{"level":2,"id":"how-qdq-models-get-created","text":"How QDQ models get created"},{"level":2,"id":"things-that-go-wrong-and-get-asked","text":"Things that go wrong (and get asked)"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"qdq quantized onnx models 💡 tl;dr onnx represents quantization with quantizelinear (q) and dequantizelinear (dq) node pairs sprinkled through the graph. a \" qdq model \" is an fp32 graph annotated with these q/dq pairs that encode where and how tensors are quantized (scale + zero-point). the compiler reads the qdq pairs as instructions — \"run this region in int8\" — and folds them into real integer ops. this is the standard way quantization travels from training/ptq into the embedded compiler. the two operators quantizelinear: q = round(r / scale ) + zero_point float → int8 dequantizelinear: r = scale · (q − zero_point ) int8 → float scale (float) and zero_point (int) are stored as the q/dq node's inputs — this is literally the affine quantization mapping (see ptq, qat & calibration for the numerics). per-tensor = one scale for the whole tensor; per-channel = a scale vector along the output-channel axis (weights use this — much better accuracy). what a qdq pattern looks like a quantized conv in a qdq graph is surrounded by q/dq pairs: activation (fp32) q int8 dq conv (fp32 math) q int8 out weights carry their own dq. the compiler fuses q→dq→conv→q into a single int8 convolution — the fp32 in the middle is just the reference semantics , never actually run. the crucial idea: qdq is a portable, framework-neutral description of a quantized model. the fp32 ops between q and dq define the mathematical intent ; the compiler's job is to recognize the pattern and emit the equivalent int8 hardware op. qdq vs the older \"qoperator\" format qdq format — insert q/dq around normal ops ( conv , matmul ). portable, the ops stay standard, the compiler does the fusion. this is the modern default and what embedded toolchains expect. qoperator format — replace ops with pre-quantized variants ( qlinearconv , qlinearmatmul ). more explicit but less flexible; less common for npu flows. know that qdq is preferred because it keeps the graph in standard ops and lets each backend fuse in the way that suits its hardware. how qdq models get created ptq (static) — run calibration data through the fp32 model, collect activation ranges, compute scales, and insert q/dq nodes. tools: onnxruntime.quantization.quantize_static , vendor ptq tools. qat export — train with fake-quant nodes in pytorch, then export; the fake-quant ops become q/dq in the onnx graph, carrying the learned scales. from onnxruntime.quantization import quantize_static, calibrationdatareader, quanttype, quantformat quantize_static( \"model.onnx\" , \"model.qdq.onnx\" , calibration_data_reader=my_reader, # yields representative inputs quant_format=quantformat.qdq, activation_type=quanttype.qint8, weight_type=quanttype.qint8, per_channel= true , # per-channel weights ) things that go wrong (and get asked) missing q/dq around an op → that op stays fp32 → it may fall back off the npu, or break an int8 fusion chain and force dequant/requant round-trips. wrong granularity — per-tensor weights on a layer with wide per-channel range → big accuracy loss. fix: per-channel weight quantization. q/dq the compiler can't fuse — a stray op between q and the consumer prevents fusion; the region silently runs in fp32/dsp. inspect the graph, move or remove the intruding op. zero-point/dtype mismatch — signed vs unsigned int8 mismatch between activation and weight expectations; some npus want symmetric (zero-point 0) weights specifically. interview soundbite \"a qdq model is an fp32 onnx graph annotated with quantizelinear/dequantizelinear pairs that carry the scale and zero-point. the fp32 ops between them are just reference semantics — the compiler pattern-matches q→op→q and emits a fused int8 hardware op. when a layer unexpectedly runs in fp32, i look for a missing or unfusible q/dq pair around it.\"","words":592},{"path":"02-onnx-toolchain/compiler-runtime-partitioning.md","title":"Compiler, Runtime & Partitioning","section":"2 · ONNX Toolchain","quiz":false,"accent":"#7c6cf0","html":"<h1 id=\"compiler-runtime-partitioning\">Compiler, Runtime &amp; Partitioning<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The embedded AI toolchain has two halves. The <strong>compiler<\/strong> (offline) takes your QDQ ONNX graph, optimizes it, <strong>partitions<\/strong> it across NPU/DSP/CPU, and produces a deployable engine. The <strong>runtime<\/strong> (on target) loads that engine, feeds inputs, orchestrates the subgraphs across blocks, and returns outputs. This is the embedded analogue of \"TensorRT builder + runtime\" you already know — same concepts, vendor-neutral, ONNX-first.<\/div><\/div>\n<h2 id=\"the-two-phase-pipeline\">The two-phase pipeline<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">QDQ ONNX<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">compiler (offline)<\/span><\/span>\n    <span class=\"node\">optimized + partitioned engine<span class=\"nsub\">per-block subgraphs<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">runtime (on target)<\/span><\/span>\n    <span class=\"node out\">inference<span class=\"nsub\">Linux / QNX<\/span><\/span>\n  <\/div>\n  <div class=\"flow-foot\"><b>Compiler:<\/b> graph optimization · quantization lowering · operator fusion · partitioning · memory planning · code/engine generation. <b>Runtime:<\/b> load · bind buffers · schedule subgraphs · sync across blocks.<\/div>\n<\/div>\n<h2 id=\"what-the-compiler-does-name-these\">What the compiler does (name these)<\/h2>\n<ol><li><strong>Graph optimization<\/strong> — constant folding, dead-node elimination, layout assignment,<\/li><\/ol>\n<p>op simplification. (Some you can also do yourself with graph surgery upfront.)<\/p>\n<ol><li><strong>Quantization lowering<\/strong> — recognize QDQ patterns, fuse Q/DQ into INT8 ops, keep the<\/li><\/ol>\n<p>scales.<\/p>\n<ol><li><strong>Operator fusion<\/strong> — <code>Conv+Bias+Activation<\/code>, elementwise chains, etc., into single<\/li><\/ol>\n<p>hardware passes. Fewer passes → fewer DRAM round-trips.<\/p>\n<ol><li><strong>Partitioning<\/strong> — assign each subgraph to a block based on op support, then insert the<\/li><\/ol>\n<p>copies/sync at boundaries. Produces the <strong>partition report<\/strong> you live by.<\/p>\n<ol><li><strong>Memory planning<\/strong> — allocate on-chip SRAM / scratch, decide tensor lifetimes and<\/li><\/ol>\n<p>buffer reuse (huge on a bandwidth-limited SoC).<\/p>\n<ol><li><strong>Engine generation<\/strong> — serialize a target-specific artifact. Like a TensorRT plan, it's<\/li><\/ol>\n<p><strong>hardware/version specific<\/strong> — build for the exact SoC + toolchain version.<\/p>\n<h2 id=\"execution-providers-the-onnx-runtime-abstraction\">Execution providers: the ONNX Runtime abstraction<\/h2>\n<p>If the toolchain is ONNX Runtime-based, backends plug in as <strong>Execution Providers (EPs)<\/strong>. ORT partitions the graph and assigns each subgraph to the <strong>highest-priority EP that can run it<\/strong>, falling back down the list:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> onnxruntime <span class=\"tok-keyword\">as<\/span> ort\nsess = ort.InferenceSession(\n    <span class=\"tok-string\">\"model.qdq.onnx\"<\/span>,\n    providers=[<span class=\"tok-string\">\"VendorNPUExecutionProvider\"<\/span>, <span class=\"tok-string\">\"CPUExecutionProvider\"<\/span>],  <span class=\"tok-comment\"># priority order<\/span>\n)\n<span class=\"tok-comment\"># inspect what actually got assigned where:<\/span>\n<span class=\"tok-builtin\">print<\/span>(sess.get_providers())<\/code><\/pre>\n<p>The <strong>CPUExecutionProvider is the universal fallback<\/strong> — anything no accelerator EP claims lands there. \"Why is my model slow in ORT?\" is very often \"too much fell to the CPU EP.\" This is the same <strong>partitioning + fallback<\/strong> story as the raw compiler, just via the EP API.<\/p>\n<h2 id=\"execution-control-what-the-jd-means\">Execution control (what the JD means)<\/h2>\n<p>You often need to control <em>how<\/em> the model executes, not just compile-and-run:<\/p>\n<ul><li><strong>Pinning subgraphs<\/strong> — force a region onto a specific block (or keep it off one) via EP<\/li><\/ul>\n<p>priority or compiler hints.<\/p>\n<ul><li><strong>Static shapes / optimization profiles<\/strong> — declare fixed input shapes so the NPU accepts<\/li><\/ul>\n<p>the graph and the compiler can plan memory.<\/p>\n<ul><li><strong>Manual segmentation<\/strong> — split the ONNX (see<\/li><\/ul>\n<p><a class=\"mdlink\" data-href=\"onnx-graph-surgery.md\" href=\"#\">graph surgery<\/a>) and run halves as separate sessions when you want   explicit control of the boundary and buffers.<\/p>\n<ul><li><strong>I/O binding / zero-copy<\/strong> — bind pre-allocated device buffers so inputs/outputs aren't<\/li><\/ul>\n<p>copied each call — critical for a real-time camera pipeline.<\/p>\n<h2 id=\"hybrid-compilation\">Hybrid compilation<\/h2>\n<p>The JD mentions a \"hybrid compiler.\" The general idea: <strong>not everything is ahead-of-time compiled to the NPU.<\/strong> A hybrid flow AOT-compiles the accelerator-friendly subgraphs into a fixed engine and leaves the rest to run through a flexible runtime path (DSP kernels or interpreted CPU ops). You get NPU speed on the bulk of the model plus the flexibility to handle ops the AOT compiler can't. Your job is to <strong>maximize the AOT-compiled fraction<\/strong> and keep the flexible-path remainder small and cheap.<\/p>\n<h2 id=\"the-mental-checklist-for-make-it-run-well\">The mental checklist for \"make it run well\"<\/h2>\n<ol><li><strong>Static shapes<\/strong> everywhere the NPU touches.<\/li><li><strong>QDQ complete<\/strong> — every accelerator op has its Q/DQ so it stays INT8.<\/li><li><strong>Partition report clean<\/strong> — bulk on NPU, fallbacks at the boundaries or on DSP.<\/li><li><strong>Fusions intact<\/strong> — no stray ops breaking Conv+Act chains.<\/li><li><strong>Memory planned<\/strong> — activations fit SRAM/scratch where possible; buffers reused.<\/li><li><strong>I/O bound zero-copy<\/strong> into the runtime.<\/li><\/ol>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"The compiler is offline — it optimizes, lowers QDQ to INT8, fuses, partitions across blocks, plans memory, and emits a hardware-specific engine. The runtime loads it and orchestrates the subgraphs. In an ONNX Runtime flow the same thing happens through execution providers: ORT assigns subgraphs to the NPU EP and drops the rest to the CPU EP. Most 'it's slow' issues are the partition putting too much on the fallback path, which I fix with static shapes, complete QDQ, and graph surgery.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"the-two-phase-pipeline","text":"The two-phase pipeline"},{"level":2,"id":"what-the-compiler-does-name-these","text":"What the compiler does (name these)"},{"level":2,"id":"execution-providers-the-onnx-runtime-abstraction","text":"Execution providers: the ONNX Runtime abstraction"},{"level":2,"id":"execution-control-what-the-jd-means","text":"Execution control (what the JD means)"},{"level":2,"id":"hybrid-compilation","text":"Hybrid compilation"},{"level":2,"id":"the-mental-checklist-for-make-it-run-well","text":"The mental checklist for \"make it run well\""},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"compiler, runtime & partitioning 💡 tl;dr the embedded ai toolchain has two halves. the compiler (offline) takes your qdq onnx graph, optimizes it, partitions it across npu/dsp/cpu, and produces a deployable engine. the runtime (on target) loads that engine, feeds inputs, orchestrates the subgraphs across blocks, and returns outputs. this is the embedded analogue of \"tensorrt builder + runtime\" you already know — same concepts, vendor-neutral, onnx-first. the two-phase pipeline qdq onnx compiler (offline) optimized + partitioned engine per-block subgraphs runtime (on target) inference linux / qnx compiler: graph optimization · quantization lowering · operator fusion · partitioning · memory planning · code/engine generation. runtime: load · bind buffers · schedule subgraphs · sync across blocks. what the compiler does (name these) graph optimization — constant folding, dead-node elimination, layout assignment, op simplification. (some you can also do yourself with graph surgery upfront.) quantization lowering — recognize qdq patterns, fuse q/dq into int8 ops, keep the scales. operator fusion — conv+bias+activation , elementwise chains, etc., into single hardware passes. fewer passes → fewer dram round-trips. partitioning — assign each subgraph to a block based on op support, then insert the copies/sync at boundaries. produces the partition report you live by. memory planning — allocate on-chip sram / scratch, decide tensor lifetimes and buffer reuse (huge on a bandwidth-limited soc). engine generation — serialize a target-specific artifact. like a tensorrt plan, it's hardware/version specific — build for the exact soc + toolchain version. execution providers: the onnx runtime abstraction if the toolchain is onnx runtime-based, backends plug in as execution providers (eps) . ort partitions the graph and assigns each subgraph to the highest-priority ep that can run it , falling back down the list: import onnxruntime as ort sess = ort.inferencesession( \"model.qdq.onnx\" , providers=[ \"vendornpuexecutionprovider\" , \"cpuexecutionprovider\" ], # priority order ) # inspect what actually got assigned where: print (sess.get_providers()) the cpuexecutionprovider is the universal fallback — anything no accelerator ep claims lands there. \"why is my model slow in ort?\" is very often \"too much fell to the cpu ep.\" this is the same partitioning + fallback story as the raw compiler, just via the ep api. execution control (what the jd means) you often need to control how the model executes, not just compile-and-run: pinning subgraphs — force a region onto a specific block (or keep it off one) via ep priority or compiler hints. static shapes / optimization profiles — declare fixed input shapes so the npu accepts the graph and the compiler can plan memory. manual segmentation — split the onnx (see graph surgery ) and run halves as separate sessions when you want explicit control of the boundary and buffers. i/o binding / zero-copy — bind pre-allocated device buffers so inputs/outputs aren't copied each call — critical for a real-time camera pipeline. hybrid compilation the jd mentions a \"hybrid compiler.\" the general idea: not everything is ahead-of-time compiled to the npu. a hybrid flow aot-compiles the accelerator-friendly subgraphs into a fixed engine and leaves the rest to run through a flexible runtime path (dsp kernels or interpreted cpu ops). you get npu speed on the bulk of the model plus the flexibility to handle ops the aot compiler can't. your job is to maximize the aot-compiled fraction and keep the flexible-path remainder small and cheap. the mental checklist for \"make it run well\" static shapes everywhere the npu touches. qdq complete — every accelerator op has its q/dq so it stays int8. partition report clean — bulk on npu, fallbacks at the boundaries or on dsp. fusions intact — no stray ops breaking conv+act chains. memory planned — activations fit sram/scratch where possible; buffers reused. i/o bound zero-copy into the runtime. interview soundbite \"the compiler is offline — it optimizes, lowers qdq to int8, fuses, partitions across blocks, plans memory, and emits a hardware-specific engine. the runtime loads it and orchestrates the subgraphs. in an onnx runtime flow the same thing happens through execution providers: ort assigns subgraphs to the npu ep and drops the rest to the cpu ep. most 'it's slow' issues are the partition putting too much on the fallback path, which i fix with static shapes, complete qdq, and graph surgery.\"","words":701},{"path":"03-quantization-embedded/README.md","title":"Overview","section":"3 · Quantization for Embedded","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"3-quantization-for-embedded\">3 · Quantization for Embedded<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The NPU is an <strong>INT8 engine<\/strong>, so quantization isn't optional — it's how the model runs on the accelerator at all. This section is the embedded-focused version of quantization: PTQ vs QAT, calibration methods, and — the part the JD stresses — <strong>diagnosing and mitigating the accuracy you lose<\/strong> when a model is quantized or an operator is limited.<\/div><\/div>\n<h2 id=\"why-quantization-is-central-to-this-role\">Why quantization is central to this role<\/h2>\n<ul><li>The fast blocks (NPU/CNNIP) compute in <strong>INT8<\/strong>; FP32/FP16 either doesn't run there or<\/li><\/ul>\n<p>runs far slower. No quantization → no acceleration.<\/p>\n<ul><li>INT8 also <strong>cuts memory traffic 4×<\/strong>, which on a bandwidth-limited SoC is often the bigger<\/li><\/ul>\n<p>win than the MAC speedup (see the roofline argument in   <a class=\"mdlink\" data-href=\"../01-embedded-accelerators/npu-dsp-cnnip.md\" href=\"#\">npu-dsp-cnnip.md<\/a>).<\/p>\n<ul><li>But INT8 has only 256 levels — some layers lose accuracy, and <strong>you<\/strong> have to find which<\/li><\/ul>\n<p>and fix them. That's the applied skill this JD is testing.<\/p>\n<h2 id=\"relationship-to-your-existing-prep\">Relationship to your existing prep<\/h2>\n<p>You already have the deep numerics (scale/zero-point, symmetric vs asymmetric, per-channel, FP32→FP8→INT8) in <strong>ml-engineer-prep §12<\/strong> (<a class=\"mdlink\" data-href=\"../../ml-engineer-prep/12-nvidia-model-optimization/quantization-deep.md\" href=\"#\">quantization-deep<\/a>, <a class=\"mdlink\" data-href=\"../../ml-engineer-prep/12-nvidia-model-optimization/numerical-precision.md\" href=\"#\">numerical-precision<\/a>). This section assumes that and focuses on the <strong>embedded workflow and accuracy debugging<\/strong>.<\/p>\n<h2 id=\"pages\">Pages<\/h2>\n<ul><li><strong><a class=\"mdlink\" data-href=\"ptq-qat-calibration.md\" href=\"#\">PTQ, QAT &amp; Calibration<\/a><\/strong> — the two paths, when to use each,<\/li><\/ul>\n<p>and how calibration methods (min-max, entropy/KL, percentile) pick scales.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"accuracy-mitigation.md\" href=\"#\">Accuracy Degradation &amp; Mitigation<\/a><\/strong> — the diagnosis checklist:<\/li><\/ul>\n<p>find the layer that's hurting, understand why, and the ladder of fixes.<\/p>\n<h2 id=\"the-one-liner-to-have-ready\">The one-liner to have ready<\/h2>\n<blockquote><p>\"I start with PTQ because it's fast and needs no training data pipeline, per-channel weights and a good calibration set. If accuracy still misses target, I localize the damage — usually a few sensitive layers — and either keep those in higher precision or move to QAT to recover the last points. Quantization is a per-layer accuracy budget, not a single global switch.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"why-quantization-is-central-to-this-role","text":"Why quantization is central to this role"},{"level":2,"id":"relationship-to-your-existing-prep","text":"Relationship to your existing prep"},{"level":2,"id":"pages","text":"Pages"},{"level":2,"id":"the-one-liner-to-have-ready","text":"The one-liner to have ready"}],"text":"3 · quantization for embedded 💡 tl;dr the npu is an int8 engine , so quantization isn't optional — it's how the model runs on the accelerator at all. this section is the embedded-focused version of quantization: ptq vs qat, calibration methods, and — the part the jd stresses — diagnosing and mitigating the accuracy you lose when a model is quantized or an operator is limited. why quantization is central to this role the fast blocks (npu/cnnip) compute in int8 ; fp32/fp16 either doesn't run there or runs far slower. no quantization → no acceleration. int8 also cuts memory traffic 4× , which on a bandwidth-limited soc is often the bigger win than the mac speedup (see the roofline argument in npu-dsp-cnnip.md ). but int8 has only 256 levels — some layers lose accuracy, and you have to find which and fix them. that's the applied skill this jd is testing. relationship to your existing prep you already have the deep numerics (scale/zero-point, symmetric vs asymmetric, per-channel, fp32→fp8→int8) in ml-engineer-prep §12 ( quantization-deep , numerical-precision ). this section assumes that and focuses on the embedded workflow and accuracy debugging . pages ptq, qat & calibration — the two paths, when to use each, and how calibration methods (min-max, entropy/kl, percentile) pick scales. accuracy degradation & mitigation — the diagnosis checklist: find the layer that's hurting, understand why, and the ladder of fixes. the one-liner to have ready \"i start with ptq because it's fast and needs no training data pipeline, per-channel weights and a good calibration set. if accuracy still misses target, i localize the damage — usually a few sensitive layers — and either keep those in higher precision or move to qat to recover the last points. quantization is a per-layer accuracy budget, not a single global switch.\"","words":301},{"path":"03-quantization-embedded/ptq-qat-calibration.md","title":"PTQ, QAT & Calibration","section":"3 · Quantization for Embedded","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"ptq-qat-calibration\">PTQ, QAT &amp; Calibration<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <strong>PTQ<\/strong> quantizes a trained model with no gradient updates — you just need a small <strong>calibration set<\/strong> to pick activation ranges. <strong>QAT<\/strong> simulates quantization <em>during<\/em> training so the weights adapt, recovering accuracy PTQ loses at the cost of a training pipeline. <strong>Calibration<\/strong> is the sub-problem inside PTQ: choosing the clipping range for each tensor. Know when to reach for each and how the calibration methods differ.<\/div><\/div>\n<h2 id=\"ptq-vs-qat-at-a-glance\">PTQ vs QAT at a glance<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th><strong>PTQ<\/strong> (post-training)<\/th><th><strong>QAT<\/strong> (quantization-aware)<\/th><\/tr><\/thead><tbody><tr><td>Needs training pipeline?<\/td><td>No<\/td><td>Yes (fine-tune)<\/td><\/tr><tr><td>Data needed<\/td><td>~100–1000 unlabeled samples (calibration)<\/td><td>Full labeled training set<\/td><\/tr><tr><td>Time<\/td><td>Minutes–hours<\/td><td>Hours–days<\/td><\/tr><tr><td>Accuracy<\/td><td>Good for most CNNs; can drop on sensitive models<\/td><td>Best; recovers most of the loss<\/td><\/tr><tr><td>When to use<\/td><td><strong>First choice<\/strong> — always try PTQ first<\/td><td>When PTQ misses the accuracy target<\/td><\/tr><tr><td>Your role<\/td><td>You run it<\/td><td>You <strong>collaborate<\/strong> with the training team<\/td><\/tr><\/tbody><\/table><\/div>\n<p>The JD phrasing is exact: \"<strong>PTQ<\/strong>\" (you do it) and \"<strong>QAT collaboration<\/strong>\" (the training team owns the loop, you provide the quantization spec and the target). Say it that way.<\/p>\n<h2 id=\"how-ptq-works\">How PTQ works<\/h2>\n<ol><li><strong>Insert observers<\/strong> on weights and activations.<\/li><li><strong>Weights<\/strong> — ranges are known directly from the trained values; quantize immediately<\/li><\/ol>\n<p>(per-channel for conv/matmul weights — big accuracy win, cheap on hardware).<\/p>\n<ol><li><strong>Activations<\/strong> — ranges are <em>data-dependent<\/em>, so run the <strong>calibration set<\/strong> through the<\/li><\/ol>\n<p>model and collect per-tensor statistics.<\/p>\n<ol><li><strong>Compute scales/zero-points<\/strong>, insert Q/DQ, produce the<\/li><\/ol>\n<p><a class=\"mdlink\" data-href=\"../02-onnx-toolchain/qdq-models.md\" href=\"#\">QDQ model<\/a>.<\/p>\n<p>The calibration set must be <strong>representative<\/strong> — same distribution as deployment (lighting, scene types for AD). A biased calibration set is a top cause of field accuracy loss.<\/p>\n<h2 id=\"calibration-methods-the-activation-range-choice\">Calibration methods (the activation-range choice)<\/h2>\n<p>For each activation tensor you must pick a clipping range <code>[−α, α]<\/code> (or <code>[β, α]<\/code>). Too wide → coarse steps waste precision; too narrow → clipping destroys outliers. Methods:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Method<\/th><th>How it picks the range<\/th><th>Trade-off<\/th><\/tr><\/thead><tbody><tr><td><strong>Min-Max<\/strong><\/td><td>Use the observed min/max<\/td><td>Simple; <strong>outlier-sensitive<\/strong> — one spike widens the range and coarsens everything<\/td><\/tr><tr><td><strong>Percentile<\/strong><\/td><td>Clip at e.g. 99.9th percentile<\/td><td>Ignores rare outliers → tighter range, better for most layers<\/td><\/tr><tr><td><strong>Entropy / KL-divergence<\/strong><\/td><td>Choose the range that minimizes information loss between FP and INT distributions (TensorRT's default)<\/td><td>Best general-purpose; a bit more compute<\/td><\/tr><tr><td><strong>MSE<\/strong><\/td><td>Minimize quantization mean-squared error<\/td><td>Good for weights / smooth distributions<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Rule of thumb:<\/strong> min-max for weights, <strong>entropy or percentile for activations<\/strong>. If a layer has heavy outliers (common after certain activations), percentile/entropy beats min-max clearly.<\/p>\n<h2 id=\"symmetric-vs-asymmetric-per-tensor-vs-per-channel-embedded-specifics\">Symmetric vs asymmetric, per-tensor vs per-channel (embedded specifics)<\/h2>\n<ul><li><strong>Weights: symmetric, per-channel.<\/strong> Symmetric (zero-point 0) removes the zero-point term<\/li><\/ul>\n<p>from the MAC — many NPUs <em>require<\/em> it for weights. Per-channel handles the wide range   across output channels.<\/p>\n<ul><li><strong>Activations: asymmetric or symmetric, per-tensor.<\/strong> Per-tensor because per-channel<\/li><\/ul>\n<p>activations are expensive/unsupported on most NPUs. Asymmetric helps one-sided   distributions (post-ReLU, all ≥ 0) — but check what your NPU supports.<\/p>\n<p>(The scale/zero-point math is in <a class=\"mdlink\" data-href=\"../../ml-engineer-prep/12-nvidia-model-optimization/quantization-deep.md\" href=\"#\">ml-engineer-prep quantization-deep<\/a>.)<\/p>\n<h2 id=\"how-qat-recovers-accuracy\">How QAT recovers accuracy<\/h2>\n<p>QAT inserts <strong>fake-quant<\/strong> nodes (quantize→dequantize in FP, so gradients flow) into the training graph. The forward pass sees the <em>rounding error<\/em>, so the optimizer nudges weights to be <strong>robust to quantization<\/strong>. The <strong>straight-through estimator (STE)<\/strong> passes gradients through the non-differentiable round as if it were identity.<\/p>\n<ul><li>Usually a <strong>short fine-tune<\/strong> from the FP32 checkpoint, low LR.<\/li><li>Export bakes the learned scales into the <a class=\"mdlink\" data-href=\"../02-onnx-toolchain/qdq-models.md\" href=\"#\">QDQ model<\/a>.<\/li><li>Your collaboration deliverable: the <strong>quantization scheme<\/strong> (which layers, granularity,<\/li><\/ul>\n<p>symmetric/asymmetric, target dtype) that matches the NPU's constraints, plus the accuracy   target and the sensitive layers PTQ flagged.<\/p>\n<h2 id=\"the-workflow-youd-describe\">The workflow you'd describe<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">FP32 model<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">PTQ + calib<\/span><\/span>\n    <span class=\"node\">INT8 QDQ<span class=\"nsub\">measure accuracy<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">miss target?<\/span><\/span>\n    <span class=\"node data\">diagnose sensitive layers<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">mixed-prec / QAT<\/span><\/span>\n    <span class=\"node out\">ship<\/span>\n  <\/div>\n<\/div>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"PTQ first — it's minutes and needs only a representative calibration set; I use per-channel symmetric weights and entropy/percentile calibration for activations. I measure per-layer, and if I miss target I keep the few sensitive layers in higher precision or hand the training team a QAT spec to recover the rest. QAT is a collaboration — I own the quantization scheme and the target, they own the fine-tune.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"ptq-vs-qat-at-a-glance","text":"PTQ vs QAT at a glance"},{"level":2,"id":"how-ptq-works","text":"How PTQ works"},{"level":2,"id":"calibration-methods-the-activation-range-choice","text":"Calibration methods (the activation-range choice)"},{"level":2,"id":"symmetric-vs-asymmetric-per-tensor-vs-per-channel-embedded-specifics","text":"Symmetric vs asymmetric, per-tensor vs per-channel (embedded specifics)"},{"level":2,"id":"how-qat-recovers-accuracy","text":"How QAT recovers accuracy"},{"level":2,"id":"the-workflow-youd-describe","text":"The workflow you'd describe"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"ptq, qat & calibration 💡 tl;dr ptq quantizes a trained model with no gradient updates — you just need a small calibration set to pick activation ranges. qat simulates quantization during training so the weights adapt, recovering accuracy ptq loses at the cost of a training pipeline. calibration is the sub-problem inside ptq: choosing the clipping range for each tensor. know when to reach for each and how the calibration methods differ. ptq vs qat at a glance ptq (post-training) qat (quantization-aware) needs training pipeline? no yes (fine-tune) data needed ~100–1000 unlabeled samples (calibration) full labeled training set time minutes–hours hours–days accuracy good for most cnns; can drop on sensitive models best; recovers most of the loss when to use first choice — always try ptq first when ptq misses the accuracy target your role you run it you collaborate with the training team the jd phrasing is exact: \" ptq \" (you do it) and \" qat collaboration \" (the training team owns the loop, you provide the quantization spec and the target). say it that way. how ptq works insert observers on weights and activations. weights — ranges are known directly from the trained values; quantize immediately (per-channel for conv/matmul weights — big accuracy win, cheap on hardware). activations — ranges are data-dependent , so run the calibration set through the model and collect per-tensor statistics. compute scales/zero-points , insert q/dq, produce the qdq model . the calibration set must be representative — same distribution as deployment (lighting, scene types for ad). a biased calibration set is a top cause of field accuracy loss. calibration methods (the activation-range choice) for each activation tensor you must pick a clipping range [−α, α] (or [β, α] ). too wide → coarse steps waste precision; too narrow → clipping destroys outliers. methods: method how it picks the range trade-off min-max use the observed min/max simple; outlier-sensitive — one spike widens the range and coarsens everything percentile clip at e.g. 99.9th percentile ignores rare outliers → tighter range, better for most layers entropy / kl-divergence choose the range that minimizes information loss between fp and int distributions (tensorrt's default) best general-purpose; a bit more compute mse minimize quantization mean-squared error good for weights / smooth distributions rule of thumb: min-max for weights, entropy or percentile for activations . if a layer has heavy outliers (common after certain activations), percentile/entropy beats min-max clearly. symmetric vs asymmetric, per-tensor vs per-channel (embedded specifics) weights: symmetric, per-channel. symmetric (zero-point 0) removes the zero-point term from the mac — many npus require it for weights. per-channel handles the wide range across output channels. activations: asymmetric or symmetric, per-tensor. per-tensor because per-channel activations are expensive/unsupported on most npus. asymmetric helps one-sided distributions (post-relu, all ≥ 0) — but check what your npu supports. (the scale/zero-point math is in ml-engineer-prep quantization-deep .) how qat recovers accuracy qat inserts fake-quant nodes (quantize→dequantize in fp, so gradients flow) into the training graph. the forward pass sees the rounding error , so the optimizer nudges weights to be robust to quantization . the straight-through estimator (ste) passes gradients through the non-differentiable round as if it were identity. usually a short fine-tune from the fp32 checkpoint, low lr. export bakes the learned scales into the qdq model . your collaboration deliverable: the quantization scheme (which layers, granularity, symmetric/asymmetric, target dtype) that matches the npu's constraints, plus the accuracy target and the sensitive layers ptq flagged. the workflow you'd describe fp32 model ptq + calib int8 qdq measure accuracy miss target? diagnose sensitive layers mixed-prec / qat ship interview soundbite \"ptq first — it's minutes and needs only a representative calibration set; i use per-channel symmetric weights and entropy/percentile calibration for activations. i measure per-layer, and if i miss target i keep the few sensitive layers in higher precision or hand the training team a qat spec to recover the rest. qat is a collaboration — i own the quantization scheme and the target, they own the fine-tune.\"","words":664},{"path":"03-quantization-embedded/accuracy-mitigation.md","title":"Accuracy Degradation & Mitigation","section":"3 · Quantization for Embedded","quiz":false,"accent":"#c98a1a","html":"<h1 id=\"accuracy-degradation-mitigation\">Accuracy Degradation &amp; Mitigation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> When INT8 tanks accuracy, it's almost never uniform — a <strong>handful of sensitive layers<\/strong> or <strong>one operator limitation<\/strong> does the damage. The skill is a <strong>diagnosis loop<\/strong>: localize the bad layer, understand the cause (outliers? per-tensor on a wide range? an op the NPU approximates?), then apply the cheapest fix that hits the target. This is the exact task the JD calls \"analyze accuracy degradation and propose mitigation strategies.\"<\/div><\/div>\n<h2 id=\"two-sources-of-degradation\">Two sources of degradation<\/h2>\n<ol><li><strong>Quantization error<\/strong> — 256 levels can't represent a tensor's range; rounding + clipping<\/li><\/ol>\n<p>introduce noise that compounds through the network.<\/p>\n<ol><li><strong>Operator limitation<\/strong> — the NPU implements an op <strong>approximately<\/strong> or <strong>not at all<\/strong>:<\/li><\/ol>\n<p>a lower-precision Softmax/LayerNorm, a <code>Resize<\/code> with a different rounding mode, a fused    activation that isn't bit-exact. The math the hardware runs ≠ the math you trained.<\/p>\n<p>Distinguishing these matters because the fixes differ.<\/p>\n<h2 id=\"the-diagnosis-loop\">The diagnosis loop<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">INT8 misses target<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">localize<\/span><\/span>\n    <span class=\"node\">per-layer error<span class=\"nsub\">SQNR / cosine<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">explain<\/span><\/span>\n    <span class=\"node data\">why is this layer bad?<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">fix cheapest<\/span><\/span>\n    <span class=\"node out\">re-measure<\/span>\n  <\/div>\n<\/div>\n<h3 id=\"1-localize-which-layer\">1. Localize: which layer?<\/h3>\n<p>Compare FP32 vs INT8 <strong>per layer<\/strong>, don't just look at the final metric:<\/p>\n<ul><li><strong>SQNR<\/strong> (signal-to-quantization-noise ratio) or <strong>cosine similarity<\/strong> between the FP32<\/li><\/ul>\n<p>activation and the dequantized INT8 activation, layer by layer. A cliff in SQNR points to   the culprit.<\/p>\n<ul><li><strong>Segment the model<\/strong> at that tensor (see<\/li><\/ul>\n<p><a class=\"mdlink\" data-href=\"../02-onnx-toolchain/onnx-graph-surgery.md\" href=\"#\">graph surgery<\/a>) and confirm error accumulates   there.<\/p>\n<h3 id=\"2-explain-why-is-that-layer-bad\">2. Explain: why is that layer bad?<\/h3>\n<div class=\"table-scroll\"><table><thead><tr><th>Symptom<\/th><th>Likely cause<\/th><\/tr><\/thead><tbody><tr><td>Wide dynamic range / heavy outliers<\/td><td>Min-max calibration coarsened the whole tensor<\/td><\/tr><tr><td>Big cross-channel weight spread<\/td><td>Per-tensor weights instead of per-channel<\/td><\/tr><tr><td>Depthwise conv layers hit hardest<\/td><td>Depthwise has few weights per channel → less redundancy, quantizes poorly<\/td><\/tr><tr><td>First/last layers sensitive<\/td><td>Input/logit layers carry high info density<\/td><\/tr><tr><td>Error appears exactly at one op<\/td><td>Operator limitation (approximate HW implementation), not quantization<\/td><\/tr><tr><td>Attention/LayerNorm/Softmax in BEV head<\/td><td>Reductions + division are precision-sensitive<\/td><\/tr><\/tbody><\/table><\/div>\n<h3 id=\"3-fix-the-mitigation-ladder-cheapest-first\">3. Fix: the mitigation ladder (cheapest first)<\/h3>\n<ol><li><strong>Better calibration<\/strong> — switch min-max → entropy/percentile; use a more representative<\/li><\/ol>\n<p>calibration set. Free, often enough.<\/p>\n<ol><li><strong>Per-channel weights<\/strong> — if you were per-tensor. Big win, cheap on hardware.<\/li><li><strong>Mixed precision<\/strong> — keep the sensitive layers in <strong>INT16/FP16<\/strong> (or on the DSP in higher<\/li><\/ol>\n<p>precision) while the rest stays INT8. The standard \"keep first/last layer higher    precision\" trick lives here.<\/p>\n<ol><li><strong>Cross-layer equalization / bias correction<\/strong> — PTQ-time tricks that rebalance ranges<\/li><\/ol>\n<p>across adjacent layers and correct the mean shift quantization introduces. No retraining.<\/p>\n<ol><li><strong>QAT<\/strong> — if PTQ tricks still miss, hand the training team a QAT spec so the weights learn<\/li><\/ol>\n<p>to tolerate INT8. Most expensive, most effective.<\/p>\n<ol><li><strong>Graph change<\/strong> — if it's an <em>operator limitation<\/em>, rewrite the op into supported ops, or<\/li><\/ol>\n<p>move it to the DSP/CPU where full precision is available (accept the boundary cost).<\/p>\n<h3 id=\"4-re-measure-both-halves\">4. Re-measure: both halves<\/h3>\n<p>Every fix must be re-checked on <strong>accuracy<\/strong> <em>and<\/em> <strong>latency<\/strong> — pushing a layer to FP16/DSP recovers accuracy but adds a partition boundary and DMA cost. It's a <strong>Pareto trade<\/strong>, not a free lunch.<\/p>\n<h2 id=\"worked-framing-use-your-own-project\">Worked framing (use your own project)<\/h2>\n<blockquote><p>\"On my project, PTQ dropped mAP by ~4 points. Per-layer SQNR showed the loss concentrated in the depthwise blocks and the detection head. I moved the head to INT16 and switched activations to entropy calibration — recovered ~3 of the 4 points with a small latency cost. The last point I got back with a short QAT fine-tune the training team ran against my quantization spec.\"<\/p><\/blockquote>\n<p>(If your real numbers differ, use them — the <em>shape<\/em> of the story is what lands: localize → explain → cheapest fix → re-measure.)<\/p>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"Accuracy loss is almost always a few layers, not the whole network. I localize it with per-layer SQNR/cosine, explain it (outliers, per-tensor on a wide range, a depthwise block, or an approximate NPU op), then climb a mitigation ladder — recalibrate, per-channel weights, mixed precision on the sensitive layers, bias correction, and only then QAT. Every fix I re-check against both accuracy and latency.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"two-sources-of-degradation","text":"Two sources of degradation"},{"level":2,"id":"the-diagnosis-loop","text":"The diagnosis loop"},{"level":3,"id":"1-localize-which-layer","text":"1. Localize: which layer?"},{"level":3,"id":"2-explain-why-is-that-layer-bad","text":"2. Explain: why is that layer bad?"},{"level":3,"id":"3-fix-the-mitigation-ladder-cheapest-first","text":"3. Fix: the mitigation ladder (cheapest first)"},{"level":3,"id":"4-re-measure-both-halves","text":"4. Re-measure: both halves"},{"level":2,"id":"worked-framing-use-your-own-project","text":"Worked framing (use your own project)"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"accuracy degradation & mitigation 💡 tl;dr when int8 tanks accuracy, it's almost never uniform — a handful of sensitive layers or one operator limitation does the damage. the skill is a diagnosis loop : localize the bad layer, understand the cause (outliers? per-tensor on a wide range? an op the npu approximates?), then apply the cheapest fix that hits the target. this is the exact task the jd calls \"analyze accuracy degradation and propose mitigation strategies.\" two sources of degradation quantization error — 256 levels can't represent a tensor's range; rounding + clipping introduce noise that compounds through the network. operator limitation — the npu implements an op approximately or not at all : a lower-precision softmax/layernorm, a resize with a different rounding mode, a fused activation that isn't bit-exact. the math the hardware runs ≠ the math you trained. distinguishing these matters because the fixes differ. the diagnosis loop int8 misses target localize per-layer error sqnr / cosine explain why is this layer bad? fix cheapest re-measure 1. localize: which layer? compare fp32 vs int8 per layer , don't just look at the final metric: sqnr (signal-to-quantization-noise ratio) or cosine similarity between the fp32 activation and the dequantized int8 activation, layer by layer. a cliff in sqnr points to the culprit. segment the model at that tensor (see graph surgery ) and confirm error accumulates there. 2. explain: why is that layer bad? symptom likely cause wide dynamic range / heavy outliers min-max calibration coarsened the whole tensor big cross-channel weight spread per-tensor weights instead of per-channel depthwise conv layers hit hardest depthwise has few weights per channel → less redundancy, quantizes poorly first/last layers sensitive input/logit layers carry high info density error appears exactly at one op operator limitation (approximate hw implementation), not quantization attention/layernorm/softmax in bev head reductions + division are precision-sensitive 3. fix: the mitigation ladder (cheapest first) better calibration — switch min-max → entropy/percentile; use a more representative calibration set. free, often enough. per-channel weights — if you were per-tensor. big win, cheap on hardware. mixed precision — keep the sensitive layers in int16/fp16 (or on the dsp in higher precision) while the rest stays int8. the standard \"keep first/last layer higher precision\" trick lives here. cross-layer equalization / bias correction — ptq-time tricks that rebalance ranges across adjacent layers and correct the mean shift quantization introduces. no retraining. qat — if ptq tricks still miss, hand the training team a qat spec so the weights learn to tolerate int8. most expensive, most effective. graph change — if it's an operator limitation , rewrite the op into supported ops, or move it to the dsp/cpu where full precision is available (accept the boundary cost). 4. re-measure: both halves every fix must be re-checked on accuracy and latency — pushing a layer to fp16/dsp recovers accuracy but adds a partition boundary and dma cost. it's a pareto trade , not a free lunch. worked framing (use your own project) \"on my project, ptq dropped map by ~4 points. per-layer sqnr showed the loss concentrated in the depthwise blocks and the detection head. i moved the head to int16 and switched activations to entropy calibration — recovered ~3 of the 4 points with a small latency cost. the last point i got back with a short qat fine-tune the training team ran against my quantization spec.\" (if your real numbers differ, use them — the shape of the story is what lands: localize → explain → cheapest fix → re-measure.) interview soundbite \"accuracy loss is almost always a few layers, not the whole network. i localize it with per-layer sqnr/cosine, explain it (outliers, per-tensor on a wide range, a depthwise block, or an approximate npu op), then climb a mitigation ladder — recalibrate, per-channel weights, mixed precision on the sensitive layers, bias correction, and only then qat. every fix i re-check against both accuracy and latency.\"","words":649},{"path":"04-bev-perception/README.md","title":"Overview","section":"4 · BEV & Perception Models","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"4-bev-perception-models\">4 · BEV &amp; Perception Models<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> These are the <strong>models<\/strong> the JD names — object detection, segmentation, classification, and <strong>BEV<\/strong> (bird's-eye-view) perception. You need enough to (a) talk about their architecture and metrics, and (b) reason about <em>why they're hard to deploy<\/em> on an NPU (view transforms, dynamic shapes, transformer heads). You don't need to be a research scientist — you need the deployment engineer's view of them.<\/div><\/div>\n<h2 id=\"why-this-matters-for-the-role\">Why this matters for the role<\/h2>\n<p>You're \"enabling\" these models on the SoC. When BEVFormer won't map cleanly to the NPU, you must know <em>which part<\/em> is the problem (the spatial cross-attention, the grid-sample view transform) and how to handle it — which requires knowing what these models actually do.<\/p>\n<h2 id=\"pages\">Pages<\/h2>\n<ul><li><strong><a class=\"mdlink\" data-href=\"detection-segmentation.md\" href=\"#\">Detection &amp; Segmentation for AD<\/a><\/strong> — the CV backbone-neck-head<\/li><\/ul>\n<p>pattern, one-stage detectors, semantic/instance/panoptic segmentation, and the metrics   (mAP, IoU) — with the deployment angle on each.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"bev-models.md\" href=\"#\">BEV: LSS, BEVFormer, BEVFusion, Occupancy<\/a><\/strong> — how multi-camera images<\/li><\/ul>\n<p>become a top-down BEV grid, the three canonical approaches, and what makes each   NPU-friendly or not.<\/p>\n<h2 id=\"what-overlaps-with-your-other-prep\">What overlaps with your other prep<\/h2>\n<p>Classical detection/tracking and CNN backbones are covered in <strong>computer-vision-prep §14<\/strong> (<a class=\"mdlink\" data-href=\"../../computer-vision-prep/14-deep-learning-for-video/object-detection.md\" href=\"#\">object-detection<\/a>, <a class=\"mdlink\" data-href=\"../../computer-vision-prep/14-deep-learning-for-video/cnns-and-backbones.md\" href=\"#\">cnns-and-backbones<\/a>) and the camera-geometry that BEV rests on is in <strong>§09<\/strong> (<a class=\"mdlink\" data-href=\"../../computer-vision-prep/09-computer-vision-fundamentals/camera-calibration.md\" href=\"#\">camera-calibration<\/a>, <a class=\"mdlink\" data-href=\"../../computer-vision-prep/09-computer-vision-fundamentals/geometry-and-transforms.md\" href=\"#\">geometry-and-transforms<\/a>). This section adds the <strong>BE

V<\/strong> models and the <strong>deployment<\/strong> lens those pages don't cover.<\/p>\n<h2 id=\"the-one-liner-to-have-ready\">The one-liner to have ready<\/h2>\n<blockquote><p>\"Automotive perception is moving from per-camera 2D detection to a shared <strong>BEV representation<\/strong> where all sensors are fused into one top-down grid that planning consumes. The deployment challenge is the <strong>view transform<\/strong> — lifting image features into BEV — and the transformer heads, which use ops (grid-sample, attention, dynamic shapes) that don't map cleanly to a fixed NPU, so they're where the partitioning and accuracy work goes.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"why-this-matters-for-the-role","text":"Why this matters for the role"},{"level":2,"id":"pages","text":"Pages"},{"level":2,"id":"what-overlaps-with-your-other-prep","text":"What overlaps with your other prep"},{"level":2,"id":"the-one-liner-to-have-ready","text":"The one-liner to have ready"}],"text":"4 · bev & perception models 💡 tl;dr these are the models the jd names — object detection, segmentation, classification, and bev (bird's-eye-view) perception. you need enough to (a) talk about their architecture and metrics, and (b) reason about why they're hard to deploy on an npu (view transforms, dynamic shapes, transformer heads). you don't need to be a research scientist — you need the deployment engineer's view of them. why this matters for the role you're \"enabling\" these models on the soc. when bevformer won't map cleanly to the npu, you must know which part is the problem (the spatial cross-attention, the grid-sample view transform) and how to handle it — which requires knowing what these models actually do. pages detection & segmentation for ad — the cv backbone-neck-head pattern, one-stage detectors, semantic/instance/panoptic segmentation, and the metrics (map, iou) — with the deployment angle on each. bev: lss, bevformer, bevfusion, occupancy — how multi-camera images become a top-down bev grid, the three canonical approaches, and what makes each npu-friendly or not. what overlaps with your other prep classical detection/tracking and cnn backbones are covered in computer-vision-prep §14 ( object-detection , cnns-and-backbones ) and the camera-geometry that bev rests on is in §09 ( camera-calibration , geometry-and-transforms ). this section adds the bev models and the deployment lens those pages don't cover. the one-liner to have ready \"automotive perception is moving from per-camera 2d detection to a shared bev representation where all sensors are fused into one top-down grid that planning consumes. the deployment challenge is the view transform — lifting image features into bev — and the transformer heads, which use ops (grid-sample, attention, dynamic shapes) that don't map cleanly to a fixed npu, so they're where the partitioning and accuracy work goes.\"","words":294},{"path":"04-bev-perception/detection-segmentation.md","title":"Detection & Segmentation for AD","section":"4 · BEV & Perception Models","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"detection-segmentation-for-ad\">Detection &amp; Segmentation for AD<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Perception models share a <strong>backbone → neck → head<\/strong> skeleton. Detection heads predict boxes + classes; segmentation heads predict per-pixel labels. For deployment, the <strong>backbone is NPU-friendly<\/strong> (conv-heavy, static) and the <strong>head is where the trouble is<\/strong> (NMS, dynamic outputs, upsampling). Know the metrics (mAP, IoU) and the deploy gotchas.<\/div><\/div>\n<h2 id=\"the-universal-skeleton\">The universal skeleton<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">image(s)<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">backbone<\/span><\/span>\n    <span class=\"node\">features<span class=\"nsub\">ResNet / RegNet / ViT<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">neck<\/span><\/span>\n    <span class=\"node\">multi-scale<span class=\"nsub\">FPN / BiFPN<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">head<\/span><\/span>\n    <span class=\"node out\">boxes / masks / classes<\/span>\n  <\/div>\n<\/div>\n<ul><li><strong>Backbone<\/strong> — a CNN (ResNet, RegNet, EfficientNet) or a vision transformer; extracts<\/li><\/ul>\n<p>features. <strong>Conv-heavy, static shapes → maps well to NPU/CNNIP.<\/strong><\/p>\n<ul><li><strong>Neck (FPN)<\/strong> — fuses features across scales so small and large objects both get<\/li><\/ul>\n<p>represented. Mostly conv + upsample.<\/p>\n<ul><li><strong>Head<\/strong> — task-specific prediction.<\/li><\/ul>\n<h2 id=\"object-detection\">Object detection<\/h2>\n<ul><li><strong>Two-stage<\/strong> (Faster R-CNN) — propose regions, then classify/refine. Accurate, heavier,<\/li><\/ul>\n<p>more control flow → harder to deploy.<\/p>\n<ul><li><strong>One-stage<\/strong> (YOLO, SSD, RetinaNet) — predict boxes directly on a grid. Faster, the<\/li><\/ul>\n<p><strong>default for automotive edge<\/strong>.<\/p>\n<ul><li><strong>Anchor-based vs anchor-free<\/strong> — anchors are predefined box priors; anchor-free (FCOS,<\/li><\/ul>\n<p>CenterNet) predicts centers/offsets, fewer hyperparameters.<\/p>\n<ul><li><strong>DETR-style<\/strong> (transformer, set prediction) — no NMS, but attention + bipartite matching;<\/li><\/ul>\n<p>heavier for NPUs.<\/p>\n<p><strong>Metric — mAP (mean Average Precision):<\/strong> for each class, sweep the confidence threshold, compute precision/recall, take the area under the PR curve (AP), average over classes. <strong>mAP@0.5<\/strong> uses IoU≥0.5 to count a hit; <strong>mAP@[.5:.95]<\/strong> averages over IoU thresholds (COCO). IoU = intersection/union of predicted and ground-truth boxes.<\/p>\n<p><strong>Deploy gotchas:<\/strong><\/p>\n<ul><li><strong>NMS<\/strong> (non-max suppression) — removes duplicate boxes. Control-flow + dynamic output<\/li><\/ul>\n<p>count → <strong>runs on CPU/DSP at the graph tail<\/strong>, not the NPU. Keep it out of the NPU   subgraph.<\/p>\n<ul><li><strong>Decode<\/strong> — converting raw head outputs to boxes (sigmoid, exp, anchor math) is cheap but<\/li><\/ul>\n<p>fiddly; often folded into post-processing on CPU/DSP.<\/p>\n<ul><li><strong>Dynamic #detections<\/strong> — pad to a max count so downstream shapes stay static.<\/li><\/ul>\n<h2 id=\"segmentation\">Segmentation<\/h2>\n<ul><li><strong>Semantic<\/strong> — every pixel gets a class (road, car, pedestrian). No instance separation.<\/li><\/ul>\n<p>Heads: FCN, U-Net (encoder-decoder + skips), DeepLab (atrous/dilated conv + ASPP).<\/p>\n<ul><li><strong>Instance<\/strong> — separate each object (Mask R-CNN = detection + per-box mask).<\/li><li><strong>Panoptic<\/strong> — semantic + instance unified (stuff + things).<\/li><\/ul>\n<p><strong>Metric — IoU / mIoU:<\/strong> per-class intersection-over-union of predicted vs true pixel masks, averaged over classes (<strong>mean IoU<\/strong>). For instance/panoptic: mask AP, PQ (panoptic quality).<\/p>\n<p><strong>Deploy gotchas:<\/strong><\/p>\n<ul><li><strong>Upsampling / <code>Resize<\/code><\/strong> in the decoder — mode/align_corners mismatches between framework<\/li><\/ul>\n<p>and NPU cause both fallbacks and subtle accuracy drift. Pin the mode; prefer   transpose-conv or fixed-scale resize the NPU supports.<\/p>\n<ul><li><strong>Full-resolution output<\/strong> — large activation tensors stress DRAM bandwidth (memory-bound<\/li><\/ul>\n<p>— see <a class=\"mdlink\" data-href=\"../01-embedded-accelerators/npu-dsp-cnnip.md\" href=\"#\">roofline<\/a>). Segmentation is often the   bandwidth hog in a multi-task model.<\/p>\n<ul><li><strong>Atrous/dilated conv<\/strong> — check the NPU supports the dilation rates you use.<\/li><\/ul>\n<h2 id=\"classification\">Classification<\/h2>\n<p>The simplest head — global pool + linear + softmax. Rarely the deployment problem, but shows up as the <strong>backbone<\/strong> of everything and as auxiliary heads (traffic-sign type, light state). Metric: top-1 / top-5 accuracy.<\/p>\n<h2 id=\"the-deployment-summary-table\">The deployment summary table<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Component<\/th><th>NPU-friendliness<\/th><th>Watch for<\/th><\/tr><\/thead><tbody><tr><td>CNN backbone<\/td><td>High<\/td><td>Nothing unusual — this is the happy path<\/td><\/tr><tr><td>FPN neck<\/td><td>High<\/td><td>Upsample mode<\/td><\/tr><tr><td>Detection head (dense)<\/td><td>Medium<\/td><td>Decode math<\/td><\/tr><tr><td>NMS / post-processing<\/td><td><strong>Low<\/strong><\/td><td>Keep off NPU, at graph tail<\/td><\/tr><tr><td>Segmentation decoder<\/td><td>Medium<\/td><td><code>Resize<\/code> modes, big activations (bandwidth)<\/td><\/tr><tr><td>Transformer/DETR head<\/td><td><strong>Low<\/strong><\/td><td>Attention, dynamic shapes, LayerNorm precision<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"Backbone-neck-head. The backbone and neck are conv-heavy and map straight onto the NPU; the action is in the head. For detection I keep NMS and decode off the accelerator at the graph tail and pad detections to a static max. For segmentation I watch the <code>Resize<\/code> modes and the full-res activation bandwidth. mAP with IoU thresholds for detection, mIoU for segmentation.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"the-universal-skeleton","text":"The universal skeleton"},{"level":2,"id":"object-detection","text":"Object detection"},{"level":2,"id":"segmentation","text":"Segmentation"},{"level":2,"id":"classification","text":"Classification"},{"level":2,"id":"the-deployment-summary-table","text":"The deployment summary table"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"detection & segmentation for ad 💡 tl;dr perception models share a backbone → neck → head skeleton. detection heads predict boxes + classes; segmentation heads predict per-pixel labels. for deployment, the backbone is npu-friendly (conv-heavy, static) and the head is where the trouble is (nms, dynamic outputs, upsampling). know the metrics (map, iou) and the deploy gotchas. the universal skeleton image(s) backbone features resnet / regnet / vit neck multi-scale fpn / bifpn head boxes / masks / classes backbone — a cnn (resnet, regnet, efficientnet) or a vision transformer; extracts features. conv-heavy, static shapes → maps well to npu/cnnip. neck (fpn) — fuses features across scales so small and large objects both get represented. mostly conv + upsample. head — task-specific prediction. object detection two-stage (faster r-cnn) — propose regions, then classify/refine. accurate, heavier, more control flow → harder to deploy. one-stage (yolo, ssd, retinanet) — predict boxes directly on a grid. faster, the default for automotive edge . anchor-based vs anchor-free — anchors are predefined box priors; anchor-free (fcos, centernet) predicts centers/offsets, fewer hyperparameters. detr-style (transformer, set prediction) — no nms, but attention + bipartite matching; heavier for npus. metric — map (mean average precision): for each class, sweep the confidence threshold, compute precision/recall, take the area under the pr curve (ap), average over classes. map@0.5 uses iou≥0.5 to count a hit; map@[.5:.95] averages over iou thresholds (coco). iou = intersection/union of predicted and ground-truth boxes. deploy gotchas: nms (non-max suppression) — removes duplicate boxes. control-flow + dynamic output count → runs on cpu/dsp at the graph tail , not the npu. keep it out of the npu subgraph. decode — converting raw head outputs to boxes (sigmoid, exp, anchor math) is cheap but fiddly; often folded into post-processing on cpu/dsp. dynamic #detections — pad to a max count so downstream shapes stay static. segmentation semantic — every pixel gets a class (road, car, pedestrian). no instance separation. heads: fcn, u-net (encoder-decoder + skips), deeplab (atrous/dilated conv + aspp). instance — separate each object (mask r-cnn = detection + per-box mask). panoptic — semantic + instance unified (stuff + things). metric — iou / miou: per-class intersection-over-union of predicted vs true pixel masks, averaged over classes ( mean iou ). for instance/panoptic: mask ap, pq (panoptic quality). deploy gotchas: upsampling / resize in the decoder — mode/align_corners mismatches between framework and npu cause both fallbacks and subtle accuracy drift. pin the mode; prefer transpose-conv or fixed-scale resize the npu supports. full-resolution output — large activation tensors stress dram bandwidth (memory-bound — see roofline ). segmentation is often the bandwidth hog in a multi-task model. atrous/dilated conv — check the npu supports the dilation rates you use. classification the simplest head — global pool + linear + softmax. rarely the deployment problem, but shows up as the backbone of everything and as auxiliary heads (traffic-sign type, light state). metric: top-1 / top-5 accuracy. the deployment summary table component npu-friendliness watch for cnn backbone high nothing unusual — this is the happy path fpn neck high upsample mode detection head (dense) medium decode math nms / post-processing low keep off npu, at graph tail segmentation decoder medium resize modes, big activations (bandwidth) transformer/detr head low attention, dynamic shapes, layernorm precision interview soundbite \"backbone-neck-head. the backbone and neck are conv-heavy and map straight onto the npu; the action is in the head. for detection i keep nms and decode off the accelerator at the graph tail and pad detections to a static max. for segmentation i watch the resize modes and the full-res activation bandwidth. map with iou thresholds for detection, miou for segmentation.\"","words":603},{"path":"04-bev-perception/bev-models.md","title":"BEV: LSS, BEVFormer, BEVFusion, Occupancy","section":"4 · BEV & Perception Models","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"bev-lss-bevformer-bevfusion-occupancy\">BEV: LSS, BEVFormer, BEVFusion, Occupancy<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <strong>BEV (bird's-eye-view)<\/strong> perception fuses multiple cameras (and lidar/radar) into one <strong>top-down grid<\/strong> in vehicle coordinates, which is what planning actually wants. The hard, deploy-sensitive part is the <strong>view transform<\/strong> — lifting 2D image features into 3D/BEV space. Three canonical approaches: <strong>LSS<\/strong> (depth-based \"lift-splat\"), <strong>BEVFormer<\/strong> (transformer query-based), and <strong>BEVFusion<\/strong> (camera+lidar in a shared BEV). Occupancy networks extend BEV to a full 3D voxel grid.<\/div><\/div>\n<h2 id=\"why-bev-at-all\">Why BEV at all<\/h2>\n<p>Per-camera 2D detection forces planning to fuse six inconsistent image-space outputs. BEV gives <strong>one coherent, metric, top-down representation<\/strong> where fusion across cameras and time is natural, distances are real, and the output drops straight into planning. It's the dominant automotive perception paradigm.<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">6× cameras<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">backbone<\/span><\/span>\n    <span class=\"node\">per-view features<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">view transform<\/span><\/span>\n    <span class=\"node\">BEV grid<span class=\"nsub\">top-down, ego coords<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">BEV head<\/span><\/span>\n    <span class=\"node out\">3D boxes / map / occupancy<\/span>\n  <\/div>\n  <div class=\"flow-foot\">The <b>view transform<\/b> is the crux — it's what turns N image planes into one shared BEV, and it's the op that fights the NPU.<\/div>\n<\/div>\n<h2 id=\"the-three-approaches\">The three approaches<\/h2>\n<h3 id=\"lss-lift-splat-shoot-depth-based-forward-projection\">LSS: Lift, Splat, Shoot (depth-based, \"forward\" projection)<\/h3>\n<ul><li><strong>Lift:<\/strong> for each pixel, predict a <strong>depth distribution<\/strong>, creating a frustum of 3D points<\/li><\/ul>\n<p>with feature weights.<\/p>\n<ul><li><strong>Splat:<\/strong> scatter those features into BEV grid cells (voxel pooling) using the camera<\/li><\/ul>\n<p>calibration.<\/p>\n<ul><li><strong>Shoot:<\/strong> run a BEV head (detection/segmentation) on the grid.<\/li><li><strong>Deploy view:<\/strong> mostly conv + a <strong>scatter/pool<\/strong> step. The scatter (<code>ScatterND<\/code>-like) and<\/li><\/ul>\n<p>the depth-weighted splat are the NPU-unfriendly parts; the depth net and BEV head are   conv-friendly. Lineage: BEVDet, BEVDepth.<\/p>\n<h3 id=\"bevformer-query-based-transformer-backward-projection\">BEVFormer: query-based (transformer, \"backward\" projection)<\/h3>\n<ul><li>Start with a fixed grid of <strong>BEV queries<\/strong> (one per BEV cell).<\/li><li><strong>Spatial cross-attention:<\/strong> each query attends to the image features at the pixels it<\/li><\/ul>\n<p><strong>projects to<\/strong> across cameras (using calibration to pick sampling points) — a   deformable-attention <code>grid_sample<\/code>.<\/p>\n<ul><li><strong>Temporal self-attention:<\/strong> fuse the previous timestep's BEV to add motion/history.<\/li><li><strong>Deploy view:<\/strong> <strong>transformer-heavy<\/strong> — attention, <code>grid_sample<\/code>/deformable sampling,<\/li><\/ul>\n<p>LayerNorm. These are the classic NPU fallbacks: dynamic-ish sampling, reductions,   precision-sensitive norms. This is where your partitioning and mixed-precision work lands.<\/p>\n<h3 id=\"bevfusion-multi-modal-camera-lidar-in-shared-bev\">BEVFusion: multi-modal (camera + lidar in shared BEV)<\/h3>\n<ul><li>Encode <strong>camera<\/strong> into BEV (LSS-style) <strong>and<\/strong> <strong>lidar<\/strong> into BEV (voxelization +<\/li><\/ul>\n<p>sparse/3D conv), then <strong>fuse in the BEV space<\/strong> before the head.<\/p>\n<ul><li>Robust: keeps working if one modality degrades.<\/li><li><strong>Deploy view:<\/strong> adds <strong>sparse/3D convolution<\/strong> and voxelization on the lidar branch — ops<\/li><\/ul>\n<p>many NPUs don't support, often run on DSP/CPU or a specialized engine. The fusion + head   are BEV-space conv (friendly).<\/p>\n<h3 id=\"occupancy-networks-the-frontier\">Occupancy networks (the frontier)<\/h3>\n<ul><li>Predict a dense <strong>3D voxel occupancy<\/strong> grid (occupied/free/semantic per voxel) instead of<\/li><\/ul>\n<p>just boxes — captures arbitrary shapes and unknown objects.<\/p>\n<ul><li><strong>Deploy view:<\/strong> large 3D output → <strong>memory/bandwidth heavy<\/strong>; 3D convs and big activation<\/li><\/ul>\n<p>tensors. Bandwidth is usually the limiter, not MACs.<\/p>\n<h2 id=\"comparison-for-a-deployment-engineer\">Comparison for a deployment engineer<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Model<\/th><th>View transform<\/th><th>NPU-friendly parts<\/th><th>The hard ops<\/th><th>Sensors<\/th><\/tr><\/thead><tbody><tr><td><strong>LSS / BEVDet<\/strong><\/td><td>Forward depth splat<\/td><td>Depth net, BEV head (conv)<\/td><td>Scatter/voxel-pool<\/td><td>Camera<\/td><\/tr><tr><td><strong>BEVFormer<\/strong><\/td><td>Backward attention<\/td><td>Image backbone<\/td><td>Deformable attention, grid-sample, LayerNorm<\/td><td>Camera(+temporal)<\/td><\/tr><tr><td><strong>BEVFusion<\/strong><\/td><td>LSS + lidar voxels<\/td><td>BEV fusion + head (conv)<\/td><td>Sparse/3D conv, voxelization<\/td><td>Camera+lidar<\/td><\/tr><tr><td><strong>Occupancy<\/strong><\/td><td>Either + 3D decode<\/td><td>Conv stages<\/td><td>3D conv, huge activations (bandwidth)<\/td><td>Camera(+lidar)<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-deployment-story-you-tell\">The deployment story you tell<\/h2>\n<ol><li><strong>Backbone per camera<\/strong> → NPU (happy path, the bulk of the FLOPs).<\/li><li><strong>View transform<\/strong> → the boundary. LSS scatter or BEVFormer sampling often runs on<\/li><\/ol>\n<p><strong>DSP/CPU<\/strong> or needs graph surgery to become NPU-expressible; you <strong>precompute the    sampling geometry<\/strong> (it's fixed by calibration) so it's a static gather.<\/p>\n<ol><li><strong>BEV head<\/strong> → back on the NPU (conv again).<\/li><li><strong>Post-processing<\/strong> (3D NMS, decode) → CPU/DSP at the tail.<\/li><\/ol>\n<p>The recurring theme: <strong>push the fixed geometric parts to precomputed static tensors<\/strong> so the runtime does a cheap gather, and keep the dynamic/attention parts small and in the right precision.<\/p>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"BEV turns N cameras into one top-down grid planning can use. The deploy crux is the view transform: LSS does a forward depth-splat (a scatter that's NPU-unfriendly), BEVFormer does backward deformable attention (grid-sample + LayerNorm — classic fallbacks), and BEVFusion adds lidar sparse-conv. The trick is that the projection geometry is fixed by calibration, so I precompute the sampling as static tensors and keep the backbone and BEV head on the NPU, isolating the attention/scatter to the DSP in higher precision.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"why-bev-at-all","text":"Why BEV at all"},{"level":2,"id":"the-three-approaches","text":"The three approaches"},{"level":3,"id":"lss-lift-splat-shoot-depth-based-forward-projection","text":"LSS: Lift, Splat, Shoot (depth-based, \"forward\" projection)"},{"level":3,"id":"bevformer-query-based-transformer-backward-projection","text":"BEVFormer: query-based (transformer, \"backward\" projection)"},{"level":3,"id":"bevfusion-multi-modal-camera-lidar-in-shared-bev","text":"BEVFusion: multi-modal (camera + lidar in shared BEV)"},{"level":3,"id":"occupancy-networks-the-frontier","text":"Occupancy networks (the frontier)"},{"level":2,"id":"comparison-for-a-deployment-engineer","text":"Comparison for a deployment engineer"},{"level":2,"id":"the-deployment-story-you-tell","text":"The deployment story you tell"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"bev: lss, bevformer, bevfusion, occupancy 💡 tl;dr bev (bird's-eye-view) perception fuses multiple cameras (and lidar/radar) into one top-down grid in vehicle coordinates, which is what planning actually wants. the hard, deploy-sensitive part is the view transform — lifting 2d image features into 3d/bev space. three canonical approaches: lss (depth-based \"lift-splat\"), bevformer (transformer query-based), and bevfusion (camera+lidar in a shared bev). occupancy networks extend bev to a full 3d voxel grid. why bev at all per-camera 2d detection forces planning to fuse six inconsistent image-space outputs. bev gives one coherent, metric, top-down representation where fusion across cameras and time is natural, distances are real, and the output drops straight into planning. it's the dominant automotive perception paradigm. 6× cameras backbone per-view features view transform bev grid top-down, ego coords bev head 3d boxes / map / occupancy the view transform is the crux — it's what turns n image planes into one shared bev, and it's the op that fights the npu. the three approaches lss: lift, splat, shoot (depth-based, \"forward\" projection) lift: for each pixel, predict a depth distribution , creating a frustum of 3d points with feature weights. splat: scatter those features into bev grid cells (voxel pooling) using the camera calibration. shoot: run a bev head (detection/segmentation) on the grid. deploy view: mostly conv + a scatter/pool step. the scatter ( scatternd -like) and the depth-weighted splat are the npu-unfriendly parts; the depth net and bev head are conv-friendly. lineage: bevdet, bevdepth. bevformer: query-based (transformer, \"backward\" projection) start with a fixed grid of bev queries (one per bev cell). spatial cross-attention: each query attends to the image features at the pixels it projects to across cameras (using calibration to pick sampling points) — a deformable-attention grid_sample . temporal self-attention: fuse the previous timestep's bev to add motion/history. deploy view: transformer-heavy — attention, grid_sample /deformable sampling, layernorm. these are the classic npu fallbacks: dynamic-ish sampling, reductions, precision-sensitive norms. this is where your partitioning and mixed-precision work lands. bevfusion: multi-modal (camera + lidar in shared bev) encode camera into bev (lss-style) and lidar into bev (voxelization + sparse/3d conv), then fuse in the bev space before the head. robust: keeps working if one modality degrades. deploy view: adds sparse/3d convolution and voxelization on the lidar branch — ops many npus don't support, often run on dsp/cpu or a specialized engine. the fusion + head are bev-space conv (friendly). occupancy networks (the frontier) predict a dense 3d voxel occupancy grid (occupied/free/semantic per voxel) instead of just boxes — captures arbitrary shapes and unknown objects. deploy view: large 3d output → memory/bandwidth heavy ; 3d convs and big activation tensors. bandwidth is usually the limiter, not macs. comparison for a deployment engineer model view transform npu-friendly parts the hard ops sensors lss / bevdet forward depth splat depth net, bev head (conv) scatter/voxel-pool camera bevformer backward attention image backbone deformable attention, grid-sample, layernorm camera(+temporal) bevfusion lss + lidar voxels bev fusion + head (conv) sparse/3d conv, voxelization camera+lidar occupancy either + 3d decode conv stages 3d conv, huge activations (bandwidth) camera(+lidar) the deployment story you tell backbone per camera → npu (happy path, the bulk of the flops). view transform → the boundary. lss scatter or bevformer sampling often runs on dsp/cpu or needs graph surgery to become npu-expressible; you precompute the sampling geometry (it's fixed by calibration) so it's a static gather. bev head → back on the npu (conv again). post-processing (3d nms, decode) → cpu/dsp at the tail. the recurring theme: push the fixed geometric parts to precomputed static tensors so the runtime does a cheap gather, and keep the dynamic/attention parts small and in the right precision. interview soundbite \"bev turns n cameras into one top-down grid planning can use. the deploy crux is the view transform: lss does a forward depth-splat (a scatter that's npu-unfriendly), bevformer does backward deformable attention (grid-sample + layernorm — classic fallbacks), and bevfusion adds lidar sparse-conv. the trick is that the projection geometry is fixed by calibration, so i precompute the sampling as static tensors and keep the backbone and bev head on the npu, isolating the attention/scatter to the dsp in higher precision.\"","words":692},{"path":"05-soc-architecture/README.md","title":"Overview","section":"5 · SoC Architecture","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"5-soc-architecture\">5 · SoC Architecture<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> On an automotive SoC, <strong>data movement and scheduling dominate performance<\/strong>, not raw compute. This section is the hardware substrate: the <strong>memory hierarchy<\/strong> (registers → SRAM → DRAM), <strong>DMA<\/strong> (how tensors move without burning CPU), the <strong>IPMMU<\/strong> (how accelerators see memory safely), and <strong>multi-core scheduling<\/strong> (how the blocks run in parallel). It closes with the <strong>performance-analysis<\/strong> framing the JD asks for: latency, throughput, multi-core scaling, and finding the bottleneck.<\/div><\/div>\n<h2 id=\"why-the-hardware-substrate-matters-to-you\">Why the hardware substrate matters to you<\/h2>\n<p>You can have a perfectly quantized, fully-NPU-mapped model that's still slow — because it's <strong>memory-bound<\/strong>, stalling on DRAM, or serialized behind a DMA copy, or not overlapping the camera→NPU→post stages. Diagnosing that needs this vocabulary.<\/p>\n<h2 id=\"pages\">Pages<\/h2>\n<ul><li><strong><a class=\"mdlink\" data-href=\"memory-dma-ipmmu.md\" href=\"#\">Memory Hierarchy, DMA &amp; IPMMU<\/a><\/strong> — where tensors live, why<\/li><\/ul>\n<p>bandwidth is the usual limiter, how DMA moves data, and what the IPMMU does.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"multicore-scheduling.md\" href=\"#\">Multi-Core Scheduling &amp; Perf Analysis<\/a><\/strong> — how blocks run<\/li><\/ul>\n<p>concurrently, synchronization costs, pipelining, and the latency/throughput/scaling   analysis loop.<\/p>\n<h2 id=\"relationship-to-your-other-prep\">Relationship to your other prep<\/h2>\n<p>The GPU version of some of this (memory coalescing, occupancy, profiling) is in <strong>ml-engineer-prep §12<\/strong> (<a class=\"mdlink\" data-href=\"../../ml-engineer-prep/12-nvidia-model-optimization/gpu-performance.md\" href=\"#\">gpu-performance<\/a>) and the latency-budget framing is in <strong>computer-vision-prep §03<\/strong> (<a class=\"mdlink\" data-href=\"../../computer-vision-prep/03-low-latency-inference/latency-budget.md\" href=\"#\">latency-budget<\/a>). This section is the embedded-SoC re-frame: fixed hardware, explicit memory, hard real-time.<\/p>\n<h2 id=\"the-one-liner-to-have-ready\">The one-liner to have ready<\/h2>\n<blockquote><p>\"On these SoCs I assume <strong>memory bandwidth and scheduling are the bottleneck until proven otherwise<\/strong>. I profile per-block utilization and DMA traffic before I touch the model — a layer that's memory-bound doesn't get faster from a better kernel, it gets faster from less data movement: quantization, fusion, tiling to SRAM, and overlapping DMA with compute.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"why-the-hardware-substrate-matters-to-you","text":"Why the hardware substrate matters to you"},{"level":2,"id":"pages","text":"Pages"},{"level":2,"id":"relationship-to-your-other-prep","text":"Relationship to your other prep"},{"level":2,"id":"the-one-liner-to-have-ready","text":"The one-liner to have ready"}],"text":"5 · soc architecture 💡 tl;dr on an automotive soc, data movement and scheduling dominate performance , not raw compute. this section is the hardware substrate: the memory hierarchy (registers → sram → dram), dma (how tensors move without burning cpu), the ipmmu (how accelerators see memory safely), and multi-core scheduling (how the blocks run in parallel). it closes with the performance-analysis framing the jd asks for: latency, throughput, multi-core scaling, and finding the bottleneck. why the hardware substrate matters to you you can have a perfectly quantized, fully-npu-mapped model that's still slow — because it's memory-bound , stalling on dram, or serialized behind a dma copy, or not overlapping the camera→npu→post stages. diagnosing that needs this vocabulary. pages memory hierarchy, dma & ipmmu — where tensors live, why bandwidth is the usual limiter, how dma moves data, and what the ipmmu does. multi-core scheduling & perf analysis — how blocks run concurrently, synchronization costs, pipelining, and the latency/throughput/scaling analysis loop. relationship to your other prep the gpu version of some of this (memory coalescing, occupancy, profiling) is in ml-engineer-prep §12 ( gpu-performance ) and the latency-budget framing is in computer-vision-prep §03 ( latency-budget ). this section is the embedded-soc re-frame: fixed hardware, explicit memory, hard real-time. the one-liner to have ready \"on these socs i assume memory bandwidth and scheduling are the bottleneck until proven otherwise . i profile per-block utilization and dma traffic before i touch the model — a layer that's memory-bound doesn't get faster from a better kernel, it gets faster from less data movement: quantization, fusion, tiling to sram, and overlapping dma with compute.\"","words":269},{"path":"05-soc-architecture/memory-dma-ipmmu.md","title":"Memory Hierarchy, DMA & IPMMU","section":"5 · SoC Architecture","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"memory-hierarchy-dma-ipmmu\">Memory Hierarchy, DMA &amp; IPMMU<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The SoC memory hierarchy goes <strong>fast-and-tiny → slow-and-big<\/strong>: registers, on-chip SRAM/scratchpad, then shared <strong>DRAM<\/strong>. DRAM bandwidth is shared across every block and is the usual bottleneck. <strong>DMA<\/strong> engines move tensors between these without stealing CPU cycles, and can <strong>overlap<\/strong> transfer with compute. The <strong>IPMMU<\/strong> is the accelerators' MMU — it translates the addresses an NPU/DSP uses, isolating them and letting them work in virtual memory. Master these three and most \"why is it slow / why did it crash\" questions fall out.<\/div><\/div>\n<h2 id=\"the-memory-hierarchy\">The memory hierarchy<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Level<\/th><th>Size<\/th><th>Speed<\/th><th>Who uses it<\/th><\/tr><\/thead><tbody><tr><td>Registers / MAC array operands<\/td><td>bytes<\/td><td>fastest<\/td><td>inside the NPU/DSP<\/td><\/tr><tr><td><strong>On-chip SRAM / scratchpad<\/strong><\/td><td>KB–MB<\/td><td>very fast, no contention<\/td><td>tiled activations/weights during a layer<\/td><\/tr><tr><td><strong>Shared DRAM (LPDDR)<\/strong><\/td><td>GB<\/td><td>slow, <strong>shared + contended<\/strong><\/td><td>full model weights, camera frames, big activations<\/td><\/tr><tr><td>Flash/storage<\/td><td>GB+<\/td><td>slowest<\/td><td>model + OS at rest<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>The core tension:<\/strong> the NPU is fast enough to drain any realistic DRAM bandwidth, so if a layer's working set doesn't fit in SRAM, the NPU <strong>stalls waiting on DRAM<\/strong>. This is why <strong>tiling<\/strong> (breaking a layer into SRAM-sized chunks) and <strong>fusion<\/strong> (keep intermediates in SRAM instead of writing to DRAM and reading back) are the biggest levers. It's also why INT8 (4× less data than FP32) helps so much — see the <a class=\"mdlink\" data-href=\"../01-embedded-accelerators/npu-dsp-cnnip.md\" href=\"#\">roofline<\/a>.<\/p>\n<h2 id=\"bandwidth-is-the-shared-resource\">Bandwidth is the shared resource<\/h2>\n<p>Every block — CPU, NPU, DSP, ISP, video decoder — pulls from the <strong>same DRAM<\/strong>. Two consequences:<\/p>\n<ul><li><strong>Contention:<\/strong> the camera ISP writing frames and the NPU reading activations compete for<\/li><\/ul>\n<p>the same bus. Peak NPU throughput on a bench ≠ throughput in the live system.<\/p>\n<ul><li><strong>Bandwidth budgeting:<\/strong> you estimate <code>bytes-per-frame × fps<\/code> per block and check it<\/li><\/ul>\n<p>against total DRAM bandwidth. A model can be \"compute-cheap\" and still not fit the   bandwidth budget.<\/p>\n<h2 id=\"dma-moving-data-without-the-cpu\">DMA: moving data without the CPU<\/h2>\n<p>A <strong>DMA (Direct Memory Access)<\/strong> engine copies memory block-to-block (DRAM↔SRAM, block↔block) <strong>without the CPU doing the copy<\/strong>. Two things to know:<\/p>\n<ol><li><strong>It offloads the copy<\/strong> — the CPU issues a descriptor and moves on; an interrupt/flag<\/li><\/ol>\n<p>signals completion.<\/p>\n<ol><li><strong>It enables overlap (double-buffering)<\/strong> — while the NPU computes tile <em>N<\/em>, DMA prefetches<\/li><\/ol>\n<p>tile <em>N+1<\/em> into the <em>other<\/em> SRAM buffer. Done right, transfer time hides behind compute    and the NPU never stalls. Done wrong (single buffer, synchronous copies), every tile pays    the full DMA latency serially — a classic bottleneck.<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">DMA prefetch tile N+1<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">overlaps<\/span><\/span>\n    <span class=\"node\">NPU compute tile N<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">ping-pong SRAM<\/span><\/span>\n    <span class=\"node out\">no stall<\/span>\n  <\/div>\n  <div class=\"flow-foot\">Double-buffering: two SRAM buffers, DMA fills one while the NPU drains the other. This is how you turn a memory-bound layer into a compute-bound one.<\/div>\n<\/div>\n<p><strong>Data-transfer overhead<\/strong> (a JD debug target) is usually one of: unnecessary DRAM round-trips at partition boundaries (see <a class=\"mdlink\" data-href=\"../01-embedded-accelerators/operator-mapping-offload.md\" href=\"#\">operator mapping<\/a>), synchronous (non-overlapped) DMA, or <strong>layout conversions<\/strong> copying data just to reshape it.<\/p>\n<h2 id=\"ipmmu-the-accelerators-mmu\">IPMMU: the accelerator's MMU<\/h2>\n<p>The <strong>IPMMU (IP Memory Management Unit)<\/strong>, a.k.a. <strong>SMMU/System MMU<\/strong>, is an MMU <strong>for the non-CPU masters<\/strong> (NPU, DSP, DMA engines). It:<\/p>\n<ul><li><strong>Translates<\/strong> the virtual addresses those blocks issue into physical DRAM addresses — so<\/li><\/ul>\n<p>an accelerator can be handed a virtual buffer just like software, and buffers needn't be   physically contiguous.<\/p>\n<ul><li><strong>Isolates / protects<\/strong> — a block can only touch memory the IPMMU has mapped for it. In a<\/li><\/ul>\n<p>safety context this is essential: a faulty NPU job can't corrupt another partition's   memory. (Ties into <a class=\"mdlink\" data-href=\"../06-runtime-safety-validation/functional-safety.md\" href=\"#\">functional safety<\/a>.)<\/p>\n<ul><li><strong>Enables scatter-gather DMA<\/strong> — the DMA can walk page tables via the IPMMU instead of<\/li><\/ul>\n<p>needing one big contiguous physical block.<\/p>\n<p><strong>Why you'll meet it in debugging:<\/strong> if a buffer isn't <strong>mapped<\/strong> into the IPMMU for the NPU, the offload <strong>faults<\/strong> (translation fault) — the model \"won't run on the accelerator\" for a reason that's nothing to do with the model. Cache coherence is the sibling gotcha: if CPU and NPU share a buffer and caches aren't flushed/invalidated, one reads stale data → wrong results with no crash. \"Mapped into the IPMMU + cache-coherent\" is the checklist for any shared buffer.<\/p>\n<h2 id=\"the-debug-checklist-for-a-shared-tensor\">The debug checklist for a shared tensor<\/h2>\n<ol><li><strong>Is the buffer mapped<\/strong> into the IPMMU for the consuming block? (else translation fault)<\/li><li><strong>Is it cache-coherent<\/strong> — flushed by the producer, invalidated by the consumer? (else<\/li><\/ol>\n<p>stale-data wrong results)<\/p>\n<ol><li><strong>Is the DMA overlapped<\/strong> with compute (double-buffered), or serializing?<\/li><li><strong>Does the working set fit SRAM<\/strong>, or is it thrashing DRAM?<\/li><li><strong>Are there needless layout conversions<\/strong> copying data to reshape?<\/li><\/ol>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"The hierarchy is registers → SRAM → shared DRAM, and DRAM bandwidth — shared across every block — is the usual limiter. DMA moves tensors without the CPU and, double-buffered, hides transfer behind compute. The IPMMU is the MMU for the accelerators: it translates and isolates their memory accesses, so a buffer that isn't mapped faults, and one that isn't cache-coherent silently returns stale data. When something's slow I check bandwidth and DMA overlap before I blame the kernel.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"the-memory-hierarchy","text":"The memory hierarchy"},{"level":2,"id":"bandwidth-is-the-shared-resource","text":"Bandwidth is the shared resource"},{"level":2,"id":"dma-moving-data-without-the-cpu","text":"DMA: moving data without the CPU"},{"level":2,"id":"ipmmu-the-accelerators-mmu","text":"IPMMU: the accelerator's MMU"},{"level":2,"id":"the-debug-checklist-for-a-shared-tensor","text":"The debug checklist for a shared tensor"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"memory hierarchy, dma & ipmmu 💡 tl;dr the soc memory hierarchy goes fast-and-tiny → slow-and-big : registers, on-chip sram/scratchpad, then shared dram . dram bandwidth is shared across every block and is the usual bottleneck. dma engines move tensors between these without stealing cpu cycles, and can overlap transfer with compute. the ipmmu is the accelerators' mmu — it translates the addresses an npu/dsp uses, isolating them and letting them work in virtual memory. master these three and most \"why is it slow / why did it crash\" questions fall out. the memory hierarchy level size speed who uses it registers / mac array operands bytes fastest inside the npu/dsp on-chip sram / scratchpad kb–mb very fast, no contention tiled activations/weights during a layer shared dram (lpddr) gb slow, shared + contended full model weights, camera frames, big activations flash/storage gb+ slowest model + os at rest the core tension: the npu is fast enough to drain any realistic dram bandwidth, so if a layer's working set doesn't fit in sram, the npu stalls waiting on dram . this is why tiling (breaking a layer into sram-sized chunks) and fusion (keep intermediates in sram instead of writing to dram and reading back) are the biggest levers. it's also why int8 (4× less data than fp32) helps so much — see the roofline . bandwidth is the shared resource every block — cpu, npu, dsp, isp, video decoder — pulls from the same dram . two consequences: contention: the camera isp writing frames and the npu reading activations compete for the same bus. peak npu throughput on a bench ≠ throughput in the live system. bandwidth budgeting: you estimate bytes-per-frame × fps per block and check it against total dram bandwidth. a model can be \"compute-cheap\" and still not fit the bandwidth budget. dma: moving data without the cpu a dma (direct memory access) engine copies memory block-to-block (dram↔sram, block↔block) without the cpu doing the copy . two things to know: it offloads the copy — the cpu issues a descriptor and moves on; an interrupt/flag signals completion. it enables overlap (double-buffering) — while the npu computes tile n , dma prefetches tile n+1 into the other sram buffer. done right, transfer time hides behind compute and the npu never stalls. done wrong (single buffer, synchronous copies), every tile pays the full dma latency serially — a classic bottleneck. dma prefetch tile n+1 overlaps npu compute tile n ping-pong sram no stall double-buffering: two sram buffers, dma fills one while the npu drains the other. this is how you turn a memory-bound layer into a compute-bound one. data-transfer overhead (a jd debug target) is usually one of: unnecessary dram round-trips at partition boundaries (see operator mapping ), synchronous (non-overlapped) dma, or layout conversions copying data just to reshape it. ipmmu: the accelerator's mmu the ipmmu (ip memory management unit) , a.k.a. smmu/system mmu , is an mmu for the non-cpu masters (npu, dsp, dma engines). it: translates the virtual addresses those blocks issue into physical dram addresses — so an accelerator can be handed a virtual buffer just like software, and buffers needn't be physically contiguous. isolates / protects — a block can only touch memory the ipmmu has mapped for it. in a safety context this is essential: a faulty npu job can't corrupt another partition's memory. (ties into functional safety .) enables scatter-gather dma — the dma can walk page tables via the ipmmu instead of needing one big contiguous physical block. why you'll meet it in debugging: if a buffer isn't mapped into the ipmmu for the npu, the offload faults (translation fault) — the model \"won't run on the accelerator\" for a reason that's nothing to do with the model. cache coherence is the sibling gotcha: if cpu and npu share a buffer and caches aren't flushed/invalidated, one reads stale data → wrong results with no crash. \"mapped into the ipmmu + cache-coherent\" is the checklist for any shared buffer. the debug checklist for a shared tensor is the buffer mapped into the ipmmu for the consuming block? (else translation fault) is it cache-coherent — flushed by the producer, invalidated by the consumer? (else stale-data wrong results) is the dma overlapped with compute (double-buffered), or serializing? does the working set fit sram , or is it thrashing dram? are there needless layout conversions copying data to reshape? interview soundbite \"the hierarchy is registers → sram → shared dram, and dram bandwidth — shared across every block — is the usual limiter. dma moves tensors without the cpu and, double-buffered, hides transfer behind compute. the ipmmu is the mmu for the accelerators: it translates and isolates their memory accesses, so a buffer that isn't mapped faults, and one that isn't cache-coherent silently returns stale data. when something's slow i check bandwidth and dma overlap before i blame the kernel.\"","words":811},{"path":"05-soc-architecture/multicore-scheduling.md","title":"Multi-Core Scheduling & Perf Analysis","section":"5 · SoC Architecture","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"multi-core-scheduling-perf-analysis\">Multi-Core Scheduling &amp; Perf Analysis<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> An SoC runs blocks <strong>in parallel<\/strong>, so throughput comes from <strong>pipelining<\/strong> the stages (camera → pre → NPU → post) across cores/accelerators and <strong>overlapping<\/strong> them — while latency is set by the <strong>critical path<\/strong> through them. This page is the JD's \"performance analysis (latency, throughput, multi-core scaling) and identify bottlenecks\" task: the metrics, the scaling laws, and the diagnosis loop.<\/div><\/div>\n<h2 id=\"latency-vs-throughput-dont-conflate-them\">Latency vs throughput (don't conflate them)<\/h2>\n<ul><li><strong>Latency<\/strong> — time for <strong>one<\/strong> frame end-to-end (sensor to result). Bounded by the<\/li><\/ul>\n<p><strong>critical path<\/strong>. This is the safety-relevant number (how stale is the perception when   the planner uses it).<\/p>\n<ul><li><strong>Throughput<\/strong> — frames <strong>per second<\/strong> the system sustains. Set by the <strong>slowest stage<\/strong><\/li><\/ul>\n<p>once the pipeline is full.<\/p>\n<p>Pipelining trades them: you can raise throughput to <code>1 / max(stage_time)<\/code> <strong>without<\/strong> lowering per-frame latency (it may even rise slightly from buffering).<\/p>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node data\">capture<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">ISP / preproc<span class=\"nsub\">DSP<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">inference<span class=\"nsub\">NPU<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">post / NMS<span class=\"nsub\">CPU/DSP<\/span><\/span>\n  <\/div>\n  <div class=\"flow-foot\">Run as a <b>pipeline<\/b>: while the NPU processes frame N, the ISP captures frame N+1 and the CPU post-processes frame N−1. Throughput = 1 / slowest stage; latency = sum of the critical path.<\/div>\n<\/div>\n<h2 id=\"multi-core-scaling-why-its-sublinear\">Multi-core scaling: why it's sublinear<\/h2>\n<p>Adding cores/blocks rarely gives linear speedup:<\/p>\n<ul><li><strong>Amdahl's law<\/strong> — the serial fraction caps you. If 20% of the pipeline is serial (a CPU<\/li><\/ul>\n<p>post-process that can't parallelize), max speedup is 5× no matter how many NPU cores.<\/p>\n<ul><li><strong>Synchronization cost<\/strong> — every cross-block handoff needs a signal/wait; more blocks =<\/li><\/ul>\n<p>more sync overhead and more chances to stall.<\/p>\n<ul><li><strong>Shared-resource contention<\/strong> — more blocks pulling on the <strong>same DRAM bandwidth<\/strong> (see<\/li><\/ul>\n<p><a class=\"mdlink\" data-href=\"memory-dma-ipmmu.md\" href=\"#\">memory-dma-ipmmu<\/a>) means per-block effective bandwidth drops. This   is why \"2 NPU cores\" often gives ~1.6×, not 2×.<\/p>\n<ul><li><strong>Load imbalance<\/strong> — if the graph splits unevenly across cores, the busiest core sets the<\/li><\/ul>\n<p>time and the others idle.<\/p>\n<p><strong>Multi-core scaling analysis<\/strong> = measure speedup vs #cores, and attribute the gap to serial fraction, sync, contention, or imbalance.<\/p>\n<h2 id=\"synchronization-primitives\">Synchronization primitives<\/h2>\n<ul><li><strong>Semaphores / fences / doorbells<\/strong> — block signals \"done,\" consumer waits. Cheap but each<\/li><\/ul>\n<p>wait is a potential stall.<\/p>\n<ul><li><strong>Double-buffering<\/strong> — decouple producer/consumer so neither waits (the DMA trick from the<\/li><\/ul>\n<p>memory page applies to whole stages too).<\/p>\n<ul><li><strong>Work queues<\/strong> — a block pulls the next job when free, smoothing imbalance.<\/li><li><strong>Cache coherence / barriers<\/strong> — shared buffers must be coherent at the handoff or you get<\/li><\/ul>\n<p>stale data (silent wrong results).<\/p>\n<h2 id=\"the-performance-analysis-loop-the-day-job\">The performance-analysis loop (the day-job)<\/h2>\n<ol><li><strong>Measure end-to-end<\/strong> — latency (p50/p99) and sustained throughput on the target, on<\/li><\/ol>\n<p><strong>real<\/strong> input, not a microbenchmark.<\/p>\n<ol><li><strong>Break down by stage/block<\/strong> — per-block busy time and utilization. Find the **slowest<\/li><\/ol>\n<p>stage<strong> (throughput limiter) and the <\/strong>critical path** (latency limiter) — they can differ.<\/p>\n<ol><li><strong>Classify the bottleneck<\/strong> for the hot stage:<ul><li><strong>Compute-bound<\/strong> (NPU MAC utilization high) → smaller/faster model, better fusion,<\/li><\/ul><\/li><\/ol>\n<p>structured sparsity.<\/p>\n<ul><li><strong>Memory-bound<\/strong> (low MAC util, high DRAM traffic) → quantize, fuse to avoid round-trips,<\/li><\/ul>\n<p>tile to SRAM, double-buffer DMA. (Roofline test — see      <a class=\"mdlink\" data-href=\"../01-embedded-accelerators/npu-dsp-cnnip.md\" href=\"#\">npu-dsp-cnnip<\/a>.)<\/p>\n<ul><li><strong>Scheduling-bound<\/strong> (blocks idle waiting on each other) → pipeline/overlap stages,<\/li><\/ul>\n<p>fix load imbalance, cut sync points.<\/p>\n<ul><li><strong>Fallback-bound<\/strong> (too much on CPU/DSP) → fix the partition (static shapes, complete<\/li><\/ul>\n<p>QDQ, graph surgery — see <a class=\"mdlink\" data-href=\"../01-embedded-accelerators/operator-mapping-offload.md\" href=\"#\">operator mapping<\/a>).<\/p>\n<ol><li><strong>Fix the top item, re-measure.<\/strong> One bottleneck at a time — fixing #2 while #1 dominates<\/li><\/ol>\n<p>shows no movement and misleads you.<\/p>\n<h2 id=\"bottleneck-symptom-cause-cheat-table\">Bottleneck symptom → cause cheat table<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Symptom<\/th><th>Likely bottleneck<\/th><\/tr><\/thead><tbody><tr><td>NPU utilization high, latency high<\/td><td>Compute-bound — shrink/speed the model<\/td><\/tr><tr><td>NPU utilization <strong>low<\/strong>, DRAM traffic high<\/td><td>Memory-bound — cut data movement<\/td><\/tr><tr><td>Blocks idle in the timeline, gaps between stages<\/td><td>Scheduling — pipeline / overlap<\/td><\/tr><tr><td>Big chunk of time on CPU in the profile<\/td><td>Fallback-bound — fix partitioning<\/td><\/tr><tr><td>Throughput scales &lt;linearly with cores<\/td><td>Serial fraction / contention / imbalance<\/td><\/tr><tr><td>p99 ≫ p50<\/td><td>Jitter — sync stalls, contention spikes, thermal<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"I separate latency (critical path, the safety number) from throughput (slowest stage once pipelined). I profile per-block, find the hot stage, and classify it — compute-bound, memory-bound, scheduling-bound, or fallback-bound — because each has a different fix. Then I fix one thing and re-measure. Multi-core scaling is sublinear from serial fraction, sync cost, and shared DRAM contention, so I attribute the gap rather than assume 2 cores = 2×.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"latency-vs-throughput-dont-conflate-them","text":"Latency vs throughput (don't conflate them)"},{"level":2,"id":"multi-core-scaling-why-its-sublinear","text":"Multi-core scaling: why it's sublinear"},{"level":2,"id":"synchronization-primitives","text":"Synchronization primitives"},{"level":2,"id":"the-performance-analysis-loop-the-day-job","text":"The performance-analysis loop (the day-job)"},{"level":2,"id":"bottleneck-symptom-cause-cheat-table","text":"Bottleneck symptom → cause cheat table"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"multi-core scheduling & perf analysis 💡 tl;dr an soc runs blocks in parallel , so throughput comes from pipelining the stages (camera → pre → npu → post) across cores/accelerators and overlapping them — while latency is set by the critical path through them. this page is the jd's \"performance analysis (latency, throughput, multi-core scaling) and identify bottlenecks\" task: the metrics, the scaling laws, and the diagnosis loop. latency vs throughput (don't conflate them) latency — time for one frame end-to-end (sensor to result). bounded by the critical path . this is the safety-relevant number (how stale is the perception when the planner uses it). throughput — frames per second the system sustains. set by the slowest stage once the pipeline is full. pipelining trades them: you can raise throughput to 1 / max(stage_time) without lowering per-frame latency (it may even rise slightly from buffering). capture isp / preproc dsp inference npu post / nms cpu/dsp run as a pipeline : while the npu processes frame n, the isp captures frame n+1 and the cpu post-processes frame n−1. throughput = 1 / slowest stage; latency = sum of the critical path. multi-core scaling: why it's sublinear adding cores/blocks rarely gives linear speedup: amdahl's law — the serial fraction caps you. if 20% of the pipeline is serial (a cpu post-process that can't parallelize), max speedup is 5× no matter how many npu cores. synchronization cost — every cross-block handoff needs a signal/wait; more blocks = more sync overhead and more chances to stall. shared-resource contention — more blocks pulling on the same dram bandwidth (see memory-dma-ipmmu ) means per-block effective bandwidth drops. this is why \"2 npu cores\" often gives ~1.6×, not 2×. load imbalance — if the graph splits unevenly across cores, the busiest core sets the time and the others idle. multi-core scaling analysis = measure speedup vs #cores, and attribute the gap to serial fraction, sync, contention, or imbalance. synchronization primitives semaphores / fences / doorbells — block signals \"done,\" consumer waits. cheap but each wait is a potential stall. double-buffering — decouple producer/consumer so neither waits (the dma trick from the memory page applies to whole stages too). work queues — a block pulls the next job when free, smoothing imbalance. cache coherence / barriers — shared buffers must be coherent at the handoff or you get stale data (silent wrong results). the performance-analysis loop (the day-job) measure end-to-end — latency (p50/p99) and sustained throughput on the target, on real input, not a microbenchmark. break down by stage/block — per-block busy time and utilization. find the **slowest stage (throughput limiter) and the critical path** (latency limiter) — they can differ. classify the bottleneck for the hot stage: compute-bound (npu mac utilization high) → smaller/faster model, better fusion, structured sparsity. memory-bound (low mac util, high dram traffic) → quantize, fuse to avoid round-trips, tile to sram, double-buffer dma. (roofline test — see npu-dsp-cnnip .) scheduling-bound (blocks idle waiting on each other) → pipeline/overlap stages, fix load imbalance, cut sync points. fallback-bound (too much on cpu/dsp) → fix the partition (static shapes, complete qdq, graph surgery — see operator mapping ). fix the top item, re-measure. one bottleneck at a time — fixing #2 while #1 dominates shows no movement and misleads you. bottleneck symptom → cause cheat table symptom likely bottleneck npu utilization high, latency high compute-bound — shrink/speed the model npu utilization low , dram traffic high memory-bound — cut data movement blocks idle in the timeline, gaps between stages scheduling — pipeline / overlap big chunk of time on cpu in the profile fallback-bound — fix partitioning throughput scales <linearly with cores serial fraction / contention / imbalance p99 ≫ p50 jitter — sync stalls, contention spikes, thermal interview soundbite \"i separate latency (critical path, the safety number) from throughput (slowest stage once pipelined). i profile per-block, find the hot stage, and classify it — compute-bound, memory-bound, scheduling-bound, or fallback-bound — because each has a different fix. then i fix one thing and re-measure. multi-core scaling is sublinear from serial fraction, sync cost, and shared dram contention, so i attribute the gap rather than assume 2 cores = 2×.\"","words":694},{"path":"06-runtime-safety-validation/README.md","title":"Overview","section":"6 · Runtime, Safety & Validation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"6-runtime-safety-validation\">6 · Runtime, Safety &amp; Validation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The model runs inside an <strong>embedded OS<\/strong> (Linux or <strong>QNX<\/strong>), gets validated on <strong>simulators and target boards<\/strong> (SIL / HIL), and lives under <strong>automotive functional safety<\/strong> (ISO 26262 / ASIL). You won't be the safety engineer, but you must speak this language — it frames every deployment decision, from \"why QNX\" to \"why we can't just ship the fastest model.\"<\/div><\/div>\n<h2 id=\"why-an-application-engineer-needs-this\">Why an application engineer needs this<\/h2>\n<ul><li><strong>Runtime<\/strong> decides how deterministic your inference is — a soft-real-time Linux path vs a<\/li><\/ul>\n<p>hard-real-time QNX path changes how you think about latency guarantees.<\/p>\n<ul><li><strong>Validation<\/strong> is how your work gets signed off — you'll produce results on SIL and HIL and<\/li><\/ul>\n<p>contribute to release validation (a JD responsibility).<\/p>\n<ul><li><strong>Safety<\/strong> is the backdrop the whole product lives in — it explains determinism<\/li><\/ul>\n<p>requirements, redundancy, and why accuracy targets are hard limits, not nice-to-haves.<\/p>\n<h2 id=\"pages\">Pages<\/h2>\n<ul><li><strong><a class=\"mdlink\" data-href=\"linux-qnx-runtime.md\" href=\"#\">Embedded Runtime: Linux &amp; QNX<\/a><\/strong> — the two OS worlds, real-time<\/li><\/ul>\n<p>scheduling, and where your inference process sits.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"sil-hil-validation.md\" href=\"#\">SIL / HIL Validation<\/a><\/strong> — the X-in-the-loop ladder: what SIL,<\/li><\/ul>\n<p>HIL (and MIL/PIL) each validate and where you plug in.<\/p>\n<ul><li><strong><a class=\"mdlink\" data-href=\"functional-safety.md\" href=\"#\">ISO 26262 / ASIL Functional Safety<\/a><\/strong> — the standard, ASIL levels,<\/li><\/ul>\n<p>and how AI/perception fits (SOTIF, redundancy, the safety case).<\/p>\n<h2 id=\"the-one-liner-to-have-ready\">The one-liner to have ready<\/h2>\n<blockquote><p>\"I develop and quantify on Linux and desktop first, but I validate against the target: SIL for the software logic in simulation, HIL with the real SoC in the loop against sensor playback, and on target boards for the true numbers. The whole thing runs under ISO 26262, which is why determinism and hard accuracy targets aren't negotiable — perception is an ASIL-rated function.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"why-an-application-engineer-needs-this","text":"Why an application engineer needs this"},{"level":2,"id":"pages","text":"Pages"},{"level":2,"id":"the-one-liner-to-have-ready","text":"The one-liner to have ready"}],"text":"6 · runtime, safety & validation 💡 tl;dr the model runs inside an embedded os (linux or qnx ), gets validated on simulators and target boards (sil / hil), and lives under automotive functional safety (iso 26262 / asil). you won't be the safety engineer, but you must speak this language — it frames every deployment decision, from \"why qnx\" to \"why we can't just ship the fastest model.\" why an application engineer needs this runtime decides how deterministic your inference is — a soft-real-time linux path vs a hard-real-time qnx path changes how you think about latency guarantees. validation is how your work gets signed off — you'll produce results on sil and hil and contribute to release validation (a jd responsibility). safety is the backdrop the whole product lives in — it explains determinism requirements, redundancy, and why accuracy targets are hard limits, not nice-to-haves. pages embedded runtime: linux & qnx — the two os worlds, real-time scheduling, and where your inference process sits. sil / hil validation — the x-in-the-loop ladder: what sil, hil (and mil/pil) each validate and where you plug in. iso 26262 / asil functional safety — the standard, asil levels, and how ai/perception fits (sotif, redundancy, the safety case). the one-liner to have ready \"i develop and quantify on linux and desktop first, but i validate against the target: sil for the software logic in simulation, hil with the real soc in the loop against sensor playback, and on target boards for the true numbers. the whole thing runs under iso 26262, which is why determinism and hard accuracy targets aren't negotiable — perception is an asil-rated function.\"","words":275},{"path":"06-runtime-safety-validation/linux-qnx-runtime.md","title":"Embedded Runtime: Linux & QNX","section":"6 · Runtime, Safety & Validation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"embedded-runtime-linux-qnx\">Embedded Runtime: Linux &amp; QNX<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Your inference runs as a process inside an embedded OS. Automotive SoCs typically run <strong>embedded Linux<\/strong> (often with the PREEMPT_RT patch) for the \"performance/infotainment\" domain and <strong>QNX<\/strong> — a commercial <strong>microkernel RTOS<\/strong> — for the \"safety/real-time\" domain. The difference that matters to you is <strong>determinism<\/strong>: QNX gives hard real-time guarantees and a small, certifiable kernel; Linux gives a rich stack and soft real-time.<\/div><\/div>\n<h2 id=\"linux-vs-qnx\">Linux vs QNX<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th><strong>Embedded Linux<\/strong><\/th><th><strong>QNX<\/strong><\/th><\/tr><\/thead><tbody><tr><td>Kernel<\/td><td>Monolithic (drivers in kernel)<\/td><td><strong>Microkernel<\/strong> (drivers/services in user space)<\/td><\/tr><tr><td>Real-time<\/td><td>Soft; hard-ish with PREEMPT_RT<\/td><td><strong>Hard real-time<\/strong> by design<\/td><\/tr><tr><td>Fault isolation<\/td><td>A bad driver can panic the kernel<\/td><td>A crashed driver is a restartable user process<\/td><\/tr><tr><td>Safety certification<\/td><td>Harder (huge codebase)<\/td><td><strong>Designed for ISO 26262 / ASIL-D<\/strong> certification<\/td><\/tr><tr><td>Ecosystem<\/td><td>Huge — full ML stack, easy dev<\/td><td>Smaller, commercial, POSIX-compatible<\/td><\/tr><tr><td>Typical use<\/td><td>Infotainment, dev, non-safety perception<\/td><td>Safety-critical ADAS/AD control<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Why QNX for safety:<\/strong> the microkernel keeps only the essentials in privileged mode; drivers and services run isolated in user space, so a fault is <strong>contained and restartable<\/strong> instead of taking down the system. A small kernel is also <strong>feasible to certify<\/strong> to ASIL-D. That isolation story is the whole reason it's chosen — memorize it.<\/p>\n<h2 id=\"real-time-scheduling-the-concept-to-have\">Real-time scheduling (the concept to have)<\/h2>\n<p>\"Real-time\" ≠ \"fast\" — it means <strong>deterministic<\/strong>: a task <strong>meets its deadline every time<\/strong>, bounded worst case. For perception feeding a planner, a late-but-correct result can be as bad as a wrong one.<\/p>\n<ul><li><strong>Priority-based preemptive scheduling<\/strong> — the highest-priority ready task runs; it<\/li><\/ul>\n<p>preempts lower ones.<\/p>\n<ul><li><strong>Priority inversion<\/strong> — a high-priority task blocks on a resource held by a low-priority<\/li><\/ul>\n<p>one; fixed by <strong>priority inheritance<\/strong> (QNX does this natively). A classic RTOS gotcha.<\/p>\n<ul><li><strong>Worst-Case Execution Time (WCET)<\/strong> — the number safety cares about. Your inference must<\/li><\/ul>\n<p>have a <strong>bounded, measured<\/strong> WCET, which is why dynamic shapes and unpredictable fallbacks   are discouraged — they make WCET hard to bound.<\/p>\n<h2 id=\"where-your-inference-sits\">Where your inference sits<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">camera driver<\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node\">your inference process<span class=\"nsub\">runtime + NPU/DSP offload<\/span><\/span>\n    <span class=\"arw\"><\/span>\n    <span class=\"node out\">perception output<span class=\"nsub\">to planning/control<\/span><\/span>\n  <\/div>\n  <div class=\"flow-foot\">On QNX these are isolated user-space processes talking via message passing; on Linux, processes/threads with IPC. Your job: keep the inference process's latency <b>bounded and deterministic<\/b>.<\/div>\n<\/div>\n<ul><li>You link the vendor <strong>runtime<\/strong> (which drives the NPU/DSP) into a process.<\/li><li>Buffers to the accelerator must be <strong>IPMMU-mapped and cache-coherent<\/strong> (see<\/li><\/ul>\n<p><a class=\"mdlink\" data-href=\"../05-soc-architecture/memory-dma-ipmmu.md\" href=\"#\">memory-dma-ipmmu<\/a>).<\/p>\n<ul><li>The OS abstraction you touch is mostly **memory (shared buffers), scheduling (priority,<\/li><\/ul>\n<p>affinity), and IPC** to the rest of the stack.<\/p>\n<h2 id=\"practical-implications-for-you\">Practical implications for you<\/h2>\n<ul><li><strong>Determinism over peak speed<\/strong> — a model with predictable latency beats a faster one with<\/li><\/ul>\n<p>a fat tail. Static shapes, no surprise fallbacks, bounded post-processing.<\/p>\n<ul><li><strong>C/C++ on this side<\/strong> — the runtime integration is C/C++; Python is for the dev/offline<\/li><\/ul>\n<p>quantization/validation tooling. (Hence the JD's \"C/C++ a plus.\")<\/p>\n<ul><li><strong>POSIX portability<\/strong> — QNX is POSIX-compatible, so much Linux-developed code ports, but<\/li><\/ul>\n<p>don't assume Linux-only APIs or unbounded dynamic allocation are available/allowed.<\/p>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"Automotive SoCs split domains: embedded Linux, often PREEMPT_RT, for the rich/non-safety side, and QNX — a microkernel RTOS — for the safety-critical side. QNX wins there because drivers run isolated in user space so faults are contained and restartable, and the small kernel is certifiable to ASIL-D. What that means for me is determinism first: bounded WCET, static shapes, no surprise fallbacks, and the buffer discipline (IPMMU-mapped, coherent) the accelerator needs.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"linux-vs-qnx","text":"Linux vs QNX"},{"level":2,"id":"real-time-scheduling-the-concept-to-have","text":"Real-time scheduling (the concept to have)"},{"level":2,"id":"where-your-inference-sits","text":"Where your inference sits"},{"level":2,"id":"practical-implications-for-you","text":"Practical implications for you"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"embedded runtime: linux & qnx 💡 tl;dr your inference runs as a process inside an embedded os. automotive socs typically run embedded linux (often with the preempt_rt patch) for the \"performance/infotainment\" domain and qnx — a commercial microkernel rtos — for the \"safety/real-time\" domain. the difference that matters to you is determinism : qnx gives hard real-time guarantees and a small, certifiable kernel; linux gives a rich stack and soft real-time. linux vs qnx embedded linux qnx kernel monolithic (drivers in kernel) microkernel (drivers/services in user space) real-time soft; hard-ish with preempt_rt hard real-time by design fault isolation a bad driver can panic the kernel a crashed driver is a restartable user process safety certification harder (huge codebase) designed for iso 26262 / asil-d certification ecosystem huge — full ml stack, easy dev smaller, commercial, posix-compatible typical use infotainment, dev, non-safety perception safety-critical adas/ad control why qnx for safety: the microkernel keeps only the essentials in privileged mode; drivers and services run isolated in user space, so a fault is contained and restartable instead of taking down the system. a small kernel is also feasible to certify to asil-d. that isolation story is the whole reason it's chosen — memorize it. real-time scheduling (the concept to have) \"real-time\" ≠ \"fast\" — it means deterministic : a task meets its deadline every time , bounded worst case. for perception feeding a planner, a late-but-correct result can be as bad as a wrong one. priority-based preemptive scheduling — the highest-priority ready task runs; it preempts lower ones. priority inversion — a high-priority task blocks on a resource held by a low-priority one; fixed by priority inheritance (qnx does this natively). a classic rtos gotcha. worst-case execution time (wcet) — the number safety cares about. your inference must have a bounded, measured wcet, which is why dynamic shapes and unpredictable fallbacks are discouraged — they make wcet hard to bound. where your inference sits camera driver your inference process runtime + npu/dsp offload perception output to planning/control on qnx these are isolated user-space processes talking via message passing; on linux, processes/threads with ipc. your job: keep the inference process's latency bounded and deterministic . you link the vendor runtime (which drives the npu/dsp) into a process. buffers to the accelerator must be ipmmu-mapped and cache-coherent (see memory-dma-ipmmu ). the os abstraction you touch is mostly **memory (shared buffers), scheduling (priority, affinity), and ipc** to the rest of the stack. practical implications for you determinism over peak speed — a model with predictable latency beats a faster one with a fat tail. static shapes, no surprise fallbacks, bounded post-processing. c/c++ on this side — the runtime integration is c/c++; python is for the dev/offline quantization/validation tooling. (hence the jd's \"c/c++ a plus.\") posix portability — qnx is posix-compatible, so much linux-developed code ports, but don't assume linux-only apis or unbounded dynamic allocation are available/allowed. interview soundbite \"automotive socs split domains: embedded linux, often preempt_rt, for the rich/non-safety side, and qnx — a microkernel rtos — for the safety-critical side. qnx wins there because drivers run isolated in user space so faults are contained and restartable, and the small kernel is certifiable to asil-d. what that means for me is determinism first: bounded wcet, static shapes, no surprise fallbacks, and the buffer discipline (ipmmu-mapped, coherent) the accelerator needs.\"","words":553},{"path":"06-runtime-safety-validation/sil-hil-validation.md","title":"SIL / HIL Validation","section":"6 · Runtime, Safety & Validation","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"sil-hil-validation\">SIL / HIL Validation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Automotive validation is a ladder of <strong>\"X-in-the-loop\"<\/strong> stages that trade fidelity for convenience. <strong>MIL<\/strong> (model), <strong>SIL<\/strong> (software), <strong>PIL<\/strong> (processor), <strong>HIL<\/strong> (hardware). You mostly live in <strong>SIL<\/strong> (your compiled software against simulated/recorded inputs) and <strong>HIL<\/strong> (the real SoC in the loop against sensor playback or a simulator), plus raw <strong>on-target<\/strong> runs. Each answers a different question.<\/div><\/div>\n<h2 id=\"the-x-in-the-loop-ladder\">The X-in-the-loop ladder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>What's \"in the loop\"<\/th><th>What it validates<\/th><th>Fidelity / cost<\/th><\/tr><\/thead><tbody><tr><td><strong>MIL<\/strong> (Model-in-the-Loop)<\/td><td>The algorithm/model in a sim (e.g. on a host)<\/td><td>Does the algorithm behave correctly?<\/td><td>Low fidelity, cheap, fast iteration<\/td><\/tr><tr><td><strong>SIL<\/strong> (Software-in-the-Loop)<\/td><td>The <strong>actual compiled software<\/strong>, run on a host/sim<\/td><td>Does the real code (incl. quantized model) produce right outputs?<\/td><td>No target HW yet<\/td><\/tr><tr><td><strong>PIL<\/strong> (Processor-in-the-Loop)<\/td><td>Software running on the <strong>target processor/ISS<\/strong><\/td><td>Does it behave correctly on the real ISA/toolchain?<\/td><td>Adds processor realism<\/td><\/tr><tr><td><strong>HIL<\/strong> (Hardware-in-the-Loop)<\/td><td>The <strong>real SoC/ECU<\/strong> wired to a simulator feeding sensor data in real time<\/td><td>Does the whole system meet timing/accuracy on real hardware, in real time?<\/td><td>High fidelity, expensive<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>The progression:<\/strong> as you climb, fidelity rises and iteration speed falls. You validate as low as possible for fast feedback and as high as necessary for sign-off.<\/p>\n<h2 id=\"where-you-plug-in\">Where you plug in<\/h2>\n<div class=\"diagram\">\n  <div class=\"flow\">\n    <span class=\"node\">quantize + compile<\/span>\n    <span class=\"arw labeled\"><span class=\"al\">SIL<\/span><\/span>\n    <span class=\"node\">accuracy vs FP32<span class=\"nsub\">recorded data<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">on target<\/span><\/span>\n    <span class=\"node\">real latency/accuracy<span class=\"nsub\">dev board<\/span><\/span>\n    <span class=\"arw labeled\"><span class=\"al\">HIL<\/span><\/span>\n    <span class=\"node out\">system sign-off<span class=\"nsub\">real-time, in-loop<\/span><\/span>\n  <\/div>\n<\/div>\n<ul><li><strong>SIL for you:<\/strong> run your compiled INT8 model against a <strong>golden dataset<\/strong> and compare to<\/li><\/ul>\n<p>the FP32 reference — this is where you catch quantization/operator accuracy regressions   before hardware. Fast loop, no board contention.<\/p>\n<ul><li><strong>On target board:<\/strong> the honest <strong>latency, throughput, utilization<\/strong> numbers (SIL can't<\/li><\/ul>\n<p>give real timing). Where the perf-analysis loop from   <a class=\"mdlink\" data-href=\"../05-soc-architecture/multicore-scheduling.md\" href=\"#\">multicore-scheduling<\/a> actually runs.<\/p>\n<ul><li><strong>HIL:<\/strong> the SoC runs in <strong>real time<\/strong> while a rig plays back or simulates sensor streams<\/li><\/ul>\n<p>and checks the system responds correctly and on time. Catches integration, timing, and   real-world corner cases a static dataset misses.<\/p>\n<h2 id=\"key-concepts-to-name\">Key concepts to name<\/h2>\n<ul><li><strong>Open-loop vs closed-loop:<\/strong> open-loop replays recorded sensor data and checks outputs;<\/li><\/ul>\n<p><strong>closed-loop<\/strong> puts your perception into a driving simulator whose next frame <em>depends<\/em> on   the vehicle's reaction — needed to test the full perceive→plan→act cycle.<\/p>\n<ul><li><strong>Golden/reference data &amp; regression:<\/strong> a fixed labeled set you re-run every release to<\/li><\/ul>\n<p>catch accuracy/latency regressions (feeds the JD's \"release validation activities\").<\/p>\n<ul><li><strong>Determinism &amp; reproducibility:<\/strong> same input must give same output — essential for<\/li><\/ul>\n<p>debugging and for safety evidence.<\/p>\n<ul><li><strong>Corner cases / ODD:<\/strong> validation must cover the <strong>Operational Design Domain<\/strong> (the<\/li><\/ul>\n<p>conditions the system is designed for) — night, rain, glare, occlusion for perception.<\/p>\n<h2 id=\"your-validation-deliverables-jd-aligned\">Your validation deliverables (JD-aligned)<\/h2>\n<ul><li><strong>Accuracy report<\/strong> — INT8 vs FP32 on the golden set (per-class mAP/mIoU deltas).<\/li><li><strong>Performance report<\/strong> — latency p50/p99, throughput, per-block utilization on target.<\/li><li><strong>Regression status<\/strong> — pass/fail vs the last release baseline, contributing to **weekly<\/li><\/ul>\n<p>technical reports and release validation**.<\/p>\n<h2 id=\"interview-soundbite\">Interview soundbite<\/h2>\n<blockquote><p>\"I validate up a fidelity ladder: SIL first — my actual compiled INT8 model against a golden dataset, compared to the FP32 reference, to catch accuracy regressions cheaply. Then on a target board for honest latency and utilization, then HIL where the real SoC runs in real time against sensor playback or a closed-loop simulator to validate timing and system behavior. Golden-set regression on every release is how the numbers stay honest.\"<\/p><\/blockquote>","toc":[{"level":2,"id":"the-x-in-the-loop-ladder","text":"The X-in-the-loop ladder"},{"level":2,"id":"where-you-plug-in","text":"Where you plug in"},{"level":2,"id":"key-concepts-to-name","text":"Key concepts to name"},{"level":2,"id":"your-validation-deliverables-jd-aligned","text":"Your validation deliverables (JD-aligned)"},{"level":2,"id":"interview-soundbite","text":"Interview soundbite"}],"text":"sil / hil validation 💡 tl;dr automotive validation is a ladder of \"x-in-the-loop\" stages that trade fidelity for convenience. mil (model), sil (software), pil (processor), hil (hardware). you mostly live in sil (your compiled software against simulated/recorded inputs) and hil (the real soc in the loop against sensor playback or a simulator), plus raw on-target runs. each answers a different question. the x-in-the-loop ladder stage what's \"in the loop\" what it validates fidelity / cost mil (model-in-the-loop) the algorithm/model in a sim (e.g. on a host) does the algorithm behave correctly? low fidelity, cheap, fast iteration sil (software-in-the-loop) the actual compiled software , run on a host/sim does the real code (incl. quantized model) produce right outputs? no target hw yet pil (processor-in-the-loop) software running on the target processor/iss does it behave correctly on the real isa/toolchain? adds processor realism hil (hardware-in-the-loop) the real soc/ecu wired to a simulator feeding sensor data in real time does the whole system meet timing/accuracy on real hardware, in real time? high fidelity, expensive the progression: as you climb, fidelity rises and iteration speed falls. you validate as low as possible for fast feedback and as high as necessary for sign-off. where you plug in quantize + compile sil accuracy vs fp32 recorded data on target real latency/accuracy dev board hil system sign-off real-time, in-loop sil for you: run your compiled int8 model against a golden dataset and compare to the fp32 reference — this is where you catch quantization/operator accu

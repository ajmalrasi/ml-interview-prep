<\/ul>\n<p>(leak = a slope on the memory graph).<\/p>\n<h2 id=\"crash-proof-they-will-probe-this\">Crash-proof (they WILL probe this)<\/h2>\n<ul><li><strong>Isolate<\/strong> each camera (blast radius = 1) → <strong>watchdog<\/strong> freshness → **reconnect<\/li><\/ul>\n<p>with exponential backoff + jitter** → wait for keyframe.<\/p>\n<ul><li><strong>Graceful degradation:<\/strong> under load, shrink batch / skip frames / lower res —<\/li><\/ul>\n<p>don't crash.<\/p>\n<ul><li><strong>Supervise:<\/strong> systemd / k8s liveness (GKE) auto-restarts crashed workers.<\/li><li>WAN drop → edge keeps inferring, buffer metadata locally (bounded), flush later.<\/li><\/ul>\n<h2 id=\"system-design-loop-say-it-out-loud\">System-design loop (say it out loud)<\/h2>\n<p><strong>Clarify → Estimate → Architect → Bottleneck → Failure.<\/strong> Default architecture: NVDEC decode → nvstreammux batch → INT8 TRT + tracker at the <strong>edge<\/strong> → metadata-only to a <strong>message bus<\/strong> → cloud for storage/UI/retraining.<\/p>\n<h2 id=\"your-pitch-the-narrative\">Your pitch (the narrative)<\/h2>\n<p>\"Edge-CV/video-analytics roots (Jetson, DeepStream, TensorRT, INT8) → 4 years deep in distributed systems + performance engineering at petabyte scale → now bringing that systems rigor to live Vision AI. I work by measurement: hypothesis, isolate, benchmark, validate.\"<\/p>\n<h2 id=\"dont-forget-to-ask-them\">Don't forget to ask them<\/h2>\n<p>Scale (cameras/res/fps)? Latency SLA? Edge or cloud? What's the proprietary framework built on? Team size / who owns the ML vs systems split?<\/p>\n<p><strong>Breathe. Clarify before answering. Think out loud. You've shipped this stuff.<\/strong><\/p>","toc":[{"level":2,"id":"the-role-in-one-breath","text":"The role in one breath"},{"level":2,"id":"streaming","text":"Streaming"},{"level":2,"id":"decode-buffers","text":"Decode &amp; buffers"},{"level":2,"id":"gstreamer-deepstream","text":"GStreamer / DeepStream"},{"level":2,"id":"inference-your-strength-lead-here","text":"Inference (your strength — lead here)"},{"level":2,"id":"production-python","text":"Production Python"},{"level":2,"id":"crash-proof-they-will-probe-this","text":"Crash-proof (they WILL probe this)"},{"level":2,"id":"system-design-loop-say-it-out-loud","text":"System-design loop (say it out loud)"},{"level":2,"id":"your-pitch-the-narrative","text":"Your pitch (the narrative)"},{"level":2,"id":"dont-forget-to-ask-them","text":"Don't forget to ask them"}],"text":"cheat sheet — one page, morning of read this and nothing else the morning of. depth is in the numbered sections. the role in one breath systems-first cv: build the pipelines that run vision ai on live video 24/7, fast and crash-proof. not training models — making them run . streaming rtsp in (cameras, pull, ~0.5–3s), webrtc/fastrtc out (browsers, <500ms). hls/dash = broadcast, too slow for live. rtsp transport: udp = low latency/lossy; tcp = reliable/stable. many cams → tcp. i/p/b frames: i = full keyframe, p = diff from past, b = past+future (disable for low latency). can only start decoding at a keyframe . h.264 default; h.265 halves bandwidth but heavier + licensing. decode & buffers nvdec hardware decode , not cpu — scales to dozens of streams, keeps frames on gpu (zero-copy). bound every queue; drop oldest, keep latest for live. unbounded queue = the classic leak + latency creep. appsink: max-buffers=1 drop=true sync=false . .copy() frames that outlive the callback; always unmap . gstreamer / deepstream gstreamer = elements + pads + caps + buffers; queue = thread boundary + backpressure. nvstreammux batches many cameras into one inference call → the key multi-cam scaling trick. deepstream = inference + tracking + analytics inside the pipeline, gpu-resident. detect dead camera: bus eos/error + freshness watchdog . inference (your strength — lead here) tensorrt : onnx → engine, layer fusion + kernel tuning + precision. build **on the target gpu**. fp16 ≈ 2×, near-lossless (try first). int8 ≈ 3–4×, ¼ mem, needs calibration — validate map. quantization (math) vs pruning (weights) vs distillation (architecture) — stack them. triton = cloud model server (dynamic batching, versioning); in-process trt = edge minimum latency. latency ≠ throughput. hit the latency sla, then maximize throughput (batch size) under it. low gpu util + high latency = copy/cpu/network-bound, not the model. profile first. production python gil doesn't block decode/numpy/cuda (they release it) → threads are the default for video. async for many connections. processes for cpu-bound python / isolation. no leaks: bound buffers, release gpu surfaces per iteration, soak-test 24h+ (leak = a slope on the memory graph). crash-proof (they will probe this) isolate each camera (blast radius = 1) → watchdog freshness → **reconnect with exponential backoff + jitter** → wait for keyframe. graceful degradation: under load, shrink batch / skip frames / lower res — don't crash. supervise: systemd / k8s liveness (gke) auto-restarts crashed workers. wan drop → edge keeps inferring, buffer metadata locally (bounded), flush later. system-design loop (say it out loud) clarify → estimate → architect → bottleneck → failure. default architecture: nvdec decode → nvstreammux batch → int8 trt + tracker at the edge → metadata-only to a message bus → cloud for storage/ui/retraining. your pitch (the narrative) \"edge-cv/video-analytics roots (jetson, deepstream, tensorrt, int8) → 4 years deep in distributed systems + performance engineering at petabyte scale → now bringing that systems rigor to live vision ai. i work by measurement: hypothesis, isolate, benchmark, validate.\" don't forget to ask them scale (cameras/res/fps)? latency sla? edge or cloud? what's the proprietary framework built on? team size / who owns the ml vs systems split? breathe. clarify before answering. think out loud. you've shipped this stuff.","words":537},{"path":"08-mock-interview/README.md","title":"Overview","section":"8 · Mock Interview","quiz":false,"html":"<h1 id=\"08-mock-interview\">08 — Mock Interview<\/h1>\n<p><strong>TL;DR:<\/strong> A staged mock for a technical/system-design round at KoiReader. Two ways to use it:<\/p>\n<ol><li><strong>Solo:<\/strong> open <a class=\"mdlink\" data-href=\"questions.md\" href=\"#\">questions.md<\/a>, answer each out loud / on paper<\/li><\/ol>\n<p><em>before<\/em> looking, then check <a class=\"mdlink\" data-href=\"model-answers.md\" href=\"#\">model-answers.md<\/a> and grade    yourself with <a class=\"mdlink\" data-href=\"rubric.md\" href=\"#\">rubric.md<\/a>.<\/p>\n<ol><li><strong>Live with me (recommended):<\/strong> ask me in chat — *\"run the KoiReader mock<\/li><\/ol>\n<p>interview\"* — and I'll play interviewer: one question at a time, follow-ups based    on your answers, then a scored debrief. That's closer to the real thing because    I'll push on weak spots.<\/p>\n<h2 id=\"format-mirrors-a-real-4560-min-technical-round\">Format (mirrors a real 45–60 min technical round)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Time<\/th><th>What it tests<\/th><\/tr><\/thead><tbody><tr><td>1. Warm-up / background<\/td><td>5 min<\/td><td>Your narrative, fit for systems-first CV<\/td><\/tr><tr><td>2. Rapid-fire fundamentals<\/td><td>10 min<\/td><td>Streaming, codecs, decode, GIL — recall under pressure<\/td><\/tr><tr><td>3. Deep dive<\/td><td>10 min<\/td><td>One topic to real depth (usually inference or fault tolerance)<\/td><\/tr><tr><td>4. System design<\/td><td>20 min<\/td><td>The multi-camera pipeline + curveballs<\/td><\/tr><tr><td>5. Your questions<\/td><td>5 min<\/td><td>Signals seniority and genuine interest<\/td><\/tr><\/tbody><\/table><\/div>\n<p>→ Start solo: <strong><a class=\"mdlink\" data-href=\"questions.md\" href=\"#\">questions.md<\/a><\/strong> · Or ask me to run it live.<\/p>","toc":[{"level":2,"id":"format-mirrors-a-real-4560-min-technical-round","text":"Format (mirrors a real 45–60 min technical round)"}],"text":"08 — mock interview tl;dr: a staged mock for a technical/system-design round at koireader. two ways to use it: solo: open questions.md , answer each out loud / on paper before looking, then check model-answers.md and grade yourself with rubric.md . live with me (recommended): ask me in chat — *\"run the koireader mock interview\"* — and i'll play interviewer: one question at a time, follow-ups based on your answers, then a scored debrief. that's closer to the real thing because i'll push on weak spots. format (mirrors a real 45–60 min technical round) stage time what it tests 1. warm-up / background 5 min your narrative, fit for systems-first cv 2. rapid-fire fundamentals 10 min streaming, codecs, decode, gil — recall under pressure 3. deep dive 10 min one topic to real depth (usually inference or fault tolerance) 4. system design 20 min the multi-camera pipeline + curveballs 5. your questions 5 min signals seniority and genuine interest → start solo: questions.md · or ask me to run it live.","words":171},{"path":"08-mock-interview/questions.md","title":"Questions","section":"8 · Mock Interview","quiz":false,"html":"<h1 id=\"mock-interview-questions\">Mock Interview — Questions<\/h1>\n<p>Answer each <strong>out loud before<\/strong> opening <a class=\"mdlink\" data-href=\"model-answers.md\" href=\"#\">model-answers.md<\/a>. Time yourself. The follow-ups are what a real interviewer adds when you answer well.<\/p>\n<hr>\n<h2 id=\"stage-1-warm-up-5-min\">Stage 1 — Warm-up (5 min)<\/h2>\n<ol><li>Walk me through your background in 2 minutes. Why this systems-first CV role?<\/li><li>This role is explicitly <em>not<\/em> about training models in notebooks — it's about<\/li><\/ol>\n<p>making them run on live video. How does your experience map to that?<\/p>\n<ol><li><em>(follow-up)<\/em> Your last 4 years read as data platforms / seismic. Why the move<\/li><\/ol>\n<p>back to live vision systems?<\/p>\n<h2 id=\"stage-2-rapid-fire-fundamentals-10-min\">Stage 2 — Rapid-fire fundamentals (10 min)<\/h2>\n<ol><li>RTSP vs WebRTC — when each?<\/li><li>Why is HLS a bad choice for real-time inference delivery?<\/li><li>What's the difference between I, P, and B frames? Why might you disable B-frames?<\/li><li>Why can't you start decoding a stream at an arbitrary frame?<\/li><li><code>cv2.VideoCapture(\"rtsp://...\")<\/code> — what's wrong with this for 30 cameras?<\/li><li>Consumer is slower than the camera. What do you do, and why not just a big buffer?<\/li><li>Does Python's GIL prevent a video pipeline from using multiple cores? Explain.<\/li><li>FP16 vs INT8 — tradeoffs? What does INT8 need that FP16 doesn't?<\/li><\/ol>\n<h2 id=\"stage-3-deep-dive-10-min-pick-the-one-they-steer-to\">Stage 3 — Deep dive (10 min) — pick the one they steer to<\/h2>\n<ol><li><strong>Inference:<\/strong> Walk me through taking a trained PyTorch detector to the fastest<\/li><\/ol>\n<p>stable inference on a Jetson. Every step.<\/p>\n<ol><li><em>(follow-up)<\/em> You quantized to INT8 and mAP dropped 4 points. Debug it.<\/li><li><strong>Fault tolerance:<\/strong> A camera in a 40-camera system silently freezes — no error,<\/li><\/ol>\n<p>last frame just repeats. How do you detect and recover? How do you make sure the     other 39 are unaffected?<\/p>\n<ol><li><em>(follow-up)<\/em> Your reconnect logic works but logs are flooded and the camera gets<\/li><\/ol>\n<p>hammered every 100ms. Fix it.<\/p>\n<h2 id=\"stage-4-system-design-20-min\">Stage 4 — System design (20 min)<\/h2>\n<ol><li>Design a system to run object detection + tracking on 50 RTSP cameras in a<\/li><\/ol>\n<p>warehouse, 24/7, low latency, edge + cloud, that self-heals without human     intervention. Think out loud.<\/p>\n<p>Curveballs they'll add (expect 2–3):<\/p>\n<ul><li>Now it's 500 cameras.<\/li><li>Latency must be under 50ms end to end.<\/li><li>The GPU keeps running out of memory.<\/li><li>The cloud link drops for an hour.<\/li><li>Deploy a new model version with zero downtime.<\/li><li>How do you know, in production, that a camera is mispointed and detecting<\/li><\/ul>\n<p>nothing useful?<\/p>\n<h2 id=\"stage-5-your-questions-5-min\">Stage 5 — Your questions (5 min)<\/h2>\n<ol><li>What questions do you have for us?<\/li><\/ol>\n<p><em>(Yes, this is scored. Have 3 sharp ones ready — see model-answers.)<\/em><\/p>\n<hr>\n<p>→ Check yourself: <strong><a class=\"mdlink\" data-href=\"model-answers.md\" href=\"#\">model-answers.md<\/a><\/strong> · Grade: <strong><a class=\"mdlink\" data-href=\"rubric.md\" href=\"#\">rubric.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"stage-1-warm-up-5-min","text":"Stage 1 — Warm-up (5 min)"},{"level":2,"id":"stage-2-rapid-fire-fundamentals-10-min","text":"Stage 2 — Rapid-fire fundamentals (10 min)"},{"level":2,"id":"stage-3-deep-dive-10-min-pick-the-one-they-steer-to","text":"Stage 3 — Deep dive (10 min) — pick the one they steer to"},{"level":2,"id":"stage-4-system-design-20-min","text":"Stage 4 — System design (20 min)"},{"level":2,"id":"stage-5-your-questions-5-min","text":"Stage 5 — Your questions (5 min)"}],"text":"mock interview — questions answer each out loud before opening model-answers.md . time yourself. the follow-ups are what a real interviewer adds when you answer well. stage 1 — warm-up (5 min) walk me through your background in 2 minutes. why this systems-first cv role? this role is explicitly not about training models in notebooks — it's about making them run on live video. how does your experience map to that? (follow-up) your last 4 years read as data platforms / seismic. why the move back to live vision systems? stage 2 — rapid-fire fundamentals (10 min) rtsp vs webrtc — when each? why is hls a bad choice for real-time inference delivery? what's the difference between i, p, and b frames? why might you disable b-frames? why can't you start decoding a stream at an arbitrary frame? cv2.videocapture(\"rtsp://...\") — what's wrong with this for 30 cameras? consumer is slower than the camera. what do you do, and why not just a big buffer? does python's gil prevent a video pipeline from using multiple cores? explain. fp16 vs int8 — tradeoffs? what does int8 need that fp16 doesn't? stage 3 — deep dive (10 min) — pick the one they steer to inference: walk me through taking a trained pytorch detector to the fastest stable inference on a jetson. every step. (follow-up) you quantized to int8 and map dropped 4 points. debug it. fault tolerance: a camera in a 40-camera system silently freezes — no error, last frame just repeats. how do you detect and recover? how do you make sure the other 39 are unaffected? (follow-up) your reconnect logic works but logs are flooded and the camera gets hammered every 100ms. fix it. stage 4 — system design (20 min) design a system to run object detection + tracking on 50 rtsp cameras in a warehouse, 24/7, low latency, edge + cloud, that self-heals without human intervention. think out loud. curveballs they'll add (expect 2–3): now it's 500 cameras. latency must be under 50ms end to end. the gpu keeps running out of memory. the cloud link drops for an hour. deploy a new model version with zero downtime. how do you know, in production, that a camera is mispointed and detecting nothing useful? stage 5 — your questions (5 min) what questions do you have for us? (yes, this is scored. have 3 sharp ones ready — see model-answers.) → check yourself: model-answers.md · grade: rubric.md","words":408},{"path":"08-mock-interview/model-answers.md","title":"Model Answers","section":"8 · Mock Interview","quiz":false,"html":"<h1 id=\"mock-interview-model-answers\">Mock Interview — Model Answers<\/h1>\n<p>These are <em>strong reference<\/em> answers, not scripts. Say it in your words. Numbers in <strong>bold<\/strong> are the points an interviewer actually rewards.<\/p>\n<hr>\n<h2 id=\"stage-1-warm-up\">Stage 1 — Warm-up<\/h2>\n<p><strong>1. Background + why this role.<\/strong> \"7 years as an engineer; I started in <strong>edge computer vision and video analytics<\/strong> — Jetson Nano, DeepStream, GStreamer, TensorRT with INT8/FP16, custom trackers outperforming SORT on ARM. Then I spent <strong>4 years going deep on distributed systems and performance engineering<\/strong> building petabyte-scale data platforms on GCP/K8s. This role is the intersection: it wants someone who can make Vision AI <strong>run<\/strong> on live video, reliably and fast — that's edge-CV depth <em>plus<\/em> systems rigor, which is exactly my arc.\"<\/p>\n<p><strong>2. Maps to systems-first how?<\/strong> \"My CV background isn't notebook training — it was always <strong>deployment<\/strong>: porting models to NXP/Samsung SOCs with quantization, real-time DeepStream pipelines on Jetson, Dockerized inference servers behind REST. And my data-platform years were pure systems: throughput, fault tolerance, profiling. The JD's pillars — streaming pipelines, low-latency inference, crash-proof systems, performance debugging — are the things I've actually shipped.\"<\/p>\n<p><strong>3. Why move back.<\/strong> \"I love the systems side, and live vision is where I get to apply it to something physical and real-time. The data-platform work made me a much better <em>systems<\/em> engineer — measurement-driven, comfortable with ambiguity, obsessed with what fails at scale. I want to point that at Vision AI again.\"<\/p>\n<hr>\n<h2 id=\"stage-2-rapid-fire-keep-these-tight\">Stage 2 — Rapid-fire (keep these tight)<\/h2>\n<p><strong>4.<\/strong> RTSP to ingest from cameras (pull, ~0.5–3s); WebRTC to deliver to browsers/ peers (&lt;500ms). Real systems use both.<\/p>\n<p><strong>5.<\/strong> HLS segments video into multi-second chunks → 6–30s latency. Built for CDN broadcast, not \"obsess over milliseconds.\" WebRTC for interactive.<\/p>\n<p><strong>6.<\/strong> I = full keyframe (standalone). P = diff from previous. B = diff from past <em>and future<\/em>. Disable B-frames for low latency because the decoder must wait for the future frame to decode the B-frame — adds latency and reordering.<\/p>\n<p><strong>7.<\/strong> Because P/B frames are diffs that reference back to a keyframe. With no keyframe in hand there's nothing to apply the diffs to — you must wait for the next I-frame.<\/p>\n<p><strong>8.<\/strong> It decodes on the <strong>CPU<\/strong> (FFmpeg under the hood) and copies every frame to host memory, with opaque internal buffering. One or two 1080p streams saturate several cores; 30 is impossible. Use <strong>GStreamer + NVDEC<\/strong>, keep frames on GPU.<\/p>\n<p><strong>9.<\/strong> Bounded queue, <strong>drop oldest / keep latest<\/strong> for live. A big buffer doesn't help — if you can't catch up, it just means you're always acting on increasingly <em>old<\/em> frames, and it grows latency and memory unboundedly. Live wants <em>now<\/em>.<\/p>\n<p><strong>10.<\/strong> No — for video. The GIL only blocks two threads running <strong>Python bytecode<\/strong> at once. Decode (cv2/NVDEC), numpy, and CUDA/TensorRT calls <strong>release the GIL<\/strong>, so threads run those in parallel. The GIL only bites pure-Python hot loops, which I keep off the per-frame path. CPU-bound Python → processes.<\/p>\n<p><strong>11.<\/strong> FP16 ≈ 2× faster, half memory, near-lossless — try first. INT8 ≈ 3–4× and ¼ memory but needs a <strong>calibration dataset<\/strong> to set per-layer float ranges, and risks accuracy — so I always re-measure mAP, and use QAT if PTQ drops too much.<\/p>\n<hr>\n<h2 id=\"stage-3-deep-dive\">Stage 3 — Deep dive<\/h2>\n<p><strong>12. PyTorch detector → fastest stable Jetson inference.<\/strong> \"Export to <strong>ONNX<\/strong>; build a <strong>TensorRT<\/strong> engine <strong>on the Jetson itself<\/strong> so kernels are tuned for that arch. Start FP16 (near-free), then INT8 with a representative calibration set, re-validating mAP each step. Run decode on <strong>NVDEC<\/strong>, preprocess (resize/normalize/color) <strong>on the GPU<\/strong> to avoid host copies, batch with <strong>nvstreammux<\/strong> if multi-camera, run inference via DeepStream <code>nvinfer<\/code>, do NMS on GPU, and pull only <strong>metadata<\/strong> (boxes/IDs) back to CPU. Then I <strong>profile<\/strong> with nsys/tegrastats, check p99 and GPU utilization, and attack the fattest stage. Cache the engine so startup doesn't rebuild it.\"<\/p>\n<p><strong>13. INT8 dropped mAP 4 points — debug.<\/strong> \"First suspect <strong>calibration data<\/strong>: was it representative of deployment lighting/ angles/classes? Re-calibrate with better samples. Check whether specific <em>layers<\/em> are sensitive — mixed precision (keep those in FP16, rest INT8). Compare per-class metrics to see if it's one class collapsing. If PTQ can't recover it, move to <strong>QAT<\/strong>. And confirm it's the quantization, not a preprocessing mismatch between calibration and inference — same resize/normalize/color path.\"<\/p>\n<p><strong>14. Silent freeze in a 40-camera system.<\/strong> \"No error means the bus won't tell me, so I run a <strong>per-camera freshness watchdog<\/strong>: track the timestamp of the last frame; if <code>now - last &gt; threshold<\/code>, declare it dead. For recovery, each camera is an <strong>isolated supervised worker<\/strong> (its own process or a DeepStream source the mux tolerates dropping) — blast radius is one camera. On detection I tear the pipeline to NULL, <strong>reconnect with exponential backoff + jitter<\/strong>, and wait for the next keyframe. The other 39 never see it because they share no state with the dead one and the mux is configured to proceed without a stalled source.\"<\/p>\n<p><strong>15. Reconnect floods logs / hammers camera.<\/strong> \"That's a missing <strong>backoff<\/strong>. Replace fixed-interval retries with exponential backoff (1s, 2s, 4s… capped at ~30s) plus random <strong>jitter<\/strong> so 40 cameras don't retry in lockstep after a network blip. Log at decreasing frequency or aggregate (<code>camera X down, N attempts<\/code>). Reset the counter on successful reconnect.\"<\/p>\n<hr>\n<h2 id=\"stage-4-system-design\">Stage 4 — System design<\/h2>\n<p><strong>16.<\/strong> See <a class=\"mdlink\" data-href=\"../06-system-design/worked-example-multicam.md\" href=\"#\">../06-system-design/worked-example-multicam.md<\/a> for the full answer. Skeleton: clarify (scale/SLA/edge-cloud) → estimate (one GPU won't do 50 → edge nodes of ~16) → architecture (NVDEC → nvstreammux batch → INT8 TRT + tracker at edge → metadata to message bus → cloud storage/UI/retraining) → latency budget (find fat slice, p99, GPU util) → crash-proof (isolate, watchdog, backoff, degrade, supervise, bounded memory).<\/p>\n<p><strong>Curveballs:<\/strong> answers in <a class=\"mdlink\" data-href=\"../06-system-design/curveballs.md\" href=\"#\">../06-system-design/curveballs.md<\/a>. The pattern: restate constraint → name the tradeoff it stresses → change the minimum → state what you give up.<\/p>\n<hr>\n<h2 id=\"stage-5-your-questions-have-3-ready\">Stage 5 — Your questions (have 3+ ready)<\/h2>\n<p>Strong ones (signal seniority + genuine fit):<\/p>\n<ul><li>\"What's the proprietary vision framework built on — GStreamer/DeepStream, or<\/li><\/ul>\n<p>something custom? Where does it hurt today?\"<\/p>\n<ul><li>\"Where's the current bottleneck — decode, inference, network, or the cloud<\/li><\/ul>\n<p>aggregation layer?\"<\/p>\n<ul><li>\"How is ownership split between the ML team training models and the systems team<\/li><\/ul>\n<p>running them? Where does my role sit?\"<\/p>\n<ul><li>\"What does 'crash-proof' currently look like in production — what's your worst<\/li><\/ul>\n<p>recurring failure mode?\"<\/p>\n<ul><li>\"What scale are you at now (cameras/sites) and where do you need it to go?\"<\/li><\/ul>\n<p>Avoid: questions answered on the careers page, or only about perks.<\/p>\n<p>→ Grade yourself: <strong><a class=\"mdlink\" data-href=\"rubric.md\" href=\"#\">rubric.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"stage-1-warm-up","text":"Stage 1 — Warm-up"},{"level":2,"id":"stage-2-rapid-fire-keep-these-tight","text":"Stage 2 — Rapid-fire (keep these tight)"},{"level":2,"id":"stage-3-deep-dive","text":"Stage 3 — Deep dive"},{"level":2,"id":"stage-4-system-design","text":"Stage 4 — System design"},{"level":2,"id":"stage-5-your-questions-have-3-ready","text":"Stage 5 — Your questions (have 3+ ready)"}],"text":"mock interview — model answers these are strong reference answers, not scripts. say it in your words. numbers in bold are the points an interviewer actually rewards. stage 1 — warm-up 1. background + why this role. \"7 years as an engineer; i started in edge computer vision and video analytics — jetson nano, deepstream, gstreamer, tensorrt with int8/fp16, custom trackers outperforming sort on arm. then i spent 4 years going deep on distributed systems and performance engineering building petabyte-scale data platforms on gcp/k8s. this role is the intersection: it wants someone who can make vision ai run on live video, reliably and fast — that's edge-cv depth plus systems rigor, which is exactly my arc.\" 2. maps to systems-first how? \"my cv background isn't notebook training — it was always deployment : porting models to nxp/samsung socs with quantization, real-time deepstream pipelines on jetson, dockerized inference servers behind rest. and my data-platform years were pure systems: throughput, fault tolerance, profiling. the jd's pillars — streaming pipelines, low-latency inference, crash-proof systems, performance debugging — are the things i've actually shipped.\" 3. why move back. \"i love the systems side, and live vision is where i get to apply it to something physical and real-time. the data-platform work made me a much better systems engineer — measurement-driven, comfortable with ambiguity, obsessed with what fails at scale. i want to point that at vision ai again.\" stage 2 — rapid-fire (keep these tight) 4. rtsp to ingest from cameras (pull, ~0.5–3s); webrtc to deliver to browsers/ peers (<500ms). real systems use both. 5. hls segments video into multi-second chunks → 6–30s latency. built for cdn broadcast, not \"obsess over milliseconds.\" webrtc for interactive. 6. i = full keyframe (standalone). p = diff from previous. b = diff from past and future . disable b-frames for low latency because the decoder must wait for the future frame to decode the b-frame — adds latency and reordering. 7. because p/b frames are diffs that reference back to a keyframe. with no keyframe in hand there's nothing to apply the diffs to — you must wait for the next i-frame. 8. it decodes on the cpu (ffmpeg under the hood) and copies every frame to host memory, with opaque internal buffering. one or two 1080p streams saturate several cores; 30 is impossible. use gstreamer + nvdec , keep frames on gpu. 9. bounded queue, drop oldest / keep latest for live. a big buffer doesn't help — if you can't catch up, it just means you're always acting on increasingly old frames, and it grows latency and memory unboundedly. live wants now . 10. no — for video. the gil only blocks two threads running python bytecode at once. decode (cv2/nvdec), numpy, and cuda/tensorrt calls release the gil , so threads run those in parallel. the gil only bites pure-python hot loops, which i keep off the per-frame path. cpu-bound python → processes. 11. fp16 ≈ 2× faster, half memory, near-lossless — try first. int8 ≈ 3–4× and ¼ memory but needs a calibration dataset to set per-layer float ranges, and risks accuracy — so i always re-measure map, and use qat if ptq drops too much. stage 3 — deep dive 12. pytorch detector → fastest stable jetson inference. \"export to onnx ; build a tensorrt engine on the jetson itself so kernels are tuned for that arch. start fp16 (near-free), then int8 with a representative calibration set, re-validating map each step. run decode on nvdec , preprocess (resize/normalize/color) on the gpu to avoid host copies, batch with nvstreammux if multi-camera, run inference via deepstream nvinfer , do nms on gpu, and pull only metadata (boxes/ids) back to cpu. then i profile with nsys/tegrastats, check p99 and gpu utilization, and attack the fattest stage. cache the engine so startup doesn't rebuild it.\" 13. int8 dropped map 4 points — debug. \"first suspect calibration data : was it representative of deployment lighting/ angles/classes? re-calibrate with better samples. check whether specific layers are sensitive — mixed precision (keep those in fp16, rest int8). compare per-class metrics to see if it's one class collapsing. if ptq can't recover it, move to qat . and confirm it's the quantization, not a preprocessing mismatch between calibration and inference — same resize/normalize/color path.\" 14. silent freeze in a 40-camera system. \"no error means the bus won't tell me, so i run a per-camera freshness watchdog : track the timestamp of the last frame; if now - last > threshold , declare it dead. for recovery, each camera is an isolated supervised worker (its own process or a deepstream source the mux tolerates dropping) — blast radius is one camera. on detection i tear the pipeline to null, reconnect with exponential backoff + jitter , and wait for the next keyframe. the other 39 never see it because they share no state with the dead one and the mux is configured to proceed without a stalled source.\" 15. reconnect floods logs / hammers camera. \"that's a missing backoff . replace fixed-interval retries with exponential backoff (1s, 2s, 4s… capped at ~30s) plus random jitter so 40 cameras don't retry in lockstep after a network blip. log at decreasing frequency or aggregate ( camera x down, n attempts ). reset the counter on successful reconnect.\" stage 4 — system design 16. see ../06-system-design/worked-example-multicam.md for the full answer. skeleton: clarify (scale/sla/edge-cloud) → estimate (one gpu won't do 50 → edge nodes of ~16) → architecture (nvdec → nvstreammux batch → int8 trt + tracker at edge → metadata to message bus → cloud storage/ui/retraining) → latency budget (find fat slice, p99, gpu util) → crash-proof (isolate, watchdog, backoff, degrade, supervise, bounded memory). curveballs: answers in ../06-system-design/curveballs.md . the pattern: restate constraint → name the tradeoff it stresses → change the minimum → state what you give up. stage 5 — your questions (have 3+ ready) strong ones (signal seniority + genuine fit): \"what's the proprietary vision framework built on — gstreamer/deepstream, or something custom? where does it hurt today?\" \"where's the current bottleneck — decode, inference, network, or the cloud aggregation layer?\" \"how is ownership split between the ml team training models and the systems team running them? where does my role sit?\" \"what does 'crash-proof' currently look like in production — what's your worst recurring failure mode?\" \"what scale are you at now (cameras/sites) and where do you need it to go?\" avoid: questions answered on the careers page, or only about perks. → grade yourself: rubric.md","words":1085},{"path":"08-mock-interview/rubric.md","title":"Self-Grading Rubric","section":"8 · Mock Interview","quiz":false,"html":"<h1 id=\"self-grading-rubric\">Self-Grading Rubric<\/h1>\n<p>Score each answer 1–4. The bar isn't perfection — it's senior-engineer <em>reasoning<\/em>.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Score<\/th><th>Means<\/th><\/tr><\/thead><tbody><tr><td>4<\/td><td>Correct + names the tradeoff + ties to real experience + would convince me<\/td><\/tr><tr><td>3<\/td><td>Correct and clear, but thin on tradeoffs or examples<\/td><\/tr><tr><td>2<\/td><td>Roughly right but vague, missed the key nuance<\/td><\/tr><tr><td>1<\/td><td>Wrong, or couldn't answer<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"what-interviewers-actually-reward-score-yourself-on-these-too\">What interviewers actually reward (score yourself on these too)<\/h2>\n<ul><li><strong>Clarifies before answering<\/strong> design/ambiguous questions (don't assume scale/SLA).<\/li><li><strong>Names tradeoffs<\/strong>, not just \"the answer\" — \"X over Y because…, but the cost is…\".<\/li><li><strong>Thinks out loud<\/strong> — they're scoring your reasoning, not just the conclusion.<\/li><li><strong>Quantifies<\/strong> — \"NVDEC decodes dozens of streams,\" \"INT8 ≈ 3–4×,\" p99 not average.<\/li><li><strong>Connects to real work<\/strong> — Jetson/DeepStream/TensorRT, the NVMe-vs-NAS diagnosis.<\/li><li><strong>Addresses failure unprompted<\/strong> — for any live-systems answer, mention what breaks.<\/li><li><strong>Composure on curveballs<\/strong> — restate, adjust, state the cost. Calm &gt; perfect.<\/li><\/ul>\n<h2 id=\"red-flags-to-self-check\">Red flags to self-check<\/h2>\n<ul><li>Jumped to a solution without clarifying scale/SLA.<\/li><li>Said \"just add a bigger buffer / more RAM\" (unbounded thinking).<\/li><li>Claimed the GIL makes Python useless for video (wrong — natives release it).<\/li><li>Forgot keyframes when discussing reconnect.<\/li><li>No mention of measurement/profiling when asked about performance.<\/li><li>Over-talked. Tight, structured answers beat rambling.<\/li><\/ul>\n<h2 id=\"target-before-the-interview\">Target before the interview<\/h2>\n<ul><li>Stage 2 rapid-fire: <strong>all 4s<\/strong> (these are recall — drill until automatic).<\/li><li>Stage 3 deep dive: at least one topic at <strong>4<\/strong>, the rest <strong>3+<\/strong>.<\/li><li>Stage 4 design: hit all five framework steps + handle 2 curveballs at <strong>3+<\/strong>.<\/li><\/ul>\n<h2 id=\"how-to-practice-this-week\">How to practice this week<\/h2>\n<ol><li>Day 1–2: read sections 01–05, do the drill bank out loud.<\/li><li>Day 3: sections 06 + curveballs; do the design question on a whiteboard.<\/li><li>Day 4: full mock (solo or ask me to run it live), grade, re-drill weak spots.<\/li><li>Morning of: cheat-sheet.md only. Breathe.<\/li><\/ol>\n<p>→ Want me to run this live and grade you? Just say <em>\"run the KoiReader mock.\"<\/em><\/p>","toc":[{"level":2,"id":"what-interviewers-actually-reward-score-yourself-on-these-too","text":"What interviewers actually reward (score yourself on these too)"},{"level":2,"id":"red-flags-to-self-check","text":"Red flags to self-check"},{"level":2,"id":"target-before-the-interview","text":"Target before the interview"},{"level":2,"id":"how-to-practice-this-week","text":"How to practice this week"}],"text":"self-grading rubric score each answer 1–4. the bar isn't perfection — it's senior-engineer reasoning . score means 4 correct + names the tradeoff + ties to real experience + would convince me 3 correct and clear, but thin on tradeoffs or examples 2 roughly right but vague, missed the key nuance 1 wrong, or couldn't answer what interviewers actually reward (score yourself on these too) clarifies before answering design/ambiguous questions (don't assume scale/sla). names tradeoffs , not just \"the answer\" — \"x over y because…, but the cost is…\". thinks out loud — they're scoring your reasoning, not just the conclusion. quantifies — \"nvdec decodes dozens of streams,\" \"int8 ≈ 3–4×,\" p99 not average. connects to real work — jetson/deepstream/tensorrt, the nvme-vs-nas diagnosis. addresses failure unprompted — for any live-systems answer, mention what breaks. composure on curveballs — restate, adjust, state the cost. calm > perfect. red flags to self-check jumped to a solution without clarifying scale/sla. said \"just add a bigger buffer / more ram\" (unbounded thinking). claimed the gil makes python useless for video (wrong — natives release it). forgot keyframes when discussing reconnect. no mention of measurement/profiling when asked about performance. over-talked. tight, structured answers beat rambling. target before the interview stage 2 rapid-fire: all 4s (these are recall — drill until automatic). stage 3 deep dive: at least one topic at 4 , the rest 3+ . stage 4 design: hit all five framework steps + handle 2 curveballs at 3+ . how to practice this week day 1–2: read sections 01–05, do the drill bank out loud. day 3: sections 06 + curveballs; do the design question on a whiteboard. day 4: full mock (solo or ask me to run it live), grade, re-drill weak spots. morning of: cheat-sheet.md only. breathe. → want me to run this live and grade you? just say \"run the koireader mock.\"","words":312},{"path":"09-computer-vision-fundamentals/README.md","title":"Overview","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"09-computer-vision-fundamentals-refresher\">09 — Computer Vision Fundamentals (Refresher)<\/h1>\n<p><strong>TL;DR:<\/strong> The systems sections (01–08) are the <em>job<\/em>. This section is the <em>foundation<\/em> the JD assumes you already have: <em>\"extensive experience with OpenCV and image-processing fundamentals — geometry, color spaces, pixel-level manipulation\"<\/em> and <em>\"command over geometry and statistics for designing complex logic layers on top of model detections.\"<\/em> You've shipped all of this (surround- view, calibration, RANSAC, SIFT/ORB, fisheye). This is the fast refresh.<\/p>\n<h2 id=\"what-the-interview-actually-expects-on-cv\">What the interview actually expects on CV<\/h2>\n<p>This is <strong>not<\/strong> a research/ML-theory grilling (the role is systems-first). Expect:<\/p>\n<ul><li><strong>Rapid-fire fundamentals:<\/strong> \"what's a homography?\", \"BGR vs RGB?\", \"how does NMS<\/li><\/ul>\n<p>work?\", \"what does Canny do?\" — quick, confident answers.<\/p>\n<ul><li><strong>The logic layer:<\/strong> the JD's standout phrase is *\"complex logic layers on top of<\/li><\/ul>\n<p>model detections.\"* This is geometry + statistics over bounding boxes: zones,   counting, line-crossing, mapping image points to the ground plane. <strong>This is the   CV topic most likely to go deep<\/strong> because it's systems-adjacent.<\/p>\n<ul><li><strong>OpenCV practical fluency:<\/strong> you reach for the right function and know its cost<\/li><\/ul>\n<p>(CPU vs GPU, per-pixel vs vectorized).<\/p>\n<h2 id=\"files-in-order\">Files (in order)<\/h2>\n<ol><li><a class=\"mdlink\" data-href=\"image-basics-color-spaces.md\" href=\"#\">image-basics-color-spaces.md<\/a> — pixels, channels, BGR/RGB/YUV/NV12/HSV/gray<\/li><li><a class=\"mdlink\" data-href=\"filtering-morphology-edges.md\" href=\"#\">filtering-morphology-edges.md<\/a> — convolution, blur, threshold, morphology, Sobel/Canny<\/li><li><a class=\"mdlink\" data-href=\"geometry-and-transforms.md\" href=\"#\">geometry-and-transforms.md<\/a> — translation/rotation/scale, affine, perspective, homography<\/li><li><a class=\"mdlink\" data-href=\"camera-calibration.md\" href=\"#\">camera-calibration.md<\/a> — intrinsics/extrinsics, distortion, undistort, fisheye<\/li><li><a class=\"mdlink\" data-href=\"features-and-matching.md\" href=\"#\">features-and-matching.md<\/a> — SIFT/SURF/ORB, matching, RANSAC, epipolar geometry<\/li><li><a class=\"mdlink\" data-href=\"detection-tracking-math.md\" href=\"#\">detection-tracking-math.md<\/a> — IoU, NMS, anchors, mAP, Kalman, SORT/DeepSORT, Hungarian<\/li><li><a class=\"mdlink\" data-href=\"logic-on-detections.md\" href=\"#\">logic-on-detections.md<\/a> — the JD's logic layer: zones, counting, homography to ground<\/li><\/ol>\n<p>→ Quick refresh: <strong><a class=\"mdlink\" data-href=\"cv-cheat-sheet.md\" href=\"#\">cv-cheat-sheet.md<\/a><\/strong> · Start: <strong><a class=\"mdlink\" data-href=\"image-basics-color-spaces.md\" href=\"#\">image-basics-color-spaces.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-the-interview-actually-expects-on-cv","text":"What the interview actually expects on CV"},{"level":2,"id":"files-in-order","text":"Files (in order)"}],"text":"09 — computer vision fundamentals (refresher) tl;dr: the systems sections (01–08) are the job . this section is the foundation the jd assumes you already have: \"extensive experience with opencv and image-processing fundamentals — geometry, color spaces, pixel-level manipulation\" and \"command over geometry and statistics for designing complex logic layers on top of model detections.\" you've shipped all of this (surround- view, calibration, ransac, sift/orb, fisheye). this is the fast refresh. what the interview actually expects on cv this is not a research/ml-theory grilling (the role is systems-first). expect: rapid-fire fundamentals: \"what's a homography?\", \"bgr vs rgb?\", \"how does nms work?\", \"what does canny do?\" — quick, confident answers. the logic layer: the jd's standout phrase is *\"complex logic layers on top of model detections.\"* this is geometry + statistics over bounding boxes: zones, counting, line-crossing, mapping image points to the ground plane. this is the cv topic most likely to go deep because it's systems-adjacent. opencv practical fluency: you reach for the right function and know its cost (cpu vs gpu, per-pixel vs vectorized). files (in order) image-basics-color-spaces.md — pixels, channels, bgr/rgb/yuv/nv12/hsv/gray filtering-morphology-edges.md — convolution, blur, threshold, morphology, sobel/canny geometry-and-transforms.md — translation/rotation/scale, affine, perspective, homography camera-calibration.md — intrinsics/extrinsics, distortion, undistort, fisheye features-and-matching.md — sift/surf/orb, matching, ransac, epipolar geometry detection-tracking-math.md — iou, nms, anchors, map, kalman, sort/deepsort, hungarian logic-on-detections.md — the jd's logic layer: zones, counting, homography to ground → quick refresh: cv-cheat-sheet.md · start: image-basics-color-spaces.md","words":236},{"path":"09-computer-vision-fundamentals/image-basics-color-spaces.md","title":"Image Basics & Color Spaces","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"image-basics-color-spaces\">Image Basics &amp; Color Spaces<\/h1>\n<p><strong>TL;DR:<\/strong> An image is a grid of numbers. A grayscale image is one number per pixel (0–255); a color image is three (or four). The catch that bites everyone: <strong>OpenCV loads images as BGR, not RGB<\/strong>, and <strong>video decoders output YUV/NV12, not RGB<\/strong>. Most \"my model is suddenly inaccurate\" bugs are a color-order or color-space mismatch.<\/p>\n<h2 id=\"the-mental-model\">The mental model<\/h2>\n<p>A photo is a spreadsheet. Each cell is a pixel. Grayscale = one value per cell (brightness). Color = three stacked spreadsheets (channels). The <em>order<\/em> and <em>meaning<\/em> of those channels is the whole game.<\/p>\n<h2 id=\"pixels-channels-dtype\">Pixels, channels, dtype<\/h2>\n<ul><li><strong>Resolution:<\/strong> width × height in pixels. 1080p = 1920×1080.<\/li><li><strong>Channels:<\/strong> grayscale = 1, color = 3 (BGR/RGB), with alpha = 4 (BGRA).<\/li><li><strong>Bit depth / dtype:<\/strong> usually <code>uint8<\/code> (0–255 per channel). Sometimes <code>float32<\/code><\/li><\/ul>\n<p>(0–1) after normalization for a model. A numpy frame is shape <code>(H, W, C)<\/code>.<\/p>\n<ul><li><strong>Pixel-level manipulation<\/strong> = indexing/slicing that array: <code>img[y, x]<\/code> is a<\/li><\/ul>\n<p>pixel, <code>img[100:200, 50:150]<\/code> is a crop (a <em>view<\/em>, not a copy — careful).<\/p>\n<h2 id=\"color-spaces-you-must-name\">Color spaces you must name<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Space<\/th><th>What it is<\/th><th>When<\/th><\/tr><\/thead><tbody><tr><td><strong>BGR<\/strong><\/td><td>OpenCV's default channel order<\/td><td><code>cv2.imread<\/code>, most OpenCV I/O<\/td><\/tr><tr><td><strong>RGB<\/strong><\/td><td>\"Normal\" order<\/td><td>most DL models, PIL, matplotlib<\/td><\/tr><tr><td><strong>Grayscale<\/strong><\/td><td>brightness only, 1 channel<\/td><td>edges, thresholding, classical CV (less data, faster)<\/td><\/tr><tr><td><strong>HSV<\/strong><\/td><td>Hue, Saturation, Value<\/td><td><strong>color-based segmentation<\/strong> — hue is robust to lighting/shadows<\/td><\/tr><tr><td><strong>YUV / YCbCr<\/strong><\/td><td>luma (Y) + chroma (U,V)<\/td><td>how video is <em>stored/transmitted<\/em>; Y is brightness<\/td><\/tr><tr><td><strong>NV12<\/strong><\/td><td>a YUV 4:2:0 layout<\/td><td>what <strong>NVDEC/GStreamer output<\/strong> — convert to BGR for OpenCV<\/td><\/tr><tr><td><strong>LAB<\/strong><\/td><td>perceptually uniform<\/td><td>color difference, white balance, photometric work<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-two-bugs-that-cost-people-offers\">The two bugs that cost people offers<\/h2>\n<ol><li><strong>BGR vs RGB:<\/strong> OpenCV reads BGR; you feed it to an RGB-trained model without<\/li><\/ol>\n<p><code>cv2.cvtColor(img, cv2.COLOR_BGR2RGB)<\/code> → channels swapped → accuracy quietly    tanks (reds become blues). Always confirm the order your model expects.<\/p>\n<ol><li><strong>YUV/NV12 → BGR:<\/strong> decoders emit NV12; your model wants BGR/RGB. The conversion<\/li><\/ol>\n<p>is per-pixel per-frame — do it <strong>on the GPU<\/strong> (<code>nvvidconv<\/code>), not the CPU, or you    re-introduce the copy cost you avoided with hardware decode (see    <a class=\"mdlink\" data-href=\"../01-video-streaming/decode-encode-pipeline.md\" href=\"#\">../01-video-streaming/decode-encode-pipeline.md<\/a>).<\/p>\n<h2 id=\"why-hsv-for-color-tasks-classic-question\">Why HSV for color tasks (classic question)<\/h2>\n<p>In RGB, a \"red\" object under sun vs shadow has very different R,G,B values — all three change with brightness. In <strong>HSV<\/strong>, the <em>hue<\/em> stays roughly constant; only <em>value<\/em> changes. So \"find the red boxes\" is a simple hue range in HSV but a mess in RGB. This is the standard answer to \"why HSV?\"<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Grayscale vs color — when drop to gray?<\/strong> Grayscale = ⅓ the data, faster, and many classical ops (edges, thresholding, template matching) only need brightness. Drop to gray when color carries no signal for the task; keep color when hue/appearance matters (e.g., color classification).<\/p>\n<p><strong>HSV vs RGB for thresholding a colored object?<\/strong> HSV separates color (hue) from brightness (value), so it's robust to lighting; RGB mixes them, so thresholds break under shadow/sun. HSV for color segmentation.<\/p>\n<p><strong>Why does color conversion cost real time in a video pipeline?<\/strong> It's per-pixel, per-frame, every frame. At 30fps × N cameras that's a lot of arithmetic and, if done on CPU, a GPU↔CPU round trip. Convert on the GPU and keep frames there.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"filtering-morphology-edges.md\" href=\"#\">filtering-morphology-edges.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-mental-model","text":"The mental model"},{"level":2,"id":"pixels-channels-dtype","text":"Pixels, channels, dtype"},{"level":2,"id":"color-spaces-you-must-name","text":"Color spaces you must name"},{"level":2,"id":"the-two-bugs-that-cost-people-offers","text":"The two bugs that cost people offers"},{"level":2,"id":"why-hsv-for-color-tasks-classic-question","text":"Why HSV for color tasks (classic question)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"image basics & color spaces tl;dr: an image is a grid of numbers. a grayscale image is one number per pixel (0–255); a color image is three (or four). the catch that bites everyone: opencv loads images as bgr, not rgb , and video decoders output yuv/nv12, not rgb . most \"my model is suddenly inaccurate\" bugs are a color-order or color-space mismatch. the mental model a photo is a spreadsheet. each cell is a pixel. grayscale = one value per cell (brightness). color = three stacked spreadsheets (channels). the order and meaning of those channels is the whole game. pixels, channels, dtype resolution: width × height in pixels. 1080p = 1920×1080. channels: grayscale = 1, color = 3 (bgr/rgb), with alpha = 4 (bgra). bit depth / dtype: usually uint8 (0–255 per channel). sometimes float32 (0–1) after normalization for a model. a numpy frame is shape (h, w, c) . pixel-level manipulation = indexing/slicing that array: img[y, x] is a pixel, img[100:200, 50:150] is a crop (a view , not a copy — careful). color spaces you must name space what it is when bgr opencv's default channel order cv2.imread , most opencv i/o rgb \"normal\" order most dl models, pil, matplotlib grayscale brightness only, 1 channel edges, thresholding, classical cv (less data, faster) hsv hue, saturation, value color-based segmentation — hue is robust to lighting/shadows yuv / ycbcr luma (y) + chroma (u,v) how video is stored/transmitted ; y is brightness nv12 a yuv 4:2:0 layout what nvdec/gstreamer output — convert to bgr for opencv lab perceptually uniform color difference, white balance, photometric work the two bugs that cost people offers bgr vs rgb: opencv reads bgr; you feed it to an rgb-trained model without cv2.cvtcolor(img, cv2.color_bgr2rgb) → channels swapped → accuracy quietly tanks (reds become blues). always confirm the order your model expects. yuv/nv12 → bgr: decoders emit nv12; your model wants bgr/rgb. the conversion is per-pixel per-frame — do it on the gpu ( nvvidconv ), not the cpu, or you re-introduce the copy cost you avoided with hardware decode (see ../01-video-streaming/decode-encode-pipeline.md ). why hsv for color tasks (classic question) in rgb, a \"red\" object under sun vs shadow has very different r,g,b values — all three change with brightness. in hsv , the hue stays roughly constant; only value changes. so \"find the red boxes\" is a simple hue range in hsv but a mess in rgb. this is the standard answer to \"why hsv?\" why x over y grayscale vs color — when drop to gray? grayscale = ⅓ the data, faster, and many classical ops (edges, thresholding, template matching) only need brightness. drop to gray when color carries no signal for the task; keep color when hue/appearance matters (e.g., color classification). hsv vs rgb for thresholding a colored object? hsv separates color (hue) from brightness (value), so it's robust to lighting; rgb mixes them, so thresholds break under shadow/sun. hsv for color segmentation. why does color conversion cost real time in a video pipeline? it's per-pixel, per-frame, every frame. at 30fps × n cameras that's a lot of arithmetic and, if done on cpu, a gpu↔cpu round trip. convert on the gpu and keep frames there. → next: filtering-morphology-edges.md","words":536},{"path":"09-computer-vision-fundamentals/filtering-morphology-edges.md","title":"Filtering, Morphology & Edges","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"filtering-morphology-edges\">Filtering, Morphology &amp; Edges<\/h1>\n<p><strong>TL;DR:<\/strong> Most classical image processing is <strong>convolution<\/strong> — slide a small kernel over the image and compute a weighted sum per pixel. Blur kernels smooth, derivative kernels (Sobel) find edges, Canny chains it into clean edges, and morphology (erode/dilate) cleans up binary masks. You used all of this in surround-view and image-quality work.<\/p>\n<h2 id=\"convolution-a-sliding-window\">Convolution = a sliding window<\/h2>\n<p>A <strong>kernel<\/strong> (e.g., 3×3 weights) slides over every pixel; the output pixel is the weighted sum of its neighborhood. Change the weights, change the effect. This is <em>also<\/em> what a CNN's conv layer does — classical kernels are hand-designed, CNN kernels are learned.<\/p>\n<h2 id=\"blurring-smoothing-and-why\">Blurring / smoothing (and why)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Filter<\/th><th>What<\/th><th>Use<\/th><\/tr><\/thead><tbody><tr><td><strong>Gaussian blur<\/strong><\/td><td>weighted average, center-heavy<\/td><td>denoise, pre-smooth before edge detection<\/td><\/tr><tr><td><strong>Median blur<\/strong><\/td><td>replace pixel with neighborhood median<\/td><td>kills salt-and-pepper noise, preserves edges<\/td><\/tr><tr><td><strong>Bilateral<\/strong><\/td><td>blur but <strong>preserve edges<\/strong> (weights by intensity similarity)<\/td><td>smooth skin/surfaces without losing boundaries<\/td><\/tr><tr><td><strong>Box/average<\/strong><\/td><td>plain mean<\/td><td>fast, crude<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Why blur before edges? Derivatives amplify noise. A little Gaussian first → far cleaner edges. (Canny does this internally.)<\/p>\n<h2 id=\"thresholding-image-binary\">Thresholding (image → binary)<\/h2>\n<p>Turn grayscale into black/white (a mask):<\/p>\n<ul><li><strong>Global threshold:<\/strong> one cutoff. Simple, fails under uneven lighting.<\/li><li><strong>Otsu:<\/strong> auto-picks the threshold from the histogram (bimodal images).<\/li><li><strong>Adaptive:<\/strong> threshold varies per region → handles shadows/gradients. The right<\/li><\/ul>\n<p>choice for real-world lighting.<\/p>\n<h2 id=\"morphology-clean-up-binary-masks\">Morphology (clean up binary masks)<\/h2>\n<p>Operate on the <em>shape<\/em> of white regions with a structuring element:<\/p>\n<ul><li><strong>Erosion<\/strong> — shrinks white regions (removes small specks, thins).<\/li><li><strong>Dilation<\/strong> — grows white regions (fills small holes, thickens).<\/li><li><strong>Opening<\/strong> = erode→dilate — removes small noise blobs.<\/li><li><strong>Closing<\/strong> = dilate→erode — fills small holes/gaps inside objects.<\/li><\/ul>\n<p>You reach for these to clean a segmentation mask before contour/blob analysis.<\/p>\n<h2 id=\"edge-detection\">Edge detection<\/h2>\n<ul><li><strong>Sobel / Scharr<\/strong> — directional first derivatives (gradient in x or y). Magnitude<\/li><\/ul>\n<p>= edge strength, direction = edge orientation.<\/p>\n<ul><li><strong>Laplacian<\/strong> — second derivative; zero-crossings = edges (also a focus/blur<\/li><\/ul>\n<p>measure — variance of Laplacian is a classic sharpness metric, relevant to your   IR image-quality work).<\/p>\n<ul><li><strong>Canny<\/strong> — the gold standard: Gaussian blur → gradients (Sobel) → non-max<\/li><\/ul>\n<p>suppression (thin edges to 1px) → double-threshold + hysteresis (link strong/weak   edges). Output: clean, thin, connected edges.<\/p>\n<h2 id=\"contours-connected-components-after-a-mask\">Contours &amp; connected components (after a mask)<\/h2>\n<ul><li><strong>Contours<\/strong> (<code>findContours<\/code>) — outlines of white regions → area, perimeter,<\/li><\/ul>\n<p>bounding box, shape. Used for blob counting, shape filtering.<\/p>\n<ul><li><strong>Connected components<\/strong> — label each separate white blob with an ID. Good for<\/li><\/ul>\n<p>counting/measuring distinct regions.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Gaussian vs median vs bilateral blur?<\/strong> Gaussian = general denoise/smoothing (but blurs edges). Median = best for salt-and- pepper noise, keeps edges. Bilateral = smooth flat areas <em>and<\/em> keep edges, but slower. Pick by noise type and whether edges must survive.<\/p>\n<p><strong>Global vs adaptive threshold?<\/strong> Global is fast but assumes uniform lighting; it fails on shadows/gradients. Adaptive computes a local threshold per region → robust to uneven lighting. Real scenes → adaptive (or Otsu if the histogram is cleanly bimodal).<\/p>\n<p><strong>Opening vs closing?<\/strong> Opening removes small <em>external<\/em> noise (specks outside objects); closing fills small <em>internal<\/em> holes/gaps. Choose by whether your mask has stray dots (opening) or holes (closing).<\/p>\n<p><strong>Why is Canny better than raw Sobel?<\/strong> Sobel gives thick, noisy gradient magnitudes. Canny adds blur, non-max suppression (1px-thin edges), and hysteresis thresholding (connect real edges, drop noise) → far cleaner, the production default.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"geometry-and-transforms.md\" href=\"#\">geometry-and-transforms.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"convolution-a-sliding-window","text":"Convolution = a sliding window"},{"level":2,"id":"blurring-smoothing-and-why","text":"Blurring / smoothing (and why)"},{"level":2,"id":"thresholding-image-binary","text":"Thresholding (image → binary)"},{"level":2,"id":"morphology-clean-up-binary-masks","text":"Morphology (clean up binary masks)"},{"level":2,"id":"edge-detection","text":"Edge detection"},{"level":2,"id":"contours-connected-components-after-a-mask","text":"Contours &amp; connected components (after a mask)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"filtering, morphology & edges tl;dr: most classical image processing is convolution — slide a small kernel over the image and compute a weighted sum per pixel. blur kernels smooth, derivative kernels (sobel) find edges, canny chains it into clean edges, and morphology (erode/dilate) cleans up binary masks. you used all of this in surround-view and image-quality work. convolution = a sliding window a kernel (e.g., 3×3 weights) slides over every pixel; the output pixel is the weighted sum of its neighborhood. change the weights, change the effect. this is also what a cnn's conv layer does — classical kernels are hand-designed, cnn kernels are learned. blurring / smoothing (and why) filter what use gaussian blur weighted average, center-heavy denoise, pre-smooth before edge detection median blur replace pixel with neighborhood median kills salt-and-pepper noise, preserves edges bilateral blur but preserve edges (weights by intensity similarity) smooth skin/surfaces without losing boundaries box/average plain mean fast, crude why blur before edges? derivatives amplify noise. a little gaussian first → far cleaner edges. (canny does this internally.) thresholding (image → binary) turn grayscale into black/white (a mask): global threshold: one cutoff. simple, fails under uneven lighting. otsu: auto-picks the threshold from the histogram (bimodal images). adaptive: threshold varies per region → handles shadows/gradients. the right choice for real-world lighting. morphology (clean up binary masks) operate on the shape of white regions with a structuring element: erosion — shrinks white regions (removes small specks, thins). dilation — grows white regions (fills small holes, thickens). opening = erode→dilate — removes small noise blobs. closing = dilate→erode — fills small holes/gaps inside objects. you reach for these to clean a segmentation mask before contour/blob analysis. edge detection sobel / scharr — directional first derivatives (gradient in x or y). magnitude = edge strength, direction = edge orientation. laplacian — second derivative; zero-crossings = edges (also a focus/blur measure — variance of laplacian is a classic sharpness metric, relevant to your ir image-quality work). canny — the gold standard: gaussian blur → gradients (sobel) → non-max suppression (thin edges to 1px) → double-threshold + hysteresis (link strong/weak edges). output: clean, thin, connected edges. contours & connected components (after a mask) contours ( findcontours ) — outlines of white regions → area, perimeter, bounding box, shape. used for blob counting, shape filtering. connected components — label each separate white blob with an id. good for counting/measuring distinct regions. why x over y gaussian vs median vs bilateral blur? gaussian = general denoise/smoothing (but blurs edges). median = best for salt-and- pepper noise, keeps edges. bilateral = smooth flat areas and keep edges, but slower. pick by noise type and whether edges must survive. global vs adaptive threshold? global is fast but assumes uniform lighting; it fails on shadows/gradients. adaptive computes a local threshold per region → robust to uneven lighting. real scenes → adaptive (or otsu if the histogram is cleanly bimodal). opening vs closing? opening removes small external noise (specks outside objects); closing fills small internal holes/gaps. choose by whether your mask has stray dots (opening) or holes (closing). why is canny better than raw sobel? sobel gives thick, noisy gradient magnitudes. canny adds blur, non-max suppression (1px-thin edges), and hysteresis thresholding (connect real edges, drop noise) → far cleaner, the production default. → next: geometry-and-transforms.md","words":548},{"path":"09-computer-vision-fundamentals/geometry-and-transforms.md","title":"Geometry & Transforms","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"geometry-transforms\">Geometry &amp; Transforms<\/h1>\n<p><strong>TL;DR:<\/strong> Moving/warping pixels is matrix multiplication on coordinates. Translate, rotate, scale → <strong>affine<\/strong> (2×3, keeps parallel lines). Map a tilted plane to a flat one (or one camera view to another) → <strong>homography / perspective<\/strong> (3×3, parallel lines can converge). Homography is <em>the<\/em> transform behind your surround-view and behind \"map a detection to the floor plane.\"<\/p>\n<h2 id=\"coordinates-and-homogeneous-form\">Coordinates and homogeneous form<\/h2>\n<p>A point is <code>(x, y)<\/code>. To express translation as a matrix multiply, we add a 1: <code>(x, y, 1)<\/code> — <strong>homogeneous coordinates<\/strong>. Then every transform is \"multiply the point by a matrix.\" This is why transforms compose by multiplying matrices.<\/p>\n<h2 id=\"the-ladder-of-2d-transforms\">The ladder of 2D transforms<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Transform<\/th><th>Matrix<\/th><th>Preserves<\/th><th>Degrees of freedom<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td><strong>Translation<\/strong><\/td><td>2×3<\/td><td>everything, just shifts<\/td><td>2<\/td><td>move ROI<\/td><\/tr><tr><td><strong>Euclidean (rigid)<\/strong><\/td><td>2×3<\/td><td>distances, angles<\/td><td>3<\/td><td>rotate + translate<\/td><\/tr><tr><td><strong>Similarity<\/strong><\/td><td>2×3<\/td><td>angles, ratios<\/td><td>4<\/td><td>rotate + uniform scale<\/td><\/tr><tr><td><strong>Affine<\/strong><\/td><td>2×3<\/td><td>parallel lines, ratios<\/td><td>6<\/td><td>shear, non-uniform scale<\/td><\/tr><tr><td><strong>Homography (projective)<\/strong><\/td><td>3×3<\/td><td>straight lines only<\/td><td>8<\/td><td>perspective / plane-to-plane<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"affine-vs-perspective-the-one-they-ask\">Affine vs perspective (the one they ask)<\/h2>\n<ul><li><strong>Affine (<code>warpAffine<\/code>, 2×3):<\/strong> parallel lines stay parallel. Rotation, scaling,<\/li><\/ul>\n<p>shear, translation. Defined by <strong>3 point correspondences<\/strong>.<\/p>\n<ul><li><strong>Perspective / homography (<code>warpPerspective<\/code>, 3×3):<\/strong> parallel lines can<\/li><\/ul>\n<p><strong>converge<\/strong> (like railroad tracks to a vanishing point). Maps any planar quad to   any other quad. Defined by <strong>4 point correspondences<\/strong>. This is what models   perspective/viewpoint change.<\/p>\n<blockquote><p>Rule of thumb: if the camera viewpoint or a tilted plane is involved → <strong>homography<\/strong>. If it's just rotate/scale/shift in-plane → <strong>affine<\/strong>.<\/p><\/blockquote>\n<h2 id=\"homography-in-practice-your-bread-and-butter\">Homography in practice (your bread and butter)<\/h2>\n<p>A homography H (3×3) maps points on one plane to another:<\/p>\n<pre><code>[x']     [x]\n[y'] = H [y]      (then divide by the 3rd coord — the \"perspective divide\")\n[w']     [1]<\/code><\/pre>\n<p>Uses you can cite:<\/p>\n<ul><li><strong>Surround-view / bird's-eye:<\/strong> warp ground-plane pixels from each fisheye camera<\/li><\/ul>\n<p>into a top-down stitched view (perspective projection — literally your resume).<\/p>\n<ul><li><strong>Map detections to the floor:<\/strong> given a camera-to-ground homography, convert a<\/li><\/ul>\n<p>person's foot pixel <code>(x, y)<\/code> to real-world floor coordinates → measure distance,   zones, dwell. (This is the JD's \"logic layers on top of detections\" — see   <a class=\"mdlink\" data-href=\"logic-on-detections.md\" href=\"#\">logic-on-detections.md<\/a>.)<\/p>\n<ul><li><strong>Image stitching / registration:<\/strong> align overlapping views.<\/li><\/ul>\n<p>You estimate H from ≥4 correspondences, usually with <strong>RANSAC<\/strong> to reject outliers (next file).<\/p>\n<h2 id=\"interpolation-the-how-of-warping\">Interpolation (the \"how\" of warping)<\/h2>\n<p>When you warp, output pixels land between input pixels — you interpolate:<\/p>\n<ul><li><strong>Nearest-neighbor<\/strong> — fastest, blocky (use for label/mask maps so you don't<\/li><\/ul>\n<p>invent classes).<\/p>\n<ul><li><strong>Bilinear<\/strong> — smooth, the default for images.<\/li><li><strong>Bicubic / Lanczos<\/strong> — sharper, slower (upscaling quality).<\/li><\/ul>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Affine vs homography?<\/strong> Affine keeps parallel lines (rotate/scale/shear/translate), needs 3 points, 6 DOF. Homography models perspective (parallel lines converge), needs 4 points, 8 DOF. Use homography whenever viewpoint/plane perspective matters; affine for simpler in-plane transforms (cheaper, more stable).<\/p>\n<p><strong>Nearest vs bilinear interpolation?<\/strong> Nearest = fast, no new values invented (mandatory for segmentation masks/label maps). Bilinear = smooth and the default for photographic images. Never bilinear- interpolate a class-label map — it fabricates non-existent classes at boundaries.<\/p>\n<p><strong>Why homogeneous coordinates at all?<\/strong> They let translation <em>and<\/em> projection be expressed as a single matrix multiply, so transforms compose by multiplication and perspective (the divide by w) falls out naturally. Without them, translation isn't linear.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"camera-calibration.md\" href=\"#\">camera-calibration.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"coordinates-and-homogeneous-form","text":"Coordinates and homogeneous form"},{"level":2,"id":"the-ladder-of-2d-transforms","text":"The ladder of 2D transforms"},{"level":2,"id":"affine-vs-perspective-the-one-they-ask","text":"Affine vs perspective (the one they ask)"},{"level":2,"id":"homography-in-practice-your-bread-and-butter","text":"Homography in practice (your bread and butter)"},{"level":2,"id":"interpolation-the-how-of-warping","text":"Interpolation (the \"how\" of warping)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"geometry & transforms tl;dr: moving/warping pixels is matrix multiplication on coordinates. translate, rotate, scale → affine (2×3, keeps parallel lines). map a tilted plane to a flat one (or one camera view to another) → homography / perspective (3×3, parallel lines can converge). homography is the transform behind your surround-view and behind \"map a detection to the floor plane.\" coordinates and homogeneous form a point is (x, y) . to express translation as a matrix multiply, we add a 1: (x, y, 1) — homogeneous coordinates . then every transform is \"multiply the point by a matrix.\" this is why transforms compose by multiplying matrices. the ladder of 2d transforms transform matrix preserves degrees of freedom example translation 2×3 everything, just shifts 2 move roi euclidean (rigid) 2×3 distances, angles 3 rotate + translate similarity 2×3 angles, ratios 4 rotate + uniform scale affine 2×3 parallel lines, ratios 6 shear, non-uniform scale homography (projective) 3×3 straight lines only 8 perspective / plane-to-plane affine vs perspective (the one they ask) affine ( warpaffine , 2×3): parallel lines stay parallel. rotation, scaling, shear, translation. defined by 3 point correspondences . perspective / homography ( warpperspective , 3×3): parallel lines can converge (like railroad tracks to a vanishing point). maps any planar quad to any other quad. defined by 4 point correspondences . this is what models perspective/viewpoint change. rule of thumb: if the camera viewpoint or a tilted plane is involved → homography . if it's just rotate/scale/shift in-plane → affine . homography in practice (your bread and butter) a homography h (3×3) maps points on one plane to another: [x'] [x] [y'] = h [y] (then divide by the 3rd coord — the \"perspective divide\") [w'] [1] uses you can cite: surround-view / bird's-eye: warp ground-plane pixels from each fisheye camera into a top-down stitched view (perspective projection — literally your resume). map detections to the floor: given a camera-to-ground homography, convert a person's foot pixel (x, y) to real-world floor coordinates → measure distance, zones, dwell. (this is the jd's \"logic layers on top of detections\" — see logic-on-detections.md .) image stitching / registration: align overlapping views. you estimate h from ≥4 correspondences, usually with ransac to reject outliers (next file). interpolation (the \"how\" of warping) when you warp, output pixels land between input pixels — you interpolate: nearest-neighbor — fastest, blocky (use for label/mask maps so you don't invent classes). bilinear — smooth, the default for images. bicubic / lanczos — sharper, slower (upscaling quality). why x over y affine vs homography? affine keeps parallel lines (rotate/scale/shear/translate), needs 3 points, 6 dof. homography models perspective (parallel lines converge), needs 4 points, 8 dof. use homography whenever viewpoint/plane perspective matters; affine for simpler in-plane transforms (cheaper, more stable). nearest vs bilinear interpolation? nearest = fast, no new values invented (mandatory for segmentation masks/label maps). bilinear = smooth and the default for photographic images. never bilinear- interpolate a class-label map — it fabricates non-existent classes at boundaries. why homogeneous coordinates at all? they let translation and projection be expressed as a single matrix multiply, so transforms compose by multiplication and perspective (the divide by w) falls out naturally. without them, translation isn't linear. → next: camera-calibration.md","words":535},{"path":"09-computer-vision-fundamentals/camera-calibration.md","title":"Camera Calibration","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"camera-calibration-distortion\">Camera Calibration &amp; Distortion<\/h1>\n<p><strong>TL;DR:<\/strong> A real camera bends straight lines (lens distortion) and has its own geometry (focal length, optical center). <strong>Calibration<\/strong> recovers those numbers so you can <em>undistort<\/em> images and connect pixels to real-world geometry. <strong>Intrinsics<\/strong> = the camera's internal parameters; <strong>extrinsics<\/strong> = where the camera sits in the world. You did exactly this in surround-view (fisheye correction + calibration).<\/p>\n<h2 id=\"intrinsics-vs-extrinsics\">Intrinsics vs extrinsics<\/h2>\n<ul><li><strong>Intrinsics (K, 3×3):<\/strong> focal lengths <code>(fx, fy)<\/code>, principal point <code>(cx, cy)<\/code>,<\/li><\/ul>\n<p>skew. Fixed per camera+lens. Maps 3D camera-space rays to image pixels.<\/p>\n<ul><li><strong>Distortion coefficients:<\/strong> radial (<code>k1, k2, k3<\/code>) — barrel/pincushion bending —<\/li><\/ul>\n<p>and tangential (<code>p1, p2<\/code>) — lens not perfectly parallel to sensor.<\/p>\n<ul><li><strong>Extrinsics (R, t):<\/strong> rotation + translation — the camera's pose in world<\/li><\/ul>\n<p>coordinates. Changes if you move the camera.<\/p>\n<p>The full pinhole model: <code>pixel = K · [R | t] · world_point<\/code> (in homogeneous coords).<\/p>\n<h2 id=\"distortion-why-straight-lines-curve\">Distortion (why straight lines curve)<\/h2>\n<ul><li><strong>Radial:<\/strong> straight lines bow outward (<strong>barrel<\/strong>, common on wide/fisheye) or<\/li><\/ul>\n<p>inward (<strong>pincushion<\/strong>). Worse toward image edges.<\/p>\n<ul><li><strong>Tangential:<\/strong> from lens/sensor misalignment; mild skew.<\/li><li><strong>Undistortion<\/strong> (<code>cv2.undistort<\/code> / <code>initUndistortRectifyMap<\/code> + <code>remap<\/code>): uses K +<\/li><\/ul>\n<p>distortion coeffs to straighten the image. Do geometry-dependent logic <em>after<\/em>   undistorting. For per-frame video, precompute the remap once and reuse — don't   recompute the maps every frame.<\/p>\n<h2 id=\"how-calibration-works-the-procedure\">How calibration works (the procedure)<\/h2>\n<p>Show a known pattern (chessboard / ChArUco) at many angles, detect its corners, and solve for K + distortion that best explain where those known 3D points land in 2D. <code>cv2.calibrateCamera<\/code> returns K, distortion, and per-view R,t. <strong>Reprojection error<\/strong> (in pixels) tells you how good the calibration is — under ~0.5px is good.<\/p>\n<h2 id=\"fisheye-your-surround-view-domain\">Fisheye (your surround-view domain)<\/h2>\n<p>Fisheye lenses have extreme radial distortion — the standard pinhole model breaks, so OpenCV has a dedicated <strong><code>cv2.fisheye<\/code><\/strong> model. Pipeline for surround-view: fisheye undistort → perspective project each camera to the ground plane (homography) → stitch into a bird's-eye view → blend seams (photometric alignment so brightness matches across cameras — literally on your resume). Great concrete story to tell.<\/p>\n<h2 id=\"why-it-matters-for-koireader\">Why it matters for KoiReader<\/h2>\n<p>Warehouse/supply-chain cameras are often wide-angle and mounted at awkward angles. To turn a detection into <em>real-world meaning<\/em> (which loading bay? how far apart? did it cross this line on the floor?), you need calibration + a ground-plane homography. That's the bridge from \"the model found a box\" to \"the box is in zone 3\" — the logic layer the JD prizes.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Pinhole vs fisheye model?<\/strong> Pinhole handles normal/mild lenses with radial+tangential coeffs. Fisheye lenses distort too severely for that model, so use OpenCV's dedicated fisheye model — using pinhole on a fisheye leaves big residual distortion at the edges.<\/p>\n<p><strong>Undistort every frame vs precompute maps?<\/strong> <code>cv2.undistort<\/code> recomputes the mapping each call (wasteful per-frame). For video, build the remap once with <code>initUndistortRectifyMap<\/code> and apply <code>cv2.remap<\/code> each frame — same result, far cheaper, ideally on GPU.<\/p>\n<p><strong>Why undistort before measuring geometry?<\/strong> Distortion bends straight lines, so any distance/angle/zone math on a distorted image is wrong, worst at the edges. Undistort first, then the homography-to-ground math is valid.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"features-and-matching.md\" href=\"#\">features-and-matching.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"intrinsics-vs-extrinsics","text":"Intrinsics vs extrinsics"},{"level":2,"id":"distortion-why-straight-lines-curve","text":"Distortion (why straight lines curve)"},{"level":2,"id":"how-calibration-works-the-procedure","text":"How calibration works (the procedure)"},{"level":2,"id":"fisheye-your-surround-view-domain","text":"Fisheye (your surround-view domain)"},{"level":2,"id":"why-it-matters-for-koireader","text":"Why it matters for KoiReader"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"camera calibration & distortion tl;dr: a real camera bends straight lines (lens distortion) and has its own geometry (focal length, optical center). calibration recovers those numbers so you can undistort images and connect pixels to real-world geometry. intrinsics = the camera's internal parameters; extrinsics = where the camera sits in the world. you did exactly this in surround-view (fisheye correction + calibration). intrinsics vs extrinsics intrinsics (k, 3×3): focal lengths (fx, fy) , principal point (cx, cy) , skew. fixed per camera+lens. maps 3d camera-space rays to image pixels. distortion coefficients: radial ( k1, k2, k3 ) — barrel/pincushion bending — and tangential ( p1, p2 ) — lens not perfectly parallel to sensor. extrinsics (r, t): rotation + translation — the camera's pose in world coordinates. changes if you move the camera. the full pinhole model: pixel = k · [r | t] · world_point (in homogeneous coords). distortion (why straight lines curve) radial: straight lines bow outward ( barrel , common on wide/fisheye) or inward ( pincushion ). worse toward image edges. tangential: from lens/sensor misalignment; mild skew. undistortion ( cv2.undistort / initundistortrectifymap + remap ): uses k + distortion coeffs to straighten the image. do geometry-dependent logic after undistorting. for per-frame video, precompute the remap once and reuse — don't recompute the maps every frame. how calibration works (the procedure) show a known pattern (chessboard / charuco) at many angles, detect its corners, and solve for k + distortion that best explain where those known 3d points land in 2d. cv2.calibratecamera returns k, distortion, and per-view r,t. reprojection error (in pixels) tells you how good the calibration is — under ~0.5px is good. fisheye (your surround-view domain) fisheye lenses have extreme radial distortion — the standard pinhole model breaks, so opencv has a dedicated cv2.fisheye model. pipeline for surround-view: fisheye undistort → perspective project each camera to the ground plane (homography) → stitch into a bird's-eye view → blend seams (photometric alignment so brightness matches across cameras — literally on your resume). great concrete story to tell. why it matters for koireader warehouse/supply-chain cameras are often wide-angle and mounted at awkward angles. to turn a detection into real-world meaning (which loading bay? how far apart? did it cross this line on the floor?), you need calibration + a ground-plane homography. that's the bridge from \"the model found a box\" to \"the box is in zone 3\" — the logic layer the jd prizes. why x over y pinhole vs fisheye model? pinhole handles normal/mild lenses with radial+tangential coeffs. fisheye lenses distort too severely for that model, so use opencv's dedicated fisheye model — using pinhole on a fisheye leaves big residual distortion at the edges. undistort every frame vs precompute maps? cv2.undistort recomputes the mapping each call (wasteful per-frame). for video, build the remap once with initundistortrectifymap and apply cv2.remap each frame — same result, far cheaper, ideally on gpu. why undistort before measuring geometry? distortion bends straight lines, so any distance/angle/zone math on a distorted image is wrong, worst at the edges. undistort first, then the homography-to-ground math is valid. → next: features-and-matching.md","words":517},{"path":"09-computer-vision-fundamentals/features-and-matching.md","title":"Features & Matching","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"features-matching-epipolar-geometry\">Features, Matching &amp; Epipolar Geometry<\/h1>\n<p><strong>TL;DR:<\/strong> A <strong>feature<\/strong> is a distinctive, repeatable point (a corner, not a flat wall). You <strong>detect<\/strong> keypoints, <strong>describe<\/strong> them as vectors, then <strong>match<\/strong> descriptors across images to find correspondences. Because matches are noisy, <strong>RANSAC<\/strong> robustly fits the transform (homography / fundamental matrix) while ignoring outliers. This underpins stitching, tracking init, and multi-view geometry — all on your resume (SIFT/SURF/ORB, RANSAC, fundamental/essential matrix).<\/p>\n<h2 id=\"why-corners-not-edges-or-flat-areas\">Why corners, not edges or flat areas<\/h2>\n<p>A flat patch looks like every other flat patch — you can't localize it. An edge is ambiguous <em>along<\/em> the edge. A <strong>corner<\/strong> is unique in both directions → repeatable and matchable. That's the Harris corner intuition: large intensity change in <em>all<\/em> directions.<\/p>\n<h2 id=\"detect-describe-match\">Detect → Describe → Match<\/h2>\n<ol><li><strong>Detect keypoints<\/strong> — find corners/blobs (Harris, FAST, DoG).<\/li><li><strong>Describe<\/strong> — encode each keypoin

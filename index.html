 tee fans one stream to many branches — give every branch its own queue queue tuning: leaky for live, blocking for recorded queue max-size-buffers=2 leaky=downstream = \"keep at most 2, drop the oldest when full\" — the live-video default (latest frame wins). leaky=no (block) is for recorded/offline where you must not lose a frame. this is the backpressure policy from section 01 expressed as element properties. max-size-time and max-size-bytes are alternative bound dimensions (set unused ones to 0). debugging: the two commands you'll name in the interview # 1) verbose internals — caps negotiated, state changes, the actual error: gst_debug= 3 gst-launch-1.0 rtspsrc location=... ! ... # bump to 4–5 for more # 2) dump the pipeline graph to a .dot (visualize what linked to what): gst_debug_dump_dot_dir=/tmp gst-launch-1.0 ... # then: dot -tpng pipeline.dot mentioning gst_debug levels and the .dot graph dump is a strong \"i've actually debugged these\" signal. gst-inspect-1.0 <element> (list an element's pads, caps, and properties) is the third one to name. why x over y gstreamer vs ffmpeg (the cli/lib)? ffmpeg is a swiss-army transcoder — unbeatable for \"convert/clip this file\" and great as a decode library. gstreamer is a pipeline framework for live, branching, multi-stream, plugin-extensible apps with fine threading control. koireader wants live multi-stream graphs with inference inside → gstreamer (and deepstream is built on it). many shops use ffmpeg for ingest/clip and gstreamer for the live serving graph. why use queue elements at all? without them the whole pipeline is one thread: a slow decoder stalls the source. queue puts a thread boundary + bounded buffer between stages so they run concurrently and you control drop policy. how do you detect a camera went down? watch the bus for error / eos , and/or run a watchdog on frame timestamps. on failure, tear the pipeline to null and rebuild (reconnect) — see fault tolerance . → next: appsink-and-python.md","words":1361},{"path":"02-gstreamer/appsink-and-python.md","title":"appsink & Python","section":"2 · GStreamer","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"getting-frames-into-python-appsink\">Getting Frames into Python: appsink<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> <code>appsink<\/code> is the element that hands buffers <em>out of<\/em> the pipeline into your Python code; <code>appsrc<\/code> pushes frames <em>in<\/em>. The trick is to pull frames without copying more than necessary and without letting the buffer grow. Configure <code>appsink<\/code> with <code>max-buffers=1 drop=true<\/code> and you have a \"latest frame only\" tap.<\/div><\/div>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 160\" role=\"img\" aria-label=\"appsink is the pipeline's exit into Python — a 'latest frame only' tap\"><rect class=\"dg-box\" x=\"12\" y=\"60\" width=\"150\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"87\" y=\"94\" text-anchor=\"middle\">… decode ! convert<\/text><line class=\"dg-line\" x1=\"162\" y1=\"89\" x2=\"217\" y2=\"89\"/><polygon class=\"dg-arrow\" points=\"217,84 224,89 217,94\"/><rect class=\"dg-box dg-hot\" x=\"224\" y=\"60\" width=\"160\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"304\" y=\"84\" text-anchor=\"middle\">appsink<\/text><text class=\"dg-sub\" x=\"304\" y=\"103\" text-anchor=\"middle\">max-buffers=1 drop=true<\/text><text class=\"dg-accent-tx\" x=\"446\" y=\"82\" text-anchor=\"middle\">numpy<\/text><line class=\"dg-line\" x1=\"384\" y1=\"89\" x2=\"501\" y2=\"89\"/><polygon class=\"dg-arrow\" points=\"501,84 508,89 501,94\"/><rect class=\"dg-box\" x=\"508\" y=\"60\" width=\"150\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"583\" y=\"87\" text-anchor=\"middle\">your model<\/text><text class=\"dg-sub\" x=\"583\" y=\"104\" text-anchor=\"middle\">infer<\/text><text class=\"dg-sub\" x=\"304\" y=\"142\" text-anchor=\"middle\">drops stale frames under load → bounded memory, minimal lag<\/text><\/svg><figcaption>appsink is the pipeline's exit into Python — a \"latest frame only\" tap<\/figcaption><\/figure>\n<h2 id=\"two-ways-to-consume\">Two ways to consume<\/h2>\n<p><strong>A) Via OpenCV (quick):<\/strong><\/p>\n<pre><code class=\"language-python\">pipeline = (\n    <span class=\"tok-string\">\"rtspsrc location=rtsp://cam latency=100 protocols=tcp ! \"<\/span>\n    <span class=\"tok-string\">\"rtph264depay ! h264parse ! nvv4l2decoder ! \"<\/span>\n    <span class=\"tok-string\">\"nvvidconv ! video/x-raw,format=BGRx ! videoconvert ! \"<\/span>\n    <span class=\"tok-string\">\"video/x-raw,format=BGR ! appsink drop=1 max-buffers=1 sync=false\"<\/span>\n)\ncap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(pipeline, <span class=\"tok-builtin\">cv2<\/span>.CAP_GSTREAMER)\n<span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n    ok, frame = cap.read()   <span class=\"tok-comment\"># frame is a BGR numpy array<\/span>\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:\n        <span class=\"tok-keyword\">break<\/span>                <span class=\"tok-comment\"># → trigger reconnect logic<\/span><\/code><\/pre>\n<p><strong>B) Via GObject/Gst directly (full control):<\/strong><\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">gi<\/span>; <span class=\"tok-builtin\">gi<\/span>.require_version(<span class=\"tok-string\">\"Gst\"<\/span>, <span class=\"tok-string\">\"1.0\"<\/span>)\n<span class=\"tok-keyword\">from<\/span> <span class=\"tok-builtin\">gi<\/span>.repository <span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">Gst<\/span>\n<span class=\"tok-builtin\">Gst<\/span>.init(<span class=\"tok-keyword\">None<\/span>)\n\nappsink = pipeline.get_by_name(<span class=\"tok-string\">\"sink\"<\/span>)\nappsink.set_property(<span class=\"tok-string\">\"emit-signals\"<\/span>, <span class=\"tok-keyword\">True<\/span>)\nappsink.set_property(<span class=\"tok-string\">\"max-buffers\"<\/span>, <span class=\"tok-number\">1<\/span>)\nappsink.set_property(<span class=\"tok-string\">\"drop\"<\/span>, <span class=\"tok-keyword\">True<\/span>)\n\n<span class=\"tok-keyword\">def<\/span> on_new_sample(sink):\n    sample = sink.emit(<span class=\"tok-string\">\"pull-sample\"<\/span>)\n    buf = sample.get_buffer()\n    caps = sample.get_caps()\n    ok, mapinfo = buf.<span class=\"tok-builtin\">map<\/span>(<span class=\"tok-builtin\">Gst<\/span>.MapFlags.READ)\n    <span class=\"tok-keyword\">try<\/span>:\n        frame = <span class=\"tok-builtin\">np<\/span>.ndarray(\n            (height, width, <span class=\"tok-number\">3<\/span>), buffer=mapinfo.data, dtype=<span class=\"tok-builtin\">np<\/span>.uint8\n        )\n        handle(frame.copy())   <span class=\"tok-comment\"># copy if you keep it past this callback<\/span>\n    <span class=\"tok-keyword\">finally<\/span>:\n        buf.unmap(mapinfo)     <span class=\"tok-comment\"># ALWAYS unmap — else you leak buffers<\/span>\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">Gst<\/span>.FlowReturn.OK\n\nappsink.connect(<span class=\"tok-string\">\"new-sample\"<\/span>, on_new_sample)<\/code><\/pre>\n<p>The <code>buf.unmap()<\/code> in a <code>finally<\/code> is the kind of detail that separates \"used it once\" from \"ran it in production.\" Forgetting it is a textbook leak.<\/p>\n<h2 id=\"syncfalse-the-latency-knob\">sync=false (the latency knob)<\/h2>\n<p>By default a sink waits for each buffer's presentation time (<code>sync=true<\/code>) to play at real-time speed. For inference you usually want frames <strong>as fast as available<\/strong> → <code>sync=false<\/code>. Combined with <code>drop=true max-buffers=1<\/code>, you always process the newest frame with minimal lag.<\/p>\n<h2 id=\"the-glib-main-loop-the-part-tutorials-skip\">The GLib main loop (the part tutorials skip)<\/h2>\n<p>The signal-based appsink (<code>emit-signals=True<\/code>, <code>new-sample<\/code>) only fires while a <strong>GLib main loop<\/strong> is running — that's the event loop that dispatches GStreamer callbacks and bus messages. A real app structure:<\/p>\n<pre><code class=\"language-python\">loop = <span class=\"tok-builtin\">GLib<\/span>.MainLoop()\nbus = pipeline.get_bus()\nbus.add_signal_watch()\nbus.connect(<span class=\"tok-string\">\"message\"<\/span>, on_bus_message, loop)   <span class=\"tok-comment\"># handle ERROR/EOS → loop.quit()<\/span>\npipeline.set_state(<span class=\"tok-builtin\">Gst<\/span>.State.PLAYING)\n<span class=\"tok-keyword\">try<\/span>:\n    loop.run()                                  <span class=\"tok-comment\"># blocks; callbacks fire here<\/span>\n<span class=\"tok-keyword\">finally<\/span>:\n    pipeline.set_state(<span class=\"tok-builtin\">Gst<\/span>.State.NULL)          <span class=\"tok-comment\"># ALWAYS tear down to free NVDEC/GPU<\/span><\/code><\/pre>\n<p>Two things interviewers probe: (1) the main loop runs on its own thread so your inference can run elsewhere, and (2) you <strong>must<\/strong> set state to NULL on exit or you leak the hardware decoder session — on Jetson that means the next run fails to open NVDEC.<\/p>\n<h2 id=\"zero-copy-and-nvmm-memory-the-senior-level-detail\">Zero-copy and NVMM memory (the senior-level detail)<\/h2>\n<p>On Jetson/dGPU the decoder (<code>nvv4l2decoder<\/code>) outputs <strong>NVMM<\/strong> buffers — memory that lives on the GPU. Pull those straight to <code>appsink<\/code> and the numpy <code>frame<\/code> you get is <strong>already a CPU copy<\/strong> the moment you map it, because numpy/OpenCV are CPU. The expensive mistake is bouncing GPU→CPU→GPU around inference.<\/p>\n<p>Two ways to stay fast:<\/p>\n<ul><li><strong>Keep it on the GPU<\/strong>: do conversion/scaling with <code>nvvideoconvert<\/code> and run<\/li><\/ul>\n<p>inference (TensorRT/DeepStream) on the NVMM buffer — never pull pixels to Python   at all; read <em>metadata<\/em> via a pad probe instead (<a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a>).<\/p>\n<ul><li><strong>If you must touch pixels in Python<\/strong>, map once, <code>.copy()<\/code> once, and push the<\/li><\/ul>\n<p>result back through a single <code>appsrc<\/code> — don't ping-pong.<\/p>\n<blockquote><p>One-liner for the interview: <em>\"appsink is a CPU exit. If the work can stay on the GPU, I keep buffers in NVMM and read DeepStream metadata in a probe rather than pulling frames to numpy — that's the zero-copy path. I only use appsink when I genuinely need pixels in Python.\"<\/em><\/p><\/blockquote>\n<h2 id=\"appsrc-pushing-frames-back-in\">appsrc (pushing frames back in)<\/h2>\n<p>When you've annotated a frame and want to encode/stream it out, push it into an <code>appsrc<\/code> feeding <code>nvv4l2h264enc ! rtspclientsink<\/code>/<code>webrtcbin<\/code>. You must set caps and timestamps (PTS) correctly or downstream stalls or runs at the wrong speed.<\/p>\n<pre><code class=\"language-python\">appsrc.set_property(<span class=\"tok-string\">\"format\"<\/span>, <span class=\"tok-builtin\">Gst<\/span>.Format.TIME)       <span class=\"tok-comment\"># timestamps are in nanoseconds<\/span>\nappsrc.set_property(<span class=\"tok-string\">\"is-live\"<\/span>, <span class=\"tok-keyword\">True<\/span>)                 <span class=\"tok-comment\"># live source semantics<\/span>\nappsrc.set_property(<span class=\"tok-string\">\"do-timestamp\"<\/span>, <span class=\"tok-keyword\">True<\/span>)            <span class=\"tok-comment\"># let it stamp arrival time<\/span>\ncaps = <span class=\"tok-builtin\">Gst<\/span>.Caps.from_string(<span class=\"tok-string\">\"video/x-raw,format=BGR,width=1920,height=1080,framerate=30/1\"<\/span>)\nappsrc.set_property(<span class=\"tok-string\">\"caps\"<\/span>, caps)\n\nbuf = <span class=\"tok-builtin\">Gst<\/span>.Buffer.new_wrapped(frame.tobytes())\nbuf.pts = frame_index * <span class=\"tok-builtin\">Gst<\/span>.SECOND // <span class=\"tok-number\">30<\/span>             <span class=\"tok-comment\"># explicit PTS if not auto<\/span>\nbuf.duration = <span class=\"tok-builtin\">Gst<\/span>.SECOND // <span class=\"tok-number\">30<\/span>\nappsrc.emit(<span class=\"tok-string\">\"push-buffer\"<\/span>, buf)<\/code><\/pre>\n<p>Get PTS wrong and the downstream encoder either stalls (waiting for \"future\" timestamps) or sprints (timestamps in the past). Honoring <strong><code>need-data<\/code>/<code>enough-data<\/code><\/strong> signals from appsrc is how you respect downstream backpressure instead of overrunning the encoder.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>appsink vs cv2.VideoCapture?<\/strong> <code>VideoCapture<\/code> <em>uses<\/em> an appsink internally but hides it. Direct appsink gives you the callback, GPU buffer access, explicit unmap, and zero-copy options. Prototype with VideoCapture; use direct appsink when you need control or zero-copy.<\/p>\n<p><strong>Why <code>.copy()<\/code> the numpy frame in the callback?<\/strong> The numpy array points into GStreamer's mapped buffer memory. Once you <code>unmap<\/code>/ return, that memory is recycled — keeping the array without copying = corruption. Copy if the frame outlives the callback (e.g., goes into a queue).<\/p>\n<p><strong>Why <code>max-buffers=1 drop=true<\/code>?<\/strong> It makes appsink a \"latest frame\" tap: if your consumer lags, GStreamer drops stale frames instead of queuing them → bounded memory, minimal latency. This is the backpressure policy from section 01 expressed in one line.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"two-ways-to-consume","text":"Two ways to consume"},{"level":2,"id":"syncfalse-the-latency-knob","text":"sync=false (the latency knob)"},{"level":2,"id":"the-glib-main-loop-the-part-tutorials-skip","text":"The GLib main loop (the part tutorials skip)"},{"level":2,"id":"zero-copy-and-nvmm-memory-the-senior-level-detail","text":"Zero-copy and NVMM memory (the senior-level detail)"},{"level":2,"id":"appsrc-pushing-frames-back-in","text":"appsrc (pushing frames back in)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"getting frames into python: appsink 💡 tl;dr appsink is the element that hands buffers out of the pipeline into your python code; appsrc pushes frames in . the trick is to pull frames without copying more than necessary and without letting the buffer grow. configure appsink with max-buffers=1 drop=true and you have a \"latest frame only\" tap. … decode ! convert appsink max-buffers=1 drop=true numpy your model infer drops stale frames under load → bounded memory, minimal lag appsink is the pipeline's exit into python — a \"latest frame only\" tap two ways to consume a) via opencv (quick): pipeline = ( \"rtspsrc location=rtsp://cam latency=100 protocols=tcp ! \" \"rtph264depay ! h264parse ! nvv4l2decoder ! \" \"nvvidconv ! video/x-raw,format=bgrx ! videoconvert ! \" \"video/x-raw,format=bgr ! appsink drop=1 max-buffers=1 sync=false\" ) cap = cv2 .videocapture(pipeline, cv2 .cap_gstreamer) while true : ok, frame = cap.read() # frame is a bgr numpy array if not ok: break # → trigger reconnect logic b) via gobject/gst directly (full control): import gi ; gi .require_version( \"gst\" , \"1.0\" ) from gi .repository import gst gst .init( none ) appsink = pipeline.get_by_name( \"sink\" ) appsink.set_property( \"emit-signals\" , true ) appsink.set_property( \"max-buffers\" , 1 ) appsink.set_property( \"drop\" , true ) def on_new_sample(sink): sample = sink.emit( \"pull-sample\" ) buf = sample.get_buffer() caps = sample.get_caps() ok, mapinfo = buf. map ( gst .mapflags.read) try : frame = np .ndarray( (height, width, 3 ), buffer=mapinfo.data, dtype= np .uint8 ) handle(frame.copy()) # copy if you keep it past this callback finally : buf.unmap(mapinfo) # always unmap — else you leak buffers return gst .flowreturn.ok appsink.connect( \"new-sample\" , on_new_sample) the buf.unmap() in a finally is the kind of detail that separates \"used it once\" from \"ran it in production.\" forgetting it is a textbook leak. sync=false (the latency knob) by default a sink waits for each buffer's presentation time ( sync=true ) to play at real-time speed. for inference you usually want frames as fast as available → sync=false . combined with drop=true max-buffers=1 , you always process the newest frame with minimal lag. the glib main loop (the part tutorials skip) the signal-based appsink ( emit-signals=true , new-sample ) only fires while a glib main loop is running — that's the event loop that dispatches gstreamer callbacks and bus messages. a real app structure: loop = glib .mainloop() bus = pipeline.get_bus() bus.add_signal_watch() bus.connect( \"message\" , on_bus_message, loop) # handle error/eos → loop.quit() pipeline.set_state( gst .state.playing) try : loop.run() # blocks; callbacks fire here finally : pipeline.set_state( gst .state.null) # always tear down to free nvdec/gpu two things interviewers probe: (1) the main loop runs on its own thread so your inference can run elsewhere, and (2) you must set state to null on exit or you leak the hardware decoder session — on jetson that means the next run fails to open nvdec. zero-copy and nvmm memory (the senior-level detail) on jetson/dgpu the decoder ( nvv4l2decoder ) outputs nvmm buffers — memory that lives on the gpu. pull those straight to appsink and the numpy frame you get is already a cpu copy the moment you map it, because numpy/opencv are cpu. the expensive mistake is bouncing gpu→cpu→gpu around inference. two ways to stay fast: keep it on the gpu : do conversion/scaling with nvvideoconvert and run inference (tensorrt/deepstream) on the nvmm buffer — never pull pixels to python at all; read metadata via a pad probe instead ( deepstream.md ). if you must touch pixels in python , map once, .copy() once, and push the result back through a single appsrc — don't ping-pong. one-liner for the interview: \"appsink is a cpu exit. if the work can stay on the gpu, i keep buffers in nvmm and read deepstream metadata in a probe rather than pulling frames to numpy — that's the zero-copy path. i only use appsink when i genuinely need pixels in python.\" appsrc (pushing frames back in) when you've annotated a frame and want to encode/stream it out, push it into an appsrc feeding nvv4l2h264enc ! rtspclientsink / webrtcbin . you must set caps and timestamps (pts) correctly or downstream stalls or runs at the wrong speed. appsrc.set_property( \"format\" , gst .format.time) # timestamps are in nanoseconds appsrc.set_property( \"is-live\" , true ) # live source semantics appsrc.set_property( \"do-timestamp\" , true ) # let it stamp arrival time caps = gst .caps.from_string( \"video/x-raw,format=bgr,width=1920,height=1080,framerate=30/1\" ) appsrc.set_property( \"caps\" , caps) buf = gst .buffer.new_wrapped(frame.tobytes()) buf.pts = frame_index * gst .second // 30 # explicit pts if not auto buf.duration = gst .second // 30 appsrc.emit( \"push-buffer\" , buf) get pts wrong and the downstream encoder either stalls (waiting for \"future\" timestamps) or sprints (timestamps in the past). honoring need-data / enough-data signals from appsrc is how you respect downstream backpressure instead of overrunning the encoder. why x over y appsink vs cv2.videocapture? videocapture uses an appsink internally but hides it. direct appsink gives you the callback, gpu buffer access, explicit unmap, and zero-copy options. prototype with videocapture; use direct appsink when you need control or zero-copy. why .copy() the numpy frame in the callback? the numpy array points into gstreamer's mapped buffer memory. once you unmap / return, that memory is recycled — keeping the array without copying = corruption. copy if the frame outlives the callback (e.g., goes into a queue). why max-buffers=1 drop=true ? it makes appsink a \"latest frame\" tap: if your consumer lags, gstreamer drops stale frames instead of queuing them → bounded memory, minimal latency. this is the backpressure policy from section 01 expressed in one line. → next: deepstream.md","words":924},{"path":"02-gstreamer/deepstream.md","title":"DeepStream","section":"2 · GStreamer","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"deepstream-inference-inside-the-pipeline\">DeepStream: Inference Inside the Pipeline<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"DeepStream batches many streams into one inference\"><rect class=\"dg-box\" x=\"20\" y=\"30\" width=\"130\" height=\"34\" rx=\"12\"/><text class=\"dg-label\" x=\"85\" y=\"52\" text-anchor=\"middle\">cam 1<\/text><line class=\"dg-line\" x1=\"150\" y1=\"47\" x2=\"203\" y2=\"47\"/><polygon class=\"dg-arrow\" points=\"203,42 210,47 203,52\"/><rect class=\"dg-box\" x=\"20\" y=\"74\" width=\"130\" height=\"34\" rx=\"12\"/><text class=\"dg-label\" x=\"85\" y=\"96\" text-anchor=\"middle\">cam 2<\/text><line class=\"dg-line\" x1=\"150\" y1=\"91\" x2=\"203\" y2=\"91\"/><polygon class=\"dg-arrow\" points=\"203,86 210,91 203,96\"/><rect class=\"dg-box\" x=\"20\" y=\"118\" width=\"130\" height=\"34\" rx=\"12\"/><text class=\"dg-label\" x=\"85\" y=\"140\" text-anchor=\"middle\">cam 3<\/text><line class=\"dg-line\" x1=\"150\" y1=\"135\" x2=\"203\" y2=\"135\"/><polygon class=\"dg-arrow\" points=\"203,130 210,135 203,140\"/><rect class=\"dg-box dg-hot\" x=\"210\" y=\"40\" width=\"110\" height=\"80\" rx=\"12\"/><text class=\"dg-label\" x=\"265\" y=\"78\" text-anchor=\"middle\">nvstreammux<\/text><text class=\"dg-sub\" x=\"265\" y=\"95\" text-anchor=\"middle\">batch=N<\/text><line class=\"dg-line\" x1=\"320\" y1=\"80\" x2=\"373\" y2=\"80\"/><polygon class=\"dg-arrow\" points=\"373,75 380,80 373,85\"/><rect class=\"dg-box\" x=\"380\" y=\"40\" width=\"120\" height=\"80\" rx=\"12\"/><text class=\"dg-label\" x=\"440\" y=\"78\" text-anchor=\"middle\">nvinfer<\/text><text class=\"dg-sub\" x=\"440\" y=\"95\" text-anchor=\"middle\">1 TRT call<\/text><line class=\"dg-line\" x1=\"500\" y1=\"80\" x2=\"553\" y2=\"80\"/><polygon class=\"dg-arrow\" points=\"553,75 560,80 553,85\"/><rect class=\"dg-box\" x=\"560\" y=\"40\" width=\"140\" height=\"80\" rx=\"12\"/><text class=\"dg-label\" x=\"630\" y=\"78\" text-anchor=\"middle\">tracker<\/text><text class=\"dg-sub\" x=\"630\" y=\"95\" text-anchor=\"middle\">+ IDs<\/text><text class=\"dg-sub\" x=\"360\" y=\"142\" text-anchor=\"middle\">many cameras → ONE inference call = the multi-stream scaling trick<\/text><\/svg><figcaption>DeepStream batches many streams into one inference<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> DeepStream is NVIDIA's set of GStreamer plugins that put inference, tracking, and analytics <em>inside<\/em> the video pipeline, keeping frames on the GPU end to end. Its superpower is <code>nvstreammux<\/code>: it <strong>batches many camera streams into one inference call<\/strong>, which is how you serve dozens of cameras on one GPU. You've shipped this on Jetson Nano — own it.<\/div><\/div>\n<h2 id=\"the-canonical-deepstream-pipeline\">The canonical DeepStream pipeline<\/h2>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 175\" role=\"img\" aria-label=\"The canonical DeepStream pipeline — N cameras batched into one inference call\"><rect class=\"dg-box\" x=\"12\" y=\"34\" width=\"92\" height=\"32\" rx=\"8\"/><text class=\"dg-sub\" x=\"58\" y=\"54\" text-anchor=\"middle\">cam 1<\/text><line class=\"dg-line\" x1=\"104\" y1=\"50\" x2=\"143\" y2=\"50\"/><polygon class=\"dg-arrow\" points=\"143,45 150,50 143,55\"/><rect class=\"dg-box\" x=\"12\" y=\"76\" width=\"92\" height=\"32\" rx=\"8\"/><text class=\"dg-sub\" x=\"58\" y=\"96\" text-anchor=\"middle\">cam 2<\/text><line class=\"dg-line\" x1=\"104\" y1=\"92\" x2=\"143\" y2=\"92\"/><polygon class=\"dg-arrow\" points=\"143,87 150,92 143,97\"/><rect class=\"dg-box\" x=\"12\" y=\"118\" width=\"92\" height=\"32\" rx=\"8\"/><text class=\"dg-sub\" x=\"58\" y=\"138\" text-anchor=\"middle\">cam 3<\/text><line class=\"dg-line\" x1=\"104\" y1=\"134\" x2=\"143\" y2=\"134\"/><polygon class=\"dg-arrow\" points=\"143,129 150,134 143,139\"/><rect class=\"dg-box dg-hot\" x=\"150\" y=\"44\" width=\"96\" height=\"84\" rx=\"12\"/><text class=\"dg-label\" x=\"198\" y=\"80\" text-anchor=\"middle\">stream<\/text><text class=\"dg-label\" x=\"198\" y=\"98\" text-anchor=\"middle\">mux<\/text><text class=\"dg-sub\" x=\"198\" y=\"118\" text-anchor=\"middle\">batch=N<\/text><line class=\"dg-line\" x1=\"246\" y1=\"86\" x2=\"249\" y2=\"86\"/><polygon class=\"dg-arrow\" points=\"249,81 256,86 249,91\"/><rect class=\"dg-box\" x=\"256\" y=\"56\" width=\"92\" height=\"60\" rx=\"11\"/><text class=\"dg-label\" x=\"302\" y=\"82\" text-anchor=\"middle\">nvinfer<\/text><text class=\"dg-sub\" x=\"302\" y=\"100\" text-anchor=\"middle\">TRT<\/text><line class=\"dg-line\" x1=\"350\" y1=\"86\" x2=\"353\" y2=\"86\"/><polygon class=\"dg-arrow\" points=\"353,81 360,86 353,91\"/><rect class=\"dg-box\" x=\"360\" y=\"56\" width=\"92\" height=\"60\" rx=\"11\"/><text class=\"dg-label\" x=\"406\" y=\"82\" text-anchor=\"middle\">nvtracker<\/text><text class=\"dg-sub\" x=\"406\" y=\"100\" text-anchor=\"middle\">+ IDs<\/text><line class=\"dg-line\" x1=\"454\" y1=\"86\" x2=\"457\" y2=\"86\"/><polygon class=\"dg-arrow\" points=\"457,81 464,86 457,91\"/><rect class=\"dg-box\" x=\"464\" y=\"56\" width=\"92\" height=\"60\" rx=\"11\"/><text class=\"dg-label\" x=\"510\" y=\"82\" text-anchor=\"middle\">nvdsosd<\/text><text class=\"dg-sub\" x=\"510\" y=\"100\" text-anchor=\"middle\">overlay<\/text><line class=\"dg-line\" x1=\"556\" y1=\"86\" x2=\"559\" y2=\"86\"/><polygon class=\"dg-arrow\" points=\"559,81 566,86 559,91\"/><rect class=\"dg-box\" x=\"566\" y=\"56\" width=\"140\" height=\"60\" rx=\"11\"/><text class=\"dg-label\" x=\"636\" y=\"82\" text-anchor=\"middle\">encode →<\/text><text class=\"dg-sub\" x=\"636\" y=\"100\" text-anchor=\"middle\">RTSP / WebRTC out<\/text><text class=\"dg-sub\" x=\"360\" y=\"160\" text-anchor=\"middle\">many cameras batched into ONE inference call = the multi-stream scaling trick<\/text><\/svg><figcaption>The canonical DeepStream pipeline — N cameras batched into one inference call<\/figcaption><\/figure>\n<p>Key plugins:<\/p>\n<ul><li><strong><code>nvstreammux<\/code><\/strong> — batches frames from N sources into a single batched buffer.<\/li><\/ul>\n<p><em>This is the scaling trick:<\/em> one <code>nvinfer<\/code> call processes all cameras together,   amortizing GPU launch overhead. Set <code>batch-size = number of streams<\/code>.<\/p>\n<ul><li><strong><code>nvinfer<\/code><\/strong> — runs a <strong>TensorRT<\/strong> engine. Configured via a text file<\/li><\/ul>\n<p>(<code>config_infer.txt<\/code>) pointing at the model, precision (INT8/FP16), and   pre/post-processing. Operates as <strong>primary<\/strong> (detector) or <strong>secondary<\/strong>   (classifier on detected crops).<\/p>\n<ul><li><strong><code>nvtracker<\/code><\/strong> — multi-object tracking (NvDCF, KLT, or DeepSORT-style),<\/li><\/ul>\n<p>assigning persistent IDs across frames. Critical for counting/dwell-time.<\/p>\n<ul><li><strong><code>nvdsosd<\/code><\/strong> — on-screen display: draws boxes/labels on GPU.<\/li><li><strong><code>nvvideoconvert<\/code><\/strong> — GPU color/format conversion + scaling.<\/li><li><strong>Metadata (<code>NvDsBatchMeta<\/code>)<\/strong> — detections travel <em>alongside<\/em> frames as<\/li><\/ul>\n<p>structured metadata you read in a <code>pad probe<\/code> (Python via pyds) to push results   to a DB/analytics — no full-frame copy needed.<\/p>\n<h2 id=\"nvstreammux-the-knobs-that-actually-matter\">nvstreammux — the knobs that actually matter<\/h2>\n<p><code>nvstreammux<\/code> is the heart of multi-stream, and its config is a frequent follow-up question:<\/p>\n<ul><li><strong><code>batch-size<\/code><\/strong> — how many frames per batched buffer. Rule of thumb: **set it to<\/li><\/ul>\n<p>the number of streams** (or a multiple). This must match <code>nvinfer<\/code>'s batch-size or   you under/over-fill the GPU.<\/p>\n<ul><li><strong><code>batched-push-timeout<\/code><\/strong> — the max microseconds the mux waits to fill a batch<\/li><\/ul>\n<p>before pushing what it has. <strong>This is a latency-vs-efficiency dial<\/strong>: too long and   a slow/dead camera holds up everyone; set it to roughly one frame interval   (~33000 µs at 30fps) so a missing stream can't stall the batch.<\/p>\n<ul><li><strong><code>width<\/code>/<code>height<\/code><\/strong> — the mux scales every input to a common resolution before<\/li><\/ul>\n<p>batching (the model's input size). Mismatch here silently wrecks aspect ratio /   accuracy.<\/p>\n<ul><li><strong><code>live-source=1<\/code><\/strong> — tells the mux the inputs are live (camera) so it times<\/li><\/ul>\n<p>correctly.<\/p>\n<blockquote><p>Interview gold: <em>\"The dangerous default is an unbounded batch wait — one dead RTSP camera can stall the whole batched pipeline. I cap <code>batched-push-timeout<\/code> to ~a frame interval so the batch flushes with N-1 streams and the dead one gets reconnected independently.\"<\/em> This ties multi-stream batching to <a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">fault tolerance<\/a>.<\/p><\/blockquote>\n<h2 id=\"nvinfer-config-whats-in-that-text-file\">nvinfer config — what's in that text file<\/h2>\n<p><code>nvinfer<\/code> is configured by a <code>config_infer.txt<\/code> of key groups, not code. The ones to be able to name:<\/p>\n<ul><li><strong><code>[property]<\/code><\/strong> — <code>model-engine-file<\/code> (the built TensorRT engine),<\/li><\/ul>\n<p><code>onnx-file<\/code>/<code>model-file<\/code> (source to build from), <code>network-mode<\/code> (0=FP32, 1=INT8,   2=FP16), <code>batch-size<\/code>, <code>num-detected-classes<\/code>.<\/p>\n<ul><li><strong><code>gie-unique-id<\/code><\/strong> — the inference instance's ID, so metadata is tagged with<\/li><\/ul>\n<p><em>which<\/em> model produced it (matters when chaining primary + secondary).<\/p>\n<ul><li><strong><code>process-mode<\/code><\/strong> — 1=primary (whole frame), 2=secondary (on crops from upstream).<\/li><li><strong><code>interval<\/code><\/strong> — <strong>skip inference on N frames between runs<\/strong> (e.g. infer every 3rd<\/li><\/ul>\n<p>frame, track in between). A cheap, big latency/throughput lever when objects don't   move much frame-to-frame.<\/p>\n<ul><li><strong><code>operate-on-gie-id<\/code> / <code>operate-on-class-ids<\/code><\/strong> — a secondary GIE saying \"only<\/li><\/ul>\n<p>run me on <em>vehicles<\/em> detected by primary GIE 1.\" This is how cascades stay cheap.<\/p>\n<p>First run builds the <code>.engine<\/code> from ONNX (slow, minutes); subsequent runs load the cached engine. <strong>Build on the target hardware<\/strong> (TensorRT tunes per GPU arch) — same point as section 03.<\/p>\n<h2 id=\"the-metadata-hierarchy-read-this-in-a-probe\">The metadata hierarchy (read this in a probe)<\/h2>\n<p>Detections don't come back as pixels — they're a nested C structure you walk via <code>pyds<\/code>:<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 236\" role=\"img\" aria-label=\"The metadata nests batch → frame → object → classifier; you walk it in a probe\"><rect class=\"dg-box\" x=\"40\" y=\"18\" width=\"560\" height=\"200\" rx=\"11\"/><text class=\"dg-label\" x=\"56\" y=\"40\">NvDsBatchMeta<\/text><text class=\"dg-sub\" x=\"56\" y=\"58\">the whole batch<\/text><rect class=\"dg-box\" x=\"72\" y=\"56\" width=\"496\" height=\"150\" rx=\"11\"/><text class=\"dg-label\" x=\"88\" y=\"78\">NvDsFrameMeta<\/text><text class=\"dg-sub\" x=\"88\" y=\"96\">one frame · source_id, frame_num<\/text><rect class=\"dg-box dg-hot\" x=\"104\" y=\"94\" width=\"432\" height=\"100\" rx=\"11\"/><text class=\"dg-label\" x=\"120\" y=\"116\">NvDsObjectMeta<\/text><text class=\"dg-sub\" x=\"120\" y=\"134\">one detection · bbox, class, conf, track id<\/text><rect class=\"dg-box\" x=\"136\" y=\"132\" width=\"368\" height=\"48\" rx=\"11\"/><text class=\"dg-label\" x=\"152\" y=\"154\">NvDsClassifierMeta<\/text><text class=\"dg-sub\" x=\"152\" y=\"172\">secondary-GIE labels on that object<\/text><text class=\"dg-sub\" x=\"360\" y=\"230\" text-anchor=\"middle\">walk this in a pad probe — read metadata, never copy the pixels<\/text><\/svg><figcaption>The metadata nests batch → frame → object → classifier; you walk it in a probe<\/figcaption><\/figure>\n<p>You attach a <strong>pad probe<\/strong> (from <a class=\"mdlink\" data-href=\"pipeline-model.md\" href=\"#\">pipeline-model.md<\/a>) on <code>nvdsosd<\/code>'s sink or <code>nvinfer<\/code>'s src, walk <code>frame_meta_list → obj_meta_list<\/code>, and push results out — <strong>no frame copy<\/strong>. <code>source_id<\/code> is what tells you <em>which camera<\/em> a detection came from inside the batched buffer.<\/p>\n<h2 id=\"getting-results-out-msgbroker-kafka\">Getting results OUT: msgbroker → Kafka<\/h2>\n<p>For analytics you rarely draw boxes — you emit events. DeepStream's <strong><code>nvmsgconv<\/code><\/strong> turns metadata into a schema (JSON) and <strong><code>nvmsgbroker<\/code><\/strong> ships it to <strong>Kafka / MQTT / AMQP / Azure IoT<\/strong>. That's the \"detections → message bus → DB / dashboard\" path, and it connects straight to your Kafka/Celery background — worth volunteering: <em>\"DeepStream metadata out via nvmsgbroker to Kafka, consumed by the analytics service — same decoupled pattern as my data-platform work.\"<\/em><\/p>\n<h2 id=\"getting-video-out-tiler-osd-and-rtspwebrtc\">Getting video OUT: tiler, OSD, and RTSP/WebRTC<\/h2>\n<ul><li><strong><code>nvmultistreamtiler<\/code><\/strong> composites N streams into one MxN grid for a single<\/li><\/ul>\n<p>monitor view (one decode of operator attention, many cameras).<\/p>\n<ul><li><strong><code>nvdsosd<\/code><\/strong> burns boxes/labels onto the frame on the GPU.<\/li><li><strong>Out to the network<\/strong>: encode (<code>nvv4l2h264enc<\/code>) then an RTSP server<\/li><\/ul>\n<p>(<code>nvrtspoutsinkbin<\/code> / a GstRtspServer mount) or <code>webrtcbin<\/code> for the   sub-500ms browser path from <a class=\"mdlink\" data-href=\"../01-video-streaming/protocols-rtsp-webrtc.md\" href=\"#\">section 01<\/a>.   This closes the <strong>RTSP in → infer → WebRTC out<\/strong> loop.<\/p>\n<h2 id=\"jetson-vs-dgpu-youve-shipped-jetson-own-the-nuance\">Jetson vs dGPU (you've shipped Jetson — own the nuance)<\/h2>\n<p>On <strong>Jetson<\/strong> (Nano/Orin) CPU and GPU share physical memory, so NVMM transfers are near-free, but you're compute/power constrained — INT8 + frame <code>interval<\/code> skipping matter more. On <strong>dGPU<\/strong> (datacenter) memory is separate, so avoiding host↔device copies is the bigger win. The plugin names differ slightly by version (<code>nvv4l2decoder<\/code> vs <code>nvdec<\/code>); naming that you've hit version-specific plugin differences across DeepStream 5/6/7 reads as real field experience.<\/p>\n<h2 id=\"why-batching-matters-the-number-that-impresses\">Why batching matters (the number that impresses)<\/h2>\n<p>A GPU launching inference per-frame, per-camera wastes most of its time on overhead. Batching N frames into one call can lift throughput several-fold for the same latency budget — the difference between 4 cameras and 40 on one box. Tie this to your TensorRT/INT8 experience: <em>\"batch at the mux, run an INT8 TRT engine, keep buffers in NVMM (GPU) memory — that's the multi-stream low-latency recipe.\"<\/em><\/p>\n<h2 id=\"pad-probes-reading-results-in-python\">Pad probes (reading results in Python)<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> osd_sink_probe(pad, info, u_data):\n    batch_meta = <span class=\"tok-builtin\">pyds<\/span>.gst_buffer_get_nvds_batch_meta(<span class=\"tok-builtin\">hash<\/span>(info.get_buffer()))\n    l_frame = batch_meta.frame_meta_list\n    <span class=\"tok-keyword\">while<\/span> l_frame <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span>:\n        frame_meta = <span class=\"tok-builtin\">pyds<\/span>.NvDsFrameMeta.cast(l_frame.data)\n        <span class=\"tok-comment\"># iterate frame_meta.obj_meta_list → boxes, classes, track ids<\/span>\n        l_frame = l_frame.next\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">Gst<\/span>.PadProbeReturn.OK<\/code><\/pre>\n<p>You don't pull pixels to Python — you read <em>metadata<\/em>. That's the zero-copy philosophy in action.<\/p>\n<h2 id=\"deepstream-vs-rolling-your-own-gstreamer-appsink-pytorch\">DeepStream vs rolling your own (GStreamer + appsink + PyTorch)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>DeepStream<\/th><th>DIY appsink + framework<\/th><\/tr><\/thead><tbody><tr><td>Multi-stream batching<\/td><td>Built-in (<code>nvstreammux<\/code>)<\/td><td>You build it<\/td><\/tr><tr><td>Memory<\/td><td>Stays on GPU (NVMM)<\/td><td>Easy to accidentally copy to CPU<\/td><\/tr><tr><td>Flexibility<\/td><td>NVIDIA-opinionated, config-driven<\/td><td>Total freedom, more code<\/td><\/tr><tr><td>Best for<\/td><td>Many cameras, NVIDIA HW, standard detect/track<\/td><td>Custom logic, non-NVIDIA, research<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"triton-vs-nvinfer-within-deepstream\">Triton vs nvinfer (within DeepStream)<\/h2>\n<p><code>nvinfer<\/code> runs TensorRT engines in-process. <code>nvinferserver<\/code> offloads to a <strong>Triton Inference Server<\/strong> — useful when you want a model server shared across pipelines, multiple frameworks, or dynamic model management. (More in <a class=\"mdlink\" data-href=\"../03-low-latency-inference/triton.md\" href=\"#\">03-low-latency-inference<\/a>.)<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>DeepStream vs plain GStreamer + your own inference?<\/strong> DeepStream gives multi-stream batching, GPU-resident buffers, and tracking for free on NVIDIA HW — fastest path to many cameras. Roll your own when you need custom pipeline logic, non-NVIDIA hardware, or research flexibility. KoiReader is NVIDIA-heavy (\"latest NVIDIA Hardware\"), so DeepStream is a natural fit and a strong thing to volunteer.<\/p>\n<p><strong>Why batch at nvstreammux instead of per-camera inference?<\/strong> Per-camera inference pays GPU launch/overhead N times and underuses the GPU. Batching fills the GPU, amortizing overhead → higher throughput at the same latency. It's the single biggest multi-stream scaling lever.<\/p>\n<p><strong>Primary vs secondary nvinfer?<\/strong> Primary detects objects on full frames; secondary classifies the <em>crops<\/em> the primary found (e.g., detect vehicle → classify make/color). Chaining them is how DeepStream does cascaded inference efficiently on GPU.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../03-low-latency-inference/README.md\" href=\"#\">03-low-latency-inference/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-canonical-deepstream-pipeline","text":"The canonical DeepStream pipeline"},{"level":2,"id":"nvstreammux-the-knobs-that-actually-matter","text":"nvstreammux — the knobs that actually matter"},{"level":2,"id":"nvinfer-config-whats-in-that-text-file","text":"nvinfer config — what's in that text file"},{"level":2,"id":"the-metadata-hierarchy-read-this-in-a-probe","text":"The metadata hierarchy (read this in a probe)"},{"level":2,"id":"getting-results-out-msgbroker-kafka","text":"Getting results OUT: msgbroker → Kafka"},{"level":2,"id":"getting-video-out-tiler-osd-and-rtspwebrtc","text":"Getting video OUT: tiler, OSD, and RTSP/WebRTC"},{"level":2,"id":"jetson-vs-dgpu-youve-shipped-jetson-own-the-nuance","text":"Jetson vs dGPU (you've shipped Jetson — own the nuance)"},{"level":2,"id":"why-batching-matters-the-number-that-impresses","text":"Why batching matters (the number that impresses)"},{"level":2,"id":"pad-probes-reading-results-in-python","text":"Pad probes (reading results in Python)"},{"level":2,"id":"deepstream-vs-rolling-your-own-gstreamer-appsink-pytorch","text":"DeepStream vs rolling your own (GStreamer + appsink + PyTorch)"},{"level":2,"id":"triton-vs-nvinfer-within-deepstream","text":"Triton vs nvinfer (within DeepStream)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"deepstream: inference inside the pipeline cam 1 cam 2 cam 3 nvstreammux batch=n nvinfer 1 trt call tracker + ids many cameras → one inference call = the multi-stream scaling trick deepstream batches many streams into one inference 💡 tl;dr deepstream is nvidia's set of gstreamer plugins that put inference, tracking, and analytics inside the video pipeline, keeping frames on the gpu end to end. its superpower is nvstreammux : it batches many camera streams into one inference call , which is how you serve dozens of cameras on one gpu. you've shipped this on jetson nano — own it. the canonical deepstream pipeline cam 1 cam 2 cam 3 stream mux batch=n nvinfer trt nvtracker + ids nvdsosd overlay encode → rtsp / webrtc out many cameras batched into one inference call = the multi-stream scaling trick the canonical deepstream pipeline — n cameras batched into one inference call key plugins: nvstreammux — batches frames from n sources into a single batched buffer. this is the scaling trick: one nvinfer call processes all cameras together, amortizing gpu launch overhead. set batch-size = number of streams . nvinfer — runs a tensorrt engine. configured via a text file ( config_infer.txt ) pointing at the model, precision (int8/fp16), and pre/post-processing. operates as primary (detector) or secondary (classifier on detected crops). nvtracker — multi-object tracking (nvdcf, klt, or deepsort-style), assigning persistent ids across frames. critical for counting/dwell-time. nvdsosd — on-screen display: draws boxes/labels on gpu. nvvideoconvert — gpu color/format conversion + scaling. metadata ( nvdsbatchmeta ) — detections travel alongside frames as structured metadata you read in a pad probe (python via pyds) to push results to a db/analytics — no full-frame copy needed. nvstreammux — the knobs that actually matter nvstreammux is the heart of multi-stream, and its config is a frequent follow-up question: batch-size — how many frames per batched buffer. rule of thumb: **set it to the number of streams** (or a multiple). this must match nvinfer 's batch-size or you under/over-fill the gpu. batched-push-timeout — the max microseconds the mux waits to fill a batch before pushing what it has. this is a latency-vs-efficiency dial : too long and a slow/dead camera holds up everyone; set it to roughly one frame interval (~33000 µs at 30fps) so a missing stream can't stall the batch. width / height — the mux scales every input to a common resolution before batching (the model's input size). mismatch here silently wrecks aspect ratio / accuracy. live-source=1 — tells the mux the inputs are live (camera) so it times correctly. interview gold: \"the dangerous default is an unbounded batch wait — one dead rtsp camera can stall the whole batched pipeline. i cap batched-push-timeout to ~a frame interval so the batch flushes with n-1 streams and the dead one gets reconnected independently.\" this ties multi-stream batching to fault tolerance . nvinfer config — what's in that text file nvinfer is configured by a config_infer.txt of key groups, not code. the ones to be able to name: [property] — model-engine-file (the built tensorrt engine), onnx-file / model-file (source to build from), network-mode (0=fp32, 1=int8, 2=fp16), batch-size , num-detected-classes . gie-unique-id — the inference instance's id, so metadata is tagged with which model produced it (matters when chaining primary + secondary). process-mode — 1=primary (whole frame), 2=secondary (on crops from upstream). interval — skip inference on n frames between runs (e.g. infer every 3rd frame, track in between). a cheap, big latency/throughput lever when objects don't move much frame-to-frame. operate-on-gie-id / operate-on-class-ids — a secondary gie saying \"only run me on vehicles detected by primary gie 1.\" this is how cascades stay cheap. first run builds the .engine from onnx (slow, minutes); subsequent runs load the cached engine. build on the target hardware (tensorrt tunes per gpu arch) — same point as section 03. the metadata hierarchy (read this in a probe) detections don't come back as pixels — they're a nested c structure you walk via pyds : nvdsbatchmeta the whole batch nvdsframemeta one frame · source_id, frame_num nvdsobjectmeta one detection · bbox, class, conf, track id nvdsclassifiermeta secondary-gie labels on that object walk this in a pad probe — read metadata, never copy the pixels the metadata nests batch → frame → object → classifier; you walk it in a probe you attach a pad probe (from pipeline-model.md ) on nvdsosd 's sink or nvinfer 's src, walk frame_meta_list → obj_meta_list , and push results out — no frame copy . source_id is what tells you which camera a detection came from inside the batched buffer. getting results out: msgbroker → kafka for analytics you rarely draw boxes — you emit events. deepstream's nvmsgconv turns metadata into a schema (json) and nvmsgbroker ships it to kafka / mqtt / amqp / azure iot . that's the \"detections → message bus → db / dashboard\" path, and it connects straight to your kafka/celery background — worth volunteering: \"deepstream metadata out via nvmsgbroker to kafka, consumed by the analytics service — same decoupled pattern as my data-platform work.\" getting video out: tiler, osd, and rtsp/webrtc nvmultistreamtiler composites n streams into one mxn grid for a single monitor view (one decode of operator attention, many cameras). nvdsosd burns boxes/labels onto the frame on the gpu. out to the network : encode ( nvv4l2h264enc ) then an rtsp server ( nvrtspoutsinkbin / a gstrtspserver mount) or webrtcbin for the sub-500ms browser path from section 01 . this closes the rtsp in → infer → webrtc out loop. jetson vs dgpu (you've shipped jetson — own the nuance) on jetson (nano/orin) cpu and gpu share physical memory, so nvmm transfers are near-free, but you're compute/power constrained — int8 + frame interval skipping matter more. on dgpu (datacenter) memory is separate, so avoiding host↔device copies is the bigger win. the plugin names differ slightly by version ( nvv4l2decoder vs nvdec ); naming that you've hit version-specific plugin differences across deepstream 5/6/7 reads as real field experience. why batching matters (the number that impresses) a gpu launching inference per-frame, per-camera wastes most of its time on overhead. batching n frames into one call can lift throughput several-fold for the same latency budget — the difference between 4 cameras and 40 on one box. tie this to your tensorrt/int8 experience: \"batch at the mux, run an int8 trt engine, keep buffers in nvmm (gpu) memory — that's the multi-stream low-latency recipe.\" pad probes (reading results in python) def osd_sink_probe(pad, info, u_data): batch_meta = pyds .gst_buffer_get_nvds_batch_meta( hash (info.get_buffer())) l_frame = batch_meta.frame_meta_list while l_frame is not none : frame_meta = pyds .nvdsframemeta.cast(l_frame.data) # iterate frame_meta.obj_meta_list → boxes, classes, track ids l_frame = l_frame.next return gst .padprobereturn.ok you don't pull pixels to python — you read metadata . that's the zero-copy philosophy in action. deepstream vs rolling your own (gstreamer + appsink + pytorch) deepstream diy appsink + framework multi-stream batching built-in ( nvstreammux ) you build it memory stays on gpu (nvmm) easy to accidentally copy to cpu flexibility nvidia-opinionated, config-driven total freedom, more code best for many cameras, nvidia hw, standard detect/track custom logic, non-nvidia, research triton vs nvinfer (within deepstream) nvinfer runs tensorrt engines in-process. nvinferserver offloads to a triton inference server — useful when you want a model server shared across pipelines, multiple frameworks, or dynamic model management. (more in 03-low-latency-inference .) why x over y deepstream vs plain gstreamer + your own inference? deepstream gives multi-stream batching, gpu-resident buffers, and tracking for free on nvidia hw — fastest path to many cameras. roll your own when you need custom pipeline logic, non-nvidia hardware, or research flexibility. koireader is nvidia-heavy (\"latest nvidia hardware\"), so deepstream is a natural fit and a strong thing to volunteer. why batch at nvstreammux instead of per-camera inference? per-camera inference pays gpu launch/overhead n times and underuses the gpu. batching fills the gpu, amortizing overhead → higher throughput at the same latency. it's the single biggest multi-stream scaling lever. primary vs secondary nvinfer? primary detects objects on full frames; secondary classifies the crops the primary found (e.g., detect vehicle → classify make/color). chaining them is how deepstream does cascaded inference efficiently on gpu. → back to section readme · next section: 03-low-latency-inference/","words":1367},{"path":"03-low-latency-inference/README.md","title":"Overview","section":"3 · Low-Latency Inference","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"03-low-latency-inference\">03 — Low-Latency Inference<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is your home turf (TensorRT, ONNX, INT8/FP16, Jetson). The job is to turn a trained model into the fastest possible stable inference, and to <em>know your latency budget<\/em> — where every millisecond goes. Lead with this section in the interview; it's where you're strongest.<\/div><\/div>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"latency-budget.md\" href=\"#\">latency-budget.md<\/a> — where the milliseconds actually go<\/li><li><a class=\"mdlink\" data-href=\"tensorrt-and-quantization.md\" href=\"#\">tensorrt-and-quantization.md<\/a> — TRT, FP16/INT8, calibration<\/li><li><a class=\"mdlink\" data-href=\"triton.md\" href=\"#\">triton.md<\/a> — Triton inference server, when and why<\/li><li><a class=\"mdlink\" data-href=\"batching-and-throughput.md\" href=\"#\">batching-and-throughput.md<\/a> — batching, throughput vs latency<\/li><\/ol>\n<h2 id=\"the-framing-line-memorize\">The framing line (memorize)<\/h2>\n<p><em>\"Low latency isn't one trick — it's a budget. Decode on NVDEC, keep frames in GPU memory, batch at the mux, run an INT8 TensorRT engine with fused layers, and only move small results back to the CPU. Then you measure each stage and attack the biggest number — I don't guess, I profile.\"<\/em><\/p>\n<p>That last sentence is straight from your resume's \"evidence-driven engineering\" and it's exactly the JD's \"diagnose bottlenecks — CPU, GPU, or Network.\"<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"latency-budget.md\" href=\"#\">latency-budget.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-framing-line-memorize","text":"The framing line (memorize)"}],"text":"03 — low-latency inference 💡 tl;dr this is your home turf (tensorrt, onnx, int8/fp16, jetson). the job is to turn a trained model into the fastest possible stable inference, and to know your latency budget — where every millisecond goes. lead with this section in the interview; it's where you're strongest. files: latency-budget.md — where the milliseconds actually go tensorrt-and-quantization.md — trt, fp16/int8, calibration triton.md — triton inference server, when and why batching-and-throughput.md — batching, throughput vs latency the framing line (memorize) \"low latency isn't one trick — it's a budget. decode on nvdec, keep frames in gpu memory, batch at the mux, run an int8 tensorrt engine with fused layers, and only move small results back to the cpu. then you measure each stage and attack the biggest number — i don't guess, i profile.\" that last sentence is straight from your resume's \"evidence-driven engineering\" and it's exactly the jd's \"diagnose bottlenecks — cpu, gpu, or network.\" → start: latency-budget.md","words":161},{"path":"03-low-latency-inference/latency-budget.md","title":"The Latency Budget","section":"3 · Low-Latency Inference","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"the-latency-budget\">The Latency Budget<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"The latency budget — where the milliseconds go\"><rect class=\"dg-fill1\" x=\"18\" y=\"60\" width=\"142.5\" height=\"46\" rx=\"4\"/><text class=\"dg-white-tx\" x=\"89.25\" y=\"87\" text-anchor=\"middle\">transport<\/text><rect class=\"dg-fill2\" x=\"160.5\" y=\"60\" width=\"66.5\" height=\"46\" rx=\"4\"/><text class=\"dg-white-tx\" x=\"193.75\" y=\"87\" text-anchor=\"middle\">decode<\/text><rect class=\"dg-fill3\" x=\"227\" y=\"60\" width=\"85.5\" height=\"46\" rx=\"4\"/><text class=\"dg-white-tx\" x=\"269.75\" y=\"87\" text-anchor=\"middle\">preprocess<\/text><rect class=\"dg-fill4\" x=\"312.5\" y=\"60\" width=\"247\" height=\"46\" rx=\"4\"/><text class=\"dg-white-tx\" x=\"436\" y=\"87\" text-anchor=\"middle\">inference<\/text><rect class=\"dg-fill2\" x=\"559.5\" y=\"60\" width=\"57\" height=\"46\" rx=\"4\"/><text class=\"dg-white-tx\" x=\"588\" y=\"87\" text-anchor=\"middle\">post<\/text><rect class=\"dg-fill1\" x=\"616.5\" y=\"60\" width=\"85.5\" height=\"46\" rx=\"4\"/><text class=\"dg-white-tx\" x=\"659.25\" y=\"87\" text-anchor=\"middle\">logic<\/text><text class=\"dg-sub\" x=\"18\" y=\"44\">latency = sum of every stage · attack the fattest slice<\/text><text class=\"dg-accent-tx\" x=\"436\" y=\"135\" text-anchor=\"middle\">inference is usually the big one — measure p99, not average<\/text><\/svg><figcaption>The latency budget — where the milliseconds go<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> \"Latency\" is the sum of every stage from photon to decision. You can't optimize what you haven't measured per-stage. Break it down, find the fattest slice, attack that. Throughput (fps) and latency (ms per frame) are different goals — know which the question is asking.<\/div><\/div>\n<h2 id=\"the-stages-and-where-time-hides\">The stages (and where time hides)<\/h2>\n<pre><code>camera capture/encode   →   network transport   →   decode   →   preprocess\n   (out of your hands)        (jitter buffer)        (NVDEC)     (resize/normalize/color)\n        →   inference   →   postprocess (NMS, decode boxes)   →   tracking/logic   →   output<\/code><\/pre>\n<p>Typical fat slices and fixes:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Common cost<\/th><th>Fix<\/th><\/tr><\/thead><tbody><tr><td>Jitter/transport<\/td><td>100ms–1s<\/td><td>smaller jitter buffer, TCP vs UDP tradeoff, GOP<\/td><\/tr><tr><td>Decode<\/td><td>high on CPU<\/td><td>move to <strong>NVDEC<\/strong> (hardware)<\/td><\/tr><tr><td>Preprocess<\/td><td>CPU↔GPU copies, PIL resize<\/td><td>do resize/normalize on GPU; avoid host round-trips<\/td><\/tr><tr><td>Inference<\/td><td>the model itself<\/td><td>TensorRT, FP16/INT8, smaller backbone, batching<\/td><\/tr><tr><td>Postprocess<\/td><td>NMS on CPU, Python loops<\/td><td>GPU NMS, vectorize, limit detections<\/td><\/tr><tr><td>Tracking/logic<\/td><td>per-object Python<\/td><td>keep it O(detections), avoid per-pixel Python<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"latency-vs-throughput-the-distinction-that-wins-points\">Latency vs throughput (the distinction that wins points)<\/h2>\n<ul><li><strong>Latency<\/strong> = how long <em>one<\/em> frame takes end to end. Matters for real-time<\/li><\/ul>\n<p>reaction (\"obsess over milliseconds\").<\/p>\n<ul><li><strong>Throughput<\/strong> = how many frames/sec total. Matters for <em>how many cameras<\/em> a box<\/li><\/ul>\n<p>serves.<\/p>\n<ul><li><strong>Batching raises throughput but can raise per-frame latency<\/strong> (you wait to fill<\/li><\/ul>\n<p>the batch). The art is choosing a batch size that maximizes cameras-served while   staying under the latency SLA. Know your SLA before you tune.<\/p>\n<h2 id=\"how-to-actually-measure-your-evidence-driven-story\">How to actually measure (your \"evidence-driven\" story)<\/h2>\n<ul><li>Timestamp at each stage boundary; log p50/p95/p99, not just the average — tail<\/li><\/ul>\n<p>latency is what users feel and what causes buffer pileups.<\/p>\n<ul><li>GPU profiling: <code>nsys<\/code>/<code>nvprof<\/code>/Nsight Systems for kernel time, `nvidia-smi<\/li><\/ul>\n<p>dmon<code> for utilization, <\/code>tegrastats` on Jetson.<\/p>\n<ul><li>Watch <strong>GPU utilization<\/strong>: low util + high latency = you're CPU/copy/IO-bound,<\/li><\/ul>\n<p>not compute-bound. That diagnosis decides everything.<\/p>\n<ul><li>This mirrors your resume win: *\"quantifying why local NVMe outperformed<\/li><\/ul>\n<p>network-attached storage\"* — same method, different domain.<\/p>\n<h2 id=\"why-p99-matters-for-video\">Why p99 matters for video<\/h2>\n<p>If p99 inference time exceeds your frame interval (33ms @ 30fps), frames pile up during those slow moments → buffer grows → latency creeps → eventually you drop or OOM. A pipeline that's \"fine on average\" can still die on its tail. Design for p99 under the frame budget, or drop cleanly when you exceed it.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Optimize latency or throughput first?<\/strong> Ask what the system needs. A single safety-critical trigger → latency. A 40-camera analytics farm → throughput (cameras/$). Most real answers: hit a latency SLA, then maximize throughput under it.<\/p>\n<p><strong>Average vs p99 latency?<\/strong> Average hides the spikes that actually break video pipelines (pileups happen on the slow tail). Always quote and design to p95/p99.<\/p>\n<p><strong>High latency but low GPU utilization — what's wrong?<\/strong> You're not compute-bound. Suspect CPU preprocessing, CPU↔GPU copies, single-thread decode, or network jitter. Profile to confirm before touching the model — changing the model wouldn't help a copy-bound pipeline.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"tensorrt-and-quantization.md\" href=\"#\">tensorrt-and-quantization.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-stages-and-where-time-hides","text":"The stages (and where time hides)"},{"level":2,"id":"latency-vs-throughput-the-distinction-that-wins-points","text":"Latency vs throughput (the distinction that wins points)"},{"level":2,"id":"how-to-actually-measure-your-evidence-driven-story","text":"How to actually measure (your \"evidence-driven\" story)"},{"level":2,"id":"why-p99-matters-for-video","text":"Why p99 matters for video"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"the latency budget transport decode preprocess inference post logic latency = sum of every stage · attack the fattest slice inference is usually the big one — measure p99, not average the latency budget — where the milliseconds go 💡 tl;dr \"latency\" is the sum of every stage from photon to decision. you can't optimize what you haven't measured per-stage. break it down, find the fattest slice, attack that. throughput (fps) and latency (ms per frame) are different goals — know which the question is asking. the stages (and where time hides) camera capture/encode → network transport → decode → preprocess (out of your hands) (jitter buffer) (nvdec) (resize/normalize/color) → inference → postprocess (nms, decode boxes) → tracking/logic → output typical fat slices and fixes: stage common cost fix jitter/transport 100ms–1s smaller jitter buffer, tcp vs udp tradeoff, gop decode high on cpu move to nvdec (hardware) preprocess cpu↔gpu copies, pil resize do resize/normalize on gpu; avoid host round-trips inference the model itself tensorrt, fp16/int8, smaller backbone, batching postprocess nms on cpu, python loops gpu nms, vectorize, limit detections tracking/logic per-object python keep it o(detections), avoid per-pixel python latency vs throughput (the distinction that wins points) latency = how long one frame takes end to end. matters for real-time reaction (\"obsess over milliseconds\"). throughput = how many frames/sec total. matters for how many cameras a box serves. batching raises throughput but can raise per-frame latency (you wait to fill the batch). the art is choosing a batch size that maximizes cameras-served while staying under the latency sla. know your sla before you tune. how to actually measure (your \"evidence-driven\" story) timestamp at each stage boundary; log p50/p95/p99, not just the average — tail latency is what users feel and what causes buffer pileups. gpu profiling: nsys / nvprof /nsight systems for kernel time, `nvidia-smi dmon for utilization, tegrastats` on jetson. watch gpu utilization : low util + high latency = you're cpu/copy/io-bound, not compute-bound. that diagnosis decides everything. this mirrors your resume win: *\"quantifying why local nvme outperformed network-attached storage\"* — same method, different domain. why p99 matters for video if p99 inference time exceeds your frame interval (33ms @ 30fps), frames pile up during those slow moments → buffer grows → latency creeps → eventually you drop or oom. a pipeline that's \"fine on average\" can still die on its tail. design for p99 under the frame budget, or drop cleanly when you exceed it. why x over y optimize latency or throughput first? ask what the system needs. a single safety-critical trigger → latency. a 40-camera analytics farm → throughput (cameras/$). most real answers: hit a latency sla, then maximize throughput under it. average vs p99 latency? average hides the spikes that actually break video pipelines (pileups happen on the slow tail). always quote and design to p95/p99. high latency but low gpu utilization — what's wrong? you're not compute-bound. suspect cpu preprocessing, cpu↔gpu copies, single-thread decode, or network jitter. profile to confirm before touching the model — changing the model wouldn't help a copy-bound pipeline. → next: tensorrt-and-quantization.md","words":511},{"path":"03-low-latency-inference/tensorrt-and-quantization.md","title":"TensorRT & Quantization","section":"3 · Low-Latency Inference","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"tensorrt-quantization\">TensorRT &amp; Quantization<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> TensorRT is NVIDIA's inference compiler — it takes a trained model (usually via ONNX) and produces an optimized <strong>engine<\/strong> for <em>your specific GPU<\/em> by fusing layers, picking fast kernels, and lowering precision (FP16/INT8). INT8 ≈ fastest + smallest, but needs calibration to keep accuracy. You've done this; this file makes the <em>why<\/em> crisp.<\/div><\/div>\n<h2 id=\"the-flow\">The flow<\/h2>\n<pre><code>PyTorch/TF model → export ONNX → trtexec / TRT builder → engine (.plan/.engine)\n                                      │\n                          chooses kernels for THIS GPU,\n                          fuses layers, sets precision<\/code><\/pre>\n<blockquote><p>The engine is hardware-specific. An engine built on an A100 won't be optimal (or may not load) on a Jetson Orin. <strong>Build on the deployment target<\/strong> (or matching arch). This is a classic gotcha — mention it.<\/p><\/blockquote>\n<h2 id=\"what-tensorrt-actually-does\">What TensorRT actually does<\/h2>\n<ol><li><strong>Layer &amp; tensor fusion<\/strong> — merges conv+bias+ReLU into one kernel → fewer kernel<\/li><\/ol>\n<p>launches and memory reads. (Your resume literally says \"layer fusion.\")<\/p>\n<ol><li><strong>Kernel auto-tuning<\/strong> — benchmarks several CUDA kernel implementations and<\/li><\/ol>\n<p>picks the fastest for your shapes/GPU.<\/p>\n<ol><li><strong>Precision calibration<\/strong> — runs in FP32, FP16, or INT8.<\/li><li><strong>Memory optimization<\/strong> — reuses buffers across layers (smaller footprint).<\/li><li><strong>Dynamic shapes / optimization profiles<\/strong> — handle variable batch/resolution.<\/li><\/ol>\n<h2 id=\"precision-ladder\">Precision ladder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Precision<\/th><th>Speed<\/th><th>Memory<\/th><th>Accuracy<\/th><th>Notes<\/th><\/tr><\/thead><tbody><tr><td><strong>FP32<\/strong><\/td><td>1×<\/td><td>1×<\/td><td>baseline<\/td><td>training default, rarely needed for inference<\/td><\/tr><tr><td><strong>FP16<\/strong><\/td><td>~2×<\/td><td>½<\/td><td>~lossless<\/td><td>safe default on modern GPUs/Jetson; almost free win<\/td><\/tr><tr><td><strong>INT8<\/strong><\/td><td>~3–4×<\/td><td>¼<\/td><td>small drop<\/td><td>needs <strong>calibration<\/strong>; best for edge throughput<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"int8-calibration-the-part-people-fumble\">INT8 calibration (the part people fumble)<\/h2>\n<p>INT8 maps floats to 256 integer levels. To pick the right float range per layer, TensorRT needs a <strong>calibration dataset<\/strong> — a few hundred representative images — to measure activation distributions (entropy/min-max calibration). Get this wrong (unrepresentative data) and accuracy tanks.<\/p>\n<ul><li><strong>PTQ (post-training quantization):<\/strong> calibrate after training. Fast, no<\/li><\/ul>\n<p>retraining. What you usually do.<\/p>\n<ul><li><strong>QAT (quantization-aware training):<\/strong> simulate INT8 during training for best<\/li><\/ul>\n<p>accuracy. More work; use when PTQ drops too much accuracy.<\/p>\n<ul><li>Always <strong>measure mAP/accuracy after quantizing<\/strong> — never assume it's fine. (Your<\/li><\/ul>\n<p>resume's model-evaluation discipline: mAP/precision/recall.)<\/p>\n<h2 id=\"beyond-precision-pruning-distillation\">Beyond precision: pruning &amp; distillation<\/h2>\n<ul><li><strong>Pruning<\/strong> — remove low-importance weights/channels → smaller, faster (you've<\/li><\/ul>\n<p>done this). Structured pruning helps real latency; unstructured needs sparse HW.<\/p>\n<ul><li><strong>Distillation<\/strong> — train a small \"student\" to mimic a big \"teacher.\" Different<\/li><\/ul>\n<p>lever (smaller architecture) vs quantization (cheaper arithmetic). Combine them.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>FP16 vs INT8?<\/strong> FP16 is nearly free accuracy-wise and ~2× faster — always try it first. INT8 is ~3–4× and ¼ memory but needs calibration and risks accuracy; reach for it when you need maximum edge throughput and can validate accuracy holds.<\/p>\n<p><strong>ONNX → TensorRT vs torch2trt / direct?<\/strong> ONNX is the portable interchange path: framework-agnostic, widely supported, easy to inspect. Direct converters are convenient but more fragile across ops. ONNX first, fall back to custom plugins for unsupported ops.<\/p>\n<p><strong>Why build the engine on the target device?<\/strong> TensorRT tunes kernels and memory for the <em>specific<\/em> GPU arch and even driver. An engine built elsewhere may be suboptimal or fail to load — build (or rebuild) on the deployment hardware, and cache the engine so you don't pay build time at startup.<\/p>\n<p><strong>Quantization vs pruning vs distillation — which?<\/strong> They're orthogonal. Quantization = cheaper math (precision). Pruning = fewer weights. Distillation = smaller architecture. Stack them: distill to a small model, prune it, then INT8-quantize for the edge.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"triton.md\" href=\"#\">triton.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-flow","text":"The flow"},{"level":2,"id":"what-tensorrt-actually-does","text":"What TensorRT actually does"},{"level":2,"id":"precision-ladder","text":"Precision ladder"},{"level":2,"id":"int8-calibration-the-part-people-fumble","text":"INT8 calibration (the part people fumble)"},{"level":2,"id":"beyond-precision-pruning-distillation","text":"Beyond precision: pruning &amp; distillation"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"tensorrt & quantization 💡 tl;dr tensorrt is nvidia's inference compiler — it takes a trained model (usually via onnx) and produces an optimized engine for your specific gpu by fusing layers, picking fast kernels, and lowering precision (fp16/int8). int8 ≈ fastest + smallest, but needs calibration to keep accuracy. you've done this; this file makes the why crisp. the flow pytorch/tf model → export onnx → trtexec / trt builder → engine (.plan/.engine) │ chooses kernels for this gpu, fuses layers, sets precision the engine is hardware-specific. an engine built on an a100 won't be optimal (or may not load) on a jetson orin. build on the deployment target (or matching arch). this is a classic gotcha — mention it. what tensorrt actually does layer & tensor fusion — merges conv+bias+relu into one kernel → fewer kernel launches and memory reads. (your resume literally says \"layer fusion.\") kernel auto-tuning — benchmarks several cuda kernel implementations and picks the fastest for your shapes/gpu. precision calibration — runs in fp32, fp16, or int8. memory optimization — reuses buffers across layers (smaller footprint). dynamic shapes / optimization profiles — handle variable batch/resolution. precision ladder precision speed memory accuracy notes fp32 1× 1× baseline training default, rarely needed for inference fp16 ~2× ½ ~lossless safe default on modern gpus/jetson; almost free win int8 ~3–4× ¼ small drop needs calibration ; best for edge throughput int8 calibration (the part people fumble) int8 maps floats to 256 integer levels. to pick the right float range per layer, tensorrt needs a calibration dataset — a few hundred representative images — to measure activation distributions (entropy/min-max calibration). get this wrong (unrepresentative data) and accuracy tanks. ptq (post-training quantization): calibrate after training. fast, no retraining. what you usually do. qat (quantization-aware training): simulate int8 during training for best accuracy. more work; use when ptq drops too much accuracy. always measure map/accuracy after quantizing — never assume it's fine. (your resume's model-evaluation discipline: map/precision/recall.) beyond precision: pruning & distillation pruning — remove low-importance weights/channels → smaller, faster (you've done this). structured pruning helps real latency; unstructured needs sparse hw. distillation — train a small \"student\" to mimic a big \"teacher.\" different lever (smaller architecture) vs quantization (cheaper arithmetic). combine them. why x over y fp16 vs int8? fp16 is nearly free accuracy-wise and ~2× faster — always try it first. int8 is ~3–4× and ¼ memory but needs calibration and risks accuracy; reach for it when you need maximum edge throughput and can validate accuracy holds. onnx → tensorrt vs torch2trt / direct? onnx is the portable interchange path: framework-agnostic, widely supported, easy to inspect. direct converters are convenient but more fragile across ops. onnx first, fall back to custom plugins for unsupported ops. why build the engine on the target device? tensorrt tunes kernels and memory for the specific gpu arch and even driver. an engine built elsewhere may be suboptimal or fail to load — build (or rebuild) on the deployment hardware, and cache the engine so you don't pay build time at startup. quantization vs pruning vs distillation — which? they're orthogonal. quantization = cheaper math (precision). pruning = fewer weights. distillation = smaller architecture. stack them: distill to a small model, prune it, then int8-quantize for the edge. → next: triton.md","words":545},{"path":"03-low-latency-inference/triton.md","title":"Triton Inference Server","section":"3 · Low-Latency Inference","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"triton-inference-server\">Triton Inference Server<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Triton is NVIDIA's production model server. Instead of baking the model into your app, you run a server that hosts models and serves inference over HTTP/gRPC. It adds <strong>dynamic batching<\/strong>, <strong>multi-model<\/strong> hosting, <strong>multiple framework backends<\/strong> (TensorRT, ONNX, PyTorch, TF), and <strong>model versioning<\/strong> — for free. Use it when inference is a <em>shared service<\/em>, not when one tight edge loop needs absolute minimum latency.<\/div><\/div>\n<h2 id=\"what-you-get-out-of-the-box\">What you get out of the box<\/h2>\n<ul><li><strong>Dynamic batching<\/strong> — Triton holds incoming requests for a few ms and batches<\/li><\/ul>\n<p>them automatically to fill the GPU (throughput win without you coding it).<\/p>\n<ul><li><strong>Concurrent model execution<\/strong> — multiple models, or multiple <em>instances<\/em> of one<\/li><\/ul>\n<p>model, on the same GPU.<\/p>\n<ul><li><strong>Multiple backends<\/strong> — serve a TensorRT engine, an ONNX model, and a PyTorch<\/li><\/ul>\n<p>model side by side.<\/p>\n<ul><li><strong>Model repository + versioning<\/strong> — drop a new version in a folder, hot-swap<\/li><\/ul>\n<p>without redeploying clients.<\/p>\n<ul><li><strong>Metrics<\/strong> — Prometheus endpoints for latency/throughput/utilization.<\/li><li><strong>Ensembles<\/strong> — chain preprocess → model → postprocess as one served unit.<\/li><\/ul>\n<h2 id=\"where-it-fits-in-this-role\">Where it fits in this role<\/h2>\n<ul><li><strong>Cloud side<\/strong> of \"Edge devices and Cloud servers\": a Triton fleet behind a load<\/li><\/ul>\n<p>balancer serving many pipelines.<\/p>\n<ul><li><strong>Within DeepStream:<\/strong> <code>nvinferserver<\/code> calls Triton instead of in-process<\/li><\/ul>\n<p><code>nvinfer<\/code> — handy when several pipelines share models or you want central model   management.<\/p>\n<h2 id=\"the-tradeoff-say-this-out-loud\">The tradeoff (say this out loud)<\/h2>\n<p>A network hop to a server adds latency vs in-process TensorRT. For a single edge device chasing minimum latency, in-process <code>nvinfer<\/code>/TensorRT wins. For a <em>cloud service<\/em> with many clients and models where you want dynamic batching, versioning, and ops tooling, Triton's throughput and manageability win. <strong>Different jobs.<\/strong><\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Triton vs in-process TensorRT?<\/strong> In-process = lowest latency, simplest deploy, one model per app — ideal at the edge. Triton = a hop of latency but gives dynamic batching, multi-model, versioning, metrics, and shared GPU utilization — ideal as a cloud service.<\/p>\n<p><strong>Triton's dynamic batching vs DeepStream's nvstreammux batching?<\/strong> Both batch to fill the GPU. <code>nvstreammux<\/code> batches <em>synchronized camera streams<\/em> in a live pipeline. Triton's dynamic batching batches <em>independent client requests<\/em> arriving over the network. Same goal (GPU utilization), different source of requests.<\/p>\n<p><strong>Why version models in Triton instead of redeploying?<\/strong> Hot-swapping a model version in the repository lets you roll forward/back without touching clients or restarting pipelines — safer, faster iteration, and easy A/B. Matches the JD's \"open to experiments\" culture.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"batching-and-throughput.md\" href=\"#\">batching-and-throughput.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-you-get-out-of-the-box","text":"What you get out of the box"},{"level":2,"id":"where-it-fits-in-this-role","text":"Where it fits in this role"},{"level":2,"id":"the-tradeoff-say-this-out-loud","text":"The tradeoff (say this out loud)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"triton inference server 💡 tl;dr triton is nvidia's production model server. instead of baking the model into your app, you run a server that hosts models and serves inference over http/grpc. it adds dynamic batching , multi-model hosting, multiple framework backends (tensorrt, onnx, pytorch, tf), and model versioning — for free. use it when inference is a shared service , not when one tight edge loop needs absolute minimum latency. what you get out of the box dynamic batching — triton holds incoming requests for a few ms and batches them automatically to fill the gpu (throughput win without you coding it). concurrent model execution — multiple models, or multiple instances of one model, on the same gpu. multiple backends — serve a tensorrt engine, an onnx model, and a pytorch model side by side. model repository + versioning — drop a new version in a folder, hot-swap without redeploying clients. metrics — prometheus endpoints for latency/throughput/utilization. ensembles — chain preprocess → model → postprocess as one served unit. where it fits in this role cloud side of \"edge devices and cloud servers\": a triton fleet behind a load balancer serving many pipelines. within deepstream: nvinferserver calls triton instead of in-process nvinfer — handy when several pipelines share models or you want central model management. the tradeoff (say this out loud) a network hop to a server adds latency vs in-process tensorrt. for a single edge device chasing minimum latency, in-process nvinfer /tensorrt wins. for a cloud service with many clients and models where you want dynamic batching, versioning, and ops tooling, triton's throughput and manageability win. different jobs. why x over y triton vs in-process tensorrt? in-process = lowest latency, simplest deploy, one model per app — ideal at the edge. triton = a hop of latency but gives dynamic batching, multi-model, versioning, metrics, and shared gpu utilization — ideal as a cloud service. triton's dynamic batching vs deepstream's nvstreammux batching? both batch to fill the gpu. nvstreammux batches synchronized camera streams in a live pipeline. triton's dynamic batching batches independent client requests arriving over the network. same goal (gpu utilization), different source of requests. why version models in triton instead of redeploying? hot-swapping a model version in the repository lets you roll forward/back without touching clients or restarting pipelines — safer, faster iteration, and easy a/b. matches the jd's \"open to experiments\" culture. → next: batching-and-throughput.md","words":398},{"path":"03-low-latency-inference/batching-and-throughput.md","title":"Batching & Throughput","section":"3 · Low-Latency Inference","quiz":false,"accent":"#d39a1f","html":"<h1 id=\"batching-throughput\">Batching &amp; Throughput<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> GPUs are massively parallel; one frame barely uses them. Batching feeds many frames per kernel launch, amortizing overhead and filling the GPU — often a several-fold throughput gain. The cost is a little latency (you wait to fill the batch). Tune batch size to your latency SLA.<\/div><\/div>\n<h2 id=\"why-batching-works-the-intuition\">Why batching works (the intuition)<\/h2>\n<p>A GPU is a huge parallel factory. Sending one frame is like running the whole factory to assemble a single widget — most of the line sits idle, and you still pay the fixed cost of starting and stopping the line (kernel launch, memory transfer). Batch 16 frames and the same start/stop cost is shared across 16 → far better utilization.<\/p>\n<h2 id=\"the-latencythroughput-knob\">The l

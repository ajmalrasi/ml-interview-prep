f on frame 1 try : while true : ok, frame = cap.read() if not ok: break gray = cv2 .gaussianblur( cv2 .cvtcolor(frame, cv2 .color_bgr2gray), ( 21 , 21 ), 0 ) if prev_gray is not none : frame_diff = cv2 .absdiff(prev_gray, gray) # |previous - current| motion_mask = cv2 .threshold(frame_diff, 25 , 255 , cv2 .thresh_binary)[ 1 ] # keep big changes motion_mask = cv2 .dilate(motion_mask, none , iterations= 2 ) # merge blobs contours, _ = cv2 .findcontours(motion_mask, cv2 .retr_external, cv2 .chain_approx_simple) for contour in contours: if cv2 .contourarea(contour) < min_area: # ignore tiny flicker continue x, y, box_w, box_h = cv2 .boundingrect(contour) cv2 .rectangle(frame, (x, y), (x + box_w, y + box_h), ( 0 , 255 , 0 ), 2 ) writer.write(frame) prev_gray = gray # current frame becomes the baseline finally : cap.release(); writer.release() # always release both (no leaks) return out watch out: videowriter size must match the frames you write, or you get an empty file. blur before diff to kill sensor noise. fourcc \"mp4v\" for .mp4 . problem 15 — overlay fps / text and count frames tests: drawing text, reading video properties, simple per-frame overlay. the problem: overlay live diagnostics (frame number, throughput) on each frame — the \"prove your pipeline keeps up\" task. the plan: read frame -> puttext(\"frame n x fps\") -> writer.write(frame) measured fps = frames processed / wall-clock time (not the file's metadata fps - that's just its playback rate) why this way: measured fps is the number that answers \"is my processing real-time?\" — comparing it against the source fps tells you if you're falling behind. the drawing gotchas to memorize: puttext coordinates are the bottom-left of the text (not top-left), coordinates are (x, y), and colors are bgr — yellow is (0, 255, 255) . import cv2 , time def annotate(source, out= \"p15_out.mp4\" ): cap = cv2 .videocapture(source) fps = cap.get( cv2 .cap_prop_fps) or 25 width, height = ( int (cap.get( cv2 .cap_prop_frame_width)), int (cap.get( cv2 .cap_prop_frame_height))) writer = cv2 .videowriter(out, cv2 .videowriter_fourcc(* \"mp4v\" ), fps, (width, height)) frame_count, start_time = 0 , time.time() while true : ok, frame = cap.read() if not ok: break frame_count += 1 measured_fps = frame_count / (time.time() - start_time + 1e- 9 ) # avoid /0 cv2 .puttext(frame, f\"frame {frame_count} {measured_fps:4.1f} fps\" , ( 10 , 30 ), # (x, y) of text bottom-left cv2 .font_hershey_simplex, 0.8 , ( 0 , 255 , 255 ), 2 ) # bgr yellow writer.write(frame) cap.release(); writer.release() return frame_count watch out: puttext origin is the bottom-left of the text and coords are (x, y). colors are bgr . → next: python-and-numpy.md","words":990},{"path":"10-coding-practice/python-and-numpy.md","title":"Python & NumPy","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"python-numpy-engineering\">Python &amp; NumPy Engineering<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Beyond CV, they want clean, <strong>fault-tolerant<\/strong> Python: vectorized NumPy (no per-pixel Python loops), a batch processor that survives bad files, and basic algorithmic thinking. The JD literally says \"fault-tolerant… manage resources in long-running processes\" — show that.<\/div><\/div>\n<hr>\n<h2 id=\"problem-16-vectorize-it-no-pixel-loops\">Problem 16 — Vectorize it (no pixel loops)<\/h2>\n<p><strong>Tests:<\/strong> that you reach for NumPy, not <code>for y: for x:<\/code>. Example: threshold + tint without loops.<\/p>\n<p><strong>The problem:<\/strong> do a per-pixel operation (select + recolor) without writing a per-pixel Python loop.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> loops:  for y: for x: if gray[y,x] &gt; 180: img[y,x] = red\n         ==&gt; 350,000 interpreted Python iterations        (slow)\n\n numpy:  mask = gray &gt; 180        one C-speed comparison  -&gt; bool array\n         img[mask] = (0, 0, 255)  one C-speed scatter     (fast)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> NumPy's entire value is that the loop happens inside compiled C, not the Python interpreter — typically ~100-1000x faster. Boolean-mask indexing and <code>axis=<\/code> reductions replace 90% of pixel loops you'd be tempted to write. The interview tell: the moment you type <code>for y in range(h)<\/code>, stop and ask \"what's the array expression for this?\"<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n<span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> red_tint_bright_areas(path, out=<span class=\"tok-string\">\"p16_out.png\"<\/span>, bright_threshold=<span class=\"tok-number\">180<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    bright_mask = gray &gt; bright_threshold    <span class=\"tok-comment\"># boolean array, fully vectorized<\/span>\n    img[bright_mask] = [<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>]           <span class=\"tok-comment\"># set all bright pixels red (BGR)<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img\n\n<span class=\"tok-comment\"># Per-channel mean without loops:<\/span>\n<span class=\"tok-keyword\">def<\/span> channel_means(img):\n    <span class=\"tok-keyword\">return<\/span> img.reshape(-<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">3<\/span>).mean(axis=<span class=\"tok-number\">0<\/span>)  <span class=\"tok-comment\"># (B_mean, G_mean, R_mean)<\/span><\/code><\/pre>\n<p><strong>Watch out:<\/strong> boolean-mask indexing (<code>img[mask] = ...<\/code>) and <code>axis=<\/code> reductions are the whole point. If you wrote a double <code>for<\/code> loop over pixels, that's the wrong answer — say \"vectorize with NumPy.\"<\/p>\n<hr>\n<h2 id=\"problem-17-fault-tolerant-batch-image-processor\">Problem 17 — Fault-tolerant batch image processor<\/h2>\n<p><strong>Tests:<\/strong> the \"manage a long-running job, don't crash on one bad input\" skill. Process a folder, skip and log corrupt files, keep going.<\/p>\n<p><strong>The problem:<\/strong> process a folder of 10,000 images where file #37 is corrupt — without the whole job dying at #37.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> for each file:\n     try:     read -&gt; check None -&gt; process -&gt; write   ok += 1\n     except:  log the name and reason, fail += 1, CONTINUE\n\n one bad file = one warning line, not a dead 3-hour batch job<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the try/except goes <em>inside<\/em> the loop, per file — wrap the whole loop instead and the first bad file still kills everything after it. The subtle trap this problem is really testing: <code>cv2.imread<\/code> does NOT raise on failure, it silently returns <code>None<\/code> — you must check and raise yourself. Returning (ok, fail) counts and logging skips makes the job observable, which is what \"fault-tolerant\" means in practice.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> os\n<span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> logging\n\nlogging.basicConfig(level=logging.INFO, format=<span class=\"tok-string\">\"%(levelname)s %(message)s\"<\/span>)\n\n<span class=\"tok-keyword\">def<\/span> process_folder(in_dir, out_dir):\n    os.makedirs(out_dir, exist_ok=<span class=\"tok-keyword\">True<\/span>)\n    exts = (<span class=\"tok-string\">\".jpg\"<\/span>, <span class=\"tok-string\">\".jpeg\"<\/span>, <span class=\"tok-string\">\".png\"<\/span>, <span class=\"tok-string\">\".bmp\"<\/span>)\n    ok = fail = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> name <span class=\"tok-keyword\">in<\/span> sorted(os.listdir(in_dir)):\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> name.lower().endswith(exts):     <span class=\"tok-comment\"># skip non-image files<\/span>\n            <span class=\"tok-keyword\">continue<\/span>\n        src = os.path.join(in_dir, name)\n        <span class=\"tok-keyword\">try<\/span>:\n            img = <span class=\"tok-builtin\">cv2<\/span>.imread(src)\n            <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n                <span class=\"tok-keyword\">raise<\/span> ValueError(<span class=\"tok-string\">\"unreadable / corrupt\"<\/span>)\n            gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n            <span class=\"tok-builtin\">cv2<\/span>.imwrite(os.path.join(out_dir, name), gray)\n            ok += <span class=\"tok-number\">1<\/span>\n        <span class=\"tok-keyword\">except<\/span> Exception <span class=\"tok-keyword\">as<\/span> e:                      <span class=\"tok-comment\"># one bad file can't kill the run<\/span>\n            logging.warning(<span class=\"tok-string\">\"skipped %s: %s\"<\/span>, name, e)\n            fail += <span class=\"tok-number\">1<\/span>\n    logging.info(<span class=\"tok-string\">\"done: %d ok, %d failed\"<\/span>, ok, fail)\n    <span class=\"tok-keyword\">return<\/span> ok, fail<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>cv2.imread<\/code> returns <strong>None<\/strong> on failure (it doesn't raise) — guard it. Catch per-file so the batch continues; log what you skipped. That <em>is<\/em> fault tolerance.<\/p>\n<hr>\n<h2 id=\"problem-18-count-connected-components-blobs\">Problem 18 — Count connected components (blobs)<\/h2>\n<p><strong>Tests:<\/strong> a small algorithm framed in CV terms; thresholding + labeling.<\/p>\n<p><strong>The problem:<\/strong> count the distinct objects (blobs) in an image — and be ready to do it with <em>and<\/em> without OpenCV.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> grid:   1 1 . .        two components under 4-connectivity\n         . 1 . 1        (up/down/left/right - diagonals do NOT connect)\n         . . . 1\n\n OpenCV:  threshold -&gt; connectedComponentsWithStats -&gt; filter by area\n by hand: scan cells; each unseen 1 starts a BFS flood-fill; count fills<\/code><\/pre>\n<p><strong>Why this way:<\/strong> <code>connectedComponentsWithStats<\/code> beats <code>findContours<\/code> for counting — it labels every pixel and returns areas + centroids directly, with no contour-hierarchy edge cases (nested shapes can't fool it). Remember label 0 is the background: start loops at 1. The pure-Python BFS is the same idea by hand — it's LeetCode's \"Number of Islands\", and the <code>seen<\/code> matrix is what prevents counting one island twice.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> count_blobs(path, min_area=<span class=\"tok-number\">50<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path, <span class=\"tok-builtin\">cv2<\/span>.IMREAD_GRAYSCALE)\n    _, binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(img, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)\n    num_labels, labels, stats, centroids = <span class=\"tok-builtin\">cv2<\/span>.connectedComponentsWithStats(binary)\n    <span class=\"tok-comment\"># label 0 is the background; filter tiny specks by area<\/span>\n    blobs = [i <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(<span class=\"tok-number\">1<\/span>, num_labels)\n             <span class=\"tok-keyword\">if<\/span> stats[i, <span class=\"tok-builtin\">cv2<\/span>.CC_STAT_AREA] &gt;= min_area]\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">len<\/span>(blobs), centroids[blobs]<\/code><\/pre>\n<p>If asked to do it <strong>without<\/strong> OpenCV (pure algorithm), flood-fill / BFS over the binary grid:<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> collections <span class=\"tok-keyword\">import<\/span> deque\n\n<span class=\"tok-keyword\">def<\/span> count_islands(grid):\n    <span class=\"tok-string\">\"\"\"grid: 2D list of 0/1. Counts 4-connected components of 1s.\"\"\"<\/span>\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> grid:\n        <span class=\"tok-keyword\">return<\/span> <span class=\"tok-number\">0<\/span>\n    rows, cols = <span class=\"tok-builtin\">len<\/span>(grid), <span class=\"tok-builtin\">len<\/span>(grid[<span class=\"tok-number\">0<\/span>])\n    seen = [[<span class=\"tok-keyword\">False<\/span>] * cols <span class=\"tok-keyword\">for<\/span> _ <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(rows)]\n    count = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> row <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(rows):\n        <span class=\"tok-keyword\">for<\/span> col <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(cols):\n            <span class=\"tok-keyword\">if<\/span> grid[row][col] == <span class=\"tok-number\">1<\/span> <span class=\"tok-keyword\">and<\/span> <span class=\"tok-keyword\">not<\/span> seen[row][col]:  <span class=\"tok-comment\"># new island found<\/span>\n                count += <span class=\"tok-number\">1<\/span>\n                <span class=\"tok-comment\"># BFS flood-fill: mark every 1 connected to this one as seen<\/span>\n                queue = deque([(row, col)]); seen[row][col] = <span class=\"tok-keyword\">True<\/span>\n                <span class=\"tok-keyword\">while<\/span> queue:\n                    r, c = queue.popleft()\n                    <span class=\"tok-keyword\">for<\/span> d_row, d_col <span class=\"tok-keyword\">in<\/span> ((<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>), (-<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">1<\/span>), (<span class=\"tok-number\">0<\/span>, -<span class=\"tok-number\">1<\/span>)):  <span class=\"tok-comment\"># 4-conn<\/span>\n                        next_r, next_c = r + d_row, c + d_col\n                        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-number\">0<\/span> &lt;= next_r &lt; rows <span class=\"tok-keyword\">and<\/span> <span class=\"tok-number\">0<\/span> &lt;= next_c &lt; cols \\\n                           <span class=\"tok-keyword\">and<\/span> grid[next_r][next_c] == <span class=\"tok-number\">1<\/span> <span class=\"tok-keyword\">and<\/span> <span class=\"tok-keyword\">not<\/span> seen[next_r][next_c]:\n                            seen[next_r][next_c] = <span class=\"tok-keyword\">True<\/span>\n                            queue.append((next_r, next_c))\n    <span class=\"tok-keyword\">return<\/span> count<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>connectedComponentsWithStats<\/code> labels background as 0 — start your loop at 1. The pure-Python flood fill is the classic \"number of islands\" if they want a DSA flavor.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"opencv-cheat-sheet.md\" href=\"#\">opencv-cheat-sheet.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"problem-16-vectorize-it-no-pixel-loops","text":"Problem 16 — Vectorize it (no pixel loops)"},{"level":2,"id":"problem-17-fault-tolerant-batch-image-processor","text":"Problem 17 — Fault-tolerant batch image processor"},{"level":2,"id":"problem-18-count-connected-components-blobs","text":"Problem 18 — Count connected components (blobs)"}],"text":"python & numpy engineering 💡 tl;dr beyond cv, they want clean, fault-tolerant python: vectorized numpy (no per-pixel python loops), a batch processor that survives bad files, and basic algorithmic thinking. the jd literally says \"fault-tolerant… manage resources in long-running processes\" — show that. problem 16 — vectorize it (no pixel loops) tests: that you reach for numpy, not for y: for x: . example: threshold + tint without loops. the problem: do a per-pixel operation (select + recolor) without writing a per-pixel python loop. the plan: loops: for y: for x: if gray[y,x] > 180: img[y,x] = red ==> 350,000 interpreted python iterations (slow) numpy: mask = gray > 180 one c-speed comparison -> bool array img[mask] = (0, 0, 255) one c-speed scatter (fast) why this way: numpy's entire value is that the loop happens inside compiled c, not the python interpreter — typically ~100-1000x faster. boolean-mask indexing and axis= reductions replace 90% of pixel loops you'd be tempted to write. the interview tell: the moment you type for y in range(h) , stop and ask \"what's the array expression for this?\" import numpy as np import cv2 def red_tint_bright_areas(path, out= \"p16_out.png\" , bright_threshold= 180 ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) bright_mask = gray > bright_threshold # boolean array, fully vectorized img[bright_mask] = [ 0 , 0 , 255 ] # set all bright pixels red (bgr) cv2 .imwrite(out, img) return img # per-channel mean without loops: def channel_means(img): return img.reshape(- 1 , 3 ).mean(axis= 0 ) # (b_mean, g_mean, r_mean) watch out: boolean-mask indexing ( img[mask] = ... ) and axis= reductions are the whole point. if you wrote a double for loop over pixels, that's the wrong answer — say \"vectorize with numpy.\" problem 17 — fault-tolerant batch image processor tests: the \"manage a long-running job, don't crash on one bad input\" skill. process a folder, skip and log corrupt files, keep going. the problem: process a folder of 10,000 images where file #37 is corrupt — without the whole job dying at #37. the plan: for each file: try: read -> check none -> process -> write ok += 1 except: log the name and reason, fail += 1, continue one bad file = one warning line, not a dead 3-hour batch job why this way: the try/except goes inside the loop, per file — wrap the whole loop instead and the first bad file still kills everything after it. the subtle trap this problem is really testing: cv2.imread does not raise on failure, it silently returns none — you must check and raise yourself. returning (ok, fail) counts and logging skips makes the job observable, which is what \"fault-tolerant\" means in practice. import os import cv2 import logging logging.basicconfig(level=logging.info, format= \"%(levelname)s %(message)s\" ) def process_folder(in_dir, out_dir): os.makedirs(out_dir, exist_ok= true ) exts = ( \".jpg\" , \".jpeg\" , \".png\" , \".bmp\" ) ok = fail = 0 for name in sorted(os.listdir(in_dir)): if not name.lower().endswith(exts): # skip non-image files continue src = os.path.join(in_dir, name) try : img = cv2 .imread(src) if img is none : raise valueerror( \"unreadable / corrupt\" ) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) cv2 .imwrite(os.path.join(out_dir, name), gray) ok += 1 except exception as e: # one bad file can't kill the run logging.warning( \"skipped %s: %s\" , name, e) fail += 1 logging.info( \"done: %d ok, %d failed\" , ok, fail) return ok, fail watch out: cv2.imread returns none on failure (it doesn't raise) — guard it. catch per-file so the batch continues; log what you skipped. that is fault tolerance. problem 18 — count connected components (blobs) tests: a small algorithm framed in cv terms; thresholding + labeling. the problem: count the distinct objects (blobs) in an image — and be ready to do it with and without opencv. the plan: grid: 1 1 . . two components under 4-connectivity . 1 . 1 (up/down/left/right - diagonals do not connect) . . . 1 opencv: threshold -> connectedcomponentswithstats -> filter by area by hand: scan cells; each unseen 1 starts a bfs flood-fill; count fills why this way: connectedcomponentswithstats beats findcontours for counting — it labels every pixel and returns areas + centroids directly, with no contour-hierarchy edge cases (nested shapes can't fool it). remember label 0 is the background: start loops at 1. the pure-python bfs is the same idea by hand — it's leetcode's \"number of islands\", and the seen matrix is what prevents counting one island twice. import cv2 def count_blobs(path, min_area= 50 ): img = cv2 .imread(path, cv2 .imread_grayscale) _, binary = cv2 .threshold(img, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) num_labels, labels, stats, centroids = cv2 .connectedcomponentswithstats(binary) # label 0 is the background; filter tiny specks by area blobs = [i for i in range ( 1 , num_labels) if stats[i, cv2 .cc_stat_area] >= min_area] return len (blobs), centroids[blobs] if asked to do it without opencv (pure algorithm), flood-fill / bfs over the binary grid: from collections import deque def count_islands(grid): \"\"\"grid: 2d list of 0/1. counts 4-connected components of 1s.\"\"\" if not grid: return 0 rows, cols = len (grid), len (grid[ 0 ]) seen = [[ false ] * cols for _ in range (rows)] count = 0 for row in range (rows): for col in range (cols): if grid[row][col] == 1 and not seen[row][col]: # new island found count += 1 # bfs flood-fill: mark every 1 connected to this one as seen queue = deque([(row, col)]); seen[row][col] = true while queue: r, c = queue.popleft() for d_row, d_col in (( 1 , 0 ), (- 1 , 0 ), ( 0 , 1 ), ( 0 , - 1 )): # 4-conn next_r, next_c = r + d_row, c + d_col if 0 <= next_r < rows and 0 <= next_c < cols \\ and grid[next_r][next_c] == 1 and not seen[next_r][next_c]: seen[next_r][next_c] = true queue.append((next_r, next_c)) return count watch out: connectedcomponentswithstats labels background as 0 — start your loop at 1. the pure-python flood fill is the classic \"number of islands\" if they want a dsa flavor. → next: opencv-cheat-sheet.md","words":1014},{"path":"10-coding-practice/opencv-cheat-sheet.md","title":"OpenCV Cheat Sheet","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"opencv-cheat-sheet-memorize\">OpenCV Cheat Sheet (Memorize)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> No AI during the test, so the API has to be in your head. This is the 80% you'll actually reach for. Re-type a few of these from memory the morning of.<\/div><\/div>\n<hr>\n<h2 id=\"io-basics\">I/O &amp; basics<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>, numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\nimg = <span class=\"tok-builtin\">cv2<\/span>.imread(<span class=\"tok-string\">\"in.jpg\"<\/span>)             <span class=\"tok-comment\"># BGR uint8, (H,W,3); None if missing!<\/span>\nimg = <span class=\"tok-builtin\">cv2<\/span>.imread(<span class=\"tok-string\">\"in.jpg\"<\/span>, <span class=\"tok-builtin\">cv2<\/span>.IMREAD_GRAYSCALE)\n<span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"out.png\"<\/span>, img)\nh, w = img.shape[:<span class=\"tok-number\">2<\/span>]                    <span class=\"tok-comment\"># rows, cols  (y before x)<\/span>\nroi = img[y1:y2, x1:x2]                 <span class=\"tok-comment\"># crop = rows then cols<\/span><\/code><\/pre>\n<p>Remember: <strong>BGR not RGB<\/strong>, dtype <strong>uint8<\/strong> (0–255), shape <strong>(H, W, C)<\/strong>, <code>imread<\/code> returns <strong>None<\/strong> on failure (guard it).<\/p>\n<h2 id=\"color\">Color<\/h2>\n<pre><code class=\"language-python\">gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\nhsv  = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2HSV)     <span class=\"tok-comment\"># hue for color segmentation<\/span>\nrgb  = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2RGB)     <span class=\"tok-comment\"># before feeding most models<\/span>\nmask = <span class=\"tok-builtin\">cv2<\/span>.inRange(hsv, (<span class=\"tok-number\">35<\/span>,<span class=\"tok-number\">80<\/span>,<span class=\"tok-number\">80<\/span>), (<span class=\"tok-number\">85<\/span>,<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">255<\/span>))   <span class=\"tok-comment\"># threshold a colour range<\/span><\/code><\/pre>\n<h2 id=\"blur-denoise\">Blur / denoise<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(img, (<span class=\"tok-number\">5<\/span>,<span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>)         <span class=\"tok-comment\"># ksize must be odd<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.medianBlur(img, <span class=\"tok-number\">5<\/span>)                  <span class=\"tok-comment\"># salt-and-pepper<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.bilateralFilter(img, <span class=\"tok-number\">9<\/span>, <span class=\"tok-number\">75<\/span>, <span class=\"tok-number\">75<\/span>)     <span class=\"tok-comment\"># smooth but keep edges<\/span><\/code><\/pre>\n<h2 id=\"threshold\">Threshold<\/h2>\n<pre><code class=\"language-python\">_, th = <span class=\"tok-builtin\">cv2<\/span>.threshold(gray, <span class=\"tok-number\">127<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY)\n_, th = <span class=\"tok-builtin\">cv2<\/span>.threshold(gray, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)   <span class=\"tok-comment\"># auto<\/span>\nth = <span class=\"tok-builtin\">cv2<\/span>.adaptiveThreshold(gray, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.ADAPTIVE_THRESH_GAUSSIAN_C,\n                           <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY, <span class=\"tok-number\">31<\/span>, <span class=\"tok-number\">10<\/span>)   <span class=\"tok-comment\"># blockSize odd, then C<\/span><\/code><\/pre>\n<h2 id=\"morphology\">Morphology<\/h2>\n<pre><code class=\"language-python\">k = <span class=\"tok-builtin\">cv2<\/span>.getStructuringElement(<span class=\"tok-builtin\">cv2<\/span>.MORPH_RECT, (<span class=\"tok-number\">3<\/span>,<span class=\"tok-number\">3<\/span>))\n<span class=\"tok-builtin\">cv2<\/span>.erode(th, k); <span class=\"tok-builtin\">cv2<\/span>.dilate(th, k)\n<span class=\"tok-builtin\">cv2<\/span>.morphologyEx(th, <span class=\"tok-builtin\">cv2<\/span>.MORPH_OPEN, k)    <span class=\"tok-comment\"># erode→dilate: remove specks<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.morphologyEx(th, <span class=\"tok-builtin\">cv2<\/span>.MORPH_CLOSE, k)   <span class=\"tok-comment\"># dilate→erode: fill holes<\/span><\/code><\/pre>\n<h2 id=\"edges-contours\">Edges &amp; contours<\/h2>\n<pre><code class=\"language-python\">edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(gray, <span class=\"tok-number\">50<\/span>, <span class=\"tok-number\">150<\/span>)\ncnts, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(edges, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\nc = <span class=\"tok-builtin\">max<\/span>(cnts, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea)\narea = <span class=\"tok-builtin\">cv2<\/span>.contourArea(c); peri = <span class=\"tok-builtin\">cv2<\/span>.arcLength(c, <span class=\"tok-keyword\">True<\/span>)\napprox = <span class=\"tok-builtin\">cv2<\/span>.approxPolyDP(c, <span class=\"tok-number\">0.02<\/span>*peri, <span class=\"tok-keyword\">True<\/span>)      <span class=\"tok-comment\"># corner simplification<\/span>\nx, y, w, h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(c)\nrect = <span class=\"tok-builtin\">cv2<\/span>.minAreaRect(c)                          <span class=\"tok-comment\"># rotated box (center,size,angle)<\/span><\/code><\/pre>\n<h2 id=\"geometric-transforms\">Geometric transforms<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">cv2<\/span>.resize(img, (w,h), interpolation=<span class=\"tok-builtin\">cv2<\/span>.INTER_AREA)   <span class=\"tok-comment\"># AREA shrink, CUBIC grow<\/span>\nM = <span class=\"tok-builtin\">cv2<\/span>.getRotationMatrix2D((cx,cy), angle, <span class=\"tok-number\">1.0<\/span>)\n<span class=\"tok-builtin\">cv2<\/span>.warpAffine(img, M, (w,h))\nM = <span class=\"tok-builtin\">cv2<\/span>.getPerspectiveTransform(src4, dst4)            <span class=\"tok-comment\"># both float32!<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.warpPerspective(img, M, (w,h))\nM = <span class=\"tok-builtin\">cv2<\/span>.findHomography(srcPts, dstPts, <span class=\"tok-builtin\">cv2<\/span>.RANSAC)[<span class=\"tok-number\">0<\/span>]  <span class=\"tok-comment\"># robust, many points<\/span><\/code><\/pre>\n<h2 id=\"drawing-bgr-colors-xy-points\">Drawing (BGR colors, (x,y) points)<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">cv2<\/span>.rectangle(img, (x1,y1), (x2,y2), (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n<span class=\"tok-builtin\">cv2<\/span>.circle(img, (x,y), <span class=\"tok-number\">5<\/span>, (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>), -<span class=\"tok-number\">1<\/span>)            <span class=\"tok-comment\"># -1 = filled<\/span>\n<span class=\"tok-builtin\">cv2<\/span>.line(img, p1, p2, (<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n<span class=\"tok-builtin\">cv2<\/span>.putText(img, <span class=\"tok-string\">\"hi\"<\/span>, (x,y), <span class=\"tok-builtin\">cv2<\/span>.FONT_HERSHEY_SIMPLEX, <span class=\"tok-number\">0.8<\/span>, (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">255<\/span>), <span class=\"tok-number\">2<\/span>)\n<span class=\"tok-builtin\">cv2<\/span>.polylines(img, [pts.reshape(-<span class=\"tok-number\">1<\/span>,<span class=\"tok-number\">1<\/span>,<span class=\"tok-number\">2<\/span>)], <span class=\"tok-keyword\">True<\/span>, (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>,<span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)<\/code><\/pre>\n<h2 id=\"video\">Video<\/h2>\n<pre><code class=\"language-python\">cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(src)             <span class=\"tok-comment\"># path, index (0=webcam), or rtsp url<\/span>\ncap.isOpened()\nok, frame = cap.read()                  <span class=\"tok-comment\"># ok=False at end / on failure<\/span>\nfps = cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FPS)\ncap.release()\nvw = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter(<span class=\"tok-string\">\"out.mp4\"<\/span>, <span class=\"tok-builtin\">cv2<\/span>.VideoWriter_fourcc(*<span class=\"tok-string\">\"mp4v\"<\/span>), fps, (w,h))\nvw.write(frame); vw.release()           <span class=\"tok-comment\"># size MUST match written frames<\/span><\/code><\/pre>\n<h2 id=\"numpy-youll-need\">NumPy you'll need<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-builtin\">np<\/span>.zeros((h,w,<span class=\"tok-number\">3<\/span>), <span class=\"tok-builtin\">np<\/span>.uint8); <span class=\"tok-builtin\">np<\/span>.full((h,w,<span class=\"tok-number\">3<\/span>), <span class=\"tok-number\">114<\/span>, <span class=\"tok-builtin\">np<\/span>.uint8)\nmask = gray &gt; <span class=\"tok-number\">180<\/span>; img[mask] = (<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">0<\/span>,<span class=\"tok-number\">255<\/span>)        <span class=\"tok-comment\"># boolean indexing<\/span>\nimg.reshape(-<span class=\"tok-number\">1<\/span>,<span class=\"tok-number\">3<\/span>).mean(axis=<span class=\"tok-number\">0<\/span>)                  <span class=\"tok-comment\"># per-channel mean<\/span>\n<span class=\"tok-builtin\">np<\/span>.clip(x, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>).astype(<span class=\"tok-builtin\">np<\/span>.uint8)             <span class=\"tok-comment\"># keep valid pixel range<\/span>\n<span class=\"tok-builtin\">np<\/span>.linalg.norm(a - b)                           <span class=\"tok-comment\"># Euclidean distance<\/span><\/code><\/pre>\n<h2 id=\"gotchas-that-cost-marks\">Gotchas that cost marks<\/h2>\n<ul><li><code>imread<\/code> → <strong>None<\/strong> on bad path (no exception). Always check.<\/li><li>Points are <strong>(x, y)<\/strong>; array indexing is <strong>[row, col] = [y, x]<\/strong>. Don't mix.<\/li><li>Colors are <strong>BGR<\/strong>. <code>(0,0,255)<\/code> is red.<\/li><li>Kernel / blockSize sizes must be <strong>odd<\/strong>.<\/li><li><code>getPerspectiveTransform<\/code> / <code>getAffineTransform<\/code> need <strong>float32<\/strong> points.<\/li><li><code>VideoWriter<\/code> silently makes an empty file if frame size mismatches.<\/li><li>Save your <strong>output images<\/strong> with clear names — it's part of the grade.<\/li><\/ul>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">chapter overview<\/a>.<\/p>","toc":[{"level":2,"id":"io-basics","text":"I/O &amp; basics"},{"level":2,"id":"color","text":"Color"},{"level":2,"id":"blur-denoise","text":"Blur / denoise"},{"level":2,"id":"threshold","text":"Threshold"},{"level":2,"id":"morphology","text":"Morphology"},{"level":2,"id":"edges-contours","text":"Edges &amp; contours"},{"level":2,"id":"geometric-transforms","text":"Geometric transforms"},{"level":2,"id":"drawing-bgr-colors-xy-points","text":"Drawing (BGR colors, (x,y) points)"},{"level":2,"id":"video","text":"Video"},{"level":2,"id":"numpy-youll-need","text":"NumPy you'll need"},{"level":2,"id":"gotchas-that-cost-marks","text":"Gotchas that cost marks"}],"text":"opencv cheat sheet (memorize) 💡 tl;dr no ai during the test, so the api has to be in your head. this is the 80% you'll actually reach for. re-type a few of these from memory the morning of. i/o & basics import cv2 , numpy as np img = cv2 .imread( \"in.jpg\" ) # bgr uint8, (h,w,3); none if missing! img = cv2 .imread( \"in.jpg\" , cv2 .imread_grayscale) cv2 .imwrite( \"out.png\" , img) h, w = img.shape[: 2 ] # rows, cols (y before x) roi = img[y1:y2, x1:x2] # crop = rows then cols remember: bgr not rgb , dtype uint8 (0–255), shape (h, w, c) , imread returns none on failure (guard it). color gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) hsv = cv2 .cvtcolor(img, cv2 .color_bgr2hsv) # hue for color segmentation rgb = cv2 .cvtcolor(img, cv2 .color_bgr2rgb) # before feeding most models mask = cv2 .inrange(hsv, ( 35 , 80 , 80 ), ( 85 , 255 , 255 )) # threshold a colour range blur / denoise cv2 .gaussianblur(img, ( 5 , 5 ), 0 ) # ksize must be odd cv2 .medianblur(img, 5 ) # salt-and-pepper cv2 .bilateralfilter(img, 9 , 75 , 75 ) # smooth but keep edges threshold _, th = cv2 .threshold(gray, 127 , 255 , cv2 .thresh_binary) _, th = cv2 .threshold(gray, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) # auto th = cv2 .adaptivethreshold(gray, 255 , cv2 .adaptive_thresh_gaussian_c, cv2 .thresh_binary, 31 , 10 ) # blocksize odd, then c morphology k = cv2 .getstructuringelement( cv2 .morph_rect, ( 3 , 3 )) cv2 .erode(th, k); cv2 .dilate(th, k) cv2 .morphologyex(th, cv2 .morph_open, k) # erode→dilate: remove specks cv2 .morphologyex(th, cv2 .morph_close, k) # dilate→erode: fill holes edges & contours edges = cv2 .canny(gray, 50 , 150 ) cnts, _ = cv2 .findcontours(edges, cv2 .retr_external, cv2 .chain_approx_simple) c = max (cnts, key= cv2 .contourarea) area = cv2 .contourarea(c); peri = cv2 .arclength(c, true ) approx = cv2 .approxpolydp(c, 0.02 *peri, true ) # corner simplification x, y, w, h = cv2 .boundingrect(c) rect = cv2 .minarearect(c) # rotated box (center,size,angle) geometric transforms cv2 .resize(img, (w,h), interpolation= cv2 .inter_area) # area shrink, cubic grow m = cv2 .getrotationmatrix2d((cx,cy), angle, 1.0 ) cv2 .warpaffine(img, m, (w,h)) m = cv2 .getperspectivetransform(src4, dst4) # both float32! cv2 .warpperspective(img, m, (w,h)) m = cv2 .findhomography(srcpts, dstpts, cv2 .ransac)[ 0 ] # robust, many points drawing (bgr colors, (x,y) points) cv2 .rectangle(img, (x1,y1), (x2,y2), ( 0 , 255 , 0 ), 2 ) cv2 .circle(img, (x,y), 5 , ( 0 , 0 , 255 ), - 1 ) # -1 = filled cv2 .line(img, p1, p2, ( 255 , 0 , 0 ), 2 ) cv2 .puttext(img, \"hi\" , (x,y), cv2 .font_hershey_simplex, 0.8 , ( 0 , 255 , 255 ), 2 ) cv2 .polylines(img, [pts.reshape(- 1 , 1 , 2 )], true , ( 0 , 255 , 0 ), 2 ) video cap = cv2 .videocapture(src) # path, index (0=webcam), or rtsp url cap.isopened() ok, frame = cap.read() # ok=false at end / on failure fps = cap.get( cv2 .cap_prop_fps) cap.release() vw = cv2 .videowriter( \"out.mp4\" , cv2 .videowriter_fourcc(* \"mp4v\" ), fps, (w,h)) vw.write(frame); vw.release() # size must match written frames numpy you'll need np .zeros((h,w, 3 ), np .uint8); np .full((h,w, 3 ), 114 , np .uint8) mask = gray > 180 ; img[mask] = ( 0 , 0 , 255 ) # boolean indexing img.reshape(- 1 , 3 ).mean(axis= 0 ) # per-channel mean np .clip(x, 0 , 255 ).astype( np .uint8) # keep valid pixel range np .linalg.norm(a - b) # euclidean distance gotchas that cost marks imread → none on bad path (no exception). always check. points are (x, y) ; array indexing is [row, col] = [y, x] . don't mix. colors are bgr . (0,0,255) is red. kernel / blocksize sizes must be odd . getperspectivetransform / getaffinetransform need float32 points. videowriter silently makes an empty file if frame size mismatches. save your output images with clear names — it's part of the grade. → back to chapter overview .","words":681},{"path":"10-coding-practice/mock-test.md","title":"⏱ 90-min Mock Test","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"90-minute-mock-test\">⏱ 90-Minute Mock Test<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A realistic dry run of the KoiReader proctored round. Set a <strong>90-minute timer<\/strong>, work in the blank starter notebook (<code>notebooks/05_mock_test.ipynb<\/code>), <strong>don't look at the solutions<\/strong> until you're done. Solutions: <a class=\"mdlink\" data-href=\"mock-solutions.md\" href=\"#\">mock-solutions.md<\/a>.<\/div><\/div>\n<h2 id=\"simulate-the-real-conditions\">Simulate the real conditions<\/h2>\n<ul><li><strong>No AI, no autocomplete.<\/strong> Disable Copilot/AI suggestions. Google <strong>syntax only<\/strong>.<\/li><li>One <strong>timer, 90 minutes<\/strong>, four problems. Don't get stuck — bank the easy marks<\/li><\/ul>\n<p>first (Problem 4 is quick).<\/p>\n<ul><li><strong>Save every required output file<\/strong> with the exact name asked. Producing the<\/li><\/ul>\n<p>output image/CSV is part of the score, just like the real test.<\/p>\n<ul><li>When done, practice exporting: <code>jupyter nbconvert --to html notebooks/05_mock_test.ipynb<\/code>.<\/li><\/ul>\n<p>The starter notebook's setup cell generates all inputs (<code>label.jpg<\/code>, <code>clip.avi<\/code>, <code>imgs/<\/code>, a detections list) so everything runs offline.<\/p>\n<hr>\n<h2 id=\"problem-1-label-scanner-25-min\">Problem 1 — Label scanner (25 min)<\/h2>\n<p><code>label.jpg<\/code> is a photo of a label/document lying at an angle on a darker background. Produce a clean, top-down, OCR-ready scan.<\/p>\n<p><strong>Required:<\/strong><\/p>\n<ol><li>Detect the document's four corners and apply a perspective transform to get a<\/li><\/ol>\n<p>straight, top-down view. Save it as <strong><code>p1_scan.png<\/code><\/strong>.<\/p>\n<ol><li>From that scan, produce a binarized (black-and-white) version suitable for OCR.<\/li><\/ol>\n<p>Save it as <strong><code>p1_binary.png<\/code><\/strong>.<\/p>\n<p><strong>Tests:<\/strong> Canny + contours + <code>approxPolyDP<\/code>, <code>getPerspectiveTransform<\/code> / <code>warpPerspective<\/code>, ordering 4 points, thresholding. <em>Watch the float32 point ordering.<\/em><\/p>\n<hr>\n<h2 id=\"problem-2-detection-post-processing-zone-count-25-min\">Problem 2 — Detection post-processing + zone count (25 min)<\/h2>\n<p>You're given a list of detections (each <code>(x1, y1, x2, y2, score)<\/code>) and a polygon <strong>zone<\/strong> (list of points). The model over-fires with overlapping boxes.<\/p>\n<p><strong>Required:<\/strong><\/p>\n<ol><li>Run <strong>NMS<\/strong> (IoU threshold 0.5) to remove duplicates.<\/li><li>Count how many surviving detections have their <strong>bottom-center point<\/strong> inside<\/li><\/ol>\n<p>the zone. <strong>Print<\/strong> \"kept N, in-zone M\".<\/p>\n<ol><li>Draw on a blank 720×720 canvas: the zone outline (blue), surviving boxes<\/li><\/ol>\n<p>(green), and boxes inside the zone (red). Save as <strong><code>p2_annotated.png<\/code><\/strong>.<\/p>\n<p><strong>Tests:<\/strong> IoU + NMS from scratch, <code>cv2.pointPolygonTest<\/code>, drawing. <em>Use the foot point, not the box center.<\/em><\/p>\n<hr>\n<h2 id=\"problem-3-video-motion-summary-25-min\">Problem 3 — Video motion summary (25 min)<\/h2>\n<p><code>clip.avi<\/code> is a short video with a moving object.<\/p>\n<p><strong>Required:<\/strong><\/p>\n<ol><li>Detect motion with frame differencing; a frame \"has motion\" if the largest<\/li><\/ol>\n<p>moving region's area exceeds a threshold you choose.<\/p>\n<ol><li>Draw green boxes around moving regions and write the annotated video to<\/li><\/ol>\n<p><strong><code>p3_motion.avi<\/code><\/strong>.<\/p>\n<ol><li><strong>Print<\/strong> the total frame count and how many frames had motion. Save <strong>three<\/strong><\/li><\/ol>\n<p>sample annotated frames as <strong><code>p3_frame_0.png<\/code>, <code>p3_frame_1.png<\/code>, <code>p3_frame_2.png<\/code><\/strong>.<\/p>\n<p><strong>Tests:<\/strong> robust <code>VideoCapture<\/code> loop, <code>absdiff<\/code> + threshold + contours, <code>VideoWriter<\/code> (size must match), saving frames. <em>Release everything in a <code>finally<\/code>.<\/em><\/p>\n<hr>\n<h2 id=\"problem-4-robust-batch-report-15-min\">Problem 4 — Robust batch report (15 min)<\/h2>\n<p>Folder <code>imgs/<\/code> holds several images — <strong>some are corrupt<\/strong>.<\/p>\n<p><strong>Required:<\/strong><\/p>\n<ol><li>For each readable image, compute its <strong>mean brightness<\/strong> (mean of the grayscale<\/li><\/ol>\n<p>pixels). <strong>Skip and log<\/strong> corrupt/unreadable files without crashing.<\/p>\n<ol><li>Write <strong><code>p4_report.csv<\/code><\/strong> with header <code>filename,mean_brightness<\/code>, rows sorted by<\/li><\/ol>\n<p>brightness <strong>descending<\/strong>.<\/p>\n<ol><li><strong>Print<\/strong> how many files were processed and how many skipped.<\/li><\/ol>\n<p><strong>Tests:<\/strong> fault-tolerant file loop (<code>cv2.imread<\/code> returns None!), grayscale mean, CSV writing, sorting. <em>One bad file must not kill the batch.<\/em><\/p>\n<hr>\n<h2 id=\"scoring-be-honest-with-yourself\">Scoring (be honest with yourself)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Area<\/th><th>Check<\/th><\/tr><\/thead><tbody><tr><td>Correctness<\/td><td>Does each output file look right? Counts sensible?<\/td><\/tr><tr><td>Submission hygiene<\/td><td>Exact filenames? Outputs actually saved? Would convert to <code>.html<\/code>?<\/td><\/tr><tr><td>Robustness<\/td><td>Guards on <code>imread<\/code>/capture? No crash on bad input?<\/td><\/tr><tr><td>Speed<\/td><td>Finished P4 + at least two others in 90 min?<\/td><\/tr><tr><td>Clean code<\/td><td>Readable, no dead code, sensible names?<\/td><\/tr><\/tbody><\/table><\/div>\n<p>When time's up, open <strong><a class=\"mdlink\" data-href=\"mock-solutions.md\" href=\"#\">mock-solutions.md<\/a><\/strong> and compare. Re-do anything you couldn't finish — the second pass is where it sticks.<\/p>\n<p>→ Solutions: <strong><a class=\"mdlink\" data-href=\"mock-solutions.md\" href=\"#\">mock-solutions.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"simulate-the-real-conditions","text":"Simulate the real conditions"},{"level":2,"id":"problem-1-label-scanner-25-min","text":"Problem 1 — Label scanner (25 min)"},{"level":2,"id":"problem-2-detection-post-processing-zone-count-25-min","text":"Problem 2 — Detection post-processing + zone count (25 min)"},{"level":2,"id":"problem-3-video-motion-summary-25-min","text":"Problem 3 — Video motion summary (25 min)"},{"level":2,"id":"problem-4-robust-batch-report-15-min","text":"Problem 4 — Robust batch report (15 min)"},{"level":2,"id":"scoring-be-honest-with-yourself","text":"Scoring (be honest with yourself)"}],"text":"⏱ 90-minute mock test 💡 tl;dr a realistic dry run of the koireader proctored round. set a 90-minute timer , work in the blank starter notebook ( notebooks/05_mock_test.ipynb ), don't look at the solutions until you're done. solutions: mock-solutions.md . simulate the real conditions no ai, no autocomplete. disable copilot/ai suggestions. google syntax only . one timer, 90 minutes , four problems. don't get stuck — bank the easy marks first (problem 4 is quick). save every required output file with the exact name asked. producing the output image/csv is part of the score, just like the real test. when done, practice exporting: jupyter nbconvert --to html notebooks/05_mock_test.ipynb . the starter notebook's setup cell generates all inputs ( label.jpg , clip.avi , imgs/ , a detections list) so everything runs offline. problem 1 — label scanner (25 min) label.jpg is a photo of a label/document lying at an angle on a darker background. produce a clean, top-down, ocr-ready scan. required: detect the document's four corners and apply a perspective transform to get a straight, top-down view. save it as p1_scan.png . from that scan, produce a binarized (black-and-white) version suitable for ocr. save it as p1_binary.png . tests: canny + contours + approxpolydp , getperspectivetransform / warpperspective , ordering 4 points, thresholding. watch the float32 point ordering. problem 2 — detection post-processing + zone count (25 min) you're given a list of detections (each (x1, y1, x2, y2, score) ) and a polygon zone (list of points). the model over-fires with overlapping boxes. required: run nms (iou threshold 0.5) to remove duplicates. count how many surviving detections have their bottom-center point inside the zone. print \"kept n, in-zone m\". draw on a blank 720×720 canvas: the zone outline (blue), surviving boxes (green), and boxes inside the zone (red). save as p2_annotated.png . tests: iou + nms from scratch, cv2.pointpolygontest , drawing. use the foot point, not the box center. problem 3 — video motion summary (25 min) clip.avi is a short video with a moving object. required: detect motion with frame differencing; a frame \"has motion\" if the largest moving region's area exceeds a threshold you choose. draw green boxes around moving regions and write the annotated video to p3_motion.avi . print the total frame count and how many frames had motion. save three sample annotated frames as p3_frame_0.png , p3_frame_1.png , p3_frame_2.png . tests: robust videocapture loop, absdiff + threshold + contours, videowriter (size must match), saving frames. release everything in a finally . problem 4 — robust batch report (15 min) folder imgs/ holds several images — some are corrupt . required: for each readable image, compute its mean brightness (mean of the grayscale pixels). skip and log corrupt/unreadable files without crashing. write p4_report.csv with header filename,mean_brightness , rows sorted by brightness descending . print how many files were processed and how many skipped. tests: fault-tolerant file loop ( cv2.imread returns none!), grayscale mean, csv writing, sorting. one bad file must not kill the batch. scoring (be honest with yourself) area check correctness does each output file look right? counts sensible? submission hygiene exact filenames? outputs actually saved? would convert to .html ? robustness guards on imread /capture? no crash on bad input? speed finished p4 + at least two others in 90 min? clean code readable, no dead code, sensible names? when time's up, open mock-solutions.md and compare. re-do anything you couldn't finish — the second pass is where it sticks. → solutions: mock-solutions.md","words":577},{"path":"10-coding-practice/mock-solutions.md","title":"Mock — Solutions","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"mock-solutions-dont-peek-until-youve-tried\">Mock — Solutions (don't peek until you've tried!)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Reference solutions for the <a class=\"mdlink\" data-href=\"mock-test.md\" href=\"#\">90-minute mock<\/a>. Yours doesn't need to match line-for-line — check that outputs are correct, files are saved with the right names, and inputs are guarded. All four are tested and runnable.<\/div><\/div>\n<hr>\n<h2 id=\"problem-1-label-scanner\">Problem 1 — Label scanner<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> order_points(pts):\n    rect = <span class=\"tok-builtin\">np<\/span>.zeros((<span class=\"tok-number\">4<\/span>, <span class=\"tok-number\">2<\/span>), dtype=<span class=\"tok-string\">\"float32\"<\/span>)\n    s = pts.<span class=\"tok-builtin\">sum<\/span>(axis=<span class=\"tok-number\">1<\/span>)\n    rect[<span class=\"tok-number\">0<\/span>] = pts[<span class=\"tok-builtin\">np<\/span>.argmin(s)]; rect[<span class=\"tok-number\">2<\/span>] = pts[<span class=\"tok-builtin\">np<\/span>.argmax(s)]\n    d = <span class=\"tok-builtin\">np<\/span>.diff(pts, axis=<span class=\"tok-number\">1<\/span>)\n    rect[<span class=\"tok-number\">1<\/span>] = pts[<span class=\"tok-builtin\">np<\/span>.argmin(d)]; rect[<span class=\"tok-number\">3<\/span>] = pts[<span class=\"tok-builtin\">np<\/span>.argmax(d)]\n    <span class=\"tok-keyword\">return<\/span> rect\n\n<span class=\"tok-keyword\">def<\/span> four_point_transform(image, pts):\n    rect = order_points(pts)\n    (tl, tr, br, bl) = rect\n    maxW = <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-builtin\">max<\/span>(<span class=\"tok-builtin\">np<\/span>.linalg.norm(br - bl), <span class=\"tok-builtin\">np<\/span>.linalg.norm(tr - tl)))\n    maxH = <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-builtin\">max<\/span>(<span class=\"tok-builtin\">np<\/span>.linalg.norm(tr - br), <span class=\"tok-builtin\">np<\/span>.linalg.norm(tl - bl)))\n    dst = <span class=\"tok-builtin\">np<\/span>.array([[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>], [maxW - <span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>], [maxW - <span class=\"tok-number\">1<\/span>, maxH - <span class=\"tok-number\">1<\/span>], [<span class=\"tok-number\">0<\/span>, maxH - <span class=\"tok-number\">1<\/span>]],\n                   dtype=<span class=\"tok-string\">\"float32\"<\/span>)\n    M = <span class=\"tok-builtin\">cv2<\/span>.getPerspectiveTransform(rect, dst)\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">cv2<\/span>.warpPerspective(image, M, (maxW, maxH))\n\n<span class=\"tok-keyword\">def<\/span> solve_p1(path=<span class=\"tok-string\">\"label.jpg\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> FileNotFoundError(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(<span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(gray, (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">50<\/span>, <span class=\"tok-number\">150<\/span>)\n    cnts, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(edges, <span class=\"tok-builtin\">cv2<\/span>.RETR_LIST, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    cnts = sorted(cnts, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea, reverse=<span class=\"tok-keyword\">True<\/span>)[:<span class=\"tok-number\">5<\/span>]\n    doc = <span class=\"tok-keyword\">None<\/span>\n    <span class=\"tok-keyword\">for<\/span> c <span class=\"tok-keyword\">in<\/span> cnts:\n        approx = <span class=\"tok-builtin\">cv2<\/span>.approxPolyDP(c, <span class=\"tok-number\">0.02<\/span> * <span class=\"tok-builtin\">cv2<\/span>.arcLength(c, <span class=\"tok-keyword\">True<\/span>), <span class=\"tok-keyword\">True<\/span>)\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">len<\/span>(approx) == <span class=\"tok-number\">4<\/span>:\n            doc = approx.reshape(<span class=\"tok-number\">4<\/span>, <span class=\"tok-number\">2<\/span>).astype(<span class=\"tok-string\">\"float32\"<\/span>); <span class=\"tok-keyword\">break<\/span>\n    <span class=\"tok-keyword\">if<\/span> doc <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">\"document not found\"<\/span>)\n    scan = four_point_transform(img, doc)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"p1_scan.png\"<\/span>, scan)\n    g = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(scan, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(g, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)[<span class=\"tok-number\">1<\/span>]\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"p1_binary.png\"<\/span>, binary)\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"saved p1_scan.png\"<\/span>, scan.shape, <span class=\"tok-string\">\"and p1_binary.png\"<\/span>)\n\nsolve_p1()<\/code><\/pre>\n<p><strong>Marks:<\/strong> found 4 corners, warped flat, binarized, <strong>both files saved<\/strong>.<\/p>\n<hr>\n<h2 id=\"problem-2-detection-post-processing-zone-count\">Problem 2 — Detection post-processing + zone count<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> iou(a, b):\n    ix1, iy1 = <span class=\"tok-builtin\">max<\/span>(a[<span class=\"tok-number\">0<\/span>], b[<span class=\"tok-number\">0<\/span>]), <span class=\"tok-builtin\">max<\/span>(a[<span class=\"tok-number\">1<\/span>], b[<span class=\"tok-number\">1<\/span>])\n    ix2, iy2 = <span class=\"tok-builtin\">min<\/span>(a[<span class=\"tok-number\">2<\/span>], b[<span class=\"tok-number\">2<\/span>]), <span class=\"tok-builtin\">min<\/span>(a[<span class=\"tok-number\">3<\/span>], b[<span class=\"tok-number\">3<\/span>])\n    iw, ih = <span class=\"tok-builtin\">max<\/span>(<span class=\"tok-number\">0<\/span>, ix2 - ix1), <span class=\"tok-builtin\">max<\/span>(<span class=\"tok-number\">0<\/span>, iy2 - iy1)\n    inter = iw * ih\n    ua = (a[<span class=\"tok-number\">2<\/span>]-a[<span class=\"tok-number\">0<\/span>])*(a[<span class=\"tok-number\">3<\/span>]-a[<span class=\"tok-number\">1<\/span>]) + (b[<span class=\"tok-number\">2<\/span>]-b[<span class=\"tok-number\">0<\/span>])*(b[<span class=\"tok-number\">3<\/span>]-b[<span class=\"tok-number\">1<\/span>]) - inter\n    <span class=\"tok-keyword\">return<\/span> inter / ua <span class=\"tok-keyword\">if<\/span> ua &gt; <span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">else<\/span> <span class=\"tok-number\">0.0<\/span>\n\n<span class=\"tok-keyword\">def<\/span> nms(boxes, scores, thr=<span class=\"tok-number\">0.5<\/span>):\n    idxs = sorted(<span class=\"tok-builtin\">range<\/span>(<span class=\"tok-builtin\">len<\/span>(boxes)), key=<span class=\"tok-keyword\">lambda<\/span> i: scores[i], reverse=<span class=\"tok-keyword\">True<\/span>)\n    keep = []\n    <span class=\"tok-keyword\">while<\/span> idxs:\n        cur = idxs.pop(<span class=\"tok-number\">0<\/span>); keep.append(cur)\n        idxs = [i <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> idxs <span class=\"tok-keyword\">if<\/span> iou(boxes[cur], boxes[i]) &lt; thr]\n    <span class=\"tok-keyword\">return<\/span> keep\n\n<span class=\"tok-keyword\">def<\/span> solve_p2(dets, zone):\n    boxes = [d[:<span class=\"tok-number\">4<\/span>] <span class=\"tok-keyword\">for<\/span> d <span class=\"tok-keyword\">in<\/span> dets]\n    scores = [d[<span class=\"tok-number\">4<\/span>] <span class=\"tok-keyword\">for<\/span> d <span class=\"tok-keyword\">in<\/span> dets]\n    keep = nms(boxes, scores, <span class=\"tok-number\">0.5<\/span>)\n    poly = <span class=\"tok-builtin\">np<\/span>.array(zone, <span class=\"tok-builtin\">np<\/span>.int32)\n    canvas = <span class=\"tok-builtin\">np<\/span>.full((<span class=\"tok-number\">720<\/span>, <span class=\"tok-number\">720<\/span>, <span class=\"tok-number\">3<\/span>), <span class=\"tok-number\">40<\/span>, <span class=\"tok-builtin\">np<\/span>.uint8)\n    <span class=\"tok-builtin\">cv2<\/span>.polylines(canvas, [poly], <span class=\"tok-keyword\">True<\/span>, (<span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">120<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)      <span class=\"tok-comment\"># zone blue (BGR)<\/span>\n    in_zone = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> keep:\n        x1, y1, x2, y2 = boxes[i]\n        foot = (<span class=\"tok-builtin\">int<\/span>((x1 + x2) / <span class=\"tok-number\">2<\/span>), <span class=\"tok-builtin\">int<\/span>(y2))\n        inside = <span class=\"tok-builtin\">cv2<\/span>.pointPolygonTest(poly, foot, <span class=\"tok-keyword\">False<\/span>) &gt;= <span class=\"tok-number\">0<\/span>\n        color = (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>) <span class=\"tok-keyword\">if<\/span> inside <span class=\"tok-keyword\">else<\/span> (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>)         <span class=\"tok-comment\"># red if in zone<\/span>\n        <span class=\"tok-builtin\">cv2<\/span>.rectangle(canvas, (x1, y1), (x2, y2), color, <span class=\"tok-number\">2<\/span>)\n        <span class=\"tok-keyword\">if<\/span> inside:\n            in_zone += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"p2_annotated.png\"<\/span>, canvas)\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"kept {len(keep)}, in-zone {in_zone}\"<\/span>)\n\n<span class=\"tok-comment\"># example inputs (the starter notebook provides these)<\/span>\ndets = [(<span class=\"tok-number\">100<\/span>,<span class=\"tok-number\">100<\/span>,<span class=\"tok-number\">200<\/span>,<span class=\"tok-number\">260<\/span>,<span class=\"tok-number\">0.95<\/span>),(<span class=\"tok-number\">110<\/span>,<span class=\"tok-number\">108<\/span>,<span class=\"tok-number\">205<\/span>,<span class=\"tok-number\">265<\/span>,<span class=\"tok-number\">0.90<\/span>),   <span class=\"tok-comment\"># overlapping pair<\/span>\n        (<span class=\"tok-number\">430<\/span>,<span class=\"tok-number\">420<\/span>,<span class=\"tok-number\">520<\/span>,<span class=\"tok-number\">560<\/span>,<span class=\"tok-number\">0.88<\/span>),(<span class=\"tok-number\">300<\/span>,<span class=\"tok-number\">80<\/span>,<span class=\"tok-number\">360<\/span>,<span class=\"tok-number\">140<\/span>,<span class=\"tok-number\">0.70<\/span>)]\nzone = [(<span class=\"tok-number\">80<\/span>,<span class=\"tok-number\">300<\/span>),(<span class=\"tok-number\">520<\/span>,<span class=\"tok-number\">300<\/span>),(<span class=\"tok-number\">520<\/span>,<span class=\"tok-number\">640<\/span>),(<span class=\"tok-number\">80<\/span>,<span class=\"tok-number\">640<\/span>)]\nsolve_p2(dets, zone)<\/code><\/pre>\n<p><strong>Marks:<\/strong> NMS drops the overlap (4 → 3), correct in-zone count, annotated image saved with the right colours.<\/p>\n<hr>\n<h2 id=\"problem-3-video-motion-summary\">Problem 3 — Video motion summary<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> solve_p3(path=<span class=\"tok-string\">\"clip.avi\"<\/span>):\n    cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(path)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> cap.isOpened():\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">f\"cannot open {path}\"<\/span>)\n    fps = cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FPS) <span class=\"tok-keyword\">or<\/span> <span class=\"tok-number\">25<\/span>\n    w = <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_WIDTH))\n    h = <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_HEIGHT))\n    writer = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter(<span class=\"tok-string\">\"p3_motion.avi\"<\/span>,\n                             <span class=\"tok-builtin\">cv2<\/span>.VideoWriter_fourcc(*<span class=\"tok-string\">\"MJPG\"<\/span>), fps, (w, h))\n    prev = <span class=\"tok-keyword\">None<\/span>\n    total = motion_frames = saved = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">try<\/span>:\n        <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n            ok, frame = cap.read()\n            <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:\n                <span class=\"tok-keyword\">break<\/span>\n            total += <span class=\"tok-number\">1<\/span>\n            gray = <span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(<span class=\"tok-builtin\">cv2<\/span>.cvtColor(frame, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY),\n                                    (<span class=\"tok-number\">21<\/span>, <span class=\"tok-number\">21<\/span>), <span class=\"tok-number\">0<\/span>)\n            moved = <span class=\"tok-keyword\">False<\/span>\n            <span class=\"tok-keyword\">if<\/span> prev <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span>:\n                th = <span class=\"tok-builtin\">cv2<\/span>.threshold(<span class=\"tok-builtin\">cv2<\/span>.absdiff(prev, gray), <span class=\"tok-number\">25<\/span>, <span class=\"tok-number\">255<\/span>,\n                                   <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY)[<span class=\"tok-number\">1<\/span>]\n                th = <span class=\"tok-builtin\">cv2<\/span>.dilate(th, <span class=\"tok-keyword\">None<\/span>, iterations=<span class=\"tok-number\">2<\/span>)\n                cnts, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(th, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL,\n                                           <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n                <span class=\"tok-keyword\">for<\/span> c <span class=\"tok-keyword\">in<\/span> cnts:\n                    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">cv2<\/span>.contourArea(c) &lt; <span class=\"tok-number\">500<\/span>:\n                        <span class=\"tok-keyword\">continue<\/span>\n                    moved = <span class=\"tok-keyword\">True<\/span>\n                    x, y, bw, bh = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(c)\n                    <span class=\"tok-builtin\">cv2<\/span>.rectangle(frame, (x, y), (x+bw, y+bh), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n            <span class=\"tok-keyword\">if<\/span> moved:\n                motion_frames += <span class=\"tok-number\">1<\/span>\n            <span class=\"tok-keyword\">if<\/span> saved &lt; <span class=\"tok-number\">3<\/span> <span class=\"tok-keyword\">and<\/span> moved:\n                <span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">f\"p3_frame_{saved}.png\"<\/span>, frame); saved += <span class=\"tok-number\">1<\/span>\n            writer.write(frame)\n            prev = gray\n    <span class=\"tok-keyword\">finally<\/span>:\n        cap.release(); writer.release()\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"total {total} frames, {motion_frames} with motion, saved {saved} samples\"<\/span>)\n\nsolve_p3()<\/code><\/pre>\n<p><strong>Marks:<\/strong> robust loop with <code>finally<\/code> release, motion count printed, video + 3 frames saved, <code>VideoWriter<\/code> size matches.<\/p>\n<hr>\n<h2 id=\"problem-4-robust-batch-report\">Problem 4 — Robust batch report<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> os\n<span class=\"tok-keyword\">import<\/span> csv\n<span class=\"tok-keyword\">import<\/span> logging\n\nlogging.basicConfig(level=logging.INFO, format=<span class=\"tok-string\">\"%(levelname)s %(message)s\"<\/span>)\n\n<span class=\"tok-keyword\">def<\/span> solve_p4(in_dir=<span class=\"tok-string\">\"imgs\"<\/span>, out_csv=<span class=\"tok-string\">\"p4_report.csv\"<\/span>):\n    rows, ok, fail = [], <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> name <span class=\"tok-keyword\">in<\/span> sorted(os.listdir(in_dir)):\n        path = os.path.join(in_dir, name)\n        <span class=\"tok-keyword\">try<\/span>:\n            img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n            <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n                <span class=\"tok-keyword\">raise<\/span> ValueError(<span class=\"tok-string\">\"unreadable / corrupt\"<\/span>)\n            mean = <span class=\"tok-builtin\">float<\/span>(<span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY).mean())\n            rows.append((name, round(mean, <span class=\"tok-number\">2<\/span>))); ok += <span class=\"tok-number\">1<\/span>\n        <span class=\"tok-keyword\">except<\/span> Exception <span class=\"tok-keyword\">as<\/span> e:\n            logging.warning(<span class=\"tok-string\">\"skipped %s: %s\"<\/span>, name, e); fail += <span class=\"tok-number\">1<\/span>\n    rows.sort(key=<span class=\"tok-keyword\">lambda<\/span> r: r[<span class=\"tok-number\">1<\/span>], reverse=<span class=\"tok-keyword\">True<\/span>)           <span class=\"tok-comment\"># brightest first<\/span>\n    <span class=\"tok-keyword\">with<\/span> <span class=\"tok-builtin\">open<\/span>(out_csv, <span class=\"tok-string\">\"w\"<\/span>, newline=<span class=\"tok-string\">\"\"<\/span>) <span class=\"tok-keyword\">as<\/span> f:\n        w = csv.writer(f)\n        w.writerow([<span class=\"tok-string\">\"filename\"<\/span>, <span class=\"tok-string\">\"mean_brightness\"<\/span>])\n        w.writerows(rows)\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"processed {ok}, skipped {fail} -&gt; {out_csv}\"<\/span>)\n\nsolve_p4()<\/code><\/pre>\n<p><strong>Marks:<\/strong> corrupt file skipped (not a crash), CSV sorted descending with the right header, counts printed.<\/p>\n<hr>\n<h2 id=\"debrief\">Debrief<\/h2>\n<ul><li>Did you <strong>save every required file<\/strong> with the exact name? That's free marks lost<\/li><\/ul>\n<p>if not.<\/p>\n<ul><li>Did you <strong>guard<\/strong> <code>cv2.imread<\/code> / <code>VideoCapture<\/code>? Real test inputs can be messy.<\/li><li>Did you bank Problem 4 (quick) early before sinking time into Problem 1?<\/li><li>Re-do any you couldn't finish, then export to HTML to rehearse submission.<\/li><\/ul>\n<p>→ Back to <a class=\"mdlink\" data-href=\"mock-test.md\" href=\"#\">the mock paper<\/a> · <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">chapter overview<\/a><\/p>","toc":[{"level":2,"id":"problem-1-label-scanner","text":"Problem 1 — Label scanner"},{"level":2,"id":"problem-2-detection-post-processing-zone-count","text":"Problem 2 — Detection post-processing + zone count"},{"level":2,"id":"problem-3-video-motion-summary","text":"Problem 3 — Video motion summary"},{"level":2,"id":"problem-4-robust-batch-report","text":"Problem 4 — Robust batch report"},{"level":2,"id":"debrief","text":"Debrief"}],"text":"mock — solutions (don't peek until you've tried!) 💡 tl;dr reference solutions for the 90-minute mock . yours doesn't need to match line-for-line — check that outputs are correct, files are saved with the right names, and inputs are guarded. all four are tested and runnable. problem 1 — label scanner import cv2 import numpy as np def order_points(pts): rect = np .zeros(( 4 , 2 ), dtype= \"float32\" ) s = pts. sum (axis= 1 ) rect[ 0 ] = pts[ np .argmin(s)]; rect[ 2 ] = pts[ np .argmax(s)] d = np .diff(pts, axis= 1 ) rect[ 1 ] = pts[ np .argmin(d)]; rect[ 3 ] = pts[ np .argmax(d)] return rect def four_point_transform(image, pts): rect = order_points(pts) (tl, tr, br, bl) = rect maxw = int ( max ( np .linalg.norm(br - bl), np .linalg.norm(tr - tl))) maxh = int ( max ( np .linalg.norm(tr - br), np .linalg.norm(tl - bl))) dst = np .array([[ 0 , 0 ], [maxw - 1 , 0 ], [maxw - 1 , maxh - 1 ], [ 0 , maxh - 1 ]], dtype= \"float32\" ) m = cv2 .getperspectivetransform(rect, dst) return cv2 .warpperspective(image, m, (maxw, maxh)) def solve_p1(path= \"label.jpg\" ): img = cv2 .imread(path) if img is none : raise filenotfounderror(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) edges = cv2 .canny( cv2 .gaussianblur(gray, ( 5 , 5 ), 0 ), 50 , 150 ) cnts, _ = cv2 .findcontours(edges, cv2 .retr_list, cv2 .chain_approx_simple) cnts = sorted(cnts, key= cv2 .contourarea, reverse= true )[: 5 ] doc = none for c in cnts: approx = cv2 .approxpolydp(c, 0.02 * cv2 .arclength(c, true ), true ) if len (approx) == 4 : doc = approx.reshape( 4 , 2 ).astype( \"float32\" ); break if doc is none : raise runtimeerror( \"document not found\" ) scan = four_point_transform(img, doc) cv2 .imwrite( \"p1_scan.png\" , scan) g = cv2 .cvtcolor(scan, cv2 .color_bgr2gray) binary = cv2 .threshold(g, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu)[ 1 ] cv2 .imwrite( \"p1_binary.png\" , binary) print ( \"saved p1_scan.png\" , scan.shape, \"and p1_binary.png\" ) solve_p1() marks: found 4 corners, warped flat, binarized, both files saved . problem 2 — detection post-processing + zone count import cv2 import numpy as np def iou(a, b): ix1, iy1 = max (a[ 0 ], b[ 0 ]), max (a[ 1 ], b[ 1 ]) ix2, iy2 = min (a[ 2 ], b[ 2 ]), min (a[ 3 ], b[ 3 ]) iw, ih = max ( 0 , ix2 - ix1), max ( 0 , iy2 - iy1) inter = iw * ih ua = (a[ 2 ]-a[ 0 ])*(a[ 3 ]-a[ 1 ]) + (b[ 2 ]-b[ 0 ])*(b[ 3 ]-b[ 1 ]) - inter return inter / ua if ua > 0 else 0.0 def nms(boxes, scores, thr= 0.5 ): idxs = sorted( range ( len (boxes)), key= lambda i: scores[i], reverse= true ) keep = [] while idxs: cur = idxs.pop( 0 ); keep.append(cur) idxs = [i for i in idxs if iou(boxes[cur], boxes[i]) < thr] return keep def solve_p2(dets, zone): boxes = [d[: 4 ] for d in dets] scores = [d[ 4 ] for d in dets] keep = nms(boxes, scores, 0.5 ) poly = np .array(zone, np .int32) canvas = np .full(( 720 , 720 , 3 ), 40 , np .uint8) cv2 .polylines(canvas, [poly], true , ( 255 , 120 , 0 ), 2 ) # zone blue (bgr) in_zone = 0 for i in keep: x1, y1, x2, y2 = boxes[i] foot = ( int ((x1 + x2) / 2 ), int (y2)) inside = cv2 .pointpolygontest(poly, foot, false ) >= 0 color = ( 0 , 0 , 255 ) if inside else ( 0 , 255 , 0 ) # red if in zone cv2 .rectangle(canvas, (x1, y1), (x2, y2), color, 2 ) if inside: in_zone += 1 cv2 .imwrite( \"p2_annotated.png\" , canvas) print ( f\"kept {len(keep)}, in-zone {in_zone}\" ) # example inputs (the starter notebook provides these) dets = [( 100 , 100 , 200 , 260 , 0.95 ),( 110 , 108 , 205 , 265 , 0.90 ), # overlapping pair ( 430 , 420 , 520 , 560 , 0.88 ),( 300 , 80 , 360 , 140 , 0.70 )] zone = [( 80 , 300 ),( 520 , 300 ),( 520 , 640 ),( 80 , 640 )] solve_p2(dets, zone) marks: nms drops the overlap (4 → 3), correct in-zone count, annotated image saved with the right colours. problem 3 — video motion summary import cv2 def solve_p3(path= \"clip.avi\" ): cap = cv2 .videocapture(path) if not cap.isopened(): raise runtimeerror( f\"cannot open {path}\" ) fps = cap.get( cv2 .cap_prop_fps) or 25 w = int (cap.get( cv2 .cap_prop_frame_width)) h = int (cap.get( cv2 .cap_prop_frame_height)) writer = cv2 .videowriter( \"p3_motion.avi\" , cv2 .videowriter_fourcc(* \"mjpg\" ), fps, (w, h)) prev = none total = motion_frames = saved = 0 try : while true : ok, frame = cap.read() if not ok: break total += 1 gray = cv2 .gaussianblur( cv2 .cvtcolor(frame, cv2 .color_bgr2gray), ( 21 , 21 ), 0 ) moved = false if prev is not none : th = cv2 .threshold( cv2 .absdiff(prev, gray), 25 , 255 , cv2 .thresh_binary)[ 1 ] th = cv2 .dilate(th, none , iterations= 2 ) cnts, _ = cv2 .findcontours(th, cv2 .retr_external, cv2 .chain_approx_simple) for c in cnts: if cv2 .contourarea(c) < 500 : continue moved = true x, y, bw, bh = cv2 .boundingrect(c) cv2 .rectangle(frame, (x, y), (x+bw, y+bh), ( 0 , 255 , 0 ), 2 ) if moved: motion_frames += 1 if saved < 3 and moved: cv2 .imwrite( f\"p3_frame_{saved}.png\" , frame); saved += 1 writer.write(frame) prev = gray finally : cap.release(); writer.release() print ( f\"total {total} frames, {motion_frames} with motion, saved {saved} samples\" ) solve_p3() marks: robust loop with finally release, motion count printed, video + 3 frames saved, videowriter size matches. problem 4 — robust batch report import cv2 import os import csv import logging logging.basicconfig(level=logging.info, format= \"%(levelname)s %(message)s\" ) def solve_p4(in_dir= \"imgs\" , out_csv= \"p4_report.csv\" ): rows, ok, fail = [], 0 , 0 for name in sorted(os.listdir(in_dir)): path = os.path.join(in_dir, name) try : img = cv2 .imread(path) if img is none : raise valueerror( \"unreadable / corrupt\" ) mean = float ( cv2 .cvtcolor(img, cv2 .color_bgr2gray).mean()) rows.append((name, round(mean, 2 ))); ok += 1 except exception as e: logging.warning( \"skipped %s: %s\" , name, e); fail += 1 rows.sort(key= lambda r: r[ 1 ], reverse= true ) # brightest first with open (out_csv, \"w\" , newline= \"\" ) as f: w = csv.writer(f) w.writerow([ \"filename\" , \"mean_brightness\" ]) w.writerows(rows) print ( f\"processed {ok}, skipped {fail} -> {out_csv}\" ) solve_p4() marks: corrupt file skipped (not a crash), csv sorted descending with the right header, counts printed. debrief did you save every required file with the exact name? that's free marks lost if not. did you guard cv2.imread / videocapture ? real test inputs can be messy. did you bank problem 4 (quick) early before sinking time into problem 1? re-do any you couldn't finish, then export to html to rehearse submission. → back to the mock paper · chapter overview","words":1193},{"path":"11-crowd-queue-analytics/README.md","title":"Overview","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"11-crowd-queue-analytics\">11 — Crowd &amp; Queue Analytics<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is the headline deliverable of the JD: <em>queue-time estimation and crowd analytics<\/em>. The model gives you boxes and track IDs; this section is how you turn them into the two numbers a client actually pays for — <strong>how many people<\/strong> and <strong>how long they wait<\/strong>. Master the metric vocabulary (Little's Law, dwell, density) and the ground-plane geometry that makes the numbers real.<\/div><\/div>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"queue-time-estimation.md\" href=\"#\">queue-time-estimation.md<\/a> — the three ways to measure wait time, and Little's Law<\/li><li><a class=\"mdlink\" data-href=\"crowd-counting-density.md\" href=\"#\">crowd-counting-density.md<\/a> — detection vs density estimation, when each breaks<\/li><li><a class=\"mdlink\" data-href=\"zones-flow-heatmaps.md\" href=\"#\">zones-flow-heatmaps.md<\/a> — ROI zones, line-crossing, directional flow, occupancy, heatmaps<\/li><li><a class=\"mdlink\" data-href=\"calibration-and-metrics.md\" href=\"#\">calibration-and-metrics.md<\/a> — homography to the floor, real-world units, accuracy &amp; validation<\/li><\/ol>\n<h2 id=\"the-framing-line-memorize\">The framing line (memorize)<\/h2>\n<p><em>\"Queue time and crowd count are geometry-plus-statistics on top of detection and tracking. I put the camera in real-world coordinates with a homography, define zones on the floor plan, and then it's two families of method: tracking-based (follow individuals, measure their dwell) and estimation-based (regress a count or a wait from density when tracking breaks down in dense crowds). I pick per the crowd regime and validate against a ground-truth clock.\"<\/em><\/p>\n<h2 id=\"the-two-regimes-this-decides-everything\">The two regimes (this decides everything)<\/h2>\n<pre><code> SPARSE / MID crowd            DENSE crowd (occlusion, &gt;~2 ppl/m²)\n heads separable                heads merge, tracking fails\n        │                              │\n        ▼                              ▼\n detect + track individuals     density estimation / regression\n → count unique IDs             → integrate a density map for count\n → dwell = t_exit − t_enter     → wait ≈ Little's Law from flow + occupancy<\/code><\/pre>\n<p>Interviewers love to push you from the easy regime into the hard one: <em>\"Your person detector works at the counter — no

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#d97757">
<title>KoiReader Interview Prep</title>
<style>
  :root{
    --bg:#faf9f5; --bg-soft:#f1efe7; --bg-side:#f6f4ee; --text:#23211c;
    --muted:#6b6557; --border:#e4e0d5; --accent:#c45f3c; --accent-2:#d97757;
    --accent-soft:#f6e7df; --code-bg:#f1efe7; --code-text:#5a4636; --quote:#5c5547;
    --link:#b9532f; --header-bg:rgba(250,249,245,.85);
    --shadow:0 1px 2px rgba(60,50,30,.05),0 6px 20px rgba(60,50,30,.06);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#1f1e1b; --bg-soft:#2a2824; --bg-side:#1a1916; --text:#ece8df;
    --muted:#a39c8c; --border:#34322c; --accent:#e08763; --accent-2:#d97757;
    --accent-soft:#3a2b22; --code-bg:#2a2824; --code-text:#d8cfbf; --quote:#b3aa98;
    --link:#ec9170; --header-bg:rgba(31,30,27,.85);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;overflow-x:hidden;scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.7 ui-serif,Georgia,"Iowan Old Style","Palatino Linotype",serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  /* UI chrome uses a sans stack; reading body uses serif for a calmer feel */
  .brand,.tools,nav,.topbar,.pager .lbl,.sec-h,.banner{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:300px minmax(0,1fr); min-height:100vh}

  /* ---------- sidebar ---------- */
  .sidebar{
    background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; overflow-y:auto;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .brand{
    padding:20px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2;
  }
  .brand h1{font-size:15px; margin:0 0 3px; letter-spacing:.2px; font-weight:700}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:14px}
  .tools input{
    flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:14px; outline:none;
  }
  .tools input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .iconbtn{
    background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; min-width:40px; height:40px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:none;
  }
  .iconbtn:hover{border-color:var(--accent); color:var(--accent)}
  nav{padding:10px 10px calc(60px + env(safe-area-inset-bottom))}
  .sec{margin:2px 0}
  .sec>.sec-h{
    font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    padding:14px 12px 5px; font-weight:700;
  }
  nav a.item{
    display:block; padding:8px 12px; border-radius:9px; color:var(--text);
    font-size:13.5px; margin:1px 0; line-height:1.35;
  }
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:16px}
  .hidden{display:none !important}

  /* ---------- main ---------- */
  .main{min-width:0}
  .topbar{
    display:none; align-items:center; gap:10px;
    padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
    background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px);
    -webkit-backdrop-filter:saturate(140%) blur(10px);
  }
  .topbar .tb-title{flex:1; min-width:0; font-weight:700; font-size:15px; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .content-wrap{max-width:760px; margin:0 auto;
    padding:44px max(32px,env(safe-area-inset-left)) 90px max(32px,env(safe-area-inset-right))}
  article{font-size:clamp(15.5px,1.4vw,17px)}
  article h1{font-size:clamp(26px,5vw,32px); line-height:1.2; margin:.1em 0 .5em; letter-spacing:-.5px; font-weight:700}
  article h2{font-size:clamp(20px,3.4vw,23px); margin:1.7em 0 .5em; padding-bottom:.28em; border-bottom:1px solid var(--border); font-weight:700}
  article h3{font-size:clamp(16.5px,2.4vw,18px); margin:1.5em 0 .4em; font-weight:700}
  article p{margin:.75em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.45em}
  article li{margin:.3em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article strong{font-weight:700}
  article code{
    background:var(--code-bg); color:var(--code-text); padding:.13em .42em;
    border-radius:6px; font:.85em/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    word-break:break-word;
  }
  article pre{
    background:var(--code-bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.1em 0;
  }
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre; word-break:normal}
  article blockquote{
    margin:1.1em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 10px 10px 0;
  }
  article blockquote p{margin:.3em 0}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.2em 0; border-radius:var(--radius)}
  article table{border-collapse:collapse; width:100%; font-size:14px}
  article th,article td{border:1px solid var(--border); padding:9px 12px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:700; white-space:nowrap}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:2em 0}
  article h1,article h2,article h3{scroll-margin-top:76px}

  .pager{display:flex; gap:14px; margin:52px 0 0; padding-top:24px; border-top:1px solid var(--border)}
  .pager a{flex:1; min-width:0; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg)}
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:4px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .banner{
    background:var(--accent-soft); border:1px solid var(--accent); color:var(--text);
    border-radius:var(--radius); padding:14px 16px; margin:0 0 24px; font-size:14px; line-height:1.6;
  }
  .banner code{background:rgba(0,0,0,.07)}
  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  /* ---------- mobile ---------- */
  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{
      position:fixed; z-index:60; width:min(86vw,330px); top:0; bottom:0; height:auto;
      transform:translateX(-100%); transition:transform .24s cubic-bezier(.4,0,.2,1);
      box-shadow:var(--shadow);
    }
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(20,16,10,.45); z-index:50}
    .content-wrap{padding:22px 18px calc(80px + env(safe-area-inset-bottom))}
    .pager{flex-direction:column}
    .pager .next{text-align:left}
    .pager .spacer{display:none}
    nav a.item{padding:11px 14px; font-size:15px}
    nav a.item.sub{padding-left:18px}
  }
  @media (max-width:380px){
    .topbar .tb-title{font-size:14px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>KoiReader Interview Prep</h1>
      <div class="sub">Systems-First Computer Vision Engineer</div>
      <div class="tools">
        <input id="search" type="search" placeholder="Search all pages…" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="iconbtn theme-toggle" title="Toggle light / dark">◐</button>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="iconbtn" id="menu" aria-label="Open menu">☰</button>
      <span class="tb-title" id="tbTitle">KoiReader Prep</span>
      <button class="iconbtn" id="searchBtn" aria-label="Search">🔍</button>
      <button class="iconbtn theme-toggle" aria-label="Toggle theme">◐</button>
    </div>
    <div class="content-wrap">
      <div id="filebanner"></div>
      <article id="content"><div class="loading">Loading…</div></article>
      <div class="pager" id="pager"></div>
    </div>
  </main>
</div>
<div class="scrim" id="scrim"></div>

<script>
/* ============================ SITE STRUCTURE ============================ */
const SITE = [
  { label:"Start here", items:[
    { dir:"", file:"README.md", title:"Overview & Gap Analysis" },

  { label:"1 · Video Streaming", dir:"01-video-streaming", items:[

    { file:"codecs-and-frames.md", title:"Codecs, GOP & I/P/B Frames" },
    { file:"decode-encode-pipeline.md", title:"Decode / Encode Pipeline" },
    { file:"frame-buffers-backpressure.md", title:"Frame Buffers & Backpressure" },
  ]},
  { label:"2 · GStreamer", dir:"02-gstreamer", items:[
    { file:"README.md", title:"Overview" },

  ]},
  { label:"6 · System Design", dir:"06-system-design", items:[

  { label:"8 · Mock Interview", dir:"08-mock-interview", items:[

    { file:"questions.md", title:"Questions" },

  ]},
  { label:"9 · CV Fundamentals", dir:"09-computer-vision-fundamentals", items:[
    { file:"README.md", title:"Overview" },
    { file:"image-basics-color-spaces.md", title:"Image Basics & Color Spaces" },
    { file:"filtering-morphology-edges.md", title:"Filtering, Morphology & Edges" },
    { file:"geometry-and-transforms.md", title:"Geometry & Transforms" },
    { file:"camera-calibration.md", title:"Camera Calibration" },
    { file:"features-and-matching.md", title:"Features & Matching" },
    { file:"detection-tracking-math.md", title:"Detection & Tracking Math" },
    { file:"logic-on-detections.md", title:"Logic on Detections" },
    { file:"cv-cheat-sheet.md", title:"CV Cheat Sheet" },
  ]},
];

const PAGES = [];
SITE.forEach(sec => sec.items.forEach(it => {
  const path = (sec.dir ? sec.dir + "/" : "") + it.file;
  PAGES.push({ path, title: it.title, section: sec.label });
}));

/* ============================ MARKDOWN PARSER ============================ */
// ===PARSER_START===
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function slug(s){return s.toLowerCase().replace(/<[^>]+>/g,"").replace(/[^\w\s-]/g,"").trim().replace(/\s+/g,"-");}

function inlineMd(s){
  const codes=[];
  s = s.replace(/`([^`]+)`/g, (m,c)=>{ codes.push(c); return "@@CODE"+(codes.length-1)+"@@"; });
  s = escapeHtml(s);
  // links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m,t,u)=>{
    const ext = /^(https?:)?\/\//.test(u) || /^mailto:/.test(u);
    if(ext) return '<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>';
    if(u.charAt(0)==='#') return '<a href="'+u+'">'+t+'</a>';
    return '<a class="mdlink" data-href="'+u.replace(/"/g,'&quot;')+'" href="#">'+t+'</a>';
  });
  s = s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s = s.replace(/(^|[^*\w])\*([^*\n]+)\*(?!\w)/g,"$1<em>$2</em>");
  s = s.replace(/@@CODE(\d+)@@/g,(m,i)=>"<code>"+escapeHtml(codes[+i])+"</code>");
  return s;
}

function isSep(line){ return /^\s*\|?[\s:|-]*-[-\s:|]*\|?\s*$/.test(line) && line.indexOf("-")>=0; }
function splitRow(line){
  let s = line.trim();
  if(s.charAt(0)==="|") s=s.slice(1);
  if(s.charAt(s.length-1)==="|") s=s.slice(0,-1);
  return s.split("|").map(c=>c.trim());
}

function renderMarkdown(md){
  const lines = md.replace(/\r\n?/g,"\n").split("\n");
  let i=0, out=[];
  const isListItem = l => /^(\s*)([-*+]|\d+\.)\s+/.test(l);

  while(i<lines.length){
    let line = lines[i];

    if(line.trim()===""){ i++; continue; }

    // code fence
    if(/^\s*```/.test(line)){
      const lang = line.trim().replace(/^```/,"").trim();
      i++; let buf=[];
      while(i<lines.length && !/^\s*```/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++; // skip closing fence
      out.push('<pre><code'+(lang?' class="language-'+lang+'"':'')+'>'+escapeHtml(buf.join("\n"))+'</code></pre>');
      continue;
    }

    // heading
    let h = line.match(/^(#{1,6})\s+(.*)$/);
    if(h){
      const lvl=h[1].length, txt=h[2].trim();
      out.push('<h'+lvl+' id="'+slug(txt)+'">'+inlineMd(txt)+'</h'+lvl+'>');
      i++; continue;
    }

    // horizontal rule
    if(/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)){ out.push("<hr>"); i++; continue; }

    // blockquote
    if(/^\s*>/.test(line)){
      let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,"")); i++; }
      out.push("<blockquote>"+renderMarkdown(buf.join("\n"))+"</blockquote>");
      continue;
    }

    // table
    if(line.indexOf("|")>=0 && i+1<lines.length && isSep(lines[i+1])){
      const header = splitRow(line);
      i+=2; let rows=[];
      while(i<lines.length && lines[i].indexOf("|")>=0 && lines[i].trim()!==""){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+header.map(c=>"<th>"+inlineMd(c)+"</th>").join("")+"</tr></thead><tbody>";
      rows.forEach(r=>{ t+="<tr>"+header.map((_,k)=>"<td>"+inlineMd(r[k]||"")+"</td>").join("")+"</tr>"; });
      t+="</tbody></table>";
      out.push('<div class="table-scroll">'+t+'</div>');
      continue;
    }

    // list (collect contiguous items, allow nesting by indent)
    if(isListItem(line)){
      let items=[];
      while(i<lines.length && isListItem(lines[i])){
        const m=lines[i].match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
        items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3] });
        i++;
      }
      out.push(buildList(items));
      continue;
    }

    // paragraph
    let buf=[];
    while(i<lines.length){
      const l=lines[i];
      if(l.trim()==="" || /^\s*```/.test(l) || /^#{1,6}\s/.test(l) ||
         /^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(l) || /^\s*>/.test(l) || isListItem(l) ||
         (l.indexOf("|")>=0 && i+1<lines.length && isSep(lines[i+1]))) break;
      buf.push(l); i++;
    }
    out.push("<p>"+inlineMd(buf.join(" ").trim())+"</p>");
  }
  return out.join("\n");
}

function buildList(items){
  let pos=0;
  function helper(curIndent){
    const ordered=items[pos].ordered;
    let html=ordered?"<ol>":"<ul>";
    while(pos<items.length && items[pos].indent>=curIndent){
      if(items[pos].indent>curIndent){
        const sub=helper(items[pos].indent);
        html=html.replace(/<\/li>$/, sub+"</li>");
      } else {
        html+="<li>"+inlineMd(items[pos].text)+"</li>";
        pos++;
      }
    }
    html+=ordered?"</ol>":"</ul>";
    return html;
  }
  return helper(items[0].indent);
}
// ===PARSER_END===

/* ============================ APP ============================ */
const TEXT = {};
const navLinks = {};
let currentPath = null;

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;
  if(/\/$/.test(href)) href += "README.md";
  const base = curPath.split("/").slice(0,-1);
  href.split("/").forEach(p=>{
    if(p==="."||p==="") return;
    if(p==="..") base.pop();
    else base.push(p);
  });
  return base.join("/");
}

function buildNav(){
  const nav=document.getElementById("nav");
  SITE.forEach(sec=>{
    const wrap=document.createElement("div"); wrap.className="sec";
    const h=document.createElement("div"); h.className="sec-h"; h.textContent=sec.label;
    wrap.appendChild(h);
    sec.items.forEach(it=>{
      const path=(sec.dir?sec.dir+"/":"")+it.file;
      const a=document.createElement("a");
      a.className="item"+(it.file!=="README.md"&&sec.dir?" sub":"");
      a.textContent=it.title; a.href="#"+encodeURI(path);
      a.dataset.path=path; a.dataset.title=it.title.toLowerCase();
      navLinks[path]=a;
      wrap.appendChild(a);
    });
    nav.appendChild(wrap);
  });
}

function setActive(path){
  document.querySelectorAll("nav a.item").forEach(a=>a.classList.toggle("active", a.dataset.path===path));
  const pg=PAGES.find(p=>p.path===path);
  document.getElementById("tbTitle").textContent = pg ? pg.title : "KoiReader Prep";
}

function renderPager(path){
  const idx=PAGES.findIndex(p=>p.path===path);
  const pager=document.getElementById("pager");
  if(idx<0){ pager.innerHTML=""; return; }
  const prev=PAGES[idx-1], next=PAGES[idx+1];
  let html="";
  if(prev) html+='<a href="#'+encodeURI(prev.path)+'"><div class="lbl">← Previous</div><div class="ttl">'+prev.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  if(next) html+='<a class="next" href="#'+encodeURI(next.path)+'"><div class="lbl">Next →</div><div class="ttl">'+next.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  pager.innerHTML=html;
}

async function loadPage(path){
  const content=document.getElementById("content");
  currentPath=path;
  setActive(path);
  try{
    let md;
    if(TEXT["__raw__"+path]) md=TEXT["__raw__"+path];
    else{
      const res=await fetch(path);
      if(!res.ok) throw new Error(res.status);
      md=await res.text();
      TEXT["__raw__"+path]=md;
    }
    content.innerHTML=renderMarkdown(md);
  }catch(e){
    if(location.protocol==="file:"){
      content.innerHTML='<div class="banner"><strong>This page needs a tiny web server.</strong><br>'+
        'Browsers block reading local files over <code>file://</code>. In this folder run '+
        '<code>python3 -m http.server 9000</code> and open <code>http://localhost:9000</code>. '+
        'See <a class="mdlink" data-href="RUN-ON-PI.md" href="#">Run on a Raspberry Pi</a>.</div>';
    }else{
      content.innerHTML='<div class="banner">Could not load <code>'+path+'</code> ('+e.message+').</div>';
    }
  }
  renderPager(path);
  window.scrollTo(0,0);
  closeSidebar();
}

function go(path){ location.hash="#"+encodeURI(path); }

function onHash(){
  let raw=decodeURI(location.hash.replace(/^#/,""));
  if(!raw){ loadPage("README.md"); return; }
  loadPage(raw);
}

document.addEventListener("click", e=>{
  const a=e.target.closest("a.mdlink");
  if(!a) return;
  e.preventDefault();
  const href=a.getAttribute("data-href");
  const target=resolvePath(currentPath||"README.md", href);
  if(target) go(target);
});

// search
const searchBox=document.getElementById("search");
searchBox.addEventListener("input", ()=>{
  const q=searchBox.value.trim().toLowerCase();
  document.querySelectorAll("nav .sec").forEach(sec=>{
    let any=false;
    sec.querySelectorAll("a.item").forEach(a=>{
      const p=a.dataset.path;
      const hit = !q || a.dataset.title.indexOf(q)>=0 || (TEXT[p]&&TEXT[p].indexOf(q)>=0);
      a.classList.toggle("hidden", !hit);
      if(hit) any=true;
    });
    sec.classList.toggle("hidden", !any);
  });
});

async function preload(){
  await Promise.all(PAGES.map(async p=>{
    try{
      const r=await fetch(p.path);
      if(r.ok){ const t=await r.text(); TEXT[p.path]=t.toLowerCase(); TEXT["__raw__"+p.path]=t; }
    }catch(_){}
  }));
}

// theme (supports multiple toggle buttons)
function applyTheme(t){ document.documentElement.dataset.theme=t; try{localStorage.setItem("koi-theme",t);}catch(_){} }
function toggleTheme(){ applyTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"); }
document.querySelectorAll(".theme-toggle").forEach(b=>b.addEventListener("click",toggleTheme));
(function initTheme(){
  let t; try{t=localStorage.getItem("koi-theme");}catch(_){}
  if(!t) t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";
  applyTheme(t);
})();

// mobile drawer
const sidebar=document.getElementById("sidebar"), scrim=document.getElementById("scrim");
function openSidebar(){ sidebar.classList.add("open"); scrim.classList.add("show"); }
function closeSidebar(){ sidebar.classList.remove("open"); scrim.classList.remove("show"); }
document.getElementById("menu").addEventListener("click", openSidebar);
document.getElementById("searchBtn").addEventListener("click", ()=>{ openSidebar(); setTimeout(()=>searchBox.focus(),260); });
scrim.addEventListener("click", closeSidebar);
addEventListener("keydown", e=>{ if(e.key==="Escape") closeSidebar(); });

// init
buildNav();
window.addEventListener("hashchange", onHash);
onHash();
preload();
</script>
</body>
</html>

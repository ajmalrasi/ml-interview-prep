atency/throughput knob<\/h2>\n<pre><code>batch=1   : lowest latency,  worst GPU utilization, fewest cameras\nbatch=N   : higher latency (wait to fill), best utilization, most cameras<\/code><\/pre>\n<ul><li><strong>Static batching<\/strong> (DeepStream <code>nvstreammux<\/code>): batch = number of synchronized<\/li><\/ul>\n<p>camera streams. Frames arrive together each tick, so little extra wait.<\/p>\n<ul><li><strong>Dynamic batching<\/strong> (Triton): server waits up to <code>max_queue_delay<\/code> to gather<\/li><\/ul>\n<p>requests, then runs them together. You cap the wait to bound latency.<\/p>\n<h2 id=\"how-to-size-the-batch\">How to size the batch<\/h2>\n<ol><li>Fix your latency SLA (e.g., must act within 100ms).<\/li><li>Sweep batch size, measure p99 latency and throughput at each.<\/li><li>Pick the largest batch whose p99 stays under SLA. That maximizes cameras/box<\/li><\/ol>\n<p>without breaking real-time. (This sweep <em>is<\/em> your evidence-driven method.)<\/p>\n<h2 id=\"other-throughput-levers\">Other throughput levers<\/h2>\n<ul><li><strong>Multiple model instances / CUDA streams<\/strong> — overlap inference of different<\/li><\/ul>\n<p>batches; overlap decode (NVDEC) with inference (CUDA cores) since they're   separate engines.<\/p>\n<ul><li><strong>Smaller/faster backbone<\/strong> — YOLO-n vs YOLO-x; the cheapest latency win is often<\/li><\/ul>\n<p>a smaller model that still hits accuracy.<\/p>\n<ul><li><strong>Right resolution<\/strong> — inferring at 640×640 instead of 1280×1280 can 4× speed;<\/li><\/ul>\n<p>validate accuracy impact.<\/p>\n<ul><li><strong>Async pipeline<\/strong> — decode, infer, and postprocess on separate threads/streams<\/li><\/ul>\n<p>so the GPU never waits on the CPU.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Bigger batch — always better?<\/strong> No. Beyond the point that fills the GPU, you only add latency for marginal throughput, and you risk blowing the latency SLA and growing buffers. Size to SLA.<\/p>\n<p><strong>Batching vs a smaller model for more throughput?<\/strong> Batching keeps accuracy and fills the GPU but adds some latency. A smaller model cuts latency <em>and<\/em> compute but may cost accuracy. Try both; often you batch a right-sized model.<\/p>\n<p><strong>Why overlap NVDEC decode with CUDA inference?<\/strong> Decode and inference use <em>different<\/em> silicon (NVDEC vs CUDA cores). Running them concurrently (separate threads/streams) hides decode time behind inference → higher effective throughput than doing them serially.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">04-fault-tolerance/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-batching-works-the-intuition","text":"Why batching works (the intuition)"},{"level":2,"id":"the-latencythroughput-knob","text":"The latency/throughput knob"},{"level":2,"id":"how-to-size-the-batch","text":"How to size the batch"},{"level":2,"id":"other-throughput-levers","text":"Other throughput levers"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"batching & throughput 💡 tl;dr gpus are massively parallel; one frame barely uses them. batching feeds many frames per kernel launch, amortizing overhead and filling the gpu — often a several-fold throughput gain. the cost is a little latency (you wait to fill the batch). tune batch size to your latency sla. why batching works (the intuition) a gpu is a huge parallel factory. sending one frame is like running the whole factory to assemble a single widget — most of the line sits idle, and you still pay the fixed cost of starting and stopping the line (kernel launch, memory transfer). batch 16 frames and the same start/stop cost is shared across 16 → far better utilization. the latency/throughput knob batch=1 : lowest latency, worst gpu utilization, fewest cameras batch=n : higher latency (wait to fill), best utilization, most cameras static batching (deepstream nvstreammux ): batch = number of synchronized camera streams. frames arrive together each tick, so little extra wait. dynamic batching (triton): server waits up to max_queue_delay to gather requests, then runs them together. you cap the wait to bound latency. how to size the batch fix your latency sla (e.g., must act within 100ms). sweep batch size, measure p99 latency and throughput at each. pick the largest batch whose p99 stays under sla. that maximizes cameras/box without breaking real-time. (this sweep is your evidence-driven method.) other throughput levers multiple model instances / cuda streams — overlap inference of different batches; overlap decode (nvdec) with inference (cuda cores) since they're separate engines. smaller/faster backbone — yolo-n vs yolo-x; the cheapest latency win is often a smaller model that still hits accuracy. right resolution — inferring at 640×640 instead of 1280×1280 can 4× speed; validate accuracy impact. async pipeline — decode, infer, and postprocess on separate threads/streams so the gpu never waits on the cpu. why x over y bigger batch — always better? no. beyond the point that fills the gpu, you only add latency for marginal throughput, and you risk blowing the latency sla and growing buffers. size to sla. batching vs a smaller model for more throughput? batching keeps accuracy and fills the gpu but adds some latency. a smaller model cuts latency and compute but may cost accuracy. try both; often you batch a right-sized model. why overlap nvdec decode with cuda inference? decode and inference use different silicon (nvdec vs cuda cores). running them concurrently (separate threads/streams) hides decode time behind inference → higher effective throughput than doing them serially. → back to section readme · next section: 04-fault-tolerance/","words":426},{"path":"04-fault-tolerance/README.md","title":"Overview","section":"4 · Fault Tolerance","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"04-fault-tolerance-crash-proof-systems\">04 — Fault Tolerance (\"Crash-Proof\" Systems)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD is blunt: <em>\"Build Crash-Proof systems. If a camera goes offline or a frame is dropped, the system recovers gracefully without manual intervention.\"<\/em> The mindset: <strong>assume everything fails — cameras, networks, the GPU, your own process — and design so each failure is isolated, detected, and auto-recovered.<\/strong><\/div><\/div>\n<p>This is a <em>mindset<\/em> section more than a tools section. Interviewers probe it because it separates demo code from production code.<\/p>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"failure-modes.md\" href=\"#\">failure-modes.md<\/a> — everything that breaks in a video system<\/li><li><a class=\"mdlink\" data-href=\"recovery-patterns.md\" href=\"#\">recovery-patterns.md<\/a> — reconnect, watchdog, isolation, graceful degradation<\/li><\/ol>\n<h2 id=\"the-one-liner-to-lead-with\">The one-liner to lead with<\/h2>\n<p><em>\"In a 24/7 multi-camera system, the question isn't if a camera drops but when. I isolate each camera into its own supervised worker, watchdog it on frame freshness, reconnect with exponential backoff, and make sure one dead stream can never take down the other 39 or leak memory while it's gone.\"<\/em><\/p>\n<p>That sentence alone shows you've run this in production.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"failure-modes.md\" href=\"#\">failure-modes.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-one-liner-to-lead-with","text":"The one-liner to lead with"}],"text":"04 — fault tolerance (\"crash-proof\" systems) 💡 tl;dr the jd is blunt: \"build crash-proof systems. if a camera goes offline or a frame is dropped, the system recovers gracefully without manual intervention.\" the mindset: assume everything fails — cameras, networks, the gpu, your own process — and design so each failure is isolated, detected, and auto-recovered. this is a mindset section more than a tools section. interviewers probe it because it separates demo code from production code. files: failure-modes.md — everything that breaks in a video system recovery-patterns.md — reconnect, watchdog, isolation, graceful degradation the one-liner to lead with \"in a 24/7 multi-camera system, the question isn't if a camera drops but when. i isolate each camera into its own supervised worker, watchdog it on frame freshness, reconnect with exponential backoff, and make sure one dead stream can never take down the other 39 or leak memory while it's gone.\" that sentence alone shows you've run this in production. → start: failure-modes.md","words":162},{"path":"04-fault-tolerance/failure-modes.md","title":"Failure Modes","section":"4 · Fault Tolerance","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"failure-modes-what-actually-breaks\">Failure Modes: What Actually Breaks<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Name the failures before the fixes. An interviewer asking \"how do you make it crash-proof?\" wants to hear that you've <em>catalogued<\/em> the ways it dies. Here is that catalogue.<\/div><\/div>\n<h2 id=\"camera-network-failures\">Camera / network failures<\/h2>\n<ul><li><strong>Camera offline<\/strong> — power loss, reboot, unplugged. RTSP connect fails or stream<\/li><\/ul>\n<p>ends (EOS).<\/p>\n<ul><li><strong>Network drop / flaky WiFi<\/strong> — packets lost, stream stalls then resumes, or<\/li><\/ul>\n<p>silently freezes (last frame repeats forever — sneaky).<\/p>\n<ul><li><strong>RTSP session timeout<\/strong> — no keepalive → camera tears down.<\/li><li><strong>Credential/URL change<\/strong> — auth fails on reconnect.<\/li><li><strong>Bandwidth saturation<\/strong> — too many cameras for the link → dropped packets, GOP<\/li><\/ul>\n<p>corruption.<\/p>\n<h2 id=\"stream-data-failures\">Stream / data failures<\/h2>\n<ul><li><strong>Corrupted frame / lost keyframe<\/strong> — gray/garbled until next I-frame.<\/li><li><strong>Resolution or codec change mid-stream<\/strong> — caps renegotiation, decoder reset.<\/li><li><strong>Clock drift / timestamp jumps<\/strong> — PTS goes backwards, jitter buffer confused.<\/li><li><strong>Frame freeze<\/strong> — decoder outputs nothing but no error fires (the silent<\/li><\/ul>\n<p>killer; only a watchdog catches it).<\/p>\n<h2 id=\"compute-process-failures\">Compute / process failures<\/h2>\n<ul><li><strong>GPU OOM<\/strong> — too many streams/too big a batch → CUDA out of memory.<\/li><li><strong>Memory leak<\/strong> — unbounded queue, unreleased GPU surfaces, un-<code>unmap<\/code>ped<\/li><\/ul>\n<p>buffers → slow OOM over hours/days.<\/p>\n<ul><li><strong>Decoder/plugin crash<\/strong> — a bad stream segfaults a native element, taking the<\/li><\/ul>\n<p>process down if not isolated.<\/p>\n<ul><li><strong>Inference exception<\/strong> — malformed input, NaN, model load failure.<\/li><li><strong>Thread deadlock / GIL starvation<\/strong> — one stuck thread freezes others.<\/li><li><strong>Downstream backpressure<\/strong> — DB/analytics slow → backs up the whole pipeline.<\/li><\/ul>\n<h2 id=\"the-big-principle-blast-radius\">The big principle: blast radius<\/h2>\n<p>The question for every failure: <strong>how many cameras does it take down?<\/strong> A crash-proof design keeps the blast radius at <strong>one<\/strong> — one camera's failure must never touch the others. That pushes you toward <strong>per-stream isolation<\/strong> (separate worker/process per camera or supervised pipeline), which is the heart of the next file.<\/p>\n<h2 id=\"why-this-framing-wins-points\">Why this framing wins points<\/h2>\n<p>When asked \"how do you handle a camera going offline,\" weak answers jump straight to <code>try/except<\/code>. Strong answers say: <em>\"First, which failure? A clean EOS, a silent freeze, and a network stall need different detection — EOS via the bus, freeze via a frame-timestamp watchdog, stall via a read timeout. Then a uniform recovery: isolate, backoff-reconnect, and degrade gracefully.\"<\/em> You've <strong>enumerated<\/strong> before you <strong>solved<\/strong> — exactly your resume's hypothesis-isolate-validate method.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"recovery-patterns.md\" href=\"#\">recovery-patterns.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"camera-network-failures","text":"Camera / network failures"},{"level":2,"id":"stream-data-failures","text":"Stream / data failures"},{"level":2,"id":"compute-process-failures","text":"Compute / process failures"},{"level":2,"id":"the-big-principle-blast-radius","text":"The big principle: blast radius"},{"level":2,"id":"why-this-framing-wins-points","text":"Why this framing wins points"}],"text":"failure modes: what actually breaks 💡 tl;dr name the failures before the fixes. an interviewer asking \"how do you make it crash-proof?\" wants to hear that you've catalogued the ways it dies. here is that catalogue. camera / network failures camera offline — power loss, reboot, unplugged. rtsp connect fails or stream ends (eos). network drop / flaky wifi — packets lost, stream stalls then resumes, or silently freezes (last frame repeats forever — sneaky). rtsp session timeout — no keepalive → camera tears down. credential/url change — auth fails on reconnect. bandwidth saturation — too many cameras for the link → dropped packets, gop corruption. stream / data failures corrupted frame / lost keyframe — gray/garbled until next i-frame. resolution or codec change mid-stream — caps renegotiation, decoder reset. clock drift / timestamp jumps — pts goes backwards, jitter buffer confused. frame freeze — decoder outputs nothing but no error fires (the silent killer; only a watchdog catches it). compute / process failures gpu oom — too many streams/too big a batch → cuda out of memory. memory leak — unbounded queue, unreleased gpu surfaces, un- unmap ped buffers → slow oom over hours/days. decoder/plugin crash — a bad stream segfaults a native element, taking the process down if not isolated. inference exception — malformed input, nan, model load failure. thread deadlock / gil starvation — one stuck thread freezes others. downstream backpressure — db/analytics slow → backs up the whole pipeline. the big principle: blast radius the question for every failure: how many cameras does it take down? a crash-proof design keeps the blast radius at one — one camera's failure must never touch the others. that pushes you toward per-stream isolation (separate worker/process per camera or supervised pipeline), which is the heart of the next file. why this framing wins points when asked \"how do you handle a camera going offline,\" weak answers jump straight to try/except . strong answers say: \"first, which failure? a clean eos, a silent freeze, and a network stall need different detection — eos via the bus, freeze via a frame-timestamp watchdog, stall via a read timeout. then a uniform recovery: isolate, backoff-reconnect, and degrade gracefully.\" you've enumerated before you solved — exactly your resume's hypothesis-isolate-validate method. → next: recovery-patterns.md","words":378},{"path":"04-fault-tolerance/recovery-patterns.md","title":"Recovery Patterns","section":"4 · Fault Tolerance","quiz":false,"accent":"#dd5b54","html":"<h1 id=\"recovery-patterns\">Recovery Patterns<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 210\" role=\"img\" aria-label=\"The self-healing loop: detect → reconnect → resume\"><rect class=\"dg-box dg-hot\" x=\"250\" y=\"20\" width=\"220\" height=\"46\" rx=\"12\"/><text class=\"dg-label\" x=\"360\" y=\"48\" text-anchor=\"middle\">Stream running<\/text><path class=\"dg-line\" d=\"M470 43 C 600 43 620 120 470 150\"/><polygon class=\"dg-arrow\" points=\"478,145 466,152 470,138\"/><rect class=\"dg-box\" x=\"250\" y=\"150\" width=\"220\" height=\"44\" rx=\"12\"/><text class=\"dg-label\" x=\"360\" y=\"170\" text-anchor=\"middle\">Detect failure<\/text><text class=\"dg-sub\" x=\"360\" y=\"187\" text-anchor=\"middle\">bus EOS / watchdog<\/text><path class=\"dg-line\" d=\"M250 172 C 110 172 100 90 230 50\"/><polygon class=\"dg-arrow\" points=\"222,44 236,46 226,58\"/><text class=\"dg-sub\" x=\"585\" y=\"100\" text-anchor=\"middle\">camera drops /<\/text><text class=\"dg-sub\" x=\"585\" y=\"116\" text-anchor=\"middle\">freezes<\/text><text class=\"dg-sub\" x=\"120\" y=\"105\" text-anchor=\"middle\">reconnect:<\/text><text class=\"dg-sub\" x=\"120\" y=\"121\" text-anchor=\"middle\">backoff + jitter<\/text><text class=\"dg-sub\" x=\"120\" y=\"137\" text-anchor=\"middle\">wait for keyframe<\/text><text class=\"dg-sub\" x=\"360\" y=\"120\" text-anchor=\"middle\">isolated per camera · blast radius = 1<\/text><\/svg><figcaption>The self-healing loop: detect → reconnect → resume<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Five patterns cover almost everything: <strong>isolate<\/strong> each stream, <strong>watchdog<\/strong> for freshness, <strong>reconnect with exponential backoff<\/strong>, <strong>bound every buffer<\/strong>, and <strong>degrade gracefully<\/strong> instead of crashing. Supervise the whole thing so a dead worker auto-restarts.<\/div><\/div>\n<h2 id=\"1-per-stream-isolation-limit-blast-radius\">1. Per-stream isolation (limit blast radius)<\/h2>\n<p>Run each camera in its own <strong>worker<\/strong> — a thread, an asyncio task, or (safest) a separate <strong>process<\/strong>. A crash or stall in one is contained.<\/p>\n<ul><li><strong>Process per camera<\/strong> — strongest isolation; a native decoder segfault kills<\/li><\/ul>\n<p>one process, a supervisor respawns it. Costs more memory.<\/p>\n<ul><li><strong>Thread/task per camera<\/strong> — lighter, but a native crash can take the process<\/li><\/ul>\n<p>down; fine when decoders are stable and you watchdog well.<\/p>\n<ul><li>DeepStream alternative: many streams in one pipeline, but then you need<\/li><\/ul>\n<p><code>nvstreammux<\/code> to tolerate a source dropping (it can, with proper config) so one   bad source doesn't stall the batch.<\/p>\n<h2 id=\"2-watchdog-on-frame-freshness-catch-silent-freezes\">2. Watchdog on frame freshness (catch silent freezes)<\/h2>\n<p>The freeze that throws no error is the dangerous one. Track the timestamp of the last frame per camera; if <code>now - last_frame &gt; threshold<\/code>, declare it dead and trigger reconnect — even though no exception fired.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">if<\/span> time.monotonic() - last_frame_ts &gt; STALE_SECONDS:\n    log.warning(<span class=\"tok-string\">\"camera %s stale, restarting\"<\/span>, cam_id)\n    restart_stream(cam_id)<\/code><\/pre>\n<h2 id=\"3-reconnect-with-exponential-backoff-jitter\">3. Reconnect with exponential backoff + jitter<\/h2>\n<p>Don't hammer a down camera every 100ms (you'll DoS it and flood logs). Back off: 1s, 2s, 4s, 8s… capped (e.g., 30s), with a little random <strong>jitter<\/strong> so 40 cameras don't all retry in lockstep after a network blip.<\/p>\n<pre><code class=\"language-python\">delay = <span class=\"tok-builtin\">min<\/span>(base * <span class=\"tok-number\">2<\/span> ** attempt, max_delay) + random.uniform(<span class=\"tok-number\">0<\/span>, jitter)<\/code><\/pre>\n<p>Reset the counter on a successful reconnect. Remember: after reconnect you wait for the next <strong>keyframe<\/strong> before clean frames resume.<\/p>\n<h2 id=\"4-bound-every-buffer-no-leaks\">4. Bound every buffer (no leaks)<\/h2>\n<p>From section 01: every queue bounded, drop-oldest for live. Explicitly release GPU surfaces / <code>unmap<\/code> GStreamer buffers each iteration. A long-running process must have <strong>flat memory<\/strong> over days — test it: run 24h, watch RSS/GPU mem. (Tie to your resume: long-running petabyte pipelines.)<\/p>\n<h2 id=\"5-graceful-degradation-dont-crash-shed-load\">5. Graceful degradation (don't crash, shed load)<\/h2>\n<p>When overloaded, <em>reduce service<\/em> instead of dying:<\/p>\n<ul><li>GPU OOM risk → drop to a smaller batch or skip frames (process every Nth).<\/li><li>One model too slow → lower inference resolution or framerate.<\/li><li>Downstream DB slow → buffer results briefly, then drop non-critical writes, keep<\/li><\/ul>\n<p>the video loop alive.<\/p>\n<ul><li>Always <strong>fail open or fail safe by design<\/strong>, never by accident.<\/li><\/ul>\n<h2 id=\"6-supervision-auto-restart-the-recoverer\">6. Supervision (auto-restart the recoverer)<\/h2>\n<p>Wrap workers in a supervisor that restarts crashed ones (like Erlang/OTP supervision trees, or just a monitoring loop / k8s liveness probe). The recovery code itself can fail — something must watch the watcher.<\/p>\n<ul><li><strong>Process level:<\/strong> systemd, supervisord, or **Kubernetes liveness/readiness<\/li><\/ul>\n<p>probes** (your GKE experience) restart unhealthy pods.<\/p>\n<ul><li><strong>Health endpoint:<\/strong> expose <code>/healthz<\/code> reporting per-camera freshness so the<\/li><\/ul>\n<p>orchestrator and dashboards see truth.<\/p>\n<h2 id=\"putting-it-together-the-worker-loop\">Putting it together (the worker loop)<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> camera_worker(cam_id, url):\n    attempt = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">not<\/span> shutdown.is_set():\n        <span class=\"tok-keyword\">try<\/span>:\n            cap = open_stream(url)             <span class=\"tok-comment\"># GStreamer/NVDEC pipeline<\/span>\n            attempt = <span class=\"tok-number\">0<\/span>                        <span class=\"tok-comment\"># reset backoff on success<\/span>\n            <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">not<\/span> shutdown.is_set():\n                ok, frame = cap.read()\n                <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok <span class=\"tok-keyword\">or<\/span> stale(cam_id):    <span class=\"tok-comment\"># EOS or watchdog<\/span>\n                    <span class=\"tok-keyword\">raise<\/span> StreamError(<span class=\"tok-string\">\"dead\"<\/span>)\n                latest[cam_id] = frame         <span class=\"tok-comment\"># bounded: overwrite, never grow<\/span>\n                mark_fresh(cam_id)\n        <span class=\"tok-keyword\">except<\/span> Exception <span class=\"tok-keyword\">as<\/span> e:\n            log.warning(<span class=\"tok-string\">\"cam %s down: %s\"<\/span>, cam_id, e)\n            release(cap)                       <span class=\"tok-comment\"># free buffers/GPU surfaces!<\/span>\n            time.sleep(backoff(attempt)); attempt += <span class=\"tok-number\">1<\/span>\n        <span class=\"tok-keyword\">finally<\/span>:\n            release(cap)<\/code><\/pre>\n<p>This single loop demonstrates isolation, watchdog, backoff, bounded buffer, and cleanup — a great thing to whiteboard.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Process-per-camera vs thread-per-camera?<\/strong> Process = strongest isolation (native crash contained, true parallelism, no GIL) at higher memory cost. Thread = lighter and shares memory, but a native segfault or GIL contention can hurt all of them. Choose process isolation when decoders are flaky or streams are many and independent.<\/p>\n<p><strong>Fixed retry interval vs exponential backoff?<\/strong> Fixed interval hammers a down resource and floods logs; exponential backoff (with jitter and a cap) is gentle, avoids thundering-herd reconnects, and recovers fast when the camera returns. Always backoff + jitter.<\/p>\n<p><strong>Crash-and-restart vs in-process recovery?<\/strong> Sometimes the cleanest recovery is to let a worker die and have the supervisor respawn it (fresh state, no leaked resources) — \"crash-only\" design. In-process recovery is faster but risks accumulating subtle corruption. For native video stacks, supervised restart is often more robust.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../05-production-python/README.md\" href=\"#\">05-production-python/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"1-per-stream-isolation-limit-blast-radius","text":"1. Per-stream isolation (limit blast radius)"},{"level":2,"id":"2-watchdog-on-frame-freshness-catch-silent-freezes","text":"2. Watchdog on frame freshness (catch silent freezes)"},{"level":2,"id":"3-reconnect-with-exponential-backoff-jitter","text":"3. Reconnect with exponential backoff + jitter"},{"level":2,"id":"4-bound-every-buffer-no-leaks","text":"4. Bound every buffer (no leaks)"},{"level":2,"id":"5-graceful-degradation-dont-crash-shed-load","text":"5. Graceful degradation (don't crash, shed load)"},{"level":2,"id":"6-supervision-auto-restart-the-recoverer","text":"6. Supervision (auto-restart the recoverer)"},{"level":2,"id":"putting-it-together-the-worker-loop","text":"Putting it together (the worker loop)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"recovery patterns stream running detect failure bus eos / watchdog camera drops / freezes reconnect: backoff + jitter wait for keyframe isolated per camera · blast radius = 1 the self-healing loop: detect → reconnect → resume 💡 tl;dr five patterns cover almost everything: isolate each stream, watchdog for freshness, reconnect with exponential backoff , bound every buffer , and degrade gracefully instead of crashing. supervise the whole thing so a dead worker auto-restarts. 1. per-stream isolation (limit blast radius) run each camera in its own worker — a thread, an asyncio task, or (safest) a separate process . a crash or stall in one is contained. process per camera — strongest isolation; a native decoder segfault kills one process, a supervisor respawns it. costs more memory. thread/task per camera — lighter, but a native crash can take the process down; fine when decoders are stable and you watchdog well. deepstream alternative: many streams in one pipeline, but then you need nvstreammux to tolerate a source dropping (it can, with proper config) so one bad source doesn't stall the batch. 2. watchdog on frame freshness (catch silent freezes) the freeze that throws no error is the dangerous one. track the timestamp of the last frame per camera; if now - last_frame > threshold , declare it dead and trigger reconnect — even though no exception fired. if time.monotonic() - last_frame_ts > stale_seconds: log.warning( \"camera %s stale, restarting\" , cam_id) restart_stream(cam_id) 3. reconnect with exponential backoff + jitter don't hammer a down camera every 100ms (you'll dos it and flood logs). back off: 1s, 2s, 4s, 8s… capped (e.g., 30s), with a little random jitter so 40 cameras don't all retry in lockstep after a network blip. delay = min (base * 2 ** attempt, max_delay) + random.uniform( 0 , jitter) reset the counter on a successful reconnect. remember: after reconnect you wait for the next keyframe before clean frames resume. 4. bound every buffer (no leaks) from section 01: every queue bounded, drop-oldest for live. explicitly release gpu surfaces / unmap gstreamer buffers each iteration. a long-running process must have flat memory over days — test it: run 24h, watch rss/gpu mem. (tie to your resume: long-running petabyte pipelines.) 5. graceful degradation (don't crash, shed load) when overloaded, reduce service instead of dying: gpu oom risk → drop to a smaller batch or skip frames (process every nth). one model too slow → lower inference resolution or framerate. downstream db slow → buffer results briefly, then drop non-critical writes, keep the video loop alive. always fail open or fail safe by design , never by accident. 6. supervision (auto-restart the recoverer) wrap workers in a supervisor that restarts crashed ones (like erlang/otp supervision trees, or just a monitoring loop / k8s liveness probe). the recovery code itself can fail — something must watch the watcher. process level: systemd, supervisord, or **kubernetes liveness/readiness probes** (your gke experience) restart unhealthy pods. health endpoint: expose /healthz reporting per-camera freshness so the orchestrator and dashboards see truth. putting it together (the worker loop) def camera_worker(cam_id, url): attempt = 0 while not shutdown.is_set(): try : cap = open_stream(url) # gstreamer/nvdec pipeline attempt = 0 # reset backoff on success while not shutdown.is_set(): ok, frame = cap.read() if not ok or stale(cam_id): # eos or watchdog raise streamerror( \"dead\" ) latest[cam_id] = frame # bounded: overwrite, never grow mark_fresh(cam_id) except exception as e: log.warning( \"cam %s down: %s\" , cam_id, e) release(cap) # free buffers/gpu surfaces! time.sleep(backoff(attempt)); attempt += 1 finally : release(cap) this single loop demonstrates isolation, watchdog, backoff, bounded buffer, and cleanup — a great thing to whiteboard. why x over y process-per-camera vs thread-per-camera? process = strongest isolation (native crash contained, true parallelism, no gil) at higher memory cost. thread = lighter and shares memory, but a native segfault or gil contention can hurt all of them. choose process isolation when decoders are flaky or streams are many and independent. fixed retry interval vs exponential backoff? fixed interval hammers a down resource and floods logs; exponential backoff (with jitter and a cap) is gentle, avoids thundering-herd reconnects, and recovers fast when the camera returns. always backoff + jitter. crash-and-restart vs in-process recovery? sometimes the cleanest recovery is to let a worker die and have the supervisor respawn it (fresh state, no leaked resources) — \"crash-only\" design. in-process recovery is faster but risks accumulating subtle corruption. for native video stacks, supervised restart is often more robust. → back to section readme · next section: 05-production-python/","words":751},{"path":"05-production-python/README.md","title":"Overview","section":"5 · Production Python","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"05-production-python-for-video\">05 — Production Python for Video<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD wants <em>\"fault-tolerant, multi-threaded/async code… manage resources in long-running processes.\"<\/em> The crux is Python's <strong>GIL<\/strong>: it stops two threads running Python bytecode at once. The trick is knowing that video decode and GPU inference release the GIL (so threads <em>do<\/em> help there), while pure-Python work needs processes. Pick the right concurrency model per stage.<\/div><\/div>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"gil-threads-async-processes.md\" href=\"#\">gil-threads-async-processes.md<\/a> — the concurrency decision<\/li><li><a class=\"mdlink\" data-href=\"memory-and-resources.md\" href=\"#\">memory-and-resources.md<\/a> — leaks, GPU memory, long-running hygiene<\/li><\/ol>\n<h2 id=\"the-line-that-proves-you-get-it\">The line that proves you get it<\/h2>\n<p>*\"The GIL means CPU-bound Python doesn't parallelize across threads — but <code>cv2<\/code>/NVDEC decode, TensorRT inference, and numpy release the GIL, so an I/O-and-native pipeline scales fine on threads. When I have heavy <em>Python-side<\/em> logic per camera, I move it to processes. I match the concurrency model to where the time is spent.\"*<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"gil-threads-async-processes.md\" href=\"#\">gil-threads-async-processes.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-line-that-proves-you-get-it","text":"The line that proves you get it"}],"text":"05 — production python for video 💡 tl;dr the jd wants \"fault-tolerant, multi-threaded/async code… manage resources in long-running processes.\" the crux is python's gil : it stops two threads running python bytecode at once. the trick is knowing that video decode and gpu inference release the gil (so threads do help there), while pure-python work needs processes. pick the right concurrency model per stage. files: gil-threads-async-processes.md — the concurrency decision memory-and-resources.md — leaks, gpu memory, long-running hygiene the line that proves you get it *\"the gil means cpu-bound python doesn't parallelize across threads — but cv2 /nvdec decode, tensorrt inference, and numpy release the gil, so an i/o-and-native pipeline scales fine on threads. when i have heavy python-side logic per camera, i move it to processes. i match the concurrency model to where the time is spent.\"* → start: gil-threads-async-processes.md","words":140},{"path":"05-production-python/gil-threads-async-processes.md","title":"GIL, Threads, Async, Processes","section":"5 · Production Python","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"gil-threads-async-processes\">GIL, Threads, Async, Processes<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 170\" role=\"img\" aria-label=\"Three concurrency tools, three jobs\"><rect class=\"dg-box dg-hot\" x=\"20\" y=\"40\" width=\"210\" height=\"110\" rx=\"14\"/><text class=\"dg-label\" x=\"125\" y=\"74\" text-anchor=\"middle\">Threads<\/text><text class=\"dg-sub\" x=\"125\" y=\"98\" text-anchor=\"middle\">decode + infer<\/text><text class=\"dg-sub\" x=\"125\" y=\"122\" text-anchor=\"middle\">GIL released in C<\/text><text class=\"dg-sub\" x=\"125\" y=\"138\" text-anchor=\"middle\">native parallelism<\/text><rect class=\"dg-box\" x=\"245\" y=\"40\" width=\"210\" height=\"110\" rx=\"14\"/><text class=\"dg-label\" x=\"350\" y=\"74\" text-anchor=\"middle\">Async<\/text><text class=\"dg-sub\" x=\"350\" y=\"98\" text-anchor=\"middle\">many connections<\/text><text class=\"dg-sub\" x=\"350\" y=\"122\" text-anchor=\"middle\">one loop<\/text><text class=\"dg-sub\" x=\"350\" y=\"138\" text-anchor=\"middle\">tiny overhead<\/text><rect class=\"dg-box\" x=\"470\" y=\"40\" width=\"210\" height=\"110\" rx=\"14\"/><text class=\"dg-label\" x=\"575\" y=\"74\" text-anchor=\"middle\">Processes<\/text><text class=\"dg-sub\" x=\"575\" y=\"98\" text-anchor=\"middle\">CPU-bound Python<\/text><text class=\"dg-sub\" x=\"575\" y=\"122\" text-anchor=\"middle\">true cores<\/text><text class=\"dg-sub\" x=\"575\" y=\"138\" text-anchor=\"middle\">hard isolation<\/text><text class=\"dg-sub\" x=\"360\" y=\"24\" text-anchor=\"middle\">match the tool to where the time is spent<\/text><\/svg><figcaption>Three concurrency tools, three jobs<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Three concurrency tools, three jobs. <strong>Threads<\/strong> → I/O-bound and native code that releases the GIL (decode, inference, network). <strong>Async<\/strong> → managing many network connections/streams with low overhead. <strong>Processes<\/strong> → CPU-bound pure-Python work and hard isolation. The GIL is the reason this choice matters.<\/div><\/div>\n<h2 id=\"the-gil-in-one-paragraph\">The GIL in one paragraph<\/h2>\n<p>CPython's <strong>Global Interpreter Lock<\/strong> lets only one thread execute Python bytecode at a time. So two threads doing pure-Python math don't run in parallel — they take turns. <strong>But<\/strong> when a thread enters C code that releases the GIL — OpenCV decode, numpy ops, TensorRT/CUDA calls, socket reads — other Python threads run meanwhile. That's why a video pipeline (mostly native + I/O) parallelizes well on threads despite the GIL.<\/p>\n<blockquote><p>(Note for currency: Python 3.13 introduced an experimental <em>free-threaded<\/em> no-GIL build. Mention it as awareness, but reason about the standard GIL build unless told otherwise.)<\/p><\/blockquote>\n<h2 id=\"when-to-use-each\">When to use each<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Tool<\/th><th>Best for<\/th><th>In a video pipeline<\/th><\/tr><\/thead><tbody><tr><td><strong>Threading<\/strong><\/td><td>I/O-bound; native code that releases GIL<\/td><td>decode threads, frame-grab per camera, inference calls — <strong>the default for streaming<\/strong><\/td><\/tr><tr><td><strong>asyncio<\/strong><\/td><td>thousands of concurrent I/O waits, low overhead<\/td><td>managing many RTSP/WebRTC connections, async network serving (FastAPI), signaling<\/td><\/tr><tr><td><strong>multiprocessing<\/strong><\/td><td>CPU-bound pure-Python; isolation<\/td><td>heavy per-frame Python logic, per-camera process isolation, sidestepping GIL entirely<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"threads-vs-async-the-nuance\">Threads vs async (the nuance)<\/h2>\n<ul><li><strong>Threads<\/strong>: pre-emptive (OS switches them), simple to write, but each has stack<\/li><\/ul>\n<p>overhead; thousands of threads = heavy.<\/p>\n<ul><li><strong>Async<\/strong>: cooperative (tasks yield at <code>await<\/code>), one thread, tiny overhead per<\/li><\/ul>\n<p>task — great for <em>many<\/em> concurrent connections. But <strong>one blocking call freezes   the whole loop<\/strong>, so CPU-heavy or blocking-native work must go to an executor   (<code>run_in_executor<\/code>) or a process.<\/p>\n<ul><li>For a handful of cameras with native decode → threads are simplest. For hundreds<\/li><\/ul>\n<p>of lightweight connections / a web-facing service → async.<\/p>\n<h2 id=\"the-producerconsumer-skeleton-threads\">The producer/consumer skeleton (threads)<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> threading, queue\nframes = queue.Queue(maxsize=<span class=\"tok-number\">2<\/span>)        <span class=\"tok-comment\"># bounded — backpressure<\/span>\n\n<span class=\"tok-keyword\">def<\/span> producer(url):                     <span class=\"tok-comment\"># GIL released during decode<\/span>\n    cap = open_stream(url)\n    <span class=\"tok-keyword\">while<\/span> running:\n        ok, f = cap.read()\n        <span class=\"tok-keyword\">try<\/span>: frames.put_nowait(f)\n        <span class=\"tok-keyword\">except<\/span> queue.Full:\n            frames.get_nowait(); frames.put_nowait(f)   <span class=\"tok-comment\"># drop oldest<\/span>\n\n<span class=\"tok-keyword\">def<\/span> consumer():                        <span class=\"tok-comment\"># GIL released during TRT inference<\/span>\n    <span class=\"tok-keyword\">while<\/span> running:\n        f = frames.get()\n        run_inference(f)\n\nthreading.Thread(target=producer, args=(url,), daemon=<span class=\"tok-keyword\">True<\/span>).start()\nthreading.Thread(target=consumer, daemon=<span class=\"tok-keyword\">True<\/span>).start()<\/code><\/pre>\n<h2 id=\"why-processes-for-cpu-bound-python\">Why processes for CPU-bound Python<\/h2>\n<p>If per-camera logic is heavy <em>Python<\/em> (complex geometry, lots of small ops not in numpy), threads serialize on the GIL and you get no speedup. Move to <code>multiprocessing<\/code> (or <code>ProcessPoolExecutor<\/code>) so each runs on its own core — at the cost of IPC (pickling frames between processes is expensive; prefer shared memory or keep frames on GPU).<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Threads vs multiprocessing for a video decode + infer pipeline?<\/strong> Decode (OpenCV/NVDEC) and inference (TensorRT/CUDA) release the GIL, so threads give real parallelism with shared memory and no IPC cost — the right default. Use multiprocessing only when the bottleneck is <em>pure-Python<\/em> CPU work or you need crash isolation.<\/p>\n<p><strong>asyncio vs threads for many RTSP connections?<\/strong> Async scales to many concurrent I/O waits with minimal overhead and no thread-count explosion — good for the <em>connection management<\/em> layer. But blocking/native decode must be offloaded to threads/processes. Common design: async for orchestration + threads for decode/infer.<\/p>\n<p><strong>Why does the GIL not kill video performance?<\/strong> Because the heavy lifting is in C extensions (cv2, numpy, CUDA) that release the GIL during execution. The GIL only bites on pure-Python hot loops — keep those out of the per-frame path (vectorize, push to GPU).<\/p>\n<p><strong>multiprocessing frame passing — what's the catch?<\/strong> Sending full frames between processes pickles/copies them (slow, memory-heavy). Mitigate with <code>shared_memory<\/code>, memory-mapped buffers, or keeping pixels on the GPU and passing only handles/metadata.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"memory-and-resources.md\" href=\"#\">memory-and-resources.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-gil-in-one-paragraph","text":"The GIL in one paragraph"},{"level":2,"id":"when-to-use-each","text":"When to use each"},{"level":2,"id":"threads-vs-async-the-nuance","text":"Threads vs async (the nuance)"},{"level":2,"id":"the-producerconsumer-skeleton-threads","text":"The producer/consumer skeleton (threads)"},{"level":2,"id":"why-processes-for-cpu-bound-python","text":"Why processes for CPU-bound Python"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"gil, threads, async, processes threads decode + infer gil released in c native parallelism async many connections one loop tiny overhead processes cpu-bound python true cores hard isolation match the tool to where the time is spent three concurrency tools, three jobs 💡 tl;dr three concurrency tools, three jobs. threads → i/o-bound and native code that releases the gil (decode, inference, network). async → managing many network connections/streams with low overhead. processes → cpu-bound pure-python work and hard isolation. the gil is the reason this choice matters. the gil in one paragraph cpython's global interpreter lock lets only one thread execute python bytecode at a time. so two threads doing pure-python math don't run in parallel — they take turns. but when a thread enters c code that releases the gil — opencv decode, numpy ops, tensorrt/cuda calls, socket reads — other python threads run meanwhile. that's why a video pipeline (mostly native + i/o) parallelizes well on threads despite the gil. (note for currency: python 3.13 introduced an experimental free-threaded no-gil build. mention it as awareness, but reason about the standard gil build unless told otherwise.) when to use each tool best for in a video pipeline threading i/o-bound; native code that releases gil decode threads, frame-grab per camera, inference calls — the default for streaming asyncio thousands of concurrent i/o waits, low overhead managing many rtsp/webrtc connections, async network serving (fastapi), signaling multiprocessing cpu-bound pure-python; isolation heavy per-frame python logic, per-camera process isolation, sidestepping gil entirely threads vs async (the nuance) threads : pre-emptive (os switches them), simple to write, but each has stack overhead; thousands of threads = heavy. async : cooperative (tasks yield at await ), one thread, tiny overhead per task — great for many concurrent connections. but one blocking call freezes the whole loop , so cpu-heavy or blocking-native work must go to an executor ( run_in_executor ) or a process. for a handful of cameras with native decode → threads are simplest. for hundreds of lightweight connections / a web-facing service → async. the producer/consumer skeleton (threads) import threading, queue frames = queue.queue(maxsize= 2 ) # bounded — backpressure def producer(url): # gil released during decode cap = open_stream(url) while running: ok, f = cap.read() try : frames.put_nowait(f) except queue.full: frames.get_nowait(); frames.put_nowait(f) # drop oldest def consumer(): # gil released during trt inference while running: f = frames.get() run_inference(f) threading.thread(target=producer, args=(url,), daemon= true ).start() threading.thread(target=consumer, daemon= true ).start() why processes for cpu-bound python if per-camera logic is heavy python (complex geometry, lots of small ops not in numpy), threads serialize on the gil and you get no speedup. move to multiprocessing (or processpoolexecutor ) so each runs on its own core — at the cost of ipc (pickling frames between processes is expensive; prefer shared memory or keep frames on gpu). why x over y threads vs multiprocessing for a video decode + infer pipeline? decode (opencv/nvdec) and inference (tensorrt/cuda) release the gil, so threads give real parallelism with shared memory and no ipc cost — the right default. use multiprocessing only when the bottleneck is pure-python cpu work or you need crash isolation. asyncio vs threads for many rtsp connections? async scales to many concurrent i/o waits with minimal overhead and no thread-count explosion — good for the connection management layer. but blocking/native decode must be offloaded to threads/processes. common design: async for orchestration + threads for decode/infer. why does the gil not kill video performance? because the heavy lifting is in c extensions (cv2, numpy, cuda) that release the gil during execution. the gil only bites on pure-python hot loops — keep those out of the per-frame path (vectorize, push to gpu). multiprocessing frame passing — what's the catch? sending full frames between processes pickles/copies them (slow, memory-heavy). mitigate with shared_memory , memory-mapped buffers, or keeping pixels on the gpu and passing only handles/metadata. → next: memory-and-resources.md","words":646},{"path":"05-production-python/memory-and-resources.md","title":"Memory & Resources","section":"5 · Production Python","quiz":false,"accent":"#4a8bd1","html":"<h1 id=\"memory-resource-hygiene-in-long-running-processes\">Memory &amp; Resource Hygiene in Long-Running Processes<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A video service runs for weeks. Anything that grows even slightly per frame will eventually OOM. The job is <strong>flat memory forever<\/strong>: bound every buffer, release every GPU surface, close every handle, and <em>test it over 24h+<\/em>. This is the JD's \"without memory leaks\" / \"manage resources in long-running processes,\" and it echoes your petabyte-pipeline reliability work.<\/div><\/div>\n<h2 id=\"where-video-memory-leaks-come-from\">Where video memory leaks come from<\/h2>\n<ol><li><strong>Unbounded queues<\/strong> — consumer slower than producer (covered in 01). #1 cause.<\/li><li><strong>Unreleased GPU surfaces<\/strong> — decoded NVMM buffers / CUDA tensors not freed each<\/li><\/ol>\n<p>iteration → GPU OOM, often before host OOM.<\/p>\n<ol><li><strong>Un-<code>unmap<\/code>ped GStreamer buffers<\/strong> — mapping a buffer and not unmapping (02).<\/li><li><strong>Accumulating references<\/strong> — appending detections/frames to a list \"for later,\"<\/li><\/ol>\n<p>growing tracker state without eviction, caches without limits.<\/p>\n<ol><li><strong>C-extension leaks<\/strong> — some native ops leak; only visible as steady RSS growth.<\/li><li><strong>Fragmentation<\/strong> — long runs fragment the allocator; RSS creeps even without a<\/li><\/ol>\n<p>true leak.<\/p>\n<h2 id=\"how-to-find-them-your-evidence-driven-method\">How to find them (your evidence-driven method)<\/h2>\n<ul><li><strong>Watch the trend, not the snapshot.<\/strong> Plot RSS and GPU memory (<code>nvidia-smi<\/code>,<\/li><\/ul>\n<p><code>tegrastats<\/code>) over hours. A leak is a slope; healthy is flat/sawtooth.<\/p>\n<ul><li><strong>Python heap:<\/strong> <code>tracemalloc<\/code>, <code>objgraph<\/code>, <code>memory_profiler<\/code> to find growing<\/li><\/ul>\n<p>object counts.<\/p>\n<ul><li><strong>GPU:<\/strong> <code>torch.cuda.memory_summary()<\/code> / TensorRT workspace accounting; confirm<\/li><\/ul>\n<p>per-iteration free.<\/p>\n<ul><li><strong>Bisect by stage:<\/strong> disable inference, then tracking, then DB — see which stage's<\/li><\/ul>\n<p>removal flattens the curve. (Same isolate-a-variable approach as your NVMe-vs-NAS   diagnosis.)<\/p>\n<h2 id=\"hygiene-checklist\">Hygiene checklist<\/h2>\n<ul><li>Bound <strong>every<\/strong> queue; choose drop policy per stage.<\/li><li>Release GPU buffers / <code>del<\/code> tensors / <code>unmap<\/code> buffers each iteration; use context<\/li><\/ul>\n<p>managers (<code>with<\/code>) so cleanup happens even on exception.<\/p>\n<ul><li>Cap tracker/state dicts; evict stale track IDs.<\/li><li>Reuse pre-allocated buffers instead of allocating per frame (steady-state, less<\/li><\/ul>\n<p>fragmentation).<\/p>\n<ul><li>Set explicit limits: max detections, max queue depth, max in-flight batches.<\/li><li>Pin a periodic health log: RSS, GPU mem, per-camera fps, queue depths.<\/li><li><strong>Soak test:<\/strong> run the full pipeline 24–72h under realistic load before shipping.<\/li><\/ul>\n<h2 id=\"gpu-memory-specifics\">GPU memory specifics<\/h2>\n<ul><li>GPU RAM is small and shared (decode + inference + overlay). OOM here crashes the<\/li><\/ul>\n<p>process. Budget it: <code>decode buffers + model workspace + batch tensors + headroom<\/code>.<\/p>\n<ul><li>TensorRT engines hold a workspace; multiple model instances multiply it.<\/li><li>Prefer <strong>streaming/zero-copy<\/strong> so you don't hold N full frames in GPU memory at<\/li><\/ul>\n<p>once.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Why bound buffers instead of \"just add more RAM\"?<\/strong> More RAM delays the OOM; it doesn't fix it. An unbounded queue under sustained overload grows without limit — bounding + dropping is the only stable steady state.<\/p>\n<p><strong>Pre-allocate buffers vs allocate per frame?<\/strong> Per-frame allocation churns the allocator (fragmentation, GC pressure, latency jitter). Pre-allocating and reusing gives flat, predictable memory and steadier latency in a long-running loop.<\/p>\n<p><strong>Why soak-test instead of trusting a clean 5-minute run?<\/strong> Leaks and fragmentation are <em>slopes<\/em> — invisible in minutes, fatal in days. A 24h+ soak with memory trending is the only way to prove \"no leaks in a long-running process,\" which is exactly what they're asking for.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../06-system-design/README.md\" href=\"#\">06-system-design/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"where-video-memory-leaks-come-from","text":"Where video memory leaks come from"},{"level":2,"id":"how-to-find-them-your-evidence-driven-method","text":"How to find them (your evidence-driven method)"},{"level":2,"id":"hygiene-checklist","text":"Hygiene checklist"},{"level":2,"id":"gpu-memory-specifics","text":"GPU memory specifics"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"memory & resource hygiene in long-running processes 💡 tl;dr a video service runs for weeks. anything that grows even slightly per frame will eventually oom. the job is flat memory forever : bound every buffer, release every gpu surface, close every handle, and test it over 24h+ . this is the jd's \"without memory leaks\" / \"manage resources in long-running processes,\" and it echoes your petabyte-pipeline reliability work. where video memory leaks come from unbounded queues — consumer slower than producer (covered in 01). #1 cause. unreleased gpu surfaces — decoded nvmm buffers / cuda tensors not freed each iteration → gpu oom, often before host oom. un- unmap ped gstreamer buffers — mapping a buffer and not unmapping (02). accumulating references — appending detections/frames to a list \"for later,\" growing tracker state without eviction, caches without limits. c-extension leaks — some native ops leak; only visible as steady rss growth. fragmentation — long runs fragment the allocator; rss creeps even without a true leak. how to find them (your evidence-driven method) watch the trend, not the snapshot. plot rss and gpu memory ( nvidia-smi , tegrastats ) over hours. a leak is a slope; healthy is flat/sawtooth. python heap: tracemalloc , objgraph , memory_profiler to find growing object counts. gpu: torch.cuda.memory_summary() / tensorrt workspace accounting; confirm per-iteration free. bisect by stage: disable inference, then tracking, then db — see which stage's removal flattens the curve. (same isolate-a-variable approach as your nvme-vs-nas diagnosis.) hygiene checklist bound every queue; choose drop policy per stage. release gpu buffers / del tensors / unmap buffers each iteration; use context managers ( with ) so cleanup happens even on exception. cap tracker/state dicts; evict stale track ids. reuse pre-allocated buffers instead of allocating per frame (steady-state, less fragmentation). set explicit limits: max detections, max queue depth, max in-flight batches. pin a periodic health log: rss, gpu mem, per-camera fps, queue depths. soak test: run the full pipeline 24–72h under realistic load before shipping. gpu memory specifics gpu ram is small and shared (decode + inference + overlay). oom here crashes the process. budget it: decode buffers + model workspace + batch tensors + headroom . tensorrt engines hold a workspace; multiple model instances multiply it. prefer streaming/zero-copy so you don't hold n full frames in gpu memory at once. why x over y why bound buffers instead of \"just add more ram\"? more ram delays the oom; it doesn't fix it. an unbounded queue under sustained overload grows without limit — bounding + dropping is the only stable steady state. pre-allocate buffers vs allocate per frame? per-frame allocation churns the allocator (fragmentation, gc pressure, latency jitter). pre-allocating and reusing gives flat, predictable memory and steadier latency in a long-running loop. why soak-test instead of trusting a clean 5-minute run? leaks and fragmentation are slopes — invisible in minutes, fatal in days. a 24h+ soak with memory trending is the only way to prove \"no leaks in a long-running process,\" which is exactly what they're asking for. → back to section readme · next section: 06-system-design/","words":511},{"path":"06-system-design/README.md","title":"Overview","section":"6 · System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"06-system-design\">06 — System Design<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is the round you said you're prepping for. Expect an open prompt like <em>\"Design a system that runs object detection on 50 RTSP cameras, 24/7, on the edge and cloud, and never needs a human to restart it.\"<\/em> This section gives you a repeatable structure, a worked answer, and the follow-up curveballs.<\/div><\/div>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"framework.md\" href=\"#\">framework.md<\/a> — how to drive any CV-systems design question<\/li><li><a class=\"mdlink\" data-href=\"worked-example-multicam.md\" href=\"#\">worked-example-multicam.md<\/a> — the 50-camera crash-proof pipeline, end to end<\/li><li><a class=\"mdlink\" data-href=\"curveballs.md\" href=\"#\">curveballs.md<\/a> — the follow-ups they pile on<\/li><\/ol>\n<h2 id=\"how-design-rounds-are-graded\">How design rounds are graded<\/h2>\n<p>They're not looking for the \"right\" diagram. They score: do you <strong>clarify requirements<\/strong>, <strong>state assumptions<\/strong>, <strong>reason about tradeoffs<\/strong>, <strong>find bottlenecks<\/strong>, and <strong>handle failure<\/strong>? Your resume's \"ambiguous problems with no obvious answer\" is exactly this muscle — show the <em>method<\/em>, think out loud.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"framework.md\" href=\"#\">framework.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"how-design-rounds-are-graded","text":"How design rounds are graded"}],"text":"06 — system design 💡 tl;dr this is the round you said you're prepping for. expect an open prompt like \"design a system that runs object detection on 50 rtsp cameras, 24/7, on the edge and cloud, and never needs a human to restart it.\" this section gives you a repeatable structure, a worked answer, and the follow-up curveballs. files: framework.md — how to drive any cv-systems design question worked-example-multicam.md — the 50-camera crash-proof pipeline, end to end curveballs.md — the follow-ups they pile on how design rounds are graded they're not looking for the \"right\" diagram. they score: do you clarify requirements , state assumptions , reason about tradeoffs , find bottlenecks , and handle failure ? your resume's \"ambiguous problems with no obvious answer\" is exactly this muscle — show the method , think out loud. → start: framework.md","words":141},{"path":"06-system-design/framework.md","title":"Design Framework","section":"6 · System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"a-framework-for-cv-systems-design-questions\">A Framework for CV-Systems Design Questions<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Don't start drawing. Run this five-step loop out loud: <strong>Clarify → Estimate → Architect → Bottleneck → Failure<\/strong>. It works for any \"design a video pipeline\" prompt and shows the senior-engineer method the JD wants.<\/div><\/div>\n<h2 id=\"step-1-clarify-never-skip\">Step 1 — Clarify (never skip)<\/h2>\n<p>Ask before you design. Good questions for any CV pipeline:<\/p>\n<ul><li><strong>Scale:<\/strong> how many cameras? resolution? framerate? Edge, cloud, or both?<\/li><li><strong>Latency SLA:<\/strong> real-time reaction (ms) or near-real-time analytics (seconds)?<\/li><li><strong>Model:<\/strong> detection/tracking/classification? given to me, or do I pick? size?<\/li><li><strong>Output:<\/strong> alerts? analytics to a DB? annotated stream to a UI?<\/li><li><strong>Accuracy vs cost:<\/strong> can I drop frames? skip cameras under load?<\/li><li><strong>Hardware budget:<\/strong> Jetson at the edge? GPUs in cloud? how many?<\/li><li><strong>Deployment:<\/strong> how many sites? connectivity reliability?<\/li><\/ul>\n<p><em>Stating these assumptions out loud is half the score.<\/em><\/p>\n<h2 id=\"step-2-estimate-back-of-envelope\">Step 2 — Estimate (back-of-envelope)<\/h2>\n<p>Show you can size it:<\/p>\n<ul><li>50 cams × 1080p × 30fps. Can one Jetson/GPU decode + infer that? NVDEC decode<\/li><\/ul>\n<p>capacity? GPU inference throughput at your batch/precision?<\/p>\n<ul><li>Bandwidth: 50 × ~4 Mbps (H.264 1080p) ≈ 200 Mbps ingest — link OK?<\/li><li>Conclusion drives architecture: one box won't do 50 → distribute (e.g., edge<\/li><\/ul>\n<p>boxes of 8–16 cams each, or a GPU cluster).<\/p>\n<h2 id=\"step-3-architect-the-diagram\">Step 3 — Architect (the diagram)<\/h2>\n<p>A defensible default:<\/p>\n<pre><code>Cameras (RTSP) → Edge node(s): GStreamer/DeepStream decode (NVDEC) + batched\n                 TRT inference + tracking → results as metadata\n                       │ (only small metadata + optional clips leave the edge)\n                       ▼\n              Message bus (Kafka/Pub/Sub) → Cloud: aggregation, storage\n                 (SQL/NoSQL), dashboards, WebRTC live view, retraining data<\/code><\/pre>\n<p>Key decisions to justify: edge vs cloud inference, per-camera isolation, batching at the mux, bounded buffers, hardware decode.<\/p>\n<h2 id=\"step-4-bottleneck-prove-you-measure\">Step 4 — Bottleneck (prove you measure)<\/h2>\n<p>Walk the latency budget (section 03): decode, copy, inference, post, network. Name the likely fattest slice and how you'd <em>measure<\/em> then fix it. Mention p99, GPU utilization as the diagnostic. This is your \"evidence-driven engineering\" signature.<\/p>\n<h2 id=\"step-5-failure-crash-proof-section-04\">Step 5 — Failure (crash-proof, section 04)<\/h2>\n<p>Close every design by addressing: camera drop (reconnect+backoff), silent freeze (watchdog), overload (drop frames / degrade), process crash (supervised restart), memory (bounded buffers, soak-tested), blast radius (per-stream isolation). They <em>will<\/em> ask; bring it up first.<\/p>\n<h2 id=\"the-cheat-phrase\">The cheat phrase<\/h2>\n<p><em>\"Let me clarify scale and SLA, do a quick capacity estimate, sketch an edge-heavy architecture, walk the latency budget to find the bottleneck, then make it crash-proof.\"<\/em> — say that and you've framed the whole answer.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"worked-example-multicam.md\" href=\"#\">worked-example-multicam.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"step-1-clarify-never-skip","text":"Step 1 — Clarify (never skip)"},{"level":2,"id":"step-2-estimate-back-of-envelope","text":"Step 2 — Estimate (back-of-envelope)"},{"level":2,"id":"step-3-architect-the-diagram","text":"Step 3 — Architect (the diagram)"},{"level":2,"id":"step-4-bottleneck-prove-you-measure","text":"Step 4 — Bottleneck (prove you measure)"},{"level":2,"id":"step-5-failure-crash-proof-section-04","text":"Step 5 — Failure (crash-proof, section 04)"},{"level":2,"id":"the-cheat-phrase","text":"The cheat phrase"}],"text":"a framework for cv-systems design questions 💡 tl;dr don't start drawing. run this five-step loop out loud: clarify → estimate → architect → bottleneck → failure . it works for any \"design a video pipeline\" prompt and shows the senior-engineer method the jd wants. step 1 — clarify (never skip) ask before you design. good questions for any cv pipeline: scale: how many cameras? resolution? framerate? edge, cloud, or both? latency sla: real-time reaction (ms) or near-real-time analytics (seconds)? model: detection/tracking/classification? given to me, or do i pick? size? output: alerts? analytics to a db? annotated stream to a ui? accuracy vs cost: can i drop frames? skip cameras under load? hardware budget: jetson at the edge? gpus in cloud? how many? deployment: how many sites? connectivity reliability? stating these assumptions out loud is half the score. step 2 — estimate (back-of-envelope) show you can size it: 50 cams × 1080p × 30fps. can one jetson/gpu decode + infer that? nvdec decode capacity? gpu inference throughput at your batch/precision? bandwidth: 50 × ~4 mbps (h.264 1080p) ≈ 200 mbps ingest — link ok? conclusion drives architecture: one box won't do 50 → distribute (e.g., edge boxes of 8–16 cams each, or a gpu cluster). step 3 — architect (the diagram) a defensible default: cameras (rtsp) → edge node(s): gstreamer/deepstream decode (nvdec) + batched trt inference + tracking → results as metadata │ (only small metadata + optional clips leave the edge) ▼ message bus (kafka/pub/sub) → cloud: aggregation, storage (sql/nosql), dashboards, webrtc live view, retraining data key decisions to justify: edge vs cloud inference, per-camera isolation, batching at the mux, bounded buffers, hardware decode. step 4 — bottleneck (prove you measure) walk the latency budget (section 03): decode, copy, inference, post, network. name the likely fattest slice and how you'd measure then fix it. mention p99, gpu utilization as the diagnostic. this is your \"evidence-driven engineering\" signature. step 5 — failure (crash-proof, section 04) close every design by addressing: camera drop (reconnect+backoff), silent freeze (watchdog), overload (drop frames / degrade), process crash (supervised restart), memory (bounded buffers, soak-tested), blast radius (per-stream isolation). they will ask; bring it up first. the cheat phrase \"let me clarify scale and sla, do a quick capacity estimate, sketch an edge-heavy architecture, walk the latency budget to find the bottleneck, then make it crash-proof.\" — say that and you've framed the whole answer. → next: worked-example-multicam.md","words":401},{"path":"06-system-design/worked-example-multicam.md","title":"Worked Example: 50 Cameras","section":"6 · System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"worked-example-50-camera-crash-proof-pipeline\">Worked Example: 50-Camera Crash-Proof Pipeline<\/h1>\n<p><strong>The prompt:<\/strong> <em>\"Design a system to run object detection + tracking on 50 RTSP cameras across a warehouse, 24/7, low latency, that recovers from failures without human intervention. Edge and cloud.\"<\/em><\/p>\n<p>This is a full model answer. Read it as <em>how to talk<\/em>, not a script to memorize.<\/p>\n<h2 id=\"1-clarify-state-assumptions\">1. Clarify (state assumptions)<\/h2>\n<p>\"I'll assume: 50× 1080p H.264 @ 30fps; given a YOLO-class detector; need near-real-time (~100–200ms) detections + persistent track IDs for counting/dwell; output is analytics to a DB plus a live annotated view for operators; one warehouse site with reliable LAN to cameras but possibly flaky WAN to cloud; NVIDIA hardware available (Jetson Orin / dGPU). Tell me if any of that's wrong.\"<\/p>\n<h2 id=\"2-capacity-estimate\">2. Capacity estimate<\/h2>\n<ul><li>Ingest: 50 × ~4 Mbps ≈ 200 Mbps on the LAN — fine.<\/li><li>One dGPU (e.g., with NVDEC) can decode dozens of 1080p streams and, with batched<\/li><\/ul>\n<p>INT8 TRT inference on a small detector, serve many cameras. 50 cams likely needs   <strong>1 strong GPU server or 2–4 Jetson Orin edge boxes<\/strong> (~12–16 cams each).<\/p>\n<ul><li>Decision: <strong>edge-heavy<\/strong> — infer at the edge, send only metadata + event clips to<\/li><\/ul>\n<p>cloud, so WAN flakiness and bandwidth aren't in the critical path.<\/p>\n<h2 id=\"3-architecture\">3. Architecture<\/h2>\n<pre><code>                 EDGE NODE (×N, each handles a camera group)\n ┌─────────────────────────────────────────────────────────────┐\n cam1..16 RTSP ─► GStreamer/DeepStream:\n                  nvv4l2decoder (NVDEC) ─► nvstreammux (batch=16)\n                  ─► nvinfer (INT8 TRT detector) ─► nvtracker (IDs)\n                  ─► pad probe: extract metadata (boxes, ids, ts)\n                       │                              │\n                       ▼                              ▼\n               local ring buffer of            results → local queue\n               recent frames (for clips)              │\n                                                       ▼\n                              local agent: dedup/aggregate, write event clips\n └───────────────────────────────────┬─────────────────────────┘\n                                      │ metadata + clips (small)\n                                      ▼\n                    Message bus (Kafka / GCP Pub/Sub)\n                                      │\n                                      ▼\n                 CLOUD: stream processor → SQL/NoSQL (events, analytics)\n                        ├─ dashboards / alerting\n                        ├─ WebRTC/FastRTC live annotated view for operators\n                        └─ sampled frames → retraining dataset<\/code><\/pre>\n<p><strong>Why these choices:<\/strong><\/p>\n<ul><li><strong>Edge inference<\/strong>: lowest latency, no full-video egress, survives WAN outages.<\/li><li><strong>DeepStream + nvstreammux batching<\/strong>: many cams per GPU at low latency (sec 02/03).<\/li><li><strong>INT8 TRT engine<\/strong> built on the edge hardware (sec 03): max throughput.<\/li><li><strong>Metadata-only egress<\/strong>: cheap, private; clips only on events.<\/li><li><strong>Message bus<\/strong>: decouples edge from cloud; buffers during WAN blips.<\/li><li><strong>Cloud for state/UI/retraining<\/strong>: scales independently of the edge.<\/li><\/ul>\n<h2 id=\"4-latency-budget\">4. Latency budget<\/h2>\n<p>\"End to end I'd budget: decode ~few ms (NVDEC) → preprocess on GPU → batched inference (the fat slice; tune batch vs p99) → tracking (cheap) → metadata out. Target sub-150ms to detection. I'd timestamp each stage, watch p99 and GPU utilization; if util is low but latency high, I'm copy/CPU-bound and I keep frames in GPU memory and move preprocessing onto the GPU.\"<\/p>\n<h2 id=\"5-crash-proof-the-part-theyre-really-testing\">5. Crash-proof (the part they're really testing)<\/h2>\n<ul><li><strong>Per-camera isolation:<\/strong> each camera group in its own supervised pipeline/process;<\/li><\/ul>\n<p><code>nvstreammux<\/code> configured so one dropped source doesn't stall the batch. Blast   radius = one camera.<\/p>\n<ul><li><strong>Camera offline / EOS:<\/strong> detected on the GStreamer bus → tear to NULL, reconnect<\/li><\/ul>\n<p>with exponential backoff + jitter; wait for keyframe.<\/p>\n<ul><li><strong>Silent freeze:<\/strong> per-camera frame-freshness watchdog → force restart.<\/li><li><strong>Overload / GPU OOM:<\/strong> graceful degradation — shrink batch, drop to every-Nth<\/li><\/ul>\n<p>frame, or lower inference resolution before crashing.<\/p>\n<ul><li><strong>Process crash:<\/strong> supervised by systemd/Kubernetes liveness probes (GKE) →<\/li><\/ul>\n<p>auto-restart; crash-only design means a fresh worker has clean state.<\/p>\n<ul><li><strong>WAN outage:<\/strong> edge keeps running and inferring; metadata/clips buffer locally<\/li><\/ul>\n<p>(bounded, drop oldest non-critical) and flush when the bus reconnects.<\/p>\n<ul><li><strong>Memory:<\/strong> every queue bounded, GPU surfaces released per iteration, 24–72h soak<\/li><\/ul>\n<p>test proving flat memory.<\/p>\n<ul><li><strong>Observability:<\/strong> per-camera fps/freshness/queue-depth health endpoint +<\/li><\/ul>\n<p>Prometheus; alert when a camera is down &gt; threshold.<\/p>\n<h2 id=\"6-scaling-evolution\">6. Scaling &amp; evolution<\/h2>\n<ul><li>Add cameras → add edge nodes (horizontal). Cloud scales separately.<\/li><li>New model → version via Triton (cloud) or rebuild TRT engine + canary one edge<\/li><\/ul>\n<p>node first.<\/p>\n<ul><li>Multi-site → same edge node template per site, central cloud aggregation.<\/li><\/ul>\n<h2 id=\"the-30-second-summary-if-they-want-it-short\">The 30-second summary (if they want it short)<\/h2>\n<p>\"Decode on NVDEC, batch many cameras through one INT8 TensorRT engine via DeepStream at the edge, keep frames on the GPU, emit only metadata to a message bus, and do state/UI/retraining in the cloud. Each camera is an isolated, watchdogged, auto-reconnecting worker under a supervisor, with bounded buffers and graceful degradation — so a camera or WAN failure self-heals and never takes the system down.\"<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"curveballs.md\" href=\"#\">curveballs.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"1-clarify-state-assumptions","text":"1. Clarify (state assumptions)"},{"level":2,"id":"2-capacity-estimate","text":"2. Capacity estimate"},{"level":2,"id":"3-architecture","text":"3. Architecture"},{"level":2,"id":"4-latency-budget","text":"4. Latency budget"},{"level":2,"id":"5-crash-proof-the-part-theyre-really-testing","text":"5. Crash-proof (the part they're really testing)"},{"level":2,"id":"6-scaling-evolution","text":"6. Scaling &amp; evolution"},{"level":2,"id":"the-30-second-summary-if-they-want-it-short","text":"The 30-second summary (if they want it short)"}],"text":"worked example: 50-camera crash-proof pipeline the prompt: \"design a system to run object detection + tracking on 50 rtsp cameras across a warehouse, 24/7, low latency, that recovers from failures without human intervention. edge and cloud.\" this is a full model answer. read it as how to talk , not a script to memorize. 1. clarify (state assumptions) \"i'll assume: 50× 1080p h.264 @ 30fps; given a yolo-class detector; need near-real-time (~100–200ms) detections + persistent track ids for counting/dwell; output is analytics to a db plus a live annotated view for operators; one warehouse site with reliable lan to cameras but possibly flaky wan to cloud; nvidia hardware available (jetson orin / dgpu). tell me if any of that's wrong.\" 2. capacity estimate ingest: 50 × ~4 mbps ≈ 200 mbps on the lan — fine. one dgpu (e.g., with nvdec) can decode dozens of 1080p streams and, with batched int8 trt inference on a small detector, serve many cameras. 50 cams likely needs 1 strong gpu server or 2–4 jetson orin edge boxes (~12–16 cams each). decision: edge-heavy — infer at the edge, send only metadata + event clips to cloud, so wan flakiness and bandwidth aren't in the critical path. 3. architecture edge node (×n, each handles a camera group) ┌─────────────────────────────────────────────────────────────┐ cam1..16 rtsp ─► gstreamer/deepstream: nvv4l2decoder (nvdec) ─► nvstreammux (batch=16) ─► nvinfer (int8 trt detector) ─► nvtracker (ids) ─► pad probe: extract metadata (boxes, ids, ts) │ │ ▼ ▼ local ring buffer of results → local queue recent frames (for clips) │ ▼ local agent: dedup/aggregate, write event clips └───────────────────────────────────┬─────────────────────────┘ │ metadata + clips (small) ▼ message bus (kafka / gcp pub/sub) │ ▼ cloud: stream processor → sql/nosql (events, analytics) ├─ dashboards / alerting ├─ webrtc/fastrtc live annotated view for operators └─ sampled frames → retraining dataset why these choices: edge inference : lowest latency, no full-video egress, survives wan outages. deepstream + nvstreammux batching : many cams per gpu at low latency (sec 02/03). int8 trt engine built on the edge hardware (sec 03): max throughput. metadata-only egress : cheap, private; clips only on events. message bus : decouples edge from cloud; buffers during wan blips. cloud for state/ui/retraining : scales independently of the edge. 4. latency budget \"end to end i'd budget: decode ~few ms (nvdec) → preprocess on gpu → batched inference (the fat slice; tune batch vs p99) → tracking (cheap) → metadata out. target sub-150ms to detection. i'd timestamp each stage, watch p99 and gpu utilization; if util is low but latency high, i'm copy/cpu-bound and i keep frames in gpu memory and move preprocessing onto the gpu.\" 5. crash-proof (the part they're really testing) per-camera isolation: each camera group in its own supervised pipeline/process; nvstreammux configured so one dropped source doesn't stall the batch. blast radius = one camera. camera offline / eos: detected on the gstreamer bus → tear to null, reconnect with exponential backoff + jitter; wait for keyframe. silent freeze: per-camera frame-freshness watchdog → force restart. overload / gpu oom: graceful degradation — shrink batch, drop to every-nth frame, or lower inference resolution before crashing. process crash: supervised by systemd/kubernetes liveness probes (gke) → auto-restart; crash-only design means a fresh worker has clean state. wan outage: edge keeps running and inferring; metadata/clips buffer locally (bounded, drop oldest non-critical) and flush when the bus reconnects. memory: every queue bounded, gpu surfaces released per iteration, 24–72h soak test proving flat memory. observability: per-camera fps/freshness/queue-depth health endpoint + prometheus; alert when a camera is down > threshold. 6. scaling & evolution add cameras → add edge nodes (horizontal). cloud scales separately. new model → version via triton (cloud) or rebuild trt engine + canary one edge node first. multi-site → same edge node template per site, central cloud aggregation. the 30-second summary (if they want it short) \"decode on nvdec, batch many cameras through one int8 tensorrt engine via deepstream at the edge, keep frames on the gpu, emit only metadata to a message bus, and do state/ui/retraining in the cloud. each camera is an isolated, watchdogged, auto-reconnecting worker under a supervisor, with bounded buffers and graceful degradation — so a camera or wan failure self-heals and never takes the system down.\" → next: curveballs.md","words":705},{"path":"06-system-design/curveballs.md","title":"Curveballs","section":"6 · System Design","quiz":false,"accent":"#34ad7c","html":"<h1 id=\"design-curveballs-the-follow-ups\">Design Curveballs (The Follow-Ups)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> After your main answer, they pile on constraints to see how you adapt. Here are the common ones with crisp directions. The meta-move: restate the new constraint, name the tradeoff it forces, adjust one part of the design.<\/div><\/div>\n<h2 id=\"now-make-it-500-cameras\">\"Now make it 500 cameras.\"<\/h2>\n<p>Horizontal scale: more edge nodes (camera groups of 12–16 each), unchanged per-node design. Cloud aggregation scales out (partitioned Kafka topics, sharded DB). The edge template is the unit of scale — that's why edge-heavy design scales linearly.<\/p>\n<h2 id=\"latency-must-be-under-50ms\">\"Latency must be under 50ms.\"<\/h2>\n<p>Attack the budget: smaller/distilled detector, lower inference resolution, INT8, reduce batch size (less fill-wait) and add more parallel instances/streams, drop B-frames, shrink jitter buffer. Move <em>all<\/em> pre/post to GPU; eliminate CPU round trips. Accept fewer cameras per GPU.<\/p>\n<h2 id=\"the-gpu-keeps-running-out-of-memory\">\"The GPU keeps running out of memory.\"<\/h2>\n<p>Diagnose: count decode buffers + model workspace × instances + batch tensors. Fixes: smaller batch, fewer model instances, lower decode buffer count, INT8 (¼ memory), release surfaces per iteration. Add graceful degradation so OOM-risk sheds load, not crashes.<\/p>\n<h2 id=\"a-camera-sends-corruptedgarbage-frames\">\"A camera sends corrupted/garbage frames.\"<\/h2>\n<p>Validate frames (resolution/format sanity, decode errors from the bus). Skip bad frames, keep the stream. If persistent, mark camera unhealthy, backoff-reconnect, alert. Never let one malformed stream segfault the shared pipeline — isolation + input validation.<\/p>\n<h2 id=\"cloud-connection-drops-for-an-hour\">\"Cloud connection drops for an hour.\"<\/h2>\n<p>Edge keeps inferring (that's the point of edge inference). Buffer metadata/clips locally in a bounded store (drop oldest non-critical first), flush on reconnect. Critical alerts get a local fallback path (on-site siren/log). System degrades, not dies.<\/p>\n<h2 id=\"how-do-you-deploy-a-new-model-with-zero-downtime\">\"How do you deploy a new model with zero downtime?\"<\/h2>\n<p>Canary: build/validate the new TRT engine, roll it to one edge node, compare detections/metrics against the old, then progressive rollout. Cloud models via Triton version hot-swap. Keep the old engine to roll back instantly.<\/p>\n<h2 id=\"how-do-you-know-its-actually-working-in-production\">\"How do you know it's actually working in production?\"<\/h2>\n<p>Observability: per-camera fps/freshness, queue depths, p99 latency, GPU util, detection-rate anomalies (a camera that suddenly detects nothing may be mispointed/frozen). Health endpoint + Prometheus + alerts. \"You can't operate what you can't see\" — ties to your benchmarking/measurement ethos.<\/p>\n<h2 id=\"detections-look-wrong-on-some-cameras\">\"Detections look wrong on some cameras.\"<\/h2>\n<p>Could be: domain shift (lighting/angle differs from training), wrong calibration, resolution mismatch in preprocessing, or quantization accuracy drop. Diagnose by isolating: check raw frames, check preprocessing, A/B FP16 vs INT8, error-analyze by camera. (Your model-eval + error-analysis background.)<\/p>\n<h2 id=\"edge-vs-cloud-inference-defend-your-choice\">\"Edge vs cloud inference — defend your choice.\"<\/h2>\n<p>Edge: lowest latency, no video egress, privacy, survives WAN loss — but limited compute, harder to update, per-site hardware cost. Cloud: elastic compute, easy updates, central management — but latency, bandwidth/egress cost, WAN dependency. Most real systems: <strong>infer at edge, manage/aggregate/retrain in cloud<\/strong> (what you'd propose).<\/p>\n<h2 id=\"the-meta-pattern-for-any-curveball\">The meta-pattern fo

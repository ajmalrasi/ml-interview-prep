t's neighborhood as a vector invariant to<\/li><\/ol>\n<p>scale/rotation/lighting.<\/p>\n<ol><li><strong>Match<\/strong> — compare descriptors across images (nearest neighbor + Lowe's ratio<\/li><\/ol>\n<p>test to drop ambiguous matches).<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Detector/Descriptor<\/th><th>Type<\/th><th>Notes<\/th><\/tr><\/thead><tbody><tr><td><strong>SIFT<\/strong><\/td><td>float (128-d)<\/td><td>scale+rotation invariant, accurate, slower; now patent-free<\/td><\/tr><tr><td><strong>SURF<\/strong><\/td><td>float<\/td><td>faster SIFT approximation; was patented<\/td><\/tr><tr><td><strong>ORB<\/strong><\/td><td>binary (256-bit)<\/td><td>FAST + BRIEF, <strong>free, real-time<\/strong>, great on edge/ARM<\/td><\/tr><\/tbody><\/table><\/div>\n<ul><li><strong>Float descriptors (SIFT)<\/strong> → match with L2 distance.<\/li><li><strong>Binary descriptors (ORB)<\/strong> → match with <strong>Hamming distance<\/strong> (super fast). ORB<\/li><\/ul>\n<p>is the go-to when you need real-time on constrained hardware (your ARM/Jetson   world).<\/p>\n<h2 id=\"ransac-the-robust-fitting-workhorse\">RANSAC (the robust-fitting workhorse)<\/h2>\n<p>Matches contain wrong pairs (outliers). RANSAC: randomly pick the minimal sample (4 points for a homography), fit the model, count inliers (matches that agree), repeat, keep the best. Result: a transform fit on the <em>good<\/em> matches, ignoring outliers. You cite this for homography/fundamental-matrix estimation.<\/p>\n<h2 id=\"epipolar-geometry-two-views\">Epipolar geometry (two views)<\/h2>\n<p>When two cameras see the same scene:<\/p>\n<ul><li><strong>Fundamental matrix (F):<\/strong> relates corresponding points across two <strong>uncalibrated<\/strong><\/li><\/ul>\n<p>views: <code>x'ᵀ F x = 0<\/code>. A point in one image constrains its match to a <strong>line<\/strong>   (the epipolar line) in the other — turns 2D search into 1D.<\/p>\n<ul><li><strong>Essential matrix (E):<\/strong> same idea for <strong>calibrated<\/strong> cameras (<code>E = Kᵀ F K<\/code>); you<\/li><\/ul>\n<p>can decompose E into relative <strong>R, t<\/strong> between cameras → recover camera motion.<\/p>\n<ul><li><strong>Triangulation:<\/strong> with two known camera poses + a matched point, intersect the<\/li><\/ul>\n<p>rays to get the <strong>3D<\/strong> position. Basis of stereo depth / structure-from-motion.<\/p>\n<h2 id=\"where-this-shows-up-in-the-role\">Where this shows up in the role<\/h2>\n<p>Less day-to-day than tracking math, but it's the classical foundation interviewers test for \"do they really know CV.\" Realistic uses: registering/stitching camera views, initializing or validating tracks, stereo/depth, and the geometric reasoning behind multi-camera setups.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>SIFT vs ORB?<\/strong> SIFT = more accurate, scale/rotation invariant, float descriptor, heavier. ORB = binary, free, real-time, Hamming-matchable — the practical choice on edge/ARM (your hardware). Use SIFT when accuracy dominates and compute is available; ORB for real-time/embedded.<\/p>\n<p><strong>L2 vs Hamming distance for matching?<\/strong> Float descriptors (SIFT/SURF) compare with L2 (Euclidean). Binary descriptors (ORB/ BRIEF) compare with Hamming (count differing bits) — a couple of XOR+popcount ops, extremely fast. Match the metric to the descriptor type.<\/p>\n<p><strong>Fundamental vs essential matrix?<\/strong> Fundamental works with <em>uncalibrated<\/em> cameras (pixels). Essential needs <em>calibrated<\/em> cameras (it folds in K) and, unlike F, can be decomposed into relative rotation + translation. Calibrated → essential (you get motion); uncalibrated → fundamental.<\/p>\n<p><strong>Why RANSAC instead of least-squares on all matches?<\/strong> Least squares is wrecked by outliers (one bad match skews the whole fit). RANSAC fits on random minimal samples and keeps the model with the most inliers, so it's robust to the wrong matches that always exist. Essential whenever data has outliers.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"detection-tracking-math.md\" href=\"#\">detection-tracking-math.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-corners-not-edges-or-flat-areas","text":"Why corners, not edges or flat areas"},{"level":2,"id":"detect-describe-match","text":"Detect → Describe → Match"},{"level":2,"id":"ransac-the-robust-fitting-workhorse","text":"RANSAC (the robust-fitting workhorse)"},{"level":2,"id":"epipolar-geometry-two-views","text":"Epipolar geometry (two views)"},{"level":2,"id":"where-this-shows-up-in-the-role","text":"Where this shows up in the role"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"features, matching & epipolar geometry tl;dr: a feature is a distinctive, repeatable point (a corner, not a flat wall). you detect keypoints, describe them as vectors, then match descriptors across images to find correspondences. because matches are noisy, ransac robustly fits the transform (homography / fundamental matrix) while ignoring outliers. this underpins stitching, tracking init, and multi-view geometry — all on your resume (sift/surf/orb, ransac, fundamental/essential matrix). why corners, not edges or flat areas a flat patch looks like every other flat patch — you can't localize it. an edge is ambiguous along the edge. a corner is unique in both directions → repeatable and matchable. that's the harris corner intuition: large intensity change in all directions. detect → describe → match detect keypoints — find corners/blobs (harris, fast, dog). describe — encode each keypoint's neighborhood as a vector invariant to scale/rotation/lighting. match — compare descriptors across images (nearest neighbor + lowe's ratio test to drop ambiguous matches). detector/descriptor type notes sift float (128-d) scale+rotation invariant, accurate, slower; now patent-free surf float faster sift approximation; was patented orb binary (256-bit) fast + brief, free, real-time , great on edge/arm float descriptors (sift) → match with l2 distance. binary descriptors (orb) → match with hamming distance (super fast). orb is the go-to when you need real-time on constrained hardware (your arm/jetson world). ransac (the robust-fitting workhorse) matches contain wrong pairs (outliers). ransac: randomly pick the minimal sample (4 points for a homography), fit the model, count inliers (matches that agree), repeat, keep the best. result: a transform fit on the good matches, ignoring outliers. you cite this for homography/fundamental-matrix estimation. epipolar geometry (two views) when two cameras see the same scene: fundamental matrix (f): relates corresponding points across two uncalibrated views: x'ᵀ f x = 0 . a point in one image constrains its match to a line (the epipolar line) in the other — turns 2d search into 1d. essential matrix (e): same idea for calibrated cameras ( e = kᵀ f k ); you can decompose e into relative r, t between cameras → recover camera motion. triangulation: with two known camera poses + a matched point, intersect the rays to get the 3d position. basis of stereo depth / structure-from-motion. where this shows up in the role less day-to-day than tracking math, but it's the classical foundation interviewers test for \"do they really know cv.\" realistic uses: registering/stitching camera views, initializing or validating tracks, stereo/depth, and the geometric reasoning behind multi-camera setups. why x over y sift vs orb? sift = more accurate, scale/rotation invariant, float descriptor, heavier. orb = binary, free, real-time, hamming-matchable — the practical choice on edge/arm (your hardware). use sift when accuracy dominates and compute is available; orb for real-time/embedded. l2 vs hamming distance for matching? float descriptors (sift/surf) compare with l2 (euclidean). binary descriptors (orb/ brief) compare with hamming (count differing bits) — a couple of xor+popcount ops, extremely fast. match the metric to the descriptor type. fundamental vs essential matrix? fundamental works with uncalibrated cameras (pixels). essential needs calibrated cameras (it folds in k) and, unlike f, can be decomposed into relative rotation + translation. calibrated → essential (you get motion); uncalibrated → fundamental. why ransac instead of least-squares on all matches? least squares is wrecked by outliers (one bad match skews the whole fit). ransac fits on random minimal samples and keeps the model with the most inliers, so it's robust to the wrong matches that always exist. essential whenever data has outliers. → next: detection-tracking-math.md","words":585},{"path":"09-computer-vision-fundamentals/detection-tracking-math.md","title":"Detection & Tracking Math","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"detection-tracking-math\">Detection &amp; Tracking Math<\/h1>\n<p><strong>TL;DR:<\/strong> The role <em>integrates<\/em> models, so you must know the math <em>around<\/em> them: <strong>IoU<\/strong> (box overlap), <strong>NMS<\/strong> (dedupe overlapping detections), <strong>anchors<\/strong> (how detectors propose boxes), <strong>mAP<\/strong> (how accuracy is scored), and <strong>trackers<\/strong> (Kalman for motion, IoU/Hungarian for association, DeepSORT for appearance). This is the math you put <em>on top of<\/em> the ML team's models.<\/p>\n<h2 id=\"iou-intersection-over-union\">IoU — Intersection over Union<\/h2>\n<p>The fundamental box-overlap metric:<\/p>\n<pre><code>IoU = area(A ∩ B) / area(A ∪ B)     # 0 = no overlap, 1 = identical<\/code><\/pre>\n<p>Used everywhere: NMS, matching detections to ground truth (mAP), and associating detections to tracks frame-to-frame.<\/p>\n<h2 id=\"nms-non-maximum-suppression\">NMS — Non-Maximum Suppression<\/h2>\n<p>Detectors output many overlapping boxes for one object. NMS keeps the best:<\/p>\n<ol><li>Sort boxes by confidence.<\/li><li>Take the highest; remove all others with IoU &gt; threshold (e.g., 0.5) against it.<\/li><li>Repeat with the next remaining box.<\/li><\/ol>\n<p>Result: one box per object. <strong>Soft-NMS<\/strong> decays scores instead of hard-removing (better for crowded scenes). NMS runs every frame — do it on GPU at scale (sec 03).<\/p>\n<h2 id=\"anchors-detection-heads-quick-model-literacy\">Anchors &amp; detection heads (quick model literacy)<\/h2>\n<ul><li><strong>Anchor boxes:<\/strong> predefined box shapes/scales at each location; the model<\/li><\/ul>\n<p>predicts offsets from anchors + class + objectness. (Faster R-CNN, SSD, older   YOLO.)<\/p>\n<ul><li><strong>Anchor-free:<\/strong> predict box centers/extents directly (FCOS, newer YOLO/CenterNet)<\/li><\/ul>\n<p>— fewer hyperparameters.<\/p>\n<ul><li><strong>YOLO:<\/strong> single-shot, grid-based, real-time — the standard for live video. Know<\/li><\/ul>\n<p>it's one forward pass → fast, which is why it dominates streaming inference.<\/p>\n<h2 id=\"map-mean-average-precision-how-detection-is-scored\">mAP — mean Average Precision (how detection is scored)<\/h2>\n<ul><li><strong>Precision<\/strong> = TP / (TP+FP) — of what I flagged, how much was right.<\/li><li><strong>Recall<\/strong> = TP / (TP+FN) — of what existed, how much I caught.<\/li><li>A detection is a TP if IoU with ground truth ≥ threshold (e.g., 0.5).<\/li><li><strong>AP<\/strong> = area under the precision–recall curve for one class; <strong>mAP<\/strong> = mean over<\/li><\/ul>\n<p>classes. <code>mAP@0.5<\/code> (one threshold) vs <code>mAP@[.5:.95]<\/code> (averaged over thresholds,   the COCO metric). This is your model-eval vocabulary — own it.<\/p>\n<h2 id=\"tracking-detection-identity-over-time\">Tracking: detection → identity over time<\/h2>\n<p>Detection finds objects per frame; <strong>tracking<\/strong> keeps the <em>same ID<\/em> across frames (needed for counting, dwell time, line-crossing). Tracking-by-detection loop:<\/p>\n<ol><li><strong>Predict<\/strong> where each existing track will be (motion model).<\/li><li><strong>Associate<\/strong> new detections to predicted tracks (similarity → assignment).<\/li><li><strong>Update<\/strong> matched tracks; spawn new ones; kill stale ones.<\/li><\/ol>\n<h3 id=\"the-building-blocks\">The building blocks<\/h3>\n<ul><li><strong>Kalman filter<\/strong> — predicts an object's next position/velocity and smooths noisy<\/li><\/ul>\n<p>detections. The motion model in SORT/DeepSORT. Intuition: \"where will it be next   frame, and how confident am I.\"<\/p>\n<ul><li><strong>Hungarian algorithm<\/strong> — optimal assignment of detections↔tracks given a cost<\/li><\/ul>\n<p>matrix (e.g., 1−IoU, or appearance distance). Solves \"which detection is which   track\" in one shot.<\/p>\n<ul><li><strong>SORT<\/strong> — Kalman + Hungarian on <strong>IoU<\/strong>. Fast, but loses IDs through occlusions<\/li><\/ul>\n<p>(ID switches).<\/p>\n<ul><li><strong>DeepSORT<\/strong> — SORT + an <strong>appearance embedding<\/strong> (a re-ID feature per object), so<\/li><\/ul>\n<p>it re-identifies objects after occlusion → far fewer ID switches. (You built a   custom tracker beating SORT — strong story.)<\/p>\n<ul><li><strong>ByteTrack<\/strong> — also associates <em>low<\/em>-confidence detections, recovering occluded<\/li><\/ul>\n<p>objects without a heavy appearance model; strong modern baseline.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>SORT vs DeepSORT?<\/strong> SORT = Kalman + IoU + Hungarian: fast, light, but drops IDs through occlusion. DeepSORT adds an appearance embedding so it re-IDs after occlusion → fewer ID switches at extra compute. Crowded/occluded scenes → DeepSORT (or ByteTrack); simple fast scenes → SORT.<\/p>\n<p><strong>IoU-based vs appearance-based association?<\/strong> IoU association is cheap and works when objects move little between frames. Appearance (re-ID embeddings) survives occlusion and large motion but costs an extra model. Combine them: IoU first, appearance to recover the hard cases.<\/p>\n<p><strong>Hard-NMS vs Soft-NMS?<\/strong> Hard-NMS removes overlapping boxes outright — can delete a real object in a crowd. Soft-NMS decays their scores instead, preserving nearby true objects → better in dense scenes, slightly more tuning.<\/p>\n<p><strong>Why is YOLO the default for live video?<\/strong> One forward pass per frame (single-shot) → real-time throughput, unlike two-stage detectors (region proposal + classify) that are more accurate but slower. For streaming, latency wins → YOLO-class models.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"logic-on-detections.md\" href=\"#\">logic-on-detections.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"iou-intersection-over-union","text":"IoU — Intersection over Union"},{"level":2,"id":"nms-non-maximum-suppression","text":"NMS — Non-Maximum Suppression"},{"level":2,"id":"anchors-detection-heads-quick-model-literacy","text":"Anchors &amp; detection heads (quick model literacy)"},{"level":2,"id":"map-mean-average-precision-how-detection-is-scored","text":"mAP — mean Average Precision (how detection is scored)"},{"level":2,"id":"tracking-detection-identity-over-time","text":"Tracking: detection → identity over time"},{"level":3,"id":"the-building-blocks","text":"The building blocks"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"detection & tracking math tl;dr: the role integrates models, so you must know the math around them: iou (box overlap), nms (dedupe overlapping detections), anchors (how detectors propose boxes), map (how accuracy is scored), and trackers (kalman for motion, iou/hungarian for association, deepsort for appearance). this is the math you put on top of the ml team's models. iou — intersection over union the fundamental box-overlap metric: iou = area(a ∩ b) / area(a ∪ b) # 0 = no overlap, 1 = identical used everywhere: nms, matching detections to ground truth (map), and associating detections to tracks frame-to-frame. nms — non-maximum suppression detectors output many overlapping boxes for one object. nms keeps the best: sort boxes by confidence. take the highest; remove all others with iou > threshold (e.g., 0.5) against it. repeat with the next remaining box. result: one box per object. soft-nms decays scores instead of hard-removing (better for crowded scenes). nms runs every frame — do it on gpu at scale (sec 03). anchors & detection heads (quick model literacy) anchor boxes: predefined box shapes/scales at each location; the model predicts offsets from anchors + class + objectness. (faster r-cnn, ssd, older yolo.) anchor-free: predict box centers/extents directly (fcos, newer yolo/centernet) — fewer hyperparameters. yolo: single-shot, grid-based, real-time — the standard for live video. know it's one forward pass → fast, which is why it dominates streaming inference. map — mean average precision (how detection is scored) precision = tp / (tp+fp) — of what i flagged, how much was right. recall = tp / (tp+fn) — of what existed, how much i caught. a detection is a tp if iou with ground truth ≥ threshold (e.g., 0.5). ap = area under the precision–recall curve for one class; map = mean over classes. map@0.5 (one threshold) vs map@[.5:.95] (averaged over thresholds, the coco metric). this is your model-eval vocabulary — own it. tracking: detection → identity over time detection finds objects per frame; tracking keeps the same id across frames (needed for counting, dwell time, line-crossing). tracking-by-detection loop: predict where each existing track will be (motion model). associate new detections to predicted tracks (similarity → assignment). update matched tracks; spawn new ones; kill stale ones. the building blocks kalman filter — predicts an object's next position/velocity and smooths noisy detections. the motion model in sort/deepsort. intuition: \"where will it be next frame, and how confident am i.\" hungarian algorithm — optimal assignment of detections↔tracks given a cost matrix (e.g., 1−iou, or appearance distance). solves \"which detection is which track\" in one shot. sort — kalman + hungarian on iou . fast, but loses ids through occlusions (id switches). deepsort — sort + an appearance embedding (a re-id feature per object), so it re-identifies objects after occlusion → far fewer id switches. (you built a custom tracker beating sort — strong story.) bytetrack — also associates low -confidence detections, recovering occluded objects without a heavy appearance model; strong modern baseline. why x over y sort vs deepsort? sort = kalman + iou + hungarian: fast, light, but drops ids through occlusion. deepsort adds an appearance embedding so it re-ids after occlusion → fewer id switches at extra compute. crowded/occluded scenes → deepsort (or bytetrack); simple fast scenes → sort. iou-based vs appearance-based association? iou association is cheap and works when objects move little between frames. appearance (re-id embeddings) survives occlusion and large motion but costs an extra model. combine them: iou first, appearance to recover the hard cases. hard-nms vs soft-nms? hard-nms removes overlapping boxes outright — can delete a real object in a crowd. soft-nms decays their scores instead, preserving nearby true objects → better in dense scenes, slightly more tuning. why is yolo the default for live video? one forward pass per frame (single-shot) → real-time throughput, unlike two-stage detectors (region proposal + classify) that are more accurate but slower. for streaming, latency wins → yolo-class models. → next: logic-on-detections.md","words":655},{"path":"09-computer-vision-fundamentals/logic-on-detections.md","title":"Logic on Detections","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"logic-layers-on-top-of-detections\">Logic Layers on Top of Detections<\/h1>\n<p><strong>TL;DR:<\/strong> This is the JD's standout CV phrase: <em>\"command over geometry and statistics for designing complex logic layers on top of model detections.\"<\/em> The model gives you boxes; <em>you<\/em> turn boxes into business meaning — zones, counting, dwell time, line-crossing, real-world coordinates. It's geometry + a little statistics, and it's the CV topic most likely to go deep because it's where CV meets systems. <strong>Prepare to whiteboard one of these.<\/strong><\/p>\n<h2 id=\"the-pattern\">The pattern<\/h2>\n<pre><code>model detections (boxes + classes + track IDs)\n        │\n        ▼\n geometry: which zone? crossed which line? where on the floor?\n        │\n        ▼\n statistics/temporal: count, dwell time, rate, smoothing, dedupe\n        │\n        ▼\n events: \"3 forklifts in bay 2 for &gt;5 min\", \"pallet crossed dock line\"<\/code><\/pre>\n<h2 id=\"core-geometric-primitives\">Core geometric primitives<\/h2>\n<ul><li><strong>Point-in-polygon<\/strong> — is an object inside a defined zone? Use the object's<\/li><\/ul>\n<p><em>anchor point<\/em> (usually bottom-center of the box = where it touches the floor),   not the box center. Ray-casting / <code>cv2.pointPolygonTest<\/code>.<\/p>\n<ul><li><strong>Line-crossing<\/strong> — did the object's track cross a virtual line (and in which<\/li><\/ul>\n<p>direction)? Check the sign of the cross product of the line vs the track segment   between consecutive frames; a sign flip = a crossing. Direction → in vs out.<\/p>\n<ul><li><strong>Distance / proximity<\/strong> — but <strong>in what space?<\/strong> Pixel distance is meaningless<\/li><\/ul>\n<p>(objects far from the camera look smaller). Convert foot points to the <strong>ground   plane via a homography<\/strong> (sec geometry/calibration), then measure in meters.<\/p>\n<ul><li><strong>ROI gating<\/strong> — only run logic for detections inside a region (the loading bay),<\/li><\/ul>\n<p>ignore the rest → cheaper and fewer false events.<\/p>\n<h2 id=\"counting-dwell-where-statistics-enters\">Counting &amp; dwell (where statistics enters)<\/h2>\n<ul><li><strong>Counting<\/strong> needs <strong>tracking<\/strong>, not just detection — otherwise you recount the<\/li><\/ul>\n<p>same object every frame. Count unique track IDs that cross the line.<\/p>\n<ul><li><strong>Dwell time<\/strong> = (last_seen − first_seen) for a track inside a zone.<\/li><li><strong>Temporal smoothing / debouncing<\/strong> — a detection flickers (present frame N, gone<\/li><\/ul>\n<p>N+1). Require K-of-N frames before firing an event so noise doesn't create false   counts. This is the statistics the JD means: rates, thresholds, smoothing, outlier   rejection over time.<\/p>\n<ul><li><strong>Hysteresis<\/strong> — different thresholds to <em>enter<\/em> vs <em>exit<\/em> a state, so an object<\/li><\/ul>\n<p>hovering on a boundary doesn't spam events.<\/p>\n<h2 id=\"worked-example-great-whiteboard-answer\">Worked example (great whiteboard answer)<\/h2>\n<p><em>\"Count forklifts entering a loading bay and flag any staying &gt;10 min.\"<\/em><\/p>\n<ol><li>Detect + track forklifts (YOLO + DeepSORT) → boxes with stable IDs.<\/li><li>Define the bay as a polygon (in image space, or on the ground plane).<\/li><li>For each track, take the bottom-center point; point-in-polygon test → inside?<\/li><li>Debounce: require the track inside for K consecutive frames before \"entered\"<\/li><\/ol>\n<p>(reject flicker).<\/p>\n<ol><li>Record <code>first_seen<\/code> per track in the zone; dwell = now − first_seen.<\/li><li>Fire \"entered\" on a line-cross/zone-enter (dedup by track ID so each forklift<\/li><\/ol>\n<p>counts once); fire \"overstay\" when dwell &gt; 10 min.<\/p>\n<ol><li>Emit events as metadata to the message bus (sec 06) — no full-frame egress.<\/li><\/ol>\n<p>That answer shows geometry (polygon, ground plane), statistics (debounce, dwell), tracking literacy, <em>and<\/em> the systems instinct (metadata out). It's the bullseye for this role.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Box center vs bottom-center for zone tests?<\/strong> Use bottom-center — it approximates where the object touches the floor, which is what zones are defined on. Box center sits in mid-air and misreads zone membership, especially for tall objects or oblique cameras.<\/p>\n<p><strong>Pixel distance vs ground-plane distance?<\/strong> Pixel distance is distorted by perspective (far objects look closer together). Map foot points to the ground plane via a homography and measure in real-world units — the only way distance/zone logic is correct across the frame.<\/p>\n<p><strong>Why debounce/smooth instead of acting on every frame?<\/strong> Per-frame detections flicker and jitter; acting raw produces false counts and event spam. Requiring K-of-N frames (and hysteresis on enter/exit) trades a few ms of latency for robust, trustworthy events — exactly the \"statistics layer\" the JD wants.<\/p>\n<p><strong>Why count track IDs, not detections?<\/strong> Detection fires every frame, so counting detections counts the same object hundreds of times. Counting unique track IDs (that cross a line / enter a zone) counts objects once — tracking is what makes counting correct.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Quick refresh: <strong><a class=\"mdlink\" data-href=\"cv-cheat-sheet.md\" href=\"#\">cv-cheat-sheet.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-pattern","text":"The pattern"},{"level":2,"id":"core-geometric-primitives","text":"Core geometric primitives"},{"level":2,"id":"counting-dwell-where-statistics-enters","text":"Counting &amp; dwell (where statistics enters)"},{"level":2,"id":"worked-example-great-whiteboard-answer","text":"Worked example (great whiteboard answer)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"logic layers on top of detections tl;dr: this is the jd's standout cv phrase: \"command over geometry and statistics for designing complex logic layers on top of model detections.\" the model gives you boxes; you turn boxes into business meaning — zones, counting, dwell time, line-crossing, real-world coordinates. it's geometry + a little statistics, and it's the cv topic most likely to go deep because it's where cv meets systems. prepare to whiteboard one of these. the pattern model detections (boxes + classes + track ids) │ ▼ geometry: which zone? crossed which line? where on the floor? │ ▼ statistics/temporal: count, dwell time, rate, smoothing, dedupe │ ▼ events: \"3 forklifts in bay 2 for >5 min\", \"pallet crossed dock line\" core geometric primitives point-in-polygon — is an object inside a defined zone? use the object's anchor point (usually bottom-center of the box = where it touches the floor), not the box center. ray-casting / cv2.pointpolygontest . line-crossing — did the object's track cross a virtual line (and in which direction)? check the sign of the cross product of the line vs the track segment between consecutive frames; a sign flip = a crossing. direction → in vs out. distance / proximity — but in what space? pixel distance is meaningless (objects far from the camera look smaller). convert foot points to the ground plane via a homography (sec geometry/calibration), then measure in meters. roi gating — only run logic for detections inside a region (the loading bay), ignore the rest → cheaper and fewer false events. counting & dwell (where statistics enters) counting needs tracking , not just detection — otherwise you recount the same object every frame. count unique track ids that cross the line. dwell time = (last_seen − first_seen) for a track inside a zone. temporal smoothing / debouncing — a detection flickers (present frame n, gone n+1). require k-of-n frames before firing an event so noise doesn't create false counts. this is the statistics the jd means: rates, thresholds, smoothing, outlier rejection over time. hysteresis — different thresholds to enter vs exit a state, so an object hovering on a boundary doesn't spam events. worked example (great whiteboard answer) \"count forklifts entering a loading bay and flag any staying >10 min.\" detect + track forklifts (yolo + deepsort) → boxes with stable ids. define the bay as a polygon (in image space, or on the ground plane). for each track, take the bottom-center point; point-in-polygon test → inside? debounce: require the track inside for k consecutive frames before \"entered\" (reject flicker). record first_seen per track in the zone; dwell = now − first_seen. fire \"entered\" on a line-cross/zone-enter (dedup by track id so each forklift counts once); fire \"overstay\" when dwell > 10 min. emit events as metadata to the message bus (sec 06) — no full-frame egress. that answer shows geometry (polygon, ground plane), statistics (debounce, dwell), tracking literacy, and the systems instinct (metadata out). it's the bullseye for this role. why x over y box center vs bottom-center for zone tests? use bottom-center — it approximates where the object touches the floor, which is what zones are defined on. box center sits in mid-air and misreads zone membership, especially for tall objects or oblique cameras. pixel distance vs ground-plane distance? pixel distance is distorted by perspective (far objects look closer together). map foot points to the ground plane via a homography and measure in real-world units — the only way distance/zone logic is correct across the frame. why debounce/smooth instead of acting on every frame? per-frame detections flicker and jitter; acting raw produces false counts and event spam. requiring k-of-n frames (and hysteresis on enter/exit) trades a few ms of latency for robust, trustworthy events — exactly the \"statistics layer\" the jd wants. why count track ids, not detections? detection fires every frame, so counting detections counts the same object hundreds of times. counting unique track ids (that cross a line / enter a zone) counts objects once — tracking is what makes counting correct. → back to section readme · quick refresh: cv-cheat-sheet.md","words":682},{"path":"09-computer-vision-fundamentals/cv-cheat-sheet.md","title":"CV Cheat Sheet","section":"9 · CV Fundamentals","quiz":false,"html":"<h1 id=\"cv-fundamentals-quick-refresh\">CV Fundamentals — Quick Refresh<\/h1>\n<p>One page for the classical-CV questions. Depth in the section files.<\/p>\n<hr>\n<h2 id=\"images-color\">Images &amp; color<\/h2>\n<ul><li>Image = numpy array <code>(H, W, C)<\/code>, usually <code>uint8<\/code> 0–255. Pixel ops = array slicing.<\/li><li><strong>OpenCV is BGR<\/strong>, most models want <strong>RGB<\/strong> → <code>cv2.cvtColor(..., COLOR_BGR2RGB)<\/code>.<\/li><\/ul>\n<p>Swapped channels = silent accuracy loss.<\/p>\n<ul><li>Decoders output <strong>YUV/NV12<\/strong> → convert to BGR, ideally on GPU (<code>nvvidconv<\/code>).<\/li><li><strong>HSV<\/strong> for color-based segmentation (hue is lighting-robust; RGB isn't).<\/li><\/ul>\n<h2 id=\"filtering-morphology\">Filtering &amp; morphology<\/h2>\n<ul><li>Everything classical = <strong>convolution<\/strong> (slide a kernel, weighted sum). CNN conv =<\/li><\/ul>\n<p>learned kernels.<\/p>\n<ul><li>Blur: <strong>Gaussian<\/strong> (general), <strong>median<\/strong> (salt-and-pepper), <strong>bilateral<\/strong> (smooth<\/li><\/ul>\n<p>but keep edges).<\/p>\n<ul><li>Threshold: <strong>adaptive<\/strong> beats global under uneven lighting; <strong>Otsu<\/strong> for bimodal.<\/li><li>Morphology: <strong>erode<\/strong> shrinks, <strong>dilate<\/strong> grows; <strong>opening<\/strong> removes specks,<\/li><\/ul>\n<p><strong>closing<\/strong> fills holes.<\/p>\n<ul><li>Edges: <strong>Canny<\/strong> = blur → Sobel gradient → non-max suppression → hysteresis<\/li><\/ul>\n<p>threshold (clean thin edges).<\/p>\n<h2 id=\"geometry-transforms\">Geometry &amp; transforms<\/h2>\n<ul><li>Homogeneous coords <code>(x,y,1)<\/code> make translation + projection a matrix multiply.<\/li><li><strong>Affine<\/strong> (2×3, 3 pts) keeps parallel lines: rotate/scale/shear/translate.<\/li><li><strong>Homography<\/strong> (3×3, 4 pts) models <strong>perspective<\/strong> (parallel lines converge) — the<\/li><\/ul>\n<p>transform for surround-view and <strong>mapping detections to the floor plane<\/strong>.<\/p>\n<ul><li>Interpolation: <strong>nearest<\/strong> for label/mask maps, <strong>bilinear<\/strong> for images.<\/li><\/ul>\n<h2 id=\"calibration\">Calibration<\/h2>\n<ul><li><strong>Intrinsics<\/strong> (K: fx,fy,cx,cy) + <strong>distortion<\/strong> (radial k1,k2,k3 / tangential<\/li><\/ul>\n<p>p1,p2); <strong>extrinsics<\/strong> (R,t) = pose in world.<\/p>\n<ul><li>Calibrate with a chessboard at many angles; judge by <strong>reprojection error<\/strong><\/li><\/ul>\n<p>(&lt;0.5px good).<\/p>\n<ul><li><strong>Fisheye<\/strong> needs OpenCV's dedicated model (pinhole leaves edge distortion).<\/li><li>Undistort once via precomputed remap (not <code>undistort<\/code> per frame).<\/li><\/ul>\n<h2 id=\"features-multi-view\">Features &amp; multi-view<\/h2>\n<ul><li>Detect <strong>corners<\/strong> (unique in all directions), describe, match.<\/li><li><strong>SIFT<\/strong> (float, L2, accurate) vs <strong>ORB<\/strong> (binary, Hamming, free, real-time/edge).<\/li><li><strong>RANSAC<\/strong> fits transforms robustly by ignoring outlier matches (4 pts for H).<\/li><li><strong>Fundamental matrix<\/strong> (uncalibrated) / <strong>Essential matrix<\/strong> (calibrated → gives<\/li><\/ul>\n<p>R,t). Epipolar line turns 2D match search into 1D. Triangulate → 3D.<\/p>\n<h2 id=\"detection-tracking-math\">Detection &amp; tracking math<\/h2>\n<ul><li><strong>IoU<\/strong> = overlap / union. <strong>NMS<\/strong> = sort by confidence, drop high-IoU duplicates.<\/li><li><strong>mAP<\/strong> = mean Average Precision; TP if IoU≥thresh. <code>mAP@0.5<\/code> vs COCO <code>@[.5:.95]<\/code>.<\/li><li><strong>YOLO<\/strong> = single forward pass → real-time (default for live video).<\/li><li><strong>Kalman<\/strong> predicts motion; <strong>Hungarian<\/strong> optimally assigns detections↔tracks.<\/li><li><strong>SORT<\/strong> = Kalman+IoU (fast, ID switches); <strong>DeepSORT<\/strong> adds appearance re-ID<\/li><\/ul>\n<p>(survives occlusion); <strong>ByteTrack<\/strong> uses low-conf boxes too.<\/p>\n<h2 id=\"logic-on-detections-the-jds-standout-be-ready-to-whiteboard\">Logic on detections (the JD's standout — be ready to whiteboard)<\/h2>\n<ul><li>Model gives boxes; <strong>you<\/strong> add geometry+stats: zones, counting, dwell, line-cross.<\/li><li><strong>Point-in-polygon<\/strong> with the box's <strong>bottom-center<\/strong> (where it meets the floor).<\/li><li><strong>Line-crossing<\/strong> via sign flip of cross product between frames → direction.<\/li><li>Real distance = map foot point to <strong>ground plane via homography<\/strong>, measure in<\/li><\/ul>\n<p>meters (pixels lie under perspective).<\/p>\n<ul><li><strong>Count unique track IDs<\/strong>, not detections. <strong>Debounce<\/strong> (K-of-N frames) +<\/li><\/ul>\n<p>hysteresis to kill flicker → trustworthy events.<\/p>\n<h2 id=\"your-cv-credibility-lines\">Your CV credibility lines<\/h2>\n<ul><li>Surround-view: fisheye undistort → perspective project to bird's-eye → stitch →<\/li><\/ul>\n<p>photometric blend.<\/p>\n<ul><li>Custom pedestrian tracker beating SORT on ARM. INT8/FP16 on Jetson. RANSAC,<\/li><\/ul>\n<p>SIFT/ORB, essential/fundamental matrix — all hands-on.<\/p>\n<p>→ Full detail: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"images-color","text":"Images &amp; color"},{"level":2,"id":"filtering-morphology","text":"Filtering &amp; morphology"},{"level":2,"id":"geometry-transforms","text":"Geometry &amp; transforms"},{"level":2,"id":"calibration","text":"Calibration"},{"level":2,"id":"features-multi-view","text":"Features &amp; multi-view"},{"level":2,"id":"detection-tracking-math","text":"Detection &amp; tracking math"},{"level":2,"id":"logic-on-detections-the-jds-standout-be-ready-to-whiteboard","text":"Logic on detections (the JD's standout — be ready to whiteboard)"},{"level":2,"id":"your-cv-credibility-lines","text":"Your CV credibility lines"}],"text":"cv fundamentals — quick refresh one page for the classical-cv questions. depth in the section files. images & color image = numpy array (h, w, c) , usually uint8 0–255. pixel ops = array slicing. opencv is bgr , most models want rgb → cv2.cvtcolor(..., color_bgr2rgb) . swapped channels = silent accuracy loss. decoders output yuv/nv12 → convert to bgr, ideally on gpu ( nvvidconv ). hsv for color-based segmentation (hue is lighting-robust; rgb isn't). filtering & morphology everything classical = convolution (slide a kernel, weighted sum). cnn conv = learned kernels. blur: gaussian (general), median (salt-and-pepper), bilateral (smooth but keep edges). threshold: adaptive beats global under uneven lighting; otsu for bimodal. morphology: erode shrinks, dilate grows; opening removes specks, closing fills holes. edges: canny = blur → sobel gradient → non-max suppression → hysteresis threshold (clean thin edges). geometry & transforms homogeneous coords (x,y,1) make translation + projection a matrix multiply. affine (2×3, 3 pts) keeps parallel lines: rotate/scale/shear/translate. homography (3×3, 4 pts) models perspective (parallel lines converge) — the transform for surround-view and mapping detections to the floor plane . interpolation: nearest for label/mask maps, bilinear for images. calibration intrinsics (k: fx,fy,cx,cy) + distortion (radial k1,k2,k3 / tangential p1,p2); extrinsics (r,t) = pose in world. calibrate with a chessboard at many angles; judge by reprojection error (<0.5px good). fisheye needs opencv's dedicated model (pinhole leaves edge distortion). undistort once via precomputed remap (not undistort per frame). features & multi-view detect corners (unique in all directions), describe, match. sift (float, l2, accurate) vs orb (binary, hamming, free, real-time/edge). ransac fits transforms robustly by ignoring outlier matches (4 pts for h). fundamental matrix (uncalibrated) / essential matrix (calibrated → gives r,t). epipolar line turns 2d match search into 1d. triangulate → 3d. detection & tracking math iou = overlap / union. nms = sort by confidence, drop high-iou duplicates. map = mean average precision; tp if iou≥thresh. map@0.5 vs coco @[.5:.95] . yolo = single forward pass → real-time (default for live video). kalman predicts motion; hungarian optimally assigns detections↔tracks. sort = kalman+iou (fast, id switches); deepsort adds appearance re-id (survives occlusion); bytetrack uses low-conf boxes too. logic on detections (the jd's standout — be ready to whiteboard) model gives boxes; you add geometry+stats: zones, counting, dwell, line-cross. point-in-polygon with the box's bottom-center (where it meets the floor). line-crossing via sign flip of cross product between frames → direction. real distance = map foot point to ground plane via homography , measure in meters (pixels lie under perspective). count unique track ids , not detections. debounce (k-of-n frames) + hysteresis to kill flicker → trustworthy events. your cv credibility lines surround-view: fisheye undistort → perspective project to bird's-eye → stitch → photometric blend. custom pedestrian tracker beating sort on arm. int8/fp16 on jetson. ransac, sift/orb, essential/fundamental matrix — all hands-on. → full detail: readme.md","words":474}]};
/* Runtime app — no markdown engine, all content is pre-rendered in DATA. */
const PAGES = DATA.pages;
const byPath = {};
PAGES.forEach(p => byPath[p.path] = p);
let currentPath = null;

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;
  if(/\/$/.test(href)) href += "README.md";
  const base = curPath.split("/").slice(0,-1);
  href.split("/").forEach(p=>{
    if(p==="."||p==="") return;
    if(p==="..") base.pop(); else base.push(p);
  });
  return base.join("/");
}

function buildNav(){
  const nav=document.getElementById("nav");
  DATA.nav.forEach(sec=>{
    const wrap=document.createElement("div"); wrap.className="sec";
    const h=document.createElement("div"); h.className="sec-h"; h.textContent=sec.label;
    wrap.appendChild(h);
    sec.items.forEach(it=>{
      const a=document.createElement("a");
      a.className="item"+(/README\.md$/.test(it.path)&&it.path.indexOf("/")>=0?" sub":"");
      a.textContent=it.title; a.href="#"+encodeURI(it.path);
      a.dataset.path=it.path;
      wrap.appendChild(a);
    });
    nav.appendChild(wrap);
  });
}

function setActive(path){
  document.querySelectorAll("nav a.item").forEach(a=>a.classList.toggle("active", a.dataset.path===path));
  const pg=byPath[path];
  document.getElementById("tbTitle").textContent = pg ? pg.title : "KoiReader Prep";
}

function renderPageTools(pg){
  const host=document.getElementById("pagetools");
  let html="";
  if(pg.quiz){
    html += '<div class="quizbar">'+
      '<button class="qbtn" id="hideAll">Quiz me · hide answers</button>'+
      '<button class="qbtn" id="showAll">Show all</button>'+
      '<span class="hint">Tap a question to reveal its answer.</span></div>';
  }
  if(pg.toc && pg.toc.length>=3){
    html += '<details class="toc"><summary>On this page</summary><ul>'+
      pg.toc.map(t=>'<li><a class="lvl'+t.level+'" data-anchor="'+t.id+'" href="#">'+t.text+'</a></li>').join("")+
      '</ul></details>';
  }
  host.innerHTML=html;
  if(pg.quiz){
    const set=open=>document.querySelectorAll("#content details.qa").forEach(d=>d.open=open);
    const hb=document.getElementById("hideAll"), sb=document.getElementById("showAll");
    if(hb) hb.onclick=()=>set(false);
    if(sb) sb.onclick=()=>set(true);
  }
}

function renderPager(path){
  const idx=PAGES.findIndex(p=>p.path===path);
  const pager=document.getElementById("pager");
  if(idx<0){ pager.innerHTML=""; return; }
  const prev=PAGES[idx-1], next=PAGES[idx+1];
  let html="";
  if(prev) html+='<a href="#'+encodeURI(prev.path)+'"><div class="lbl">← Previous</div><div class="ttl">'+prev.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  if(next) html+='<a class="next" href="#'+encodeURI(next.path)+'"><div class="lbl">Next →</div><div class="ttl">'+next.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  pager.innerHTML=html;
}

function loadPage(path){
  const pg=byPath[path];
  const content=document.getElementById("content");
  if(!pg){ content.innerHTML='<div class="loading">Page not found: '+path+'</div>'; document.getElementById("pagetools").innerHTML=""; document.getElementById("pager").innerHTML=""; return; }
  currentPath=path;
  setActive(path);
  content.innerHTML=pg.html;
  renderPageTools(pg);
  renderPager(path);
  window.scrollTo(0,0);
  closeSidebar();
}

function go(path){ location.hash="#"+encodeURI(path); }
function onHash(){
  let raw=decodeURI(location.hash.replace(/^#/,""));
  loadPage(raw || "README.md");
}

// internal links + TOC anchors
document.addEventListener("click", e=>{
  const anchor=e.target.closest("a[data-anchor]");
  if(anchor){ e.preventDefault(); const el=document.getElementById(anchor.dataset.anchor); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); return; }
  const a=e.target.closest("a.mdlink");
  if(!a) return;
  e.preventDefault();
  const target=resolvePath(currentPath||"README.md", a.getAttribute("data-href"));
  if(target) go(target);
});

/* ---------------------------------- search --------------------------------- */
const searchBox=document.getElementById("search");
const panel=document.getElementById("searchpanel");
let selIndex=-1, results=[];

function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function snippet(text, q){
  const i=text.indexOf(q); if(i<0) return text.slice(0,120)+"…";
  const s=Math.max(0,i-50), e=Math.min(text.length,i+q.length+70);
  let frag=(s>0?"…":"")+text.slice(s,e)+(e<text.length?"…":"");
  return frag.replace(new RegExp(escRe(q),"ig"), m=>"<mark>"+m+"</mark>");
}
function runSearch(){
  const q=searchBox.value.trim().toLowerCase();
  if(q.length<2){ panel.classList.remove("show"); return; }
  results=PAGES.filter(p=>p.text.indexOf(q)>=0 || p.title.toLowerCase().indexOf(q)>=0).slice(0,40);
  selIndex=-1;
  if(!results.length){ panel.innerHTML='<div class="empty">No matches for “'+q+'”.</div>'; panel.classList.add("show"); return; }
  panel.innerHTML=results.map((p,k)=>
    '<a class="sr" data-k="'+k+'" data-path="'+p.path+'" href="#'+encodeURI(p.path)+'">'+
    '<div class="t">'+p.title+' <span style="color:var(--muted);font-weight:400">· '+p.section+'</span></div>'+
    '<div class="c">'+snippet(p.text,q)+'</div></a>').join("");
  panel.classList.add("show");
}
searchBox.addEventListener("input", runSearch);
searchBox.addEventListener("focus", ()=>{ if(searchBox.value.trim().length>=2) runSearch(); });
panel.addEventListener("click", e=>{ const r=e.target.closest(".sr"); if(r){ e.preventDefault(); go(r.dataset.path); closeSearch(); } });
function closeSearch(){ panel.classList.remove("show"); }
document.addEventListener("click", e=>{ if(!panel.contains(e.target) && e.target!==searchBox && !e.target.closest("#searchBtn")) closeSearch(); });
searchBox.addEventListener("keydown", e=>{
  if(!panel.classList.contains("show")) return;
  if(e.key==="ArrowDown"){ e.preventDefault(); selIndex=Math.min(results.length-1,selIndex+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); selIndex=Math.max(0,selIndex-1); }
  else if(e.key==="Enter"){ e.preventDefault(); if(results[selIndex]){ go(results[selIndex].path); closeSearch(); searchBox.blur(); } return; }
  else if(e.key==="Escape"){ closeSearch(); searchBox.blur(); return; }
  panel.querySelectorAll(".sr").forEach((el,i)=>el.classList.toggle("sel", i===selIndex));
  const sel=panel.querySelector(".sr.sel"); if(sel) sel.scrollIntoView({block:"nearest"});
});

/* --------------------------------- theme ----------------------------------- */
function applyTheme(t){ document.documentElement.dataset.theme=t; try{localStorage.setItem("koi-theme",t);}catch(_){} }
function toggleTheme(){ applyTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"); }
document.querySelectorAll(".theme-toggle").forEach(b=>b.addEventListener("click",toggleTheme));
(function(){ let t; try{t=localStorage.getItem("koi-theme");}catch(_){}
  if(!t) t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"; applyTheme(t); })();

/* ----------------------------- mobile drawer ------------------------------- */
const sidebar=document.getElementById("sidebar"), scrim=document.getElementById("scrim");
function openSidebar(){ sidebar.classList.add("open"); scrim.classList.add("show"); }
function closeSidebar(){ sidebar.classList.remove("open"); scrim.classList.remove("show"); }
document.getElementById("menu").addEventListener("click", openSidebar);
document.getElementById("searchBtn").addEventListener("click", ()=>{ openSidebar(); setTimeout(()=>searchBox.focus(),260); });
scrim.addEventListener("click", closeSidebar);
addEventListener("keydown", e=>{ if(e.key==="Escape") closeSidebar(); });

/* ----------------------------------- init ---------------------------------- */
buildNav();
window.addEventListener("hashchange", onHash);
onHash();

</script>
</body>

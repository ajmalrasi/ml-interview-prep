<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#d97757">
<title>AI Data Scientist — Video Intelligence Prep</title>
<style>
  :root{
    --bg:#faf9f5; --bg-soft:#f1efe7; --bg-side:#f6f4ee; --text:#23211c;
    --muted:#6b6557; --border:#e4e0d5; --accent:#c45f3c; --accent-2:#d97757;
    --accent-soft:#f6e7df; --code-bg:#f1efe7; --code-text:#5a4636; --quote:#5c5547;
    --tok-comment:#9b9482; --tok-string:#5f8a3f; --tok-keyword:#c45f3c; --tok-builtin:#15807f;
    --tok-number:#a9762a; --tok-decorator:#8b6dff; --tok-command:#15807f; --tok-flag:#a9762a; --tok-variable:#8b6dff;
    --link:#b9532f; --header-bg:rgba(250,249,245,.85);
    --shadow:0 1px 2px rgba(60,50,30,.05),0 6px 20px rgba(60,50,30,.06);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#1f1e1b; --bg-soft:#2a2824; --bg-side:#1a1916; --text:#ece8df;
    --muted:#a39c8c; --border:#34322c; --accent:#e08763; --accent-2:#d97757;
    --accent-soft:#3a2b22; --code-bg:#2a2824; --code-text:#d8cfbf; --quote:#b3aa98;
    --tok-comment:#8f8a78; --tok-string:#a7c46e; --tok-keyword:#e7926b; --tok-builtin:#5cc4c4;
    --tok-number:#d6a45a; --tok-decorator:#a78bff; --tok-command:#5cc4c4; --tok-flag:#d6a45a; --tok-variable:#a78bff;
    --link:#ec9170; --header-bg:rgba(31,30,27,.85);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.7 ui-serif,Georgia,"Iowan Old Style","Palatino Linotype",serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .brand,.tools,nav,.topbar,.pager .lbl,.sec-h,.banner,.pagetools,.toc,.searchpanel{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:300px minmax(0,1fr); min-height:100vh; min-height:100dvh}

  /* sidebar */
  .sidebar{background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; height:100dvh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom)}
  .brand{padding:20px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2}
  .brand h1{font-size:15px; margin:0 0 3px; letter-spacing:.2px; font-weight:700}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:14px}
  .tools input{flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:14px; outline:none}
  .tools input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .iconbtn{background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; min-width:40px; height:40px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:none}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent)}
  a.jbtn{display:block; margin-top:10px; text-align:center; text-decoration:none;
    background:var(--accent); color:#fff; border-radius:10px; padding:9px 12px;
    font-size:13px; font-weight:700; letter-spacing:.2px}
  a.jbtn:hover{filter:brightness(1.08); text-decoration:none}
  nav{padding:10px 10px calc(60px + env(safe-area-inset-bottom))}
  .sec{margin:2px 0}
  .sec>.sec-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    padding:14px 12px 5px; font-weight:700}
  nav a.item{display:block; padding:8px 12px; border-radius:9px; color:var(--text);
    font-size:13.5px; margin:1px 0; line-height:1.35}
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:16px}
  .hidden{display:none !important}

  /* main */
  .main{min-width:0; overflow-x:hidden}
  .topbar{display:none; align-items:center; gap:10px;
    padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
    background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px); -webkit-backdrop-filter:saturate(140%) blur(10px)}
  .topbar .tb-title{flex:1; min-width:0; font-weight:700; font-size:15px; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .content-wrap{max-width:760px; margin:0 auto;
    padding:40px max(32px,env(safe-area-inset-left)) 90px max(32px,env(safe-area-inset-right))}

  /* page tools (outline + quiz) */
  .pagetools{margin:0 0 8px}
  .toc{border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-soft); margin:0 0 22px}
  .toc>summary{cursor:pointer; padding:11px 15px; font-size:13px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; list-style:none}
  .toc>summary::-webkit-details-marker{display:none}
  .toc>summary::after{content:"▾"; float:right; color:var(--accent)}
  .toc[open]>summary::after{content:"▴"}
  .toc ul{list-style:none; margin:0 0 8px; padding:0 8px 4px}
  .toc li{margin:0}
  .toc a{display:block; padding:5px 10px; border-radius:7px; font-size:13.5px; color:var(--text)}
  .toc a:hover{background:var(--bg); text-decoration:none}
  .toc a.lvl3{padding-left:24px; font-size:13px; color:var(--muted)}
  .quizbar{display:flex; gap:8px; align-items:center; margin:0 0 18px; flex-wrap:wrap}
  .quizbar .qbtn{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);
    border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer}
  .quizbar .qbtn:hover{background:var(--accent); color:#fff}
  .quizbar .hint{font-size:12.5px; color:var(--muted)}

  article{font-size:clamp(15.5px,1.4vw,17px)}
  article h1{font-size:clamp(27px,5vw,34px); line-height:1.18; margin:.1em 0 .5em; letter-spacing:-.6px; font-weight:800; color:var(--text)}
  @supports ((-webkit-background-clip:text) or (background-clip:text)){
    article h1{background:linear-gradient(90deg,var(--sec-accent,var(--accent)),var(--text) 75%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent}
  }
  article h2{font-size:clamp(20px,3.4vw,23px); margin:1.7em 0 .5em; padding-bottom:.28em;
    border-bottom:2px solid var(--sec-accent,var(--accent)); font-weight:700; display:inline-block}
  article h3{font-size:clamp(16.5px,2.4vw,18px); margin:1.5em 0 .4em; font-weight:700}
  article p{margin:.75em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.45em}
  article li{margin:.3em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article strong{font-weight:700}
  article code{background:var(--code-bg); color:var(--code-text); padding:.13em .42em;
    border-radius:6px; font:.85em/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; word-break:break-word}
  article pre{background:var(--code-bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.1em 0}
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre; word-break:normal}
  article pre .tok-comment{color:var(--tok-comment); font-style:italic}
  article pre .tok-string{color:var(--tok-string)}
  article pre .tok-keyword{color:var(--tok-keyword); font-weight:600}
  article pre .tok-builtin{color:var(--tok-builtin)}
  article pre .tok-number{color:var(--tok-number)}
  article pre .tok-decorator{color:var(--tok-decorator)}
  article pre .tok-command{color:var(--tok-command); font-weight:600}
  article pre .tok-flag{color:var(--tok-flag)}
  article pre .tok-variable{color:var(--tok-variable)}
  article blockquote{margin:1.1em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 10px 10px 0}
  article blockquote p{margin:.3em 0}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.2em 0; border-radius:var(--radius)}
  article table{border-collapse:collapse; width:100%; font-size:14px}
  article th,article td{border:1px solid var(--border); padding:9px 12px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:700; white-space:nowrap}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:2em 0}
  article h1,article h2,article h3{scroll-margin-top:76px}

  /* Q&A collapsibles */
  details.qa{border:1px solid var(--border); border-radius:var(--radius); margin:.7em 0; background:var(--bg); box-shadow:var(--shadow)}
  details.qa>summary{cursor:pointer; padding:13px 16px; font-weight:700; list-style:none; color:var(--text)}
  details.qa>summary::-webkit-details-marker{display:none}
  details.qa>summary::before{content:"▸"; color:var(--accent); margin-right:9px; display:inline-block}
  details.qa[open]>summary::before{content:"▾"}
  details.qa .qa-body{padding:0 16px 4px; border-top:1px solid var(--border); margin-top:2px}
  details.qa .qa-body>*:first-child{margin-top:12px}

  .pager{display:flex; gap:14px; margin:52px 0 0; padding-top:24px; border-top:1px solid var(--border)}
  .pager a{flex:1; min-width:0; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg)}
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:4px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  /* section-tinted links */
  article a:not(.mdlink):not(.seccard){color:var(--sec-accent,var(--link))}
  article a.mdlink{color:var(--sec-accent,var(--link)); font-weight:600}
  nav .sec-h{display:flex; align-items:center; gap:7px}
  nav .sec-ic{font-size:14px; filter:saturate(1.1)}
  nav a.item.active{background:color-mix(in srgb,var(--card,var(--accent)) 16%,transparent); color:var(--card,var(--accent))}

  /* TL;DR / insight callout */
  .callout{display:flex; gap:13px; align-items:flex-start; background:var(--sec-accent-soft,var(--accent-soft));
    border:1px solid var(--sec-accent,var(--accent)); border-radius:14px; padding:14px 16px; margin:1.2em 0}
  .callout .cic{font-size:22px; line-height:1.2; flex:none}
  /* tint background is translucent (theme-proof), so use theme-aware softer text */
  .callout .cbody{font-size:.98em; color:var(--quote)}
  .callout .cbody code{background:var(--code-bg); color:var(--code-text)}
  .callout .clead{display:inline-block; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    font-weight:800; font-size:11px; letter-spacing:.8px; text-transform:uppercase;
    color:var(--sec-accent,var(--accent)); margin-right:6px}

  /* diagrams */
  figure.diagram{margin:1.5em 0; background:var(--bg-soft); border:1px solid var(--border);
    border-radius:18px; padding:18px 18px 12px; box-shadow:var(--shadow)}
  figure.diagram svg{width:100%; height:auto; display:block}
  figure.diagram figcaption{font-size:12.5px; color:var(--muted); text-align:center; margin-top:10px}
  .dg-box{fill:var(--bg); stroke:var(--border); stroke-width:1.5}
  .dg-hot{fill:var(--sec-accent-soft,var(--accent-soft)); stroke:var(--sec-accent,var(--accent)); stroke-width:2}
  .dg-soft{fill:var(--bg-soft); stroke:var(--border); stroke-width:1.5; stroke-dasharray:4 3}
  .dg-line{stroke:var(--muted); stroke-width:2; fill:none}
  .dg-arrow{fill:var(--muted)}
  .dg-label{fill:var(--text); font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-sub{fill:var(--muted); font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  .dg-accent{fill:var(--sec-accent,var(--accent))}
  .dg-accent-tx{fill:var(--sec-accent,var(--accent)); font:700 13px -apple-system,sans-serif}
  .dg-white-tx{fill:#fff; font:600 12px -apple-system,sans-serif}
  .dg-accent-soft{fill:var(--sec-accent-soft,var(--accent-soft))}
  .dg-strokeA{stroke:var(--sec-accent,var(--accent)); stroke-width:2.5}
  .dg-strokeB{stroke:var(--muted); stroke-width:2.5; stroke-dasharray:5 4}
  .dg-fill1{fill:#0e8f8f}.dg-fill2{fill:#7c5cff}.dg-fill3{fill:#c98a00}.dg-fill4{fill:var(--sec-accent,var(--accent))}

  /* home hero + section cards */
  .hero{background:linear-gradient(135deg,var(--accent-soft),var(--bg-soft)); border:1px solid var(--border);
    border-radius:20px; padding:30px 26px; margin:0 0 10px; box-shadow:var(--shadow)}
  .hero-badge{display:inline-block; font-family:-apple-system,sans-serif; font-size:11.5px; font-weight:700;
    letter-spacing:.6px; text-transform:uppercase; color:var(--accent); background:var(--bg);
    border:1px solid var(--accent); border-radius:999px; padding:5px 12px}
  .hero-title{font-size:clamp(30px,6vw,44px); font-weight:800; letter-spacing:-1px; margin:14px 0 6px; line-height:1.05}
  .hero-sub{margin:0; color:var(--quote); font-size:clamp(15px,1.6vw,17px); max-width:48ch}
  .section-cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(215px,1fr)); gap:14px; margin:.6em 0 1.6em}
  a.seccard{display:flex; flex-direction:column; gap:5px; padding:16px; border-radius:16px;
    border:1px solid var(--border); background:var(--bg); box-shadow:var(--shadow); text-decoration:none;
    border-top:3px solid var(--card); transition:transform .12s ease, box-shadow .12s ease}
  a.seccard:hover{transform:translateY(-3px); box-shadow:0 10px 26px rgba(60,50,30,.13); text-decoration:none}
  a.seccard .sc-ic{font-size:24px}
  a.seccard .sc-lbl{font-family:-apple-system,sans-serif; font-weight:700; font-size:14.5px; color:var(--card)}
  a.seccard .sc-tag{font-size:12.5px; color:var(--muted); line-height:1.45}

  /* search overlay */
  .searchpanel{display:none; position:fixed; z-index:70; left:50%; top:70px; transform:translateX(-50%);
    width:min(640px,92vw); max-height:70vh; overflow-y:auto; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.25); padding:8px}
  .searchpanel.show{display:block}
  .searchpanel .sr{display:block; padding:11px 14px; border-radius:10px; color:var(--text)}
  .searchpanel .sr:hover,.searchpanel .sr.sel{background:var(--accent-soft); text-decoration:none}
  .searchpanel .sr .t{font-weight:600; font-size:14px}
  .searchpanel .sr .c{font-size:12.5px; color:var(--muted); margin-top:2px; font-family:inherit}
  .searchpanel .sr .c mark{background:var(--accent-soft); color:var(--accent); padding:0 2px; border-radius:3px}
  .searchpanel .empty{padding:18px 14px; color:var(--muted); font-size:14px}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:min(86vw,330px); top:0; bottom:0; height:auto;
      transform:translateX(-100%); transition:transform .24s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow)}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(20,16,10,.45); z-index:50}
    .content-wrap{padding:20px 18px calc(80px + env(safe-area-inset-bottom))}
    .pager{flex-direction:column}
    .pager .next{text-align:left}
    .pager .spacer{display:none}
    nav a.item{padding:11px 14px; font-size:15px}
    nav a.item.sub{padding-left:18px}
    .searchpanel{top:60px}
  }
  @media (max-width:380px){ .topbar .tb-title{font-size:14px} }

</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>Video Intelligence Prep</h1>
      <div class="sub">AI Data Scientist · CCTV Crowd &amp; Queue Analytics</div>
      <div class="tools">
        <input id="search" type="search" placeholder="Search all pages…" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="iconbtn theme-toggle" title="Toggle light / dark">◐</button>
      </div>
      <a id="jupyterLink" class="jbtn" target="_blank" rel="noopener">🚀 Open live notebooks ↗</a>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="iconbtn" id="menu" aria-label="Open menu">☰</button>
      <span class="tb-title" id="tbTitle">Video Intel Prep</span>
      <button class="iconbtn" id="searchBtn" aria-label="Search">🔍</button>
      <button class="iconbtn theme-toggle" aria-label="Toggle theme">◐</button>
    </div>
    <div class="content-wrap">
      <div id="pagetools"></div>
      <article id="content"></article>
      <div class="pager" id="pager"></div>
    </div>
  </main>
</div>
<div class="scrim" id="scrim"></div>
<div class="searchpanel" id="searchpanel"></div>

README.md\" href=\"#\" style=\"--card:#19a4d1\"><span class=\"sc-ic\">👁️<\/span><span class=\"sc-lbl\">9 · CV Fundamentals<\/span><span class=\"sc-tag\">OpenCV, geometry, detection math<\/span><\/a><a class=\"seccard mdlink\" data-href=\"10-coding-practice/README.md\" href=\"#\" style=\"--card:#b5651d\"><span class=\"sc-ic\">💻<\/span><span class=\"sc-lbl\">10 · Coding Practice<\/span><span class=\"sc-tag\">Runnable OpenCV problems for the proctored round<\/span><\/a><a class=\"seccard mdlink\" data-href=\"11-crowd-queue-analytics/README.md\" href=\"#\" style=\"--card:#2f9e6f\"><span class=\"sc-ic\">🧮<\/span><span class=\"sc-lbl\">11 · Crowd & Queue Analytics<\/span><span class=\"sc-tag\">Queue time, crowd density, zones, flow, heatmaps<\/span><\/a><a class=\"seccard mdlink\" data-href=\"12-event-anomaly-detection/README.md\" href=\"#\" style=\"--card:#d9534f\"><span class=\"sc-ic\">🚨<\/span><span class=\"sc-lbl\">12 · Event & Anomaly Detection<\/span><span class=\"sc-tag\">Events, anomalies, alerting & false-alarm control<\/span><\/a><a class=\"seccard mdlink\" data-href=\"13-secure-onprem-monitoring/README.md\" href=\"#\" style=\"--card:#5b6ee1\"><span class=\"sc-ic\">🔒<\/span><span class=\"sc-lbl\">13 · Secure On-Prem & Monitoring<\/span><span class=\"sc-tag\">Air-gapped deploy, PII/privacy, drift monitoring<\/span><\/a><a class=\"seccard mdlink\" data-href=\"14-deep-learning-for-video/README.md\" href=\"#\" style=\"--card:#9a5cd0\"><span class=\"sc-ic\">🧠<\/span><span class=\"sc-lbl\">14 · Deep Learning for Video<\/span><span class=\"sc-tag\">CNNs, detection, tracking, training & optimization<\/span><\/a><\/div>\n<p>Everything you need for the <strong>AI Data Scientist<\/strong> interview — CCTV-based video intelligence in Abu Dhabi — in the order to study it. Read <strong>top to bottom the first time<\/strong>. Come back to any file as a reference (or the morning of) anytime.<\/p>\n<p>The role in one line: <strong>turn live CCTV into operational decisions<\/strong> — count and time crowds, flag anomalies, and run computer-vision + deep-learning models on the NVIDIA edge, deployed in a secure on-prem environment that never phones home.<\/p>\n<pre><code>CCTV cameras → ingest/decode → detect + track → analytics → events/alerts\n     ↑             ↑              ↑                 ↑              ↑\n  reconnect     GStreamer      CNN / YOLO      queue time /    anomaly +\n  (on-prem)     /DeepStream    + ByteTrack     crowd density   thresholds<\/code><\/pre>\n<h2 id=\"what-this-role-actually-wants-and-how-you-stack-up\">What this role actually wants (and how you stack up)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>JD requirement<\/th><th>Your resume evidence<\/th><th>Gap to close<\/th><\/tr><\/thead><tbody><tr><td>CCTV-based video intelligence (live, 24/7)<\/td><td>DeepStream + GStreamer + Jetson video analytics (Integration Wizards)<\/td><td><strong>Strong<\/strong> — this is exactly the live-video work you've shipped. Frame it as CCTV intelligence, not \"data platform.\" Sections <code>01<\/code>, <code>02<\/code>.<\/td><\/tr><tr><td>Queue-time estimation &amp; crowd analytics<\/td><td>Detection/tracking + zone logic on edge; analytics pipelines<\/td><td><strong>Medium<\/strong> — you have the primitives (tracking, homography, counting) but need the <em>metric<\/em> vocabulary: Little's Law, dwell, density maps. Study <code>11<\/code>.<\/td><\/tr><tr><td>Operational event &amp; anomaly detection<\/td><td>\"Go-to engineer for hard, ambiguous problems\"; logic-on-detections<\/td><td><strong>Medium<\/strong> — know the standard event catalog (loitering, intrusion, abandoned object, surge) and supervised-vs-unsupervised anomaly methods cold. <code>12<\/code>.<\/td><\/tr><tr><td>CV + deep learning: CNNs, object detection, tracking<\/td><td>Surround-view C++/OpenCV, calibration, RANSAC; TensorRT model work<\/td><td><strong>Medium<\/strong> — your recent years read <em>systems<\/em>, not <em>modeling<\/em>. Rebuild the DL-modeling narrative: backbones, YOLO, mAP, ByteTrack, ReID. <code>14<\/code> + <code>09<\/code>.<\/td><\/tr><tr><td>NVIDIA edge AI stack (Jetson, TensorRT, DeepStream)<\/td><td>TensorRT/ONNX, INT8/FP16, layer fusion, pruning, Jetson Nano, DeepStream<\/td><td><strong>Strong<\/strong> — home turf. Just frame it crisply. <code>03<\/code>, <code>02<\/code>.<\/td><\/tr><tr><td>Deployment in secure on-prem environments<\/td><td>Dockerized inference; edge serving (Gunicorn/Celery/Kafka); GKE/Azure DevOps<\/td><td><strong>Medium<\/strong> — you've deployed, but mostly <em>cloud<\/em>. Learn the air-gapped, data-residency, PII/face-privacy angle. <code>13<\/code>.<\/td><\/tr><tr><td>Model optimization &amp; performance monitoring<\/td><td>TensorRT INT8/FP16, pruning; production reliability<\/td><td><strong>Medium<\/strong> — optimization is strong; add the <em>monitoring<\/em> half — drift, per-camera health, GPU dashboards. <code>03<\/code> + <code>13<\/code>.<\/td><\/tr><tr><td>Strong Python + ML frameworks<\/td><td>Petabyte Dask pipelines; PyTorch/ONNX; production Python<\/td><td><strong>Strong<\/strong>.<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Headline:<\/strong> You're a strong fit on the <em>systems + edge<\/em> half and need to rebuild the <em>modeling + applied-analytics<\/em> half of the story. Your risk isn't capability — it's that \"AI <strong>Data Scientist<\/strong>\" wants to hear you reason about models, metrics (queue time, density, mAP, false-alarm rate) and secure on-prem deployment, not only pipelines. This pack closes exactly those gaps.<\/p>\n<h2 id=\"topics-in-order\">Topics (in order)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>#<\/th><th>Folder<\/th><th>What you learn<\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td><a class=\"mdlink\" data-href=\"01-video-streaming/\" href=\"#\">01-video-streaming/<\/a><\/td><td>RTSP, WebRTC, FFmpeg, codecs, frame buffers, decode/encode<\/td><\/tr><tr><td>2<\/td><td><a class=\"mdlink\" data-href=\"02-gstreamer/\" href=\"#\">02-gstreamer/<\/a><\/td><td>Pipelines, elements, appsink, hardware decode, DeepStream<\/td><\/tr><tr><td>3<\/td><td><a class=\"mdlink\" data-href=\"03-low-latency-inference/\" href=\"#\">03-low-latency-inference/<\/a><\/td><td>TensorRT, DeepStream, Triton, batching, zero-copy, the latency budget<\/td><\/tr><tr><td>4<\/td><td><a class=\"mdlink\" data-href=\"04-fault-tolerance/\" href=\"#\">04-fault-tolerance/<\/a><\/td><td>Crash-proof design: reconnect, watchdogs, backpressure, graceful degradation<\/td><\/tr><tr><td>5<\/td><td><a class=\"mdlink\" data-href=\"05-production-python/\" href=\"#\">05-production-python/<\/a><\/td><td>Threads vs async vs processes, the GIL, queues, memory leaks<\/td><\/tr><tr><td>6<\/td><td><a class=\"mdlink\" data-href=\"06-system-design/\" href=\"#\">06-system-design/<\/a><\/td><td>The big whiteboard question: design a crash-proof multi-camera pipeline<\/td><\/tr><tr><td>7<\/td><td><a class=\"mdlink\" data-href=\"07-qa-drill-bank/\" href=\"#\">07-qa-drill-bank/<\/a><\/td><td>Every \"why X over Y\" + the one-page cheat sheet<\/td><\/tr><tr><td>8<\/td><td><a class=\"mdlink\" data-href=\"08-mock-interview/\" href=\"#\">08-mock-interview/<\/a><\/td><td>Staged mock questions, model answers, scoring rubric<\/td><\/tr><tr><td>9<\/td><td><a class=\"mdlink\" data-href=\"09-computer-vision-fundamentals/\" href=\"#\">09-computer-vision-fundamentals/<\/a><\/td><td>Classical CV: color spaces, geometry, calibration, features, detection/tracking math<\/td><\/tr><tr><td>10<\/td><td><a class=\"mdlink\" data-href=\"10-coding-practice/\" href=\"#\">10-coding-practice/<\/a><\/td><td>Runnable OpenCV problems for the proctored round<\/td><\/tr><tr><td>11<\/td><td><a class=\"mdlink\" data-href=\"11-crowd-queue-analytics/\" href=\"#\">11-crowd-queue-analytics/<\/a><\/td><td><strong>Queue-time estimation, crowd counting/density, zones, flow, heatmaps<\/strong><\/td><\/tr><tr><td>12<\/td><td><a class=\"mdlink\" data-href=\"12-event-anomaly-detection/\" href=\"#\">12-event-anomaly-detection/<\/a><\/td><td><strong>Operational events, anomaly methods, alerting &amp; false-alarm control<\/strong><\/td><\/tr><tr><td>13<\/td><td><a class=\"mdlink\" data-href=\"13-secure-onprem-monitoring/\" href=\"#\">13-secure-onprem-monitoring/<\/a><\/td><td><strong>Air-gapped deployment, security &amp; PII, drift &amp; performance monitoring<\/strong><\/td><\/tr><tr><td>14<\/td><td><a class=\"mdlink\" data-href=\"14-deep-learning-for-video/\" href=\"#\">14-deep-learning-for-video/<\/a><\/td><td><strong>CNNs, object detection (YOLO), tracking (ByteTrack/ReID), training &amp; optimization<\/strong><\/td><\/tr><\/tbody><\/table><\/div>\n<blockquote><p><strong>Sections 11–14 are the new focus areas<\/strong> for this JD — the applied analytics, event detection, secure on-prem, and DL-modeling depth the role is built around. Sections 01–10 are the transferable foundation.<\/p><\/blockquote>\n<h2 id=\"how-to-use-this\">How to use this<\/h2>\n<ul><li><strong>First time:<\/strong> follow the numbers 1 → 6, then the applied focus 11 → 14, plus<\/li><\/ul>\n<p>9 if classical CV is rusty.<\/p>\n<ul><li><strong>If the modeling story is your weak spot:<\/strong> start at <code>14<\/code> and <code>11<\/code>.<\/li><li><strong>Day before:<\/strong> read <code>06-system-design<\/code>, <code>07-qa-drill-bank<\/code>, <code>11<\/code>, <code>12<\/code>, and skim <code>13<\/code>.<\/li><li><strong>Morning of:<\/strong> read <code>07-qa-drill-bank/cheat-sheet.md<\/code> + <code>09/cv-cheat-sheet.md<\/code>.<\/li><li><strong>Want to rehearse out loud:<\/strong> open <code>08-mock-interview/<\/code> — or ask me to run it<\/li><\/ul>\n<p>live in chat and I'll grade your answers.<\/p>\n<p>→ Start here: <strong><a class=\"mdlink\" data-href=\"01-video-streaming/README.md\" href=\"#\">01-video-streaming/README.md<\/a><\/strong> — or jump straight to the new focus areas in <strong><a class=\"mdlink\" data-href=\"11-crowd-queue-analytics/\" href=\"#\">11-crowd-queue-analytics/<\/a><\/strong>.<\/p>","toc":[{"level":2,"id":"jump-in","text":"Jump in"},{"level":2,"id":"what-this-role-actually-wants-and-how-you-stack-up","text":"What this role actually wants (and how you stack up)"},{"level":2,"id":"topics-in-order","text":"Topics (in order)"},{"level":2,"id":"how-to-use-this","text":"How to use this"}],"text":"abu dhabi · ai data scientist video intelligence prep computer vision & deep learning on live cctv — crowd analytics, queue-time estimation, and anomaly detection, built on the nvidia edge stack and deployed secure on-prem. fourteen chapters, a drill bank, and a full mock. ai data scientist (video intelligence) — learning path cameras rtsp / webrtc decode nvdec buffer drop-oldest inference tensorrt logic geometry output events / db the \"last mile\": a model running on live video, forever the journey of every frame, end to end jump in 📡 1 · video streaming rtsp, webrtc, codecs, frame buffers 🎬 2 · gstreamer pipelines, appsink, deepstream ⚡ 3 · low-latency inference tensorrt, quantization, batching 🛡️ 4 · fault tolerance crash-proof, self-healing systems 🐍 5 · production python gil, threads, async, memory 🏗️ 6 · system design design a crash-proof camera fleet 🎯 7 · q&a drill bank every \"why x over y\", quiz-ready 🎤 8 · mock interview questions, model answers, rubric 👁️ 9 · cv fundamentals opencv, geometry, detection math 💻 10 · coding practice runnable opencv problems for the proctored round 🧮 11 · crowd & queue analytics queue time, crowd density, zones, flow, heatmaps 🚨 12 · event & anomaly detection events, anomalies, alerting & false-alarm control 🔒 13 · secure on-prem & monitoring air-gapped deploy, pii/privacy, drift monitoring 🧠 14 · deep learning for video cnns, detection, tracking, training & optimization everything you need for the ai data scientist interview — cctv-based video intelligence in abu dhabi — in the order to study it. read top to bottom the first time . come back to any file as a reference (or the morning of) anytime. the role in one line: turn live cctv into operational decisions — count and time crowds, flag anomalies, and run computer-vision + deep-learning models on the nvidia edge, deployed in a secure on-prem environment that never phones home. cctv cameras → ingest/decode → detect + track → analytics → events/alerts ↑ ↑ ↑ ↑ ↑ reconnect gstreamer cnn / yolo queue time / anomaly + (on-prem) /deepstream + bytetrack crowd density thresholds what this role actually wants (and how you stack up) jd requirement your resume evidence gap to close cctv-based video intelligence (live, 24/7) deepstream + gstreamer + jetson video analytics (integration wizards) strong — this is exactly the live-video work you've shipped. frame it as cctv intelligence, not \"data platform.\" sections 01 , 02 . queue-time estimation & crowd analytics detection/tracking + zone logic on edge; analytics pipelines medium — you have the primitives (tracking, homography, counting) but need the metric vocabulary: little's law, dwell, density maps. study 11 . operational event & anomaly detection \"go-to engineer for hard, ambiguous problems\"; logic-on-detections medium — know the standard event catalog (loitering, intrusion, abandoned object, surge) and supervised-vs-unsupervised anomaly methods cold. 12 . cv + deep learning: cnns, object detection, tracking surround-view c++/opencv, calibration, ransac; tensorrt model work medium — your recent years read systems , not modeling . rebuild the dl-modeling narrative: backbones, yolo, map, bytetrack, reid. 14 + 09 . nvidia edge ai stack (jetson, tensorrt, deepstream) tensorrt/onnx, int8/fp16, layer fusion, pruning, jetson nano, deepstream strong — home turf. just frame it crisply. 03 , 02 . deployment in secure on-prem environments dockerized inference; edge serving (gunicorn/celery/kafka); gke/azure devops medium — you've deployed, but mostly cloud . learn the air-gapped, data-residency, pii/face-privacy angle. 13 . model optimization & performance monitoring tensorrt int8/fp16, pruning; production reliability medium — optimization is strong; add the monitoring half — drift, per-camera health, gpu dashboards. 03 + 13 . strong python + ml frameworks petabyte dask pipelines; pytorch/onnx; production python strong . headline: you're a strong fit on the systems + edge half and need to rebuild the modeling + applied-analytics half of the story. your risk isn't capability — it's that \"ai data scientist \" wants to hear you reason about models, metrics (queue time, density, map, false-alarm rate) and secure on-prem deployment, not only pipelines. this pack closes exactly those gaps. topics (in order) # folder what you learn 1 01-video-streaming/ rtsp, webrtc, ffmpeg, codecs, frame buffers, decode/encode 2 02-gstreamer/ pipelines, elements, appsink, hardware decode, deepstream 3 03-low-latency-inference/ tensorrt, deepstream, triton, batching, zero-copy, the latency budget 4 04-fault-tolerance/ crash-proof design: reconnect, watchdogs, backpressure, graceful degradation 5 05-production-python/ threads vs async vs processes, the gil, queues, memory leaks 6 06-system-design/ the big whiteboard question: design a crash-proof multi-camera pipeline 7 07-qa-drill-bank/ every \"why x over y\" + the one-page cheat sheet 8 08-mock-interview/ staged mock questions, model answers, scoring rubric 9 09-computer-vision-fundamentals/ classical cv: color spaces, geometry, calibration, features, detection/tracking math 10 10-coding-practice/ runnable opencv problems for the proctored round 11 11-crowd-queue-analytics/ queue-time estimation, crowd counting/density, zones, flow, heatmaps 12 12-event-anomaly-detection/ operational events, anomaly methods, alerting & false-alarm control 13 13-secure-onprem-monitoring/ air-gapped deployment, security & pii, drift & performance monitoring 14 14-deep-learning-for-video/ cnns, object detection (yolo), tracking (bytetrack/reid), training & optimization sections 11–14 are the new focus areas for this jd — the applied analytics, event detection, secure on-prem, and dl-modeling depth the role is built around. sections 01–10 are the transferable foundation. how to use this first time: follow the numbers 1 → 6, then the applied focus 11 → 14, plus 9 if classical cv is rusty. if the modeling story is your weak spot: start at 14 and 11 . day before: read 06-system-design , 07-qa-drill-bank , 11 , 12 , and skim 13 . morning of: read 07-qa-drill-bank/cheat-sheet.md + 09/cv-cheat-sheet.md . want to rehearse out loud: open 08-mock-interview/ — or ask me to run it live in chat and i'll grade your answers. → start here: 01-video-streaming/readme.md — or jump straight to the new focus areas in 11-crowd-queue-analytics/ .","words":949},{"path":"RUN-PLAYGROUND.md","title":"Live Playground (Jupyter)","section":"Start here","quiz":false,"accent":"#d4663f","html":"<h1 id=\"run-the-live-playground-jupyter-website\">Run the Live Playground (Jupyter + Website)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> One command spins up a Python venv, installs OpenCV/NumPy/Jupyter, and serves <strong>both<\/strong> the study website and <strong>live, editable notebooks<\/strong> of every coding problem. Run cells, tweak the code, see the output images — exactly the muscle you need for the proctored round.<\/div><\/div>\n<h2 id=\"one-command\">One command<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">cd<\/span> koireader-interview-prep\n<span class=\"tok-command\">bash<\/span> run.sh<\/code><\/pre>\n<p>First run takes a minute (it builds the venv and installs deps); later runs are instant. You'll see:<\/p>\n<pre><code>Study website :  http://localhost:9000\n                 http://&lt;your-ip&gt;:9000   (from your phone)\nJupyter        :  starting on port 8888 (URL + token printed below)<\/code><\/pre>\n<p>Jupyter starts with the fixed token <strong><code>koireader<\/code><\/strong>, so the website's <strong>\"Open live notebooks\"<\/strong> button (top-left of the site) opens JupyterLab directly — <code>http://&lt;this-host&gt;:8888/lab?token=koireader<\/code>. Press <strong>Ctrl+C<\/strong> in the terminal to stop both. (Change the token with <code>JUPYTER_TOKEN=... bash run.sh<\/code>, but then update the link's token in <code>_app.js<\/code> and rebuild.)<\/p>\n<p>Custom ports: <code>SITE_PORT=9000 JUPYTER_PORT=8888 bash run.sh<\/code><\/p>\n<h2 id=\"why-a-notebook-and-is-it-better\">Why a notebook (and is it \"better\"?)<\/h2>\n<ul><li><strong>Website<\/strong> = best for <em>reading and memorizing<\/em>. The test bans AI and<\/li><\/ul>\n<p>autocomplete, so you must recall the API — the site + cheat sheet are for that.<\/p>\n<ul><li><strong>Notebooks<\/strong> = best for <em>experimenting<\/em>: run a cell, change a threshold, swap in<\/li><\/ul>\n<p>your own image, watch the output image update instantly.<\/p>\n<p>Use both: read on the site, then drill in the notebook.<\/p>\n<h2 id=\"whats-in-the-notebooks\">What's in the notebooks<\/h2>\n<p>Auto-generated from the Section 10 markdown (single source of truth), so they never drift. Four notebooks in <code>notebooks/<\/code>:<\/p>\n<ol><li><code>01_image_processing_and_geometry.ipynb<\/code> — preprocessing, deskew, 4-point scan…<\/li><li><code>02_detection_logic.ipynb<\/code> — IoU, NMS, zones, line-crossing, reading order<\/li><li><code>03_video_and_streaming.ipynb<\/code> — robust capture, motion, annotate<\/li><li><code>04_python_and_numpy.ipynb<\/code> — vectorization, fault-tolerant batch, blobs<\/li><li><code>06_core_drills.ipynb<\/code> — hand-curated cut of the ~12 highest-yield problems<\/li><\/ol>\n<p>from notebooks 00–04, ordered by likelihood for this role (not auto-generated    from a <code>.md<\/code> — edit it directly)<\/p>\n<p>Each notebook's <strong>first code cell<\/strong> creates synthetic sample images (<code>input.jpg<\/code>, <code>test.avi<\/code>, …) so every cell runs out of the box. <strong>Swap <code>input.jpg<\/code> for a real photo<\/strong> to experiment on your own data.<\/p>\n<h2 id=\"adding-or-editing-notebook-content\">Adding or editing notebook content<\/h2>\n<p><strong>Don't edit files in <code>notebooks/<\/code> directly<\/strong> — they're generated, and any change gets silently overwritten the next time someone runs <code>build_notebooks.py<\/code> (which every deploy does). Edit the source instead:<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># 1. Edit the matching .md in 10-coding-practice/ (e.g. image-processing-and-geometry.md)<\/span>\n<span class=\"tok-comment\"># 2. Regenerate the notebooks from it:<\/span>\n<span class=\"tok-command\">python3<\/span> build_notebooks.py\n<span class=\"tok-comment\"># 3. Commit both the .md and the regenerated .ipynb, then push + redeploy.<\/span><\/code><\/pre>\n<p>The <code>.md<\/code> → <code>.ipynb<\/code> mapping is the <code>FILES<\/code> list at the top of <code>build_notebooks.py<\/code>.<\/p>\n<h2 id=\"practising-for-the-proctored-format\">Practising for the proctored format<\/h2>\n<p>The test wants <code>.py<\/code> files, or <code>.ipynb<\/code> <strong>converted to <code>.html<\/code><\/strong> (no zip). Convert a notebook from the venv:<\/p>\n<pre><code class=\"language-bash\">source .venv/bin/activate\njupyter nbconvert <span class=\"tok-flag\">--to<\/span> html notebooks/01_image_processing_and_geometry.ipynb<\/code><\/pre>\n<p>Rehearse that conversion now so it's automatic on test day. Remember: in the real test, <strong>disable AI code suggestions<\/strong> in whatever editor you use.<\/p>\n<h2 id=\"running-on-the-raspberry-pi\">Running on the Raspberry Pi<\/h2>\n<p><code>run.sh<\/code> works on the Pi too (<code>opencv-python-headless<\/code> needs no display). With <code>--ip=0.0.0.0<\/code> you can open Jupyter from your laptop at <code>http://&lt;pi-ip&gt;:8888<\/code>. Security note: that exposes Jupyter on your LAN — fine at home, and it's still token-protected. Don't expose it to the public internet.<\/p>\n<h2 id=\"files\">Files<\/h2>\n<p><code>run.sh<\/code> · <code>requirements.txt<\/code> · <code>build_notebooks.py<\/code> (regenerates notebooks from the <code>.md<\/code>) · <code>notebooks/<\/code>.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"10-coding-practice/README.md\" href=\"#\">Coding Practice overview<\/a>.<\/p>","toc":[{"level":2,"id":"one-command","text":"One command"},{"level":2,"id":"why-a-notebook-and-is-it-better","text":"Why a notebook (and is it \"better\"?)"},{"level":2,"id":"whats-in-the-notebooks","text":"What's in the notebooks"},{"level":2,"id":"adding-or-editing-notebook-content","text":"Adding or editing notebook content"},{"level":2,"id":"practising-for-the-proctored-format","text":"Practising for the proctored format"},{"level":2,"id":"running-on-the-raspberry-pi","text":"Running on the Raspberry Pi"},{"level":2,"id":"files","text":"Files"}],"text":"run the live playground (jupyter + website) 💡 tl;dr one command spins up a python venv, installs opencv/numpy/jupyter, and serves both the study website and live, editable notebooks of every coding problem. run cells, tweak the code, see the output images — exactly the muscle you need for the proctored round. one command cd koireader-interview-prep bash run.sh first run takes a minute (it builds the venv and installs deps); later runs are instant. you'll see: study website : http://localhost:9000 http://<your-ip>:9000 (from your phone) jupyter : starting on port 8888 (url + token printed below) jupyter starts with the fixed token koireader , so the website's \"open live notebooks\" button (top-left of the site) opens jupyterlab directly — http://<this-host>:8888/lab?token=koireader . press ctrl+c in the terminal to stop both. (change the token with jupyter_token=... bash run.sh , but then update the link's token in _app.js and rebuild.) custom ports: site_port=9000 jupyter_port=8888 bash run.sh why a notebook (and is it \"better\"?) website = best for reading and memorizing . the test bans ai and autocomplete, so you must recall the api — the site + cheat sheet are for that. notebooks = best for experimenting : run a cell, change a threshold, swap in your own image, watch the output image update instantly. use both: read on the site, then drill in the notebook. what's in the notebooks auto-generated from the section 10 markdown (single source of truth), so they never drift. four notebooks in notebooks/ : 01_image_processing_and_geometry.ipynb — preprocessing, deskew, 4-point scan… 02_detection_logic.ipynb — iou, nms, zones, line-crossing, reading order 03_video_and_streaming.ipynb — robust capture, motion, annotate 04_python_and_numpy.ipynb — vectorization, fault-tolerant batch, blobs 06_core_drills.ipynb — hand-curated cut of the ~12 highest-yield problems from notebooks 00–04, ordered by likelihood for this role (not auto-generated from a .md — edit it directly) each notebook's first code cell creates synthetic sample images ( input.jpg , test.avi , …) so every cell runs out of the box. swap input.jpg for a real photo to experiment on your own data. adding or editing notebook content don't edit files in notebooks/ directly — they're generated, and any change gets silently overwritten the next time someone runs build_notebooks.py (which every deploy does). edit the source instead: # 1. edit the matching .md in 10-coding-practice/ (e.g. image-processing-and-geometry.md) # 2. regenerate the notebooks from it: python3 build_notebooks.py # 3. commit both the .md and the regenerated .ipynb, then push + redeploy. the .md → .ipynb mapping is the files list at the top of build_notebooks.py . practising for the proctored format the test wants .py files, or .ipynb converted to .html (no zip). convert a notebook from the venv: source .venv/bin/activate jupyter nbconvert --to html notebooks/01_image_processing_and_geometry.ipynb rehearse that conversion now so it's automatic on test day. remember: in the real test, disable ai code suggestions in whatever editor you use. running on the raspberry pi run.sh works on the pi too ( opencv-python-headless needs no display). with --ip=0.0.0.0 you can open jupyter from your laptop at http://<pi-ip>:8888 . security note: that exposes jupyter on your lan — fine at home, and it's still token-protected. don't expose it to the public internet. files run.sh · requirements.txt · build_notebooks.py (regenerates notebooks from the .md ) · notebooks/ . → back to coding practice overview .","words":541},{"path":"RUN-ON-PI.md","title":"Run on a Raspberry Pi","section":"Start here","quiz":false,"accent":"#d4663f","html":"<h1 id=\"run-on-a-raspberry-pi-or-any-edge-device\">Run on a Raspberry Pi (or any edge device)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This site is just static files — one <code>index.html<\/code> plus the markdown. No build, no database, no internet. Serve the folder with any tiny web server and open it in a browser. Below: the 30-second way, plus an auto-start service so it's always on.<\/div><\/div>\n<h2 id=\"why-it-needs-a-server-not-just-double-click\">Why it needs a server (not just double-click)<\/h2>\n<p>The page <em>reads<\/em> the <code>.md<\/code> files at runtime with <code>fetch()<\/code>. Browsers block reading local files over <code>file://<\/code> for security, so opening <code>index.html<\/code> directly shows a \"needs a web server\" notice. Any HTTP server fixes it — that's all a Pi needs.<\/p>\n<h2 id=\"deployed-instance\">Deployed instance<\/h2>\n<p>Running on <strong>http://192.168.3.20:9000<\/strong> — served by the <code>koi-prep<\/code> systemd service (auto-starts on boot). User: <code>ajmalrasi<\/code>, path: <code>/home/ajmalrasi/koireader-interview-prep<\/code>.<\/p>\n<p>Source: https://github.com/ajmalrasi/koireader-interview-prep<\/p>\n<hr>\n<h2 id=\"option-1-python-already-on-every-pi-30-seconds\">Option 1 — Python (already on every Pi), 30 seconds<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">cd<\/span> /path/to/koireader-interview-prep\n<span class=\"tok-command\">python3<\/span> <span class=\"tok-flag\">-m<\/span> http.server <span class=\"tok-number\">9000<\/span><\/code><\/pre>\n<p>Then open <strong>http://localhost:9000<\/strong> on the Pi, or <strong>http://&lt;pi-ip&gt;:9000<\/strong> from your laptop/phone on the same network (find the IP with <code>hostname -I<\/code>).<\/p>\n<h2 id=\"option-2-always-on-with-systemd-survives-reboot\">Option 2 — Always-on with systemd (survives reboot)<\/h2>\n<p>Create the service:<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-command\">sudo<\/span> tee /etc/systemd/system/koi-prep.service &gt;/dev/null &lt;&lt;<span class=\"tok-string\">'EOF'<\/span>\n[Unit]\nDescription=Video Intelligence Interview Prep site\nAfter=network.target\n\n[Service]\nWorkingDirectory=/home/ajmalrasi/koireader-interview-prep\nExecStart=/usr/bin/<span class=\"tok-command\">python3<\/span> <span class=\"tok-flag\">-m<\/span> http.server <span class=\"tok-number\">9000<\/span>\nRestart=always\nUser=ajmalrasi\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\n<span class=\"tok-command\">sudo<\/span> systemctl daemon-reload\n<span class=\"tok-command\">sudo<\/span> systemctl enable <span class=\"tok-flag\">--now<\/span> koi-prep<\/code><\/pre>\n<p>Now it starts on boot and restarts if it crashes. Check it: <code>systemctl status koi-prep<\/code>. Logs: <code>journalctl -u koi-prep -f<\/code>.<\/p>\n<blockquote><p>Adjust <code>WorkingDirectory<\/code> and <code>User<\/code> to where you copied the folder.<\/p><\/blockquote>\n<h2 id=\"option-3-nginx-if-you-already-run-it\">Option 3 — nginx (if you already run it)<\/h2>\n<pre><code class=\"language-nginx\">server {\n    listen 80;\n    root /home/pi/koireader-interview-prep;\n    index index.html;\n    location / { try_files $uri $uri/ =404; }\n}<\/code><\/pre>\n<p>Drop that in <code>/etc/nginx/sites-available/koi-prep<\/code>, symlink to <code>sites-enabled<\/code>, <code>sudo nginx -t &amp;&amp; sudo systemctl reload nginx<\/code>. Then browse to the Pi's IP on port 80.<\/p>\n<h2 id=\"copying-the-folder-to-the-pi\">Copying the folder to the Pi<\/h2>\n<p>From your computer:<\/p>\n<pre><code class=\"language-bash\">scp <span class=\"tok-flag\">-r<\/span> koireader-interview-prep pi@&lt;pi-ip&gt;:/home/pi/<\/code><\/pre>\n<p>Or clone from GitHub:<\/p>\n<pre><code class=\"language-bash\">git clone git@github.com:ajmalrasi/koireader-interview-prep.git<\/code><\/pre>\n<p>Or put it on a USB stick — the whole site is plain text, a few hundred KB.<\/p>\n<h2 id=\"notes\">Notes<\/h2>\n<ul><li><strong>Single self-contained file:<\/strong> all content is baked into <code>index.html<\/code>. It works<\/li><\/ul>\n<p>even by double-clicking the file (<code>file://<\/code>) — no server strictly required. The   server is only for sharing it on the network (e.g. to your phone).<\/p>\n<ul><li><strong>Fully offline:<\/strong> no CDN, no external fonts or scripts. Works on an air-gapped<\/li><\/ul>\n<p>device.<\/p>\n<ul><li><strong>Resource use:<\/strong> <code>python3 -m http.server<\/code> idles at near-zero CPU/RAM — fine on a<\/li><\/ul>\n<p>Pi Zero.<\/p>\n<ul><li><strong>Editing content:<\/strong> edit the <code>.md<\/code> files, then rebuild with <strong><code>node build.js<\/code><\/strong><\/li><\/ul>\n<p>to regenerate <code>index.html<\/code> (the <code>.md<\/code> files are the source of truth; <code>_site.css<\/code>,   <code>_app.js<\/code>, and <code>build.js<\/code> are the build inputs). If you don't have Node, you can   edit <code>index.html<\/code> directly instead.<\/p>\n<ul><li><strong>Quiz mode:<\/strong> on the <em>Drill Bank<\/em> page, hit \"Quiz me · hide answers\" to collapse<\/li><\/ul>\n<p>every answer, then tap a question to reveal it.<\/p>\n<ul><li><strong>Outline:<\/strong> long pages show an \"On this page\" jump list.<\/li><li><strong>Dark/light:<\/strong> toggle with the ◐ button; preference is remembered.<\/li><li><strong>Search:<\/strong> type in the box for instant full-text search across all pages<\/li><\/ul>\n<p>(↑/↓ to move, Enter to open).<\/p>\n<p>→ Back to the <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">Overview<\/a>.<\/p>","toc":[{"level":2,"id":"why-it-needs-a-server-not-just-double-click","text":"Why it needs a server (not just double-click)"},{"level":2,"id":"deployed-instance","text":"Deployed instance"},{"level":2,"id":"option-1-python-already-on-every-pi-30-seconds","text":"Option 1 — Python (already on every Pi), 30 seconds"},{"level":2,"id":"option-2-always-on-with-systemd-survives-reboot","text":"Option 2 — Always-on with systemd (survives reboot)"},{"level":2,"id":"option-3-nginx-if-you-already-run-it","text":"Option 3 — nginx (if you already run it)"},{"level":2,"id":"copying-the-folder-to-the-pi","text":"Copying the folder to the Pi"},{"level":2,"id":"notes","text":"Notes"}],"text":"run on a raspberry pi (or any edge device) 💡 tl;dr this site is just static files — one index.html plus the markdown. no build, no database, no internet. serve the folder with any tiny web server and open it in a browser. below: the 30-second way, plus an auto-start service so it's always on. why it needs a server (not just double-click) the page reads the .md files at runtime with fetch() . browsers block reading local files over file:// for security, so opening index.html directly shows a \"needs a web server\" notice. any http server fixes it — that's all a pi needs. deployed instance running on http://192.168.3.20:9000 — served by the koi-prep systemd service (auto-starts on boot). user: ajmalrasi , path: /home/ajmalrasi/koireader-interview-prep . source: https://github.com/ajmalrasi/koireader-interview-prep option 1 — python (already on every pi), 30 seconds cd /path/to/koireader-interview-prep python3 -m http.server 9000 then open http://localhost:9000 on the pi, or http://<pi-ip>:9000 from your laptop/phone on the same network (find the ip with hostname -i ). option 2 — always-on with systemd (survives reboot) create the service: sudo tee /etc/systemd/system/koi-prep.service >/dev/null << 'eof' [unit] description=video intelligence interview prep site after=network.target [service] workingdirectory=/home/ajmalrasi/koireader-interview-prep execstart=/usr/bin/ python3 -m http.server 9000 restart=always user=ajmalrasi [install] wantedby=multi-user.target eof sudo systemctl daemon-reload sudo systemctl enable --now koi-prep now it starts on boot and restarts if it crashes. check it: systemctl status koi-prep . logs: journalctl -u koi-prep -f . adjust workingdirectory and user to where you copied the folder. option 3 — nginx (if you already run it) server { listen 80; root /home/pi/koireader-interview-prep; index index.html; location / { try_files $uri $uri/ =404; } } drop that in /etc/nginx/sites-available/koi-prep , symlink to sites-enabled , sudo nginx -t && sudo systemctl reload nginx . then browse to the pi's ip on port 80. copying the folder to the pi from your computer: scp -r koireader-interview-prep pi@<pi-ip>:/home/pi/ or clone from github: git clone git@github.com:ajmalrasi/koireader-interview-prep.git or put it on a usb stick — the whole site is plain text, a few hundred kb. notes single self-contained file: all content is baked into index.html . it works even by double-clicking the file ( file:// ) — no server strictly required. the server is only for sharing it on the network (e.g. to your phone). fully offline: no cdn, no external fonts or scripts. works on an air-gapped device. resource use: python3 -m http.server idles at near-zero cpu/ram — fine on a pi zero. editing content: edit the .md files, then rebuild with node build.js to regenerate index.html (the .md files are the source of truth; _site.css , _app.js , and build.js are the build inputs). if you don't have node, you can edit index.html directly instead. quiz mode: on the drill bank page, hit \"quiz me · hide answers\" to collapse every answer, then tap a question to reveal it. outline: long pages show an \"on this page\" jump list. dark/light: toggle with the ◐ button; preference is remembered. search: type in the box for instant full-text search across all pages (↑/↓ to move, enter to open). → back to the overview .","words":512},{"path":"01-video-streaming/README.md","title":"Overview","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"01-video-streaming-fundamentals\">01 — Video Streaming Fundamentals<\/h1>\n<p>The JD's #1 requirement: <em>\"Deep expertise in video streaming protocols (RTSP, WebRTC, FastRTC) and processing tools (FFmpeg, GStreamer). You know how to handle frame buffers, decoding, and encoding efficiently.\"<\/em><\/p>\n<p>This is the section to nail. Files in order:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"protocols-rtsp-webrtc.md\" href=\"#\">protocols-rtsp-webrtc.md<\/a> — RTSP vs WebRTC vs FastRTC, when each<\/li><li><a class=\"mdlink\" data-href=\"codecs-and-frames.md\" href=\"#\">codecs-and-frames.md<\/a> — H.264/H.265, I/P/B frames, why a dropped keyframe hurts<\/li><li><a class=\"mdlink\" data-href=\"decode-encode-pipeline.md\" href=\"#\">decode-encode-pipeline.md<\/a> — the journey from packet to numpy array, hardware decode<\/li><li><a class=\"mdlink\" data-href=\"frame-buffers-backpressure.md\" href=\"#\">frame-buffers-backpressure.md<\/a> — buffers, latency vs smoothness, drop strategy<\/li><\/ol>\n<p><strong>TL;DR for the whole section:<\/strong> A camera sends <em>compressed packets<\/em> over a <em>transport protocol<\/em>. You must <em>decode<\/em> them into raw frames (ideally on the GPU), hand frames to inference <em>fast enough to keep up<\/em>, and <em>drop frames<\/em> rather than pile up memory when you can't. Everything here is about that loop running forever without leaking or lagging.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"protocols-rtsp-webrtc.md\" href=\"#\">protocols-rtsp-webrtc.md<\/a><\/strong><\/p>","toc":[],"text":"01 — video streaming fundamentals the jd's #1 requirement: \"deep expertise in video streaming protocols (rtsp, webrtc, fastrtc) and processing tools (ffmpeg, gstreamer). you know how to handle frame buffers, decoding, and encoding efficiently.\" this is the section to nail. files in order: protocols-rtsp-webrtc.md — rtsp vs webrtc vs fastrtc, when each codecs-and-frames.md — h.264/h.265, i/p/b frames, why a dropped keyframe hurts decode-encode-pipeline.md — the journey from packet to numpy array, hardware decode frame-buffers-backpressure.md — buffers, latency vs smoothness, drop strategy tl;dr for the whole section: a camera sends compressed packets over a transport protocol . you must decode them into raw frames (ideally on the gpu), hand frames to inference fast enough to keep up , and drop frames rather than pile up memory when you can't. everything here is about that loop running forever without leaking or lagging. → start: protocols-rtsp-webrtc.md","words":143},{"path":"01-video-streaming/protocols-rtsp-webrtc.md","title":"RTSP vs WebRTC vs FastRTC","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"rtsp-vs-webrtc-vs-fastrtc\">RTSP vs WebRTC vs FastRTC<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 200\" role=\"img\" aria-label=\"RTSP in from cameras, WebRTC out to browsers\"><rect class=\"dg-box\" x=\"28\" y=\"46\" width=\"168\" height=\"54\" rx=\"12\"/><text class=\"dg-label\" x=\"112\" y=\"71\" text-anchor=\"middle\">IP Cameras<\/text><text class=\"dg-sub\" x=\"112\" y=\"88\" text-anchor=\"middle\">emit RTSP<\/text><text class=\"dg-accent-tx\" x=\"248\" y=\"62\" text-anchor=\"middle\">RTSP<\/text><line class=\"dg-line\" x1=\"196\" y1=\"73\" x2=\"293\" y2=\"73\"/><polygon class=\"dg-arrow\" points=\"293,68 300,73 293,78\"/><rect class=\"dg-box dg-hot\" x=\"300\" y=\"36\" width=\"132\" height=\"92\" rx=\"12\"/><text class=\"dg-label\" x=\"366\" y=\"65\" text-anchor=\"middle\">Your System<\/text><text class=\"dg-sub\" x=\"366\" y=\"89\" text-anchor=\"middle\">decode · infer<\/text><text class=\"dg-sub\" x=\"366\" y=\"107\" text-anchor=\"middle\">· serve live<\/text><text class=\"dg-accent-tx\" x=\"486\" y=\"62\" text-anchor=\"middle\">WebRTC<\/text><line class=\"dg-line\" x1=\"432\" y1=\"73\" x2=\"533\" y2=\"73\"/><polygon class=\"dg-arrow\" points=\"533,68 540,73 533,78\"/><rect class=\"dg-box\" x=\"540\" y=\"46\" width=\"168\" height=\"54\" rx=\"12\"/><text class=\"dg-label\" x=\"624\" y=\"71\" text-anchor=\"middle\">Browsers<\/text><text class=\"dg-sub\" x=\"624\" y=\"88\" text-anchor=\"middle\">in-browser<\/text><text class=\"dg-sub\" x=\"360\" y=\"160\" text-anchor=\"middle\">RTSP in — pull from cameras, ~0.5–3s, rugged &amp; standard<\/text><text class=\"dg-sub\" x=\"360\" y=\"180\" text-anchor=\"middle\">WebRTC / FastRTC out — push to browsers, &lt;500ms, low-latency<\/text><\/svg><figcaption>RTSP in from cameras, WebRTC out to browsers<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> RTSP is how IP cameras stream (pull, RTP over UDP/TCP, ~0.5–3s latency). WebRTC is how browsers stream peer-to-peer (push, sub-500ms, NAT-traversing, encrypted by default). FastRTC is a thin Python wrapper that makes WebRTC easy to wire to ML code. KoiReader ingests cameras (<strong>RTSP in<\/strong>) and serves live results to browsers/operators/agents (<strong>WebRTC/FastRTC out<\/strong>). This page is the one to know cold — the JD is \"obsess over milliseconds,\" and these three protocols <em>are<\/em> the millisecond budget at the edges of the pipeline. The middle (GStreamer + DeepStream) is sections 02–03.<\/div><\/div>\n<h2 id=\"the-mental-model\">The mental model<\/h2>\n<p>Think of it like plumbing. <strong>RTSP<\/strong> is the industrial pipe bolted to a factory camera — rugged, standard, slightly slow. <strong>WebRTC<\/strong> is the flexible hose that snakes through any firewall to reach a browser, designed for real-time calls. <strong>FastRTC<\/strong> is the quick-connect fitting so you don't hand-thread the hose.<\/p>\n<p>One sentence that frames the whole page: <strong>all three carry media over RTP.<\/strong> RTSP <em>sets up<\/em> an RTP session and lets a camera push it to you; WebRTC <em>negotiates and encrypts<\/em> an RTP session between peers across NAT; FastRTC <em>generates<\/em> the WebRTC half in Python so your model sees numpy frames. Underneath, it's the same real-time transport — they differ in <strong>how the session is established, how it traverses the network, and who's allowed to talk to whom.<\/strong><\/p>\n<hr>\n<h2 id=\"rtsp-real-time-streaming-protocol\">RTSP (Real-Time Streaming Protocol)<\/h2>\n<p><strong>What it is.<\/strong> A <em>control<\/em> protocol — the \"VCR remote\": <code>OPTIONS<\/code>, <code>DESCRIBE<\/code>, <code>SETUP<\/code>, <code>PLAY<\/code>, <code>PAUSE<\/code>, <code>TEARDOWN<\/code>. RTSP itself carries <strong>no video<\/strong>. It negotiates <em>how<\/em> the media will flow, then the actual frames ride on <strong>RTP<\/strong>, with quality/timing feedback on <strong>RTCP<\/strong>. Think of RTSP as the phone call that arranges the delivery, and RTP as the truck that shows up.<\/p>\n<p><strong>The handshake (worth knowing line-by-line for interviews):<\/strong><\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 330\" role=\"img\" aria-label=\"RTSP handshake: the client sets up the session, then RTP delivers the video\"><rect class=\"dg-box\" x=\"58\" y=\"16\" width=\"184\" height=\"42\" rx=\"12\"/><text class=\"dg-label\" x=\"150\" y=\"35\" text-anchor=\"middle\">Your pipeline<\/text><text class=\"dg-sub\" x=\"150\" y=\"52\" text-anchor=\"middle\">(client)<\/text><rect class=\"dg-box\" x=\"478\" y=\"16\" width=\"184\" height=\"42\" rx=\"12\"/><text class=\"dg-label\" x=\"570\" y=\"35\" text-anchor=\"middle\">IP camera<\/text><text class=\"dg-sub\" x=\"570\" y=\"52\" text-anchor=\"middle\">(server)<\/text><line class=\"dg-strokeB\" x1=\"150\" y1=\"58\" x2=\"150\" y2=\"316\"/><line class=\"dg-strokeB\" x1=\"570\" y1=\"58\" x2=\"570\" y2=\"316\"/><line class=\"dg-line\" x1=\"150\" y1=\"92\" x2=\"563\" y2=\"92\"/><polygon class=\"dg-arrow\" points=\"563,87 570,92 563,97\"/><text class=\"dg-accent-tx\" x=\"360\" y=\"83\" text-anchor=\"middle\">OPTIONS<\/text><text class=\"dg-sub\" x=\"360\" y=\"107\" text-anchor=\"middle\">what can you do?<\/text><line class=\"dg-line\" x1=\"150\" y1=\"142\" x2=\"563\" y2=\"142\"/><polygon class=\"dg-arrow\" points=\"563,137 570,142 563,147\"/><text class=\"dg-accent-tx\" x=\"360\" y=\"133\" text-anchor=\"middle\">DESCRIBE  → SDP<\/text><text class=\"dg-sub\" x=\"360\" y=\"157\" text-anchor=\"middle\">codec · resolution<\/text><line class=\"dg-line\" x1=\"150\" y1=\"192\" x2=\"563\" y2=\"192\"/><polygon class=\"dg-arrow\" points=\"563,187 570,192 563,197\"/><text class=\"dg-accent-tx\" x=\"360\" y=\"183\" text-anchor=\"middle\">SETUP<\/text><text class=\"dg-sub\" x=\"360\" y=\"207\" text-anchor=\"middle\">pick UDP or TCP transport<\/text><line class=\"dg-line\" x1=\"150\" y1=\"242\" x2=\"563\" y2=\"242\"/><polygon class=\"dg-arrow\" points=\"563,237 570,242 563,247\"/><text class=\"dg-accent-tx\" x=\"360\" y=\"233\" text-anchor=\"middle\">PLAY<\/text><text class=\"dg-sub\" x=\"360\" y=\"257\" text-anchor=\"middle\">start sending<\/text><rect class=\"dg-hot\" x=\"150\" y=\"288\" width=\"420\" height=\"36\" rx=\"9\"/><text class=\"dg-label\" x=\"360\" y=\"311\" text-anchor=\"middle\">◀  RTP media + RTCP stats flow<\/text><text class=\"dg-sub\" x=\"360\" y=\"322\" text-anchor=\"middle\">RTSP sets up the session · RTP carries the actual video<\/text><\/svg><figcaption>RTSP handshake: the client sets up the session, then RTP delivers the video<\/figcaption><\/figure>\n<p>After <code>PLAY<\/code>, media flows as RTP and stats as RTCP; periodic keepalives (<code>GET_PARAMETER<\/code>/<code>OPTIONS<\/code>) hold the session open until <code>TEARDOWN<\/code>.<\/p>\n<p><strong>Pattern:<\/strong> <em>Pull.<\/em> Your pipeline dials out to <code>rtsp://user:pass@cam-ip:554/stream<\/code>. Port <strong>554<\/strong> is the RTSP control channel. Note the camera is the <em>server<\/em>; you are the <em>client<\/em>. That matters for firewalls: <strong>you<\/strong> initiate, so outbound rules are usually enough.<\/p>\n<p><strong>Transport choice (the classic interview fork):<\/strong><\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Mode<\/th><th>How<\/th><th>Latency<\/th><th>Loss behavior<\/th><th>When<\/th><\/tr><\/thead><tbody><tr><td><strong>RTP/UDP<\/strong><\/td><td>media on its own UDP ports<\/td><td>lowest<\/td><td>drops → tearing/artifacts, but never stalls<\/td><td>clean LAN, latency-critical<\/td><\/tr><tr><td><strong>RTP/TCP (interleaved)<\/strong><\/td><td>media multiplexed <em>inside<\/em> the RTSP TCP connection (<code>$<\/code> channel framing)<\/td><td>slightly higher<\/td><td>reliable, retransmits, survives loss<\/td><td>flaky factory WiFi, NAT/firewall, <strong>most production multi-cam<\/strong><\/td><\/tr><tr><td><strong>RTP/UDP multicast<\/strong><\/td><td>one stream, many subscribers<\/td><td>low<\/td><td>shared<\/td><td>many viewers, controlled network<\/td><\/tr><\/tbody><\/table><\/div>\n<p>In GStreamer you pin this with <code>protocols=tcp<\/code> on <code>rtspsrc<\/code>. Default behavior tries UDP first and falls back to TCP — which you usually want to make <em>deterministic<\/em> in production by forcing one.<\/p>\n<p><strong>RTP — what's actually in the packets.<\/strong> Each RTP packet has a header with a <strong>sequence number<\/strong> (detect loss/reordering), a <strong>timestamp<\/strong> (drive playback timing, derived from a 90 kHz clock for video), an <strong>SSRC<\/strong> (which source), and a <strong>payload type<\/strong> (which codec). An H.264 keyframe is too big for one packet, so it's <strong>fragmented (FU-A)<\/strong> across many RTP packets; the depayloader (<code>rtph264depay<\/code>) reassembles them using the sequence numbers and the marker bit.<\/p>\n<p><strong>RTCP — the feedback channel.<\/strong> Sender Reports and Receiver Reports carry packet-loss %, jitter, and round-trip estimates. This is also how a sender knows to back off, and how clock sync (lip-sync between audio/video) is maintained.<\/p>\n<p><strong>The jitter buffer.<\/strong> Packets arrive unevenly. A small buffer (e.g. <code>rtspsrc latency=200<\/code>) holds frames briefly to absorb jitter and reorder before decode. <strong>This knob is a direct latency-vs-smoothness trade<\/strong> — lower = less delay but more visible glitches under loss. Expect to be asked to reason about it.<\/p>\n<p><strong>Latency:<\/strong> ~500ms–3s end to end, dominated by camera-side encoder buffering, GOP size, and your jitter buffer. (GOP/keyframe interval is covered in <a class=\"mdlink\" data-href=\"codecs-and-frames.md\" href=\"#\">codecs-and-frames.md<\/a> — long GOP = more latency + worse recovery from loss.)<\/p>\n<p><strong>Auth &amp; discovery.<\/strong> RTSP auth is usually <strong>Digest<\/strong> (sometimes Basic) over the URL. Cameras are typically discovered/configured via <strong>ONVIF<\/strong> (a SOAP/WS standard) which then hands you the RTSP URL. Good detail to drop: \"I'd pull the RTSP URI via ONVIF rather than hardcode vendor-specific paths.\"<\/p>\n<p><strong>This is what ~95% of CCTV/industrial cameras speak.<\/strong> KoiReader's \"multiple RTSP streams\" requirement lives entirely here.<\/p>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># Inspect any camera before you build a pipeline:<\/span>\n<span class=\"tok-command\">ffprobe<\/span> <span class=\"tok-flag\">-rtsp_transport<\/span> tcp rtsp://user:pass@cam-ip:<span class=\"tok-number\">554<\/span>/stream\n<span class=\"tok-comment\"># A GStreamer RTSP source (more in section 02):<\/span>\nrtspsrc location=rtsp://... protocols=tcp latency=<span class=\"tok-number\">200<\/span> ! rtph264depay ! h264parse ! ...<\/code><\/pre>\n<hr>\n<h2 id=\"webrtc\">WebRTC<\/h2>\n<p><strong>What it is.<\/strong> A <em>full<\/em> real-time media stack built for <strong>browsers and peers<\/strong>. Where RTSP just sets up RTP, WebRTC bundles everything you need to get encrypted media across the hostile public internet with no plugins: NAT traversal, key exchange, encryption, congestion control, and recovery. It's the only one of the three a browser can speak natively (<code>RTCPeerConnection<\/code>).<\/p>\n<p><strong>The four phases of a connection<\/strong> (memorize this arc — it's the most common WebRTC interview question):<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 346\" role=\"img\" aria-label=\"The four phases of every WebRTC connection — signaling is the part you build\"><rect class=\"dg-box\" x=\"120\" y=\"20\" width=\"480\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"140\" y=\"45\">1 · SIGNALING<\/text><text class=\"dg-sub\" x=\"140\" y=\"65\">SDP offer / answer — through a server you build<\/text><line class=\"dg-line\" x1=\"360\" y1=\"78\" x2=\"360\" y2=\"93\"/><polygon class=\"dg-arrow\" points=\"354,93 366,93 360,100\"/><rect class=\"dg-box\" x=\"120\" y=\"100\" width=\"480\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"140\" y=\"125\">2 · ICE<\/text><text class=\"dg-sub\" x=\"140\" y=\"145\">gather host / STUN / TURN candidates, find a path through NAT<\/text><line class=\"dg-line\" x1=\"360\" y1=\"158\" x2=\"360\" y2=\"173\"/><polygon class=\"dg-arrow\" points=\"354,173 366,173 360,180\"/><rect class=\"dg-box\" x=\"120\" y=\"180\" width=\"480\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"140\" y=\"205\">3 · DTLS<\/text><text class=\"dg-sub\" x=\"140\" y=\"225\">handshake exchanges the encryption keys<\/text><line class=\"dg-line\" x1=\"360\" y1=\"238\" x2=\"360\" y2=\"253\"/><polygon class=\"dg-arrow\" points=\"354,253 366,253 360,260\"/><rect class=\"dg-box dg-hot\" x=\"120\" y=\"260\" width=\"480\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"140\" y=\"285\">4 · SRTP<\/text><text class=\"dg-sub\" x=\"140\" y=\"305\">encrypted media flows · congestion control · NACK / FEC<\/text><\/svg><figcaption>The four phases of every WebRTC connection — signaling is the part you build<\/figcaption><\/figure>\n<p>Signaling (the SDP offer/answer exchange) is the one piece WebRTC leaves to you — a WebSocket is the usual choice. The rest (ICE, DTLS, SRTP) the stack handles.<\/p>\n<p><strong>SDP offer/answer.<\/strong> The offer is a text blob describing \"here are my codecs (H.264/VP8/VP9/AV1/Opus), resolutions, ICE credentials, DTLS fingerprint.\" The answer says \"here's what I'll accept.\" You shuttle these two blobs through your <strong>signaling server<\/strong> — that's the part you own and the part WebRTC deliberately leaves undefined (use a WebSocket).<\/p>\n<p><strong>ICE / STUN / TURN — the NAT-traversal trio (know what each does):<\/strong><\/p>\n<ul><li><strong>ICE<\/strong> is the <em>framework<\/em> that tries connection candidates in priority order<\/li><\/ul>\n<p>until one works.<\/p>\n<ul><li><strong>STUN<\/strong> is a cheap reflection service: \"what's my public IP:port as seen from<\/li><\/ul>\n<p>outside?\" Lets two peers behind NAT find a <em>direct<\/em> path. Works for most networks.<\/p>\n<ul><li><strong>TURN<\/strong> is a <em>relay<\/em> of last resort: when both peers are behind symmetric NAT and<\/li><\/ul>\n<p>can't connect directly, media bounces through the TURN server. It costs bandwidth   and money, but it's why WebRTC \"always connects.\" <strong>In an enterprise/factory   network, plan for TURN<\/strong> — that's a senior-sounding point to raise.<\/p>\n<p><strong>Congestion control.<\/strong> WebRTC adapts bitrate in real time (Google Congestion Control, driven by TWCC/REMB feedback). Under a bad link it lowers resolution/bitrate to protect latency rather than buffering. This is the philosophical opposite of HLS: WebRTC sacrifices quality to stay live; HLS buffers to stay pretty.<\/p>\n<p><strong>One-to-many: you need a media server.<\/strong> Raw WebRTC is peer-to-peer (1:1). To fan one annotated feed out to many operators you put an <strong>SFU<\/strong> (Selective Forwarding Unit — e.g. mediasoup, Janus, LiveKit, Pion) in the middle: each sender uploads once, the SFU forwards to N viewers. Don't try to mesh N peers. Naming an SFU signals you've actually shipped this.<\/p>\n<p><strong>Data channels.<\/strong> WebRTC also gives you <code>RTCDataChannel<\/code> (SCTP over DTLS) — handy for shipping <strong>detection metadata / bounding boxes alongside the video<\/strong> to the same browser with the same low latency. Nice for an annotated operator UI.<\/p>\n<p><strong>Latency:<\/strong> typically <strong>100–500ms<\/strong> — the lowest of the three, end to end.<\/p>\n<p><strong>Why a vision team cares:<\/strong> serving a live annotated feed to a dashboard, a human-in-the-loop reviewer, a remote operator, or an agent — all in-browser, no install, sub-second.<\/p>\n<p><strong>Cost / honesty:<\/strong> many moving parts (signaling server, STUN, TURN relays, possibly an SFU). More to operate than \"point ffmpeg at a URL.\" That's the trade for browser reach + lowest latency.<\/p>\n<hr>\n<h2 id=\"fastrtc\">FastRTC<\/h2>\n<p><strong>What it is.<\/strong> A Python library (from the Gradio / Hugging Face ecosystem) that wraps WebRTC so you can stream audio/video <strong>to and from Python ML code in a few lines.<\/strong> It stands up the signaling, builds the peer connection, runs the ICE/DTLS dance for you, and hands your code <strong>frames as numpy arrays<\/strong> — then takes your processed frame back and sends it out over WebRTC.<\/p>\n<p><strong>The programming model<\/strong> (this is the bit that makes it click):<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># Conceptually: you write a handler that gets a frame and returns a frame.<\/span>\n<span class=\"tok-keyword\">from<\/span> fastrtc <span class=\"tok-keyword\">import<\/span> Stream\n\n<span class=\"tok-keyword\">def<\/span> detect(frame):            <span class=\"tok-comment\"># frame: HxWx3 numpy array (BGR/RGB)<\/span>\n    boxes = model(frame)      <span class=\"tok-comment\"># your DeepStream/YOLO/whatever inference<\/span>\n    <span class=\"tok-keyword\">return<\/span> draw(frame, boxes) <span class=\"tok-comment\"># annotated frame goes back out over WebRTC<\/span>\n\nStream(handler=detect, modality=<span class=\"tok-string\">\"video\"<\/span>).ui.launch()<\/code><\/pre>\n<p>You never touch SDP, ICE, or SRTP. FastRTC is to WebRTC what <code>requests<\/code> is to raw sockets — it collapses the boilerplate so the interesting code is the model loop.<\/p>\n<p><strong>Under the hood<\/strong> it builds on <code>aiortc<\/code> (the pure-Python WebRTC implementation) and typically uses Hugging Face's infra for the STUN/TURN/signaling so it \"just works\" from a notebook or a Spaces demo.<\/p>\n<p><strong>Why it's in the JD.<\/strong> It signals they want someone who can stand up a real-time <strong>WebRTC ↔ model<\/strong> loop <em>quickly<\/em> — for browser-facing demos, operator UIs, and agent-in-the-loop review — without hand-rolling the WebRTC stack. It's the modern Python-native path to the same place a custom <code>webrtcbin<\/code> pipeline would get you.<\/p>\n<p><strong>Honest, senior framing for the interview:<\/strong><\/p>\n<blockquote><p>\"I've built real-time inference serving with Gunicorn/Celery/Kafka and GStreamer/DeepStream pipelines. FastRTC is the Python-native way to wire a live WebRTC feed straight into a model and get numpy frames — I'd reach for it for browser-facing low-latency demos and operator UIs. For high-density, hardware-accelerated production fan-out I'd still drop to GStreamer <code>webrtcbin<\/code> or an SFU, but FastRTC gets a working loop up in an afternoon.\"<\/p><\/blockquote>\n<p><strong>Limits to be aware of (so you're not oversold):<\/strong> it's pure-Python WebRTC (<code>aiortc<\/code>), so it's great for prototypes, demos, and modest concurrency, but it's <strong>not<\/strong> the path for hundreds of hardware-decoded streams — that's GStreamer + NVDEC + DeepStream territory. Know which side of that line a given problem is on.<\/p>\n<hr>\n<h2 id=\"how-they-fit-together-the-koireader-path\">How they fit together — the KoiReader path<\/h2>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 200\" role=\"img\" aria-label=\"RTSP in from cameras, GStreamer + DeepStream in the middle, WebRTC out to people\"><rect class=\"dg-box\" x=\"12\" y=\"72\" width=\"118\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"71\" y=\"100\" text-anchor=\"middle\">Cameras<\/text><text class=\"dg-sub\" x=\"71\" y=\"117\" text-anchor=\"middle\">RTSP, pull<\/text><text class=\"dg-accent-tx\" x=\"170\" y=\"92\" text-anchor=\"middle\">RTSP<\/text><line class=\"dg-line\" x1=\"130\" y1=\"102\" x2=\"205\" y2=\"102\"/><polygon class=\"dg-arrow\" points=\"205,97 212,102 205,107\"/><rect class=\"dg-box\" x=\"212\" y=\"72\" width=\"128\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"276\" y=\"100\" text-anchor=\"middle\">GStreamer<\/text><text class=\"dg-sub\" x=\"276\" y=\"117\" text-anchor=\"middle\">rtspsrc · NVDEC<\/text><line class=\"dg-line\" x1=\"340\" y1=\"102\" x2=\"385\" y2=\"102\"/><polygon class=\"dg-arrow\" points=\"385,97 392,102 385,107\"/><rect class=\"dg-box dg-hot\" x=\"392\" y=\"72\" width=\"138\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"461\" y=\"98\" text-anchor=\"middle\">DeepStream<\/text><text class=\"dg-sub\" x=\"461\" y=\"117\" text-anchor=\"middle\">infer · track<\/text><text class=\"dg-accent-tx\" x=\"566\" y=\"92\" text-anchor=\"middle\">WebRTC<\/text><line class=\"dg-line\" x1=\"530\" y1=\"102\" x2=\"597\" y2=\"102\"/><polygon class=\"dg-arrow\" points=\"597,97 604,102 597,107\"/><rect class=\"dg-box\" x=\"560\" y=\"36\" width=\"150\" height=\"132\" rx=\"12\"/><text class=\"dg-label\" x=\"635\" y=\"58\" text-anchor=\"middle\">Deliver<\/text><text class=\"dg-sub\" x=\"635\" y=\"84\" text-anchor=\"middle\">WebRTC · SFU<\/text><text class=\"dg-sub\" x=\"635\" y=\"104\" text-anchor=\"middle\">FastRTC UI<\/text><text class=\"dg-sub\" x=\"635\" y=\"124\" text-anchor=\"middle\">HLS (broadcast<\/text><text class=\"dg-sub\" x=\"635\" y=\"142\" text-anchor=\"middle\">only)<\/text><text class=\"dg-sub\" x=\"300\" y=\"186\" text-anchor=\"middle\">RTSP in  ·  GStreamer + DeepStream in the middle  ·  WebRTC out<\/text><\/svg><figcaption>RTSP in from cameras, GStreamer + DeepStream in the middle, WebRTC out to people<\/figcaption><\/figure>\n<p><strong>RTSP in, WebRTC out<\/strong> is the headline. The same RTP machinery runs end to end; GStreamer is the universal adapter in the middle — <code>rtspsrc<\/code> on the ingress, <code>webrtcbin<\/code> on the egress — which is exactly why GStreamer + DeepStream are the <em>core<\/em> job and these protocols are the edges of it.<\/p>\n<hr>\n<h2 id=\"why-x-over-y-interview-gold\">Why X over Y (interview gold)<\/h2>\n<p><strong>RTSP vs WebRTC — when each?<\/strong> RTSP to <em>ingest from cameras<\/em> (that's what they emit; you're the client pulling). WebRTC to <em>deliver to browsers/peers/agents<\/em> with the lowest latency. A real system uses <strong>both<\/strong>: RTSP in, WebRTC out. They are not competitors — they live at opposite ends of the pipe.<\/p>\n<p><strong>Why not just HTTP (HLS/DASH) for delivery?<\/strong> HLS/DASH chunk video into segments (and a playlist) → typically <strong>6–30s<\/strong> latency (low-latency HLS claws it down to ~2–5s but still loses to WebRTC). Brilliant for Netflix-style scale and CDN caching, <strong>wrong for interactive/real-time<\/strong>. Rule of thumb: <strong>HLS = broadcast, W

n the ground plane). for each track, take the bottom-center point; point-in-polygon test → inside? debounce: require the track inside for k consecutive frames before \"entered\" (reject flicker). record first_seen per track in the zone; dwell = now − first_seen. fire \"entered\" on a line-cross/zone-enter (dedup by track id so each forklift counts once); fire \"overstay\" when dwell > 10 min. emit events as metadata to the message bus (sec 06) — no full-frame egress. that answer shows geometry (polygon, ground plane), statistics (debounce, dwell), tracking literacy, and the systems instinct (metadata out). it's the bullseye for this role. why x over y box center vs bottom-center for zone tests? use bottom-center — it approximates where the object touches the floor, which is what zones are defined on. box center sits in mid-air and misreads zone membership, especially for tall objects or oblique cameras. pixel distance vs ground-plane distance? pixel distance is distorted by perspective (far objects look closer together). map foot points to the ground plane via a homography and measure in real-world units — the only way distance/zone logic is correct across the frame. why debounce/smooth instead of acting on every frame? per-frame detections flicker and jitter; acting raw produces false counts and event spam. requiring k-of-n frames (and hysteresis on enter/exit) trades a few ms of latency for robust, trustworthy events — exactly the \"statistics layer\" the jd wants. why count track ids, not detections? detection fires every frame, so counting detections counts the same object hundreds of times. counting unique track ids (that cross a line / enter a zone) counts objects once — tracking is what makes counting correct. → back to section readme · quick refresh: cv-cheat-sheet.md","words":712},{"path":"09-computer-vision-fundamentals/cv-cheat-sheet.md","title":"CV Cheat Sheet","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"cv-fundamentals-quick-refresh\">CV Fundamentals — Quick Refresh<\/h1>\n<p>One page for the classical-CV questions. Depth in the section files.<\/p>\n<hr>\n<h2 id=\"images-color\">Images &amp; color<\/h2>\n<ul><li>Image = numpy array <code>(H, W, C)<\/code>, usually <code>uint8<\/code> 0–255. Pixel ops = array slicing.<\/li><li><strong>OpenCV is BGR<\/strong>, most models want <strong>RGB<\/strong> → <code>cv2.cvtColor(..., COLOR_BGR2RGB)<\/code>.<\/li><\/ul>\n<p>Swapped channels = silent accuracy loss.<\/p>\n<ul><li>Decoders output <strong>YUV/NV12<\/strong> → convert to BGR, ideally on GPU (<code>nvvidconv<\/code>).<\/li><li><strong>HSV<\/strong> for color-based segmentation (hue is lighting-robust; RGB isn't).<\/li><\/ul>\n<h2 id=\"filtering-morphology\">Filtering &amp; morphology<\/h2>\n<ul><li>Everything classical = <strong>convolution<\/strong> (slide a kernel, weighted sum). CNN conv =<\/li><\/ul>\n<p>learned kernels.<\/p>\n<ul><li>Blur: <strong>Gaussian<\/strong> (general), <strong>median<\/strong> (salt-and-pepper), <strong>bilateral<\/strong> (smooth<\/li><\/ul>\n<p>but keep edges).<\/p>\n<ul><li>Threshold: <strong>adaptive<\/strong> beats global under uneven lighting; <strong>Otsu<\/strong> for bimodal.<\/li><li>Morphology: <strong>erode<\/strong> shrinks, <strong>dilate<\/strong> grows; <strong>opening<\/strong> removes specks,<\/li><\/ul>\n<p><strong>closing<\/strong> fills holes.<\/p>\n<ul><li>Edges: <strong>Canny<\/strong> = blur → Sobel gradient → non-max suppression → hysteresis<\/li><\/ul>\n<p>threshold (clean thin edges).<\/p>\n<h2 id=\"geometry-transforms\">Geometry &amp; transforms<\/h2>\n<ul><li>Homogeneous coords <code>(x,y,1)<\/code> make translation + projection a matrix multiply.<\/li><li><strong>Affine<\/strong> (2×3, 3 pts) keeps parallel lines: rotate/scale/shear/translate.<\/li><li><strong>Homography<\/strong> (3×3, 4 pts) models <strong>perspective<\/strong> (parallel lines converge) — the<\/li><\/ul>\n<p>transform for surround-view and <strong>mapping detections to the floor plane<\/strong>.<\/p>\n<ul><li>Interpolation: <strong>nearest<\/strong> for label/mask maps, <strong>bilinear<\/strong> for images.<\/li><\/ul>\n<h2 id=\"calibration\">Calibration<\/h2>\n<ul><li><strong>Intrinsics<\/strong> (K: fx,fy,cx,cy) + <strong>distortion<\/strong> (radial k1,k2,k3 / tangential<\/li><\/ul>\n<p>p1,p2); <strong>extrinsics<\/strong> (R,t) = pose in world.<\/p>\n<ul><li>Calibrate with a chessboard at many angles; judge by <strong>reprojection error<\/strong><\/li><\/ul>\n<p>(&lt;0.5px good).<\/p>\n<ul><li><strong>Fisheye<\/strong> needs OpenCV's dedicated model (pinhole leaves edge distortion).<\/li><li>Undistort once via precomputed remap (not <code>undistort<\/code> per frame).<\/li><\/ul>\n<h2 id=\"features-multi-view\">Features &amp; multi-view<\/h2>\n<ul><li>Detect <strong>corners<\/strong> (unique in all directions), describe, match.<\/li><li><strong>SIFT<\/strong> (float, L2, accurate) vs <strong>ORB<\/strong> (binary, Hamming, free, real-time/edge).<\/li><li><strong>RANSAC<\/strong> fits transforms robustly by ignoring outlier matches (4 pts for H).<\/li><li><strong>Fundamental matrix<\/strong> (uncalibrated) / <strong>Essential matrix<\/strong> (calibrated → gives<\/li><\/ul>\n<p>R,t). Epipolar line turns 2D match search into 1D. Triangulate → 3D.<\/p>\n<h2 id=\"detection-tracking-math\">Detection &amp; tracking math<\/h2>\n<ul><li><strong>IoU<\/strong> = overlap / union. <strong>NMS<\/strong> = sort by confidence, drop high-IoU duplicates.<\/li><li><strong>mAP<\/strong> = mean Average Precision; TP if IoU≥thresh. <code>mAP@0.5<\/code> vs COCO <code>@[.5:.95]<\/code>.<\/li><li><strong>YOLO<\/strong> = single forward pass → real-time (default for live video).<\/li><li><strong>Kalman<\/strong> predicts motion; <strong>Hungarian<\/strong> optimally assigns detections↔tracks.<\/li><li><strong>SORT<\/strong> = Kalman+IoU (fast, ID switches); <strong>DeepSORT<\/strong> adds appearance re-ID<\/li><\/ul>\n<p>(survives occlusion); <strong>ByteTrack<\/strong> uses low-conf boxes too.<\/p>\n<h2 id=\"logic-on-detections-the-jds-standout-be-ready-to-whiteboard\">Logic on detections (the JD's standout — be ready to whiteboard)<\/h2>\n<ul><li>Model gives boxes; <strong>you<\/strong> add geometry+stats: zones, counting, dwell, line-cross.<\/li><li><strong>Point-in-polygon<\/strong> with the box's <strong>bottom-center<\/strong> (where it meets the floor).<\/li><li><strong>Line-crossing<\/strong> via sign flip of cross product between frames → direction.<\/li><li>Real distance = map foot point to <strong>ground plane via homography<\/strong>, measure in<\/li><\/ul>\n<p>meters (pixels lie under perspective).<\/p>\n<ul><li><strong>Count unique track IDs<\/strong>, not detections. <strong>Debounce<\/strong> (K-of-N frames) +<\/li><\/ul>\n<p>hysteresis to kill flicker → trustworthy events.<\/p>\n<h2 id=\"your-cv-credibility-lines\">Your CV credibility lines<\/h2>\n<ul><li>Surround-view: fisheye undistort → perspective project to bird's-eye → stitch →<\/li><\/ul>\n<p>photometric blend.<\/p>\n<ul><li>Custom pedestrian tracker beating SORT on ARM. INT8/FP16 on Jetson. RANSAC,<\/li><\/ul>\n<p>SIFT/ORB, essential/fundamental matrix — all hands-on.<\/p>\n<p>→ Full detail: <strong><a class=\"mdlink\" data-href=\"README.md\" href=\"#\">README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"images-color","text":"Images &amp; color"},{"level":2,"id":"filtering-morphology","text":"Filtering &amp; morphology"},{"level":2,"id":"geometry-transforms","text":"Geometry &amp; transforms"},{"level":2,"id":"calibration","text":"Calibration"},{"level":2,"id":"features-multi-view","text":"Features &amp; multi-view"},{"level":2,"id":"detection-tracking-math","text":"Detection &amp; tracking math"},{"level":2,"id":"logic-on-detections-the-jds-standout-be-ready-to-whiteboard","text":"Logic on detections (the JD's standout — be ready to whiteboard)"},{"level":2,"id":"your-cv-credibility-lines","text":"Your CV credibility lines"}],"text":"cv fundamentals — quick refresh one page for the classical-cv questions. depth in the section files. images & color image = numpy array (h, w, c) , usually uint8 0–255. pixel ops = array slicing. opencv is bgr , most models want rgb → cv2.cvtcolor(..., color_bgr2rgb) . swapped channels = silent accuracy loss. decoders output yuv/nv12 → convert to bgr, ideally on gpu ( nvvidconv ). hsv for color-based segmentation (hue is lighting-robust; rgb isn't). filtering & morphology everything classical = convolution (slide a kernel, weighted sum). cnn conv = learned kernels. blur: gaussian (general), median (salt-and-pepper), bilateral (smooth but keep edges). threshold: adaptive beats global under uneven lighting; otsu for bimodal. morphology: erode shrinks, dilate grows; opening removes specks, closing fills holes. edges: canny = blur → sobel gradient → non-max suppression → hysteresis threshold (clean thin edges). geometry & transforms homogeneous coords (x,y,1) make translation + projection a matrix multiply. affine (2×3, 3 pts) keeps parallel lines: rotate/scale/shear/translate. homography (3×3, 4 pts) models perspective (parallel lines converge) — the transform for surround-view and mapping detections to the floor plane . interpolation: nearest for label/mask maps, bilinear for images. calibration intrinsics (k: fx,fy,cx,cy) + distortion (radial k1,k2,k3 / tangential p1,p2); extrinsics (r,t) = pose in world. calibrate with a chessboard at many angles; judge by reprojection error (<0.5px good). fisheye needs opencv's dedicated model (pinhole leaves edge distortion). undistort once via precomputed remap (not undistort per frame). features & multi-view detect corners (unique in all directions), describe, match. sift (float, l2, accurate) vs orb (binary, hamming, free, real-time/edge). ransac fits transforms robustly by ignoring outlier matches (4 pts for h). fundamental matrix (uncalibrated) / essential matrix (calibrated → gives r,t). epipolar line turns 2d match search into 1d. triangulate → 3d. detection & tracking math iou = overlap / union. nms = sort by confidence, drop high-iou duplicates. map = mean average precision; tp if iou≥thresh. map@0.5 vs coco @[.5:.95] . yolo = single forward pass → real-time (default for live video). kalman predicts motion; hungarian optimally assigns detections↔tracks. sort = kalman+iou (fast, id switches); deepsort adds appearance re-id (survives occlusion); bytetrack uses low-conf boxes too. logic on detections (the jd's standout — be ready to whiteboard) model gives boxes; you add geometry+stats: zones, counting, dwell, line-cross. point-in-polygon with the box's bottom-center (where it meets the floor). line-crossing via sign flip of cross product between frames → direction. real distance = map foot point to ground plane via homography , measure in meters (pixels lie under perspective). count unique track ids , not detections. debounce (k-of-n frames) + hysteresis to kill flicker → trustworthy events. your cv credibility lines surround-view: fisheye undistort → perspective project to bird's-eye → stitch → photometric blend. custom pedestrian tracker beating sort on arm. int8/fp16 on jetson. ransac, sift/orb, essential/fundamental matrix — all hands-on. → full detail: readme.md","words":474},{"path":"10-coding-practice/README.md","title":"Overview & What to Anticipate","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"10-coding-practice-proctored-round\">10 — Coding Practice (Proctored Round)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Your KoiReader round on <strong>4 July<\/strong> is a <em>proctored, hands-on coding test<\/em> — camera on, screen shared, <strong>no AI, no copying full solutions<\/strong> (syntax Googling only). So the goal isn't to read these — it's to be able to <strong>type them from memory<\/strong>. KoiReader's product reads labels/barcodes/packages in supply-chain video, so expect <strong>practical OpenCV + image-processing + geometry + detection-logic<\/strong> tasks that <strong>produce output images<\/strong>, not LeetCode puzzles.<\/div><\/div>\n<blockquote><p><strong>Play with the code live.<\/strong> Every problem below is also a runnable Jupyter notebook. <strong><a class=\"mdlink\" data-href=\"JUPYTER\" href=\"#\">▶ Open the live notebooks ↗<\/a><\/strong> (or use the <em>Open live notebooks<\/em> button, top-left). That opens JupyterLab running on this same device — start it first with <code>bash run.sh<\/code>, or as the <code>koi-jupyter<\/code> service (see <a class=\"mdlink\" data-href=\"../RUN-PLAYGROUND.md\" href=\"#\">Live Playground<\/a>). Reading builds memory; running builds intuition. Use both.<\/p><\/blockquote>\n<h2 id=\"what-to-anticipate-ranked-by-likelihood\">What to anticipate (ranked by likelihood)<\/h2>\n<ol><li><strong>Image preprocessing for OCR/label reading<\/strong> — grayscale, blur, Otsu/adaptive<\/li><\/ol>\n<p>threshold, morphology, denoise, CLAHE. → <a class=\"mdlink\" data-href=\"image-processing-and-geometry.md\" href=\"#\">image-processing-and-geometry.md<\/a><\/p>\n<ol><li><strong>Geometry / perspective<\/strong> — the classic \"scan a receipt/label\": detect the<\/li><\/ol>\n<p>document quadrilateral and warp it flat (4-point perspective transform),    deskew, resize-with-padding. → same file. <strong>Very likely — practice this most.<\/strong><\/p>\n<ol><li><strong>Contours &amp; shape detection<\/strong> — Canny → findContours → bounding boxes, largest<\/li><\/ol>\n<p>rectangle, crop. → same file.<\/p>\n<ol><li><strong>Logic on detections<\/strong> — IoU, NMS, point-in-polygon (zones), line-crossing<\/li><\/ol>\n<p>counting, sorting OCR boxes into reading order. → <a class=\"mdlink\" data-href=\"detection-logic.md\" href=\"#\">detection-logic.md<\/a><\/p>\n<ol><li><strong>Video / stream processing<\/strong> — open a video (or RTSP), read frames robustly,<\/li><\/ol>\n<p>motion/frame-differencing, sample every Nth frame, annotate, save output.    → <a class=\"mdlink\" data-href=\"video-and-streaming.md\" href=\"#\">video-and-streaming.md<\/a><\/p>\n<ol><li><strong>Python + NumPy engineering<\/strong> — vectorization (no Python pixel loops), a<\/li><\/ol>\n<p>fault-tolerant batch processor, basic algorithm. → <a class=\"mdlink\" data-href=\"python-and-numpy.md\" href=\"#\">python-and-numpy.md<\/a><\/p>\n<ol><li><strong>Quick reference to memorize<\/strong> — <a class=\"mdlink\" data-href=\"opencv-cheat-sheet.md\" href=\"#\">opencv-cheat-sheet.md<\/a>.<\/li><\/ol>\n<h2 id=\"how-to-practice-this-week-4-days\">How to practice this week (4 days)<\/h2>\n<ul><li><strong>Type, don't read.<\/strong> Turn off Copilot/autocomplete and rewrite each solution<\/li><\/ul>\n<p>from a blank file until it flows. That's exactly the test condition.<\/p>\n<ul><li><strong>Run everything.<\/strong> <code>pip install opencv-python numpy<\/code>. Test each script on a<\/li><\/ul>\n<p>sample image (any photo / <code>cv2<\/code> works on jpg/png). Confirm it saves the output.<\/p>\n<ul><li><strong>Day 1:<\/strong> image-processing-and-geometry (preprocessing + perspective).<\/li><li><strong>Day 2:<\/strong> detection-logic + reading order.<\/li><li><strong>Day 3:<\/strong> video-and-streaming + python-and-numpy.<\/li><li><strong>Day 4 (test morning):<\/strong> re-type the 4-point transform, IoU, NMS, and a robust<\/li><\/ul>\n<p><code>cv2.VideoCapture<\/code> loop from memory; skim the cheat sheet.<\/p>\n<h2 id=\"submission-rules-baked-into-muscle-memory\">Submission rules baked into muscle memory<\/h2>\n<p>One file <strong>per problem<\/strong> · <code>.py<\/code> as-is, <strong><code>.ipynb<\/code> → export <code>.html<\/code><\/strong> · <strong>no zip<\/strong> · <strong>upload required output images<\/strong> to the OneDrive folder · email a confirmation when done · single attempt. Losing marks for submission format is the easiest way to fail — practice <em>saving named output files<\/em> as part of every solution.<\/p>\n<h2 id=\"minimal-boilerplate-to-start-any-problem\">Minimal boilerplate to start any problem<\/h2>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\nimg = <span class=\"tok-builtin\">cv2<\/span>.imread(<span class=\"tok-string\">\"input.jpg\"<\/span>)          <span class=\"tok-comment\"># BGR, shape (H, W, 3), dtype uint8<\/span>\n<span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n    <span class=\"tok-keyword\">raise<\/span> FileNotFoundError(<span class=\"tok-string\">\"input.jpg\"<\/span>)  <span class=\"tok-comment\"># always guard reads (fault tolerance)<\/span>\n\n<span class=\"tok-comment\"># ... process ...<\/span>\n\n<span class=\"tok-builtin\">cv2<\/span>.imwrite(<span class=\"tok-string\">\"output.jpg\"<\/span>, result)      <span class=\"tok-comment\"># save the deliverable image<\/span>\n<span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">\"saved output.jpg\"<\/span>, result.shape)<\/code><\/pre>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"image-processing-and-geometry.md\" href=\"#\">image-processing-and-geometry.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-to-anticipate-ranked-by-likelihood","text":"What to anticipate (ranked by likelihood)"},{"level":2,"id":"how-to-practice-this-week-4-days","text":"How to practice this week (4 days)"},{"level":2,"id":"submission-rules-baked-into-muscle-memory","text":"Submission rules baked into muscle memory"},{"level":2,"id":"minimal-boilerplate-to-start-any-problem","text":"Minimal boilerplate to start any problem"}],"text":"10 — coding practice (proctored round) 💡 tl;dr your koireader round on 4 july is a proctored, hands-on coding test — camera on, screen shared, no ai, no copying full solutions (syntax googling only). so the goal isn't to read these — it's to be able to type them from memory . koireader's product reads labels/barcodes/packages in supply-chain video, so expect practical opencv + image-processing + geometry + detection-logic tasks that produce output images , not leetcode puzzles. play with the code live. every problem below is also a runnable jupyter notebook. ▶ open the live notebooks ↗ (or use the open live notebooks button, top-left). that opens jupyterlab running on this same device — start it first with bash run.sh , or as the koi-jupyter service (see live playground ). reading builds memory; running builds intuition. use both. what to anticipate (ranked by likelihood) image preprocessing for ocr/label reading — grayscale, blur, otsu/adaptive threshold, morphology, denoise, clahe. → image-processing-and-geometry.md geometry / perspective — the classic \"scan a receipt/label\": detect the document quadrilateral and warp it flat (4-point perspective transform), deskew, resize-with-padding. → same file. very likely — practice this most. contours & shape detection — canny → findcontours → bounding boxes, largest rectangle, crop. → same file. logic on detections — iou, nms, point-in-polygon (zones), line-crossing counting, sorting ocr boxes into reading order. → detection-logic.md video / stream processing — open a video (or rtsp), read frames robustly, motion/frame-differencing, sample every nth frame, annotate, save output. → video-and-streaming.md python + numpy engineering — vectorization (no python pixel loops), a fault-tolerant batch processor, basic algorithm. → python-and-numpy.md quick reference to memorize — opencv-cheat-sheet.md . how to practice this week (4 days) type, don't read. turn off copilot/autocomplete and rewrite each solution from a blank file until it flows. that's exactly the test condition. run everything. pip install opencv-python numpy . test each script on a sample image (any photo / cv2 works on jpg/png). confirm it saves the output. day 1: image-processing-and-geometry (preprocessing + perspective). day 2: detection-logic + reading order. day 3: video-and-streaming + python-and-numpy. day 4 (test morning): re-type the 4-point transform, iou, nms, and a robust cv2.videocapture loop from memory; skim the cheat sheet. submission rules baked into muscle memory one file per problem · .py as-is, .ipynb → export .html · no zip · upload required output images to the onedrive folder · email a confirmation when done · single attempt. losing marks for submission format is the easiest way to fail — practice saving named output files as part of every solution. minimal boilerplate to start any problem import cv2 import numpy as np img = cv2 .imread( \"input.jpg\" ) # bgr, shape (h, w, 3), dtype uint8 if img is none : raise filenotfounderror( \"input.jpg\" ) # always guard reads (fault tolerance) # ... process ... cv2 .imwrite( \"output.jpg\" , result) # save the deliverable image print ( \"saved output.jpg\" , result.shape) → start: image-processing-and-geometry.md","words":491},{"path":"10-coding-practice/image-processing-and-geometry.md","title":"Image Processing & Geometry","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"image-processing-geometry\">Image Processing &amp; Geometry<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is the heart of the test. Master the <strong>preprocessing chain<\/strong> (gray → blur → threshold → morphology) and the <strong>4-point perspective transform<\/strong> (detect a document/label quad and warp it flat). Everything here runs on a single image and saves an output image — exactly what the test asks for.<\/div><\/div>\n<p>Every solution is complete and runnable. Practice typing each from a blank file.<\/p>\n<hr>\n<h2 id=\"problem-1-preprocess-for-ocr-gray-blur-otsu-save\">Problem 1 — Preprocess for OCR (gray → blur → Otsu → save)<\/h2>\n<p><strong>Tests:<\/strong> the fundamental chain, color conversion, thresholding, saving output.<\/p>\n<p><strong>The problem:<\/strong> an OCR engine can't read a color photo — it wants crisp black-and-white where ink is cleanly separated from paper. Turn a messy photo into exactly that.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">photo (3 channels)\n   |  cvtColor        drop color, keep brightness (1 channel)\n   v\ngray\n   |  GaussianBlur    smooth away sensor noise BEFORE deciding\n   v\nsmooth gray\n   |  Otsu threshold  every pixel becomes pure 0 or 255\n   v\nblack/white  --imwrite--&gt;  saved<\/code><\/pre>\n<p><strong>Why this way:<\/strong> a fixed cutoff like <code>127<\/code> breaks the moment lighting changes. Otsu instead looks at the image's brightness histogram and picks the split point that best separates \"dark pixels\" from \"bright pixels\" — zero tuning. And blur comes <em>first<\/em> because thresholding is a hard yes/no decision: one speck of noise near the cutoff flips into a black dot. Smooth before deciding, never after.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> preprocess(path, out=<span class=\"tok-string\">\"p1_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> FileNotFoundError(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    blurred = <span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(gray, (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>)     <span class=\"tok-comment\"># denoise before threshold<\/span>\n    <span class=\"tok-comment\"># Otsu auto-picks the threshold; THRESH_BINARY_INV makes text white on black<\/span>\n    _, binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(blurred, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, binary)\n    <span class=\"tok-keyword\">return<\/span> binary\n\n<span class=\"tok-keyword\">if<\/span> __name__ == <span class=\"tok-string\">\"__main__\"<\/span>:\n    preprocess(<span class=\"tok-string\">\"input.jpg\"<\/span>)<\/code><\/pre>\n<p><strong>Watch out:<\/strong> Otsu needs a <em>single-channel<\/em> image and <code>thresh=0<\/code>. Blur first or threshold gets speckly.<\/p>\n<hr>\n<h2 id=\"problem-2-clean-a-noisy-scanned-document-adaptive-threshold-morphology\">Problem 2 — Clean a noisy scanned document (adaptive threshold + morphology)<\/h2>\n<p><strong>Tests:<\/strong> adaptive thresholding (uneven lighting) and morphology to remove specks.<\/p>\n<p><strong>The problem:<\/strong> real scans are unevenly lit — one corner sits in shadow. Any single global cutoff (even Otsu's) is then wrong <em>somewhere<\/em>: right for the bright side, hopeless for the dark side.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">uneven scan            ONE global cutoff           cutoff PER 31x31 window\n+------------+         +------------+              +------------+\n| text  #####| shadow  | text  #####|  shadow      | text  text |\n| text  #####| side    | text  #####|  swallowed   | text  text |\n+------------+         +------------+              +------------+\n                        global threshold            adaptiveThreshold<\/code><\/pre>\n<p><strong>Why this way:<\/strong> <code>adaptiveThreshold<\/code> recomputes the cutoff inside every small window, so each region is judged against its <em>own<\/em> lighting. The leftover salt noise is erased with morphological <strong>opening<\/strong> (erode → dilate): erosion deletes anything smaller than the kernel, dilation regrows the surviving text to full size. Flip to <strong>closing<\/strong> when the defect is holes inside strokes, not specks.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> clean_scan(path, out=<span class=\"tok-string\">\"p2_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path, <span class=\"tok-builtin\">cv2<\/span>.IMREAD_GRAYSCALE)\n    <span class=\"tok-keyword\">if<\/span> img <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> FileNotFoundError(path)\n    <span class=\"tok-comment\"># adaptive: threshold computed per-region → robust to shadows/gradients<\/span>\n    binary = <span class=\"tok-builtin\">cv2<\/span>.adaptiveThreshold(img, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.ADAPTIVE_THRESH_GAUSSIAN_C,\n                                   <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY, blockSize=<span class=\"tok-number\">31<\/span>, C=<span class=\"tok-number\">10<\/span>)\n    kernel = <span class=\"tok-builtin\">cv2<\/span>.getStructuringElement(<span class=\"tok-builtin\">cv2<\/span>.MORPH_RECT, (<span class=\"tok-number\">2<\/span>, <span class=\"tok-number\">2<\/span>))\n    opened = <span class=\"tok-builtin\">cv2<\/span>.morphologyEx(binary, <span class=\"tok-builtin\">cv2<\/span>.MORPH_OPEN, kernel)   <span class=\"tok-comment\"># remove small noise<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, opened)\n    <span class=\"tok-keyword\">return<\/span> opened<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>blockSize<\/code> must be <strong>odd<\/strong>. Opening removes specks; closing fills holes — pick by whether your noise is dots (open) or gaps (close).<\/p>\n<hr>\n<h2 id=\"problem-3-deskew-a-rotated-document\">Problem 3 — Deskew a rotated document<\/h2>\n<p><strong>Tests:<\/strong> geometry from foreground pixels, rotation matrix, warpAffine.<\/p>\n<p><strong>The problem:<\/strong> the page was scanned slightly rotated, so text lines are tilted and OCR row-grouping falls apart. Find the tilt angle, rotate it back.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> tilted ink pixels        fit ONE rotated box          rotate by -angle\n   \\  \\  \\  \\            .----------.                 __________\n    \\  \\  \\  \\    ==&gt;     | all text | angle=-12   ==&gt; |__________|\n     \\  \\  \\  \\           '----------'                  (upright)\n                          cv2.minAreaRect<\/code><\/pre>\n<p><strong>Why this way:<\/strong> you <em>could<\/em> detect individual lines (Hough) and average their angles, but <code>minAreaRect<\/code> answers in one call: collect every ink pixel, fit the tightest rotated rectangle around all of them, read its angle. The <code>&lt; -45<\/code> fix exists because OpenCV only reports angles within a 90° window — without the correction you'd sometimes \"deskew\" the page sideways. <code>BORDER_REPLICATE<\/code> fills the corners uncovered by rotation with edge colors instead of black wedges.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> deskew(path, out=<span class=\"tok-string\">\"p3_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(gray, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY_INV + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)[<span class=\"tok-number\">1<\/span>]\n    foreground_pixels = <span class=\"tok-builtin\">np<\/span>.column_stack(<span class=\"tok-builtin\">np<\/span>.where(binary &gt; <span class=\"tok-number\">0<\/span>))  <span class=\"tok-comment\"># (row, col) of text<\/span>\n    angle = <span class=\"tok-builtin\">cv2<\/span>.minAreaRect(foreground_pixels)[-<span class=\"tok-number\">1<\/span>]  <span class=\"tok-comment\"># angle of tightest box<\/span>\n    <span class=\"tok-keyword\">if<\/span> angle &lt; -<span class=\"tok-number\">45<\/span>:            <span class=\"tok-comment\"># OpenCV reports angle in a 90-deg range;<\/span>\n        angle = <span class=\"tok-number\">90<\/span> + angle     <span class=\"tok-comment\"># flip so we rotate the SHORT way, not 90-deg off<\/span>\n    (height, width) = img.shape[:<span class=\"tok-number\">2<\/span>]\n    rotation_matrix = <span class=\"tok-builtin\">cv2<\/span>.getRotationMatrix2D((width / <span class=\"tok-number\">2<\/span>, height / <span class=\"tok-number\">2<\/span>), angle, <span class=\"tok-number\">1.0<\/span>)\n    rotated = <span class=\"tok-builtin\">cv2<\/span>.warpAffine(img, rotation_matrix, (width, height),\n                             flags=<span class=\"tok-builtin\">cv2<\/span>.INTER_CUBIC,          <span class=\"tok-comment\"># smooth resample<\/span>\n                             borderMode=<span class=\"tok-builtin\">cv2<\/span>.BORDER_REPLICATE)  <span class=\"tok-comment\"># no black corners<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, rotated)\n    <span class=\"tok-keyword\">return<\/span> rotated<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>minAreaRect<\/code> angle conventions changed across OpenCV versions — know the <code>&lt; -45<\/code> correction and be ready to explain it.<\/p>\n<hr>\n<h2 id=\"problem-4-4-point-perspective-transform-scan-this-label\">Problem 4 — 4-point perspective transform (\"scan this label\") ⭐<\/h2>\n<p><strong>Tests:<\/strong> the single most likely task. Detect the document's 4 corners and warp it to a flat top-down view. Memorize the <code>order_points<\/code> + <code>four_point_transform<\/code> pair cold.<\/p>\n<p><strong>The problem:<\/strong> a label photographed at an angle appears as a <em>trapezoid<\/em>. To read or measure it you need the flat, top-down rectangle — like a scanner sees.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">   detected corners                          warped output\n   TL._________.TR                          TL __________ TR\n     /         \\          3x3 perspective    |           |\n    /  LABEL    \\         matrix (getPersp   |  LABEL    |\n   /             \\        + warpPerspective) |           |\n  BL._____________.BR         ==&gt;            BL __________ BR\n  find quad: Canny -&gt; contours -&gt; approxPolyDP == 4 points<\/code><\/pre>\n<p><strong>Why this way:<\/strong> an affine warp (2×3 matrix: rotate/scale/shear) can <em>never<\/em> fix this — affine preserves parallelism, and perspective distortion is exactly parallel lines converging. You need the 3×3 homography, which is fully determined by 4 point pairs — hence \"4-point transform\". <code>order_points<\/code> exists because <code>getPerspectiveTransform<\/code> pairs source and destination corners <em>by array position<\/em>: hand it corners in a random order and the output comes out mirrored or rotated. The sum/diff trick identifies each corner without if-else chains.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> order_points(points):\n    <span class=\"tok-string\">\"\"\"Return corners as [top-left, top-right, bottom-right, bottom-left].\"\"\"<\/span>\n    ordered = <span class=\"tok-builtin\">np<\/span>.zeros((<span class=\"tok-number\">4<\/span>, <span class=\"tok-number\">2<\/span>), dtype=<span class=\"tok-string\">\"float32\"<\/span>)\n    coord_sum = points.<span class=\"tok-builtin\">sum<\/span>(axis=<span class=\"tok-number\">1<\/span>)\n    ordered[<span class=\"tok-number\">0<\/span>] = points[<span class=\"tok-builtin\">np<\/span>.argmin(coord_sum)]    <span class=\"tok-comment\"># top-left has smallest x+y<\/span>\n    ordered[<span class=\"tok-number\">2<\/span>] = points[<span class=\"tok-builtin\">np<\/span>.argmax(coord_sum)]    <span class=\"tok-comment\"># bottom-right has largest x+y<\/span>\n    coord_diff = <span class=\"tok-builtin\">np<\/span>.diff(points, axis=<span class=\"tok-number\">1<\/span>)\n    ordered[<span class=\"tok-number\">1<\/span>] = points[<span class=\"tok-builtin\">np<\/span>.argmin(coord_diff)]   <span class=\"tok-comment\"># top-right has smallest y-x<\/span>\n    ordered[<span class=\"tok-number\">3<\/span>] = points[<span class=\"tok-builtin\">np<\/span>.argmax(coord_diff)]   <span class=\"tok-comment\"># bottom-left has largest y-x<\/span>\n    <span class=\"tok-keyword\">return<\/span> ordered\n\n<span class=\"tok-keyword\">def<\/span> four_point_transform(image, points):\n    ordered = order_points(points)\n    (top_left, top_right, bottom_right, bottom_left) = ordered\n    width_bottom = <span class=\"tok-builtin\">np<\/span>.linalg.norm(bottom_right - bottom_left)\n    width_top = <span class=\"tok-builtin\">np<\/span>.linalg.norm(top_right - top_left)\n    out_width = <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-builtin\">max<\/span>(width_bottom, width_top))    <span class=\"tok-comment\"># output = longest measured side<\/span>\n    height_right = <span class=\"tok-builtin\">np<\/span>.linalg.norm(top_right - bottom_right)\n    height_left = <span class=\"tok-builtin\">np<\/span>.linalg.norm(top_left - bottom_left)\n    out_height = <span class=\"tok-builtin\">int<\/span>(<span class=\"tok-builtin\">max<\/span>(height_right, height_left))\n    <span class=\"tok-comment\"># destination corners of a flat, axis-aligned rectangle (same order!)<\/span>\n    destination = <span class=\"tok-builtin\">np<\/span>.array([[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>], [out_width - <span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>],\n                            [out_width - <span class=\"tok-number\">1<\/span>, out_height - <span class=\"tok-number\">1<\/span>], [<span class=\"tok-number\">0<\/span>, out_height - <span class=\"tok-number\">1<\/span>]],\n                           dtype=<span class=\"tok-string\">\"float32\"<\/span>)\n    perspective_matrix = <span class=\"tok-builtin\">cv2<\/span>.getPerspectiveTransform(ordered, destination)\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">cv2<\/span>.warpPerspective(image, perspective_matrix, (out_width, out_height))\n\n<span class=\"tok-keyword\">def<\/span> scan(path, out=<span class=\"tok-string\">\"p4_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    ratio = img.shape[<span class=\"tok-number\">0<\/span>] / <span class=\"tok-number\">500.0<\/span>\n    resized = <span class=\"tok-builtin\">cv2<\/span>.resize(img, (<span class=\"tok-builtin\">int<\/span>(img.shape[<span class=\"tok-number\">1<\/span>] / ratio), <span class=\"tok-number\">500<\/span>))\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(resized, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(<span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(gray, (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">75<\/span>, <span class=\"tok-number\">200<\/span>)\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(edges, <span class=\"tok-builtin\">cv2<\/span>.RETR_LIST, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    contours = sorted(contours, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea, reverse=<span class=\"tok-keyword\">True<\/span>)[:<span class=\"tok-number\">5<\/span>]\n    document_corners = <span class=\"tok-keyword\">None<\/span>\n    <span class=\"tok-keyword\">for<\/span> contour <span class=\"tok-keyword\">in<\/span> contours:\n        perimeter = <span class=\"tok-builtin\">cv2<\/span>.arcLength(contour, <span class=\"tok-keyword\">True<\/span>)\n        corners = <span class=\"tok-builtin\">cv2<\/span>.approxPolyDP(contour, <span class=\"tok-number\">0.02<\/span> * perimeter, <span class=\"tok-keyword\">True<\/span>)  <span class=\"tok-comment\"># simplify<\/span>\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">len<\/span>(corners) == <span class=\"tok-number\">4<\/span>:                              <span class=\"tok-comment\"># found a quadrilateral<\/span>\n            document_corners = corners.reshape(<span class=\"tok-number\">4<\/span>, <span class=\"tok-number\">2<\/span>) * ratio  <span class=\"tok-comment\"># scale to full res<\/span>\n            <span class=\"tok-keyword\">break<\/span>\n    <span class=\"tok-keyword\">if<\/span> document_corners <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>:\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">\"no 4-corner document found\"<\/span>)\n    warped = four_point_transform(img, document_corners.astype(<span class=\"tok-string\">\"float32\"<\/span>))\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, warped)\n    <span class=\"tok-keyword\">return<\/span> warped<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>getPerspectiveTransform<\/code> needs <strong>float32<\/strong> points in a consistent order — that's why <code>order_points<\/code> exists. Scale corners back up if you detected on a resized copy.<\/p>\n<hr>\n<h2 id=\"problem-5-find-and-crop-the-largest-rectangle-document-boundary\">Problem 5 — Find and crop the largest rectangle (document boundary)<\/h2>\n<p><strong>Tests:<\/strong> Canny + contours + <code>approxPolyDP<\/code> + bounding-box crop.<\/p>\n<p><strong>The problem:<\/strong> isolate just the document/label from the photo background — the \"crop out the interesting part\" task.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">photo --blur+Canny--&gt; edge map --findContours--&gt; [c1, c2, c3, ...]\n                                                  |  max(key=contourArea)\n                                                  v\n                                            page outline\n                                                  |  boundingRect\n                                                  v\n                                       img[y:y+h, x:x+w]  (pure slicing)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> thresholding works only if the page is clearly brighter than the background; <em>edges<\/em> survive even when brightnesses are similar. <code>RETR_EXTERNAL<\/code> keeps only outermost contours, so \"largest\" means the page outline — not a logo or text block inside it. <code>boundingRect<\/code> returns an axis-aligned box, croppable with a slice; if the document is tilted, this crop keeps background wedges — that's when you upgrade to Problem 4's perspective warp.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> crop_largest_rect(path, out=<span class=\"tok-string\">\"p5_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(<span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(gray, (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">50<\/span>, <span class=\"tok-number\">150<\/span>)  <span class=\"tok-comment\"># low:high ~ 1:3<\/span>\n    <span class=\"tok-comment\"># RETR_EXTERNAL = outermost contours only (ignore holes/children)<\/span>\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(edges, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> contours:\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">\"no contours\"<\/span>)\n    largest = <span class=\"tok-builtin\">max<\/span>(contours, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea)\n    x, y, w, h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(largest)\n    crop = img[y:y + h, x:x + w]\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, crop)\n    <span class=\"tok-keyword\">return<\/span> crop<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>img[y:y+h, x:x+w]<\/code> — rows first (y), then cols (x). A frequent slip.<\/p>\n<hr>\n<h2 id=\"problem-6-resize-keeping-aspect-ratio-pad-to-square-letterbox\">Problem 6 — Resize keeping aspect ratio, pad to square (letterbox)<\/h2>\n<p><strong>Tests:<\/strong> the standard model-input preprocessing; aspect-ratio math, padding.<\/p>\n<p><strong>The problem:<\/strong> detection models want a fixed square input (e.g. 640×640) but photos come in any shape. Naive <code>resize<\/code> to a square squashes objects.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">   stretch (bad)             letterbox (good)\n  +-----------+             +-----------+\n  | oO -&gt; oOO |             |###########|  &lt;- gray pad (114)\n  | distorted!|             |   image   |\n  +-----------+             | untouched |\n                            |###########|\n                     scale by LONG side, pad the rest<\/code><\/pre>\n<p><strong>Why this way:<\/strong> three options exist. Stretching distorts geometry — a square carton becomes a rectangle and the model's learned shapes break. Center-cropping keeps shapes but throws away edge pixels (where detections might be). Letterboxing keeps <em>every pixel and every shape<\/em>, paying only some wasted pad. Keep the scale and offsets — you need them to map detections back to the original image coordinates.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> letterbox(path, size=<span class=\"tok-number\">640<\/span>, out=<span class=\"tok-string\">\"p6_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    h, w = img.shape[:<span class=\"tok-number\">2<\/span>]\n    scale = size / <span class=\"tok-builtin\">max<\/span>(h, w)                         <span class=\"tok-comment\"># fit the LONG side<\/span>\n    new_w, new_h = <span class=\"tok-builtin\">int<\/span>(w * scale), <span class=\"tok-builtin\">int<\/span>(h * scale)\n    resized = <span class=\"tok-builtin\">cv2<\/span>.resize(img, (new_w, new_h), interpolation=<span class=\"tok-builtin\">cv2<\/span>.INTER_AREA)\n    canvas = <span class=\"tok-builtin\">np<\/span>.full((size, size, <span class=\"tok-number\">3<\/span>), <span class=\"tok-number\">114<\/span>, dtype=<span class=\"tok-builtin\">np<\/span>.uint8)  <span class=\"tok-comment\"># 114 = YOLO pad-gray<\/span>\n    top, left = (size - new_h) // <span class=\"tok-number\">2<\/span>, (size - new_w) // <span class=\"tok-number\">2<\/span>\n    canvas[top:top + new_h, left:left + new_w] = resized\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, canvas)\n    <span class=\"tok-keyword\">return<\/span> canvas<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>INTER_AREA<\/code> for shrinking, <code>INTER_LINEAR/CUBIC<\/code> for enlarging. Keep the scale + padding offsets if you later need to map detections back.<\/p>\n<hr>\n<h2 id=\"problem-7-boost-contrast-on-a-dark-image-clahe\">Problem 7 — Boost contrast on a dark image (CLAHE)<\/h2>\n<p><strong>Tests:<\/strong> histogram equalization done right (local, on luminance only).<\/p>\n<p><strong>The problem:<\/strong> a dark, low-contrast image has all its pixel values bunched into a narrow band — details exist but are invisible.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> histogram before              after CLAHE\n |#                            |   #   #\n |##                           |  ##  ## #\n |###._____________            |.##.####.##._____\n 0              255            0              255\n values crammed left           spread out - per tile, clip-limited<\/code><\/pre>\n<p><strong>Why this way:<\/strong> plain <code>equalizeHist<\/code> uses ONE histogram for the whole image — it blows out regions that were already bright and massively amplifies noise in flat areas. CLAHE fixes both failure modes: it equalizes per <strong>tile<\/strong> (adapts to local lighting) and <strong>clips<\/strong> each histogram (caps noise amplification). Doing it on the L channel of LAB is what preserves color — equalizing B, G, R separately changes their <em>ratios<\/em>, which literally changes the colors.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> enhance(path, out=<span class=\"tok-string\">\"p7_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    lab = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2LAB)       <span class=\"tok-comment\"># equalize L, keep color<\/span>\n    lightness, green_red, blue_yellow = <span class=\"tok-builtin\">cv2<\/span>.split(lab)\n    clahe = <span class=\"tok-builtin\">cv2<\/span>.createCLAHE(clipLimit=<span class=\"tok-number\">2.0<\/span>, tileGridSize=(<span class=\"tok-number\">8<\/span>, <span class=\"tok-number\">8<\/span>))\n    equalized_lightness = clahe.apply(lightness)\n    merged = <span class=\"tok-builtin\">cv2<\/span>.merge((equalized_lightness, green_red, blue_yellow))\n    out_img = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(merged, <span class=\"tok-builtin\">cv2<\/span>.COLOR_LAB2BGR)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, out_img)\n    <span class=\"tok-keyword\">return<\/span> out_img<\/code><\/pre>\n<p><strong>Watch out:<\/strong> equalize the <strong>L<\/strong> channel in LAB (or V in HSV), never the raw BGR channels — that wrecks color. CLAHE (local) beats global <code>equalizeHist<\/code> for uneven lighting.<\/p>\n<hr>\n<h1 id=\"more-practice-classic-cv-interview-problems\">More practice — classic CV interview problems<\/h1>\n<p>Eight more exercises in the same style: short functions, one idea each. The setup assets include <code>color.jpg<\/code>, <code>barcode.jpg<\/code>, and <code>lines.jpg<\/code> for these.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>#<\/th><th>Topic<\/th><th>Core API<\/th><\/tr><\/thead><tbody><tr><td>E1<\/td><td>Find object by color<\/td><td><code>cvtColor(HSV)<\/code> + <code>inRange<\/code><\/td><\/tr><tr><td>E2<\/td><td>Template matching<\/td><td><code>matchTemplate<\/code> + <code>minMaxLoc<\/code><\/td><\/tr><tr><td>E3<\/td><td>Rotate without cropping<\/td><td>rotation matrix math<\/td><\/tr><tr><td>E4<\/td><td>Blur/mask a region<\/td><td>ROI slicing + <code>bitwise_and<\/code><\/td><\/tr><tr><td>E5<\/td><td>Locate a barcode<\/td><td>Sobel gradient + morphology<\/td><\/tr><tr><td>E6<\/td><td>Detect table lines<\/td><td><code>Canny<\/code> + <code>HoughLinesP<\/code><\/td><\/tr><tr><td>E7<\/td><td>Convolution from scratch<\/td><td>NumPy only<\/td><\/tr><tr><td>E8<\/td><td>Filter contours by shape<\/td><td>area / aspect / extent<\/td><\/tr><\/tbody><\/table><\/div>\n<hr>\n<h2 id=\"problem-e1-find-an-object-by-color-hsv-inrange\">Problem E1 — Find an object by color (HSV + inRange)<\/h2>\n<p><strong>Tests:<\/strong> color spaces. HSV separates <em>what color<\/em> (H) from <em>how bright<\/em> (V), so a single hue range survives lighting changes that would break BGR thresholds.<\/p>\n<p><strong>The problem:<\/strong> find \"the green object\" reliably — even when the lighting makes its RGB values completely different from yesterday's photo.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> In BGR, \"green\" = (30,90,20)? (80,200,90)? (40,140,60)?  moves with lighting!\n In HSV, hue stays ~60 whether the scene is dim or bright.\n\n cvtColor(HSV) -&gt; inRange(lo, hi) -&gt; binary mask -&gt; open (despeckle)\n              -&gt; largest contour -&gt; boundingRect<\/code><\/pre>\n<p><strong>Why this way:<\/strong> in BGR all three numbers change together when light dims, so no fixed BGR box captures \"green\". HSV factors a pixel into hue (<em>which<\/em> color), saturation (how vivid), value (how bright) — lighting mostly moves V, so a stable H range does the job. A learned segmentation model could too, but when the target color is known, two thresholds beat a neural net.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_color_object(path, lower_hsv, upper_hsv, out=<span class=\"tok-string\">\"e1_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    hsv = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2HSV)          <span class=\"tok-comment\"># hue is lighting-robust<\/span>\n    mask = <span class=\"tok-builtin\">cv2<\/span>.inRange(hsv, <span class=\"tok-builtin\">np<\/span>.array(lower_hsv), <span class=\"tok-builtin\">np<\/span>.array(upper_hsv))  <span class=\"tok-comment\"># 255 inside range<\/span>\n    mask = <span class=\"tok-builtin\">cv2<\/span>.morphologyEx(mask, <span class=\"tok-builtin\">cv2<\/span>.MORPH_OPEN, <span class=\"tok-builtin\">np<\/span>.ones((<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>), <span class=\"tok-builtin\">np<\/span>.uint8))  <span class=\"tok-comment\"># kill specks<\/span>\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(mask, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> contours:\n        <span class=\"tok-keyword\">return<\/span> img, <span class=\"tok-keyword\">None<\/span>\n    x, y, w, h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(<span class=\"tok-builtin\">max<\/span>(contours, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea))  <span class=\"tok-comment\"># biggest blob<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.rectangle(img, (x, y), (x + w, y + h), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">255<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img, (x, y, w, h)<\/code><\/pre>\n<p><strong>Watch out:<\/strong> OpenCV hue runs <strong>0–179<\/strong> (not 0–359). Red wraps around 0, so red needs <strong>two<\/strong> ranges (<code>0-10<\/code> and <code>170-179<\/code>) OR-ed together with <code>cv2.bitwise_or<\/code>.<\/p>\n<hr>\n<h2 id=\"problem-e2-template-matching-find-a-logo-stamp\">Problem E2 — Template matching (find a logo / stamp)<\/h2>\n<p><strong>Tests:<\/strong> <code>matchTemplate<\/code> slides the template over the image and scores every position; <code>minMaxLoc<\/code> finds the best one.<\/p>\n<p><strong>The problem:<\/strong> find where a known patch — a logo, stamp, or icon — appears inside a larger image.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> template slides across the image; every position gets a similarity score\n      +----------------+\n      | .1 .2 .1 .0 .1 |      the brightest cell of the\n      | .2 .9 .3 .1 .0 | &lt;--  score map is the best match:\n      | .1 .3 .2 .1 .1 |      minMaxLoc finds it\n      +----------------+<\/code><\/pre>\n<p><strong>Why this way:<\/strong> when the target's scale and rotation are fixed (same camera, same layout — typical for documents), template matching is exact, tiny, and needs zero training. Know its failure mode out loud: any scale or rotation change kills the score — <em>that's<\/em> when you reach for feature matching (ORB/SIFT + homography) or a trained detector. <code>TM_CCOEFF_NORMED<\/code> is the mode to memorize: scores normalized to [-1, 1] mean one threshold works everywhere.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_template(image_path, template, threshold=<span class=\"tok-number\">0.8<\/span>, out=<span class=\"tok-string\">\"e2_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(image_path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    <span class=\"tok-comment\"># TM_CCOEFF_NORMED gives scores in [-1, 1]; 1.0 = perfect match<\/span>\n    scores = <span class=\"tok-builtin\">cv2<\/span>.matchTemplate(gray, template, <span class=\"tok-builtin\">cv2<\/span>.TM_CCOEFF_NORMED)\n    _, best_score, _, best_loc = <span class=\"tok-builtin\">cv2<\/span>.minMaxLoc(scores)   <span class=\"tok-comment\"># (min, max, minLoc, maxLoc)<\/span>\n    h, w = template.shape\n    <span class=\"tok-keyword\">if<\/span> best_score &gt;= threshold:\n        <span class=\"tok-builtin\">cv2<\/span>.rectangle(img, best_loc, (best_loc[<span class=\"tok-number\">0<\/span>] + w, best_loc[<span class=\"tok-number\">1<\/span>] + h), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img, best_score<\/code><\/pre>\n<p><strong>Watch out:<\/strong> template matching is <strong>not<\/strong> scale- or rotation-invariant — say this in the interview. For <em>all<\/em> matches above the threshold use <code>ys, xs = np.where(scores &gt;= threshold)<\/code> instead of <code>minMaxLoc<\/code>.<\/p>\n<hr>\n<h2 id=\"problem-e3-rotate-by-any-angle-without-cropping-corners\">Problem E3 — Rotate by any angle <em>without<\/em> cropping corners<\/h2>\n<p><strong>Tests:<\/strong> the classic gotcha — <code>warpAffine<\/code> to the original size clips the corners. Grow the canvas and shift the rotation center.<\/p>\n<p><strong>The problem:<\/strong> rotate an image by 30° and the corners vanish — because <code>warpAffine<\/code> renders into a canvas of the <em>original<\/em> size.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> same-size canvas (clips)          grown canvas (fits)\n +------------+                +--------------------+\n |  /\\ lost   |                |        /\\          |\n | /  \\       |      ==&gt;       |       /  \\         |\n | \\  /       |                |       \\  /         |\n |  \\/ lost   |                |        \\/          |\n +------------+                +--------------------+\n                               new_w = h|sin| + w|cos|\n                               new_h = h|cos| + w|sin|\n                               then shift M's translation to recenter<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the rotated image's bounding box comes straight from projecting w and h through |cos| and |sin| — and the rotation matrix already <em>contains<\/em> those values, so no extra trig. The naive alternative — pad the image heavily, rotate, crop — works but wastes memory and adds a step. Bonus answer: for exact 90/180/270 use <code>cv2.rotate<\/code>, which is lossless and instant.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> rotate_bound(path, angle, out=<span class=\"tok-string\">\"e3_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    h, w = img.shape[:<span class=\"tok-number\">2<\/span>]\n    center = (w / <span class=\"tok-number\">2<\/span>, h / <span class=\"tok-number\">2<\/span>)\n    M = <span class=\"tok-builtin\">cv2<\/span>.getRotationMatrix2D(center, angle, <span class=\"tok-number\">1.0<\/span>)\n    cos, sin = <span class=\"tok-builtin\">abs<\/span>(M[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>]), <span class=\"tok-builtin\">abs<\/span>(M[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">1<\/span>])     <span class=\"tok-comment\"># matrix already holds cos/sin<\/span>\n    new_w = <span class=\"tok-builtin\">int<\/span>(h * sin + w * cos)            <span class=\"tok-comment\"># bounding box of the rotated image<\/span>\n    new_h = <span class=\"tok-builtin\">int<\/span>(h * cos + w * sin)\n    M[<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">2<\/span>] += new_w / <span class=\"tok-number\">2<\/span> - center[<span class=\"tok-number\">0<\/span>]          <span class=\"tok-comment\"># shift translation so the result<\/span>\n    M[<span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">2<\/span>] += new_h / <span class=\"tok-number\">2<\/span> - center[<span class=\"tok-number\">1<\/span>]          <span class=\"tok-comment\"># stays centered in the new canvas<\/span>\n    rotated = <span class=\"tok-builtin\">cv2<\/span>.warpAffine(img, M, (new_w, new_h))\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, rotated)\n    <span class=\"tok-keyword\">return<\/span> rotated<\/code><\/pre>\n<p><strong>Watch out:<\/strong> positive angle = <strong>counter-clockwise<\/strong> in OpenCV. If you only ever need 90/180/270, use <code>cv2.rotate(img, cv2.ROTATE_90_CLOCKWISE)<\/code> — it's exact and fast.<\/p>\n<hr>\n<h2 id=\"problem-e4-blur-a-region-apply-a-mask-privacy-blur\">Problem E4 — Blur a region + apply a mask (privacy blur)<\/h2>\n<p><strong>Tests:<\/strong> ROI slicing (views write back in place!) and <code>bitwise_and<\/code> masking — the two building blocks of every \"redact this part\" task.<\/p>\n<p><strong>The problem:<\/strong> redact part of an image — blur an address, hide a face, or keep only a region of interest.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> roi = img[y:y+h, x:x+w]     &lt;- this is a VIEW (a window into img), not a copy\n img[y:y+h, x:x+w] = blur(roi)  &lt;- writing back mutates the original in place\n\n non-rectangular?  build a mask  -&gt;  bitwise_and(img, img, mask=mask)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> NumPy slices share memory with the parent array — that's what makes redaction a two-liner with no copying. It's also the classic bug source: mutate a slice you thought was independent. Say both sides of that coin. And for <em>real<\/em> privacy prefer solid fill or heavy pixelation over Gaussian blur — mild blurs have been reversed in practice.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> blur_region(path, rect, out=<span class=\"tok-string\">\"e4_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    x, y, w, h = rect\n    roi = img[y:y + h, x:x + w]               <span class=\"tok-comment\"># a VIEW into img, not a copy<\/span>\n    img[y:y + h, x:x + w] = <span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(roi, (<span class=\"tok-number\">31<\/span>, <span class=\"tok-number\">31<\/span>), <span class=\"tok-number\">0<\/span>)  <span class=\"tok-comment\"># write blur back<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img\n\n<span class=\"tok-keyword\">def<\/span> keep_masked(img, mask):\n    <span class=\"tok-comment\"># keep pixels where mask &gt; 0, zero elsewhere (mask must be uint8, 1-channel)<\/span>\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">cv2<\/span>.bitwise_and(img, img, mask=mask)<\/code><\/pre>\n<p><strong>Watch out:<\/strong> blur kernel sizes must be <strong>odd<\/strong>. Slices are views — mutating <code>roi<\/code> mutates <code>img<\/code>; call <code>.copy()<\/code> when you <em>don't<\/em> want that.<\/p>\n<hr>\n<h2 id=\"problem-e5-locate-a-barcode-gradient-morphology\">Problem E5 — Locate a barcode (gradient + morphology) ⭐<\/h2>\n<p><strong>Tests:<\/strong> a logistics classic. Barcodes have strong <strong>horizontal<\/strong> gradient and weak vertical gradient; morphological closing glues the bars into one blob.<\/p>\n<p><strong>The problem:<\/strong> find WHERE the barcode sits on a shipping label — any barcode, any content, no training data.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> barcode = || ||| | || |||    a patch of DENSE VERTICAL EDGES\n d/dx  -&gt; fires on every bar edge (HIGH)\n d/dy  -&gt; bars are vertical, nothing changes vertically (~0)\n\n grad_x - grad_y  -&gt;  bright exactly where \"vertical-edge-ness\" is high\n       |  blur + Otsu       speckled blob over the bars\n       |  close (21x7)      wide flat kernel bridges the GAPS between bars\n       v                    ==&gt; one solid rectangle\n minAreaRect of biggest contour = barcode box<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the <em>content<\/em> of barcodes varies but their texture signature — many parallel vertical edges — never does, so a gradient filter finds them with zero training. The closing kernel's shape is the insight: wide and flat, because the gaps to bridge are horizontal. A neural detector also works, but this runs in milliseconds on a CPU — the classic logistics-pipeline answer.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_barcode(path, out=<span class=\"tok-string\">\"e5_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    grad_x = <span class=\"tok-builtin\">cv2<\/span>.Sobel(gray, <span class=\"tok-builtin\">cv2<\/span>.CV_32F, <span class=\"tok-number\">1<\/span>, <span class=\"tok-number\">0<\/span>)     <span class=\"tok-comment\"># d/dx: bars fire strongly<\/span>\n    grad_y = <span class=\"tok-builtin\">cv2<\/span>.Sobel(gray, <span class=\"tok-builtin\">cv2<\/span>.CV_32F, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">1<\/span>)     <span class=\"tok-comment\"># d/dy: bars barely fire<\/span>\n    gradient = <span class=\"tok-builtin\">cv2<\/span>.convertScaleAbs(grad_x - grad_y)  <span class=\"tok-comment\"># keep x-heavy regions<\/span>\n    blurred = <span class=\"tok-builtin\">cv2<\/span>.blur(gradient, (<span class=\"tok-number\">9<\/span>, <span class=\"tok-number\">9<\/span>))\n    _, thresh = <span class=\"tok-builtin\">cv2<\/span>.threshold(blurred, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)\n    <span class=\"tok-comment\"># wide flat kernel: close the GAPS between bars into one solid rectangle<\/span>\n    kernel = <span class=\"tok-builtin\">cv2<\/span>.getStructuringElement(<span class=\"tok-builtin\">cv2<\/span>.MORPH_RECT, (<span class=\"tok-number\">21<\/span>, <span class=\"tok-number\">7<\/span>))\n    closed = <span class=\"tok-builtin\">cv2<\/span>.morphologyEx(thresh, <span class=\"tok-builtin\">cv2<\/span>.MORPH_CLOSE, kernel)\n    closed = <span class=\"tok-builtin\">cv2<\/span>.erode(closed, <span class=\"tok-keyword\">None<\/span>, iterations=<span class=\"tok-number\">4<\/span>)   <span class=\"tok-comment\"># drop small leftovers<\/span>\n    closed = <span class=\"tok-builtin\">cv2<\/span>.dilate(closed, <span class=\"tok-keyword\">None<\/span>, iterations=<span class=\"tok-number\">4<\/span>)  <span class=\"tok-comment\"># restore the big blob<\/span>\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(closed, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> contours:\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">\"no barcode found\"<\/span>)\n    rect = <span class=\"tok-builtin\">cv2<\/span>.minAreaRect(<span class=\"tok-builtin\">max<\/span>(contours, key=<span class=\"tok-builtin\">cv2<\/span>.contourArea))  <span class=\"tok-comment\"># rotated rect<\/span>\n    box = <span class=\"tok-builtin\">cv2<\/span>.boxPoints(rect).astype(<span class=\"tok-builtin\">int<\/span>)                       <span class=\"tok-comment\"># its 4 corners<\/span>\n    <span class=\"tok-builtin\">cv2<\/span>.drawContours(img, [box], -<span class=\"tok-number\">1<\/span>, (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img<\/code><\/pre>\n<p><strong>Watch out:<\/strong> this only <em>localizes<\/em> — decoding needs <code>cv2.barcode_BarcodeDetector<\/code> or <code>pyzbar<\/code>. If the barcode may be rotated, run on both <code>grad_x - grad_y<\/code> and <code>grad_y - grad_x<\/code>, keep the stronger response.<\/p>\n<hr>\n<h2 id=\"problem-e6-detect-table-document-lines-hough-transform\">Problem E6 — Detect table / document lines (Hough transform)<\/h2>\n<p><strong>Tests:<\/strong> <code>HoughLinesP<\/code> — the go-to for finding straight structure (table grids, form fields, document edges).<\/p>\n<p><strong>The problem:<\/strong> find the straight lines in a document — table grids, form boxes, underlines.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> Canny edge pixels ==&gt; each edge pixel VOTES for every line that\n                       could pass through it (Hough accumulator)\n                       lines collecting &gt;= threshold votes win\n HoughLinesP returns real SEGMENTS: (x1, y1, x2, y2) with endpoints<\/code><\/pre>\n<p><strong>Why this way:<\/strong> voting makes Hough robust to broken edges — a line missing a third of its pixels still wins the vote. Choose <code>HoughLinesP<\/code> (probabilistic) over <code>HoughLines<\/code>: it hands you finite segments you can draw and measure, not infinite (rho, theta) pairs you'd have to convert. Alternative worth naming: to <em>separate<\/em> horizontal from vertical table lines, morphological opening with a long thin kernel (e.g. <code>(40, 1)<\/code>) is even simpler than Hough.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_lines(path, out=<span class=\"tok-string\">\"e6_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    edges = <span class=\"tok-builtin\">cv2<\/span>.Canny(gray, <span class=\"tok-number\">50<\/span>, <span class=\"tok-number\">150<\/span>)\n    <span class=\"tok-comment\"># probabilistic Hough: returns finite SEGMENTS (x1,y1,x2,y2), not infinite lines<\/span>\n    lines = <span class=\"tok-builtin\">cv2<\/span>.HoughLinesP(edges, rho=<span class=\"tok-number\">1<\/span>, theta=<span class=\"tok-builtin\">np<\/span>.pi / <span class=\"tok-number\">180<\/span>, threshold=<span class=\"tok-number\">80<\/span>,\n                            minLineLength=<span class=\"tok-number\">100<\/span>, maxLineGap=<span class=\"tok-number\">10<\/span>)\n    <span class=\"tok-keyword\">for<\/span> line <span class=\"tok-keyword\">in<\/span> (lines <span class=\"tok-keyword\">if<\/span> lines <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span> <span class=\"tok-keyword\">else<\/span> []):   <span class=\"tok-comment\"># lines is None if none found<\/span>\n        x1, y1, x2, y2 = line[<span class=\"tok-number\">0<\/span>]\n        <span class=\"tok-builtin\">cv2<\/span>.line(img, (x1, y1), (x2, y2), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>), <span class=\"tok-number\">2<\/span>)\n    <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img, <span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">if<\/span> lines <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span> <span class=\"tok-keyword\">else<\/span> <span class=\"tok-builtin\">len<\/span>(lines)<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>rho=1, theta=np.pi/180<\/code> are resolutions, not limits. To split a table into horizontal/vertical lines, morphology is often cleaner: erode+dilate with a long thin kernel like <code>(40, 1)<\/code> keeps only horizontal strokes.<\/p>\n<hr>\n<h2 id=\"problem-e7-2d-convolution-from-scratch-numpy-only\">Problem E7 — 2D convolution from scratch (NumPy only)<\/h2>\n<p><strong>Tests:<\/strong> do you understand what <code>filter2D<\/code> actually does? Loop over the small <strong>kernel<\/strong>, never over pixels — that keeps it vectorized <em>and<\/em> short.<\/p>\n<p><strong>The problem:<\/strong> implement image filtering yourself — the \"do you actually know what <code>filter2D<\/code> does?\" question.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> kernel   0 -1  0      each output pixel = weighted sum of its\n         -1  5 -1      3x3 neighborhood (here: sharpen)\n          0 -1  0\n\n naive:  loop over 350,000 pixels x 9 weights  -&gt;  millions of Python steps\n smart:  loop over the 9 WEIGHTS; each step shifts the whole image and\n         adds it, weighted  -&gt;  9 vectorized array ops, same math<\/code><\/pre>\n<p><strong>Why this way:<\/strong> both loop orders compute the identical sum — but flipping them moves the heavy loop from the Python interpreter into NumPy's C code, a ~1000x speedup for the same line count. This \"make the big loop the vectorized one\" trick generalizes far beyond convolution. Edge-padding by half the kernel keeps output size equal to input ('same' convolution, like filter2D's default).<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> convolve2d(img, kernel):\n    kh, kw = kernel.shape\n    pad_h, pad_w = kh // <span class=\"tok-number\">2<\/span>, kw // <span class=\"tok-number\">2<\/span>\n    <span class=\"tok-comment\"># pad edges so output size == input size ('same' convolution)<\/span>\n    padded = <span class=\"tok-builtin\">np<\/span>.pad(img.astype(<span class=\"tok-builtin\">np<\/span>.float32), ((pad_h, pad_h), (pad_w, pad_w)), mode=<span class=\"tok-string\">\"edge\"<\/span>)\n    out = <span class=\"tok-builtin\">np<\/span>.zeros(img.shape, <span class=\"tok-builtin\">np<\/span>.float32)\n    <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(kh):                     <span class=\"tok-comment\"># 3x3 kernel = 9 iterations total,<\/span>\n        <span class=\"tok-keyword\">for<\/span> j <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">range<\/span>(kw):                 <span class=\"tok-comment\"># each one a whole-image NumPy op<\/span>\n            out += kernel[i, j] * padded[i:i + img.shape[<span class=\"tok-number\">0<\/span>], j:j + img.shape[<span class=\"tok-number\">1<\/span>]]\n    <span class=\"tok-keyword\">return<\/span> <span class=\"tok-builtin\">np<\/span>.clip(out, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>).astype(<span class=\"tok-builtin\">np<\/span>.uint8)   <span class=\"tok-comment\"># clip BEFORE uint8 or it wraps<\/span><\/code><\/pre>\n<p><strong>Watch out:<\/strong> true convolution flips the kernel; this (and <code>filter2D<\/code>) computes <strong>correlation<\/strong> — identical for symmetric kernels. Casting negatives straight to uint8 silently wraps (-1 → 255): always <code>np.clip<\/code> first.<\/p>\n<hr>\n<h2 id=\"problem-e8-filter-contours-by-shape-find-label-like-rectangles\">Problem E8 — Filter contours by shape (find label-like rectangles)<\/h2>\n<p><strong>Tests:<\/strong> turning raw contours into decisions with cheap shape stats: area, aspect ratio, and <em>extent<\/em> (how much of its bounding box the shape fills).<\/p>\n<p><strong>The problem:<\/strong> contour detection found twenty shapes — which ones are actually labels (rectangles), and which are circles, blobs, and junk?<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> candidate     area    aspect(w/h)   extent(area/bbox area)\n rectangle     big       ~1.0          ~1.00   ==&gt; KEEP\n circle        big       ~1.0          ~0.79   ==&gt; reject (doesn't fill box)\n noise speck   tiny        -             -     ==&gt; reject first (cheapest test)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> three one-line statistics do what would otherwise need a trained classifier — and every rejection is explainable (\"dropped: extent 0.62\"), which matters in production debugging. Order the tests cheapest-first so expensive checks run on fewer candidates. If rectangles may be <em>rotated<\/em>, compute extent against <code>minAreaRect<\/code> area instead of the axis-aligned box.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> find_rectangles(path, min_area=<span class=\"tok-number\">1000<\/span>, out=<span class=\"tok-string\">\"e8_out.png\"<\/span>):\n    img = <span class=\"tok-builtin\">cv2<\/span>.imread(path)\n    gray = <span class=\"tok-builtin\">cv2<\/span>.cvtColor(img, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY)\n    _, binary = <span class=\"tok-builtin\">cv2<\/span>.threshold(gray, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY + <span class=\"tok-builtin\">cv2<\/span>.THRESH_OTSU)\n    contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(binary, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL, <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n    kept = []\n    <span class=\"tok-keyword\">for<\/span> contour <span class=\"tok-keyword\">in<\/span> contours:\n        area = <span class=\"tok-builtin\">cv2<\/span>.contourArea(contour)\n        <span class=\"tok-keyword\">if<\/span> area &lt; min_area:                 <span class=\"tok-comment\"># 1. drop noise<\/span>\n            <span class=\"tok-keyword\">continue<\/span>\n        x, y, w, h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(contour)\n        aspect = w / h                      <span class=\"tok-comment\"># 2. drop long thin strips<\/span>\n        extent = area / (w * h)             <span class=\"tok-comment\"># 3. rect fills ~1.0, circle ~0.79<\/span>\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-number\">0.3<\/span> &lt; aspect &lt; <span class=\"tok-number\">3.0<\/span> <span class=\"tok-keyword\">and<\/span> extent &gt; <span class=\"tok-number\">0.85<\/span>:\n            kept.append((x, y, w, h))\n            <span class=\"tok-builtin\">cv2<\/span>.rectangle(img, (x, y), (x + w, y + h), (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n

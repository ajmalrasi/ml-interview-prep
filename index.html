r any curveball<\/h2>\n<ol><li>Restate the constraint.<\/li><li>Name which budget/tradeoff it stresses (latency / throughput / memory /<\/li><\/ol>\n<p>reliability / cost).<\/p>\n<ol><li>Change the minimum needed.<\/li><li>State what you give up.<\/li><\/ol>\n<p>Composure + tradeoff fluency beats a perfect answer.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next: <strong><a class=\"mdlink\" data-href=\"../07-qa-drill-bank/README.md\" href=\"#\">07-qa-drill-bank/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"now-make-it-500-cameras","text":"\"Now make it 500 cameras.\""},{"level":2,"id":"latency-must-be-under-50ms","text":"\"Latency must be under 50ms.\""},{"level":2,"id":"the-gpu-keeps-running-out-of-memory","text":"\"The GPU keeps running out of memory.\""},{"level":2,"id":"a-camera-sends-corruptedgarbage-frames","text":"\"A camera sends corrupted/garbage frames.\""},{"level":2,"id":"cloud-connection-drops-for-an-hour","text":"\"Cloud connection drops for an hour.\""},{"level":2,"id":"how-do-you-deploy-a-new-model-with-zero-downtime","text":"\"How do you deploy a new model with zero downtime?\""},{"level":2,"id":"how-do-you-know-its-actually-working-in-production","text":"\"How do you know it's actually working in production?\""},{"level":2,"id":"detections-look-wrong-on-some-cameras","text":"\"Detections look wrong on some cameras.\""},{"level":2,"id":"edge-vs-cloud-inference-defend-your-choice","text":"\"Edge vs cloud inference — defend your choice.\""},{"level":2,"id":"the-meta-pattern-for-any-curveball","text":"The meta-pattern for any curveball"}],"text":"design curveballs (the follow-ups) 💡 tl;dr after your main answer, they pile on constraints to see how you adapt. here are the common ones with crisp directions. the meta-move: restate the new constraint, name the tradeoff it forces, adjust one part of the design. \"now make it 500 cameras.\" horizontal scale: more edge nodes (camera groups of 12–16 each), unchanged per-node design. cloud aggregation scales out (partitioned kafka topics, sharded db). the edge template is the unit of scale — that's why edge-heavy design scales linearly. \"latency must be under 50ms.\" attack the budget: smaller/distilled detector, lower inference resolution, int8, reduce batch size (less fill-wait) and add more parallel instances/streams, drop b-frames, shrink jitter buffer. move all pre/post to gpu; eliminate cpu round trips. accept fewer cameras per gpu. \"the gpu keeps running out of memory.\" diagnose: count decode buffers + model workspace × instances + batch tensors. fixes: smaller batch, fewer model instances, lower decode buffer count, int8 (¼ memory), release surfaces per iteration. add graceful degradation so oom-risk sheds load, not crashes. \"a camera sends corrupted/garbage frames.\" validate frames (resolution/format sanity, decode errors from the bus). skip bad frames, keep the stream. if persistent, mark camera unhealthy, backoff-reconnect, alert. never let one malformed stream segfault the shared pipeline — isolation + input validation. \"cloud connection drops for an hour.\" edge keeps inferring (that's the point of edge inference). buffer metadata/clips locally in a bounded store (drop oldest non-critical first), flush on reconnect. critical alerts get a local fallback path (on-site siren/log). system degrades, not dies. \"how do you deploy a new model with zero downtime?\" canary: build/validate the new trt engine, roll it to one edge node, compare detections/metrics against the old, then progressive rollout. cloud models via triton version hot-swap. keep the old engine to roll back instantly. \"how do you know it's actually working in production?\" observability: per-camera fps/freshness, queue depths, p99 latency, gpu util, detection-rate anomalies (a camera that suddenly detects nothing may be mispointed/frozen). health endpoint + prometheus + alerts. \"you can't operate what you can't see\" — ties to your benchmarking/measurement ethos. \"detections look wrong on some cameras.\" could be: domain shift (lighting/angle differs from training), wrong calibration, resolution mismatch in preprocessing, or quantization accuracy drop. diagnose by isolating: check raw frames, check preprocessing, a/b fp16 vs int8, error-analyze by camera. (your model-eval + error-analysis background.) \"edge vs cloud inference — defend your choice.\" edge: lowest latency, no video egress, privacy, survives wan loss — but limited compute, harder to update, per-site hardware cost. cloud: elastic compute, easy updates, central management — but latency, bandwidth/egress cost, wan dependency. most real systems: infer at edge, manage/aggregate/retrain in cloud (what you'd propose). the meta-pattern for any curveball restate the constraint. name which budget/tradeoff it stresses (latency / throughput / memory / reliability / cost). change the minimum needed. state what you give up. composure + tradeoff fluency beats a perfect answer. → back to section readme · next: 07-qa-drill-bank/","words":494},{"path":"07-qa-drill-bank/README.md","title":"Overview","section":"7 · Q&A Drill Bank","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"07-qa-drill-bank\">07 — Q&amp;A Drill Bank<\/h1>\n<p>Every \"why X over Y\" and rapid-fire question for this role, in docs_mind cheat-sheet style. Two files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">cheat-sheet.md<\/a> — <strong>read this the morning of.<\/strong> One page, every key answer.<\/li><li><a class=\"mdlink\" data-href=\"drill-bank.md\" href=\"#\">drill-bank.md<\/a> — the fuller question bank to rehearse from this week.<\/li><\/ol>\n<p>How to use: cover the answer, say yours out loud, compare. Out-loud reps beat silent reading 10:1 for interviews.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"drill-bank.md\" href=\"#\">drill-bank.md<\/a><\/strong> · Morning of: <strong><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">cheat-sheet.md<\/a><\/strong><\/p>","toc":[],"text":"07 — q&a drill bank every \"why x over y\" and rapid-fire question for this role, in docs_mind cheat-sheet style. two files: cheat-sheet.md — read this the morning of. one page, every key answer. drill-bank.md — the fuller question bank to rehearse from this week. how to use: cover the answer, say yours out loud, compare. out-loud reps beat silent reading 10:1 for interviews. → start: drill-bank.md · morning of: cheat-sheet.md","words":71},{"path":"07-qa-drill-bank/drill-bank.md","title":"Drill Bank","section":"7 · Q&A Drill Bank","quiz":true,"accent":"#cc5fab","html":"<h1 id=\"drill-bank-rehearse-out-loud\">Drill Bank — Rehearse Out Loud<\/h1>\n<p>Cover the answer, say yours, compare. Grouped by topic. Depth lives in the numbered sections; this is for reps.<\/p>\n<hr>\n<h2 id=\"streaming-protocols\">Streaming protocols<\/h2>\n<details class=\"qa\" open><summary>Q: RTSP vs WebRTC — when do you use each?<\/summary><div class=\"qa-body\"><p>RTSP to ingest from IP cameras (that's what they emit; pull, ~0.5–3s). WebRTC to deliver to browsers/peers at sub-500ms. Real systems use both: RTSP in, WebRTC out.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why not HLS/DASH for live inference delivery?<\/summary><div class=\"qa-body\"><p>They segment video → 6–30s latency. Fine for broadcast/CDN, useless for \"obsess over milliseconds.\" WebRTC is the interactive low-latency choice.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: RTSP over UDP or TCP?<\/summary><div class=\"qa-body\"><p>UDP = lowest latency, tolerates loss. TCP = reliable, survives flaky networks, a bit more latency. Many-camera over imperfect networks → TCP for stability.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's FastRTC and why would you use it?<\/summary><div class=\"qa-body\"><p>A Python library wrapping WebRTC so you can pipe live video to/from ML code in a few lines — it handles signaling and the peer connection, hands you numpy frames. Use it for fast browser-facing low-latency model loops and operator UIs.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does a stream show garbage right after connecting/reconnecting?<\/summary><div class=\"qa-body\"><p>You can only start decoding at an I-frame (keyframe). Until the next keyframe arrives, P/B frames have nothing to build on. Shorter GOP shortens that window.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Walk me through what RTSP actually does — it carries video, right?<\/summary><div class=\"qa-body\"><p>No — RTSP is <em>control<\/em> (OPTIONS/DESCRIBE/SETUP/PLAY/TEARDOWN). It negotiates the session; the video rides on <strong>RTP<\/strong>, stats/feedback on <strong>RTCP<\/strong>. DESCRIBE returns an SDP with the codec; SETUP picks transport (UDP ports or TCP interleaved); PLAY starts the RTP flow.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's in an RTP packet and why do you care?<\/summary><div class=\"qa-body\"><p>Sequence number (detect loss/reorder), timestamp (playback timing off a 90kHz clock), SSRC (which source), payload type (which codec). A keyframe is fragmented (FU-A) across many packets and reassembled by sequence number — that's why one lost packet can wreck a whole keyframe.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's the jitter buffer and what does tuning it trade?<\/summary><div class=\"qa-body\"><p>A small buffer that absorbs uneven packet arrival and reorders before decode (<code>rtspsrc latency=200<\/code>). Lower = less delay but more visible glitches under loss; higher = smoother but laggier. It's a direct latency-vs-smoothness dial.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does an RTSP session need keepalives?<\/summary><div class=\"qa-body\"><p>Sessions time out. You send periodic GET_PARAMETER/OPTIONS (or rely on RTCP); else the camera tears down and you must reconnect. Ties into fault-tolerance reconnect logic.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Explain a WebRTC connection end to end.<\/summary><div class=\"qa-body\"><p>Four phases: (1) <strong>signaling<\/strong> — exchange SDP offer/answer over a server you build (WebSocket); (2) <strong>ICE<\/strong> — gather host/STUN/TURN candidates and probe for a working path through NAT; (3) <strong>DTLS<\/strong> handshake exchanges keys; (4) <strong>SRTP<\/strong> carries encrypted media, with congestion control + NACK/FEC. WebRTC doesn't define signaling — that's your code.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: STUN vs TURN — what's the difference?<\/summary><div class=\"qa-body\"><p>STUN tells a peer its public IP:port so two peers can connect <em>directly<\/em> through NAT (cheap). TURN <em>relays<\/em> media when direct fails (symmetric NAT) — costs bandwidth/$ but guarantees connectivity. In a factory/enterprise network, plan for TURN.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: One feed to many browsers in WebRTC — how?<\/summary><div class=\"qa-body\"><p>Raw WebRTC is 1:1. For one-to-many put an <strong>SFU<\/strong> (mediasoup/Janus/LiveKit/Pion) in the middle: each sender uploads once, the SFU forwards to N viewers. Don't mesh peers.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: A WebRTC connection won't establish — debug order?<\/summary><div class=\"qa-body\"><p>Signaling reachable? → STUN returning a reflexive candidate? → TURN configured for symmetric NAT? → DTLS handshake completing? Walk the four phases in order.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why is WebRTC encrypted but camera RTSP often isn't?<\/summary><div class=\"qa-body\"><p>Different threat models. WebRTC crosses the public internet to a browser → DTLS-SRTP mandatory. Camera RTSP usually stays on a trusted VLAN → often plaintext (RTSPS/SRTP exist but are less common).<\/p><\/div><\/details><hr>\n<h2 id=\"codecs-frames\">Codecs &amp; frames<\/h2>\n<details class=\"qa\" open><summary>Q: I vs P vs B frames?<\/summary><div class=\"qa-body\"><p>I = full image, decodable alone. P = diff from previous. B = diff from past+future (smallest, but adds latency). Live low-latency pipelines often disable B-frames.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: H.264 vs H.265?<\/summary><div class=\"qa-body\"><p>H.265 ≈ half the bandwidth at same quality, but heavier decode + licensing. Use it only if HW decode supports it and you have compute headroom; else H.264.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does a lost keyframe matter more than a lost P-frame?<\/summary><div class=\"qa-body\"><p>Every P/B frame in the GOP references back to the keyframe. Lose the I-frame and the whole group is undecodable until the next one. Lose a P-frame and you get a brief glitch.<\/p><\/div><\/details><hr>\n<h2 id=\"decode-buffers\">Decode &amp; buffers<\/h2>\n<details class=\"qa\" open><summary>Q: cv2.VideoCapture vs a GStreamer pipeline?<\/summary><div class=\"qa-body\"><p>VideoCapture = quick, but CPU decode + hidden buffering, won't scale past a couple streams. GStreamer = explicit hardware decode, threading, backpressure; scales to many. Prototype with one, ship the other.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Software vs hardware (NVDEC) decode?<\/summary><div class=\"qa-body\"><p>Software burns CPU and caps at ~1–2 streams. NVDEC decodes dozens on dedicated silicon, frees CPU, keeps frames in GPU memory for zero-copy inference. Scale → hardware.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Consumer slower than producer — what do you do?<\/summary><div class=\"qa-body\"><p>Bounded queue, drop oldest, keep latest (live). Never an unbounded queue — that's the classic memory-leak/latency-creep death. Offline/recorded → block + bounded to keep every frame.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why max-buffers=1 drop=true on appsink?<\/summary><div class=\"qa-body\"><p>Makes it a \"latest frame\" tap: bounded memory, minimal latency, drops stale frames under load instead of piling up.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why .copy() a frame in an appsink callback?<\/summary><div class=\"qa-body\"><p>The numpy array points into GStreamer's mapped buffer; after unmap/return that memory is recycled. Copy if the frame outlives the callback.<\/p><\/div><\/details><hr>\n<h2 id=\"gstreamer-deepstream\">GStreamer / DeepStream<\/h2>\n<details class=\"qa\" open><summary>Q: One-line description of GStreamer?<\/summary><div class=\"qa-body\"><p>A pipeline framework: elements (source→decode→convert→sink) connected by pads, media flows as buffers, caps negotiate format, queues add thread boundaries + backpressure.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does nvstreammux do and why does it matter?<\/summary><div class=\"qa-body\"><p>Batches frames from many camera streams into one batched buffer so a single inference call serves all of them — the key trick for many cameras per GPU.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: GStreamer vs FFmpeg?<\/summary><div class=\"qa-body\"><p>FFmpeg = swiss-army transcoder + decode lib, great for files/clips. GStreamer = live, branching, multi-stream, plugin-extensible pipelines with threading control → KoiReader's live serving graphs (DeepStream is built on it).<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you detect a camera went offline in GStreamer?<\/summary><div class=\"qa-body\"><p>Watch the bus for ERROR/EOS, plus a frame-freshness watchdog for silent freezes. Then tear to NULL and reconnect.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: DeepStream vs rolling your own inference pipeline?<\/summary><div class=\"qa-body\"><p>DeepStream gives multi-stream batching, GPU-resident buffers, tracking for free on NVIDIA HW — fastest path to many cameras. DIY when you need custom logic or non-NVIDIA hardware.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do caps negotiation failures show up, and what causes them?<\/summary><div class=\"qa-body\"><p><code>not-negotiated (-4)<\/code> = downstream/upstream caps don't intersect (missing videoconvert, or a format the decoder can't emit). <code>internal data stream error<\/code> = usually a dynamic pad never got linked (the rtspsrc pad-added gotcha). Fix by adding the right converter/capsfilter or wiring pad-added.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does rtspsrc need a pad-added callback?<\/summary><div class=\"qa-body\"><p>Its source pad is a \"sometimes pad\" — it doesn't appear until the stream connects and the format is known, so you can't link it statically. You connect <code>pad-added<\/code> and link to the depayloader then.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does a <code>queue<\/code> actually do, and why one per tee branch?<\/summary><div class=\"qa-body\"><p>A queue is a thread boundary + bounded buffer — it decouples upstream/downstream onto separate threads and applies backpressure. After a <code>tee<\/code>, each branch needs its own queue or the slowest branch stalls all of them (shared thread).<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: leaky=downstream vs leaky=no on a queue?<\/summary><div class=\"qa-body\"><p><code>leaky=downstream<\/code> drops the oldest buffer when full → live video (latest frame wins). <code>leaky=no<\/code> blocks → recorded/offline where you can't lose a frame.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: PTS vs DTS?<\/summary><div class=\"qa-body\"><p>PTS = when to present, DTS = when to decode. They diverge with B-frames (decode order ≠ display order), which is also why B-frames add latency.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you read detections without copying frames?<\/summary><div class=\"qa-body\"><p>Pad probe on nvinfer/nvdsosd → walk the metadata hierarchy NvDsBatchMeta → NvDsFrameMeta → NvDsObjectMeta (bbox/class/track id) → push out. Pixels stay on the GPU; you only read metadata. <code>source_id<\/code> tells you which camera.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: nvstreammux batch-size and batched-push-timeout — how do you set them?<\/summary><div class=\"qa-body\"><p>batch-size ≈ number of streams (must match nvinfer). batched-push-timeout ≈ one frame interval (~33ms @30fps) so a dead camera can't stall the whole batch — it flushes with N-1 streams and the dead one reconnects independently.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: nvinfer <code>interval<\/code> — what is it and why use it?<\/summary><div class=\"qa-body\"><p>Skip inference on N frames between runs (e.g. infer every 3rd frame), letting the tracker fill the gaps. Big throughput/latency win when objects move little frame-to-frame.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do detections leave a DeepStream pipeline for analytics?<\/summary><div class=\"qa-body\"><p>nvmsgconv serializes metadata to a schema, nvmsgbroker ships it to Kafka/MQTT/AMQP → consumed by a DB/analytics service. Same decoupled message-bus pattern as a data platform.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Primary vs secondary GIE?<\/summary><div class=\"qa-body\"><p>Primary detects on the full frame; secondary classifies the <em>crops<\/em> the primary found (detect vehicle → classify make/color), gated by operate-on-gie-id/class-ids so it only runs on relevant objects.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you serve the annotated result back to a browser?<\/summary><div class=\"qa-body\"><p>Encode (nvv4l2h264enc) → webrtcbin (sub-500ms) or an RTSP-out sink. That closes the RTSP-in → infer → WebRTC-out loop. Tiler (nvmultistreamtiler) composites many cameras into one grid first if needed.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you debug a GStreamer pipeline that won't play?<\/summary><div class=\"qa-body\"><p><code>GST_DEBUG=3..5 gst-launch-1.0 ...<\/code> for verbose negotiation/errors; <code>GST_DEBUG_DUMP_DOT_DIR<\/code> to dump the pipeline graph to .dot and visualize what linked; <code>gst-inspect-1.0 &lt;element&gt;<\/code> to check pads/caps/properties.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Jetson vs dGPU — what changes in the pipeline?<\/summary><div class=\"qa-body\"><p>Jetson shares CPU/GPU memory (NVMM transfers cheap, but compute/power constrained → lean on INT8 + frame interval). dGPU has separate memory → avoiding host↔device copies is the bigger win. Plugin names vary slightly by DeepStream version.<\/p><\/div><\/details><hr>\n<h2 id=\"inference-optimization\">Inference &amp; optimization<\/h2>\n<details class=\"qa\" open><summary>Q: What does TensorRT do?<\/summary><div class=\"qa-body\"><p>Compiles a model (via ONNX) into a GPU-specific engine: layer fusion, kernel auto-tuning, precision lowering (FP16/INT8), memory reuse. Big latency/throughput win.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: FP16 vs INT8?<\/summary><div class=\"qa-body\"><p>FP16 ≈ 2×, near-lossless, almost free — try first. INT8 ≈ 3–4× + ¼ memory but needs calibration and risks accuracy — for max edge throughput, validate mAP after.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How does INT8 calibration work / why can it hurt accuracy?<\/summary><div class=\"qa-body\"><p>It maps floats to 256 levels using a representative calibration set to pick per-layer ranges. Unrepresentative calibration data → wrong ranges → accuracy drop. Use QAT if PTQ drops too much.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why build the TensorRT engine on the deployment hardware?<\/summary><div class=\"qa-body\"><p>TRT tunes kernels/memory for the specific GPU arch; an engine built elsewhere may be suboptimal or fail to load. Build on target, cache the engine.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Quantization vs pruning vs distillation?<\/summary><div class=\"qa-body\"><p>Orthogonal: quantization = cheaper math, pruning = fewer weights, distillation = smaller architecture. Stack them.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Triton vs in-process TensorRT?<\/summary><div class=\"qa-body\"><p>In-process = lowest latency, simplest, edge. Triton = a network hop but dynamic batching, multi-model, versioning, metrics — a cloud inference service.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Latency vs throughput — what's the difference and which do you optimize?<\/summary><div class=\"qa-body\"><p>Latency = time for one frame; throughput = frames/sec total. Real-time reaction → latency; many-camera scale → throughput. Usually: hit a latency SLA, then maximize throughput under it.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: GPU utilization is low but latency is high — what's wrong?<\/summary><div class=\"qa-body\"><p>Not compute-bound. Suspect CPU preprocessing, CPU↔GPU copies, single-thread decode, or network jitter. Profile before touching the model.<\/p><\/div><\/details><hr>\n<h2 id=\"production-python\">Production Python<\/h2>\n<details class=\"qa\" open><summary>Q: Does the GIL kill a video pipeline?<\/summary><div class=\"qa-body\"><p>No — decode (cv2/NVDEC), numpy, and CUDA/TensorRT release the GIL, so threads give real parallelism on the native+I/O path. The GIL only bites pure-Python hot loops; keep those off the per-frame path.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Threads vs async vs processes for video?<\/summary><div class=\"qa-body\"><p>Threads for I/O + GIL-releasing native work (decode/infer) — the default. Async for many concurrent connections / web serving. Processes for CPU-bound pure-Python or crash isolation.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Biggest source of memory leaks in long-running video services?<\/summary><div class=\"qa-body\"><p>Unbounded queues (consumer &lt; producer), unreleased GPU surfaces, un-unmapped buffers, ever-growing state/caches. Fix: bound buffers, release per iteration, soak test 24h+.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you prove no memory leak?<\/summary><div class=\"qa-body\"><p>Plot RSS + GPU memory over hours under load — a leak is a slope, healthy is flat. tracemalloc/objgraph for Python, nvidia-smi/tegrastats for GPU. Soak test before shipping.<\/p><\/div><\/details><hr>\n<h2 id=\"fault-tolerance\">Fault tolerance<\/h2>\n<details class=\"qa\" open><summary>Q: A camera goes offline — what happens?<\/summary><div class=\"qa-body\"><p>Detect (bus EOS/ERROR or freshness watchdog) → isolate (one worker, blast radius = 1) → reconnect with exponential backoff + jitter → wait for keyframe → resume. Other cameras unaffected.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you catch a silent freeze (no error fires)?<\/summary><div class=\"qa-body\"><p>Per-camera watchdog on last-frame timestamp; if stale beyond a threshold, force restart even without an exception.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's graceful degradation here?<\/summary><div class=\"qa-body\"><p>Under overload, shed load instead of crashing: smaller batch, process every Nth frame, lower resolution, drop non-critical writes — keep the video loop alive.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Process-per-camera vs thread-per-camera?<\/summary><div class=\"qa-body\"><p>Process = strongest isolation (native crash contained, no GIL) at higher memory. Thread = lighter, shared memory, but a native crash/GIL can hurt all. Many flaky streams → process isolation.<\/p><\/div><\/details><hr>\n<h2 id=\"opencv-math-your-strength-be-ready\">OpenCV / math (your strength — be ready)<\/h2>\n<details class=\"qa\" open><summary>Q: Color spaces — why does it matter?<\/summary><div class=\"qa-body\"><p>Decoders output YUV/NV12; models want BGR/RGB. Convert on GPU (nvvidconv) to avoid re-introducing copies. BGR is OpenCV's default ordering — mismatches silently wreck accuracy.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Camera calibration / undistortion — when in the pipeline?<\/summary><div class=\"qa-body\"><p>For fisheye/wide-angle (your surround-view work): undistort using intrinsics + distortion coeffs before geometry-dependent logic. Do it on GPU if per-frame.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: You designed logic on top of detections — example?<\/summary><div class=\"qa-body\"><p>Geometry/statistics over boxes: zone intersection (is this box in the loading bay?), homography to map image points to floor coordinates, tracking + line-crossing for counting, temporal smoothing to reject flicker. (The JD's \"complex logic layers on top of model detections.\")<\/p><\/div><\/details><hr>\n<h2 id=\"behavioral-adjacent-theyll-sneak-these-in\">Behavioral-adjacent (they'll sneak these in)<\/h2>\n<details class=\"qa\" open><summary>Q: Tell me about a hard ambiguous systems problem you solved.<\/summary><div class=\"qa-body\"><p>Use the NVMe-vs-network-attached-storage diagnosis or a DeepStream/Jetson latency fix: hypothesis → isolate variables → benchmark → validate → fix. Quantify the result.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why do you want a systems-first CV role after data-platform work?<\/summary><div class=\"qa-body\"><p>Honest arc: started in edge CV/video analytics (Jetson, DeepStream, TensorRT), spent 4 years going deep on distributed systems + performance engineering at scale, now want to bring that systems rigor back to live Vision AI — which is exactly this role.<\/p><\/div><\/details><p>→ Morning of: <strong><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">cheat-sheet.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"streaming-protocols","text":"Streaming protocols"},{"level":2,"id":"codecs-frames","text":"Codecs &amp; frames"},{"level":2,"id":"decode-buffers","text":"Decode &amp; buffers"},{"level":2,"id":"gstreamer-deepstream","text":"GStreamer / DeepStream"},{"level":2,"id":"inference-optimization","text":"Inference &amp; optimization"},{"level":2,"id":"production-python","text":"Production Python"},{"level":2,"id":"fault-tolerance","text":"Fault tolerance"},{"level":2,"id":"opencv-math-your-strength-be-ready","text":"OpenCV / math (your strength — be ready)"},{"level":2,"id":"behavioral-adjacent-theyll-sneak-these-in","text":"Behavioral-adjacent (they'll sneak these in)"}],"text":"drill bank — rehearse out loud cover the answer, say yours, compare. grouped by topic. depth lives in the numbered sections; this is for reps. streaming protocols q: rtsp vs webrtc — when do you use each? rtsp to ingest from ip cameras (that's what they emit; pull, ~0.5–3s). webrtc to deliver to browsers/peers at sub-500ms. real systems use both: rtsp in, webrtc out. q: why not hls/dash for live inference delivery? they segment video → 6–30s latency. fine for broadcast/cdn, useless for \"obsess over milliseconds.\" webrtc is the interactive low-latency choice. q: rtsp over udp or tcp? udp = lowest latency, tolerates loss. tcp = reliable, survives flaky networks, a bit more latency. many-camera over imperfect networks → tcp for stability. q: what's fastrtc and why would you use it? a python library wrapping webrtc so you can pipe live video to/from ml code in a few lines — it handles signaling and the peer connection, hands you numpy frames. use it for fast browser-facing low-latency model loops and operator uis. q: why does a stream show garbage right after connecting/reconnecting? you can only start decoding at an i-frame (keyframe). until the next keyframe arrives, p/b frames have nothing to build on. shorter gop shortens that window. q: walk me through what rtsp actually does — it carries video, right? no — rtsp is control (options/describe/setup/play/teardown). it negotiates the session; the video rides on rtp , stats/feedback on rtcp . describe returns an sdp with the codec; setup picks transport (udp ports or tcp interleaved); play starts the rtp flow. q: what's in an rtp packet and why do you care? sequence number (detect loss/reorder), timestamp (playback timing off a 90khz clock), ssrc (which source), payload type (which codec). a keyframe is fragmented (fu-a) across many packets and reassembled by sequence number — that's why one lost packet can wreck a whole keyframe. q: what's the jitter buffer and what does tuning it trade? a small buffer that absorbs uneven packet arrival and reorders before decode ( rtspsrc latency=200 ). lower = less delay but more visible glitches under loss; higher = smoother but laggier. it's a direct latency-vs-smoothness dial. q: why does an rtsp session need keepalives? sessions time out. you send periodic get_parameter/options (or rely on rtcp); else the camera tears down and you must reconnect. ties into fault-tolerance reconnect logic. q: explain a webrtc connection end to end. four phases: (1) signaling — exchange sdp offer/answer over a server you build (websocket); (2) ice — gather host/stun/turn candidates and probe for a working path through nat; (3) dtls handshake exchanges keys; (4) srtp carries encrypted media, with congestion control + nack/fec. webrtc doesn't define signaling — that's your code. q: stun vs turn — what's the difference? stun tells a peer its public ip:port so two peers can connect directly through nat (cheap). turn relays media when direct fails (symmetric nat) — costs bandwidth/$ but guarantees connectivity. in a factory/enterprise network, plan for turn. q: one feed to many browsers in webrtc — how? raw webrtc is 1:1. for one-to-many put an sfu (mediasoup/janus/livekit/pion) in the middle: each sender uploads once, the sfu forwards to n viewers. don't mesh peers. q: a webrtc connection won't establish — debug order? signaling reachable? → stun returning a reflexive candidate? → turn configured for symmetric nat? → dtls handshake completing? walk the four phases in order. q: why is webrtc encrypted but camera rtsp often isn't? different threat models. webrtc crosses the public internet to a browser → dtls-srtp mandatory. camera rtsp usually stays on a trusted vlan → often plaintext (rtsps/srtp exist but are less common). codecs & frames q: i vs p vs b frames? i = full image, decodable alone. p = diff from previous. b = diff from past+future (smallest, but adds latency). live low-latency pipelines often disable b-frames. q: h.264 vs h.265? h.265 ≈ half the bandwidth at same quality, but heavier decode + licensing. use it only if hw decode supports it and you have compute headroom; else h.264. q: why does a lost keyframe matter more than a lost p-frame? every p/b frame in the gop references back to the keyframe. lose the i-frame and the whole group is undecodable until the next one. lose a p-frame and you get a brief glitch. decode & buffers q: cv2.videocapture vs a gstreamer pipeline? videocapture = quick, but cpu decode + hidden buffering, won't scale past a couple streams. gstreamer = explicit hardware decode, threading, backpressure; scales to many. prototype with one, ship the other. q: software vs hardware (nvdec) decode? software burns cpu and caps at ~1–2 streams. nvdec decodes dozens on dedicated silicon, frees cpu, keeps frames in gpu memory for zero-copy inference. scale → hardware. q: consumer slower than producer — what do you do? bounded queue, drop oldest, keep latest (live). never an unbounded queue — that's the classic memory-leak/latency-creep death. offline/recorded → block + bounded to keep every frame. q: why max-buffers=1 drop=true on appsink? makes it a \"latest frame\" tap: bounded memory, minimal latency, drops stale frames under load instead of piling up. q: why .copy() a frame in an appsink callback? the numpy array points into gstreamer's mapped buffer; after unmap/return that memory is recycled. copy if the frame outlives the callback. gstreamer / deepstream q: one-line description of gstreamer? a pipeline framework: elements (source→decode→convert→sink) connected by pads, media flows as buffers, caps negotiate format, queues add thread boundaries + backpressure. q: what does nvstreammux do and why does it matter? batches frames from many camera streams into one batched buffer so a single inference call serves all of them — the key trick for many cameras per gpu. q: gstreamer vs ffmpeg? ffmpeg = swiss-army transcoder + decode lib, great for files/clips. gstreamer = live, branching, multi-stream, plugin-extensible pipelines with threading control → koireader's live serving graphs (deepstream is built on it). q: how do you detect a camera went offline in gstreamer? watch the bus for error/eos, plus a frame-freshness watchdog for silent freezes. then tear to null and reconnect. q: deepstream vs rolling your own inference pipeline? deepstream gives multi-stream batching, gpu-resident buffers, tracking for free on nvidia hw — fastest path to many cameras. diy when you need custom logic or non-nvidia hardware. q: how do caps negotiation failures show up, and what causes them? not-negotiated (-4) = downstream/upstream caps don't intersect (missing videoconvert, or a format the decoder can't emit). internal data stream error = usually a dynamic pad never got linked (the rtspsrc pad-added gotcha). fix by adding the right converter/capsfilter or wiring pad-added. q: why does rtspsrc need a pad-added callback? its source pad is a \"sometimes pad\" — it doesn't appear until the stream connects and the format is known, so you can't link it statically. you connect pad-added and link to the depayloader then. q: what does a queue actually do, and why one per tee branch? a queue is a thread boundary + bounded buffer — it decouples upstream/downstream onto separate threads and applies backpressure. after a tee , each branch needs its own queue or the slowest branch stalls all of them (shared thread). q: leaky=downstream vs leaky=no on a queue? leaky=downstream drops the oldest buffer when full → live video (latest frame wins). leaky=no blocks → recorded/offline where you can't lose a frame. q: pts vs dts? pts = when to present, dts = when to decode. they diverge with b-frames (decode order ≠ display order), which is also why b-frames add latency. q: how do you read detections without copying frames? pad probe on nvinfer/nvdsosd → walk the metadata hierarchy nvdsbatchmeta → nvdsframemeta → nvdsobjectmeta (bbox/class/track id) → push out. pixels stay on the gpu; you only read metadata. source_id tells you which camera. q: nvstreammux batch-size and batched-push-timeout — how do you set them? batch-size ≈ number of streams (must match nvinfer). batched-push-timeout ≈ one frame interval (~33ms @30fps) so a dead camera can't stall the whole batch — it flushes with n-1 streams and the dead one reconnects independently. q: nvinfer interval — what is it and why use it? skip inference on n frames between runs (e.g. infer every 3rd frame), letting the tracker fill the gaps. big throughput/latency win when objects move little frame-to-frame. q: how do detections leave a deepstream pipeline for analytics? nvmsgconv serializes metadata to a schema, nvmsgbroker ships it to kafka/mqtt/amqp → consumed by a db/analytics service. same decoupled message-bus pattern as a data platform. q: primary vs secondary gie? primary detects on the full frame; secondary classifies the crops the primary found (detect vehicle → classify make/color), gated by operate-on-gie-id/class-ids so it only runs on relevant objects. q: how do you serve the annotated result back to a browser? encode (nvv4l2h264enc) → webrtcbin (sub-500ms) or an rtsp-out sink. that closes the rtsp-in → infer → webrtc-out loop. tiler (nvmultistreamtiler) composites many cameras into one grid first if needed. q: how do you debug a gstreamer pipeline that won't play? gst_debug=3..5 gst-launch-1.0 ... for verbose negotiation/errors; gst_debug_dump_dot_dir to dump the pipeline graph to .dot and visualize what linked; gst-inspect-1.0 <element> to check pads/caps/properties. q: jetson vs dgpu — what changes in the pipeline? jetson shares cpu/gpu memory (nvmm transfers cheap, but compute/power constrained → lean on int8 + frame interval). dgpu has separate memory → avoiding host↔device copies is the bigger win. plugin names vary slightly by deepstream version. inference & optimization q: what does tensorrt do? compiles a model (via onnx) into a gpu-specific engine: layer fusion, kernel auto-tuning, precision lowering (fp16/int8), memory reuse. big latency/throughput win. q: fp16 vs int8? fp16 ≈ 2×, near-lossless, almost free — try first. int8 ≈ 3–4× + ¼ memory but needs calibration and risks accuracy — for max edge throughput, validate map after. q: how does int8 calibration work / why can it hurt accuracy? it maps floats to 256 levels using a representative calibration set to pick per-layer ranges. unrepresentative calibration data → wrong ranges → accuracy drop. use qat if ptq drops too much. q: why build the tensorrt engine on the deployment hardware? trt tunes kernels/memory for the specific gpu arch; an engine built elsewhere may be suboptimal or fail to load. build on target, cache the engine. q: quantization vs pruning vs distillation? orthogonal: quantization = cheaper math, pruning = fewer weights, distillation = smaller architecture. stack them. q: triton vs in-process tensorrt? in-process = lowest latency, simplest, edge. triton = a network hop but dynamic batching, multi-model, versioning, metrics — a cloud inference service. q: latency vs throughput — what's the difference and which do you optimize? latency = time for one frame; throughput = frames/sec total. real-time reaction → latency; many-camera scale → throughput. usually: hit a latency sla, then maximize throughput under it. q: gpu utilization is low but latency is high — what's wrong? not compute-bound. suspect cpu preprocessing, cpu↔gpu copies, single-thread decode, or network jitter. profile before touching the model. production python q: does the gil kill a video pipeline? no — decode (cv2/nvdec), numpy, and cuda/tensorrt release the gil, so threads give real parallelism on the native+i/o path. the gil only bites pure-python hot loops; keep those off the per-frame path. q: threads vs async vs processes for video? threads for i/o + gil-releasing native work (decode/infer) — the default. async for many concurrent connections / web serving. processes for cpu-bound pure-python or crash isolation. q: biggest source of memory leaks in long-running video services? unbounded queues (consumer < producer), unreleased gpu surfaces, un-unmapped buffers, ever-growing state/caches. fix: bound buffers, release per iteration, soak test 24h+. q: how do you prove no memory leak? plot rss + gpu memory over hours under load — a leak is a slope, healthy is flat. tracemalloc/objgraph for python, nvidia-smi/tegrastats for gpu. soak test before shipping. fault tolerance q: a camera goes offline — what happens? detect (bus eos/error or freshness watchdog) → isolate (one worker, blast radius = 1) → reconnect with exponential backoff + jitter → wait for keyframe → resume. other cameras unaffected. q: how do you catch a silent freeze (no error fires)? per-camera watchdog on last-frame timestamp; if stale beyond a threshold, force restart even without an exception. q: what's graceful degradation here? under overload, shed load instead of crashing: smaller batch, process every nth frame, lower resolution, drop non-critical writes — keep the video loop alive. q: process-per-camera vs thread-per-camera? process = strongest isolation (native crash contained, no gil) at higher memory. thread = lighter, shared memory, but a native crash/gil can hurt all. many flaky streams → process isolation. opencv / math (your strength — be ready) q: color spaces — why does it matter? decoders output yuv/nv12; models want bgr/rgb. convert on gpu (nvvidconv) to avoid re-introducing copies. bgr is opencv's default ordering — mismatches silently wreck accuracy. q: camera calibration / undistortion — when in the pipeline? for fisheye/wide-angle (your surround-view work): undistort using intrinsics + distortion coeffs before geometry-dependent logic. do it on gpu if per-frame. q: you designed logic on top of detections — example? geometry/statistics over boxes: zone intersection (is this box in the loading bay?), homography to map image points to floor coordinates, tracking + line-crossing for counting, temporal smoothing to reject flicker. (the jd's \"complex logic layers on top of model detections.\") behavioral-adjacent (they'll sneak these in) q: tell me about a hard ambiguous systems problem you solved. use the nvme-vs-network-attached-storage diagnosis or a deepstream/jetson latency fix: hypothesis → isolate variables → benchmark → validate → fix. quantify the result. q: why do you want a systems-first cv role after data-platform work? honest arc: started in edge cv/video analytics (jetson, deepstream, tensorrt), spent 4 years going deep on distributed systems + performance engineering at scale, now want to bring that systems rigor back to live vision ai — which is exactly this role. → morning of: cheat-sheet.md","words":2319},{"path":"07-qa-drill-bank/cheat-sheet.md","title":"Cheat Sheet (Morning Of)","section":"7 · Q&A Drill Bank","quiz":false,"accent":"#cc5fab","html":"<h1 id=\"cheat-sheet-one-page-morning-of\">Cheat Sheet — One Page, Morning Of<\/h1>\n<p>Read this and nothing else the morning of. Depth is in the numbered sections.<\/p>\n<hr>\n<h2 id=\"the-role-in-one-breath\">The role in one breath<\/h2>\n<p>Systems-first CV: build the pipelines that run Vision AI on live video 24/7, fast and crash-proof. Not training models — making them <em>run<\/em>.<\/p>\n<h2 id=\"streaming\">Streaming<\/h2>\n<ul><li><strong>RTSP<\/strong> in (cameras, pull, ~0.5–3s), <strong>WebRTC/FastRTC<\/strong> out (browsers, &lt;500ms).<\/li><\/ul>\n<p>HLS/DASH = broadcast, too slow for live.<\/p>\n<ul><li><strong>RTSP transport:<\/strong> UDP = low latency/lossy; TCP = reliable/stable. Many cams →<\/li><\/ul>\n<p>TCP.<\/p>\n<ul><li><strong>I/P/B frames:<\/strong> I = full keyframe, P = diff from past, B = past+future (disable<\/li><\/ul>\n<p>for low latency). Can only start decoding at a <strong>keyframe<\/strong>.<\/p>\n<ul><li><strong>H.264<\/strong> default; <strong>H.265<\/strong> halves bandwidth but heavier + licensing.<\/li><\/ul>\n<h2 id=\"decode-buffers\">Decode &amp; buffers<\/h2>\n<ul><li><strong>NVDEC hardware decode<\/strong>, not CPU — scales to dozens of streams, keeps frames on<\/li><\/ul>\n<p>GPU (zero-copy).<\/p>\n<ul><li><strong>Bound every queue; drop oldest, keep latest<\/strong> for live. Unbounded queue = the<\/li><\/ul>\n<p>classic leak + latency creep.<\/p>\n<ul><li>appsink: <code>max-buffers=1 drop=true sync=false<\/code>. <code>.copy()<\/code> frames that outlive the<\/li><\/ul>\n<p>callback; always <code>unmap<\/code>.<\/p>\n<h2 id=\"gstreamer-deepstream\">GStreamer / DeepStream<\/h2>\n<ul><li>GStreamer = elements + pads + caps + buffers; <code>queue<\/code> = thread boundary +<\/li><\/ul>\n<p>backpressure.<\/p>\n<ul><li><strong>nvstreammux batches many cameras into one inference call<\/strong> → the key multi-cam<\/li><\/ul>\n<p>scaling trick.<\/p>\n<ul><li>DeepStream = inference + tracking + analytics inside the pipeline, GPU-resident.<\/li><li>Detect dead camera: <strong>bus EOS/ERROR + freshness watchdog<\/strong>.<\/li><\/ul>\n<h2 id=\"inference-your-strength-lead-here\">Inference (your strength — lead here)<\/h2>\n<ul><li><strong>TensorRT<\/strong>: ONNX → engine, layer fusion + kernel tuning + precision. Build **on<\/li><\/ul>\n<p>the target GPU**.<\/p>\n<ul><li><strong>FP16<\/strong> ≈ 2×, near-lossless (try first). <strong>INT8<\/strong> ≈ 3–4×, ¼ mem, needs<\/li><\/ul>\n<p>calibration — validate mAP.<\/p>\n<ul><li>Quantization (math) vs pruning (weights) vs distillation (architecture) — stack<\/li><\/ul>\n<p>them.<\/p>\n<ul><li><strong>Triton<\/strong> = cloud model server (dynamic batching, versioning); in-process TRT =<\/li><\/ul>\n<p>edge minimum latency.<\/p>\n<ul><li><strong>Latency ≠ throughput.<\/strong> Hit the latency SLA, then maximize throughput (batch<\/li><\/ul>\n<p>size) under it.<\/p>\n<ul><li><strong>Low GPU util + high latency = copy/CPU/network-bound, not the model.<\/strong> Profile<\/li><\/ul>\n<p>first.<\/p>\n<h2 id=\"production-python\">Production Python<\/h2>\n<ul><li><strong>GIL doesn't block<\/strong> decode/numpy/CUDA (they release it) → <strong>threads<\/strong> are the<\/li><\/ul>\n<p>default for video. <strong>Async<\/strong> for many connections. <strong>Processes<\/strong> for CPU-bound   Python / isolation.<\/p>\n<ul><li><strong>No leaks:<\/strong> bound buffers, release GPU surfaces per iteration, soak-test 24h+<\/li><\/ul>\n<p>(leak = a slope on the memory graph).<\/p>\n<h2 id=\"crash-proof-they-will-probe-this\">Crash-proof (they WILL probe this)<\/h2>\n<ul><li><strong>Isolate<\/strong> each camera (blast radius = 1) → <strong>watchdog<\/strong> freshness → **reconnect<\/li><\/ul>\n<p>with exponential backoff + jitter** → wait for keyframe.<\/p>\n<ul><li><strong>Graceful degradation:<\/strong> under load, shrink batch / skip frames / lower res —<\/li><\/ul>\n<p>don't crash.<\/p>\n<ul><li><strong>Supervise:<\/strong> systemd / k8s liveness (GKE) auto-restarts crashed workers.<\/li><li>WAN drop → edge keeps inferring, buffer metadata locally (bounded), flush later.<\/li><\/ul>\n<h2 id=\"system-design-loop-say-it-out-loud\">System-design loop (say it out loud)<\/h2>\n<p><strong>Clarify → Estimate → Architect → Bottleneck → Failure.<\/strong> Default architecture: NVDEC decode → nvstreammux batch → INT8 TRT + tracker at the <strong>edge<\/strong> → metadata-only to a <strong>message bus<\/strong> → cloud for storage/UI/retraining.<\/p>\n<h2 id=\"your-pitch-the-narrative\">Your pitch (the narrative)<\/h2>\n<p>\"Edge-CV/video-analytics roots (Jetson, DeepStream, TensorRT, INT8) → 4 years deep in distributed systems + performance engineering at petabyte scale → now bringing that systems rigor to live Vision AI. I work by measurement: hypothesis, isolate, benchmark, validate.\"<\/p>\n<h2 id=\"dont-forget-to-ask-them\">Don't forget to ask them<\/h2>\n<p>Scale (cameras/res/fps)? Latency SLA? Edge or cloud? What's the proprietary framework built on? Team size / who owns the ML vs systems split?<\/p>\n<p><strong>Breathe. Clarify before answering. Think out loud. You've shipped this stuff.<\/strong><\/p>","toc":[{"level":2,"id":"the-role-in-one-breath","text":"The role in one breath"},{"level":2,"id":"streaming","text":"Streaming"},{"level":2,"id":"decode-buffers","text":"Decode &amp; buffers"},{"level":2,"id":"gstreamer-deepstream","text":"GStreamer / DeepStream"},{"level":2,"id":"inference-your-strength-lead-here","text":"Inference (your strength — lead here)"},{"level":2,"id":"production-python","text":"Production Python"},{"level":2,"id":"crash-proof-they-will-probe-this","text":"Crash-proof (they WILL probe this)"},{"level":2,"id":"system-design-loop-say-it-out-loud","text":"System-design loop (say it out loud)"},{"level":2,"id":"your-pitch-the-narrative","text":"Your pitch (the narrative)"},{"level":2,"id":"dont-forget-to-ask-them","text":"Don't forget to ask them"}],"text":"cheat sheet — one page, morning of read this and nothing else the morning of. depth is in the numbered sections. the role in one breath systems-first cv: build the pipelines that run vision ai on live video 24/7, fast and crash-proof. not training models — making them run . streaming rtsp in (cameras, pull, ~0.5–3s), webrtc/fastrtc out (browsers, <500ms). hls/dash = broadcast, too slow for live. rtsp transport: udp = low latency/lossy; tcp = reliable/stable. many cams → tcp. i/p/b frames: i = full keyframe, p = diff from past, b = past+future (disable for low latency). can only start decoding at a keyframe . h.264 default; h.265 halves bandwidth but heavier + licensing. decode & buffers nvdec hardware decode , not cpu — scales to dozens of streams, keeps frames on gpu (zero-copy). bound every queue; drop oldest, keep latest for live. unbounded queue = the classic leak + latency creep. appsink: max-buffers=1 drop=true sync=false . .copy() frames that outlive the callback; always unmap . gstreamer / deepstream gstreamer = elements + pads + caps + buffers; queue = thread boundary + backpressure. nvstreammux batches many cameras into one inference call → the key multi-cam scaling trick. deepstream = inference + tracking + analytics inside the pipeline, gpu-resident. detect dead camera: bus eos/error + freshness watchdog . inference (your strength — lead here) tensorrt : onnx → engine, layer fusion + kernel tuning + precision. build **on the target gpu**. fp16 ≈ 2×, near-lossless (try first). int8 ≈ 3–4×, ¼ mem, needs calibration — validate map. quantization (math) vs pruning (weights) vs distillation (architecture) — stack them. triton = cloud model server (dynamic batching, versioning); in-process trt = edge minimum latency. latency ≠ throughput. hit the latency sla, then maximize throughput (batch size) under it. low gpu util + high latency = copy/cpu/network-bound, not the model. profile first. production python gil doesn't block decode/numpy/cuda (they release it) → threads are the default for video. async for many connections. processes for cpu-bound python / isolation. no leaks: bound buffers, release gpu surfaces per iteration, soak-test 24h+ (leak = a slope on the memory graph). crash-proof (they will probe this) isolate each camera (blast radius = 1) → watchdog freshness → **reconnect with exponential backoff + jitter** → wait for keyframe. graceful degradation: under load, shrink batch / skip frames / lower res — don't crash. supervise: systemd / k8s liveness (gke) auto-restarts crashed workers. wan drop → edge keeps inferring, buffer metadata locally (bounded), flush later. system-design loop (say it out loud) clarify → estimate → architect → bottleneck → failure. default architecture: nvdec decode → nvstreammux batch → int8 trt + tracker at the edge → metadata-only to a message bus → cloud for storage/ui/retraining. your pitch (the narrative) \"edge-cv/video-analytics roots (jetson, deepstream, tensorrt, int8) → 4 years deep in distributed systems + performance engineering at petabyte scale → now bringing that systems rigor to live vision ai. i work by measurement: hypothesis, isolate, benchmark, validate.\" don't forget to ask them scale (cameras/res/fps)? latency sla? edge or cloud? what's the proprietary framework built on? team size / who owns the ml vs systems split? breathe. clarify before answering. think out loud. you've shipped this stuff.","words":537},{"path":"08-mock-interview/README.md","title":"Overview","section":"8 · Mock Interview","quiz":false,"accent":"#7479e6","html":"<h1 id=\"08-mock-interview\">08 — Mock Interview<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A staged mock for a technical/system-design round at KoiReader. Two ways to use it:<\/div><\/div>\n<ol><li><strong>Solo:<\/strong> open <a class=\"mdlink\" data-href=\"questions.md\" href=\"#\">questions.md<\/a>, answer each out loud / on paper<\/li><\/ol>\n<p><em>before<\/em> looking, then check <a class=\"mdlink\" data-href=\"model-answers.md\" href=\"#\">model-answers.md<\/a> and grade    yourself with <a class=\"mdlink\" data-href=\"rubric.md\" href=\"#\">rubric.md<\/a>.<\/p>\n<ol><li><strong>Live with me (recommended):<\/strong> ask me in chat — *\"run the KoiReader mock<\/li><\/ol>\n<p>interview\"* — and I'll play interviewer: one question at a time, follow-ups based    on your answers, then a scored debrief. That's closer to the real thing because    I'll push on weak spots.<\/p>\n<h2 id=\"format-mirrors-a-real-4560-min-technical-round\">Format (mirrors a real 45–60 min technical round)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Time<\/th><th>What it tests<\/th><\/tr><\/thead><tbody><tr><td>1. Warm-up / background<\/td><td>5 min<\/td><td>Your narrative, fit for systems-first CV<\/td><\/tr><tr><td>2. Rapid-fire fundamentals<\/td><td>10 min<\/td><td>Streaming, codecs, decode, GIL — recall under pressure<\/td><\/tr><tr><td>3. Deep dive<\/td><td>10 min<\/td><td>One topic to real depth (usually inference or fault tolerance)<\/td><\/tr><tr><td>4. System design<\/td><td>20 min<\/td><td>The multi-camera pipeline + curveballs<\/td><\/tr><tr><td>5. Your questions<\/td><td>5 min<\/td><td>Signals seniority and genuine interest<\/td><\/tr><\/tbody><\/table><\/div>\n<p>→ Start solo: <strong><a class=\"mdlink\" data-href=\"questions.md\" href=\"#\">questions.md<\/a><\/strong> · Or ask me to run it live.<\/p>","toc":[{"level":2,"id":"format-mirrors-a-real-4560-min-technical-round","text":"Format (mirrors a real 45–60 min technical round)"}],"text":"08 — mock interview 💡 tl;dr a staged mock for a technical/system-design round at koireader. two ways to use it: solo: open questions.md , answer each out loud / on paper before looking, then check model-answers.md and grade yourself with rubric.md . live with me (recommended): ask me in chat — *\"run the koireader mock interview\"* — and i'll play interviewer: one question at a time, follow-ups based on your answers, then a scored debrief. that's closer to the real thing because i'll push on weak spots. format (mirrors a real 45–60 min technical round) stage time what it tests 1. warm-up / background 5 min your narrative, fit for systems-first cv 2. rapid-fire fundamentals 10 min streaming, codecs, decode, gil — recall under pressure 3. deep dive 10 min one topic to real depth (usually inference or fault tolerance) 4. system design 20 min the multi-camera pipeline + curveballs 5. your questions 5 min signals seniority and genuine interest → start solo: questions.md · or ask me to run it live.","words":172},{"path":"08-mock-interview/questions.md","title":"Questions","section":"8 · Mock Interview","quiz":false,"accent":"#7479e6","html":"<h1 id=\"mock-interview-questions\">Mock Interview — Questions<\/h1>\n<p>Answer each <strong>out loud before<\/strong> opening <a class=\"mdlink\" data-href=\"model-answers.md\" href=\"#\">model-answers.md<\/a>. Time yourself. The follow-ups are what a real interviewer adds when you answer well.<\/p>\n<hr>\n<h2 id=\"stage-1-warm-up-5-min\">Stage 1 — Warm-up (5 min)<\/h2>\n<ol><li>Walk me through your background in 2 minutes. Why this systems-first CV role?<\/li><li>This role is explicitly <em>not<\/em> about training models in notebooks — it's about<\/li><\/ol>\n<p>making them run on live video. How does your experience map to that?<\/p>\n<ol><li><em>(follow-up)<\/em> Your last 4 years read as data platforms / seismic. Why the move<\/li><\/ol>\n<p>back to live vision systems?<\/p>\n<h2 id=\"stage-2-rapid-fire-fundamentals-10-min\">Stage 2 — Rapid-fire fundamentals (10 min)<\/h2>\n<ol><li>RTSP vs WebRTC — when each?<\/li><li>Why is HLS a bad choice for real-time inference delivery?<\/li><li>What's the difference between I, P, and B frames? Why might you disable B-frames?<\/li><li>Why can't you start decoding a stream at an arbitrary frame?<\/li><li><code>cv2.VideoCapture(\"rtsp://...\")<\/code> — what's wrong with this for 30 cameras?<\/li><li>Consumer is slower than the camera. What do you do, and why not just a big buffer?<\/li><li>Does Python's GIL prevent a video pipeline from using multiple cores? Explain.<\/li><li>FP16 vs INT8 — tradeoffs? What does INT8 need that FP16 doesn't?<\/li><\/ol>\n<h2 id=\"stage-3-deep-dive-10-min-pick-the-one-they-steer-to\">Stage 3 — Deep dive (10 min) — pick the one they steer to<\/h2>\n<ol><li><strong>Inference:<\/strong> Walk me through taking a trained PyTorch detector to the fastest<\/li><\/ol>\n<p>stable inference on a Jetson. Every step.<\/p>\n<ol><li><em>(follow-up)<\/em> You quantized to INT8 and mAP dropped 4 points. Debug it.<\/li><li><strong>Fault tolerance:<\/strong> A camera in a 40-camera system silently freezes — no error,<\/li><\/ol>\n<p>last frame just repeats. How do you detect and recover? How do you make sure the     other 39 are unaffected?<\/p>\n<ol><li><em>(follow-up)<\/em> Your reconnect logic works but logs are flooded and the camera gets<\/li><\/ol>\n<p>hammered every 100ms. Fix it.<\/p>\n<h2 id=\"stage-4-system-design-20-min\">Stage 4 — System design (20 min)<\/h2>\n<ol><li>Design a system to run object detection + tracking on 50 RTSP cameras in a<\/li><\/ol>\n<p>warehouse, 24/7, low latency, edge + cloud, that self-heals without human     intervention. Think out loud.<\/p>\n<p>Curveballs they'll add (expect 2–3):<\/p>\n<ul><li>Now it's 500 cameras.<\/li><li>Latency must be under 50ms end to end.<\/li><li>The GPU keeps running out of memory.<\/li><li>The cloud link drops for an hour.<\/li><li>Deploy a new model version with zero downtime.<\/li><li>How do you know, in production, that a camera is mispointed and detecting<\/li><\/ul>\n<p>nothing useful?<\/p>\n<h2 id=\"stage-5-your-questions-5-min\">Stage 5 — Your questions (5 min)<\/h2>\n<ol><li>What questions do you have for us?<\/li><\/ol>\n<p><em>(Yes, this is scored. Have 3 sharp ones ready — see model-answers.)<\/em><\/p>\n<hr>\n<p>→ Check yourself: <strong><a class=\"mdlink\" data-href=\"model-answers.md\" href=\"#\">model-answers.md<\/a><\/strong> · Grade: <strong><a class=\"mdlink\" data-href=\"rubric.md\" href=\"#\">rubric.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"stage-1-warm-up-5-min","text":"Stage 1 — Warm-up (5 min)"},{"level":2,"id":"stage-2-rapid-fire-fundamentals-10-min","text":"Stage 2 — Rapid-fire fundamentals (10 min)"},{"level":2,"id":"stage-3-deep-dive-10-min-pick-the-one-they-steer-to","text":"Stage 3 — Deep dive (10 min) — pick the one they steer to"},{"level":2,"id":"stage-4-system-design-20-min","text":"Stage 4 — System design (20 min)"},{"level":2,"id":"stage-5-your-questions-5-min","text":"Stage 5 — Your questions (5 min)"}],"text":"mock interview — questions answer each out loud before opening model-answers.md . time yourself. the follow-ups are what a real interviewer adds when you answer well. stage 1 — warm-up (5 min) walk me through your background in 2 minutes. why this systems-first cv role? this role is explicitly not about training models in notebooks — it's about making them run on live video. how does your experience map to that? (follow-up) your last 4 years read as data platforms / seismic. why the move back to live vision systems? stage 2 — rapid-fire fundamentals (10 min) rtsp vs webrtc — when each? why is hls a bad choice for real-time inference delivery? what's the difference between i, p, and b frames? why might you disable b-frames? why can't you start decoding a stream at an arbitrary frame? cv2.videocapture(\"rtsp://...\") — what's wrong with this for 30 cameras? consumer is slower than the camera. what do you do, and why not just a big buffer? does python's gil prevent a video pipeline from using multiple cores? explain. fp16 vs int8 — tradeoffs? what does int8 need that fp16 doesn't? stage 3 — deep dive (10 min) — pick the one they steer to inference: walk me through taking a trained pytorch detector to the fastest stable inference on a jetson. every step. (follow-up) you quantized to int8 and map dropped 4 points. debug it. fault tolerance: a camera in a 40-camera system silently freezes — no error, last frame just repeats. how do you detect and recover? how do you make sure the other 39 are unaffected? (follow-up) your reconnect logic works but logs are flooded and the camera gets hammered every 100ms. fix it. stage 4 — system design (20 min) design a system to run object detection + tracking on 50 rtsp cameras in a warehouse, 24/7, low latency, edge + cloud, that self-heals without human intervention. think out loud. curveballs they'll add (expect 2–3): now it's 500 cameras. latency must be under 50ms end to end. the gpu keeps running out of memory. the cloud link drops for an hour. deploy a new model version with zero downtime. how do you know, in production, that a camera is mispointed and detecting nothing useful? stage 5 — your questions (5 min) what questions do you have for us? (yes, this is scored. have 3 sharp ones ready — see model-answers.) → check yourself: model-answers.md · grade: rubric.md","words":408},{"path":"08-mock-interview/model-answers.md","title":"Model Answers","section":"8 · Mock Interview","quiz":false,"accent":"#7479e6","html":"<h1 id=\"mock-interview-model-answers\">Mock Interview — Model Answers<\/h1>\n<p>These are <em>strong reference<\/em> answers, not scripts. Say it in your words. Numbers in <strong>bold<\/strong> are the points an interviewer actually rewards.<\/p>\n<hr>\n<h2 id=\"stage-1-warm-up\">Stage 1 — Warm-up<\/h2>\n<p><strong>1. Background + why this role.<\/strong> \"7 years as an engineer; I started in <strong>edge computer vision and video analytics<\/strong> — Jetson Nano, DeepStream, GStreamer, TensorRT with INT8/FP16, custom trackers outperforming SORT on ARM. Then I spent <strong>4 years going deep on distributed systems and performance engineering<\/strong> building petabyte-scale data platforms on GCP/K8s. This role is the intersection: it wants someone who can make Vision AI <strong>run<\/strong> on live video, reliably and fast — that's edge-CV depth <em>plus<\/em> systems rigor, which is exactly my arc.\"<\/p>\n<p><strong>2. Maps to systems-first how?<\/strong> \"My CV background isn't notebook training — it was always <strong>deployment<\/strong>: porting models to NXP/Samsung SOCs with quantization, real-time DeepStream pipelines on Jetson, Dockerized inference servers behind REST. And my data-platform years were pure systems: throughput, fault tolerance, profiling. The JD's pillars — streaming pipelines, low-latency inference, crash-proof systems, performance debugging — are the things I've actually shipped.\"<\/p>\n<p><strong>3. Why move back.<\/strong> \"I love the systems side, and live vision is where I get to apply it to something physical and real-time. The data-platform work made me a much better <em>systems<\/em> engineer — measurement-driven, comfortable with ambiguity, obsessed with what fails at scale. I want to point that at Vision AI again.\"<\/p>\n<hr>\n<h2 id=\"stage-2-rapid-fire-keep-these-tight\">Stage 2 — Rapid-fire (keep these tight)<\/h2>\n<p><strong>4.<\/strong> RTSP to ingest from cameras (pull, ~0.5–3s); WebRTC to deliver to browsers/ peers (&lt;500ms). Real systems use both.<\/p>\n<p><strong>5.<\/strong> HLS segments video into multi-second chunks → 6–30s latency. Built for CDN broadcast, not \"obsess over milliseconds.\" WebRTC for interactive.<\/p>\n<p><strong>6.<\/strong> I = full keyframe (standalone). P = diff from previous. B = diff from past <em>and future<\/em>. Disable B-frames for low latency because the decoder must wait for the future frame to decode the B-frame — adds latency and reordering.<\/p>\n<p><strong>7.<\/strong> Because P/B frames are diffs that reference back to a keyframe. With no keyframe in hand there's nothing to apply the diffs to — you must wait for the next I-frame.<\/p>\n<p><strong>8.<\/strong> It decodes on the <strong>CPU<\/strong> (FFmpeg under the hood) and copies every frame to host memory, with opaque internal buffering. One or two 1080p streams saturate several cores; 30 is impossible. Use <strong>GStreamer + NVDEC<\/strong>, keep frames on GPU.<\/p>\n<p><strong>9.<\/strong> Bounded queue, <strong>drop oldest / keep latest<\/strong> for live. A big buffer doesn't help — if you can't catch up, it just means you're always acting on increasingly <em>old<\/em> frames, and it grows latency and memory unboundedly. Live wants <em>now<\/em>.<\/p>\n<p><strong>10.<\/strong> No — for video. The GIL only blocks two threads running <strong>Python bytecode<\/strong> at once. Decode (cv2/NVDEC), numpy, and CUDA/TensorRT calls <strong>release the GIL<\/strong>, so threads run those in parallel. The GIL only bites pure-Python hot loops, which I keep off the per-frame path. CPU-bound Python → processes.<\/p>\n<p><strong>11.<\/strong> FP16 ≈ 2× faster, half memory, near-lossless — try first. INT8 ≈ 3–4× and ¼ memory but needs a <strong>calibration dataset<\/strong> to set per-layer float ranges, and risks accuracy — so I always re-measure mAP, and use QAT if PTQ drops too much.<\/p>\n<hr>\n<h2 id=\"stage-3-deep-dive\">Stage 3 — Deep dive<\/h2>\n<p><strong>12. PyTorch detector → fastest stable Jetson inference.<\/strong> \"Export to <strong>ONNX<\/strong>; build a <strong>TensorRT<\/strong> engine <strong>on the Jetson itself<\/strong> so kernels are tuned for that arch. Start FP16 (near-free), then INT8 with a representative calibration set, re-validating mAP each step. Run decode on <strong>NVDEC<\/strong>, preprocess (resize/normalize/color) <strong>on the GPU<\/strong> to avoid host copies, batch with <strong>nvstreammux<\/strong> if multi-camera, run inference via DeepStream <code>nvinfer<\/code>, do NMS on GPU, and pull only <strong>metadata<\/strong> (boxes/IDs) back to CPU. Then I <strong>profile<\/strong> with nsys/tegrastats, check p99 and GPU utilization, and attack the fattest stage. Cache the engine so startup doesn't rebuild it.\"<\/p>\n<p><strong>13. INT8 dropped mAP 4 points — debug.<\/strong> \"First suspect <strong>calibration data<\/strong>: was it representative of deployment lighting/ angles/classes? Re-calibrate with better samples. Check whether specific <em>layers<\/em> are sensitive — mixed precision (keep those in FP16, rest INT8). Compare per-class metrics to see if it's one class collapsing. If PTQ can't recover it, move to <strong>QAT<\/strong>. And confirm it's the quantization, not a preprocessing mismatch between calibration and inference — same resize/normalize/color path.\"<\/p>\n<p><strong>14. Silent freeze in a 40-camera system.<\/strong> \"No error means the bus won't tell me, so I run a <strong>per-camera freshness watchdog<\/strong>: track the timestamp of the last frame; if <code>now - last &gt; threshold<\/code>, declare it dead. For recovery, each camera is an <strong>isolated supervised worker<\/strong> (its own process or a DeepStream source the mux tolerates dropping) — blast radius is one camera. On detection I tear the pipeline to NULL, <strong>reconnect with exponential backoff + jitter<\/strong>, and wait for the next keyframe. The other 39 never see it because they share no state with the dead one and the mux is configured to proceed without a stalled source.\"<\/p>\n<p><strong>15. Reconnect floods logs / hammers camera.<\/strong> \"That's a missing <strong>backoff<\/strong>. Replace fixed-interval retries with exponential backoff (1s, 2s, 4s… capped at ~30s) plus random <strong>jitter<\/strong> so 40 cameras don't retry in lockstep after a network blip. Log at decreasing frequency or aggregate (<code>camera X down, N attempts<\/code>). Reset the counter on successful reconnect.\"<\/p>\n<hr>\n<h2 id=\"stage-4-system-design\">Stage 4 — System design<\/h2>\n<p><strong>16.<\/strong> See <a class=\"mdlink\" data-href=\"../06-system-design/worked-example-multicam.md\" href=\"#\">../06-system-design/worked-example-multicam.md<\/a> for the full answer. Skeleton: clarify (scale/SLA/edge-cloud) → estimate (one GPU won't do 50 → edge nodes of ~16) → architecture (NVDEC → nvstreammux batch → INT8 TRT + tracker at edge → metadata to message bus → cloud storage/UI/retraining) → latency budget (find fat slice, p99, GPU util) → crash-proof (isolate, watchdog, backoff, degrade, supervise, bounded memory).<\/p>\n<p><strong>Curveballs:<\/strong> answers in <a class=\"mdlink\" data-href=\"../06-system-design/curveballs.md\" href=\"#\">../06-system-design/curveballs.md<\/a>. The pattern: restate constraint → name the tradeoff it stresses → change the minimum → state what you give up.<\/p>\n<hr>\n<h2 id=\"stage-5-your-questions-have-3-ready\">Stage 5 — Your questions (have 3+ ready)<\/h2>\n<p>Strong ones (signal seniority + genuine fit):<\/p>\n<ul><li>\"What's the proprietary vision framework built on — GStreamer/DeepStream, or<\/li><\/ul>\n<p>something custom? Where does it hurt today?\"<\/p>\n<ul><li>\"Where's the current bottleneck — decode, inference, network, or the cloud<\/li><\/ul>\n<p>aggregation layer?\"<\/p>\n<ul><li>\"How is ownership split between the ML team training models and the systems team<\/li><\/ul>\n<p>running them? Where does my role sit?\"<\/p>\n<ul><li>\"What does 'crash-proof' currently look like in production — what's your worst<\/li><\/ul>\n<p>recurring failure mode?\"<\/p>\n<ul><li>\"What scale are you at now (cameras/sites) and where do you need it to go?\"<\/li><\/ul>\n<p>Avoid: questions answered on the careers page, or only about perks.<\/p>\n<p>→ Grade yourself: <strong><a class=\"mdlink\" data-href=\"rubric.md\" href=\"#\">rubric.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"stage-1-warm-up","text":"Stage 1 — Warm-up"},{"level":2,"id":"stage-2-rapid-fire-keep-these-tight","text":"Stage 2 — Rapid-fire (keep these tight)"},{"level":2,"id":"stage-3-deep-dive","text":"Stage 3 — Deep dive"},{"level":2,"id":"stage-4-system-design","text":"Stage 4 — System design"},{"level":2,"id":"stage-5-your-questions-have-3-ready","text":"Stage 5 — Your questions (have 3+ ready)"}],"text":"mock interview — model answers these are strong reference answers, not scripts. say it in your words. numbers in bold are the points an interviewer actually rewards. stage 1 — warm-up 1. background + why this role. \"7 years as an engineer; i started in edge computer vision and video analytics — jetson nano, deepstream, gstreamer, tensorrt with int8/fp16, custom trackers outperforming sort on arm. then i spent 4 years going deep on distributed systems and performance engineering building petabyte-scale data platforms on gcp/k8s. this role is the intersection: it wants someone who can make vision ai run on live video, reliably and fast — that's edge-cv depth plus systems rigor, which is exactly my arc.\" 2. maps to systems-first how? \"my cv background isn't notebook training — it was always deployment : porting models to nxp/samsung socs with quantization, real-time deepstream pipelines on jetson, dockerized inference servers behind rest. and my data-platform years were pure systems: throughput, fault tolerance, profiling. the jd's pillars — streaming pipelines, low-latency inference, crash-proof systems, performance debugging — are the things i've actually shipped.\" 3. why move back. \"i love the systems side, and live vision is where i get to apply it to something physical and real-time. the data-platform work made me a much better systems engineer — measurement-driven, comfortable with ambiguity, obsessed with what fails at scale. i want to point that at vision ai again.\" stage 2 — rapid-fire (keep these tight) 4. rtsp to ingest from cameras (pull, ~0.5–3s); webrtc to deliver to browsers/ peers (<500ms). real systems use both. 5. hls segments video into multi-second chunks → 6–30s latency. built for cdn broadcast, not \"obsess over milliseconds.\" webrtc for interactive. 6. i = full keyframe (standalone). p = diff from previous. b = diff from past and future . disable b-frames for low latency because the decoder must wait for the future frame to decode the b-frame — adds latency and reordering. 7. because p/b frames are diffs that reference back to a keyframe. with no keyframe in hand there's nothing to apply the diffs to — you must wait for the next i-frame. 8. it decodes on the cpu (ffmpeg under the hood) and copies every frame to host memory, with opaque internal buffering. one or two 1080p streams saturate several cores; 30 is impossible. use gstreamer + nvdec , keep frames on gpu. 9. bounded queue, drop oldest / keep latest for live. a big buffer doesn't help — if you can't catch up, it just means you're always acting on increasingly old frames, and it grows latency and memory unboundedly. live wants now . 10. no — for video. the gil only blocks two threads running python bytecode at once. decode (cv2/nvdec), numpy, and cuda/tensorrt calls release the gil , so threads run those in parallel. the gil only bites pure-python hot loops, which i keep off the per-frame path. cpu-bound python → processes. 11. fp16 ≈ 2× faster, half memory, near-lossless — try first. int8 ≈ 3–4× and ¼ memory but needs a calibration dataset to set per-layer float ranges, and risks accuracy — so i always re-measure map, and use qat if ptq drops too much. stage 3 — deep dive 12. pytorch detector → fastest stable jetson inference. \"export to onnx ; build a tensorrt engine on the jetson itself so kernels are tuned for that arch. start fp16 (near-free), then int8 with a representative calibration set, re-validating map each step. run decode on nvdec , preprocess (resize/normalize/color) on the gpu to avoid host copies, batch with nvstreammux if multi-camera, run inference via deepstream nvinfer , do nms on gpu, and pull only metadata (boxes/ids) back to cpu. then i profile with nsys/tegrastats, check p99 and gpu utilization, and attack the fattest stage. cache the engine so startup doesn't rebuild it.\" 13. int8 dropped map 4 points — debug. \"first suspect calibration data : was it representative of deployment lighting/ angles/classes? re-calibrate with better samples. check whether specific layers are sensitive — mixed precision (keep those in fp16, rest int8). compare per-class metrics to see if it's one class collapsing. if ptq can't recover it, move to qat . and confirm it's the quantization, not a preprocessing mismatch between calibration and inference — same resize/normalize/color path.\" 14. silent freeze in a 40-camera system. \"no error means the bus won't tell me, so i run a per-camera freshness watchdog : track the timestamp of the last frame; if now - last > threshold , declare it dead. for recovery, each camera is an isolated supervised worker (its own process or a deepstream source the mux tolerates dropping) — blast radius is one camera. on detection i tear the pipeline to null, reconnect with exponential backoff + jitter , and wait for the next keyframe. the other 39 never see it because they share no state with the dead one and the mux is configured to proceed without a stalled source.\" 15. reconnect floods logs / hammers camera. \"that's a missing backoff . replace fixed-interval retries with exponential backoff (1s, 2s, 4s… capped at ~30s) plus random jitter so 40 cameras don't retry in lockstep after a network blip. log at decreasing frequency or aggregate ( camera x down, n attempts ). reset the counter on successful reconnect.\" stage 4 — system design 16. see ../06-system-design/worked-example-multicam.md for the full answer. skeleton: clarify (scale/sla/edge-cloud) → estimate (one gpu won't do 50 → edge nodes of ~16) → architecture (nvdec → nvstreammux batch → int8 trt + tracker at edge → metadata to message bus → cloud storage/ui/retraining) → latency budget (find fat slice, p99, gpu util) → crash-proof (isolate, watchdog, backoff, degrade, supervise, bounded memory). curveballs: answers in ../06-system-design/curveballs.md . the pattern: restate constraint → name the tradeoff it stresses → change the minimum → state what you give up. stage 5 — your questions (have 3+ ready) strong ones (signal seniority + genuine fit): \"what's the proprietary vision framework built on — gstreamer/deepstream, or something custom? where does it hurt today?\" \"where's the current bottleneck — decode, inference, network, or the cloud aggregation layer?\" \"how is ownership split between the ml team training models and the systems team running them? where does my role sit?\" \"what does 'crash-proof' currently look like in production — what's your worst recurring failure mode?\" \"what scale are you at now (cameras/sites) and where do you need it to go?\" avoid: questions answered on the careers page, or only about perks. → grade yourself: rubric.md","words":1085},{"path":"08-mock-interview/rubric.md","title":"Self-Grading Rubric","section":"8 · Mock Interview","quiz":false,"accent":"#7479e6","html":"<h1 id=\"self-grading-rubric\">Self-Grading Rubric<\/h1>\n<p>Score each answer 1–4. The bar isn't perfection — it's senior-engineer <em>reasoning<\/em>.<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Score<\/th><th>Means<\/th><\/tr><\/thead><tbody><tr><td>4<\/td><td>Correct + names the tradeoff + ties to real experience + would convince me<\/td><\/tr><tr><td>3<\/td><td>Correct and clear, but thin on tradeoffs or examples<\/td><\/tr><tr><td>2<\/td><td>Roughly right but vague, missed the key nuance<\/td><\/tr><tr><td>1<\/td><td>Wrong, or couldn't answer<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"what-interviewers-actually-reward-score-yourself-on-these-too\">What interviewers actually reward (score yourself on these too)<\/h2>\n<ul><li><strong>Clarifies before answering<\/strong> design/ambiguous questions (don't assume scale/SLA).<\/li><li><strong>Names tradeoffs<\/strong>, not just \"the answer\" — \"X over Y because…, but the cost is…\".<\/li><li><strong>Thinks out loud<\/strong> — they're scoring your reasoning, not just the conclusion.<\/li><li><strong>Quantifies<\/strong> — \"NVDEC decodes dozens of streams,\" \"INT8 ≈ 3–4×,\" p99 not average.<\/li><li><strong>Connects to real work<\/strong> — Jetson/DeepStream/TensorRT, the NVMe-vs-NAS diagnosis.<\/li><li><strong>Addresses failure unprompted<\/strong> — for any live-systems answer, mention what breaks.<\/li><li><strong>Composure on curveballs<\/strong> — restate, adjust, state the cost. Calm &gt; perfect.<\/li><\/ul>\n<h2

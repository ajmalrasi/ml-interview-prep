 id=\"red-flags-to-self-check\">Red flags to self-check<\/h2>\n<ul><li>Jumped to a solution without clarifying scale/SLA.<\/li><li>Said \"just add a bigger buffer / more RAM\" (unbounded thinking).<\/li><li>Claimed the GIL makes Python useless for video (wrong — natives release it).<\/li><li>Forgot keyframes when discussing reconnect.<\/li><li>No mention of measurement/profiling when asked about performance.<\/li><li>Over-talked. Tight, structured answers beat rambling.<\/li><\/ul>\n<h2 id=\"target-before-the-interview\">Target before the interview<\/h2>\n<ul><li>Stage 2 rapid-fire: <strong>all 4s<\/strong> (these are recall — drill until automatic).<\/li><li>Stage 3 deep dive: at least one topic at <strong>4<\/strong>, the rest <strong>3+<\/strong>.<\/li><li>Stage 4 design: hit all five framework steps + handle 2 curveballs at <strong>3+<\/strong>.<\/li><\/ul>\n<h2 id=\"how-to-practice-this-week\">How to practice this week<\/h2>\n<ol><li>Day 1–2: read sections 01–05, do the drill bank out loud.<\/li><li>Day 3: sections 06 + curveballs; do the design question on a whiteboard.<\/li><li>Day 4: full mock (solo or ask me to run it live), grade, re-drill weak spots.<\/li><li>Morning of: cheat-sheet.md only. Breathe.<\/li><\/ol>\n<p>→ Want me to run this live and grade you? Just say <em>\"run the KoiReader mock.\"<\/em><\/p>","toc":[{"level":2,"id":"what-interviewers-actually-reward-score-yourself-on-these-too","text":"What interviewers actually reward (score yourself on these too)"},{"level":2,"id":"red-flags-to-self-check","text":"Red flags to self-check"},{"level":2,"id":"target-before-the-interview","text":"Target before the interview"},{"level":2,"id":"how-to-practice-this-week","text":"How to practice this week"}],"text":"self-grading rubric score each answer 1–4. the bar isn't perfection — it's senior-engineer reasoning . score means 4 correct + names the tradeoff + ties to real experience + would convince me 3 correct and clear, but thin on tradeoffs or examples 2 roughly right but vague, missed the key nuance 1 wrong, or couldn't answer what interviewers actually reward (score yourself on these too) clarifies before answering design/ambiguous questions (don't assume scale/sla). names tradeoffs , not just \"the answer\" — \"x over y because…, but the cost is…\". thinks out loud — they're scoring your reasoning, not just the conclusion. quantifies — \"nvdec decodes dozens of streams,\" \"int8 ≈ 3–4×,\" p99 not average. connects to real work — jetson/deepstream/tensorrt, the nvme-vs-nas diagnosis. addresses failure unprompted — for any live-systems answer, mention what breaks. composure on curveballs — restate, adjust, state the cost. calm > perfect. red flags to self-check jumped to a solution without clarifying scale/sla. said \"just add a bigger buffer / more ram\" (unbounded thinking). claimed the gil makes python useless for video (wrong — natives release it). forgot keyframes when discussing reconnect. no mention of measurement/profiling when asked about performance. over-talked. tight, structured answers beat rambling. target before the interview stage 2 rapid-fire: all 4s (these are recall — drill until automatic). stage 3 deep dive: at least one topic at 4 , the rest 3+ . stage 4 design: hit all five framework steps + handle 2 curveballs at 3+ . how to practice this week day 1–2: read sections 01–05, do the drill bank out loud. day 3: sections 06 + curveballs; do the design question on a whiteboard. day 4: full mock (solo or ask me to run it live), grade, re-drill weak spots. morning of: cheat-sheet.md only. breathe. → want me to run this live and grade you? just say \"run the koireader mock.\"","words":312},{"path":"09-computer-vision-fundamentals/README.md","title":"Overview","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"09-computer-vision-fundamentals-refresher\">09 — Computer Vision Fundamentals (Refresher)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The systems sections (01–08) are the <em>job<\/em>. This section is the <em>foundation<\/em> the JD assumes you already have: <em>\"extensive experience with OpenCV and image-processing fundamentals — geometry, color spaces, pixel-level manipulation\"<\/em> and <em>\"command over geometry and statistics for designing complex logic layers on top of model detections.\"<\/em> You've shipped all of this (surround- view, calibration, RANSAC, SIFT/ORB, fisheye). This is the fast refresh.<\/div><\/div>\n<h2 id=\"what-the-interview-actually-expects-on-cv\">What the interview actually expects on CV<\/h2>\n<p>This is <strong>not<\/strong> a research/ML-theory grilling (the role is systems-first). Expect:<\/p>\n<ul><li><strong>Rapid-fire fundamentals:<\/strong> \"what's a homography?\", \"BGR vs RGB?\", \"how does NMS<\/li><\/ul>\n<p>work?\", \"what does Canny do?\" — quick, confident answers.<\/p>\n<ul><li><strong>The logic layer:<\/strong> the JD's standout phrase is *\"complex logic layers on top of<\/li><\/ul>\n<p>model detections.\"* This is geometry + statistics over bounding boxes: zones,   counting, line-crossing, mapping image points to the ground plane. <strong>This is the   CV topic most likely to go deep<\/strong> because it's systems-adjacent.<\/p>\n<ul><li><strong>OpenCV practical fluency:<\/strong> you reach for the right function and know its cost<\/li><\/ul>\n<p>(CPU vs GPU, per-pixel vs vectorized).<\/p>\n<h2 id=\"files-in-order\">Files (in order)<\/h2>\n<ol><li><a class=\"mdlink\" data-href=\"image-basics-color-spaces.md\" href=\"#\">image-basics-color-spaces.md<\/a> — pixels, channels, BGR/RGB/YUV/NV12/HSV/gray<\/li><li><a class=\"mdlink\" data-href=\"filtering-morphology-edges.md\" href=\"#\">filtering-morphology-edges.md<\/a> — convolution, blur, threshold, morphology, Sobel/Canny<\/li><li><a class=\"mdlink\" data-href=\"geometry-and-transforms.md\" href=\"#\">geometry-and-transforms.md<\/a> — translation/rotation/scale, affine, perspective, homography<\/li><li><a class=\"mdlink\" data-href=\"camera-calibration.md\" href=\"#\">camera-calibration.md<\/a> — intrinsics/extrinsics, distortion, undistort, fisheye<\/li><li><a class=\"mdlink\" data-href=\"features-and-matching.md\" href=\"#\">features-and-matching.md<\/a> — SIFT/SURF/ORB, matching, RANSAC, epipolar geometry<\/li><li><a class=\"mdlink\" data-href=\"detection-tracking-math.md\" href=\"#\">detection-tracking-math.md<\/a> — IoU, NMS, anchors, mAP, Kalman, SORT/DeepSORT, Hungarian<\/li><li><a class=\"mdlink\" data-href=\"logic-on-detections.md\" href=\"#\">logic-on-detections.md<\/a> — the JD's logic layer: zones, counting, homography to ground<\/li><\/ol>\n<p>→ Quick refresh: <strong><a class=\"mdlink\" data-href=\"cv-cheat-sheet.md\" href=\"#\">cv-cheat-sheet.md<\/a><\/strong> · Start: <strong><a class=\"mdlink\" data-href=\"image-basics-color-spaces.md\" href=\"#\">image-basics-color-spaces.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-the-interview-actually-expects-on-cv","text":"What the interview actually expects on CV"},{"level":2,"id":"files-in-order","text":"Files (in order)"}],"text":"09 — computer vision fundamentals (refresher) 💡 tl;dr the systems sections (01–08) are the job . this section is the foundation the jd assumes you already have: \"extensive experience with opencv and image-processing fundamentals — geometry, color spaces, pixel-level manipulation\" and \"command over geometry and statistics for designing complex logic layers on top of model detections.\" you've shipped all of this (surround- view, calibration, ransac, sift/orb, fisheye). this is the fast refresh. what the interview actually expects on cv this is not a research/ml-theory grilling (the role is systems-first). expect: rapid-fire fundamentals: \"what's a homography?\", \"bgr vs rgb?\", \"how does nms work?\", \"what does canny do?\" — quick, confident answers. the logic layer: the jd's standout phrase is *\"complex logic layers on top of model detections.\"* this is geometry + statistics over bounding boxes: zones, counting, line-crossing, mapping image points to the ground plane. this is the cv topic most likely to go deep because it's systems-adjacent. opencv practical fluency: you reach for the right function and know its cost (cpu vs gpu, per-pixel vs vectorized). files (in order) image-basics-color-spaces.md — pixels, channels, bgr/rgb/yuv/nv12/hsv/gray filtering-morphology-edges.md — convolution, blur, threshold, morphology, sobel/canny geometry-and-transforms.md — translation/rotation/scale, affine, perspective, homography camera-calibration.md — intrinsics/extrinsics, distortion, undistort, fisheye features-and-matching.md — sift/surf/orb, matching, ransac, epipolar geometry detection-tracking-math.md — iou, nms, anchors, map, kalman, sort/deepsort, hungarian logic-on-detections.md — the jd's logic layer: zones, counting, homography to ground → quick refresh: cv-cheat-sheet.md · start: image-basics-color-spaces.md","words":237},{"path":"09-computer-vision-fundamentals/image-basics-color-spaces.md","title":"Image Basics & Color Spaces","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"image-basics-color-spaces\">Image Basics &amp; Color Spaces<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> An image is a grid of numbers. A grayscale image is one number per pixel (0–255); a color image is three (or four). The catch that bites everyone: <strong>OpenCV loads images as BGR, not RGB<\/strong>, and <strong>video decoders output YUV/NV12, not RGB<\/strong>. Most \"my model is suddenly inaccurate\" bugs are a color-order or color-space mismatch.<\/div><\/div>\n<h2 id=\"the-mental-model\">The mental model<\/h2>\n<p>A photo is a spreadsheet. Each cell is a pixel. Grayscale = one value per cell (brightness). Color = three stacked spreadsheets (channels). The <em>order<\/em> and <em>meaning<\/em> of those channels is the whole game.<\/p>\n<h2 id=\"pixels-channels-dtype\">Pixels, channels, dtype<\/h2>\n<ul><li><strong>Resolution:<\/strong> width × height in pixels. 1080p = 1920×1080.<\/li><li><strong>Channels:<\/strong> grayscale = 1, color = 3 (BGR/RGB), with alpha = 4 (BGRA).<\/li><li><strong>Bit depth / dtype:<\/strong> usually <code>uint8<\/code> (0–255 per channel). Sometimes <code>float32<\/code><\/li><\/ul>\n<p>(0–1) after normalization for a model. A numpy frame is shape <code>(H, W, C)<\/code>.<\/p>\n<ul><li><strong>Pixel-level manipulation<\/strong> = indexing/slicing that array: <code>img[y, x]<\/code> is a<\/li><\/ul>\n<p>pixel, <code>img[100:200, 50:150]<\/code> is a crop (a <em>view<\/em>, not a copy — careful).<\/p>\n<h2 id=\"color-spaces-you-must-name\">Color spaces you must name<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Space<\/th><th>What it is<\/th><th>When<\/th><\/tr><\/thead><tbody><tr><td><strong>BGR<\/strong><\/td><td>OpenCV's default channel order<\/td><td><code>cv2.imread<\/code>, most OpenCV I/O<\/td><\/tr><tr><td><strong>RGB<\/strong><\/td><td>\"Normal\" order<\/td><td>most DL models, PIL, matplotlib<\/td><\/tr><tr><td><strong>Grayscale<\/strong><\/td><td>brightness only, 1 channel<\/td><td>edges, thresholding, classical CV (less data, faster)<\/td><\/tr><tr><td><strong>HSV<\/strong><\/td><td>Hue, Saturation, Value<\/td><td><strong>color-based segmentation<\/strong> — hue is robust to lighting/shadows<\/td><\/tr><tr><td><strong>YUV / YCbCr<\/strong><\/td><td>luma (Y) + chroma (U,V)<\/td><td>how video is <em>stored/transmitted<\/em>; Y is brightness<\/td><\/tr><tr><td><strong>NV12<\/strong><\/td><td>a YUV 4:2:0 layout<\/td><td>what <strong>NVDEC/GStreamer output<\/strong> — convert to BGR for OpenCV<\/td><\/tr><tr><td><strong>LAB<\/strong><\/td><td>perceptually uniform<\/td><td>color difference, white balance, photometric work<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-two-bugs-that-cost-people-offers\">The two bugs that cost people offers<\/h2>\n<ol><li><strong>BGR vs RGB:<\/strong> OpenCV reads BGR; you feed it to an RGB-trained model without<\/li><\/ol>\n<p><code>cv2.cvtColor(img, cv2.COLOR_BGR2RGB)<\/code> → channels swapped → accuracy quietly    tanks (reds become blues). Always confirm the order your model expects.<\/p>\n<ol><li><strong>YUV/NV12 → BGR:<\/strong> decoders emit NV12; your model wants BGR/RGB. The conversion<\/li><\/ol>\n<p>is per-pixel per-frame — do it <strong>on the GPU<\/strong> (<code>nvvidconv<\/code>), not the CPU, or you    re-introduce the copy cost you avoided with hardware decode (see    <a class=\"mdlink\" data-href=\"../01-video-streaming/decode-encode-pipeline.md\" href=\"#\">../01-video-streaming/decode-encode-pipeline.md<\/a>).<\/p>\n<h2 id=\"why-hsv-for-color-tasks-classic-question\">Why HSV for color tasks (classic question)<\/h2>\n<p>In RGB, a \"red\" object under sun vs shadow has very different R,G,B values — all three change with brightness. In <strong>HSV<\/strong>, the <em>hue<\/em> stays roughly constant; only <em>value<\/em> changes. So \"find the red boxes\" is a simple hue range in HSV but a mess in RGB. This is the standard answer to \"why HSV?\"<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Grayscale vs color — when drop to gray?<\/strong> Grayscale = ⅓ the data, faster, and many classical ops (edges, thresholding, template matching) only need brightness. Drop to gray when color carries no signal for the task; keep color when hue/appearance matters (e.g., color classification).<\/p>\n<p><strong>HSV vs RGB for thresholding a colored object?<\/strong> HSV separates color (hue) from brightness (value), so it's robust to lighting; RGB mixes them, so thresholds break under shadow/sun. HSV for color segmentation.<\/p>\n<p><strong>Why does color conversion cost real time in a video pipeline?<\/strong> It's per-pixel, per-frame, every frame. At 30fps × N cameras that's a lot of arithmetic and, if done on CPU, a GPU↔CPU round trip. Convert on the GPU and keep frames there.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"filtering-morphology-edges.md\" href=\"#\">filtering-morphology-edges.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-mental-model","text":"The mental model"},{"level":2,"id":"pixels-channels-dtype","text":"Pixels, channels, dtype"},{"level":2,"id":"color-spaces-you-must-name","text":"Color spaces you must name"},{"level":2,"id":"the-two-bugs-that-cost-people-offers","text":"The two bugs that cost people offers"},{"level":2,"id":"why-hsv-for-color-tasks-classic-question","text":"Why HSV for color tasks (classic question)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"image basics & color spaces 💡 tl;dr an image is a grid of numbers. a grayscale image is one number per pixel (0–255); a color image is three (or four). the catch that bites everyone: opencv loads images as bgr, not rgb , and video decoders output yuv/nv12, not rgb . most \"my model is suddenly inaccurate\" bugs are a color-order or color-space mismatch. the mental model a photo is a spreadsheet. each cell is a pixel. grayscale = one value per cell (brightness). color = three stacked spreadsheets (channels). the order and meaning of those channels is the whole game. pixels, channels, dtype resolution: width × height in pixels. 1080p = 1920×1080. channels: grayscale = 1, color = 3 (bgr/rgb), with alpha = 4 (bgra). bit depth / dtype: usually uint8 (0–255 per channel). sometimes float32 (0–1) after normalization for a model. a numpy frame is shape (h, w, c) . pixel-level manipulation = indexing/slicing that array: img[y, x] is a pixel, img[100:200, 50:150] is a crop (a view , not a copy — careful). color spaces you must name space what it is when bgr opencv's default channel order cv2.imread , most opencv i/o rgb \"normal\" order most dl models, pil, matplotlib grayscale brightness only, 1 channel edges, thresholding, classical cv (less data, faster) hsv hue, saturation, value color-based segmentation — hue is robust to lighting/shadows yuv / ycbcr luma (y) + chroma (u,v) how video is stored/transmitted ; y is brightness nv12 a yuv 4:2:0 layout what nvdec/gstreamer output — convert to bgr for opencv lab perceptually uniform color difference, white balance, photometric work the two bugs that cost people offers bgr vs rgb: opencv reads bgr; you feed it to an rgb-trained model without cv2.cvtcolor(img, cv2.color_bgr2rgb) → channels swapped → accuracy quietly tanks (reds become blues). always confirm the order your model expects. yuv/nv12 → bgr: decoders emit nv12; your model wants bgr/rgb. the conversion is per-pixel per-frame — do it on the gpu ( nvvidconv ), not the cpu, or you re-introduce the copy cost you avoided with hardware decode (see ../01-video-streaming/decode-encode-pipeline.md ). why hsv for color tasks (classic question) in rgb, a \"red\" object under sun vs shadow has very different r,g,b values — all three change with brightness. in hsv , the hue stays roughly constant; only value changes. so \"find the red boxes\" is a simple hue range in hsv but a mess in rgb. this is the standard answer to \"why hsv?\" why x over y grayscale vs color — when drop to gray? grayscale = ⅓ the data, faster, and many classical ops (edges, thresholding, template matching) only need brightness. drop to gray when color carries no signal for the task; keep color when hue/appearance matters (e.g., color classification). hsv vs rgb for thresholding a colored object? hsv separates color (hue) from brightness (value), so it's robust to lighting; rgb mixes them, so thresholds break under shadow/sun. hsv for color segmentation. why does color conversion cost real time in a video pipeline? it's per-pixel, per-frame, every frame. at 30fps × n cameras that's a lot of arithmetic and, if done on cpu, a gpu↔cpu round trip. convert on the gpu and keep frames there. → next: filtering-morphology-edges.md","words":537},{"path":"09-computer-vision-fundamentals/filtering-morphology-edges.md","title":"Filtering, Morphology & Edges","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"filtering-morphology-edges\">Filtering, Morphology &amp; Edges<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Most classical image processing is <strong>convolution<\/strong> — slide a small kernel over the image and compute a weighted sum per pixel. Blur kernels smooth, derivative kernels (Sobel) find edges, Canny chains it into clean edges, and morphology (erode/dilate) cleans up binary masks. You used all of this in surround-view and image-quality work.<\/div><\/div>\n<h2 id=\"convolution-a-sliding-window\">Convolution = a sliding window<\/h2>\n<p>A <strong>kernel<\/strong> (e.g., 3×3 weights) slides over every pixel; the output pixel is the weighted sum of its neighborhood. Change the weights, change the effect. This is <em>also<\/em> what a CNN's conv layer does — classical kernels are hand-designed, CNN kernels are learned.<\/p>\n<h2 id=\"blurring-smoothing-and-why\">Blurring / smoothing (and why)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Filter<\/th><th>What<\/th><th>Use<\/th><\/tr><\/thead><tbody><tr><td><strong>Gaussian blur<\/strong><\/td><td>weighted average, center-heavy<\/td><td>denoise, pre-smooth before edge detection<\/td><\/tr><tr><td><strong>Median blur<\/strong><\/td><td>replace pixel with neighborhood median<\/td><td>kills salt-and-pepper noise, preserves edges<\/td><\/tr><tr><td><strong>Bilateral<\/strong><\/td><td>blur but <strong>preserve edges<\/strong> (weights by intensity similarity)<\/td><td>smooth skin/surfaces without losing boundaries<\/td><\/tr><tr><td><strong>Box/average<\/strong><\/td><td>plain mean<\/td><td>fast, crude<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Why blur before edges? Derivatives amplify noise. A little Gaussian first → far cleaner edges. (Canny does this internally.)<\/p>\n<h2 id=\"thresholding-image-binary\">Thresholding (image → binary)<\/h2>\n<p>Turn grayscale into black/white (a mask):<\/p>\n<ul><li><strong>Global threshold:<\/strong> one cutoff. Simple, fails under uneven lighting.<\/li><li><strong>Otsu:<\/strong> auto-picks the threshold from the histogram (bimodal images).<\/li><li><strong>Adaptive:<\/strong> threshold varies per region → handles shadows/gradients. The right<\/li><\/ul>\n<p>choice for real-world lighting.<\/p>\n<h2 id=\"morphology-clean-up-binary-masks\">Morphology (clean up binary masks)<\/h2>\n<p>Operate on the <em>shape<\/em> of white regions with a structuring element:<\/p>\n<ul><li><strong>Erosion<\/strong> — shrinks white regions (removes small specks, thins).<\/li><li><strong>Dilation<\/strong> — grows white regions (fills small holes, thickens).<\/li><li><strong>Opening<\/strong> = erode→dilate — removes small noise blobs.<\/li><li><strong>Closing<\/strong> = dilate→erode — fills small holes/gaps inside objects.<\/li><\/ul>\n<p>You reach for these to clean a segmentation mask before contour/blob analysis.<\/p>\n<h2 id=\"edge-detection\">Edge detection<\/h2>\n<ul><li><strong>Sobel / Scharr<\/strong> — directional first derivatives (gradient in x or y). Magnitude<\/li><\/ul>\n<p>= edge strength, direction = edge orientation.<\/p>\n<ul><li><strong>Laplacian<\/strong> — second derivative; zero-crossings = edges (also a focus/blur<\/li><\/ul>\n<p>measure — variance of Laplacian is a classic sharpness metric, relevant to your   IR image-quality work).<\/p>\n<ul><li><strong>Canny<\/strong> — the gold standard: Gaussian blur → gradients (Sobel) → non-max<\/li><\/ul>\n<p>suppression (thin edges to 1px) → double-threshold + hysteresis (link strong/weak   edges). Output: clean, thin, connected edges.<\/p>\n<h2 id=\"contours-connected-components-after-a-mask\">Contours &amp; connected components (after a mask)<\/h2>\n<ul><li><strong>Contours<\/strong> (<code>findContours<\/code>) — outlines of white regions → area, perimeter,<\/li><\/ul>\n<p>bounding box, shape. Used for blob counting, shape filtering.<\/p>\n<ul><li><strong>Connected components<\/strong> — label each separate white blob with an ID. Good for<\/li><\/ul>\n<p>counting/measuring distinct regions.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Gaussian vs median vs bilateral blur?<\/strong> Gaussian = general denoise/smoothing (but blurs edges). Median = best for salt-and- pepper noise, keeps edges. Bilateral = smooth flat areas <em>and<\/em> keep edges, but slower. Pick by noise type and whether edges must survive.<\/p>\n<p><strong>Global vs adaptive threshold?<\/strong> Global is fast but assumes uniform lighting; it fails on shadows/gradients. Adaptive computes a local threshold per region → robust to uneven lighting. Real scenes → adaptive (or Otsu if the histogram is cleanly bimodal).<\/p>\n<p><strong>Opening vs closing?<\/strong> Opening removes small <em>external<\/em> noise (specks outside objects); closing fills small <em>internal<\/em> holes/gaps. Choose by whether your mask has stray dots (opening) or holes (closing).<\/p>\n<p><strong>Why is Canny better than raw Sobel?<\/strong> Sobel gives thick, noisy gradient magnitudes. Canny adds blur, non-max suppression (1px-thin edges), and hysteresis thresholding (connect real edges, drop noise) → far cleaner, the production default.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"geometry-and-transforms.md\" href=\"#\">geometry-and-transforms.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"convolution-a-sliding-window","text":"Convolution = a sliding window"},{"level":2,"id":"blurring-smoothing-and-why","text":"Blurring / smoothing (and why)"},{"level":2,"id":"thresholding-image-binary","text":"Thresholding (image → binary)"},{"level":2,"id":"morphology-clean-up-binary-masks","text":"Morphology (clean up binary masks)"},{"level":2,"id":"edge-detection","text":"Edge detection"},{"level":2,"id":"contours-connected-components-after-a-mask","text":"Contours &amp; connected components (after a mask)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"filtering, morphology & edges 💡 tl;dr most classical image processing is convolution — slide a small kernel over the image and compute a weighted sum per pixel. blur kernels smooth, derivative kernels (sobel) find edges, canny chains it into clean edges, and morphology (erode/dilate) cleans up binary masks. you used all of this in surround-view and image-quality work. convolution = a sliding window a kernel (e.g., 3×3 weights) slides over every pixel; the output pixel is the weighted sum of its neighborhood. change the weights, change the effect. this is also what a cnn's conv layer does — classical kernels are hand-designed, cnn kernels are learned. blurring / smoothing (and why) filter what use gaussian blur weighted average, center-heavy denoise, pre-smooth before edge detection median blur replace pixel with neighborhood median kills salt-and-pepper noise, preserves edges bilateral blur but preserve edges (weights by intensity similarity) smooth skin/surfaces without losing boundaries box/average plain mean fast, crude why blur before edges? derivatives amplify noise. a little gaussian first → far cleaner edges. (canny does this internally.) thresholding (image → binary) turn grayscale into black/white (a mask): global threshold: one cutoff. simple, fails under uneven lighting. otsu: auto-picks the threshold from the histogram (bimodal images). adaptive: threshold varies per region → handles shadows/gradients. the right choice for real-world lighting. morphology (clean up binary masks) operate on the shape of white regions with a structuring element: erosion — shrinks white regions (removes small specks, thins). dilation — grows white regions (fills small holes, thickens). opening = erode→dilate — removes small noise blobs. closing = dilate→erode — fills small holes/gaps inside objects. you reach for these to clean a segmentation mask before contour/blob analysis. edge detection sobel / scharr — directional first derivatives (gradient in x or y). magnitude = edge strength, direction = edge orientation. laplacian — second derivative; zero-crossings = edges (also a focus/blur measure — variance of laplacian is a classic sharpness metric, relevant to your ir image-quality work). canny — the gold standard: gaussian blur → gradients (sobel) → non-max suppression (thin edges to 1px) → double-threshold + hysteresis (link strong/weak edges). output: clean, thin, connected edges. contours & connected components (after a mask) contours ( findcontours ) — outlines of white regions → area, perimeter, bounding box, shape. used for blob counting, shape filtering. connected components — label each separate white blob with an id. good for counting/measuring distinct regions. why x over y gaussian vs median vs bilateral blur? gaussian = general denoise/smoothing (but blurs edges). median = best for salt-and- pepper noise, keeps edges. bilateral = smooth flat areas and keep edges, but slower. pick by noise type and whether edges must survive. global vs adaptive threshold? global is fast but assumes uniform lighting; it fails on shadows/gradients. adaptive computes a local threshold per region → robust to uneven lighting. real scenes → adaptive (or otsu if the histogram is cleanly bimodal). opening vs closing? opening removes small external noise (specks outside objects); closing fills small internal holes/gaps. choose by whether your mask has stray dots (opening) or holes (closing). why is canny better than raw sobel? sobel gives thick, noisy gradient magnitudes. canny adds blur, non-max suppression (1px-thin edges), and hysteresis thresholding (connect real edges, drop noise) → far cleaner, the production default. → next: geometry-and-transforms.md","words":549},{"path":"09-computer-vision-fundamentals/geometry-and-transforms.md","title":"Geometry & Transforms","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"geometry-transforms\">Geometry &amp; Transforms<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 200\" role=\"img\" aria-label=\"A homography warps one plane onto another\"><rect class=\"dg-box\" x=\"60\" y=\"50\" width=\"120\" height=\"120\" rx=\"6\"/><text class=\"dg-sub\" x=\"120\" y=\"40\" text-anchor=\"middle\">image plane<\/text><line class=\"dg-line\" x1=\"210\" y1=\"110\" x2=\"293\" y2=\"110\"/><polygon class=\"dg-arrow\" points=\"293,105 300,110 293,115\"/><text class=\"dg-accent-tx\" x=\"255\" y=\"98\" text-anchor=\"middle\">H<\/text><polygon class=\"dg-box\" points=\"360,70 660,50 600,180 410,160\"/><text class=\"dg-sub\" x=\"520\" y=\"40\" text-anchor=\"middle\">ground plane (bird's-eye)<\/text><text class=\"dg-sub\" x=\"360\" y=\"195\" text-anchor=\"middle\">4 point correspondences · maps detections to real-world floor coords<\/text><\/svg><figcaption>A homography warps one plane onto another<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Moving/warping pixels is matrix multiplication on coordinates. Translate, rotate, scale → <strong>affine<\/strong> (2×3, keeps parallel lines). Map a tilted plane to a flat one (or one camera view to another) → <strong>homography / perspective<\/strong> (3×3, parallel lines can converge). Homography is <em>the<\/em> transform behind your surround-view and behind \"map a detection to the floor plane.\"<\/div><\/div>\n<h2 id=\"coordinates-and-homogeneous-form\">Coordinates and homogeneous form<\/h2>\n<p>A point is <code>(x, y)<\/code>. To express translation as a matrix multiply, we add a 1: <code>(x, y, 1)<\/code> — <strong>homogeneous coordinates<\/strong>. Then every transform is \"multiply the point by a matrix.\" This is why transforms compose by multiplying matrices.<\/p>\n<h2 id=\"the-ladder-of-2d-transforms\">The ladder of 2D transforms<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Transform<\/th><th>Matrix<\/th><th>Preserves<\/th><th>Degrees of freedom<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td><strong>Translation<\/strong><\/td><td>2×3<\/td><td>everything, just shifts<\/td><td>2<\/td><td>move ROI<\/td><\/tr><tr><td><strong>Euclidean (rigid)<\/strong><\/td><td>2×3<\/td><td>distances, angles<\/td><td>3<\/td><td>rotate + translate<\/td><\/tr><tr><td><strong>Similarity<\/strong><\/td><td>2×3<\/td><td>angles, ratios<\/td><td>4<\/td><td>rotate + uniform scale<\/td><\/tr><tr><td><strong>Affine<\/strong><\/td><td>2×3<\/td><td>parallel lines, ratios<\/td><td>6<\/td><td>shear, non-uniform scale<\/td><\/tr><tr><td><strong>Homography (projective)<\/strong><\/td><td>3×3<\/td><td>straight lines only<\/td><td>8<\/td><td>perspective / plane-to-plane<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"affine-vs-perspective-the-one-they-ask\">Affine vs perspective (the one they ask)<\/h2>\n<ul><li><strong>Affine (<code>warpAffine<\/code>, 2×3):<\/strong> parallel lines stay parallel. Rotation, scaling,<\/li><\/ul>\n<p>shear, translation. Defined by <strong>3 point correspondences<\/strong>.<\/p>\n<ul><li><strong>Perspective / homography (<code>warpPerspective<\/code>, 3×3):<\/strong> parallel lines can<\/li><\/ul>\n<p><strong>converge<\/strong> (like railroad tracks to a vanishing point). Maps any planar quad to   any other quad. Defined by <strong>4 point correspondences<\/strong>. This is what models   perspective/viewpoint change.<\/p>\n<blockquote><p>Rule of thumb: if the camera viewpoint or a tilted plane is involved → <strong>homography<\/strong>. If it's just rotate/scale/shift in-plane → <strong>affine<\/strong>.<\/p><\/blockquote>\n<h2 id=\"homography-in-practice-your-bread-and-butter\">Homography in practice (your bread and butter)<\/h2>\n<p>A homography H (3×3) maps points on one plane to another:<\/p>\n<pre><code>[x']     [x]\n[y'] = H [y]      (then divide by the 3rd coord — the \"perspective divide\")\n[w']     [1]<\/code><\/pre>\n<p>Uses you can cite:<\/p>\n<ul><li><strong>Surround-view / bird's-eye:<\/strong> warp ground-plane pixels from each fisheye camera<\/li><\/ul>\n<p>into a top-down stitched view (perspective projection — literally your resume).<\/p>\n<ul><li><strong>Map detections to the floor:<\/strong> given a camera-to-ground homography, convert a<\/li><\/ul>\n<p>person's foot pixel <code>(x, y)<\/code> to real-world floor coordinates → measure distance,   zones, dwell. (This is the JD's \"logic layers on top of detections\" — see   <a class=\"mdlink\" data-href=\"logic-on-detections.md\" href=\"#\">logic-on-detections.md<\/a>.)<\/p>\n<ul><li><strong>Image stitching / registration:<\/strong> align overlapping views.<\/li><\/ul>\n<p>You estimate H from ≥4 correspondences, usually with <strong>RANSAC<\/strong> to reject outliers (next file).<\/p>\n<h2 id=\"interpolation-the-how-of-warping\">Interpolation (the \"how\" of warping)<\/h2>\n<p>When you warp, output pixels land between input pixels — you interpolate:<\/p>\n<ul><li><strong>Nearest-neighbor<\/strong> — fastest, blocky (use for label/mask maps so you don't<\/li><\/ul>\n<p>invent classes).<\/p>\n<ul><li><strong>Bilinear<\/strong> — smooth, the default for images.<\/li><li><strong>Bicubic / Lanczos<\/strong> — sharper, slower (upscaling quality).<\/li><\/ul>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Affine vs homography?<\/strong> Affine keeps parallel lines (rotate/scale/shear/translate), needs 3 points, 6 DOF. Homography models perspective (parallel lines converge), needs 4 points, 8 DOF. Use homography whenever viewpoint/plane perspective matters; affine for simpler in-plane transforms (cheaper, more stable).<\/p>\n<p><strong>Nearest vs bilinear interpolation?<\/strong> Nearest = fast, no new values invented (mandatory for segmentation masks/label maps). Bilinear = smooth and the default for photographic images. Never bilinear- interpolate a class-label map — it fabricates non-existent classes at boundaries.<\/p>\n<p><strong>Why homogeneous coordinates at all?<\/strong> They let translation <em>and<\/em> projection be expressed as a single matrix multiply, so transforms compose by multiplication and perspective (the divide by w) falls out naturally. Without them, translation isn't linear.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"camera-calibration.md\" href=\"#\">camera-calibration.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"coordinates-and-homogeneous-form","text":"Coordinates and homogeneous form"},{"level":2,"id":"the-ladder-of-2d-transforms","text":"The ladder of 2D transforms"},{"level":2,"id":"affine-vs-perspective-the-one-they-ask","text":"Affine vs perspective (the one they ask)"},{"level":2,"id":"homography-in-practice-your-bread-and-butter","text":"Homography in practice (your bread and butter)"},{"level":2,"id":"interpolation-the-how-of-warping","text":"Interpolation (the \"how\" of warping)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"geometry & transforms image plane h ground plane (bird's-eye) 4 point correspondences · maps detections to real-world floor coords a homography warps one plane onto another 💡 tl;dr moving/warping pixels is matrix multiplication on coordinates. translate, rotate, scale → affine (2×3, keeps parallel lines). map a tilted plane to a flat one (or one camera view to another) → homography / perspective (3×3, parallel lines can converge). homography is the transform behind your surround-view and behind \"map a detection to the floor plane.\" coordinates and homogeneous form a point is (x, y) . to express translation as a matrix multiply, we add a 1: (x, y, 1) — homogeneous coordinates . then every transform is \"multiply the point by a matrix.\" this is why transforms compose by multiplying matrices. the ladder of 2d transforms transform matrix preserves degrees of freedom example translation 2×3 everything, just shifts 2 move roi euclidean (rigid) 2×3 distances, angles 3 rotate + translate similarity 2×3 angles, ratios 4 rotate + uniform scale affine 2×3 parallel lines, ratios 6 shear, non-uniform scale homography (projective) 3×3 straight lines only 8 perspective / plane-to-plane affine vs perspective (the one they ask) affine ( warpaffine , 2×3): parallel lines stay parallel. rotation, scaling, shear, translation. defined by 3 point correspondences . perspective / homography ( warpperspective , 3×3): parallel lines can converge (like railroad tracks to a vanishing point). maps any planar quad to any other quad. defined by 4 point correspondences . this is what models perspective/viewpoint change. rule of thumb: if the camera viewpoint or a tilted plane is involved → homography . if it's just rotate/scale/shift in-plane → affine . homography in practice (your bread and butter) a homography h (3×3) maps points on one plane to another: [x'] [x] [y'] = h [y] (then divide by the 3rd coord — the \"perspective divide\") [w'] [1] uses you can cite: surround-view / bird's-eye: warp ground-plane pixels from each fisheye camera into a top-down stitched view (perspective projection — literally your resume). map detections to the floor: given a camera-to-ground homography, convert a person's foot pixel (x, y) to real-world floor coordinates → measure distance, zones, dwell. (this is the jd's \"logic layers on top of detections\" — see logic-on-detections.md .) image stitching / registration: align overlapping views. you estimate h from ≥4 correspondences, usually with ransac to reject outliers (next file). interpolation (the \"how\" of warping) when you warp, output pixels land between input pixels — you interpolate: nearest-neighbor — fastest, blocky (use for label/mask maps so you don't invent classes). bilinear — smooth, the default for images. bicubic / lanczos — sharper, slower (upscaling quality). why x over y affine vs homography? affine keeps parallel lines (rotate/scale/shear/translate), needs 3 points, 6 dof. homography models perspective (parallel lines converge), needs 4 points, 8 dof. use homography whenever viewpoint/plane perspective matters; affine for simpler in-plane transforms (cheaper, more stable). nearest vs bilinear interpolation? nearest = fast, no new values invented (mandatory for segmentation masks/label maps). bilinear = smooth and the default for photographic images. never bilinear- interpolate a class-label map — it fabricates non-existent classes at boundaries. why homogeneous coordinates at all? they let translation and projection be expressed as a single matrix multiply, so transforms compose by multiplication and perspective (the divide by w) falls out naturally. without them, translation isn't linear. → next: camera-calibration.md","words":559},{"path":"09-computer-vision-fundamentals/camera-calibration.md","title":"Camera Calibration","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"camera-calibration-distortion\">Camera Calibration &amp; Distortion<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A real camera bends straight lines (lens distortion) and has its own geometry (focal length, optical center). <strong>Calibration<\/strong> recovers those numbers so you can <em>undistort<\/em> images and connect pixels to real-world geometry. <strong>Intrinsics<\/strong> = the camera's internal parameters; <strong>extrinsics<\/strong> = where the camera sits in the world. You did exactly this in surround-view (fisheye correction + calibration).<\/div><\/div>\n<h2 id=\"intrinsics-vs-extrinsics\">Intrinsics vs extrinsics<\/h2>\n<ul><li><strong>Intrinsics (K, 3×3):<\/strong> focal lengths <code>(fx, fy)<\/code>, principal point <code>(cx, cy)<\/code>,<\/li><\/ul>\n<p>skew. Fixed per camera+lens. Maps 3D camera-space rays to image pixels.<\/p>\n<ul><li><strong>Distortion coefficients:<\/strong> radial (<code>k1, k2, k3<\/code>) — barrel/pincushion bending —<\/li><\/ul>\n<p>and tangential (<code>p1, p2<\/code>) — lens not perfectly parallel to sensor.<\/p>\n<ul><li><strong>Extrinsics (R, t):<\/strong> rotation + translation — the camera's pose in world<\/li><\/ul>\n<p>coordinates. Changes if you move the camera.<\/p>\n<p>The full pinhole model: <code>pixel = K · [R | t] · world_point<\/code> (in homogeneous coords).<\/p>\n<h2 id=\"distortion-why-straight-lines-curve\">Distortion (why straight lines curve)<\/h2>\n<ul><li><strong>Radial:<\/strong> straight lines bow outward (<strong>barrel<\/strong>, common on wide/fisheye) or<\/li><\/ul>\n<p>inward (<strong>pincushion<\/strong>). Worse toward image edges.<\/p>\n<ul><li><strong>Tangential:<\/strong> from lens/sensor misalignment; mild skew.<\/li><li><strong>Undistortion<\/strong> (<code>cv2.undistort<\/code> / <code>initUndistortRectifyMap<\/code> + <code>remap<\/code>): uses K +<\/li><\/ul>\n<p>distortion coeffs to straighten the image. Do geometry-dependent logic <em>after<\/em>   undistorting. For per-frame video, precompute the remap once and reuse — don't   recompute the maps every frame.<\/p>\n<h2 id=\"how-calibration-works-the-procedure\">How calibration works (the procedure)<\/h2>\n<p>Show a known pattern (chessboard / ChArUco) at many angles, detect its corners, and solve for K + distortion that best explain where those known 3D points land in 2D. <code>cv2.calibrateCamera<\/code> returns K, distortion, and per-view R,t. <strong>Reprojection error<\/strong> (in pixels) tells you how good the calibration is — under ~0.5px is good.<\/p>\n<h2 id=\"fisheye-your-surround-view-domain\">Fisheye (your surround-view domain)<\/h2>\n<p>Fisheye lenses have extreme radial distortion — the standard pinhole model breaks, so OpenCV has a dedicated <strong><code>cv2.fisheye<\/code><\/strong> model. Pipeline for surround-view: fisheye undistort → perspective project each camera to the ground plane (homography) → stitch into a bird's-eye view → blend seams (photometric alignment so brightness matches across cameras — literally on your resume). Great concrete story to tell.<\/p>\n<h2 id=\"why-it-matters-for-koireader\">Why it matters for KoiReader<\/h2>\n<p>Warehouse/supply-chain cameras are often wide-angle and mounted at awkward angles. To turn a detection into <em>real-world meaning<\/em> (which loading bay? how far apart? did it cross this line on the floor?), you need calibration + a ground-plane homography. That's the bridge from \"the model found a box\" to \"the box is in zone 3\" — the logic layer the JD prizes.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Pinhole vs fisheye model?<\/strong> Pinhole handles normal/mild lenses with radial+tangential coeffs. Fisheye lenses distort too severely for that model, so use OpenCV's dedicated fisheye model — using pinhole on a fisheye leaves big residual distortion at the edges.<\/p>\n<p><strong>Undistort every frame vs precompute maps?<\/strong> <code>cv2.undistort<\/code> recomputes the mapping each call (wasteful per-frame). For video, build the remap once with <code>initUndistortRectifyMap<\/code> and apply <code>cv2.remap<\/code> each frame — same result, far cheaper, ideally on GPU.<\/p>\n<p><strong>Why undistort before measuring geometry?<\/strong> Distortion bends straight lines, so any distance/angle/zone math on a distorted image is wrong, worst at the edges. Undistort first, then the homography-to-ground math is valid.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"features-and-matching.md\" href=\"#\">features-and-matching.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"intrinsics-vs-extrinsics","text":"Intrinsics vs extrinsics"},{"level":2,"id":"distortion-why-straight-lines-curve","text":"Distortion (why straight lines curve)"},{"level":2,"id":"how-calibration-works-the-procedure","text":"How calibration works (the procedure)"},{"level":2,"id":"fisheye-your-surround-view-domain","text":"Fisheye (your surround-view domain)"},{"level":2,"id":"why-it-matters-for-koireader","text":"Why it matters for KoiReader"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"camera calibration & distortion 💡 tl;dr a real camera bends straight lines (lens distortion) and has its own geometry (focal length, optical center). calibration recovers those numbers so you can undistort images and connect pixels to real-world geometry. intrinsics = the camera's internal parameters; extrinsics = where the camera sits in the world. you did exactly this in surround-view (fisheye correction + calibration). intrinsics vs extrinsics intrinsics (k, 3×3): focal lengths (fx, fy) , principal point (cx, cy) , skew. fixed per camera+lens. maps 3d camera-space rays to image pixels. distortion coefficients: radial ( k1, k2, k3 ) — barrel/pincushion bending — and tangential ( p1, p2 ) — lens not perfectly parallel to sensor. extrinsics (r, t): rotation + translation — the camera's pose in world coordinates. changes if you move the camera. the full pinhole model: pixel = k · [r | t] · world_point (in homogeneous coords). distortion (why straight lines curve) radial: straight lines bow outward ( barrel , common on wide/fisheye) or inward ( pincushion ). worse toward image edges. tangential: from lens/sensor misalignment; mild skew. undistortion ( cv2.undistort / initundistortrectifymap + remap ): uses k + distortion coeffs to straighten the image. do geometry-dependent logic after undistorting. for per-frame video, precompute the remap once and reuse — don't recompute the maps every frame. how calibration works (the procedure) show a known pattern (chessboard / charuco) at many angles, detect its corners, and solve for k + distortion that best explain where those known 3d points land in 2d. cv2.calibratecamera returns k, distortion, and per-view r,t. reprojection error (in pixels) tells you how good the calibration is — under ~0.5px is good. fisheye (your surround-view domain) fisheye lenses have extreme radial distortion — the standard pinhole model breaks, so opencv has a dedicated cv2.fisheye model. pipeline for surround-view: fisheye undistort → perspective project each camera to the ground plane (homography) → stitch into a bird's-eye view → blend seams (photometric alignment so brightness matches across cameras — literally on your resume). great concrete story to tell. why it matters for koireader warehouse/supply-chain cameras are often wide-angle and mounted at awkward angles. to turn a detection into real-world meaning (which loading bay? how far apart? did it cross this line on the floor?), you need calibration + a ground-plane homography. that's the bridge from \"the model found a box\" to \"the box is in zone 3\" — the logic layer the jd prizes. why x over y pinhole vs fisheye model? pinhole handles normal/mild lenses with radial+tangential coeffs. fisheye lenses distort too severely for that model, so use opencv's dedicated fisheye model — using pinhole on a fisheye leaves big residual distortion at the edges. undistort every frame vs precompute maps? cv2.undistort recomputes the mapping each call (wasteful per-frame). for video, build the remap once with initundistortrectifymap and apply cv2.remap each frame — same result, far cheaper, ideally on gpu. why undistort before measuring geometry? distortion bends straight lines, so any distance/angle/zone math on a distorted image is wrong, worst at the edges. undistort first, then the homography-to-ground math is valid. → next: features-and-matching.md","words":518},{"path":"09-computer-vision-fundamentals/features-and-matching.md","title":"Features & Matching","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"features-matching-epipolar-geometry\">Features, Matching &amp; Epipolar Geometry<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A <strong>feature<\/strong> is a distinctive, repeatable point (a corner, not a flat wall). You <strong>detect<\/strong> keypoints, <strong>describe<\/strong> them as vectors, then <strong>match<\/strong> descriptors across images to find correspondences. Because matches are noisy, <strong>RANSAC<\/strong> robustly fits the transform (homography / fundamental matrix) while ignoring outliers. This underpins stitching, tracking init, and multi-view geometry — all on your resume (SIFT/SURF/ORB, RANSAC, fundamental/essential matrix).<\/div><\/div>\n<h2 id=\"why-corners-not-edges-or-flat-areas\">Why corners, not edges or flat areas<\/h2>\n<p>A flat patch looks like every other flat patch — you can't localize it. An edge is ambiguous <em>along<\/em> the edge. A <strong>corner<\/strong> is unique in both directions → repeatable and matchable. That's the Harris corner intuition: large intensity change in <em>all<\/em> directions.<\/p>\n<h2 id=\"detect-describe-match\">Detect → Describe → Match<\/h2>\n<ol><li><strong>Detect keypoints<\/strong> — find corners/blobs (Harris, FAST, DoG).<\/li><li><strong>Describe<\/strong> — encode each keypoint's neighborhood as a vector invariant to<\/li><\/ol>\n<p>scale/rotation/lighting.<\/p>\n<ol><li><strong>Match<\/strong> — compare descriptors across images (nearest neighbor + Lowe's ratio<\/li><\/ol>\n<p>test to drop ambiguous matches).<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Detector/Descriptor<\/th><th>Type<\/th><th>Notes<\/th><\/tr><\/thead><tbody><tr><td><strong>SIFT<\/strong><\/td><td>float (128-d)<\/td><td>scale+rotation invariant, accurate, slower; now patent-free<\/td><\/tr><tr><td><strong>SURF<\/strong><\/td><td>float<\/td><td>faster SIFT approximation; was patented<\/td><\/tr><tr><td><strong>ORB<\/strong><\/td><td>binary (256-bit)<\/td><td>FAST + BRIEF, <strong>free, real-time<\/strong>, great on edge/ARM<\/td><\/tr><\/tbody><\/table><\/div>\n<ul><li><strong>Float descriptors (SIFT)<\/strong> → match with L2 distance.<\/li><li><strong>Binary descriptors (ORB)<\/strong> → match with <strong>Hamming distance<\/strong> (super fast). ORB<\/li><\/ul>\n<p>is the go-to when you need real-time on constrained hardware (your ARM/Jetson   world).<\/p>\n<h2 id=\"ransac-the-robust-fitting-workhorse\">RANSAC (the robust-fitting workhorse)<\/h2>\n<p>Matches contain wrong pairs (outliers). RANSAC: randomly pick the minimal sample (4 points for a homography), fit the model, count inliers (matches that agree), repeat, keep the best. Result: a transform fit on the <em>good<\/em> matches, ignoring outliers. You cite this for homography/fundamental-matrix estimation.<\/p>\n<h2 id=\"epipolar-geometry-two-views\">Epipolar geometry (two views)<\/h2>\n<p>When two cameras see the same scene:<\/p>\n<ul><li><strong>Fundamental matrix (F):<\/strong> relates corresponding points across two <strong>uncalibrated<\/strong><\/li><\/ul>\n<p>views: <code>x'ᵀ F x = 0<\/code>. A point in one image constrains its match to a <strong>line<\/strong>   (the epipolar line) in the other — turns 2D search into 1D.<\/p>\n<ul><li><strong>Essential matrix (E):<\/strong> same idea for <strong>calibrated<\/strong> cameras (<code>E = Kᵀ F K<\/code>); you<\/li><\/ul>\n<p>can decompose E into relative <strong>R, t<\/strong> between cameras → recover camera motion.<\/p>\n<ul><li><strong>Triangulation:<\/strong> with two known camera poses + a matched point, intersect the<\/li><\/ul>\n<p>rays to get the <strong>3D<\/strong> position. Basis of stereo depth / structure-from-motion.<\/p>\n<h2 id=\"where-this-shows-up-in-the-role\">Where this shows up in the role<\/h2>\n<p>Less day-to-day than tracking math, but it's the classical foundation interviewers test for \"do they really know CV.\" Realistic uses: registering/stitching camera views, initializing or validating tracks, stereo/depth, and the geometric reasoning behind multi-camera setups.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>SIFT vs ORB?<\/strong> SIFT = more accurate, scale/rotation invariant, float descriptor, heavier. ORB = binary, free, real-time, Hamming-matchable — the practical choice on edge/ARM (your hardware). Use SIFT when accuracy dominates and compute is available; ORB for real-time/embedded.<\/p>\n<p><strong>L2 vs Hamming distance for matching?<\/strong> Float descriptors (SIFT/SURF) compare with L2 (Euclidean). Binary descriptors (ORB/ BRIEF) compare with Hamming (count differing bits) — a couple of XOR+popcount ops, extremely fast. Match the metric to the descriptor type.<\/p>\n<p><strong>Fundamental vs essential matrix?<\/strong> Fundamental works with <em>uncalibrated<\/em> cameras (pixels). Essential needs <em>calibrated<\/em> cameras (it folds in K) and, unlike F, can be decomposed into relative rotation + translation. Calibrated → essential (you get motion); uncalibrated → fundamental.<\/p>\n<p><strong>Why RANSAC instead of least-squares on all matches?<\/strong> Least squares is wrecked by outliers (one bad match skews the whole fit). RANSAC fits on random minimal samples and keeps the model with the most inliers, so it's robust to the wrong matches that always exist. Essential whenever data has outliers.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"detection-tracking-math.md\" href=\"#\">detection-tracking-math.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-corners-not-edges-or-flat-areas","text":"Why corners, not edges or flat areas"},{"level":2,"id":"detect-describe-match","text":"Detect → Describe → Match"},{"level":2,"id":"ransac-the-robust-fitting-workhorse","text":"RANSAC (the robust-fitting workhorse)"},{"level":2,"id":"epipolar-geometry-two-views","text":"Epipolar geometry (two views)"},{"level":2,"id":"where-this-shows-up-in-the-role","text":"Where this shows up in the role"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"features, matching & epipolar geometry 💡 tl;dr a feature is a distinctive, repeatable point (a corner, not a flat wall). you detect keypoints, describe them as vectors, then match descriptors across images to find correspondences. because matches are noisy, ransac robustly fits the transform (homography / fundamental matrix) while ignoring outliers. this underpins stitching, tracking init, and multi-view geometry — all on your resume (sift/surf/orb, ransac, fundamental/essential matrix). why corners, not edges or flat areas a flat patch looks like every other flat patch — you can't localize it. an edge is ambiguous along the edge. a corner is unique in both directions → repeatable and matchable. that's the harris corner intuition: large intensity change in all directions. detect → describe → match detect keypoints — find corners/blobs (harris, fast, dog). describe — encode each keypoint's neighborhood as a vector invariant to scale/rotation/lighting. match — compare descriptors across images (nearest neighbor + lowe's ratio test to drop ambiguous matches). detector/descriptor type notes sift float (128-d) scale+rotation invariant, accurate, slower; now patent-free surf float faster sift approximation; was patented orb binary (256-bit) fast + brief, free, real-time , great on edge/arm float descriptors (sift) → match with l2 distance. binary descriptors (orb) → match with hamming distance (super fast). orb is the go-to when you need real-time on constrained hardware (your arm/jetson world). ransac (the robust-fitting workhorse) matches contain wrong pairs (outliers). ransac: randomly pick the minimal sample (4 points for a homography), fit the model, count inliers (matches that agree), repeat, keep the best. result: a transform fit on the good matches, ignoring outliers. you cite this for homography/fundamental-matrix estimation. epipolar geometry (two views) when two cameras see the same scene: fundamental matrix (f): relates corresponding points across two uncalibrated views: x'ᵀ f x = 0 . a point in one image constrains its match to a line (the epipolar line) in the other — turns 2d search into 1d. essential matrix (e): same idea for calibrated cameras ( e = kᵀ f k ); you can decompose e into relative r, t between cameras → recover camera motion. triangulation: with two known camera poses + a matched point, intersect the rays to get the 3d position. basis of stereo depth / structure-from-motion. where this shows up in the role less day-to-day than tracking math, but it's the classical foundation interviewers test for \"do they really know cv.\" realistic uses: registering/stitching camera views, initializing or validating tracks, stereo/depth, and the geometric reasoning behind multi-camera setups. why x over y sift vs orb? sift = more accurate, scale/rotation invariant, float descriptor, heavier. orb = binary, free, real-time, hamming-matchable — the practical choice on edge/arm (your hardware). use sift when accuracy dominates and compute is available; orb for real-time/embedded. l2 vs hamming distance for matching? float descriptors (sift/surf) compare with l2 (euclidean). binary descriptors (orb/ brief) compare with hamming (count differing bits) — a couple of xor+popcount ops, extremely fast. match the metric to the descriptor type. fundamental vs essential matrix? fundamental works with uncalibrated cameras (pixels). essential needs calibrated cameras (it folds in k) and, unlike f, can be decomposed into relative rotation + translation. calibrated → essential (you get motion); uncalibrated → fundamental. why ransac instead of least-squares on all matches? least squares is wrecked by outliers (one bad match skews the whole fit). ransac fits on random minimal samples and keeps the model with the most inliers, so it's robust to the wrong matches that always exist. essential whenever data has outliers. → next: detection-tracking-math.md","words":586},{"path":"09-computer-vision-fundamentals/detection-tracking-math.md","title":"Detection & Tracking Math","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"detection-tracking-math\">Detection &amp; Tracking Math<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 210\" role=\"img\" aria-label=\"Intersection over Union\"><rect class=\"dg-box\" x=\"150\" y=\"40\" width=\"200\" height=\"130\" rx=\"8\"/><rect class=\"dg-accent-soft\" x=\"250\" y=\"90\" width=\"200\" height=\"130\" rx=\"8\" stroke=\"none\"/><rect class=\"dg-box dg-hot\" x=\"250\" y=\"90\" width=\"100\" height=\"80\" rx=\"0\" fill=\"none\"/><rect x=\"150\" y=\"40\" width=\"200\" height=\"130\" rx=\"8\" fill=\"none\" class=\"dg-strokeA\"/><rect x=\"250\" y=\"90\" width=\"200\" height=\"130\" rx=\"8\" fill=\"none\" class=\"dg-strokeB\"/><text class=\"dg-sub\" x=\"200\" y=\"35\" text-anchor=\"middle\">box A<\/text><text class=\"dg-sub\" x=\"500\" y=\"235\" text-anchor=\"middle\">box B<\/text><text class=\"dg-label\" x=\"300\" y=\"135\" text-anchor=\"middle\">∩<\/text><text class=\"dg-sub\" x=\"560\" y=\"120\">IoU =<\/text><text class=\"dg-sub\" x=\"560\" y=\"140\">overlap<\/text><line class=\"dg-line\" x1=\"558\" y1=\"148\" x2=\"640\" y2=\"148\"/><text class=\"dg-sub\" x=\"560\" y=\"166\">union<\/text><text class=\"dg-sub\" x=\"360\" y=\"200\" text-anchor=\"middle\">drives NMS &amp; detection↔track matching<\/text><\/svg><figcaption>Intersection over Union<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The role <em>integrates<\/em> models, so you must know the math <em>around<\/em> them: <strong>IoU<\/strong> (box overlap), <strong>NMS<\/strong> (dedupe overlapping detections), <strong>anchors<\/strong> (how detectors propose boxes), <strong>mAP<\/strong> (how accuracy is scored), and <strong>trackers<\/strong> (Kalman for motion, IoU/Hungarian for association, DeepSORT for appearance). This is the math you put <em>on top of<\/em> the ML team's models.<\/div><\/div>\n<h2 id=\"iou-intersection-over-union\">IoU — Intersection over Union<\/h2>\n<p>The fundamental box-overlap metric:<\/p>\n<pre><code>IoU = area(A ∩ B) / area(A ∪ B)     # 0 = no overlap, 1 = identical<\/code><\/pre>\n<p>Used everywhere: NMS, matching detections to ground truth (mAP), and associating detections to tracks frame-to-frame.<\/p>\n<h2 id=\"nms-non-maximum-suppression\">NMS — Non-Maximum Suppression<\/h2>\n<p>Detectors output many overlapping boxes for one object. NMS keeps the best:<\/p>\n<ol><li>Sort boxes by confidence.<\/li><li>Take the highest; remove all others with IoU &gt; threshold (e.g., 0.5) against it.<\/li><li>Repeat with the next remaining box.<\/li><\/ol>\n<p>Result: one box per object. <strong>Soft-NMS<\/strong> decays scores instead of hard-removing (better for crowded scenes). NMS runs every frame — do it on GPU at scale (sec 03).<\/p>\n<h2 id=\"anchors-detection-heads-quick-model-literacy\">Anchors &amp; detection heads (quick model literacy)<\/h2>\n<ul><li><strong>Anchor boxes:<\/strong> predefined box shapes/scales at each location; the model<\/li><\/ul>\n<p>predicts offsets from anchors + class + objectness. (Faster R-CNN, SSD, older   YOLO.)<\/p>\n<ul><li><strong>Anchor-free:<\/strong> predict box centers/extents directly (FCOS, newer YOLO/CenterNet)<\/li><\/ul>\n<p>— fewer hyperparameters.<\/p>\n<ul><li><strong>YOLO:<\/strong> single-shot, grid-based, real-time — the standard for live video. Know<\/li><\/ul>\n<p>it's one forward pass → fast, which is why it dominates streaming inference.<\/p>\n<h2 id=\"map-mean-average-precision-how-detection-is-scored\">mAP — mean Average Precision (how detection is scored)<\/h2>\n<ul><li><strong>Precision<\/strong> = TP / (TP+FP) — of what I flagged, how much was right.<\/li><li><strong>Recall<\/strong> = TP / (TP+FN) — of what existed, how much I caught.<\/li><li>A detection is a TP if IoU with ground truth ≥ threshold (e.g., 0.5).<\/li><li><strong>AP<\/strong> = area under the precision–recall curve for one class; <strong>mAP<\/strong> = mean over<\/li><\/ul>\n<p>classes. <code>mAP@0.5<\/code> (one threshold) vs <code>mAP@[.5:.95]<\/code> (averaged over thresholds,   the COCO metric). This is your model-eval vocabulary — own it.<\/p>\n<h2 id=\"tracking-detection-identity-over-time\">Tracking: detection → identity over time<\/h2>\n<p>Detection finds objects per frame; <strong>tracking<\/strong> keeps the <em>same ID<\/em> across frames (needed for counting, dwell time, line-crossing). Tracking-by-detection loop:<\/p>\n<ol><li><strong>Predict<\/strong> where each existing track will be (motion model).<\/li><li><strong>Associate<\/strong> new detections to predicted tracks (similarity → assignment).<\/li><li><strong>Update<\/strong> matched tracks; spawn new ones; kill stale ones.<\/li><\/ol>\n<h3 id=\"the-building-blocks\">The building blocks<\/h3>\n<ul><li><strong>Kalman filter<\/strong> — predicts an object's next position/velocity and smooths noisy<\/li><\/ul>\n<p>detections. The motion model in SORT/DeepSORT. Intuition: \"where will it be next   frame, and how confident am I.\"<\/p>\n<ul><li><strong>Hungarian algorithm<\/strong> — optimal assignment of detections↔tracks given a cost<\/li><\/ul>\n<p>matrix (e.g., 1−IoU, or appearance distance). Solves \"which detection is which   track\" in one shot.<\/p>\n<ul><li><strong>SORT<\/strong> — Kalman + Hungarian on <strong>IoU<\/strong>. Fast, but loses IDs through occlusions<\/li><\/ul>\n<p>(ID switches).<\/p>\n<ul><li><strong>DeepSORT<\/strong> — SORT + an <strong>appearance embedding<\/strong> (a re-ID feature per object), so<\/li><\/ul>\n<p>it re-identifies objects after occlusion → far fewer ID switches. (You built a   custom tracker beating SORT — strong story.)<\/p>\n<ul><li><strong>ByteTrack<\/strong> — also associates <em>low<\/em>-confidence detections, recovering occluded<\/li><\/ul>\n<p>objects without a heavy appearance model; strong modern baseline.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>SORT vs DeepSORT?<\/strong> SORT = Kalman + IoU + Hungarian: fast, light, but drops IDs through occlusion. DeepSORT adds an appearance embedding so it re-IDs after occlusion → fewer ID switches at extra compute. Crowded/occluded scenes → DeepSORT (or ByteTrack); simple fast scenes → SORT.<\/p>\n<p><strong>IoU-based vs appearance-based association?<\/strong> IoU association is cheap and works when objects move little between frames. Appearance (re-ID embeddings) survives occlusion and large motion but costs an extra model. Combine them: IoU first, appearance to recover the hard cases.<\/p>\n<p><strong>Hard-NMS vs Soft-NMS?<\/strong> Hard-NMS removes overlapping boxes outright — can delete a real object in a crowd. Soft-NMS decays their scores instead, preserving nearby true objects → better in dense scenes, slightly more tuning.<\/p>\n<p><strong>Why is YOLO the default for live video?<\/strong> One forward pass per frame (single-shot) → real-time throughput, unlike two-stage detectors (region proposal + classify) that are more accurate but slower. For streaming, latency wins → YOLO-class models.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"logic-on-detections.md\" href=\"#\">logic-on-detections.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"iou-intersection-over-union","text":"IoU — Intersection over Union"},{"level":2,"id":"nms-non-maximum-suppression","text":"NMS — Non-Maximum Suppression"},{"level":2,"id":"anchors-detection-heads-quick-model-literacy","text":"Anchors &amp; detection heads (quick model literacy)"},{"level":2,"id":"map-mean-average-precision-how-detection-is-scored","text":"mAP — mean Average Precision (how detection is scored)"},{"level":2,"id":"tracking-detection-identity-over-time","text":"Tracking: detection → identity over time"},{"level":3,"id":"the-building-blocks","text":"The building blocks"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"detection & tracking math box a box b ∩ iou = overlap union drives nms & detection↔track matching intersection over union 💡 tl;dr the role integrates models, so you must know the math around them: iou (box overlap), nms (dedupe overlapping detections), anchors (how detectors propose boxes), map (how accuracy is scored), and trackers (kalman for motion, iou/hungarian for association, deepsort for appearance). this is the math you put on top of the ml team's models. iou — intersection over union the fundamental box-overlap metric: iou = area(a ∩ b) / area(a ∪ b) # 0 = no overlap, 1 = identical used everywhere: nms, matching detections to ground truth (map), and associating detections to tracks frame-to-frame. nms — non-maximum suppression detectors output many overlapping boxes for one object. nms keeps the best: sort boxes by confidence. take the highest; remove all others with iou > threshold (e.g., 0.5) against it. repeat with the next remaining box. result: one box per object. soft-nms decays scores instead of hard-removing (better for crowded scenes). nms runs every frame — do it on gpu at scale (sec 03). anchors & detection heads (quick model literacy) anchor boxes: predefined box shapes/scales at each location; the model predicts offsets from anchors + class + objectness. (faster r-cnn, ssd, older yolo.) anchor-free: predict box centers/extents directly (fcos, newer yolo/centernet) — fewer hyperparameters. yolo: single-shot, grid-based, real-time — the standard for live video. know it's one forward pass → fast, which is why it dominates streaming inference. map — mean average precision (how detection is scored) precision = tp / (tp+fp) — of what i flagged, how much was right. recall = tp / (tp+fn) — of what existed, how much i caught. a detection is a tp if iou with ground truth ≥ threshold (e.g., 0.5). ap = area under the precision–recall curve for one class; map = mean over classes. map@0.5 (one threshold) vs map@[.5:.95] (averaged over thresholds, the coco metric). this is your model-eval vocabulary — own it. tracking: detection → identity over time detection finds objects per frame; tracking keeps the same id across frames (needed for counting, dwell time, line-crossing). tracking-by-detection loop: predict where each existing track will be (motion model). associate new detections to predicted tracks (similarity → assignment). update matched tracks; spawn new ones; kill stale ones. the building blocks kalman filter — predicts an object's next position/velocity and smooths noisy detections. the motion model in sort/deepsort. intuition: \"where will it be next frame, and how confident am i.\" hungarian algorithm — optimal assignment of detections↔tracks given a cost matrix (e.g., 1−iou, or appearance distance). solves \"which detection is which track\" in one shot. sort — kalman + hungarian on iou . fast, but loses ids through occlusions (id switches). deepsort — sort + an appearance embedding (a re-id feature per object), so it re-identifies objects after occlusion → far fewer id switches. (you built a custom tracker beating sort — strong story.) bytetrack — also associates low -confidence detections, recovering occluded objects without a heavy appearance model; strong modern baseline. why x over y sort vs deepsort? sort = kalman + iou + hungarian: fast, light, but drops ids through occlusion. deepsort adds an appearance embedding so it re-ids after occlusion → fewer id switches at extra compute. crowded/occluded scenes → deepsort (or bytetrack); simple fast scenes → sort. iou-based vs appearance-based association? iou association is cheap and works when objects move little between frames. appearance (re-id embeddings) survives occlusion and large motion but costs an extra model. combine them: iou first, appearance to recover the hard cases. hard-nms vs soft-nms? hard-nms removes overlapping boxes outright — can delete a real object in a crowd. soft-nms decays their scores instead, preserving nearby true objects → better in dense scenes, slightly more tuning. why is yolo the default for live video? one forward pass per frame (single-shot) → real-time throughput, unlike two-stage detectors (region proposal + classify) that are more accurate but slower. for streaming, latency wins → yolo-class models. → next: logic-on-detections.md","words":673},{"path":"09-computer-vision-fundamentals/logic-on-detections.md","title":"Logic on Detections","section":"9 · CV Fundamentals","quiz":false,"accent":"#19a4d1","html":"<h1 id=\"logic-layers-on-top-of-detections\">Logic Layers on Top of Detections<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 210\" role=\"img\" aria-label=\"Turning boxes into business meaning\"><polygon class=\"dg-accent-soft\" points=\"80,60 340,40 360,170 60,180\" stroke=\"none\"/><polygon points=\"80,60 340,40 360,170 60,180\" fill=\"none\" class=\"dg-strokeA\"/><text class=\"dg-sub\" x=\"200\" y=\"110\" text-anchor=\"middle\">zone polygon<\/text><circle class=\"dg-accent\" cx=\"210\" cy=\"150\" r=\"6\"/><text class=\"dg-sub\" x=\"210\" y=\"180\" text-anchor=\"middle\">foot point<\/text><line class=\"dg-strokeB\" x1=\"470\" y1=\"30\" x2=\"470\" y2=\"180\"/><text class=\"dg-sub\" x=\"470\" y=\"22\" text-anchor=\"middle\">count line<\/text><line class=\"dg-line\" x1=\"420\" y1=\"105\" x2=\"533\" y2=\"105\"/><polygon class=\"dg-arrow\" points=\"533,100 540,105 533,110\"/><text class=\"dg-sub\" x=\"600\" y=\"100\" text-anchor=\"middle\">cross →<\/text><text class=\"dg-sub\" x=\"600\" y=\"118\" text-anchor=\"middle\">count once per ID<\/text><text class=\"dg-sub\" x=\"360\" y=\"202\" text-anchor=\"middle\">geometry + stats on top of boxes = the JD's logic layer<\/text><\/svg><figcaption>Turning boxes into business meaning<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> This is the JD's standout CV phrase: <em>\"command over geometry and statistics for designing complex logic layers on top of model detections.\"<\/em> The model gives you boxes; <em>you<\/em> turn boxes into business meaning — zones, counting, dwell time, line-crossing, real-world coordinates. It's geometry + a little statistics, and it's the CV topic most likely to go deep because it's where CV meets systems. <strong>Prepare to whiteboard one of these.<\/strong><\/div><\/div>\n<h2 id=\"the-pattern\">The pattern<\/h2>\n<pre><code>model detections (boxes + classes + track IDs)\n        │\n        ▼\n geometry: which zone? crossed which line? where on the floor?\n        │\n        ▼\n statistics/temporal: count, dwell time, rate, smoothing, dedupe\n        │\n        ▼\n events: \"3 forklifts in bay 2 for &gt;5 min\", \"pallet crossed dock line\"<\/code><\/pre>\n<h2 id=\"core-geometric-primitives\">Core geometric primitives<\/h2>\n<ul><li><strong>Point-in-polygon<\/strong> — is an object inside a defined zone? Use the object's<\/li><\/ul>\n<p><em>anchor point<\/em> (usually bottom-center of the box = where it touches the floor),   not the box center. Ray-casting / <code>cv2.pointPolygonTest<\/code>.<\/p>\n<ul><li><strong>Line-crossing<\/strong> — did the object's track cross a virtual line (and in which<\/li><\/ul>\n<p>direction)? Check the sign of the cross product of the line vs the track segment   between consecutive frames; a sign flip = a crossing. Direction → in vs out.<\/p>\n<ul><li><strong>Distance / proximity<\/strong> — but <strong>in what space?<\/strong> Pixel distance is meaningless<\/li><\/ul>\n<p>(objects far from the camera look smaller). Convert foot points to the <strong>ground   plane via a homography<\/strong> (sec geometry/calibration), then measure in meters.<\/p>\n<ul><li><strong>ROI gating<\/strong> — only run logic for detections inside a region (the loading bay),<\/li><\/ul>\n<p>ignore the rest → cheaper and fewer false events.<\/p>\n<h2 id=\"counting-dwell-where-statistics-enters\">Counting &amp; dwell (where statistics enters)<\/h2>\n<ul><li><strong>Counting<\/strong> needs <strong>tracking<\/strong>, not just detection — otherwise you recount the<\/li><\/ul>\n<p>same object every frame. Count unique track IDs that cross the line.<\/p>\n<ul><li><strong>Dwell time<\/strong> = (last_seen − first_seen) for a track inside a zone.<\/li><li><strong>Temporal smoothing / debouncing<\/strong> — a detection flickers (present frame N, gone<\/li><\/ul>\n<p>N+1). Require K-of-N frames before firing an event so noise doesn't create false   counts. This is the statistics the JD means: rates, thresholds, smoothing, outlier   rejection over time.<\/p>\n<ul><li><strong>Hysteresis<\/strong> — different thresholds to <em>enter<\/em> vs <em>exit<\/em> a state, so an object<\/li><\/ul>\n<p>hovering on a boundary doesn't spam events.<\/p>\n<h2 id=\"worked-example-great-whiteboard-answer\">Worked example (great whiteboard answer)<\/h2>\n<p><em>\"Count forklifts entering a loading bay and flag any staying &gt;10 min.\"<\/em><\/p>\n<ol><li>Detect + track forklifts (YOLO + DeepSORT) → boxes with stable IDs.<\/li><li>Define the bay as a polygon (in image space, or on the ground plane).<\/li><li>For each track, take the bottom-center point; point-in-polygon test → inside?<\/li><li>Debounce: require the track inside for K consecutive frames before \"entered\"<\/li><\/ol>\n<p>(reject flicker).<\/p>\n<ol><li>Record <code>first_seen<\/code> per track in the zone; dwell = now − first_seen.<\/li><li>Fire \"entered\" on a line-cross/zone-enter (dedup by track ID so each forklift<\/li><\/ol>\n<p>counts once); fire \"overstay\" when dwell &gt; 10 min.<\/p>\n<ol><li>Emit events as metadata to the message bus (sec 06) — no full-frame egress.<\/li><\/ol>\n<p>That answer shows geometry (polygon, ground plane), statistics (debounce, dwell), tracking literacy, <em>and<\/em> the systems instinct (metadata out). It's the bullseye for this role.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Box center vs bottom-center for zone tests?<\/strong> Use bottom-center — it approximates where the object touches the floor, which is what zones are defined on. Box center sits in mid-air and misreads zone membership, especially for tall objects or oblique cameras.<\/p>\n<p><strong>Pixel distance vs ground-plane distance?<\/strong> Pixel distance is distorted by perspective (far objects look closer together). Map foot points to the ground plane via a homography and measure in real-world units — the only way distance/zone logic is correct across the frame.<\/p>\n<p><strong>Why debounce/smooth instead of acting on every frame?<\/strong> Per-frame detections flicker and jitter; acting raw produces false counts and event spam. Requiring K-of-N frames (and hysteresis on enter/exit) trades a few ms of latency for robust, trustworthy events — exactly the \"statistics layer\" the JD wants.<\/p>\n<p><strong>Why count track IDs, not detections?<\/strong> Detection fires every frame, so counting detections counts the same object hundreds of times. Counting unique track IDs (that cross a line / enter a zone) counts objects once — tracking is what makes counting correct.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Quick refresh: <strong><a class=\"mdlink\" data-href=\"cv-cheat-sheet.md\" href=\"#\">cv-cheat-sheet.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-pattern","text":"The pattern"},{"level":2,"id":"core-geometric-primitives","text":"Core geometric primitives"},{"level":2,"id":"counting-dwell-where-statistics-enters","text":"Counting &amp; dwell (where statistics enters)"},{"level":2,"id":"worked-example-great-whiteboard-answer","text":"Worked example (great whiteboard answer)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"logic layers on top of detections zone polygon foot point count line cross → count once per id geometry + stats on top of boxes = the jd's logic layer turning boxes into business meaning 💡 tl;dr this is the jd's standout cv phrase: \"command over geometry and statistics for designing complex logic layers on top of model detections.\" the model gives you boxes; you turn boxes into business meaning — zones, counting, dwell time, line-crossing, real-world coordinates. it's geometry + a little statistics, and it's the cv topic most likely to go deep because it's where cv meets systems. prepare to whiteboard one of these. the pattern model detections (boxes + classes + track ids) │ ▼ geometry: which zone? crossed which line? where on the floor? │ ▼ statistics/temporal: count, dwell time, rate, smoothing, dedupe │ ▼ events: \"3 forklifts in bay 2 for >5 min\", \"pallet crossed dock line\" core geometric primitives point-in-polygon — is an object inside a defined zone? use the object's anchor point (usually bottom-center of the box = where it touches the floor), not the box center. ray-casting / cv2.pointpolygontest . line-crossing — did the object's track cross a virtual line (and in which direction)? check the sign of the cross product of the line vs the track segment between consecutive frames; a sign flip = a crossing. direction → in vs out. distance / proximity — but in what space? pixel distance is meaningless (objects far from the camera look smaller). convert foot points to the ground plane via a homography (sec geometry/calibration), then measure in meters. roi gating — only run logic for detections inside a region (the loading bay), ignore the rest → cheaper and fewer false events. counting & dwell (where statistics enters) counting needs tracking , not just detection — otherwise you recount the same object every frame. count unique track ids that cross the line. dwell time = (last_seen − first_seen) for a track inside a zone. temporal smoothing / debouncing — a detection flickers (present frame n, gone n+1). require k-of-n frames before firing an event so noise doesn't create false counts. this is the statistics the jd means: rates, thresholds, smoothing, outlier rejection over time. hysteresis — different thresholds to enter vs exit a state, so an object hovering on a boundary doesn't spam events. worked example (great whiteboard answer) \"count forklifts entering a loading bay and flag any staying >10 min.\" detect + track forklifts (yolo + deepsort) → boxes with stable ids. define the bay as a polygon (in image space, or o

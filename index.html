   <span class=\"tok-builtin\">cv2<\/span>.imwrite(out, img)\n    <span class=\"tok-keyword\">return<\/span> img, kept<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>contourArea<\/code> ≠ pixel count — it's the polygon area (Green's theorem). Another handy stat: <strong>circularity<\/strong> <code>4*pi*area / perimeter**2<\/code> is 1.0 for a circle, ~0.785 for a square. Combine 2–3 cheap stats instead of one magic number.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"detection-logic.md\" href=\"#\">detection-logic.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"problem-1-preprocess-for-ocr-gray-blur-otsu-save","text":"Problem 1 — Preprocess for OCR (gray → blur → Otsu → save)"},{"level":2,"id":"problem-2-clean-a-noisy-scanned-document-adaptive-threshold-morphology","text":"Problem 2 — Clean a noisy scanned document (adaptive threshold + morphology)"},{"level":2,"id":"problem-3-deskew-a-rotated-document","text":"Problem 3 — Deskew a rotated document"},{"level":2,"id":"problem-4-4-point-perspective-transform-scan-this-label","text":"Problem 4 — 4-point perspective transform (\"scan this label\") ⭐"},{"level":2,"id":"problem-5-find-and-crop-the-largest-rectangle-document-boundary","text":"Problem 5 — Find and crop the largest rectangle (document boundary)"},{"level":2,"id":"problem-6-resize-keeping-aspect-ratio-pad-to-square-letterbox","text":"Problem 6 — Resize keeping aspect ratio, pad to square (letterbox)"},{"level":2,"id":"problem-7-boost-contrast-on-a-dark-image-clahe","text":"Problem 7 — Boost contrast on a dark image (CLAHE)"},{"level":2,"id":"problem-e1-find-an-object-by-color-hsv-inrange","text":"Problem E1 — Find an object by color (HSV + inRange)"},{"level":2,"id":"problem-e2-template-matching-find-a-logo-stamp","text":"Problem E2 — Template matching (find a logo / stamp)"},{"level":2,"id":"problem-e3-rotate-by-any-angle-without-cropping-corners","text":"Problem E3 — Rotate by any angle without cropping corners"},{"level":2,"id":"problem-e4-blur-a-region-apply-a-mask-privacy-blur","text":"Problem E4 — Blur a region + apply a mask (privacy blur)"},{"level":2,"id":"problem-e5-locate-a-barcode-gradient-morphology","text":"Problem E5 — Locate a barcode (gradient + morphology) ⭐"},{"level":2,"id":"problem-e6-detect-table-document-lines-hough-transform","text":"Problem E6 — Detect table / document lines (Hough transform)"},{"level":2,"id":"problem-e7-2d-convolution-from-scratch-numpy-only","text":"Problem E7 — 2D convolution from scratch (NumPy only)"},{"level":2,"id":"problem-e8-filter-contours-by-shape-find-label-like-rectangles","text":"Problem E8 — Filter contours by shape (find label-like rectangles)"}],"text":"image processing & geometry 💡 tl;dr this is the heart of the test. master the preprocessing chain (gray → blur → threshold → morphology) and the 4-point perspective transform (detect a document/label quad and warp it flat). everything here runs on a single image and saves an output image — exactly what the test asks for. every solution is complete and runnable. practice typing each from a blank file. problem 1 — preprocess for ocr (gray → blur → otsu → save) tests: the fundamental chain, color conversion, thresholding, saving output. the problem: an ocr engine can't read a color photo — it wants crisp black-and-white where ink is cleanly separated from paper. turn a messy photo into exactly that. the plan: photo (3 channels) | cvtcolor drop color, keep brightness (1 channel) v gray | gaussianblur smooth away sensor noise before deciding v smooth gray | otsu threshold every pixel becomes pure 0 or 255 v black/white --imwrite--> saved why this way: a fixed cutoff like 127 breaks the moment lighting changes. otsu instead looks at the image's brightness histogram and picks the split point that best separates \"dark pixels\" from \"bright pixels\" — zero tuning. and blur comes first because thresholding is a hard yes/no decision: one speck of noise near the cutoff flips into a black dot. smooth before deciding, never after. import cv2 def preprocess(path, out= \"p1_out.png\" ): img = cv2 .imread(path) if img is none : raise filenotfounderror(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) blurred = cv2 .gaussianblur(gray, ( 5 , 5 ), 0 ) # denoise before threshold # otsu auto-picks the threshold; thresh_binary_inv makes text white on black _, binary = cv2 .threshold(blurred, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) cv2 .imwrite(out, binary) return binary if __name__ == \"__main__\" : preprocess( \"input.jpg\" ) watch out: otsu needs a single-channel image and thresh=0 . blur first or threshold gets speckly. problem 2 — clean a noisy scanned document (adaptive threshold + morphology) tests: adaptive thresholding (uneven lighting) and morphology to remove specks. the problem: real scans are unevenly lit — one corner sits in shadow. any single global cutoff (even otsu's) is then wrong somewhere : right for the bright side, hopeless for the dark side. the plan: uneven scan one global cutoff cutoff per 31x31 window +------------+ +------------+ +------------+ | text #####| shadow | text #####| shadow | text text | | text #####| side | text #####| swallowed | text text | +------------+ +------------+ +------------+ global threshold adaptivethreshold why this way: adaptivethreshold recomputes the cutoff inside every small window, so each region is judged against its own lighting. the leftover salt noise is erased with morphological opening (erode → dilate): erosion deletes anything smaller than the kernel, dilation regrows the surviving text to full size. flip to closing when the defect is holes inside strokes, not specks. import cv2 import numpy as np def clean_scan(path, out= \"p2_out.png\" ): img = cv2 .imread(path, cv2 .imread_grayscale) if img is none : raise filenotfounderror(path) # adaptive: threshold computed per-region → robust to shadows/gradients binary = cv2 .adaptivethreshold(img, 255 , cv2 .adaptive_thresh_gaussian_c, cv2 .thresh_binary, blocksize= 31 , c= 10 ) kernel = cv2 .getstructuringelement( cv2 .morph_rect, ( 2 , 2 )) opened = cv2 .morphologyex(binary, cv2 .morph_open, kernel) # remove small noise cv2 .imwrite(out, opened) return opened watch out: blocksize must be odd . opening removes specks; closing fills holes — pick by whether your noise is dots (open) or gaps (close). problem 3 — deskew a rotated document tests: geometry from foreground pixels, rotation matrix, warpaffine. the problem: the page was scanned slightly rotated, so text lines are tilted and ocr row-grouping falls apart. find the tilt angle, rotate it back. the plan: tilted ink pixels fit one rotated box rotate by -angle \\ \\ \\ \\ .----------. __________ \\ \\ \\ \\ ==> | all text | angle=-12 ==> |__________| \\ \\ \\ \\ '----------' (upright) cv2.minarearect why this way: you could detect individual lines (hough) and average their angles, but minarearect answers in one call: collect every ink pixel, fit the tightest rotated rectangle around all of them, read its angle. the < -45 fix exists because opencv only reports angles within a 90° window — without the correction you'd sometimes \"deskew\" the page sideways. border_replicate fills the corners uncovered by rotation with edge colors instead of black wedges. import cv2 import numpy as np def deskew(path, out= \"p3_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) binary = cv2 .threshold(gray, 0 , 255 , cv2 .thresh_binary_inv + cv2 .thresh_otsu)[ 1 ] foreground_pixels = np .column_stack( np .where(binary > 0 )) # (row, col) of text angle = cv2 .minarearect(foreground_pixels)[- 1 ] # angle of tightest box if angle < - 45 : # opencv reports angle in a 90-deg range; angle = 90 + angle # flip so we rotate the short way, not 90-deg off (height, width) = img.shape[: 2 ] rotation_matrix = cv2 .getrotationmatrix2d((width / 2 , height / 2 ), angle, 1.0 ) rotated = cv2 .warpaffine(img, rotation_matrix, (width, height), flags= cv2 .inter_cubic, # smooth resample bordermode= cv2 .border_replicate) # no black corners cv2 .imwrite(out, rotated) return rotated watch out: minarearect angle conventions changed across opencv versions — know the < -45 correction and be ready to explain it. problem 4 — 4-point perspective transform (\"scan this label\") ⭐ tests: the single most likely task. detect the document's 4 corners and warp it to a flat top-down view. memorize the order_points + four_point_transform pair cold. the problem: a label photographed at an angle appears as a trapezoid . to read or measure it you need the flat, top-down rectangle — like a scanner sees. the plan: detected corners warped output tl._________.tr tl __________ tr / \\ 3x3 perspective | | / label \\ matrix (getpersp | label | / \\ + warpperspective) | | bl._____________.br ==> bl __________ br find quad: canny -> contours -> approxpolydp == 4 points why this way: an affine warp (2×3 matrix: rotate/scale/shear) can never fix this — affine preserves parallelism, and perspective distortion is exactly parallel lines converging. you need the 3×3 homography, which is fully determined by 4 point pairs — hence \"4-point transform\". order_points exists because getperspectivetransform pairs source and destination corners by array position : hand it corners in a random order and the output comes out mirrored or rotated. the sum/diff trick identifies each corner without if-else chains. import cv2 import numpy as np def order_points(points): \"\"\"return corners as [top-left, top-right, bottom-right, bottom-left].\"\"\" ordered = np .zeros(( 4 , 2 ), dtype= \"float32\" ) coord_sum = points. sum (axis= 1 ) ordered[ 0 ] = points[ np .argmin(coord_sum)] # top-left has smallest x+y ordered[ 2 ] = points[ np .argmax(coord_sum)] # bottom-right has largest x+y coord_diff = np .diff(points, axis= 1 ) ordered[ 1 ] = points[ np .argmin(coord_diff)] # top-right has smallest y-x ordered[ 3 ] = points[ np .argmax(coord_diff)] # bottom-left has largest y-x return ordered def four_point_transform(image, points): ordered = order_points(points) (top_left, top_right, bottom_right, bottom_left) = ordered width_bottom = np .linalg.norm(bottom_right - bottom_left) width_top = np .linalg.norm(top_right - top_left) out_width = int ( max (width_bottom, width_top)) # output = longest measured side height_right = np .linalg.norm(top_right - bottom_right) height_left = np .linalg.norm(top_left - bottom_left) out_height = int ( max (height_right, height_left)) # destination corners of a flat, axis-aligned rectangle (same order!) destination = np .array([[ 0 , 0 ], [out_width - 1 , 0 ], [out_width - 1 , out_height - 1 ], [ 0 , out_height - 1 ]], dtype= \"float32\" ) perspective_matrix = cv2 .getperspectivetransform(ordered, destination) return cv2 .warpperspective(image, perspective_matrix, (out_width, out_height)) def scan(path, out= \"p4_out.png\" ): img = cv2 .imread(path) ratio = img.shape[ 0 ] / 500.0 resized = cv2 .resize(img, ( int (img.shape[ 1 ] / ratio), 500 )) gray = cv2 .cvtcolor(resized, cv2 .color_bgr2gray) edges = cv2 .canny( cv2 .gaussianblur(gray, ( 5 , 5 ), 0 ), 75 , 200 ) contours, _ = cv2 .findcontours(edges, cv2 .retr_list, cv2 .chain_approx_simple) contours = sorted(contours, key= cv2 .contourarea, reverse= true )[: 5 ] document_corners = none for contour in contours: perimeter = cv2 .arclength(contour, true ) corners = cv2 .approxpolydp(contour, 0.02 * perimeter, true ) # simplify if len (corners) == 4 : # found a quadrilateral document_corners = corners.reshape( 4 , 2 ) * ratio # scale to full res break if document_corners is none : raise runtimeerror( \"no 4-corner document found\" ) warped = four_point_transform(img, document_corners.astype( \"float32\" )) cv2 .imwrite(out, warped) return warped watch out: getperspectivetransform needs float32 points in a consistent order — that's why order_points exists. scale corners back up if you detected on a resized copy. problem 5 — find and crop the largest rectangle (document boundary) tests: canny + contours + approxpolydp + bounding-box crop. the problem: isolate just the document/label from the photo background — the \"crop out the interesting part\" task. the plan: photo --blur+canny--> edge map --findcontours--> [c1, c2, c3, ...] | max(key=contourarea) v page outline | boundingrect v img[y:y+h, x:x+w] (pure slicing) why this way: thresholding works only if the page is clearly brighter than the background; edges survive even when brightnesses are similar. retr_external keeps only outermost contours, so \"largest\" means the page outline — not a logo or text block inside it. boundingrect returns an axis-aligned box, croppable with a slice; if the document is tilted, this crop keeps background wedges — that's when you upgrade to problem 4's perspective warp. import cv2 def crop_largest_rect(path, out= \"p5_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) edges = cv2 .canny( cv2 .gaussianblur(gray, ( 5 , 5 ), 0 ), 50 , 150 ) # low:high ~ 1:3 # retr_external = outermost contours only (ignore holes/children) contours, _ = cv2 .findcontours(edges, cv2 .retr_external, cv2 .chain_approx_simple) if not contours: raise runtimeerror( \"no contours\" ) largest = max (contours, key= cv2 .contourarea) x, y, w, h = cv2 .boundingrect(largest) crop = img[y:y + h, x:x + w] cv2 .imwrite(out, crop) return crop watch out: img[y:y+h, x:x+w] — rows first (y), then cols (x). a frequent slip. problem 6 — resize keeping aspect ratio, pad to square (letterbox) tests: the standard model-input preprocessing; aspect-ratio math, padding. the problem: detection models want a fixed square input (e.g. 640×640) but photos come in any shape. naive resize to a square squashes objects. the plan: stretch (bad) letterbox (good) +-----------+ +-----------+ | oo -> ooo | |###########| <- gray pad (114) | distorted!| | image | +-----------+ | untouched | |###########| scale by long side, pad the rest why this way: three options exist. stretching distorts geometry — a square carton becomes a rectangle and the model's learned shapes break. center-cropping keeps shapes but throws away edge pixels (where detections might be). letterboxing keeps every pixel and every shape , paying only some wasted pad. keep the scale and offsets — you need them to map detections back to the original image coordinates. import cv2 import numpy as np def letterbox(path, size= 640 , out= \"p6_out.png\" ): img = cv2 .imread(path) h, w = img.shape[: 2 ] scale = size / max (h, w) # fit the long side new_w, new_h = int (w * scale), int (h * scale) resized = cv2 .resize(img, (new_w, new_h), interpolation= cv2 .inter_area) canvas = np .full((size, size, 3 ), 114 , dtype= np .uint8) # 114 = yolo pad-gray top, left = (size - new_h) // 2 , (size - new_w) // 2 canvas[top:top + new_h, left:left + new_w] = resized cv2 .imwrite(out, canvas) return canvas watch out: inter_area for shrinking, inter_linear/cubic for enlarging. keep the scale + padding offsets if you later need to map detections back. problem 7 — boost contrast on a dark image (clahe) tests: histogram equalization done right (local, on luminance only). the problem: a dark, low-contrast image has all its pixel values bunched into a narrow band — details exist but are invisible. the plan: histogram before after clahe |# | # # |## | ## ## # |###._____________ |.##.####.##._____ 0 255 0 255 values crammed left spread out - per tile, clip-limited why this way: plain equalizehist uses one histogram for the whole image — it blows out regions that were already bright and massively amplifies noise in flat areas. clahe fixes both failure modes: it equalizes per tile (adapts to local lighting) and clips each histogram (caps noise amplification). doing it on the l channel of lab is what preserves color — equalizing b, g, r separately changes their ratios , which literally changes the colors. import cv2 def enhance(path, out= \"p7_out.png\" ): img = cv2 .imread(path) lab = cv2 .cvtcolor(img, cv2 .color_bgr2lab) # equalize l, keep color lightness, green_red, blue_yellow = cv2 .split(lab) clahe = cv2 .createclahe(cliplimit= 2.0 , tilegridsize=( 8 , 8 )) equalized_lightness = clahe.apply(lightness) merged = cv2 .merge((equalized_lightness, green_red, blue_yellow)) out_img = cv2 .cvtcolor(merged, cv2 .color_lab2bgr) cv2 .imwrite(out, out_img) return out_img watch out: equalize the l channel in lab (or v in hsv), never the raw bgr channels — that wrecks color. clahe (local) beats global equalizehist for uneven lighting. more practice — classic cv interview problems eight more exercises in the same style: short functions, one idea each. the setup assets include color.jpg , barcode.jpg , and lines.jpg for these. # topic core api e1 find object by color cvtcolor(hsv) + inrange e2 template matching matchtemplate + minmaxloc e3 rotate without cropping rotation matrix math e4 blur/mask a region roi slicing + bitwise_and e5 locate a barcode sobel gradient + morphology e6 detect table lines canny + houghlinesp e7 convolution from scratch numpy only e8 filter contours by shape area / aspect / extent problem e1 — find an object by color (hsv + inrange) tests: color spaces. hsv separates what color (h) from how bright (v), so a single hue range survives lighting changes that would break bgr thresholds. the problem: find \"the green object\" reliably — even when the lighting makes its rgb values completely different from yesterday's photo. the plan: in bgr, \"green\" = (30,90,20)? (80,200,90)? (40,140,60)? moves with lighting! in hsv, hue stays ~60 whether the scene is dim or bright. cvtcolor(hsv) -> inrange(lo, hi) -> binary mask -> open (despeckle) -> largest contour -> boundingrect why this way: in bgr all three numbers change together when light dims, so no fixed bgr box captures \"green\". hsv factors a pixel into hue ( which color), saturation (how vivid), value (how bright) — lighting mostly moves v, so a stable h range does the job. a learned segmentation model could too, but when the target color is known, two thresholds beat a neural net. import cv2 import numpy as np def find_color_object(path, lower_hsv, upper_hsv, out= \"e1_out.png\" ): img = cv2 .imread(path) hsv = cv2 .cvtcolor(img, cv2 .color_bgr2hsv) # hue is lighting-robust mask = cv2 .inrange(hsv, np .array(lower_hsv), np .array(upper_hsv)) # 255 inside range mask = cv2 .morphologyex(mask, cv2 .morph_open, np .ones(( 5 , 5 ), np .uint8)) # kill specks contours, _ = cv2 .findcontours(mask, cv2 .retr_external, cv2 .chain_approx_simple) if not contours: return img, none x, y, w, h = cv2 .boundingrect( max (contours, key= cv2 .contourarea)) # biggest blob cv2 .rectangle(img, (x, y), (x + w, y + h), ( 0 , 255 , 255 ), 2 ) cv2 .imwrite(out, img) return img, (x, y, w, h) watch out: opencv hue runs 0–179 (not 0–359). red wraps around 0, so red needs two ranges ( 0-10 and 170-179 ) or-ed together with cv2.bitwise_or . problem e2 — template matching (find a logo / stamp) tests: matchtemplate slides the template over the image and scores every position; minmaxloc finds the best one. the problem: find where a known patch — a logo, stamp, or icon — appears inside a larger image. the plan: template slides across the image; every position gets a similarity score +----------------+ | .1 .2 .1 .0 .1 | the brightest cell of the | .2 .9 .3 .1 .0 | <-- score map is the best match: | .1 .3 .2 .1 .1 | minmaxloc finds it +----------------+ why this way: when the target's scale and rotation are fixed (same camera, same layout — typical for documents), template matching is exact, tiny, and needs zero training. know its failure mode out loud: any scale or rotation change kills the score — that's when you reach for feature matching (orb/sift + homography) or a trained detector. tm_ccoeff_normed is the mode to memorize: scores normalized to [-1, 1] mean one threshold works everywhere. import cv2 def find_template(image_path, template, threshold= 0.8 , out= \"e2_out.png\" ): img = cv2 .imread(image_path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) # tm_ccoeff_normed gives scores in [-1, 1]; 1.0 = perfect match scores = cv2 .matchtemplate(gray, template, cv2 .tm_ccoeff_normed) _, best_score, _, best_loc = cv2 .minmaxloc(scores) # (min, max, minloc, maxloc) h, w = template.shape if best_score >= threshold: cv2 .rectangle(img, best_loc, (best_loc[ 0 ] + w, best_loc[ 1 ] + h), ( 0 , 255 , 0 ), 2 ) cv2 .imwrite(out, img) return img, best_score watch out: template matching is not scale- or rotation-invariant — say this in the interview. for all matches above the threshold use ys, xs = np.where(scores >= threshold) instead of minmaxloc . problem e3 — rotate by any angle without cropping corners tests: the classic gotcha — warpaffine to the original size clips the corners. grow the canvas and shift the rotation center. the problem: rotate an image by 30° and the corners vanish — because warpaffine renders into a canvas of the original size. the plan: same-size canvas (clips) grown canvas (fits) +------------+ +--------------------+ | /\\ lost | | /\\ | | / \\ | ==> | / \\ | | \\ / | | \\ / | | \\/ lost | | \\/ | +------------+ +--------------------+ new_w = h|sin| + w|cos| new_h = h|cos| + w|sin| then shift m's translation to recenter why this way: the rotated image's bounding box comes straight from projecting w and h through |cos| and |sin| — and the rotation matrix already contains those values, so no extra trig. the naive alternative — pad the image heavily, rotate, crop — works but wastes memory and adds a step. bonus answer: for exact 90/180/270 use cv2.rotate , which is lossless and instant. import cv2 import numpy as np def rotate_bound(path, angle, out= \"e3_out.png\" ): img = cv2 .imread(path) h, w = img.shape[: 2 ] center = (w / 2 , h / 2 ) m = cv2 .getrotationmatrix2d(center, angle, 1.0 ) cos, sin = abs (m[ 0 , 0 ]), abs (m[ 0 , 1 ]) # matrix already holds cos/sin new_w = int (h * sin + w * cos) # bounding box of the rotated image new_h = int (h * cos + w * sin) m[ 0 , 2 ] += new_w / 2 - center[ 0 ] # shift translation so the result m[ 1 , 2 ] += new_h / 2 - center[ 1 ] # stays centered in the new canvas rotated = cv2 .warpaffine(img, m, (new_w, new_h)) cv2 .imwrite(out, rotated) return rotated watch out: positive angle = counter-clockwise in opencv. if you only ever need 90/180/270, use cv2.rotate(img, cv2.rotate_90_clockwise) — it's exact and fast. problem e4 — blur a region + apply a mask (privacy blur) tests: roi slicing (views write back in place!) and bitwise_and masking — the two building blocks of every \"redact this part\" task. the problem: redact part of an image — blur an address, hide a face, or keep only a region of interest. the plan: roi = img[y:y+h, x:x+w] <- this is a view (a window into img), not a copy img[y:y+h, x:x+w] = blur(roi) <- writing back mutates the original in place non-rectangular? build a mask -> bitwise_and(img, img, mask=mask) why this way: numpy slices share memory with the parent array — that's what makes redaction a two-liner with no copying. it's also the classic bug source: mutate a slice you thought was independent. say both sides of that coin. and for real privacy prefer solid fill or heavy pixelation over gaussian blur — mild blurs have been reversed in practice. import cv2 import numpy as np def blur_region(path, rect, out= \"e4_out.png\" ): img = cv2 .imread(path) x, y, w, h = rect roi = img[y:y + h, x:x + w] # a view into img, not a copy img[y:y + h, x:x + w] = cv2 .gaussianblur(roi, ( 31 , 31 ), 0 ) # write blur back cv2 .imwrite(out, img) return img def keep_masked(img, mask): # keep pixels where mask > 0, zero elsewhere (mask must be uint8, 1-channel) return cv2 .bitwise_and(img, img, mask=mask) watch out: blur kernel sizes must be odd . slices are views — mutating roi mutates img ; call .copy() when you don't want that. problem e5 — locate a barcode (gradient + morphology) ⭐ tests: a logistics classic. barcodes have strong horizontal gradient and weak vertical gradient; morphological closing glues the bars into one blob. the problem: find where the barcode sits on a shipping label — any barcode, any content, no training data. the plan: barcode = || ||| | || ||| a patch of dense vertical edges d/dx -> fires on every bar edge (high) d/dy -> bars are vertical, nothing changes vertically (~0) grad_x - grad_y -> bright exactly where \"vertical-edge-ness\" is high | blur + otsu speckled blob over the bars | close (21x7) wide flat kernel bridges the gaps between bars v ==> one solid rectangle minarearect of biggest contour = barcode box why this way: the content of barcodes varies but their texture signature — many parallel vertical edges — never does, so a gradient filter finds them with zero training. the closing kernel's shape is the insight: wide and flat, because the gaps to bridge are horizontal. a neural detector also works, but this runs in milliseconds on a cpu — the classic logistics-pipeline answer. import cv2 import numpy as np def find_barcode(path, out= \"e5_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) grad_x = cv2 .sobel(gray, cv2 .cv_32f, 1 , 0 ) # d/dx: bars fire strongly grad_y = cv2 .sobel(gray, cv2 .cv_32f, 0 , 1 ) # d/dy: bars barely fire gradient = cv2 .convertscaleabs(grad_x - grad_y) # keep x-heavy regions blurred = cv2 .blur(gradient, ( 9 , 9 )) _, thresh = cv2 .threshold(blurred, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) # wide flat kernel: close the gaps between bars into one solid rectangle kernel = cv2 .getstructuringelement( cv2 .morph_rect, ( 21 , 7 )) closed = cv2 .morphologyex(thresh, cv2 .morph_close, kernel) closed = cv2 .erode(closed, none , iterations= 4 ) # drop small leftovers closed = cv2 .dilate(closed, none , iterations= 4 ) # restore the big blob contours, _ = cv2 .findcontours(closed, cv2 .retr_external, cv2 .chain_approx_simple) if not contours: raise runtimeerror( \"no barcode found\" ) rect = cv2 .minarearect( max (contours, key= cv2 .contourarea)) # rotated rect box = cv2 .boxpoints(rect).astype( int ) # its 4 corners cv2 .drawcontours(img, [box], - 1 , ( 0 , 255 , 0 ), 2 ) cv2 .imwrite(out, img) return img watch out: this only localizes — decoding needs cv2.barcode_barcodedetector or pyzbar . if the barcode may be rotated, run on both grad_x - grad_y and grad_y - grad_x , keep the stronger response. problem e6 — detect table / document lines (hough transform) tests: houghlinesp — the go-to for finding straight structure (table grids, form fields, document edges). the problem: find the straight lines in a document — table grids, form boxes, underlines. the plan: canny edge pixels ==> each edge pixel votes for every line that could pass through it (hough accumulator) lines collecting >= threshold votes win houghlinesp returns real segments: (x1, y1, x2, y2) with endpoints why this way: voting makes hough robust to broken edges — a line missing a third of its pixels still wins the vote. choose houghlinesp (probabilistic) over houghlines : it hands you finite segments you can draw and measure, not infinite (rho, theta) pairs you'd have to convert. alternative worth naming: to separate horizontal from vertical table lines, morphological opening with a long thin kernel (e.g. (40, 1) ) is even simpler than hough. import cv2 import numpy as np def find_lines(path, out= \"e6_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) edges = cv2 .canny(gray, 50 , 150 ) # probabilistic hough: returns finite segments (x1,y1,x2,y2), not infinite lines lines = cv2 .houghlinesp(edges, rho= 1 , theta= np .pi / 180 , threshold= 80 , minlinelength= 100 , maxlinegap= 10 ) for line in (lines if lines is not none else []): # lines is none if none found x1, y1, x2, y2 = line[ 0 ] cv2 .line(img, (x1, y1), (x2, y2), ( 0 , 0 , 255 ), 2 ) cv2 .imwrite(out, img) return img, 0 if lines is none else len (lines) watch out: rho=1, theta=np.pi/180 are resolutions, not limits. to split a table into horizontal/vertical lines, morphology is often cleaner: erode+dilate with a long thin kernel like (40, 1) keeps only horizontal strokes. problem e7 — 2d convolution from scratch (numpy only) tests: do you understand what filter2d actually does? loop over the small kernel , never over pixels — that keeps it vectorized and short. the problem: implement image filtering yourself — the \"do you actually know what filter2d does?\" question. the plan: kernel 0 -1 0 each output pixel = weighted sum of its -1 5 -1 3x3 neighborhood (here: sharpen) 0 -1 0 naive: loop over 350,000 pixels x 9 weights -> millions of python steps smart: loop over the 9 weights; each step shifts the whole image and adds it, weighted -> 9 vectorized array ops, same math why this way: both loop orders compute the identical sum — but flipping them moves the heavy loop from the python interpreter into numpy's c code, a ~1000x speedup for the same line count. this \"make the big loop the vectorized one\" trick generalizes far beyond convolution. edge-padding by half the kernel keeps output size equal to input ('same' convolution, like filter2d's default). import numpy as np def convolve2d(img, kernel): kh, kw = kernel.shape pad_h, pad_w = kh // 2 , kw // 2 # pad edges so output size == input size ('same' convolution) padded = np .pad(img.astype( np .float32), ((pad_h, pad_h), (pad_w, pad_w)), mode= \"edge\" ) out = np .zeros(img.shape, np .float32) for i in range (kh): # 3x3 kernel = 9 iterations total, for j in range (kw): # each one a whole-image numpy op out += kernel[i, j] * padded[i:i + img.shape[ 0 ], j:j + img.shape[ 1 ]] return np .clip(out, 0 , 255 ).astype( np .uint8) # clip before uint8 or it wraps watch out: true convolution flips the kernel; this (and filter2d ) computes correlation — identical for symmetric kernels. casting negatives straight to uint8 silently wraps (-1 → 255): always np.clip first. problem e8 — filter contours by shape (find label-like rectangles) tests: turning raw contours into decisions with cheap shape stats: area, aspect ratio, and extent (how much of its bounding box the shape fills). the problem: contour detection found twenty shapes — which ones are actually labels (rectangles), and which are circles, blobs, and junk? the plan: candidate area aspect(w/h) extent(area/bbox area) rectangle big ~1.0 ~1.00 ==> keep circle big ~1.0 ~0.79 ==> reject (doesn't fill box) noise speck tiny - - ==> reject first (cheapest test) why this way: three one-line statistics do what would otherwise need a trained classifier — and every rejection is explainable (\"dropped: extent 0.62\"), which matters in production debugging. order the tests cheapest-first so expensive checks run on fewer candidates. if rectangles may be rotated , compute extent against minarearect area instead of the axis-aligned box. import cv2 def find_rectangles(path, min_area= 1000 , out= \"e8_out.png\" ): img = cv2 .imread(path) gray = cv2 .cvtcolor(img, cv2 .color_bgr2gray) _, binary = cv2 .threshold(gray, 0 , 255 , cv2 .thresh_binary + cv2 .thresh_otsu) contours, _ = cv2 .findcontours(binary, cv2 .retr_external, cv2 .chain_approx_simple) kept = [] for contour in contours: area = cv2 .contourarea(contour) if area < min_area: # 1. drop noise continue x, y, w, h = cv2 .boundingrect(contour) aspect = w / h # 2. drop long thin strips extent = area / (w * h) # 3. rect fills ~1.0, circle ~0.79 if 0.3 < aspect < 3.0 and extent > 0.85 : kept.append((x, y, w, h)) cv2 .rectangle(img, (x, y), (x + w, y + h), ( 0 , 255 , 0 ), 2 ) cv2 .imwrite(out, img) return img, kept watch out: contourarea ≠ pixel count — it's the polygon area (green's theorem). another handy stat: circularity 4*pi*area / perimeter**2 is 1.0 for a circle, ~0.785 for a square. combine 2–3 cheap stats instead of one magic number. → next: detection-logic.md","words":4812},{"path":"10-coding-practice/detection-logic.md","title":"Detection Logic","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"detection-logic\">Detection Logic<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD's \"complex logic layers on top of model detections.\" You'll get boxes (or points) and be asked to compute something: <strong>IoU<\/strong>, <strong>NMS<\/strong>, who's <strong>inside a zone<\/strong>, who <strong>crossed a line<\/strong>, or the <strong>reading order<\/strong> of OCR boxes. Pure Python + NumPy — no model needed. These are classic, so know them cold.<\/div><\/div>\n<hr>\n<h2 id=\"problem-8-iou-of-two-boxes\">Problem 8 — IoU of two boxes<\/h2>\n<p><strong>Tests:<\/strong> the fundamental box metric; coordinate math; the empty-overlap edge case.<\/p>\n<p><strong>The problem:<\/strong> score how much two boxes agree, as a number in [0, 1] — the currency of all detection logic (NMS, evaluation, tracker matching).<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">   +-------+\n   |   A   |            IoU = overlap / (areaA + areaB - overlap)\n   |   +---+----+\n   |   |###|    |       ### intersection rectangle:\n   +---+---+    |       its left  = max(A.left,  B.left)\n       |    B   |       its right = min(A.right, B.right)\n       +--------+       (same idea for top/bottom)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the intersection of two ranges on ONE axis is simply [max(starts), min(ends)] — do that for x and for y, multiply the two lengths. The <code>max(0, ...)<\/code> clamp is the whole edge case: for disjoint boxes min-max goes negative and would fabricate overlap. And union must subtract the intersection, or the shared area is counted twice.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> iou(a, b):\n    <span class=\"tok-string\">\"\"\"Boxes as (x1, y1, x2, y2). Returns intersection-over-union in [0,1].\"\"\"<\/span>\n    ix1, iy1 = <span class=\"tok-builtin\">max<\/span>(a[<span class=\"tok-number\">0<\/span>], b[<span class=\"tok-number\">0<\/span>]), <span class=\"tok-builtin\">max<\/span>(a[<span class=\"tok-number\">1<\/span>], b[<span class=\"tok-number\">1<\/span>])     <span class=\"tok-comment\"># intersection top-left<\/span>\n    ix2, iy2 = <span class=\"tok-builtin\">min<\/span>(a[<span class=\"tok-number\">2<\/span>], b[<span class=\"tok-number\">2<\/span>]), <span class=\"tok-builtin\">min<\/span>(a[<span class=\"tok-number\">3<\/span>], b[<span class=\"tok-number\">3<\/span>])     <span class=\"tok-comment\"># intersection bottom-right<\/span>\n    iw, ih = <span class=\"tok-builtin\">max<\/span>(<span class=\"tok-number\">0<\/span>, ix2 - ix1), <span class=\"tok-builtin\">max<\/span>(<span class=\"tok-number\">0<\/span>, iy2 - iy1)   <span class=\"tok-comment\"># clamp at 0 → no overlap<\/span>\n    inter = iw * ih\n    area_a = (a[<span class=\"tok-number\">2<\/span>] - a[<span class=\"tok-number\">0<\/span>]) * (a[<span class=\"tok-number\">3<\/span>] - a[<span class=\"tok-number\">1<\/span>])\n    area_b = (b[<span class=\"tok-number\">2<\/span>] - b[<span class=\"tok-number\">0<\/span>]) * (b[<span class=\"tok-number\">3<\/span>] - b[<span class=\"tok-number\">1<\/span>])\n    union = area_a + area_b - inter                 <span class=\"tok-comment\"># don't double-count the overlap<\/span>\n    <span class=\"tok-keyword\">return<\/span> inter / union <span class=\"tok-keyword\">if<\/span> union &gt; <span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">else<\/span> <span class=\"tok-number\">0.0<\/span>\n\n<span class=\"tok-keyword\">if<\/span> __name__ == <span class=\"tok-string\">\"__main__\"<\/span>:\n    <span class=\"tok-builtin\">print<\/span>(iou((<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">10<\/span>), (<span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">5<\/span>, <span class=\"tok-number\">15<\/span>, <span class=\"tok-number\">15<\/span>)))   <span class=\"tok-comment\"># 25 / 175 = 0.142...<\/span><\/code><\/pre>\n<p><strong>Watch out:<\/strong> the <code>max(0, ...)<\/code> clamp — without it, non-overlapping boxes give a bogus positive area.<\/p>\n<hr>\n<h2 id=\"problem-9-non-maximum-suppression-from-scratch\">Problem 9 — Non-Maximum Suppression (from scratch)<\/h2>\n<p><strong>Tests:<\/strong> the dedup algorithm every detector needs. Sort by score, greedily keep the best, drop high-IoU neighbours.<\/p>\n<p><strong>The problem:<\/strong> a detector fires several overlapping boxes on the <em>same<\/em> object. Keep exactly one box per object.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> scores:  A=0.9   B=0.8   C=0.7\n 1. take best remaining:  A  -&gt; KEEP\n 2. IoU(A,B)=0.8 (same object)  -&gt; drop B\n    IoU(A,C)=0.0 (elsewhere)    -&gt; C survives\n 3. take best remaining:  C  -&gt; KEEP        result: [A, C]<\/code><\/pre>\n<p><strong>Why this way:<\/strong> greedy-by-confidence works because the highest-score box is usually the best-localized one — lock it in, delete everything that mostly overlaps it. The plain-Python version shows the algorithm; the NumPy version exists because the inner IoU loop is O(n²) — vectorizing \"winner vs all survivors\" into one array pass is what makes thousands of boxes per frame feasible. Name the follow-up: Soft-NMS decays scores instead of deleting, for crowded scenes where two real objects genuinely overlap.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> nms(boxes, scores, iou_thresh=<span class=\"tok-number\">0.5<\/span>):\n    <span class=\"tok-string\">\"\"\"boxes: list of (x1,y1,x2,y2); scores: list of floats. Returns kept indices.\"\"\"<\/span>\n    candidates = sorted(<span class=\"tok-builtin\">range<\/span>(<span class=\"tok-builtin\">len<\/span>(boxes)), key=<span class=\"tok-keyword\">lambda<\/span> i: scores[i], reverse=<span class=\"tok-keyword\">True<\/span>)  <span class=\"tok-comment\"># best first<\/span>\n    keep = []\n    <span class=\"tok-keyword\">while<\/span> candidates:\n        best = candidates.pop(<span class=\"tok-number\">0<\/span>)        <span class=\"tok-comment\"># highest score still in play<\/span>\n        keep.append(best)\n        candidates = [i <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> candidates             <span class=\"tok-comment\"># drop everything that<\/span>\n                      <span class=\"tok-keyword\">if<\/span> iou(boxes[best], boxes[i]) &lt; iou_thresh]  <span class=\"tok-comment\"># overlaps the winner<\/span>\n    <span class=\"tok-keyword\">return<\/span> keep<\/code><\/pre>\n<p>NumPy/vectorized version (worth knowing for \"make it fast\"):<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> nms_np(boxes, scores, iou_thresh=<span class=\"tok-number\">0.5<\/span>):\n    boxes = <span class=\"tok-builtin\">np<\/span>.asarray(boxes, dtype=<span class=\"tok-builtin\">float<\/span>)\n    x1, y1, x2, y2 = boxes.T                <span class=\"tok-comment\"># columns → four 1-D arrays<\/span>\n    areas = (x2 - x1) * (y2 - y1)\n    order = scores.argsort()[::-<span class=\"tok-number\">1<\/span>]          <span class=\"tok-comment\"># indices, highest score first<\/span>\n    keep = []\n    <span class=\"tok-keyword\">while<\/span> order.size &gt; <span class=\"tok-number\">0<\/span>:\n        best = order[<span class=\"tok-number\">0<\/span>]; keep.append(best)\n        others = order[<span class=\"tok-number\">1<\/span>:]\n        <span class=\"tok-comment\"># IoU of `best` vs ALL remaining boxes at once (no inner loop)<\/span>\n        inter_x1 = <span class=\"tok-builtin\">np<\/span>.maximum(x1[best], x1[others])\n        inter_y1 = <span class=\"tok-builtin\">np<\/span>.maximum(y1[best], y1[others])\n        inter_x2 = <span class=\"tok-builtin\">np<\/span>.minimum(x2[best], x2[others])\n        inter_y2 = <span class=\"tok-builtin\">np<\/span>.minimum(y2[best], y2[others])\n        inter_w = <span class=\"tok-builtin\">np<\/span>.maximum(<span class=\"tok-number\">0<\/span>, inter_x2 - inter_x1)\n        inter_h = <span class=\"tok-builtin\">np<\/span>.maximum(<span class=\"tok-number\">0<\/span>, inter_y2 - inter_y1)\n        intersection = inter_w * inter_h\n        overlaps = intersection / (areas[best] + areas[others] - intersection)\n        order = others[overlaps &lt; iou_thresh]   <span class=\"tok-comment\"># keep only low-overlap survivors<\/span>\n    <span class=\"tok-keyword\">return<\/span> keep<\/code><\/pre>\n<p><strong>Watch out:<\/strong> reuse <code>iou<\/code> from Problem 8 — interviewers love when you compose. Soft-NMS (decay scores instead of dropping) is the follow-up for crowded scenes.<\/p>\n<hr>\n<h2 id=\"problem-10-count-detections-inside-a-zone-point-in-polygon\">Problem 10 — Count detections inside a zone (point-in-polygon)<\/h2>\n<p><strong>Tests:<\/strong> geometry on detections; using the <strong>bottom-center<\/strong> (foot) point, not the box center.<\/p>\n<p><strong>The problem:<\/strong> given detection boxes and a zone polygon, count who is IN the zone.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">      zone (on the floor)          a tall object, oblique camera:\n   +---------------+                 +----+\n   |               |                 |    | &lt;- box CENTER lands here\n   |      x &lt;------|---- foot        |    |    (inside the zone?!)\n   +---------------+                 |    |\n                                     | x  | &lt;- foot = ((x1+x2)/2, y2)\n                                     +----+    where it actually STANDS<\/code><\/pre>\n<p><strong>Why this way:<\/strong> zones are painted on the <em>floor<\/em>, and objects touch the world at their <em>feet<\/em> — with an angled camera, a box's geometric center can sit inside a zone the object isn't standing in. Using the bottom-center point is the standard fix (and a favorite interview gotcha). <code>cv2.pointPolygonTest<\/code> handles arbitrary polygons; pass <code>False<\/code> to get just the inside/on/outside sign — we don't need the distance, and skipping it is faster.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\n\n<span class=\"tok-keyword\">def<\/span> count_in_zone(boxes, polygon):\n    <span class=\"tok-string\">\"\"\"polygon: list of (x,y). Counts boxes whose foot point is inside.\"\"\"<\/span>\n    polygon_pts = <span class=\"tok-builtin\">np<\/span>.array(polygon, dtype=<span class=\"tok-builtin\">np<\/span>.int32)\n    count = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> (x1, y1, x2, y2) <span class=\"tok-keyword\">in<\/span> boxes:\n        foot = (<span class=\"tok-builtin\">int<\/span>((x1 + x2) / <span class=\"tok-number\">2<\/span>), <span class=\"tok-builtin\">int<\/span>(y2))            <span class=\"tok-comment\"># bottom-center point<\/span>\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">cv2<\/span>.pointPolygonTest(polygon_pts, foot, <span class=\"tok-keyword\">False<\/span>) &gt;= <span class=\"tok-number\">0<\/span>:  <span class=\"tok-comment\"># &gt;=0 = inside/on<\/span>\n            count += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-keyword\">return<\/span> count<\/code><\/pre>\n<p><strong>Watch out:<\/strong> use the <strong>foot point<\/strong> (where the object meets the floor), not the geometric center — the standard gotcha for tall objects / oblique cameras.<\/p>\n<hr>\n<h2 id=\"problem-11-line-crossing-counter-direction-aware\">Problem 11 — Line-crossing counter (direction-aware)<\/h2>\n<p><strong>Tests:<\/strong> tracking-style logic; cross-product sign to detect a crossing and its direction between consecutive frames.<\/p>\n<p><strong>The problem:<\/strong> count objects crossing a virtual line — separately for each direction (entering vs leaving).<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\">             p_prev   (side +)\n  A ------------ line ------------ B\n             p_cur    (side -)\n\n side(p) = z of cross product (B-A) x (p-A)\n sign flips between consecutive frames  ==&gt;  the track crossed\n which sign it ENDS on                  ==&gt;  which direction<\/code><\/pre>\n<p><strong>Why this way:<\/strong> comparing raw x or y coordinates only works for perfectly vertical/horizontal lines; the cross-product sign works for a line at <em>any<\/em> angle and gives direction for free. Counting per <strong>track id<\/strong> (not per frame) is essential — one person crossing would otherwise be counted at every frame near the line. In production you'd also debounce (require K of N frames on the new side) to survive detector flicker.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> side(line_a, line_b, p):\n    <span class=\"tok-string\">\"\"\"Sign of which side of line (a-&gt;b) point p is on (cross product z).\"\"\"<\/span>\n    <span class=\"tok-keyword\">return<\/span> ((line_b[<span class=\"tok-number\">0<\/span>] - line_a[<span class=\"tok-number\">0<\/span>]) * (p[<span class=\"tok-number\">1<\/span>] - line_a[<span class=\"tok-number\">1<\/span>]) -\n            (line_b[<span class=\"tok-number\">1<\/span>] - line_a[<span class=\"tok-number\">1<\/span>]) * (p[<span class=\"tok-number\">0<\/span>] - line_a[<span class=\"tok-number\">0<\/span>]))   <span class=\"tok-comment\"># &gt;0 / &lt;0 / 0=on line<\/span>\n\n<span class=\"tok-keyword\">def<\/span> count_crossings(tracks, line_a, line_b):\n    <span class=\"tok-string\">\"\"\"tracks: {id: [(x,y) per frame]}. Returns (in_count, out_count).\"\"\"<\/span>\n    entering = leaving = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">for<\/span> path <span class=\"tok-keyword\">in<\/span> tracks.values():\n        <span class=\"tok-keyword\">for<\/span> prev_point, cur_point <span class=\"tok-keyword\">in<\/span> <span class=\"tok-builtin\">zip<\/span>(path, path[<span class=\"tok-number\">1<\/span>:]):   <span class=\"tok-comment\"># consecutive frames<\/span>\n            side_prev = side(line_a, line_b, prev_point)\n            side_cur = side(line_a, line_b, cur_point)\n            <span class=\"tok-keyword\">if<\/span> side_prev == <span class=\"tok-number\">0<\/span> <span class=\"tok-keyword\">or<\/span> side_cur == <span class=\"tok-number\">0<\/span>:   <span class=\"tok-comment\"># exactly ON the line: skip<\/span>\n                <span class=\"tok-keyword\">continue<\/span>\n            <span class=\"tok-keyword\">if<\/span> (side_prev &gt; <span class=\"tok-number\">0<\/span>) != (side_cur &gt; <span class=\"tok-number\">0<\/span>):   <span class=\"tok-comment\"># sign flipped → crossed<\/span>\n                <span class=\"tok-keyword\">if<\/span> side_cur &gt; <span class=\"tok-number\">0<\/span>: entering += <span class=\"tok-number\">1<\/span>\n                <span class=\"tok-keyword\">else<\/span>: leaving += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-keyword\">return<\/span> entering, leaving<\/code><\/pre>\n<p><strong>Watch out:<\/strong> count <strong>per track id<\/strong> so one object is counted once per crossing, not once per frame. Debounce flicker in real systems (K-of-N frames).<\/p>\n<hr>\n<h2 id=\"problem-12-sort-ocr-boxes-into-reading-order\">Problem 12 — Sort OCR boxes into reading order<\/h2>\n<p><strong>Tests:<\/strong> turning detections into text order — group into rows, then left-to-right.<\/p>\n<p><strong>The problem:<\/strong> OCR returns word boxes in arbitrary order; reconstruct the order a human would read them in.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> naive sort by (y, x) fails:  same-line words differ by a few px in y,\n                              so the sort interleaves lines:\n                              word(y=10) word(y=12) word(y=11) ...\n\n fix: 1. sort by y      2. group into ROWS with a tolerance\n      3. sort each row by x     4. concatenate rows<\/code><\/pre>\n<p><strong>Why this way:<\/strong> the tolerance (about half the text height) is what makes row grouping robust to slightly wavy or tilted scans; the running-average row anchor keeps a long row from drifting. A single lexicographic sort has no such slack — it's the bug interviewers expect you to know about. This exact \"logic on top of an OCR model\" is KoiReader's bread and butter.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> reading_order(boxes, row_tol=<span class=\"tok-number\">15<\/span>):\n    <span class=\"tok-string\">\"\"\"boxes: list of (x1,y1,x2,y2). Returns indices in reading order.\"\"\"<\/span>\n    order = <span class=\"tok-builtin\">list<\/span>(<span class=\"tok-builtin\">range<\/span>(<span class=\"tok-builtin\">len<\/span>(boxes)))\n    order.sort(key=<span class=\"tok-keyword\">lambda<\/span> i: boxes[i][<span class=\"tok-number\">1<\/span>])         <span class=\"tok-comment\"># by top y first<\/span>\n    rows, current_row, current_row_y = [], [], <span class=\"tok-keyword\">None<\/span>\n    <span class=\"tok-keyword\">for<\/span> i <span class=\"tok-keyword\">in<\/span> order:\n        box_center_y = (boxes[i][<span class=\"tok-number\">1<\/span>] + boxes[i][<span class=\"tok-number\">3<\/span>]) / <span class=\"tok-number\">2<\/span>\n        <span class=\"tok-keyword\">if<\/span> current_row_y <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span> <span class=\"tok-keyword\">or<\/span> <span class=\"tok-builtin\">abs<\/span>(box_center_y - current_row_y) &lt;= row_tol:\n            current_row.append(i)                 <span class=\"tok-comment\"># same line of text<\/span>\n            current_row_y = (box_center_y <span class=\"tok-keyword\">if<\/span> current_row_y <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">None<\/span>\n                             <span class=\"tok-keyword\">else<\/span> (current_row_y + box_center_y) / <span class=\"tok-number\">2<\/span>)  <span class=\"tok-comment\"># running avg<\/span>\n        <span class=\"tok-keyword\">else<\/span>:\n            rows.append(current_row)              <span class=\"tok-comment\"># row finished, start a new one<\/span>\n            current_row, current_row_y = [i], box_center_y\n    <span class=\"tok-keyword\">if<\/span> current_row:\n        rows.append(current_row)\n    result = []\n    <span class=\"tok-keyword\">for<\/span> row <span class=\"tok-keyword\">in<\/span> rows:\n        row.sort(key=<span class=\"tok-keyword\">lambda<\/span> i: boxes[i][<span class=\"tok-number\">0<\/span>])       <span class=\"tok-comment\"># within a row, left to right<\/span>\n        result.extend(row)\n    <span class=\"tok-keyword\">return<\/span> result<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>row_tol<\/code> groups boxes into the same line; tune to text height. This is exactly the kind of \"logic on top of an OCR model\" KoiReader builds.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"video-and-streaming.md\" href=\"#\">video-and-streaming.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"problem-8-iou-of-two-boxes","text":"Problem 8 — IoU of two boxes"},{"level":2,"id":"problem-9-non-maximum-suppression-from-scratch","text":"Problem 9 — Non-Maximum Suppression (from scratch)"},{"level":2,"id":"problem-10-count-detections-inside-a-zone-point-in-polygon","text":"Problem 10 — Count detections inside a zone (point-in-polygon)"},{"level":2,"id":"problem-11-line-crossing-counter-direction-aware","text":"Problem 11 — Line-crossing counter (direction-aware)"},{"level":2,"id":"problem-12-sort-ocr-boxes-into-reading-order","text":"Problem 12 — Sort OCR boxes into reading order"}],"text":"detection logic 💡 tl;dr the jd's \"complex logic layers on top of model detections.\" you'll get boxes (or points) and be asked to compute something: iou , nms , who's inside a zone , who crossed a line , or the reading order of ocr boxes. pure python + numpy — no model needed. these are classic, so know them cold. problem 8 — iou of two boxes tests: the fundamental box metric; coordinate math; the empty-overlap edge case. the problem: score how much two boxes agree, as a number in [0, 1] — the currency of all detection logic (nms, evaluation, tracker matching). the plan: +-------+ | a | iou = overlap / (areaa + areab - overlap) | +---+----+ | |###| | ### intersection rectangle: +---+---+ | its left = max(a.left, b.left) | b | its right = min(a.right, b.right) +--------+ (same idea for top/bottom) why this way: the intersection of two ranges on one axis is simply [max(starts), min(ends)] — do that for x and for y, multiply the two lengths. the max(0, ...) clamp is the whole edge case: for disjoint boxes min-max goes negative and would fabricate overlap. and union must subtract the intersection, or the shared area is counted twice. def iou(a, b): \"\"\"boxes as (x1, y1, x2, y2). returns intersection-over-union in [0,1].\"\"\" ix1, iy1 = max (a[ 0 ], b[ 0 ]), max (a[ 1 ], b[ 1 ]) # intersection top-left ix2, iy2 = min (a[ 2 ], b[ 2 ]), min (a[ 3 ], b[ 3 ]) # intersection bottom-right iw, ih = max ( 0 , ix2 - ix1), max ( 0 , iy2 - iy1) # clamp at 0 → no overlap inter = iw * ih area_a = (a[ 2 ] - a[ 0 ]) * (a[ 3 ] - a[ 1 ]) area_b = (b[ 2 ] - b[ 0 ]) * (b[ 3 ] - b[ 1 ]) union = area_a + area_b - inter # don't double-count the overlap return inter / union if union > 0 else 0.0 if __name__ == \"__main__\" : print (iou(( 0 , 0 , 10 , 10 ), ( 5 , 5 , 15 , 15 ))) # 25 / 175 = 0.142... watch out: the max(0, ...) clamp — without it, non-overlapping boxes give a bogus positive area. problem 9 — non-maximum suppression (from scratch) tests: the dedup algorithm every detector needs. sort by score, greedily keep the best, drop high-iou neighbours. the problem: a detector fires several overlapping boxes on the same object. keep exactly one box per object. the plan: scores: a=0.9 b=0.8 c=0.7 1. take best remaining: a -> keep 2. iou(a,b)=0.8 (same object) -> drop b iou(a,c)=0.0 (elsewhere) -> c survives 3. take best remaining: c -> keep result: [a, c] why this way: greedy-by-confidence works because the highest-score box is usually the best-localized one — lock it in, delete everything that mostly overlaps it. the plain-python version shows the algorithm; the numpy version exists because the inner iou loop is o(n²) — vectorizing \"winner vs all survivors\" into one array pass is what makes thousands of boxes per frame feasible. name the follow-up: soft-nms decays scores instead of deleting, for crowded scenes where two real objects genuinely overlap. def nms(boxes, scores, iou_thresh= 0.5 ): \"\"\"boxes: list of (x1,y1,x2,y2); scores: list of floats. returns kept indices.\"\"\" candidates = sorted( range ( len (boxes)), key= lambda i: scores[i], reverse= true ) # best first keep = [] while candidates: best = candidates.pop( 0 ) # highest score still in play keep.append(best) candidates = [i for i in candidates # drop everything that if iou(boxes[best], boxes[i]) < iou_thresh] # overlaps the winner return keep numpy/vectorized version (worth knowing for \"make it fast\"): import numpy as np def nms_np(boxes, scores, iou_thresh= 0.5 ): boxes = np .asarray(boxes, dtype= float ) x1, y1, x2, y2 = boxes.t # columns → four 1-d arrays areas = (x2 - x1) * (y2 - y1) order = scores.argsort()[::- 1 ] # indices, highest score first keep = [] while order.size > 0 : best = order[ 0 ]; keep.append(best) others = order[ 1 :] # iou of `best` vs all remaining boxes at once (no inner loop) inter_x1 = np .maximum(x1[best], x1[others]) inter_y1 = np .maximum(y1[best], y1[others]) inter_x2 = np .minimum(x2[best], x2[others]) inter_y2 = np .minimum(y2[best], y2[others]) inter_w = np .maximum( 0 , inter_x2 - inter_x1) inter_h = np .maximum( 0 , inter_y2 - inter_y1) intersection = inter_w * inter_h overlaps = intersection / (areas[best] + areas[others] - intersection) order = others[overlaps < iou_thresh] # keep only low-overlap survivors return keep watch out: reuse iou from problem 8 — interviewers love when you compose. soft-nms (decay scores instead of dropping) is the follow-up for crowded scenes. problem 10 — count detections inside a zone (point-in-polygon) tests: geometry on detections; using the bottom-center (foot) point, not the box center. the problem: given detection boxes and a zone polygon, count who is in the zone. the plan: zone (on the floor) a tall object, oblique camera: +---------------+ +----+ | | | | <- box center lands here | x <------|---- foot | | (inside the zone?!) +---------------+ | | | x | <- foot = ((x1+x2)/2, y2) +----+ where it actually stands why this way: zones are painted on the floor , and objects touch the world at their feet — with an angled camera, a box's geometric center can sit inside a zone the object isn't standing in. using the bottom-center point is the standard fix (and a favorite interview gotcha). cv2.pointpolygontest handles arbitrary polygons; pass false to get just the inside/on/outside sign — we don't need the distance, and skipping it is faster. import cv2 import numpy as np def count_in_zone(boxes, polygon): \"\"\"polygon: list of (x,y). counts boxes whose foot point is inside.\"\"\" polygon_pts = np .array(polygon, dtype= np .int32) count = 0 for (x1, y1, x2, y2) in boxes: foot = ( int ((x1 + x2) / 2 ), int (y2)) # bottom-center point if cv2 .pointpolygontest(polygon_pts, foot, false ) >= 0 : # >=0 = inside/on count += 1 return count watch out: use the foot point (where the object meets the floor), not the geometric center — the standard gotcha for tall objects / oblique cameras. problem 11 — line-crossing counter (direction-aware) tests: tracking-style logic; cross-product sign to detect a crossing and its direction between consecutive frames. the problem: count objects crossing a virtual line — separately for each direction (entering vs leaving). the plan: p_prev (side +) a ------------ line ------------ b p_cur (side -) side(p) = z of cross product (b-a) x (p-a) sign flips between consecutive frames ==> the track crossed which sign it ends on ==> which direction why this way: comparing raw x or y coordinates only works for perfectly vertical/horizontal lines; the cross-product sign works for a line at any angle and gives direction for free. counting per track id (not per frame) is essential — one person crossing would otherwise be counted at every frame near the line. in production you'd also debounce (require k of n frames on the new side) to survive detector flicker. def side(line_a, line_b, p): \"\"\"sign of which side of line (a->b) point p is on (cross product z).\"\"\" return ((line_b[ 0 ] - line_a[ 0 ]) * (p[ 1 ] - line_a[ 1 ]) - (line_b[ 1 ] - line_a[ 1 ]) * (p[ 0 ] - line_a[ 0 ])) # >0 / <0 / 0=on line def count_crossings(tracks, line_a, line_b): \"\"\"tracks: {id: [(x,y) per frame]}. returns (in_count, out_count).\"\"\" entering = leaving = 0 for path in tracks.values(): for prev_point, cur_point in zip (path, path[ 1 :]): # consecutive frames side_prev = side(line_a, line_b, prev_point) side_cur = side(line_a, line_b, cur_point) if side_prev == 0 or side_cur == 0 : # exactly on the line: skip continue if (side_prev > 0 ) != (side_cur > 0 ): # sign flipped → crossed if side_cur > 0 : entering += 1 else : leaving += 1 return entering, leaving watch out: count per track id so one object is counted once per crossing, not once per frame. debounce flicker in real systems (k-of-n frames). problem 12 — sort ocr boxes into reading order tests: turning detections into text order — group into rows, then left-to-right. the problem: ocr returns word boxes in arbitrary order; reconstruct the order a human would read them in. the plan: naive sort by (y, x) fails: same-line words differ by a few px in y, so the sort interleaves lines: word(y=10) word(y=12) word(y=11) ... fix: 1. sort by y 2. group into rows with a tolerance 3. sort each row by x 4. concatenate rows why this way: the tolerance (about half the text height) is what makes row grouping robust to slightly wavy or tilted scans; the running-average row anchor keeps a long row from drifting. a single lexicographic sort has no such slack — it's the bug interviewers expect you to know about. this exact \"logic on top of an ocr model\" is koireader's bread and butter. def reading_order(boxes, row_tol= 15 ): \"\"\"boxes: list of (x1,y1,x2,y2). returns indices in reading order.\"\"\" order = list ( range ( len (boxes))) order.sort(key= lambda i: boxes[i][ 1 ]) # by top y first rows, current_row, current_row_y = [], [], none for i in order: box_center_y = (boxes[i][ 1 ] + boxes[i][ 3 ]) / 2 if current_row_y is none or abs (box_center_y - current_row_y) <= row_tol: current_row.append(i) # same line of text current_row_y = (box_center_y if current_row_y is none else (current_row_y + box_center_y) / 2 ) # running avg else : rows.append(current_row) # row finished, start a new one current_row, current_row_y = [i], box_center_y if current_row: rows.append(current_row) result = [] for row in rows: row.sort(key= lambda i: boxes[i][ 0 ]) # within a row, left to right result.extend(row) return result watch out: row_tol groups boxes into the same line; tune to text height. this is exactly the kind of \"logic on top of an ocr model\" koireader builds. → next: video-and-streaming.md","words":1678},{"path":"10-coding-practice/video-and-streaming.md","title":"Video & Streaming","section":"10 · Coding Practice","quiz":false,"accent":"#b5651d","html":"<h1 id=\"video-streaming\">Video &amp; Streaming<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Expect \"process this video\": open it, read frames in a loop <strong>with a guard for failed reads<\/strong>, do something per frame (motion, sample, annotate), and <strong>write an output video or frames<\/strong>. The robust <code>cv2.VideoCapture<\/code> loop is the one to have in muscle memory — it doubles as your fault-tolerance answer.<\/div><\/div>\n<hr>\n<h2 id=\"problem-13-robust-capture-read-sample-every-nth-frame-save\">Problem 13 — Robust capture: read, sample every Nth frame, save<\/h2>\n<p><strong>Tests:<\/strong> the capture loop, failure handling, frame sampling, releasing resources.<\/p>\n<p><strong>The problem:<\/strong> open a video (file or RTSP stream), keep every Nth frame as an image, and don't crash or leak when the source misbehaves.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> frames:   0   1  ...  14  [15]  16 ...  29  [30]     every=15\n          save                save            save\n\n the loop that matters:\n    while True:  ok, frame = cap.read()\n                 if not ok: break         &lt;- EOF *or* dropped stream\n    finally:     cap.release()            &lt;- runs no matter what<\/code><\/pre>\n<p><strong>Why this way:<\/strong> count-and-modulo beats seeking — jumping around with <code>CAP_PROP_POS_FRAMES<\/code> is unreliable on many codecs (seeks snap to keyframes), while sequential reading is always exact. The <code>ok<\/code> guard and <code>finally: release<\/code> ARE the fault-tolerance answer: streams end without warning, and leaked capture handles are how long-running services die slowly. For live RTSP, wrap the whole thing in reconnect-with-backoff.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n<span class=\"tok-keyword\">import<\/span> os\n\n<span class=\"tok-keyword\">def<\/span> sample_frames(source, out_dir=<span class=\"tok-string\">\"frames\"<\/span>, every=<span class=\"tok-number\">15<\/span>):\n    <span class=\"tok-string\">\"\"\"source: a video path or RTSP url. Saves every Nth frame as an image.\"\"\"<\/span>\n    os.makedirs(out_dir, exist_ok=<span class=\"tok-keyword\">True<\/span>)\n    cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(source)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> cap.isOpened():\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">f\"cannot open {source}\"<\/span>)\n    frame_index = saved_count = <span class=\"tok-number\">0<\/span>\n    <span class=\"tok-keyword\">try<\/span>:\n        <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n            ok, frame = cap.read()\n            <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:                       <span class=\"tok-comment\"># end of file OR dropped stream<\/span>\n                <span class=\"tok-keyword\">break<\/span>\n            <span class=\"tok-keyword\">if<\/span> frame_index % every == <span class=\"tok-number\">0<\/span>:\n                filename = os.path.join(out_dir, <span class=\"tok-string\">f\"frame_{frame_index:05d}.jpg\"<\/span>)\n                <span class=\"tok-builtin\">cv2<\/span>.imwrite(filename, frame)\n                saved_count += <span class=\"tok-number\">1<\/span>\n            frame_index += <span class=\"tok-number\">1<\/span>\n    <span class=\"tok-keyword\">finally<\/span>:\n        cap.release()                        <span class=\"tok-comment\"># ALWAYS release (no leaks)<\/span>\n    <span class=\"tok-builtin\">print<\/span>(<span class=\"tok-string\">f\"read {frame_index} frames, saved {saved_count}\"<\/span>)\n    <span class=\"tok-keyword\">return<\/span> saved_count<\/code><\/pre>\n<p><strong>Watch out:<\/strong> check <code>isOpened()<\/code>, handle <code>ok == False<\/code> (don't assume frames keep coming), and <code>release()<\/code> in a <code>finally<\/code>. For live RTSP you'd wrap this in a reconnect-with-backoff loop (see the fault-tolerance chapter).<\/p>\n<hr>\n<h2 id=\"problem-14-motion-detection-via-frame-differencing-write-annotated-video\">Problem 14 — Motion detection via frame differencing, write annotated video<\/h2>\n<p><strong>Tests:<\/strong> per-frame processing, background diff, contours on a mask, <code>VideoWriter<\/code>.<\/p>\n<p><strong>The problem:<\/strong> find and box the <em>moving<\/em> things in a video, writing an annotated copy.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> prev frame    cur frame     absdiff      threshold     dilate+contours\n [.......]  vs [...o...] ==&gt; [...#...] ==&gt; [...#...] ==&gt; [..[box]..]\n (blur both first - otherwise sensor noise \"moves\" in every pixel)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> frame differencing needs zero training and one frame of state — the right first answer. Know its weakness out loud: it detects <em>change<\/em>, so an object that stops moving disappears. The production upgrade is <code>cv2.createBackgroundSubtractorMOG2()<\/code>, which learns the background over time and tolerates gradual lighting change. Practical trap: <code>VideoWriter<\/code> silently produces an empty file if the frame size doesn't match — always pass the real width/height.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>\n\n<span class=\"tok-keyword\">def<\/span> detect_motion(source, out=<span class=\"tok-string\">\"p14_out.mp4\"<\/span>, min_area=<span class=\"tok-number\">800<\/span>):\n    cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(source)\n    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> cap.isOpened():\n        <span class=\"tok-keyword\">raise<\/span> RuntimeError(<span class=\"tok-string\">f\"cannot open {source}\"<\/span>)\n    fps = cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FPS) <span class=\"tok-keyword\">or<\/span> <span class=\"tok-number\">25<\/span>            <span class=\"tok-comment\"># some sources report 0<\/span>\n    width = <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_WIDTH))\n    height = <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_HEIGHT))\n    fourcc = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter_fourcc(*<span class=\"tok-string\">\"mp4v\"<\/span>)         <span class=\"tok-comment\"># codec for .mp4<\/span>\n    writer = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter(out, fourcc, fps, (width, height))\n    prev_gray = <span class=\"tok-keyword\">None<\/span>                                 <span class=\"tok-comment\"># nothing to diff on frame 1<\/span>\n    <span class=\"tok-keyword\">try<\/span>:\n        <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n            ok, frame = cap.read()\n            <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:\n                <span class=\"tok-keyword\">break<\/span>\n            gray = <span class=\"tok-builtin\">cv2<\/span>.GaussianBlur(<span class=\"tok-builtin\">cv2<\/span>.cvtColor(frame, <span class=\"tok-builtin\">cv2<\/span>.COLOR_BGR2GRAY),\n                                    (<span class=\"tok-number\">21<\/span>, <span class=\"tok-number\">21<\/span>), <span class=\"tok-number\">0<\/span>)\n            <span class=\"tok-keyword\">if<\/span> prev_gray <span class=\"tok-keyword\">is<\/span> <span class=\"tok-keyword\">not<\/span> <span class=\"tok-keyword\">None<\/span>:\n                frame_diff = <span class=\"tok-builtin\">cv2<\/span>.absdiff(prev_gray, gray)   <span class=\"tok-comment\"># |previous - current|<\/span>\n                motion_mask = <span class=\"tok-builtin\">cv2<\/span>.threshold(frame_diff, <span class=\"tok-number\">25<\/span>, <span class=\"tok-number\">255<\/span>,\n                                            <span class=\"tok-builtin\">cv2<\/span>.THRESH_BINARY)[<span class=\"tok-number\">1<\/span>]  <span class=\"tok-comment\"># keep big changes<\/span>\n                motion_mask = <span class=\"tok-builtin\">cv2<\/span>.dilate(motion_mask, <span class=\"tok-keyword\">None<\/span>, iterations=<span class=\"tok-number\">2<\/span>)  <span class=\"tok-comment\"># merge blobs<\/span>\n                contours, _ = <span class=\"tok-builtin\">cv2<\/span>.findContours(motion_mask, <span class=\"tok-builtin\">cv2<\/span>.RETR_EXTERNAL,\n                                               <span class=\"tok-builtin\">cv2<\/span>.CHAIN_APPROX_SIMPLE)\n                <span class=\"tok-keyword\">for<\/span> contour <span class=\"tok-keyword\">in<\/span> contours:\n                    <span class=\"tok-keyword\">if<\/span> <span class=\"tok-builtin\">cv2<\/span>.contourArea(contour) &lt; min_area:  <span class=\"tok-comment\"># ignore tiny flicker<\/span>\n                        <span class=\"tok-keyword\">continue<\/span>\n                    x, y, box_w, box_h = <span class=\"tok-builtin\">cv2<\/span>.boundingRect(contour)\n                    <span class=\"tok-builtin\">cv2<\/span>.rectangle(frame, (x, y), (x + box_w, y + box_h),\n                                  (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">0<\/span>), <span class=\"tok-number\">2<\/span>)\n            writer.write(frame)\n            prev_gray = gray                 <span class=\"tok-comment\"># current frame becomes the baseline<\/span>\n    <span class=\"tok-keyword\">finally<\/span>:\n        cap.release(); writer.release()      <span class=\"tok-comment\"># ALWAYS release both (no leaks)<\/span>\n    <span class=\"tok-keyword\">return<\/span> out<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>VideoWriter<\/code> size must match the frames you write, or you get an empty file. Blur before diff to kill sensor noise. <code>fourcc<\/code> \"mp4v\" for <code>.mp4<\/code>.<\/p>\n<hr>\n<h2 id=\"problem-15-overlay-fps-text-and-count-frames\">Problem 15 — Overlay FPS / text and count frames<\/h2>\n<p><strong>Tests:<\/strong> drawing text, reading video properties, simple per-frame overlay.<\/p>\n<p><strong>The problem:<\/strong> overlay live diagnostics (frame number, throughput) on each frame — the \"prove your pipeline keeps up\" task.<\/p>\n<p><strong>The plan:<\/strong><\/p>\n<pre><code class=\"language-text\"> read frame -&gt; putText(\"frame N   X fps\") -&gt; writer.write(frame)\n\n measured fps = frames processed / wall-clock time\n (NOT the file's metadata fps - that's just its playback rate)<\/code><\/pre>\n<p><strong>Why this way:<\/strong> measured fps is the number that answers \"is my processing real-time?\" — comparing it against the source fps tells you if you're falling behind. The drawing gotchas to memorize: <code>putText<\/code> coordinates are the <strong>bottom-left<\/strong> of the text (not top-left), coordinates are (x, y), and colors are BGR — yellow is <code>(0, 255, 255)<\/code>.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">import<\/span> <span class=\"tok-builtin\">cv2<\/span>, time\n\n<span class=\"tok-keyword\">def<\/span> annotate(source, out=<span class=\"tok-string\">\"p15_out.mp4\"<\/span>):\n    cap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(source)\n    fps = cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FPS) <span class=\"tok-keyword\">or<\/span> <span class=\"tok-number\">25<\/span>\n    width, height = (<span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_WIDTH)),\n                     <span class=\"tok-builtin\">int<\/span>(cap.get(<span class=\"tok-builtin\">cv2<\/span>.CAP_PROP_FRAME_HEIGHT)))\n    writer = <span class=\"tok-builtin\">cv2<\/span>.VideoWriter(out, <span class=\"tok-builtin\">cv2<\/span>.VideoWriter_fourcc(*<span class=\"tok-string\">\"mp4v\"<\/span>), fps,\n                             (width, height))\n    frame_count, start_time = <span class=\"tok-number\">0<\/span>, time.time()\n    <span class=\"tok-keyword\">while<\/span> <span class=\"tok-keyword\">True<\/span>:\n        ok, frame = cap.read()\n        <span class=\"tok-keyword\">if<\/span> <span class=\"tok-keyword\">not<\/span> ok:\n            <span class=\"tok-keyword\">break<\/span>\n        frame_count += <span class=\"tok-number\">1<\/span>\n        measured_fps = frame_count / (time.time() - start_time + 1e-<span class=\"tok-number\">9<\/span>)  <span class=\"tok-comment\"># avoid /0<\/span>\n        <span class=\"tok-builtin\">cv2<\/span>.putText(frame, <span class=\"tok-string\">f\"frame {frame_count}  {measured_fps:4.1f} fps\"<\/span>,\n                    (<span class=\"tok-number\">10<\/span>, <span class=\"tok-number\">30<\/span>),                        <span class=\"tok-comment\"># (x, y) of text bottom-left<\/span>\n                    <span class=\"tok-builtin\">cv2<\/span>.FONT_HERSHEY_SIMPLEX, <span class=\"tok-number\">0.8<\/span>, (<span class=\"tok-number\">0<\/span>, <span class=\"tok-number\">255<\/span>, <span class=\"tok-number\">255<\/span>), <span class=\"tok-number\">2<\/span>)  <span class=\"tok-comment\"># BGR yellow<\/span>\n        writer.write(frame)\n    cap.release(); writer.release()\n    <span class=\"tok-keyword\">return<\/span> frame_count<\/code><\/pre>\n<p><strong>Watch out:<\/strong> <code>putText<\/code> origin is the <strong>bottom-left<\/strong> of the text and coords are (x, y). Colors are <strong>BGR<\/strong>.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"python-and-numpy.md\" href=\"#\">python-and-numpy.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"problem-13-robust-capture-read-sample-every-nth-frame-save","text":"Problem 13 — Robust capture: read, sample every Nth frame, save"},{"level":2,"id":"problem-14-motion-detection-via-frame-differencing-write-annotated-video","text":"Problem 14 — Motion detection via frame differencing, write annotated video"},{"level":2,"id":"problem-15-overlay-fps-text-and-count-frames","text":"Problem 15 — Overlay FPS / text and count frames"}],"text":"video & streaming 💡 tl;dr expect \"process this video\": open it, read frames in a loop with a guard for failed reads , do something per frame (motion, sample, annotate), and write an output video or frames . the robust cv2.videocapture loop is the one to have in muscle memory — it doubles as your fault-tolerance answer. problem 13 — robust capture: read, sample every nth frame, save tests: the capture loop, failure handling, frame sampling, releasing resources. the problem: open a video (file or rtsp stream), keep every nth frame as an image, and don't crash or leak when the source misbehaves. the plan: frames: 0 1 ... 14 [15] 16 ... 29 [30] every=15 save save save the loop that matters: while true: ok, frame = cap.read() if not ok: break <- eof *or* dropped stream finally: cap.release() <- runs no matter what why this way: count-and-modulo beats seeking — jumping around with cap_prop_pos_frames is unreliable on many codecs (seeks snap to keyframes), while sequential reading is always exact. the ok guard and finally: release are the fault-tolerance answer: streams end without warning, and leaked capture handles are how long-running services die slowly. for live rtsp, wrap the whole thing in reconnect-with-backoff. import cv2 import os def sample_frames(source, out_dir= \"frames\" , every= 15 ): \"\"\"source: a video path or rtsp url. saves every nth frame as an image.\"\"\" os.makedirs(out_dir, exist_ok= true ) cap = cv2 .videocapture(source) if not cap.isopened(): raise runtimeerror( f\"cannot open {source}\" ) frame_index = saved_count = 0 try : while true : ok, frame = cap.read() if not ok: # end of file or dropped stream break if frame_index % every == 0 : filename = os.path.join(out_dir, f\"frame_{frame_index:05d}.jpg\" ) cv2 .imwrite(filename, frame) saved_count += 1 frame_index += 1 finally : cap.release() # always release (no leaks) print ( f\"read {frame_index} frames, saved {saved_count}\" ) return saved_count watch out: check isopened() , handle ok == false (don't assume frames keep coming), and release() in a finally . for live rtsp you'd wrap this in a reconnect-with-backoff loop (see the fault-tolerance chapter). problem 14 — motion detection via frame differencing, write annotated video tests: per-frame processing, background diff, contours on a mask, videowriter . the problem: find and box the moving things in a video, writing an annotated copy. the plan: prev frame cur frame absdiff threshold dilate+contours [.......] vs [...o...] ==> [...#...] ==> [...#...] ==> [..[box]..] (blur both first - otherwise sensor noise \"moves\" in every pixel) why this way: frame differencing needs zero training and one frame of state — the right first answer. know its weakness out loud: it detects change , so an object that stops moving disappears. the production upgrade is cv2.createbackgroundsubtractormog2() , which learns the background over time and tolerates gradual lighting change. practical trap: videowriter silently produces an empty file if the frame size doesn't match — always pass the real width/height. import cv2 def detect_motion(source, out= \"p14_out.mp4\" , min_area= 800 ): cap = cv2 .videocapture(source) if not cap.isopened(): raise runtimeerror( f\"cannot open {source}\" ) fps = cap.get( cv2 .cap_prop_fps) or 25 # some sources report 0 width = int (cap.get( cv2 .cap_prop_frame_width)) height = int (cap.get( cv2 .cap_prop_frame_height)) fourcc = cv2 .videowriter_fourcc(* \"mp4v\" ) # codec for .mp4 writer = cv2 .videowriter(out, fourcc, fps, (width, height)) prev_gray = none # nothing to dif

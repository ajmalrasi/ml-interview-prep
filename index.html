/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"onprem-architecture.md\" href=\"#\">onprem-architecture.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-mental-model","text":"The mental model"},{"level":2,"id":"the-framing-line-memorize","text":"The framing line (memorize)"}],"text":"13 — secure on-prem deployment & monitoring 💡 tl;dr the jd says \"deployment in secure on-prem environments\" and \"model optimization and performance monitoring.\" for an abu dhabi government/enterprise cctv system this is not a footnote — it's often the deciding constraint. no cloud. data never leaves the premises. everything auditable. this section covers the air-gapped architecture, the security/pii hardening, and the monitoring that keeps a fleet of models healthy without a phone-home. files: onprem-architecture.md — air-gapped topology, data residency, offline model updates security-and-privacy.md — encryption, access control, pii/face privacy, audit performance-monitoring.md — model drift, per-camera health, gpu/latency dashboards the mental model ┌─────────────── on-prem / air-gapped ───────────────┐ cameras│ edge boxes (jetson) on-prem gpu server(s) │ operators ────►│ decode + detect + track ─► analytics + events ─► db │─► local dashboard │ (private vlan, no wan) (no internet egress) │ └──────────────────────────────────────────────────────┘ model updates arrive by a *controlled offline channel*, not a cloud pull contrast with your resume's cloud work (gke, azure devops, gcp): same skills, inverted constraint. in the interview, explicitly bridge it: \"i've shipped dockerized inference on gke; on-prem it's the same containers and the same tensorrt engines, but the registry, model updates, and monitoring all live inside the perimeter with no internet egress.\" the framing line (memorize) \"secure on-prem means the data plane never leaves the site: no cloud inference, no telemetry egress, encryption at rest and in transit, least-privilege access, and an audit trail. models are optimized to run on the edge/on-prem gpus we actually have, and monitored locally for drift and health because i can't watch them from a cloud dashboard.\" → start: onprem-architecture.md","words":267},{"path":"13-secure-onprem-monitoring/onprem-architecture.md","title":"On-Prem / Air-Gapped Architecture","section":"13 · Secure On-Prem & Monitoring","quiz":false,"accent":"#5b6ee1","html":"<h1 id=\"on-prem-air-gapped-architecture\">On-Prem / Air-Gapped Architecture<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> On-prem means you own every box and the data never touches the internet. That changes deployment in concrete ways: an internal container registry, offline model delivery, local storage with retention limits, and hardware you size up-front because you can't autoscale in someone's cloud. Know the topology and the trade-offs.<\/div><\/div>\n<h2 id=\"why-on-prem-for-cctv-here\">Why on-prem for CCTV here<\/h2>\n<ul><li><strong>Data residency / sovereignty<\/strong> — UAE and government rules often require footage<\/li><\/ul>\n<p>(and any biometric data) to stay in-country and on-site. Cloud egress may be   legally off the table.<\/p>\n<ul><li><strong>Latency &amp; reliability<\/strong> — events must fire even if the internet is down; the<\/li><\/ul>\n<p>system can't depend on a WAN link.<\/p>\n<ul><li><strong>Attack surface<\/strong> — no inbound cloud endpoint to compromise; the whole data<\/li><\/ul>\n<p>plane sits behind the perimeter.<\/p>\n<ul><li><strong>Bandwidth<\/strong> — streaming dozens of HD cameras to a cloud is expensive and<\/li><\/ul>\n<p>fragile; process at the edge, ship only small events/metadata.<\/p>\n<h2 id=\"reference-topology\">Reference topology<\/h2>\n<pre><code>Cameras ──(private VLAN, RTSP)──► Edge inference (Jetson Orin/NX)\n                                     │  decode(NVDEC)+detect+track+events\n                                     ▼\n                            On-prem GPU server(s)   ← heavier models / aggregation\n                                     │\n                       ┌─────────────┼─────────────┐\n                       ▼             ▼             ▼\n                   local DB    object store     dashboard\n                 (events/meta) (clips, retention) (operators, LAN only)\n        NO outbound internet.  Updates in via a controlled channel.<\/code><\/pre>\n<ul><li><strong>Edge-first:<\/strong> do decode + detection + tracking + event logic on the Jetson so<\/li><\/ul>\n<p>raw video stays local and you ship only metadata/events upstream (privacy +   bandwidth win). Ties to sections 02/03.<\/p>\n<ul><li><strong>Central server:<\/strong> aggregation, cross-camera fusion, heavier/second-stage models,<\/li><\/ul>\n<p>storage, dashboards.<\/p>\n<h2 id=\"deploying-without-a-cloud\">Deploying without a cloud<\/h2>\n<ul><li><strong>Internal container registry<\/strong> — mirror images into an on-site registry (Harbor<\/li><\/ul>\n<p>or a private Docker registry); nodes pull from inside the perimeter. Same Docker   images as your cloud work — different registry.<\/p>\n<ul><li><strong>Offline model delivery<\/strong> — models arrive as signed artifacts on approved media<\/li><\/ul>\n<p>or via a one-way/controlled transfer, imported into an on-prem <strong>model registry<\/strong>   (even a versioned directory + manifest). No <code>pip install<\/code> from PyPI at runtime;   vendor wheels/base images in advance.<\/p>\n<ul><li><strong>Orchestration<\/strong> — could be plain <code>docker compose<\/code> per node, or on-prem<\/li><\/ul>\n<p>Kubernetes (k3s/RKE) for a larger fleet. You already know GKE — call out that the   manifests transfer; only the control plane is local.<\/p>\n<ul><li><strong>Config &amp; secrets<\/strong> — a local secrets store (Vault) or sealed secrets; never bake<\/li><\/ul>\n<p>camera credentials into images.<\/p>\n<h2 id=\"hardware-sizing-you-cant-autoscale\">Hardware sizing (you can't autoscale)<\/h2>\n<ul><li><strong>Capacity is fixed<\/strong> — you must size GPUs for <strong>peak<\/strong> camera count × model cost<\/li><\/ul>\n<p>up front. Plan streams-per-Jetson from your latency budget (§03): frames/s ×   models × resolution → GPU headroom.<\/p>\n<ul><li><strong>Redundancy<\/strong> — N+1 edge nodes, failover for the central server; a camera's<\/li><\/ul>\n<p>streams should re-home if its edge box dies (§04 fault tolerance).<\/p>\n<ul><li><strong>Storage &amp; retention<\/strong> — footage/clips have a retention policy (e.g. 30/90 days)<\/li><\/ul>\n<p>and legal caps; size disks for it and auto-expire. Retention is also a privacy   control (next page).<\/p>\n<ul><li><strong>Thermal/power<\/strong> — Jetson power modes (10W/15W/MAXN) trade throughput vs heat;<\/li><\/ul>\n<p>in a hot climate / enclosed cabinet this is real, not academic (§03, tegrastats).<\/p>\n<h2 id=\"updating-models-safely-in-a-locked-down-site\">Updating models safely in a locked-down site<\/h2>\n<ol><li>Validate the new engine <strong>offline<\/strong> on a held-out clip set from the actual site.<\/li><li>Import the signed artifact to the on-prem registry (version + checksum).<\/li><li><strong>Canary<\/strong> on a subset of cameras; compare metrics to the incumbent (next page).<\/li><li>Roll forward or <strong>roll back<\/strong> to the pinned previous version. Keep both; never<\/li><\/ol>\n<p>overwrite in place.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Why do detection + tracking on the edge instead of shipping video to a server?<\/li><\/ul>\n<p><em>(keep raw video local for privacy + save bandwidth; only metadata leaves)<\/em><\/p>\n<ul><li>You can't <code>docker pull<\/code> from Docker Hub on-site. How do images/models get there?<\/li><\/ul>\n<p><em>(internal registry + controlled offline import of signed artifacts)<\/em><\/p>\n<ul><li>Why is capacity planning harder on-prem than on GKE? *(no autoscale — size GPUs<\/li><\/ul>\n<p>for peak up front, plus N+1 redundancy)*<\/p>","toc":[{"level":2,"id":"why-on-prem-for-cctv-here","text":"Why on-prem for CCTV here"},{"level":2,"id":"reference-topology","text":"Reference topology"},{"level":2,"id":"deploying-without-a-cloud","text":"Deploying without a cloud"},{"level":2,"id":"hardware-sizing-you-cant-autoscale","text":"Hardware sizing (you can't autoscale)"},{"level":2,"id":"updating-models-safely-in-a-locked-down-site","text":"Updating models safely in a locked-down site"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"on-prem / air-gapped architecture 💡 tl;dr on-prem means you own every box and the data never touches the internet. that changes deployment in concrete ways: an internal container registry, offline model delivery, local storage with retention limits, and hardware you size up-front because you can't autoscale in someone's cloud. know the topology and the trade-offs. why on-prem for cctv here data residency / sovereignty — uae and government rules often require footage (and any biometric data) to stay in-country and on-site. cloud egress may be legally off the table. latency & reliability — events must fire even if the internet is down; the system can't depend on a wan link. attack surface — no inbound cloud endpoint to compromise; the whole data plane sits behind the perimeter. bandwidth — streaming dozens of hd cameras to a cloud is expensive and fragile; process at the edge, ship only small events/metadata. reference topology cameras ──(private vlan, rtsp)──► edge inference (jetson orin/nx) │ decode(nvdec)+detect+track+events ▼ on-prem gpu server(s) ← heavier models / aggregation │ ┌─────────────┼─────────────┐ ▼ ▼ ▼ local db object store dashboard (events/meta) (clips, retention) (operators, lan only) no outbound internet. updates in via a controlled channel. edge-first: do decode + detection + tracking + event logic on the jetson so raw video stays local and you ship only metadata/events upstream (privacy + bandwidth win). ties to sections 02/03. central server: aggregation, cross-camera fusion, heavier/second-stage models, storage, dashboards. deploying without a cloud internal container registry — mirror images into an on-site registry (harbor or a private docker registry); nodes pull from inside the perimeter. same docker images as your cloud work — different registry. offline model delivery — models arrive as signed artifacts on approved media or via a one-way/controlled transfer, imported into an on-prem model registry (even a versioned directory + manifest). no pip install from pypi at runtime; vendor wheels/base images in advance. orchestration — could be plain docker compose per node, or on-prem kubernetes (k3s/rke) for a larger fleet. you already know gke — call out that the manifests transfer; only the control plane is local. config & secrets — a local secrets store (vault) or sealed secrets; never bake camera credentials into images. hardware sizing (you can't autoscale) capacity is fixed — you must size gpus for peak camera count × model cost up front. plan streams-per-jetson from your latency budget (§03): frames/s × models × resolution → gpu headroom. redundancy — n+1 edge nodes, failover for the central server; a camera's streams should re-home if its edge box dies (§04 fault tolerance). storage & retention — footage/clips have a retention policy (e.g. 30/90 days) and legal caps; size disks for it and auto-expire. retention is also a privacy control (next page). thermal/power — jetson power modes (10w/15w/maxn) trade throughput vs heat; in a hot climate / enclosed cabinet this is real, not academic (§03, tegrastats). updating models safely in a locked-down site validate the new engine offline on a held-out clip set from the actual site. import the signed artifact to the on-prem registry (version + checksum). canary on a subset of cameras; compare metrics to the incumbent (next page). roll forward or roll back to the pinned previous version. keep both; never overwrite in place. quick self-check why do detection + tracking on the edge instead of shipping video to a server? (keep raw video local for privacy + save bandwidth; only metadata leaves) you can't docker pull from docker hub on-site. how do images/models get there? (internal registry + controlled offline import of signed artifacts) why is capacity planning harder on-prem than on gke? *(no autoscale — size gpus for peak up front, plus n+1 redundancy)*","words":611},{"path":"13-secure-onprem-monitoring/security-and-privacy.md","title":"Security, Access & PII/Privacy","section":"13 · Secure On-Prem & Monitoring","quiz":false,"accent":"#5b6ee1","html":"<h1 id=\"security-access-control-piiface-privacy\">Security, Access Control &amp; PII/Face Privacy<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A CCTV system processes some of the most sensitive data there is — people's faces and movements. In a secure government deployment you must be able to say, concretely: it's <strong>encrypted<\/strong> (rest + transit), <strong>least-privilege<\/strong> (who can see what), <strong>auditable<\/strong> (who did what), and <strong>privacy-preserving<\/strong> (PII minimized, faces protected). These are checklist items an interviewer can probe.<\/div><\/div>\n<h2 id=\"encryption\">Encryption<\/h2>\n<ul><li><strong>In transit<\/strong> — camera→edge RTSP over TLS (or an isolated VLAN if the cameras<\/li><\/ul>\n<p>can't do TLS), and all internal service traffic over mTLS. No plaintext streams   on a shared network.<\/p>\n<ul><li><strong>At rest<\/strong> — full-disk encryption (LUKS) on edge and server; encrypt the clip<\/li><\/ul>\n<p>store and the events DB. Keys in a local KMS/Vault or TPM, not on the disk they   protect.<\/p>\n<ul><li><strong>Credentials<\/strong> — camera and DB creds in a secrets store, rotated; never in<\/li><\/ul>\n<p>images, code, or config committed anywhere.<\/p>\n<h2 id=\"access-control-audit\">Access control &amp; audit<\/h2>\n<ul><li><strong>RBAC / least privilege<\/strong> — operators see live + alerts; supervisors can export;<\/li><\/ul>\n<p>admins configure. Nobody gets blanket access to all raw footage by default.<\/p>\n<ul><li><strong>Authentication<\/strong> — SSO/LDAP against the org directory, MFA for admin.<\/li><li><strong>Audit log<\/strong> — every footage view, export, config change, and model update is<\/li><\/ul>\n<p>logged with user + timestamp, tamper-evident (append-only / hash-chained). In a   government context this audit trail is often a hard requirement.<\/p>\n<ul><li><strong>Segmentation<\/strong> — the camera VLAN, the inference tier, and the operator UI are<\/li><\/ul>\n<p>separate network segments; no lateral path from a compromised camera to the DB.<\/p>\n<h2 id=\"pii-face-privacy-the-cv-specific-part\">PII &amp; face privacy (the CV-specific part)<\/h2>\n<p>You rarely <em>need<\/em> to store identities to deliver crowd/queue analytics — so don't.<\/p>\n<ul><li><strong>Data minimization<\/strong> — for counting/queue/flow you need **counts, tracks,<\/li><\/ul>\n<p>timestamps**, not faces or identities. Store metadata, not raw crops, wherever   the use-case allows. This is the single biggest privacy lever.<\/p>\n<ul><li><strong>Anonymization / redaction<\/strong> — blur or pixelate faces (and license plates) in<\/li><\/ul>\n<p>any stored or displayed footage unless there's an explicit, authorized need.   Detect → blur before write. Some deployments blur at the edge so an unblurred   frame never persists.<\/p>\n<ul><li><strong>Edge-only raw video<\/strong> — process on the Jetson and never persist raw frames<\/li><\/ul>\n<p>centrally; only events + optional redacted keyframes leave the edge.<\/p>\n<ul><li><strong>Biometrics are special<\/strong> — face <strong>recognition<\/strong> (identifying <em>who<\/em>) is legally<\/li><\/ul>\n<p>and ethically far heavier than face <strong>detection<\/strong> (there's <em>a<\/em> face) or person   detection (there's <em>a<\/em> person). Most crowd analytics needs only the latter two.   If recognition isn't in scope, say clearly you wouldn't collect biometric   templates — a mature, responsible answer.<\/p>\n<ul><li><strong>ReID ≠ identity<\/strong> — tracking/ReID embeddings re-associate the *same unnamed<\/li><\/ul>\n<p>person* across frames/cameras for counting; they aren't a name. Still treat the   embeddings as sensitive (they're derived from a person) and scope their retention.<\/p>\n<ul><li><strong>Retention &amp; purpose limitation<\/strong> — footage and any personal data expire on a<\/li><\/ul>\n<p>policy (e.g. 30/90 days) and are used only for the stated purpose. Auto-delete;   don't hoard.<\/p>\n<h2 id=\"model-supply-chain-security\">Model &amp; supply-chain security<\/h2>\n<ul><li><strong>Signed model artifacts<\/strong> — verify checksum/signature before loading (prevents a<\/li><\/ul>\n<p>tampered engine).<\/p>\n<ul><li><strong>Vetted base images<\/strong>, no runtime installs from the public internet, scan images<\/li><\/ul>\n<p>for CVEs before import.<\/p>\n<ul><li><strong>Input validation<\/strong> — a malformed RTSP stream shouldn't crash or exploit the<\/li><\/ul>\n<p>decoder; sandbox/limit the decode path (ties to §04 fault tolerance).<\/p>\n<h2 id=\"how-to-talk-about-it\">How to talk about it<\/h2>\n<p>Frame privacy as <strong>built-in, not bolted-on<\/strong>: \"For crowd and queue analytics I default to storing counts and anonymized tracks, blur faces before anything is written, keep raw video at the edge, and put a retention clock on everything. If face recognition isn't explicitly required and authorized, I don't collect biometric data at all.\" That answer signals senior judgment for a sensitive domain.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>For queue-time analytics, do you need to store faces? *(no — counts, tracks,<\/li><\/ul>\n<p>timestamps; minimize)*<\/p>\n<ul><li>Face detection vs face recognition — why does the distinction matter here?<\/li><\/ul>\n<p><em>(recognition = identifying a person = heavy legal/ethical + biometric data;   detection just localizes)<\/em><\/p>\n<ul><li>Where do you blur faces and why there? *(at the edge, before persistence, so an<\/li><\/ul>\n<p>unredacted frame never hits disk)*<\/p>\n<ul><li>What must the audit log capture in a government deployment? *(every view, export,<\/li><\/ul>\n<p>config + model change, with user/time, tamper-evident)*<\/p>","toc":[{"level":2,"id":"encryption","text":"Encryption"},{"level":2,"id":"access-control-audit","text":"Access control &amp; audit"},{"level":2,"id":"pii-face-privacy-the-cv-specific-part","text":"PII &amp; face privacy (the CV-specific part)"},{"level":2,"id":"model-supply-chain-security","text":"Model &amp; supply-chain security"},{"level":2,"id":"how-to-talk-about-it","text":"How to talk about it"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"security, access control & pii/face privacy 💡 tl;dr a cctv system processes some of the most sensitive data there is — people's faces and movements. in a secure government deployment you must be able to say, concretely: it's encrypted (rest + transit), least-privilege (who can see what), auditable (who did what), and privacy-preserving (pii minimized, faces protected). these are checklist items an interviewer can probe. encryption in transit — camera→edge rtsp over tls (or an isolated vlan if the cameras can't do tls), and all internal service traffic over mtls. no plaintext streams on a shared network. at rest — full-disk encryption (luks) on edge and server; encrypt the clip store and the events db. keys in a local kms/vault or tpm, not on the disk they protect. credentials — camera and db creds in a secrets store, rotated; never in images, code, or config committed anywhere. access control & audit rbac / least privilege — operators see live + alerts; supervisors can export; admins configure. nobody gets blanket access to all raw footage by default. authentication — sso/ldap against the org directory, mfa for admin. audit log — every footage view, export, config change, and model update is logged with user + timestamp, tamper-evident (append-only / hash-chained). in a government context this audit trail is often a hard requirement. segmentation — the camera vlan, the inference tier, and the operator ui are separate network segments; no lateral path from a compromised camera to the db. pii & face privacy (the cv-specific part) you rarely need to store identities to deliver crowd/queue analytics — so don't. data minimization — for counting/queue/flow you need **counts, tracks, timestamps**, not faces or identities. store metadata, not raw crops, wherever the use-case allows. this is the single biggest privacy lever. anonymization / redaction — blur or pixelate faces (and license plates) in any stored or displayed footage unless there's an explicit, authorized need. detect → blur before write. some deployments blur at the edge so an unblurred frame never persists. edge-only raw video — process on the jetson and never persist raw frames centrally; only events + optional redacted keyframes leave the edge. biometrics are special — face recognition (identifying who ) is legally and ethically far heavier than face detection (there's a face) or person detection (there's a person). most crowd analytics needs only the latter two. if recognition isn't in scope, say clearly you wouldn't collect biometric templates — a mature, responsible answer. reid ≠ identity — tracking/reid embeddings re-associate the *same unnamed person* across frames/cameras for counting; they aren't a name. still treat the embeddings as sensitive (they're derived from a person) and scope their retention. retention & purpose limitation — footage and any personal data expire on a policy (e.g. 30/90 days) and are used only for the stated purpose. auto-delete; don't hoard. model & supply-chain security signed model artifacts — verify checksum/signature before loading (prevents a tampered engine). vetted base images , no runtime installs from the public internet, scan images for cves before import. input validation — a malformed rtsp stream shouldn't crash or exploit the decoder; sandbox/limit the decode path (ties to §04 fault tolerance). how to talk about it frame privacy as built-in, not bolted-on : \"for crowd and queue analytics i default to storing counts and anonymized tracks, blur faces before anything is written, keep raw video at the edge, and put a retention clock on everything. if face recognition isn't explicitly required and authorized, i don't collect biometric data at all.\" that answer signals senior judgment for a sensitive domain. quick self-check for queue-time analytics, do you need to store faces? *(no — counts, tracks, timestamps; minimize)* face detection vs face recognition — why does the distinction matter here? (recognition = identifying a person = heavy legal/ethical + biometric data; detection just localizes) where do you blur faces and why there? *(at the edge, before persistence, so an unredacted frame never hits disk)* what must the audit log capture in a government deployment? *(every view, export, config + model change, with user/time, tamper-evident)*","words":679},{"path":"13-secure-onprem-monitoring/performance-monitoring.md","title":"Performance Monitoring & Drift","section":"13 · Secure On-Prem & Monitoring","quiz":false,"accent":"#5b6ee1","html":"<h1 id=\"performance-monitoring-model-drift\">Performance Monitoring &amp; Model Drift<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD pairs <em>model optimization<\/em> with <em>performance monitoring<\/em> for a reason: on-prem, no one is watching your models from a cloud dashboard, so you must build the observability in. Monitor <strong>two layers<\/strong>: system health (is the pipeline up and fast?) and model health (is it still <em>accurate<\/em>?). The hard one — because you have no live labels — is detecting <strong>drift<\/strong>.<\/div><\/div>\n<h2 id=\"two-layers-of-monitoring\">Two layers of monitoring<\/h2>\n<pre><code>SYSTEM HEALTH (easy — you have the numbers)      MODEL HEALTH (hard — no live labels)\n FPS / latency per camera                         detection confidence distribution\n GPU util / mem / temp (tegrastats, DCGM)         object count / class-mix over time\n dropped frames, queue depth, reconnects          event / false-alarm rate trend\n disk, retention headroom, service uptime         accuracy vs periodic audits<\/code><\/pre>\n<h2 id=\"system-health-instrument-everything\">System health (instrument everything)<\/h2>\n<ul><li><strong>Per-camera:<\/strong> effective FPS, end-to-end latency, decode errors, RTSP reconnects,<\/li><\/ul>\n<p>frames dropped (backpressure — §04). A camera silently dropping to 2 FPS is a   common, invisible-without-monitoring failure.<\/p>\n<ul><li><strong>Per-GPU/box:<\/strong> utilization, memory, <strong>temperature/throttling<\/strong> (critical in a<\/li><\/ul>\n<p>hot climate), power mode. On Jetson: <code>tegrastats<\/code>; on servers: NVIDIA <strong>DCGM<\/strong>.<\/p>\n<ul><li><strong>Pipeline:<\/strong> queue depths, inference throughput vs the §03 latency budget,<\/li><\/ul>\n<p>service uptime, restart counts.<\/p>\n<ul><li><strong>Stack, on-prem:<\/strong> <strong>Prometheus + Grafana<\/strong> running <em>inside the perimeter<\/em> (no<\/li><\/ul>\n<p>cloud APM). Alertmanager for local paging. This is the standard air-gapped combo.<\/p>\n<h2 id=\"model-health-drift-the-interview-differentiator\">Model health &amp; drift (the interview differentiator)<\/h2>\n<p>You usually have <strong>no ground-truth labels at run time<\/strong>, so you monitor <em>proxies<\/em> for accuracy and watch them move:<\/p>\n<ul><li><strong>Confidence distribution<\/strong> — the histogram of detection scores. A drifting scene<\/li><\/ul>\n<p>(new lighting, fog, a dirty lens, a bumped camera) shifts it; a sudden collapse in   mean confidence is an alarm.<\/p>\n<ul><li><strong>Output statistics<\/strong> — average object count, class mix, track lengths, ID-switch<\/li><\/ul>\n<p>rate, dwell distributions. If \"people per frame\" or false-alarm rate trends away   from the established baseline, something changed.<\/p>\n<ul><li><strong>Data/domain drift<\/strong> — compare current input feature stats to the training/<\/li><\/ul>\n<p>reference distribution (brightness, occupancy, scene stats; PSI / KL divergence).   Covariate shift is the usual on-prem culprit: the <em>world<\/em> changed, not the model.<\/p>\n<ul><li><strong>Periodic ground-truth audits<\/strong> — the only way to measure real accuracy: sample<\/li><\/ul>\n<p>frames/events periodically, have a human label them, compute precision/recall and   count MAE, and trend it. Feeds §11's validation and §12's false-alarm control.<\/p>\n<ul><li><strong>Concept vs covariate drift<\/strong> — covariate: inputs shift (lighting/season, fix by<\/li><\/ul>\n<p>recalibrate/retrain on new data). Concept: the <em>meaning<\/em> shifts (a zone is   repurposed) — needs relabeling/redefinition. Name both.<\/p>\n<h2 id=\"closing-the-loop-retraining-rollout\">Closing the loop: retraining &amp; rollout<\/h2>\n<pre><code>monitor → detect drift/regression → collect + label hard cases (active learning, §14)\n        → retrain / recalibrate → validate offline on site clips\n        → CANARY on a few cameras → compare to incumbent → roll forward or ROLL BACK<\/code><\/pre>\n<ul><li><strong>Canary + rollback<\/strong> — never hot-swap a model fleet-wide blind; run new vs old on<\/li><\/ul>\n<p>a subset, compare the proxy metrics + an audit, keep the old engine pinned to roll   back to (§13 architecture).<\/p>\n<ul><li><strong>Shadow mode<\/strong> — run the candidate alongside production without acting on its<\/li><\/ul>\n<p>output, log the diff. Great for validating on-prem where you can't A/B in a cloud.<\/p>\n<ul><li><strong>Active learning<\/strong> — mine low-confidence and operator-flagged false alarms into<\/li><\/ul>\n<p>the next training set; this is how the system <em>improves<\/em> in a closed environment.<\/p>\n<h2 id=\"optimization-monitoring-loop\">Optimization ↔ monitoring loop<\/h2>\n<p>Optimization (§03: INT8/FP16, pruning, TensorRT) and monitoring are the same loop: you optimize to hit the latency/throughput budget on the hardware you have, then <strong>monitor that the optimization didn't cost accuracy<\/strong> (INT8 can drop mAP — watch the audit metric) and that you're still inside budget as camera count grows.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>You have no labels in production. How do you tell a model is degrading? *(proxy<\/li><\/ul>\n<p>signals — confidence distribution, output stats, false-alarm trend — plus periodic   human-labeled audits)*<\/p>\n<ul><li>Covariate vs concept drift, with a CCTV example of each? *(lighting/season shift<\/li><\/ul>\n<p>vs a zone being repurposed)*<\/p>\n<ul><li>How do you roll out a retrained model on a locked-down 200-camera site safely?<\/li><\/ul>\n<p><em>(offline validation → canary/shadow on a few cameras → compare → roll forward or   roll back to the pinned engine)<\/em><\/p>\n<ul><li>What on-prem stack gives you dashboards with no cloud? *(Prometheus + Grafana +<\/li><\/ul>\n<p>Alertmanager inside the perimeter; tegrastats/DCGM for GPU)*<\/p>","toc":[{"level":2,"id":"two-layers-of-monitoring","text":"Two layers of monitoring"},{"level":2,"id":"system-health-instrument-everything","text":"System health (instrument everything)"},{"level":2,"id":"model-health-drift-the-interview-differentiator","text":"Model health &amp; drift (the interview differentiator)"},{"level":2,"id":"closing-the-loop-retraining-rollout","text":"Closing the loop: retraining &amp; rollout"},{"level":2,"id":"optimization-monitoring-loop","text":"Optimization ↔ monitoring loop"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"performance monitoring & model drift 💡 tl;dr the jd pairs model optimization with performance monitoring for a reason: on-prem, no one is watching your models from a cloud dashboard, so you must build the observability in. monitor two layers : system health (is the pipeline up and fast?) and model health (is it still accurate ?). the hard one — because you have no live labels — is detecting drift . two layers of monitoring system health (easy — you have the numbers) model health (hard — no live labels) fps / latency per camera detection confidence distribution gpu util / mem / temp (tegrastats, dcgm) object count / class-mix over time dropped frames, queue depth, reconnects event / false-alarm rate trend disk, retention headroom, service uptime accuracy vs periodic audits system health (instrument everything) per-camera: effective fps, end-to-end latency, decode errors, rtsp reconnects, frames dropped (backpressure — §04). a camera silently dropping to 2 fps is a common, invisible-without-monitoring failure. per-gpu/box: utilization, memory, temperature/throttling (critical in a hot climate), power mode. on jetson: tegrastats ; on servers: nvidia dcgm . pipeline: queue depths, inference throughput vs the §03 latency budget, service uptime, restart counts. stack, on-prem: prometheus + grafana running inside the perimeter (no cloud apm). alertmanager for local paging. this is the standard air-gapped combo. model health & drift (the interview differentiator) you usually have no ground-truth labels at run time , so you monitor proxies for accuracy and watch them move: confidence distribution — the histogram of detection scores. a drifting scene (new lighting, fog, a dirty lens, a bumped camera) shifts it; a sudden collapse in mean confidence is an alarm. output statistics — average object count, class mix, track lengths, id-switch rate, dwell distributions. if \"people per frame\" or false-alarm rate trends away from the established baseline, something changed. data/domain drift — compare current input feature stats to the training/ reference distribution (brightness, occupancy, scene stats; psi / kl divergence). covariate shift is the usual on-prem culprit: the world changed, not the model. periodic ground-truth audits — the only way to measure real accuracy: sample frames/events periodically, have a human label them, compute precision/recall and count mae, and trend it. feeds §11's validation and §12's false-alarm control. concept vs covariate drift — covariate: inputs shift (lighting/season, fix by recalibrate/retrain on new data). concept: the meaning shifts (a zone is repurposed) — needs relabeling/redefinition. name both. closing the loop: retraining & rollout monitor → detect drift/regression → collect + label hard cases (active learning, §14) → retrain / recalibrate → validate offline on site clips → canary on a few cameras → compare to incumbent → roll forward or roll back canary + rollback — never hot-swap a model fleet-wide blind; run new vs old on a subset, compare the proxy metrics + an audit, keep the old engine pinned to roll back to (§13 architecture). shadow mode — run the candidate alongside production without acting on its output, log the diff. great for validating on-prem where you can't a/b in a cloud. active learning — mine low-confidence and operator-flagged false alarms into the next training set; this is how the system improves in a closed environment. optimization ↔ monitoring loop optimization (§03: int8/fp16, pruning, tensorrt) and monitoring are the same loop: you optimize to hit the latency/throughput budget on the hardware you have, then monitor that the optimization didn't cost accuracy (int8 can drop map — watch the audit metric) and that you're still inside budget as camera count grows. quick self-check you have no labels in production. how do you tell a model is degrading? *(proxy signals — confidence distribution, output stats, false-alarm trend — plus periodic human-labeled audits)* covariate vs concept drift, with a cctv example of each? *(lighting/season shift vs a zone being repurposed)* how do you roll out a retrained model on a locked-down 200-camera site safely? (offline validation → canary/shadow on a few cameras → compare → roll forward or roll back to the pinned engine) what on-prem stack gives you dashboards with no cloud? *(prometheus + grafana + alertmanager inside the perimeter; tegrastats/dcgm for gpu)*","words":686},{"path":"14-deep-learning-for-video/README.md","title":"Overview","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"14-deep-learning-for-video\">14 — Deep Learning for Video<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> \"AI <strong>Data Scientist<\/strong>\" (not just systems engineer) means you must reason about the <em>models<\/em>, not only the pipeline. The JD names them directly: <strong>CNNs, object detection, tracking.<\/strong> This section rebuilds that modeling narrative — backbones, the detection stack (YOLO family, mAP, NMS), the tracking stack (SORT→ByteTrack, ReID), and how you'd actually train and optimize these for the edge. This is the half of your story that reads \"systems\" and needs to read \"modeling\" too.<\/div><\/div>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"cnns-and-backbones.md\" href=\"#\">cnns-and-backbones.md<\/a> — convolutions, receptive field, backbones, FPN<\/li><li><a class=\"mdlink\" data-href=\"object-detection.md\" href=\"#\">object-detection.md<\/a> — anchor vs anchor-free, YOLO, NMS, mAP<\/li><li><a class=\"mdlink\" data-href=\"tracking.md\" href=\"#\">tracking.md<\/a> — SORT, DeepSORT, ByteTrack, Kalman, Hungarian, ReID, MOT metrics<\/li><li><a class=\"mdlink\" data-href=\"training-and-optimization.md\" href=\"#\">training-and-optimization.md<\/a> — data, augmentation, transfer learning, QAT/PTQ, distillation, active learning<\/li><\/ol>\n<h2 id=\"the-pipeline-this-section-is-about\">The pipeline this section is about<\/h2>\n<pre><code>frame ─► [backbone CNN] ─► features ─► [detection head] ─► boxes+classes\n                                                  │\n                                                  ▼\n                                      [tracker] ─► stable track IDs ─► (§11/§12 analytics)<\/code><\/pre>\n<h2 id=\"the-framing-line-memorize\">The framing line (memorize)<\/h2>\n<p><em>\"For live CCTV I run a single-stage detector — a YOLO-family model — on a CNN backbone, because on the edge I need one forward pass per frame at real-time FPS. Detections feed a tracking-by-detection tracker like ByteTrack for stable IDs, with ReID when I need identity across occlusion or cameras. I train with heavy augmentation for the deployment domain and quantize to INT8 with TensorRT, watching that mAP survives.\"<\/em><\/p>\n<p>Everything here connects forward: detections + IDs are exactly the inputs §11 (analytics) and §12 (events) consume, and §03 is how you make it run fast.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"cnns-and-backbones.md\" href=\"#\">cnns-and-backbones.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-pipeline-this-section-is-about","text":"The pipeline this section is about"},{"level":2,"id":"the-framing-line-memorize","text":"The framing line (memorize)"}],"text":"14 — deep learning for video 💡 tl;dr \"ai data scientist \" (not just systems engineer) means you must reason about the models , not only the pipeline. the jd names them directly: cnns, object detection, tracking. this section rebuilds that modeling narrative — backbones, the detection stack (yolo family, map, nms), the tracking stack (sort→bytetrack, reid), and how you'd actually train and optimize these for the edge. this is the half of your story that reads \"systems\" and needs to read \"modeling\" too. files: cnns-and-backbones.md — convolutions, receptive field, backbones, fpn object-detection.md — anchor vs anchor-free, yolo, nms, map tracking.md — sort, deepsort, bytetrack, kalman, hungarian, reid, mot metrics training-and-optimization.md — data, augmentation, transfer learning, qat/ptq, distillation, active learning the pipeline this section is about frame ─► [backbone cnn] ─► features ─► [detection head] ─► boxes+classes │ ▼ [tracker] ─► stable track ids ─► (§11/§12 analytics) the framing line (memorize) \"for live cctv i run a single-stage detector — a yolo-family model — on a cnn backbone, because on the edge i need one forward pass per frame at real-time fps. detections feed a tracking-by-detection tracker like bytetrack for stable ids, with reid when i need identity across occlusion or cameras. i train with heavy augmentation for the deployment domain and quantize to int8 with tensorrt, watching that map survives.\" everything here connects forward: detections + ids are exactly the inputs §11 (analytics) and §12 (events) consume, and §03 is how you make it run fast. → start: cnns-and-backbones.md","words":250},{"path":"14-deep-learning-for-video/cnns-and-backbones.md","title":"CNNs & Backbones","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"cnns-backbones\">CNNs &amp; Backbones<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A CNN turns pixels into a hierarchy of features via convolutions — early layers see edges/textures, deep layers see objects. The <strong>backbone<\/strong> is the feature extractor every detector/tracker sits on. Know convolution mechanics, receptive field, why we downsample, and how a feature pyramid handles the scale problem that dominates crowd/CCTV scenes.<\/div><\/div>\n<h2 id=\"convolution-the-core-operation\">Convolution — the core operation<\/h2>\n<p>A small learnable kernel slides over the image, computing dot products → a feature map. Key properties and why they matter:<\/p>\n<ul><li><strong>Weight sharing<\/strong> — the same kernel everywhere → translation equivariance and far<\/li><\/ul>\n<p>fewer parameters than a dense layer. An edge is an edge wherever it appears.<\/p>\n<ul><li><strong>Locality<\/strong> — each output sees only a local patch (the receptive field), matching<\/li><\/ul>\n<p>image structure.<\/p>\n<ul><li><strong>Stacking grows abstraction<\/strong> — edges → textures → parts → objects as depth<\/li><\/ul>\n<p>increases.<\/p>\n<p>Knobs to know cold:<\/p>\n<ul><li><strong>Stride<\/strong> — step size; stride 2 downsamples (halves spatial size).<\/li><li><strong>Padding<\/strong> — keep spatial size (\"same\") or shrink (\"valid\").<\/li><li><strong>Kernel size<\/strong> — 3×3 is the workhorse; stacking two 3×3 ≈ one 5×5 receptive field<\/li><\/ul>\n<p>with fewer params + more nonlinearity.<\/p>\n<ul><li><strong>Channels<\/strong> — depth of the feature map; more channels = more feature types.<\/li><li><strong>Dilation<\/strong> — spreads the kernel to enlarge receptive field without more params<\/li><\/ul>\n<p>(used in CSRNet, segmentation).<\/p>\n<h2 id=\"receptive-field-a-classic-question\">Receptive field (a classic question)<\/h2>\n<p>The region of input that influences one output activation. It grows with depth, stride, and dilation. <strong>Why it matters:<\/strong> to detect a big object (a person near the camera) an activation must \"see\" enough of it — too small a receptive field and the network can't perceive large objects; too coarse and it misses tiny far ones. This is <em>the<\/em> motivation for multi-scale features.<\/p>\n<h2 id=\"the-building-blocks-of-modern-backbones\">The building blocks of modern backbones<\/h2>\n<ul><li><strong>BatchNorm<\/strong> — normalizes activations per batch → faster, more stable training.<\/li><li><strong>Residual connections (ResNet)<\/strong> — <code>y = F(x) + x<\/code> lets gradients flow through<\/li><\/ul>\n<p>very deep nets (solves vanishing gradients). The idea behind most backbones.<\/p>\n<ul><li><strong>Pooling / strided conv<\/strong> — downsample to build spatial invariance and cut compute.<\/li><li><strong>Depthwise-separable conv (MobileNet)<\/strong> — factorizes conv into per-channel +<\/li><\/ul>\n<p>1×1 → far cheaper. <strong>This is what you run on a Jetson<\/strong> — name it for the edge.<\/p>\n<h2 id=\"backbones-you-should-be-able-to-name\">Backbones you should be able to name<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Backbone<\/th><th>Why you'd pick it<\/th><\/tr><\/thead><tbody><tr><td><strong>ResNet-50<\/strong><\/td><td>strong, standard baseline; good accuracy/complexity balance<\/td><\/tr><tr><td><strong>MobileNetV2/V3, EfficientNet-Lite<\/strong><\/td><td>lightweight, mobile/edge — Jetson-friendly<\/td><\/tr><tr><td><strong>CSPDarknet<\/strong><\/td><td>the YOLO-family backbone; speed-tuned for detection<\/td><\/tr><tr><td><strong>ViT / hybrid<\/strong><\/td><td>transformers; strong but heavier — usually not first choice on edge<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-scale-problem-fpn-crucial-for-cctv\">The scale problem &amp; FPN (crucial for CCTV)<\/h2>\n<p>In a CCTV frame, a person near the camera is huge and one at the back is a few pixels — a <strong>massive scale range in one frame<\/strong>. A single feature map can't handle both. <strong>Feature Pyramid Network (FPN)<\/strong> fuses deep-semantic-low-res features with shallow-high-res features so the detector has strong features at <em>every<\/em> scale. This is why FPN-style necks are standard in detectors and why they matter more here than in a \"one object, centered\" classification task.<\/p>\n<pre><code>deep, semantic, low-res  ─┐ (upsample + add)\n                          ├─► multi-scale feature maps → detect small AND large\nshallow, detailed, hi-res ─┘<\/code><\/pre>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Why stack two 3×3 convs instead of one 5×5? *(same receptive field, fewer params,<\/li><\/ul>\n<p>extra nonlinearity)*<\/p>\n<ul><li>What do residual connections solve? <em>(vanishing gradients → trainable deep nets)<\/em><\/li><li>Why is FPN especially important for CCTV crowd scenes? *(huge per-frame scale<\/li><\/ul>\n<p>range — near vs far people — needs multi-scale features)*<\/p>\n<ul><li>What backbone family runs well on a Jetson and why? *(MobileNet / depthwise-<\/li><\/ul>\n<p>separable convs — cheap FLOPs)*<\/p>","toc":[{"level":2,"id":"convolution-the-core-operation","text":"Convolution — the core operation"},{"level":2,"id":"receptive-field-a-classic-question","text":"Receptive field (a classic question)"},{"level":2,"id":"the-building-blocks-of-modern-backbones","text":"The building blocks of modern backbones"},{"level":2,"id":"backbones-you-should-be-able-to-name","text":"Backbones you should be able to name"},{"level":2,"id":"the-scale-problem-fpn-crucial-for-cctv","text":"The scale problem &amp; FPN (crucial for CCTV)"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"cnns & backbones 💡 tl;dr a cnn turns pixels into a hierarchy of features via convolutions — early layers see edges/textures, deep layers see objects. the backbone is the feature extractor every detector/tracker sits on. know convolution mechanics, receptive field, why we downsample, and how a feature pyramid handles the scale problem that dominates crowd/cctv scenes. convolution — the core operation a small learnable kernel slides over the image, computing dot products → a feature map. key properties and why they matter: weight sharing — the same kernel everywhere → translation equivariance and far fewer parameters than a dense layer. an edge is an edge wherever it appears. locality — each output sees only a local patch (the receptive field), matching image structure. stacking grows abstraction — edges → textures → parts → objects as depth increases. knobs to know cold: stride — step size; stride 2 downsamples (halves spatial size). padding — keep spatial size (\"same\") or shrink (\"valid\"). kernel size — 3×3 is the workhorse; stacking two 3×3 ≈ one 5×5 receptive field with fewer params + more nonlinearity. channels — depth of the feature map; more channels = more feature types. dilation — spreads the kernel to enlarge receptive field without more params (used in csrnet, segmentation). receptive field (a classic question) the region of input that influences one output activation. it grows with depth, stride, and dilation. why it matters: to detect a big object (a person near the camera) an activation must \"see\" enough of it — too small a receptive field and the network can't perceive large objects; too coarse and it misses tiny far ones. this is the motivation for multi-scale features. the building blocks of modern backbones batchnorm — normalizes activations per batch → faster, more stable training. residual connections (resnet) — y = f(x) + x lets gradients flow through very deep nets (solves vanishing gradients). the idea behind most backbones. pooling / strided conv — downsample to build spatial invariance and cut compute. depthwise-separable conv (mobilenet) — factorizes conv into per-channel + 1×1 → far cheaper. this is what you run on a jetson — name it for the edge. backbones you should be able to name backbone why you'd pick it resnet-50 strong, standard baseline; good accuracy/complexity balance mobilenetv2/v3, efficientnet-lite lightweight, mobile/edge — jetson-friendly cspdarknet the yolo-family backbone; speed-tuned for detection vit / hybrid transformers; strong but heavier — usually not first choice on edge the scale problem & fpn (crucial for cctv) in a cctv frame, a person near the camera is huge and one at the back is a few pixels — a massive scale range in one frame . a single feature map can't handle both. feature pyramid network (fpn) fuses deep-semantic-low-res features with shallow-high-res features so the detector has strong features at every scale. this is why fpn-style necks are standard in detectors and why they matter more here than in a \"one object, centered\" classification task. deep, semantic, low-res ─┐ (upsample + add) ├─► multi-scale feature maps → detect small and large shallow, detailed, hi-res ─┘ quick self-check why stack two 3×3 convs instead of one 5×5? *(same receptive field, fewer params, extra nonlinearity)* what do residual connections solve? (vanishing gradients → trainable deep nets) why is fpn especially important for cctv crowd scenes? *(huge per-frame scale range — near vs far people — needs multi-scale features)* what backbone family runs well on a jetson and why? *(mobilenet / depthwise- separable convs — cheap flops)*","words":581},{"path":"14-deep-learning-for-video/object-detection.md","title":"Object Detection","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"object-detection\">Object Detection<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Detection = localize (boxes) + classify, for every object. For live CCTV you want a <strong>single-stage<\/strong> detector (YOLO family) — one forward pass, real-time FPS — over a two-stage detector (Faster R-CNN) that's more accurate but too slow per frame. Know anchor vs anchor-free, NMS, the loss pieces, and <strong>mAP<\/strong> (you <em>will<\/em> be asked what it means).<\/div><\/div>\n<h2 id=\"one-stage-vs-two-stage\">One-stage vs two-stage<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>Two-stage (Faster R-CNN)<\/th><th>One-stage (YOLO, SSD, RetinaNet)<\/th><\/tr><\/thead><tbody><tr><td>How<\/td><td>propose regions → classify each<\/td><td>predict boxes + classes in one pass over a grid<\/td><\/tr><tr><td>Speed<\/td><td>slower<\/td><td><strong>fast — real-time<\/strong>, edge-friendly<\/td><\/tr><tr><td>Accuracy<\/td><td>historically higher, esp. small objects<\/td><td>closed the gap; now competitive<\/td><\/tr><tr><td>CCTV pick<\/td><td>rarely<\/td><td><strong>default<\/strong> — you need FPS per camera<\/td><\/tr><\/tbody><\/table><\/div>\n<p>Say it plainly: <em>\"On the edge with N cameras I need one forward pass at real-time FPS, so I use a YOLO-family single-stage detector.\"<\/em><\/p>\n<h2 id=\"anchors-vs-anchor-free\">Anchors vs anchor-free<\/h2>\n<ul><li><strong>Anchor-based<\/strong> (YOLOv3–v5, SSD, RetinaNet) — predefined box priors of set<\/li><\/ul>\n<p>scales/ratios at each grid location; the net predicts offsets + objectness.   Requires tuning anchor sizes to your object distribution.<\/p>\n<ul><li><strong>Anchor-free<\/strong> (YOLOX, FCOS, CenterNet, YOLOv8) — predict object centers/points<\/li><\/ul>\n<p>and sizes directly; no anchor hyperparameters. Simpler, increasingly standard.<\/p>\n<h2 id=\"the-yolo-idea-be-able-to-sketch-it\">The YOLO idea (be able to sketch it)<\/h2>\n<p>Divide the image into a grid; each cell predicts boxes (x, y, w, h), an <strong>objectness<\/strong> score, and class probabilities — in <strong>one pass<\/strong>. Modern YOLOs add a CSPDarknet backbone, an FPN/PAN neck for multi-scale, and mosaic augmentation. The \"one pass over a grid\" mental model is what interviewers want, not a version-number recital.<\/p>\n<h2 id=\"nms-non-max-suppression-guaranteed-question\">NMS — Non-Max Suppression (guaranteed question)<\/h2>\n<p>Detectors emit many overlapping boxes for one object. NMS keeps the best:<\/p>\n<pre><code>1. sort boxes by score\n2. take the top box, keep it\n3. remove any remaining box with IoU &gt; threshold vs it   (same object)\n4. repeat with the next-highest surviving box<\/code><\/pre>\n<ul><li><strong>IoU<\/strong> = intersection area / union area of two boxes (0..1).<\/li><li><strong>Trap in crowds:<\/strong> a low IoU threshold suppresses <em>real<\/em> nearby people<\/li><\/ul>\n<p>(two heads → one survives → under-count). <strong>Soft-NMS<\/strong> (decay scores instead of   hard-removing) helps in dense scenes — a great crowd-specific answer.<\/p>\n<ul><li>NMS is per-class (usually) and runs post-inference on CPU/GPU.<\/li><\/ul>\n<h2 id=\"loss-the-three-pieces\">Loss (the three pieces)<\/h2>\n<ul><li><strong>Localization<\/strong> — box regression (IoU/GIoU/CIoU or smooth-L1).<\/li><li><strong>Objectness/confidence<\/strong> — is there an object here.<\/li><li><strong>Classification<\/strong> — which class (focal loss in RetinaNet to fight the huge<\/li><\/ul>\n<p>background/foreground imbalance — worth naming).<\/p>\n<h2 id=\"map-the-metric-you-must-explain\">mAP — the metric you must explain<\/h2>\n<pre><code>IoU decides if a prediction is a True Positive (IoU ≥ threshold, e.g. 0.5)\nPrecision = TP / (TP+FP)   Recall = TP / (TP+FN)\nAP  = area under the precision–recall curve, per class\nmAP = mean of AP over all classes\nmAP@0.5      → COCO \"loose\"      mAP@[0.5:0.95] → COCO strict (avg over IoU thresholds)<\/code><\/pre>\n<ul><li><strong>Precision–recall trade-off = the confidence threshold<\/strong>; the PR curve sweeps it.<\/li><li>Report the IoU threshold — \"mAP\" alone is ambiguous (0.5 vs 0.5:0.95).<\/li><li>For <strong>counting<\/strong>, high <strong>recall<\/strong> matters most (missed people = under-count); for<\/li><\/ul>\n<p>a <strong>security alert<\/strong>, precision may matter more. Tie the metric to the use-case.<\/p>\n<h2 id=\"cctv-specific-detection-challenges\">CCTV-specific detection challenges<\/h2>\n<ul><li><strong>Small/far objects<\/strong> — FPN + higher input resolution; tile the frame if needed.<\/li><li><strong>Occlusion in crowds<\/strong> — detect <strong>heads<\/strong> not full bodies; Soft-NMS; density<\/li><\/ul>\n<p>estimation when it's hopeless (§11).<\/p>\n<ul><li><strong>Class imbalance<\/strong> — mostly \"person\"; focal loss / balanced sampling.<\/li><li><strong>Domain shift<\/strong> — train scene ≠ deploy scene (angle, lighting, weather) → §14<\/li><\/ul>\n<p>training page + §13 drift monitoring.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Why single-stage for live CCTV? <em>(one forward pass, real-time FPS per camera)<\/em><\/li><li>Walk through NMS; why does a low IoU threshold hurt crowd counting? *(suppresses<\/li><\/ul>\n<p>true nearby detections → under-count; use Soft-NMS)*<\/p>\n<ul><li>What is mAP@[0.5:0.95]? *(AP averaged over IoU thresholds 0.5→0.95, mean over<\/li><\/ul>\n<p>classes — COCO's strict metric)*<\/p>\n<ul><li>For people-counting, precision or recall? <em>(recall — a miss is an under-count)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"one-stage-vs-two-stage","text":"One-stage vs two-stage"},{"level":2,"id":"anchors-vs-anchor-free","text":"Anchors vs anchor-free"},{"level":2,"id":"the-yolo-idea-be-able-to-sketch-it","text":"The YOLO idea (be able to sketch it)"},{"level":2,"id":"nms-non-max-suppression-guaranteed-question","text":"NMS — Non-Max Suppression (guaranteed question)"},{"level":2,"id":"loss-the-three-pieces","text":"Loss (the three pieces)"},{"level":2,"id":"map-the-metric-you-must-explain","text":"mAP — the metric you must explain"},{"level":2,"id":"cctv-specific-detection-challenges","text":"CCTV-specific detection challenges"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"object detection 💡 tl;dr detection = localize (boxes) + classify, for every object. for live cctv you want a single-stage detector (yolo family) — one forward pass, real-time fps — over a two-stage detector (faster r-cnn) that's more accurate but too slow per frame. know anchor vs anchor-free, nms, the loss pieces, and map (you will be asked what it means). one-stage vs two-stage two-stage (faster r-cnn) one-stage (yolo, ssd, retinanet) how propose regions → classify each predict boxes + classes in one pass over a grid speed slower fast — real-time , edge-friendly accuracy historically higher, esp. small objects closed the gap; now competitive cctv pick rarely default — you need fps per camera say it plainly: \"on the edge with n cameras i need one forward pass at real-time fps, so i use a yolo-family single-stage detector.\" anchors vs anchor-free anchor-based (yolov3–v5, ssd, retinanet) — predefined box priors of set scales/ratios at each grid location; the net predicts offsets + objectness. requires tuning anchor sizes to your object distribution. anchor-free (yolox, fcos, centernet, yolov8) — predict object centers/points and sizes directly; no anchor hyperparameters. simpler, increasingly standard. the yolo idea (be able to sketch it) divide the image into a grid; each cell predicts boxes (x, y, w, h), an objectness score, and class probabilities — in one pass . modern yolos add a cspdarknet backbone, an fpn/pan neck for multi-scale, and mosaic augmentation. the \"one pass over a grid\" mental model is what interviewers want, not a version-number recital. nms — non-max suppression (guaranteed question) detectors emit many overlapping boxes for one object. nms keeps the best: 1. sort boxes by score 2. take the top box, keep it 3. remove any remaining box with iou > threshold vs it (same object) 4. repeat with the next-highest surviving box iou = intersection area / union area of two boxes (0..1). trap in crowds: a low iou threshold suppresses real nearby people (two heads → one survives → under-count). soft-nms (decay scores instead of hard-removing) helps in dense scenes — a great crowd-specific answer. nms is per-class (usually) and runs post-inference on cpu/gpu. loss (the three pieces) localization — box regression (iou/giou/ciou or smooth-l1). objectness/confidence — is there an object here. classification — which class (focal loss in retinanet to fight the huge background/foreground imbalance — worth naming). map — the metric you must explain iou decides if a prediction is a true positive (iou ≥ threshold, e.g. 0.5) precision = tp / (tp+fp) recall = tp / (tp+fn) ap = area under the precision–recall curve, per class map = mean of ap over all classes map@0.5 → coco \"loose\" map@[0.5:0.95] → coco strict (avg over iou thresholds) precision–recall trade-off = the confidence threshold ; the pr curve sweeps it. report the iou threshold — \"map\" alone is ambiguous (0.5 vs 0.5:0.95). for counting , high recall matters most (missed people = under-count); for a security alert , precision may matter more. tie the metric to the use-case. cctv-specific detection challenges small/far objects — fpn + higher input resolution; tile the frame if needed. occlusion in crowds — detect heads not full bodies; soft-nms; density estimation when it's hopeless (§11). class imbalance — mostly \"person\"; focal loss / balanced sampling. domain shift — train scene ≠ deploy scene (angle, lighting, weather) → §14 training page + §13 drift monitoring. quick self-check why single-stage for live cctv? (one forward pass, real-time fps per camera) walk through nms; why does a low iou threshold hurt crowd counting? *(suppresses true nearby detections → under-count; use soft-nms)* what is map@[0.5:0.95]? *(ap averaged over iou thresholds 0.5→0.95, mean over classes — coco's strict metric)* for people-counting, precision or recall? (recall — a miss is an under-count)","words":623},{"path":"14-deep-learning-for-video/tracking.md","title":"Multi-Object Tracking","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"multi-object-tracking\">Multi-Object Tracking<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Detection tells you <em>what's in this frame<\/em>; tracking gives objects <strong>stable IDs across frames<\/strong> — which is what makes counting, dwell, flow, and loitering possible. The dominant paradigm is <strong>tracking-by-detection<\/strong>: detect each frame, then associate detections to existing tracks. Know the SORT→DeepSORT→ByteTrack lineage, the Kalman+Hungarian core, when you need ReID, and the MOT metrics.<\/div><\/div>\n<h2 id=\"why-tracking-at-all\">Why tracking at all<\/h2>\n<ul><li><strong>Counting<\/strong> needs IDs or you recount the same person every frame.<\/li><li><strong>Dwell / queue time<\/strong> = last_seen − first_seen for a track (§11).<\/li><li><strong>Direction / flow / wrong-way<\/strong> need a trajectory, not a point.<\/li><li><strong>Loitering / events<\/strong> need \"the <em>same<\/em> person for &gt; T seconds\" (§12).<\/li><\/ul>\n<p>So tracking quality (ID stability) directly bounds the accuracy of every §11/§12 number. Interviewers link them: <em>\"your queue times are noisy — why?\"<\/em> → often <strong>ID switches<\/strong>.<\/p>\n<h2 id=\"the-tracking-by-detection-core\">The tracking-by-detection core<\/h2>\n<pre><code>predict each track's next position (motion model)\n        │\n        ▼\nmatch detections ↔ tracks   (cost = IoU and/or appearance distance)\n        │                    solved by the HUNGARIAN algorithm (optimal assignment)\n        ▼\nupdate matched tracks; birth unmatched detections; kill stale tracks<\/code><\/pre>\n<ul><li><strong>Kalman filter<\/strong> — the motion model; predicts where a track goes next<\/li><\/ul>\n<p>(constant-velocity) and smooths noisy boxes. Bridges short detection gaps.<\/p>\n<ul><li><strong>Hungarian algorithm<\/strong> — optimal one-to-one assignment of detections to tracks<\/li><\/ul>\n<p>given a cost matrix. (These two are the SORT recipe.)<\/p>\n<ul><li><strong>Cost<\/strong> — IoU (position/overlap) and/or appearance embedding distance.<\/li><\/ul>\n<h2 id=\"the-lineage-name-these-know-the-diff\">The lineage (name these, know the diff)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Tracker<\/th><th>Adds<\/th><th>Use when<\/th><\/tr><\/thead><tbody><tr><td><strong>SORT<\/strong><\/td><td>Kalman + Hungarian on IoU only<\/td><td>fast, clean scenes, few crossings<\/td><\/tr><tr><td><strong>DeepSORT<\/strong><\/td><td>+ appearance <strong>ReID<\/strong> embedding in the cost<\/td><td>occlusion / crossings — ID survives a gap<\/td><\/tr><tr><td><strong>ByteTrack<\/strong><\/td><td>associate <strong>low-score<\/strong> detections too, in a second stage<\/td><td>crowded/occluded — big MOTA gain, still fast<\/td><\/tr><tr><td><strong>OC-SORT / BoT-SORT<\/strong><\/td><td>better motion / camera-motion comp + ReID<\/td><td>moving-camera or heavy occlusion<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>ByteTrack's key insight<\/strong> (worth stating): don't throw away low-confidence detections — an occluded person's box gets a low score; matching those to existing tracks in a second pass recovers IDs through occlusion without a heavy ReID model. Great edge answer: strong tracking, cheap.<\/p>\n<h2 id=\"reid-re-identification\">ReID (re-identification)<\/h2>\n<p>An embedding of a person's appearance so the <em>same<\/em> person matches across a gap or across cameras (foot point + ReID = cross-camera handoff, §11 calibration).<\/p>\n<ul><li><strong>When you need it:<\/strong> long occlusions, crossing paths, multi-camera identity,<\/li><\/ul>\n<p>re-entry.<\/p>\n<ul><li><strong>When you can skip it:<\/strong> sparse scene, short gaps → motion/IoU (SORT/ByteTrack)<\/li><\/ul>\n<p>is enough and far cheaper on the edge.<\/p>\n<ul><li><strong>Privacy note (§13):<\/strong> a ReID embedding is derived from a person — treat as<\/li><\/ul>\n<p>sensitive, scope its retention. It re-associates an <em>unnamed<\/em> track; it is <strong>not<\/strong>   a name/identity.<\/p>\n<h2 id=\"mot-metrics-the-tracking-scorecard\">MOT metrics (the tracking scorecard)<\/h2>\n<ul><li><strong>MOTA<\/strong> — combines false positives, misses, and <strong>ID switches<\/strong> into one score<\/li><\/ul>\n<p>(higher better). The headline.<\/p>\n<ul><li><strong>IDF1<\/strong> — identity-focused F1: how consistently the right ID stays on the right<\/li><\/ul>\n<p>object. Often more telling than MOTA for analytics that depend on identity.<\/p>\n<ul><li><strong>ID switches<\/strong> — count of times a track's ID changes — the direct driver of<\/li><\/ul>\n<p>count/dwell error.<\/p>\n<ul><li><strong>HOTA<\/strong> — modern balance of detection vs association accuracy.<\/li><\/ul>\n<h2 id=\"cctv-gotchas\">CCTV gotchas<\/h2>\n<ul><li><strong>Occlusion<\/strong> → ID switches → wrong counts/dwell. Mitigate: ByteTrack, ReID,<\/li><\/ul>\n<p>Kalman gap-bridging, K-of-N confirmation downstream (§12).<\/p>\n<ul><li><strong>Crowd density<\/strong> — past a point, tracking is hopeless → switch to density<\/li><\/ul>\n<p>estimation + Little's Law (§11).<\/p>\n<ul><li><strong>Frame rate<\/strong> — too-low FPS breaks the constant-velocity assumption (objects jump<\/li><\/ul>\n<p>too far between frames) → association fails. Budget FPS for tracking, not just   detection (§03).<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>What are SORT's two algorithms and what does each do? *(Kalman = motion predict/<\/li><\/ul>\n<p>smooth; Hungarian = optimal detection↔track assignment)*<\/p>\n<ul><li>ByteTrack's core trick? *(also associate low-confidence detections → recover IDs<\/li><\/ul>\n<p>through occlusion, cheaply)*<\/p>\n<ul><li>When do you add ReID, and when skip it? *(add for occlusion/crossing/multi-camera;<\/li><\/ul>\n<p>skip in sparse scenes to save edge compute)*<\/p>\n<ul><li>Which metric best reflects identity consistency for analytics? *(IDF1; watch ID<\/li><\/ul>\n<p>switches)*<\/p>","toc":[{"level":2,"id":"why-tracking-at-all","text":"Why tracking at all"},{"level":2,"id":"the-tracking-by-detection-core","text":"The tracking-by-detection core"},{"level":2,"id":"the-lineage-name-these-know-the-diff","text":"The lineage (name these, know the diff)"},{"level":2,"id":"reid-re-identification","text":"ReID (re-identification)"},{"level":2,"id":"mot-metrics-the-tracking-scorecard","text":"MOT metrics (the tracking scorecard)"},{"level":2,"id":"cctv-gotchas","text":"CCTV gotchas"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"multi-object tracking 💡 tl;dr detection tells you what's in this frame ; tracking gives objects stable ids across frames — which is what makes counting, dwell, flow, and loitering possible. the dominant paradigm is tracking-by-detection : detect each frame, then associate detections to existing tracks. know the sort→deepsort→bytetrack lineage, the kalman+hungarian core, when you need reid, and the mot metrics. why tracking at all counting needs ids or you recount the same person every frame. dwell / queue time = last_seen − first_seen for a track (§11). direction / flow / wrong-way need a trajectory, not a point. loitering / events need \"the same person for > t seconds\" (§12). so tracking quality (id stability) directly bounds the accuracy of every §11/§12 number. interviewers link them: \"your queue times are noisy — why?\" → often id switches . the tracking-by-detection core predict each track's next position (motion model) │ ▼ match detections ↔ tracks (cost = iou and/or appearance distance) │ solved by the hungarian algorithm (optimal assignment) ▼ update matched tracks; birth unmatched detections; kill stale tracks kalman filter — the motion model; predicts where a track goes next (constant-velocity) and smooths noisy boxes. bridges short detection gaps. hungarian algorithm — optimal one-to-one assignment of detections to tracks given a cost matrix. (these two are the sort recipe.) cost — iou (position/overlap) and/or appearance embedding distance. the lineage (name these, know the diff) tracker adds use when sort kalman + hungarian on iou only fast, clean scenes, few crossings deepsort + appearance reid embedding in the cost occlusion / crossings — id survives a gap bytetrack associate low-score detections too, in a second stage crowded/occluded — big mota gain, still fast oc-sort / bot-sort better motion / camera-motion comp + reid moving-camera or heavy occlusion bytetrack's key insight (worth stating): don't throw away low-confidence detections — an occluded person's box gets a low score; matching those to existing tracks in a second pass recovers ids through occlusion without a heavy reid model. great edge answer: strong tracking, cheap. reid (re-identification) an embedding of a person's appearance so the same person matches across a gap or across cameras (foot point + reid = cross-camera handoff, §11 calibration). when you need it: long occlusions, crossing paths, multi-camera identity, re-entry. when you can skip it: sparse scene, short gaps → motion/iou (sort/bytetrack) is enough and far cheaper on the edge. privacy note (§13): a reid embedding is derived from a person — treat as sensitive, scope its retention. it re-associates an unnamed track; it is not a name/identity. mot metrics (the tracking scorecard) mota — combines false positives, misses, and id switches into one score (higher better). the headline. idf1 — identity-focused f1: how consistently the right id stays on the right object. often more telling than mota for analytics that depend on identity. id switches — count of times a track's id changes — the direct driver of count/dwell error. hota — modern balance of detection vs association accuracy. cctv gotchas occlusion → id switches → wrong counts/dwell. mitigate: bytetrack, reid, kalman gap-bridging, k-of-n confirmation downstream (§12). crowd density — past a point, tracking is hopeless → switch to density estimation + little's law (§11). frame rate — too-low fps breaks the constant-velocity assumption (objects jump too far between frames) → association fails. budget fps for tracking, not just detection (§03). quick self-check what are sort's two algorithms and what does each do? *(kalman = motion predict/ smooth; hungarian = optimal detection↔track assignment)* bytetrack's core trick? *(also associate low-confidence detections → recover ids through occlusion, cheaply)* when do you add reid, and when skip it? *(add for occlusion/crossing/multi-camera; skip in sparse scenes to save edge compute)* which metric best reflects identity consistency for analytics? *(idf1; watch id switches)*","words":627},{"path":"14-deep-learning-for-video/training-and-optimization.md","title":"Training & Optimization","section":"14 · Deep Learning for Video","quiz":false,"accent":"#9a5cd0","html":"<h1 id=\"training-model-optimization-for-the-edge\">Training &amp; Model Optimization for the Edge<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> As a data scientist you own the model lifecycle: curate data, augment for the deployment domain, transfer-learn instead of training from scratch, then <strong>optimize for the edge<\/strong> (INT8/FP16, pruning, distillation, TensorRT) <em>without<\/em> losing the accuracy you need. And because it's a closed on-prem loop, you improve the model with <strong>active learning<\/strong> on its own failures.<\/div><\/div>\n<h2 id=\"data-where-the-accuracy-actually-comes-from\">Data — where the accuracy actually comes from<\/h2>\n<ul><li><strong>Domain match is everything.<\/strong> A model trained on web images fails on your CCTV:<\/li><\/ul>\n<p>high angle, wide lens, night IR, weather, motion blur. Collect/label data <strong>from   the actual cameras and conditions<\/strong>. This single point beats most architecture   tweaks.<\/p>\n<ul><li><strong>Labeling quality &amp; consistency<\/strong> — define box conventions (head vs full body,<\/li><\/ul>\n<p>occluded-object policy) and hold to them; noisy labels cap your ceiling.<\/p>\n<ul><li><strong>Class balance &amp; hard cases<\/strong> — deliberately include night, crowds, occlusion,<\/li><\/ul>\n<p>rare events; a model only learns what it sees.<\/p>\n<h2 id=\"augmentation-cheap-generalization\">Augmentation (cheap generalization)<\/h2>\n<ul><li><strong>Geometric:<\/strong> flip, scale, crop, rotate — teach scale/position invariance<\/li><\/ul>\n<p>(matches the CCTV scale range).<\/p>\n<ul><li><strong>Photometric:<\/strong> brightness/contrast/hue, noise, blur, JPEG artifacts — teach<\/li><\/ul>\n<p>robustness to lighting/weather/IR and compression.<\/p>\n<ul><li><strong>Detection-specific:<\/strong> <strong>mosaic<\/strong> (4 images tiled — YOLO staple, great for small<\/li><\/ul>\n<p>objects and context), mixup, copy-paste, cutout/random-erase (occlusion robustness).<\/p>\n<ul><li>Augment toward <em>your<\/em> deployment conditions — simulate night, rain, glare.<\/li><\/ul>\n<h2 id=\"transfer-learning-almost-always-the-right-start\">Transfer learning (almost always the right start)<\/h2>\n<p>Start from an ImageNet/COCO-pretrained backbone and <strong>fine-tune<\/strong> on your data — far less data and compute than scratch, better generalization. Freeze early layers (generic edges/textures) and adapt the head + later layers to your classes/domain. Say this — training a detector from scratch on-site is rarely justified.<\/p>\n<h2 id=\"handling-the-usual-problems\">Handling the usual problems<\/h2>\n<ul><li><strong>Class imbalance<\/strong> — focal loss, resampling, class-balanced sampling.<\/li><li><strong>Overfitting<\/strong> — more/harder augmentation, dropout, weight decay, early stopping,<\/li><\/ul>\n<p>validate on a <strong>held-out scene<\/strong> (not just held-out frames from the same clip).<\/p>\n<ul><li><strong>Small objects<\/strong> — higher input res, FPN, tiling, mosaic.<\/li><li><strong>Evaluate on realistic splits<\/strong> — split by camera/day, not random frames, or<\/li><\/ul>\n<p>near-duplicate frames leak and inflate your metrics.<\/p>\n<h2 id=\"optimization-for-the-edge-ties-to-03\">Optimization for the edge (ties to §03)<\/h2>\n<p>The JD's \"model optimization.\" Turn the trained model into something that hits the FPS budget on a Jetson:<\/p>\n<ul><li><strong>Precision reduction<\/strong> — <strong>FP16<\/strong> (≈2× speed, usually negligible accuracy loss),<\/li><\/ul>\n<p><strong>INT8<\/strong> (bigger speedup, needs calibration and can cost mAP — <em>measure it<\/em>).<\/p>\n<ul><li><strong>PTQ<\/strong> (post-training quantization) — calibrate on a representative set; fast,<\/li><\/ul>\n<p>no retraining, small accuracy hit.<\/p>\n<ul><li><strong>QAT<\/strong> (quantization-aware training) — simulate INT8 during training; recovers<\/li><\/ul>\n<p>most of the accuracy when PTQ drops too much.<\/p>\n<ul><li><strong>Pruning<\/strong> — remove low-importance weights/channels → smaller/faster; fine-tune<\/li><\/ul>\n<p>to recover accuracy.<\/p>\n<ul><li><strong>Knowledge distillation<\/strong> — train a small \"student\" to mimic a big \"teacher\";<\/li><\/ul>\n<p>keep much of the accuracy at edge cost. Strong answer for edge deployment.<\/p>\n<ul><li><strong>TensorRT<\/strong> — layer/tensor fusion, kernel autotuning, precision calibration into<\/li><\/ul>\n<p>a hardware-specific engine (§03). <strong>Always re-measure mAP after<\/strong> — optimization   that quietly tanks accuracy is a failure, which is why §13 monitoring watches it.<\/p>\n<pre><code>train (transfer + augment) ─► validate on held-out SCENE\n   ─► optimize (FP16/INT8 PTQ→QAT, prune, distill) ─► TensorRT engine\n   ─► RE-MEASURE mAP + latency ─► deploy (§13 canary) ─► monitor drift (§13)<\/code><\/pre>\n<h2 id=\"active-learning-improve-inside-a-closed-loop\">Active learning — improve inside a closed loop<\/h2>\n<p>On-prem you can't crowdsource labels, but the system generates its own hard cases:<\/p>\n<ol><li>Mine <strong>low-confidence<\/strong> detections and <strong>operator-flagged false alarms<\/strong> (§12).<\/li><li>Label just those (high value per label).<\/li><li>Retrain / fine-tune, validate, canary (§13).<\/li><\/ol>\n<p>This is how accuracy climbs over time in a locked-down deployment without endless labeling — a mature, senior thing to volunteer.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Biggest lever on CCTV accuracy — architecture or data? *(domain-matched data +<\/li><\/ul>\n<p>augmentation from the real cameras)*<\/p>\n<ul><li>PTQ vs QAT — when each? *(PTQ first — fast, no retrain; QAT when INT8 drops mAP<\/li><\/ul>\n<p>too much)*<\/p>\n<ul><li>Why validate on a held-out <em>scene/camera<\/em>, not random frames? *(same-clip frames<\/li><\/ul>\n<p>leak → inflated metrics; you must test generalization to new views)*<\/p>\n<ul><li>How does a model improve on a closed on-prem site? *(active learning — mine<\/li><\/ul>\n<p>low-confidence + flagged false positives, label those, retrain, canary)*<\/p>","toc":[{"level":2,"id":"data-where-the-accuracy-actually-comes-from","text":"Data — where the accuracy actually comes from"},{"level":2,"id":"augmentation-cheap-generalization","text":"Augmentation (cheap generalization)"},{"level":2,"id":"transfer-learning-almost-always-the-right-start","text":"Transfer learning (almost always the right start)"},{"level":2,"id":"handling-the-usual-problems","text":"Handling the usual problems"},{"level":2,"id":"optimization-for-the-edge-ties-to-03","text":"Optimization for the edge (ties to §03)"},{"level":2,"id":"active-learning-improve-inside-a-closed-loop","text":"Active learning — improve inside a closed loop"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"training & model optimization for the edge 💡 tl;dr as a data scientist you own the model lifecycle: curate data, augment for the deployment domain, transfer-learn instead of training from scratch, then optimize for the edge (int8/fp16, pruning, distillation, tensorrt) without losing the accuracy you need. and because it's a closed on-prem loop, you improve the model with active learning on its own failures. data — where the accuracy actually comes from domain match is everything. a model trained on web images fails on your cctv: high angle, wide lens, night ir, weather, motion blur. collect/label data from the actual cameras and conditions . this single point beats most architecture tweaks. labeling quality & consistency — define box conventions (head vs full body, occluded-object policy) and hold to them; noisy labels cap your ceiling. class balance & hard cases — deliberately include night, crowds, occlusion, rare events; a model only learns what it sees. augmentation (cheap generalization) geometric: flip, scale, crop, rotate — teach scale/position invariance (matches the cctv scale range). photometric: brightness/contrast/hue, noise, blur, jpeg artifacts — teach robustness to lighting/weather/ir and compression. detection-specific: mosaic (4 images tiled — yolo staple, great for small objects and context), mixup, copy-paste, cutout/random-erase (occlusion robustness). augment toward your deployment conditions — simulate night, rain, glare. transfer learning (almost always the right start) start from an imagenet/coco-pretrained backbone and fine-tune on your data — far less data and compute than scratch, better generalization. freeze early layers (generic edges/textures) and adapt the head + later layers to your classes/domain. say this — training a detector from scratch on-site is rarely justified. handling the usual problems class imbalance — focal loss, resampling, class-balanced sampling. overfitting — more/harder augmentation, dropout, weight decay, early stopping, validate on a held-out scene (not just held-out frames from the same clip). small objects — higher input res, fpn, tiling, mosaic. evaluate on realistic splits — split by camera/day, not random frames, or near-duplicate frames leak and inflate your metrics. optimization for the edge (ties to §03) the jd's \"model optimization.\" turn the trained model into something that hits the fps budget on a jetson: precision reduction — fp16 (≈2× speed, usually negligible accuracy loss), int8 (bigger speedup, needs calibration and can cost map — measure it ). ptq (post-training quantization) — calibrate on a representative set; fast, no retraining, small accuracy hit. qat (quantization-aware training) — simulate int8 during training; recovers most of the accuracy when ptq drops too m

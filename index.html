<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KoiReader Interview Prep</title>
<style>
  :root{
    --bg:#ffffff; --bg-soft:#f6f8fa; --bg-side:#fbfcfd; --text:#1f2328;
    --muted:#5b6570; --border:#e3e8ee; --accent:#0d7d7d; --accent-soft:#e3f4f4;
    --code-bg:#f3f5f7; --code-text:#214; --quote:#475569; --link:#0a6b8a;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.05);
  }
  html[data-theme="dark"]{
    --bg:#0f1419; --bg-soft:#161c23; --bg-side:#0c1116; --text:#e4e8ee;
    --muted:#9aa6b2; --border:#222b35; --accent:#3fd0c9; --accent-soft:#11302f;
    --code-bg:#161c23; --code-text:#d6e2ea; --quote:#9fb0c0; --link:#5cc6e8;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  /* layout */
  .app{display:grid; grid-template-columns:300px 1fr; min-height:100vh}
  .sidebar{
    background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; overflow-y:auto; padding:0;
  }
  .brand{
    padding:18px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2;
  }
  .brand h1{font-size:15px; margin:0 0 2px; letter-spacing:.2px}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:12px}
  .tools input{
    flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:8px; padding:7px 10px; font-size:13px; outline:none;
  }
  .tools input:focus{border-color:var(--accent)}
  .iconbtn{
    background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:8px; width:34px; cursor:pointer; font-size:14px;
  }
  .iconbtn:hover{border-color:var(--accent)}
  nav{padding:10px 10px 60px}
  .sec{margin:2px 0}
  .sec>.sec-h{
    font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted);
    padding:12px 12px 5px; font-weight:600;
  }
  nav a.item{
    display:block; padding:6px 12px; border-radius:7px; color:var(--text);
    font-size:13.5px; margin:1px 0;
  }
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:14px}
  .hidden{display:none !important}

  /* content */
  .main{min-width:0}
  .topbar{
    display:none; align-items:center; gap:12px; padding:10px 16px;
    border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:5;
  }
  .topbar button{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);cursor:pointer}
  .content-wrap{max-width:840px; margin:0 auto; padding:40px 32px 80px}
  article{font-size:16px}
  article h1{font-size:30px; line-height:1.25; margin:.2em 0 .5em; letter-spacing:-.4px}
  article h2{font-size:22px; margin:1.6em 0 .5em; padding-bottom:.25em; border-bottom:1px solid var(--border)}
  article h3{font-size:17px; margin:1.4em 0 .4em}
  article p{margin:.7em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.4em}
  article li{margin:.28em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article code{
    background:var(--code-bg); color:var(--code-text); padding:.12em .4em;
    border-radius:5px; font:13.5px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  article pre{
    background:var(--code-bg); border:1px solid var(--border); border-radius:10px;
    padding:14px 16px; overflow:auto; margin:1em 0;
  }
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre}
  article blockquote{
    margin:1em 0; padding:.4em 1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 8px 8px 0;
  }
  article blockquote p{margin:.3em 0}
  article table{border-collapse:collapse; width:100%; margin:1.1em 0; font-size:14px; display:block; overflow-x:auto}
  article th,article td{border:1px solid var(--border); padding:8px 11px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:600}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:1.8em 0}
  article h1,article h2,article h3{scroll-margin-top:70px}

  .pager{display:flex; justify-content:space-between; gap:14px; margin:48px 0 0; padding-top:22px; border-top:1px solid var(--border)}
  .pager a{
    flex:1; border:1px solid var(--border); border-radius:12px; padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg);
  }
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:3px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .banner{
    background:var(--accent-soft); border:1px solid var(--accent); color:var(--text);
    border-radius:12px; padding:14px 16px; margin:0 0 24px; font-size:14px;
  }
  .banner code{background:rgba(0,0,0,.06)}
  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  @media (max-width:860px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:20; width:300px; transform:translateX(-100%); transition:transform .22s ease}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:15}
    .content-wrap{padding:24px 18px 70px}
    article h1{font-size:25px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>KoiReader Interview Prep</h1>
      <div class="sub">Systems-First Computer Vision Engineer</div>
      <div class="tools">
        <input id="search" type="search" placeholder="Search…" autocomplete="off">
        <button class="iconbtn" id="theme" title="Toggle theme">◐</button>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <button id="menu">☰ Menu</button>
      <strong style="font-size:14px">KoiReader Interview Prep</strong>
    </div>
    <div class="content-wrap">
      <div id="filebanner"></div>
      <article id="content"><div class="loading">Loading…</div></article>
      <div class="pager" id="pager"></div>
    </div>
  </main>
</div>
<div class="scrim" id="scrim"></div>

<script>
/* ============================ SITE STRUCTURE ============================ */
const SITE = [
  { label:"Start here", items:[
    { dir:"", file:"README.md", title:"Overview & Gap Analysis" },
    { dir:"", file:"RUN-ON-PI.md", title:"Run on a Raspberry Pi" },
  ]},
  { label:"1 · Video Streaming", dir:"01-video-streaming", items:[
    { file:"README.md", title:"Overview" },
    { file:"protocols-rtsp-webrtc.md", title:"RTSP vs WebRTC vs FastRTC" },
    { file:"codecs-and-frames.md", title:"Codecs, GOP & I/P/B Frames" },
    { file:"decode-encode-pipeline.md", title:"Decode / Encode Pipeline" },
    { file:"frame-buffers-backpressure.md", title:"Frame Buffers & Backpressure" },
  ]},
  { label:"2 · GStreamer", dir:"02-gstreamer", items:[
    { file:"README.md", title:"Overview" },
    { file:"pipeline-model.md", title:"Pipeline Model" },
    { file:"appsink-and-python.md", title:"appsink & Python" },
    { file:"deepstream.md", title:"DeepStream" },
  ]},
  { label:"3 · Low-Latency Inference", dir:"03-low-latency-inference", items:[
    { file:"README.md", title:"Overview" },
    { file:"latency-budget.md", title:"The Latency Budget" },
    { file:"tensorrt-and-quantization.md", title:"TensorRT & Quantization" },
    { file:"triton.md", title:"Triton Inference Server" },
    { file:"batching-and-throughput.md", title:"Batching & Throughput" },
  ]},
  { label:"4 · Fault Tolerance", dir:"04-fault-tolerance", items:[
    { file:"README.md", title:"Overview" },
    { file:"failure-modes.md", title:"Failure Modes" },
    { file:"recovery-patterns.md", title:"Recovery Patterns" },
  ]},
  { label:"5 · Production Python", dir:"05-production-python", items:[
    { file:"README.md", title:"Overview" },
    { file:"gil-threads-async-processes.md", title:"GIL, Threads, Async, Processes" },
    { file:"memory-and-resources.md", title:"Memory & Resources" },
  ]},
  { label:"6 · System Design", dir:"06-system-design", items:[
    { file:"README.md", title:"Overview" },
    { file:"framework.md", title:"Design Framework" },
    { file:"worked-example-multicam.md", title:"Worked Example: 50 Cameras" },
    { file:"curveballs.md", title:"Curveballs" },
  ]},
  { label:"7 · Q&A Drill Bank", dir:"07-qa-drill-bank", items:[
    { file:"README.md", title:"Overview" },
    { file:"drill-bank.md", title:"Drill Bank" },
    { file:"cheat-sheet.md", title:"Cheat Sheet (Morning Of)" },
  ]},
  { label:"8 · Mock Interview", dir:"08-mock-interview", items:[
    { file:"README.md", title:"Overview" },
    { file:"questions.md", title:"Questions" },
    { file:"model-answers.md", title:"Model Answers" },
    { file:"rubric.md", title:"Self-Grading Rubric" },
  ]},
  { label:"9 · CV Fundamentals", dir:"09-computer-vision-fundamentals", items:[
    { file:"README.md", title:"Overview" },
    { file:"image-basics-color-spaces.md", title:"Image Basics & Color Spaces" },
    { file:"filtering-morphology-edges.md", title:"Filtering, Morphology & Edges" },
    { file:"geometry-and-transforms.md", title:"Geometry & Transforms" },
    { file:"camera-calibration.md", title:"Camera Calibration" },
    { file:"features-and-matching.md", title:"Features & Matching" },
    { file:"detection-tracking-math.md", title:"Detection & Tracking Math" },
    { file:"logic-on-detections.md", title:"Logic on Detections" },
    { file:"cv-cheat-sheet.md", title:"CV Cheat Sheet" },
  ]},
];

// flat ordered list of pages: {path, title}
const PAGES = [];
SITE.forEach(sec => sec.items.forEach(it => {
  const path = (sec.dir ? sec.dir + "/" : "") + it.file;
  PAGES.push({ path, title: it.title, section: sec.label });
}));

/* ============================ MARKDOWN PARSER ============================ */
// ===PARSER_START===
function escapeHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function slug(s){return s.toLowerCase().replace(/<[^>]+>/g,"").replace(/[^\w\s-]/g,"").trim().replace(/\s+/g,"-");}

function inlineMd(s){
  const codes=[];
  s = s.replace(/`([^`]+)`/g, (m,c)=>{ codes.push(c); return "␀"+(codes.length-1)+"␀"; });
  s = escapeHtml(s);
  // links [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m,t,u)=>{
    const ext = /^(https?:)?\/\//.test(u) || /^mailto:/.test(u);
    if(ext) return '<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>';
    if(u.charAt(0)==='#') return '<a href="'+u+'">'+t+'</a>';
    return '<a class="mdlink" data-href="'+u.replace(/"/g,'&quot;')+'" href="#">'+t+'</a>';
  });
  s = s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s = s.replace(/(^|[^*\w])\*([^*\n]+)\*(?!\w)/g,"$1<em>$2</em>");
  s = s.replace(/␀(\d+)␀/g,(m,i)=>"<code>"+escapeHtml(codes[+i])+"</code>");
  return s;
}

function isSep(line){ return /^\s*\|?[\s:|-]*-[-\s:|]*\|?\s*$/.test(line) && line.indexOf("-")>=0; }
function splitRow(line){
  let s = line.trim();
  if(s.charAt(0)==="|") s=s.slice(1);
  if(s.charAt(s.length-1)==="|") s=s.slice(0,-1);
  return s.split("|").map(c=>c.trim());
}

function renderMarkdown(md){
  const lines = md.replace(/\r\n?/g,"\n").split("\n");
  let i=0, out=[];
  const isListItem = l => /^(\s*)([-*+]|\d+\.)\s+/.test(l);

  while(i<lines.length){
    let line = lines[i];

    if(line.trim()===""){ i++; continue; }

    // code fence
    if(/^\s*```/.test(line)){
      const lang = line.trim().replace(/^```/,"").trim();
      i++; let buf=[];
      while(i<lines.length && !/^\s*```/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++; // skip closing fence
      out.push('<pre><code'+(lang?' class="language-'+lang+'"':'')+'>'+escapeHtml(buf.join("\n"))+'</code></pre>');
      continue;
    }

    // heading
    let h = line.match(/^(#{1,6})\s+(.*)$/);
    if(h){
      const lvl=h[1].length, txt=h[2].trim();
      out.push('<h'+lvl+' id="'+slug(txt)+'">'+inlineMd(txt)+'</h'+lvl+'>');
      i++; continue;
    }

    // horizontal rule
    if(/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)){ out.push("<hr>"); i++; continue; }

    // blockquote
    if(/^\s*>/.test(line)){
      let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,"")); i++; }
      out.push("<blockquote>"+renderMarkdown(buf.join("\n"))+"</blockquote>");
      continue;
    }

    // table
    if(line.indexOf("|")>=0 && i+1<lines.length && isSep(lines[i+1])){
      const header = splitRow(line);
      i+=2; let rows=[];
      while(i<lines.length && lines[i].indexOf("|")>=0 && lines[i].trim()!==""){ rows.push(splitRow(lines[i])); i++; }
      let t='<table><thead><tr>'+header.map(c=>"<th>"+inlineMd(c)+"</th>").join("")+"</tr></thead><tbody>";
      rows.forEach(r=>{ t+="<tr>"+header.map((_,k)=>"<td>"+inlineMd(r[k]||"")+"</td>").join("")+"</tr>"; });
      t+="</tbody></table>";
      out.push(t);
      continue;
    }

    // list (collect contiguous items, allow nesting by indent)
    if(isListItem(line)){
      let items=[];
      while(i<lines.length && isListItem(lines[i])){
        const m=lines[i].match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
        items.push({ indent:m[1].length, ordered:/\d+\./.test(m[2]), text:m[3] });
        i++;
      }
      out.push(buildList(items));
      continue;
    }

    // paragraph
    let buf=[];
    while(i<lines.length){
      const l=lines[i];
      if(l.trim()==="" || /^\s*```/.test(l) || /^#{1,6}\s/.test(l) ||
         /^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(l) || /^\s*>/.test(l) || isListItem(l) ||
         (l.indexOf("|")>=0 && i+1<lines.length && isSep(lines[i+1]))) break;
      buf.push(l); i++;
    }
    out.push("<p>"+inlineMd(buf.join(" ").trim())+"</p>");
  }
  return out.join("\n");
}

function buildList(items){
  let pos=0;
  function helper(curIndent){
    const ordered=items[pos].ordered;
    let html=ordered?"<ol>":"<ul>";
    while(pos<items.length && items[pos].indent>=curIndent){
      if(items[pos].indent>curIndent){
        const sub=helper(items[pos].indent);
        html=html.replace(/<\/li>$/, sub+"</li>");
      } else {
        html+="<li>"+inlineMd(items[pos].text)+"</li>";
        pos++;
      }
    }
    html+=ordered?"</ol>":"</ul>";
    return html;
  }
  return helper(items[0].indent);
}
// ===PARSER_END===

/* ============================ APP ============================ */
const TEXT = {};            // path -> lowercased text (for search)
const navLinks = {};        // path -> <a> element
let currentPath = null;

function resolvePath(curPath, href){
  if(href.charAt(0)==="#") return null;
  if(/\/$/.test(href)) href += "README.md";
  const base = curPath.split("/").slice(0,-1);
  href.split("/").forEach(p=>{
    if(p==="."||p==="") return;
    if(p==="..") base.pop();
    else base.push(p);
  });
  return base.join("/");
}

function buildNav(){
  const nav=document.getElementById("nav");
  SITE.forEach(sec=>{
    const wrap=document.createElement("div"); wrap.className="sec";
    const h=document.createElement("div"); h.className="sec-h"; h.textContent=sec.label;
    wrap.appendChild(h);
    sec.items.forEach(it=>{
      const path=(sec.dir?sec.dir+"/":"")+it.file;
      const a=document.createElement("a");
      a.className="item"+(it.file!=="README.md"&&sec.dir?" sub":"");
      a.textContent=it.title; a.href="#"+encodeURI(path);
      a.dataset.path=path; a.dataset.title=it.title.toLowerCase();
      navLinks[path]=a;
      wrap.appendChild(a);
    });
    nav.appendChild(wrap);
  });
}

function setActive(path){
  document.querySelectorAll("nav a.item").forEach(a=>a.classList.toggle("active", a.dataset.path===path));
}

function renderPager(path){
  const idx=PAGES.findIndex(p=>p.path===path);
  const pager=document.getElementById("pager");
  if(idx<0){ pager.innerHTML=""; return; }
  const prev=PAGES[idx-1], next=PAGES[idx+1];
  let html="";
  if(prev) html+='<a href="#'+encodeURI(prev.path)+'"><div class="lbl">← Previous</div><div class="ttl">'+prev.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  if(next) html+='<a class="next" href="#'+encodeURI(next.path)+'"><div class="lbl">Next →</div><div class="ttl">'+next.title+'</div></a>';
  else html+='<div class="spacer"></div>';
  pager.innerHTML=html;
}

async function loadPage(path){
  const content=document.getElementById("content");
  currentPath=path;
  setActive(path);
  try{
    let md;
    if(TEXT["__raw__"+path]) md=TEXT["__raw__"+path];
    else{
      const res=await fetch(path);
      if(!res.ok) throw new Error(res.status);
      md=await res.text();
      TEXT["__raw__"+path]=md;
    }
    content.innerHTML=renderMarkdown(md);
  }catch(e){
    if(location.protocol==="file:"){
      content.innerHTML='<div class="banner"><strong>This page needs a tiny web server.</strong><br>'+
        'Browsers block reading local files over <code>file://</code>. In this folder run '+
        '<code>python3 -m http.server 8000</code> and open <code>http://localhost:8000</code>. '+
        'See <a class="mdlink" data-href="RUN-ON-PI.md" href="#">Run on a Raspberry Pi</a>.</div>';
    }else{
      content.innerHTML='<div class="banner">Could not load <code>'+path+'</code> ('+e.message+').</div>';
    }
  }
  renderPager(path);
  // scroll: to anchor if hash has one, else top
  window.scrollTo(0,0);
  document.querySelector(".main").scrollTo?.(0,0);
  closeSidebar();
}

function go(path){ location.hash="#"+encodeURI(path); }

function onHash(){
  let raw=decodeURI(location.hash.replace(/^#/,""));
  if(!raw){ loadPage("README.md"); return; }
  loadPage(raw);
}

// intercept internal .md links inside content
document.addEventListener("click", e=>{
  const a=e.target.closest("a.mdlink");
  if(!a) return;
  e.preventDefault();
  const href=a.getAttribute("data-href");
  const target=resolvePath(currentPath||"README.md", href);
  if(target) go(target);
});

// search
const searchBox=document.getElementById("search");
searchBox.addEventListener("input", ()=>{
  const q=searchBox.value.trim().toLowerCase();
  document.querySelectorAll("nav .sec").forEach(sec=>{
    let any=false;
    sec.querySelectorAll("a.item").forEach(a=>{
      const p=a.dataset.path;
      const hit = !q || a.dataset.title.indexOf(q)>=0 || (TEXT[p]&&TEXT[p].indexOf(q)>=0);
      a.classList.toggle("hidden", !hit);
      if(hit) any=true;
    });
    sec.classList.toggle("hidden", !any);
  });
});

// preload all pages for full-text search (non-blocking)
async function preload(){
  await Promise.all(PAGES.map(async p=>{
    try{
      const r=await fetch(p.path);
      if(r.ok){ const t=await r.text(); TEXT[p.path]=t.toLowerCase(); TEXT["__raw__"+p.path]=t; }
    }catch(_){}
  }));
}

// theme
const themeBtn=document.getElementById("theme");
function applyTheme(t){ document.documentElement.dataset.theme=t; try{localStorage.setItem("koi-theme",t);}catch(_){} }
themeBtn.addEventListener("click", ()=>{
  applyTheme(document.documentElement.dataset.theme==="dark"?"light":"dark");
});
(function initTheme(){
  let t; try{t=localStorage.getItem("koi-theme");}catch(_){}
  if(!t) t=matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";
  applyTheme(t);
})();

// mobile sidebar
const sidebar=document.getElementById("sidebar"), scrim=document.getElementById("scrim");
function closeSidebar(){ sidebar.classList.remove("open"); scrim.classList.remove("show"); }
document.getElementById("menu").addEventListener("click", ()=>{ sidebar.classList.add("open"); scrim.classList.add("show"); });
scrim.addEventListener("click", closeSidebar);

// init
buildNav();
window.addEventListener("hashchange", onHash);
onHash();
preload();
</script>
</body>
</html>

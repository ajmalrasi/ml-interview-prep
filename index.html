ebRTC = conversation.<\/strong> If a human needs to <em>act<\/em> on what they see, WebRTC.<\/p>\n<p><strong>UDP vs TCP for RTSP?<\/strong> UDP = lowest latency, tolerates loss (rather skip a frame than wait). TCP = reliable, survives bad networks, what you pick when stability &gt; a few ms. Many cameras over flaky factory WiFi → <strong>force TCP<\/strong> for determinism.<\/p>\n<p><strong>Why does RTSP need a keepalive?<\/strong> RTSP sessions time out. You send periodic <code>GET_PARAMETER<\/code>/<code>OPTIONS<\/code> (or rely on RTCP) to keep the session alive, else the camera tears it down and you must reconnect — which ties directly into <a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">fault tolerance<\/a> (reconnect with backoff, watchdog on the stream).<\/p>\n<p><strong>What actually drives the latency number?<\/strong> Camera encoder buffer + <strong>GOP/keyframe interval<\/strong> + network + <strong>jitter buffer<\/strong> + decode + your processing. You rarely change the camera; the levers you own are the jitter buffer size, forcing TCP vs UDP, GOP request (if the camera honors it), and not stacking redundant queues in your own pipeline.<\/p>\n<p><strong>WebRTC connection fails — what do you check?<\/strong> Signaling reachable? STUN returning a reflexive candidate? Is a <strong>TURN<\/strong> server configured for symmetric-NAT cases? DTLS handshake completing? This sequence (the four phases above) is the debugging map.<\/p>\n<p><strong>Why is WebRTC encrypted and RTSP often not?<\/strong> WebRTC mandates DTLS-SRTP — encryption is non-optional. RTSP/RTP is frequently plaintext on a trusted camera LAN (RTSPS/SRTP exist but are less common). Security posture differs because their threat models differ: WebRTC crosses the public internet to a browser; camera RTSP usually doesn't leave the VLAN.<\/p>\n<hr>\n<h2 id=\"30-second-whiteboard-summary\">30-second whiteboard summary<\/h2>\n<blockquote><p>Cameras speak <strong>RTSP<\/strong> — a control protocol that sets up an <strong>RTP<\/strong> media session; I pull it over <strong>TCP<\/strong> in production for stability, with a small jitter buffer, ~1s latency. To deliver live annotated results to a browser I use <strong>WebRTC<\/strong>: SDP offer/answer over my own signaling server, <strong>ICE/STUN/TURN<\/strong> to cross NAT, <strong>DTLS-SRTP<\/strong> for encryption, ~200ms. For one-to-many I put an <strong>SFU<\/strong> in front. <strong>FastRTC<\/strong> is the fast Python path to that WebRTC loop when I want numpy frames into a model without writing the stack. The whole thing is <strong>RTSP in, WebRTC out<\/strong>, with GStreamer/DeepStream doing the work in the middle.<\/p><\/blockquote>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"codecs-and-frames.md\" href=\"#\">codecs-and-frames.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-mental-model","text":"The mental model"},{"level":2,"id":"rtsp-real-time-streaming-protocol","text":"RTSP (Real-Time Streaming Protocol)"},{"level":2,"id":"webrtc","text":"WebRTC"},{"level":2,"id":"fastrtc","text":"FastRTC"},{"level":2,"id":"how-they-fit-together-the-koireader-path","text":"How they fit together — the KoiReader path"},{"level":2,"id":"why-x-over-y-interview-gold","text":"Why X over Y (interview gold)"},{"level":2,"id":"30-second-whiteboard-summary","text":"30-second whiteboard summary"}],"text":"rtsp vs webrtc vs fastrtc ip cameras emit rtsp rtsp your system decode · infer · serve live webrtc browsers in-browser rtsp in — pull from cameras, ~0.5–3s, rugged & standard webrtc / fastrtc out — push to browsers, <500ms, low-latency rtsp in from cameras, webrtc out to browsers 💡 tl;dr rtsp is how ip cameras stream (pull, rtp over udp/tcp, ~0.5–3s latency). webrtc is how browsers stream peer-to-peer (push, sub-500ms, nat-traversing, encrypted by default). fastrtc is a thin python wrapper that makes webrtc easy to wire to ml code. koireader ingests cameras ( rtsp in ) and serves live results to browsers/operators/agents ( webrtc/fastrtc out ). this page is the one to know cold — the jd is \"obsess over milliseconds,\" and these three protocols are the millisecond budget at the edges of the pipeline. the middle (gstreamer + deepstream) is sections 02–03. the mental model think of it like plumbing. rtsp is the industrial pipe bolted to a factory camera — rugged, standard, slightly slow. webrtc is the flexible hose that snakes through any firewall to reach a browser, designed for real-time calls. fastrtc is the quick-connect fitting so you don't hand-thread the hose. one sentence that frames the whole page: all three carry media over rtp. rtsp sets up an rtp session and lets a camera push it to you; webrtc negotiates and encrypts an rtp session between peers across nat; fastrtc generates the webrtc half in python so your model sees numpy frames. underneath, it's the same real-time transport — they differ in how the session is established, how it traverses the network, and who's allowed to talk to whom. rtsp (real-time streaming protocol) what it is. a control protocol — the \"vcr remote\": options , describe , setup , play , pause , teardown . rtsp itself carries no video . it negotiates how the media will flow, then the actual frames ride on rtp , with quality/timing feedback on rtcp . think of rtsp as the phone call that arranges the delivery, and rtp as the truck that shows up. the handshake (worth knowing line-by-line for interviews): your pipeline (client) ip camera (server) options what can you do? describe → sdp codec · resolution setup pick udp or tcp transport play start sending ◀ rtp media + rtcp stats flow rtsp sets up the session · rtp carries the actual video rtsp handshake: the client sets up the session, then rtp delivers the video after play , media flows as rtp and stats as rtcp; periodic keepalives ( get_parameter / options ) hold the session open until teardown . pattern: pull. your pipeline dials out to rtsp://user:pass@cam-ip:554/stream . port 554 is the rtsp control channel. note the camera is the server ; you are the client . that matters for firewalls: you initiate, so outbound rules are usually enough. transport choice (the classic interview fork): mode how latency loss behavior when rtp/udp media on its own udp ports lowest drops → tearing/artifacts, but never stalls clean lan, latency-critical rtp/tcp (interleaved) media multiplexed inside the rtsp tcp connection ( $ channel framing) slightly higher reliable, retransmits, survives loss flaky factory wifi, nat/firewall, most production multi-cam rtp/udp multicast one stream, many subscribers low shared many viewers, controlled network in gstreamer you pin this with protocols=tcp on rtspsrc . default behavior tries udp first and falls back to tcp — which you usually want to make deterministic in production by forcing one. rtp — what's actually in the packets. each rtp packet has a header with a sequence number (detect loss/reordering), a timestamp (drive playback timing, derived from a 90 khz clock for video), an ssrc (which source), and a payload type (which codec). an h.264 keyframe is too big for one packet, so it's fragmented (fu-a) across many rtp packets; the depayloader ( rtph264depay ) reassembles them using the sequence numbers and the marker bit. rtcp — the feedback channel. sender reports and receiver reports carry packet-loss %, jitter, and round-trip estimates. this is also how a sender knows to back off, and how clock sync (lip-sync between audio/video) is maintained. the jitter buffer. packets arrive unevenly. a small buffer (e.g. rtspsrc latency=200 ) holds frames briefly to absorb jitter and reorder before decode. this knob is a direct latency-vs-smoothness trade — lower = less delay but more visible glitches under loss. expect to be asked to reason about it. latency: ~500ms–3s end to end, dominated by camera-side encoder buffering, gop size, and your jitter buffer. (gop/keyframe interval is covered in codecs-and-frames.md — long gop = more latency + worse recovery from loss.) auth & discovery. rtsp auth is usually digest (sometimes basic) over the url. cameras are typically discovered/configured via onvif (a soap/ws standard) which then hands you the rtsp url. good detail to drop: \"i'd pull the rtsp uri via onvif rather than hardcode vendor-specific paths.\" this is what ~95% of cctv/industrial cameras speak. koireader's \"multiple rtsp streams\" requirement lives entirely here. # inspect any camera before you build a pipeline: ffprobe -rtsp_transport tcp rtsp://user:pass@cam-ip: 554 /stream # a gstreamer rtsp source (more in section 02): rtspsrc location=rtsp://... protocols=tcp latency= 200 ! rtph264depay ! h264parse ! ... webrtc what it is. a full real-time media stack built for browsers and peers . where rtsp just sets up rtp, webrtc bundles everything you need to get encrypted media across the hostile public internet with no plugins: nat traversal, key exchange, encryption, congestion control, and recovery. it's the only one of the three a browser can speak natively ( rtcpeerconnection ). the four phases of a connection (memorize this arc — it's the most common webrtc interview question): 1 · signaling sdp offer / answer — through a server you build 2 · ice gather host / stun / turn candidates, find a path through nat 3 · dtls handshake exchanges the encryption keys 4 · srtp encrypted media flows · congestion control · nack / fec the four phases of every webrtc connection — signaling is the part you build signaling (the sdp offer/answer exchange) is the one piece webrtc leaves to you — a websocket is the usual choice. the rest (ice, dtls, srtp) the stack handles. sdp offer/answer. the offer is a text blob describing \"here are my codecs (h.264/vp8/vp9/av1/opus), resolutions, ice credentials, dtls fingerprint.\" the answer says \"here's what i'll accept.\" you shuttle these two blobs through your signaling server — that's the part you own and the part webrtc deliberately leaves undefined (use a websocket). ice / stun / turn — the nat-traversal trio (know what each does): ice is the framework that tries connection candidates in priority order until one works. stun is a cheap reflection service: \"what's my public ip:port as seen from outside?\" lets two peers behind nat find a direct path. works for most networks. turn is a relay of last resort: when both peers are behind symmetric nat and can't connect directly, media bounces through the turn server. it costs bandwidth and money, but it's why webrtc \"always connects.\" in an enterprise/factory network, plan for turn — that's a senior-sounding point to raise. congestion control. webrtc adapts bitrate in real time (google congestion control, driven by twcc/remb feedback). under a bad link it lowers resolution/bitrate to protect latency rather than buffering. this is the philosophical opposite of hls: webrtc sacrifices quality to stay live; hls buffers to stay pretty. one-to-many: you need a media server. raw webrtc is peer-to-peer (1:1). to fan one annotated feed out to many operators you put an sfu (selective forwarding unit — e.g. mediasoup, janus, livekit, pion) in the middle: each sender uploads once, the sfu forwards to n viewers. don't try to mesh n peers. naming an sfu signals you've actually shipped this. data channels. webrtc also gives you rtcdatachannel (sctp over dtls) — handy for shipping detection metadata / bounding boxes alongside the video to the same browser with the same low latency. nice for an annotated operator ui. latency: typically 100–500ms — the lowest of the three, end to end. why a vision team cares: serving a live annotated feed to a dashboard, a human-in-the-loop reviewer, a remote operator, or an agent — all in-browser, no install, sub-second. cost / honesty: many moving parts (signaling server, stun, turn relays, possibly an sfu). more to operate than \"point ffmpeg at a url.\" that's the trade for browser reach + lowest latency. fastrtc what it is. a python library (from the gradio / hugging face ecosystem) that wraps webrtc so you can stream audio/video to and from python ml code in a few lines. it stands up the signaling, builds the peer connection, runs the ice/dtls dance for you, and hands your code frames as numpy arrays — then takes your processed frame back and sends it out over webrtc. the programming model (this is the bit that makes it click): # conceptually: you write a handler that gets a frame and returns a frame. from fastrtc import stream def detect(frame): # frame: hxwx3 numpy array (bgr/rgb) boxes = model(frame) # your deepstream/yolo/whatever inference return draw(frame, boxes) # annotated frame goes back out over webrtc stream(handler=detect, modality= \"video\" ).ui.launch() you never touch sdp, ice, or srtp. fastrtc is to webrtc what requests is to raw sockets — it collapses the boilerplate so the interesting code is the model loop. under the hood it builds on aiortc (the pure-python webrtc implementation) and typically uses hugging face's infra for the stun/turn/signaling so it \"just works\" from a notebook or a spaces demo. why it's in the jd. it signals they want someone who can stand up a real-time webrtc ↔ model loop quickly — for browser-facing demos, operator uis, and agent-in-the-loop review — without hand-rolling the webrtc stack. it's the modern python-native path to the same place a custom webrtcbin pipeline would get you. honest, senior framing for the interview: \"i've built real-time inference serving with gunicorn/celery/kafka and gstreamer/deepstream pipelines. fastrtc is the python-native way to wire a live webrtc feed straight into a model and get numpy frames — i'd reach for it for browser-facing low-latency demos and operator uis. for high-density, hardware-accelerated production fan-out i'd still drop to gstreamer webrtcbin or an sfu, but fastrtc gets a working loop up in an afternoon.\" limits to be aware of (so you're not oversold): it's pure-python webrtc ( aiortc ), so it's great for prototypes, demos, and modest concurrency, but it's not the path for hundreds of hardware-decoded streams — that's gstreamer + nvdec + deepstream territory. know which side of that line a given problem is on. how they fit together — the koireader path cameras rtsp, pull rtsp gstreamer rtspsrc · nvdec deepstream infer · track webrtc deliver webrtc · sfu fastrtc ui hls (broadcast only) rtsp in · gstreamer + deepstream in the middle · webrtc out rtsp in from cameras, gstreamer + deepstream in the middle, webrtc out to people rtsp in, webrtc out is the headline. the same rtp machinery runs end to end; gstreamer is the universal adapter in the middle — rtspsrc on the ingress, webrtcbin on the egress — which is exactly why gstreamer + deepstream are the core job and these protocols are the edges of it. why x over y (interview gold) rtsp vs webrtc — when each? rtsp to ingest from cameras (that's what they emit; you're the client pulling). webrtc to deliver to browsers/peers/agents with the lowest latency. a real system uses both : rtsp in, webrtc out. they are not competitors — they live at opposite ends of the pipe. why not just http (hls/dash) for delivery? hls/dash chunk video into segments (and a playlist) → typically 6–30s latency (low-latency hls claws it down to ~2–5s but still loses to webrtc). brilliant for netflix-style scale and cdn caching, wrong for interactive/real-time . rule of thumb: hls = broadcast, webrtc = conversation. if a human needs to act on what they see, webrtc. udp vs tcp for rtsp? udp = lowest latency, tolerates loss (rather skip a frame than wait). tcp = reliable, survives bad networks, what you pick when stability > a few ms. many cameras over flaky factory wifi → force tcp for determinism. why does rtsp need a keepalive? rtsp sessions time out. you send periodic get_parameter / options (or rely on rtcp) to keep the session alive, else the camera tears it down and you must reconnect — which ties directly into fault tolerance (reconnect with backoff, watchdog on the stream). what actually drives the latency number? camera encoder buffer + gop/keyframe interval + network + jitter buffer + decode + your processing. you rarely change the camera; the levers you own are the jitter buffer size, forcing tcp vs udp, gop request (if the camera honors it), and not stacking redundant queues in your own pipeline. webrtc connection fails — what do you check? signaling reachable? stun returning a reflexive candidate? is a turn server configured for symmetric-nat cases? dtls handshake completing? this sequence (the four phases above) is the debugging map. why is webrtc encrypted and rtsp often not? webrtc mandates dtls-srtp — encryption is non-optional. rtsp/rtp is frequently plaintext on a trusted camera lan (rtsps/srtp exist but are less common). security posture differs because their threat models differ: webrtc crosses the public internet to a browser; camera rtsp usually doesn't leave the vlan. 30-second whiteboard summary cameras speak rtsp — a control protocol that sets up an rtp media session; i pull it over tcp in production for stability, with a small jitter buffer, ~1s latency. to deliver live annotated results to a browser i use webrtc : sdp offer/answer over my own signaling server, ice/stun/turn to cross nat, dtls-srtp for encryption, ~200ms. for one-to-many i put an sfu in front. fastrtc is the fast python path to that webrtc loop when i want numpy frames into a model without writing the stack. the whole thing is rtsp in, webrtc out , with gstreamer/deepstream doing the work in the middle. → next: codecs-and-frames.md","words":2340},{"path":"01-video-streaming/codecs-and-frames.md","title":"Codecs, GOP & I/P/B Frames","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"codecs-gop-and-ipb-frames\">Codecs, GOP, and I/P/B Frames<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"A GOP: one keyframe (I) then diffs (P/B)\"><rect class=\"dg-box dg-hot\" x=\"18\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"47\" y=\"76\" text-anchor=\"middle\">I<\/text><rect class=\"dg-box\" x=\"84\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"113\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box\" x=\"150\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"179\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box dg-soft\" x=\"216\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"245\" y=\"76\" text-anchor=\"middle\">B<\/text><rect class=\"dg-box\" x=\"282\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"311\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box\" x=\"348\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"377\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box dg-soft\" x=\"414\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"443\" y=\"76\" text-anchor=\"middle\">B<\/text><rect class=\"dg-box\" x=\"480\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"509\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box\" x=\"546\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"575\" y=\"76\" text-anchor=\"middle\">P<\/text><rect class=\"dg-box dg-hot\" x=\"612\" y=\"44\" width=\"58\" height=\"52\" rx=\"10\"/><text class=\"dg-label\" x=\"641\" y=\"76\" text-anchor=\"middle\">I<\/text><text class=\"dg-sub\" x=\"18\" y=\"28\">one GOP →<\/text><text class=\"dg-sub\" x=\"47\" y=\"124\" text-anchor=\"middle\">keyframe<\/text><text class=\"dg-sub\" x=\"360\" y=\"124\" text-anchor=\"middle\">P = diff from previous<\/text><text class=\"dg-sub\" x=\"640\" y=\"124\" text-anchor=\"middle\">B = past+future<\/text><text class=\"dg-sub\" x=\"360\" y=\"142\" text-anchor=\"middle\">you can only START decoding at an I-frame<\/text><\/svg><figcaption>A GOP: one keyframe (I) then diffs (P/B)<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Video isn't a stream of pictures — it's mostly <em>diffs<\/em>. A keyframe (I) is a full image; P/B frames only store what changed. This is why you can't just \"grab any frame,\" why a lost keyframe wrecks seconds of video, and why GOP size trades latency against bandwidth.<\/div><\/div>\n<h2 id=\"the-intuition\">The intuition<\/h2>\n<p>Imagine mailing a friend a flipbook. Instead of redrawing every page, you send one full drawing (the <strong>I-frame<\/strong>), then tiny notes: \"page 2: move the ball 3cm right\" (a <strong>P-frame<\/strong>). Cheap to send, but if the full drawing is lost, every \"move the ball\" note after it is meaningless until the next full drawing arrives.<\/p>\n<h2 id=\"frame-types\">Frame types<\/h2>\n<ul><li><strong>I-frame (Intra / keyframe):<\/strong> complete standalone image. Big. Decodable alone.<\/li><li><strong>P-frame (Predicted):<\/strong> stores changes from the <em>previous<\/em> frame. Small.<\/li><li><strong>B-frame (Bi-directional):<\/strong> references <em>past and future<\/em> frames. Smallest, but<\/li><\/ul>\n<p>adds latency (decoder must wait for the future frame) → <strong>many low-latency   pipelines disable B-frames.<\/strong><\/p>\n<h2 id=\"gop-group-of-pictures\">GOP (Group of Pictures)<\/h2>\n<p>The pattern between keyframes, e.g. <code>IPPPPPP...<\/code> repeating every N frames.<\/p>\n<ul><li><strong>Short GOP<\/strong> (frequent keyframes) → faster recovery after loss, faster stream<\/li><\/ul>\n<p>start/seek, <strong>more bandwidth<\/strong>.<\/p>\n<ul><li><strong>Long GOP<\/strong> → less bandwidth, but a lost keyframe means longer corruption and<\/li><\/ul>\n<p>slower join time.<\/p>\n<ul><li><strong>You can only cleanly start decoding / reconnect at an I-frame.<\/strong> That's why a<\/li><\/ul>\n<p>freshly connected stream may show gray/garbage until the first keyframe.<\/p>\n<h2 id=\"codecs-youll-name\">Codecs you'll name<\/h2>\n<ul><li><strong>H.264 (AVC):<\/strong> the default everywhere. Universal hardware decode. Safe answer.<\/li><li><strong>H.265 (HEVC):<\/strong> ~50% less bandwidth at same quality; heavier to decode,<\/li><\/ul>\n<p>licensing friction. Good for many-camera bandwidth savings if HW supports it.<\/p>\n<ul><li><strong>MJPEG:<\/strong> every frame is a standalone JPEG (all I-frames). No inter-frame<\/li><\/ul>\n<p>compression → huge bandwidth, but zero inter-frame latency and trivial frame   extraction. Some industrial cams use it.<\/p>\n<ul><li><strong>AV1:<\/strong> royalty-free, great compression, decode still maturing on edge HW.<\/li><\/ul>\n<h2 id=\"why-this-matters-for-the-jd\">Why this matters for the JD<\/h2>\n<p><strong>\"Handle frame buffers, decoding efficiently\"<\/strong> → you must understand that:<\/p>\n<ol><li>You decode <em>packets<\/em>, and a decoder needs a keyframe to start.<\/li><li>Dropping a P/B frame is survivable; dropping an I-frame corrupts the GOP.<\/li><li>If you reconnect, you wait for the next keyframe — budget for that gray period.<\/li><\/ol>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>H.264 vs H.265 for 50 cameras?<\/strong> H.265 halves bandwidth/storage — attractive at scale — but costs more decode compute and has licensing complexity. Pick H.265 <em>only if<\/em> your decode hardware (Jetson NVDEC, GPU) supports it and CPU/GPU headroom exists; otherwise H.264 is the reliable default.<\/p>\n<p><strong>Why disable B-frames for live inference?<\/strong> B-frames reference future frames, so the decoder must reorder and wait → added latency and jitter. For \"obsess over milliseconds,\" an <code>IPPP<\/code> (no-B) GOP is lower-latency and simpler to reason about.<\/p>\n<p><strong>Why does latency spike right after reconnect?<\/strong> You can only resume at an I-frame. With a long GOP you may wait up to one GOP interval for the next keyframe. Mitigation: request shorter GOP on the camera, or ask for an on-demand IDR (instantaneous decoder refresh) if supported.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"decode-encode-pipeline.md\" href=\"#\">decode-encode-pipeline.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-intuition","text":"The intuition"},{"level":2,"id":"frame-types","text":"Frame types"},{"level":2,"id":"gop-group-of-pictures","text":"GOP (Group of Pictures)"},{"level":2,"id":"codecs-youll-name","text":"Codecs you'll name"},{"level":2,"id":"why-this-matters-for-the-jd","text":"Why this matters for the JD"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"codecs, gop, and i/p/b frames i p p b p p b p p i one gop → keyframe p = diff from previous b = past+future you can only start decoding at an i-frame a gop: one keyframe (i) then diffs (p/b) 💡 tl;dr video isn't a stream of pictures — it's mostly diffs . a keyframe (i) is a full image; p/b frames only store what changed. this is why you can't just \"grab any frame,\" why a lost keyframe wrecks seconds of video, and why gop size trades latency against bandwidth. the intuition imagine mailing a friend a flipbook. instead of redrawing every page, you send one full drawing (the i-frame ), then tiny notes: \"page 2: move the ball 3cm right\" (a p-frame ). cheap to send, but if the full drawing is lost, every \"move the ball\" note after it is meaningless until the next full drawing arrives. frame types i-frame (intra / keyframe): complete standalone image. big. decodable alone. p-frame (predicted): stores changes from the previous frame. small. b-frame (bi-directional): references past and future frames. smallest, but adds latency (decoder must wait for the future frame) → many low-latency pipelines disable b-frames. gop (group of pictures) the pattern between keyframes, e.g. ipppppp... repeating every n frames. short gop (frequent keyframes) → faster recovery after loss, faster stream start/seek, more bandwidth . long gop → less bandwidth, but a lost keyframe means longer corruption and slower join time. you can only cleanly start decoding / reconnect at an i-frame. that's why a freshly connected stream may show gray/garbage until the first keyframe. codecs you'll name h.264 (avc): the default everywhere. universal hardware decode. safe answer. h.265 (hevc): ~50% less bandwidth at same quality; heavier to decode, licensing friction. good for many-camera bandwidth savings if hw supports it. mjpeg: every frame is a standalone jpeg (all i-frames). no inter-frame compression → huge bandwidth, but zero inter-frame latency and trivial frame extraction. some industrial cams use it. av1: royalty-free, great compression, decode still maturing on edge hw. why this matters for the jd \"handle frame buffers, decoding efficiently\" → you must understand that: you decode packets , and a decoder needs a keyframe to start. dropping a p/b frame is survivable; dropping an i-frame corrupts the gop. if you reconnect, you wait for the next keyframe — budget for that gray period. why x over y h.264 vs h.265 for 50 cameras? h.265 halves bandwidth/storage — attractive at scale — but costs more decode compute and has licensing complexity. pick h.265 only if your decode hardware (jetson nvdec, gpu) supports it and cpu/gpu headroom exists; otherwise h.264 is the reliable default. why disable b-frames for live inference? b-frames reference future frames, so the decoder must reorder and wait → added latency and jitter. for \"obsess over milliseconds,\" an ippp (no-b) gop is lower-latency and simpler to reason about. why does latency spike right after reconnect? you can only resume at an i-frame. with a long gop you may wait up to one gop interval for the next keyframe. mitigation: request shorter gop on the camera, or ask for an on-demand idr (instantaneous decoder refresh) if supported. → next: decode-encode-pipeline.md","words":532},{"path":"01-video-streaming/decode-encode-pipeline.md","title":"Decode / Encode Pipeline","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"from-packet-to-numpy-the-decode-pipeline\">From Packet to NumPy: The Decode Pipeline<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> A frame's journey is: network packets → depacketize → decode (turn compressed bitstream into raw pixels) → color convert (NV12/YUV → BGR/RGB) → hand to your model. The single biggest performance lever is <strong>decoding on the GPU (NVDEC)<\/strong> and <strong>keeping pixels on the GPU<\/strong> so you never pay the CPU↔GPU copy tax.<\/div><\/div>\n<h2 id=\"the-full-path\">The full path<\/h2>\n<pre><code>RTSP/RTP packets\n   → depayload (rtph264depay)        # strip RTP, get raw H.264 bitstream\n   → parse (h264parse)               # find frame boundaries, NAL units\n   → DECODE                          # bitstream → raw frame (YUV/NV12)\n        ├─ CPU: avdec_h264 (FFmpeg)  # portable, burns CPU\n        └─ GPU: nvv4l2decoder/NVDEC  # hardware, frees CPU, stays in GPU mem\n   → color convert (NV12 → BGR)      # models usually want BGR/RGB\n   → (optional resize/crop)\n   → frame ready  → inference<\/code><\/pre>\n<h2 id=\"cpu-decode-vs-hardware-decode-the-key-decision\">CPU decode vs hardware decode (the key decision)<\/h2>\n<ul><li><strong>CPU decode<\/strong> (<code>avdec_h264<\/code>, OpenCV's default <code>cv2.VideoCapture<\/code>): simple,<\/li><\/ul>\n<p>portable, but <strong>one or two 1080p H.264 streams can saturate several CPU cores.<\/strong>   Does not scale to \"multiple RTSP streams.\"<\/p>\n<ul><li><strong>Hardware decode<\/strong> (NVIDIA <strong>NVDEC<\/strong> via <code>nvv4l2decoder<\/code>/DeepStream, or VA-API<\/li><\/ul>\n<p>on Intel): a dedicated silicon block decodes video, leaving CPU/GPU compute free.   A single Jetson/GPU can decode dozens of streams. <strong>This is the scalable answer.<\/strong><\/p>\n<blockquote><p>Interview line: <em>\"<code>cv2.VideoCapture<\/code> is fine for a prototype, but it decodes on the CPU and copies every frame to host memory. At multi-camera scale I'd decode on NVDEC through GStreamer/DeepStream and keep frames in GPU memory so inference reads them with zero copy.\"<\/em><\/p><\/blockquote>\n<h2 id=\"the-hidden-killer-cpugpu-memory-copies\">The hidden killer: CPU↔GPU memory copies<\/h2>\n<p>Every <code>numpy<\/code> frame on the CPU that you push to the GPU for inference is a <strong>PCIe copy<\/strong> — and back again for post-processing. At 30fps × N cameras that copy bandwidth becomes your bottleneck.<\/p>\n<ul><li><strong>Zero-copy goal:<\/strong> decode on GPU → infer on GPU → only pull the <em>small<\/em> result<\/li><\/ul>\n<p>(boxes, labels) back to CPU. Never round-trip full frames.<\/p>\n<ul><li>DeepStream's <code>NvBufSurface<\/code> and CUDA unified memory exist precisely for this.<\/li><\/ul>\n<h2 id=\"opencvs-role-and-its-trap\">OpenCV's role (and its trap)<\/h2>\n<ul><li><code>cv2.VideoCapture(\"rtsp://...\")<\/code> uses FFmpeg under the hood — great for quick<\/li><\/ul>\n<p>work, but: CPU decode, an internal buffer that grows latency, and silent   reconnect behavior you don't control.<\/p>\n<ul><li>For production multi-stream you drive <strong>GStreamer<\/strong> and use OpenCV only for the<\/li><\/ul>\n<p>image-processing math (geometry, color spaces, warps) it's genuinely good at.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># Pulling frames from a GStreamer pipeline into OpenCV via appsink<\/span>\ncap = <span class=\"tok-builtin\">cv2<\/span>.VideoCapture(\n    <span class=\"tok-string\">\"rtspsrc location=rtsp://cam latency=100 ! rtph264depay ! h264parse ! \"<\/span>\n    <span class=\"tok-string\">\"nvv4l2decoder ! nvvidconv ! video/x-raw,format=BGRx ! \"<\/span>\n    <span class=\"tok-string\">\"videoconvert ! video/x-raw,format=BGR ! appsink drop=1 max-buffers=1\"<\/span>,\n    <span class=\"tok-builtin\">cv2<\/span>.CAP_GSTREAMER,\n)<\/code><\/pre>\n<p>Note <code>drop=1 max-buffers=1<\/code> — that's the backpressure knob (next file).<\/p>\n<h2 id=\"encoding-the-way-back-out\">Encoding (the way back out)<\/h2>\n<p>If you serve an annotated stream (WebRTC/RTSP out, or save clips), you <strong>encode<\/strong>: raw frame → NVENC (hardware H.264/H.265) → mux → transport. Use <strong>NVENC<\/strong>, not CPU x264, for the same scaling reasons. NVDEC and NVENC are separate silicon blocks, so you can decode and encode concurrently.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong><code>cv2.VideoCapture<\/code> vs GStreamer pipeline?<\/strong> VideoCapture = fast to write, CPU-bound, opaque buffering. GStreamer = explicit control over decode hardware, buffering, and threading; scales to many streams. Prototype with the first, ship with the second.<\/p>\n<p><strong>Software vs hardware decode?<\/strong> Software = portable, no special HW, but CPU-bound and won't scale past a couple streams. Hardware (NVDEC) = scales to dozens, frees CPU, keeps frames on GPU for zero-copy inference. At KoiReader scale, hardware every time.<\/p>\n<p><strong>Why is color conversion (NV12→BGR) a real cost?<\/strong> Decoders output YUV/NV12; models want BGR/RGB. The convert is per-pixel per-frame. Do it on the GPU (<code>nvvidconv<\/code>) — doing it on CPU re-introduces the copy + compute you just avoided.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"frame-buffers-backpressure.md\" href=\"#\">frame-buffers-backpressure.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-full-path","text":"The full path"},{"level":2,"id":"cpu-decode-vs-hardware-decode-the-key-decision","text":"CPU decode vs hardware decode (the key decision)"},{"level":2,"id":"the-hidden-killer-cpugpu-memory-copies","text":"The hidden killer: CPU↔GPU memory copies"},{"level":2,"id":"opencvs-role-and-its-trap","text":"OpenCV's role (and its trap)"},{"level":2,"id":"encoding-the-way-back-out","text":"Encoding (the way back out)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"from packet to numpy: the decode pipeline 💡 tl;dr a frame's journey is: network packets → depacketize → decode (turn compressed bitstream into raw pixels) → color convert (nv12/yuv → bgr/rgb) → hand to your model. the single biggest performance lever is decoding on the gpu (nvdec) and keeping pixels on the gpu so you never pay the cpu↔gpu copy tax. the full path rtsp/rtp packets → depayload (rtph264depay) # strip rtp, get raw h.264 bitstream → parse (h264parse) # find frame boundaries, nal units → decode # bitstream → raw frame (yuv/nv12) ├─ cpu: avdec_h264 (ffmpeg) # portable, burns cpu └─ gpu: nvv4l2decoder/nvdec # hardware, frees cpu, stays in gpu mem → color convert (nv12 → bgr) # models usually want bgr/rgb → (optional resize/crop) → frame ready → inference cpu decode vs hardware decode (the key decision) cpu decode ( avdec_h264 , opencv's default cv2.videocapture ): simple, portable, but one or two 1080p h.264 streams can saturate several cpu cores. does not scale to \"multiple rtsp streams.\" hardware decode (nvidia nvdec via nvv4l2decoder /deepstream, or va-api on intel): a dedicated silicon block decodes video, leaving cpu/gpu compute free. a single jetson/gpu can decode dozens of streams. this is the scalable answer. interview line: \" cv2.videocapture is fine for a prototype, but it decodes on the cpu and copies every frame to host memory. at multi-camera scale i'd decode on nvdec through gstreamer/deepstream and keep frames in gpu memory so inference reads them with zero copy.\" the hidden killer: cpu↔gpu memory copies every numpy frame on the cpu that you push to the gpu for inference is a pcie copy — and back again for post-processing. at 30fps × n cameras that copy bandwidth becomes your bottleneck. zero-copy goal: decode on gpu → infer on gpu → only pull the small result (boxes, labels) back to cpu. never round-trip full frames. deepstream's nvbufsurface and cuda unified memory exist precisely for this. opencv's role (and its trap) cv2.videocapture(\"rtsp://...\") uses ffmpeg under the hood — great for quick work, but: cpu decode, an internal buffer that grows latency, and silent reconnect behavior you don't control. for production multi-stream you drive gstreamer and use opencv only for the image-processing math (geometry, color spaces, warps) it's genuinely good at. # pulling frames from a gstreamer pipeline into opencv via appsink cap = cv2 .videocapture( \"rtspsrc location=rtsp://cam latency=100 ! rtph264depay ! h264parse ! \" \"nvv4l2decoder ! nvvidconv ! video/x-raw,format=bgrx ! \" \"videoconvert ! video/x-raw,format=bgr ! appsink drop=1 max-buffers=1\" , cv2 .cap_gstreamer, ) note drop=1 max-buffers=1 — that's the backpressure knob (next file). encoding (the way back out) if you serve an annotated stream (webrtc/rtsp out, or save clips), you encode : raw frame → nvenc (hardware h.264/h.265) → mux → transport. use nvenc , not cpu x264, for the same scaling reasons. nvdec and nvenc are separate silicon blocks, so you can decode and encode concurrently. why x over y cv2.videocapture vs gstreamer pipeline? videocapture = fast to write, cpu-bound, opaque buffering. gstreamer = explicit control over decode hardware, buffering, and threading; scales to many streams. prototype with the first, ship with the second. software vs hardware decode? software = portable, no special hw, but cpu-bound and won't scale past a couple streams. hardware (nvdec) = scales to dozens, frees cpu, keeps frames on gpu for zero-copy inference. at koireader scale, hardware every time. why is color conversion (nv12→bgr) a real cost? decoders output yuv/nv12; models want bgr/rgb. the convert is per-pixel per-frame. do it on the gpu ( nvvidconv ) — doing it on cpu re-introduces the copy + compute you just avoided. → next: frame-buffers-backpressure.md","words":603},{"path":"01-video-streaming/frame-buffers-backpressure.md","title":"Frame Buffers & Backpressure","section":"1 · Video Streaming","quiz":false,"accent":"#14a3a3","html":"<h1 id=\"frame-buffers-backpressure\">Frame Buffers &amp; Backpressure<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 160\" role=\"img\" aria-label=\"Bounded buffer: keep the newest frame, drop the rest\"><rect class=\"dg-box\" x=\"20\" y=\"50\" width=\"150\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"95\" y=\"78\" text-anchor=\"middle\">Camera<\/text><text class=\"dg-sub\" x=\"95\" y=\"95\" text-anchor=\"middle\">30 fps<\/text><line class=\"dg-line\" x1=\"170\" y1=\"80\" x2=\"243\" y2=\"80\"/><polygon class=\"dg-arrow\" points=\"243,75 250,80 243,85\"/><rect class=\"dg-box dg-hot\" x=\"250\" y=\"50\" width=\"70\" height=\"60\" rx=\"10\"/><text class=\"dg-label\" x=\"285\" y=\"86\" text-anchor=\"middle\">▣<\/text><rect class=\"dg-box dg-soft\" x=\"324\" y=\"50\" width=\"70\" height=\"60\" rx=\"10\"/><text class=\"dg-sub\" x=\"359\" y=\"86\" text-anchor=\"middle\">dropped<\/text><text class=\"dg-sub\" x=\"322\" y=\"38\" text-anchor=\"middle\">maxlen = 1 · keep latest<\/text><line class=\"dg-line\" x1=\"394\" y1=\"80\" x2=\"467\" y2=\"80\"/><polygon class=\"dg-arrow\" points=\"467,75 474,80 467,85\"/><rect class=\"dg-box\" x=\"474\" y=\"50\" width=\"150\" height=\"60\" rx=\"12\"/><text class=\"dg-label\" x=\"549\" y=\"78\" text-anchor=\"middle\">Model<\/text><text class=\"dg-sub\" x=\"549\" y=\"95\" text-anchor=\"middle\">22 fps<\/text><text class=\"dg-sub\" x=\"549\" y=\"135\" text-anchor=\"middle\">slower → would pile up<\/text><text class=\"dg-sub\" x=\"95\" y=\"135\" text-anchor=\"middle\">producer<\/text><\/svg><figcaption>Bounded buffer: keep the newest frame, drop the rest<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Cameras produce frames at a fixed rate; your model consumes them at a variable rate. When the model is slower than the camera, frames pile up. You have exactly three choices: <strong>buffer<\/strong> (latency grows), <strong>drop<\/strong> (stay real-time), or <strong>block<\/strong> (stall the source). For live inference the right default is almost always <strong>drop the oldest, keep latest<\/strong>.<\/div><\/div>\n<h2 id=\"the-core-problem-producerconsumer-mismatch\">The core problem (producer/consumer mismatch)<\/h2>\n<pre><code>Camera @ 30fps  ──&gt;  [ queue ]  ──&gt;  Model @ 22fps\n   producer          buffer            consumer (slower!)<\/code><\/pre>\n<p>If producer &gt; consumer forever, the queue grows without bound → <strong>memory leak, ever-increasing latency<\/strong>, eventual OOM crash. This is the #1 way naive video pipelines die in production. The JD's \"without memory leaks\" and \"manage resources in long-running processes\" point straight here.<\/p>\n<h2 id=\"the-three-strategies\">The three strategies<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Strategy<\/th><th>What happens<\/th><th>Use when<\/th><\/tr><\/thead><tbody><tr><td><strong>Bounded queue + drop oldest<\/strong><\/td><td>Keep newest frame, discard stale<\/td><td><strong>Live inference<\/strong> — you want <em>current<\/em> reality, not a backlog<\/td><\/tr><tr><td><strong>Bounded queue + block<\/strong><\/td><td>Source waits for consumer<\/td><td>Offline/batch processing of recorded video where every frame matters<\/td><\/tr><tr><td><strong>Unbounded queue<\/strong><\/td><td>Grows forever<\/td><td><strong>Never<\/strong> in production — this is the bug, not a strategy<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Latency vs completeness is the tradeoff.<\/strong> A live anomaly detector wants the <em>latest<\/em> frame (drop). A forensic counting job on a recording wants <em>every<\/em> frame (block + bounded).<\/p>\n<h2 id=\"how-you-actually-express-drop\">How you actually express \"drop\"<\/h2>\n<p>GStreamer:<\/p>\n<pre><code>appsink drop=true max-buffers=1   # only ever hold the newest frame\n# or on a leaky queue element:\nqueue max-size-buffers=2 leaky=downstream<\/code><\/pre>\n<p>Python (your own thread):<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">from<\/span> collections <span class=\"tok-keyword\">import<\/span> deque\nframe_buf = deque(maxlen=<span class=\"tok-number\">1<\/span>)        <span class=\"tok-comment\"># bounded; appending evicts the old frame<\/span>\n<span class=\"tok-comment\"># producer thread:<\/span>\nframe_buf.append(frame)            <span class=\"tok-comment\"># never blocks, never grows<\/span>\n<span class=\"tok-comment\"># consumer thread:<\/span>\nframe = frame_buf[-<span class=\"tok-number\">1<\/span>] <span class=\"tok-keyword\">if<\/span> frame_buf <span class=\"tok-keyword\">else<\/span> <span class=\"tok-keyword\">None<\/span><\/code><\/pre>\n<p>A <code>deque(maxlen=N)<\/code> or a <code>queue.Queue(maxsize=N)<\/code> with <code>put_nowait<\/code> + drop-on-full is the canonical \"crash-proof buffer.\"<\/p>\n<h2 id=\"latency-vs-jitter-dont-confuse-them\">Latency vs jitter (don't confuse them)<\/h2>\n<ul><li><strong>Latency<\/strong> = how old the frame is when you act on it.<\/li><li><strong>Jitter<\/strong> = variation in frame arrival timing.<\/li><li>A <em>small<\/em> jitter buffer smooths bursty networks; a <em>large<\/em> one trades latency<\/li><\/ul>\n<p>for smoothness. RTSP <code>latency=<\/code> and GStreamer <code>rtpjitterbuffer<\/code> tune this.   For \"obsess over milliseconds,\" keep it small (~100–200ms).<\/p>\n<h2 id=\"backpressure-across-stages\">Backpressure across stages<\/h2>\n<p>In a multi-stage pipeline (decode → infer → analytics → DB), the <em>slowest stage<\/em> sets the pace. Each stage needs a bounded buffer in front of it so a slow DB write can't back up into dropped <em>decoded<\/em> frames silently. Design rule: <strong>bound every queue, and decide the drop policy per stage.<\/strong><\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Drop frames vs buffer them?<\/strong> Live = drop (you want now, not a backlog; buffering inflates latency forever if you can't catch up). Recorded/offline = buffer/block (correctness over latency).<\/p>\n<p><strong>Why <code>maxsize=1<\/code> instead of a big buffer for live inference?<\/strong> A big buffer just means you're always acting on old frames during any slowdown. Size 1–2 keeps you on the freshest frame; if you fall behind you skip, not lag.<\/p>\n<p><strong>queue.Queue vs collections.deque for the buffer?<\/strong> <code>queue.Queue<\/code> is thread-safe with blocking/timeout semantics (good for producer/consumer with backpressure signaling). <code>deque(maxlen=N)<\/code> is lock-free-ish for simple append/peek and auto-evicts — great for \"latest frame only.\" Pick Queue when you need blocking/coordination, deque for pure latest-wins.<\/p>\n<p><strong>What causes the classic video-pipeline memory leak?<\/strong> An unbounded queue (consumer slower than producer) <strong>or<\/strong> holding references to decoded frames (GPU surfaces) you never release. Fix: bound the queue + explicitly free/unmap GPU buffers each iteration.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../02-gstreamer/README.md\" href=\"#\">02-gstreamer/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-core-problem-producerconsumer-mismatch","text":"The core problem (producer/consumer mismatch)"},{"level":2,"id":"the-three-strategies","text":"The three strategies"},{"level":2,"id":"how-you-actually-express-drop","text":"How you actually express \"drop\""},{"level":2,"id":"latency-vs-jitter-dont-confuse-them","text":"Latency vs jitter (don't confuse them)"},{"level":2,"id":"backpressure-across-stages","text":"Backpressure across stages"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"frame buffers & backpressure camera 30 fps ▣ dropped maxlen = 1 · keep latest model 22 fps slower → would pile up producer bounded buffer: keep the newest frame, drop the rest 💡 tl;dr cameras produce frames at a fixed rate; your model consumes them at a variable rate. when the model is slower than the camera, frames pile up. you have exactly three choices: buffer (latency grows), drop (stay real-time), or block (stall the source). for live inference the right default is almost always drop the oldest, keep latest . the core problem (producer/consumer mismatch) camera @ 30fps ──> [ queue ] ──> model @ 22fps producer buffer consumer (slower!) if producer > consumer forever, the queue grows without bound → memory leak, ever-increasing latency , eventual oom crash. this is the #1 way naive video pipelines die in production. the jd's \"without memory leaks\" and \"manage resources in long-running processes\" point straight here. the three strategies strategy what happens use when bounded queue + drop oldest keep newest frame, discard stale live inference — you want current reality, not a backlog bounded queue + block source waits for consumer offline/batch processing of recorded video where every frame matters unbounded queue grows forever never in production — this is the bug, not a strategy latency vs completeness is the tradeoff. a live anomaly detector wants the latest frame (drop). a forensic counting job on a recording wants every frame (block + bounded). how you actually express \"drop\" gstreamer: appsink drop=true max-buffers=1 # only ever hold the newest frame # or on a leaky queue element: queue max-size-buffers=2 leaky=downstream python (your own thread): from collections import deque frame_buf = deque(maxlen= 1 ) # bounded; appending evicts the old frame # producer thread: frame_buf.append(frame) # never blocks, never grows # consumer thread: frame = frame_buf[- 1 ] if frame_buf else none a deque(maxlen=n) or a queue.queue(maxsize=n) with put_nowait + drop-on-full is the canonical \"crash-proof buffer.\" latency vs jitter (don't confuse them) latency = how old the frame is when you act on it. jitter = variation in frame arrival timing. a small jitter buffer smooths bursty networks; a large one trades latency for smoothness. rtsp latency= and gstreamer rtpjitterbuffer tune this. for \"obsess over milliseconds,\" keep it small (~100–200ms). backpressure across stages in a multi-stage pipeline (decode → infer → analytics → db), the slowest stage sets the pace. each stage needs a bounded buffer in front of it so a slow db write can't back up into dropped decoded frames silently. design rule: bound every queue, and decide the drop policy per stage. why x over y drop frames vs buffer them? live = drop (you want now, not a backlog; buffering inflates latency forever if you can't catch up). recorded/offline = buffer/block (correctness over latency). why maxsize=1 instead of a big buffer for live inference? a big buffer just means you're always acting on old frames during any slowdown. size 1–2 keeps you on the freshest frame; if you fall behind you skip, not lag. queue.queue vs collections.deque for the buffer? queue.queue is thread-safe with blocking/timeout semantics (good for producer/consumer with backpressure signaling). deque(maxlen=n) is lock-free-ish for simple append/peek and auto-evicts — great for \"latest frame only.\" pick queue when you need blocking/coordination, deque for pure latest-wins. what causes the classic video-pipeline memory leak? an unbounded queue (consumer slower than producer) or holding references to decoded frames (gpu surfaces) you never release. fix: bound the queue + explicitly free/unmap gpu buffers each iteration. → back to section readme · next section: 02-gstreamer/","words":594},{"path":"02-gstreamer/README.md","title":"Overview","section":"2 · GStreamer","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"02-gstreamer-and-deepstream\">02 — GStreamer (and DeepStream)<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> GStreamer is a pipeline framework: you connect small <strong>elements<\/strong> (source → decode → convert → sink) into a graph, and media flows through as <strong>buffers<\/strong>. It's how you get hardware-accelerated, multi-stream video into your model. DeepStream is NVIDIA's GStreamer plugin set that bolts inference + tracking<\/div><\/div>\n<ul><li>analytics directly into that pipeline.<\/li><\/ul>\n<p>This is <em>the<\/em> tool the JD names twice. You've used it (Integration Wizards + DeepStream on Jetson) — this section makes sure you can talk about it fluently.<\/p>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"pipeline-model.md\" href=\"#\">pipeline-model.md<\/a> — elements, pads, caps, bins, bus<\/li><li><a class=\"mdlink\" data-href=\"appsink-and-python.md\" href=\"#\">appsink-and-python.md<\/a> — getting frames into Python/OpenCV<\/li><li><a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a> — inference inside the pipeline, multi-stream batching<\/li><\/ol>\n<h2 id=\"the-one-paragraph-pitch-memorize\">The one-paragraph pitch (memorize)<\/h2>\n<p><em>\"GStreamer models video as a directed graph of elements connected by pads. Source elements produce buffers, transform elements (decoders, converters) process them, sink elements consume them. Capabilities (caps) negotiate format between pads. Each element can run on its own thread via <code>queue<\/code> elements, so a pipeline is naturally concurrent. For NVIDIA, DeepStream adds <code>nvstreammux<\/code> to batch many camera streams into one inference call, <code>nvinfer<\/code> for TensorRT inference, and <code>nvtracker<\/code> for multi-object tracking — all keeping frames in GPU memory.\"<\/em><\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"pipeline-model.md\" href=\"#\">pipeline-model.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-one-paragraph-pitch-memorize","text":"The one-paragraph pitch (memorize)"}],"text":"02 — gstreamer (and deepstream) 💡 tl;dr gstreamer is a pipeline framework: you connect small elements (source → decode → convert → sink) into a graph, and media flows through as buffers . it's how you get hardware-accelerated, multi-stream video into your model. deepstream is nvidia's gstreamer plugin set that bolts inference + tracking analytics directly into that pipeline. this is the tool the jd names twice. you've used it (integration wizards + deepstream on jetson) — this section makes sure you can talk about it fluently. files: pipeline-model.md — elements, pads, caps, bins, bus appsink-and-python.md — getting frames into python/opencv deepstream.md — inference inside the pipeline, multi-stream batching the one-paragraph pitch (memorize) \"gstreamer models video as a directed graph of elements connected by pads. source elements produce buffers, transform elements (decoders, converters) process them, sink elements consume them. capabilities (caps) negotiate format between pads. each element can run on its own thread via queue elements, so a pipeline is naturally concurrent. for nvidia, deepstream adds nvstreammux to batch many camera streams into one inference call, nvinfer for tensorrt inference, and nvtracker for multi-object tracking — all keeping frames in gpu memory.\" → start: pipeline-model.md","words":195},{"path":"02-gstreamer/pipeline-model.md","title":"Pipeline Model","section":"2 · GStreamer","quiz":false,"accent":"#8b6dff","html":"<h1 id=\"the-gstreamer-pipeline-model\">The GStreamer Pipeline Model<\/h1>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 140\" role=\"img\" aria-label=\"A GStreamer pipeline: elements linked by pads\"><rect class=\"dg-box\" x=\"14\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"66\" y=\"76\" text-anchor=\"middle\">rtspsrc<\/text><text class=\"dg-sub\" x=\"66\" y=\"93\" text-anchor=\"middle\">pull<\/text><text class=\"dg-accent-tx\" x=\"130\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"118\" y1=\"78\" x2=\"123\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"123,73 130,78 123,83\"/><rect class=\"dg-box\" x=\"130\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"182\" y=\"76\" text-anchor=\"middle\">depay<\/text><text class=\"dg-sub\" x=\"182\" y=\"93\" text-anchor=\"middle\">strip RTP<\/text><text class=\"dg-accent-tx\" x=\"246\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"234\" y1=\"78\" x2=\"239\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"239,73 246,78 239,83\"/><rect class=\"dg-box\" x=\"246\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"298\" y=\"76\" text-anchor=\"middle\">parse<\/text><text class=\"dg-sub\" x=\"298\" y=\"93\" text-anchor=\"middle\">frames<\/text><text class=\"dg-accent-tx\" x=\"362\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"350\" y1=\"78\" x2=\"355\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"355,73 362,78 355,83\"/><rect class=\"dg-box dg-hot\" x=\"362\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"414\" y=\"76\" text-anchor=\"middle\">decoder<\/text><text class=\"dg-sub\" x=\"414\" y=\"93\" text-anchor=\"middle\">NVDEC<\/text><text class=\"dg-accent-tx\" x=\"478\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"466\" y1=\"78\" x2=\"471\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"471,73 478,78 471,83\"/><rect class=\"dg-box\" x=\"478\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"530\" y=\"76\" text-anchor=\"middle\">convert<\/text><text class=\"dg-sub\" x=\"530\" y=\"93\" text-anchor=\"middle\">NV12→BGR<\/text><text class=\"dg-accent-tx\" x=\"594\" y=\"0\"><\/text><line class=\"dg-line\" x1=\"582\" y1=\"78\" x2=\"587\" y2=\"78\"/><polygon class=\"dg-arrow\" points=\"587,73 594,78 587,83\"/><rect class=\"dg-box\" x=\"594\" y=\"50\" width=\"104\" height=\"56\" rx=\"12\"/><text class=\"dg-label\" x=\"646\" y=\"76\" text-anchor=\"middle\">appsink<\/text><text class=\"dg-sub\" x=\"646\" y=\"93\" text-anchor=\"middle\">→ Python<\/text><text class=\"dg-sub\" x=\"360\" y=\"28\" text-anchor=\"middle\">elements linked by pads · each ! is a connection · queue = thread boundary<\/text><\/svg><figcaption>A GStreamer pipeline: elements linked by pads<\/figcaption><\/figure>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Elements are LEGO bricks. Pads are the studs that connect them. Caps are the rule that says \"these two bricks fit.\" Buffers are the data flowing through. The bus is the intercom that tells your app about errors and end-of-stream.<\/div><\/div>\n<h2 id=\"the-pieces\">The pieces<\/h2>\n<ul><li><strong>Element<\/strong> — one processing unit: <code>rtspsrc<\/code>, <code>h264parse<\/code>, <code>nvv4l2decoder<\/code>,<\/li><\/ul>\n<p><code>nvvidconv<\/code>, <code>appsink<\/code>. Has a state (NULL → READY → PAUSED → PLAYING).<\/p>\n<ul><li><strong>Pad<\/strong> — an element's input (<strong>sink pad<\/strong>) or output (<strong>source pad<\/strong>). Data<\/li><\/ul>\n<p>enters sink pads, leaves source pads. (Confusingly, a \"sink <em>element<\/em>\" is the   final consumer, while a \"sink <em>pad<\/em>\" is any input port.)<\/p>\n<ul><li><strong>Caps (capabilities)<\/strong> — the format contract negotiated between pads, e.g.<\/li><\/ul>\n<p><code>video/x-raw,format=NV12,width=1920,height=1080,framerate=30/1<\/code>. Mismatched caps   = pipeline won't link.<\/p>\n<ul><li><strong>Buffer<\/strong> — a chunk of data (usually one frame) flowing downstream, with a<\/li><\/ul>\n<p>timestamp (PTS).<\/p>\n<ul><li><strong>Bin / Pipeline<\/strong> — a container of elements. The top-level <code>Pipeline<\/code> is a bin<\/li><\/ul>\n<p>that also owns the clock and bus.<\/p>\n<ul><li><strong>Bus<\/strong> — the message channel from pipeline → your app: <code>EOS<\/code> (end of stream),<\/li><\/ul>\n<p><code>ERROR<\/code>, <code>WARNING<\/code>, state changes. <strong>You watch the bus to detect a dead camera.<\/strong><\/p>\n<h2 id=\"a-pipeline-in-words\">A pipeline in words<\/h2>\n<p>The <code>!<\/code> is shorthand for \"link the source pad of the left element to the sink pad of the right element\":<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"Each '!' connects an output (source) pad to the next element's input (sink) pad\"><rect class=\"dg-box\" x=\"96\" y=\"54\" width=\"190\" height=\"64\" rx=\"12\"/><text class=\"dg-label\" x=\"191\" y=\"90\" text-anchor=\"middle\">h264parse<\/text><rect class=\"dg-accent-soft\" x=\"278\" y=\"74\" width=\"22\" height=\"24\" rx=\"4\"/><text class=\"dg-sub\" x=\"289\" y=\"48\" text-anchor=\"middle\">src pad<\/text><rect class=\"dg-box\" x=\"434\" y=\"54\" width=\"190\" height=\"64\" rx=\"12\"/><text class=\"dg-label\" x=\"529\" y=\"90\" text-anchor=\"middle\">nvv4l2decoder<\/text><rect class=\"dg-accent-soft\" x=\"420\" y=\"74\" width=\"22\" height=\"24\" rx=\"4\"/><text class=\"dg-sub\" x=\"431\" y=\"48\" text-anchor=\"middle\">sink pad<\/text><text class=\"dg-accent-tx\" x=\"360\" y=\"80\" text-anchor=\"middle\">!<\/text><line class=\"dg-line\" x1=\"300\" y1=\"98\" x2=\"413\" y2=\"98\"/><polygon class=\"dg-arrow\" points=\"413,93 420,98 413,103\"/><text class=\"dg-sub\" x=\"360\" y=\"138\" text-anchor=\"middle\">\"!\" links one element's source pad (out) to the next element's sink pad (in)<\/text><\/svg><figcaption>Each \"!\" connects an output (source) pad to the next element's input (sink) pad<\/figcaption><\/figure>\n<h2 id=\"dynamic-pads-the-gotcha-interviewers-love\">Dynamic pads (the gotcha interviewers love)<\/h2>\n<p><code>rtspsrc<\/code> doesn't know the stream's format until it connects, so its source pad appears <strong>at runtime<\/strong> (\"sometimes pad\"). You can't link it statically — you connect a <code>pad-added<\/code> callback and link then. Knowing this signals real GStreamer experience.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-keyword\">def<\/span> on_pad_added(src, new_pad, depay):\n    new_pad.link(depay.get_static_pad(<span class=\"tok-string\">\"sink\"<\/span>))\nrtspsrc.connect(<span class=\"tok-string\">\"pad-added\"<\/span>, on_pad_added, depay)<\/code><\/pre>\n<h2 id=\"queue-thread-boundary\">queue = thread boundary<\/h2>\n<p>Inserting a <code>queue<\/code> element decouples upstream and downstream onto <strong>separate threads<\/strong>, with a bounded buffer. This is how you parallelize decode vs inference and apply backpressure (<code>max-size-buffers<\/code>, <code>leaky<\/code>). No <code>queue<\/code> = everything runs in one thread, serially.<\/p>\n<h2 id=\"states-and-why-paused-matters\">States and why PAUSED matters<\/h2>\n<p>NULL (no resources) → READY (resources allocated) → PAUSED (data prerolled, clock stopped) → PLAYING (clock running, data flows). Live sources can't fully preroll, which is why live pipelines behave slightly differently and why you handle <code>async-done<\/code>/<code>no-preroll<\/code>.<\/p>\n<h2 id=\"caps-negotiation-how-two-pads-actually-agree\">Caps negotiation — how two pads actually agree<\/h2>\n<p>Linking isn't \"plug A into B.\" When you set the pipeline to PLAYING, pads <strong>negotiate caps<\/strong>: the downstream pad advertises what it can accept, the upstream what it can produce, and GStreamer intersects the two. If the intersection is empty you get the classic <code>not-negotiated (-4)<\/code> error. A <strong>capsfilter<\/strong> (the <code>video/x-raw,format=BGR<\/code> you see between elements) <em>forces<\/em> a specific format — that's you pinning the contract rather than letting it auto-pick.<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 150\" role=\"img\" aria-label=\"A capsfilter between two elements pins the exact format they exchange\"><rect class=\"dg-box\" x=\"34\" y=\"58\" width=\"150\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"109\" y=\"92\" text-anchor=\"middle\">nvvidconv<\/text><line class=\"dg-line\" x1=\"184\" y1=\"87\" x2=\"243\" y2=\"87\"/><polygon class=\"dg-arrow\" points=\"243,82 250,87 243,92\"/><rect class=\"dg-box dg-hot\" x=\"250\" y=\"62\" width=\"220\" height=\"50\" rx=\"25\"/><text class=\"dg-label\" x=\"360\" y=\"92\" text-anchor=\"middle\">video/x-raw, format=BGR<\/text><text class=\"dg-sub\" x=\"360\" y=\"48\" text-anchor=\"middle\">capsfilter — you pin the format<\/text><line class=\"dg-line\" x1=\"470\" y1=\"87\" x2=\"529\" y2=\"87\"/><polygon class=\"dg-arrow\" points=\"529,82 536,87 529,92\"/><rect class=\"dg-box\" x=\"536\" y=\"58\" width=\"150\" height=\"58\" rx=\"12\"/><text class=\"dg-label\" x=\"611\" y=\"92\" text-anchor=\"middle\">appsink<\/text><text class=\"dg-sub\" x=\"360\" y=\"138\" text-anchor=\"middle\">pads negotiate a common format · empty intersection = \"not-negotiated\"<\/text><\/svg><figcaption>A capsfilter between two elements pins the exact format they exchange<\/figcaption><\/figure>\n<p>Three failure signatures worth recognizing instantly in an interview:<\/p>\n<ul><li><strong><code>not-negotiated<\/code><\/strong> → caps don't intersect (e.g. you forgot a <code>videoconvert<\/code>,<\/li><\/ul>\n<p>or asked for a format the decoder can't emit).<\/p>\n<ul><li><strong><code>internal data stream error<\/code><\/strong> → almost always a <em>dynamic pad never linked<\/em><\/li><\/ul>\n<p>(the <code>rtspsrc<\/code> pad-added gotcha below) or a missing element.<\/p>\n<ul><li><strong>pipeline hangs in PAUSED<\/strong> → a live source not prerolling, or a queue with<\/li><\/ul>\n<p>nothing feeding it.<\/p>\n<h2 id=\"buffers-carry-more-than-pixels-pts-dts-metadata\">Buffers carry more than pixels: PTS, DTS, metadata<\/h2>\n<p>A <code>GstBuffer<\/code> has two timestamps: <strong>PTS<\/strong> (presentation — when to show it) and <strong>DTS<\/strong> (decode — when to decode it). They differ when <strong>B-frames<\/strong> reorder decode vs display order; that reordering is also why B-frames add latency (section 01). Buffers also carry <strong><code>GstMeta<\/code><\/strong> — sidecar info (e.g. DeepStream hangs its <code>NvDsBatchMeta<\/code> here) so detections ride <em>with<\/em> the frame without copying pixels.<\/p>\n<h2 id=\"the-pipeline-clock-and-live-sources\">The pipeline clock and live sources<\/h2>\n<p>The pipeline picks one <strong>clock<\/strong>; every sink times playback against it. A <strong>live<\/strong> source (camera) is itself the clock master — frames arrive when they arrive, you can't \"pause and resume\" the world. This is why a live pipeline returns <code>NO_PREROLL<\/code> from the state change and why <code>sync=false<\/code> on a sink means \"don't wait for the clock, hand me the frame now\" (the latency knob from <a class=\"mdlink\" data-href=\"appsink-and-python.md\" href=\"#\">appsink<\/a>).<\/p>\n<h2 id=\"state-changes-return-a-status-and-it-matters\">State changes return a <em>status<\/em>, and it matters<\/h2>\n<p><code>set_state(PLAYING)<\/code> doesn't return success/failure — it returns one of: <code>SUCCESS<\/code>, <code>ASYNC<\/code> (will finish later, watch the bus for <code>async-done<\/code>), <code>NO_PREROLL<\/code> (live source, normal), or <code>FAILURE<\/code>. Treating <code>ASYNC<\/code> as failure is a common bug; you wait for the bus to confirm before assuming the camera is up.<\/p>\n<h2 id=\"events-vs-messages-two-different-channels\">Events vs messages (two different channels)<\/h2>\n<ul><li><strong>Messages<\/strong> flow pipeline → app on the <strong>bus<\/strong> (<code>ERROR<\/code>, <code>EOS<\/code>, <code>STATE_CHANGED<\/code>,<\/li><\/ul>\n<p><code>QOS<\/code>). This is what <em>your code<\/em> listens to.<\/p>\n<ul><li><strong>Events<\/strong> flow <em>between elements<\/em> in-band with the data: <code>EOS<\/code>, <code>FLUSH<\/code>,<\/li><\/ul>\n<p><code>SEGMENT<\/code>, <code>QOS<\/code> (quality-of-service: a downstream sink telling upstream \"I'm   dropping late frames, slow down\"). You usually don't handle these directly but   knowing they exist explains how backpressure/QoS propagates.<\/p>\n<h2 id=\"pad-probes-inspect-or-modify-the-stream-in-flight\">Pad probes — inspect or modify the stream in flight<\/h2>\n<p>A <strong>pad probe<\/strong> is a callback you attach to a pad to watch buffers/events passing through — without adding an element. This is exactly how you read DeepStream metadata (<a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a>), drop frames conditionally, or measure per-stage latency. Buffer probes for data, event probes for EOS/flush.<\/p>\n<pre><code class=\"language-python\">pad = element.get_static_pad(<span class=\"tok-string\">\"src\"<\/span>)\npad.add_probe(<span class=\"tok-builtin\">Gst<\/span>.PadProbeType.BUFFER, my_probe, user_data)<\/code><\/pre>\n<h2 id=\"tee-queue-branching-record-and-infer-and-stream\">tee + queue = branching (record AND infer AND stream)<\/h2>\n<p>To send one stream to multiple consumers — infer on it <em>and<\/em> record it <em>and<\/em> push it to WebRTC — use <strong><code>tee<\/code><\/strong>, and put a <strong><code>queue<\/code> after every branch<\/strong>. Without the per-branch queue the slowest branch stalls all of them (they'd share one thread).<\/p>\n<figure class=\"diagram\"><svg viewBox=\"0 0 720 250\" role=\"img\" aria-label=\"tee fans one stream to many branches — give every branch its own queue\"><rect class=\"dg-box\" x=\"14\" y=\"86\" width=\"150\" height=\"52\" rx=\"12\"/><text class=\"dg-label\" x=\"89\" y=\"117\" text-anchor=\"middle\">rtspsrc ! decode<\/text><line class=\"dg-line\" x1=\"164\" y1=\"112\" x2=\"207\" y2=\"112\"/><polygon class=\"dg-arrow\" points=\"207,107 214,112 207,117\"/><rect class=\"dg-box dg-hot\" x=\"214\" y=\"86\" width=\"64\" height=\"52\" rx=\"12\"/><text class=\"dg-label\" x=\"246\" y=\"117\" text-anchor=\"middle\">tee<\/text><path class=\"dg-line\" d=\"M278 112 C 320 112 320 52 360 52\"/><polygon class=\"dg-arrow\" points=\"353,47 360,52 353,57\"/><rect class=\"dg-box\" x=\"364\" y=\"34\" width=\"250\" height=\"40\" rx=\"10\"/><text class=\"dg-label\" x=\"378\" y=\"52\">queue ! nvinfer<\/text><text class=\"dg-sub\" x=\"378\" y=\"67\">analytics<\/text><path class=\"dg-line\" d=\"M278 112 C 320 112 320 130 360 130\"/><polygon class=\"dg-arrow\" points=\"353,125 360,130 353,135\"/><rect class=\"dg-box\" x=\"364\" y=\"112\" width=\"250\" height=\"40\" rx=\"10\"/><text class=\"dg-label\" x=\"378\" y=\"130\">queue ! splitmuxsink<\/text><text class=\"dg-sub\" x=\"378\" y=\"145\">record to disk<\/text><path class=\"dg-line\" d=\"M278 112 C 320 112 320 208 360 208\"/><polygon class=\"dg-arrow\" points=\"353,203 360,208 353,213\"/><rect class=\"dg-box\" x=\"364\" y=\"190\" width=\"250\" height=\"40\" rx=\"10\"/><text class=\"dg-label\" x=\"378\" y=\"208\">queue ! webrtcbin<\/text><text class=\"dg-sub\" x=\"378\" y=\"223\">live to browser<\/text><text class=\"dg-sub\" x=\"300\" y=\"242\" text-anchor=\"middle\">one stream → many consumers · a queue per branch so none stalls the others<\/text><\/svg><figcaption>tee fans one stream to many branches — give every branch its own queue<\/figcaption><\/figure>\n<h2 id=\"queue-tuning-leaky-for-live-blocking-for-recorded\">queue tuning: leaky for live, blocking for recorded<\/h2>\n<p><code>queue max-size-buffers=2 leaky=downstream<\/code> = \"keep at most 2, drop the <em>oldest<\/em> when full\" — the live-video default (latest frame wins). <code>leaky=no<\/code> (block) is for recorded/offline where you must not lose a frame. This is the backpressure policy from section 01 expressed as element properties. <code>max-size-time<\/code> and <code>max-size-bytes<\/code> are alternative bound dimensions (set unused ones to 0).<\/p>\n<h2 id=\"debugging-the-two-commands-youll-name-in-the-interview\">Debugging: the two commands you'll name in the interview<\/h2>\n<pre><code class=\"language-bash\"><span class=\"tok-comment\"># 1) Verbose internals — caps negotiated, state changes, the actual error:<\/span>\nGST_DEBUG=<span class=\"tok-number\">3<\/span> <span class=\"tok-command\">gst-launch-1.0<\/span> rtspsrc location=... ! ...        <span class=\"tok-comment\"># bump to 4–5 for more<\/span>\n<span class=\"tok-comment\"># 2) Dump the pipeline graph to a .dot (visualize what linked to what):<\/span>\nGST_DEBUG_DUMP_DOT_DIR=/tmp <span class=\"tok-command\">gst-launch-1.0<\/span> ...   <span class=\"tok-comment\"># then: dot -Tpng pipeline.dot<\/span><\/code><\/pre>\n<p>Mentioning <code>GST_DEBUG<\/code> levels and the <code>.dot<\/code> graph dump is a strong \"I've actually debugged these\" signal. <code>gst-inspect-1.0 &lt;element&gt;<\/code> (list an element's pads, caps, and properties) is the third one to name.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>GStreamer vs FFmpeg (the CLI/lib)?<\/strong> FFmpeg is a swiss-army transcoder — unbeatable for \"convert/clip this file\" and great as a decode library. GStreamer is a <em>pipeline framework<\/em> for <strong>live, branching, multi-stream, plugin-extensible<\/strong> apps with fine threading control. KoiReader wants live multi-stream graphs with inference inside → GStreamer (and DeepStream is built on it). Many shops use FFmpeg for ingest/clip and GStreamer for the live serving graph.<\/p>\n<p><strong>Why use <code>queue<\/code> elements at all?<\/strong> Without them the whole pipeline is one thread: a slow decoder stalls the source. <code>queue<\/code> puts a thread boundary + bounded buffer between stages so they run concurrently and you control drop policy.<\/p>\n<p><strong>How do you detect a camera went down?<\/strong> Watch the <strong>bus<\/strong> for <code>ERROR<\/code>/<code>EOS<\/code>, and/or run a watchdog on frame timestamps. On failure, tear the pipeline to NULL and rebuild (reconnect) — see <a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">fault tolerance<\/a>.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"appsink-and-python.md\" href=\"#\">appsink-and-python.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-pieces","text":"The pieces"},{"level":2,"id":"a-pipeline-in-words","text":"A pipeline in words"},{"level":2,"id":"dynamic-pads-the-gotcha-interviewers-love","text":"Dynamic pads (the gotcha interviewers love)"},{"level":2,"id":"queue-thread-boundary","text":"queue = thread boundary"},{"level":2,"id":"states-and-why-paused-matters","text":"States and why PAUSED matters"},{"level":2,"id":"caps-negotiation-how-two-pads-actually-agree","text":"Caps negotiation — how two pads actually agree"},{"level":2,"id":"buffers-carry-more-than-pixels-pts-dts-metadata","text":"Buffers carry more than pixels: PTS, DTS, metadata"},{"level":2,"id":"the-pipeline-clock-and-live-sources","text":"The pipeline clock and live sources"},{"level":2,"id":"state-changes-return-a-status-and-it-matters","text":"State changes return a status, and it matters"},{"level":2,"id":"events-vs-messages-two-different-channels","text":"Events vs messages (two different channels)"},{"level":2,"id":"pad-probes-inspect-or-modify-the-stream-in-flight","text":"Pad probes — inspect or modify the stream in flight"},{"level":2,"id":"tee-queue-branching-record-and-infer-and-stream","text":"tee + queue = branching (record AND infer AND stream)"},{"level":2,"id":"queue-tuning-leaky-for-live-blocking-for-recorded","text":"queue tuning: leaky for live, blocking for recorded"},{"level":2,"id":"debugging-the-two-commands-youll-name-in-the-interview","text":"Debugging: the two commands you'll name in the interview"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"the gstreamer pipeline model rtspsrc pull depay strip rtp parse frames decoder nvdec convert nv12→bgr appsink → python elements linked by pads · each ! is a connection · queue = thread boundary a gstreamer pipeline: elements linked by pads 💡 tl;dr elements are lego bricks. pads are the studs that connect them. caps are the rule that says \"these two bricks fit.\" buffers are the data flowing through. the bus is the intercom that tells your app about errors and end-of-stream. the pieces element — one processing unit: rtspsrc , h264parse , nvv4l2decoder , nvvidconv , appsink . has a state (null → ready → paused → playing). pad — an element's input ( sink pad ) or output ( source pad ). data enters sink pads, leaves source pads. (confusingly, a \"sink element \" is the final consumer, while a \"sink pad \" is any input port.) caps (capabilities) — the format contract negotiated between pads, e.g. video/x-raw,format=nv12,width=1920,height=1080,framerate=30/1 . mismatched caps = pipeline won't link. buffer — a chunk of data (usually one frame) flowing downstream, with a timestamp (pts). bin / pipeline — a container of elements. the top-level pipeline is a bin that also owns the clock and bus. bus — the message channel from pipeline → your app: eos (end of stream), error , warning , state changes. you watch the bus to detect a dead camera. a pipeline in words the ! is shorthand for \"link the source pad of the left element to the sink pad of the right element\": h264parse src pad nvv4l2decoder sink pad ! \"!\" links one element's source pad (out) to the next element's sink pad (in) each \"!\" connects an output (source) pad to the next element's input (sink) pad dynamic pads (the gotcha interviewers love) rtspsrc doesn't know the stream's format until it connects, so its source pad appears at runtime (\"sometimes pad\"). you can't link it statically — you connect a pad-added callback and link then. knowing this signals real gstreamer experience. def on_pad_added(src, new_pad, depay): new_pad.link(depay.get_static_pad( \"sink\" )) rtspsrc.connect( \"pad-added\" , on_pad_added, depay) queue = thread boundary inserting a queue element decouples upstream and downstream onto separate threads , with a bounded buffer. this is how you parallelize decode vs inference and apply backpressure ( max-size-buffers , leaky ). no queue = everything runs in one thread, serially. states and why paused matters null (no resources) → ready (resources allocated) → paused (data prerolled, clock stopped) → playing (clock running, data flows). live sources can't fully preroll, which is why live pipelines behave slightly differently and why you handle async-done / no-preroll . caps negotiation — how two pads actually agree linking isn't \"plug a into b.\" when you set the pipeline to playing, pads negotiate caps : the downstream pad advertises what it can accept, the upstream what it can produce, and gstreamer intersects the two. if the intersection is empty you get the classic not-negotiated (-4) error. a capsfilter (the video/x-raw,format=bgr you see between elements) forces a specific format — that's you pinning the contract rather than letting it auto-pick. nvvidconv video/x-raw, format=bgr capsfilter — you pin the format appsink pads negotiate a common format · empty intersection = \"not-negotiated\" a capsfilter between two elements pins the exact format they exchange three failure signatures worth recognizing instantly in an interview: not-negotiated → caps don't intersect (e.g. you forgot a videoconvert , or asked for a format the decoder can't emit). internal data stream error → almost always a dynamic pad never linked (the rtspsrc pad-added gotcha below) or a missing element. pipeline hangs in paused → a live source not prerolling, or a queue with nothing feeding it. buffers carry more than pixels: pts, dts, metadata a gstbuffer has two timestamps: pts (presentation — when to show it) and dts (decode — when to decode it). they differ when b-frames reorder decode vs display order; that reordering is also why b-frames add latency (section 01). buffers also carry gstmeta — sidecar info (e.g. deepstream hangs its nvdsbatchmeta here) so detections ride with the frame without copying pixels. the pipeline clock and live sources the pipeline picks one clock ; every sink times playback against it. a live source (camera) is itself the clock master — frames arrive when they arrive, you can't \"pause and resume\" the world. this is why a live pipeline returns no_preroll from the state change and why sync=false on a sink means \"don't wait for the clock, hand me the frame now\" (the latency knob from appsink ). state changes return a status , and it matters set_state(playing) doesn't return success/failure — it returns one of: success , async (will finish later, watch the bus for async-done ), no_preroll (live source, normal), or failure . treating async as failure is a common bug; you wait for the bus to confirm before assuming the camera is up. events vs messages (two different channels) messages flow pipeline → app on the bus ( error , eos , state_changed , qos ). this is what your code listens to. events flow between elements in-band with the data: eos , flush , segment , qos (quality-of-service: a downstream sink telling upstream \"i'm dropping late frames, slow down\"). you usually don't handle these directly but knowing they exist explains how backpressure/qos propagates. pad probes — inspect or modify the stream in flight a pad probe is a callback you attach to a pad to watch buffers/events passing through — without adding an element. this is exactly how you read deepstream metadata ( deepstream.md ), drop frames conditionally, or measure per-stage latency. buffer probes for data, event probes for eos/flush. pad = element.get_static_pad( \"src\" ) pad.add_probe( gst .padprobetype.buffer, my_probe, user_data) tee + queue = branching (record and infer and stream) to send one stream to multiple consumers — infer on it and record it and push it to webrtc — use tee , and put a queue after every branch . without the per-branch queue the slowest branch stalls all of them (they'd share one thread). rtspsrc ! decode tee queue ! nvinfer analytics queue ! splitmuxsink record to disk queue ! webrtcbin live to browser one stream → many consumers · a queue per branch so none stalls the others

s shorthand for \"link the source pad of the left element to the sink pad of the right element.\"<\/p>\n<h2 id=\"dynamic-pads-the-gotcha-interviewers-love\">Dynamic pads (the gotcha interviewers love)<\/h2>\n<p><code>rtspsrc<\/code> doesn't know the stream's format until it connects, so its source pad appears <strong>at runtime<\/strong> (\"sometimes pad\"). You can't link it statically — you connect a <code>pad-added<\/code> callback and link then. Knowing this signals real GStreamer experience.<\/p>\n<pre><code class=\"language-python\">def on_pad_added(src, new_pad, depay):\n    new_pad.link(depay.get_static_pad(\"sink\"))\nrtspsrc.connect(\"pad-added\", on_pad_added, depay)<\/code><\/pre>\n<h2 id=\"queue-thread-boundary\">queue = thread boundary<\/h2>\n<p>Inserting a <code>queue<\/code> element decouples upstream and downstream onto <strong>separate threads<\/strong>, with a bounded buffer. This is how you parallelize decode vs inference and apply backpressure (<code>max-size-buffers<\/code>, <code>leaky<\/code>). No <code>queue<\/code> = everything runs in one thread, serially.<\/p>\n<h2 id=\"states-and-why-paused-matters\">States and why PAUSED matters<\/h2>\n<p>NULL (no resources) → READY (resources allocated) → PAUSED (data prerolled, clock stopped) → PLAYING (clock running, data flows). Live sources can't fully preroll, which is why live pipelines behave slightly differently and why you handle <code>async-done<\/code>/<code>no-preroll<\/code>.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>GStreamer vs FFmpeg (the CLI/lib)?<\/strong> FFmpeg is a swiss-army transcoder — unbeatable for \"convert/clip this file\" and great as a decode library. GStreamer is a <em>pipeline framework<\/em> for <strong>live, branching, multi-stream, plugin-extensible<\/strong> apps with fine threading control. KoiReader wants live multi-stream graphs with inference inside → GStreamer (and DeepStream is built on it). Many shops use FFmpeg for ingest/clip and GStreamer for the live serving graph.<\/p>\n<p><strong>Why use <code>queue<\/code> elements at all?<\/strong> Without them the whole pipeline is one thread: a slow decoder stalls the source. <code>queue<\/code> puts a thread boundary + bounded buffer between stages so they run concurrently and you control drop policy.<\/p>\n<p><strong>How do you detect a camera went down?<\/strong> Watch the <strong>bus<\/strong> for <code>ERROR<\/code>/<code>EOS<\/code>, and/or run a watchdog on frame timestamps. On failure, tear the pipeline to NULL and rebuild (reconnect) — see <a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">fault tolerance<\/a>.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"appsink-and-python.md\" href=\"#\">appsink-and-python.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-pieces","text":"The pieces"},{"level":2,"id":"a-pipeline-in-words","text":"A pipeline in words"},{"level":2,"id":"dynamic-pads-the-gotcha-interviewers-love","text":"Dynamic pads (the gotcha interviewers love)"},{"level":2,"id":"queue-thread-boundary","text":"queue = thread boundary"},{"level":2,"id":"states-and-why-paused-matters","text":"States and why PAUSED matters"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"the gstreamer pipeline model tl;dr: elements are lego bricks. pads are the studs that connect them. caps are the rule that says \"these two bricks fit.\" buffers are the data flowing through. the bus is the intercom that tells your app about errors and end-of-stream. the pieces element — one processing unit: rtspsrc , h264parse , nvv4l2decoder , nvvidconv , appsink . has a state (null → ready → paused → playing). pad — an element's input ( sink pad ) or output ( source pad ). data enters sink pads, leaves source pads. (confusingly, a \"sink element \" is the final consumer, while a \"sink pad \" is any input port.) caps (capabilities) — the format contract negotiated between pads, e.g. video/x-raw,format=nv12,width=1920,height=1080,framerate=30/1 . mismatched caps = pipeline won't link. buffer — a chunk of data (usually one frame) flowing downstream, with a timestamp (pts). bin / pipeline — a container of elements. the top-level pipeline is a bin that also owns the clock and bus. bus — the message channel from pipeline → your app: eos (end of stream), error , warning , state changes. you watch the bus to detect a dead camera. a pipeline in words rtspsrc ! rtph264depay ! h264parse ! nvv4l2decoder ! nvvidconv ! appsink │ │ │ │ │ │ pull from strip rtp find frame gpu decode color/format hand to camera packaging boundaries (nvdec) convert your code the ! is shorthand for \"link the source pad of the left element to the sink pad of the right element.\" dynamic pads (the gotcha interviewers love) rtspsrc doesn't know the stream's format until it connects, so its source pad appears at runtime (\"sometimes pad\"). you can't link it statically — you connect a pad-added callback and link then. knowing this signals real gstreamer experience. def on_pad_added(src, new_pad, depay): new_pad.link(depay.get_static_pad(\"sink\")) rtspsrc.connect(\"pad-added\", on_pad_added, depay) queue = thread boundary inserting a queue element decouples upstream and downstream onto separate threads , with a bounded buffer. this is how you parallelize decode vs inference and apply backpressure ( max-size-buffers , leaky ). no queue = everything runs in one thread, serially. states and why paused matters null (no resources) → ready (resources allocated) → paused (data prerolled, clock stopped) → playing (clock running, data flows). live sources can't fully preroll, which is why live pipelines behave slightly differently and why you handle async-done / no-preroll . why x over y gstreamer vs ffmpeg (the cli/lib)? ffmpeg is a swiss-army transcoder — unbeatable for \"convert/clip this file\" and great as a decode library. gstreamer is a pipeline framework for live, branching, multi-stream, plugin-extensible apps with fine threading control. koireader wants live multi-stream graphs with inference inside → gstreamer (and deepstream is built on it). many shops use ffmpeg for ingest/clip and gstreamer for the live serving graph. why use queue elements at all? without them the whole pipeline is one thread: a slow decoder stalls the source. queue puts a thread boundary + bounded buffer between stages so they run concurrently and you control drop policy. how do you detect a camera went down? watch the bus for error / eos , and/or run a watchdog on frame timestamps. on failure, tear the pipeline to null and rebuild (reconnect) — see fault tolerance . → next: appsink-and-python.md","words":547},{"path":"02-gstreamer/appsink-and-python.md","title":"appsink & Python","section":"2 · GStreamer","quiz":false,"html":"<h1 id=\"getting-frames-into-python-appsink\">Getting Frames into Python: appsink<\/h1>\n<p><strong>TL;DR:<\/strong> <code>appsink<\/code> is the element that hands buffers <em>out of<\/em> the pipeline into your Python code; <code>appsrc<\/code> pushes frames <em>in<\/em>. The trick is to pull frames without copying more than necessary and without letting the buffer grow. Configure <code>appsink<\/code> with <code>max-buffers=1 drop=true<\/code> and you have a \"latest frame only\" tap.<\/p>\n<h2 id=\"two-ways-to-consume\">Two ways to consume<\/h2>\n<p><strong>A) Via OpenCV (quick):<\/strong><\/p>\n<pre><code class=\"language-python\">pipeline = (\n    \"rtspsrc location=rtsp://cam latency=100 protocols=tcp ! \"\n    \"rtph264depay ! h264parse ! nvv4l2decoder ! \"\n    \"nvvidconv ! video/x-raw,format=BGRx ! videoconvert ! \"\n    \"video/x-raw,format=BGR ! appsink drop=1 max-buffers=1 sync=false\"\n)\ncap = cv2.VideoCapture(pipeline, cv2.CAP_GSTREAMER)\nwhile True:\n    ok, frame = cap.read()   # frame is a BGR numpy array\n    if not ok:\n        break                # → trigger reconnect logic<\/code><\/pre>\n<p><strong>B) Via GObject/Gst directly (full control):<\/strong><\/p>\n<pre><code class=\"language-python\">import gi; gi.require_version(\"Gst\", \"1.0\")\nfrom gi.repository import Gst\nGst.init(None)\n\nappsink = pipeline.get_by_name(\"sink\")\nappsink.set_property(\"emit-signals\", True)\nappsink.set_property(\"max-buffers\", 1)\nappsink.set_property(\"drop\", True)\n\ndef on_new_sample(sink):\n    sample = sink.emit(\"pull-sample\")\n    buf = sample.get_buffer()\n    caps = sample.get_caps()\n    ok, mapinfo = buf.map(Gst.MapFlags.READ)\n    try:\n        frame = np.ndarray(\n            (height, width, 3), buffer=mapinfo.data, dtype=np.uint8\n        )\n        handle(frame.copy())   # copy if you keep it past this callback\n    finally:\n        buf.unmap(mapinfo)     # ALWAYS unmap — else you leak buffers\n    return Gst.FlowReturn.OK\n\nappsink.connect(\"new-sample\", on_new_sample)<\/code><\/pre>\n<p>The <code>buf.unmap()<\/code> in a <code>finally<\/code> is the kind of detail that separates \"used it once\" from \"ran it in production.\" Forgetting it is a textbook leak.<\/p>\n<h2 id=\"syncfalse-the-latency-knob\">sync=false (the latency knob)<\/h2>\n<p>By default a sink waits for each buffer's presentation time (<code>sync=true<\/code>) to play at real-time speed. For inference you usually want frames <strong>as fast as available<\/strong> → <code>sync=false<\/code>. Combined with <code>drop=true max-buffers=1<\/code>, you always process the newest frame with minimal lag.<\/p>\n<h2 id=\"appsrc-pushing-frames-back-in\">appsrc (pushing frames back in)<\/h2>\n<p>When you've annotated a frame and want to encode/stream it out, push it into an <code>appsrc<\/code> feeding <code>nvv4l2h264enc ! rtspclientsink<\/code>/WebRTC. You must set caps and timestamps (PTS) correctly or downstream stalls.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>appsink vs cv2.VideoCapture?<\/strong> <code>VideoCapture<\/code> <em>uses<\/em> an appsink internally but hides it. Direct appsink gives you the callback, GPU buffer access, explicit unmap, and zero-copy options. Prototype with VideoCapture; use direct appsink when you need control or zero-copy.<\/p>\n<p><strong>Why <code>.copy()<\/code> the numpy frame in the callback?<\/strong> The numpy array points into GStreamer's mapped buffer memory. Once you <code>unmap<\/code>/ return, that memory is recycled — keeping the array without copying = corruption. Copy if the frame outlives the callback (e.g., goes into a queue).<\/p>\n<p><strong>Why <code>max-buffers=1 drop=true<\/code>?<\/strong> It makes appsink a \"latest frame\" tap: if your consumer lags, GStreamer drops stale frames instead of queuing them → bounded memory, minimal latency. This is the backpressure policy from section 01 expressed in one line.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"two-ways-to-consume","text":"Two ways to consume"},{"level":2,"id":"syncfalse-the-latency-knob","text":"sync=false (the latency knob)"},{"level":2,"id":"appsrc-pushing-frames-back-in","text":"appsrc (pushing frames back in)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"getting frames into python: appsink tl;dr: appsink is the element that hands buffers out of the pipeline into your python code; appsrc pushes frames in . the trick is to pull frames without copying more than necessary and without letting the buffer grow. configure appsink with max-buffers=1 drop=true and you have a \"latest frame only\" tap. two ways to consume a) via opencv (quick): pipeline = ( \"rtspsrc location=rtsp://cam latency=100 protocols=tcp ! \" \"rtph264depay ! h264parse ! nvv4l2decoder ! \" \"nvvidconv ! video/x-raw,format=bgrx ! videoconvert ! \" \"video/x-raw,format=bgr ! appsink drop=1 max-buffers=1 sync=false\" ) cap = cv2.videocapture(pipeline, cv2.cap_gstreamer) while true: ok, frame = cap.read() # frame is a bgr numpy array if not ok: break # → trigger reconnect logic b) via gobject/gst directly (full control): import gi; gi.require_version(\"gst\", \"1.0\") from gi.repository import gst gst.init(none) appsink = pipeline.get_by_name(\"sink\") appsink.set_property(\"emit-signals\", true) appsink.set_property(\"max-buffers\", 1) appsink.set_property(\"drop\", true) def on_new_sample(sink): sample = sink.emit(\"pull-sample\") buf = sample.get_buffer() caps = sample.get_caps() ok, mapinfo = buf.map(gst.mapflags.read) try: frame = np.ndarray( (height, width, 3), buffer=mapinfo.data, dtype=np.uint8 ) handle(frame.copy()) # copy if you keep it past this callback finally: buf.unmap(mapinfo) # always unmap — else you leak buffers return gst.flowreturn.ok appsink.connect(\"new-sample\", on_new_sample) the buf.unmap() in a finally is the kind of detail that separates \"used it once\" from \"ran it in production.\" forgetting it is a textbook leak. sync=false (the latency knob) by default a sink waits for each buffer's presentation time ( sync=true ) to play at real-time speed. for inference you usually want frames as fast as available → sync=false . combined with drop=true max-buffers=1 , you always process the newest frame with minimal lag. appsrc (pushing frames back in) when you've annotated a frame and want to encode/stream it out, push it into an appsrc feeding nvv4l2h264enc ! rtspclientsink /webrtc. you must set caps and timestamps (pts) correctly or downstream stalls. why x over y appsink vs cv2.videocapture? videocapture uses an appsink internally but hides it. direct appsink gives you the callback, gpu buffer access, explicit unmap, and zero-copy options. prototype with videocapture; use direct appsink when you need control or zero-copy. why .copy() the numpy frame in the callback? the numpy array points into gstreamer's mapped buffer memory. once you unmap / return, that memory is recycled — keeping the array without copying = corruption. copy if the frame outlives the callback (e.g., goes into a queue). why max-buffers=1 drop=true ? it makes appsink a \"latest frame\" tap: if your consumer lags, gstreamer drops stale frames instead of queuing them → bounded memory, minimal latency. this is the backpressure policy from section 01 expressed in one line. → next: deepstream.md","words":435},{"path":"02-gstreamer/deepstream.md","title":"DeepStream","section":"2 · GStreamer","quiz":false,"html":"<h1 id=\"deepstream-inference-inside-the-pipeline\">DeepStream: Inference Inside the Pipeline<\/h1>\n<p><strong>TL;DR:<\/strong> DeepStream is NVIDIA's set of GStreamer plugins that put inference, tracking, and analytics <em>inside<\/em> the video pipeline, keeping frames on the GPU end to end. Its superpower is <code>nvstreammux<\/code>: it <strong>batches many camera streams into one inference call<\/strong>, which is how you serve dozens of cameras on one GPU. You've shipped this on Jetson Nano — own it.<\/p>\n<h2 id=\"the-canonical-deepstream-pipeline\">The canonical DeepStream pipeline<\/h2>\n<pre><code>[cam1 rtspsrc]┐\n[cam2 rtspsrc]┤→ nvstreammux → nvinfer → nvtracker → nvdsosd → nvv4l2h264enc → sink\n[camN rtspsrc]┘   (batch N)    (TRT)     (track IDs)  (overlay)  (encode out)<\/code><\/pre>\n<p>Key plugins:<\/p>\n<ul><li><strong><code>nvstreammux<\/code><\/strong> — batches frames from N sources into a single batched buffer.<\/li><\/ul>\n<p><em>This is the scaling trick:<\/em> one <code>nvinfer<\/code> call processes all cameras together,   amortizing GPU launch overhead. Set <code>batch-size = number of streams<\/code>.<\/p>\n<ul><li><strong><code>nvinfer<\/code><\/strong> — runs a <strong>TensorRT<\/strong> engine. Configured via a text file<\/li><\/ul>\n<p>(<code>config_infer.txt<\/code>) pointing at the model, precision (INT8/FP16), and   pre/post-processing. Operates as <strong>primary<\/strong> (detector) or <strong>secondary<\/strong>   (classifier on detected crops).<\/p>\n<ul><li><strong><code>nvtracker<\/code><\/strong> — multi-object tracking (NvDCF, KLT, or DeepSORT-style),<\/li><\/ul>\n<p>assigning persistent IDs across frames. Critical for counting/dwell-time.<\/p>\n<ul><li><strong><code>nvdsosd<\/code><\/strong> — on-screen display: draws boxes/labels on GPU.<\/li><li><strong><code>nvvideoconvert<\/code><\/strong> — GPU color/format conversion + scaling.<\/li><li><strong>Metadata (<code>NvDsBatchMeta<\/code>)<\/strong> — detections travel <em>alongside<\/em> frames as<\/li><\/ul>\n<p>structured metadata you read in a <code>pad probe<\/code> (Python via pyds) to push results   to a DB/analytics — no full-frame copy needed.<\/p>\n<h2 id=\"why-batching-matters-the-number-that-impresses\">Why batching matters (the number that impresses)<\/h2>\n<p>A GPU launching inference per-frame, per-camera wastes most of its time on overhead. Batching N frames into one call can lift throughput several-fold for the same latency budget — the difference between 4 cameras and 40 on one box. Tie this to your TensorRT/INT8 experience: <em>\"batch at the mux, run an INT8 TRT engine, keep buffers in NVMM (GPU) memory — that's the multi-stream low-latency recipe.\"<\/em><\/p>\n<h2 id=\"pad-probes-reading-results-in-python\">Pad probes (reading results in Python)<\/h2>\n<pre><code class=\"language-python\">def osd_sink_probe(pad, info, u_data):\n    batch_meta = pyds.gst_buffer_get_nvds_batch_meta(hash(info.get_buffer()))\n    l_frame = batch_meta.frame_meta_list\n    while l_frame is not None:\n        frame_meta = pyds.NvDsFrameMeta.cast(l_frame.data)\n        # iterate frame_meta.obj_meta_list → boxes, classes, track ids\n        l_frame = l_frame.next\n    return Gst.PadProbeReturn.OK<\/code><\/pre>\n<p>You don't pull pixels to Python — you read <em>metadata<\/em>. That's the zero-copy philosophy in action.<\/p>\n<h2 id=\"deepstream-vs-rolling-your-own-gstreamer-appsink-pytorch\">DeepStream vs rolling your own (GStreamer + appsink + PyTorch)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th><\/th><th>DeepStream<\/th><th>DIY appsink + framework<\/th><\/tr><\/thead><tbody><tr><td>Multi-stream batching<\/td><td>Built-in (<code>nvstreammux<\/code>)<\/td><td>You build it<\/td><\/tr><tr><td>Memory<\/td><td>Stays on GPU (NVMM)<\/td><td>Easy to accidentally copy to CPU<\/td><\/tr><tr><td>Flexibility<\/td><td>NVIDIA-opinionated, config-driven<\/td><td>Total freedom, more code<\/td><\/tr><tr><td>Best for<\/td><td>Many cameras, NVIDIA HW, standard detect/track<\/td><td>Custom logic, non-NVIDIA, research<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"triton-vs-nvinfer-within-deepstream\">Triton vs nvinfer (within DeepStream)<\/h2>\n<p><code>nvinfer<\/code> runs TensorRT engines in-process. <code>nvinferserver<\/code> offloads to a <strong>Triton Inference Server<\/strong> — useful when you want a model server shared across pipelines, multiple frameworks, or dynamic model management. (More in <a class=\"mdlink\" data-href=\"../03-low-latency-inference/triton.md\" href=\"#\">03-low-latency-inference<\/a>.)<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>DeepStream vs plain GStreamer + your own inference?<\/strong> DeepStream gives multi-stream batching, GPU-resident buffers, and tracking for free on NVIDIA HW — fastest path to many cameras. Roll your own when you need custom pipeline logic, non-NVIDIA hardware, or research flexibility. KoiReader is NVIDIA-heavy (\"latest NVIDIA Hardware\"), so DeepStream is a natural fit and a strong thing to volunteer.<\/p>\n<p><strong>Why batch at nvstreammux instead of per-camera inference?<\/strong> Per-camera inference pays GPU launch/overhead N times and underuses the GPU. Batching fills the GPU, amortizing overhead → higher throughput at the same latency. It's the single biggest multi-stream scaling lever.<\/p>\n<p><strong>Primary vs secondary nvinfer?<\/strong> Primary detects objects on full frames; secondary classifies the <em>crops<\/em> the primary found (e.g., detect vehicle → classify make/color). Chaining them is how DeepStream does cascaded inference efficiently on GPU.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../03-low-latency-inference/README.md\" href=\"#\">03-low-latency-inference/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-canonical-deepstream-pipeline","text":"The canonical DeepStream pipeline"},{"level":2,"id":"why-batching-matters-the-number-that-impresses","text":"Why batching matters (the number that impresses)"},{"level":2,"id":"pad-probes-reading-results-in-python","text":"Pad probes (reading results in Python)"},{"level":2,"id":"deepstream-vs-rolling-your-own-gstreamer-appsink-pytorch","text":"DeepStream vs rolling your own (GStreamer + appsink + PyTorch)"},{"level":2,"id":"triton-vs-nvinfer-within-deepstream","text":"Triton vs nvinfer (within DeepStream)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"deepstream: inference inside the pipeline tl;dr: deepstream is nvidia's set of gstreamer plugins that put inference, tracking, and analytics inside the video pipeline, keeping frames on the gpu end to end. its superpower is nvstreammux : it batches many camera streams into one inference call , which is how you serve dozens of cameras on one gpu. you've shipped this on jetson nano — own it. the canonical deepstream pipeline [cam1 rtspsrc]┐ [cam2 rtspsrc]┤→ nvstreammux → nvinfer → nvtracker → nvdsosd → nvv4l2h264enc → sink [camn rtspsrc]┘ (batch n) (trt) (track ids) (overlay) (encode out) key plugins: nvstreammux — batches frames from n sources into a single batched buffer. this is the scaling trick: one nvinfer call processes all cameras together, amortizing gpu launch overhead. set batch-size = number of streams . nvinfer — runs a tensorrt engine. configured via a text file ( config_infer.txt ) pointing at the model, precision (int8/fp16), and pre/post-processing. operates as primary (detector) or secondary (classifier on detected crops). nvtracker — multi-object tracking (nvdcf, klt, or deepsort-style), assigning persistent ids across frames. critical for counting/dwell-time. nvdsosd — on-screen display: draws boxes/labels on gpu. nvvideoconvert — gpu color/format conversion + scaling. metadata ( nvdsbatchmeta ) — detections travel alongside frames as structured metadata you read in a pad probe (python via pyds) to push results to a db/analytics — no full-frame copy needed. why batching matters (the number that impresses) a gpu launching inference per-frame, per-camera wastes most of its time on overhead. batching n frames into one call can lift throughput several-fold for the same latency budget — the difference between 4 cameras and 40 on one box. tie this to your tensorrt/int8 experience: \"batch at the mux, run an int8 trt engine, keep buffers in nvmm (gpu) memory — that's the multi-stream low-latency recipe.\" pad probes (reading results in python) def osd_sink_probe(pad, info, u_data): batch_meta = pyds.gst_buffer_get_nvds_batch_meta(hash(info.get_buffer())) l_frame = batch_meta.frame_meta_list while l_frame is not none: frame_meta = pyds.nvdsframemeta.cast(l_frame.data) # iterate frame_meta.obj_meta_list → boxes, classes, track ids l_frame = l_frame.next return gst.padprobereturn.ok you don't pull pixels to python — you read metadata . that's the zero-copy philosophy in action. deepstream vs rolling your own (gstreamer + appsink + pytorch) deepstream diy appsink + framework multi-stream batching built-in ( nvstreammux ) you build it memory stays on gpu (nvmm) easy to accidentally copy to cpu flexibility nvidia-opinionated, config-driven total freedom, more code best for many cameras, nvidia hw, standard detect/track custom logic, non-nvidia, research triton vs nvinfer (within deepstream) nvinfer runs tensorrt engines in-process. nvinferserver offloads to a triton inference server — useful when you want a model server shared across pipelines, multiple frameworks, or dynamic model management. (more in 03-low-latency-inference .) why x over y deepstream vs plain gstreamer + your own inference? deepstream gives multi-stream batching, gpu-resident buffers, and tracking for free on nvidia hw — fastest path to many cameras. roll your own when you need custom pipeline logic, non-nvidia hardware, or research flexibility. koireader is nvidia-heavy (\"latest nvidia hardware\"), so deepstream is a natural fit and a strong thing to volunteer. why batch at nvstreammux instead of per-camera inference? per-camera inference pays gpu launch/overhead n times and underuses the gpu. batching fills the gpu, amortizing overhead → higher throughput at the same latency. it's the single biggest multi-stream scaling lever. primary vs secondary nvinfer? primary detects objects on full frames; secondary classifies the crops the primary found (e.g., detect vehicle → classify make/color). chaining them is how deepstream does cascaded inference efficiently on gpu. → back to section readme · next section: 03-low-latency-inference/","words":591},{"path":"03-low-latency-inference/README.md","title":"Overview","section":"3 · Low-Latency Inference","quiz":false,"html":"<h1 id=\"03-low-latency-inference\">03 — Low-Latency Inference<\/h1>\n<p><strong>TL;DR:<\/strong> This is your home turf (TensorRT, ONNX, INT8/FP16, Jetson). The job is to turn a trained model into the fastest possible stable inference, and to <em>know your latency budget<\/em> — where every millisecond goes. Lead with this section in the interview; it's where you're strongest.<\/p>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"latency-budget.md\" href=\"#\">latency-budget.md<\/a> — where the milliseconds actually go<\/li><li><a class=\"mdlink\" data-href=\"tensorrt-and-quantization.md\" href=\"#\">tensorrt-and-quantization.md<\/a> — TRT, FP16/INT8, calibration<\/li><li><a class=\"mdlink\" data-href=\"triton.md\" href=\"#\">triton.md<\/a> — Triton inference server, when and why<\/li><li><a class=\"mdlink\" data-href=\"batching-and-throughput.md\" href=\"#\">batching-and-throughput.md<\/a> — batching, throughput vs latency<\/li><\/ol>\n<h2 id=\"the-framing-line-memorize\">The framing line (memorize)<\/h2>\n<p><em>\"Low latency isn't one trick — it's a budget. Decode on NVDEC, keep frames in GPU memory, batch at the mux, run an INT8 TensorRT engine with fused layers, and only move small results back to the CPU. Then you measure each stage and attack the biggest number — I don't guess, I profile.\"<\/em><\/p>\n<p>That last sentence is straight from your resume's \"evidence-driven engineering\" and it's exactly the JD's \"diagnose bottlenecks — CPU, GPU, or Network.\"<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"latency-budget.md\" href=\"#\">latency-budget.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-framing-line-memorize","text":"The framing line (memorize)"}],"text":"03 — low-latency inference tl;dr: this is your home turf (tensorrt, onnx, int8/fp16, jetson). the job is to turn a trained model into the fastest possible stable inference, and to know your latency budget — where every millisecond goes. lead with this section in the interview; it's where you're strongest. files: latency-budget.md — where the milliseconds actually go tensorrt-and-quantization.md — trt, fp16/int8, calibration triton.md — triton inference server, when and why batching-and-throughput.md — batching, throughput vs latency the framing line (memorize) \"low latency isn't one trick — it's a budget. decode on nvdec, keep frames in gpu memory, batch at the mux, run an int8 tensorrt engine with fused layers, and only move small results back to the cpu. then you measure each stage and attack the biggest number — i don't guess, i profile.\" that last sentence is straight from your resume's \"evidence-driven engineering\" and it's exactly the jd's \"diagnose bottlenecks — cpu, gpu, or network.\" → start: latency-budget.md","words":160},{"path":"03-low-latency-inference/latency-budget.md","title":"The Latency Budget","section":"3 · Low-Latency Inference","quiz":false,"html":"<h1 id=\"the-latency-budget\">The Latency Budget<\/h1>\n<p><strong>TL;DR:<\/strong> \"Latency\" is the sum of every stage from photon to decision. You can't optimize what you haven't measured per-stage. Break it down, find the fattest slice, attack that. Throughput (fps) and latency (ms per frame) are different goals — know which the question is asking.<\/p>\n<h2 id=\"the-stages-and-where-time-hides\">The stages (and where time hides)<\/h2>\n<pre><code>camera capture/encode   →   network transport   →   decode   →   preprocess\n   (out of your hands)        (jitter buffer)        (NVDEC)     (resize/normalize/color)\n        →   inference   →   postprocess (NMS, decode boxes)   →   tracking/logic   →   output<\/code><\/pre>\n<p>Typical fat slices and fixes:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Stage<\/th><th>Common cost<\/th><th>Fix<\/th><\/tr><\/thead><tbody><tr><td>Jitter/transport<\/td><td>100ms–1s<\/td><td>smaller jitter buffer, TCP vs UDP tradeoff, GOP<\/td><\/tr><tr><td>Decode<\/td><td>high on CPU<\/td><td>move to <strong>NVDEC<\/strong> (hardware)<\/td><\/tr><tr><td>Preprocess<\/td><td>CPU↔GPU copies, PIL resize<\/td><td>do resize/normalize on GPU; avoid host round-trips<\/td><\/tr><tr><td>Inference<\/td><td>the model itself<\/td><td>TensorRT, FP16/INT8, smaller backbone, batching<\/td><\/tr><tr><td>Postprocess<\/td><td>NMS on CPU, Python loops<\/td><td>GPU NMS, vectorize, limit detections<\/td><\/tr><tr><td>Tracking/logic<\/td><td>per-object Python<\/td><td>keep it O(detections), avoid per-pixel Python<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"latency-vs-throughput-the-distinction-that-wins-points\">Latency vs throughput (the distinction that wins points)<\/h2>\n<ul><li><strong>Latency<\/strong> = how long <em>one<\/em> frame takes end to end. Matters for real-time<\/li><\/ul>\n<p>reaction (\"obsess over milliseconds\").<\/p>\n<ul><li><strong>Throughput<\/strong> = how many frames/sec total. Matters for <em>how many cameras<\/em> a box<\/li><\/ul>\n<p>serves.<\/p>\n<ul><li><strong>Batching raises throughput but can raise per-frame latency<\/strong> (you wait to fill<\/li><\/ul>\n<p>the batch). The art is choosing a batch size that maximizes cameras-served while   staying under the latency SLA. Know your SLA before you tune.<\/p>\n<h2 id=\"how-to-actually-measure-your-evidence-driven-story\">How to actually measure (your \"evidence-driven\" story)<\/h2>\n<ul><li>Timestamp at each stage boundary; log p50/p95/p99, not just the average — tail<\/li><\/ul>\n<p>latency is what users feel and what causes buffer pileups.<\/p>\n<ul><li>GPU profiling: <code>nsys<\/code>/<code>nvprof<\/code>/Nsight Systems for kernel time, `nvidia-smi<\/li><\/ul>\n<p>dmon<code> for utilization, <\/code>tegrastats` on Jetson.<\/p>\n<ul><li>Watch <strong>GPU utilization<\/strong>: low util + high latency = you're CPU/copy/IO-bound,<\/li><\/ul>\n<p>not compute-bound. That diagnosis decides everything.<\/p>\n<ul><li>This mirrors your resume win: *\"quantifying why local NVMe outperformed<\/li><\/ul>\n<p>network-attached storage\"* — same method, different domain.<\/p>\n<h2 id=\"why-p99-matters-for-video\">Why p99 matters for video<\/h2>\n<p>If p99 inference time exceeds your frame interval (33ms @ 30fps), frames pile up during those slow moments → buffer grows → latency creeps → eventually you drop or OOM. A pipeline that's \"fine on average\" can still die on its tail. Design for p99 under the frame budget, or drop cleanly when you exceed it.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Optimize latency or throughput first?<\/strong> Ask what the system needs. A single safety-critical trigger → latency. A 40-camera analytics farm → throughput (cameras/$). Most real answers: hit a latency SLA, then maximize throughput under it.<\/p>\n<p><strong>Average vs p99 latency?<\/strong> Average hides the spikes that actually break video pipelines (pileups happen on the slow tail). Always quote and design to p95/p99.<\/p>\n<p><strong>High latency but low GPU utilization — what's wrong?<\/strong> You're not compute-bound. Suspect CPU preprocessing, CPU↔GPU copies, single-thread decode, or network jitter. Profile to confirm before touching the model — changing the model wouldn't help a copy-bound pipeline.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"tensorrt-and-quantization.md\" href=\"#\">tensorrt-and-quantization.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-stages-and-where-time-hides","text":"The stages (and where time hides)"},{"level":2,"id":"latency-vs-throughput-the-distinction-that-wins-points","text":"Latency vs throughput (the distinction that wins points)"},{"level":2,"id":"how-to-actually-measure-your-evidence-driven-story","text":"How to actually measure (your \"evidence-driven\" story)"},{"level":2,"id":"why-p99-matters-for-video","text":"Why p99 matters for video"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"the latency budget tl;dr: \"latency\" is the sum of every stage from photon to decision. you can't optimize what you haven't measured per-stage. break it down, find the fattest slice, attack that. throughput (fps) and latency (ms per frame) are different goals — know which the question is asking. the stages (and where time hides) camera capture/encode → network transport → decode → preprocess (out of your hands) (jitter buffer) (nvdec) (resize/normalize/color) → inference → postprocess (nms, decode boxes) → tracking/logic → output typical fat slices and fixes: stage common cost fix jitter/transport 100ms–1s smaller jitter buffer, tcp vs udp tradeoff, gop decode high on cpu move to nvdec (hardware) preprocess cpu↔gpu copies, pil resize do resize/normalize on gpu; avoid host round-trips inference the model itself tensorrt, fp16/int8, smaller backbone, batching postprocess nms on cpu, python loops gpu nms, vectorize, limit detections tracking/logic per-object python keep it o(detections), avoid per-pixel python latency vs throughput (the distinction that wins points) latency = how long one frame takes end to end. matters for real-time reaction (\"obsess over milliseconds\"). throughput = how many frames/sec total. matters for how many cameras a box serves. batching raises throughput but can raise per-frame latency (you wait to fill the batch). the art is choosing a batch size that maximizes cameras-served while staying under the latency sla. know your sla before you tune. how to actually measure (your \"evidence-driven\" story) timestamp at each stage boundary; log p50/p95/p99, not just the average — tail latency is what users feel and what causes buffer pileups. gpu profiling: nsys / nvprof /nsight systems for kernel time, `nvidia-smi dmon for utilization, tegrastats` on jetson. watch gpu utilization : low util + high latency = you're cpu/copy/io-bound, not compute-bound. that diagnosis decides everything. this mirrors your resume win: *\"quantifying why local nvme outperformed network-attached storage\"* — same method, different domain. why p99 matters for video if p99 inference time exceeds your frame interval (33ms @ 30fps), frames pile up during those slow moments → buffer grows → latency creeps → eventually you drop or oom. a pipeline that's \"fine on average\" can still die on its tail. design for p99 under the frame budget, or drop cleanly when you exceed it. why x over y optimize latency or throughput first? ask what the system needs. a single safety-critical trigger → latency. a 40-camera analytics farm → throughput (cameras/$). most real answers: hit a latency sla, then maximize throughput under it. average vs p99 latency? average hides the spikes that actually break video pipelines (pileups happen on the slow tail). always quote and design to p95/p99. high latency but low gpu utilization — what's wrong? you're not compute-bound. suspect cpu preprocessing, cpu↔gpu copies, single-thread decode, or network jitter. profile to confirm before touching the model — changing the model wouldn't help a copy-bound pipeline. → next: tensorrt-and-quantization.md","words":474},{"path":"03-low-latency-inference/tensorrt-and-quantization.md","title":"TensorRT & Quantization","section":"3 · Low-Latency Inference","quiz":false,"html":"<h1 id=\"tensorrt-quantization\">TensorRT &amp; Quantization<\/h1>\n<p><strong>TL;DR:<\/strong> TensorRT is NVIDIA's inference compiler — it takes a trained model (usually via ONNX) and produces an optimized <strong>engine<\/strong> for <em>your specific GPU<\/em> by fusing layers, picking fast kernels, and lowering precision (FP16/INT8). INT8 ≈ fastest + smallest, but needs calibration to keep accuracy. You've done this; this file makes the <em>why<\/em> crisp.<\/p>\n<h2 id=\"the-flow\">The flow<\/h2>\n<pre><code>PyTorch/TF model → export ONNX → trtexec / TRT builder → engine (.plan/.engine)\n                                      │\n                          chooses kernels for THIS GPU,\n                          fuses layers, sets precision<\/code><\/pre>\n<blockquote><p>The engine is hardware-specific. An engine built on an A100 won't be optimal (or may not load) on a Jetson Orin. <strong>Build on the deployment target<\/strong> (or matching arch). This is a classic gotcha — mention it.<\/p><\/blockquote>\n<h2 id=\"what-tensorrt-actually-does\">What TensorRT actually does<\/h2>\n<ol><li><strong>Layer &amp; tensor fusion<\/strong> — merges conv+bias+ReLU into one kernel → fewer kernel<\/li><\/ol>\n<p>launches and memory reads. (Your resume literally says \"layer fusion.\")<\/p>\n<ol><li><strong>Kernel auto-tuning<\/strong> — benchmarks several CUDA kernel implementations and<\/li><\/ol>\n<p>picks the fastest for your shapes/GPU.<\/p>\n<ol><li><strong>Precision calibration<\/strong> — runs in FP32, FP16, or INT8.<\/li><li><strong>Memory optimization<\/strong> — reuses buffers across layers (smaller footprint).<\/li><li><strong>Dynamic shapes / optimization profiles<\/strong> — handle variable batch/resolution.<\/li><\/ol>\n<h2 id=\"precision-ladder\">Precision ladder<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Precision<\/th><th>Speed<\/th><th>Memory<\/th><th>Accuracy<\/th><th>Notes<\/th><\/tr><\/thead><tbody><tr><td><strong>FP32<\/strong><\/td><td>1×<\/td><td>1×<\/td><td>baseline<\/td><td>training default, rarely needed for inference<\/td><\/tr><tr><td><strong>FP16<\/strong><\/td><td>~2×<\/td><td>½<\/td><td>~lossless<\/td><td>safe default on modern GPUs/Jetson; almost free win<\/td><\/tr><tr><td><strong>INT8<\/strong><\/td><td>~3–4×<\/td><td>¼<\/td><td>small drop<\/td><td>needs <strong>calibration<\/strong>; best for edge throughput<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"int8-calibration-the-part-people-fumble\">INT8 calibration (the part people fumble)<\/h2>\n<p>INT8 maps floats to 256 integer levels. To pick the right float range per layer, TensorRT needs a <strong>calibration dataset<\/strong> — a few hundred representative images — to measure activation distributions (entropy/min-max calibration). Get this wrong (unrepresentative data) and accuracy tanks.<\/p>\n<ul><li><strong>PTQ (post-training quantization):<\/strong> calibrate after training. Fast, no<\/li><\/ul>\n<p>retraining. What you usually do.<\/p>\n<ul><li><strong>QAT (quantization-aware training):<\/strong> simulate INT8 during training for best<\/li><\/ul>\n<p>accuracy. More work; use when PTQ drops too much accuracy.<\/p>\n<ul><li>Always <strong>measure mAP/accuracy after quantizing<\/strong> — never assume it's fine. (Your<\/li><\/ul>\n<p>resume's model-evaluation discipline: mAP/precision/recall.)<\/p>\n<h2 id=\"beyond-precision-pruning-distillation\">Beyond precision: pruning &amp; distillation<\/h2>\n<ul><li><strong>Pruning<\/strong> — remove low-importance weights/channels → smaller, faster (you've<\/li><\/ul>\n<p>done this). Structured pruning helps real latency; unstructured needs sparse HW.<\/p>\n<ul><li><strong>Distillation<\/strong> — train a small \"student\" to mimic a big \"teacher.\" Different<\/li><\/ul>\n<p>lever (smaller architecture) vs quantization (cheaper arithmetic). Combine them.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>FP16 vs INT8?<\/strong> FP16 is nearly free accuracy-wise and ~2× faster — always try it first. INT8 is ~3–4× and ¼ memory but needs calibration and risks accuracy; reach for it when you need maximum edge throughput and can validate accuracy holds.<\/p>\n<p><strong>ONNX → TensorRT vs torch2trt / direct?<\/strong> ONNX is the portable interchange path: framework-agnostic, widely supported, easy to inspect. Direct converters are convenient but more fragile across ops. ONNX first, fall back to custom plugins for unsupported ops.<\/p>\n<p><strong>Why build the engine on the target device?<\/strong> TensorRT tunes kernels and memory for the <em>specific<\/em> GPU arch and even driver. An engine built elsewhere may be suboptimal or fail to load — build (or rebuild) on the deployment hardware, and cache the engine so you don't pay build time at startup.<\/p>\n<p><strong>Quantization vs pruning vs distillation — which?<\/strong> They're orthogonal. Quantization = cheaper math (precision). Pruning = fewer weights. Distillation = smaller architecture. Stack them: distill to a small model, prune it, then INT8-quantize for the edge.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"triton.md\" href=\"#\">triton.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-flow","text":"The flow"},{"level":2,"id":"what-tensorrt-actually-does","text":"What TensorRT actually does"},{"level":2,"id":"precision-ladder","text":"Precision ladder"},{"level":2,"id":"int8-calibration-the-part-people-fumble","text":"INT8 calibration (the part people fumble)"},{"level":2,"id":"beyond-precision-pruning-distillation","text":"Beyond precision: pruning &amp; distillation"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"tensorrt & quantization tl;dr: tensorrt is nvidia's inference compiler — it takes a trained model (usually via onnx) and produces an optimized engine for your specific gpu by fusing layers, picking fast kernels, and lowering precision (fp16/int8). int8 ≈ fastest + smallest, but needs calibration to keep accuracy. you've done this; this file makes the why crisp. the flow pytorch/tf model → export onnx → trtexec / trt builder → engine (.plan/.engine) │ chooses kernels for this gpu, fuses layers, sets precision the engine is hardware-specific. an engine built on an a100 won't be optimal (or may not load) on a jetson orin. build on the deployment target (or matching arch). this is a classic gotcha — mention it. what tensorrt actually does layer & tensor fusion — merges conv+bias+relu into one kernel → fewer kernel launches and memory reads. (your resume literally says \"layer fusion.\") kernel auto-tuning — benchmarks several cuda kernel implementations and picks the fastest for your shapes/gpu. precision calibration — runs in fp32, fp16, or int8. memory optimization — reuses buffers across layers (smaller footprint). dynamic shapes / optimization profiles — handle variable batch/resolution. precision ladder precision speed memory accuracy notes fp32 1× 1× baseline training default, rarely needed for inference fp16 ~2× ½ ~lossless safe default on modern gpus/jetson; almost free win int8 ~3–4× ¼ small drop needs calibration ; best for edge throughput int8 calibration (the part people fumble) int8 maps floats to 256 integer levels. to pick the right float range per layer, tensorrt needs a calibration dataset — a few hundred representative images — to measure activation distributions (entropy/min-max calibration). get this wrong (unrepresentative data) and accuracy tanks. ptq (post-training quantization): calibrate after training. fast, no retraining. what you usually do. qat (quantization-aware training): simulate int8 during training for best accuracy. more work; use when ptq drops too much accuracy. always measure map/accuracy after quantizing — never assume it's fine. (your resume's model-evaluation discipline: map/precision/recall.) beyond precision: pruning & distillation pruning — remove low-importance weights/channels → smaller, faster (you've done this). structured pruning helps real latency; unstructured needs sparse hw. distillation — train a small \"student\" to mimic a big \"teacher.\" different lever (smaller architecture) vs quantization (cheaper arithmetic). combine them. why x over y fp16 vs int8? fp16 is nearly free accuracy-wise and ~2× faster — always try it first. int8 is ~3–4× and ¼ memory but needs calibration and risks accuracy; reach for it when you need maximum edge throughput and can validate accuracy holds. onnx → tensorrt vs torch2trt / direct? onnx is the portable interchange path: framework-agnostic, widely supported, easy to inspect. direct converters are convenient but more fragile across ops. onnx first, fall back to custom plugins for unsupported ops. why build the engine on the target device? tensorrt tunes kernels and memory for the specific gpu arch and even driver. an engine built elsewhere may be suboptimal or fail to load — build (or rebuild) on the deployment hardware, and cache the engine so you don't pay build time at startup. quantization vs pruning vs distillation — which? they're orthogonal. quantization = cheaper math (precision). pruning = fewer weights. distillation = smaller architecture. stack them: distill to a small model, prune it, then int8-quantize for the edge. → next: triton.md","words":544},{"path":"03-low-latency-inference/triton.md","title":"Triton Inference Server","section":"3 · Low-Latency Inference","quiz":false,"html":"<h1 id=\"triton-inference-server\">Triton Inference Server<\/h1>\n<p><strong>TL;DR:<\/strong> Triton is NVIDIA's production model server. Instead of baking the model into your app, you run a server that hosts models and serves inference over HTTP/gRPC. It adds <strong>dynamic batching<\/strong>, <strong>multi-model<\/strong> hosting, <strong>multiple framework backends<\/strong> (TensorRT, ONNX, PyTorch, TF), and <strong>model versioning<\/strong> — for free. Use it when inference is a <em>shared service<\/em>, not when one tight edge loop needs absolute minimum latency.<\/p>\n<h2 id=\"what-you-get-out-of-the-box\">What you get out of the box<\/h2>\n<ul><li><strong>Dynamic batching<\/strong> — Triton holds incoming requests for a few ms and batches<\/li><\/ul>\n<p>them automatically to fill the GPU (throughput win without you coding it).<\/p>\n<ul><li><strong>Concurrent model execution<\/strong> — multiple models, or multiple <em>instances<\/em> of one<\/li><\/ul>\n<p>model, on the same GPU.<\/p>\n<ul><li><strong>Multiple backends<\/strong> — serve a TensorRT engine, an ONNX model, and a PyTorch<\/li><\/ul>\n<p>model side by side.<\/p>\n<ul><li><strong>Model repository + versioning<\/strong> — drop a new version in a folder, hot-swap<\/li><\/ul>\n<p>without redeploying clients.<\/p>\n<ul><li><strong>Metrics<\/strong> — Prometheus endpoints for latency/throughput/utilization.<\/li><li><strong>Ensembles<\/strong> — chain preprocess → model → postprocess as one served unit.<\/li><\/ul>\n<h2 id=\"where-it-fits-in-this-role\">Where it fits in this role<\/h2>\n<ul><li><strong>Cloud side<\/strong> of \"Edge devices and Cloud servers\": a Triton fleet behind a load<\/li><\/ul>\n<p>balancer serving many pipelines.<\/p>\n<ul><li><strong>Within DeepStream:<\/strong> <code>nvinferserver<\/code> calls Triton instead of in-process<\/li><\/ul>\n<p><code>nvinfer<\/code> — handy when several pipelines share models or you want central model   management.<\/p>\n<h2 id=\"the-tradeoff-say-this-out-loud\">The tradeoff (say this out loud)<\/h2>\n<p>A network hop to a server adds latency vs in-process TensorRT. For a single edge device chasing minimum latency, in-process <code>nvinfer<\/code>/TensorRT wins. For a <em>cloud service<\/em> with many clients and models where you want dynamic batching, versioning, and ops tooling, Triton's throughput and manageability win. <strong>Different jobs.<\/strong><\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Triton vs in-process TensorRT?<\/strong> In-process = lowest latency, simplest deploy, one model per app — ideal at the edge. Triton = a hop of latency but gives dynamic batching, multi-model, versioning, metrics, and shared GPU utilization — ideal as a cloud service.<\/p>\n<p><strong>Triton's dynamic batching vs DeepStream's nvstreammux batching?<\/strong> Both batch to fill the GPU. <code>nvstreammux<\/code> batches <em>synchronized camera streams<\/em> in a live pipeline. Triton's dynamic batching batches <em>independent client requests<\/em> arriving over the network. Same goal (GPU utilization), different source of requests.<\/p>\n<p><strong>Why version models in Triton instead of redeploying?<\/strong> Hot-swapping a model version in the repository lets you roll forward/back without touching clients or restarting pipelines — safer, faster iteration, and easy A/B. Matches the JD's \"open to experiments\" culture.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"batching-and-throughput.md\" href=\"#\">batching-and-throughput.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-you-get-out-of-the-box","text":"What you get out of the box"},{"level":2,"id":"where-it-fits-in-this-role","text":"Where it fits in this role"},{"level":2,"id":"the-tradeoff-say-this-out-loud","text":"The tradeoff (say this out loud)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"triton inference server tl;dr: triton is nvidia's production model server. instead of baking the model into your app, you run a server that hosts models and serves inference over http/grpc. it adds dynamic batching , multi-model hosting, multiple framework backends (tensorrt, onnx, pytorch, tf), and model versioning — for free. use it when inference is a shared service , not when one tight edge loop needs absolute minimum latency. what you get out of the box dynamic batching — triton holds incoming requests for a few ms and batches them automatically to fill the gpu (throughput win without you coding it). concurrent model execution — multiple models, or multiple instances of one model, on the same gpu. multiple backends — serve a tensorrt engine, an onnx model, and a pytorch model side by side. model repository + versioning — drop a new version in a folder, hot-swap without redeploying clients. metrics — prometheus endpoints for latency/throughput/utilization. ensembles — chain preprocess → model → postprocess as one served unit. where it fits in this role cloud side of \"edge devices and cloud servers\": a triton fleet behind a load balancer serving many pipelines. within deepstream: nvinferserver calls triton instead of in-process nvinfer — handy when several pipelines share models or you want central model management. the tradeoff (say this out loud) a network hop to a server adds latency vs in-process tensorrt. for a single edge device chasing minimum latency, in-process nvinfer /tensorrt wins. for a cloud service with many clients and models where you want dynamic batching, versioning, and ops tooling, triton's throughput and manageability win. different jobs. why x over y triton vs in-process tensorrt? in-process = lowest latency, simplest deploy, one model per app — ideal at the edge. triton = a hop of latency but gives dynamic batching, multi-model, versioning, metrics, and shared gpu utilization — ideal as a cloud service. triton's dynamic batching vs deepstream's nvstreammux batching? both batch to fill the gpu. nvstreammux batches synchronized camera streams in a live pipeline. triton's dynamic batching batches independent client requests arriving over the network. same goal (gpu utilization), different source of requests. why version models in triton instead of redeploying? hot-swapping a model version in the repository lets you roll forward/back without touching clients or restarting pipelines — safer, faster iteration, and easy a/b. matches the jd's \"open to experiments\" culture. → next: batching-and-throughput.md","words":397},{"path":"03-low-latency-inference/batching-and-throughput.md","title":"Batching & Throughput","section":"3 · Low-Latency Inference","quiz":false,"html":"<h1 id=\"batching-throughput\">Batching &amp; Throughput<\/h1>\n<p><strong>TL;DR:<\/strong> GPUs are massively parallel; one frame barely uses them. Batching feeds many frames per kernel launch, amortizing overhead and filling the GPU — often a several-fold throughput gain. The cost is a little latency (you wait to fill the batch). Tune batch size to your latency SLA.<\/p>\n<h2 id=\"why-batching-works-the-intuition\">Why batching works (the intuition)<\/h2>\n<p>A GPU is a huge parallel factory. Sending one frame is like running the whole factory to assemble a single widget — most of the line sits idle, and you still pay the fixed cost of starting and stopping the line (kernel launch, memory transfer). Batch 16 frames and the same start/stop cost is shared across 16 → far better utilization.<\/p>\n<h2 id=\"the-latencythroughput-knob\">The latency/throughput knob<\/h2>\n<pre><code>batch=1   : lowest latency,  worst GPU utilization, fewest cameras\nbatch=N   : higher latency (wait to fill), best utilization, most cameras<\/code><\/pre>\n<ul><li><strong>Static batching<\/strong> (DeepStream <code>nvstreammux<\/code>): batch = number of synchronized<\/li><\/ul>\n<p>camera streams. Frames arrive together each tick, so little extra wait.<\/p>\n<ul><li><strong>Dynamic batching<\/strong> (Triton): server waits up to <code>max_queue_delay<\/code> to gather<\/li><\/ul>\n<p>requests, then runs them together. You cap the wait to bound latency.<\/p>\n<h2 id=\"how-to-size-the-batch\">How to size the batch<\/h2>\n<ol><li>Fix your latency SLA (e.g., must act within 100ms).<\/li><li>Sweep batch size, measure p99 latency and throughput at each.<\/li><li>Pick the largest batch whose p99 stays under SLA. That maximizes cameras/box<\/li><\/ol>\n<p>without breaking real-time. (This sweep <em>is<\/em> your evidence-driven method.)<\/p>\n<h2 id=\"other-throughput-levers\">Other throughput levers<\/h2>\n<ul><li><strong>Multiple model instances / CUDA streams<\/strong> — overlap inference of different<\/li><\/ul>\n<p>batches; overlap decode (NVDEC) with inference (CUDA cores) since they're   separate engines.<\/p>\n<ul><li><strong>Smaller/faster backbone<\/strong> — YOLO-n vs YOLO-x; the cheapest latency win is often<\/li><\/ul>\n<p>a smaller model that still hits accuracy.<\/p>\n<ul><li><strong>Right resolution<\/strong> — inferring at 640×640 instead of 1280×1280 can 4× speed;<\/li><\/ul>\n<p>validate accuracy impact.<\/p>\n<ul><li><strong>Async pipeline<\/strong> — decode, infer, and postprocess on separate threads/streams<\/li><\/ul>\n<p>so the GPU never waits on the CPU.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Bigger batch — always better?<\/strong> No. Beyond the point that fills the GPU, you only add latency for marginal throughput, and you risk blowing the latency SLA and growing buffers. Size to SLA.<\/p>\n<p><strong>Batching vs a smaller model for more throughput?<\/strong> Batching keeps accuracy and fills the GPU but adds some latency. A smaller model cuts latency <em>and<\/em> compute but may cost accuracy. Try both; often you batch a right-sized model.<\/p>\n<p><strong>Why overlap NVDEC decode with CUDA inference?<\/strong> Decode and inference use <em>different<\/em> silicon (NVDEC vs CUDA cores). Running them concurrently (separate threads/streams) hides decode time behind inference → higher effective throughput than doing them serially.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">04-fault-tolerance/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"why-batching-works-the-intuition","text":"Why batching works (the intuition)"},{"level":2,"id":"the-latencythroughput-knob","text":"The latency/throughput knob"},{"level":2,"id":"how-to-size-the-batch","text":"How to size the batch"},{"level":2,"id":"other-throughput-levers","text":"Other throughput levers"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"batching & throughput tl;dr: gpus are massively parallel; one frame barely uses them. batching feeds many frames per kernel launch, amortizing overhead and filling the gpu — often a several-fold throughput gain. the cost is a little latency (you wait to fill the batch). tune batch size to your latency sla. why batching works (the intuition) a gpu is a huge parallel factory. sending one frame is like running the whole factory to assemble a single widget — most of the line sits idle, and you still pay the fixed cost of starting and stopping the line (kernel launch, memory transfer). batch 16 frames and the same start/stop cost is shared across 16 → far better utilization. the latency/throughput knob batch=1 : lowest latency, worst gpu utilization, fewest cameras batch=n : higher latency (wait to fill), best utilization, most cameras static batching (deepstream nvstreammux ): batch = number of synchronized camera streams. frames arrive together each tick, so little extra wait. dynamic batching (triton): server waits up to max_queue_delay to gather requests, then runs them together. you cap the wait to bound latency. how to size the batch fix your latency sla (e.g., must act within 100ms). sweep batch size, measure p99 latency and throughput at each. pick the largest batch whose p99 stays under sla. that maximizes cameras/box without breaking real-time. (this sweep is your evidence-driven method.) other throughput levers multiple model instances / cuda streams — overlap inference of different batches; overlap decode (nvdec) with inference (cuda cores) since they're separate engines. smaller/faster backbone — yolo-n vs yolo-x; the cheapest latency win is often a smaller model that still hits accuracy. right resolution — inferring at 640×640 instead of 1280×1280 can 4× speed; validate accuracy impact. async pipeline — decode, infer, and postprocess on separate threads/streams so the gpu never waits on the cpu. why x over y bigger batch — always better? no. beyond the point that fills the gpu, you only add latency for marginal throughput, and you risk blowing the latency sla and growing buffers. size to sla. batching vs a smaller model for more throughput? batching keeps accuracy and fills the gpu but adds some latency. a smaller model cuts latency and compute but may cost accuracy. try both; often you batch a right-sized model. why overlap nvdec decode with cuda inference? decode and inference use different silicon (nvdec vs cuda cores). running them concurrently (separate threads/streams) hides decode time behind inference → higher effective throughput than doing them serially. → back to section readme · next section: 04-fault-tolerance/","words":425},{"path":"04-fault-tolerance/README.md","title":"Overview","section":"4 · Fault Tolerance","quiz":false,"html":"<h1 id=\"04-fault-tolerance-crash-proof-systems\">04 — Fault Tolerance (\"Crash-Proof\" Systems)<\/h1>\n<p><strong>TL;DR:<\/strong> The JD is blunt: <em>\"Build Crash-Proof systems. If a camera goes offline or a frame is dropped, the system recovers gracefully without manual intervention.\"<\/em> The mindset: <strong>assume everything fails — cameras, networks, the GPU, your own process — and design so each failure is isolated, detected, and auto-recovered.<\/strong><\/p>\n<p>This is a <em>mindset<\/em> section more than a tools section. Interviewers probe it because it separates demo code from production code.<\/p>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"failure-modes.md\" href=\"#\">failure-modes.md<\/a> — everything that breaks in a video system<\/li><li><a class=\"mdlink\" data-href=\"recovery-patterns.md\" href=\"#\">recovery-patterns.md<\/a> — reconnect, watchdog, isolation, graceful degradation<\/li><\/ol>\n<h2 id=\"the-one-liner-to-lead-with\">The one-liner to lead with<\/h2>\n<p><em>\"In a 24/7 multi-camera system, the question isn't if a camera drops but when. I isolate each camera into its own supervised worker, watchdog it on frame freshness, reconnect with exponential backoff, and make sure one dead stream can never take down the other 39 or leak memory while it's gone.\"<\/em><\/p>\n<p>That sentence alone shows you've run this in production.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"failure-modes.md\" href=\"#\">failure-modes.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-one-liner-to-lead-with","text":"The one-liner to lead with"}],"text":"04 — fault tolerance (\"crash-proof\" systems) tl;dr: the jd is blunt: \"build crash-proof systems. if a camera goes offline or a frame is dropped, the system recovers gracefully without manual intervention.\" the mindset: assume everything fails — cameras, networks, the gpu, your own process — and design so each failure is isolated, detected, and auto-recovered. this is a mindset section more than a tools section. interviewers probe it because it separates demo code from production code. files: failure-modes.md — everything that breaks in a video system recovery-patterns.md — reconnect, watchdog, isolation, graceful degradation the one-liner to lead with \"in a 24/7 multi-camera system, the question isn't if a camera drops but when. i isolate each camera into its own supervised worker, watchdog it on frame freshness, reconnect with exponential backoff, and make sure one dead stream can never take down the other 39 or leak memory while it's gone.\" that sentence alone shows you've run this in production. → start: failure-modes.md","words":161},{"path":"04-fault-tolerance/failure-modes.md","title":"Failure Modes","section":"4 · Fault Tolerance","quiz":false,"html":"<h1 id=\"failure-modes-what-actually-breaks\">Failure Modes: What Actually Breaks<\/h1>\n<p><strong>TL;DR:<\/strong> Name the failures before the fixes. An interviewer asking \"how do you make it crash-proof?\" wants to hear that you've <em>catalogued<\/em> the ways it dies. Here is that catalogue.<\/p>\n<h2 id=\"camera-network-failures\">Camera / network failures<\/h2>\n<ul><li><strong>Camera offline<\/strong> — power loss, reboot, unplugged. RTSP connect fails or stream<\/li><\/ul>\n<p>ends (EOS).<\/p>\n<ul><li><strong>Network drop / flaky WiFi<\/strong> — packets lost, stream stalls then resumes, or<\/li><\/ul>\n<p>silently freezes (last frame repeats forever — sneaky).<\/p>\n<ul><li><strong>RTSP session timeout<\/strong> — no keepalive → camera tears down.<\/li><li><strong>Credential/URL change<\/strong> — auth fails on reconnect.<\/li><li><strong>Bandwidth saturation<\/strong> — too many cameras for the link → dropped packets, GOP<\/li><\/ul>\n<p>corruption.<\/p>\n<h2 id=\"stream-data-failures\">Stream / data failures<\/h2>\n<ul><li><strong>Corrupted frame / lost keyframe<\/strong> — gray/garbled until next I-frame.<\/li><li><strong>Resolution or codec change mid-stream<\/strong> — caps renegotiation, decoder reset.<\/li><li><strong>Clock drift / timestamp jumps<\/strong> — PTS goes backwards, jitter buffer confused.<\/li><li><strong>Frame freeze<\/strong> — decoder outputs nothing but no error fires (the silent<\/li><\/ul>\n<p>killer; only a watchdog catches it).<\/p>\n<h2 id=\"compute-process-failures\">Compute / process failures<\/h2>\n<ul><li><strong>GPU OOM<\/strong> — too many streams/too big a batch → CUDA out of memory.<\/li><li><strong>Memory leak<\/strong> — unbounded queue, unreleased GPU surfaces, un-<code>unmap<\/code>ped<\/li><\/ul>\n<p>buffers → slow OOM over hours/days.<\/p>\n<ul><li><strong>Decoder/plugin crash<\/strong> — a bad stream segfaults a native element, taking the<\/li><\/ul>\n<p>process down if not isolated.<\/p>\n<ul><li><strong>Inference exception<\/strong> — malformed input, NaN, model load failure.<\/li><li><strong>Thread deadlock / GIL starvation<\/strong> — one stuck thread freezes others.<\/li><li><strong>Downstream backpressure<\/strong> — DB/analytics slow → backs up the whole pipeline.<\/li><\/ul>\n<h2 id=\"the-big-principle-blast-radius\">The big principle: blast radius<\/h2>\n<p>The question for every failure: <strong>how many cameras does it take down?<\/strong> A crash-proof design keeps the blast radius at <strong>one<\/strong> — one camera's failure must never touch the others. That pushes you toward <strong>per-stream isolation<\/strong> (separate worker/process per camera or supervised pipeline), which is the heart of the next file.<\/p>\n<h2 id=\"why-this-framing-wins-points\">Why this framing wins points<\/h2>\n<p>When asked \"how do you handle a camera going offline,\" weak answers jump straight to <code>try/except<\/code>. Strong answers say: <em>\"First, which failure? A clean EOS, a silent freeze, and a network stall need different detection — EOS via the bus, freeze via a frame-timestamp watchdog, stall via a read timeout. Then a uniform recovery: isolate, backoff-reconnect, and degrade gracefully.\"<\/em> You've <strong>enumerated<\/strong> before you <strong>solved<\/strong> — exactly your resume's hypothesis-isolate-validate method.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"recovery-patterns.md\" href=\"#\">recovery-patterns.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"camera-network-failures","text":"Camera / network failures"},{"level":2,"id":"stream-data-failures","text":"Stream / data failures"},{"level":2,"id":"compute-process-failures","text":"Compute / process failures"},{"level":2,"id":"the-big-principle-blast-radius","text":"The big principle: blast radius"},{"level":2,"id":"why-this-framing-wins-points","text":"Why this framing wins points"}],"text":"failure modes: what actually breaks tl;dr: name the failures before the fixes. an interviewer asking \"how do you make it crash-proof?\" wants to hear that you've catalogued the ways it dies. here is that catalogue. camera / network failures camera offline — power loss, reboot, unplugged. rtsp connect fails or stream ends (eos). network drop / flaky wifi — packets lost, stream stalls then resumes, or silently freezes (last frame repeats forever — sneaky). rtsp session timeout — no keepalive → camera tears down. credential/url change — auth fails on reconnect. bandwidth saturation — too many cameras for the link → dropped packets, gop corruption. stream / data failures corrupted frame / lost keyframe — gray/garbled until next i-frame. resolution or codec change mid-stream — caps renegotiation, decoder reset. clock drift / timestamp jumps — pts goes backwards, jitter buffer confused. frame freeze — decoder outputs nothing but no error fires (the silent killer; only a watchdog catches it). compute / process failures gpu oom — too many streams/too big a batch → cuda out of memory. memory leak — unbounded queue, unreleased gpu surfaces, un- unmap ped buffers → slow oom over hours/days. decoder/plugin crash — a bad stream segfaults a native element, taking the process down if not isolated. inference exception — malformed input, nan, model load failure. thread deadlock / gil starvation — one stuck thread freezes others. downstream backpressure — db/analytics slow → backs up the whole pipeline. the big principle: blast radius the question for every failure: how many cameras does it take down? a crash-proof design keeps the blast radius at one — one camera's failure must never touch the others. that pushes you toward per-stream isolation (separate worker/process per camera or supervised pipeline), which is the heart of the next file. why this framing wins points when asked \"how do you handle a camera going offline,\" weak answers jump straight to try/except . strong answers say: \"first, which failure? a clean eos, a silent freeze, and a network stall need different detection — eos via the bus, freeze via a frame-timestamp watchdog, stall via a read timeout. then a uniform recovery: isolate, backoff-reconnect, and degrade gracefully.\" you've enumerated before you solved — exactly your resume's hypothesis-isolate-validate method. → next: recovery-patterns.md","words":377},{"path":"04-fault-tolerance/recovery-patterns.md","title":"Recovery Patterns","section":"4 · Fault Tolerance","quiz":false,"html":"<h1 id=\"recovery-patterns\">Recovery Patterns<\/h1>\n<p><strong>TL;DR:<\/strong> Five patterns cover almost everything: <strong>isolate<\/strong> each stream, <strong>watchdog<\/strong> for freshness, <strong>reconnect with exponential backoff<\/strong>, <strong>bound every buffer<\/strong>, and <strong>degrade gracefully<\/strong> instead of crashing. Supervise the whole thing so a dead worker auto-restarts.<\/p>\n<h2 id=\"1-per-stream-isolation-limit-blast-radius\">1. Per-stream isolation (limit blast radius)<\/h2>\n<p>Run each camera in its own <strong>worker<\/strong> — a thread, an asyncio task, or (safest) a separate <strong>process<\/strong>. A crash or stall in one is contained.<\/p>\n<ul><li><strong>Process per camera<\/strong> — strongest isolation; a native decoder segfault kills<\/li><\/ul>\n<p>one process, a supervisor respawns it. Costs more memory.<\/p>\n<ul><li><strong>Thread/task per camera<\/strong> — lighter, but a native crash can take the process<\/li><\/ul>\n<p>down; fine when decoders are stable and you watchdog well.<\/p>\n<ul><li>DeepStream alternative: many streams in one pipeline, but then you need<\/li><\/ul>\n<p><code>nvstreammux<\/code> to tolerate a source dropping (it can, with proper config) so one   bad source doesn't stall the batch.<\/p>\n<h2 id=\"2-watchdog-on-frame-freshness-catch-silent-freezes\">2. Watchdog on frame freshness (catch silent freezes)<\/h2>\n<p>The freeze that throws no error is the dangerous one. Track the timestamp of the last frame per camera; if <code>now - last_frame &gt; threshold<\/code>, declare it dead and trigger reconnect — even though no exception fired.<\/p>\n<pre><code class=\"language-python\">if time.monotonic() - last_frame_ts &gt; STALE_SECONDS:\n    log.warning(\"camera %s stale, restarting\", cam_id)\n    restart_stream(cam_id)<\/code><\/pre>\n<h2 id=\"3-reconnect-with-exponential-backoff-jitter\">3. Reconnect with exponential backoff + jitter<\/h2>\n<p>Don't hammer a down camera every 100ms (you'll DoS it and flood logs). Back off: 1s, 2s, 4s, 8s… capped (e.g., 30s), with a little random <strong>jitter<\/strong> so 40 cameras don't all retry in lockstep after a network blip.<\/p>\n<pre><code class=\"language-python\">delay = min(base * 2 ** attempt, max_delay) + random.uniform(0, jitter)<\/code><\/pre>\n<p>Reset the counter on a successful reconnect. Remember: after reconnect you wait for the next <strong>keyframe<\/strong> before clean frames resume.<\/p>\n<h2 id=\"4-bound-every-buffer-no-leaks\">4. Bound every buffer (no leaks)<\/h2>\n<p>From section 01: every queue bounded, drop-oldest for live. Explicitly release GPU surfaces / <code>unmap<\/code> GStreamer buffers each iteration. A long-running process must have <strong>flat memory<\/strong> over days — test it: run 24h, watch RSS/GPU mem. (Tie to your resume: long-running petabyte pipelines.)<\/p>\n<h2 id=\"5-graceful-degradation-dont-crash-shed-load\">5. Graceful degradation (don't crash, shed load)<\/h2>\n<p>When overloaded, <em>reduce service<\/em> instead of dying:<\/p>\n<ul><li>GPU OOM risk → drop to a smaller batch or skip frames (process every Nth).<\/li><li>One model too slow → lower inference resolution or framerate.<\/li><li>Downstream DB slow → buffer results briefly, then drop non-critical writes, keep<\/li><\/ul>\n<p>the video loop alive.<\/p>\n<ul><li>Always <strong>fail open or fail safe by design<\/strong>, never by accident.<\/li><\/ul>\n<h2 id=\"6-supervision-auto-restart-the-recoverer\">6. Supervision (auto-restart the recoverer)<\/h2>\n<p>Wrap workers in a supervisor that restarts crashed ones (like Erlang/OTP supervision trees, or just a monitoring loop / k8s liveness probe). The recovery code itself can fail — something must watch the watcher.<\/p>\n<ul><li><strong>Process level:<\/strong> systemd, supervisord, or **Kubernetes liveness/readiness<\/li><\/ul>\n<p>probes** (your GKE experience) restart unhealthy pods.<\/p>\n<ul><li><strong>Health endpoint:<\/strong> expose <code>/healthz<\/code> reporting per-camera freshness so the<\/li><\/ul>\n<p>orchestrator and dashboards see truth.<\/p>\n<h2 id=\"putting-it-together-the-worker-loop\">Putting it together (the worker loop)<\/h2>\n<pre><code class=\"language-python\">def camera_worker(cam_id, url):\n    attempt = 0\n    while not shutdown.is_set():\n        try:\n            cap = open_stream(url)             # GStreamer/NVDEC pipeline\n            attempt = 0                        # reset backoff on success\n            while not shutdown.is_set():\n                ok, frame = cap.read()\n                if not ok or stale(cam_id):    # EOS or watchdog\n                    raise StreamError(\"dead\")\n                latest[cam_id] = frame         # bounded: overwrite, never grow\n                mark_fresh(cam_id)\n        except Exception as e:\n            log.warning(\"cam %s down: %s\", cam_id, e)\n            release(cap)                       # free buffers/GPU surfaces!\n            time.sleep(backoff(attempt)); attempt += 1\n        finally:\n            release(cap)<\/code><\/pre>\n<p>This single loop demonstrates isolation, watchdog, backoff, bounded buffer, and cleanup — a great thing to whiteboard.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Process-per-camera vs thread-per-camera?<\/strong> Process = strongest isolation (native crash contained, true parallelism, no GIL) at higher memory cost. Thread = lighter and shares memory, but a native segfault or GIL contention can hurt all of them. Choose process isolation when decoders are flaky or streams are many and independent.<\/p>\n<p><strong>Fixed retry interval vs exponential backoff?<\/strong> Fixed interval hammers a down resource and floods logs; exponential backoff (with jitter and a cap) is gentle, avoids thundering-herd reconnects, and recovers fast when the camera returns. Always backoff + jitter.<\/p>\n<p><strong>Crash-and-restart vs in-process recovery?<\/strong> Sometimes the cleanest recovery is to let a worker die and have the supervisor respawn it (fresh state, no leaked resources) — \"crash-only\" design. In-process recovery is faster but risks accumulating subtle corruption. For native video stacks, supervised restart is often more robust.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../05-production-python/README.md\" href=\"#\">05-production-python/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"1-per-stream-isolation-limit-blast-radius","text":"1. Per-stream isolation (limit blast radius)"},{"level":2,"id":"2-watchdog-on-frame-freshness-catch-silent-freezes","text":"2. Watchdog on frame freshness (catch silent freezes)"},{"level":2,"id":"3-reconnect-with-exponential-backoff-jitter","text":"3. Reconnect with exponential backoff + jitter"},{"level":2,"id":"4-bound-every-buffer-no-leaks","text":"4. Bound every buffer (no leaks)"},{"level":2,"id":"5-graceful-degradation-dont-crash-shed-load","text":"5. Graceful degradation (don't crash, shed load)"},{"level":2,"id":"6-supervision-auto-restart-the-recoverer","text":"6. Supervision (auto-restart the recoverer)"},{"level":2,"id":"putting-it-together-the-worker-loop","text":"Putting it together (the worker loop)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"recovery patterns tl;dr: five patterns cover almost everything: isolate each stream, watchdog for freshness, reconnect with exponential backoff , bound every buffer , and degrade gracefully instead of crashing. supervise the whole thing so a dead worker auto-restarts. 1. per-stream isolation (limit blast radius) run each camera in its own worker — a thread, an asyncio task, or (safest) a separate process . a crash or stall in one is contained. process per camera — strongest isolation; a native decoder segfault kills one process, a supervisor respawns it. costs more memory. thread/task per camera — lighter, but a native crash can take the process down; fine when decoders are stable and you watchdog well. deepstream alternative: many streams in one pipeline, but then you need nvstreammux to tolerate a source dropping (it can, with proper config) so one bad source doesn't stall the batch. 2. watchdog on frame freshness (catch silent freezes) the freeze that throws no error is the dangerous one. track the timestamp of the last frame per camera; if now - last_frame > threshold , declare it dead and trigger reconnect — even though no exception fired. if time.monotonic() - last_frame_ts > stale_seconds: log.warning(\"camera %s stale, restarting\", cam_id) restart_stream(cam_id) 3. reconnect with exponential backoff + jitter don't hammer a down camera every 100ms (you'll dos it and flood logs). back off: 1s, 2s, 4s, 8s… capped (e.g., 30s), with a little random jitter so 40 cameras don't all retry in lockstep after a network blip. delay = min(base * 2 ** attempt, max_delay) + random.uniform(0, jitter) reset the counter on a successful reconnect. remember: after reconnect you wait for the next keyframe before clean frames resume. 4. bound every buffer (no leaks) from section 01: every queue bounded, drop-oldest for live. explicitly release gpu surfaces / unmap gstreamer buffers each iteration. a long-running process must have flat memory over days — test it: run 24h, watch rss/gpu mem. (tie to your resume: long-running petabyte pipelines.) 5. graceful degradation (don't crash, shed load) when overloaded, reduce service instead of dying: gpu oom risk → drop to a smaller batch or skip frames (process every nth). one model too slow → lower inference resolution or framerate. downstream db slow → buffer results briefly, then drop non-critical writes, keep the video loop alive. always fail open or fail safe by design , never by accident. 6. supervision (auto-restart the recoverer) wrap workers in a supervisor that restarts crashed ones (like erlang/otp supervision trees, or just a monitoring loop / k8s liveness probe). the recovery code itself can fail — something must watch the watcher. process level: systemd, supervisord, or **kubernetes liveness/readiness probes** (your gke experience) restart unhealthy pods. health endpoint: expose /healthz reporting per-camera freshness so the orchestrator and dashboards see truth. putting it together (the worker loop) def camera_worker(cam_id, url): attempt = 0 while not shutdown.is_set(): try: cap = open_stream(url) # gstreamer/nvdec pipeline attempt = 0 # reset backoff on success while not shutdown.is_set(): ok, frame = cap.read() if not ok or stale(cam_id): # eos or watchdog raise streamerror(\"dead\") latest[cam_id] = frame # bounded: overwrite, never grow mark_fresh(cam_id) except exception as e: log.warning(\"cam %s down: %s\", cam_id, e) release(cap) # free buffers/gpu surfaces! time.sleep(backoff(attempt)); attempt += 1 finally: release(cap) this single loop demonstrates isolation, watchdog, backoff, bounded buffer, and cleanup — a great thing to whiteboard. why x over y process-per-camera vs thread-per-camera? process = strongest isolation (native crash contained, true parallelism, no gil) at higher memory cost. thread = lighter and shares memory, but a native segfault or gil contention can hurt all of them. choose process isolation when decoders are flaky or streams are many and independent. fixed retry interval vs exponential backoff? fixed interval hammers a down resource and floods logs; exponential backoff (with jitter and a cap) is gentle, avoids thundering-herd reconnects, and recovers fast when the camera returns. always backoff + jitter. crash-and-

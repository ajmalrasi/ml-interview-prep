restart vs in-process recovery? sometimes the cleanest recovery is to let a worker die and have the supervisor respawn it (fresh state, no leaked resources) — \"crash-only\" design. in-process recovery is faster but risks accumulating subtle corruption. for native video stacks, supervised restart is often more robust. → back to section readme · next section: 05-production-python/","words":704},{"path":"05-production-python/README.md","title":"Overview","section":"5 · Production Python","quiz":false,"html":"<h1 id=\"05-production-python-for-video\">05 — Production Python for Video<\/h1>\n<p><strong>TL;DR:<\/strong> The JD wants <em>\"fault-tolerant, multi-threaded/async code… manage resources in long-running processes.\"<\/em> The crux is Python's <strong>GIL<\/strong>: it stops two threads running Python bytecode at once. The trick is knowing that video decode and GPU inference release the GIL (so threads <em>do<\/em> help there), while pure-Python work needs processes. Pick the right concurrency model per stage.<\/p>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"gil-threads-async-processes.md\" href=\"#\">gil-threads-async-processes.md<\/a> — the concurrency decision<\/li><li><a class=\"mdlink\" data-href=\"memory-and-resources.md\" href=\"#\">memory-and-resources.md<\/a> — leaks, GPU memory, long-running hygiene<\/li><\/ol>\n<h2 id=\"the-line-that-proves-you-get-it\">The line that proves you get it<\/h2>\n<p>*\"The GIL means CPU-bound Python doesn't parallelize across threads — but <code>cv2<\/code>/NVDEC decode, TensorRT inference, and numpy release the GIL, so an I/O-and-native pipeline scales fine on threads. When I have heavy <em>Python-side<\/em> logic per camera, I move it to processes. I match the concurrency model to where the time is spent.\"*<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"gil-threads-async-processes.md\" href=\"#\">gil-threads-async-processes.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-line-that-proves-you-get-it","text":"The line that proves you get it"}],"text":"05 — production python for video tl;dr: the jd wants \"fault-tolerant, multi-threaded/async code… manage resources in long-running processes.\" the crux is python's gil : it stops two threads running python bytecode at once. the trick is knowing that video decode and gpu inference release the gil (so threads do help there), while pure-python work needs processes. pick the right concurrency model per stage. files: gil-threads-async-processes.md — the concurrency decision memory-and-resources.md — leaks, gpu memory, long-running hygiene the line that proves you get it *\"the gil means cpu-bound python doesn't parallelize across threads — but cv2 /nvdec decode, tensorrt inference, and numpy release the gil, so an i/o-and-native pipeline scales fine on threads. when i have heavy python-side logic per camera, i move it to processes. i match the concurrency model to where the time is spent.\"* → start: gil-threads-async-processes.md","words":139},{"path":"05-production-python/gil-threads-async-processes.md","title":"GIL, Threads, Async, Processes","section":"5 · Production Python","quiz":false,"html":"<h1 id=\"gil-threads-async-processes\">GIL, Threads, Async, Processes<\/h1>\n<p><strong>TL;DR:<\/strong> Three concurrency tools, three jobs. <strong>Threads<\/strong> → I/O-bound and native code that releases the GIL (decode, inference, network). <strong>Async<\/strong> → managing many network connections/streams with low overhead. <strong>Processes<\/strong> → CPU-bound pure-Python work and hard isolation. The GIL is the reason this choice matters.<\/p>\n<h2 id=\"the-gil-in-one-paragraph\">The GIL in one paragraph<\/h2>\n<p>CPython's <strong>Global Interpreter Lock<\/strong> lets only one thread execute Python bytecode at a time. So two threads doing pure-Python math don't run in parallel — they take turns. <strong>But<\/strong> when a thread enters C code that releases the GIL — OpenCV decode, numpy ops, TensorRT/CUDA calls, socket reads — other Python threads run meanwhile. That's why a video pipeline (mostly native + I/O) parallelizes well on threads despite the GIL.<\/p>\n<blockquote><p>(Note for currency: Python 3.13 introduced an experimental <em>free-threaded<\/em> no-GIL build. Mention it as awareness, but reason about the standard GIL build unless told otherwise.)<\/p><\/blockquote>\n<h2 id=\"when-to-use-each\">When to use each<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Tool<\/th><th>Best for<\/th><th>In a video pipeline<\/th><\/tr><\/thead><tbody><tr><td><strong>Threading<\/strong><\/td><td>I/O-bound; native code that releases GIL<\/td><td>decode threads, frame-grab per camera, inference calls — <strong>the default for streaming<\/strong><\/td><\/tr><tr><td><strong>asyncio<\/strong><\/td><td>thousands of concurrent I/O waits, low overhead<\/td><td>managing many RTSP/WebRTC connections, async network serving (FastAPI), signaling<\/td><\/tr><tr><td><strong>multiprocessing<\/strong><\/td><td>CPU-bound pure-Python; isolation<\/td><td>heavy per-frame Python logic, per-camera process isolation, sidestepping GIL entirely<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"threads-vs-async-the-nuance\">Threads vs async (the nuance)<\/h2>\n<ul><li><strong>Threads<\/strong>: pre-emptive (OS switches them), simple to write, but each has stack<\/li><\/ul>\n<p>overhead; thousands of threads = heavy.<\/p>\n<ul><li><strong>Async<\/strong>: cooperative (tasks yield at <code>await<\/code>), one thread, tiny overhead per<\/li><\/ul>\n<p>task — great for <em>many<\/em> concurrent connections. But <strong>one blocking call freezes   the whole loop<\/strong>, so CPU-heavy or blocking-native work must go to an executor   (<code>run_in_executor<\/code>) or a process.<\/p>\n<ul><li>For a handful of cameras with native decode → threads are simplest. For hundreds<\/li><\/ul>\n<p>of lightweight connections / a web-facing service → async.<\/p>\n<h2 id=\"the-producerconsumer-skeleton-threads\">The producer/consumer skeleton (threads)<\/h2>\n<pre><code class=\"language-python\">import threading, queue\nframes = queue.Queue(maxsize=2)        # bounded — backpressure\n\ndef producer(url):                     # GIL released during decode\n    cap = open_stream(url)\n    while running:\n        ok, f = cap.read()\n        try: frames.put_nowait(f)\n        except queue.Full:\n            frames.get_nowait(); frames.put_nowait(f)   # drop oldest\n\ndef consumer():                        # GIL released during TRT inference\n    while running:\n        f = frames.get()\n        run_inference(f)\n\nthreading.Thread(target=producer, args=(url,), daemon=True).start()\nthreading.Thread(target=consumer, daemon=True).start()<\/code><\/pre>\n<h2 id=\"why-processes-for-cpu-bound-python\">Why processes for CPU-bound Python<\/h2>\n<p>If per-camera logic is heavy <em>Python<\/em> (complex geometry, lots of small ops not in numpy), threads serialize on the GIL and you get no speedup. Move to <code>multiprocessing<\/code> (or <code>ProcessPoolExecutor<\/code>) so each runs on its own core — at the cost of IPC (pickling frames between processes is expensive; prefer shared memory or keep frames on GPU).<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Threads vs multiprocessing for a video decode + infer pipeline?<\/strong> Decode (OpenCV/NVDEC) and inference (TensorRT/CUDA) release the GIL, so threads give real parallelism with shared memory and no IPC cost — the right default. Use multiprocessing only when the bottleneck is <em>pure-Python<\/em> CPU work or you need crash isolation.<\/p>\n<p><strong>asyncio vs threads for many RTSP connections?<\/strong> Async scales to many concurrent I/O waits with minimal overhead and no thread-count explosion — good for the <em>connection management<\/em> layer. But blocking/native decode must be offloaded to threads/processes. Common design: async for orchestration + threads for decode/infer.<\/p>\n<p><strong>Why does the GIL not kill video performance?<\/strong> Because the heavy lifting is in C extensions (cv2, numpy, CUDA) that release the GIL during execution. The GIL only bites on pure-Python hot loops — keep those out of the per-frame path (vectorize, push to GPU).<\/p>\n<p><strong>multiprocessing frame passing — what's the catch?<\/strong> Sending full frames between processes pickles/copies them (slow, memory-heavy). Mitigate with <code>shared_memory<\/code>, memory-mapped buffers, or keeping pixels on the GPU and passing only handles/metadata.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"memory-and-resources.md\" href=\"#\">memory-and-resources.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-gil-in-one-paragraph","text":"The GIL in one paragraph"},{"level":2,"id":"when-to-use-each","text":"When to use each"},{"level":2,"id":"threads-vs-async-the-nuance","text":"Threads vs async (the nuance)"},{"level":2,"id":"the-producerconsumer-skeleton-threads","text":"The producer/consumer skeleton (threads)"},{"level":2,"id":"why-processes-for-cpu-bound-python","text":"Why processes for CPU-bound Python"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"gil, threads, async, processes tl;dr: three concurrency tools, three jobs. threads → i/o-bound and native code that releases the gil (decode, inference, network). async → managing many network connections/streams with low overhead. processes → cpu-bound pure-python work and hard isolation. the gil is the reason this choice matters. the gil in one paragraph cpython's global interpreter lock lets only one thread execute python bytecode at a time. so two threads doing pure-python math don't run in parallel — they take turns. but when a thread enters c code that releases the gil — opencv decode, numpy ops, tensorrt/cuda calls, socket reads — other python threads run meanwhile. that's why a video pipeline (mostly native + i/o) parallelizes well on threads despite the gil. (note for currency: python 3.13 introduced an experimental free-threaded no-gil build. mention it as awareness, but reason about the standard gil build unless told otherwise.) when to use each tool best for in a video pipeline threading i/o-bound; native code that releases gil decode threads, frame-grab per camera, inference calls — the default for streaming asyncio thousands of concurrent i/o waits, low overhead managing many rtsp/webrtc connections, async network serving (fastapi), signaling multiprocessing cpu-bound pure-python; isolation heavy per-frame python logic, per-camera process isolation, sidestepping gil entirely threads vs async (the nuance) threads : pre-emptive (os switches them), simple to write, but each has stack overhead; thousands of threads = heavy. async : cooperative (tasks yield at await ), one thread, tiny overhead per task — great for many concurrent connections. but one blocking call freezes the whole loop , so cpu-heavy or blocking-native work must go to an executor ( run_in_executor ) or a process. for a handful of cameras with native decode → threads are simplest. for hundreds of lightweight connections / a web-facing service → async. the producer/consumer skeleton (threads) import threading, queue frames = queue.queue(maxsize=2) # bounded — backpressure def producer(url): # gil released during decode cap = open_stream(url) while running: ok, f = cap.read() try: frames.put_nowait(f) except queue.full: frames.get_nowait(); frames.put_nowait(f) # drop oldest def consumer(): # gil released during trt inference while running: f = frames.get() run_inference(f) threading.thread(target=producer, args=(url,), daemon=true).start() threading.thread(target=consumer, daemon=true).start() why processes for cpu-bound python if per-camera logic is heavy python (complex geometry, lots of small ops not in numpy), threads serialize on the gil and you get no speedup. move to multiprocessing (or processpoolexecutor ) so each runs on its own core — at the cost of ipc (pickling frames between processes is expensive; prefer shared memory or keep frames on gpu). why x over y threads vs multiprocessing for a video decode + infer pipeline? decode (opencv/nvdec) and inference (tensorrt/cuda) release the gil, so threads give real parallelism with shared memory and no ipc cost — the right default. use multiprocessing only when the bottleneck is pure-python cpu work or you need crash isolation. asyncio vs threads for many rtsp connections? async scales to many concurrent i/o waits with minimal overhead and no thread-count explosion — good for the connection management layer. but blocking/native decode must be offloaded to threads/processes. common design: async for orchestration + threads for decode/infer. why does the gil not kill video performance? because the heavy lifting is in c extensions (cv2, numpy, cuda) that release the gil during execution. the gil only bites on pure-python hot loops — keep those out of the per-frame path (vectorize, push to gpu). multiprocessing frame passing — what's the catch? sending full frames between processes pickles/copies them (slow, memory-heavy). mitigate with shared_memory , memory-mapped buffers, or keeping pixels on the gpu and passing only handles/metadata. → next: memory-and-resources.md","words":600},{"path":"05-production-python/memory-and-resources.md","title":"Memory & Resources","section":"5 · Production Python","quiz":false,"html":"<h1 id=\"memory-resource-hygiene-in-long-running-processes\">Memory &amp; Resource Hygiene in Long-Running Processes<\/h1>\n<p><strong>TL;DR:<\/strong> A video service runs for weeks. Anything that grows even slightly per frame will eventually OOM. The job is <strong>flat memory forever<\/strong>: bound every buffer, release every GPU surface, close every handle, and <em>test it over 24h+<\/em>. This is the JD's \"without memory leaks\" / \"manage resources in long-running processes,\" and it echoes your petabyte-pipeline reliability work.<\/p>\n<h2 id=\"where-video-memory-leaks-come-from\">Where video memory leaks come from<\/h2>\n<ol><li><strong>Unbounded queues<\/strong> — consumer slower than producer (covered in 01). #1 cause.<\/li><li><strong>Unreleased GPU surfaces<\/strong> — decoded NVMM buffers / CUDA tensors not freed each<\/li><\/ol>\n<p>iteration → GPU OOM, often before host OOM.<\/p>\n<ol><li><strong>Un-<code>unmap<\/code>ped GStreamer buffers<\/strong> — mapping a buffer and not unmapping (02).<\/li><li><strong>Accumulating references<\/strong> — appending detections/frames to a list \"for later,\"<\/li><\/ol>\n<p>growing tracker state without eviction, caches without limits.<\/p>\n<ol><li><strong>C-extension leaks<\/strong> — some native ops leak; only visible as steady RSS growth.<\/li><li><strong>Fragmentation<\/strong> — long runs fragment the allocator; RSS creeps even without a<\/li><\/ol>\n<p>true leak.<\/p>\n<h2 id=\"how-to-find-them-your-evidence-driven-method\">How to find them (your evidence-driven method)<\/h2>\n<ul><li><strong>Watch the trend, not the snapshot.<\/strong> Plot RSS and GPU memory (<code>nvidia-smi<\/code>,<\/li><\/ul>\n<p><code>tegrastats<\/code>) over hours. A leak is a slope; healthy is flat/sawtooth.<\/p>\n<ul><li><strong>Python heap:<\/strong> <code>tracemalloc<\/code>, <code>objgraph<\/code>, <code>memory_profiler<\/code> to find growing<\/li><\/ul>\n<p>object counts.<\/p>\n<ul><li><strong>GPU:<\/strong> <code>torch.cuda.memory_summary()<\/code> / TensorRT workspace accounting; confirm<\/li><\/ul>\n<p>per-iteration free.<\/p>\n<ul><li><strong>Bisect by stage:<\/strong> disable inference, then tracking, then DB — see which stage's<\/li><\/ul>\n<p>removal flattens the curve. (Same isolate-a-variable approach as your NVMe-vs-NAS   diagnosis.)<\/p>\n<h2 id=\"hygiene-checklist\">Hygiene checklist<\/h2>\n<ul><li>Bound <strong>every<\/strong> queue; choose drop policy per stage.<\/li><li>Release GPU buffers / <code>del<\/code> tensors / <code>unmap<\/code> buffers each iteration; use context<\/li><\/ul>\n<p>managers (<code>with<\/code>) so cleanup happens even on exception.<\/p>\n<ul><li>Cap tracker/state dicts; evict stale track IDs.<\/li><li>Reuse pre-allocated buffers instead of allocating per frame (steady-state, less<\/li><\/ul>\n<p>fragmentation).<\/p>\n<ul><li>Set explicit limits: max detections, max queue depth, max in-flight batches.<\/li><li>Pin a periodic health log: RSS, GPU mem, per-camera fps, queue depths.<\/li><li><strong>Soak test:<\/strong> run the full pipeline 24–72h under realistic load before shipping.<\/li><\/ul>\n<h2 id=\"gpu-memory-specifics\">GPU memory specifics<\/h2>\n<ul><li>GPU RAM is small and shared (decode + inference + overlay). OOM here crashes the<\/li><\/ul>\n<p>process. Budget it: <code>decode buffers + model workspace + batch tensors + headroom<\/code>.<\/p>\n<ul><li>TensorRT engines hold a workspace; multiple model instances multiply it.<\/li><li>Prefer <strong>streaming/zero-copy<\/strong> so you don't hold N full frames in GPU memory at<\/li><\/ul>\n<p>once.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Why bound buffers instead of \"just add more RAM\"?<\/strong> More RAM delays the OOM; it doesn't fix it. An unbounded queue under sustained overload grows without limit — bounding + dropping is the only stable steady state.<\/p>\n<p><strong>Pre-allocate buffers vs allocate per frame?<\/strong> Per-frame allocation churns the allocator (fragmentation, GC pressure, latency jitter). Pre-allocating and reusing gives flat, predictable memory and steadier latency in a long-running loop.<\/p>\n<p><strong>Why soak-test instead of trusting a clean 5-minute run?<\/strong> Leaks and fragmentation are <em>slopes<\/em> — invisible in minutes, fatal in days. A 24h+ soak with memory trending is the only way to prove \"no leaks in a long-running process,\" which is exactly what they're asking for.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../06-system-design/README.md\" href=\"#\">06-system-design/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"where-video-memory-leaks-come-from","text":"Where video memory leaks come from"},{"level":2,"id":"how-to-find-them-your-evidence-driven-method","text":"How to find them (your evidence-driven method)"},{"level":2,"id":"hygiene-checklist","text":"Hygiene checklist"},{"level":2,"id":"gpu-memory-specifics","text":"GPU memory specifics"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"memory & resource hygiene in long-running processes tl;dr: a video service runs for weeks. anything that grows even slightly per frame will eventually oom. the job is flat memory forever : bound every buffer, release every gpu surface, close every handle, and test it over 24h+ . this is the jd's \"without memory leaks\" / \"manage resources in long-running processes,\" and it echoes your petabyte-pipeline reliability work. where video memory leaks come from unbounded queues — consumer slower than producer (covered in 01). #1 cause. unreleased gpu surfaces — decoded nvmm buffers / cuda tensors not freed each iteration → gpu oom, often before host oom. un- unmap ped gstreamer buffers — mapping a buffer and not unmapping (02). accumulating references — appending detections/frames to a list \"for later,\" growing tracker state without eviction, caches without limits. c-extension leaks — some native ops leak; only visible as steady rss growth. fragmentation — long runs fragment the allocator; rss creeps even without a true leak. how to find them (your evidence-driven method) watch the trend, not the snapshot. plot rss and gpu memory ( nvidia-smi , tegrastats ) over hours. a leak is a slope; healthy is flat/sawtooth. python heap: tracemalloc , objgraph , memory_profiler to find growing object counts. gpu: torch.cuda.memory_summary() / tensorrt workspace accounting; confirm per-iteration free. bisect by stage: disable inference, then tracking, then db — see which stage's removal flattens the curve. (same isolate-a-variable approach as your nvme-vs-nas diagnosis.) hygiene checklist bound every queue; choose drop policy per stage. release gpu buffers / del tensors / unmap buffers each iteration; use context managers ( with ) so cleanup happens even on exception. cap tracker/state dicts; evict stale track ids. reuse pre-allocated buffers instead of allocating per frame (steady-state, less fragmentation). set explicit limits: max detections, max queue depth, max in-flight batches. pin a periodic health log: rss, gpu mem, per-camera fps, queue depths. soak test: run the full pipeline 24–72h under realistic load before shipping. gpu memory specifics gpu ram is small and shared (decode + inference + overlay). oom here crashes the process. budget it: decode buffers + model workspace + batch tensors + headroom . tensorrt engines hold a workspace; multiple model instances multiply it. prefer streaming/zero-copy so you don't hold n full frames in gpu memory at once. why x over y why bound buffers instead of \"just add more ram\"? more ram delays the oom; it doesn't fix it. an unbounded queue under sustained overload grows without limit — bounding + dropping is the only stable steady state. pre-allocate buffers vs allocate per frame? per-frame allocation churns the allocator (fragmentation, gc pressure, latency jitter). pre-allocating and reusing gives flat, predictable memory and steadier latency in a long-running loop. why soak-test instead of trusting a clean 5-minute run? leaks and fragmentation are slopes — invisible in minutes, fatal in days. a 24h+ soak with memory trending is the only way to prove \"no leaks in a long-running process,\" which is exactly what they're asking for. → back to section readme · next section: 06-system-design/","words":510},{"path":"06-system-design/README.md","title":"Overview","section":"6 · System Design","quiz":false,"html":"<h1 id=\"06-system-design\">06 — System Design<\/h1>\n<p><strong>TL;DR:<\/strong> This is the round you said you're prepping for. Expect an open prompt like <em>\"Design a system that runs object detection on 50 RTSP cameras, 24/7, on the edge and cloud, and never needs a human to restart it.\"<\/em> This section gives you a repeatable structure, a worked answer, and the follow-up curveballs.<\/p>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"framework.md\" href=\"#\">framework.md<\/a> — how to drive any CV-systems design question<\/li><li><a class=\"mdlink\" data-href=\"worked-example-multicam.md\" href=\"#\">worked-example-multicam.md<\/a> — the 50-camera crash-proof pipeline, end to end<\/li><li><a class=\"mdlink\" data-href=\"curveballs.md\" href=\"#\">curveballs.md<\/a> — the follow-ups they pile on<\/li><\/ol>\n<h2 id=\"how-design-rounds-are-graded\">How design rounds are graded<\/h2>\n<p>They're not looking for the \"right\" diagram. They score: do you <strong>clarify requirements<\/strong>, <strong>state assumptions<\/strong>, <strong>reason about tradeoffs<\/strong>, <strong>find bottlenecks<\/strong>, and <strong>handle failure<\/strong>? Your resume's \"ambiguous problems with no obvious answer\" is exactly this muscle — show the <em>method<\/em>, think out loud.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"framework.md\" href=\"#\">framework.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"how-design-rounds-are-graded","text":"How design rounds are graded"}],"text":"06 — system design tl;dr: this is the round you said you're prepping for. expect an open prompt like \"design a system that runs object detection on 50 rtsp cameras, 24/7, on the edge and cloud, and never needs a human to restart it.\" this section gives you a repeatable structure, a worked answer, and the follow-up curveballs. files: framework.md — how to drive any cv-systems design question worked-example-multicam.md — the 50-camera crash-proof pipeline, end to end curveballs.md — the follow-ups they pile on how design rounds are graded they're not looking for the \"right\" diagram. they score: do you clarify requirements , state assumptions , reason about tradeoffs , find bottlenecks , and handle failure ? your resume's \"ambiguous problems with no obvious answer\" is exactly this muscle — show the method , think out loud. → start: framework.md","words":140},{"path":"06-system-design/framework.md","title":"Design Framework","section":"6 · System Design","quiz":false,"html":"<h1 id=\"a-framework-for-cv-systems-design-questions\">A Framework for CV-Systems Design Questions<\/h1>\n<p><strong>TL;DR:<\/strong> Don't start drawing. Run this five-step loop out loud: <strong>Clarify → Estimate → Architect → Bottleneck → Failure<\/strong>. It works for any \"design a video pipeline\" prompt and shows the senior-engineer method the JD wants.<\/p>\n<h2 id=\"step-1-clarify-never-skip\">Step 1 — Clarify (never skip)<\/h2>\n<p>Ask before you design. Good questions for any CV pipeline:<\/p>\n<ul><li><strong>Scale:<\/strong> how many cameras? resolution? framerate? Edge, cloud, or both?<\/li><li><strong>Latency SLA:<\/strong> real-time reaction (ms) or near-real-time analytics (seconds)?<\/li><li><strong>Model:<\/strong> detection/tracking/classification? given to me, or do I pick? size?<\/li><li><strong>Output:<\/strong> alerts? analytics to a DB? annotated stream to a UI?<\/li><li><strong>Accuracy vs cost:<\/strong> can I drop frames? skip cameras under load?<\/li><li><strong>Hardware budget:<\/strong> Jetson at the edge? GPUs in cloud? how many?<\/li><li><strong>Deployment:<\/strong> how many sites? connectivity reliability?<\/li><\/ul>\n<p><em>Stating these assumptions out loud is half the score.<\/em><\/p>\n<h2 id=\"step-2-estimate-back-of-envelope\">Step 2 — Estimate (back-of-envelope)<\/h2>\n<p>Show you can size it:<\/p>\n<ul><li>50 cams × 1080p × 30fps. Can one Jetson/GPU decode + infer that? NVDEC decode<\/li><\/ul>\n<p>capacity? GPU inference throughput at your batch/precision?<\/p>\n<ul><li>Bandwidth: 50 × ~4 Mbps (H.264 1080p) ≈ 200 Mbps ingest — link OK?<\/li><li>Conclusion drives architecture: one box won't do 50 → distribute (e.g., edge<\/li><\/ul>\n<p>boxes of 8–16 cams each, or a GPU cluster).<\/p>\n<h2 id=\"step-3-architect-the-diagram\">Step 3 — Architect (the diagram)<\/h2>\n<p>A defensible default:<\/p>\n<pre><code>Cameras (RTSP) → Edge node(s): GStreamer/DeepStream decode (NVDEC) + batched\n                 TRT inference + tracking → results as metadata\n                       │ (only small metadata + optional clips leave the edge)\n                       ▼\n              Message bus (Kafka/Pub/Sub) → Cloud: aggregation, storage\n                 (SQL/NoSQL), dashboards, WebRTC live view, retraining data<\/code><\/pre>\n<p>Key decisions to justify: edge vs cloud inference, per-camera isolation, batching at the mux, bounded buffers, hardware decode.<\/p>\n<h2 id=\"step-4-bottleneck-prove-you-measure\">Step 4 — Bottleneck (prove you measure)<\/h2>\n<p>Walk the latency budget (section 03): decode, copy, inference, post, network. Name the likely fattest slice and how you'd <em>measure<\/em> then fix it. Mention p99, GPU utilization as the diagnostic. This is your \"evidence-driven engineering\" signature.<\/p>\n<h2 id=\"step-5-failure-crash-proof-section-04\">Step 5 — Failure (crash-proof, section 04)<\/h2>\n<p>Close every design by addressing: camera drop (reconnect+backoff), silent freeze (watchdog), overload (drop frames / degrade), process crash (supervised restart), memory (bounded buffers, soak-tested), blast radius (per-stream isolation). They <em>will<\/em> ask; bring it up first.<\/p>\n<h2 id=\"the-cheat-phrase\">The cheat phrase<\/h2>\n<p><em>\"Let me clarify scale and SLA, do a quick capacity estimate, sketch an edge-heavy architecture, walk the latency budget to find the bottleneck, then make it crash-proof.\"<\/em> — say that and you've framed the whole answer.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"worked-example-multicam.md\" href=\"#\">worked-example-multicam.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"step-1-clarify-never-skip","text":"Step 1 — Clarify (never skip)"},{"level":2,"id":"step-2-estimate-back-of-envelope","text":"Step 2 — Estimate (back-of-envelope)"},{"level":2,"id":"step-3-architect-the-diagram","text":"Step 3 — Architect (the diagram)"},{"level":2,"id":"step-4-bottleneck-prove-you-measure","text":"Step 4 — Bottleneck (prove you measure)"},{"level":2,"id":"step-5-failure-crash-proof-section-04","text":"Step 5 — Failure (crash-proof, section 04)"},{"level":2,"id":"the-cheat-phrase","text":"The cheat phrase"}],"text":"a framework for cv-systems design questions tl;dr: don't start drawing. run this five-step loop out loud: clarify → estimate → architect → bottleneck → failure . it works for any \"design a video pipeline\" prompt and shows the senior-engineer method the jd wants. step 1 — clarify (never skip) ask before you design. good questions for any cv pipeline: scale: how many cameras? resolution? framerate? edge, cloud, or both? latency sla: real-time reaction (ms) or near-real-time analytics (seconds)? model: detection/tracking/classification? given to me, or do i pick? size? output: alerts? analytics to a db? annotated stream to a ui? accuracy vs cost: can i drop frames? skip cameras under load? hardware budget: jetson at the edge? gpus in cloud? how many? deployment: how many sites? connectivity reliability? stating these assumptions out loud is half the score. step 2 — estimate (back-of-envelope) show you can size it: 50 cams × 1080p × 30fps. can one jetson/gpu decode + infer that? nvdec decode capacity? gpu inference throughput at your batch/precision? bandwidth: 50 × ~4 mbps (h.264 1080p) ≈ 200 mbps ingest — link ok? conclusion drives architecture: one box won't do 50 → distribute (e.g., edge boxes of 8–16 cams each, or a gpu cluster). step 3 — architect (the diagram) a defensible default: cameras (rtsp) → edge node(s): gstreamer/deepstream decode (nvdec) + batched trt inference + tracking → results as metadata │ (only small metadata + optional clips leave the edge) ▼ message bus (kafka/pub/sub) → cloud: aggregation, storage (sql/nosql), dashboards, webrtc live view, retraining data key decisions to justify: edge vs cloud inference, per-camera isolation, batching at the mux, bounded buffers, hardware decode. step 4 — bottleneck (prove you measure) walk the latency budget (section 03): decode, copy, inference, post, network. name the likely fattest slice and how you'd measure then fix it. mention p99, gpu utilization as the diagnostic. this is your \"evidence-driven engineering\" signature. step 5 — failure (crash-proof, section 04) close every design by addressing: camera drop (reconnect+backoff), silent freeze (watchdog), overload (drop frames / degrade), process crash (supervised restart), memory (bounded buffers, soak-tested), blast radius (per-stream isolation). they will ask; bring it up first. the cheat phrase \"let me clarify scale and sla, do a quick capacity estimate, sketch an edge-heavy architecture, walk the latency budget to find the bottleneck, then make it crash-proof.\" — say that and you've framed the whole answer. → next: worked-example-multicam.md","words":400},{"path":"06-system-design/worked-example-multicam.md","title":"Worked Example: 50 Cameras","section":"6 · System Design","quiz":false,"html":"<h1 id=\"worked-example-50-camera-crash-proof-pipeline\">Worked Example: 50-Camera Crash-Proof Pipeline<\/h1>\n<p><strong>The prompt:<\/strong> <em>\"Design a system to run object detection + tracking on 50 RTSP cameras across a warehouse, 24/7, low latency, that recovers from failures without human intervention. Edge and cloud.\"<\/em><\/p>\n<p>This is a full model answer. Read it as <em>how to talk<\/em>, not a script to memorize.<\/p>\n<h2 id=\"1-clarify-state-assumptions\">1. Clarify (state assumptions)<\/h2>\n<p>\"I'll assume: 50× 1080p H.264 @ 30fps; given a YOLO-class detector; need near-real-time (~100–200ms) detections + persistent track IDs for counting/dwell; output is analytics to a DB plus a live annotated view for operators; one warehouse site with reliable LAN to cameras but possibly flaky WAN to cloud; NVIDIA hardware available (Jetson Orin / dGPU). Tell me if any of that's wrong.\"<\/p>\n<h2 id=\"2-capacity-estimate\">2. Capacity estimate<\/h2>\n<ul><li>Ingest: 50 × ~4 Mbps ≈ 200 Mbps on the LAN — fine.<\/li><li>One dGPU (e.g., with NVDEC) can decode dozens of 1080p streams and, with batched<\/li><\/ul>\n<p>INT8 TRT inference on a small detector, serve many cameras. 50 cams likely needs   <strong>1 strong GPU server or 2–4 Jetson Orin edge boxes<\/strong> (~12–16 cams each).<\/p>\n<ul><li>Decision: <strong>edge-heavy<\/strong> — infer at the edge, send only metadata + event clips to<\/li><\/ul>\n<p>cloud, so WAN flakiness and bandwidth aren't in the critical path.<\/p>\n<h2 id=\"3-architecture\">3. Architecture<\/h2>\n<pre><code>                 EDGE NODE (×N, each handles a camera group)\n ┌─────────────────────────────────────────────────────────────┐\n cam1..16 RTSP ─► GStreamer/DeepStream:\n                  nvv4l2decoder (NVDEC) ─► nvstreammux (batch=16)\n                  ─► nvinfer (INT8 TRT detector) ─► nvtracker (IDs)\n                  ─► pad probe: extract metadata (boxes, ids, ts)\n                       │                              │\n                       ▼                              ▼\n               local ring buffer of            results → local queue\n               recent frames (for clips)              │\n                                                       ▼\n                              local agent: dedup/aggregate, write event clips\n └───────────────────────────────────┬─────────────────────────┘\n                                      │ metadata + clips (small)\n                                      ▼\n                    Message bus (Kafka / GCP Pub/Sub)\n                                      │\n                                      ▼\n                 CLOUD: stream processor → SQL/NoSQL (events, analytics)\n                        ├─ dashboards / alerting\n                        ├─ WebRTC/FastRTC live annotated view for operators\n                        └─ sampled frames → retraining dataset<\/code><\/pre>\n<p><strong>Why these choices:<\/strong><\/p>\n<ul><li><strong>Edge inference<\/strong>: lowest latency, no full-video egress, survives WAN outages.<\/li><li><strong>DeepStream + nvstreammux batching<\/strong>: many cams per GPU at low latency (sec 02/03).<\/li><li><strong>INT8 TRT engine<\/strong> built on the edge hardware (sec 03): max throughput.<\/li><li><strong>Metadata-only egress<\/strong>: cheap, private; clips only on events.<\/li><li><strong>Message bus<\/strong>: decouples edge from cloud; buffers during WAN blips.<\/li><li><strong>Cloud for state/UI/retraining<\/strong>: scales independently of the edge.<\/li><\/ul>\n<h2 id=\"4-latency-budget\">4. Latency budget<\/h2>\n<p>\"End to end I'd budget: decode ~few ms (NVDEC) → preprocess on GPU → batched inference (the fat slice; tune batch vs p99) → tracking (cheap) → metadata out. Target sub-150ms to detection. I'd timestamp each stage, watch p99 and GPU utilization; if util is low but latency high, I'm copy/CPU-bound and I keep frames in GPU memory and move preprocessing onto the GPU.\"<\/p>\n<h2 id=\"5-crash-proof-the-part-theyre-really-testing\">5. Crash-proof (the part they're really testing)<\/h2>\n<ul><li><strong>Per-camera isolation:<\/strong> each camera group in its own supervised pipeline/process;<\/li><\/ul>\n<p><code>nvstreammux<\/code> configured so one dropped source doesn't stall the batch. Blast   radius = one camera.<\/p>\n<ul><li><strong>Camera offline / EOS:<\/strong> detected on the GStreamer bus → tear to NULL, reconnect<\/li><\/ul>\n<p>with exponential backoff + jitter; wait for keyframe.<\/p>\n<ul><li><strong>Silent freeze:<\/strong> per-camera frame-freshness watchdog → force restart.<\/li><li><strong>Overload / GPU OOM:<\/strong> graceful degradation — shrink batch, drop to every-Nth<\/li><\/ul>\n<p>frame, or lower inference resolution before crashing.<\/p>\n<ul><li><strong>Process crash:<\/strong> supervised by systemd/Kubernetes liveness probes (GKE) →<\/li><\/ul>\n<p>auto-restart; crash-only design means a fresh worker has clean state.<\/p>\n<ul><li><strong>WAN outage:<\/strong> edge keeps running and inferring; metadata/clips buffer locally<\/li><\/ul>\n<p>(bounded, drop oldest non-critical) and flush when the bus reconnects.<\/p>\n<ul><li><strong>Memory:<\/strong> every queue bounded, GPU surfaces released per iteration, 24–72h soak<\/li><\/ul>\n<p>test proving flat memory.<\/p>\n<ul><li><strong>Observability:<\/strong> per-camera fps/freshness/queue-depth health endpoint +<\/li><\/ul>\n<p>Prometheus; alert when a camera is down &gt; threshold.<\/p>\n<h2 id=\"6-scaling-evolution\">6. Scaling &amp; evolution<\/h2>\n<ul><li>Add cameras → add edge nodes (horizontal). Cloud scales separately.<\/li><li>New model → version via Triton (cloud) or rebuild TRT engine + canary one edge<\/li><\/ul>\n<p>node first.<\/p>\n<ul><li>Multi-site → same edge node template per site, central cloud aggregation.<\/li><\/ul>\n<h2 id=\"the-30-second-summary-if-they-want-it-short\">The 30-second summary (if they want it short)<\/h2>\n<p>\"Decode on NVDEC, batch many cameras through one INT8 TensorRT engine via DeepStream at the edge, keep frames on the GPU, emit only metadata to a message bus, and do state/UI/retraining in the cloud. Each camera is an isolated, watchdogged, auto-reconnecting worker under a supervisor, with bounded buffers and graceful degradation — so a camera or WAN failure self-heals and never takes the system down.\"<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"curveballs.md\" href=\"#\">curveballs.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"1-clarify-state-assumptions","text":"1. Clarify (state assumptions)"},{"level":2,"id":"2-capacity-estimate","text":"2. Capacity estimate"},{"level":2,"id":"3-architecture","text":"3. Architecture"},{"level":2,"id":"4-latency-budget","text":"4. Latency budget"},{"level":2,"id":"5-crash-proof-the-part-theyre-really-testing","text":"5. Crash-proof (the part they're really testing)"},{"level":2,"id":"6-scaling-evolution","text":"6. Scaling &amp; evolution"},{"level":2,"id":"the-30-second-summary-if-they-want-it-short","text":"The 30-second summary (if they want it short)"}],"text":"worked example: 50-camera crash-proof pipeline the prompt: \"design a system to run object detection + tracking on 50 rtsp cameras across a warehouse, 24/7, low latency, that recovers from failures without human intervention. edge and cloud.\" this is a full model answer. read it as how to talk , not a script to memorize. 1. clarify (state assumptions) \"i'll assume: 50× 1080p h.264 @ 30fps; given a yolo-class detector; need near-real-time (~100–200ms) detections + persistent track ids for counting/dwell; output is analytics to a db plus a live annotated view for operators; one warehouse site with reliable lan to cameras but possibly flaky wan to cloud; nvidia hardware available (jetson orin / dgpu). tell me if any of that's wrong.\" 2. capacity estimate ingest: 50 × ~4 mbps ≈ 200 mbps on the lan — fine. one dgpu (e.g., with nvdec) can decode dozens of 1080p streams and, with batched int8 trt inference on a small detector, serve many cameras. 50 cams likely needs 1 strong gpu server or 2–4 jetson orin edge boxes (~12–16 cams each). decision: edge-heavy — infer at the edge, send only metadata + event clips to cloud, so wan flakiness and bandwidth aren't in the critical path. 3. architecture edge node (×n, each handles a camera group) ┌─────────────────────────────────────────────────────────────┐ cam1..16 rtsp ─► gstreamer/deepstream: nvv4l2decoder (nvdec) ─► nvstreammux (batch=16) ─► nvinfer (int8 trt detector) ─► nvtracker (ids) ─► pad probe: extract metadata (boxes, ids, ts) │ │ ▼ ▼ local ring buffer of results → local queue recent frames (for clips) │ ▼ local agent: dedup/aggregate, write event clips └───────────────────────────────────┬─────────────────────────┘ │ metadata + clips (small) ▼ message bus (kafka / gcp pub/sub) │ ▼ cloud: stream processor → sql/nosql (events, analytics) ├─ dashboards / alerting ├─ webrtc/fastrtc live annotated view for operators └─ sampled frames → retraining dataset why these choices: edge inference : lowest latency, no full-video egress, survives wan outages. deepstream + nvstreammux batching : many cams per gpu at low latency (sec 02/03). int8 trt engine built on the edge hardware (sec 03): max throughput. metadata-only egress : cheap, private; clips only on events. message bus : decouples edge from cloud; buffers during wan blips. cloud for state/ui/retraining : scales independently of the edge. 4. latency budget \"end to end i'd budget: decode ~few ms (nvdec) → preprocess on gpu → batched inference (the fat slice; tune batch vs p99) → tracking (cheap) → metadata out. target sub-150ms to detection. i'd timestamp each stage, watch p99 and gpu utilization; if util is low but latency high, i'm copy/cpu-bound and i keep frames in gpu memory and move preprocessing onto the gpu.\" 5. crash-proof (the part they're really testing) per-camera isolation: each camera group in its own supervised pipeline/process; nvstreammux configured so one dropped source doesn't stall the batch. blast radius = one camera. camera offline / eos: detected on the gstreamer bus → tear to null, reconnect with exponential backoff + jitter; wait for keyframe. silent freeze: per-camera frame-freshness watchdog → force restart. overload / gpu oom: graceful degradation — shrink batch, drop to every-nth frame, or lower inference resolution before crashing. process crash: supervised by systemd/kubernetes liveness probes (gke) → auto-restart; crash-only design means a fresh worker has clean state. wan outage: edge keeps running and inferring; metadata/clips buffer locally (bounded, drop oldest non-critical) and flush when the bus reconnects. memory: every queue bounded, gpu surfaces released per iteration, 24–72h soak test proving flat memory. observability: per-camera fps/freshness/queue-depth health endpoint + prometheus; alert when a camera is down > threshold. 6. scaling & evolution add cameras → add edge nodes (horizontal). cloud scales separately. new model → version via triton (cloud) or rebuild trt engine + canary one edge node first. multi-site → same edge node template per site, central cloud aggregation. the 30-second summary (if they want it short) \"decode on nvdec, batch many cameras through one int8 tensorrt engine via deepstream at the edge, keep frames on the gpu, emit only metadata to a message bus, and do state/ui/retraining in the cloud. each camera is an isolated, watchdogged, auto-reconnecting worker under a supervisor, with bounded buffers and graceful degradation — so a camera or wan failure self-heals and never takes the system down.\" → next: curveballs.md","words":705},{"path":"06-system-design/curveballs.md","title":"Curveballs","section":"6 · System Design","quiz":false,"html":"<h1 id=\"design-curveballs-the-follow-ups\">Design Curveballs (The Follow-Ups)<\/h1>\n<p><strong>TL;DR:<\/strong> After your main answer, they pile on constraints to see how you adapt. Here are the common ones with crisp directions. The meta-move: restate the new constraint, name the tradeoff it forces, adjust one part of the design.<\/p>\n<h2 id=\"now-make-it-500-cameras\">\"Now make it 500 cameras.\"<\/h2>\n<p>Horizontal scale: more edge nodes (camera groups of 12–16 each), unchanged per-node design. Cloud aggregation scales out (partitioned Kafka topics, sharded DB). The edge template is the unit of scale — that's why edge-heavy design scales linearly.<\/p>\n<h2 id=\"latency-must-be-under-50ms\">\"Latency must be under 50ms.\"<\/h2>\n<p>Attack the budget: smaller/distilled detector, lower inference resolution, INT8, reduce batch size (less fill-wait) and add more parallel instances/streams, drop B-frames, shrink jitter buffer. Move <em>all<\/em> pre/post to GPU; eliminate CPU round trips. Accept fewer cameras per GPU.<\/p>\n<h2 id=\"the-gpu-keeps-running-out-of-memory\">\"The GPU keeps running out of memory.\"<\/h2>\n<p>Diagnose: count decode buffers + model workspace × instances + batch tensors. Fixes: smaller batch, fewer model instances, lower decode buffer count, INT8 (¼ memory), release surfaces per iteration. Add graceful degradation so OOM-risk sheds load, not crashes.<\/p>\n<h2 id=\"a-camera-sends-corruptedgarbage-frames\">\"A camera sends corrupted/garbage frames.\"<\/h2>\n<p>Validate frames (resolution/format sanity, decode errors from the bus). Skip bad frames, keep the stream. If persistent, mark camera unhealthy, backoff-reconnect, alert. Never let one malformed stream segfault the shared pipeline — isolation + input validation.<\/p>\n<h2 id=\"cloud-connection-drops-for-an-hour\">\"Cloud connection drops for an hour.\"<\/h2>\n<p>Edge keeps inferring (that's the point of edge inference). Buffer metadata/clips locally in a bounded store (drop oldest non-critical first), flush on reconnect. Critical alerts get a local fallback path (on-site siren/log). System degrades, not dies.<\/p>\n<h2 id=\"how-do-you-deploy-a-new-model-with-zero-downtime\">\"How do you deploy a new model with zero downtime?\"<\/h2>\n<p>Canary: build/validate the new TRT engine, roll it to one edge node, compare detections/metrics against the old, then progressive rollout. Cloud models via Triton version hot-swap. Keep the old engine to roll back instantly.<\/p>\n<h2 id=\"how-do-you-know-its-actually-working-in-production\">\"How do you know it's actually working in production?\"<\/h2>\n<p>Observability: per-camera fps/freshness, queue depths, p99 latency, GPU util, detection-rate anomalies (a camera that suddenly detects nothing may be mispointed/frozen). Health endpoint + Prometheus + alerts. \"You can't operate what you can't see\" — ties to your benchmarking/measurement ethos.<\/p>\n<h2 id=\"detections-look-wrong-on-some-cameras\">\"Detections look wrong on some cameras.\"<\/h2>\n<p>Could be: domain shift (lighting/angle differs from training), wrong calibration, resolution mismatch in preprocessing, or quantization accuracy drop. Diagnose by isolating: check raw frames, check preprocessing, A/B FP16 vs INT8, error-analyze by camera. (Your model-eval + error-analysis background.)<\/p>\n<h2 id=\"edge-vs-cloud-inference-defend-your-choice\">\"Edge vs cloud inference — defend your choice.\"<\/h2>\n<p>Edge: lowest latency, no video egress, privacy, survives WAN loss — but limited compute, harder to update, per-site hardware cost. Cloud: elastic compute, easy updates, central management — but latency, bandwidth/egress cost, WAN dependency. Most real systems: <strong>infer at edge, manage/aggregate/retrain in cloud<\/strong> (what you'd propose).<\/p>\n<h2 id=\"the-meta-pattern-for-any-curveball\">The meta-pattern for any curveball<\/h2>\n<ol><li>Restate the constraint.<\/li><li>Name which budget/tradeoff it stresses (latency / throughput / memory /<\/li><\/ol>\n<p>reliability / cost).<\/p>\n<ol><li>Change the minimum needed.<\/li><li>State what you give up.<\/li><\/ol>\n<p>Composure + tradeoff fluency beats a perfect answer.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next: <strong><a class=\"mdlink\" data-href=\"../07-qa-drill-bank/README.md\" href=\"#\">07-qa-drill-bank/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"now-make-it-500-cameras","text":"\"Now make it 500 cameras.\""},{"level":2,"id":"latency-must-be-under-50ms","text":"\"Latency must be under 50ms.\""},{"level":2,"id":"the-gpu-keeps-running-out-of-memory","text":"\"The GPU keeps running out of memory.\""},{"level":2,"id":"a-camera-sends-corruptedgarbage-frames","text":"\"A camera sends corrupted/garbage frames.\""},{"level":2,"id":"cloud-connection-drops-for-an-hour","text":"\"Cloud connection drops for an hour.\""},{"level":2,"id":"how-do-you-deploy-a-new-model-with-zero-downtime","text":"\"How do you deploy a new model with zero downtime?\""},{"level":2,"id":"how-do-you-know-its-actually-working-in-production","text":"\"How do you know it's actually working in production?\""},{"level":2,"id":"detections-look-wrong-on-some-cameras","text":"\"Detections look wrong on some cameras.\""},{"level":2,"id":"edge-vs-cloud-inference-defend-your-choice","text":"\"Edge vs cloud inference — defend your choice.\""},{"level":2,"id":"the-meta-pattern-for-any-curveball","text":"The meta-pattern for any curveball"}],"text":"design curveballs (the follow-ups) tl;dr: after your main answer, they pile on constraints to see how you adapt. here are the common ones with crisp directions. the meta-move: restate the new constraint, name the tradeoff it forces, adjust one part of the design. \"now make it 500 cameras.\" horizontal scale: more edge nodes (camera groups of 12–16 each), unchanged per-node design. cloud aggregation scales out (partitioned kafka topics, sharded db). the edge template is the unit of scale — that's why edge-heavy design scales linearly. \"latency must be under 50ms.\" attack the budget: smaller/distilled detector, lower inference resolution, int8, reduce batch size (less fill-wait) and add more parallel instances/streams, drop b-frames, shrink jitter buffer. move all pre/post to gpu; eliminate cpu round trips. accept fewer cameras per gpu. \"the gpu keeps running out of memory.\" diagnose: count decode buffers + model workspace × instances + batch tensors. fixes: smaller batch, fewer model instances, lower decode buffer count, int8 (¼ memory), release surfaces per iteration. add graceful degradation so oom-risk sheds load, not crashes. \"a camera sends corrupted/garbage frames.\" validate frames (resolution/format sanity, decode errors from the bus). skip bad frames, keep the stream. if persistent, mark camera unhealthy, backoff-reconnect, alert. never let one malformed stream segfault the shared pipeline — isolation + input validation. \"cloud connection drops for an hour.\" edge keeps inferring (that's the point of edge inference). buffer metadata/clips locally in a bounded store (drop oldest non-critical first), flush on reconnect. critical alerts get a local fallback path (on-site siren/log). system degrades, not dies. \"how do you deploy a new model with zero downtime?\" canary: build/validate the new trt engine, roll it to one edge node, compare detections/metrics against the old, then progressive rollout. cloud models via triton version hot-swap. keep the old engine to roll back instantly. \"how do you know it's actually working in production?\" observability: per-camera fps/freshness, queue depths, p99 latency, gpu util, detection-rate anomalies (a camera that suddenly detects nothing may be mispointed/frozen). health endpoint + prometheus + alerts. \"you can't operate what you can't see\" — ties to your benchmarking/measurement ethos. \"detections look wrong on some cameras.\" could be: domain shift (lighting/angle differs from training), wrong calibration, resolution mismatch in preprocessing, or quantization accuracy drop. diagnose by isolating: check raw frames, check preprocessing, a/b fp16 vs int8, error-analyze by camera. (your model-eval + error-analysis background.) \"edge vs cloud inference — defend your choice.\" edge: lowest latency, no video egress, privacy, survives wan loss — but limited compute, harder to update, per-site hardware cost. cloud: elastic compute, easy updates, central management — but latency, bandwidth/egress cost, wan dependency. most real systems: infer at edge, manage/aggregate/retrain in cloud (what you'd propose). the meta-pattern for any curveball restate the constraint. name which budget/tradeoff it stresses (latency / throughput / memory / reliability / cost). change the minimum needed. state what you give up. composure + tradeoff fluency beats a perfect answer. → back to section readme · next: 07-qa-drill-bank/","words":493},{"path":"07-qa-drill-bank/README.md","title":"Overview","section":"7 · Q&A Drill Bank","quiz":false,"html":"<h1 id=\"07-qa-drill-bank\">07 — Q&amp;A Drill Bank<\/h1>\n<p>Every \"why X over Y\" and rapid-fire question for this role, in docs_mind cheat-sheet style. Two files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">cheat-sheet.md<\/a> — <strong>read this the morning of.<\/strong> One page, every key answer.<\/li><li><a class=\"mdlink\" data-href=\"drill-bank.md\" href=\"#\">drill-bank.md<\/a> — the fuller question bank to rehearse from this week.<\/li><\/ol>\n<p>How to use: cover the answer, say yours out loud, compare. Out-loud reps beat silent reading 10:1 for interviews.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"drill-bank.md\" href=\"#\">drill-bank.md<\/a><\/strong> · Morning of: <strong><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">cheat-sheet.md<\/a><\/strong><\/p>","toc":[],"text":"07 — q&a drill bank every \"why x over y\" and rapid-fire question for this role, in docs_mind cheat-sheet style. two files: cheat-sheet.md — read this the morning of. one page, every key answer. drill-bank.md — the fuller question bank to rehearse from this week. how to use: cover the answer, say yours out loud, compare. out-loud reps beat silent reading 10:1 for interviews. → start: drill-bank.md · morning of: cheat-sheet.md","words":71},{"path":"07-qa-drill-bank/drill-bank.md","title":"Drill Bank","section":"7 · Q&A Drill Bank","quiz":true,"html":"<h1 id=\"drill-bank-rehearse-out-loud\">Drill Bank — Rehearse Out Loud<\/h1>\n<p>Cover the answer, say yours, compare. Grouped by topic. Depth lives in the numbered sections; this is for reps.<\/p>\n<hr>\n<h2 id=\"streaming-protocols\">Streaming protocols<\/h2>\n<details class=\"qa\" open><summary>Q: RTSP vs WebRTC — when do you use each?<\/summary><div class=\"qa-body\"><p>RTSP to ingest from IP cameras (that's what they emit; pull, ~0.5–3s). WebRTC to deliver to browsers/peers at sub-500ms. Real systems use both: RTSP in, WebRTC out.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why not HLS/DASH for live inference delivery?<\/summary><div class=\"qa-body\"><p>They segment video → 6–30s latency. Fine for broadcast/CDN, useless for \"obsess over milliseconds.\" WebRTC is the interactive low-latency choice.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: RTSP over UDP or TCP?<\/summary><div class=\"qa-body\"><p>UDP = lowest latency, tolerates loss. TCP = reliable, survives flaky networks, a bit more latency. Many-camera over imperfect networks → TCP for stability.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's FastRTC and why would you use it?<\/summary><div class=\"qa-body\"><p>A Python library wrapping WebRTC so you can pipe live video to/from ML code in a few lines — it handles signaling and the peer connection, hands you numpy frames. Use it for fast browser-facing low-latency model loops and operator UIs.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does a stream show garbage right after connecting/reconnecting?<\/summary><div class=\"qa-body\"><p>You can only start decoding at an I-frame (keyframe). Until the next keyframe arrives, P/B frames have nothing to build on. Shorter GOP shortens that window.<\/p><\/div><\/details><hr>\n<h2 id=\"codecs-frames\">Codecs &amp; frames<\/h2>\n<details class=\"qa\" open><summary>Q: I vs P vs B frames?<\/summary><div class=\"qa-body\"><p>I = full image, decodable alone. P = diff from previous. B = diff from past+future (smallest, but adds latency). Live low-latency pipelines often disable B-frames.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: H.264 vs H.265?<\/summary><div class=\"qa-body\"><p>H.265 ≈ half the bandwidth at same quality, but heavier decode + licensing. Use it only if HW decode supports it and you have compute headroom; else H.264.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why does a lost keyframe matter more than a lost P-frame?<\/summary><div class=\"qa-body\"><p>Every P/B frame in the GOP references back to the keyframe. Lose the I-frame and the whole group is undecodable until the next one. Lose a P-frame and you get a brief glitch.<\/p><\/div><\/details><hr>\n<h2 id=\"decode-buffers\">Decode &amp; buffers<\/h2>\n<details class=\"qa\" open><summary>Q: cv2.VideoCapture vs a GStreamer pipeline?<\/summary><div class=\"qa-body\"><p>VideoCapture = quick, but CPU decode + hidden buffering, won't scale past a couple streams. GStreamer = explicit hardware decode, threading, backpressure; scales to many. Prototype with one, ship the other.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Software vs hardware (NVDEC) decode?<\/summary><div class=\"qa-body\"><p>Software burns CPU and caps at ~1–2 streams. NVDEC decodes dozens on dedicated silicon, frees CPU, keeps frames in GPU memory for zero-copy inference. Scale → hardware.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Consumer slower than producer — what do you do?<\/summary><div class=\"qa-body\"><p>Bounded queue, drop oldest, keep latest (live). Never an unbounded queue — that's the classic memory-leak/latency-creep death. Offline/recorded → block + bounded to keep every frame.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why max-buffers=1 drop=true on appsink?<\/summary><div class=\"qa-body\"><p>Makes it a \"latest frame\" tap: bounded memory, minimal latency, drops stale frames under load instead of piling up.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why .copy() a frame in an appsink callback?<\/summary><div class=\"qa-body\"><p>The numpy array points into GStreamer's mapped buffer; after unmap/return that memory is recycled. Copy if the frame outlives the callback.<\/p><\/div><\/details><hr>\n<h2 id=\"gstreamer-deepstream\">GStreamer / DeepStream<\/h2>\n<details class=\"qa\" open><summary>Q: One-line description of GStreamer?<\/summary><div class=\"qa-body\"><p>A pipeline framework: elements (source→decode→convert→sink) connected by pads, media flows as buffers, caps negotiate format, queues add thread boundaries + backpressure.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What does nvstreammux do and why does it matter?<\/summary><div class=\"qa-body\"><p>Batches frames from many camera streams into one batched buffer so a single inference call serves all of them — the key trick for many cameras per GPU.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: GStreamer vs FFmpeg?<\/summary><div class=\"qa-body\"><p>FFmpeg = swiss-army transcoder + decode lib, great for files/clips. GStreamer = live, branching, multi-stream, plugin-extensible pipelines with threading control → KoiReader's live serving graphs (DeepStream is built on it).<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you detect a camera went offline in GStreamer?<\/summary><div class=\"qa-body\"><p>Watch the bus for ERROR/EOS, plus a frame-freshness watchdog for silent freezes. Then tear to NULL and reconnect.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: DeepStream vs rolling your own inference pipeline?<\/summary><div class=\"qa-body\"><p>DeepStream gives multi-stream batching, GPU-resident buffers, tracking for free on NVIDIA HW — fastest path to many cameras. DIY when you need custom logic or non-NVIDIA hardware.<\/p><\/div><\/details><hr>\n<h2 id=\"inference-optimization\">Inference &amp; optimization<\/h2>\n<details class=\"qa\" open><summary>Q: What does TensorRT do?<\/summary><div class=\"qa-body\"><p>Compiles a model (via ONNX) into a GPU-specific engine: layer fusion, kernel auto-tuning, precision lowering (FP16/INT8), memory reuse. Big latency/throughput win.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: FP16 vs INT8?<\/summary><div class=\"qa-body\"><p>FP16 ≈ 2×, near-lossless, almost free — try first. INT8 ≈ 3–4× + ¼ memory but needs calibration and risks accuracy — for max edge throughput, validate mAP after.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How does INT8 calibration work / why can it hurt accuracy?<\/summary><div class=\"qa-body\"><p>It maps floats to 256 levels using a representative calibration set to pick per-layer ranges. Unrepresentative calibration data → wrong ranges → accuracy drop. Use QAT if PTQ drops too much.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why build the TensorRT engine on the deployment hardware?<\/summary><div class=\"qa-body\"><p>TRT tunes kernels/memory for the specific GPU arch; an engine built elsewhere may be suboptimal or fail to load. Build on target, cache the engine.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Quantization vs pruning vs distillation?<\/summary><div class=\"qa-body\"><p>Orthogonal: quantization = cheaper math, pruning = fewer weights, distillation = smaller architecture. Stack them.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Triton vs in-process TensorRT?<\/summary><div class=\"qa-body\"><p>In-process = lowest latency, simplest, edge. Triton = a network hop but dynamic batching, multi-model, versioning, metrics — a cloud inference service.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Latency vs throughput — what's the difference and which do you optimize?<\/summary><div class=\"qa-body\"><p>Latency = time for one frame; throughput = frames/sec total. Real-time reaction → latency; many-camera scale → throughput. Usually: hit a latency SLA, then maximize throughput under it.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: GPU utilization is low but latency is high — what's wrong?<\/summary><div class=\"qa-body\"><p>Not compute-bound. Suspect CPU preprocessing, CPU↔GPU copies, single-thread decode, or network jitter. Profile before touching the model.<\/p><\/div><\/details><hr>\n<h2 id=\"production-python\">Production Python<\/h2>\n<details class=\"qa\" open><summary>Q: Does the GIL kill a video pipeline?<\/summary><div class=\"qa-body\"><p>No — decode (cv2/NVDEC), numpy, and CUDA/TensorRT release the GIL, so threads give real parallelism on the native+I/O path. The GIL only bites pure-Python hot loops; keep those off the per-frame path.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Threads vs async vs processes for video?<\/summary><div class=\"qa-body\"><p>Threads for I/O + GIL-releasing native work (decode/infer) — the default. Async for many concurrent connections / web serving. Processes for CPU-bound pure-Python or crash isolation.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Biggest source of memory leaks in long-running video services?<\/summary><div class=\"qa-body\"><p>Unbounded queues (consumer &lt; producer), unreleased GPU surfaces, un-unmapped buffers, ever-growing state/caches. Fix: bound buffers, release per iteration, soak test 24h+.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you prove no memory leak?<\/summary><div class=\"qa-body\"><p>Plot RSS + GPU memory over hours under load — a leak is a slope, healthy is flat. tracemalloc/objgraph for Python, nvidia-smi/tegrastats for GPU. Soak test before shipping.<\/p><\/div><\/details><hr>\n<h2 id=\"fault-tolerance\">Fault tolerance<\/h2>\n<details class=\"qa\" open><summary>Q: A camera goes offline — what happens?<\/summary><div class=\"qa-body\"><p>Detect (bus EOS/ERROR or freshness watchdog) → isolate (one worker, blast radius = 1) → reconnect with exponential backoff + jitter → wait for keyframe → resume. Other cameras unaffected.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: How do you catch a silent freeze (no error fires)?<\/summary><div class=\"qa-body\"><p>Per-camera watchdog on last-frame timestamp; if stale beyond a threshold, force restart even without an exception.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: What's graceful degradation here?<\/summary><div class=\"qa-body\"><p>Under overload, shed load instead of crashing: smaller batch, process every Nth frame, lower resolution, drop non-critical writes — keep the video loop alive.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Process-per-camera vs thread-per-camera?<\/summary><div class=\"qa-body\"><p>Process = strongest isolation (native crash contained, no GIL) at higher memory. Thread = lighter, shared memory, but a native crash/GIL can hurt all. Many flaky streams → process isolation.<\/p><\/div><\/details><hr>\n<h2 id=\"opencv-math-your-strength-be-ready\">OpenCV / math (your strength — be ready)<\/h2>\n<details class=\"qa\" open><summary>Q: Color spaces — why does it matter?<\/summary><div class=\"qa-body\"><p>Decoders output YUV/NV12; models want BGR/RGB. Convert on GPU (nvvidconv) to avoid re-introducing copies. BGR is OpenCV's default ordering — mismatches silently wreck accuracy.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Camera calibration / undistortion — when in the pipeline?<\/summary><div class=\"qa-body\"><p>For fisheye/wide-angle (your surround-view work): undistort using intrinsics + distortion coeffs before geometry-dependent logic. Do it on GPU if per-frame.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: You designed logic on top of detections — example?<\/summary><div class=\"qa-body\"><p>Geometry/statistics over boxes: zone intersection (is this box in the loading bay?), homography to map image points to floor coordinates, tracking + line-crossing for counting, temporal smoothing to reject flicker. (The JD's \"complex logic layers on top of model detections.\")<\/p><\/div><\/details><hr>\n<h2 id=\"behavioral-adjacent-theyll-sneak-these-in\">Behavioral-adjacent (they'll sneak these in)<\/h2>\n<details class=\"qa\" open><summary>Q: Tell me about a hard ambiguous systems problem you solved.<\/summary><div class=\"qa-body\"><p>Use the NVMe-vs-network-attached-storage diagnosis or a DeepStream/Jetson latency fix: hypothesis → isolate variables → benchmark → validate → fix. Quantify the result.<\/p><\/div><\/details><details class=\"qa\" open><summary>Q: Why do you want a systems-first CV role after data-platform work?<\/summary><div class=\"qa-body\"><p>Honest arc: started in edge CV/video analytics (Jetson, DeepStream, TensorRT), spent 4 years going deep on distributed systems + performance engineering at scale, now want to bring that systems rigor back to live Vision AI — which is exactly this role.<\/p><\/div><\/details><p>→ Morning of: <strong><a class=\"mdlink\" data-href=\"cheat-sheet.md\" href=\"#\">cheat-sheet.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"streaming-protocols","text":"Streaming protocols"},{"level":2,"id":"codecs-frames","text":"Codecs &amp; frames"},{"level":2,"id":"decode-buffers","text":"Decode &amp; buffers"},{"level":2,"id":"gstreamer-deepstream","text":"GStreamer / DeepStream"},{"level":2,"id":"inference-optimization","text":"Inference &amp; optimization"},{"level":2,"id":"production-python","text":"Production Python"},{"level":2,"id":"fault-tolerance","text":"Fault tolerance"},{"level":2,"id":"opencv-math-your-strength-be-ready","text":"OpenCV / math (your strength — be ready)"},{"level":2,"id":"behavioral-adjacent-theyll-sneak-these-in","text":"Behavioral-adjacent (they'll sneak these in)"}],"text":"drill bank — rehearse out loud cover the answer, say yours, compare. grouped by topic. depth lives in the numbered sections; this is for reps. streaming protocols q: rtsp vs webrtc — when do you use each? rtsp to ingest from ip cameras (that's what they emit; pull, ~0.5–3s). webrtc to deliver to browsers/peers at sub-500ms. real systems use both: rtsp in, webrtc out. q: why not hls/dash for live inference delivery? they segment video → 6–30s latency. fine for broadcast/cdn, useless for \"obsess over milliseconds.\" webrtc is the interactive low-latency choice. q: rtsp over udp or tcp? udp = lowest latency, tolerates loss. tcp = reliable, survives flaky networks, a bit more latency. many-camera over imperfect networks → tcp for stability. q: what's fastrtc and why would you use it? a python library wrapping webrtc so you can pipe live video to/from ml code in a few lines — it handles signaling and the peer connection, hands you numpy frames. use it for fast browser-facing low-latency model loops and operator uis. q: why does a stream show garbage right after connecting/reconnecting? you can only start decoding at an i-frame (keyframe). until the next keyframe arrives, p/b frames have nothing to build on. shorter gop shortens that window. codecs & frames q: i vs p vs b frames? i = full image, decodable alone. p = diff from previous. b = diff from past+future (smallest, but adds latency). live low-latency pipelines often disable b-frames. q: h.264 vs h.265? h.265 ≈ half the bandwidth at same quality, but heavier decode + licensing. use it only if hw decode supports it and you have compute headroom; else h.264. q: why does a lost keyframe matter more than a lost p-frame? every p/b frame in the gop references back to the keyframe. lose the i-frame and the whole group is undecodable until the next one. lose a p-frame and you get a brief glitch. decode & buffers q: cv2.videocapture vs a gstreamer pipeline? videocapture = quick, but cpu decode + hidden buffering, won't scale past a couple streams. gstreamer = explicit hardware decode, threading, backpressure; scales to many. prototype with one, ship the other. q: software vs hardware (nvdec) decode? software burns cpu and caps at ~1–2 streams. nvdec decodes dozens on dedicated silicon, frees cpu, keeps frames in gpu memory for zero-copy inference. scale → hardware. q: consumer slower than producer — what do you do? bounded queue, drop oldest, keep latest (live). never an unbounded queue — that's the classic memory-leak/latency-creep death. offline/recorded → block + bounded to keep every frame. q: why max-buffers=1 drop=true on appsink? makes it a \"latest frame\" tap: bounded memory, minimal latency, drops stale frames under load instead of piling up. q: why .copy() a frame in an appsink callback? the numpy array points into gstreamer's mapped buffer; after unmap/return that memory is recycled. copy if the frame outlives the callback. gstreamer / deepstream q: one-line description of gstreamer? a pipeline framework: elements (source→decode→convert→sink) connected by pads, media flows as buffers, caps negotiate format, queues add thread boundaries + backpressure. q: what does nvstreammux do and why does it matter? batches frames from many camera streams into one batched buffer so a single inference call serves all of them — the key trick for many cameras per gpu. q: gstreamer vs ffmpeg? ffmpeg = swiss-army transcoder + decode lib, great for files/clips. gstreamer = live, branching, multi-stream, plugin-extensible pipelines with threading control → koireader's live serving graphs (deepstream is built on it). q: how do you detect a camera went offline in gstreamer? watch the bus for error/eos, plus a frame-freshness watchdog for silent freezes. then tear to null and reconnect. q: deepstream vs rolling your own inference pipeline? deepstream gives multi-stream batching, gpu-resident buffers, tracking for free on nvidia hw — fastest path to many cameras. diy when you need custom logic or non-nvidia hardware. inference & optimization q: what does tensorrt do? compiles a model (via onnx) into a gpu-specific engine: layer fusion, kernel auto-tuning, precision lowering (fp16/int8), memory reuse. big latency/throughput win. q: fp16 vs int8? fp16 ≈ 2×, near-lossless, almost free — try first. int8 ≈ 3–4× + ¼ memory but needs calibration and risks accuracy — for max edge throughput, validate map after. q: how does int8 calibration work / why can it hurt accuracy? it maps floats to 256 levels using a representative calibration set to pick per-layer ranges. unrepresentative calibration data → wrong ranges → accuracy drop. use qat if ptq drops too much. q: why build the tensorrt engine on the deployment hardware? trt tunes kernels/memory for the specific gpu arch; an engine built elsewhere may be suboptimal or fail to load. build on target, cache the engine. q: quantization vs pruning vs distillation? orthogonal: quantization = cheaper math, pruning = fewer weights, distillation = smaller architecture. stack them. q: triton vs in-process tensorrt? in-process = lowest latency, simplest, edge. triton = a network hop but dynamic batching, multi-model, versioning, metrics — a cloud inference service. q: latency vs throughput — what's the difference and which do you optimize? latency = time for one frame; throughput = frames/sec total. real-time reaction → latency; many-camera scale → throughput. usually: hit a latency sla, then maximize throughput under it. q: gpu utilization is low but latency is high — what's wrong? not compute-bound. suspect cpu preprocessing, cpu↔gpu copies, single-thread decode, or network jitter. profile before touching the model. production python q: does the gil kill a video pipeline? no — decode (cv2/nvdec), numpy, and cuda/tensorrt release the gil, so threads give real parallelism on the native+i/o path. the gil only bites pure-python hot loops; keep those off the per-frame path. q: threads vs async vs processes for video? threads for i/o + gil-releasing native work (decode/infer) — the default. async for many concurrent connections / web serving. processes for cpu-bound pure-python or crash isolation. q: biggest source of memory leaks in long-running video services? unbounded queues (consumer < producer), unreleased gpu surfaces, un-unmapped buffers, ever-growing state/caches. fix: bound buffers, release per iteration, soak test 24h+. q: how do you prove no memory leak? plot rss + gpu memory over hours under load — a leak is a slope, healthy is flat. tracemalloc/objgraph for python, nvidia-smi/tegrastats for gpu. soak test before shipping. fault tolerance q: a camera goes offline — what happens? detect (bus eos/error or freshness watchdog) → isolate (one worker, blast radius = 1) → reconnect with exponential backoff + jitter → wait for keyframe → resume. other cameras unaffected. q: how do you catch a silent freeze (no error fires)? per-camera watchdog on last-frame timestamp; if stale beyond a threshold, force restart even without an exception. q: what's graceful degradation here? under overload, shed load instead of crashing: smaller batch, process every nth frame, lower resolution, drop non-critical writes — keep the video loop alive. q: process-per-camera vs thread-per-camera? process = strongest isolation (native crash contained, no gil) at higher memory. thread = lighter, shared memory, but a native crash/gil can hurt all. many flaky streams → process isolation. opencv / math (your strength — be ready) q: color spaces — why does it matter? decoders output yuv/nv12; models want bgr/rgb. convert on gpu (nvvidconv) to avoid re-introducing copies. bgr is opencv's default ordering — mismatches silently wreck accuracy. q: camera calibration / undistortion — when in the pipeline? for fisheye/wide-angle (your surround-view work): undistort using intrinsics + distortion coeffs before geometry-dependent logic. do it on gpu if per-frame. q: you designed logic on top of detections — example? geometry/statistics over boxes: zone intersection (is this box in the loading bay?), homography to map image points to floor coordinates, tracking + line-crossing for counting, temporal smoothing to reject flicker. (the jd's \"complex logic layers on top of model detections.\") behavioral-adjacent (they'll sneak these in) q: tell me about a hard ambiguous systems problem you solved. use the nvme-vs-network-attached-storage diagnosis or a deepstream/jetson latency fix: hypothesis → isolate variables → benchmark → validate → fix. quantify the result. q: why do you want a systems-first cv role after data-platform work? honest arc: started in edge cv/video analytics (jetson, deepstream, tensorrt), spent 4 years going deep on distributed systems + performance engineering at scale, now want to bring that systems rigor back to live vision ai — which is exactly this role. → morning of: cheat-sheet.md","words":1396},{"path":"07-qa-drill-bank/cheat-sheet.md","title":"Cheat Sheet (Morning Of)","section":"7 · Q&A Drill Bank","quiz":false,"html":"<h1 id=\"cheat-sheet-one-page-morning-of\">Cheat Sheet — One Page, Morning Of<\/h1>\n<p>Read this and nothing else the morning of. Depth is in the numbered sections.<\/p>\n<hr>\n<h2 id=\"the-role-in-one-breath\">The role in one breath<\/h2>\n<p>Systems-first CV: build the pipelines that run Vision AI on live video 24/7, fast and crash-proof. Not training models — making them <em>run<\/em>.<\/p>\n<h2 id=\"streaming\">Streaming<\/h2>\n<ul><li><strong>RTSP<\/strong> in (cameras, pull, ~0.5–3s), <strong>WebRTC/FastRTC<\/strong> out (browsers, &lt;500ms).<\/li><\/ul>\n<p>HLS/DASH = broadcast, too slow for live.<\/p>\n<ul><li><strong>RTSP transport:<\/strong> UDP = low latency/lossy; TCP = reliable/stable. Many cams →<\/li><\/ul>\n<p>TCP.<\/p>\n<ul><li><strong>I/P/B frames:<\/strong> I = full keyframe, P = diff from past, B = past+future (disable<\/li><\/ul>\n<p>for low latency). Can only start decoding at a <strong>keyframe<\/strong>.<\/p>\n<ul><li><strong>H.264<\/strong> default; <strong>H.265<\/strong> halves bandwidth but heavier + licensing.<\/li><\/ul>\n<h2 id=\"decode-buffers\">Decode &amp; buffers<\/h2>\n<ul><li><strong>NVDEC hardware decode<\/strong>, not CPU — scales to dozens of streams, keeps frames on<\/li><\/ul>\n<p>GPU (zero-copy).<\/p>\n<ul><li><strong>Bound every queue; drop oldest, keep latest<\/strong> for live. Unbounded queue = the<\/li><\/ul>\n<p>classic leak + latency creep.<\/p>\n<ul><li>appsink: <code>max-buffers=1 drop=true sync=false<\/code>. <code>.copy()<\/code> frames that outlive the<\/li><\/ul>\n<p>callback; always <code>unmap<\/code>.<\/p>\n<h2 id=\"gstreamer-deepstream\">GStreamer / DeepStream<\/h2>\n<ul><li>GStreamer = elements + pads + caps + buffers; <code>queue<\/code> = thread boundary +<\/li><\/ul>\n<p>backpressure.<\/p>\n<ul><li><strong>nvstreammux batches many cameras into one inference call<\/strong> → the key multi-cam<\/li><\/ul>\n<p>scaling trick.<\/p>\n<ul><li>DeepStream = inference + tracking + analytics inside the pipeline, GPU-resident.<\/li><li>Detect dead camera: <strong>bus EOS/ERROR + freshness watchdog<\/strong>.<\/li><\/ul>\n<h2 id=\"inference-your-strength-lead-here\">Inference (your strength — lead here)<\/h2>\n<ul><li><strong>TensorRT<\/strong>: ONNX → engine, layer fusion + kernel tuning + precision. Build **on<\/li><\/ul>\n<p>the target GPU**.<\/p>\n<ul><li><strong>FP16<\/strong> ≈ 2×, near-lossless (try first). <strong>INT8<\/strong> ≈ 3–4×, ¼ mem, needs<\/li><\/ul>\n<p>calibration — validate mAP.<\/p>\n<ul><li>Quantization (math) vs pruning (weights) vs distillation (architecture) — stack<\/li><\/ul>\n<p>them.<\/p>\n<ul><li><strong>Triton<\/strong> = cloud model server (dynamic batching, versioning); in-process TRT =<\/li><\/ul>\n<p>edge minimum latency.<\/p>\n<ul><li><strong>Latency ≠ throughput.<\/strong> Hit the latency SLA, then maximize throughput (batch<\/li><\/ul>\n<p>size) under it.<\/p>\n<ul><li><strong>Low GPU util + high latency = copy/CPU/network-bound, not the model.<\/strong> Profile<\/li><\/ul>\n<p>first.<\/p>\n<h2 id=\"production-python\">Production Python<\/h2>\n<ul><li><strong>GIL doesn't block<\/strong> decode/numpy/CUDA (they release it) → <strong>threads<\/strong> are the<\/li><\/ul>\n<p>default for video. <strong>Async<\/strong> for many connections. <strong>Processes<\/strong> for CPU-bound   Python / isolation.<\/p>\n<ul><li><strong>No leaks:<\/strong> bound buffers, release GPU surfaces per iteration, soak-test 24h+<\/li>

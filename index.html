w it's Friday and the hall is packed and half the heads are occluded. What breaks and what do you switch to?\"<\/em> Answer: tracking-based dwell degrades as ID switches explode; fall back to a density-map count and a <strong>flow-based<\/strong> wait estimate (Little's Law), and report the regime you detected.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"queue-time-estimation.md\" href=\"#\">queue-time-estimation.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-framing-line-memorize","text":"The framing line (memorize)"},{"level":2,"id":"the-two-regimes-this-decides-everything","text":"The two regimes (this decides everything)"}],"text":"11 — crowd & queue analytics 💡 tl;dr this is the headline deliverable of the jd: queue-time estimation and crowd analytics . the model gives you boxes and track ids; this section is how you turn them into the two numbers a client actually pays for — how many people and how long they wait . master the metric vocabulary (little's law, dwell, density) and the ground-plane geometry that makes the numbers real. files: queue-time-estimation.md — the three ways to measure wait time, and little's law crowd-counting-density.md — detection vs density estimation, when each breaks zones-flow-heatmaps.md — roi zones, line-crossing, directional flow, occupancy, heatmaps calibration-and-metrics.md — homography to the floor, real-world units, accuracy & validation the framing line (memorize) \"queue time and crowd count are geometry-plus-statistics on top of detection and tracking. i put the camera in real-world coordinates with a homography, define zones on the floor plan, and then it's two families of method: tracking-based (follow individuals, measure their dwell) and estimation-based (regress a count or a wait from density when tracking breaks down in dense crowds). i pick per the crowd regime and validate against a ground-truth clock.\" the two regimes (this decides everything) sparse / mid crowd dense crowd (occlusion, >~2 ppl/m²) heads separable heads merge, tracking fails │ │ ▼ ▼ detect + track individuals density estimation / regression → count unique ids → integrate a density map for count → dwell = t_exit − t_enter → wait ≈ little's law from flow + occupancy interviewers love to push you from the easy regime into the hard one: \"your person detector works at the counter — now it's friday and the hall is packed and half the heads are occluded. what breaks and what do you switch to?\" answer: tracking-based dwell degrades as id switches explode; fall back to a density-map count and a flow-based wait estimate (little's law), and report the regime you detected. → start: queue-time-estimation.md","words":322},{"path":"11-crowd-queue-analytics/queue-time-estimation.md","title":"Queue-Time Estimation","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"queue-time-estimation\">Queue-Time Estimation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> There are three ways to measure how long people wait, in increasing order of robustness-under-crowding: <strong>(1)<\/strong> track individuals and subtract timestamps, <strong>(2)<\/strong> measure at the boundary — time between entering and leaving a zone via line-crossing, <strong>(3)<\/strong> don't track anyone — infer the wait from flow and occupancy using <strong>Little's Law<\/strong>. Know all three and when each fails.<\/div><\/div>\n<h2 id=\"method-1-per-person-dwell-tracking-based\">Method 1 — Per-person dwell (tracking-based)<\/h2>\n<p>Follow each person with a tracker (ByteTrack/DeepSORT, see section 14). For a queue zone <code>Q<\/code>:<\/p>\n<pre><code>enter_time[id] = first frame the track's foot point is inside Q\nexit_time[id]  = last  frame it was inside Q (or when it crosses the exit line)\nwait[id]       = exit_time[id] − enter_time[id]\nqueue_time     = median(wait[id] for id in recently-completed)<\/code><\/pre>\n<ul><li><strong>Use the foot point<\/strong> (bottom-center of box), projected to the floor — not the<\/li><\/ul>\n<p>box centroid — so \"inside the zone\" means feet-on-tile, not head-over-line.<\/p>\n<ul><li><strong>Report median or a percentile (p85), not mean<\/strong> — one abandoned cart that sits<\/li><\/ul>\n<p>for an hour destroys the mean.<\/p>\n<ul><li><strong>Fails when:<\/strong> dense crowds cause ID switches. A switch splits one person's wait<\/li><\/ul>\n<p>into two short waits (under-estimate) or merges two (over-estimate).<\/p>\n<h2 id=\"method-2-boundary-timing-line-crossing-pairs\">Method 2 — Boundary timing (line-crossing pairs)<\/h2>\n<p>Don't track through the whole queue — just detect <strong>two events<\/strong>: crossing the <strong>join<\/strong> line and crossing the <strong>service<\/strong> line. Pair them up (FIFO for a single serpentine lane) and the difference is the wait. Cheaper and more robust than full tracking because you only need identity to survive two line crossings, not the whole dwell.<\/p>\n<ul><li>Great for a <strong>single-file serpentine<\/strong> queue (airport, immigration, ADNOC-style<\/li><\/ul>\n<p>service counter) where order is preserved → FIFO pairing needs no ReID.<\/p>\n<ul><li>Breaks for <strong>unordered / multi-lane<\/strong> crowds where join-order ≠ service-order.<\/li><\/ul>\n<h2 id=\"method-3-littles-law-flow-based-no-tracking\">Method 3 — Little's Law (flow-based, no tracking)<\/h2>\n<p>The workhorse when the crowd is too dense to track. From queuing theory:<\/p>\n<pre><code>        L = λ · W\n  L = average number of people in the queue (occupancy)\n  λ = arrival rate (people per second entering the queue)\n  W = average wait time   ⇒   W = L / λ<\/code><\/pre>\n<p>You can measure <strong>L<\/strong> and <strong>λ<\/strong> without any tracking:<\/p>\n<ul><li><strong>L (occupancy):<\/strong> count heads inside the queue zone per frame — a **density-map<\/li><\/ul>\n<p>count** works even when individuals aren't separable (section 2 of this folder).<\/p>\n<ul><li><strong>λ (arrival rate):<\/strong> a <strong>line-crossing counter<\/strong> at the queue entrance — you<\/li><\/ul>\n<p>only need to count crossings, not identities.<\/p>\n<ul><li>Then <strong>W = L / λ<\/strong>. Smooth L and λ over a rolling window (e.g. 1–5 min).<\/li><\/ul>\n<blockquote><p><strong>Interview gold:<\/strong> \"In dense crowds I stop trying to track individuals and use Little's Law: occupancy over arrival rate gives the average wait, and both inputs survive occlusion because one is a density count and the other is a crossing count.\" This shows you know the <em>modeling<\/em>, not just the plumbing.<\/p><\/blockquote>\n<p><strong>Assumptions to state:<\/strong> Little's Law needs a system in rough steady state (arrivals ≈ departures over the window) and FIFO-ish service for the <em>average<\/em> to mean a typical person's wait. Call these out — interviewers probe whether you know the model's limits.<\/p>\n<h2 id=\"practical-accuracy-notes\">Practical accuracy notes<\/h2>\n<ul><li><strong>Validate against a clock.<\/strong> Ground-truth a few people with a stopwatch (or a<\/li><\/ul>\n<p>second synced camera) and compare. Report MAE in seconds, not just \"looks right.\"<\/p>\n<ul><li><strong>Latency vs freshness.<\/strong> A dwell isn't known until the person leaves — so a<\/li><\/ul>\n<p>live \"current wait\" board is always a lagging estimate. Little's Law gives a   <em>leading<\/em> estimate (from instantaneous L and λ) — often you show both.<\/p>\n<ul><li><strong>Zone hygiene.<\/strong> Exclude staff, exclude the person being served, handle<\/li><\/ul>\n<p>re-entries. Most \"wrong queue time\" bugs are zone-definition bugs, not model bugs.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Why report median wait, not mean? <em>(outliers — abandoned objects, staff idling)<\/em><\/li><li>Your tracker's ID-switch rate just tripled at peak. Which method do you switch to<\/li><\/ul>\n<p>and why? <em>(Little's Law — inputs are occlusion-robust counts, not identities)<\/em><\/p>\n<ul><li>What must be true for <code>W = L/λ<\/code> to be valid? <em>(steady state over the window)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"method-1-per-person-dwell-tracking-based","text":"Method 1 — Per-person dwell (tracking-based)"},{"level":2,"id":"method-2-boundary-timing-line-crossing-pairs","text":"Method 2 — Boundary timing (line-crossing pairs)"},{"level":2,"id":"method-3-littles-law-flow-based-no-tracking","text":"Method 3 — Little's Law (flow-based, no tracking)"},{"level":2,"id":"practical-accuracy-notes","text":"Practical accuracy notes"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"queue-time estimation 💡 tl;dr there are three ways to measure how long people wait, in increasing order of robustness-under-crowding: (1) track individuals and subtract timestamps, (2) measure at the boundary — time between entering and leaving a zone via line-crossing, (3) don't track anyone — infer the wait from flow and occupancy using little's law . know all three and when each fails. method 1 — per-person dwell (tracking-based) follow each person with a tracker (bytetrack/deepsort, see section 14). for a queue zone q : enter_time[id] = first frame the track's foot point is inside q exit_time[id] = last frame it was inside q (or when it crosses the exit line) wait[id] = exit_time[id] − enter_time[id] queue_time = median(wait[id] for id in recently-completed) use the foot point (bottom-center of box), projected to the floor — not the box centroid — so \"inside the zone\" means feet-on-tile, not head-over-line. report median or a percentile (p85), not mean — one abandoned cart that sits for an hour destroys the mean. fails when: dense crowds cause id switches. a switch splits one person's wait into two short waits (under-estimate) or merges two (over-estimate). method 2 — boundary timing (line-crossing pairs) don't track through the whole queue — just detect two events : crossing the join line and crossing the service line. pair them up (fifo for a single serpentine lane) and the difference is the wait. cheaper and more robust than full tracking because you only need identity to survive two line crossings, not the whole dwell. great for a single-file serpentine queue (airport, immigration, adnoc-style service counter) where order is preserved → fifo pairing needs no reid. breaks for unordered / multi-lane crowds where join-order ≠ service-order. method 3 — little's law (flow-based, no tracking) the workhorse when the crowd is too dense to track. from queuing theory: l = λ · w l = average number of people in the queue (occupancy) λ = arrival rate (people per second entering the queue) w = average wait time ⇒ w = l / λ you can measure l and λ without any tracking: l (occupancy): count heads inside the queue zone per frame — a **density-map count** works even when individuals aren't separable (section 2 of this folder). λ (arrival rate): a line-crossing counter at the queue entrance — you only need to count crossings, not identities. then w = l / λ . smooth l and λ over a rolling window (e.g. 1–5 min). interview gold: \"in dense crowds i stop trying to track individuals and use little's law: occupancy over arrival rate gives the average wait, and both inputs survive occlusion because one is a density count and the other is a crossing count.\" this shows you know the modeling , not just the plumbing. assumptions to state: little's law needs a system in rough steady state (arrivals ≈ departures over the window) and fifo-ish service for the average to mean a typical person's wait. call these out — interviewers probe whether you know the model's limits. practical accuracy notes validate against a clock. ground-truth a few people with a stopwatch (or a second synced camera) and compare. report mae in seconds, not just \"looks right.\" latency vs freshness. a dwell isn't known until the person leaves — so a live \"current wait\" board is always a lagging estimate. little's law gives a leading estimate (from instantaneous l and λ) — often you show both. zone hygiene. exclude staff, exclude the person being served, handle re-entries. most \"wrong queue time\" bugs are zone-definition bugs, not model bugs. quick self-check why report median wait, not mean? (outliers — abandoned objects, staff idling) your tracker's id-switch rate just tripled at peak. which method do you switch to and why? (little's law — inputs are occlusion-robust counts, not identities) what must be true for w = l/λ to be valid? (steady state over the window)","words":652},{"path":"11-crowd-queue-analytics/crowd-counting-density.md","title":"Crowd Counting & Density","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"crowd-counting-density-estimation\">Crowd Counting &amp; Density Estimation<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Two families. <strong>Detection-based<\/strong> counting (detect each head/person, count boxes) is accurate and gives you identities for tracking — but collapses in dense crowds from occlusion. <strong>Density-estimation<\/strong> (a CNN regresses a per-pixel density map you integrate to a count) survives heavy occlusion but gives you no identities. Pick by crowd density; know the crossover.<\/div><\/div>\n<h2 id=\"detection-based-counting\">Detection-based counting<\/h2>\n<p>Run a person/head detector (YOLO, section 14), count the boxes, optionally track to avoid double-counting across frames.<\/p>\n<ul><li><strong>Pros:<\/strong> per-object — you get boxes, classes, and track IDs for free, so<\/li><\/ul>\n<p>everything downstream (dwell, zones, flow) works. Interpretable.<\/p>\n<ul><li><strong>Cons:<\/strong> recall craters under occlusion. At high density, heads merge, NMS<\/li><\/ul>\n<p>suppresses true positives, and you systematically <strong>under-count<\/strong>.<\/p>\n<ul><li><strong>Head detection &gt; body detection<\/strong> in crowds — heads occlude less than torsos.<\/li><\/ul>\n<p>Many crowd systems detect heads specifically.<\/p>\n<ul><li><strong>Sweet spot:<\/strong> roughly &lt; 1–2 people/m² where individuals are mostly separable.<\/li><\/ul>\n<h2 id=\"density-estimation-regression-counting\">Density-estimation (regression) counting<\/h2>\n<p>Instead of boxes, a CNN outputs a <strong>density map<\/strong>: each pixel holds a fractional \"person-ness\" so that the <strong>integral over a region = the count<\/strong>.<\/p>\n<pre><code>image ─► CNN (e.g. CSRNet / MCNN) ─► density map D(x,y)\ncount over region R = ΣΣ D(x,y) for (x,y) in R<\/code><\/pre>\n<ul><li><strong>Training target:<\/strong> annotate head points, convolve each with a Gaussian to make<\/li><\/ul>\n<p>a smooth ground-truth density map; train to regress it (L2 / Bayesian loss).<\/p>\n<ul><li><strong>Key models to name:<\/strong> <strong>MCNN<\/strong> (multi-column, multi-scale), <strong>CSRNet<\/strong><\/li><\/ul>\n<p>(dilated convolutions, a common strong baseline), <strong>P2PNet<\/strong> (point-based).<\/p>\n<ul><li><strong>Pros:<\/strong> works in very dense crowds where you can't separate individuals;<\/li><\/ul>\n<p>degrades gracefully.<\/p>\n<ul><li><strong>Cons:<\/strong> a <em>number<\/em>, not objects — no IDs, no per-person dwell, no tracking.<\/li><\/ul>\n<p>Sensitive to scale/perspective and to domain shift (train scene ≠ deploy scene).<\/p>\n<h2 id=\"choosing-say-this-out-loud\">Choosing (say this out loud)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Situation<\/th><th>Use<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td>Counter, corridor, sparse lane<\/td><td>Detection + tracking<\/td><td>need IDs for dwell/flow; density is separable<\/td><\/tr><tr><td>Packed hall, festival, platform surge<\/td><td>Density estimation<\/td><td>tracking impossible; just need the count/occupancy<\/td><\/tr><tr><td>Need both count <em>and<\/em> wait in a dense crowd<\/td><td>Density for L + line-count for λ → Little's Law<\/td><td>combines occlusion-robust inputs (see queue-time page)<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"perspective-is-the-silent-killer\">Perspective is the silent killer<\/h2>\n<p>A person far from the camera occupies far fewer pixels than a near one. Both families need to handle this:<\/p>\n<ul><li><strong>Detection:<\/strong> multi-scale training / feature-pyramid; or restrict the counting<\/li><\/ul>\n<p>ROI to a band at consistent scale.<\/p>\n<ul><li><strong>Density:<\/strong> perspective-normalized density maps, or a geometry-aware kernel.<\/li><li><strong>Best fix when you have calibration:<\/strong> project to the **ground plane via a<\/li><\/ul>\n<p>homography** and count/normalize in real-world m² (see calibration page). This is   the \"geometry command\" the JD wants to hear.<\/p>\n<h2 id=\"metrics\">Metrics<\/h2>\n<ul><li><strong>MAE<\/strong> = mean absolute error in count (headline number for crowd counting).<\/li><li><strong>RMSE<\/strong> = penalizes big misses more (surge robustness).<\/li><li><strong>GAME<\/strong> (Grid Average Mean Error) — splits the frame into a grid and averages<\/li><\/ul>\n<p>MAE per cell, so a model can't cheat by getting the <em>total<\/em> right while putting   people in the wrong place.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Why does detection under-count dense crowds and density estimation not?<\/li><\/ul>\n<p><em>(occlusion + NMS suppress boxes; density regresses a continuous field)<\/em><\/p>\n<ul><li>You need per-person dwell time in a packed hall. Is density counting enough?<\/li><\/ul>\n<p><em>(no — no identities; you fall back to Little's Law for wait)<\/em><\/p>\n<ul><li>What is the training target for a density model? <em>(Gaussian-blurred head-point map)<\/em><\/li><\/ul>","toc":[{"level":2,"id":"detection-based-counting","text":"Detection-based counting"},{"level":2,"id":"density-estimation-regression-counting","text":"Density-estimation (regression) counting"},{"level":2,"id":"choosing-say-this-out-loud","text":"Choosing (say this out loud)"},{"level":2,"id":"perspective-is-the-silent-killer","text":"Perspective is the silent killer"},{"level":2,"id":"metrics","text":"Metrics"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"crowd counting & density estimation 💡 tl;dr two families. detection-based counting (detect each head/person, count boxes) is accurate and gives you identities for tracking — but collapses in dense crowds from occlusion. density-estimation (a cnn regresses a per-pixel density map you integrate to a count) survives heavy occlusion but gives you no identities. pick by crowd density; know the crossover. detection-based counting run a person/head detector (yolo, section 14), count the boxes, optionally track to avoid double-counting across frames. pros: per-object — you get boxes, classes, and track ids for free, so everything downstream (dwell, zones, flow) works. interpretable. cons: recall craters under occlusion. at high density, heads merge, nms suppresses true positives, and you systematically under-count . head detection > body detection in crowds — heads occlude less than torsos. many crowd systems detect heads specifically. sweet spot: roughly < 1–2 people/m² where individuals are mostly separable. density-estimation (regression) counting instead of boxes, a cnn outputs a density map : each pixel holds a fractional \"person-ness\" so that the integral over a region = the count . image ─► cnn (e.g. csrnet / mcnn) ─► density map d(x,y) count over region r = σς d(x,y) for (x,y) in r training target: annotate head points, convolve each with a gaussian to make a smooth ground-truth density map; train to regress it (l2 / bayesian loss). key models to name: mcnn (multi-column, multi-scale), csrnet (dilated convolutions, a common strong baseline), p2pnet (point-based). pros: works in very dense crowds where you can't separate individuals; degrades gracefully. cons: a number , not objects — no ids, no per-person dwell, no tracking. sensitive to scale/perspective and to domain shift (train scene ≠ deploy scene). choosing (say this out loud) situation use why counter, corridor, sparse lane detection + tracking need ids for dwell/flow; density is separable packed hall, festival, platform surge density estimation tracking impossible; just need the count/occupancy need both count and wait in a dense crowd density for l + line-count for λ → little's law combines occlusion-robust inputs (see queue-time page) perspective is the silent killer a person far from the camera occupies far fewer pixels than a near one. both families need to handle this: detection: multi-scale training / feature-pyramid; or restrict the counting roi to a band at consistent scale. density: perspective-normalized density maps, or a geometry-aware kernel. best fix when you have calibration: project to the **ground plane via a homography** and count/normalize in real-world m² (see calibration page). this is the \"geometry command\" the jd wants to hear. metrics mae = mean absolute error in count (headline number for crowd counting). rmse = penalizes big misses more (surge robustness). game (grid average mean error) — splits the frame into a grid and averages mae per cell, so a model can't cheat by getting the total right while putting people in the wrong place. quick self-check why does detection under-count dense crowds and density estimation not? (occlusion + nms suppress boxes; density regresses a continuous field) you need per-person dwell time in a packed hall. is density counting enough? (no — no identities; you fall back to little's law for wait) what is the training target for a density model? (gaussian-blurred head-point map)","words":535},{"path":"11-crowd-queue-analytics/zones-flow-heatmaps.md","title":"Zones, Flow & Heatmaps","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"zones-flow-occupancy-heatmaps\">Zones, Flow, Occupancy &amp; Heatmaps<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Once detections have track IDs and a floor projection, four analytics fall out cheaply: <strong>occupancy<\/strong> (how many in a zone now), <strong>flow<\/strong> (directional crossings/min), <strong>dwell<\/strong> (already covered), and <strong>heatmaps<\/strong> (where people spend time). These are the dashboards clients stare at — and they're geometry, not ML.<\/div><\/div>\n<h2 id=\"zones-roi-polygons-on-the-floor\">Zones (ROI polygons on the floor)<\/h2>\n<p>Define polygons on the <strong>ground plane<\/strong>, test the object's <strong>foot point<\/strong>:<\/p>\n<ul><li><strong>Point-in-polygon<\/strong> — ray-casting / <code>cv2.pointPolygonTest<\/code>. Use the foot point<\/li><\/ul>\n<p>(bottom-center), projected via homography, so \"in zone\" = feet-on-tile.<\/p>\n<ul><li><strong>Occupancy<\/strong> = count of unique track IDs whose foot point is inside the polygon<\/li><\/ul>\n<p>this frame. Smooth over a short window to kill flicker.<\/p>\n<ul><li><strong>Capacity / crowd-limit alerts<\/strong> = occupancy &gt; threshold for K seconds (crowd<\/li><\/ul>\n<p>surge → hands straight to section 12).<\/p>\n<h2 id=\"line-crossing-directional-flow\">Line-crossing &amp; directional flow<\/h2>\n<p>A \"tripwire\": a virtual line with an orientation.<\/p>\n<pre><code>crossed? → sign of cross-product of (line vector) × (track step Pₜ₋₁→Pₜ) flips\ndirection → which sign it flipped to  ⇒  IN vs OUT\nflow rate → crossings per minute, per direction\nnet occupancy = Σ(in) − Σ(out)   # people-counting without watching the whole room<\/code><\/pre>\n<ul><li><strong>Count unique track IDs<\/strong>, once, per crossing — never per frame (double-count).<\/li><li><strong>Debounce<\/strong> near the line: require the crossing to be \"committed\" (a few px past)<\/li><\/ul>\n<p>so a person loitering on the line doesn't rack up crossings.<\/p>\n<ul><li><strong>Net in−out<\/strong> is a classic cheap occupancy estimate for a room with known<\/li><\/ul>\n<p>entrances — no need to see the whole floor.<\/p>\n<h2 id=\"flow-trajectory-analytics\">Flow / trajectory analytics<\/h2>\n<ul><li><strong>Origin-Destination<\/strong> — which entrance → which exit (aggregate trajectories).<\/li><li><strong>Speed<\/strong> — pixel speed is meaningless; measure on the ground plane in m/s.<\/li><\/ul>\n<p>A sudden drop in mean speed + rising occupancy = congestion forming.<\/p>\n<ul><li><strong>Path/route mining<\/strong> — common routes, bottleneck segments.<\/li><\/ul>\n<h2 id=\"heatmaps-two-very-different-kinds-dont-confuse-them\">Heatmaps (two very different kinds — don't confuse them)<\/h2>\n<ul><li><strong>Occupancy/dwell heatmap<\/strong> — accumulate <em>time spent<\/em> per floor cell (bin foot<\/li><\/ul>\n<p>points over minutes/hours). Answers \"where do people linger?\" Great for retail   layout, platform hot spots.<\/p>\n<ul><li><strong>Motion/flow heatmap<\/strong> — accumulate <em>movement<\/em> (optical flow magnitude or track<\/li><\/ul>\n<p>density) per cell. Answers \"where is there movement?\"<\/p>\n<ul><li>Build on the <strong>ground plane<\/strong>, not the image, or perspective makes near-camera<\/li><\/ul>\n<p>areas look artificially hot.<\/p>\n<pre><code class=\"language-python\"><span class=\"tok-comment\"># occupancy heatmap accumulation (foot points already on ground plane, in cm)<\/span>\n<span class=\"tok-keyword\">import<\/span> numpy <span class=\"tok-keyword\">as<\/span> <span class=\"tok-builtin\">np<\/span>\nH = <span class=\"tok-builtin\">np<\/span>.zeros((floor_h, floor_w), <span class=\"tok-builtin\">np<\/span>.float32)\n<span class=\"tok-keyword\">for<\/span> (fx, fy) <span class=\"tok-keyword\">in<\/span> foot_points_this_frame:      <span class=\"tok-comment\"># ground-plane coords<\/span>\n    H[fy, fx] += dt                            <span class=\"tok-comment\"># add the frame duration (seconds)<\/span>\n<span class=\"tok-comment\"># after N frames: H holds seconds-spent per cell; normalize + colormap for display<\/span><\/code><\/pre>\n<h2 id=\"why-on-the-ground-plane-keeps-coming-up\">Why \"on the ground plane\" keeps coming up<\/h2>\n<p>Every metric here (occupancy, speed, dwell, heatmap) is <strong>distorted by perspective<\/strong> if computed in pixels. The homography that maps image → floor plan (calibration page) is what turns pixel soup into meters and m² — the difference between a demo and a product. Say this; it's the JD's \"geometry\" competency.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>How do you avoid double-counting at a tripwire? *(unique track IDs, debounced,<\/li><\/ul>\n<p>once per commit past the line)*<\/p>\n<ul><li>Occupancy heatmap vs motion heatmap — what does each accumulate? *(time-in-cell<\/li><\/ul>\n<p>vs movement-in-cell)*<\/p>\n<ul><li>Why compute speed on the ground plane? *(pixel speed varies with distance to<\/li><\/ul>\n<p>camera; meters/s is invariant)*<\/p>","toc":[{"level":2,"id":"zones-roi-polygons-on-the-floor","text":"Zones (ROI polygons on the floor)"},{"level":2,"id":"line-crossing-directional-flow","text":"Line-crossing &amp; directional flow"},{"level":2,"id":"flow-trajectory-analytics","text":"Flow / trajectory analytics"},{"level":2,"id":"heatmaps-two-very-different-kinds-dont-confuse-them","text":"Heatmaps (two very different kinds — don't confuse them)"},{"level":2,"id":"why-on-the-ground-plane-keeps-coming-up","text":"Why \"on the ground plane\" keeps coming up"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"zones, flow, occupancy & heatmaps 💡 tl;dr once detections have track ids and a floor projection, four analytics fall out cheaply: occupancy (how many in a zone now), flow (directional crossings/min), dwell (already covered), and heatmaps (where people spend time). these are the dashboards clients stare at — and they're geometry, not ml. zones (roi polygons on the floor) define polygons on the ground plane , test the object's foot point : point-in-polygon — ray-casting / cv2.pointpolygontest . use the foot point (bottom-center), projected via homography, so \"in zone\" = feet-on-tile. occupancy = count of unique track ids whose foot point is inside the polygon this frame. smooth over a short window to kill flicker. capacity / crowd-limit alerts = occupancy > threshold for k seconds (crowd surge → hands straight to section 12). line-crossing & directional flow a \"tripwire\": a virtual line with an orientation. crossed? → sign of cross-product of (line vector) × (track step pₜ₋₁→pₜ) flips direction → which sign it flipped to ⇒ in vs out flow rate → crossings per minute, per direction net occupancy = σ(in) − σ(out) # people-counting without watching the whole room count unique track ids , once, per crossing — never per frame (double-count). debounce near the line: require the crossing to be \"committed\" (a few px past) so a person loitering on the line doesn't rack up crossings. net in−out is a classic cheap occupancy estimate for a room with known entrances — no need to see the whole floor. flow / trajectory analytics origin-destination — which entrance → which exit (aggregate trajectories). speed — pixel speed is meaningless; measure on the ground plane in m/s. a sudden drop in mean speed + rising occupancy = congestion forming. path/route mining — common routes, bottleneck segments. heatmaps (two very different kinds — don't confuse them) occupancy/dwell heatmap — accumulate time spent per floor cell (bin foot points over minutes/hours). answers \"where do people linger?\" great for retail layout, platform hot spots. motion/flow heatmap — accumulate movement (optical flow magnitude or track density) per cell. answers \"where is there movement?\" build on the ground plane , not the image, or perspective makes near-camera areas look artificially hot. # occupancy heatmap accumulation (foot points already on ground plane, in cm) import numpy as np h = np .zeros((floor_h, floor_w), np .float32) for (fx, fy) in foot_points_this_frame: # ground-plane coords h[fy, fx] += dt # add the frame duration (seconds) # after n frames: h holds seconds-spent per cell; normalize + colormap for display why \"on the ground plane\" keeps coming up every metric here (occupancy, speed, dwell, heatmap) is distorted by perspective if computed in pixels. the homography that maps image → floor plan (calibration page) is what turns pixel soup into meters and m² — the difference between a demo and a product. say this; it's the jd's \"geometry\" competency. quick self-check how do you avoid double-counting at a tripwire? *(unique track ids, debounced, once per commit past the line)* occupancy heatmap vs motion heatmap — what does each accumulate? *(time-in-cell vs movement-in-cell)* why compute speed on the ground plane? *(pixel speed varies with distance to camera; meters/s is invariant)*","words":529},{"path":"11-crowd-queue-analytics/calibration-and-metrics.md","title":"Calibration & Metrics","section":"11 · Crowd & Queue Analytics","quiz":false,"accent":"#2f9e6f","html":"<h1 id=\"calibration-metrics-making-the-numbers-real\">Calibration &amp; Metrics — Making the Numbers Real<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Every crowd/queue metric is only as trustworthy as the mapping from pixels to the real world, and the ground truth you validate against. This page is the <strong>homography<\/strong> (image → floor plan) and the <strong>accuracy story<\/strong> you must be able to tell: how you'd prove a queue-time or count number is right.<\/div><\/div>\n<h2 id=\"the-homography-image-ground-plane\">The homography (image → ground plane)<\/h2>\n<p>A planar homography <code>H<\/code> (3×3) maps image pixels to floor-plan coordinates <em>when the scene is a plane<\/em> — which the floor is. Pick ≥4 known point correspondences (tile corners, floor markings, a measured rectangle) and solve:<\/p>\n<pre><code>[x']       [x]\n[y'] = H · [y]      then divide by the 3rd component (homogeneous → 2D)\n[w']       [1]\n\n# OpenCV\nH, _ = cv2.findHomography(image_pts, floor_pts)      # floor_pts in meters/cm\nfoot_world = cv2.perspectiveTransform(foot_image, H) # project a foot point<\/code><\/pre>\n<ul><li>Project the <strong>foot point<\/strong> (feet touch the plane) — a head point is <em>above<\/em> the<\/li><\/ul>\n<p>plane, so its projection is wrong. This is the single most common calibration bug.<\/p>\n<ul><li>Now distances are in <strong>meters<\/strong>, areas in <strong>m²<\/strong>, speeds in <strong>m/s<\/strong> — enabling<\/li><\/ul>\n<p>density (ppl/m²), real dwell distance, and calibrated speed.<\/p>\n<ul><li><strong>Lens distortion<\/strong> first: undistort with intrinsics (section 09 camera<\/li><\/ul>\n<p>calibration) before the homography, or a wide CCTV lens curves your straight lines.<\/p>\n<h2 id=\"multi-camera-overlap\">Multi-camera &amp; overlap<\/h2>\n<ul><li><strong>Common ground plane:<\/strong> calibrate every camera to the <em>same<\/em> floor coordinate<\/li><\/ul>\n<p>system → a person at (x,y) is the same point across cameras. This is how you   de-duplicate counts across overlapping views and hand off tracks (see section 14   ReID / section 06 multi-cam design).<\/p>\n<ul><li>Without a shared plane, two cameras seeing the same crowd double-count it.<\/li><\/ul>\n<h2 id=\"accuracy-validation-the-part-candidates-skip-dont\">Accuracy &amp; validation (the part candidates skip — don't)<\/h2>\n<p>You will be asked <em>\"how do you know your queue time / count is correct?\"<\/em> Have a concrete answer:<\/p>\n<div class=\"table-scroll\"><table><thead><tr><th>Metric<\/th><th>What it measures<\/th><th>Target framing<\/th><\/tr><\/thead><tbody><tr><td><strong>Count MAE / MAPE<\/strong><\/td><td>avg abs error in people counted<\/td><td>\"±N people or ±X% vs manual count\"<\/td><\/tr><tr><td><strong>Queue-time MAE<\/strong><\/td><td>avg abs error in seconds vs stopwatch<\/td><td>\"within ±T seconds of a hand-timed sample\"<\/td><\/tr><tr><td><strong>Precision/Recall of events<\/strong><\/td><td>zone entries/exits vs ground truth<\/td><td>for line-crossing correctness<\/td><\/tr><tr><td><strong>ID-switch rate / MOTA<\/strong><\/td><td>tracker stability (drives dwell error)<\/td><td>see section 14<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>How to ground-truth:<\/strong><\/p>\n<ul><li><strong>Manual count<\/strong> a set of frames / a time window and compare totals.<\/li><li><strong>Stopwatch a sample<\/strong> of individuals through the queue for wait time.<\/li><li><strong>Second synced camera<\/strong> or staff logs as an independent reference.<\/li><li>Report error <strong>by regime<\/strong> (sparse vs dense) — models fail differently, and a<\/li><\/ul>\n<p>single average hides the dense-crowd collapse.<\/p>\n<h2 id=\"drift-over-time-leads-into-section-13\">Drift over time (leads into section 13)<\/h2>\n<p>Calibration and accuracy aren't one-and-done: a <strong>bumped camera<\/strong>, new lighting, a seasonal crowd change, or a re-mounted lens silently breaks the homography and the model. That's why <strong>performance monitoring<\/strong> (section 13) tracks per-camera metrics continuously — a count that slowly diverges from a periodic manual audit is your drift alarm.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Why project the foot point, not the head, through the homography? *(feet lie on<\/li><\/ul>\n<p>the plane the homography models; the head is above it)*<\/p>\n<ul><li>How do you stop two overlapping cameras double-counting one crowd? *(shared<\/li><\/ul>\n<p>ground-plane coordinates; de-dup by world position)*<\/p>\n<ul><li>An interviewer asks \"prove your queue time is accurate.\" Your answer? *(stopwatch<\/li><\/ul>\n<p>a sample, report MAE in seconds, break down by crowd regime)*<\/p>","toc":[{"level":2,"id":"the-homography-image-ground-plane","text":"The homography (image → ground plane)"},{"level":2,"id":"multi-camera-overlap","text":"Multi-camera &amp; overlap"},{"level":2,"id":"accuracy-validation-the-part-candidates-skip-dont","text":"Accuracy &amp; validation (the part candidates skip — don't)"},{"level":2,"id":"drift-over-time-leads-into-section-13","text":"Drift over time (leads into section 13)"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"calibration & metrics — making the numbers real 💡 tl;dr every crowd/queue metric is only as trustworthy as the mapping from pixels to the real world, and the ground truth you validate against. this page is the homography (image → floor plan) and the accuracy story you must be able to tell: how you'd prove a queue-time or count number is right. the homography (image → ground plane) a planar homography h (3×3) maps image pixels to floor-plan coordinates when the scene is a plane — which the floor is. pick ≥4 known point correspondences (tile corners, floor markings, a measured rectangle) and solve: [x'] [x] [y'] = h · [y] then divide by the 3rd component (homogeneous → 2d) [w'] [1] # opencv h, _ = cv2.findhomography(image_pts, floor_pts) # floor_pts in meters/cm foot_world = cv2.perspectivetransform(foot_image, h) # project a foot point project the foot point (feet touch the plane) — a head point is above the plane, so its projection is wrong. this is the single most common calibration bug. now distances are in meters , areas in m² , speeds in m/s — enabling density (ppl/m²), real dwell distance, and calibrated speed. lens distortion first: undistort with intrinsics (section 09 camera calibration) before the homography, or a wide cctv lens curves your straight lines. multi-camera & overlap common ground plane: calibrate every camera to the same floor coordinate system → a person at (x,y) is the same point across cameras. this is how you de-duplicate counts across overlapping views and hand off tracks (see section 14 reid / section 06 multi-cam design). without a shared plane, two cameras seeing the same crowd double-count it. accuracy & validation (the part candidates skip — don't) you will be asked \"how do you know your queue time / count is correct?\" have a concrete answer: metric what it measures target framing count mae / mape avg abs error in people counted \"±n people or ±x% vs manual count\" queue-time mae avg abs error in seconds vs stopwatch \"within ±t seconds of a hand-timed sample\" precision/recall of events zone entries/exits vs ground truth for line-crossing correctness id-switch rate / mota tracker stability (drives dwell error) see section 14 how to ground-truth: manual count a set of frames / a time window and compare totals. stopwatch a sample of individuals through the queue for wait time. second synced camera or staff logs as an independent reference. report error by regime (sparse vs dense) — models fail differently, and a single average hides the dense-crowd collapse. drift over time (leads into section 13) calibration and accuracy aren't one-and-done: a bumped camera , new lighting, a seasonal crowd change, or a re-mounted lens silently breaks the homography and the model. that's why performance monitoring (section 13) tracks per-camera metrics continuously — a count that slowly diverges from a periodic manual audit is your drift alarm. quick self-check why project the foot point, not the head, through the homography? *(feet lie on the plane the homography models; the head is above it)* how do you stop two overlapping cameras double-counting one crowd? *(shared ground-plane coordinates; de-dup by world position)* an interviewer asks \"prove your queue time is accurate.\" your answer? *(stopwatch a sample, report mae in seconds, break down by crowd regime)*","words":546},{"path":"12-event-anomaly-detection/README.md","title":"Overview","section":"12 · Event & Anomaly Detection","quiz":false,"accent":"#d9534f","html":"<h1 id=\"12-operational-event-anomaly-detection\">12 — Operational Event &amp; Anomaly Detection<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD's third pillar: <em>operational event detection and anomaly identification<\/em>. Two distinct problems. <strong>Events<\/strong> are things you can <em>define<\/em> (loitering, intrusion, abandoned object, crowd surge) — rule/logic on detections. <strong>Anomalies<\/strong> are things you <em>can't<\/em> enumerate (\"something unusual\") — you learn \"normal\" and flag deviation. Know the standard event catalog, the anomaly method families, and — most important — how you keep false alarms low enough that anyone trusts the system.<\/div><\/div>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"operational-events.md\" href=\"#\">operational-events.md<\/a> — the standard event catalog and how each is computed<\/li><li><a class=\"mdlink\" data-href=\"anomaly-methods.md\" href=\"#\">anomaly-methods.md<\/a> — supervised vs unsupervised, optical flow, autoencoders, prediction error<\/li><li><a class=\"mdlink\" data-href=\"alerting-and-thresholds.md\" href=\"#\">alerting-and-thresholds.md<\/a> — debounce, confirmation, false-alarm control, alert schemas<\/li><\/ol>\n<h2 id=\"events-vs-anomalies-get-this-distinction-crisp\">Events vs anomalies (get this distinction crisp)<\/h2>\n<pre><code> EVENT (known, definable)            ANOMALY (unknown, \"not normal\")\n \"person in restricted zone &gt;30s\"    \"motion pattern never seen here before\"\n        │                                    │\n        ▼                                    ▼\n deterministic logic on               learn a model of normal, score\n detections/tracks + geometry         deviation (unsupervised/self-supervised)\n → high precision, explainable        → catches the unforeseen, harder to tune<\/code><\/pre>\n<p>Most production \"anomaly detection\" briefs are actually <strong>80% defined events + 20% true anomaly<\/strong>. Say so: you'd ship the high-precision rule-based events first (immediate value, explainable), and layer statistical/learned anomaly detection for the long tail. That's the pragmatic, senior answer.<\/p>\n<h2 id=\"the-framing-line-memorize\">The framing line (memorize)<\/h2>\n<p><em>\"I separate definable events from true anomalies. Events are geometry-plus-temporal logic on tracks — high precision, auditable, and what a client actually asks for day one. Anomaly detection is a learned model of 'normal' for the open-ended rest. Either way the hard part isn't detecting once — it's the false-alarm rate, so I design confirmation and debouncing in from the start.\"<\/em><\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"operational-events.md\" href=\"#\">operational-events.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"events-vs-anomalies-get-this-distinction-crisp","text":"Events vs anomalies (get this distinction crisp)"},{"level":2,"id":"the-framing-line-memorize","text":"The framing line (memorize)"}],"text":"12 — operational event & anomaly detection 💡 tl;dr the jd's third pillar: operational event detection and anomaly identification . two distinct problems. events are things you can define (loitering, intrusion, abandoned object, crowd surge) — rule/logic on detections. anomalies are things you can't enumerate (\"something unusual\") — you learn \"normal\" and flag deviation. know the standard event catalog, the anomaly method families, and — most important — how you keep false alarms low enough that anyone trusts the system. files: operational-events.md — the standard event catalog and how each is computed anomaly-methods.md — supervised vs unsupervised, optical flow, autoencoders, prediction error alerting-and-thresholds.md — debounce, confirmation, false-alarm control, alert schemas events vs anomalies (get this distinction crisp) event (known, definable) anomaly (unknown, \"not normal\") \"person in restricted zone >30s\" \"motion pattern never seen here before\" │ │ ▼ ▼ deterministic logic on learn a model of normal, score detections/tracks + geometry deviation (unsupervised/self-supervised) → high precision, explainable → catches the unforeseen, harder to tune most production \"anomaly detection\" briefs are actually 80% defined events + 20% true anomaly . say so: you'd ship the high-precision rule-based events first (immediate value, explainable), and layer statistical/learned anomaly detection for the long tail. that's the pragmatic, senior answer. the framing line (memorize) \"i separate definable events from true anomalies. events are geometry-plus-temporal logic on tracks — high precision, auditable, and what a client actually asks for day one. anomaly detection is a learned model of 'normal' for the open-ended rest. either way the hard part isn't detecting once — it's the false-alarm rate, so i design confirmation and debouncing in from the start.\" → start: operational-events.md","words":273},{"path":"12-event-anomaly-detection/operational-events.md","title":"Operational Event Catalog","section":"12 · Event & Anomaly Detection","quiz":false,"accent":"#d9534f","html":"<h1 id=\"the-operational-event-catalog\">The Operational Event Catalog<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> These are the events every video-intelligence product ships. Each is <strong>detection + tracking + geometry + a temporal condition<\/strong> — not a special model. Know how each is computed and its main false-alarm trap.<\/div><\/div>\n<h2 id=\"the-standard-catalog\">The standard catalog<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Event<\/th><th>How it's computed<\/th><th>Main false-alarm trap<\/th><\/tr><\/thead><tbody><tr><td><strong>Intrusion / zone breach<\/strong><\/td><td>foot point enters a restricted ROI polygon<\/td><td>shadows/reflections; staff who are allowed in<\/td><\/tr><tr><td><strong>Loitering<\/strong><\/td><td>track dwell in a zone &gt; T seconds<\/td><td>someone waiting legitimately; ID switch resets the timer<\/td><\/tr><tr><td><strong>Abandoned / removed object<\/strong><\/td><td>static object appears (or a fixture disappears) and persists &gt; T<\/td><td>bags briefly set down; lighting change; a parked cart<\/td><\/tr><tr><td><strong>Crowd surge / overcrowding<\/strong><\/td><td>zone occupancy or density &gt; threshold for K sec<\/td><td>brief clustering; miscalibrated density<\/td><\/tr><tr><td><strong>Line-crossing / wrong-direction<\/strong><\/td><td>track crosses tripwire in the disallowed direction<\/td><td>tracking jitter near the line<\/td><\/tr><tr><td><strong>Tailgating<\/strong><\/td><td>2 tracks cross an access line within Δt of one badge event<\/td><td>two people legitimately close<\/td><\/tr><tr><td><strong>Fall / person-down<\/strong><\/td><td>box aspect ratio flips (tall→wide) + stays low + low motion<\/td><td>sitting/crouching; occlusion<\/td><\/tr><tr><td><strong>Speed anomaly<\/strong><\/td><td>ground-plane speed &gt; (running) or ≈0 (collapse)<\/td><td>tracker velocity noise<\/td><\/tr><tr><td><strong>PPE / compliance<\/strong><\/td><td>attribute classifier on the person crop (helmet/vest present?)<\/td><td>small/occluded gear; domain shift<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-recurring-recipe\">The recurring recipe<\/h2>\n<pre><code>detections ─► track (stable IDs) ─► project foot point to floor\n          ─► geometric test (in zone? crossed line? which direction?)\n          ─► temporal test (for &gt; T sec? K-of-N frames? persisted?)\n          ─► CONFIRM (debounce) ─► emit event once, with evidence<\/code><\/pre>\n<p>Two temporal ideas do most of the work:<\/p>\n<ul><li><strong>Dwell threshold<\/strong> — the event needs a <em>duration<\/em> (loitering &gt; 30 s, object<\/li><\/ul>\n<p>static &gt; 60 s), not a single frame. This alone kills most flicker.<\/p>\n<ul><li><strong>K-of-N confirmation<\/strong> — require the condition true in K of the last N frames<\/li><\/ul>\n<p>before firing, so one noisy frame can't trigger an alert.<\/p>\n<h2 id=\"abandoned-object-the-classic-deep-dive\">Abandoned object — the classic deep-dive<\/h2>\n<p>A favorite interview scenario. Approach:<\/p>\n<ol><li><strong>Background/static detection<\/strong> — a region that was moving/empty becomes static<\/li><\/ol>\n<p>and stays static (dual-background or a \"static-foreground\" model), OR a detected    object (bag) whose track goes stationary.<\/p>\n<ol><li><strong>Ownership / separation<\/strong> — was it left by a person who then walked away? Track<\/li><\/ol>\n<p>the owner; fire only if owner-distance &gt; D for &gt; T (distinguishes \"set down for a    second\" from \"abandoned\").<\/p>\n<ol><li><strong>Persistence<\/strong> — must remain &gt; T seconds to fire.<\/li><li><strong>Evidence<\/strong> — attach the frame + track history so a human can adjudicate.<\/li><\/ol>\n<p>The interesting part is #2 — naive \"static blob\" detectors alarm on every parked trolley. Owner separation is what makes it usable.<\/p>\n<h2 id=\"why-these-beat-just-train-a-model\">Why these beat \"just train a model\"<\/h2>\n<ul><li><strong>Explainable &amp; auditable<\/strong> — \"fired because track 42 was in zone B for 47 s.\" In<\/li><\/ul>\n<p>a <strong>secure/government Abu Dhabi context<\/strong>, an auditable rule beats a black box.<\/p>\n<ul><li><strong>No labeled event data needed<\/strong> — you can't collect 10k real intrusions.<\/li><li><strong>Tunable per site<\/strong> — thresholds are knobs an integrator sets on-site.<\/li><\/ul>\n<p>The model's job is only the primitives (boxes, classes, IDs, attributes). The <em>event<\/em> is your logic layer on top — exactly the JD's \"designing complex logic layers on model detections.\"<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Loitering fires falsely every time someone's ID switches. Fix? *(persist dwell<\/li><\/ul>\n<p>across short gaps / re-associate via ReID; don't reset timer on a 1-frame drop)*<\/p>\n<ul><li>How do you stop abandoned-object alerting on every parked cart? *(owner-separation<\/li><\/ul>\n<p>test + persistence, not just static-blob)*<\/p>\n<ul><li>Why prefer rule-based events over a learned event classifier here? *(explainable,<\/li><\/ul>\n<p>auditable, tunable, and no labeled event data exists)*<\/p>","toc":[{"level":2,"id":"the-standard-catalog","text":"The standard catalog"},{"level":2,"id":"the-recurring-recipe","text":"The recurring recipe"},{"level":2,"id":"abandoned-object-the-classic-deep-dive","text":"Abandoned object — the classic deep-dive"},{"level":2,"id":"why-these-beat-just-train-a-model","text":"Why these beat \"just train a model\""},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"the operational event catalog 💡 tl;dr these are the events every video-intelligence product ships. each is detection + tracking + geometry + a temporal condition — not a special model. know how each is computed and its main false-alarm trap. the standard catalog event how it's computed main false-alarm trap intrusion / zone breach foot point enters a restricted roi polygon shadows/reflections; staff who are allowed in loitering track dwell in a zone > t seconds someone waiting legitimately; id switch resets the timer abandoned / removed object static object appears (or a fixture disappears) and persists > t bags briefly set down; lighting change; a parked cart crowd surge / overcrowding zone occupancy or density > threshold for k sec brief clustering; miscalibrated density line-crossing / wrong-direction track crosses tripwire in the disallowed direction tracking jitter near the line tailgating 2 tracks cross an access line within δt of one badge event two people legitimately close fall / person-down box aspect ratio flips (tall→wide) + stays low + low motion sitting/crouching; occlusion speed anomaly ground-plane speed > (running) or ≈0 (collapse) tracker velocity noise ppe / compliance attribute classifier on the person crop (helmet/vest present?) small/occluded gear; domain shift the recurring recipe detections ─► track (stable ids) ─► project foot point to floor ─► geometric test (in zone? crossed line? which direction?) ─► temporal test (for > t sec? k-of-n frames? persisted?) ─► confirm (debounce) ─► emit event once, with evidence two temporal ideas do most of the work: dwell threshold — the event needs a duration (loitering > 30 s, object static > 60 s), not a single frame. this alone kills most flicker. k-of-n confirmation — require the condition true in k of the last n frames before firing, so one noisy frame can't trigger an alert. abandoned object — the classic deep-dive a favorite interview scenario. approach: background/static detection — a region that was moving/empty becomes static and stays static (dual-background or a \"static-foreground\" model), or a detected object (bag) whose track goes stationary. ownership / separation — was it left by a person who then walked away? track the owner; fire only if owner-distance > d for > t (distinguishes \"set down for a second\" from \"abandoned\"). persistence — must remain > t seconds to fire. evidence — attach the frame + track history so a human can adjudicate. the interesting part is #2 — naive \"static blob\" detectors alarm on every parked trolley. owner separation is what makes it usable. why these beat \"just train a model\" explainable & auditable — \"fired because track 42 was in zone b for 47 s.\" in a secure/government abu dhabi context , an auditable rule beats a black box. no labeled event data needed — you can't collect 10k real intrusions. tunable per site — thresholds are knobs an integrator sets on-site. the model's job is only the primitives (boxes, classes, ids, attributes). the event is your logic layer on top — exactly the jd's \"designing complex logic layers on model detections.\" quick self-check loitering fires falsely every time someone's id switches. fix? *(persist dwell across short gaps / re-associate via reid; don't reset timer on a 1-frame drop)* how do you stop abandoned-object alerting on every parked cart? *(owner-separation test + persistence, not just static-blob)* why prefer rule-based events over a learned event classifier here? *(explainable, auditable, tunable, and no labeled event data exists)*","words":568},{"path":"12-event-anomaly-detection/anomaly-methods.md","title":"Anomaly Detection Methods","section":"12 · Event & Anomaly Detection","quiz":false,"accent":"#d9534f","html":"<h1 id=\"anomaly-detection-methods\">Anomaly Detection Methods<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Anomaly = \"not normal,\" where you can't enumerate the bad cases. The core trick is always the same: <strong>learn a model of normal, then score how far a new observation deviates.<\/strong> They differ in <em>what<\/em> they model (a scalar metric, an appearance frame, a motion pattern, a future prediction) and in how much supervision they need. Match the method to what \"normal\" looks like in the scene.<\/div><\/div>\n<h2 id=\"first-is-it-really-anomaly-detection\">First: is it really anomaly detection?<\/h2>\n<p>If you can name the bad thing (\"person in zone &gt; 30 s\"), it's an <strong>event<\/strong> (section 1 of this folder) — use a rule; it's higher-precision. Reserve true anomaly methods for the <strong>open-ended<\/strong> part: \"flag anything unusual on this platform.\" Interviewers respect the candidate who <em>narrows<\/em> the problem before reaching for a fancy model.<\/p>\n<h2 id=\"method-families-weakest-supervision-strongest\">Method families (weakest supervision → strongest)<\/h2>\n<h3 id=\"1-statistical-metric-based-no-learning\">1. Statistical / metric-based (no learning)<\/h3>\n<p>Track a scalar (occupancy, mean speed, flow rate) and flag deviation:<\/p>\n<ul><li><strong>Z-score / robust z (MAD)<\/strong> — flag when a metric is &gt; k σ from its rolling mean.<\/li><li><strong>EWMA / control charts<\/strong> — smooth baseline, flag sustained excursions.<\/li><li><strong>Seasonal baselines<\/strong> — \"normal\" depends on hour/day (a busy mall at 6pm ≠ 6am);<\/li><\/ul>\n<p>compare against the same time-of-week, not a global mean.<\/p>\n<ul><li>Cheap, explainable, great first line. Catches surges, stampede-onset (speed drop +<\/li><\/ul>\n<p>density spike), sudden emptying.<\/p>\n<h3 id=\"2-classical-unsupervised-ml-on-features\">2. Classical unsupervised ML on features<\/h3>\n<p>Extract features (trajectory shapes, HOG/flow histograms, embeddings) and model normal density:<\/p>\n<ul><li><strong>One-Class SVM<\/strong>, <strong>Isolation Forest<\/strong>, <strong>Gaussian Mixture / KDE<\/strong>, **k-NN<\/li><\/ul>\n<p>distance**. Score = how far outside the learned normal region.<\/p>\n<h3 id=\"3-reconstruction-based-autoencoder\">3. Reconstruction-based (autoencoder)<\/h3>\n<p>Train an <strong>autoencoder<\/strong> (or conv-AE) only on <em>normal<\/em> footage. It learns to reconstruct normal well; <strong>anomalies reconstruct poorly → high reconstruction error<\/strong> is the anomaly score.<\/p>\n<pre><code>frame ─► encoder ─► latent ─► decoder ─► reconstruction\nanomaly score = || frame − reconstruction ||   (high = unusual)<\/code><\/pre>\n<ul><li>Self-supervised: only needs normal data (abundant), no anomaly labels.<\/li><li>Watch-out: strong AEs \"generalize\" and reconstruct anomalies too well → misses.<\/li><\/ul>\n<p>Mitigate with memory-augmented AEs (MemAE) or constraints.<\/p>\n<h3 id=\"4-prediction-based-temporal\">4. Prediction-based (temporal)<\/h3>\n<p>Predict the <strong>next frame<\/strong> (or next positions) from recent ones; <strong>large prediction error = anomaly<\/strong> (a future-frame-prediction GAN/U-Net, or an LSTM over trajectories). Good for <em>motion<\/em> anomalies — wrong-way, sudden scatter, fall — that a single-frame AE misses.<\/p>\n<h3 id=\"5-optical-flow-motion-anomaly\">5. Optical-flow / motion anomaly<\/h3>\n<p>Model the <strong>normal motion field<\/strong> (direction + magnitude histograms per region). Flag frames whose flow deviates — people running in a walking area, a crowd suddenly dispersing (panic), reverse flow. Classic, light, and effective for crowd-motion anomalies specifically.<\/p>\n<h3 id=\"6-modern-video-embeddings-distance\">6. Modern: video embeddings + distance<\/h3>\n<p>Embed clips with a pretrained video/self-supervised backbone; score anomalies by distance to normal embeddings, or use weakly-supervised MIL (video-level \"normal vs anomaly\" labels, e.g. the UCF-Crime style) when you have <em>some<\/em> labeled incidents.<\/p>\n<h2 id=\"choosing-say-the-trade-off\">Choosing (say the trade-off)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Scene / need<\/th><th>Reach for<\/th><\/tr><\/thead><tbody><tr><td>A few scalar metrics, want explainable, fast<\/td><td>Statistical (z-score / EWMA / seasonal)<\/td><\/tr><tr><td>Appearance anomaly, only normal footage<\/td><td>Autoencoder (reconstruction error)<\/td><\/tr><tr><td>Motion/behavior anomaly (running, panic, wrong-way)<\/td><td>Optical-flow model or prediction error<\/td><\/tr><tr><td>Some labeled incidents exist<\/td><td>Weakly-supervised MIL on embeddings<\/td><\/tr><\/tbody><\/table><\/div>\n<h2 id=\"the-universal-gotchas\">The universal gotchas<\/h2>\n<ul><li><strong>\"Normal\" drifts<\/strong> — lighting, seasons, layout changes. A static normal model<\/li><\/ul>\n<p>ages into a false-alarm generator → ties to monitoring/retraining (section 13).<\/p>\n<ul><li><strong>Base-rate problem<\/strong> — real anomalies are <em>rare<\/em>, so even 99% specificity buries<\/li><\/ul>\n<p>operators in false positives. This is why alerting design (next page) matters more   than the detector.<\/p>\n<ul><li><strong>No ground truth<\/strong> — you often can't measure recall (you don't know what you<\/li><\/ul>\n<p>missed). Validate on injected/known incidents and precision of what fired.<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>When do you use a rule (event) vs a learned anomaly model? *(nameable → rule;<\/li><\/ul>\n<p>open-ended → learned)*<\/p>\n<ul><li>Why can a <em>too-good<\/em> autoencoder miss anomalies? *(it reconstructs them well too;<\/li><\/ul>\n<p>low error → missed)*<\/p>\n<ul><li>Which method best catches \"crowd suddenly runs\"? *(optical-flow / prediction-error<\/li><\/ul>\n<p>motion model, not a single-frame AE)*<\/p>\n<ul><li>Why does seasonality matter? *(normal is time-of-day/week dependent; compare like<\/li><\/ul>\n<p>for like or you alarm every rush hour)*<\/p>","toc":[{"level":2,"id":"first-is-it-really-anomaly-detection","text":"First: is it really anomaly detection?"},{"level":2,"id":"method-families-weakest-supervision-strongest","text":"Method families (weakest supervision → strongest)"},{"level":3,"id":"1-statistical-metric-based-no-learning","text":"1. Statistical / metric-based (no learning)"},{"level":3,"id":"2-classical-unsupervised-ml-on-features","text":"2. Classical unsupervised ML on features"},{"level":3,"id":"3-reconstruction-based-autoencoder","text":"3. Reconstruction-based (autoencoder)"},{"level":3,"id":"4-prediction-based-temporal","text":"4. Prediction-based (temporal)"},{"level":3,"id":"5-optical-flow-motion-anomaly","text":"5. Optical-flow / motion anomaly"},{"level":3,"id":"6-modern-video-embeddings-distance","text":"6. Modern: video embeddings + distance"},{"level":2,"id":"choosing-say-the-trade-off","text":"Choosing (say the trade-off)"},{"level":2,"id":"the-universal-gotchas","text":"The universal gotchas"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"anomaly detection methods 💡 tl;dr anomaly = \"not normal,\" where you can't enumerate the bad cases. the core trick is always the same: learn a model of normal, then score how far a new observation deviates. they differ in what they model (a scalar metric, an appearance frame, a motion pattern, a future prediction) and in how much supervision they need. match the method to what \"normal\" looks like in the scene. first: is it really anomaly detection? if you can name the bad thing (\"person in zone > 30 s\"), it's an event (section 1 of this folder) — use a rule; it's higher-precision. reserve true anomaly methods for the open-ended part: \"flag anything unusual on this platform.\" interviewers respect the candidate who narrows the problem before reaching for a fancy model. method families (weakest supervision → strongest) 1. statistical / metric-based (no learning) track a scalar (occupancy, mean speed, flow rate) and flag deviation: z-score / robust z (mad) — flag when a metric is > k σ from its rolling mean. ewma / control charts — smooth baseline, flag sustained excursions. seasonal baselines — \"normal\" depends on hour/day (a busy mall at 6pm ≠ 6am); compare against the same time-of-week, not a global mean. cheap, explainable, great first line. catches surges, stampede-onset (speed drop + density spike), sudden emptying. 2. classical unsupervised ml on features extract features (trajectory shapes, hog/flow histograms, embeddings) and model normal density: one-class svm , isolation forest , gaussian mixture / kde , **k-nn distance**. score = how far outside the learned normal region. 3. reconstruction-based (autoencoder) train an autoencoder (or conv-ae) only on normal footage. it learns to reconstruct normal well; anomalies reconstruct poorly → high reconstruction error is the anomaly score. frame ─► encoder ─► latent ─► decoder ─► reconstruction anomaly score = || frame − reconstruction || (high = unusual) self-supervised: only needs normal data (abundant), no anomaly labels. watch-out: strong aes \"generalize\" and reconstruct anomalies too well → misses. mitigate with memory-augmented aes (memae) or constraints. 4. prediction-based (temporal) predict the next frame (or next positions) from recent ones; large prediction error = anomaly (a future-frame-prediction gan/u-net, or an lstm over trajectories). good for motion anomalies — wrong-way, sudden scatter, fall — that a single-frame ae misses. 5. optical-flow / motion anomaly model the normal motion field (direction + magnitude histograms per region). flag frames whose flow deviates — people running in a walking area, a crowd suddenly dispersing (panic), reverse flow. classic, light, and effective for crowd-motion anomalies specifically. 6. modern: video embeddings + distance embed clips with a pretrained video/self-supervised backbone; score anomalies by distance to normal embeddings, or use weakly-supervised mil (video-level \"normal vs anomaly\" labels, e.g. the ucf-crime style) when you have some labeled incidents. choosing (say the trade-off) scene / need reach for a few scalar metrics, want explainable, fast statistical (z-score / ewma / seasonal) appearance anomaly, only normal footage autoencoder (reconstruction error) motion/behavior anomaly (running, panic, wrong-way) optical-flow model or prediction error some labeled incidents exist weakly-supervised mil on embeddings the universal gotchas \"normal\" drifts — lighting, seasons, layout changes. a static normal model ages into a false-alarm generator → ties to monitoring/retraining (section 13). base-rate problem — real anomalies are rare , so even 99% specificity buries operators in false positives. this is why alerting design (next page) matters more than the detector. no ground truth — you often can't measure recall (you don't know what you missed). validate on injected/known incidents and precision of what fired. quick self-check when do you use a rule (event) vs a learned anomaly model? *(nameable → rule; open-ended → learned)* why can a too-good autoencoder miss anomalies? *(it reconstructs them well too; low error → missed)* which method best catches \"crowd suddenly runs\"? *(optical-flow / prediction-error motion model, not a single-frame ae)* why does seasonality matter? *(normal is time-of-day/week dependent; compare like for like or you alarm every rush hour)*","words":656},{"path":"12-event-anomaly-detection/alerting-and-thresholds.md","title":"Alerting & Thresholds","section":"12 · Event & Anomaly Detection","quiz":false,"accent":"#d9534f","html":"<h1 id=\"alerting-thresholds-false-alarm-control\">Alerting, Thresholds &amp; False-Alarm Control<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> Detecting an event once is easy. Making operators <em>trust<\/em> the system is the real job — and it lives entirely in the alerting layer: <strong>confirmation, debouncing, hysteresis, deduplication, and a clean event schema<\/strong>. A system that cries wolf gets muted in a week. This is the most senior thing you can talk about in this whole section.<\/div><\/div>\n<h2 id=\"why-the-alerting-layer-decides-success\">Why the alerting layer decides success<\/h2>\n<p>Anomalies/events are <strong>rare<\/strong> → the base rate is brutal. Even a great detector at 99% specificity, watching thousands of frames × dozens of cameras, produces a flood of false positives. Operators mute muted systems. So you engineer the alert, not just the detector:<\/p>\n<pre><code>raw trigger (per frame)\n   → temporal confirmation (K-of-N / dwell)     # kill single-frame noise\n   → hysteresis (enter high, clear low)          # stop flicker at the boundary\n   → debounce / cool-down per (camera,zone,type) # one alert, not 500\n   → dedupe across cameras (same world event)    # overlap views = one incident\n   → severity + evidence  → route to operator<\/code><\/pre>\n<h2 id=\"the-core-techniques\">The core techniques<\/h2>\n<ul><li><strong>K-of-N confirmation<\/strong> — fire only if the condition holds in K of the last N<\/li><\/ul>\n<p>frames. The single highest-leverage false-alarm reducer.<\/p>\n<ul><li><strong>Dwell / persistence<\/strong> — require a duration (loiter &gt; 30 s, object static &gt; 60 s).<\/li><li><strong>Hysteresis (two thresholds)<\/strong> — enter the alarm state at a <em>high<\/em> threshold,<\/li><\/ul>\n<p>clear it at a <em>lower<\/em> one. Prevents rapid on/off chatter when a metric hovers on   the line (e.g. occupancy oscillating around the cap).<\/p>\n<ul><li><strong>Debounce / cool-down<\/strong> — after firing for a (camera, zone, type), suppress<\/li><\/ul>\n<p>repeats for a window; send one \"ongoing\" update, not a per-frame storm.<\/p>\n<ul><li><strong>Deduplication<\/strong> — the <em>same<\/em> real-world event seen by two overlapping cameras<\/li><\/ul>\n<p>is <strong>one<\/strong> incident (dedupe on shared ground-plane position + time; see §11   calibration).<\/p>\n<ul><li><strong>Spatial/temporal filtering<\/strong> — ignore known-noisy regions (a swaying tree, a<\/li><\/ul>\n<p>reflective floor, a monitor showing video), and known busy periods.<\/p>\n<h2 id=\"setting-thresholds\">Setting thresholds<\/h2>\n<ul><li><strong>Derive from data, not vibes<\/strong> — collect the metric's normal distribution and set<\/li><\/ul>\n<p>thresholds at a chosen percentile / cost trade-off, then validate.<\/p>\n<ul><li><strong>Precision–recall trade-off is a business decision<\/strong> — a <strong>security intrusion<\/strong><\/li><\/ul>\n<p>wants high recall (miss nothing, tolerate false alarms); a <strong>retail marketing   count<\/strong> wants high precision. Ask which the client wants; don't assume.<\/p>\n<ul><li><strong>ROC/PR + operating point<\/strong> — pick the threshold on the PR curve that hits the<\/li><\/ul>\n<p>agreed false-alarm budget (e.g. \"&lt; 2 false alerts per camera per day\").<\/p>\n<ul><li><strong>Per-site tuning<\/strong> — expose thresholds as config an integrator sets on-site;<\/li><\/ul>\n<p>scenes differ too much for one global value.<\/p>\n<h2 id=\"the-eventalert-schema-design-it-deliberately\">The event/alert schema (design it deliberately)<\/h2>\n<p>A clean, self-describing event object is what makes the system auditable — critical in a secure government deployment:<\/p>\n<pre><code class=\"language-json\">{\n  \"event_id\": \"uuid\",\n  \"type\": \"loitering\",\n  \"severity\": \"medium\",\n  \"camera_id\": \"cam-07\",\n  \"zone_id\": \"restricted-b\",\n  \"start_ts\": \"2026-07-06T09:14:03Z\",\n  \"end_ts\": null,                       // open until cleared → ongoing\n  \"track_ids\": [42],\n  \"confidence\": 0.87,\n  \"evidence\": { \"clip\": \"…\", \"keyframe\": \"…\", \"trajectory\": [] },\n  \"status\": \"active\"                    // active → acknowledged → resolved\n}<\/code><\/pre>\n<ul><li><strong>Include evidence<\/strong> (keyframe/clip/track) so a human can adjudicate fast and the<\/li><\/ul>\n<p>record is auditable later.<\/p>\n<ul><li><strong>State machine<\/strong> — active → acknowledged → resolved; supports SLAs and stops<\/li><\/ul>\n<p>duplicate paging.<\/p>\n<ul><li><strong>Idempotency<\/strong> — dedupe by (type, camera, zone, time-bucket) so retries/overlap<\/li><\/ul>\n<p>don't double-alert.<\/p>\n<h2 id=\"closing-the-loop-this-impresses\">Closing the loop (this impresses)<\/h2>\n<ul><li><strong>Operator feedback<\/strong> — a \"false alarm\" button feeds a dataset to retune<\/li><\/ul>\n<p>thresholds and hard-mine false positives into the next model (active learning,   §14).<\/p>\n<ul><li><strong>Continuous false-alarm-rate monitoring<\/strong> — track alerts/camera/day; a rising<\/li><\/ul>\n<p>trend is an early warning of drift or a bumped camera (→ §13 monitoring).<\/p>\n<h2 id=\"quick-self-check\">Quick self-check<\/h2>\n<ul><li>Why hysteresis instead of one threshold? *(stops on/off chatter when the metric<\/li><\/ul>\n<p>hovers at the boundary)*<\/p>\n<ul><li>Two overlapping cameras both fire on one intrusion — how many incidents, and how<\/li><\/ul>\n<p>do you enforce it? <em>(one; dedupe on shared world position + time)<\/em><\/p>\n<ul><li>Client says \"never miss an intruder.\" Which way do you move the operating point,<\/li><\/ul>\n<p>and what's the cost? <em>(toward recall; more false alarms — budget them explicitly)<\/em><\/p>\n<ul><li>What makes an event auditable in a secure deployment? *(self-describing schema +<\/li><\/ul>\n<p>attached evidence + status state machine)*<\/p>","toc":[{"level":2,"id":"why-the-alerting-layer-decides-success","text":"Why the alerting layer decides success"},{"level":2,"id":"the-core-techniques","text":"The core techniques"},{"level":2,"id":"setting-thresholds","text":"Setting thresholds"},{"level":2,"id":"the-eventalert-schema-design-it-deliberately","text":"The event/alert schema (design it deliberately)"},{"level":2,"id":"closing-the-loop-this-impresses","text":"Closing the loop (this impresses)"},{"level":2,"id":"quick-self-check","text":"Quick self-check"}],"text":"alerting, thresholds & false-alarm control 💡 tl;dr detecting an event once is easy. making operators trust the system is the real job — and it lives entirely in the alerting layer: confirmation, debouncing, hysteresis, deduplication, and a clean event schema . a system that cries wolf gets muted in a week. this is the most senior thing you can talk about in this whole section. why the alerting layer decides success anomalies/events are rare → the base rate is brutal. even a great detector at 99% specificity, watching thousands of frames × dozens of cameras, produces a flood of false positives. operators mute muted systems. so you engineer the alert, not just the detector: raw trigger (per frame) → temporal confirmation (k-of-n / dwell) # kill single-frame noise → hysteresis (enter high, clear low) # stop flicker at the boundary → debounce / cool-down per (camera,zone,type) # one alert, not 500 → dedupe across cameras (same world event) # overlap views = one incident → severity + evidence → route to operator the core techniques k-of-n confirmation — fire only if the condition holds in k of the last n frames. the single highest-leverage false-alarm reducer. dwell / persistence — require a duration (loiter > 30 s, object static > 60 s). hysteresis (two thresholds) — enter the alarm state at a high threshold, clear it at a lower one. prevents rapid on/off chatter when a metric hovers on the line (e.g. occupancy oscillating around the cap). debounce / cool-down — after firing for a (camera, zone, type), suppress repeats for a window; send one \"ongoing\" update, not a per-frame storm. deduplication — the same real-world event seen by two overlapping cameras is one incident (dedupe on shared ground-plane position + time; see §11 calibration). spatial/temporal filtering — ignore known-noisy regions (a swaying tree, a reflective floor, a monitor showing video), and known busy periods. setting thresholds derive from data, not vibes — collect the metric's normal distribution and set thresholds at a chosen percentile / cost trade-off, then validate. precision–recall trade-off is a business decision — a security intrusion wants high recall (miss nothing, tolerate false alarms); a retail marketing count wants high precision. ask which the client wants; don't assume. roc/pr + operating point — pick the threshold on the pr curve that hits the agreed false-alarm budget (e.g. \"< 2 false alerts per camera per day\"). per-site tuning — expose thresholds as config an integrator sets on-site; scenes differ too much for one global value. the event/alert schema (design it deliberately) a clean, self-describing event object is what makes the system auditable — critical in a secure government deployment: { \"event_id\": \"uuid\", \"type\": \"loitering\", \"severity\": \"medium\", \"camera_id\": \"cam-07\", \"zone_id\": \"restricted-b\", \"start_ts\": \"2026-07-06t09:14:03z\", \"end_ts\": null, // open until cleared → ongoing \"track_ids\": [42], \"confidence\": 0.87, \"evidence\": { \"clip\": \"…\", \"keyframe\": \"…\", \"trajectory\": [] }, \"status\": \"active\" // active → acknowledged → resolved } include evidence (keyframe/clip/track) so a human can adjudicate fast and the record is auditable later. state machine — active → acknowledged → resolved; supports slas and stops duplicate paging. idempotency — dedupe by (type, camera, zone, time-bucket) so retries/overlap don't double-alert. closing the loop (this impresses) operator feedback — a \"false alarm\" button feeds a dataset to retune thresholds and hard-mine false positives into the next model (active learning, §14). continuous false-alarm-rate monitoring — track alerts/camera/day; a rising trend is an early warning of drift or a bumped camera (→ §13 monitoring). quick self-check why hysteresis instead of one threshold? *(stops on/off chatter when the metric hovers at the boundary)* two overlapping cameras both fire on one intrusion — how many incidents, and how do you enforce it? (one; dedupe on shared world position + time) client says \"never miss an intruder.\" which way do you move the operating point, and what's the cost? (toward recall; more false alarms — budget them explicitly) what makes an event auditable in a secure deployment? *(self-describing schema + attached evidence + status state machine)*","words":666},{"path":"13-secure-onprem-monitoring/README.md","title":"Overview","section":"13 · Secure On-Prem & Monitoring","quiz":false,"accent":"#5b6ee1","html":"<h1 id=\"13-secure-on-prem-deployment-monitoring\">13 — Secure On-Prem Deployment &amp; Monitoring<\/h1>\n<div class=\"callout tldr\"><div class=\"cic\">💡<\/div><div class=\"cbody\"><span class=\"clead\">TL;DR<\/span> The JD says <em>\"deployment in secure on-prem environments\"<\/em> and <em>\"model optimization and performance monitoring.\"<\/em> For an Abu Dhabi government/enterprise CCTV system this is not a footnote — it's often the deciding constraint. <strong>No cloud. Data never leaves the premises. Everything auditable.<\/strong> This section covers the air-gapped architecture, the security/PII hardening, and the monitoring that keeps a fleet of models healthy without a phone-home.<\/div><\/div>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"onprem-architecture.md\" href=\"#\">onprem-architecture.md<\/a> — air-gapped topology, data residency, offline model updates<\/li><li><a class=\"mdlink\" data-href=\"security-and-privacy.md\" href=\"#\">security-and-privacy.md<\/a> — encryption, access control, PII/face privacy, audit<\/li><li><a class=\"mdlink\" data-href=\"performance-monitoring.md\" href=\"#\">performance-monitoring.md<\/a> — model drift, per-camera health, GPU/latency dashboards<\/li><\/ol>\n<h2 id=\"the-mental-model\">The mental model<\/h2>\n<pre><code>        ┌───────────────  ON-PREM / AIR-GAPPED  ───────────────┐\n cameras│  edge boxes (Jetson)      on-prem GPU server(s)       │ operators\n   ────►│  decode + detect + track ─► analytics + events ─► DB  │─► local dashboard\n        │  (private VLAN, no WAN)     (no internet egress)      │\n        └──────────────────────────────────────────────────────┘\n   model updates arrive by a *controlled offline channel*, not a cloud pull<\/code><\/pre>\n<p>Contrast with your resume's cloud work (GKE, Azure DevOps, GCP): same skills, inverted constraint. In the interview, explicitly bridge it: <em>\"I've shipped Dockerized inference on GKE; on-prem it's the same containers and the same TensorRT engines, but the registry, model updates, and monitoring all live inside the perimeter with no internet egress.\"<\/em><\/p>\n<h2 id=\"the-framing-line-memorize\">The framing line (memorize)<\/h2>\n<p><em>\"Secure on-prem means the data plane never leaves the site: no cloud inference, no telemetry egress, encryption at rest and in transit, least-privilege access, and an audit trail. Models are optimized to run on the edge/on-prem GPUs we actually have, and monitored locally for drift and health because I can't watch them from a cloud dashboard.\"<\/em><\

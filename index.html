<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#d97757">
<title>KoiReader Interview Prep</title>
<style>
  :root{
    --bg:#faf9f5; --bg-soft:#f1efe7; --bg-side:#f6f4ee; --text:#23211c;
    --muted:#6b6557; --border:#e4e0d5; --accent:#c45f3c; --accent-2:#d97757;
    --accent-soft:#f6e7df; --code-bg:#f1efe7; --code-text:#5a4636; --quote:#5c5547;
    --link:#b9532f; --header-bg:rgba(250,249,245,.85);
    --shadow:0 1px 2px rgba(60,50,30,.05),0 6px 20px rgba(60,50,30,.06);
    --radius:12px;
  }
  html[data-theme="dark"]{
    --bg:#1f1e1b; --bg-soft:#2a2824; --bg-side:#1a1916; --text:#ece8df;
    --muted:#a39c8c; --border:#34322c; --accent:#e08763; --accent-2:#d97757;
    --accent-soft:#3a2b22; --code-bg:#2a2824; --code-text:#d8cfbf; --quote:#b3aa98;
    --link:#ec9170; --header-bg:rgba(31,30,27,.85);
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 26px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;overflow-x:hidden;scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--text);
    font:16px/1.7 ui-serif,Georgia,"Iowan Old Style","Palatino Linotype",serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .brand,.tools,nav,.topbar,.pager .lbl,.sec-h,.banner,.pagetools,.toc,.searchpanel{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--link); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:300px minmax(0,1fr); min-height:100vh}

  /* sidebar */
  .sidebar{background:var(--bg-side); border-right:1px solid var(--border);
    position:sticky; top:0; height:100vh; overflow-y:auto; padding-bottom:env(safe-area-inset-bottom)}
  .brand{padding:20px 20px 14px; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg-side); z-index:2}
  .brand h1{font-size:15px; margin:0 0 3px; letter-spacing:.2px; font-weight:700}
  .brand .sub{font-size:12px; color:var(--muted)}
  .tools{display:flex; gap:8px; margin-top:14px}
  .tools input{flex:1; min-width:0; background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; padding:9px 12px; font-size:14px; outline:none}
  .tools input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .iconbtn{background:var(--bg); border:1px solid var(--border); color:var(--text);
    border-radius:10px; min-width:40px; height:40px; cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; flex:none}
  .iconbtn:hover{border-color:var(--accent); color:var(--accent)}
  nav{padding:10px 10px calc(60px + env(safe-area-inset-bottom))}
  .sec{margin:2px 0}
  .sec>.sec-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted);
    padding:14px 12px 5px; font-weight:700}
  nav a.item{display:block; padding:8px 12px; border-radius:9px; color:var(--text);
    font-size:13.5px; margin:1px 0; line-height:1.35}
  nav a.item:hover{background:var(--bg-soft); text-decoration:none}
  nav a.item.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  nav a.item.sub{padding-left:16px}
  .hidden{display:none !important}

  /* main */
  .main{min-width:0}
  .topbar{display:none; align-items:center; gap:10px;
    padding:10px max(14px,env(safe-area-inset-left)) 10px max(14px,env(safe-area-inset-right));
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10;
    background:var(--header-bg); backdrop-filter:saturate(140%) blur(10px); -webkit-backdrop-filter:saturate(140%) blur(10px)}
  .topbar .tb-title{flex:1; min-width:0; font-weight:700; font-size:15px; text-align:center;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .content-wrap{max-width:760px; margin:0 auto;
    padding:40px max(32px,env(safe-area-inset-left)) 90px max(32px,env(safe-area-inset-right))}

  /* page tools (outline + quiz) */
  .pagetools{margin:0 0 8px}
  .toc{border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-soft); margin:0 0 22px}
  .toc>summary{cursor:pointer; padding:11px 15px; font-size:13px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; list-style:none}
  .toc>summary::-webkit-details-marker{display:none}
  .toc>summary::after{content:"▾"; float:right; color:var(--accent)}
  .toc[open]>summary::after{content:"▴"}
  .toc ul{list-style:none; margin:0 0 8px; padding:0 8px 4px}
  .toc li{margin:0}
  .toc a{display:block; padding:5px 10px; border-radius:7px; font-size:13.5px; color:var(--text)}
  .toc a:hover{background:var(--bg); text-decoration:none}
  .toc a.lvl3{padding-left:24px; font-size:13px; color:var(--muted)}
  .quizbar{display:flex; gap:8px; align-items:center; margin:0 0 18px; flex-wrap:wrap}
  .quizbar .qbtn{background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);
    border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer}
  .quizbar .qbtn:hover{background:var(--accent); color:#fff}
  .quizbar .hint{font-size:12.5px; color:var(--muted)}

  article{font-size:clamp(15.5px,1.4vw,17px)}
  article h1{font-size:clamp(26px,5vw,32px); line-height:1.2; margin:.1em 0 .5em; letter-spacing:-.5px; font-weight:700}
  article h2{font-size:clamp(20px,3.4vw,23px); margin:1.7em 0 .5em; padding-bottom:.28em; border-bottom:1px solid var(--border); font-weight:700}
  article h3{font-size:clamp(16.5px,2.4vw,18px); margin:1.5em 0 .4em; font-weight:700}
  article p{margin:.75em 0}
  article ul,article ol{margin:.6em 0; padding-left:1.45em}
  article li{margin:.3em 0}
  article li>ul,article li>ol{margin:.2em 0}
  article strong{font-weight:700}
  article code{background:var(--code-bg); color:var(--code-text); padding:.13em .42em;
    border-radius:6px; font:.85em/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; word-break:break-word}
  article pre{background:var(--code-bg); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.1em 0}
  article pre code{background:none; padding:0; font-size:13px; color:var(--code-text); white-space:pre; word-break:normal}
  article blockquote{margin:1.1em 0; padding:.5em 1.1em; border-left:3px solid var(--accent);
    background:var(--bg-soft); color:var(--quote); border-radius:0 10px 10px 0}
  article blockquote p{margin:.3em 0}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1.2em 0; border-radius:var(--radius)}
  article table{border-collapse:collapse; width:100%; font-size:14px}
  article th,article td{border:1px solid var(--border); padding:9px 12px; text-align:left; vertical-align:top}
  article th{background:var(--bg-soft); font-weight:700; white-space:nowrap}
  article tr:nth-child(even) td{background:var(--bg-soft)}
  article hr{border:none; border-top:1px solid var(--border); margin:2em 0}
  article h1,article h2,article h3{scroll-margin-top:76px}

  /* Q&A collapsibles */
  details.qa{border:1px solid var(--border); border-radius:var(--radius); margin:.7em 0; background:var(--bg); box-shadow:var(--shadow)}
  details.qa>summary{cursor:pointer; padding:13px 16px; font-weight:700; list-style:none; color:var(--text)}
  details.qa>summary::-webkit-details-marker{display:none}
  details.qa>summary::before{content:"▸"; color:var(--accent); margin-right:9px; display:inline-block}
  details.qa[open]>summary::before{content:"▾"}
  details.qa .qa-body{padding:0 16px 4px; border-top:1px solid var(--border); margin-top:2px}
  details.qa .qa-body>*:first-child{margin-top:12px}

  .pager{display:flex; gap:14px; margin:52px 0 0; padding-top:24px; border-top:1px solid var(--border)}
  .pager a{flex:1; min-width:0; border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px;
    display:block; box-shadow:var(--shadow); background:var(--bg)}
  .pager a:hover{border-color:var(--accent); text-decoration:none}
  .pager .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px}
  .pager .ttl{font-size:14px; font-weight:600; margin-top:4px; color:var(--text)}
  .pager .next{text-align:right}
  .pager .spacer{flex:1}

  .loading{color:var(--muted); padding:40px 0}
  .scrim{display:none}

  /* search overlay */
  .searchpanel{display:none; position:fixed; z-index:70; left:50%; top:70px; transform:translateX(-50%);
    width:min(640px,92vw); max-height:70vh; overflow-y:auto; background:var(--bg); border:1px solid var(--border);
    border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.25); padding:8px}
  .searchpanel.show{display:block}
  .searchpanel .sr{display:block; padding:11px 14px; border-radius:10px; color:var(--text)}
  .searchpanel .sr:hover,.searchpanel .sr.sel{background:var(--accent-soft); text-decoration:none}
  .searchpanel .sr .t{font-weight:600; font-size:14px}
  .searchpanel .sr .c{font-size:12.5px; color:var(--muted); margin-top:2px; font-family:inherit}
  .searchpanel .sr .c mark{background:var(--accent-soft); color:var(--accent); padding:0 2px; border-radius:3px}
  .searchpanel .empty{padding:18px 14px; color:var(--muted); font-size:14px}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:min(86vw,330px); top:0; bottom:0; height:auto;
      transform:translateX(-100%); transition:transform .24s cubic-bezier(.4,0,.2,1); box-shadow:var(--shadow)}
    .sidebar.open{transform:none}
    .topbar{display:flex}
    .scrim.show{display:block; position:fixed; inset:0; background:rgba(20,16,10,.45); z-index:50}
    .content-wrap{padding:20px 18px calc(80px + env(safe-area-inset-bottom))}
    .pager{flex-direction:column}
    .pager .next{text-align:left}
    .pager .spacer{display:none}
    nav a.item{padding:11px 14px; font-size:15px}
    nav a.item.sub{padding-left:18px}
    .searchpanel{top:60px}
  }
  @media (max-width:380px){ .topbar .tb-title{font-size:14px} }

</style>
</head>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1>KoiReader Interview Prep</h1>
      <div class="sub">Systems-First Computer Vision Engineer</div>
      <div class="tools">
        <input id="search" type="search" placeholder="Search all pages…" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="iconbtn theme-toggle" title="Toggle light / dark">◐</button>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <button class="iconbtn" id="menu" aria-label="Open menu">☰</button>
      <span class="tb-title" id="tbTitle">KoiReader Prep</span>
      <button class="iconbtn" id="searchBtn" aria-label="Search">🔍</button>
      <button class="iconbtn theme-toggle" aria-label="Toggle theme">◐</button>

    <div class="content-wrap">
      <div id="pagetools"></div>
      <article id="content"></article>
      <div class="pager" id="pager"></div>

</div>

const DATA={"nav":[{"label":"Start here","items":[{"path":"README.md","title":"Overview & Gap Analysis"},{"path":"RUN-ON-PI.md","title":"Run on a Raspberry Pi"}]},{"label":"1 · Video Streaming","items":[{"path":"01-video-streaming/README.md","title":"Overview"},{"path":"01-video-streaming/protocols-rtsp-webrtc.md","title":"RTSP vs WebRTC vs FastRTC"},{"path":"01-video-streaming/codecs-and-frames.md","title":"Codecs, GOP & I/P/B Frames"},{"path":"01-video-streaming/decode-encode-pipeline.md","title":"Decode / Encode Pipeline"},{"path":"01-video-streaming/frame-buffers-backpressure.md","title":"Frame Buffers & Backpressure"}]},{"label":"2 · GStreamer","items":[{"path":"02-gstreamer/README.md","title":"Overview"},{"path":"02-gstreamer/pipeline-model.md","title":"Pipeline Model"},{"path":"02-gstreamer/appsink-and-python.md","title":"appsink & Python"},{"path":"02-gstreamer/deepstream.md","title":"DeepStream"}]},{"label":"3 · Low-Latency Inference","items":[{"path":"03-low-latency-inference/README.md","title":"Overview"},{"path":"03-low-latency-inference/latency-budget.md","title":"The Latency Budget"},{"path":"03-low-latency-inference/tensorrt-and-quantization.md","title":"TensorRT & Quantization"},{"path":"03-low-latency-inference/triton.md","title":"Triton Inference Server"},{"path":"03-low-latency-inference/batching-and-throughput.md","title":"Batching & Throughput"}]},{"label":"4 · Fault Tolerance","items":[{"path":"04-fault-tolerance/README.md","title":"Overview"},{"path":"04-fault-tolerance/failure-modes.md","title":"Failure Modes"},{"path":"04-fault-tolerance/recovery-patterns.md","title":"Recovery Patterns"}]},{"label":"5 · Production Python","items":[{"path":"05-production-python/README.md","title":"Overview"},{"path":"05-production-python/gil-threads-async-processes.md","title":"GIL, Threads, Async, Processes"},{"path":"05-production-python/memory-and-resources.md","title":"Memory & Resources"}]},{"label":"6 · System Design","items":[{"path":"06-system-design/README.md","title":"Overview"},{"path":"06-system-design/framework.md","title":"Design Framework"},{"path":"06-system-design/worked-example-multicam.md","title":"Worked Example: 50 Cameras"},{"path":"06-system-design/curveballs.md","title":"Curveballs"}]},{"label":"7 · Q&A Drill Bank","items":[{"path":"07-qa-drill-bank/README.md","title":"Overview"},{"path":"07-qa-drill-bank/drill-bank.md","title":"Drill Bank"},{"path":"07-qa-drill-bank/cheat-sheet.md","title":"Cheat Sheet (Morning Of)"}]},{"label":"8 · Mock Interview","items":[{"path":"08-mock-interview/README.md","title":"Overview"},{"path":"08-mock-interview/questions.md","title":"Questions"},{"path":"08-mock-interview/model-answers.md","title":"Model Answers"},{"path":"08-mock-interview/rubric.md","title":"Self-Grading Rubric"}]},{"label":"9 · CV Fundamentals","items":[{"path":"09-computer-vision-fundamentals/README.md","title":"Overview"},{"path":"09-computer-vision-fundamentals/image-basics-color-spaces.md","title":"Image Basics & Color Spaces"},{"path":"09-computer-vision-fundamentals/filtering-morphology-edges.md","title":"Filtering, Morphology & Edges"},{"path":"09-computer-vision-fundamentals/geometry-and-transforms.md","title":"Geometry & Transforms"},{"path":"09-computer-vision-fundamentals/camera-calibration.md","title":"Camera Calibration"},{"path":"09-computer-vision-fundamentals/features-and-matching.md","title":"Features & Matching"},{"path":"09-computer-vision-fundamentals/detection-tracking-math.md","title":"Detection & Tracking Math"},{"path":"09-computer-vision-fundamentals/logic-on-detections.md","title":"Logic on Detections"},{"path":"09-computer-vision-fundamentals/cv-cheat-sheet.md","title":"CV Cheat Sheet"}]}],"pages":[{"path":"README.md","title":"Overview & Gap Analysis","section":"Start here","quiz":false,"html":"<h1 id=\"koireader-interview-prep-learning-path\">KoiReader Interview Prep — Learning Path<\/h1>\n<p>Everything you need for the <strong>KoiReader Computer Vision Engineer<\/strong> interview, in the order to study it. Read <strong>top to bottom the first time<\/strong>. Come back to any file as a reference (or the morning of) anytime.<\/p>\n<p>The role in one line: <strong>systems-first CV<\/strong> — not training models, but building the <em>high-performance highways<\/em> that run Vision AI on live video, 24/7, without crashing.<\/p>\n<pre><code>RTSP cameras → ingest/decode → frame buffer → inference (TRT/DeepStream) → logic → output\n     ↑              ↑              ↑                  ↑                       ↑\n  reconnect      GStreamer     backpressure      batching/zero-copy      analytics/DB\n  (fault tol.)   /FFmpeg       (drop frames)     (low latency)<\/code><\/pre>\n<h2 id=\"what-this-role-actually-wants-and-how-you-stack-up\">What this role actually wants (and how you stack up)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>JD core requirement<\/th><th>Your resume evidence<\/th><th>Gap to close<\/th><\/tr><\/thead><tbody><tr><td>RTSP/WebRTC/FastRTC streaming, frame buffers, decode/encode<\/td><td>DeepStream + GStreamer + Jetson video analytics (Integration Wizards)<\/td><td><strong>Medium<\/strong> — you've done GStreamer/DeepStream but resume is light on raw RTSP/WebRTC protocol detail. Study <code>01<\/code> + <code>02<\/code>.<\/td><\/tr><tr><td>Ultra-low-latency inference (Jetson + cloud)<\/td><td>TensorRT/ONNX, INT8/FP16, layer fusion, pruning, Jetson Nano<\/td><td><strong>Strong<\/strong> — this is your home turf. Just frame it crisply (<code>03<\/code>).<\/td><\/tr><tr><td>Fault-tolerant, crash-proof systems<\/td><td>\"go-to engineer for hard ambiguous problems\"; seismic platform reliability<\/td><td><strong>Medium<\/strong> — you have the instinct, need the streaming-specific patterns (<code>04<\/code>).<\/td><\/tr><tr><td>Production Python: multi-threaded/async, long-running resource mgmt<\/td><td>Gunicorn/Celery/Kafka edge serving; petabyte Dask pipelines<\/td><td><strong>Medium<\/strong> — know GIL/threads-vs-async cold for video (<code>05<\/code>).<\/td><\/tr><tr><td>OpenCV + image-processing fundamentals, geometry<\/td><td>Surround-view C++/OpenCV, calibration, RANSAC, photometric alignment<\/td><td><strong>Strong<\/strong> — emphasize the C++/OpenCV surround-view work.<\/td><\/tr><tr><td>Docker mandatory<\/td><td>Dockerized inference servers on GCP<\/td><td><strong>Strong<\/strong>.<\/td><\/tr><tr><td>Brownie: TensorRT/DeepStream/Triton, K8s, CI/CD, SQL/NoSQL<\/td><td>All present (TensorRT, DeepStream, GKE, Azure DevOps)<\/td><td><strong>Strong<\/strong> — you check every bonus box.<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Headline:<\/strong> You're a strong fit. Your risk isn't capability — it's that your recent 4 years read as <em>data-platform/seismic<\/em>, and the interviewer wants to hear the <em>live-video-systems<\/em> engineer. This pack rebuilds that narrative and drills the streaming-specific depth.<\/p>\n<h2 id=\"topics-in-order\">Topics (in order)<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>#<\/th><th>Folder<\/th><th>What you learn<\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td><a class=\"mdlink\" data-href=\"01-video-streaming/\" href=\"#\">01-video-streaming/<\/a><\/td><td>RTSP, WebRTC/FastRTC, FFmpeg, codecs, frame buffers, decode/encode<\/td><\/tr><tr><td>2<\/td><td><a class=\"mdlink\" data-href=\"02-gstreamer/\" href=\"#\">02-gstreamer/<\/a><\/td><td>Pipelines, elements, appsink, hardware decode, DeepStream<\/td><\/tr><tr><td>3<\/td><td><a class=\"mdlink\" data-href=\"03-low-latency-inference/\" href=\"#\">03-low-latency-inference/<\/a><\/td><td>TensorRT, DeepStream, Triton, batching, zero-copy, the latency budget<\/td><\/tr><tr><td>4<\/td><td><a class=\"mdlink\" data-href=\"04-fault-tolerance/\" href=\"#\">04-fault-tolerance/<\/a><\/td><td>Crash-proof design: reconnect, watchdogs, backpressure, graceful degradation<\/td><\/tr><tr><td>5<\/td><td><a class=\"mdlink\" data-href=\"05-production-python/\" href=\"#\">05-production-python/<\/a><\/td><td>Threads vs async vs processes, the GIL, queues, memory leaks<\/td><\/tr><tr><td>6<\/td><td><a class=\"mdlink\" data-href=\"06-system-design/\" href=\"#\">06-system-design/<\/a><\/td><td>The big whiteboard question: design a crash-proof multi-camera pipeline<\/td><\/tr><tr><td>7<\/td><td><a class=\"mdlink\" data-href=\"07-qa-drill-bank/\" href=\"#\">07-qa-drill-bank/<\/a><\/td><td>Every \"why X over Y\" + the one-page cheat sheet<\/td><\/tr><tr><td>8<\/td><td><a class=\"mdlink\" data-href=\"08-mock-interview/\" href=\"#\">08-mock-interview/<\/a><\/td><td>Staged mock questions, model answers, scoring rubric<\/td><\/tr><tr><td>9<\/td><td><a class=\"mdlink\" data-href=\"09-computer-vision-fundamentals/\" href=\"#\">09-computer-vision-fundamentals/<\/a><\/td><td>Classical CV refresher: color spaces, geometry, calibration, features, detection/tracking math, logic-on-detections<\/td><\/tr><\/tbody><\/table><\/div>\n<blockquote><p><strong>Section 9 is a refresher<\/strong> for the CV fundamentals the JD assumes (OpenCV, geometry, color spaces, statistics over detections). If the classical CV is rusty, read it early — alongside or right after section 01.<\/p><\/blockquote>\n<h2 id=\"how-to-use-this\">How to use this<\/h2>\n<ul><li><strong>First time:<\/strong> follow the numbers, 1 → 6, plus 9 if classical CV is rusty.<\/li><li><strong>Day before:<\/strong> read <code>06-system-design<\/code>, <code>07-qa-drill-bank<\/code>, and skim <code>09<\/code>.<\/li><li><strong>Morning of:<\/strong> read <code>07-qa-drill-bank/cheat-sheet.md<\/code> + <code>09/cv-cheat-sheet.md<\/code>.<\/li><li><strong>Want to rehearse out loud:<\/strong> open <code>08-mock-interview/<\/code> — or ask me to run it<\/li><\/ul>\n<p>live in chat and I'll grade your answers.<\/p>\n<p>→ Start here: <strong><a class=\"mdlink\" data-href=\"01-video-streaming/README.md\" href=\"#\">01-video-streaming/README.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"what-this-role-actually-wants-and-how-you-stack-up","text":"What this role actually wants (and how you stack up)"},{"level":2,"id":"topics-in-order","text":"Topics (in order)"},{"level":2,"id":"how-to-use-this","text":"How to use this"}],"text":"koireader interview prep — learning path everything you need for the koireader computer vision engineer interview, in the order to study it. read top to bottom the first time . come back to any file as a reference (or the morning of) anytime. the role in one line: systems-first cv — not training models, but building the high-performance highways that run vision ai on live video, 24/7, without crashing. rtsp cameras → ingest/decode → frame buffer → inference (trt/deepstream) → logic → output ↑ ↑ ↑ ↑ ↑ reconnect gstreamer backpressure batching/zero-copy analytics/db (fault tol.) /ffmpeg (drop frames) (low latency) what this role actually wants (and how you stack up) jd core requirement your resume evidence gap to close rtsp/webrtc/fastrtc streaming, frame buffers, decode/encode deepstream + gstreamer + jetson video analytics (integration wizards) medium — you've done gstreamer/deepstream but resume is light on raw rtsp/webrtc protocol detail. study 01 + 02 . ultra-low-latency inference (jetson + cloud) tensorrt/onnx, int8/fp16, layer fusion, pruning, jetson nano strong — this is your home turf. just frame it crisply ( 03 ). fault-tolerant, crash-proof systems \"go-to engineer for hard ambiguous problems\"; seismic platform reliability medium — you have the instinct, need the streaming-specific patterns ( 04 ). production python: multi-threaded/async, long-running resource mgmt gunicorn/celery/kafka edge serving; petabyte dask pipelines medium — know gil/threads-vs-async cold for video ( 05 ). opencv + image-processing fundamentals, geometry surround-view c++/opencv, calibration, ransac, photometric alignment strong — emphasize the c++/opencv surround-view work. docker mandatory dockerized inference servers on gcp strong . brownie: tensorrt/deepstream/triton, k8s, ci/cd, sql/nosql all present (tensorrt, deepstream, gke, azure devops) strong — you check every bonus box. headline: you're a strong fit. your risk isn't capability — it's that your recent 4 years read as data-platform/seismic , and the interviewer wants to hear the live-video-systems engineer. this pack rebuilds that narrative and drills the streaming-specific depth. topics (in order) # folder what you learn 1 01-video-streaming/ rtsp, webrtc/fastrtc, ffmpeg, codecs, frame buffers, decode/encode 2 02-gstreamer/ pipelines, elements, appsink, hardware decode, deepstream 3 03-low-latency-inference/ tensorrt, deepstream, triton, batching, zero-copy, the latency budget 4 04-fault-tolerance/ crash-proof design: reconnect, watchdogs, backpressure, graceful degradation 5 05-production-python/ threads vs async vs processes, the gil, queues, memory leaks 6 06-system-design/ the big whiteboard question: design a crash-proof multi-camera pipeline 7 07-qa-drill-bank/ every \"why x over y\" + the one-page cheat sheet 8 08-mock-interview/ staged mock questions, model answers, scoring rubric 9 09-computer-vision-fundamentals/ classical cv refresher: color spaces, geometry, calibration, features, detection/tracking math, logic-on-detections section 9 is a refresher for the cv fundamentals the jd assumes (opencv, geometry, color spaces, statistics over detections). if the classical cv is rusty, read it early — alongside or right after section 01. how to use this first time: follow the numbers, 1 → 6, plus 9 if classical cv is rusty. day before: read 06-system-design , 07-qa-drill-bank , and skim 09 . morning of: read 07-qa-drill-bank/cheat-sheet.md + 09/cv-cheat-sheet.md . want to rehearse out loud: open 08-mock-interview/ — or ask me to run it live in chat and i'll grade your answers. → start here: 01-video-streaming/readme.md","words":509},{"path":"RUN-ON-PI.md","title":"Run on a Raspberry Pi","section":"Start here","quiz":false,"html":"<h1 id=\"run-on-a-raspberry-pi-or-any-edge-device\">Run on a Raspberry Pi (or any edge device)<\/h1>\n<p><strong>TL;DR:<\/strong> This site is just static files — one <code>index.html<\/code> plus the markdown. No build, no database, no internet. Serve the folder with any tiny web server and open it in a browser. Below: the 30-second way, plus an auto-start service so it's always on.<\/p>\n<h2 id=\"why-it-needs-a-server-not-just-double-click\">Why it needs a server (not just double-click)<\/h2>\n<p>The page <em>reads<\/em> the <code>.md<\/code> files at runtime with <code>fetch()<\/code>. Browsers block reading local files over <code>file://<\/code> for security, so opening <code>index.html<\/code> directly shows a \"needs a web server\" notice. Any HTTP server fixes it — that's all a Pi needs.<\/p>\n<h2 id=\"deployed-instance\">Deployed instance<\/h2>\n<p>Running on <strong>http://192.168.3.20:9000<\/strong> — served by the <code>koi-prep<\/code> systemd service (auto-starts on boot). User: <code>ajmalrasi<\/code>, path: <code>/home/ajmalrasi/koireader-interview-prep<\/code>.<\/p>\n<p>Source: https://github.com/ajmalrasi/koireader-interview-prep<\/p>\n<hr>\n<h2 id=\"option-1-python-already-on-every-pi-30-seconds\">Option 1 — Python (already on every Pi), 30 seconds<\/h2>\n<pre><code class=\"language-bash\">cd /path/to/koireader-interview-prep\npython3 -m http.server 9000<\/code><\/pre>\n<p>Then open <strong>http://localhost:9000<\/strong> on the Pi, or <strong>http://&lt;pi-ip&gt;:9000<\/strong> from your laptop/phone on the same network (find the IP with <code>hostname -I<\/code>).<\/p>\n<h2 id=\"option-2-always-on-with-systemd-survives-reboot\">Option 2 — Always-on with systemd (survives reboot)<\/h2>\n<p>Create the service:<\/p>\n<pre><code class=\"language-bash\">sudo tee /etc/systemd/system/koi-prep.service &gt;/dev/null &lt;&lt;'EOF'\n[Unit]\nDescription=KoiReader Interview Prep site\nAfter=network.target\n\n[Service]\nWorkingDirectory=/home/ajmalrasi/koireader-interview-prep\nExecStart=/usr/bin/python3 -m http.server 9000\nRestart=always\nUser=ajmalrasi\n\n[Install]\nWantedBy=multi-user.target\nEOF\n\nsudo systemctl daemon-reload\nsudo systemctl enable --now koi-prep<\/code><\/pre>\n<p>Now it starts on boot and restarts if it crashes. Check it: <code>systemctl status koi-prep<\/code>. Logs: <code>journalctl -u koi-prep -f<\/code>.<\/p>\n<blockquote><p>Adjust <code>WorkingDirectory<\/code> and <code>User<\/code> to where you copied the folder.<\/p><\/blockquote>\n<h2 id=\"option-3-nginx-if-you-already-run-it\">Option 3 — nginx (if you already run it)<\/h2>\n<pre><code class=\"language-nginx\">server {\n    listen 80;\n    root /home/pi/koireader-interview-prep;\n    index index.html;\n    location / { try_files $uri $uri/ =404; }\n}<\/code><\/pre>\n<p>Drop that in <code>/etc/nginx/sites-available/koi-prep<\/code>, symlink to <code>sites-enabled<\/code>, <code>sudo nginx -t &amp;&amp; sudo systemctl reload nginx<\/code>. Then browse to the Pi's IP on port 80.<\/p>\n<h2 id=\"copying-the-folder-to-the-pi\">Copying the folder to the Pi<\/h2>\n<p>From your computer:<\/p>\n<pre><code class=\"language-bash\">scp -r koireader-interview-prep pi@&lt;pi-ip&gt;:/home/pi/<\/code><\/pre>\n<p>Or clone from GitHub:<\/p>\n<pre><code class=\"language-bash\">git clone git@github.com:ajmalrasi/koireader-interview-prep.git<\/code><\/pre>\n<p>Or put it on a USB stick — the whole site is plain text, a few hundred KB.<\/p>\n<h2 id=\"notes\">Notes<\/h2>\n<ul><li><strong>Single self-contained file:<\/strong> all content is baked into <code>index.html<\/code>. It works<\/li><\/ul>\n<p>even by double-clicking the file (<code>file://<\/code>) — no server strictly required. The   server is only for sharing it on the network (e.g. to your phone).<\/p>\n<ul><li><strong>Fully offline:<\/strong> no CDN, no external fonts or scripts. Works on an air-gapped<\/li><\/ul>\n<p>device.<\/p>\n<ul><li><strong>Resource use:<\/strong> <code>python3 -m http.server<\/code> idles at near-zero CPU/RAM — fine on a<\/li><\/ul>\n<p>Pi Zero.<\/p>\n<ul><li><strong>Editing content:<\/strong> edit the <code>.md<\/code> files, then rebuild with <strong><code>node build.js<\/code><\/strong><\/li><\/ul>\n<p>to regenerate <code>index.html<\/code> (the <code>.md<\/code> files are the source of truth; <code>_site.css<\/code>,   <code>_app.js<\/code>, and <code>build.js<\/code> are the build inputs). If you don't have Node, you can   edit <code>index.html<\/code> directly instead.<\/p>\n<ul><li><strong>Quiz mode:<\/strong> on the <em>Drill Bank<\/em> page, hit \"Quiz me · hide answers\" to collapse<\/li><\/ul>\n<p>every answer, then tap a question to reveal it.<\/p>\n<ul><li><strong>Outline:<\/strong> long pages show an \"On this page\" jump list.<\/li><li><strong>Dark/light:<\/strong> toggle with the ◐ button; preference is remembered.<\/li><li><strong>Search:<\/strong> type in the box for instant full-text search across all pages<\/li><\/ul>\n<p>(↑/↓ to move, Enter to open).<\/p>\n<p>→ Back to the <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">Overview<\/a>.<\/p>","toc":[{"level":2,"id":"why-it-needs-a-server-not-just-double-click","text":"Why it needs a server (not just double-click)"},{"level":2,"id":"deployed-instance","text":"Deployed instance"},{"level":2,"id":"option-1-python-already-on-every-pi-30-seconds","text":"Option 1 — Python (already on every Pi), 30 seconds"},{"level":2,"id":"option-2-always-on-with-systemd-survives-reboot","text":"Option 2 — Always-on with systemd (survives reboot)"},{"level":2,"id":"option-3-nginx-if-you-already-run-it","text":"Option 3 — nginx (if you already run it)"},{"level":2,"id":"copying-the-folder-to-the-pi","text":"Copying the folder to the Pi"},{"level":2,"id":"notes","text":"Notes"}],"text":"run on a raspberry pi (or any edge device) tl;dr: this site is just static files — one index.html plus the markdown. no build, no database, no internet. serve the folder with any tiny web server and open it in a browser. below: the 30-second way, plus an auto-start service so it's always on. why it needs a server (not just double-click) the page reads the .md files at runtime with fetch() . browsers block reading local files over file:// for security, so opening index.html directly shows a \"needs a web server\" notice. any http server fixes it — that's all a pi needs. deployed instance running on http://192.168.3.20:9000 — served by the koi-prep systemd service (auto-starts on boot). user: ajmalrasi , path: /home/ajmalrasi/koireader-interview-prep . source: https://github.com/ajmalrasi/koireader-interview-prep option 1 — python (already on every pi), 30 seconds cd /path/to/koireader-interview-prep python3 -m http.server 9000 then open http://localhost:9000 on the pi, or http://<pi-ip>:9000 from your laptop/phone on the same network (find the ip with hostname -i ). option 2 — always-on with systemd (survives reboot) create the service: sudo tee /etc/systemd/system/koi-prep.service >/dev/null <<'eof' [unit] description=koireader interview prep site after=network.target [service] workingdirectory=/home/ajmalrasi/koireader-interview-prep execstart=/usr/bin/python3 -m http.server 9000 restart=always user=ajmalrasi [install] wantedby=multi-user.target eof sudo systemctl daemon-reload sudo systemctl enable --now koi-prep now it starts on boot and restarts if it crashes. check it: systemctl status koi-prep . logs: journalctl -u koi-prep -f . adjust workingdirectory and user to where you copied the folder. option 3 — nginx (if you already run it) server { listen 80; root /home/pi/koireader-interview-prep; index index.html; location / { try_files $uri $uri/ =404; } } drop that in /etc/nginx/sites-available/koi-prep , symlink to sites-enabled , sudo nginx -t && sudo systemctl reload nginx . then browse to the pi's ip on port 80. copying the folder to the pi from your computer: scp -r koireader-interview-prep pi@<pi-ip>:/home/pi/ or clone from github: git clone git@github.com:ajmalrasi/koireader-interview-prep.git or put it on a usb stick — the whole site is plain text, a few hundred kb. notes single self-contained file: all content is baked into index.html . it works even by double-clicking the file ( file:// ) — no server strictly required. the server is only for sharing it on the network (e.g. to your phone). fully offline: no cdn, no external fonts or scripts. works on an air-gapped device. resource use: python3 -m http.server idles at near-zero cpu/ram — fine on a pi zero. editing content: edit the .md files, then rebuild with node build.js to regenerate index.html (the .md files are the source of truth; _site.css , _app.js , and build.js are the build inputs). if you don't have node, you can edit index.html directly instead. quiz mode: on the drill bank page, hit \"quiz me · hide answers\" to collapse every answer, then tap a question to reveal it. outline: long pages show an \"on this page\" jump list. dark/light: toggle with the ◐ button; preference is remembered. search: type in the box for instant full-text search across all pages (↑/↓ to move, enter to open). → back to the overview .","words":508},{"path":"01-video-streaming/README.md","title":"Overview","section":"1 · Video Streaming","quiz":false,"html":"<h1 id=\"01-video-streaming-fundamentals\">01 — Video Streaming Fundamentals<\/h1>\n<p>The JD's #1 requirement: <em>\"Deep expertise in video streaming protocols (RTSP, WebRTC, FastRTC) and processing tools (FFmpeg, GStreamer). You know how to handle frame buffers, decoding, and encoding efficiently.\"<\/em><\/p>\n<p>This is the section to nail. Files in order:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"protocols-rtsp-webrtc.md\" href=\"#\">protocols-rtsp-webrtc.md<\/a> — RTSP vs WebRTC vs FastRTC, when each<\/li><li><a class=\"mdlink\" data-href=\"codecs-and-frames.md\" href=\"#\">codecs-and-frames.md<\/a> — H.264/H.265, I/P/B frames, why a dropped keyframe hurts<\/li><li><a class=\"mdlink\" data-href=\"decode-encode-pipeline.md\" href=\"#\">decode-encode-pipeline.md<\/a> — the journey from packet to numpy array, hardware decode<\/li><li><a class=\"mdlink\" data-href=\"frame-buffers-backpressure.md\" href=\"#\">frame-buffers-backpressure.md<\/a> — buffers, latency vs smoothness, drop strategy<\/li><\/ol>\n<p><strong>TL;DR for the whole section:<\/strong> A camera sends <em>compressed packets<\/em> over a <em>transport protocol<\/em>. You must <em>decode<\/em> them into raw frames (ideally on the GPU), hand frames to inference <em>fast enough to keep up<\/em>, and <em>drop frames<\/em> rather than pile up memory when you can't. Everything here is about that loop running forever without leaking or lagging.<\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"protocols-rtsp-webrtc.md\" href=\"#\">protocols-rtsp-webrtc.md<\/a><\/strong><\/p>","toc":[],"text":"01 — video streaming fundamentals the jd's #1 requirement: \"deep expertise in video streaming protocols (rtsp, webrtc, fastrtc) and processing tools (ffmpeg, gstreamer). you know how to handle frame buffers, decoding, and encoding efficiently.\" this is the section to nail. files in order: protocols-rtsp-webrtc.md — rtsp vs webrtc vs fastrtc, when each codecs-and-frames.md — h.264/h.265, i/p/b frames, why a dropped keyframe hurts decode-encode-pipeline.md — the journey from packet to numpy array, hardware decode frame-buffers-backpressure.md — buffers, latency vs smoothness, drop strategy tl;dr for the whole section: a camera sends compressed packets over a transport protocol . you must decode them into raw frames (ideally on the gpu), hand frames to inference fast enough to keep up , and drop frames rather than pile up memory when you can't. everything here is about that loop running forever without leaking or lagging. → start: protocols-rtsp-webrtc.md","words":143},{"path":"01-video-streaming/protocols-rtsp-webrtc.md","title":"RTSP vs WebRTC vs FastRTC","section":"1 · Video Streaming","quiz":false,"html":"<h1 id=\"rtsp-vs-webrtc-vs-fastrtc\">RTSP vs WebRTC vs FastRTC<\/h1>\n<p><strong>TL;DR:<\/strong> RTSP is how IP cameras stream (pull, TCP/UDP, ~1–3s latency). WebRTC is how browsers stream peer-to-peer (push, sub-500ms, NAT-traversing). FastRTC is a thin Python wrapper that makes WebRTC easy to wire to ML code. KoiReader ingests cameras (RTSP) and may serve live results to browsers/agents (WebRTC/FastRTC).<\/p>\n<h2 id=\"the-mental-model\">The mental model<\/h2>\n<p>Think of it like plumbing. <strong>RTSP<\/strong> is the industrial pipe bolted to a factory camera — rugged, standard, slightly slow. <strong>WebRTC<\/strong> is the flexible hose that snakes through any firewall to reach a browser, designed for real-time calls. <strong>FastRTC<\/strong> is the quick-connect fitting so you don't hand-thread the hose.<\/p>\n<h2 id=\"rtsp-real-time-streaming-protocol\">RTSP (Real-Time Streaming Protocol)<\/h2>\n<ul><li><strong>What:<\/strong> A <em>control<\/em> protocol (\"VCR remote\" — PLAY, PAUSE, TEARDOWN). The<\/li><\/ul>\n<p>actual video rides on <strong>RTP<\/strong> (over UDP or TCP), control/stats on <strong>RTCP<\/strong>.<\/p>\n<ul><li><strong>Pattern:<\/strong> <em>Pull.<\/em> Your pipeline connects to <code>rtsp://user:pass@cam-ip:554/stream<\/code>.<\/li><li><strong>Transport choice:<\/strong><ul><li><strong>RTP/UDP<\/strong> — lowest latency, but packets can drop → tearing/artifacts.<\/li><li><strong>RTP/TCP (interleaved)<\/strong> — reliable, slightly higher latency, survives lossy<\/li><\/ul><\/li><\/ul>\n<p>networks. Most production multi-camera setups use TCP for stability.<\/p>\n<ul><li><strong>Latency:<\/strong> ~500ms–3s depending on buffering and GOP size.<\/li><li><strong>This is what 95% of CCTV/industrial cameras speak.<\/strong> KoiReader's \"multiple<\/li><\/ul>\n<p>RTSP streams\" requirement lives here.<\/p>\n<pre><code># What a GStreamer RTSP source looks like (more in section 02)\nrtspsrc location=rtsp://... protocols=tcp latency=200 ! rtph264depay ! ...<\/code><\/pre>\n<h2 id=\"webrtc\">WebRTC<\/h2>\n<ul><li><strong>What:<\/strong> A full real-time media stack built for <strong>browsers and peers<\/strong>. Bundles<\/li><\/ul>\n<p>ICE/STUN/TURN (NAT traversal), DTLS (encryption), SRTP (media), and congestion   control. No plugins, sub-second.<\/p>\n<ul><li><strong>Pattern:<\/strong> <em>Push / bidirectional.<\/em> Peers negotiate via an <strong>SDP offer/answer<\/strong><\/li><\/ul>\n<p>exchanged through a <strong>signaling server<\/strong> (you build/host signaling; WebRTC   doesn't define it).<\/p>\n<ul><li><strong>Latency:<\/strong> typically <strong>100–500ms<\/strong> — the lowest of the three.<\/li><li><strong>Why a vision team cares:<\/strong> serving a live annotated feed to a dashboard, a<\/li><\/ul>\n<p>human-in-the-loop reviewer, or a remote operator — all in-browser, no install.<\/p>\n<ul><li><strong>Cost:<\/strong> more moving parts (signaling, TURN relays when P2P fails).<\/li><\/ul>\n<h2 id=\"fastrtc\">FastRTC<\/h2>\n<ul><li><strong>What:<\/strong> A Python library (from the Gradio/HF ecosystem) that wraps WebRTC so<\/li><\/ul>\n<p>you can stream audio/video to/from Python ML code with a few lines — it handles   signaling, the peer connection, and gives you frames as numpy arrays.<\/p>\n<ul><li><strong>Why it's in the JD:<\/strong> it signals they want someone who can stand up a<\/li><\/ul>\n<p>real-time WebRTC ↔ model loop <em>quickly<\/em>, not hand-roll the WebRTC stack.<\/p>\n<ul><li><strong>Honest framing in the interview:<\/strong> \"I've built real-time inference serving<\/li><\/ul>\n<p>with Gunicorn/Celery/Kafka and DeepStream pipelines; FastRTC is the modern   Python-native path to the same goal — wiring a live WebRTC feed straight into a   model. I'd reach for it for browser-facing low-latency demos and operator UIs.\"<\/p>\n<h2 id=\"why-x-over-y-interview-gold\">Why X over Y (interview gold)<\/h2>\n<p><strong>RTSP vs WebRTC — when each?<\/strong> RTSP to <em>ingest from cameras<\/em> (that's what they emit). WebRTC to <em>deliver to browsers/peers<\/em> with the lowest latency. A real system uses <strong>both<\/strong>: RTSP in, WebRTC out.<\/p>\n<p><strong>Why not just HTTP (HLS/DASH) for delivery?<\/strong> HLS/DASH chunk video into segments → 6–30s latency. Great for Netflix-style scale and CDN caching, <strong>terrible for real-time<\/strong> (\"obsess over milliseconds\"). Rule of thumb: HLS = broadcast, WebRTC = interactive.<\/p>\n<p><strong>UDP vs TCP for RTSP?<\/strong> UDP = lowest latency, tolerates loss (you'd rather skip a frame than wait). TCP = reliable, survives bad networks, what you pick when stability &gt; a few ms. Many cameras over flaky factory WiFi → TCP.<\/p>\n<p><strong>Why does RTSP need a keepalive?<\/strong> RTSP sessions time out. You send periodic <code>GET_PARAMETER<\/code>/<code>OPTIONS<\/code> (or RTCP) to keep the session alive, else the camera tears down and you must reconnect — which ties directly into <a class=\"mdlink\" data-href=\"../04-fault-tolerance/README.md\" href=\"#\">fault tolerance<\/a>.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"codecs-and-frames.md\" href=\"#\">codecs-and-frames.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-mental-model","text":"The mental model"},{"level":2,"id":"rtsp-real-time-streaming-protocol","text":"RTSP (Real-Time Streaming Protocol)"},{"level":2,"id":"webrtc","text":"WebRTC"},{"level":2,"id":"fastrtc","text":"FastRTC"},{"level":2,"id":"why-x-over-y-interview-gold","text":"Why X over Y (interview gold)"}],"text":"rtsp vs webrtc vs fastrtc tl;dr: rtsp is how ip cameras stream (pull, tcp/udp, ~1–3s latency). webrtc is how browsers stream peer-to-peer (push, sub-500ms, nat-traversing). fastrtc is a thin python wrapper that makes webrtc easy to wire to ml code. koireader ingests cameras (rtsp) and may serve live results to browsers/agents (webrtc/fastrtc). the mental model think of it like plumbing. rtsp is the industrial pipe bolted to a factory camera — rugged, standard, slightly slow. webrtc is the flexible hose that snakes through any firewall to reach a browser, designed for real-time calls. fastrtc is the quick-connect fitting so you don't hand-thread the hose. rtsp (real-time streaming protocol) what: a control protocol (\"vcr remote\" — play, pause, teardown). the actual video rides on rtp (over udp or tcp), control/stats on rtcp . pattern: pull. your pipeline connects to rtsp://user:pass@cam-ip:554/stream . transport choice: rtp/udp — lowest latency, but packets can drop → tearing/artifacts. rtp/tcp (interleaved) — reliable, slightly higher latency, survives lossy networks. most production multi-camera setups use tcp for stability. latency: ~500ms–3s depending on buffering and gop size. this is what 95% of cctv/industrial cameras speak. koireader's \"multiple rtsp streams\" requirement lives here. # what a gstreamer rtsp source looks like (more in section 02) rtspsrc location=rtsp://... protocols=tcp latency=200 ! rtph264depay ! ... webrtc what: a full real-time media stack built for browsers and peers . bundles ice/stun/turn (nat traversal), dtls (encryption), srtp (media), and congestion control. no plugins, sub-second. pattern: push / bidirectional. peers negotiate via an sdp offer/answer exchanged through a signaling server (you build/host signaling; webrtc doesn't define it). latency: typically 100–500ms — the lowest of the three. why a vision team cares: serving a live annotated feed to a dashboard, a human-in-the-loop reviewer, or a remote operator — all in-browser, no install. cost: more moving parts (signaling, turn relays when p2p fails). fastrtc what: a python library (from the gradio/hf ecosystem) that wraps webrtc so you can stream audio/video to/from python ml code with a few lines — it handles signaling, the peer connection, and gives you frames as numpy arrays. why it's in the jd: it signals they want someone who can stand up a real-time webrtc ↔ model loop quickly , not hand-roll the webrtc stack. honest framing in the interview: \"i've built real-time inference serving with gunicorn/celery/kafka and deepstream pipelines; fastrtc is the modern python-native path to the same goal — wiring a live webrtc feed straight into a model. i'd reach for it for browser-facing low-latency demos and operator uis.\" why x over y (interview gold) rtsp vs webrtc — when each? rtsp to ingest from cameras (that's what they emit). webrtc to deliver to browsers/peers with the lowest latency. a real system uses both : rtsp in, webrtc out. why not just http (hls/dash) for delivery? hls/dash chunk video into segments → 6–30s latency. great for netflix-style scale and cdn caching, terrible for real-time (\"obsess over milliseconds\"). rule of thumb: hls = broadcast, webrtc = interactive. udp vs tcp for rtsp? udp = lowest latency, tolerates loss (you'd rather skip a frame than wait). tcp = reliable, survives bad networks, what you pick when stability > a few ms. many cameras over flaky factory wifi → tcp. why does rtsp need a keepalive? rtsp sessions time out. you send periodic get_parameter / options (or rtcp) to keep the session alive, else the camera tears down and you must reconnect — which ties directly into fault tolerance . → next: codecs-and-frames.md","words":579},{"path":"01-video-streaming/codecs-and-frames.md","title":"Codecs, GOP & I/P/B Frames","section":"1 · Video Streaming","quiz":false,"html":"<h1 id=\"codecs-gop-and-ipb-frames\">Codecs, GOP, and I/P/B Frames<\/h1>\n<p><strong>TL;DR:<\/strong> Video isn't a stream of pictures — it's mostly <em>diffs<\/em>. A keyframe (I) is a full image; P/B frames only store what changed. This is why you can't just \"grab any frame,\" why a lost keyframe wrecks seconds of video, and why GOP size trades latency against bandwidth.<\/p>\n<h2 id=\"the-intuition\">The intuition<\/h2>\n<p>Imagine mailing a friend a flipbook. Instead of redrawing every page, you send one full drawing (the <strong>I-frame<\/strong>), then tiny notes: \"page 2: move the ball 3cm right\" (a <strong>P-frame<\/strong>). Cheap to send, but if the full drawing is lost, every \"move the ball\" note after it is meaningless until the next full drawing arrives.<\/p>\n<h2 id=\"frame-types\">Frame types<\/h2>\n<ul><li><strong>I-frame (Intra / keyframe):<\/strong> complete standalone image. Big. Decodable alone.<\/li><li><strong>P-frame (Predicted):<\/strong> stores changes from the <em>previous<\/em> frame. Small.<\/li><li><strong>B-frame (Bi-directional):<\/strong> references <em>past and future<\/em> frames. Smallest, but<\/li><\/ul>\n<p>adds latency (decoder must wait for the future frame) → <strong>many low-latency   pipelines disable B-frames.<\/strong><\/p>\n<h2 id=\"gop-group-of-pictures\">GOP (Group of Pictures)<\/h2>\n<p>The pattern between keyframes, e.g. <code>IPPPPPP...<\/code> repeating every N frames.<\/p>\n<ul><li><strong>Short GOP<\/strong> (frequent keyframes) → faster recovery after loss, faster stream<\/li><\/ul>\n<p>start/seek, <strong>more bandwidth<\/strong>.<\/p>\n<ul><li><strong>Long GOP<\/strong> → less bandwidth, but a lost keyframe means longer corruption and<\/li><\/ul>\n<p>slower join time.<\/p>\n<ul><li><strong>You can only cleanly start decoding / reconnect at an I-frame.<\/strong> That's why a<\/li><\/ul>\n<p>freshly connected stream may show gray/garbage until the first keyframe.<\/p>\n<h2 id=\"codecs-youll-name\">Codecs you'll name<\/h2>\n<ul><li><strong>H.264 (AVC):<\/strong> the default everywhere. Universal hardware decode. Safe answer.<\/li><li><strong>H.265 (HEVC):<\/strong> ~50% less bandwidth at same quality; heavier to decode,<\/li><\/ul>\n<p>licensing friction. Good for many-camera bandwidth savings if HW supports it.<\/p>\n<ul><li><strong>MJPEG:<\/strong> every frame is a standalone JPEG (all I-frames). No inter-frame<\/li><\/ul>\n<p>compression → huge bandwidth, but zero inter-frame latency and trivial frame   extraction. Some industrial cams use it.<\/p>\n<ul><li><strong>AV1:<\/strong> royalty-free, great compression, decode still maturing on edge HW.<\/li><\/ul>\n<h2 id=\"why-this-matters-for-the-jd\">Why this matters for the JD<\/h2>\n<p><strong>\"Handle frame buffers, decoding efficiently\"<\/strong> → you must understand that:<\/p>\n<ol><li>You decode <em>packets<\/em>, and a decoder needs a keyframe to start.<\/li><li>Dropping a P/B frame is survivable; dropping an I-frame corrupts the GOP.<\/li><li>If you reconnect, you wait for the next keyframe — budget for that gray period.<\/li><\/ol>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>H.264 vs H.265 for 50 cameras?<\/strong> H.265 halves bandwidth/storage — attractive at scale — but costs more decode compute and has licensing complexity. Pick H.265 <em>only if<\/em> your decode hardware (Jetson NVDEC, GPU) supports it and CPU/GPU headroom exists; otherwise H.264 is the reliable default.<\/p>\n<p><strong>Why disable B-frames for live inference?<\/strong> B-frames reference future frames, so the decoder must reorder and wait → added latency and jitter. For \"obsess over milliseconds,\" an <code>IPPP<\/code> (no-B) GOP is lower-latency and simpler to reason about.<\/p>\n<p><strong>Why does latency spike right after reconnect?<\/strong> You can only resume at an I-frame. With a long GOP you may wait up to one GOP interval for the next keyframe. Mitigation: request shorter GOP on the camera, or ask for an on-demand IDR (instantaneous decoder refresh) if supported.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"decode-encode-pipeline.md\" href=\"#\">decode-encode-pipeline.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-intuition","text":"The intuition"},{"level":2,"id":"frame-types","text":"Frame types"},{"level":2,"id":"gop-group-of-pictures","text":"GOP (Group of Pictures)"},{"level":2,"id":"codecs-youll-name","text":"Codecs you'll name"},{"level":2,"id":"why-this-matters-for-the-jd","text":"Why this matters for the JD"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"codecs, gop, and i/p/b frames tl;dr: video isn't a stream of pictures — it's mostly diffs . a keyframe (i) is a full image; p/b frames only store what changed. this is why you can't just \"grab any frame,\" why a lost keyframe wrecks seconds of video, and why gop size trades latency against bandwidth. the intuition imagine mailing a friend a flipbook. instead of redrawing every page, you send one full drawing (the i-frame ), then tiny notes: \"page 2: move the ball 3cm right\" (a p-frame ). cheap to send, but if the full drawing is lost, every \"move the ball\" note after it is meaningless until the next full drawing arrives. frame types i-frame (intra / keyframe): complete standalone image. big. decodable alone. p-frame (predicted): stores changes from the previous frame. small. b-frame (bi-directional): references past and future frames. smallest, but adds latency (decoder must wait for the future frame) → many low-latency pipelines disable b-frames. gop (group of pictures) the pattern between keyframes, e.g. ipppppp... repeating every n frames. short gop (frequent keyframes) → faster recovery after loss, faster stream start/seek, more bandwidth . long gop → less bandwidth, but a lost keyframe means longer corruption and slower join time. you can only cleanly start decoding / reconnect at an i-frame. that's why a freshly connected stream may show gray/garbage until the first keyframe. codecs you'll name h.264 (avc): the default everywhere. universal hardware decode. safe answer. h.265 (hevc): ~50% less bandwidth at same quality; heavier to decode, licensing friction. good for many-camera bandwidth savings if hw supports it. mjpeg: every frame is a standalone jpeg (all i-frames). no inter-frame compression → huge bandwidth, but zero inter-frame latency and trivial frame extraction. some industrial cams use it. av1: royalty-free, great compression, decode still maturing on edge hw. why this matters for the jd \"handle frame buffers, decoding efficiently\" → you must understand that: you decode packets , and a decoder needs a keyframe to start. dropping a p/b frame is survivable; dropping an i-frame corrupts the gop. if you reconnect, you wait for the next keyframe — budget for that gray period. why x over y h.264 vs h.265 for 50 cameras? h.265 halves bandwidth/storage — attractive at scale — but costs more decode compute and has licensing complexity. pick h.265 only if your decode hardware (jetson nvdec, gpu) supports it and cpu/gpu headroom exists; otherwise h.264 is the reliable default. why disable b-frames for live inference? b-frames reference future frames, so the decoder must reorder and wait → added latency and jitter. for \"obsess over milliseconds,\" an ippp (no-b) gop is lower-latency and simpler to reason about. why does latency spike right after reconnect? you can only resume at an i-frame. with a long gop you may wait up to one gop interval for the next keyframe. mitigation: request shorter gop on the camera, or ask for an on-demand idr (instantaneous decoder refresh) if supported. → next: decode-encode-pipeline.md","words":493},{"path":"01-video-streaming/decode-encode-pipeline.md","title":"Decode / Encode Pipeline","section":"1 · Video Streaming","quiz":false,"html":"<h1 id=\"from-packet-to-numpy-the-decode-pipeline\">From Packet to NumPy: The Decode Pipeline<\/h1>\n<p><strong>TL;DR:<\/strong> A frame's journey is: network packets → depacketize → decode (turn compressed bitstream into raw pixels) → color convert (NV12/YUV → BGR/RGB) → hand to your model. The single biggest performance lever is <strong>decoding on the GPU (NVDEC)<\/strong> and <strong>keeping pixels on the GPU<\/strong> so you never pay the CPU↔GPU copy tax.<\/p>\n<h2 id=\"the-full-path\">The full path<\/h2>\n<pre><code>RTSP/RTP packets\n   → depayload (rtph264depay)        # strip RTP, get raw H.264 bitstream\n   → parse (h264parse)               # find frame boundaries, NAL units\n   → DECODE                          # bitstream → raw frame (YUV/NV12)\n        ├─ CPU: avdec_h264 (FFmpeg)  # portable, burns CPU\n        └─ GPU: nvv4l2decoder/NVDEC  # hardware, frees CPU, stays in GPU mem\n   → color convert (NV12 → BGR)      # models usually want BGR/RGB\n   → (optional resize/crop)\n   → frame ready  → inference<\/code><\/pre>\n<h2 id=\"cpu-decode-vs-hardware-decode-the-key-decision\">CPU decode vs hardware decode (the key decision)<\/h2>\n<ul><li><strong>CPU decode<\/strong> (<code>avdec_h264<\/code>, OpenCV's default <code>cv2.VideoCapture<\/code>): simple,<\/li><\/ul>\n<p>portable, but <strong>one or two 1080p H.264 streams can saturate several CPU cores.<\/strong>   Does not scale to \"multiple RTSP streams.\"<\/p>\n<ul><li><strong>Hardware decode<\/strong> (NVIDIA <strong>NVDEC<\/strong> via <code>nvv4l2decoder<\/code>/DeepStream, or VA-API<\/li><\/ul>\n<p>on Intel): a dedicated silicon block decodes video, leaving CPU/GPU compute free.   A single Jetson/GPU can decode dozens of streams. <strong>This is the scalable answer.<\/strong><\/p>\n<blockquote><p>Interview line: <em>\"<code>cv2.VideoCapture<\/code> is fine for a prototype, but it decodes on the CPU and copies every frame to host memory. At multi-camera scale I'd decode on NVDEC through GStreamer/DeepStream and keep frames in GPU memory so inference reads them with zero copy.\"<\/em><\/p><\/blockquote>\n<h2 id=\"the-hidden-killer-cpugpu-memory-copies\">The hidden killer: CPU↔GPU memory copies<\/h2>\n<p>Every <code>numpy<\/code> frame on the CPU that you push to the GPU for inference is a <strong>PCIe copy<\/strong> — and back again for post-processing. At 30fps × N cameras that copy bandwidth becomes your bottleneck.<\/p>\n<ul><li><strong>Zero-copy goal:<\/strong> decode on GPU → infer on GPU → only pull the <em>small<\/em> result<\/li><\/ul>\n<p>(boxes, labels) back to CPU. Never round-trip full frames.<\/p>\n<ul><li>DeepStream's <code>NvBufSurface<\/code> and CUDA unified memory exist precisely for this.<\/li><\/ul>\n<h2 id=\"opencvs-role-and-its-trap\">OpenCV's role (and its trap)<\/h2>\n<ul><li><code>cv2.VideoCapture(\"rtsp://...\")<\/code> uses FFmpeg under the hood — great for quick<\/li><\/ul>\n<p>work, but: CPU decode, an internal buffer that grows latency, and silent   reconnect behavior you don't control.<\/p>\n<ul><li>For production multi-stream you drive <strong>GStreamer<\/strong> and use OpenCV only for the<\/li><\/ul>\n<p>image-processing math (geometry, color spaces, warps) it's genuinely good at.<\/p>\n<pre><code class=\"language-python\"># Pulling frames from a GStreamer pipeline into OpenCV via appsink\ncap = cv2.VideoCapture(\n    \"rtspsrc location=rtsp://cam latency=100 ! rtph264depay ! h264parse ! \"\n    \"nvv4l2decoder ! nvvidconv ! video/x-raw,format=BGRx ! \"\n    \"videoconvert ! video/x-raw,format=BGR ! appsink drop=1 max-buffers=1\",\n    cv2.CAP_GSTREAMER,\n)<\/code><\/pre>\n<p>Note <code>drop=1 max-buffers=1<\/code> — that's the backpressure knob (next file).<\/p>\n<h2 id=\"encoding-the-way-back-out\">Encoding (the way back out)<\/h2>\n<p>If you serve an annotated stream (WebRTC/RTSP out, or save clips), you <strong>encode<\/strong>: raw frame → NVENC (hardware H.264/H.265) → mux → transport. Use <strong>NVENC<\/strong>, not CPU x264, for the same scaling reasons. NVDEC and NVENC are separate silicon blocks, so you can decode and encode concurrently.<\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong><code>cv2.VideoCapture<\/code> vs GStreamer pipeline?<\/strong> VideoCapture = fast to write, CPU-bound, opaque buffering. GStreamer = explicit control over decode hardware, buffering, and threading; scales to many streams. Prototype with the first, ship with the second.<\/p>\n<p><strong>Software vs hardware decode?<\/strong> Software = portable, no special HW, but CPU-bound and won't scale past a couple streams. Hardware (NVDEC) = scales to dozens, frees CPU, keeps frames on GPU for zero-copy inference. At KoiReader scale, hardware every time.<\/p>\n<p><strong>Why is color conversion (NV12→BGR) a real cost?<\/strong> Decoders output YUV/NV12; models want BGR/RGB. The convert is per-pixel per-frame. Do it on the GPU (<code>nvvidconv<\/code>) — doing it on CPU re-introduces the copy + compute you just avoided.<\/p>\n<p>→ Next: <strong><a class=\"mdlink\" data-href=\"frame-buffers-backpressure.md\" href=\"#\">frame-buffers-backpressure.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-full-path","text":"The full path"},{"level":2,"id":"cpu-decode-vs-hardware-decode-the-key-decision","text":"CPU decode vs hardware decode (the key decision)"},{"level":2,"id":"the-hidden-killer-cpugpu-memory-copies","text":"The hidden killer: CPU↔GPU memory copies"},{"level":2,"id":"opencvs-role-and-its-trap","text":"OpenCV's role (and its trap)"},{"level":2,"id":"encoding-the-way-back-out","text":"Encoding (the way back out)"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"from packet to numpy: the decode pipeline tl;dr: a frame's journey is: network packets → depacketize → decode (turn compressed bitstream into raw pixels) → color convert (nv12/yuv → bgr/rgb) → hand to your model. the single biggest performance lever is decoding on the gpu (nvdec) and keeping pixels on the gpu so you never pay the cpu↔gpu copy tax. the full path rtsp/rtp packets → depayload (rtph264depay) # strip rtp, get raw h.264 bitstream → parse (h264parse) # find frame boundaries, nal units → decode # bitstream → raw frame (yuv/nv12) ├─ cpu: avdec_h264 (ffmpeg) # portable, burns cpu └─ gpu: nvv4l2decoder/nvdec # hardware, frees cpu, stays in gpu mem → color convert (nv12 → bgr) # models usually want bgr/rgb → (optional resize/crop) → frame ready → inference cpu decode vs hardware decode (the key decision) cpu decode ( avdec_h264 , opencv's default cv2.videocapture ): simple, portable, but one or two 1080p h.264 streams can saturate several cpu cores. does not scale to \"multiple rtsp streams.\" hardware decode (nvidia nvdec via nvv4l2decoder /deepstream, or va-api on intel): a dedicated silicon block decodes video, leaving cpu/gpu compute free. a single jetson/gpu can decode dozens of streams. this is the scalable answer. interview line: \" cv2.videocapture is fine for a prototype, but it decodes on the cpu and copies every frame to host memory. at multi-camera scale i'd decode on nvdec through gstreamer/deepstream and keep frames in gpu memory so inference reads them with zero copy.\" the hidden killer: cpu↔gpu memory copies every numpy frame on the cpu that you push to the gpu for inference is a pcie copy — and back again for post-processing. at 30fps × n cameras that copy bandwidth becomes your bottleneck. zero-copy goal: decode on gpu → infer on gpu → only pull the small result (boxes, labels) back to cpu. never round-trip full frames. deepstream's nvbufsurface and cuda unified memory exist precisely for this. opencv's role (and its trap) cv2.videocapture(\"rtsp://...\") uses ffmpeg under the hood — great for quick work, but: cpu decode, an internal buffer that grows latency, and silent reconnect behavior you don't control. for production multi-stream you drive gstreamer and use opencv only for the image-processing math (geometry, color spaces, warps) it's genuinely good at. # pulling frames from a gstreamer pipeline into opencv via appsink cap = cv2.videocapture( \"rtspsrc location=rtsp://cam latency=100 ! rtph264depay ! h264parse ! \" \"nvv4l2decoder ! nvvidconv ! video/x-raw,format=bgrx ! \" \"videoconvert ! video/x-raw,format=bgr ! appsink drop=1 max-buffers=1\", cv2.cap_gstreamer, ) note drop=1 max-buffers=1 — that's the backpressure knob (next file). encoding (the way back out) if you serve an annotated stream (webrtc/rtsp out, or save clips), you encode : raw frame → nvenc (hardware h.264/h.265) → mux → transport. use nvenc , not cpu x264, for the same scaling reasons. nvdec and nvenc are separate silicon blocks, so you can decode and encode concurrently. why x over y cv2.videocapture vs gstreamer pipeline? videocapture = fast to write, cpu-bound, opaque buffering. gstreamer = explicit control over decode hardware, buffering, and threading; scales to many streams. prototype with the first, ship with the second. software vs hardware decode? software = portable, no special hw, but cpu-bound and won't scale past a couple streams. hardware (nvdec) = scales to dozens, frees cpu, keeps frames on gpu for zero-copy inference. at koireader scale, hardware every time. why is color conversion (nv12→bgr) a real cost? decoders output yuv/nv12; models want bgr/rgb. the convert is per-pixel per-frame. do it on the gpu ( nvvidconv ) — doing it on cpu re-introduces the copy + compute you just avoided. → next: frame-buffers-backpressure.md","words":599},{"path":"01-video-streaming/frame-buffers-backpressure.md","title":"Frame Buffers & Backpressure","section":"1 · Video Streaming","quiz":false,"html":"<h1 id=\"frame-buffers-backpressure\">Frame Buffers &amp; Backpressure<\/h1>\n<p><strong>TL;DR:<\/strong> Cameras produce frames at a fixed rate; your model consumes them at a variable rate. When the model is slower than the camera, frames pile up. You have exactly three choices: <strong>buffer<\/strong> (latency grows), <strong>drop<\/strong> (stay real-time), or <strong>block<\/strong> (stall the source). For live inference the right default is almost always <strong>drop the oldest, keep latest<\/strong>.<\/p>\n<h2 id=\"the-core-problem-producerconsumer-mismatch\">The core problem (producer/consumer mismatch)<\/h2>\n<pre><code>Camera @ 30fps  ──&gt;  [ queue ]  ──&gt;  Model @ 22fps\n   producer          buffer            consumer (slower!)<\/code><\/pre>\n<p>If producer &gt; consumer forever, the queue grows without bound → <strong>memory leak, ever-increasing latency<\/strong>, eventual OOM crash. This is the #1 way naive video pipelines die in production. The JD's \"without memory leaks\" and \"manage resources in long-running processes\" point straight here.<\/p>\n<h2 id=\"the-three-strategies\">The three strategies<\/h2>\n<div class=\"table-scroll\"><table><thead><tr><th>Strategy<\/th><th>What happens<\/th><th>Use when<\/th><\/tr><\/thead><tbody><tr><td><strong>Bounded queue + drop oldest<\/strong><\/td><td>Keep newest frame, discard stale<\/td><td><strong>Live inference<\/strong> — you want <em>current<\/em> reality, not a backlog<\/td><\/tr><tr><td><strong>Bounded queue + block<\/strong><\/td><td>Source waits for consumer<\/td><td>Offline/batch processing of recorded video where every frame matters<\/td><\/tr><tr><td><strong>Unbounded queue<\/strong><\/td><td>Grows forever<\/td><td><strong>Never<\/strong> in production — this is the bug, not a strategy<\/td><\/tr><\/tbody><\/table><\/div>\n<p><strong>Latency vs completeness is the tradeoff.<\/strong> A live anomaly detector wants the <em>latest<\/em> frame (drop). A forensic counting job on a recording wants <em>every<\/em> frame (block + bounded).<\/p>\n<h2 id=\"how-you-actually-express-drop\">How you actually express \"drop\"<\/h2>\n<p>GStreamer:<\/p>\n<pre><code>appsink drop=true max-buffers=1   # only ever hold the newest frame\n# or on a leaky queue element:\nqueue max-size-buffers=2 leaky=downstream<\/code><\/pre>\n<p>Python (your own thread):<\/p>\n<pre><code class=\"language-python\">from collections import deque\nframe_buf = deque(maxlen=1)        # bounded; appending evicts the old frame\n# producer thread:\nframe_buf.append(frame)            # never blocks, never grows\n# consumer thread:\nframe = frame_buf[-1] if frame_buf else None<\/code><\/pre>\n<p>A <code>deque(maxlen=N)<\/code> or a <code>queue.Queue(maxsize=N)<\/code> with <code>put_nowait<\/code> + drop-on-full is the canonical \"crash-proof buffer.\"<\/p>\n<h2 id=\"latency-vs-jitter-dont-confuse-them\">Latency vs jitter (don't confuse them)<\/h2>\n<ul><li><strong>Latency<\/strong> = how old the frame is when you act on it.<\/li><li><strong>Jitter<\/strong> = variation in frame arrival timing.<\/li><li>A <em>small<\/em> jitter buffer smooths bursty networks; a <em>large<\/em> one trades latency<\/li><\/ul>\n<p>for smoothness. RTSP <code>latency=<\/code> and GStreamer <code>rtpjitterbuffer<\/code> tune this.   For \"obsess over milliseconds,\" keep it small (~100–200ms).<\/p>\n<h2 id=\"backpressure-across-stages\">Backpressure across stages<\/h2>\n<p>In a multi-stage pipeline (decode → infer → analytics → DB), the <em>slowest stage<\/em> sets the pace. Each stage needs a bounded buffer in front of it so a slow DB write can't back up into dropped <em>decoded<\/em> frames silently. Design rule: <strong>bound every queue, and decide the drop policy per stage.<\/strong><\/p>\n<h2 id=\"why-x-over-y\">Why X over Y<\/h2>\n<p><strong>Drop frames vs buffer them?<\/strong> Live = drop (you want now, not a backlog; buffering inflates latency forever if you can't catch up). Recorded/offline = buffer/block (correctness over latency).<\/p>\n<p><strong>Why <code>maxsize=1<\/code> instead of a big buffer for live inference?<\/strong> A big buffer just means you're always acting on old frames during any slowdown. Size 1–2 keeps you on the freshest frame; if you fall behind you skip, not lag.<\/p>\n<p><strong>queue.Queue vs collections.deque for the buffer?<\/strong> <code>queue.Queue<\/code> is thread-safe with blocking/timeout semantics (good for producer/consumer with backpressure signaling). <code>deque(maxlen=N)<\/code> is lock-free-ish for simple append/peek and auto-evicts — great for \"latest frame only.\" Pick Queue when you need blocking/coordination, deque for pure latest-wins.<\/p>\n<p><strong>What causes the classic video-pipeline memory leak?<\/strong> An unbounded queue (consumer slower than producer) <strong>or<\/strong> holding references to decoded frames (GPU surfaces) you never release. Fix: bound the queue + explicitly free/unmap GPU buffers each iteration.<\/p>\n<p>→ Back to <a class=\"mdlink\" data-href=\"README.md\" href=\"#\">section README<\/a> · Next section: <strong><a class=\"mdlink\" data-href=\"../02-gstreamer/README.md\" href=\"#\">02-gstreamer/<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-core-problem-producerconsumer-mismatch","text":"The core problem (producer/consumer mismatch)"},{"level":2,"id":"the-three-strategies","text":"The three strategies"},{"level":2,"id":"how-you-actually-express-drop","text":"How you actually express \"drop\""},{"level":2,"id":"latency-vs-jitter-dont-confuse-them","text":"Latency vs jitter (don't confuse them)"},{"level":2,"id":"backpressure-across-stages","text":"Backpressure across stages"},{"level":2,"id":"why-x-over-y","text":"Why X over Y"}],"text":"frame buffers & backpressure tl;dr: cameras produce frames at a fixed rate; your model consumes them at a variable rate. when the model is slower than the camera, frames pile up. you have exactly three choices: buffer (latency grows), drop (stay real-time), or block (stall the source). for live inference the right default is almost always drop the oldest, keep latest . the core problem (producer/consumer mismatch) camera @ 30fps ──> [ queue ] ──> model @ 22fps producer buffer consumer (slower!) if producer > consumer forever, the queue grows without bound → memory leak, ever-increasing latency , eventual oom crash. this is the #1 way naive video pipelines die in production. the jd's \"without memory leaks\" and \"manage resources in long-running processes\" point straight here. the three strategies strategy what happens use when bounded queue + drop oldest keep newest frame, discard stale live inference — you want current reality, not a backlog bounded queue + block source waits for consumer offline/batch processing of recorded video where every frame matters unbounded queue grows forever never in production — this is the bug, not a strategy latency vs completeness is the tradeoff. a live anomaly detector wants the latest frame (drop). a forensic counting job on a recording wants every frame (block + bounded). how you actually express \"drop\" gstreamer: appsink drop=true max-buffers=1 # only ever hold the newest frame # or on a leaky queue element: queue max-size-buffers=2 leaky=downstream python (your own thread): from collections import deque frame_buf = deque(maxlen=1) # bounded; appending evicts the old frame # producer thread: frame_buf.append(frame) # never blocks, never grows # consumer thread: frame = frame_buf[-1] if frame_buf else none a deque(maxlen=n) or a queue.queue(maxsize=n) with put_nowait + drop-on-full is the canonical \"crash-proof buffer.\" latency vs jitter (don't confuse them) latency = how old the frame is when you act on it. jitter = variation in frame arrival timing. a small jitter buffer smooths bursty networks; a large one trades latency for smoothness. rtsp latency= and gstreamer rtpjitterbuffer tune this. for \"obsess over milliseconds,\" keep it small (~100–200ms). backpressure across stages in a multi-stage pipeline (decode → infer → analytics → db), the slowest stage sets the pace. each stage needs a bounded buffer in front of it so a slow db write can't back up into dropped decoded frames silently. design rule: bound every queue, and decide the drop policy per stage. why x over y drop frames vs buffer them? live = drop (you want now, not a backlog; buffering inflates latency forever if you can't catch up). recorded/offline = buffer/block (correctness over latency). why maxsize=1 instead of a big buffer for live inference? a big buffer just means you're always acting on old frames during any slowdown. size 1–2 keeps you on the freshest frame; if you fall behind you skip, not lag. queue.queue vs collections.deque for the buffer? queue.queue is thread-safe with blocking/timeout semantics (good for producer/consumer with backpressure signaling). deque(maxlen=n) is lock-free-ish for simple append/peek and auto-evicts — great for \"latest frame only.\" pick queue when you need blocking/coordination, deque for pure latest-wins. what causes the classic video-pipeline memory leak? an unbounded queue (consumer slower than producer) or holding references to decoded frames (gpu surfaces) you never release. fix: bound the queue + explicitly free/unmap gpu buffers each iteration. → back to section readme · next section: 02-gstreamer/","words":560},{"path":"02-gstreamer/README.md","title":"Overview","section":"2 · GStreamer","quiz":false,"html":"<h1 id=\"02-gstreamer-and-deepstream\">02 — GStreamer (and DeepStream)<\/h1>\n<p><strong>TL;DR:<\/strong> GStreamer is a pipeline framework: you connect small <strong>elements<\/strong> (source → decode → convert → sink) into a graph, and media flows through as <strong>buffers<\/strong>. It's how you get hardware-accelerated, multi-stream video into your model. DeepStream is NVIDIA's GStreamer plugin set that bolts inference + tracking<\/p>\n<ul><li>analytics directly into that pipeline.<\/li><\/ul>\n<p>This is <em>the<\/em> tool the JD names twice. You've used it (Integration Wizards + DeepStream on Jetson) — this section makes sure you can talk about it fluently.<\/p>\n<p>Files:<\/p>\n<ol><li><a class=\"mdlink\" data-href=\"pipeline-model.md\" href=\"#\">pipeline-model.md<\/a> — elements, pads, caps, bins, bus<\/li><li><a class=\"mdlink\" data-href=\"appsink-and-python.md\" href=\"#\">appsink-and-python.md<\/a> — getting frames into Python/OpenCV<\/li><li><a class=\"mdlink\" data-href=\"deepstream.md\" href=\"#\">deepstream.md<\/a> — inference inside the pipeline, multi-stream batching<\/li><\/ol>\n<h2 id=\"the-one-paragraph-pitch-memorize\">The one-paragraph pitch (memorize)<\/h2>\n<p><em>\"GStreamer models video as a directed graph of elements connected by pads. Source elements produce buffers, transform elements (decoders, converters) process them, sink elements consume them. Capabilities (caps) negotiate format between pads. Each element can run on its own thread via <code>queue<\/code> elements, so a pipeline is naturally concurrent. For NVIDIA, DeepStream adds <code>nvstreammux<\/code> to batch many camera streams into one inference call, <code>nvinfer<\/code> for TensorRT inference, and <code>nvtracker<\/code> for multi-object tracking — all keeping frames in GPU memory.\"<\/em><\/p>\n<p>→ Start: <strong><a class=\"mdlink\" data-href=\"pipeline-model.md\" href=\"#\">pipeline-model.md<\/a><\/strong><\/p>","toc":[{"level":2,"id":"the-one-paragraph-pitch-memorize","text":"The one-paragraph pitch (memorize)"}],"text":"02 — gstreamer (and deepstream) tl;dr: gstreamer is a pipeline framework: you connect small elements (source → decode → convert → sink) into a graph, and media flows through as buffers . it's how you get hardware-accelerated, multi-stream video into your model. deepstream is nvidia's gstreamer plugin set that bolts inference + tracking analytics directly into that pipeline. this is the tool the jd names twice. you've used it (integration wizards + deepstream on jetson) — this section makes sure you can talk about it fluently. files: pipeline-model.md — elements, pads, caps, bins, bus appsink-and-python.md — getting frames into python/opencv deepstream.md — inference inside the pipeline, multi-stream batching the one-paragraph pitch (memorize) \"gstreamer models video as a directed graph of elements connected by pads. source elements produce buffers, transform elements (decoders, converters) process them, sink elements consume them. capabilities (caps) negotiate format between pads. each element can run on its own thread via queue elements, so a pipeline is naturally concurrent. for nvidia, deepstream adds nvstreammux to batch many camera streams into one inference call, nvinfer for tensorrt inference, and nvtracker for multi-object tracking — all keeping frames in gpu memory.\" → start: pipeline-model.md","words":194},{"path":"02-gstreamer/pipeline-model.md","title":"Pipeline Model","section":"2 · GStreamer","quiz":false,"html":"<h1 id=\"the-gstreamer-pipeline-model\">The GStreamer Pipeline Model<\/h1>\n<p><strong>TL;DR:<\/strong> Elements are LEGO bricks. Pads are the studs that connect them. Caps are the rule that says \"these two bricks fit.\" Buffers are the data flowing through. The bus is the intercom that tells your app about errors and end-of-stream.<\/p>\n<h2 id=\"the-pieces\">The pieces<\/h2>\n<ul><li><strong>Element<\/strong> — one processing unit: <code>rtspsrc<\/code>, <code>h264parse<\/code>, <code>nvv4l2decoder<\/code>,<\/li><\/ul>\n<p><code>nvvidconv<\/code>, <code>appsink<\/code>. Has a state (NULL → READY → PAUSED → PLAYING).<\/p>\n<ul><li><strong>Pad<\/strong> — an element's input (<strong>sink pad<\/strong>) or output (<strong>source pad<\/strong>). Data<\/li><\/ul>\n<p>enters sink pads, leaves source pads. (Confusingly, a \"sink <em>element<\/em>\" is the   final consumer, while a \"sink <em>pad<\/em>\" is any input port.)<\/p>\n<ul><li><strong>Caps (capabilities)<\/strong> — the format contract negotiated between pads, e.g.<\/li><\/ul>\n<p><code>video/x-raw,format=NV12,width=1920,height=1080,framerate=30/1<\/code>. Mismatched caps   = pipeline won't link.<\/p>\n<ul><li><strong>Buffer<\/strong> — a chunk of data (usually one frame) flowing downstream, with a<\/li><\/ul>\n<p>timestamp (PTS).<\/p>\n<ul><li><strong>Bin / Pipeline<\/strong> — a container of elements. The top-level <code>Pipeline<\/code> is a bin<\/li><\/ul>\n<p>that also owns the clock and bus.<\/p>\n<ul><li><strong>Bus<\/strong> — the message channel from pipeline → your app: <code>EOS<\/code> (end of stream),<\/li><\/ul>\n<p><code>ERROR<\/code>, <code>WARNING<\/code>, state changes. <strong>You watch the bus to detect a dead camera.<\/strong><\/p>\n<h2 id=\"a-pipeline-in-words\">A pipeline in words<\/h2>\n<pre><code>rtspsrc ! rtph264depay ! h264parse ! nvv4l2decoder ! nvvidconv ! appsink\n  │           │             │            │              │          │\n pull from   strip RTP   find frame   GPU decode    color/format  hand to\n camera      packaging   boundaries   (NVDEC)       convert       your code<\/code><\/pre>\n<p>The <code>!<\/code> i
